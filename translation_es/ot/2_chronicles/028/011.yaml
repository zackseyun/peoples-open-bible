  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: urgencia exhortativa («Ahora»), imperativos («escúchenme», «devuelvan»), referente concreto de הַשִּׁבְיָה como personas cautivas, lenguaje de parentesco («hermanos»), razón causal («porque») y el nombre divino «Yahvé». Sin embargo, la cláusula relativa «que ustedes han tomado» suena algo incompleta en español con objeto humano y conviene explicitar la idea de captura para corresponder mejor a אֲשֶׁר שְׁבִיתֶם.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en naturalidad y precisión. «Que ustedes han tomado de sus hermanos» es menos idiomático que «que tomaron cautivos de entre sus hermanos». Además, la nota al pie puede simplificarse para sonar más natural en español eclesial general.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; lenguaje de parentesco preservado con «hermanos» y aclarado en nota; no hay conflictos relevantes con el glosario. La revisión propuesta mantiene esas decisiones.'
  issues:
  - severity: medium
    issue: La frase «que ustedes han tomado de sus hermanos» resulta poco natural y algo ambigua en español.
    rationale: El hebreo expresa claramente capturar/se llevar cautivos. En español, con «cautivos» como antecedente, conviene decir «que tomaron cautivos» o «a quienes capturaron» para evitar la impresión de que solo fueron 'tomados' en un sentido impreciso.
  - severity: low
    issue: La nota «de sus hermanos de nación» suena algo explicativa de más y menos idiomática que otras opciones.
    rationale: La intención del inglés es aclarar el alcance colectivo de «hermanos». En español, «compatriotas israelitas» o «sus compañeros israelitas» comunica mejor la aclaración sin introducir una expresión poco usual como «hermanos de nación».
  revised_spanish_text: Ahora escúchenme[a], y devuelvan a los cautivos que tomaron cautivos de entre sus hermanos, porque el ardor de la ira de Yahvé está sobre ustedes.
  revised_footnotes:
