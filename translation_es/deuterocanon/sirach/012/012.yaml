translation:
  language: es
  text: Trátalo como a uno que revela un secreto[a], y no hallará modo de arruinarte; y conoce el fin de la envidia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «como a uno que descubre un secreto». La imagen probablemente pide tratar a esa persona con cautela, como a alguien que expone asuntos confidenciales.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el resultado de los celos». El hebreo dice literalmente «el fin de la envidia/celos»; el paralelo griego amplía la advertencia y hace más explícita la consecuencia final.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֱיֵה לוֹ
  english_pob_choice: Be to him
  chosen_spanish: Trátalo
  alternatives_spanish:
  - Sé para él
  - Compórtate hacia él
  lexicon: HALOT
  rationale: El imperativo hebreo con ל expresa la actitud o trato hacia la persona. En español, «Trátalo» comunica de forma natural esa postura relacional sin perder la directividad del mandato.
- source_word: כִּמְגַלֶּה רָז
  english_pob_choice: like one who reveals a secret
  chosen_spanish: como a uno que revela un secreto
  alternatives_spanish:
  - como a uno que descubre un secreto
  - como a un revelador de secretos
  lexicon: HALOT
  rationale: Se conserva la imagen comparativa del participio de גלה con רז. «Revela un secreto» es idiomático y mantiene el matiz de cautela relacional que el inglés POB preserva.
- source_word: וְלֹא יִמְצָא
  english_pob_choice: and he will not find a way
  chosen_spanish: y no hallará modo
  alternatives_spanish:
  - y no encontrará
  - y no encontrará medio
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y no encontrará». En español, «no hallará modo» hace fluida la construcción con el infinitivo siguiente y conserva el sentido de incapacidad para lograr algo.
- source_word: לְהַשְׁחִיתְךָ
  english_pob_choice: to ruin you
  chosen_spanish: de arruinarte
  alternatives_spanish:
  - de destruirte
  - de dañarte
  - de corromperte
  lexicon: HALOT
  rationale: El hiphil de שחת puede abarcar destruir, arruinar o corromper. «Arruinarte» refleja bien el daño hostil en un contexto interpersonal sin volverlo excesivamente absoluto.
- source_word: וְדַע אַחֲרִית
  english_pob_choice: and know the outcome of
  chosen_spanish: y conoce el desenlace de
  alternatives_spanish:
  - y conoce el fin de
  - y entiende el resultado de
  lexicon: HALOT
  rationale: אַחֲרִית admite «fin», «último fin» u «resultado». «Desenlace» comunica con naturalidad la idea de resultado final que el inglés POB puso en «outcome».
- source_word: קִנְאָה
  english_pob_choice: jealousy
  chosen_spanish: los celos
  alternatives_spanish:
  - la envidia
  - la celotipia
  lexicon: HALOT
  rationale: En este contexto, קנאה puede ser «celos» o «envidia». Se eligió «celos» porque encaja mejor con la relación interpersonal y con el matiz de rivalidad dañina, manteniendo la ambigüedad semántica con una nota alternativa.
theological_decisions:
- issue: Primacía del hebreo frente al paralelo griego más expandido
  english_pob_reading: Follow the extant Hebrew as the primary text while allowing the Greek to inform interpretation of the warning tone.
  chosen_spanish_reading: Seguir el hebreo conservado como texto primario, dejando que el griego paralelo ilumine el tono de advertencia.
  alternative_spanish_readings:
  - Traducir más cerca del griego, con la imagen de no sentarlo cerca de ti ni a tu derecha
  - Fusionar ambas formas en una sola redacción expansiva
  rationale: La política del proyecto da prioridad al hebreo superviviente donde existe. Por eso la redacción española sigue el hebreo breve, pero la nota sobre el desenlace y la imposibilidad de dañar conserva la advertencia práctica que el griego explicita con mayor detalle.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input without displacing the Hebrew witness.'
translation_notes:
  revision_awareness: 'El draft incorpora la última revisión del inglés POB: mantiene la relación negativa («no hallará modo») y evita una formulación más dura que «destruir»; también refleja la elección revisada de «outcome» mediante «desenlace», en lugar de un «fin» más literal pero menos natural. El texto base sigue el hebreo de Sirácida 12:12, mientras el griego queda como apoyo interpretativo.'
  spanish_consistency_notes:
  - Se usa «secreto» para רז, en línea con el inglés POB y con español bíblico claro.
  - Se evita «Cristo», «SEÑOR» o terminología no pertinente, ya que el versículo no contiene esos vocablos.
  - Se mantiene un registro digno y publicable, sin calcos excesivos del inglés.
  - «Celos» se conserva en el cuerpo y se aclara en nota la alternativa «envidia», dado el rango semántico de קנאה.
  - 'La sintaxis española procura ser natural: mandato directo, comparación explícita y segunda cláusula de consecuencia bien enlazada.'
