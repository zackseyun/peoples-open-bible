translation:
  language: es
  text: Los sacrificios de Dios son un espíritu quebrantado[a]; un corazón quebrantado y aplastado[b], no despreciarás, oh Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu contrito».
    reason: lexical_alternative
  - marker: b
    text: O «un corazón quebrantado y contrito».
    reason: lexical_alternative
lexical_decisions:
- source_word: זִבְחֵי אֱלֹהִים
  english_pob_choice: The sacrifices of God
  chosen_spanish: Los sacrificios de Dios
  alternatives_spanish:
  - Los sacrificios agradables a Dios
  - Los sacrificios que Dios acepta
  lexicon: HALOT
  rationale: La construcción en hebreo es literalmente «sacrificios de Dios». En español, «de Dios» conserva la forma del genitivo sin sobreexplicar la relación; las alternativas aclaran la idea implícita, pero la redacción principal mantiene la expresión fuente con naturalidad.
- source_word: ר֪וּחַ נִשְׁבָּ֫רָ֥ה
  english_pob_choice: a broken spirit
  chosen_spanish: un espíritu quebrantado
  alternatives_spanish:
  - un espíritu roto
  - un espíritu contrito
  lexicon: HALOT
  rationale: רוּחַ es «espíritu»; el participio pasivo comunica estar quebrado. «Quebrantado» preserva el valor metafórico y suena digno en español. «Contrito» refleja el sentido penitencial, pero es más interpretativo y por eso se deja como alternativa.
- source_word: לֵב נִשְׁבָּ֥ר
  english_pob_choice: a broken heart
  chosen_spanish: un corazón quebrantado
  alternatives_spanish:
  - un corazón roto
  - un corazón contrito
  lexicon: HALOT
  rationale: לֵב es «corazón» y נִשְׁבָּר vuelve a ser «quebrado». «Quebrantado» conserva el paralelo con «espíritu quebrantado» y evita un cambio de registro demasiado coloquial con «roto».
- source_word: וְנִדְכֶּה
  english_pob_choice: and crushed
  chosen_spanish: y aplastado
  alternatives_spanish:
  - y quebrantado
  - y contrito
  - y humillado
  lexicon: HALOT
  rationale: דכה expresa la idea de ser aplastado o abatido. «Aplastado» retiene la imagen concreta y mantiene la intensidad del paralelismo con «quebrantado». «Contrito» se conserva como alternativa por su uso devocional, pero no es la opción principal.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - oh Dios
  lexicon: HALOT
  rationale: Aquí funciona como vocativo y como nombre divino. En español el vocativo se expresa mejor con «oh Dios» al final de la línea, mientras que el primer «Dios» se mantiene en el sintagma inicial.
- source_word: לֹא תִבְזֶה
  english_pob_choice: you will not despise
  chosen_spanish: no despreciarás
  alternatives_spanish:
  - no rechazarás
  - no desdeñarás
  - no harás caso omiso
  lexicon: HALOT
  rationale: בזה significa «despreciar / tener en poco». «Despreciarás» es la equivalencia más directa y conserva el tono de oración con negación enfática.
theological_decisions:
- issue: Los sacrificios de Dios e interioridad penitencial
  english_pob_reading: The verse identifies inward repentance—broken spirit and broken/crushed heart—as the sacrifices God accepts, without denying the sacrificial system in principle.
  chosen_spanish_reading: El versículo identifica la disposición interior quebrantada —espíritu quebrantado y corazón quebrantado y aplastado— como los sacrificios de Dios, sin anular en sí mismo el sistema sacrificial.
  alternative_spanish_readings:
  - El versículo elimina por completo el valor de los sacrificios externos
  - El versículo habla solo de dolor emocional, no de arrepentimiento
  rationale: La frase hebrea predica «los sacrificios de Dios» de un estado interior; por eso la traducción conserva la metáfora sin convertirla en una tesis doctrinal más amplia. Así se respeta la tensión bíblica entre rito y corazón arrepentido.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma excesiva.
translation_notes:
  revision_awareness: La base inglesa fue revisada y quedó sin cambios; el control cruzado mostró alto acuerdo y no hubo observaciones pendientes. La versión española sigue ese estado estable, conservando el paralelismo hebreo y las alternativas léxicas principales donde el español introduce una ambigüedad devocional (quebrantado/contrito).
  spanish_consistency_notes:
  - Se mantuvo «Dios» como traducción de אֱלֹהִים tanto en el sintagma inicial como en el vocativo final.
  - Se prefirió «quebrantado» sobre «contrito» en el texto principal para reflejar la metáfora concreta del hebreo, reservando «contrito» para nota.
  - Se eligió «aplastado» para וְנִדְכֶּה por su valor imagético y por conservar el paralelismo con «quebrantado».
  - La puntuación reproduce la cesura poética del hebreo con punto y coma.
