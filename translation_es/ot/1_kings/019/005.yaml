translation:
  language: es
  text: 'Entonces él se acostó y durmió bajo una retama[b]. Y he aquí, un ángel[a] lo tocó y le dijo: «Levántate, come»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero». El hebreo מַלְאָךְ puede referirse a un mensajero humano o a un ser angelical; aquí el contexto favorece «ángel».
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea רֹתֶם designa la retama del desierto; «retama» conserva el referente vegetal del texto.
    reason: source_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: Then he lay down
  chosen_spanish: Entonces él se acostó
  alternatives_spanish:
  - Y él se acostó
  - Así que él se acostó
  lexicon: HALOT
  rationale: El wayyiqtol narra secuencia; «entonces» transmite bien el avance narrativo en español sin forzar un calco.
- source_word: וַיִּישַׁן
  english_pob_choice: and slept
  chosen_spanish: y durmió
  alternatives_spanish:
  - y se quedó dormido
  - y se durmió
  lexicon: HALOT
  rationale: El verbo simple expresa el hecho de dormir; «durmió» conserva la sobriedad del hebreo.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  - bajo de
  lexicon: HALOT
  rationale: «Bajo» es natural y fiel al valor espacial de la preposición en este contexto.
- source_word: רֹתֶם אֶחָד
  english_pob_choice: a broom tree
  chosen_spanish: un retama solitaria
  alternatives_spanish:
  - un arbusto de retama
  - una retama
  lexicon: HALOT
  rationale: רֹתֶם designa la retama del desierto; en español, «retama» comunica mejor la planta que «broom tree». El hebreo אֶחָד funciona aquí de modo idiomático como indefinido y, en este contexto narrativo, puede reflejarse con «solitaria» para conservar la idea de uno/a solo en el desierto sin introducir un artículo meramente numérico.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí[a]
  alternatives_spanish:
  - Y he aquí
  - Y mira
  lexicon: HALOT
  rationale: Esta fórmula de irrupción narrativa tiene equivalente tradicional en español; se conserva para reflejar el tono súbito y vívido del hebreo.
- source_word: מַלְאָךְ
  english_pob_choice: angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: HALOT
  rationale: En este contexto, la intervención sobrenatural y la provisión en el desierto favorecen «ángel». Se mantiene la alternativa léxica por auditabilidad.
- source_word: נֹגֵעַ בּוֹ
  english_pob_choice: touched him
  chosen_spanish: lo tocó
  alternatives_spanish:
  - estaba tocándolo
  - le estaba tocando
  lexicon: HALOT
  rationale: El participio en narrativa se vierte naturalmente con pretérito simple en español; «lo tocó» reproduce el contacto de manera directa.
- source_word: וַיֹּאמֶר לוֹ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y dijo a él
  - y le habló
  lexicon: HALOT
  rationale: La construcción verbal con pronombre dativo se expresa de forma idiomática en español con «le dijo».
- source_word: קוּם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Arriba
  lexicon: HALOT
  rationale: El imperativo de קום pide un mandato directo; «levántate» es claro y natural en español bíblico contemporáneo.
- source_word: אֱכֽוֹל
  english_pob_choice: eat
  chosen_spanish: come
  alternatives_spanish:
  - come algo
  - alimenta tu cuerpo
  lexicon: HALOT
  rationale: 'El imperativo breve se mantiene breve en español: «come».'
theological_decisions:
- issue: מַלְאָךְ como ser celestial o mensajero humano
  english_pob_reading: angel
  chosen_spanish_reading: ángel
  alternative_spanish_readings:
  - mensajero
  rationale: La escena presenta una visita y provisión extraordinarias en el desierto; por eso «ángel» es la lectura contextual más fuerte. Se conserva la alternativa para no ocultar la amplitud léxica del hebreo.
  doctrine_reference: 1 Reyes 19:5; decisión léxico-contextual, no doctrinal
- issue: Rótulo narrativo וְהִנֵּה en español
  english_pob_reading: And behold
  chosen_spanish_reading: Y he aquí
  alternative_spanish_readings:
  - Y he aquí,
  - Y de pronto
  rationale: Se mantiene la fuerza de presentación súbita del hebreo y su tono reverencial/narrativo, sin reducirlo a una simple coordinación temporal.
  doctrine_reference: 1 Reyes 19:5; estilo narrativo bíblico
- issue: אֶחָד en רֹתֶם אֶחָד como numeral o indefinido
  english_pob_reading: a broom tree
  chosen_spanish_reading: retama solitaria
  alternative_spanish_readings:
  - una retama
  - un solo retamo
  rationale: El inglés POB trató אֶחָד como indefinido ('a'). En español, además de la indefinición, la imagen de soledad encaja con el contexto del desierto y ayuda a reproducir el matiz sin convertirlo en un conteo enfático.
  doctrine_reference: 1 Reyes 19:5; nota semántica contextual
- issue: Imperativos קוּם / אֱכֹל en forma breve
  english_pob_reading: Get up, eat
  chosen_spanish_reading: Levántate, come
  alternative_spanish_readings:
  - Ponte de pie, come
  - Alzate y come
  rationale: La concisión imperativa del hebreo se conserva en español con dos mandatos breves y directos, evitando explicitar más de lo que el texto dice.
  doctrine_reference: 1 Reyes 19:5; fidelidad sintáctica
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail inglés. No hubo revisiones posteriores en el inglés POB; el consenso de revisión fue de alta concordancia y la versión quedó sin cambios.
  spanish_consistency_notes:
  - Se emplea «ángel» en coherencia con la decisión léxica documentada para מַלְאָךְ.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una sustitución por κύριος.
  - Se conserva un tono narrativo bíblico claro y moderno, con puntuación española estándar.
  - La nota sobre «retama» mantiene auditabilidad botánica sin desviar el sentido del versículo.
