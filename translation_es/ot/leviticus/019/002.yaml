translation:
  language: es
  text: 'Habla a toda la congregación de los hijos de Israel[a], y diles: “Serán santos[b], porque yo, Yahvé, su Dios, soy santo.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “toda la asamblea de los israelitas”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “Sean santos” o “Deben ser santos”.'
    reason: alternative_reading
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige la palabra
  lexicon: HALOT
  rationale: El imperativo de דבר en este contexto legal es una orden directa a Moisés. En español, “Habla” comunica con naturalidad la instrucción solemne sin perder la fuerza directa del mandato.
- source_word: כָּל עֲדַת
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: עֵדָה designa la comunidad reunida del pacto. “Congregación” conserva el registro formal y corporativo del pasaje, y “toda” expresa היטב el alcance de כָּל.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo es literalmente masculino y filial. En español, “hijos de Israel” mantiene esa forma sin sonar tan forzado como “hijos varones”, y preserva el vínculo de pacto del original.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y diles a ellos
  - y habla con ellos
  lexicon: HALOT
  rationale: La secuencia imperativa hebrea pide una continuación directa. “Y diles” reproduce la concisión del mandato y funciona mejor en español que una formulación más larga.
- source_word: קְדֹשִׁים תִּהְי֑וּ
  english_pob_choice: You shall be holy
  chosen_spanish: Sean santos
  alternatives_spanish:
  - Sean ustedes santos
  - Ustedes serán santos
  - Deben ser santos
  lexicon: HALOT
  rationale: La construcción hebrea expresa una obligación o resultado en lenguaje de pacto. En español, el subjuntivo exhortativo “Sean santos” refleja mejor la fuerza normativa que un futuro simple, sin reducir el sentido a una mera instrucción moral.
- source_word: קָד֔וֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - apartado
  lexicon: HALOT
  rationale: קדוש se vierte mejor aquí como “santo”, la forma más natural y teológicamente estable en español bíblico para la cualidad divina de separación y pureza. “Sagrado” o “apartado” no captan tan bien el valor relacional y covenantal del término.
- source_word: יְהוָ֥ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración según la política del proyecto. “Yahvé” es la forma editorial estable en español para el Tetragrámaton y evita la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - el Dios de ustedes
  lexicon: HALOT
  rationale: La forma pronominal es de segunda persona plural. En español de amplio uso eclesial, “su Dios” mantiene el referente plural sin regionalismos marcados; el posesivo refleja correctamente la relación de pacto.
theological_decisions:
- issue: Alcance comunitario de “los hijos de Israel”
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: El original conserva una formulación filial masculina. El español “los hijos de Israel” mantiene esa huella formal y su valor comunitario, evitando neutralizar el texto base sin necesidad contextual.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate rendering
- issue: Fuerza modal de “Sean santos”
  english_pob_reading: You shall be holy
  chosen_spanish_reading: Sean santos
  alternative_spanish_readings:
  - Ustedes serán santos
  - Deben ser santos
  - Sean ustedes santos
  rationale: El hebreo comunica una exigencia del pacto con matiz exhortativo. El subjuntivo exhortativo en español preserva esa fuerza normativa de manera más natural que una simple construcción futura.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
- issue: Nombre divino en el mandato de santidad
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El uso de “Yahvé” preserva el nombre propio divino conforme a la política del proyecto y evita ocultar el Tetragrámaton tras una sustitución titular.
  doctrine_reference: DOCTRINE.md §The divine name
translation_notes:
  revision_awareness: El pasaje y la solución inglesa presentan acuerdo alto y no muestran revisiones aplicadas; el español sigue esa lectura estable, conservando las tensiones documentadas entre formulación literal y equivalencia óptima.
  spanish_consistency_notes:
  - Se usa “Yahvé” de forma consistente para יְהוָה.
  - Se mantiene “santo” en lugar de “sagrado” o “apartado” por coherencia con el uso bíblico-teológico del término.
  - El posesivo plural “su Dios” refleja el hebreo plural sin imponer regionalismo.
  - La construcción exhortativa “Sean santos” conserva el valor normativo del hebreo dentro de un español natural.
