translation:
  language: es
  text: Y no teman la palabra de un hombre pecador[a], porque su gloria va al estiércol y a los gusanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que dice un hombre pecador». El griego dice literalmente «de la palabra de un hombre pecador».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγου
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - lo que dice
  - su decir
  - su amenaza
  lexicon: LSJ
  rationale: λόγος con ἀπό y en este contexto se refiere a lo que procede del hombre pecador. «La palabra» conserva el sustantivo singular concreto del griego y suena natural en español; «lo que dice» es posible, pero se vuelve más explicativo.
- source_word: ἀνδρὸς ἁμαρτωλοῦ
  english_pob_choice: of a sinful man
  chosen_spanish: de un hombre pecador
  alternatives_spanish:
  - de un pecador
  - de una persona pecadora
  lexicon: LSJ
  rationale: ἀνήρ es masculino singular, así que «hombre» preserva el valor de género del original. «Pecador» como adjetivo mantiene mejor la estructura griega que convertirlo en un sustantivo independiente.
- source_word: μὴ φοβηθῆτε
  english_pob_choice: do not fear
  chosen_spanish: no teman
  alternatives_spanish:
  - no tengan miedo de
  - no se dejen intimidar por
  lexicon: LSJ
  rationale: El imperativo negativo se expresa de manera directa con «no teman». Es fiel y natural en español, sin añadir matices como intimidación que no están explícitos en el griego.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - renombre
  - esplendor
  lexicon: LSJ
  rationale: «Gloria» conserva el peso retórico e irónico del original. Otras opciones, como «honor» o «renombre», suavizan demasiado la imagen.
- source_word: εἰς κόπρια
  english_pob_choice: is for dung
  chosen_spanish: es para estiércol
  alternatives_spanish:
  - es para excremento
  - queda en estiércol
  - viene a estiércol
  lexicon: LSJ
  rationale: El griego con εἰς expresa destino o resultado. «Es para estiércol» refleja esa dirección sin introducir un verbo interpretativo como «termina en». «Estiércol» comunica el desprecio y la descomposición de modo claro en español.
- source_word: καὶ εἰς σκώληκας
  english_pob_choice: and worms
  chosen_spanish: y gusanos
  alternatives_spanish:
  - y lombrices
  - y larvas
  lexicon: LSJ
  rationale: «Gusanos» reproduce el campo semántico general de σκώληξ en un contexto de corrupción y muerte. «Larvas» sería demasiado técnico y «lombrices» demasiado específico para el efecto imagístico del texto.
theological_decisions:
- issue: Conservar la fuerza de la imagen de corrupción final
  english_pob_reading: 'retain the concrete imagery: ''his glory is for dung and worms'''
  chosen_spanish_reading: 'conservar la imagen concreta: «su gloria es para estiércol y gusanos»'
  alternative_spanish_readings:
  - su gloria acaba en inmundicia y corrupción
  - su honor queda en desecho y gusanos
  rationale: La advertencia depende del contraste entre la aparente gloria del pecador y su final degradante. Mantener la imagen concreta evita diluir la fuerza moral y escatológica del texto.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
- issue: Tratamiento de ἀνήρ como masculino específico
  english_pob_reading: 'specific masculine: ''man'''
  chosen_spanish_reading: 'masculino específico: «hombre»'
  alternative_spanish_readings:
  - persona
  - alguien
  rationale: El griego usa ἀνδρός y no un término genérico como ἄνθρωπος. En coherencia con la política de precisión de género del proyecto, se conserva el masculino singular.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que ajustó la cláusula final desde una formulación de resultado más interpretativa a una más cercana a εἰς... καὶ εἰς..., manteniendo «palabra», «hombre pecador», «gloria», «estiércol» y «gusanos» como equivalentes formales y auditablemente cercanos al griego.
  spanish_consistency_notes:
  - Se mantiene «hombre» para ἀνδρός por precisión de género y consistencia con el criterio POB auditado.
  - «Gloria» conserva la ironía del original; no se sustituye por «honor» para no atenuar el contraste.
  - «Estiércol» y «gusanos» preservan la imaginería de corrupción corporal sin eufemismo excesivo.
  - La nota al pie marca una alternativa válida de sentido para λόγου sin perder la forma griega subyacente.
