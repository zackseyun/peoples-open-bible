translation:
  language: es
  text: 'Entonces Moisés respondió y dijo: «Pero he aquí, no me creerán, ni escucharán mi voz[a], porque dirán: “Yahvé no se te ha aparecido[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «escucharán mi voz», un giro que también puede entenderse como «me escucharán» o «me harán caso».'
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé no se te apareció».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: ענה en esta secuencia narrativa introduce una réplica. «Respondió» conserva el valor dialogal sin forzar un registro arcaico; se complementa naturalmente con «y dijo» como en el hebreo y en la tradición narrativa bíblica.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - contestó
  lexicon: HALOT
  rationale: אמר es el verbo estándar de habla. «Dijo» es la equivalencia directa y natural en español para esta fórmula narrativa.
- source_word: וְהֵן
  english_pob_choice: Behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - pero mira
  - mira
  - he aquí
  lexicon: HALOT
  rationale: הן introduce la objeción de Moisés con fuerza deíctica y contraste. «He aquí» preserva ese impulso de atención en un registro bíblico digno; el contexto ya aporta el matiz adversativo de «pero».
- source_word: לֹא יַאֲמִינוּ לִי
  english_pob_choice: they will not believe me
  chosen_spanish: no me creerán
  alternatives_spanish:
  - no confiarán en mí
  - no creerán en mí
  lexicon: HALOT
  rationale: אמן en hiphil aquí expresa creer/aceptar el dicho de Moisés. «No me creerán» es la forma más natural y fiel en español para el rechazo de su testimonio.
- source_word: וְלֹא יִשְׁמְעוּ בְּקֹלִי
  english_pob_choice: and they will not listen to my voice
  chosen_spanish: ni escucharán mi voz
  alternatives_spanish:
  - ni me escucharán
  - ni obedecerán mi voz
  lexicon: HALOT
  rationale: שׁמע con בְּקול puede significar escuchar, atender u obedecer. Aquí la carga inmediata es la negativa a atender el mensaje de Moisés, por lo que «escucharán mi voz» mantiene la expresión hebrea sin sobredeterminarla como obediencia.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כּי introduce la razón de la objeción de Moisés. «Porque» expresa con claridad la subordinación causal en español actual.
- source_word: לֹא נִרְאָה אֵלֶיךָ
  english_pob_choice: has not appeared to you
  chosen_spanish: no se te ha aparecido
  alternatives_spanish:
  - no te ha aparecido
  - no fue visto por ti
  lexicon: HALOT
  rationale: El nifal de ראה suele significar «aparecer». «No se te ha aparecido» conserva ese valor y reproduce bien la forma personal del original en el habla reportada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El nombre divino se rinde como «Yahvé» según el criterio del proyecto. En español, esta forma es ampliamente reconocible, mantiene el nombre propio y evita la sustitución por un título.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se preserva como nombre propio en español con «Yahvé», de acuerdo con la política del proyecto de no enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de יִשְׁמְעוּ בְּקֹלִי
  english_pob_reading: they will not listen to my voice
  chosen_spanish_reading: ni escucharán mi voz
  alternative_spanish_readings:
  - ni me escucharán
  - ni obedecerán mi voz
  rationale: El hebreo permite un rango entre escuchar, atender y obedecer. En este versículo todavía domina el rechazo a prestar oído al mensaje de Moisés; por eso se evita «obedecer» como traducción principal, para no adelantar una implicación más fuerte de la que el contexto inmediato exige.
  doctrine_reference: HALOT, שׁמע + בְּקוֹל
- issue: Implicación de la voz de Moisés
  english_pob_reading: listen to my voice
  chosen_spanish_reading: escucharán mi voz
  alternative_spanish_readings:
  - me escucharán
  - obedecerán mi voz
  rationale: Se conserva la imagen semítica de «mi voz» en vez de simplificarla por completo a «me». Esto mantiene la textura del original y deja abierta la gama semántica reconocida por el POB inglés.
  doctrine_reference: HALOT, idiom of שׁמע בְּקוֹל
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que elevó וְהֵן a «behold» por su tono más formal. En español, «he aquí» reproduce ese registro elevado sin perder naturalidad, y se mantuvo la estructura narrativa completa «respondió y dijo» para reflejar la secuencia hebrea y la decisión auditada.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantuvo «mi voz» para preservar el idiomático hebreo בְּקוֹלִי y su posible extensión semántica.
  - El tono es bíblico y formal, pero con sintaxis española natural y legible para publicación.
