translation:
  language: es
  text: Porque, ¿quién ha permanecido en el consejo de Yahvé[a], para que vea y oiga su palabra? ¿Quién ha prestado atención a mi palabra y la oyó?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el consejo secreto de Yahvé» o «en la íntima deliberación de Yahvé». El hebreo סוֹד puede referirse tanto a un consejo deliberativo como a un ámbito confidencial e íntimo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la conexión argumentativa con la denuncia previa; «Porque» conserva la fuerza explicativa y suena natural en español.
- source_word: עָמַד
  english_pob_choice: has stood
  chosen_spanish: ha estado
  alternatives_spanish:
  - se ha puesto de pie
  - ha permanecido
  - ha tomado su lugar
  lexicon: HALOT
  rationale: En este contexto idiomático, «estar en» expresa mejor la idea de presencia y participación en el ámbito del consejo que un calco más físico.
- source_word: בְּסוֹד
  english_pob_choice: in the council
  chosen_spanish: en el consejo
  alternatives_spanish:
  - en el consejo secreto
  - en la intimidad del consejo
  - en la asamblea
  lexicon: HALOT
  rationale: Se mantiene «consejo» para reflejar la imagen del consejo deliberativo divino. El matiz de confidencialidad queda sugerido por el contexto y por la nota alternativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio editorial del proyecto para el nombre divino, con «Yahvé» en lugar de una sustitución reverencial por «SEÑOR».
- source_word: וְיֵרֶא
  english_pob_choice: that he should see
  chosen_spanish: para que vea
  alternatives_spanish:
  - y vea
  - de modo que vea
  lexicon: HALOT
  rationale: El hebreo expresa una consecuencia o finalidad ligada a haber estado en el consejo; «para que vea» lo reproduce con naturalidad en español.
- source_word: וְיִשְׁמַע
  english_pob_choice: and hear
  chosen_spanish: y oiga
  alternatives_spanish:
  - y escuche
  - y entienda al oír
  lexicon: HALOT
  rationale: Se conserva el paralelismo sensorial con «vea»; «oiga» es el correlato más directo y sobrio en español.
- source_word: דְּבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mensaje
  - su palabra dicha
  lexicon: HALOT
  rationale: «Palabra» conserva la carga revelatoria y profética del sustantivo hebreo sin perder claridad en español.
- source_word: הִקְשִׁיב
  english_pob_choice: has paid attention to
  chosen_spanish: ha prestado atención a
  alternatives_spanish:
  - ha escuchado con atención
  - ha dado oído a
  lexicon: HALOT
  rationale: El verbo intensivo pide algo más que «oír»; «prestar atención» expresa bien la escucha atenta que distingue al verdadero receptor del mensaje.
- source_word: דְבָרִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi mensaje
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con «su palabra» anterior y con el cambio de hablante a primera persona.
- source_word: וַיִּשְׁמָע
  english_pob_choice: and heard it
  chosen_spanish: y la ha oído
  alternatives_spanish:
  - y la oyó
  - y la escuchó
  lexicon: HALOT
  rationale: Se completa el paralelismo con «mi palabra» mediante un pronombre átono; el perfecto compuesto mantiene una lectura de relevancia presente, como en la traducción inglesa auditada.
theological_decisions:
- issue: Sentido de סוֹד יְהוָה
  english_pob_reading: the council of Yahweh
  chosen_spanish_reading: el consejo de Yahvé
  alternative_spanish_readings:
  - el secreto de Yahvé
  - la íntima deliberación de Yahvé
  rationale: En Jeremías 23 el contraste es entre profetas verdaderos y falsos; la imagen es de acceso a la deliberación celestial de Yahvé. «Consejo» preserva ese marco teológico mejor que «secreto», sin negar el matiz de confidencialidad que la nota recoge.
  doctrine_reference: Jeremiah 23:16-22; cf. 1 Kings 22:19-23
- issue: Valor de שׁמע en el segundo hemistiquio
  english_pob_reading: heard it
  chosen_spanish_reading: la ha oído
  alternative_spanish_readings:
  - la ha escuchado
  - la ha obedecido
  rationale: Aquí el verbo continúa el motivo de la recepción auditiva del mensaje. «Oír» evita imponer la idea de obediencia donde el texto no la exige directamente, aunque esa posibilidad existe en otros contextos.
  doctrine_reference: HALOT on שמע; Jeremiah 23:18
translation_notes:
  revision_awareness: 'Se revisó el equivalente español a la luz del hebreo directo y del audit trail en inglés. No se siguió mecánicamente la traducción inglesa: se mantuvo la imagen del consejo divino, pero se ajustó la sintaxis al español natural («para que vea y oiga»). También se evitó «escuchó» en el cierre para no sobrecargar שמע con una noción de obediencia no explícita en este versículo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar editorial del proyecto.
  - Se preservó «palabra» para דָּבָר en ambos casos por consistencia léxica y porque encaja con el uso profético.
  - Se usó «consejo» de manera consistente para סוֹד, con nota para su posible matiz de secreto/confidencia.
  - Se prefirió un registro bíblico contemporáneo pero claro, evitando arcaísmos innecesarios.
