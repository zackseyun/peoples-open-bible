translation:
  language: es
  text: Y todas las naciones bendecirán al Señor[a]. Y su pueblo dará gracias a Dios, y el Señor exaltará a su pueblo; y todos los que aman al Señor Dios en verdad y rectitud[b] se alegrarán, mostrando misericordia a nuestros hermanos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confesarán a Dios» o «alabarán a Dios»; el verbo griego puede expresar confesión o acción de gracias/alabanza según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Rectitud» también podría traducirse «justicia»; aquí probablemente se refiere a una conducta íntegra y fiel en la devoción.
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «nuestros hermanos»; el término puede funcionar de manera representativa para parientes o miembros de la comunidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογήσουσιν
  english_pob_choice: will bless
  chosen_spanish: bendecirán
  alternatives_spanish:
  - alabarán
  - dirán bien de
  lexicon: BDAG
  rationale: El futuro de εὐλογέω conserva aquí el sentido directo de hablar bien de o bendecir. En español, «bendecirán» mantiene la fuerza verbal y el registro bíblico sin convertirlo en una paráfrasis interpretativa.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - los gentiles
  lexicon: BDAG
  rationale: ἔθνη se traduce de manera más directa como «naciones», preservando el alcance universal del texto sin añadir de forma prematura la lectura étnico-religiosa de «gentiles».
- source_word: ἐξομολογήσεται
  english_pob_choice: will give thanks
  chosen_spanish: dará gracias
  alternatives_spanish:
  - confesará
  - alabará
  lexicon: BDAG
  rationale: En este contexto doxológico, el verbo puede expresar confesión, acción de gracias o alabanza. «Dará gracias» reproduce bien el matiz de respuesta cultual que destacó la POB inglesa.
- source_word: ὑψώσει
  english_pob_choice: will exalt
  chosen_spanish: exaltará
  alternatives_spanish:
  - levantará en alto
  - elevará
  lexicon: BDAG
  rationale: «Exaltará» conserva la imagen de elevación y el sentido honorífico del verbo, con una formulación natural en español.
- source_word: ἐν ἀληθείᾳ καὶ δικαιοσύνῃ
  english_pob_choice: in truth and righteousness
  chosen_spanish: en verdad y justicia
  alternatives_spanish:
  - en verdad y rectitud
  - con verdad y justicia
  lexicon: BDAG
  rationale: La frase puede describir la esfera o el modo del amor a Dios. Se eligió «justicia» porque el español la recibe naturalmente aquí y mantiene abierta la gama semántica de δικαιοσύνη, que la POB inglesa consignó como posible alternativa.
- source_word: ποιοῦντες ἔλεος
  english_pob_choice: showing mercy
  chosen_spanish: mostrando misericordia
  alternatives_spanish:
  - haciendo misericordia
  - practicando misericordia
  lexicon: BDAG
  rationale: La expresión semítica significa actuar con misericordia. «Mostrando misericordia» es natural en español y conserva el valor verbal sin diluirlo en una abstracción.
- source_word: τοῖς ἀδελφοῖς ἡμῶν
  english_pob_choice: to our brothers
  chosen_spanish: a nuestros hermanos
  alternatives_spanish:
  - a nuestros hermanos y hermanas
  - a nuestros parientes
  lexicon: BDAG
  rationale: El griego usa el plural masculino ἀδελφοῖς; por fidelidad al texto y a la política de precisión de género, se mantiene «hermanos». En español, la construcción con «a» expresa correctamente el complemento del participio.
theological_decisions:
- issue: Rendering of Κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - el Señor
  - Maestro
  rationale: La equivalencia establecida en la POB inglesa para κύριος es «Lord», y en español el correlato natural y reverente es «Señor». No hay razón textual para desviarse hacia otra forma.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia / rectitud
  rationale: La POB inglesa dejó abierta la alternativa «justice», y en español «justicia» preserva esa amplitud semántica sin perder la resonancia moral del pasaje. Aquí funciona bien como modo de vida fiel delante de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
- issue: Gendered familial term ἀδελφοῖς
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - miembros de la familia
  rationale: El griego es masculino plural y la POB mantiene ese rasgo. En español, «hermanos» reproduce fielmente el término, dejando abierta la posible referencia representativa a la comunidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
