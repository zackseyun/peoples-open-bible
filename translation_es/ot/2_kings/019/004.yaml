translation:
  language: es
  text: Quizá Yahvé tu Dios oirá todas las palabras del Rabsaqué[a], cuyas palabras su señor, el rey de Asiria, ha enviado para insultar al Dios vivo, y lo reprenderá por las palabras que Yahvé tu Dios ha oído[b]. Por tanto, eleva una oración[c] por el remanente que queda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabsaqué probablemente es un título asirio; también se ha propuesto 'jefe de los coperos'.
    reason: cultural_note
  - marker: b
    text: O 'reprenderá acerca de las palabras que Yahvé tu Dios ha oído'. El hebreo puede expresar que la reprensión divina viene en respuesta a esas palabras.
    reason: lexical_alternative
  - marker: c
    text: O 'ofrece una oración' o simplemente 'ora'. La expresión hebrea es literalmente 'eleva una oración'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Quizás
  lexicon: HALOT
  rationale: Expresa la posibilidad tentativa del hebreo sin afirmar certeza. 'Quizá' es natural, sobrio y mantiene el tono de ruego esperanzado.
- source_word: יִשְׁמַע
  english_pob_choice: will hear
  chosen_spanish: oirá
  alternatives_spanish:
  - escuchará
  - pueda oír
  lexicon: HALOT
  rationale: Con la partícula de posibilidad previa, el imperfecto puede sonar en español como expectativa futura. 'Oirá' conserva la idea de atención auditiva sin sobrecargar el subjuntivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el término aprobado en español del proyecto para el Tetragrámaton, preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Dios tuyo
  lexicon: HALOT
  rationale: Mantiene el sentido relacional del sufijo de segunda persona singular sin añadir énfasis ajeno al hebreo.
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: Rabsaqué
  alternatives_spanish:
  - el Rabsaqué
  - el jefe de los coperos
  lexicon: HALOT
  rationale: Se translitera el título/nombre tradicionalmente en forma hispana para evitar una explicación interpretativa en el texto principal, conservando la designación oficial del enviado asirio.
- source_word: לְחָרֵף
  english_pob_choice: to mock
  chosen_spanish: insultar
  alternatives_spanish:
  - escarnecer
  - burlarse de
  lexicon: HALOT
  rationale: El verbo expresa desprecio verbal contra Dios. 'Insultar' comunica bien el ataque verbal en español moderno, aunque 'escarnecer' o 'burlarse de' son alternativas posibles.
- source_word: אֱלֹהִים חַי
  english_pob_choice: the living God
  chosen_spanish: el Dios vivo
  alternatives_spanish:
  - el Dios que vive
  lexicon: HALOT
  rationale: Conserva la fórmula bíblica establecida en español y la contraposición implícita con ídolos inertes.
- source_word: וְהוֹכִיחַ
  english_pob_choice: and will rebuke the words
  chosen_spanish: y reprenderá las palabras
  alternatives_spanish:
  - y reprobará las palabras
  - y hará ver la gravedad de las palabras
  lexicon: HALOT
  rationale: En este contexto, el complemento directo es 'las palabras'; 'reprenderá' recoge la idea de respuesta correctiva/judicial sin introducir un objeto personal que el hebreo no explicita en la revisión final.
- source_word: בַּדְּבָרִים אֲשֶׁר שָׁמַע
  english_pob_choice: the words that ... has heard
  chosen_spanish: las palabras que Yahvé tu Dios ha oído
  alternatives_spanish:
  - las palabras que ha oído Yahvé tu Dios
  - por las palabras que Yahvé tu Dios ha oído
  lexicon: HALOT
  rationale: Se mantiene el foco en las palabras oídas por Yahvé. En español, 'ha oído' reproduce bien el perfecto y el enlace causal del hebreo sin oscurecer la relación.
- source_word: וְנָשָׂאתָ תְפִלָּה
  english_pob_choice: Therefore lift up a prayer
  chosen_spanish: Por tanto, eleva una oración
  alternatives_spanish:
  - Por tanto, alza una oración
  - Por tanto, presenta una oración
  - Por tanto, ora
  lexicon: HALOT
  rationale: '''Eleva una oración'' conserva la imagen idiomática de ''levantar'' la oración, pero en un español más fluido que una versión literal calcada.'
- source_word: בְּעַד
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a favor de
  - en favor de
  lexicon: HALOT
  rationale: Marca intercesión en español de forma natural y breve.
- source_word: הַשְּׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el resto
  - los sobrevivientes
  lexicon: HALOT
  rationale: '''Remanente'' preserva el valor bíblico-teológico del término, aunque ''resto'' sería más neutro. Se evita ''sobrevivientes'' por desplazar el matiz literario.'
- source_word: הַנִּמְצָאָה
  english_pob_choice: that remains
  chosen_spanish: que queda
  alternatives_spanish:
  - que permanece
  - que ha quedado
  lexicon: HALOT
  rationale: '''Que queda'' expresa con naturalidad el participio en este contexto de lo que aún subsiste, sin sobreinterpretar el matiz existencial.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la política del proyecto para el Tetragrámaton y la forma ya establecida en español para lectores de iglesia, sin sustituir el nombre por un título encubridor.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de la reprensión divina
  english_pob_reading: and will rebuke the words that Yahweh your God has heard
  chosen_spanish_reading: y reprenderá las palabras que Yahvé tu Dios ha oído
  alternative_spanish_readings:
  - y reprenderá al mensajero por las palabras que Yahvé tu Dios ha oído
  - y reprenderá de las palabras que Yahvé tu Dios ha oído
  rationale: Se sigue la revisión auditada que eliminó un objeto personal explícito y se conserva el complemento verbal centrado en 'las palabras'.
  doctrine_reference: Revisión auditada 2026-04-23T10:18:50Z
- issue: Terminología para הַשְּׁאֵרִית
  english_pob_reading: the remnant
  chosen_spanish_reading: el remanente
  alternative_spanish_readings:
  - el resto
  - los sobrevivientes
  rationale: Se conserva la carga bíblico-canónica de 'remanente', importante para la lectura profética e histórica, evitando reducirlo a un mero resto cuantitativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final auditada del texto inglés, que ajustó 'rebuke him for the words' a 'rebuke the words' para ajustarse mejor al hebreo. La versión española sigue esa corrección y evita introducir un objeto personal no explícito.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene 'remanente'/'remanente que queda' para preservar la terminología bíblica del grupo preservado.
  - '''Rabsaqué'' se trata como transliteración funcional del título/nombre, no como traducción interpretativa en el texto principal.'
  - '''Eleva una oración'' conserva el hebraísmo idiomático sin sonar forzado en español.'
