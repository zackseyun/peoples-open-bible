base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/001/016.yaml
  text: And at that time I commanded your judges[a], saying, ‘Hear the cases between your brothers[c][b], and judge righteously between a man and his brother or the resident foreigner with him.’
  footnotes:
  - marker: a
    text: Or 'Hear disputes among your brothers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'judge justly.' The Hebrew uses the noun צֶדֶק (tsedeq), which can carry the sense of both righteousness and justice in judicial contexts.
    reason: lexical_alternative
  - marker: c
    text: Or 'the resident alien with him' or 'the foreigner residing with him.' The Hebrew גֵּר (ger) refers to a non-native resident living among Israel.
    reason: lexical_alternative
