translation:
  language: es
  text: Pues incluso las abejas[a], cuando hacen panal, se defienden de los que se acercan; y, como con hierro, hieren con su aguijón[b] a los que se acercan a su cría[c], y la defienden hasta la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la época de la producción de cera» o «al tiempo de hacer panal»; el griego apunta de manera específica a la fabricación de cera/panal, no simplemente a la miel en general.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con el κέντρον»; en este contexto, «aguijón» es el sentido natural.
    reason: lexical_alternative
  - marker: c
    text: El griego dice «su cría», imagen de proteger a la descendencia; la comparación es retórica más que técnicamente zoológica.
    reason: cultural_note
lexical_decisions:
- source_word: ὅπου γε καὶ
  english_pob_choice: For even
  chosen_spanish: Porque incluso
  alternatives_spanish:
  - Pues incluso
  - Y aun
  lexicon: LSJ
  rationale: La partícula introduce un ejemplo enfático dentro del argumento; «Porque incluso» mantiene el enlace discursivo y la fuerza de énfasis sin sonar arcaico.
- source_word: μέλισσαι
  english_pob_choice: bees
  chosen_spanish: las abejas
  alternatives_spanish:
  - abejas
  lexicon: LSJ
  rationale: Término zoológico directo y transparente en español.
- source_word: περὶ τὸν τῆς κηρογονίας καιρὸν
  english_pob_choice: around the time of making honeycomb
  chosen_spanish: alrededor del tiempo de hacer cera y panal
  alternatives_spanish:
  - en la época de hacer cera
  - al tiempo de hacer panal
  lexicon: LSJ
  rationale: κηρογονία alude específicamente a la producción de cera/panal, no solo a la miel. «Hacer cera y panal» conserva la referencia concreta y evita una generalización indebida.
- source_word: ἐπαμύνονται
  english_pob_choice: defend themselves
  chosen_spanish: se defienden
  alternatives_spanish:
  - se protegen
  - rechazan
  lexicon: LSJ
  rationale: Verbo de resistencia defensiva; en español el reflexivo expresa naturalmente la acción intransitiva del primer miembro de la comparación.
- source_word: τοὺς προσιόντας
  english_pob_choice: those who approach
  chosen_spanish: los que se acercan
  alternatives_spanish:
  - los que vienen cerca
  - los que se aproximan
  lexicon: LSJ
  rationale: Participio presente con sentido neutral de aproximación; «los que se acercan» evita cargar el texto con hostilidad no explícita.
- source_word: καθάπερ σιδήρῳ
  english_pob_choice: as with iron
  chosen_spanish: como con hierro
  alternatives_spanish:
  - como si fuera hierro
  - cual hierro
  lexicon: LSJ
  rationale: Mantiene la comparación de dureza o violencia sin sobreexplicarla.
- source_word: τῷ κέντρῳ
  english_pob_choice: their stinger
  chosen_spanish: su aguijón
  alternatives_spanish:
  - su picadura
  - su espolón
  lexicon: LSJ
  rationale: En contexto de abejas, κέντρον designa concretamente el órgano punzante; «aguijón» es el equivalente natural y preciso en español.
- source_word: πλήσσουσι
  english_pob_choice: strike
  chosen_spanish: hieren
  alternatives_spanish:
  - golpean
  - pican
  lexicon: LSJ
  rationale: Aunque el verbo literalmente es «golpear», con abeja y aguijón el efecto resultante se expresa mejor como «hieren» en español, preservando la violencia del golpe sin sonar extraño.
- source_word: τῇ νοσσίᾳ αὐτῶν
  english_pob_choice: their brood
  chosen_spanish: a su cría
  alternatives_spanish:
  - a su prole
  - a sus pequeños
  lexicon: LSJ
  rationale: La imagen es protectora y reproductiva; «cría» comunica en español la idea de descendencia cuidada por los adultos, de modo más natural que una glosa zoológica literal.
- source_word: ἐπαμύνονται ἕως θανάτου
  english_pob_choice: defend them to the death
  chosen_spanish: la defienden hasta la muerte
  alternatives_spanish:
  - las defienden hasta morir
  - defienden a la cría hasta la muerte
  lexicon: LSJ
  rationale: El cierre intensifica la defensa perseverante hasta el extremo; «hasta la muerte» conserva la fuerza idiomática del griego y del inglés POB.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no requieren revisión sustantiva; se han conservado las tres decisiones léxicas señaladas por la POB inglesa (κίνητρο/aguijón, κηρογονία/cera-panal, νοσσία/cría) en español con equivalentes naturales y auditablemente cercanos.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» cuando haya referencia al nombre divino en el corpus, pero este versículo no contiene teología explícita ni nombre divino.
  - Se mantuvo un registro sobrio y literal-idiomático, evitando términos eclesiásticos ajenos al zoológico retórico del pasaje.
  - Se preservó la repetición de la defensa al inicio y al final para reflejar la estructura enfática del griego.
