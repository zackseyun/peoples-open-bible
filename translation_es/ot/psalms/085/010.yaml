translation:
  language: es
  text: Ciertamente su salvación[a] está cerca de los que le temen, para que la gloria[b] habite en nuestra tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciertamente, su liberación está cerca de los que le temen»'
    reason: lexical_alternative
  - marker: b
    text: «Gloria» puede referirse a la presencia manifiesta de Dios o al honor restaurado a la tierra.
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - Ciertamente
  - De veras
  lexicon: HALOT
  rationale: אַךְ aquí introduce una afirmación enfática. «Ciertamente» reproduce bien el valor asseverativo en un español natural y digno, sin convertirlo en una restricción exclusiva.
- source_word: קָרוֹב
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - está cerca
  - está próximo
  - está al alcance
  lexicon: HALOT
  rationale: El adjetivo expresa proximidad. «Está cerca» es la opción más transparente y idiomática en español para mantener la sencillez poética del hebreo.
- source_word: לִירֵאָיו
  english_pob_choice: those who fear him
  chosen_spanish: de los que le temen
  alternatives_spanish:
  - de los que le temen
  - de quienes le reverencian
  - de los que lo respetan
  lexicon: HALOT
  rationale: Se conserva el campo semántico reverencial y pactual de ירא. «Le temen» evita suavizar la expresión hacia un mero respeto, como exige el texto y la tradición exegética del POB.
- source_word: יִשְׁעוֹ
  english_pob_choice: his salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su salvación
  - su liberación
  - su rescate
  lexicon: HALOT
  rationale: ישׁע apunta a salvación/liberación. Se mantiene «su salvación» para conservar el peso teológico general y la relación posesiva del hebreo.
- source_word: לִשְׁכֹּן
  english_pob_choice: so that ... may dwell
  chosen_spanish: para que ... habite
  alternatives_spanish:
  - para que habite
  - para morar
  - a fin de que habite
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad o resultado. «Para que ... habite» comunica la relación de propósito de forma clara en español, sin forzar una lectura explicativa adicional.
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - la gloria
  - el honor
  - el esplendor
  lexicon: HALOT
  rationale: 'כָּבוֹד conserva su amplitud semántica: gloria, presencia manifiesta, honor o esplendor. Se elige «gloria» por su fuerza bíblica y por preservar la tensión teológica sin precisarla de más.'
- source_word: בְּאַרְצֵנוּ
  english_pob_choice: in our land
  chosen_spanish: en nuestra tierra
  alternatives_spanish:
  - en nuestra tierra
  - en nuestra tierra/país
  - en nuestro país
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa la tierra propia del pueblo. «Nuestra tierra» refleja mejor el alcance bíblico y poético que «país», que sería más moderno y menos evocador.
theological_decisions:
- issue: Alcance de «gloria» (כָּבוֹד)
  english_pob_reading: '''Glory'' may refer to God''s manifest presence or to honor restored to the land.'
  chosen_spanish_reading: «Gloria» se mantiene abierto a la presencia manifiesta de Dios o al honor/restauración que se asienta en la tierra.
  alternative_spanish_readings:
  - La gloria de Dios habite en nuestra tierra
  - El honor vuelva a nuestra tierra
  rationale: El hebreo conserva ambigüedad evocadora. La traducción principal no la resuelve para no cerrar indebidamente el sentido; la nota permite explicitar alternativas legítimas sin imponer una sola interpretación.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla prematuramente.'
- issue: Fuerza de ירא aplicado a la relación con Dios
  english_pob_reading: those who fear him
  chosen_spanish_reading: los que le temen
  alternative_spanish_readings:
  - los que lo reverencian
  - los que le muestran reverencia
  rationale: «Temer» mantiene la carga reverencial y pactal del hebreo. «Reverenciar» sería posible, pero puede suavizar el filo relacional y sacramental del término bíblico.
  doctrine_reference: Lexical theology of ירא in covenantal contexts
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión menor que añadió «to» después de «near» por naturalidad gramatical; la propuesta española ya expresa esa relación con «está cerca de». Se preserva la equivalencia óptima del draft final y su ambigüedad teológica sobre כָּבוֹד.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma proyectual cuando corresponda, pero este versículo no lo contiene explícitamente.
  - Se evitó «Señor» como sustituto de un nombre divino inexistente en este versículo.
  - «Gloria» se conservó como término técnico-poético estable, sin reemplazarlo por «honor» en el texto principal.
  - Se usó «tierra» en lugar de «país» para reflejar mejor אֶרֶץ en un contexto poético-covenantal.
