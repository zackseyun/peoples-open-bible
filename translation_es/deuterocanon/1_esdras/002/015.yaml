revisions:
- from: Ahora, en los tiempos de Artajerjes, rey de los persas, Belemus y Mithradates y Tabelio y Rátimo y Beeltetmos y Samelio, el escriba, y los demás que estaban asociados con ellos, habitando en Samaria y en los demás lugares, escribieron la carta que sigue[a] contra los habitantes de Judea y Jerusalén[b].
  to: En el tiempo de Artajerjes, rey de los persas, Belemus y Mithradates y Tabelio y Rátimo y Beeltetmos y Samelio, el escriba, y los demás que estaban asociados con ellos, que vivían en Samaria y en los demás lugares, escribieron contra los habitantes de Judea y Jerusalén la carta que sigue[a].[b]
  rationale: Se corrige la nota léxica para reflejar fielmente ὑπογεγραμμένην y se reordena ligeramente la oración para que 'contra los habitantes de Judea y Jerusalén' modifique con claridad la acción de escribir. También se suaviza el inicio a un español más natural.
