base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/004/040.yaml
  text: But when the crowds were rising up and being filled with anger[a], Lysimachus armed about three thousand men and began unjust violence, with a certain Auranus taking the lead[c][b], a man advanced in age and no less in ignorance.
  footnotes:
  - marker: a
    text: Or, 'began unjust violence.' The Greek literally says 'began unjust hands,' an idiom for initiating wrongful violent action.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek wording about Auranus is ironic: he was ''advanced in age'' and yet ''no less in ignorance.'''
    reason: lexical_alternative
  - marker: c
    text: 'The numeral may be approximate: ''about three thousand'' could also be rendered ''some three thousand.'''
    reason: lexical_alternative
