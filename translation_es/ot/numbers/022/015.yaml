translation:
  language: es
  text: Entonces Balac envió otra vez funcionarios[a], más numerosos y más distinguidos que estos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más honorables». El hebreo enfatiza un rango superior o mayor prestigio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף עוֹד
  english_pob_choice: Then ... again sent
  chosen_spanish: Entonces ... envió otra vez
  alternatives_spanish:
  - volvió a enviar
  - envió de nuevo
  - envió otra vez más
  lexicon: HALOT
  rationale: El hebreo usa יָסַף + infinitivo para expresar repetición; en español, «envió otra vez» comunica naturalmente la acción reiterada sin perder el valor adverbial de עוֹד. «Entonces» refleja la secuencia narrativa del waw consecutivo.
- source_word: בָּלָק
  english_pob_choice: Balak
  chosen_spanish: Balac
  alternatives_spanish:
  - Balak
  lexicon: Transliteración estándar en español bíblico
  rationale: Se adapta el nombre propio a la ortografía española habitual con c final suave, sin alterar la referencia.
- source_word: שְׁלֹחַ
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - enviaba
  lexicon: HALOT
  rationale: Aunque el hebreo está en infinitivo constructo, la función idiomática del conjunto exige un verbo finito en español. «Envió» conserva el sentido de despacho diplomático mejor que una paráfrasis más libre.
- source_word: שָׂרִים
  english_pob_choice: officials
  chosen_spanish: oficiales
  alternatives_spanish:
  - principales
  - jefes
  - líderes
  lexicon: HALOT
  rationale: El término designa representantes de alto rango en un contexto diplomático. «Oficiales» mantiene claridad moderna y evita «príncipes», que en español puede sonar monárquico y descontextualizado.
- source_word: רַבִּים
  english_pob_choice: more numerous
  chosen_spanish: más numerosos
  alternatives_spanish:
  - más
  - muchos
  - de mayor número
  lexicon: HALOT
  rationale: La comparación explícita con מֵאֵלֶּה pide una forma comparativa en español. «Más numerosos» reproduce con precisión la relación de cantidad.
- source_word: וְנִכְבָּדִים
  english_pob_choice: more honored
  chosen_spanish: más honrados
  alternatives_spanish:
  - más distinguidos
  - más honorables
  - más importantes
  lexicon: HALOT
  rationale: El adjetivo deriva de la idea de peso, honor y prestigio. «Más honrados» conserva la dignidad y el rango social sin volverlo excesivamente formal.
- source_word: מֵאֵלֶּה
  english_pob_choice: than these
  chosen_spanish: que estos
  alternatives_spanish:
  - que aquellos
  - que los anteriores
  - que los de antes
  lexicon: HALOT
  rationale: En español, la comparación idiomática se expresa mejor con «que estos». El referente vuelve sobre la delegación anterior ya mencionada, por lo que no hace falta explicitarlo.
translation_notes:
  revision_awareness: El texto inglés y el aparato de revisión muestran acuerdo alto y sin cambios aplicados; por eso se mantiene el sentido directo de la delegación reforzada, con la única adaptación necesaria para el español idiomático en la construcción comparativa y en la repetición verbal.
  spanish_consistency_notes:
  - Se mantiene «Balac» como forma española del nombre propio, coherente con el uso bíblico en español.
  - Se evita «SEÑOR» u այլ sustituciones teológicas porque el versículo no contiene el tetragrámaton ni un término divino relevante.
  - «Oficiales» preserva el matiz administrativo/diplomático de שָׂרִים sin cargar el texto con un arcaísmo innecesario.
