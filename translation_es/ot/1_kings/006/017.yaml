translation:
  language: es
  text: Y la casa[a], es decir, la nave delante del santuario interior, medía cuarenta codos de largo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la sala principal delante del santuario interior». El hebreo identifica «la casa» con más precisión como el הֵיכָל, la habitación principal situada antes del santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְבָּעִ֥ים
  english_pob_choice: And ... forty
  chosen_spanish: Y ... cuarenta
  alternatives_spanish:
  - Ahora ... cuarenta
  - y cuarenta
  lexicon: HALOT
  rationale: La conjunción enlaza este versículo con la descripción arquitectónica anterior. «Cuarenta» reproduce de forma directa el cardinal hebreo sin añadir matices.
- source_word: בָּ/אַמָּ֖ה
  english_pob_choice: cubits long
  chosen_spanish: codos de largo
  alternatives_spanish:
  - en codos
  - codos
  lexicon: HALOT
  rationale: אַמָּה es la medida lineal estándar «codo». En español, para expresar la dimensión con naturalidad en este contexto, se explicita «de largo».
- source_word: הָיָ֣ה
  english_pob_choice: was
  chosen_spanish: tenía
  alternatives_spanish:
  - era
  - medía
  lexicon: HALOT
  rationale: En una descripción de medidas, «tenía» comunica de modo natural la extensión indicada por el hebreo copulativo, sin cambiar el sentido descriptivo.
- source_word: הַ/בָּ֑יִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el edificio
  lexicon: HALOT
  rationale: בַּיִת significa literalmente «casa», y el hebreo mantiene ese término para el edificio sagrado. Conservar «casa» preserva la forma léxica, mientras la apposición aclara a qué parte se refiere.
- source_word: ה֖וּא
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - a saber
  - esto es
  lexicon: HALOT
  rationale: 'El pronombre tiene fuerza explicativa/appositiva: identifica «la casa» con precisión adicional. «Es decir» expresa esa aclaración de manera idiomática en español.'
- source_word: הַ/הֵיכָ֥ל
  english_pob_choice: the nave
  chosen_spanish: la nave
  alternatives_spanish:
  - el salón principal
  - el templo
  - el lugar santo
  lexicon: HALOT
  rationale: הֵיכָל aquí designa la sala principal del edificio del templo, distinta del santuario interior. «Nave» es un equivalente arquitectónico preciso y mantiene la distinción técnica sin recurrir a una traducción interpretativa más amplia.
- source_word: לִ/פְנָֽ/י
  english_pob_choice: in front of the inner sanctuary
  chosen_spanish: delante del santuario interior
  alternatives_spanish:
  - antes del santuario interior
  - frente al santuario interior
  lexicon: HALOT
  rationale: La forma apunta espacialmente a la parte situada delante del recinto interior. «Santuario interior» conserva la referencia del contexto inmediato y permite entender la relación espacial sin imponer terminología posterior.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la auditoría inglesa, conservando la estructura explicativa de «la casa / es decir / la nave» y la relación espacial con el santuario interior. Se adopta «codos de largo» para una medida natural en español y «delante del santuario interior» para reflejar el valor locativo de לִפְנָי.
  spanish_consistency_notes:
  - Se mantiene «casa» para בַּיִת, como término literal y transparente, en vez de sustituirlo por «templo» sin necesidad.
  - Se usa «nave» para הֵיכָל por la distinción arquitectónica documentada en la auditoría inglesa.
  - Se prefiere «santuario interior» para evitar importar un tecnicismo no explicitado en el hebreo de este versículo.
  - La medida se expresa como «codos de largo» para sonar natural en español y conservar el contenido dimensional del hebreo.
