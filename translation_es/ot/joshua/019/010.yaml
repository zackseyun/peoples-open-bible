translation:
  language: es
  text: La tercera suerte[a] salió para los hijos de Zabulón, según sus clanes, y el límite de su heredad fue hasta Sarid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue echada» para «salió»; el hebreo dice literalmente que la suerte 'subió/salió'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל / הַגּוֹרָל
  english_pob_choice: came up / lot
  chosen_spanish: salió / suerte
  alternatives_spanish:
  - fue echada / suerte
  - ascendió / suerte
  lexicon: HALOT
  rationale: En este contexto de reparto por sorteo, el hebreo usa literalmente una expresión de movimiento ('subió/came up') para el resultado del sorteo. En español, 'salió' comunica de forma natural que la suerte fue la que resultó, conservando la imagen idiomática sin forzar un calco. 'Suerte' es el equivalente bíblico habitual para גּוֹרָל en contextos de distribución.
- source_word: הַשְּׁלִישִׁי
  english_pob_choice: third
  chosen_spanish: la tercera
  alternatives_spanish:
  - el tercer
  - la tercera suerte
  lexicon: HALOT
  rationale: El ordinal concuerda con 'suerte' en género femenino. Mantiene el sentido directo del hebreo sin añadir contenido.
- source_word: לִבְנֵי זְבוּלֻן
  english_pob_choice: for the sons of Zebulun
  chosen_spanish: para los hijos de Zabulón
  alternatives_spanish:
  - para los descendientes de Zabulón
  - para la tribu de Zabulón
  lexicon: HALOT
  rationale: '''Hijos de'' reproduce de manera cercana בני y conserva el lenguaje tribal del pasaje. ''Zabulón'' sigue la forma española tradicional y reconocible del nombre propio.'
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: '''Clanes'' expresa bien el nivel subtribal de משפחות en repartos de territorio. ''Según'' refleja el valor distributivo de ל sin sobreinterpretar el pasaje.'
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: En descripciones geográficas de territorio, 'límite' suena natural en español y conserva la idea de demarcación. 'Frontera' puede sonar demasiado moderno o político; 'límite' mantiene la neutralidad del hebreo.
- source_word: נַחֲלָתָם
  english_pob_choice: their inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su posesión heredada
  lexicon: HALOT
  rationale: '''Heredad'' es un término bíblico español adecuado para la tierra asignada por herencia. Conserva la dimensión de posesión recibida por asignación, sin perder la resonancia del hebreo נַחֲלָה. Se usa ''su'' en singular colectivo por la referencia al territorio tribal.'
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta llegar a
  - así como hasta
  lexicon: HALOT
  rationale: En fórmulas de frontera, 'hasta' expresa de forma clara el alcance del límite en español. Aunque el inglés POB usa 'as far as', la preposición española más natural aquí es 'hasta'.
- source_word: שָׂרִיד
  english_pob_choice: Sarid
  chosen_spanish: Sarid
  lexicon: HALOT
  rationale: Nombre propio transliterado, sin traducción.
theological_decisions:
- issue: Terminología de la distribución territorial por suerte
  english_pob_reading: The third lot came up ... and the border of their inheritance was as far as Sarid.
  chosen_spanish_reading: La tercera suerte salió ... y el límite de su heredad fue hasta Sarid.
  alternative_spanish_readings:
  - La tercera suerte fue echada ...
  - La tercera porción tocó ...
  rationale: 'No hay una afirmación doctrinal disputada, pero sí una tensión lexical: el hebreo usa el lenguaje de la suerte/cast, no simplemente de una porción abstracta. ''Suerte'' preserva el mecanismo narrativo del reparto bajo providencia divina sin introducir una interpretación adicional.'
  doctrine_reference: Josué 14–19; reparto de la tierra por suerte bajo la guía de Yahvé
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado del texto fuente y el audit trail inglés, sin cambios de revisión aplicados; mantiene la equivalencia óptima para una fórmula breve de reparto territorial.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme a la norma del proyecto; aquí no aparece el tetragrámaton explícito.
  - '''Hijos de Zabulón'' conserva el registro tribal del hebreo y armoniza con la terminología POB.'
  - '''Heredad'' se prefirió sobre ''herencia'' para reflejar mejor el contexto de reparto de tierra.'
  - No se añadieron elementos interpretativos ajenos al versículo.
