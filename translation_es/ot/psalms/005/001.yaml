translation:
  language: es
  text: 'Al maestro del coro: según las flautas[a]. Salmo de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «los instrumentos de viento»; el término hebreo puede ser una indicación musical técnica. Tradicionalmente, algunos lo dejan sin traducir como «Nehilot».'
    reason: lexical_alternative
  - marker: b
    text: El encabezado «de David» puede indicar autoría, dedicación o asociación con la colección davídica.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director musical
  alternatives_spanish:
  - Al maestro de coro
  - Para el director
  - Al choirmaster
  lexicon: HALOT
  rationale: En los encabezados de los salmos, este participio señala al responsable de la ejecución musical. En español, "director musical" comunica de forma natural la función sin forzar un término eclesiástico más antiguo que pueda sonar menos claro.
- source_word: אֶל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - conforme a
  - al ritmo de
  - para
  lexicon: HALOT
  rationale: En esta superscripción, la preposición introduce una indicación técnica de ejecución, estilo o acompañamiento. "Según" mantiene esa relación de referencia sin precisar indebidamente si se trata de melodía, modo o instrumento.
- source_word: הַנְּחִילוֹת
  english_pob_choice: the flutes
  chosen_spanish: las flautas
  alternatives_spanish:
  - los instrumentos de viento
  - Nehilot
  lexicon: HALOT
  rationale: El término parece designar un instrumento o conjunto instrumental. "Las flautas" da en español el sentido probable y legible; se conserva la incertidumbre técnica mediante nota, porque el hebreo podría referirse más ampliamente a instrumentos de viento.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Poema
  - Salmo musical
  lexicon: HALOT
  rationale: '"Mizmor" es el encabezado canónico habitual para un salmo. En español, "Salmo" es el equivalente estable y más fiel para este género literario-litúrgico.'
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - de la colección davídica
  lexicon: HALOT
  rationale: La lamed del encabezado puede indicar autoría, dedicación o pertenencia al conjunto davídico. "De David" preserva esa ambigüedad sin afirmar más de lo que el hebreo exige.
theological_decisions:
- issue: Alcance del encabezado "de David"
  english_pob_reading: The heading 'of David' may indicate authorship, dedication, or association with the Davidic collection.
  chosen_spanish_reading: El encabezado "de David" puede indicar autoría, dedicación o asociación con la colección davídica.
  alternative_spanish_readings:
  - Es un salmo escrito por David.
  - Es un salmo dedicado a David.
  - Es un salmo del conjunto davídico.
  rationale: El hebreo permite varias relaciones del lamed en los títulos de salmos. Conviene preservar esa tensión interpretativa en vez de cerrar el sentido con una afirmación de autoría exclusiva.
  doctrine_reference: Interpretación de encabezados salmódicos; no doctrinal
- issue: Término musical técnico en la superscripción
  english_pob_reading: The Hebrew term may be a technical musical notation, traditionally left untranslated as 'Nehiloth.'
  chosen_spanish_reading: El término parece ser una indicación musical técnica, aunque su referencia exacta no es segura.
  alternative_spanish_readings:
  - Podría referirse a flautas.
  - Podría referirse a instrumentos de viento.
  - Podría dejarse sin traducir como 'Nehilot'.
  rationale: La evidencia sugiere una indicación de ejecución musical, pero no permite fijar con certeza el instrumento exacto. La nota española debe reflejar esa incertidumbre sin ocultarla.
  doctrine_reference: Crítica textual y exégesis de encabezados; no doctrinal
translation_notes:
  revision_awareness: El pasaje fue revisado previamente y quedó sin cambios sustanciales; la presente redacción conserva ese nivel de alta concordancia con el texto fuente y el auditorio de revisión.
  spanish_consistency_notes:
  - Se mantuvo «David» en lugar de «Davidico» en el texto principal por naturalidad y fidelidad al encabezado.
  - Se prefirió «Salmo» como término canónico establecido.
  - Se evitó traducir de forma demasiado específica la nota musical para no cerrar indebidamente una incertidumbre léxica del hebreo.
