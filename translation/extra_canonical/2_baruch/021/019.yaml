  tier: 1
  from: The one who lives while his life endures is not gladdened.
  to: Therefore, the one who lives is not gladdened with his life.
  rationale: The Syriac phrase 'b-ḥywhy' is more naturally rendered 'with his life'
    or 'in his life' rather than the slightly paraphrastic and clunky 'while his life
    endures'. Additionally, the introductory conjunction 'mṭl hnwy' (Therefore) appears
    to be missing from the draft.
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/021/019.job-77192.json
  category: mistranslation
  from: and others were the vanity of Adam
  to: and they are nothing but the vanity of Adam
  rationale: The phrase 'and others were' is a mistranslation of the Syriac idiom
    "l' 'ḥrn 'l'" (literally 'not another except'), which means 'nothing but' or 'nothing
    other than'. The text means that the sons of men are nothing but the vanity of
    Adam, not that 'others' were his vanity.
- timestamp: '2026-05-03T05:09:31Z'
  adjudicator: azure-gpt-5-revision-pass
