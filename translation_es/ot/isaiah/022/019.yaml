translation:
  language: es
  text: Y yo te echaré de tu cargo[a], y él te derribará de tu puesto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo cambia de «yo te echaré» a «él te derribará». Algunas versiones suavizan la segunda mitad como «yo te derribaré».
    reason: alternative_reading
lexical_decisions:
- source_word: וַהֲדַפְתִּיךָ
  english_pob_choice: I will thrust you
  chosen_spanish: yo te echaré
  alternatives_spanish:
  - te arrojaré
  - te empujaré fuera
  lexicon: HALOT
  rationale: El hebreo expresa una expulsión enérgica. En español, «echar» comunica bien la acción de sacar a alguien de una función o lugar con fuerza, sin sonar forzado. «Arrojar» y «empujar fuera» conservan más el gesto físico, pero resultan menos naturales en este contexto administrativo.
- source_word: מִמַּצָּבֶךָ
  english_pob_choice: from your office
  chosen_spanish: de tu cargo
  alternatives_spanish:
  - de tu puesto
  - de tu posición
  lexicon: HALOT
  rationale: מַצָּב se refiere aquí a una posición oficial, no solo a un lugar físico. «Cargo» transmite mejor el sentido de oficio o función de autoridad. «Puesto» y «posición» son posibles, pero «cargo» es más preciso para el contexto.
- source_word: וּמִמַּעֲמָדְךָ
  english_pob_choice: from your station
  chosen_spanish: de tu puesto
  alternatives_spanish:
  - de tu estación
  - de tu posición
  lexicon: HALOT
  rationale: מַעֲמָד conserva la idea de estar de pie en una función o situación establecida. «Puesto» permite mantener el paralelismo sin repetir exactamente «cargo», y sigue siendo natural en español. «Estación» podría sonar más arcaica o ambigua.
- source_word: יֶהֶרְסֶךָ
  english_pob_choice: he will pull you down
  chosen_spanish: él te derribará
  alternatives_spanish:
  - te derribará
  - te abatirá
  lexicon: HALOT
  rationale: הרס suele significar derribar o demoler. «Derribará» conserva la imagen de caída y destrucción, y suena más cercano al hebreo que «abatirá». Se mantiene el sujeto explícito «él», como en el texto hebreo y en la auditoría inglesa.
theological_decisions:
- issue: Cambio de persona en la segunda cláusula
  english_pob_reading: Retain the Hebrew shift from first person to third masculine singular.
  chosen_spanish_reading: Mantener el salto de «yo» a «él» en la segunda mitad del verso.
  alternative_spanish_readings:
  - «... y yo te derribaré de tu puesto»
  - «... y serás derribado de tu puesto»
  rationale: El hebreo pasa de primera persona singular a tercera persona masculina singular. La traducción conserva esa tensión en vez de armonizarla, para no ocultar la forma del texto fuente ni decidir prematuramente quién es el agente implícito.
  doctrine_reference: Preservar la tensión textual y gramatical del original.
translation_notes:
  revision_awareness: El borrador sigue la lectura más reciente del texto hebreo y conserva la anomalía de persona señalada en el aparato inglés, sin intentos de armonización.
  spanish_consistency_notes:
  - «Yahvé» no aparece explícitamente en este verso, por lo que no se introduce un nombre divino añadido.
  - Se mantiene un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - «Cargo» y «puesto» se diferencian para reflejar el paralelismo de los dos sustantivos hebreos sin borrar su cercanía semántica.
