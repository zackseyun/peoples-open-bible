translation:
  language: es
  text: Te producirá espinos y cardos[a], y comerás las plantas del campo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te hará brotar espinos y cardos»; el verbo hebreo es causativo y remite a la tierra del versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: O «la vegetación del campo» o, más tradicionalmente, «la hierba del campo»; el hebreo עֵשֶׂב es más amplio que «hierba» en sentido estricto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקֹוץ
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - cardos
  - zarzas
  lexicon: HALOT
  rationale: קוֹץ designa crecimiento espinoso; «espinos» conserva la imagen general y funciona de manera natural en español, manteniendo el paralelismo con el segundo término.
- source_word: וְדַרְדַּר
  english_pob_choice: thistles
  chosen_spanish: cardos
  alternatives_spanish:
  - abrojos
  - espinos
  - cardos espinosos
  lexicon: HALOT
  rationale: דַּרְדַּר apunta a una mala hierba espinosa distinta de קוֹץ; «cardos» preserva la distinción tradicional en español sin precisar una especie botánica.
- source_word: תַּצְמִיחַ לָךְ
  english_pob_choice: it will produce ... for you
  chosen_spanish: te hará brotar ... para ti
  alternatives_spanish:
  - te producirá ... para ti
  - te hará crecer ... para ti
  - te hará salir ... para ti
  lexicon: HALOT
  rationale: El hifil de צמח es causativo. «Hará brotar» conserva esa causalidad en español y sigue el antecedente implícito de la tierra/terreno del versículo anterior; «para ti» mantiene explícito לָךְ.
- source_word: וְאָכַלְתָּ
  english_pob_choice: and you will eat
  chosen_spanish: y comerás
  alternatives_spanish:
  - y tú comerás
  - y habrás de comer
  lexicon: HALOT
  rationale: El valor consecutivo del verbo se expresa de manera natural con futuro simple en español. «Comerás» es directo y fiel al flujo de la sentencia.
- source_word: עֵשֶׂב הַשָּׂדֶה
  english_pob_choice: the plants of the field
  chosen_spanish: la hierba del campo
  alternatives_spanish:
  - las plantas del campo
  - la vegetación del campo
  - la hierba del campo
  lexicon: HALOT
  rationale: עֵשֶׂב es un término amplio para vegetación comestible o herbácea; «hierba» es un término bíblicamente reconocible en español y suficiente aquí, aunque «plantas/vegetación» también serían posibles según el registro.
theological_decisions:
- issue: Sujeto implícito de תַּצְמִיחַ
  english_pob_reading: The implied subject is the ground/soil from the previous verse; English renders it smoothly with 'it'.
  chosen_spanish_reading: El sujeto implícito sigue siendo la tierra/suelo del versículo anterior, expresado en español con un sujeto tácito de tercera persona.
  alternative_spanish_readings:
  - La tierra te hará brotar espinos y cardos
  - Te brotarán espinos y cardos
  rationale: El hebreo usa un verbo femenino singular que remite naturalmente a הָאֲדָמָה de Gn 3:17. La redacción española evita añadir un sujeto explícito innecesario, pero conserva el sentido causativo y el vínculo con la tierra maldita.
  doctrine_reference: Génesis 3:17-19; relación entre la maldición de la tierra y el trabajo humano.
translation_notes:
  revision_awareness: 'El auditorio inglés pasó por una revisión menor: de ''cause thorns and thistles to grow'' a ''produce thorns and thistles'' por naturalidad, sin cambiar la lectura causativa. La versión española refleja esa misma tensión con «hará brotar», que conserva la causalidad y suena idiomática.'
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» según corresponda al marco del pasaje, aunque aquí no aparece el nombre divino.
  - Se conserva el tono sentencioso y la dicción bíblica sin recurrir a arcaísmos innecesarios.
  - Se preserva la distinción entre «espinos» y «cardos» para reflejar la pareja hebrea.
  - No se reemplazó עֵשֶׂב por un término exclusivamente vegetal o agrícola que estreche indebidamente el campo semántico.
