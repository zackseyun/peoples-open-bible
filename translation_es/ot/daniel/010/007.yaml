translation:
  language: es
  text: Yo, Daniel, fui el único que vi la visión, y los hombres que estaban conmigo no vieron la visión; pero un gran temblor[a] cayó sobre ellos, y huyeron para esconderse[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran terror cayó sobre ellos». El hebreo חֲרָדָה puede denotar temblor, pavor o terror.
    reason: lexical_alternative
  - marker: b
    text: O «huyeron y se escondieron» / «huyeron para ponerse a salvo en un escondite». El infinitivo hebreo בְּהֵחָבֵא expresa el propósito o la manera de su huida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  english_pob_choice: And ... saw
  chosen_spanish: vi
  alternatives_spanish:
  - y vi
  - y contemplé
  lexicon: HALOT
  rationale: El perfecto qal de ראה expresa percepción visual concluida. En español, «vi» reproduce de forma natural y fiel la acción principal sin añadir matices no presentes en el hebreo.
- source_word: אֲנִי דָנִיֵּאל
  english_pob_choice: I, Daniel,
  chosen_spanish: Yo, Daniel,
  alternatives_spanish:
  - Daniel, yo
  - Yo Daniel
  lexicon: HALOT
  rationale: El pronombre explícito junto con el nombre es enfático. «Yo, Daniel,» conserva esa autoidentificación enfática en un español claro y publicable.
- source_word: לְבַדִּי
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente yo
  - por mi cuenta
  lexicon: HALOT
  rationale: 'El término marca exclusividad: Daniel fue el único que vio la visión. «Solo» es la opción más natural en español y conserva el contraste con los demás hombres.'
- source_word: הַמַּרְאָה
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - la aparición
  - la vista
  lexicon: HALOT
  rationale: En el contexto apocalíptico de Daniel, מַרְאָה se refiere a una revelación visionaria, no meramente a una apariencia física. «Visión» es la equivalencia más precisa y estable en español bíblico contemporáneo.
- source_word: וְהָאֲנָשִׁים אֲשֶׁר הָיוּ עִמִּי
  english_pob_choice: and the men who were with me
  chosen_spanish: y los hombres que estaban conmigo
  alternatives_spanish:
  - y los varones que estaban conmigo
  - y las personas que estaban conmigo
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural y normalmente significa «hombres». Se mantiene ese valor léxico sin ampliar indebidamente a un término más genérico.
- source_word: לֹא רָאוּ אֶת הַמַּרְאָה
  english_pob_choice: did not see the vision
  chosen_spanish: no vieron la visión
  alternatives_spanish:
  - no vieron la aparición
  - no percibieron la visión
  lexicon: HALOT
  rationale: Se repite la misma palabra española para mantener la correspondencia y el contraste narrativo entre Daniel y sus acompañantes.
- source_word: אֲבָל
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: HALOT
  rationale: Conector adversativo simple y directo, equivalente al giro hebreo en este contexto narrativo.
- source_word: חֲרָדָה גְדֹלָה
  english_pob_choice: a great trembling
  chosen_spanish: un gran temblor
  alternatives_spanish:
  - un gran estremecimiento
  - un gran terror
  lexicon: HALOT
  rationale: חֲרָדָה puede denotar temblor, pavor o terror. Se elige «temblor» para preservar el componente físico y emocional; «gran» refleja גְדֹלָה y evita perder la intensidad del hebreo.
- source_word: נָפְלָה עֲלֵיהֶם
  english_pob_choice: fell upon them
  chosen_spanish: cayó sobre ellos
  alternatives_spanish:
  - se abatió sobre ellos
  - vino sobre ellos
  lexicon: HALOT
  rationale: El hebreo usa un modismo de experiencia abrumadora. «Cayó sobre ellos» conserva la imagen metafórica con un giro natural en español.
- source_word: וַיִּבְרְחוּ
  english_pob_choice: and they fled
  chosen_spanish: y huyeron
  alternatives_spanish:
  - y escaparon
  - y salieron corriendo
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración. «Huyeron» es más sobrio y literario que una expresión coloquial, y comunica adecuadamente la reacción de miedo.
- source_word: בְּהֵחָבֵא
  english_pob_choice: to hide themselves
  chosen_spanish: para esconderse
  alternatives_spanish:
  - para ocultarse
  - a esconderse
  lexicon: HALOT
  rationale: El infinitivo expresa propósito o manera de la huida. «Para esconderse» transmite bien el sentido reflexivo sin forzar una construcción demasiado literal.
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el texto hebreo y con el trazado auditado en inglés; no se registran revisiones aplicadas en el archivo base, y la versión española mantiene la misma estructura narrativa y las mismas ambigüedades léxicas principales.
  spanish_consistency_notes:
  - Se mantiene «visión» de manera consistente para הַמַּרְאָה en ambos miembros del versículo.
  - Se conserva la oposición narrativa entre Daniel, que sí vio, y los hombres que no vieron.
  - La imagen de reacción física/emocional se preserva con «gran temblor», sin reemplazarla por una interpretación más abstracta.
  - La construcción final «para esconderse» refleja el valor de propósito del infinitivo hebreo sin introducir información adicional.
