translation:
  language: es
  text: Y envió a los jóvenes y los cien talentos[a]; pero faltó a su palabra y no liberó a Jonatán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego διεψεύσατο puede significar «engañó», «obró falsamente» o «faltó a su palabra». Se eligió esta última para conservar el matiz contextual del incumplimiento después de recibir el pago y los rehenes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλε
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El aoristo narrativo de ἀποστέλλω se expresa naturalmente en español con «envió». Mantiene el flujo narrativo sin añadir matices ajenos al contexto.
- source_word: τὰ παιδάρια
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los muchachos jóvenes
  - los servidores jóvenes
  lexicon: LSJ
  rationale: Sigo la revisión inglesa que prefirió un registro más formal que «boys». En este contexto político-militar, παιδάρια apunta a jóvenes/acompañantes jóvenes; «los jóvenes» conserva la referencia de edad sin forzar «siervos».
- source_word: τὰ ἑκατὸν τάλαντα
  english_pob_choice: the hundred talents
  chosen_spanish: los cien talentos
  alternatives_spanish:
  - los ciento talentos
  - el centenar de talentos
  lexicon: LSJ
  rationale: Es una expresión monetaria directa; en español, «los cien talentos» resulta claro y fiel al griego con artículo y número definidos.
- source_word: διεψεύσατο
  english_pob_choice: broke his word
  chosen_spanish: faltó a su palabra
  alternatives_spanish:
  - engañó
  - mintió
  - obró falsamente
  lexicon: LSJ
  rationale: El griego puede implicar engaño o falsedad, pero aquí el contexto inmediato es el incumplimiento de una promesa tras recibir pago y rehenes. «Faltó a su palabra» preserva esa tensión entre incumplimiento y engaño sin reducirlo solo a «mentir».
- source_word: οὐκ ἀφῆκεν
  english_pob_choice: did not release
  chosen_spanish: no soltó
  alternatives_spanish:
  - no liberó
  - no dejó ir
  lexicon: BDAG
  rationale: Aunque «liberó» sería posible, el contexto de cautiverio hace natural «soltó». En español, aquí suena más inmediato y conserva la idea de retener a Jonatán.
- source_word: τὸν Ἰωναθάν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma española tradicional del nombre propio en contexto bíblico.
translation_notes:
  revision_awareness: La revisión inglesa cambió «boys» por «young men» para παιδάρια; la versión española sigue esa decisión con «los jóvenes», evitando un registro demasiado infantil y manteniendo el tono formal del pasaje. También se preserva el valor contextual de διεψεύσατο como incumplimiento engañoso, no solo mentira literal.
  spanish_consistency_notes:
  - Se mantiene «Jonatán» como forma española estándar del nombre.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; el verso no contiene referencias al nombre divino.
  - Se conserva una sintaxis coordinada y sobria, adecuada para un relato histórico breve.
  - La nota al pie marca la alternativa lexical más importante porque el griego admite más de una traducción válida en este contexto.
