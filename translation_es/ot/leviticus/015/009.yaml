translation:
  language: es
  text: Y toda montura sobre la cual monte el hombre con flujo será inmunda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "todo aquello sobre lo que se monta". El término hebreo puede referirse más ampliamente a lo que se usa para montar, no solo a una silla de montar en sentido estricto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And every
  chosen_spanish: Y todo lo
  alternatives_spanish:
  - Y cada
  - Y todo
  lexicon: HALOT
  rationale: כָּל tiene valor distributivo y la ו enlaza con la norma anterior. En español, ‘Y todo lo’ comunica bien la extensión universal sin sonar forzado.
- source_word: הַ/מֶּרְכָּב
  english_pob_choice: saddle
  chosen_spanish: lo que se monta
  alternatives_spanish:
  - silla de montar
  - montura
  - cualquier cosa montada
  lexicon: HALOT
  rationale: El término hebreo puede referirse de manera más amplia a aquello sobre lo que se monta, no solo a una ‘silla de montar’ en sentido estricto. ‘Lo que se monta’ preserva esa amplitud en español.
- source_word: אֲשֶׁר יִרְכַּב עָלָיו
  english_pob_choice: on which ... rides
  chosen_spanish: que se monta sobre él
  alternatives_spanish:
  - en que monta
  - sobre el cual monta
  - que él monta
  lexicon: HALOT
  rationale: La cláusula relativa expresa el objeto sobre el que se monta. ‘Se monta sobre él’ mantiene la relación espacial de עַל sin introducir elementos ajenos.
- source_word: הַ/זָּב
  english_pob_choice: the man with the discharge
  chosen_spanish: el manchado con flujo
  alternatives_spanish:
  - el hombre con flujo
  - el que tiene flujo
  - el hombre que padece flujo
  lexicon: HALOT
  rationale: זָב aquí es un participio sustantivado masculino que describe al varón con una secreción corporal que produce impureza ritual. ‘Manchado con flujo’ conserva la referencia al estado y evita una paráfrasis demasiado clínica o moralizada.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será inmundo
  alternatives_spanish:
  - quedará inmundo
  - será impuro
  - quedará impuro
  lexicon: HALOT
  rationale: טמא en este contexto legal designa impureza ritual. ‘Inmundo’ es una equivalencia tradicional y clara en español bíblico; se conserva sin cargarlo de culpa moral.
theological_decisions:
- issue: Impureza ritual vs. moralidad
  english_pob_reading: Render טמא as 'unclean' in ritual/legal sense without importing moral guilt.
  chosen_spanish_reading: Traducir טמא como ‘inmundo’ en sentido ritual, sin insinuar pecado moral.
  alternative_spanish_readings:
  - impuro
  - contaminado ritualmente
  rationale: El pasaje trata del estado ritual causado por flujo corporal. ‘Inmundo’ comunica la categoría legal sin añadir una valoración ética que el texto no exige.
  doctrine_reference: Levítico 15; distinción entre pureza ritual y culpa moral en la legislación levítica.
translation_notes:
  revision_awareness: El texto inglés publicado mantiene la opción amplia del hebreo en una nota (‘thing ridden on’) frente a ‘saddle’ como sentido principal. La versión española conserva esa amplitud con ‘lo que se monta’ y refleja la impureza ritual con ‘inmundo’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma proyectual general de POB, aunque este versículo no contiene el nombre divino.
  - Se evita ‘silla de montar’ en el cuerpo por el alcance semántico más amplio de מֶרְכָּב en este contexto.
  - ‘Inmundo’ se usa como término ritual tradicional y comprensible en español bíblico, paralelo al ‘unclean’ auditado en inglés.
