translation:
  text: 'And when I had said these things[a], I slept there, and I saw a vision by night. And behold, I saw from the great sea a cloud ascending, and it was full of white and black waters, and there were many colors in those waters, and on its head there appeared the likeness of a great lightning. And I looked, and that cloud passed swiftly in a violent course and covered the whole earth. And after these things, waters began to descend from it upon the earth, and I saw that those waters did not all have one appearance. And after these things again I saw black, and after these things again bright, and again black, and again bright. And this was until twelve times, but the black were more numerous than the bright in all of them.


    And it came to pass, at the end of the cloud, that black waters, darker than all the waters that had been before, descended; and wherever those waters descended, they produced ruin and destruction. And after these things I saw that lightning, which I had seen at the head of the cloud, and it seized it and flashed. And it became as a man, and in the days of tribulation men came to see how they might pass through. And after these things I saw twelve lights ascending from the sea, and they were joined to that flash and were praising it[b][c][d][e][f][g]. And I awoke from fear.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Many editions begin this chapter at “And when I had said these things, I sat there, and I saw a vision by night.” The preceding moral consolations are often assigned to the previous section.
    reason: alternative_reading
    anchor_ref: '53:1'
  - marker: g
    text: Some control witnesses read “and fire was mixed in them,” describing the final black waters.
    reason: textual_variant
    anchor_ref: '53:7'
  - marker: f
    text: Control witness (Kmosko) clarifies that the lightning “illumined the earth and healed the regions where the last waters descended” and then “occupied the whole earth and had dominion.” The primary Syriac lineation here is partially obscured.
    reason: textual_variant
    anchor_ref: 53:8-9
  - marker: e
    text: Syriac spelling here can be read as “rivers” (naharē) or “lights” (nūhrē). Context and the Latin control favor “rivers.”
    reason: textual_variant
    anchor_ref: '53:11'
  - marker: d
    text: Or 'I sat there'.
    reason: previous_rendering
  - marker: c
    text: Or 'a cloud ascending, white and black; and in that cloud there was much water'.
    reason: previous_rendering
  - marker: b
    text: Or 'On the earth I saw that people were dying, but they were not many.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܥܢܢܐ
  chosen: cloud
  alternatives:
  - storm-cloud
  lexicon: Payne Smith; Brockelmann
  rationale: Common Syriac term for cloud; context demands a large, moving cloud that rains.
- source_word: ܩ̈ܝܐ
  chosen: rains
  alternatives:
  - waters
  - showers
  lexicon: Payne Smith
  rationale: Plural form used in a raining context; rendering as “rains” preserves the action of descending from the cloud.
- source_word: ܐܘܟܡܐ
  chosen: black
  alternatives:
  - dark
  lexicon: Payne Smith
  rationale: Standard adjective for black/dark; kept as “black” to mirror contrast with “bright.”
- source_word: ܢܗܝܪܐ
  chosen: bright
  alternatives:
  - shining
  - luminous
  lexicon: Payne Smith
  rationale: Conventional Syriac for light/brightness; “bright” is concise and contrasts with “black.”
- source_word: ܒܪܩܐ
  chosen: lightning
  alternatives:
  - flash
  - bolt
  lexicon: Payne Smith
  rationale: Typical rendering of bārqā; the vision explicitly likens something at the cloud’s head to a great lightning.
- source_word: ܡܣܬܝܟܐ
  chosen: covered
  alternatives:
  - overspread
  - overshadowed
  lexicon: Payne Smith
  rationale: Verb indicates the cloud “spread over” the earth; “covered” fits idiomatically.
- source_word: ܒܪܗܛܐ ܩܫܝܐ
  chosen: with a violent course
  alternatives:
  - with a hard/rapid run
  - swiftly and forcefully
  lexicon: Payne Smith
  rationale: Rhetorical intensifier of the cloud’s speed and force; preserves the grim tone of the vision.
- source_word: ܚܫܘܟܝܢ
  chosen: dark
  alternatives:
  - tenebrous
  - gloomy
  lexicon: Payne Smith
  rationale: Adjective intensifies the final waters’ darkness; “dark” communicates the quality without over-interpretation.
- source_word: ܐܒܕܢܐ
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: Payne Smith
  rationale: The waters cause tangible devastation; “destruction” is the standard sense here.
- source_word: ܐܚܕ ... ܘܐܬܚܬ
  chosen: seized ... and dragged down
  alternatives:
  - grasped ... pulled down
  - took hold ... brought down
  lexicon: Payne Smith
  rationale: The lightning’s action on the cloud is forceful; paired verbs convey capture and downward motion.
- source_word: ܢܗ̈ܪܐ/ܢܘܗ̈ܪܐ
  chosen: rivers
  alternatives:
  - lights
  lexicon: Payne Smith; comparative with Kmosko Latin
  rationale: Context and control witness favor “rivers” (naharē) ascending from the sea; the graphemic similarity with “lights” (nūhrē) explains the variant.
- source_word: ܩܪܘܙܐ
  chosen: proclamation
  alternatives:
  - herald
  - announcement
  lexicon: Payne Smith
  rationale: The term likely refers to the lightning’s ‘announcement’; retained as “proclamation,” with the phrase kept close to Syriac despite ambiguity.
- source_word: ܐܫܬܠܛ
  chosen: exercised dominion
  alternatives:
  - ruled
  - prevailed
  lexicon: Payne Smith; control Latin “dominatum est”
  rationale: Captures the sense of taking control over the earth, matching the control witness.
