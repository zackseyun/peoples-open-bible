translation:
  language: es
  text: Cuando llegó hasta Lehi[a], los filisteos gritaron al encuentro de él. Entonces el Espíritu de Yahvé vino con poder sobre él, y las cuerdas que estaban sobre sus brazos llegaron a ser como fibra de lino que ha sido quemada en el fuego, y sus ataduras se derritieron de sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lehi es un nombre de lugar; el hebreo también se relaciona con ‘mandíbula’, un motivo importante en la narración circundante.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחִי
  english_pob_choice: Lehi
  chosen_spanish: Lehi
  alternatives_spanish:
  - Mandíbula
  lexicon: HALOT
  rationale: En el contexto narrativo funciona como nombre propio del lugar. Mantener ‘Lehi’ preserva la referencia geográfica ya establecida; ‘Mandíbula’ reflejaría el sentido etimológico, pero no la función principal aquí.
- source_word: הֵרִיעוּ לִקְרָאתוֹ
  english_pob_choice: shouted as they came to meet him
  chosen_spanish: gritaron al salir a su encuentro
  alternatives_spanish:
  - alzaron un grito al salir a su encuentro
  - dieron un grito de guerra al acercarse a él
  lexicon: HALOT
  rationale: הֵרִיעוּ expresa un grito fuerte; לִקְרָאתוֹ añade la idea de encuentro/asalto frontal. ‘Gritaron al salir a su encuentro’ conserva ambos elementos sin volver explícita una ‘guerra’ que el hebreo no nombra aquí.
- source_word: וַתִּצְלַח עָלָיו רוּחַ יְהוָה
  english_pob_choice: the Spirit of Yahweh rushed upon him
  chosen_spanish: el Espíritu de Yahvé se abalanzó sobre él
  alternatives_spanish:
  - el Espíritu de Yahvé cayó sobre él con poder
  - el Espíritu de Yahvé vino poderosamente sobre él
  lexicon: HALOT
  rationale: צָלַח con רוּחַ indica una irrupción vigorosa y súbita. ‘Se abalanzó sobre él’ comunica ese impulso dinámico mejor que una fórmula más general como ‘vino poderosamente’.
- source_word: הָעֲבֹתִים
  english_pob_choice: the ropes
  chosen_spanish: las cuerdas
  alternatives_spanish:
  - las sogas
  - los cordeles
  lexicon: HALOT
  rationale: El término se refiere a ataduras de cuerda. ‘Cuerdas’ es natural en español y suficientemente amplio; ‘sogas’ suena más rústico y ‘cordeles’ demasiado liviano para el contexto.
- source_word: זְרוֹעוֹתָיו
  english_pob_choice: his arms
  chosen_spanish: los brazos
  alternatives_spanish:
  - los antebrazos
  - sus brazos
  lexicon: HALOT
  rationale: זְרוֹעַ puede abarcar brazo en general. ‘Brazos’ conserva la imagen corporal sin especificar anatómicamente más de lo que el texto dice.
- source_word: כַּפִּשְׁתִּים
  english_pob_choice: like flax
  chosen_spanish: como lino
  alternatives_spanish:
  - como fibra de lino
  - como estopa de lino
  lexicon: HALOT
  rationale: Aunque el hebreo habla de ‘lino/flax’, en español ‘lino’ comunica bien la materia vegetal del símil. ‘Fibra de lino’ explica más, pero alarga innecesariamente la imagen.
- source_word: אֲשֶׁר בָּעֲרוּ בָאֵשׁ
  english_pob_choice: that has been burned in the fire
  chosen_spanish: que ha sido quemado en el fuego
  alternatives_spanish:
  - que ardió en el fuego
  - que se quemó en el fuego
  lexicon: HALOT
  rationale: La cláusula describe el estado del lino afectado por el fuego. La forma pasiva ‘ha sido quemado’ mantiene el resultado consumado y la fuerza comparativa del símil.
- source_word: וַיִּמַּסּוּ
  english_pob_choice: melted off
  chosen_spanish: se derritieron
  alternatives_spanish:
  - se deshicieron
  - se fundieron
  lexicon: HALOT
  rationale: מסס expresa derretirse/disolverse. ‘Se derritieron’ reproduce bien la imagen de pérdida de consistencia y caída de las ataduras.
- source_word: אֱסוּרָיו
  english_pob_choice: his bonds
  chosen_spanish: sus ataduras
  alternatives_spanish:
  - sus ligaduras
  - sus lazos
  lexicon: HALOT
  rationale: El sustantivo nombra aquello que lo tenía sujeto. ‘Ataduras’ es una opción amplia y transparente; ‘ligaduras’ suena más técnica y ‘lazos’ puede volverse ambiguo.
- source_word: מֵעַל יָדָיו
  english_pob_choice: off his hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - de encima de sus manos
  - de sus muñecas
  lexicon: HALOT
  rationale: En español, ‘de sus manos’ es la manera más natural de reproducir ‘desde encima de sus manos’. ‘Muñecas’ especifica más de lo que permite el hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo presenta el Tetragrama directamente. Siguiendo la norma del proyecto, se usa ‘Yahvé’ para evitar el ocultamiento del nombre y conservar el valor del pacto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Empoderamiento del Espíritu en la acción de Sansón
  english_pob_reading: the Spirit of Yahweh rushed upon him
  chosen_spanish_reading: el Espíritu de Yahvé se abalanzó sobre él
  alternative_spanish_readings:
  - el Espíritu de Yahvé vino poderosamente sobre él
  - el Espíritu de Yahvé cayó sobre él
  rationale: La formulación conserva la irrupción súbita y eficaz del Espíritu en la narración, sin suavizarla a una mera presencia general.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preservar el sentido llano del texto fuente'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el consenso alto del expediente inglés, sin cambios de sentido sustantivos. Se mantuvieron: Lehi como nombre propio con nota etimológica, el impulso súbito del Espíritu de Yahvé, el símil de lino quemado y la imagen de las ataduras derritiéndose y cayendo de las manos.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente para יְהוָה.
  - Se prefirió ‘Espíritu’ con mayúscula por tratarse del Espíritu divino.
  - Se eligieron términos de cuerda/atadura de registro claro y no arcaizante.
  - La imagen verbal ‘se abalanzó sobre él’ busca equivaler el dinamismo de צלח sin añadir contenido doctrinal.
  - ‘De sus manos’ conserva la naturalidad española del giro hebreo ‘de sobre sus manos’.
