translation:
  language: es
  text: Cuando hayas terminado de diezmar todo el diezmo de tu cosecha en el tercer año, el año del diezmo, se lo darás al levita, al forastero, al huérfano y a la viuda; y comerán dentro de tus puertas[a] y se saciarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en tus ciudades»; literalmente, «dentro de tus puertas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְכַלֶּה
  english_pob_choice: you have finished
  chosen_spanish: hayas terminado
  alternatives_spanish:
  - hayas acabado
  - hayas concluido
  lexicon: HALOT
  rationale: El hebreo expresa la acción llevada a su cumplimiento antes de lo que sigue. En español, el perfecto de subjuntivo 'hayas terminado' conserva bien la idea temporal y la secuencia instruccional.
- source_word: לַעְשֵׂר
  english_pob_choice: tithing
  chosen_spanish: diezmar
  alternatives_spanish:
  - dar el diezmo
  - hacer el diezmo
  lexicon: HALOT
  rationale: El verbo español 'diezmar' comunica directamente la acción de apartar el diezmo y mantiene la conexión verbal con 'diezmo' en la frase siguiente.
- source_word: מַעְשַׂר
  english_pob_choice: the tithe
  chosen_spanish: el diezmo
  alternatives_spanish:
  - la décima parte
  - el diezmo (en nota)
  lexicon: HALOT
  rationale: '''Diezmo'' es el equivalente natural y preciso en español para מַעְשַׂר, y preserva la terminología bíblica sin perder inteligibilidad.'
- source_word: תְּבוּאָתְךָ
  english_pob_choice: your produce
  chosen_spanish: tu cosecha
  alternatives_spanish:
  - tu produce
  - tu fruto
  lexicon: HALOT
  rationale: '''Produce'' suena forzado en español; ''cosecha'' comunica de forma clara el aumento agrícola de la tierra en este contexto legal. ''Fruto'' sería posible, pero menos general.'
- source_word: בַּשָּׁנָה הַשְּׁלִישִׁת
  english_pob_choice: in the third year
  chosen_spanish: en el tercer año
  alternatives_spanish:
  - durante el tercer año
  lexicon: HALOT
  rationale: Correspondencia temporal directa y natural en español.
- source_word: שְׁנַת הַמַּעֲשֵׂר
  english_pob_choice: the year of the tithe
  chosen_spanish: el año del diezmo
  alternatives_spanish:
  - el año del diezmo aparte
  - el año del diezmo
  lexicon: HALOT
  rationale: La frase identifica el ciclo especial del tercer año. 'Año del diezmo' reproduce la estructura nominal hebrea con claridad y sin sobreexplicar.
- source_word: לַלֵּוִי
  english_pob_choice: to the Levite
  chosen_spanish: al levita
  alternatives_spanish:
  - al Levita
  lexicon: HALOT
  rationale: '''Levita'' es la designación habitual y precisa en español para la membresía tribal/ministerial; se usa en minúscula por funcionar como nombre común de pertenencia.'
- source_word: לַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: al forastero
  alternatives_spanish:
  - al residente extranjero
  - al extranjero residente
  lexicon: HALOT
  rationale: '''Forastero'' comunica la alteridad social del גֵּר de forma más natural en español bíblico general. ''Residente extranjero'' sería más explicativo, pero menos conciso.'
- source_word: לַיָּתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: al huérfano
  alternatives_spanish:
  - al desamparado
  - al sin padre
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'el sin padre', en español el equivalente corriente y fiel para esta categoría legal es 'huérfano'.
- source_word: וְלָאַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: a la viuda
  alternatives_spanish:
  - y a la viuda
  lexicon: HALOT
  rationale: Equivalente estándar y transparente.
- source_word: וְאָכְלוּ
  english_pob_choice: and they shall eat
  chosen_spanish: y comerán
  alternatives_spanish:
  - y comerán allí
  - y comerán de ello
  lexicon: HALOT
  rationale: El futuro simple mantiene la secuencia de instrucciones/resultados y evita agregar elementos no presentes en el hebreo.
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus puertas
  alternatives_spanish:
  - en tus ciudades
  - dentro de tus ciudades
  lexicon: HALOT
  rationale: '''Tus puertas'' conserva la imagen literal del hebreo. En español, ''dentro de tus puertas'' suena más natural que ''dentro de tus puertas'' si se entiende idiomáticamente como la comunidad/localidad; sin embargo, la imagen sigue siendo transparente.'
- source_word: וְשָׂבֵעוּ
  english_pob_choice: be satisfied
  chosen_spanish: se saciarán
  alternatives_spanish:
  - quedarán satisfechos
  - serán saciados
  lexicon: HALOT
  rationale: '''Saciarse'' expresa bien la idea de quedar plenamente satisfechos con comida. Mantiene el sentido corporal y concreto del verbo hebreo.'
theological_decisions:
- issue: Conservar las categorías sociales concretas de la ley del diezmo
  english_pob_reading: Retain the concrete categories 'Levite, sojourner, fatherless, and widow' without broad paraphrase.
  chosen_spanish_reading: Conservar 'levita, forastero, huérfano y viuda' sin convertirlos en una paráfrasis social general.
  alternative_spanish_readings:
  - los necesitados
  - los marginados de la comunidad
  rationale: El verso nombra beneficiarios específicos del pacto. Traducirlos de manera general borraría el perfil jurídico-teológico del pasaje y la precisión de la ley.
  doctrine_reference: Principios de traducción POB §§1, 5
- issue: Interpretación de בִּשְׁעָרֶיךָ
  english_pob_reading: Use the literal 'within your gates' in the main text.
  chosen_spanish_reading: Mantener la imagen literal 'dentro de tus puertas' en el texto principal.
  alternative_spanish_readings:
  - en tus ciudades
  - dentro de tus ciudades
  rationale: La imagen de 'puertas' es una forma idiomática hebrea para la comunidad local. En español, conservarla preserva la textura del original; una nota puede aclarar el sentido comunitario.
  doctrine_reference: Principios de traducción POB §§1, 6
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó 'setting aside' por 'tithing' para reflejar más directamente לַעְשֵׂר y conservar la conexión verbal con 'tithe'. En español se siguió esa decisión con 'diezmar' / 'diezmo'. También se procuró respetar la conservación del giro literal de בִּשְׁעָרֶיךָ con una nota explicativa.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió 'forastero' para גֵּר por su valor social-bíblico y por mantener un registro bíblico transparente.
  - Se evitó 'siervo' porque el hebreo y la pauta POB aquí no apuntan a esa categoría.
  - Se prefirió 'se saciarán' frente a 'quedarán satisfechos' por la concreción alimentaria del contexto.
