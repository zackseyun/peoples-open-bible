translation:
  language: es
  text: El luto por el muerto dura siete días, pero para el necio y el impío[a], todos los días de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para un necio y una persona impía». El griego usa formas masculinas singulares de manera genérica en este dicho sapiencial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πένθος
  english_pob_choice: mourning
  chosen_spanish: luto
  alternatives_spanish:
  - duelo
  - mientras dura el duelo
  lexicon: LSJ
  rationale: πένθος designa el luto o duelo por un fallecido. 'Luto' es natural en español y conserva el sentido funerario y comunitario mejor que un término más interior como 'tristeza'.
- source_word: νεκροῦ
  english_pob_choice: the dead
  chosen_spanish: el muerto
  alternatives_spanish:
  - el difunto
  - el fallecido
  lexicon: LSJ
  rationale: 'El genitivo griego funciona de manera genérica: el luto ocasionado por alguien muerto. ''El muerto'' refleja con concisión la referencia general y mantiene la relación directa con la muerte.'
- source_word: ἑπτὰ ἡμέραι
  english_pob_choice: seven days
  chosen_spanish: siete días
  lexicon: LSJ
  rationale: Expresión temporal directa; se conserva de forma formal y transparente.
- source_word: μωροῦ
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - un necio
  - el insensato
  lexicon: LSJ
  rationale: En literatura sapiencial, μωρός señala necedad moral y práctica. 'Necio' es un equivalente bíblico y claro en español, y conserva mejor el registro sapiencial que 'estúpido'.
- source_word: ἀσεβοῦς
  english_pob_choice: an ungodly man
  chosen_spanish: el impío
  alternatives_spanish:
  - un impío
  - el irreverente
  - el hombre impío
  lexicon: LSJ
  rationale: ἀσεβής denota a quien no tiene reverencia hacia Dios. 'Impío' es el término bíblico más directo en español. Se evita añadir 'hombre' en el texto principal porque el paralelismo español ya puede sostener la genericidad sin sobrecargar la frase.
- source_word: πᾶσαι αἱ ἡμέραι τῆς ζωῆς αὐτοῦ
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - toda su vida
  - todos sus días
  lexicon: LSJ
  rationale: La frase expresa duración total. 'Todos los días de su vida' preserva la estructura griega y mantiene el paralelismo con 'siete días'.
theological_decisions:
- issue: Género gramatical representativo en un dicho sapiencial
  english_pob_reading: Retain masculine singular in 'a fool' and 'his life'
  chosen_spanish_reading: 'Conservar el masculino singular representativo: ''el necio'' ... ''de su vida'''
  alternative_spanish_readings:
  - la persona necia ... de su vida
  - los necios ... de sus vidas
  rationale: El griego usa formas masculinas singulares genéricas en un refrán sapiencial. En español, mantener el singular masculino preserva mejor la forma fuente y la fuerza proverbial, sin convertirlo en plural o diluir su concreción.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se reportan cambios necesarios y la lectura del inglés auditado muestra alto acuerdo con el griego.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se evita 'Cristo/Mesías' porque no aparece en el texto.
  - Se conserva el paralelismo entre 'siete días' y 'todos los días de su vida' sin explicitar más de lo que la fuente permite.
  - '''Impío'' y ''necio'' siguen la terminología sapiencial y teológica habitual del proyecto en español.'
