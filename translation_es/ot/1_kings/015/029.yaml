base_translation:
  language: en
  yaml_path: translation/ot/1_kings/015/029.yaml
  text: And when he became king[a], he struck down all the house of Jeroboam. He did not leave to Jeroboam a single living thing, until he had destroyed him[b], according to the word of Yahweh that he had spoken by the hand of his servant Ahijah the Shilonite.
  footnotes:
