translation:
  language: es
  text: y me honró delante de los reyes y de todos sus amigos y nobles[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delante de los que reinaban como reyes»; el griego usa una forma participial y no el sustantivo simple «reyes».'
    reason: lexical_alternative
  - marker: b
    text: «Amigos» puede referirse a asociados de la corte o cortesanos, no necesariamente a amigos personales íntimos.
    reason: cultural_note
lexical_decisions:
- source_word: ἐτίμησεν
  english_pob_choice: honored
  chosen_spanish: honró
  alternatives_spanish:
  - mostró honor a
  - estimó
  lexicon: BDAG
  rationale: τιμάω expresa conferir honor o estima; «honró» es natural en español y conserva la idea de un acto público de reconocimiento sin añadir matices de recompensa material.
- source_word: ἔναντι
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - a la vista de
  lexicon: BDAG
  rationale: ἔναντι marca el marco público de la acción. «Delante de» comunica con claridad que el honor fue mostrado ante la audiencia indicada.
- source_word: τῶν βασιλευόντων
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los que reinaban
  - los gobernantes
  lexicon: BDAG
  rationale: El participio βασιλευόντων literalmente significa «los que reinan / gobiernan como reyes». En español, «los reyes» es la forma más directa y fluida, manteniendo la referencia a autoridades reales sin sobrecargar la frase.
- source_word: φίλων
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - cortesanos
  - compañeros
  lexicon: BDAG
  rationale: El sentido básico es «amigos». Aunque en contexto de corte puede incluir asociados reales, el texto griego usa el término común y en español conviene conservar esa lectura primaria.
- source_word: μεγιστάνων
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - grandes hombres
  - magnates
  - altos funcionarios
  lexicon: LSJ
  rationale: μεγιστάνες designa a hombres de alto rango, grandees o magnates. «Nobles» transmite dignidad social y política de forma clara y sobria en español.
translation_notes:
  revision_awareness: El pasaje griego fue tomado como ancla principal; se siguió el sentido público y cortesano del honor conferido. El testigo paralelo hebreo/semítico funciona solo como comprobación secundaria de nombres y marco, sin desplazar la redacción griega.
  spanish_consistency_notes:
  - 'Se preservó la secuencia de enumeración del griego: reyes, amigos y nobles.'
  - Se evitó «SEÑOR» o terminología litúrgica ajena porque el texto no contiene el tetragrámaton ni un título divino.
  - La fórmula «delante de» mantiene el valor relacional y público de ἔναντι sin volverla demasiado literal.
