translation:
  language: es
  text: Nacor vivió ciento diecinueve años después que engendró a Térah, y engendró hijos e hijas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió por
  lexicon: HALOT
  rationale: En las notas genealógicas, חיה expresa la duración de la vida; «vivió» es el equivalente natural en español y conserva el sentido de continuidad vital sin añadir matices ajenos.
- source_word: אַחֲרֵי הוֹלִידוֹ
  english_pob_choice: after he fathered
  chosen_spanish: después de haber engendrado a
  alternatives_spanish:
  - después de haber sido padre de
  - después de haber engendrado
  lexicon: HALOT
  rationale: La construcción indica el período posterior al nacimiento del hijo nombrado. «Haber engendrado» mantiene el valor activo de ילד y funciona con naturalidad en español bíblico moderno.
- source_word: תֶּרַח
  english_pob_choice: Terah
  chosen_spanish: Téraj
  alternatives_spanish:
  - Teraj
  - Térah
  lexicon: Transliteración estándar
  rationale: Se usa la forma española «Téraj», acorde con la pronunciación habitual en español bíblico y con la transliteración estándar del nombre propio.
- source_word: תְּשַׁע עֶשְׂרֵה שָׁנָה וּמְאַת שָׁנָה
  english_pob_choice: one hundred nineteen years
  chosen_spanish: ciento diecinueve años
  alternatives_spanish:
  - 119 años
  - ciento diecinueve años
  lexicon: HALOT
  rationale: El hebreo expresa 19 + 100 años. En español, «ciento diecinueve años» es la forma idiomática y clara, y mantiene el orden natural del número compuesto.
- source_word: וַיּוֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró
  lexicon: HALOT
  rationale: El verbo ילד se repite en la fórmula genealógica. «Engendró» conserva la correspondencia léxica y el registro bíblico sin depender de un calco inglés.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - niños y niñas
  - descendencia
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente ambos sexos. «Hijos e hijas» preserva esa especificidad de forma natural en español y evita generalizar con «descendencia».
translation_notes:
  revision_awareness: La versión inglesa auditada está en alta concordancia con la fuente hebrea y no muestra revisiones aplicadas; por eso la propuesta española sigue de cerca la fórmula genealógica del texto base, priorizando equivalencia óptima y transparencia léxica.
  spanish_consistency_notes:
  - Se mantiene la transliteración uniforme de nombres propios en estilo español bíblico.
  - Se conserva la fórmula genealógica activa con dos ocurrencias de «engendrar/engendró» para reflejar la repetición del hebreo ילד.
  - No se introducen notas textuales o variantes porque el paquete fuente no documenta ninguna divergencia ni ambigüedad relevante.
