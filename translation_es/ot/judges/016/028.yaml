    reason: lexical_alternative
  revision_rationale: Se reemplaza «clamó» por «llamó» para alinearse mejor con la decisión fuente de קרא y evitar una intensificación innecesaria. Se cambia «con una sola venganza» por «con un solo acto de venganza» para conservar el valor del cognado hebreo de manera natural en español. Se reubica la nota al sintagma «mis dos ojos», que es exactamente lo que explica.
