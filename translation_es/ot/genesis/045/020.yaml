translation:
  language: es
  text: Y que sus ojos[a] no perdonen sus enseres, porque todo lo mejor de la tierra de Egipto es suyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no se preocupen por sus bienes". Literalmente, "que sus ojos no perdonen sus enseres"; el hebreo conserva la imagen del "ojo" como sujeto del verbo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעֵינְכֶם
  english_pob_choice: And do not let your eye
  chosen_spanish: Y no tenga compasión vuestra vista
  alternatives_spanish:
  - Y no mire con pena vuestra vista
  - Y no os dé pena lo que dejáis
  lexicon: HALOT
  rationale: La imagen hebrea usa “ojo/vista” como sujeto idiomático del verbo, expresando una mirada de pena o regret. En español, “vista” conserva la imagen sin forzar una construcción antinatural; “tenga compasión” recoge el matiz de piedad/pena implícito en la frase idiomática.
- source_word: אַל תָּחֹס
  english_pob_choice: do not let ... spare
  chosen_spanish: no tenga compasión
  alternatives_spanish:
  - no se apiade
  - no sienta pena
  - no mire con remordimiento
  lexicon: HALOT
  rationale: חוס puede significar “ahorrar, compadecerse, tener piedad”. Con “ojo/vista” y el contexto de dejar pertenencias, la idea es no afligirse ni lamentar lo que se deja. “No tenga compasión” transmite el valor idiomático en español sin perder del todo la tensión del hebreo.
- source_word: עַל כְּלֵיכֶם
  english_pob_choice: about your belongings
  chosen_spanish: sobre vuestros enseres
  alternatives_spanish:
  - por vuestros bienes
  - sobre vuestras pertenencias
  - acerca de vuestros bienes
  lexicon: HALOT
  rationale: כְּלִי aquí apunta a objetos, utensilios o bienes transportables. “Enseres” es amplio, digno y natural en español bíblico contemporáneo, y evita restringir el sentido a “bienes” en un registro demasiado económico.
- source_word: טוּב כָּל אֶרֶץ מִצְרַיִם
  english_pob_choice: all the best of the land of Egypt
  chosen_spanish: lo mejor de toda la tierra de Egipto
  alternatives_spanish:
  - el mejor fruto de toda la tierra de Egipto
  - la riqueza de toda la tierra de Egipto
  - lo bueno de toda la tierra de Egipto
  lexicon: HALOT
  rationale: טוּב en este contexto se refiere a lo selecto, lo excelente o lo mejor de la tierra. “Lo mejor” reproduce bien el valor sustantivado y preserva el orden conceptual de la frase, manteniendo “tierra de Egipto” como eco fiel del hebreo.
- source_word: לָכֶם הוּא
  english_pob_choice: is yours
  chosen_spanish: será vuestro
  alternatives_spanish:
  - es de vosotros
  - os pertenece
  - es para vosotros
  lexicon: HALOT
  rationale: La construcción hebrea expresa posesión/enfasis. Dado el contexto exhortativo de provisión futura, el español futuro “será vuestro” comunica adecuadamente la promesa y su alcance, sin exigir una formulación posesiva más moderna que debilitaría el tono bíblico.
theological_decisions:
- issue: Tono de provisión y seguridad en la invitación de José
  english_pob_reading: The best of the land of Egypt is yours.
  chosen_spanish_reading: lo mejor de toda la tierra de Egipto será vuestro.
  alternative_spanish_readings:
  - lo mejor de toda la tierra de Egipto es vuestro
  - lo mejor de la tierra de Egipto os pertenece
  rationale: El verso no solo informa posesión; refuerza la seguridad dada por José a sus hermanos. El futuro “será vuestro” comunica bien la promesa en español, manteniendo la fuerza pastoral del pasaje sin añadir contenido doctrinal ajeno.
  doctrine_reference: Providencia y provisión divina en Génesis 45
- issue: Conservación del idiomatismo hebreo sin oscurecer el sentido
  english_pob_reading: do not let your eye spare your belongings
  chosen_spanish_reading: no tenga compasión vuestra vista sobre vuestros enseres
  alternative_spanish_readings:
  - no os dé pena dejar vuestros bienes
  - no mire con compasión vuestra vista vuestros bienes
  rationale: El hebreo usa una imagen corporal para expresar una disposición afectiva. La versión española conserva la imagen de “vista” y el verbo de compasión para no borrar la tensión lingüística, pero la integra en una frase natural y legible.
  doctrine_reference: 'Principios de traducción: fidelidad semántica e idiomática'
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente volvió a una forma más literal para reflejar mejor אַל תָּחֹס עַל y ajustó el orden de טוּב כָּל אֶרֶץ מִצְרַיִם. En español se ha mantenido esa literalidad de base, pero con una reexpresión idiomática y natural: se conserva la imagen de “vista” y la idea de compasión/pena, y se traduce טוּב כָּל אֶרֶץ מִצְרַיִם como “lo mejor de toda la tierra de Egipto”.'
  spanish_consistency_notes:
  - Se mantiene “tierra de Egipto” para reflejar אֶרֶץ מִצְרַיִם.
  - “Enseres” se usa de modo consistente con el campo semántico de כְּלִים como objetos transportables.
  - La nota al pie preserva la tensión entre la imagen corporal hebrea y el sentido comunicativo en español.
