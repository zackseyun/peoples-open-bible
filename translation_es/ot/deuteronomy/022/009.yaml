translation:
  language: es
  text: 'No sembrarás tu viña con dos clases de semilla, no sea que se pierda[a] toda la cosecha: la semilla que siembres y el producto de la viña.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «sea consagrada» o «se haga santa»; es decir, quede apartada del uso ordinario.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִזְרַע
  english_pob_choice: you shall not sow
  chosen_spanish: no sembrarás
  alternatives_spanish:
  - no plantarás
  lexicon: HALOT
  rationale: זרע se refiere aquí a sembrar semilla; en español, 'sembrar' es el equivalente natural y preciso para un precepto agrícola sobre semilla mezclada.
- source_word: כַּרְמְךָ
  english_pob_choice: your vineyard
  chosen_spanish: tu viña
  alternatives_spanish:
  - tu viñedo
  - tu viña de vid
  lexicon: HALOT
  rationale: כרם designa una viña o viñedo. 'Viña' es breve, natural y fiel al uso bíblico en español.
- source_word: כִּלְאָיִם
  english_pob_choice: two kinds of seed
  chosen_spanish: dos clases de semilla
  alternatives_spanish:
  - semilla mezclada
  - una mezcla de semillas
  lexicon: HALOT
  rationale: כלאים expresa una mezcla prohibida de tipos. 'Dos clases de semilla' conserva la idea de diversidad de tipos sin forzar una frase técnica poco natural en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  lexicon: HALOT
  rationale: פן introduce una consecuencia negativa a evitar; 'no sea que' reproduce bien el matiz de advertencia legal en español.
- source_word: תִּקְדַּשׁ
  english_pob_choice: be forfeited
  chosen_spanish: se haga sagrada
  alternatives_spanish:
  - sea consagrada
  - quede apartada
  lexicon: HALOT
  rationale: קדש literalmente expresa volverse santo/consecrado. Como el inglés POB conserva la tensión y evita reducirlo a un simple 'perderse', en español se mantiene esa tensión con 'se haga sagrada', dejando ver el valor de consagración/apartamiento que la fórmula legal implica.
- source_word: הַמְלֵאָה
  english_pob_choice: the whole yield
  chosen_spanish: la plenitud
  alternatives_spanish:
  - la cosecha entera
  - la totalidad del rendimiento
  lexicon: HALOT
  rationale: המלאה alude al producto lleno o completo. 'Plenitud' conserva la idea de totalidad, y en esta construcción funciona como sustantivo que puede ser matizado por la frase siguiente.
- source_word: הַזֶּרַע אֲשֶׁר תִּזְרָע
  english_pob_choice: the seed that you sow
  chosen_spanish: la semilla que siembras
  alternatives_spanish:
  - la semilla que tú siembras
  - la semilla sembrada por ti
  lexicon: HALOT
  rationale: Se mantiene la relativa del hebreo con un español directo y natural. 'Semilla' es el correlato más claro de זרע en este contexto.
- source_word: וּתְבוּאַת הַכָּרֶם
  english_pob_choice: and the produce of the vineyard
  chosen_spanish: y el fruto de la viña
  alternatives_spanish:
  - y el producto de la viña
  - y la cosecha de la viña
  lexicon: HALOT
  rationale: תבואה es el rendimiento o producto agrícola. 'Fruto de la viña' es bíblicamente natural en español y mantiene el paralelismo con la viña.
theological_decisions:
- issue: Sentido de תִּקְדַּשׁ en una ley de mezcla prohibida
  english_pob_reading: Rendered as a legal consequence ('be forfeited') rather than a strictly literal 'be holy/consecrated.'
  chosen_spanish_reading: se haga sagrada, en sentido de quedar apartada del uso ordinario
  alternative_spanish_readings:
  - sea consagrada
  - quede perdida
  - quede vedada
  rationale: 'El hebreo conserva una tensión importante: el verbo קדש habla de santidad/apartamiento, pero en este contexto legal el efecto es punitivo y restrictivo. La redacción española intenta no borrar esa tensión, usando ''se haga sagrada'' con la explicación implícita de apartamiento, en vez de reemplazarlo solo por una pérdida jurídica o por una santificación devocional.'
  doctrine_reference: Tradición de equivalencia óptima; preservar la tensión léxica sin domesticar el término legal.
translation_notes:
  revision_awareness: El texto inglés revisado sustituyó 'mixed seed' por 'two kinds of seed' para ajustarse más de cerca a כִּלְאָיִם, y mantuvo la idea difícil de תִּקְדַּשׁ como consecuencia legal. La versión española refleja ese ajuste con 'dos clases de semilla' y conserva la tensión de קדש con una formulación que no la reduce a mero castigo ni a mera consagración devocional.
  spanish_consistency_notes:
  - Se mantiene 'viña' para כרם, en lugar de 'viñedo', por naturalidad bíblica y claridad.
  - '''Sembrar'' se usa de manera consistente para זרע en contexto agrícola de semilla.'
  - Se evita 'SEÑOR' y no hay términos divinos en este versículo.
  - '''Fruto'' conserva un registro bíblico comprensible para תבואה sin introducir tecnicismos innecesarios.'
