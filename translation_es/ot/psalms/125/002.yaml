translation:
  language: es
  text: Como las montañas rodean a Jerusalén[a], así Yahvé rodea a su pueblo desde ahora y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Jerusalén: las montañas están alrededor de ella, y Yahvé está alrededor de su pueblo desde ahora y para siempre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: WLC/HALOT
  rationale: Nombre propio de la ciudad; en español bíblico readable y estándar se usa la forma tradicional asentada «Jerusalén», no una transliteración inglesa.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: las montañas
  alternatives_spanish:
  - los montes
  - las colinas
  lexicon: HALOT
  rationale: El plural de הַר puede ser «montes» o «montañas»; aquí «montañas» conserva la imagen topográfica y protectora con naturalidad en español.
- source_word: סָבִיב
  english_pob_choice: surround / are around
  chosen_spanish: rodean
  alternatives_spanish:
  - están alrededor de
  - circundan
  lexicon: HALOT
  rationale: El verbo español «rodear» expresa de forma idiomática la relación espacial de cercar o estar alrededor, sin perder la fuerza poética del hebreo.
- source_word: לָהּ
  english_pob_choice: Jerusalem / her
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - a ella
  - a la ciudad
  lexicon: HALOT
  rationale: El sufijo femenino remite a Jerusalén; en español es más claro explicitar el referente en la primera mitad del verso, mientras el paralelo posterior evita la repetición excesiva.
- source_word: וַיהוָה
  english_pob_choice: Yahweh / so the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: DOCTRINE.md contested terms
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» en el texto principal. En español no se introduce «el SEÑOR» porque la consigna del proyecto favorece la forma del nombre divino.'
- source_word: סָבִיב לְעַמּוֹ
  english_pob_choice: surrounds his people
  chosen_spanish: rodea a su pueblo
  alternatives_spanish:
  - está alrededor de su pueblo
  - circunda a su pueblo
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera cola y el matiz protector de «rodea»; «su pueblo» preserva el vínculo de pacto implícito en el posesivo.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su nación
  lexicon: HALOT
  rationale: «Pueblo» conserva mejor la fuerza colectiva y pactal del término que alternativas más genéricas.
- source_word: מֵעַתָּה
  english_pob_choice: from now
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  - desde este momento
  lexicon: HALOT
  rationale: «Desde ahora» es una equivalencia directa, natural y temporalmente completa en español.
- source_word: וְעַד עוֹלָם
  english_pob_choice: and forever
  chosen_spanish: y para siempre
  alternatives_spanish:
  - y para siempre jamás
  - y eternamente
  lexicon: HALOT
  rationale: «עוֹלָם» en esta fórmula expresa duración indefinida; «para siempre» es la forma española más clara y sobria para ese valor temporal.
theological_decisions:
- issue: Renderización del nombre divino יהוה en un verso poético de protección
  english_pob_reading: Yahweh surrounds his people
  chosen_spanish_reading: Yahvé rodea a su pueblo
  alternative_spanish_readings:
  - el SEÑOR rodea a su pueblo
  - Yahvé está alrededor de su pueblo
  rationale: Se conserva el nombre divino según la política del proyecto. «Rodea» reproduce la imagen de protección activa y mantiene el paralelismo con el primer hemistiquio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la relación analógica entre las dos mitades del verso
  english_pob_reading: As the mountains surround Jerusalem, so Yahweh surrounds his people
  chosen_spanish_reading: Como las montañas rodean a Jerusalén, así Yahvé rodea a su pueblo
  alternative_spanish_readings:
  - Las montañas rodean a Jerusalén, y Yahvé rodea a su pueblo
  - Así como las montañas rodean a Jerusalén, Yahvé rodea a su pueblo
  rationale: La estructura comparativa del hebreo se expresa con «Como… así…» para hacer explícita la analogía sin añadir contenido ajeno ni perder el paralelismo poético.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source sense in readable modern Spanish'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y su nota alternativa: la estructura comparativa se mantuvo en español con un paralelismo claro; el nombre divino se siguió según la política española del proyecto («Yahvé»), y el tiempo final se completó con una fórmula natural equivalente a la del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה en coherencia con la política del proyecto.
  - Se eligió «Jerusalén» como nombre propio español estándar, no transliteración.
  - «rodea» se repite en ambos miembros para preservar el paralelismo y la imaginería de protección.
  - «desde ahora y para siempre» refleja מֵעַתָּה וְעַד עוֹלָם con naturalidad y sin atenuar la duración indefinida.
