translation:
  language: es
  text: Tus dientes son como un rebaño de ovejas que han salido del lavado, todas ellas con mellizos[a], y ninguna entre ellas ha perdido su cría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas ellas están emparejadas»; la línea probablemente implica que cada diente tiene su contraparte correspondiente.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «privada de cría» o «enlutada por pérdida de cría». La metáfora sugiere completitud: ninguna carece de su pareja.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁנַּיִךְ
  english_pob_choice: your teeth
  chosen_spanish: tus dientes
  alternatives_spanish:
  - tu dentadura
  - el conjunto de tus dientes
  lexicon: HALOT
  rationale: El posesivo femenino singular se conserva como 'tus'. 'Dientes' expresa de forma natural el plural hebreo y evita una perífrasis innecesaria en español.
- source_word: כְּעֵדֶר הָרְחֵלִים
  english_pob_choice: like a flock of ewes
  chosen_spanish: como un rebaño de ovejas
  alternatives_spanish:
  - como un rebaño de ovejas hembras
  - como un rebaño de carneras
  lexicon: HALOT
  rationale: El hebreo especifica hembras (rĕḥēlîm). En español, 'ovejas' comunica bien la imagen pastoral sin forzar un término raro; 'rebaño' es más natural que 'flock' y sigue el campo semántico pastoral.
- source_word: שֶׁעָלוּ מִן הָרַחְצָה
  english_pob_choice: that have come up from the washing
  chosen_spanish: que suben del lavado
  alternatives_spanish:
  - que han subido del lavado
  - que salen del baño
  - que han salido del lavado
  lexicon: HALOT
  rationale: Se preserva la imagen de animales recién lavados sin convertirla en interpretación. 'Lavado' mantiene el artículo y el valor descriptivo del hebreo, y 'suben' reproduce el movimiento ascendente de עָלוּ en estilo poético.
- source_word: שֶׁכֻּלָּם מַתְאִימוֹת
  english_pob_choice: all of them bearing twins
  chosen_spanish: todas ellas paren mellizos
  alternatives_spanish:
  - todas ellas están emparejadas
  - todas ellas tienen parejas
  - todas ellas dan mellizos
  lexicon: HALOT
  rationale: El contexto del símil ovino favorece una imagen de ovejas que producen crías dobles, con la implicación de simetría y plenitud. 'Paren mellizos' conserva el verbo reproductivo y la metáfora pastoril, evitando reducirlo a una mera abstracción.
- source_word: וְשַׁכֻּלָה אֵין בָּהֶם
  english_pob_choice: and none among them has lost her young
  chosen_spanish: y ninguna entre ellas ha perdido su cría
  alternatives_spanish:
  - y ninguna entre ellas está desprovista
  - y ninguna entre ellas está privada de cría
  - y ninguna entre ellas está bereada
  lexicon: HALOT
  rationale: שַׁכֻּלָה es literalmente 'privada de hijos/cría, bereada'. En español, 'ha perdido su cría' conserva el sentido concreto del símil y evita un término poco natural para el lector moderno, sin borrar la idea de pérdida implícita.
translation_notes:
  revision_awareness: La revisión más reciente no modificó el verso; el consenso de verificación indica alta concordancia con el texto hebreo y con la lectura auditada en inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí porque el versículo no contiene el nombre divino.
  - Se evitó 'Cristo' y otros equivalentes cristológicos por no ser pertinentes.
  - '''Mellizos'' preserva mejor la imagen ovina de parejas/crías dobles que una paráfrasis abstracta.'
  - Se conservó la metáfora de las ovejas en el texto principal en lugar de explicitar solo el sentido implícito de 'dientes pareados'.
