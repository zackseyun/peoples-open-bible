translation:
  text: 'Jesus said, "What you will hear in your ear—in the other ear[a] proclaim it upon your rooftops; for no one lights a lamp and puts it under a measuring-basket[b], nor does one put it in a hidden place, but rather one puts it on the lampstand, so that those who enter and those who go out may see its light.[c]"'
