translation:
  language: es
  text: 'Así dice el Señor Yahvé: Beberás la copa[a] de tu hermana, profunda y ancha[b]; será para risa y para burla, porque contiene mucho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La ‘copa’ es una imagen profética de la porción asignada de juicio.
    reason: cross_reference
  - marker: b
    text: 'O: “profunda y amplia”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor, Yahvé
  lexicon: HALOT
  rationale: La combinación hebrea une el título אֲדֹנָי con el nombre divino יְהוִה. En español, “Señor Yahvé” preserva ambos elementos sin recurrir a “SEÑOR” como máscara tipográfica y mantiene la distinción entre título y nombre propio divino.
- source_word: כּוֹס אֲחוֹתֵךְ
  english_pob_choice: your sister’s cup
  chosen_spanish: la copa de tu hermana
  alternatives_spanish:
  - el cáliz de tu hermana
  - la copa perteneciente a tu hermana
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de “copa”, porque en el contexto profético funciona como símbolo del porción asignada de juicio. “Cáliz” sonaría más litúrgico y desplazaría el sentido profético.
- source_word: תִּשְׁתִּי
  english_pob_choice: you will drink
  chosen_spanish: beberás
  alternatives_spanish:
  - tomarás
  - has de beber
  lexicon: HALOT
  rationale: El imperfecto en este anuncio profético se vierte naturalmente como futuro. “Beberás” conserva la inevitabilidad del juicio sin añadir matices no presentes.
- source_word: הָעֲמֻקָּה וְהָרְחָבָה
  english_pob_choice: deep and wide
  chosen_spanish: profunda y ancha
  alternatives_spanish:
  - profunda y ancha
  - profunda y ancha de boca
  - profunda y ancha/broad
  lexicon: HALOT
  rationale: Ambos adjetivos describen la copa. “Ancha” resulta más natural en español para un recipiente y conserva la idea de gran capacidad; “profunda” traduce de forma directa עֲמֻקָּה.
- source_word: תִּהְיֶה לִצְחֹק וּלְלַעַג
  english_pob_choice: it will be for laughter and for mockery
  chosen_spanish: será para risa y para burla
  alternatives_spanish:
  - será motivo de risa y de burla
  - será para escarnio y para burla
  - será objeto de risa y burla
  lexicon: HALOT
  rationale: Se conserva el paralelismo hebreo con una construcción preposicional directa. “Risa” y “burla” reflejan con claridad el desprecio público; no se introduce “escarnio” porque el texto hebreo usa dos sustantivos concretos de ridiculización.
- source_word: מִרְבָּה לְהָכִיל
  english_pob_choice: for it holds much
  chosen_spanish: porque contiene mucho
  alternatives_spanish:
  - pues tiene gran capacidad
  - porque cabe mucho en ella
  - ya que contiene mucho
  lexicon: HALOT
  rationale: 'La cláusula explica por qué la copa es objeto de burla: su gran capacidad. “Contiene mucho” mantiene el sentido causal y la idea de capacidad sin volver demasiado técnico el español.'
theological_decisions:
- issue: Forma de traducir יְהוָה en la combinación אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  - el Señor, Yahvé
  rationale: 'La política del proyecto pide traducir יהוה como “Yahvé”. En esta fórmula compuesta se conserva además el título אֲדֹנָי como “Señor”, resultando en una lectura transparente y auditable: título + nombre divino.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Función profética de la copa
  english_pob_reading: The 'cup' is a prophetic image for an allotted portion of judgment.
  chosen_spanish_reading: La copa es una imagen profética de la porción asignada de juicio.
  alternative_spanish_readings:
  - La copa simboliza el juicio asignado.
  - La copa representa la medida de juicio destinada.
  rationale: Se conserva la lectura simbólica subyacente sin anular la literalidad del texto. La imagen de la copa como porción de juicio está bien atestiguada en el discurso profético y no debe perderse en la traducción.
  doctrine_reference: Cross-reference to prophetic cup imagery in Ezekiel and related prophetic literature
translation_notes:
  revision_awareness: El inglés POB ajustó la línea final de “will become a laughingstock and a mockery” a la forma más literal “will be for laughter and for mockery”. La presente versión española sigue ese movimiento manteniendo la estructura hebrea con “será para risa y para burla”, y conserva la explicación de la copa como imagen profética de juicio.
  spanish_consistency_notes:
  - Se usa “Yahvé” para יהוה, conforme al criterio del proyecto.
  - Se evita “cáliz” para no introducir una resonancia litúrgica ajena al contexto profético.
  - Se mantiene la metáfora de la copa y su valor de juicio, en vez de sustituirla por una paráfrasis explicativa en el texto principal.
  - La combinación “risa y burla” reproduce el paralelismo del hebreo con un registro claro y publicable.
