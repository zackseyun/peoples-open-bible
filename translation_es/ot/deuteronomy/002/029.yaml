translation:
  language: es
  text: tal como hicieron conmigo[a] los hijos de Esaú que habitan en Seír, y los moabitas que habitan en Ar, hasta que yo cruce el Jordán hacia la tierra[a] que Yahvé nuestro Dios nos está dando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me trataron»; el hebreo dice literalmente «hicieron para mí / conmigo», y en contexto se refiere a conceder paso y suministros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - igual que
  lexicon: HALOT
  rationale: Expresa con naturalidad la comparación introducida por la partícula hebrea sin perder su fuerza correlativa.
- source_word: עָשׂוּ לִי
  english_pob_choice: did for me
  chosen_spanish: me hicieron
  alternatives_spanish:
  - trataron conmigo
  - obraron conmigo
  lexicon: HALOT
  rationale: En español, 'hacer para/con alguien' se expresa de forma más natural como 'hacerle algo' o 'hacer con alguien'. Aquí 'me hicieron' conserva la ambigüedad contextual que el inglés POB retuvo en una nota.
- source_word: בְּנֵי עֵשָׂו
  english_pob_choice: the sons of Esau
  chosen_spanish: los hijos de Esaú
  alternatives_spanish:
  - los descendientes de Esaú
  - la casa de Esaú
  lexicon: HALOT
  rationale: Se conserva la metáfora de parentesco del hebreo, como hizo el POB inglés, en vez de suavizarla a una denominación étnica más interpretativa.
- source_word: הַיֹּשְׁבִים בְּשֵׂעִיר
  english_pob_choice: who live in Seir
  chosen_spanish: que habitan en Seír
  alternatives_spanish:
  - que viven en Seír
  - que moran en Seír
  lexicon: HALOT
  rationale: El participio de ישב denota residencia estable; 'habitan' mantiene un registro bíblico claro en español sin forzar arcaísmo excesivo.
- source_word: וְהַמּוֹאָבִים
  english_pob_choice: and the Moabites
  chosen_spanish: y los moabitas
  alternatives_spanish:
  - y el pueblo de Moab
  lexicon: HALOT
  rationale: El gentilicio plural se vierte directamente como 'moabitas', que es preciso y natural en español.
- source_word: הַיֹּשְׁבִים בְּעָר
  english_pob_choice: who live in Ar
  chosen_spanish: que habitan en Ar
  alternatives_spanish:
  - que viven en Ar
  lexicon: HALOT
  rationale: Se mantiene la misma construcción participial que en la primera mitad del verso y se translitera el topónimo Ar.
- source_word: עַד אֲשֶׁר אֶעֱבֹר
  english_pob_choice: until I cross
  chosen_spanish: hasta que yo cruce
  alternatives_spanish:
  - hasta que pase
  - hasta cruzar
  lexicon: HALOT
  rationale: '''Cruzar'' comunica bien עבר con el objeto implícito del Jordán y conserva el movimiento de tránsito marcado por el contexto.'
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, 'el Jordán' es natural y suficiente; 'río' queda implícito.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: hacia la tierra
  alternatives_spanish:
  - a la tierra
  - dentro de la tierra
  lexicon: HALOT
  rationale: '''Hacia'' conserva el sentido direccional del hebreo y evita sobrecargar con una implicación de entrada ya expresada por ''cruce''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio POB para el nombre divino: transliteración del Tetragrámaton en lugar de sustitución por un título.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: Se mantiene la relación de pacto en una formulación directa y idiomática.
- source_word: נֹתֵן לָנוּ
  english_pob_choice: is giving to us
  chosen_spanish: nos está dando
  alternatives_spanish:
  - nos da
  - está dándonos
  lexicon: HALOT
  rationale: El participio expresa una acción en curso o en vigor; 'nos está dando' preserva el aspecto sin sugerir un acto concluido.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La traducción española debe reflejar el nombre propio divino, no sustituirlo por un título. 'Yahvé' es el equivalente doctrinal estándar en este proyecto y evita el ocultamiento del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre 'me hicieron' y el contexto inmediato
  english_pob_reading: did for me; in context referring to granting passage and provisions
  chosen_spanish_reading: me hicieron
  alternative_spanish_readings:
  - me trataron
  - obraron conmigo
  - me concedieron paso
  rationale: El hebreo עשה לי es deliberadamente amplio. En el versículo no se especifica en la frase misma qué acto realizaron; por eso se conserva la amplitud y se deja la aclaración al contexto y a la nota textual, como en el POB inglés.
  doctrine_reference: Principio POB de no sobreespecificar más allá del hebreo cuando existe tensión contextual
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la frase correspondiente. También se mantuvo la nota lexical para reflejar la amplitud de עָשׂוּ לִי sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה conforme al criterio del proyecto.
  - Se conserva 'los hijos de Esaú' y 'los moabitas' como gentilicios corporativos directos.
  - '''habitan'' mantiene registro bíblico natural y coherente en ambas cláusulas paralelas.'
  - '''nos está dando'' preserva el aspecto progresivo del participio נֹתֵן.'
