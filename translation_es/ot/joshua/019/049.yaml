translation:
  language: es
  text: Cuando terminaron de repartir la tierra por sus territorios[a], los hijos[b] de Israel dieron una herencia a Josué hijo de Nun entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según sus fronteras». El hebreo puede poner el acento tanto en las líneas fronterizas como en la distribución territorial.
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַלּוּ
  english_pob_choice: When they finished
  chosen_spanish: Cuando terminaron
  alternatives_spanish:
  - Cuando acabaron
  - Cuando concluyeron
  lexicon: HALOT
  rationale: El verbo expresa acción completada en secuencia narrativa; «terminaron» conserva ese valor temporal de manera natural en español sin añadir matices no presentes en el hebreo.
- source_word: לִנְחֹל
  english_pob_choice: apportioning
  chosen_spanish: repartir
  alternatives_spanish:
  - distribuir en herencia
  - asignar como herencia
  lexicon: HALOT
  rationale: En este contexto de Josué, el verbo apunta al reparto hereditaria de la tierra entre las tribus. «Repartir» comunica bien la acción distributiva y, con «herencia» en la segunda cláusula, mantiene el marco de asignación territorial.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En Josué, el referente es la tierra de heredad de Israel. «La tierra» es la forma más directa y fiel al uso narrativo del hebreo.
- source_word: לִגְבֻלֹתֶיהָ
  english_pob_choice: by its territories
  chosen_spanish: por sus territorios
  alternatives_spanish:
  - según sus fronteras
  - de acuerdo con sus límites
  lexicon: HALOT
  rationale: גְּבוּל puede significar frontera, límite o territorio. Aquí el plural con sufijo sugiere la distribución por regiones o zonas delimitadas; «por sus territorios» conserva ese sentido y suena natural en español. La alternativa «según sus fronteras» queda implícita como posibilidad lexical.
- source_word: וַיִּתְּנוּ
  english_pob_choice: gave
  chosen_spanish: dieron
  alternatives_spanish:
  - entregaron
  - asignaron
  lexicon: HALOT
  rationale: El verbo נתן es el común «dar»; «dieron» mantiene la simpleza del hebreo, mientras el contexto legal de herencia aclara que se trata de una concesión formal.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión formal y transparentemente masculina del hebreo. «Los hijos de Israel» refleja la designación nacional tradicional sin neutralizarla.
- source_word: נַחֲלָה
  english_pob_choice: an inheritance
  chosen_spanish: una herencia
  alternatives_spanish:
  - un patrimonio
  - una posesión heredada
  lexicon: HALOT
  rationale: En el lenguaje de reparto de la tierra, נַחֲלָה tiene fuerza jurídico-covenantal. «Herencia» comunica esa idea en español con buena naturalidad y sin perder el vínculo con el reparto territorial.
- source_word: לִיהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: to Joshua son of Nun
  chosen_spanish: a Josué hijo de Nun
  alternatives_spanish:
  - a Josué, hijo de Nun
  - para Josué hijo de Nun
  lexicon: HALOT
  rationale: La preposición introduce al receptor de la herencia. «A Josué hijo de Nun» es la forma española más directa y fiel; se omite la coma para mantener fluidez narrativa.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su midst
  lexicon: HALOT
  rationale: La expresión indica que Josué recibió su herencia dentro de la comunidad de Israel. «Entre ellos» comunica esa inclusión de modo claro y natural.
theological_decisions:
- issue: Designación colectiva de בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se preserva la forma masculina plural del hebreo, conforme al principio de transparencia gramatical. Aunque «los israelitas» sería idiomático, suaviza la forma de origen; aquí se mantiene el nombre colectivo tradicional.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Valor de נַחֲלָה en contexto de reparto de la tierra
  english_pob_reading: an inheritance
  chosen_spanish_reading: una herencia
  alternative_spanish_readings:
  - un reparto
  - una posesión
  rationale: 'El término tiene un matiz legal y pactal: la tierra se recibe como herencia asignada. «Herencia» preserva mejor ese valor que una palabra más general como «posesión».'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 5
- issue: Relación entre el reparto de la tierra y la herencia de Josué
  english_pob_reading: the sons of Israel gave an inheritance to Joshua son of Nun among them
  chosen_spanish_reading: los hijos de Israel dieron una herencia a Josué hijo de Nun, entre ellos
  alternative_spanish_readings:
  - los hijos de Israel asignaron una herencia a Josué hijo de Nun, en medio de ellos
  rationale: La frase final subraya que Josué no quedó fuera del reparto; recibió heredad dentro del pueblo. «Entre ellos» conserva esa inclusión comunitaria sin añadir explicaciones interpretativas.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo masorético de Josué 19:49 y coincide con la lectura auditada en inglés. Se mantuvieron las dos tensiones lexicológicas relevantes: גְּבוּלֹתֶיהָ como referencia a límites/fronteras o territorios, y נַחֲלָה como herencia con valor jurídico-covenantal. No se requirieron revisiones respecto del pasaje fuente ni del control cruzado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantuvo «los hijos de Israel» por transparencia formal, acorde con el registro bíblico narrativo.
  - «Herencia» se usa en sentido técnico de reparto de tierra, no en sentido meramente afectivo.
  - «Entre ellos» conserva la inclusión comunitaria del hebreo בְּתוֹכָם sin sobrerinterpretar.
