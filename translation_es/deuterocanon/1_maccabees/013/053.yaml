  to: Y vio Simón que Juan su hijo era un hombre, y lo nombró comandante de todas las fuerzas; y vivía en Gazara[a].
  rationale: Se mantiene el sentido del original y las decisiones léxicas principales, pero se elimina la nota innecesaria sobre «un hombre» y se cambia «habitó» por «vivía» para reflejar mejor el imperfecto griego ᾤκει en español natural. Se conserva la nota sobre «Gazara» como variante histórica útil y coherente con el rastro auditado inglés.
