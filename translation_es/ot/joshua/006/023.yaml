    text: O 'todo lo que le pertenecía'. La expresión hebrea puede ser más amplia que personas solamente, aunque en el contexto probablemente se refiere sobre todo a los miembros de su casa.
    reason: lexical_alternative
  - marker: b
    text: O 'sus clanes' o 'sus parientes'.
    reason: lexical_alternative
