review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido general del hebreo: preguntar por el camino a Sion, orientarse hacia ella, invitarse mutuamente a unirse a Yahvé, y hacerlo en un pacto duradero no olvidado. Sin embargo, la nota al pie [a] preserva mejor que el texto principal la relación directa entre יִשְׁאָלוּ דֶּרֶךְ y «el camino». En el texto principal, «preguntarán por Sion» deja implícito «el camino», mientras que el hebreo lo expresa explícitamente. Además, «con el rostro vuelto» singulariza innecesariamente פְנֵיהֶם («sus rostros» / «sus caras»), aunque esto es de baja gravedad.'
  spanish_quality_summary: El español es natural, claro y digno. «Unámonos a Yahvé en un pacto eterno» suena bien y conserva el tono exhortativo. No obstante, «preguntarán por el camino a Sion» es más fiel y también plenamente idiomático en español; además evita depender de una nota para recuperar un elemento explícito del original. También mejora ligeramente la imagen corporal decir «con sus rostros vueltos hacia ella» o «con el rostro vuelto hacia ella»; ambas son legibles, pero el plural refleja mejor el hebreo.
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: יהוה -> «Yahvé» correctamente; בְּרִית עוֹלָם -> «pacto eterno» es aceptable y natural; el matiz reflexivo de וְנִלְווּ se preserva bien con «unámonos». «Sion» es una forma española válida y ampliamente reconocible.'
  issues:
  - severity: medium
    issue: El texto principal omite «el camino», explícito en דֶּרֶךְ.
    rationale: El hebreo dice literalmente que «preguntarán el camino» hacia Sion. El borrador pone «preguntarán por Sion», y relega «el camino» a una nota. Eso reduce una imagen explícita del original sin necesidad, porque «preguntarán por el camino a Sion» es natural en español.
  - severity: low
    issue: «Con el rostro vuelto» singulariza פְנֵיהֶם.
    rationale: El hebreo usa «sus rostros/caras». En español, el singular colectivo no es incorrecto, pero «con sus rostros vueltos hacia ella» refleja mejor la forma del original y sigue sonando natural.
  - severity: low
    issue: La nota [a] ya no sería necesaria si se incorpora «el camino» al texto principal.
    rationale: La nota actual compensa una omisión del texto principal. Si se corrige el texto, conviene simplificar el aparato de notas y conservar solo la nota verdaderamente útil sobre el matiz de וְנִלְווּ.
  revised_spanish_text: 'Ellos preguntarán por el camino a Sion, con sus rostros vueltos hacia ella: «Vengan[a], unámonos a Yahvé en un pacto eterno que no será olvidado».'
  revised_footnotes:
  - marker: a
    text: O «y unámonos a Yahvé»; el hebreo admite tanto un tono exhortativo directo como una lectura reflexiva más literal de «ser/juntarse» a él.
    reason: lexical_alternative
  revision_rationale: Se incorpora «el camino» al texto principal para reflejar explícitamente דֶּרֶךְ, se ajusta «rostro» a plural para corresponder mejor a פְנֵיהֶם, y se elimina la nota [a] anterior por volverse innecesaria. Se conserva la nota sobre el matiz reflexivo/exhortativo de וְנִלְווּ, que sí aporta una alternativa significativa del original.
