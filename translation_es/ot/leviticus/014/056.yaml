translation:
  language: es
  text: y para la hinchazón, y para la costra[a], y para la mancha brillante[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘erupción’ o ‘sarpullido’ para ‘costra’ (סַפַּחַת); el sentido dermatológico exacto es incierto.
    reason: lexical_alternative
  - marker: b
    text: O ‘mancha clara’ o, en contexto, ‘mancha blanca’ para ‘mancha brillante’ (בֶּהֶרֶת).
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאֵת
  english_pob_choice: swelling
  chosen_spanish: hinchazón
  alternatives_spanish:
  - tumefacción
  - elevación
  - hinchazón de la piel
  lexicon: HALOT
  rationale: En el contexto de Levítico 13–14, el término designa una lesión o elevación visible en la piel. 'Hinchazón' comunica bien la idea de aumento o abultamiento sin forzar un diagnóstico más preciso que el hebreo no da.
- source_word: סַפַּחַת
  english_pob_choice: scab
  chosen_spanish: costra
  alternatives_spanish:
  - erupción
  - sarpullido
  - escama
  lexicon: HALOT
  rationale: La POB inglesa opta por 'scab' y deja abierta la incertidumbre dermatológica. En español, 'costra' conserva un sentido natural y observable dentro del conjunto de señales cutáneas, sin cerrar el término a una identificación médica que el hebreo no especifica.
- source_word: בֶּהֶרֶת
  english_pob_choice: bright spot
  chosen_spanish: mancha brillante
  alternatives_spanish:
  - mancha clara
  - parche brillante
  - mancha blanca
  lexicon: HALOT
  rationale: El hebreo apunta a una mancha de aspecto brillante o claro en el lenguaje diagnóstico sacerdotal. 'Mancha brillante' sigue de cerca ese valor semántico y evita precisar 'blanca' donde el término base enfatiza brillo o luminosidad.
- source_word: וְ/לַ
  english_pob_choice: and for
  chosen_spanish: y para
  alternatives_spanish:
  - y respecto de
  - y acerca de
  - y en cuanto a
  lexicon: Gramática hebrea
  rationale: La secuencia conjuntiva más preposición introduce los elementos de una lista legal. 'Y para' reproduce el paralelismo enumerativo de forma natural en español.
translation_notes:
  revision_awareness: El texto coincide con la lectura estable del expediente inglés y no requiere revisión adicional; se mantiene la lista breve y diagnóstica del hebreo.
  spanish_consistency_notes:
  - Se conserva el paralelismo repetido de ‘y para’ para reflejar la estructura enumerativa del hebreo.
  - Se evita ‘SEÑOR’ u otra terminología teológica porque el verso es una lista nominal de afecciones cutáneas, no una fórmula divina.
  - ‘Mancha brillante’ mantiene la ambigüedad del término hebreo y deja abierta la alternativa contextual ‘mancha blanca’ en nota.
