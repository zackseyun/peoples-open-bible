review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: reciprocidad en «no se veían unos a otros», inmovilidad por tres días, y contraste de luz para Israel. Sin embargo, «hubo luz» atenúa la fuerza posesiva/experiencial de הָיָה אוֹר en contraste con los egipcios; «tenían luz» o «había luz» se alinea mejor con el inglés auditado y con el contexto. También «por tres días» es comprensible, pero «durante tres días» suena más natural en español bíblico general.'
  spanish_quality_summary: El español es claro y digno. «Moradas» y «los hijos de Israel» son aceptables y legibles. La principal mejora es hacer más natural la expresión temporal y ajustar la última cláusula para expresar que los israelitas disfrutaban de luz en sus viviendas, no simplemente que 'ocurrió' luz.
  glossary_alignment: No hay términos del glosario mayor en conflicto. «Los hijos de Israel» preserva bien בְּנֵי יִשְׂרָאֵל. No hay asuntos con Yahvé/Mesías/etc. La decisión recíproca para רָאוּ ... אֶת אָחִיו está bien resuelta.
  issues:
  - severity: medium
    issue: «hubo luz» para הָיָה אוֹר
    rationale: Aunque idiomático, «hubo luz» suena más existencial/eventivo. El contexto contrasta la experiencia de los israelitas con la oscuridad egipcia; «tenían luz» reproduce mejor la disponibilidad/posesión destacada en el audit trail inglés.
  - severity: low
    issue: «por tres días»
    rationale: Es entendible, pero «durante tres días» es más natural y fluido en español general para duración continua.
  revised_spanish_text: No se veían unos a otros[a], y nadie se levantó de su lugar durante tres días; pero todos los hijos de Israel tenían luz[b] en sus moradas.
