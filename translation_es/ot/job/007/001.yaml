translation:
  language: es
  text: ¿No está el hombre sometido a duro servicio[a] en la tierra, y no son sus días como los de un jornalero?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿No tiene el hombre guerra en la tierra?». El hebreo צָבָא puede significar servicio militar o guerra; aquí, por el paralelismo con «un jornalero», probablemente se refiere más ampliamente a un servicio arduo e impuesto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is not ... ?
  chosen_spanish: ¿No ... ?
  alternatives_spanish:
  - ¿Acaso no ... ?
  - ¿No es verdad que ... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación. En español, «¿No ... ?» conserva con naturalidad ese valor interrogativo sin añadir matiz innecesario.
- source_word: צָבָא
  english_pob_choice: consigned to hard service
  chosen_spanish: un tiempo de duro servicio
  alternatives_spanish:
  - guerra
  - servicio
  - fatiga
  - tiempo de servicio obligado
  lexicon: HALOT
  rationale: El hebreo puede referirse a servicio militar, guerra o a un período de servicio impuesto. En Job 7:1, el paralelo con «los días de un jornalero» favorece la idea de una faena penosa y obligada; «duro servicio» mantiene esa tensión sin reducirlo a guerra literal.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un ser humano
  - el mortal
  lexicon: HALOT
  rationale: El término resalta la fragilidad humana. «El hombre» funciona como referente genérico en español y conserva el alcance representativo del hebreo.
- source_word: עַל־אָרֶץ
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el mundo
  lexicon: HALOT
  rationale: Es una expresión locativa directa y natural en español. «En la tierra» preserva el ámbito general de la existencia humana.
- source_word: שָׂכִיר
  english_pob_choice: a hired worker
  chosen_spanish: un jornalero
  alternatives_spanish:
  - un trabajador contratado
  - un asalariado
  - un peón contratado
  lexicon: HALOT
  rationale: El hebreo designa a quien trabaja por paga. «Jornalero» comunica bien en español la condición de trabajador remunerado y, en este contexto, la vida sometida a labor diaria y temporal.
- source_word: יָמָיו
  english_pob_choice: his days
  chosen_spanish: sus días
  alternatives_spanish:
  - los días de su vida
  - su vida
  lexicon: HALOT
  rationale: Se conserva la metáfora temporal del hebreo. «Sus días» reproduce el paralelismo con el trabajo contratado sin explicitar más de lo que el texto dice.
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantuvo estable en su lectura principal: una pregunta retórica sobre la condición humana entendida como servicio penoso, no como guerra literal. La revisión disponible no introdujo cambios sustanciales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino explícito; este versículo no contiene el Tetragrámaton.
  - «Jornalero» se usa por la fuerza contextual de trabajo contratado y temporal; en otros contextos, «hired worker» podría requerir «trabajador contratado» si el matiz legal fuera más importante.
  - La puntuación conserva la duplicación retórica del hebreo con dos preguntas coordinadas.
