  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé» correctamente; צֶדֶק → «justicia» adecuado; מִקְוֵה → «esperanza» adecuado; no hay conflictos teológicos relevantes. La elección «morada de la justicia» es aceptable como equivalente de «habitation of righteousness», con nota alternativa. '
