  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀγαπητοί, μὴ ξενίζεσθε τῇ ἐν ὑμῖν πυρώσει πρὸς πειρασμὸν ὑμῖν γινομένῃ ὡς ξένου ὑμῖν συμβαίνοντος,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/012.yaml
  text: 'Beloved, do not be surprised at the fiery trial among you that is happening to test you, as though something strange were happening to you.'
translation:
  language: ko
  text: '사랑하는 여러분, 여러분 가운데서 시험을 위해 일어나는 불 같은 시련을 이상한 일이 일어난 것처럼 이상히 여기지 마십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῇ ἐν ὑμῖν πυρώσει
  english_pob_choice: the fiery trial among you
  chosen_korean: 여러분 가운데서 ... 불 같은 시련
  alternatives_korean:
  - 너희 안의 불 시험
  - 너희 가운데 일어나는 화염의 시련
  lexicon: BDAG
  rationale: πύρωσις는 「불태움·불 시험」. 1:7의 금속 연단 비유와 어울리는 「불 같은 시련」으로 옮긴다.
- source_word: πρὸς πειρασμὸν ὑμῖν γινομένῃ
  english_pob_choice: that is happening to test you
  chosen_korean: 시험을 위해 일어나는
  alternatives_korean:
  - 너희를 시험하기 위해 닥치는
  lexicon: BDAG
  rationale: 1:6의 πειρασμός와 통일하여 「시험」 사용.
- source_word: ξενίζεσθε ... ξένου συμβαίνοντος
  english_pob_choice: do not be surprised ... as though something strange were happening
  chosen_korean: 이상한 일이 일어난 것처럼 이상히 여기지 마십시오
  alternatives_korean:
  - 낯선 일을 당하는 것처럼 낯설어하지 마십시오
  lexicon: BDAG
  rationale: 동근 어휘 ξενίζω / ξένος의 언어유희를 한국어 「이상히」/「이상한」으로 보존.
