review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y las decisiones principales del hebreo: «Habla», «los hijos de Israel», «un hombre», «voto especial», «personas» y «Yahvé». Sin embargo, «conforme a tu valuación de personas» suena poco natural en español y además el anclaje de la nota alternativa no corresponde bien, porque la nota ofrece precisamente «según tu valuación de personas», que no es una alternativa sustancial frente al texto principal. También conviene ajustar la preposición final a «a Yahvé» para seguir más de cerca לַיהוָה en esta construcción.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «valuación» resulta forzado y menos legible en contexto bíblico; «valoración» comunica mejor el sentido técnico sin perder precisión. Asimismo, «para Yahvé» es entendible, pero «a Yahvé» suena más directo y más cercano al giro hebreo de dedicación. Las notas deben alinearse mejor con el texto revisado y con el verdadero punto difícil del hebreo.
  glossary_alignment: Se mantiene correctamente «Yahvé» para יהוה y «los hijos de Israel» para בְּנֵי יִשְׂרָאֵל. «Un hombre» preserva la elección gender-accurate de אִישׁ. «Personas» para נְפָשֹׁת sigue bien la guía del proyecto. La principal mejora terminológica es preferir «valoración» sobre «valuación» por naturalidad en español e inteligibilidad eclesial amplia.
  issues:
  - severity: medium
    issue: «Valuación» suena poco natural en español bíblico general
    rationale: Aunque es comprensible, «valoración» es mucho más idiomático y conserva el valor técnico de עֶרֶךְ sin introducir una palabra áspera o poco común para muchos lectores.
  - severity: medium
    issue: La nota [a] no presenta una alternativa real frente al texto principal
    rationale: El texto dice «conforme a tu valuación de personas» y la nota ofrece «según tu valuación de personas», que es casi equivalente; la nota debería recoger una alternativa significativa o explicar la dificultad de la frase con una formulación verdaderamente distinta.
  - severity: low
    issue: «para Yahvé» puede ajustarse a «a Yahvé»
    rationale: Ambas opciones son defendibles, pero «a Yahvé» sigue más de cerca la dirección expresada por לְ en este contexto y suena natural en español bíblico.
  revised_spanish_text: 'Habla a los hijos de Israel y diles: Cuando un hombre haga un voto especial, según tu valoración[a] de personas, a Yahvé[b],'
  revised_footnotes:
