translation:
  language: es
  text: 'Pero escucha esto acerca de la multiplicación de los impíos: si tuvieras muy pocas piedras escogidas,'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: impios uero multiplicari, audi haec
  english_pob_choice: But hear this about the multiplication of the ungodly
  chosen_spanish: Pero escucha esto acerca de la multiplicación de los impíos
  alternatives_spanish:
  - Pero oye esto sobre el multiplicarse de los impíos
  - Mas escucha esto respecto de la multiplicación de los impíos
  lexicon: impios -> impíos; multiplicari -> multiplicación / multiplicarse; audi haec -> escucha esto
  rationale: 'Conservo el sentido proposicional del latín: no solo ''oye'', sino una exhortación a atender una declaración sobre el crecimiento de los impíos. ''Multiplicación'' refleja el sustantivo abstracto y mantiene el tono del contexto apocalíptico.'
- source_word: Lapides electos
  english_pob_choice: choice stones
  chosen_spanish: piedras escogidas
  alternatives_spanish:
  - piedras selectas
  - piedras elegidas
  lexicon: lapides -> piedras; electos -> escogidos / selectos
  rationale: '''Escogidas'' transmite bien electos y evita ''preciosas'', que no está exigido por este tramo latino revisado. Mantiene la imagen concreta de piedras seleccionadas.'
- source_word: si habueris paucos ualde
  english_pob_choice: if you have very few
  chosen_spanish: si tuvieses muy pocas
  alternatives_spanish:
  - si tuvieras muy pocas
  - si hubieres muy pocas
  lexicon: si + habueris -> si tienes / si tuvieses; paucos valde -> muy pocas
  rationale: Opto por el subjuntivo imperfecto de cortesía/hipotético en español para reproducir la condición latina sin sonar artificial. 'Muy pocas' conserva el énfasis de ualde.
theological_decisions:
- issue: Determinación del alcance de la frase sobre los impíos y la imagen de las piedras escogidas
  english_pob_reading: 'But hear this about the multiplication of the ungodly: if you have very few choice stones,'
  chosen_spanish_reading: 'Pero escucha esto acerca de la multiplicación de los impíos: si tuvieses muy pocas piedras escogidas,'
  alternative_spanish_readings:
  - 'Pero escucha esto sobre el multiplicarse de los impíos: si tuvieras muy pocas piedras escogidas,'
  - 'Mas escucha esto acerca de la multiplicación de los impíos: si tuvieses muy pocas piedras escogidas,'
  rationale: Sigo el latín revisado del tramo citado y no incorporo material de la lectura corrupta posterior sobre plomo y barro, porque no pertenece a este segmento base. La frase queda abierta, como en el texto fuente.
  doctrine_reference: No doctrinal claim beyond the source image; follows textual criticism and source delimiting.
translation_notes:
  revision_awareness: Esta versión sigue la revisión más reciente que restauró la cláusula inicial sobre la multiplicación de los impíos y limitó el texto a la unidad latina dada, sin incorporar la expansión corrupta de plomo y barro. La nota alternativa se conserva solo para la forma condicional española.
  spanish_consistency_notes:
  - Se usa 'impíos' para impios, en consonancia con el registro bíblico y sin suavizar el juicio moral.
  - '''Piedras escogidas'' preserva la imagen material del latín electos sin introducir ''precioso'' que no está atestiguado aquí.'
  - No se añade contenido ausente del segmento fuente; la sintaxis queda intencionalmente inconclusa porque el original también lo está.
