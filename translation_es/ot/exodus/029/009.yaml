revisions:
- from: Y atarás a ellos el cinto de Aarón y de sus hijos, y les pondrás gorros[a]. El sacerdocio será de ellos[b], por estatuto perpetuo. Así investirás a Aarón y a sus hijos.
  to: Les ceñirás cintos a Aarón y a sus hijos, y les pondrás gorros. El sacerdocio será suyo por estatuto perpetuo. Así investirás[a] a Aarón y a sus hijos.
  rationale: Se corrige la naturalidad y precisión del español («Les ceñirás cintos»), se evita el singular engañoso «el cinto», se mantiene el tono formal y la equivalencia cultual, y se reubica la nota literal del idiomático hebreo al lugar correcto, eliminando la nota innecesaria sobre «el sacerdocio será suyo». No hace falta adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja la estructura general del hebreo: ceñir la prenda de cintura a Aarón y sus hijos, ponerles cubrecabezas, afirmar que el sacerdocio les pertenece como estatuto duradero, y luego instalar/ordenar a Aarón y sus hijos. Sin embargo, hay dos desajustes importantes: (1) el singular «el cinto» no refleja bien אַבְנֵט con objeto plural implícito para todos ellos; en español conviene «cintos» o «fajas». (2) La nota [a] está anclada en «gorros», pero su contenido corresponde a וּמִלֵּאתָ יַד / «investirás», no al cubrecabezas. Además, la nota [b] no es necesaria porque el texto ya comunica bien la posesión del sacerdocio.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Y atarás a ellos» suena poco natural; «Les ceñirás» o «Les ajustarás» es mejor español bíblico moderno. «El sacerdocio será de ellos» es comprensible, aunque «será suyo» o «les pertenecerá» suena más idiomático; no obstante, puede mantenerse una formulación formal cercana al original. «Así investirás» funciona bien para el idiomático final.
  glossary_alignment: 'No hay conflicto con la terminología teológica principal del proyecto. Las decisiones clave son más de precisión léxica y legibilidad: mejorar חָגַרְתָּ ... אַבְנֵט con «ceñirás ... cintos», mantener מִגְבָּעֹת como «gorros» o equivalente, conservar לְחֻקַּת עוֹלָם como «estatuto perpetuo/permanente», y preservar el idiomático וּמִלֵּאתָ יַד mediante «investirás» con nota literal correctamente anclada.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en «gorros», pero explica el modismo «llenar la mano» del verbo final.
    rationale: 'Esto rompe la auditabilidad: la nota debe ir anclada exactamente donde aparece la expresión que comenta, es decir, en «investirás» o la frase final equivalente.'
  - severity: medium
    issue: «el cinto de Aarón y de sus hijos» usa singular donde el sentido exige una prenda para cada uno.
    rationale: El hebreo אַבְנֵט con objeto plural y referente «Aarón y sus hijos» implica ceñirlos con sus respectivos cintos/fajas, no un solo cinto compartido.
  - severity: medium
    issue: «Y atarás a ellos» es español torpe y poco natural.
    rationale: Aunque intenta reflejar la acción de fijar la prenda, «ceñirás» expresa mejor el acto ritual en español claro y digno.
  - severity: low
    issue: La nota [b] es innecesaria y añade explicación teológica no requerida por una ambigüedad real del español.
    rationale: «El sacerdocio será suyo» o equivalente ya comunica asignación/posesión. Mantener una nota aquí sobrecarga el texto sin necesidad.
