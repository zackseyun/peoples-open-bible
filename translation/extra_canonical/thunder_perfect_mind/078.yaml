- source_word: ⲛ̄ ⲛⲟⲩⲧⲉ (among gods)
  chosen: among gods
  alternatives:
  - among the gods
  - amid gods
  lexicon: Crum (prepositional n̄)
  rationale: Simple, rhythmic, keeps parallelism with other catalog members.
- source_word: ⲙⲏⲛ ⲉⲣⲟϥ/ⲉⲣⲟⲉⲓ
  chosen: abide (with)
  alternatives:
  - remain
  - stay
  lexicon: Crum (ⲙⲏⲛ ‘to remain, abide’)
  rationale: “Abide” retains the weighty, durative sense that fits Thunder’s register
    and echoes the Coptic verb.
