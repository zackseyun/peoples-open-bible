lexical_decisions:
- source_word: דִּרְשׁוּ
  english_pob_choice: Seek
  chosen_spanish: Buscad
  alternatives_spanish:
  - Busquen
  - Buscadle
  lexicon: HALOT
  rationale: דרש expresa aquí una búsqueda activa y exhortativa dirigida a Dios. «Buscad» conserva bien el imperativo plural y la fuerza devocional del hebreo, sin volverlo una explicación más larga como «inquirid».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte por el nombre propio divino en español conforme al criterio del proyecto. «Yahvé» preserva el nombre revelado de Dios y evita la sustitución por un título.
- source_word: וְעֻזּוֹ
  english_pob_choice: and his strength
  chosen_spanish: y su fuerza
  alternatives_spanish:
  - y su poder
  - y su fortaleza
  lexicon: HALOT
  rationale: עֹז denota fuerza, vigor o poder. «Fuerza» sigue de cerca la elección inglesa y mantiene el paralelo con el segundo hemistiquio sin introducir una noción distinta como «fortaleza» en sentido de refugio.
- source_word: בַּקְּשׁוּ
  english_pob_choice: seek
  chosen_spanish: buscad
  alternatives_spanish:
  - busquen
  - procurad
  lexicon: HALOT
  rationale: בקש refuerza la idea de búsqueda diligente. En español, repetir «buscad» conserva el paralelismo poético con דִּרְשׁוּ y mantiene la exhortación compacta y natural.
- source_word: פָנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su presencia
  lexicon: HALOT
  rationale: פנים significa literalmente «rostro», aunque idiomáticamente puede aludir a la presencia personal. Se mantiene la imagen concreta en el texto principal porque es fiel y comprensible; la lectura interpretativa queda implícita sin borrar la metáfora.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - constantemente
  lexicon: HALOT
  rationale: תמיד expresa continuidad o constancia. «Continuamente» reproduce bien ese valor temporal y suena natural en español bíblico moderno.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La decisión doctrinal del POB es preservar el nombre personal de Dios en lugar de ocultarlo tras un título. En español, «Yahvé» es la forma establecida para ese propósito y refleja el mismo criterio que la base inglesa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen de «buscar su rostro»
  english_pob_reading: his face / his presence
  chosen_spanish_reading: su rostro
  alternative_spanish_readings:
  - su presencia
  rationale: La expresión hebrea usa literalmente «rostro», con posible sentido idiomático de presencia. Se conserva la imagen concreta en el cuerpo del versículo y se deja la alternativa semántica como trasfondo, sin sustituirla por una abstracción que borre la figura.
  doctrine_reference: POB lexical policy on preserving source imagery when intelligible
translation_notes:
  revision_awareness: El pasaje coincide con la última revisión marcada como sin cambios; el inglés auditado mantiene la decisión estable de traducir יְהוָה por el nombre divino y de conservar la imagen concreta de «face/rostro». No se documentan cambios aplicados posteriores.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» en lugar de una sustitución por título.
  - 'Se conserva el paralelismo poético con dos imperativos de búsqueda: «Buscad...; buscad...».'
  - «Rostro» se usa de forma literal en el texto, con nota para la lectura idiomática de «presencia».
  - El registro es bíblico actual y digno, sin arcaísmos innecesarios.
