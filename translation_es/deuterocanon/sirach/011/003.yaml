translation:
  language: es
  text: La abeja es pequeña entre las criaturas voladoras[a], pero lo principal de los productos es su fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La abeja es pequeña entre las aves, y su fruto es lo principal de las cosas dulces». El hebreo habla de «productos/rendimientos», mientras que el paralelo griego especifica «cosas dulces».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלִיל / μικρὰ
  english_pob_choice: small
  chosen_spanish: pequeña
  alternatives_spanish:
  - insignificante
  - menuda
  - diminuta
  lexicon: HALOT; LXX μικρά
  rationale: En contexto proverbial, el adjetivo expresa tamaño reducido, no desprecio moral. «Pequeña» es natural en español y conserva la comparación con las demás criaturas voladoras.
- source_word: בְּעוֹף / ἐν πετεινοῖς
  english_pob_choice: among flying creatures
  chosen_spanish: entre las criaturas voladoras
  alternatives_spanish:
  - entre las aves
  - entre los seres alados
  lexicon: HALOT; LXX πετεινοῖς
  rationale: «Criaturas voladoras» preserva la amplitud del hebreo y del griego, sin estrechar indebidamente el campo semántico a «aves».
- source_word: דְּבֹרָה / μέλισσα
  english_pob_choice: the bee
  chosen_spanish: la abeja
  lexicon: HALOT; LXX μέλισσα
  rationale: Equivalencia directa y transparente; el artículo definido es natural en español proverbial.
- source_word: וְרֹאשׁ / ἀρχή
  english_pob_choice: the chief
  chosen_spanish: el principal
  alternatives_spanish:
  - el jefe
  - el primero
  - el que encabeza
  lexicon: HALOT; LSJ; BDAG
  rationale: «ראשׁ/ἀρχή» aquí expresa primacía o preeminencia, no necesariamente «comienzo». «El principal» conserva la idea de prioridad destacada sin forzar una imagen temporal.
- source_word: תְּנוּבוֹת / γλυκασμάτων
  english_pob_choice: produce
  chosen_spanish: los productos
  alternatives_spanish:
  - la producción
  - el rendimiento
  - las cosechas
  lexicon: HALOT; LXX γλυκασμάτων
  rationale: El hebreo habla de «producción/productos»; el griego añade un matiz de «cosas dulces», pero el texto hebreo base no lo exige. «Productos» mantiene la imagen agrícola sin introducir «dulce» en el texto principal.
- source_word: פּרִיָהּ / ὁ καρπὸς αὐτῆς
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su producción
  - lo que produce
  lexicon: HALOT; LXX καρπὸς
  rationale: «Fruto» reproduce de manera directa el cierre metafórico del hebreo y del griego. En español suena natural y mantiene el paralelismo proverbial.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés POB que corrigió la lectura previa para evitar añadir «sweet» al miembro hebreo de תְּנוּבוֹת. Por eso la versión española no incorpora «dulces» en el texto principal, aunque se reconoce en la nota la diferencia con el griego γλυκασμάτων.
  spanish_consistency_notes:
  - Se preservó el paralelismo breve y proverbial del original.
  - Se evitó reemplazar la imagen de «fruto» por una explicación interpretativa como «miel», ya que el hebreo y el griego mantienen la metáfora.
  - La nota al pie ofrece la alternativa tradicional «aves» sin imponerla en el texto principal.
