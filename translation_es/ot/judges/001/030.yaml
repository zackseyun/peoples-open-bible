    text: O «Nahalal»; la tradición inglesa y pasajes relacionados a veces conservan esa forma del nombre.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «el cananeo habitó en medio de él/ello», con un singular colectivo para el pueblo y un sufijo singular que probablemente se refiere a Zabulón como tribu.'
    reason: lexical_alternative
  revision_rationale: Se ajustó el colectivo «el cananeo» a «los cananeos» para seguir la decisión documentada del POB y mejorar la naturalidad en español, manteniendo la alternativa hebrea en nota. Se reemplazó «llegaron a ser esclavos de trabajos forzados» por «quedaron sometidos a trabajos forzados» porque expresa con precisión el estado resultante de ויהיו למס sin añadir «esclavos», que sobreinterpreta מַס. También se suavizó la conexión narrativa con «así que» y «vivieron entre ellos».
