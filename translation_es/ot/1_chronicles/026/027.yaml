translation:
  language: es
  text: De las guerras y del botín consagraron estas cosas para fortalecer la casa de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «De las batallas y del despojo consagraron». El hebreo deja sin expresar el objeto directo, y «botín» también puede traducirse «despojo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַמִּלְחָמוֹת
  english_pob_choice: From the wars
  chosen_spanish: De las guerras
  alternatives_spanish:
  - De las batallas
  lexicon: HALOT
  rationale: מִן expresa origen o procedencia, y הַמִּלְחָמוֹת es plural de guerra/batalla. 'Guerras' conserva el sentido colectivo amplio y suena natural en español bíblico contemporáneo.
- source_word: וּמִן הַשָּׁלָל
  english_pob_choice: and from the spoil
  chosen_spanish: y del botín
  alternatives_spanish:
  - y del despojo
  - y del saqueo
  lexicon: HALOT
  rationale: שָׁלָל designa lo tomado en guerra. 'Botín' es un equivalente claro y común en español; mantiene el campo semántico militar sin perder concisión.
- source_word: הִקְדִּישׁוּ
  english_pob_choice: they had dedicated them
  chosen_spanish: lo[s] dedicaron
  alternatives_spanish:
  - los dedicaron
  - lo consagraron
  lexicon: HALOT
  rationale: El verbo Hifil de קדשׁ significa apartar/dedicar como santo. El hebreo omite el objeto, por lo que el español debe suplirlo; se conserva la ambigüedad con 'lo[s]' para reflejar el objeto implícito sin forzarlo en singular o plural.
- source_word: לְחַזֵּק
  english_pob_choice: to strengthen
  chosen_spanish: para fortalecer
  alternatives_spanish:
  - para fortalecerlo
  - para dar apoyo
  lexicon: HALOT
  rationale: חזק en el infinitivo significa fortalecer/hacer fuerte. 'Fortalecer' es la correspondencia más directa y natural; 'dar apoyo' sería más interpretativo.
- source_word: לְבֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: בַּיִת con el nombre divino se refiere al santuario/templo, pero el hebreo dice literalmente 'casa'. Se mantiene la imagen con 'casa de Yahvé', siguiendo el principio del proyecto de transliterar YHWH como 'Yahvé'.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente; conforme a la convención del proyecto en español, se translitera como 'Yahvé' en lugar de ocultarlo con una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Objeto implícito de הִקְדִּישׁוּ
  english_pob_reading: they had dedicated them
  chosen_spanish_reading: lo[s] dedicaron
  alternative_spanish_readings:
  - los dedicaron
  - lo dedicaron
  rationale: El hebreo deja el objeto sin expresar. El español requiere completarlo; el uso de corchetes mantiene visible la elipsis y la incertidumbre sobre número/entidad del objeto, sin resolverla más allá de la evidencia.
  doctrine_reference: 'Hebreo sintáctico: objeto elíptico en la construcción verbal'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se conservó el sentido de procedencia con מִן, se mantuvo el campo bélico con ''guerras/botín'', y se reflejó la elipsis del objeto en הִקְדִּישׁוּ. En español, se eligió ''Yahvé'' para el Tetragrámaton conforme a la terminología del proyecto.'
  spanish_consistency_notes:
  - '''Casa de Yahvé'' preserva la imagen hebrea y evita reemplazarla automáticamente por ''templo'', aunque el referente sea el santuario.'
  - Se usó 'botín' como equivalente natural de שָׁלָל; 'despojo' queda consignado como alternativa.
  - La forma 'lo[s]' intenta respetar la indeterminación del objeto implícito del hebreo sin imponer género o número.
