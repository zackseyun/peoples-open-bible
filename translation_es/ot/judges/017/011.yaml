- from: Así que el levita[a] accedió[b] a quedarse con el hombre, y el joven llegó a ser como uno de sus hijos para él.
  to: Así que el levita accedió[a] a quedarse con el hombre, y el joven llegó a ser como uno de sus hijos[b].
  rationale: Se elimina una nota innecesaria sobre «el levita», se conserva la alternativa léxica relevante para וַיּוֹאֶל, y se añade la nota cultural que sí está documentada en el POB inglés para explicar el sentido de la segunda cláusula. También se aligera la redacción española quitando «para él» del cuerpo del texto y trasladando esa explicación al pie, donde suena más natural y sigue siendo fiel al hebreo.
