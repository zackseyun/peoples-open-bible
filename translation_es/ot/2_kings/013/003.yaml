translation:
  language: es
  text: La ira de Yahvé se encendió contra Israel, y los entregó[a] en manos de Hazael, rey de Aram[b], y en manos de Ben-hadad, hijo de Hazael, todos aquellos días[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “en manos de”, un modismo que significa bajo el poder o control de otro.'
    reason: lexical_alternative
  - marker: b
    text: Aram es el nombre hebreo que en traducciones más antiguas suele aparecer como “Siria”.
    reason: alternative_reading
  - marker: c
    text: 'O: “todos los días”, es decir, durante todo ese período.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: anger burned
  chosen_spanish: la ira ... se encendió
  alternatives_spanish:
  - se encendió su ira
  - ardió su ira
  - se inflamó la ira
  lexicon: HALOT
  rationale: El hebreo usa una imagen vívida de ira que se ‘enciende’ o ‘arde’. En español, ‘se encendió’ conserva esa metáfora de manera natural y digna, sin volverla plana con ‘se enojó’.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, conforme al criterio de la POB en español. ‘Yahvé’ comunica el nombre revelado, en lugar de sustituirlo por un título.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - con Israel
  - en Israel
  lexicon: HALOT
  rationale: Con verbos de ira, el hebreo expresa hostilidad dirigida a Israel. ‘Contra’ transmite esa relación adversativa en español.
- source_word: וַיִּתְּנֵם
  english_pob_choice: he gave them
  chosen_spanish: los entregó
  alternatives_spanish:
  - los dio
  - los puso
  - los entregó en poder de
  lexicon: HALOT
  rationale: En contexto de juicio militar, ‘entregar’ conserva el valor de dar/poner bajo dominio sin sonar tan literal que oscurezca el sentido narrativo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  - en poder de
  lexicon: HALOT
  rationale: La locución hebrea es un modismo de control o dominio. ‘En manos de’ mantiene la imagen corporal del original y resulta idiomático en español.
- source_word: חֲזָאֵל מֶלֶךְ אֲרָם
  english_pob_choice: Hazael king of Aram
  chosen_spanish: Hazael, rey de Aram
  alternatives_spanish:
  - Hazael, rey de Siria
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se conserva ‘Aram’ para reflejar el topónimo hebreo, tal como hace la POB inglesa, en lugar de sustituirlo por la forma tradicional ‘Siria’.
- source_word: בֶּן הֲדַד בֶּן חֲזָאֵל
  english_pob_choice: Ben-hadad son of Hazael
  chosen_spanish: Ben-hadad, hijo de Hazael
  alternatives_spanish:
  - Benhadad, hijo de Hazael
  lexicon: HALOT
  rationale: Se preserva la genealogía explícita del hebreo y la forma onomástica usual con guion para claridad de lectura en español.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all those days
  chosen_spanish: todos aquellos días
  alternatives_spanish:
  - todos los días
  - durante todo ese tiempo
  - todo ese tiempo
  lexicon: HALOT
  rationale: La frase temporal apunta a una duración prolongada y contextual. ‘Todos aquellos días’ reproduce bien la fuerza temporal sin convertirla en una paráfrasis excesiva.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La POB parte del texto hebreo y mantiene el nombre personal de Dios. En español, ‘Yahvé’ preserva esa decisión teológica y textual, evitando la sustitución por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión del juicio mediante ‘dar/entregar en manos de’
  english_pob_reading: he gave them into the hand of
  chosen_spanish_reading: los entregó en manos de
  alternative_spanish_readings:
  - los dio en manos de
  - los puso en manos de
  - los entregó al poder de
  rationale: No se suaviza el modismo hebreo; se conserva la imagen de dominio y sometimiento, que forma parte del lenguaje de juicio en el relato.
  doctrine_reference: Uso idiomático hebreo de בְּיַד en contexto de dominación militar
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés: el texto inglés reciente mantiene ‘Yahweh’, ‘into the hand of’ y ‘all those days’. No se detectaron cambios sustantivos en la última pasada revisada, por lo que la propuesta española sigue de cerca esas decisiones mientras las adapta al español natural.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de forma consistente para יְהוָה.
  - Se conserva ‘Aram’ en lugar de ‘Siria’ para alinearse con el toponímico hebreo auditado.
  - Se usa ‘en manos de’ como equivalente idiomático estable para בְּיַד en contextos de entrega/sometimiento.
  - La puntuación y el orden buscan legibilidad en español sin perder la estructura causal y narrativa del hebreo.
