translation:
  language: es
  text: No confíes en las riquezas engañosas[a][b], porque no te servirán de nada en el día de la ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego de este versículo dice, en cambio: «Si tienes entendimiento, responde a tu prójimo; pero si no, que tu mano esté sobre tu boca». El hebreo conservado aquí es sustancialmente distinto, y esta traducción sigue el hebreo como texto base.'
    reason: textual_variant
  - marker: b
    text: También puede entenderse como «riquezas falsas», «bienes fraudulentos» o «riquezas de mentira». El hebreo puede describir bienes marcados por el engaño, ya sea porque fueron obtenidos con falsedad o porque resultan engañosos por su falta de fiabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּבְטַח
  english_pob_choice: Do not trust
  chosen_spanish: No te fíes
  alternatives_spanish:
  - No confíes
  - No pongas tu confianza
  lexicon: HALOT
  rationale: El hebreo expresa una prohibición en forma de imperativo negativo. En español, «fíar(se)» transmite con naturalidad la idea de depositar confianza; «No te fíes» suena idiomático y conserva la fuerza de advertencia sapiencial.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - en
  lexicon: HALOT
  rationale: Aunque el hebreo usa literalmente una preposición de apoyo o dependencia, en español la construcción natural con «fiarse» es «fiarse en/de». Aquí «en» mantiene la relación de confianza sin sonar forzado.
- source_word: נִכְסֵי
  english_pob_choice: wealth
  chosen_spanish: las riquezas
  alternatives_spanish:
  - los bienes
  - la riqueza
  - las posesiones
  lexicon: HALOT
  rationale: El término hebreo se refiere a bienes/recursos acumulados. «Riquezas» comunica bien el sentido colectivo y encaja con el tono proverbial; además permite mantener el plural implícito del hebreo.
- source_word: שֶׁקֶר
  english_pob_choice: deceitful
  chosen_spanish: engañosas
  alternatives_spanish:
  - falsas
  - fraudulentas
  - de mentira
  lexicon: HALOT
  rationale: 'El hebreo asocia esas riquezas con la idea de falsedad/engaño. «Engañosas» conserva esa ambigüedad: puede aludir a riquezas obtenidas con engaño o a riquezas que resultan ilusorias y no confiables.'
- source_word: לֹא יוֹעִילוּ
  english_pob_choice: will not profit
  chosen_spanish: no te aprovecharán
  alternatives_spanish:
  - no te servirán
  - no te beneficiarán
  - no rendirán provecho
  lexicon: HALOT
  rationale: El verbo expresa dar beneficio o provecho. «No te aprovecharán» mantiene el valor de utilidad y suena natural en español bíblico contemporáneo.
- source_word: בְּיוֹם
  english_pob_choice: in the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - cuando llegue el día de
  lexicon: HALOT
  rationale: Se conserva la formulación proverbial y solemne del hebreo sin añadir interpretación temporal adicional.
- source_word: עֶבְרָה
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - indignación
  - ira divina
  lexicon: HALOT
  rationale: El hebreo dice «ira/wrath» con posible resonancia judicial. En español, «ira» preserva el alcance fuerte sin especificar un sujeto que el texto no nombra. No se añade «divina» para no resolver una tensión que el hebreo deja abierta.
theological_decisions:
- issue: Si traducir עֶבְרָה con un término genérico o con carga judicial más fuerte
  english_pob_reading: wrath
  chosen_spanish_reading: ira
  alternative_spanish_readings:
  - furor
  - ira divina
  - juicio
  rationale: El contexto sapiencial sugiere un tiempo de rendición de cuentas, pero el hebreo no nombra explícitamente a Dios como sujeto. «Ira» conserva la severidad del término sin importar una formulación doctrinal más específica de la que el texto ofrece.
  doctrine_reference: Preservar la tensión textual sin resolverla de manera dogmática.
- issue: Seguir el hebreo como texto primario frente al paralelo griego divergente
  english_pob_reading: Translate the Hebrew as primary for this verse
  chosen_spanish_reading: Traducir el hebreo como texto primario
  alternative_spanish_readings:
  - Alinear la traducción con el griego paralelo
  - Combinar ambos testimonios en una sola redacción
  rationale: El testimonio hebreo disponible para este versículo es sustancialmente distinto del griego, que ofrece otra sentencia. Conforme al criterio del proyecto, se traduce el hebreo primario y se reconoce la existencia del paralelo griego sin permitir que lo reemplace.
  doctrine_reference: Primacía de la lengua original atestiguada; respeto por la variante textual sin fusionarla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios adicionales; aun así, la presente redacción se ajusta al testimonio hebreo primario y mantiene visible la divergencia con el griego paralelo, conforme al expediente auditado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «ira» por coherencia con la severidad del hebreo עֶבְרָה, sin añadir un sujeto teológico explícito.
  - Se evitó «SEÑOR» y otras fórmulas tradicionales porque el texto hebreo no las exige y el expediente destaca la primacía del hebreo frente al paralelo griego.
