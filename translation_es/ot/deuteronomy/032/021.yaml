base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/032/021.yaml
  text: They made me jealous with what is not a god[a]; they provoked me to anger with their idols. So I will make them jealous with those who are not a people[c][b]; I will provoke them to anger with a foolish nation.
  footnotes:
  - marker: a
    text: Or 'with their worthless things' or 'with their vanities'; the Hebrew term can denote emptiness and, in context, idols.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a no-people'; the Hebrew deliberately parallels 'what is not a god.'
    reason: lexical_alternative
  - marker: c
    text: '''Foolish'' here carries a moral-spiritual sense, not merely lack of intelligence.'
    reason: cultural_note
