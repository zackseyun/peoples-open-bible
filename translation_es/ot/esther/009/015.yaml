revisions:
- from: Los judíos que estaban en Susa también se reunieron[a] en el día catorce del mes de Adar, y mataron a trescientos hombres en Susa; pero no pusieron[b] mano en el botín.
  to: Los judíos que estaban en Susa también se reunieron el día catorce del mes de Adar, y mataron a trescientos hombres en Susa; pero no le echaron mano[a] al botín.
  rationale: Se corrige un leve calco («en el día catorce») para lograr un español más natural sin perder la forma calendárica del hebreo. También se reemplaza «no pusieron mano en el botín» por «no le echaron mano al botín», que suena más idiomático en español y conserva el sentido de no apropiarse del botín. Se mantiene la nota solo en el modismo final, donde la alternativa más literal sí aporta valor exegético.
