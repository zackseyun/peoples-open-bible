translation:
  language: es
  text: Hay éxito para un hombre en cosas malas[a], y hay una ganancia que termina en pérdida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hay prosperidad en cosas malas para un hombre, y hay un hallazgo para disminución». El griego es proverbial y algo comprimido; esta traducción explicita el sentido probable sin conservar toda la ambigüedad formal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔστιν εὐοδία
  english_pob_choice: There is success
  chosen_spanish: Hay prosperidad
  alternatives_spanish:
  - Hay éxito
  - Hay buen resultado
  - Hay buena fortuna
  lexicon: LSJ
  rationale: 'εὐοδία denota un camino o resultado favorable. En español, «prosperidad» conserva la idea de buen resultado con un matiz proverbial y evita sonar demasiado técnico o moderno como «éxito», que puede estrechar el sentido. Se mantiene la ironía del dicho: alguien puede “prosperar” aun en lo malo.'
- source_word: ἐν κακοῖς
  english_pob_choice: in evil things
  chosen_spanish: en cosas malas
  alternatives_spanish:
  - en males
  - por medio de males
  - en circunstancias malas
  lexicon: LSJ
  rationale: La lectura moral es la que mejor encaja con el tono sapiencial del proverbio. «Cosas malas» traduce con naturalidad el plural neutro κακοῖς sin convertirlo en una abstracción excesiva ni limitarlo a circunstancias adversas.
- source_word: ἀνδρί
  english_pob_choice: for a man
  chosen_spanish: para un hombre
  alternatives_spanish:
  - para una persona
  - para alguien
  lexicon: LSJ
  rationale: El griego usa singular masculino. Se conserva «un hombre» por fidelidad de género y porque la forma proverbial funciona con naturalidad en español.
- source_word: εὕρεμα
  english_pob_choice: a gain
  chosen_spanish: una ganancia
  alternatives_spanish:
  - un hallazgo
  - un provecho
  - una ganancia obtenida
  lexicon: LSJ
  rationale: εὕρεμα puede referirse a algo encontrado o adquirido como ventaja. «Ganancia» expresa bien el contraste proverbial con la pérdida final y resulta idiomática en español.
- source_word: εἰς ἐλάττωσιν
  english_pob_choice: that leads to loss
  chosen_spanish: que lleva a disminución
  alternatives_spanish:
  - que termina en pérdida
  - para menoscabo
  - que conduce a reducción
  lexicon: LSJ
  rationale: La frase apunta literalmente a una reducción o menoscabo. «Lleva a disminución» mantiene la dirección del griego sin añadir una interpretación demasiado específica como «pérdida», aunque esa sea una implicación natural.
translation_notes:
  revision_awareness: El texto griego de Sabiduría/Sirácida 20:8 es proverbial y comprimido. La redacción española sigue la lectura de sentido ya adoptada en el POB inglés, pero conserva el paralelismo y la tensión entre una ganancia aparente y una disminución real.
  spanish_consistency_notes:
  - Se prefirió «prosperidad» en lugar de «éxito» para mantener un registro sapiencial y proverbiales.
  - Se evitó «SEÑOR» u otra terminología ajena al versículo, ya que no aparece lenguaje divino en este pasaje.
  - «Disminución» refleja el valor literal de ἐλάττωσις y deja abierta la posibilidad de entender la pérdida como reducción o menoscabo.
