review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura básica del versículo y en el uso de «Yahvé» para יְהוָה, pero no preserva plenamente dos decisiones clave del expediente POB inglés: (1) la nota colocada en [a] debe corresponder a נִכְבָּדְתָּ, no a יָסַפְתָּ; y (2) כָּל קַצְוֵי אָרֶץ fue decidido contextualmente como «todos los límites/fronteras de la tierra/land», con alternativa en nota para «los confines de la tierra», mientras que el borrador invierte esa prioridad y además omite la nota sobre la alternativa global. También «aumentar a la nación» suena menos natural que «aumentar la nación».'
  spanish_quality_summary: 'El español es generalmente claro, pero presenta detalles mejorables: «oh Yahvé» es aceptable, aunque «Yahvé» entre comas suena más natural en español bíblico moderno; «te has cubierto de gloria» introduce un modismo no anclado directamente en el hebreo ni en la decisión inglesa «you have gained glory»; y «todos los confines de la tierra» desplaza el sentido territorial contextual hacia una lectura más global. «Has aumentado la nación» y «has extendido todos los límites de la tierra» son más fieles y naturales.'
  glossary_alignment: Se alinea bien con el proyecto en «Yahvé». No hay términos doctrinales mayores en juego. Sin embargo, el expediente léxico-teológico del POB pide priorizar «land» en este contexto; por tanto, en español debe privilegiarse «tierra» en sentido territorial con «límites»/«fronteras», no «confines» como texto principal. También conviene reflejar mejor el valor resultativo de נִכְבָּדְתָּ con «has ganado gloria» o similar, preservando alternativas en nota.
  issues:
  - severity: high
    issue: Las notas al pie no corresponden a las decisiones del POB inglés ni a los anclajes correctos.
    rationale: La nota [a] en el expediente inglés pertenece a נִכְבָּדְתָּ («you have gained glory»), no a יָסַפְתָּ. Además falta una nota para la alternativa de כָּל קַצְוֵי אָרֶץ («los confines de la tierra» / «los extremos de la tierra»).
  - severity: high
    issue: «Todos los confines de la tierra» como texto principal no sigue la decisión contextual principal del source packet.
    rationale: El POB inglés decidió «all the borders of the land» por el contexto de aumento nacional y extensión territorial. El español debe reflejar esa prioridad, dejando la lectura más global como alternativa en nota.
  - severity: medium
    issue: «Te has cubierto de gloria» sobreinterpreta el hebreo y se aparta de la formulación auditada.
    rationale: Aunque idiomática, esa expresión introduce un giro reflexivo-imagístico no exigido por נִכְבָּדְתָּ. «Has ganado gloria» comunica mejor el resultado sin añadir imagen metafórica.
  - severity: low
    issue: «Has aumentado a la nación» es menos natural en español.
    rationale: 'Con «aumentar» y objeto directo colectivo, el español fluye mejor sin la preposición: «has aumentado la nación».'
  revised_spanish_text: Has aumentado la nación, Yahvé; has aumentado la nación; has ganado gloria[a]; has extendido todos los límites de la tierra[b].
  revised_footnotes:
  - marker: a
