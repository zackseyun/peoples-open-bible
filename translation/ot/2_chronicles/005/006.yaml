id: 2CH.5.6
reference: 2 Chronicles 5:6
source:
  edition: WLC
  text: וְ/הַ/מֶּ֣לֶךְ שְׁלֹמֹ֗ה וְ/כָל עֲדַ֧ת יִשְׂרָאֵ֛ל הַ/נּוֹעָדִ֥ים עָלָ֖י/ו לִ/פְנֵ֣י הָ/אָר֑וֹן מְזַבְּחִים֙ צֹ֣אן וּ/בָקָ֔ר אֲשֶׁ֧ר לֹֽא יִסָּפְר֛וּ וְ/לֹ֥א יִמָּנ֖וּ מֵ/רֹֽב־־׃
translation:
  text: And King Solomon and all the assembly of Israel who had assembled before him[a], before the ark[b], were sacrificing sheep and cattle that could not be counted or numbered because of their great number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who were assembled with him' for 'who had gathered before him.' The Hebrew expression may be understood as the assembly gathered in Solomon's presence or gathered with him.
    reason: lexical_alternative
  - marker: b
    text: '''Sheep'' renders Hebrew צֹאן, a broader term that can include small livestock such as sheep and goats.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדַת יִשְׂרָאֵל
  chosen: the assembly of Israel
  alternatives:
  - the congregation of Israel
  - the whole community of Israel
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community. 'Assembly' is natural modern English and preserves the corporate, gathered sense without sounding overly ecclesiastical.
- source_word: הַנּוֹעָדִים
  chosen: who had gathered
  alternatives:
  - who were assembled
  - who had assembled themselves
  lexicon: HALOT
  rationale: The Niphal participle of יעד here describes those convened/assembled. 'Who had gathered' reads smoothly in English and fits the participial description of the people present.
- source_word: עָלָיו
  chosen: before him
  alternatives:
  - with him
  - around him
  lexicon: HALOT
  rationale: Although על can have a range of spatial senses, in this context with the gathered assembly and the following 'before the ark,' the sense is that the assembly was present before/with Solomon. 'Before him' best reflects the immediate syntax while preserving the formal relation.
- source_word: לִפְנֵי הָאָרוֹן
  chosen: before the ark
  alternatives:
  - in front of the ark
  lexicon: HALOT
  rationale: A straightforward spatial expression. 'Before the ark' is idiomatic biblical English and sufficiently clear.
- source_word: מְזַבְּחִים
  chosen: were sacrificing
  alternatives:
  - were offering sacrifices of
  - sacrificed
  lexicon: HALOT
  rationale: The participle conveys ongoing action in the scene. 'Were sacrificing' preserves the verbal force without adding the object 'of' that is not explicit.
- source_word: צֹאן וּבָקָר
  chosen: sheep and cattle
  alternatives:
  - flocks and herds
  - small livestock and cattle
  lexicon: HALOT
  rationale: צֹאן refers to small livestock, often sheep/goats; בָּקָר refers to cattle. 'Sheep and cattle' is a conventional and clear rendering, though somewhat narrowing צֹאן. Given common sacrificial context, this is acceptable readable English.
- source_word: אֲשֶׁר לֹא יִסָּפְרוּ וְלֹא יִמָּנוּ
  chosen: that could not be counted or numbered
  alternatives:
  - which could not be counted or reckoned
  - too many to count or number
  lexicon: HALOT
  rationale: The paired verbs are near-synonyms used for emphasis. Retaining both in English preserves the Hebrew intensification rather than collapsing them into a single phrase.
- source_word: מֵרֹב
  chosen: because of their great number
  alternatives:
  - for multitude
  - because they were so many
  lexicon: HALOT
  rationale: This expresses the reason the animals could not be counted. 'Because of their great number' is clear modern English and preserves the causal sense.
