translation:
  language: es
  text: El nacido en tu casa y el que hayas comprado con tu dinero[b][c][a] deberán ser circuncidados, y mi pacto estará en su carne como pacto eterno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "ciertamente deberán ser circuncidados". El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: Las expresiones "nacido en tu casa" y "comprado con tu dinero" describen miembros del hogar de Abraham, incluidos los nacidos allí y los adquiridos por compra.
    reason: cultural_note
  - marker: c
    text: 'También puede traducirse: "El que nace en tu casa y el que compras con tu dinero".'
    reason: previous_rendering
lexical_decisions:
- source_word: הִמּוֹל יִמּוֹל
  english_pob_choice: must surely be circumcised
  chosen_spanish: será circuncidado sin falta
  alternatives_spanish:
  - deberá ser circuncidado
  - será ciertamente circuncidado
  lexicon: HALOT
  rationale: El infinitivo absoluto con imperfecto intensifica la obligación o certeza del acto. En español, "sin falta" comunica bien la fuerza enfática sin volver la frase rígida o excesivamente legalista. "Será circuncidado" mantiene la pasiva verbal del hebreo.
- source_word: יְלִיד בֵּיתְךָ
  english_pob_choice: the one born in your house
  chosen_spanish: el nacido en tu casa
  alternatives_spanish:
  - el que ha nacido en tu casa
  - el de tu casa nacido
  lexicon: HALOT
  rationale: La expresión hebrea designa a quien pertenece al ámbito doméstico por nacimiento. "El nacido en tu casa" es natural en español y conserva la referencia individual sin añadir 'esclavo' donde el hebreo de la frase no lo explicita directamente.
- source_word: וּמִקְנַת כַּסְפֶּךָ
  english_pob_choice: the one bought with your money
  chosen_spanish: el comprado con tu dinero
  alternatives_spanish:
  - el adquirido con tu dinero
  - el comprado con tu plata
  lexicon: HALOT
  rationale: '"Comprado" refleja el valor mercantil del término; "dinero" es más idiomático en español contemporáneo que "plata" y sigue el sentido económico del hebreo. La formulación breve permite paralelismo con "el nacido en tu casa".'
- source_word: בְרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: '"Pacto" es el equivalente bíblico más claro y conservador para בְרִית, manteniendo el carácter relacional y formal del término sin sustituirlo por una glosa interpretativa.'
- source_word: בִּבְשַׂרְכֶם
  english_pob_choice: in your flesh
  chosen_spanish: en vuestra carne
  alternatives_spanish:
  - en vuestra piel
  - sobre vuestra carne
  lexicon: HALOT
  rationale: '"Carne" preserva el término bíblico saráx/בשר y la localización corporal del signo. Se usa "vuestra" porque el hebreo termina en plural, aunque la dirección inicial sea singular en el contexto inmediato; el plural es importante para mantener la forma gramatical del hebreo en la cláusula final.'
- source_word: לִבְרִית עוֹלָם
  english_pob_choice: as an everlasting covenant
  chosen_spanish: como pacto perpetuo
  alternatives_spanish:
  - como pacto eterno
  - para pacto perpetuo
  lexicon: HALOT
  rationale: '"Pacto perpetuo" transmite bien la durabilidad de עוֹלָם y conserva la estructura nominal del hebreo. "Como" refleja adecuadamente el valor funcional/resultativo de ל, sin convertir la frase en una paráfrasis doctrinal.'
theological_decisions:
- issue: Relación entre la señal física y el pacto
  english_pob_reading: The verse states that the covenant is present in the flesh through circumcision, without expanding beyond the text into later theological systems.
  chosen_spanish_reading: El pacto está en la carne mediante la circuncisión, sin desarrollar más allá del texto una teoría sacramental o meramente simbólica.
  alternative_spanish_readings:
  - La circuncisión solo simboliza el pacto
  - La circuncisión identifica de manera directa el pacto
  rationale: La frase hebrea mantiene una tensión entre signo corporal y lenguaje de pacto. La traducción conserva esa cercanía directa entre pacto y carne, evitando resolver la relación en una dirección doctrinal que el versículo no explicita.
  doctrine_reference: Preservar la tensión teológica del texto, no resolverla
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se conservó la intensificación del infinitivo absoluto, el paralelismo de los dos miembros del hogar, y la fórmula covenantal sin sobreinterpretación. La revisión inglesa reciente solo suavizó la fluidez; en español se siguió esa misma naturalidad con un sintagma breve y paralelo.'
  spanish_consistency_notes:
  - Se mantiene "pacto" para בְרִית, conforme al uso bíblico estable del proyecto.
  - Se conserva "carne" para בשר para no diluir el vínculo corporal del signo.
  - '"Yahvé" no aparece en este versículo.'
  - Se eligió "dinero" en lugar de "plata" por naturalidad española, sin perder el sentido económico del hebreo.
  - La cláusula final conserva el carácter de pacto perpetuo sin convertir ל en una paráfrasis causal.
