base_translation:
  language: en
  yaml_path: translation/ot/genesis/050/005.yaml
  text: My father made me swear[a], saying, ‘Behold, I am dying. In my grave that I dug for myself in the land of Canaan, there you shall bury me.’ So now, please let me go up and bury my father; then I will return.
  footnotes:
  - marker: a
    text: Or 'hewed out for myself.' The Hebrew verb literally means 'dug,' though in burial contexts it can refer more broadly to preparing a grave.
    reason: lexical_alternative
