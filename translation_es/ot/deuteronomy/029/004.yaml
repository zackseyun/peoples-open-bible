translation:
  language: es
  text: Y los conduje cuarenta años por el desierto; sus ropas no se gastaron en ti[a], y tu sandalia no se gastó en tu pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo pasa del plural («sus ropas») al singular («tu sandalia», «tu pie») en la cláusula final; el singular probablemente trata a Israel como un solo cuerpo o usa un singular distributivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאוֹלֵךְ
  english_pob_choice: I led
  chosen_spanish: los conduje
  alternatives_spanish:
  - los guié
  - los hice andar
  lexicon: HALOT
  rationale: El piel/causativo de הלך, en este contexto del éxodo y la travesía, pide en español un verbo de guía o conducción. «Conduje» comunica bien la acción divina sin volverla mecánica ni demasiado literal.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - en el desierto
  - en la estepa
  lexicon: HALOT
  rationale: «Desierto» es la forma más natural y reconocible en español para el ámbito de la travesía de Israel. «Por» refleja el movimiento durante el período de peregrinación, sin perder el valor locativo general.
- source_word: בָּלוּ / בָלְתָה
  english_pob_choice: did not wear out
  chosen_spanish: no se gastaron / no se gastó
  alternatives_spanish:
  - no se desgastaron / no se desgastó
  - no se consumieron / no se consumió
  lexicon: HALOT
  rationale: בלה aplicado a ropa y sandalias expresa desgaste por uso. «Gastarse» es una opción clara y natural en español, y conserva la imagen concreta del deterioro físico.
- source_word: שַׂלְמֹתֵיכֶם
  english_pob_choice: your clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus vestidos
  lexicon: HALOT
  rationale: El hebreo habla de prendas de vestir en general. «Vestidos» mantiene un tono bíblico digno en español y sigue siendo suficientemente amplio en este contexto.
- source_word: מֵעֲלֵיכֶם
  english_pob_choice: on you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - de sobre ustedes
  - en ustedes
  lexicon: HALOT
  rationale: La expresión literal es «de encima de ustedes», pero en español, con el verbo «gastarse», «sobre ustedes» comunica la idea de desgaste mientras las prendas estaban siendo usadas.
- source_word: נַעַלְךָ
  english_pob_choice: your sandal
  chosen_spanish: la sandalia de tu pie
  alternatives_spanish:
  - tu sandalia
  - tu calzado
  lexicon: HALOT
  rationale: Conservo la singularidad del hebreo final. «Sandalia» es más precisa que «zapato» y respeta el objeto concreto del texto; añado «de tu pie» para reflejar el paralelismo con la cláusula hebrea final.
- source_word: מֵעַל רַגְלֶךָ
  english_pob_choice: on your foot
  chosen_spanish: de tu pie
  alternatives_spanish:
  - sobre tu pie
  - de sobre tu pie
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente «de sobre tu pie». En español, después de «sandalia», «de tu pie» suena natural y preserva la relación espacial sin forzar una expresión extraña.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  alternatives_spanish:
  - por cuarenta años
  - durante cuarenta años
  lexicon: HALOT
  rationale: La duración es directa y no requiere expansión. «Cuarenta años» es la forma más clara y fiel en español.
theological_decisions:
- issue: 'Cambio de número en la última cláusula: plural a singular'
  english_pob_reading: Retain the singular in English for the final clause
  chosen_spanish_reading: 'Mantener el singular en la cláusula final: «la sandalia de tu pie»'
  alternative_spanish_readings:
  - 'pluralizar: «sus sandalias ... sus pies»'
  - 'suavizar a una pluralidad colectiva: «su sandalia ... sus pies»'
  rationale: El hebreo alterna de plural a singular al final. Conservar el singular en español respeta la señal textual y permite entender el uso corporativo o distributivo sin borrar la tensión observada por la POB inglesa.
  doctrine_reference: Principios de fidelidad textual y atención a las formas del original
- issue: Referencia implícita al pueblo como colectivo
  english_pob_reading: your clothes ... your sandal ... your foot
  chosen_spanish_reading: El pueblo se mantiene como sujeto colectivo, pero la última cláusula conserva el singular
  alternative_spanish_readings:
  - uniformar todo al plural
  - uniformar todo al singular
  rationale: La alternancia no debe neutralizarse del todo. En español, el plural inicial y el singular final pueden coexistir con naturalidad y reflejar la lectura corporativa del texto.
  doctrine_reference: Principios de precisión gramatical y semántica
- issue: Elección de «desierto» frente a «wilderness»
  english_pob_reading: in the wilderness
  chosen_spanish_reading: por el desierto
  alternative_spanish_readings:
  - en el desierto
  - por la región desértica
  rationale: No hay una carga doctrinal especial aquí; la decisión es de registro y claridad. «Desierto» conserva la referencia histórica y bíblica sin distanciar al lector moderno.
  doctrine_reference: Principios de legibilidad y resonancia bíblica
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente y coincide con la revisión inglesa más reciente, que no introdujo cambios. Se preserva la alternancia de número observada en el hebreo y no se suaviza la imagen concreta del desgaste de ropa y sandalia.
  spanish_consistency_notes:
  - Se usó «Y» inicial para reflejar el arranque narrativo del hebreo, pero en un español fluido.
  - «Desierto» se eligió como equivalente natural de מִדְבָּר en este contexto de peregrinación.
  - Se mantuvo la singularidad de la última cláusula para no borrar la tensión textual documentada.
  - «Sandalia» se prefirió a «zapato» por precisión histórica y léxica.
