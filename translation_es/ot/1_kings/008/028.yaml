    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos problemas de fidelidad y uno de presentación: elimina el añadido «rostro», reemplaza «está haciendo» por «está orando» para reflejar מִתְפַּלֵּל, y mueve la nota [b] al término «clamor», que es donde corresponde por el hebreo הָרִנָּה. También suaviza la puntuación vocativa a un español más fluido sin alterar el sentido.'
