revisions:
- from: Los hijos de Jacob vinieron sobre los muertos[a] y saquearon la ciudad[b], porque habían deshonrado a su hermana.
  to: Los hijos de Jacob llegaron a los caídos[a] y saquearon la ciudad[b], porque su hermana había sido mancillada.
  rationale: Se revisa para eliminar la ambigüedad severa del sujeto en la cláusula causal, preservar mejor el valor de טִמְּאוּ con «mancillada», mejorar la naturalidad de בָּאוּ עַל en español, y corregir las notas para que reflejen alternativas reales y el carácter comprimido de la sintaxis hebrea.
  reviewer_model: gpt-5.4
