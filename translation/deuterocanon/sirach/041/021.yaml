translation:
  text: of staring at the face of another man’s wife[a], and of drawing near to her maidservant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew זרה can also be rendered 'a strange woman' or 'a foreign woman'; the Greek parallel reads 'a married woman,' which supports the more specific sense 'another man’s wife.'
