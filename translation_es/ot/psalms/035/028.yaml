    reason: lexical_alternative
  - marker: b
    text: O “tu justicia”. El hebreo puede denotar tanto rectitud como justicia, especialmente en contextos de vindicación.
    reason: lexical_alternative
  - marker: c
    text: O “alabanza de ti”. La expresión hebrea puede entenderse como alabanza dirigida a Dios o alabanza que le pertenece.
    reason: lexical_alternative
