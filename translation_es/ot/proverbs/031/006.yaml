translation:
  language: es
  text: Den licor fuerte al que se va perdiendo[a], y vino a los de alma amargada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al que está muriendo». El participio hebreo puede referirse de modo amplio a alguien que perece, se arruina o está cerca de la muerte.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «a los amargos de alma», un modismo para una profunda angustia o miseria interior.'
    reason: cultural_note
lexical_decisions:
- source_word: תְּנוּ
  english_pob_choice: Give
  chosen_spanish: Den
  alternatives_spanish:
  - Den ustedes
  - Dad
  lexicon: HALOT
  rationale: El imperativo plural hebreo pide un mandato directo. «Den» conserva la fuerza exhortativa y suena natural en español moderno.
- source_word: שֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: licor fuerte
  alternatives_spanish:
  - bebida fuerte
  - licor
  - bebida alcohólica
  lexicon: HALOT
  rationale: El hebreo designa una bebida alcohólica embriagante, distinta del vino. «Licor fuerte» mantiene la fuerza léxica sin especificar indebidamente una bebida concreta.
- source_word: לְאוֹבֵד
  english_pob_choice: to one who is perishing
  chosen_spanish: al que se va perdiendo
  alternatives_spanish:
  - al que perece
  - al que está muriendo
  - al que se pierde
  lexicon: HALOT
  rationale: El participio puede abarcar la idea de alguien que perece, se arruina o está cercano a la muerte. «Se va perdiendo» conserva esa amplitud y permite la progresión verbal del español.
- source_word: וְיַיִן
  english_pob_choice: and wine
  chosen_spanish: y vino
  alternatives_spanish:
  - y vino
  - y el vino
  lexicon: HALOT
  rationale: Coincidencia léxica directa; no hay motivo para apartarse del equivalente estándar.
- source_word: לְמָרֵי נָפֶשׁ
  english_pob_choice: to those bitter in soul
  chosen_spanish: a los de[b] amargado el alma
  alternatives_spanish:
  - a los de alma amargada
  - a los amargados de alma
  - a los de espíritu amargo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «amargos de alma». En español, «amargado el alma» conserva el giro figurado y la tensión idiomática sin reducirlo a una sola paráfrasis interpretativa.
- source_word: נָפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - alma
  - vida
  - ser interior
  lexicon: HALOT
  rationale: Aquí נָפֶשׁ apunta al interior afectado por aflicción. «Alma» preserva el valor idiomático tradicional y sigue siendo inteligible en español contemporáneo.
theological_decisions:
- issue: Si la traducción debe suavizarse para evitar que parezca una aprobación general del alcohol
  english_pob_reading: Retain the imperative sense as stated in the Hebrew without interpretive softening.
  chosen_spanish_reading: Mantener el imperativo tal como está en el hebreo, sin atenuarlo ni reinterpretarlo en el texto principal.
  alternative_spanish_readings:
  - Añadir una restricción interpretativa en el texto principal
  - Reformular como uso medicinal o irónico
  rationale: El hebreo presenta mandatos directos y no añade una limitación interna en este versículo. Cualquier evaluación ética o contextual pertenece a la interpretación del pasaje, no a la traducción de esta línea.
  doctrine_reference: Primacía del texto original; no paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: El paso de revisión más reciente indicó que no se necesitaban cambios; esta versión mantiene la lectura de alta concordancia y conserva la amplitud semántica documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «alma» para נָפֶשׁ por consistencia con el matiz idiomático de la frase y por su correspondencia con la nota de «bitter in soul».
  - «Licor fuerte» fue preferido sobre «vino fuerte» o una especificación etnográfica, porque el hebreo distingue aquí una bebida fermentada/intoxicante del vino sin precisar especie.
  - La frase verbal «se va perdiendo» intenta reflejar la ambigüedad entre ruina, agonía y muerte, evitando cerrar el sentido solo a una de esas opciones.
