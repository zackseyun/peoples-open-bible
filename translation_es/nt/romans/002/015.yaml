    reason: lexical_alternative
  - marker: b
    text: O «sus pensamientos se acusan o incluso se defienden unos a otros»; el griego tiene de manera más literal un sentido recíproco, «unos a otros».
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal porque es fiel al griego y al POB inglés. Solo se corrige la nota [b] para que refleje la alternativa recíproca documentada, en vez de introducir «excusan», que no corresponde a la revisión auditada en este versículo.
