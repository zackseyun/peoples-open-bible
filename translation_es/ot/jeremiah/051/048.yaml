translation:
  language: es
  text: Entonces el cielo y la tierra, y todo lo que hay en ellos, gritarán[a] de gozo sobre Babilonia, porque desde el norte vendrán contra ella[b] los destructores, declara Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cantarán de gozo sobre Babilonia».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «vendrá a ella»; por el contexto, el sentido es hostil: «vendrán contra ella» o «vendrán sobre ella».'
    reason: lexical_alternative
  - marker: c
    text: Yahvé traduce el nombre divino YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: וְרִנְּנוּ
  english_pob_choice: will shout for joy
  chosen_spanish: gritarán de gozo
  alternatives_spanish:
  - cantarán de gozo
  - se alegrarán
  lexicon: HALOT
  rationale: רנן expresa un clamor gozoso, no solo una alegría interior. «Gritarán de gozo» conserva el carácter vocal y exultante del verbo, con una intensidad natural en español.
- source_word: שָׁמַיִם וָאָרֶץ וְכֹל אֲשֶׁר בָּהֶם
  english_pob_choice: heaven and earth, and all that is in them
  chosen_spanish: el cielo y la tierra, y todo lo que hay en ellos
  alternatives_spanish:
  - los cielos y la tierra, y todo lo que hay en ellos
  - el cielo y la tierra con todo lo que en ellos existe
  lexicon: HALOT
  rationale: La expresión es una merisma para abarcar toda la creación. «El cielo y la tierra» es la forma española más natural y fiel, y «todo lo que hay en ellos» refleja de cerca la cláusula relativa hebrea.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - por causa de
  - acerca de
  lexicon: HALOT
  rationale: Con verbos de alegría, עַל marca el motivo u objeto del gozo. «Sobre Babilonia» mantiene la relación preposicional y comunica el júbilo ante su caída sin explicitar de más.
- source_word: מִצָּפוֹן
  english_pob_choice: from the north
  chosen_spanish: desde el norte
  alternatives_spanish:
  - del norte
  - de la parte norte
  lexicon: HALOT
  rationale: Es una indicación direccional sencilla. «Desde el norte» reproduce bien el valor de procedencia y conserva el motivo profético recurrente de Jeremías.
- source_word: יָבוֹא לָהּ
  english_pob_choice: will come against her
  chosen_spanish: vendrán contra ella
  alternatives_spanish:
  - vendrán a ella
  - vendrán sobre ella
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «vendrá a ella», el contexto militar exige sentido hostil. En español, «vendrán contra ella» expresa esa intención invasora sin perder la idea básica de aproximación.
- source_word: הַשּׁוֹדְדִים
  english_pob_choice: the destroyers
  chosen_spanish: los destructores
  alternatives_spanish:
  - los saqueadores
  - los devastadores
  lexicon: HALOT
  rationale: El participio puede denotar quienes devastan o saquean. «Los destructores» sigue la decisión inglesa y encaja con el contexto amplio de ruina de Babilonia, sin restringirlo solo al saqueo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética final se mantiene de forma solemne y directa. Se preserva el nombre divino YHWH como «Yahvé», conforme al criterio del proyecto, en lugar de enmascararlo con «SEÑOR».
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo presenta explícitamente el Tetragrámaton. La forma española del proyecto para YHWH es «Yahvé», que conserva el nombre propio del pacto y evita la sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Dirección de la venida de los destructores
  english_pob_reading: will come against her
  chosen_spanish_reading: vendrán contra ella
  alternative_spanish_readings:
  - vendrán a ella
  - vendrán sobre ella
  rationale: El hebreo base tiene simplemente «vendrá a ella», pero el contexto de invasión y devastación hace necesario explicitar la hostilidad. La traducción elegida mantiene esa tensión contextual sin suavizarla.
  doctrine_reference: Jeremiah 51:48 contextual hostileness from HALOT/POB audit trail
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el artículo antes de «destroyers» para sonar más natural; por eso se refleja «los destructores» sin añadir determinación extra. También se preservó la decisión posterior de usar el nombre divino en forma explícita y no «el SEÑOR».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española estándar para YHWH en todo el texto.
  - Se conserva la merisma «el cielo y la tierra» con «todo lo que hay en ellos» para no perder el alcance total.
  - «Los destructores» sigue el valor nominal plural del participio hebreo sin convertirlo en una paráfrasis más libre.
