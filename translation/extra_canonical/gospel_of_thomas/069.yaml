translation:
  text: Jesus said[1], “Blessed are those who have been persecuted in their heart;
    those are the ones who have truly known the Father. Blessed are those who have
    gone hungry[a][3][2], so that the belly of the one who desires will be filled.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The doubled 3pl pronouns around ‘persecute’ yield a passive sense (‘the
      one whom they have persecuted’). The phrase ‘in their heart’ could refer to
      the persecutors’ hearts or to the inner heart of the persecuted; the Coptic
      allows either, so the translation keeps ‘their’ ambiguous.
    reason: dialect_note
  - marker: '2'
    text: MS reads plural relative ⲛⲉⲧⲙ̄ⲙⲁⲩ (‘those who are there’), normalized by
      Dilley to singular ⲡⲉⲧⲉⲣⲉⲙⲙⲁⲩ. The translation uses ‘these are’ to reflect the
      plural sense.
    reason: textual_variant
  - marker: '3'
    text: ‘Belly’ (ⲡϩⲏ) is concrete and earthy; alternatives ‘stomach’ or ‘gut’ are
      possible. The verb ⲥⲓⲟ can mean ‘be satisfied, be filled’; ‘be filled’ is chosen
      to keep the concrete image with ‘belly.’
    reason: lexical_alternative
  - marker: a
    text: Or 'Blessed is the one whom they have persecuted in their heart; these are
      the ones who have truly known the Father. Blessed is the one who has gone hungry'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲟⲩⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: Crum; Greek loan (makarios) in Coptic
  rationale: Retains the beatitude formula and solemn tone; “happy/fortunate” weakens
    the idiomatic force.
- source_word: ⲇⲓⲱⲕⲉ
  chosen: persecute
  alternatives:
  - pursue
  - harass
  lexicon: Crum; Greek loan diōkō
  rationale: Standard sense in Coptic Thomas beatitudes; preserves judicial/hostile
    nuance rather than neutral “pursue.”
- source_word: ϩⲣⲁⲓ ϩⲛⲡⲉⲩϩⲏⲧ
  chosen: in their heart
  alternatives:
  - within their heart(s)
  - inwardly (in their heart)
  lexicon: Crum (ϩⲏⲧ ‘heart’)
  rationale: Literal prepositional phrase; leaves antecedent of “their” ambiguous
    as in Coptic.
- source_word: ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥ ⲥⲟⲟⲩⲛ ⲡⲉⲓⲱⲧ ϩⲛⲟⲩⲙⲉ
  chosen: who have truly known the Father
  alternatives:
  - who have come to know the Father in truth
  lexicon: Crum (ⲥⲟⲟⲩⲛ ‘know’; ⲡⲉⲓⲱⲧ ‘father’); Layton (ϩⲛ ⲟⲩⲙⲉ idiom)
  rationale: Renders ⲥⲟⲟⲩⲛ as perfective ‘have known’ and ϩⲛⲟⲩⲙⲉ as adverbial ‘truly’
    for idiomatic English.
- source_word: 'ϩⲕⲟ (ms: ⲩ: ⲛⲉⲧϩⲕⲁⲉⲓⲧ)'
  chosen: has gone hungry
  alternatives:
  - has been hungry
  - has hungered
  lexicon: Crum (ϩⲕⲟ ‘to be hungry’)
  rationale: Perfective sense fits beatitude parallel; preserves experiential nuance
    rather than continuing state.
- source_word: ϩⲓⲛⲁ
  chosen: so that
  alternatives:
  - in order that
  lexicon: Layton (Sahidic particle of purpose)
  rationale: Signals purpose/result clause introducing the filling of the belly.
- source_word: ⲥⲓⲟ
  chosen: be filled
  alternatives:
  - be satisfied
  - be sated
  lexicon: Crum (ⲥⲓⲟ ‘be satisfied, be full’)
  rationale: “Filled” keeps concrete imagery with ‘belly’; ‘satisfied’ is an acceptable
    gloss but less vivid.
- source_word: ⲡϩⲏ
  chosen: belly
  alternatives:
  - stomach
  - gut
  lexicon: Crum (ϩⲏ ‘belly, abdomen, stomach’)
  rationale: “Belly” preserves earthy register consistent with Thomas’s stark diction.
- source_word: ⲟⲩⲱϣ
  chosen: desires
  alternatives:
  - longs (for)
  - wants
  lexicon: Crum (ⲟⲩⲱϣ ‘wish, desire’)
  rationale: Active nuance suits the one whose belly will be filled; ‘desire’ retains
    inner-volitional sense.
- source_word: ⲡⲉⲓⲱⲧ
  chosen: the Father
  alternatives:
  - the father
  lexicon: Crum (ⲓⲱⲧ ‘father’)
  rationale: Title-like reference to God in Thomas; capitalization reflects usage
    without adding interpretive gloss.
textual_note: 'Dialect/orthography: The manuscript shows Lycopolitan-influenced forms
  and pronoun usage. Printed text has ⲛⲉⲧⲙ̄ⲙⲁⲩ (plural relative ‘those who are there’),
  which Dilley normalizes to ⲡⲉⲧⲉⲣⲉⲙⲙⲁⲩ; functionally it identifies the referent (‘these
  are’). The beatitude opens with a relative clause using doubled 3pl dependent pronouns
  (ⲁⲛⲧⲟⲟⲩ as subject with object copy ⲛⲛⲧⲟⲟⲩ), a common Coptic strategy that yields
  a passive-sense translation in English (‘the one whom they have persecuted’). The
  phrase ϩⲣⲁⲓ ϩⲛⲡⲉⲩϩⲏⲧ (‘in their heart’) is syntactically attached to the persecution
  clause; the antecedent of ‘their’ is not explicitly clarified by the Coptic and
  is left ambiguous in translation. In the second beatitude, the manuscript line shows
  an orthographic variant for ‘hunger’ (ⲛⲉⲧϩⲕⲁⲉⲓⲧ) normalized as ϩⲕⲟ. The purpose
  clause uses ϩⲓⲛⲁ with a future marker and the infinitive ⲥⲓⲟ (‘be satisfied/filled’).
  Genitival linkage in ⲛⲡϩⲏ ⲛⲡⲉⲧⲉⲣⲉⲟⲩⲱϣ is rendered ‘the belly of the one who desires.’
  No lacunae or restorations are indicated by Dilley for this saying. No POxy Greek
  fragment overlaps Saying 69.'
