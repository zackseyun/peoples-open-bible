  text: Make every effort to come before winter. Eubulus sends greetings to you, and so do Pudens and Linus and Claudia and all the brothers.
translation:
  language: ko
  text: 겨울이 오기 전에 오기를 힘쓰십시오. 으불로가 그대에게 문안하고, 부데와 리노와 글라우디아와 모든 형제들[a]도 그대에게 문안합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「모든 형제자매들」. 헬라어 ἀδελφοί는 남성 복수형이나, 본 문맥에서는 같은 신앙 안에 있는 모든 동료를 가리킬 가능성이 크다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σπούδασον πρὸ χειμῶνος ἐλθεῖν
  english_pob_choice: Make every effort to come before winter
  chosen_korean: 겨울이 오기 전에 오기를 힘쓰십시오
  alternatives_korean:
