translation:
  language: es
  text: Y he aquí, Simeón su hermano; sé que es un hombre de consejo. Escúchenlo todos los días; él será para ustedes un padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Y behold
  lexicon: LSJ
  rationale: ἰδού funciona como marcador de atención. En español, «mira» comunica esa llamada al oyente con registro natural y digno, sin introducir un arcaísmo innecesario.
- source_word: Συμεὼν
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  - Symeón
  lexicon: Convención onomástica española
  rationale: El nombre propio se adapta a la forma usual en español bíblico, conservando la identificación tradicional del personaje.
- source_word: ἀνὴρ βουλῆς
  english_pob_choice: a man of counsel
  chosen_spanish: un hombre de consejo
  alternatives_spanish:
  - un hombre prudente
  - un hombre de juicio
  - un hombre sabio
  lexicon: LSJ
  rationale: La frase griega describe a alguien caracterizado por consejo/discernimiento. «De consejo» conserva mejor la imagen semítica y la fuerza lexical que una paráfrasis como «prudente» o «sabio».
- source_word: αὐτοῦ ἀκούετε
  english_pob_choice: Listen to him
  chosen_spanish: Escúchalo
  alternatives_spanish:
  - Oídlo
  - Presten atención a él
  lexicon: LSJ
  rationale: Con objeto personal, ἀκούω puede implicar atender/hechar oído. «Escúchalo» mantiene el verbo de oír sin sobretraducirlo como obediencia explícita.
- source_word: πάσας τὰς ἡμέρας
  english_pob_choice: all your days
  chosen_spanish: todos tus días
  alternatives_spanish:
  - todos los días de tu vida
  - siempre
  lexicon: LSJ
  rationale: La expresión es literalmente 'todos los días'. En español, «todos tus días» conserva la duración total y el tono personal dirigido a los hijos.
- source_word: εἰς πατέρα
  english_pob_choice: a father to you
  chosen_spanish: para ti un padre
  alternatives_spanish:
  - como padre para ti
  - un padre para ti
  lexicon: LSJ
  rationale: La construcción expresa función/rol, no paternidad literal. «Será para ti un padre» mantiene el sentido metafórico de guía y autoridad sin diluirlo.
theological_decisions:
- issue: Metáfora de paternidad aplicada a Simeón
  english_pob_reading: he will be a father to you
  chosen_spanish_reading: él será para ti un padre
  alternative_spanish_readings:
  - él actuará como padre para ti
  - él será como un padre para ti
  rationale: El griego εἰς πατέρα presenta una función paterna de dirección y cuidado. La redacción en español preserva la metáfora sin convertirla en identidad literal ni moralizarla más allá del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve the source's plain sense without importing claims
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'And look' a 'And behold' para ajustar registro y cercanía con ἰδού. En español se optó por 'Y mira', que cumple la misma función de llamada atencional con naturalidad y dignidad.
  spanish_consistency_notes:
  - 'Se mantuvo el nombre propio en forma española estándar: Simeón.'
  - Se evitó 'señor' o fórmulas eclesiásticas no presentes en el texto fuente.
  - No se añadió puntuación interpretativa que endureciera la exhortación más allá del griego.
