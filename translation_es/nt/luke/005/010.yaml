  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Jesús», «personas» y «socios» están bien alineados. La decisión de no usar «pescadores de hombres» en el texto principal concuerda con la justificación léxica y teológica del POB. Se conserva adecuadamente el matiz alternativo de ζωγρέω en nota.
