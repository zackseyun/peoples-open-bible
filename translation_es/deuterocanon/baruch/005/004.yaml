revisions:
- from: 'Pues tu nombre será llamado por Dios para siempre: «Paz de justicia y gloria de piedad»[a][b].'
  to: 'Porque tu nombre será llamado por Dios para siempre: «Paz de rectitud[a] y gloria de piedad[b]».'
  rationale: 'Se ajusta δικαιοσύνης a ''rectitud'' para seguir la decisión principal auditada (''righteousness'') en español natural, dejando ''justicia'' como alternativa en nota. Se corrigen y redistribuyen las notas para que correspondan exactamente a los términos relevantes: una para δικαιοσύνης y otra para θεοσεβείας. Se mantiene la fórmula de nombramiento y el tono poético del título conferido, con una leve mejora estilística inicial (''Porque'').'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:08:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: fórmula de nombramiento futuro, agente divino, duración permanente y título appositivo. Sin embargo, no refleja adecuadamente la decisión auditada principal sobre δικαιοσύνης, que en este contexto se fijó como ''righteousness'' con ''justice'' solo como alternativa. Además, las notas están invertidas respecto del contenido inglés: la nota sobre ''justice'' debería anclarse en ''justicia/rectitud'', mientras que las alternativas de θεοσεβείας pertenecen a ''piedad''.'
  spanish_quality_summary: El español es legible y digno, pero 'será llamado por Dios' suena algo más forzado que 'recibirá de Dios el nombre' o 'tu nombre será...' en español natural. Aun así, puede mantenerse con una leve mejora de puntuación. La frase titular funciona bien con comillas angulares. Conviene usar 'rectitud' como equivalente principal de 'righteousness' para seguir mejor el razonamiento POB sin caer en un calco poco idiomático.
  glossary_alignment: Alineación parcial. No hay conflicto con terminología mayor del proyecto, pero sí con la preferencia documentada para δικαιοσύνη en este verso. θεοσεβείας como 'piedad' es aceptable, conservando en nota 'reverencia para con Dios' y 'temor/reverencia a Dios' según necesidad; aquí basta 'reverencia para con Dios' como alternativa principal. No se requieren cambios de nombres divinos ni mesiánicos.
  issues:
  - severity: high
    issue: δικαιοσύνης se tradujo como 'justicia' en el texto principal
    rationale: El audit trail inglés eligió explícitamente 'righteousness' como lectura principal en este nombre conferido, dejando 'justice' solo como alternativa. En español, 'rectitud' preserva mejor ese valor amplio y teológico que 'justicia'.
  - severity: high
    issue: Las notas al pie no corresponden correctamente a los términos anclados
    rationale: En el inglés, una nota preserva la alternativa de δικαιοσύνης ('justice') y otra las alternativas de θεοσεβείας ('piety'/'reverence for God'). El borrador pone dos notas al final y una de ellas repite el texto principal ('gloria de piedad') como si fuera alternativa.
  - severity: medium
    issue: Anclaje de notas poco preciso
    rationale: Los marcadores deben aparecer junto al término relevante en el texto, no ambos acumulados al final de toda la cita, para evitar ambigüedad interpretativa.
  - severity: low
    issue: '''Pues'' es posible, pero ''Porque'' refleja más directamente γὰρ en registro bíblico'
    rationale: No es error, pero 'Porque' suena algo más natural y transparente en este contexto solemne.
  revised_spanish_text: 'Porque tu nombre será llamado por Dios para siempre: «Paz de rectitud[a] y gloria de piedad[b]».'
  revised_footnotes:
  - marker: a
    text: O «Paz de justicia».
    reason: lexical_alternative
  - marker: b
    text: O «gloria de reverencia para con Dios».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta δικαιοσύνης a ''rectitud'' para seguir la decisión principal auditada (''righteousness'') en español natural, dejando ''justicia'' como alternativa en nota. Se corrigen y redistribuyen las notas para que correspondan exactamente a los términos relevantes: una para δικαιοσύνης y otra para θεοσεβείας. Se mantiene la fórmula de nombramiento y el tono poético del título conferido, con una leve mejora estilística inicial (''Porque'').'
