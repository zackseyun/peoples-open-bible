  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Además
  lexicon: LSJ
  rationale: La simple coordinación narrativa del griego se conserva mejor en español con 'Y', manteniendo el flujo paratáctico sin añadir matiz temporal o explicativo que el texto no exige.
- source_word: αὐτῷ
  english_pob_choice: he had
  chosen_spanish: tenía
  alternatives_spanish:
  - le pertenecían
  - había para él
  lexicon: LSJ
  rationale: 'El dativo posesivo griego se expresa de manera natural en español con posesión verbal: ''tenía''. Evita la literalidad incómoda de ''a él'' y conserva el sentido de pertenencia.'
- source_word: υἱοὶ πέντε
  english_pob_choice: five sons
  chosen_spanish: cinco hijos
  alternatives_spanish:
  - cinco hijos varones
  - cinco varones
  lexicon: LSJ
  rationale: '''υἱοὶ'' significa literalmente ''hijos'' y, en este contexto genealógico, la referencia es a descendencia masculina. ''Hijos'' suena más natural en español y sigue la amplitud del griego; ''varones'' explicita el sexo, pero añade algo no formulado en el texto.'
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Johán
  - Johanan
  lexicon: LSJ
  rationale: El nombre propio griego Ἰωάννης corresponde al español bíblico 'Juan'. 'Johanan' introduciría una forma semítica no presente en el texto griego.
- source_word: ὁ ἐπικαλούμενος
  english_pob_choice: who was called
  chosen_spanish: llamado
  alternatives_spanish:
  - al que llamaban
  - que era llamado
  - surnombrado
  lexicon: LSJ
  rationale: La construcción participial identifica un apelativo o sobrenombre. 'Llamado' es conciso, idiomático y fiel al valor de identificación sin sobrecargar el español.
- source_word: Γαδδίς
  english_pob_choice: Gaddis
  chosen_spanish: Gaddis
  alternatives_spanish:
  - Gadis
  - Gadís
  lexicon: LSJ
  rationale: Se conserva la transliteración del sobrenombre propio. En español, 'Gaddis' mantiene la forma auditada del inglés POB y evita crear una adaptación no atestiguada en la fuente griega.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y la fuente griega, sin cambios de sentido ni expansión interpretativa. No se detectan revisiones previas ni tensiones textuales relevantes en este versículo.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo breve y genealógico del griego.
  - '''Juan'' se usa como forma bíblica estándar en español para Ἰωάννης.'
  - '''llamado'' reproduce la función identificadora de ὁ ἐπικαλούμενος sin añadir conjeturas sobre un segundo nombre formal.'
