revisions:
- from: En aquel día habrá cinco ciudades en la tierra de Egipto que hablarán la lengua de Canaán y jurarán a Yahvé de los Ejércitos. Una será llamada la Ciudad de Destrucción[a].
  to: En aquel día habrá cinco ciudades en la tierra de Egipto que hablan la lengua de Canaán y juran a Yahvé de los Ejércitos. Una será llamada la Ciudad de Destrucción[a].
  rationale: Se ajusta 'que hablarán' a 'que hablan' para reflejar mejor el valor descriptivo del participio hebreo en un español más natural, y se mantiene la terminología del proyecto. La nota se conserva anclada explícitamente al nombre controvertido de la ciudad.
