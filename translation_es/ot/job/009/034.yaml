translation:
  language: es
  text: Que quite de encima de mí su vara[a], y que no me espante su terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que aparte de mí su vara, y que su pavor no me aterrorice».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: יָסֵר
  english_pob_choice: let him remove
  chosen_spanish: Que quite
  alternatives_spanish:
  - Que remueva
  - Que aparte
  lexicon: HALOT
  rationale: El hebreo tiene valor yusivo/jussivo en contexto de ruego. «Que quite» conserva la petición con naturalidad en español y evita un imperativo directo inapropiado.
- source_word: מֵעָלַי
  english_pob_choice: from upon me
  chosen_spanish: de sobre mí
  alternatives_spanish:
  - de mí
  - de encima de mí
  lexicon: HALOT
  rationale: 'La imagen literal es espacial y de peso: algo está ‘sobre’ Job. «De sobre mí» preserva esa fuerza sin sonar forzado.'
- source_word: שִׁבְטוֹ
  english_pob_choice: his rod
  chosen_spanish: su vara
  alternatives_spanish:
  - su vara de castigo
  - su cetro
  lexicon: HALOT
  rationale: Aunque «vara» puede implicar disciplina o golpe, es la forma más natural en español para mantener el objeto de castigo/señal de autoridad sin introducir una interpretación demasiado específica.
- source_word: וְאֵמָתוֹ
  english_pob_choice: and his terror
  chosen_spanish: su terror
  alternatives_spanish:
  - su pavor
  - su temor
  lexicon: HALOT
  rationale: «Terror» reproduce la intensidad de אֵימָה y sigue la elección del POB inglés. En español funciona bien junto con «espante».
- source_word: אַל
  english_pob_choice: let not
  chosen_spanish: que no
  alternatives_spanish:
  - no permitas que
  - 'no'
  lexicon: HALOT
  rationale: En poesía hebrea expresa prohibición o ruego negativo. «Que no» mantiene el tono suplicante en un español elevado pero claro.
- source_word: תְּבַעֲתַנִּי
  english_pob_choice: frighten me
  chosen_spanish: me espante
  alternatives_spanish:
  - me aterre
  - me asuste
  lexicon: HALOT
  rationale: «Espantar» comunica el sobresalto/amedrentamiento del verbo בעת sin duplicar demasiado «terror». Mantiene el paralelismo semántico con el término anterior.
theological_decisions:
- issue: Referente de la tercera persona
  english_pob_reading: God is addressed indirectly as 'him/his' rather than directly as 'you/your.'
  chosen_spanish_reading: 'Dios sigue referido en tercera persona: «su vara», «su terror».'
  alternative_spanish_readings:
  - «tu vara, tu terror» como خطاب directo a Dios
  rationale: El hebreo usa sufijos de tercera persona, por lo que la traducción conserva esa referencia indirecta y no la suaviza a una segunda persona.
  doctrine_reference: Primacía del texto fuente; preservar tensiones gramaticales y discursivas del original.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo la tercera persona en los posesivos para reflejar el hebreo.
  - «Vara» conserva mejor la imagen de instrumento de disciplina/aflicción que «cetro» en este contexto.
  - El verbo final se eligió por claridad moderna sin perder el tono poético de súplica.
