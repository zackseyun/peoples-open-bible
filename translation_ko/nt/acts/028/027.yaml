  yaml_path: translation/nt/acts/028/027.yaml
  text: For the heart of this people has become dull[a], and with their ears they heard heavily, and they closed their eyes; otherwise they might see with their eyes and hear with their ears and understand with their heart and turn back[b], and I would heal them.
  footnotes:
  - marker: a
    text: "Or 'lest they should see ... hear ... understand ... and turn, and I would heal them.' The Greek conjunction can carry a stronger 'lest/so that not' nuance in this quotation from Isaiah."
    reason: alternative_reading
  - marker: b
    text: "'Turn back' may also be rendered 'turn,' 'return,' or in context 'repent.'"
    reason: lexical_alternative
translation:
  language: ko
  text: 이 백성의 마음이 둔해졌고 귀로 무겁게 들었으며 그들의 눈을 감았기 때문이다. 이는 그들이 눈으로 보고 귀로 듣고 마음으로 깨달아 돌이켜, 내가 그들을 고치지 않게 하려 함이다.〉
  philosophy: optimal-equivalence
