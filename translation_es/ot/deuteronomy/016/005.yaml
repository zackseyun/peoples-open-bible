translation:
  language: es
  text: No podrás sacrificar la Pascua en ninguna de tus puertas[a] que Yahvé tu Dios te da[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sacrificio de la Pascua».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «puertas», una metonimia común para una ciudad o asentamiento.
    reason: cultural_note
lexical_decisions:
- source_word: לֹא תוּכַל
  english_pob_choice: You may not
  chosen_spanish: No podrás
  alternatives_spanish:
  - No puedes
  - No te será permitido
  lexicon: HALOT
  rationale: La construcción con יכל + infinitivo en contexto legal expresa prohibición. En español, «No podrás» comunica la restricción normativa con naturalidad y conserva la fuerza de segunda persona singular.
- source_word: לִזְבֹּחַ
  english_pob_choice: sacrifice
  chosen_spanish: sacrificar
  alternatives_spanish:
  - ofrecer en sacrificio
  - degollar
  lexicon: HALOT
  rationale: En contexto cultual, זבח se refiere al acto sacrificial. «Sacrificar» es la equivalencia breve y precisa en español; «degollar» sería demasiado estrecho y «ofrecer en sacrificio» más explicativo de lo necesario.
- source_word: הַפָּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el sacrificio de la Pascua
  - el cordero de la Pascua
  lexicon: HALOT
  rationale: En este versículo, el objeto puede designar tanto la festividad como la ofrenda pascual. Como el verbo ya expresa el acto sacrificial, «la Pascua» mantiene naturalidad en español sin perder el sentido ritual; la alternativa más explícita queda reflejada en nota.
- source_word: בְּאַחַד שְׁעָרֶיךָ
  english_pob_choice: in any one of your gates
  chosen_spanish: en ninguna de tus puertas
  alternatives_spanish:
  - en cualquiera de tus puertas
  - en una de tus ciudades
  lexicon: HALOT
  rationale: «שער» funciona aquí metonímicamente como acceso/localidad urbana. Elegí «puertas» para conservar la imagen hebrea y deuteronómica; el plural posesivo y la negación totalizada transmiten bien la idea de no hacerlo en ningún asentamiento local.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - Yahveh tu Dios
  - el SEÑOR tu Dios
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se conserva el nombre divino en forma auditable y acorde con la guía del proyecto. «Dios» traduce אֱלֹהֶיךָ de manera directa y familiar en español bíblico contemporáneo.
- source_word: נֹתֵן לָךְ
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te está dando ahora
  lexicon: HALOT
  rationale: El participio expresa acción continua o característica. En español, «te da» mantiene la idea de don actual y permanente sin forzar una perífrasis que suene pesada en este contexto legal.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La pauta del proyecto para יְהוָה es usar «Yahvé» en el texto principal. Esto preserva el nombre del pacto y evita la sustitución litúrgica por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de הַפָּסַח
  english_pob_reading: the Passover / the Passover sacrifice
  chosen_spanish_reading: la Pascua
  alternative_spanish_readings:
  - el sacrificio de la Pascua
  - la víctima pascual
  rationale: El hebreo permite la tensión entre fiesta y sacrificio. Como el verbo ya especifica la acción cultual, «la Pascua» es suficientemente preciso; se preserva la alternativa sacrificial en nota para no borrar la ambigüedad documentada.
  doctrine_reference: HALOT, pasaje cultual de פסח
translation_notes:
  revision_awareness: La redacción sigue el ajuste reciente del audit trail inglés que reforzó la fuerza distributiva de בְּאַחַד con «any one of your gates». En español, la negación totalizada «en ninguna de tus puertas» expresa esa misma prohibición de forma natural y sin perder la imagen hebrea.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto.
  - Se prefirió «la Pascua» en el texto base, dejando la ambigüedad cultual en nota para reflejar el alcance del hebreo.
  - «Puertas» conserva la metonimia de שְׁעָרֶיךָ y es coherente con el estilo de Deuteronomio.
  - El tono es normativo y legal, acorde con el contexto del mandamiento.
