translation:
  text: Do not move aside before a scoffer[a], lest he seat him as one lying in wait before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew of the second line is difficult. Literally, 'lest he seat him as one lying in wait before you.' The Greek parallel gives the broader sense of a dangerous, self-willed man acting against you.
    reason: textual_variant
lexical_decisions:
- source_word: אַל תָּזוּחַ
  chosen: Do not move aside
  alternatives:
  - Do not retreat
  - Do not swerve away
  - Do not give way
  lexicon: HALOT
  rationale: The verb זוח/זוּח here conveys moving away or yielding ground. 'Move aside' preserves the physical metaphor and the warning not to cede position before a contemptuous person. It is more literal than an abstract 'give way,' while still readable.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - because of
  - in the presence of
  lexicon: HALOT
  rationale: The preposition literally means 'from before' or 'before/in the face of.' In English, 'before' best captures the relational sense in this warning context without overloading the line.
- source_word: לֵץ
  chosen: scoffer
  alternatives:
  - mocker
  - scorner
  lexicon: HALOT
  rationale: לֵץ in wisdom literature denotes a contemptuous, derisive person, not merely someone playful. 'Scoffer' is a standard and accurate wisdom-term equivalent, preserving the moral tone better than the more colloquial 'mocker.'
- source_word: לְהוֹשִׁיבוֹ
  chosen: lest he seat him
  alternatives:
  - lest he set him
  - lest he place him
  - lest he make him sit
  lexicon: HALOT
  rationale: The Hebrew infinitive with pronominal suffix is difficult in context. Taken straightforwardly, it means 'to seat/place him.' I preserved the awkwardness rather than paraphrasing away the textual difficulty, since the Hebrew witness is our primary source. The Greek parallel points toward the broader idea of the bold man acting against you as he pleases, which supports a hostile-placement sense.
- source_word: כְּאוֹרֵב
  chosen: as one lying in wait
  alternatives:
  - like an ambusher
  - as an attacker in ambush
  lexicon: HALOT
  rationale: אֹרֵב denotes one who lies in ambush. 'One lying in wait' is idiomatic modern English and preserves the image of concealed hostility.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in front of you
  - against you
  lexicon: HALOT
  rationale: Literally 'before you.' Although the Greek parallel has a more explicit adversative sense ('against you'), the Hebrew wording is retained in the main text, with the hostile implication carried by the ambush imagery.
