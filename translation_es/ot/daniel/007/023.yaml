translation:
  language: es
  text: 'Así dijo: «La cuarta bestia será un cuarto reino sobre la tierra, distinto de todos los reinos[a]; y devorará toda la tierra, la hollará y la aplastará[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que será diferente de todos los reinos».
    reason: lexical_alternative
  - marker: b
    text: O «y la partirá en pedazos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן / Thus
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - Entonces
  - De este modo
  lexicon: HALOT
  rationale: Introduce la explicación profética con un adverbio natural en español que conserve el tono formal y conclusivo del habla visionaria.
- source_word: אֲמַר / he said
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - dijo él
  lexicon: HALOT
  rationale: El verbo narrativo en tercera persona se entiende naturalmente en español sin necesidad de explicitar el sujeto; el contexto ya lo identifica.
- source_word: חֵיוְתָא רְבִיעָיְתָא / the fourth beast
  english_pob_choice: the fourth beast
  chosen_spanish: la cuarta bestia
  alternatives_spanish:
  - el cuarto animal
  lexicon: HALOT
  rationale: «Bestia» preserva mejor el tono apocalíptico y ominoso del símbolo de Daniel 7 que «animal».
- source_word: מַלְכוּ רביעא / a fourth kingdom
  english_pob_choice: a fourth kingdom
  chosen_spanish: un cuarto reino
  alternatives_spanish:
  - el cuarto reino
  - un cuarto dominio real
  lexicon: HALOT
  rationale: El contexto interpretativo identifica la bestia como una entidad política; «reino» reproduce con claridad esa equivalencia. Se mantiene el artículo indefinido como en la sintaxis idiomática española para un predicado nominal.
- source_word: בְאַרְעָא / on the earth
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra / en el mundo
  lexicon: HALOT
  rationale: «Tierra» conserva la amplitud cósmica de אַרְעָא en este pasaje; «sobre» expresa ubicación/esfera de manera natural y solemne en español.
- source_word: דִּי תִשְׁנֵא / which will be different
  english_pob_choice: which will be different
  chosen_spanish: distinto de
  alternatives_spanish:
  - que será diferente de
  - que diferirá de
  lexicon: HALOT
  rationale: La idea comparativa se expresa con una construcción fluida en español. Se evita forzar «cambiar» porque el valor principal aquí es la diferencia respecto de los demás reinos.
- source_word: מִן כָּל מַלְכְוָתָא / from all the kingdoms
  english_pob_choice: from all the kingdoms
  chosen_spanish: de todos los reinos
  alternatives_spanish:
  - de todos los reinos
  - entre todos los reinos
  lexicon: HALOT
  rationale: En español, «distinto de todos los reinos» expresa mejor la comparación que una traducción literal de la preposición. Se conserva el plural explícito.
- source_word: וְתֵאכֻל כָּל אַרְעָא / and it will devour the whole earth
  english_pob_choice: and it will devour the whole earth
  chosen_spanish: y devorará toda la tierra
  alternatives_spanish:
  - y devorará la tierra entera
  - y consumirá toda la tierra
  lexicon: HALOT
  rationale: «Devorará» mantiene la metáfora bestial con fuerza. «Toda la tierra» refleja el alcance total de כָּל sin sobrecargar la frase.
- source_word: וּתְדוּשִׁנַּהּ / and trample it down
  english_pob_choice: and trample it down
  chosen_spanish: la hollará
  alternatives_spanish:
  - la pisoteará
  - la tramplará
  lexicon: HALOT
  rationale: «Hollar» es un verbo español digno y preciso para la imagen de pisar violentamente; evita la repetición excesiva con el siguiente verbo.
- source_word: וְתַדְּקִנַּהּ / and crush it
  english_pob_choice: and crush it
  chosen_spanish: la aplastará
  alternatives_spanish:
  - la hará pedazos
  - la quebrará
  lexicon: HALOT
  rationale: «Aplastar» transmite bien la intensificación final de la destrucción y conserva una progresión natural después de «hollar».
theological_decisions:
- issue: Identificación de la cuarta bestia con un reino político
  english_pob_reading: The fourth beast will be a fourth kingdom
  chosen_spanish_reading: La cuarta bestia será un cuarto reino
  alternative_spanish_readings:
  - La cuarta bestia será una cuarta bestia
  - La cuarta bestia representará un cuarto reino
  rationale: 'El texto arameo interpreta explícitamente el símbolo: la bestia es un reino. La traducción debe conservar esa equivalencia interpretativa en lugar de dejarla implícita.'
  doctrine_reference: Daniel 7:23; lectura interna del pasaje
- issue: Sentido comparativo de תִשְׁנֵא frente a los reinos
  english_pob_reading: which will be different from all the kingdoms
  chosen_spanish_reading: distinto de todos los reinos
  alternative_spanish_readings:
  - que será diferente de todos los reinos
  - que diferirá de todos los reinos
  - que será cambiado de todos los reinos
  rationale: Se preserva la tensión semántica entre diferencia cualitativa y posible cambio; en este versículo el sentido dominante es la distinción respecto de los demás reinos, no una transformación interna del reino.
  doctrine_reference: Daniel 7:23; HALOT para שׁנא
- issue: Intensificación de la destrucción final
  english_pob_reading: devour ... trample ... crush
  chosen_spanish_reading: devorará ... la hollará ... la aplastará
  alternative_spanish_readings:
  - devorará ... la pisoteará ... la hará pedazos
  - devorará ... la pisoteará ... la quebrará
  rationale: 'La secuencia mantiene la progresión violenta del original: devorar, pisar/triturar y aplastar. Se evita suavizar la imaginería apocalíptica.'
  doctrine_reference: Daniel 7:23; imaginería apocalíptica
translation_notes:
  revision_awareness: Se siguió de cerca el texto arameo de Daniel 7:23 y el audit trail inglés; no se observaron revisiones posteriores que alteren la decisión léxica principal. Se mantuvo la equivalencia interpretativa «bestia = reino» y la triple cadena verbal de destrucción con español natural y sobrio.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el original lo exige; este versículo no lo contiene.
  - Se prefiere «reino» para מַלְכוּ en coherencia con la interpretación interna del pasaje.
  - Se conservó «bestia» por el peso apocalíptico del símbolo en Daniel 7.
  - La puntuación con comillas angulares y la sintaxis son propias del español editorial moderno.
