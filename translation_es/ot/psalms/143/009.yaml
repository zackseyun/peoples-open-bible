translation:
  language: es
  text: Líbrame de mis enemigos, Yahvé; en ti me he refugiado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «a ti me he escondido» o «a ti he buscado refugio». El hebreo expresa la idea de tomar refugio en Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילֵנִי
  english_pob_choice: Deliver me
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Rescátame
  - Sálvame
  lexicon: HALOT
  rationale: El hifil imperativo con sufijo de 1.ª persona expresa una súplica directa de liberación. «Líbrame» conserva el valor de rescate sin sobrecargarlo con matices más amplios de salvación general.
- source_word: מֵאֹיְבַי
  english_pob_choice: from my enemies
  chosen_spanish: de mis enemigos
  alternatives_spanish:
  - de quienes me son hostiles
  - de mis adversarios
  lexicon: HALOT
  rationale: La preposición מִן indica separación o procedencia; el plural con sufijo de 1.ª persona se traduce naturalmente como «mis enemigos», sin necesidad de paráfrasis interpretativas.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en la forma de referencia del proyecto en español. «Yahvé» evita la sustitución por un título y mantiene la identidad personal del nombre del pacto.
- source_word: אֵלֶיךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: Aunque אֶל suele significar «a/para», el conjunto idiomático con la cláusula final expresa buscar amparo en Dios. En español, «en ti» reproduce de modo natural la imagen de refugio que la versión inglesa auditada también privilegia.
- source_word: כִסִּתִי
  english_pob_choice: I have taken refuge
  chosen_spanish: me he refugiado
  alternatives_spanish:
  - me he escondido
  - he buscado refugio
  lexicon: HALOT
  rationale: El verbo literalmente puede sugerir cubrir/ocultar, pero en este contexto funciona como modismo de amparo. «Me he refugiado» preserva el sentido psalmico sin perder la metáfora subyacente.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. En coherencia con la política del proyecto, se traslada como «Yahvé» para preservar el nombre revelado y no ocultarlo bajo un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor idiomático de la frase final de refugio
  english_pob_reading: in you I have taken refuge
  chosen_spanish_reading: en ti me he refugiado
  alternative_spanish_readings:
  - a ti me he escondido
  - en ti he buscado refugio
  rationale: La POB inglesa opta por una equivalencia óptima que explicita el sentido idiomático de tomar refugio. En español, el perfecto pronominal «me he refugiado» comunica el mismo acto de confiar/protegerse sin convertir el hebreo en una traducción demasiado literal o extraña.
  doctrine_reference: Uso poético y confesional de la confianza en Yahvé como refugio
- issue: Marcación del posible matiz literal de כִסִּתִי
  english_pob_reading: '''to you I have hidden myself'' or ''to you I have sought shelter'''
  chosen_spanish_reading: No se explicita en el texto principal; se conserva solo el sentido idiomático de refugio.
  alternative_spanish_readings:
  - a ti me he escondido
  - a ti he buscado refugio
  rationale: La nota inglesa preserva la tensión entre literalidad y modismo. En español, esa alternativa queda mejor en nota, porque la forma principal «me he refugiado» es clara y fiel al uso idiomático del hebreo.
  doctrine_reference: POB lexical policy on idioms
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada para colocar el cierre como «in you I have taken refuge», reflejando con más claridad el orden y el énfasis del hebreo. La redacción española sigue ese mismo énfasis al mantener la cláusula final separada y enfocada en el refugio en Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la norma del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - La frase final conserva el valor idiomático de refugio, no una traducción mecánica de «escondido».
  - El tono es poético y apto para lectura pública, sin caer en arcaísmos innecesarios.
