translation:
  language: es
  text: ¡Clama[a], hija de Gallim[b]! ¡Escucha, Laisa! ¡Oh, pobre Anatot[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Prorrumpe en un grito agudo»; el verbo hebreo puede denotar un clamor penetrante o resonante.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hija de Gallim», una manera personificada de dirigirse a la ciudad o a sus habitantes.'
    reason: cultural_note
  - marker: c
    text: 'O: «afligida» o «miserable». El adjetivo puede expresar pobreza, miseria u opresión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַהֲלִי
  english_pob_choice: Cry aloud
  chosen_spanish: ¡Grita con fuerza[a]!
  alternatives_spanish:
  - ¡Clama en voz alta!
  - ¡Prorrumpe en un grito agudo!
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar un grito fuerte, agudo o resonante. «Grita con fuerza» conserva la urgencia audible sin obligar a decidir si el tono es de alarma, dolor o estridencia. La nota mantiene la alternativa léxica documentada por el POB inglés.
- source_word: קוֹלֵךְ
  english_pob_choice: your voice
  chosen_spanish: con fuerza
  alternatives_spanish:
  - con tu voz
  - alzar tu voz
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tu voz», pero en español la combinación natural con el imperativo no requiere repetir la posesión de manera literal. Se integra el valor adverbial del grito y se evita una redundancia innecesaria.
- source_word: בַּת גַּלִּים
  english_pob_choice: daughter of Gallim
  chosen_spanish: hija de Gallim
  alternatives_spanish:
  - hija de Galim
  - hija de Gallim, la ciudad
  lexicon: HALOT
  rationale: Se conserva la metáfora profética de personificación de la ciudad o sus habitantes como «hija de». «Gallim» se mantiene como transliteración del topónimo, siguiendo el valor auditado del inglés POB.
- source_word: הַקְשִׁיבִי
  english_pob_choice: Listen
  chosen_spanish: ¡Escucha[b]!
  alternatives_spanish:
  - ¡Presta atención!
  - ¡Oye!
  lexicon: HALOT
  rationale: La forma imperativa femenina singular pide atención directa. «Escucha» es natural, solemne y suficientemente fuerte para el contexto de advertencia.
- source_word: לַיְשָׁה
  english_pob_choice: Laishah
  chosen_spanish: Laisá
  alternatives_spanish:
  - Laishá
  - Laisha
  lexicon: HALOT
  rationale: Se translitera el topónimo con ortografía española amplia y pronunciable. La adaptación «Laisá» respeta el nombre propio sin forzar una forma inglesa en el texto español.
- source_word: עֲנִיָּה
  english_pob_choice: Poor
  chosen_spanish: pobre
  alternatives_spanish:
  - afligida
  - miserable
  lexicon: HALOT
  rationale: El adjetivo puede expresar pobreza, aflicción o desgracia. «Pobre» funciona como exclamación natural en español y preserva la amplitud semántica sin decidir demasiado rápido entre miseria material y opresión.
- source_word: עֲנָתוֹת
  english_pob_choice: Anathoth
  chosen_spanish: Anatot
  alternatives_spanish:
  - Anatot
  - Anatoth
  lexicon: HALOT
  rationale: Se conserva el nombre de lugar en transliteración española. La forma «Anatot» es clara y estándar en español bíblico, y evita una latinización ajena al registro objetivo del POB.
theological_decisions:
- issue: Tratamiento de la personificación de las ciudades
  english_pob_reading: daughter of Gallim; O poor Anathoth
  chosen_spanish_reading: hija de Gallim; ¡Oh pobre Anatot!
  alternative_spanish_readings:
  - hija de Gallim; pobre Anatot
  - hija de Gallim; ¡pobre Anatot!
  rationale: El hebreo usa la fórmula profética de ciudad personificada como hija, y el POB inglés la conserva. El español mantiene esa personificación para no perder el recurso retórico ni suavizar la carga de juicio y lamento.
  doctrine_reference: Retórica profética en los profetas menores y mayores; personificación de ciudades en el discurso profético
- issue: Valor exclamativo de עֲנִיָּה en contexto de amenaza
  english_pob_reading: Poor Anathoth!
  chosen_spanish_reading: ¡Oh pobre Anatot!
  alternative_spanish_readings:
  - ¡Ay, Anatot afligida!
  - ¡Pobre Anatot!
  rationale: El contexto de invasión y el audit trail inglés permiten leer el adjetivo como exclamación sobre la desgracia de la ciudad, sin reducirlo a una sola acepción. «Oh» conserva la fuerza interjectiva del inglés POB y del hebreo en contexto.
  doctrine_reference: Semántica contextual del adjetivo hebreo en oráculos de juicio
- issue: Tono del mandato inicial
  english_pob_reading: Cry aloud
  chosen_spanish_reading: ¡Grita con fuerza!
  alternative_spanish_readings:
  - ¡Clama en voz alta!
  - ¡Da un grito agudo!
  rationale: No se debe neutralizar el tono de alarma del verso. «Grita con fuerza» comunica el carácter urgente y audible del mandato sin añadir contenido que el hebreo no exija.
  doctrine_reference: Imperativos proféticos de alarma y advertencia
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del POB inglés, que simplifica el primer miembro a un grito directo y conserva la segunda línea como vocativo exclamativo. También se respetó la lectura alta de acuerdo del control cruzado (high_agreement), sin introducir reinterpretaciones más allá de la evidencia hebrea y del aparato auditado.
  spanish_consistency_notes:
  - Se mantuvo la personificación ciudadana con «hija de» para Gallim.
  - 'Se transliteraron los topónimos en forma española coherente: Gallim, Laisá, Anatot.'
  - Se evitó sustituir «pobre» por un término interpretativo más fuerte, para conservar la amplitud semántica del hebreo.
  - Se usó puntuación exclamativa para reflejar el tono imperativo y vocativo del verso.
