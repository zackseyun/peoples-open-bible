translation:
  language: es
  text: Tomarán un manojo de hisopo y lo mojarán en la sangre que está en la vasija[a], y tocarán el dintel y los dos postes de la puerta con parte de la sangre que está en la vasija. Y ninguno de ustedes saldrá de la entrada de su casa hasta la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «umbral» para saph. Aquí se prefiere «vasija» porque la sangre está en ella y el hisopo se moja en ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲגֻדַּת אֵזוֹב
  english_pob_choice: a bunch of hyssop
  chosen_spanish: un manojo de hisopo
  alternatives_spanish:
  - un haz de hisopo
  - un ramo de hisopo
  lexicon: HALOT
  rationale: אֲגֻדָּה expresa algo atado o reunido en un manojo; en español, «manojo» conserva la concreción del objeto ritual y suena natural sin volverlo demasiado técnico. «Hisopo» mantiene el término tradicional para la planta ritual.
- source_word: אֵזוֹב
  english_pob_choice: hyssop
  chosen_spanish: hisopo
  alternatives_spanish:
  - hyssop
  lexicon: HALOT
  rationale: El término estándar en español bíblico es «hisopo»; preserva la referencia ritual sin añadir explicación innecesaria.
- source_word: בַּדָּם
  english_pob_choice: in the blood
  chosen_spanish: en la sangre
  alternatives_spanish:
  - dentro de la sangre
  - en medio de la sangre
  lexicon: HALOT
  rationale: Con טבל, la preposición ב señala el medio en que se moja el hisopo. «En la sangre» es la forma más directa y natural en español.
- source_word: הַסַּף
  english_pob_choice: the basin
  chosen_spanish: la cuenca
  alternatives_spanish:
  - el tazón
  - el recipiente
  - el umbral
  lexicon: HALOT
  rationale: El contexto inmediato habla de sangre «en» el saph y de mojar el hisopo en ella, por lo que el sentido de recipiente es el más probable. «Cuenca» comunica bien la idea de un contenedor sin imponer una forma demasiado específica. Se conserva la alternativa lexical tradicional en la nota.
- source_word: וְהִגַּעְתֶּם
  english_pob_choice: touch
  chosen_spanish: tocarán
  alternatives_spanish:
  - aplicarán
  - pondrán en contacto
  lexicon: HALOT
  rationale: El Hifil de נגע aquí indica causar contacto con la sangre. «Tocarán» mantiene la acción concreta y no sobretraduce.
- source_word: הַמַּשְׁקוֹף
  english_pob_choice: the lintel
  chosen_spanish: el dintel
  alternatives_spanish:
  - la parte superior de la puerta
  - el travesaño
  lexicon: HALOT
  rationale: «Dintel» es el equivalente arquitectónico preciso y natural en español para la pieza horizontal superior de la entrada.
- source_word: שְׁתֵּי הַמְּזוּזֹת
  english_pob_choice: the two doorposts
  chosen_spanish: los dos postes
  alternatives_spanish:
  - los dos postes de la puerta
  - los dos marcos laterales
  lexicon: HALOT
  rationale: מְזוּזוֹת designa los postes verticales de la entrada. «Postes» es breve y claro; el contexto ya los identifica como parte de la puerta.
- source_word: מִן הַדָּם
  english_pob_choice: with some of the blood
  chosen_spanish: con parte de la sangre
  alternatives_spanish:
  - con algo de la sangre
  - tomando de la sangre
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea es literalmente «de la sangre», el sentido aquí es instrumental: usar parte de la sangre para marcar el marco. «Con parte de la sangre» expresa bien esa función sin perder la dependencia del elemento sacrificial.'
- source_word: לֹא תֵצְאוּ אִישׁ
  english_pob_choice: none of you shall go out
  chosen_spanish: ninguno de ustedes saldrá
  alternatives_spanish:
  - nadie de ustedes saldrá
  - no saldrá ninguno
  lexicon: HALOT
  rationale: El sustantivo distributivo אִישׁ con la prohibición plural funciona como «cada uno / ninguno». «Ninguno de ustedes» preserva la fuerza distributiva en español natural.
- source_word: מִפֶּתַח בֵּיתוֹ
  english_pob_choice: from the entrance of his house
  chosen_spanish: de la entrada de su casa
  alternatives_spanish:
  - del umbral de su casa
  - de la puerta de su casa
  lexicon: HALOT
  rationale: 'פֶּתַח es la abertura o entrada de la casa. «Entrada» es claro y evita restringirlo a una pieza arquitectónica concreta; se mantiene el posesivo singular distributivo «su». '
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta que amanezca
  lexicon: HALOT
  rationale: «Hasta la mañana» es la equivalencia más directa y natural en español; conserva la referencia temporal sin añadir precisión interpretativa.
theological_decisions:
- issue: Sentido de הַסַּף en el contexto pascual
  english_pob_reading: basin
  chosen_spanish_reading: cuenca
  alternative_spanish_readings:
  - umbral
  - recipiente
  rationale: La sintaxis del verso presenta sangre «en» el saph y al hisopo mojándose en ella; por eso la lectura de recipiente está mejor apoyada por el contexto inmediato que la de «umbral». La elección de «cuenca» conserva la decisión del POB inglés de no ocultar el valor contenedor aquí, sin excluir la alternativa lexical tradicional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Expresión distributiva masculina אִישׁ ... בֵּיתוֹ
  english_pob_reading: And none of you shall go out from the entrance of his house
  chosen_spanish_reading: Y ninguno de ustedes saldrá de la entrada de su casa
  alternative_spanish_readings:
  - Y no saldrá nadie de la entrada de su casa
  - Y ninguno de ustedes saldrá de la entrada de sus casas
  rationale: El hebreo usa un singular distributivo con valor general, no una restricción masculina exclusiva. En español, «ninguno de ustedes» comunica ese valor colectivo de manera natural; se mantiene el singular posesivo «su casa» para reflejar la forma del hebreo y del inglés auditado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Se siguió el auditorial inglés sin depender mecánicamente de él: se respetó la decisión contextual de entender הַסַּף como recipiente y la distribución de אִישׁ, pero se ajustó el español para sonar natural y preciso. No se detectaron revisiones previas aplicadas en el registro fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del verso porque no aparece el tetragrámaton en este segmento.
  - Se evitó «Señor» como sustituto no presente en el hebreo.
  - Se usó un registro bíblico sobrio y contemporáneo, con terminología arquitectónica estándar («dintel», «postes»).
  - La puntuación sigue el flujo paratáctico del hebreo sin sobrerelajar la sintaxis.
