revisions:
- from: Y ahora no ven la luz[a]; brillante es en los cielos[b], pero el viento pasa y los aclara.
  to: Y ahora no ven la luz[a]; está brillante en los cielos[b], pero el viento pasa y los despeja.
  rationale: Se ajusta la predicación central a un español más natural ('está brillante') sin cambiar el sentido fuente, y se reemplaza 'los aclara' por 'los despeja' para expresar con mayor claridad el efecto meteorológico del verbo טהר sobre un referente plural probable ('los cielos' o 'las nubes'). También se corrige la redacción de la nota b para evitar una frase española confusa.
