base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/028.yaml
  text: Please forgive the transgression of your servant[a], for Yahweh will surely make my lord a lasting house, because my lord fights Yahweh’s battles, and evil will not be found in you all your days.
  footnotes:
