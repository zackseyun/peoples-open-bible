translation:
  language: es
  text: Entonces tomaron la túnica de José[a], degollaron un macho cabrío y mojaron la túnica en la sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «túnica larga» o «ropa de vestir»; el término hebreo denota una prenda tipo túnica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: Then they took
  chosen_spanish: Entonces tomaron
  alternatives_spanish:
  - Y tomaron
  - Luego tomaron
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo consecutivo. «Entonces» reproduce bien esa progresión en español natural, sin perder el enlace secuencial del hebreo.
- source_word: כְּתֹנֶת יוֹסֵף / הַכֻּתֹּנֶת
  english_pob_choice: Joseph’s tunic / the tunic
  chosen_spanish: la túnica de José / la túnica
  alternatives_spanish:
  - el vestido de José / el vestido
  - la ropa de José / la ropa
  - la capa de José / la capa
  lexicon: HALOT
  rationale: כְּתֹנֶת designa una prenda tipo túnica; «túnica» mantiene la cercanía al término fuente y evita la carga semántica de «capa» o «ropa», que serían más imprecisas.
- source_word: וַיִּשְׁחֲטוּ
  english_pob_choice: slaughtered
  chosen_spanish: degollaron
  alternatives_spanish:
  - sacrificaron
  - mataron
  - sangraron
  lexicon: HALOT
  rationale: El verbo se usa para sacrificar o degollar un animal. «Degollaron» conserva la violencia concreta del acto y encaja con la preparación del animal para usar su sangre.
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: a male goat
  chosen_spanish: un macho cabrío
  alternatives_spanish:
  - un cabro
  - un chivo
  - un macho de las cabras
  lexicon: HALOT
  rationale: La expresión especifica claramente un macho de cabra. «Macho cabrío» es idiomático, preciso y conserva el rasgo de sexo del animal.
- source_word: וַיִּטְבְּלוּ
  english_pob_choice: dipped
  chosen_spanish: sumergieron
  alternatives_spanish:
  - mojaron
  - empaparon
  - metieron
  lexicon: HALOT
  rationale: Para un manto o túnica introducido en sangre, «sumergieron» expresa mejor la acción completa que «mojaron», y sigue siendo natural en español.
- source_word: בַּדָּם
  english_pob_choice: in the blood
  chosen_spanish: en la sangre
  alternatives_spanish:
  - en sangre
  lexicon: HALOT
  rationale: El hebreo con artículo apunta a la sangre ya mencionada del animal sacrificado; en español, «en la sangre» es la formulación más clara y directa.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado de WLC y el audit trail inglés sin cambios de revisión pendientes; la decisión principal fue mantener la terminología concreta de la prenda con «túnica» y el verbo animal de matanza con «degollaron».
  spanish_consistency_notes:
  - 'Se conserva la misma traducción de כְּתֹנֶת en ambas apariciones: «túnica».'
  - Se mantiene un español moderno y sobrio, sin introducir un lenguaje eclesiástico ajeno al hebreo.
  - La nota al pie refleja las alternativas léxicas que el POB inglés documenta para la prenda.
