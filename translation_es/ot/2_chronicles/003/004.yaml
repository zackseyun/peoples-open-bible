    text: El hebreo afirma que la altura del pórtico era “ciento veinte codos”. Un pasaje paralelo en 1 Reyes 6:3 describe la longitud y el ancho del pórtico, pero no esta altura, y algunos intérpretes sospechan una dificultad textual; aquí se sigue el Texto Masorético tal como se conserva.
    reason: textual_variant
