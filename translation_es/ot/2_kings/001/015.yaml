translation:
  language: es
  text: 'Entonces el ángel de Yahvé habló a Elías: «Baja con él; no tengas miedo de él[a]». Entonces se levantó y bajó con él hasta el rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «no tengas miedo desde delante de él», es decir, «no tengas miedo a causa de su presencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh / the angel of the LORD
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar ‘mensajero’ o ‘ángel’. En esta fórmula narrativa y en un contexto de intervención divina, ‘ángel’ es la opción más natural en español. יְהוָה se conserva como ‘Yahvé’ según el criterio del proyecto para el nombre divino.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elías el profeta
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español. Se mantiene la forma tradicional inteligible y fiel.
- source_word: רֵד
  english_pob_choice: Go down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Baja
  - Ve hacia abajo
  lexicon: HALOT
  rationale: El imperativo de ירד expresa movimiento descendente. ‘Desciende’ preserva el valor semántico con un registro digno; ‘baja’ también sería posible, pero ‘desciende’ suena más adecuado en una traducción bíblica formal.
- source_word: אוֹתוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: Aunque el hebreo usa el objeto pronominal, el contexto idiomático indica acompañamiento. En español, ‘con él’ comunica con claridad el sentido de ir en compañía.
- source_word: אַל תִּירָא
  english_pob_choice: do not be afraid
  chosen_spanish: no tengas miedo
  alternatives_spanish:
  - no temas
  lexicon: HALOT
  rationale: La negativa imperativa de ירא se expresa de manera natural en español con ‘no tengas miedo’. ‘No temas’ es posible, pero aquí ‘no tengas miedo’ resulta más idiomático y directo.
- source_word: מִפָּנָיו
  english_pob_choice: of him / because of him
  chosen_spanish: de él
  alternatives_spanish:
  - por su presencia
  - a causa de él
  lexicon: HALOT
  rationale: El hebreo literalmente apunta a ‘desde delante de su rostro/presencia’. En este mandato, el sentido práctico es no temer a la persona señalada. ‘De él’ refleja la construcción idiomática de forma concisa en español; el matiz causal queda implícito en el contexto.
- source_word: וַיָּקָם
  english_pob_choice: he arose
  chosen_spanish: Él se levantó
  alternatives_spanish:
  - Se levantó
  - Se puso de pie
  lexicon: HALOT
  rationale: Verbo narrativo de respuesta inmediata. ‘Se levantó’ conserva el movimiento y el tono narrativo sin sonar arcaico.
- source_word: וַיֵּרֶד אֹתוֹ אֶל־הַמֶּלֶךְ
  english_pob_choice: went down with him to the king
  chosen_spanish: descendió con él al rey
  alternatives_spanish:
  - bajó con él al rey
  - descendió con él hasta el rey
  lexicon: HALOT
  rationale: Se conserva el verbo de descenso y la idea de acompañamiento (‘con él’). ‘Al rey’ refleja la meta del movimiento indicada por אֶל הַמֶּלֶךְ. La formulación evita una paráfrasis excesiva y mantiene el paralelismo del hebreo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Equivalente directo y natural en español para el sustantivo definido en este contexto narrativo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre propio divino como transliteración española tradicional del tetragrámaton. Esto mantiene la distinción entre el nombre revelado de Dios y un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se incorporó la revisión final del inglés POB que prefirió la forma directa ‘do not be afraid of him’ sobre una paráfrasis causal más explícita. En español, se mantuvo la claridad idiomática con ‘no tengas miedo de él’, y la nota conserva el matiz literal del hebreo.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה.
  - ‘ángel’ se mantiene por el uso narrativo-teofánico del término, no ‘mensajero’.
  - ‘Desciende / descendió’ conserva el verbo de movimiento del hebreo.
  - La nota [a] está anclada explícitamente en el texto para evitar pie de nota huérfano.
