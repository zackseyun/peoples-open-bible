translation:
  language: es
  text: lo cual me causa dolor[a], y acerca de tu herencia, por la cual lloro, y acerca de Israel, por quien estoy triste, y acerca de la descendencia de Jacob,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y acerca de tu herencia, por la cual lloro, y acerca de Israel, por quien estoy afligido, y acerca de la descendencia de Jacob,»'
    reason: alternative_reading
lexical_decisions:
- source_word: quod mihi dolet
  english_pob_choice: which causes me pain
  chosen_spanish: lo cual me causa dolor
  alternatives_spanish:
  - me causa dolor
  - lo que me duele
  lexicon: Latin doleo / dolor
  rationale: El latín expresa un efecto de dolor sobre el hablante; «me causa dolor» conserva la causatividad y el tono sobrio del POB inglés, mientras que «lo cual me causa dolor» mantiene la referencia del relativo al tramo anterior del discurso.
- source_word: de hereditate tua
  english_pob_choice: your inheritance
  chosen_spanish: tu herencia
  alternatives_spanish:
  - tu heredad
  - tu posesión heredada
  lexicon: Latin hereditas
  rationale: «Herencia» es el equivalente natural y fiel en español para hereditas en este contexto de posesión/patrimonio del pueblo de Dios.
- source_word: propter quam lugeo
  english_pob_choice: for which I mourn
  chosen_spanish: por la cual lloro
  alternatives_spanish:
  - por la cual me lamento
  - por la que duelo
  lexicon: Latin lugeo
  rationale: El verbo latino puede abarcar lamento/llanto de duelo; se eligió «lloro» para conservar la intensidad afectiva y la concreción del duelo sin introducir una abstracción innecesaria.
- source_word: de Israel propter quem tristis sum
  english_pob_choice: and concerning Israel, for whom I am sorrowful
  chosen_spanish: y acerca de Israel, por quien estoy triste
  alternatives_spanish:
  - y acerca de Israel, por quien estoy afligido
  - y acerca de Israel, por quien siento tristeza
  lexicon: Latin tristis sum
  rationale: «Estoy triste» refleja directamente tristis sum con lenguaje natural y digno. Se mantuvo la estructura relacional «por quien» para preservar el vínculo causal del latín.
- source_word: de semine Iacob
  english_pob_choice: and concerning the seed of Jacob
  chosen_spanish: y acerca de la descendencia de Jacob
  alternatives_spanish:
  - y acerca de la simiente de Jacob
  - y acerca de la estirpe de Jacob
  lexicon: Latin semen
  rationale: «Descendencia» comunica bien el sentido genealógico de semen en español contemporáneo y evita una arcaización innecesaria de «simiente».
theological_decisions:
- issue: Referential scope of the verse boundary
  english_pob_reading: which causes me pain ... and concerning the seed of Jacob,
  chosen_spanish_reading: lo cual me causa dolor ... y acerca de la descendencia de Jacob,
  alternative_spanish_readings:
  - que me causa dolor ... y acerca de la descendencia de Jacob,
  - lo cual me duele ... y acerca de la descendencia de Jacob,
  rationale: Se conservó la apertura con relativo para reflejar que el texto latino enlaza con la afirmación previa, sin trasladar material del verso siguiente. Esto sigue la corrección auditada que evita mezclar cláusulas de 8:17.
  doctrine_reference: source-boundary fidelity in textual drafting
translation_notes:
  revision_awareness: 'El borrador anterior en inglés había desplazado material de los límites de versículo: incorporaba una cláusula de 8:17 y omitía el inicio de 8:16. Este español sigue la revisión más reciente y mantiene solo las cláusulas presentes en el tramo latino de 8:16, preservando el orden y la completitud del versículo.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ masking forms porque no aparece el tetragrámaton en este versículo.
  - Se prefirió «descendencia» sobre «simiente» por legibilidad en español moderno, sin perder el referente genealógico.
  - Se mantuvo la repetición de «y acerca de» para reflejar la acumulación retórica del latín.
  - La puntuación con coma final deja el versículo abierto, como en el tramo fuente, porque el texto continúa en el siguiente versículo.
