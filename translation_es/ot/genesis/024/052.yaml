review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la secuencia narrativa, el sujeto («el siervo de Abraham»), «sus palabras» y el nombre divino «Yahvé». También acierta al entender לַיהוָה como una postura reverencial mejor expresada en español con «ante Yahvé». Sin embargo, «Y sucedió que, al...» suena innecesariamente formulaico, y «se inclinó hasta el suelo» queda algo débil frente a וַיִּשְׁתַּחוּ אַרְצָה, que aquí describe una postración o una inclinación profunda hasta tierra.
  spanish_quality_summary: El español es generalmente claro y digno, pero puede mejorarse para mayor naturalidad y precisión. «Cuando... oyó» fluye mejor que «Y sucedió que, al oír...». Además, «se postró en tierra ante Yahvé» es más idiomático y más fiel al gesto corporal intenso que expresa el hebreo que «se inclinó hasta el suelo».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> «Yahvé» está correcto; עֶבֶד se maneja aceptablemente como «siervo» por contexto, con nota aclaratoria válida. El principal ajuste léxico necesario es וַיִּשְׁתַּחוּ: en este contexto «se postró» preserva mejor la fuerza física y reverencial que «se inclinó».'
  issues:
  - severity: medium
    issue: 'Fórmula inicial demasiado pesada: «Y sucedió que, al oír...»'
    rationale: Aunque reproduce el hebreo de forma cercana, en español moderno y digno resulta más natural «Y cuando... oyó» o simplemente «Cuando... oyó». La fórmula actual suena calcada y menos legible sin aportar precisión adicional.
  - severity: medium
    issue: «se inclinó hasta el suelo» debilita וַיִּשְׁתַּחוּ אַרְצָה
    rationale: El hebreo describe una reverencia corporal fuerte, especificada además por «a tierra / hacia el suelo». «Se postró en tierra» comunica mejor el gesto completo y sigue evitando sobretraducir como «adoró».
  - severity: low
    issue: Falta una nota sobre la alternativa léxica de postración/adoración presente en el rastro inglés
    rationale: El English POB conserva la alternativa de que el verbo puede implicar una reverencia de adoración. Conviene mantener esa alternativa en español, especialmente si el texto principal opta por «se postró».
  revised_spanish_text: Y cuando el siervo de Abraham[a] oyó sus palabras, se postró en tierra ante Yahvé[b][c].
  revised_footnotes:
