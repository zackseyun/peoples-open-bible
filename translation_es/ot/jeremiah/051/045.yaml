translation:
  language: es
  text: Salgan de en medio de ella[a], pueblo mío, y que cada hombre salve su vida de la ira ardiente de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Salgan de su medio, pueblo mío, y que cada uno se salve a sí mismo de la feroz ira de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: צְאוּ
  english_pob_choice: Come out
  chosen_spanish: Salgan
  alternatives_spanish:
  - Vayan
  - Salgan afuera
  lexicon: HALOT
  rationale: El imperativo plural de יצא pide una salida urgente; en español, «salgan» conserva la fuerza exhortativa natural sin añadir matices innecesarios.
- source_word: מִתּוֹכָהּ
  english_pob_choice: from her midst
  chosen_spanish: de en medio de ella
  alternatives_spanish:
  - de su interior
  - de en medio de ella misma
  - de ella
  lexicon: HALOT
  rationale: «De en medio de ella» reproduce la imagen de un centro o interior de la ciudad/personificación femenina, manteniendo el referente femenino del sufijo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: pueblo mío
  alternatives_spanish:
  - mi pueblo
  lexicon: HALOT
  rationale: «Pueblo mío» es un orden natural en español bíblico y conserva el valor posesivo y de pertenencia del hebreo.
- source_word: וּמַלְּטוּ
  english_pob_choice: and let each man save
  chosen_spanish: y que cada hombre salve
  alternatives_spanish:
  - y escapen
  - y que cada uno salve
  - y líbrense
  lexicon: HALOT
  rationale: El piel imperativo con אִישׁ distribuye la acción individuo por individuo; «que cada hombre salve» conserva esa exhortación a la autopreservación.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - todos
  lexicon: HALOT
  rationale: Se mantiene el singular masculino distributivo del מקור; «cada hombre» refleja con más precisión la forma y el sentido representativo del término.
- source_word: אֶת נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - sí mismo
  - su alma
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la vida/preservación de la persona, no a «alma» en sentido moderno. «Su vida» es claro y fiel al contexto de huida del juicio.
- source_word: מֵחֲרוֹן אַף
  english_pob_choice: from the burning anger
  chosen_spanish: de la ardiente ira
  alternatives_spanish:
  - de la ira ardiente
  - de la ira encendida
  - de la furia ardiente
  lexicon: HALOT
  rationale: La expresión idiomática combina «ardor/quemazón» con «ira». «Ardiente ira» preserva la metáfora térmica y su carga profética sin aplanarla en un simple «furor».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio, conforme al criterio del proyecto. «Yahvé» comunica el Tetragrámaton sin sustituirlo por un título.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente; la política del proyecto pide trasladarlo como nombre propio y no como sustitución titulada. «Yahvé» es la forma española adoptada aquí.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor distributivo de אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - todos
  rationale: La forma hebrea es masculina singular con fuerza distributiva. En la traducción principal se conserva ese rasgo, en vez de neutralizarlo, siguiendo la preferencia de precisión morfológica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La versión se corrige respecto del intento anterior al anclar explícitamente la nota [a] en el texto principal. No se han introducido cambios de sentido frente al audit trail; se mantiene la equivalencia óptima y la terminología del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה.
  - Se conserva el plural imperativo «Salgan» para צְאוּ.
  - «Vida» se prefiere a «alma» para נֶפֶשׁ en este contexto de escape del juicio.
  - La nota [a] ofrece una alternativa válida sin duplicar un marcador no anclado.
