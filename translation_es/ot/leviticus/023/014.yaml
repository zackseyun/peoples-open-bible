review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: prohibición de comer tres formas de producto de grano hasta traer la ofrenda, seguida por la fórmula legal permanente. Sin embargo, hay un problema claro en el anclaje de notas: la nota [a] está puesta sobre ''grano fresco'' pero su contenido corresponde a ''grano tostado''; y la nota [b] está puesta sobre ''su Dios'' pero su contenido corresponde a ''grano fresco''. También conviene alinear mejor חֻקַּת עוֹלָם con la opción principal del POB inglés (''permanent statute'') mediante ''estatuto permanente'' en vez de ''perpetuo'', dejando ''perpetuo'' en nota alternativa.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Pan, grano tostado, grano fresco' suena natural y fiel. 'Hasta este mismo día' funciona bien. 'Lugares de morada' es comprensible pero algo pesado; 'lugares donde habiten' sería más idiomático, aunque la opción actual sigue siendo aceptable en registro legal. La revisión necesaria es principalmente de notas y una leve mejora de alineación terminológica.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dios' está bien para אֱלֹהִים. No aparecen Yahvé/Mesías/etc. La decisión clave es mantener 'ofrenda' para קָרְבָּן y preferir 'estatuto permanente' para ajustarse mejor al razonamiento documentado del POB inglés, sin perder la fuerza legal de חֻקַּת עוֹלָם.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras equivocadas.
    rationale: La nota [a] dice 'grano parchado' para 'grano tostado', pero está colocada tras 'grano fresco'. La nota [b] dice 'grano nuevo' para 'grano fresco', pero está colocada tras 'su Dios'. Esto distorsiona la evidencia léxica documentada.
  - severity: medium
    issue: La nota [c] sobre 'estatuto eterno / estatuto perpetuo' está anclada correctamente, pero la opción principal 'estatuto perpetuo' no sigue de cerca la preferencia del POB inglés por 'permanent statute'.
    rationale: No es infiel al hebreo, pero el expediente auditado privilegia una formulación moderna equivalente a 'permanente' y deja 'everlasting/perpetual' como alternativas.
  - severity: low
    issue: '''Lugares de morada'' suena algo pesado en español contemporáneo.'
    rationale: No es incorrecto, pero una formulación más natural como 'lugares donde habiten' o 'lugares donde vivan' sería más fluida. Dado el registro legal, puede conservarse si se desea mayor formalidad.
  revised_spanish_text: Y no comerán pan, ni grano tostado[a], ni grano fresco[b], hasta este mismo día, hasta que hayan traído la ofrenda de su Dios. Es un estatuto permanente[c] para todas sus generaciones, en todos sus lugares de morada.
  revised_footnotes:
