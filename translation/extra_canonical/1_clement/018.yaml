translation:
  text: 'And what shall we say about David[a], who has been testified to? concerning whom God said, “I found a man according to my heart, David the son of Jesse; with everlasting mercy I anointed him.”


    But he too says to God:


    “Have mercy on me, O God, according to your great mercy,

    and according to the abundance of your compassions blot out my lawless deed.

    Wash me more and more from my lawlessness,

    and cleanse me from my sin.

    For I know my lawlessness,

    and my sin is before me continually.

    Against you only I sinned,

    and I did what is evil before you,

    so that you may be justified in your words

    and prevail when you are judged.

    For behold, in lawless deeds I was conceived,

    and in sins my mother conceived me.

    For behold, you loved truth;

    the hidden and secret things of your wisdom you made known to me.

    You will sprinkle me with hyssop, and I will be cleansed;

    you will wash me, and I will be made whiter than snow.

    You will make me hear gladness and rejoicing;

    the bones that have been humbled will rejoice.

    Turn your face away from my sins,

    and blot out all my lawless deeds.

    Create in me a clean heart, O God,

    and renew a right spirit within me.

    Do not cast me away from your presence,

    and do not take your Holy Spirit from me.

    Restore to me the joy of your salvation[b],

    and strengthen me with a ruling spirit.

    I will teach the lawless your ways,

    and the ungodly will turn back to you.

    Deliver me from bloodguilt, O God, the God of my salvation.

    My tongue will rejoice in your righteousness.

    Lord, you will open my mouth,

    and my lips will declare your praise.

    For if you had desired sacrifice, I would have given it;

    in whole burnt offerings you will not delight.

    A sacrifice to God is a broken spirit[c][d][e][f][g][h];

    a broken and humbled heart God will not despise.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording combines language known from scriptural testimony about David; Clement invokes David as one already publicly attested by God.
    reason: cross_reference
    anchor_ref: '18:1'
  - marker: b
    text: The Greek here reads 'my mother nursed me,' a form differing from the more familiar Psalm wording often rendered 'my mother conceived me.'
    reason: textual_variant
    anchor_ref: '18:5'
  - marker: h
    text: Or 'with a governing spirit' or 'with a noble spirit.' The Greek suggests a leading, ruling quality rather than merely inward freedom.
    reason: lexical_alternative
    anchor_ref: '18:12'
  - marker: g
    text: Literally 'from bloods,' an idiom commonly expressing bloodguilt.
    reason: lexical_alternative
    anchor_ref: '18:14'
  - marker: f
    text: '''Broken'' could also be rendered ''crushed'' or, more interpretively, ''contrite.'''
    reason: lexical_alternative
    anchor_ref: '18:17'
  - marker: e
    text: Or 'To him God said'.
    reason: previous_rendering
  - marker: d
    text: Or 'and in sins my mother nursed me.'.
    reason: previous_rendering
  - marker: c
    text: Or 'My tongue will rejoice in your righteousness.'.
    reason: previous_rendering
lexical_decisions:
- source_word: μεμαρτυρημένῳ
  chosen: has been borne witness to
  alternatives:
  - has been testified to
  - has been attested
  lexicon: BDAG
  rationale: Keeps the perfect participle's sense of an established testimony about David, while preserving the scriptural cadence of witness-language.
- source_word: κατὰ τὴν καρδίαν μου
  chosen: according to my heart
  alternatives:
  - after my heart
  - in accord with my heart
  lexicon: BDAG
  rationale: More transparent to the Greek than the traditional idiom 'after my own heart,' while still idiomatic English.
- source_word: ἐν ἐλέει αἰωνίῳ
  chosen: with everlasting mercy
  alternatives:
  - in eternal mercy
  - with age-long mercy
  lexicon: LSJ
  rationale: Represents the instrumental/surrounding force naturally in English and preserves the covenantal tone.
- source_word: ἀνόμημα / ἀνομία
  chosen: lawless deed / lawlessness
  alternatives:
  - transgression
  - iniquity
  lexicon: BDAG
  rationale: Preserves the lexical link to lawlessness rather than using the more traditional but less transparent 'iniquity.' Singular ἀνόμημα is rendered concretely as 'lawless deed'; ἀνομία more abstractly as 'lawlessness.'
- source_word: οἰκτιρμῶν
  chosen: compassions
  alternatives:
  - mercies
  - pities
  lexicon: BDAG
  rationale: Avoids collapsing this term into the same English word as ἔλεος, preserving the Psalm's intensification.
- source_word: ἐξάλειψον
  chosen: blot out
  alternatives:
  - wipe away
  - erase
  lexicon: BDAG
  rationale: Traditional and vivid; fits both sin-removal imagery and scriptural register.
- source_word: διαπαντός
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: BDAG
  rationale: Natural English that preserves the durative force.
- source_word: δικαιωθῇς
  chosen: be justified
  alternatives:
  - be shown righteous
  - be vindicated
  lexicon: BDAG
  rationale: Retains the verbal connection to righteousness-language; the forensic nuance is important in this citation.
- source_word: νικήσῃς
  chosen: prevail
  alternatives:
  - overcome
  - win
  lexicon: BDAG
  rationale: Best fits the judicial context with 'when you are judged' without sounding colloquial.
- source_word: κρίνεσθαί σε
  chosen: when you are judged
  alternatives:
  - in your judging
  - when you enter into judgment
  lexicon: BDAG
  rationale: Follows the Greek form as transmitted here, preserving the striking wording of the citation rather than smoothing it away.
- source_word: συνελήμφθην
  chosen: I was conceived
  alternatives:
  - I was brought forth
  - I was formed
  lexicon: BDAG
  rationale: Most direct rendering in this context of origin in the womb.
- source_word: ἐκίσσησέν με
  chosen: my mother nursed me
  alternatives:
  - conceived me
  - bore me
  lexicon: LSJ
  rationale: The Greek form here differs from the more familiar Psalm wording; 'nursed me' reflects the transmitted text rather than assimilating it to standard English Psalm tradition.
- source_word: τὰ ἄδηλα καὶ τὰ κρύφια
  chosen: the hidden and secret things
  alternatives:
  - the unclear and hidden things
  - the unseen and concealed things
  lexicon: LSJ
  rationale: Keeps the paired near-synonyms for rhetorical fullness.
- source_word: ῥαντιεῖς
  chosen: You will sprinkle me
  alternatives:
  - Sprinkle me
  - You shall sprinkle me
  lexicon: BDAG
  rationale: Future form retained, matching the sequence of future verbs in the prayer as cited here.
- source_word: τεταπεινωμένα
  chosen: have been humbled
  alternatives:
  - were humbled
  - have been crushed
  lexicon: BDAG
  rationale: Preserves the perfect participle's resultant state without overinterpreting it.
- source_word: πνεῦμα εὐθές
  chosen: a right spirit
  alternatives:
  - an upright spirit
  - a steadfast spirit
  lexicon: BDAG
  rationale: '''Right'' is broad and faithful; ''steadfast'' is interpretive and more tradition-driven here.'
- source_word: ἐν τοῖς ἐγκάτοις μου
  chosen: in my inward parts
  alternatives:
  - within me
  - in my inner being
  lexicon: LSJ
  rationale: Preserves the bodily, interior imagery of the Greek rather than flattening it to a generic inwardness.
- source_word: ἀντανέλῃς
  chosen: take back
  alternatives:
  - remove
  - take away
  lexicon: LSJ
  rationale: Captures the sense of withdrawing what had been given, fitting the prayer's relational tone.
- source_word: πνεύματι ἡγεμονικῷ
  chosen: with a ruling spirit
  alternatives:
  - with a governing spirit
  - with a noble spirit
  lexicon: LSJ
  rationale: The adjective carries leadership/governing force; 'ruling' preserves that more transparently than the traditional 'free' or interpretive 'noble.'
- source_word: ἀσεβεῖς
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: BDAG
  rationale: Maintains the God-directed dimension of the term.
- source_word: ἐπιστρέψουσιν
  chosen: will turn back
  alternatives:
  - will return
  - will be converted
  lexicon: BDAG
  rationale: Preserves the repentance/return imagery without importing later technical language.
- source_word: ἐξ αἱμάτων
  chosen: from bloodguilt
  alternatives:
  - from bloodshed
  - from bloods
  lexicon: BDAG
  rationale: Idiomatic English that conveys culpability for blood rather than merely physical blood.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Default project rendering; in this prayer it naturally refers to God's righteous character and acts.
- source_word: ὁλοκαυτώματα
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  lexicon: BDAG
  rationale: Makes explicit the force of the compound while remaining readable.
- source_word: συντετριμμένον
  chosen: broken
  alternatives:
  - crushed
  - contrite
  lexicon: BDAG
  rationale: '''Broken'' is vivid and accessible; ''contrite'' is more interpretive and ecclesiastical.'
- source_word: ἐξουδενώσει
  chosen: will not despise
  alternatives:
  - will not reject
  - will not treat as nothing
  lexicon: BDAG
  rationale: A smooth English rendering that still conveys the refusal to scorn or dismiss the humbled heart.
theological_decisions:
- issue: Use of Psalmic wording in a Christian paraenetic context
  chosen_reading: Retain the prayer largely in its scriptural cadence as a direct citation placed on David's lips.
  alternative_readings:
  - Paraphrase the Psalm into smoother modern prose
  - Assimilate wording to familiar English Psalm translations
  rationale: 1 Clement's argument depends on David's exemplary repentance. Preserving the citation's liturgical and scriptural texture serves both the rhetoric and the ecclesial function of the passage.
  doctrine_reference: 'PHILOSOPHY.md: preserve source texture; do not smooth an existing English tradition.'
- issue: Rendering of πνεύματι ἡγεμονικῷ
  chosen_reading: with a ruling spirit
  alternative_readings:
  - with a free spirit
  - with a noble spirit
  - with a generous spirit
  rationale: The Greek adjective points to governing or leading capacity. The traditional 'free spirit' reflects later translation tradition more than the plain lexical force of the Greek here.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition.'
- issue: Rendering of ἐκίσσησέν με in this textual form
  chosen_reading: my mother nursed me
  alternative_readings:
  - my mother conceived me
  - my mother bore me
  rationale: The transmitted wording in this chapter differs from the more familiar Psalm text. The translation follows the Greek as given rather than harmonizing it to standard Psalm 51 tradition.
  doctrine_reference: 'PHILOSOPHY.md: translate the source text being edited, with auditable decisions.'
