revisions:
- from: ¿Por qué se ha desviado este pueblo —Jerusalén— con un desvío perpetuo? Se aferran al engaño; se niegan a volver.
  to: ¿Por qué se ha apartado este pueblo —Jerusalén[c]— con un apartarse[a] perpetuo? Se aferran al engaño[b]; se niegan a volver.
  rationale: 'Se ajusta el texto para reflejar mejor la repetición de שוב en el hebreo y la racionalidad lexical ya documentada por el POB inglés: ''se ha apartado ... un apartarse ... volver''. También se restauran las notas significativas del audit trail, con marcadores únicos anclados en el texto.'
