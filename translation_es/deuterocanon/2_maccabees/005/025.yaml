translation:
  language: es
  text: Pero cuando este hombre llegó a Jerusalén y fingió ser pacífico[a], se contuvo hasta el santo día del sábado; y, tomando a los judíos por sorpresa, ordenó a los que estaban bajo su mando que se armaran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se hizo pasar por pacífico». El griego ὑποκριθεὶς indica representación fingida, no una paz real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενος
  english_pob_choice: arrived
  chosen_spanish: llegó
  alternatives_spanish:
  - arribó
  - vino
  lexicon: LSJ
  rationale: El participio narrativo marca la llegada a Jerusalén. «Llegó» es natural en español y conserva el valor de entrada al escenario sin añadir matices no presentes.
- source_word: τὸν εἰρηνικὸν ὑποκριθεὶς
  english_pob_choice: pretended to be peaceable
  chosen_spanish: fingió ser pacífico
  alternatives_spanish:
  - fingió estar en paz
  - se hizo pasar por pacífico
  lexicon: LSJ
  rationale: ὑποκριθεὶς implica actuar una apariencia; εἰρηνικός indica paz o pacificidad. «Fingió ser pacífico» conserva el engaño y el adjetivo sin sobreexplicar.
- source_word: ἐπέσχεν
  english_pob_choice: he held back
  chosen_spanish: se contuvo
  alternatives_spanish:
  - se detuvo
  - esperó
  lexicon: LSJ
  rationale: El verbo señala demora o suspensión estratégica de la acción. «Se contuvo» comunica esa espera táctica con concisión y sin perder el matiz de demora intencional.
- source_word: ἕως τῆς ἁγίας ἡμέρας τοῦ σαββάτου
  english_pob_choice: until the holy day of the Sabbath
  chosen_spanish: hasta el santo día del sábado
  alternatives_spanish:
  - hasta el día santo del sábado
  - hasta el sagrado día del sábado
  lexicon: LSJ
  rationale: Se mantiene tanto ἁγίας como σαββάτου. «Santo día del sábado» conserva la sacralidad explícita del texto griego y su referencia judía.
- source_word: λαβὼν ἄγοντας τοὺς Ἰουδαίους
  english_pob_choice: taking the Jews off guard
  chosen_spanish: tomando a los judíos por sorpresa
  alternatives_spanish:
  - tomando a los judíos desprevenidos
  - sorprendiendo a los judíos
  lexicon: LSJ
  rationale: La expresión griega es comprimida y, según el audit trail inglés, alude a explotar su vulnerabilidad en el sábado. «Por sorpresa» reproduce bien el efecto táctico sin forzar una paráfrasis mayor.
- source_word: τοῖς ὑφʼ ἑαυτὸν
  english_pob_choice: those under his command
  chosen_spanish: los que estaban bajo su mando
  alternatives_spanish:
  - sus subordinados
  - los de su tropa
  lexicon: LSJ
  rationale: La frase denota subordinación militar. «Bajo su mando» hace explícita la relación de autoridad con un español natural y fiel.
- source_word: ἐξοπλίαν παρήγγειλεν
  english_pob_choice: ordered those under his command to arm themselves
  chosen_spanish: mandó armarse
  alternatives_spanish:
  - ordenó que se armaran
  - dio la orden de armarse
  lexicon: LSJ
  rationale: El sustantivo verbal apunta a equipamiento bélico y παρήγγειλεν es ordenar/mandar. «Mandó armarse» conserva la orden militar de forma directa y fluida.
theological_decisions:
- issue: Caracterización del sábado como día santo
  english_pob_reading: the holy day of the Sabbath
  chosen_spanish_reading: el santo día del sábado
  alternative_spanish_readings:
  - el día santo del sábado
  - el sagrado día del sábado
  rationale: El adjetivo ἁγίας está explícito en el griego; no se trata de una ampliación doctrinal, sino de un rasgo lexical y cultural que debe quedar visible en español.
  doctrine_reference: Santidad del sábado en el judaísmo bíblico; fidelidad lexical al original.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, evitando una formulación que sugiriera solo “sorprender” de manera vaga y manteniendo el valor táctico de λαβών con una expresión natural en español. También se preservó la intención de ἐξοπλίαν παρήγγειλεν como una orden de armarse, en vez de traducirlo de forma más literal y menos idiomática.
  spanish_consistency_notes:
  - Se usa «judíos» en minúscula por tratarse del etnónimo común en español, salvo inicios de oración.
  - Se mantiene «sábado» en lugar de una glosa más extensa para conservar el ritmo narrativo.
  - Se evita «SEÑOR» u otra sustitución no presente, pues aquí no aparece el nombre divino ni κύριος como equivalente directo.
