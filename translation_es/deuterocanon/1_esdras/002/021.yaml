  language: en
  yaml_path: translation/deuterocanon/1_esdras/002/021.yaml
  text: 'Then the king wrote back to Rathymus[a], the recorder of the complaints, and to Beeltethmus, and to Samellius the scribe, and to the rest of their associates who lived in Samaria and Syria and Phoenicia[b], as follows:'
  footnotes:
