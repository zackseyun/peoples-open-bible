base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/031.yaml
  text: And they come to you as people come[a], and they sit before you as my people, and they hear your words, but they do not do them; for with their mouth they speak lustful things[b], while their heart goes after their unjust gain.
  footnotes:
  - marker: a
    text: Or 'lusts,' 'sensual desires,' or possibly 'amorous songs.' The Hebrew term is rare and may refer either to what they speak with their mouths or to the kind of entertainment they make of the prophet's words.
    reason: lexical_alternative
  - marker: b
    text: '''Unjust gain'' may also be rendered ''profit,'' ''greed,'' or ''covetous gain.'''
    reason: lexical_alternative
