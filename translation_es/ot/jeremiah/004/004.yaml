translation:
  language: es
  text: Circuncídense para Yahvé[a], y quiten los prepucios de sus corazones, hombres de Judá y habitantes de Jerusalén, no sea que mi ira salga como fuego y arda, sin que nadie la apague[b], a causa de la maldad de sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «los prepucios de su corazón»; una metáfora de lealtad al pacto y arrepentimiento interior.'
    reason: cultural_note
  - marker: b
    text: 'O: «mi furor estalle como fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִמֹּלוּ
  english_pob_choice: Circumcise yourselves
  chosen_spanish: Circuncidaos
  alternatives_spanish:
  - Somaos
  - Dejaos circuncidar
  lexicon: HALOT
  rationale: El niphal imperativo conserva la imagen de la circuncisión como acto de pacto; en español, el imperativo reflexivo «circuncidaos» transmite adecuadamente la exhortación sin volverla interpretativa.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Señor
  lexicon: HALOT
  rationale: El texto fuente usa el nombre del pacto יהוה; por la convención del proyecto, se mantiene «Yahvé» en el cuerpo principal. «Para» expresa mejor la orientación/dedicación que un simple movimiento físico.
- source_word: וְהָסִרוּ
  english_pob_choice: and remove
  chosen_spanish: y quitad
  alternatives_spanish:
  - y removed
  - y apartad
  lexicon: HALOT
  rationale: El verbo pide una acción activa de quitar/retirar. «Quitad» es natural, claro y conserva el impulso imperativo del hebreo.
- source_word: עָרְלוֹת לְבַבְכֶם
  english_pob_choice: the foreskins of your hearts
  chosen_spanish: los prepucios de vuestros corazones
  alternatives_spanish:
  - la incircuncisión de vuestros corazones
  - la dureza de vuestros corazones
  lexicon: HALOT
  rationale: Se preserva la metáfora corporal concreta del hebreo («prepucios» en plural) vinculada al corazón. «Prepucios de vuestros corazones» reproduce mejor la tensión profética que una paráfrasis como «dureza».
- source_word: אִישׁ יְהוּדָה
  english_pob_choice: men of Judah
  chosen_spanish: hombres de Judá
  alternatives_spanish:
  - cada hombre de Judá
  - pueblo de Judá
  lexicon: HALOT
  rationale: «אִישׁ» funciona aquí de modo distributivo/representativo; «hombres de Judá» conserva el valor masculino del hebreo y suena natural en español.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלָם
  english_pob_choice: and inhabitants of Jerusalem
  chosen_spanish: y habitantes de Jerusalén
  alternatives_spanish:
  - y los que habitan en Jerusalén
  lexicon: HALOT
  rationale: El participio sustantivado se traduce con «habitantes», un equivalente idiomático, formal y fiel al sentido de residencia estable.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  lexicon: HALOT
  rationale: Introduce una advertencia de consecuencia negativa; «no sea que» mantiene el tono profético y es natural en español bíblico contemporáneo.
- source_word: תֵּצֵא כָאֵשׁ חֲמָתִי
  english_pob_choice: my wrath go out like fire
  chosen_spanish: salga como fuego mi ira
  alternatives_spanish:
  - salga como fuego mi furor
  - estalle como fuego mi ira
  lexicon: HALOT
  rationale: «Salir» sigue de cerca יצא y se ordena bien en español con el sujeto pospuesto. «Ira» es el término más sobrio y claro aquí; «furor» sería posible, pero más marcado.
- source_word: וּבָעֲרָה
  english_pob_choice: and burn
  chosen_spanish: y arda
  alternatives_spanish:
  - y arda hasta consumir
  - y se inflame
  lexicon: HALOT
  rationale: El verbo conserva la imagen del fuego en progreso; «arda» reproduce el valor verbal con concisión y sin añadir un resultado no explicitado.
- source_word: וְאֵין מְכַבֶּה
  english_pob_choice: with no one to quench it
  chosen_spanish: sin que nadie la apague
  alternatives_spanish:
  - y no hay quien la apague
  - sin que nadie pueda apagarla
  lexicon: HALOT
  rationale: El hebreo niega la presencia de un extinguidor; «sin que nadie la apague» preserva el sentido y adapta el pronombre al antecedente femenino implícito («ira/fuego»).
- source_word: מִפְּנֵי רֹעַ מַעַלְלֵיכֶם
  english_pob_choice: because of the evil of your deeds
  chosen_spanish: a causa de la maldad de vuestras obras
  alternatives_spanish:
  - por la maldad de vuestras obras
  - debido al mal de vuestras acciones
  lexicon: HALOT
  rationale: «מִפְּנֵי» expresa causa; «a causa de» es directo. «Maldad» comunica רֹעַ como calidad moral, y «obras» mantiene el valor concreto de מַעַלְלֵיכֶם.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Yahweh
  rationale: 'Se sigue la convención del proyecto para יהוה: usar «Yahvé» en el texto principal, manteniendo el nombre del pacto en vez de ocultarlo con un título genérico. Esto responde a la transparencia auditiva del POB.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH'
- issue: Metáfora de la circuncisión del corazón
  english_pob_reading: Keep the literal covenantal metaphor in the main text
  chosen_spanish_reading: Conservar la metáfora corporal literal en el texto principal
  alternative_spanish_readings:
  - purificad vuestros corazones
  - quitad vuestra dureza interior
  rationale: La fuerza profética depende de que la circuncisión física sea aplicada al corazón. Traducirla de modo interpretativo suavizaría la tensión teológica y la conexión canónica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Número del corazón en la metáfora
  english_pob_reading: hearts
  chosen_spanish_reading: vuestros corazones
  alternative_spanish_readings:
  - vuestro corazón
  - las mentes de ustedes
  rationale: Aunque el sustantivo hebreo base es singular colectivo, la revisión inglesa reciente reflejó el plural posesivo en el sentido del discurso. En español, el plural «vuestros corazones» mantiene la concordancia natural con «prepucios» y con la pluralidad de los destinatarios.
  doctrine_reference: Applied revision pass, 2026-04-23T10:53:25Z
- issue: Imagen del fuego de la ira
  english_pob_reading: my wrath go out like fire ... with no one to quench it
  chosen_spanish_reading: salga como fuego mi ira y arda, sin que nadie la apague
  alternative_spanish_readings:
  - estalle como fuego mi ira y consuma, sin que nadie la extinga
  rationale: Se conserva la secuencia imagen-verbo-extinción del original. «Apague» mantiene la idea de extinguir el fuego sin cargar el verbo con un matiz excesivamente interpretativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve lexical tension and prophetic imagery'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del expediente inglés: se refleja el plural «vuestros corazones» y se conserva la coma de enlace entre «arda» y el complemento explicativo. También se ha ajustado el nombre divino al estándar español del proyecto («Yahvé») sin perder la transparencia del nombre hebreo.'
  spanish_consistency_notes:
  - He mantenido «Yahvé» para יהוה conforme al estándar del proyecto, evitando el reemplazo por «el Señor».
  - He preservado la metáfora de la circuncisión del corazón sin suavizarla a un equivalente meramente moral.
  - «Hombres de Judá» conserva el valor masculino y distributivo del hebreo.
  - «Maldad de vuestras obras» mantiene la fuerza moral de רֹעַ y el carácter concreto de מַעַלְלֵיכֶם.
  - El pronombre femenino en «la apague» sigue al antecedente implícito de «ira/fuego», que en español puede expresarse con concordancia femenina según el sustantivo más cercano («ira»).
