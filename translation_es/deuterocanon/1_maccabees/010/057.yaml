translation:
  language: es
  text: Y Ptolomeo salió de Egipto[a], él y Cleopatra su hija, y llegó a Ptolemaida en el año ciento sesenta y dos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el año 162 de la era seléucida.
    reason: cultural_note
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: LSJ
  rationale: ἐξέρχομαι en aoristo expresa salir o partir. En español, «salió» conserva el sentido directo de salida desde Egipto y suena natural en una narración histórica.
- source_word: αὐτὸς καὶ Κλεοπάτρα ἡ θυγάτηρ αὐτοῦ
  english_pob_choice: he and Cleopatra his daughter
  chosen_spanish: él y Cleopatra su hija
  alternatives_spanish:
  - él mismo y Cleopatra su hija
  - junto con Cleopatra su hija
  lexicon: LSJ
  rationale: El griego coordina a Ptolomeo con su hija, con αὐτός como apoyo enfático/resumptivo. En español, «él y Cleopatra su hija» reproduce esa coordinación sin sobrerrepresentar la intensidad.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: LSJ
  rationale: Aunque el inglés POB usa «came», en español el verbo de llegada al destino es más natural aquí. «Llegó» conserva el sentido de arribo a Ptolemaida sin añadir matices indebidos.
- source_word: εἰς Πτολεμαΐδα
  english_pob_choice: to Ptolemais
  chosen_spanish: a Ptolemaida
  alternatives_spanish:
  - hasta Ptolemaida
  - a la ciudad de Ptolemaida
  lexicon: LSJ
  rationale: El preposición εἰς con topónimo se vierte naturalmente «a» en español de viaje. Se mantiene el nombre propio tradicionalizado «Ptolemaida».
- source_word: ἔτους δευτέρου καὶ ἑξηκοστοῦ καὶ ἑκατοστοῦ
  english_pob_choice: in the one hundred sixty-second year
  chosen_spanish: en el año ciento sesenta y dos
  alternatives_spanish:
  - en el año 162
  - en el año ciento sesenta y segundo
  lexicon: LSJ
  rationale: La fórmula aditiva griega indica el año 162. En español bíblico moderno, «en el año ciento sesenta y dos» es claro y fiel; evitar la forma ordinal («sesenta y segundo») preserva mejor la equivalencia temporal.
theological_decisions:
- issue: Datación histórica seléucida
  english_pob_reading: That is, year 162 in the Seleucid era.
  chosen_spanish_reading: En el texto principal se deja simplemente «en el año ciento sesenta y dos»; la nota aclara que se trata del año 162 de la era seléucida.
  alternative_spanish_readings:
  - año 162 de la era seléucida
  - en el año ciento sesenta y dos de la era seléucida
  rationale: El griego da una fecha histórica sin explicitar la era; la aclaración pertenece a una nota, como en el inglés POB, para no incorporar interpretación dentro del flujo narrativo.
  doctrine_reference: Historiografía bíblica / cronología del Segundo Templo
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el testimonio griego de Swete (1909) y con el auditorial inglés POB: no hay revisiones aplicadas ni variantes textuales relevantes en este registro.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente griego de κύριος.
  - Se usa «Ptolemaida» como forma castellana habitual del topónimo, coherente con un registro bíblico-histórico.
  - Se evita ampliar el dato cronológico más allá de la nota, para conservar el carácter escueto del original.
