    reason: lexical_alternative
  - marker: c
    text: «Los mares» traduce un plural hebreo; algunas versiones lo vierten idiomáticamente en singular, «el mar».
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación del marcador [c] para que ancle correctamente en «mares», y se sustituye «será» por «estará» en la segunda cola para reflejar mejor la construcción locativa hebrea y mejorar la naturalidad en español. Se mantiene el orden de notas conforme al contenido documentado del POB inglés.
