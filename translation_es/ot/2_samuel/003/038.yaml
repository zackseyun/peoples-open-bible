translation:
  language: es
  text: 'Entonces el rey dijo a sus siervos[a]: «¿No saben que hoy ha caído en Israel un príncipe y un gran hombre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un líder y un gran hombre». El hebreo שַׂר puede denotar príncipe, comandante, gobernante o funcionario principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración. «Entonces» conserva esa secuencia en español con fluidez natural.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Traducción directa del sustantivo definido; el contexto identifica al rey sin necesidad de nombrarlo.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  lexicon: HALOT
  rationale: עֶבֶד suele designar a un servidor en contexto cortesano. «Siervos» preserva mejor el vínculo léxico con el hebreo que «oficiales».
- source_word: הֲלוֹא תֵדְעוּ
  english_pob_choice: Do you not know
  chosen_spanish: ¿No saben... ?
  alternatives_spanish:
  - ¿Acaso no saben... ?
  - ¿No se dan cuenta... ?
  lexicon: HALOT
  rationale: La partícula interrogativa con negación introduce una pregunta retórica que espera asentimiento. En español, «¿No saben...?» expresa bien ese valor.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que debían saber; «que» es la equivalencia más natural y precisa.
- source_word: שַׂר
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - jefe
  - líder
  - comandante
  lexicon: HALOT
  rationale: HALOT permite sentidos como príncipe, comandante, gobernante o funcionario principal. En un registro bíblico español, «príncipe» conserva la elevación del término, aunque no debe entenderse necesariamente en sentido dinástico.
- source_word: וְגָדוֹל
  english_pob_choice: and a great man
  chosen_spanish: y un gran hombre
  alternatives_spanish:
  - y un hombre importante
  - y un hombre destacado
  lexicon: HALOT
  rationale: El adjetivo funciona casi sustantivamente para enfatizar estatura e importancia. «Gran hombre» reproduce con naturalidad esa combinación.
- source_word: נָפַל
  english_pob_choice: has fallen
  chosen_spanish: ha caído
  alternatives_spanish:
  - cayó
  - ha muerto
  lexicon: HALOT
  rationale: En discurso elevado, «caer» puede ser eufemismo de morir; «ha caído» conserva el valor idiomático y el aspecto de relevancia presente.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la manera natural y fiel de expresar הַיּוֹם הַזֶּה en español contemporáneo.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  lexicon: HALOT
  rationale: La preposición בְּ indica el ámbito nacional donde ocurrió la muerte; «en Israel» es la opción más directa.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el análisis auditado en inglés. Se mantuvo la ambigüedad lexical de שַׂר mediante una nota, porque el término puede abarcar varias funciones de autoridad; por eso «príncipe» se deja como principal en el texto, con alternativa explícita.
  spanish_consistency_notes:
  - Se preserva «Yahvé» como norma del proyecto cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantiene «siervos» para עֲבָדָיו, coherente con el valor cortesano del término.
  - «Ha caído» conserva el eufemismo hebreo de muerte sin volverlo literalista ni explicativo en exceso.
