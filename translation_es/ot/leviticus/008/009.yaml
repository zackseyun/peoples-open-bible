translation:
  language: es
  text: Y le puso el turbante sobre su cabeza, y sobre el frente del turbante colocó la placa de oro, la corona santa[a], tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la diadema sagrada».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִּצְנֶפֶת
  english_pob_choice: turban
  chosen_spanish: turbante
  alternatives_spanish:
  - tocado
  - pieza para la cabeza
  - tocado sacerdotal
  lexicon: HALOT
  rationale: En el contexto sacerdotal, la cobertura distintiva de la cabeza se entiende mejor en español como 'turbante'. 'Tocado' es posible, pero menos preciso para el objeto ritual concreto.
- source_word: אֶל מוּל פָּנָיו
  english_pob_choice: on the front of
  chosen_spanish: sobre el frente de
  alternatives_spanish:
  - en la parte delantera de
  - frente a
  - delante de
  lexicon: HALOT
  rationale: La expresión indica la ubicación frontal del adorno en el turbante. 'Sobre el frente de' conserva la relación de colocación sin volverla una simple indicación espacial externa.
- source_word: צִיץ
  english_pob_choice: plate
  chosen_spanish: placa
  alternatives_spanish:
  - lámina
  - adorno
  - insignia
  lexicon: HALOT
  rationale: Aquí se trata del adorno de oro fijado al turbante sacerdotal. 'Placa' comunica bien la idea de una pieza metálica visible y fija; 'lámina' sería más técnico y menos natural.
- source_word: נֵזֶר הַקֹּדֶשׁ
  english_pob_choice: the holy crown
  chosen_spanish: la corona santa
  alternatives_spanish:
  - la diadema santa
  - la corona sagrada
  - la corona consagrada
  lexicon: HALOT
  rationale: La construcción apposicional identifica la placa como insignia consagrada de santidad. 'Corona santa' sigue de cerca el hebreo y mantiene la tensión entre adorno y emblema ritual. 'Diadema' es viable, pero menos transparente para lectura pública.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo como 'Yahvé', de acuerdo con la terminología base del proyecto, en lugar de sustituirlo por un título genérico.
- source_word: וַיָּשֶׂם ... וַיָּשֶׂם
  english_pob_choice: put ... placed
  chosen_spanish: puso ... colocó
  alternatives_spanish:
  - puso ... puso
  - colocó ... colocó
  - puso ... puso
  lexicon: HALOT
  rationale: El hebreo repite el mismo verbo para dos acciones consecutivas. En español, variar entre 'puso' y 'colocó' evita una repetición torpe sin alterar la secuencia de acciones.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había mandado a Moisés
  - tal como Yahvé había ordenado a Moisés
  lexicon: HALOT
  rationale: '''Mandado'' reproduce bien el valor de צִוָּה como instrucción con autoridad. ''Tal como'' expresa la conformidad exacta del acto con la orden recibida.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa el Tetragrama directamente. La serie española del POB debe preservar el nombre personal de Dios como 'Yahvé', no ocultarlo detrás de un título como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Carácter del objeto sacerdotal llamado נֵזֶר הַקֹּדֶשׁ
  english_pob_reading: the holy crown
  chosen_spanish_reading: la corona santa
  alternative_spanish_readings:
  - la diadema santa
  - la corona sagrada
  rationale: La expresión puede sentirse tanto como corona como diadema/insignia. 'Corona santa' mantiene la tensión semántica sin borrar el matiz de emblema consagrado.
  doctrine_reference: Exodo 28:36-38; Levítico 8:9
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con la traducción inglesa y sin cambios recientes. La decisión principal en español fue conservar el nombre divino como Yahvé y expresar el objeto ritual con un registro claro y público, sin perder la posible alternativa 'diadema sagrada' para נֵזֶר הַקֹּדֶשׁ.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto: Yahvé para יְהוָה y turbante para מִּצְנֶפֶת.'
  - '''Mandado'' y ''colocó'' conservan el tono formal sin resultar arcaicos.'
  - La nota al pie marca la alternativa léxica relevante sin introducir una interpretación nueva.
