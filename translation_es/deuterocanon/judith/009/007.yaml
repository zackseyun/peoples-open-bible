base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/009/007.yaml
  text: For behold[a], the Assyrians have multiplied in their strength; they have been exalted on horse and rider; they have boasted in the arm of foot soldiers; they have hoped in shield and spear and bow and sling, and they have not known that you are the Lord[b], the one who shatters wars.
