translation:
  language: es
  text: Yahvé, tu nombre es para siempre; Yahvé, tu memoria[a] es de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘tu memoria’; también puede entenderse ‘tu memorial’ o ‘tu renombre’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como Yahvé, según la política española del proyecto. El vocativo poético del hebreo se conserva sin añadir una partícula innecesaria, porque el español puede expresar la invocación por colocación y puntuación.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu renombre
  lexicon: HALOT
  rationale: '‘Nombre’ conserva el término hebreo y su amplitud semántica: no solo designa la denominación, sino también la reputación y realidad pública del Dios nombrado.'
- source_word: לְעוֹלָם
  english_pob_choice: is forever
  chosen_spanish: es para siempre
  alternatives_spanish:
  - es eterno
  - permanece para siempre
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal de duración; ‘es para siempre’ refleja la permanencia sin introducir un verbo de proceso que el texto no exige. Se evita ‘eterno’ por sonar más adjetival y menos fiel a la estructura.
- source_word: זִכְרְךָ
  english_pob_choice: your remembrance
  chosen_spanish: tu recuerdo
  alternatives_spanish:
  - tu memoria
  - tu memorial
  - tu renombre
  lexicon: HALOT
  rationale: ‘Recuerdo’ es la opción más natural en español para el sustantivo de זכר y puede abarcar tanto memoria como fama recordada. Se preserva la tensión entre memoria, memorial y renombre sin fijar una sola interpretación excesiva.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación y generación
  - de una generación a otra
  lexicon: HALOT
  rationale: La fórmula idiomática española estándar ‘de generación en generación’ comunica continuidad sucesiva y mantiene la repetición enfática del hebreo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se sigue la decisión doctrinal y terminológica del proyecto de no ocultar el Nombre con un sustituto. En español, ‘Yahvé’ es la forma de referencia adoptada para el Tetragrámaton en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión lexical de זִכְרְךָ
  english_pob_reading: your remembrance / your memorial / your renown
  chosen_spanish_reading: tu recuerdo
  alternative_spanish_readings:
  - tu memorial
  - tu fama
  - tu renombre
  rationale: El hebreo permite un campo semántico amplio. ‘Tu recuerdo’ deja abierta la posibilidad de memoria reverente, memorial permanente o renombre duradero, sin estrechar el verso a una sola glosa.
  doctrine_reference: HALOT זכר; audit trail lexical note
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y respeta la revisión auditada del inglés que ajustó la primera hemistiquio a una cláusula nominal más literal. En español se decidió ‘es para siempre’ para reflejar esa misma estructura, y ‘de generación en generación’ para reproducir el paralelismo idiomático sin sobreexplicación.
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente para יְהוָה según la política del proyecto.
  - Se mantiene el paralelismo poético con dos hemistiquios breves y simétricos.
  - No se añade artículo delante de ‘Yahvé’ porque el hebreo presenta un vocativo directo.
  - ‘Recuerdo’ conserva la ambigüedad productiva del hebreo entre memoria, memorial y renombre.
