translation:
  language: es
  text: El pan de engaño es dulce para un hombre[a], pero después su boca se llena de gravilla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «pan de falsedad».
    reason: lexical_alternative
  - marker: b
    text: 'O: «su boca se llenará de gravilla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵב
  english_pob_choice: is sweet
  chosen_spanish: es dulce
  alternatives_spanish:
  - es agradable
  - es placentero
  lexicon: HALOT
  rationale: El adjetivo expresa algo agradable, sabroso o dulce. En la imagen proverbial del alimento, «es dulce» conserva el contraste irónico con el resultado áspero que sigue.
- source_word: לָאִישׁ
  english_pob_choice: to a man
  chosen_spanish: para un hombre
  alternatives_spanish:
  - para una persona
  - para alguien
  lexicon: HALOT
  rationale: El hebreo usa el singular masculino. «Un hombre» reproduce ese valor representativo sin neutralizar indebidamente el texto.
- source_word: לֶחֶם
  english_pob_choice: Bread
  chosen_spanish: Pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: «Pan» mantiene la imagen concreta del proverbio. En español también puede funcionar metonímicamente para alimento, pero aquí conviene conservar la imagen literal.
- source_word: שָׁקֶר
  english_pob_choice: of deceit
  chosen_spanish: de engaño
  alternatives_spanish:
  - de falsedad
  - de mentira
  lexicon: HALOT
  rationale: 'La construcción hebrea es nominal y literal: «pan de engaño» refleja mejor el vínculo constructo que una paráfrasis más explícita. En español comunica la procedencia o cualidad engañosa del pan.'
- source_word: וְאַחַר
  english_pob_choice: but afterward
  chosen_spanish: pero después
  alternatives_spanish:
  - y después
  - luego
  lexicon: HALOT
  rationale: La segunda cola introduce una consecuencia que revierte la primera. «Pero después» reproduce bien el matiz adversativo-temporal del hebreo en español natural.
- source_word: יִמָּלֵא
  english_pob_choice: is filled
  chosen_spanish: se llena
  alternatives_spanish:
  - será llenada
  - quedará llena
  lexicon: HALOT
  rationale: El imperfecto niphal puede expresar resultado seguro o general. El presente proverbial «se llena» suena natural en español y mantiene el valor sentencioso.
- source_word: פִיהוּ
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca propia
  - la boca de él
  lexicon: HALOT
  rationale: Se conserva la imagen corporal directa del hebreo. «Su boca» es la forma natural en español y mantiene la fuerza sensorial del proverbio.
- source_word: חָצָץ
  english_pob_choice: gravel
  chosen_spanish: grava
  alternatives_spanish:
  - gravilla
  - piedritas
  lexicon: HALOT
  rationale: El sustantivo designa piedras pequeñas o material granular. «Grava» es claro, vívido y conserva el efecto doloroso del contraste con el «pan» dulce.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió la construcción más literal «bread of deceit» frente a una paráfrasis de obtención («gained by deceit»). La versión española refleja igualmente la estructura nominal del hebreo con «pan de engaño» y conserva el cierre imagético de «grava».
  spanish_consistency_notes:
  - Se mantuvo «pan» en vez de abstraer a «alimento» para respetar la imagen del proverbio.
  - Se conservó el singular representativo «un hombre» por fidelidad al hebreo.
  - «Pero después» refleja la relación temporal con contraste implícito del hebreo.
  - Se usó «grava» como equivalente idiomático y concreto para חָצָץ.
  - Las notas a pie distinguen entre la traducción literal del sintagma hebreo y una variante posible en la segunda cola.
