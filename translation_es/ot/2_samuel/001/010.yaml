translation:
  language: es
  text: Así que me puse de pie junto a él y lo maté[a], porque sabía que no viviría después de su caída. Luego tomé la corona que estaba sobre su cabeza y el brazalete[b] que estaba sobre su brazo, y los traje aquí a mi señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le di muerte». El hebreo expresa que el hablante causó la muerte de Saúl.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el adorno del brazo» o «la pulsera». El término hebreo designa un ornamento llevado en el brazo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעֱמֹד עָלָיו
  english_pob_choice: So I stood over him
  chosen_spanish: me puse sobre él
  alternatives_spanish:
  - me mantuve sobre él
  - me coloqué sobre él
  - estuve de pie sobre él
  lexicon: HALOT
  rationale: עמד con על en este contexto expresa la posición del hablante sobre el cuerpo caído de Saúl. En español, "me puse sobre él" comunica esa proximidad y dominio sin sonar demasiado literal o forzado.
- source_word: וַאֲמֹתְתֵהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo maté
  alternatives_spanish:
  - lo puse a muerte
  - lo hice morir
  - lo ejecuté
  lexicon: HALOT
  rationale: El causativo de מות indica que el hablante afirma haber causado la muerte. "Lo maté" es la forma más directa y fiel en español; "lo ejecuté" añade una connotación judicial no presente en el texto.
- source_word: כִּי יָדַעְתִּי כִּי לֹא יִחְיֶה
  english_pob_choice: because I knew that he would not live
  chosen_spanish: porque sabía que no viviría
  alternatives_spanish:
  - porque sabía que no seguiría con vida
  - porque sabía que no permanecería vivo
  lexicon: HALOT
  rationale: Se conserva la fuerza del doble כי con una causal natural en español. "No viviría" refleja con claridad el futuro/modal de la afirmación sin agregar interpretación.
- source_word: אַחֲרֵי נִפְלוֹ
  english_pob_choice: after he had fallen
  chosen_spanish: después de su caída
  alternatives_spanish:
  - después de que cayó
  - después de haber caído
  lexicon: HALOT
  rationale: El sustantivo verbal derivado de נפל funciona temporalmente. "Después de su caída" mantiene la relación temporal y evita una repetición pesada del pronombre.
- source_word: הַנֵּזֶר
  english_pob_choice: the crown
  chosen_spanish: la corona
  alternatives_spanish:
  - la diadema
  lexicon: HALOT
  rationale: נזר se refiere aquí al adorno real de la cabeza. "Corona" es el equivalente más claro y natural en español.
- source_word: וְאֶצְעָדָה
  english_pob_choice: the armlet
  chosen_spanish: el brazalete
  alternatives_spanish:
  - el adorno del brazo
  - la pulsera
  lexicon: HALOT
  rationale: El término denota un adorno llevado en el brazo. Aunque "brazalete" puede sonar más amplio que "pulsera", conserva la referencia física sin reducirlo indebidamente a la muñeca.
- source_word: זְרֹעוֹ
  english_pob_choice: his arm
  chosen_spanish: su brazo
  alternatives_spanish:
  - su antebrazo
  - su brazo derecho
  lexicon: HALOT
  rationale: זרוע normalmente significa "brazo". Se mantiene el sentido inmediato del pasaje sin estrecharlo a una parte más específica que el hebreo no exige.
- source_word: וָאֲבִיאֵם
  english_pob_choice: I brought them here
  chosen_spanish: los traje aquí
  alternatives_spanish:
  - los he traído aquí
  - los llevé hasta aquí
  lexicon: HALOT
  rationale: Se sigue la secuencia narrativa del hebreo con pretérito simple. "Aquí" preserva הֵנָּה como referencia al lugar presente del hablante.
- source_word: אֶל אֲדֹנִי
  english_pob_choice: to my lord
  chosen_spanish: a mi señor
  alternatives_spanish:
  - a mi señor y amo
  - a mi señor
  lexicon: HALOT
  rationale: Aquí אדני designa a un superior humano, David. "Mi señor" conserva el tono deferente de cortesía mejor que "mi amo", que suena más duro en español moderno.
theological_decisions:
- issue: Relato directo de la muerte de Saúl frente a la tensión con 1 Samuel 31
  english_pob_reading: 'Translate the Amalekite''s speech straightforwardly as his own report: he says he killed Saul.'
  chosen_spanish_reading: 'Traducir el discurso como la afirmación del amalecita: dice que él mató a Saúl.'
  alternative_spanish_readings:
  - suavizar la frase para armonizarla con 1 Samuel 31
  - traducirla como una fanfarronada o falsa atribución
  rationale: El texto presenta discurso directo y la traducción debe reflejar lo que el hablante afirma, sin resolver en la redacción la tensión narrativa con el relato anterior. La posible falsedad o exageración queda para la interpretación, no para la traducción.
  doctrine_reference: Preservar la tensión textual y narrativa sin armonizarla artificialmente.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se usa pretérito simple para la secuencia narrativa (''traje'') y se mantiene el orden causal del discurso directo sin intentar armonizar el testimonio del amalecita con 1 Samuel 31. También se conserva la alternativa lexical del adorno del brazo, pero en español se prefiere ''brazalete'' por claridad natural.'
  spanish_consistency_notes:
  - Se usa "Yahvé" como forma reservada para el nombre divino; aquí no aparece.
  - '"Señor" se usa para el superior humano, no como sustituto del nombre divino.'
  - '"Corona" se emplea para נזר por claridad contemporánea y fidelidad al objeto real.'
  - '"Brazalete" mantiene la fuerza material del objeto en el brazo sin caer en un calco incómodo.'
  - El discurso conserva la primera persona del hablante y el pretérito simple para la narración secuencial.
