translation:
  language: es
  text: 'Como su propio estiércol[a], perecerá para siempre; los que lo vieron dirán: «¿Dónde está él?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como su propio desecho» o «Como su propio excremento». El hebreo usa una imagen deliberadamente humillante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּגֶלֲלוֹ
  english_pob_choice: Like his own dung
  chosen_spanish: Como su propio estiércol
  alternatives_spanish:
  - Como su propio excremento
  - Como su propio desecho
  lexicon: HALOT
  rationale: El hebreo גֶּלֶל puede designar estiércol/excremento. «Estiércol» comunica con claridad el tono humillante del símil y funciona con naturalidad en español bíblico contemporáneo. «Su propio» refleja el sufijo posesivo del hebreo.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - de manera permanente
  lexicon: HALOT
  rationale: נֶצַח expresa duración continua o indefinida. En este contexto de juicio poético, «para siempre» reproduce bien la fuerza absoluta del hebreo y suena natural en español.
- source_word: יֹאבֵד
  english_pob_choice: he will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - se perderá
  - será destruido
  lexicon: HALOT
  rationale: אָבַד puede abarcar perderse, perecer o quedar arruinado. «Perecerá» conserva el peso de ruina y muerte implícito en el verbo, sin diluirlo.
- source_word: רֹאָיו
  english_pob_choice: those who saw him
  chosen_spanish: los que lo veían
  alternatives_spanish:
  - los que lo habían visto
  - sus observadores
  lexicon: HALOT
  rationale: El participio con sufijo apunta a quienes lo conocieron/lo vieron antes de su caída. «Los que lo veían» mantiene el valor de observación familiar y permite una fluidez natural en español.
- source_word: יֹאמְרוּ
  english_pob_choice: will say
  chosen_spanish: dirán
  alternatives_spanish:
  - dirán diciendo
  - preguntarán
  lexicon: HALOT
  rationale: אָמַר significa «decir». «Dirán» conserva la forma directa del verbo sin añadir matices no necesarios.
- source_word: אַיּוֹ
  english_pob_choice: Where is he?
  chosen_spanish: ¿Dónde está?
  alternatives_spanish:
  - ¿Dónde se encuentra?
  - ¿Dónde quedó?
  lexicon: HALOT
  rationale: La interrogativa אַיּוֹ expresa ubicación. En español, «¿Dónde está?» es la forma más natural y fiel; evita interpretar más de lo que el hebreo exige.
translation_notes:
  revision_awareness: 'El texto se mantiene en alto acuerdo con el audit trail inglés: se conserva el símil degradante, la duración absoluta de לָנֶצַח, el valor fuerte de אָבַד y la pregunta final de ubicación sin expandirla interpretativamente.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el nombre divino aparezca; este versículo no lo contiene.
  - «Estiércol» se usa aquí por su fuerza degradante y su naturalidad en español; la nota preserva alternativas semánticas.
  - La pregunta final se mantiene breve para reflejar el hebreo, sin convertirla en una pregunta retórica explicativa.
