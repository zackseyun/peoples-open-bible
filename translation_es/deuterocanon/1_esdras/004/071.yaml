    reason: lexical_alternative
  - marker: b
    text: Lit. «no viniera contra sus puertas»; probablemente significa que los funcionarios no debían irrumpir en sus casas ni hacer allí reclamaciones contra ellos.
    reason: lexical_alternative
  revision_rationale: Se hace una reparación mínima de estilo para que la cláusula final sea español natural y fiel al griego. «Viniera contra sus puertas» mantiene la imagen literal y el matiz de intrusión/hostilidad mejor que «fuera contra sus puertas».
