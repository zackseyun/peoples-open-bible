base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/023/019.yaml
  text: Look[a], the storm of Yahweh has gone out in wrath, a whirling tempest[c][b]; it will whirl down on the head of the wicked.
  footnotes:
  - marker: a
    text: Or 'the tempest of the LORD' or 'the whirlwind of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'has gone out' uses a prophetic perfect, expressing a future judgment as already set in motion.
    reason: lexical_alternative
  - marker: c
    text: Or 'it will burst upon the head of the wicked.' The final verb may emphasize the storm's crashing impact as well as its whirling motion.
    reason: lexical_alternative
