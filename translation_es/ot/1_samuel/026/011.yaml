translation:
  language: es
  text: ¡Lejos de mí, por Yahvé[a][c], extender mi mano contra el ungido de Yahvé[b]! Pero ahora, por favor, toma la lanza que está junto a su cabeza y la jarra de agua, y vámonos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Lejos de mí, de Yahvé!». El hebreo usa una expresión idiomática de fuerte rechazo o repulsión, con un matiz solemne de apelación a Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el Mesías de Yahvé». Aquí el término hebreo designa a Saúl como el rey ungido por Yahvé, no un título mesiánico en sentido pleno.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «por Yahvé». La preposición hebrea también puede entenderse de otra manera en esta fórmula idiomática; aquí se conserva el matiz de invocación solemne.'
    reason: previous_rendering
lexical_decisions:
- source_word: חָלִילָה לִּי
  english_pob_choice: Far be it from me
  chosen_spanish: ¡Lejos de mí!
  alternatives_spanish:
  - ¡Dios me libre!
  - ¡Lejos de mí, por completo!
  lexicon: HALOT
  rationale: La expresión hebrea comunica una fuerte repulsión o negativa enfática. «¡Lejos de mí!» preserva bien la fuerza idiomática en español sin volverla una paráfrasis doctrinal más explícita de lo que el hebreo exige.
- source_word: מֵיְהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Con חָלִילָה, la preposición introduce una apelación solemne asociada a Yahvé. «Por Yahvé» conserva ese matiz de invocación/juramento mejor que una simple preposición espacial o de procedencia.
- source_word: מִשְּׁלֹחַ יָדִי
  english_pob_choice: to stretch out my hand
  chosen_spanish: extender mi mano
  alternatives_spanish:
  - alargar mi mano
  - levantar mi mano
  lexicon: HALOT
  rationale: Es un modismo hebreo para realizar una acción hostil. «Extender mi mano» sigue de cerca la imagen original y es natural en español bíblico contemporáneo.
- source_word: בִּמְשִׁיחַ יְהוָה
  english_pob_choice: against the LORD’s anointed
  chosen_spanish: contra el ungido de Yahvé
  alternatives_spanish:
  - contra el Mesías de Yahvé
  - contra el escogido de Yahvé
  lexicon: HALOT
  rationale: Aquí מָשִׁיחַ se refiere a Saúl como rey ungido, no al título mesiánico pleno. «Ungido» conserva la relación lexical con la unción sin cargar el término con una lectura cristológica que el contexto inmediato no reclama.
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora bien
  lexicon: HALOT
  rationale: La partícula marca transición contrastiva del rechazo a la instrucción. «Pero ahora» expresa bien ese giro discursivo.
- source_word: קַח נָא
  english_pob_choice: please take
  chosen_spanish: toma, por favor
  alternatives_spanish:
  - toma ahora, por favor
  - por favor, toma
  lexicon: HALOT
  rationale: El hebreo combina mandato con cortesía/urgencia. «Toma, por favor» reproduce ese equilibrio de manera natural en español.
- source_word: הַחֲנִית
  english_pob_choice: the spear
  chosen_spanish: la lanza
  alternatives_spanish:
  - la jabalina
  - la pica
  lexicon: HALOT
  rationale: El término designa un arma arrojadiza o de asta. «Lanza» es la equivalencia más clara y natural en español; «spear» en inglés se reflejó aquí con un vocablo amplio igualmente válido.
- source_word: אֲשֶׁר מראשתו
  english_pob_choice: that is at his head
  chosen_spanish: que está junto a su cabeza
  alternatives_spanish:
  - que está a su cabeza
  - que está al lado de su cabeza
  lexicon: HALOT
  rationale: La expresión describe la posición del arma cerca de la cabeza de Saúl mientras duerme. «Junto a su cabeza» transmite la localización con naturalidad y evita una construcción demasiado literal o extraña.
- source_word: צַפַּחַת הַמַּיִם
  english_pob_choice: the jar of water
  chosen_spanish: la vasija de agua
  alternatives_spanish:
  - el jarro de agua
  - el cántaro de agua
  lexicon: HALOT
  rationale: El sustantivo designa un recipiente pequeño para agua. «Vasija de agua» es suficientemente general, claro y fiel al objeto sin imponer un tamaño o forma más precisa de lo que el hebreo da.
- source_word: וְנֵלֲכָה לָּנוּ
  english_pob_choice: and let us go
  chosen_spanish: y vámonos
  alternatives_spanish:
  - y vayamos
  - y partamos
  lexicon: HALOT
  rationale: El cohortativo expresa una propuesta de partida. «Vámonos» suena natural en español y conserva el matiz de acción conjunta e inmediata.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene el equivalente editorial del proyecto para el Tetragrámaton. En este versículo la fórmula con חָלִילָה funciona como rechazo solemne ante Yahvé, y «por Yahvé» conserva esa invocación sin sustituir el nombre por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מְשִׁיחַ en contexto real/cúltico
  english_pob_reading: the LORD’s anointed
  chosen_spanish_reading: el ungido de Yahvé
  alternative_spanish_readings:
  - el Mesías de Yahvé
  - el escogido de Yahvé
  rationale: Aunque existe relación léxica con «Mesías», aquí el referente es Saúl como rey consagrado por la unción. «Ungido» preserva la tensión entre el valor lexical y el contexto histórico sin sobregeneralizar el término.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; contended/title-sensitive rendering
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión del inglés POB que prefirió una construcción más natural para la expresión con מֵיְהוָה y afinó la localización de la lanza como «at his head». En español se conservó la fuerza idiomática con «¡Lejos de mí, por Yahvé!» y se vertió la ubicación con «junto a su cabeza», manteniendo el equilibrio entre literalidad auditable y claridad.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se traduce מְשִׁיחַ como «ungido» en este contexto histórico para evitar una lectura mesiánica que el hebreo inmediato no exige.
  - «Vámonos» conserva el valor cohortativo inclusivo del hebreo («y vayamos para nosotros»), sin introducir elementos no presentes en el texto.
