  text: אֵ֜לֶּה מַסְעֵ֣י בְנֵֽי יִשְׂרָאֵ֗ל אֲשֶׁ֥ר יָצְא֛וּ מֵ/אֶ֥רֶץ מִצְרַ֖יִם לְ/צִבְאֹתָ֑/ם בְּ/יַד מֹשֶׁ֖ה וְ/אַהֲרֹֽן־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/033/001.yaml
  text: These are the stages of the journey of the sons of Israel[a], who went out from the land of Egypt by their companies[d][c][b], under the hand of Moses and Aaron.
  footnotes:
  - marker: a
    text: Or 'journeys' or 'departures' for 'stages of the journey.' The Hebrew term refers to the successive travel stages in Israel's itinerary.
    reason: lexical_alternative
  - marker: b
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'according to their armies' or 'in their divisions.' The Hebrew can carry an organized, even military, sense.
    reason: lexical_alternative
  - marker: d
    text: 'Hebrew idiom: ''by the hand of Moses and Aaron,'' meaning under their agency or leadership.'
    reason: cultural_note
