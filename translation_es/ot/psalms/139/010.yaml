translation:
  language: es
  text: Aún allí tu mano me guiará, y tu diestra me sostendrá firmemente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu diestra me asirá» o «me sujetará». El verbo hebreo puede denotar tomar con firmeza; aquí se vierte en un sentido de sostén porque el paralelo con «me guiará» favorece una acción protectora.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: גַּם intensifica el lugar imaginado; en español, «aun» conserva esa fuerza de sorpresa o énfasis mejor que un simple «también».
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en aquel lugar
  lexicon: HALOT
  rationale: Es un adverbio locativo simple. «Allí» es natural y mantiene la referencia al lugar distante del contexto.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu diestra
  - tu poder
  lexicon: HALOT
  rationale: Se conserva la imagen corporal literal de la mano como metáfora de acción y guía divina.
- source_word: תַנְחֵנִי
  english_pob_choice: will lead me
  chosen_spanish: me guiará
  alternatives_spanish:
  - me conducirá
  - me llevará
  lexicon: HALOT
  rationale: El hifil de נחה expresa llevar/dirigir. «Guiar» comunica bien la idea sin perder el matiz direccional y encaja con el paralelismo del versículo.
- source_word: וְתֹאחֲזֵנִי
  english_pob_choice: and ... will hold me fast
  chosen_spanish: me sostendrá firmemente
  alternatives_spanish:
  - me sujetará
  - me asirá
  - me agarrará
  lexicon: HALOT
  rationale: אחז puede significar asir, sujetar o sostener. En este contexto de presencia protectora, «sostendrá firmemente» preserva la fuerza del verbo sin volverlo hostil.
- source_word: יְמִינֶךָ
  english_pob_choice: your right hand
  chosen_spanish: tu diestra
  alternatives_spanish:
  - tu mano derecha
  - tu derecha
  lexicon: HALOT
  rationale: «Diestra» es un equivalente digno y bíblicamente natural en español para יְמִינֶךָ, manteniendo el valor simbólico de fuerza y protección.
theological_decisions:
- issue: El tono de la acción de agarrar/sujetar en וְתֹאחֲזֵנִי
  english_pob_reading: supportive, sustaining action ('your right hand will hold me fast')
  chosen_spanish_reading: acción de sostén firme y protector ('me sostendrá firmemente')
  alternative_spanish_readings:
  - me asirá
  - me agarrará
  - me sujetará
  rationale: En el contexto de Salmo 139:7–12, el punto es que ni la distancia ni la oscuridad quedan fuera del alcance de Dios. El español debe conservar esa firmeza, pero sin sugerir violencia o captura hostil.
  doctrine_reference: 'Preservar la tensión teológica del texto poético: presencia ineludible pero benéfica de Dios.'
translation_notes:
  revision_awareness: El texto base inglés fue revisado solo por capitalización inicial, sin cambios sustantivos de sentido. La lectura auditada permanece estable y coherente con el hebreo.
  spanish_consistency_notes:
  - Se mantiene el paralelismo verbal entre «me guiará» y «me sostendrá firmemente».
  - Se evita reemplazar la imagen de «mano/diestra» por una abstracción como «poder» o «fuerza».
  - «Aun allí» conserva el énfasis de גַּם sin añadir interpretación adicional.
