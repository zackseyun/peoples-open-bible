    text: Or 'immersed himself.' The Hebrew verb can denote dipping or immersing.
    reason: lexical_alternative
  - marker: b
    text: Or 'he was cleansed.' The Hebrew can be rendered either as a state ('he was clean') or as the result of cleansing.
    reason: lexical_alternative
