  glossary_alignment: No hay términos del glosario doctrinal principal en disputa. Las decisiones léxicas siguen bien el expediente inglés salvo en el matiz de ἀπωσάμενοι y ἐκνεύοντες, donde conviene ajustar la redacción española para conservar mejor la imagen moral del griego.
