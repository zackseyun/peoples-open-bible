  language: ko
  text: 여러분은 계명들을 알고 있습니다. 「살인하지 말라, 간음하지 말라, 도둑질하지 말라, 거짓 증언하지 말라, 빼앗지 말라, 네 아버지와 어머니를 공경하라.」
  philosophy: optimal-equivalence
