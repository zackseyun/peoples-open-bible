translation:
  language: es
  text: Tú nos haces un proverbio[a] entre las naciones, un sacudir de la cabeza[b] entre los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un dicho proverbial entre las naciones». מָשָׁל puede referirse a un proverbio o a una palabra de escarnio; el contexto de lamento favorece el matiz de burla.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «un sacudir de la cabeza»; es un gesto de burla o desprecio.
    reason: cultural_note
lexical_decisions:
- source_word: תְּשִׂימֵנוּ
  english_pob_choice: You make us
  chosen_spanish: Tú nos haces
  alternatives_spanish:
  - Tú nos pones
  - Tú nos estableces
  - Tú nos has hecho
  lexicon: HALOT
  rationale: שׂים puede significar poner, establecer o hacer. En este lamento, «nos haces» comunica bien la acción causativa/resultativa dirigida a Dios, con naturalidad en español y sin perder el tono directo del hebreo de 2ms.
- source_word: מָשָׁל
  english_pob_choice: a proverb
  chosen_spanish: un proverbio
  alternatives_spanish:
  - un dicho proverbial
  - un byword
  - un refrán
  lexicon: HALOT
  rationale: מָשָׁל puede ser proverbio, dicho proverbial o palabra de escarnio. «Proverbio» conserva el valor lexical central que el inglés POB retuvo, y deja que la segunda cola explicite el matiz de burla.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: HALOT
  rationale: גּוֹיִם aquí designa a los pueblos/naciones extranjeras en general. «Entre las naciones» es preciso, natural y mantiene el paralelismo poético.
- source_word: מְנוֹד רֹאשׁ
  english_pob_choice: a shaking of the head
  chosen_spanish: un sacudir de la cabeza
  alternatives_spanish:
  - un mover de la cabeza
  - un cabeceo
  - un gesto de burla
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de burla o desprecio mediante el movimiento de la cabeza. «Un sacudir de la cabeza» conserva la imagen concreta sin volverla interpretativa en exceso.
- source_word: בַּל אֻמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - entre las gentes
  lexicon: HALOT
  rationale: La segunda línea es paralela a la primera. «Entre los pueblos» preserva el paralelismo y evita una repetición demasiado plana de «naciones», mientras sigue siendo fiel al sentido colectivo del hebreo.
translation_notes:
  revision_awareness: Se corrigió la marcación de notas para que cada marcador aparezca exactamente en el texto principal. La redacción sigue de cerca el hebreo y el audit trail inglés, manteniendo el paralelismo de dos cola y el matiz de escarnio implícito.
  spanish_consistency_notes:
  - Se mantuvo la traducción directa de segunda persona singular para reflejar el hebreo verbal.
  - Se usó «naciones»/«pueblos» para conservar el paralelismo poético sin aplanar el hebreo.
  - Se evitó «Gentiles» por no ser el valor contextual principal aquí.
  - Se preservó la imagen corporal concreta de la cabeza, con la nota explicativa para el gesto de burla.
