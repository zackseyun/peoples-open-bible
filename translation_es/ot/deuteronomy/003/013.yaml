translation:
  language: es
  text: 'Y el resto de Galaad, y todo Basán, el reino de Og, lo di a la media tribu de Manasés: todo el territorio de Argob, es decir, todo Basán. Esa tierra se llama la tierra de los refaítas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «la tierra de los gigantes». «Refaítas» conserva el nombre hebreo de un pueblo antiguo asociado con esta región.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: the rest of
  chosen_spanish: el resto de
  alternatives_spanish:
  - el remanente de
  - lo restante de
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, «el resto de» comunica de manera natural la idea de lo que queda después de una porción anterior, sin añadir matices ajenos al hebreo.
- source_word: הַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: HALOT
  rationale: Se usa la forma española habitual del topónimo bíblico, clara para lectores en español y fiel a la referencia geográfica.
- source_word: וְכָל הַבָּשָׁן
  english_pob_choice: and all Bashan
  chosen_spanish: y todo Basán
  alternatives_spanish:
  - y toda la región de Basán
  - y todo el Basán
  lexicon: HALOT
  rationale: «Todo Basán» conserva la amplitud total del hebreo כָל y mantiene el topónimo sin explicarlo de más.
- source_word: מַמְלֶכֶת עוֹג
  english_pob_choice: the kingdom of Og
  chosen_spanish: el reino de Og
  alternatives_spanish:
  - el reino de Og
  - el dominio de Og
  lexicon: HALOT
  rationale: «Reino» refleja bien מַמְלֶכֶת en un contexto político-territorial; «dominio» sería posible, pero menos directo.
- source_word: נָתַתִּי
  english_pob_choice: I gave
  chosen_spanish: lo di
  alternatives_spanish:
  - lo entregué
  - lo asigné
  lexicon: HALOT
  rationale: El verbo «dar» corresponde al lenguaje de reparto de territorio y preserva la sencillez del acto narrado; «entregar» o «asignar» añadirían un matiz más interpretativo.
- source_word: לַחֲצִי שֵׁבֶט הַמְנַשֶּׁה
  english_pob_choice: to the half-tribe of Manasseh
  chosen_spanish: a la media tribu de Manasés
  alternatives_spanish:
  - a la mitad de la tribu de Manasés
  - a la semitribu de Manasés
  lexicon: HALOT
  rationale: «Media tribu» es la manera más natural y establecida en español bíblico para expresar la subdivisión de Manasés sin perder el valor administrativo del hebreo.
- source_word: כֹּל חֶבֶל הָאַרְגֹּב
  english_pob_choice: all the region of Argob
  chosen_spanish: todo el territorio de Argob
  alternatives_spanish:
  - toda la región de Argob
  - todo el distrito de Argob
  lexicon: HALOT
  rationale: «Territorio» transmite bien חֶבֶל como extensión geográfica delimitada; evita la imagen literal de «cuerda» y suena natural en español.
- source_word: לְכָל הַבָּשָׁן
  english_pob_choice: that is, all Bashan
  chosen_spanish: es decir, todo Basán
  alternatives_spanish:
  - esto es, todo Basán
  - o sea, todo Basán
  lexicon: HALOT
  rationale: La frase funciona como aclaración explicativa; «es decir» reproduce esa relación appositiva de forma clara y sobria.
- source_word: הַהוּא
  english_pob_choice: that
  chosen_spanish: ese
  alternatives_spanish:
  - aquel
  - ese mismo
  lexicon: HALOT
  rationale: El demostrativo retoma el territorio ya mencionado; «ese» mantiene la referencia anafórica con naturalidad en español.
- source_word: יִקָּרֵא
  english_pob_choice: is called
  chosen_spanish: es llamado
  alternatives_spanish:
  - se llama
  - es conocido como
  lexicon: HALOT
  rationale: El pasivo hebreo se refleja con una pasiva española sencilla. «Se llama» sería muy idiomático, pero «es llamado» conserva mejor la forma del enunciado descriptivo.
- source_word: אֶרֶץ רְפָאִים
  english_pob_choice: the land of the Rephaim
  chosen_spanish: la tierra de los refaítas
  alternatives_spanish:
  - la tierra de los Rephaim
  - la tierra de los gigantes
  lexicon: HALOT
  rationale: Se mantiene el nombre étnico en forma española «refaítas» para preservar la transparencia del término hebreo, en lugar de resolverlo interpretativamente como «gigantes».
theological_decisions:
- issue: Si רְפָאִים debe traducirse como nombre étnico o como 'gigantes'
  english_pob_reading: the land of the Rephaim
  chosen_spanish_reading: la tierra de los refaítas
  alternative_spanish_readings:
  - la tierra de los gigantes
  rationale: La frase hebrea parece funcionar aquí como designación histórica/toponímica de un pueblo antiguo. Traducirla como nombre étnico preserva la tensión lexical y evita imponer una interpretación que el versículo no explicita.
  doctrine_reference: Transparencia original-lenguaje; evitar que la traducción resuelva por adelantado una ambigüedad del texto.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que cambió 'was called' a 'is called' para reflejar con mayor cercanía el imperfecto pasivo hebreo. También conserva la decisión revisada de mantener 'the land of the Rephaim' como nombre étnico transliterado en vez de 'giants'.
  spanish_consistency_notes:
  - Se mantiene «Basán» de forma consistente para בָּשָׁן.
  - Se usa «Galaad» para el topónimo bíblico en español.
  - «Media tribu de Manasés» conserva la expresión administrativa tradicional sin perder precisión.
  - La pasiva «es llamado» refleja mejor la forma hebrea que una paráfrasis más libre.
