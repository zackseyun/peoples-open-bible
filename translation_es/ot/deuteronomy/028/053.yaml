review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del hebreo: futuro predictivo, imagen fuerte de ''fruto de tu vientre'', ''la carne de tus hijos y tus hijas'', el nombre divino ''Yahvé'', y la cláusula final de opresión enemiga. Sin embargo, contiene un error grave en el texto corrido: ''en el sitio de la siega'' introduce ''siega'', que no está en el hebreo y contradice מָצוֹר ''sitio/asedio''. También la forma ''tus hijos y de tus hijas'' es poco natural en español, y ''te habrá dado'' no refleja bien el perfecto hebreo aquí, donde conviene un pasado simple relativo (''te dio''/''te ha dado'').'
  spanish_quality_summary: 'La lectura general es comprensible, pero presenta una errata semántica mayor (''siega'') y una coordinación torpe (''tus hijos y de tus hijas''). Además, la nota [b] del borrador no corresponde al inglés auditado ni al lugar correcto: el inglés preserva una alternativa para ''distress'', no para ''sons and daughters''. El verso necesita reparación menor pero clara para quedar fiel y natural en español eclesial moderno.'
  glossary_alignment: Alinea correctamente יְהוָה como 'Yahvé' y mantiene 'carne' para בָּשָׂר. También preserva la mención explícita de 'hijos e hijas' en vez de neutralizarla. Debe corregirse la nota léxica para que la alternativa recaiga en 'angustia'/'aflicción' según el rastro POB, y no en 'tu descendencia'.
  issues:
  - severity: high
    issue: 'Error léxico en el texto: ''siega'' por ''sitio/asedio'''
    rationale: El hebreo בְּמָצוֹר significa 'en el sitio/asedio'. 'Siega' cambia totalmente el sentido y desfigura el contexto de maldición por hambre bajo asedio.
  - severity: medium
    issue: 'Construcción antinatural: ''la carne de tus hijos y de tus hijas'''
    rationale: Aunque inteligible, suena torpe. 'La carne de tus hijos e hijas' o 'de tus hijos y tus hijas' preserva mejor el paralelismo hebreo con español natural.
  - severity: medium
    issue: 'Tiempo verbal poco adecuado: ''te habrá dado'''
    rationale: נָתַן es perfecto simple en cláusula relativa; en español aquí conviene 'te dio' o 'te ha dado'. El futuro compuesto introduce una matización especulativa innecesaria.
  - severity: medium
    issue: Nota [b] mal asignada
    rationale: El audit trail inglés da la alternativa para וּבְמָצוֹק ('distress' = 'hardship/anguish'), no para 'your sons and daughters'. La nota española debe trasladarse a 'angustia'.
  revised_spanish_text: Y comerás el fruto de tu vientre[a], la carne de tus hijos e hijas, que Yahvé tu Dios te dio, en el sitio y en la angustia[b] con que tu enemigo te oprimirá.
  revised_footnotes:
