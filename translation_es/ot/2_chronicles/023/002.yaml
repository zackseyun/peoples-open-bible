translation:
  language: es
  text: Y recorrieron Judá y reunieron a los levitas de todas las ciudades de Judá, y a los jefes de las casas paternas[a] de Israel; y llegaron a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «casas ancestrales» o, de manera más idiomática, «jefes de familia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסֹבּוּ
  english_pob_choice: went throughout
  chosen_spanish: recorrieron
  alternatives_spanish:
  - anduvieron por
  - fueron por todo
  lexicon: HALOT
  rationale: El contexto narrativo indica desplazamiento por la región para cumplir una misión, no solo el giro físico del verbo. «Recorrieron» comunica ese movimiento por Judá con naturalidad en español.
- source_word: בִּיהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: HALOT
  rationale: Es el nombre propio del territorio/rey no helenizado; «Judá» corresponde directamente al hebreo.
- source_word: וַיִּקְבְּצוּ
  english_pob_choice: gathered
  chosen_spanish: reunieron
  alternatives_spanish:
  - juntaron
  - convocaron
  lexicon: HALOT
  rationale: «Reunieron» expresa bien קבץ como agrupar personas para una acción común y suena natural en español bíblico contemporáneo.
- source_word: אֶת־הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los sacerdotes levitas
  lexicon: HALOT
  rationale: Designación tribal/cultual directa; «levitas» es el equivalente estándar y fiel.
- source_word: מִכָּל עָרֵי יְהוּדָה
  english_pob_choice: from all the cities of Judah
  chosen_spanish: de todas las ciudades de Judá
  alternatives_spanish:
  - de cada ciudad de Judá
  - de todas las urbes de Judá
  lexicon: HALOT
  rationale: Mantiene el alcance total del hebreo y conserva el sentido territorial de origen.
- source_word: וְרָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los jefes de las casas ancestrales
  - los cabezas de familia
  lexicon: HALOT
  rationale: Se preserva la estructura idiomática del hebreo con una formulación comprensible. «Casas paternas» conserva la relación genealógica y administrativa del giro.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - para Israel
  - del Israel
  lexicon: HALOT
  rationale: La preposición ל aquí marca pertenencia/relación; «de Israel» respeta la coordinación nominal y evita forzar una lectura de finalidad.
- source_word: וַיָּבֹאוּ אֶל יְרוּשָׁלִָם
  english_pob_choice: and they came to Jerusalem
  chosen_spanish: y llegaron a Jerusalén
  alternatives_spanish:
  - y vinieron a Jerusalén
  - y entraron en Jerusalén
  lexicon: HALOT
  rationale: «Llegaron a Jerusalén» reproduce bien בוא con אֶל en un registro natural y narrativo.
theological_decisions:
- issue: Alcance de «Israel» en un contexto centrado en Judá
  english_pob_reading: Retain 'Israel' in the main text without narrowing it to 'Judah' or paraphrasing it as 'the people.'
  chosen_spanish_reading: Conservar «Israel» en el texto principal sin reducirlo a «Judá» ni sustituirlo por «el pueblo».
  alternative_spanish_readings:
  - Judá
  - el pueblo de Israel
  rationale: El hebreo dice explícitamente «Israel». En Crónicas, el término puede abarcar al pueblo del pacto en sentido amplio, aun dentro de un marco de Judá. Mantenerlo evita una armonización interpretativa no sustentada por el texto.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Idiomático genealógico de הָאָבוֹת
  english_pob_reading: Use 'fathers’ houses' in the main text with a clarifying lexical footnote.
  chosen_spanish_reading: Usar «casas paternas» en el texto principal con nota léxica aclaratoria.
  alternative_spanish_readings:
  - casas ancestrales
  - familias
  rationale: El hebreo tiene una expresión técnico-genealógica y administrativa. «Casas paternas» conserva la forma y la textura del original; la nota permite aclarar el sentido sin borrar el giro.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que eliminó el añadido interpretativo equivalente a «along with» para reflejar una coordinación simple. La versión española también usa coordinación simple con «y».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exigiera; este versículo no lo contiene.
  - Se conservó el nombre propio «Judá» y el término étnico/cultual «levitas» de manera consistente con el proyecto.
  - «Casas paternas» conserva la idiomaticidad hebrea y queda aclarado por nota para lectores menos familiarizados con el giro.
  - Se evitó introducir explicaciones sobre la función de los jefes o una ampliación de «Israel», para no exceder el alcance del hebreo.
