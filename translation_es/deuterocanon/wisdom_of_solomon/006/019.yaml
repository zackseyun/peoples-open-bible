translation:
  language: es
  text: y la incorruptibilidad[a] hace que uno esté cerca de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la inmortalidad hace que uno esté cerca de Dios». El griego ἀφθαρσία puede denotar imperecibilidad o libertad de corrupción; aquí «incorruptibilidad» conserva el sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφθαρσία
  english_pob_choice: incorruptibility
  chosen_spanish: incorruptibilidad
  alternatives_spanish:
  - inmortalidad
  - imperishabilidad
  lexicon: LSJ/BDAG
  rationale: El sustantivo griego designa un estado de no estar sujeto a corrupción o decadencia. «Incorruptibilidad» conserva mejor ese alcance moral y ontológico que «inmortalidad», que en español puede sonar más restringido a la mera duración sin fin.
- source_word: ἐγγὺς
  english_pob_choice: near
  chosen_spanish: cerca
  alternatives_spanish:
  - próximo
  - junto a
  lexicon: LSJ
  rationale: El adverbio expresa proximidad relacional. «Cerca» es la forma más natural en español y mantiene la idea de cercanía sin añadir matices místicos no presentes en el griego.
- source_word: εἶναι
  english_pob_choice: to be
  chosen_spanish: estar
  alternatives_spanish:
  - ser
  lexicon: LSJ
  rationale: Tras ποιεῖ, la construcción expresa el estado de estar cerca. En español, «estar» comunica mejor una condición o relación situada que «ser».
- source_word: ποιεῖ
  english_pob_choice: makes one near to God
  chosen_spanish: hace estar cerca de Dios
  alternatives_spanish:
  - hace que uno esté cerca de Dios
  - acerca a Dios
  lexicon: LSJ
  rationale: El verbo es causativo. En español, «hace estar cerca de Dios» conserva la forma verbal directa del griego y evita introducir un sujeto explícito que el texto no da.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - a Dios
  lexicon: LSJ
  rationale: El genitivo con ἐγγύς requiere en español una construcción preposicional. «De Dios» en el sintagma final conserva la relación del original, aunque la fluidez natural queda reforzada por el verbo de estado.
theological_decisions:
- issue: Objeto implícito de la acción causativa
  english_pob_reading: 'Supply a generic human object: ''makes one near to God'''
  chosen_spanish_reading: «hace estar cerca de Dios» con sujeto implícito de persona
  alternative_spanish_readings:
  - «hace que uno esté cerca de Dios»
  - «acerca a Dios»
  rationale: El griego omite el objeto explícito, pero el contexto argumenta sobre quien adquiere sabiduría. En español, una formulación impersonal con sujeto implícito humano evita sobreespecificar quién es el objeto sin perder claridad.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor semántico de ἀφθαρσία
  english_pob_reading: incorruptibility
  chosen_spanish_reading: incorruptibilidad
  alternative_spanish_readings:
  - inmortalidad
  - imperishabilidad
  rationale: La línea sapiencial vincula la condición no corruptible con la cercanía a Dios. «Incorruptibilidad» preserva tanto la dimensión existencial como la ética, sin reducirla a inmortalidad biológica.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió de «causes one to be near God» a «makes one near to God» para reflejar más directamente ποιεῖ ἐγγὺς εἶναι. La redacción española mantiene esa misma relación causativa con una forma natural y formal: «hace estar cerca de Dios».'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ, conforme al estándar español del proyecto.
  - Se usa «incorruptibilidad» para conservar el peso moral y ontológico de ἀφθαρσία.
  - La construcción «hace estar cerca de Dios» preserva la causalidad del griego sin añadir una interpretación doctrinal extra.
