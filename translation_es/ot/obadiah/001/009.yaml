review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: colapso de los guerreros de Temán, cláusula final con לְמַעַן, y juicio total sobre los hombres del monte de Esaú. Sin embargo, dos decisiones clave necesitan ajuste: וְחַתּוּ se refleja mejor como ''quedarán destrozados'' o similar que como ''abatidos'', y sobre todo יִכָּרֶת debe preservar mejor la imagen y fuerza de ''ser cortado/eliminado'' sin sobreinterpretar hacia ''exterminado''. Además, la nota [c] no corresponde al tipo de nota preservado en el rastro inglés, mientras falta una nota para la lectura alternativa de la frase final.'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. 'Tus hombres valerosos, Temán' funciona, aunque mantiene la misma aposición abrupta del original. 'Por la matanza' suena bien. La principal mejora estilística y semántica es evitar 'abatidos' y 'exterminado', que respectivamente suavizan o reinterpretan el hebreo. También conviene alinear las notas con las del POB inglés y evitar una nota innecesaria en 'todo hombre'.
  glossary_alignment: 'No hay conflicto con Yahvé, Mesías, Espíritu, etc. El tratamiento de תֵּימָן como ''Temán'' está bien. La decisión sobre אִישׁ como ''todo hombre'' concuerda con la política de género-precisión. La divergencia principal es כרת: ''sea exterminado'' se aleja de la decisión auditada ''may be cut off''; en español conviene ''sea eliminado'' o ''sea cortado'' según naturalidad, con preferencia aquí por ''sea eliminado'' en texto y una nota que preserve la alternativa estructural de la frase final.'
  issues:
  - severity: medium
    issue: '''serán abatidos'' debilita y desplaza el matiz de וְחַתּוּ'
    rationale: El hebreo, según el expediente, combina pánico y ruina militar. 'Abatidos' en español puede sugerir solo desánimo o derrota general; 'quedarán destrozados' preserva mejor el colapso violento.
  - severity: high
    issue: '''sea exterminado'' sobreinterpreta יִכָּרֶת'
    rationale: El expediente inglés eligió 'may be cut off' precisamente para conservar la imagen y sintaxis hebreas. 'Exterminado' introduce una formulación más interpretativa y más fuerte de lo necesario.
  - severity: medium
    issue: La nota [c] sobre 'todo hombre' no corresponde al aparato auditado, y falta la nota sobre la lectura alternativa de la frase final
    rationale: El POB inglés conserva una nota alternativa sobre el alcance de 'by slaughter', no una nota textual sobre 'every man'. En español conviene reflejar esa misma nota en el lugar correspondiente.
  revised_spanish_text: Y tus hombres valerosos[a], Temán[b], quedarán destrozados, para que todo hombre del monte de Esaú sea eliminado[c] por la matanza.
  revised_footnotes:
