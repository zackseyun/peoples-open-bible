translation:
  language: es
  text: E hicieron una proclamación[a] por todo Judá y por Jerusalén, a todos los hijos del exilio[b], para que se reunieran en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Proclamación» traduce el valor público y oficial de קוֹל en este contexto; no significa aquí simplemente «voz».
    reason: lexical_alternative
  - marker: b
    text: 'Lit. «a todos los hijos del exilio»; también: «a todos los exiliados» o «a todos los que habían regresado del exilio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבִירוּ
  english_pob_choice: they made
  chosen_spanish: hicieron
  alternatives_spanish:
  - proclamaron
  - hicieron pasar
  - dieron
  lexicon: HALOT
  rationale: El verbo causativo con קוֹל es un modismo de anuncio público. En español, «hicieron una proclamación» conserva el acto formal de dar a conocer el mensaje sin forzar una traducción demasiado literal como «hicieron pasar».
- source_word: קוֹל
  english_pob_choice: a proclamation
  chosen_spanish: una proclamación
  alternatives_spanish:
  - una voz
  - un anuncio
  - un mensaje
  lexicon: HALOT
  rationale: Aunque literalmente es «voz» o «sonido», aquí el contexto administrativo pide una noción pública y formal. «Proclamación» refleja mejor el uso idiomático del hebreo.
- source_word: בִּיהוּדָה וִירוּשָׁלָם
  english_pob_choice: throughout Judah and Jerusalem
  chosen_spanish: por todo Judá y Jerusalén
  alternatives_spanish:
  - en Judá y Jerusalén
  - a lo largo de Judá y Jerusalén
  lexicon: HALOT
  rationale: La preposición marca el ámbito donde se difundió el anuncio. «Por todo» expresa el sentido distributivo de circulación del pregón en español natural.
- source_word: לְכֹל בְּנֵי הַגּוֹלָה
  english_pob_choice: to all the sons of the exile
  chosen_spanish: a todos los hijos del exilio
  alternatives_spanish:
  - a todos los exiliados
  - a todos los hijos del cautiverio
  - a todos los retornados del exilio
  lexicon: HALOT
  rationale: Se conserva la forma literal «hijos de» por la fuerza idiomática del hebreo y por la política de no neutralizar innecesariamente el sustantivo masculino. «Exilio» mantiene el vínculo con el estado/comunidad exílica.
- source_word: הַגּוֹלָה
  english_pob_choice: the exile
  chosen_spanish: el exilio
  alternatives_spanish:
  - la deportación
  - la comunidad exiliada
  lexicon: HALOT
  rationale: En español «el exilio» es la manera más transparente de reflejar el sustantivo hebreo como condición histórica y comunitaria. Evita una perífrasis más interpretativa.
- source_word: לְהִקָּבֵץ
  english_pob_choice: that they should gather
  chosen_spanish: para que se reunieran
  alternatives_spanish:
  - para reunirse
  - para que se congregaran
  - para que se juntaran
  lexicon: HALOT
  rationale: El infinitivo nifal expresa finalidad. «Se reunieran» transmite bien la idea de congregarse en respuesta a una convocatoria, con un español natural y digno.
- source_word: יְרוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  lexicon: HALOT
  rationale: El verbo de reunión admite perfectamente la localización «en Jerusalén», que en español suena más idiomática que «a Jerusalén» en este contexto.
translation_notes:
  revision_awareness: La lectura coincide con el paquete fuente hebreo y el audit trail inglés en sentido y decisiones léxicas; no se requieren revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el topónimo «Jerusalén» sin artículo.
  - «Judá» y «Jerusalén» se coordinan con una sola preposición distributiva («por todo»), siguiendo el valor de difusión del anuncio.
  - Se conserva la frase idiomática «hijos del exilio» con nota aclaratoria para no perder la forma hebrea ni la referencia comunitaria.
