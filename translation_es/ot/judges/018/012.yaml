translation:
  language: es
  text: Subieron y acamparon en Quiriat-jearim, en Judá. Por eso aquel lugar ha sido llamado Mahané-dan[a] hasta hoy; he aquí[b], está detrás de Quiriat-jearim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mahané-dan significa «Campamento de Dan».
    reason: lexical_alternative
  - marker: b
    text: O «miren» o «vean»; el hebreo usa una partícula deíctica que llama la atención sobre la nota geográfica que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: They went up
  chosen_spanish: Subieron
  alternatives_spanish:
  - Fueron hacia arriba
  - Ascendieron
  lexicon: HALOT
  rationale: עלה en contexto narrativo de desplazamiento suele expresar movimiento ascendente o de avance. «Subieron» conserva el giro hebreo con naturalidad en español y sin añadir una dirección más precisa de la que da el texto.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - levantaron campamento
  lexicon: HALOT
  rationale: חנה significa acampar o establecer campamento. «Acamparon» es claro y fiel para un contexto de viaje.
- source_word: בְּקִרְיַת יְעָרִים
  english_pob_choice: at Kiriath-jearim
  chosen_spanish: en Quiriat-jearim
  alternatives_spanish:
  - en Kiriat-jearim
  - en Quiriat de Jearim
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. Con nombres de lugar, «en» resulta natural en español cuando el énfasis está en la ubicación del campamento.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - de Judá
  lexicon: HALOT
  rationale: La frase sitúa el lugar dentro del territorio de Judá. «En Judá» comunica mejor esa localización territorial.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La fórmula introduce una explicación etiológica del nombre del lugar. «Por eso» es idiomático y mantiene la conexión causal.
- source_word: קָרְאוּ לַמָּקוֹם הַהוּא
  english_pob_choice: that place has been called
  chosen_spanish: aquel lugar ha sido llamado
  alternatives_spanish:
  - llamaron a aquel lugar
  - aquel lugar fue llamado
  lexicon: HALOT
  rationale: El hebreo está en activo plural, pero en español una pasiva resultativa suena natural en fórmulas de nombre de lugar y preserva el efecto durativo de «hasta hoy».
- source_word: מַחֲנֵה דָן
  english_pob_choice: Mahaneh-dan
  chosen_spanish: Mahané-dan
  alternatives_spanish:
  - Campamento de Dan
  - Campamento de Dan
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado como topónimo. El sentido léxico de la expresión se conserva en nota para no perder la relación con el hebreo.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es la equivalencia idiomática normal en español para la fórmula temporal hebrea y conserva la idea de persistencia del nombre.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - vean
  lexicon: HALOT
  rationale: En español moderno, «miren» transmite la función deíctica de הנה de manera más natural que un calco solemne, sin perder el llamado de atención sobre la nota geográfica.
- source_word: אַחֲרֵי
  english_pob_choice: behind
  chosen_spanish: detrás de
  alternatives_spanish:
  - tras
  - al otro lado de
  lexicon: HALOT
  rationale: La revisión inglesa optó por «behind» para no imponer una lectura direccional más precisa. «Detrás de» refleja la relación espacial literal sin convertirla en «al oeste de».
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se evita interpretar אַחֲרֵי como «al oeste de» y se conserva la relación espacial más literal «detrás de». También se mantiene el valor etiológico del nombre del lugar con una formulación española natural.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto para el nombre divino solo cuando aparezca explícitamente en el texto; aquí no aparece.
  - 'Se conserva la transliteración de topónimos con ortografía hispana estable: Quiriat-jearim, Judá, Mahané-dan.'
  - Se mantiene una sintaxis sobria y pública, sin expandir el alcance de la nota geográfica más allá de la evidencia textual.
