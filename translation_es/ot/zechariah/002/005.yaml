translation:
  language: es
  text: Y alcé mis ojos y vi, y he aquí, un hombre, y en su mano, una cuerda de medir[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un cordel de medir». El término hebreo puede referirse más concretamente a una cuerda o cordel usado para medir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשָּׂא
  english_pob_choice: I lifted up
  chosen_spanish: alcé
  alternatives_spanish:
  - levanté
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático para la acción de mirar en visión. «Alcé» conserva la elevación del gesto sin volver la frase pesada en español.
- source_word: עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi mirada
  lexicon: HALOT
  rationale: Se mantiene el objeto literal del giro hebreo. «Mi mirada» sería más interpretativo y suavizaría la imaginería visionaria.
- source_word: וָאֵרֶא
  english_pob_choice: and saw
  chosen_spanish: y vi
  alternatives_spanish:
  - y yo vi
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural del verbo de percepción en primera persona, conservando la secuencia narrativa de la visión.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - he aquí
  lexicon: HALOT
  rationale: «Y he aquí» mantiene el valor discursivo de sorpresa o de aparición repentina en la visión, más cercano al registro bíblico que «mira».
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino singular y designa a un varón en la escena. Se conserva esa precisión en vez de neutralizarla.
- source_word: וּבְיָדוֹ
  english_pob_choice: and in his hand
  chosen_spanish: y en su mano
  alternatives_spanish:
  - y con una mano
  - sosteniendo
  lexicon: HALOT
  rationale: La frase se conserva de manera literal para mantener el detalle visual de la visión. «Sosteniendo» explicita la acción, pero va más allá de la forma hebrea.
- source_word: חֶבֶל מִדָּה
  english_pob_choice: a measuring line
  chosen_spanish: una cuerda de medir
  alternatives_spanish:
  - una línea de medir
  - un cordel de medir
  - una cuerda para medir
  lexicon: HALOT
  rationale: El hebreo puede referirse de manera concreta a una cuerda o cordel usado para medir. Se prefirió «cuerda de medir» para preservar esa concreción material; «línea de medir» suena más abstracto en español.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una traducción óptima-equivalente con nota léxica para חֶבֶל מִדָּה; la versión española conserva esa misma tensión entre el sentido funcional general («cuerda de medir») y la posibilidad más concreta de «cordel/cuerda». No se requieren revisiones textuales respecto del paquete fuente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y «Mesías» porque el versículo no contiene el Tetragrámaton ni lenguaje mesiánico.
  - Se mantuvo el orden narrativo de visión con verbos en primera persona y el marcador «y he aquí».
  - La nota a pie conserva la alternativa concreta reconocida por el audit trail inglés, adaptada a la naturalidad del español.
