translation:
  language: es
  text: Miren, estoy reprendiendo su simiente[a], y esparciré estiércol[b] sobre sus rostros —el estiércol de sus fiestas—, y serán llevados con él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su semilla»; algunos entienden aquí una referencia al grano o a los cultivos, más que a la descendencia.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «el estiércol de sus fiestas»; probablemente alude al desecho de los animales ofrecidos en las fiestas.'
    reason: lexical_alternative
  - marker: c
    text: La cláusula final es difícil. Probablemente significa que los sacerdotes serán removidos junto con el estiércol hacia un lugar impuro.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנְנִי גֹעֵר
  english_pob_choice: Look, I am rebuking
  chosen_spanish: Mira, estoy reprendiéndoles
  alternatives_spanish:
  - He aquí, reprendo
  - Mira, los reprendo
  lexicon: HALOT
  rationale: La combinación de הִנְנִי con un participio expresa una घोषणा/afirmación inmediata; en español, «Mira» conserva el valor de atención profética y «estoy reprendiéndoles» mantiene el sentido de גער como reprender sin suavizarlo.
- source_word: הַזֶּרַע
  english_pob_choice: your seed
  chosen_spanish: su simiente
  alternatives_spanish:
  - su semilla
  - sus descendientes
  - su descendencia
  lexicon: HALOT
  rationale: זרע puede ser literal («semilla») o metafórico («descendencia»). Aquí mantengo «simiente» para conservar la correspondencia léxica con el hebreo y la ambigüedad que el propio contexto permite, sin decidir de forma innecesaria entre agricultura y posteridad.
- source_word: וְזֵרִיתִי
  english_pob_choice: I will spread
  chosen_spanish: esparciré
  alternatives_spanish:
  - arrojaré
  - dispersaré
  lexicon: HALOT
  rationale: זרה en piel tiene el matiz de esparcir/aventar. «Esparciré» reproduce bien la acción humillante y violenta sobre los rostros.
- source_word: פֶרֶשׁ
  english_pob_choice: dung
  chosen_spanish: estiércol
  alternatives_spanish:
  - boñiga
  - excremento
  - basura
  lexicon: HALOT
  rationale: El término hebreo designa estiércol o excremento animal. «Estiércol» es directo, digno y suficientemente fuerte para conservar el efecto ofensivo del pasaje.
- source_word: עַל פְּנֵיכֶם
  english_pob_choice: on your faces
  chosen_spanish: sobre sus rostros
  alternatives_spanish:
  - sobre sus caras
  - en sus rostros
  lexicon: HALOT
  rationale: «Rostros» conserva la imagen corporal y la vergüenza pública del hebreo. El posesivo se expresa de forma natural en español con el dativo/posesivo referencial en contexto de خطاب directo.
- source_word: פֶּרֶשׁ חַגֵּיכֶם
  english_pob_choice: the dung of your festivals
  chosen_spanish: el estiércol de sus fiestas
  alternatives_spanish:
  - el estiércol de sus festividades
  - el estiércol de sus celebraciones
  lexicon: HALOT
  rationale: חַגִּים son fiestas/festividades. Sigo de cerca el hebreo, evitando añadir «sacrificios» porque el texto base no lo dice explícitamente, aunque el contexto cultual lo sugiera.
- source_word: וְנָשָׂא אֶתְכֶם אֵלָיו
  english_pob_choice: you will be carried away with it
  chosen_spanish: serán llevados con él
  alternatives_spanish:
  - serán arrastrados con él
  - serán quitados con él
  lexicon: HALOT
  rationale: La clausula final es sintácticamente difícil. Mantengo una formulación pasiva impersonal que respeta la traducción revisada del POB y deja abierta la agente implícita, sin forzarla.
theological_decisions:
- issue: Sentido de הַזֶּרַע en un oráculo de juicio dirigido a los sacerdotes
  english_pob_reading: your seed
  chosen_spanish_reading: su simiente
  alternative_spanish_readings:
  - su semilla, es decir, su descendencia
  - su cosecha
  rationale: El contexto inmediato es sacerdotal y de juicio, pero el hebreo permite una ambigüedad real entre semilla/cosecha y descendencia. «Simiente» conserva esa tensión sin resolverla prematuramente en una sola dirección.
  doctrine_reference: Mal 2:3; cf. uso semántico de זרע en contextos familiares y agrícolas
- issue: Interpretación de la cláusula final וְנָשָׂא אֶתְכֶם אֵלָיו
  english_pob_reading: you will be carried away with it
  chosen_spanish_reading: serán llevados con él
  alternative_spanish_readings:
  - él los llevará con ello
  - serán llevados a ello
  rationale: La frase es comprimida y difícil. Prefiero conservar la vaguedad del hebreo y la lectura revisada en inglés, sin precisar indebidamente el agente ni el destino final.
  doctrine_reference: Mal 2:3; juicio cultual y contaminación ritual
translation_notes:
  revision_awareness: 'He seguido de cerca la última revisión inglesa: se prefirió «seed» frente a «offspring», «festivals» frente a «festival sacrifices», y una pasiva más natural para la cláusula final. La versión española conserva la ambigüedad de זרע, no añade «sacrificios» donde el hebreo dice simplemente «fiestas», y mantiene la dificultad sintáctica del cierre sin sobreexplicarlo.'
  spanish_consistency_notes:
  - Usé «Yahvé» en principio cuando el hebreo lo requiera; aquí no aparece el nombre divino.
  - Conservé «simiente» para no perder la tensión semántica entre descendencia y semilla/cultivo.
  - Mantuve un registro bíblico sobrio sin volver al castellano arcaizante.
  - La puntuación con rayas largas conserva la aposición explicativa del original y la edición inglesa auditada.
