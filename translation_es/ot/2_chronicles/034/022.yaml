  yaml_path: translation/ot/2_chronicles/034/022.yaml
  text: 'Then Hilkiah and those whom the king had sent went to Huldah the prophetess[a], the wife of Shallum son of Tokhath, son of Hasrah, keeper of the garments. She lived in Jerusalem in the Second Quarter[b], and they spoke to her thus:'
  footnotes:
