    issue: 'Registro español no neutral: «habéis / vosotros».'
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. «Han venido / ustedes» o una redacción sin pronombre explícito encaja mejor que formas peninsulares.
  - severity: high
    issue: «engañarme» en texto principal debilita la decisión contextual documentada para לְרַמּוֹתַנִי.
    rationale: El audit trail inglés eligió «betray me» por el contexto político-militar. En español, «traicionarme» preserva mejor esa fuerza. «Engañarme» puede quedar como alternativa en nota.
  - severity: medium
    issue: Se añade «para entregarme a mis enemigos».
    rationale: El hebreo dice «traicionarme a mis enemigos / para mis enemigos»; la idea de entrega está implicada contextualmente, pero formularla explícitamente en el texto principal va más allá del original. Mejor dejar solo «traicionarme ante mis enemigos / a mis enemigos» o «traicionarme para mis enemigos» según naturalidad.
  - severity: medium
    issue: «que el Dios de nuestros padres lo vea» añade un objeto («lo») ausente del hebreo.
    rationale: El original simplemente dice «vea y juzgue/decida». Añadir «lo» especifica el alcance de la visión divina más de lo que el texto expresa.
  - severity: low
    issue: La fórmula «respondió» sola reduce la duplicación narrativa presente en el hebreo.
    rationale: Aunque en español se puede simplificar, aquí «respondió y les dijo» sigue siendo natural y preserva mejor ויען ויאמר.
  - severity: low
    issue: La nota [a] es defectuosa.
    rationale: Dice «O “estará unido”» cuando esa es precisamente la forma usada en el texto; no aporta una alternativa real.
