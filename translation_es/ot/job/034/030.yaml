translation:
  language: es
  text: para que un hombre impío[a] no reine, ni haya lazos para el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no reine un hombre impío, ni sean lazos para el pueblo»; el hebreo es muy comprimido y admite varias traducciones cercanas sobre «reinar» y «lazo(s)».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִמְּלֹךְ
  english_pob_choice: so that ... should not reign
  chosen_spanish: para que ... no reine
  alternatives_spanish:
  - a fin de que ... no reine
  - para impedir que ... reine
  - no sea que ... reine
  lexicon: HALOT
  rationale: El infinitivo constructo con מִן en este contexto expresa prevención o resultado. En español, «para que ... no reine» comunica con naturalidad la intención/resultante sin perder el valor de evitar la acción de reinar.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: HALOT
  rationale: El hebreo señala a un individuo humano en singular, no a la humanidad en general. «Hombre» conserva esa referencia singular y concorda con el sentido representativo del versículo.
- source_word: חָנֵף
  english_pob_choice: godless
  chosen_spanish: impío
  alternatives_spanish:
  - sin Dios
  - irreverente
  - profano
  lexicon: HALOT
  rationale: En sabiduría, חָנֵף describe a quien carece de temor de Dios o vive moralmente corrompido. «Impío» transmite bien esa fuerza religiosa y moral en español moderno y eclesial.
- source_word: מִמֹּקְשֵׁי
  english_pob_choice: nor be snares to the people
  chosen_spanish: ni sea lazo
  alternatives_spanish:
  - ni sean lazos
  - ni sean trampas
  - ni pongan lazos
  lexicon: HALOT
  rationale: Aunque el hebreo usa un plural («lazos/trampas»), el español idiomático admite un singular colectivo («lazo») para expresar la función de atrapamiento. Mantiene la imagen sin forzar una construcción pesada. El sentido de prevención queda reforzado por el paralelismo con la primera cola.
- source_word: עָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los pueblos
  lexicon: HALOT
  rationale: En este contexto de gobierno y opresión, עָם alude a la comunidad sometida a una autoridad. «El pueblo» es la equivalencia española más natural y precisa.
theological_decisions:
- issue: Sintaxis comprimida y relación lógica del versículo
  english_pob_reading: God acts so that a godless man does not reign, thereby preventing the ensnaring of the people.
  chosen_spanish_reading: Dios actúa para impedir que un hombre impío reine y así no haya atrapamiento del pueblo.
  alternative_spanish_readings:
  - Dios actúa para que un hombre impío no reine, ni sean lazos para el pueblo.
  - Dios actúa de modo que un hombre impío no reine, para librar al pueblo de la trampa.
  rationale: El hebreo es muy condensado y permite una lectura de propósito/resultado. El español principal mantiene esa lógica sin añadir elementos ajenos, y la imagen de «lazo» conserva el paralelismo de la línea hebrea. Evito borrar la tensión sintáctica con una paráfrasis demasiado explicativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Plural hebreo de "lazos" frente a singular español
  english_pob_reading: nor be snares to the people.
  chosen_spanish_reading: ni sea lazo para el pueblo.
  alternative_spanish_readings:
  - ni sean lazos para el pueblo.
  - ni sea trampa para el pueblo.
  rationale: El plural hebreo puede funcionar de manera colectiva o intensiva. En español, el singular colectivo «lazo» mantiene la imagen y la fluidez; la nota preserva la alternativa plural porque el texto fuente admite esa posibilidad.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: He tomado en cuenta la revisión más reciente del texto inglés, que prefirió una formulación final con «snares to the people» en lugar de una construcción infinitiva más literal. En español, esto se refleja con «ni sea lazo para el pueblo», conservando el carácter preventivo y la imagen de atrapamiento sin una paráfrasis excesiva.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto base lo requiera; aquí no aparece el nombre divino explícito en el versículo.
  - Mantengo «impío» para חָנֵף por su fuerza moral-religiosa, en lugar de opciones más psicológicas como «hipócrita».
  - Preferí «pueblo» frente a «gente» para conservar el matiz corporativo del contexto de gobierno.
  - La cláusula final se dejó sintácticamente leve para respetar la concisión hebrea y la ambigüedad auditada.
