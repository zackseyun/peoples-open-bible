    rationale: El expediente inglés distingue una nota para 'deeds' y otra para 'wonders'. En español, cada nota debe anclarse al término relevante para preservar la trazabilidad léxica y evitar confusión.
  - severity: low
    issue: '''Hechos'' es posible, pero menos natural que ''obras'' para עֲלִילוֹתָיו en español bíblico general.'
    rationale: Aunque 'hechos' no es incorrecto, 'obras' suele sonar más idiomático y digno en contextos de acciones divinas, sin introducir un sentido teológico indebido.
  revised_spanish_text: Olvidaron sus obras[a], y sus maravillas[b] que les había mostrado.
