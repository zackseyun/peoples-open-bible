translation:
  language: es
  text: Junto a los ríos de Babilonia[a], allí nos sentamos[b]; también lloramos cuando recordamos a Sion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la orilla de los ríos de Babilonia».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «allí nos sentamos y lloramos cuando recordamos a Sion». El hebreo también incluye una partícula aditiva («también»/«aun») antes de «lloramos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: By
  chosen_spanish: Junto a
  alternatives_spanish:
  - Por
  - A la orilla de
  lexicon: HALOT
  rationale: En este marco geográfico, עַל puede indicar ubicación cercana o junto a. 'Junto a' expresa bien la proximidad a los ríos sin el calco más rígido de 'sobre' o 'encima de'.
- source_word: נַהֲרוֹת
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - corrientes
  - arroyos
  lexicon: HALOT
  rationale: El plural de נָהָר apunta normalmente a ríos. 'Ríos' mantiene el sentido natural y solemne del verso.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilonia
  lexicon: HALOT
  rationale: El nombre propio se vierte de forma estándar en español como 'Babilonia'.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: 'El adverbio conserva la deixis: ellos estaban allí, en el lugar del exilio. ''Allí'' es natural y mantiene el énfasis.'
- source_word: יָשַׁבְנוּ
  english_pob_choice: we sat down
  chosen_spanish: nos sentamos
  alternatives_spanish:
  - nos sentamos y nos quedamos
  - nos sentamos allí
  lexicon: HALOT
  rationale: El qal perfecto puede significar sentarse o habitar. En este contexto de lamento junto a los ríos, 'nos sentamos' reproduce la escena de detenerse para llorar sin forzar un matiz de residencia.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - aun
  lexicon: HALOT
  rationale: La partícula añade o intensifica. 'También' conserva el valor aditivo de manera natural en español.
- source_word: בָּכִינוּ
  english_pob_choice: wept
  chosen_spanish: lloramos
  alternatives_spanish:
  - lloramos amargamente
  - sollozamos
  lexicon: HALOT
  rationale: El verbo indica llanto o lamento. 'Lloramos' es claro y fiel en español; el contexto poético ya aporta la solemnidad requerida.
- source_word: בְּזָכְרֵנוּ
  english_pob_choice: when we remembered
  chosen_spanish: cuando nos acordábamos
  alternatives_spanish:
  - cuando recordábamos
  - al recordar
  lexicon: HALOT
  rationale: El prefijo ב en el infinitivo constructo puede tener valor temporal. 'Cuando nos acordábamos' expresa de modo natural el acto de recordar como motivo del llanto.
- source_word: אֶת צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: de Sion
  alternatives_spanish:
  - a Sion
  - de Sión
  lexicon: HALOT
  rationale: Se conserva el nombre teológico-poético del lugar. En español, 'Sion' es una forma tradicional y clara; el complemento con 'de' corresponde al giro verbal 'acordarse de'.
theological_decisions:
- issue: Conservación de צִיּוֹן como nombre cargado de resonancia teológica
  english_pob_reading: Zion
  chosen_spanish_reading: Sion
  alternative_spanish_readings:
  - Jerusalén
  rationale: El verso no solo nombra una ciudad, sino el centro simbólico del pacto y de la memoria del pueblo. 'Sion' preserva esa carga poética y teológica mejor que sustituirlo por un equivalente geográfico.
  doctrine_reference: 'Translation philosophy: translate according to source text''s plain sense; preserve source-specific theological naming.'
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el auditorial inglés: se mantuvo la estructura breve y paralela del verso, se conservó la partícula aditiva גַּם con ''también'', y se eligió un español natural que no borra la tensión entre sentarse y llorar como dos acciones coordinadas del lamento.'
  spanish_consistency_notes:
  - Se usa 'Babilonia' como topónimo estándar en español, en paralelo con el inglés auditable.
  - Se mantiene 'Sion' como nombre bíblico-teológico, evitando la neutralización a 'Jerusalén'.
  - El verbo 'recordábamos' se eligió para reflejar el acto continuo/iterativo sugerido por la forma verbal en contexto poético.
  - La puntuación con punto y coma reproduce la pausa mayor del hebreo y el ajuste de revisión del inglés POB.
