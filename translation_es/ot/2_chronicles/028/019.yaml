revisions:
- from: Porque Yahvé humilló a Judá a causa de Acaz, rey de Israel[a], porque había quitado toda restricción en Judá y había actuado con gran infidelidad contra Yahvé.
  to: Porque Yahvé humilló a Judá a causa de Acaz, rey de Israel[a], porque había actuado sin freno en Judá[b] y había actuado con gran infidelidad contra Yahvé.
  rationale: Se conserva la traducción general, pero se ajusta הִפְרִיעַ a «había actuado sin freno en Judá», que suena más natural en español y refleja mejor el campo semántico documentado por el POB («acted recklessly / cast off restraint») sin introducir una idea no explícita como «toda restricción». Se añade una nota léxica para preservar alternativas significativas ya presentes en el expediente inglés.
  reviewer_model: gpt-5.4
