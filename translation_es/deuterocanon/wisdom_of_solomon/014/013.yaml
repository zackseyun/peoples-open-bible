  to: Porque no existía desde el principio[a], ni existirá para siempre.
  rationale: Se ajusta el verbo de 'era/será' a 'existía/existirá' para producir un español natural y fiel al valor existencial de εἰμί en esta construcción temporal, sin abandonar la elipsis del sujeto ni alterar la nota contextual.
