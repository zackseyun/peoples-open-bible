- from: 'Si viniera sobre nosotros algún mal: espada, juicio, peste o hambre, nos pondríamos en pie delante de esta casa y delante de ti, porque tu nombre está en esta casa, y clamaremos a ti desde nuestra angustia, y tú oirás y salvarás.'
  to: 'Si viene sobre nosotros un desastre: espada, juicio, peste o hambruna, nos pondremos en pie delante de esta casa y delante de ti, porque tu nombre está en esta casa[a], y clamaremos a ti desde nuestra angustia, y tú oirás y salvarás.'
  rationale: 'Se corrigieron tres puntos para alinearse mejor con el hebreo y con el rastro POB: «desastre» refleja mejor רָעָה en este contexto de calamidad; «nos pondremos en pie» expresa adecuadamente la respuesta comprometida en la condición; y «hambruna» comunica mejor רָעָב como escasez colectiva severa. Se mantuvo «casa» y el modismo principal «tu nombre está en esta casa», añadiendo la nota alternativa ya documentada en inglés.'
