review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: mantiene «tu padre», conserva la metáfora de «yugo», traduce הָקֵל con un imperativo adecuado, y expresa correctamente la promesa final «y te serviremos». También preserva las notas del rastro de auditoría inglés. Sin embargo, «hizo pesado nuestro yugo» suena menos natural en español que una formulación verbal más idiomática, y «la dura servidumbre de tu padre» puede leerse como servidumbre que pertenece al padre en vez de la labor impuesta por él.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita un ajuste menor de naturalidad y precisión sintáctica. En español bíblico-natural, «cargó/hizo más pesado nuestro yugo» o «hizo pesado el yugo que llevamos» suena mejor que «hizo pesado nuestro yugo». Además, conviene evitar una posible ambigüedad posesiva en «la dura servidumbre de tu padre».
  glossary_alignment: No hay conflictos con la terminología proyectual principal. «Yugo» está bien conservado. «Servidumbre» es defendible por el matiz coercitivo, pero en esta construcción conviene reformular para que el español sea inequívoco y siga el valor de עֲבֹדָה como labor/servicio impuesto bajo el rey.
  issues:
  - severity: medium
    issue: «hizo pesado nuestro yugo» es poco idiomático en español
    rationale: Aunque es comprensible y cercano al inglés auditado, en español suena forzado. Una formulación como «hizo más pesado nuestro yugo» conserva la imagen y la idea causativa de הִקְשָׁה con mejor fluidez.
  - severity: medium
    issue: «la dura servidumbre de tu padre» puede resultar ambigua
    rationale: La frase puede entenderse como una servidumbre perteneciente al padre, no como la labor dura impuesta por él. Reordenar a «la dura servidumbre que impuso tu padre» o equivalente expresa con más claridad la relación semántica del hebreo.
  revised_spanish_text: Tu padre hizo más pesado nuestro yugo[a]. Ahora, pues, aligera la dura servidumbre que impuso tu padre y su pesado yugo que puso sobre nosotros[b], y te serviremos.
  revised_footnotes:
