translation:
  language: es
  text: Vinieron a Noé en el arca[a], de dos en dos, de toda carne en la cual estaba el aliento de vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el espíritu de vida». El hebreo רוּחַ puede significar «aliento», «viento» o «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: They came
  chosen_spanish: Vinieron
  alternatives_spanish:
  - Llegaron
  - Fueron
  lexicon: HALOT
  rationale: El verbo narrativo hebreo expresa movimiento de llegada. «Vinieron» conserva el sentido simple del desplazamiento y encaja bien con la secuencia de preposiciones del versículo.
- source_word: אֶל נֹחַ
  english_pob_choice: to Noah
  chosen_spanish: a Noé
  alternatives_spanish:
  - hacia Noé
  lexicon: HALOT
  rationale: אֶל indica dirección hacia una persona. En español, «a Noé» es natural y fiel al valor direccional del hebreo.
- source_word: אֶל הַתֵּבָה
  english_pob_choice: into the ark
  chosen_spanish: al arca
  alternatives_spanish:
  - dentro del arca
  - hacia el arca
  lexicon: HALOT
  rationale: Aunque el hebreo usa una sola preposición de dirección, el contexto implica acceso al arca. «Al arca» mantiene la relación direccional sin introducir un giro más interpretativo; en español evita una sobreespecificación innecesaria de «dentro de».
- source_word: שְׁנַיִם שְׁנַיִם
  english_pob_choice: two by two
  chosen_spanish: de dos en dos
  alternatives_spanish:
  - en pares
  - dos y dos
  lexicon: HALOT
  rationale: La repetición numeral expresa distribución por parejas. «De dos en dos» es la equivalencia idiomática natural en español y conserva el valor distributivo.
- source_word: מִכָּל הַבָּשָׂר
  english_pob_choice: from all flesh
  chosen_spanish: de toda carne
  alternatives_spanish:
  - de toda criatura
  - de todo ser viviente
  lexicon: HALOT
  rationale: «Carne» preserva la literalidad hebrea y la resonancia temática del relato del diluvio. En español bíblico, «toda carne» sigue siendo inteligible y evita diluir el término fuente.
- source_word: אֲשֶׁר בּוֹ
  english_pob_choice: in which was
  chosen_spanish: en la cual estaba
  alternatives_spanish:
  - en el cual estaba
  - que tenía
  lexicon: HALOT
  rationale: El relativo hebreo modifica «carne» (femenino en español por influencia de «carne»). «En la cual estaba» sigue de cerca la sintaxis fuente y mantiene la relación interna sin parafrasear.
- source_word: רוּחַ חַיִּים
  english_pob_choice: the breath of life
  chosen_spanish: el aliento de vida
  alternatives_spanish:
  - el espíritu de vida
  - el soplo de vida
  lexicon: HALOT
  rationale: רוּחַ puede significar «aliento», «viento» o «espíritu». En este contexto de criaturas vivientes del diluvio, «aliento de vida» preserva la concreción vital sin cargar el texto con una lectura teológica más específica de lo que el pasaje exige.
theological_decisions:
- issue: Sentido de רוּחַ חַיִּים
  english_pob_reading: breath of life
  chosen_spanish_reading: aliento de vida
  alternative_spanish_readings:
  - espíritu de vida
  - soplo de vida
  rationale: 'El contexto es zoológico y narrativo: se describe a los seres vivientes que entran al arca. «Aliento de vida» conserva la amplitud semántica de רוּחַ sin resolver la tensión entre «aliento» y «espíritu».'
  doctrine_reference: Preservar la tensión léxica; equivalencia óptima
translation_notes:
  revision_awareness: La revisión inglesa reciente solo eliminó una coma innecesaria después de «Noah»; la estructura y el sentido básicos permanecieron estables, por lo que la versión española conserva la misma segmentación sintáctica sin puntuación interna adicional tras «Noé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se conserva «carne» para בָּשָׂר siguiendo el valor léxico auditable del texto fuente.
  - Se usa «aliento» para רוּחַ חַיִּים y se deja constancia de la alternativa «espíritu» mediante nota.
  - 'La preposición hebrea única se refleja con dos relaciones direccionales en español: «a Noé» y «al arca», siguiendo el uso natural del idioma sin alterar el movimiento descrito.'
