revisions:
- from: Así que sus servidores lo sacaron del carro y lo montaron en el segundo carro[a] que era suyo, y lo llevaron a Jerusalén. Y murió, y fue sepultado en los sepulcros de sus padres, y todo Judá y Jerusalén lo lloraron por Josías.
  to: Así que sus servidores lo sacaron del carro y lo subieron al segundo carro[a] que era suyo, y lo llevaron a Jerusalén. Y murió, y fue sepultado en los sepulcros de sus padres, y todo Judá y Jerusalén guardaron duelo por Josías.
  rationale: Se corrige una construcción poco natural y semánticamente defectuosa ('lo lloraron por Josías') por 'guardaron duelo por Josías', que expresa con claridad el sentido de מִתְאַבְּלִים עַל. También se mejora 'lo montaron en el segundo carro' a 'lo subieron al segundo carro' para un español más idiomático en contexto de traslado asistido. La nota léxica se conserva sin cambios sustanciales.
