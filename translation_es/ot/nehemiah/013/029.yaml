review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la súplica a Dios, el sentido causal de עַל y la idea de profanación del sacerdocio. Sin embargo, en la cláusula final añade una preposición extra ('de los levitas') que sobreinterpreta la relación sintáctica respecto de וְהַלְוִיִּם. El inglés auditado conservó 'and the Levites' precisamente para no fijar de más la relación; el español debe hacer lo mismo.
  spanish_quality_summary: 'El texto es claro y natural en español eclesial. ''Acuérdate de ellos, mi Dios'' y ''han profanado'' funcionan bien. La única reparación necesaria es mejorar la fidelidad y la naturalidad estructural al final: ''el pacto del sacerdocio y los levitas'' suena algo comprimido, pero es preferible a ''y de los levitas'' porque evita imponer un segundo genitivo no explícito. La nota al pie también debe ajustarse en paralelo.'
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: ''Dios'', ''sacerdocio'', ''pacto'' y ''levitas'' están bien. No aparece Yahvé ni otros términos sensibles del glosario. La decisión ''profanado'' para גָּאֳלֵי es adecuada y coherente con la rationale auditada.'
  issues:
  - severity: medium
    issue: La frase 'y de los levitas' añade una relación genitiva más fuerte de la que expresa el hebreo en la línea principal.
    rationale: El hebreo coordina וְהַלְוִיִּם con 'el pacto del sacerdocio' de forma compacta; el inglés POB dejó 'and the Levites' para preservar esa coordinación sin resolverla. 'Y de los levitas' hace sonar que 'pacto' rige explícitamente también 'levitas', lo cual es una interpretación más cerrada.
  - severity: low
    issue: La nota al pie repite la misma sobreespecificación con 'del pacto del sacerdocio y de los levitas'.
    rationale: La alternativa más literal debe seguir la estructura hebrea y el audit trail inglés, no reforzar una lectura ya interpretada.
  revised_spanish_text: Acuérdate de ellos[a], mi Dios, porque han profanado el sacerdocio y el pacto del sacerdocio y los levitas.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: “Acuérdate de ellos, mi Dios, con respecto a los profanadores del sacerdocio y el pacto del sacerdocio y los levitas.”'
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente la coordinación final para reflejar con más fidelidad la compacidad del hebreo y la decisión del POB inglés de no sobredeterminar la relación de 'los levitas' con 'pacto'. El resto del versículo está bien resuelto en español.
