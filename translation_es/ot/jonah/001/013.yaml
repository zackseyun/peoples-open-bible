translation:
  language: es
  text: Pero los hombres[a] remaron con esfuerzo para volver a la tierra seca[b], pero no pudieron, porque el mar se iba embraveciendo cada vez más contra ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los hombres se esforzaron por remar”; el verbo hebreo literalmente significa “cavar”, pero en este contexto náutico se refiere a remar con gran esfuerzo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “la tierra seca”.
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea indica que el mar iba haciéndose cada vez más tempestuoso o embravecido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְתְּרוּ
  english_pob_choice: rowed hard
  chosen_spanish: remaron con esfuerzo
  alternatives_spanish:
  - remaron con fuerza
  - se esforzaron por remar
  - remaron penosamente
  lexicon: HALOT
  rationale: El verbo hebreo alude literalmente a “cavar”, pero en este contexto náutico describe remar con gran esfuerzo. “Remaron con esfuerzo” conserva la imagen marítima y la intensidad sin sonar forzado en español.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los marineros
  - la gente
  lexicon: HALOT
  rationale: El hebreo dice simplemente “los hombres”. Aunque el contexto los identifica como marineros, el término más fiel al texto es “los hombres”.
- source_word: לְהָשִׁיב
  english_pob_choice: to return
  chosen_spanish: volver
  alternatives_spanish:
  - regresar
  - hacer volver
  - traer de vuelta
  lexicon: HALOT
  rationale: El hifil de שוב expresa aquí el intento de volver a tierra. “Volver” es natural en español y mantiene la idea de retorno sin añadir matices no presentes.
- source_word: הַיַּבָּשָׁה
  english_pob_choice: the dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - la tierra
  - la costa
  - la orilla
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente “la tierra seca”. Se conserva esa formulación para reflejar la imagen bíblica y la contraposición con el mar.
- source_word: וְלֹא יָכֹלוּ
  english_pob_choice: but they could not
  chosen_spanish: y no pudieron
  alternatives_spanish:
  - pero no pudieron
  - sin poder hacerlo
  - pero fueron incapaces
  lexicon: HALOT
  rationale: La frase expresa imposibilidad. En español, “y no pudieron” mantiene la secuencia narrativa; el valor adversativo ya queda claro por el contexto inmediato.
- source_word: הַיָּם הוֹלֵךְ וְסֹעֵר
  english_pob_choice: the sea kept growing more and more stormy
  chosen_spanish: el mar seguía volviéndose cada vez más tempestuoso
  alternatives_spanish:
  - el mar seguía embraveciéndose
  - el mar iba de mal en peor
  - el mar se hacía más y más tempestuoso
  lexicon: HALOT
  rationale: La construcción progresiva comunica aumento continuo. “Seguía volviéndose cada vez más tempestuoso” reproduce ese crecimiento gradual con un español claro y fiel.
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - hacia ellos
  - contra su nave
  lexicon: HALOT
  rationale: El hebreo expresa dirección hostil del mar. “Contra ellos” conserva el valor adversativo de forma directa.
theological_decisions:
- issue: Representación del mar como fuerza hostil en la narración
  english_pob_reading: The sea was becoming increasingly stormy or raging more and more against the men.
  chosen_spanish_reading: El mar seguía volviéndose cada vez más tempestuoso contra ellos.
  alternative_spanish_readings:
  - el mar se iba embraveciendo contra ellos
  - el mar crecía en furia contra ellos
  rationale: 'No hay una decisión doctrinal extensa aquí, pero sí una tensión de sentido: el hebreo presenta el mar como una fuerza crecientemente hostil. La traducción conserva esa personificación sin suavizarla.'
  doctrine_reference: Jonás 1:13; cf. el motivo bíblico del mar como poder amenazante en la narrativa
- issue: Traducción de הַיַּבָּשָׁה como imagen de contraste con el mar
  english_pob_reading: the dry land
  chosen_spanish_reading: la tierra seca
  alternative_spanish_readings:
  - la costa
  - la tierra firme
  rationale: Se preserva la imagen concreta del contraste mar/tierra del texto hebreo. “Tierra seca” evita sustituir la metáfora por una ubicación más interpretativa.
  doctrine_reference: Jonás 1:13; Génesis 1:9-10 como trasfondo de tierra seca frente a aguas
translation_notes:
  revision_awareness: El borrador sigue el paquete fuente hebreo y el audit trail inglés con acuerdo alto (0.95). No se registraron revisiones aplicadas; por tanto, la versión española conserva las decisiones léxicas principales del POB inglés, especialmente la progresión del mar y el valor náutico de חתר.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” donde el contexto lo requiera; en este versículo no aparece ningún nombre divino.
  - Se traduce הַיַּבָּשָׁה con “la tierra seca” de manera consistente con el valor léxico literal.
  - Se conserva la progresión aspectual de הוֹלֵךְ וְסֹעֵר con un giro español natural que expresa aumento continuo.
  - El orden y la puntuación buscan una cadencia narrativa cercana al hebreo sin sonar rígidos en español.
