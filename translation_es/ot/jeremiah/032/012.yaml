translation:
  language: es
  text: Entonces entregué el documento de compra a Baruc, hijo de Nerías, hijo de Mahseías, a la vista de Hanamel mi tío,[a] y a la vista de los testigos que habían escrito en el documento de compra,[b] a la vista de todos los judeanos,[c] que estaban sentados en el patio de la guardia.[d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de» o «en presencia de» para la frase repetida «a la vista de». «Hanamel mi tío» sigue el hebreo inmediato; en otras partes del capítulo, Hanamel es identificado como primo de Jeremías (hijo de su tío).
    reason: lexical_alternative
  - marker: b
    text: O «que escribieron en el documento de compra»; el hebreo dice literalmente «los testigos, los que escribían en el documento de compra».
    reason: lexical_alternative
  - marker: c
    text: O «todos los judíos»; «judeanos» refleja con mayor precisión el contexto histórico del reino o provincia de Judá.
    reason: lexical_alternative
  - marker: d
    text: O «el patio del guardia» o posiblemente «el patio de la prisión».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתֵּן
  english_pob_choice: Then I gave
  chosen_spanish: Entonces entregué
  alternatives_spanish:
  - Y entregué
  - Entonces di
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; "entregué" comunica con naturalidad el acto jurídico de pasar el documento, sin perder la fuerza secuencial de "then".
- source_word: הַסֵּפֶר הַמִּקְנָה
  english_pob_choice: the deed of purchase
  chosen_spanish: el documento de compra
  alternatives_spanish:
  - la escritura de compra
  - el acta de compra
  - la escritura de adquisición
  lexicon: HALOT
  rationale: סֵפֶר aquí es un escrito/documento formal, y מִקְנָה se refiere a compra/adquisición. "Documento de compra" mantiene el sentido legal sin forzar un tecnicismo poco natural en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición de dirección/recepción se expresa de forma natural en español con "a".
- source_word: בָּרוּךְ בֶּן נֵרִיָּה בֶּן מַחְסֵיָה
  english_pob_choice: Baruch son of Neriah, son of Mahseiah
  chosen_spanish: Baruc, hijo de Nerías, hijo de Mahseías
  alternatives_spanish:
  - Baruc hijo de Nerías hijo de Mahseías
  lexicon: HALOT
  rationale: Se transliteran los nombres propios en forma habitual para español bíblico. "Hijo de" conserva la construcción genealógica del hebreo.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: a la vista de
  alternatives_spanish:
  - en presencia de
  - delante de
  lexicon: HALOT
  rationale: La fórmula repetida marca publicidad y testimonio. "A la vista de" reproduce bien el valor literal y legal en español.
- source_word: חֲנַמְאֵל דֹּדִי
  english_pob_choice: Hanamel my uncle
  chosen_spanish: Hanamel, mi tío
  alternatives_spanish:
  - Hanamel, mi tío materno/paterno
  - Hanamel, mi pariente
  lexicon: HALOT
  rationale: דּוֹד significa normalmente "tío" en este contexto. Se conserva la relación inmediata del hebreo, como hace la auditoría inglesa; la nota cruzada puede aclarar la relación ampliada del capítulo.
- source_word: הָעֵדִים
  english_pob_choice: the witnesses
  chosen_spanish: los testigos
  alternatives_spanish:
  - los testigos legales
  lexicon: HALOT
  rationale: Término jurídico estándar para quienes atestiguan la transacción.
- source_word: הַכֹּתְבִים
  english_pob_choice: who had written in the deed of purchase
  chosen_spanish: que estaban escribiendo en el documento de compra
  alternatives_spanish:
  - que habían escrito en el documento de compra
  - que escribían en el documento de compra
  lexicon: HALOT
  rationale: El participio verbal se mantiene más cerca del hebreo con una forma progresiva. La revisión inglesa evitó traducirlo como "signed"; el español conserva la ambigüedad entre escribir y formalizar por escrito.
- source_word: בְּסֵפֶר הַמִּקְנָה
  english_pob_choice: the deed of purchase
  chosen_spanish: en el documento de compra
  alternatives_spanish:
  - en la escritura de compra
  lexicon: HALOT
  rationale: La frase preposicional indica el documento en el que se está escribiendo. Se evita sobrecargar con un verbo de firma que el hebreo no exige.
- source_word: כָּל הַיְּהוּדִים
  english_pob_choice: all the Judeans
  chosen_spanish: todos los judíos
  alternatives_spanish:
  - todos los judeanos
  lexicon: HALOT
  rationale: Aunque el inglés POB prefiere "Judeans" por precisión histórica, en español "judíos" es la forma más natural y reconocible para este contexto, sin implicar necesariamente el uso religioso posterior.
- source_word: הַיֹּשְׁבִים
  english_pob_choice: who were sitting
  chosen_spanish: que estaban sentados
  alternatives_spanish:
  - que se hallaban sentados
  - que habitaban
  lexicon: HALOT
  rationale: El participio describe presencia sentada en el lugar; "estaban sentados" es una equivalencia directa y clara.
- source_word: חֲצַר הַמַּטָּרָה
  english_pob_choice: the court of the guard
  chosen_spanish: el patio de la guardia
  alternatives_spanish:
  - el atrio de la guardia
  - el patio del guardia
  lexicon: HALOT
  rationale: '"חָצֵר" puede ser patio/corral/atrio. "Patio de la guardia" suena natural en español y conserva el entorno de custodia indicado por el contexto.'
theological_decisions:
- issue: Relación entre Hanamel y Jeremías en la fórmula "mi tío"
  english_pob_reading: '''Hanamel my uncle'' follows the immediate Hebrew wording; elsewhere in the chapter Hanamel is identified as Jeremiah''s cousin (the son of his uncle).'
  chosen_spanish_reading: '"mi tío" sigue el hebreo inmediato; la relación ampliada puede aclararse por contexto o nota.'
  alternative_spanish_readings:
  - Hanamel, mi primo
  - Hanamel, mi pariente
  rationale: El texto hebreo usa דּוֹדִי de forma directa. Traducirlo por "primo" armonizaría con la relación ampliada del capítulo, pero borraría la expresión inmediata del hebreo y su tensión contextual. Se conserva el término inmediato y se deja la aclaración contextual para nota.
  doctrine_reference: Precisión contextual y coherencia intrabíblica
translation_notes:
  revision_awareness: La auditoría inglesa revisó "had signed" a "had written in" para acercarse más al participio hebreo "los que escribían". La versión española evita "firmaron" y mantiene una formulación participial/progresiva. También conserva la tensión de דֹּדִי como "mi tío", siguiendo el hebreo inmediato, aunque el contexto mayor del capítulo precise el parentesco. En cuanto a כָּל הַיְּהוּדִים, se adoptó "todos los judíos" por naturalidad en español, aun cuando la auditoría inglesa prefiera "Judeans" por precisión histórica.
  spanish_consistency_notes:
  - Se usó "documento de compra" de manera uniforme para סֵפֶר הַמִּקְנָה.
  - Se mantuvo la repetición de "a la vista de" para reflejar el paralelismo legal del verso.
  - 'Los nombres propios se transliteraron de forma consistente: Baruc, Nerías, Mahseías, Hanamel.'
  - '"Patio de la guardia" conserva la imagen espacial del hebreo y la terminología del contexto carcelario/custodial.'
