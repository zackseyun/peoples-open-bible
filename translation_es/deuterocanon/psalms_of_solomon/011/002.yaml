translation:
  language: es
  text: 'Proclamen en Jerusalén la voz del que trae buenas nuevas: porque Dios ha mostrado misericordia a Israel en su visitación[a][b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sonido de uno que anuncia buenas nuevas».
    reason: lexical_alternative
  - marker: b
    text: O «su intervención» o «su supervisión/inspección»; el término griego puede denotar una visitación o una acción atenta de cuidado.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «en su visitación». El contexto favorece una visitación misericordiosa de Dios hacia Israel.
    reason: theological_note
lexical_decisions:
- source_word: κηρύξατε
  english_pob_choice: Proclaim
  chosen_spanish: Proclamen
  alternatives_spanish:
  - Anuncien
  - Heralden
  lexicon: BDAG
  rationale: El imperativo plural pide una proclamación pública; «Proclamen» conserva el tono formal y heráldico sin volverse arcaizante.
- source_word: ἐν Ἰερουσαλὴμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  - en la ciudad de Jerusalén
  lexicon: BDAG
  rationale: La preposición y el topónimo se vierten de manera directa y natural en español.
- source_word: φωνὴν
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  - una voz
  lexicon: BDAG
  rationale: Se mantiene la imagen concreta de «voz» como en el griego; no se reduce a mero contenido de un mensaje.
- source_word: εὐαγγελιζομένου
  english_pob_choice: of one bringing good news
  chosen_spanish: del que trae buenas nuevas
  alternatives_spanish:
  - del que anuncia buenas nuevas
  - de un mensajero de buenas nuevas
  lexicon: BDAG
  rationale: «Trae buenas nuevas» conserva el participio de un heraldo de gozo sin imponer un tecnicismo posterior; «buenas nuevas» es la equivalencia española natural de εὐαγγέλιον/εὐαγγελίζω en este contexto.
- source_word: ἠλέησεν
  english_pob_choice: has shown mercy
  chosen_spanish: ha mostrado misericordia
  alternatives_spanish:
  - ha tenido misericordia de
  - ha sido misericordioso con
  lexicon: BDAG
  rationale: La expresión es idiomática en español y conserva a Dios como sujeto de la acción misericordiosa.
- source_word: ἐπισκοπῇ
  english_pob_choice: visitation
  chosen_spanish: su visita
  alternatives_spanish:
  - su visitación
  - su intervención atenta
  - su supervisión
  lexicon: BDAG
  rationale: «Visita» es la forma más clara y natural en español para preservar el sustantivo del griego sin convertirlo en paráfrasis verbal; en este contexto sigue teniendo el sentido de una visita divina favorable e interventora.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de Israel
  lexicon: BDAG
  rationale: Aunque el griego es plural, en español el posesivo singular femenino «su» concuerda con «visita» y sigue expresando la referencia corporativa a Israel.
theological_decisions:
- issue: Sentido de ἐπισκοπή en un contexto de buenas nuevas y misericordia
  english_pob_reading: a merciful divine visitation toward Israel
  chosen_spanish_reading: una visita misericordiosa de Dios a Israel
  alternative_spanish_readings:
  - su supervisión
  - su intervención administrativa
  - su visitación
  rationale: El contexto inmediato de proclamación gozosa y misericordia favorece una visita divina benéfica, no una simple supervisión administrativa. «Su visita» mantiene la ambivalencia útil entre visita y visitación sin perder claridad en español.
  doctrine_reference: Visita providencial/graciosa de Dios; cf. uso bíblico de ἐπισκοπή como intervención favorable de Dios.
translation_notes:
  revision_awareness: La auditoría inglesa revisó la frase final desde una paráfrasis verbal («in visiting them») hacia una construcción nominal más cercana al griego («in their visitation»). En español se optó por mantener un sustantivo equivalente («su visita») para conservar esa decisión de forma auditable y evitar una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se mantiene «buenas nuevas» para εὐαγγελίζομαι, coherente con el español bíblico contemporáneo y con el valor semántico del participio.
  - No se usa «SEÑOR» porque el texto griego dice explícitamente «Dios» (ὁ θεός).
  - «Visita» conserva el sustantivo griego ἐπισκοπή y evita sustituirlo por una explicación interpretativa en el cuerpo del texto.
