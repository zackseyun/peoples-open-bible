base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/031/015.yaml
  text: 'Thus says the Lord GOD: On the day he went down to Sheol[a], I caused mourning; I covered the deep because of him, and I restrained its rivers, and the many waters were stopped. I made Lebanon grow dark because of him[c][b], and all the trees of the field fainted because of him.'
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.' Hebrew 'Sheol' names the underworld of the dead and is left transliterated here to avoid narrowing the sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'I darkened Lebanon because of him.' The Hebrew verb can express causing gloom or darkness, fitting the verse's mourning imagery.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the trees of the field swooned because of him.'
    reason: lexical_alternative
