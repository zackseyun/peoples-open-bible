translation:
  language: es
  text: Pero él tomó posición en medio del campo y lo defendió[a], y derribó a los filisteos; y Yahvé dio una gran victoria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo libró», «lo rescató» o «lo salvó». El verbo hebreo puede abarcar rescate, liberación o salvación; aquí se refiere a defender el campo para que no cayera en manos enemigas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְיַצֵּב
  english_pob_choice: took his stand
  chosen_spanish: tomó su puesto
  alternatives_spanish:
  - se puso firme
  - se plantó
  - tomó posición
  lexicon: HALOT
  rationale: El hitpael de יצב expresa colocarse deliberadamente o mantenerse firme. «Tomó su puesto» conserva la idea de asumir una posición en combate sin sonar forzado en español.
- source_word: בְּתוֹךְ הַחֶלְקָה
  english_pob_choice: in the middle of the field
  chosen_spanish: en medio del terreno
  alternatives_spanish:
  - en medio del campo
  - en medio de la parcela
  - dentro del terreno
  lexicon: HALOT
  rationale: חֶלְקָה puede significar terreno, parcela o lote. «Terreno» mantiene el sentido concreto y permite que el contexto militar funcione naturalmente en español.
- source_word: וַיַּצִּילֶהָ
  english_pob_choice: defended it
  chosen_spanish: lo defendió
  alternatives_spanish:
  - lo rescató
  - lo libró
  - lo salvó
  lexicon: HALOT
  rationale: נצל puede significar rescatar o librar, pero en este contexto el objeto femenino es el terreno amenazado por los filisteos. «Lo defendió» comunica la acción de salvarlo de la toma enemiga con naturalidad en español.
- source_word: וַיַּךְ אֶת פְּלִשְׁתִּים
  english_pob_choice: struck down the Philistines
  chosen_spanish: hirió a los filisteos
  alternatives_spanish:
  - derribó a los filisteos
  - golpeó a los filisteos
  - venció a los filisteos
  lexicon: HALOT
  rationale: נכה en contexto bélico puede expresar golpear, herir o derrotar. «Hirió» conserva el contacto violento del hebreo; en español bíblico es comprensible y no diluye la escena militar.
- source_word: וַיַּעַשׂ יְהוָה
  english_pob_choice: the LORD brought about
  chosen_spanish: Yahvé hizo
  alternatives_spanish:
  - Yahvé obró
  - Yahvé llevó a cabo
  - Yahvé realizó
  lexicon: HALOT
  rationale: עָשָׂה con un sustantivo abstracto admite una traducción simple y fuerte. «Hizo» es el equivalente más directo para mantener la sintaxis hebrea sin sobreexplicar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: DOCTRINE.md contested terms
  rationale: El nombre divino יְהוָה se rinde como «Yahvé» según el estándar del proyecto en español. Se evita la sustitución por un título y se preserva el nombre personal del pacto.
- source_word: תְּשׁוּעָה גְדוֹלָה
  english_pob_choice: a great victory
  chosen_spanish: una gran victoria
  alternatives_spanish:
  - una gran salvación
  - una gran liberación
  - un gran rescate
  lexicon: HALOT
  rationale: תְּשׁוּעָה puede abarcar salvación, liberación o victoria. Aquí el marco es militar, por lo que «victoria» comunica mejor el resultado sin negar la acción salvadora de Yahvé.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo nombra directamente a יְהוָה. La política del proyecto exige traducirlo como «Yahvé», preservando el nombre revelado y evitando el reemplazo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Semantic range of תְּשׁוּעָה in a battle narrative
  english_pob_reading: a great victory
  chosen_spanish_reading: una gran victoria
  alternative_spanish_readings:
  - una gran salvación
  - una gran liberación
  rationale: En esta escena la intervención de Yahvé se concreta en la derrota del enemigo. «Victoria» expresa el desenlace bélico inmediato, sin excluir la noción más amplia de liberación divina.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; readable modern Spanish'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios y el cotejo cruzado reportó alto acuerdo; por eso este borrador sigue de cerca el sentido ya validado, con adaptación estilística al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «victoria» en el cierre por el contexto militar inmediato, sin borrar el trasfondo de liberación divina.
  - La nota textual marca la ambigüedad de וַיַּצִּילֶהָ sin cargar el cuerpo principal con alternativas.
