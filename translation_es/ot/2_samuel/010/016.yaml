translation:
  language: es
  text: Hadadézer envió e hizo salir a los arameos que estaban más allá del Río[a], y llegaron a Helam, con Shobac[b], comandante del ejército de Hadadézer, delante de ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, de más allá del río Éufrates.
    reason: cultural_note
  - marker: b
    text: O «Shobak», una transliteración alternativa común del nombre.
    reason: lexical_alternative
  - marker: c
    text: «Delante de ellos» probablemente significa que iba al frente o los encabezaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo hebreo de base expresa el acto de enviar; en español, «envió» conserva la sencillez narrativa y la correspondencia directa sin sobrecargar el tono militar.
- source_word: וַיֹּצֵא אֶת אֲרָם
  english_pob_choice: brought out the Arameans
  chosen_spanish: hizo salir a los arameos
  alternatives_spanish:
  - sacó a los arameos
  - hizo venir a los arameos
  lexicon: HALOT
  rationale: El hebreo en causativo presenta a Hadadézer como quien provoca la salida de las fuerzas arameas; «hizo salir» conserva esa fuerza causativa mejor que una simple traslación con «sacó» y evita suavizar el matiz de movilización militar.
- source_word: אֲרָם
  english_pob_choice: the Arameans
  chosen_spanish: los arameos
  alternatives_spanish:
  - Aram
  - los sirios
  lexicon: HALOT
  rationale: Aquí el término etnogeográfico designa a los arameos como pueblo/fuerza militar. «Arameos» refleja con más precisión el hebreo que «sirios», y evita una asociación histórica menos exacta.
- source_word: מֵעֵבֶר הַנָּהָר
  english_pob_choice: beyond the River
  chosen_spanish: más allá del Río
  alternatives_spanish:
  - al otro lado del Río
  - más allá del Éufrates
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «del otro lado del Río». En el texto principal se mantiene esa forma; la identificación con el Éufrates queda implícita y se explicita en la nota, como en el audit trail inglés.
- source_word: חֵילָם
  english_pob_choice: Helam
  chosen_spanish: Helam
  alternatives_spanish:
  - Hélam
  - Hilam
  lexicon: HALOT
  rationale: Es un topónimo; se conserva la transliteración usual «Helam» para mantener la referencia geográfica y la consistencia con el expediente en inglés.
- source_word: וְשׁוֹבַךְ
  english_pob_choice: Shobak
  chosen_spanish: Sobac
  alternatives_spanish:
  - Shobac
  - Shobaj
  lexicon: HALOT
  rationale: La forma consonántica puede representarse como «Sobac» en español para acercarse a la pronunciación y a la transliteración del nombre propio; se conserva la identidad del personaje sin imponer una forma litúrgica tradicional.
- source_word: שַׂר צְבָא
  english_pob_choice: the commander of ... army
  chosen_spanish: comandante del ejército
  alternatives_spanish:
  - capitán del ejército
  - jefe del ejército
  lexicon: HALOT
  rationale: La construcción hebrea indica mando militar. «Comandante del ejército» expresa con claridad moderna la relación de autoridad y conserva el sentido marcial del constructo.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - al frente de ellos
  - ante ellos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «delante de ellos». En español, «delante de ellos» preserva el valor espacial; en contexto militar también sugiere liderazgo, sin introducir una interpretación más fuerte que la permitida por el texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el flujo del texto hebreo y conserva la lectura revisada del audit trail inglés: «más allá del Río» en lugar de una paráfrasis más explícita en el cuerpo principal. También mantiene el valor literal de «delante de ellos», con nota explicativa sobre su posible sentido de liderazgo militar.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una alusión directa que lo requiera.
  - Se eligió «arameos» en lugar de «sirios» para evitar una terminología tradicional menos precisa frente al hebreo.
  - Los nombres propios se transliteraron de forma estable y legible para lector hispanohablante.
  - No se introdujo ninguna interpretación doctrinal; el versículo es narrativo y militar, por lo que las notas se limitaron a alternativas léxicas y una nota cultural.
