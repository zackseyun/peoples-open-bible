translation:
  language: es
  text: Abram vivía en la tierra de Canaán[a], y Lot vivía en las ciudades de la llanura y plantó sus tiendas hasta Sodoma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y fue plantando sus tiendas hasta Sodoma». El verbo hebreo puede denotar acampar o plantar la tienda; la idea es que Lot extendió su campamento hacia Sodoma, sin decir necesariamente que entrara en la ciudad en ese momento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁב
  english_pob_choice: lived
  chosen_spanish: vivía
  alternatives_spanish:
  - habitaba
  - residía
  - se estableció
  lexicon: HALOT
  rationale: El verbo expresa la idea de morar o residir. «Vivía» transmite bien el aspecto estativo en español moderno sin recurrir a un calco arcaico.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  lexicon: HALOT
  rationale: Conservo explícitamente «tierra» para reflejar אֶרֶץ y mantener la estructura del hebreo, como en la decisión inglesa de no comprimir la expresión.
- source_word: בְּעָרֵי הַכִּכָּר
  english_pob_choice: in the cities of the plain
  chosen_spanish: en las ciudades de la llanura
  alternatives_spanish:
  - en las ciudades del valle
  - entre las ciudades de la llanura
  lexicon: HALOT
  rationale: כִּכָּר alude al llano o región plana del Jordán. «Llanura» es la equivalencia más natural y clara en español; conserva el valor geográfico sin forzar una glosa.
- source_word: וַיֶּאֱהַל
  english_pob_choice: pitched his tents
  chosen_spanish: extendió su tienda
  alternatives_spanish:
  - plantó su tienda
  - acamparó
  - levantó sus tiendas
  lexicon: HALOT
  rationale: El verbo puede referirse a plantar o extender la tienda/encampamento. Dado que el español no suele decir «pitch his tents» de forma natural en singular/plural, «extendió su tienda» conserva la idea de campamento extendido y deja abierta la nota de alternativa lexical.
- source_word: עַד סְדֹם
  english_pob_choice: as far as Sodom
  chosen_spanish: hasta Sodoma
  alternatives_spanish:
  - hacia Sodoma
  - cerca de Sodoma
  - hasta las cercanías de Sodoma
  lexicon: HALOT
  rationale: עַד marca límite o alcance. «Hasta Sodoma» reproduce con sobriedad la extensión del encampamiento sin afirmar que Lot ya entrara en la ciudad.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: Nombre propio tradicional transcrito
  rationale: Se mantiene la forma «Abram», coherente con la convención de la traducción y con el nombre en esta etapa narrativa.
- source_word: לוֹט
  english_pob_choice: Lot
  chosen_spanish: Lot
  lexicon: Nombre propio tradicional transcrito
  rationale: Nombre propio transliterado de forma estándar al español.
- source_word: סְדֹם
  english_pob_choice: Sodom
  chosen_spanish: Sodoma
  alternatives_spanish:
  - Sodom
  lexicon: Nombre propio tradicional transcrito
  rationale: Se usa la forma castellana estable «Sodoma», que es plenamente reconocible y fiel al topónimo bíblico.
theological_decisions:
- issue: Alcance de «hasta Sodoma» sin implicar ingreso en la ciudad
  english_pob_reading: Lot extended his tents toward Sodom, not necessarily entering the city at this point.
  chosen_spanish_reading: Lot extendió su tienda hasta Sodoma, sin afirmar todavía que habite dentro de la ciudad.
  alternative_spanish_readings:
  - Lot se instaló en Sodoma
  - Lot acampó en Sodoma
  rationale: La sintaxis hebrea y la nota inglesa subrayan dirección/alcance, no residencia intraurbana. La redacción española conserva esa tensión y evita una lectura más fuerte de asentamiento dentro de Sodoma.
  doctrine_reference: Observación textual y contextual del relato, no una afirmación doctrinal.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requerían cambios y que hubo alto acuerdo en el análisis previo; esta versión española sigue ese consenso y conserva la nota lexical sobre וַיֶּאֱהַל.
  spanish_consistency_notes:
  - Se mantiene «tierra de Canaán» para reflejar explícitamente אֶרֶץ, siguiendo la decisión inglesa.
  - «Llanura» corresponde a כִּכָּר y evita el arcaísmo «valle» donde podría oscurecer la referencia geográfica.
  - La nota a pie de página conserva la alternativa verbal señalada en el audit trail inglés.
  - Se usa «Sodoma» en la forma castellana tradicional del topónimo, consistente con el español bíblico y con la inteligibilidad pública.
