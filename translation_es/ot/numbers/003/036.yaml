translation:
  language: es
  text: 'Y el deber asignado a los hijos de Merari era: los marcos[a] del tabernáculo, sus barras, sus columnas, sus bases[b], todos sus enseres, y todo su servicio[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las tablas del tabernáculo» para «los marcos del tabernáculo».
    reason: lexical_alternative
  - marker: b
    text: O «sus zócalos» para «sus bases».
    reason: lexical_alternative
  - marker: c
    text: O «todo el trabajo relacionado con ello» para «todo su servicio».
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקֻדַּת מִשְׁמֶרֶת
  english_pob_choice: appointed duty
  chosen_spanish: el deber asignado
  alternatives_spanish:
  - la responsabilidad asignada
  - el cargo asignado
  - la tarea encomendada
  lexicon: HALOT
  rationale: La combinación hebrea expresa una responsabilidad formalmente encomendada y custodiada. En español, «deber asignado» conserva la idea de encargo oficial sin sonar tan artificial como una calca de «supervisión de la custodia».
- source_word: בְּנֵי מְרָרִי
  english_pob_choice: the sons of Merari
  chosen_spanish: los hijos de Merari
  alternatives_spanish:
  - los meraritas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Merari». Mantener esa forma conserva la transparencia formal del texto y sigue la decisión inglesa de no sustituirla por un gentilicio más interpretativo.
- source_word: קַרְשֵׁי הַמִּשְׁכָּן
  english_pob_choice: the frames of the tabernacle
  chosen_spanish: los marcos del tabernáculo
  alternatives_spanish:
  - las tablas del tabernáculo
  - las tablas estructurales del tabernáculo
  lexicon: HALOT
  rationale: En este contexto de construcción del santuario, קֶרֶשׁ puede referirse a piezas estructurales. «Marcos» comunica en español la función arquitectónica mejor que «tablas», aunque se conserva la alternativa textual reconocida por la auditoría inglesa.
- source_word: בְרִיחָיו
  english_pob_choice: its bars
  chosen_spanish: sus barras
  alternatives_spanish:
  - sus travesaños
  - sus barras transversales
  lexicon: HALOT
  rationale: «Barras» es la equivalencia directa y natural para los elementos que unen la estructura. «Travesaños» explicita la función, pero añade más interpretación.
- source_word: עַמֻּדָיו
  english_pob_choice: its pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus postes
  lexicon: HALOT
  rationale: Para el español bíblico actual, «columnas» mantiene dignidad y claridad para los soportes verticales. «Pilares» también es posible, pero «columnas» resulta más fluido en esta lista técnica.
- source_word: אֲדָנָיו
  english_pob_choice: its bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus zócalos
  - sus encajes
  lexicon: HALOT
  rationale: La POB inglesa eligió «bases» frente a «sockets». En español, «bases» es suficientemente preciso y legible; «zócalos» o «encajes» sonarían más técnicos o menos naturales aquí.
- source_word: כָל כֵּלָיו
  english_pob_choice: all its furnishings
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todo su equipo
  - todos sus muebles
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para implementos, artículos o equipo. «Utensilios» conserva la amplitud del hebreo sin restringirlo a objetos domésticos, y es más general que «muebles».
- source_word: עֲבֹדָתוֹ
  english_pob_choice: all its service
  chosen_spanish: todo su servicio
  alternatives_spanish:
  - toda su labor
  - todo el trabajo relacionado con ello
  lexicon: HALOT
  rationale: «Servicio» preserva la resonancia cultual de עֲבֹדָה y sigue de cerca la elección inglesa. «Labor» o «trabajo» serían posibles, pero desplazan el matiz litúrgico.
translation_notes:
  revision_awareness: The English audit trail shows a high-agreement pass with no changes needed; the Spanish draft follows the same source-grounded lexical decisions and preserves the documented alternatives for the construction terms and furnishings vocabulary.
  spanish_consistency_notes:
  - Se mantuvo la estructura enumerativa del hebreo y de la POB inglesa.
  - Se evitó sustituir términos técnicos por equivalentes eclesiásticos más tradicionales cuando el hebreo describe partes del tabernáculo.
  - «Bases» y «utensilios» reflejan la amplitud semántica de los términos hebreos sin imponer un sentido más estrecho.
