lexical_decisions:
- source_word: Βίβλος γενέσεως
  english_pob_choice: The book of the genealogy
  chosen_korean: 족보
  alternatives_korean:
  - 계보
  - 기원의 책
  - 태생의 책
  lexicon: BDAG
  rationale: γένεσις는 「기원·태생·족보」를 두루 가리킨다. 이어지는 계보 목록을 표제하므로 한국어 「족보」가 가장 자연스럽다. 창세기적 「기원」의 여운은 각주에서 다루지 않고 마태의 표제 의도에 충실하게 옮긴다.
- source_word: χριστοῦ
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: Χριστός가 칭호로 기능하는 복음서 서두에서, 음역 「그리스도」가 아닌 칭호 「메시아」를 채택해 다윗-아브라함 계보 위에 선 기름부음 받은 왕의 무게를 살린다.
- source_word: υἱοῦ Δαυίδ
  english_pob_choice: the son of David
  chosen_korean: 다윗의 자손
  alternatives_korean:
  - 다윗의 아들
  - 다윗의 후손
  lexicon: BDAG
  rationale: 족보 문맥의 υἱός는 직계 아들이 아니라 「자손」을 가리키며, 한국어 「다윗의 자손」은 메시아 칭호로 굳어진 표현이다.
theological_decisions:
- issue: 칭호 Χριστός의 한국어 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 복음서 서두는 예수를 다윗-아브라함 언약 라인의 기름부음 받은 왕으로 제시한다. 음역 「그리스도」는 칭호성을 흐리므로, 본 번역의 일관된 원칙에 따라 「메시아」로 옮겨 본문의 신학적 무게를 보존한다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms — Χριστός → Messiah where titular'
