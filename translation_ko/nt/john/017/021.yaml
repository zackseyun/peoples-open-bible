id: JHN.17.21
reference: 'John 17:21'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: ἵνα πάντες ἓν ὦσιν, καθὼς σύ, ⸀πάτερ, ἐν ἐμοὶ κἀγὼ ἐν σοί, ἵνα καὶ αὐτοὶ ἐν ⸀ἡμῖν ὦσιν, ἵνα ὁ κόσμος ⸀πιστεύῃ ὅτι σύ με ἀπέστειλας.
base_translation:
  language: en
  yaml_path: translation/nt/john/017/021.yaml
  text: that they may all be one[a], just as you, Father, are in me and I am in you; that they also may be in us[c][b], so that the world may believe that you sent me.
  footnotes:
  - marker: a
    text: Or 'that they may all be united.' The Greek more literally says 'that they may all be one,' which preserves the fuller sense of unity without narrowing it to one aspect.
    reason: lexical_alternative
  - marker: b
    text: The repeated phrase 'in' ("in me," "in you," "in us") reflects Johannine language of mutual indwelling and participation; it is stronger than mere association.
    reason: cross_reference
  - marker: c
    text: Or 'may come to believe.' The Greek can be understood as the world's believing, without explicitly specifying whether the emphasis is on beginning to believe or continuing in belief.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리하여 그들 모두가 하나가 되게 하소서. 아버지여, 아버지께서 내 안에 계시고 내가 아버지 안에 있는 것과 같이, 그들도 우리 안에 있게 하소서. 그래서 세상으로 하여금 아버지께서 나를 보내셨음을 믿게 하소서.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그들 모두가 하나로 연합되게」. 헬라어는 문자적으로 「그들 모두가 하나이게」이며, 의미를 풀지 않고 「하나」 그대로 보존한다.
    reason: lexical_alternative
  - marker: b
    text: 반복되는 전치사 「~ 안에」(「내 안에」, 「아버지 안에」, 「우리 안에」)는 요한적 상호 내주(內住)와 참여의 어법을 반영하며, 단순 동맹보다 강한 신학적 표현이다.
    reason: theological_clarification
  - marker: c
    text: 또는 「믿기 시작하게」. 헬라어는 세상이 믿게 됨을 가리키며, 시작인지 지속인지의 강조에 대해서는 두 가지 해석이 가능하다.
    reason: lexical_alternative
