translation:
  language: es
  text: 'Entonces dirás delante de Yahvé tu Dios: «He retirado la porción santa[a] de la casa, y también la he dado al levita, al extranjero residente[b], al huérfano[c] y a la viuda, conforme a todo tu mandamiento que me has mandado. No he transgredido tus mandamientos, ni los he olvidado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo sagrado» o «la cosa santa». El hebreo se refiere a la porción consagrada del diezmo o del producto apartado para distribución.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «al forastero residente». El hebreo גֵּר designa a un no israelita que vive entre el pueblo con un estatus social y legal definido.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «al huérfano de padre». El hebreo literalmente dice «al que no tiene padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Proyecto POB / nombre divino
  rationale: 'El contexto usa el Tetragrámaton directamente. En español se sigue el estándar del proyecto: ''Yahvé'', preservando el nombre de pacto sin la máscara tradicional ''SEÑOR''.'
- source_word: בִּעַרְתִּי
  english_pob_choice: I have removed
  chosen_spanish: He apartado
  alternatives_spanish:
  - he removido
  - he quitado
  - he limpiado
  lexicon: HALOT
  rationale: El verbo aquí se refiere a sacar de la casa la porción consagrada, no a quemarla. 'He apartado' comunica bien la acción ritual de retirar/separar lo dedicado.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the holy portion
  chosen_spanish: lo santo
  alternatives_spanish:
  - la porción santa
  - lo sagrado
  - la cosa santa
  lexicon: HALOT
  rationale: El hebreo es sustantivo concreto y puede entenderse como lo consagrado. 'Lo santo' mantiene brevedad y la tensión lexical sin forzar una paraphrase; la nota preserva la alternativa 'porción santa'.
- source_word: מִן הַבַּיִת
  english_pob_choice: from the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - desde la casa
  - fuera de la casa
  lexicon: HALOT
  rationale: Se conserva la relación espacial simple del hebreo. En contexto es la casa/almacén del hablante; no se añade posesivo porque el hebreo no lo expresa de forma explícita.
- source_word: לַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: al forastero residente
  alternatives_spanish:
  - al sojourner
  - al extranjero residente
  - al residente extranjero
  lexicon: HALOT
  rationale: גֵּר designa al extranjero asentado dentro de Israel, con estatus social-jurídico definido. 'Forastero residente' mantiene esa combinación de exterioridad y residencia mejor que 'extranjero' a secas.
- source_word: לַיָּתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: al huérfano
  alternatives_spanish:
  - al desamparado sin padre
  - al huérfano de padre
  lexicon: HALOT
  rationale: Aunque el término hebreo es literalmente 'sin padre', en español 'huérfano' comunica con claridad la misma categoría vulnerable y es la forma más natural en este paralelismo legal.
- source_word: כְּכָל מִצְוָתְךָ אֲשֶׁר צִוִּיתָנִי
  english_pob_choice: according to all your commandment that you commanded me
  chosen_spanish: conforme a todo tu mandamiento que me has mandado
  alternatives_spanish:
  - según todo tu mandamiento que me mandaste
  - de acuerdo con todo lo que me mandaste
  lexicon: HALOT
  rationale: Se conserva la forma singular/colectiva 'mandamiento' y la repetición del verbo 'mandar', que subraya la obediencia completa. 'Conforme a' refleja bien כְּכָל sin sonar excesivamente técnico.
- source_word: לֹא עָבַרְתִּי מִמִּצְוֺתֶיךָ
  english_pob_choice: I have not transgressed your commandments
  chosen_spanish: No he transgredido tus mandamientos
  alternatives_spanish:
  - No he sobrepasado tus mandamientos
  - No he violado tus mandamientos
  lexicon: HALOT
  rationale: עבר מן expresa sobrepasar, traspasar o transgredir límites. 'Transgredido' conserva la fuerza normativa del hebreo y corresponde bien al registro jurídico del pasaje.
- source_word: וְלֹא שָׁכָחְתִּי
  english_pob_choice: nor have I forgotten them
  chosen_spanish: ni me he olvidado de ellos
  alternatives_spanish:
  - ni los he olvidado
  - ni los he olvidado nunca
  lexicon: HALOT
  rationale: El objeto implícito son los mandamientos del versículo. 'Me he olvidado de ellos' es natural en español y mantiene el paralelismo negativo.
theological_decisions:
- issue: Uso del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La base auditada del POB trata el Tetragrámaton como nombre propio del pacto y no como título genérico. En español, 'Yahvé' preserva esa decisión doctrinal y evita la sustitución litúrgica tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de 'lo santo' en la declaración ritual
  english_pob_reading: the holy portion
  chosen_spanish_reading: lo santo
  alternative_spanish_readings:
  - la porción santa
  - lo sagrado
  - la cosa santa
  rationale: El hebreo apunta a la porción consagrada destinada a distribución. 'Lo santo' mantiene el campo semántico de consagración sin decidir demasiado pronto por una paráfrasis explicativa que podría borrar la ambigüedad lexical documentada.
  doctrine_reference: Nota lexical del POB sobre la porción consagrada del diezmo o producto apartado
- issue: Categoría social de גֵּר
  english_pob_reading: the sojourner
  chosen_spanish_reading: el forastero residente
  alternative_spanish_readings:
  - el extranjero residente
  - el residente extranjero
  - el sojourner
  rationale: No se usa simplemente 'extranjero' porque el término hebreo incluye residencia dentro de la comunidad y deberes/beneficios legales. 'Forastero residente' preserva esa tensión social-jurídica.
  doctrine_reference: Éxodo 12; Levítico 19; Deuteronomio 10 y 26, categoría legal del גֵּר
translation_notes:
  revision_awareness: La redacción española sigue el último texto auditado en inglés después de la revisión que eliminó 'any of' antes de 'your commandments'. Por eso se traduce simplemente 'tus mandamientos' sin añadir cuantificador extra. También se respeta la decisión doctrinal revisada de usar el nombre divino 'Yahvé' en lugar de una máscara como 'SEÑOR'.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico actual, digno y claro, evitando arcaismos innecesarios.
  - Se conserva la repetición de 'mandar/mandamiento' para reflejar la fuerza del hebreo.
  - '''Lo santo'' y ''forastero residente'' son decisiones léxicas deliberadas para preservar tensiones del original sin sobreexplicarlas en el cuerpo del texto.'
  - Las notas usan marcadores únicos y aparecen solo donde corresponde en el texto principal.
