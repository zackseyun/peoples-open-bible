translation:
  language: es
  text: 'Entonces dije[a]: «¡Ah, Señor Yahvé! Mira, no sé hablar[b], porque soy un joven[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: אֲדֹנָי יְהוִה; título divino tradicionalmente vertido «Señor DIOS» para representar tanto «Señor» como el nombre divino YHWH. Alternativamente, «Señor Yahvé».'
    reason: alternative_reading
  - marker: b
    text: O «no sé cómo hablar»; modismo hebreo que significa «no sé hablar».
    reason: lexical_alternative
  - marker: c
    text: O «muchacho» o «joven»; hebreo נַעַר puede referirse ampliamente a una persona joven, desde la niñez hasta la adultez temprana, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Luego dije
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces dije» conserva esa secuencia con español natural y sobrio.
- source_word: אֲהָהּ
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ah, señor!
  lexicon: HALOT
  rationale: Es una interjección de protesta o angustia; «¡Ah!» transmite bien la vacilación inmediata de Jeremías sin intensificar de más el tono.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord Yahweh
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Yahveh
  - Señor Dios
  lexicon: HALOT
  rationale: En el texto hebreo aparece el título compuesto אֲדֹנָי + YHWH. Siguiendo la política del proyecto, YHWH se vierte «Yahvé» en español; «Señor Yahvé» preserva ambos elementos sin ocultar el nombre divino.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: Es un deíctico que llama la atención sobre la objeción de Jeremías; «Mira» suena natural en español actual y mantiene la fuerza apelativa.
- source_word: לֹא יָדַעְתִּי דַּבֵּר
  english_pob_choice: I do not know how to speak
  chosen_spanish: no sé hablar
  alternatives_spanish:
  - no sé cómo hablar
  - no sé hablar bien
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática; «no sé hablar» comunica de forma breve e idiomática la incapacidad o inexperiencia para hablar, sin añadir matices que el hebreo no exige.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la objeción de Jeremías; «porque» es la correlación causal más clara y natural en español.
- source_word: נַעַר
  english_pob_choice: youth
  chosen_spanish: un joven
  alternatives_spanish:
  - un muchacho
  - un muchacho joven
  - un muchacho / un niño
  lexicon: HALOT
  rationale: נַעַר cubre un rango amplio desde niño hasta joven adulto. Aquí «un joven» preserva la idea de inmadurez o falta de experiencia sin reducirlo a niñez ni volverlo demasiado maduro.
- source_word: אָנֹכִי
  english_pob_choice: I am
  chosen_spanish: soy
  alternatives_spanish:
  - yo soy
  - estoy
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis; en español se expresa con la cópula «soy», manteniendo el sentido predicativo de identidad/estado.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: Lord Yahweh
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahveh
  rationale: El texto hebreo contiene explícitamente YHWH; la política del proyecto requiere «Yahvé» en el texto principal. En el compuesto, «Señor Yahvé» conserva la tensión del título hebreo sin recurrir a la convención de ocultamiento «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de נַעַר en el contexto de la vocación de Jeremías
  english_pob_reading: youth
  chosen_spanish_reading: un joven
  alternative_spanish_readings:
  - un muchacho
  - un niño
  - un muchacho joven
  rationale: La objeción de Jeremías enfatiza inexperiencia y falta de madurez para hablar, no necesariamente edad infantil. «Un joven» mantiene la amplitud semántica y evita una lectura doctrinal o biográfica más estrecha de la que el verso garantiza.
  doctrine_reference: 'DOCTRINE.md: lexical breadth preserved where context does not narrow age precisely'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «GOD» por «Yahweh» para reflejar con mayor exactitud y consistencia el nombre divino YHWH. La versión española adopta directamente esa decisión con «Yahvé» y mantiene el resto de la cláusula en una forma equivalente y natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» para YHWH, conforme a la política española del proyecto.
  - Se evita «SEÑOR» como máscara del nombre divino en el texto principal.
  - «Señor Yahvé» preserva el compuesto de אֲדֹנָי + YHWH sin forzar la sintaxis española.
  - «Joven» refleja el rango semántico de נַעַר sin cerrar indebidamente la edad de Jeremías.
