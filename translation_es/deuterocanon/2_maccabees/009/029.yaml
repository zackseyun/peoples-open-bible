translation:
  language: es
  text: Pero Felipe, su compañero[a], iba llevando el cuerpo; y, porque temía al hijo de Antíoco, se pasó a Ptolomeo Filométor en Egipto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Compañero» también puede sugerir alguien criado con él; es decir, un asociado cercano de la corte o compañero de crianza.
    reason: lexical_alternative
  - marker: b
    text: O, más formalmente, «fue trasladado a Ptolomeo Filométor en Egipto». El verbo griego διεκομίσθη es pasivo en forma y puede traducirse más literalmente como un traslado o conducción.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκομίζετο
  english_pob_choice: was carrying
  chosen_spanish: estaba llevando
  alternatives_spanish:
  - estaba transportando
  - iba llevando
  - estaba conduciendo
  lexicon: LSJ
  rationale: El imperfecto medio/pasivo expresa acción en curso; «estaba llevando» conserva bien ese valor durativo en español y resulta natural sin perder la imagen del traslado del cuerpo.
- source_word: τὸ σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cadáver
  - el cuerpo del rey
  lexicon: LSJ
  rationale: El griego dice «el cuerpo» sin posesivo explícito. «El cuerpo» sigue de cerca el original y evita añadir el matiz más duro de «cadáver» o el posesivo que no está en el texto.
- source_word: σύντροφος
  english_pob_choice: companion
  chosen_spanish: compañero
  alternatives_spanish:
  - compañero cercano
  - criado con él
  - fostercompañero
  lexicon: LSJ
  rationale: «Compañero» es lo bastante amplio para preservar la relación sin convertirla en un tecnicismo que el versículo no define. En español mantiene la posibilidad de un vínculo de corte o de crianza compartida.
- source_word: εὐλαβηθεὶς
  english_pob_choice: because he feared
  chosen_spanish: por temor
  alternatives_spanish:
  - porque temió
  - por miedo
  - tomando precaución ante
  lexicon: LSJ
  rationale: La raíz puede abarcar temor y cautela. «Por temor» conserva la fuerza causal y evita cargar la frase con una emoción más específica de lo que el griego exige.
- source_word: τὸν υἱὸν Ἀντιόχου
  english_pob_choice: Antiochus’s son
  chosen_spanish: al hijo de Antíoco
  alternatives_spanish:
  - al hijo de Antíoco
  - al hijo de Antíoco
  - al heredero de Antíoco
  lexicon: LSJ
  rationale: La construcción griega es literalmente «al hijo de Antíoco». En español, «al hijo de Antíoco» reproduce esa relación sin interpretar «heredero», que iría más allá del texto.
- source_word: πρὸς Πτολεμαῖον τὸν Φιλομήτορα
  english_pob_choice: to Ptolemy Philometor
  chosen_spanish: a Ptolomeo Filométor
  alternatives_spanish:
  - hacia Ptolomeo Filométor
  - ante Ptolomeo Filométor
  lexicon: LSJ
  rationale: Con movimiento, πρός se vierte naturalmente como «a». Se conserva el nombre propio como transliteración tradicional en español bíblico-histórico, sin añadir explicaciones que el versículo no ofrece.
- source_word: διεκομίσθη
  english_pob_choice: he went over
  chosen_spanish: fue trasladado
  alternatives_spanish:
  - pasó a
  - se trasladó
  - fue llevado
  lexicon: LSJ
  rationale: Aunque la forma es pasiva, el contexto indica un cambio de lugar o de esfera política. «Fue trasladado» mantiene la pasividad formal y la idea de traslado, sin convertirla en una interpretación demasiado libre como «se pasó».
theological_decisions:
- issue: Relación entre el temor y el movimiento hacia Ptolomeo Filométor
  english_pob_reading: because he feared Antiochus’s son, he went over to Ptolemy Philometor in Egypt
  chosen_spanish_reading: por temor al hijo de Antíoco, fue trasladado a Egipto, donde estaba Ptolomeo Filométor
  alternative_spanish_readings:
  - porque temió al hijo de Antíoco, se pasó a Ptolomeo Filométor en Egipto
  - por precaución ante el hijo de Antíoco, fue llevado a Ptolomeo Filométor en Egipto
  rationale: El texto griego y la POB inglesa permiten entender el movimiento como una retirada o cambio de bando motivado por temor. En español, «por temor» y «fue trasladado» preservan esa tensión sin convertirla en una afirmación más explícita de deserción política que el verbo griego por sí solo no obliga a formular.
  doctrine_reference: None
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del control cruzado y adopta la revisión más reciente sin cambios sustantivos. Se mantiene la equivalencia óptima de la POB inglesa, pero se ajusta el final para hacer explícito en español el movimiento hacia Egipto y Ptolomeo Filométor sin perder la pasividad formal de διεκομίσθη.
  spanish_consistency_notes:
  - Se usa «Ptolomeo Filométor» con transliteración bíblico-histórica coherente con la tradición académica en español.
  - Se conserva «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se evita «Cristo» y no aparece vocabulario cristológico en este pasaje.
  - «Compañero» se mantiene como término amplio, alineado con la ambigüedad documentada de σύντροφος.
  - «Por temor» se eligió para no endurecer innecesariamente el matiz de εὐλαβηθεὶς.
