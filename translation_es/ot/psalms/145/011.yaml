translation:
  language: es
  text: Dirán de la gloria de tu reino[a], y hablarán de tu poder[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu realeza» o «tu reinado».
    reason: lexical_alternative
  - marker: b
    text: O «tu fuerza».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: HALOT
  rationale: כָּבוֹד puede significar gloria, honor o peso. En este contexto de alabanza, «gloria» expresa mejor la majestad real de Dios y conserva la fuerza poética del paralelismo.
- source_word: מַלְכוּתְךָ
  english_pob_choice: your kingdom
  chosen_spanish: tu reino
  alternatives_spanish:
  - tu realeza
  - tu reinado
  lexicon: HALOT
  rationale: מַלְכוּת puede referirse a reino, realeza o reinado. «Tu reino» es la opción más natural y fiel en español, y mantiene la imagen concreta de soberanía real que el versículo presenta.
- source_word: יֹאמֵרוּ
  english_pob_choice: they will speak
  chosen_spanish: hablarán
  alternatives_spanish:
  - dirán
  - mencionarán
  lexicon: HALOT
  rationale: אָמַר significa decir o hablar. Como está en paralelo con יְדַבֵּרוּ, «hablarán» conserva el sentido futuro y el movimiento poético sin sonar forzado en español.
- source_word: גְבוּרָתְךָ
  english_pob_choice: your might
  chosen_spanish: tu poder
  alternatives_spanish:
  - tu fuerza
  - tus actos poderosos
  lexicon: HALOT
  rationale: גְּבוּרָה puede expresar fuerza, poder o hazañas poderosas. «Tu poder» comunica bien la fuerza divina en español y es una alternativa natural a «tu fuerza»; se mantiene el singular abstracto del hebreo.
- source_word: יְדַבֵּרוּ
  english_pob_choice: talk
  chosen_spanish: hablarán
  alternatives_spanish:
  - proclamarán
  - dirán
  lexicon: HALOT
  rationale: דָּבַר significa hablar o decir. Se traduce con el mismo verbo que el primer hemistiquio para conservar el paralelismo simple del hebreo y no introducir una intensidad proclamatoria mayor que la del texto.
theological_decisions:
- issue: Sentido de מַלְכוּת aplicado a Dios
  english_pob_reading: your kingdom
  chosen_spanish_reading: tu reino
  alternative_spanish_readings:
  - tu realeza
  - tu reinado
  rationale: El verso alaba la majestad real de Yahvé mediante el lenguaje de reino. «Tu reino» preserva el sentido léxico y evita restringir innecesariamente la referencia a un solo matiz de gobierno o dominio.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en inglés: se mantiene la doble referencia a la gloria del reino/reinado y al poder/might de Dios, sin introducir ampliaciones interpretativas. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se preserva el paralelismo verbal con «hablarán ... hablarán».
  - Se usa «reino» para מַלְכוּת, coherente con la opción auditada en inglés y con el registro bíblico en español.
  - Se evita «SEÑOR» y se traduce el sujeto divino implícito conforme al contexto del salmo.
  - «Poder» se eligió como equivalente natural de «might», sin perder la abstracción del hebreo.
