id: 1PE.1.18
reference: 1 Peter 1:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰδότες ὅτι οὐ φθαρτοῖς, ἀργυρίῳ ἢ χρυσίῳ, ἐλυτρώθητε ἐκ τῆς ματαίας ὑμῶν ἀναστροφῆς πατροπαραδότου,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/018.yaml
  text: 'knowing that you were redeemed from your futile way of life handed down from your fathers, not with perishable things such as silver or gold,'
translation:
  language: ko
  text: '여러분이 조상들로부터 물려받은 헛된 행실에서 구속함을 받은 것은[a] 은이나 금 같은 썩어질 것들로 된 것이 아닌 줄을 여러분은 알고 있습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「구속하다」(λυτρόω)는 종이나 죄수를 대속(代贖)의 값으로 풀어내는 행위를 가리킨다. 1:19의 「어린 양의 피」와 결합되어 구약의 출애굽·유월절 심상을 환기한다.
    reason: cross_reference
lexical_decisions:
- source_word: ἐλυτρώθητε
  english_pob_choice: you were redeemed
  chosen_korean: 구속함을 받은 것
  alternatives_korean:
  - 속량받은 것
  - 값으로 풀려난 것
  lexicon: BDAG
  rationale: λυτρόω는 대속의 값으로 자유롭게 함을 의미. 한국 성서 전통의 「구속하다」를 채택하되 신적 수동을 「~받은」으로 살린다.
- source_word: φθαρτοῖς
  english_pob_choice: perishable things
  chosen_korean: 썩어질 것들
  alternatives_korean:
  - 부패할 것들
  lexicon: BDAG
  rationale: 1:23과의 대조(불멸의 씨)를 살리기 위해 「썩어질」을 채택. 1:4의 ἄφθαρτον(썩지 아니하는)과 의도된 대조이다.
- source_word: ματαίας ἀναστροφῆς πατροπαραδότου
  english_pob_choice: futile way of life handed down from your fathers
  chosen_korean: 조상들로부터 물려받은 헛된 행실
  alternatives_korean:
  - 조상이 전해 준 헛된 삶의 방식
  - 선조에게서 받은 무익한 처신
  lexicon: BDAG
  rationale: 한국어 어순에 맞춰 πατροπαράδοτος(아버지로부터 전해진)를 관형절로 앞에 배치한다.
theological_decisions:
- issue: λυτρόω의 대속 함의
  chosen_reading: '「구속함」(대속의 값으로 풀어냄)으로 옮기고, 1:19의 「어린 양의 피」와 함께 유월절·출애굽 심상을 보존'
  alternative_readings:
  - 추상적 「해방」으로 평이화
  - 「대속」으로 직접 신학화
  rationale: 본문은 구약의 구속(고엘·유월절) 심상을 명시적으로 환기한다. 「구속」을 사용해 그 심상을 보존하되, 특정 속죄 이론(형벌 대속 vs. 승리설 등)을 본문에 박지 않는다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장 보존; 원어 우선'
