translation:
  language: es
  text: 'Porque así me dijo Yahvé, con mano fuerte[a], advirtiéndome[b] que no anduviera por el camino de este pueblo, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras su mano era fuerte sobre mí». El modismo hebreo expresa una constricción o impulso divino intenso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «instruyéndome», «reprendiéndome» o «disciplinándome». El verbo puede implicar corrección, disciplina o advertencia; aquí introduce una prohibición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, siguiendo la política del proyecto. «Yahvé» mantiene la referencia al nombre revelado sin sustituirlo por un título.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el contexto anterior de manera natural en español.
- source_word: כֹה
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - esto es lo que
  lexicon: HALOT
  rationale: Es la fórmula profética de introducción del discurso divino; «así» conserva el registro formal sin volverlo pesado.
- source_word: אָמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - declaró
  lexicon: HALOT
  rationale: Verbo sencillo de reporte del habla divina; «dijo» es el equivalente natural y fiel.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - me
  - para mí
  lexicon: HALOT
  rationale: Mantiene el destinatario directo del discurso divino dirigido al profeta.
- source_word: כְּחֶזְקַת הַיָּד
  english_pob_choice: with a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con mano poderosa
  - bajo mano fuerte
  - con la fuerza de su mano
  lexicon: HALOT
  rationale: Se conserva la imagen de la mano como expresión de constricción o presión divina. «Con mano fuerte» es idiomático en español y evita añadir elementos no explícitos.
- source_word: וְיִסְּרֵנִי
  english_pob_choice: warning me
  chosen_spanish: advirtiéndome
  alternatives_spanish:
  - reprendiéndome
  - disciplinándome
  - amonestándome
  lexicon: HALOT
  rationale: El verbo puede abarcar instrucción correctiva, disciplina o advertencia. Dado que aquí introduce una prohibición, «advirtiéndome» refleja bien la función inmediata sin perder la posibilidad de corrección implícita.
- source_word: מִלֶּכֶת
  english_pob_choice: not to walk
  chosen_spanish: que no anduviera
  alternatives_spanish:
  - de no andar
  - que no caminara
  - para no andar
  lexicon: HALOT
  rationale: El hebreo expresa impedir una conducta. «Anduviera» preserva la metáfora ética de la conducta/curso de vida y suena natural en español.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la senda
  - en la ruta
  - en la vía
  lexicon: HALOT
  rationale: «Camino» conserva la metáfora bíblica de conducta o modo de vida; es la opción más clara y amplia para el lector.
- source_word: הָעָם הַזֶּה
  english_pob_choice: of this people
  chosen_spanish: de este pueblo
  alternatives_spanish:
  - de esta gente
  - de esta nación
  lexicon: HALOT
  rationale: El colectivo hebreo se mantiene como «pueblo», que preserva el tono profético y la unidad del referente.
- source_word: לֵאמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'al decir:'
  lexicon: HALOT
  rationale: Indica que la cita continúa en el versículo siguiente; «diciendo:» reproduce la función introductoria sin cerrar la unidad de discurso.
theological_decisions:
- issue: Nombre divino YHWH en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Se preserva el nombre propio divino en español con «Yahvé», en coherencia con la política del proyecto y sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de וְיִסְּרֵנִי
  english_pob_reading: warning me
  chosen_spanish_reading: advirtiéndome
  alternative_spanish_readings:
  - reprendiéndome
  - disciplinándome
  - amonestándome
  rationale: En este contexto el verbo introduce la prohibición de andar en el camino del pueblo. «Advirtiéndome» conserva la fuerza correctiva y evita imponer exclusivamente la idea de castigo o disciplina.
  doctrine_reference: HALOT / uso contextual del verbo יסר en contextos de corrección profética
translation_notes:
  revision_awareness: Se siguió la revisión auditada que eliminó «upon me» del inglés para no añadir un complemento no explícito. En español se refleja esa decisión con «con mano fuerte» sin añadir «sobre mí», y se mantiene la estructura de advertencia/prohibición coherente con el hebreo y el inglés POB revisado.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Camino» conserva el valor metafórico ético de דֶּרֶךְ.
  - «Diciendo:» deja abierta la cita, conforme a la división versicular.
  - No se usa «SEÑOR» como sustituto del nombre divino en el texto principal.
