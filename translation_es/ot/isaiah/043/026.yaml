review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura forense del hebreo: imperativo inicial, invitación a litigar juntos, mandato de exponer la causa y propósito/resultando de quedar en lo correcto. Sin embargo, ''Hazme recordar'' no es la mejor equivalencia de הַזְכִּירֵנִי; en español natural y fiel debe ser ''Recuérdame''. Además, la nota [a] está mal anclada: ofrece una alternativa para נִשָּׁפְטָה pero aparece sobre el primer verbo. ''Seas declarado justo'' es defendible, pero en este contexto judicial ''se demuestre que tienes razón'' refleja mejor el valor forense de תִּצְדָּק y se alinea más estrechamente con el inglés auditado sin imponer una lectura doctrinal.'
  spanish_quality_summary: El texto es legible y digno, pero 'Hazme recordar' suena poco natural en español general. 'Entremos en juicio juntos' y 'Expón tu causa' son claros y apropiados. La cláusula final mejora con una formulación más idiomática y forense. También hace falta corregir la colocación de las notas para que correspondan exactamente a los elementos que comentan.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión sobre צדק debe mantener fuerza jurídica más que doctrinal; por eso conviene evitar en texto principal 'justificado' y también preferir una formulación más cercana a 'ser hallado en lo correcto' que a un estado moral abstracto de 'justo'.
  issues:
  - severity: high
    issue: Equivalencia poco natural de הַזְכִּירֵנִי como 'Hazme recordar'
    rationale: El hifil sí es causativo, pero en español la forma idiomática para 'cause me to remember' es 'Recuérdame'. 'Hazme recordar' suena forzada y menos fiel al uso natural.
  - severity: high
    issue: La nota [a] está anclada al segmento equivocado
    rationale: La nota explica una alternativa para 'entremos en juicio juntos' (נִשָּׁפְטָה יָחַד), pero el marcador aparece en 'Hazme recordar'. Esto incumple la disciplina de notas y puede confundir al lector.
  - severity: medium
    issue: '''Seas declarado justo'' puede sonar más abstracto/moral que estrictamente forense'
    rationale: Aunque defendible, la escena es de litigio. Una formulación como 'se demuestre que tienes razón' o 'quedes vindicado' comunica mejor el veredicto legal y se acerca más a 'be proved right' del POB inglés.
  revised_spanish_text: Recuérdame; entremos en juicio juntos[a]. Expón tu causa, para que se demuestre que tienes razón[b].
  revised_footnotes:
  - marker: a
    text: 'O: «arguyamos la causa juntos» o «entremos juntos en juicio».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «seas justificado» o «quedes vindicado».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'Hazme recordar' por 'Recuérdame' para reflejar de manera natural e idiomática el imperativo hebreo. Se mueve la nota [a] al segmento forense que realmente comenta. Se ajusta la cláusula final a 'para que se demuestre que tienes razón' para expresar mejor el sentido jurídico de צדק ('ser hallado en lo correcto') sin cargar el texto principal con resonancias doctrinales de 'justificado'.
