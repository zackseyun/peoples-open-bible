translation:
  language: es
  text: Joab, hijo de Zeruia, supo que el corazón del rey estaba vuelto hacia Absalón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el rey añoraba a Absalón»; el hebreo es breve y también puede entenderse más generalmente como «el corazón del rey estaba inclinado hacia Absalón». Algunos lo han entendido en sentido negativo: «estaba contra Absalón», aunque el contexto siguiente favorece una inclinación positiva.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּדַע
  english_pob_choice: Now ... knew
  chosen_spanish: Ahora ... supo
  alternatives_spanish:
  - Y ... supo
  - Entonces ... supo
  - llegó a saber
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, 'Ahora' funciona como marcador discursivo natural. 'Supo' conserva el sentido básico de ידע sin sobrerinterpretar el proceso cognitivo.
- source_word: יוֹאָב בֶּן צְרֻיָה
  english_pob_choice: Joab son of Zeruiah
  chosen_spanish: Joab, hijo de Seraías
  alternatives_spanish:
  - Joab, hijo de Zeruía
  - Joab, hijo de Zeruyá
  lexicon: Nombres propios bíblicos de uso común en español
  rationale: Se mantienen los nombres propios en forma reconocible para el lector español. 'Hijo de' reproduce la construcción de estado constructo sin añadir explicación.
- source_word: לֵב הַמֶּלֶךְ
  english_pob_choice: the king’s heart
  chosen_spanish: el corazón del rey
  alternatives_spanish:
  - el corazón del monarca
  - el ánimo del rey
  - la mente del rey
  lexicon: HALOT
  rationale: '''Corazón'' conserva la antropología hebrea de sede de voluntad y afecto. ''Mente'' sería más interpretativa y perdería la imagen corporal del hebreo.'
- source_word: עַל
  english_pob_choice: was toward
  chosen_spanish: hacia
  alternatives_spanish:
  - contra
  - por
  - en favor de
  lexicon: HALOT
  rationale: La preposición עַל con לֵב es el punto más ambiguo. 'Hacia' mantiene la dirección relacional sin resolver si la disposición era de afecto, deseo o incluso oposición; así se conserva la tensión del hebreo y del audit trail inglés.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: Convención onomástica bíblica en español
  rationale: '''Absalón'' es la forma establecida en español bíblico y transparente para el lector. No altera el referente ni la auditabilidad del nombre propio.'
theological_decisions:
- issue: Ambigüedad de la disposición del rey hacia Absalón
  english_pob_reading: the king’s heart was toward Absalom
  chosen_spanish_reading: el corazón del rey estaba hacia Absalón
  alternative_spanish_readings:
  - el corazón del rey deseaba a Absalón
  - el corazón del rey estaba contra Absalón
  - el rey estaba inclinado a favor de Absalón
  rationale: El hebreo es breve y no resuelve explícitamente si la orientación del corazón es afectuosa, nostálgica, favorable o adversa. La traducción conserva esa ambigüedad con una preposición direccional neutral, y la nota registra opciones interpretativas posibles sin cerrar la lectura.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje fue revisado en el último control sin cambios necesarios; la presente redacción sigue el acuerdo alto con el audit trail inglés y preserva la ambigüedad semántica del hebreo.
  spanish_consistency_notes:
  - Se usa 'hijo de' para el constructo בן, en lugar de una paráfrasis posesiva.
  - '''Corazón'' se conserva por su valor antropológico hebreo; no se reemplaza por ''mente''.'
  - '''Hacia'' mantiene la ambigüedad de עַל con לֵב y evita resolver prematuramente la orientación del rey.'
  - Se emplea 'Absalón' como forma española estándar del nombre propio.
  - La nota al pie recoge alternativas interpretativas equivalentes a las preservadas en el texto inglés.
