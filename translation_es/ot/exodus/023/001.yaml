translation:
  language: es
  text: No difundirás un informe falso[a]. No te unirás a un hombre malvado[b] para ser un testigo malicioso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevarás/cargarás un informe falso». El verbo hebreo significa literalmente «levantar» o «llevar», y aquí se usa para difundir o circular un informe.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «No pondrás tu mano con un hombre malvado para ser un testigo injusto». La expresión hebrea es literalmente «poner la mano con», un modismo de cooperación indebida; y «testigo violento» también puede entenderse como «testigo malicioso» o «testigo injusto» en este contexto legal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשָּׂא
  english_pob_choice: spread
  chosen_spanish: llevarás
  alternatives_spanish:
  - cargarás
  - portarás
  - difundirás
  lexicon: HALOT
  rationale: El hebreo נָשָׂא significa literalmente 'levantar/cargar/llevar', y con שֵׁמַע ('noticia, rumor, informe') tiene un sentido idiomático de transportar o circular esa información. 'Llevarás' conserva la imagen verbal del original con naturalidad en español; la nota aclara el valor idiomático sin borrar la tensión lexical.
- source_word: שֵׁמַע שָׁוְא
  english_pob_choice: a false report
  chosen_spanish: un informe falso
  alternatives_spanish:
  - un rumor falso
  - un informe vano
  - un informe mentiroso
  lexicon: HALOT
  rationale: 'שֵׁמַע designa algo oído: noticia, rumor o informe; שָׁוְא añade falsedad, vaciedad o inutilidad. ''Informe falso'' es claro y apto para un contexto legal; mantiene el carácter de comunicación verbal sin introducir una interpretación más amplia que la del hebreo.'
- source_word: תָּשֶׁת יָדְךָ עִם
  english_pob_choice: join hands with
  chosen_spanish: te unirás
  alternatives_spanish:
  - pondrás tu mano con
  - pondrás tu mano junto a
  - apoyarás la mano con
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática, literalmente 'poner la mano con'. En español, una reproducción literal suena extraña; 'te unirás' comunica la cooperación indebida que exige el contexto judicial, mientras la nota conserva la imagen concreta de la mano.
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: un hombre malvado
  alternatives_spanish:
  - un impío
  - un culpable
  - un malvado
  lexicon: HALOT
  rationale: רָשָׁע en un marco legal-moral describe a una persona culpable o impía. 'Hombre malvado' preserva el singular masculino del hebreo y sigue siendo claro en español; 'impío' sería posible, pero desplaza el matiz hacia lo religioso más que hacia la injusticia activa del contexto.
- source_word: לִהְיוֹת עֵד חָמָס
  english_pob_choice: to be a malicious witness
  chosen_spanish: para ser testigo de maldad
  alternatives_spanish:
  - para ser un testigo malicioso
  - para ser testigo violento
  - para ser testigo injusto
  lexicon: HALOT
  rationale: עֵד es 'testigo', y חָמָס abarca violencia, injusticia o trato cruel/ruthless. La revisión inglesa prefirió 'malicious' por el contexto; en español 'testigo de maldad' evita una frase poco natural como 'testigo malicioso' y conserva la idea de un testimonio que sirve a la maldad, aunque la nota mantiene abierta la alternativa más literal de 'violento'/'injusto'.
- source_word: לֹא
  english_pob_choice: You shall not
  chosen_spanish: No llevarás
  alternatives_spanish:
  - No debes llevar
  - No has de llevar
  - No llevarás tú
  lexicon: HALOT
  rationale: El primer לֹא introduce una prohibición de estilo jurídico. El futuro prohibitivo 'No llevarás' mantiene el tono legal-covenantal del texto hebreo y fluye bien en español bíblico contemporáneo.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: No te unirás
  alternatives_spanish:
  - No debes unirte
  - No has de unirte
  - No pondrás tu mano con
  lexicon: HALOT
  rationale: אַ ל con imperfecto expresa prohibición directa. 'No te unirás' funciona como segunda prohibición en español natural y conserva el carácter imperativo/jurídico del hebreo.
theological_decisions:
- issue: Conservación de la fuerza legal y del paralelismo prohibitivo
  english_pob_reading: 'Two coordinated prohibitions: not spreading a false report, and not allying with a wicked man as a malicious witness.'
  chosen_spanish_reading: 'Dos prohibiciones coordinadas: no llevar un informe falso, y no unirse a un hombre malvado para dar testimonio de maldad.'
  alternative_spanish_readings:
  - No difundirás un rumor falso. No te asociarás con un hombre malvado para ser testigo injusto.
  - No levantarás un informe falso. No pondrás tu mano con un malvado para ser un testigo violento.
  rationale: La línea española conserva la estructura jurídica del hebreo y del POB inglés, sin suavizar la advertencia moral. La primera cláusula mantiene el verbo de 'cargar/llevar' con una nota; la segunda expresa cooperación indebida como unión, sin perder el contraste ético entre el hablante fiel y el testigo corrupto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 4
- issue: Tensión lexical en חָמָס
  english_pob_reading: '''violent witness'' revised toward ''malicious witness'' to fit judicial context.'
  chosen_spanish_reading: '''testigo de maldad'' with note allowing ''violento'' / ''injusto'' as alternatives.'
  alternative_spanish_readings:
  - testigo violento
  - testigo injusto
  - testigo malicioso
  rationale: En español, 'malicioso' puede sonar más a intención psicológica que al daño jurídico del hebreo. 'Testigo de maldad' permite leer el sustantivo con amplitud ética y mantiene la posibilidad de un testimonio violento, injusto o perverso, tal como la trayectoria del POB inglés deja abierta la tensión.
  doctrine_reference: DOCTRINE.md §Lexical transparency; §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió 'malicious witness' en lugar de 'violent witness', pero en español evita una solución demasiado psicologista. También conserva la primera cláusula con la imagen verbal de 'llevar' en vez de sustituirla directamente por 'difundir', para no borrar el valor literal del hebreo נָשָׂא.
  spanish_consistency_notes:
  - Se mantuvo el tono jurídico-prohibitivo con dos cláusulas negativas coordinadas.
  - Se evitó 'SEÑOR' y 'Cristo' porque no corresponden a este versículo.
  - '''Maldad'' se usó para חָמָס como solución amplia y transparente; las notas conservan la alternativa ''violento/injusto''.'
  - El singular masculino del hebreo se preservó con 'un hombre malvado'.
