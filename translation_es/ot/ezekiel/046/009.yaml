revisions:
- from: Cuando el pueblo de la tierra venga ante Yahvé[a] en las fiestas señaladas, el que entre por la puerta del norte para postrarse[b] saldrá por la puerta del sur; y el que entre por la puerta del sur saldrá por la puerta del norte. No volverá por la puerta por la que entró, sino que saldrá de frente[c].
  to: Cuando el pueblo de la tierra venga ante Yahvé en los tiempos señalados[a], el que entre por la puerta del norte para postrarse[b] saldrá por la puerta del sur; y el que entre por la puerta del sur saldrá por la puerta del norte. No volverá por la puerta por la que entró, sino que saldrá recto hacia adelante[c].
  rationale: 'La revisión corrige dos puntos principales: restituye el valor más amplio de בַּמּוֹעֲדִים con «tiempos señalados», dejando las opciones festivas en nota, y precisa la cláusula final con «recto hacia adelante», que refleja mejor la instrucción de continuar al frente y salir por el lado opuesto. Se conservan las fortalezas del borrador: «Yahvé», «el pueblo de la tierra» y «postrarse».'
