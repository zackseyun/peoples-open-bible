    issue: «Estaban sobre» es un calco poco natural para עַל en contexto administrativo.
    rationale: Aunque semánticamente apunta a supervisión, en español suena torpe y espacial. «Estaban al frente de» preserva la autoridad/encargo de manera clara y fiel.
  - severity: low
    issue: «Gispá» introduce una adaptación gráfica no respaldada por el expediente.
    rationale: La base inglesa usa «Gishpa», y no hay razón fuerte en el material fuente para castellanizarlo. Mantener «Gishpa» favorece consistencia y evita crear una forma propia nueva.
