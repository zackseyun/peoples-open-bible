  text: וְ/הָיָ֞ה בִּ/מְשֹׁ֣ךְ בְּ/קֶ֣רֶן הַ/יּוֹבֵ֗ל ב/שמע/כם אֶת ק֣וֹל הַ/שּׁוֹפָ֔ר יָרִ֥יעוּ כָל הָ/עָ֖ם תְּרוּעָ֣ה גְדוֹלָ֑ה וְ/נָ֨פְלָ֜ה חוֹמַ֤ת הָ/עִיר֙ תַּחְתֶּ֔י/הָ וְ/עָל֥וּ הָ/עָ֖ם אִ֥ישׁ נֶגְדּֽ/וֹ׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/006/005.yaml
  text: And when the ram's horn sounds a long blast[a], when you hear the sound of the trumpet, all the people shall raise a great shout, and the wall of the city will fall down beneath it, and the people shall go up[c][b], each man straight before him.
  footnotes:
  - marker: a
    text: Or 'when the ram's horn sounds long' or 'when the blast on the ram's horn is prolonged.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the wall of the city will fall beneath itself,' likely meaning it will collapse straight down.
    reason: lexical_alternative
  - marker: c
    text: Or 'each one straight ahead' or 'each man directly before him.'
    reason: lexical_alternative
