translation:
  language: es
  text: A causa de estas cosas[a], la justicia divina, habiéndose indignado, libró guerra contra Antíoco mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juicio divino» o «castigo divino»; δίκη puede denotar justicia en acción, pena judicial o retribución.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφʼ οἷς
  english_pob_choice: Because of these things
  chosen_spanish: A causa de estas cosas
  alternatives_spanish:
  - Por estas cosas
  - Por lo cual
  lexicon: LSJ
  rationale: La construcción preposicional con relativo expresa causa retrospectiva. «A causa de estas cosas» conserva el valor causal y la referencia a las acciones anteriores de Antíoco sin sonar forzado en español.
- source_word: ἀγανακτήσασα
  english_pob_choice: having become indignant
  chosen_spanish: indignada
  alternatives_spanish:
  - habiéndose indignado
  - airada
  lexicon: LSJ
  rationale: El participio expresa fuerte indignación. En español, «indignada» transmite el estado resultante con naturalidad y mantiene el tono elevado del pasaje.
- source_word: ἡ θεία δίκη
  english_pob_choice: divine justice
  chosen_spanish: la justicia divina
  alternatives_spanish:
  - el juicio divino
  - el castigo divino
  lexicon: LSJ
  rationale: δίκη puede abarcar justicia, juicio penal o retribución. «La justicia divina» preserva la personificación y el campo semántico sin cerrar prematuramente la tensión entre justicia, juicio y retribución.
- source_word: αὐτόν τοι τὸν Ἀντίοχον
  english_pob_choice: Antiochus himself
  chosen_spanish: el mismo Antíoco
  alternatives_spanish:
  - Antíoco en persona
  - a Antíoco mismo
  lexicon: LSJ
  rationale: La acumulación pronominal es enfática. «El mismo Antíoco» reproduce esa exclusividad en forma natural y retiene el énfasis del griego.
- source_word: ἐπολέμησεν
  english_pob_choice: made war against
  chosen_spanish: hizo guerra contra
  alternatives_spanish:
  - peleó contra
  - libró guerra contra
  lexicon: LSJ
  rationale: El verbo es marcial y, en este contexto personificado, conviene una expresión fuerte. «Hizo guerra contra» conserva el matiz bélico y el estilo solemne.
theological_decisions:
- issue: Personificación de δίκη
  english_pob_reading: Render as 'divine justice' acting personally
  chosen_spanish_reading: Traducirla como «la justicia divina» que actúa de modo personal
  alternative_spanish_readings:
  - «el castigo divino»
  - «el juicio divino»
  rationale: 'El griego personifica δίκη: se indigna y hace guerra. «La justicia divina» mantiene esa personificación sin reducirla a una mera sanción ni convertirla explícitamente en una referencia directa a Dios, preservando la tensión teológica del texto.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish without flattening theological weight.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje se mantiene en acuerdo alto con la fuente y con la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se usa «Antíoco» como forma española del nombre propio griego.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto fuente.
  - Se mantiene «justicia divina» para conservar la personificación de δίκη y su posible matiz retributivo.
  - 'El tiempo verbal español sigue el participio griego con una construcción adjetival natural: «indignada».'
