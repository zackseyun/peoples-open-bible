review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: la riqueza es difundida ampliamente y la gloria alcanza la máxima extensión. Sin embargo, no refleja con suficiente naturalidad en español el verbo implícito/entendido de la segunda cola, y además pierde una alternativa léxica importante documentada en el POB inglés para δόξα (''renombre'').'
  spanish_quality_summary: El español es claro y digno, pero 'su gloria hasta el fin de la tierra' queda algo elíptico y duro en español moderno. 'Y su gloria llegó hasta el fin de la tierra' suena más natural sin apartarse del sentido. También conviene ajustar la nota [a], que actualmente ofrece como alternativa la misma frase ya puesta en el texto.
  glossary_alignment: No hay términos del glosario principal especialmente implicados. 'Riqueza' para πλοῦτος y 'gloria' para δόξα son apropiados. La decisión de usar 'tierra' en ambas ocurrencias de γῆ es defendible en español, aunque difiere de la matización del inglés auditado; no requiere cambio obligatorio. Sí conviene conservar en nota la posibilidad de 'renombre' para δόξα, siguiendo la auditoría inglesa.
  issues:
  - severity: medium
    issue: 'La segunda cola carece de verbo expreso en español: ''y su gloria hasta el fin de la tierra''.'
    rationale: Aunque el griego poético puede elidir el verbo, en español esta elipsis suena incompleta y menos natural. Añadir 'llegó' preserva fielmente el sentido comunicado por el paralelo sin sobreinterpretar.
  - severity: medium
    issue: La nota [a] no aporta una verdadera alternativa, porque repite 'por toda la tierra'.
    rationale: La auditoría inglesa preserva la ambigüedad de γῆ entre 'land' y 'earth'. En español, si el texto usa 'tierra', la alternativa útil sería 'por todo el país/territorio' o similar.
  - severity: low
    issue: Falta en notas la alternativa léxica 'renombre' para δόξα.
    rationale: El POB inglés documenta que δόξα puede significar honor o reputación, no solo gloria/esplendor. Esa alternativa es valiosa también en español.
  revised_spanish_text: Su riqueza se extendió por toda la tierra[a], y su gloria llegó hasta el fin de la tierra[b].
  revised_footnotes:
