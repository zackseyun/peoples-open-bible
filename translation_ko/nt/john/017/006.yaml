  lexicon: BDAG
  rationale: φανερόω의 「드러내어 보이다」.
- source_word: τετήρηκαν τὸν λόγον
  english_pob_choice: kept your word
  chosen_korean: 말씀을 지키다
  alternatives_korean:
  - 말씀에 순종하다
  lexicon: BDAG
  rationale: τηρέω의 「보존·준수」를 「지키다」로.
