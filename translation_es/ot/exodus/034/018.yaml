review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en la estructura básica: mandato de observar la fiesta, duración de siete días, comer panes sin levadura, referencia al tiempo señalado en el mes de Abib y razón basada en la salida de Egipto. Sin embargo, hay dos desajustes con la evidencia y el rastro POB: (1) «como te he mandado» cambia el perfecto hebreo/inglés simple pasado a un perfecto compuesto español menos directo; «como te mandé» refleja mejor צִוִּיתִךָ y el inglés auditado. (2) La nota [c] no preserva una alternativa real, porque repite exactamente el texto principal «saliste de Egipto»; debe ofrecer una variante genuina, por ejemplo «saliste de la tierra de Egipto».'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. «La fiesta de los panes sin levadura», «Durante siete días» y «en el tiempo señalado» funcionan bien en español general eclesial. La principal mejora estilística es preferir «como te mandé» por sencillez y fidelidad verbal. Las notas están bien formuladas salvo la [c], que actualmente es inútil por duplicación.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. Las decisiones clave concuerdan en general con la filosofía POB: «fiesta» para חַג, «panes sin levadura» para מַצּוֹת, y singular implícito de segunda persona. La excepción a corregir es la nota alternativa [c], que no conserva adecuadamente la alternativa inglesa documentada.'
  issues:
  - severity: medium
    issue: «como te he mandado» en lugar de «como te mandé»
    rationale: El hebreo צִוִּיתִךָ es perfecto 1cs+2ms y el inglés POB auditado usa «as I commanded you». En este contexto narrativo-legal, el pretérito simple español «te mandé» es más directo y formalmente más cercano que el perfecto compuesto.
  - severity: medium
    issue: La nota [c] repite exactamente el texto principal
