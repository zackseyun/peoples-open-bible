revisions:
- from: Cuando un justo se aparta[a] de su justicia y comete injusticia[b], morirá por causa de ellas.
  to: Cuando un justo se aparta de su justicia y comete injusticia[a], morirá por causa de esos actos.
  rationale: Se revisa para preservar la evidencia documentada sobre בָּהֶם y para mejorar la naturalidad del español en la cláusula final. Se mantiene la elección principal 'se aparta', 'un justo', 'su justicia' e 'injusticia', pero se reemplaza la nota no esencial sobre שוב por una nota anclada en 'injusticia' que recoge tanto la alternativa léxica de עָוֶל como la literalidad/valor causal de בָּהֶם, siguiendo el expediente inglés. No se requiere adjudicación adicional.
