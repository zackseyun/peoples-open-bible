translation:
  text: And nations of Arabian dragons will come out with many chariots[a], and their hissing is carried over the earth from a day's journey away[b], so that all who hear them will fear and tremble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'nations of Arabian dragons' follows the difficult Latin nationes draconum Arabum closely. The imagery may be symbolic, monstrous, or ethnographic in a way no longer fully recoverable from the Latin alone.
    reason: textual_variant
    anchor_ref: '15:29'
  - marker: b
    text: Or 'from the day of their march'.
    reason: previous_rendering
