base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/012/013.yaml
  text: And Bagoas went out from the presence of Holofernes and went in to her and said[a], “Let this beautiful young woman not hesitate to come to my lord, to be honored before him, and to drink wine with us in gladness[b], and to become on this day like one of the daughters of the Assyrians who stand in the house of Nebuchadnezzar.”
  footnotes:
  - marker: a
    text: Or 'maidservant' for 'girl' (ἡ παιδίσκη); the Greek term can denote a female servant or slave girl, but here it functions as flattering address.
    reason: lexical_alternative
  - marker: b
    text: Or 'who attend in the house of Nebuchadnezzar' for 'who stand in the house of Nebuchadnezzar.'
    reason: lexical_alternative
