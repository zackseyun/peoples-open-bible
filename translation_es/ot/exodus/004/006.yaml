translation:
  language: es
  text: 'Entonces Yahvé le dijo de nuevo: «Por favor, mete tu mano en tu seno». Él metió su mano en su seno, y al sacarla, he aquí que su mano estaba leprosa[a], como la nieve.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «leprosa». El término se refiere a la condición llamada צָרַעַת en el Antiguo Testamento, que quizá no corresponde exactamente a la lepra moderna (enfermedad de Hansen).
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del texto hebreo, siguiendo el criterio del proyecto de no ocultar el Tetragrámaton bajo una sustitución litúrgica. «Yahvé» es la forma base del POB en español.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: HALOT
  rationale: Aquí עוֹד marca repetición en la secuencia narrativa; «otra vez» es natural en español y conserva el valor iterativo.
- source_word: הָבֵא
  english_pob_choice: put
  chosen_spanish: mete
  alternatives_spanish:
  - pon
  - introduce
  lexicon: HALOT
  rationale: Con «mano» y «en tu seno», el sentido idiomático en español se expresa mejor con un verbo directo de inserción. «Mete» conserva el mandato sin sonar forzado.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula suaviza la orden; «Por favor» reproduce bien ese tono cortés o apremiante en español moderno.
- source_word: חֵיק
  english_pob_choice: bosom
  chosen_spanish: seno
  alternatives_spanish:
  - pecho
  - pliegue del vestido
  - regazo
  lexicon: HALOT
  rationale: «Seno» comunica el espacio del pecho o pliegue interior donde se introduce la mano, y es más claro en español actual que «bosom» traducido mecánicamente. Se conserva la imagen corporal concreta del hebreo.
- source_word: וַיּוֹצִאָהּ
  english_pob_choice: when he brought it out
  chosen_spanish: al sacarla
  alternatives_spanish:
  - y la sacó
  - cuando la sacó
  lexicon: HALOT
  rationale: El sufijo femenino vuelve a referirse a «mano»; en español debe expresarse con pronombre femenino. «Al sacarla» mantiene la secuencia narrativa de manera natural.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: La fórmula introduce la aparición dramática del signo. «He aquí que» conserva mejor la fuerza deíctica y solemne que una simple conjunción narrativa.
- source_word: מְצֹרַעַת
  english_pob_choice: leprous
  chosen_spanish: leprosa
  alternatives_spanish:
  - afectada de צרעת
  - con lepra
  lexicon: HALOT
  rationale: Se conserva el valor tradicional breve de «leprosa», mientras la nota explica que צָרַעַת no necesariamente corresponde a la lepra moderna. Esto preserva la tensión léxica documentada por el POB inglés.
- source_word: כַּשָּׁלֶג
  english_pob_choice: like snow
  chosen_spanish: como la nieve
  alternatives_spanish:
  - como la nieve blanca
  - blanca como la nieve
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «como nieve», en español «nieve» es la forma natural para transmitir la comparación de blancura. Se evita añadir intensificación no explícita.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el nombre del pacto. Se conserva en español como «Yahvé» para mantener la transparencia del original, en continuidad con la política del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de צָרַעַת
  english_pob_reading: leprous, with footnote noting it may not correspond exactly to modern leprosy
  chosen_spanish_reading: leprosa, con nota explicativa
  alternative_spanish_readings:
  - afectada de una enfermedad cutánea
  - contagiada de lepra
  rationale: La POB en inglés conserva el término tradicional pero aclara que no equivale necesariamente a la lepra moderna. En español se mantiene «leprosa» por fidelidad y se añade una nota para preservar esa precisión semántica.
  doctrine_reference: Lexical note aligned with POB footnote on צָרַעַת
translation_notes:
  revision_awareness: El chequeo editorial inglés reportó alta concordancia y sin cambios en la última revisión; por tanto, la propuesta española sigue el sentido consolidado del POB sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «seno» para חֵיק por claridad natural en español, evitando el calco «bosom».
  - La nota sobre צָרַעַת conserva la tensión léxica entre el término bíblico y la lepra moderna.
  - Se preserva el tono reverente y narrativo breve del hebreo con una puntuación directa y una cita introducida por dos puntos.
