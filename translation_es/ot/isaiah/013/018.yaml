    rationale: '"Algunos toman el hebreo de manera metonímica" suena algo forzado. Puede expresarse con mayor naturalidad como una alternativa interpretativa: ''Algunos entienden...''.'
  revised_spanish_text: Y sus arcos despedazarán[a] a los jóvenes; no tendrán compasión del fruto del vientre; sus ojos no perdonarán a los niños[b].
