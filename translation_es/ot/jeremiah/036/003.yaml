base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/036/003.yaml
  text: Perhaps the house of Judah will hear of all the disaster that I am planning to bring on them[a], so that each man may turn from his evil way[b], and I will forgive their iniquity and their sin.
  footnotes:
  - marker: a
    text: Or 'all the calamity'; Hebrew 'all the evil/disaster.' In this context it refers to the judgment God threatens to bring on Judah, not moral evil in God.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man.' The singular masculine form is used representatively for the members of Judah.
    reason: lexical_alternative
