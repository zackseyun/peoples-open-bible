translation:
  language: es
  text: Pues cuando callé, se consumieron mis huesos con mi gemido[a] todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con mi rugido». El término hebreo puede designar un clamor fuerte como un rugido, pero aquí probablemente se refiere a un gemido angustiado.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For when
  chosen_spanish: Porque cuando
  alternatives_spanish:
  - Porque
  - Cuando
  - Pues cuando
  lexicon: HALOT
  rationale: כִּי aquí introduce la circunstancia que explica la bienaventuranza previa. En español, «Porque cuando» conserva esa relación causal-circunstancial sin sonar forzado.
- source_word: הֶחֱרַשְׁתִּי
  english_pob_choice: I kept silent
  chosen_spanish: callé
  alternatives_spanish:
  - me mantuve en silencio
  - guardé silencio
  - estuve callado
  lexicon: HALOT
  rationale: El verbo expresa la idea de silencio deliberado. «Callé» es una forma natural y fiel; evita añadir contenido no presente y conserva la acción verbal en primera persona.
- source_word: בָּלוּ
  english_pob_choice: wasted away
  chosen_spanish: se consumieron
  alternatives_spanish:
  - se desgastaron
  - se marchitaron
  - se deshicieron
  lexicon: HALOT
  rationale: Para los huesos en un lamento poético, בָּלוּ comunica deterioro y agotamiento. «Se consumieron» conserva la imagen corporal de desgaste de manera idiomática en español.
- source_word: עֲצָמַי
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - mis huesos mismos
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal literal del hebreo, que expresa el estado interior de la persona mediante los huesos.
- source_word: בְּשַׁאֲגָתִי
  english_pob_choice: through my groaning
  chosen_spanish: con mi gemido
  alternatives_spanish:
  - por mi gemido
  - en mi gemido
  - con mi clamor
  lexicon: HALOT
  rationale: שׁאגה puede significar «rugido» o «clamor», pero en este salmo penitencial la referencia es a una expresión angustiada. «Gemido» comunica bien ese sentido en español. La preposición «con» refleja de forma natural el matiz circunstancial del beth.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día entero
  - a lo largo de todo el día
  lexicon: HALOT
  rationale: Equivale de manera natural a la duración continua del original sin añadir énfasis innecesario.
theological_decisions:
- issue: Si explicitar el objeto del silencio como pecado no confesado
  english_pob_reading: Left implicit in the main text
  chosen_spanish_reading: Se deja implícito en el texto principal
  alternative_spanish_readings:
  - Porque cuando callé acerca de mi pecado, se consumieron mis huesos con mi gemido todo el día.
  rationale: El contexto inmediato hace claro el trasfondo, pero este versículo no lo enuncia. Mantener la concisión del hebreo evita introducir una explicación interpretativa en la línea principal.
  doctrine_reference: 'Principio de fidelidad al texto fuente: no resolver en la traducción una tensión o ambigüedad que el original deja implícita.'
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo (WLC) y el expediente auditado en inglés. La decisión clave es mantener la ambigüedad de שׁאגה en el texto principal y conservar el objeto del silencio implícito, como en el inglés POB.
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» en otras porciones del proyecto según corresponda; aquí no aparece el nombre divino.
  - Se mantuvo «huesos» como imagen corporal literal, coherente con el valor poético del hebreo.
  - «Gemido» evita una paráfrasis excesiva y preserva la tensión semántica de שׁאגה con una nota alternativa.
