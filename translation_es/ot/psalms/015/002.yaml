translation:
  language: es
  text: El que anda con integridad[a], y hace lo recto[b], y habla verdad en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «intachablemente». El término hebreo puede denotar plenitud o integridad de conducta, no necesariamente perfección absoluta.
    reason: lexical_alternative
  - marker: b
    text: O «hace justicia» / «hace rectitud». El sustantivo hebreo puede llevar también la idea de justicia o rectitud, además de lo que es recto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלֵךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  - se conduce
  lexicon: HALOT
  rationale: El participio hebreo de הלך funciona idiomáticamente para el modo de vida. En español, «anda» conserva la metáfora del caminar/conducta y suena natural en un salmo sapiencial.
- source_word: תָּמִים
  english_pob_choice: blamelessly
  chosen_spanish: en integridad
  alternatives_spanish:
  - sin culpa
  - con integridad
  - íntegramente
  lexicon: HALOT
  rationale: El término describe una integridad moral o completitud de conducta, no perfección sin pecado. «En integridad» mantiene esa fuerza ética y evita exagerar el sentido.
- source_word: וּפֹעֵל
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - practica
  - obra
  - realiza
  lexicon: HALOT
  rationale: פעל expresa hacer, obrar o practicar. «Hace» es la correspondencia más directa y natural con el sintagma siguiente.
- source_word: צֶדֶק
  english_pob_choice: what is right
  chosen_spanish: lo recto
  alternatives_spanish:
  - justicia
  - rectitud
  - lo justo
  lexicon: HALOT
  rationale: צדק puede abarcar justicia, rectitud o lo que es correcto. Aquí, como descripción ética concreta, «lo recto» comunica bien la idea sin perder el campo semántico de justicia/rectitud.
- source_word: וְדֹבֵר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - pronuncia
  - expresa
  lexicon: HALOT
  rationale: דבר en esta construcción participial se entiende como hablar. «Habla» mantiene el paralelismo verbal y resulta natural en español.
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - lo verdadero
  lexicon: HALOT
  rationale: אמת puede incluir verdad y fidelidad; junto con «habla» el sentido principal es veracidad. «Verdad» es conciso y fiel al uso poético.
- source_word: בִּלְבָבוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de su corazón
  - desde su corazón
  lexicon: HALOT
  rationale: La frase literalmente significa «en su corazón». Se conserva «corazón» para reflejar la antropología hebrea del interior de la persona y la sinceridad interna.
theological_decisions:
- issue: Sujeto masculino singular genérico
  english_pob_reading: He who walks ... in his heart
  chosen_spanish_reading: El que anda ... en su corazón
  alternative_spanish_readings:
  - Quien anda ... en su corazón
  - El que camina ... en su corazón
  rationale: El hebreo usa participios y sufijos masculinos singulares de manera representativa. En español, «El que» preserva ese singular genérico sin suavizarlo artificialmente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Integridad moral versus perfección absoluta
  english_pob_reading: blamelessly
  chosen_spanish_reading: en integridad
  alternative_spanish_readings:
  - perfectamente
  - sin mancha
  - con integridad
  rationale: El versículo describe al que está apto para morar con Yahvé por su conducta íntegra, no una afirmación de impecabilidad. «En integridad» mantiene el sentido moral sin exceder el alcance del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: ‘Verdad’ como sinceridad interior, no solo exactitud verbal
  english_pob_reading: speaks truth in his heart
  chosen_spanish_reading: habla verdad en su corazón
  alternative_spanish_readings:
  - dice verdad en su corazón
  - habla con verdad en su corazón
  rationale: La construcción hebrea apunta a una veracidad interior que caracteriza a la persona. La traducción conserva la tensión entre hablar y el ámbito interior del corazón, sin convertirla en mera honestidad externa.
  doctrine_reference: DOCTRINE.md §Poetic integrity and inner-person language
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el texto hebreo y con el registro auditado en inglés; no se identificaron revisiones posteriores que requirieran ajustes, y la redacción española sigue la misma decisión semántica central: integridad de conducta, práctica de lo recto y veracidad interior.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto solo cuando el versículo lo requiera explícitamente; aquí no aparece el nombre divino en el texto base.
  - «El que» conserva el singular representativo del hebreo sin introducir plural inclusivo.
  - «En su corazón» preserva el valor antropológico de לבב como interioridad personal.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
