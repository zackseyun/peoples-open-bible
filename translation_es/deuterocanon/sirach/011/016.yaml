translation:
  language: es
  text: Él lo levantó[b] y lo exaltó[a], y muchos quedaron asombrados ante él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «lo levantó sobre/a su cabeza». El sentido probablemente es elevarlo al lugar o rango más alto, por eso se traduce de forma más natural en español.
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego provisto para este versículo no corresponde a esta línea hebrea, de modo que la traducción sigue el testimonio hebreo conservado.
    reason: textual_variant
lexical_decisions:
- source_word: נָשָׂא
  english_pob_choice: lifted
  chosen_spanish: levantó
  alternatives_spanish:
  - alzó
  - subió
  lexicon: HALOT
  rationale: El hebreo expresa el movimiento de levantar/elevar. «Levantó» comunica el ascenso de manera natural en español sin añadir una imagen más específica de la que permite el texto.
- source_word: בְּרֹאשׁוֹ
  english_pob_choice: to the top
  chosen_spanish: lo
  alternatives_spanish:
  - hasta la cima
  - en lo alto
  - a la cabeza
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y en el audit trail inglés se entendió como elevación a un lugar alto o de preeminencia. En español se mantiene el sentido global con el segundo pronombre «lo» unido a «levantó», sin forzar una locución extra que sonaría artificial en esta frase breve.
- source_word: וַיְרֹמְמֵהוּ
  english_pob_choice: exalted him
  chosen_spanish: lo exaltó
  alternatives_spanish:
  - lo encumbró
  - lo enalteció
  lexicon: HALOT
  rationale: «Exaltó» conserva el paralelismo con el verbo anterior y expresa elevación de rango o honor, no solo de altura física.
- source_word: וַיִּתְמְהוּ
  english_pob_choice: were astonished
  chosen_spanish: se asombraron
  alternatives_spanish:
  - se maravillaron
  - quedaron atónitos
  lexicon: HALOT
  rationale: El hebreo indica asombro o sorpresa intensa. «Se asombraron» es una equivalencia natural y suficientemente fuerte en español.
- source_word: עָלָיו
  english_pob_choice: at him
  chosen_spanish: de él
  alternatives_spanish:
  - por él
  - sobre él
  lexicon: HALOT
  rationale: Con «asombrarse», el complemento en español se expresa de manera más idiomática con «de él», manteniendo la referencia al mismo individuo sin introducir un matiz extraño.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - multitudes
  lexicon: HALOT
  rationale: «Muchos» reproduce la indefinición del hebreo de forma breve y natural; el contexto permite entender un grupo humano implícito.
theological_decisions:
- issue: Sujeto implícito y no identificado explícitamente
  english_pob_reading: Rendered with the generic masculine singular 'he'/'him' without identifying the subject
  chosen_spanish_reading: Se mantiene un sujeto implícito con el pronombre masculino singular, sin nombrarlo.
  alternative_spanish_readings:
  - Él — referido a Dios o al Señor
  - Él — referido a un gobernante o persona no identificada
  rationale: El hebreo presenta formas verbales y sufijos masculinos singulares, pero no nombra al sujeto. La traducción española debe conservar esa apertura y no resolverla con una identificación doctrinal o histórica que el texto no da.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión textual y no resolver ambigüedades no resueltas por la fuente'
translation_notes:
  revision_awareness: La redacción sigue el testimonio hebreo conservado en la fuente principal, mientras que el paralelo griego indicado en el paquete no corresponde a esta línea; por eso no se incorporó una lectura griega discordante. El ajuste revisado del inglés de 'to the top' a 'up' se refleja en español con una fórmula más natural y sin sobretraducir la imagen.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero en español moderno.
  - Se evita identificar al sujeto implícito porque la fuente hebrea no lo especifica.
  - «Exaltó» conserva el paralelo semántico con «levantó».
  - No se añadió nota al pie porque la frase española puede expresar la idiomaticidad sin un anclaje de alternativa textual explícita.
