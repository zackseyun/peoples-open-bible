translation:
  language: es
  text: Y cuando nos acercamos[a], la reconocimos; pero el joven huyó[b], cubierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la identificamos». El verbo griego puede implicar reconocer o identificar, no solo ver.
    reason: lexical_alternative
  - marker: b
    text: O «velado» o «con el rostro cubierto». El griego dice literalmente «habiendo sido cubierto», sin especificar qué estaba cubierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  english_pob_choice: when we came near
  chosen_spanish: cuando nos acercamos
  alternatives_spanish:
  - cuando nos aproximamos
  - al acercarnos
  - habiéndonos acercado
  lexicon: BDAG
  rationale: El participio aoristo introduce una circunstancia anterior a la acción principal. En español, «cuando nos acercamos» comunica con naturalidad la relación temporal sin perder la idea de acercamiento.
- source_word: ἐπέγνωμεν
  english_pob_choice: recognized her
  chosen_spanish: la reconocimos
  alternatives_spanish:
  - la vimos
  - la percibimos
  - la identificamos
  lexicon: BDAG
  rationale: La forma griega puede significar reconocer o identificar. Dado el contexto acusatorio, «la reconocimos» conserva esa fuerza de identificación mejor que un simple «la vimos».
- source_word: νεανίσκος
  english_pob_choice: young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el joven varón
  - el mozo
  lexicon: BDAG
  rationale: El término designa a un varón joven. «El joven» es natural en español y mantiene el matiz de edad sin introducir coloquialismo.
- source_word: ἔφυγε
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió corriendo
  - fue huyendo
  lexicon: BDAG
  rationale: El verbo expresa huida. «Huyó» es preciso, formal y equivalente al valor narrativo de «fled».
- source_word: συγκεκαλυμμένος
  english_pob_choice: being covered
  chosen_spanish: cubierto
  alternatives_spanish:
  - velado
  - con el rostro cubierto
  - oculto
  lexicon: LSJ
  rationale: El participio perfecto pasivo indica que estaba cubierto, pero el griego no especifica qué parte estaba cubierta. «Cubierto» respeta esa indeterminación y evita precisar más de lo que el texto dice.
translation_notes:
  revision_awareness: La redacción sigue la revisión del inglés POB que corrigió «we saw her» por «we recognized her» para reflejar mejor ἐπέγνωμεν, y conserva la frase abierta para συγκεκαλυμμένος como «cubierto», sin concretar «rostro» u otro objeto.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la coordinación narrativa del griego.
  - Se usa «la reconocimos» en coherencia con la decisión auditada del POB inglés sobre ἐπέγνωμεν.
  - «Cubierto» conserva la ambigüedad del participio griego y evita una glosa interpretativa.
  - La puntuación con punto y coma reproduce la pausa entre las dos cláusulas griegas.
