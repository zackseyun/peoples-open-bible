  source_alignment_summary: 'El borrador capta bien la estructura básica: cláusula temporal («Cuando»), acercamiento a una ciudad, intención bélica, y luego una acción verbal orientada a la paz. Sin embargo, «le harás saber palabras de paz» no refleja con suficiente fidelidad וְקָרָאתָ אֵלֶיהָ לְשָׁלוֹם, porque desplaza el verbo de ‘llamar/proclamar’ a una perífrasis explicativa y añade «palabras», término no presente en el hebreo. La nota inglesa preserva precisamente el sentido idiomático alterno (‘proclaim terms of peace’ / ‘offer peace’), por lo que en español conviene mantener en el texto principal una formulación más cercana al verbo fuente y dejar la idiomaticidad en nota.'
  spanish_quality_summary: El español es comprensible y digno, pero «le harás saber palabras de paz» suena algo forzado y menos natural que «le proclamarás paz» o «la llamarás a la paz». Además, la combinación «harás saber palabras» resulta redundante y poco bíblica en español contemporáneo. Una revisión mínima mejora naturalidad y cercanía al hebreo sin perder claridad.
  glossary_alignment: 'No hay términos del glosario principal en disputa aquí. La decisión relevante es léxica: conservar mejor קרא como «proclamar/llamar» y שָׁלוֹם como «paz», con nota para «términos de paz» u «ofrecer paz». El uso de «ella» para la ciudad es aceptable en español por concordancia gramatical.'
