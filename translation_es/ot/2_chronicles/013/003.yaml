revisions:
- from: Abías se preparó para la batalla con un ejército de cuatrocientos mil hombres escogidos[a], guerreros valientes; y Jeroboam se dispuso para la batalla contra él con ochocientos mil hombres escogidos[b], hombres valientes de guerra.
  to: Abías entró en batalla con un ejército de cuatrocientos mil hombres escogidos[a], guerreros valientes; y Jeroboam se dispuso para la batalla contra él con ochocientos mil hombres escogidos[b], hombres valientes.
  rationale: Se corrige el verbo principal para reflejar que Abías entabló combate, no que solo se preparó. También se suaviza la frase final a un español más natural sin perder la fuerza militar del hebreo ni la nota cultural preservada por el POB inglés.
