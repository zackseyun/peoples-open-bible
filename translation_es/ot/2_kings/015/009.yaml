    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica una alternativa para la expresión relacionada con 'ante los ojos de Yahvé', pero el marcador aparece después de 'lo malo'. Esto incumple la disciplina de notas, porque el marcador debe aparecer en la palabra o frase pertinente.
  - severity: low
    issue: Leve rigidez en 'ante los ojos de Yahvé' dentro del texto principal
    rationale: Aunque es fiel, en español moderno y eclesial suena más natural 'ante Yahvé' en el cuerpo del texto, dejando la imagen más literal para la nota alternativa.
  revised_spanish_text: Hizo lo malo ante Yahvé[a], tal como habían hecho sus padres. No se apartó de los pecados de Jeroboam hijo de Nebat, con los que hizo pecar a Israel.
