translation:
  language: es
  text: Él envió señales y maravillas en medio de ti[a], oh Egipto, contra Faraón[b] y contra todos sus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en medio de ti, oh Egipto». El hebreo dirige la frase a Egipto como una persona, usando un sufijo femenino singular.
    reason: alternative_reading
  - marker: b
    text: O «sobre Faraón y sobre todos sus siervos». La preposición hebrea puede traducirse más literalmente como «sobre», pero aquí probablemente señala el impacto hostil de las plagas.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁלַח
  english_pob_choice: He sent
  chosen_spanish: Él envió
  alternatives_spanish:
  - Él mandó
  - Él despachó
  lexicon: HALOT
  rationale: El qal perfecto de שלח expresa una acción pasada; en español, «envió» conserva el sentido natural y narrativo sin añadir matices no presentes.
- source_word: אֹתוֹת
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - portentos
  lexicon: HALOT
  rationale: «Señales» es un equivalente claro y bíblico para אותות. Mantiene la relación con los actos significativos de Yahvé sin forzar una lectura técnica de «símbolos».
- source_word: מֹפְתִים
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - portentos
  lexicon: HALOT
  rationale: «Maravillas» reproduce bien el par hebreo fijo «señales y maravillas» y preserva el tono de hechos extraordinarios sin restringirlo a una sola categoría interpretativa.
- source_word: בְּתוֹכֵכִי
  english_pob_choice: into your midst, O Egypt
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - dentro de ti
  - en tu interior
  lexicon: HALOT
  rationale: La forma con sufijo femenino singular permite leer a Egipto personificado como «tú». «En medio de ti» conserva la imagen espacial y la personificación explícita del texto.
- source_word: מִצְרָיִם
  english_pob_choice: O Egypt
  chosen_spanish: oh Egipto
  alternatives_spanish:
  - Egipto
  - Egipto, oh
  lexicon: HALOT
  rationale: El vocativo se expresa en español con «oh Egipto» para mantener la dirección retórica del hebreo sin perder la personificación de la nación.
- source_word: בְּפַרְעֹה
  english_pob_choice: against Pharaoh
  chosen_spanish: contra Faraón
  alternatives_spanish:
  - sobre Faraón
  - en Faraón
  lexicon: HALOT
  rationale: Aunque la preposición puede ser literalmente «sobre/en», el contexto de las plagas exige un valor hostil. «Contra» expresa mejor el efecto dirigido y adverso de las señales y maravillas.
- source_word: וּבְכָל עֲבָדָיו
  english_pob_choice: and against all his servants
  chosen_spanish: y contra todos sus siervos
  alternatives_spanish:
  - y contra todos sus servidores
  - y contra todos sus esclavos
  lexicon: HALOT
  rationale: עֲבָדָיו puede abarcar siervos, servidores o esclavos. Se mantiene «siervos» por ser el equivalente español más amplio y tradicionalmente usable en el contexto cortesano de Faraón, sin forzar «esclavos» donde podría sonar demasiado específico.
theological_decisions:
- issue: Dirección del juicio implícito en la preposición
  english_pob_reading: against Pharaoh and against all his servants
  chosen_spanish_reading: contra Faraón y contra todos sus siervos
  alternative_spanish_readings:
  - sobre Faraón y sobre todos sus siervos
  - en Faraón y en todos sus siervos
  rationale: La lectura inglesa destaca que las señales y maravillas tuvieron un efecto hostil. En español, «contra» comunica mejor esa orientación de juicio y resistencia sin borrar la posibilidad literal de la preposición.
  doctrine_reference: Éxodo 7–12; juicio de Yahvé sobre Egipto
- issue: Personificación de Egipto en el sufijo femenino singular
  english_pob_reading: into your midst, O Egypt
  chosen_spanish_reading: en medio de ti, oh Egipto
  alternative_spanish_readings:
  - en medio de Egipto
  - en tu medio, Egipto
  rationale: Se conserva la personificación del país como interlocutor directo. Esto respeta la forma retórica del hebreo y la nota auditada de la POB sobre la dirección directa a Egipto.
  doctrine_reference: Poética hebrea; personificación nacional en los Salmos
translation_notes:
  revision_awareness: Se siguió el consenso del audit trail inglés sin cambios sustantivos; la revisión más reciente indicó que no hacía falta modificar el contenido. La versión española conserva la personificación de Egipto, el paralelismo «señales y maravillas» y el valor hostil de la preposición en la cláusula final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención editorial del proyecto no aplicable explícitamente en este verso, ya que el versículo no contiene el tetragrámaton en la superficie española.
  - Se eligió «siervos» en vez de «esclavos» para no estrechar indebidamente el alcance de עֲבָדָיו en el entorno real de Faraón.
  - Se prefirió «señales y maravillas» para reflejar el binomio hebreo establecido y evitar una paráfrasis interpretativa excesiva.
