base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/012/013.yaml
  text: Then David said to Nathan[a], “I have sinned against Yahweh.” And Nathan said to David, “Yahweh also has taken away your sin[b]; you shall not die.”
  footnotes:
  - marker: a
    text: Or “The LORD has put away your sin.” The Hebrew verb literally means “has caused to pass over,” here in the sense of removing guilt.
    reason: lexical_alternative
  - marker: b
    text: Or “you will not die.” The Hebrew simply says “you shall not die,” without explicitly stating “be put to death,” though the legal context may imply spared capital judgment.
    reason: lexical_alternative
