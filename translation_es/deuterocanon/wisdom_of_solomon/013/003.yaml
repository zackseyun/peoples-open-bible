translation:
  language: es
  text: Si, pues, deleitándose en su belleza, los consideraban dioses, reconozcan cuánto mejor que estos es su[a] Soberano; porque el hacedor de la belleza los creó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su Señor». El griego usa δεσπότης, que subraya autoridad sobre lo creado.
    reason: lexical_alternative
lexical_decisions:
- source_word: καλλονῇ
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - hermosura
  - esplendor
  lexicon: LSJ
  rationale: καλλονή expresa la cualidad de ser bello o atractivo. «Belleza» es la opción más natural en español y conserva el argumento del pasaje, que parte de la apariencia atractiva de lo creado.
- source_word: τερπόμενοι
  english_pob_choice: delighting
  chosen_spanish: deleitándose
  alternatives_spanish:
  - tomando placer
  - gozándose
  lexicon: LSJ
  rationale: El participio indica disfrute o placer continuo. «Deleitándose» preserva ese matiz experiencial sin volver la frase pesada o demasiado explicativa.
- source_word: θεοὺς ὑπελάμβανον
  english_pob_choice: they supposed them to be gods
  chosen_spanish: los consideraban dioses
  alternatives_spanish:
  - suponían que eran dioses
  - los creían dioses
  lexicon: LSJ
  rationale: ὑπολαμβάνω aquí significa suponer o tener por. «Los consideraban dioses» mantiene la idea de un juicio erróneo sin añadir un matiz más formal o doctrinal que el griego no exige.
- source_word: γνωτώσαν
  english_pob_choice: let them know
  chosen_spanish: reconozcan
  alternatives_spanish:
  - que sepan
  - conozcan
  lexicon: LSJ
  rationale: El imperativo pide llegar al conocimiento o reconocimiento de una realidad. «Reconozcan» funciona bien en español y conserva el tono exhortativo del original.
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Señor
  - Maestro
  - Soberano
  lexicon: LSJ
  rationale: δεσπότης expresa autoridad de posesión y dominio sobre lo creado. «Dueño» conserva ese peso lexical mejor que «Señor», que en español tendería a neutralizar la distinción respecto de κύριος. En esta construcción, «su Dueño» comunica la relación de autoridad sobre las criaturas.
- source_word: βελτίων
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - superior
  - mayor
  lexicon: LSJ
  rationale: El comparativo es directo. «Mejor» es simple, claro y reproduce la evaluación comparativa del versículo.
- source_word: γενεσιούργης
  english_pob_choice: maker
  chosen_spanish: hacedor
  alternatives_spanish:
  - creador
  - artífice
  lexicon: LSJ
  rationale: El sustantivo raro denota a quien produce o trae a la existencia. «Hacedor» refleja bien la idea de fabricación/producción sin perder el tono formal del texto, y sigue de cerca la decisión inglesa de «maker».
- source_word: τοῦ κάλλους
  english_pob_choice: of beauty
  chosen_spanish: de la belleza
  alternatives_spanish:
  - de lo bello
  - del esplendor
  lexicon: LSJ
  rationale: 'El genitivo se entiende de manera natural como pertenencia o relación: «de la belleza». Esto mantiene el paralelismo con καλλονῇ al inicio del versículo.'
- source_word: ἔκτισεν
  english_pob_choice: created
  chosen_spanish: los creó
  alternatives_spanish:
  - los hizo
  - los formó
  lexicon: LSJ
  rationale: κτίζω significa crear. «Los creó» preserva la distinción creador-criatura central en el argumento.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - estas cosas
  - aquellos
  lexicon: LSJ
  rationale: El pronombre retoma los objetos bellos de la discusión. «Los» es la referencia más idiomática en español.
theological_decisions:
- issue: Renderización de δεσπότης como título de autoridad sobre lo creado
  english_pob_reading: Master
  chosen_spanish_reading: Dueño
  alternative_spanish_readings:
  - Señor
  - Soberano
  rationale: El texto contrasta cosas creadas con quien tiene autoridad sobre ellas. «Dueño» conserva la fuerza de dominio/posesión de δεσπότης y evita borrar la distinción lexical que la edición inglesa quiso preservar al no usar «Lord».
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve lexical distinctions where context warrants.'
- issue: Fuerza del argumento contra la idolatría
  english_pob_reading: People mistook beautiful created things for gods and should infer the superiority of their Creator/Master.
  chosen_spanish_reading: Las criaturas bellas no son dioses; quien las hizo es superior a ellas y tiene autoridad sobre ellas.
  alternative_spanish_readings:
  - Se adoraban formalmente como dioses
  - los trataban como dioses en culto
  rationale: El griego dice que las suponían dioses; no expande explícitamente el acto a todo el espectro del culto. La traducción conserva la acusación en su forma exacta, sin intensificarla más allá del texto.
  doctrine_reference: 'DOCTRINE.md: Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: Tomé como base la revisión final inglesa que prefirió «maker of beauty» frente a «creator of beauty», y reflejé esa misma decisión en español con «hacedor de la belleza». También mantuve la distinción lexical de δεσπότης, evitando «Señor» en el texto principal para conservar la diferencia con el título divino más común.
  spanish_consistency_notes:
  - Se mantuvo «belleza» para καλλονή y «de la belleza» para τοῦ κάλλους, preservando el paralelismo interno del versículo.
  - Se usó «hacedor» para γενεσιούργης en coherencia con la revisión inglesa final («maker»).
  - Se empleó «los creó» para ἔκτισεν, conservando la relación creador-criatura.
  - La puntuación busca reproducir el encadenamiento condicional y exhortativo del griego sin sobreexplicarlo.
