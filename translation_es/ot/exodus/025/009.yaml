translation:
  language: es
  text: Exactamente conforme a todo lo que te estoy mostrando—el patrón del tabernáculo y el patrón de todos sus objetos—, así lo haréis[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «plan», «modelo» o «diseño» para תַּבְנִית.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «haréis», en plural, dirigiéndose a Moisés junto con los responsables de la obra.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: Exactly according to all that
  chosen_spanish: Exactamente conforme a todo lo que
  alternatives_spanish:
  - Conforme a todo lo que
  - Justo como todo lo que
  lexicon: HALOT
  rationale: La construcción expresa correspondencia precisa; «exactamente conforme a» conserva esa exactitud sin sonar rígida en español.
- source_word: מַרְאֶה
  english_pob_choice: I am showing
  chosen_spanish: te estoy mostrando
  alternatives_spanish:
  - te muestro
  - te hago ver
  lexicon: HALOT
  rationale: El participio tiene fuerza progresiva/presente; «te estoy mostrando» refleja bien el acto revelador en curso.
- source_word: תַּבְנִית
  english_pob_choice: pattern
  chosen_spanish: modelo
  alternatives_spanish:
  - patrón
  - plan
  - diseño
  lexicon: HALOT
  rationale: En español, «modelo» comunica mejor una forma mostrada y reproducible en un contexto constructivo-cultual. «Patrón» se preserva en nota como alternativa válida, pues el término hebreo admite varias correspondencias sin fijar por sí solo la ontología del referente.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la Morada
  - el santuario
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente estable y claro en este contexto de Éxodo, donde el término funciona como nombre técnico del santuario portátil.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its furnishings
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus muebles
  - todos sus enseres
  - todos sus objetos
  lexicon: HALOT
  rationale: כֵּלִים es amplio («vasos, instrumentos, utensilios, implementos»). «Utensilios» mantiene la amplitud funcional sin restringirlo a muebles o recipientes; es más transparente que «furnishings» en español bíblico.
- source_word: וְכֵן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - entonces
  lexicon: HALOT
  rationale: «Así» reproduce la relación consecuente de manera natural en español y conserva el nexo inferencial.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you shall make it
  chosen_spanish: lo haréis
  alternatives_spanish:
  - lo harán
  - haréis eso
  lexicon: HALOT
  rationale: El verbo está en 2ª persona plural. «Lo haréis» respeta el plural y evita introducir un objeto no explicitado por el hebreo; el referente se entiende por el contexto inmediato de la obra del tabernáculo.
theological_decisions:
- issue: Cómo reflejar תַּבְנִית sin resolver su alcance teológico
  english_pob_reading: pattern
  chosen_spanish_reading: modelo
  alternative_spanish_readings:
  - patrón
  - plan
  - diseño
  rationale: El texto afirma que Dios muestra una תַּבְנִית, pero no define aquí si se trata de un arquetipo celestial, un diseño revelado o un modelo visual. «Modelo» preserva la apertura del hebreo y no fuerza una interpretación ontológica más allá del verso.
  doctrine_reference: Translation philosophy §3 (preservar tensiones teológicas documentadas)
- issue: Alcance plural de תַּעֲשׂוּ
  english_pob_reading: Hebrew 'you shall make' is plural, addressing Moses together with those responsible for the work.
  chosen_spanish_reading: lo haréis
  alternative_spanish_readings:
  - lo harás
  - lo harán
  rationale: El plural hebreo puede incluir a Moisés en representación del grupo encargado de la obra. El español plural mantiene esa amplitud colectiva sin individualizar indebidamente la orden.
  doctrine_reference: Notas de auditable grammar en POB
translation_notes:
  revision_awareness: Coincide con la última revisión sin cambios sustantivos; la formulación española se ajusta al audit trail inglés y conserva las mismas decisiones léxicas y gramaticales esenciales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» reservado para el tetragrámaton cuando aparezca; aquí no hay ocurrencia.
  - Se evita «SEÑOR» como sustituto teológico no presente en el hebreo.
  - «Modelo» en el texto principal conserva la tensión documentada en torno a תַּבְנִית, mientras la nota ofrece las alternativas equivalentes.
  - Se respeta el plural verbal con «lo haréis», conforme al dato gramatical auditado.
  - El tono es solemne pero contemporáneo, apto para lectura pública eclesial.
