- from: Pero Yahvé está conmigo como un guerrero poderoso[a]; por tanto, mis perseguidores tropezarán y no prevalecerán. Serán avergonzados en gran manera, porque no han obrado con entendimiento[c][b]; su vergüenza perpetua no será olvidada.
