translation:
  language: es
  text: Porque he aquí, yo levantaré contra ustedes, casa de Israel, declara Yahvé, el Dios de los ejércitos, una nación, y los oprimirán desde Lebo-Hamat[a] hasta el Wadi del Arabá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde la entrada de Hamat». La expresión hebrea puede entenderse como el nombre propio Lebo-Hamat o como una frase que describe un límite geográfico.
    reason: alternative_reading
  - marker: b
    text: O «el torrente del Arabá».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación causal con la denuncia anterior; «porque» conserva el enlace explicativo de forma natural en español.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: he aquí, yo
  alternatives_spanish:
  - mira, yo
  - yo estoy aquí
  lexicon: HALOT
  rationale: La partícula anunciadora requiere una fórmula enfática; «he aquí» preserva el tono profético de atención sin perder naturalidad.
- source_word: מֵקִים
  english_pob_choice: raising up
  chosen_spanish: levanto
  alternatives_spanish:
  - hago surgir
  - levanto contra
  lexicon: HALOT
  rationale: En este contexto hostil, el verbo expresa que Yahvé trae una nación contra Israel. «Levanto» conserva la acción divina y funciona bien con «contra».
- source_word: עֲלֵיכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - sobre ustedes
  - en contra de ustedes
  lexicon: HALOT
  rationale: La preposición tiene fuerza adversativa/militar; «contra» transmite mejor el sentido que «sobre» en español contemporáneo.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel, oh Israel
  - casa de Israel
  lexicon: HALOT
  rationale: Se mantiene la designación profética como vocativo implícito. En español, el vocativo puede quedar sin «oh» para no sonar arcaico.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con el nombre divino según el estándar del proyecto. «Dice» es natural en español y suficiente para el hebreo נְאֻם aquí.
- source_word: אֱלֹהֵי הַצְּבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de las huestes
  - el Dios de los ejércitos celestiales
  lexicon: HALOT
  rationale: «צְבָאוֹת» puede referir tanto ejércitos como huestes celestiales; «ejércitos» es claro y mantiene la amplitud militar/cósmica sin cerrar el sentido.
- source_word: גּוֹי
  english_pob_choice: a nation
  chosen_spanish: una nación
  alternatives_spanish:
  - un pueblo
  - una gente
  lexicon: HALOT
  rationale: El indefinido singular designa una potencia extranjera instrumento de juicio; «nación» es el equivalente más directo y estable.
- source_word: וְלָחֲצוּ
  english_pob_choice: and they will oppress
  chosen_spanish: y los oprimirán
  alternatives_spanish:
  - y los afligirán
  - y los presionarán duramente
  lexicon: HALOT
  rationale: El verbo expresa compresión/opresión sostenida; «oprimir» transmite mejor la dominación política y militar.
- source_word: מִלְּבוֹא חֲמָת
  english_pob_choice: from Lebo-hamath
  chosen_spanish: desde Lebo-Hamat
  alternatives_spanish:
  - desde la entrada de Hamat
  - desde Lebo-Jamat
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado porque la expresión funciona como marcador geográfico conocido. La mayúscula inicial ayuda a tratarlo como nombre propio.
- source_word: נַחַל הָעֲרָבָה
  english_pob_choice: the Wadi of the Arabah
  chosen_spanish: el Wadi del Arabá
  alternatives_spanish:
  - el torrente del Arabá
  - el cauce del Arabá
  lexicon: HALOT
  rationale: נַחַל suele designar un cauce estacional o wadi; se conserva «Wadi» por precisión geográfica. «Arabá» translitera el nombre regional sin explicar en exceso.
theological_decisions:
- issue: Cómo renderizar יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para el tetragrámaton, evitando el ocultamiento mediante «SEÑOR» y manteniendo la forma reverente «Yahvé» en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido de אֱלֹהֵי הַצְּבָאוֹת
  english_pob_reading: the God of hosts
  chosen_spanish_reading: el Dios de los ejércitos
  alternative_spanish_readings:
  - el Dios de las huestes
  - el Dios de los ejércitos celestiales
  rationale: No se reduce el término a solo fuerzas militares terrenales ni se lo espiritualiza por completo; «ejércitos» conserva la amplitud del hebreo y su tono de poder soberano.
  doctrine_reference: 'DOCTRINE.md: Contested terms — צבאות / hosts'
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión final del inglés POB, que mantuvo la lectura geográfica de Lebo-hamath y la opción léxica de Wadi/brook para נַחַל. No se detectaron revisiones adicionales en el pasaje base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme del tetragrámaton, conforme al estándar del proyecto.
  - Se usa «casa de Israel» sin artículo añadido, preservando la vocación profética del hebreo.
  - «Wadi» se conserva como término geográfico técnico; en notas se ofrece la alternativa «torrente» para lectores que prefieran un español más general.
