  source_alignment_summary: 'El borrador español refleja bien la estructura legal del hebreo: «una persona», la infidelidad cultual, el pecado no intencional, «las cosas sagradas de Yahvé», el carnero sin defecto, la valuación en siclos de plata y el «siclo del santuario». Sin embargo, hay un desajuste importante de anclaje de nota: la nota [a] está colocada sobre «Yahvé», pero su contenido explica אָשָׁם, no el nombre divino. Además, conviene ajustar «por el siclo del santuario» a «según el siclo del santuario», que expresa mejor el hebreo normativo בְּשֶׁקֶל en este contexto de estándar de peso.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «Actúa infielmente», «peca inadvertidamente» y «conforme a tu valoración» funcionan bien. El cambio propuesto mejora la claridad referencial de la nota y hace más idiomática la cláusula de medida. El resto del texto es plenamente legible en español eclesial amplio.
  glossary_alignment: Se respeta «Yahvé» para יהוה, «carnero sin defecto» para אַיִל תָּמִים, y se mantiene de forma consistente un equivalente de אָשָׁם como «sacrificio por la culpa», con alternativas preservadas en nota. No hay conflicto con los lineamientos terminológicos del proyecto, salvo la mala ubicación de la nota léxica.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «Yahvé», pero explica אָשָׁם («sacrificio por la culpa»).
    rationale: Esto induce al lector a pensar que la nota trata del nombre divino, cuando en realidad documenta una decisión léxica sobre el término sacrificial. Debe moverse al primer «sacrificio por la culpa» o frase equivalente.
  - severity: medium
