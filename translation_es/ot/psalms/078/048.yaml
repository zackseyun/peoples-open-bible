review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura básica del hebreo: acción de entrega/consignación, dos grupos de animales en paralelismo, y dos agentes destructivos meteorológicos. Sin embargo, la nota al pie está anclada en «granizo», cuando la alternativa léxica documentada corresponde a לָרְשָׁפִים, no a בָּרָד. Además, «relámpagos» es comprensible, pero «rayos» expresa mejor la fuerza destructiva de lightning bolts en español bíblico y evita la posible lectura meramente luminosa de relámpagos.'
  spanish_quality_summary: El texto es natural y legible en español. «Entregó» funciona bien para וַיַּסְגֵּר. «Sus animales / su ganado» mantiene el paralelismo con una distinción aceptable, aunque algo general en el primer miembro. La principal corrección necesaria es mover la nota al término final y ajustar su formulación. También conviene preferir «rayos» sobre «relámpagos» por precisión semántica y fuerza poética.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la fidelidad léxica general. La decisión «entregó» está alineada con el POB inglés. La alternativa documentada para רְשָׁפִים debe conservarse en nota española, pero anclada correctamente en «rayos[a]».
  issues:
  - severity: high
    issue: La nota al pie está anclada en «granizo[a]» pero su contenido explica רְשָׁפִים, no בָּרָד.
    rationale: Esto desaline­a la evidencia fuente y puede inducir al lector a pensar que «granizo» tiene las alternativas «rayos de fuego» o «llamas», lo cual es incorrecto.
  - severity: medium
    issue: «Relámpagos» es menos preciso que «rayos» para traducir «lightning bolts».
    rationale: En español, «relámpago» puede referirse al destello; «rayo» comunica mejor el golpe destructivo y encaja mejor con el contexto de plaga y con la nota «rayos de fuego».
  - severity: low
    issue: «Sus animales» para בְּעִירָם es algo amplio.
    rationale: No es infiel, pero «animales» puede sonar más genérico de lo deseable. Aun así, puede mantenerse porque preserva la distinción con «ganado» y sigue dentro del rango semántico documentado.
  revised_spanish_text: Entregó sus animales al granizo, y su ganado a los rayos[a].
  revised_footnotes:
  - marker: a
    text: 'O: «a los rayos de fuego» o «a las llamas»; el término hebreo puede denotar fuerzas destructivas ardientes o fulgurantes.'
