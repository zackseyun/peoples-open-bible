  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Dios hizo la señal aquella noche; hubo sequedad en el vellón únicamente; y hubo rocío en el entorno. Sin embargo, en la última cláusula se aparta de la decisión auditada del POB inglés al poner «tierra» en el texto principal, cuando la evidencia contextual favorece «suelo» o «terreno» como referencia local de הָאָרֶץ.'
  spanish_quality_summary: El español es claro y digno, pero «sobre toda la tierra» suena más amplio de lo que el contexto inmediato pide y puede sugerir un alcance casi cósmico. También «el vellón solo» es comprensible, pero «solo en el vellón» o «en el vellón solamente» suena más natural en español para expresar exclusividad del lugar afectado.
  glossary_alignment: 'No hay conflicto con terminología de proyecto principal: אֱלֹהִים = «Dios» está bien. La principal desalineación es contextual-lexical: הָאָרֶץ aquí debe seguir la preferencia documentada del POB por un referente local («suelo»/«terreno») en vez de «tierra» en el texto principal, manteniendo «tierra» como alternativa de nota.'
  issues:
  - severity: medium
    issue: «sobre toda la tierra» en el texto principal
    rationale: El hebreo אֶרֶץ puede significar «tierra», pero el propio audit trail documenta que aquí «ground» encaja mejor por el escenario inmediato de la señal de Gedeón. En español, «tierra» es posible, pero debilita esa precisión contextual.
  - severity: low
    issue: Ubicación de la nota en «aquella noche[a]»
    rationale: La nota trata de הָאָרֶץ, no de la frase temporal. El marcador debe anclarse en «suelo» o el sintagma correspondiente para que el lector vea con claridad qué palabra se comenta.
  - severity: low
    issue: «el vellón solo» es menos idiomático
    rationale: Aunque fiel, en español fluye mejor «solo en el vellón» o «en el vellón solamente» para expresar que la sequedad estaba restringida al vellón.
  revised_spanish_text: Y Dios hizo así aquella noche, y hubo sequedad solo en el vellón, y sobre todo el suelo[a] hubo rocío.
  revised_footnotes:
