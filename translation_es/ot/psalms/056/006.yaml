translation:
  language: es
  text: Todo el día tuercen mis palabras; todos sus pensamientos son contra mí para mal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כָּל הַיּוֹם
  english_pob_choice: All day long
  chosen_spanish: Todo el día
  alternatives_spanish:
  - Todo el tiempo
  - Constantemente
  lexicon: HALOT
  rationale: La expresión hebrea indica duración continua durante la jornada. «Todo el día» conserva ese valor durativo con naturalidad en español.
- source_word: דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis palabras
  - mis asuntos
  - mis cosas
  lexicon: HALOT
  rationale: Aunque דָּבָר puede significar ‘palabra’, ‘asunto’ o ‘cosa’, el contexto de habla hostil y distorsión favorece una referencia a lo que dice el salmista. «Mis palabras» mantiene esa referencia de forma clara y natural.
- source_word: יְעַצֵּבוּ
  english_pob_choice: twist
  chosen_spanish: tuercen
  alternatives_spanish:
  - distorsionan
  - dañan
  - afligen
  lexicon: HALOT
  rationale: El verbo piel de עצב es difícil y puede implicar causar dolor, herir o torcer. Dado el complemento «mis palabras», «tuercen» comunica bien la idea de deformar maliciosamente lo dicho, en paralelo con la continuación sobre pensamientos hostiles.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  lexicon: HALOT
  rationale: En este contexto adversativo, «contra mí» expresa mejor la fuerza hostil que una versión más literal como «sobre mí».
- source_word: כָּל מַחְשְׁבֹתָם
  english_pob_choice: all their thoughts
  chosen_spanish: todos sus pensamientos
  alternatives_spanish:
  - todos sus planes
  - todas sus intenciones
  lexicon: HALOT
  rationale: מַחְשָׁבוֹת puede referirse a pensamientos, planes o maquinaciones. «Pensamientos» es la opción más directa, dejando que el contexto de malicia sea aclarado por la frase siguiente.
- source_word: לָרָע
  english_pob_choice: for evil
  chosen_spanish: para mal
  alternatives_spanish:
  - para daño
  - para hacer el mal
  - con mal propósito
  lexicon: HALOT
  rationale: La construcción indica intención dañina o propósito maligno. «Para mal» es breve, formalmente cercana al hebreo y natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: 'El inglés auditado pasó por dos ajustes: primero se aclaró la sintaxis del segundo hemistiquio para que ''their thoughts'' fuera el sujeto de ''are against me for evil''; luego se restauró una correspondencia más cercana al hebreo manteniendo la relación entre ''contra mí'' y ''para mal'' sin añadir estructura explicativa extra. La versión española sigue esa lectura final y evita sobreexplicar.'
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de dos hemistiquios con puntuación media: primero la acción continua sobre las palabras; luego la orientación hostil de los pensamientos.'
  - Se eligió «para mal» en vez de «para el mal» para conservar la tersura poética y el valor adverbial-final del hebreo.
  - No se usó «Cristo», «SEÑOR» ni otras sustituciones teológicas no presentes en el verso.
