translation:
  language: es
  text: Cuando los cielos estén cerrados y no haya lluvia, porque hayan pecado contra ti, y oren hacia este lugar, y confiesen tu nombre, y se aparten de su pecado, porque les respondes[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los humillas’ u ‘los afliges’. El hebreo puede entenderse como ‘humillar/afligir’, y el contexto de la sequía como disciplina favorece esa lectura; otros lo entienden como ‘responder’.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּהֵעָצֵר שָׁמַיִם
  english_pob_choice: When the heavens are shut up
  chosen_spanish: Cuando los cielos estén cerrados
  alternatives_spanish:
  - Cuando el cielo esté cerrado
  - Cuando los cielos sean retenidos
  lexicon: HALOT
  rationale: El infinitivo niphal de עצר con valor temporal pide una construcción circunstancial. ‘Cielos’ conserva el plural hebreo y el lenguaje bíblico. ‘Estén cerrados’ es natural en español para la falta de lluvia y comunica bien la idea de restricción.
- source_word: וְלֹא יִהְיֶה מָטָר
  english_pob_choice: and there is no rain
  chosen_spanish: y no haya lluvia
  alternatives_spanish:
  - y no habrá lluvia
  - y no caiga lluvia
  lexicon: HALOT
  rationale: En español, la subordinada condicional con ‘cuando’ pide subjuntivo. ‘No haya lluvia’ expresa con claridad el resultado de los cielos cerrados sin forzar un futuro innecesario.
- source_word: כִּי יֶחֶטְאוּ לָךְ
  english_pob_choice: because they have sinned against you
  chosen_spanish: porque hayan pecado contra ti
  alternatives_spanish:
  - porque pecaron contra ti
  - porque pequen contra ti
  lexicon: HALOT
  rationale: La preposición לָךְ indica ofensa dirigida a Dios; ‘contra ti’ la preserva de forma natural. ‘Pecar’ corresponde al hebreo חטא en este contexto de transgresión de pacto.
- source_word: וְהִתְפַּלְלוּ אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: and they pray toward this place
  chosen_spanish: y oren hacia este lugar
  alternatives_spanish:
  - y oren a este lugar
  - y oren en dirección a este lugar
  lexicon: HALOT
  rationale: אֶל aquí es direccional, no indica que se ore al lugar como destinatario. ‘Hacia este lugar’ mantiene la orientación hacia el templo y evita una lectura teológicamente engañosa.
- source_word: וְהוֹד֣וּ אֶת שְׁמֶ֔ךָ
  english_pob_choice: and confess your name
  chosen_spanish: y confiesen tu nombre
  alternatives_spanish:
  - y den gracias a tu nombre
  - y alaben tu nombre
  lexicon: HALOT
  rationale: El verbo הודה puede abarcar confesión, alabanza y acción de gracias. En este contexto penitencial, ‘confiesen’ preserva la amplitud de reconocimiento público del nombre de Yahvé sin estrecharlo a una sola idea.
- source_word: וּ/מֵ/חַטָּאתָ֥/ם יְשׁוּב֖וּ/ן
  english_pob_choice: and turn from their sin
  chosen_spanish: y se vuelvan de su pecado
  alternatives_spanish:
  - y se aparten de su pecado
  - y se arrepientan de su pecado
  lexicon: HALOT
  rationale: שׁוּב con מִן expresa volver desde, apartarse de. ‘Se vuelvan de su pecado’ conserva el movimiento verbal sin reemplazarlo por una paráfrasis doctrinal más fuerte.
- source_word: כִּ֥י תַעֲנֵֽ/ם
  english_pob_choice: because you answer them
  chosen_spanish: porque los humilles
  alternatives_spanish:
  - porque los afliges
  - porque les respondes
  lexicon: HALOT
  rationale: La audita del POB registra la tensión entre ‘afligir/humillar’ y ‘responder’. En el marco del pasaje, la disciplina por sequía encaja mejor con ‘humilles’, que mantiene la idea de abatimiento sin resolver artificialmente la ambigüedad textual.
theological_decisions:
- issue: Valor de הוֹדוּ en un contexto de oración penitencial
  english_pob_reading: confess your name
  chosen_spanish_reading: confiesen tu nombre
  alternative_spanish_readings:
  - den gracias a tu nombre
  - alaben tu nombre
  rationale: El hebreo permite un espectro semántico entre confesar, alabar y dar gracias. En una súplica por pecado y sequía, ‘confiesen’ comunica de manera sobria el reconocimiento público del nombre de Dios, preservando la tensión lexical que la tradición de auditoría documenta.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Sentido de תַעֲנֵם en la lógica del castigo del pacto
  english_pob_reading: because you answer them
  chosen_spanish_reading: porque los humilles
  alternative_spanish_readings:
  - porque los afliges
  - porque les respondes
  rationale: Aunque el hilo auditado del inglés ofrece ‘answer them’ como revisión reciente, el contexto inmediato de sequía como disciplina favorece la idea de humillación/aflicción. ‘Humilles’ preserva esa tensión y evita una lectura suavizada que rompa la lógica del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Direccionalidad de la oración hacia el templo
  english_pob_reading: pray toward this place
  chosen_spanish_reading: oren hacia este lugar
  alternative_spanish_readings:
  - oren a este lugar
  - oren en dirección a este lugar
  rationale: La preposición hebrea exige una orientación espacial, no una oración dirigida al lugar mismo. ‘Hacia este lugar’ mantiene la referencia al templo como espacio vinculado al nombre de Yahvé sin introducir una desviación cultual.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el flujo del hebreo y dialoga con el historial auditado en inglés. Se preservan las dos tensiones principales documentadas: הוֹדוּ con su rango entre confesión/alabanza/acción de gracias, y תַעֲנֵם con la oscilación entre humillar/afligir y responder. Se adopta una solución española que no borra esa ambigüedad y que suena publicable en español bíblico contemporáneo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en el texto principal solo cuando el nombre divino aparezca explícitamente; en este versículo no aparece, por lo que no se introduce.
  - ‘Cielos’ conserva el plural hebreo, en lugar de normalizarlo a ‘cielo’.
  - ‘Hacia este lugar’ se eligió para mantener la dirección implícita de אֶל sin convertir el templo en destinatario de la oración.
  - Se mantiene ‘pecado’ en singular colectivo para reflejar el sustantivo hebreo singular con sentido genérico.
