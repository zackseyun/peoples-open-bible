translation:
  language: es
  text: Mi mano halló la riqueza de los pueblos, como quien halla un nido; y como quien recoge huevos abandonados, yo recogí toda la tierra[a], y no hubo nadie que aleteara un ala, ni que abriera la boca, ni que piara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘todo el país’. El hebreo אֶרֶץ puede significar ‘tierra’ o ‘país’ según el contexto; aquí se mantiene ‘toda la tierra’ por la hipérbole universal del discurso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּמְצָא
  english_pob_choice: found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - halló y tomó
  lexicon: HALOT
  rationale: מצא expresa literalmente 'encontrar'; en el contexto de la jactancia imperial, 'halló' conserva la idea de adquisición fácil sin volverla más interpretativa que el original.
- source_word: כַקֵּן
  english_pob_choice: as one finds a nest
  chosen_spanish: como quien halla un nido
  alternatives_spanish:
  - como un nido
  - como quien encuentra un nido
  lexicon: HALOT
  rationale: La comparación se mantiene explícita con 'como quien', para reflejar el movimiento comparativo del hebreo y hacer natural la imagen en español.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi poder
  - mi brazo
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal que expresa agencia y poder personal.
- source_word: לְחֵיל הָעַמִּים
  english_pob_choice: the wealth of the peoples
  chosen_spanish: la riqueza de los pueblos
  alternatives_spanish:
  - las riquezas de las naciones
  - los recursos de los pueblos
  - el ejército de los pueblos
  lexicon: HALOT
  rationale: חַיִל puede ser riqueza, recursos, fuerza o ejército. El contexto del nido/huevos y del recoger favorece bienes o botín; 'riqueza' comunica esa facilidad de apropiación sin forzar un sentido militar.
- source_word: וְכֶאֱסֹף בֵּיצִים עֲזֻבוֹת
  english_pob_choice: and as one gathers abandoned eggs
  chosen_spanish: como quien recoge huevos abandonados
  alternatives_spanish:
  - como quien recoge huevos dejados atrás
  - y como recoger huevos abandonados
  lexicon: HALOT
  rationale: עֲזֻבוֹת significa dejados, abandonados o desamparados. 'Huevos abandonados' conserva la imagen de indefensión y facilidad de toma.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - todo el país
  - toda la tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra o país; aquí la hipérbole del discurso favorece 'toda la tierra' para reproducir el alcance universal del hebreo.
- source_word: אָסַפְתִּי
  english_pob_choice: I gathered
  chosen_spanish: yo recogí
  alternatives_spanish:
  - yo junté
  - yo reuní
  lexicon: HALOT
  rationale: אסף expresa reunir o recoger. 'Recogí' mantiene la correspondencia con los huevos y la idea de acumular botín.
- source_word: וְלֹא הָיָה נֹדֵד כָּנָף
  english_pob_choice: there was none that fluttered a wing
  chosen_spanish: no hubo nadie que aleteara un ala
  alternatives_spanish:
  - no hubo quien moviera un ala
  - nadie batió un ala
  lexicon: HALOT
  rationale: נֹדֵד transmite moverse de un lado a otro o agitarse; con 'ala' en el contexto aviario, 'aletear' expresa bien la mínima resistencia descrita.
- source_word: וּפֹצֶה פֶה
  english_pob_choice: or opened a mouth
  chosen_spanish: ni que abriera la boca
  alternatives_spanish:
  - ni que separara la boca
  - ni que protestara
  lexicon: HALOT
  rationale: La expresión es literal ('abrir la boca'); se mantiene así para no explicitar verbalmente una protesta que el hebreo no dice directamente.
- source_word: וּמְצַפְצֵף
  english_pob_choice: or chirped
  chosen_spanish: ni que piar
  alternatives_spanish:
  - ni que chirriara
  - ni que gorjeara
  lexicon: HALOT
  rationale: El verbo alude al sonido de un ave; 'piar' es una opción natural y breve en español, conservando la imaginería de nido y polluelos.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la auditoría inglesa y su alta concordancia con el hebreo: mantener la metáfora de adquisición fácil (nido/huevos), el alcance hiperbólico de ‘toda la tierra’ y el encadenamiento de negaciones sobre la ausencia de resistencia. No se adoptó una traducción más militar de חַיִל porque el contexto inmediato favorece riqueza/botín.'
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de tres miembros en la cláusula final: aletear un ala / abrir la boca / piar.'
  - Se usó 'tierra' de manera universal, coherente con el uso hiperbólico del hebreo y con el inglés POB.
  - Se evitó 'SEÑOR' u otras equivalencias no pertinentes, porque el versículo no contiene el nombre divino ni κύριος.
