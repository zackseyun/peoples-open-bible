translation:
  language: es
  text: 'Pero ellos se apartaron de él[a], diciendo: «Ciertamente no podemos hacerlo. Más bien, salvemos por ahora nuestras propias vidas[b]. Volvamos con nuestros hermanos y peleemos contra ellos, porque somos pocos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «rechazaron su propuesta», porque la expresión griega puede implicar negarse a seguir su consejo más que apartarse sólo físicamente.
    reason: lexical_alternative
  - marker: b
    text: «Vidas» traduce aquí el griego psychas, un modismo común para preservar la vida en peligro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψαν αὐτόν
  english_pob_choice: they turned back from him
  chosen_spanish: se apartaron de él
  alternatives_spanish:
  - volvieron la espalda a él
  - rechazaron su propuesta
  lexicon: LSJ
  rationale: El griego puede expresar un apartarse físico o un rechazo de la propuesta. «Se apartaron de él» conserva la relación personal sin fijar de más una interpretación jurídica o formal.
- source_word: Οὐ μὴ δυνώμεθα
  english_pob_choice: We certainly cannot do it
  chosen_spanish: No podemos ciertamente hacerlo
  alternatives_spanish:
  - No podemos hacerlo de ninguna manera
  - Ciertamente no podemos
  lexicon: BDAG
  rationale: La combinación οὐ μή con el subjuntivo transmite negación enfática. En español, «No podemos ciertamente hacerlo» conserva la fuerza sin sonar artificial.
- source_word: σώσωμεν τὰς ἑαυτῶν ψυχὰς
  english_pob_choice: let us save our own lives
  chosen_spanish: salvemos nuestras propias vidas
  alternatives_spanish:
  - salvemos nuestras almas
  - preservemos nuestras vidas
  lexicon: BDAG
  rationale: En este contexto militar, ψυχή se refiere a la vida amenazada, no a «alma» en sentido teológico. Por eso se mantiene «vidas».
- source_word: τὸ νῦν
  english_pob_choice: for now
  chosen_spanish: por ahora
  alternatives_spanish:
  - en este momento
  - por el momento
  lexicon: LSJ
  rationale: La frase marca una acción inmediata y provisional. «Por ahora» es natural en español y conserva ese valor temporal.
- source_word: ἐπιστρέψωμεν
  english_pob_choice: let us return
  chosen_spanish: volvamos
  alternatives_spanish:
  - volvamos atrás
  - regresemos
  lexicon: BDAG
  rationale: El contexto ya menciona reunirse con los hermanos; «volvamos» expresa retorno de manera idiomática y breve.
- source_word: μετὰ τῶν ἀδελφῶν ἡμῶν
  english_pob_choice: with our brothers
  chosen_spanish: con nuestros hermanos
  alternatives_spanish:
  - junto con nuestros hermanos
  - a nuestros hermanos
  lexicon: BDAG
  rationale: μετά con genitivo significa acompañamiento. Se conserva «hermanos» porque el texto griego es masculino plural y el contexto apunta a compañeros de guerra/familia.
- source_word: πολεμήσωμεν πρὸς αὐτούς
  english_pob_choice: let us fight against them
  chosen_spanish: peleemos contra ellos
  alternatives_spanish:
  - hagamos guerra contra ellos
  - peleemos con ellos
  lexicon: LSJ
  rationale: La construcción señala combate dirigido contra un enemigo. «Peleemos contra ellos» comunica con claridad el sentido militar.
- source_word: ἡμεῖς δὲ ὀλίγοι
  english_pob_choice: for we are few
  chosen_spanish: porque somos pocos
  alternatives_spanish:
  - pues somos pocos
  - pero somos pocos
  lexicon: BDAG
  rationale: La cláusula explica la retirada propuesta. «Porque somos pocos» reproduce mejor en español la fuerza causal que la simple adversación.
theological_decisions:
- issue: Renderización de ψυχή en contexto de combate
  english_pob_reading: lives
  chosen_spanish_reading: vidas
  alternative_spanish_readings:
  - almas
  - seres
  rationale: La escena trata de supervivencia táctica inmediata; «vidas» evita introducir una lectura doctrinal no presente en el pasaje.
  doctrine_reference: Translation philosophy §1, §6
- issue: Mantenimiento de ἀδελφοί como referencia masculina plural
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - compatriotas
  - parientes
  rationale: El griego usa un plural masculino explícito. Se mantiene «hermanos» para respetar la forma y la posible referencia a camaradas israelitas.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al preferir un verbo que refleje mejor ἀπέστρεψαν y al expresar la última cláusula como explicación causal natural en español. También conserva la distinción contextual de ψυχή como «vida» y no como «alma» en sentido teológico.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Cristo» fuera de este versículo, sin necesidad de terminología teológica adicional.
  - «Peleemos contra ellos» conserva el matiz bélico directo del griego sin añadir intensificación no atestiguada.
  - La puntuación busca ser publicable en español bíblico moderno, manteniendo el orden de las cláusulas del original.
