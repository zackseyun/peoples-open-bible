    text: O «la observa / la inspecciona». El hebreo usa un verbo de ver en un contexto técnico de diagnóstico sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O «lo pondrá en cuarentena por siete días». El verbo hebreo expresa confinamiento temporal para observación.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «está oscura» por «está tenue» para reflejar mejor כֵהָה como apariencia atenuada o apagada, no como color oscuro. También se ajusta el conector a «y está tenue» para una coordinación más natural y fiel al hebreo.
