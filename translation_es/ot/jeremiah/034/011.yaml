translation:
  language: es
  text: Pero después volvieron atrás y tomaron de nuevo a los esclavos varones y a las esclavas que habían dejado libres[a], y los volvieron a someter como esclavos y esclavas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los esclavizaron como esclavos y esclavas». El hebreo puede expresarse de forma más compacta, pero la redacción principal hace explícita la fuerza coercitiva del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשׁוּבוּ
  english_pob_choice: they turned back
  chosen_spanish: volvieron atrás
  alternatives_spanish:
  - regresaron
  - se dieron vuelta
  lexicon: HALOT / שוב
  rationale: El verbo implica una reversión de rumbo o decisión después de haber actuado antes; «volvieron atrás» conserva bien esa inversión.
- source_word: אַחֲרֵי כֵן
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - después de eso
  - más tarde
  lexicon: HALOT / אחר כן
  rationale: Marca simple sucesión temporal y suena natural en español, sin perder el valor de posterioridad del hebreo.
- source_word: וַיָּשִׁבוּ
  english_pob_choice: took back
  chosen_spanish: tomaron de nuevo
  alternatives_spanish:
  - trajeron de vuelta
  - hicieron volver
  lexicon: HALOT / שוב (Hiphil)
  rationale: El causativo expresa que volvieron a poner a esas personas bajo su control tras haberlas liberado; «tomaron de nuevo» reproduce la reiteración del acto sin alejarse del contexto.
- source_word: הָעֲבָדִים
  english_pob_choice: the male slaves
  chosen_spanish: a los esclavos varones
  alternatives_spanish:
  - a los esclavos
  - a los siervos varones
  lexicon: HALOT / עבד
  rationale: En este contexto el vínculo forzado es saliente; «esclavos» preserva esa fuerza. Mantengo la distinción de género por la pareja con שפחות.
- source_word: הַשְּׁפָחוֹת
  english_pob_choice: the female slaves
  chosen_spanish: a las esclavas
  alternatives_spanish:
  - a las esclavas mujeres
  - a las siervas
  lexicon: HALOT / שפחה
  rationale: El término corresponde a mujeres en condición de esclavitud; «esclavas» es claro y coherente con el par masculino/femenino.
- source_word: שִׁלְּחוּ חָפְשִׁים
  english_pob_choice: had set free
  chosen_spanish: habían dejado libres
  alternatives_spanish:
  - habían liberado
  - las habían soltado libres
  lexicon: HALOT / שלח + חפשי
  rationale: La expresión idiomática significa liberar de la servidumbre; «dejar libres» refleja bien el resultado sin cargar el texto de explicación adicional.
- source_word: וַיִּכְבְּשׁוּם
  english_pob_choice: they subjugated them
  chosen_spanish: los sometieron
  alternatives_spanish:
  - los subyugaron
  - los esclavizaron
  lexicon: HALOT / כבש
  rationale: El verbo denota someter o poner bajo dominio; en este contexto se trata de un sometimiento coercitivo que resulta en esclavitud. «Los sometieron» conserva el núcleo semántico sin repetir en exceso «esclavos».
- source_word: לַעֲבָדִים וְלִשְׁפָחוֹת
  english_pob_choice: as male and female slaves
  chosen_spanish: como esclavos varones y esclavas
  alternatives_spanish:
  - como esclavos y esclavas
  - para esclavos varones y esclavas
  lexicon: HALOT / עבד, שפחה
  rationale: El lamed aquí marca el estado o condición resultante; «como» expresa bien ese cambio de estatus. Conservo la asimetría de género del hebreo en español de forma legible.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el último estado revisado del audit trail inglés, pero vuelve al verbo más natural «tomaron de nuevo» para el causativo de שוב y mantiene «sometieron» para כבש, evitando una expansión interpretativa innecesaria. También conserva la distinción masculina/femenina del par hebreo עבדים/שפחות.
  spanish_consistency_notes:
  - Se usa «esclavos/esclavas» para עבדים/שפחות en coherencia con el valor forzado del contexto, no «siervos».
  - «Yahvé» no aparece en este verso; no se requiere decisión sobre el nombre divino.
  - La nota al pie preserva una alternativa lexical equivalente sin introducir variantes textuales no atestiguadas.
