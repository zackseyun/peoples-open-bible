translation:
  language: es
  text: 'Los hijos de Judá: Er y Onán[a]. Pero Er y Onán murieron en la tierra de Canaán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Er y Onán murieron en la tierra de Canaán». El hebreo permite una coordinación simple con «y»; «pero» en el texto principal refleja mejor el giro discursivo que separa la lista de nombres de la nota sobre su muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos varones de
  lexicon: HALOT
  rationale: En una lista genealógica, el hebreo constructo plural de בֵּן expresa filiación masculina de la línea familiar. En español, 'hijos de' es natural y fiel; 'descendientes de' ampliaría demasiado el alcance, y 'hijos varones de' suena forzado.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio bíblico; la forma española establecida y reverente es 'Judá'.
- source_word: עֵר
  english_pob_choice: Er
  chosen_spanish: Er
  alternatives_spanish:
  - Ér
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración habitual sin adaptación gráfica innecesaria.
- source_word: וְ/אוֹנָן
  english_pob_choice: and Onan
  chosen_spanish: y Onán
  alternatives_spanish:
  - e Onán
  lexicon: HALOT
  rationale: La coordinación simple reproduce bien la lista nominal. Aunque 'e' sería posible ante vocal, el uso de 'y' es plenamente natural aquí y evita una oscilación estilística no requerida por el hebreo.
- source_word: וַ/יָּמָת
  english_pob_choice: But ... died
  chosen_spanish: Pero ... murieron
  alternatives_spanish:
  - Y ... murieron
  - Entonces ... murieron
  lexicon: HALOT
  rationale: 'El wayyiqtol narra un hecho pasado; en español ''murieron'' es el equivalente directo. ''Pero'' refleja la fuerza discursiva contrastiva que el inglés POB documentó: no es solo adición, sino una observación que interrumpe la simple lista genealógica para notar la muerte de ambos.'
- source_word: בְּ/אֶרֶץ
  english_pob_choice: in the land of
  chosen_spanish: en la tierra de
  alternatives_spanish:
  - en el país de
  - en la tierra
  lexicon: HALOT
  rationale: '''Eretz'' en este contexto geográfico se traduce naturalmente como ''tierra''. ''País'' es menos bíblico en español y ''en la tierra'' quedaría incompleto frente al complemento.'
- source_word: כְּנָעַן
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - Canaan
  lexicon: HALOT
  rationale: Nombre propio tradicional en español bíblico, con tilde por la acentuación española.
translation_notes:
  revision_awareness: La revisión auditada en inglés no introdujo cambios; el texto base mantiene acuerdo alto y no requiere corrección adicional. La versión española sigue esa lectura estable, trasladando únicamente la matiz contrastivo documentado para וַיָּמָת con 'Pero'.
  spanish_consistency_notes:
  - Se conserva el nombre divino/teológico no pertinente aquí sin intervención.
  - Se usa puntuación bíblica natural en español con dos puntos tras la lista inicial y punto final tras la segunda cláusula.
  - Se mantiene la coherencia onomástica con la forma española bíblica 'Judá' y la acentuación 'Canaán'.
