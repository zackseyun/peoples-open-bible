translation:
  language: es
  text: Hizo cortinas de pelo de cabra para una tienda de campaña sobre el tabernáculo[a]; hizo once cortinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «cortinas de cabras», si se deja implícito el material; el contexto de los textiles del tabernáculo favorece «de pelo de cabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ / עָשָׂה
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - confeccionó
  - hizo
  lexicon: HALOT
  rationale: עשה es el verbo común ‘hacer’. En español, «hizo» reproduce de manera directa y natural la acción de fabricación y mantiene el paralelismo del hebreo repetido.
- source_word: יְרִיעֹת
  english_pob_choice: curtains
  chosen_spanish: cortinas
  alternatives_spanish:
  - cortinas
  - lienzos
  - paneles
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, יְרִיעָה se refiere a grandes paños o coberturas textiles. «Cortinas» comunica bien esa función sin volverse demasiado técnico o ambiguo.
- source_word: עִזִּים
  english_pob_choice: of goats’ hair
  chosen_spanish: de pelo de cabra
  alternatives_spanish:
  - de lana de cabra
  - de pelo de cabra
  - de cabras
  lexicon: HALOT
  rationale: La expresión apunta al material textil derivado de las cabras. «De pelo de cabra» preserva la referencia material que el contexto sugiere, evitando leer simplemente «de cabras» como si fueran los animales mismos.
- source_word: לְאֹהֶל
  english_pob_choice: for a tent
  chosen_spanish: para una tienda
  alternatives_spanish:
  - para una tienda
  - para el tent de reunión
  - como tienda
  lexicon: HALOT
  rationale: 'El ל expresa finalidad: las cortinas sirven como cobertura o tienda. En español, «tienda» comunica de forma natural la estructura de lona/cobertura, y evita un calco pesado. Se conserva la función, no un nombre técnico añadido.'
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: עַל marca colocación superior. «Sobre» es la preposición más natural en español y conserva la relación espacial entre la cubierta y el tabernáculo.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - el tabernáculo
  - la morada
  - el santuario
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término técnico de Éxodo para la estructura sagrada. «Tabernáculo» es el equivalente español estándar y preciso para este contexto.
- source_word: עַשְׁתֵּי עֶשְׂרֵה
  english_pob_choice: eleven
  chosen_spanish: once
  alternatives_spanish:
  - once
  lexicon: HALOT
  rationale: El numeral compuesto significa simplemente «once». No requiere expansión adicional en español.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: —
  alternatives_spanish:
  - los
  - las
  - —
  lexicon: HALOT
  rationale: El sufijo pronominal remite a las cortinas, pero en español puede quedar incorporado de forma natural en la cláusula final («hizo once cortinas») sin repetir un objeto expreso.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide con el audit trail inglés en los elementos léxicos principales: hacer, cortinas, material caprino, finalidad para una tienda, colocación sobre el tabernáculo y el número once. No hay revisiones aplicadas en el expediente inglés, y el pasaje muestra alto acuerdo entre los controles de calidad.'
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» para מִשְׁכָּן según el uso técnico del pasaje.
  - «Cortinas» se usa de manera consistente para יְרִיעֹת en este contexto de textiles sagrados.
  - «Pelo de cabra» preserva la tensión lexical del hebreo y la nota explica la alternativa más abreviada.
  - El número se expresa como «once» sin ampliación, conforme al hebreo y al audit trail inglés.
