base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/006/018.yaml
  text: Then the demon will smell it and flee[a], and it will never return forever. But when you go in to her, rise, both of you, and cry out to the merciful God, and he will save you and have mercy on you. Do not fear, because she had been prepared for you from eternity, and you will save her, and she will go with you, and I suppose that you will have children by her. And when Tobias heard these things, he kissed her[d][c][b], and his soul was bound to her very strongly.
  footnotes:
  - marker: a
    text: Or, 'it will not return for ever and ever.' The Greek expression is an emphatic idiom for permanent non-return.
    reason: lexical_alternative
  - marker: b
    text: '''Go in to her'' is a marital idiom here, referring to approaching Sarah as husband to wife.'
    reason: cultural_note
  - marker: c
    text: Or, 'from of old' or 'from long ago.' The Greek can denote remote antiquity as well as an eternal horizon.
    reason: alternative_reading
  - marker: d
    text: '''His soul was bound to her'' is a vivid idiom for deep attachment, not merely momentary affection.'
    reason: lexical_alternative
