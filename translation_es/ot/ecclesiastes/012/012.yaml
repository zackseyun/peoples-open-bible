translation:
  language: es
  text: 'Y más allá de estos[a], hijo mío, ten presente esta advertencia: hacer muchos libros no tiene fin, y mucho estudio es fatiga de la carne.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y mucha lectura» o «y mucha devoción»; el término hebreo traducido aquí como «estudio» es poco común y puede referirse de manera más amplia a la absorción en libros o palabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹתֵר מֵהֵמָּה
  english_pob_choice: And beyond these
  chosen_spanish: Y más allá de estas cosas
  alternatives_spanish:
  - Y más allá de ellos
  - Y más que estas cosas
  lexicon: HALOT
  rationale: La expresión introduce una advertencia que enlaza con las palabras previas. «Más allá de estas cosas» conserva el sentido comparativo y exhortativo, y «cosas» hace más natural el referente en español sin perder la conexión textual.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: El hebreo es una apelación afectuosa y directa. «Hijo mío» mantiene el valor vocativo natural en español y conserva el tono pastoral del original.
- source_word: הִזָּהֵר
  english_pob_choice: be warned
  chosen_spanish: sé advertido
  alternatives_spanish:
  - ten cuidado
  - advierte
  lexicon: HALOT
  rationale: El imperativo reflexivo/pasivo pide recibir una advertencia. «Sé advertido» conserva la fuerza exhortativa y el matiz de advertencia formal sin volverse abrupto.
- source_word: עֲשׂוֹת סְפָרִים הַרְבֵּה
  english_pob_choice: of making many books
  chosen_spanish: hacer muchos libros
  alternatives_spanish:
  - el hacer muchos libros
  - de hacer muchos libros
  lexicon: HALOT
  rationale: El infinitivo constructo con objeto se adapta en español a una frase verbal directa. «Hacer muchos libros» es natural y preserva la imagen de producción abundante de escritos.
- source_word: אֵין קֵץ
  english_pob_choice: there is no end
  chosen_spanish: no tiene fin
  alternatives_spanish:
  - no hay fin
  - no tiene término
  lexicon: HALOT
  rationale: La negación existencial se vierte con una expresión idiomática equivalente. «No tiene fin» suena claro y fluido en español, manteniendo la idea de inagotabilidad.
- source_word: וְלַהַג הַרְבֵּה
  english_pob_choice: and much study
  chosen_spanish: y mucho estudio
  alternatives_spanish:
  - y mucha lectura
  - y mucha devoción
  lexicon: HALOT
  rationale: Se conserva la decisión del POB inglés de usar «estudio» como equivalente principal, dado que el término hebreo es raro y puede abarcar absorción en libros o palabras. En español, «estudio» es comprensible y respeta la ambigüedad documentada.
- source_word: יְגִעַת בָּשָׂר
  english_pob_choice: is a weariness of the flesh
  chosen_spanish: es fatiga de la carne
  alternatives_spanish:
  - es cansancio del cuerpo
  - es una fatiga del cuerpo
  lexicon: HALOT
  rationale: Se conserva «carne» para reflejar literalmente בָּשָׂר, como hizo el POB inglés, porque aquí el sentido es corporal y no teológico. «Fatiga de la carne» mantiene la imagen hebrea con español digno y bíblico.
translation_notes:
  revision_awareness: El pasaje coincide con el texto auditado de la versión inglesa POB; no se registran revisiones posteriores que alteren la puntuación, el sentido o las decisiones léxicas principales. Se ha mantenido la misma ambigüedad documentada para לַהַג mediante nota al pie.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se mantiene «carne» para בָּשָׂר según el patrón POB cuando el contexto es físico.
  - «Hijo mío» conserva el tono vocativo y la relación discursiva del hebreo.
  - La nota al pie se ancla en «estudio» porque allí recae la alternativa semántica principal.
