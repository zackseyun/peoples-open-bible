translation:
  language: es
  text: 'Les preguntó por su bienestar[a] y dijo: «¿Está bien su padre anciano,[b] de quien hablaron? ¿Todavía vive?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les preguntó acerca de su bienestar». El hebreo usa el modismo de שָׁלוֹם con el sentido de bienestar o buen estado.
    reason: lexical_alternative
  - marker: b
    text: O «su anciano padre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַ֤ל
  english_pob_choice: He asked
  chosen_spanish: les preguntó
  alternatives_spanish:
  - les hizo una pregunta
  - les inquirió
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta directa; en español, "les preguntó" conserva la acción interrogativa de manera natural y fiel.
- source_word: לְשָׁלוֹם
  english_pob_choice: about their welfare
  chosen_spanish: por su bienestar
  alternatives_spanish:
  - por su bienestar y paz
  - acerca de su bienestar
  lexicon: HALOT
  rationale: שָׁלוֹם aquí expresa bienestar, no solo ausencia de conflicto. "Por su bienestar" comunica bien el giro idiomático en español sin perder la amplitud del término.
- source_word: הֲשָׁלוֹם
  english_pob_choice: well
  chosen_spanish: ¿Está bien?
  alternatives_spanish:
  - ¿se encuentra bien?
  - ¿vive bien?
  lexicon: HALOT
  rationale: La repetición interrogativa de שָׁלוֹם pide saber si la persona está en buen estado. "¿Está bien?" es la forma más clara y natural en español.
- source_word: אֲבִיכֶם הַזָּקֵן
  english_pob_choice: your aged father
  chosen_spanish: su padre, el anciano
  alternatives_spanish:
  - su padre, el viejo
  - su padre, el de edad avanzada
  lexicon: HALOT
  rationale: El hebreo literalmente dice "su padre, el anciano/vejez". En español, "el anciano" mantiene la referencia a la edad con un registro respetuoso y claro.
- source_word: אֲשֶׁר אֲמַרְתֶּם
  english_pob_choice: of whom you spoke
  chosen_spanish: de quien hablaron
  alternatives_spanish:
  - de quien mencionaron
  - que mencionaron
  lexicon: HALOT
  rationale: La cláusula relativa alude al padre previamente mencionado por los hermanos. "De quien hablaron" refleja bien el hebreo y suena natural en español.
- source_word: הַעוֹדֶנּוּ
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - sigue
  lexicon: HALOT
  rationale: La idea de continuidad se expresa en español de forma directa con "todavía".
- source_word: חָי
  english_pob_choice: alive
  chosen_spanish: vive
  alternatives_spanish:
  - está vivo
  - sigue con vida
  lexicon: HALOT
  rationale: En esta pregunta, el hebreo usa "vivo/alive". "Vive" es una manera breve y natural de expresar esa condición en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y toma como guía el audit trail inglés: לְשָׁלוֹם se entiende como un saludo/inquietud por el bienestar, el relativo אֲשֶׁר אֲמַרְתֶּם se refiere al padre ya mencionado, y הַעוֹדֶנּוּ חָי se vierte con una pregunta natural sobre si todavía vive. Se evita una calca rígida de ''paz'' en la pregunta principal porque el español requiere una expresión idiomática de bienestar.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - Se usa 'anciano' para הַזָּקֵן con un registro respetuoso, evitando 'viejo' por posible aspereza.
  - '''Bienestar'' en la nota conserva la amplitud semántica de שָׁלוֹם sin reducirlo a salud física.'
