base_translation:
  language: en
  yaml_path: translation/ot/psalms/028/001.yaml
  text: Of David[a]. To you, O Yahweh, I call; my rock, do not be deaf to me[c][b], lest you be silent to me and I become like those who go down to the pit.
  footnotes:
  - marker: a
    text: Or, 'do not be silent toward me.' The first verb may overlap with the next clause's idea of silence; the main text preserves a distinction between not hearing and not answering.
    reason: lexical_alternative
  - marker: b
    text: '''The pit'' can refer to the grave or the realm of the dead.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lest, if you are silent to me,'.
    reason: previous_rendering
