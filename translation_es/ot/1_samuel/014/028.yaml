translation:
  language: es
  text: 'Entonces respondió uno del pueblo y dijo: «Tu padre hizo jurar estrictamente al pueblo, diciendo: “Maldito el hombre que coma pan[a] hoy”». Y el pueblo estaba desfallecido[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «pan»; aquí se usa en sentido más amplio de alimento o comida en general.
    reason: lexical_alternative
  - marker: b
    text: O «estaba agotado» / «se había debilitado».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El verbo narrativo de réplica admite «respondió» en español como equivalente natural de la fórmula de diálogo hebrea, manteniendo el tono directo sin añadir matiz interpretativo.
- source_word: אִישׁ מֵהָעָם
  english_pob_choice: one of the people
  chosen_spanish: uno de los del pueblo
  alternatives_spanish:
  - un hombre del pueblo
  - alguien del pueblo
  lexicon: HALOT
  rationale: La frase hebrea señala a un individuo indeterminado dentro del grupo. «Uno de los del pueblo» conserva esa indefinición y el valor colectivo de הָעָם sin volverlo militarista de más.
- source_word: הַשְׁבֵּעַ הִשְׁבִּיעַ
  english_pob_choice: strictly put ... under oath
  chosen_spanish: impuso ... un juramento estrictísimo
  alternatives_spanish:
  - lo hizo jurar con severidad
  - obligó ... bajo juramento
  - lo vinculó por juramento con gran severidad
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + verbo finito intensifica la acción. En español, «impuso... un juramento estrictísimo» intenta preservar esa fuerza enfática sin sonar arcaico ni perder el componente causativo.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu papá
  lexicon: HALOT
  rationale: Es la referencia directa a Saúl en discurso a Jonatán; «tu padre» es la equivalencia transparente y formalmente adecuada.
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Cursado
  - Bajo maldición
  lexicon: HALOT
  rationale: La fórmula de maldición judicial se expresa de forma natural en español con «maldito», que conserva el peso solemne del hebreo sin suavizarlo a un mero desagrado.
- source_word: הָאִישׁ אֲשֶׁר יֹאכַל
  english_pob_choice: the man who eats
  chosen_spanish: el hombre que coma
  alternatives_spanish:
  - la persona que coma
  - quien coma
  lexicon: HALOT
  rationale: Se mantiene el singular masculino representativo del hebreo. El subjuntivo en español («coma») refleja adecuadamente la cláusula relativa de carácter prospectivo/prohibitivo.
- source_word: לֶחֶם
  english_pob_choice: food
  chosen_spanish: pan[a]
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Aunque el contexto amplía el sentido a alimento en general, el término básico hebreo es «pan». Se conserva la literalidad en el texto y se señala la amplitud semántica en nota.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Equivalente directo y natural en español contemporáneo.
- source_word: וַיָּעַף
  english_pob_choice: were faint
  chosen_spanish: estaba cansado
  alternatives_spanish:
  - estaba agotado
  - se desmayó
  - quedó rendido
  lexicon: HALOT
  rationale: El verbo admite un campo semántico de fatiga, desfallecimiento o agotamiento. «Estaba cansado» es la opción más sobria y naturalmente comprensible en español; la nota preserva la alternativa de mayor intensidad o el matiz de desfallecimiento.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los hombres
  lexicon: HALOT
  rationale: «El pueblo» conserva la referencia colectiva del hebreo y funciona bien en el contexto narrativo de la tropa/fuerza reunida.
theological_decisions:
- issue: Intensificación del juramento
  english_pob_reading: strictly put ... under oath
  chosen_spanish_reading: impuso al pueblo un juramento estrictísimo
  alternative_spanish_readings:
  - obligó al pueblo bajo juramento
  - conjuró al pueblo con severidad
  rationale: 'No hay una disputa doctrinal, pero sí una decisión de fuerza retórica: el hebreo intensifica la acción de jurar. En español se conserva esa intensidad para no debilitar la responsabilidad impuesta por Saúl en la narración.'
  doctrine_reference: Narrative force / oath language
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el audit trail inglés. Se siguió la lectura principal sin cambios de sentido, pero se resolvieron dos puntos de español: (1) לֶחֶם se dejó como «pan» por literalidad hebrea, marcando la ampliación semántica en nota; (2) וַיָּעַף se tradujo con un término de fatiga más general («estaba cansado») para un español natural, manteniendo en nota las alternativas de mayor intensidad.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto no contiene el Tetragrámaton ni una referencia divina explícita.
  - Se prefirió «el pueblo» para הָעָם por consistencia con el registro narrativo y la terminología POB.
  - Se conservó el tono solemne de la maldición con «Maldito» en lugar de fórmulas eclesiásticas más tradicionales que suavizarían el hebreo.
