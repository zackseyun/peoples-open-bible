translation:
  language: es
  text: Ha edificado contra mí y me ha rodeado de amargura y aflicción[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘veneno y aflicción’; רֹאשׁ puede denotar una sustancia venenosa o amarga, tradicionalmente también traducida ‘hiel’.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘Ha edificado contra mí’; la expresión probablemente evoca la imagen de un sitio militar.
    reason: cultural_note
lexical_decisions:
- source_word: בָּנָה
  english_pob_choice: has built against
  chosen_spanish: ha construido contra
  alternatives_spanish:
  - ha edificado contra
  - ha levantado contra
  - ha cercado
  lexicon: HALOT
  rationale: Conserva la metáfora literal de ‘construir’ con fuerza hostil, sin convertirla directamente en una explicación interpretativa. ‘Construido contra’ refleja bien el adversativo de עָלַי y mantiene la imagen de asedio documentada en el audit trail.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - encima de mí
  lexicon: HALOT
  rationale: En español, ‘contra mí’ expresa con naturalidad la fuerza hostil del preposición en este contexto. ‘Sobre mí’ o ‘encima de mí’ sonarían menos claros y podrían debilitar el matiz adversativo.
- source_word: וַיַּקַּף
  english_pob_choice: surrounded me
  chosen_spanish: me ha rodeado
  alternatives_spanish:
  - me ha cercado
  - me ha envuelto
  lexicon: HALOT
  rationale: ‘Rodeado’ conserva la imagen concreta de cerco y es natural en español. ‘Cercado’ sería posible, pero en uso común puede sonar más militar o técnico; ‘envuelto’ suaviza demasiado la imagen.
- source_word: רֹאשׁ
  english_pob_choice: bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - veneno
  - hiel
  lexicon: HALOT
  rationale: La POB inglesa eligió ‘bitterness’ para reflejar el valor poético y evitar fijar prematuramente ‘poison’ o ‘gall’. En español, ‘amargura’ reproduce bien ese campo semántico sin borrar la tensión léxica.
- source_word: וּתְלָאָה
  english_pob_choice: hardship
  chosen_spanish: penuria
  alternatives_spanish:
  - aflicción
  - trabajo penoso
  - miseria
  lexicon: HALOT
  rationale: ‘Penuria’ comunica dificultad, estrechez y carga aflictiva, y funciona bien en paralelo con ‘amargura’. Mantiene el tono poético sin reducir el término a una sola idea de ‘cansancio’ o ‘problema’.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se conserva la metáfora de ‘construir contra’ para no sustituirla por una paráfrasis como ‘asediar’, y se evita traducir רֹאשׁ de forma demasiado cerrada, dejando en nota la alternativa ‘veneno’ junto con el valor poético de ‘amargura’.
  spanish_consistency_notes:
  - Se mantiene ‘contra mí’ para preservar la fuerza adversativa documentada en עָלַי.
  - ‘Rodeado’ se usa para וַיַּקַּף siguiendo la revisión inglesa más natural, sin perder la imagen de cerco.
  - ‘Amargura’ y ‘penuria’ forman un paralelismo claro en español y reflejan el campo semántico del hebreo sin forzar una interpretación doctrinal.
