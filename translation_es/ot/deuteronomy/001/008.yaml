review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: llamado de atención, puesta de la tierra delante del pueblo, mandato doble de entrar y tomar posesión, juramento de Yahvé a los padres identificados como Abraham, Isaac y Jacob, y extensión de la promesa a su descendencia. Sin embargo, no preserva todas las alternativas y aclaraciones del rastro POB inglés: falta nota para la alternativa de וּרְשׁוּ (''poseer/tomar posesión''), falta la aclaración de que ''sus padres'' se refiere específicamente a Abraham, Isaac y Jacob, y falta la alternativa de זרע como ''simiente''.'
  spanish_quality_summary: El español es claro y natural. 'Mira' funciona bien para רְאֵה, aunque conviene ampliar la nota para incluir 'He aquí' en vez de duplicar 'Mira'. La frase final 'darles a ellos y a su descendencia después de ellos' es fiel pero algo pesada; 'para dársela a ellos y a su descendencia después de ellos' suena más idiomático y explicita con claridad que lo dado es la tierra. También conviene puntuar con rayas o comas de modo consistente.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה -> ''Yahvé''; אֲבֹתֵיכֶם -> ''sus padres'' conserva el masculino específico; הָאָרֶץ -> ''la tierra''; וּרְשׁוּ -> ''tomen posesión de'' es adecuado. No hay conflictos teológicos relevantes. El ajuste principal es documental: reproducir en notas las alternativas significativas conservadas por la auditoría inglesa.'
  issues:
  - severity: medium
    issue: Faltan notas de alternativas léxicas y aclaraciones preservadas en el POB inglés.
    rationale: La auditoría inglesa conserva notas para 'take possession/possess', para la referencia específica de 'your fathers', y para 'offspring/seed'. El español debe preservarlas o equivalentes para mantener la trazabilidad exegética del proyecto.
  - severity: low
    issue: La nota [a] actual repite 'Mira' como alternativa y omite una opción más útil.
    rationale: Si el texto principal ya dice 'Mira', la nota debería aportar alternativas reales como 'Observa' o 'He aquí', reflejando mejor el abanico documentado por el inglés ('Look/Behold').
  - severity: low
    issue: La construcción final puede mejorarse levemente para mayor naturalidad en español.
    rationale: '''...que Yahvé juró... darles a ellos...'' es entendible, pero ''...que Yahvé juró... para dársela a ellos...'' integra mejor el infinitivo de finalidad y retoma con claridad el referente ''la tierra''.'
  revised_spanish_text: Mira[a], yo he puesto la tierra delante de ustedes. Entren y tomen posesión[b] de la tierra que Yahvé juró a sus padres[c] —a Abraham, a Isaac y a Jacob— para dársela a ellos y a su descendencia[d] después de ellos.
  revised_footnotes:
