revisions:
- from: Después de haber recogido sus armas y despojado el botín de los enemigos[a], se dedicaron al sábado, bendiciendo abundantemente y dando gracias al Señor, que los había preservado hasta este día[b], habiéndoles asignado un comienzo de misericordia.
  to: Después de haber recogido sus armas y recogido el botín de los enemigos, se dedicaron al sábado[a], bendiciendo abundantemente y dando gracias al Señor, que los había preservado hasta este día, habiéndoles señalado un comienzo de misericordia[b].
  rationale: Se corrige una expresión española poco natural («despojado el botín») por «recogido el botín de los enemigos», que preserva mejor el sentido del griego y del POB inglés. También se mejora «asignado» a «señalado» para reflejar τάξαντος con español más idiomático, manteniendo la idea de un inicio de misericordia sin sobreinterpretarla. Se ajustan los anclajes de notas para que coincidan exactamente con el texto revisado.
