theological_decisions:
- issue: Rendering πνεῦμα / πνεύματι ἁγίῳ with capitalization
  chosen_reading: the Spirit ... the Holy Spirit
  alternative_readings:
  - the spirit ... holy spirit
  rationale: The immediate context identifies the descending πνεῦμα as the divine Spirit, and the final phrase explicitly names the Holy Spirit. Capitalization reflects referent identification rather than a doctrinal addition.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Preposition choice in baptismal phrases
  chosen_reading: baptize in water ... baptizes in the Holy Spirit
  alternative_readings:
  - baptize with water ... baptizes with the Holy Spirit
  rationale: Using 'in' in both phrases preserves the Greek preposition ἐν and the deliberate parallel between John's baptism and Jesus's baptism, while remaining intelligible in English.
  doctrine_reference: Translation philosophy §5
