translation:
  language: es
  text: Pero ustedes son los que han permanecido conmigo en mis pruebas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tentaciones» o «situaciones de prueba». La palabra griega puede referirse a tentación o prueba; aquí probablemente apunta a las duras experiencias y oposiciones que Jesús soportó.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  lexicon: BDAG
  rationale: El griego coloca el pronombre al inicio para énfasis. En español, «ustedes» da un plural natural y cercano; el matiz enfático se conserva con la estructura «ustedes son los que…».
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La conjunción introduce contraste con el contexto inmediato. «Pero» expresa mejor la oposición discursiva en español.
- source_word: οἱ διαμεμενηκότες
  english_pob_choice: the ones who have remained
  chosen_spanish: los que han permanecido
  alternatives_spanish:
  - los que se han quedado
  - los que han continuado
  lexicon: BDAG
  rationale: El participio perfecto sustantivado describe a un grupo definido por su perseverancia hasta el presente. «Los que han permanecido» preserva esa fuerza continua sin sonar arcaico.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  lexicon: BDAG
  rationale: Es la equivalencia natural de μετά con genitivo de acompañamiento o asociación.
- source_word: ἐν τοῖς πειρασμοῖς μου
  english_pob_choice: in my trials
  chosen_spanish: en mis pruebas
  alternatives_spanish:
  - en mis tentaciones
  - en mis tentaciones y pruebas
  lexicon: BDAG
  rationale: πειρασμός puede significar prueba, tentación o prueba/ensayo. En este contexto narrativo, Jesús habla de las dificultades y oposiciones que soportó; «pruebas» mantiene la amplitud del término en español y evita cerrar indebidamente la tensión semántica.
theological_decisions:
- issue: Alcance de πειρασμοῖς aplicado a Jesús
  english_pob_reading: trials/ordeals endured by Jesus
  chosen_spanish_reading: pruebas soportadas por Jesús
  alternative_spanish_readings:
  - tentaciones de Jesús
  - tentaciones y pruebas de Jesús
  rationale: El contexto favorece la idea de dificultades, oposición y sufrimiento durante su ministerio. «Pruebas» conserva la posibilidad de tentación sin imponerla como única lectura, siguiendo la cautela del audit trail inglés.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en lugar de resolverla)
translation_notes:
  revision_awareness: El inglés POB reciente no muestra cambios aplicados y mantiene alta concordancia en la revisión; por eso el español sigue de cerca la decisión léxica principal sin introducir variantes interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma estable para Ἰησοῦς, aunque no aparece en este versículo.
  - «Pruebas» conserva la ambigüedad controlada de πειρασμοῖς, coherente con el tratamiento auditado en inglés.
  - La nota usa «tentaciones» y «ensayos» como alternativas léxicas; «ensayos» funciona aquí como opción semántica amplia para πειρασμοῖς, no como tecnicismo doctrinal.
