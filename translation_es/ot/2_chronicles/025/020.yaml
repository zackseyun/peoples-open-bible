- from: Pero Amasías no quiso escuchar[a], porque era de parte de Dios, para entregarlos en mano, ya que habían buscado a los dioses de Edom.
  to: Pero Amasías no quiso escuchar, porque esto provenía de Dios, para entregarlos al poder[a] de sus enemigos, ya que habían buscado a los dioses de Edom.
  rationale: Se reubica la nota al modismo correcto y se corrige 'en mano' por una expresión española natural que comunica el sentido de בְיָד. Se explicita 'de sus enemigos' siguiendo la decisión del POB inglés y el contexto inmediato, evitando una frase incompleta en español. 'Esto provenía de Dios' mantiene la causalidad divina del hebreo con mejor naturalidad.
