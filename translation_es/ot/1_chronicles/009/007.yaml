  lexicon: HALOT
  rationale: La cadena genealógica hebrea usa בֶּן repetidamente; 'hijo de' mantiene la forma formal y literal del registro, sin forzar una paráfrasis interpretativa.
- source_word: מְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Mesulam
  alternatives_spanish:
