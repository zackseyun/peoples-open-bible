    text: La identificación de ‘symphonia’ es incierta; también se han propuesto alternativas como ‘doble pífano’.
    reason: lexical_alternative
  - marker: b
    text: O ‘adorarán’; el verbo arameo puede denotar postración reverente y, en este contexto, lleva también el sentido de homenaje idolátrico.
    reason: alternative_reading
  revision_rationale: 'Se repara el anclaje erróneo de la nota teológica, se reemplaza el anglicismo impropio ''bagpipe'' por ''gaita'' con nota de incertidumbre, y se alinean mejor dos instrumentos con el audit trail: קיתרוס como ''lira'' y מַשְׁרוֹקִיתָא con una solución menos sobreprecisa (''flauta de caña''). El resto del versículo se conserva porque transmite bien el mandato real y el sentido de la escena.'
