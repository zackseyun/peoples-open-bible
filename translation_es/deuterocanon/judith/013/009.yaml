review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el griego en la secuencia narrativa, el objeto «cama», la acción decisiva de ἐδράξατο y la súplica «Fortaléceme». Sin embargo, «el cabello de su cabeza» suena poco natural en español; la especificidad de κόμη τῆς κεφαλῆς αὐτοῦ puede preservarse mejor como «el cabello de su cabeza» solo con costo estilístico innecesario, o de modo más idiomático como «el cabello de la cabeza»/«el cabello de él», pero en español basta «el cabello». Además, el vocativo de ὁ θεὸς Ἰσραήλ queda mejor marcado con «oh» en una invocación directa, ya que el inglés auditado lo preserva expresamente por su fuerza oracional.
  spanish_quality_summary: El texto es claro y digno, pero «asió» es comprensible aunque algo literario; puede mantenerse. La principal mejora necesaria es hacer más natural la frase del cabello y marcar mejor el vocativo en la oración. «En este día» es aceptable y solemne.
  glossary_alignment: No hay términos del glosario principal en conflicto. «Dios» para θεός está bien. No hay ocurrencia de Yahvé, Mesías, etc. La decisión teológica sobre el vocativo debe reflejar mejor la razón documentada en el POB inglés.
  issues:
  - severity: medium
    issue: Vocativo divino insuficientemente marcado
    rationale: El griego y el POB inglés tratan ὁ θεὸς Ἰσραήλ como invocación directa. En español, «Dios de Israel» entre comas puede funcionar, pero «oh Dios de Israel» refleja mejor la fuerza oracional documentada.
  - severity: medium
    issue: «el cabello de su cabeza» resulta rígido en español
    rationale: Aunque calca la especificidad griega, en español suena redundante y poco natural. Es preferible una forma más idiomática que preserve el sentido sin madera excesiva.
  revised_spanish_text: 'Y cuando se acercó a la cama, asió el cabello y dijo: «Fortaléceme, oh Dios de Israel, en este día».'
  revision_rationale: Se ajusta el vocativo para reflejar explícitamente la invocación de la oración, en línea con el POB inglés y la fuerza del griego. También se elimina una redundancia poco natural en español («de su cabeza»), ya implícita en «cabello», para mejorar la legibilidad sin pérdida real de sentido.
