  rationale: 'Se realizan ajustes menores de naturalidad y estilo sin cambiar el sentido: se elimina el pronombre sujeto innecesario y se sustituye ''venir'' por ''llegar'', que encaja mejor con la idea de que tal abundancia de especias no volvió a presentarse. Se conserva la nota léxica sobre el singular colectivo hebreo.'
