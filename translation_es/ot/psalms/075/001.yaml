translation:
  language: es
  text: 'Para el director musical: «No destruyas». Un salmo de Asaf[a][b]. Un cántico.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente un tono o indicación musical: «No destruyas».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «de Asaf» puede indicar autoría, asociación o pertenencia a la colección asafita.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el maestro de coro
  - Para el director del coro
  - Para el líder musical
  lexicon: HALOT
  rationale: El hebreo de los sobrescritos señala al responsable de la ejecución musical. «Director musical» conserva la función litúrgica sin imponer una imagen coral demasiado específica, y resulta natural en español actual.
- source_word: אַל תַּשְׁחֵת
  english_pob_choice: Do Not Destroy
  chosen_spanish: No destruyas
  alternatives_spanish:
  - No destruyas esto
  - No arruines
  - No destruyas [la obra]
  lexicon: HALOT
  rationale: La forma verbal funciona mejor en español como título o indicación musical breve. «No destruyas» conserva la fuerza del verbo שׁחת sin añadir un objeto que el hebreo no expresa de manera explícita.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Salmo
  lexicon: HALOT
  rationale: En un sobrescrito, el sustantivo cumple función de etiqueta genérica. En español, «Salmo» en mayúscula inicial es una formulación sobria y publicable que mantiene el valor de designación.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: 'El prefijo ל admite relación amplia: autoría, asociación o colección. «De Asaf» preserva esa amplitud sin cerrarla a una sola explicación.'
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Canción
  - Un cántico
  - Canto
  lexicon: HALOT
  rationale: En el paralelo del sobrescrito, שִׁיר añade una segunda designación genérica. «Cántico» mantiene un registro bíblico natural en español y evita fusionarlo con «salmo».
theological_decisions:
- issue: Naturaleza del encabezado musical "No destruyas"
  english_pob_reading: The phrase is treated as a tune or musical direction rather than part of the psalm's propositional content.
  chosen_spanish_reading: «No destruyas» se presenta como encabezado musical/titular, no como contenido doctrinal del salmo.
  alternative_spanish_readings:
  - Como mandato literal dirigido al lector.
  - Como parte del contenido principal del poema.
  rationale: El hebreo del sobrescrito y la tradición de la POB lo tratan como indicación funcional. La puntuación con comillas ayuda a evitar leerlo como una proposición independiente del salmo.
  doctrine_reference: Salmos; superscripciones poéticas y litúrgicas
- issue: Ambigüedad de לְאָסָף
  english_pob_reading: The phrase may indicate authorship, association, or membership in the Asaphite collection.
  chosen_spanish_reading: «de Asaf» conserva la ambigüedad entre autoría, asociación o pertenencia a la colección de Asaf.
  alternative_spanish_readings:
  - Escrito por Asaf.
  - Para Asaf / dedicado a Asaf.
  rationale: El dato textual no obliga a una sola relación. Mantener la ambigüedad es más fiel al sobrescrito y al análisis auditado de la POB.
  doctrine_reference: Crítica textual y encabezados de los Salmos
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica sin cambios necesarios y alto acuerdo entre revisiones. La redacción española mantiene las decisiones auditadas del texto inglés sin introducir reinterpretaciones adicionales.
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos del proyecto, pero este versículo no lo contiene.
  - 'Se preservó la doble etiqueta genérica del sobrescrito: «Salmo» y «Cántico».'
  - Se evitó traducir mecánicamente como «para el maestro de coro» para mantener una formulación clara y natural en español.
  - La puntuación distingue el encabezado musical del resto del sobrescrito.
