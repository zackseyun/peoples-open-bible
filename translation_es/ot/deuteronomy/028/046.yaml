translation:
  language: es
  text: Y estarán sobre ti y sobre tu descendencia[a] como señal y prodigio, para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu simiente» o «tus descendientes». El hebreo זֶרַע puede referirse colectivamente a la posteridad.'
    reason: lexical_alternative
  - marker: b
    text: El sujeto implícito de «estarán» se entiende por el contexto inmediato como las maldiciones del pacto.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: And they will be
  chosen_spanish: Y estarán
  alternatives_spanish:
  - Y serán
  - Y acontecerán
  lexicon: HALOT
  rationale: El hebreo expresa continuación/resultante de la maldición en contexto futuro. En español, «estarán» comunica con naturalidad la permanencia de esas sanciones, sin forzar una paráfrasis.
- source_word: בְּךָ
  english_pob_choice: on you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - en ti
  - sobre vosotros
  lexicon: HALOT
  rationale: La preposición transmite la idea de que las maldiciones recaen y pesan sobre el destinatario. «Sobre ti» conserva esa fuerza mejor que «en ti» y evita un matiz demasiado hostil de «contra ti».
- source_word: לְאוֹת
  english_pob_choice: as a sign
  chosen_spanish: como señal
  alternatives_spanish:
  - como signo
  - como marca
  lexicon: HALOT
  rationale: אוֹת designa una señal o indicio reconocible. «Señal» es el equivalente más natural y claro en español, manteniendo la función indicativa del término.
- source_word: וּלְמוֹפֵת
  english_pob_choice: and a wonder
  chosen_spanish: como prodigio
  alternatives_spanish:
  - como maravilla
  - como portento
  - como señal prodigiosa
  lexicon: HALOT
  rationale: מוֹפֵת puede expresar maravilla o portentoso prodigio. «Prodigio» preserva el carácter extraordinario sin interpretar el término como presagio ominoso más allá de lo que el hebreo exige.
- source_word: וּבְזַרְעֲךָ
  english_pob_choice: and on your offspring
  chosen_spanish: y sobre tu descendencia
  alternatives_spanish:
  - y sobre tu simiente
  - y sobre tus descendientes
  - y sobre tu prole
  lexicon: HALOT
  rationale: זֶרַע puede significar descendencia de manera colectiva. «Descendencia» conserva ese valor corporativo y resulta más transparente para el español moderno que «simiente».
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - para toda la vida
  lexicon: HALOT
  rationale: La expresión hebrea denota duración continua. «Para siempre» es la equivalencia más natural y no añade una especificación doctrinal ajena al contexto.
theological_decisions:
- issue: Referente implícito de «they»
  english_pob_reading: The 'they' refers to the curses described in the surrounding context.
  chosen_spanish_reading: El sujeto implícito se entiende como las maldiciones/juícios del contexto inmediato.
  alternative_spanish_readings:
  - Se refiere de forma general a las sanciones del pacto
  - Se refiere a los males anunciados antes
  rationale: El hebreo carece de un sujeto léxico explícito, y el contexto inmediato de Deuteronomio 28 enumera maldiciones del pacto. La traducción mantiene la elipsis en el texto principal y deja que el contexto determine el referente, sin sobreespecificarlo.
  doctrine_reference: Priorizar la referencia contextual del hebreo y evitar insertar glosas interpretativas en el cuerpo del texto.
- issue: Alcance temporal de עַד עוֹלָם
  english_pob_reading: Rendered as 'forever' without specifying metaphysical endlessness.
  chosen_spanish_reading: «Para siempre» expresa duración continua sin definir más allá de lo que el hebreo dice.
  alternative_spanish_readings:
  - por siempre
  - de manera perpetua
  - por tiempo indefinido
  rationale: En lenguaje de pacto y juicio, עַד עוֹלָם puede señalar continuidad duradera. «Para siempre» reproduce el valor habitual del giro y evita cargar el versículo con una precisión metafísica no explícita.
  doctrine_reference: Mantener la equivalencia léxica sin importar afirmaciones doctrinales adicionales al texto.
translation_notes:
  revision_awareness: Verso revisado sin cambios sustanciales respecto al tramo auditado en inglés; se mantuvo la referencia implícita del sujeto y el valor durativo de עַד עוֹלָם, sin ampliar el significado más allá del hebreo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantuvo «descendencia» para זֶרַע por ser el equivalente más natural y colectivo en español.
  - «Señal» y «prodigio» conservan el paralelismo del hebreo sin introducir matices ajenos como «presagio» o «omen».
  - La puntuación sigue el estilo editorial contemporáneo y la nota de la alternativa léxica se ancla en la palabra relevante del texto.
