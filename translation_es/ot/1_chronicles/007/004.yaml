revisions:
- from: Y con ellos, por sus generaciones, según sus casas paternas, había 36.000 tropas del ejército para la guerra, porque habían tenido muchas esposas[a] e hijos.
  to: Y con ellos, por sus generaciones, según sus casas paternas, había 36.000 soldados del ejército para la guerra,[b] porque tenían muchas esposas[a] e hijos varones.
  rationale: Se corrige «tropas» por «soldados» para lograr español natural y contable, se añade la nota militar que el POB inglés conserva para גְּדוּדֵי צְבָא מִלְחָמָה, se cambia «habían tenido» por «tenían» para una causal más idiomática, y se precisa בָנִים como «hijos varones» para mantener el sentido de «sons» en contexto genealógico.
