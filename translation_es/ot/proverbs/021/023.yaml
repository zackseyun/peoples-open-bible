translation:
  language: es
  text: Quien guarda su boca y su lengua guarda su vida[a] de problemas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «se guarda a sí mismo de las angustias»; hebreo: «guarda su nefesh de las angustias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמֵר
  english_pob_choice: guards
  chosen_spanish: guarda
  alternatives_spanish:
  - cuida
  - vigila
  - resguarda
  lexicon: HALOT
  rationale: El participio qal expresa la idea de guardar o vigilar. «Guarda» reproduce bien la repetición verbal del hebreo en ambas mitades y suena natural en un proverbio sapiencial español.
- source_word: פִּיו
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - su boca y sus palabras
  lexicon: HALOT
  rationale: El sustantivo literal es «boca» con sufijo de 3ms. En español, «boca» es una equivalencia directa y clara para el órgano del habla.
- source_word: לְשׁוֹנוֹ
  english_pob_choice: his tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lengua
  - su habla
  lexicon: HALOT
  rationale: «Lengua» conserva la imagen hebrea y el paralelismo con «boca», además de funcionar metonímicamente para el habla, como en la literatura sapiencial.
- source_word: מִצָּרוֹת
  english_pob_choice: from troubles
  chosen_spanish: de las angustias
  alternatives_spanish:
  - de los problemas
  - de las tribulaciones
  - de las aflicciones
  lexicon: HALOT
  rationale: El plural צָרוֹת abarca dificultades/opresiones. «Angustias» comunica bien el peso adverso del término en español sin volverlo excesivamente técnico ni demasiado suave; se mantiene la amplitud semántica del hebreo.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - a sí mismo
  - su ser
  lexicon: HALOT
  rationale: En este contexto sapiencial, נֶפֶשׁ se refiere naturalmente a la vida de la persona, no a «alma» en sentido doctrinal. «Vida» preserva el foco práctico del proverbio y evita cargar el término con una antropología ajena al contexto.
theological_decisions:
- issue: Sentido de נֶפֶשׁ
  english_pob_reading: his life
  chosen_spanish_reading: su vida
  alternative_spanish_readings:
  - su alma
  - a sí mismo
  rationale: El proverbio trata sobre el resultado protector de un habla disciplinada. Traducir נֶפֶשׁ como «vida» mantiene el énfasis ético y circunstancial del texto, sin introducir una afirmación doctrinal sobre el alma que el hebreo aquí no exige.
  doctrine_reference: Antropología bíblica en literatura sapiencial; uso contextual de נֶפֶשׁ
translation_notes:
  revision_awareness: El inglés POB mantiene «his life» y anota la alternativa «himself»/«his soul». La versión española conserva esa decisión con «su vida», evitando una paráfrasis doctrinal y reflejando el paralelismo verbal del hebreo (guarda... guarda). No hubo cambios de revisión en el texto fuente en inglés, por lo que la traducción sigue el estado estable del audit trail.
  spanish_consistency_notes:
  - Se mantuvo la repetición de «guarda» para reflejar el paralelismo del hebreo.
  - «Boca» y «lengua» conservan la imaginería concreta del original.
  - Se usó «angustias» para abarcar el campo semántico de צָרוֹת sin endurecer innecesariamente el verso.
  - La nota al pie evita sustituir «vida» por «alma», ya que el contexto no es doctrinal sino sapiencial.
