translation:
  language: es
  text: Y yo he llegado a ser un oprobio a ellos; cuando me ven[a], menean la cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacuden la cabeza». El hebreo se refiere a mover la cabeza como gesto de burla o desprecio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Pero yo
  - Y en cuanto a mí
  lexicon: HALOT
  rationale: La conjunción con el pronombre independiente mantiene la simple continuidad discursiva y, a la vez, permite percibir el contraste implícito del lamento. «Y yo» conserva esa relación sin volverla más explícita de lo que exige el hebreo.
- source_word: הָיִיתִי
  english_pob_choice: have become
  chosen_spanish: he llegado a ser
  alternatives_spanish:
  - he sido
  - llegué a ser
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un estado resultante; en español, «he llegado a ser» comunica bien el devenir hacia una condición sin reducirlo a mera existencia pasada.
- source_word: חֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: un oprobio
  alternatives_spanish:
  - un reproche
  - una vergüenza
  - un escarnio
  lexicon: HALOT
  rationale: «Oprobio» preserva el valor de deshonra, burla y desprecio propio del término en los salmos de lamento. Es más natural en español bíblico que «reproche» en este contexto, sin perder la carga de afrenta pública.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - ante ellos
  lexicon: HALOT
  rationale: Con «oprobio» en español, la relación de destino o efecto se expresa con mayor naturalidad mediante «para ellos». Mantiene la referencia hostil del preposición ל sin sobreinterpretarla.
- source_word: יִרְאוּנִי
  english_pob_choice: when they see me
  chosen_spanish: cuando me ven
  alternatives_spanish:
  - al verme
  - cuando me miran
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí funciona con sentido general o repetido. «Cuando me ven» hace clara esa relación temporal con el gesto siguiente y suena natural en español.
- source_word: יְנִיעוּן
  english_pob_choice: they shake
  chosen_spanish: menean
  alternatives_spanish:
  - sacuden
  - agitan
  - menean la cabeza
  lexicon: HALOT
  rationale: El verbo indica mover la cabeza como gesto de desprecio. «Menean la cabeza» conserva el valor idiomático y evita una imagen demasiado genérica como «sacuden».
- source_word: רֹאשָׁם
  english_pob_choice: their heads
  chosen_spanish: la cabeza
  alternatives_spanish:
  - sus cabezas
  - la cabeza de cada uno
  lexicon: HALOT
  rationale: El hebreo usa singular con sufijo plural; en español, el gesto se expresa idiomáticamente en singular colectivo. El verbo ya lleva la pluralidad del sujeto, por eso «la cabeza» suena natural y fiel al modismo.
translation_notes:
  revision_awareness: 'Se siguió de cerca el testimonio hebreo (WLC) y el audit trail inglés: el perfecto se reflejó con un giro de resultado («he llegado a ser»), y el gesto final se mantuvo como acto de desprecio, no como simple movimiento físico. La traducción inglesa revisada de ''became'' a ''have become'' confirmó el valor resultativo del perfecto.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones porque el versículo no contiene el nombre divino.
  - «Oprobio» mantiene el tono de lamento y afrenta pública coherente con el vocabulario poético de los Salmos.
  - La nota al pie conserva la alternativa verbal del gesto, adaptada al español como «menean sus cabezas».
