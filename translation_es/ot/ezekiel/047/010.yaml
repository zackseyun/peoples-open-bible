    text: 'O, más literalmente: «sus peces serán según su especie», expresando una gran variedad de clases.'
    reason: lexical_alternative
  - marker: b
    text: «Mar Grande» es la designación bíblica tradicional del mar Mediterráneo.
    reason: cultural_note
  revision_rationale: Se ajusta «se pondrán» a «estarán» para reflejar mejor יעמדו, y «de muchos géneros» a «de muchas clases» para un español más natural y fiel al sentido de variedad de לְמִינָה, manteniendo la alternativa más literal en nota. No se requieren cambios doctrinales ni adjudicación adicional.
