translation:
  language: es
  text: Y después de que salieron[a], se separaron uno del otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando salieron»; o «habiendo salido». El participio griego puede expresar un matiz temporal ligeramente distinto, y el verbo principal también puede traducirse «se apartaron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντες
  english_pob_choice: after they went out
  chosen_spanish: después de salir
  alternatives_spanish:
  - cuando salieron
  - habiendo salido
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la principal. «Después de salir» conserva la secuencia temporal que la POB inglesa marcó con «after they went out», sin forzar una construcción demasiado literal en español.
- source_word: διεχωρίσθησαν
  english_pob_choice: they separated
  chosen_spanish: se separaron
  alternatives_spanish:
  - se apartaron
  - fueron separados
  lexicon: BDAG
  rationale: 'El verbo aquí es intransitivo/reflexivo en el contexto narrativo: los dos personajes se apartan. «Se separaron» reproduce bien ese sentido y mantiene el tono natural del español.'
- source_word: ἀπ᾿ ἀλλήλων
  english_pob_choice: from one another
  chosen_spanish: el uno del otro
  alternatives_spanish:
  - unos de otros
  - entre sí
  lexicon: BDAG
  rationale: La expresión recíproca indica separación mutua. «El uno del otro» conserva con claridad esa reciprocidad en un registro digno y transparente.
