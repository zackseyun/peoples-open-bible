revisions:
- from: 'Estas son las familias de los zabulonitas según los que fueron contados de entre ellos: sesenta mil quinientos.'
  to: 'Estos son los clanes de los zabulonitas según los que fueron contados de ellos: sesenta mil quinientos.'
  rationale: Se cambia 'familias' por 'clanes' para ajustarse mejor al sentido tribal-censal de מִשְׁפְּחֹת y a la decisión léxica auditada del POB. También se simplifica 'de entre ellos' a 'de ellos' para una formulación más natural y formal en español, sin cambio de sentido. Se mantiene 'Estos son' por concordar naturalmente con el sustantivo masculino plural 'clanes'.
