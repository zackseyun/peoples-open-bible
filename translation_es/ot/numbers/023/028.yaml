translation:
  language: es
  text: Entonces Balac llevó a Balaam a la cima de Peor[a], que da hacia el Jesimón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el desierto»; el hebreo «el Jesimón» puede entenderse ya sea como término descriptivo («la tierra desolada» / «el desierto») o como nombre de lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then ... took
  chosen_spanish: Entonces ... llevó
  alternatives_spanish:
  - Y ... tomó
  - Entonces ... tomó
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, «entonces» conserva la secuencia y «llevó» naturaliza el movimiento hacia el lugar alto implicado por el contexto topográfico, sin perder el acto de conducir a Balaam.
- source_word: בָּלָק
  english_pob_choice: Balak
  chosen_spanish: Balac
  alternatives_spanish:
  - Balak
  lexicon: Nombre propio tradicional/transliteración
  rationale: Se adapta al uso hispano bíblico habitual con «Balac», manteniendo identificación inequívoca del nombre propio.
- source_word: אֶת בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Bileam
  lexicon: Nombre propio tradicional/transliteración
  rationale: Se conserva el nombre propio conocido en español bíblico, sin marcar el objeto directo explícitamente, como en el original y en la POB inglesa.
- source_word: רֹאשׁ
  english_pob_choice: the top
  chosen_spanish: la cima
  alternatives_spanish:
  - la cumbre
  - la cima de
  lexicon: HALOT
  rationale: En contexto geográfico, רֹאשׁ designa la parte superior de una elevación. «La cima» es natural y fiel; «cima de» mantiene la imagen de altura mejor que «cabeza» en español.
- source_word: הַפְּעוֹר
  english_pob_choice: Peor
  chosen_spanish: Peor
  alternatives_spanish:
  - el Peor
  lexicon: Nombre de lugar
  rationale: Se conserva el topónimo transliterado. El artículo hebreo no se vierte de modo rígido en español cuando el resultado sería poco natural.
- source_word: הַנִּשְׁקָף
  english_pob_choice: which overlooks
  chosen_spanish: que domina
  alternatives_spanish:
  - que mira hacia
  - que se alza sobre
  - que domina desde
  lexicon: HALOT
  rationale: El participio nifal de שקף expresa una elevación que se proyecta o mira hacia abajo sobre un área. «Que domina» reproduce bien la relación topográfica en español sin forzar una construcción pesada.
- source_word: עַל פְּנֵי
  english_pob_choice: the face of
  chosen_spanish: la llanura de
  alternatives_spanish:
  - sobre la superficie de
  - frente a
  - sobre
  lexicon: HALOT
  rationale: La frase es idiomática. En español, «la llanura de» comunica el ámbito visible que se extiende delante del mirador; aunque el hebreo dice literalmente «sobre la faz de», aquí una formulación más natural evita dureza sin alterar la referencia geográfica.
- source_word: הַיְשִׁימֹן
  english_pob_choice: the wasteland
  chosen_spanish: el Jesimón
  alternatives_spanish:
  - el desierto
  - el yermo
  - la región desolada
  lexicon: HALOT
  rationale: Se preserva la tensión lexical del hebreo entre nombre propio y sustantivo descriptivo. En el texto principal, «Jesimón» mantiene la posibilidad de topónimo; la nota explica el sentido descriptivo alternativo.
theological_decisions:
- issue: Tratamiento de הַיְשִׁימֹן como topónimo o descripción geográfica
  english_pob_reading: Hebrew 'the Jeshimon' may be understood either as a descriptive term ('the wasteland/desert') or as a place-name.
  chosen_spanish_reading: el Jesimón
  alternative_spanish_readings:
  - el desierto
  - el yermo
  - la región desolada
  rationale: No hay carga doctrinal, pero sí una ambigüedad textual real que debe mantenerse visible. El texto principal conserva la forma susceptible de ser leída como nombre propio; la nota ofrece la lectura descriptiva sin cerrar la opción.
  doctrine_reference: No aplica; cuestión léxica/topográfica.
translation_notes:
  revision_awareness: Se ha seguido el alto grado de acuerdo del control cruzado y no se han aplicado revisiones sustantivas respecto del sentido del hebreo ni del audit trail inglés. La única decisión relevante fue resolver la topografía en español con una formulación natural que preserve la ambigüedad de הַיְשִׁימֹן.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva la transliteración de los nombres propios según uso bíblico español («Balac», «Balaam», «Peor»).
  - La ambigüedad entre topónimo y sustantivo descriptivo se deja explícita mediante nota, en continuidad con la POB inglesa.
