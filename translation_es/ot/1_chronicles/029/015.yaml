translation:
  language: es
  text: Porque nosotros somos peregrinos[a] delante de ti, y residentes temporales[b], como todos nuestros padres. Nuestros días sobre la tierra son como una sombra, y no hay esperanza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forasteros» / «extranjeros» para גֵרִים.
    reason: lexical_alternative
  - marker: b
    text: O «residentes forasteros» para תוֹשָׁבִים.
    reason: lexical_alternative
  - marker: c
    text: Aquí «no hay esperanza» se refiere a la fugacidad de la vida humana sobre la tierra, no a la ausencia de esperanza en Dios.
    reason: theological_note
lexical_decisions:
- source_word: גֵרִים
  english_pob_choice: sojourners
  chosen_spanish: forasteros
  alternatives_spanish:
  - peregrinos
  - residentes forasteros
  lexicon: HALOT
  rationale: גֵר expresa la idea de alguien que habita en tierra ajena sin pertenencia plena. En español, «forasteros» comunica bien esa condición de extranjería, aunque no es idéntico a «extraños» en sentido social. Se evita «peregrinos» por su posible carga devocional no explícita en el hebreo.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente espacial y relacional. «Delante de ti» conserva la orientación directa hacia Dios sin ampliar demasiado el sentido; «ante ti» sería igualmente posible, pero «delante de ti» suena más natural en este contexto oracional.
- source_word: תוֹשָׁבִים
  english_pob_choice: temporary residents
  chosen_spanish: moradores temporales
  alternatives_spanish:
  - residentes temporales
  - residentes forasteros
  lexicon: HALOT
  rationale: תוֹשָׁב señala a quien mora en un lugar sin estatus permanente. «Moradores temporales» preserva la idea de residencia limitada y mantiene el paralelismo con גֵרִים. Se evita «residentes alienígenas», aunque sería técnicamente cercano, por su rareza en español bíblico moderno.
- source_word: כְּכָל אֲבֹתֵינוּ
  english_pob_choice: as all our fathers were
  chosen_spanish: como todos nuestros padres
  alternatives_spanish:
  - como todos nuestros antepasados
  - como todos nuestros padres/antepasados
  lexicon: HALOT
  rationale: El hebreo conserva «padres» como forma de hablar de los antepasados. En español bíblico, «padres» transmite con fidelidad esa continuidad genealógica y litúrgica; «antepasados» aclara el sentido, pero pierde la resonancia de la formulación hebrea.
- source_word: כַּצֵּל
  english_pob_choice: like a shadow
  chosen_spanish: como una sombra
  alternatives_spanish:
  - como sombra
  - igual que una sombra
  lexicon: HALOT
  rationale: La imagen de transitoriedad es la misma en español. «Como una sombra» conserva la metáfora y su fuerza poética sin volverla más explicativa de lo que el texto permite.
- source_word: יָמֵינוּ עַל הָאָרֶץ
  english_pob_choice: our days on the earth
  chosen_spanish: nuestros días sobre la tierra
  alternatives_spanish:
  - nuestros días en la tierra
  - nuestros días en la tierra
  lexicon: HALOT
  rationale: La preposición hebrea admite un valor locativo general. «Sobre la tierra» es natural en español bíblico y mantiene el matiz de estancia terrenal pasajera.
- source_word: מִקְוֶה
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectación
  - espera
  lexicon: HALOT
  rationale: 'מִקְוֶה puede significar esperanza o expectativa. En este contexto de mortalidad humana, «esperanza» es la equivalencia más transparente en español. Se conserva el alcance contextual: no niega la esperanza en Dios, sino la duración o seguridad de la vida terrenal.'
theological_decisions:
- issue: Sentido de "y no hay esperanza" en un contexto de fragilidad humana
  english_pob_reading: The phrase refers to the fleeting nature of human life on earth, not to the absence of hope in God.
  chosen_spanish_reading: «Y no hay esperanza» se entiende como una afirmación sobre la brevedad e inestabilidad de la vida humana en la tierra, no como negación de la esperanza en Dios.
  alternative_spanish_readings:
  - y no hay expectativa
  - y no hay esperanza duradera
  rationale: El hebreo permite una lectura de la vida terrenal como transitoria y sin permanencia. En español, «esperanza» mantiene la fuerza del enunciado; la nota doctrinal evita una lectura desesperanzada absoluta y preserva la tensión textual.
  doctrine_reference: Mortality and human transience before God; do not erase the contextual limitation of the claim.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; la traducción sigue el texto hebreo masorético (WLC) con apoyo del audit trail inglés POB y mantiene la misma lectura teológica contextual sobre la transitoriedad humana.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el pronombre de segunda persona en «delante de ti», sin añadir títulos no presentes en el versículo.
  - Se conserva el paralelismo entre גֵרִים y תוֹשָׁבִים con dos sustantivos cercanos en español para no suavizar la tensión semántica.
  - «Esperanza» traduce מִקְוֶה con una aclaración de alcance contextual para no absolutizar la negación.
