translation:
  language: es
  text: Sus puertas se hundieron en la tierra; destruyó y rompió sus cerrojos. Su rey y sus príncipes están entre las naciones; no hay ley[a]. Hasta sus profetas no encontraron visión de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción»; el hebreo torá puede significar ley, instrucción o enseñanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: טָבְעוּ
  english_pob_choice: have sunk
  chosen_spanish: se hundieron
  alternatives_spanish:
  - se sumergieron
  - se hundieron en lo profundo
  lexicon: HALOT
  rationale: El hebreo expresa la idea de hundirse o ser abatido hacia abajo. «Se hundieron» reproduce la imagen con naturalidad en español y conserva el movimiento descendente de las puertas.
- source_word: בָאָרֶץ
  english_pob_choice: into the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el suelo
  - en la tierra misma
  lexicon: HALOT
  rationale: Con el verbo de hundirse, el complemento indica resultado o ubicación final. «En la tierra» mantiene la poesía y el peso de la imagen sin volverla excesivamente explicativa.
- source_word: שְׁעָרֶיהָ
  english_pob_choice: her gates
  chosen_spanish: sus puertas
  alternatives_spanish:
  - las puertas de ella
  - sus portones
  lexicon: HALOT
  rationale: Es la referencia normal a las puertas de una ciudad personificada. «Sus puertas» es idiomático y fiel al sufijo femenino.
- source_word: אִבַּד
  english_pob_choice: has destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - ha destruido
  - arruinó
  lexicon: HALOT
  rationale: El hebreo tiene un verbo singular con sujeto implícito. En español, el pretérito simple funciona bien en el lamento poético y evita forzar un sujeto explícito que el texto no da.
- source_word: וְשִׁבַּר
  english_pob_choice: and broken
  chosen_spanish: y rompió
  alternatives_spanish:
  - y quebró
  - y destrozó
  lexicon: HALOT
  rationale: «Rompió» conserva la acción concreta sobre los cerrojos. «Quebró» es posible, pero «rompió» suena más natural y mantiene la secuencia verbal del texto.
- source_word: בְּרִיחֶיהָ
  english_pob_choice: her bars
  chosen_spanish: sus cerrojos
  alternatives_spanish:
  - sus barras
  - los cerrojos de ella
  lexicon: HALOT
  rationale: El término puede referirse a barras o cerrojos de cierre. «Cerrojos» comunica bien la función de asegurar las puertas y es claro para el lector español.
- source_word: מַלְכָּהּ וְשָׂרֶיהָ
  english_pob_choice: Her king and her princes
  chosen_spanish: Su rey y sus príncipes
  alternatives_spanish:
  - Su rey y sus jefes
  - Su rey y sus gobernantes
  lexicon: HALOT
  rationale: «Príncipes» preserva el matiz de dignatarios o nobles que tiene שָׂרִים mejor que opciones más genéricas.
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las gentes
  lexicon: HALOT
  rationale: «Naciones» es la equivalencia estándar de גוים en la Biblia hebrea. «Entre» refleja la dispersión o ubicación en medio de otros pueblos.
- source_word: אֵין תּוֹרָה
  english_pob_choice: there is no law
  chosen_spanish: no hay ley
  alternatives_spanish:
  - no hay instrucción
  - no hay Torá
  lexicon: HALOT
  rationale: En este contexto de ruina del orden de Sion, «ley» comunica la ausencia de orden normativo o de instrucción autorizada. La alternativa «instrucción» queda disponible por la amplitud semántica de תּוֹרָה.
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Hasta
  alternatives_spanish:
  - También
  - Aun
  lexicon: HALOT
  rationale: '«Hasta» conserva el sentido aditivo y culminante: no solo hay ruina política, sino también silencio profético.'
- source_word: נְבִיאֶיהָ
  english_pob_choice: her prophets
  chosen_spanish: sus profetas
  alternatives_spanish:
  - los profetas de ella
  lexicon: HALOT
  rationale: Se mantiene el sufijo femenino referido a la ciudad personificada. «Sus profetas» es claro y directo.
- source_word: לֹא מָצְאוּ
  english_pob_choice: have found no
  chosen_spanish: no encontraron
  alternatives_spanish:
  - no han encontrado
  - no hallaron
  lexicon: HALOT
  rationale: El pretérito simple expresa bien el resultado del desastre en un registro literario. Evita una perífrasis más pesada sin perder la fuerza del enunciado.
- source_word: חָזוֹן
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - revelación
  - visión profética
  lexicon: HALOT
  rationale: «Visión» es el término profético estándar y reproduce el campo semántico de revelación sin ampliar innecesariamente.
- source_word: מֵיְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - procedente de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» en lugar de un sustituto como «Señor», conforme al criterio del proyecto y al valor directo del hebreo.
theological_decisions:
- issue: Sujeto implícito de los verbos singulares «destruyó» y «rompió»
  english_pob_reading: Leave the subject implicit in English as 'he' rather than specifying 'the LORD.'
  chosen_spanish_reading: Dejar el sujeto implícito con el verbo en tercera persona singular, sin nombrar explícitamente a Yahvé en esta cláusula.
  alternative_spanish_readings:
  - Yahvé destruyó y rompió
  - él destruyó y rompió
  rationale: El hebreo no expresa sujeto explícito en esos verbos; el contexto sugiere a Yahvé, pero la traducción puede conservar esa tensión sin resolverla de forma interpretativa. El español permite esa misma ambigüedad.
  doctrine_reference: Primacía del texto original; preservar tensión exegética documentada.
- issue: Sentido de תּוֹרָה en «no hay ley»
  english_pob_reading: Render as 'law' in the main text.
  chosen_spanish_reading: Mantener «ley» en el texto principal, con la posibilidad semántica de «instrucción» reconocida en nota implícita por el trasfondo léxico.
  alternative_spanish_readings:
  - no hay instrucción
  - no hay Torá
  rationale: En el lamento por la desolación de Jerusalén, «ley» transmite bien la ausencia de orden normativo y gobierno conforme al pacto. La amplitud de תּוֹרָה queda preservada sin recargar el verso.
  doctrine_reference: Consistencia terminológica con el campo léxico de תּוֹרָה; alternativa documentada.
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del inglés POB (sin cambios necesarios) y su acuerdo alto con la revisión cruzada. La solución española mantiene las decisiones léxicas clave: «se hundieron», «cerrojos», «príncipes», «no hay ley», «visión» y el nombre divino «Yahvé».'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelo sintáctico de dos miembros: puertas/cerrojos y rey/príncipes.'
  - Se evitó sustituir «ley» por «Torá» en el texto principal para conservar la elección auditada del POB inglés.
  - Se conservó el nombre divino «Yahvé» según la convención del proyecto.
  - Se eligió un registro poético claro y bíblico, sin calcos excesivamente duros.
