translation:
  language: es
  text: Pero si no escuchan la voz de Yahvé y se rebelan contra el mandato de Yahvé[a], entonces la mano de Yahvé estará contra ustedes y contra sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus padres». Algunas versiones antiguas y muchos intérpretes leen «su rey», lo que encaja con el contexto inmediato de la advertencia de Samuel tanto al pueblo como a su rey.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: En español, 'Pero si' conserva la fuerza adversativa-condicional del hebreo y del audit trail inglés, sin volver la frase pesada.
- source_word: לֹא תִשְׁמְעוּ בְּקוֹל יְהוָה
  english_pob_choice: you do not listen to the voice of Yahweh
  chosen_spanish: no escuchan la voz de Yahvé
  alternatives_spanish:
  - no obedecen la voz de Yahvé
  - no oyen la voz de Yahvé
  lexicon: HALOT
  rationale: '''Escuchar la voz de Yahvé'' preserva el modismo hebreo שׁמע + בקול y mantiene la posible fuerza de obediencia implícita sin reducirlo a una paráfrasis.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino, evitando el masking tradicional y manteniendo consistencia audit-able con el texto fuente.
- source_word: וּמְרִיתֶם
  english_pob_choice: and rebel
  chosen_spanish: se rebelan
  alternatives_spanish:
  - desobedecen
  - son rebeldes
  lexicon: HALOT
  rationale: מרה expresa rebelión o desafío, no solo incumplimiento; 'se rebelan' conserva la intensidad covenantal del hebreo y el valor de la elección inglesa.
- source_word: אֶת פִּי יְהוָה
  english_pob_choice: against the command of Yahweh
  chosen_spanish: contra el mandato de Yahvé
  alternatives_spanish:
  - contra la palabra de Yahvé
  - contra lo que ha dicho Yahvé
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'la boca de Yahvé', el audit trail inglés ya identifica el sentido idiomático como 'mandato'; 'mandato' es una equivalencia natural en español y evita una imagen opaca.
- source_word: וְהָיְתָה יַד יְהוָה
  english_pob_choice: then the hand of Yahweh will be
  chosen_spanish: entonces la mano de Yahvé estará
  alternatives_spanish:
  - entonces la mano de Yahvé será
  - entonces la mano de Yahvé vendrá
  lexicon: HALOT
  rationale: Se conserva la metáfora 'mano de Yahvé' para el poder activo en juicio, siguiendo la estructura del original y la decisión inglesa de mantener 'hand'.
- source_word: בָּכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - sobre ustedes
  - en ustedes
  lexicon: HALOT
  rationale: En el contexto de juicio, la relación espacial se traduce mejor como oposición directa en español.
- source_word: וּבַאֲבֹתֵיכֶם
  english_pob_choice: and against your fathers
  chosen_spanish: y contra sus padres
  alternatives_spanish:
  - y contra sus antepasados
  - y contra sus padres/antepasados
  lexicon: HALOT
  rationale: Se mantiene el valor literal de אבות como 'padres', consonante con el texto masorético y con el audit trail inglés. En español, 'sus padres' conserva la referencia representativa sin introducir una lectura crítica no asentada en el texto principal.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto exige traducir el nombre divino como 'Yahvé'. Esto preserva transparencia textual y evita la convención de ocultamiento del nombre.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אֶת פִּי יְהוָה / 'against the command of Yahweh'
  english_pob_reading: against the command of Yahweh
  chosen_spanish_reading: contra el mandato de Yahvé
  alternative_spanish_readings:
  - contra la boca de Yahvé
  - contra la palabra de Yahvé
  rationale: El hebreo literal 'boca' funciona idiomáticamente como aquello que Yahvé ha dicho o mandado. Dado que el audit trail inglés ya fija el sentido como 'command', 'mandato' es una solución fiel y clara en español sin borrar la metáfora subyacente.
  doctrine_reference: Covenant obedience / prophetic speech idiom
- issue: Posible variante final וּבַאֲבֹתֵיכֶם
  english_pob_reading: and against your fathers
  chosen_spanish_reading: y contra sus padres
  alternative_spanish_readings:
  - y contra su rey
  - y contra sus antepasados
  rationale: La base masorética leída por el paquete fuente dice 'padres', y esa es la lectura que se traduce en el cuerpo principal. Se conserva la tensión textual porque algunas tradiciones antiguas prefieren 'rey', pero esa alternativa no desplaza al testimonio principal aquí.
  doctrine_reference: Textual criticism / MT priority
translation_notes:
  revision_awareness: El paquete de revisión más reciente indica que no se requirieron cambios y que hay alto acuerdo con el análisis auditado; por eso la presente redacción sigue de cerca el texto fuente y el sentido ya documentado en el trail inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene la metáfora 'mano de Yahvé' sin explicitarla como castigo, porque el contexto ya aporta el sentido.
  - '''Mandato'' se emplea como equivalente idiomático de ''boca de Yahvé'' conforme al audit trail inglés; no se traduce literalmente como ''boca'' para evitar opacidad.'
  - '''Padres'' se conserva en el texto principal por fidelidad al MT, con nota sobre la variante ''rey''.'
