translation:
  language: es
  text: 'Entonces los magos dijeron a Faraón: «Este es el dedo de Dios[a]». Pero el corazón de Faraón se endureció[b], y no les escuchó, tal como Yahvé[c] había dicho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el dedo de Dios»; un modismo que indica la acción directa del poder divino.'
    reason: cultural_note
  - marker: b
    text: O «el corazón de Faraón quedó fuerte / se hizo fuerte». El hebreo no explicita en esta cláusula el agente del endurecimiento.
    reason: lexical_alternative
  - marker: c
    text: Hebreo YHWH, tradicionalmente traducido «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: הַחַרְטֻמִּים
  english_pob_choice: the magicians
  chosen_spanish: los magos
  alternatives_spanish:
  - los hechiceros
  - los magos de la corte
  lexicon: HALOT
  rationale: El término designa a los especialistas rituales/ocultistas de Egipto. En español, «magos» comunica con naturalidad ese rol dentro del contexto de Éxodo sin añadir un matiz cortesano que el hebreo no exige en la línea principal.
- source_word: אֶצְבַּע אֱלֹהִים הִוא
  english_pob_choice: This is the finger of God
  chosen_spanish: Este es el dedo de Dios
  alternatives_spanish:
  - Es el dedo de Dios
  - Este es el dedo de un dios
  lexicon: HALOT
  rationale: La cláusula hebrea es nominal y usa el demostrativo implícito con pronombre femenino. «Este es el dedo de Dios» conserva el valor idiomático de intervención divina directa y mantiene la referencia singular que el contexto favorece.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  - dioses
  lexicon: HALOT
  rationale: Aunque אֱלֹהִים puede tener otros valores en distintos contextos, aquí el sentido es singular y se refiere al Dios de Israel. «Dios» es la forma española adecuada y mantiene la fuerza del contraste narrativo.
- source_word: וַיֶּחֱזַק לֵב פַּרְעֹה
  english_pob_choice: Pharaoh’s heart was hardened
  chosen_spanish: el corazón de Faraón se endureció
  alternatives_spanish:
  - el corazón de Faraón se hizo fuerte
  - Faraón endureció su corazón
  lexicon: HALOT
  rationale: El verbo חזק puede significar fortalecerse o volverse firme. En esta fórmula, el español «se endureció» expresa el resultado obstinado sin resolver indebidamente la agencia, preservando la tensión del hebreo y del audit trail inglés.
- source_word: שָׁמַע אֲלֵהֶם
  english_pob_choice: did not listen to them
  chosen_spanish: no les escuchó
  alternatives_spanish:
  - no les hizo caso
  - no les obedeció
  lexicon: HALOT
  rationale: שׁמע con אֶל significa oír con atención, escuchar o atender. «No les escuchó» es claro y fiel al valor relacional de la frase, evitando una traducción más interpretativa como «obedecer».
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: just as Yahweh had spoken
  chosen_spanish: tal como Yahvé había dicho
  alternatives_spanish:
  - tal como Yahvé había hablado
  - como Yahvé había dicho
  lexicon: HALOT
  rationale: La fórmula narrativa remite a lo que Yahvé ya había declarado. Se usa «Yahvé» conforme a la norma del proyecto para יְהוָה, y «había dicho» reproduce de manera natural la referencia retrospectiva del verbo דבר en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el tetragrámaton: «Yahvé» en el texto principal, preservando el nombre divino personal en vez de sustituirlo por un título.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa directamente el tetragrámaton. En español se conserva el nombre propio «Yahvé» según la política del proyecto, en lugar de ocultarlo tras un sustituto titular.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Agencia en el endurecimiento del corazón de Faraón
  english_pob_reading: Pharaoh’s heart was hardened
  chosen_spanish_reading: el corazón de Faraón se endureció
  alternative_spanish_readings:
  - Faraón endureció su corazón
  - el corazón de Faraón se hizo fuerte
  rationale: La construcción hebrea no explicita en esta cláusula un agente causal en español. «Se endureció» preserva la ambigüedad y la tensión teológica del texto sin resolverla prematuramente.
  doctrine_reference: DOCTRINE.md — Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo masorético de Éxodo 8:15 y mantiene el mismo marco de decisiones del audit trail inglés: «the finger of God» se conserva como modismo de poder divino, el endurecimiento del corazón se traduce de manera resultativa sin asignar agente explícito, y el nombre divino יְהוָה se rinde como «Yahvé». No se introdujeron revisiones adicionales respecto del pasaje base en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Faraón» con mayúscula como nombre/título propio de acuerdo con el uso bíblico en español.
  - «Dios» se usa en singular, conforme al referente contextual singular del hebreo y del inglés auditado.
  - La puntuación reproduce el contraste narrativo entre la declaración de los magos y la reacción de Faraón.
  - Se evitó «SEÑOR» para יְהוָה, siguiendo la terminología propia del proyecto.
  - «No les escuchó» conserva una construcción idiomática natural en español y no fuerza una interpretación de obediencia que el hebreo no expresa explícitamente.
