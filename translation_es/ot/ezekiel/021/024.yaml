review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: Ezequiel debe preparar dos caminos para la espada del rey de Babilonia, ambos saliendo de un mismo punto de origen, y hacer una señal/indicador en la cabecera del camino hacia la ciudad. Sin embargo, hay dos problemas de fidelidad formal y claridad: el anclaje de notas está invertido respecto del contenido de las notas, y ''ambas saldrán'' no concuerda con ''dos caminos'' en español, además de que la justificación gramatical dada es incorrecta.'
  spanish_quality_summary: El español es mayormente natural y digno, pero 'en la cabeza del camino' suena algo calcado; aunque puede tolerarse por cercanía formal, 'al comienzo del camino' queda mejor como alternativa en nota, no necesariamente en el texto principal. El problema principal de calidad es la discordancia de género en 'ambas' con 'caminos'. También conviene hacer que la nota sobre יָד esté anclada en 'señal' y la nota sobre la ubicación esté anclada en la frase correspondiente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'hijo de hombre', 'espada', 'rey de Babilonia' y 'ciudad' son compatibles con el rastro auditado. La elección 'señal' para יָד es aceptable en español, aunque 'señal indicadora' o 'poste indicador' serían más explícitos; la nota preserva la alternativa lexical necesaria.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en lugares equivocados.
    rationale: La nota a explica el hebreo יָד ('mano' > marcador/señal), pero en el borrador está anclada en 'tú' en vez de en 'señal'. La nota b explica la alternativa de 'en la cabeza/al comienzo del camino', pero está anclada en 'señal' en vez de en la frase locativa pertinente. Esto rompe la trazabilidad exigida por el audit trail.
  - severity: high
    issue: Discordancia gramatical en 'ambas saldrán' con el antecedente 'dos caminos'.
    rationale: En español, 'caminos' es masculino plural, así que debe ser 'ambos' o 'los dos'. La explicación incluida en las decisiones léxicas, que defiende femenino, es gramaticalmente errónea y afecta la legibilidad.
  - severity: medium
    issue: La nota a del borrador incluye comillas y redacción poco natural.
    rationale: 'Puede expresarse de forma más limpia en español: ''Hebreo: "mano" aquí probablemente significa...'' sin comillas duplicadas ni puntuación torpe.'
  revised_spanish_text: Y tú, hijo de hombre, pon para ti dos caminos para que venga la espada del rey de Babilonia; ambos saldrán de una sola tierra. Y haz una señal[a]; hazla en la cabeza del camino hacia la ciudad[b].
