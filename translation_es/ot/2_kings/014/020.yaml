translation:
  language: es
  text: Lo llevaron en caballos[a], y fue sepultado en Jerusalén con sus padres[b], en la ciudad de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre los caballos». La expresión hebrea es literal y puede describir el traslado del cuerpo por medio de caballos.
    reason: lexical_alternative
  - marker: b
    text: «Con sus padres» es una fórmula funeraria tradicional; significa que fue sepultado con sus antepasados reales.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  english_pob_choice: They carried
  chosen_spanish: Lo llevaron
  alternatives_spanish:
  - Lo cargaron
  - Lo transportaron
  lexicon: HALOT
  rationale: נשא aquí expresa llevar o transportar al difunto; «lo llevaron» es natural en español y conserva la acción concreta sin forzar un tecnicismo.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: Pronombre de objeto directo
  rationale: El objeto directo masculino singular corresponde a «lo» en español; mantiene la referencia a Amasías sin redundancia.
- source_word: עַל הַסּוּסִים
  english_pob_choice: on the horses
  chosen_spanish: sobre caballos
  alternatives_spanish:
  - a caballo
  - en caballos
  - sobre los caballos
  lexicon: HALOT
  rationale: La preposición עַל con הַסּוּסִים se conserva de modo bastante literal como «sobre caballos». Aunque suena algo inusual, refleja la imagen hebrea de transporte montado o en vehículo tirado por caballos; «a caballo» sería más idiomático pero menos transparente.
- source_word: וַיִּקָּבֵר
  english_pob_choice: and he was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - lo sepultaron
  lexicon: HALOT
  rationale: El nifal pasivo pide una forma pasiva en español. «Fue sepultado» conserva el registro digno y la voz pasiva del hebreo.
- source_word: בִּירוּשָׁלָםִ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: Topónimo
  rationale: Topónimo estándar en español, sin ajustes interpretativos.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres reales
  lexicon: HALOT
  rationale: Se conserva la fórmula funeraria, pero en español «padres» no comunica con claridad la referencia dinástica. Por eso se elige «sus padres» como reproducción formal de la expresión, dejando la fuerza tradicional de linaje/antepasados para la nota.
- source_word: בְּעִיר דָּוִד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la Ciudad de David
  lexicon: Topónimo
  rationale: Se mantiene la designación tradicional del lugar de entierro dentro de Jerusalén, con minúscula por funcionar como descriptor toponímico en la frase.
theological_decisions:
- issue: Fórmula funeraria «with his fathers»
  english_pob_reading: A conventional burial formula, meaning he was buried with his royal ancestors.
  chosen_spanish_reading: Fórmula funeraria tradicional que indica entierro en la sepultura dinástica/ancestral.
  alternative_spanish_readings:
  - con sus antepasados
  - con sus padres reales
  rationale: En español, «con sus padres» puede sonar biológicamente estrecho. Sin embargo, el hebreo transmite una fórmula fija de sepultura con los antepasados reales; por eso se conserva la cercanía formal en el texto y se explicita el sentido dinástico en la nota.
  doctrine_reference: Uso formular del AT sobre sepultura real y linaje dinástico
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el artículo en «on horses» para reflejar mejor el hebreo. En español se siguió la misma decisión al evitar «sobre los caballos» en el texto principal y dejar la alternativa literal en nota.
  spanish_consistency_notes:
  - Se usó «sepultado» por su dignidad y equivalencia pasiva, manteniendo un registro bíblico sobrio.
  - «Ciudad de David» se conservó como topónimo tradicional sin añadir explicaciones al texto principal.
  - Se evitó «SEÑOR» o cualquier sustitución teológica, pues el verso no contiene el nombre divino explícito.
  - La nota de «sus padres» resuelve la tensión entre literalidad y claridad dinástica en español.
