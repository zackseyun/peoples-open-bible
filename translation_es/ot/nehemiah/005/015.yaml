  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: gobernadores anteriores, cargas/exacciones, pan y vino además de cuarenta siclos de plata, subordinados que ejercían autoridad, y el contraste de Nehemías motivado por el temor de Dios. Sin embargo, varias formulaciones en español no son las más fieles ni naturales para el valor del hebreo.'
  spanish_quality_summary: 'El texto es entendible, pero contiene giros poco idiomáticos o torpes en español bíblico actual: «cargaron pesadamente sobre el pueblo», «tomaron de ellos», «dominaban sobre el pueblo» y «yo no hice así». Conviene pulirlos para mejor legibilidad sin perder cercanía al original.'
  glossary_alignment: 'La terminología clave está mayormente alineada: «gobernadores», «pan y vino», «siclos de plata», y «temor de Dios» preservan bien el sentido y la decisión teológica del POB. No hay conflicto con los defaults del proyecto. Sí conviene ajustar «servidores» a «sirvientes» o mejor mantener «sirvientes»/«subordinados» en nota, porque la nota actual ofrece «sirvientes» como alternativa a un término base menos natural en este contexto.'
  issues:
