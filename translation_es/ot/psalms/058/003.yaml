translation:
  language: es
  text: Aun en vuestro corazón cometéis injusticia; sobre la tierra[a] vuestras manos pesan[b] violencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la tierra» en vez de «sobre la tierra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «miden» o «miden y distribuyen» violencia. El verbo hebreo puede llevar la idea de pesar o medir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: Even
  chosen_spanish: Sí, aun
  alternatives_spanish:
  - También
  - Incluso
  lexicon: HALOT
  rationale: El hebreo usa אַף como partícula enfática que intensifica la acusación. «Aun» conserva mejor la idea de extensión y sorpresa moral que un simple «también».
- source_word: בְּלֵב
  english_pob_choice: in your heart
  chosen_spanish: en vuestro corazón
  alternatives_spanish:
  - en el corazón
  - desde vuestro corazón
  lexicon: HALOT
  rationale: Se mantiene el valor locativo de בְּ y el singular «corazón» como sede interior de intención moral, dirigido al plural.
- source_word: עוֹלֹת
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - iniquidades
  - injusticias
  lexicon: HALOT
  rationale: עוֹלֹת designa lo moralmente torcido o injusto; «injusticia» refleja bien el campo semántico y el tono judicial del salmo.
- source_word: תִּפְעָלוּן
  english_pob_choice: you work
  chosen_spanish: cometéis
  alternatives_spanish:
  - hacéis
  - obráis
  - trabajáis
  lexicon: HALOT
  rationale: El verbo פעל implica hacer/obrar con intención. «Cometéis» comunica en español la realización culpable de la injusticia sin perder el carácter activo del verbo.
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el país
  - en la tierra
  lexicon: HALOT
  rationale: «Sobre la tierra» conserva la imagen espacial amplia del hebreo y funciona bien en contraste con el interior del corazón.
- source_word: חֲמַס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - agravio
  - violencia y opresión
  lexicon: HALOT
  rationale: חמס suele denotar violencia o daño violento; «violencia» es la equivalencia más directa y estable.
- source_word: יְדֵיכֶם
  english_pob_choice: your hands
  chosen_spanish: vuestras manos
  alternatives_spanish:
  - sus manos
  - las manos de ustedes
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de las manos como símbolo de agencia y acción culpable.
- source_word: תְּפַלֵּסוּן
  english_pob_choice: weigh out
  chosen_spanish: pesan
  alternatives_spanish:
  - miden
  - pesan y distribuyen
  - ponderan
  lexicon: HALOT
  rationale: פלס puede significar pesar o medir; «pesan» mantiene la metáfora de balanza y la ironía de que sus manos «pesan» violencia en vez de justicia.
theological_decisions:
- issue: Metáfora judicial del último hemistiquio
  english_pob_reading: weigh out violence
  chosen_spanish_reading: pesan violencia
  alternative_spanish_readings:
  - miden violencia
  - reparten violencia
  - pesan y distribuyen violencia
  rationale: La imagen no es meramente de hacer violencia, sino de dispensarla con falsa medida o juicio. «Pesan» conserva la ironía del hebreo y el trasfondo forense del salmo.
  doctrine_reference: Poética bíblica; justicia/juicio en los Salmos
- issue: Tensión entre "tierra" y "país"
  english_pob_reading: on the earth
  chosen_spanish_reading: sobre la tierra
  alternative_spanish_readings:
  - en la tierra
  - en el país
  rationale: El hebreo admite una lectura más amplia que un territorio nacional. «Sobre la tierra» preserva el alcance general sin forzar una localización política.
  doctrine_reference: Poética bíblica; semántica de ארץ
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el sentido auditado en la POB inglesa: partícula enfática, interioridad moral, y la metáfora judicial de pesar/medir violencia. Se optó por una formulación publicable en español que conserva la acusación directa y el paralelismo poético.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «injusticia» para עוֹלֹת conforme al valor moral-jurídico del término.
  - Se conserva la metáfora de balanza en «pesan» para no perder la ironía del verbo פלס.
  - «Sobre la tierra» es una elección estilística equivalente a «en la tierra» y queda documentada en nota.
