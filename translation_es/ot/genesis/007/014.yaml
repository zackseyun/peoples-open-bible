    text: Lit. ‘todo pájaro, toda ala’. El hebreo usa una clasificación apposicional para enfatizar a todas las aves aladas.
    reason: lexical_alternative
  revision_rationale: 'Se conserva la estructura enumerativa y las distinciones taxonómicas del hebreo, pero se corrige el cierre final para que el texto principal sea español natural y fiel al sentido: ‘toda ave alada’ comunica la idea de כֹּל צִפּוֹר כָּל כָּנָף mejor que ‘todo pájaro, toda ala’. La literalidad importante se preserva en nota, en línea con la práctica del English POB auditado. Se elimina la nota innecesaria sobre ‘ellos’.'
