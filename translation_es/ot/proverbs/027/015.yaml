translation:
  language: es
  text: Una gotera constante en un día de lluvia fuerte[a], y una esposa pendenciera, son semejantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un día lluvioso»; el hebreo describe una condición de lluvia persistente o intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּלֶף
  english_pob_choice: dripping
  chosen_spanish: gotera
  alternatives_spanish:
  - goteo
  - goteo continuo
  lexicon: HALOT
  rationale: El término apunta a agua que cae repetidamente y molesta desde un techo o una filtración continua. «Gotera» es más natural en español que «goteo» en este dicho, y conserva la imagen doméstica de molestia persistente.
- source_word: טוֹרֵד
  english_pob_choice: constant
  chosen_spanish: constante
  alternatives_spanish:
  - continua
  - sin cesar
  lexicon: HALOT
  rationale: El participio expresa acción durativa. En español, «constante» funciona como adjetivo natural con «gotera» y mantiene la idea de repetición incesante.
- source_word: בְּיוֹם
  english_pob_choice: on a day of
  chosen_spanish: en un día de
  alternatives_spanish:
  - en el día de
  - durante un día de
  lexicon: HALOT
  rationale: La frase temporal se entiende de manera directa y concreta. «En un día de» conserva el marco situacional del proverbio sin volverlo abstracto.
- source_word: סַגְרִיר
  english_pob_choice: heavy rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - lluvia intensa
  - aguacero
  - lluvia torrencial
  lexicon: HALOT
  rationale: El sustantivo describe una condición lluviosa, tempestuosa o de lluvia densa. En español, el contraste proverbial se mantiene con «lluvia»; el adjetivo implícito en el contexto puede variar según la claridad deseada. Se deja la imagen abierta para no sobrerrepresentar el matiz con una sola calificación.
- source_word: אֵשֶׁת מִדְיָנִים
  english_pob_choice: a quarrelsome wife
  chosen_spanish: una esposa pendenciera
  alternatives_spanish:
  - una esposa contenciosa
  - una esposa de pleitos
  - una mujer pendenciera
  lexicon: HALOT
  rationale: La construcción literalmente significa «una esposa de pleitos/disputas». «Pendenciera» comunica bien la caracterización relacional en español y evita endurecer innecesariamente el texto con un giro demasiado jurídico; «esposa» conserva el vínculo del sustantivo hebreo.
- source_word: נִשְׁתָּוָה
  english_pob_choice: are alike
  chosen_spanish: son semejantes
  alternatives_spanish:
  - son iguales
  - son comparables
  - son lo mismo
  lexicon: HALOT
  rationale: El verbo expresa equivalencia o semejanza. «Son semejantes» preserva la comparación proverbial con un registro natural y evita exagerar la identidad absoluta que en español podría sonar más fuerte que el hebreo.
translation_notes:
  revision_awareness: La versión inglesa auditada entendió el proverbio como comparación proverbial entre dos molestias persistentes. En español se mantuvo esa equivalencia sin convertir la segunda cola en una equivalencia demasiado absoluta; además, se preservó la imagen doméstica concreta de la gotera y el entorno lluvioso.
  spanish_consistency_notes:
  - Se mantuvo «esposa» para reflejar fielmente אֵשֶׁת, aunque en español moderno puede sonar más marcado que «mujer»; aquí el paralelismo con la esposa de la cláusula proverbial lo justifica.
  - No se introdujo «Cristo», «Yahvé» ni otras terminologías teológicas porque el versículo no las contiene.
  - Se evitó «contenciosa» como único término principal para no sonar excesivamente formal; «pendenciera» conserva la fuerza coloquial del proverbio sin volverlo vulgar.
