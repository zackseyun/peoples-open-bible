id: ROM.16.25
reference: Romans 16:25
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τῷ δὲ δυναμένῳ ὑμᾶς στηρίξαι κατὰ τὸ εὐαγγέλιόν μου καὶ τὸ κήρυγμα Ἰησοῦ Χριστοῦ, κατὰ ἀποκάλυψιν μυστηρίου χρόνοις αἰωνίοις σεσιγημένου,
base_translation:
  language: en
  yaml_path: translation/nt/romans/016/025.yaml
  text: Now to him who is able to strengthen you according to my gospel and the preaching of Jesus Messiah, according to the revelation of the mystery kept secret for long ages,
translation:
  language: ko
  text: 여러분을 굳건히 세우실 수 있는 분께 영광을 돌립니다. 곧 나의 복음과 예수 메시아의 선포를 따라, 또한 영원한 시대로부터 감추어졌던 비밀의 계시를 따라,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τῷ δὲ δυναμένῳ ὑμᾶς στηρίξαι
  english_pob_choice: to him who is able to strengthen you
  chosen_korean: 여러분을 굳건히 세우실 수 있는 분께
  alternatives_korean:
  - 여러분을 능히 굳건히 하실 수 있는 분께
  lexicon: BDAG
  rationale: στηρίζω의 「견고히 세우다」.
- source_word: '[implied verb]'
  english_pob_choice: '[Now to him ...]'
  chosen_korean: 영광을 돌립니다
  alternatives_korean:
  - 영광이 있기를 빕니다
  lexicon: BDAG
  rationale: 16:25-27은 하나의 송영 구조로 16:27에서 동사 「영광」이 나타난다. 한국어 자연스러움을 위해 25절에서 「영광을 돌립니다」를 미리 보충하여 송영 구조를 가독적으로 만든다.
- source_word: τὸ εὐαγγέλιόν μου καὶ τὸ κήρυγμα Ἰησοῦ Χριστοῦ
  english_pob_choice: my gospel and the preaching of Jesus Messiah
  chosen_korean: 나의 복음과 예수 메시아의 선포
  lexicon: BDAG
  rationale: 정형.
- source_word: κατὰ ἀποκάλυψιν μυστηρίου
  english_pob_choice: according to the revelation of the mystery
  chosen_korean: 비밀의 계시를 따라
  lexicon: BDAG
  rationale: 직역.
- source_word: χρόνοις αἰωνίοις σεσιγημένου
  english_pob_choice: kept secret for long ages
  chosen_korean: 영원한 시대로부터 감추어졌던
  alternatives_korean:
  - 오랜 세대 동안 감추어졌던
  lexicon: BDAG
  rationale: σεσιγημένου는 완료 분사 「침묵 속에 두어졌던」. 한국 성경 정형 「감추어졌던」.
