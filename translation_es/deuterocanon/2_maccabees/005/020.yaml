    issue: «el gran Dueño» para μεγάλου δεσπότου
    rationale: Aunque intenta reflejar la autoridad absoluta de δεσπότης, en español neutral eclesial «Dueño» puede sonar coloquial o material, y no comunica tan bien un título divino solemne. «Gran Soberano» conserva mejor la distinción frente a κύριος y la dignidad del contexto.
  revised_spanish_text: Por tanto, incluso el lugar mismo[a], después de participar en las desgracias de la nación, más tarde también participó en sus beneficios; y aunque había sido alcanzado por la ira del Todopoderoso, de nuevo fue restaurado con toda gloria en la reconciliación del gran Soberano[b].
