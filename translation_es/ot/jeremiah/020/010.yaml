translation:
  language: es
  text: 'Porque he oído la murmuración de muchos: «¡Terror por todos lados! ¡Reporten[a], y lo reportaremos!». Todos los hombres en paz conmigo están vigilando mi tropiezo[b]: «Quizá sea engañado, y prevaleceremos contra él, y tomaremos venganza de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Denúncienlo, y lo denunciaremos». El verbo hebreo significa «decir, declarar, informar»; en este contexto hostil también puede tener el sentido de denuncia.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «vigilando mi costado» o «vigilando mi cojera». La imagen probablemente apunta a una debilidad, un traspié o una caída.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבַּת רַבִּים
  english_pob_choice: the whispering of many
  chosen_spanish: la murmuración de muchos
  alternatives_spanish:
  - el murmullo de muchos
  - la difamación de muchos
  - la mala fama de muchos
  lexicon: HALOT
  rationale: דִּבַּת puede expresar rumor, murmuración o hablar difamatorio; en este contexto hostil, «murmuración» conserva el matiz furtivo y malicioso sin volverlo demasiado técnico. רַבִּים se mantiene como «muchos» para conservar el alcance social amplio del rumor.
- source_word: מָגוֹר מִסָּבִיב
  english_pob_choice: Terror on every side
  chosen_spanish: ¡Terror por todos lados!
  alternatives_spanish:
  - ¡Terror por todas partes!
  - ¡Terror de todos lados!
  lexicon: HALOT
  rationale: La fórmula jeremiana se reconoce mejor como una exclamación breve e intensa. «Por todos lados» comunica la idea de cerco y conserva el tono proverbial de la expresión.
- source_word: הַגִּידוּ וְנַגִּידֶנּוּ
  english_pob_choice: Report, and let us report it
  chosen_spanish: Denuncien[a], y lo denunciaremos
  alternatives_spanish:
  - Reporten, y lo reportaremos
  - Díganlo, y lo diremos
  - Denuncien, y denunciaremos eso
  lexicon: HALOT
  rationale: 'El hifil de נגד significa decir, declarar, reportar. En este contexto hostil, «denunciar» expresa mejor la intención acusatoria implícita que un mero «reportar». Se conserva la tensión: el hebreo puede ser simplemente «decir/ informar», pero aquí el habla es claramente dañina.'
- source_word: כֹּל אֱנוֹשׁ שְׁלוֹמִי
  english_pob_choice: All the men at peace with me
  chosen_spanish: Todos los hombres en paz conmigo
  alternatives_spanish:
  - Todos los hombres de mi paz
  - Todos mis amigos
  - Todos los que estaban en buenos términos conmigo
  lexicon: HALOT
  rationale: La expresión hebrea alude a quienes estaban en relación pacífica o amistosa con el hablante. «En paz conmigo» conserva el giro relacional sin suavizarlo a un simple «amigos», y «hombres» mantiene el valor colectivo y masculino de אֱנוֹשׁ.
- source_word: שֹׁמְרֵי צַלְעִי
  english_pob_choice: watching for my stumbling
  chosen_spanish: están vigilando mi tropiezo[b]
  alternatives_spanish:
  - están vigilando mi cojera
  - están vigilando mi costado
  - están vigilando mi caída
  lexicon: HALOT
  rationale: צַלְעִי puede sugerir lado, debilidad, cojera o tropiezo. «Tropiezo» transmite bien la idea de esperar una falla o caída, sin perder la imagen de una vulnerabilidad observada por enemigos. La nota preserva la alternativa más literal.
- source_word: יְפֻתֶּה
  english_pob_choice: he will be deceived
  chosen_spanish: él será engañado
  alternatives_spanish:
  - él será seducido
  - él será persuadido
  - él será inducido a error
  lexicon: HALOT
  rationale: El verbo פתה puede significar seducir, persuadir o engañar. En este escenario de trampa, «engañado» comunica con claridad la intención de los conspiradores y encaja con el paralelo inmediato.
- source_word: וְנ֣וּכְלָה לוֹ
  english_pob_choice: and we will prevail against him
  chosen_spanish: y prevaleceremos contra él
  alternatives_spanish:
  - y podremos contra él
  - y lo venceremos
  - y saldremos victoriosos contra él
  lexicon: HALOT
  rationale: יכל expresa poder, ser capaz o prevalecer. «Prevaleceremos contra él» conserva la fuerza adversativa y suena natural en español bíblico contemporáneo.
- source_word: וְנִקְחָה נִקְמָתֵנוּ מִמֶּנּוּ
  english_pob_choice: and we will take our vengeance on him
  chosen_spanish: y tomaremos nuestra venganza de él
  alternatives_spanish:
  - y tomaremos venganza de él
  - y nos vengaremos de él
  - y haremos justicia con él
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «tomar nuestra venganza de él». Se mantiene «venganza» para no suavizar la gravedad del rencor activo, y «de él» refleja de cerca el régimen preposicional del hebreo aun cuando en español suene menos idiomático que «sobre él».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó la cláusula a «Report, and let us report it» para alinearla más de cerca con el imperativo hebreo sin añadir un objeto explícito al primero. En español se reflejó esa misma economía con «Denuncien, y lo denunciaremos», manteniendo el carácter del mandato y la alusión implícita al objeto. También se preservó la nota sobre צַלְעִי como imagen de vulnerabilidad corporal o tropiezo.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma general en la serie POB, pero este versículo no contiene el Tetragrámaton.
  - Se evitó «SEÑOR» por ser una convención de ocultamiento que no corresponde a este proyecto.
  - Se mantuvo «venganza» por fidelidad al sustantivo נִקְמָה y al tono judicial/hostil del pasaje.
  - «Denuncien» se prefirió a «reporten» porque el contexto hace explícita la intención acusatoria, aunque la nota conserva la alternativa literal.
  - La puntuación en dos segmentos citados sigue el contraste retórico del hebreo y la práctica del POB inglés.
