translation:
  language: es
  text: Cuántas veces pase[a], los atrapará; porque mañana tras mañana pasará, de día y de noche[b]; y será puro terror entender el mensaje.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Siempre que pase, los atrapará».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no será más que terror entender el mensaje»; algunos traducen «oír el mensaje», uniendo estrechamente el entender con lo oído.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִדֵּי
  english_pob_choice: As often as
  chosen_spanish: Cuantas veces
  alternatives_spanish:
  - Siempre que
  - Cada vez que
  lexicon: HALOT
  rationale: El modismo iterativo expresa repetición frecuente; «cuantas veces» conserva esa reiteración de manera natural en español sin perder el valor distributivo.
- source_word: עָבְרוֹ
  english_pob_choice: it passes through
  chosen_spanish: pase
  alternatives_spanish:
  - pase a través
  - cruce
  lexicon: HALOT
  rationale: El verbo עבר aquí conserva la imagen de un paso/invasión repetida; «pase» sigue el movimiento sin añadir paráfrasis excesiva, y el contexto ya identifica el agente implícito.
- source_word: יִקַּח אֶתְכֶם
  english_pob_choice: it will seize you
  chosen_spanish: os atrapará
  alternatives_spanish:
  - os tomará
  - os capturará
  lexicon: HALOT
  rationale: לקח puede ser «tomar», pero en contexto de juicio hostil la idea es de captura/aprehensión. «Atrapará» comunica esa fuerza con naturalidad en español y sin suavizar el sentido.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: morning by morning
  chosen_spanish: mañana tras mañana
  alternatives_spanish:
  - cada mañana
  - mañana por mañana
  lexicon: HALOT
  rationale: La repetición hebrea es distributiva; «mañana tras mañana» preserva el paralelismo y el efecto de insistencia mejor que una forma más plana.
- source_word: יַעֲבֹר
  english_pob_choice: it will pass through
  chosen_spanish: pasará
  alternatives_spanish:
  - pasará a través
  - cruzará
  lexicon: HALOT
  rationale: Se mantiene la coherencia con el primer עבר del versículo; en español, «pasará» basta para transmitir el desplazamiento reiterado sin introducir un objeto explícito no exigido por el hebreo.
- source_word: בַּיּוֹם וּבַּלָּיְלָה
  english_pob_choice: by day and by night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - en el día y en la noche
  - día y noche
  lexicon: HALOT
  rationale: La merismia señala continuidad total; «de día y de noche» es la forma más idiomática y fiel en español.
- source_word: וְהָיָה
  english_pob_choice: and it will be
  chosen_spanish: y será
  alternatives_spanish:
  - y habrá
  - y acontecerá
  lexicon: HALOT
  rationale: Se conserva la simple secuencia resultativa del hebreo con una futura copulativa clara y natural.
- source_word: רַק
  english_pob_choice: sheer
  chosen_spanish: puro
  alternatives_spanish:
  - nada más que
  - solo
  lexicon: HALOT
  rationale: Aquí רַק intensifica la frase excluyendo cualquier otra reacción; «puro» reproduce esa fuerza enfática de manera idiomática en español.
- source_word: זְוָעָה
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - horror
  - espanto
  lexicon: HALOT
  rationale: El sustantivo denota un temor abrumador; «terror» mantiene la intensidad del juicio.
- source_word: הָבִין
  english_pob_choice: to understand
  chosen_spanish: entender
  alternatives_spanish:
  - comprender
  - discernir
  lexicon: HALOT
  rationale: El infinitivo de בין se traduce de manera directa con «entender», que es claro y conserva el vínculo con lo oído/recibido en el siguiente sustantivo.
- source_word: שְׁמוּעָה
  english_pob_choice: the message
  chosen_spanish: el mensaje
  alternatives_spanish:
  - el reporte
  - la noticia
  lexicon: HALOT
  rationale: שְׁמוּעָה puede ser noticia, reporte o mensaje. «Mensaje» sigue la revisión inglesa y funciona mejor en español para un contenido comunicado sin formalizarlo como «reporte».
theological_decisions:
- issue: Pronombre implícito de tercera persona singular en los verbos hebreos
  english_pob_reading: Render with impersonal 'it' referring to the overflowing scourge/judgment from the immediate context.
  chosen_spanish_reading: Mantener un sujeto implícito impersonal en español, apoyado por el contexto inmediato del juicio desbordante.
  alternative_spanish_readings:
  - «el azote desbordante os atrapará»
  - «él os atrapará»
  rationale: El antecedente está en el contexto anterior; en español puede mantenerse la referencia implícita sin añadir material explicativo al versículo. Así se conserva la cohesión textual y la economía del hebreo.
  doctrine_reference: Isaías 28:18-19, continuidad contextual del juicio
- issue: 'Cláusula final difícil: miedo ligado a entender o recibir el mensaje'
  english_pob_reading: Retain the difficult Hebrew sense that understanding/hearing the report brings terror, rather than smoothing to an interpretive paraphrase.
  chosen_spanish_reading: Conservar que entender el mensaje será terrorífico, sin resolver la ambigüedad en una paráfrasis explicativa.
  alternative_spanish_readings:
  - «y será puro terror oír el mensaje»
  - «y el mensaje mismo será puro terror»
  rationale: El hebreo es comprimido y admite la relación entre entender/oír y el terror. La traducción mantiene esa tensión sin eliminarla ni convertirla en una explicación doctrinal ajena al texto.
  doctrine_reference: Principio de equivalencia óptima y respeto a la tensión del texto
- issue: Registro de 'YHWH' no aparece explícito en este versículo
  english_pob_reading: No masking convention needed here; the verse lacks the divine name.
  chosen_spanish_reading: No aplicar convención de sustitución, porque no aparece el Tetragrámaton en el versículo.
  rationale: Se evita introducir terminología teológica no requerida por el hebreo de este versículo.
  doctrine_reference: Norma editorial POB sobre el nombre divino
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: ''message'' fue preferido sobre ''report''. También se mantuvo la lectura óptima-equivalente que conserva la reiteración de los verbos עבר y el final abrupto del versículo sin suavizarlo.'
  spanish_consistency_notes:
  - Se usó el tuteo reverencial plural «os» para concordar con el singular/plural implícito del contexto profético y con la tradición de registro bíblico en español.
  - Se evitó «SEÑOR» o «Yahvé» porque el versículo no contiene el nombre divino.
  - Se mantuvo una equivalencia consistente para עבר como movimiento repetido, sin alternar entre «pasar por» y «pasar a través» en este versículo.
  - Se optó por «mensaje» según la revisión del inglés auditado, y no por «reporte», para mejor naturalidad en español.
