translation:
  language: es
  text: Y aun nuestro ganado irá con nosotros; no quedará ni una pezuña, porque de nuestro ganado hemos de tomar para servir[a] a Yahvé nuestro Dios, y no sabemos con qué hemos de servir a Yahvé hasta que lleguemos allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "adorar a Yahvé nuestro Dios" / "con qué hemos de adorar a Yahvé". El verbo hebreo puede significar "servir" o, según el contexto, "adorar".
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְנֵנוּ
  english_pob_choice: our livestock
  chosen_spanish: nuestro ganado
  alternatives_spanish:
  - nuestra hacienda ganadera
  - nuestros animales de ganado
  lexicon: HALOT
  rationale: מִקְנֶה designa el conjunto de animales domesticados poseídos por la familia; en español "ganado" comunica bien ese sentido colectivo y es natural en registro bíblico.
- source_word: יֵלֵךְ עִמָּנוּ
  english_pob_choice: will go with us
  chosen_spanish: irá con nosotros
  alternatives_spanish:
  - irá junto con nosotros
  - nos acompañará
  lexicon: HALOT
  rationale: La forma hebrea expresa movimiento con compañía; "irá con nosotros" conserva esa sencillez y no añade matices ajenos.
- source_word: לֹא תִשָּׁאֵר פַּרְסָה
  english_pob_choice: not a hoof will be left behind
  chosen_spanish: no quedará una pezuña
  alternatives_spanish:
  - no quedará ni una pezuña
  - no quedará un solo casco
  lexicon: HALOT
  rationale: פַּרְסָה es literalmente la pezuña/parte hendida del pie del animal. "Pezuña" es el equivalente más directo; se mantiene la singular enfática como en el hebreo y el inglés POB.
- source_word: כִּי מִמֶּנּוּ נִקַּח
  english_pob_choice: for from them we must take
  chosen_spanish: porque de él hemos de tomar
  alternatives_spanish:
  - porque de ellos hemos de tomar
  - porque de eso hemos de tomar
  lexicon: HALOT
  rationale: El hebreo usa un pronombre singular colectivo que remite al ganado como conjunto. "De él" conserva esa referencia colectiva, aunque en español plural colectivo también sería posible. "Hemos de tomar" expresa obligación implícita sin agregar objeto no presente en el texto.
- source_word: לַעֲבֹד אֶת יְהוָה אֱלֹהֵינוּ
  english_pob_choice: to serve Yahweh our God
  chosen_spanish: para servir a Yahvé nuestro Dios
  alternatives_spanish:
  - para adorar a Yahvé nuestro Dios
  - para rendir servicio a Yahvé nuestro Dios
  lexicon: HALOT
  rationale: עבד con objeto divino puede significar servir o adorar. Se conserva "servir" para mantener la repetición con el segundo miembro del versículo y el sentido amplio de servicio cultual.
- source_word: וַאֲנַחְנוּ לֹא נֵדַע
  english_pob_choice: and we do not know
  chosen_spanish: y no sabemos
  alternatives_spanish:
  - y no sabremos
  - y no conocemos
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí expresa una situación presente relativa al futuro del viaje; el presente español es natural y fiel.
- source_word: מַה נַּעֲבֹד אֶת יְהוָה
  english_pob_choice: with what we must serve Yahweh
  chosen_spanish: con qué hemos de servir a Yahvé
  alternatives_spanish:
  - qué hemos de usar para servir a Yahvé
  - cómo hemos de servir a Yahvé
  lexicon: HALOT
  rationale: 'מַה funciona de modo instrumental en contexto: no se trata solo de "cómo", sino de "con qué" ofrecer el servicio requerido. "Hemos de" transmite la necesidad implícita.'
- source_word: עַד בֹּאֵנוּ שָׁמָּה
  english_pob_choice: until we arrive there
  chosen_spanish: hasta que lleguemos allí
  alternatives_spanish:
  - hasta que arribemos allí
  - hasta que vayamos allí
  lexicon: HALOT
  rationale: בוא con שָׁמָּה indica llegada al destino. "Lleguemos allí" es claro y mantiene el sentido de arribo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliteración del nombre divino como "Yahvé" y no sustitución por un título.'
theological_decisions:
- issue: Sentido de עבד en un contexto de exigencia sacrificial/cultual
  english_pob_reading: serve Yahweh our God
  chosen_spanish_reading: servir a Yahvé nuestro Dios
  alternative_spanish_readings:
  - adorar a Yahvé nuestro Dios
  - rendir culto a Yahvé nuestro Dios
  rationale: En este pasaje el servicio incluye la ofrenda requerida para el culto. "Servir" mantiene el rango semántico amplio del verbo hebreo y la repetición intencional del versículo, sin restringirlo solo a "adorar".
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que eliminó la expansión "what we need" por añadir palabras no presentes en el hebreo. Por eso la línea española conserva solo la idea de obligación implícita en "hemos de tomar" sin agregar complemento interpretativo extra.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" conforme al estándar del proyecto para יהוה.
  - Se eligió "servir" en ambos miembros del versículo para reflejar la repetición del hebreo y la decisión auditada en inglés.
  - '"Pezuña" conserva el singular enfático de לֹא תִשָּׁאֵר פַּרְסָה.'
  - '"Ganado" funciona como sustantivo colectivo equivalente a מִקְנֶה.'
