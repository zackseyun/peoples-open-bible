translation:
  language: es
  text: Y si alguien muere de repente junto a él[a], y contamina ritualmente su cabeza consagrada, entonces se rapará la cabeza el día de su purificación; el séptimo día se la rapará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la cabeza de su consagración». El hebreo dice literalmente: «si un muerto muere junto a él, de repente, de repente», un modismo que expresa una muerte abrupta e inesperada en su presencia inmediata.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La combinación conjuntiva-condicional introduce un caso dentro de la legislación nazarea. «Y si» conserva la conexión discursiva y la fuerza condicional sin volver la frase artificiosa en español.
- source_word: יָמ֨וּת מֵ֤ת
  english_pob_choice: someone dies
  chosen_spanish: alguien muere
  alternatives_spanish:
  - muere un muerto
  - muere una persona
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática con el verbo «morir» y el sustantivo «muerto». En español, «alguien muere» comunica con naturalidad el hecho sin perder el sentido de evento de muerte.
- source_word: עָלָיו
  english_pob_choice: beside him
  chosen_spanish: junto a él
  alternatives_spanish:
  - cerca de él
  - al lado de él
  lexicon: HALOT
  rationale: El valor aquí es proximidad inmediata en contexto de impureza por muerte, no mera localización general. «Junto a él» refleja esa cercanía presencial.
- source_word: בְּפֶתַע פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - de improviso
  lexicon: HALOT
  rationale: La expresión duplicada intensifica la idea de abrupto e inesperado. «De repente» transmite bien esa fuerza idiomática en español contemporáneo.
- source_word: וְטִמֵּא
  english_pob_choice: and he defiles
  chosen_spanish: y profana
  alternatives_spanish:
  - y contamina ritualmente
  - y hace impuro
  lexicon: HALOT
  rationale: En este contexto ritual, טמא expresa la transmisión de impureza. «Profana» mantiene el valor cultual en español bíblico amplio y evita una lectura meramente higiénica; aquí la profanación recae sobre la cabeza consagrada.
- source_word: רֹאשׁ נִזְרוֹ
  english_pob_choice: his consecrated head
  chosen_spanish: su cabeza consagrada
  alternatives_spanish:
  - la cabeza de su consagración
  - su cabeza de nazareato
  lexicon: HALOT
  rationale: נזר se refiere a la consagración nazarea ligada especialmente al cabello no cortado. «Cabeza consagrada» conserva el vínculo ritual entre cabeza/cabello y dedicación sin imponer una glosa más larga en el texto principal.
- source_word: וְגִלַּח רֹאשׁוֹ
  english_pob_choice: then he shall shave his head
  chosen_spanish: entonces se rapará la cabeza
  alternatives_spanish:
  - entonces se afeitará la cabeza
  - entonces rapará su cabeza
  lexicon: HALOT
  rationale: «Rapar» es el verbo más natural en español para el afeitado completo del cabello en un contexto ritual. El reflexivo impersonal «se rapará» preserva la norma legal sin forzar el sujeto explícito.
- source_word: בְּיוֹם טָהֳרָתוֹ
  english_pob_choice: on the day of his cleansing
  chosen_spanish: en el día de su purificación
  alternatives_spanish:
  - en el día de su limpieza
  - el día en que sea purificado
  lexicon: HALOT
  rationale: טהרה aquí es purificación ritual. «Purificación» es más preciso que «limpieza» y mantiene el registro cultual; en español, «día de su purificación» suena más natural en una norma ritual.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the seventh day
  chosen_spanish: al séptimo día
  alternatives_spanish:
  - en el séptimo día
  - el séptimo día
  lexicon: HALOT
  rationale: La referencia temporal es directa. «Al séptimo día» es una formulación idiomática clara y pública en español bíblico contemporáneo.
- source_word: יְגַלְּחֶנּוּ
  english_pob_choice: he shall shave it
  chosen_spanish: se la rapará
  alternatives_spanish:
  - la rapará
  - se lo rapará
  lexicon: HALOT
  rationale: El sufijo pronominal retoma «cabeza». En español, el objeto femenino concuerda con «cabeza», y el reflexivo mantiene el flujo legal de la instrucción sin repetir el sustantivo.
theological_decisions:
- issue: Cómo expresar la impureza ritual producida por la muerte
  english_pob_reading: and he defiles his consecrated head
  chosen_spanish_reading: y profana su cabeza consagrada
  alternative_spanish_readings:
  - y la hace impura
  - y contamina ritualmente su cabeza consagrada
  rationale: El verso trata de la interrupción de la consagración nazarea por contacto con la muerte. «Profana» mantiene el peso cultual del acto y deja visible que no se trata sólo de un estado sanitario, sino de una ruptura de santidad/consagración.
  doctrine_reference: Numbers 6:1-21; translation philosophy §§1, 5
- issue: Valor del término נזר en la frase 'cabeza de su consagración'
  english_pob_reading: his consecrated head
  chosen_spanish_reading: su cabeza consagrada
  alternative_spanish_readings:
  - la cabeza de su consagración
  - su cabeza de nazareato
  rationale: La tensión léxica entre cabeza, cabello y consagración debe seguir presente. «Cabeza consagrada» preserva la idea cultual sin sobreexplicar el título del voto en el cuerpo principal, aunque la nota deja abierta la alternativa literal.
  doctrine_reference: Numbers 6:5-8; translation philosophy §§2, 5
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios sustanciales en la revisión más reciente; la decisión española sigue de cerca la lectura inglesa aprobada, pero ajusta a un español bíblico natural con la misma trazabilidad léxica y ritual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - «Purificación» se usa en sentido ritual, no moral.
  - «Rapar» se prefiere para el corte total del cabello en contexto nazareo.
  - La concordancia pronominal se resolvió con «la» para «cabeza», aunque el hebreo usa sufijo masculino para el sustantivo cabeza.
