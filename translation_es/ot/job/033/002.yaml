translation:
  language: es
  text: 'Mira ahora[a]: he abierto mi boca; mi lengua habla en mi paladar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí, por favor, he abierto mi boca; mi lengua habla en mi boca». El hebreo es muy vívido y algo inusual en la última cláusula.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira ahora!
  - ¡He aquí!
  lexicon: HALOT
  rationale: La partícula deíctica introduce atención inmediata. «¡Mira!» conserva la fuerza discursiva en español moderno y evita una solemnidad innecesaria de «He aquí». Se mantiene el matiz de llamado a escuchar lo que sigue.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - sí
  lexicon: HALOT
  rationale: Aquí la partícula añade urgencia o insistencia, no una petición cortés. «Ahora» reproduce mejor esa fuerza pragmática que «por favor».
- source_word: פָּתַחְתִּי פִי
  english_pob_choice: I have opened my mouth
  chosen_spanish: he abierto mi boca
  alternatives_spanish:
  - abro mi boca
  - he comenzado a hablar
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para comenzar a hablar. El perfecto español mantiene la vividez de la apertura verbal y evita una paráfrasis más explícita que debilitaría el paralelismo.
- source_word: דִּבְּרָה
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - ha hablado
  - dice
  lexicon: HALOT
  rationale: El contexto poético y la revisión inglesa favorecen el presente, no el pasado. «Habla» refleja la forma verbal como acción actual y conserva la correspondencia con la línea anterior.
- source_word: לְשׁוֹנִי
  english_pob_choice: my tongue
  chosen_spanish: mi lengua
  alternatives_spanish:
  - mi lengua
  lexicon: HALOT
  rationale: Se conserva literalmente el órgano de la habla como metonimia poética. «Lengua» es el equivalente natural en español y mantiene el paralelismo con «mi boca».
- source_word: בְחִכִּי
  english_pob_choice: in my palate
  chosen_spanish: en mi paladar
  alternatives_spanish:
  - en mi boca
  - de mi paladar
  lexicon: HALOT
  rationale: «Paladar» es el equivalente preciso de חֵךְ y preserva la imagen concreta y algo inusual del hebreo. «En mi boca» es más fluido, pero suaviza una tensión imagética que el POB inglés decidió retener.
translation_notes:
  revision_awareness: 'Se siguió el ajuste del estado más reciente del inglés POB: la segunda cláusula se entiende en presente («habla») para reflejar mejor la forma hebrea y el paralelismo. También se mantuvo la imagen concreta de «paladar», aunque en español puede sonar más marcada que «boca», porque el audit trail la conserva como opción preferida.'
  spanish_consistency_notes:
  - Se usa «boca» para פֶּה y «lengua» para לָשׁוֹן, pero se conserva «paladar» para חֵךְ por fidelidad imagística.
  - La exclamación inicial ayuda a reproducir el valor deíctico e interjectivo de הִנֵּה.
  - No se añadió terminología teológica especial porque el versículo es una auto-presentación retórica de habla.
