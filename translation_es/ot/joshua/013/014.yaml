  to: Solo a la tribu de Leví no dio heredad[a]; las ofrendas hechas por fuego a Yahvé, Dios de Israel, son su heredad[b], como le dijo.
  rationale: Se corrige אִשֵּׁי con una expresión española más fiel y natural ('ofrendas hechas por fuego') en lugar de 'ofrendas encendidas'. También se ajusta el cierre a 'como le dijo' para reflejar mejor דִּבֶּר sin añadir matices innecesarios. Se pulen las notas para español más idiomático y mejor alineación con el audit trail.
