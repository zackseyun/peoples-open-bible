translation:
  language: es
  text: No retengas la disciplina al muchacho[a], porque si lo golpeas con la vara[b], no morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «niño» o «joven». El sustantivo hebreo puede referirse a un muchacho o a una persona joven en sentido más amplio; el texto principal mantiene la forma masculina singular del proverbio.
    reason: lexical_alternative
  - marker: b
    text: El proverbio afirma que esta corrección no es, en sí misma, mortal; no debe leerse como aprobación general de violencia abusiva ni como una garantía absoluta en todos los casos.
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּמְנַע
  english_pob_choice: Do not withhold
  chosen_spanish: No retengas
  alternatives_spanish:
  - No niegues
  - No apartes
  - No prives
  lexicon: WLC/HALOT
  rationale: El verbo hebreo expresa la idea de impedir o retener algo debido. «Retengas» conserva la fuerza prohibitiva y suena natural en español, sin perder el matiz de privar de algo necesario.
- source_word: מִנַּעַר
  english_pob_choice: from a boy
  chosen_spanish: al muchacho
  alternatives_spanish:
  - al niño
  - al joven
  - al muchacho joven
  lexicon: WLC/HALOT
  rationale: נַעַר puede abarcar muchacho, joven o niño. En español, «muchacho» mantiene un masculino singular natural y transmite bien el referente representativo del proverbio, sin estrecharlo demasiado a una edad exacta.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: la disciplina
  alternatives_spanish:
  - la corrección
  - la instrucción
  - el entrenamiento
  lexicon: WLC/HALOT
  rationale: En Proverbios, מוּסָר suele referirse a disciplina correctiva y formativa, no solo a enseñanza verbal. «La disciplina» preserva ese campo semántico y encaja con la imagen inmediata de la vara.
- source_word: תַכֶּנּוּ
  english_pob_choice: you strike him
  chosen_spanish: lo hieres
  alternatives_spanish:
  - lo golpeas
  - lo castigas con golpes
  - lo pegas
  lexicon: WLC/HALOT
  rationale: נכה puede significar golpear, herir o herir de golpe. «Hieres» mantiene la concreción del acto sin intensificarlo innecesariamente a «golpear» o «pegar», y deja visible la seriedad del verbo.
- source_word: בַשֵּׁבֶט
  english_pob_choice: with the rod
  chosen_spanish: con la vara
  alternatives_spanish:
  - con el bastón
  - con la vara de disciplina
  - con el cetro
  lexicon: WLC/HALOT
  rationale: שֵׁבֶט puede ser vara, bastón, cetro o tribu. En contexto sapiencial disciplinario, «vara» es la correspondencia más clara y tradicionalmente reconocible sin cambiar el referente material.
- source_word: לֹא יָמוּת
  english_pob_choice: he will not die
  chosen_spanish: no morirá
  alternatives_spanish:
  - no morirá por ello
  - no morirá a causa de eso
  - no perecerá
  lexicon: WLC/HALOT
  rationale: La forma hebrea es una negación simple con valor proverbial. «No morirá» reproduce la afirmación directa sin añadir explicaciones interpretativas al cuerpo del texto.
theological_decisions:
- issue: Alcance del término נַעַר en un proverbio sobre disciplina familiar
  english_pob_reading: Render as 'boy' in the main text, with note that the Hebrew can also mean child or youth
  chosen_spanish_reading: Renderizar «muchacho» en el texto principal, con nota de que también puede entenderse como niño o joven
  alternative_spanish_readings:
  - niño
  - joven
  - muchacho
  rationale: El hebreo es masculino singular y representa una figura de proverbio en ámbito doméstico. «Muchacho» conserva ese rasgo formal y resulta idiomático en español; la amplitud semántica se preserva en la nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Cómo presentar la afirmación proverbial sobre la vara sin convertirla en aprobación general de violencia abusiva
  english_pob_reading: Translate straightforwardsly as 'he will not die' and clarify in a footnote that the proverb is not a blanket endorsement of abuse or an absolute guarantee
  chosen_spanish_reading: Traducir de forma directa «no morirá» y aclarar en nota que no debe leerse como aprobación general de violencia abusiva ni como garantía absoluta en cada caso
  alternative_spanish_readings:
  - no morirá por ello
  - eso no lo matará
  - no perecerá
  rationale: El hebreo formula una sentencia proverbial breve y directa. La claridad pastoral y ética se conserva mejor en una nota que en una reescritura del texto principal, para no diluir la fuerza del enunciado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el consenso del cotejo inglés y el hebreo, sin cambios de revisión aplicados en el apéndice de auditoría. Se mantiene la misma estructura proverbial: prohibición + fundamento + resultado.'
  spanish_consistency_notes:
  - Se preserva el paralelismo breve del hebreo en español con una prohibición inicial y una cláusula causal introducida por «porque».
  - 'Se usa terminología consistente con POB: «disciplina», «vara», «muchacho», evitando sustituirlos por fórmulas eclesiásticas más interpretativas.'
  - Las notas sostienen la amplitud semántica de נַעַר y la cautela ética respecto a la lectura del proverbio.
