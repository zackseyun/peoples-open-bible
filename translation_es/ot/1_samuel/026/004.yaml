revisions:
- from: Entonces David envió exploradores[a], y supo que Saúl había venido de veras.
  to: Entonces David envió exploradores, y supo que Saúl efectivamente[a] había venido.
  rationale: Se reemplaza «de veras» por «efectivamente» para mantener el matiz confirmatorio de נָכוֹן con un registro más digno y natural. Se elimina la nota sobre «exploradores/espías» porque no es la alternativa principal preservada en la auditoría inglesa, y se restituye una nota que refleje la incertidumbre/confirmación asociada al término final hebreo.
