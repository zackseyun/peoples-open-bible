translation:
  language: es
  text: 'Y dijeron: «He aquí, les hemos enviado dinero; y con el dinero compren ofrendas quemadas y ofrendas por el pecado y olíbano, y preparen una ofrenda de grano[a] y ofrézcanlas sobre el altar de Yahvé nuestro Dios»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego μάννα aquí se entiende en sentido sacrificial, es decir, como una ofrenda de grano, no como el alimento del desierto llamado maná.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργύριον
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  lexicon: LSJ
  rationale: En este contexto transaccional, el griego literalmente significa ‘plata’, pero la función es la de una suma enviada para comprar materiales sacrificiales. ‘Dinero’ comunica mejor el valor fungible sin perder el sentido.
- source_word: ἀγοράσατε
  english_pob_choice: buy
  chosen_spanish: compren
  alternatives_spanish:
  - compren para ustedes
  - adquieran
  lexicon: LSJ
  rationale: El imperativo comercial se expresa de manera natural en español con ‘compren’, que conserva la sencillez y claridad del mandato.
- source_word: ὁλοκαυτώματα
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas totalmente quemadas
  - ofrendas quemadas
  lexicon: LSJ
  rationale: El término designa ofrendas consumidas completamente por el fuego. En español, ‘holocaustos’ refleja esa terminología sacrificial tradicional y mantiene la fuerza técnica del vocablo griego.
- source_word: περὶ ἁμαρτίας
  english_pob_choice: sin offerings
  chosen_spanish: ofrendas por el pecado
  alternatives_spanish:
  - ofrendas por el pecado cometido
  - ofrendas por el pecado
  lexicon: LSJ
  rationale: La frase funciona aquí como tecnicismo sacrificial. ‘Ofrendas por el pecado’ es claro y fiel al uso cultual.
- source_word: λίβανον
  english_pob_choice: frankincense
  chosen_spanish: incienso
  alternatives_spanish:
  - olíbano
  - franquincienso
  lexicon: LSJ
  rationale: Aunque el término específico es ‘frankincense’, en español litúrgico y bíblico ‘incienso’ transmite el material aromático requerido y es ampliamente comprensible; ‘olíbano’ sería más exacto botánicamente, pero menos transparente para lectores generales.
- source_word: ποιήσατε μάννα
  english_pob_choice: prepare a grain offering
  chosen_spanish: preparen una ofrenda vegetal
  alternatives_spanish:
  - preparen una ofrenda de grano
  - preparen una ofrenda de cereal
  lexicon: LSJ
  rationale: Aquí μάννα no es el alimento del desierto, sino un término sacrificial. En español bíblico moderno, ‘ofrenda vegetal’ conserva el valor cultual de una ofrenda de grano/cereal sin inducir la lectura errónea de ‘maná’.
- source_word: ἀνοίσατε
  english_pob_choice: offer
  chosen_spanish: preséntenla
  alternatives_spanish:
  - ofrézcanla
  - llévenla
  lexicon: LSJ
  rationale: En contexto sacrificial, el verbo indica llevar/subir la ofrenda al altar. ‘Preséntenla’ comunica el acto cultual con naturalidad en español; el objeto femenino retoma ‘ofrenda vegetal’.
- source_word: θυσιαστήριον
  english_pob_choice: altar
  chosen_spanish: altar
  lexicon: LSJ
  rationale: Correspondencia directa y estándar para el lugar de sacrificio.
- source_word: Κυρίου θεοῦ ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: Yahvé nuestro Dios
  alternatives_spanish:
  - el Señor nuestro Dios
  - el Dios nuestro
  lexicon: LSJ
  rationale: Aunque el griego usa κύριος, el proyecto establece ‘Yahvé’ para el nombre divino en el texto principal. La fórmula ‘nuestro Dios’ conserva la relación de pertenencia y la expresión cúltica del original.
theological_decisions:
- issue: Tratamiento de κύριος aplicado al Dios de Israel en griego deuterocanónico
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La política del proyecto para el nombre divino es usar ‘Yahvé’ en el texto principal, incluso cuando el testimonio griego presenta κύριος. Esto evita la máscara tradicional y hace visible la referencia al nombre divino en la fuente subyacente.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé; κύριος en contexto de la divinidad de Israel'
- issue: Sentido de μάννα en la secuencia sacrificial
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de grano
  - ofrenda de cereal
  rationale: El contexto enumera sacrificios y no el alimento del desierto. Se preserva la lectura cultual, evitando confundir el término con ‘maná’. ‘Ofrenda vegetal’ es una forma bíblica y comprensible en español que mantiene el valor de ofrenda alimenticia/cereal.
  doctrine_reference: 'DOCTRINE.md: Terminología sacrificial y distinción entre cultos y relatos del éxodo'
translation_notes:
  revision_awareness: 'El texto español sigue la última decisión auditada del inglés POB al mantener el registro formal (‘He aquí’) y la secuencia cultual, pero adapta la terminología al sistema español del proyecto: ‘dinero’ para ἀργύριον, ‘holocaustos’ para ὁλοκαυτώματα, ‘ofrendas por el pecado’ para περὶ ἁμαρτίας, ‘incienso’ para λίβανον, y ‘ofrenda vegetal’ para μάννα. Además, se aplica la convención del proyecto para el nombre divino con ‘Yahvé’ en lugar de ‘Señor’.'
  spanish_consistency_notes:
  - Se usa la segunda persona plural de cortesía/mandato ‘compren/preparen/preséntenla’ como equivalente natural del plural griego.
  - Se mantiene el paralelismo cultual y la enumeración de ofrendas sin expansión interpretativa.
  - La nota aclara la ambigüedad de μάννα para evitar confusión con el maná del desierto.
  - ‘Yahvé nuestro Dios’ sigue la terminología proyectual para el nombre divino y conserva la fórmula relacional del original.
