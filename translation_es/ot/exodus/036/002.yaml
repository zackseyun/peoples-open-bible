translation:
  language: es
  text: Entonces Moisés llamó a Bezalel, a Oholiab y a todo hombre[a] sabio de corazón, en cuyo corazón Yahvé había puesto sabiduría; a todo aquel cuyo corazón lo impulsaba[b] a venir a la obra para hacerla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sabio de corazón», un hebraísmo para quien ha recibido sabiduría o habilidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo movía» o «lo levantaba». El hebreo expresa un impulso interior o disposición voluntaria.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó
  lexicon: HALOT
  rationale: קרא con אֶל en este contexto expresa llamar para reunir o convocar a una tarea. En español, «llamó» es natural y conserva la acción de convocar sin sobrecargar el texto.
- source_word: בְּצַלְאֵל
  english_pob_choice: Bezalel
  chosen_spanish: Bezalel
  alternatives_spanish:
  - Besaleel
  lexicon: transliteración
  rationale: Se conserva el nombre propio en transliteración estándar, coherente con la práctica de la POB en nombres bíblicos.
- source_word: אָהֳלִיאָב
  english_pob_choice: Oholiab
  chosen_spanish: Oholiab
  alternatives_spanish:
  - Aholiab
  lexicon: transliteración
  rationale: Se mantiene la transliteración del nombre propio. «Oholiab» sigue la forma usada en el paquete auditado y evita introducir una variante no atestiguada allí.
- source_word: כָּל אִישׁ חֲכַם לֵב
  english_pob_choice: every wise-hearted man
  chosen_spanish: todo hombre de corazón sabio
  alternatives_spanish:
  - todo hombre sabio de corazón
  - todo hombre hábil
  - todo artesano
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «corazón sabio», que en este contexto apunta a habilidad y discernimiento para la labor. «Hombre» refleja el singular representativo de אִישׁ sin restringir indebidamente el alcance del grupo.
- source_word: אֲשֶׁר נָתַן יְהוָה חָכְמָה בְּלִבּוֹ
  english_pob_choice: in whose heart Yahweh had put wisdom
  chosen_spanish: en cuyo corazón Yahvé había puesto sabiduría
  alternatives_spanish:
  - a quien Yahvé había dado sabiduría en su corazón
  - en cuyo interior Yahvé había puesto sabiduría
  lexicon: HALOT
  rationale: נתן + חכמה + בלב expresa que la sabiduría fue dada/puesta por Yahvé en la esfera interior de la persona. «Había puesto sabiduría» preserva la metáfora del corazón como sede interior y la causalidad divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: convención POB
  rationale: Se usa «Yahvé» como equivalencia directa del Tetragrámaton, conforme a la norma del proyecto, en vez de sustituirlo por un título.
- source_word: כֹּל אֲשֶׁר נְשָׂאוֹ לִבּוֹ
  english_pob_choice: everyone whose heart stirred him
  chosen_spanish: a todo aquel cuyo corazón lo impulsaba
  alternatives_spanish:
  - a todo aquel cuyo corazón lo movía
  - a todo aquel cuyo corazón lo levantaba
  lexicon: HALOT
  rationale: El giro נשא לב comunica impulso interior o motivación. «Lo impulsaba» expresa con naturalidad en español esa moción interna sin perder la imagen del corazón como sede de la voluntad.
- source_word: לְקָרְבָה אֶל הַמְּלָאכָה
  english_pob_choice: to come to the work
  chosen_spanish: a acercarse a la obra
  alternatives_spanish:
  - a venir a la obra
  - a aproximarse a la obra
  lexicon: HALOT
  rationale: קרב mantiene la idea de aproximarse. «A la obra» conserva el referente concreto del trabajo de construcción; «acercarse» refleja el movimiento hacia la tarea sin forzar una lectura técnica adicional.
- source_word: הַמְּלָאכָה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, מלאכה no es solo «trabajo» en abstracto sino la obra concreta de construcción. «Obra» suena natural en español bíblico actual y conserva ese sentido colectivo.
- source_word: לַעֲשֹׂת אֹתָהּ
  english_pob_choice: to do it
  chosen_spanish: para hacerla
  alternatives_spanish:
  - para realizarla
  - para ejecutarla
  lexicon: HALOT
  rationale: עשה con מלאכה se puede traducir por «hacer» en español, manteniendo sencillez y fidelidad. El pronombre femenino concuerda con «la obra».
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La POB inglesa lo rinde «Yahweh»; en español, la forma de proyecto es «Yahvé», preservando el nombre personal del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Idiomatic rendering of ‘wise-hearted’
  english_pob_reading: wise-hearted
  chosen_spanish_reading: de corazón sabio
  alternative_spanish_readings:
  - sabio de corazón
  - hábil
  rationale: La expresión no se limita a inteligencia abstracta; en este contexto señala capacidad concedida por Dios para la labor. Mantener «corazón sabio» conserva la tensión entre sabiduría interior y aptitud artesanal.
  doctrine_reference: HALOT, entrada חכם/לב; contexto de Éxodo 35–36
- issue: Hebrew idiom of inward prompting
  english_pob_reading: everyone whose heart stirred him
  chosen_spanish_reading: a todo aquel cuyo corazón lo impulsaba
  alternative_spanish_readings:
  - a todo aquel cuyo corazón lo movía
  - a todo aquel cuyo corazón lo levantaba
  rationale: Se preserva el ímpetu interno sin reducirlo a mera decisión racional. «Impulsaba» comunica el sentido volitivo del hebreo נשא + לב y mantiene la dimensión de llamada interior.
  doctrine_reference: HALOT, נשא + לב; nota lexical de la POB
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «come near to the work» a «come to the work» por naturalidad. La versión española sigue ese ajuste con «acercarse a la obra», evitando una calca de acercamiento físico innecesariamente rígida y manteniendo el sentido de aproximarse para participar en la tarea.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - «Corazón sabio» conserva el hebraísmo del original; no se normaliza a «hábil» en el texto principal.
  - «Obra» traduce la labor concreta del tabernáculo y armoniza con el contexto inmediato.
  - El pronombre femenino «la» en «hacerla» concuerda con «la obra» y reproduce el objeto directo del hebreo.
