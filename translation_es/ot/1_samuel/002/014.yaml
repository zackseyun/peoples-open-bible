translation:
  language: es
  text: y lo introducía en la vasija, o en la olla, o en la cazuela, o en la sartén; todo lo que levantaba el tenedor[a], el sacerdote lo tomaba con él[b]. Así hacían a todo Israel que venía allí a Silo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gancho de carne» para «tenedor». El término hebreo se refiere al utensilio usado para sacar la carne del recipiente sacrificial.
    reason: lexical_alternative
  - marker: b
    text: Las distinciones exactas entre los nombres de los recipientes son inciertas; el hebreo enumera varios tipos de utensilios de cocción.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִכָּה
  english_pob_choice: and he would thrust it
  chosen_spanish: y lo introducía
  alternatives_spanish:
  - y lo golpeaba
  - y lo clavaba
  lexicon: HALOT
  rationale: El verbo hebreo describe aquí la acción de hundir o meter el tenedor en el recipiente; en español, «introducía» comunica la acción repetida y evita la imprecisión de «golpear».
- source_word: בַכִּיּוֹר
  english_pob_choice: into the basin
  chosen_spanish: en la pila
  alternatives_spanish:
  - en el lavabo
  - en la palangana
  lexicon: HALOT
  rationale: Para este contexto de cocina sacrificial, «pila» mantiene la idea de recipiente amplio y es una opción natural en español; «lavabo» sería demasiado doméstico moderno y «palangana» menos neutro.
- source_word: בַדּוּד
  english_pob_choice: or the pot
  chosen_spanish: o en la olla
  alternatives_spanish:
  - o en el caldero
  - o en el pote
  lexicon: HALOT
  rationale: דּוּד designa un recipiente de cocción; «olla» es claro y estándar en español, sin forzar un matiz arcaico.
- source_word: בַקַּלַּחַת
  english_pob_choice: or the kettle
  chosen_spanish: o en la cazuela
  alternatives_spanish:
  - o en el caldero
  - o en la marmita
  lexicon: HALOT
  rationale: El término apunta a otro recipiente de cocción; «cazuela» conserva la variedad de utensilios sin sobreespecificar el objeto exacto.
- source_word: בַפָּרוּר
  english_pob_choice: or the cooking pan
  chosen_spanish: o en la sartén de cocinar
  alternatives_spanish:
  - o en la fuente de cocción
  - o en el recipiente de cocción
  lexicon: HALOT
  rationale: El hebreo nombra un utensilio de cocina cuyo tipo exacto es incierto; «sartén de cocinar» comunica función y mantiene la serie de recipientes distintos.
- source_word: הַמַּזְלֵג
  english_pob_choice: the fork
  chosen_spanish: el tenedor
  alternatives_spanish:
  - la horquilla
  - el gancho
  lexicon: HALOT
  rationale: Aunque el instrumento puede corresponder al «flesh-hook» de versiones antiguas, el POB inglés optó por «fork» para reflejar el uso moderno y la mención anterior del utensilio de tres puntas; «tenedor» es el equivalente natural en español.
- source_word: יִקַּח הַכֹּהֵן בּוֹ
  english_pob_choice: the priest would take with it
  chosen_spanish: el sacerdote lo tomaba con él
  alternatives_spanish:
  - el sacerdote lo tomaba con eso
  - el sacerdote lo tomaba con el tenedor
  lexicon: HALOT
  rationale: El pronombre hebreo se refiere al instrumento con el que se extraía la carne; en español conviene explicitar la referencia con «con él» para evitar ambigüedad, preservando el sentido instrumental.
- source_word: כָּכָה יַעֲשׂוּ
  english_pob_choice: Thus they did
  chosen_spanish: Así hacían
  alternatives_spanish:
  - Así lo hacían
  - De esta manera hacían
  lexicon: HALOT
  rationale: La forma hebrea resume una práctica habitual; «Así hacían» conserva el valor habitual y la transición de singular a plural observada en el texto fuente.
- source_word: לְכָל יִשְׂרָאֵל הַבָּאִים שָׁם בְּשִׁלֹה
  english_pob_choice: to all Israel who came there to Shiloh
  chosen_spanish: con todo Israel que venía allí a Silo
  alternatives_spanish:
  - a todo Israel que venía allí a Silo
  - para todo Israel que venía allí a Silo
  lexicon: HALOT
  rationale: La frase indica el grupo de adoradores israelitas que acudían al santuario; «con todo Israel» refleja la idea de trato generalizado en español y mantiene el alcance colectivo del hebreo.
theological_decisions:
- issue: Cambio de singular a plural en la conclusión de la acción
  english_pob_reading: Retain the singular 'the priest' in the main action clause, but render the summary as plural 'they did' to reflect the Hebrew shift.
  chosen_spanish_reading: Mantener el singular «el sacerdote» en la acción principal y el plural implícito en «Así hacían» para reflejar el cambio hebreo sin homogeneizarlo.
  alternative_spanish_readings:
  - 'Hacer todo singular: «el sacerdote tomaba... así hacía»'
  - 'Hacer todo plural: «los sacerdotes tomaban... así hacían»'
  rationale: El versículo pasa de una acción singular a una generalización plural; conservar ese cambio evita borrar la textura narrativa del hebreo y coincide con la lectura auditada del POB inglés.
  doctrine_reference: Translation philosophy §3, §5
- issue: Identificación del utensilio הַמַּזְלֵג
  english_pob_reading: '''fork'' with footnote noting possible ''flesh-hook''.'
  chosen_spanish_reading: «tenedor» con nota de que puede entenderse como «horquilla para carne» o gancho de carne.
  alternative_spanish_readings:
  - «gancho de carne»
  - «horquilla»
  rationale: El contexto sacrificial y la nota auditada del POB muestran que el término designa un utensilio para sacar carne; «tenedor» funciona como equivalente directo, sin perder la referencia al instrumento de tres puntas.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada del POB inglés, que prefirió «Thus they did» frente a «This is what they did» por ser más formal y natural. También preserva la alternancia singular/plural del hebreo y la incertidumbre léxica en la lista de recipientes.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «Silo» como topónimo estándar en español.
  - «El sacerdote» se deja en singular en la cláusula principal, pero «Así hacían» refleja la generalización plural del final.
  - Se preserva la serie de recipientes como una lista diferenciada, sin intentar normalizar los utensilios en una sola categoría.
