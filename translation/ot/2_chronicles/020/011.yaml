id: 2CH.20.11
reference: 2 Chronicles 20:11
source:
  edition: WLC
  text: וְ/הִ֨נֵּה הֵ֔ם גֹּמְלִ֖ים עָלֵ֑י/נוּ לָ/בוֹא֙ לְ/גָ֣רְשֵׁ֔/נוּ מִ/יְּרֻשָּׁתְ/ךָ֖ אֲשֶׁ֥ר הֽוֹרַשְׁתָּֽ/נוּ־׃
translation:
  text: And behold[a], they are repaying us by coming to drive us out of your possession, which you gave us as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from your inheritance, which you caused us to inherit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Now look
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic appeal drawing attention to the present situation. 'And look' preserves the discourse force in readable modern English better than the more archaic 'behold.'
- source_word: הֵם
  chosen: they
  lexicon: HALOT
  rationale: 'Explicit independent pronoun retained for emphasis: ''they'' highlights the offenders in Jehoshaphat''s complaint.'
- source_word: גֹּמְלִים עָלֵינוּ
  chosen: are repaying us
  alternatives:
  - are rewarding us
  - are dealing with us this way
  - are requiting us
  lexicon: HALOT
  rationale: 'The verb גמל here carries the sense of recompense or repayment in response to prior action. ''Are repaying us'' captures the irony: Israel had spared them, and this is their return.'
- source_word: לָבוֹא
  chosen: by coming
  alternatives:
  - to come
  lexicon: HALOT
  rationale: Infinitive of purpose/result linked to the preceding verb. 'By coming' expresses the means by which they are 'repaying' Israel in idiomatic English.
- source_word: לְגָרְשֵׁנוּ
  chosen: to drive us out
  alternatives:
  - to dispossess us
  - to cast us out
  lexicon: HALOT
  rationale: גרש commonly means to drive out or expel. 'Drive us out' is direct and natural, fitting the military-land context.
- source_word: מִיְּרֻשָּׁתְךָ
  chosen: of your possession
  alternatives:
  - from your inheritance
  - from your possession
  lexicon: HALOT
  rationale: 'The noun denotes a possession/inheritance. Because the following clause says God gave it to Israel as an inheritance, rendering this phrase as ''your possession'' preserves the distinction: the land belongs ultimately to God, though granted to Israel.'
- source_word: אֲשֶׁר הוֹרַשְׁתָּנוּ
  chosen: which you gave us as an inheritance
  alternatives:
  - which you caused us to inherit
  - which you made us possess
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ means to cause someone to possess/inherit. 'Which you gave us as an inheritance' is clear modern English and preserves the theological point that Israel's tenure in the land is divinely granted.
