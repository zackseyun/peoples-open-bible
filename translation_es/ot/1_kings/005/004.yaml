translation:
  language: es
  text: Porque él dominaba sobre toda la región más allá del Río[a], desde Tifsaj[b] hasta Gaza, sobre todos los reyes más allá del Río; y él tenía paz por todos lados a su alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el Éufrates.
    reason: cultural_note
  - marker: b
    text: También puede transliterarse «Tiphsah».
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹדֶה
  english_pob_choice: was ruling
  chosen_spanish: dominaba
  alternatives_spanish:
  - estaba gobernando
  - reinaba
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción continua de dominio. En español, «dominaba» comunica esa soberanía en curso con naturalidad y sin perder la fuerza política del término.
- source_word: בְּכָל עֵבֶר הַנָּהָר
  english_pob_choice: over all the region beyond the River
  chosen_spanish: sobre toda la región más allá del Río
  alternatives_spanish:
  - sobre toda la región al otro lado del Río
  - sobre toda la región del otro lado del Río
  lexicon: HALOT
  rationale: La expresión designa la zona territorial al otro lado del río desde el punto de vista del hablante. «Región» hace explícito el valor territorial que el inglés POB también aclaró.
- source_word: הַנָּהָר
  english_pob_choice: the River
  chosen_spanish: el Río
  alternatives_spanish:
  - el Éufrates
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el río», un giro convencional para el Éufrates. Se conserva la forma fuente en el texto principal y la aclaración se deja para nota.
- source_word: מִתִּפְסַח וְעַד עַזָּה
  english_pob_choice: from Tiphsah to Gaza
  chosen_spanish: desde Tifsaj hasta Gaza
  alternatives_spanish:
  - desde Tiphsah hasta Gaza
  lexicon: HALOT
  rationale: Se translitera תִּפְסַח como «Tifsaj» para seguir de cerca la forma hebrea y evitar una adaptación innecesaria. El intervalo geográfico se mantiene de manera directa.
- source_word: בְּכָל מַלְכֵי עֵבֶר הַנָּהָר
  english_pob_choice: over all the kings beyond the River
  chosen_spanish: sobre todos los reyes más allá del Río
  alternatives_spanish:
  - sobre todos los reyes de la región más allá del Río
  - sobre cada rey más allá del Río
  lexicon: HALOT
  rationale: La construcción indica supremacía política sobre los reyes de esa zona. «Sobre todos los reyes» conserva el matiz de sujeción o vasallaje sin añadir más de lo que el hebreo dice.
- source_word: וְשָׁלוֹם הָיָה לוֹ
  english_pob_choice: and he had peace
  chosen_spanish: y había paz
  alternatives_spanish:
  - y tenía paz
  - y gozaba de paz
  lexicon: HALOT
  rationale: שָׁלוֹם aquí alude a estabilidad y seguridad política. «Había paz» mantiene el sustantivo del hebreo y deja el sentido contextual implícito.
- source_word: מִכָּל עֲבָרָיו מִסָּבִיב
  english_pob_choice: on all sides around him
  chosen_spanish: por todos sus lados, alrededor de él
  alternatives_spanish:
  - en todos sus alrededores
  - de todos lados, alrededor de él
  lexicon: HALOT
  rationale: La frase hebrea expresa paz desde todos los contornos o alrededores. «Por todos sus lados, alrededor de él» reproduce el carácter espacial y envolvente de la expresión sin forzar un modismo ajeno al español.
theological_decisions:
- issue: Alcance político de la dominación de Salomón
  english_pob_reading: was ruling over all the region beyond the River ... over all the kings beyond the River
  chosen_spanish_reading: dominaba sobre toda la región más allá del Río ... sobre todos los reyes más allá del Río
  alternative_spanish_readings:
  - estaba gobernando sobre toda la región más allá del Río
  - reinaba sobre toda la región más allá del Río
  rationale: El verso describe dominio territorial y suzeranía política, no solo autoridad ceremonial. «Dominaba» conserva esa amplitud sin introducir un término más eclesiástico o monárquico que estreche el sentido.
  doctrine_reference: 1 Reyes 5:4; sentido histórico-político del reinado de Salomón
- issue: Identificación del Río
  english_pob_reading: the River [that is, the Euphrates River]
  chosen_spanish_reading: el Río[a]
  alternative_spanish_readings:
  - el Éufrates[a]
  rationale: El texto hebreo usa la fórmula convencional «el Río». La nota permite explicitar que se trata del Éufrates sin sustituir el giro original en el cuerpo del versículo.
  doctrine_reference: Uso geográfico convencional en el Antiguo Testamento
- issue: Sentido de la paz final
  english_pob_reading: he had peace on all sides around him
  chosen_spanish_reading: había paz por todos sus lados, alrededor de él
  alternative_spanish_readings:
  - tenía paz en todos sus alrededores
  - gozaba de paz por todas partes
  rationale: La paz aquí es seguridad externa y estabilidad en sus fronteras. La redacción española conserva el carácter espacial del hebreo y evita espiritualizar la frase.
  doctrine_reference: 1 Reyes 5:4; paz como seguridad política
- issue: Transliteración de Tiphsah
  english_pob_reading: Tiphsah
  chosen_spanish_reading: Tifsaj[b]
  alternative_spanish_readings:
  - Tiphsah[b]
  rationale: La forma «Tifsaj» sigue de manera más cercana la sonoridad hebrea y es legible en español. Se conserva la alternativa inglesa/latinizada en nota para referencia.
  doctrine_reference: Convención toponímica y fidelidad al nombre propio
translation_notes:
  revision_awareness: La redacción sigue la revisión final del POB inglés que prefirió «on all sides around him» frente a una forma más distributiva; por eso la cláusula final en español usa una expresión plural y envolvente. También conserva la distinción entre el nombre geográfico convencional «el Río» y su identificación explicativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto mayor de la obra, aunque este versículo no lo contiene.
  - «Río» se escribe con mayúscula por ser nombre geográfico convencional equivalente al inglés POB «the River».
  - La transliteración «Tifsaj» evita adaptar el topónimo a una forma castellana no atestiguada en el paquete fuente.
