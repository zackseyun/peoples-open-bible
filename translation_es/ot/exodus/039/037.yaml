translation:
  language: es
  text: el candelabro puro, sus lámparas—las lámparas puestas en orden[a]—y todos sus utensilios, y el aceite para la luz,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las lámparas dispuestas en orden». La expresión hebrea נֵרֹת הַמַּעֲרָכָה subraya la disposición prescrita de las lámparas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְּנֹרָה
  english_pob_choice: lampstand
  chosen_spanish: candelabro
  alternatives_spanish:
  - lampstand
  - menorá
  - lámpara
  lexicon: HALOT
  rationale: En español, 'candelabro' comunica el objeto cultual que sostiene varias lámparas y evita el préstamo innecesario 'menorá'. 'Lámpara' sería demasiado estrecho para el soporte completo.
- source_word: הַטְּהֹרָה
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - ritualmente puro
  lexicon: HALOT
  rationale: '''Puro'' reproduce bien la cualidad ritual/material del objeto en el contexto del santuario, sin añadir una explicación que el hebreo no expresa aquí.'
- source_word: נֵרֹתֶיהָ
  english_pob_choice: its lamps
  chosen_spanish: sus lámparas
  alternatives_spanish:
  - sus luces
  - sus mechas
  lexicon: HALOT
  rationale: El término se refiere a las lámparas individuales pertenecientes al candelabro; 'sus lámparas' es natural y fiel al inventario del tabernáculo.
- source_word: נֵרֹת הַמַּעֲרָכָה
  english_pob_choice: the lamps set in order
  chosen_spanish: las lámparas puestas en orden
  alternatives_spanish:
  - las lámparas del arreglo
  - las lámparas ordenadas
  - las lámparas dispuestas
  lexicon: HALOT
  rationale: '''מַעֲרָכָה'' expresa disposición ordenada o arreglo prescrito. ''Puestas en orden'' conserva la idea y sigue de cerca la decisión auditada del inglés, sin sonar demasiado técnico en español.'
- source_word: כָּל כֵּלֶיהָ
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus implementos
  - todos sus objetos
  lexicon: HALOT
  rationale: '''כְּלִי'' es amplio; en contexto de mobiliario del santuario, ''utensilios'' abarca los instrumentos asociados sin sobredeterminar su forma.'
- source_word: שֶׁמֶן הַמָּאוֹר
  english_pob_choice: the oil for the light
  chosen_spanish: el aceite para la luz
  alternatives_spanish:
  - el aceite para alumbrar
  - el aceite de iluminación
  lexicon: HALOT
  rationale: La frase constructa indica aceite usado para iluminación. 'Para la luz' mantiene la relación funcional de manera literal y fluida en español.
translation_notes:
  revision_awareness: Se incorporó la nota alternativa sobre נֵרֹת הַמַּעֲרָכָה directamente en el texto mediante el marcador [a], corrigiendo la validación anterior. La redacción sigue el registro de inventario del pasaje y mantiene la cadencia enumerativa del hebreo.
  spanish_consistency_notes:
  - Se prefirió 'candelabro' para הַמְּנֹרָה por claridad natural en español, evitando un préstamo innecesario.
  - Se conservó la secuencia enumerativa con comas y guiones largos para reflejar la estructura serial del hebreo y del inglés auditado.
  - '''Aceite para la luz'' mantiene la función del aceite sin introducir una paráfrasis explicativa mayor.'
