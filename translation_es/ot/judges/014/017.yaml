translation:
  language: es
  text: Ella lloró ante él[a] los siete días que tuvieron el banquete. Y al séptimo día él se lo dijo, porque ella lo apremiaba con insistencia; entonces ella les contó el acertijo a los hijos de su pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de él». El hebreo literalmente dice que lloró «sobre/contra él», un modismo que expresa presión emocional continua.
    reason: lexical_alternative
  - marker: b
    text: «Los hijos de su pueblo» puede referirse más específicamente a los hombres de su propio pueblo, probablemente los compañeros filisteos en el contexto inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּבְךְּ עָלָיו
  english_pob_choice: She wept on him / before him
  chosen_spanish: Ella lloró ante él
  alternatives_spanish:
  - Ella lloró delante de él
  - Ella lloró sobre él
  - Ella lloró a él
  lexicon: HALOT
  rationale: El hebreo con בכה + עַל + sufijo expresa llanto dirigido a él con fuerza persistente. En español, «ante él» conserva la dirección interpersonal sin caer en un calco incómodo como «sobre él», y mantiene mejor la presión emocional que una paráfrasis más débil.
- source_word: שִׁבְעַת הַיָּמִים
  english_pob_choice: the seven days
  chosen_spanish: los siete días
  alternatives_spanish:
  - durante siete días
  - los siete días completos
  lexicon: HALOT
  rationale: La construcción señala la duración total del banquete. «Los siete días» es natural en español y conserva la referencia temporal precisa sin añadir énfasis no explicitado.
- source_word: הַמִּשְׁתֶּה
  english_pob_choice: the feast
  chosen_spanish: el banquete
  alternatives_spanish:
  - la fiesta
  - el festín
  - el festejo
  lexicon: HALOT
  rationale: En este contexto narrativo, מִשְׁתֶּה puede ser banquete o fiesta de celebración. «Banquete» comunica bien la ocasión festiva y evita la ambigüedad de «fiesta», que en español puede sonar demasiado general.
- source_word: וַיַּגֶּד לָהּ
  english_pob_choice: he told her
  chosen_spanish: él le dijo
  alternatives_spanish:
  - él se lo dijo
  - él le explicó
  - él le reveló
  lexicon: HALOT
  rationale: נגד significa decir/declarar/hacer saber. «Le dijo» es la opción más directa; en esta frase el complemento posterior ya especifica la causa, por lo que no hace falta intensificar con «reveló».
- source_word: כִּי הֱצִיקַתְהוּ
  english_pob_choice: because she pressed him hard
  chosen_spanish: porque ella lo apremiaba con insistencia
  alternatives_spanish:
  - porque ella lo presionaba mucho
  - porque ella lo acosaba
  - porque ella lo constriñó
  lexicon: HALOT
  rationale: El hiphil de צוק expresa presión fuerte o insistencia agobiante. «Apremiaba con insistencia» conserva esa fuerza sin cargar el verbo con un matiz demasiado hostil como «acosaba», y evita suavizar en exceso el original.
- source_word: וַתַּגֵּד הַחִידָה
  english_pob_choice: then she told the riddle
  chosen_spanish: entonces ella contó el enigma
  alternatives_spanish:
  - entonces ella reveló el enigma
  - entonces ella dijo el enigma
  - entonces ella explicó el enigma
  lexicon: HALOT
  rationale: חִידָה es «enigma» o «adivinanza». Opto por «enigma» porque en español suena más natural y solemne en un relato bíblico; «contó» mantiene el paralelismo con «dijo» sin forzar una explicación que el texto no da.
- source_word: לִבְנֵי עַמָּהּ
  english_pob_choice: to the sons of her people
  chosen_spanish: a los hijos de su pueblo
  alternatives_spanish:
  - a los hombres de su pueblo
  - a la gente de su pueblo
  - a sus paisanos
  lexicon: HALOT
  rationale: Se conserva la expresión literal «hijos de su pueblo», que refleja בני עַמָּהּ y mantiene el valor masculino del plural. En español, «hijos de su pueblo» puede abarcar a los varones del grupo, como sugiere el contexto inmediato.
translation_notes:
  revision_awareness: 'He tenido en cuenta el audit trail inglés y su revisión posterior en la primera cláusula: la POB inglesa corrigió «on him» a «before him» por naturalidad, pero el hebreo conserva un modismo de presión. Por eso el español evita un calco crudo y usa una forma idiomática que todavía preserva la intensidad del original. También mantengo la opción léxica contextual para מִשְׁתֶּה y חִידָה sin expandir el sentido más allá del relato.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo.
  - Se conservó el registro narrativo sobrio y bíblico, con sintaxis clara y moderna.
  - «Hijos de su pueblo» mantiene el matiz literal y el valor de grupo masculino, conforme al contexto y al criterio del proyecto.
