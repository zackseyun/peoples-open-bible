translation:
  language: es
  text: Salmanasar, rey de Asiria, subió contra él[a]; y Oseas llegó a ser su siervo y le pagó tributo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se convirtió en su vasallo». El hebreo dice literalmente «llegó a ser su siervo», usando lenguaje de subordinación política.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה עָלָיו
  english_pob_choice: came up against him
  chosen_spanish: subió contra él
  alternatives_spanish:
  - se alzó contra él
  - marchó contra él
  - subió sobre él
  lexicon: HALOT
  rationale: El hebreo usa la idiomática עָלָה עַל en contexto militar. En español, «subió contra él» conserva la imagen direccional del original y suena natural; evita intensificar indebidamente la acción como una batalla formal si el texto solo presenta el avance hostil.
- source_word: שַׁלְמַנְאֶסֶר
  english_pob_choice: Shalmaneser
  chosen_spanish: Salmanasar
  alternatives_spanish:
  - Salmaneser
  - Shalmanasar
  lexicon: Transliteración histórica bíblica
  rationale: Se usa la forma hispánica tradicional y reconocible del nombre propio, manteniendo la identidad del referente sin introducir una paráfrasis.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey de Asiria
  - rey asirio
  lexicon: HALOT
  rationale: La construcción en aposición identifica al rey por su reino. En español, «rey de Asiria» es claro, directo y fiel a la relación sintáctica del hebreo.
- source_word: וַיְהִי לוֹ ... עֶבֶד
  english_pob_choice: became his servant
  chosen_spanish: llegó a ser su esclavo
  alternatives_spanish:
  - llegó a ser su siervo
  - se convirtió en su vasallo
  - quedó sujeto a él
  lexicon: HALOT
  rationale: El hebreo dice literalmente que Oseas «llegó a ser un עֶבֶד» para él. Dado que el POB inglés preserva la tensión política con «servant» pero anota la posibilidad de «vassal», en español se opta por «esclavo» para reflejar la fuerza léxica de עֶבֶד y no suavizarla; el contexto político sigue pudiendo entenderse como subordinación vasallática.
- source_word: וַיָּשֶׁב ל֖וֹ מִנְחָה
  english_pob_choice: paid him tribute
  chosen_spanish: le pagó tributo
  alternatives_spanish:
  - le rindió tributo
  - le llevó tributo
  - le presentó tributo
  lexicon: HALOT
  rationale: En este contexto geopolítico, מִנְחָה significa tributo, no ofrenda cultual. «Le pagó tributo» reproduce bien el valor de rendición económica exigida por un poder superior.
- source_word: מִנְחָה
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - regalo
  - ofrenda
  lexicon: HALOT
  rationale: Se conserva «tributo» porque el contexto de vasallaje internacional define el término con claridad; «ofrenda» desplazaría erróneamente el sentido hacia lo cultual.
theological_decisions:
- issue: Naturaleza de la subordinación de Oseas
  english_pob_reading: became his servant; footnote allows 'became his vassal'
  chosen_spanish_reading: llegó a ser su esclavo
  alternative_spanish_readings:
  - llegó a ser su siervo
  - llegó a ser su vasallo
  rationale: La fuente hebrea usa un término de dependencia personal que, en este contexto político, describe subordinación real. «Esclavo» mantiene la tensión léxica; «vasallo» explicita el marco político pero debilita la literalidad. Como el texto no desmiente la lectura vasallática, la nota puede sostener la ambigüedad contextual sin borrarla.
  doctrine_reference: 2 Reyes 17:3; uso contextual de עֶבֶד en subordinación política
- issue: Valor del avance militar
  english_pob_reading: came up against him
  chosen_spanish_reading: subió contra él
  alternative_spanish_readings:
  - atacó a él
  - marchó contra él
  rationale: La frase evita sobrerrepresentar el evento como una ofensiva total; sigue la metáfora direccional hebrea y deja abierta la medida exacta del avance hostil.
  doctrine_reference: 2 Reyes 17:3; idiomática militar de עָלָה עַל
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión final inglesa; no hay revisiones aplicadas. La decisión principal en español es cómo reflejar la tensión entre la literalidad de עֶבֶד y su sentido político contextual, sin borrar ninguno de los dos niveles.
  spanish_consistency_notes:
  - Se mantiene «Asiria» y no «el Asiria» para la fluidez del español bíblico contemporáneo.
  - 'Se preserva el nombre propio en forma hispánica establecida: «Salmanasar».'
  - «Tributo» se usa de manera consistente para מִנְחָה en contexto imperial, distinguiéndolo de ofrenda cultual.
  - La puntuación refleja una cláusula principal seguida de coordinación narrativa simple, acorde con el hebreo waw consecutivo.
