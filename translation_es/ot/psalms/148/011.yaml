translation:
  language: es
  text: reyes de la tierra y todos los pueblos[a], príncipes y todos los jueces de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naciones» para «pueblos».
    reason: lexical_alternative
  - marker: b
    text: O «el país» en lugar de «la tierra» si se leyera en sentido más local; aquí el contexto amplio favorece el sentido universal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכֵי
  english_pob_choice: kings of
  chosen_spanish: reyes de
  alternatives_spanish:
  - los reyes de
  lexicon: HALOT
  rationale: El constructo plural de מֶלֶךְ introduce una lista de grupos llamados a alabar. En español, «reyes de» reproduce de forma natural la relación posesiva sin añadir un artículo que el hebreo no exige.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra
  lexicon: HALOT
  rationale: En el contexto universal del salmo, se prefiere un término de alcance amplio. «La tierra» comunica bien el ámbito global en español y evita la restricción local de «el país».
- source_word: לְאֻמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - grupos étnicos
  lexicon: HALOT
  rationale: «Pueblos» conserva el paralelismo con los demás colectivos y no reduce el término a estados modernos. En español, también permite oír tanto la diversidad humana como la dimensión colectiva del hebreo.
- source_word: שָׂרִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - funcionarios
  - gobernantes
  lexicon: HALOT
  rationale: «Príncipes» preserva el registro elevado y tradicional del término hebreo para altos dignatarios. «Gobernantes» sería más general, pero pierde la tonalidad poética.
- source_word: שֹׁפְטֵי
  english_pob_choice: judges of
  chosen_spanish: jueces de
  alternatives_spanish:
  - gobernantes de
  - magistrados de
  lexicon: HALOT
  rationale: El participio sustantivado de שׁפט se traduce de modo directo como «jueces». Es la opción más transparente y conserva la enumeración de autoridades civiles.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra
  lexicon: HALOT
  rationale: Se mantiene la misma solución que para אֶרֶץ al final del verso para conservar coherencia y el alcance universal del pasaje.
theological_decisions:
- issue: Alcance universal de אֶרֶץ en un catálogo de alabanza
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  rationale: El salmo convoca a toda la creación; por eso se evita una lectura territorial restringida. «La tierra» en español expresa mejor ese alcance universal sin introducir una paráfrasis doctrinal.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto sigue de cerca la última revisión inglesa, que no introdujo cambios. Se preserva la estructura en catálogo poético y la decisión contextual sobre אֶרֶץ como alcance universal.
  spanish_consistency_notes:
  - Se mantiene «la tierra» de manera uniforme para אֶרֶץ en ambos casos.
  - «Pueblos» y «príncipes» conservan un registro bíblico claro y no anacrónico.
  - La puntuación reproduce la enumeración paralela del hebreo con una coma y la conjunción final implícita en la serie.
