translation:
  language: es
  text: Y los persiguió, pero no los alcanzó, porque habían cruzado el río Eleutero.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατεδίωξεν
  english_pob_choice: pursued
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - lo siguió persiguiendo
  - lo fue persiguiendo
  lexicon: LSJ
  rationale: El aoristo de καταδιώκω expresa una persecución activa. En español, «persiguió» comunica con naturalidad el sentido militar/narrativo sin añadir matices innecesarios.
- source_word: ὀπίσω αὐτῶν
  english_pob_choice: after them
  chosen_spanish: tras ellos
  alternatives_spanish:
  - detrás de ellos
  - después de ellos
  lexicon: LSJ
  rationale: La frase literalmente indica dirección/posición posterior, pero con un verbo de persecución en español «tras ellos» transmite mejor el movimiento de ir en seguimiento.
- source_word: οὐκ ἐκατέλαβεν
  english_pob_choice: did not overtake
  chosen_spanish: no los alcanzó
  alternatives_spanish:
  - no los dio alcance
  - no los atrapó
  lexicon: LSJ
  rationale: En este contexto καταλαμβάνω significa alcanzar a fugitivos. «No los alcanzó» es la equivalencia natural y precisa en español.
- source_word: διέβησαν
  english_pob_choice: had crossed
  chosen_spanish: habían cruzado
  alternatives_spanish:
  - cruzaron
  - habían pasado
  lexicon: LSJ
  rationale: El pluscuamperfecto español refleja bien la anterioridad de la acción respecto al fracaso de la persecución, como en la auditoría inglesa.
- source_word: τὸν Ἐλεύθερον ποταμόν
  english_pob_choice: the Eleutherus River
  chosen_spanish: el río Eleutero
  alternatives_spanish:
  - el río Eleútero
  - el Eleutero, río
  lexicon: LSJ
  rationale: Ἐλεύθερος es nombre propio y se translitera al español como topónimo. Se mantiene «río» para el sentido de ποταμόν y se usa la forma habitual Eleutero en español.
translation_notes:
