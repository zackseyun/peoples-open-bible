translation:
  language: es
  text: 'Pero también escucha una palabra de consuelo. Porque yo estaba de duelo por Sion, y busqué misericordia del Altísimo, y dije: «¿Permanecerán estas cosas para nosotros hasta el fin? ¿Y vendrán estas aflicciones sobre nosotros en todo tiempo?» Y el Poderoso obró conforme a la abundancia de sus misericordias, y perdonó conforme a la grandeza de su gracia. Y me reveló una palabra para que yo fuera fortalecido, y me dio visiones para que no volviera a ser sacudido; y me dio a conocer los misterios de los tiempos, y me mostró la venida de las edades.


    Por eso, hermanos míos, les he escrito para que sean consolados a causa de la multitud de sus tribulaciones. Porque sepan que nuestro Hacedor pedirá cuentas a todos nuestros enemigos por todas las cosas malas que han hecho contra nosotros, y que la consumación que el Altísimo ha preparado está cerca, y su misericordia viene, y la consumación de su juicio no está lejos.


    Porque ahora vemos la abundancia de la prosperidad de las naciones mientras obran mal, pero serán contadas como una gota. Y miramos la fuerza de su poder, pero será tenida por saliva. Pensamos en la gloria de su grandeza, mientras no guardan los mandamientos del Poderoso, sino que los han tratado con desprecio. Y pensamos en la hermosura que se ve, aunque es sacudida en las aflicciones, y será buscada como carne en dolor. Y solo tomamos en cuenta la confianza en la que ellos confían, aunque es sacudida ante nuestros ojos; pero será aplastada como una ola. Y buscamos solo la esperanza de su fuerza, cuando florece en los bienes que Dios les dio; pero será guardada, y el lamento la alcanzará.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܡܪܝܡܐ
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Exaltado
  lexicon: Payne Smith
  rationale: Título divino apocalíptico estándar; en español, «el Altísimo» conserva la elevación y el registro bíblico sin sustituirlo por una perífrasis menos establecida.
- source_word: ܚܝܠܬܐ
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Valiente
  lexicon: Payne Smith
  rationale: Conviene mantenerlo distinto de «el Altísimo»; «el Poderoso» preserva el matiz de fuerza divina sin fusionar ambos títulos.
- source_word: ܪ̈ܚܡܘܗܝ / ܚܢܢܗ
  english_pob_choice: his mercies / his grace
  chosen_spanish: sus misericordias / su gracia
  alternatives_spanish:
  - sus compasiones / su favor
  lexicon: Payne Smith
  rationale: La pareja siriaca se distingue mejor en español con dos términos cercanos pero no idénticos; «misericordias» y «gracia» conservan esa diferenciación.
- source_word: ܚܘ̈ܘܝ
  english_pob_choice: visions
  chosen_spanish: visiones
  alternatives_spanish:
  - revelaciones
  lexicon: Payne Smith
  rationale: En el contexto apocalíptico, «visiones» es natural y preciso; además, empareja bien con «una palabra» revelada.
- source_word: ܫܘܠܡܐ / completion language
  english_pob_choice: consummation / completion
  chosen_spanish: consumación / terminación
  alternatives_spanish:
  - fin
  - cumplimiento
  lexicon: Payne Smith
  rationale: «Consumación» mantiene la fuerza escatológica; «terminación de su juicio» refleja la idea de cierre/completación sin reducirla a un simple final cronológico.
- source_word: ܢܘܛܦܬܐ / spittle-comparison
  english_pob_choice: reckoned like spittle
  chosen_spanish: serán contadas como una gota / será estimada como saliva
  alternatives_spanish:
  - serán contadas como escupitajo
  - serán tenidas por saliva
  lexicon: Payne Smith
  rationale: El símil degradante debe conservarse. Para la primera comparación, «una gota» sigue la solución del POB inglés; en la segunda, «saliva» mantiene la imagen despectiva más literalmente en español.
- source_word: ܩܝ̈ܡܘܗܝ / ܦܘܩܕܢܐ
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - estatutos
  - ordenanzas
  lexicon: Payne Smith
  rationale: «Mandamientos» es el equivalente natural y claro en español para preservar la obligación de pacto sin oscurecer el sentido.
theological_decisions:
- issue: Lenguaje de venganza divina
  english_pob_reading: our Maker will require vengeance from all our enemies
  chosen_spanish_reading: nuestro Hacedor pedirá venganza de todos nuestros enemigos
  alternative_spanish_readings:
  - nuestro Hacedor hará justicia contra todos nuestros enemigos
  - nuestro Hacedor nos vengará de todos nuestros enemigos
  rationale: La construcción conserva el tono judicial y apocalíptico del original. «Pedirá venganza» evita suavizar la severidad del texto sin convertirla en venganza privada.
  doctrine_reference: Vindicación divina / justicia retributiva en contexto apocalíptico
- issue: Inminencia escatológica
  english_pob_reading: the consummation ... is near, and his mercy is coming
  chosen_spanish_reading: la consumación ... está cerca, y su misericordia viene
  alternative_spanish_readings:
  - el fin ... está cerca
  - la consumación de los siglos está cerca
  rationale: El pasaje une juicio y misericordia en expectativa inminente; la formulación española mantiene ambos elementos explícitos.
  doctrine_reference: Escatología apocalíptica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió el giro de «concerning consolation» a una construcción directa del sustantivo; por eso se traduce como «palabra de consuelo» y no como una paráfrasis más débil. También se preservó la distinción entre los títulos divinos y la secuencia escatológica del POB inglés, sin mecanizarlo desde el inglés cuando el español requiere otra colocación natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exige explícitamente; en este pasaje no aparece.
  - Se conserva la distinción entre «el Altísimo» y «el Poderoso» para no fusionar dos títulos distintos.
  - «Gracia» y «misericordias» se mantienen diferenciadas donde el siriaco las distingue.
  - La comparación degradante de las naciones se conserva sin suavizarla; se eligió una sintaxis española fluida pero fiel.
  - «Mandamientos» se usa como término de obligación pactal, coherente con el tono del pasaje.
