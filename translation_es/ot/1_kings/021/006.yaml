translation:
  language: es
  text: 'Y le habló a ella, diciendo: «Hablé a Nabot el jezreelita y le dije: “Dame tu viña por plata[a], o, si quieres, te daré una viña en su lugar”; pero él dijo: “No te daré mi viña”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “dinero”. El hebreo dice literalmente “plata”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אֵלֶיהָ
  english_pob_choice: And he spoke to her
  chosen_spanish: Y le habló
  alternatives_spanish:
  - Y le dijo
  lexicon: HALOT
  rationale: דבר normalmente significa “hablar”. En español, “le habló” conserva el sentido de introducir un acto de habla sin forzar una equivalencia demasiado literal con “dijo”.
- source_word: כִּי
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: Aquí כִּי introduce el contenido del discurso reportado, no una causa en español. Por eso “diciendo” refleja mejor la función narrativa y evita el error semántico de leer una causalidad.
- source_word: אֲדַבֵּר
  english_pob_choice: I spoke
  chosen_spanish: Hablé
  alternatives_spanish:
  - Iba hablando
  - Decía
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecta, en este contexto funciona como referencia pasada dentro del discurso indirecto. “Hablé” mantiene la distinción narrativa frente a “le dije” sin recargar el español.
- source_word: נָבוֹת הַיִּזְרְעֵאלִי
  english_pob_choice: Naboth the Jezreelite
  chosen_spanish: Nabot el jezreelita
  alternatives_spanish:
  - Nabot, el de Jezreel
  lexicon: HALOT
  rationale: Se conserva el nombre propio y el gentilicio. “Jezreelita” reproduce el valor de procedencia/identidad del hebreo de forma natural en español bíblico contemporáneo.
- source_word: תְּנָה לִּי אֶת כַּרְמְךָ
  english_pob_choice: Give me your vineyard
  chosen_spanish: Dame tu viña
  alternatives_spanish:
  - Entrégame tu viña
  lexicon: HALOT
  rationale: כַּרְם puede renderizarse “viña” o “viñedo”; aquí “viña” es la opción más directa y tradicionalmente comprensible en español. “Dame” preserva la fuerza imperativa del mandato.
- source_word: בְּכֶסֶף
  english_pob_choice: for silver
  chosen_spanish: por plata[a]
  alternatives_spanish:
  - por dinero
  lexicon: HALOT
  rationale: Se conserva el concreto “plata” del hebreo, como hizo la POB en inglés con “silver”, para no diluir la imagen monetaria. En español “plata” es idiomático y claro; la nota permite la alternativa “dinero”.
- source_word: א֚וֹ אִם חָפֵץ אַתָּה
  english_pob_choice: or, if you prefer
  chosen_spanish: o, si quieres
  alternatives_spanish:
  - o, si estás dispuesto
  - o, si te parece bien
  lexicon: HALOT
  rationale: חָפֵץ expresa deseo o disposición. “Si quieres” comunica con naturalidad la oferta condicionada, manteniendo la amplitud semántica sin sonar artificial.
- source_word: אֶתְּנָה לְךָ כֶרֶם תַּחְתָּיו
  english_pob_choice: I will give you a vineyard in place of it
  chosen_spanish: te daré una viña en su lugar
  alternatives_spanish:
  - te daré otro viñedo en su lugar
  - te daré una viña en vez de ella
  lexicon: HALOT
  rationale: תַּחְתָּיו indica sustitución. “En su lugar” conserva la idea de intercambio sin añadir elementos no explícitos como “otro”. La concordancia femenina de “ella” podría sonar más literal, pero “su lugar” es más idiomático en español.
- source_word: וַיֹּאמֶר לֹא אֶתֵּן לְךָ אֶת כַּרְמִי
  english_pob_choice: but he said, ‘I will not give you my vineyard.’
  chosen_spanish: 'pero él dijo: “No te daré mi viña”'
  alternatives_spanish:
  - 'y él dijo: “No te daré mi viña”'
  lexicon: HALOT
  rationale: El waw consecutivo puede traducirse con “y”, pero “pero” transmite mejor la oposición contextual entre la oferta y la negativa. “Mi viña” mantiene la posesión enfática del hebreo.
translation_notes:
  revision_awareness: 'La versión inglesa auditada corrigió el enlace causal de כִּי: de un posible “because” a un introductor de discurso (“saying”). También consolidó las comillas del reporte completo de Acab a Jezabel. La redacción española sigue esa revisión y evita leer causalidad donde el hebreo introduce contenido de habla.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa “viña” para כַּרְם por claridad y naturalidad; “viñedo” quedaría disponible como alternativa interpretativa, pero aquí “viña” reproduce mejor el tono concreto del relato.
  - Se conserva “plata” en el texto principal para reflejar el valor concreto del hebreo, con nota para la alternativa idiomática “dinero”.
  - La puntuación con comillas anidadas busca reflejar el discurso directo dentro del reporte narrativo sin perder legibilidad en español.
