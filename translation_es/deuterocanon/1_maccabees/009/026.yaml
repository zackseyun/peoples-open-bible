- from: Y seguían buscando y registrando a los amigos[a] de Judas, y los llevaban ante Bacquides[b], y él se vengaba de ellos, y se burlaban de ellos.
  to: Y seguían buscando y registrando a los amigos[a] de Judas, y los llevaban a Bacquides, y él tomaba venganza[b] de ellos, y se burlaban de ellos.
  rationale: Se corrige el anclaje de la nota b para que corresponda al verbo ἐξεδίκα, y se ajusta «ante Bacquides» a «a Bacquides» para reflejar más directamente πρός. También se reemplaza «se vengaba de» por «tomaba venganza de» para anclar con claridad la nota léxica y mejorar la fluidez de la secuencia final sin alterar el sentido.
