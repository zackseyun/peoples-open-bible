translation:
  language: es
  text: Y tú mismo sufrirás muchas enfermedades por una enfermedad de tus entrañas[a], hasta que tus entrañas salgan por la enfermedad, día tras día[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «intestinos». El hebreo se refiere a los órganos internos.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «días sobre días», un modismo que indica continuidad prolongada, equivalente a «día tras día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: And you yourself
  chosen_spanish: Y tú mismo
  alternatives_spanish:
  - Y tú
  - Pero tú
  lexicon: HALOT
  rationale: La combinación de la conjunción y el pronombre independiente marca un señalamiento directo y enfático a Joram. «Tú mismo» conserva ese énfasis sin recargar el español.
- source_word: בָּחֳלָיִים רַבִּים
  english_pob_choice: will suffer from many illnesses
  chosen_spanish: sufrirás muchas enfermedades
  alternatives_spanish:
  - padecerás muchas enfermedades
  - estarás con muchas enfermedades
  lexicon: HALOT
  rationale: La preposición con este sustantivo expresa la condición aflictiva. En español, «sufrirás muchas enfermedades» comunica de forma natural la pluralidad y gravedad del padecimiento.
- source_word: בְּמַחֲלֵה
  english_pob_choice: from a disease
  chosen_spanish: una enfermedad
  alternatives_spanish:
  - un mal
  - una dolencia
  lexicon: HALOT
  rationale: El hebreo introduce una afección concreta que explica el cuadro general. «Una enfermedad» mantiene el sentido médico básico sin añadir interpretaciones que el texto no exige.
- source_word: מֵעֶיךָ
  english_pob_choice: of your bowels
  chosen_spanish: de tus entrañas
  alternatives_spanish:
  - de tus intestinos
  - de tus entrañas interiores
  lexicon: HALOT
  rationale: El término hebreo designa los órganos internos. «Entrañas» es una opción natural en español bíblico y conserva el sentido de interioridad corporal sin reducirlo a una anatomía demasiado técnica.
- source_word: עַד יֵצְאוּ מֵעֶיךָ
  english_pob_choice: until your bowels come out
  chosen_spanish: hasta que tus entrañas salgan
  alternatives_spanish:
  - hasta que tus intestinos salgan
  - hasta que salgan tus entrañas
  lexicon: HALOT
  rationale: יצא conserva su valor directo de «salir». La frase no debe suavizarse, porque el hebreo presenta el desenlace con crudeza deliberada.
- source_word: מִן הַחֹלִי
  english_pob_choice: because of the disease
  chosen_spanish: por la enfermedad
  alternatives_spanish:
  - a causa de la enfermedad
  - debido a la enfermedad
  lexicon: HALOT
  rationale: Aquí מן expresa causalidad. «Por la enfermedad» es breve y natural en español, y mantiene la relación de causa sin sobreexplicar.
- source_word: יָמִים עַל יָמִים
  english_pob_choice: day after day
  chosen_spanish: día tras día
  alternatives_spanish:
  - día por día
  - por muchos días
  lexicon: HALOT
  rationale: El hebreo es una expresión idiomática de continuidad. «Día tras día» preserva el valor durativo y resulta idiomático en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el expediente inglés revisado, manteniendo la intensidad de la enfermedad, la referencia concreta a las entrañas y el modismo final de continuidad sin suavizar el desenlace físico.
  spanish_consistency_notes:
  - Se mantuvo «entrañas» para conservar el campo semántico de מֵעֶה, coherente con el registro bíblico y con la nota lexical del POB inglés.
  - Se evitó «Señor» u otras sustituciones no presentes en el versículo; no hay término divino en este texto.
  - La construcción final «día tras día» se alineó con el modismo hebreo y con el equivalente auditado del inglés.
  - 'No se distinguió entre singular/plural en «enfermedad/enfermedades» más allá de lo que exige el hebreo: plural para la aflicción general y singular para la dolencia específica.'
