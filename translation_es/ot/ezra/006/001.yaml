base_translation:
  language: en
  yaml_path: translation/ot/ezra/006/001.yaml
  text: Then King Darius issued a decree[a], and they searched in the house of the archives, where the treasures were stored[c][b], there in Babylon.
  footnotes:
  - marker: a
    text: Or 'Darius the king made a decree, and a search was made in the archive house.' The Aramaic more literally reads 'set a decree' and uses a third-person plural verb ('they searched'), which may function impersonally.
    reason: alternative_reading
  - marker: b
    text: '''House of the archives'' is literally ''house of the books/documents,'' referring to an official records repository.'
    reason: lexical_alternative
  - marker: c
    text: '''Treasures'' may also be understood more broadly as stored valuables or deposits kept in the archive complex.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
