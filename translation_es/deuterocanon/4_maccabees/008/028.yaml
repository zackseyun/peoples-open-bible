translation:
  language: es
  text: Porque despreciaban los sufrimientos[a] y eran dueños de los dolores[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «despreciadores de los sufrimientos». El adjetivo griego es fuerte y expresa mirar los sufrimientos desde arriba, no solo soportarlos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dueños de los dolores» / «en control de los dolores». El griego destaca la idea de dominio o señorío sobre el dolor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περίφρονες
  english_pob_choice: contemptuous of
  chosen_spanish: despreciadores de
  alternatives_spanish:
  - despectivos de
  - despreciativos de
  - despreciadores de los sufrimientos
  lexicon: LSJ
  rationale: El adjetivo expresa una actitud de mirar por encima o tratar con desprecio. «Despreciadores de» conserva esa fuerza evaluativa en español sin suavizarla a mera indiferencia.
- source_word: τῶν παθῶν
  english_pob_choice: sufferings
  chosen_spanish: los sufrimientos
  alternatives_spanish:
  - las pasiones
  - las aflicciones
  - las experiencias
  lexicon: LSJ
  rationale: En este contexto de martirio, πάθη se refiere a padecimientos sufridos, no a pasiones internas. «Sufrimientos» es el equivalente más natural y fiel.
- source_word: αὐτοκράτορες
  english_pob_choice: masters of
  chosen_spanish: dueños de
  alternatives_spanish:
  - amos de
  - señores de
  - soberanos sobre
  - autodominadores de
  lexicon: LSJ
  rationale: El término indica dominio efectivo sobre algo. «Dueños de» comunica en español la idea de control y señorío sin forzar una expresión demasiado literal o extraña.
- source_word: τῶν ἀλγηδόνων
  english_pob_choice: pains
  chosen_spanish: los dolores
  alternatives_spanish:
  - los sufrimientos
  - los tormentos
  - las agonías
  lexicon: LSJ
  rationale: ἀλγηδών denota dolor, especialmente corporal. «Dolores» es una opción directa y comprensible en español; en este contexto mantiene la referencia al padecimiento físico.
theological_decisions:
- issue: Relación entre desprecio del sufrimiento y dominio del dolor
  english_pob_reading: The verse states that the subjects exercised mastery over bodily pain and treated sufferings with contempt, without adding a philosophical explanation in the translation itself.
  chosen_spanish_reading: El versículo afirma que ejercían dominio sobre el dolor y miraban con desprecio los sufrimientos, sin introducir una explicación filosófica adicional.
  alternative_spanish_readings:
  - Podría ampliarse interpretativamente para subrayar una impasibilidad de tipo estoico.
  - Podría suavizarse la fuerza y traducirse solo como que soportaban los padecimientos.
  rationale: El griego es breve y descriptivo. La traducción conserva la afirmación de resistencia y autocontrol sin importar un sistema filosófico que el verso no explicita.
  doctrine_reference: Conservar la tensión teológica y no resolverla añadiendo ideas ajenas al texto.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambio alguno; el presente borrador mantiene la lectura de alta concordancia con ajustes mínimos de español para fluidez y precisión semántica.
  spanish_consistency_notes:
  - Se mantiene «sufrimientos» para πάθη en la nota alternativa, pero en el texto principal se opta por «dolores» para evitar una repetición menos natural con «despreciadores de los sufrimientos» y preservar una cadencia española fluida.
  - «Dueños de» se usa como equivalente idiomático de αὐτοκράτορες, sin convertirlo en un lenguaje eclesiástico más tradicional que el alcance del griego no exige.
