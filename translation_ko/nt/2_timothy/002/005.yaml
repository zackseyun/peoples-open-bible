  text: And if anyone also competes as an athlete, he is not crowned unless he competes according to the rules.
translation:
  language: ko
  text: 또 누구든지 경기에 나가는 사람은 규정대로 경기하지 않으면 면류관을 받지 못합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀθλῇ ... ἀθλήσῃ
  english_pob_choice: competes as an athlete ... competes
  chosen_korean: 경기에 나가는 ... 경기하지
  alternatives_korean:
  - 경기를 하는 ... 경기를 하지
  - 시합에 참여하는 ... 시합하지
  lexicon: BDAG
  rationale: ἀθλέω는 「경기·시합에 참여함」을 뜻한다. 「경기」가 한국 성서 전통에서 익숙하다.
- source_word: στεφανοῦται
  english_pob_choice: he is not crowned
  chosen_korean: 면류관을 받지 못합니다
  alternatives_korean:
  - 화관을 받지 못합니다
  - 승리관을 얻지 못합니다
  lexicon: BDAG
  rationale: στέφανος는 고대 운동 경기의 승리자에게 씌우는 화관이며, 한국 성서 전통의 「면류관」이 그 신학적 무게(4:8의 「의의 면류관」과 연결)와 함께 살아 있다.
- source_word: νομίμως
  english_pob_choice: according to the rules
  chosen_korean: 규정대로
  alternatives_korean:
  - 법대로
  - 규칙에 따라
  lexicon: BDAG
  rationale: 「규정」이 경기 비유에서 자연스러우며, 한국어로 익숙하다.
