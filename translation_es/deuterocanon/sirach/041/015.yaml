translation:
  language: es
  text: Mejor es el hombre que oculta su necedad que el hombre que oculta su sabiduría[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Mejor es una persona que oculta su necedad que alguien que oculta su sabiduría''. El hebreo y el griego usan un singular masculino representativo.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo termina con una frase difícil, literalmente algo como 'disciplina/corrección de vergüenza' (מוסר בשת), mientras que el griego dice simplemente 'que oculta su sabiduría'. El texto principal sigue el sentido comparativo más claro apoyado por el paralelo griego.
    reason: textual_variant
lexical_decisions:
- source_word: טוב / κρείσσων
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Más vale
  lexicon: HALOT; LXX κρείσσων
  rationale: La forma comparativa breve reproduce el paralelismo sapiencial del hebreo y del griego, y suena natural en español sin añadir énfasis ajeno al texto.
- source_word: איש / ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT; LXX ἄνθρωπος
  rationale: Se conserva el singular masculino representativo del original. En español, 'el hombre' funciona de modo genérico y mantiene la concisión del proverbio.
- source_word: מצפין / ἀποκρύπτων
  english_pob_choice: who hides
  chosen_spanish: que oculta
  alternatives_spanish:
  - que esconde
  - que encubre
  - que mantiene oculto
  lexicon: HALOT; LSJ
  rationale: '''Oculta'' expresa bien la acción de poner algo fuera de vista y conserva la repetición estructural del participio en ambas mitades del versículo.'
- source_word: אולתו / μωρίαν
  english_pob_choice: his folly
  chosen_spanish: su necedad
  alternatives_spanish:
  - su locura
  - su foolishness
  - su estupidez
  lexicon: HALOT; BDAG/LSJ μωρία
  rationale: '''Necedad'' encaja con el registro sapiencial y comunica mejor la cualidad moral/intelectual sin endurecer el tono como ''estupidez''.'
- source_word: חכמתו / σοφίαν
  english_pob_choice: his wisdom
  chosen_spanish: su sabiduría
  alternatives_spanish:
  - su prudencia
  - su conocimiento
  lexicon: HALOT; LSJ σοφία
  rationale: '''Sabiduría'' es el equivalente directo y esperado en literatura sapiencial; no hay presión contextual para restringirlo a ''prudencia''.'
- source_word: מוסר בשת
  english_pob_choice: instruction is shame
  chosen_spanish: la instrucción es vergüenza
  alternatives_spanish:
  - la corrección es vergüenza
  - la disciplina es vergüenza
  - instrucción vergonzosa
  lexicon: HALOT; textual parallel with Greek
  rationale: Se conserva la cláusula difícil del hebreo en una forma comprensible y literal. Dado que el hebreo transmite מוסר בשת y la tradición griega ofrece una comparación más clara, se mantiene la tensión sin borrar el problema textual.
theological_decisions:
- issue: Tratamiento del final difícil מוסר בשת frente al paralelo griego
  english_pob_reading: The main text follows the clearer comparative sense supported by the Greek parallel, while acknowledging the Hebrew difficulty in a footnote.
  chosen_spanish_reading: Se conserva la cláusula 'la instrucción es vergüenza' en el texto principal y se nota la dificultad textual.
  alternative_spanish_readings:
  - Mejor es ... que ...; la instrucción es vergüenza.
  - Mejor es ... que ...; corrección es vergüenza.
  rationale: El POB inglés decidió no borrar la frase hebrea difícil; en español conviene retenerla para no perder la tensión documental entre el hebreo y el griego, explicando en nota que el griego presenta la comparación clara.
  doctrine_reference: Textual criticism / source transparency
- issue: Valor representativo del masculino singular איש / ἄνθρωπος
  english_pob_reading: The source uses the singular masculine form 'man' in a representative sense.
  chosen_spanish_reading: '''El hombre'' se usa en sentido representativo, no exclusivo.'
  alternative_spanish_readings:
  - '''la persona'''
  - '''alguien'''
  rationale: La formulación mantiene fidelidad al número y al género del original, a la vez que sigue siendo idiomática en español; una neutralización a 'persona' perdería el eco léxico del paralelo.
  doctrine_reference: Translation of grammatical gender / generic masculine
translation_notes:
  revision_awareness: La revisión inglesa añadió la cláusula final 'instruction is shame' para dar cuenta de מוסר בשת. En esta versión española se conserva esa cláusula como 'la instrucción es vergüenza', pero se marca la tensión textual entre el hebreo y el griego en nota; por eso el texto principal no sigue una simplificación puramente comparativa.
  spanish_consistency_notes:
  - Se usa 'sabiduría' para σοφία/חכמה y 'necedad' para μωρία/אולת, manteniendo el par sapiencial.
  - Se evita 'SEÑOR' u otras convenciones no pertinentes; no hay nombres divinos en el versículo.
  - Se mantiene el paralelismo con 'que oculta ... que ...' para reflejar la estructura del hebreo y del griego.
  - La cláusula final se traduce de manera literal y sobria para no disolver el problema textual en paráfrasis.
