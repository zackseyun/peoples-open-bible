translation:
  language: es
  text: Un hijo sabio acepta la disciplina paterna[a], pero el burlador[b] no escucha la reprensión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «oye la disciplina paterna»; el verbo hebreo para «oír» puede implicar escuchar con aceptación u obediencia, y el primer hemistiquio probablemente sugiere ese sentido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mofador» por «burlador».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo varón
  - muchacho
  lexicon: HALOT
  rationale: En español, «hijo» comunica naturalmente el sustantivo masculino singular del proverbio sin perder la función representativa del caso sapiencial. «Hijo varón» sería más explicativo de lo necesario y «muchacho» desplaza el énfasis etario.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hábil
  lexicon: HALOT
  rationale: «Sabio» es la correspondencia directa y natural en el registro sapiencial. «Prudente» puede ser posible, pero atenúa la categoría de sabiduría moral propia de Proverbios.
- source_word: מוּסַר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  lexicon: HALOT
  rationale: La idea es formativa y correctiva, no solo informativa; «disciplina» conserva esa fuerza en español y encaja con el contraste con la reprensión. «Instrucción» suaviza demasiado la corrección.
- source_word: אָב
  english_pob_choice: a father's
  chosen_spanish: de su padre
  alternatives_spanish:
  - de un padre
  - paterna
  lexicon: HALOT
  rationale: El hebreo no explicita posesivo pronominal; «de su padre» es idiomático en español y mantiene la relación paterna sin introducir una precisión inexistente en el texto. «Paterna» suena más abstracto.
- source_word: לֵץ
  english_pob_choice: scoffer
  chosen_spanish: burlador
  alternatives_spanish:
  - escarnecedor
  - mofador
  lexicon: HALOT
  rationale: «Burlador» transmite bien la actitud insolente y despectiva del término en Proverbios, de manera natural para el lector español. «Escarnecedor» es posible, pero menos común; «mofador» resulta más regional y menos estable.
- source_word: שָׁמַע
  english_pob_choice: accepts / does not listen to
  chosen_spanish: acepta / no escucha
  alternatives_spanish:
  - oye / no oye
  - atiende / no atiende
  - obedece / no obedece
  lexicon: HALOT
  rationale: En el primer hemistiquio el verbo debe expresar la aceptación/obediencia implícita del hebreo; «acepta» reproduce bien ese sentido, como en la POB inglesa. En el segundo, «no escucha» es una forma natural de decir que rechaza atender a la reprensión, sin volverlo demasiado interpretativo.
- source_word: גְּעָרָה
  english_pob_choice: rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - reprendo
  - censura
  - reproche
  lexicon: HALOT
  rationale: El sustantivo designa una amonestación verbal; «reprensión» es claro, sobrio y fiel al tono de Proverbios. «Reproche» también sería posible, pero «reprensión» preserva mejor la fuerza correctiva.
translation_notes:
  revision_awareness: 'El texto en español sigue de cerca el audit trail inglés de POB y conserva la tensión lexical de שָׁמַע en el primer hemistiquio: no solo oír, sino aceptar/hechar mano de la disciplina. También mantiene el contraste proverbial entre el hijo sabio y el lֵץ sin neutralizarlo.'
  spanish_consistency_notes:
  - Se mantuvo el tono sapiencial breve y antitético del hebreo.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el nombre divino.
  - «Disciplina» y «reprensión» conservan la distinción entre formación correctiva y amonestación verbal.
  - «Burlador» preserva la carga moral de לֵץ en un registro español natural.
