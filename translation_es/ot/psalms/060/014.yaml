translation:
  language: es
  text: Con Dios[a] haremos proezas, y él[b] pisoteará a nuestros adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por Dios haremos proezas». La preposición hebrea puede expresar cercanía o medio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hollará a nuestros enemigos». El verbo hebreo expresa la imagen de hollar o pisar bajo los pies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאלֹהִים
  english_pob_choice: With God
  chosen_spanish: Con Dios
  alternatives_spanish:
  - Por Dios
  - Con la ayuda de Dios
  - En Dios
  lexicon: HALOT
  rationale: La preposición ב aquí expresa asociación o medio. «Con Dios» conserva la cercanía y dependencia implícitas en el hebreo, y resulta idiomático en español sin sobrecargar la frase con una glosa explicativa.
- source_word: נַעֲשֶׂה
  english_pob_choice: we will do
  chosen_spanish: haremos
  alternatives_spanish:
  - haremos acciones
  - actuaremos
  - obremos
  lexicon: HALOT
  rationale: El verbo עשה es amplio ('hacer, obrar, realizar'). En esta construcción con חָיִל, el español natural es «haremos», que permite reflejar la idea idiomática de realizar hazañas sin perder el verbo básico.
- source_word: חָיִל
  english_pob_choice: valiantly
  chosen_spanish: proezas
  alternatives_spanish:
  - valentía
  - hazañas
  - vigor
  lexicon: HALOT
  rationale: El sustantivo חָיִל puede significar fuerza, valor o capacidad militar. En la expresión idiomática עשה חָיִל, el sentido apunta a actos valerosos o hazañas. «Proezas» comunica bien ese resultado en español y evita reducir el término solo a una cualidad abstracta.
- source_word: וְהוּא
  english_pob_choice: and he
  chosen_spanish: y él
  alternatives_spanish:
  - pero él
  - y es él
  - él mismo
  lexicon: HALOT
  rationale: La conjunción más el pronombre independiente conservan la coordinación enfática del hebreo. «Y él» mantiene la fuerza del sujeto explícito y la transición a la acción decisiva de Dios.
- source_word: יָבוּס
  english_pob_choice: will trample
  chosen_spanish: aplastará
  alternatives_spanish:
  - pisoteará
  - derribará
  - trillará
  lexicon: HALOT
  rationale: El verbo בוס expresa la imagen de pisar o hollar. En español, «aplastará» transmite con claridad la derrota violenta y la contundencia de la imagen, sin sonar forzado.
- source_word: צָרֵינוּ
  english_pob_choice: our adversaries
  chosen_spanish: a nuestros adversarios
  alternatives_spanish:
  - a nuestros enemigos
  - a quienes nos adversan
  lexicon: HALOT
  rationale: El sustantivo de צרר designa adversarios o enemigos. «Adversarios» sigue de cerca la elección auditada en inglés y conserva un matiz algo más amplio que «enemigos».
theological_decisions:
- issue: Agencia humana y divina en la victoria
  english_pob_reading: The verse presents both human action ('we will do valiantly') and divine decisive action ('he will trample our adversaries') without collapsing one into the other.
  chosen_spanish_reading: El versículo mantiene juntos el obrar humano («haremos proezas») y la acción decisiva de Dios («él aplastará a nuestros adversarios»), sin confundirlos ni separarlos.
  alternative_spanish_readings:
  - Solo nosotros venceremos
  - Solo Dios vencerá
  - Con Dios lograremos hazañas
  rationale: 'La redacción española conserva la tensión del hebreo: el pueblo actúa con Dios, pero la victoria final pertenece a él. No se diluye la agencia humana ni se absorbe la divina.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo de Salmos 60:14 y con el audit trail inglés: se mantiene la doble afirmación de acción humana y acción decisiva de Dios, sin cambios de revisión pendientes.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים según la norma del proyecto.
  - Se conserva el tono poético y militar del verso con léxico claro y digno.
  - «Adversarios» mantiene el matiz lexical elegido en el inglés auditado.
