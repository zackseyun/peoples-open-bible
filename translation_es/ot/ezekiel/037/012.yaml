review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mandato profético, fórmula mensajera, apertura de sepulcros, ascenso desde ellos y retorno a la tierra de Israel. Sin embargo, hay varios desajustes menores pero significativos: (1) הִנֵּה אֲנִי es mejor como singular enfático dirigido al oyente (''Miren'' cambia a plural imperativo y tono coloquial); (2) el proyecto prefiere ''Yahvé'' para יהוה, y en אֲדֹנָי יְהוִה conviene evitar ''Señor Yahvé'' si suena híbrido, optando por ''el Señor Dios, Yahvé'' para preservar ambos elementos; (3) ''haré entrar en la tierra'' pierde la preposición explícita ''a/into'' y suena algo menos natural que ''los llevaré a la tierra de Israel''; (4) la nota [a] del español no corresponde a la nota inglesa, que documenta la alternativa de ''bring you up/raise you'', no la fórmula ''say to them''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere pulido para mejor naturalidad y fidelidad. 'Miren, yo' suena menos solemne que 'He aquí, yo' o 'Miren que yo'; 'sus sepulcros' con tratamiento de cortesía es posible, pero en discurso profético colectivo suele leerse más naturalmente 'sus' solo si todo el pasaje mantiene esa convención. La frase final mejora con 'los llevaré a la tierra de Israel'.
  glossary_alignment: 'Alineación parcial. Se cumple ''Yahvé'' en vez de enmascararlo como ''SEÑOR'', pero la combinación ''el Señor Yahvé'' no expresa con suficiente claridad los dos elementos de אֲדֹנָי יְהוִה en español. El resto de la terminología principal es aceptable: ''profetiza'', ''sepulcros'', ''pueblo mío''.'
  issues:
  - severity: medium
    issue: La nota [a] no preserva la alternativa léxica documentada en el POB inglés.
    rationale: La nota inglesa explica la alternativa de וְהַעֲלֵיתִי como 'will raise you' frente a 'will bring you up', mientras que la española introduce una alternativa distinta sobre 'y diles'/'y les dirás'.
  - severity: medium
    issue: '''Miren, yo'' no representa idealmente הִנֵּה אֲנִי.'
    rationale: הִנֵּה אֲנִי introduce con solemnidad la acción divina. 'Miren' cambia a imperativo plural; 'He aquí, yo' o 'Miren que yo' preserva mejor el valor deíctico sin desplazar la voz.
  - severity: medium
    issue: La representación de אֲדֹנָי יְהוִה necesita mejor solución en español.
    rationale: El proyecto pide 'Yahvé' para יהוה. 'el Señor Yahvé' es entendible, pero no refleja con total claridad el título compuesto; 'el Señor Dios, Yahvé' preserva ambos elementos con mejor legibilidad en español.
  - severity: low
    issue: '''y los haré entrar en la tierra de Israel'' es menos natural y menos directo que otras opciones.'
    rationale: וְהֵבֵאתִי אֶתְכֶם significa 'los traeré/llevaré'. Con 'haré entrar' la frase final queda algo forzada y la preposición 'en' pierde el matiz direccional que 'a la tierra de Israel' expresa mejor.
  revised_spanish_text: 'Por tanto, profetiza y diles: «Así dice el Señor Dios, Yahvé: He aquí, yo abro sus sepulcros y los haré subir[a] de sus sepulcros, pueblo mío[b], y los llevaré a la tierra de Israel»'
  revised_footnotes:
