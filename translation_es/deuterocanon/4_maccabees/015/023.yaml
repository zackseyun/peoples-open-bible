translation:
  language: es
  text: Pero la razón devota[a], fortaleciendo sus entrañas[b] aun en esos mismos padecimientos, se esforzaba por pasar por alto su amor temporal por sus hijos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «razón piadosa». La expresión griega es clave en 4 Macabeos para la razón guiada por reverencia hacia Dios.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sus entrañas» o «sus afectos internos». El griego conserva una imagen corporal para los afectos profundos.
    reason: lexical_alternative
  - marker: c
    text: O «su amor temporal por sus hijos» o «su afecto materno transitorio». El texto contrapone el apego materno natural con la fidelidad firme bajo sufrimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσεβὴς λογισμός
  english_pob_choice: devout reason
  chosen_spanish: discernimiento piadoso
  alternatives_spanish:
  - razón piadosa
  - razón devota
  - pensamiento piadoso
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός no es solo 'razón' abstracta, sino un juicio o discernimiento guiado por reverencia hacia Dios. 'Discernimiento piadoso' conserva el componente racional sin sonar rígido en español y evita reducir la frase a una mera facultad mental.
- source_word: σπλάγχνα
  english_pob_choice: inward affections
  chosen_spanish: entrañas
  alternatives_spanish:
  - afectos internos
  - afectos entrañables
  - corazón
  lexicon: LSJ
  rationale: El término griego es corporal y afectivo a la vez. 'Entrañas' mantiene el valor literal y bíblico del lenguaje de interioridad, mientras que 'afectos internos' suaviza demasiado la imagen. Se conserva así la tensión entre lo físico y lo emocional.
- source_word: ἐν αὐτοῖς τοῖς πάθεσιν
  english_pob_choice: in the midst of those very sufferings
  chosen_spanish: aun en esos mismos padecimientos
  alternatives_spanish:
  - en medio de esos mismos padecimientos
  - en esos mismos padecimientos
  - en medio de aquellos padecimientos
  lexicon: LSJ
  rationale: πάθη aquí se refiere a sufrimientos o tormentos, no a pasiones internas. 'Aun en esos mismos padecimientos' refleja el énfasis de αὐτοῖς τοῖς y suena natural en español.
- source_word: ἀνδρειώσας
  english_pob_choice: strengthening
  chosen_spanish: fortaleciendo
  alternatives_spanish:
  - dando valor
  - haciendo valiente
  - robusteciendo
  lexicon: LSJ
  rationale: El participio expresa hacer fuerte o valiente. 'Fortaleciendo' funciona bien con el objeto 'entrañas' y evita la connotación de género de 'hacer valiente/manly', manteniendo la idea de firmeza bajo presión.
- source_word: ἐτέτεινεν
  english_pob_choice: strained
  chosen_spanish: la impulsaba a
  alternatives_spanish:
  - la tensaba a
  - la esforzaba a
  - la urgía a
  lexicon: LSJ
  rationale: El verbo sugiere un esfuerzo tenso, una presión sostenida. En español, 'la impulsaba a' transmite el empuje de la frase sin crear una imagen demasiado extraña; el matiz de tensión queda reforzado por el conjunto de la oración.
- source_word: τὴν πρόσκαιρον φιλοτεκνίαν
  english_pob_choice: her temporary love for her children
  chosen_spanish: su amor temporal por sus hijos
  alternatives_spanish:
  - su afecto pasajero por sus hijos
  - su amor transitorio por sus hijos
  - su maternidad pasajera
  lexicon: LSJ
  rationale: φιλοτεκνία es amor/afecto hacia los hijos; πρόσκαιρον marca su carácter pasajero o temporal. 'Amor temporal por sus hijos' conserva el contraste sin convertir el texto en una negación del amor materno mismo.
- source_word: παροδεῖν
  english_pob_choice: to disregard
  chosen_spanish: pasar por alto
  alternatives_spanish:
  - desatender
  - ignorar
  - despreciar
  lexicon: LSJ
  rationale: El infinitivo significa pasar de largo, pasar por alto, dejar de lado. 'Pasar por alto' expresa la renuncia deliberada con un nivel de formalidad adecuado para el contexto.
theological_decisions:
- issue: How to render εὐσεβὴς λογισμός without flattening the book's programmatic use of reason under reverence toward God
  english_pob_reading: devout reason
  chosen_spanish_reading: discernimiento piadoso
  alternative_spanish_readings:
  - razón piadosa
  - razón devota
  rationale: El libro presenta la razón no como autonomía fría, sino como juicio disciplinado por la piedad. 'Discernimiento piadoso' comunica ese sentido funcional en español y preserva la relación entre racionalidad y reverencia sin introducir categorías doctrinales ajenas.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; original-language primacy'
- issue: How to express the contrast in πρόσκαιρον φιλοτεκνίαν without implying that maternal affection is inherently bad
  english_pob_reading: her temporary love for her children
  chosen_spanish_reading: su amor temporal por sus hijos
  alternative_spanish_readings:
  - su afecto pasajero por sus hijos
  - su amor transitorio por sus hijos
  rationale: La frase contrasta el afecto natural y temporal con la fidelidad firme bajo sufrimiento. 'Amor temporal' preserva el contraste temporal sin convertirlo en una condena moral del amor materno como tal.
  doctrine_reference: 'DOCTRINE.md: do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pase de revisión más reciente del contexto inglés, que reordenó la cláusula para que ''devout reason'' funcione claramente como sujeto. El español sigue ese orden lógico: el discernimiento piadoso es el agente que fortalece y empuja la renuncia, mientras se conserva el énfasis en «esos mismos padecimientos» y la tensión de πρόσκαιρον φιλοτεκνίαν.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o terminología eclesiástica no sustentada por el texto, porque aquí no aparece el nombre divino.
  - Se mantuvo un registro digno y bíblico, pero no arcaizante, adecuado para una traducción pública en español.
  - '''Entrañas'' se prefirió para conservar la metáfora corporal del griego; la nota ofrece la alternativa semántica.'
  - '''Pasar por alto'' se eligió por su naturalidad en español y por reflejar el sentido de pasar de largo / dejar de lado del infinitivo griego.'
