base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/007/040.yaml
  text: All these were sons of Asher[a], heads of fathers’ houses, choice men, mighty men of valor, chief of the princes; and they were enrolled by genealogy for service in the army for war. Their number of men was twenty-six thousand.
  footnotes:
  - marker: a
    text: Or 'their genealogy was recorded' / 'they were registered by genealogy.' The Hebrew verb often refers to genealogical enrollment in Chronicles.
    reason: lexical_alternative
