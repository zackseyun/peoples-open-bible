revisions:
- from: Suban[a], caballos, y enloquezcan, carros; salgan los guerreros—Cus, Put, los que toman el escudo, y los luditas[b], los que toman y manejan el arco.
  to: 'Suban[a], caballos, y arremetan frenéticamente, carros; salgan los guerreros: Cus, Put, los que toman el escudo, y los Ludim[b], los que empuñan y tensan el arco.'
  rationale: Se corrigió el etnónimo a «los Ludim» para ajustarse al hebreo y evitar la falsa asociación de «luditas». Se reemplazó «manejan» por «empuñan y tensan» para preservar las dos acciones del hebreo. Se mejoró «enloquezcan» a «arremetan frenéticamente» para reflejar con más naturalidad española el sentido bélico de movimiento desenfrenado documentado en el audit trail inglés. Se mantuvieron «Suban», «Cus» y «Put» como opciones fieles y legibles.
