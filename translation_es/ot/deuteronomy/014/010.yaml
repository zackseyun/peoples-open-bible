translation:
  language: es
  text: Pero todo lo que no tenga aletas y escamas no comerán; es inmundo para ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: But anything
  chosen_spanish: Pero cualquier cosa
  alternatives_spanish:
  - Y cualquier cosa
  - Pero todo
  lexicon: HALOT
  rationale: El ו introductorio expresa contraste con la autorización anterior, por eso 'Pero'. כֹל en este contexto de clasificación se vierte mejor como 'cualquier cosa', manteniendo la fuerza inclusiva sin volverla rígidamente literal.
- source_word: אֲשֶׁר אֵין לוֹ
  english_pob_choice: that does not have
  chosen_spanish: que no tenga
  alternatives_spanish:
  - que no tiene
  - que carezca de
  lexicon: HALOT
  rationale: La construcción relativa con אֵין + sufijo indica carencia. En español, 'que no tenga' conserva la noción de falta en una cláusula relativa natural.
- source_word: סְנַפִּיר
  english_pob_choice: fins
  chosen_spanish: aletas
  alternatives_spanish:
  - aleta
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, en español la regla dietaria suena natural en plural cuando enumera rasgos de la clase; 'aletas' refleja el uso clasificatorio.
- source_word: וְקַשְׂקֶשֶׂת
  english_pob_choice: and scales
  chosen_spanish: escamas
  alternatives_spanish:
  - una escama
  lexicon: HALOT
  rationale: De modo paralelo a 'aletas', el plural 'escamas' es la forma idiomática en español para una característica de peces en una regla general.
- source_word: לֹא תֹאכֵלוּ
  english_pob_choice: you shall not eat
  chosen_spanish: no la comerán
  alternatives_spanish:
  - no comerán
  - no deben comer
  lexicon: HALOT
  rationale: El plural masculino del mandato legal se expresa con 'no comerán', y el pronombre femenino singular 'la' remite a la criatura/porción entendida por el contexto. Se evita el calco pesado de 'ustedes no comerán' para una fluidez bíblica moderna.
- source_word: טָמֵא
  english_pob_choice: unclean
  chosen_spanish: inmunda
  alternatives_spanish:
  - impura
  - inmunda
  lexicon: HALOT
  rationale: Se conserva la terminología ritual tradicional 'inmunda', que corresponde al valor cultual de טָמֵא. 'Impura' es posible, pero 'inmunda' preserva mejor el campo semántico bíblico de pureza ritual.
- source_word: הוּא לָכֶם
  english_pob_choice: it is unclean for you
  chosen_spanish: es inmunda para ustedes
  alternatives_spanish:
  - les es inmunda
  - es inmunda para ustedes
  lexicon: HALOT
  rationale: La frase marca estado ritual respecto de Israel; 'para ustedes' conserva la relación de pertenencia/estatus. El género se ajusta al referente implícito en español por concordancia con 'cualquier cosa'.
theological_decisions:
- issue: Categoría de pureza ritual
  english_pob_reading: it is unclean for you
  chosen_spanish_reading: es inmunda para ustedes
  alternative_spanish_readings:
  - es impura para ustedes
  - es inmunda para ustedes
  rationale: El texto no hace una valoración moral general, sino una clasificación ritual alimentaria. 'Inmunda' mantiene esa categoría bíblica sin diluirla en un sentido meramente higiénico.
  doctrine_reference: Pureza/impureza ritual en la Torá; cf. Levítico 11 y Deuteronomio 14.
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando cualquier nota sin anclaje en el texto. No se requieren notas al pie para este verso porque la traducción puede expresarse con claridad sin variantes textuales o ambigüedades especiales que deban anotarse.
  spanish_consistency_notes:
  - Se mantuvo el contraste inicial con 'Pero', como en el audit trail inglés.
  - Se usó el léxico ritual 'inmunda' para טָמֵא, coherente con la terminología bíblica de pureza.
  - Se prefirió una formulación natural en español para la prohibición legal, sin perder el tono normativo.
