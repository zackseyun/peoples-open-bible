  glossary_alignment: 'Se alinea bien con la terminología del proyecto: «Yahvé» para יהוה, «Betel» como topónimo, y léxico básico fiel al hebreo. No hay conflicto con los glosarios principales. La única desalineación interna está entre la explicitación del sujeto («él») y la rationale documentada que prefiere dejarlo implícito en español.'
