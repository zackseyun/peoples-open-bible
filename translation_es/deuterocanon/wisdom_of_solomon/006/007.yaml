translation:
  language: es
  text: Porque el Soberano de todos[b] no mostrará parcialidad[a], ni se dejará impresionar por la grandeza; porque él mismo hizo al pequeño y al grande, y cuida de todos por igual[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘no mostrará rostro’; es un modismo que significa mostrar parcialidad o favoritismo.
    reason: lexical_alternative
  - marker: b
    text: O ‘el Dueño de todos’. El griego aquí usa despotes, no kyrios.
    reason: lexical_alternative
  - marker: c
    text: O ‘provee para todos por igual’ / ‘ejerce providencia sobre todos por igual’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποστελεῖται πρόσωπον
  english_pob_choice: will not show partiality
  chosen_spanish: no mostrará parcialidad
  alternatives_spanish:
  - no dará preferencia a nadie
  - no hará acepción de personas
  - no mostrará favoritismo
  lexicon: LSJ
  rationale: La imagen griega de ‘mostrar el rostro’ expresa aquí trato preferente o sesgo judicial. ‘Parcialidad’ comunica bien ese sentido en español moderno sin perder la fuerza ética del idiomismo.
- source_word: ὁ πάντων δεσπότης
  english_pob_choice: the Master of all
  chosen_spanish: el Dueño de todos
  alternatives_spanish:
  - el Maestro de todos
  - el Soberano de todos
  - el Señor de todos
  lexicon: LSJ
  rationale: δεσπότης denota autoridad y propiedad absolutas. En español, ‘Dueño’ conserva mejor esa idea de dominio que ‘Señor’, evitando confundirlo con el término habitual para κύριος.
- source_word: ἐντραπήσεται μέγεθος
  english_pob_choice: will be overawed by greatness
  chosen_spanish: se dejará impresionar por la grandeza
  alternatives_spanish:
  - se intimidará ante la grandeza
  - se sobrecogerá por la grandeza
  - se avergonzará ante la grandeza
  lexicon: LSJ
  rationale: Aquí no se trata de vergüenza moral, sino de quedar condicionado por rango o magnitud. ‘Se dejará impresionar’ conserva la idea de ser movido o influido por la grandeza, con un español natural.
- source_word: μικρὸν καὶ μέγαν
  english_pob_choice: both small and great
  chosen_spanish: al pequeño y al grande
  alternatives_spanish:
  - a pequeños y grandes
  - al débil y al poderoso
  - al humilde y al encumbrado
  lexicon: LSJ
  rationale: El par funciona como merismo de personas de baja y alta condición. ‘Pequeño y grande’ mantiene la oposición social sin imponer interpretaciones adicionales.
- source_word: ὁμοίως τε προνοεῖ περὶ πάντων
  english_pob_choice: he cares for all alike
  chosen_spanish: cuida de todos por igual
  alternatives_spanish:
  - provee para todos por igual
  - tiene cuidado de todos por igual
  - ejerce providencia sobre todos por igual
  lexicon: LSJ
  rationale: προνοέω puede significar cuidar, proveer o ejercer previsión. En este contexto de gobierno imparcial, ‘cuida de todos por igual’ reproduce bien la idea de atención uniforme y resulta idiomático en español.
theological_decisions:
- issue: Distinguir δεσπότης de κύριος en el título divino
  english_pob_reading: the Master of all
  chosen_spanish_reading: el Dueño de todos
  alternative_spanish_readings:
  - el Soberano de todos
  - el Señor de todos
  rationale: La traducción busca conservar la diferencia lexical señalada por el POB entre δεσπότης y el término más común para ‘Señor’. ‘Dueño’ comunica autoridad posesiva y absoluta sin borrar esa distinción.
  doctrine_reference: 'DOCTRINE.md: Translate titles; consistency of key terms, or documented exception.'
- issue: Imparcialidad divina ante estatus social
  english_pob_reading: will not show partiality
  chosen_spanish_reading: no mostrará parcialidad
  alternative_spanish_readings:
  - no hará acepción de personas
  - no mostrará favoritismo
  rationale: El verso afirma que Dios no se deja condicionar por rango humano. ‘Parcialidad’ expresa esa idea con claridad y sin introducir formulaciones eclesiásticas posteriores.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete 1909 y el auditable inglés POB como contexto de decisiones léxicas; no hubo revisiones aplicadas en el paquete de referencia, y la redacción española mantiene la distinción de títulos, el idiomatismo de ‘mostrar parcialidad’ y la igualdad de cuidado/providencia sobre todos.
  spanish_consistency_notes:
  - Se preserva ‘Dueño’ para δεσπότης, coherente con la distinción terminológica frente a ‘Señor’.
  - ‘Parcialidad’ se usa como equivalente natural del modismo griego, evitando una traducción literal opaca.
  - ‘Cuida de todos por igual’ mantiene abierta la posible lectura de provisión/providencia sin forzar una sola paráfrasis.
