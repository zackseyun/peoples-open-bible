revisions:
- from: ¡Cómo fue registrado Esau![a] Sus tesoros escondidos han sido buscados[b].
  to: ¡Cómo ha sido escudriñado Esaú![a] ¡Sus tesoros escondidos han sido descubiertos![b]
  rationale: 'La revisión corrige dos problemas principales: sustituye «registrado» por «escudriñado», que refleja mejor el pasivo resultativo de una búsqueda exhaustiva, y reemplaza «han sido buscados» por «han sido descubiertos», que comunica el resultado de haber hallado lo oculto. También adapta «Esau» a la forma española establecida «Esaú» para mejorar la naturalidad y lectura eclesial, manteniendo el valor metonímico explicado en nota. Se conserva la estructura exclamativa y la nota alternativa léxica del audit trail.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:00:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la exclamación y conserva «Esau» conforme al hebreo y al audit trail. Sin embargo, «fue registrado» no representa con fidelidad el sentido de נֶחְפְּשׂוּ en este contexto de saqueo/escudriñamiento exhaustivo; en español suena más a anotación o inspección administrativa. Además, «han sido buscados» para נִבְעוּ queda demasiado débil y no refleja bien la idea de que los escondites/tesoros fueron hallados o sacados a la luz. La nota alternativa inglesa distingue mejor los matices paralelos.
  spanish_quality_summary: El texto es legible, pero «registrado» resulta poco natural y ambiguo en español bíblico general. Una formulación como «ha sido escudriñado» y «han sido descubiertos» suena más clara, digna y fiel al contexto. También conviene mantener coherencia ortográfica con el nombre «Esaú» en español, tanto en el texto como en la nota.
  glossary_alignment: No hay términos del glosario mayor en juego salvo el nombre propio. Se debe preferir la forma española usual «Esaú» frente a «Esau» para mejor legibilidad en español, sin alterar la decisión de conservar el nombre personal y no sustituirlo por «Edom».
  issues:
  - severity: high
    issue: «fue registrado» para נֶחְפְּשׂוּ
    rationale: En español moderno, «registrado» suele sugerir inscribir, anotar o revisar superficialmente; aquí el hebreo y el contexto comunican escudriñamiento/saqueo exhaustivo.
  - severity: medium
    issue: «han sido buscados» para נִבְעוּ
    rationale: Describe el intento de buscar, no el resultado de hallar o dejar al descubierto los bienes ocultos, que es lo que expresa mejor el contexto y la nota alternativa inglesa.
  - severity: medium
    issue: Uso de «Esau» en vez de «Esaú»
    rationale: Aunque el hebreo tiene עֵשָׂו y el inglés conserva Esau, en español bíblico natural la forma asentada es «Esaú». Mantener la transliteración inglesa perjudica la legibilidad sin aportar fidelidad adicional.
  revised_spanish_text: ¡Cómo ha sido escudriñado Esaú![a] ¡Sus tesoros escondidos han sido descubiertos![b]
  revised_footnotes:
