translation:
  language: es
  text: Y haré que se estrellen unos contra otros[a], hombre contra su hermano[b], padres y sus hijos juntos, declara Yahvé. No perdonaré ni tendré lástima ni me compadeceré, para no destruirlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «haré que choquen unos contra otros»; también puede entenderse «haré que se hagan pedazos unos contra otros».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hombre contra su hermano», con singular masculino y lenguaje de parentesco que se conserva en el contraste familiar.'
    reason: cultural_note
lexical_decisions:
- source_word: וְנִפַּצְתִּים
  english_pob_choice: I will smash them
  chosen_spanish: los haré estrellarse unos contra otros
  alternatives_spanish:
  - los haré chocar entre sí
  - los haré chocar unos contra otros
  - los haré destrozarse entre sí
  lexicon: HALOT
  rationale: נפץ expresa una acción violenta de romper o golpear con fuerza. En español, 'estrellar(se)' transmite mejor la violencia concreta del choque que un verbo más débil como 'chocar'. La forma causativa refleja el sujeto divino del hebreo.
- source_word: אִישׁ אֶל אָחִיו
  english_pob_choice: man against his brother
  chosen_spanish: hombre contra su hermano
  alternatives_spanish:
  - cada hombre contra su hermano
  - uno contra su hermano
  lexicon: HALOT
  rationale: La construcción distributiva masculina se conserva con 'hombre contra su hermano', manteniendo el singular genérico y el parentesco fraterno explícito. 'Cada hombre' sería más explicativo, pero menos fuente-cercano.
- source_word: וְהָאָבוֹת וְהַבָּנִים יַחְדָּו
  english_pob_choice: fathers and sons together
  chosen_spanish: padres y hijos juntos
  alternatives_spanish:
  - padres e hijos juntos
  - padres e hijos por igual
  lexicon: HALOT
  rationale: El hebreo menciona padre(s) e hijos varones, con valor de intensificación familiar. En español, 'padres y hijos' comunica el choque entre generaciones de manera natural y amplia, sin perder la referencia a la ruptura familiar. Se evita forzar una redundancia extraña como 'padres y hijos varones' porque el contexto ya concentra la idea de lazos familiares.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino con 'Yahvé' según la norma del proyecto. 'Dice Yahvé' es una fórmula profética natural en español y reproduce la función del hebreo sin introducir un registro más técnico que el necesario.
- source_word: לֹא אֶחְמֹל
  english_pob_choice: I will not spare
  chosen_spanish: No perdonaré
  alternatives_spanish:
  - No ahorraré
  - No perdonaré
  lexicon: HALOT
  rationale: חמל aquí expresa no conceder alivio ni eximir del castigo. 'No perdonaré' comunica con fuerza el rechazo de clemencia, aunque en español puede rozar la esfera moral; por eso se mantiene en paralelo con los otros verbos de misericordia para conservar el tono judicial del texto.
- source_word: וְלֹא אָחוּס
  english_pob_choice: nor will I pity
  chosen_spanish: ni tendré lástima
  alternatives_spanish:
  - ni me apiadaré
  - ni tendré compasión
  lexicon: HALOT
  rationale: חוס se traduce aquí con el matiz afectivo de compasión o piedad. 'Tener lástima' es claro y conserva el registro emocional del paralelismo sin volver idéntico este verbo al siguiente.
- source_word: וְלֹא אֲרַחֵם
  english_pob_choice: nor will I have compassion
  chosen_spanish: ni me compadeceré
  alternatives_spanish:
  - ni tendré compasión
  - ni me apiadaré
  lexicon: HALOT
  rationale: רחם añade el último escalón del encadenamiento de misericordia. 'Me compadeceré' mantiene la idea de compasión/entrañas de misericordia y distingue este verbo de los anteriores dentro de la tríada negativa.
- source_word: מֵהַשְׁחִיתָם
  english_pob_choice: so as not to destroy them
  chosen_spanish: para no destruirlos
  alternatives_spanish:
  - a fin de no destruirlos
  - de destruirlos
  lexicon: HALOT
  rationale: 'La preposición con infinitivo expresa propósito o resultado: la ausencia de compasión en vista de no impedir la destrucción. ''Para no destruirlos'' sigue de cerca el valor sintáctico reconocido en la revisión inglesa y suena natural en español.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, y la política del proyecto pide reproducirlo como nombre propio en español. 'Yahvé' mantiene la referencia al nombre pactual sin recurrir a la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: La serie negativa de misericordia frente al juicio
  english_pob_reading: I will not spare or pity or have compassion, so as not to destroy them
  chosen_spanish_reading: No perdonaré ni tendré lástima ni me compadeceré, para no destruirlos
  alternative_spanish_readings:
  - No ahorraré ni tendré piedad ni me compadeceré, para no destruirlos
  - No perdonaré ni me apiadaré ni tendré compasión, para no destruirlos
  rationale: El hebreo acumula tres verbos cercanos para intensificar la negativa divina. La traducción conserva esa escalada semántica en español sin colapsarla en un solo término, manteniendo la tensión entre clemencia rechazada y acto judicial.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El audit trail inglés revisó el cierre para reflejar mejor מֵהַשְׁחִיתָם como una idea de propósito/resultado negado ('so as not to destroy them'). En español se siguió ese ajuste con 'para no destruirlos', evitando una calca menos natural. También se mantuvo la decisión de conservar la tríada de misericordia con tres verbos diferenciados, y la referencia explícita al nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה, conforme al estándar del proyecto.
  - 'Se preserva la secuencia de tres verbos de misericordia con matices distintos: ''perdonar'', ''tener lástima'' y ''compadecerse''.'
  - La imagen violenta se traduce con un verbo dinámico ('estrellarse') para sostener la fuerza del hebreo נפץ sin suavizarla.
  - Se mantiene el paralelismo familiar masculino del hebreo con 'hombre contra su hermano, padres y hijos juntos'.
