    issue: 'Nombres propios con acentuación no estándar: «Mahlá, Hoglá, Milcá, Noá».'
    rationale: Aunque son comprensibles, estas formas acentuadas no son las más reconocibles ni las más naturales en una Biblia española de lectura amplia. Conviene usar transliteraciones más estables y convencionales sin acentos artificiosos.
  - severity: low
    issue: «Tirsa» podría preferirse como «Tirsa/Tirsa» según convención, pero no afecta el sentido.
    rationale: La forma del nombre no altera el contenido semántico del versículo; solo conviene uniformidad onomástica con el resto del proyecto.
  revised_spanish_text: Mahlah, Tirsa, Hogla, Milca y Noa, las hijas de Zelofehad, llegaron a ser esposas[a] de los hijos de sus tíos.
