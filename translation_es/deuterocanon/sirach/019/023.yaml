translation:
  language: es
  text: Inclina su rostro y finge ser sordo[a]; donde no es reconocido[b], te ganará de mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «finge sordera». El griego sugiere la conducta de alguien que actúa como si fuera sordo.'
    reason: lexical_alternative
  - marker: b
    text: 'El griego es breve y algo difícil; la idea es que la persona engañosa adopta una actitud humilde o pasiva para sacar ventaja cuando pasa inadvertida. También puede entenderse: «se te adelantará» o «se anticipará a ti».'
    reason: textual_variant
lexical_decisions:
- source_word: συγκύφων
  english_pob_choice: stoops
  chosen_spanish: inclina
  alternatives_spanish:
  - se encorva
  - se agacha
  lexicon: LSJ
  rationale: El participio describe una postura corporal inclinada o encorvada. En español, «inclina su rostro» conserva la imagen física y sugiere una actitud de falsa humildad sin sonar demasiado pesada.
- source_word: πρόσωπον
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - semblante
  lexicon: LSJ
  rationale: «Rostro» mantiene el sentido básico de πρόσωπον y suena más digno y natural en español bíblico que «cara».
- source_word: ἑτεροκωφῶν
  english_pob_choice: pretends to be deaf
  chosen_spanish: finge ser sordo
  alternatives_spanish:
  - hace como que no oye
  - finge sordera
  lexicon: LSJ
  rationale: El verbo raro apunta a comportarse como sordo, no necesariamente a una sordera real. «Finge ser sordo» hace explícita la intención engañosa, como en el inglés POB.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - cuando
  - allí donde
  lexicon: LSJ
  rationale: «Donde» reproduce bien la idea de circunstancia o situación en la que la persona no es reconocida.
- source_word: οὐκ ἐπεγνώσθη
  english_pob_choice: he is not recognized
  chosen_spanish: no es reconocido
  alternatives_spanish:
  - no es notado
  - no es descubierto
  lexicon: LSJ
  rationale: La pasiva de ἐπιγινώσκω se entiende mejor como «ser reconocido» o identificado. «No es reconocido» conserva esa cercanía al griego y encaja con el contexto de ocultamiento.
- source_word: προφθάσει
  english_pob_choice: he will outwit you
  chosen_spanish: te adelantará
  alternatives_spanish:
  - te tomará la delantera
  - te ganará de mano
  - te saldrá al paso
  lexicon: LSJ
  rationale: El verbo puede expresar anticiparse, llegar antes o ganar ventaja. Dado el ajuste del inglés POB a «outwit you», «te adelantará» conserva la idea de anticiparse con ventaja, sin introducir una paráfrasis más fuerte que el griego por sí sola.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: LSJ
  rationale: Pronombre de objeto directo singular normal en español.
translation_notes:
  revision_awareness: El inglés POB fue revisado en su última pasada desde «he will get ahead of you» a «he will outwit you» para reflejar mejor el matiz de aprovecharse de alguien. En español se mantuvo un verbo que conserve la noción de anticipación ventajosa sin exagerar el matiz interpretativo más allá del griego; por eso «te adelantará» puede leerse como anticiparse con ventaja en este contexto.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» no aplica aquí; no hay tetragrámaton en el verso.
  - Se evitó «señor» o vocabulario litúrgico no presente en el texto.
  - «Rostro» e «inclina» mantienen un registro bíblico claro sin arcaísmo excesivo.
  - La nota del marcador a conserva la alternativa léxica visible en el audit trail inglés.
  - La nota del marcador b conserva la dificultad textual señalada en el contexto inglés, sin resolverla de forma excesivamente interpretativa.
