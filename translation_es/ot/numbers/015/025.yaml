translation:
  language: es
  text: El sacerdote hará expiación por toda la congregación de los hijos de Israel, y serán perdonados, porque fue una falta involuntaria, y ellos han traído su ofrenda, una ofrenda hecha por fuego[a] para Yahvé, y su ofrenda por el pecado delante de Yahvé[b], por su falta involuntaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «una ofrenda de alimento para Yahvé». El hebreo puede enfatizar una ofrenda hecha por fuego; «ofrenda de alimento» es una traducción contextual común.
    reason: lexical_alternative
  - marker: b
    text: O, «su ofrenda de purificación». El hebreo חַטָּאת en este contexto también puede entenderse como una ofrenda destinada a la purificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  english_pob_choice: shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará propiciación
  - efectuará expiación
  lexicon: HALOT
  rationale: En contexto sacrificial, כפר expresa la acción cultual de expiar. «Hará expiación» conserva el valor teológico y el registro formal sin desplazarlo a una paráfrasis más general.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiará
  - el presbítero
  lexicon: HALOT
  rationale: La referencia es al oficiante cultual singular; «sacerdote» es la equivalencia natural y fiel en español.
- source_word: עַל כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: for all the congregation of the sons of Israel
  chosen_spanish: por toda la congregación de los hijos de Israel
  alternatives_spanish:
  - por toda la comunidad de los hijos de Israel
  - por toda la asamblea de Israel
  lexicon: HALOT
  rationale: «עַל» en este uso idiomático marca beneficio/representación, por eso «por». «Congregación» conserva עֲדָה; «hijos de Israel» sigue de cerca el hebreo sin perder claridad.
- source_word: וְנִסְלַח לָהֶם
  english_pob_choice: and they shall be forgiven
  chosen_spanish: y les será perdonado
  alternatives_spanish:
  - y serán perdonados
  - y se les perdonará
  lexicon: HALOT
  rationale: El nifal de סלח se vierte de modo pasivo en español. «Les será perdonado» mantiene el resultado de la absolución sin introducir un sujeto explícito.
- source_word: כִּי שְׁגָגָה הִוא
  english_pob_choice: because it was an unintentional error
  chosen_spanish: porque es una falta involuntaria
  alternatives_spanish:
  - porque fue una falta involuntaria
  - porque es un error involuntario
  lexicon: HALOT
  rationale: שְׁגָגָה abarca error/falta inadvertida. «Falta involuntaria» comunica bien la dimensión legal y moral; el presente «es» puede funcionar gnómicamente en español jurídico-bíblico.
- source_word: וְהֵם הֵבִיאוּ
  english_pob_choice: and they have brought
  chosen_spanish: y ellos han traído
  alternatives_spanish:
  - y trajeron
  - y han presentado
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar acción completada relevante al resultado legal. «Han traído» conserva esa anterioridad con naturalidad en español.
- source_word: אֶת קָרְבָּנָם
  english_pob_choice: their offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su sacrificio
  - su oblación
  lexicon: HALOT
  rationale: קָרְבָּן es la ofrenda presentada a Dios; «ofrenda» es el término más natural y general en español.
- source_word: אִשֶּׁה לַיהוָה
  english_pob_choice: an offering made by fire to Yahweh
  chosen_spanish: una ofrenda encendida para Yahvé
  alternatives_spanish:
  - una ofrenda hecha por fuego para Yahvé
  - una ofrenda ígnea para Yahvé
  lexicon: HALOT
  rationale: אִשֶּׁה conserva mejor la forma cultual tradicional como ofrenda ligada al fuego. «Ofrenda encendida» es una solución sobria y comprensible que mantiene el vínculo con el fuego sin sonar demasiado técnica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, según el criterio del proyecto. «Yahvé» es la forma establecida en el texto español principal.
- source_word: וְחַטָּאתָם
  english_pob_choice: and their sin offering
  chosen_spanish: y su ofrenda por el pecado
  alternatives_spanish:
  - y su sacrificio por el pecado
  - y su ofrenda de purificación
  lexicon: HALOT
  rationale: En este sintagma, חַטָּאת es la ofrenda sacrificial relacionada con el pecado. «Ofrenda por el pecado» mantiene la ambigüedad reconocida entre sentido sacrificial y de purificación, sin perder inteligibilidad.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La fórmula cultual de presentación se vierte con un equivalente directo y natural en español.
- source_word: עַל שִׁגְגָתָם
  english_pob_choice: for their unintentional error
  chosen_spanish: por su falta involuntaria
  alternatives_spanish:
  - a causa de su falta involuntaria
  - por su error involuntario
  lexicon: HALOT
  rationale: La repetición del mismo campo léxico se refleja con la misma solución básica, manteniendo la relación causal y legal del versículo.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton directamente; el proyecto pide conservar el nombre divino en transliteración. «Yahvé» es la forma escogida para el texto español principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of חַטָּאת in sacrificial context
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: Aquí la palabra designa algo que se trae delante de Yahvé; por tanto, el referente sacrificial es necesario. «Ofrenda por el pecado» conserva la referencia tradicional sin cerrar indebidamente la discusión léxica.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Whether to mark the offering type with a footnote
  english_pob_reading: an offering made by fire to Yahweh
  chosen_spanish_reading: una ofrenda encendida para Yahvé
  alternative_spanish_readings:
  - una ofrenda hecha por fuego para Yahvé
  rationale: La traducción mantiene la relación con el fuego de modo natural en español; no se requiere nota textual adicional porque la opción elegida no introduce una ambigüedad nueva decisiva.
  doctrine_reference: HALOT / contextual sacrificial usage
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del POB inglés que corrigió la secuencia a «an offering made by fire» y mantuve en español un equivalente formal con la misma precisión cultual. También respeté la decisión estable del audit trail de conservar el Nombre divino como transliteración, aquí normalizada a «Yahvé».
  spanish_consistency_notes:
  - He mantenido «ofrenda» para קָרְבָּן y «ofrenda por el pecado» para חַטָּאת, evitando alternar con términos litúrgicos distintos sin necesidad.
  - «Yahvé» se usa consistentemente para יְהוָה, conforme a la terminología del proyecto.
  - La repetición de שִׁגְגָה se refleja con «falta involuntaria» en ambas apariciones para conservar cohesión léxica.
  - No se ha mecanizado el inglés; la sintaxis española sigue la estructura causal del hebreo con fluidez natural.
