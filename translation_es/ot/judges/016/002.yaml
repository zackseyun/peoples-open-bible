  yaml_path: translation/ot/judges/016/002.yaml
  text: The Gazites were told[a], saying, “Samson has come here.” So they surrounded him and lay in wait for him all night at the city gate. They kept quiet all night, saying, “Until the light of morning[c][b], then we will kill him.”
