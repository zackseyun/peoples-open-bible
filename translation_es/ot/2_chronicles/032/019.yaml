translation:
  language: es
  text: Y hablaron contra el Dios de Jerusalén, como contra los dioses de los pueblos de la tierra, la obra de manos humanas.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al Dios de Jerusalén». La preposición hebrea puede traducirse más literalmente como «a», pero aquí el contexto muestra habla hostil, por lo que «contra» expresa mejor el sentido.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la obra de las manos del hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  english_pob_choice: they spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - hablaron abiertamente
  - dijeron
  lexicon: HALOT
  rationale: El verbo básico es ‘hablar/decir’. En español, ‘hablaron’ conserva la acción verbal sin añadir contenido no explícito al verbo mismo.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Aunque la preposición suele ser ‘a’, el contexto de blasfemia y burla exige una equivalencia idiomática que exprese oposición hostil; ‘contra’ mantiene esa fuerza.
- source_word: אֱלֹהֵי יְרוּשָׁלָם
  english_pob_choice: the God of Jerusalem
  chosen_spanish: el Dios de Jerusalén
  alternatives_spanish:
  - los dioses de Jerusalén
  lexicon: HALOT
  rationale: La forma constructa puede ser plural morfológicamente, pero el contexto contrapone al Dios verdadero con los ídolos de las naciones. En español, ‘el Dios de Jerusalén’ comunica con claridad esa referencia singular.
- source_word: כְּעַל
  english_pob_choice: as against
  chosen_spanish: como contra
  alternatives_spanish:
  - como si fuera contra
  - igual que contra
  lexicon: HALOT
  rationale: 'La construcción expresa comparación de manera hostil: hablaron del Dios de Jerusalén del mismo modo que hablaban de los demás dioses. ‘Como contra’ conserva ambas ideas, comparación y oposición.'
- source_word: אֱלֹהֵי עַמֵּי הָאָרֶץ
  english_pob_choice: the gods of the peoples of the earth
  chosen_spanish: los dioses de los pueblos de la tierra
  alternatives_spanish:
  - los dioses de las naciones de la tierra
  - los dioses de los pueblos del mundo
  lexicon: HALOT
  rationale: ‘Pueblos de la tierra’ sigue de cerca el hebreo y resulta natural en español bíblico contemporáneo. ‘Naciones’ sería posible, pero ‘pueblos’ preserva mejor el eco del original.
- source_word: מַעֲשֵׂה יְדֵי הָאָדָם
  english_pob_choice: the work of human hands
  chosen_spanish: obra de manos humanas
  alternatives_spanish:
  - obra de las manos del hombre
  - hechura de manos humanas
  lexicon: HALOT
  rationale: La expresión idiomática en hebreo describe ídolos fabricados por personas. ‘Obra de manos humanas’ conserva el contraste entre el Dios vivo y los ídolos hechos por humanos, con español natural y digno.
- source_word: הָאָדָם
  english_pob_choice: human
  chosen_spanish: humanas
  alternatives_spanish:
  - del hombre
  - humano
  lexicon: HALOT
  rationale: El término es genérico, no masculino específico. En español, el plural femenino en ‘manos humanas’ concuerda con ‘manos’ y mantiene el sentido de procedencia humana general.
theological_decisions:
- issue: Si la preposición debe sonar literal (‘a’) o hostil (‘contra’).
  english_pob_reading: against
  chosen_spanish_reading: contra
  alternative_spanish_readings:
  - a
  rationale: El contexto inmediato es la burla blasfema de los oficiales asirios. Traducir con ‘contra’ hace explícita la hostilidad implícita en la escena sin alterar el contenido.
  doctrine_reference: Translation philosophy §1, §6
- issue: Si אֱלֹהֵי יְרוּשָׁלָם debe entenderse como singular o plural.
  english_pob_reading: the God of Jerusalem
  chosen_spanish_reading: el Dios de Jerusalén
  alternative_spanish_readings:
  - los dioses de Jerusalén
  rationale: La forma hebrea puede ser morfológicamente plural, pero el sentido es singular y contrasta con los dioses paganos mencionados enseguida. La traducción singular evita una lectura equivocada.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto sigue la lectura ya aprobada del POB en inglés, sin cambios de revisión posteriores; la equivalencia española mantiene las mismas decisiones léxicas y teológicas básicas con ajuste natural de estilo.
  spanish_consistency_notes:
  - Se conserva ‘Dios’ en singular para אֱלֹהֵי יְרוּשָׁלָם, siguiendo el contraste contextual con los dioses de las naciones.
  - Se traduce ‘pueblos de la tierra’ de forma cercana al hebreo, sin reemplazarlo por ‘naciones’ como opción más interpretativa.
  - ‘Obra de manos humanas’ mantiene la fuerza idiomática de un artefacto hecho por seres humanos, especialmente ídolos.
  - La puntuación refleja una sola cláusula coordinada con énfasis en la comparación hostil (‘como contra’).
