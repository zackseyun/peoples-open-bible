translation:
  language: es
  text: para declarar el nombre de Yahvé[a] en Sion, y su alabanza en Jerusalén,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el nombre de Yahvé». El texto hebreo usa directamente el Tetragrámaton יְהוָה.'
    reason: source_note
lexical_decisions:
- source_word: לְסַפֵּר
  english_pob_choice: to declare
  chosen_spanish: para declarar
  alternatives_spanish:
  - para contar
  - para proclamar
  - para relatar
  lexicon: HALOT
  rationale: 'En este contexto, el infinitivo con ל expresa propósito: dar a conocer públicamente. «Declarar» conserva esa fuerza pública mejor que un simple «contar» o «relatar».'
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  - en la Sion
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico en su forma castellana tradicional «Sion», y la preposición ב se rinde naturalmente como «en».
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - renombre
  - fama
  lexicon: HALOT
  rationale: «Nombre» mantiene el sentido literal y teológico del hebreo, sin reducirlo a una idea de reputación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se vierte según la norma del proyecto como «Yahvé», preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: וּתְהִלָּתוֹ
  english_pob_choice: and his praise
  chosen_spanish: y su alabanza
  alternatives_spanish:
  - y su elogio
  - y su alabanza dirigida a él
  - y su gloria
  lexicon: HALOT
  rationale: תְּהִלָּה significa «alabanza». Con el sufijo de tercera persona, «su alabanza» es la forma más directa y natural en español; aquí puede entenderse como alabanza acerca de él o dirigida a él, sin necesidad de ampliar el texto.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Yerusalén
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Se conserva el nombre propio en su forma castellana estándar «Jerusalén», y la preposición ב se traduce normalmente como «en».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La norma española del proyecto mantiene el nombre propio divino como «Yahvé», evitando la sustitución por un título y preservando la referencia personal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés está en alta concordancia y no presenta revisiones aplicadas; esta versión española sigue el mismo sentido general, pero adopta la convención del proyecto para el nombre divino en español («Yahvé») y ajusta la sintaxis a una forma natural en castellano.
  spanish_consistency_notes:
  - 'Se conservó la paralelía hebrea: propósito («para declarar…») + dos complementos locativos coordinados.'
  - «Sion» y «Jerusalén» se mantienen como topónimos bíblicos estándar en español.
  - La nota al pie señala explícitamente el Tetragrámaton, para mantener la trazabilidad textual.
