translation:
  language: es
  text: Pisotearon el altar de Yahvé[a] con toda inmundicia, y con sangre menstrual[b] contaminaron los sacrificios, como carne profana[c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego transmitido en este testimonio es difícil; la traducción sigue la lectura apoyada que entiende una acción de pisotear el altar.
    reason: textual_variant
  - marker: b
    text: Literalmente, «con impureza menstrual de sangre»; el griego ἄφεδρος es un término técnico de impureza menstrual en la tradición de la LXX.
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como «carne común» en contraste con lo consagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίπουσαν
  english_pob_choice: trampled
  chosen_spanish: pisotearon
  alternatives_spanish:
  - aplastaron
  - pisotearon con violencia
  lexicon: LSJ
  rationale: El griego transmitido es difícil, pero el audit trail inglés entiende un acto violento de profanación del altar. En español, "pisotearon" comunica esa violencia ritual con naturalidad y conserva la idea de ultraje cultual sin volverlo más explicativo de lo que permite la evidencia.
- source_word: τὸ θυσιαστήριον Κυρίου
  english_pob_choice: the altar of the Lord
  chosen_spanish: el altar de Yahvé
  alternatives_spanish:
  - el altar del Señor
  - el altar de Yahvé
  lexicon: LSJ
  rationale: Se sigue la política del proyecto para יהוה/YHWH como "Yahvé". Aunque el griego tiene κύριος, aquí funciona como referencia al nombre divino; por eso no se enmascara como "SEÑOR" en el texto principal.
- source_word: ἀκαθαρσίας
  english_pob_choice: uncleanness
  chosen_spanish: inmundicia
  alternatives_spanish:
  - impureza
  - contaminación ritual
  lexicon: LSJ
  rationale: '"Inmundicia" conserva mejor en español la fuerza ritual de ἀκαθαρσία en un contexto del templo. "Impureza" es posible, pero puede sonar más abstracta y menos contaminante.'
- source_word: ἐν ἀφέδρῳ αἵματος
  english_pob_choice: with menstrual blood
  chosen_spanish: con sangre menstrual
  alternatives_spanish:
  - con impureza menstrual de sangre
  - con una hemorragia menstrual
  lexicon: LSJ
  rationale: 'Sigo la revisión aplicada al inglés: ἄφεδρος es un término técnico de impureza menstrual en la tradición LXX. "Sangre menstrual" hace explícita la categoría cultual sin agregar una paráfrasis ajena al griego.'
- source_word: ἐμίανιν
  english_pob_choice: they defiled
  chosen_spanish: profanaron
  alternatives_spanish:
  - contaminaron
  - mancharon
  lexicon: LSJ
  rationale: '"Profanaron" mantiene el campo semántico de una violación de lo sagrado y encaja bien con el altar y los sacrificios. En español resulta más preciso que un simple "mancharon" para este contexto cultual.'
- source_word: τὰς θυσίας
  english_pob_choice: the sacrifices
  chosen_spanish: los sacrificios
  alternatives_spanish:
  - las ofrendas sacrificadas
  - los ofrecimientos sacrificiales
  lexicon: LSJ
  rationale: '"Sacrificios" es la equivalencia directa y plenamente inteligible en español para θυσίαι en este contexto litúrgico.'
- source_word: κρέα βέβηλα
  english_pob_choice: profane meat
  chosen_spanish: carne profana
  alternatives_spanish:
  - carne común
  - carne profanada
  lexicon: LSJ
  rationale: '"Profana" conserva el contraste sagrado/común de βέβηλα mejor que una mera "carne defileda". La construcción es breve y refleja el peso cultual del término griego.'
translation_notes:
  revision_awareness: Se incorporó la revisión aplicada al inglés que precisó ἄφεδρος como impureza menstrual, por lo que el texto principal usa "sangre menstrual" en lugar de una formulación más genérica. La solución española conserva además la tensión textual inicial de ἐπίπουσαν mediante una nota.
  spanish_consistency_notes:
  - Se usa "Yahvé" para el nombre divino conforme a la política del proyecto.
  - Se evita "SEÑOR" como máscara editorial en el texto principal.
  - '"Profanaron" y "carne profana" mantienen el contraste de santidad/lo común presente en el griego.'
  - La puntuación refleja una sola cláusula principal con participios coordinados, como en el original griego.
