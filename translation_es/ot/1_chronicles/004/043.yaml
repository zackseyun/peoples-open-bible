review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: acción contra el grupo sobreviviente de Amalec y residencia posterior allí hasta el presente del narrador. Sin embargo, «derrotaron» debilita el valor de וַיַּכּוּ, que en este contexto militar apunta mejor a «hirieron/mataron/derribaron» y el inglés auditado fijó «struck down». Además, las notas al pie están ancladas al revés respecto de las alternativas inglesas auditadas: la nota sobre Amalec se colocó donde debería ir la nota sobre «habitaron / se establecieron», y viceversa.'
  spanish_quality_summary: El español es legible y digno, pero «remanente de los sobrevivientes» suena algo pesado; aun así, preserva correctamente el doblete hebreo y es aceptable. «Habitaron allí hasta el día de hoy» es natural y apropiado. La principal reparación necesaria es léxica en el verbo inicial y técnica en la colocación de notas.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «Amalec» está bien como equivalente formal de לַעֲמָלֵק. «Habitaron» es aceptable para וַיֵּשְׁבוּ, con nota alternativa «se establecieron». La decisión problemática es «derrotaron» para וַיַּכּוּ; mejor «derribaron» o «mataron». Para mantener fidelidad sin sobreespecificar, «derribaron» reproduce mejor «struck down».
  issues:
  - severity: high
    issue: «Derrotaron» para וַיַּכּוּ subtraduce el sentido de daño letal o al menos golpe devastador.
    rationale: El hebreo נכה en esta narración, junto con «el remanente de los sobrevivientes», no describe meramente una victoria militar sino un golpe contra los pocos que quedaban. El inglés auditado eligió «struck down» precisamente para conservar esa fuerza sin imponer «mataron».
  - severity: high
    issue: Las notas al pie están asociadas a los lugares equivocados en el texto.
    rationale: La nota inglesa sobre «of Amalek / Amalekites» corresponde a «Amalec», mientras que la nota sobre «lived / settled» corresponde al verbo de residencia. En el borrador español, [a] aparece en «Amalec» pero contiene la alternativa del doblete hebreo; y [b] aparece al final aunque contiene la alternativa de «se establecieron». Esto rompe la trazabilidad del audit trail.
  - severity: medium
    issue: La nota sobre el doblete hebreo debería anclarse a la frase «remanente de los sobrevivientes», no a «Amalec».
    rationale: La alternativa «el remanente que había escapado...» explica שְׁאֵרִית הַפְּלֵטָה, no לַעֲמָלֵק. El anclaje correcto mejora claridad y fidelidad documental.
  revised_spanish_text: Y derribaron al remanente[a] de los sobrevivientes de Amalec, y habitaron[b] allí hasta el día de hoy.
  revised_footnotes:
  - marker: a
    text: 'Alternativa posible: «el remanente que había escapado de Amalec» o «de los amalecitas». El hebreo combina dos términos casi sinónimos para subrayar a los que quedaron tras la destrucción.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y se establecieron allí hasta el día de hoy». El verbo puede expresar tanto vivir como asentarse en un lugar.'
    reason: lexical_alternative
  revision_rationale: 'Se cambió «derrotaron» por «derribaron» para reflejar mejor la fuerza de וַיַּכּוּ / «struck down» sin sobreespecificar más de lo que exige el hebreo. También se corrigió la ubicación de las notas: la del doblete hebreo ahora se ancla a «remanente», y la de la alternativa de ישב se ancla a «habitaron». Se mantuvo «Amalec» y «habitaron allí hasta el día de hoy» por fidelidad y buena legibilidad en español.'
