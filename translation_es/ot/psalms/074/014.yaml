  text: אַתָּ֣ה רִ֭צַּצְתָּ רָאשֵׁ֣י לִוְיָתָ֑ן תִּתְּנֶ֥/נּוּ מַ֝אֲכָ֗ל לְ/עָ֣ם לְ/צִיִּֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/074/014.yaml
  text: You crushed the heads of Leviathan[a]; you gave him as food for the creatures of the desert.
  footnotes:
