translation:
  language: es
  text: Pero ellos se negaron a escuchar y no recordaron tus maravillas que habías hecho entre ellos. Endurecieron su cerviz y designaron un jefe[b] para volver a su esclavitud en su rebelión. Pero tú eres un Dios de perdón[a], clemente y compasivo, tardo para la ira y abundante en amor fiel, y no los abandonaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “Dios de perdones” (plural de intensidad). En español se traduce naturalmente “Dios de perdón” para mantener claridad sin perder la idea de perdón abundante.'
    reason: lexical_alternative
  - marker: b
    text: O “designaron un caudillo”; más literalmente, “pusieron una cabeza” para volver a su esclavitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֲנוּ לִשְׁמֹעַ
  english_pob_choice: they refused to listen
  chosen_spanish: se negaron a escuchar
  alternatives_spanish:
  - se negaron a oír
  - rehusaron obedecer
  lexicon: HALOT
  rationale: מָאֵן expresa negativa o rechazo; con לִשְׁמֹעַ, “escuchar” conserva la relación con el oír atento y la desobediencia implícita sin forzar un calco rígido.
- source_word: נִפְלְאֹתֶיךָ
  english_pob_choice: your wonders
  chosen_spanish: tus maravillas
  alternatives_spanish:
  - tus prodigios
  - tus obras maravillosas
  lexicon: HALOT
  rationale: El término designa actos extraordinarios que suscitan asombro. “Maravillas” es natural en español y mantiene el valor teológico de las obras poderosas de Yahvé.
- source_word: עָשִׂיתָ עִמָּהֶם
  english_pob_choice: you had done among them
  chosen_spanish: habías hecho entre ellos
  alternatives_spanish:
  - habías hecho por ellos
  - habías hecho con ellos
  lexicon: HALOT
  rationale: עִם puede indicar relación o presencia compartida. “Entre ellos” comunica bien la idea comunitaria de acciones divinas en medio del pueblo.
- source_word: וַיַּקְשׁוּ אֶת־עָרְפָּם
  english_pob_choice: they stiffened their neck
  chosen_spanish: Endurecieron su cerviz
  alternatives_spanish:
  - endurecieron su cuello
  - se volvieron tercos
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea tradicional de rebeldía obstinada. “Cerviz” mantiene el tono bíblico y el valor idiomático del original.
- source_word: וַיִּתְּנוּ רֹאשׁ
  english_pob_choice: appointed a leader
  chosen_spanish: nombraron un jefe
  alternatives_spanish:
  - pusieron un jefe
  - designaron un jefe
  lexicon: HALOT
  rationale: El hebreo literalmente dice “pusieron una cabeza”, un modismo de liderazgo. “Nombraron un jefe” expresa el sentido idiomático con naturalidad en español.
- source_word: לָשׁוּב לְעַבְדֻתָם
  english_pob_choice: to return to their slavery
  chosen_spanish: para volver a su esclavitud
  alternatives_spanish:
  - para regresar a su servidumbre
  - para volver a su esclavitud
  lexicon: HALOT
  rationale: עַבְדוּת denota esclavitud/servidumbre. Se prefiere “esclavitud” por la fuerza lexical y por la conexión con el Éxodo.
- source_word: בְּמִרְיָם
  english_pob_choice: in their rebellion
  chosen_spanish: en su rebelión
  alternatives_spanish:
  - en su rebeldía
  - por su rebelión
  lexicon: HALOT
  rationale: מֶרִי indica rebelión o desafío. “Rebelión” conserva el tono legal y relacional del texto.
- source_word: אֱלוֹהַּ סְלִיחוֹת
  english_pob_choice: a God of forgiveness
  chosen_spanish: un Dios de perdón
  alternatives_spanish:
  - un Dios perdonador
  - un Dios de perdones
  lexicon: HALOT
  rationale: Aunque el hebreo tiene plural de intensidad, el español natural aquí es singular. “De perdón” preserva el contenido sin introducir una forma poco idiomática.
- source_word: חַנּוּן וְרַחוּם
  english_pob_choice: gracious and compassionate
  chosen_spanish: clemente y compasivo
  alternatives_spanish:
  - benigno y compasivo
  - gracioso y compasivo
  lexicon: HALOT
  rationale: חַנּוּן es favor inmerecido; “clemente” comunica esa benevolencia con dignidad bíblica. רַחוּם apunta a la compasión; “compasivo” lo expresa con claridad.
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: slow to anger
  chosen_spanish: lento para la ira
  alternatives_spanish:
  - paciente
  - tardo en airarse
  lexicon: HALOT
  rationale: Es la equivalencia idiomática estándar y preserva el sentido sin explicar la imagen corporal literal.
- source_word: רַב־חֶסֶד
  english_pob_choice: abundant in steadfast love
  chosen_spanish: abundante en misericordia
  alternatives_spanish:
  - abundante en amor fiel
  - rico en misericordia
  lexicon: HALOT
  rationale: חֶסֶד puede abarcar lealtad amorosa y misericordia. En español, “misericordia” es una solución reverente y clara; se preserva la abundancia con “abundante”.
- source_word: וְלֹא עֲזַבְתָּם
  english_pob_choice: and you did not forsake them
  chosen_spanish: y no los abandonaste
  alternatives_spanish:
  - y no los dejaste
  - y no los abandonaste
  lexicon: HALOT
  rationale: עָזַב significa dejar/abandonar/forsake. “Abandonaste” comunica bien la fidelidad persistente de Yahvé en contexto de pacto.
theological_decisions:
- issue: Cómo verter la auto-descripción divina en una fórmula bíblica fiel y clara
  english_pob_reading: a God of forgiveness, gracious and compassionate, slow to anger and abundant in steadfast love
  chosen_spanish_reading: un Dios de perdón, clemente y compasivo, lento para la ira y abundante en misericordia
  alternative_spanish_readings:
  - un Dios perdonador, benigno y compasivo, paciente y abundante en amor fiel
  - un Dios de perdones, gracioso y misericordioso, tardo para la ira y grande en amor
  rationale: La frase recoge la cadencia confesional del hebreo y mantiene los atributos del pacto. Se evita “SEÑOR” porque aquí el texto hebreo nombra a Dios directamente, y se conserva una formulación sobria y litúrgicamente usable.
  doctrine_reference: Éxodo 34:6-7; Nehemías 9:17; Salmo 86:15
- issue: Tratamiento del plural hebreo סְלִיחוֹת
  english_pob_reading: a God of forgivenesses / later revised to a God of forgiveness
  chosen_spanish_reading: un Dios de perdón
  alternative_spanish_readings:
  - un Dios de perdones
  - un Dios perdonador
  rationale: El plural hebreo puede intensificar la idea de perdón abundante. En español, el singular abstracto “perdón” expresa con naturalidad esa plenitud sin sonar artificial; la nota conserva la tensión lexical documentada.
  doctrine_reference: Nehemías 9:17; Salmo 130:4
- issue: Preservación del lenguaje de esclavitud
  english_pob_reading: return to their slavery
  chosen_spanish_reading: volver a su esclavitud
  alternative_spanish_readings:
  - volver a su servidumbre
  - regresar a la esclavitud
  rationale: El contexto del Éxodo y la liberación de Egipto hace importante mantener la dureza de עַבְדוּת. “Esclavitud” conserva la fuerza histórica y moral del pasaje.
  doctrine_reference: Éxodo 1–14; Nehemías 9:17
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail, que suavizó la expresión inglesa a “a God of forgiveness” sin alterar el resto de la auto-descripción divina. La versión española refleja esa decisión con “un Dios de perdón” y mantiene intacta la secuencia de atributos.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma de referencia divina en el proyecto, pero en este versículo el hebreo usa una auto-descripción nominal de Dios; por eso la traducción dice “un Dios de perdón” sin añadir un sustituto del nombre.
  - “Cerviz” conserva el idiomatismo bíblico y armoniza con el registro del libro de Nehemías.
  - “Misericordia” se usa para חֶסֶד por claridad y naturalidad en español; la nota preserva la alternativa “amor fiel” para auditar la tensión lexical.
