translation:
  language: es
  text: Y los que fueron contados entre ellos[a], por sus clanes, por las casas de sus padres, fueron dos mil seiscientos treinta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus inscritos», «su registro» o «su censo». El hebreo se refiere a los registrados en el censo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - llegaron a ser
  - resultaron ser
  lexicon: HALOT
  rationale: En esta fórmula censal, היה funciona como verbo copulativo o resultativo. "Fueron" conserva la simpleza narrativa del hebreo y el valor enumerativo sin forzar una paráfrasis.
- source_word: פְּקֻדֵיהֶם
  english_pob_choice: those counted from them
  chosen_spanish: los que fueron contados de ellos
  alternatives_spanish:
  - sus hombres contados
  - los enumerados entre ellos
  - su registro
  lexicon: HALOT
  rationale: פְּקֻדִים alude a los registrados en el censo. La construcción española mantiene la idea de un total derivado del grupo mencionado, sin añadir "hombres" que no aparece explícitamente en este versículo.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: En contexto censal, מִשְׁפָּחָה se refiere a subdivisiones de parentesco; "clanes" es el equivalente más preciso y claro en español bíblico contemporáneo.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - según las casas de sus padres
  - por sus casas paternas
  - por las casas de sus antepasados
  lexicon: HALOT
  rationale: La expresión hebrea es técnica y genealógica. "Casas de sus padres" preserva su forma y su estructura social, evitando sustituirla por un término más interpretativo.
- source_word: אַלְפַּיִם וְשֵׁשׁ מֵאוֹת וּשְׁלֹשִׁים
  english_pob_choice: two thousand six hundred and thirty
  chosen_spanish: dos mil seiscientos treinta
  alternatives_spanish:
  - dos mil seiscientos y treinta
  lexicon: HALOT
  rationale: Se reproduce el valor cardinal de manera estándar en español, sin añadir elementos no presentes en el hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del hebreo WLC y coincide sustancialmente con la lectura auditada en inglés. La única decisión de peso es conservar la fórmula censal con "los que fueron contados" para reflejar פְּקֻדֵיהֶם sin masculinizar ni ampliar el sustantivo implícitamente.
  spanish_consistency_notes:
  - Se usa "Yahvé" en esta tarea solo cuando el hebreo lo exige; este versículo no contiene el nombre divino.
  - '"Clanes" y "casas de sus padres" mantienen la terminología censal y genealógica coherente con el proyecto.'
  - La cifra se presenta en estilo natural del español moderno, sin alterar el valor numérico.
