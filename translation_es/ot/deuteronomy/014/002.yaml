revisions:
- from: Porque tú eres un pueblo santo para Yahvé tu Dios, y Yahvé te ha escogido para que seas para él un pueblo especial[a], de entre todos los pueblos que hay sobre la faz de la tierra.
  to: Porque tú eres un pueblo santo para Yahvé tu Dios, y Yahvé te ha escogido para que seas para él un pueblo atesorado[a], de entre todos los pueblos que hay sobre la faz de la tierra.
  rationale: Se revisa únicamente סְגֻלָּה para preservar mejor el valor léxico documentado en el expediente POB. «Pueblo atesorado» mantiene la repetición de «pueblo» presente en el hebreo y comunica con más fidelidad la idea de algo especialmente valioso, mientras que la nota conserva la alternativa posesiva explícita.
