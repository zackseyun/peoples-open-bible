  rationale: 'Se conserva la traducción principal del borrador, pero se hacen dos reparaciones menores para alinearla mejor con el expediente POB: (1) se restaura la alternativa léxica documentada para חסד / ἔλεος mediante una nota [b]; (2) se rehace la nota [a] para reflejar con mayor precisión que el hebreo está comprimido y que el griego ofrece una lectura más amplia paralela, sin sugerir que deba entrar al texto principal. Además, se suaviza «ponerse firme» a «mantenerse firme» por naturalidad y registro.'
