revisions:
- from: Y acontecerá después de eso que derramaré[a] mi Espíritu sobre toda carne; y profetizarán[b] sus hijos y sus hijas, sus ancianos soñarán sueños[c], sus jóvenes verán visiones.
  to: Y acontecerá después que derramaré mi Espíritu[a] sobre toda carne[b]; y sus hijos y sus hijas profetizarán, sus hombres mayores soñarán sueños, sus hombres jóvenes verán visiones.
  rationale: 'La revisión restaura mejor el rastro POB y el sentido del hebreo: conserva la nota importante sobre «mi Espíritu», mantiene «toda carne» con su alternativa léxica, elimina una nota innecesaria sobre «profetizarán», y hace explícito el contraste etario y masculino de «hombres mayores / hombres jóvenes». También aligera la secuencia temporal con «después».'
  reviewer_model: gpt-5.4
