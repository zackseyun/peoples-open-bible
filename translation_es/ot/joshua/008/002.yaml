translation:
  language: es
  text: Harás con Hai y con su rey como hiciste con Jericó y con su rey. Solo su botín y su ganado podrán saquear para ustedes[a]. Tiende una emboscada[b] detrás de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «saquearán para ustedes». La forma hebrea puede leerse como futuro directo o como instrucción autorizada; el texto principal usa «podrán saquear» para reflejar el contraste con Jericó, donde el botín estaba prohibido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pon hombres en emboscada detrás de la ciudad». El participio hebreo singular puede designar la emboscada como unidad o al grupo que embosca colectivamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall do
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Y debes hacer
  lexicon: HALOT
  rationale: La forma verbal funciona aquí como mandato en contexto directivo. En español, el futuro simple transmite bien la instrucción solemne sin caer en un calco rígido ni en una perífrasis excesiva.
- source_word: לָעַי
  english_pob_choice: to Ai
  chosen_spanish: con Hai
  alternatives_spanish:
  - a Hai
  - contra Hai
  lexicon: HALOT
  rationale: Se translitera el nombre propio como Hai, forma usual en español bíblico. Con el verbo 'harás' y el contexto militar, 'con Hai' comunica la acción dirigida contra la ciudad sin añadir una preposición no exigida por el español.
- source_word: וּלְמַלְכָּהּ
  english_pob_choice: and its king
  chosen_spanish: y con su rey
  alternatives_spanish:
  - y a su rey
  - y su rey
  lexicon: HALOT
  rationale: La coordinación española natural con el objeto anterior es 'con su rey'. Mantiene la referencia al rey de la ciudad sin volver pesado el sintagma.
- source_word: כַּאֲשֶׁר עָשִׂיתָ
  english_pob_choice: as you did
  chosen_spanish: como hiciste
  alternatives_spanish:
  - tal como hiciste
  - así como hiciste
  lexicon: HALOT
  rationale: '''Como hiciste'' reproduce la cláusula comparativa de manera clara y sobria. Evita sobretraducir el matiz del hebreo con fórmulas demasiado explicativas.'
- source_word: לִירִיחוֹ וּלְמַלְכָּהּ
  english_pob_choice: to Jericho and its king
  chosen_spanish: con Jericó y con su rey
  alternatives_spanish:
  - a Jericó y a su rey
  - contra Jericó y contra su rey
  lexicon: HALOT
  rationale: Jericó es el nombre propio estándar en español. La repetición de 'con' conserva la coordinación natural y la relación del rey con la ciudad.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Excepto
  - Únicamente
  lexicon: HALOT
  rationale: '''Solo'' expresa la restricción del hebreo y funciona bien en español contemporáneo. Introduce la excepción frente al caso de Jericó.'
- source_word: שְׁלָלָהּ
  english_pob_choice: its spoil
  chosen_spanish: su botín
  alternatives_spanish:
  - su despojo
  - su presa
  lexicon: HALOT
  rationale: '''Botín'' mantiene el sentido bélico y es el equivalente natural en español. ''Despojo'' suena más abstracto y menos idiomático en este contexto.'
- source_word: וּבְהֶמְתָּהּ
  english_pob_choice: and its livestock
  chosen_spanish: y su ganado
  alternatives_spanish:
  - y sus animales
  - y su bestiame
  lexicon: HALOT
  rationale: '''Ganado'' captura la referencia económica a animales domesticados como propiedad. En español bíblico, es más preciso y más natural que una ampliación genérica.'
- source_word: תָּבֹזּוּ לָכֶם
  english_pob_choice: you may plunder for yourselves
  chosen_spanish: ustedes podrán tomar como botín para ustedes
  alternatives_spanish:
  - ustedes saquearán para ustedes
  - ustedes podrán saquear para ustedes
  lexicon: HALOT
  rationale: Se conserva el valor permisivo observado en la POB inglesa con 'podrán'. 'Tomar como botín' explicita el resultado del verbo hebreo sin perder el sentido militar. 'Para ustedes' conserva לָכֶם.
- source_word: שִׂים לְךָ
  english_pob_choice: Set for yourself
  chosen_spanish: Pon para ti
  alternatives_spanish:
  - Coloca para ti
  - Sitúa para ti
  lexicon: HALOT
  rationale: '''Pon'' es el imperativo más natural en español para una instrucción militar concreta. Se mantiene el matiz reflexivo de לְךָ con ''para ti''.'
- source_word: אֹרֵב
  english_pob_choice: an ambush
  chosen_spanish: una emboscada
  alternatives_spanish:
  - un grupo en emboscada
  - unos hombres en emboscada
  lexicon: HALOT
  rationale: En español, 'emboscada' es el equivalente idiomático directo del sustantivo hebreo en este contexto. Conserva la ambigüedad entre la acción y la fuerza emboscada, como en la lectura inglesa.
- source_word: מֵאַחֲרֶיהָ
  english_pob_choice: behind the city
  chosen_spanish: detrás de la ciudad
  alternatives_spanish:
  - por detrás de la ciudad
  - a la retaguardia de la ciudad
  lexicon: HALOT
  rationale: '''Detrás de la ciudad'' reproduce la localización posterior con claridad y sin artificio. Es la solución más transparente para el lector español.'
theological_decisions:
- issue: Permiso/autoridad para tomar el botín
  english_pob_reading: you may plunder for yourselves
  chosen_spanish_reading: ustedes podrán tomar como botín para ustedes
  alternative_spanish_readings:
  - ustedes saquearán para ustedes
  - ustedes tomarán como botín para ustedes
  rationale: El hebreo permite leer la forma como futuro simple o como instrucción autorizada. Siguiendo la POB inglesa, el español usa 'podrán' para reflejar mejor la autorización concedida en contraste con la prohibición previa sobre Jericó.
  doctrine_reference: Joshua 6:17-19; Joshua 8:2; nota lexical de la POB inglesa
- issue: Alcance colectivo de la emboscada
  english_pob_reading: Set an ambush for yourself behind the city.
  chosen_spanish_reading: Pon una emboscada para ti detrás de la ciudad.
  alternative_spanish_readings:
  - Pon hombres en emboscada detrás de la ciudad
  - Pon una fuerza en emboscada detrás de la ciudad
  rationale: La forma singular puede referirse a la emboscada como unidad o al grupo que embosca. El español principal conserva esa amplitud con 'una emboscada', sin forzar una especificación que el hebreo no exige.
  doctrine_reference: Joshua 8:2; nota lexical de la POB inglesa
translation_notes:
  revision_awareness: Se siguió de cerca el registro auditado en inglés POB. La principal decisión de ajuste en español fue hacer explícita la autorización con «podrán» y conservar la ambigüedad del singular de אֹרֵב con «emboscada», sin convertirla en una especificación no obligada por el hebreo.
  spanish_consistency_notes:
  - Se mantuvo Yahvé reservado para el Tetragrámaton, pero este versículo no lo contiene.
  - Se usó 'botín' para שְׁלָלָהּ y 'ganado' para וּבְהֶמְתָּהּ, en línea con el registro bélico del pasaje.
  - Se evitó 'SEÑOR' y 'Cristo', que no corresponden a este texto.
  - La traducción conserva el paralelismo con Jericó y la excepción introducida por 'solo'.
