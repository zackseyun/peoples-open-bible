base_translation:
  language: en
  yaml_path: translation/ot/isaiah/020/006.yaml
  text: And the inhabitant of this coastland will say in that day[a], ‘Look, this is our hope, where we fled for help to be delivered from the king of Assyria[b]. And how shall we escape?’
  footnotes:
  - marker: a
    text: Or, 'this is our expectation' or 'this is what we looked to.' The Hebrew expression refers to the object in which they placed their hope.
    reason: lexical_alternative
  - marker: b
    text: '''Coastland'' may also be rendered ''island.'' In Isaiah, the term often refers more broadly to maritime lands or coastal regions.'
    reason: lexical_alternative
