translation:
  language: es
  text: O si yo hubiera procedido falsamente contra su vida —y nada se le oculta al rey—, tú mismo te habrías mantenido apartado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “tú mismo te habrías puesto contra mí”. La expresión hebrea puede indicar tanto mantenerse separado de alguien como ponerse contra él; el contexto favorece la idea de que Joab le habría retirado su apoyo y habría dejado expuesto al hablante.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹ
  english_pob_choice: Or
  chosen_spanish: O
  alternatives_spanish:
  - O si no
  - De otro modo
  lexicon: HALOT
  rationale: Introduce la alternativa hipotética con una partícula breve y natural en español, equivalente al valor disyuntivo de la hebrea.
- source_word: עָשִׂ֤יתִי
  english_pob_choice: I had dealt
  chosen_spanish: yo hubiera procedido
  alternatives_spanish:
  - yo hubiera hecho
  - yo hubiera actuado
  lexicon: HALOT
  rationale: El verbo hebreo es amplio, pero aquí la construcción idiomática con בְּנַפְשׁוֹ שֶׁקֶר pide una expresión que refleje conducta culpable o infiel; 'hubiera procedido' mantiene naturalidad sin reducirlo a un mero 'hacer'.
- source_word: בְּנַפְשׁוֹ
  english_pob_choice: against his life
  chosen_spanish: contra su vida
  alternatives_spanish:
  - a su vida
  - en perjuicio de su vida
  - contra él
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí remite a la vida de la persona; 'contra su vida' conserva el peso de peligro mortal sin sobreexplicar.
- source_word: שֶׁקֶר
  english_pob_choice: falsely
  chosen_spanish: falsamente
  alternatives_spanish:
  - con engaño
  - traidoramente
  lexicon: HALOT
  rationale: En esta construcción adverbial, 'falsamente' preserva el vínculo léxico con 'falsedad' y sugiere conducta desleal o engañosa.
- source_word: וְכָל דָּבָר לֹא יִכָּחֵד מִן־הַמֶּלֶךְ
  english_pob_choice: and no matter is hidden from the king
  chosen_spanish: y nada se le oculta al rey
  alternatives_spanish:
  - y ningún asunto queda oculto al rey
  - y no hay cosa escondida del rey
  lexicon: HALOT
  rationale: La frase expresa una verdad general sobre el conocimiento del rey; la versión española debe sonar idiomática y mantener el sentido de que nada permanece oculto ante él.
- source_word: וְאַתָּה
  english_pob_choice: you yourself
  chosen_spanish: tú mismo
  alternatives_spanish:
  - y tú
  - tú
  lexicon: HALOT
  rationale: El pronombre independiente es enfático; 'tú mismo' reproduce esa fuerza en español.
- source_word: תִּתְיַצֵּב
  english_pob_choice: would have stood
  chosen_spanish: habrías quedado
  alternatives_spanish:
  - te habrías puesto en pie
  - te habrías presentado
  lexicon: HALOT
  rationale: El hitpael de יצב puede expresar ponerse de pie o tomar posición; en este contexto, la idea práctica es que Joab no habría permanecido del lado del hablante.
- source_word: מִנֶּגֶד
  english_pob_choice: aloof
  chosen_spanish: apartado
  alternatives_spanish:
  - a distancia
  - en oposición
  - alejado
  lexicon: HALOT
  rationale: El adverbio literalmente denota estar enfrente/opuesto, pero en el contexto se entiende como retirarse del apoyo o quedar separado; 'apartado' conserva esa distancia relacional sin imponer una oposición más fuerte de la necesaria.
translation_notes:
  revision_awareness: La redacción sigue el giro revisado del audit trail inglés, que ajustó la cláusula final de una noción meramente espacial (“aside”) a una más relacional (“aloof”). En español se optó por “apartado” para mantener esa distancia con naturalidad, sin cerrar del todo la ambigüedad entre separación y oposición.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se mantuvo 'rey' en minúscula por tratarse de un título contextual, no de un nombre propio.
  - '''Contra su vida'' y ''falsamente'' preservan la carga idiomática de la expresión hebrea sin convertirla en paráfrasis libre.'
