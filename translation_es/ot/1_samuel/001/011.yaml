  to: 'Hizo un voto y dijo: «Yahvé de los ejércitos, si de veras miras la aflicción de tu sierva, y te acuerdas de mí, y no olvidas a tu sierva, sino que le das a tu sierva un hijo varón[a], entonces yo se lo daré a Yahvé todos los días de su vida[b], y no pasará navaja sobre su cabeza».'
