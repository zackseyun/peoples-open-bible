revisions:
- from: Y los guías de este pueblo han venido a ser quienes los extravían[a], y los guiados por ellos son tragados.
  to: Y los dirigentes de este pueblo han llegado a ser quienes los extravían[a], y los guiados por ellos son tragados.
  rationale: Se ajusta 'los guías' a 'los dirigentes' para lograr un español más natural y digno sin abandonar la lectura contextual de liderazgo/gobierno avalada por el POB inglés. Se cambia 'han venido a ser' por 'han llegado a ser' para mantener la idea de transición de וַיִּהְיוּ con mejor fluidez. La nota se actualiza para corresponder exactamente al nuevo texto principal.
