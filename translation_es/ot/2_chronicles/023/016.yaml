revisions:
- from: Entonces Joiadá hizo un pacto entre él[a], todo el pueblo y el rey, para que fueran pueblo de Yahvé[b][c].
  to: Entonces Joiadá hizo un pacto entre él mismo[a], todo el pueblo y el rey, para que fueran el pueblo de Yahvé[b][c].
  rationale: 'Se hizo una reparación menor para que el español suene natural y fiel al sentido del hebreo: ''entre él mismo'' expresa mejor la referencia de בֵּינוֹ en esta construcción; además, se promovió ''el pueblo de Yahvé'' como redacción principal por su claridad idiomática en español, manteniendo en notas tanto la variante más breve como la más literal. También se normalizó la puntuación y clasificación de las notas.'
