translation:
  language: ko
  text: 그 날에는 여러분이 내 이름으로 구할 것입니다. 그리고 나는 내가 여러분을 위해 아버지께 청하겠다고 여러분에게 말하지 않습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그날에」.
    reason: lexical_alternative
  - marker: b
    text: 이 절에서 헬라어는 「구하다·청하다」에 두 동사를 사용한다. 제자들의 구함에는 αἰτέω, 예수의 아버지께 향한 청함에는 ἐρωτάω.
    reason: lexical_alternative
  - marker: c
    text: 또는 「너희를 위하여」.
    reason: lexical_alternative
