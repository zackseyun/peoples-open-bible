translation:
  language: es
  text: Y se enteraron de que él había sido capturado y había perecido[a], y los que estaban con él; y se alentaron unos a otros, y siguieron adelante en formación cerrada, listos para la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se cobraron ánimo». El griego dice literalmente «se alentaron a sí mismos», una expresión reflexiva que puede entenderse como fortalecimiento mutuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέγνωσαν
  english_pob_choice: they learned
  chosen_spanish: se enteraron
  alternatives_spanish:
  - lo supieron
  - llegaron a saber
  - se dieron cuenta
  lexicon: LSJ
  rationale: El verbo expresa llegar a conocer una noticia. En español, «se enteraron» comunica bien la recepción de la información en un contexto narrativo y militar, sin añadir interpretación.
- source_word: συνελήμφθη
  english_pob_choice: had been captured
  chosen_spanish: había sido capturado
  alternatives_spanish:
  - había sido apresado
  - había sido tomado
  lexicon: LSJ
  rationale: El pasivo aoristo indica que fue capturado o apresado. «Había sido capturado» sigue de cerca el sentido militar y es claro en español.
- source_word: ἀπώλωλεν
  english_pob_choice: had perished
  chosen_spanish: había perecido
  alternatives_spanish:
  - había muerto
  - había sido destruido
  lexicon: LSJ
  rationale: El perfecto de ἀπόλλυμι puede expresar haber perecido o haber muerto/desaparecido. «Había perecido» conserva la gravedad y la amplitud del término sin especificar más de lo que el griego dice.
- source_word: οἱ μετʼ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - sus compañeros
  - los hombres con él
  lexicon: LSJ
  rationale: La frase es amplia y no fuerza un sustantivo como «compañeros» o «hombres». «Los que estaban con él» mantiene la neutralidad del griego.
- source_word: παρεκάλεσαν ἑαυτούς
  english_pob_choice: they encouraged one another
  chosen_spanish: se alentaron unos a otros
  alternatives_spanish:
  - se animaron mutuamente
  - se exhortaron
  lexicon: LSJ
  rationale: El reflexivo puede expresar fortalecerse o animarse mutuamente. «Se alentaron unos a otros» reproduce la acción recíproca de forma natural en español.
- source_word: ἐπορεύοντο
  english_pob_choice: went on
  chosen_spanish: avanzaban
  alternatives_spanish:
  - iban
  - marchaban
  - proseguían
  lexicon: LSJ
  rationale: El verbo de movimiento permite una traducción neutra. «Avanzaban» funciona bien en el contexto bélico y evita un tono demasiado coloquial.
- source_word: συνεστραμμένοι
  english_pob_choice: in close formation
  chosen_spanish: en formación cerrada
  alternatives_spanish:
  - compactos
  - agrupados
  - con los rangos cerrados
  lexicon: LSJ
  rationale: El participio describe estar reunidos o compactados en sentido militar. «En formación cerrada» transmite la idea táctica con claridad.
- source_word: ἕτοιμοι εἰς πόλεμον
  english_pob_choice: ready for battle
  chosen_spanish: listos para la batalla
  alternatives_spanish:
  - preparados para la guerra
  - listos para la guerra
  - preparados para combatir
  lexicon: LSJ
  rationale: La expresión es militar y directa. «Listos para la batalla» conserva la inmediatez del inglés POB y su valor contextual; «batalla» es más concreto y natural aquí que el más amplio «guerra».
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto principal, junto a la palabra correspondiente. Se mantiene la lectura auditada del griego y la equivalencia óptima usada por el POB en inglés.'
  spanish_consistency_notes:
  - Se conservó la voz narrativa en pasado con perfecto compuesto/pluscuamperfecto según el sentido del aoristo y del perfecto griego en contexto.
  - Se evitó introducir términos eclesiásticos o doctrinales ajenos al relato militar.
  - «Batalla» se prefirió a «guerra» por la proximidad inmediata del contexto bélico y la naturalidad del español.
  - La nota al pie ancla correctamente el matiz reflexivo de παρεκάλεσαν ἑαυτούς sin borrar la posibilidad alternativa documentada por el POB en inglés.
