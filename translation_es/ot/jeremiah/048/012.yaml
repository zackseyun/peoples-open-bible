  text: לָ/כֵ֞ן הִנֵּ֖ה יָמִ֤ים בָּאִים֙ נְאֻם יְהוָ֔ה וְ/שִׁלַּחְתִּי ל֥/וֹ צֹעִ֖ים וְ/צֵעֻ֑/הוּ וְ/כֵלָ֣י/ו יָרִ֔יקוּ וְ/נִבְלֵי/הֶ֖ם יְנַפֵּֽצוּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/048/012.yaml
  text: Therefore behold[a], days are coming, declares Yahweh, when I will send to him pourers, and they will pour him out[c][b]; they will empty his vessels and shatter their jars.
  footnotes:
  - marker: a
    text: Or 'tilters' / 'decanters'; the Hebrew term is rare. The context of pouring, emptying vessels, and smashing containers supports the sense of those who pour out wine.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will make him wander.' The Hebrew verb can be understood differently, but the surrounding wine-vessel imagery favors 'pour him out.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'their jars.' Some interpreters expect 'his jars' by sense, referring to Moab; the received text reads 'their.'
    reason: textual_variant
