review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia hebrea de juicio metafórico: tropezar, caer, ser quebrados, ser atrapados y capturados. También refleja adecuadamente בָם como «entre ellos» en el texto principal, con nota para la alternativa referida a la piedra/trampa del contexto inmediato.'
  spanish_quality_summary: 'El español es claro y legible, pero «serán atrapados en la trampa y apresados» sobreexplica וְנוֹקְשׁוּ añadiendo «en la trampa», que no está explícito en el hebreo, y reduce la concisión de la progresión. «Serán atrapados y capturados» o mejor «serán atrapados y capturados»/«caerán en lazo y serán capturados» sería más fiel; para mantener cercanía al POB inglés, conviene «serán atrapados y capturados». Además, la nota al pie está mal formulada: el inglés dice «many will stumble in/by it», pero el español actual dice «entre ellos / en ellos», sin reflejar el singular implícito de «ella/ello» referido a la piedra/trampa.'
  glossary_alignment: 'No hay términos del glosario principal directamente implicados. Las decisiones léxicas clave son mayormente correctas: «tropezarán», «entre ellos», «muchos», «caerán», «serán quebrantados». La mejor alineación con la auditoría inglesa para וְנוֹקְשׁוּ/וְנִלְכָּדוּ es evitar la expansión «en la trampa» y distinguir los dos verbos con «serán atrapados y capturados».'
  issues:
  - severity: medium
    issue: Expansión no explícita de וְנוֹקְשׁוּ como «serán atrapados en la trampa»
    rationale: El hebreo expresa «serán atrapados/caerán en un lazo», pero no incluye aquí el sustantivo «trampa». Añadirlo hace la traducción menos ceñida al texto y menos paralela a la secuencia breve del original.
  - severity: medium
    issue: Nota al pie no refleja con precisión la alternativa del POB inglés
    rationale: La nota inglesa ofrece «many will stumble in/by it», con pronombre singular referido a la piedra/trampa. La nota española actual dice «entre ellos / en ellos», lo cual introduce plural y no comunica bien la alternativa contextual.
  revised_spanish_text: Y muchos entre ellos tropezarán[a]; caerán y serán quebrantados; serán atrapados y capturados.
  revised_footnotes:
  - marker: a
    text: 'O: «muchos tropezarán en ella» o «por ella», tomando el pronombre como referencia a la piedra o la trampa de la imagen inmediata.'
    reason: alternative_reading
  revision_rationale: Se corrige una expansión innecesaria en la segunda mitad del versículo para ceñirse mejor al hebreo y a la auditoría inglesa, conservando la secuencia breve y concreta de imágenes de juicio. También se ajusta la nota al pie para reflejar con precisión la alternativa documentada por el POB inglés, con pronombre singular referido a la piedra/trampa del contexto.
