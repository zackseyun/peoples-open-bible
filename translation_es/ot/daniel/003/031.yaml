    issue: La nota [b] está anclada a «naciones», pero explica «en toda la tierra».
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente; de lo contrario, se distorsiona la relación entre texto y comentario.
  - severity: low
    issue: La nota [a] sobre «rey» no preserva una alternativa semántica necesaria en español.
    rationale: El expediente inglés no exige una nota sobre el título en español, y eliminarla mejora limpieza sin pérdida de sentido.
  - severity: low
    issue: La distribución de notas no refleja de la manera más útil las decisiones preservadas por el POB inglés.
    rationale: Conviene conservar la nota cultural sobre «en toda la tierra» y una nota léxica sobre «se multiplique», ambas correctamente ancladas.
