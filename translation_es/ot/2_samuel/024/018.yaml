    issue: «fue a David» para וַיָּבֹא
    rationale: Aunque gramaticalmente posible, «vino a David» o «llegó a David» refleja mejor el valor narrativo de בוא con destino expreso y suena más idiomático en español bíblico natural.
  - severity: low
    issue: Faltan notas que el expediente inglés consideró significativas
    rationale: Conviene conservar la nota sobre «aquel día» como alternativa léxica y la referencia cruzada a Ornan en 1 Crónicas 21:18. La nota inglesa sobre «for the LORD» no requiere nota en español porque el texto principal ya eligió «para Yahvé».
  revised_spanish_text: 'Ese día[a] Gad vino a David y le dijo[b]: «Sube y levanta un altar para Yahvé en la era de Arauná, el jebuseo».

