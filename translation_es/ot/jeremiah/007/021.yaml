translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos, Dios de Israel: Añadan sus holocaustos a sus sacrificios[a], y coman la carne.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus sacrificios de paz»; el término hebreo puede referirse más específicamente a sacrificios de los que comía el adorador.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto es lo que dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera natural y solemne en español con 'Así dice', manteniendo el valor performativo presente de la proclamación divina sin volverla arcaica o rígida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en su forma establecida para el proyecto, evitando la sustitución por un título y manteniendo la referencia directa al Tetragrámaton.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los hosts
  - de las huestes
  lexicon: HALOT
  rationale: En español, 'de los ejércitos' comunica con claridad el sentido del título divino sin perder su amplitud semítica; es una equivalencia idiomática habitual y precisa.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La frase constructa se vierte de forma directa y natural, conservando la identificación pactal de Dios con Israel.
- source_word: עֹלוֹתֵיכֶם
  english_pob_choice: your burnt offerings
  chosen_spanish: sus holocaustos
  alternatives_spanish:
  - sus ofrendas quemadas
  - sus ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: En español bíblico, 'holocaustos' sigue siendo un término técnico claro para עֹלָה y mantiene la idea de ofrenda totalmente consumida. Se elige por fidelidad lexical y registro formal.
- source_word: סְפוּ
  english_pob_choice: Add
  chosen_spanish: Añadan
  alternatives_spanish:
  - Apilen
  - Sumen
  lexicon: HALOT
  rationale: El imperativo plural se reproduce con 'Añadan', que conserva la ironía del mandato y la relación sintáctica con el complemento que sigue.
- source_word: זִבְחֵיכֶם
  english_pob_choice: your sacrifices
  chosen_spanish: sus sacrificios
  alternatives_spanish:
  - sus ofrendas de comunión
  - sus sacrificios de paz
  lexicon: HALOT
  rationale: Se mantiene el término amplio 'sacrificios' porque el hebreo no especifica explícitamente una subclase en el texto base. La posible referencia más concreta se preserva en nota para no resolver indebidamente la ambigüedad.
- source_word: וְאִכְלוּ
  english_pob_choice: and eat
  chosen_spanish: y coman
  alternatives_spanish:
  - y comed
  - y coman entonces
  lexicon: HALOT
  rationale: Se conserva el imperativo continuado con una forma natural y digna del español contemporáneo.
- source_word: בָשָׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne del sacrificio
  - la carne ofrecida
  lexicon: HALOT
  rationale: Aunque el audit trail inglés osciló entre 'meat' y 'flesh', el campo semántico hebreo aquí es 'carne'. 'La carne' mantiene correspondencia formal y evita una restricción interpretativa innecesaria.
theological_decisions:
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  rationale: Se preserva el nombre divino y el título militar-cósmico sin sustituirlos por un equivalente litúrgico opaco. 'De los ejércitos' mantiene la fuerza del hebreo y es plenamente inteligible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad de זִבְחֵיכֶם frente a עֹלוֹתֵיכֶם
  english_pob_reading: your sacrifices
  chosen_spanish_reading: sus sacrificios
  alternative_spanish_readings:
  - sus sacrificios de paz
  - sus ofrendas de comunión
  rationale: Se conserva la amplitud del término hebreo en el cuerpo del texto y se deja la posibilidad más específica en nota, siguiendo el principio de no resolver de antemano una tensión léxica que el original permite.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Lexema בָשָׂר en contexto sacrificial
  english_pob_reading: the flesh
  chosen_spanish_reading: la carne
  alternative_spanish_readings:
  - la carne del sacrificio
  - la carne ofrecida
  rationale: En contexto de sacrificio, 'carne' reproduce con sobriedad el término hebreo y resulta más natural que un giro explicativo. Se mantiene el tono imperativo-irónico del pasaje.
  doctrine_reference: 'DOCTRINE.md: Formal equivalence with context-sensitive idiom'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que cambió 'meat' por 'flesh' para acercarse más a בָשָׂר. En español, 'carne' cubre con mayor naturalidad y precisión el valor léxico de בָשָׂר en este contexto, sin perder el registro formal ni la ironía del mandato.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' conforme al criterio del proyecto para יְהוָה.
  - Se mantiene el título 'de los ejércitos' para צְבָאוֹת, coherente con el registro bíblico y la terminología del proyecto.
  - '''Holocaustos'' se usa como término técnico bíblico estable para עֹלוֹת.'
  - La nota al pie conserva la alternativa interpretativa de זִבְחֵיכֶם sin imponerla en el texto principal.
  - '''La carne'' evita el calco de ''flesh'' y es semánticamente más transparente en español que ''la carne'' en un contexto sacrificial; no se reemplaza por ''matanza'' ni por una paráfrasis explicativa.'
