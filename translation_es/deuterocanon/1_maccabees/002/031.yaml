translation:
  language: es
  text: Y se informó a los hombres del rey y a las tropas que estaban en Jerusalén, la ciudad de David, que hombres que habían desobedecido el mandamiento del rey habían bajado a los escondrijos[a] en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "que hombres que se habían dispersado por causa del mandamiento del rey habían bajado a escondrijos en el desierto". El griego es comprimido y la cláusula puede entenderse como dispersión en respuesta al decreto o como desobediencia a él.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνηγγέλη
  english_pob_choice: it was reported
  chosen_spanish: se dio aviso
  alternatives_spanish:
  - se informó
  - fue notificado
  lexicon: LSJ
  rationale: El pasivo impersonal griego pide una formulación natural en español que conserve el carácter de noticia transmitida sin añadir sujeto explícito.
- source_word: τοῖς ἀνδράσιν τοῦ βασιλέως
  english_pob_choice: to the king’s men
  chosen_spanish: a los hombres del rey
  alternatives_spanish:
  - a los servidores del rey
  - a los soldados del rey
  lexicon: LSJ
  rationale: ἀνδράσιν significa literalmente 'hombres'; se conserva esa amplitud, evitando especificar cargo o rango no expresado por el griego.
- source_word: ταῖς δυνάμεσιν
  english_pob_choice: the forces
  chosen_spanish: a las tropas
  alternatives_spanish:
  - a las fuerzas
  - al ejército
  lexicon: LSJ
  rationale: En contexto militar, δυνάμεις refiere a fuerzas armadas. 'Tropas' suena natural en español y mantiene el valor militar plural sin precisar una unidad concreta.
- source_word: ἐν Ἰερουσαλὴμ πόλει Δαυείδ
  english_pob_choice: in Jerusalem, the city of David
  chosen_spanish: en Jerusalén, la ciudad de David
  alternatives_spanish:
  - en Jerusalén, la Ciudad de David
  - en Jerusalén, ciudad de David
  lexicon: LSJ
  rationale: La aposición se vierte de modo directo y readable, conservando ambas designaciones geográficas sin forzar una construcción calca.
- source_word: κατέβησαν
  english_pob_choice: had gone down
  chosen_spanish: habían bajado
  alternatives_spanish:
  - habían descendido
  - bajaron
  lexicon: LSJ
  rationale: '''Bajado'' expresa el movimiento geográfico de manera natural en español y mantiene la relación temporal dentro del discurso indirecto.'
- source_word: διεσκέδασαν
  english_pob_choice: had disregarded / had scattered
  chosen_spanish: habían desobedecido
  alternatives_spanish:
  - habían desatendido
  - habían quebrantado
  lexicon: LSJ
  rationale: 'El griego es sintácticamente tenso: el verbo puede sugerir dispersión o, en conexión con el objeto ''el mandamiento'', el apartarse de él. En español, ''desobedecer'' comunica esa tensión de forma clara sin eliminar la ambigüedad subyacente.'
- source_word: τὴν ἐντολὴν τοῦ βασιλέως
  english_pob_choice: the king’s command
  chosen_spanish: el mandamiento del rey
  alternatives_spanish:
  - el mandato del rey
  - la orden del rey
  lexicon: LSJ
  rationale: '''Mandamiento'' conserva la fuerza normativa de ἐντολή y es plenamente comprensible en español bíblico sin recurrir a un vocabulario más eclesiástico de lo necesario.'
- source_word: εἰς τοὺς κρυφοὺς
  english_pob_choice: into the hiding places
  chosen_spanish: a los escondrijos
  alternatives_spanish:
  - a los lugares ocultos
  - a los refugios
  lexicon: LSJ
  rationale: El sustantivo/adjetivo sustantivado apunta a lugares ocultos. 'Escondrijos' preserva el matiz de clandestinidad y la concreción espacial del texto.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la estepa
  - en la soledad
  lexicon: LSJ
  rationale: ἔρημος puede ser 'desierto' o 'wilderness'. Aquí 'desierto' es idiomático en español y válido para un lugar despoblado, sin obligar a una imagen geográfica demasiado específica.
theological_decisions:
- issue: Valor de διεσκέδασαν τὴν ἐντολὴν τοῦ βασιλέως
  english_pob_reading: The men are described as having disregarded the king’s command, then gone into the hiding places in the wilderness; the Greek clause is compressed and potentially ambiguous.
  chosen_spanish_reading: Los hombres habían desobedecido el mandamiento del rey y habían bajado a los escondrijos en el desierto.
  alternative_spanish_readings:
  - los hombres habían sido dispersados por causa del mandamiento del rey
  - los hombres habían desatendido el mandamiento del rey
  rationale: El griego une un verbo de dispersión con un objeto ('el mandamiento') que no encaja de modo liso. La traducción principal conserva la relación con el mandamiento mediante 'desobedecido', evitando resolver de manera excesiva una tensión que el texto fuente mantiene.
  doctrine_reference: Primacía del original y preservación de tensiones textuales; no armonizar artificialmente una lectura dudosa.
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que movió la lectura desde 'dispersed because of' hacia 'disregarded' para reflejar mejor διεσκέδασαν τὴν ἐντολήν. La versión española sigue esa revisión, pero conserva la tensión semántica del griego mediante 'desobedecido', que deja abierta la relación exacta entre dispersión y mandato.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Mandamiento'' se usa de forma consistente para ἐντολή en contexto normativo.'
  - '''Escondrijos'' preserva el matiz de ocultamiento; la nota alternativa recoge la posibilidad de leer simplemente ''escondrijos en el desierto''.'
