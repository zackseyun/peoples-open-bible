translation:
  language: es
  text: 'Entonces Abraham se apresuró a entrar en la tienda, hacia Sara, y dijo: «Date prisa, amasa tres seas[a] de flor de harina y haz tortas».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una sea era una medida antigua para áridos; tres seas equivalen aproximadamente a 20–22 litros (unos 5–6 galones).
    reason: cultural_note
  - marker: b
    text: 'O: «tres medidas» de flor de harina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  english_pob_choice: hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - corrió
  lexicon: HALOT
  rationale: El verbo expresa acción rápida y urgente. «Se apresuró» mantiene la inmediatez narrativa con un español natural y digno.
- source_word: הָאֹהֱלָה
  english_pob_choice: into the tent
  chosen_spanish: a entrar en la tienda
  alternatives_spanish:
  - hacia la tienda
  - a la tienda
  lexicon: HALOT
  rationale: El he direccional indica movimiento hacia el lugar; por el contexto, Abraham va a hablar con Sara dentro de la tienda. «A entrar en la tienda» conserva el sentido direccional e implícitamente interior.
- source_word: מַהֲרִי
  english_pob_choice: Quickly
  chosen_spanish: Date prisa
  alternatives_spanish:
  - Apresúrate
  - Rápido
  lexicon: HALOT
  rationale: Es un imperativo femenino singular dirigido a Sara. «Date prisa» es una orden natural en español y preserva el tono urgente sin sonar arcaica.
- source_word: שְׁלֹשׁ סְאִים
  english_pob_choice: three seahs
  chosen_spanish: tres medidas
  alternatives_spanish:
  - tres seahs
  - tres fanegas
  lexicon: HALOT
  rationale: El hebreo designa una medida antigua de volumen. En español, «medidas» comunica el sentido al lector general; no se introduce «seahs» en el texto principal porque no es un término asentado en español y podría entorpecer la lectura.
- source_word: קֶמַח סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina de primera
  lexicon: HALOT
  rationale: La expresión hebrea señala harina finamente molida y de alta calidad. «Flor de harina» es una equivalencia tradicional y clara en español que conserva el valor cualitativo del término.
- source_word: לוּשִׁי
  english_pob_choice: knead
  chosen_spanish: amasa
  alternatives_spanish:
  - soba
  - masa
  lexicon: HALOT
  rationale: El verbo se refiere específicamente a amasar masa, no solo a mezclar ingredientes. «Amasa» es preciso y natural en español.
- source_word: וַעֲשִׂי עֻגוֹת
  english_pob_choice: and make cakes
  chosen_spanish: y haz tortas
  alternatives_spanish:
  - y prepara tortas
  - y haz pasteles
  lexicon: HALOT
  rationale: עֻגוֹת alude a tortas o panes redondos sencillos, no a pasteles dulces. «Tortas» evita la connotación moderna de «pasteles» y mantiene el carácter simple del alimento.
translation_notes:
  revision_awareness: 'El texto inglés de POB mantiene una equivalencia óptima: conserva la urgencia narrativa, el destino espacial, la medida antigua y el léxico culinario básico. La versión española sigue esa misma estrategia, ajustando solo lo necesario para que el imperativo femenino, la medida y el alimento sean naturales y claros en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma editorial solo cuando aparece el nombre divino; aquí no aplica.
  - «Flor de harina» se eligió por claridad y por su valor idiomático en español, aunque el inglés use «fine flour».
  - «Tortas» refleja mejor que «pasteles» el tipo de pan sencillo sugerido por עֻגוֹת.
  - Se evita dejar «seah» sin explicación en el texto principal para no cargar innecesariamente la lectura; la nota preserva la unidad de medida.
