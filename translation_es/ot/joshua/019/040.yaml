translation:
  language: es
  text: A la tribu de los hijos de Dan, según sus clanes, salió el séptimo lote.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְמַטֵּה
  english_pob_choice: for the tribe of
  chosen_spanish: a la tribu de
  alternatives_spanish:
  - para la tribu de
  - a la vara de
  lexicon: HALOT
  rationale: 'En los repartos territoriales de Josué, מַטֶּה designa la tribu, no una vara literal. El prefijo ל se expresa naturalmente en español con «a» en un contexto de asignación: la suerte salió destinada a esa tribu.'
- source_word: בְנֵי דָן
  english_pob_choice: the sons of Dan
  chosen_spanish: los hijos de Dan
  alternatives_spanish:
  - los hijos de Dan
  - los danitas
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica del hebreo, que el POB inglés mantiene de forma transparente. «Danitas» sería más idiomático, pero atenúa la estructura formal del original.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת aquí se refiere a subdivisiones tribales; «clanes» comunica mejor esa organización social que «familias» en español moderno.
- source_word: יָצָא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - vino a salir
  - cayó
  lexicon: HALOT
  rationale: En español, «salió» reproduce con naturalidad la imagen del verbo hebreo y el lenguaje del sorteo. «Cayó» es posible por el sentido tradicional de los lotes, pero el POB inglés prefirió una opción más cercana al hebreo.
- source_word: הַגּוֹרָל
  english_pob_choice: the lot
  chosen_spanish: la suerte
  alternatives_spanish:
  - el sorteo
  - la porción
  lexicon: HALOT
  rationale: Aunque גוֹרָל suele traducirse «lote», en español bíblico «suerte» comunica bien el resultado del sorteo y evita una repetición áspera con «salió». Mantiene el sentido asignativo del pasaje.
- source_word: הַשְּׁבִיעִי
  english_pob_choice: the seventh
  chosen_spanish: la séptima
  alternatives_spanish:
  - el séptimo
  - la séptima suerte
  lexicon: HALOT
  rationale: El ordinal concuerda con «suerte», que es femenino en español. Se conserva el valor secuencial del texto sin añadir información.
translation_notes:
  revision_awareness: El texto base coincide sustancialmente con la versión inglesa auditada; no se detectan revisiones aplicadas ni tensiones lexicográficas adicionales en este versículo breve.
  spanish_consistency_notes:
  - Se mantiene «tribu» para מַטֶּה en contextos de reparto territorial.
  - Se mantiene «clanes» para מִשְׁפְּחֹת en pasajes de organización tribal.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el hebreo.
  - No hay nombres divinos ni términos cristológicos en este versículo.
