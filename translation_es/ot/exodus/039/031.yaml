translation:
  language: es
  text: Y le colocaron un cordón azul[a] para ponerlo por encima, sobre el turbante, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un cordón de hilo azul» o «un cordón violeta»; el hebreo תְּכֵלֶת se refiere al material distintivo teñido de azul usado en el tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: they attached
  chosen_spanish: le colocaron
  alternatives_spanish:
  - lo ataron
  - lo fijaron
  - lo sujetaron
  lexicon: HALOT
  rationale: En este contexto el verbo expresa una acción funcional de fijación del cordón al objeto previo. «Le colocaron» comunica la acción sin volverla demasiado técnica o rígida en español.
- source_word: עָלָיו
  english_pob_choice: to it
  chosen_spanish: le
  alternatives_spanish:
  - sobre él
  - a él
  lexicon: HALOT
  rationale: El referente inmediato es el objeto mencionado en el versículo anterior. En español, el dativo «le» evita una repetición forzada y conserva la referencia relacional del hebreo.
- source_word: פְּתִיל
  english_pob_choice: cord
  chosen_spanish: cordón
  alternatives_spanish:
  - cordel
  - hilo
  - cuerda
  lexicon: HALOT
  rationale: פְּתִיל designa un hilo trenzado o cordón. «Cordón» es natural en español y mantiene la idea de una pieza estrecha pero resistente.
- source_word: תְּכֵלֶת
  english_pob_choice: blue yarn
  chosen_spanish: de azul[a]
  alternatives_spanish:
  - azul
  - de lana azul
  - de color azul-violeta
  lexicon: HALOT
  rationale: El hebreo se refiere al material teñido de azul característico del santuario. En español, «de azul» preserva la referencia cromática sin introducir una textura no expresada explícitamente en el hebreo; la nota conserva la alternativa tradicional de azul/violeta.
- source_word: לָתֵת
  english_pob_choice: to put
  chosen_spanish: para ponerlo
  alternatives_spanish:
  - para colocarlo
  - para ponerlo allí
  lexicon: HALOT
  rationale: El infinitivo final indica propósito. «Para ponerlo» es una equivalencia directa y clara en español.
- source_word: הַמִּצְנֶפֶת
  english_pob_choice: the turban
  chosen_spanish: el turbante
  alternatives_spanish:
  - el turbante sacerdotal
  - el tocado
  - la mitra
  lexicon: HALOT
  rationale: En español, «turbante» transmite con claridad el tocado sacerdotal; «mitra» puede sonar más eclesiástica y menos transparente al trasfondo hebreo.
- source_word: מִלְמָעְלָה
  english_pob_choice: above
  chosen_spanish: por encima
  alternatives_spanish:
  - arriba
  - desde arriba
  - en la parte superior
  lexicon: HALOT
  rationale: El adverbio indica ubicación superior. «Por encima» refleja bien la posición relativa del cordón y del objeto en el turbante.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת־מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había mandado a Moisés
  - según Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: La fórmula de cumplimiento se conserva con una estructura idiomática natural. «Había mandado» comunica el mandato previo y mantiene el tono de obediencia exacta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la terminología POB para el Nombre divino, usando la transliteración establecida «Yahvé» en vez de sustituirlo por un título como «SEÑOR».
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: La lectura POB conserva el Nombre personal de Dios en lugar de enmascararlo con un título. En español se adopta «Yahvé», la forma estándar del proyecto, para mantener la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Relación funcional del cordón con el objeto anterior
  english_pob_reading: they attached to it
  chosen_spanish_reading: le colocaron
  alternative_spanish_readings:
  - le ataron
  - le fijaron
  rationale: El hebreo no especifica el tipo mecánico exacto del acto, pero sí que el cordón quedó unido al objeto para su colocación sobre el turbante. «Le colocaron» evita sobre-especificar y conserva la función.
  doctrine_reference: HALOT on נתן in construction with עַל and purpose clause
translation_notes:
  revision_awareness: 'La redacción sigue la revisión del audit trail que ajustó el orden espacial para reflejar mejor el hebreo: no «sobre el turbante arriba», sino una relación de superioridad («por encima») vinculada al lugar de colocación. También conserva la decisión POB de traducir el Tetragrámaton por «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de manera consistente con el estándar del proyecto.
  - «Turbante» se usa aquí como equivalente transparente del tocado sacerdotal, sin introducir terminología eclesiástica ajena al contexto.
  - La nota de pie preserva la ambigüedad lexical de תְּכֵלֶת sin fijarla artificialmente en un solo matiz cromático.
