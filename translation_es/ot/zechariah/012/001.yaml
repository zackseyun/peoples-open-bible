    text: 'También puede entenderse: «Un oráculo: la palabra de Yahvé contra Israel». La preposición puede significar «acerca de» o, en algunos contextos, «contra».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «el espíritu del hombre»; o «el espíritu humano».'
    reason: lexical_alternative
  revision_rationale: Se cambia «Una carga» por «Un oráculo» para ajustarse al sentido de מַשָּׂא en encabezamientos proféticos y a la decisión léxica ya documentada por el POB. También se suaviza la sintaxis española quitando la coma antes de «y» y se usa «pone el fundamento de la tierra», que mantiene con claridad la imagen de יסד en un registro natural y elevado. Se conservan Yahvé, «acerca de Israel», «la declaración», y la nota sobre la alternativa «contra».
