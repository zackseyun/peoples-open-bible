base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/006/017.yaml
  text: They were ministering before the tabernacle[a], the tent of meeting, with song until Solomon built the house of Yahweh in Jerusalem[c][b], and they stood according to their ordinance over their service.
  footnotes:
