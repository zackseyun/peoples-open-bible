    reason: lexical_alternative
  - marker: b
    text: O «están entretejidas» o «están enredadas». El hebreo usa un verbo raro con sentido de entrelazamiento.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «en manos»; la expresión deja indefinidos a los opresores.
    reason: lexical_alternative
  revision_rationale: Se revisa el texto para alinearlo más estrechamente con las decisiones documentadas del POB y con un español más natural. 'Transgresiones' restituye la elección principal para פְּשָׁעַי, dejando implícita la alternativa 'rebeliones' solo en el trasfondo lexical. Se corrige el sistema de notas para que [c] vuelva a explicar 'en manos' como en el audit trail inglés. También se mejora la fluidez y precisión idiomática con 'ha hecho desfallecer mi fuerza' y 'de las que no puedo levantarme'.
