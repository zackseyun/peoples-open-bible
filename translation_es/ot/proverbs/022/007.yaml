translation:
  language: es
  text: El rico gobierna a los pobres,[a] y el que toma prestado es esclavo del que presta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y el que toma prestado es esclavo de un hombre que presta».
    reason: alternative_literal_rendering
lexical_decisions:
- source_word: עָשִׁיר
  english_pob_choice: the rich
  chosen_spanish: el rico
  alternatives_spanish:
  - el hombre rico
  - el adinerado
  lexicon: HALOT
  rationale: El hebreo funciona como sustantivo adjetival genérico; en español, «el rico» conserva el contraste proverbial y evita añadir matices innecesarios.
- source_word: בְּרָשִׁים
  english_pob_choice: over the poor
  chosen_spanish: sobre los pobres
  alternatives_spanish:
  - entre los pobres
  - contra los pobres
  lexicon: HALOT
  rationale: Con משל, la relación es de dominio o gobierno. «Sobre» expresa bien esa jerarquía social en español y corresponde al valor idiomático señalado en el texto base.
- source_word: יִמְשׁוֹל
  english_pob_choice: rules
  chosen_spanish: domina
  alternatives_spanish:
  - reina
  - gobierna
  lexicon: HALOT
  rationale: En un proverbio, el imperfecto expresa verdad general. «Domina» comunica la fuerza de gobierno/sometimiento sin sonar tan formal como «gobierna» ni tan monárquico como «reina».
- source_word: וְעֶבֶד
  english_pob_choice: is a slave
  chosen_spanish: es esclavo
  alternatives_spanish:
  - es siervo
  - se vuelve esclavo
  lexicon: HALOT
  rationale: El término denota esclavitud o servidumbre vinculada; como la versión inglesa eligió «slave» por fuerza léxica, «esclavo» preserva esa dureza mejor que «siervo».
- source_word: לֹוֶה
  english_pob_choice: the borrower
  chosen_spanish: el que toma prestado
  alternatives_spanish:
  - el prestatario
  - el deudor
  lexicon: HALOT
  rationale: 'El participio se usa sustantivamente: «el que toma prestado» refleja directamente la acción y evita desplazar el sentido hacia el estado resultante («deudor»).'
- source_word: לְאִישׁ מַלְוֶה
  english_pob_choice: to the lender
  chosen_spanish: del que presta
  alternatives_spanish:
  - de un prestamista
  - del hombre que presta
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «a un hombre que presta». En español, «del que presta» suena natural y mantiene la relación de dependencia entre prestatario y prestamista sin tecnicismos innecesarios.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada. No se requiere nota textual adicional para esta línea, porque la traducción española ya expresa de forma natural la relación léxica principal sin perder la tensión semántica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «esclavo» para preservar la fuerza léxica que la POB inglesa documentó en δοῦλος-equivalentes.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes; este versículo no contiene el nombre divino.
  - «El que toma prestado» conserva el valor participial sustantivado del hebreo mejor que una mera etiqueta nominal.
  - La cláusula final usa «del que presta» para un español fluido, equivalente al hebreo «a un hombre que presta» sin introducir un cambio de sentido.
