translation:
  language: es
  text: Si eres justo[a], ¿qué le das, o qué toma[b] de tu mano?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Es decir, Dios: el argumento de Eliú en el contexto es que la justicia humana no aporta ganancia a Dios.'
    reason: cross_reference
  - marker: b
    text: 'O: «¿qué recibe de tu mano?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Supón que
  - Cuando
  lexicon: HALOT
  rationale: Introduce una cláusula condicional; «si» es el equivalente natural y directo en español.
- source_word: צָדַקְתָּ
  english_pob_choice: you are righteous
  chosen_spanish: eres justo
  alternatives_spanish:
  - eres recto
  - has sido justo
  - estás en lo correcto
  lexicon: HALOT
  rationale: La raíz צדק expresa estar en lo justo/recto. En español, «justo» comunica bien el valor moral y la idea condicional del verso, sin forzar un perfecto verbal.
- source_word: מַה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué cosa
  lexicon: HALOT
  rationale: Interrogativo simple y natural para la pregunta retórica.
- source_word: תִּתֶּן
  english_pob_choice: do you give
  chosen_spanish: le das
  alternatives_spanish:
  - darías
  - le darías
  - puedes dar
  lexicon: HALOT
  rationale: El imperfecto hebreo en pregunta retórica expresa una acción general. «Le das» mantiene la fuerza gnómica en español y evita añadir modalización no presente en el hebreo.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El dativo indirecto se expresa de forma natural con «le» en español; el referente queda implícito como en el hebreo, sin resolverlo explícitamente en el texto principal.
- source_word: א֥וֹ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - O bien
  - O
  lexicon: HALOT
  rationale: Conserva la disyunción paralela de la segunda pregunta retórica.
- source_word: מִ/יָּדְ/ךָ֥
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - desde tu mano
  - de tus manos
  - de ti
  lexicon: HALOT
  rationale: Preserva la imagen concreta de la mano como fuente/ámbito de procedencia, una expresión idiomática transparente también en español.
- source_word: יִקָּח
  english_pob_choice: does he take
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  - tomará
  - te toma
  lexicon: HALOT
  rationale: לקח puede significar «tomar» o «recibir». «Toma» conserva la correspondencia verbal más directa; en nota se preserva la alternativa de «recibir» porque el contexto subraya la ausencia de ganancia para Dios.
theological_decisions:
- issue: Referente del pronombre en la primera pregunta y del sujeto implícito en la segunda
  english_pob_reading: The pronouns are retained rather than substituting 'God'; context points to God as the referent, but the main text stays close to the Hebrew wording.
  chosen_spanish_reading: Se mantienen los pronombres implícitos («le», «de tu mano») sin introducir «Dios» en el cuerpo del verso.
  alternative_spanish_readings:
  - ¿Qué le das a Dios? ¿O qué toma Dios de tu mano?
  - Si eres justo, ¿qué le das a él? ¿O qué toma él de tu mano?
  rationale: El contexto inmediato de Eliú apunta a Dios como referente, pero el hebreo conserva la referencia pronominal. La traducción española sigue esa economía textual y deja la identificación en nota, sin borrar la tensión retórica del pasaje.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; primacía del texto original.'
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre la versión inglesa POB y la revisión reciente; no se registraron cambios sustanciales. La redacción española sigue de cerca la estructura del hebreo y conserva la pregunta retórica y la referencia pronominal del original.
  spanish_consistency_notes:
  - Se usó «justo» para צדק en un contexto moral-teológico, consistente con el registro bíblico español del libro.
  - Se prefirió «le das» en lugar de una paráfrasis explicativa para mantener la concisión retórica del hebreo.
  - Se conservó «de tu mano» para reflejar la imagen concreta y la alternativa lexical de «recibir» se dejó en nota.
  - No se introdujo «Cristo», «SEÑOR» ni otros equivalentes no presentes en el texto fuente.
