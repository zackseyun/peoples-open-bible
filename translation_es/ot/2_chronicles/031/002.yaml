  to: Y Ezequías estableció las divisiones de los sacerdotes y de los levitas conforme a sus divisiones[a], cada hombre según su servicio, tanto los sacerdotes como los levitas, para holocaustos y para sacrificios de paz[b], para ministrar y para dar gracias y para alabar en las puertas del campamento[c] de Yahvé.
  rationale: Se ajusta la frase final a la decisión auditada en inglés para esta unidad ('del campamento'), manteniendo en nota la forma hebrea plural y la alternativa interpretativa documentada. También se normaliza levemente la puntuación de las notas en español.
