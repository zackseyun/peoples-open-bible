revisions:
- from: 'Así lo sirvieron a los hombres para comer. Pero mientras comían del guiso[a], gritaron y dijeron: «¡Muerte en la olla, hombre de Dios!». Y no pudieron comer.'
  to: 'Y lo sirvieron a los hombres para comer. Pero mientras comían del guiso, gritaron y dijeron: «¡Muerte en la olla[a], hombre de Dios!». Y no pudieron comer.'
  rationale: Se elimina «Así» por no estar apoyado por el hebreo, se reubica la nota al modismo que realmente explica («Muerte en la olla»), y se mantiene el resto del texto porque preserva bien el sentido fuente con español natural y digno.
