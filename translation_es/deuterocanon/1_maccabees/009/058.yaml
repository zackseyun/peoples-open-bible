translation:
  language: es
  text: 'Y todos los hombres inicuos tomaron consejo[a], diciendo: «Miren, Jonatán y los que están con él viven tranquilos y confiados. Ahora, pues, traigamos a Báquides, y él los capturará a todos en una sola noche».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habitan en quietud y confianza». El griego combina residencia sosegada (ἐν ἡσυχίᾳ κατοικοῦσιν) con un participio que expresa confianza o seguridad (πεποιθότες).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλεύσαντο
  english_pob_choice: took counsel
  chosen_spanish: se aconsejaron
  alternatives_spanish:
  - deliberaron
  - tomaron consejo
  - maquinaron
  lexicon: LSJ
  rationale: El verbo medio indica consulta deliberada entre ellos. «Se aconsejaron» conserva la idea de deliberar juntos sin añadir de entrada la carga interpretativa de una conspiración explícita en el verbo mismo.
- source_word: οἱ ἄνομοι
  english_pob_choice: the lawless men
  chosen_spanish: los hombres inicuos
  alternatives_spanish:
  - los hombres sin ley
  - los impíos
  - los malvados
  lexicon: LSJ
  rationale: ἄνομοι expresa falta de ley y también juicio moral. «Inicuos» mantiene el tono valorativo y se ajusta al plural masculino del grupo.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  - He aquí
  lexicon: LSJ
  rationale: Es una partícula de atención inmediata. «Miren» suena natural en español actual y conserva el tono de aviso o señalamiento.
- source_word: οἱ παρ᾿ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que están con él
  alternatives_spanish:
  - sus acompañantes
  - los suyos
  - sus hombres
  lexicon: LSJ
  rationale: La expresión no especifica cargo militar ni estatus. «Los que están con él» es suficientemente amplia y fiel.
- source_word: ἐν ἡσυχίᾳ κατοικοῦσιν
  english_pob_choice: are living in peace
  chosen_spanish: habitan en quietud
  alternatives_spanish:
  - viven tranquilamente
  - viven en paz
  - habitan sosegadamente
  lexicon: LSJ
  rationale: La frase griega combina residencia tranquila y calma. «Habitan en quietud» conserva la idea de asentamiento pacífico sin forzar el matiz a «paz» en sentido más amplio.
- source_word: πεποιθότες
  english_pob_choice: confident
  chosen_spanish: y confianza
  alternatives_spanish:
  - confiados
  - seguros
  - confiando
  lexicon: LSJ
  rationale: El participio perfecto expresa un estado de confianza o seguridad. En español, «y confianza» reproduce de forma natural la coordinación semántica observada en el audit trail inglés («in peace and confidence»), sin perder el matiz de seguridad.
- source_word: ἄξομεν
  english_pob_choice: let us bring
  chosen_spanish: traeremos
  alternatives_spanish:
  - vamos a traer
  - trajeremos
  - llevaremos
  lexicon: LSJ
  rationale: Aunque el griego tiene fuerza exhortativa, en español la forma de futuro en primera persona plural puede funcionar como propuesta deliberativa. «Traeremos» evita una perífrasis demasiado explicativa y mantiene el impulso del plan.
- source_word: Βακχίδην
  english_pob_choice: Bacchides
  chosen_spanish: Bákides
  alternatives_spanish:
  - Bacquides
  - Báquides
  lexicon: LSJ
  rationale: Se conserva el nombre propio helenizado con adaptación gráfica castellana moderada. «Bákides» es legible y evita una castellanización excesiva no atestiguada en el texto fuente.
- source_word: συλλήψεται
  english_pob_choice: he will seize
  chosen_spanish: capturará
  alternatives_spanish:
  - apresará
  - se apoderará de
  - prenderá
  lexicon: LSJ
  rationale: En contexto de emboscada militar, «capturará» comunica el sentido de aprehender o apresar con claridad moderna. «Seize» en inglés se resolvió de manera amplia; en español, «capturar» conserva esa amplitud sin sonar jurídico.
- source_word: ἐν νυκτὶ μιᾷ
  english_pob_choice: in a single night
  chosen_spanish: en una sola noche
  alternatives_spanish:
  - en una noche
  - durante una sola noche
  - en la misma noche
  lexicon: LSJ
  rationale: La expresión subraya la brevedad y concentración temporal. «Una sola noche» preserva el énfasis numérico de μία y su fuerza adverbial.
theological_decisions:
- issue: Tono moral de οἱ ἄνομοι
  english_pob_reading: the lawless men
  chosen_spanish_reading: los hombres inicuos
  alternative_spanish_readings:
  - los hombres sin ley
  - los impíos
  - los malvados
  rationale: No hay doctrina en disputa, pero sí una carga valorativa. «Inicuos» mantiene el juicio moral sin convertirlo en una etiqueta eclesial o en una traducción demasiado genérica.
  doctrine_reference: N/A
- issue: Relación entre ἐν ἡσυχίᾳ y πεποιθότες
  english_pob_reading: living in peace and confidence
  chosen_spanish_reading: habitan en quietud y confianza
  alternative_spanish_readings:
  - viven en paz y confianza
  - habitan tranquilamente, confiados
  - viven sosegados y seguros
  rationale: El griego une calma externa y estado interno de confianza. La traducción conserva ambos elementos sin fundirlos en una sola idea de 'paz' que podría diluir la tensión lexical del original.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés POB revisó la frase de «in peace, confident» a «in peace and confidence» para reflejar mejor la combinación de ἐν ἡσυχίᾳ y πεποιθότες. La versión española sigue esa misma separación semántica con «en quietud y confianza», y mantiene el valor deliberativo de ἐβουλεύσαντο sin intensificarlo innecesariamente a «conspiraron».
  spanish_consistency_notes:
  - Se conserva la distinción entre quietud externa y confianza interna.
  - Se mantiene el nombre propio helenizado de Bacchides con adaptación castellana moderada.
  - No se usa «SEÑOR» ni terminología cultual ajena al versículo, por lo que no hay ajustes de nomenclatura divina.
  - El orden y la puntuación siguen la estructura narrativa del original griego y del audit trail inglés.
