translation:
  language: es
  text: Josué hijo de Nun, que está delante de ti, entrará allí. Fortalécelo, porque él hará que Israel la herede[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él la dará a Israel como herencia» o «él la repartirá a Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: Joshua son of Nun
  chosen_spanish: Josué, hijo de Nun
  alternatives_spanish:
  - Yehoshúa, hijo de Nun
  - Josué, el hijo de Nun
  lexicon: HALOT
  rationale: Se conserva el nombre propio en su forma castellana usual, Josué, y el patronímico se vierte de manera natural como hijo de Nun. Mantener la forma bíblica reconocible favorece la lectura eclesial sin perder la referencia al original.
- source_word: הָעֹמֵד לְפָנֶיךָ
  english_pob_choice: who stands before you
  chosen_spanish: que está delante de ti
  alternatives_spanish:
  - que está en pie delante de ti
  - que sirve delante de ti
  lexicon: HALOT
  rationale: El participio expresa la posición de estar ante alguien; 'delante de ti' conserva el hebraísmo con español fluido. 'Está en pie' es más literal, pero menos natural; 'sirve' añade una interpretación que el hebreo aquí no exige.
- source_word: הוּא יָבֹא שָׁמָּה
  english_pob_choice: he will go in there
  chosen_spanish: él entrará allí
  alternatives_spanish:
  - él irá allí
  - él irá adentro
  lexicon: HALOT
  rationale: בוא con שָׁמָּה indica movimiento hacia el lugar mencionado, con idea de ingreso. 'Entrará allí' preserva esa fuerza direccional de manera natural en español.
- source_word: אֹתוֹ חַזֵּק
  english_pob_choice: Strengthen him
  chosen_spanish: Fortalécelo
  alternatives_spanish:
  - Anímalo
  - Hazlo fuerte
  lexicon: HALOT
  rationale: El imperativo de חזק admite 'fortalecer' y también 'animar'. Se escogió 'Fortalécelo' por ser lo más cercano y suficientemente amplio para cubrir la fuerza práctica y moral del mandato.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: '''Porque'' explicita de modo claro la razón del mandato en español actual. Aunque ''for'' puede ser más conjuntivo en inglés, aquí la relación causal del hebreo queda bien expresada con ''porque''.'
- source_word: הוּא יַנְחִלֶנָּה אֶת יִשְׂרָאֵל
  english_pob_choice: he will cause Israel to inherit it
  chosen_spanish: él hará que Israel lo herede
  alternatives_spanish:
  - él dará a Israel esa herencia
  - él repartirá esa herencia a Israel
  lexicon: HALOT
  rationale: El causativo de נחל significa 'hacer heredar' o 'hacer que herede'. 'Hará que Israel lo herede' sigue de cerca esa fuerza causal y permite entender que el objeto es la tierra prometida sin introducir una paráfrasis más libre.
theological_decisions:
- issue: Referente del sufijo femenino en יַנְחִלֶנָּה
  english_pob_reading: The suffix refers to the land promised to Israel.
  chosen_spanish_reading: El sufijo se refiere a la tierra prometida a Israel, implícita en el contexto inmediato.
  alternative_spanish_readings:
  - 'El texto puede dejar el objeto implícito: ''hará que Israel herede''.'
  - El sufijo puede referirse simplemente a 'eso' sin explicitarlo.
  rationale: 'El contexto habla de la entrada en la tierra y de su posesión; por eso conviene explicitar ''lo'' en español para no perder el referente. No se añade una idea nueva: solo se hace visible en español el objeto pronominal que ya está en el hebreo.'
  doctrine_reference: Deuteronomio 1:38; contexto de la promesa y posesión de la tierra
- issue: Función de 'delante de ti' en la frase participial
  english_pob_reading: who stands before you
  chosen_spanish_reading: que está delante de ti como una expresión relacional y de presencia ante Moisés
  alternative_spanish_readings:
  - que sirve delante de ti
  - que se presenta ante ti
  rationale: La frase hebrea describe presencia/posición ante Moisés; no hace falta convertirla en un título de servicio. 'Delante de ti' conserva la relación personal y la escena narrativa.
  doctrine_reference: Éxodo 33:11; Números 27:18-23
- issue: Sentido de חזק en el imperativo
  english_pob_reading: Strengthen him
  chosen_spanish_reading: Fortalécelo
  alternative_spanish_readings:
  - Anímalo
  - Sosténlo
  rationale: El mandato puede abarcar ánimo y fortaleza, pero 'fortalecer' mantiene mejor la amplitud semántica del hebreo sin reducirlo a una exhortación meramente emocional.
  doctrine_reference: Deuteronomio 31:7-8
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del expediente inglés: nombre propio convencional, frase participial conservada en sentido relacional, verbo direccional como ''entrará allí'' y causativo de נחל como ''hará que Israel lo herede''. No se detectaron revisiones posteriores que obligaran a modificar el sentido base.'
  spanish_consistency_notes:
  - Se mantiene 'Israel' como nombre propio sin artículo.
  - Se usa 'tierra' de manera implícita en la lectura teológica, pero no se añade al texto para no exceder el hebreo.
  - '''Lo'' en ''lo herede'' funciona como referente pronominal de la tierra mencionada en el contexto, no como sustituto libre.'
