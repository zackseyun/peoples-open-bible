revisions:
- from: Mi amado es mío[a][b][c], y yo soy suya; él, que pastorea entre los lirios.
  to: Mi amado es mío[a][b][c], y yo soy suyo—el que apacienta entre los lirios.
  rationale: La revisión corrige una marcación de género innecesaria («suya» > «suyo»), mejora la naturalidad y fidelidad del participio («él, que pastorea» > «el que apacienta»), y alinea mejor la puntuación y las notas con el audit trail inglés sin alterar el sentido poético del verso.
