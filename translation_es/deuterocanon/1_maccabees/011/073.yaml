translation:
  language: es
  text: Y los que habían huido de él vieron esto[a], y volvieron a él; y con él persiguieron hasta Cadés, hasta su campamento[b], y acamparon allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «vieron esto». El griego deja tácito el objeto y remite a los hechos inmediatamente anteriores.'
    reason: lexical_alternative
  - marker: b
    text: «Su campamento» probablemente se refiere al campamento del grupo perseguido; el pronombre griego por sí mismo no lo especifica.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ φυγόντες
  english_pob_choice: those who had fled
  chosen_spanish: los que habían huido
  alternatives_spanish:
  - los fugitivos
  - los que habían escapado
  lexicon: LSJ
  rationale: El participio aoristo sustantivado se expresa con una subordinada relativa en pasado perfecto, natural en español y fiel al valor anterior de la acción.
- source_word: παρ᾽ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de su lado
  - alejándose de él
  lexicon: LSJ
  rationale: La preposición con genitivo marca separación respecto del líder; 'de él' es breve y transparente en español.
- source_word: ἴδον
  english_pob_choice: saw it
  chosen_spanish: lo vieron
  alternatives_spanish:
  - vieron eso
  - lo observaron
  lexicon: LSJ
  rationale: El griego no expresa objeto directo; el español lo requiere. 'Lo' mantiene la referencia abierta al hecho inmediatamente anterior, sin precisar más de lo que el contexto garantiza.
- source_word: ἐπέστρεψαν πρὸς αὐτόν
  english_pob_choice: they returned to him
  chosen_spanish: volvieron a él
  alternatives_spanish:
  - regresaron a él
  - se volvieron hacia él
  lexicon: LSJ
  rationale: El verbo expresa retorno y cambio de dirección/alineación. 'Volvieron a él' reproduce ese movimiento con naturalidad.
- source_word: ἐδίωκον μετ᾽ αὐτοῦ
  english_pob_choice: with him they pursued
  chosen_spanish: con él persiguieron
  alternatives_spanish:
  - persiguieron con él
  - se unieron a él en la persecución
  lexicon: LSJ
  rationale: La imperfecta sugiere acción continuada; el complemento 'con él' conserva la coordinación con el líder sin volverla explicativa en exceso.
- source_word: ἕως Κάδης
  english_pob_choice: as far as Kadesh
  chosen_spanish: hasta Cadés
  alternatives_spanish:
  - hasta Kadesh
  lexicon: LSJ
  rationale: Se translitera el topónimo al uso español ('Cadés'), y 'hasta' conserva el valor límite de la persecución.
- source_word: παρεμβολῆς
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento de guerra
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή puede ser 'campamento'; aquí 'campamento' resulta más natural que 'camp' en español y mantiene el sentido castrense.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de los perseguidos
  lexicon: LSJ
  rationale: El posesivo refleja la referencia del pronombre sin forzar una explicación dentro del texto principal. Dado que el antecedente puede entenderse del contexto, 'su campamento' es el equivalente más fluido.
- source_word: παρενέβαλον ἐκεῖ
  english_pob_choice: they encamped there
  chosen_spanish: acamparon allí
  alternatives_spanish:
  - plantaron allí el campamento
  - levantaron allí su campamento
  lexicon: LSJ
  rationale: El verbo militar se traduce con 'acamparon', equivalente natural y fiel al acto de establecer el campamento en ese lugar.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden en una lectura estable; se mantienen las dos ambigüedades señaladas por la POB inglesa: el objeto implícito de ἴδον y la referencia de αὐτῶν en τῆς παρεμβολῆς αὐτῶν.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el original lo exija; este versículo no contiene el nombre divino.
  - Se prefiere 'acamparon' para el cierre militar, en paralelo con 'campamento' para παρεμβολή.
  - '''Cadés'' se adopta como forma española usual del topónimo bíblico.'
