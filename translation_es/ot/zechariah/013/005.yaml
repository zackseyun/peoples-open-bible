translation:
  language: es
  text: 'Y dirá[a]: «No soy profeta; soy un hombre que trabaja la tierra, porque la tierra ha sido mi posesión desde mi juventud».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque un hombre me compró desde mi juventud» o «porque alguien me ha tenido desde mi juventud». El verbo hebreo puede significar adquirir, comprar o poseer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  english_pob_choice: And he will say
  chosen_spanish: Y dirá
  alternatives_spanish:
  - Y dijo
  - Entonces dirá
  lexicon: HALOT
  rationale: El waw + qatal en este contexto profético mira al futuro; en español, el futuro simple conserva ese valor discursivo sin sonar forzado.
- source_word: נָבִיא
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  - mensajero profético
  lexicon: HALOT
  rationale: Es el equivalente directo y estándar para נָבִיא, y mantiene la negación de identidad profética del hablante.
- source_word: אִישׁ עֹבֵד אֲדָמָה
  english_pob_choice: a man who works the ground
  chosen_spanish: un hombre que trabaja la tierra
  alternatives_spanish:
  - un labrador
  - un hombre que labra la tierra
  - un campesino
  lexicon: HALOT
  rationale: Conserva el matiz de אִישׁ ('hombre') y el participio verbal de עֹבֵד con אֲדָמָה. 'Trabaja la tierra' es natural en español y mantiene el paralelo agrícola.
- source_word: אֲדָמָה
  english_pob_choice: ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra cultivable
  lexicon: HALOT
  rationale: En español 'tierra' comunica mejor el campo de cultivo y la textura terrenal de אֲדָמָה que un calco más técnico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación del dicho anterior. 'Porque' es la conexión causal más natural en español y preserva la relación explicativa.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa masculino singular; se conserva con 'un hombre' para no neutralizar indebidamente la forma del original.
- source_word: הִקְנַנִי
  english_pob_choice: acquired me / bought me / possessed me
  chosen_spanish: ha sido mi posesión
  alternatives_spanish:
  - me adquirió
  - me compró
  - me poseyó
  - me ha tenido
  lexicon: HALOT
  rationale: El verbo permite adquirir, comprar o poseer. El inglés POB revisado opta por una formulación de posesión amplia; en español, 'ha sido mi posesión' conserva la ambigüedad sin imponer una relación social más precisa de lo que el hebreo exige.
- source_word: מִנְּעוּרָי
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde que era joven
  - desde mi niñez
  lexicon: HALOT
  rationale: Es la correspondencia más directa y sobria para el marcador temporal hebreo.
theological_decisions:
- issue: Identidad del hablante y posible ocultamiento
  english_pob_reading: The verse preserves the speaker's claim without deciding whether it is sincere renunciation or evasive self-protection.
  chosen_spanish_reading: La traducción conserva el enunciado sin juzgar si es una renuncia sincera o una excusa evasiva.
  alternative_spanish_readings:
  - El hablante es un falso profeta que encubre su pasado
  - El hablante es un antiguo profeta que renuncia a sus pretensiones proféticas
  rationale: El contexto inmediato sugiere vergüenza y negación entre profetas, pero el versículo no lo resuelve explícitamente. La versión española mantiene esa tensión interpretativa en lugar de fijarla.
  doctrine_reference: Preservar la tensión teológica cuando el texto no la resuelve.
- issue: Sentido de הִקְנַנִי
  english_pob_reading: Rendered broadly as 'the land has been my possession' to avoid over-specificity.
  chosen_spanish_reading: 'Se mantiene una formulación amplia: ''la tierra ha sido mi posesión''.'
  alternative_spanish_readings:
  - la tierra me ha pertenecido
  - me compraron desde mi juventud
  - he sido comprado desde mi juventud
  rationale: El hebreo admite el campo semántico de adquirir, comprar o poseer. Una expresión amplia respeta esa amplitud y evita convertir una ambigüedad léxica en una afirmación social demasiado específica.
  doctrine_reference: Primacía del dato original sobre una tradición interpretativa única.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió una formulación amplia para el final del versículo en vez de un calco más específico de compra. La frase española refleja esa decisión y mantiene el tono profético futuro del inicio.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Profeta'' se mantiene como término técnico estable.'
  - '''Tierra'' se eligió para אֲדָמָה por naturalidad en español, sin perder el campo agrícola del hebreo.'
  - La ambigüedad de הִקְנַנִי se conserva mediante una nota alternativa en lugar de resolverla unilateralmente.
