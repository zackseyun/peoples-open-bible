translation:
  language: es
  text: Con los ancianos está la sabiduría[a], y con longitud de días[b], el entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entre los ancianos está la sabiduría». La preposición hebrea puede expresar asociación o ubicación.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «longitud de días»; es decir, larga vida o muchos días.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּישִׁישִׁים
  english_pob_choice: With the aged
  chosen_spanish: Con los ancianos
  alternatives_spanish:
  - Entre los ancianos
  - En los ancianos
  - Con los viejos
  lexicon: HALOT
  rationale: La preposición ב expresa asociación o localización; en español, «con» conserva bien esa relación proverbial. «Ancianos» mantiene el referente de personas de edad avanzada sin limitarlo necesariamente al género, y resulta más natural que un calco como «en los viejos».
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - prudencia
  lexicon: HALOT
  rationale: «Sabiduría» es la correspondencia estándar y mantiene el paralelismo con «entendimiento». No hace falta añadir matiz explicativo que el hebreo no exige aquí.
- source_word: וְאֹרֶךְ יָמִים
  english_pob_choice: and with length of days
  chosen_spanish: y con la longitud de días
  alternatives_spanish:
  - y con larga vida
  - y con muchos días
  lexicon: HALOT
  rationale: Se conserva el giro hebreo literal «longitud de días» porque el texto poético emplea esa imagen idiomática. Aunque «larga vida» sería más natural, suaviza la metáfora y reduce la correspondencia formal con el hebreo.
- source_word: תְּבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  lexicon: HALOT
  rationale: «Entendimiento» funciona bien en español bíblico contemporáneo y conserva la distinción semántica frente a «sabiduría». «Discernimiento» sería posible, pero introduce un matiz más técnico.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: se mantiene la imagen poética de «longitud de días» y la asociación proverbial de la sabiduría con la vejez, sin añadir explicaciones al cuerpo principal.'
  spanish_consistency_notes:
  - Se prefirió «ancianos» para mantener el plural humano general y evitar una lectura excesivamente masculina del hebreo.
  - Se conservó «longitud de días» como calco controlado porque el inglés POB la retuvo explícitamente como imagen idiomática.
  - «Entendimiento» queda en paralelismo con «sabiduría» sin forzar sinónimos innecesarios.
