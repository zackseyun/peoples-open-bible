translation:
  language: es
  text: 'Saúl le dijo: «¿De quién eres hijo, joven?» Y David dijo: «Soy hijo de tu siervo Isaí, de Belén[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el hijo de tu siervo Isaí, de Belén». El hebreo no expresa de manera explícita el verbo «soy».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן מִי
  english_pob_choice: Whose son
  chosen_spanish: ¿De quién eres hijo?
  alternatives_spanish:
  - ¿Hijo de quién eres?
  - ¿De quién es hijo?
  lexicon: HALOT
  rationale: El hebreo pregunta por la filiación paterna. En español, «¿De quién eres hijo?» suena natural y conserva el foco genealógico mejor que una paráfrasis más libre.
- source_word: הַנָּעַר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - mozo
  lexicon: HALOT
  rationale: נַעַר puede abarcar muchacho, joven o joven hombre según el contexto. Aquí «joven» mantiene el matiz de edad sin sonar demasiado infantil.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí la expresión es de humildad cortesana. «Siervo» conserva la autodefinición deferente sin imponer necesariamente el matiz más fuerte de esclavitud, que el contexto no exige de forma clara.
- source_word: בֵּית הַלַּחְמִי
  english_pob_choice: the Bethlehemite
  chosen_spanish: el de Belén
  alternatives_spanish:
  - el betlemita
  - de Belén
  lexicon: HALOT
  rationale: El hebreo usa una forma gentilicia para identificar a Isaí por procedencia. En español, «el de Belén» es claro y natural; «betlemita» sería más técnico, pero menos transparente para la lectura pública.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  english_pob_choice: said ... said
  chosen_spanish: le preguntó ... respondió
  alternatives_spanish:
  - dijo ... dijo
  - preguntó ... dijo
  lexicon: HALOT
  rationale: Aunque el hebreo usa literalmente «dijo» en ambas cláusulas, la primera funciona discursivamente como una pregunta. «Le preguntó» explicita esa función en español sin cambiar el contenido; la segunda cláusula se mantiene como respuesta directa.
- source_word: בֶּן עַבְדְּךָ יִשַׁי
  english_pob_choice: I am the son of your servant Jesse
  chosen_spanish: Soy hijo de tu siervo Isaí
  alternatives_spanish:
  - Soy el hijo de tu siervo Isaí
  - Soy hijo de tu siervo, Isaí
  lexicon: HALOT
  rationale: El hebreo omite el verbo explícito, pero el español requiere copula. «Soy hijo de» conserva la relación filial con naturalidad y sin añadir interpretación.
theological_decisions:
- issue: Tratamiento de עֶבֶד como fórmula de humildad
  english_pob_reading: your servant
  chosen_spanish_reading: tu siervo
  alternative_spanish_readings:
  - tu esclavo
  - tu servidor
  rationale: No se fuerza el sentido social más duro si el uso aquí es una fórmula de cortesía ante autoridad. «Siervo» mantiene la tensión entre subordinación y deferencia sin sobrertraducir.
  doctrine_reference: Lexical humility formula; courtly speech in narrative Hebrew
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y la solución inglesa auditada: conserva la pregunta por filiación, explicita la copula implícita en la respuesta y mantiene el identificador gentilicio de Isaí. La única diferencia relevante frente al inglés es que la primera cláusula se vierte como pregunta directa en español para evitar una estructura menos natural.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «siervo» en coherencia con la fórmula reverencial documentada en el audit trail inglés.
  - «Belén» se usa como topónimo transparente; el gentilicio hebreo queda explicado en la nota.
  - La puntuación reproduce un formato bíblico legible para lectura pública en español.
