translation:
  language: es
  text: Y los sacerdotes y los levitas que estaban en todo Israel se pusieron de parte de él[a] desde todos sus territorios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se presentaron ante él» o «se pusieron de pie ante él». El hebreo puede indicar tanto comparecer físicamente delante de Roboam como ponerse de su lado; el contexto favorece la idea de alineación leal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַכֹּהֲנִים
  english_pob_choice: And the priests
  chosen_spanish: Y los sacerdotes
  alternatives_spanish:
  - Ahora los sacerdotes
  - Los sacerdotes
  lexicon: HALOT
  rationale: El hebreo lleva artículo y coordinación narrativa; «Y los sacerdotes» conserva la continuidad del relato y la referencia definida.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y los levitas
  alternatives_spanish:
  - y los levitas
  - y los levíes
  lexicon: HALOT
  rationale: «Levitas» es el equivalente normal y claro en español para la clase levítica; mantiene el paralelo con «sacerdotes».
- source_word: אֲשֶׁר בְּכָל יִשְׂרָאֵל
  english_pob_choice: who were in all Israel
  chosen_spanish: que estaban en todo Israel
  alternatives_spanish:
  - que estaban por todo Israel
  - que estaban en todo el Israel
  lexicon: HALOT
  rationale: La cláusula relativa describe ubicación amplia dentro de Israel; «en todo Israel» reproduce bien el alcance geográfico y evita una traducción demasiado literal que suene forzada.
- source_word: הִתְיַצְּבוּ
  english_pob_choice: took their stand
  chosen_spanish: se pusieron
  alternatives_spanish:
  - tomaron su posición
  - se presentaron
  - se pusieron de parte
  lexicon: HALOT
  rationale: En este contexto, el hebreo puede expresar tanto presentarse como alinearse lealmente. «Se pusieron con él» conserva la idea de tomar posición a su favor sin añadir demasiado explícitamente una paráfrasis interpretativa.
- source_word: עָלָיו
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - ante él
  - junto a él
  - a favor de él
  lexicon: HALOT
  rationale: Aunque la preposición puede admitir matices como «ante» o «a favor de», aquí la combinación con el verbo idiomático y el contexto de apoyo leal hace que «con él» sea la opción más natural y fiel.
- source_word: מִכָּל גְּבוּלָם
  english_pob_choice: from all their territories
  chosen_spanish: de todas sus regiones
  alternatives_spanish:
  - de todos sus territorios
  - de todas sus fronteras
  - de todos sus distritos
  lexicon: HALOT
  rationale: «גְּבוּל» puede significar frontera, territorio o región. En español, «regiones» comunica mejor el origen disperso de sacerdotes y levitas que «fronteras», y evita una imagen demasiado técnica de límites políticos.
theological_decisions:
- issue: Alcance de la alineación de sacerdotes y levitas con Roboam
  english_pob_reading: took their stand with him
  chosen_spanish_reading: se pusieron con él
  alternative_spanish_readings:
  - se pusieron de parte de él
  - se alinearon con él
  - tomaron partido por él
  rationale: 'El texto no exige explicitar más de lo que dice el hebreo: la idea principal es una toma de posición favorable a Roboam. La formulación elegida conserva esa tensión entre presencia física y lealtad política sin resolverla de modo excesivamente interpretativo.'
  doctrine_reference: 2 Crónicas 11:13; cf. uso idiomático de יצב con preposición de apoyo
translation_notes:
  revision_awareness: 'Se revisó el pasaje contra el texto hebreo de WLC y el rastro auditado en inglés. No se detectaron revisiones posteriores que alteraran el sentido; se mantuvo la decisión inglesa principal sobre הִתְיַצְּבוּ/עָלָיו, pero en español se optó por una frase más natural: «se pusieron con él», con nota que conserva las alternativas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Sacerdotes» y «levitas» se mantienen como términos técnicos estables.
  - La nota al pie marca la ambigüedad idiomática del hebreo sin sobrecargar el texto principal.
