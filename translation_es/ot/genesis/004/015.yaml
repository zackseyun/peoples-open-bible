translation:
  language: es
  text: 'Entonces Yahvé le dijo: «Por tanto, de cualquiera que mate a Caín se tomará venganza siete veces».[a] Y Yahvé puso una marca[b] sobre Caín, para que nadie que lo encontrara[c] lo hiriera.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'será vengado siete veces'. El hebreo es una pasiva compacta; aquí se explicita que la venganza recae sobre quien mate a Caín.
    reason: lexical_alternative
  - marker: b
    text: O 'señal'. El hebreo puede referirse de manera amplia a una señal o distintivo; el texto no especifica qué forma tenía.
    reason: lexical_alternative
  - marker: c
    text: O 'quien lo hallara'. La construcción hebrea es general e indefinida; el español busca conservar ese alcance universal en esta cláusula de prevención.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el uso del proyecto para el nombre divino, manteniendo la forma propia y evitando la sustitución por un título.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: Expresa la fuerza inferencial de la respuesta divina. 'Por tanto' conserva el enlace lógico sin sonar rígido.
- source_word: כָּל הֹרֵג קַיִן
  english_pob_choice: whoever kills Cain
  chosen_spanish: cualquiera que mate a Caín
  alternatives_spanish:
  - quien mate a Caín
  - todo el que mate a Caín
  lexicon: HALOT
  rationale: La construcción hebrea es genérica e indefinida; en español, 'cualquiera que' mantiene ese alcance universal de modo natural.
- source_word: שִׁבְעָתַיִם
  english_pob_choice: sevenfold
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete veces por completo
  - septuplicadamente
  lexicon: HALOT
  rationale: En español, la forma más directa y transparente para esta medida adverbial es 'siete veces'; evita una solemnidad artificial.
- source_word: יֻקָּם
  english_pob_choice: vengeance will be taken on him
  chosen_spanish: será vengado
  alternatives_spanish:
  - se tomará venganza de él
  - recibirá venganza
  lexicon: HALOT
  rationale: El pasivo hebreo deja implícito el agente. 'Será vengado' conserva la pasiva y, en contexto, comunica que la retribución recae sobre el agresor, como en el audit trail inglés.
- source_word: א֔וֹת
  english_pob_choice: mark
  chosen_spanish: señal
  alternatives_spanish:
  - marca
  - signo
  lexicon: HALOT
  rationale: '''Señal'' es la opción más amplia y natural en español para un אֹות no especificado. Preserva la ambigüedad de la forma concreta sin forzar una imagen física concreta.'
- source_word: לְבִלְתִּי הַכּוֹת אֹתוֹ
  english_pob_choice: lest anyone finding him should strike him
  chosen_spanish: para que nadie que lo hallara lo golpeara
  alternatives_spanish:
  - para impedir que quien lo hallara lo hiriera
  - no fuera que quien lo hallara lo atacara
  lexicon: HALOT
  rationale: El infinitivo de prevención se vuelve natural con 'para que no'. 'Golpear' reproduce con mayor cercanía el valor básico de נכה, sin limitar el sentido a 'matar'.
- source_word: כָּל מֹצְאֽוֹ
  english_pob_choice: anyone finding him
  chosen_spanish: nadie que lo hallara
  alternatives_spanish:
  - cualquiera que lo hallara
  - quienquiera que lo hallara
  lexicon: HALOT
  rationale: Combinado con la cláusula negativa, 'nadie que lo hallara' expresa bien la universalidad negativa y suena idiomático en español.
theological_decisions:
- issue: Naturaleza de la protección dada a Caín
  english_pob_reading: Rendered אוֹת as 'mark' without specifying its form or meaning beyond a protective sign.
  chosen_spanish_reading: Traducir אוֹת como 'señal' sin identificar su forma ni su mecanismo.
  alternative_spanish_readings:
  - marca
  - signo
  rationale: El hebreo no define qué clase de אֹות fue. 'Señal' conserva la función protectora y deja abierta la identidad exacta, evitando especulación.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Quién recibe la venganza de siete veces
  english_pob_reading: The English makes clear that the killer of Cain is the one on whom vengeance falls.
  chosen_spanish_reading: '''Siete veces será vengado'' dentro del contexto de ''cualquiera que mate a Caín''.'
  alternative_spanish_readings:
  - '''siete veces se tomará venganza de él'''
  - '''él será vengado siete veces'''
  rationale: El pasivo hebreo puede sonar ambiguo si se traslada demasiado literalmente. La redacción elegida mantiene la pasiva pero, unida a la primera cláusula, deja claro que el juicio recae sobre el homicida.
  doctrine_reference: Translation philosophy §6 (Readable modern Spanish, not archaic or academic)
translation_notes:
  revision_awareness: La redacción sigue la última revisión del inglés POB en el final de la cláusula preventiva ('lest anyone finding him should strike him') y mantiene la ambigüedad controlada de אוֹת. También conserva la fuerza inferencial de לָכֵן con una solución idiomática en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' para no ocultar el Tetragrámaton.
  - '''Caín'' conserva la transliteración estable del nombre propio.'
  - '''Señal'' y ''golpeara'' reflejan una traducción cautelosa de la protección y de נכה, respectivamente, sin añadir especificaciones no presentes en el hebreo.'
