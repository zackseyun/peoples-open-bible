translation:
  text: And I saw that valley in which there was a great convulsion and a convulsion of waters[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great upheaval ... and an upheaval of waters.' The repeated Ge'ez term likely emphasizes violent disturbance in the valley, but the exact nuance may range from tumult to convulsion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢክዋ
  chosen: And I saw
  alternatives:
  - And I looked at it
  - And I beheld it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Narrative visionary formula from the verb 'to see'; the prefixed conjunction is retained as 'And' to preserve apocalyptic sequence.
- source_word: ለይእቲ ቈላ
  chosen: that valley
  alternatives:
  - that ravine
  - that hollow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቈላ denotes a low place or valley-like depression. 'Valley' is the most natural elevated English choice and fits the judgment landscape imagery of the context.
- source_word: እንተ ሀውከ ዓቢይ ባቲ
  chosen: in which there was a great convulsion
  alternatives:
  - where there was a great upheaval
  - in which there was great turmoil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative construction points to what was in the valley. ሀውከ conveys disturbance, tumult, or upheaval; 'convulsion' preserves the violent apocalyptic force better than the more generic 'turmoil.' ዓቢይ intensifies it as 'great.'
- source_word: ወሀውከ ማያት
  chosen: and a convulsion of waters
  alternatives:
  - and an upheaval of waters
  - and a tumult of waters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated noun should remain repeated in English to preserve the rhetorical effect. ማያት is plural 'waters,' not singular 'water,' which better suits cosmic or subterranean imagery.
