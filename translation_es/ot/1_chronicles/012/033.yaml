translation:
  language: es
  text: 'De los hijos de Isacar[a], hombres que entendían los tiempos, para saber qué debía hacer Israel: sus jefes eran doscientos[b], y todos sus hermanos estaban bajo su mando.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hombres de entendimiento de los tiempos»; el hebreo resalta un discernimiento apto para el momento histórico.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: “todos sus hermanos estaban según su boca”, un modismo que significa que estaban sujetos a su dirección o mandato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי יִשָּׂשכָר
  english_pob_choice: From the sons of Issachar
  chosen_spanish: De los hijos de Isacar
  alternatives_spanish:
  - Y de los hijos de Isacar
  - De la tribu de Isacar
  lexicon: HALOT
  rationale: מִן con בני señala procedencia dentro del listado tribal. 'Hijos de Isacar' conserva el giro hebreo y la identidad tribal; se evita 'tribu' porque añade una explicitación no requerida por el hebreo.
- source_word: יוֹדְעֵי בִינָה
  english_pob_choice: men who understood
  chosen_spanish: hombres que entendían
  alternatives_spanish:
  - hombres de entendimiento
  - los que tenían discernimiento
  - hombres entendidos
  lexicon: HALOT
  rationale: El participio con בינה expresa capacidad de discernimiento. 'Entendían' comunica de forma natural esa aptitud activa en español; 'de entendimiento' sería más literal, pero menos fluido. 'Hombres' se mantiene porque el contexto los presenta como varones de la lista militar.
- source_word: בִינָה
  english_pob_choice: understood
  chosen_spanish: entendían
  alternatives_spanish:
  - entendimiento
  - discernimiento
  - insight
  lexicon: HALOT
  rationale: La raíz apunta a comprensión/discernimiento. En español conviene integrarla al verbo 'entendían' para no volver la frase pesada, sin perder la idea de discernimiento práctico.
- source_word: לַעִתִּים
  english_pob_choice: the times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - las épocas
  - las circunstancias
  - los momentos
  lexicon: HALOT
  rationale: עִתִּים alude a tiempos señalados o al momento histórico. 'Los tiempos' sigue de cerca el hebreo y mantiene la amplitud semántica que permite el contexto.
- source_word: לָדַעַת מַה יַּעֲשֶׂה יִשְׂרָאֵל
  english_pob_choice: to know what Israel should do
  chosen_spanish: para saber qué debía hacer Israel
  alternatives_spanish:
  - para saber qué debía hacer Israel
  - para saber lo que Israel tenía que hacer
  - para conocer qué haría Israel
  lexicon: HALOT
  rationale: El infinitivo marca propósito y el imperfecto aquí expresa la acción apropiada en la situación. 'Debía hacer' refleja bien el deber práctico o la conveniencia del momento sin volverlo excesivamente moralizante.
- source_word: רָאשֵׁיהֶם מָאתַיִם
  english_pob_choice: their chiefs were two hundred
  chosen_spanish: sus jefes eran doscientos
  alternatives_spanish:
  - sus jefes sumaban doscientos
  - sus principales eran doscientos
  - sus líderes eran doscientos
  lexicon: HALOT
  rationale: רָאשִׁים puede significar jefes o líderes. 'Jefes' conserva la relación de autoridad con un registro adecuado para la lista militar; el numeral se integra de forma idiomática en español.
- source_word: וְכָל אֲחֵיהֶם
  english_pob_choice: and all their brothers
  chosen_spanish: y todos sus hermanos
  alternatives_spanish:
  - y todos sus parientes
  - y todos sus hermanos de tribu
  - y todos sus hermanos
  lexicon: HALOT
  rationale: אֲחִים puede abarcar hermanos o miembros del mismo grupo. 'Hermanos' mantiene la fuerza literal y el valor de solidaridad tribal presente en el contexto.
- source_word: עַל פִּי הֶם
  english_pob_choice: under their command
  chosen_spanish: bajo su mando
  alternatives_spanish:
  - a su mando
  - bajo su dirección
  - según su palabra
  lexicon: HALOT
  rationale: La expresión idiomática 'sobre la boca de ellos' indica estar sujeto a su palabra/autoridad. 'Bajo su mando' comunica con claridad el sentido jerárquico y militar del pasaje.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre la traducción inglesa auditada y el hebreo; se mantuvo la estructura breve del hebreo, con ajustes idiomáticos mínimos para un español natural y fiel. No se documentaron revisiones sustantivas en la pasada más reciente.
  spanish_consistency_notes:
  - Se usó 'hijos de Isacar' para conservar el idiomático tribal hebreo, coherente con el tratamiento POB de בני + nombre propio.
  - Se prefirió 'bajo su mando' para עַל פִּי הֶם, manteniendo la imagen de autoridad sin calco extraño.
  - '''Los tiempos'' preserva la amplitud semántica de עִתִּים y evita restringir innecesariamente a ''circunstancias'' o ''estaciones''.'
