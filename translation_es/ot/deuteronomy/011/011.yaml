translation:
  language: es
  text: Pero la tierra que ustedes van a cruzar para tomar posesión de ella[a] es una tierra de montañas y valles; bebe agua de la lluvia del cielo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «heredarla». El verbo hebreo puede llevar tanto la idea de posesión como de herencia en contextos de pacto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los cielos», expresión bíblica habitual para el ámbito del cielo o lo celestial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאָרֶץ
  english_pob_choice: But the land
  chosen_spanish: Pero la tierra
  alternatives_spanish:
  - Y la tierra
  - Ahora bien, la tierra
  lexicon: HALOT
  rationale: El waw inicial aquí cumple función adversativa respecto al contexto anterior; «Pero» comunica mejor el contraste que un simple «Y». «Tierra» mantiene el sustantivo base de forma natural en español.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: a la que
  alternatives_spanish:
  - que
  - la cual
  lexicon: HALOT
  rationale: En español, la relativa con preposición («a la que») expresa con claridad el movimiento dirigido hacia la tierra sin sonar forzada.
- source_word: עֹבְרִים שָׁמָּה
  english_pob_choice: you are crossing over
  chosen_spanish: ustedes pasan
  alternatives_spanish:
  - ustedes están cruzando
  - ustedes van pasando
  lexicon: HALOT
  rationale: El participio con valor de movimiento inminente/actual se traduce de manera natural como «pasan»; la dirección ya queda implícita por «a la que». Se evita calcar «cruzando sobre» porque en español resultaría áspero.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para tomar posesión de ella[a]
  alternatives_spanish:
  - para poseerla
  - para heredarla
  lexicon: HALOT
  rationale: Se conserva la idea de adquisición efectiva de la tierra. «Tomar posesión» es más idiomático y permite reflejar la nota de la POB sobre el campo semántico de herencia sin perder la fuerza de ocupación/posesión. La nota[a] preserva la alternativa léxica «heredar».
- source_word: אֶרֶץ הָרִים וּבְקָעֹת
  english_pob_choice: a land of mountains and valleys
  chosen_spanish: tierra de montes y de valles
  alternatives_spanish:
  - tierra de montañas y valles
  - tierra de montes y quebradas
  lexicon: HALOT
  rationale: «Montes y valles» es una pareja natural en español y refleja bien el contraste topográfico del hebreo. «Montañas» sería posible, pero «montes» conserva una amplitud semántica más cercana al original en este contexto.
- source_word: לִמְטַר הַשָּׁמַיִם
  english_pob_choice: from the rain of heaven
  chosen_spanish: de la lluvia de los cielos[b]
  alternatives_spanish:
  - de la lluvia del cielo
  - por la lluvia del cielo
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea plural «los cielos», tal como la POB señala en nota, porque forma parte del lenguaje bíblico convencional y conserva el color del original. «De la lluvia» expresa el medio del que el terreno recibe agua.
- source_word: תִּשְׁתֶּה מָּיִם
  english_pob_choice: it drinks water
  chosen_spanish: beberá agua
  alternatives_spanish:
  - bebe agua
  - tomará agua
  lexicon: HALOT
  rationale: Se conserva la metáfora de personificación del suelo que «bebe» agua, pero en español la forma verbal futura («beberá») encaja mejor con el flujo de la frase y con la imagen de provisión continua. No se neutraliza la metáfora en un pasivo impersonal.
theological_decisions:
- issue: Expresión «los cielos» frente a «el cielo»
  english_pob_reading: Hebrew 'the heavens,' a standard biblical expression for the sky/heavenly realm.
  chosen_spanish_reading: «los cielos»
  alternative_spanish_readings:
  - «el cielo»
  - «los cielos» con nota
  rationale: La POB documenta que el hebreo usa una expresión plural convencional. En español, «los cielos» conserva mejor esa marca bíblica y evita reducir prematuramente la imagen a un singular más natural pero menos transparente.
  doctrine_reference: No doctrinal issue; lexical-theological register of biblical cosmology
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del testimonio inglés, que prefiere «heaven» en una expresión idiomática; en español se optó por mantener la forma bíblica plural «los cielos» porque es la correspondencia más transparente del hebreo y ya está documentada en la auditoría. Se preservó además la personificación «beberá agua» para no aplanar la imagen del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el Tetragrámaton aparezca explícitamente; este verso no lo contiene.
  - Se usó «montes y valles» en estilo bíblico claro y natural, sin reemplazarlo por una paráfrasis explicativa.
  - La metáfora de la tierra que bebe agua se conservó como imagen verbal, evitando un giro pasivo más abstracto.
  - La nota de alternativa léxica se asignó solo a la palabra o expresión con tensión semántica documentada.
