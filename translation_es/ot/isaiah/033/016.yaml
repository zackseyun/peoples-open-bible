review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: el justo habita en lo alto, tiene refugio seguro, recibe pan y cuenta con agua fiable. Sin embargo, hay dos desajustes menores con el rastro auditado: la nota [a] está anclada a «alturas» cuando la alternativa documentada corresponde a מִשְׂגַּבּוֹ («su refugio/fortaleza»), y «sus aguas» suena menos natural en español que «su agua» para מֵימָיו, donde el hebreo plural suele funcionar como nombre de masa.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad y precisión editorial. «Él habitará en las alturas» funciona bien. «Fortalezas rocosas serán su refugio» también es adecuado. «Su pan le será dado» es aceptable, aunque ligeramente más natural que «le será dado» sigue siendo bíblico y claro. El punto principal a reparar es «sus aguas serán seguras», que en español resulta algo rígido; «su agua será segura» o «su agua no faltará» suena mejor. Además, la nota [a] debe moverse al sintagma «su refugio».
  glossary_alignment: No hay conflicto con los términos teológicos del proyecto. No aparecen Yahvé/Mesías ni otros lemas sensibles. Las decisiones léxicas principales concuerdan con el POB inglés, salvo que para מֵימָיו conviene priorizar el español idiomático «su agua» sobre un plural demasiado literal.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «alturas», pero la alternativa documentada corresponde a «su refugio»/מִשְׂגַּבּוֹ.
    rationale: El POB inglés pone la nota a la elección de «his refuge», con alternativa «his stronghold». En español, «su baluarte» no es alternativa de «alturas», sino de «su refugio».
  - severity: medium
    issue: «Sus aguas serán seguras» es poco natural en español en este contexto.
    rationale: Aunque מֵימָיו es formalmente plural, en español bíblico y general «agua» funciona mejor como nombre de masa. «Su agua será segura» preserva el sentido de provisión fiable sin sonar forzado.
  - severity: low
    issue: La explicación léxica de מֵימָיו defiende un plural demasiado literal.
    rationale: El propio rastro inglés justifica el singular idiomático; conviene alinear el razonamiento español con esa práctica para mejor legibilidad.
  revised_spanish_text: Él habitará en las alturas; fortalezas rocosas serán su refugio[a]; su pan le será dado, su agua será segura[b].
  revised_footnotes:
  - marker: a
    text: O «su baluarte»; el hebreo denota un lugar seguro y elevado de protección.
    reason: lexical_alternative
  - marker: b
    text: O «su agua no faltará».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [a] para que corresponda al término hebreo מִשְׂגַּבּוֹ, tal como en la auditoría inglesa. También se sustituye «sus aguas» por «su agua» para lograr un español más natural y acorde con el uso de «agua» como nombre de masa, manteniendo intacto el sentido de provisión segura. El resto del versículo puede conservarse.
