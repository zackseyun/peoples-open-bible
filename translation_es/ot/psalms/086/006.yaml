review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: dos imperativos paralelos dirigidos a Yahvé, «mi oración» para תְּפִלָּתִי, y «la voz de mis súplicas» para בְּקוֹל תַּחֲנוּנוֹתָי. También mantiene correctamente el nombre divino como «Yahvé». La principal desviación está en «mis súplicas por misericordia», que añade una preposición menos idiomática en español para expresar la fuerza lexical de תַּחֲנוּנוֹת; «mis súplicas de misericordia» o mejor «mis ruegos por misericordia» sería más natural, y el inglés auditado preserva «pleas for mercy» como explicación semántica, no necesariamente como construcción rígida a imitar en español.'
  spanish_quality_summary: '«Inclina tu oído, Yahvé, a mi oración» es digno, claro y muy natural para registro bíblico. «y escucha la voz de mis súplicas por misericordia» se entiende, pero suena algo forzado; en español eclesial y general fluye mejor «la voz de mis ruegos por misericordia» o «la voz de mis súplicas de misericordia». Además, la nota actual dice «Hebreo: “mis súplicas”», pero la nota inglesa explica que el hebreo literal es ‘my supplications’ frente a la traducción interpretativa ‘pleas for mercy’; por eso la nota española debe aclarar que el hebreo dice simplemente «mis súplicas» y que la mención de misericordia explicita el sentido.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; no hay problemas doctrinales. La elección «Inclina tu oído» corresponde bien a הַאֲזִינָה. La mejora necesaria es más de idiomaticidad española y precisión de la nota léxica que de glosario.'
  issues:
  - severity: medium
    issue: «mis súplicas por misericordia» suena poco idiomático en español
    rationale: Aunque comunica bien la idea de תַּחֲנוּנוֹת, la construcción con «súplicas por misericordia» es menos natural que «ruegos por misericordia». «Ruegos» expresa mejor la petición concreta por favor/misericordia en español corriente y eclesial.
  - severity: medium
    issue: La nota al pie no refleja con suficiente precisión la relación entre el hebreo literal y la expansión semántica de la traducción
    rationale: La nota inglesa aclara que el hebreo es literalmente «my supplications» y que la traducción explicita el sentido como ruegos por misericordia. La nota española actual puede leerse como si la traducción principal ya fuera literal, cuando en realidad incorpora una explicación semántica.
  revised_spanish_text: Inclina tu oído[a], Yahvé, a mi oración, y escucha la voz de mis ruegos por misericordia.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «mis súplicas»; es decir, ruegos fervientes por misericordia.'
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad al hebreo y al audit trail inglés, pero se mejora la naturalidad del español cambiando «súplicas por misericordia» por «ruegos por misericordia». También se ajusta la nota para que distinga mejor entre el hebreo literal («mis súplicas») y la explicitación semántica en español.
