translation:
  language: es
  text: Un rico habla[a], y muchos lo apoyan; hasta sus palabras feas son embellecidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego difiere de manera sustancial: «Un rico, cuando es sacudido, es sostenido por amigos; pero un humilde, cuando cae, es rechazado incluso por amigos». El testimonio hebreo aquí, en cambio, subraya cómo las palabras de un rico reciben una acogida favorable.'
    reason: alternative_reading
lexical_decisions:
- source_word: עָשִׁיר
  english_pob_choice: a rich man
  chosen_spanish: un rico
  alternatives_spanish:
  - un hombre rico
  - el rico
  lexicon: HALOT
  rationale: El hebreo presenta un singular representativo. En español, «un rico» conserva la referencia proverbial y mantiene la concisión natural del original, sin añadir más de lo que el texto exige.
- source_word: מְדַבֵּר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - pronuncia palabras
  lexicon: HALOT
  rationale: El presente simple funciona bien en el estilo proverbial y expresa de forma natural la acción de hablar sin sobrecargar el verso.
- source_word: וְעוֹזְרָיו רַבִּים
  english_pob_choice: and many are his supporters
  chosen_spanish: y muchos son sus apoyos
  alternatives_spanish:
  - y muchos lo ayudan
  - y sus ayudantes son muchos
  - y muchos son sus partidarios
  lexicon: HALOT
  rationale: La frase hebrea apunta a personas que le favorecen o lo respaldan socialmente. «Apoyos» conserva ese matiz relacional y evita reducirlo solo a ayuda material.
- source_word: דְבָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - lo que dice
  - su habla
  lexicon: HALOT
  rationale: La forma plural concreta del hebreo se refleja con «sus palabras», manteniendo el foco en lo que él dice.
- source_word: מְכוֹעֲרִין
  english_pob_choice: ugly
  chosen_spanish: feas
  alternatives_spanish:
  - desagradables
  - repulsivas
  - deshonrosas
  lexicon: HALOT
  rationale: «Feas» comunica el valor evaluativo y conserva el contraste con «embellecidas». Es una opción directa y comprensible en español.
- source_word: מְיוּפִּין
  english_pob_choice: are made beautiful
  chosen_spanish: son embellecidas
  alternatives_spanish:
  - son hechas bellas
  - son presentadas como hermosas
  - son adornadas
  lexicon: HALOT
  rationale: El pasivo/causativo indica que otros las tratan o presentan de modo favorable. «Son embellecidas» mantiene la ironía del texto y sugiere esa revaloración externa.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: The Hebrew witness here instead emphasizes how a rich man's speech is favorably received.
  chosen_spanish_reading: El verso español sigue el hebreo conservado, centrado en cómo se reciben favorablemente sus palabras.
  alternative_spanish_readings:
  - 'El griego dice: «Un rico, cuando es sacudido, es sostenido por amigos; pero un humilde, cuando cae, es rechazado incluso por amigos».'
  - Podría armonizarse con el paralelo griego, pero no se adopta aquí.
  rationale: La evidencia principal para este versículo en el paquete es el hebreo de Kahana; el griego sirve como control paralelo y muestra una tradición distinta. La traducción española debe reflejar la lectura hebrea base sin borrar la tensión textual documentada.
  doctrine_reference: Crítica textual y transmisión de Ben Sira
translation_notes:
  revision_awareness: 'El audit trail inglés no requiere cambios de fondo: mantiene la lectura hebrea base y conserva la nota sobre la divergencia sustancial con el griego. La versión española reproduce esa decisión textual y no intenta armonizar ambos testigos en el cuerpo principal.'
  spanish_consistency_notes:
  - Se mantiene «rico» como sustantivo representativo, en paralelo con el inglés POB.
  - Se conserva el contraste evaluativo entre «feas» y «embellecidas» para reflejar la ironía del hebreo.
  - La nota al pie marca explícitamente la alternativa griega sin desplazar la lectura hebrea principal.
