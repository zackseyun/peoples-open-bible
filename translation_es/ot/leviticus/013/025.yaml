revisions:
- from: Y el sacerdote lo examinará[a], y he aquí, el cabello en la mancha blanca se ha vuelto blanco y su apariencia es más profunda que la piel; es una enfermedad de la piel[b] que ha brotado en la quemadura; y el sacerdote lo declarará impuro. Es una lesión de enfermedad de la piel[b].
  to: Y el sacerdote la examinará, y he aquí, el cabello en la mancha blanca se ha vuelto blanco y su apariencia es más profunda que la piel; es una enfermedad de la piel[a] que ha brotado en la cicatriz de la quemadura; y el sacerdote lo declarará impuro. Es una lesión de enfermedad de la piel[a].
  rationale: Se corrigió la concordancia con el objeto femenino de «examinar» para reflejar אֹתָהּ; se precisó מִכְוָה como «cicatriz de la quemadura» según la evidencia léxica; y se simplificó el aparato de notas dejando solo la nota realmente necesaria sobre tsaraʿat. Se conservó «enfermedad de la piel» en el texto principal por cautela teológica y legibilidad, aunque la revisión inglesa final use «leprous disease».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:00:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura diagnóstica del hebreo: examen sacerdotal, señal visible del pelo vuelto blanco, apariencia más profunda que la piel, brote en la zona de la quemadura y veredicto de impureza. Sin embargo, hay dos desajustes principales con la evidencia fuente y la auditoría inglesa: (1) el objeto femenino אֹתָהּ se refiere a la lesión/afección, no a una persona, por lo que «lo examinará» debe ajustarse a «la examinará»; (2) מִכְוָה apunta mejor a una cicatriz o marca de quemadura que a «quemadura» sin más. También conviene evitar la repetición menos natural «lesión de enfermedad de la piel».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta algunos giros mejorables para naturalidad y precisión: «la examinará» concuerda mejor con el referente femenino; «cicatriz de la quemadura» expresa con más exactitud el estado del tejido descrito; y «una lesión de tsaraʿat» suena más natural y más cerca del hebreo que «una lesión de enfermedad de la piel». «He aquí» es aceptable en registro bíblico y no necesita cambio.'
  glossary_alignment: No aparecen términos del glosario mayor como Yahvé, Mesías o δοῦλος. El punto terminológico relevante es צָרַעַת. Aunque la revisión inglesa final usó «leprous disease», la documentación léxica y teológica insiste en evitar la identificación médica estrecha con «lepra». En español, mantener «enfermedad de la piel» en el cuerpo y explicar tsaraʿat en nota es defendible. Aun así, para la frase final נֶגַע צָרַעַת, la forma más fiel y compacta en español es «una lesión de tsaraʿat» con nota, en vez de la construcción más pesada «lesión de enfermedad de la piel».
  issues:
  - severity: medium
    issue: Discordancia del pronombre objeto en «lo examinará».
    rationale: El hebreo אֹתָהּ es femenino singular y retoma la lesión/afección visible, no al varón. En español debe decirse «la examinará» para preservar la referencia correcta.
  - severity: medium
    issue: «Quemadura» es menos preciso que «cicatriz de la quemadura» para מִכְוָה.
    rationale: La evidencia fuente y la decisión léxica inglesa indican el sitio o resultado de la quemadura, no meramente el evento de quemarse. «Cicatriz de la quemadura» expresa mejor el sentido contextual.
  - severity: low
    issue: La frase «lesión de enfermedad de la piel» suena pesada y menos natural.
    rationale: Aunque intenta conservar el constructo נֶגַע צָרַעַת, en español resulta más claro «una lesión de tsaraʿat» con nota explicativa, o similar. Así se mantiene fidelidad y mejor legibilidad.
  - severity: low
    issue: La nota a sobre «examinará» no aporta una alternativa significativa preservada por la auditoría.
    rationale: La nota inglesa para este versículo está anclada a tsaraʿat, no a ראה. No es incorrecta, pero no es necesaria. Puede omitirse para reducir ruido.
  revised_spanish_text: Y el sacerdote la examinará, y he aquí, el cabello en la mancha blanca se ha vuelto blanco y su apariencia es más profunda que la piel; es una enfermedad de la piel[a] que ha brotado en la cicatriz de la quemadura; y el sacerdote lo declarará impuro. Es una lesión de enfermedad de la piel[a].
  revised_footnotes:
  - marker: a
    text: Hebreo tsaraʿat, un término amplio para una afección grave de la piel; tradicionalmente se ha traducido «lepra».
    reason: lexical_alternative
