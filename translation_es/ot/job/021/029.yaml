translation:
  language: es
  text: ¿No les han preguntado a los que viajan por el camino[a], y no reconocen sus señales[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los viajeros» o «los que pasan por el camino».
    reason: lexical_alternative
  - marker: b
    text: O «sus signos» o «sus marcas»; la frase probablemente se refiere a las evidencias o indicios conocidos por los relatos de viajeros.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Have you not
  chosen_spanish: ¿No han... ?
  alternatives_spanish:
  - ¿Acaso no... ?
  - ¿No es cierto que... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera acuerdo o corrección; en español, empezar con «¿No han...?» conserva ese tono interpelativo sin volverlo una afirmación plana.
- source_word: שְׁאֶלְתֶּם
  english_pob_choice: asked
  chosen_spanish: han preguntado
  alternatives_spanish:
  - han preguntado a
  - han inquirido de
  - han consultado a
  lexicon: HALOT
  rationale: El verbo expresa preguntar o inquirir. «Han preguntado» es natural en español moderno y mantiene la apelación directa a un testimonio común.
- source_word: עֹבְרֵי דָרֶךְ
  english_pob_choice: those who travel the road
  chosen_spanish: los que viajan por el camino
  alternatives_spanish:
  - los viajeros
  - los que pasan por el camino
  - los caminantes
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «los que pasan de/por el camino». «Los que viajan por el camino» conserva el sentido participial y la imagen de personas con experiencia del trayecto.
- source_word: וְאֹתֹתָם
  english_pob_choice: their signs
  chosen_spanish: sus señales
  alternatives_spanish:
  - sus signos
  - sus marcas
  - sus testimonios
  lexicon: HALOT
  rationale: אֹת suele significar «señal» o «signo». En contexto, Job apela a indicios conocidos por el relato de los viajeros; «señales» mantiene el valor léxico sin forzar una interpretación más libre como «testimonios».
- source_word: לֹא תְנַכֵּרוּ
  english_pob_choice: do you not recognize
  chosen_spanish: no reconocen
  alternatives_spanish:
  - no discernen
  - no identifican
  - no advierten
  lexicon: HALOT
  rationale: El pi‘el de נכר aquí apunta a reconocer o discernir. «No reconocen» reproduce bien la idea de no identificar las señales a partir del testimonio de los viajeros.
translation_notes:
  revision_awareness: El texto hebreo usa un singular en דָרֶךְ («camino») y un plural verbal en la segunda mitad; la versión española conserva el singular con «el camino» y mantiene la pregunta retórica. El audit trail inglés también fue revisado de «roads» a «the road», confirmado aquí en singular.
  spanish_consistency_notes:
  - Se mantuvo «camino» en singular para reflejar דָרֶךְ y evitar una pluralización no sustentada por el hebreo.
  - Se prefirió «señales» para אֹתֹתָם porque es transparente en español y conserva la posibilidad de un sentido más amplio que «signos» sin perder el vínculo léxico.
  - Se conservó el tono interrogativo-retórico de la línea hebrea mediante la estructura inicial «¿No han...?»; no se suavizó a una afirmación.
  - No se introdujo terminología eclesiástica adicional; el verso habla de viajeros y señales, no requiere vocabulario doctrinal especializado.
