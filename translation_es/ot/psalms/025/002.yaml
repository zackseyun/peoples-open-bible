review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura hebrea y la lógica de la súplica: vocativo «Dios mío», confianza presente «en ti confío», doble petición negativa, y referencia correcta a los enemigos. Sin embargo, en dos puntos no preserva del todo la mejor fuerza semántica documentada por el expediente POB: (1) אֵבוֹשָׁה se inclinó en inglés hacia deshonra pública («be put to shame»), mientras que «me avergüence» favorece más la vergüenza interna; (2) «se regocijen sobre mí» suena poco natural en español para el gozo hostil de יַעַלְצוּ לִי.'
  spanish_quality_summary: El texto es comprensible y digno, pero requiere pulido para sonar natural en español eclesial contemporáneo. «No permitas que me avergüence» es gramaticalmente posible, aunque menos claro que «sea avergonzado»/«quede avergonzado» en este contexto de vindicación. «Se regocijen sobre mí» es un calco poco idiomático; «triunfen sobre mí» o «se regocijen por mi caída» serían más naturales. Dado el expediente POB, «triunfen sobre mí» funciona bien en el texto principal, dejando la nota para conservar «se regocijen»/«exulten».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Dios» está bien para אֱלֹהַי. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal cuestión es de matiz léxico: conviene alinear mejor אֵבוֹשָׁה con la decisión POB de deshonra pública, y expresar יַעַלְצוּ en español idiomático sin perder el gozo hostil.'
  issues:
  - severity: medium
    issue: «no permitas que me avergüence» atenúa la fuerza de deshonra pública de אֵבוֹשָׁה
    rationale: El expediente inglés eligió «do not let me be put to shame» por el contexto de vindicación ante enemigos. En español, «me avergüence» suele oírse más como vergüenza subjetiva que como humillación pública.
  - severity: medium
    issue: «se regocijen sobre mí» es poco idiomático en español
    rationale: Aunque intenta reflejar «exult over me», la combinación suena calcada. Para lectura natural y clara, «triunfen sobre mí» en el texto principal funciona mejor, con nota que preserve las alternativas de regocijo/exultación hostil.
  - severity: low
    issue: La nota [a] no aporta una alternativa real útil al lector
    rationale: La nota dice «O ‘Dios mío’» cuando ese mismo texto ya aparece en el cuerpo principal. No conserva una alternativa significativa; si se mantiene una nota, debería recoger «Oh, Dios mío», pero no es necesaria.
  revised_spanish_text: Dios mío, en ti confío; no permitas que sea avergonzado[a]; no permitas que mis enemigos triunfen sobre mí[b].
  revised_footnotes:
