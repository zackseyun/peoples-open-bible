translation:
  language: es
  text: Porque era un linaje[a] maldito desde el principio, y, sin tener deferencia hacia nadie por las cosas en que pecaron[b], no les concediste perdón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "semilla", "descendencia" o "estirpe": el griego dice literalmente "semilla", usado en sentido figurado para una línea o un pueblo.'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula también puede traducirse: "ni por deferencia hacia nadie les concediste inmunidad por las cosas en que pecaron".'
    reason: alternative_reading
lexical_decisions:
- source_word: σπέρμα
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - linaje
  - estirpe
  lexicon: LSJ
  rationale: En este contexto, σπέρμα funciona de manera figurada para un pueblo o línea humana, no para semilla literal. En español, 'descendencia' comunica bien la referencia colectiva sin sonar tan extraño como 'semilla' y mantiene el valor genealógico del término.
- source_word: κατηραμένον
  english_pob_choice: accursed
  chosen_spanish: maldita
  alternatives_spanish:
  - maldicha
  - maldecida
  - maldita bajo maldición
  lexicon: LSJ
  rationale: El participio indica estar bajo maldición. 'Maldita' reproduce el tono solemne y la carga judicial del pasaje en un español natural.
- source_word: ἀπʼ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: LSJ
  rationale: La frase temporal es directa; 'desde el principio' es la forma más natural y transparente en español bíblico actual.
- source_word: εὐλαβούμενός τινα
  english_pob_choice: not fearing anyone
  chosen_spanish: sin respetar a nadie
  alternatives_spanish:
  - sin temer a nadie
  - sin tener en cuenta a nadie
  - sin deferencia hacia nadie
  lexicon: LSJ
  rationale: El participio puede expresar temor, cautela, reverencia o deferencia. Dado el complemento τινα ('a nadie') y el marco judicial, la idea es que no hubo consideración deferente hacia ninguna persona al juzgar. 'Sin respetar a nadie' preserva esa fuerza relacional en español, aunque 'sin temer a nadie' sigue siendo una alternativa posible.
- source_word: ἄδειαν
  english_pob_choice: pardon
  chosen_spanish: perdón
  alternatives_spanish:
  - indulto
  - exención
  - imunidad
  lexicon: LSJ
  rationale: En este contexto forense, ἄδεια señala exención del castigo debido. 'Perdón' comunica con claridad la negativa a conceder esa dispensa, aunque 'indulto' o 'exención' podrían ser alternativas más técnicas.
- source_word: ἐδίδους
  english_pob_choice: you granted
  chosen_spanish: concediste
  alternatives_spanish:
  - dabas
  - otorgaste
  - les diste
  lexicon: LSJ
  rationale: El imperfecto describe una acción caracterizada en el pasado; en español, el pretérito simple suena más natural y mantiene la idea de una negativa efectiva a conceder perdón.
- source_word: ἐφʼ οἷς ἥμαρταν
  english_pob_choice: because of the things in which they sinned
  chosen_spanish: por las cosas en que pecaron
  alternatives_spanish:
  - a causa de las cosas en que pecaron
  - por las faltas que cometieron
  - respecto de las cosas en que pecaron
  lexicon: LSJ
  rationale: La frase es idiomática y apunta a las materias en que pecaron como base de la negativa. 'Por las cosas en que pecaron' sigue de cerca el griego y sigue siendo comprensible en español.
theological_decisions:
- issue: Si σπέρμα debe explicarse como un pueblo o mantenerse metafórico en el texto principal
  english_pob_reading: Retain the metaphor 'seed' without adding an interpretive identifier in the main text.
  chosen_spanish_reading: Mantener una expresión colectiva natural ('descendencia') sin añadir una identificación interpretativa en el texto principal.
  alternative_spanish_readings:
  - semilla
  - linaje maldito
  - estirpe maldita
  rationale: El griego usa una metáfora genealógica para un grupo humano. En español, 'descendencia' preserva la referencia colectiva y evita una metáfora demasiado opaca para lectores generales, sin sobreinterpretar más allá del versículo.
  doctrine_reference: 'Translation philosophy: original-language primacy; no paraphrase beyond what the source warrants.'
- issue: Cómo reflejar la relación entre el participio εὐλαβούμενός y el juicio negativo final
  english_pob_reading: not fearing anyone because of the things in which they sinned
  chosen_spanish_reading: sin respetar a nadie por las cosas en que pecaron
  alternative_spanish_readings:
  - sin temer a nadie por las cosas en que pecaron
  - sin tener deferencia hacia nadie por las cosas en que pecaron
  - no concediste perdón, sin mirar a nadie
  rationale: La revisión inglesa destaca que el participio expresa temor o deferencia, no una simple frase adverbial autónoma. En español, 'sin respetar a nadie' conserva la idea de no mostrar deferencia hacia persona alguna en el acto judicial.
  doctrine_reference: Source-language primacy and auditable rendering of participial structure.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final del inglés POB, que ajustó la segunda cláusula para reflejar más de cerca εὐλαβούμενός y la estructura negativa de ἄδειαν ἐδίδους. Por eso el español evita convertir el participio en una simple causa adverbial y mantiene la negación explícita: ''sin respetar a nadie... no les concediste perdón''.'
  spanish_consistency_notes:
  - YHWH no aparece en este versículo; no aplica la convención 'Yahvé'.
  - Se evitó 'Cristo/Mesías' porque no corresponde al texto.
  - '''Perdón'' se usa aquí en sentido forense de exención de castigo, no en sentido devocional general.'
  - La metáfora colectiva de σπέρμα se conservó con una equivalente natural en español, sin añadir el referente contextual en el cuerpo principal.
