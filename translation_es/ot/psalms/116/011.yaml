translation:
  language: es
  text: Yo dije en mi alarma[a], «Todo hombre[b] es mentiroso».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en mi prisa». El hebreo puede denotar prisa, agitación, alarma o pánico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «toda la humanidad es falsa». El hebreo dice literalmente «todo hombre», usando אָדָם en sentido colectivo genérico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - —
  lexicon: HALOT
  rationale: El pronombre de primera persona singular se mantiene para reproducir el énfasis del hebreo; en español, «Yo» al inicio conserva ese relieve sin sonar forzado.
- source_word: אָמַרְתִּי
  english_pob_choice: said
  chosen_spanish: dije
  alternatives_spanish:
  - declaré
  - afirmé
  lexicon: HALOT
  rationale: El verbo normal de habla en primera persona encaja con el tono reflexivo del salmo; «dije» es el equivalente más natural y fiel.
- source_word: בְחָפְזִי
  english_pob_choice: in my alarm
  chosen_spanish: en mi alarm[a]
  alternatives_spanish:
  - en mi prisa
  - en mi angustia
  - en mi pánico
  lexicon: HALOT
  rationale: El campo semántico incluye prisa, agitación y alarma. Aquí el contexto favorece la idea de agitación interna; se preserva la ambigüedad del hebreo con una nota. La forma base en español es «alarma», tomada en sentido de conmoción o sobresalto.
- source_word: כָּל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todos
  lexicon: HALOT
  rationale: Con el sustantivo colectivo singular siguiente, «Todo hombre» refleja bien el alcance universal y evita una formulación menos idiomática en español.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - humanidad
  - ser humano
  - persona
  lexicon: HALOT
  rationale: Se conserva el singular genérico del hebreo. «Hombre» mantiene la forma proverbial y la fuerza literal del original, como en la decisión inglesa documentada.
- source_word: כֹּזֵב
  english_pob_choice: is a liar
  chosen_spanish: es mentiroso
  alternatives_spanish:
  - miente
  - es falso
  - es un mentiroso
  lexicon: HALOT
  rationale: El participio expresa a quien se caracteriza por la mentira/falsedad. En español, «es mentiroso» comunica esa cualidad predicativa de modo natural y fiel; «miente» desplaza el rasgo a una acción momentánea.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantiene la lectura de una expresión de agitación interior y el valor genérico de אָדָם.
  spanish_consistency_notes:
  - Se conservó el pronombre explícito para reflejar el énfasis del hebreo.
  - Se mantuvo el singular genérico «hombre» por correspondencia con la forma hebrea y la decisión inglesa auditada.
  - Se optó por «mentiroso» para preservar el valor predicativo fuerte del participio.
  - La nota al pie marca la alternativa semántica principal de בְחָפְזִי sin resolverla de manera excesiva.
