translation:
  language: es
  text: 'Estos le nacieron en Jerusalén: Simea[b], Sobab, Natán y Salomón, cuatro de Bat-súa[a], hija de Amiel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En 2 Samuel 5:14 y en paralelos relacionados, ella es llamada Betsabé, hija de Eliam.
    reason: alternative_reading
  - marker: b
    text: El hebreo dice Simea; el paralelo en 2 Samuel 5:14 tiene Samúa.
    reason: textual_variant
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Ahora estos
  - Y estos
  lexicon: HALOT
  rationale: El demostrativo introduce el siguiente grupo en la genealogía. «Estos» conserva la función deíctica sin añadir matiz temporal innecesario.
- source_word: נוּלְּדוּ לוֹ
  english_pob_choice: were born to him
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron para él
  - fueron nacidos a él
  lexicon: HALOT
  rationale: La pasiva hebrea comunica nacimiento como hecho recibido; en español, «le nacieron» reproduce de forma natural la relación de pertenencia sin explicitar de más al sujeto contextual.
- source_word: בִּירוּשָׁלָיִם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Equivalente locativo directo y transparente.
- source_word: שִׁמְעָא
  english_pob_choice: Shimea
  chosen_spanish: Simea
  alternatives_spanish:
  - Shimea
  - Shammua
  lexicon: HALOT
  rationale: Se traslada el nombre propio según su forma hebrea presente en Crónicas; «Simea» mantiene cercanía fonética y evita armonizar con el paralelo de Samuel, donde aparece otra forma.
- source_word: שׁוֹבָב
  english_pob_choice: Shobab
  chosen_spanish: Sobab
  alternatives_spanish:
  - Shobab
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración castellana sobria y legible.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Nathan
  lexicon: HALOT
  rationale: Forma española habitual del nombre propio, con tilde según la prosodia castellana.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Shelomoh
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y plenamente inteligible del nombre del rey.
- source_word: אַרְבָּעָה
  english_pob_choice: four
  chosen_spanish: cuatro
  lexicon: HALOT
  rationale: Numeral resumitivo que recoge a los cuatro hijos nombrados.
- source_word: לְבַת שׁוּעַ
  english_pob_choice: by Bath-shua
  chosen_spanish: de Bat-súa
  alternatives_spanish:
  - por Bat-súa
  - a Bat-súa
  lexicon: HALOT
  rationale: En este contexto genealógico, la preposición expresa maternidad/origen; «de» resulta natural en español para indicar filiación sin forzar una paráfrasis.
- source_word: בַּת עַמִּיאֵל
  english_pob_choice: daughter of Ammiel
  chosen_spanish: hija de Amiel
  lexicon: HALOT
  rationale: Expresión filial directa y transparente. Se mantiene el nombre propio en su forma española común.
theological_decisions:
- issue: Nombre de la esposa de David en Crónicas frente al paralelo de Samuel
  english_pob_reading: Bath-shua daughter of Ammiel
  chosen_spanish_reading: Bat-súa, hija de Amiel
  alternative_spanish_readings:
  - Betsabé, hija de Eliam
  rationale: El texto hebreo de Crónicas presenta la forma Bath-shua/Bat-súa y la identifica como hija de Amiel. No se armoniza el versículo con el paralelo de 2 Samuel; la referencia alternativa se conserva solo como posibilidad reconocible para el lector.
  doctrine_reference: Primacía del texto original sobre la tradición de armonización
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo de Crónicas sin armonizarlo con 2 Samuel. Se conserva la nota de variante para el nombre de Simea/Shammúa y la identificación alternativa de Bat-súa/Betsabé, tal como refleja el expediente inglés.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como forma por defecto en la obra, pero este versículo no contiene el Tetragrámaton.
  - Se evita «Cristo» porque no aparece ningún término mesiánico en el versículo.
  - «Le nacieron» mantiene la relación pasiva/posesiva del hebreo sin introducir un sujeto explícito.
  - Los nombres propios se ofrecen en grafía española cuando existe forma asentada y legible.
