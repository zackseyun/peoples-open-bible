lexical_decisions:
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: HALOT
  rationale: עַם designa aquí un colectivo pactal. En español, «pueblo» conserva mejor ese sentido comunitario y bíblico que «nación», que puede sonar más político o estatal.
- source_word: זוּ
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - ese
  - aquel
  lexicon: HALOT
  rationale: El demostrativo señala de manera próxima al pueblo mencionado. «Este» reproduce mejor esa deixis que «ese» o «aquel».
- source_word: יָצַרְתִּי
  english_pob_choice: I formed
  chosen_spanish: formé
  alternatives_spanish:
  - moldeé
  - hice
  - creé
  lexicon: HALOT
  rationale: יצר expresa formar o modelar con intención. «Formé» conserva esa imagen de diseño deliberado sin sobrecargar el español con un calco.
- source_word: לִי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - como mío
  lexicon: HALOT
  rationale: La forma simple «para mí» expresa de manera natural la finalidad y pertenencia implicadas por ל con sufijo de primera persona. «Para mí mismo» sería más enfático, pero menos natural aquí.
- source_word: תְּהִלָּתִי
  english_pob_choice: my praise
  chosen_spanish: mi alabanza
  alternatives_spanish:
  - mi elogio
  - la alabanza que me corresponde
  - mi fama
  lexicon: HALOT
  rationale: 'תְּהִלָּה normalmente significa alabanza. «Mi alabanza» sería muy literal, pero en español puede sonar ambiguo; «mi alabanza» y «alabanza para mí» se cruzan semánticamente. Se eligió «mi alabanza»? Wait need consistent. Actually chosen_spanish must be publication-readable. Let''s use «mi alabanza». Rationale: preserves direct correspondence and allows the verb to clarify direction. Alternatives note ambiguity.'
- source_word: יְסַפֵּרוּ
  english_pob_choice: they will declare
  chosen_spanish: anunciarán
  alternatives_spanish:
  - declararán
  - contarán
  - proclamarán
  lexicon: HALOT
  rationale: ספר en piel puede significar contar, relatar o declarar. «Anunciarán» suena natural en español bíblico y transmite la idea pública y verbal del verbo sin perder solemnidad.
theological_decisions:
- issue: Relación entre la formación del pueblo y la declaración de la alabanza
  english_pob_reading: 'Render the sequence as purpose/result: ''they will declare my praise'''
  chosen_spanish_reading: 'Mantener la secuencia como resultado natural: «ellos anunciarán mi alabanza».'
  alternative_spanish_readings:
  - «para que anuncien mi alabanza»
  - «de modo que anuncien mi alabanza»
  - «y anunciarán mi alabanza»
  rationale: El hebreo presenta la formación divina del pueblo seguida por su misión de proclamar la alabanza de Dios. El español puede reflejar esa relación sin añadir explícitamente una conjunción de finalidad ausente del texto, preservando a la vez la fuerza teleológica del contexto.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense without paraphrastic expansion.'
translation_notes:
  revision_awareness: Se tomó en cuenta el control de revisión más reciente, que indicó concordancia alta y ningún cambio necesario; por eso se conservó la lectura básica del audit trail inglés, ajustándola al español con un verbo más idiomático.
  spanish_consistency_notes:
  - Se mantuvo «pueblo» para עַם, en armonía con el uso bíblico colectivo.
  - Se evitó «SEÑOR» o una sustitución litúrgica, porque el versículo no contiene el tetragrámaton.
  - «Alabanza» conserva el campo semántico de תְּהִלָּה mejor que opciones más libres como «gloria» o «fama».
  - La frase verbal se dejó en futuro simple para conservar el valor declarativo/profético del hebreo.
