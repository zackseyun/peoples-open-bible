revisions:
- from: ¡Cómo se ha oscurecido el oro[a], cómo se ha cambiado el oro puro! Las piedras santas[b] se derraman al comienzo de todas las calles.
  to: ¡Cómo se ha oscurecido el oro, cómo ha cambiado el oro fino! Las piedras santas[a] son derramadas en la cabeza[b] de cada calle.
  rationale: Se corrige el verbo «se ha cambiado» a «ha cambiado» para reflejar con naturalidad el estado alterado del oro fino. Se ajusta «oro puro» a «oro fino» para alinearse mejor con la decisión léxica del POB inglés para הַכֶּתֶם הַטּוֹב. Se reemplaza «al comienzo de todas las calles» por «en la cabeza de cada calle» para preservar mejor la imagen hebrea de בְּרֹאשׁ y el distributivo, añadiendo una nota explicativa como en el inglés. Se elimina la nota redundante sobre «se ha oscurecido» y se conservan solo las notas realmente justificadas por la ambigüedad léxica y cultural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:42:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura de lamento y la mayor parte del sentido del hebreo: la pérdida de brillo del oro, el cambio del oro fino y el derramamiento de las piedras santas. Sin embargo, hay dos desajustes relevantes frente a la evidencia fuente y al rastro POB inglés: (1) «se ha cambiado» para יִשְׁנֶא suena impropio en español y sugiere una acción transitiva o reflexiva extraña, mientras que el hebreo describe estado alterado; (2) «al comienzo de todas las calles» debilita el distributivo singular de כָּל חוּצוֹת y no preserva tan bien la imagen espacial de בְּרֹאשׁ como «en la cabeza de cada calle» o una opción idiomática equivalente. También la nota [a] está mal anclada/contenida: no aporta una alternativa preservada por el inglés, sino que repite la traducción escogida.'
  spanish_quality_summary: El texto es generalmente legible y digno, pero «cómo se ha cambiado el oro puro» no suena natural en español bíblico contemporáneo; «cómo ha cambiado el oro fino» es mucho más claro. Además, «al comienzo de todas las calles» es comprensible pero algo plano; «en la cabeza de cada calle» preserva mejor la metáfora hebrea, con nota aclaratoria para esquinas/entradas. «Las piedras santas» es aceptable y fiel. Conviene eliminar la nota [a] por redundante e innecesaria.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Oro», «piedras santas» y el mantenimiento de la ambigüedad teológica están alineados con el POB. La revisión propuesta también respeta la decisión inglesa de mantener «holy stones» literalmente y de notar el sentido de בְּרֹאשׁ sin resolverlo por completo.
  issues:
  - severity: medium
    issue: «se ha cambiado» para יִשְׁנֶא
    rationale: El hebreo expresa que el oro fino ha cambiado/ha sido alterado en su estado o apariencia. «Se ha cambiado» en español resulta poco idiomático y puede sonar como si alguien lo hubiera sustituido. «Ha cambiado» o «se ha alterado» refleja mejor el sentido.
  - severity: medium
    issue: «al comienzo de todas las calles» para בְּרֹאשׁ כָּל חוּצוֹת
    rationale: La expresión no preserva bien el hebraísmo «en la cabeza de» ni el distributivo «cada calle» presente en el POB inglés. Una formulación más fiel es «en la cabeza de cada calle», acompañada de nota aclaratoria sobre esquinas o entradas.
  - severity: low
    issue: Nota [a] redundante y mal justificada
    rationale: La nota repite prácticamente la misma idea que la traducción principal y no corresponde a una alternativa significativa preservada por el POB inglés. Debe eliminarse para no sobrecargar el texto.
