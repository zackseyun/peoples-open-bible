revisions:
- from: Sobre el candelabro puro arreglará las lámparas delante de Yahvé continuamente.
  to: Sobre el candelabro puro dispondrá las lámparas delante de Yahvé continuamente.
  rationale: 'Se sustituye «arreglará» por «dispondrá» para reflejar con más precisión el valor de יַעֲרֹךְ en contexto sacerdotal: ordenar o colocar en debida disposición. El resto del texto puede mantenerse, pues es fiel al hebreo, al uso terminológico del proyecto y a la legibilidad en español.'
  reviewer_model: gpt-5.4
