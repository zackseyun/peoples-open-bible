translation:
  language: es
  text: Así pues, su súplica ascendía al cielo continuamente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su súplica subía fervientemente al cielo». El adverbio griego ἐκτενῶς puede destacar intensidad («fervientemente») o extensión/duración («continuamente»).
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτων
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de estas personas
  lexicon: LSJ
  rationale: El genitivo demostrativo remite al grupo mencionado antes; en español, el posesivo 'su' expresa de modo natural esa referencia colectiva sin añadir palabras innecesarias.
- source_word: λιτανία
  english_pob_choice: supplication
  chosen_spanish: súplica
  alternatives_spanish:
  - ruego
  - petición
  - oración
  lexicon: LSJ
  rationale: '''Súplica'' conserva el matiz de petición urgente y humilde mejor que el más general ''oración''. Se ajusta bien al sentido de ''supplication'' del POB inglés.'
- source_word: ἐκτενῶς
  english_pob_choice: earnest
  chosen_spanish: ferviente
  alternatives_spanish:
  - insistente
  - ardiente
  - con intensidad
  lexicon: LSJ
  rationale: El adverbio puede señalar intensidad o extensión. En español, 'ferviente' comunica con naturalidad la intensidad devocional que el contexto exige, sin forzar la frase.
- source_word: ἀνέβαινεν
  english_pob_choice: was ascending
  chosen_spanish: iba subiendo
  alternatives_spanish:
  - ascendía
  - subía
  - iba ascendiendo
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua; 'iba subiendo' preserva esa progresividad de manera natural en español y evita una simple acción puntual.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo de Dios
  - a los cielos
  lexicon: LSJ
  rationale: Aunque el POB inglés usa 'heaven', en español bíblico 'cielo' puede expresar ese destino vertical y trascendente de forma clara y digna. El contexto de oración sostiene el sentido sin necesidad de ampliar.
- source_word: μὲν οὖν
  english_pob_choice: So then
  chosen_spanish: Así pues
  alternatives_spanish:
  - por tanto
  - entonces
  - así que
  lexicon: LSJ
  rationale: La combinación enlaza y continúa el discurso; 'Así pues' reproduce esa transición con naturalidad y un tono sobrio.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que prefirió un registro más formal ('ascending') y una lectura continua de ἐκτενῶς ('continually'). En español, esa continuidad se ha mantenido con 'iba subiendo' y 'ferviente', evitando el calco innecesario y conservando el movimiento durativo de la oración hacia el cielo.
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico moderno y sobrio, sin recurrir a fórmulas eclesiásticas arcaizantes.
  - No se introdujo 'Yahvé' ni terminología cristológica, porque el versículo no contiene esos elementos.
  - '''Súplica'' se eligió por coherencia con el valor petitionario destacado por el audit trail inglés.'
