translation:
  language: es
  text: En el tercer año del reinado de Jehoiakim, rey de Judá, Nabucodonosor[b], rey de Babilonia, vino a Jerusalén y la sitió[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «le puso sitio».
    reason: lexical_alternative
  - marker: b
    text: La forma española tradicional del nombre es «Nabucodonosor»; en algunas tradiciones aparece «Nebucodonosor» o «Nebucadrezar» en otros pasajes.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַ֣ת שָׁל֔וֹשׁ
  english_pob_choice: In the third year of
  chosen_spanish: En el tercer año de
  alternatives_spanish:
  - Durante el tercer año de
  - En el año tres de
  lexicon: HALOT
  rationale: La fórmula cronológica regnal en español natural pide 'En el tercer año de', preservando el valor temporal y el orden formal del hebreo sin sonar forzado.
- source_word: לְ/מַלְכ֖וּת
  english_pob_choice: of the reign of
  chosen_spanish: del reinado de
  alternatives_spanish:
  - de la realeza de
  - del gobierno de
  lexicon: HALOT
  rationale: Aquí מַלְכוּת se refiere al período de reinado; 'reinado' es la equivalencia más precisa y idiomática en español para una datación histórica.
- source_word: יְהוֹיָקִ֣ים מֶֽלֶךְ יְהוּדָ֑ה
  english_pob_choice: Jehoiakim king of Judah
  chosen_spanish: Jehoiakim, rey de Judá
  alternatives_spanish:
  - Jehoiakim, el rey de Judá
  - Jehoiaquim, rey de Judá
  lexicon: Nombres propios / uso bíblico estándar
  rationale: Se conserva la transliteración usual 'Jehoiakim' por coherencia bíblica en español, y el título en aposición se expresa naturalmente con comas.
- source_word: בָּ֣א
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: HALOT
  rationale: El verbo בוא permite 'vino' en español con naturalidad y cercanía al hebreo, sin añadir una nota interpretativa de movimiento militar que no está explícita en el verbo.
- source_word: נְבוּכַדְנֶאצַּ֧ר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  - Nabucodonosor
  lexicon: Tradición bíblica en español
  rationale: '''Nabucodonosor'' es la forma asentada en español bíblico y corresponde al mismo nombre propio del original; se evita una transliteración más extraña para el lector.'
- source_word: מֶֽלֶךְ בָּבֶ֛ל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - el rey de Babilonia
  lexicon: HALOT
  rationale: El título en aposición se mantiene de manera directa y natural en español, igual que en la relación 'rey de Judá'.
- source_word: יְרוּשָׁלִַ֖ם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Nombres propios / uso bíblico estándar
  rationale: Se usa la forma española tradicional y plenamente inteligible del topónimo.
- source_word: וַ/יָּ֥צַר עָלֶֽי/הָ
  english_pob_choice: and besieged it
  chosen_spanish: y la sitió[a]
  alternatives_spanish:
  - y la puso sitio[a]
  - y puso sitio contra ella[a]
  - y la cercó[a]
  lexicon: HALOT
  rationale: El verbo צור con על en contexto militar significa 'sitió' / 'asedió'. 'La sitió' es conciso y fiel; conserva la acción militar sin diluirla.
theological_decisions:
- issue: Titulación real y datación histórica en relación con el marco de Judá y Babilonia
  english_pob_reading: The verse states a regnal date under Jehoiakim and narrates Nebuchadnezzar’s hostile advance on Jerusalem.
  chosen_spanish_reading: El versículo presenta una datación del reinado de Jehoiakim y la acción hostil de Nabucodonosor contra Jerusalén.
  alternative_spanish_readings:
  - 'El texto podría leerse con mayor explicitud política: ''durante el reinado de...'''
  - podría reforzarse el matiz militar con 'asedió' en lugar de 'sitió'
  rationale: No hay desarrollo doctrinal; la decisión mantiene el marco histórico-teológico del libro sin sobreinterpretar. Se conserva el carácter de invasión y juicio histórico con un verbo militar exacto.
  doctrine_reference: Daniel 1:1; providencia divina en la historia (marco narrativo del libro, sin comentario doctrinal explícito en el versículo).
- issue: Nombre divino ausente en el versículo
  english_pob_reading: No divine name appears in the verse; the POB audit trail contains no theological note.
  chosen_spanish_reading: No se introduce ningún término teológico adicional donde el hebreo no lo tiene.
  alternative_spanish_readings:
  - No añadir notas teológicas.
  - No sustituir nombres propios por títulos religiosos.
  rationale: Se evita agregar contenido interpretativo. La fidelidad exige no introducir referencias a Yahvé o a juicios explícitos que el versículo no formula.
  doctrine_reference: Principio de sobriedad textual / no-expansión.
translation_notes:
  revision_awareness: El texto base en inglés y la auditoría muestran acuerdo alto y no registran revisiones aplicadas. La propuesta española sigue de cerca el hebreo y mantiene las mismas decisiones léxicas principales del POB inglés, adaptadas a un español natural y publicable.
  spanish_consistency_notes:
  - 'Se mantiene la aposición con comas: ''Jehoiakim, rey de Judá; Nabucodonosor, rey de Babilonia''.'
  - Se usa 'Jerusalén' como topónimo estándar en español bíblico.
  - Se conserva la distinción de acción militar con 'la sitió', y la nota ofrece la alternativa 'la asedió'.
  - No se introduce 'SEÑOR' ni un equivalente por el nombre divino, porque el versículo no contiene el Tetragrámaton ni una referencia explícita a Dios.
