review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: mantiene la pregunta retórica, conserva «corazón» y «manos», usa «Yahvé», y refleja correctamente la certeza de «he hablado, y lo haré». Sin embargo, dos elecciones debilitan la alineación fina con el texto fuente y con el razonamiento auditado: «se fortalecerán tus manos» sugiere volverse más fuertes, cuando el hebreo pregunta si seguirán siendo fuertes; y «yo te trato» suena poco natural y demasiado abierto en español para un contexto de juicio, donde conviene una formulación idiomática como «yo tome medidas contra ti» o «yo actúe contra ti», con nota para preservar la amplitud.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «yo te trato» resulta poco idiomático en este contexto y puede sonar coloquial o ambiguo. «Se fortalecerán tus manos» también suena prospectivo/causativo más que como prueba de resistencia. Una leve revisión mejora naturalidad, precisión semántica y fuerza retórica.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» se usa correctamente; no hay conflictos con otros términos doctrinales clave. La principal cuestión es lexical, no de glosario: ajustar la expresión de las manos y la acción divina para reflejar mejor el hebreo y el audit trail inglés.'
  issues:
