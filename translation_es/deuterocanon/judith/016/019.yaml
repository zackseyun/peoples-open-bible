translation:
  language: es
  text: Y Judit dedicó a Dios todos los objetos de Holofernes que el pueblo le había dado[a], y dio a Dios, como ofrenda dedicada[b], el dosel[c] que había tomado para sí misma de su aposento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Objetos» puede entenderse también como «enseres» o «bienes»; el griego σκεύη es amplio.
    reason: lexical_alternative
  - marker: b
    text: 'También: «como ofrenda votiva» o «como algo dedicado a Dios» para ἀνάθημα.'
    reason: lexical_alternative
  - marker: c
    text: O «mosquitero» o «cortina de cama» para «dosel» (griego κωνώπιον).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέθηκεν
  english_pob_choice: dedicated
  chosen_spanish: dedicó
  alternatives_spanish:
  - ofreció
  - consagró
  - puso aparte como ofrenda votiva
  lexicon: LSJ
  rationale: El verbo expresa la acción cultual de dedicar algo a una deidad. «Dedicó» mantiene ese sentido sin convertirlo en un tecnicismo más pesado ni en un sacrificio que el texto no dice.
- source_word: σκεύη
  english_pob_choice: equipment
  chosen_spanish: objetos
  alternatives_spanish:
  - enseres
  - bienes
  - utensilios
  - pertenencias
  lexicon: LSJ
  rationale: En este contexto de despojos de Holofernes, el término es amplio. «Objetos» conserva la generalidad sin restringirlo indebidamente a utensilios domésticos o militares concretos.
- source_word: κωνώπιον
  english_pob_choice: canopy
  chosen_spanish: dosel
  alternatives_spanish:
  - mosquitero
  - cortina de cama
  - red
  lexicon: LSJ
  rationale: El griego puede designar un mosquitero o un dosel de cama. «Dosel» funciona en español digno y natural para este contexto, mientras que las alternativas quedan preservadas como opciones léxicas posibles.
- source_word: κοιτών
  english_pob_choice: bedchamber
  chosen_spanish: aposento
  alternatives_spanish:
  - alcoba
  - habitación
  - dormitorio
  lexicon: LSJ
  rationale: «Aposento» conserva un registro narrativo elevado y amplio, y evita reducir el matiz a un dormitorio moderno. El contexto de la escena hace claro que se trata del lugar de descanso.
- source_word: εἰς ἀνάθημα
  english_pob_choice: as a dedicated offering
  chosen_spanish: como ofrenda dedicada
  alternatives_spanish:
  - como ofrenda votiva
  - para dedicación
  - como regalo consagrado
  lexicon: LSJ
  rationale: La frase indica el destino del objeto como algo puesto aparte para Dios. «Como ofrenda dedicada» preserva el vínculo con el verbo anterior y la noción cultual sin introducir categorías sacrificiales ajenas al griego.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: LSJ
  rationale: El dativo marca al destinatario de la dedicación. «A Dios» es la forma más directa y natural en español.
theological_decisions:
- issue: Lenguaje cultual de dedicación sin sobrerinterpretación sacrificial
  english_pob_reading: Render Judith's action as dedicating spoils and a bed-canopy to God without importing later sacrificial categories.
  chosen_spanish_reading: Presentar la acción como una dedicación/ofrenda dedicada a Dios, sin convertirla en un sacrificio ritual desarrollado.
  alternative_spanish_readings:
  - traducir todo como «sacrificio»
  - usar únicamente «regaló a Dios»
  rationale: El texto griego usa ἀνέθηκεν y ἀνάθημα, que expresan consagración de objetos a Dios. La redacción española conserva ese valor cultual y, a la vez, evita añadir ritualidad que el pasaje no especifica.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; preservar el sentido fuente sin importar categorías doctrinales ajenas'
translation_notes:
  revision_awareness: La versión inglesa auditada refinó εἰς ἀνάθημα de «as an offering» a «as a dedicated offering». La redacción española refleja ese ajuste con «como ofrenda dedicada», manteniendo la relación entre dedicación y ofrenda. También se preservó la ambigüedad útil de κωνώπιον mediante «dosel», con nota alternativa para «mosquitero» o «cortina de cama».
  spanish_consistency_notes:
  - Se mantiene «Dios» para τῷ θεῷ, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el versículo usa θεῷ, no κύριος.
  - Se conserva el tono narrativo formal con léxico moderno pero digno.
  - 'La secuencia verbal sigue de cerca el griego: dedicó / dio, sin forzar paralelismos ajenos.'
