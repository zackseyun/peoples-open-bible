revisions:
- from: Un hombre de mal ojo se apresura tras las riquezas[a], y no sabe que la pobreza vendrá sobre él.
  to: Un hombre de ojo maligno se apresura tras las riquezas[a], y no sabe que la pobreza vendrá sobre él.
  rationale: Se reemplaza «de mal ojo» por «de ojo maligno» para conservar el modismo fuente sin activar en español la asociación habitual con el «mal de ojo». También se ajusta la glosa de la nota a «mezquina», que refleja mejor el sentido de begrudging/selfish que «rencorosa».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:22:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: un hombre caracterizado por רַע עָיִן se apresura hacia la riqueza y no percibe que le vendrá carencia/pobreza. También conserva apropiadamente la nota que explica el modismo.'
  spanish_quality_summary: La redacción es clara y digna, pero «de mal ojo» en español suele evocar el concepto folklórico del mal de ojo y no transmite naturalmente el modismo hebreo de tacañería/codicia. Conviene ajustar la frase principal para preservar la imagen del ojo sin introducir una lectura engañosa. El resto fluye bien.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión clave es רַע עָיִן: mejor «de ojo maligno» que «de mal ojo», porque mantiene el idiomático «evil eye» sin activar tan fuertemente la noción hispana de hechizo o maleficio. La nota explicativa sigue siendo adecuada.'
  issues:
  - severity: medium
    issue: «de mal ojo» suena engañoso en español
    rationale: Aunque es un calco cercano al inglés y al hebreo, en español común «mal de ojo/mal ojo» se asocia fácilmente con superstición o brujería. Aquí el hebreo describe una disposición egoísta, tacaña o codiciosa, no una capacidad maléfica. «De ojo maligno» conserva la metáfora del ojo con menos riesgo de falsa interpretación.
  revised_spanish_text: Un hombre de ojo maligno se apresura tras las riquezas[a], y no sabe que la pobreza vendrá sobre él.
  revised_footnotes:
  - marker: a
    text: O «avaro» o «codicioso»; literalmente, «un hombre de ojo maligno», un modismo hebreo para una disposición egoísta y mezquina.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «de mal ojo» por «de ojo maligno» para conservar el modismo fuente sin activar en español la asociación habitual con el «mal de ojo». También se ajusta la glosa de la nota a «mezquina», que refleja mejor el sentido de begrudging/selfish que «rencorosa».
