translation:
  language: es
  text: El nombre de la esposa de Amram era Jocabed[a], la hija de Leví, que le nació a Leví en Egipto. Ella le dio a Amram a Aarón y a Moisés[b], y a Miriam, la hermana de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «la hija de Leví». En contextos genealógicos, «hija» puede funcionar de manera más amplia para una descendiente femenina.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «a quien dio a luz para Leví en Egipto», con la madre implícita en la construcción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  english_pob_choice: The name
  chosen_spanish: El nombre
  alternatives_spanish:
  - Y el nombre
  - Ahora bien, el nombre
  lexicon: HALOT
  rationale: La fórmula introductoria se vierte de manera natural en español con artículo definido, preservando la función de encabezamiento genealógico sin añadir una conjunción inicial pesada.
- source_word: אֵשֶׁת עַמְרָם
  english_pob_choice: of Amram’s wife
  chosen_spanish: de la esposa de Amram
  alternatives_spanish:
  - de la mujer de Amram
  - de la esposa de Amram
  lexicon: HALOT
  rationale: El hebreo expresa una cadena posesiva; en español, 'esposa' comunica mejor el vínculo marital que una traducción más literal pero menos idiomática como 'mujer'.
- source_word: יוֹכֶבֶד
  english_pob_choice: Jochebed
  chosen_spanish: Jocabed
  alternatives_spanish:
  - Jochebed
  lexicon: Convención onomástica española
  rationale: Se usa la forma española tradicional y reconocible del nombre propio, manteniendo la identificación con la forma hebrea sin transliteración anglicada.
- source_word: בַּת לֵוִי
  english_pob_choice: the daughter of Levi
  chosen_spanish: la hija de Leví
  alternatives_spanish:
  - una hija de Leví
  - descendiente de Leví
  lexicon: HALOT
  rationale: Se conserva la lectura literal 'hija de Leví' porque el texto hebreo la formula así; no se resuelve en el cuerpo principal como 'descendiente' aunque el uso genealógico permita esa posibilidad.
- source_word: אֲשֶׁר יָלְדָה אֹתָהּ לְלֵוִי בְּמִצְרָיִם
  english_pob_choice: who was born to Levi in Egypt
  chosen_spanish: que fue dada a luz a Leví en Egipto
  alternatives_spanish:
  - a quien dio a luz para Leví en Egipto
  - que nació de Leví en Egipto
  lexicon: HALOT
  rationale: El hebreo deja implícita a la madre y usa una construcción con el objeto femenino; el español puede reflejar el pasivo para no introducir un sujeto no explícito. Se mantiene la tensión genealógica sin armonizarla.
- source_word: וַתֵּלֶד לְעַמְרָם
  english_pob_choice: She bore to Amram
  chosen_spanish: Ella dio a luz a Amram
  alternatives_spanish:
  - Ella dio a luz para Amram
  - Ella engendró para Amram
  lexicon: HALOT
  rationale: El verbo ילד con ל marca relación conyugal/familiar; en español 'dio a luz a' transmite el hecho del parto de modo claro y digno. La preposición 'a' conserva la dirección del nacimiento sin forzar un calco.
- source_word: אֶת אַהֲרֹן וְאֶת מֹשֶׁה
  english_pob_choice: Aaron and Moses
  chosen_spanish: a Aarón y a Moisés
  alternatives_spanish:
  - Aarón y Moisés
  lexicon: Nombres propios bíblicos
  rationale: Se conservan los nombres en su forma española habitual y se mantienen las preposiciones de objeto directo por claridad narrativa y sintáctica.
- source_word: וְאֵת מִרְיָם אֲחֹתָם
  english_pob_choice: and Miriam their sister
  chosen_spanish: y a Miriam, su hermana
  alternatives_spanish:
  - y Miriam, su hermana
  - y a Miriam, la hermana de ellos
  lexicon: HALOT
  rationale: Se preserva la aposición del hebreo ('Miriam, su hermana') en un orden natural para el español. El pronombre posesivo resume el sufijo plural de tercera persona.
theological_decisions:
- issue: Genealogical force of 'daughter of Levi' / posible tensión histórica
  english_pob_reading: Retain the literal phrase 'the daughter of Levi' in the main text without harmonizing it to 'descendant.'
  chosen_spanish_reading: Mantener 'la hija de Leví' en el texto principal sin convertirla en 'descendiente'.
  alternative_spanish_readings:
  - descendiente de Leví
  - una descendiente de Leví
  rationale: La forma hebrea merece permanecer visible para no borrar la tensión genealógica que el texto presenta. La nota puede explicar el uso genealógico amplio, pero el cuerpo del versículo no debe suavizarlo.
  doctrine_reference: Principios de transparencia textual y fidelidad al source text
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el expediente auditado en inglés, pero adapta la sintaxis al español para evitar calcos innecesarios. Se conserva la tensión genealógica de «la hija de Leví» y la ambigüedad del segundo miembro con una nota, en paralelo con la edición inglesa revisada que mantuvo el registro genealógico formal.
  spanish_consistency_notes:
  - Se usa 'Leví' para el patriarca, 'Aarón', 'Moisés' y 'Miriam' con las formas españolas habituales.
  - Se eligió 'dio a luz' como equivalente de ילד en el contexto de parto; 'engendró' se evitó por cambio de sujeto y registro menos natural.
  - Se mantuvo 'hija de Leví' en el texto principal para reflejar la literalidad del hebreo y la decisión documental del POB inglés.
