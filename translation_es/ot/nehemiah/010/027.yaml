lexical_decisions:
- source_word: וַ/אֲחִיָּה
  english_pob_choice: and Ahijah
  chosen_spanish: y Ahías
  alternatives_spanish:
  - y Ahijá
  - y Ahíah
  lexicon: nombre propio hebreo אֲחִיָּה
  rationale: Se conserva la función conjuntiva de וַ como 'y' en una lista de nombres. Para el nombre propio, se usa la transliteración española natural 'Ahías', que mantiene la forma reconocible del hebreo sin forzar una traducción del significado.
- source_word: חָנָן
  english_pob_choice: Hanan
  chosen_spanish: Hanan
  alternatives_spanish:
  - Janán
  lexicon: nombre propio hebreo חָנָן
  rationale: Se translitera el nombre propio de manera directa. 'Hanan' es la forma breve y legible en español, y evita introducir una pronunciación hispana no necesaria en una simple lista de nombres.
- source_word: עָנָן
  english_pob_choice: Anan
  chosen_spanish: Anán
  alternatives_spanish:
  - Anan
  lexicon: nombre propio hebreo עָנָן
  rationale: Se conserva el nombre propio como transliteración, con acento gráfico para orientar la lectura española. La forma 'Anán' mantiene la brevedad del nombre y su paralelo con la tradición inglesa 'Anan'.
translation_notes:
  revision_awareness: El contexto hebreo y la auditoría inglesa muestran un verso compuesto solo por una secuencia de nombres propios con la conjunción inicial; no hay variantes textuales, tensiones teológicas ni decisiones léxicas adicionales que resolver. La traducción española sigue ese mismo perfil de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo la estructura nominal simple del hebreo sin añadir artículos ni verbalización.
  - Se prefirió 'y' para la conjunción lista, conforme al valor de וַ en esta secuencia.
  - Los nombres propios se presentaron en una forma española natural y reconocible, sin glosas de significado.
