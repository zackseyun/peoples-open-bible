review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte la secuencia narrativa hebrea y mantiene bien el milagro como restauración real a la vida. Sin embargo, falla en un punto crítico de alineación con la fuente: אֱלִישָׁע es Eliseo, no Elías. El texto hebreo, el inglés POB y el contexto canónico concuerdan en ''Elisha/Eliseo''. También conviene ajustar la nota c, porque el rastro de auditoría inglés registra que ''went and'' fue retirado del texto principal por no representarse finalmente en la traducción inglesa, aunque sí puede mencionarse como literal hebrea; en español debe formularse sin crear confusión.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'banda de asalto' suena menos natural y menos preciso en contexto bíblico que 'banda de salteadores' o 'banda invasora/merodeadora'. 'He aquí' es aceptable aunque algo rígido; funciona en registro bíblico. 'Se puso de pie' es natural, pero puede fortalecerse a 'se levantó sobre sus pies' para reflejar más de cerca עַל רַגְלָיו; aun así, no es obligatorio. El problema principal de calidad es el error de nombre propio repetido y racionalizado en las notas.
  glossary_alignment: No hay términos del glosario mayor en juego salvo el nombre propio. El borrador se aparta indebidamente del paquete fuente y del POB inglés al usar 'Elías' en lugar de 'Eliseo'. 'Sepultura' para קבר es aceptable, con nota de alternativa 'tumba'.
  issues:
  - severity: high
    issue: 'Nombre propio incorrecto: ''Elías'' donde la fuente dice אֱלִישָׁע'
    rationale: אֱלִישָׁע corresponde a Eliseo, no a Elías. El inglés POB también tiene 'Elisha'. Este error altera el referente narrativo y no puede justificarse por el paquete fuente, que de hecho muestra אֱלִישָׁע.
  - severity: medium
    issue: La decisión léxica que defiende 'Elías' contradice la evidencia fuente y el contexto
    rationale: La nota de decisión teológica/lexical introduce una racionalización incorrecta que debe eliminarse o corregirse para no institucionalizar un error textual.
  - severity: low
    issue: '''Banda de asalto'' es comprensible pero menos idiomático/preciso para הַגְּדוּד en este contexto'
    rationale: El sentido es de una partida hostil de incursión; en español bíblico legible, 'banda de salteadores' comunica mejor el matiz de incursión hostil.
  - severity: low
    issue: La nota c puede expresarse con mayor precisión editorial
    rationale: Puede conservar la literalidad hebrea ('y el hombre fue y tocó...') como nota, pero conviene formularla como una observación sobre el hebreo literal, sin sugerir que el español principal deba reproducirlo.
  revised_spanish_text: Y sucedió[a] que, mientras ellos enterraban a un hombre, he aquí vieron la banda de salteadores; entonces arrojaron al hombre en la sepultura de Eliseo. Y cuando el hombre tocó los huesos de Eliseo[c][b], revivió y se puso de pie.
  revised_footnotes:
