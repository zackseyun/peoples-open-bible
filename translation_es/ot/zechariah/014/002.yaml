    text: Or, more euphemistically in some translation traditions, 'the women violated' or 'the women ravished.' The Hebrew term is blunt and refers to sexual assault.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rest of the people will not be exterminated,' if 'cut off' is taken in the stronger sense of destruction rather than removal.
    reason: alternative_reading
