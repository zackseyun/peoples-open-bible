translation:
  language: es
  text: Y los libros de la ley que encontraron, los hicieron pedazos y los quemaron con fuego.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰ βιβλία
  english_pob_choice: the books
  chosen_spanish: los libros
  alternatives_spanish:
  - los rollos
  - los volúmenes
  lexicon: LSJ
  rationale: βιβλία es el plural de βιβλίον y puede referirse de manera amplia a libros o documentos escritos. «Los libros» mantiene la transparencia del griego y es la opción más natural en español sin añadir una especificación como «rollos» que el texto no exige.
- source_word: τοῦ νόμου
  english_pob_choice: of the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - de la Ley
  - de la Torá
  lexicon: LSJ
  rationale: νόμου aquí alude a la ley judía. «De la ley» sigue de cerca la forma griega y es claro en español; «Ley» con mayúscula o «Torá» serían interpretaciones legítimas, pero menos directas respecto del texto base.
- source_word: ἃ εὗρον
  english_pob_choice: that they found
  chosen_spanish: que encontraron
  alternatives_spanish:
  - los cuales encontraron
  - que hallaron
  lexicon: LSJ
  rationale: La relativa con εὗρον significa simplemente «que encontraron». «Que encontraron» es idiomático en español y conserva el valor de hallazgo sin sobrecargarlo.
- source_word: κατασχίσαντες
  english_pob_choice: they tore to pieces
  chosen_spanish: los hicieron pedazos
  alternatives_spanish:
  - los rasgaron
  - los despedazaron
  lexicon: LSJ
  rationale: El participio expresa una acción violenta de romper o desgarrar. «Los hicieron pedazos» comunica con claridad esa destrucción en español natural y reproduce el énfasis de destrucción total que el inglés auditado destacó con «tore to pieces».
- source_word: ἐνεπύρισαν πυρί
  english_pob_choice: burned with fire
  chosen_spanish: los quemaron con fuego
  alternatives_spanish:
  - los incendiaron
  - los arrojaron al fuego
  lexicon: LSJ
  rationale: El verbo indica quemar o prender fuego, y el dativo πυρί refuerza la imagen de fuego. «Los quemaron con fuego» conserva esa redundancia enfática del griego de forma transparente en español.
theological_decisions:
- issue: νόμος como referencia a la ley judía/Torá sin explicitarla en el texto principal
  english_pob_reading: of the law
  chosen_spanish_reading: de la ley
  alternative_spanish_readings:
  - de la Ley
  - de la Torá
  rationale: El contexto histórico deja claro que se trata de la ley judía. Sin embargo, el griego no añade una glosa interpretativa; por eso se conserva «de la ley» en el texto principal y se deja la identificación específica al contexto.
  doctrine_reference: Torá / ley mosaica
- issue: 'Acción doble de destrucción: romper y quemar'
  english_pob_reading: they tore to pieces and burned with fire
  chosen_spanish_reading: los hicieron pedazos y los quemaron con fuego
  alternative_spanish_readings:
  - los rasgaron y los quemaron con fuego
  - los despedazaron y los quemaron con fuego
  rationale: El griego une un participio de ruptura con la acción de quemar. La traducción mantiene ambas acciones como actos consecutivos y distintos para no diluir la violencia del pasaje.
  doctrine_reference: Narrativa histórica de persecución y profanación
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Swete 1909 y es coherente con el audit trail inglés, que opta por equivalentes naturales sin añadir matices interpretativos no presentes en el texto fuente. No se detectan revisiones pendientes ni tensiones textuales en este versículo.
  spanish_consistency_notes:
  - Se mantiene «ley» en minúscula para reflejar el griego sin imponer una señalización doctrinal adicional.
  - «Quemaron con fuego» conserva la fuerza enfática del original, aunque en español resulte parcialmente redundante, porque esa redundancia está también en la formulación griega y en el audit trail inglés.
  - Se evita «rollos» porque el griego usa βιβλία, un término más general que no obliga a visualizar específicamente pergaminos.
