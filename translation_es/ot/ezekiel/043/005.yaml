  rationale: Se corrige el aspecto verbal de «llenaba» a «llenó» para reflejar mejor el sentido resultativo/completivo del hebreo y la decisión documentada en la POB inglesa. También se reubica la marca [b] para que ancle correctamente la nota lexical a «la casa».
