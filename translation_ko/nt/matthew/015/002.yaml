id: MAT.15.2
reference: Matthew 15:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Διὰ τί οἱ μαθηταί σου παραβαίνουσιν τὴν παράδοσιν τῶν πρεσβυτέρων; οὐ γὰρ νίπτονται τὰς χεῖρας ⸀αὐτῶν ὅταν ἄρτον ἐσθίωσιν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/002.yaml
  text: 'Why do your disciples break the tradition of the elders? For they do not wash their hands when they eat bread[a][b].'
translation:
  language: ko
  text: '「당신의 제자들은 어찌하여 장로들의 전통을 어깁니까? 그들이 빵을 먹을 때 손을 씻지 않습니다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 즉 「장로들의 전통」이 요구하는 정결 의식으로서의 손 씻기를 가리키며, 단순한 위생의 문제가 아니다.
    reason: cultural_note
  - marker: b
    text: 또는 「식사할 때」. 헬라어 「빵(ἄρτος)」은 음식 일반을 가리키기도 한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραβαίνουσιν
  english_pob_choice: break
  chosen_korean: 어깁니까
  alternatives_korean:
  - 범합니까
  - 위반합니까
  lexicon: BDAG
  rationale: 명령·전통을 넘어서 위반한다는 뜻. 「어기다」는 자연스러운 현대 한국어이며 법규·관습 모두에 통한다.
- source_word: παράδοσιν τῶν πρεσβυτέρων
  english_pob_choice: tradition of the elders
  chosen_korean: 장로들의 전통
  alternatives_korean:
  - 장로들의 유전
  lexicon: BDAG
  rationale: 권위 있게 전수된 유대 선조들의 가르침. 「유전」은 전통적 한국어 성경 어휘이나 현대 합쇼체에서는 「전통」이 더 명료하다.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_korean: 빵
  alternatives_korean:
  - 음식
  - 떡
  lexicon: BDAG
  rationale: 헬라어 본문은 문자적으로 「빵」이다. 음식 일반의 의미로 환유될 수 있으나, 원어 우선 원칙에 따라 「빵」을 본문에 두고 각주로 대안을 둔다.
