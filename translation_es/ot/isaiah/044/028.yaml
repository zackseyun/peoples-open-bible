translation:
  language: es
  text: 'que dice de Ciro[a]: «Él es mi pastor, y cumplirá todo mi propósito», y que dice de Jerusalén[b]: «Será reconstruida», y del templo[c]: «Se echarán sus cimientos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Ciro»; la preposición hebrea puede entenderse como introduciendo a la persona de quien se habla o a la persona a quien se dirige la palabra.
    reason: lexical_alternative
  - marker: b
    text: O «Ella será reconstruida». El hebreo usa un verbo femenino singular con «Jerusalén», permitiendo la personificación de la ciudad.
    reason: lexical_alternative
  - marker: c
    text: O «será fundado» o «será establecido». El verbo hebreo se refiere a poner o echar un fundamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמֵר
  english_pob_choice: who says
  chosen_spanish: que dice
  alternatives_spanish:
  - el que dice
  - quien dice
  lexicon: HALOT
  rationale: El participio articular funciona como cláusula relativa; «que dice» suena natural en español y conserva la referencia continua al sujeto implícito sin añadir interpretaciones.
- source_word: לְכוֹרֶשׁ
  english_pob_choice: of Cyrus
  chosen_spanish: acerca de Ciro
  alternatives_spanish:
  - a Ciro
  - de Ciro
  - con respecto a Ciro
  lexicon: HALOT
  rationale: La preposición ל con אמר puede introducir tanto al destinatario como al referente. Dado el contexto de la declaración divina sobre Ciro, «acerca de» preserva la ambigüedad documentada sin forzar un solo valor.
- source_word: רֹעִי
  english_pob_choice: my shepherd
  chosen_spanish: mi pastor
  alternatives_spanish:
  - mi pastor-régulo
  - mi pastor-gobernante
  lexicon: HALOT
  rationale: Se mantiene la metáfora pastoral aplicada a Ciro. En español, «pastor» comunica mejor la imagen que un equivalente explicativo, y conserva la tensión teológica de que Dios use a un rey extranjero como instrumento suyo.
- source_word: וְכָל חֶפְצִי
  english_pob_choice: all my purpose
  chosen_spanish: todo lo que quiero
  alternatives_spanish:
  - todo mi propósito
  - todo mi deseo
  - todo lo que me deleita
  lexicon: HALOT
  rationale: חפץ aquí expresa voluntad/intención divina. «Todo lo que quiero» es una forma idiomática que mantiene el sentido de voluntad eficaz sin sonar arcaica ni desplazar el matiz hacia mero agrado emocional.
- source_word: יַשְׁלִם
  english_pob_choice: he will fulfill
  chosen_spanish: cumplirá
  alternatives_spanish:
  - lo llevará a cabo
  - lo completará
  - lo realizará
  lexicon: HALOT
  rationale: El hiphil de שלם implica llevar a término o hacer que se cumpla. «Cumplirá» funciona bien con el objeto implícito en español y conserva el valor de ejecución completa.
- source_word: לִירוּשָׁלַם תִּבָּנֶה
  english_pob_choice: She will be rebuilt
  chosen_spanish: Será reconstruida
  alternatives_spanish:
  - Será edificada
  - Se reconstruirá
  lexicon: HALOT
  rationale: El hebreo usa verbo femenino singular con Jerusalén; en español se prefiere la forma impersonal pasiva para evitar una personificación forzada, aunque se conserva la referencia a la ciudad.
- source_word: וְהֵיכָל
  english_pob_choice: and of the temple
  chosen_spanish: y del templo
  alternatives_spanish:
  - y del santuario
  - y del palacio-templo
  lexicon: HALOT
  rationale: En este contexto היכל remite al edificio del templo. «Templo» es la opción clara y contextual en español.
- source_word: תִּוָּסֵד
  english_pob_choice: Its foundation will be laid
  chosen_spanish: Se echarán sus cimientos
  alternatives_spanish:
  - será fundada
  - será establecido su fundamento
  lexicon: HALOT
  rationale: El nifal de יסד alude a poner cimiento o fundar. «Se echarán sus cimientos» expresa con naturalidad la imagen arquitectónica del hebreo y evita una traducción demasiado abstracta.
theological_decisions:
- issue: Metáfora de «mi pastor» aplicada a Ciro
  english_pob_reading: 'Retain the metaphor directly: ''He is my shepherd'''
  chosen_spanish_reading: 'Mantener la metáfora: «Él es mi pastor»'
  alternative_spanish_readings:
  - Él es mi gobernante designado
  - Él es mi instrumento
  rationale: 'La traducción conserva la tensión teológica del texto: Yahvé llama «pastor» a un rey pagano sin convertirlo en Mesías ni suavizar el alcance de la metáfora. Así se respeta el auditable del original y la lectura POB.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Jerusalén personificada como femenina singular
  english_pob_reading: She will be rebuilt
  chosen_spanish_reading: Será reconstruida
  alternative_spanish_readings:
  - Ella será reconstruida
  - Será edificada
  rationale: El hebreo permite la personificación femenina de Jerusalén. En español, la pasiva refleja mantiene la referencia sin introducir un «ella» que suene recargado o ambiguo en la prosa bíblica.
  doctrine_reference: 'Syntax and discourse: personification preserved without over-explicit pronoun'
- issue: «Se echarán sus cimientos» para el templo
  english_pob_reading: Its foundation will be laid
  chosen_spanish_reading: Se echarán sus cimientos
  alternative_spanish_readings:
  - Serán puestos sus cimientos
  - Será fundada
  rationale: La opción conserva el sentido arquitectónico concreto del verbo hebreo y deja abierta la relación entre templo y fundación sin espiritualizarla. No se borra la imagen material del texto.
  doctrine_reference: Lexical force of יסד in foundational building contexts
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que ajustó la segunda cláusula a un paralelo más formal («and who says of Jerusalem») sin cambiar contenido léxico. La versión española reproduce ese paralelismo con «y que dice de Jerusalén», manteniendo la estructura repetida del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto, pero en este versículo el sujeto explícito en español se omite porque el hebreo está resumido por participio relativo y la formulación castellana fluye mejor sin añadidos.
  - «Templo» se usa para היכל conforme al uso contextual del pasaje.
  - Se conserva la ambigüedad de לְכוֹרֶשׁ con una nota, en lugar de fijar sin más «de Ciro» o «a Ciro».
