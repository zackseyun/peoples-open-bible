translation:
  language: es
  text: Y entregaste sus mujeres como botín, y sus hijas al cautiverio, y todos sus despojos para repartir entre los hijos amados por ti[a], quienes también ardieron con tu celo y aborrecieron la impureza[b] de su sangre y te invocaron pidiendo ayuda. Oh Dios, mi Dios, escúchame, a mí, la viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus hijos amados». El griego dice literalmente «hijos amados por ti».
    reason: lexical_alternative
  - marker: b
    text: La expresión «la impureza de su sangre» puede también traducirse «la contaminación de su sangre»; alude a la sangre como fuente de impureza ritual o moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: προνομὴν
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - despojo
  - presa
  lexicon: LSJ
  rationale: En contexto militar, προνομὴν nombra lo tomado en guerra. «Botín» es natural en español y conserva el valor de saqueo sin suavizarlo.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - captividad
  - prisión
  lexicon: LSJ
  rationale: La construcción εἰς αἰχμαλωσίαν expresa el resultado de ser llevadas cautivas. «Cautiverio» mantiene ese sentido de quedar bajo dominio enemigo.
- source_word: σκῦλα
  english_pob_choice: spoils
  chosen_spanish: despojos
  alternatives_spanish:
  - botín
  - presa
  lexicon: LSJ
  rationale: σκῦλα es un término militar para los bienes arrebatados en guerra. «Despojos» conserva el sentido distributivo mejor que repetir «botín».
- source_word: διαίρεσιν
  english_pob_choice: for division
  chosen_spanish: para repartir
  alternatives_spanish:
  - para división
  - para distribución
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «para división», en español «para repartir» comunica con más naturalidad la idea de apportionment sin perder el valor distributivo.
- source_word: υἱῶν ἠγαπημένων ὑπὸ σοῦ
  english_pob_choice: the sons beloved by you
  chosen_spanish: los hijos amados por ti
  alternatives_spanish:
  - los hijos amados de ti
  - tus hijos amados
  lexicon: LSJ
  rationale: Se conserva υἱῶν como «hijos» y el participio pasivo como «amados por ti». «Por ti» mantiene la agencia divina explícita; «tus hijos amados» sería una posible naturalización, pero borra un poco la forma del griego.
- source_word: ἐζήλωσαν τὸν ζῆλόν σου
  english_pob_choice: were zealous with your zeal
  chosen_spanish: fueron celosos con tu celo
  alternatives_spanish:
  - ardieron con tu celo
  - fueron zelosos de tu celo
  lexicon: LSJ
  rationale: Se preserva la repetición cognada del griego. «Celosos» aquí refleja la intensidad de dedicación/ardor sin convertirla en mero «celos» posesivo; «fueron celosos con tu celo» mantiene la tensión textual.
- source_word: ἐβδελύξαντο
  english_pob_choice: abhorred
  chosen_spanish: aborrecieron
  alternatives_spanish:
  - detestaron
  - les causó horror
  lexicon: LSJ
  rationale: Es un verbo fuerte de rechazo y repugnancia moral o ritual. «Aborrecieron» comunica con dignidad y fuerza equivalente.
- source_word: μίασμα αἵματος αὐτῶν
  english_pob_choice: the defilement of their blood
  chosen_spanish: la mancha de su sangre
  alternatives_spanish:
  - la contaminación de su sangre
  - la impureza de su sangre
  lexicon: LSJ
  rationale: μίασμα puede expresar contaminación/impureza ritual. «Mancha» es una opción española idiomática que conserva la idea de contaminación moral-ritual sin forzar una expresión técnica.
- source_word: ἐπεκαλέσαντό σε εἰς βοήθειαν
  english_pob_choice: called on you for help
  chosen_spanish: te invocaron en busca de ayuda
  alternatives_spanish:
  - te llamaron en busca de ayuda
  - te pidieron ayuda
  lexicon: LSJ
  rationale: «Invocar» preserva el matiz orante del verbo en este contexto. «En busca de ayuda» explicita εἰς βοήθειαν de manera natural en español.
- source_word: εἰσάκουσον ἐμοῦ
  english_pob_choice: hear me
  chosen_spanish: escúchame
  alternatives_spanish:
  - óyeme
  - escucha mi voz
  lexicon: LSJ
  rationale: En oración, «escúchame» es claro y reverente, y reproduce la súplica directa del imperativo.
- source_word: τῆς χήρας
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - viuda
  - yo, la viuda
  lexicon: LSJ
  rationale: Se conserva el autoidentificativo sustantivo del griego. «La viuda» mantiene el tono retórico y suplicante sin añadir palabras.
theological_decisions:
- issue: Referencia divina y forma de dirigirse a Dios
  english_pob_reading: O God, my God
  chosen_spanish_reading: Oh Dios, mi Dios
  alternative_spanish_readings:
  - Dios, mi Dios
  - ¡Oh Dios, mi Dios!
  rationale: Se conserva la doble invocación del texto. No se introduce «Yahvé» porque aquí el griego dice θεός, no κύριος ni un equivalente directo del nombre divino.
  doctrine_reference: DOCTRINE.md §1 Source-first divine names
- issue: Cognate zeal expression ἐζήλωσαν τὸν ζῆλόν σου
  english_pob_reading: were zealous with your zeal
  chosen_spanish_reading: fueron celosos con tu celo
  alternative_spanish_readings:
  - ardieron con tu celo
  - mostraron tu mismo celo
  rationale: Se mantiene la tensión teológica y retórica de la repetición cognada. No se resuelve a una paráfrasis más lisa para no perder el vínculo entre su celo y el de Dios.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Expresión de impureza en μίασμα αἵματος αὐτῶν
  english_pob_reading: the defilement of their blood
  chosen_spanish_reading: la mancha de su sangre
  alternative_spanish_readings:
  - la contaminación de su sangre
  - la impureza de su sangre
  rationale: La frase conserva la carga cultual/moral sin explicarla de más. «Mancha» deja abierta la tensión entre sangre como vida, violencia y posible impureza ritual.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete 1909 y coincide sustancialmente con el audit trail inglés. Se mantiene el plural masculino explícito de υἱῶν, la repetición cognada de ζῆλός/ἐζήλωσαν, y la súplica final con «la viuda». Se optó por «botín/despojos/cautiverio» para reproducir el campo militar sin calco duro.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y no se introduce «Yahvé», porque en este versículo el original griego emplea θεός.
  - Se conserva «hijos» para υἱῶν, manteniendo el dato de género del texto fuente.
  - «Celo/celosos» se usa de modo intencional para reproducir la cognación del griego.
  - «La viuda» funciona como autoidentificación y no requiere expansión en el texto principal.
