  text: וַ֠/יֹּאמֶר אַל נָ֞א יִ֤חַר לַֽ/אדֹנָ/י֙ וַ/אֲדַבֵּ֔רָה אוּלַ֛י יִמָּצְא֥וּ/ן שָׁ֖ם שְׁלֹשִׁ֑ים וַ/יֹּ֨אמֶר֙ לֹ֣א אֶֽעֱשֶׂ֔ה אִם אֶמְצָ֥א שָׁ֖ם שְׁלֹשִֽׁים־־׃
