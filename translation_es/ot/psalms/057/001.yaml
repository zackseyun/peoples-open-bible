translation:
  language: es
  text: 'Para el director del coro: «No destruyas»[a]. De David. Un mictam[b], cuando huyó de Saúl, en la cueva.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente un nombre de melodía o estribillo: «No destruyas».'
    reason: alternative_reading
  - marker: b
    text: El significado de mictam es incierto; por eso se translitera en lugar de traducirse.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el director musical
  lexicon: HALOT
  rationale: La fórmula de encabezamiento señala una instrucción musical o editorial. «Director del coro» comunica con naturalidad esa función sin perder el carácter superscripcional del hebreo.
- source_word: אַל־תַּשְׁחֵת
  english_pob_choice: “Do Not Destroy”
  chosen_spanish: «No destruyas»
  alternatives_spanish:
  - «No destruyas»
  - «No destruyas / No lo destruyas»
  lexicon: HALOT
  rationale: En los títulos de salmos esta expresión se entiende probablemente como nombre de melodía o estribillo, no como mandato dentro del poema. Se conserva entre comillas para reflejar esa función titulística y la alternativa de lectura.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: La preposición ל en estos encabezamientos puede indicar autoría, asociación o dedicación. «De David» preserva esa ambigüedad de manera transparente.
- source_word: מִכְתָּם
  english_pob_choice: A miktam
  chosen_spanish: Mictam
  alternatives_spanish:
  - Un mictam
  - Miktam
  lexicon: HALOT
  rationale: El sentido de מִכְתָּם es incierto. Se translitera para no imponer una interpretación no asegurada por el hebreo.
- source_word: בְּבָרְחוֹ
  english_pob_choice: when he fled
  chosen_spanish: cuando huyó
  alternatives_spanish:
  - cuando escapó
  - al huir
  lexicon: HALOT
  rationale: La forma verbal expresa circunstancia temporal. «Cuando huyó» es natural en español y conserva el valor contextual del hebreo.
- source_word: מִפְּנֵי
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de delante de
  - ante
  lexicon: HALOT
  rationale: El hebreo literalmente dice «de delante de / de la presencia de», pero en español «de Saúl» comunica con claridad la relación de huida sin sobrerrepresentar la imagen idiomática.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saúl
  lexicon: HALOT
  rationale: Nombre propio tradicional en español.
- source_word: בַּמְּעָרָה
  english_pob_choice: in the cave
  chosen_spanish: en la cueva
  alternatives_spanish:
  - dentro de la cueva
  lexicon: HALOT
  rationale: El prefijo ב indica ubicación. «En la cueva» es la forma natural y fiel en español.
theological_decisions:
- issue: Función del encabezamiento del salmo
  english_pob_reading: Translate the entire verse as a psalm superscription rather than as part of the poetic body.
  chosen_spanish_reading: Traducir todo el verso como encabezamiento del salmo, no como parte del cuerpo poético.
  alternative_spanish_readings:
  - Tratar «No destruyas» como parte del poema
  - Suprimir la estructura de encabezamiento
  rationale: 'El hebreo presenta elementos convencionales de superscripción: dirección musical, posible título/tono, atribución davídica y nota histórica. Mantener esa estructura respeta la función literaria del texto.'
  doctrine_reference: Principio de primacía del texto original; preservación de la estructura literaria
- issue: Naturaleza de מִכְתָּם
  english_pob_reading: Preserve as transliteration 'miktam.'
  chosen_spanish_reading: Preservar como transliteración «Mictam».
  alternative_spanish_readings:
  - Traducir como «salmo»
  - Interpretarlo como «inscripción»
  rationale: Como el término es incierto, la transliteración evita presentar como seguro lo que el hebreo no define con claridad. Así se conserva la tensión lexical documentada.
  doctrine_reference: Preservar la incertidumbre léxica; no sobreinterpretar el género
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió una coma antes de «in the cave» para reflejar con mayor claridad la frase hebrea. En español se refleja con la pausa natural de «cuando huyó de Saúl, en la cueva», manteniendo la misma estructura histórica y la lectura superscripcional.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en otras secciones, pero aquí no aparece el tetragrámaton ni el nombre divino.
  - Se mantiene «Saúl» con acento español estándar.
  - «Mictam» se capitaliza como transliteración de encabezamiento, coherente con su función de etiqueta textual.
  - Las comillas en «No destruyas» señalan su probable carácter de título o indicación musical, siguiendo la auditable tradición del POB.
