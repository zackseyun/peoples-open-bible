lexical_decisions:
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En genealogías bíblicas, בֶּן puede señalar una relación genealógica más amplia que un hijo inmediato. En español, «hijo de» es la fórmula más natural y transparente para una línea genealógica, sin forzar la proximidad biológica.
- source_word: אֲמַרְיָה
  english_pob_choice: Amariah
  chosen_spanish: Amarías
  alternatives_spanish:
  - Amarías
  lexicon: convención onomástica bíblica en español
  rationale: Nombre propio transliterado; se adapta a la fonología y ortografía del español con terminación -ías, manteniendo la correspondencia con la forma hebrea y una lectura natural en español.
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  lexicon: convención onomástica bíblica en español
  rationale: Nombre propio transliterado con la forma española usual. Se conserva el valor del nombre sin traducirlo.
- source_word: מְרָיוֹת
  english_pob_choice: Meraioth
  chosen_spanish: Meraiot
  alternatives_spanish:
  - Meraiot
  - Merayot
  lexicon: convención onomástica bíblica en español
  rationale: Nombre propio transliterado. Se opta por una forma breve y legible en español, cercana a la convención inglesa pero adaptada a la ortografía española.
theological_decisions:
- issue: Valor genealógico de «hijo de»
  english_pob_reading: Hebrew genealogies may use 'son of' for a descendant in a lineage, not necessarily only an immediate father-son relationship.
  chosen_spanish_reading: En genealogías hebreas, «hijo de» puede indicar también un descendiente dentro de una línea, no solo un hijo inmediato.
  alternative_spanish_readings:
  - descendiente de
  rationale: Se conserva la lectura genealógica convencional y a la vez se preserva la cautela semántica documentada por la POB inglesa, evitando inferir una relación biológica inmediata donde el género no lo exige.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios; la línea inglesa se mantuvo estable y el punto crítico es solo el tratamiento genealógico de בֶּן y la transliteración de nombres propios.
  spanish_consistency_notes:
  - Se mantuvo el orden genealógico del hebreo y del texto inglés.
  - Se usó una transliteración española consistente para nombres propios bíblicos.
  - Se conservó la coma final para reflejar que el versículo continúa en el contexto inmediato de la genealogía.
