translation:
  language: es
  text: quemadura por quemadura, herida por herida, moretón[a] por moretón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'roncha por roncha' para חַבּוּרָה, preservando el sentido de una marca dejada por un golpe.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּוִיָּה
  english_pob_choice: burn
  chosen_spanish: quemadura
  alternatives_spanish:
  - quemazón
  - quemadura de fuego
  lexicon: HALOT
  rationale: El sustantivo designa una quemadura o marca de quemadura. 'Quemadura' es el equivalente natural y claro en español legal, y mantiene la simetría de la fórmula. 'Quemazón' suena más a sensación que a lesión; 'quemadura de fuego' añade información no presente en el hebreo.
- source_word: תַּחַת
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - en vez de
  - bajo
  lexicon: HALOT
  rationale: En este contexto jurídico, la preposición expresa equivalencia o compensación. 'Por' reproduce de modo breve y natural la relación de reciprocidad de la fórmula ('quemadura por quemadura').
- source_word: פֶּצַע
  english_pob_choice: wound
  chosen_spanish: herida
  alternatives_spanish:
  - lesión
  - corte
  lexicon: HALOT
  rationale: El término se refiere de forma amplia a una herida. 'Herida' conserva el sentido corporal concreto y funciona bien en el paralelismo; 'lesión' es más genérico y 'corte' demasiado específico.
- source_word: חַבּוּרָה
  english_pob_choice: bruise
  chosen_spanish: moretón
  alternatives_spanish:
  - cardenal
  - magulladura
  - marca
  lexicon: HALOT
  rationale: La palabra puede significar marca, roncha o contusión producida por un golpe. 'Moretón' es una equivalencia moderna clara y comprensible para lectores hispanohablantes; 'cardenal' varía regionalmente y 'marca' sería demasiado vaga.
translation_notes:
  revision_awareness: El pasaje hebreo presenta una fórmula legal de retribución paralela sin revisiones textuales destacadas en el paquete de auditoría; la versión inglesa POB se mantiene en alta concordancia y el único punto sensible es חַבּוּרָה, donde la alternativa semántica 'stripe/mark' merece quedar visible en nota.
  spanish_consistency_notes:
  - Se mantiene un registro legal conciso y paralelo, evitando perífrasis explicativas.
  - Se eligió 'por' para reflejar la reciprocidad jurídica del hebreo תַּחַת.
  - '''Moretón'' traduce la lesión visible producida por un golpe sin introducir tecnicismos médicos innecesarios.'
