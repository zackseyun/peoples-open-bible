  text: שֹׁפְטִ֣ים וְ/שֹֽׁטְרִ֗ים תִּֽתֶּן לְ/ךָ֙ בְּ/כָל שְׁעָרֶ֔י/ךָ אֲשֶׁ֨ר יְהוָ֧ה אֱלֹהֶ֛י/ךָ נֹתֵ֥ן לְ/ךָ֖ לִ/שְׁבָטֶ֑י/ךָ וְ/שָׁפְט֥וּ אֶת הָ/עָ֖ם מִשְׁפַּט צֶֽדֶק־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/016/018.yaml
  text: You shall appoint judges and officers for yourself in all your gates that Yahweh your God is giving you[a], according to your tribes[b], and they shall judge the people with righteous judgment.
  footnotes:
  - marker: a
    text: Or 'within all your towns'; literally 'in all your gates,' referring to the gate areas that functioned as civic and judicial centers.
    reason: cultural_note
  - marker: b
    text: Or 'with just judgment.'
    reason: lexical_alternative
