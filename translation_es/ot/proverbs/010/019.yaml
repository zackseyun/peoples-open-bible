translation:
  language: es
  text: Cuando abundan las palabras[a], la transgresión no cesa; pero el que refrena sus labios[b] es prudente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En la abundancia de palabras, la transgresión no falta».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus labios»; el posesivo masculino singular es representativo/genérico en estilo proverbial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֹב
  english_pob_choice: When ... are many
  chosen_spanish: Cuando abundan
  alternatives_spanish:
  - En la abundancia de
  - Con muchas
  lexicon: HALOT
  rationale: La construcción hebrea expresa circunstancia o cantidad. «Cuando abundan» conserva el valor proverbial sin sonar forzado en español, y mantiene la idea de exceso verbal.
- source_word: דְּבָרִים
  english_pob_choice: words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - el hablar
  - las conversaciones
  lexicon: HALOT
  rationale: Aquí דְּבָרִים se refiere al discurso verbal. «Palabras» es la equivalencia más directa y natural en español, y encaja con la advertencia sapiencial sobre la habla.
- source_word: לֹא יֶחְדַּל
  english_pob_choice: does not cease
  chosen_spanish: no falta
  alternatives_spanish:
  - no cesa
  - no deja de haber
  - no se acaba
  lexicon: HALOT
  rationale: En este proverbio la negación con חדל puede expresarse como ausencia o cese de algo. «No falta» recoge bien la idea de que la transgresión está presente donde abundan las palabras, sin perder fluidez en español.
- source_word: פָּשַׁע
  english_pob_choice: transgression
  chosen_spanish: la transgresión
  alternatives_spanish:
  - el pecado
  - la ofensa
  - la rebeldía
  lexicon: HALOT
  rationale: «Transgresión» preserva el peso moral y el registro sapiencial del término mejor que «pecado», que es más amplio. También mantiene la tensión ética del texto hebreo.
- source_word: וְחֹשֵׂךְ
  english_pob_choice: but whoever restrains
  chosen_spanish: pero el que refrena
  alternatives_spanish:
  - pero el que contiene
  - y el que guarda
  - pero quien retiene
  lexicon: HALOT
  rationale: El participio expresa a la persona que se contiene o restringe. Se traduce de modo personal y contrastivo, porque el segundo hemistiquio contrapone una conducta sabia al exceso de palabras.
- source_word: שְׂפָתָיו
  english_pob_choice: his lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su boca
  - su hablar
  - sus palabras
  lexicon: HALOT
  rationale: La metáfora corporal se conserva en español. «Labios» reproduce el hebreo con claridad y mantiene la imagen de autocontrol verbal. No se marca el masculino genérico en el cuerpo del texto porque en español el posesivo plural ya funciona de manera natural en el proverbio.
- source_word: מַשְׂכִּיל
  english_pob_choice: is prudent
  chosen_spanish: es prudente
  alternatives_spanish:
  - actúa con discernimiento
  - tiene entendimiento
  - es sabio
  lexicon: HALOT
  rationale: El participio de שׂכל apunta a actuar con entendimiento prudente. «Es prudente» es una equivalencia precisa y sobria que encaja con el contraste sapiencial del verso.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y concuerda con el sentido estabilizado del POB inglés. Se revisó la posibilidad de «cesa» para לֹא יֶחְדַּל, pero se prefirió «no falta» por su naturalidad en español y por conservar la idea de presencia inevitable en el paralelismo.
  spanish_consistency_notes:
  - Se mantiene «transgresión» para פָּשַׁע, conforme al registro moral fuerte del proverbio.
  - Se conserva la metáfora corporal «labios» para שְׂפָתָיו.
  - La nota sobre el posesivo masculino singular explica la forma hebrea sin introducir una distinción doctrinal.
  - La puntuación reproduce el paralelismo antitético con punto y coma, útil para lectura pública.
