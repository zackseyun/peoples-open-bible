review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y mantiene correctamente «Yahvé». Sin embargo, se aparta del rastro auditado del POB en dos puntos importantes: explicita «de hijos» en וְשִׁכְּלֻךְ aunque la revisión inglesa lo retiró por no estar expreso en este versículo, y deja «sangre» en el texto principal donde el POB optó por el sentido contextual «bloodshed». También hay una incongruencia pronominal: «sobre ustedes» con posteriores singulares «te/ti», cuando el hebreo cambia de 2mp a 2fs y conviene reflejarlo con claridad en español.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la mezcla de «ustedes» con «te/ti» suena inconsistente para lectura pública. «Hambre» es comprensible, pero «hambruna» comunica mejor el valor de רָעָב como calamidad de juicio que simple sensación de hambre. «Bestias feroces» y «he hablado» funcionan bien. «Pasarán por en medio de ti» es natural aunque algo más largo; «pasarán por ti» sería posible, pero la formulación actual es aceptable.
  glossary_alignment: 'Alineación buena en el nombre divino: יהוה -> «Yahvé». No hay conflicto con otros términos doctrinales principales. Sí hay desalineación con la decisión auditada sobre שׁכל, que en esta revisión debe permanecer más general («te dejarán en duelo» / «te privarán») y trasladar la opción de hijos a nota. También conviene alinear דָם con la decisión contextual «derramamiento de sangre» en el texto principal, conservando «sangre» en nota.'
  issues:
  - severity: high
    issue: Explicita «de hijos» en el texto principal para וְשִׁכְּלֻךְ
    rationale: La revisión auditada del POB eliminó «of children» precisamente porque el hebreo aquí no expresa objeto. En español debe preservarse esa cautela y dejar la opción explícita en nota.
  - severity: high
    issue: Traduce וָדָם como «sangre» en el texto principal
    rationale: En este catálogo de juicio, el sentido contextual documentado es «bloodshed». En español, «derramamiento de sangre» o equivalente evita ambigüedad y sigue mejor la decisión lexical/theológica auditada.
  - severity: medium
    issue: Inconsistencia pronominal entre «ustedes» y «te/ti»
    rationale: El hebreo pasa de 2mp a 2fs, pero el español actual mezcla tratamientos sin señal clara. Conviene usar «ustedes» al inicio y luego singular femenino para la ciudad, p. ej. «contra ustedes ... por ti ... sobre ti», manteniendo la transición de forma más natural.
  - severity: medium
    issue: «Hambre» debilita el valor de רָעָב como calamidad
    rationale: Aunque posible, «hambruna» comunica mejor el juicio corporativo que el sustantivo hebreo suele tener en contexto profético.
  revised_spanish_text: Y enviaré contra ustedes hambruna y bestias feroces[a], y te dejarán en duelo[b]; y peste y derramamiento de sangre[c] pasarán por en medio de ti, y traeré espada sobre ti. Yo, Yahvé[d], he hablado.
  revised_footnotes:
