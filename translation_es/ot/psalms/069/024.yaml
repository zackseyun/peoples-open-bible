translation:
  language: es
  text: Sean oscurecidos sus ojos de ver[a], y haz que sus lomos tiemblen continuamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, idiomáticamente, 'para no ver'.
    reason: lexical_alternative
  - marker: b
