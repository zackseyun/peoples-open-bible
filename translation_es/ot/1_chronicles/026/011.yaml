translation:
  language: es
  text: Hilkías el segundo, Tebalías el tercero, Zacarías el cuarto. Todos los hijos varones y hermanos[a] de Hosá fueron trece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente “parientes varones” para “hermanos”, si el término se toma en sentido más amplio dentro del clan de Hosá.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִלְקִיָּהוּ
  english_pob_choice: Hilkiah
  chosen_spanish: Hilkías
  alternatives_spanish:
  - Hilkiahu
  lexicon: nombre propio
  rationale: Nombre propio transliterado al español con una forma natural y reconocible. Se conserva la referencia personal sin traducir el nombre.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - segundo
  lexicon: HALOT
  rationale: El ordinal expresa el orden dentro de la lista genealógica. En español, el artículo con ordinal resulta claro y natural.
- source_word: טְבַלְיָהוּ
  english_pob_choice: Tebaliah
  chosen_spanish: Tebalías
  alternatives_spanish:
  - Tebalíahu
  lexicon: nombre propio
  rationale: Nombre propio transliterado con una forma española fluida. Se evita una transliteración demasiado áspera sin perder identificación.
- source_word: הַשְּׁלִשִׁי
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - tercero
  lexicon: HALOT
  rationale: Ordinal paralelo al hebreo y a la secuencia de nombres. Mantiene la estructura enumerativa del texto.
- source_word: זְכַרְיָהוּ
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zekarías
  - Zacaríahu
  lexicon: nombre propio
  rationale: Se usa la forma española asentada de este nombre propio, ampliamente inteligible en contexto bíblico.
- source_word: הָרְבִעִי
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  alternatives_spanish:
  - cuarto
  lexicon: HALOT
  rationale: Ordinal final de la serie, conservando el paralelismo con los anteriores.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo el total de
  lexicon: HALOT
  rationale: Introduce el total del grupo listado. 'Todos' es la forma más natural en español para este resumen cuantitativo.
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'hijos', en español 'hijos' comunica bien la filiación del registro sin forzar una marcación de sexo que el contexto ya aclara por la mención inmediata de 'hermanos' y el conteo.
- source_word: וְאַחִים
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes varones
  - parientes
  lexicon: HALOT
  rationale: Se conserva el término directo 'hermanos'. La nota permite la amplitud semántica posible hacia parientes masculinos dentro del clan, como reflejó la POB en inglés.
- source_word: לְחֹסָה
  english_pob_choice: of Hosah
  chosen_spanish: de Hosá
  alternatives_spanish:
  - pertenecientes a Hosá
  lexicon: HALOT
  rationale: La relación posesiva o de pertenencia se expresa naturalmente con 'de' en español.
- source_word: שְׁלֹשָׁה עָשָׂר
  english_pob_choice: thirteen
  chosen_spanish: trece
  alternatives_spanish:
  - trece en total
  lexicon: HALOT
  rationale: Número cardinal directo, sin añadir palabras innecesarias.
theological_decisions:
- issue: Alcance de 'hermanos' en un registro de clan
  english_pob_reading: '''brothers'' with footnote allowing ''kinsmen'' if taken more broadly for male relatives within Hosah''s clan.'
  chosen_spanish_reading: '''hermanos'' con nota que permite ''parientes varones'' si se entiende en sentido más amplio dentro del clan de Hosá.'
  alternative_spanish_readings:
  - parientes varones
  - deudos varones
  rationale: El texto hebreo admite una relación fraterna literal o una extensión clanica. Mantener 'hermanos' preserva la forma más directa; la nota recoge la alternativa semántica sin borrar la tensión.
  doctrine_reference: Lexical nuance; no doctrinal issue.
