translation:
  language: es
  text: Los hombres de Israel salieron a la batalla contra Benjamín[a], y los hombres de Israel se desplegaron para la batalla contra ellos en Guibeá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se dispusieron para la batalla contra ellos en Guibeá». El hebreo permite un matiz ligeramente más explícito de disposición adversarial en la segunda cláusula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - marcharon
  - salieron al combate
  lexicon: HALOT
  rationale: En contexto militar narrativo, יצא expresa salir para entrar en acción. «Salieron» conserva el movimiento sin añadir una especificación que el hebreo no da de manera explícita.
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - Israel
  - el hombre de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Aunque אִישׁ está en singular, funciona colectivamente para el cuerpo combatiente. En español, «los hombres de Israel» mantiene ese valor colectivo y el rasgo masculino del término.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to battle
  chosen_spanish: a la batalla
  alternatives_spanish:
  - para la guerra
  - para la batalla
  lexicon: HALOT
  rationale: La preposición y el sustantivo indican finalidad o destino militar. «A la batalla» es natural en español y conserva el sentido de desplazamiento hacia el combate.
- source_word: עִם בִּנְיָמִן
  english_pob_choice: against Benjamin
  chosen_spanish: contra Benjamín
  alternatives_spanish:
  - con Benjamín
  lexicon: HALOT
  rationale: Aunque עִם normalmente significa «con», en un contexto de guerra expresa oposición. «Contra Benjamín» preserva la lectura adversarial que el contexto exige.
- source_word: וַיַּעַרְכ֨וּ
  english_pob_choice: drew up
  chosen_spanish: se desplegaron
  alternatives_spanish:
  - se ordenaron
  - formaron filas
  - se dispusieron
  lexicon: HALOT
  rationale: ערך en contexto militar se refiere a organizar tropas para el combate. «Se desplegaron» comunica el arreglo táctico con naturalidad en español.
- source_word: אִתָּם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - con ellos
  lexicon: HALOT
  rationale: El pronombre retoma a los benjaminitas como parte contraria. «Contra ellos» evita la ambigüedad de una lectura asociativa y refleja el sentido adversarial del contexto.
- source_word: מִלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - en batalla
  - de batalla
  lexicon: HALOT
  rationale: El sustantivo completa el marco militar del verbo. «Para la batalla» mantiene la función de propósito o preparación sin expandir el texto.
- source_word: אֶל הַגִּבְעָה
  english_pob_choice: at Gibeah
  chosen_spanish: en Guibeá
  alternatives_spanish:
  - hacia Guibeá
  - contra Guibeá
  - junto a Guibeá
  lexicon: HALOT
  rationale: El topónimo se translitera como Guibeá, siguiendo una forma castellana clara. «En» expresa de manera natural el emplazamiento de la fuerza en relación con el lugar.
theological_decisions:
- issue: Lenguaje colectivo masculino en אִישׁ יִשְׂרָאֵל
  english_pob_reading: the men of Israel
  chosen_spanish_reading: los hombres de Israel
  alternative_spanish_readings:
  - Israel
  - los israelitas
  rationale: Se conserva el valor masculino colectivo del hebreo en vez de neutralizarlo, porque el texto describe a los combatientes de Israel y no una abstracción nacional.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Preposición de oposición en עִם / אִתָּם en contexto bélico
  english_pob_reading: against Benjamin ... against them
  chosen_spanish_reading: contra Benjamín ... contra ellos
  alternative_spanish_readings:
  - con Benjamín ... con ellos
  rationale: En contexto de guerra, las preposiciones pueden expresar hostilidad. Traducirlas como «contra» evita una lectura de alianza y refleja la oposición implícita en la escena.
  doctrine_reference: DOCTRINE.md § Lexical context and adversative force
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la segunda cláusula de «with them» a «against them»; por eso la traducción española evita cualquier forma asociativa y mantiene explícita la oposición en ambas cláusulas.
  spanish_consistency_notes:
  - Se usa «Benjamín» para el nombre tribal, y «Guibeá» como transliteración castellana del topónimo.
  - Se mantiene el paralelismo entre las dos menciones de «los hombres de Israel» como en el hebreo.
  - «Batalla» se usa de forma uniforme para מִלְחָמָה en este versículo.
  - El marcador de nota [a] queda anclado en «Benjamín» para reflejar la alternativa de construcción en la primera cláusula.
