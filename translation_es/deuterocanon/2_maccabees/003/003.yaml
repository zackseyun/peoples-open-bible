    reason: lexical_alternative
  - marker: b
    text: «Asia» aquí se refiere al dominio helenístico del rey seléucida, no al continente en sentido moderno.
    reason: cultural_note
  revision_rationale: Se ajusta únicamente la expresión de ἐπιβάλλοντα δαπανήματα para producir un español natural y fiel. «Gastos requeridos para» conserva la idea de gastos exigidos o implicados por los servicios sacrificiales, evitando la construcción poco idiomática «incumbían a».
