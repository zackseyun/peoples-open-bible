translation:
  language: es
  text: 'Porque Moisés dice: «Y todos los santos[a] están bajo tus manos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los santificados» o «los consagrados». El participio griego indica personas hechas santas o apartadas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «bajo tus manos», imagen que puede implicar estar bajo el poder, el cuidado o la autoridad de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: φησιν
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dice ahora
  - declara
  lexicon: LSJ
  rationale: El griego usa una fórmula de cita en presente; en español, «dice» conserva bien el valor de presente literario y la introducción directa de la cita sin añadir matices no presentes en el texto.
- source_word: ἡγιασμένοι
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santificados
  - los consagrados
  - los que han sido santificados
  lexicon: LSJ
  rationale: El participio perfecto pasivo de ἁγιάζω expresa personas hechas santas o apartadas. En español, «los santos» es natural y fiel, y mantiene la tensión semántica entre santidad resultante y separación cultual; se evita resolverla en una sola glosa interpretativa.
- source_word: ὑπὸ τὰς χεῖράς σου
  english_pob_choice: under your hands
  chosen_spanish: bajo tus manos
  alternatives_spanish:
  - bajo tu mano
  - bajo tu poder
  - bajo tu autoridad
  lexicon: LSJ
  rationale: Se conserva la imagen concreta del plural griego «tus manos» y la relación espacial-metafórica de ὑπό. No se sustituye por una paráfrasis explicativa en el texto principal.
theological_decisions:
- issue: La imagen de estar «bajo tus manos» puede implicar poder, cuidado o autoridad divina.
  english_pob_reading: Literalmente, 'under your hands,' an image that can imply being under God's power, care, or authority.
  chosen_spanish_reading: Se mantiene la imagen literal en el texto principal y se aclara su posible sentido en nota, sin convertirla en paráfrasis.
  alternative_spanish_readings:
  - bajo tu poder
  - bajo tu cuidado
  - bajo tu autoridad
  rationale: El pasaje cita a Moisés de forma concisa; resolver la metáfora en la línea principal haría perder la forma imagética del testimonio. La nota preserva las posibles implicaciones teológicas sin imponer una sola explicación.
  doctrine_reference: Principios POB de traducción transparente y de preservación de imágenes bíblicas; cf. énfasis en no borrar tensiones léxicas/documentadas.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del inglés POB: la decisión más reciente prefirió «holy ones» sobre «consecrated ones» por ser más natural y directo. En español se eligió «los santos», que conserva naturalidad y al mismo tiempo deja abierta la fuerza pasiva/resultante de ἡγιασμένοι mediante nota.'
  spanish_consistency_notes:
  - Se usó «Moisés» como forma estable y transparente del nombre propio.
  - Se mantuvo el presente de cita («dice») para reflejar la formulación literaria del griego.
  - Se preservó el plural «manos» del griego y no se singularizó.
  - No se introdujo «Señor» ni un equivalente contextual porque el griego aquí conserva la imagen de posesión/poder mediante «tus manos».
