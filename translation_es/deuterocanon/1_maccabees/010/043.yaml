    text: O «se refugien». El griego puede entenderse como huida hacia un lugar de asilo; la traducción mantiene «huyan» para conservar el movimiento del verbo.
    reason: lexical_alternative
  - marker: b
    text: O «queden libres». La expresión puede abarcar exención de tributos, deudas o cualquier reclamo legal.
    reason: alternative_reading
  revision_rationale: Se corrigió la concordancia al plural para reflejar fielmente ὅσοι…ἀπολελύσθωσαν y para armonizar con «les pertenece». También se ajustó la nota b para representar mejor el valor imperativo pasivo del griego sin una glosa literal errónea.
