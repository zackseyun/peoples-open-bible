translation:
  language: es
  text: En rectitud[a] serás establecida; estarás lejos de la opresión, porque no temerás, y lejos del terror[b], porque no se acercará a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por rectitud serás establecida». La preposición hebrea puede expresar tanto medio como esfera.'
    reason: lexical_alternative
  - marker: b
    text: «Terror» también puede traducirse «destrucción» o «ruina».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/צְדָקָה
  english_pob_choice: In righteousness
  chosen_spanish: En justicia
  alternatives_spanish:
  - En rectitud
  - Por justicia
  lexicon: HALOT
  rationale: La preposición ב puede expresar esfera o medio. Aquí opté por "en justicia" para conservar la brevedad hebrea y reflejar el valor de צְדָקָה como justicia/rectitud en un contexto de restauración. "En rectitud" es posible, pero menos natural en español bíblico. "Por justicia" haría más explícito el medio, pero estrecha demasiado la ambigüedad del hebreo.
- source_word: תִּכּוֹנָנִי
  english_pob_choice: you will be established
  chosen_spanish: serás establecida
  alternatives_spanish:
  - serás firmemente fundada
  - serás puesta en firmeza
  lexicon: HALOT
  rationale: El verbo apunta a la idea de ser hecha firme, establecida o consolidada. "Serás establecida" es fiel, natural y conserva el pasivo dirigido a la hija de Sion/Jerusalén implícita en el contexto.
- source_word: מֵ/עֹשֶׁק
  english_pob_choice: from oppression
  chosen_spanish: de la opresión
  alternatives_spanish:
  - de la extorsión
  - de la violencia
  lexicon: HALOT
  rationale: '"Opresión" cubre bien el rango semántico de עֹשֶׁק y funciona de forma idiomática en español. "Extorsión" y "violencia" son posibles en ciertos contextos, pero aquí estrechan o desplazan el alcance del término.'
- source_word: כִּי לֹא תִירָאִי
  english_pob_choice: for you will not fear
  chosen_spanish: porque no temerás
  alternatives_spanish:
  - pues no tendrás miedo
  - porque no habrás de temer
  lexicon: HALOT
  rationale: Mantengo la fuerza de la promesa/fundamento causal con "porque" y el futuro simple. "No temerás" preserva el valor directo del hebreo sin introducir una modalidad más interpretativa como "no habrás de temer".
- source_word: וּ/מִ֨/מְּחִתָּ֔ה
  english_pob_choice: and from terror
  chosen_spanish: y del terror
  alternatives_spanish:
  - y de la destrucción
  - y de la ruina
  - y del pánico
  lexicon: HALOT
  rationale: 'מְחִתָּה admite varios matices: terror, destrucción, ruina. Elegí "terror" porque encaja mejor con el paralelismo inmediato con "no temerás" y conserva el sentido de amenaza experimentada, sin convertir el término en un evento ya ocurrido.'
- source_word: כִּי לֹֽא תִקְרַ֖ב אֵלָֽיִךְ
  english_pob_choice: for it will not come near you
  chosen_spanish: porque no se acercará a ti
  alternatives_spanish:
  - porque no vendrá cerca de ti
  - porque no llegará a ti
  lexicon: HALOT
  rationale: El verbo en femenino singular concuerda con מְחִתָּה, personificando el terror como algo que no se aproxima. "No se acercará a ti" conserva esa imagen en español con una formulación natural.
theological_decisions:
- issue: Addressee feminine singular / Zion personificada
  english_pob_reading: Second feminine singular retained as 'you,' referring to Zion/Jerusalem collectively.
  chosen_spanish_reading: Se conserva el femenino singular implícito en "serás establecida" y "a ti", entendido como Sion/Jerusalén colectiva.
  alternative_spanish_readings:
  - Añadir explícitamente "oh Sion" o "Jerusalén"
  - Reformular en plural para hacer visible lo colectivo
  rationale: El hebreo habla a una entidad femenina singular colectiva. En español no hace falta insertar el nombre propio porque el contexto inmediato ya identifica el destinatario; además, mantener la forma implícita evita sobreinterpretar el verso y respeta el flujo del oráculo.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Relación entre 'justicia' y 'righteousness'
  english_pob_reading: In righteousness you will be established.
  chosen_spanish_reading: En justicia serás establecida.
  alternative_spanish_readings:
  - En rectitud serás establecida
  - Por justicia serás establecida
  rationale: '"Justicia" mantiene la densidad bíblica de צְדָקָה y permite abarcar tanto rectitud moral como orden justo/covenantal. En este contexto profético, esa amplitud es preferible a una paráfrasis más estrecha.'
  doctrine_reference: Uso contextual de δικαιοσύνη/צְדָקָה como justicia-rectitud
translation_notes:
  revision_awareness: 'La redacción sigue la revisión del POB inglés que cambió un imperativo aparente por una afirmación de estado futuro: no "mantente lejos de la opresión", sino "estarás lejos de la opresión". También conserva el paralelismo entre temor y terror, y el valor pasivo/resultativo de "serás establecida".'
  spanish_consistency_notes:
  - Se usa "justicia" para צְדָקָה según el valor contextual, sin sustituirlo mecánicamente por "rectitud".
  - Se mantiene el femenino singular implícito, coherente con el destinatario colectivo Sion/Jerusalén.
  - '"Terror" se conserva para מְחִתָּה por el paralelismo con "no temerás".'
  - La puntuación reproduce dos cola principales, con la explicación causal introducida por "porque".
