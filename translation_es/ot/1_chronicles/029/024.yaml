translation:
  language: es
  text: Y todos los oficiales, los hombres valientes y también todos los hijos del rey David juraron lealtad[a] al rey Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «dieron la mano bajo Salomón el rey», un modismo hebreo para someterse o comprometer lealtad.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָּׂרִים
  english_pob_choice: officials
  chosen_spanish: oficiales
  alternatives_spanish:
  - príncipes
  - líderes
  - gobernantes
  lexicon: HALOT
  rationale: En este contexto cortesano y administrativo, שָּׂרִים designa a personas de rango o autoridad. «Oficiales» comunica bien esa función en español moderno sin restringirlo innecesariamente a un cargo militar.
- source_word: גִּבֹּרִים
  english_pob_choice: mighty men
  chosen_spanish: los hombres valientes
  alternatives_spanish:
  - los valientes
  - los guerreros
  - los hombres poderosos
  lexicon: HALOT
  rationale: La expresión hebrea suele referirse a hombres de valor y fuerza, frecuentemente con matiz militar. «Hombres valientes» conserva ese peso tradicional y suena natural en español.
- source_word: בְּנֵי הַמֶּלֶךְ דָּוִיד
  english_pob_choice: the sons of King David
  chosen_spanish: los hijos del rey David
  alternatives_spanish:
  - los hijos de David
  - los hijos reales de David
  lexicon: HALOT
  rationale: Se mantiene la filiación explícita y el título real unido a David, tal como en el hebreo, sin añadir inferencias sobre legitimidad o estatus adicional.
- source_word: נָתְנוּ יָד תַּחַת
  english_pob_choice: pledged allegiance to
  chosen_spanish: dieron la mano bajo
  alternatives_spanish:
  - se sometieron a
  - juraron lealtad a
  - se pusieron bajo la autoridad de
  lexicon: HALOT
  rationale: El hebreo dice literalmente «dieron la mano bajo», un modismo de sumisión o lealtad pactada. He conservado la imagen en una nota porque el español corriente no la expresa de forma natural, pero el texto principal mantiene la metáfora con suficiente claridad para un registro bíblico.
- source_word: שְׁלֹמֹה הַמֶּלֶךְ
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - Salomón el rey
  - Rey Salomón
  lexicon: HALOT
  rationale: El hebreo presenta el sustantivo con aposición real. «El rey Salomón» es la forma más natural y clara en español, y conserva el valor de identificación real sin alterar el sentido.
theological_decisions:
- issue: Expresión idiomática de sumisión/lealtad
  english_pob_reading: pledged allegiance to
  chosen_spanish_reading: dieron la mano bajo
  alternative_spanish_readings:
  - se sometieron a
  - juraron lealtad a
  rationale: 'No hay una carga doctrinal especial, pero sí una decisión semántica importante: el hebreo usa un modismo de rendición/lealtad. El texto principal conserva la imagen corporal con la nota explicativa para no borrar la tensión entre literalidad y sentido idiomático.'
  doctrine_reference: Ninguna; decisión de fraseología e idiomatismo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «King Solomon» por naturalidad, pero conservó la equivalencia de sentido con el modismo «gave the hand under». En español, la forma más natural es «el rey Salomón», mientras que el modismo se explicita en nota para respetar la evidencia hebrea.
  spanish_consistency_notes:
  - He usado «oficiales» para שָּׂרִים, en línea con la decisión inglesa.
  - «Hombres valientes» conserva el valor tradicional de גִּבֹּרִים sin forzar una lectura exclusivamente militar.
  - No he reemplazado el nombre divino ni hay términos teológicos que requieran equivalencia especial en este versículo.
  - Los marcadores de nota están presentes en el texto exactamente donde corresponden.
