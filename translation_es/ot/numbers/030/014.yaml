    rationale: El hebreo tiene dos categorías coordinadas ('todo voto' y 'todo juramento vinculante') seguidas por el propósito/contenido 'para afligir el alma'. El borrador convierte la segunda categoría en una expresión distinta y desplaza la relación sintáctica del infinitivo.
  - severity: medium
    issue: '''Juramentación'' es poco natural en español bíblico general.'
    rationale: Aunque formalmente posible, no es la mejor opción para lectura eclesial amplia. 'Juramento' comunica mejor el sentido de שְׁבֻעָה sin rareza innecesaria.
  - severity: low
    issue: La redacción de la nota al pie puede pulirse para español más natural.
    rationale: 'La fórmula actual con comillas anidadas resulta tosca. Conviene una redacción limpia: ''O "negarse a sí mismo" o "humillarse"...''.'
  revised_spanish_text: Todo voto y todo juramento vinculante de afligir el alma[a], su marido podrá confirmarlo, o su marido podrá anularlo.
