  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of בַּיהוָה אֱלֹהֵיהֶם
  chosen_reading: 'instrumental: ''by the LORD their God'''
  alternative_readings:
  - 'locative/relational: ''in the LORD their God'''
  - 'mediate agency: ''through the LORD their God'''
  rationale: 'In context, the following clause denies military instruments of salvation, so the positive clause most naturally states the true instrument/agent of deliverance: the LORD himself. This preserves the theological contrast between divine salvation and human warfare without overexplaining it.'
