translation:
  language: es
  text: 'Entonces vio al ceneo[a], y alzó su declaración y dijo: «Tu morada es firme, y tu nido está puesto en la roca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alzó su oráculo». מָשָׁל puede designar un proverbio, una burla o una declaración profética; aquí se refiere a la declaración poética de Balaam.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֵּינִי
  english_pob_choice: the Kenite
  chosen_spanish: al ceneo
  alternatives_spanish:
  - al cananeo
  - al ceneo(s)
  lexicon: HALOT
  rationale: El hebreo está en singular con artículo, y el POB inglés conserva ese valor representativo con «the Kenite». En español, «al ceneo» mantiene el singular colectivo y evita pluralizar innecesariamente el referente tribal.
- source_word: מְשָׁלוֹ
  english_pob_choice: his discourse
  chosen_spanish: su dicho
  alternatives_spanish:
  - su oráculo
  - su proverbio
  - su discurso
  lexicon: HALOT
  rationale: מָשָׁל en este contexto poético profético no se reduce bien a «proverbio». «Dicho» es breve, natural y suficientemente amplio para una sentencia elevada; el matiz de «oráculo» queda posible pero no obligatorio en el texto principal.
- source_word: אֵיתָן
  english_pob_choice: enduring
  chosen_spanish: firme
  alternatives_spanish:
  - duradero
  - seguro
  - perdurable
  lexicon: HALOT
  rationale: El término expresa solidez, permanencia y estabilidad. «Firme» comunica bien la idea de una morada asentada con seguridad, sin cargar el verso con una abstracción menos poética.
- source_word: מוֹשָׁבֶךָ
  english_pob_choice: your dwelling place
  chosen_spanish: tu morada
  alternatives_spanish:
  - tu lugar de habitación
  - tu vivienda
  - tu asentamiento
  lexicon: HALOT
  rationale: «Morada» reproduce la idea de lugar de residencia con un registro digno y natural en español bíblico contemporáneo.
- source_word: וְשִׂים
  english_pob_choice: is set
  chosen_spanish: está
  alternatives_spanish:
  - está puesta
  - está asentada
  - se halla
  lexicon: HALOT
  rationale: El hebreo tiene una forma poética condensada que funciona predicativamente. «Está» conserva la lectura descriptiva natural en español, sin volverlo un imperativo artificial.
- source_word: בַּסֶּלַע
  english_pob_choice: in the rock
  chosen_spanish: en la roca
  alternatives_spanish:
  - en el peñasco
  - en el risco
  - en la peña
  lexicon: HALOT
  rationale: «Roca» es la opción más clara y fiel para סֶלַע; mantiene la imagen de seguridad rocosa sin regionalismos fuertes.
- source_word: קִנֶּךָ
  english_pob_choice: your nest
  chosen_spanish: tu nido
  alternatives_spanish:
  - tu nidal
  - tu lugar de anidar
  lexicon: HALOT
  rationale: La metáfora de ave/nido debe preservarse. «Nido» es directo y transparente, y conserva el paralelismo con la roca como sitio seguro.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés, preservando el paralelismo poético y la metáfora del nido en la roca. Se mantiene el singular representativo «al ceneo» y se evita suavizar el valor profético-poético de מָשָׁל, que queda recogido en la nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico moderno y digno, evitando calcos pesados.
  - La metáfora espacial se conserva sin explicitarla en exceso, para respetar la concisión poética del hebreo.
