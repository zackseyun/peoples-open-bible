translation:
  language: es
  text: Y al resto del pueblo lo puso bajo el mando de Abisai[a], su hermano, y los formó[b] para salir al encuentro de los hijos de Amón[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'dio en la mano de Abisai'; un hebraísmo que aquí significa poner tropas bajo su autoridad o mando.
    reason: lexical_alternative
  - marker: b
    text: O 'los alineó' / 'los dispuso en orden de batalla'. El verbo hebreo puede referirse a formar tropas para el combate.
    reason: lexical_alternative
  - marker: c
    text: O 'los amonitas'. El hebreo dice literalmente 'los hijos de Amón'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר הָעָם
  english_pob_choice: the rest of the people
  chosen_spanish: el resto del pueblo
  alternatives_spanish:
  - el resto de la gente
  - los demás del pueblo
  - el resto de las tropas
  lexicon: HALOT
  rationale: יֶתֶר expresa lo que queda o permanece; הָעָם es literalmente 'el pueblo', aunque en contexto militar se refiere al contingente restante. 'El resto del pueblo' conserva la cercanía al hebreo y sigue siendo claro en español.
- source_word: נָתַן בְּיַד
  english_pob_choice: put under the command of
  chosen_spanish: lo puso bajo el mando de
  alternatives_spanish:
  - lo entregó en la mano de
  - lo puso en manos de
  - lo confió a
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente ''dio en la mano de''. En este contexto militar significa asignar tropas a la autoridad de alguien. ''Puso bajo el mando de'' comunica con naturalidad esa idea sin perder la base semítica.'
- source_word: אַבְשַׁי
  english_pob_choice: Abishai
  chosen_spanish: Abisai
  alternatives_spanish:
  - Abisái
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio con la forma española habitual 'Abisai', más natural para lectura pública y consistente con usos bíblicos en español.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de él
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere explícitamente al vínculo familiar de Abisai. En español, 'su hermano' mantiene el dato relacional con fluidez.
- source_word: וַיַּעֲרֹךְ
  english_pob_choice: he drew them up
  chosen_spanish: los formó
  alternatives_spanish:
  - los dispuso
  - los alineó
  - los puso en orden de batalla
  lexicon: HALOT
  rationale: El verbo ערך en contexto militar alude a disponer tropas en formación. 'Los formó' expresa esa acción de manera natural; se evita sobreespecificar 'batalla' en el texto principal porque el hebreo permite una formulación más general, aunque el contexto sea bélico.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para salir al encuentro de
  alternatives_spanish:
  - para enfrentar
  - contra
  - para encontrarse con
  lexicon: HALOT
  rationale: לִקְרַאת literalmente indica movimiento hacia un encuentro. En contexto de guerra puede implicar confrontación, pero 'salir al encuentro de' preserva la imagen verbal sin imponer una paráfrasis demasiado interpretativa.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea literal 'los hijos de Amón', que la POB inglesa también mantiene. 'Amonitas' sería una equivalencia válida, pero menos transparente respecto del texto fuente.
translation_notes:
  revision_awareness: 'Se revisó el texto hebreo y el rastro auditado en inglés. La solución española sigue la misma línea de equivalencia óptima: conserva el hebraísmo relevante en notas, pero en el cuerpo principal usa una sintaxis natural y publicable en español. No se detectaron revisiones aplicadas en el pass más reciente, y la concordancia general fue alta.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' / 'Yahvé' según el proyecto, aunque este versículo no contiene esos términos.
  - Se preserva la referencia militar implícita sin añadir palabras no sustentadas por el hebreo.
  - Los nombres propios siguen formas españolas habituales para lectura eclesial, sin perder reconocimiento del original.
