translation:
  language: es
  text: Ahora nosotros, al oír la aflicción de aquellos jóvenes, nos estremecemos; pero ellos, no solo al verla, ni solo al oír la palabra de amenaza dada en el acto[a], sino también al sufrirla,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra amenazante pronunciada en ese mismo momento». El griego παραχρῆμα enfatiza la inmediatez de la amenaza.
    reason: lexical_alternative
lexical_decisions:
- source_word: θλῖψιν
  english_pob_choice: suffering / affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - sufrimiento
  - angustia
  - tribulación
  lexicon: BDAG
  rationale: El contexto describe el duro trato padecido por los jóvenes; «aflicción» conserva un registro más formal que «sufrimiento» y evita cargar el término con matices técnicos de «tribulación» que en español pueden sonar doctrinales o eclesiales.
- source_word: νεανιῶν
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - jóvenes varones
  - muchachos
  - jóvenes hombres
  lexicon: LSJ
  rationale: El referente son los hermanos sometidos al tormento. «Jóvenes» comunica edad y evita sonar redundante o excesivamente marcado en español; el masculino plural se entiende por el contexto.
- source_word: φρίττομεν
  english_pob_choice: shudder
  chosen_spanish: nos estremecemos
  alternatives_spanish:
  - temblamos
  - nos horrorizamos
  - retrocedemos con horror
  lexicon: LSJ
  rationale: El verbo expresa una reacción corporal de horror. «Nos estremecemos» reproduce bien la impresión física y mantiene un tono natural en español moderno.
- source_word: ὁρῶντες
  english_pob_choice: seeing it
  chosen_spanish: al verla
  alternatives_spanish:
  - viéndola
  - al observarla
  - al contemplarla
  lexicon: BDAG
  rationale: El participio contrasta con «oír» y abre la secuencia de percepciones. «Al verla» es idiomático y mantiene la relación con el sufrimiento mencionado antes.
- source_word: παραχρῆμα
  english_pob_choice: immediate
  chosen_spanish: inmediata
  alternatives_spanish:
  - al instante
  - en el acto
  - del momento
  lexicon: LSJ
  rationale: El adverbio subraya la inmediatez del aviso. «Inmediata» conserva el valor temporal sin volver pesada la frase en español.
- source_word: ἀπειλῆς λόγον
  english_pob_choice: word of threat
  chosen_spanish: palabra de amenaza
  alternatives_spanish:
  - palabra amenazante
  - mensaje de amenaza
  - amenaza
  lexicon: BDAG
  rationale: La expresión griega literalmente combina idea de palabra/discurso con amenaza. «Palabra de amenaza» preserva esa forma compacta y evita diluir la imagen retórica en un simple «amenaza».
- source_word: πάσχοντες
  english_pob_choice: suffering it
  chosen_spanish: al sufrirla
  alternatives_spanish:
  - padeciéndola
  - soportándola
  - sufriéndola
  lexicon: BDAG
  rationale: 'El participio culmina el contraste: no solo la perciben, sino que la experimentan. «Al sufrirla» enlaza con «aflicción» y mantiene la referencia al padecimiento directo.'
translation_notes:
  revision_awareness: La versión española sigue la sintaxis incompleta del griego, preservando el corte final abierto. Se armonizó θλῖψις con «aflicción», en consonancia con la revisión inglesa más formal, y se mantuvo el paralelismo entre ver, oír y sufrir.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se evitó «tribulación» por su posible carga litúrgica en español.
  - 'Se conservó el contraste perceptivo del griego: ver, oír y sufrir.'
  - El final queda deliberadamente abierto porque el período griego también queda inconcluso.
