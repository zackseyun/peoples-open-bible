translation:
  language: es
  text: o en la urdimbre o en la trama[a] del lino[b] o de la lana, o en cuero[c], o en cualquier objeto hecho de cuero—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tejido transversal’. El término hebreo se refiere a los hilos transversales en una tela tejida.
    reason: lexical_alternative
  - marker: b
    text: ‘Lino’ traduce un término que más literalmente puede denotar la fibra de lino; aquí probablemente se refiere al material textil hecho de ella.
    reason: lexical_alternative
  - marker: c
    text: O ‘cualquier pieza de cuero’ o, más formalmente, ‘cualquier obra de cuero’.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתִי
  english_pob_choice: warp
  chosen_spanish: urdimbre
  alternatives_spanish:
  - hilos de urdimbre
  - urdimbre (hilos longitudinales)
  lexicon: HALOT
  rationale: En español técnico de tejidos, 'urdimbre' comunica de forma natural los hilos longitudinales, equivalente funcional de 'warp'. Mantiene la oposición tradicional con 'trama' sin perder claridad.
- source_word: עֵרֶב
  english_pob_choice: woof
  chosen_spanish: trama
  alternatives_spanish:
  - tejido cruzado
  - trama (weft)
  lexicon: HALOT
  rationale: '''Trama'' es el término español estándar para los hilos transversales que pasan por la urdimbre. Evita un calco poco idiomático y preserva la pareja técnica urdimbre/trama.'
- source_word: לַפִּשְׁתִּים
  english_pob_choice: of the linen
  chosen_spanish: del lino
  alternatives_spanish:
  - del lino tejido
  - de la tela de lino
  lexicon: HALOT
  rationale: Aunque el término hebreo puede remitir literalmente al flax/lino como planta o materia prima, en este contexto de materiales tejidos inspeccionados la referencia natural en español es 'lino'.
- source_word: וְלַצָּמֶר
  english_pob_choice: or of the wool
  chosen_spanish: o de la lana
  alternatives_spanish:
  - o del tejido de lana
  - o de la lana
  lexicon: HALOT
  rationale: צֶמֶר significa 'lana'. La coordinación con 'del lino' exige la conjunción 'o' para reflejar la lista de materiales posibles.
- source_word: עוֹר
  english_pob_choice: leather
  chosen_spanish: cuero
  alternatives_spanish:
  - piel
  - cuero tratado
  lexicon: HALOT
  rationale: En legislación de pureza, עוֹר suele aludir al material trabajado utilizable, por lo que 'cuero' es más preciso que 'piel' o 'hide'. Mantuve la forma breve en el primer miembro de la lista y amplié el segundo para claridad.
- source_word: בְּכָל מְלֶאכֶת עוֹר
  english_pob_choice: in any article made of leather
  chosen_spanish: en cualquier objeto hecho de cuero
  alternatives_spanish:
  - en cualquier artículo de cuero
  - en cualquier obra de cuero
  lexicon: HALOT
  rationale: מְלֶאכֶת aquí apunta a un producto manufacturado, no a la actividad de trabajar. 'Objeto hecho de cuero' reproduce bien la idea de cualquier pieza elaborada con ese material y es natural en español.
- source_word: אוֹ ... אוֹ
  english_pob_choice: or ... or
  chosen_spanish: o ... o
  alternatives_spanish:
  - o ... o
  lexicon: HALOT
  rationale: La repetición de 'o' conserva la estructura enumerativa del hebreo y marca con claridad las alternativas de materiales.
translation_notes:
  revision_awareness: El texto base en inglés ya había fijado una solución estable y el control cruzado reporta alto acuerdo (1.0) sin revisiones aplicadas. La versión española sigue esa línea, ajustando solo la idiomaticidad natural del español y manteniendo las distinciones textiles y materiales del hebreo.
  spanish_consistency_notes:
  - Se conserva la estructura repetitiva de alternativas ('o ... o') para reflejar la sintaxis del hebreo.
  - Se mantiene la terminología textil técnica 'urdimbre/trama' para no perder el paralelismo semántico con 'warp/woof'.
  - '''Cuero'' se usa de forma consistente para עוֹר en el contexto de materiales manufacturados.'
  - Las notas al pie preservan las alternativas lexicográficas documentadas por el POB en inglés y se anclan donde el español también presenta ambigüedad.
  - El guion final reproduce el cierre abrupto del versículo en la fuente hebrea/inglesa.
