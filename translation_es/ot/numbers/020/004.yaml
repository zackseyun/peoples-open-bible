revisions:
- from: ¿Y por qué han traído a la asamblea de Yahvé a este desierto[a], para que nosotros y nuestro ganado muramos allí?
  to: ¿Y por qué han traído a la asamblea de Yahvé a esta región desolada[a], para que nosotros y nuestro ganado muramos allí?
  rationale: Se revisa únicamente el equivalente de הַמִּדְבָּר הַזֶּה para alinearlo mejor con la decisión auditada de evitar una noción demasiado estrecha de «desert». «Esta región desolada» comunica un lugar inhóspito sin reducir indebidamente el campo semántico. Se preserva «este desierto» en nota como alternativa más tradicional y breve.
  reviewer_model: gpt-5.4
