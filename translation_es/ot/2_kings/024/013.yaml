  text: וַ/יּוֹצֵ֣א מִ/שָּׁ֗ם אֶת כָּל אוֹצְרוֹת֙ בֵּ֣ית יְהוָ֔ה וְ/אֽוֹצְר֖וֹת בֵּ֣ית הַ/מֶּ֑לֶךְ וַ/יְקַצֵּ֞ץ אֶת כָּל כְּלֵ֣י הַ/זָּהָ֗ב אֲשֶׁ֨ר עָשָׂ֜ה שְׁלֹמֹ֤ה מֶֽלֶךְ יִשְׂרָאֵל֙ בְּ/הֵיכַ֣ל יְהוָ֔ה כַּֽ/אֲשֶׁ֖ר דִּבֶּ֥ר יְהוָֽה־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/024/013.yaml
  text: And he carried away from there all the treasures of the house of Yahweh and the treasures of the king’s house[a], and he cut in pieces all the gold vessels that Solomon king of Israel had made in the temple of Yahweh[b], just as Yahweh had spoken.
  footnotes:
  - marker: a
    text: Or 'brought out from there' or 'took out from there.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of the LORD' earlier in the verse; here 'temple of the LORD' renders a different Hebrew word, often referring more specifically to the temple structure or sanctuary.
    reason: lexical_alternative
