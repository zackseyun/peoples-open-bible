    text: 'Or: ''and kings on the throne—he seats them forever.'' The Hebrew is compact, and some understand the clause to speak directly of kings rather than of the righteous being seated with kings.'
    reason: alternative_reading
  - marker: b
    text: 'Or: ''and he exalts them.'' The final verb may be understood actively with God as the implied subject.'
