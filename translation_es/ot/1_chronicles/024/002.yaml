translation:
  language: es
  text: Pero Nadab y Abiú murieron antes[a] de su padre, y no tuvieron hijos varones; así que Eleazar e Itamar sirvieron como sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «en presencia de su padre». La expresión hebrea admite una lectura espacial («delante de/en presencia de») o temporal («antes», es decir, en vida de su padre).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - murió
  - fallecieron
  lexicon: HALOT
  rationale: El wayyiqtol de מוּת narra una acción pasada; en español, el plural concuerda con Nadab y Abiú y expresa con naturalidad el evento histórico.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - en presencia de
  - delante de
  - durante la vida de
  lexicon: HALOT
  rationale: La frase con 'su padre' admite una lectura temporal, que en español se expresa de forma natural con 'antes de'; mantiene también la posibilidad contextual de que murieron en vida de su padre.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - de su padre
  - su progenitor
  lexicon: HALOT
  rationale: La referencia es a Aarón como padre de Nadab y Abiú; 'su padre' es idiomático y directo en español.
- source_word: וּבָנִים לֹא הָיוּ לָהֶם
  english_pob_choice: they had no sons
  chosen_spanish: no tuvieron hijos
  alternatives_spanish:
  - no tuvieron hijos varones
  - no tuvieron descendencia
  lexicon: HALOT
  rationale: Aunque בָּנִים significa literalmente 'hijos/varones', en español 'hijos' comunica bien la ausencia de descendencia y evita una dureza innecesaria; la especificación masculina ya está implícita en el contexto sacerdotal y genealógico.
- source_word: וַיְכַהֲנוּ
  english_pob_choice: served as priests
  chosen_spanish: sirvieron como sacerdotes
  alternatives_spanish:
  - oficiaron como sacerdotes
  - ejercieron el sacerdocio
  - ministraron como sacerdotes
  lexicon: HALOT
  rationale: El verbo piel de כָּהַן indica desempeño de función sacerdotal; 'sirvieron como sacerdotes' conserva la idea verbal y es natural en español contemporáneo.
- source_word: אֶלְעָזָר וְאִיתָמָר
  english_pob_choice: Eleazar and Ithamar
  chosen_spanish: Eleazar e Itamar
  alternatives_spanish:
  - Eleazar y Itamar
  lexicon: Convención onomástica española
  rationale: Se transliteran los nombres propios según el uso español estándar; 'e' es la forma eufónica ante Itamar.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés, sin cambios respecto a la lectura principal: la nota mantiene la ambigüedad de לִפְנֵי como alternativa válida. No se detectaron revisiones posteriores que obliguen a ajustar la redacción.'
  spanish_consistency_notes:
  - Se preservó el nombre divino/no aplica en este versículo.
  - Se mantuvo el tono narrativo sobrio y genealógico propio del contexto.
  - La nota usa un marcador único [a] anclado en 'murieron' para reflejar la ambigüedad temporal/espacial de לִפְנֵי.
