translation:
  language: es
  text: y que no fueran como sus padres, una generación obstinada y rebelde, una generación que no enderezó su corazón[a] y cuyo espíritu no fue fiel a Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no preparó su corazón» o «no estableció su corazón».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuyo espíritu no fue constante con Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא יִהְיוּ
  english_pob_choice: and that they should not be
  chosen_spanish: y que no fueran
  alternatives_spanish:
  - y que no fueran a ser
  - y que no fueran como
  lexicon: WLC / HALOT
  rationale: Conserva el valor de propósito/exhortación del contexto en un español natural, sin convertirlo en una paráfrasis libre.
- source_word: כַּאֲבוֹתָם
  english_pob_choice: like their fathers
  chosen_spanish: como sus padres
  alternatives_spanish:
  - como sus antepasados
  - como sus padres y madres
  lexicon: WLC / HALOT
  rationale: «Padres» refleja el paralelo directo del hebreo y mantiene el contraste intergeneracional del salmo. «Antepasados» es posible, pero menos literal.
- source_word: דּוֹר סוֹרֵר וּמֹרֶה
  english_pob_choice: a stubborn and rebellious generation
  chosen_spanish: una generación obstinada y rebelde
  alternatives_spanish:
  - una generación rebelde y obstinada
  - una generación terca y rebelde
  lexicon: WLC / HALOT
  rationale: «Obstinada» y «rebelde» comunican bien la doble descripción del hebreo sin perder el tono poético ni endurecer el texto con términos demasiado técnicos.
- source_word: הֵכִין לִבּוֹ
  english_pob_choice: did not set its heart aright
  chosen_spanish: no enderezó su corazón
  alternatives_spanish:
  - no preparó su corazón
  - no estableció su corazón
  - no puso su corazón en orden
  lexicon: WLC / HALOT
  rationale: «Enderezó su corazón» retiene la metáfora de orientar o disponer correctamente el interior, y evita reducir el sentido a mera disposición intelectual. Se mantiene el paralelismo con «corazón» en vez de sustituirlo por «mente».
- source_word: לֵב / לִבּוֹ
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón interior
  - mente
  - interior
  lexicon: WLC / HALOT
  rationale: «Corazón» es el equivalente bíblico más natural en español para el centro de la voluntad, el juicio y la disposición interior.
- source_word: נֶאֶמְנָה
  english_pob_choice: was faithful
  chosen_spanish: no fue fiel
  alternatives_spanish:
  - no fue leal
  - no fue constante
  - no fue firme
  lexicon: WLC / HALOT
  rationale: «Fiel» reproduce la idea de fidelidad/reliabilidad del hebreo y mantiene la relación con Dios sin sobrecargar el verso.
- source_word: אֶת אֵל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - con Dios
  - para con Dios
  lexicon: WLC / HALOT
  rationale: «A Dios» es la forma más directa y natural en español para expresar la relación de fidelidad indicada por la construcción hebrea.
- source_word: רוּחוֹ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - ánimo
  - disposición
  - ser interior
  lexicon: WLC / HALOT
  rationale: «Espíritu» preserva la antropología bíblica y la distinción poética respecto de «corazón», sin borrar la tensión semántica presente en el hebreo.
theological_decisions:
- issue: Distinción entre «corazón» y «espíritu»
  english_pob_reading: 'Retain both as distinct inner-faculty terms: ''heart'' and ''spirit''.'
  chosen_spanish_reading: Mantener «corazón» y «espíritu» como términos distintos del interior humano.
  alternative_spanish_readings:
  - Unificar ambos como «mente» o «interior»
  - Reducir uno de los dos a una glosa explicativa
  rationale: El hebreo usa dos términos antropológicos relacionados, pero no idénticos. Mantenerlos distingue la dimensión de disposición/decisión («corazón») de la de lealtad interior («espíritu»), preservando el relieve poético y teológico del verso.
  doctrine_reference: Translation philosophy §3, §6
- issue: Acuerdo singular con el sustantivo colectivo «generación»
  english_pob_reading: Use singular pronouns ('its heart,' 'whose spirit') with the collective noun 'generation.'
  chosen_spanish_reading: Conservar la concordancia singular implícita en «generación» con posesivos y verbos singulares.
  alternative_spanish_readings:
  - 'Usar plurales naturales en español: «sus corazones», «sus espíritus»'
  - Reformular para evitar el singular colectivo
  rationale: Aunque el español admite ajustes de concordancia por naturalidad, aquí conviene mantener la singularidad del colectivo para reflejar mejor la estructura del hebreo y la unidad del referente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que sustituyó «set its heart firm» por «set its heart aright» para reflejar mejor el matiz de dirigir o establecer correctamente el corazón. La versión española adopta «no enderezó su corazón» como equivalente idiomático y conserva la distinción entre «corazón» y «espíritu» indicada por el audit trail.
  spanish_consistency_notes:
  - Se mantiene el término bíblico «corazón» para לב, en lugar de «mente» o «interior», por fidelidad antropológica.
  - Se usa «espíritu» para רוּחַ, conservando la tensión con «corazón» y evitando homogeneizar ambos términos.
  - Se prefiere «Dios» para אֵל en coherencia con el contexto y con la decisión inglesa auditada.
  - La nota de «fiel» se formula con un adverbio negativo en español («no fue fiel») para reproducir la estructura del hebreo y del POB inglés.
