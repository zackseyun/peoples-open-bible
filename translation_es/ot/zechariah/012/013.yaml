translation:
  language: es
  text: la familia de la casa de Leví por sí sola, y sus esposas por sí solas; la familia de los de Simeí[a] por sí sola, y sus esposas por sí solas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la familia de Simeí». El hebreo probablemente se refiere al clan de los de Simeí.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפַּחַת
  english_pob_choice: the family of
  chosen_spanish: la familia de
  alternatives_spanish:
  - el clan de
  - la casa de
  lexicon: HALOT
  rationale: La forma constructa introduce un grupo de parentesco ampliado. En español, «la familia de» comunica de manera natural esa unidad de linaje sin forzar un tecnicismo.
- source_word: בֵּית לֵוִי
  english_pob_choice: the house of Levi
  chosen_spanish: la casa de Leví
  alternatives_spanish:
  - la familia de Leví
  - la casa levítica
  lexicon: HALOT
  rationale: Se conserva el valor genealógico de בֵּית con nombre propio, como en el audit trail inglés. «Casa de Leví» mantiene la referencia al linaje más que reducirla solo a la tribu.
- source_word: לְבָד
  english_pob_choice: by itself / by themselves
  chosen_spanish: por sí sola / por sí solas
  alternatives_spanish:
  - aparte
  - sola / solos
  lexicon: HALOT
  rationale: La expresión repetida señala separación. «Por sí sola(s)» es idiomática en español y reproduce bien el matiz de aislamiento o distinción del hebreo.
- source_word: וּנְשֵׁיהֶם
  english_pob_choice: and their wives
  chosen_spanish: y sus esposas
  alternatives_spanish:
  - y sus mujeres
  - y sus mujeres casadas
  lexicon: HALOT
  rationale: En este contexto familiar, «esposas» es la opción más precisa para נָשִׁים con sufijo de tercera persona masculina plural.
- source_word: הַשִּׁמְעִי
  english_pob_choice: the Shimeites
  chosen_spanish: los shimeítas
  alternatives_spanish:
  - la familia de Shimei
  - los descendientes de Simeí
  lexicon: HALOT
  rationale: El término funciona como designación gentilicia/clánica. «Shimeítas» conserva la forma de grupo y refleja la lectura preferida del audit trail inglés, sin perder la posibilidad de entenderse como el clan vinculado con Shimei.
theological_decisions:
- issue: Separación explícita por género en el duelo
  english_pob_reading: Retain the explicit distinction between the male family groups and 'their wives' rather than neutralizing it.
  chosen_spanish_reading: Mantener la distinción explícita entre los grupos familiares masculinos y «sus esposas», sin neutralizarla.
  alternative_spanish_readings:
  - la familia ... y las mujeres por separado
  - cada familia por separado, hombres y mujeres por separado
  rationale: El hebreo distingue de forma reiterada a los grupos familiares de «sus esposas». La redacción española conserva esa tensión y la separación marcada por el texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: 'El texto coincide con el audit trail inglés en su lectura principal: conserva la estructura repetitiva, la separación marcada por לְבָד y la distinción entre los grupos familiares y sus esposas. Se optó por una forma gentilicia española («shimeítas») para reflejar la probable referencia clánica indicada en el expediente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Leví» lleva tilde por acentuación española convencional en nombre bíblico.
  - Se prefirió «esposas» sobre «mujeres» para evitar ambigüedad semántica en el contexto familiar.
