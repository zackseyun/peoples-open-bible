    changes_summary: Revised 'was taken lightly' to 'because of the lightness of her prostitution' to more directly reflect the Hebrew expression and avoid adding an implicit passive. Kept the rest substantially the same for accuracy and natural formal style.
translation:
  language: es
  text: Y por la ligereza de su prostitución[a], ella contaminó la tierra y cometió adulterio con piedra y madera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede leerse también como 'por el ruido/rumor de su prostitución'. La expresión es difícil; puede sugerir notoriedad pública o el hecho de que su prostitución fue tratada como algo trivial.
    reason: alternative_reading
  - marker: b
    text: '''Piedra y madera'' alude a ídolos hechos de esos materiales.'
    reason: cultural_note
lexical_decisions:
- source_word: מִקּוֹל
  english_pob_choice: because ... was taken lightly
  chosen_spanish: debido a la liviandad de
  alternatives_spanish:
  - por el sonido de
  - por el rumor de
  - a causa de la fama/rumor de
  lexicon: HALOT
  rationale: El hebreo expresa una relación causal difícil de llevar literalmente al español. 'Liviandad' conserva la idea de una prostitución tratada como algo trivial o sin peso moral, que es una de las lecturas auditadas en el POB inglés. Se evita una construcción más interpretativa en el texto principal, aunque la ambigüedad queda señalada en la nota.
- source_word: זְנוּתָהּ
  english_pob_choice: her prostitution
  chosen_spanish: su prostitución
  alternatives_spanish:
  - su fornicación
  - su inmoralidad sexual
  - su prostitución cultual
  lexicon: HALOT
  rationale: '''Prostitución'' reproduce con fuerza la metáfora profética y mantiene la forma nominal del hebreo. ''Inmoralidad sexual'' sería más general pero perdería el filo del término; ''prostitución cultual'' añade especificación que el texto no expresa explícitamente.'
- source_word: וַתֶּחֱנַף
  english_pob_choice: she polluted
  chosen_spanish: contaminó
  alternatives_spanish:
  - defiló
  - profanó
  - manchó
  lexicon: HALOT
  rationale: Con 'la tierra' como objeto, 'contaminó' transmite bien el efecto concreto y negativo del verbo en un registro español claro. 'Defiló' también es posible, pero 'contaminó' suena más natural y conserva la idea de corrupción del territorio.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En Jeremías, הארץ suele referirse a la tierra del pueblo en sentido de territorio pactal. 'La tierra' mantiene esa amplitud sin precisar más de lo que el hebreo da.
- source_word: וַתִּנְאַף
  english_pob_choice: committed adultery
  chosen_spanish: cometió adulterio
  alternatives_spanish:
  - adulteró
  - fue adúltera
  - se entregó al adulterio
  lexicon: HALOT
  rationale: '''Cometió adulterio'' es la forma más directa y fiel en español moderno para el verbo נאף. Conserva el lenguaje matrimonial-covenantal del profeta sin volverlo arcaico.'
- source_word: אֶת־הָאֶבֶן וְאֶת־הָעֵץ
  english_pob_choice: with stone and wood
  chosen_spanish: con piedra y madera
  alternatives_spanish:
  - con piedra y árbol
  - con ídolos de piedra y madera
  lexicon: HALOT
  rationale: Se preserva el metonímico 'piedra y madera' como en el hebreo, sin insertar 'ídolos' en el texto principal. 'Con' sigue la fuerza instrumental/comitativa del hebreo y resulta natural en español.
theological_decisions:
- issue: Metáfora profética de adulterio y prostitución para la idolatría
  english_pob_reading: Retain the adultery/prostitution imagery in the main text as a metaphor for covenant unfaithfulness and idolatry.
  chosen_spanish_reading: Conservar en el texto principal la imagen de prostitución y adulterio como metáfora de infidelidad de pacto e idolatría.
  alternative_spanish_readings:
  - Suavizar a 'infidelidad' o 'apostasía' sin lenguaje sexual
  - Explicitar 'idolatría' en el cuerpo del versículo
  rationale: Jeremías usa deliberadamente lenguaje sexual y matrimonial para expresar la ruptura del pacto. Suavizarlo debilitaría la carga profética. A la vez, no se añade 'idolatría' en el texto principal porque el hebreo la deja sugerida por la imagen de piedra y madera.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia implícita de 'piedra y madera'
  english_pob_reading: Leave the materials explicit without inserting 'idols' into the main text.
  chosen_spanish_reading: Mantener los materiales explícitos y aclarar en nota que aluden a ídolos.
  alternative_spanish_readings:
  - con ídolos de piedra y madera
  - con estatuas de piedra y madera
  rationale: El hebreo nombra los materiales como metonimia. La traducción española conserva esa dureza y deja que el lector perciba la ironía profética; la nota aclara la referencia implícita sin reescribir el versículo.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que prefirió una formulación causal más directa para מִקּוֹל ('because of the lightness of her prostitution') en lugar de un pasivo implícito. En español, 'debido a la liviandad de su prostitución' intenta reflejar esa decisión auditada sin introducir una pasiva inexistente en el hebreo. También se mantuvo el metonímico 'piedra y madera' y se añadió nota explicativa, conforme al historial de revisión y a la práctica POB.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino solo cuando aparezca en el contexto; este versículo no lo contiene.
  - '''Prostitución'' y ''adulterio'' se conservaron como metáforas proféticas, no como lenguaje literal desligado del pacto.'
  - '''La tierra'' se mantiene sin ampliar a ''el país'' para respetar el campo semántico de הארץ en Jeremías.'
  - Se evitó añadir 'ídolos' al cuerpo del texto para preservar la metonimia hebrea.
  - El tono es formal y publicable, con puntuación española y sintaxis natural para lectura litúrgica o comunitaria.
