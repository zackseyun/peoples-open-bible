translation:
  language: es
  text: La corona ha caído de nuestra cabeza[a]. ¡Ay de nosotros[b], porque hemos pecado!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La corona de nuestra cabeza cayó». El hebreo usa una expresión poética en constructo, literalmente «la corona de nuestra cabeza».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¡Ay por nosotros!». La expresión es un grito de lamento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָפְלָה
  english_pob_choice: has fallen
  chosen_spanish: ha caído
  alternatives_spanish:
  - cayó
  - ha caído
  lexicon: HALOT
  rationale: El perfecto qal femenino singular expresa una caída ya consumada con fuerza de lamento. «Ha caído» conserva el valor de resultado presente que el inglés POB buscó con el presente perfecto.
- source_word: עֲטֶרֶת
  english_pob_choice: the crown
  chosen_spanish: la corona
  alternatives_spanish:
  - la corona de nuestra cabeza
  - nuestra corona
  - el adorno
  lexicon: HALOT
  rationale: El hebreo está en constructo con רֹאשֵׁנוּ, literalmente «la corona de nuestra cabeza». En español, «la corona» mantiene la imagen y sugiere la pérdida de honor/majestad sin sobredeterminarla.
- source_word: רֹאשֵׁנוּ
  english_pob_choice: our head
  chosen_spanish: nuestra cabeza
  alternatives_spanish:
  - nuestro cabeza
  - nuestras cabezas
  lexicon: HALOT
  rationale: Se conserva el singular colectivo del hebreo, que suena poético en español como «nuestra cabeza». «Nuestras cabezas» suavizaría la imagen y perdería la correspondencia con el constructo singular.
- source_word: אוי נא לנו
  english_pob_choice: Woe to us
  chosen_spanish: ¡Ay de nosotros!
  alternatives_spanish:
  - ¡Woe a nosotros!
  - ¡Alas de nosotros!
  - ¡Ay, ay de nosotros!
  lexicon: HALOT
  rationale: «אוי» es una exclamación de duelo; «נא» intensifica el clamor. «¡Ay de nosotros!» es la exclamación natural y solemne en español para un lamento profético/poético.
- source_word: כי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - for
  lexicon: HALOT
  rationale: 'Aquí introduce la razón de la lamentación: «porque hemos pecado». «Porque» expresa con claridad la causalidad que el hebreo marca.'
- source_word: חָטָֽאנוּ
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  - hemos errado
  lexicon: HALOT
  rationale: El qal perfecto 1cp declara culpa común. «Hemos pecado» es la forma más directa y digna en español, manteniendo el tono confesional sin diluir la gravedad.
theological_decisions:
- issue: Confesión corporativa de culpa
  english_pob_reading: 'The verse is rendered as a communal acknowledgment of guilt: ''for we have sinned.'''
  chosen_spanish_reading: 'El verso se traduce como un reconocimiento comunitario de culpa: «porque hemos pecado».'
  alternative_spanish_readings:
  - como mera lamentación por la desgracia, sin confesión explícita
  - «porque pecamos» como pretérito simple
  rationale: El hebreo expresa explícitamente la causa del lamento en términos de pecado colectivo. La traducción conserva esa confesión sin amplificarla más allá del verso.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del análisis auditado; la concordancia general es alta y no hay objeciones textuales. La versión española sigue de cerca la imagen hebrea y la decisión inglesa de mantener el lamento y la confesión.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este verso no contiene el nombre divino.
  - Se usó «hemos pecado» para conservar la confesión corporativa; no se suavizó a un mero «fallamos».
  - La puntuación exclamativa respeta el tono de lamentación del hebreo.
  - Las notas al pie preservan la alternativa constructa y el matiz interjectivo de אוי/נא.
