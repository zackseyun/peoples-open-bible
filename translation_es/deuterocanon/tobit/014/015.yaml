  - Se conserva «Amén» al final, siguiendo el cierre explícito del griego.
  - El texto evita suavizar la imagen de cautiverio y la tensión histórica de los nombres propios.
  - La puntuación refleja una lectura fluida en español, pero sin añadir información interpretativa extra.
