translation:
  language: es
  text: 'Entonces Saúl dijo: «Acérquense aquí, todos los jefes[a] del pueblo, y sepan y vean cómo[b] ha sucedido este pecado hoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «todas las esquinas del pueblo», un modismo para los jefes, principales o representantes del pueblo.'
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea también puede entenderse como «por medio de qué» o «de qué manera»; el sentido es investigar el medio o la manera en que ocurrió el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּשׁוּ הֲלֹם
  english_pob_choice: Come here
  chosen_spanish: Acercaos aquí
  alternatives_spanish:
  - Venid aquí
  - Acercaos hasta aquí
  lexicon: HALOT
  rationale: El imperativo plural con el deíctico expresa una convocatoria a aproximarse al lugar de Saúl. «Acercaos aquí» suena natural en español y conserva el valor de llamado inmediato.
- source_word: כֹּל פִּנּוֹת הָעָם
  english_pob_choice: all you chiefs of the people
  chosen_spanish: todos los jefes del pueblo
  alternatives_spanish:
  - todos los principales del pueblo
  - todos los dirigentes del pueblo
  - todas las esquinas del pueblo
  lexicon: HALOT
  rationale: El hebreo es idiomático, literalmente «las esquinas del pueblo», con sentido de los representantes o figuras prominentes. «Jefes» comunica bien ese referente en español sin volver la frase absurda o demasiado técnica.
- source_word: וּדְעוּ וּרְאוּ
  english_pob_choice: and know and see
  chosen_spanish: y sabed y ved
  alternatives_spanish:
  - y conoced y ved
  - y averiguad y ved
  lexicon: HALOT
  rationale: Conservo los dos imperativos para reflejar el doble énfasis hebreo en investigar y reconocer. «Sabed y ved» es breve, formal y fiel a la estructura.
- source_word: בַּמָּה
  english_pob_choice: by what
  chosen_spanish: por qué
  alternatives_spanish:
  - por medio de qué
  - a través de qué
  - cómo
  lexicon: HALOT
  rationale: La construcción pregunta por el medio o causa por la cual ocurrió el pecado. En español, «por qué» transmite de forma natural la idea interrogativa causal/instrumental que el contexto requiere; se mantiene la nota explicativa en la nota al pie para no perder la fuerza idiomática del hebreo.
- source_word: הָיְתָה
  english_pob_choice: has happened
  chosen_spanish: ha sucedido
  alternatives_spanish:
  - ha ocurrido
  - ha acontecido
  - se ha producido
  lexicon: HALOT
  rationale: El perfecto hebreo aquí presenta el hecho como ya ocurrido en la situación presente. «Ha sucedido» conserva esa referencia temporal y suena natural en español contemporáneo.
- source_word: הַחַטָּאת הַזֹּאת
  english_pob_choice: this sin
  chosen_spanish: este pecado
  alternatives_spanish:
  - este pecado
  - esta culpa
  - esta ofensa
  lexicon: HALOT
  rationale: «חטאת» designa aquí la acción pecaminosa u ofensa contra Dios. «Pecado» es la forma más directa y teológicamente transparente en español.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Adverbio temporal simple; «hoy» es la equivalencia natural en español moderno.
theological_decisions:
- issue: Interpretación de כֹּל פִּנּוֹת הָעָם como término idiomático para los representantes del pueblo
  english_pob_reading: all you chiefs of the people
  chosen_spanish_reading: todos los jefes del pueblo
  alternative_spanish_readings:
  - todas las esquinas del pueblo
  - todos los principales del pueblo
  - todos los dirigentes del pueblo
  rationale: No se trata de «esquinas» literales, sino de una expresión idiomática para los hombres principales o representantes. Traducirla idiomáticamente evita una lectura oscura y preserva el sentido de convocatoria a los líderes.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor moral y teológico de הַחַטָּאת
  english_pob_reading: this sin
  chosen_spanish_reading: este pecado
  alternative_spanish_readings:
  - esta ofensa
  - esta culpa
  - este mal
  rationale: El contexto narrativo trata una falta real delante de Dios; «pecado» conserva mejor esa carga moral y teológica que opciones más débiles o abstractas.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'He seguido el último pase de revisión del texto inglés en lo esencial: conservé la lectura idiomática para פִּנּוֹת הָעָם con un equivalente español cercano a «chiefs/jefes», y mantuve la interrogación instrumental/causal de בַּמָּה con una nota que deja visible la alternativa «por medio de qué». También preservé la duplicación verbal «sabed y ved» para reflejar el énfasis hebreo.'
  spanish_consistency_notes:
  - Uso «Saúl» como nombre propio estándar en español.
  - He preferido «jefes» sobre «líderes» para acercarme más al valor idiomático de la frase hebrea y a la revisión inglesa.
  - Mantengo «pecado» en vez de «ofensa» o «culpa» para preservar la fuerza teológica del sustantivo hebreo.
  - No se usa «SEÑOR» porque este versículo no contiene el nombre divino.
  - La puntuación y las comillas siguen convenciones editoriales en español.
