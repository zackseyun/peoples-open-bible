    text: O 'Hoshea'. Se conserva aquí la forma española habitual del nombre del rey.
    reason: lexical_alternative
  - marker: b
    text: O 'deportó a Israel a Asiria' o 'exilió a Israel a Asiria'. El verbo hebreo expresa una remoción forzada al exilio.
    reason: lexical_alternative
  - marker: c
    text: O 'y junto al Habor, río de Gozán'. El hebreo también puede describir el asentamiento a lo largo del río Habor en la región de Gozán.
    reason: lexical_alternative
  revision_rationale: 'Se propone una reparación menor: cambiar ''los estableció'' por ''los asentó'' para un español más natural y preciso en contexto de deportación, y añadir la nota alternativa ya documentada en el rastro inglés para la relación entre Habor y Gozán. No se requieren cambios doctrinales ni de fondo.'
