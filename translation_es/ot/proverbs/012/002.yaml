translation:
  language: es
  text: El hombre bueno obtiene favor de Yahvé[a], pero condena al hombre de maquinaciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obtiene beneplácito de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un hombre de maquinaciones»; aquí la expresión probablemente tiene sentido negativo, es decir, una persona caracterizada por planes astutos o malos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - recto
  - bondadoso
  lexicon: HALOT
  rationale: En Proverbios, el adjetivo sustantivado describe el carácter moral de la persona. «Bueno» es el equivalente más natural y amplio en español, sin restringir indebidamente el sentido.
- source_word: יָפִיק
  english_pob_choice: obtains
  chosen_spanish: obtiene
  alternatives_spanish:
  - consigue
  - alcanza
  - hace brotar
  lexicon: HALOT
  rationale: El verbo en contexto expresa que el favor llega a ser recibido por la persona. «Obtiene» conserva la idea de adquisición con un registro claro y sobrio en español.
- source_word: רָצוֹן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - beneplácito
  - agrado
  - buena voluntad
  lexicon: HALOT
  rationale: El sustantivo apunta al favor o aprobación divina. «Favor» reproduce bien la fuerza relacional y la brevedad proverbial del hebreo.
- source_word: מֵיְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de Yahveh
  - de Yavé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la terminología del proyecto, manteniendo el valor del Tetragrámaton sin sustituirlo por una convención de ocultamiento.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: El hebreo usa masculino singular representativo, propio de una máxima sapiencial. «El hombre» preserva la forma y el paralelismo del proverbio.
- source_word: מְזִמּוֹת
  english_pob_choice: schemes
  chosen_spanish: maquinaciones
  alternatives_spanish:
  - planes
  - ardides
  - proyectos maliciosos
  lexicon: HALOT
  rationale: En este contexto el término tiene matiz negativo, por contraste con «bueno» y por el juicio final. «Maquinaciones» transmite astucia y planificación sospechosa sin hacer la frase demasiado explicativa.
- source_word: יַרְשִׁיעַ
  english_pob_choice: he condemns
  chosen_spanish: lo condena
  alternatives_spanish:
  - lo declara culpable
  - lo declara impío
  - lo juzga culpable
  lexicon: HALOT
  rationale: El verbo hifil de רשע significa declarar culpable o condenar. En español, «lo condena» mantiene la concisión proverbial y permite que el sujeto implícito siga siendo Yahvé, como en el hebreo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo lleva explícitamente el Tetragrámaton. Siguiendo la política del proyecto, se traslada como «Yahvé» en el texto principal, conservando la identidad del nombre pactal de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sujeto implícito de יַרְשִׁיעַ
  english_pob_reading: 'The implied subject is the LORD: ''but a man of schemes he condemns.'''
  chosen_spanish_reading: 'El sujeto implícito se mantiene en la segunda mitad: «lo condena», entendiendo que Yahvé sigue siendo el agente.'
  alternative_spanish_readings:
  - Yahvé lo condena
  - pero un hombre de maquinaciones es condenado
  rationale: El hebreo omite el sujeto explícito en el segundo colon. Mantener la elipsis con «lo condena» respeta la tersura del paralelismo y evita sobrecargar el versículo, aunque el referente sigue siendo Yahvé por continuidad contextual.
  doctrine_reference: Hebrew parallelism and subject ellipsis in Proverbs 12:2
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el auditorio inglés de POB. La principal decisión fue conservar «Yahvé» en lugar de «SEÑOR», y reflejar el matiz negativo de מְזִמּוֹת con «maquinaciones». También se preservó la elipsis del segundo colon con «lo condena», como en la brevedad del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del Tetragrámaton en el cuerpo principal.
  - Se usa «favor» para רָצוֹן, coherente con el lenguaje sapiencial y con el valor de aprobación divina.
  - Se evita neutralizar אִישׁ a «persona» para conservar la forma masculina representativa del proverbio.
  - «Maquinaciones» se reserva aquí para el matiz negativo de מְזִמּוֹת, sin convertirlo en un término meramente neutral como «planes».
  - La construcción «lo condena» conserva la elipsis del sujeto divino y la densidad poética del hebreo.
