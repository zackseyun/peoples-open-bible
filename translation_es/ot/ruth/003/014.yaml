base_translation:
  language: en
  yaml_path: translation/ot/ruth/003/014.yaml
  text: So she lay at his feet until morning[a], and she got up before one man could recognize another. And he said[b], “Do not let it be known that the woman came to the threshing floor.”
  footnotes:
  - marker: a
    text: Or, “before a man could recognize his companion.” The Hebrew idiom means before people could distinguish one another in the low light.
    reason: lexical_alternative
  - marker: b
    text: The speaker is most likely Boaz from the context, though the Hebrew text says only, “And he said.”
    reason: alternative_reading
