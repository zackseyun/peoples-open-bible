translation:
  language: es
  text: Por tanto[a], he aquí, vienen días en que castigaré las imágenes talladas[b] de Babilonia, y toda su tierra será avergonzada[c], y todos sus caídos caerán en medio de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «visitaré con juicio las imágenes talladas de Babilonia».
    reason: lexical_alternative
  - marker: b
    text: O «los ídolos de Babilonia». El término hebreo se refiere específicamente a imágenes cultuales talladas.
    reason: lexical_alternative
  - marker: c
    text: O «toda su tierra quedará avergonzada» o «será deshonrada».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Mantiene la conexión inferencial con el contexto anterior y suena natural en español bíblico contemporáneo sin perder formalidad.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mira
  lexicon: HALOT
  rationale: Conserva la fuerza de atención del deíctico profético con un giro idiomático reverente y reconocible en español.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - están por venir días
  lexicon: HALOT
  rationale: Reproduce la fórmula profética de futuro inminente de forma natural en español, sin alargarla innecesariamente.
- source_word: וּפָקַדְתִּי עַל
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - haré rendir cuentas a
  - visitaré con juicio sobre
  lexicon: HALOT
  rationale: En contexto judicial, פקד על expresa intervención punitiva. «Castigaré» comunica bien ese sentido y evita una perífrasis pesada.
- source_word: פְּסִילֵי
  english_pob_choice: the carved images
  chosen_spanish: las imágenes talladas
  alternatives_spanish:
  - los ídolos
  - las imágenes esculpidas
  - los ídolos tallados
  lexicon: HALOT
  rationale: «Imágenes talladas» conserva el rasgo material y concreto del término hebreo mejor que el más genérico «ídolos», y se ajusta al audit trail en inglés.
- source_word: בָבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico, claro para el lector moderno.
- source_word: וְכָל אַרְצָהּ
  english_pob_choice: all her land
  chosen_spanish: toda su tierra
  alternatives_spanish:
  - toda su región
  - todo su territorio
  lexicon: HALOT
  rationale: אַרֶץ aquí denota el territorio de Babilonia; «toda su tierra» preserva la personificación femenina y el alcance territorial.
- source_word: תֵּבֹשׁ
  english_pob_choice: will be put to shame
  chosen_spanish: será avergonzada
  alternatives_spanish:
  - quedará avergonzada
  - será humillada
  lexicon: HALOT
  rationale: El verbo hebreo expresa vergüenza/deshonra. En español, con «tierra» como sujeto personificado, «será avergonzada» conserva la fuerza del original y la lectura de la POB de una vergüenza pública.
- source_word: וְכָל חֲלָלֶיהָ
  english_pob_choice: all her slain
  chosen_spanish: todos sus muertos
  alternatives_spanish:
  - todos sus caídos
  - todos sus muertos en batalla
  lexicon: HALOT
  rationale: Aunque חֲלָלִים suele referirse a los caídos muertos en guerra, en español «muertos» resulta natural y no introduce una especificación que el contexto inmediato ya sugiere.
- source_word: יִפְּלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - se desplomarán
  - morirán
  lexicon: HALOT
  rationale: Conserva el verbo básico de caída, incluido el matiz bélico de caer en combate, sin reinterpretarlo como simple muerte.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: «En medio de ella» reproduce la imagen espacial del hebreo y es una equivalencia idiomática natural en español.
theological_decisions:
- issue: Personificación femenina de Babilonia y de su tierra
  english_pob_reading: Retain feminine personification in English where possible ('her land,' 'in her midst')
  chosen_spanish_reading: Mantener la personificación femenina ('su tierra', 'de ella')
  alternative_spanish_readings:
  - neutralizar a 'su territorio' y 'en su interior'
  - usar referencias impersonales
  rationale: El hebreo usa sufijos femeninos para Babilonia y su tierra; conservarlos en español respeta la retórica profética sin añadir o quitar contenido doctrinal.
  doctrine_reference: Consistencia de términos clave y fidelidad retórica al texto fuente
- issue: Posible ambigüedad entre 'idolatría' e 'imágenes talladas'
  english_pob_reading: the carved images / Or 'the idols of Babylon.' The Hebrew term refers specifically to carved cult-images.
  chosen_spanish_reading: imágenes talladas
  alternative_spanish_readings:
  - ídolos
  - imágenes esculpidas
  rationale: La POB inglesa documenta que el término es específicamente de imágenes cultuales talladas. «Imágenes talladas» conserva esa precisión y deja visible la distinción frente a «ídolos» como término más interpretativo.
  doctrine_reference: Decisiones léxicas basadas en el valor concreto del término hebreo
- issue: Verbo de juicio para וּפָקַדְתִּי עַל
  english_pob_reading: I will punish
  chosen_spanish_reading: castigaré
  alternative_spanish_readings:
  - visitaré con juicio
  - haré rendir cuentas
  rationale: El contexto de juicio exige un verbo punitivo. «Castigaré» expresa la acción divina de manera clara y equilibrada en español, sin perder la base judicial del hebreo.
  doctrine_reference: Lectura contextual de פקד en oráculos de juicio
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo ajustó el registro de 'look' a 'behold'; en español se reflejó directamente con 'he aquí'. No hubo cambios sustantivos en el contenido, así que se mantuvo la misma estructura semántica del texto auditado.
  spanish_consistency_notes:
  - Se conservó la personificación femenina de Babilonia con posesivos y pronombres femeninos.
  - Se prefirió un español claro y formal sin recurrir a 'SEÑOR' ni a paráfrasis interpretativas.
  - La imagen de los 'muertos' que 'caerán en medio de ella' mantiene la relación entre juicio y derrota militar implícita en חֲלָלִים.
  - 'Se evitó ''ídolos'' en el texto principal porque el audit trail inglés documenta un referente más concreto: imágenes cultuales talladas.'
