translation:
  language: es
  text: Puso guarniciones en Edom; por todo Edom[a] puso guarniciones, y todo Edom quedó sometido a David. Y Yahvé dio a David la victoria[b] dondequiera que fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los edomitas quedaron sometidos a David». El hebreo dice literalmente «todo Edom», usando el nombre de la nación de manera colectiva para referirse a su pueblo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yahvé salvó o libró a David dondequiera que fue». En este contexto militar, «dio a David la victoria» expresa el sentido de liberación y triunfo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם / שָׂם
  english_pob_choice: placed
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - estableció
  - puso allí
  lexicon: HALOT
  rationale: שׂים es un verbo amplio de ‘poner/colocar/establecer’. En español, ‘puso’ es natural y directo, y conserva la simplicidad del hebreo sin añadir matices no presentes en el verbo.
- source_word: נְצִבִים
  english_pob_choice: garrisons
  chosen_spanish: guarniciones
  alternatives_spanish:
  - puestos militares
  - destacamentos
  - prefectos
  lexicon: HALOT
  rationale: En este contexto de conquista y control territorial, el sentido militar es el más probable. ‘Guarniciones’ transmite mejor la presencia militar establecida que opciones más administrativas como ‘prefectos’.
- source_word: בֶּאֱדוֹם / בְּכָל אֱדוֹם
  english_pob_choice: in Edom / throughout all Edom
  chosen_spanish: en Edom / por todo Edom
  alternatives_spanish:
  - en Edom / en todo Edom
  - entre Edom / por todo Edom
  lexicon: HALOT
  rationale: La preposición ב indica ubicación; ‘por todo Edom’ comunica bien el valor distributivo de בְכָל en un español natural.
- source_word: עֲבָדִים לְדָוִד
  english_pob_choice: servants to David
  chosen_spanish: quedó sometido a David
  alternatives_spanish:
  - fue siervo de David
  - se convirtió en esclavo de David
  - quedó como servidor de David
  lexicon: HALOT
  rationale: La revisión inglesa se alejó de ‘slaves’ hacia ‘servants’ por razones de naturalidad política. En español, ‘quedó sometido’ preserva la idea de subyugación nacional sin usar ‘siervos’, que aquí sonaría suavizado, ni ‘esclavos’, que puede sonar excesivo o menos idiomático en esta construcción colectiva.
- source_word: וַיּוֹשַׁע
  english_pob_choice: gave David victory
  chosen_spanish: dio a David victoria
  alternatives_spanish:
  - salvó a David
  - libró a David
  - concedió victoria a David
  lexicon: HALOT
  rationale: El hifil de ישׁע puede significar ‘salvar/deliver/give victory’. En un resumen militar, ‘dio a David victoria’ es la forma más idiomática y conserva la agencia divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: transliteración del nombre divino como ‘Yahvé’, en lugar de sustituirlo por un título.'
- source_word: בְּכֹל אֲשֶׁר הָלָךְ
  english_pob_choice: wherever he went
  chosen_spanish: en todo lo que fue
  alternatives_spanish:
  - dondequiera que fue
  - en todo lo que anduvo
  - por dondequiera que fue
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y totalizante. ‘En todo lo que fue’ mantiene la cobertura completa del giro, aunque ‘dondequiera que fue’ también sería posible; se eligió una formulación sobria y publicable que evita introducir un matiz militar explícito no exigido por el verbo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. La traducción conserva ese nombre propio en español según la práctica del proyecto y evita la sustitución por un título tradicional.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Valor de עֲבָדִים en un contexto de conquista
  english_pob_reading: servants to David
  chosen_spanish_reading: quedó sometido a David
  alternative_spanish_readings:
  - quedó como siervo de David
  - quedó esclavizado a David
  - se hizo servidor de David
  rationale: La revisión inglesa documenta una tensión entre la fuerza lexical de ‘slave’ y la naturalidad contextual de ‘servant’. En español se resuelve con ‘quedó sometido’, que preserva la idea de dominación política sin borrar la dureza del dominio ni introducir una imagen doméstica o devocional.
  doctrine_reference: 'DOCTRINE.md: עבד / δοῦλος, nota de fuerza semántica en contextos políticos'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que moderó la traducción de עֲבָדִים de ‘slaves’ a ‘servants’ por naturalidad contextual. La versión española mantiene esa intención semántica con ‘quedó sometido’, evitando retroceder a un calco más duro que no está exigido por el estado actual del texto auditado.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - ‘Guarniciones’ conserva el sentido militar de נְצִבִים en un contexto de control territorial.
  - Se evitó ‘SEÑOR’ y ‘Cristo’, sin relevancia en este versículo.
  - La frase final intenta reflejar el hebreo idiomático sin forzar una literalidad antinatural en español.
