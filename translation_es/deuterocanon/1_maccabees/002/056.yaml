translation:
  language: es
  text: Caleb[a], cuando dio testimonio ante la asamblea, recibió la tierra como herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando testificó ante la asamblea».'
