revisions:
- from: Derribó los altares, las Aseras[a] y los ídolos tallados; los desmenuzó hasta hacerlos polvo. También cortó todos los altares de incienso[b] en toda la tierra de Israel. Luego volvió a Jerusalén.
  to: Derribó los altares, las Aseras[a] y las imágenes talladas; las hizo polvo. También cortó todos los altares de incienso[b] en toda la tierra de Israel. Luego volvió a Jerusalén.
  rationale: Se ajusta «ídolos tallados» a «imágenes talladas» para reflejar con mayor precisión פסילים y la decisión léxica auditada. También se reemplaza «los desmenuzó hasta hacerlos polvo» por «las hizo polvo» para que el español señale con mayor claridad que la trituración recae sobre las Aseras y las imágenes talladas, tal como en el hebreo.
