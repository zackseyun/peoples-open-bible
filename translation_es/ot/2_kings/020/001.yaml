revisions:
- from: 'En aquellos días, Ezequías enfermó[a] de muerte. Y el profeta Isaías, hijo de Amós, vino a él y le dijo: «Así dice Yahvé: Pon en orden tu casa, porque morirás; no vivirás».'
  to: 'En aquellos días, Ezequías enfermó y estaba a punto de morir[a]. Y el profeta Isaías, hijo de Amós, vino a él y le dijo: «Así dice Yahvé: Pon en orden tu casa, porque morirás; no vivirás».'
  rationale: Se reemplaza «enfermó de muerte» por «enfermó y estaba a punto de morir» para reflejar con mayor fidelidad y naturalidad la combinación hebrea חָלָה לָמוּת, en línea con el expediente inglés. Se ajusta la nota para explicar mejor el trasfondo literal sin mantener una frase española poco idiomática.
