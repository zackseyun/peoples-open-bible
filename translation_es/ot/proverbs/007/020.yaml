translation:
  language: es
  text: Tomó en su mano una bolsa[a] de dinero; en la luna llena[b] volverá a su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saquito» o «fardo»; el hebreo puede referirse a algo atado que contiene dinero.
    reason: lexical_alternative
  - marker: b
    text: O «en el día señalado»; el término hebreo es difícil y también se ha entendido como «luna nueva», aunque «luna llena» parece ajustarse mejor al contexto aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: צְרוֹר
  english_pob_choice: bag
  chosen_spanish: bolsa
  alternatives_spanish:
  - saco
  - bolsa atada
  - pouch
  lexicon: HALOT
  rationale: El término hebreo designa algo atado que contiene dinero. «Bolsa» comunica de manera natural la imagen concreta en español y preserva la idea de un recipiente para llevar monedas sin sonar arcaico.
- source_word: הַכֶּסֶף
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - monedas
  - tesoro
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar literalmente «plata», aquí funciona como metonimia para fondos de viaje. «Dinero» conserva ese sentido en un español claro y contemporáneo.
- source_word: לָקַח בְיָדוֹ
  english_pob_choice: took ... in his hand
  chosen_spanish: llevó en su mano
  alternatives_spanish:
  - tomó en su mano
  - lo llevó consigo
  lexicon: HALOT
  rationale: El hebreo mantiene una imagen concreta de posesión o transporte. «Llevó en su mano» mantiene la corporalidad del gesto y suena natural en español sin perder el matiz idiomático.
- source_word: לְיוֹם הַכֵּסֶא
  english_pob_choice: at the full moon
  chosen_spanish: al plenilunio
  alternatives_spanish:
  - en la luna llena
  - para el día señalado
  - en la luna nueva
  lexicon: HALOT
  rationale: La lectura es discutida. La POB inglesa opta por «full moon» como mejor ajuste al contexto; «plenilunio» preserva esa lectura de forma breve y elevada en español. Se mantiene la incertidumbre en nota.
- source_word: יָבֹא בֵיתוֹ
  english_pob_choice: he will come home
  chosen_spanish: volverá a su casa
  alternatives_spanish:
  - vendrá a su casa
  - regresará a su casa
  - volverá al hogar
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «vendrá a su casa». «Volverá a su casa» expresa con naturalidad el regreso esperado y conserva el sentido de retorno al hogar.
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en esta revisión final; se conserva su decisión léxica principal para צְרוֹר, הַכֶּסֶף, לְיוֹם הַכֵּסֶא y בֵיתוֹ, incluida la nota sobre la dificultad del término lunar.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma base del proyecto solo cuando aparece el nombre divino; aquí no corresponde.
  - Se evita «SEÑOR» y también «plata» para כֶּסֶף, porque el contexto apunta a dinero/fondos de viaje.
  - «Al plenilunio» mantiene la ambigüedad textual sin introducir una paráfrasis explicativa en el cuerpo del verso.
  - La puntuación separa las dos cláusulas con punto y coma, reflejando la estructura breve del hebreo.
