revisions:
- from: Oíd la instrucción de la boca[a], hijos[b], y el que la guarda no será ciertamente atrapado.
  to: Escuchen la instrucción de la boca[a], hijos, y el que la guarda de ningún modo será atrapado[b].
  rationale: Se corrigió la ubicación de la nota [b] para que corresponda a la negación enfática final, se ajustó el imperativo a «Escuchen» para adecuarlo al español neutral latinoamericano, y se reemplazó «no será ciertamente atrapado» por «de ningún modo será atrapado» para expresar con naturalidad el énfasis de οὐ μὴ.
