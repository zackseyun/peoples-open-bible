  text: וַ/אֲמַרְתֶּ֕ם גַּ֗ם הִנֵּ֛ה עַבְדְּ/ךָ֥ יַעֲקֹ֖ב אַחֲרֵ֑י/נוּ כִּֽי אָמַ֞ר אֲכַפְּרָ֣ה פָנָ֗י/ו בַּ/מִּנְחָה֙ הַ/הֹלֶ֣כֶת לְ/פָנָ֔/י וְ/אַחֲרֵי כֵן֙ אֶרְאֶ֣ה פָנָ֔י/ו אוּלַ֖י יִשָּׂ֥א פָנָֽ/י־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/032/021.yaml
  text: And you shall also say[a], ‘Look, your servant Jacob is behind us,’ for he said, ‘I will appease him with the gift that is going ahead of me, and afterward I will see his face[b]; perhaps he will accept me.’
  footnotes:
  - marker: a
    text: 'Hebrew: ''I will appease his face''—the verb is related to the language of atonement, but here it refers to placating Esau with a gift.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''he will lift up my face,'' that is, ''he will accept me'' or ''show me favor.'''
    reason: lexical_alternative
