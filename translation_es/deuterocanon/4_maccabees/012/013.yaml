translation:
  language: es
  text: ¿No te avergonzaste[a], siendo hombre, bestialísimo, de cortar las lenguas de los que comparten los mismos sufrimientos y han sido formados de los mismos elementos[b], y, después de mutilarlo de ese modo, torturarlo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿No sentiste vergüenza?»; el griego expresa una pregunta de reproche con fuerte peso moral.
    reason: lexical_alternative
  - marker: b
    text: «Elementos» refleja el término filosófico griego στοιχεῖα, que alude a la constitución material común de los seres humanos.
    reason: cultural_note
lexical_decisions:
- source_word: οὐκ ᾐδέσθης
  english_pob_choice: Were you not ashamed
  chosen_spanish: ¿No te avergonzaste
  alternatives_spanish:
  - ¿No sentiste vergüenza
  - ¿No te dio vergüenza
  lexicon: LSJ
  rationale: La pregunta retórica de reproche exige una forma fuerte de vergüenza moral. «Avergonzaste» conserva mejor el peso ético que una simple idea de incomodidad o bochorno.
- source_word: ἄνθρωπος ὢν
  english_pob_choice: though you are a man
  chosen_spanish: siendo hombre
  alternatives_spanish:
  - aunque eres hombre
  - siendo humano
  lexicon: LSJ
  rationale: 'El participio tiene valor concesivo: pese a ser humano, actúa de manera inhumana. «Siendo hombre» mantiene el contraste con la crueldad bestial sin sonar rígido.'
- source_word: θηριωδέστατε
  english_pob_choice: most beastly one
  chosen_spanish: mostruoso en tu crueldad
  alternatives_spanish:
  - bestialísimo
  - el más salvaje
  lexicon: LSJ
  rationale: El griego acusa una crueldad de tipo animal/feroz. En español, «mostruoso en tu crueldad» busca conservar la violencia moral del vocativo sin perder inteligibilidad; «bestialísimo» es posible pero más marcado estilísticamente. Se evita suavizar el insulto.
- source_word: τοὺς ὁμοιοπαθεῖς
  english_pob_choice: those who share the same sufferings
  chosen_spanish: los que comparten los mismos sufrimientos
  alternatives_spanish:
  - tus compañeros de sufrimiento
  - los de igual padecimiento
  lexicon: LSJ
  rationale: En este contexto de martirio y tortura, la referencia es a quienes padecen la misma condición humana bajo violencia. «Comparten los mismos sufrimientos» sigue de cerca el valor contextual del término sin cargarlo de un sentido técnico ajeno.
- source_word: καὶ ἐκ τῶν αὐτῶν γεγονότας στοιχείων
  english_pob_choice: and have come from the same elements
  chosen_spanish: y han salido de los mismos elementos
  alternatives_spanish:
  - y han sido hechos de los mismos elementos
  - y están constituidos por los mismos elementos
  lexicon: LSJ
  rationale: «Elementos» preserva el trasfondo filosófico-anthropológico de στοιχεῖα. «Han salido de» intenta reflejar el participio de origen/llegada de modo natural en español, sin borrar la idea de una constitución material común.
- source_word: γλωττοτομῆσαι
  english_pob_choice: to cut out the tongues
  chosen_spanish: de cortar las lenguas
  alternatives_spanish:
  - de arrancar las lenguas
  - de cercenar las lenguas
  lexicon: LSJ
  rationale: El compuesto indica una acción directa sobre la lengua. «Cortar las lenguas» es claro, natural y suficientemente gráfico en español; se evita una formulación excesivamente técnica o rebuscada.
- source_word: καὶ τοῦτον καταικίσας τὸν τρόπον
  english_pob_choice: and after mutilating him in this way
  chosen_spanish: y, después de mutilarlo de ese modo
  alternatives_spanish:
  - y, tras desfigurarlo así
  - y, después de maltratarlo de ese modo
  lexicon: LSJ
  rationale: «Mutilarlo» comunica la violencia física implícita en el contexto inmediato. El singular «lo» sigue el giro del griego, que parece pasar del grupo a un individuo concreto sometido a tormento.
- source_word: βασανίσαι
  english_pob_choice: to torture him
  chosen_spanish: torturarlo
  alternatives_spanish:
  - atormentarlo
  - someterlo a tortura
  lexicon: LSJ
  rationale: En contextos de martirio, βασανίζω denota tortura severa. «Torturarlo» es el equivalente más directo y fuerte en español.
theological_decisions:
- issue: Contraste antropológico entre ἄνθρωπος ὢν y θηριωδέστατε
  english_pob_reading: Retain the human-versus-beast contrast explicitly with 'though you are a man, most beastly one.'
  chosen_spanish_reading: Mantener el contraste humano-versus-bestial con «siendo hombre… mostruoso en tu crueldad».
  alternative_spanish_readings:
  - aunque eres hombre, el más bestial
  - siendo humano, mostruoso y bestial
  rationale: La fuerza retórica del verso depende de que el acusado, siendo humano, actúa peor que una bestia. La traducción conserva ese contraste explícito sin añadir doctrina ajena al pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de στοιχεῖα como referencia a la constitución material común
  english_pob_reading: Translate as 'elements' in the main text.
  chosen_spanish_reading: Traducir con «elementos» en el texto principal.
  alternative_spanish_readings:
  - constitución material
  - componentes básicos
  rationale: El autor usa lenguaje filosófico sobre el origen o constitución común de los seres humanos. «Elementos» preserva esa textura conceptual y deja visible la tensión interpretativa sin resolverla en exceso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: Se ha revisado el texto para mantener el reproche retórico, el contraste humano-bestial y el valor filosófico de «elementos», siguiendo de cerca la evidencia griega y el audit trail inglés. No se introdujeron cambios textuales que alteren la violencia del pasaje ni se neutralizó la dureza de los verbos.
  spanish_consistency_notes:
  - Se usa «Dios/espíritu/justicia» solo por norma general del proyecto; este versículo no los contiene.
  - Se evita «SEÑOR» o una paráfrasis devocional porque el texto no lo exige.
  - La puntuación reproduce una sola pregunta retórica larga, acorde con el original griego.
