translation:
  language: es
  text: Como un caracol que se derrite al avanzar, como un hijo nacido muerto[a] que no ha visto el sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es difícil en el segundo símil. Literalmente: «el aborto de una mujer; no han visto el sol». Muchas traducciones lo suavizan como «un hijo nacido muerto que no ha visto el sol».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמוֹ
  english_pob_choice: Like
  chosen_spanish: Como
  alternatives_spanish:
  - Tal como
  - Cual
  lexicon: HALOT
  rationale: Introduce una comparación poética directa; «Como» es natural en español y conserva el valor comparativo sin añadir explicaciones.
- source_word: שַׁבְּלוּל
  english_pob_choice: a snail
  chosen_spanish: un caracol
  alternatives_spanish:
  - un baboso
  - una babosa
  lexicon: HALOT
  rationale: La imagen tradicional en español puede expresarse con «caracol», que comunica la criatura lenta y resbaladiza del símil. Se evita mecanizar «babosa» porque suena más específico y menos natural en este contexto poético.
- source_word: תֶּמֶס
  english_pob_choice: that melts away
  chosen_spanish: que se derrite
  alternatives_spanish:
  - que se deshace
  - que se disuelve
  lexicon: HALOT
  rationale: El hebreo apunta a la idea de derretirse/disolverse; «se derrite» mantiene la fuerza visual y el movimiento de desaparición.
- source_word: יַהֲלֹךְ
  english_pob_choice: as it goes
  chosen_spanish: al avanzar
  alternatives_spanish:
  - al ir
  - mientras se mueve
  lexicon: HALOT
  rationale: El verbo indica ir/andar; «al avanzar» suena natural y conserva la acción progresiva del caracol en la comparación.
- source_word: נֵפֶל
  english_pob_choice: a stillborn child
  chosen_spanish: un aborto
  alternatives_spanish:
  - un hijo nacido muerto
  - un mortinato
  lexicon: HALOT
  rationale: El término hebreo denota aborto/miscarriage o feto no nacido. En español, «aborto» conserva el choque poético y la referencia a una vida interrumpida, aunque la ambigüedad se aclara con la construcción siguiente y la nota.
- source_word: אֵשֶׁת
  english_pob_choice: of a woman
  chosen_spanish: de mujer
  alternatives_spanish:
  - de una mujer
  - de la mujer
  lexicon: HALOT
  rationale: En construcción con נֵפֶל, la frase es literalmente «el aborto de mujer». «De mujer» mantiene la concisión hebrea y la dureza del paralelismo.
- source_word: בַּל
  english_pob_choice: who have not
  chosen_spanish: que no ha
  alternatives_spanish:
  - que no han
  - que no
  lexicon: HALOT
  rationale: La sintaxis hebrea es difícil; en español se opta por una oración relativa que haga legible el segundo miembro sin ocultar la dificultad textual. Se mantiene la referencia al sujeto no nacido.
- source_word: חָזוּ
  english_pob_choice: have seen
  chosen_spanish: ha visto
  alternatives_spanish:
  - han visto
  - vio
  lexicon: HALOT
  rationale: Aunque el hebreo tiene plural, el sentido recae sobre el ser no nacido individual o colectivamente; en español se resuelve con singular para concordar con «aborto» y conservar la imagen inteligible.
- source_word: שָׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el sol de la vida
  lexicon: HALOT
  rationale: Traducción directa y estable; en este contexto, «ver el sol» expresa haber llegado a vivir plenamente en el mundo.
theological_decisions:
- issue: Mantenimiento de la dureza del símil y del lenguaje sobre la vida no nacida
  english_pob_reading: a stillborn child that has not seen the sun
  chosen_spanish_reading: un aborto de mujer que no ha visto el sol
  alternative_spanish_readings:
  - un hijo nacido muerto que no ha visto el sol
  - un mortinato que no ha visto el sol
  rationale: El POB inglés suaviza la sintaxis difícil pero conserva el sentido de vida interrumpida. En español se mantiene una formulación fuerte y breve, sin resolver artificialmente la tensión del hebreo. Se evita una paráfrasis más devocional que borre la aspereza poética.
  doctrine_reference: No aplica; decisión de traducción poética y semántica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió una mala asociación sintáctica entre «de mujer» y la cláusula negativa. La versión española coloca la cláusula «que no ha visto el sol» con el segundo miembro y mantiene la dureza del hebreo sin repetir el error revisado.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según los lineamientos del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y otros reemplazos litúrgicos no presentes en el original.
  - Se preservó la estructura paralela del verso con dos comparaciones introducidas por «Como».
  - Se mantuvo un registro poético pero comprensible para lectura eclesial contemporánea.
  - La nota al pie explica la alternativa más común en traducciones castellanas para la segunda comparación.
