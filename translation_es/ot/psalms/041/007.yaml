    issue: «sale afuera» es redundante
    rationale: El verbo «salir» ya expresa el movimiento hacia fuera. Dado que la nota ya explica el hebreo לַחוּץ, es mejor decir «cuando sale» o «cuando sale al exterior».
  - severity: low
    issue: La nota c está bien orientada, pero el anclaje puede mantenerse sin necesidad de la redundancia del texto
    rationale: Se puede conservar la nota léxica sobre «afuera/al exterior» aunque el cuerpo del texto use una formulación más natural.
