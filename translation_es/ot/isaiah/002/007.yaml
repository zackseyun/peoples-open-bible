    rationale: El POB inglés justificó un presente descriptivo/resultativo («is filled»). En español, «está llena» comunica mejor el estado característico de la tierra que «se llena», que sugiere proceso en curso.
  - severity: medium
    issue: «carros» es ambiguo en español contemporáneo.
    rationale: Aunque tiene tradición bíblica, para lectores modernos de América Latina puede evocar vehículos modernos. «Carros de guerra» aclara el referente de מַרְכְּבוֹת en el par «caballos/chariots».
