translation:
  language: es
  text: Porque, cuando los gigantes soberbios perecían en el principio, la esperanza del mundo, refugiándose en una balsa[a], dejó a la era[b] una semilla de generación, guiada por tu mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una embarcación» o «en una pequeña nave». El griego dice σχεδία, un término marcado que denota una balsa más que la palabra usual para un barco o arca.
    reason: lexical_alternative
  - marker: b
    text: O «para la posteridad» o «para la era». El griego distingue aquí κόσμος, «mundo», de αἰών, una era o tiempo continuo; conviene conservar esa diferencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχῆς
  english_pob_choice: in the beginning
  chosen_spanish: en el principio
  alternatives_spanish:
  - desde el principio
  - al comienzo
  lexicon: LSJ
  rationale: El genitivo temporal con γάρ apunta a un momento inicial de la historia primitiva, no a un comienzo metafísico. «En el principio» conserva esa fuerza temporal con naturalidad en español.
- source_word: ἀπολλυμένων
  english_pob_choice: were perishing
  chosen_spanish: perecían
  alternatives_spanish:
  - estaban pereciendo
  - eran destruidos
  lexicon: BDAG
  rationale: El participio expresa una acción en curso. «Perecían» mantiene el aspecto progresivo y es idiomático; evita endurecerlo en una pasiva más interpretativa.
- source_word: ὑπερηφάνων
  english_pob_choice: proud
  chosen_spanish: soberbios
  alternatives_spanish:
  - orgullosos
  - arrogantes
  lexicon: LSJ
  rationale: El término apunta al orgullo desmedido y moralmente reprobable. «Soberbios» comunica bien ese matiz en español bíblico sin perder inteligibilidad.
- source_word: γιγάντων
  english_pob_choice: giants
  chosen_spanish: gigantes
  alternatives_spanish:
  - titanes
  lexicon: LSJ
  rationale: El sentido habitual en este contexto judío helenístico es el de los gigantes primitivos de la tradición de Génesis. «Gigantes» es la equivalencia transparente y evita asociaciones míticas ajenas.
- source_word: ἡ ἐλπὶς τοῦ κόσμου
  english_pob_choice: the hope of the world
  chosen_spanish: la esperanza del mundo
  alternatives_spanish:
  - la esperanza del siglo
  - la esperanza del mundo entero
  lexicon: BDAG
  rationale: Se conserva la expresión personificada y elevada. En español, «la esperanza del mundo» reproduce de forma clara la relación genitiva sin resolver la personificación.
- source_word: ἐπὶ σχεδίας
  english_pob_choice: on a raft
  chosen_spanish: en una balsa
  alternatives_spanish:
  - sobre una balsa
  - en un madero flotante
  lexicon: LSJ
  rationale: σχεδία suele designar una balsa o estructura flotante simple. «En una balsa» preserva el término marcado y sugiere el matiz náutico sin sobreexplicar el arca de forma interpretativa.
- source_word: καταφυγοῦσα
  english_pob_choice: taking refuge
  chosen_spanish: refugiándose
  alternatives_spanish:
  - buscando refugio
  - habiendo buscado refugio
  lexicon: BDAG
  rationale: El participio destaca la búsqueda de seguridad. «Refugiándose» expresa bien ese movimiento y conserva la relación con la protección recibida.
- source_word: ἀπέλιπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó atrás
  - preservó
  lexicon: BDAG
  rationale: El verbo significa de manera directa «dejar». «Dejó» es fiel y no añade una interpretación explícita como «preservó».
- source_word: τῷ αἰῶνι
  english_pob_choice: to the age
  chosen_spanish: al siglo
  alternatives_spanish:
  - a la edad
  - a la era
  - al tiempo venidero
  lexicon: LSJ
  rationale: Aquí αἰών se distingue de κόσμος y se refiere al orden/era histórica que continúa. «Al siglo» mantiene la distinción terminológica en español bíblico y refleja el alcance temporal.
- source_word: σπέρμα γενέσεως
  english_pob_choice: a seed of generation
  chosen_spanish: una semilla de generación
  alternatives_spanish:
  - semilla de descendencia
  - semilla de posteridad
  lexicon: LSJ
  rationale: 'Se conservan las dos imágenes: σπέρμα como «semilla» y γενέσεως como generación/origen. «Una semilla de generación» es literal y deja visible la metáfora de continuidad humana.'
- source_word: τῇ σῇ κυβερνηθείσῃ χειρί
  english_pob_choice: steered by your hand
  chosen_spanish: gobernada por tu mano
  alternatives_spanish:
  - guiada por tu mano
  - pilotada por tu mano
  lexicon: LSJ
  rationale: El participio pasivo de κυβερνάω tiene un trasfondo náutico de dirigir/maniobrar. «Gobernada por tu mano» conserva la agencia divina y la imagen de conducción, sin sonar excesivamente técnica en español.
theological_decisions:
- issue: Referente de «la esperanza del mundo»
  english_pob_reading: A personified reference to Noah/the preserved human remnant through whom humanity continues
  chosen_spanish_reading: Una referencia personificada a Noé o al remanente humano preservado por medio del cual continúa la humanidad
  alternative_spanish_readings:
  - Una referencia más abstracta a la esperanza misma sobreviviente al diluvio
  rationale: El participio concuerda con ἐλπίς, pero el contexto funciona de modo concreto y personificado. La traducción conserva la formulación sin resolverla en una paráfrasis, para no borrar la tensión del texto.
  doctrine_reference: Preservar la tensión literaria y teológica sin armonizarla prematuramente.
- issue: Distinción entre κόσμος y αἰών
  english_pob_reading: Translate τῷ αἰῶνι temporally as 'to the age' rather than repeating 'world'
  chosen_spanish_reading: Traducir τῷ αἰῶνι como «al siglo» para diferenciarlo de κόσμος
  alternative_spanish_readings:
  - al mundo
  - a la era
  - a la posteridad
  rationale: El versículo usa ambos términos y conviene no nivelarlos en una sola palabra. «Al siglo» preserva la diferencia semántica y el horizonte temporal que el griego sugiere.
  doctrine_reference: Primacía del original griego y consistencia terminológica.
translation_notes:
  revision_awareness: 'La versión española sigue la lectura revisada del inglés auditado: mantiene el valor temporal de ἀρχῆς, la acción progresiva de ἀπολλυμένων, la distinción entre κόσμος y αἰών, y el carácter marcado de σχεδία. Se evita introducir elementos no presentes en el griego, como «to come» o una expansión interpretativa de la semilla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no aplica.
  - Se conserva «gigantes» para γίγαντες por transparencia léxica.
  - «Balsa» se marca con nota porque el griego no usa el término habitual para arca/barco.
  - «Siglo» se mantiene por la distinción técnica con κόσμος; se ha evitado «mundo» en la segunda mitad del versículo.
