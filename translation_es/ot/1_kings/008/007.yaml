translation:
  language: es
  text: Porque los querubines extendieron sus alas sobre el lugar del arca[a], y los querubines hacían sombra sobre el arca y sus varas desde arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el lugar del arca». La preposición hebrea puede leerse más literalmente como direccional, aunque el contexto favorece el sentido de que las alas se extendían sobre la ubicación del arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce una cláusula explicativa que da razón de la disposición descrita. "Porque" conserva la fuerza causal/explicativa y suena natural en español bíblico actual.
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  - los seres querubines
  lexicon: HALOT
  rationale: Mantiene el término técnico tradicionalmente asentado en español para este ser/figura del santuario, sin rebajarlo a una paráfrasis.
- source_word: פֹּרְשִׂים כְּנָפַיִם
  english_pob_choice: were spreading out their wings
  chosen_spanish: extendían sus alas
  alternatives_spanish:
  - estaban extendiendo sus alas
  - desplegaban sus alas
  lexicon: HALOT
  rationale: El participio hebreo describe una postura o acción continua; en español, el imperfecto "extendían" comunica bien esa escena en curso sin forzar una perífrasis pesada.
- source_word: אֶל מְקוֹם הָאָרוֹן
  english_pob_choice: over the place of the ark
  chosen_spanish: sobre el lugar del arca
  alternatives_spanish:
  - hacia el lugar del arca
  - al lugar del arca
  lexicon: HALOT
  rationale: Sigue la lectura espacial favorecida por el contexto y por la cláusula posterior de cobertura. "Lugar del arca" preserva el matiz locativo que la POB inglesa resolvió como "place of the ark".
- source_word: וַיָּסֹכּוּ
  english_pob_choice: overshadowed
  chosen_spanish: cubrían
  alternatives_spanish:
  - cubrían con sombra
  - sombreaban
  lexicon: HALOT
  rationale: El verbo סכך puede expresar cubrir, proteger o sombrear. En este contexto de los querubines sobre el arca, "cubrían" conserva el movimiento físico de cobertura y evita una expresión más interpretativa que podría sonar extraña en español.
- source_word: עַל הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - sobre el arca
  lexicon: HALOT
  rationale: En español, repetir el objeto directo "el arca" funciona de modo claro junto con el verbo de cobertura; el matiz de "sobre" ya queda sugerido por el contexto y por la frase siguiente.
- source_word: בַּדָּיו
  english_pob_choice: its poles
  chosen_spanish: sus varas
  alternatives_spanish:
  - sus polos
  - sus barras de transporte
  lexicon: HALOT
  rationale: '"Varas" conserva el referente de las barras/palos de transporte del arca con un registro bíblico natural en español. "Poles" sería demasiado técnico o anglicado; "staves" no es idiomático.'
- source_word: מִלְמָעְלָה
  english_pob_choice: from above
  chosen_spanish: desde arriba
  alternatives_spanish:
  - por encima
  - desde lo alto
  lexicon: HALOT
  rationale: Mantiene la orientación vertical del original con una locución clara y natural en español.
theological_decisions:
- issue: Relación espacial entre las alas de los querubines y el arca
  english_pob_reading: the wings extended over the ark's location, with the cherubim overshadowing the ark and its poles from above
  chosen_spanish_reading: las alas se extendían sobre el lugar del arca, y los querubines cubrían el arca y sus varas desde arriba
  alternative_spanish_readings:
  - las alas se extendían hacia el lugar del arca
  - las alas cubrían el arca
  rationale: Se conserva la tensión de la preposición אֶל, que puede leerse direccionalmente o locativamente. La redacción elegida deja abierta la escena espacial sin borrar el valor más literal de "hacia" ni la lectura contextual de cobertura sobre el arca.
  doctrine_reference: Ninguna; decisión de semántica espacial y textual
- issue: Valor del verbo וַיָּסֹכּוּ
  english_pob_reading: overshadowed
  chosen_spanish_reading: cubrían
  alternative_spanish_readings:
  - sombreaban
  - protegían
  rationale: La POB inglesa opta por "overshadowed" para reflejar el sentido de cobertura. En español, "cubrían" comunica el acto físico con claridad y mantiene la imagen sin introducir un tecnicismo poco natural. Se preserva la tensión entre cubrir y sombrear en la nota textual.
  doctrine_reference: Ninguna; decisión léxica-contextual
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que cambió el progresivo por pasado simple y reemplazó "covered" por "overshadowed" para reflejar mejor וַיָּסֹכּוּ. En español, se optó por un imperfecto descriptivo («extendían», «cubrían») que reproduce la escena continua del texto hebreo y mantiene la relación de cobertura sin forzar un participio o una perífrasis menos natural.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" reservado para el tetragrámaton cuando aparezca; aquí no ocurre.
  - '"Querubines" conserva el término técnico estándar en plural.'
  - '"Arca" se usa de manera consistente para הָאָרוֹן en el contexto del templo.'
  - '"Varas" corresponde al elemento de transporte del arca y evita arcaísmos innecesarios.'
