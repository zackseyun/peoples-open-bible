review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la estructura distributiva del hebreo ('cada ... cada ...'), los valores numéricos y la cláusula final de estándar de peso. Sin embargo, 'platillo' para הַקְּעָרָה y 'tazón' para הַמִּזְרָק reducen o desvían el matiz cultual/inventarial del original y del rastro POB en inglés ('plate' / 'basin').
  spanish_quality_summary: El español es claro, pero 'platillo' suena pequeño o doméstico, y 'tazón' también puede sonar demasiado cotidiano. 'Plato' y 'cuenco' leen mejor en registro bíblico neutro y conservan mejor la distinción de recipientes rituales sin tecnicismo excesivo. Además, la frase 'era de dos mil cuatrocientos siclos' se puede mejorar a 'era de dos mil cuatrocientos siclos' o 'sumaba...' ; la forma actual es aceptable, pero la revisión propuesta mantiene naturalidad y cercanía al inglés auditado.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. 'Siclo del santuario' está bien alineado con la política del proyecto y con la decisión inglesa 'according to the shekel of the sanctuary'.
  issues:
  - severity: medium
    issue: '''platillo'' para קְעָרָה'
    rationale: Aunque posible, 'platillo' en español moderno suele sugerir un plato pequeño o contexto doméstico. Para un inventario cultual, 'plato de plata' preserva mejor el valor del recipiente y se acerca más a la decisión inglesa documentada 'plate'.
  - severity: medium
    issue: '''tazón'' para מִזְרָק'
    rationale: '''Tazón'' puede sonar culinario/doméstico. Dado el contexto ritual, ''cuenco'' comunica mejor un recipiente de uso cultual sin tecnicismo innecesario y evita desviarse del sentido de ''basin/bowl''.'
  - severity: low
    issue: Nota al pie anclada en el lugar menos natural
    rationale: La variante 'según el siclo del santuario' corresponde a la frase final בְּשֶׁקֶל הַקֹּדֶשׁ, no al primer número. El marcador debe ir en la frase final, no junto a 'ciento treinta siclos'.
  revised_spanish_text: cada plato de plata pesaba ciento treinta siclos, y cada cuenco setenta; toda la plata de los utensilios era de dos mil cuatrocientos siclos, según el siclo del santuario[a].
  revised_footnotes:
  - marker: a
    text: O, “conforme al siclo del santuario”.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos elecciones léxicas para reflejar mejor los recipientes cultuales del hebreo y del rastro POB en inglés: ''platillo'' → ''plato'', ''tazón'' → ''cuenco''. También se reubica la nota al pie a la frase final, donde realmente pertenece la alternativa de בְּשֶׁקֶל הַקֹּדֶשׁ. No se requiere adjudicación adicional porque el sentido fuente es claro y la reparación es menor.'
