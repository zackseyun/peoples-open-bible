translation:
  language: es
  text: Salieron de Almón-diblatáyim y acamparon en los montes de Abarim[a], delante de Nebo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «frente a Nebo» u «opuesto a Nebo». La preposición hebrea indica una relación espacial sin precisar el matiz exacto en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: En la fórmula itinerante de Números 33, נסע describe reanudar la marcha después de levantar el campamento. «Salieron» transmite bien ese movimiento y suena natural en español sin perder el valor de desplazamiento secuencial.
- source_word: מֵעַלְמֹן דִּבְלָתָיְמָה
  english_pob_choice: from Almon-diblathaim
  chosen_spanish: de Almón-diblatáyim
  alternatives_spanish:
  - de Almón Diblatáyim
  - desde Almón-diblatáyim
  lexicon: HALOT
  rationale: Es un topónimo; por eso se translitera. El guion conserva la unidad del nombre compuesto, como en el audit trail inglés, y la acentuación española ayuda a la lectura sin alterar el nombre.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron el campamento
  lexicon: HALOT
  rationale: חנה en esta secuencia de itinerario significa establecer el campamento. «Acamparon» es la equivalencia española más natural y mantiene la idea de asentarse temporalmente.
- source_word: בְּהָרֵי
  english_pob_choice: in the mountains of
  chosen_spanish: en los montes de
  alternatives_spanish:
  - en las montañas de
  - en la región montañosa de
  lexicon: HALOT
  rationale: El plural constructo de הַר admite «montes» o «montañas». «Montes» conserva un tono bíblico sobrio y sigue bien la construcción locativa.
- source_word: הָעֲבָרִים
  english_pob_choice: Abarim
  chosen_spanish: Abarim
  alternatives_spanish:
  - la cordillera de Abarim
  - los Abarim
  lexicon: HALOT
  rationale: Aquí funciona como nombre geográfico propio, no como término común. Se conserva sin traducir para respetar el uso establecido y evitar introducir una interpretación geográfica no explícita.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - frente a
  - opuesto a
  - antes de
  lexicon: HALOT
  rationale: La preposición señala relación espacial. «Delante de» preserva la idea de posición relativa sin fijar de forma innecesaria si el sentido preciso es «opuesto a» o simplemente «en frente de».
- source_word: נְבוֹ
  english_pob_choice: Nebo
  chosen_spanish: Nebo
  alternatives_spanish:
  - Nebo
  lexicon: HALOT
  rationale: Nombre propio de lugar, transliterado directamente. Se mantiene la forma breve y reconocible del topónimo.
theological_decisions:
- issue: Relación espacial de לִפְנֵי נְבוֹ
  english_pob_reading: before Nebo
  chosen_spanish_reading: delante de Nebo
  alternative_spanish_readings:
  - frente a Nebo
  - opuesto a Nebo
  rationale: El hebreo marca una relación espacial general sin precisar orientación exacta. «Delante de» conserva esa indeterminación, como la nota inglesa que admite varias opciones sin decidir una sola.
  doctrine_reference: No doctrinal; decisión de preposición y relación espacial en el texto itinerario.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el texto hebreo y el audit trail inglés; no se detectaron revisiones aplicadas en la fuente inglesa. La redacción española sigue la fórmula itineraria de Números 33 y conserva la ambigüedad espacial indicada por el hebreo.
  spanish_consistency_notes:
  - Se mantuvo la transliteración de los topónimos propios.
  - Se prefirió «salieron» y «acamparon» por naturalidad y fidelidad a la secuencia itinerante.
  - Se usó «delante de» en el texto y la nota recoge alternativas válidas sin cerrar el sentido espacial.
