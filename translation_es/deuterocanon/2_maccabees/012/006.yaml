revisions:
- from: Y llamando a Dios[a], el juez justo, se presentó contra los asesinos de sus hermanos; de noche incendió el puerto y quemó los barcos, y acuchilló a los que habían huido allí.
  to: E invocando a Dios[a], el juez justo, fue contra los asesinos de sus hermanos; de noche incendió el puerto y quemó los barcos, y atravesó a los que habían huido allí.
  rationale: 'Revisión menor para afinar la fidelidad léxica y el registro español: «invocando» refleja mejor la apelación religiosa a Dios; «fue contra» suena más natural que «se presentó contra»; y «atravesó» evita especificar indebidamente un cuchillo, preservando mejor el valor de ἐξεκέντησεν.'
