translation:
  language: es
  text: Reflexiona sobre el temor del Altísimo y sobre sus mandamientos[a]; medita continuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Si ves a un hombre inteligente, ve temprano a él, y que tu pie desgaste los escalones de sus puertas». El testimonio hebreo conservado aquí difiere sustancialmente del griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִתְבּוֹנַנְתָּ
  english_pob_choice: Reflect on
  chosen_spanish: Reflexiona sobre
  alternatives_spanish:
  - considera
  - presta atención a
  - medita en
  lexicon: HALOT
  rationale: El verbo hitbonen expresa observación atenta y reflexión consciente. «Reflexiona sobre» conserva el sentido contemplativo sin sonar demasiado técnico ni perder la fuerza exhortativa.
- source_word: בְּיִרְאַת
  english_pob_choice: the fear of
  chosen_spanish: el temor de
  alternatives_spanish:
  - la reverencia de
  - el respeto de
  lexicon: HALOT
  rationale: En la literatura sapiencial, יראה suele tener valor religioso-covenantal. «Temor» mantiene el modismo bíblico y su peso teológico mejor que una paráfrasis suavizante.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Altísimo Dios
  - el Más Alto
  lexicon: HALOT
  rationale: עֶלְיוֹן es un título divino establecido. «El Altísimo» es la forma natural y reverente en español, equivalente a «the Most High».
- source_word: וּבְמִצוֹתָיו
  english_pob_choice: on his commandments
  chosen_spanish: sobre sus mandamientos
  alternatives_spanish:
  - y sobre sus mandatos
  - sobre sus preceptos
  lexicon: HALOT
  rationale: La preposición con la conjunción vincula este complemento con el mismo acto de reflexión. «Mandamientos» preserva el registro bíblico y la relación directa con el objeto de la reflexión.
- source_word: וֶהְגֵה
  english_pob_choice: meditate
  chosen_spanish: medita
  alternatives_spanish:
  - medita en
  - pondera
  - piensa
  lexicon: HALOT
  rationale: הגה en contexto sapiencial/devocional expresa meditación continua o murmullo reflexivo. «Medita» es la equivalencia más natural y fiel en español.
- source_word: תָמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - constantemente
  lexicon: HALOT
  rationale: תמיד indica continuidad regular. «Continuamente» conserva el valor durativo sin exagerar ni alterar el ritmo del verso.
theological_decisions:
- issue: Diferencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the extant Hebrew as the primary text, while preserving the Greek as an alternative in a footnote.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal y preservar el griego en una nota alternativa.
  alternative_spanish_readings:
  - Seguir el griego en el texto principal
  - fusionar ambos testimonios en una sola paráfrasis
  rationale: El expediente de POB para Sirácide privilegia el hebreo cuando está disponible. Aquí el griego conserva una tradición paralela sustancialmente distinta; por transparencia, se mantiene como nota, pero el texto principal sigue el hebreo.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek in view'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del expediente: ambas frases nominales, «el temor del Altísimo» y «sus mandamientos», quedan gobernadas por «reflexiona sobre», mientras que «medita continuamente» forma una segunda cláusula independiente. También se reflejó la preferencia del registro bíblico español por «mandamientos» y por el título divino «el Altísimo».'
  spanish_consistency_notes:
  - Se usa «Altísimo» para עֶלְיוֹן en armonía con el estilo bíblico español del proyecto.
  - Se mantiene «mandamientos» para מִצוֹתָיו, evitando alternar con «preceptos» sin necesidad textual.
  - «Reflexiona» y «medita» se distinguen para no fusionar dos verbos de matiz complementario en el hebreo.
  - La nota griega se deja explícita para no ocultar la divergencia textual señalada por el expediente.
