id: AMO.2.7
reference: Amos 2:7
source:
  edition: WLC
  text: הַ/שֹּׁאֲפִ֤ים עַל עֲפַר אֶ֨רֶץ֙ בְּ/רֹ֣אשׁ דַּלִּ֔ים וְ/דֶ֥רֶךְ עֲנָוִ֖ים יַטּ֑וּ וְ/אִ֣ישׁ וְ/אָבִ֗י/ו יֵֽלְכוּ֙ אֶל הַֽ/נַּעֲרָ֔ה לְמַ֥עַן חַלֵּ֖ל אֶת שֵׁ֥ם קָדְשִֽׁ/י־־־־׃
translation:
  text: those who trample the head of the poor into the dust of the earth[a], and turn aside the way of the humble; and a man and his father go in to the same girl[d][c][b], so as to profane my holy name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who pant after the dust of the earth on the head of the poor.' The Hebrew verb can be read more literally as intense craving, but in context it likely describes ruthless oppression.
    reason: lexical_alternative
  - marker: b
    text: Or 'turn aside the path of the afflicted/meek.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'go in to the girl'; this is a sexual euphemism. 'Girl' may also be rendered 'young woman.'
    reason: lexical_alternative
  - marker: d
    text: The verse does not explicitly identify the girl as a cult prostitute or slave, though some interpreters infer exploitation of that kind from the context.
    reason: alternative_reading
lexical_decisions:
- source_word: הַשֹּׁאֲפִים
  chosen: those who trample
  alternatives:
  - those who pant after
  - those who crush
  lexicon: HALOT
  rationale: The participle from שׁאף can denote panting/eager desire, but in this context with 'the head of the poor' and 'dust of the earth' it conveys oppressive action. 'Trample' captures the violent social exploitation in idiomatic English better than the more opaque literal 'pant after.'
- source_word: עַל עֲפַר אֶרֶץ
  chosen: into the dust of the earth
  alternatives:
  - upon the dust of the earth
  - on the dust of the ground
  lexicon: HALOT
  rationale: The phrase is retained concretely. 'Into the dust of the earth' works naturally with 'trample the head,' expressing humiliation and oppression without losing the dust imagery.
- source_word: בְּרֹאשׁ דַּלִּים
  chosen: the head of the poor
  alternatives:
  - on the head of the poor
  - against the head of the weak
  lexicon: HALOT
  rationale: דלים refers to the poor/weak. 'Poor' is the clearest social-economic rendering here. 'Head' is kept literally because it is part of the vivid oppression image.
- source_word: וְדֶרֶךְ עֲנָוִים יַטּוּ
  chosen: and turn aside the way of the humble
  alternatives:
  - and pervert the path of the afflicted
  - and push aside the course of the meek
  lexicon: HALOT
  rationale: דרך often means way/path, and נטה in the Hiphil can mean turn aside or pervert. 'Turn aside the way' preserves the metaphor while remaining readable. ענוים can mean humble, afflicted, or meek; 'humble' is chosen as a broad rendering that preserves both social vulnerability and lowliness.
- source_word: וְאִישׁ וְאָבִיו
  chosen: and a man and his father
  alternatives:
  - and a man and his father together
  lexicon: HALOT
  rationale: The singular nouns are preserved straightforwardly. The construction depicts a shocking shared sexual sin within a family relationship; adding 'together' would over-specify the timing.
- source_word: יֵלְכוּ אֶל הַנַּעֲרָה
  chosen: go in to the same girl
  alternatives:
  - go to the girl
  - go in to the young woman
  lexicon: HALOT
  rationale: 'הלך אל in this context is a sexual euphemism, so ''go in to'' makes the sense clear without vulgarity. נערה can be ''girl'' or ''young woman''; ''girl'' better reflects youth and vulnerability. ''The same'' is supplied in English to make explicit what the Hebrew article implies in context: both are involved with one female.'
- source_word: לְמַעַן חַלֵּל
  chosen: so as to profane
  alternatives:
  - in order to profane
  - thereby profaning
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose. 'So as to profane' preserves the linkage between the act and its desecrating effect.
- source_word: אֶת שֵׁם קָדְשִׁי
  chosen: my holy name
  alternatives:
  - the name of my holiness
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering in English for the Hebrew expression, preserving covenantal and theological force.
