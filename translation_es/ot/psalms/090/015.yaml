translation:
  language: es
  text: Alégranos conforme a los días[a] en que nos has afligido, conforme a los años en que hemos visto la aflicción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme al número de los días...». La construcción hebrea expresa correspondencia o medida proporcional.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la calamidad». El término hebreo puede denotar adversidad, desastre o mal según el contexto; aquí se refiere al sufrimiento experimentado, no al mal moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂמְּחֵנוּ
  english_pob_choice: Make us glad
  chosen_spanish: Haznos alegres
  alternatives_spanish:
  - Alégranos
  - Haznos regocijar
  lexicon: HALOT
  rationale: El piel imperativo con sufijo de 1.ª plural pide una acción causativa dirigida a Dios. "Haznos alegres" conserva el valor de petición y suena natural en español; "alégranos" sería posible, pero "alegres" mantiene mejor el matiz de estado resultante sin perder la fuerza verbal.
- source_word: כִּימוֹת
  english_pob_choice: according to the days
  chosen_spanish: conforme a los días
  alternatives_spanish:
  - según los días
  - como los días
  lexicon: HALOT
  rationale: La preposición כ expresa aquí proporcionalidad o correspondencia. "Conforme a" comunica mejor esa medida en español que una simple comparación estilística.
- source_word: עִנִּיתָנוּ
  english_pob_choice: you have afflicted us
  chosen_spanish: nos has afligido
  alternatives_spanish:
  - nos has humillado
  - nos has oprimido
  lexicon: HALOT
  rationale: ענה en piel puede significar afligir o humillar. En este lamento, "afligido" preserva el sentido de sufrimiento experimentado sin restringirlo a humillación interior ni a opresión externa exclusiva.
- source_word: שְׁנוֹת
  english_pob_choice: according to the years
  chosen_spanish: conforme a los años
  alternatives_spanish:
  - según los años
  - a la medida de los años
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con "días" y la construcción proporcional del hebreo. En español, "conforme a" conserva la medida implícita sin introducir explicación adicional.
- source_word: רָאִינוּ
  english_pob_choice: we have seen
  chosen_spanish: hemos visto
  alternatives_spanish:
  - vimos
  - hemos experimentado
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte bien con pretérito perfecto compuesto en español, manteniendo la experiencia pasada relevante para la súplica presente. "Hemos visto" sigue de cerca el verbo original.
- source_word: רָעָה
  english_pob_choice: trouble
  chosen_spanish: el mal
  alternatives_spanish:
  - la calamidad
  - la desgracia
  - la aflicción
  lexicon: HALOT
  rationale: La palabra hebrea puede denotar mal moral o adversidad/calamidad según el contexto. Aquí, por el paralelismo con la aflicción previa y el tono de lamentación, "el mal" conserva la ambigüedad lexical del original mejor que una sola interpretación más estrecha.
theological_decisions:
- issue: Sentido de רָעָה en relación con la acción de Dios
  english_pob_reading: Rendered as experiential adversity ('trouble') rather than moral evil.
  chosen_spanish_reading: '"el mal" mantiene la ambigüedad entre mal moral y adversidad sufrida, aunque el contexto inclina la lectura hacia la aflicción.'
  alternative_spanish_readings:
  - la calamidad
  - la aflicción
  - la desgracia
  rationale: El texto hebreo no obliga a fijar solo una acepción. La equivalencia española "el mal" permite conservar la tensión léxica documentada, mientras el contexto de lamento y la línea paralela anterior orientan al lector hacia la experiencia de sufrimiento.
  doctrine_reference: 'Principio de traducción POB: no reducir una ambigüedad léxica bien atestiguada cuando el contexto la sostiene; mantener la fuerza del texto sin sobreexplicarla.'
translation_notes:
  revision_awareness: El pasaje inglés fue revisado de "for as many days as" a "according to the days" para reflejar con más precisión la construcción proporcional hebrea. La redacción española adopta esa misma solución con "conforme a". También se tuvo en cuenta que la nota inglesa para רָעָה permite varias posibilidades; en español se optó por mantener la ambigüedad con "el mal".
  spanish_consistency_notes:
  - Se usa "Yahvé" por norma del proyecto, pero este versículo no contiene el nombre divino.
  - '"Alegres" fue preferido sobre "regocijar" para evitar un giro demasiado forzado en español.'
  - '"El mal" conserva la ambivalencia semántica del hebreo; el contexto de aflicción guía la lectura, pero la traducción no la cierra de antemano.'
