  - dominaron
  lexicon: LSJ
  rationale: «Vencieron» expresa la idea de prevalecer o imponerse sobre las torturas con un español claro y solemne.
theological_decisions:
- issue: Relación programática entre razón y piedad en 4 Macabeos
  english_pob_reading: with the reasoning of piety / according to the reasoning of piety
  chosen_spanish_reading: según el razonamiento de la piedad
  alternative_spanish_readings:
  - con el razonamiento de la piedad
  - con pía razón
  rationale: 'Se preserva la tensión conceptual del libro: la razón no se elimina, sino que opera bajo la piedad. «Según» traduce bien el valor normativo/instrumental del dativo sin reducirlo a mera moralidad.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se añadió el matiz enfático de γε τοι con «en verdad», se reflejó τῷ...λογισμῷ con una relación normativa natural en español mediante «según», y χαλεπωτέρων se mantuvo como comparativo simple, sin duplicar la idea de «even».'
  spanish_consistency_notes:
  - 'Se conserva el vocabulario conceptual de 4 Macabeos: «razonamiento», «piedad», «filosofando» y «torturas».'
  - No se sustituyó el campo semántico de εὐσέβεια por «devoción» porque «piedad» mantiene mejor la terminología temática del pasaje.
  - La frase final usa un comparativo claro en español sin añadir intensificadores que no estén en el griego.
