translation:
  language: es
  text: No se vuelvan a los médiums ni a los espiritistas; no los busquen[a], para volverse impuros por ellos. Yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'necromantes' para 'médiums', y 'los que tienen espíritu familiar' o 'hechiceros' para 'espiritistas'. Los términos hebreos se refieren a practicantes prohibidos asociados con consultar a espíritus o a los muertos.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְנוּ
  english_pob_choice: turn to
  chosen_spanish: se vuelvan hacia
  alternatives_spanish:
  - se vuelvan a
  - consulten
  - se dirijan a
  lexicon: HALOT
  rationale: פנה expresa literalmente la idea de volverse o dirigirse. En esta prohibición, 'se vuelvan hacia' conserva el gesto relacional de orientarse hacia prácticas prohibidas sin añadir el matiz específico de 'consultar', que en hebreo está sugerido por el contexto pero no dicho de forma explícita.
- source_word: הָאֹבֹת
  english_pob_choice: mediums
  chosen_spanish: los médiums
  alternatives_spanish:
  - los necromantes
  - los evocadores de espíritus
  - los espíritus de los muertos
  lexicon: HALOT
  rationale: אֹב en estos contextos legales designa a una persona asociada con la comunicación prohibida con los muertos o espíritus. 'Médiums' comunica de forma clara y actual la categoría de practicantes prohibidos, manteniendo el paralelismo con el término siguiente.
- source_word: הַיִּדְּעֹנִים
  english_pob_choice: spiritists
  chosen_spanish: los espiritistas
  alternatives_spanish:
  - los adivinos
  - los que tienen espíritu familiar
  - los hechiceros
  lexicon: HALOT
  rationale: יִדְּעֹנִי apunta a un practicante del conocimiento oculto o de consulta con espíritus. 'Espiritistas' distingue bien este término de אֹב en español y conserva el campo semántico de práctica espiritual ilícita sin recurrir a 'hechiceros', que hoy puede sonar más genérico o desviado.
- source_word: תְּבַקְשׁוּ
  english_pob_choice: seek them out
  chosen_spanish: los busquen
  alternatives_spanish:
  - los procuren
  - los busquen para consultar
  - los inquieran
  lexicon: HALOT
  rationale: בקש significa 'buscar'. 'Los busquen' es natural en español y reproduce el valor de perseguir o procurar acceso a estos practicantes, sin sobreinterpretar con 'consultar'.
- source_word: לְטָמְאָה בָהֶם
  english_pob_choice: to become unclean by them
  chosen_spanish: para hacerse impuros por medio de ellos
  alternatives_spanish:
  - para quedar impuros por ellos
  - para ser contaminados por ellos
  - para volverse inmundos por medio de ellos
  lexicon: HALOT
  rationale: 'El infinitivo constructo de טמא con בָהֶם expresa resultado o propósito: entrar en impureza por relación con ellos. ''Hacerse impuros por medio de ellos'' preserva ese sentido de resultado y evita decidir de antemano entre pureza ritual o contaminación moral, manteniendo la amplitud teológica del hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde en el texto principal como 'Yahvé' para preservar el nombre divino revelado, en consonancia con la política terminológica del proyecto y evitando la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: La segunda persona plural hebrea se expresa en español bíblico natural con 'su Dios' para lectura pública amplia. Conserva la relación de pacto implícita y evita regionalismos deícticos menos neutrales.
theological_decisions:
- issue: Alcance de la impureza producida por el contacto con prácticas ocultistas
  english_pob_reading: Render the result as 'become unclean' without specifying only ritual or only moral impurity.
  chosen_spanish_reading: para hacerse impuros
  alternative_spanish_readings:
  - para hacerse ritualmente impuros
  - para contaminarse moralmente
  - para volverse inmundos
  rationale: El hebreo permite una impureza con resonancia ritual y moral. 'Hacerse impuros' conserva esa amplitud sin reducir la prohibición a una sola categoría de contaminación.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; este borrador mantiene la solución de alto acuerdo del recorrido en inglés y la adapta a un español natural sin perder las tensiones léxicas ni teológicas documentadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del nombre divino, coherente con la política del proyecto.
  - Se evita 'SEÑOR' como sustituto del Tetragrámaton en el texto principal.
  - '''Médiums'' y ''espiritistas'' conservan el paralelismo de dos categorías prohibidas distintas.'
  - '''Hacerse impuros'' preserva la amplitud ritual/moral sin explicitar más de lo que el hebreo exige.'
  - La nota al pie usa un marcador único y aparece anclada en el texto en el lugar correspondiente.
