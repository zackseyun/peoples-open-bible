translation:
  language: es
  text: Y Jonatán se volvió contra los árabes llamados zabadeos, y los atacó, y tomó sus despojos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξέκλινεν
  english_pob_choice: turned aside against
  chosen_spanish: se desvió contra
  alternatives_spanish:
  - se apartó contra
  - se volvió contra
  - marchó contra
  lexicon: LSJ
  rationale: El verbo griego expresa la idea básica de apartarse o girar en otra dirección; en este contexto militar, “se desvió contra” conserva el movimiento direccional y el matiz narrativo de la acción de Jonatán sin reemplazarlo por una formulación más interpretativa que el griego.
- source_word: Ἀράβας
  english_pob_choice: Arabs
  chosen_spanish: árabes
  alternatives_spanish:
  - arabios
  lexicon: LSJ
  rationale: El acusativo plural designa un grupo étnico o tribal. “Árabes” es la forma natural y transparente en español contemporáneo para ese referente.
- source_word: τοὺς καλουμένους
  english_pob_choice: called
  chosen_spanish: llamados
  alternatives_spanish:
  - conocidos como
  - que eran llamados
  lexicon: LSJ
  rationale: El participio identifica al subgrupo por su denominación. “Llamados” es breve, fiel y natural en español; evita añadir una glosa interpretativa innecesaria.
- source_word: Ζαβαδαίους
  english_pob_choice: Zabadeans
  chosen_spanish: los zabadéos
  alternatives_spanish:
  - zabadeanos
  - zabadenses
  lexicon: LSJ
  rationale: Se conserva el etnónimo transliterado para reflejar el nombre propio del grupo en griego. “Zabadéos” ofrece una forma castellana legible y cercana a la fonética del nombre.
- source_word: ἐπάταξεν
  english_pob_choice: struck
  chosen_spanish: los hirió
  alternatives_spanish:
  - los golpeó
  - los derrotó
  - los hirió con golpes
  lexicon: LSJ
  rationale: Aunque el verbo puede traducirse literalmente como “golpear”, en una narración bélica española “hirió” comunica con naturalidad la acción violenta sin añadir la conclusión interpretativa de “derrotó”, que el griego aquí no dice de forma explícita.
- source_word: σκῦλα
  english_pob_choice: spoils
  chosen_spanish: despojos
  alternatives_spanish:
  - botín
  - saqueo
  lexicon: LSJ
  rationale: El sustantivo se refiere a los bienes tomados en guerra. “Despojos” mantiene el valor sustantivo del objeto capturado y es una opción digna y bíblica en español; “botín” también sería posible, pero “despojos” conserva mejor la formalidad del registro.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés presentan alto acuerdo y no requieren corrección textual ni notas de variante; la versión española sigue de cerca la secuencia verbal del original sin ampliar el alcance semántico.
  spanish_consistency_notes:
  - Se mantiene Jonatán como forma española del nombre propio, en concordancia con el uso bíblico estándar en español.
  - Se usa un registro sobrio y narrativo, adecuado para prosa histórica deuterocanónica.
  - No se introducen notas porque el versículo no presenta una variante textual ni una ambigüedad teológica documentada en el material provisto.
