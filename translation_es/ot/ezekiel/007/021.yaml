  - severity: medium
    issue: '''Lo pondré en mano de'' es menos natural y menos fiel al matiz de entrega al poder de otros.'
    rationale: Aunque comprensible, en este contexto de juicio e invasión 'lo entregaré en manos de' representa mejor נתן + ביד en español bíblico natural.
  - severity: low
    issue: El marcador de nota sobre 'perversos' no responde a una ambigüedad relevante del original ni a una necesidad creada en español.
    rationale: El inglés auditado no preserva alternativas aquí, y 'perversos' no genera una ambigüedad que exija nota.
  revised_spanish_text: Y lo entregaré en manos de extranjeros para saqueo, y a los malvados de la tierra[a] para botín; y lo profanarán.
