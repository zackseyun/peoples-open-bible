lexical_decisions:
- source_word: Πάτερ ἡμῶν ὁ ἐν τοῖς οὐρανοῖς
  english_pob_choice: Our Father in the heavens
  chosen_korean: 하늘에 계신 우리 아버지
  alternatives_korean:
  - 하늘에 계신 우리 아버지여
  lexicon: BDAG
  rationale: 주기도의 호격을 한국어에서 자연스럽게 풀되, 「-여」 호격조사를 생략하고 일상감과 친밀성을 살린다. 후속 청원의 「-옵소서」 형식이 호격을 자연스럽게 받는다.
- source_word: ἁγιασθήτω τὸ ὄνομά σου
  english_pob_choice: may your name be treated as holy
  chosen_korean: 이름을 거룩하게 하옵소서
  alternatives_korean:
  - 주의 이름이 거룩히 여김을 받으옵소서
  - 당신의 이름이 거룩하게 되옵소서
  lexicon: BDAG
  rationale: 3인칭 명령 부정과거 수동 ἁγιασθήτω의 청원·수동성을 한국어 「-옵소서」로 살리되, 「하옵소서」는 현대 한국어에서 신적 청원 정형으로 자연스러우면서도 격조를 유지한다. 「-여 거룩히 여김을 받으옵소서」는 과도하게 고풍적이다.
theological_decisions:
- issue: 주기도(6:9-13)의 한국어 정형
  chosen_reading: …하옵소서 (3인칭 수동·1인칭 청원 모두 동일 어말로 봉합)
  alternative_readings:
  - …하소서 / …받으옵소서 (개역개정 정형)
  - …주시기 바랍니다 (해요체)
  rationale: 주기도는 본 번역 전체에서 가장 기억되어야 할 본문이다. 합쇼체 산문 흐름 안에서도 기도문은 「-옵소서」 어말로 자연스럽게 격조를 보존할 수 있다. 6:9-13 다섯 청원 전체에 「-옵소서」 / 「-소서」 어말을 일관 적용해 청각적 통일성과 외움 가능성을 살린다.
  doctrine_reference: 'Korean pipeline policy: preserve memorability while modernizing'
