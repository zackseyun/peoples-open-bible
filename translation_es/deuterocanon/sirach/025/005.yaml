translation:
  language: es
  text: Si en tu juventud no los deseaste[a], ¿cómo los alcanzarás en tu vejez?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un objeto plural no especificado, «los». El paralelo griego sitúa el dicho en el ámbito del juicio y del consejo, por lo que puede tratarse de cualidades o logros relacionados con la sabiduría.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La cláusula hebrea introduce una condición directa; en español, «Si» reproduce mejor la estructura protática que «Cuando».
- source_word: בִּנְעֻרוֹתֶיךָ
  english_pob_choice: in your youth
  chosen_spanish: en tu juventud
  alternatives_spanish:
  - en tus años mozos
  - en tu juventud temprana
  lexicon: HALOT
  rationale: La forma plural con sufijo se refiere al período de juventud; «en tu juventud» es natural en español y conserva el contraste con «tu vejez».
- source_word: לֹא חֲפַצְתָּם
  english_pob_choice: you did not desire them
  chosen_spanish: no los desearas
  alternatives_spanish:
  - no los hubieras deseado
  - no te hubieras deleitado en ellos
  lexicon: HALOT
  rationale: חפץ expresa desear, deleitarse o tomar placer. Dado que el contexto sapiencial conserva el objeto plural implícito, «desearas» mantiene el matiz afectivo y el antecedente no especificado sin añadir «sabiduría» en el texto principal.
- source_word: תַּשִּׁיגֵם
  english_pob_choice: you attain them
  chosen_spanish: los alcanzarás
  alternatives_spanish:
  - los obtendrás
  - los lograrás
  lexicon: HALOT
  rationale: השיג puede significar alcanzar u obtener. «Alcanzar» suena natural con el paralelismo de la pregunta retórica y conserva la idea de llegar a poseerlos.
- source_word: בְּזִקְנוֹתֶיךָ
  english_pob_choice: in your old age
  chosen_spanish: en tu vejez
  alternatives_spanish:
  - en tus años de vejez
  - en la vejez
  lexicon: HALOT
  rationale: La expresión plural con sufijo se refiere al período de vejez; «en tu vejez» es idiomático y mantiene el contraste temporal con «en tu juventud».
theological_decisions:
- issue: Objeto plural implícito de «los» / «them»
  english_pob_reading: Retain the Hebrew's unspecified plural as 'them' without supplying 'wisdom' or 'such things' in the main text.
  chosen_spanish_reading: Mantener «los» sin explicitar «sabiduría» ni otro antecedente en el texto principal.
  alternative_spanish_readings:
  - Si en tu juventud no deseaste la sabiduría, ¿cómo la alcanzarás en tu vejez?
  - Si en tu juventud no los deseaste, ¿cómo obtendrás esas cosas en tu vejez?
  rationale: El hebreo deja el objeto en plural implícito, y el griego orienta el dicho hacia juicio y consejo, pero no obliga a nombrar un objeto concreto. Para conservar la tensión textual y la primacía de la fuente, el español mantiene el pronombre plural sin resolver la referencia.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión textual y no resolver anticipadamente ambigüedades del original.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail, que ajustó la traducción de חפץ desde una idea de «buscar» hacia «desear / tomar placer en». Por eso el español principal usa «desearas» y no explicita el objeto, respetando la ambigüedad documentada. La correspondencia con el griego paralelo se conserva solo en nota, no en el texto principal.
  spanish_consistency_notes:
  - Se prefirió «vejez» y «juventud» para mantener el contraste temporal directo del hebreo.
  - Se evitó «Cristo», «Señor» u այլ terminología no pertinente; el versículo no contiene nombres divinos ni cristológicos.
  - El pronombre plural «los» preserva la referencia abierta del hebreo y la decisión inglesa de no insertar un sustantivo concreto en el cuerpo principal.
