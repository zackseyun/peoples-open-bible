revisions:
- from: Y comenzó el temor de Judas y de sus hermanos[a], y la ruina[b] seguía cayendo sobre las naciones que los rodeaban.
  to: Y comenzó el temor ante Judas y sus hermanos[a], y la ruina[b] seguía cayendo sobre las naciones que los rodeaban.
  rationale: Se ajustó la primera frase para evitar que el español sugiera que Judas y sus hermanos eran quienes sentían temor. «Temor ante Judas y sus hermanos» comunica de forma más natural el valor objetivo/asociativo del genitivo griego. También se suavizó la nota alternativa para que suene idiomática en español.
