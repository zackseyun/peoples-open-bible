    issue: ‘declara el Señor Yahvé’ suena poco natural para אֲדֹנָי יְהוִה
    rationale: Aunque preserva ambos elementos, en español general ‘Señor Yahvé’ no es la solución más clara ni más idiomática. ‘el Señor Dios, Yahvé’ expresa mejor el título אֲדֹנָי y el nombre divino יְהוָה sin ocultarlo.
