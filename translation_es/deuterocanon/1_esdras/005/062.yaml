  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Yahvé' aparece correctamente en la nota. No hay términos teológicos sensibles que requieran ajuste. La decisión sobre 'trompetas' con nota alternativa está bien alineada con el rastro inglés.
