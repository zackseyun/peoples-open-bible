- from: Y hay algunos de quienes no hay recuerdo, y cesaron como si no hubieran cesado[a].
  to: Y hay algunos de quienes no hay recuerdo[a], y cesaron como si hubieran dejado de existir.
  rationale: Se corrige la cláusula final para que exprese desaparición/cesación de existencia en español claro, sin reintroducir en el texto principal toda la expansión griega eliminada en la revisión inglesa. Se conserva la nota textual porque documenta adecuadamente la relación entre el hebreo breve y el griego más amplio.
  reviewer_model: gpt-5.4
