lexical_decisions:
- source_word: ὁμόγνοια
  english_pob_choice: like-mindedness
  chosen_spanish: concordia
  alternatives_spanish:
  - unanimidad
  - un mismo sentir
  - armonía de pensamiento
  lexicon: LSJ
  rationale: El griego expresa estar de acuerdo en la mente o propósito; en español, «concordia» comunica bien esa coincidencia interior sin repetir exactamente el segundo sustantivo. «Unanimidad» podría sonar más técnico o exterior; «un mismo sentir» es posible, pero menos nominal y menos paralelo al sustantivo griego.
- source_word: καλοκἀγαθίας
  english_pob_choice: noble goodness
  chosen_spanish: noble bondad
  alternatives_spanish:
  - virtud
  - bondad virtuosa
  - nobleza y bondad
  lexicon: LSJ
  rationale: 'La forma compuesta conserva dos rasgos: nobleza y bondad moral. «Noble bondad» mantiene ambos componentes de manera natural en español y evita reducir el matiz a un abstracto genérico como «virtud».'
- source_word: ἐπέτεινεν
  english_pob_choice: intensified
  chosen_spanish: intensificó
  alternatives_spanish:
  - fortaleció
  - aumentó
  - extendió
  lexicon: LSJ
  rationale: El verbo puede sugerir extender o aumentar; en este contexto relacional, «intensificó» expresa mejor que la concordia mutua fue hecha más fuerte o más profunda.
- source_word: ὁμόνοιαν
  english_pob_choice: harmony
  chosen_spanish: armonía
  alternatives_spanish:
  - unidad
  - concordia
  - unión
  lexicon: LSJ
  rationale: El sustantivo indica concordia o unidad entre personas. «Armonía» resulta natural en español y mantiene la distinción con ὁμόγνοια al no repetir el mismo término.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: with one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos con otros
  - mutuamente
  - el uno con el otro
  lexicon: LSJ
  rationale: La frase marca relación recíproca. «Entre sí» es conciso, idiomático y adecuado para una concordia mutua.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español y que la nota ancle una alternativa léxica real, coherente con el griego y con el flujo paralelo entre ὁμόγνοια y ὁμόνοια.
  spanish_consistency_notes:
  - 'Se mantuvo la distinción entre ὁμόγνοια y ὁμόνοια con dos términos distintos en español: «concordia» y «armonía».'
  - Se evitó «Cristo», «SEÑOR» y otras terminologías no presentes en el versículo.
  - La sintaxis preserva el orden causal del griego con «Pues», adecuado para un registro bíblico moderno.
