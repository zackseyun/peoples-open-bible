translation:
  language: es
  text: Él es el primero[a] de las obras de Dios; solo su Hacedor puede acercarse a él con la espada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el principal». רֵאשִׁית también puede indicar preeminencia o jefatura, no solo primer lugar temporal.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo del segundo miembro es difícil. También puede significar: «solo su Hacedor puede acercar su espada» o «su Hacedor le proporcionó su espada».'
    reason: alternative_reading
lexical_decisions:
- source_word: רֵאשִׁית
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el comienzo
  - el principal
  lexicon: HALOT
  rationale: En este contexto, רֵאשִׁית expresa primacía o rango primero, no solo inicio temporal. «El primero» conserva la brevedad y permite esa doble posibilidad de precedencia y preeminencia.
- source_word: דַּרְכֵי אֵל
  english_pob_choice: of the works of God
  chosen_spanish: de las obras de Dios
  alternatives_spanish:
  - de los caminos de Dios
  - de los modos de Dios
  lexicon: HALOT
  rationale: דֶּרֶךְ puede referirse a camino, modo o actividad. En un pasaje sobre la creación y la grandeza de la criatura, «obras» comunica mejor en español la idea de actos divinos, siguiendo la decisión inglesa sin perder el campo semántico.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  - el Dios fuerte
  lexicon: HALOT
  rationale: אֵל es un título divino común; «Dios» es la forma natural y fiel en español, sin añadir matiz interpretativo innecesario.
- source_word: הָעֹשׂוֹ
  english_pob_choice: the one who made him
  chosen_spanish: su Hacedor
  alternatives_spanish:
  - el que lo hizo
  - el que lo formó
  lexicon: HALOT
  rationale: El participio con sufijo posesivo admite una referencia personal resumida como «su Hacedor». En español esta opción es idiomática y mantiene la relación de origen entre la criatura y quien la hizo.
- source_word: יַגֵּשׁ
  english_pob_choice: bring near
  chosen_spanish: acercar
  alternatives_spanish:
  - traer cerca
  - presentar
  - acercarse con
  lexicon: HALOT
  rationale: El hifil de נגשׁ significa «hacer acercar / traer cerca». «Acercar» mantiene la fuerza verbal y evita una construcción pesada en español.
- source_word: חַרְבּוֹ
  english_pob_choice: his sword
  chosen_spanish: su espada
  alternatives_spanish:
  - la espada de él
  - la espada
  lexicon: HALOT
  rationale: El sufijo masculino singular se refleja naturalmente como «su espada». La referencia del posesivo queda deliberadamente abierta, como en el hebreo y en la auditoría inglesa.
theological_decisions:
- issue: Sentido del segundo hemistiquio, sintaxis hebrea difícil
  english_pob_reading: only his Maker can bring near his sword
  chosen_spanish_reading: solo su Hacedor puede acercar su espada
  alternative_spanish_readings:
  - solo su Hacedor puede acercarse a él con la espada
  - su Hacedor le proporcionó su espada
  rationale: 'El hebreo permite más de una lectura. La redacción elegida conserva la tensión: puede entenderse como que solo su Hacedor puede tratar con él mediante la espada, o como una referencia al arma que le fue dada. No se fuerza una clarificación doctrinal donde el texto es comprimido y ambiguo.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Designación de Dios en el título אֵל
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Poderoso
  - el Dios fuerte
  rationale: No hay motivo textual para sustituir el título divino por una perífrasis; «Dios» es el equivalente directo y más transparente para el lector español.
  doctrine_reference: DOCTRINE.md §Terminology defaults
translation_notes:
  revision_awareness: 'La auditoría inglesa mantuvo primero «the first of the works of God» y luego revisó el segundo miembro para hacerlo más natural: «only his Maker can bring near his sword». La versión española sigue esa línea revisada, pero procura conservar la ambigüedad del hebreo en una formulación publicable y fiel.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל conforme al estándar del proyecto.
  - «Hacedor» refleja bien el participio con sufijo y es coherente con el registro bíblico en español.
  - Se evita convertir דַּרְכֵי en «caminos» porque en este contexto la decisión inglesa ya documentó el valor de «obras», más claro para el lector.
  - Se conserva la ambigüedad del posesivo «su espada», sin decidir si remite al creador o a la criatura.
