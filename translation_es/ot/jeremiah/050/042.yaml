revisions:
- from: Empuñan arco y jabalina; son crueles y no tendrán compasión. Su voz[a] ruge como el mar, y montan sobre caballos, dispuestos como un hombre para la batalla contra ti, hija de Babilonia.
  to: Empuñan arco y jabalina; son crueles y no tendrán compasión. Su estruendo ruge como el mar, y montan sobre caballos, dispuestos como un hombre[a] para la batalla contra ti, hija de Babilonia.
  rationale: Se corrige «voz» a «estruendo» para reflejar mejor קוֹלָם en contexto de tumulto militar, y se mueve la nota [a] a «como un hombre» porque la alternativa explicada corresponde a כְּאִישׁ. No se requieren cambios doctrinales ni estructurales mayores.
