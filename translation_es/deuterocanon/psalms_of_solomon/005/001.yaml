revisions:
- from: Oh Yahvé Dios[a], alabaré tu nombre con júbilo, en medio de los que conocen tus juicios justos.
  to: Oh Señor Dios, alabaré tu nombre con júbilo, en medio de los que conocen[a] tus juicios justos.
  rationale: Se corrige «Yahvé» a «Señor» porque la evidencia fuente inmediata dice κύριε y no exige restaurar el nombre divino. Se elimina la nota editorial sobre el nombre divino y se restituye la alternativa léxica pertinente para ἐπισταμένων, conforme al audit trail inglés. El resto del versículo se conserva porque refleja fielmente el griego y suena natural en español.
