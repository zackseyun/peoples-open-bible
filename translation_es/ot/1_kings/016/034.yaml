base_translation:
  language: en
  yaml_path: translation/ot/1_kings/016/034.yaml
  text: In his days Hiel of Bethel rebuilt Jericho[a]. At the cost of Abiram his firstborn he laid its foundation, and at the cost of Segub his youngest he set up its gates[b], according to the word of Yahweh that he had spoken through Joshua son of Nun.
  footnotes:
  - marker: a
    text: Or, more literally, 'built Jericho.' 'Rebuilt' reflects the context that Jericho had previously been destroyed.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'in/with Abiram his firstborn ... and in/with Segub his youngest.' The sense is that the rebuilding came at the cost of these sons, in fulfillment of Joshua 6:26.
    reason: alternative_reading
