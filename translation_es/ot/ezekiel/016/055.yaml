translation:
  language: es
  text: Y tus hermanas[a], Sodoma y sus hijas, volverán a su estado anterior; y Samaria y sus hijas volverán a su estado anterior; y tú y tus hijas volverán a su estado anterior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'volverán a su condición anterior'. El hebreo dice más literalmente 'volverán a su estado anterior'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחוֹתַיִךְ
  english_pob_choice: your sisters
  chosen_spanish: tus hermanas
  alternatives_spanish:
  - tus ciudades hermanas
  - tus hermanas (es decir, ciudades emparentadas)
  lexicon: HALOT
  rationale: Conservo el lenguaje familiar literal que el hebreo usa dentro de la personificación de las ciudades. 'Hermanas' mantiene la metáfora sin explicarla en exceso.
- source_word: סְדֹם
  english_pob_choice: Sodom
  chosen_spanish: Sodoma
  lexicon: HALOT
  rationale: Transliteración estándar del topónimo en español.
- source_word: בְנוֹתֶיהָ / בְנוֹתַיִךְ
  english_pob_choice: her daughters / your daughters
  chosen_spanish: sus hijas / tus hijas
  alternatives_spanish:
  - sus ciudades dependientes / tus ciudades dependientes
  - sus poblaciones / tus poblaciones
  lexicon: HALOT
  rationale: Se mantiene 'hijas' para preservar la imagen personificada del texto profético y su paralelismo con 'hermanas'.
- source_word: תָּשֹׁבְןָ / תְּשֻׁבֶינָה
  english_pob_choice: will return
  chosen_spanish: volverán
  alternatives_spanish:
  - serán restauradas
  - volverán atrás
  lexicon: HALOT
  rationale: '''Volverán'' sigue de cerca שוב y conserva la repetición verbal de las tres cláusulas. ''Serán restauradas'' explicita el resultado, pero suaviza la forma verbal del hebreo.'
- source_word: לְקַדְמָתָן / לְקַדְמַתְכֶן
  english_pob_choice: to their former state / to your former state
  chosen_spanish: a su estado anterior / a tu estado anterior
  alternatives_spanish:
  - a su condición anterior / a tu condición anterior
  - a lo que eran antes / a lo que eras antes
  lexicon: HALOT
  rationale: '''Estado anterior'' expresa con naturalidad el valor de קדם en este contexto de reversión/restauración, manteniendo el sentido básico de anterioridad sin sobreinterpretar.'
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  lexicon: HALOT
  rationale: La coordinación simple respeta la serie paralela de tres miembros sin añadir matiz temporal.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  lexicon: HALOT
  rationale: Transliteración estándar del topónimo en español.
theological_decisions:
- issue: Alcance teológico de la 'vuelta' de Sodoma, Samaria y Jerusalén
  english_pob_reading: Rendered as a return to a former state without specifying the mechanism or theological implications of restoration.
  chosen_spanish_reading: Se traduce como una vuelta a un estado anterior sin precisar el mecanismo ni resolver sus implicaciones teológicas.
  alternative_spanish_readings:
  - serán restauradas
  - volverán a ser como antes
  rationale: El hebreo afirma el movimiento de retorno y la frase 'estado anterior'; la POB en inglés preserva esa tensión en lugar de interpretarla. El español debe conservar esa misma apertura.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Alineado con el pasaje inglés auditado: se mantiene el paralelismo triple, el lenguaje personificado de ''hermanas'' e ''hijas'', y la ambigüedad teológica sobre la naturaleza de la restauración. No se detectan revisiones recientes que requieran ajuste.'
  spanish_consistency_notes:
  - Se usa 'Sodoma' y 'Samaria' como topónimos estándar en español.
  - Se evita 'SEÑOR' o 'Cristo' porque no aparecen en este versículo.
  - La nota a pie de página marca la alternativa léxica principal para קַדְמָתָן / קַדְמַתְכֶן.
  - Se conserva la forma plural 'volverán' para reflejar la serie de tres cláusulas paralelas.
