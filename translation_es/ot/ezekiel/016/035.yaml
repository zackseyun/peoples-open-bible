translation:
  language: es
  text: Por tanto, prostituta[a], escucha la palabra de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ramera» o «puta»; el sustantivo hebreo es una metáfora directa y severa de la infidelidad de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Entonces
  - Por consiguiente
  lexicon: HALOT
  rationale: La partícula introduce una conclusión derivada de la acusación previa. «Por tanto» conserva bien el valor inferencial y suena natural en español bíblico contemporáneo.
- source_word: זוֹנָה
  english_pob_choice: prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  - ramera pública
  - ramera/prostituta
  - ramera
  lexicon: HALOT
  rationale: El sustantivo hebreo es una acusación sexual directa y severa. «Prostituta» mantiene la fuerza metafórica con español claro y actual; evita tanto el arcaísmo como la crudeza excesiva de otras opciones.
- source_word: שִׁמְעִי
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atenta
  - escucha atentamente
  lexicon: HALOT
  rationale: El imperativo femenino singular de שׁמע se vierte con un mandato directo. «Escucha» funciona de manera natural en el registro profético y conserva el carácter de llamada inmediata.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra hablada
  lexicon: HALOT
  rationale: En la fórmula profética, דְּבַר יְהוָה se entiende como «la palabra de Yahvé». «La palabra» preserva el idiomático bíblico y la conexión con el habla autoritativa de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se conserva el nombre divino y se adapta la transliteración al español estándar del proyecto: «Yahvé». Esto evita la sustitución por un título y mantiene visible el tetragrámaton.'
theological_decisions:
- issue: El nombre divino YHWH en fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el tetragrámaton, por lo que la traducción debe conservar el nombre propio de Dios. «Yahvé» es la forma establecida para el español en este proyecto y refleja esa decisión sin ocultarla bajo un sustituto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje metafórico sexual aplicado a Jerusalén
  english_pob_reading: prostitute
  chosen_spanish_reading: prostituta
  alternative_spanish_readings:
  - ramera
  - ramera sexual
  - mujer prostituida
  rationale: 'La injuria profética no es un eufemismo: el hebreo emplea un sustantivo sexual directo para denunciar la infidelidad de Jerusalén. «Prostituta» preserva esa dureza sin caer en un registro innecesariamente arcaico o vulgar.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English, not archaic or academic'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios aplicados en la revisión más reciente. Mantengo la lectura principal del inglés POB y ajusto únicamente el español para naturalidad y consistencia con la terminología del proyecto, sin suavizar la acusación ni ocultar el nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la norma del proyecto para יְהוָה.
  - «Prostituta» conserva la severidad del vocativo hebreo y del inglés POB «prostitute».
  - La puntuación reproduce el vocativo directo y la secuencia imperativa del hebreo.
  - «Palabra de Yahvé» mantiene la fórmula profética estándar sin sustituirla por «mensaje» o «Señor».
