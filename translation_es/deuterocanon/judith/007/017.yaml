translation:
  language: es
  text: Y el campamento de los hijos de Amón se puso en marcha[a], y con ellos cinco mil hijos de Asur, y acamparon en el valle[b] y se apoderaron[c] de las aguas y de las fuentes de agua de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los amonitas'. El griego dice literalmente 'los hijos de Amón'.
    reason: lexical_alternative
  - marker: b
    text: El término griego traducido 'valle' también puede significar una hondonada, cañada o llanura cerrada, según el terreno.
    reason: lexical_alternative
  - marker: c
    text: O 'ocuparon' o 'aseguraron de antemano'; el verbo sugiere una toma estratégica de los puntos de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  english_pob_choice: moved on
  chosen_spanish: se puso en marcha
  alternatives_spanish:
  - avanzó
  - partió
  - siguió su camino
  lexicon: LSJ
  rationale: En este contexto narrativo-militar, el verbo sugiere que la tropa levanta el campamento y continúa su desplazamiento. 'Se puso en marcha' conserva ese valor sin volverlo excesivamente coloquial ni más agresivo de lo que permite el griego.
- source_word: ἡ παρεμβολὴ
  english_pob_choice: camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - la hueste
  - el ejército acampado
  lexicon: LSJ
  rationale: '''Campamento'' comunica bien la unidad militar asentada y mantiene la naturalidad en español. Evita imponer ''ejército'' como si el sustantivo designara solo fuerzas combatientes y no el conjunto acampado.'
- source_word: υἱῶν Ἀμμών
  english_pob_choice: sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  lexicon: LSJ
  rationale: Se conserva la construcción literal de parentesco/etnónimo que el griego usa, en paralelo con 'hijos de Israel'. 'Amonitas' es posible, pero atenúa la correspondencia formal con el texto fuente.
- source_word: χιλιάδες πέντε
  english_pob_choice: five thousand
  chosen_spanish: cinco mil
  alternatives_spanish:
  - cinco millares
  lexicon: LSJ
  rationale: Número idiomático en español. 'Cinco mil' expresa directamente el total de combatientes acompañantes sin añadir matices inexistentes.
- source_word: υἱῶν Ἀσσούρ
  english_pob_choice: sons of Asshur
  chosen_spanish: hijos de Asur
  alternatives_spanish:
  - asirios
  - hijos de Asiria
  lexicon: LSJ
  rationale: Se sigue la revisión inglesa que volvió al giro literal 'sons of Asshur'. En español, 'hijos de Asur' preserva la misma relación formal y evita sustituir el etnónimo por una etiqueta más interpretativa.
- source_word: παρενέβαλον
  english_pob_choice: encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - se acuartelaron
  - levantaron campamento
  lexicon: LSJ
  rationale: El verbo describe la acción militar de establecer campamento. 'Acamparon' es claro y fiel; 'levantaron campamento' sonaría bien para ἀπῆρεν, pero aquí el griego ya ha pasado a la acción de acampar.
- source_word: ἐν τῷ αὐλῶνι
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en el hondo
  - en la hondonada
  - en la cañada
  lexicon: LSJ
  rationale: En este contexto geográfico-militar, αὐλών denota un valle o hondonada. 'Valle' es la opción más clara y natural en español, manteniendo la localización estratégica.
- source_word: προκατελάβοντο
  english_pob_choice: seized
  chosen_spanish: se apoderaron de
  alternatives_spanish:
  - ocuparon
  - tomaron posesión de
  - aseguraron por adelantado
  lexicon: LSJ
  rationale: El verbo compuesto implica tomar posesión anticipada, con fuerza estratégica. 'Se apoderaron de' conserva el matiz de ocupación hostil mejor que una simple neutralidad descriptiva.
- source_word: τὰ ὕδατα
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  - los recursos de agua
  lexicon: LSJ
  rationale: Se mantiene el plural del griego, que probablemente designa las aguas o puntos de abastecimiento como conjunto. 'Las aguas' preserva esa pluralidad y encaja con la siguiente mención de las fuentes.
- source_word: τὰς πηγὰς τῶν ὑδάτων
  english_pob_choice: the springs of water
  chosen_spanish: las fuentes de agua
  alternatives_spanish:
  - las fuentes de las aguas
  - los manantiales
  lexicon: LSJ
  rationale: '''Fuentes de agua'' suena natural en español y conserva el sentido de manantiales o nacimientos de agua. Se mantiene el paralelismo con ''las aguas'' sin redundancia excesiva.'
- source_word: τῶν υἱῶν Ἰσραήλ
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de Israel
  - de los israelitas
  lexicon: LSJ
  rationale: Se conserva la formulación literal y el eco covenantal del griego, además de mantener la simetría con 'los hijos de Amón' y 'hijos de Asur'.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa posterior que sustituyó 'Assyrians' por 'sons of Asshur' para una correspondencia más literal con el griego. También se respetó la decisión de mantener la construcción étnica literal 'sons of Ammon' en vez de normalizarla a 'Ammonites'.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo literal de 'hijos de ...' en Amón, Asur e Israel para preservar la textura del griego.
  - '''Aguas'' y ''fuentes de agua'' reproducen la duplicación del original sin fusionar las dos expresiones.'
  - Se evitó 'SEÑOR' o equivalentes porque el versículo no contiene el nombre divino.
  - El tono es narrativo y militar, con sintaxis española fluida pero sin suavizar la acción de ocupación estratégica.
