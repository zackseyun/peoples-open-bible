translation:
  language: es
  text: Por la boca del sabio se habla alabanza[a], y el que la domina la enseñará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «y Yahvé lo prosperará» (o «lo hará prosperar»), lo que difiere de manera importante del segundo hemistiquio hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּפֶה
  english_pob_choice: by the mouth of
  chosen_spanish: por la boca de
  alternatives_spanish:
  - en la boca de
  - de la boca de
  lexicon: HALOT
  rationale: La construcción hebrea con ב + פה expresa el medio o la esfera de la expresión verbal. En español, "por la boca de" conserva la imagen y suena natural en un registro bíblico claro.
- source_word: חָכָם
  english_pob_choice: the wise
  chosen_spanish: el sabio
  alternatives_spanish:
  - los sabios
  - una persona sabia
  lexicon: HALOT
  rationale: El sustantivo/adjetivo singular funciona de modo representativo. "El sabio" mantiene la figura proverbial sin forzar pluralización ni neutralizar demasiado el referente.
- source_word: תֵּאָמֵר
  english_pob_choice: is spoken
  chosen_spanish: se dirá
  alternatives_spanish:
  - será dicha
  - se habla
  lexicon: HALOT
  rationale: El niphal imperfecto permite valor gnómico/proverbial. "Se dirá" comunica bien esa cualidad general en español y conserva la voz pasiva/impersonal del hebreo y del paralelo griego.
- source_word: תְּהִלָּה
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - praise
  - homenaje
  lexicon: HALOT
  rationale: '"Alabanza" es el equivalente natural en español para תְּהִלָּה en este contexto. Mantiene el sentido de elogio verbal sin introducir un objeto explícito que el hebreo no da.'
- source_word: וּמשֵׁל
  english_pob_choice: one who masters it
  chosen_spanish: el que la domina
  alternatives_spanish:
  - el que gobierna sobre ella
  - el que la rige
  lexicon: HALOT
  rationale: El verbo משל puede tener la idea de gobernar, ejercer dominio o tener maestría. Siguiendo la revisión inglesa que pasó de "rules it" a "masters it", "domina" expresa mejor la fuerza verbal y resulta más idiomático en español.
- source_word: בָּהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - en ella
  - sobre ella
  lexicon: HALOT
  rationale: El sufijo femenino singular es ambiguo en cuanto a antecedente. En español se mantiene el referente más cercano y natural en esta estructura, sin resolver artificialmente la ambigüedad más allá de lo que permite el hebreo.
- source_word: יִלַמְּדֶנָּה
  english_pob_choice: will teach it
  chosen_spanish: la enseñará
  alternatives_spanish:
  - la instruirá
  - la dará a conocer
  lexicon: HALOT
  rationale: El verbo למד significa enseñar. "La enseñará" reproduce la relación verbal con el sufijo femenino y conserva el paralelismo conciso del verso.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego en el segundo hemistiquio
  english_pob_reading: 'Follow the extant Hebrew: ''and one who masters it will teach it.'' Greek parallel: ''and the Lord will prosper him/it.'''
  chosen_spanish_reading: 'Seguir el hebreo: «y el que la domina la enseñará».'
  alternative_spanish_readings:
  - «y Yahvé lo prosperará»
  - «y el Señor le hará prosperar»
  rationale: El testimonio hebreo es el texto principal cuando está conservado y es de alta confianza. La lectura griega representa una tradición paralela sustancialmente distinta; por fidelidad al principio de primacía de la fuente original, se preserva en nota sin reemplazar el hebreo.
  doctrine_reference: 'Principio POB: primacía de los idiomas originales y preservación de tensiones textuales documentadas'
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que prefirió 'masters it' sobre 'rules it'. En español, 'domina' conserva esa decisión y evita la rigidez de una traducción más literal como 'rige' o 'gobierna', sin perder la fuerza de משל. También se mantuvo la estructura breve y proverbial del verso.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando la lectura alternativa de la nota alude al nombre divino del paralelo griego/interpretación de κύριος; el texto principal sigue el hebreo y no introduce esa lectura.
  - «Alabanza» se eligió para תְּהִלָּה porque es más natural que «himno de alabanza» y conserva la concisión del verso.
  - La secuencia «el que la domina la enseñará» refleja dos objetos pronominales femeninos distintos en el hebreo; aunque el antecedente es algo ambiguo, se conserva la forma más directa y publicable en español.
