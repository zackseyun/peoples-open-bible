  to: Entonces se levantaron los hombres que habían sido designados por nombre, y se hicieron cargo de los cautivos; y del botín vistieron a todos los que estaban desnudos entre ellos. Los vistieron, les pusieron sandalias, les dieron de comer, les dieron de beber, los ungieron y llevaron sobre asnos a todos los débiles entre ellos. Los llevaron a Jericó, la ciudad de las palmeras, junto a sus hermanos[a]; y luego regresaron a Samaria.
