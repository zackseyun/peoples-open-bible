revisions:
- from: Ahora, las cosas registradas acerca de él[a], y su impureza y su impiedad, están escritas en el libro de las crónicas de los reyes.
  to: Ahora, lo registrado sobre él[a], y su impureza e impiedad, está escrito en el libro de las crónicas de los reyes.
  rationale: 'Se ajusta la redacción para un español más natural y una mejor correspondencia con la fórmula documental del griego: ''lo registrado sobre él'' conserva el valor de τὰ ... ἱστορηθέντα sin rigidez, y ''está escrito'' refleja mejor ἀναγέγραπται como registro asentado. También se elimina el segundo ''su'' por economía natural en español sin perder la doble acusación.'
