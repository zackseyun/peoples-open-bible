theological_decisions:
- issue: Implicit subject from surrounding context
  chosen_reading: he
  alternative_readings:
  - God
  - the Lord
  rationale: The Greek clause continues a sequence of divine judgments in context, with the subject understood from the preceding verses. Rendering the pronoun as 'he' preserves the Greek's flow without importing a title not stated in this clause.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of ἀσεβέσιν
  chosen_reading: those who were going to live ungodly lives
  alternative_readings:
  - the ungodly
  - ungodly people
  rationale: The term denotes impious or ungodly persons. Expanding slightly to 'live ungodly lives' communicates the moral-religious force in readable English while keeping the referent personal.
  doctrine_reference: Translation philosophy §6
