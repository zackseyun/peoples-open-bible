translation:
  language: es
  text: Cuando mi espíritu desfallece dentro de mí[a], tú conoces mi senda. En el camino por donde yo ando, han escondido una trampa para mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando mi espíritu está abrumado dentro de mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «han escondido un lazo para mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/הִתְעַטֵּף
  english_pob_choice: when ... grows faint
  chosen_spanish: Cuando ... desfallece
  alternatives_spanish:
  - Cuando ... se debilita
  - Cuando ... está abrumado
  lexicon: HALOT
  rationale: El infinitivo con ב expresa marco temporal; en español, «Cuando» conserva ese valor. «Desfallece» comunica la idea de debilidad/agotamiento del espíritu sin exagerar ni suavizar el tono del lamento.
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi ser interior
  lexicon: HALOT
  rationale: Aquí רוּחַ se refiere a la vida interior del salmista bajo presión, no al viento físico. «Mi espíritu» es directo, bíblico y claro en español.
- source_word: עָלַי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - sobre mí
  - en mí
  lexicon: HALOT
  rationale: 'Aunque literalmente dice «sobre mí», el sentido idiomático en este contexto es interno: el abatimiento del espíritu. «Dentro de mí» preserva la fuerza de la imagen en español natural.'
- source_word: יָדַעְתָּ
  english_pob_choice: you know
  chosen_spanish: tú conoces
  alternatives_spanish:
  - tú supiste
  - tú has conocido
  lexicon: HALOT
  rationale: El perfecto poético comunica aquí conocimiento vigente; «tú conoces» mantiene la cercanía de la súplica y la lectura presente del verso.
- source_word: נְתִיבָתִי
  english_pob_choice: my path
  chosen_spanish: mi senda
  alternatives_spanish:
  - mi camino
  - mi ruta
  lexicon: HALOT
  rationale: נְתִיבָה denota una senda o huella de paso. «Mi senda» conserva el matiz figurado del curso de vida y evita la repetición con «camino» en la línea siguiente.
- source_word: בְּ/אֹרַח
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - sobre el camino
  lexicon: HALOT
  rationale: אֹרַח es paralelo a «senda» y a menudo significa camino/curso. «En el camino» es natural en español y sostiene la metáfora del andar.
- source_word: ז֥וּ
  english_pob_choice: where
  chosen_spanish: por donde
  alternatives_spanish:
  - donde
  - en el cual
  lexicon: HALOT
  rationale: El relativo introduce la cláusula que modifica el camino. «Por donde» suena natural en español y expresa el trayecto mientras se anda.
- source_word: אֲהַלֵּךְ
  english_pob_choice: I walk
  chosen_spanish: yo ando
  alternatives_spanish:
  - yo camino
  - yo voy
  lexicon: HALOT
  rationale: הלך aquí describe el desplazamiento/conducta continua. «Yo ando» conserva el valor verbal cotidiano y la imagen del caminar sin sonar forzado.
- source_word: טָמְנוּ
  english_pob_choice: they have hidden
  chosen_spanish: han escondido
  alternatives_spanish:
  - han ocultado
  - escondieron
  lexicon: HALOT
  rationale: El verbo señala una acción hostil de ocultar una trampa. «Han escondido» es claro y mantiene la idea de algo puesto en secreto con efecto presente.
- source_word: פַח
  english_pob_choice: a trap
  chosen_spanish: un lazo
  alternatives_spanish:
  - una trampa
  - una red
  lexicon: HALOT
  rationale: פַח es un término de captura que puede referirse a lazo/trampa/snare. «Lazo» es una opción bíblica y comprensible en español, conservando la imagen de atrapamiento; la nota permite la alternativa «trampa».
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - contra mí
  - a mí
  lexicon: HALOT
  rationale: La preposición con sufijo indica que el lazo está preparado con referencia al salmista. «Para mí» es literal y suficientemente claro en español.
theological_decisions:
- issue: Conocimiento presente de Dios sobre el camino del salmista
  english_pob_reading: you know my path
  chosen_spanish_reading: tú conoces mi senda
  alternative_spanish_readings:
  - tú conocías mi senda
  rationale: Se conserva el sentido de conocimiento actual y atento en medio de la aflicción, tal como lo refleja la traducción inglesa auditada.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El control de revisión más reciente indica que el texto inglés quedó sin cambios y el dictamen de cruce fue de alta concordancia; esta versión española sigue esa lectura estable sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; este verso no lo contiene.
  - Se usa «espíritu» para רוּחַ por su sentido interior, no físico.
  - Se traduce פַח con una opción de captura («lazo») sin borrar la alternativa tradicional «trampa», que queda en nota.
  - La segunda línea evita duplicar «senda/camino» de manera mecánica, pero conserva el paralelismo hebreo.
  - La puntuación sigue el ritmo poético de dos oraciones breves con pausa central.
