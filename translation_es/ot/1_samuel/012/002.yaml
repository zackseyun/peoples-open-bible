translation:
  language: es
  text: Y ahora[a], aquí tienen[b] al rey, que camina delante de ustedes, y yo he envejecido y encanecido; y aquí están[c] mis hijos con ustedes. Y yo he caminado delante de ustedes desde mi juventud hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ahora». La expresión introduce la apelación presente y conserva el enlace discursivo del hebreo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «he aquí». El hebreo usa una partícula de presentación enfática; también puede entenderse: «el rey va delante de ustedes» o «el rey los guía».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «mis hijos están aquí con ustedes». El hebreo presenta este hecho con énfasis demostrativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conservo la fuerza discursiva del hebreo con una conjunción y un adverbio temporal. "Y ahora" mantiene el enlace retórico natural en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - mira
  - he aquí
  - mira bien
  lexicon: HALOT
  rationale: La partícula deíctica pide atención inmediata. "Mira" es más natural en español actual que "he aquí", pero conserva el valor exhortativo y demostrativo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es el sustantivo definido normal para el gobernante recién establecido. "Rey" es directo y fiel.
- source_word: מִתְהַלֵּךְ לִפְנֵיכֶם
  english_pob_choice: is walking before you
  chosen_spanish: camina delante de ustedes
  alternatives_spanish:
  - va delante de ustedes
  - los guía
  lexicon: HALOT
  rationale: Sigo el idioma hebreo de "caminar delante" para conservar el matiz de liderazgo público sin imponer una explicación interpretativa. "Delante de ustedes" reproduce bien לִפְנֵיכֶם.
- source_word: זָקַנְתִּי
  english_pob_choice: I have grown old
  chosen_spanish: he envejecido
  alternatives_spanish:
  - he llegado a viejo
  - soy viejo
  lexicon: HALOT
  rationale: El perfecto expresa un estado ya alcanzado; "he envejecido" comunica ese resultado de manera natural y mantiene el aspecto verbal.
- source_word: וָשַׂבְתִּי
  english_pob_choice: and gray
  chosen_spanish: y encanecido
  alternatives_spanish:
  - y cano
  - y de cabello cano
  - y me he vuelto canoso
  lexicon: HALOT
  rationale: La forma verbal alude a volverse canoso/hoary. "Encanecido" preserva el cambio de estado y combina bien con "he envejecido".
- source_word: וּבָנַי הִנָּם אִתְּכֶם
  english_pob_choice: and here are my sons with you
  chosen_spanish: y miren, mis hijos están con ustedes
  alternatives_spanish:
  - y aquí están mis hijos con ustedes
  - y mis hijos están con ustedes
  lexicon: HALOT
  rationale: '"Miren" refleja הִנָּם como presentación enfática. Opto por "mis hijos" en español corriente, aunque el hebreo dice "mis hijos" en sentido literal de בני; se conserva la referencia familiar sin alterar el sentido.'
- source_word: הִתְהַלַּכְתִּי לִפְנֵיכֶם
  english_pob_choice: I have walked before you
  chosen_spanish: he caminado delante de ustedes
  alternatives_spanish:
  - he ido delante de ustedes
  - los he guiado
  lexicon: HALOT
  rationale: Mantengo el mismo giro idiomático que en la primera mitad del versículo para preservar el paralelismo retórico entre el rey y Samuel. "He caminado delante de ustedes" suena natural y conserva la imagen.
- source_word: מִנְּעֻרַי
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde que era joven
  - desde mis años mozos
  lexicon: HALOT
  rationale: Es la equivalencia temporal más clara y estándar en español.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: HALOT
  rationale: Es un equivalente idiomático fiel al hebreo. "Hasta este día" conserva el tono formal y la referencia al presente.
theological_decisions:
- issue: Paralelismo entre el rey y la trayectoria pública de Samuel
  english_pob_reading: Samuel intentionally parallels his own public role with that of the king.
  chosen_spanish_reading: Samuel presenta su servicio público con el mismo verbo de "caminar delante" que aplica al rey.
  alternative_spanish_readings:
  - Samuel dice que ha guiado al pueblo, paralelo al rey.
  - Samuel se presenta como un líder que iba delante del pueblo.
  rationale: El hebreo repite el mismo idioma en ambas cláusulas. En español conviene conservar esa repetición para no borrar la comparación implícita entre la función del rey y la del profeta. No introduzco "guiar" en el texto principal porque haría más explícita la interpretación que el hebreo deja sugerida.
  doctrine_reference: 1 Samuel 12:2; cf. la función pública de liderazgo en el contexto del discurso de despedida de Samuel
- issue: Valor de הִנֵּה / הִנָּם como deícticos enfáticos
  english_pob_reading: behold
  chosen_spanish_reading: mira / miren
  alternative_spanish_readings:
  - he aquí
  - vean
  rationale: En español moderno, "mira" y "miren" mantienen la fuerza apelativa de atención sin depender de un registro arcaico. La segunda ocurrencia usa plural para concordar con el destinatario implícito y con el tono exhortativo del plural de respeto/dirigido al grupo.
  doctrine_reference: HALOT sobre הִנֵּה como partícula deíctica; uso pragmático del discurso profético
- issue: Ancianidad expresada por dos verbos consecutivos
  english_pob_reading: I have grown old and gray
  chosen_spanish_reading: he envejecido y encanecido
  alternative_spanish_readings:
  - he llegado a viejo y me he vuelto canoso
  - soy viejo y canoso
  rationale: 'Conservo los dos verbos hebreos como dos pasos semánticos: envejecer y volverse canoso. Así no se aplana la duplicación retórica del original.'
  doctrine_reference: No doctrinal issue; lexical/poetic parallelism in Hebrew
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al evitar una adversativa inexistente, conservar la coordinación simple del hebreo, y reflejar dos apariciones de הִנֵּה con un recurso deíctico consistente. También mantiene el paralelismo verbal entre el rey y Samuel, que la última revisión destacó como importante para la fluidez y fidelidad.
  spanish_consistency_notes:
  - Se usa «Y ahora» para וְעַתָּה, manteniendo el enlace discursivo con la narración previa.
  - Se conserva «camina delante de ustedes» / «he caminado delante de ustedes» para reproducir la repetición hebrea de הלך לפני.
  - «Encanecido» traduce el cambio a cabello canoso sin perder naturalidad en español.
  - Se emplea «ustedes» de manera uniforme para el plural destinatario.
  - Las dos partículas deícticas se reflejan de forma paralela como «mira» y «miren», evitando arcaísmo innecesario.
