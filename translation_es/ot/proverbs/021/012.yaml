translation:
  language: es
  text: El justo considera la casa del malvado[a], llevando a los malvados a la ruina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El Justo considera la casa del malvado; lleva a los malvados a la ruina», tomando el sujeto como Dios y no como una persona justa.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׂכִּיל
  english_pob_choice: considers
  chosen_spanish: considera
  alternatives_spanish:
  - obra con discernimiento respecto de
  - toma en cuenta
  - entiende
  lexicon: HALOT
  rationale: El participio hifil de שכל expresa actuar con discernimiento o prestar atención sabia. En este contexto proverbial, «considera» comunica con naturalidad la atención reflexiva hacia la casa del malvado sin volverlo mecánico ni demasiado abstracto.
- source_word: צַדִּיק
  english_pob_choice: the righteous one
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - una persona justa
  lexicon: HALOT
  rationale: El sustantivo adjetival singular se vierte de forma masculina genérica y proverbial como «el justo», que conserva la singularidad y la función representativa del proverbio.
- source_word: לְבֵית רָשָׁע
  english_pob_choice: the house of the wicked
  chosen_spanish: la casa del malvado
  alternatives_spanish:
  - la casa del impío
  - el hogar del malvado
  - la casa de un malvado
  lexicon: HALOT
  rationale: בַּיִת puede ser «casa» o «hogar», pero aquí la relación posesiva directa se entiende con naturalidad como la casa perteneciente al malvado. Se eligió «malvado» por ser claro y acorde con el registro sapiencial; «impío» es posible, pero más cargado de tradición eclesial.
- source_word: מְסַלֵּף
  english_pob_choice: brings ... to ruin
  chosen_spanish: lleva ... a la ruina
  alternatives_spanish:
  - derriba
  - subvierte
  - trastorna
  lexicon: HALOT
  rationale: סלף puede implicar torcer, trastornar o arruinar. «Lleva ... a la ruina» transmite en español el efecto resultante de forma idiomática, sin perder el matiz de desmoronamiento o desastre que exige el contexto.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los malvados
  lexicon: HALOT
  rationale: El plural sustantivado se traduce de manera genérica como «los malvados». Esto preserva la referencia a un grupo humano caracterizado por su conducta, con un tono proverbial claro en español.
- source_word: לָרָע
  english_pob_choice: to ruin
  chosen_spanish: a la ruina
  alternatives_spanish:
  - al mal
  - al desastre
  - a la calamidad
  lexicon: HALOT
  rationale: Aunque רַע puede significar «mal», aquí el valor direccional/resultativo favorece un sentido de daño o desastre. «A la ruina» evita sugerir que el sujeto induce mal moral, y mantiene el resultado negativo que la cláusula expresa.
theological_decisions:
- issue: Identificación del sujeto en una sentencia hebrea comprimida
  english_pob_reading: The subject is 'the righteous one' throughout the verse.
  chosen_spanish_reading: El sujeto sigue siendo «el justo» en ambas cláusulas.
  alternative_spanish_readings:
  - Dios considera la casa del malvado; él lleva a los malvados a la ruina
  - El Justo considera la casa del malvado; lleva a los malvados a la ruina
  rationale: El hebreo no nombra a Dios ni exige una lectura divina. La lectura más directa mantiene al justo humano como sujeto. La alternativa teológica, preservada en la nota, reconoce la posibilidad de leer una referencia a Dios sin imponerla al texto.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que unificó la segunda cola como una frase compacta sin pronombre explícito. En español, la coordinación con coma y «y» reproduce esa compacidad sin añadir un sujeto repetido.
  spanish_consistency_notes:
  - Se mantuvo «justo» para צַדִּיק, coherente con el lenguaje sapiencial y con el uso de sustantivos adjetivales en español.
  - Se usó «malvado» en lugar de «impío» para evitar importar una fórmula litúrgica no exigida por el hebreo.
  - La nota alternativa conserva la tensión interpretativa sobre el sujeto, sin resolverla dogmáticamente en el texto principal.
  - «Ruina» traduce el resultado negativo de לָרָע con un valor más natural en español que «mal».
