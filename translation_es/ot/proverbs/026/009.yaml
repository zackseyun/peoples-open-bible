- from: Como una espina que se levanta en la mano de un borracho[a], así es un proverbio en la boca de los necios.
  to: Como una espina que sube a la mano de un borracho[b][a], así es un proverbio en la boca de los necios.
  rationale: 'Se revisa ''se levanta en la mano'' a ''sube a la mano'' para acercarse mejor al hebreo עָלָה y a la revisión auditada del inglés, manteniendo la imagen concreta sin sobreinterpretarla. También se añaden las dos notas léxicas necesarias: una para la alternativa de חוֹחַ y otra para el valor literal e imagen posible del verbo.'
