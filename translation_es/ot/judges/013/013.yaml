review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: el ángel de Yahvé habla a Manoa/Manoaj y ordena que la mujer observe cuidadosamente todo lo dicho. También preserva correctamente Yahvé y mantiene la alternativa léxica para מַלְאַךְ. Sin embargo, ''debe cuidarse de hacer'' en español suena ambiguo y puede sugerir evitar hacer algo, cuando aquí el sentido es observar cuidadosamente lo mandado. Además, el anclaje de la nota está en ''Manoaj'', pero la nota corresponde a ''ángel''.'
  spanish_quality_summary: El español es generalmente claro, pero la frase principal necesita ajuste por naturalidad y precisión semántica. 'La mujer debe cuidarse de hacer todo lo que yo le dije' no es la mejor formulación en español bíblico actual; 'debe tener cuidado de hacer' o 'debe cuidarse de cumplir' sería más claro. También conviene alinear la nota al término pertinente. El nombre propio 'Manoaj' es defendible, aunque 'Manoa' sería más usual en muchas Biblias; no es un error decisivo aquí.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; מַלְאַךְ -> ''ángel'' con nota alternativa ''mensajero''. No hay conflictos con otros términos doctrinales. La principal corrección es idiomática y de anclaje de nota, no de glosario.'
  issues:
  - severity: medium
    issue: La expresión 'debe cuidarse de hacer' es ambigua en español.
    rationale: En uso normal, 'cuidarse de hacer' puede entenderse como abstenerse de hacer algo. El hebreo תִּשָּׁמֵר aquí, en contexto, apunta a observar cuidadosamente las instrucciones previas, no a evitar cumplirlas.
  - severity: low
    issue: La nota [a] está anclada a 'Manoaj' en vez de a 'ángel'.
    rationale: La nota explica la alternativa léxica de מַלְאַךְ ('ángel' / 'mensajero'), por lo que debe marcar ese término para mantener trazabilidad y claridad editorial.
  revised_spanish_text: 'Y el ángel[a] de Yahvé dijo a Manoaj: «La mujer debe tener cuidado de hacer todo lo que yo le dije».'
  revised_footnotes:
  - marker: a
    text: O, «el mensajero de Yahvé». El término hebreo puede significar tanto «ángel» como «mensajero».
    reason: lexical_alternative
  revision_rationale: Se cambió 'debe cuidarse de hacer' por 'debe tener cuidado de hacer' para expresar con claridad el sentido de observancia cuidadosa de תִּשָּׁמֵר sin la ambigüedad de posible abstención. También se movió la nota al término 'ángel', que es el elemento léxico al que corresponde la alternativa 'mensajero'.
