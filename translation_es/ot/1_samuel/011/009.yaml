review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del versículo y la mayoría de las decisiones léxicas del hebreo: «mensajeros», «que habían llegado», la fórmula de envío del mensaje, «al calor del sol» y la reacción final. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría inglesa: (1) «Así dirán» cambia la segunda persona de mandato plural hebrea/inglesa («Así dirán» = futuro indicativo) y debe ser «Así dirán ustedes» o mejor «Así les dirán»/«Así dirán» reformulado como mandato; (2) «salvación» en el texto principal no sigue la decisión documentada de evitar sobretonos soteriológicos en este contexto militar, donde la POB inglesa eligió «deliverance».'
  spanish_quality_summary: El español es generalmente claro y digno, pero mezcla registro peninsular («tendréis») con un objetivo neutral latinoamericano. También «lo comunicaron» es correcto pero algo impersonal; «les comunicaron el mensaje» o «les informaron» sería más natural. La frase queda más fluida y alineada con el proyecto con «Mañana, al calor del sol, tendrán liberación».
  glossary_alignment: No hay términos del glosario mayor en juego salvo la necesidad de respetar la rationale de תְּשׁוּעָה como rescate/liberación concreta. «Mensajeros» y «hombres de Jabes» están bien. Conviene evitar «tendréis» por estilo objetivo y usar formas neutrales («tendrán»).
  issues:
