base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/017/006.yaml
  text: He will be like a shrub in the desert[a], and he will not see when good comes. He will dwell in parched places in the wilderness[c][b], in a salt land that is not inhabited.
  footnotes:
  - marker: a
    text: Or 'like a juniper,' 'like a tamarisk,' or 'like a barren bush'; the exact plant named by the Hebrew is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not perceive when prosperity comes.' The Hebrew says literally, 'he will not see when good comes.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the Arabah' if taken as the specific geographic region rather than desert land generally.
    reason: alternative_reading
