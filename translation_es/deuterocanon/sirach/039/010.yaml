translation:
  language: es
  text: Las naciones relatarán su sabiduría, y la asamblea[a] proclamará su alabanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la congregación proclamará su alabanza». El griego ἐκκλησία designa la comunidad reunida o asamblea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διηγήσονται
  english_pob_choice: will recount
  chosen_spanish: recitarán
  alternatives_spanish:
  - contarán
  - relatarán
  - proclamarán
  lexicon: BDAG
  rationale: El verbo griego expresa narrar o dar cuenta públicamente. En español, 'recitarán' comunica una proclamación oral y pública sin perder la idea de decir de manera solemne; evita la frialdad de un calco y conserva el tono sapiencial.
- source_word: ἔθνη
  english_pob_choice: Nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  - los gentiles
  lexicon: BDAG
  rationale: '''Las naciones'' sigue de cerca el sentido amplio de ἔθνη y mantiene la referencia colectiva general sin introducir una oposición específica judíos/gentiles que el contexto no exige.'
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - inteligencia
  - entendimiento
  lexicon: BDAG
  rationale: '''Sabiduría'' es la equivalencia natural y tradicional para σοφία, y en Sirácides conserva tanto el peso moral como el intelectual del término.'
- source_word: ἐξαγγελεῖ
  english_pob_choice: will proclaim
  chosen_spanish: proclamará
  alternatives_spanish:
  - declarará
  - anunciará
  - hará conocer
  lexicon: BDAG
  rationale: El verbo indica una declaración pública. 'Proclamará' reproduce bien ese registro elevado y se corresponde con el paralelismo del primer hemistiquio.
- source_word: ἐκκλησία
  english_pob_choice: assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la reunión
  lexicon: BDAG
  rationale: En este contexto judío sapiencial precristiano, ἐκκλησία se refiere al grupo reunido, no a la iglesia cristiana. 'Asamblea' evita el anacronismo y conserva el matiz de colectividad reunida.
- source_word: ἔπαινον
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - elogio
  - renombre
  - honor
  lexicon: BDAG
  rationale: '''Alabanza'' es el equivalente más natural en español para ἔπαινος aquí, y mantiene la relación directa con la proclamación pública de honra.'
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - su
  lexicon: BDAG
  rationale: El posesivo español 'su' conserva la referencia singular del griego a la persona sabia del contexto. En español, la ambigüedad de número/género es inherente, pero el antecedente sigue claro.
theological_decisions:
- issue: Sentido de ἐκκλησία en un texto judío anterior al cristianismo
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - iglesia
  rationale: '''Asamblea'' expresa el cuerpo reunido sin trasladar el término al uso eclesial cristiano posterior. Esto preserva la referencia histórica y literaria del pasaje.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source meaning over tradition; avoid anachronism'
- issue: Referencia posesiva singular de αὐτοῦ
  english_pob_reading: his
  chosen_spanish_reading: su
  alternative_spanish_readings:
  - su
  rationale: El griego singular masculino apunta al sabio individual del contexto. En español, 'su' mantiene esa referencia sin necesidad de neutralizarla.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en los puntos léxicos principales: ἔθνη = naciones, σοφία = sabiduría, ἐκκλησία = asamblea, ἐξαγγελεῖ = proclamará. No se registran revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo sintáctico breve del hebraísmo/griego: sujeto plural + verbo futuro, coordinado por «y».'
  - Se evitó «iglesia» para ἐκκλησία a fin de no introducir una lectura cristiana posterior.
  - La nota al pie preserva la alternativa «congregación» que el audit trail inglés documenta para ἐκκλησία.
