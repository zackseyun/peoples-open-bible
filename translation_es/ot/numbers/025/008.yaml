translation:
  language: es
  text: Él fue tras el hombre israelita al cuarto[a] y atravesó a ambos —al hombre israelita y a la mujer— por su vientre[b]. Entonces la plaga se detuvo de sobre los hijos de Israel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la cámara', 'el aposento' o 'el pabellón'; el término hebreo es raro y designa un compartimento o cuarto interior.
    reason: lexical_alternative
  - marker: b
    text: O 'por su abdomen'. El hebreo se refiere de manera específica al vientre o cavidad abdominal.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''los hijos de Israel'', expresión pactual masculina estándar para el pueblo de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֻּבָּה
  english_pob_choice: the chamber
  chosen_spanish: el cuarto
  alternatives_spanish:
  - la cámara
  - el aposento
  - la estancia
  - el pabellón
  lexicon: HALOT
  rationale: La voz hebrea es rara y señala un espacio interior o compartimento. 'Cuarto' comunica en español una habitación interior sin sobreespecificar una arquitectura no explicitada por el texto. Se evita 'pabellón' por sonar demasiado interpretativo y 'cámara' por posible ambigüedad formal.
- source_word: וַיִּדְקֹר
  english_pob_choice: pierced
  chosen_spanish: los atravesó
  alternatives_spanish:
  - los traspasó
  - los hirió con una estocada
  - los apuñaló
  lexicon: HALOT
  rationale: '''Atravesó'' conserva el sentido violento y penetrante del verbo hebreo, con la idea de pasar de lado a lado implícita en el contexto. ''Apuñaló'' introduce una especificación que el hebreo no exige; ''traspasó'' es posible, pero ''atravesó'' resulta más natural y directo en español.'
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: a ambos
  alternatives_spanish:
  - a los dos
  - a los dos juntos
  lexicon: HALOT
  rationale: La expresión dual se refleja de manera natural con 'a ambos', manteniendo que el golpe alcanzó a los dos a la vez.
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the Israelite man
  chosen_spanish: el hombre israelita
  alternatives_spanish:
  - el israelita
  - el varón de Israel
  lexicon: HALOT
  rationale: Se conserva el sustantivo אישי implícito en 'hombre', junto con la identidad étnica/relacional 'israelita'. 'El israelita' sería posible, pero pierde la explicitación del sustantivo איש que el hebreo sí presenta.
- source_word: קֳבָתָהּ
  english_pob_choice: through her belly
  chosen_spanish: por su vientre
  alternatives_spanish:
  - por su abdomen
  - por sus entrañas
  lexicon: HALOT
  rationale: El término hebreo alude al vientre o cavidad abdominal. 'Vientre' mantiene el cuerpo concreto del texto y suena natural en español; 'abdomen' es más clínico y 'entrañas' desplaza el sentido hacia interioridades más amplias.
- source_word: הַמַּגֵּפָה
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - la peste
  - la mortandad
  - la aflicción
  lexicon: HALOT
  rationale: En este contexto de juicio, 'plaga' es la equivalencia más directa y reconocible, preservando el valor narrativo y teológico del término.
- source_word: מֵעַל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from upon the sons of Israel
  chosen_spanish: sobre los hijos de Israel
  alternatives_spanish:
  - de encima de los hijos de Israel
  - de sobre los hijos de Israel
  - sobre los israelitas
  lexicon: HALOT
  rationale: Se mantiene la expresión tradicional 'hijos de Israel' para reflejar el matiz corporativo y masculino del hebreo בני ישראל. Aunque 'israelitas' es idiomático, pierde la forma marcada del original. La preposición se naturaliza a 'sobre' para expresar el efecto de cese de la plaga en español.
theological_decisions:
- issue: Expresión corporativa masculina בני ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: Se preserva la forma masculina plural del hebreo en una expresión covenantal estándar. 'Hijos de Israel' comunica mejor la forma del original que una neutralización a 'israelitas' o 'pueblo de Israel'.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Detalle anatómico gráfico
  english_pob_reading: through her belly
  chosen_spanish_reading: por su vientre
  alternative_spanish_readings:
  - por su abdomen
  rationale: El hebreo ofrece un detalle corporal concreto y no debe suavizarse. 'Vientre' conserva la crudeza narrativa sin volver la frase excesivamente técnica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que corrigió 'inner chamber' a 'the chamber' para ajustarse más de cerca al hebreo. Por eso la versión española evita expandir el espacio a un 'cuarto interior' y usa una designación breve y genérica ('el cuarto') compatible con la rareza del término. También se siguió la preferencia inglesa por mantener la violencia corporal concreta y la fórmula covenantal masculina en la cláusula final.
  spanish_consistency_notes:
  - Se mantuvo la secuencia narrativa compacta y directa, sin añadir elementos ausentes en el hebreo.
  - La puntuación con rayas reproduce la aposición explicativa del original inglés y ayuda a leer la duplicación 'al hombre israelita y a la mujer'.
  - Se eligieron términos naturales en español que aún dejan visibles las tensiones léxicas del hebreo raro y de la expresión pactual masculina.
