translation:
  language: es
  text: El pueblo que andaba en tinieblas ha visto una gran luz; sobre los que habitaban en una tierra de profunda oscuridad[a] ha resplandecido la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sombra de muerte». El término hebreo צַלְמָוֶת se ha traducido tradicionalmente así, aunque también puede denotar oscuridad profunda o penumbra en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם
  english_pob_choice: The people
  chosen_spanish: El pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: עם funciona como colectivo singular; 'el pueblo' conserva ese valor colectivo y resulta natural en español bíblico contemporáneo.
- source_word: הַהֹלְכִים
  english_pob_choice: walking
  chosen_spanish: que andaba
  alternatives_spanish:
  - que camina
  - andando
  lexicon: HALOT
  rationale: El participio expresa condición continua. En español, la relativa 'que andaba' comunica mejor ese estado sostenido que un presente más abstracto, sin perder la imagen del andar.
- source_word: בַּחֹשֶׁךְ
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en oscuridad
  - en la oscuridad
  lexicon: HALOT
  rationale: '''Tinieblas'' conserva el registro bíblico y la fuerza imagética del hebreo; evita una calca menos idiomática como ''en oscuridad''.'
- source_word: רָאוּ
  english_pob_choice: have seen
  chosen_spanish: ha visto
  alternatives_spanish:
  - vio
  - ha contemplado
  lexicon: HALOT
  rationale: El perfecto profético se expresa bien en español con 'ha visto', preservando el valor de hecho cumplido con vigencia presente.
- source_word: אוֹר גָּדוֹל
  english_pob_choice: a great light
  chosen_spanish: una gran luz
  alternatives_spanish:
  - una luz grande
  - gran luz
  lexicon: HALOT
  rationale: La combinación adjetivo-sustantivo se mantiene de forma directa y natural en español.
- source_word: יֹשְׁבֵי
  english_pob_choice: those dwelling
  chosen_spanish: los que habitaban
  alternatives_spanish:
  - los que moraban
  - los habitantes
  lexicon: HALOT
  rationale: El participio indica un habitar continuo. 'Los que habitaban' preserva el matiz verbal mejor que 'los habitantes', que suena más nominal y menos aspectual.
- source_word: בְּאֶרֶץ
  english_pob_choice: in a land
  chosen_spanish: en tierra de
  alternatives_spanish:
  - en una tierra de
  - en la tierra de
  lexicon: HALOT
  rationale: La construcción se adapta a un giro español fluido. 'Tierra de' mantiene la relación atributiva con צַלְמָוֶת sin sobrecargar el texto con un artículo innecesario.
- source_word: צַלְמָוֶת
  english_pob_choice: deep darkness
  chosen_spanish: profunda oscuridad
  alternatives_spanish:
  - sombra de muerte
  - tenebrosa oscuridad
  - tinieblas profundas
  lexicon: HALOT
  rationale: Se conserva la lectura idiomática de oscuridad intensa adoptada en el POB inglés. 'Profunda oscuridad' es una equivalencia clara y digna en español, sin imponer 'sombra de muerte' como sentido principal.
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - resplandor
  lexicon: HALOT
  rationale: Se repite el sustantivo de forma directa para mantener el paralelismo y el efecto literario del hebreo.
- source_word: נָגַהּ
  english_pob_choice: has shone
  chosen_spanish: ha resplandecido
  alternatives_spanish:
  - ha brillado
  - ha alumbrado
  lexicon: HALOT
  rationale: '''Resplandecer'' expresa con claridad la idea de emitir luz con fuerza y mantiene un registro bíblico natural en español.'
- source_word: עֲלֵיהֶם
  english_pob_choice: on those
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre aquellos
  - encima de ellos
  lexicon: HALOT
  rationale: La preposición 'sobre' reproduce el sentido de irradiación o cobertura del hebreo y encaja con el paralelismo del verso.
theological_decisions:
- issue: Sentido de צַלְמָוֶת en un texto profético de fuerte resonancia bíblica
  english_pob_reading: deep darkness
  chosen_spanish_reading: profunda oscuridad
  alternative_spanish_readings:
  - sombra de muerte
  - tinieblas densas
  rationale: Se preserva la decisión POB de no convertir la expresión en una referencia explícita a la muerte en el texto principal. 'Profunda oscuridad' mantiene la ambigüedad léxica y la fuerza poética del hebreo, dejando abierta la resonancia tradicional sin imponerla.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se ha seguido el mismo juicio de revisión del POB inglés: mantener la lectura idiomática de צַלְמָוֶת como oscuridad profunda, sin eliminar la alternativa tradicional. No se registraron revisiones adicionales en el pasaje base.'
  spanish_consistency_notes:
  - Se conserva el paralelismo entre 'luz' y 'luz' en ambas mitades del verso.
  - '''Tinieblas'' y ''profunda oscuridad'' se usan de manera consistente como dos niveles de registro para la imaginería hebrea.'
  - El sujeto colectivo singular ('el pueblo') gobierna el verbo en singular ('ha visto') para reflejar el carácter colectivo del hebreo.
  - La frase final mantiene el encarecimiento direccional de עֲלֵי־הֶם con 'sobre ellos', evitando una paráfrasis más libre.
