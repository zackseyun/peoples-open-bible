translation:
  language: es
  text: Y cuando Ahab oyó que Nabot había muerto[a], se levantó para bajar a la viña de Nabot el jezreelita, para tomar posesión de ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «estaba muerto». El hebreo puede entenderse como un estado resultante o como un hecho ya consumado: «había muerto».'
    reason: lexical_alternative
  - marker: b
    text: O «poseerla» o «heredarla». El verbo hebreo puede significar tomar posesión, poseer o heredar según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y sucedió que ...
  alternatives_spanish:
  - Y ocurrió que ...
  - Y aconteció que ...
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce la secuencia del relato. En español, «Y sucedió que» conserva ese giro de transición sin sonar tan arcaico como otras equivalencias más literales.
- source_word: כִּשְׁמֹעַ
  english_pob_choice: when ... heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyó
  - apenas oyó
  lexicon: HALOT
  rationale: El infinitivo constructo con כ expresa tiempo circunstancial. «Al oír» es natural en español y mantiene la relación temporal sin añadir inmediatez no exigida por el hebreo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo oído por Ahab. «Que» reproduce esa función subordinante de manera directa y clara.
- source_word: מֵת
  english_pob_choice: was dead
  chosen_spanish: había muerto
  alternatives_spanish:
  - estaba muerto
  - murió
  lexicon: HALOT
  rationale: El qatal puede reflejar el estado resultante o el hecho completo. En español, «había muerto» comunica bien el evento ya consumado y preserva la ambigüedad auditada sin fijarlo solo como estado.
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - partió
  lexicon: HALOT
  rationale: קום marca aquí una acción decidida de ponerse en movimiento. «Se levantó» es fiel y suficiente en español, sin forzar el matiz de salida que se explicita después con «bajar».
- source_word: לָרֶדֶת
  english_pob_choice: to go down
  chosen_spanish: para bajar
  alternatives_spanish:
  - para descender
  - para ir abajo
  lexicon: HALOT
  rationale: ירד tiene sentido direccional literal. «Bajar» conserva esa dirección geográfica de modo claro y natural en español.
- source_word: כֶּרֶם
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - viña de uvas
  lexicon: HALOT
  rationale: En español bíblico, «viña» transmite el terreno plantado de vides y es idiomático; «viñedo» es posible, pero «viña» se ajusta mejor al registro narrativo.
- source_word: הַיִּזְרְעֵאלִי
  english_pob_choice: the Jezreelite
  chosen_spanish: el jezreelita
  alternatives_spanish:
  - el de Jezreel
  lexicon: HALOT
  rationale: El gentilicio identifica a Nabot por procedencia. «Jezreelita» mantiene esa marca étnico-geográfica de forma directa y consistente.
- source_word: לְרִשְׁתּוֹ
  english_pob_choice: to take possession of it
  chosen_spanish: para tomar posesión de ella
  alternatives_spanish:
  - para poseerla
  - para heredarla
  lexicon: HALOT
  rationale: ירש puede significar poseer, tomar posesión o heredar según el contexto. Aquí el objetivo de Ahab es apoderarse legalmente del terreno tras la muerte de Nabot; «tomar posesión de ella» reproduce bien la intención sin introducir por sí sola una violencia mayor que la del contexto.
theological_decisions:
- issue: El matiz de ירש en el contexto de la muerte de Nabot
  english_pob_reading: to take possession of it
  chosen_spanish_reading: para tomar posesión de ella
  alternative_spanish_readings:
  - para poseerla
  - para heredarla
  - para apoderarse de ella
  rationale: El verbo admite varias lecturas. Se preserva la lectura de posesión/toma de control como en el audit trail inglés. «Heredarla» sería demasiado fuerte y sugeriría un derecho legítimo que el contexto niega; «apoderarse de ella» añade una connotación más agresiva que el hebreo no exige de forma explícita.
  doctrine_reference: Ética narrativa y propiedad/posesión en el relato histórico
- issue: El valor de מֵת como estado o evento consumado
  english_pob_reading: was dead / had died
  chosen_spanish_reading: había muerto
  alternative_spanish_readings:
  - estaba muerto
  - murió
  rationale: La forma hebrea permite tanto estado resultante como evento completado. En español, «había muerto» mantiene esa consumación sin obligar a elegir entre estado y acción, preservando la tensión semántica documentada.
  doctrine_reference: Aspecto verbal y traducción de qatal
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el audit trail inglés y no requiere cambios revisionales adicionales. Se mantuvieron las dos ambigüedades ya documentadas: el valor de מֵת y el de לְרִשְׁתּוֹ.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en terminología general del proyecto solo cuando aparece el Tetragrámaton; en este versículo no aparece.
  - «Ahab» y «Nabot» se conservan como transliteraciones estándar del corpus proporcionado.
  - «Viña» se eligió por naturalidad bíblica y coherencia con el género narrativo histórico.
  - Se evitó «señor»/«Señor» como sustitución interpretativa, ya que no corresponde al texto hebreo aquí.
