translation:
  language: es
  text: Y arrancaré todos los cuernos[a] de los malvados, pero los cuernos del justo serán levantados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «cuernos» es una metáfora de fuerza, poder o estatus exaltado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And ... all
  chosen_spanish: Y ... todos
  alternatives_spanish:
  - y ... todos
  - pero ... todos
  lexicon: HALOT
  rationale: La conjunción inicial וְ se conserva con «Y» para mantener la relación simple con el contexto anterior. כָל se rinde con «todos», que es natural en español y preserva la totalidad sin añadir matices no presentes.
- source_word: קַרְנֵי / קַרְנוֹת
  english_pob_choice: horns
  chosen_spanish: cuernos
  alternatives_spanish:
  - hornos
  - fuerzas
  - poderes
  lexicon: HALOT
  rationale: «Cuernos» conserva la imagen concreta del hebreo y la metáfora bíblica de fuerza, poder o exaltación. En español, «cuernos» es más directo que «fuerzas» o «poderes», que interpretarían demasiado la figura.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los malhechores
  lexicon: HALOT
  rationale: «Los malvados» expresa bien el grupo moral en español contemporáneo y mantiene el valor colectivo del plural hebreo. «Impíos» sería posible, pero suena más tradicional y menos transparente para este contexto poético.
- source_word: אֲגַדֵּעַ
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - cortaré de raíz
  - cortaré del todo
  - cegaré
  lexicon: HALOT
  rationale: El verbo גדע comunica una acción decisiva de cortar o derribar. «Cortaré» es fiel y natural; «cegaré» sería una imagen más específica de cuernos/astas, pero no es necesaria aquí.
- source_word: תְּרוֹמַמְנָה
  english_pob_choice: will be lifted up
  chosen_spanish: serán enaltecidos
  alternatives_spanish:
  - serán levantados
  - serán exaltados
  - subirán
  lexicon: HALOT
  rationale: La forma verbal expresa elevación/exaltación en sentido pasivo o resultativo. «Serán enaltecidos» comunica bien la idea de exaltación y funciona con el paralelismo poético. Se evita «levantados» por su posible ambigüedad corporal en español.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - el justo
  - los rectos
  - los justificados
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular morfológico, funciona aquí como categoría representativa frente a «los malvados». «Los justos» preserva la oposición moral y suena idiomático en español.
theological_decisions:
- issue: Preservación de la metáfora de los cuernos como imagen de poder/exaltación
  english_pob_reading: Retain 'horns' in the main text rather than interpretively rendering 'power' or 'strength.'
  chosen_spanish_reading: Conservar «cuernos» en el texto principal, con la imagen metafórica intacta.
  alternative_spanish_readings:
  - cortaré todo el poder de los malvados, pero el poder de los justos será exaltado
  - cortaré toda la fuerza de los malvados, pero la fuerza de los justos será enaltecida
  rationale: La metáfora de los cuernos es una imagen bíblica estable de poder, honor y status exaltado. Mantenerla en el texto principal respeta la primacía del hebreo y evita reducirla prematuramente a una abstracción única. La nota explica su sentido metafórico sin reemplazar la imagen.
  doctrine_reference: Poética bíblica; principio de primacía del texto original; preservación de metáforas con valor teológico.
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el texto hebreo WLC y el consenso del audit trail en inglés: mantiene la metáfora de los cuernos, conserva la oposición entre los malvados y los justos, y usa una formulación española natural sin suavizar la fuerza del verbo de corte ni convertir la imagen en una abstracción.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto cuando aparezca el Nombre divino; en este versículo no aparece.
  - «Justos/malvados» mantiene el paralelismo moral del hebreo y es más uniforme para poesía bíblica que opciones más explicativas.
  - La puntuación refleja el paralelismo antitético del verso y la pausa natural en español.
