translation:
  language: es
  text: 'Gedalías, hijo de Ahicam, hijo de Safán, les juró a ellos y a sus hombres, diciendo: «No teman servir a los caldeos[a]. Quédense en la tierra y sirvan al rey de Babilonia, y les irá bien».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los babilonios». El hebreo dice «los caldeos», término que a menudo se usa para el poder gobernante babilónico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: les juró
  alternatives_spanish:
  - juró
  - prestó juramento
  lexicon: HALOT
  rationale: El verbo hebreo expresa tomar juramento o jurar. «Les juró» mantiene el acto solemne de una promesa bajo juramento y suena natural en español sin perder la fuerza formal.
- source_word: לָהֶם ... וּלְאַנְשֵׁיהֶם
  english_pob_choice: to them and to their men
  chosen_spanish: a ellos y a sus hombres
  alternatives_spanish:
  - a ellos y a su gente
  - a ellos y a sus varones
  lexicon: HALOT
  rationale: אַנְשֵׁים es literalmente «hombres» en el sentido de varones asociados o seguidores. «Sus hombres» conserva la ambigüedad útil del hebreo sin especificar indebidamente si eran soldados o simples acompañantes.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Es la fórmula quotativa estándar. «Diciendo» mantiene la transición formal a la cita directa.
- source_word: אַל תִּירְאוּ
  english_pob_choice: Do not be afraid
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No se asusten
  lexicon: HALOT
  rationale: El hebreo prohíbe el temor. «No teman» es breve, directo y fiel; además encaja bien con el tono exhortativo del pasaje.
- source_word: מֵעֲבֹד הַכַּשְׂדִּים
  english_pob_choice: to serve the Chaldeans
  chosen_spanish: servir a los caldeos
  alternatives_spanish:
  - servir a los caldeos
  - servir a los babilonios
  lexicon: HALOT
  rationale: La construcción apunta a no temer someterse al servicio de los caldeos. Se conserva «caldeos» en el texto principal porque ese es el término hebreo; no se sustituye por «babilonios» en el cuerpo, aunque la referencia política sea a Babilonia.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se mantiene la designación étnico-política del hebreo. «Caldeos» preserva la literalidad del texto y la posible referencia al poder babilónico sin borrar el término original.
- source_word: שְׁבוּ בָאָרֶץ
  english_pob_choice: Live in the land
  chosen_spanish: Quédense en la tierra
  alternatives_spanish:
  - Vivan en la tierra
  - Permanezcan en la tierra
  - Habiten en la tierra
  lexicon: HALOT
  rationale: יׁשׁב puede significar morar, habitar o permanecer. «Quédense en la tierra» transmite la exhortación práctica a permanecer allí con naturalidad en español contemporáneo.
- source_word: וְעִבְדוּ אֶת מֶלֶךְ בָּבֶל
  english_pob_choice: and serve the king of Babylon
  chosen_spanish: y sirvan al rey de Babilonia
  alternatives_spanish:
  - y sirvan al rey de Babilonia
  - y estén al servicio del rey de Babilonia
  lexicon: HALOT
  rationale: עבד aquí tiene sentido político de estar bajo servicio o sujeción. «Sirvan al rey de Babilonia» conserva ese matiz sin explicar de más.
- source_word: וְיִיטַב לָכֶם
  english_pob_choice: and it will go well for you
  chosen_spanish: y les irá bien
  alternatives_spanish:
  - y les irá bien
  - y les será bien
  - y les resultará bien
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y anuncia bienestar o buen resultado. «Les irá bien» es una equivalencia natural y precisa en español.
theological_decisions:
- issue: Identificación del poder caldeo con Babilonia
  english_pob_reading: the Hebrew reads 'the Chaldeans,' a term often used for the Babylonian ruling power
  chosen_spanish_reading: se conserva «los caldeos» en el cuerpo y «Babilonia» para el rey
  alternative_spanish_readings:
  - usar solo «babilonios» en todo el versículo
  - duplicar con «caldeos (babilonios)» en el texto principal
  rationale: El hebreo distingue entre el grupo llamado «caldeos» y el rey de Babilonia. Mantener «caldeos» respeta el dato léxico sin perder la claridad histórica, ya garantizada por «rey de Babilonia» y por la nota.
  doctrine_reference: Histórico-lingüístico; no doctrinal
- issue: Sentido de la prohibición «No teman»
  english_pob_reading: Do not be afraid to serve the Chaldeans
  chosen_spanish_reading: No teman servir a los caldeos
  alternative_spanish_readings:
  - No teman de servir a los caldeos
  - No teman al servir a los caldeos
  rationale: El hebreo usa la prohibición con una construcción que expresa el temor respecto del acto de servir. En español, «No teman servir» comunica bien que el miedo no debe impedir esa acción.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió la revisión del inglés auditado que ajustó la prohibición para reflejar mejor la construcción hebrea: no es «temer por servir», sino «temer servir». La versión española adopta esa misma relación sintáctica con una formulación natural en español. También se preserva la distinción entre «caldeos» y «rey de Babilonia» conforme al texto hebreo y a la nota del POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto cuando corresponda; en este versículo no aparece el Tetragrámaton.
  - Se mantiene «caldeos» en el texto principal para reflejar el término hebreo, con nota explicativa sobre «babilonios».
  - «Les irá bien» reproduce el idiomatismo final de bienestar sin sobreexplicar.
  - La estructura del discurso directo conserva el tono solemne del juramento y la exhortación.
