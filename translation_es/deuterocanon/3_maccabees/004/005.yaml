base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/004/005.yaml
  text: For an old man was being led along[a], full of gray hair, bent over by the weakness in his feet that comes with age, driven by the violent force of being overthrown[c][b], making his way in hurried travel without any regard for dignity.
  footnotes:
  - marker: a
    text: The Greek phrase rendered 'driven by the violent force of being thrown down' is compressed and difficult; it conveys harsh, violent compulsion, possibly with the sense of stumbling or being knocked about.
    reason: lexical_alternative
  - marker: b
    text: Or 'without any shame' / 'with no regard for propriety' for 'without any regard for all dignity.'
    reason: lexical_alternative
  - marker: c
    text: The final phrase may also be understood as 'being forced into a rapid pace' rather than 'making use of a swift march.'
    reason: lexical_alternative
