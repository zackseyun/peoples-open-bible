  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Handling the Passover-associated term פָּסֹחַ
  chosen_reading: passing over
  alternative_readings:
  - sparing
  - protecting
  rationale: The Hebrew likely evokes Passover imagery while also conveying protective sparing. To preserve theological tension rather than resolve it, the main text keeps the more literal 'passing over,' and the protective nuance is preserved in a footnote.
