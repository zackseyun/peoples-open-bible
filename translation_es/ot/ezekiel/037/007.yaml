translation:
  language: es
  text: Entonces profeticé como se me mandó[a], y mientras profetizaba, hubo un sonido, y he aquí, un traqueteo[b], y los huesos se juntaron, hueso con su hueso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como se me había ordenado» para el valor de צֻוֵּיתִי; la formulación elegida mantiene la voz pasiva y el matiz de mandato.
    reason: lexical_alternative
  - marker: b
    text: O «un sacudimiento» o «un terremoto» para רַעַשׁ; el contexto de huesos que se ensamblan favorece el sentido más específico de «traqueteo».
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבֵּאתִי
  english_pob_choice: I prophesied
  chosen_spanish: profeticé
  alternatives_spanish:
  - hablé como profeta
  - proclamé
  lexicon: HALOT
  rationale: El verbo נבא en este contexto describe el acto profético mismo. «Profeticé» conserva el valor verbal directo y suena natural en español sin diluir la fuerza técnica del término.
- source_word: כַּאֲשֶׁר צֻוֵּיתִי
  english_pob_choice: as I was commanded
  chosen_spanish: como se me había mandado
  alternatives_spanish:
  - tal como se me había ordenado
  - como se me había instruido
  lexicon: HALOT
  rationale: La pasiva expresa que Ezequiel recibió una orden. «Se me había mandado» mantiene esa pasividad y el sentido de obediencia del original.
- source_word: וַיְהִי קוֹל
  english_pob_choice: there was a sound
  chosen_spanish: hubo un sonido
  alternatives_spanish:
  - se oyó un sonido
  - hubo un ruido
  lexicon: HALOT
  rationale: La cláusula introduce el fenómeno audible de manera general. «Hubo un sonido» es idiomático en español y deja que el sustantivo siguiente aporte la cualidad más específica.
- source_word: כְּהִנָּבְאִי
  english_pob_choice: as I prophesied
  chosen_spanish: mientras profetizaba
  alternatives_spanish:
  - cuando profetizaba
  - así como profetizaba
  lexicon: HALOT
  rationale: El infinitivo con כ marca simultaneidad. En español, «mientras profetizaba» comunica mejor el proceso en curso que una fórmula más rígida.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: «He aquí» conserva el énfasis profético y la vividez del original, sin reducirlo a una simple transición narrativa.
- source_word: רַעַשׁ
  english_pob_choice: a rattling
  chosen_spanish: un estrépito
  alternatives_spanish:
  - un crujido
  - un sacudimiento
  - un terremoto
  lexicon: HALOT
  rationale: El campo semántico incluye sacudida, ruido y traqueteo. En este contexto, donde los huesos se ensamblan, «estrépito» comunica mejor el ruido intenso y permite mantener la tensión entre sonido y movimiento; no se adopta «terremoto» porque el contexto inmediato favorece el chocar/encajar de los huesos.
- source_word: וַתִּקְרְבוּ עֲצָמוֹת
  english_pob_choice: the bones came together
  chosen_spanish: los huesos se juntaron
  alternatives_spanish:
  - los huesos se acercaron
  - los huesos se unieron
  lexicon: HALOT
  rationale: קרב puede significar acercarse, pero aquí el resultado visible es el reacomodo de los huesos. «Se juntaron» expresa con naturalidad el ensamblaje sin perder la imagen.
- source_word: עֶצֶם אֶל עַצְמוֹ
  english_pob_choice: bone to its bone
  chosen_spanish: hueso con su hueso
  alternatives_spanish:
  - hueso a su hueso
  - cada hueso con su hueso
  lexicon: HALOT
  rationale: La construcción distributiva hebrea indica correspondencia pieza por pieza. «Con su hueso» conserva la relación de emparejamiento y suena más natural en español que una repetición literal demasiado áspera.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el contexto auditado del POB inglés: mantiene la secuencia «profeticé / como se me había mandado / mientras profetizaba / he aquí / estrépito / los huesos se juntaron», pero ajusta el último miembro distributivo para que suene natural en español sin perder la correspondencia hebrea pieza por pieza. No se detectaron cambios textuales recientes que alteren la base de trabajo.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino explícito.
  - «Profetizar» se usa como verbo técnico; no se suaviza a «hablar» o «anunciar».
  - «Estrépito» preserva la ambigüedad de רַעַשׁ sin imponer «terremoto», que sería más fuerte de lo que el contexto inmediato exige.
  - La construcción «hueso con su hueso» mantiene la correspondencia distributiva del hebreo y evita normalizarla a una simple repetición estilística.
