translation:
  language: es
  text: Y restauraré la suerte de Egipto[a] y los haré volver a la tierra de Patros[b], a la tierra de su origen; y allí serán un reino de poca importancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «restauraré la cautividad de Egipto» / «haré volver a los cautivos de Egipto». El hebreo puede entenderse de manera más literal, aunque aquí probablemente se refiere más ampliamente a la restauración de la condición de Egipto.'
    reason: lexical_alternative
  - marker: b
    text: Patros era una región del Alto Egipto; aquí se la describe como la tierra de origen de los egipcios.
    reason: cultural_note
lexical_decisions:
- source_word: וְשַׁבְתִּי אֶת־שְׁבוּת מִצְרַיִם
  english_pob_choice: I will restore the fortunes of Egypt
  chosen_spanish: restauraré la suerte de Egipto
  alternatives_spanish:
  - restauraré la cautividad de Egipto
  - haré volver la cautividad de Egipto
  - restauraré el bienestar de Egipto
  lexicon: HALOT
  rationale: El hebreo שׁוּב שְׁבוּת es un modismo de restauración que puede referirse literalmente a cautiverio/cautivos, pero con frecuencia expresa una reversión de la condición. En español, «restauraré la suerte de Egipto» conserva ese valor idiomático sin perder el sentido de cambio de estado que el contexto profético desarrolla en la cláusula siguiente.
- source_word: וַהֲשִׁבֹתִי אֹתָם
  english_pob_choice: and bring them back
  chosen_spanish: los haré volver
  alternatives_spanish:
  - los traeré de vuelta
  - los devolveré
  - los volveré a traer
  lexicon: HALOT
  rationale: El hiphil de שׁוּב es causativo. «Los haré volver» expresa de modo natural en español esa causalidad divina y evita una construcción menos fluida, mientras conserva la fuerza del movimiento de retorno.
- source_word: אֶרֶץ פַּתְרוֹס
  english_pob_choice: the land of Pathros
  chosen_spanish: la tierra de Patros
  alternatives_spanish:
  - Patros
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. «Tierra» refleja el sustantivo אֶרֶץ y mantiene la estructura del hebreo.
- source_word: עַל אֶרֶץ מְכוּרָתָם
  english_pob_choice: to the land of their origin
  chosen_spanish: a la tierra de su origen
  alternatives_spanish:
  - a su tierra natal
  - a la tierra de su nacimiento
  - sobre la tierra de su origen
  lexicon: HALOT
  rationale: מְכוּרָה apunta al lugar de origen o nacimiento. Aunque עַל literalmente puede ser «sobre», aquí funciona direccionalmente dentro del movimiento de retorno; por eso «a la tierra de su origen» comunica mejor el sentido sin forzar un calco.
- source_word: וְהָיוּ שָׁם
  english_pob_choice: and there they will be
  chosen_spanish: y allí serán
  alternatives_spanish:
  - y allí estarán
  - y allí existirán
  lexicon: HALOT
  rationale: La secuencia hebrea enfatiza ubicación y resultado. «Allí serán» es breve y natural en español, preservando el valor locativo de שָׁם.
- source_word: מַמְלָכָה שְׁפָלָה
  english_pob_choice: a lowly kingdom
  chosen_spanish: un reino humilde
  alternatives_spanish:
  - un reino bajo
  - un reino abatido
  - un reino pequeño
  lexicon: HALOT
  rationale: שָׁפָל expresa bajeza, humillación o condición rebajada. «Humilde» comunica en español moderno la idea de un reino disminuido sin sonar arcaico ni excesivamente despectivo; mantiene la tensión entre estatus y valoración.
theological_decisions:
- issue: Modismo de restauración en שׁוּב שְׁבוּת
  english_pob_reading: restore the fortunes of Egypt
  chosen_spanish_reading: restauraré la suerte de Egipto
  alternative_spanish_readings:
  - haré volver la cautividad de Egipto
  - restauraré la cautividad de Egipto
  rationale: La decisión sigue la lectura idiomática del POB inglés y evita duplicar innecesariamente la idea de retorno, ya expresada después en «los haré volver». La forma española conserva el tema profético de reversión de condición, sin borrar la posibilidad literal que el hebreo también admite.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor direccional de עַל en עַל אֶרֶץ מְכוּרָתָם
  english_pob_reading: to the land of their origin
  chosen_spanish_reading: a la tierra de su origen
  alternative_spanish_readings:
  - sobre la tierra de su origen
  - en la tierra de su origen
  rationale: Aunque el hebreo usa עַל, aquí la frase acompaña un movimiento de regreso y no describe mera superposición espacial. «A la tierra de su origen» mantiene el destino del retorno y evita introducir en español una imagen que sonaría extraña o redundante.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el pasaje base; el pasaje inglés final fue revisado y confirmado como sin cambios necesarios. La draft española sigue esa lectura estable, manteniendo el paralelismo entre el modismo de restauración y el retorno físico a Patros.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - «Patros» se translitera de manera uniforme como nombre propio geográfico.
  - Se mantiene la distinción entre el modismo de restauración («restauraré la suerte») y el retorno concreto («los haré volver»), evitando fusionarlos en una sola idea.
  - «Reino humilde» conserva la valoración de שָׁפָל sin introducir una connotación doctrinal ajena.
