translation:
  language: es
  text: Derramaron la carne de tus consagrados[a] y su sangre alrededor de Jerusalén[b][c], y no había quien los enterrara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santos» o «fieles» para «consagrados».
    reason: lexical_alternative
  - marker: b
    text: Este versículo evoca estrechamente el Salmo 79:2–3 (LXX 78:2–3).
    reason: cross_reference
  - marker: c
    text: O «derramaron» puede expresarse como «vertieron»; el verbo griego es literalmente «derramaron/vertieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: Σάρκας
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - los cuerpos
  - la carne
  lexicon: LSJ
  rationale: El plural griego Σάρκας es concreto y corporal; en español, "la carne" conserva la imaginería vívida y el paralelismo con la sangre sin suavizarla a "los cuerpos". Mantiene el tono de lamento y la fuerza material del hebreo/greco-lógico subyacente.
- source_word: ὁσίων
  english_pob_choice: holy ones
  chosen_spanish: santos
  alternatives_spanish:
  - santos
  - fieles
  - piadosos
  lexicon: LSJ
  rationale: Aquí el término expresa a los consagrados a Dios. En español, "santos" comunica esa cualidad sagrada de forma natural y bíblica; se evita "santos" en sentido hagiográfico posterior solo por inercia tradicional, no por el griego de este pasaje.
- source_word: ἐξέχεαν
  english_pob_choice: they poured out
  chosen_spanish: derramaron
  alternatives_spanish:
  - pudieron derramaron
  - volcaron
  - vertieron
  lexicon: LSJ
  rationale: El verbo griego significa literalmente "verter/derramar". "Derramaron" preserva la imagen de líquido o contenido echado fuera y funciona bien con "carne" y "sangre"; "vertieron" es posible, pero suena algo más técnico en español.
- source_word: κύκλῳ Ἱερουσαλήμ
  english_pob_choice: around Jerusalem
  chosen_spanish: alrededor de Jerusalén
  alternatives_spanish:
  - en torno a Jerusalén
  - alrededor de Jerusalén
  lexicon: LSJ
  rationale: La preposición adverbial expresa circunferencia o contorno. "Alrededor de Jerusalén" es la forma más clara y natural en español, y conserva la carga de profanación y exposición pública del entorno de la ciudad.
- source_word: οὐκ ἦν αὐτοῖς ὁ θάπτων
  english_pob_choice: there was no one to bury them
  chosen_spanish: no había quien los enterrara
  alternatives_spanish:
  - no había quien los enterrara
  - no tenían quien los enterrara
  - no había sepulturero para ellos
  lexicon: LSJ
  rationale: La construcción griega literalmente dice que no existía para ellos "el que entierra". La opción elegida traduce el sentido idiomático con naturalidad y mantiene el pathos del abandono funerario sin añadir una figura de oficio que el texto no menciona.
theological_decisions:
- issue: ὁσίων como designación de los muertos violentamente en un lamento bíblico
  english_pob_reading: holy ones
  chosen_spanish_reading: santos
  alternative_spanish_readings:
  - fieles
  - piadosos
  rationale: En un contexto de lamentación intertextual, el término debe conservar el peso de pertenencia y consagración a Dios. "Santos" es el equivalente español más directo y reconocible, sin imponer necesariamente el matiz técnico posterior de canonización.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; source-sensitive covenant language'
- issue: Eco implícito del Salmo 79:2–3 en el lenguaje de derramamiento y sepultura negada
  english_pob_reading: This line closely echoes Psalm 79:2–3 (LXX 78:2–3).
  chosen_spanish_reading: Este versículo evoca estrechamente el Salmo 79:2–3 (LXX 78:2–3).
  alternative_spanish_readings:
  - Este versículo recuerda el Salmo 79:2–3.
  - Hay un eco cercano del Salmo 79:2–3.
  rationale: La relación intertextual debe quedar visible en el registro español porque ayuda a leer el verso como lamento bíblico y no como mera descripción histórica. Esto preserva la coherencia audit trail del texto fuente en la tradición poética y profética.
  doctrine_reference: 'DOCTRINE.md: preserve source-linked allusion and documented cross-reference'
translation_notes:
  revision_awareness: 'El texto griego y el auditorio inglés concuerdan en alta medida; no se registran revisiones aplicadas. La traducción española sigue el mismo núcleo léxico: carne/sangre, santos, derramar y la negación del entierro, sin suavizar la imagen.'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando aparezca el tetragrámaton; aquí no aplica.
  - '"santos" se elige como equivalente de ὁσίων en vez de "santos" con carga eclesiástica posterior; el contexto de lamento lo legitima.'
  - Se conserva la imagen corporal de "carne" en vez de neutralizarla como "cuerpos".
  - La negación funeraria se formula de modo idiomático en español sin perder la literalidad funcional del griego.
