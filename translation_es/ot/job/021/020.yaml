translation:
  language: es
  text: Que sus propios ojos[a] vean su ruina[b], y que beba de la ira del Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘sus ojos verán su calamidad’. El hebreo imperfecto también puede leerse de modo predictivo, no sólo como deseo.'
    reason: alternative_reading
  - marker: b
    text: ‘Ruina’ también puede traducirse ‘calamidad’ o ‘desastre’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְא֣וּ / עינ/ו
  english_pob_choice: Let his own eyes see
  chosen_spanish: Que sus propios ojos vean
  alternatives_spanish:
  - Que sus ojos vean
  - Que él vea con sus ojos
  lexicon: HALOT
  rationale: El hebreo pone el sujeto en plural con el posesivo de tercera persona; en español, ‘sus propios ojos’ conserva el énfasis en la experiencia personal del mal. El subjuntivo exhortativo (‘Que ... vean’) refleja bien el matiz de deseo/imprecación del contexto.
- source_word: כִּיד֑/וֹ
  english_pob_choice: his ruin
  chosen_spanish: su ruina
  alternatives_spanish:
  - su calamidad
  - su desastre
  - su destrucción
  lexicon: HALOT
  rationale: כיד puede expresar ruina, calamidad o desastre. ‘Ruina’ es breve, natural y suficientemente fuerte sin intensificar más de lo que el hebreo exige.
- source_word: וּמֵחֲמַת
  english_pob_choice: from the wrath of
  chosen_spanish: de la ira de
  alternatives_spanish:
  - de la furia de
  - del enojo de
  lexicon: HALOT
  rationale: Con el verbo ‘beber’, la imagen de padecer juicio se conserva bien en español con ‘de la ira de’. Aunque חֵמָה puede ser ‘furia’, ‘ira’ es la opción más natural y sólida en este marco de juicio divino.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  lexicon: HALOT
  rationale: ‘El Todopoderoso’ es la equivalencia tradicional y clara en español para el título divino שַׁדַּי, manteniendo la fuerza del título en Job.
- source_word: יִשְׁתֶּֽה
  english_pob_choice: let him drink
  chosen_spanish: que beba
  alternatives_spanish:
  - que él beba
  - beberá
  lexicon: HALOT
  rationale: El imperfecto hebreo permite lectura desiderativa/jussiva o predictiva. En español, ‘que beba’ conserva el tono de deseo imprecatorio sin resolver la ambigüedad temporal del hebreo.
theological_decisions:
- issue: Fuerza del imperfecto hebreo en ambos verbos
  english_pob_reading: Rendered as jussive-like wishes ('Let his own eyes see ... let him drink')
  chosen_spanish_reading: 'Subjuntivo exhortativo/imprecativo: ''Que sus propios ojos vean ... que beba'''
  alternative_spanish_readings:
  - 'Indicativo futuro: ''verán ... beberá'''
  - 'Subjuntivo más literal con pronombre explícito: ''que él vea ... que él beba'''
  rationale: El contexto expresa el deseo de que el impío experimente personalmente el juicio. El subjuntivo preserva ese impulso sin borrar la alternativa válida de lectura predictiva, que queda registrada en la nota.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: 'El texto sigue de cerca el acuerdo alto del audit trail inglés: mantiene la ambigüedad del imperfecto hebreo, conserva la imagen de ‘beber’ el juicio divino y traduce el título שַׁדַּי con ‘el Todopoderoso’. No se detectaron revisiones aplicadas en la fuente inglesa.'
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ para שַׁדַּי, porque el original no usa el tetragrámaton sino el título divino.
  - ‘Ira’ se prefirió a ‘furia’ por naturalidad en español y por coherencia con la metáfora de juicio en ‘beber’.
  - La construcción ‘sus propios ojos’ mantiene el énfasis posesivo del hebreo sin volverla rígidamente literal.
