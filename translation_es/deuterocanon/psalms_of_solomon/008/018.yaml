    text: Or “Blessed is your way” or “Welcome is your way/path.”
    reason: lexical_alternative
  - marker: b
    text: “Of the land” may also be understood more broadly as “of the earth,” but the local-political sense fits the context better.
    reason: lexical_alternative
  - marker: c
    text: Or 'Prosperous is your way. Come, enter in peace,”'.
    reason: previous_rendering
