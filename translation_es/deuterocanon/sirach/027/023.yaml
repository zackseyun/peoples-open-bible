translation:
  language: es
  text: Delante de tus ojos su boca hablará dulcemente, y admirará tus palabras; pero después torcerá su boca y, por tus palabras, se ofenderá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se escandalizará»; también puede entenderse «dará tropiezo con tus palabras» o «usará tus palabras para hacerte tropezar». El griego σκάνδαλον puede expresar ofensa o causa de tropiezo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέναντι τῶν ὀφθαλμῶν σου
  english_pob_choice: Before your eyes
  chosen_spanish: Delante de tus ojos
  alternatives_spanish:
  - En tu presencia
  - Frente a ti
  lexicon: LSJ
  rationale: La locución marca lo que ocurre abiertamente y en la presencia del interlocutor; «delante de tus ojos» conserva esa inmediatez sin sonar forzado en español.
- source_word: γλυκανεῖ στόμα σου
  english_pob_choice: his mouth speaks sweetly
  chosen_spanish: su boca hablará dulcemente
  alternatives_spanish:
  - su boca endulzará
  - su խոսca hablará con dulzura
  - su habla será dulce
  lexicon: LSJ
  rationale: El griego usa una imagen corporal de la boca que se vuelve dulce. En español, «hablará dulcemente» preserva la idea de habla halagadora sin perder naturalidad.
- source_word: ἐκθαυμάσει
  english_pob_choice: he will marvel
  chosen_spanish: admirará
  alternatives_spanish:
  - se maravillará
  - quedará muy impresionado
  lexicon: LSJ
  rationale: El verbo expresa una admiración visible o exagerada; «admirará» reproduce ese gesto de elogio sin añadir demasiado.
- source_word: ὕστερον δὲ
  english_pob_choice: but afterward
  chosen_spanish: pero después
  alternatives_spanish:
  - pero luego
  - más tarde
  lexicon: LSJ
  rationale: Mantiene el contraste temporal y adversativo entre el halago inicial y el cambio posterior.
- source_word: διαστρέψει τὸ στόμα αὐτοῦ
  english_pob_choice: he will twist his mouth
  chosen_spanish: torcerá su boca
  alternatives_spanish:
  - desviará su boca
  - cambiará su expresión
  lexicon: LSJ
  rationale: La imagen es física y metafórica a la vez. «Torcerá su boca» conserva la literalidad del gesto y sugiere el giro hostil de la խոսca.
- source_word: δώσει σκάνδαλον
  english_pob_choice: he will take offense
  chosen_spanish: se ofenderá
  alternatives_spanish:
  - causará tropiezo
  - dará ocasión de tropiezo
  - tomará ocasión de ofensa
  lexicon: BDAG
  rationale: En este contexto sapiencial, σκάνδαλον puede ser el motivo de ofensa o tropiezo. La versión española sigue la revisión inglesa final y comunica bien el sentido relacional del pasaje.
- source_word: ἐν τοῖς λόγοις σου
  english_pob_choice: at your words
  chosen_spanish: a tus palabras
  alternatives_spanish:
  - por tus palabras
  - con tus palabras
  - a causa de tus palabras
  lexicon: LSJ
  rationale: La preposición puede indicar la ocasión o la esfera en la que surge la reacción. «A tus palabras» refleja esa relación sin fijarla excesivamente.
theological_decisions:
- issue: σκάνδαλον como tropiezo u ofensa
  english_pob_reading: he will take offense
  chosen_spanish_reading: se ofenderá
  alternative_spanish_readings:
  - causará tropiezo
  - dará ocasión de tropiezo
  - se escandalizará
  rationale: La revisión inglesa opta por una reacción personal de ofensa más que por un tropiezo explícitamente teológico. En español, «se ofenderá» conserva esa lectura y evita cargar el término con un matiz doctrinal ajeno al contexto.
  doctrine_reference: Sabiduría práctica / uso relacional de σκάνδαλον, no doctrina dogmática
- issue: Cambio de conducta entre presencia y después
  english_pob_reading: Before your eyes... but afterward...
  chosen_spanish_reading: Delante de tus ojos... pero después...
  alternative_spanish_readings:
  - En tu presencia... luego...
  - Frente a ti... más tarde...
  rationale: 'El contraste temporal y de comportamiento es central en el proverbio: elogio en presencia y hostilidad posterior. La redacción española mantiene esa tensión de forma clara y sobria.'
  doctrine_reference: Literatura sapiencial; advertencia moral sobre la falsedad
- issue: Imagen corporal de la boca
  english_pob_reading: his mouth speaks sweetly / he will twist his mouth
  chosen_spanish_reading: su boca hablará dulcemente / torcerá su boca
  alternative_spanish_readings:
  - su boca hablará con dulzura / cambiará su expresión
  rationale: Se preserva la corporeidad del hebraísmo/grecismo porque forma parte del contraste retórico. No se sustituye por una abstracción como «hablará con hipocresía» para no borrar la imagen original.
  doctrine_reference: Fidelidad retórica a la imaginería sapiencial
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió la cola final de una formulación más explicativa a «at your words, he will take offense». La versión española sigue esa decisión con «a tus palabras, se ofenderá», manteniendo el valor relacional de σκάνδαλον sin añadir glosa interpretativa en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa «tus palabras» de manera uniforme para ἐν τοῖς λόγοις σου.
  - Se conservó la imaginería de «boca» en ambas mitades del versículo.
  - Se evitó «escandalizarse» en el texto principal para no introducir un falso amigo excesivamente eclesiástico; quedó reservado como alternativa en la nota.
  - El marcador [a] aparece exactamente en el punto donde se introduce la alternativa lexical.
