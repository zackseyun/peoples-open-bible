revisions:
- from: En el lugar donde degüellan el holocausto[a], degollarán la ofrenda por la culpa, y rociará su sangre sobre el altar, alrededor.
  to: En el lugar donde degüellan el holocausto[a], degollarán la ofrenda por la culpa, y arrojará su sangre contra el altar, alrededor de este.
  rationale: Se ajusta el verbo principal de la manipulación de sangre para reflejar mejor יִזְרֹק según el expediente POB, se cambia la preposición/frase del altar para conservar mejor la fuerza ritual de la acción, se suaviza la sintaxis final en español, y se normaliza la nota al pie sin alterar su contenido sustancial.
