theological_decisions:
- issue: Subject of the verbs referring to destruction
  chosen_reading: The implicit subject is God ('he did... he destroyed'), matching the immediate context.
  alternative_readings:
  - An impersonal or less explicit subject carried from context
  rationale: The Hebrew verbs are third masculine singular and in context refer to the LORD's providential action for Edom, parallel to the surrounding verses. Making the subject explicit in English clarifies the syntax without adding new theology.
