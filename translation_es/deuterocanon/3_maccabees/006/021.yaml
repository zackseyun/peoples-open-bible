translation:
  language: es
  text: Y las bestias se volvieron contra las fuerzas armadas que las seguían[a], y las atropellaron y las destruyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las tropas armadas que las acompañaban». El participio griego συνεπομένας puede significar «siguiendo» o «acompañando».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψαν
  english_pob_choice: turned against
  chosen_spanish: se volvieron contra
  alternatives_spanish:
  - se volvieron hacia
  - se volvieron en contra de
  lexicon: LSJ
  rationale: El verbo activo con τὰ θηρία como sujeto indica un cambio de dirección hostil. «Se volvieron contra» comunica naturalmente ese giro agresivo sin añadir más de lo que el griego dice.
- source_word: τὰ θηρία
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - las fieras
  lexicon: LSJ
  rationale: θηρία alude a bestias salvajes; «bestias» conserva la fuerza narrativa. «Fieras» sería posible, pero «bestias» resulta más sobrio y transparente en español bíblico contemporáneo.
- source_word: ἐπὶ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - hacia
  lexicon: LSJ
  rationale: Con movimiento hostil, ἐπί aquí funciona como dirección adversativa. «Contra» refleja el valor de ataque que el contexto inmediato confirma.
- source_word: τὰς συνεπομένας ἔνοπλους δυνάμεις
  english_pob_choice: the armed forces following them
  chosen_spanish: las fuerzas armadas que las seguían
  alternatives_spanish:
  - las tropas armadas que las acompañaban
  - las fuerzas armadas que las acompañaban
  lexicon: LSJ
  rationale: συνεπομένας significa «que seguían/acompañaban». En español, «que las seguían» reproduce bien la relación participial sin sobreexplicar. «Fuerzas armadas» mantiene ἔνοπλους δυνάμεις y evita sustituirlo por una expresión más eclesiástica o más militarizada de lo necesario.
- source_word: κατεπάτουν
  english_pob_choice: trampled them
  chosen_spanish: las pisotearon
  alternatives_spanish:
  - las tramplaron
  - las aplastaron bajo los pies
  lexicon: LSJ
  rationale: El imperfecto expresa acción repetida o continua. «Pisotearon» es un equivalente natural en español que conserva la violencia corporal del verbo. Se evita «trampled them down» porque el español no requiere ese refuerzo para ser vívido.
- source_word: ὠλέθρευον
  english_pob_choice: destroyed them
  chosen_spanish: las destruyeron
  alternatives_spanish:
  - las arruinaron
  - las aniquilaron
  lexicon: LSJ
  rationale: El verbo puede abarcar ruina o destrucción severa. «Destruyeron» es suficientemente fuerte y fiel, sin precisar más allá del griego.
translation_notes:
  revision_awareness: 'La base inglesa fue revisada desde una formulación más explicativa («following along with them», «trampled them down») a una más natural y formal («following them», «trampled them»). La redacción española sigue esa línea revisada: simplifica la relación participial con «que las seguían» y mantiene un verbo directo («pisotearon») sin añadir intensificación extra no exigida por el griego.'
  spanish_consistency_notes:
  - Se mantiene «bestias» para τὰ θηρία por coherencia con el registro narrativo de animales salvajes.
  - «Fuerzas armadas» traduce ἔνοπλους δυνάμεις sin sustituirlo por «tropas» en el texto principal, aunque se deja esa alternativa en nota.
  - El pronombre plural femenino «las» concuerda con «bestias» y «fuerzas»; la referencia es al objeto directo plural del período.
  - No se introduce terminología doctrinal, pues el versículo es narrativo y no contiene vocabulario teológico directo.
