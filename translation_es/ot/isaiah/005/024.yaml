base_translation:
  language: en
  yaml_path: translation/ot/isaiah/005/024.yaml
  text: Therefore[a], as the tongue of fire devours stubble, and dry grass sinks before the flame, so their root will become rot, and their blossom will go up like dust; for they have rejected the law of Yahweh of hosts[b], and have despised the word of the Holy One of Israel.
  footnotes:
  - marker: a
    text: Or 'dry stubble' or 'chaff' for 'dry grass'; the Hebrew term denotes dry, combustible plant matter.
    reason: lexical_alternative
  - marker: b
    text: Or 'their root will be like rot'; the Hebrew comparison may be understood either as predicate ('will become rot') or as explicit simile.
    reason: lexical_alternative
