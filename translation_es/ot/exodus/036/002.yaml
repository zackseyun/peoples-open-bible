    issue: «a acercarse a la obra» es menos fiel al rastro auditado y menos natural en español
    rationale: Aunque לְקָרְבָה literalmente contiene la idea de acercarse, la revisión inglesa ya resolvió la expresión como «come to the work» por naturalidad. En español, «venir a la obra» o «venir al trabajo» comunica mejor incorporarse a la tarea sin perder el sentido.
