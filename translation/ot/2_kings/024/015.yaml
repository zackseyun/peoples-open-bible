id: 2KI.24.15
reference: 2 Kings 24:15
source:
  edition: WLC
  text: וַ/יֶּ֥גֶל אֶת יְהוֹיָכִ֖ין בָּבֶ֑לָ/ה וְ/אֶת אֵ֣ם הַ֠/מֶּלֶךְ וְ/אֶת נְשֵׁ֨י הַ/מֶּ֜לֶךְ וְ/אֶת סָרִיסָ֗י/ו וְ/אֵת֙ אולי הָ/אָ֔רֶץ הוֹלִ֛יךְ גּוֹלָ֥ה מִ/ירוּשָׁלִַ֖ם בָּבֶֽלָ/ה־־־־׃
translation:
  text: And he carried Jehoiachin away to Babylon[a], along with the king’s mother, the king’s wives, his court officials, and the leading men of the land[c][b]; he took them into exile from Jerusalem to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his eunuchs'; the Hebrew term can refer either to eunuchs specifically or more generally to royal/court officials.
    reason: lexical_alternative
  - marker: b
    text: Or 'the mighty men of the land' or 'the nobles of the land.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the king’s mother'; this could also be expressed as 'the queen mother,' but the translation keeps the familial wording of the source text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּגֶל
  chosen: carried ... away
  alternatives:
  - led away
  - exiled
  - deported
  lexicon: HALOT
  rationale: From גלה in the causative sense of removing people into exile. 'Carried ... away' preserves the concrete movement while fitting idiomatic English narrative style.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - Babylonward
  lexicon: HALOT
  rationale: Directional he indicates motion toward Babylon. Standard English idiom is 'to Babylon.'
- source_word: אֵם הַמֶּלֶךְ
  chosen: the king’s mother
  alternatives:
  - the queen mother
  lexicon: HALOT
  rationale: Literally 'the mother of the king.' 'The king’s mother' is transparent and avoids importing a formal court title unless context requires it.
- source_word: נְשֵׁי הַמֶּלֶךְ
  chosen: the king’s wives
  alternatives:
  - his wives
  lexicon: HALOT
  rationale: Plural construct clearly refers to the wives belonging to the king. Retaining 'the king’s' mirrors the Hebrew repetition.
- source_word: סָרִיסָיו
  chosen: his court officials
  alternatives:
  - his eunuchs
  - his officers
  lexicon: HALOT
  rationale: סָרִיס can denote eunuchs or, more broadly, royal officials. In many court contexts the administrative sense is primary or at least possible, so 'court officials' best preserves likely function without overcommitting to physical status.
- source_word: אולי הָאָרֶץ
  chosen: the leading men of the land
  alternatives:
  - the mighty men of the land
  - the nobles of the land
  lexicon: HALOT
  rationale: This expression denotes prominent or powerful persons of the land. 'Leading men' communicates social prominence in readable English while preserving the masculine reference present in the Hebrew.
- source_word: הוֹלִיךְ גּוֹלָה
  chosen: he took them into exile
  alternatives:
  - he brought into exile
  - he deported
  lexicon: HALOT
  rationale: The combination of הלך in causative form with גּוֹלָה expresses causing persons to go as exiles. 'Took them into exile' is natural English and keeps the exile motif explicit.
- source_word: מִירוּשָׁלִַם בָּבֶלָה
  chosen: from Jerusalem to Babylon
  alternatives:
  - out of Jerusalem to Babylon
  lexicon: HALOT
  rationale: The paired place names mark origin and destination of the deportation. 'From Jerusalem to Babylon' is the clearest rendering.
