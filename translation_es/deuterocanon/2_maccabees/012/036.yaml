review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: los hombres con Esdrin seguían combatiendo por más tiempo, estaban agotados, y Judas invocó al Señor para que interviniera como aliado y quien va delante en la batalla. Sin embargo, hay dos ajustes de fidelidad recomendables: ἐπὶ πλεῖον se expresa mejor con ''por más tiempo'' que con ''desde hacía más tiempo'', y τοῦ πολέμου se preserva con más precisión como ''de la batalla'' en vez de ''en la batalla''.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. 'Invocó al Señor' y 'se manifestara' funcionan bien. No obstante, 'desde hacía más tiempo' suena algo temporal-retrospectivo y menos directo que el griego narrativo; 'por más tiempo' fluye mejor. También conviene conservar la relación más estrecha entre προοδηγόν y τοῦ πολέμου con 'guía de la batalla'.
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: κύριος -> ''el Señor'', σύμμαχον -> ''aliado'', y el matiz de φανῆναι se conserva con ''se manifestara''. No hay conflicto con los términos doctrinales por defecto. La elección de ''guía'' para προοδηγόν es aceptable y está respaldada por la nota; solo requiere ajustar el complemento a ''de la batalla'' para reflejar mejor el genitivo.'
  issues:
  - severity: medium
    issue: '''desde hacía más tiempo'' para ἐπὶ πλεῖον'
    rationale: El griego indica que estaban peleando por un tiempo más prolongado. En español narrativo, 'por más tiempo' o 'durante más tiempo' refleja mejor esa duración sin introducir el matiz retrospectivo de 'desde hacía'.
  - severity: medium
    issue: '''en la batalla'' para τοῦ πολέμου'
    rationale: 'El inglés auditado entiende el genitivo con προοδηγόν: ''leader of the battle''. En español, ''guía de la batalla'' preserva más de cerca esa relación que ''guía en la batalla'', que suena más circunstancial.'
  revised_spanish_text: Pero los que estaban con Esdrin combatían por más tiempo y estaban agotados, así que Judas invocó al Señor para que se manifestara como aliado[a] y como guía de la batalla.
  revised_footnotes:
  - marker: a
    text: O 'para que se mostrara como aliado y como guía en la batalla'. El griego προοδηγός puede enfatizar a quien va delante como guía.
    reason: lexical_alternative
  revision_rationale: Se hicieron ajustes menores para reflejar con mayor precisión el valor temporal de ἐπὶ πλεῖον y la relación genitival de τοῦ πολέμου con προοδηγόν, sin cambiar el sentido general ni la nota léxica ya documentada.
