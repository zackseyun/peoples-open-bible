revisions:
- from: 'Moisés dijo[a]: «Iremos con nuestros jóvenes y nuestros ancianos; iremos con nuestros hijos y nuestras hijas, con nuestros rebaños y nuestros ganados, pues debemos celebrar una fiesta para Yahvé».'
  to: 'Moisés dijo[a]: «Iremos con nuestros jóvenes y nuestros mayores; iremos con nuestros hijos y nuestras hijas, con nuestros rebaños y nuestro ganado, pues debemos celebrar una fiesta para Yahvé».'
  rationale: 'Se hacen dos ajustes menores: «mayores» evita la ambigüedad institucional de «ancianos» y preserva mejor el contraste etario con «jóvenes»; «nuestro ganado» mejora la naturalidad del español para el colectivo בָּקָר. Se mantiene «pues debemos celebrar una fiesta para Yahvé», que representa bien el valor causal y cultual del original.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:41:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: la inclusión de todos los grupos etarios y familiares, así como de los animales, y la razón cultual introducida por כִּי. También preserva correctamente יְהוָה como «Yahvé». Sin embargo, «nuestros ancianos» puede sugerir oficio de liderazgo más que simple contraste etario, y «nuestros ganados» suena menos natural y menos preciso para בָּקָר que una forma como «nuestro ganado».'
  spanish_quality_summary: El español es claro y digno, pero admite una mejora menor de naturalidad y precisión. «Jóvenes» funciona bien; «ancianos» es comprensible pero algo ambiguo en contexto bíblico. «Rebaños y nuestro ganado» suena más idiomático que «rebaños y nuestros ganados». El resto del registro y la sintaxis están bien logrados.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «Yahvé» es correcto; no hay conflicto con términos doctrinales centrales. La decisión sobre חַג como «celebrar una fiesta» es aceptable y la nota conserva alternativas pertinentes. La principal excepción recomendada es sustituir «ancianos» por «mayores» para mantener el sentido etario documentado en el audit trail.'
  issues:
  - severity: medium
    issue: «nuestros ancianos» puede leerse como cargo comunitario en vez de edad
    rationale: El hebreo וּבִזְקֵנֵינוּ, en paralelo con «nuestros jóvenes», apunta aquí a «los de más edad», no a los líderes/ancianos como institución. En español bíblico, «ancianos» suele activar esa asociación.
  - severity: low
    issue: «nuestros ganados» suena menos natural que «nuestro ganado»
    rationale: Aunque no es imposible, en español general «ganado» suele funcionar como colectivo no contable y comunica mejor בָּקָר en pareja con «rebaños».
  revised_spanish_text: 'Moisés dijo[a]: «Iremos con nuestros jóvenes y nuestros mayores; iremos con nuestros hijos y nuestras hijas, con nuestros rebaños y nuestro ganado, pues debemos celebrar una fiesta para Yahvé».

    '
  revised_footnotes:
  - marker: a
    text: O «celebrar una festividad para Yahvé» o «guardar una fiesta para Yahvé».
    reason: lexical_alternative
  revision_rationale: 'Se hacen dos ajustes menores: «mayores» evita la ambigüedad institucional de «ancianos» y preserva mejor el contraste etario con «jóvenes»; «nuestro ganado» mejora la naturalidad del español para el colectivo בָּקָר. Se mantiene «pues debemos celebrar una fiesta para Yahvé», que representa bien el valor causal y cultual del original.'
