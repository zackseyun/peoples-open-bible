  language: en
  yaml_path: translation/ot/deuteronomy/031/021.yaml
  text: And when many evils and troubles come upon him[a], this song will testify before him as a witness, for it will not be forgotten from the mouth of his offspring; for I know his inclination, what he is doing today[d][c][b], before I bring him into the land that I swore.
  footnotes:
