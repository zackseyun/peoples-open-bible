id: 2CH.24.14
reference: 2 Chronicles 24:14
source:
  edition: WLC
  text: וּֽ/כְ/כַלּוֹתָ֡/ם הֵבִ֣יאוּ לִ/פְנֵי֩ הַ/מֶּ֨לֶךְ וִֽ/יהוֹיָדָ֜ע אֶת שְׁאָ֣ר הַ/כֶּ֗סֶף וַ/יַּעֲשֵׂ֨/הוּ כֵלִ֤ים לְ/בֵית יְהוָה֙ כְּלֵ֣י שָׁרֵ֔ת וְ/הַעֲל֣וֹת וְ/כַפּ֔וֹת וּ/כְלֵ֥י זָהָ֖ב וָ/כָ֑סֶף וַ֠/יִּֽהְיוּ מַעֲלִ֨ים עֹל֤וֹת בְּ/בֵית יְהוָה֙ תָּמִ֔יד כֹּ֖ל יְמֵ֥י יְהוֹיָדָֽע־־־׃פ
translation:
  text: When they had finished[a], they brought the rest of the silver before the king and Jehoiada, and with it he made articles for the house of Yahweh, articles for ministry and for offering up, and bowls, and articles of gold and silver[c][b]. And they were offering burnt offerings in the house of Yahweh continually all the days of Jehoiada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he made it into vessels'; the Hebrew verb is singular with a singular object suffix referring to the remaining silver.
    reason: lexical_alternative
  - marker: b
    text: Or 'articles for service.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'for offering up'; the object is not stated here, though 'burnt offerings' is named explicitly later in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְכַלּוֹתָם
  chosen: When they had finished
  alternatives:
  - And when they finished
  - When they completed it
  lexicon: HALOT
  rationale: Temporal infinitive construct with prefixed conjunction/preposition, introducing the circumstance under which the following action occurred. English idiom is best captured by 'When they had finished.'
- source_word: הֵבִיאוּ
  chosen: they brought
  alternatives:
  - they presented
  lexicon: HALOT
  rationale: Common verb 'bring.' 'Presented' is possible in a formal setting, but 'brought' stays closer to the plain sense.
- source_word: שְׁאָר הַכֶּסֶף
  chosen: the rest of the silver
  alternatives:
  - the remainder of the money
  - the leftover silver
  lexicon: HALOT
  rationale: שְׁאָר means what remains; כֶּסֶף can mean silver or money. Here the context includes making gold and silver vessels, so 'silver' preserves the material sense better than the more abstract 'money.'
- source_word: וַיַּעֲשֵׂהוּ
  chosen: with it he made
  alternatives:
  - he made it into
  - they made from it
  lexicon: HALOT
  rationale: The singular verb naturally points to a singular subject, likely understood generically or institutionally after the money was brought before the king and Jehoiada. The pronominal suffix refers to the remaining silver. 'With it he made' is idiomatic English that preserves the sense without over-specifying the craftsman. 'He made it into' is also possible.
- source_word: כֵלִים
  chosen: articles
  alternatives:
  - vessels
  - utensils
  lexicon: HALOT
  rationale: כְּלִים is a broad term for implements/articles. 'Articles' is readable modern English and broad enough to cover temple implements; 'vessels' is possible but narrower and somewhat traditional.
- source_word: לְבֵית יְהוָה
  chosen: for the house of the LORD
  alternatives:
  - for the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'for the house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining natural. The divine name follows the doctrinal default 'the LORD' for יְהוָה.
- source_word: כְּלֵי שָׁרֵת
  chosen: articles for ministry
  alternatives:
  - articles for service
  - service vessels
  lexicon: HALOT
  rationale: שָׁרֵת denotes ministering/service in cultic context. 'Articles for ministry' communicates temple use in accessible English; 'service vessels' is more formal but less clear to modern readers.
- source_word: וְהַעֲלוֹת
  chosen: for offering up
  alternatives:
  - for making offerings
  - for presenting offerings
  lexicon: HALOT
  rationale: Infinitive of עלה, here likely referring to the act of offering up sacrifices. The object is not explicit in Hebrew, so a somewhat open rendering is preferable. This avoids importing 'burnt offerings' here, since that appears explicitly later in the verse.
- source_word: וְכַפּוֹת
  chosen: bowls
  alternatives:
  - cups
  - basins
  - pans
  lexicon: HALOT
  rationale: Cultic vessel term; exact shape can vary by context. 'Bowls' is a common and sufficiently broad rendering in temple-inventory contexts.
- source_word: וּכְלֵי זָהָב וָכָסֶף
  chosen: articles of gold and silver
  alternatives:
  - gold and silver vessels
  - articles made of gold and silver
  lexicon: HALOT
  rationale: Material specification of the implements. 'Articles of gold and silver' is concise and natural.
- source_word: וַיִּהְיוּ מַעֲלִים עֹלוֹת
  chosen: they were offering burnt offerings
  alternatives:
  - they offered burnt offerings
  - they kept offering burnt offerings
  lexicon: HALOT
  rationale: The construction conveys ongoing or customary action in context, reinforced by תָּמִיד. 'They were offering' preserves the durative sense without becoming paraphrastic; 'kept offering' is also possible.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually/regularly
  lexicon: HALOT
  rationale: In cultic contexts תָּמִיד often denotes regular continual observance. 'Continually' fits the adverbial force and pairs naturally with the ongoing sacrificial activity.
- source_word: כֹּל יְמֵי יְהוֹיָדָע
  chosen: all the days of Jehoiada
  alternatives:
  - throughout Jehoiada's life
  - as long as Jehoiada lived
  lexicon: HALOT
  rationale: Literal phrasing is retained. The idiomatic alternatives are valid, but 'all the days of Jehoiada' stays closer to the Hebrew while remaining understandable.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
