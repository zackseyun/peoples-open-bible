base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/022/008.yaml
  text: For all of you have conspired against me[a], and no one reveals it to me when my son makes a covenant with the son of Jesse, and none of you is sorry for me or reveals it to me that my son has stirred up my servant against me to lie in wait[d][c][b], as at this day.
  footnotes:
  - marker: a
    text: Hebrew literally, 'uncovers my ear,' an idiom meaning 'informs me' or 'reveals it to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'none of you is sorry for me' / 'none of you cares about me.'
    reason: lexical_alternative
  - marker: c
    text: '''The son of Jesse'' refers to David; Saul uses the patronymic rather than David''s name.'
    reason: cultural_note
  - marker: d
    text: Or 'has raised up my servant against me for an ambush.'
    reason: lexical_alternative
