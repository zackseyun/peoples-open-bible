translation:
  language: es
  text: 'Y los hijos de Caleb, hijo de Jefone: Iru[a], Elah y Naam; y los hijos de Elah: Kenaz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más ampliamente, ‘los descendientes de Caleb, hijo de Jefone’. En genealogías, ‘hijos’ a veces puede funcionar como término familiar más amplio, aunque aquí la lista inmediata favorece ‘hijos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Ahora los hijos de
  lexicon: HALOT
  rationale: En genealogías, בני puede abarcar ‘hijos’ o, en sentido ampliado, ‘descendientes’. Aquí el contexto enumera nombres inmediatos, por lo que ‘hijos’ reproduce con transparencia la estructura del hebreo y la opción principal de la POB en inglés.
- source_word: כָּלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de manera estándar al español bíblico.
- source_word: בֶּן יְפֻנֶּה
  english_pob_choice: son of Jephunneh
  chosen_spanish: hijo de Jefténe
  alternatives_spanish:
  - hijo de Jephunneh
  lexicon: HALOT
  rationale: Se mantiene la apposición genealógica. Se usa ‘Jefténe’ como forma española naturalizada del nombre propio, preservando la identificación del Caleb especificado en el hebreo.
- source_word: עִירוּ
  english_pob_choice: Iru
  chosen_spanish: Iru
  lexicon: Nombre propio
  rationale: Nombre propio transliterado; se conserva la forma breve del hebreo como en el texto fuente.
- source_word: אֵלָה
  english_pob_choice: Elah
  chosen_spanish: Elá
  alternatives_spanish:
  - Elah
  lexicon: Nombre propio
  rationale: Se mantiene el nombre propio, con acento gráfico para reflejar la pronunciación en español y evitar ambigüedad de lectura.
- source_word: וָנָעַם
  english_pob_choice: and Naam
  chosen_spanish: Naam
  alternatives_spanish:
  - Naam
  - Naamá
  lexicon: Nombre propio
  rationale: El hebreo vocalizado apoya un nombre masculino breve; por eso se evita ‘Naamá’, que correspondería a otra forma. Se conserva ‘Naam’ como transliteración más fiel al dato masorético.
- source_word: וּבְנֵי אֵלָה
  english_pob_choice: and the sons of Elah
  chosen_spanish: y los hijos de Elá
  alternatives_spanish:
  - y los hijos de Elah
  - y los descendientes de Elá
  lexicon: HALOT
  rationale: Se repite la misma estructura genealógica del hebreo para mantener el paralelismo y evitar suavizar la relación familiar que el texto presenta.
- source_word: וּקְנַז
  english_pob_choice: Kenaz
  chosen_spanish: Quenaz
  alternatives_spanish:
  - Kenaz
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio; en español, ‘Quenaz’ representa mejor la k/ q semítica ante e,i en una ortografía naturalizada, sin alterar la identidad del personaje.
theological_decisions:
- issue: Alcance de ‘hijos’ en genealogías
  english_pob_reading: ‘sons’ can sometimes function as a wider family term, though here the immediate list favors ‘sons.’
  chosen_spanish_reading: ‘hijos’ se mantiene como término principal, con el mismo posible alcance genealógico amplio implícito en el hebreo.
  alternative_spanish_readings:
  - ‘descendientes’
  rationale: 'No se pierde la tensión léxica: el hebreo puede extender בני más allá de la filiación estricta, pero el listado inmediato de nombres favorece ‘hijos’. Por eso no se amplía innecesariamente a ‘descendientes’ en el texto principal.'
  doctrine_reference: Genealogías del AT; uso flexible de בני en hebreo bíblico
- issue: Forma de los nombres propios frente a transliteración inglesa
  english_pob_reading: Proper names are transliterated in standard English forms.
  chosen_spanish_reading: 'Se mantienen nombres propios bíblicos en formas españolas legibles y consistentes: Caleb, Iru, Elá, Naam, Quenaz.'
  alternative_spanish_readings:
  - Elah
  - Kenaz
  rationale: En español, la inteligibilidad pública requiere adaptar ligeramente la grafía cuando ayuda a la lectura, pero sin introducir una forma no sustentada por el hebreo. No hay carga doctrinal; es una decisión de transliteración y legibilidad.
  doctrine_reference: Convenciones de transliteración bíblica en español
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés y no requiere revisión textual adicional. Se mantuvo la lectura genealógica directa, respetando la posible amplitud semántica de בני sin sobretraducirla.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo la estructura genealógica repetida del hebreo para reflejar con precisión el paralelismo del texto.
  - Los nombres propios se trataron con criterios de legibilidad española sin añadir información externa al testimonio masorético.
