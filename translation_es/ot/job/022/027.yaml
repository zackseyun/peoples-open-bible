translation:
  language: es
  text: Tú orarás a él, y él te escuchará, y cumplirás[a] tus votos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «pagarás tus votos».
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּעְתִּ֣יר
  english_pob_choice: you will pray
  chosen_spanish: orarás
  alternatives_spanish:
  - suplicarás
  - harás oración
  lexicon: HALOT
  rationale: El hifil de עתר expresa ruego insistente o súplica dirigida a Dios. En español, «orarás» comunica de forma natural y digna el acto de dirigirse a Dios en petición, sin perder el sentido de oración implorada que el contexto exige.
- source_word: אֵ֭לָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a Dios
  - a él mismo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a él». Mantener «a él» conserva la referencia pronominal del texto. El antecedente es Dios en el contexto inmediato, por lo que no hace falta repetir «Dios» en el versículo.
- source_word: וְיִשְׁמָעֶךָּ
  english_pob_choice: and he will hear you
  chosen_spanish: y él te escuchará
  alternatives_spanish:
  - y te oirá
  - y te hará caso
  lexicon: HALOT
  rationale: שׁמע puede rendirse como «oír», «escuchar» o «hacer caso». «Escuchará» funciona bien en español moderno y preserva la idea de atención favorable en el contexto de la oración.
- source_word: וּנְדָרֶיךָ
  english_pob_choice: and your vows
  chosen_spanish: tus votos
  alternatives_spanish:
  - tus promesas
  - tus votos hechos a Dios
  lexicon: HALOT
  rationale: נדר significa un voto hecho, especialmente ante Dios. «Votos» es el equivalente más directo y conserva el registro religioso sin añadir precisión cultual que el sustantivo no exige por sí mismo.
- source_word: תְשַׁלֵּם
  english_pob_choice: you will fulfill
  chosen_spanish: cumplirás
  alternatives_spanish:
  - pagarás
  - realizarás
  lexicon: HALOT
  rationale: El piel de שלם con votos es un giro idiomático que significa pagar o cumplir lo prometido. «Cumplirás» comunica la obligación y el acto de llevar a cabo el voto en español natural, mientras «pagarás» conserva una literalidad más fuerte pero puede sonar demasiado monetaria.
theological_decisions:
- issue: Cómo traducir el último miembro idiomático relativo a los votos
  english_pob_reading: you will fulfill your vows
  chosen_spanish_reading: cumplirás tus votos
  alternative_spanish_readings:
  - pagarás tus votos
  - harás tus votos
  rationale: El hebreo usa un idiomatismo de «pagar/cumplir votos». En español, «cumplir tus votos» preserva el sentido de obligación religiosa y evita una lectura excesivamente financiera, sin borrar la alternativa más literal.
  doctrine_reference: Job 22:27; traducción idiomática de votos en lenguaje bíblico
translation_notes:
  revision_awareness: La revisión del audit trail inglés indica alta concordancia y ningún cambio pendiente; por eso se mantiene una solución española directa, con una sola nota para conservar la alternativa literal del último verbo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece explícitamente en el texto fuente; aquí el versículo se refiere a Dios con pronombre, así que se conserva «a él».
  - Se opta por el registro verbal natural «orarás / escuchará / cumplirás» para una lectura publica y digna, sin perder la correspondencia con el hebreo.
  - La nota a pie de página preserva la tensión entre «cumplir» y «pagar» en el último miembro, tal como refleja el audit trail inglés.
