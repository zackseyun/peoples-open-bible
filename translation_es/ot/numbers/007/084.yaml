base_translation:
  language: en
  yaml_path: translation/ot/numbers/007/084.yaml
  text: 'This was the dedication offering of the altar on the day it was anointed[a], from the leaders of Israel: twelve silver dishes, twelve silver bowls[c][b], and twelve gold pans.'
  footnotes:
  - marker: a
    text: Or 'This is the dedication of the altar'; the Hebrew can be rendered more formally, but the context favors a retrospective summary of the offerings presented.
    reason: lexical_alternative
  - marker: b
    text: Or 'chiefs' or 'princes of Israel.' The Hebrew term refers to the recognized tribal leaders.
    reason: lexical_alternative
  - marker: c
    text: The vessel names may also be rendered 'silver plates,' 'silver basins,' and 'gold dishes/ladles,' depending on how one construes the specific cultic utensils.
    reason: lexical_alternative
