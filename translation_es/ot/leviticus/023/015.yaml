translation:
  language: es
  text: 'Y contarán para ustedes desde el día siguiente al sábado[a], desde el día en que traigan la gavilla de la ofrenda mecida: siete sábados completos habrá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siete semanas completas». El hebreo dice literalmente «siete sábados completos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּסְפַרְתֶּם
  english_pob_choice: And you shall count
  chosen_spanish: Y contarán
  alternatives_spanish:
  - Y deben contar
  - Y ustedes contarán
  lexicon: HALOT
  rationale: El hebreo expresa una instrucción normativa en forma verbal futura/jussiva. «Contarán» conserva la fuerza directiva sin volverla demasiado pesada; el sujeto explícito «ustedes» es innecesario en español por la desinencia verbal.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para sí mismos
  - para ustedes mismos
  lexicon: HALOT
  rationale: El dativo añade valor personal o reflexivo al mandato. En español, «para ustedes» comunica naturalmente la instrucción dirigida al pueblo; «ustedes mismos» sería más enfático, pero suena menos fluido en este contexto legal.
- source_word: מִמָּחֳרַת הַשַּׁבָּת
  english_pob_choice: from the day after the Sabbath
  chosen_spanish: desde el día después del sábado
  alternatives_spanish:
  - desde el día siguiente al sábado
  - desde el día después del día de reposo
  lexicon: HALOT
  rationale: Se mantiene el término base del hebreo con «sábado», porque el texto usa שַׁבָּת y el proyecto prefiere no resolver de antemano la discusión calendárica con «semana» o «día de reposo». «Desde el día después» es claro y natural en español.
- source_word: מִיּוֹם הֲבִיאֲכֶם
  english_pob_choice: from the day you bring
  chosen_spanish: desde el día en que traigan
  alternatives_spanish:
  - desde el día de traer
  - desde el día cuando traigan
  lexicon: HALOT
  rationale: La construcción marca el punto de partida del conteo. «En que traigan» reproduce bien la relación temporal y mantiene el tono normativo del pasaje.
- source_word: עֹמֶר
  english_pob_choice: the sheaf
  chosen_spanish: la gavilla
  alternatives_spanish:
  - la gavilla de cereal
  - el omer
  lexicon: HALOT
  rationale: En este contexto ritual, עֹמֶר designa concretamente una gavilla presentada. «Gavilla» es el equivalente español transparente; se evita «omer» por ser menos claro para el lector general.
- source_word: הַתְּנוּפָה
  english_pob_choice: of the wave offering
  chosen_spanish: de la ofrenda mecida
  alternatives_spanish:
  - de la ofrenda mecida ante Yahvé
  - de la ofrenda movida
  lexicon: HALOT
  rationale: «Ofrenda mecida» conserva el valor técnico del rito de mecer/presentar la ofrenda. Es el equivalente más natural en español bíblico sin perder la especificidad cultual.
- source_word: שֶׁבַע שַׁבָּתוֹת
  english_pob_choice: seven complete Sabbaths
  chosen_spanish: siete sábados completos
  alternatives_spanish:
  - siete semanas completas
  - siete sábados enteros
  lexicon: HALOT
  rationale: Se preserva la literalidad del hebreo («sábados») y la aclaración de completitud de תְּמִימֹת con «completos». Se evita resolver la expresión como «semanas» en el texto principal, para mantener la tensión interpretativa documentada por el POB inglés.
- source_word: תְּמִימֹת
  english_pob_choice: complete
  chosen_spanish: completos
  alternatives_spanish:
  - enteros
  - plenos
  lexicon: HALOT
  rationale: Aquí el adjetivo expresa integridad del ciclo temporal, no perfección moral. «Completos» es idiomático y comunica la idea de ciclos íntegros.
- source_word: תִּהְיֶינָה
  english_pob_choice: shall there be
  chosen_spanish: habrá
  alternatives_spanish:
  - serán
  - existirán
  lexicon: HALOT
  rationale: La cláusula es existencial/predicativa. En español, «habrá» resulta más natural y conserva el sentido de que esos siete sábados completos constituirán el periodo requerido.
theological_decisions:
- issue: Interpretación de שַׁבָּת / שַׁבָּתוֹת en la instrucción calendárica
  english_pob_reading: Retain 'Sabbath' / 'Sabbaths' in the main text rather than resolving to 'week(s).
  chosen_spanish_reading: Mantener «sábado» / «sábados» en el texto principal en vez de resolverlo como «semana(s)».
  alternative_spanish_readings:
  - «semana(s)»
  - «semanas completas»
  rationale: El hebreo usa explícitamente el término de sábado, y el POB inglés conserva esa tensión en lugar de interpretarla de forma cerrada. La traducción española sigue esa misma decisión para no borrar el debate calendárico implícito.
  doctrine_reference: Translation philosophy §3, preservar la tensión textual y teológica; §5, consistencia terminológica con excepciones documentadas.
translation_notes:
  revision_awareness: 'Coincide con el último paso de revisión: no se requieren cambios adicionales respecto del estado auditado, y la redacción española mantiene la decisión documentada de conservar la literalidad de «sábados» con la alternativa interpretativa en nota.'
  spanish_consistency_notes:
  - Se conservó el término cultual «sábado/sábados» para reflejar el hebreo שַׁבָּת/שַׁבָּתוֹת.
  - «Ofrenda mecida» mantiene el lenguaje ritual técnico del pasaje.
  - El conteo se expresa con un español bíblico moderno y claro, evitando tanto el arcaísmo innecesario como la paráfrasis interpretativa.
