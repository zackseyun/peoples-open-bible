translation:
  language: es
  text: Partieron de Sucot y acamparon en Etam, al borde del desierto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Desierto» traduce aquí מִדְבָּר en sentido bíblico amplio: una región inhóspita o despoblada, no necesariamente una extensión de arena.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de נסע marca la siguiente acción narrativa de desplazarse. «Partieron» conserva el movimiento de salida de forma natural en español sin perder el valor narrativo secuencial.
- source_word: מִסֻּכֹּת
  english_pob_choice: from Succoth
  chosen_spanish: de Sucot
  alternatives_spanish:
  - desde Sucot
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera como «Sucot»; el prefijo מִן se expresa con «de» para un español fluido y fiel al origen.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - e hicieron campamento
  - y acamparon
  lexicon: HALOT
  rationale: חנה significa acampar o acamparse en contexto de viaje. «Acamparon» es la equivalencia directa y natural en español, preservando el aspecto de establecimiento temporal.
- source_word: בְאֵתָם
  english_pob_choice: at Etham
  chosen_spanish: en Etam
  alternatives_spanish:
  - en Etham
  - junto a Etam
  lexicon: HALOT
  rationale: Se mantiene el topónimo con transliteración breve «Etam». El prefijo locativo בְ se expresa con «en», que en español funciona bien para llegada o permanencia en un lugar.
- source_word: בִּקְצֵה
  english_pob_choice: on the edge of
  chosen_spanish: en el borde de
  alternatives_spanish:
  - al borde de
  - en el extremo de
  - en la frontera de
  lexicon: HALOT
  rationale: קָצֶה indica borde, extremidad o límite. «En el borde de» preserva la imagen espacial sin introducir una interpretación más técnica como «frontera».
- source_word: הַמִּדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el desierto yermo
  - la estepa
  lexicon: HALOT
  rationale: Aunque מִדְבָּר suele abarcar un territorio de desierto/estepa en la Biblia, en español «desierto» comunica con claridad la zona despoblada. Se evita «yermo» por sonar menos natural; «desierto» aquí no pretende precisar arena, sino aridez y despoblación.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa presentan alta concordancia y no requieren revisiones textuales; la única tensión léxica relevante es מִדְבָּר, donde el español «desierto» puede sugerir arena, por lo que se aclara su sentido bíblico amplio en nota.
  spanish_consistency_notes:
  - Se mantuvo «Sucot» y «Etam» como transliteraciones coherentes de topónimos.
  - Se evitó «SEÑOR» u այլ terminología no pertinente porque el versículo no contiene nombres divinos.
  - 'La sintaxis española sigue el orden narrativo del hebreo y del inglés auditado: salida, llegada, ubicación.'
  - «Desierto» se usa en su valor bíblico general, no como especificación geográfica moderna.
