translation:
  language: es
  text: Sean como la hierba de las azoteas[a], que se seca antes de crecer[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen apunta a hierba que brota sobre azoteas planas y poco profundas, un crecimiento frágil y pasajero.
    reason: cultural_note
  - marker: b
    text: El hebreo es breve y algo difícil; la revisión inglesa favorece la idea de que la hierba se seca antes de llegar a crecer o madurar, no necesariamente antes de ser arrancada.
    reason: textual_variant
lexical_decisions:
- source_word: יִ֭הְיוּ
  english_pob_choice: May they be
  chosen_spanish: Sean
  alternatives_spanish:
  - Que sean
  - Ojalá sean
  lexicon: HALOT
  rationale: El hebreo expresa un deseo/imprecación; en español, el subjuntivo imperativo conciso ‘Sean’ comunica bien ese valor optativo sin añadir paráfrasis.
- source_word: כַּ/חֲצִ֣יר
  english_pob_choice: like grass
  chosen_spanish: como la hierba
  alternatives_spanish:
  - como el pasto
  - como la hierba seca
  lexicon: HALOT
  rationale: חָצִיר designa vegetación baja/gramínea; ‘hierba’ es natural en español bíblico moderno y conserva la imagen vegetal general.
- source_word: גַּגּ֑וֹת
  english_pob_choice: on the rooftops
  chosen_spanish: de las azoteas
  alternatives_spanish:
  - de los techos
  - en las azoteas
  - sobre los techos
  lexicon: HALOT
  rationale: El hebreo usa el plural ‘techos/azoteas’ como lugar de la hierba; en español, ‘de las azoteas’ mantiene el matiz locativo sin sonar forzado en la construcción comparativa. La nota explica el valor espacial de la imagen.
- source_word: שֶׁ/קַּדְמַ֖ת
  english_pob_choice: before it
  chosen_spanish: antes de crecer
  alternatives_spanish:
  - antes de que crezca
  - antes de levantarse
  lexicon: HALOT
  rationale: La construcción temporal indica que el secarse ocurre antes del desarrollo/maduración de la hierba. ‘Antes de crecer’ refleja esa idea con naturalidad y sigue la revisión inglesa que corrigió la lectura equivocada de ‘before it is pulled up’.
- source_word: שָׁלַ֣ף
  english_pob_choice: is pulled up / is plucked up
  chosen_spanish: crecer
  alternatives_spanish:
  - ser arrancada
  - ser sacada
  - ser arrancada de raíz
  lexicon: HALOT
  rationale: 'Aquí sigo la revisión del POB inglés: el punto no es el arrancamiento sino que la hierba se seca antes de llegar a crecer. Por eso no traduzco literalmente el verbo en la línea principal, sino que integro el sentido temporal correcto en la frase española.'
- source_word: יָבֵֽשׁ
  english_pob_choice: withers
  chosen_spanish: se seca
  alternatives_spanish:
  - se marchita
  - se agosta
  - se vuelve seca
  lexicon: HALOT
  rationale: יָבֵשׁ denota secarse; ‘se seca’ es claro, fiel y conserva el paralelismo poético con la imagen de la hierba efímera.
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail: la versión inglesa cambió de ‘before it is pulled up’ a ‘before it grows up’ para reflejar con mayor precisión el hebreo. Por eso la línea española evita la imagen de arranque como idea principal y expresa el secarse prematuro de la hierba.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera; en este versículo no aparece.
  - ‘Hierba’ se mantiene para חָצִיר por claridad y naturalidad; no se optó por ‘pasto’ para conservar un tono bíblico más amplio.
  - La sintaxis española busca mantener la estructura poética breve del hebreo sin forzar un calco rígido.
