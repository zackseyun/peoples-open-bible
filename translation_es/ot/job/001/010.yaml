translation:
  language: es
  text: ¿No has puesto un cerco[a] alrededor de él, alrededor de su casa y alrededor de todo lo que tiene, por todas partes? Has bendecido la obra de sus manos, y su ganado ha aumentado en la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo has cercado' / 'lo has rodeado con un cerco'. El hebreo usa una imagen concreta de protección mediante un cerco alrededor.
    reason: lexical_alternative
  - marker: b
    text: O 'se ha multiplicado en la tierra'. El verbo hebreo sugiere literalmente irrumpir, brotar o expandirse con fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂכְתָּ
  english_pob_choice: put a hedge around
  chosen_spanish: has puesto una cerca
  alternatives_spanish:
  - has cercado
  - has rodeado con una cerca
  - has puesto un cerco
  lexicon: HALOT
  rationale: El hebreo presenta una imagen concreta de enclosure/protección. 'Poner una cerca' conserva la metáfora espacial de forma natural en español, sin abstraerla a 'proteger'.
- source_word: בַעֲדוֹ / וּבְעַד בֵּיתוֹ / וּבְעַד כָּל אֲשֶׁר לוֹ
  english_pob_choice: around him and around his house and around all that he has
  chosen_spanish: alrededor de él, alrededor de su casa y alrededor de todo lo que tiene
  alternatives_spanish:
  - por él, por su casa y por todo lo que tiene
  - en favor de él, de su casa y de todo lo que tiene
  lexicon: HALOT
  rationale: Aquí בְעַד funciona en el campo espacial-protectivo junto con שַׂכְתָּ y מִסָּבִיב. 'Alrededor de' mantiene la repetición enfática y el sentido de encierro protector.
- source_word: מִסָּבִיב
  english_pob_choice: on every side
  chosen_spanish: por todas partes
  alternatives_spanish:
  - a cada lado
  - en todo alrededor
  - por todos lados
  lexicon: HALOT
  rationale: La expresión intensifica la imagen de completa circunferencia. 'Por todas partes' es idiomático en español y conserva el total del encierro.
- source_word: מַעֲשֵׂה יָדָיו
  english_pob_choice: the work of his hands
  chosen_spanish: la obra de sus manos
  alternatives_spanish:
  - el trabajo de sus manos
  - todo lo que sus manos han hecho
  lexicon: HALOT
  rationale: Es un modismo hebreo para el trabajo o la actividad productiva. 'La obra de sus manos' mantiene la fórmula transparente y digna, cercana a la cadencia bíblica sin ser arcaizante.
- source_word: בֵּרַכְתָּ
  english_pob_choice: have blessed
  chosen_spanish: has bendecido
  alternatives_spanish:
  - has prosperado
  - has favorecido
  lexicon: HALOT
  rationale: El verbo significa propiamente 'bendecir'. Aunque el resultado visible es prosperidad, la frase conserva la atribución teológica al acto de bendecir, no solo al éxito económico.
- source_word: מִקְנֵהוּ
  english_pob_choice: his livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus rebaños
  - su hacienda
  - sus animales
  lexicon: HALOT
  rationale: מִקְנֶה suele referirse al ganado o a los animales de cría, no a bienes en general. 'Ganado' es una opción amplia y clara en español; 'hacienda' podría sonar más ambigua según el contexto.
- source_word: פָּרַץ
  english_pob_choice: has increased in the land
  chosen_spanish: ha aumentado en la tierra
  alternatives_spanish:
  - ha crecido en la tierra
  - se ha multiplicado en la tierra
  - ha brotado en la tierra
  lexicon: HALOT
  rationale: El verbo sugiere literalmente 'estallar/brotar' y, en este contexto, aumento abundante. 'Ha aumentado' conserva el sentido de incremento sin perder naturalidad en español. La nota explicará la fuerza figurada del verbo.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - por la tierra
  lexicon: HALOT
  rationale: Con פָּרַץ, la frase señala el ámbito donde ese aumento se manifiesta. 'En la tierra' sigue de cerca el hebreo y funciona bien en un registro bíblico neutral.
- source_word: הֲלֹא
  english_pob_choice: Have you not
  chosen_spanish: ¿No has... ?
  alternatives_spanish:
  - ¿Acaso no has... ?
  - ¿No es verdad que has... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica acusatoria. '¿No has...?' mantiene el forcejeo argumentativo del hebreo y es plenamente natural en español.
theological_decisions:
- issue: Preservación de la metáfora de protección frente a una abstracción explicativa
  english_pob_reading: put a hedge around
  chosen_spanish_reading: has puesto una cerca
  alternative_spanish_readings:
  - has protegido
  - has guardado
  rationale: El texto no solo afirma protección; la expresa mediante una imagen concreta de cercado. Mantenerla evita perder el relieve literario y la acusación implícita de Satanás.
  doctrine_reference: Translation philosophy §1, §5
- issue: Mantener el lenguaje de bendición en vez de convertirlo solo en prosperidad
  english_pob_reading: You have blessed the work of his hands
  chosen_spanish_reading: Has bendecido la obra de sus manos
  alternative_spanish_readings:
  - Has prosperado la obra de sus manos
  rationale: El hebreo atribuye la abundancia a la bendición divina. 'Bendecido' preserva la afirmación teológica; 'prosperado' sería una consecuencia posible, pero no sustituye el verbo original.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza figurada de פָּרַץ en relación con el ganado
  english_pob_reading: his livestock has increased in the land
  chosen_spanish_reading: su ganado ha aumentado en la tierra
  alternative_spanish_readings:
  - su ganado se ha desbordado en la tierra
  - su ganado ha brotado en la tierra
  rationale: El verbo hebreo evoca expansión abundante, incluso con la imagen de romper límites. 'Ha aumentado' comunica el resultado de manera sobria; la nota puede conservar la alternativa más vívida sin hacerla extraña.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: La redacción sigue de cerca el último pass de revisión en inglés, que ajustó 'has spread throughout the land' a 'has increased in the land' para acercarse más a פָּרַץ. En español se reflejó ese ajuste con 'ha aumentado en la tierra', manteniendo la metáfora de encierro y la fórmula de bendición.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el Tetragrámaton explícito; este versículo no lo contiene.
  - Se evitó 'Señor' como sustituto teológico aquí porque no corresponde al texto hebreo de este verso.
  - '''Ganado'' se usa en sentido amplio de animales de cría, coherente con מִקְנֶה en este contexto.'
  - La repetición de 'alrededor de' conserva el paralelismo enfático del hebreo y sugiere cercado completo.
