translation:
  language: es
  text: al otro lado del Jordán, en el valle frente a Bet-peor, en la tierra de Sihón, rey de los amorreos, que habitaba en Hesbón, al que Moisés y los hijos de Israel derrotaron cuando salieron de Egipto.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: HALOT
  rationale: עֵבֶר con la preposición prefijada marca una ubicación geográfica del lado opuesto de un límite. En español, «al otro lado del Jordán» comunica bien esa perspectiva espacial sin sonar rígido.
- source_word: בַּגַּיְא
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en la hondonada
  - en el barranco
  lexicon: HALOT
  rationale: גַּיְא puede referirse a un valle o garganta. Aquí «valle» es claro y natural en español, y conserva el dato topográfico.
- source_word: מוּל
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  lexicon: HALOT
  rationale: La idea espacial es de ubicación correspondiente o frente a algo. «Frente a» expresa bien la relación sin forzar un tecnicismo.
- source_word: בֵּית פְּעוֹר
  english_pob_choice: Beth-peor
  chosen_spanish: Bet-peor
  alternatives_spanish:
  - Beth-peor
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera, y «Bet-» mantiene una forma común y legible en español para topónimos bíblicos.
- source_word: בְּאֶרֶץ סִיחֹן
  english_pob_choice: in the land of Sihon
  chosen_spanish: en la tierra de Sihón
  alternatives_spanish:
  - en el territorio de Sihón
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra o territorio. «Tierra» es la opción más directa y natural en este contexto histórico-geográfico.
- source_word: מֶלֶךְ הָאֱמֹרִי
  english_pob_choice: king of the Amorites
  chosen_spanish: rey de los amorreos
  alternatives_spanish:
  - rey amorreo
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma natural como «rey de los amorreos», manteniendo la identificación formal de Sihón.
- source_word: אֲשֶׁר יוֹשֵׁב בְּחֶשְׁבּוֹן
  english_pob_choice: who lived in Heshbon
  chosen_spanish: que habitaba en Hesbón
  alternatives_spanish:
  - que vivía en Hesbón
  - que residía en Hesbón
  lexicon: HALOT
  rationale: El participio indica residencia continua. «Habitaba» conserva ese matiz mejor que un simple pasado puntual y suena natural en español bíblico contemporáneo.
- source_word: אֲשֶׁר הִכָּה
  english_pob_choice: whom ... struck down
  chosen_spanish: al que ... hirieron
  alternatives_spanish:
  - al que ... derrotaron
  - al que ... golpearon
  lexicon: HALOT
  rationale: נכה en contexto bélico puede ser «herir»/«derribar». En español, «hirieron» comunica la acción de combate sin cargar el texto con una paráfrasis interpretativa. El objeto directo «al que» refleja el antecedente masculino singular en la cadena relativa.
- source_word: מֹשֶׁה וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: Moses and the sons of Israel
  chosen_spanish: Moisés y los hijos de Israel
  alternatives_spanish:
  - Moisés y los hijos de Israel
  - Moisés y los israelitas
  lexicon: HALOT
  rationale: Se preserva la forma masculina plural del hebreo con «hijos de Israel», en línea con la preferencia del proyecto por no neutralizar automáticamente el etnónimo. «Israelitas» queda como alternativa idiomática pero menos literal.
- source_word: בְּצֵאתָם מִמִּצְרָיִם
  english_pob_choice: when they came out from Egypt
  chosen_spanish: cuando salieron de Egipto
  alternatives_spanish:
  - cuando llegaron a salir de Egipto
  - al salir de Egipto
  lexicon: HALOT
  rationale: La construcción temporal se expresa naturalmente con «cuando salieron de Egipto», conservando la referencia al éxodo sin añadir elementos ajenos al hebreo.
theological_decisions:
- issue: Mantenimiento del etnónimo masculino plural en וּבְנֵי יִשְׂרָאֵל
  english_pob_reading: and the sons of Israel
  chosen_spanish_reading: y los hijos de Israel
  alternative_spanish_readings:
  - y los israelitas
  - y los hijos de Israel
  rationale: El hebreo usa explícitamente un plural masculino en constructo. La versión española mantiene esa forma para no borrar la señal gramatical y semántica del original, dejando «los israelitas» como equivalencia colectiva posible pero secundaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con el texto hebreo y sin cambios recientes en la revisión inglesa. Se ha seguido la lectura estable del POB, ajustando únicamente la formulación española para fluidez natural sin perder los rasgos léxicos relevantes del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Bet-peor» mantiene transliteración consistente para topónimos.
  - «Hesbón» conserva acentuación española estándar en nombres bíblicos.
  - Se preserva la relación espacial de מוּל con «frente a», sin convertirla en una glosa interpretativa más amplia.
