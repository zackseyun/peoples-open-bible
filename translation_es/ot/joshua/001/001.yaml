revisions:
- from: 'Aconteció después de la muerte de Moisés[a], siervo de Yahvé, que Yahvé habló a Josué, hijo de Nun, asistente de Moisés, diciendo:'
  to: 'Después de la muerte de Moisés, siervo de Yahvé, Yahvé dijo a Josué, hijo de Nun, asistente[a] de Moisés, diciendo:'
  rationale: Se corrige el verbo de habla a «dijo» para reflejar mejor וַיֹּאמֶר y la decisión auditada del POB. Se elimina «Aconteció ... que» en favor de una apertura más natural en español moderno que aún conserva la transición temporal del hebreo. Se reubica y reescribe la nota al pie para que trate correctamente el término מְשָׁרֵת, que es donde el POB preservó alternativas léxicas. No se requiere adjudicación adicional porque los cambios son claros, locales y no doctrinalmente inciertos.
