translation:
  language: es
  text: 'Israel le dijo a José[a]: «No esperaba ver tu rostro, y ahora Dios me ha permitido ver incluso a tu descendencia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No esperaba verte». El hebreo idiomático «ver tu rostro» significa verte en persona, pero se conserva la formulación más literal en el texto principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: le dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El hebreo usa wayyiqtol narrativo; en español, «le dijo» comunica con naturalidad el avance narrativo sin forzar una coordinación repetida con «y».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: El texto hebreo nombra al patriarca como Israel, y conservar ese nombre respeta la forma del original.
- source_word: רְאֹה פָנֶיךָ
  english_pob_choice: to see your face
  chosen_spanish: ver tu rostro
  alternatives_spanish:
  - verte
  - ver tu cara
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente alude al rostro; «ver tu rostro» conserva esa concreción y el tono emotivo. «Verte» sería más natural, pero menos fiel a la imagen.
- source_word: לֹא פִלָּלְתִּי
  english_pob_choice: I did not expect
  chosen_spanish: No esperaba
  alternatives_spanish:
  - No imaginaba
  - No pensaba
  lexicon: HALOT
  rationale: En este contexto, פִלָּלְתִּי expresa expectativa o anticipación frustrada, no la idea de oración. «No esperaba» reproduce bien ese sentido.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y, sin embargo,
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: En español, «y, sin embargo,» comunica el giro de sorpresa y contraste que introduce וְהִנֵּה. «Y he aquí» es posible, pero suena más arcaico.
- source_word: הֶרְאָה אֹתִי
  english_pob_choice: has let me see
  chosen_spanish: me ha permitido ver
  alternatives_spanish:
  - me ha hecho ver
  - me ha mostrado
  lexicon: HALOT
  rationale: El hiphil de ראה es causativo; en español, «me ha permitido ver» expresa con naturalidad que Dios hizo posible la visión sin perder el matiz de acción causativa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  lexicon: HALOT
  rationale: Se trata del título divino genérico, no del nombre de pacto. «Dios» es la equivalencia directa y transparente.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - también
  - hasta
  lexicon: HALOT
  rationale: «Incluso» transmite el valor aditivo e intensificador de גַּם en un contexto de sorpresa y bendición mayor de lo esperado.
- source_word: זַרְעֶךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  lexicon: HALOT
  rationale: En español, «descendencia» conserva el sentido colectivo de זֶרַע sin el problema de literalidad dura de «simiente»; «descendientes» sería posible, pero algo más distributivo.
theological_decisions:
- issue: Tratamiento de la mención divina en una declaración de providencia patriarcal
  english_pob_reading: God has let me see even your offspring
  chosen_spanish_reading: Dios me ha permitido ver incluso a tu descendencia
  alternative_spanish_readings:
  - Dios me ha hecho ver incluso a tu descendencia
  - Dios me ha dejado ver incluso a tu descendencia
  rationale: La frase atribuye a Dios la concesión providencial de ver a José y a su línea. «Me ha permitido ver» mantiene el sentido causativo sin añadir una afirmación doctrinal más fuerte de la que el hebreo exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El contexto auditado en inglés no introduce cambios revisionales posteriores al último pase; la lectura sigue en acuerdo alto y no se documentan correcciones pendientes para este versículo.
  spanish_consistency_notes:
  - Se conserva «Israel» conforme al nombre hebreo del versículo.
  - «Dios» se usa como título divino genérico, sin sustituirlo por una convención tipográfica de ocultamiento del nombre divino.
  - «Descendencia» mantiene el valor colectivo de זרע en un español natural y bíblico.
  - La nota conserva la tensión entre la literalidad de «ver tu rostro» y la equivalencia idiomática «verte en persona».
