  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: la plata y el oro son desechados, no pueden librar en el día de la ira de Yahvé, y la imagen de hambre/llenura está bien captada con ''apetito''. También preserva correctamente ''Yahvé'' y la nota sobre נִדָּה. Sin embargo, la cláusula final pierde el matiz resultativo de הָיָה al traducir ''fue'' en vez de ''ha sido/se ha convertido'', y ''sus entrañas'' es menos claro que el referente alimentario inmediato del hebreo.'
  spanish_quality_summary: El español es mayormente natural y digno. 'Arrojarán su plata a las calles' y 'será una cosa impura' funcionan bien. No obstante, 'fue el tropiezo de su iniquidad' suena algo rígido y menos preciso que una formulación resultativa; además, en contexto de comer, 'sus estómagos' comunica mejor que 'sus entrañas' sin perder dignidad.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה -> ''Yahvé''; נֶפֶשׁ en contexto -> ''apetito''; נִדָּה con nota explicativa. No hay conflicto de glosario mayor. La principal corrección es de aspecto verbal y claridad contextual, no doctrinal.'
  issues:
  - severity: medium
    issue: הָיָה se tradujo como 'fue'
    rationale: El POB inglés documenta un valor resultativo ('has become'). En español, 'fue' tiende a sonar pasado simple y debilita la idea de estado resultante de la riqueza convertida en ocasión de pecado.
  - severity: low
    issue: וּמֵעֵיהֶם como 'sus entrañas'
    rationale: Aunque es defendible, en un contexto explícito de saciar y llenar, 'sus estómagos' o 'sus vientres' comunica con más claridad el sentido concreto de la imagen corporal.
  - severity: low
    issue: '''el tropiezo de su iniquidad'' suena menos idiomático'
    rationale: La metáfora de מִכְשׁוֹל se preserva, pero en español fluye mejor 'la piedra de tropiezo de su iniquidad' o mantener 'tropiezo' junto con un verbo resultativo claro.
  revised_spanish_text: Arrojarán su plata a las calles[a], y su oro será una cosa impura. Su plata y su oro no podrán librarlos en el día de la ira de Yahvé. No saciarán su apetito ni llenarán sus estómagos, porque ha sido tropiezo de su iniquidad.
  revised_footnotes:
