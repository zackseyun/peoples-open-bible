base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/035.yaml
  text: They built the high places of Baal that are in the Valley of Ben-hinnom[a], to make their sons and their daughters pass through the fire to Molech—something I had not commanded them, nor had it entered my heart that they should do this abomination[c][b], causing Judah to sin.
  footnotes:
  - marker: a
    text: Or 'in the valley of the son of Hinnom.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to make their sons and their daughters pass through'; this idiom refers to child sacrifice, here associated with fire and Molech worship.
    reason: cultural_note
  - marker: c
    text: Or 'nor did it arise in my mind.' Hebrew 'nor did it come up upon my heart.'
    reason: lexical_alternative
