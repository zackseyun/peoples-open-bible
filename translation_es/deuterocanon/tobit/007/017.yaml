review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del griego, conserva la repetición de Θάρσει, el optativo de bendición («que ... te conceda»), y mantiene adecuadamente «favor» para χάριν con nota alternativa. Sin embargo, τέκνον no significa específicamente «hijo»; el griego usa primero un vocativo filial general y luego especifica «hija» con θύγατερ. Por eso «hijo» distorsiona el matiz del original.
  spanish_quality_summary: 'El español es mayormente claro y digno, pero «hijo» entra en tensión con el «hija» final y puede confundir al lector. Además, la nota [a] está mal formulada: pone como alternativa «ánimo», que ya está dentro de la traducción elegida, en vez de ofrecer una alternativa real. «En lugar de esta tu tristeza» es comprensible, aunque algo tieso; una leve mejora a «en lugar de esta tristeza tuya» suena más natural sin perder cercanía.'
  glossary_alignment: No hay conflicto grave con la terminología del proyecto. «Señor» para κύριος es correcto aquí como título divino. «Favor» para χάρις concuerda con la decisión auditada, manteniendo «gracia» como alternativa en nota. La principal desalineación está en τέκνον, que debe evitar una marca masculina específica.
  issues:
  - severity: high
    issue: τέκνον fue traducido como «hijo»
    rationale: El vocativo griego es general («child»), no masculino. Como el versículo termina con θύγατερ («hija»), usar «hijo» borra el contraste intencional entre el primer trato general y la especificación final femenina.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real
    rationale: Dice «O «ánimo»» cuando la traducción elegida ya es «Ten ánimo». La nota debería ofrecer una opción léxica distinta, como «Ten valor» o explicar el campo semántico sin duplicar la forma principal.
  - severity: low
    issue: «esta tu tristeza» suena algo poco natural en español moderno general
    rationale: Aunque no es incorrecto, «esta tristeza tuya» comunica mejor el posesivo afectivo del griego en español neutral y más fluido.
  revised_spanish_text: Ten ánimo[a], hija; que el Señor del cielo y de la tierra te conceda favor[b] en lugar de esta tristeza tuya. Ten ánimo, hija.
  revised_footnotes:
  - marker: a
    text: O «Ten valor»; el griego Θάρσει es una exhortación a cobrar valor o aliento.
    reason: lexical_alternative
  - marker: b
    text: O «gracia»; χάρις puede significar «favor» o «gracia» en este contexto.
    reason: lexical_alternative
  revision_rationale: Se corrige «hijo» a «hija» para evitar una lectura masculina injustificada de τέκνον en este contexto y para armonizar con el vocativo femenino explícito θύγατερ al final. Se ajusta la nota [a] para que presente una alternativa genuina. También se mejora levemente la naturalidad de la frase posesiva en español con «esta tristeza tuya».
