translation:
  language: es
  text: Y los utensilios[a] que te son dados para el servicio[b] de la casa de tu Dios, entrégalos íntegramente[c] ante el Dios de Jerusalén[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vasos».
    reason: lexical_alternative
  - marker: b
    text: O «culto».
    reason: lexical_alternative
  - marker: c
    text: O «preséntalos íntegramente».
    reason: lexical_alternative
  - marker: d
    text: O «delante del Dios de Jerusalén».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָאנַיָּא
  english_pob_choice: the vessels
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los vasos sagrados
  - los instrumentos
  lexicon: HALOT
  rationale: En este contexto de templo, el arameo se refiere a objetos/implementos del culto. «Utensilios» comunica bien la idea de objetos destinados al uso del templo sin forzar un tecnicismo ni sonar demasiado estrecho como «vasos».
- source_word: דִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - los cuales
  lexicon: HALOT
  rationale: La partícula relativa introduce la cláusula descriptiva. «Que» es el equivalente natural en español y mantiene la subordinación simple del original.
- source_word: מִתְיַהֲבִין לָךְ
  english_pob_choice: are given to you
  chosen_spanish: te son dados
  alternatives_spanish:
  - te están siendo dados
  - te han sido dados
  lexicon: HALOT
  rationale: La forma pasiva aramea conserva la acción de entrega. «Te son dados» es una construcción sobria y fiel; evita alargar innecesariamente con perífrasis modernas que podrían debilitar el tono decretal.
- source_word: לְפָלְחָן
  english_pob_choice: for the service
  chosen_spanish: para el servicio
  alternatives_spanish:
  - para el culto
  - para la adoración
  - para el ministerio
  lexicon: HALOT
  rationale: El sustantivo admite el sentido de servicio cultual. «Servicio» preserva la amplitud semántica sin restringirlo a «adoración», que sería más interpretativo, ni sustituirlo por un término eclesial como «ministerio».
- source_word: בֵּית אֱלָהָךְ
  english_pob_choice: of the house of your God
  chosen_spanish: de la casa de tu Dios
  alternatives_spanish:
  - de la casa de tu Dios
  lexicon: HALOT
  rationale: La construcción de estado constructo se rinde de forma directa y natural en español. «Casa de tu Dios» mantiene la referencia al templo sin alterar la relación posesiva del original.
- source_word: הַשְׁלֵם
  english_pob_choice: deliver in full
  chosen_spanish: entrégalos completos
  alternatives_spanish:
  - preséntalos completos
  - entrégalos en plenitud
  - complétalos
  lexicon: HALOT
  rationale: El imperativo expresa el acto de rendir/entregar plenamente. «Entrégalos completos» comunica la idea de entregar sin falta ni retención, y evita que «completar» suene abstracto o ajeno al contexto.
- source_word: קֳדָם
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: HALOT
  rationale: La preposición aramea indica presencia/comparecencia. «Ante» es breve, formal y adecuado al registro administrativo del decreto.
- source_word: אֱלָהּ יְרוּשְׁלֶם
  english_pob_choice: the God of Jerusalem
  chosen_spanish: el Dios de Jerusalén
  alternatives_spanish:
  - Dios de Jerusalén
  lexicon: HALOT
  rationale: La frase identifica a Dios por su relación con Jerusalén. «El Dios de Jerusalén» conserva la referencia geográfica y el valor identificador del original, sin suavizarla a «Dios en Jerusalén».
theological_decisions:
- issue: Valor de לְפָלְחָן en contexto del templo
  english_pob_reading: service of the house of your God
  chosen_spanish_reading: para el servicio de la casa de tu Dios
  alternative_spanish_readings:
  - para el culto de la casa de tu Dios
  - para la adoración de la casa de tu Dios
  rationale: El arameo permite un sentido cultual amplio. «Servicio» mantiene la referencia al uso del templo y evita reducir el término a una sola actividad litúrgica. Así se preserva la amplitud semántica que la POB inglesa documenta.
  doctrine_reference: 'Translation philosophy: optimal equivalence; mantener el sentido culto-administrativo sin introducir lenguaje confesional no exigido por el texto.'
- issue: Rendición de הַשְׁלֵם en un mandato ceremonial
  english_pob_reading: deliver in full
  chosen_spanish_reading: entrégalos completos
  alternative_spanish_readings:
  - preséntalos completos
  - entrégalos en plenitud
  rationale: El mandato no describe mera finalización abstracta, sino entrega íntegra de los objetos. «Entrégalos completos» comunica esa plenitud de entrega y conserva el tono imperativo del decreto persa.
  doctrine_reference: 'Translation philosophy: optimal equivalence; claridad funcional sin perder la fuerza jurídica del mandato.'
translation_notes:
  revision_awareness: Se verificó el pasaje contra el texto arameo de base y el audit trail inglés de la POB. La solución mantiene la estructura del decreto, conserva la ambigüedad cultual de לְפָלְחָן con «servicio», y refleja la alternativa de «presentar»/«entregar» en la cláusula final sin imponer una lectura más teológica de la necesaria.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלָהּ / אֱלָהָךְ conforme al estándar del proyecto.
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton.
  - «Servicio» se eligió por su amplitud cultual, coherente con la nota inglesa sobre worship como alternativa posible pero más interpretativa.
  - «Ante» mantiene el matiz de presencia del arameo קֳדָם en un registro formal y legible.
