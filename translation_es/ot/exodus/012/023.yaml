revisions:
- from: Porque Yahvé pasará[a] para herir a Egipto; y cuando vea la sangre en el dintel y en las dos jamba[b], Yahvé pasará de largo por la puerta y no permitirá que el destructor entre en sus casas para herir.
  to: Porque Yahvé pasará por en medio para herir a Egipto; y cuando vea la sangre en el dintel y en los dos postes de la puerta, Yahvé pasará sobre[a] la entrada y no permitirá que el destructor[b] entre en sus casas para herir.
  rationale: Se corrigió la concordancia gramatical, se distinguieron mejor los dos verbos hebreos clave del versículo (עבר frente a פסח), se reubicó la nota léxica al lugar correcto, se sustituyó el tecnicismo menos natural 'jambas' por 'postes de la puerta', y se añadió la nota sobre 'el destructor' para reflejar la auditoría inglesa y preservar la tensión teológica del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:45:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: Yahvé pasa para herir a Egipto, ve la sangre en el dintel y los postes, pasa sobre la entrada y no permite que el destructor entre. Sin embargo, hay varios desajustes con la evidencia fuente y con la auditoría inglesa: (1) וְעָבַר se documentó como ''pasará por en medio/atravesará'' en contexto de juicio sobre Egipto, no simplemente ''pasará''; (2) וּפָסַח requiere conservar mejor la identidad léxica de ''pasar sobre/pasar por encima'' asociada con la Pascua; ''pasará de largo'' es interpretativo y debilita ese vínculo; (3) שְׁתֵּי הַמְּזוּזוֹת está mal concordado en el texto (''dos jamba''); (4) בָּתֵּיכֶם es segunda persona plural ''sus/vuestras casas'', pero la referencia inmediata en español puede mantenerse; mejor ''sus casas'' está bien en registro latinoamericano. Además, la nota [a] está anclada al primer verbo, pero la alternativa léxica en la auditoría inglesa corresponde al segundo verbo פסח.'
  spanish_quality_summary: 'El español es en general claro y digno, pero presenta un error gramatical serio (''las dos jamba'' / ''dos jamba[b]'') y algunas opciones menos naturales o menos fieles: ''por la puerta'' suena algo impreciso frente a ''la entrada''; ''pasará de largo'' es idiomático, pero introduce una matización de desatención más que la imagen pascual de pasar sobre la entrada. ''Destruidor'' no se usa; ''destructor'' sí es natural. Conviene también reubicar la nota léxica al segundo verbo para que el lector no la asocie erróneamente con וְעָבַר.'
  glossary_alignment: 'Alineación general buena con el glosario del proyecto: יְהוָה -> ''Yahvé'' correctamente. No hay conflictos mayores con terminología teológica. La principal desviación es respecto a la decisión auditada para פסח: el proyecto prefirió preservar ''pass over''; en español corresponde mejor ''pasará sobre'' o ''pasará por encima de la entrada'' que ''pasará de largo''. También conviene reflejar וְעָבַר con más claridad como movimiento por en medio de Egipto para no confundirlo con פסח.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en el primer verbo 'pasará', pero la nota léxica corresponde a וּפָסַח, el segundo verbo del versículo.
    rationale: En la auditoría inglesa, la alternativa 'will spare/protect' explica פסח ('pass over'), no עבר ('pass through'). Mantenerla en el primer verbo induce una lectura incorrecta de la evidencia fuente.
  - severity: high
    issue: '''pasará de largo'' para וּפָסַח no preserva adecuadamente la identidad léxica de ''pasar sobre'' asociada con la Pascua.'
    rationale: La decisión teológica y léxica auditada enfatiza conservar el verbo de Passover. 'Pasará de largo' es una interpretación idiomática aceptable en español común, pero desplaza la imagen y reduce la conexión formal con Pascua.
  - severity: high
    issue: Error gramatical en 'las dos jamba[b]'.
    rationale: Debe ser 'las dos jambas' o preferiblemente 'los dos postes de la puerta'. El texto actual no es español correcto.
  - severity: medium
    issue: '''pasará'' para וְעָבַר queda demasiado genérico y puede confundirse con el segundo verbo.'
    rationale: La auditoría inglesa distingue deliberadamente עבר ('pasará por en medio/atravesará') de פסח ('pasará sobre'). Conviene reflejar esa distinción también en español.
  - severity: medium
    issue: La nota [b] defiende 'jambas', pero la auditoría inglesa no exigía tecnicismo arquitectónico, sino precisión simple.
    rationale: '''Los dos postes de la puerta'' es más natural y ampliamente legible en español eclesial que ''jambas'', sin pérdida semántica.'
  revised_spanish_text: Porque Yahvé pasará por en medio para herir a Egipto; y cuando vea la sangre en el dintel y en los dos postes de la puerta, Yahvé pasará sobre[a] la entrada y no permitirá que el destructor[b] entre en sus casas para herir.
  revised_footnotes:
  - marker: a
    text: 'O: «pasará por encima de». El hebreo usa aquí el verbo asociado con la Pascua; también puede entenderse con el sentido de «protegerá» o «librará», pero el texto conserva la conexión verbal con la Pascua.'
    reason: lexical_alternative
  - marker: b
    text: «El destructor» queda sin especificar en el hebreo; algunos entienden que se refiere a un agente angelical de juicio.
    reason: alternative_reading
  revision_rationale: Se corrigió la concordancia gramatical, se distinguieron mejor los dos verbos hebreos clave del versículo (עבר frente a פסח), se reubicó la nota léxica al lugar correcto, se sustituyó el tecnicismo menos natural 'jambas' por 'postes de la puerta', y se añadió la nota sobre 'el destructor' para reflejar la auditoría inglesa y preservar la tensión teológica del hebreo.
