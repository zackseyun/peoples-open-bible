review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa en los puntos principales: conserva la imagen vegetal de כַנָּה, traduce literalmente ''tu mano derecha'', mantiene ''hijo'' para בֵּן sin resolver la metáfora, y refleja la fuerza causativa de אִמַּצְתָּה. Sin embargo, ''y al hijo'' introduce en español una preposición (''a'') que no corresponde al paralelismo coordinado del hebreo/inglés y hace menos nítida la estructura. Además, la nota a mezcla alternativas menos precisas para כַנָּה.'
  spanish_quality_summary: El español es claro y digno. No obstante, 'vástago' aquí puede sonar más humano/genealógico que vegetal para muchos lectores; 'cepa' fluye mejor dentro de la imagen de la viña y se acerca mejor al valor de 'stock/rootstock' documentado por la POB inglesa. También conviene ajustar la nota léxica para evitar 'raíz' como equivalente demasiado específico y menos exacto que 'tronco' o 'pie de vid'.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se preserva 'hijo' en vez de resolverlo mesiánicamente, y no se introducen mayúsculas teológicas indebidas. La revisión propuesta mejora la correspondencia con la decisión inglesa 'stock' mediante 'cepa' y conserva la ambigüedad mediante nota.
  issues:
  - severity: medium
    issue: La frase 'y al hijo' añade una preposición no reflejada en el hebreo.
    rationale: וְעַל se entendió en la POB inglesa como coordinación natural ('and'), no como objeto directo personal con 'a'. En español, 'y el hijo' o una reformulación coordinada preserva mejor el paralelismo.
  - severity: medium
    issue: '''Vástago'' no reproduce tan bien como podría el sentido vitícola de כַנָּה en este contexto.'
    rationale: Aunque posible, 'vástago' en español suele evocar descendencia o brote genérico. Dado que la auditoría inglesa defendió 'stock' por su valor de base/tronco de la planta, 'cepa' comunica con más naturalidad la imagen de la viña del salmo.
  - severity: low
    issue: La nota a incluye 'raíz' como alternativa, que puede sobreespecificar el referente.
    rationale: La POB inglesa ofreció 'shoot', 'branch', 'rootstock'. En español, 'raíz' no equivale bien a 'rootstock'; conviene usar 'pie de vid' o 'tronco' para no desplazar el sentido.
  revised_spanish_text: y la cepa[a] que tu mano derecha plantó, y el hijo[b] que fortaleciste para ti—
