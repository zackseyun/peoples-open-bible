translation:
  language: es
  text: Y por la grandeza que le dio[a], todos los pueblos, naciones y lenguas estaban temblando y temiendo delante de él. A quien quería, mataba; y a quien quería, mantenía con vida[b]; y a quien quería, exaltaba[c]; y a quien quería, humillaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto de «le dio» está implícito aquí y se refiere a Dios en el versículo anterior.
    reason: cross_reference
  - marker: b
    text: O «perdonaba» o «dejaba vivir».
    reason: lexical_alternative
  - marker: c
    text: O «levantaba» o «promovía».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְבוּתָא
  english_pob_choice: the greatness
  chosen_spanish: la grandeza
  alternatives_spanish:
  - la majestad
  - la grandeza de su rango
  lexicon: HALOT
  rationale: El sustantivo expresa elevación de estatus o magnitud. 'Grandeza' comunica bien esa idea en español y conserva la referencia al favor/exaltación conferidos al rey.
- source_word: יְהַב לֵהּ
  english_pob_choice: he gave him
  chosen_spanish: le dio
  alternatives_spanish:
  - fue dado a él
  - le concedió
  lexicon: HALOT
  rationale: El verbo en forma activa con objeto indirecto es naturalmente 'dio'. Mantengo el sujeto implícito, como en el arameo y en el inglés POB, sin añadir 'Dios' dentro del verso.
- source_word: עַמְמַיָּא אֻמַיָּא וְלִשָּׁנַיָּא
  english_pob_choice: peoples, nations, and languages
  chosen_spanish: los pueblos, naciones y lenguas
  alternatives_spanish:
  - los pueblos, etnias y lenguas
  - los pueblos, naciones y idiomas
  lexicon: HALOT
  rationale: La tríada es fórmula amplia para la totalidad de grupos humanos bajo dominio imperial. 'Lenguas' conserva el matiz literal y la resonancia bíblica mejor que 'idiomas'.
- source_word: זאעין וְדָחֲלִין
  english_pob_choice: were trembling and fearing
  chosen_spanish: estaban temblando y temiendo
  alternatives_spanish:
  - estaban temblando y aterrados
  - estaban sobrecogidos de temor
  lexicon: HALOT
  rationale: Los dos participios intensifican la reacción de los pueblos. 'Temblando y temiendo' preserva la duplicación verbal y la fuerza retórica sin resumirla en una sola idea.
- source_word: מִן קֳדָמוֹהִי
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: '''Delante de él'' reproduce de manera natural el idiomático ''before him'' en español y expresa la posición de sometimiento/presencia.'
- source_word: דִּי הֲוָה צָבֵא
  english_pob_choice: whomever he wanted
  chosen_spanish: a quien quería
  alternatives_spanish:
  - a quien deseaba
  - a quien le parecía bien
  lexicon: HALOT
  rationale: El giro repetido introduce la libertad de la voluntad real. 'A quien quería' es claro y fiel al valor volitivo del arameo.
- source_word: קָטֵל
  english_pob_choice: he killed
  chosen_spanish: mataba
  alternatives_spanish:
  - mató
  - daba muerte
  lexicon: HALOT
  rationale: El verbo significa matar. En esta secuencia de acciones repetidas, el imperfecto español 'mataba' comunica mejor la acción reiterada o característica que el simple pretérito.
- source_word: מַחֵא
  english_pob_choice: he kept alive
  chosen_spanish: mantenía con vida
  alternatives_spanish:
  - lo mantenía con vida
  - lo dejaba vivir
  - lo conservaba con vida
  lexicon: HALOT
  rationale: Esta cláusula contrasta con 'mataba' y expresa preservación de la vida. 'Mantenía con vida' es una opción formal y clara, cercana al sentido de mantener/continuar viviendo.
- source_word: מָרִים
  english_pob_choice: he raised up
  chosen_spanish: levantaba
  alternatives_spanish:
  - exaltaba
  - promovía
  lexicon: HALOT
  rationale: El verbo literalmente significa alzar/elevar; aquí funciona figuradamente para elevar a una persona. 'Levantaba' preserva la imagen verbal sin forzar un término técnico.
- source_word: מַשְׁפִּיל
  english_pob_choice: he humbled
  chosen_spanish: humillaba
  alternatives_spanish:
  - abatía
  - rebajaba
  lexicon: HALOT
  rationale: El verbo significa hacer bajo o humillar. 'Humillaba' mantiene el paralelismo con 'levantaba' y conserva el contraste literario del pasaje.
theological_decisions:
- issue: Sujeto implícito de 'dio'
  english_pob_reading: The main text leaves the subject of 'gave' implicit as in the Aramaic, while the translation contextually assumes God from the previous verse rather than inserting 'God' here.
  chosen_spanish_reading: La traducción deja implícito el sujeto de 'dio' y no inserta 'Dios' en el verso.
  alternative_spanish_readings:
  - porque Dios le dio
  - y por la grandeza que Dios le dio
  rationale: El arameo no repite el sujeto en esta cláusula; el antecedente divino viene del verso anterior. Para no añadir una palabra ausente del texto, la versión española conserva la elipsis, aunque el contexto señale claramente a Dios.
  doctrine_reference: Primacía del texto original; no importar al verso una explicitación que el hebreo/arameo no formula.
translation_notes:
  revision_awareness: He tomado en cuenta la revisión más reciente del inglés POB, que ajustó 'let live' a 'kept alive'. En español, la forma elegida 'mantenía con vida' sigue esa misma cercanía léxica y mantiene el contraste con 'mataba' y 'humillaba'.
  spanish_consistency_notes:
  - Conservo 'Yahvé' como norma para el nombre divino, pero en este verso no aparece de manera explícita en el texto español.
  - Uso 'lenguas' para la tríada formulística de Daniel, coherente con el valor literal de לִשָּׁנַיָּא y con el estilo bíblico del libro.
  - Mantengo la serie verbal en imperfecto ('mataba', 'mantenía', 'levantaba', 'humillaba') para reflejar la repetición de acciones habituales o ejercidas soberanamente.
