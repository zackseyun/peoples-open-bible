- from: Así, todos los contados fueron seiscientos tres mil quinientos cincuenta[a].
  to: Así, todos los que fueron contados eran seiscientos tres mil quinientos cincuenta[a].
  rationale: Se reemplaza «los contados» por «los que fueron contados» para un español más natural y fiel al sentido participial pasivo de הַפְּקֻדִים en contexto censal. Se corrige además la nota, sustituyendo el erróneo «mustrados» por «alistados». Se mantiene la cifra y el tono sumativo del original.
