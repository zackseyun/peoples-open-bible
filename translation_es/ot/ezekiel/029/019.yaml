translation:
  language: es
  text: 'Por tanto, así dice el Señor, Yahvé: He aquí, estoy entregando la tierra de Egipto a Nabucodonosor, rey de Babilonia; él se llevará su multitud[a], saqueará su botín y arrebatará su presa; y servirá de paga para su ejército.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''su multitud/abundancia''; aquí probablemente alude a los recursos o bienes de Egipto en el contexto del saqueo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa bien la inferencia del contexto previo sin sonar demasiado coloquial; conserva el valor consecuencial del hebreo.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Fórmula profética estándar; 'así dice' es natural en español y mantiene el tono oracular.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' para el nombre divino según el criterio del proyecto. 'Señor' traduce אֲדֹנָי y evita la repetición rígida de 'Señor SEÑOR' o la máscara 'SEÑOR'.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: Equivale bien al anuncio solemne del hebreo y es idiomático en un registro bíblico digno.
- source_word: נֹתֵן
  english_pob_choice: I am giving
  chosen_spanish: estoy entregando
  alternatives_spanish:
  - doy
  - voy a dar
  lexicon: HALOT
  rationale: El participio con הִנְנִי comunica acción inminente/cierta; 'estoy entregando' conserva ese valor y suena natural en español.
- source_word: אֶת אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: Se preserva el matiz territorial de אֶרֶץ, no sólo el nombre del país.
- source_word: הֲמֹנָהּ
  english_pob_choice: its multitude
  chosen_spanish: su multitud
  alternatives_spanish:
  - su abundancia
  - su riqueza
  lexicon: HALOT
  rationale: 'Se conserva la lectura más cercana al sustantivo hebreo y la tensión semántica: puede aludir a multitud/abundancia. El contexto bélico permite entenderlo como el conjunto de bienes o masa de recursos de Egipto, sin cerrarlo de forma excesiva.'
- source_word: וְשָׁלַל שְׁלָלָהּ
  english_pob_choice: plunder its spoil
  chosen_spanish: saqueará su botín
  alternatives_spanish:
  - despojará su despojo
  - tomará su botín
  lexicon: HALOT
  rationale: Reproduce el juego verbo-sustantivo de saqueo con una expresión clara y fiel al registro militar del hebreo.
- source_word: וּבָזַז בִּזָּהּ
  english_pob_choice: seize its booty
  chosen_spanish: arrebatará su presa
  alternatives_spanish:
  - saqueará su presa
  - tomará su botín
  lexicon: HALOT
  rationale: Mantiene el paralelismo intensivo con un verbo fuerte en español; 'presa' conserva el carácter de botín capturado por la fuerza.
- source_word: וְהָיְתָה שָׂכָר לְחֵילוֹ
  english_pob_choice: and it will be wages for his army
  chosen_spanish: y será salario para su ejército
  alternatives_spanish:
  - y será paga para su ejército
  - y será recompensa para su ejército
  lexicon: HALOT
  rationale: '''Salario'' expresa היטב שָׂכָר como paga/compensación, y ''ejército'' traduce חֵילוֹ con el sentido militar adecuado.'
theological_decisions:
- issue: Cómo renderizar el Tetragrámaton en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: El proyecto manda traducir יְהוָה como 'Yahvé'. En esta fórmula, אֲדֹנָי aporta el título 'Señor' y el nombre divino se mantiene explícito como 'Yahvé', preservando la referencia directa al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy #2'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audito inglés actualizado: conserva la apertura inferencial con ''Por tanto'', la fórmula profética con ''así dice'', el nombre divino como ''Yahvé'', y mantiene la tensión de הֲמֹנָהּ sin reducirla prematuramente a ''riqueza''. También refleja la revisión inglesa que prefirió una equivalencia más cercana a ''multitude''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Señor'' traduce אֲדֹנָי en la combinación אֲדֹנָי יְהוִה.'
  - '''la tierra de Egipto'' conserva el valor concreto de אֶרֶץ.'
  - '''su multitud'' deja abierta la ambigüedad semántica señalada por el audit trail inglés.'
  - '''salario'' se usa por el valor de pago/recompensa de שָׂכָר en contexto militar.'
