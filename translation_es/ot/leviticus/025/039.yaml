translation:
  language: es
  text: Y si tu hermano se empobrece estando contigo y se vende a ti[b][a], no lo harás servir como esclavo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «no lo harás servir el servicio de un esclavo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y es vendido a ti»; el hebreo puede expresarse en pasiva, aunque en el contexto se refiere al hombre pobre que se vende para servicio por deuda.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/כִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La combinación hebrea introduce un caso condicional con matiz conjuntivo; «Y si» preserva esa conexión sin sonar forzado en español.
- source_word: יָמ֥וּךְ
  english_pob_choice: becomes poor
  chosen_spanish: empobrece
  alternatives_spanish:
  - se vuelve pobre
  - cae en pobreza
  lexicon: HALOT
  rationale: El verbo expresa el paso a la pobreza o la ruina económica. «Empobrece» es natural y comunica el proceso sin añadir contenido.
- source_word: אָחִ֛י
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu pariente
  - tu compatriota
  lexicon: HALOT
  rationale: Se mantiene el parentesco literal del hebreo. En este contexto legal de Levítico, el término conserva fuerza de pertenencia comunitaria sin necesidad de explicitarla en el texto principal.
- source_word: עִמָּ֖/ךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - conmigo
  - en tu medio
  lexicon: HALOT
  rationale: La preposición señala la situación relacional del hermano respecto del destinatario. «Contigo» es la forma más natural y fiel en español.
- source_word: וְ/נִמְכַּר לָ֑/ךְ
  english_pob_choice: and sells himself to you
  chosen_spanish: se vende a ti
  alternatives_spanish:
  - es vendido a ti
  - se entrega a ti
  lexicon: HALOT
  rationale: La forma nifal puede expresarse en pasiva, pero en este contexto legal apunta a la autoventa por necesidad. «Se vende a ti» reproduce bien la fuerza idiomática, como en el audit trail inglés.
- source_word: לֹא תַעֲבֹ֥ד בּ֖/וֹ
  english_pob_choice: you shall not make him serve
  chosen_spanish: no lo harás servir
  alternatives_spanish:
  - no lo pondrás a servir
  - no lo harás trabajar
  lexicon: HALOT
  rationale: 'La construcción hebrea es causativa: no se le debe imponer servicio. «No lo harás servir» conserva esa relación de imposición mejor que una formulación más genérica.'
- source_word: עֲבֹ֥דַת עָבֶד
  english_pob_choice: as a slave
  chosen_spanish: como esclavo
  alternatives_spanish:
  - con trabajo de esclavo
  - como si fuera un esclavo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «servicio de esclavo». Se conserva la fuerza social y jurídica de la expresión con «esclavo», evitando suavizarla a «siervo».
theological_decisions:
- issue: Terminología de estatus servil/dependiente
  english_pob_reading: Use 'slave' in the prohibition rather than 'servant'
  chosen_spanish_reading: usar «esclavo» en la prohibición, no «siervo»
  alternative_spanish_readings:
  - siervo
  - criado
  - sirviente
  rationale: El pasaje no solo habla de servicio genérico, sino de un estatus laboral restringido por la ley. «Esclavo» preserva la fuerza del límite legal y evita eufemizar el término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tabla de términos disputados por analogía con δοῦλος
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado del audit trail inglés: se mantiene el valor relacional de עִמָּךְ con «contigo», se conserva la autoventa implícita de וְנִמְכַּר con «se vende a ti», y se refleja la prohibición jurídica con una construcción causativa equivalente. No se introducen matices adicionales no sustentados por el hebreo.'
  spanish_consistency_notes:
  - Se emplea «esclavo» de forma consistente para reflejar el estatus laboral fuerte del hebreo עֶבֶד/עֲבֹדַת עָבֶד en esta ley.
  - «Tu hermano» se conserva literal por fidelidad al parentesco del texto, sin expandirlo a «compatriota» o «fellow Israelite» en el texto principal.
  - La pasiva alternativa se deja en nota porque el hebreo admite esa lectura, pero el contexto favorece la autoventa por necesidad.
