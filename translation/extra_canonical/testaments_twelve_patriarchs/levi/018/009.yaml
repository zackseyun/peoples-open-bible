  text: Καὶ ἐπὶ *τῆς ἱερωσύνης⁵² αὐτοῦ⁵³ *τὰ ἔθνη⁵⁴ πληθυνθήσονται⁵⁵ ἐν γνώσει ἐπὶ τῆς γῆς, καὶ φωτισθήσονται διὰ χάριτος κυρίου. [ὁ δὲ Ἰσραὴλ ἐλαττωθήσεται ἐν ἀγνωσίᾳ καὶ σκοτισθήσεται ἐν πένθει]⁵⁶. ἐπὶ τῆς ἱερωσύνης αὐτοῦ ἐκλείψει⁵⁷ ἡ⁵⁸ ἁμαρτία καὶ οἱ ἄνομοι *καταπαύσουσιν εἰς κακά⁵⁹, [οἱ δὲ δίκαιοι καταπαύσουσιν ἐν αὐτῷ]⁶⁰.
  language: Greek
translation:
  text: "And during his priesthood the nations will be multiplied in knowledge upon
    the earth, and they will be enlightened by the grace of the Lord. [But Israel
    will be diminished in ignorance and darkened in mourning.] During his priesthood
    sin will cease, and the lawless will cease from evil; [and the righteous will
    rest in him]."
