translation:
  language: es
  text: El cuarto, para el cuarto mes, fue Asael, hermano de Joab; y Zebadías, su hijo, después de él[a]; y sobre su división estaban veinticuatro mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «y Zebadías, su hijo, le sucedió». El hebreo dice literalmente «después de él», lo que indica sucesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְבִיעִי
  english_pob_choice: The fourth
  chosen_spanish: El cuarto
  alternatives_spanish:
  - El cuarto comandante
  - El cuarto destacamento
  lexicon: HALOT
  rationale: El adjetivo ordinal funciona aquí de manera sustantiva dentro de una lista administrativa. En español, «El cuarto» conserva la elipsis del hebreo y la forma del POB inglés sin añadir una especificación no explícita en el texto.
- source_word: לַחֹדֶשׁ הָרְבִיעִי
  english_pob_choice: for the fourth month
  chosen_spanish: para el cuarto mes
  alternatives_spanish:
  - para el mes cuarto
  - para el mes, el cuarto
  lexicon: HALOT
  rationale: La preposición ל marca asignación a un mes de servicio/turno. «Para el cuarto mes» es natural en español y conserva el sentido administrativo del pasaje.
- source_word: עֲשָׂה אֵל
  english_pob_choice: Asahel
  chosen_spanish: Asael
  alternatives_spanish:
  - Asahel
  lexicon: HALOT
  rationale: Se sigue la transliteración habitual en español para el nombre אישי. La forma «Asael» es la adaptación gráfica más natural y reconocible en español bíblico.
- source_word: אֲחִי יוֹאָב
  english_pob_choice: the brother of Joab
  chosen_spanish: hermano de Joab
  alternatives_spanish:
  - el hermano de Joab
  - Joab's brother
  lexicon: HALOT
  rationale: La relación de parentesco es la misma que en el hebreo constructo. En español, la forma más fluida y fiel es «hermano de Joab»; el artículo puede omitirse sin perder precisión.
- source_word: וּזְבַדְיָה בְנוֹ אַחֲרָיו
  english_pob_choice: and Zebadiah his son after him
  chosen_spanish: y Zebadías, su hijo, después de él
  alternatives_spanish:
  - y Zebadías, su hijo, le sucedió
  - y Zebadías, su hijo, tras él
  lexicon: HALOT
  rationale: Se conserva la literalidad de אַחֲרָיו como «después de él», tal como el POB inglés retuvo «after him» para no cerrar de antemano la ambigüedad. El español permite leer la sucesión por el contexto sin forzar una paráfrasis interpretativa.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  english_pob_choice: and over his division were
  chosen_spanish: y sobre su división había
  alternatives_spanish:
  - y su división estaba a cargo de
  - y sobre su división estaban
  lexicon: HALOT
  rationale: מַחֲלֻקָה designa aquí una división o turno militar. «Sobre su división» mantiene la preposición de autoridad/encargo; «había» completa naturalmente la frase en español sin introducir un cargo no expresado.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - veinte y cuatro mil
  lexicon: HALOT
  rationale: Se usa la forma numérica estándar en español. No hay motivo para reproducir una construcción arcaica o analítica.
theological_decisions:
- issue: Lectura de אַחֲרָיו como sucesión o mera posterioridad
  english_pob_reading: The footnote allows the more interpretive 'Zebadiah his son succeeded him,' while the main text keeps 'after him.'
  chosen_spanish_reading: La nota mantiene la lectura literal «después de él» y deja abierta la sucesión implícita.
  alternative_spanish_readings:
  - Zebadías, su hijo, le sucedió
  - Zebadías, su hijo, tomó su lugar
  rationale: El hebreo dice literalmente «después de él»; la sucesión es una inferencia contextual, no una expansión obligatoria. Conviene preservar la tensión documental entre literalidad y interpretación, como hace el POB inglés.
  doctrine_reference: Jerarquía y sucesión administrativa en los turnos levíticos/militares de Crónicas, sin imponer una doctrina extraña al texto.
translation_notes:
  revision_awareness: 'Concordancia revisada con el audit trail inglés: se preserva la estructura elíptica de «The fourth», la asignación mensual, el parentesco de Asael/Joab, la sucesión ambigua de Zebadías y la cifra final sin ampliaciones interpretativas. No se detectan revisiones posteriores que modifiquen el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí; no aparece ninguna sustitución devocional por «SEÑOR».
  - «Asael» y «Zebadías» siguen la adaptación española estándar de los nombres propios bíblicos.
  - «División» conserva el valor administrativo/militar de מַחֲלֻקָה en el contexto de los turnos de 1 Crónicas 27.
  - Se evitó traducir «después de él» por un equivalente más fuerte en el cuerpo del texto para no eliminar la ambigüedad documentada.
