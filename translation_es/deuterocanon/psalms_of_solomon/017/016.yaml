translation:
  language: es
  text: Y todo lo que hizo en Jerusalén fue igual a lo que hacen las naciones con sus dioses en sus ciudades[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La comparación griega es elíptica; también puede entenderse: «así como las naciones hacen a sus dioses en sus ciudades».'
    reason: lexical_alternative
  - marker: b
    text: O «los gentiles» en lugar de «las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ὅσα
  english_pob_choice: everything that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todas las cosas que
  lexicon: LSJ
  rationale: La expresión griega es amplia y relativa; «todo lo que» conserva el alcance total sin sonar forzado en español.
- source_word: ἐποίησεν
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - realizó
  - obró
  lexicon: LSJ
  rationale: El verbo es general; «hizo» mantiene la amplitud de la acción sin especificarla más de lo que permite el griego.
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - allí en Jerusalén
  lexicon: LSJ
  rationale: La frase es locativa directa y en español la forma natural y fiel es «en Jerusalén».
- source_word: καθὼς καὶ
  english_pob_choice: was just as
  chosen_spanish: fue así como
  alternatives_spanish:
  - fue como
  - fue de la misma manera que
  lexicon: LSJ
  rationale: En español conviene explicitar la comparación para que la relación sintáctica sea clara y fluida, sin añadir contenido ajeno.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: LSJ
  rationale: Se mantiene el valor más literal de ἔθνη, que aquí designa pueblos o naciones; «los gentiles» introduciría un matiz más técnico y contrastivo que el griego no exige en el texto principal.
- source_word: ἐν ταῖς πόλεσι
  english_pob_choice: in their cities
  chosen_spanish: en sus ciudades
  alternatives_spanish:
  - en las ciudades
  lexicon: LSJ
  rationale: Aunque el posesivo no aparece explícitamente en πόλεσι, el contexto y αὐτῶν lo hacen natural; «sus ciudades» reproduce ese sentido de pertenencia implícita.
- source_word: τοὺς θεοὺς αὐτῶν
  english_pob_choice: their gods
  chosen_spanish: a sus dioses
  alternatives_spanish:
  - a sus ídolos
  lexicon: LSJ
  rationale: El griego dice literalmente «sus dioses»; en español, con el verbo de hacer/obrar que rige el objeto afectado, se expresa naturalmente con «a sus dioses» y se evita introducir la glosa interpretativa «ídolos» en el texto principal.
theological_decisions:
- issue: λόγος comparativo sobre las naciones y sus dioses
  english_pob_reading: The Greek comparison is elliptical; the implied sense may also be, 'just as the nations do with their gods in their cities.'
  chosen_spanish_reading: 'La comparación queda implícita de forma semejante: el sentido puede entenderse como «así como las naciones hacen a sus dioses en sus ciudades» o, de manera más completa, «hacen con sus dioses en sus ciudades».'
  alternative_spanish_readings:
  - así como las naciones hacen con sus dioses en sus ciudades
  rationale: La sintaxis griega es elíptica. El español principal conserva esa elipsis sin sobreexplicar, mientras la nota ofrece la posibilidad alternativa reconocida en el aparato inglés.
  doctrine_reference: Elipsis sintáctica; no hay implicación doctrinal directa.
- issue: 'τὰ ἔθνη: ''las naciones'' vs. ''los gentiles'''
  english_pob_reading: Or 'the Gentiles' instead of 'the nations.'
  chosen_spanish_reading: «las naciones»
  alternative_spanish_readings:
  - «los gentiles»
  rationale: En este contexto comparativo, «las naciones» es más cercano al griego y evita cargar la frase con un contraste judeo-gentil que el pasaje no enfatiza explícitamente.
  doctrine_reference: Uso contextual de ἔθνη; no hay diferencia doctrinal sustantiva.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no registran revisiones sustantivas; la redacción española sigue esa lectura estable, preservando la comparación elíptica y la opción léxica de «las naciones».
  spanish_consistency_notes:
  - Se mantiene «naciones» de forma consistente con el valor literal de ἔθνη.
  - Se conserva «dioses» en el texto principal, sin reemplazarlo por «ídolos».
  - La nota a[a] recoge la alternativa sintáctica ya documentada en el inglés.
  - La puntuación y el orden buscan claridad española sin añadir una interpretación doctrinal no presente en el griego.
