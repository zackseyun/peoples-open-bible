translation:
  language: es
  text: Un amarre de madera, fijado en una construcción, no se aflojará[a] en un terremoto; así, un corazón afirmado por un consejo reflexivo no perderá el ánimo a su tiempo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «no se deshará» o «no se soltará». El verbo griego puede sugerir descomposición o desprendimiento; la redacción elegida sigue la imagen de una atadura firmemente sujeta a la construcción.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en tiempo/estación». El contexto puede sugerir un momento de crisis o prueba, pero eso no está expresado de manera explícita en el griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱμάντωσις
  english_pob_choice: binding
  chosen_spanish: amarre
  alternatives_spanish:
  - ligadura
  - amarre
  - fijación
  lexicon: LSJ
  rationale: El sustantivo apunta a una sujeción o atadura estructural. «Amarre» comunica bien la idea de un elemento que mantiene unido sin cargar el texto con tecnicismo innecesario.
- source_word: ξυλίνη
  english_pob_choice: wooden
  chosen_spanish: de madera
  alternatives_spanish:
  - leñoso
  - madera
  - maderero
  lexicon: LSJ
  rationale: El adjetivo indica material; «de madera» es el equivalente natural y transparente en español.
- source_word: ἐνδεδεμένη
  english_pob_choice: fastened
  chosen_spanish: fijado
  alternatives_spanish:
  - asegurado
  - atado
  - sujeto
  lexicon: LSJ
  rationale: El participio perfecto expresa una sujeción ya establecida. «Fijado» conserva la idea de quedar firmemente unido dentro de la estructura.
- source_word: εἰς οἰκοδομήν
  english_pob_choice: into a building
  chosen_spanish: en una construcción
  alternatives_spanish:
  - dentro de un edificio
  - para una edificación
  - en un edificio
  lexicon: LSJ
  rationale: «Construcción» mantiene la imagen arquitectónica sin restringirla demasiado a un edificio terminado; refleja el movimiento de incorporación a la obra.
- source_word: ἐν συσσεισμῷ
  english_pob_choice: in an earthquake
  chosen_spanish: en un terremoto
  alternatives_spanish:
  - en un sacudimiento
  - durante un sismo
  - en una sacudida
  lexicon: LSJ
  rationale: «Terremoto» es la equivalencia más natural y fuerte para el sacudimiento violento del contexto.
- source_word: οὐ διαλυθήσεται
  english_pob_choice: will not be loosened
  chosen_spanish: no se aflojará
  alternatives_spanish:
  - no se deshará
  - no se romperá
  - no se soltará
  lexicon: LSJ
  rationale: En el marco de una atadura estructural, el verbo comunica que no cederá ni perderá su firmeza. «No se aflojará» conserva la metáfora de sujeción sin alejarse del griego.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón
  - mente
  - interior
  lexicon: LSJ
  rationale: Se conserva el término bíblico antropológico, que en español suele expresarse naturalmente como «corazón» para la sede de la voluntad y el ánimo.
- source_word: ἐστηριγμένη
  english_pob_choice: made firm
  chosen_spanish: afirmado
  alternatives_spanish:
  - estabilizado
  - fortalecido
  - establecido
  lexicon: LSJ
  rationale: El participio perfecto indica una condición ya consolidada. «Afirmado» mantiene la metáfora de solidez estructural del paralelo con la construcción.
- source_word: ἐπὶ διανοήματος βουλῆς
  english_pob_choice: by thoughtful counsel
  chosen_spanish: por un consejo reflexivo
  alternatives_spanish:
  - sobre un propósito considerado
  - por un plan meditado
  - con un consejo prudente
  lexicon: LSJ
  rationale: La expresión es compacta y combina intención/pensamiento con consejo/deliberación. «Consejo reflexivo» preserva ambos matices sin sobrerinterpretar.
- source_word: ἐν καιρῷ
  english_pob_choice: in time
  chosen_spanish: en el tiempo
  alternatives_spanish:
  - en su momento
  - en ocasión
  - en tiempo de prueba
  lexicon: LSJ
  rationale: El griego dice literalmente «en tiempo/estación». Se evita añadir «de prueba» porque no está explícito; «en el tiempo» mantiene la literalidad con suficiente naturalidad.
- source_word: οὐ δειλιάσει
  english_pob_choice: will not lose courage
  chosen_spanish: no perderá el ánimo
  alternatives_spanish:
  - no se acobardará
  - no tendrá miedo
  - no desfallecerá
  lexicon: LSJ
  rationale: El verbo expresa volverse tímido o cobarde. «No perderá el ánimo» transmite la idea de no venirse abajo interiormente en una forma idiomática y fiel.
theological_decisions:
- issue: Antropología de καρδία
  english_pob_reading: heart
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - mente
  - interior
  rationale: La imagen contrasta una estructura material con una estabilidad interior. «Corazón» conserva el registro bíblico y la dimensión volitiva-afectiva sin reducirla a mera cognición.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que ajustó la segunda cláusula a «in time» por mayor cercanía a ἐν καιρῷ; en español se evitó añadir «de prueba» y se mantuvo la literalidad temporal. También se reflejó la tensión lexical de οὐ διαλυθήσεται con una nota alternativa, preservando la imagen estructural de la atadura de madera.
  spanish_consistency_notes:
  - Se usa «corazón» como término antropológico bíblico para καρδία, en coherencia con el registro de la colección.
  - Se prefiere «de madera» y «consejo reflexivo» para mantener la transparencia semántica sin calco pesado.
  - La puntuación reproduce el paralelismo del original con dos miembros comparativos separados por punto y coma.
