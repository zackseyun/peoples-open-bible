translation:
  language: es
  text: Porque mío es todo animal salvaje del bosque, el ganado de mil montes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las bestias de mil montes». El hebreo behēmōt puede entenderse como animales grandes o bestias en sentido amplio, y harrei puede traducirse «montes» o «colinas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior; 'Porque' es natural en español y conserva la función conjuntiva causal/explanatoria.
- source_word: לִי
  english_pob_choice: is mine
  chosen_spanish: es mío / mía
  alternatives_spanish:
  - me pertenece
  - pertenece a mí
  lexicon: HALOT
  rationale: La preposición posesiva expresa propiedad. En español, el predicativo posesivo 'es mía' comunica bien la posesión divina con tono bíblico y directo.
- source_word: כָל
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - todo
  lexicon: HALOT
  rationale: Con un sustantivo colectivo en singular, 'toda' reproduce de forma natural el valor distributivo de la frase.
- source_word: חַיְתוֹ יָעַר
  english_pob_choice: wild animal of the forest
  chosen_spanish: bestia del bosque
  alternatives_spanish:
  - animal salvaje del bosque
  - fiera del bosque
  lexicon: HALOT
  rationale: La construcción denota los animales salvajes del bosque. 'Bestia' conserva la fuerza léxica y el paralelismo poético; 'animal salvaje' sería más explícito, pero menos compacto.
- source_word: בְּהֵמוֹת
  english_pob_choice: the cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - las bestias
  - los animales
  lexicon: HALOT
  rationale: Aquí el término contrasta con los animales del bosque y se refiere a animales domésticos o de pastoreo. 'Ganado' en español mantiene esa amplitud sin limitarse estrictamente a bovinos.
- source_word: בְּהַרְרֵי
  english_pob_choice: on ... hills
  chosen_spanish: de mil montes
  alternatives_spanish:
  - en mil montes
  - sobre mil montes
  lexicon: HALOT
  rationale: El hebreo expresa localización con 'montes'; 'de mil montes' permite una construcción natural en español dentro del sintagma nominal, aunque 'en' también sería posible.
- source_word: אָלֶף
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - a mil
  - un millar de
  lexicon: HALOT
  rationale: Se conserva el numeral de forma directa, sin convertirlo en un equivalente idiomático como 'innumerables', para respetar la imagen poética del texto.
theological_decisions:
- issue: Imagen de posesión divina total mediante merismo
  english_pob_reading: The verse states God's ownership of all wild and domesticated animals through poetic merism/hyperbolic abundance, without narrowing the claim to a literal inventory of exactly one thousand hills.
  chosen_spanish_reading: El versículo afirma la propiedad divina de los animales salvajes y del ganado por medio de una imagen poética que abarca la totalidad, sin reducir el número a un conteo literal.
  alternative_spanish_readings:
  - Referencia literal a exactamente mil montes
  - Uso idiomático que significa todos los animales en todas partes
  rationale: La estructura hebrea presenta dos categorías complementarias, salvajes y domésticas, para expresar totalidad. Mantener 'mil montes' preserva la imagen y evita sobreinterpretar el número.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta el historial de revisión inglés sobre la relación entre 'wild animal of the forest' y 'the cattle on a thousand hills'. En español se mantuvo la coordinación implícita por 'y' para distinguir claramente las dos categorías del merismo, conservando el paralelismo poético del hebreo y la lectura aprobada del tramo final sin añadir elementos no sustentados.
  spanish_consistency_notes:
  - Se usa 'mía' para la posesión divina en un registro bíblico natural y claro.
  - '''Bestia'' se mantiene por fuerza léxica, con nota alternativa para ''bestias'' o ''animales salvajes''.'
  - '''Ganado'' expresa mejor que ''bueyes'' o ''reses'' la amplitud semántica de בְּהֵמוֹת en este contexto.'
  - '''Montes'' se mantiene para reflejar el paralelismo con el hebreo, aunque ''colinas'' sería una alternativa válida según el registro.'
  - El numeral 'mil' se conserva sin explicitar un sentido idiomático en el texto principal.
