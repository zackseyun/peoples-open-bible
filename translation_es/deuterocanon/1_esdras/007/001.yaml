translation:
  language: es
  text: Entonces Sisines[a], gobernador de Celesiria y Fenicia, y Sathrabuzanes y sus asociados[b], siguiendo lo que había sido mandado por el rey Darío,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Celesiria es un nombre regional formal de la Antigüedad; no debe entenderse aquí como una descripción literal de «Siria hueca».
    reason: cultural_note
  - marker: b
    text: 'O: «los asociados». El griego συνέταιροι puede significar asociados, compañeros o socios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: LSJ
  rationale: Marca la transición temporal narrativa de manera natural en español, sin añadir énfasis interpretativo.
- source_word: Σισίννης
  english_pob_choice: Sisinnes
  chosen_spanish: Sisines
  alternatives_spanish:
  - Sisinnes
  - Sisines
  lexicon: transliteración del nombre propio
  rationale: Se translitera el nombre propio griego de forma hispana y legible, manteniendo la identificación del personaje.
- source_word: ἔπαρχος
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - prefecto
  - gobernante provincial
  lexicon: LSJ
  rationale: Título administrativo civil; 'gobernador' comunica con claridad la función sin introducir un marco histórico más específico de lo que exige el texto.
- source_word: κοίλης Συρίας
  english_pob_choice: Coele-Syria
  chosen_spanish: Celesiria
  alternatives_spanish:
  - Coele-Siria
  - Siria Celesiria
  - Hollow Syria
  lexicon: LSJ
  rationale: Es un nombre geográfico formal en uso antiguo; conviene conservarlo como topónimo establecido en español, en vez de traducir literalmente 'Siria hueca'.
- source_word: Φοινίκης
  english_pob_choice: Phoenicia
  chosen_spanish: Fenicia
  alternatives_spanish:
  - Fenicia
  - Fenícia
  lexicon: topónimo estándar
  rationale: Forma española estándar y ampliamente reconocible del nombre de lugar.
- source_word: Σαθραβούζανης
  english_pob_choice: Sathrabuzanes
  chosen_spanish: Sathrabuzanes
  alternatives_spanish:
  - Sathrabouzanes
  lexicon: transliteración del nombre propio
  rationale: Se conserva la transliteración del nombre griego, aproximando la forma inglesa auditada sin alterar el referente.
- source_word: οἱ συνέταιροι
  english_pob_choice: their associates
  chosen_spanish: sus asociados
  alternatives_spanish:
  - los asociados
  - sus compañeros
  - sus colegas
  lexicon: LSJ
  rationale: '''Asociados'' expresa bien la relación de acompañamiento/participación sugerida por συνέταιροι; el posesivo está justificado por el contexto coordinado de los funcionarios nombrados.'
- source_word: κατακολουθήσαντες
  english_pob_choice: following
  chosen_spanish: siguiendo
  alternatives_spanish:
  - obedeciendo
  - actuando conforme a
  lexicon: LSJ
  rationale: Participio que indica ir en conformidad con una orden; 'siguiendo' conserva la relación verbal y su carácter subordinado.
- source_word: τοῖς ... προσταγεῖσιν
  english_pob_choice: what had been commanded
  chosen_spanish: lo que había sido mandado
  alternatives_spanish:
  - las órdenes dadas
  - lo mandado
  lexicon: LSJ
  rationale: Reproduce el sentido pasivo de las cosas ordenadas por el rey con una construcción natural en español.
- source_word: τοῦ βασιλέως Δαρείου
  english_pob_choice: by King Darius
  chosen_spanish: por el rey Darío
  alternatives_spanish:
  - del rey Darío
  lexicon: sintaxis genitiva
  rationale: La preposición española 'por' expresa de forma directa el agente del mandamiento en la oración subordinada.
translation_notes:
  revision_awareness: El texto griego es la fuente primaria; el auditorio inglés confirma que κοίλης Συρίας es un topónimo formal y que συνέταιροι admite varias equivalencias. No se detectan revisiones sustantivas en el registro auditado.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios y topónimos establecidos.
  - Se evita el ocultamiento del nombre divino porque este versículo no lo contiene.
  - '''Gobernador'' se usa como equivalente funcional de ἔπαρχος en un contexto administrativo.'
  - '''Lo que había sido mandado'' conserva la pasiva y la referencia a las órdenes del rey.'
