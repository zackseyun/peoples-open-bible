    issue: Alternativa de nota al pie «historia familiar»
    rationale: La nota inglesa ofrece «family line», y «historia familiar» introduce un matiz más narrativo que genealógico. Sin embargo, como alternativa secundaria en nota y no en el texto principal, no distorsiona de forma grave el sentido.
