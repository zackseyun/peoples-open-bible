translation:
  language: es
  text: Todo lo que ha llegado a ser, ya ha sido nombrado, y se sabe lo que es el hombre[a]; y no puede contender con uno más fuerte que él.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El hombre» aquí representa a la humanidad en singular.
    reason: lexical_alternative
  - marker: b
    text: O, «con quien es más fuerte que él»; el más fuerte probablemente sea Dios, aunque el hebreo no lo dice explícitamente.
    reason: alternative_reading
lexical_decisions:
- source_word: מַה שֶּׁהָיָה
  english_pob_choice: Whatever has come to be
  chosen_spanish: Lo que ha llegado a ser
  alternatives_spanish:
  - Todo lo que ha llegado a ser
  - Lo que existe
  lexicon: HALOT
  rationale: La frase hebrea introduce una afirmación general sobre todo lo que llega a existir. «Lo que ha llegado a ser» conserva ese alcance proverbial y el matiz de resultado ya producido, sin volverla pesada en español.
- source_word: כְּבָר
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - desde antes
  - ya antes
  lexicon: HALOT
  rationale: «Ya» comunica la anterioridad establecida que la línea requiere, de manera natural en español y en armonía con el valor sentencioso de כְּבָר.
- source_word: נִקְרָא שְׁמוֹ
  english_pob_choice: has already been named
  chosen_spanish: fue nombrado
  alternatives_spanish:
  - ya fue llamado por su nombre
  - su nombre ya fue pronunciado
  lexicon: HALOT
  rationale: El pasivo hebreo de nombrar expresa designación o determinación previa. En español, «fue nombrado» mantiene esa idea de estar ya designado, sin exigir una construcción poco natural. La nota preserva la posibilidad alternativa de «con él/por él» si se lee el referente implícito.
- source_word: וְנוֹדָע
  english_pob_choice: and it is known
  chosen_spanish: y se sabe
  alternatives_spanish:
  - y es conocido
  - y ha quedado sabido
  lexicon: HALOT
  rationale: El sentido es de conocimiento establecido o reconocible. «Se sabe» es la forma más natural en español para expresar ese estado general, sin perder el carácter proverbial.
- source_word: אֲשֶׁר הוּא אָדָם
  english_pob_choice: what man is
  chosen_spanish: lo que es el hombre
  alternatives_spanish:
  - qué es el hombre
  - lo que es un ser humano
  lexicon: HALOT
  rationale: 'La cláusula explica el contenido de lo conocido: la condición humana. «El hombre» conserva el singular representativo del hebreo, como en la tradición de la POB, y suena más idiomático que una literalidad rígida.'
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - un ser humano
  lexicon: HALOT
  rationale: Aquí אָדָם funciona como singular representativo de la humanidad. «El hombre» mantiene esa fuerza general sin diluir el matiz sapiencial del texto.
- source_word: וְלֹא יוּכַל לָדִין
  english_pob_choice: and he cannot contend
  chosen_spanish: y no puede contender
  alternatives_spanish:
  - y no puede disputar
  - y no puede litigar
  lexicon: HALOT
  rationale: דין aquí apunta a entrar en disputa o confrontación, no solo a un proceso legal formal. «Contender» conserva el sentido de enfrentamiento verbal/jurídico y corresponde bien al registro bíblico español.
- source_word: עִם שֶׁהִתְקִיף מִמֶּנּוּ
  english_pob_choice: with one stronger than he
  chosen_spanish: con uno más fuerte que él
  alternatives_spanish:
  - con quien es más fuerte que él
  - con uno más poderoso que él
  lexicon: HALOT
  rationale: La comparación queda abierta en hebreo; no se nombra explícitamente al referente. «Más fuerte» reproduce bien la idea de superioridad de כוח/fortaleza sin introducir una identificación no dicha en el texto.
theological_decisions:
- issue: Identidad del «más fuerte»
  english_pob_reading: 'Leave the referent implicit: ''one stronger than he'''
  chosen_spanish_reading: 'Dejar el referente implícito: «uno más fuerte que él»'
  alternative_spanish_readings:
  - identificarlo explícitamente como Dios
  - con un ser más fuerte que él
  rationale: El contexto sugiere una superioridad que probablemente apunta a Dios, pero el hebreo no lo declara. Mantenerlo implícito respeta la forma del dicho y evita añadir una precisión teológica que el versículo no verbaliza.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor representativo de אָדָם
  english_pob_reading: '''Man'' here represents humanity in the singular.'
  chosen_spanish_reading: «El hombre» como singular representativo de la humanidad
  alternative_spanish_readings:
  - «la humanidad»
  - «un ser humano»
  rationale: En el discurso sapiencial, el singular funciona de manera genérica. «El hombre» conserva esa forma y la tensión antropológica del proverbio, sin masculinizar indebidamente el alcance universal del hebreo.
  doctrine_reference: POB terminology guidance on contested terms
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última pasada auditada, que no registró cambios y fue confirmada con acuerdo alto. La única decisión de superficie en español es naturalizar el arranque con «Lo que ha llegado a ser» y el pasivo de nombrar con «fue nombrado», manteniendo intactas las dos tensiones auditadas: el referente implícito del «más fuerte» y el uso representativo de «el hombre».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evita «SEÑOR» o una explicitación doctrinal en el texto principal.
  - «Contender» mantiene el valor adversativo de לָדִין sin restringirlo a litigio formal.
  - «El hombre» sigue el uso representativo documentado para אָדָם en contexto sapiencial.
