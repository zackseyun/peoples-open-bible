    text: O «su ofrenda de reparación». El término hebreo אָשָׁם puede referirse tanto a la culpa como a la ofrenda presentada en reparación por ella.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «ofrenda por el pecado» por «ofrenda por la culpa» en ambas ocurrencias para preservar la categoría sacrificial de אָשָׁם y alinearse con la evidencia fuente y la rationale del POB inglés. Se mantiene una nota con «ofrenda de reparación» como alternativa legítima que conserva el matiz léxico documentado.
