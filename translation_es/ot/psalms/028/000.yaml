revisions:
- from: De David[a]. A ti, Yahvé, clamo; mi roca, no seas sordo para conmigo, para que no calles ante mí[c][b] y llegue a ser como los que descienden a la fosa.
  to: De David[a]. A ti, Yahvé, clamo; mi roca, no seas sordo a mi clamor, no sea que guardes silencio conmigo[c][b] y yo llegue a ser como los que descienden a la fosa.
  rationale: Se ajustó la cláusula introducida por פן a «no sea que» para reflejar mejor la consecuencia temida, y se sustituyó «ante mí» por «conmigo» para acercarse al valor relacional de la expresión hebrea y del inglés POB. También se suavizó «para conmigo» a una formulación más natural en español eclesial contemporáneo, manteniendo la distinción entre «sordo» y «guardar silencio».
  reviewer_model: gpt-5.4
