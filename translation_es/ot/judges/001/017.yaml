translation:
  language: es
  text: Entonces Judá fue con Simeón, su hermano, y derrotaron a los cananeos que habitaban en Zefat y la dedicaron a la destrucción[a]; y le puso[b] por nombre a la ciudad Horma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la destruyeron por completo» / «la pusieron bajo anatema». El verbo hebreo implica dedicar algo irrevocablemente, con frecuencia mediante destrucción.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo «él puso por nombre» o «él llamó». El singular probablemente se refiere a Judá como sujeto colectivo o representativo. Algunas traducciones lo suavizan a plural: «llamaron».'
    reason: alternative_reading
  - marker: c
    text: Horma suena al hebreo para algo «dedicado a la destrucción» (ḥerem), lo que explica el nombre de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went with
  chosen_spanish: fue con
  alternatives_spanish:
  - fue
  - marchó con
  lexicon: HALOT
  rationale: El hebreo הולך con אֶת aquí expresa acompañamiento. En español, «fue con» comunica ese matiz de manera natural sin convertirlo en un avance militar más fuerte de lo que exige el texto.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - la tribu de Judá
  lexicon: HALOT
  rationale: El nombre propio funciona metonímicamente para la tribu. Mantener solo «Judá» sigue el uso narrativo del hebreo sin añadir una expansión interpretativa.
- source_word: אֶת שִׁמְעוֹן אָחִיו
  english_pob_choice: with Simeon his brother
  chosen_spanish: con Simeón, su hermano
  alternatives_spanish:
  - Simeón, su hermano
  - contra Simeón, su hermano
  lexicon: HALOT
  rationale: La preposición אֶת con הלך marca compañía, no objeto directo. «Con Simeón, su hermano» preserva esa relación y evita una lectura errónea.
- source_word: וַיַּכּוּ
  english_pob_choice: they struck down
  chosen_spanish: golpearon
  alternatives_spanish:
  - derrotaron
  - mataron
  - hirieron
  lexicon: HALOT
  rationale: En narrativa militar, נכה puede abarcar golpear, derrotar o matar. «Golpearon» es más general en español y evita especificar el resultado más allá de lo que el versículo dice directamente; el contexto bélico ya comunica la acción violenta.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, funciona colectivamente. El plural español refleja mejor el sentido poblacional y la concordancia con el verbo plural.
- source_word: יוֹשֵׁב צְפַת
  english_pob_choice: living in Zephath
  chosen_spanish: que habitaban en Zefat
  alternatives_spanish:
  - que vivían en Zefat
  - que moraban en Zefat
  lexicon: HALOT
  rationale: El participio ישב expresa residencia. «Habitaban» mantiene el valor durativo y suena natural en español bíblico contemporáneo.
- source_word: וַיַּחֲרִימוּ אוֹתָהּ
  english_pob_choice: devoted it to destruction
  chosen_spanish: la dedicaron a la destrucción
  alternatives_spanish:
  - la destruyeron por completo
  - la pusieron bajo anatema
  - la consagraron a la destrucción
  lexicon: HALOT
  rationale: חרם conserva una tensión entre destrucción y dedicación irrevocable. «La dedicaron a la destrucción» intenta mantener ambas ideas sin reducir el verbo a simple aniquilación ni sustituirlo por una fórmula eclesiástica ajena al texto.
- source_word: וַיִּקְרָא
  english_pob_choice: they called
  chosen_spanish: llamaron
  alternatives_spanish:
  - llamó
  - pusieron por nombre
  lexicon: HALOT
  rationale: El verbo es plural en la forma hebrea. «Llamaron» sigue la revisión auditada del POB inglés y evita la singularización interpretativa.
- source_word: אֶת שֵׁם הָעִיר
  english_pob_choice: the name of the city
  chosen_spanish: el nombre de la ciudad
  alternatives_spanish:
  - la ciudad
  - su nombre
  lexicon: HALOT
  rationale: La fórmula hebrea de nombramiento se conserva con literalidad suficiente para que el lector perciba el acto de imponer un nombre.
- source_word: חָרְמָה
  english_pob_choice: Hormah
  chosen_spanish: Horma
  alternatives_spanish:
  - Jorma
  lexicon: HALOT
  rationale: Es un topónimo. Se translitera como «Horma» para mantener la forma usada en español bíblico y el juego de palabras con חָרַם / ḥerem.
theological_decisions:
- issue: Relación entre destrucción y consagración en חרם
  english_pob_reading: devoted it to destruction
  chosen_spanish_reading: la dedicaron a la destrucción
  alternative_spanish_readings:
  - la destruyeron por completo
  - la pusieron bajo anatema
  rationale: El hebreo no expresa solo destrucción militar, sino un acto de remoción irrevocable con sentido sacral. La opción elegida conserva esa tensión teológica sin neutralizarla.
  doctrine_reference: Translation philosophy §3, §5
- issue: Verbo singular/plural en el acto de nombrar
  english_pob_reading: they called
  chosen_spanish_reading: llamaron
  alternative_spanish_readings:
  - llamó
  rationale: La forma verbal plural se mantiene en español, siguiendo la revisión auditada del texto inglés y evitando armonizar el pasaje con una lectura singular que no refleja la morfología hebrea.
  doctrine_reference: audit trail revision pass
- issue: Uso de topónimo que refleja el juego con חרם
  english_pob_reading: Hormah sounds like the Hebrew word for something devoted to destruction
  chosen_spanish_reading: Horma
  alternative_spanish_readings:
  - Jorma
  rationale: El topónimo debe mantenerse como nombre propio y dejar el juego etimológico para nota. Así se preserva la transparencia del texto principal y la explicación lexical en la nota.
  doctrine_reference: lexical transparency
translation_notes:
  revision_awareness: La revisión auditada del POB inglés cambió «he called» por «they called» para ajustar la forma verbal al plural hebreo. Esta versión española sigue esa decisión y conserva también la explicación del juego etimológico de Hormah/Horma con ḥerem.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología de fondo para el proyecto, aunque este versículo no lo contiene.
  - Se prefiere «Horma» para el topónimo por consistencia con el uso bíblico en español y la etimología explicada en nota.
  - «Dedicaron a la destrucción» preserva el campo semántico de חרם sin recurrir a lenguaje eclesiástico no motivado por el hebreo.
