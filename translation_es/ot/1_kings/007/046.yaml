translation:
  language: es
  text: En la llanura del Jordán[a] el rey los vació en moldes[b], en la tierra arcillosa[c], entre Sucot y Zaretán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el valle del Jordán». El hebreo alude literalmente a la llanura o distrito del Jordán.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los vertió». El verbo se refiere al vaciado de objetos metálicos.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «en la espesura de la tierra»; probablemente se refiere a suelo arcilloso, adecuado para la fundición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכִכַּר הַיַּרְדֵּן
  english_pob_choice: In the plain of the Jordan
  chosen_spanish: En la llanura del Jordán
  alternatives_spanish:
  - En el valle del Jordán
  - En la región del Jordán
  lexicon: HALOT
  rationale: כִּכָּר en contextos geográficos designa una llanura o distrito circular asociado al Jordán. 'Llanura' conserva el sentido espacial natural en español sin volverlo demasiado interpretativo; 'valle' sería posible, pero desplaza el matiz de extensión abierta.
- source_word: יְצָקָם
  english_pob_choice: cast them
  chosen_spanish: los fundió
  alternatives_spanish:
  - los vertió
  - los coló
  lexicon: HALOT
  rationale: El verbo יצק puede significar verter o fundir metal. En este contexto de objetos de bronce, 'los fundió' comunica en español la acción de fabricar por vaciado/fundición. Se conserva el pronombre 'los' para reflejar el sufijo plural masculino del hebreo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey Salomón
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo común con artículo, no el nombre propio. 'El rey' mantiene la forma del texto fuente; la identificación como Salomón queda implícita por el contexto inmediato.
- source_word: בְּמַעֲבֵה הָאֲדָמָה
  english_pob_choice: in the clay ground
  chosen_spanish: en la tierra arcillosa
  alternatives_spanish:
  - en la tierra espesa
  - en el suelo denso
  - en la arcilla
  lexicon: HALOT
  rationale: מַעֲבֶה expresa espesor o densidad; con הָאֲדָמָה aquí apunta a una tierra pesada, apta para fundición. 'Tierra arcillosa' comunica de manera clara y natural el tipo de suelo sin perder la idea de densidad útil para moldes.
- source_word: בֵּין סֻכּוֹת וּבֵין צָרְתָן
  english_pob_choice: between Sukkoth and Zarethan
  chosen_spanish: entre Sucot y Zaretán
  alternatives_spanish:
  - entre Sucot y Zartán
  - entre Succot y Zarethan
  lexicon: HALOT
  rationale: Son topónimos, por lo que se transliteran. 'Sucot' y 'Zaretán' ofrecen una forma española sobria y reconocible, manteniendo la referencia geográfica sin sustituirla por una explicación interpretativa.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto y las decisiones se mantienen en alto acuerdo con el auditor inglés.
  spanish_consistency_notes:
  - Se preservó la distinción entre 'el rey' y el nombre propio, conforme al hebreo.
  - Se evitó 'SEÑOR' porque no aparece el tetragrámaton en este versículo.
  - '''Sucot'' y ''Zaretán'' se mantuvieron como nombres propios transliterados, no traducidos.'
  - '''Los fundió'' busca reflejar la fundición metalúrgica implícita en יצק, sin perder la posibilidad alternativa de ''verter''.'
