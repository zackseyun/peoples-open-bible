translation:
  language: es
  text: 'Entonces Dios dijo a Jonás[a]: «¿Está bien que te enojes por la planta?» Y él dijo: «Está bien que yo me enoje, hasta la muerte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo קִיקָיוֹן (qiqayon), una planta de especie incierta; las traducciones tradicionales incluyen «calabaza» o «enredadera», y algunos la identifican como ricino.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים / God
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El hebreo usa אֱלֹהִים como sujeto divino; en español, «Dios» comunica con naturalidad la referencia sin introducir una perífrasis que no está en el texto.
- source_word: הַ/הֵיטֵב
  english_pob_choice: Is it right
  chosen_spanish: ¿Está bien...?
  alternatives_spanish:
  - ¿Haces bien...?
  - ¿Es correcto...?
  - ¿Está justificado...?
  lexicon: HALOT
  rationale: La forma interrogativa hebrea evalúa la conveniencia o rectitud de la ira de Jonás. «¿Está bien...?» reproduce esa valoración de manera natural en español y mantiene la fuerza ética del reproche.
- source_word: חָרָה
  english_pob_choice: to be angry / be angry
  chosen_spanish: enojes / me enoje
  alternatives_spanish:
  - te irrites / me irrite
  - te enojes mucho
  lexicon: HALOT
  rationale: El modismo expresa ira, no ardor literal. «Enojarse» es el equivalente más claro y digno en español; conserva el sentido emocional sin volverlo técnico o arcaico.
- source_word: לְ/ךָ
  english_pob_choice: for you
  chosen_spanish: que te
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: HALOT
  rationale: En español, la construcción natural es «¿Está bien que te enojes...?», que refleja la persona afectada por el modismo sin calcar la preposición hebrea.
- source_word: עַל
  english_pob_choice: about
  chosen_spanish: por
  alternatives_spanish:
  - sobre
  - acerca de
  - por causa de
  lexicon: HALOT
  rationale: Aquí la ira de Jonás recae sobre la planta como motivo u objeto. «Por la planta» es la forma más natural en español para expresar la causa/ocasión de su enojo.
- source_word: הַ/קִּיקָיוֹן
  english_pob_choice: the plant
  chosen_spanish: la planta
  alternatives_spanish:
  - la calabacera
  - la higuera
  - el ricino
  - el kikayón
  lexicon: HALOT
  rationale: La especie botánica es incierta. El genérico «la planta» evita una precisión no garantizada por el hebreo y sigue la decisión auditada del POB inglés.
- source_word: הֵיטֵב חָרָה לִי
  english_pob_choice: It is right for me to be angry
  chosen_spanish: Está bien que yo me enoje
  alternatives_spanish:
  - Hago bien en enojarme
  - Tengo razón para enojarme
  - Es correcto que yo me enoje
  lexicon: HALOT
  rationale: La réplica de Jonás retoma el juicio de conveniencia/rectitud y afirma su propia evaluación. «Está bien que yo me enoje» preserva el paralelismo con la pregunta divina y la justificación implícita.
- source_word: עַד מָוֶת
  english_pob_choice: even to death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - al extremo de la muerte
  - incluso hasta la muerte
  lexicon: HALOT
  rationale: La expresión intensifica la ira al máximo. «Hasta la muerte» conserva la fuerza enfática del hebreo sin decidir si Jonás habla de morir literalmente o de un grado extremo de enojo.
theological_decisions:
- issue: La evaluación moral de la ira de Jonás en la pregunta divina
  english_pob_reading: Render the idiom as a question of whether Jonah's anger is right/justified.
  chosen_spanish_reading: Traducirlo como una pregunta sobre si su enojo es correcto o apropiado.
  alternative_spanish_readings:
  - ¿Haces bien en enojarte?
  - ¿Es correcto que te enojes?
  rationale: El hebreo no solo pregunta si Jonás siente ira, sino si esa ira es moralmente apropiada. La redacción española conserva la confrontación ética del pasaje sin perder claridad.
  doctrine_reference: Translation philosophy §1, §6
- issue: Identificación de קִיקָיוֹן
  english_pob_reading: Use the generic 'plant' in the main text.
  chosen_spanish_reading: Usar «la planta» en el texto principal.
  alternative_spanish_readings:
  - gourdo/calabaza
  - ricino
  - kikayón transliterado
  rationale: No hay certeza botánica suficiente para especificar la especie. Mantener un término genérico respeta la cautela textual y evita fijar una identificación debatida.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La versión española sigue la revisión final sin cambios sustantivos: conserva la evaluación idiomática de la ira, el referente genérico de קיקָיוֹן y el intensificador final «hasta la muerte», en línea con la última pasada de revisión y el alto grado de acuerdo del control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se introduce «SEÑOR», porque el pasaje hebreo usa el nombre genérico divino.
  - Se usa «enojarse» para חרה, que en español transmite mejor la ira evaluada por el diálogo que un calco como «arder».
  - Se evita especificar la planta en el texto principal; la nota conserva la incertidumbre lexical.
  - La puntuación y el diálogo siguen un registro bíblico moderno y sobrio, apto para lectura pública en español.
