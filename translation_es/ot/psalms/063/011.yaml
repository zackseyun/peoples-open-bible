    rationale: La nota inglesa b conserva una formulación previa ('They will pour him out...'). En español, una nota más sobria puede retener la alternativa literal sin sobreexplicar ni sugerir que el texto principal sea meramente estilístico.
  revised_spanish_text: Serán entregados[a] al poder de la espada; serán una porción para los zorros[b].
