translation:
  language: es
  text: 'Pero él dijo: «Mi hijo no bajará con ustedes, porque su hermano ha muerto, y él solo ha quedado. Si le sucede algún mal[a] en el camino por el cual ustedes van, entonces harían bajar mi canicie con dolor al Seol[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si le sucede una desgracia». El hebreo אָסוֹן puede expresar daño serio, desgracia o calamidad.'
    reason: lexical_alternative
  - marker: b
    text: Seol es el término hebreo para el ámbito de los muertos; alternativamente, «la tumba».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵרֵד
  english_pob_choice: will not go down
  chosen_spanish: no bajará
  alternatives_spanish:
  - no irá
  - no descenderá
  lexicon: HALOT
  rationale: Bajar conserva el verbo de movimiento descendente de ירד y mantiene la geografía narrativa implícita entre Canaán y Egipto, sin sonar forzado en español.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo varón
  - mi muchacho
  lexicon: HALOT
  rationale: בן con sufijo posesivo es «mi hijo»; es más preciso que «mi hijo varón» y más natural que «mi muchacho».
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de él
  lexicon: HALOT
  rationale: El posesivo debe mantenerse; en español «su hermano» comunica directamente la relación fraterna con Benjamín.
- source_word: מֵת
  english_pob_choice: is dead
  chosen_spanish: ha muerto
  alternatives_spanish:
  - está muerto
  - murió
  lexicon: HALOT
  rationale: El hebreo presenta un estado/resultante visto desde Jacob. «Ha muerto» preserva esa condición sin perder naturalidad; «está muerto» también sería posible, pero menos dinámico en este contexto narrativo.
- source_word: לְבַדּוֹ נִשְׁאָר
  english_pob_choice: he alone is left
  chosen_spanish: él solo ha quedado
  alternatives_spanish:
  - él solo queda
  - él solo ha quedado atrás
  lexicon: HALOT
  rationale: La construcción enfatiza que él es el único superviviente/restante desde la perspectiva de Jacob. «Él solo ha quedado» conserva el énfasis de לבד y el sentido de residuo.
- source_word: וּקְרָאָהוּ אָסוֹן
  english_pob_choice: If harm should happen to him
  chosen_spanish: Si le sucede algún mal[a]
  alternatives_spanish:
  - si le acontece una desgracia
  - si le sobreviene un desastre
  lexicon: HALOT
  rationale: אָסוֹן abarca daño serio, desgracia o calamidad. «Algún mal» es breve e idiomático; la nota conserva la alternativa «desgracia»/«desastre» sin sobrerresolver el término.
- source_word: אָסוֹן
  english_pob_choice: harm
  chosen_spanish: mal
  alternatives_spanish:
  - desgracia
  - desastre
  - calamidad
  lexicon: HALOT
  rationale: «Mal» es una equivalencia compacta que permite mantener el tono paterno de la advertencia y no obliga a intensificar de más el sustantivo hebreo.
- source_word: בַּדֶּרֶךְ אֲשֶׁר תֵּלְכוּ בָהּ
  english_pob_choice: on the journey on which you go
  chosen_spanish: en el camino por el cual ustedes van
  alternatives_spanish:
  - en el viaje en que van
  - en la ruta por la cual van
  lexicon: HALOT
  rationale: דרך puede ser «camino», «ruta» o «viaje». Aquí se conserva la imagen concreta del trayecto con una construcción formal que refleja bien el relativo hebreo.
- source_word: וְהוֹרַדְתֶּם
  english_pob_choice: you would bring down
  chosen_spanish: harán bajar
  alternatives_spanish:
  - traerán abajo
  - bajarán
  lexicon: HALOT
  rationale: El hifil de ירד expresa causar el descenso. En español, «harán bajar» mantiene la causatividad mejor que un simple «bajarán».
- source_word: שֵׂיבָתִי
  english_pob_choice: my gray hair
  chosen_spanish: mi canicie
  alternatives_spanish:
  - mis canas
  - mi cabello cano
  lexicon: HALOT
  rationale: El hebreo es literalmente «mi cabello canoso/canas» y por extensión la vejez. «Mi canicie» conserva la imagen de la edad avanzada con dignidad literaria; «mis canas» también sería posible, pero menos solemne.
- source_word: בְּיָגוֹן
  english_pob_choice: in sorrow
  chosen_spanish: con dolor
  alternatives_spanish:
  - en dolor
  - con tristeza
  - en tristeza
  lexicon: HALOT
  rationale: יגון denota dolor, aflicción, pena, tristeza profunda. «Con dolor» funciona de manera natural con «hacer bajar» y mantiene el lamento de Jacob; no conviene diluirlo a una mera emoción leve.
- source_word: שְׁאֹלָה
  english_pob_choice: to Sheol
  chosen_spanish: al Seol
  alternatives_spanish:
  - al Sheol
  - al reino de los muertos
  - a la tumba
  lexicon: HALOT
  rationale: Se mantiene el término técnico bíblico en forma castellana tradicionalizada «Seol», porque el texto hebreo nombra ese ámbito y la POB evita resolverlo como «tumba» o «reino de los muertos» sin necesidad textual.
theological_decisions:
- issue: Conservar שְׁאֹל sin reducirlo a una sola interpretación
  english_pob_reading: to Sheol
  chosen_spanish_reading: al Seol
  alternative_spanish_readings:
  - a la tumba
  - al reino de los muertos
  rationale: El hebreo usa שְׁאֹל, un término con alcance no idéntico en todos los contextos a una simple sepultura física. Mantener «Seol» preserva la tensión léxica y evita imponer una identificación interpretativa estrecha.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de la tensión semántica donde el hebreo no la resuelve explícitamente.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión auditada del inglés POB, especialmente al conservar el descenso geográfico («bajará», «harán bajar») y al reflejar la cláusula condicional con un equivalente natural en español. También se retiene la decisión de no sustituir שְׁאֹל por una glosa interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no lo contiene.
  - Se usa «Seol» en lugar de «tumba» para conservar la referencia técnica del hebreo.
  - Se preserva el movimiento descendente de ירד con «bajar», coherente con el patrón narrativo de Génesis.
  - «Mi canicie» conserva el matiz de edad avanzada sin perder la imagen concreta de שֵׂיבָה.
