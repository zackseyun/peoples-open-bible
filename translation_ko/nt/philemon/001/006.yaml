id: PHM.1.6
reference: Philemon 1:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅπως ἡ κοινωνία τῆς πίστεώς σου ἐνεργὴς γένηται ἐν ἐπιγνώσει παντὸς ἀγαθοῦ ⸀τοῦ ἐν ἡμῖν εἰς ⸀Χριστόν·
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/006.yaml
  text: so that the fellowship of your faith may become effective in the knowledge of every good thing that is in us for the Messiah[a][b][c][d][e].
  footnotes:
  - marker: a
    text: Or 'the fellowship/partnership of your faith.'
    reason: lexical_alternative
  - marker: b
    text: πίστις can also carry the sense 'faithfulness' or 'trust' in some contexts.
    reason: alternative_reading
  - marker: c
    text: Some manuscripts read 'in you' instead of 'in us.'
    reason: textual_variant
  - marker: d
    text: Or 'for Christ.' The title Χριστός is rendered 'Messiah' here.
    reason: lexical_alternative
  - marker: e
    text: Or 'that is in us for the Messiah'.
    reason: previous_rendering
translation:
  language: ko
  text: 그대의 믿음의 동역[a][b]이 우리[c] 안에 있는 모든 선한 것을 메시아[d]를 향해 깊이 아는 가운데 효력 있게 되기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그대의 믿음의 친교/나눔」. 헬라어 κοινωνία는 친교·참여·동역을 함께 담을 수 있다.
    reason: lexical_alternative
  - marker: b
    text: πίστις는 문맥에 따라 「신실함」 또는 「신뢰」의 의미도 가질 수 있다.
    reason: alternative_reading
  - marker: c
    text: 일부 사본은 「우리 안에」 대신 「그대들 안에」로 읽는다. SBLGNT 본문은 「우리 안에」로 읽으므로 본 번역도 그것을 따른다.
    reason: textual_variant
  - marker: d
    text: 또는 「그리스도를 향해」. 본 번역은 칭호 Χριστός를 「메시아」로 옮기는 원칙을 따른다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_korean: ~기를 빕니다
  alternatives_korean:
  - ~하도록
  - ~하기 위하여
  lexicon: BDAG
  rationale: ὅπως는 바울의 기도/소망의 목적을 도입한다. 한국어에서는 합쇼체 종결로 「~기를 빕니다」가 바울 기도문의 정형성과 어조를 가장 자연스럽게 살린다.
- source_word: κοινωνία
  english_pob_choice: fellowship
  chosen_korean: 동역
  alternatives_korean:
  - 친교
  - 나눔
  - 참여
  lexicon: BDAG
  rationale: κοινωνία는 단순한 친교가 아니라 믿음에서 비롯된 능동적 결속을 담는다. 본 문맥에서 「그대의 믿음의 동역」은 빌레몬의 믿음이 외적으로 활동하는 결속을 가리키므로, 「동역」이 가장 잘 맞는다. 빌립보 1:5에서와 같이 사역적 결속의 의미를 보존한다.
- source_word: πίστεώς σου
  english_pob_choice: of your faith
  chosen_korean: 그대의 믿음의
  alternatives_korean:
  - 그대의 신실함의
  lexicon: BDAG
  rationale: 기본값 「믿음」. 신실함 뉘앙스는 각주에 보존.
- source_word: ἐνεργὴς γένηται
  english_pob_choice: may become effective
  chosen_korean: 효력 있게 되기를
  alternatives_korean:
  - 활력 있게 되기를
  - 능히 일하게 되기를
  lexicon: BDAG
  rationale: ἐνεργής + γένηται는 「활동적·효력 있게 되다」를 가리킨다. 「효력 있게 되다」가 기도문의 결과·작용 뉘앙스를 자연스럽게 담아낸다.
- source_word: ἐν ἐπιγνώσει
  english_pob_choice: in the knowledge
  chosen_korean: 깊이 아는 가운데
  alternatives_korean:
  - 인식 안에서
  - 충만한 지식으로
  lexicon: BDAG
  rationale: ἐπίγνωσις는 일반적 지식(γνῶσις)보다 깊고 충만한 인식·인지를 가리키는 강화 명사이다. 「깊이 아는 가운데」가 ἐν의 영역성과 ἐπί-의 강화 뉘앙스를 함께 살린다.
- source_word: παντὸς ἀγαθοῦ
  english_pob_choice: every good thing
  chosen_korean: 모든 선한 것
  alternatives_korean:
  - 모든 선
  - 모든 좋은 것
  lexicon: BDAG
  rationale: 중성 단수 + πᾶς의 자연스러운 한국어 표현.
- source_word: τοῦ ἐν ἡμῖν
  english_pob_choice: that is in us
  chosen_korean: 우리 안에 있는
  alternatives_korean:
  - 우리 가운데 있는
  - 그대들 안에 있는
  lexicon: BDAG
  rationale: SBLGNT 본문은 「우리 안에」(ἡμῖν)로 읽는다. 사본 변이(「그대들 안에」)는 각주에 둔다.
- source_word: εἰς Χριστόν
  english_pob_choice: for the Messiah
  chosen_korean: 메시아를 향해
  alternatives_korean:
  - 메시아를 위하여
  - 메시아 안으로
  lexicon: BDAG
  rationale: εἰς는 방향성·지향을 가리킨다. 「메시아를 향해」가 「모든 선한 것이 메시아를 지향한다」는 본문의 흐름을 자연스럽게 담아낸다. 「위하여」는 너무 강한 목적성을 부과하므로 대안에 둔다.
theological_decisions:
- issue: κοινωνία τῆς πίστεώς σου의 의미
  chosen_reading: 그대의 믿음의 동역, 곧 빌레몬의 믿음이 외적 결속·동역으로 활동하는 것
  alternative_readings:
  - 그대의 믿음의 친교(공동의 참여)
  - 그대의 믿음에서 비롯된 결속/연대
  rationale: 본 절은 해석상 난해하며, 문맥(빌레몬의 사랑과 오네시모 영접 권면)에 비추어 능동적 외적 결속이 가장 잘 맞는다. 본 번역은 본문의 실천적 무게를 담으면서도 κοινωνία의 공동체적 함의는 그대로 보존한다.
  doctrine_reference: 'Translation philosophy §3 (preserve theological tension rather than resolve it)'
- issue: 「우리 안에」의 지시 대상
  chosen_reading: 바울·빌레몬·동료 신자들을 포함한 집합적 「우리」
  alternative_readings:
  - 사본 변이 「그대들 안에」 (빌레몬과 그 가정 회중을 가리킴)
  rationale: SBLGNT 본문은 ἐν ἡμῖν이며 본 번역은 이를 유지한다. 이는 그리스도인의 공동 자산을 빌레몬에게만 좁히지 않고 바울의 공동체적 관점을 살린다.
  doctrine_reference: 'Translation philosophy §1: Original-language primacy'
