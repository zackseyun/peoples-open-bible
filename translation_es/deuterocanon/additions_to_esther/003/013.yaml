translation:
  language: es
  text: 'Y ella estaba suplicando a Yahvé[a], el Dios de Israel, y dijo: «Yahvé mío, nuestro rey, tú eres el único; ayúdame, que estoy sola y no tengo ningún ayudador sino tú»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «tú solo eres». El griego aquí es elíptico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδεῖτο
  english_pob_choice: was pleading
  chosen_spanish: estaba suplicando
  alternatives_spanish:
  - estaba implorando
  - estaba pidiendo con insistencia
  - estaba rogando
  lexicon: BDAG
  rationale: δέομαι expresa una súplica insistente y urgente. El imperfecto pide una forma progresiva; «estaba suplicando» conserva tanto la duración como la intensidad de la acción.
- source_word: Κυρίου θεοῦ Ἰσραήλ
  english_pob_choice: the Lord, the God of Israel
  chosen_spanish: el Señor, el Dios de Israel
  alternatives_spanish:
  - el Señor Dios de Israel
  - el Señor, Dios de Israel
  lexicon: LEH
  rationale: En español, la doble designación se expresa con claridad mediante dos sintagmas coordinados. Se mantiene «Señor» para κύριος según la terminología del proyecto, y «Dios de Israel» para el genitivo especificador.
- source_word: Κύριέ μου
  english_pob_choice: My Lord
  chosen_spanish: Señor mío
  alternatives_spanish:
  - Mi Señor
  - Oh Señor mío
  lexicon: LEH
  rationale: El posesivo μου debe quedar explícito. «Señor mío» preserva la dirección personal de la súplica y suena natural en español reverente.
- source_word: ὁ βασιλεὺς ἡμῶν
  english_pob_choice: our king
  chosen_spanish: nuestro rey
  alternatives_spanish:
  - el rey nuestro
  - nuestro soberano
  lexicon: LEH
  rationale: La frase funciona como título directo dirigido a Dios. «Nuestro rey» conserva la fuerza real-teológica sin introducir un giro más abstracto.
- source_word: σὺ εἶ μόνος
  english_pob_choice: you alone are the only one
  chosen_spanish: tú solo eres el único
  alternatives_spanish:
  - tú solo eres
  - tú eres el único
  lexicon: LEH
  rationale: La construcción griega es elíptica y enfatiza exclusividad. «Tú solo eres el único» mantiene el énfasis de μόνος sin resolver demasiado la elipsis, y deja intacta la tensión del original.
- source_word: βοήθησόν μοι
  english_pob_choice: help me
  chosen_spanish: ayúdame
  alternatives_spanish:
  - ven en mi ayuda
  - socórreme
  lexicon: BDAG
  rationale: El imperativo aoristo de βοηθέω es una petición directa de auxilio. «Ayúdame» es la equivalencia más clara y fiel en español contemporáneo.
- source_word: τῇ μόνῃ
  english_pob_choice: who am alone
  chosen_spanish: yo que estoy sola
  alternatives_spanish:
  - yo, sola
  - siendo yo sola
  lexicon: LEH
  rationale: El dativo femenino singular concuerda con la hablante y describe su condición. Se vierte de modo idiomático con una relativa explicativa que preserve la referencia personal.
- source_word: μὴ ἔχουσῃ βοηθὸν
  english_pob_choice: have no helper
  chosen_spanish: no tengo ayudador
  alternatives_spanish:
  - no tengo quien me ayude
  - no tengo auxilio
  lexicon: BDAG
  rationale: Se conserva el sustantivo personal βοηθός con «ayudador», que refleja mejor el valor lexical que una abstracción. La forma verbal se adapta a la voz de la oración en español.
- source_word: εἰ μὴ σέ
  english_pob_choice: except you
  chosen_spanish: sino a ti
  alternatives_spanish:
  - excepto tú
  - salvo tú
  lexicon: BDAG
  rationale: 'La exclusión es absoluta: no hay ayudador fuera de Dios. «Sino a ti» es natural en español después de una negación y mantiene el sentido exclusivo del griego.'
theological_decisions:
- issue: Título real aplicado a Dios
  english_pob_reading: Render 'our king' as direct address to God, preserving the royal title.
  chosen_spanish_reading: «nuestro rey» se mantiene como título dirigido a Dios.
  alternative_spanish_readings:
  - nuestro soberano
  - rey nuestro
  rationale: El griego habla de Dios como rey del pueblo. En el contexto de Ester, esta confesión resalta la soberanía divina frente al poder terrenal; por eso no se atenúa el título real.
  doctrine_reference: Traducir títulos; no reemplazar con lenguaje eclesiástico más genérico.
- issue: Elipsis en σὺ εἶ μόνος
  english_pob_reading: Keep a close rendering and note the smoother sense in a footnote.
  chosen_spanish_reading: 'Se conserva una formulación cercana: «tú solo eres el único».'
  alternative_spanish_readings:
  - tú solo eres
  - tú eres el único
  rationale: La frase griega es abrupta. La versión principal conserva esa aspereza relativa, mientras que la nota recoge una lectura más fluida sin borrar la tensión textual.
  doctrine_reference: Preservar la tensión textual cuando el original es elíptico.
translation_notes:
  revision_awareness: 'El texto sigue la última revisión del audit trail en cuanto a la expresión de σὺ εἶ μόνος/you alone are the only one, pero en español se optó por una solución que conserva la elipsis y la solemnidad sin depender de un calco demasiado duro. También se mantuvo la estructura de doble dirección a Dios: invocación y súplica final de exclusión absoluta.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος y «Dios» para θεός, conforme a los principios del proyecto.
  - Se preserva la voz femenina de la hablante con «sola» y la concordancia verbal implícita en la relativa.
  - Se evita «Cristo» y «SEÑOR» en mayúsculas de sustitución, siguiendo la política de traducción directa del nombre divino cuando corresponde.
  - «Ayudador» se conserva para βοηθός, porque la petición depende de la noción personal de quien presta ayuda, no solo de la ayuda abstracta.
