revisions:
- from: Porque, he aquí[a], tus enemigos, oh Yahvé; porque, he aquí, tus enemigos perecerán; todos los que hacen iniquidad serán dispersados.
  to: Porque he aquí[a], tus enemigos, oh Yahvé; porque he aquí, tus enemigos perecerán; todos los obradores de maldad serán dispersados.
  rationale: Se conserva la repetición enfática de כִּי הִנֵּה, el nombre divino ‘Yahvé’, y el paralelismo poético del versículo, pero se corrige la puntuación para un español más natural y se fortalece la traducción de פֹּעֲלֵי אָוֶן con ‘obradores de maldad’, más fiel a la expresión hebrea que ‘los que hacen iniquidad’. La nota se ajusta para reflejar la alternativa española con claridad.
  reviewer_model: gpt-5.4
