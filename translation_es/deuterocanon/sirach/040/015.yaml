    rationale: Aunque no es incorrecto, «peña aguda» no refleja tan bien en español la idea de una formación rocosa abrupta o dentada. «Peñasco escarpado» preserva mejor la imagen y mejora la naturalidad.
  revised_spanish_text: La descendencia de la violencia[a] no quedará sin castigo, porque la raíz del impío está sobre un peñasco escarpado[b].
