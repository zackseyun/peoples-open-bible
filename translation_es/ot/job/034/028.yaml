translation:
  language: es
  text: para traer[a] ante él el clamor del pobre[b], y oye el clamor de los afligidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre él» o «contra él»; la preposición hebrea puede entenderse de más de una manera aquí.
    reason: lexical_alternative
  - marker: b
    text: O «el pobre ... los oprimidos». Los dos términos hebreos se superponen, pero no son idénticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהָבִיא
  english_pob_choice: so as to bring
  chosen_spanish: para traer
  alternatives_spanish:
  - para llevar
  - para presentar
  lexicon: HALOT
  rationale: El infinitivo causativo con ל expresa propósito; en español, «para traer» comunica de forma natural la relación de finalidad sin añadir interpretación innecesaria.
- source_word: עָלָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - sobre él
  - contra él
  - ante él
  lexicon: HALOT
  rationale: La preposición על admite varias lecturas. «Delante de él» conserva la idea de llevar el clamor a la presencia/atención de alguien, en línea con la lectura del POB de presentar el caso ante un juez.
- source_word: צַעֲקַת
  english_pob_choice: the cry
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - la voz de angustia
  - el clamor
  lexicon: HALOT
  rationale: צעקה designa un clamor o grito de angustia. «Clamor» funciona bien en español bíblico contemporáneo y conserva el tono de sufrimiento público.
- source_word: דָּל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el débil
  - el menesteroso
  - el humilde
  lexicon: HALOT
  rationale: דָּל suele referirse a quien es pobre o socialmente débil. «El pobre» mantiene la referencia básica y es la correspondencia más directa en español.
- source_word: עֲנִיִּים
  english_pob_choice: the afflicted
  chosen_spanish: los afligidos
  alternatives_spanish:
  - los pobres
  - los necesitados
  - los oprimidos
  lexicon: HALOT
  rationale: עֲנִיִּים puede abarcar pobres, afligidos u oprimidos. «Los afligidos» preserva el paralelismo con דָּל sin borrar la superposición semántica entre ambos términos.
- source_word: יִשְׁמָע
  english_pob_choice: he hears
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oirá
  - escuchará
  lexicon: HALOT
  rationale: El imperfecto en poesía sapiencial puede expresar acción característica. «Oye» es una forma natural y vigente para afirmar que Dios atiende ese clamor de manera habitual.
theological_decisions:
- issue: Referente implícito del sujeto de יִשְׁמָע y del pronombre en עָלָיו
  english_pob_reading: The cry is brought before God, and God hears the cry of the afflicted.
  chosen_spanish_reading: El clamor es llevado delante de Dios, y Dios oye el clamor de los afligidos.
  alternative_spanish_readings:
  - El clamor es llevado contra el opresor, y él lo oye.
  - El clamor cae sobre él, y él lo oye.
  rationale: En el contexto inmediato Eliú describe la opresión y la respuesta judicial de Dios. La lectura con Dios como destinatario implícito y oyente final concuerda con el flujo del argumento y evita atribuir la escucha al opresor, lo cual sería contextualmente improbable.
  doctrine_reference: La justicia y la omnisciencia de Dios en el juicio (Job 34; cf. Prov 21:13)
- issue: Distinción entre דָּל y עֲנִיִּים
  english_pob_reading: The two Hebrew terms overlap but are not identical.
  chosen_spanish_reading: «El pobre» y «los afligidos» conservan una distinción parcial sin forzar sinónimos exactos.
  alternative_spanish_readings:
  - ambos como «los pobres»
  - ambos como «los necesitados»
  rationale: La POB señala un solapamiento semántico, no identidad absoluta. Mantener dos renderizaciones distintas en español preserva el paralelismo hebreo y la tensión léxica documentada.
  doctrine_reference: Pobreza/opresión como objeto del cuidado y juicio de Dios (Job 34; Sal 72:12-14)
translation_notes:
  revision_awareness: He seguido el pasaje hebreo y el informe auditado en inglés sin depender mecánicamente de la base inglesa. No hubo revisiones recientes que exigieran cambios; la versión inglesa más reciente fue marcada como sin cambios, y la revisión cruzada indicó acuerdo alto con solo observaciones menores.
  spanish_consistency_notes:
  - He mantenido «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - He usado «pobre» y «afligidos» para reproducir la distinción léxica señalada por la POB entre דָּל y עֲנִיִּים.
  - He preferido «oye» en presente gnómico para reflejar el valor proverbial/sapiencial del imperfecto hebreo.
