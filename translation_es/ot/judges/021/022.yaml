base_translation:
  language: en
  yaml_path: translation/ot/judges/021/022.yaml
  text: And it shall be[a], when their fathers or their brothers come to complain to us, that we will say to them, ‘Grant them to us as a favor, because we did not take for each man his wife in the battle; for you did not give them to them[e][d][c][b], otherwise you would now be guilty.’
  footnotes:
  - marker: a
    text: Or 'come to complain to us' or 'come to bring a case against us.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'be gracious to us concerning them'; the plea is for leniency toward the speakers regarding the women.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew is terse: ''we did not take each man his wife in the battle,'' likely meaning that not enough wives had been obtained in war for the men of Benjamin.'
    reason: cultural_note
  - marker: d
    text: Or 'you did not give the women to them'; the Hebrew repeats pronouns compactly.
    reason: lexical_alternative
  - marker: e
    text: The final clause is difficult Hebrew. The sense is that because the women were not formally given by their families, the families would not be held guilty.
    reason: lexical_alternative
