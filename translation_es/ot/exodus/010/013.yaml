  text: וַ/יֵּ֨ט מֹשֶׁ֣ה אֶת מַטֵּ/הוּ֮ עַל אֶ֣רֶץ מִצְרַיִם֒ וַֽ/יהוָ֗ה נִהַ֤ג ר֥וּחַ קָדִים֙ בָּ/אָ֔רֶץ כָּל הַ/יּ֥וֹם הַ/ה֖וּא וְ/כָל הַ/לָּ֑יְלָה הַ/בֹּ֣קֶר הָיָ֔ה וְ/ר֨וּחַ֙ הַ/קָּדִ֔ים נָשָׂ֖א אֶת הָ/אַרְבֶּֽה־־־־־׃
