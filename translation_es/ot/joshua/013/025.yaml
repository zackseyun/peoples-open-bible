review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido del hebreo: territorio/asignación, Jazer, todas las ciudades de Galaad, la mitad de la tierra de los amonitas, y el límite hasta Aroer frente a Rabá. La única desviación relevante está en la nota al pie: la alternativa repite la lectura principal en vez de reflejar la opción documentada por el POB en inglés.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico digno. Sin embargo, la apertura «Y fue su territorio Jazer» suena algo rígida en español; «Y su territorio era Jazer» fluye mejor sin perder fidelidad. El resto de la redacción es buena y comprensible.
  glossary_alignment: No hay términos del glosario teológico principal en juego. Los topónimos «Galaad», «Aroer» y «Rabá» son aceptables. «Territorio» para גְּבוּל y «tierra de los amonitas» para אֶרֶץ בְּנֵי עַמּוֹן están bien alineados con la evidencia y la racionalidad documentada.
  issues:
  - severity: medium
    issue: La nota al pie no preserva la alternativa léxica del audit trail inglés.
    rationale: El texto principal dice «que está frente a Rabá», y la nota también ofrece «que está frente a Rabá» como alternativa. Según el POB inglés, la alternativa es «which faces Rabbah», mientras que la explicación literal es «which is before Rabbah». En español, la nota debe ofrecer una alternativa distinta, como «que mira hacia Rabá» o «que da hacia Rabá», no repetir la lectura principal.
  - severity: low
    issue: «Y fue su territorio Jazer» es menos natural que una formulación copulativa imperfecta.
    rationale: Aunque fiel, la construcción con «fue» resulta más dura en español en una descripción territorial. «Y su territorio era Jazer» o «Y el territorio que les correspondía era Jazer» comunica mejor la función descriptiva de וַיְהִי לָהֶם הַגְּבוּל.
  revised_spanish_text: Y su territorio era Jazer,[a] y todas las ciudades de Galaad, y la mitad de la tierra de los amonitas, hasta Aroer, que está frente a Rabá.
  revised_footnotes:
  - marker: a
    text: O «que mira hacia Rabá». El hebreo usa un modismo que literalmente dice «que está delante de Rabá».
    reason: lexical_alternative
  revision_rationale: Se suaviza la apertura para un español más natural en una descripción territorial y se corrige la nota al pie para que preserve una alternativa léxica real, en línea con el audit trail inglés y el modismo hebreo documentado.
