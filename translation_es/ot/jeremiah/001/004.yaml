  text: 'Vino a mí la palabra de Yahvé[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo יְהוָה (YHWH), tradicionalmente vertido «el SEÑOR»; aquí se preserva como «Yahvé».
