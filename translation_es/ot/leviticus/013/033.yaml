translation:
  language: es
  text: Entonces se rasurará[a], pero no rasurará el parche escamoso[b]; y el sacerdote lo aislará por siete días, una segunda vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se afeitará». El hebreo indica una acción reflexiva sobre la persona afectada.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente que no se rasure «el parche escamoso»; probablemente se deja sin rasurar la zona afectada para que el sacerdote la examine con claridad después de rasurar el cabello alrededor.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִתְגַּלָּח
  english_pob_choice: then he shall shave himself
  chosen_spanish: Entonces se rasurará
  alternatives_spanish:
  - Entonces se afeitará
  - Entonces se rasurará a sí mismo
  lexicon: HALOT
  rationale: 'El hitpael de גלח es reflexivo: la acción recae sobre la persona afectada. En español, «se rasurará» comunica bien ese valor reflexivo y mantiene el registro procedural del texto legal. «Afeitarse» sería posible, pero «rasurarse» es más neutral en un contexto corporal general.'
- source_word: הַנֶּתֶק
  english_pob_choice: the scaly spot
  chosen_spanish: el parche escamoso
  alternatives_spanish:
  - la zona escamosa
  - el área escamosa
  - la tiña
  lexicon: HALOT
  rationale: נֶתֶק en Levítico 13 designa una afección específica de cuero cabelludo o barba con pérdida de pelo; no es simplemente «picazón». «Parche escamoso» conserva la imagen clínica y evita el término tradicional «tiña», que sería interpretativo y más técnico de lo que exige el hebreo.
- source_word: לֹא יְגַלֵּחַ
  english_pob_choice: he shall not shave
  chosen_spanish: no rasurará
  alternatives_spanish:
  - no se afeitará
  - no deberá rasurar
  lexicon: HALOT
  rationale: La prohibición legal se expresa naturalmente en futuro de mandato negativo en español. Se evita introducir un sujeto distinto o suavizar la fuerza normativa.
- source_word: וְאֶת הַנֶּתֶק לֹא יְגַלֵּחַ
  english_pob_choice: but he shall not shave the scaly spot
  chosen_spanish: pero no rasurará el parche escamoso
  alternatives_spanish:
  - pero no rasurará alrededor del parche escamoso
  - pero no rasurará la zona afectada
  lexicon: HALOT
  rationale: El hebreo dice de forma directa que el objeto afectado no debe ser rasurado. La nota inglesa reconoce la posible práctica de dejar intacta la lesión para inspección, pero el texto principal preserva la formulación más cercana al hebreo sin explicarla en la línea principal.
- source_word: וְהִסְגִּיר
  english_pob_choice: and ... shall isolate
  chosen_spanish: y el sacerdote aislará
  alternatives_spanish:
  - y el sacerdote confinará
  - y el sacerdote pondrá en aislamiento
  lexicon: HALOT
  rationale: En Levítico 13, הִסְגִּיר describe una separación temporal para observación. «Aislará» es claro y moderno, y refleja bien la decisión auditada de evitar «cuarentenar» por su posible anacronismo médico.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el kohén
  lexicon: HALOT
  rationale: En el material levítico, «sacerdote» es la equivalencia normal y transparente en español. «Kohén» no es necesario aquí porque no aporta una precisión mayor al texto.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - por un período de siete días
  lexicon: HALOT
  rationale: La duración hebrea se expresa de manera directa y natural en español con «por siete días», manteniendo el valor temporal del mandato.
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: una segunda vez
  alternatives_spanish:
  - de nuevo
  - por segunda vez
  lexicon: HALOT
  rationale: «Una segunda vez» preserva explícitamente la repetición del período de aislamiento, como en la lectura auditada del inglés. «De nuevo» sería más idiomático, pero menos preciso en cuanto al número de repeticiones.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se mantuvo la fuerza reflexiva de וְהִתְגַּלָּח, se conservó el valor diagnóstico de נֶתֶק con una imagen comprensible en español, y se reflejó la repetición del aislamiento con una formulación explícita de segunda vez. No hubo revisiones aplicadas en el paquete fuente, y el pasaje mostró acuerdo general con observaciones menores.'
  spanish_consistency_notes:
  - Se usó «rasurar/rasurarse» para mantener consistencia léxica con el acto de cortar el pelo en este contexto ritual.
  - Se evitó «cuarentena» para no introducir un marco médico moderno no requerido por el hebreo.
  - Se mantuvo «sacerdote» para כהן en línea con el uso levítico estándar en español.
  - La segunda mención de נֶתֶק se tradujo igual que la primera para conservar consistencia referencial.
