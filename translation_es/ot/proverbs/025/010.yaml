translation:
  language: es
  text: No sea que el que lo oye te avergüence[a], y no vuelva tu mala fama[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de יְחַסֶּדְךָ es raro y difícil. También puede entenderse como 'te deshonre' o 'te reproche'.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''y no vuelva tu mal informe''. El hebreo puede referirse al rumor desfavorable que sigue circulando o a la deshonra misma, ya irreversible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - no sea que ocurra que
  lexicon: HALOT
  rationale: Introduce con naturalidad en español el valor precautorio de la advertencia proverbial sin perder el matiz de consecuencia indeseable.
- source_word: יְחַסֶּדְךָ
  english_pob_choice: disgrace you
  chosen_spanish: te avergüence
  alternatives_spanish:
  - te deshonre
  - te reproche
  - te humille
  lexicon: HALOT
  rationale: El verbo hebreo es raro y difícil. En este contexto social, el efecto es la vergüenza pública; 'te avergüence' comunica bien esa humillación, aunque se preserve la tensión léxica en nota.
- source_word: שֹׁמֵעַ
  english_pob_choice: one who hears it
  chosen_spanish: el que lo oye
  alternatives_spanish:
  - quien lo escucha
  - un oyente
  - el que escucha
  lexicon: HALOT
  rationale: El participio funciona como sustantivo indefinido; 'el que lo oye' mantiene la referencia al dicho o asunto divulgado con estilo natural.
- source_word: דִבָּתְךָ
  english_pob_choice: your bad reputation
  chosen_spanish: tu mala fama
  alternatives_spanish:
  - tu mal informe
  - tu mala reputación
  - el rumor contra ti
  lexicon: HALOT
  rationale: דִבָּה alude a un mal informe o rumor desfavorable. 'Mala fama' expresa el efecto social persistente en español sin volver el texto demasiado técnico.
- source_word: לֹא תָשׁוּב
  english_pob_choice: not turn back
  chosen_spanish: no vuelva
  alternatives_spanish:
  - no regrese
  - no se retire
  - no se desvanezca
  lexicon: HALOT
  rationale: El verbo שוב con el sujeto implícito femenino ('fama/informe') sugiere que el daño circula y no revierte. 'No vuelva' conserva la imagen verbal y funciona con fluidez en español.
translation_notes:
  revision_awareness: 'Se siguió el sentido proverbial del original hebreo y el audit trail inglés, manteniendo la ambigüedad léxica principal en nota: el verbo raro יְחַסֶּדְךָ y la posible referencia de דִבָּתְךָ a ''mala fama'' o ''mal informe''.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió 'mala fama' para דִבָּה por ser idiomático y conservar el efecto social del proverbio.
  - Se mantuvo una estructura breve y proverbial, acorde con el tono sapiencial del hebreo.
