  text: '그가 힘찬 음성으로 외쳐 말하였습니다. 「무너졌다, 무너졌다, 큰 바벨론이! 그가 귀신들의 거처가 되었고, 모든 더러운 영의 옥이 되었으며, 모든 더럽고 미움받는 새의 옥이 되었고, 모든 더럽고 미움받는 짐승의 옥이 되었도다.'
