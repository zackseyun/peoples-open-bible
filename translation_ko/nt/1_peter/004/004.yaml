id: 1PE.4.4
reference: 1 Peter 4:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν ᾧ ξενίζονται μὴ συντρεχόντων ὑμῶν εἰς τὴν αὐτὴν τῆς ἀσωτίας ἀνάχυσιν, βλασφημοῦντες·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/004.yaml
  text: 'In this, they are surprised that you do not run with them into the same flood of debauchery, slandering you.'
translation:
  language: ko
  text: '이 일에서 그들은 여러분이 자기들과 함께 같은 방탕의 홍수에 뛰어들지 않는 것을 이상히 여기며 여러분을 비방합니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ξενίζονται
  english_pob_choice: are surprised
  chosen_korean: 이상히 여기며
  alternatives_korean:
  - 낯설어하며
  - 놀라며
  lexicon: BDAG
  rationale: ξενίζω의 「낯설게 여김·놀라움」을 「이상히 여기다」로 옮긴다. 4:12의 같은 어휘와 통일.
- source_word: συντρεχόντων ὑμῶν
  english_pob_choice: you do not run with them
  chosen_korean: 함께 ... 뛰어들지 않는 것
  alternatives_korean:
  - 함께 달려가지 않는 것
  - 동참하지 않는 것
  lexicon: BDAG
  rationale: συντρέχω의 「함께 달림」을 「뛰어들다」로 옮겨 「홍수」 이미지와 어울리게 한다.
- source_word: τῆς ἀσωτίας ἀνάχυσιν
  english_pob_choice: flood of debauchery
  chosen_korean: 방탕의 홍수
  alternatives_korean:
  - 방종의 격류
  - 무분별의 거센 흐름
  lexicon: BDAG
  rationale: ἀνάχυσις는 「쏟아져 흐름·범람」. 「홍수」로 옮긴다. ἀσωτία는 「방탕」.
- source_word: βλασφημοῦντες
  english_pob_choice: slandering you
  chosen_korean: 비방합니다
  alternatives_korean:
  - 모욕하며
  - 헐뜯으며
  lexicon: BDAG
  rationale: βλασφημέω는 「모욕적 발언」. 여기서는 사람을 향하므로 「비방」으로 옮긴다.
