id: EZK.11.16
reference: Ezekiel 11:16
source:
  edition: WLC
  text: לָ/כֵ֣ן אֱמֹ֗ר כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ כִּ֤י הִרְחַקְתִּי/ם֙ בַּ/גּוֹיִ֔ם וְ/כִ֥י הֲפִֽיצוֹתִ֖י/ם בָּ/אֲרָצ֑וֹת וָ/אֱהִ֤י לָ/הֶם֙ לְ/מִקְדָּ֣שׁ מְעַ֔ט בָּ/אֲרָצ֖וֹת אֲשֶׁר בָּ֥אוּ שָֽׁם־־׃ס
translation:
  text: 'Therefore say[a], ‘Thus says the Lord GOD: Though I removed them far off among the nations, and though I scattered them among the lands, yet I became for them a little sanctuary in the lands where they had gone.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “a sanctuary for a little while.” The Hebrew phrase may describe either a small/limited sanctuary or a temporary sanctuary-presence.
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: HALOT
  rationale: Standard inferential particle introducing the prophetic declaration based on the preceding context.
- source_word: אֱמֹר
  chosen: say
  alternatives:
  - speak
  lexicon: HALOT
  rationale: Direct imperative to the prophet; 'say' is the natural English equivalent in prophetic formulae.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; concise and idiomatic while remaining close to the Hebrew.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: 'Renders the title-plus-divine-name formula in line with the doctrine default: יְהוָה as ''the LORD.'' Because אֲדֹנָי precedes it, English convention uses ''Lord GOD'' to avoid ''Lord LORD'' while preserving both elements.'
- source_word: כִּי ... וְכִי
  chosen: Though ... and though
  alternatives:
  - Indeed ... and indeed
  - Because ... and because
  lexicon: HALOT
  rationale: 'Here the paired כִּי clauses are concessive in force relative to the following promise: despite exile and scattering, God remains present to them. English ''though ... and though'' best captures that discourse function.'
- source_word: הִרְחַקְתִּים
  chosen: I removed them far off
  alternatives:
  - I sent them far away
  - I caused them to be far away
  lexicon: HALOT
  rationale: Hiphil of רחק conveys causing distance/removal. 'Removed them far off' preserves divine agency and the spatial sense without over-paraphrasing.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - into the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign peoples/nations among whom Israel is exiled. 'Nations' is contextually appropriate and avoids importing later NT-specific 'Gentiles' nuance.
- source_word: הֲפִיצוֹתִים
  chosen: I scattered them
  alternatives:
  - I dispersed them
  lexicon: HALOT
  rationale: Common exile language; 'scattered' is the most natural and biblically resonant rendering of the Hiphil of פוץ.
- source_word: בָּאֲרָצוֹת
  chosen: among the lands
  alternatives:
  - through the countries
  - in the lands
  lexicon: HALOT
  rationale: Plural 'lands' preserves the Hebrew plural and the sense of multiple territories of dispersion. 'Among' fits the parallel with 'among the nations.'
- source_word: וָאֱהִי לָהֶם
  chosen: yet I became for them
  alternatives:
  - yet I was for them
  - and I became to them
  lexicon: HALOT
  rationale: 'The waw here is adversative in context: despite exile, God became something for them. ''Yet I became for them'' preserves the contrast and verbal force.'
- source_word: לְמִקְדָּשׁ מְעַט
  chosen: a little sanctuary
  alternatives:
  - a small sanctuary
  - a sanctuary for a little while
  lexicon: HALOT
  rationale: The phrase most naturally means 'a little/small sanctuary,' referring to limited but real divine sanctuary-presence in exile. The temporal reading 'for a little while' is possible but less likely here; it is preserved in a footnote.
- source_word: בָּאֲרָצוֹת אֲשֶׁר בָּאוּ שָׁם
  chosen: in the lands where they had gone
  alternatives:
  - in the lands to which they came
  - in the countries where they went
  lexicon: HALOT
  rationale: English past perfect clarifies prior movement into exile relative to God's becoming a sanctuary for them there. 'Lands' preserves the Hebrew plural.
