translation:
  language: es
  text: 'Y le dijo: «Hijo[a], tú siempre estás conmigo, y todo lo que es mío es tuyo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «hijo/niño». El griego dice τέκνον, un tratamiento familiar afectuoso más amplio que «hijo»; también podría traducirse «hijo mío», pero eso añadiría un posesivo que el griego no expresa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνον
  english_pob_choice: Child
  chosen_spanish: Hijo
  alternatives_spanish:
  - Niño
  - Hijo mío
  - Muchacho
  lexicon: BDAG
  rationale: En este contexto, τέκνον es un vocativo afectuoso de relación familiar. En español, «Hijo» transmite esa cercanía de modo natural y digno; «Niño» sonaría impropio para un adulto, y «Hijo mío» añade un posesivo que el griego no expresa.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - todo el tiempo
  - constantemente
  lexicon: BDAG
  rationale: πάντοτε significa de manera directa «siempre». «Siempre» es la equivalencia natural y conserva la idea de continuidad sin sobrecargar el estilo.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mi lado
  - junto a mí
  lexicon: BDAG
  rationale: La preposición μετά con genitivo expresa compañía. «Conmigo» es la forma idiomática y breve en español, equivalente a «with me».
- source_word: πάντα τὰ ἐμὰ
  english_pob_choice: all that is mine
  chosen_spanish: todo lo que es mío
  alternatives_spanish:
  - todo lo mío
  - todas mis cosas
  - todo mi patrimonio
  lexicon: BDAG
  rationale: 'El neutro plural tiene sentido abarcador: todo lo que pertenece al padre. «Todo lo que es mío» preserva ese alcance total sin reducirlo solo a objetos concretos.'
- source_word: σά ἐστιν
  english_pob_choice: is yours
  chosen_spanish: es tuyo
  alternatives_spanish:
  - te pertenece
  - está a tu disposición
  lexicon: BDAG
  rationale: 'σά es un predicado posesivo: «tuyo». «Es tuyo» sigue de cerca la estructura griega y mantiene abierta la relación legal y familiar implícita en la parábola.'
theological_decisions:
- issue: Tratamiento del vocativo τέκνον en la respuesta del padre
  english_pob_reading: Render τέκνον as 'Child' rather than 'Son'
  chosen_spanish_reading: «Hijo» como vocativo afectuoso, sin añadir un matiz posesivo
  alternative_spanish_readings:
  - «Hijo mío»
  - «Niño»
  - «Muchacho»
  rationale: La clave teológica y narrativa es la ternura de la dirección paterna, pero el español debe sonar natural. «Hijo» conserva la relación familiar y la calidez sin forzar el texto con un posesivo añadido ni con un término que resultaría impropio o demasiado informal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El audit trail inglés indica alta concordancia y sin revisiones aplicadas; por tanto, el borrador español sigue de cerca la decisión estabilizada, adaptándola a un español natural y reverente.
  spanish_consistency_notes:
  - Se mantiene «tú» para el discurso directo, en concordancia con el griego singular.
  - Se conserva el paralelismo totalizante de «todo lo que es mío es tuyo» sin reordenarlo en exceso.
  - La nota de pie aclara la alternativa principal en el vocativo sin introducir una lectura más fuerte que la del original.
