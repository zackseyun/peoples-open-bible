    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente «desde el lado del mar» y «hasta el límite hacia el este»; en las descripciones territoriales de Ezequiel, «mar» funciona como «occidente».
    reason: cultural_note
  revision_rationale: Se ajusta la traducción para reflejar mejor el sentido catastral de תְּרוּמַת הַקֹּדֶשׁ, el valor de adyacencia de אֶל־פְּנֵי, y la aclaración contextual de que las «porciones» son tribales. También se adopta «occidental/oriental» en el texto principal conforme a la racionalidad auditada del POB, dejando la literalidad «mar» en nota.
