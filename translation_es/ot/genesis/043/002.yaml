translation:
  language: es
  text: 'Y cuando terminaron de comer el grano que habían traído de Egipto, su padre les dijo: «Vuelvan; cómprennos un poco de alimento[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vuelvan; cómprennos un poco de grano». El hebreo usa un verbo que en este contexto suele asociarse con la compra de grano, aunque aquí el objeto explícito es el término más general «alimento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: And when
  chosen_spanish: Y aconteció que, cuando
  alternatives_spanish:
  - Y cuando
  - Y sucedió que, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el siguiente episodio. «Y aconteció que, cuando» conserva el valor secuencial y el tono narrativo sin sonar demasiado mecánico en español.
- source_word: כִּלּוּ לֶאֱכֹל
  english_pob_choice: they had finished eating
  chosen_spanish: terminaron de comer
  alternatives_spanish:
  - habían terminado de comer
  - acabaron de comer
  lexicon: HALOT
  rationale: El hebreo expresa completitud de la acción de comer; en español, «terminaron de comer» comunica bien esa idea. Se evita una construcción excesivamente pesada, aunque el sentido temporal antecedente también podría expresarse con pluscuamperfecto.
- source_word: הַשֶּׁבֶר
  english_pob_choice: the grain
  chosen_spanish: el grano
  alternatives_spanish:
  - el grano comprado
  - las provisiones
  - el alimento
  lexicon: HALOT
  rationale: En este contexto josefino, שבר se refiere al cereal adquirido durante la hambruna. «Grano» mantiene la especificidad agrícola mejor que «alimento», que sería más general.
- source_word: הֵבִיאוּ מִמִּצְרָיִם
  english_pob_choice: they had brought from Egypt
  chosen_spanish: habían traído de Egipto
  alternatives_spanish:
  - trajeron de Egipto
  lexicon: HALOT
  rationale: El pluscuamperfecto en español refleja que la acción de traer precede al terminar de comer. «Egipto» es el equivalente natural de מִצְרָיִם.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - su padre Jacob
  lexicon: HALOT
  rationale: El hebreo usa el término relacional, no el nombre propio. «Su padre» preserva esa referencia familiar y evita introducir una precisión no presente en el texto base.
- source_word: שֻׁבוּ
  english_pob_choice: Go back
  chosen_spanish: Vuelvan
  alternatives_spanish:
  - Regresen
  - Vuelvan de nuevo
  lexicon: HALOT
  rationale: El imperativo plural pide retorno al lugar previo. «Vuelvan» es natural, claro y mantiene el valor direccional de la forma hebrea.
- source_word: שִׁבְרוּ
  english_pob_choice: buy
  chosen_spanish: cómprennos
  alternatives_spanish:
  - compren para nosotros
  - adquieran
  lexicon: HALOT
  rationale: En este contexto, el verbo hebreo designa la compra de grano/provisiones. Dado que el complemento explícito es «un poco de alimento», «cómprennos» reproduce adecuadamente el matiz comercial sin sobreespecificar el objeto.
- source_word: לָנוּ
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  lexicon: HALOT
  rationale: 'El dativo hebreo se expresa naturalmente en español con enclítico: «cómprennos». Así se conserva la relación beneficiaria de la frase.'
- source_word: מְעַט אֹכֶל
  english_pob_choice: a little food
  chosen_spanish: un poco de alimento
  alternatives_spanish:
  - un poco de comida
  - una pequeña cantidad de alimento
  lexicon: HALOT
  rationale: «Alimento» mantiene un registro digno y general, equivalente al sentido amplio de אֹכֶל. «Un poco de» conserva la modestia de la petición.
translation_notes:
  revision_awareness: La redacción sigue el estado de revisión más reciente indicado como sin cambios y de alta concordancia. Se mantiene la distinción contextual entre שֶׁבֶר como «grano» y אֹכֶל como «alimento» en la petición final, sin fusionar indebidamente ambos términos.
  spanish_consistency_notes:
  - Se conserva un tono narrativo bíblico sobrio y comprensible para lectura pública.
  - Se evita el uso de «SEÑOR» u otras sustituciones no presentes en este versículo.
  - Se mantiene la diferencia léxica entre «grano» y «alimento», siguiendo el contexto agrícola de la escena.
