translation:
  language: es
  text: Y hubo así un auge del helenismo y un aumento de las costumbres extranjeras, a causa de la desmedida desvergüenza de Jasón[a], que era impío y no el sumo sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una invasión de costumbres extranjeras'. El raro término griego apunta a la difusión de prácticas no nativas, no judías.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἑλληνισμός
  english_pob_choice: Hellenism
  chosen_spanish: helenismo
  alternatives_spanish:
  - cultura griega
  - modo de vida griego
  lexicon: LSJ
  rationale: El término no apunta solo a etnicidad, sino a la adopción de prácticas griegas; 'helenismo' conserva esa especificidad histórica y suena natural en español bíblico académico.
- source_word: ἀκμή
  english_pob_choice: height
  chosen_spanish: auge
  alternatives_spanish:
  - cumbre
  - apogeo
  - altura
  lexicon: LSJ
  rationale: La idea es un punto de máxima expansión o desarrollo. 'Auge' comunica bien esa culminación en español sin volver la frase torpe.
- source_word: πρόσβασις
  english_pob_choice: increase
  chosen_spanish: intensificación
  alternatives_spanish:
  - avance
  - incremento
  - invasión
  lexicon: LSJ
  rationale: En este contexto el sustantivo raro expresa una entrada/avance o propagación de prácticas ajenas. 'Intensificación' mantiene la idea de crecimiento de la influencia extranjera; la alternativa más literal se refleja en la nota textual.
- source_word: ἀλλοφυλισμός
  english_pob_choice: foreign ways
  chosen_spanish: costumbres extranjeras
  alternatives_spanish:
  - costumbres ajenas
  - modo de vida extranjero
  - extranjerización
  lexicon: LSJ
  rationale: El término raro señala adopción de prácticas no nativas, específicamente no judías. 'Costumbres extranjeras' preserva el sentido cultural-religioso sin opacar la referencia.
- source_word: διὰ τὴν ... ἀναιδείαν
  english_pob_choice: because of the surpassing shamelessness
  chosen_spanish: a causa de la desmedida desvergüenza
  alternatives_spanish:
  - por la excesiva insolencia
  - debido a la gran impudencia
  lexicon: BDAG; LSJ
  rationale: La construcción causal pide 'a causa de'. ἀναιδείαν denota conducta descaradamente impropia; 'desvergüenza' transmite bien la censura moral. 'Desmedida' recoge el participio intensificador ὑπερβάλλουσαν.
- source_word: ἀσεβοῦς
  english_pob_choice: ungodly
  chosen_spanish: impío
  alternatives_spanish:
  - irreverente
  - sin Dios
  - malvado
  lexicon: LSJ
  rationale: '''Impío'' es el equivalente bíblico natural para alguien ajeno a la piedad debida a Dios y al pacto, conservando el peso moral del término.'
- source_word: οὐκ ἀρχιερέως
  english_pob_choice: not the high priest
  chosen_spanish: no el sumo sacerdote
  alternatives_spanish:
  - no un sumo sacerdote
  - no siendo sumo sacerdote
  - no el verdadero sumo sacerdote
  lexicon: LSJ
  rationale: La negación es polémica y niega la legitimidad del cargo. 'No el sumo sacerdote' refleja con precisión el golpe retórico del griego sin añadir 'verdadero' en el texto principal.
- source_word: ὑπερβάλλουσαν
  english_pob_choice: surpassing
  chosen_spanish: desmedida
  alternatives_spanish:
  - excesiva
  - extraordinaria
  - desbordante
  lexicon: LSJ
  rationale: El participio intensifica el sustantivo siguiente. 'Desmedida' naturaliza la intensificación y conserva el juicio de exceso.
- source_word: Ἰάσονος
  english_pob_choice: Jason
  chosen_spanish: Jasón
  alternatives_spanish:
  - Jason
  lexicon: Nombres propios bíblicos
  rationale: En español bíblico tradicional y moderno el nombre se adapta como 'Jasón', manteniendo reconocimiento y lectura natural.
theological_decisions:
- issue: Valor de οὐκ ἀρχιερέως aplicado a Jasón
  english_pob_reading: Jason is described as 'not a high priest,' expressing the author’s judgment that he lacked legitimate priestly standing.
  chosen_spanish_reading: Jasón es presentado como 'no el sumo sacerdote', es decir, como carente de legitimidad en el cargo.
  alternative_spanish_readings:
  - Jasón, que no era sumo sacerdote de verdad
  - Jasón, no siendo sumo sacerdote
  rationale: 'El texto no es neutral: desacredita a Jasón. La redacción española conserva esa fuerza polémica sin sobreexplicar en el cuerpo del versículo.'
  doctrine_reference: Principios de traducción POB sobre fuerza léxica y denuncia histórica
translation_notes:
  revision_awareness: 'Se siguió el estado revisado del POB inglés, que opta por ''increase'' para πρόσβασις y por ''not the high priest'' para οὐκ ἀρχιερέως. La versión española refleja esa misma dirección semántica con un giro natural: ''intensificación de las costumbres extranjeras'' y ''no el sumo sacerdote''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece.
  - Se mantiene 'helenismo' para Ἑλληνισμός por consistencia histórica y terminológica.
  - Se adapta el nombre propio a 'Jasón' según uso bíblico español.
  - Se conserva el juicio moral fuerte de 'impío' y 'desvergüenza' sin suavizarlo.
