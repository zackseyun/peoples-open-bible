lexical_decisions:
- source_word: נֹגַהּ
  english_pob_choice: Nogah
  chosen_spanish: Nogá
  alternatives_spanish:
  - Noga
  lexicon: HALOT
  rationale: Es un nombre propio en una lista genealógica; por eso se translitera, no se traduce. La forma española conserva el timbre vocálico del nombre hebreo y adapta la acentuación al español. La alternativa sin acento, Noga, también es posible en uso español, pero Nogá mantiene mejor la pronunciación esperable.
- source_word: נֶפֶג
  english_pob_choice: Nepheg
  chosen_spanish: Néfeg
  alternatives_spanish:
  - Nefeg
  lexicon: HALOT
  rationale: Nombre propio en contexto genealógico. Se translitera directamente al español, con acento gráfico para indicar la sílaba tónica y favorecer la lectura pública.
- source_word: יָפִיעַ
  english_pob_choice: Japhia
  chosen_spanish: Jafía
  alternatives_spanish:
  - Yafía
  - Yaphia
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la transliteración en lugar de intentar traducir el significado. En español, 'Jafía' sigue la convención bíblica de usar j para el fonema inicial representado en la tradición inglesa por Japhia, y el acento marca la pronunciación. 'Yafía' es una alternativa más fonética.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: gramática española
  rationale: La conjunción coordinante hebrea se refleja con la conjunción española simple en una lista de nombres. Aquí 'y' es la forma natural; 'e' no es necesaria porque la siguiente palabra no comienza con sonido /i/.
translation_notes:
