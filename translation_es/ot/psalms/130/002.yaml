revisions:
- from: Yahvé[a], oye mi voz; que tus oídos estén atentos a la voz de mis súplicas[b] por misericordia.
  to: Señor, oye mi voz; que tus oídos estén atentos a la voz de mis súplicas[a] por misericordia.
  rationale: Se corrige ‘Yahvé’ a ‘Señor’ para reflejar con fidelidad אֲדֹנָי como título vocativo, en línea con la evidencia hebrea y el audit trail inglés. Se elimina la nota teológica asociada porque defendía una sustitución injustificada. Se conserva el resto de la estructura, incluida la imaginería de los oídos atentos y la repetición de ‘voz’. La nota léxica sobre תַּחֲנוּנַי se mantiene, con formulación limpia y marcador único.
  reviewer_model: gpt-5.4
