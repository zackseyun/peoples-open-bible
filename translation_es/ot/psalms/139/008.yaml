translation:
  language: es
  text: Si yo subiera al cielo, allí estás tú; y si tendiera mi lecho en el Seol[a], he aquí, allí estás tú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Seol» translitera el hebreo שְׁאוֹל. No equivale necesariamente a «infierno» en el sentido doctrinal posterior; designa el ámbito de los muertos o la tumba.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Aunque
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una cláusula condicional o hipotética; «Si» conserva la relación paralela sin convertirla en temporal ni concesiva.
- source_word: אֶסַּק
  english_pob_choice: I ascend
  chosen_spanish: ascendiera
  alternatives_spanish:
  - subiera
  - subo
  - ascienda
  lexicon: HALOT
  rationale: En español, el subjuntivo condicional encaja bien en esta construcción poética. «Ascendiera» conserva la imagen vertical de ascenso y la elevación del lenguaje.
- source_word: שָׁמַיִם
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - los cielos
  - cielo
  lexicon: HALOT
  rationale: En este paralelismo con Seol, «el cielo» es la forma natural y reverente en español. Mantiene la esfera alta sin forzar una pluralidad menos idiomática.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: «Allí» conserva la referencia locativa y el énfasis repetido en la presencia de Dios en cualquier lugar.
- source_word: וְאַצִּיעָה
  english_pob_choice: if I make my bed
  chosen_spanish: tendiera mi lecho
  alternatives_spanish:
  - hiciera mi cama
  - me acostara
  - extendiera mi lecho
  lexicon: HALOT
  rationale: El verbo hebreo sugiere la acción de extender o preparar el lecho; «tendiera mi lecho» preserva la imagen concreta sin reducirla simplemente a «acostarme».
- source_word: שְּׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: el Seol
  alternatives_spanish:
  - la tumba
  - el sepulcro
  - el reino de los muertos
  - el infierno
  lexicon: HALOT
  rationale: Se translitera el término para no importar asociaciones doctrinales posteriores de «infierno». «El Seol» mantiene el concepto hebreo del ámbito de los muertos y su tensión lexical.
- source_word: הִנֶּךָּ
  english_pob_choice: behold, you are there
  chosen_spanish: he aquí, allí estás tú
  alternatives_spanish:
  - mira, allí estás tú
  - he aquí, estás tú allí
  - allí estás
  lexicon: HALOT
  rationale: «He aquí» preserva el valor deíctico y enfático de הִנֵּה; la repetición de «allí» y el pronombre explícito «tú» mantienen el paralelismo y la dirección personal del verso.
theological_decisions:
- issue: Rendering of שְׁאוֹל in a statement of divine presence
  english_pob_reading: Sheol
  chosen_spanish_reading: el Seol
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  - el infierno
  rationale: 'La POB en inglés translitera Sheol para evitar confundir el término con el infierno escatológico. En español, «el Seol» cumple la misma función: conserva la categoría hebrea sin imponer una lectura doctrinal posterior.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Poetic spatial parallelism of heaven and Sheol
  english_pob_reading: you are there
  chosen_spanish_reading: allí estás tú
  alternative_spanish_readings:
  - estás allí
  - tú estás allí
  rationale: La afirmación central no es solo locativa sino de presencia divina absoluta. «Allí estás tú» mantiene la sencillez del hebreo y el énfasis del pronombre final.
  doctrine_reference: Psalmic poetics; divine omnipresence
translation_notes:
  revision_awareness: Revisado a la luz del antecedente inglés POB y de la validación previa; se corrigió el problema de marcadores duplicados usando notas distintas y ancladas explícitamente en el texto.
  spanish_consistency_notes:
  - Se mantuvo un registro poético y reverente sin calcar el inglés de forma mecánica.
  - «Seol» se usa de manera consistente como transliteración técnica para preservar la tensión lexical del hebreo.
  - La repetición de la estructura condicional y locativa se conserva para reflejar el paralelismo del verso.
  - Se evitó reemplazar el término hebreo por «infierno», ya que el contexto no lo exige y el audit trail lo descarta.
