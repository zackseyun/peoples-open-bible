translation:
  language: es
  text: Las eras serán llenas de grano, y los lagares rebosarán de vino nuevo y aceite.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וּמָלְאוּ
  english_pob_choice: will be filled
  chosen_spanish: serán llenas
  alternatives_spanish:
  - serán llenadas
  - quedarán llenas
  lexicon: HALOT
  rationale: El perfecto con waw en contexto profético expresa un resultado futuro. En español, el pasivo/adjetival ‘serán llenas’ comunica bien el estado resultante sin volver la frase pesada.
- source_word: הַגֳּרָנ֖וֹת
  english_pob_choice: the threshing floors
  chosen_spanish: las eras
  alternatives_spanish:
  - las eras de trillar
  - las eras de aventar
  lexicon: HALOT
  rationale: גֹּרֶן designa el lugar de trilla; ‘era’ es un equivalente español natural y tradicional. Se evita una perífrasis más larga porque el contexto agrícola ya aclara la imagen.
- source_word: בָּר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - trigo
  - cereal
  lexicon: HALOT
  rationale: בָּר aquí alude al grano trillado en general, no a una especie concreta. ‘Grano’ conserva la amplitud semántica mejor que ‘trigo’.
- source_word: וְהֵשִׁיקוּ
  english_pob_choice: will overflow
  chosen_spanish: rebosarán
  alternatives_spanish:
  - se derramarán
  - desbordarán
  lexicon: HALOT
  rationale: El verbo transmite la idea de hacer que el contenido sobrepase el borde. ‘Rebosarán’ reproduce de forma idiomática la abundancia y el movimiento del hebreo.
- source_word: הַיְקָבִים
  english_pob_choice: the vats
  chosen_spanish: los lagares
  alternatives_spanish:
  - los tinos
  - las cubas
  lexicon: HALOT
  rationale: יֶקֶב puede referirse al recipiente o instalación relacionada con la prensa y la recolección del mosto/aceite. ‘Lagares’ mantiene el campo semántico agrícola y funciona bien en español bíblico sin perder naturalidad.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: mosto
  alternatives_spanish:
  - vino nuevo
  - vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ suele ser el producto fresco de la vendimia. ‘Mosto’ expresa en español esa bebida recién obtenida y conserva el matiz de abundancia agrícola mejor que ‘vino’ sin más.
- source_word: וְיִצְהָר
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: יִצְהָר denota aceite, normalmente de oliva. ‘Aceite’ es la traducción directa y más sobria; se evita especificar ‘de oliva’ porque el hebreo no lo dice explícitamente.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés, pero ajusta la imagen agrícola a equivalentes españoles naturales: בָּר como ‘grano’, הַגֳּרָנוֹת como ‘eras’ y תִּירוֹשׁ como ‘mosto’. Se conserva la fuerza de abundancia con ‘rebosarán’.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo donde el texto no lo requiere; este versículo no contiene el nombre divino.
  - ‘Aceite’ se dejó sin ‘de oliva’ para respetar la observación revisada del audit trail inglés.
  - ‘Mosto’ se prefirió a ‘vino nuevo’ por claridad agrícola y porque mantiene mejor la imagen de producción abundante.
