translation:
  language: es
  text: Y Apolonio lo oyó, y acampó con tres mil de caballería y una gran fuerza militar, y fue a Azoto como si estuviera de paso[a], y al mismo tiempo avanzó a la llanura[b], porque tenía una multitud de caballería y confiaba en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como si solo fuera pasando». El griego sugiere que Apolonio presentó su movimiento como un tránsito, no como un ataque abierto.
    reason: lexical_alternative
  - marker: b
    text: El griego usa «caballo» de manera colectiva para tropas montadas; por eso se traduce «caballería».
    reason: cultural_note
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: lo oyó
  alternatives_spanish:
  - lo escuchó
  - oyó
  lexicon: LSJ
  rationale: Mantiene el verbo básico de percepción auditiva sin añadir matiz interpretativo. El objeto pronominal ‘lo’ hace natural en español la referencia al movimiento de Apolonio anunciada en el contexto.
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - hizo campamento
  - se acampó
  lexicon: LSJ
  rationale: El sentido militar del verbo es el de establecer campamento. ‘Acampó’ es natural en español y preserva la acción táctica mejor que un verbo más general como ‘avanzó’.
- source_word: τρισχιλίαν ἵππον
  english_pob_choice: three thousand cavalry
  chosen_spanish: tres mil jinetes
  alternatives_spanish:
  - tres mil caballería
  - tres mil caballos
  lexicon: LSJ
  rationale: ἵππος funciona colectivamente para tropas montadas. ‘Jinetes’ comunica claramente el sentido militar en español; se mantiene la cifra y la idea de tropas montadas sin traducir mecánicamente ‘caballo’.
- source_word: δύναμιν πολλήν
  english_pob_choice: a large force
  chosen_spanish: una gran fuerza
  alternatives_spanish:
  - un gran ejército
  - muchas tropas
  lexicon: LSJ
  rationale: δύναμις aquí es fuerza militar, no poder abstracto. ‘Una gran fuerza’ sigue de cerca la elección inglesa y conserva amplitud sin especificar de más el tamaño o la composición.
- source_word: ἐπορεύθη εἰς Ἄζωτον
  english_pob_choice: went to Azotus
  chosen_spanish: fue a Azoto
  alternatives_spanish:
  - marchó a Azoto
  - se dirigió a Azoto
  lexicon: LSJ
  rationale: El verbo básico es ‘ir/proceder’. ‘Fue a’ evita sobretraducir el movimiento como marcha militar explícita, ya que el texto matiza luego la apariencia de tránsito.
- source_word: ὡς διοδεύων
  english_pob_choice: as though passing through
  chosen_spanish: como si pasara de largo
  alternatives_spanish:
  - como si sólo pasara por allí
  - como si estuviera de paso
  lexicon: LSJ
  rationale: La frase expresa la apariencia de tránsito, no de ataque frontal. ‘Pasara de largo’ refleja bien la idea de ‘pasar por’ sin fijar un idioma demasiado literal o torpe.
- source_word: ἅμα προσῆγεν εἰς τὸ πεδίον
  english_pob_choice: at the same time advanced into the plain
  chosen_spanish: al mismo tiempo avanzó hacia la llanura
  alternatives_spanish:
  - a la vez se dirigió a la llanura
  - simultáneamente avanzó al llano
  lexicon: LSJ
  rationale: ἅμα señala simultaneidad y προσάγω un movimiento táctico hacia adelante. ‘Avanzó hacia la llanura’ es claro en español y conserva la orientación militar del paso.
- source_word: πλῆθος ἵππου
  english_pob_choice: a multitude of cavalry
  chosen_spanish: una multitud de caballería
  alternatives_spanish:
  - muchos jinetes
  - gran número de caballería
  lexicon: LSJ
  rationale: πλῆθος conserva la idea de abundancia; ἵππος se entiende colectivamente como caballería. ‘Caballería’ mantiene el valor militar colectivo que la nota inglesa también subraya.
- source_word: πεποιθέναι ἐπʼ αὐτήν
  english_pob_choice: trusted in it
  chosen_spanish: confiaba en ella
  alternatives_spanish:
  - se apoyaba en ella
  - ponía su confianza en ella
  lexicon: LSJ
  rationale: El femenino singular remite naturalmente a la caballería como colectivo en griego. ‘Confiaba en ella’ preserva esa referencia y el matiz de confianza asentada del perfecto.
translation_notes:
  revision_awareness: La versión inglesa revisada añadió ‘with’ a ‘encamped’ para naturalidad. En español, ‘acampó con’ ya expresa esa relación de compañía/acompañamiento sin necesidad de ajuste adicional. También se respetó el matiz de fingido tránsito en ὡς διοδεύων mediante ‘como si pasara de largo’.
  spanish_consistency_notes:
  - Se mantuvo ‘Azoto’ para el topónimo, conforme al uso castellano usual y al inglés auditado ‘Azotus’.
  - Se prefirió ‘caballería’ para el colectivo militar y ‘jinetes’ en la cifra inicial, manteniendo la cohesión semántica con el griego ἵππος.
  - No se añadió puntuación interpretativa extra; la secuencia reproduce la progresión militar y la explicación causal final.
  - Se evitó ‘SEÑOR’, ‘Cristo’ u այլ terminología no pertinente; el versículo no presenta decisiones teológicas de alto impacto.
