revisions:
- from: o cuando un espíritu de celos[a] sobreviene a un hombre, y él siente celos de su esposa, y presenta a la mujer delante de Yahvé[b], y el sacerdote le hará a ella todo este mandamiento.
  to: o cuando un espíritu de celos[a] sobreviene a un hombre, y él siente celos de su esposa, y presenta a la mujer delante de Yahvé, y el sacerdote le hará a ella toda esta ley[b].
  rationale: Se corrige «mandamiento» a «ley» para reflejar mejor תּוֹרָה en este contexto ritual-legal y para alinearse con la revisión inglesa auditada. También se mueve la nota [b] a la frase correcta y se simplifica la nota [a] para que corresponda con mayor precisión al valor lexical documentado.
