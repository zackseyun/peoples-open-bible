base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/013/013.yaml
  text: 'Then you shall say to them[a], ‘Thus says Yahweh: Behold, I am about to fill all the inhabitants of this land—and the kings who sit on David’s throne, and the priests, and the prophets[b], and all the inhabitants of Jerusalem—with drunkenness.’'
  footnotes:
  - marker: a
    text: Or “the kings who sit on David’s throne.” The Hebrew more literally says “the kings who sit for David on his throne,” highlighting their dynastic succession to David.
    reason: lexical_alternative
  - marker: b
    text: “Drunkenness” is likely metaphorical for divinely imposed disorientation and judgment, though the image is intentionally left concrete.
    reason: lexical_alternative
