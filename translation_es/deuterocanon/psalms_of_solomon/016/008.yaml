lexical_decisions:
- source_word: μὴ ἀπατησάτω με
  english_pob_choice: do not let ... deceive me
  chosen_spanish: no permitas que me engañe
  alternatives_spanish:
  - no dejes que me engañe
  - que no me engañe
  lexicon: LSJ
  rationale: 'El imperativo/jusivo negativo se expresa de forma natural en español con una construcción de ruego o prohibición: «no permitas que...». «Engañe» conserva el valor de ἀπατάω en contexto de tentación.'
- source_word: κάλλος γυναικὸς παρανόμου
  english_pob_choice: the beauty of a lawless woman
  chosen_spanish: la belleza de una mujer impía
  alternatives_spanish:
  - la belleza de una mujer sin ley
  - la belleza de una mujer inicua
  lexicon: LSJ
  rationale: «Belleza» reproduce κάλλος. Para παρανόμου, «impía» comunica mejor en español bíblico la carga moral y religiosa de «sin ley / transgresora», sin sonar tan jurídico como «ilegal».
- source_word: παντὸς ὑποκειμένου
  english_pob_choice: anything set before me
  chosen_spanish: de nada puesto delante de mí
  alternatives_spanish:
  - de nada colocado delante de mí
  - de cualquier cosa puesta delante de mí
  lexicon: LSJ
  rationale: El griego es sintácticamente difícil y el audit trail inglés entiende aquí algo «puesto delante» como objeto de tentación. En español se mantiene la idea de algo presentado ante el sujeto, sin cerrar en exceso la ambigüedad del original.
- source_word: ἀπὸ ἁμαρτίας ἀνωφελοῦς
  english_pob_choice: by useless sin
  chosen_spanish: por un pecado inútil
  alternatives_spanish:
  - por un pecado vano
  - por un pecado sin provecho
  lexicon: LSJ
  rationale: «Inútil» refleja bien ἀνωφελοῦς, y «pecado» mantiene el valor moral del término. La preposición «por» conserva en español la relación causal o de procedencia que el inglés POB tomó del ἀπό griego.
theological_decisions:
- issue: Cómo verter παρανόμου sin perder la fuerza moral-religiosa.
  english_pob_reading: lawless woman
  chosen_spanish_reading: mujer impía
  alternative_spanish_readings:
  - mujer sin ley
  - mujer inicua
  rationale: «Impía» preserva la oposición bíblica entre piedad e impiedad y evita una reducción meramente civil de «lawless».
  doctrine_reference: Ética bíblica / fidelidad a la ley de Dios
- issue: Si el segundo miembro repite explícitamente «belleza» o si debe mantenerse la elipsis del griego.
  english_pob_reading: nor anything set before me by useless sin
  chosen_spanish_reading: ni de nada puesto delante de mí por un pecado inútil
  alternative_spanish_readings:
  - ni de la belleza de nada puesto delante de mí por un pecado inútil
  - ni de cualquier cosa puesta delante de mí por un pecado inútil
  rationale: El griego no repite κάλλος en la segunda cláusula; por eso el español evita introducir «belleza» y conserva la elipsis.
  doctrine_reference: Sintaxis del original / economía textual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que corrigió la sintaxis del segundo miembro para reflejar mejor el genitivo griego de παντὸς ὑποκειμένου y la lectura más directa de ἀνωφελοῦς como «inútil/useless». La versión española procura conservar esa elipsis y la relación causal sin sobreexplicarla.
  spanish_consistency_notes:
  - Se usó «Y» para iniciar el verso, en consonancia con el arranque coordinante del griego.
  - Se evitó «SEÑOR» u այլ sustitución teológica, porque el texto no contiene el nombre divino.
  - Se mantuvo un registro bíblico sobrio, evitando paráfrasis expansivas.
  - Se preservó la ambigüedad de la segunda cláusula con una nota breve, en línea con el audit trail inglés.
