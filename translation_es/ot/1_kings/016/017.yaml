translation:
  language: es
  text: Entonces subió Omrí, y todo Israel con él, desde Guibetón[a], y sitiaron Tirza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «asediaron Tirza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלֶה
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subió
  - marcharon
  - ascendieron
  lexicon: HALOT
  rationale: El hebreo usa el movimiento narrativo básico עלה. En español, el plural concuerda naturalmente con «Omrí y todo Israel con él». «Subieron» mantiene el idiomatismo sin forzar una lectura más específica como «marcharon».
- source_word: עָמְרִי
  english_pob_choice: Omri
  chosen_spanish: Omrí
  alternatives_spanish:
  - Omri
  lexicon: Transliteración estándar española del nombre propio
  rationale: Se adapta la forma del nombre a la ortografía española con acento agudo para reflejar la pronunciación habitual en español bíblico.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  english_pob_choice: and all Israel with him
  chosen_spanish: y todo Israel con él
  alternatives_spanish:
  - y todos los israelitas con él
  lexicon: HALOT
  rationale: Se conserva el sustantivo colectivo «Israel», como en el hebreo, en vez de explicitar «los israelitas». «Todo Israel» mantiene la amplitud del sujeto tal como está formulado en la fuente.
- source_word: מִגִּבְּתוֹן
  english_pob_choice: from Gibbethon
  chosen_spanish: desde Guibetón
  alternatives_spanish:
  - de Guibetón
  lexicon: Nombre propio geográfico; uso de preposición locativa
  rationale: «Desde» refleja bien el valor de origen del מן en este contexto narrativo. «Guibetón» sigue una transliteración española usual y readable.
- source_word: וַיָּצֻרוּ
  english_pob_choice: they laid siege
  chosen_spanish: sitiaron
  alternatives_spanish:
  - pusieron sitio a
  - asediaron
  lexicon: HALOT
  rationale: El verbo militar צור se expresa de manera natural y precisa con «sitiaron». En español conserva el sentido técnico de asedio sin sobreexplicar.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - contra
  lexicon: HALOT
  rationale: Con el verbo de asedio, la preposición española idiomática es «a» («sitiaron a Tirza»). «Contra» sería posible, pero menos fluido en esta construcción.
- source_word: תִּרְצָה
  english_pob_choice: Tirzah
  chosen_spanish: Tirza
  alternatives_spanish:
  - Tirzah
  lexicon: Nombre propio geográfico
  rationale: Se adapta el topónimo a la forma española corriente «Tirza», ampliamente inteligible y cercana al hebreo.
translation_notes:
  revision_awareness: La revisión inglesa reciente no modificó el versículo; el texto español sigue de cerca el hebreo y la solución auditada en inglés, ajustando solo la naturalidad gramatical del español y la transliteración de nombres propios.
  spanish_consistency_notes:
  - Se mantuvo el valor narrativo de movimiento de עלה como «subieron», sin introducir matices militares adicionales.
  - «Sitiaron» conserva el sentido técnico de וַיָּצֻרוּ y armoniza con la alternativa formal indicada en la nota.
  - Se preservó «Israel» como sujeto colectivo, coherente con el hebreo y con la decisión inglesa auditada.
