review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue correctamente el hebreo como texto principal y conserva en nota la alternativa griega, en línea con la política del proyecto. Sin embargo, añade un «así» en la segunda cola que no corresponde directamente al hebreo ni al inglés POB, y coloca la nota [a] al final del versículo en vez de anclarla al segmento afectado.
  spanish_quality_summary: El español es claro y digno, pero puede hacerse más fiel y terso. «Porque como él es, así es su amigo, y como es su nombre, así son sus obras» se entiende bien, aunque la segunda cola queda más natural y más cercana al original como «y como su nombre, son sus obras». Además, conviene mover la marca de nota al primer colon, que es donde está la divergencia textual principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «amigo» para רֵעֵהוּ es adecuado. «obras» es aceptable para מַעֲשָׂיו, aunque «hechos» también sería posible; no exige cambio. La nota usa «Señor» dentro de una cita griega con κύριος, lo cual es razonable al tratarse de una lectura alternativa citada, no del texto principal.
  issues:
  - severity: medium
    issue: La segunda cola añade «así» en «así son sus obras»
    rationale: 'El hebreo dice literalmente «y como su nombre, sus hechos/obras». El inglés POB refleja esto con «and as his name, so are his deeds». En español puede mantenerse el paralelismo sin introducir más estructura de la necesaria: «y como su nombre, son sus obras».'
  - severity: low
    issue: La marca de nota [a] está al final del versículo en lugar del punto de divergencia
    rationale: La nota explica que el griego difiere sustancialmente en la primera cola. Anclarla después de «como él es» o del primer colon ayuda al lector a identificar mejor dónde está la variante.
  revised_spanish_text: Porque como él es[a], así es su amigo, y como su nombre, son sus obras.
  revised_footnotes:
  - marker: a
    text: 'Griego: «El que teme al Señor dirige rectamente su amistad, porque como él es, así también es su prójimo». El testimonio hebreo aquí difiere sustancialmente en la primera cola.'
    reason: alternative_reading
  revision_rationale: Se ajusta la segunda cola para reflejar con más precisión la tersura proverbial del hebreo y del inglés POB, evitando una expansión innecesaria. También se reubica la nota al lugar donde realmente se concentra la divergencia textual con el griego.
