  source_alignment_summary: El borrador español refleja fielmente el hebreo y el rastro de auditoría del POB en inglés. Conserva bien el valor exhortativo de יִשְׂמְחוּ con «Que ... se alegren», el matiz vocal y festivo de וִירַנְּנוּ con «canten con júbilo», la distinción léxica entre לְאֻמִּים («naciones») y עַמִּים («pueblos»), el sentido judicial de תִשְׁפֹּט con «juzgas», la fuerza de מִישׁוֹר con «equidad», y el alcance universal de בָּאָרֶץ con «en la tierra». También mantiene apropiadamente «Selah» como transliteración.
