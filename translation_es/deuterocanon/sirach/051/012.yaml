translation:
  language: es
  text: Porque me redimiste de todo mal[a], y me libraste en el día de la angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Porque me salvaste de la destrucción, y me libraste de un tiempo malo». El hebreo dice «de todo mal» y «en el día de la angustia».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּפְדֵּנִי
  english_pob_choice: redeemed me
  chosen_spanish: me redimiste
  alternatives_spanish:
  - me rescataste
  - me redimiste de mi esclavitud
  lexicon: HALOT
  rationale: «Redimir» conserva el valor fuerte de פדה como liberar mediante rescate y mantiene mejor el matiz teológico del texto que un simple «rescatar». En español suena natural y refleja la decisión de la POB inglesa.
- source_word: מִכָּל רָע
  english_pob_choice: from every evil
  chosen_spanish: de todo mal
  alternatives_spanish:
  - de todo maldad
  - de toda calamidad
  - de todo daño
  lexicon: HALOT
  rationale: El hebreo puede abarcar mal, daño o calamidad. «Todo mal» preserva la amplitud del término sin restringirlo solo a sufrimiento físico ni solo a mal moral. La nota explica la alternativa griega más concreta.
- source_word: וַיְמַלְּטֵנִי
  english_pob_choice: delivered me
  chosen_spanish: me libraste
  alternatives_spanish:
  - me salvaste
  - me pusiste a salvo
  - me escapaste
  lexicon: HALOT
  rationale: «Libraste» expresa bien el sentido de mallet de poner a salvo o sacar de peligro y permite distinguirlo de «redimiste» para conservar el paralelismo.
- source_word: בְּיוֹם צָרָה
  english_pob_choice: in the day of trouble
  chosen_spanish: en el día de la angustia
  alternatives_spanish:
  - en el día de la aflicción
  - en tiempo de angustia
  - en el día de la tribulación
  lexicon: HALOT
  rationale: «Angustia» comunica el idioma hebreo de צָרָה como tiempo de opresión o dificultad. La forma «en el día de» respeta la imagen concreta del original y resulta idiomática en español.
- source_word: ἔσωσας ... ἐξ ἀπωλείας / ἐκ καιροῦ πονηροῦ
  english_pob_choice: For you saved me from destruction, and delivered me from an evil time.
  chosen_spanish: Porque me redimiste de todo mal, y me libraste en el día de la angustia.
  alternatives_spanish:
  - Porque me salvaste de la destrucción, y me libraste de un tiempo malo.
  - Porque me salvaste de la perdición, y me libraste en un tiempo malo.
  lexicon: NA/Greek parallel in English audit trail
  rationale: La tradición hebrea es la base principal del texto, pero la nota mantiene visible la alternativa griega. En español, la lectura hebrea se traduce en el cuerpo principal y la griega se reserva en la nota para no borrar la tensión textual documentada.
theological_decisions:
- issue: Primacía del hebreo frente al paralelo griego
  english_pob_reading: Translate from the extant Hebrew as primary, with the Greek used as a control on sense.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal, usando el griego como control de sentido.
  alternative_spanish_readings:
  - 'Hacer que el texto principal siga más de cerca al griego: «Porque me salvaste de la destrucción, y me libraste de un tiempo malo».'
  - Fusionar ambas lecturas en una sola redacción.
  rationale: Sirácida se traduce aquí desde el hebreo donde éste se conserva, pero sin ocultar que el paralelo griego ofrece una formulación distinta. La nota permite auditar ambas lecturas y evita que la versión española borre esa diferencia textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde sobrevive; usar el paralelo griego como control real'
- issue: Alcance de רָע en מִכָּל רָע
  english_pob_reading: from every evil
  chosen_spanish_reading: de todo mal
  alternative_spanish_readings:
  - de toda calamidad
  - de todo daño
  - de toda desgracia
  rationale: «Mal» preserva la amplitud semántica del hebreo y no obliga a decidir entre sentido moral o circunstancial. En la nota se deja visible que el griego concreta la idea como «destrucción», evitando borrar la tensión semántica.
  doctrine_reference: HALOT; paralelo griego ἀπωλείας como control de sentido
- issue: Redimir / librar como paralelo de dos verbos hebreos
  english_pob_reading: redeemed me ... delivered me
  chosen_spanish_reading: me redimiste ... me libraste
  alternative_spanish_readings:
  - me rescataste ... me salvaste
  - me redimiste ... me salvaste
  rationale: «Redimir» para פדה y «librar» para מלט mantienen dos verbos distintos en español, como en el hebreo y la POB inglesa. Esto preserva la progresión del rescate y evita una redundancia innecesaria.
  doctrine_reference: HALOT; paralelismo hebreo
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del hebreo de Ben Sira y del paralelo griego de Swete. La redacción principal sigue el hebreo conservado, pero la nota conserva la variante griega para no ocultar la tensión textual documentada en la auditoría inglesa. No se detectaron cambios necesarios respecto del último pase revisado en inglés, aunque el informe de revisión marcó observaciones mayores que se resuelven aquí mediante una nota de variante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton en este proyecto, pero en este versículo no aparece explícitamente en el texto principal.
  - Se evita «SEÑOR» como sustituto del nombre divino en el cuerpo del verso.
  - «Redimiste» y «libraste» se distinguen deliberadamente para reflejar el paralelismo verbal del hebreo.
  - La nota usa comillas españolas y conserva una alternativa griega claramente identificada.
