translation:
  language: es
  text: Así tomaron posesión[a] de todo el territorio[c] de los amorreos[b], desde el Arnón hasta el Jaboc, y desde el desierto hasta el Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «poseyeron» o «heredaron»; el verbo hebreo puede tener esos sentidos, pero aquí se refiere a tomar control de un territorio.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el amorreo», singular colectivo que se refiere al pueblo amorreo en conjunto.'
    reason: lexical_alternative
  - marker: c
    text: O «frontera» o «límite» de los amorreos; aquí el sentido es la tierra comprendida dentro de esos límites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְשׁוּ
  english_pob_choice: they took possession of
  chosen_spanish: tomaron posesión de
  alternatives_spanish:
  - poseyeron
  - heredaron
  - desposeyeron
  lexicon: HALOT
  rationale: En contexto de conquista, ירשׁ expresa tomar control efectivo de un territorio. «Tomaron posesión de» conserva ese matiz activo y territorial sin volverlo una mera herencia pasiva.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - la totalidad de
  - entero
  lexicon: HALOT
  rationale: Mantiene el valor comprehensivo del cuantificador hebreo y suena natural en español con «el territorio».
- source_word: גְּבוּל
  english_pob_choice: territory
  chosen_spanish: territorio
  alternatives_spanish:
  - frontera
  - límite
  - región
  lexicon: HALOT
  rationale: Aunque גְּבוּל puede significar «frontera» o «límite», aquí está definido por puntos geográficos que delimitan un área; por eso «territorio» comunica mejor el conjunto de tierra comprendido entre esos límites.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: El hebreo singular colectivo designa al pueblo como grupo. En español, el plural etnónimo es la forma natural y clara.
- source_word: מֵאַרְנוֹן
  english_pob_choice: from the Arnon
  chosen_spanish: desde el Arnón
  alternatives_spanish:
  - desde el río Arnón
  - del Arnón
  lexicon: HALOT
  rationale: «Desde» conserva el punto de partida territorial. Se mantiene el nombre propio geográfico en forma habitual en español bíblico.
- source_word: וְעַד הַיַּבֹּק
  english_pob_choice: as far as the Jabbok
  chosen_spanish: hasta el Jaboc
  alternatives_spanish:
  - hasta el Jabboc
  - hasta el río Jaboc
  lexicon: HALOT
  rationale: «Hasta» expresa el límite extremo del territorio. Se usa la forma castellana habitual del topónimo para legibilidad.
- source_word: וּמִן הַמִּדְבָּר
  english_pob_choice: from the wilderness
  chosen_spanish: desde el desierto
  alternatives_spanish:
  - desde el desierto/estepa
  - desde el yermo
  lexicon: HALOT
  rationale: מִדְבָּר puede traducirse «desierto» o «desierto/estepa»; aquí, como término geográfico de extensión, «desierto» es claro y suficientemente fiel en español.
- source_word: וְעַד הַיַּרְדֵּן
  english_pob_choice: as far as the Jordan
  chosen_spanish: hasta el Jordán
  alternatives_spanish:
  - hasta el río Jordán
  lexicon: HALOT
  rationale: Completa el par de límites territoriales con una formulación natural y concisa; «Jordán» es la forma establecida del río en español.
translation_notes:
  revision_awareness: 'El texto inglés POB se mantiene sin necesidad de cambios sustantivos: conserva el valor de conquista de ירשׁ, interpreta גְּבוּל como área territorial y trata הָאֱמֹרִי como singular colectivo. La versión española sigue esos mismos criterios, con ajustes idiomáticos mínimos para naturalidad en español.'
  spanish_consistency_notes:
  - 'Se preserva la lógica de pares fronterizos: Arnón/Jaboc y desierto/Jordán.'
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se usa el plural étnico «los amorreos» por claridad, pero la nota conserva el matiz del singular colectivo hebreo.
  - «Tomaron posesión de» mantiene el sentido territorial activo de ירשׁ sin introducir una teología de herencia no explícita aquí.
