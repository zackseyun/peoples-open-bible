review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés: mantiene la metáfora de ''cabeza'', conserva ''Aram'', ''Damasco'' y ''Rezín'', y refleja correctamente el lapso temporal y la caída de Efraín como entidad nacional. Sin embargo, hay una divergencia menor pero significativa en כִּי: el inglés auditado escogió ''For'' como explicación enlazada al contexto previo, y en español ''Porque'' suena más causal subordinante que apertura explicativa; ''Pues'' o ''Porque'' pueden funcionar, pero ''Pues'' preserva mejor el valor discursivo inicial en este contexto profético.'
  spanish_quality_summary: El texto es claro y digno, pero 'será quebrantado' suena algo menos natural y menos contundente en español contemporáneo que 'será destrozado' o 'será hecho pedazos'; aun así es aceptable. La frase 'hasta dejar de ser pueblo' comunica bien la pérdida de condición nacional, pero puede pulirse a 'hasta dejar de ser un pueblo' para mayor naturalidad idiomática y para reflejar mejor la idea de entidad nacional distinta.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los nombres propios están bien manejados: ''Aram'', ''Damasco'', ''Rezín'', ''Efraín''. No aparecen términos sensibles del glosario mayor. La preservación de la metáfora ''cabeza'' concuerda con la decisión léxica documentada.'
  issues:
  - severity: medium
    issue: '''Porque'' al inicio puede sonar demasiado causal/subordinante para כִּי en esta posición discursiva.'
    rationale: El hebreo aquí introduce explicación del anuncio anterior. El inglés POB documentó 'For' precisamente por esa función conectiva. En español bíblico legible, 'Pues' representa mejor esa transición explicativa sin sugerir una subordinación gramatical torpe al comenzar versículo.
  - severity: low
    issue: Falta el artículo en 'dejar de ser pueblo'.
    rationale: Aunque comprensible, en español natural 'dejar de ser un pueblo' expresa con más claridad la pérdida de condición como pueblo/nación, alineándose mejor con 'from being a people'.
  revised_spanish_text: Pues la cabeza de Aram es Damasco[a], y la cabeza de Damasco es Rezín; y dentro de sesenta y cinco años Efraín será quebrantado hasta dejar de ser un pueblo.
  revised_footnotes:
  - marker: a
    text: 'O: «Efraín será quebrantado de modo que ya no sea un pueblo».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el conector inicial a 'Pues' para reflejar mejor la función explicativa de כִּי en contexto, y se añade 'un' antes de 'pueblo' para mejorar la naturalidad española y reflejar con más precisión la pérdida de estatus nacional. Se mantiene 'será quebrantado' por cercanía al audit trail y aceptabilidad en registro bíblico moderno.
