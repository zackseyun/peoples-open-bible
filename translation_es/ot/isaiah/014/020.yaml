translation:
  language: es
  text: No te unirás con ellos en el entierro, porque destruiste tu tierra; has matado a tu pueblo. La descendencia[a] de los malhechores nunca será nombrada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “la simiente de los malhechores” o “los descendientes de los malvados”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵחַד אִתָּם בִּקְבוּרָה
  english_pob_choice: you will not be joined with them in burial
  chosen_spanish: No serás unido[a] con ellos en sepultura
  alternatives_spanish:
  - No serás unido con ellos en entierro
  - No te unirás con ellos en sepultura
  lexicon: HALOT
  rationale: La idea central es la exclusión de compartir el honor funerario con otros. "Ser unido con ellos" conserva la relación de יחד, y "sepultura" refleja קבורה sin especificar más de lo que el hebreo dice. Se mantiene una forma pasiva para seguir el sentido del inglés auditado.
- source_word: קְבוּרָה
  english_pob_choice: burial
  chosen_spanish: sepultura
  alternatives_spanish:
  - entierro
  - enterramiento
  lexicon: HALOT
  rationale: '"Sepultura" es un equivalente natural y digno en español bíblico para el sustantivo abstracto, sin forzar la imagen a un lugar concreto. Evita la sobreespecificación de "tumba" o "sepulcro".'
- source_word: אַרְצְךָ
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu país
  - tu territorio
  lexicon: HALOT
  rationale: אֶרֶץ aquí señala el ámbito político del gobernante. "Tu tierra" es directo, idiomático y suficientemente amplio para conservar el alcance de dominio o reino.
- source_word: שִׁחַתָּ
  english_pob_choice: have destroyed
  chosen_spanish: destruiste
  alternatives_spanish:
  - arruinaste
  - corrompiste
  lexicon: HALOT
  rationale: El Piel de שׁחת expresa destrucción o ruina severa. "Destruiste" comunica con claridad la acusación profética sin añadir matices ajenos.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  lexicon: HALOT
  rationale: '"Tu pueblo" conserva el posesivo y la ironía del reproche: el gobernante ha destruido a los suyos.'
- source_word: הָרָגְתָּ
  english_pob_choice: have slain
  chosen_spanish: has matado
  alternatives_spanish:
  - has asesinado
  - has dado muerte a
  lexicon: HALOT
  rationale: En español, "matar" es la forma más directa y fiel al verbo hebreo. Se evitó "asesinar" porque introduce una precisión legal no exigida por el texto.
- source_word: לֹא יִקָּרֵא לְעוֹלָם
  english_pob_choice: will never be named
  chosen_spanish: nunca será nombrada
  alternatives_spanish:
  - nunca será llamada
  - jamás se mencionará
  lexicon: HALOT
  rationale: El nifal de קרא aquí expresa ser llamado o nombrado. "Será nombrada" mantiene la idea de desaparición de la memoria o del honor, y "nunca" traduce bien לְעוֹלָם en un registro bíblico claro.
- source_word: זֶרַע מְרֵעִים
  english_pob_choice: the offspring of evildoers
  chosen_spanish: la descendencia de los malhechores
  alternatives_spanish:
  - la simiente de los malvados
  - la descendencia de los malvados
  lexicon: HALOT
  rationale: '"זרע" puede ser semilla, descendencia u ऑफspring; "descendencia" preserva el sentido colectivo y natural en español. "Malhechores" comunica bien מְרֵעִים como personas moralmente perversas sin depender de una fórmula tradicional fija.'
theological_decisions:
- issue: 'Alcance de זֶרַע מְרֵעִים: línea dinástica específica o categoría general de impíos'
  english_pob_reading: Rendered generically as 'the offspring of evildoers' while allowing the immediate referent to include the tyrant's line in context.
  chosen_spanish_reading: Se tradujo genéricamente como "la descendencia de los malhechores", dejando que el contexto inmediato incluya la línea del tirano sin estrechar el hebreo.
  alternative_spanish_readings:
  - la descendencia de este malhechor
  - la descendencia de los impíos
  rationale: El plural hebreo mantiene una categoría moral amplia y no obliga a singularizar el referente. La traducción conserva esa tensión y permite que el contexto histórico-poético haga la identificación sin forzarla en la frase.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión auditada del inglés en cuanto a la puntuación interna: separa con punto y coma la causa de la acusación. No introduce cambios textuales adicionales respecto al sentido fuente; adapta la formulación a un español natural y sobrio.'
  spanish_consistency_notes:
  - Se conservó "Yahvé" como norma general del proyecto no aplicable aquí porque el versículo no contiene el Tetragrámaton.
  - Se prefirió "sepultura" frente a "burial"/"entierro" para mantener un tono bíblico formal sin perder claridad.
  - Se mantuvo el contraste entre plural genérico en "malhechores" y el posible referente contextual singular del tirano, sin resolverlo en la redacción principal.
