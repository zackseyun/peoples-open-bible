review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo: contraste inicial, nombre divino Yahvé, duración ilimitada, referencia a los que le temen y alcance generacional. Sin embargo, dos decisiones se alejan innecesariamente del rastro POB y del matiz fuente: חֶסֶד se vierte mejor como «amor fiel» o «amor leal» que como «misericordia» en este paralelismo de permanencia pactal, y «justicia» para צִדְקָה es posible pero el POB inglés privilegió «righteousness» con nota alternativa; en español «rectitud» preserva mejor ese valor amplio sin sonar forense.'
  spanish_quality_summary: El español es legible y digno, pero «desde la eternidad y hasta la eternidad» suena más pesado que una formulación más idiomática, y «para los hijos de sus hijos» es comprensible aunque «hasta los hijos de sus hijos» o «a los hijos de sus hijos» sigue mejor el paralelismo. La redacción revisada mejora naturalidad y cohesión poética sin apartarse del hebreo.
  glossary_alignment: Acierta con «Yahvé» según la norma del proyecto. No hay conflicto con otros términos doctrinales. La principal desalineación terminológica es optar por «misericordia» para חֶסֶד cuando el rastro POB documenta «steadfast love»; en español conviene acercarse con «amor fiel» y dejar alternativas en nota. Para צִדְקָה, «rectitud» en el texto y «justicia» en nota refleja mejor la decisión auditada.
  issues:
  - severity: medium
    issue: חֶסֶד traducido como «misericordia»
    rationale: Aunque posible en algunos contextos, aquí debilita el matiz de amor constante/leal que el POB inglés señaló como central en paralelo con la duración «de siempre a siempre».
  - severity: medium
    issue: צִדְקָה traducido como «justicia» en el texto principal
    rationale: El POB inglés escogió «righteousness» y reservó «justice» como alternativa. En español, «rectitud» preserva mejor el campo semántico amplio y evita estrecharlo a acción judicial.
  - severity: low
    issue: «desde la eternidad y hasta la eternidad» es algo pesada
    rationale: Es fiel, pero «de eternidad a eternidad» suena más natural y poético en español bíblico actual, manteniendo el modismo de duración ilimitada.
  - severity: low
    issue: Preposición final «para los hijos de sus hijos»
    rationale: «Para» no es errónea, pero «hasta los hijos de sus hijos» fluye mejor en español poético para expresar el alcance generacional del paralelismo.
  revised_spanish_text: Pero el amor fiel[a] de Yahvé es de eternidad a eternidad sobre los que le temen, y su rectitud[b] hasta los hijos de sus hijos.
