translation:
  language: es
  text: 'Por tanto, así dice Yahvé a la casa de Jacob, el que redimió a Abraham: Jacob ya no se avergonzará[a], y su rostro ya no palidecerá[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'será avergonzado'. El hebreo puede expresar también la idea de quedar en vergüenza o deshonra.
    reason: lexical_alternative
  - marker: b
    text: O 'su rostro ya no se pondrá pálido'. El verbo hebreo se refiere literalmente a volverse pálido o blanquecino, como imagen de vergüenza o consternación.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Conserva el valor inferencial del conector hebreo y suena natural en español bíblico sin perder la relación lógica con el contexto previo.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - así ha dicho
  lexicon: HALOT
  rationale: Es la fórmula profética estándar; 'así dice' mantiene la solemnidad y la cercanía al hebreo sin volverse arcaica en exceso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: אֶל בֵּית יַעֲקֹב
  english_pob_choice: to the house of Jacob
  chosen_spanish: a la casa de Jacob
  alternatives_spanish:
  - para la casa de Jacob
  - contra la casa de Jacob
  lexicon: HALOT
  rationale: '''Casa'' retiene el sentido corporativo/covenantal del hebreo, y la preposición ''a'' refleja el destinatario directo del oráculo.'
- source_word: אֲשֶׁר פָּדָה אֶת אַבְרָהָם
  english_pob_choice: he who redeemed Abraham
  chosen_spanish: el que redimió a Abraham
  alternatives_spanish:
  - el que rescató a Abraham
  - el que libró a Abraham
  lexicon: HALOT
  rationale: '''Redimió'' preserva el peso pactal y salvífico de פָּדָה mejor que un verbo más general como ''libró''.'
- source_word: יֵבוֹשׁ
  english_pob_choice: be ashamed
  chosen_spanish: se avergonzará
  alternatives_spanish:
  - será avergonzado
  - quedará avergonzado
  lexicon: HALOT
  rationale: En español, el giro pronominal expresa de forma natural el estado de vergüenza o deshonra sin introducir un agente explícito que el hebreo no requiere aquí.
- source_word: פָּנָיו יֶחֱוָרוּ
  english_pob_choice: his face will no longer grow pale
  chosen_spanish: su rostro se pondrá pálido
  alternatives_spanish:
  - su rostro palidecerá
  - su semblante se volverá blanco
  lexicon: HALOT
  rationale: '''Ponerse pálido'' comunica bien la imagen física de palidez/blancura y evita una calca menos natural; ''rostro'' conserva la imagen concreta del hebreo.'
theological_decisions:
- issue: Referente del relativo 'el que redimió a Abraham'
  english_pob_reading: 'The clause identifies the LORD: ''thus says the LORD ... he who redeemed Abraham.'''
  chosen_spanish_reading: La cláusula identifica a Yahvé como el que redimió a Abraham.
  alternative_spanish_readings:
  - La cláusula podría leerse como una aclaración más distante del destinatario, la casa de Jacob.
  rationale: La sintaxis y el contexto favorecen que el relativo describa a Yahvé, reforzando el fundamento histórico del oráculo sin alterar el sentido del hebreo.
  doctrine_reference: Isaías 29:22; cf. el uso profético del recuerdo de la redención de Abraham como base del trato de Yahvé con Israel.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide sustancialmente con el audit trail inglés. Se mantiene Yahvé para el Tetragrámaton, 'redimió' para פָּדָה, y el juego de vergüenza/palidez con una solución española natural. No se requieren revisiones textuales adicionales según el pasaje y el historial de revisión aportados.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el criterio del proyecto para יְהוָה.
  - '''Redimió'' preserva el valor pactal del verbo sin reemplazarlo por un término más genérico.'
  - Se conserva la imagen corporal de 'rostro' para פָּנָיו, evitando una abstracción excesiva.
  - La alternativa sobre 'vergüenza' se deja en nota porque el español puede expresar tanto estado como pasivo resultativo.
