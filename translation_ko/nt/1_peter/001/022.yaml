source:
  edition: SBLGNT
  text: Τὰς ψυχὰς ὑμῶν ἡγνικότες ἐν τῇ ὑπακοῇ τῆς ἀληθείας εἰς φιλαδελφίαν ἀνυπόκριτον ἐκ καρδίας ἀλλήλους ἀγαπήσατε ἐκτενῶς,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/022.yaml
  text: 'Having purified your souls by obedience to the truth for sincere brotherly love, love one another earnestly from the heart,'
translation:
  language: ko
  text: '여러분이 진리에 순종함으로 여러분의 영혼을 깨끗하게 하여 거짓 없는 형제 사랑에 이르렀으니, 마음으로부터 서로 뜨겁게 사랑하십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡγνικότες
  english_pob_choice: Having purified
  chosen_korean: 깨끗하게 하여
  alternatives_korean:
  - 정결하게 하여
  - 성결케 하여
  lexicon: BDAG
  rationale: ἁγνίζω의 「정결케 함」을 평이한 「깨끗하게 하다」로 옮긴다.
- source_word: ἐν τῇ ὑπακοῇ τῆς ἀληθείας
  english_pob_choice: by obedience to the truth
  chosen_korean: 진리에 순종함으로
  alternatives_korean:
  - 진리에 대한 순종으로
  lexicon: BDAG
  rationale: 수단의 ἐν과 ὑπακοή의 행위적 의미를 「순종함으로」로 옮긴다.
- source_word: φιλαδελφίαν ἀνυπόκριτον
  english_pob_choice: sincere brotherly love
  chosen_korean: 거짓 없는 형제 사랑
  alternatives_korean:
  - 위선 없는 형제애
  - 진정한 형제 사랑
  lexicon: BDAG
  rationale: ἀνυπόκριτος의 「가식·위선 없음」을 한국어 「거짓 없는」으로 자연스럽게 옮긴다.
- source_word: ἐκτενῶς
  english_pob_choice: earnestly
  chosen_korean: 뜨겁게
  alternatives_korean:
  - 간절히
  - 열렬히
  lexicon: BDAG
  rationale: ἐκτενῶς는 「힘써, 강도 있게」의 부사. 4:8의 ἐκτενῆ(뜨거운)와 통일을 위해 「뜨겁게」로 옮긴다.
