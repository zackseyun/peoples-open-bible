translation:
  language: es
  text: Entonces rechazó la tienda de José[a][b], y no eligió la tribu de Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «repudió la tienda de José».
    reason: lexical_alternative
  - marker: b
    text: Es decir, Efraín como tribu principal dentro de los tribus de José; el versículo anticipa la elección de Judá y Sion en el contexto siguiente.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּמְאַס
  english_pob_choice: Then he rejected
  chosen_spanish: Entonces rechazó
  alternatives_spanish:
  - Y rechazó
  - Entonces desechó
  - Entonces despreció
  lexicon: HALOT
  rationale: מָאַס expresa rechazar, desechar o repudiar. «Rechazó» es claro en español moderno y conserva el avance narrativo del waw consecutivo con «Entonces», sin añadir una dureza interpretativa mayor que la del hebreo.
- source_word: בְּאֹהֶל יוֹסֵף
  english_pob_choice: the tent of Joseph
  chosen_spanish: la tienda de José
  alternatives_spanish:
  - la tienda de José
  - la casa de José
  - el tabernáculo de José
  lexicon: HALOT
  rationale: אֹהֶל significa literalmente «tienda». «Tienda de José» preserva la imagen del texto y evita explicar prematuramente la metáfora como una institución fija; en el contexto poético puede aludir al lugar/santuario asociado con José.
- source_word: וּבְשֵׁבֶט אֶפְרַיִם
  english_pob_choice: the tribe of Ephraim
  chosen_spanish: la tribu de Efraín
  alternatives_spanish:
  - el cetro de Efraín
  - el clan de Efraín
  lexicon: HALOT
  rationale: שֵׁבֶט puede significar «tribu», «vara» o «cetro». Aquí, en paralelo con «la tienda de José» y junto a un nombre tribal, «tribu» es la lectura más natural y evita introducir una nota real o dinástica que el verso no exige.
- source_word: לֹא בָחָר
  english_pob_choice: he did not choose
  chosen_spanish: no eligió
  alternatives_spanish:
  - no escogió
  - no seleccionó
  - no eligió
  lexicon: HALOT
  rationale: בָּחַר significa «elegir/escoger». «No eligió» es directo y natural, y conserva el sentido de elección divina sin imponer en el texto principal un lenguaje técnico adicional.
theological_decisions:
- issue: Sentido histórico-teológico de rechazo y elección entre centros tribales
  english_pob_reading: Render the verse in straightforward historical terms about God's rejection of Joseph/Ephraim as the chosen sanctuary/tribal locus.
  chosen_spanish_reading: 'Traducirlo en términos históricos directos: Dios rechazó la tienda asociada con José y no escogió a la tribu de Efraín.'
  alternative_spanish_readings:
  - Leer José y Efraín de modo más simbólico como todo el reino del norte
  - Explicitar en el texto principal que se trata del santuario del norte
  rationale: El salmo narra la historia de Israel y prepara el traslado de la prominencia sagrada hacia Judá y Sion en el contexto inmediato. El texto español mantiene el lenguaje concreto de las tribus y deja que el sentido histórico más amplio emerja del contexto, sin añadir interpretación que el hebreo no explicita aquí.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La versión inglesa auditada de la POB está estable y sin cambios aplicados en la última pasada; el español mantiene esa lectura, preservando el paralelismo y el sentido histórico sin introducir variantes textuales no documentadas.
  spanish_consistency_notes:
  - Se usa «José» y «Efraín» como nombres propios tribales, en línea con el hebreo y con la lectura histórica del salmo.
  - Se mantiene «tienda» para אֹהֶל para conservar la imagen concreta del original.
  - Se evita «SEÑOR» como máscara, porque aquí no aparece יהוה en el texto hebreo; el sujeto queda implícito por el contexto del salmo.
  - «Eligió»/«eligió» se reserva para reproducir בָחַר con una forma simple y no técnica.
