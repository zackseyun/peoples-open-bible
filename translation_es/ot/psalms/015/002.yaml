    rationale: Aunque semánticamente defendible, la combinación suena forzada. El hebreo תמים describe integridad/blamelessness en la conducta; en español natural y fiel encaja mejor «con integridad» o «intachablemente». La propia nota ya reconoce «con integridad» como alternativa.
