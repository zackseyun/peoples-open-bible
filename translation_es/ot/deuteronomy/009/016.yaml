translation:
  language: es
  text: 'Y miré[a], y he aquí, habían pecado contra Yahvé su Dios: se habían hecho para ustedes un becerro de metal fundido[b]. Se habían apartado rápidamente del camino que Yahvé les había mandado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vi». El hebreo puede traducirse con un verbo de visión; «miré» conserva mejor en español el paso a la observación señalado por «he aquí».
    reason: lexical_alternative
  - marker: b
    text: O «un becerro fundido». La frase hebrea alude a un ternero o becerro hecho por fundición de metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  lexicon: HALOT
  rationale: ראיה aquí introduce la observación de Moisés en el relato; en español, «miré» conserva el movimiento discursivo de atención que el inglés POB busca con «looked», sin volver redundante la frase siguiente con «he aquí».
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mirad
  - y allí estaba
  lexicon: HALOT
  rationale: La partícula funciona como marcador deíctico y de atención. «He aquí» mantiene el tono solemne y la fuerza de señalamiento con un equivalente tradicional y claro en español.
- source_word: חֲטָאתֶם לַיהוָה אֱלֹהֵיכֶם
  english_pob_choice: you had sinned against Yahweh your God
  chosen_spanish: habíais pecado contra Yahvé vuestro Dios
  alternatives_spanish:
  - pecasteis contra Yahvé vuestro Dios
  lexicon: HALOT
  rationale: El qatal se presenta retrospectivamente dentro del discurso de Moisés, por lo que el pluscuamperfecto español refleja mejor la anterioridad respecto al acto de mirar. «Pecado contra» conserva el valor relacional de חטא con ל, y «Yahvé» sigue la pauta doctrinal del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según la norma del proyecto en español, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: עֲשִׂיתֶם לָכֶם
  english_pob_choice: you had made for yourselves
  chosen_spanish: habíais hecho para vosotros
  alternatives_spanish:
  - habíais hecho para ustedes
  - os habíais hecho
  lexicon: HALOT
  rationale: La construcción עשה + ל expresa beneficio o destino para sí mismos; «para vosotros» reproduce con claridad ese matiz, evitando que el pronombre reflexivo español oscurezca el sentido.
- source_word: עֵגֶל מַסֵּכָה
  english_pob_choice: a cast-metal calf
  chosen_spanish: un becerro de fundición
  alternatives_spanish:
  - un becerro fundido
  - un becerro de metal fundido
  lexicon: HALOT
  rationale: «מַסֵּכָה» señala algo fundido/vertido en metal para formar un ídolo. «De fundición» es una fórmula natural en español bíblico y mantiene la relación material y cultual sin perder la referencia a la fabricación metálica.
- source_word: סַרְתֶּם
  english_pob_choice: You had turned aside
  chosen_spanish: Os habíais apartado
  alternatives_spanish:
  - os habíais desviado
  - os habíais vuelto aparte
  lexicon: HALOT
  rationale: סור en contexto de pacto expresa apartarse del camino mandado. «Apartado» conserva la metáfora de desviación sin forzar un calco mecánico.
- source_word: מַהֵר
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - de prisa
  lexicon: HALOT
  rationale: El adverbio expresa prontitud/rapidez; «pronto» es idiomático en español y encaja bien con la progresión narrativa.
- source_word: מִן הַדֶּרֶךְ
  english_pob_choice: from the way
  chosen_spanish: del camino
  alternatives_spanish:
  - de la senda
  - de la ruta
  lexicon: HALOT
  rationale: «Camino» conserva el valor metafórico ético y de pacto de דרך en Deuteronomio, manteniendo la intertextualidad bíblica sin sonar arcaico.
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶתְכֶם
  english_pob_choice: that Yahweh had commanded you
  chosen_spanish: que Yahvé os había mandado
  alternatives_spanish:
  - que Yahvé os había ordenado
  - que Yahvé os había encomendado
  lexicon: HALOT
  rationale: «Mandado» refleja con precisión el lenguaje de precepto del texto y mantiene el paralelo con el camino normado por Yahvé. El pluscuamperfecto preserva la secuencia retrospectiva del relato.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino en español según la política del proyecto, en lugar de ocultarlo tras una sustitución titulatória. Esto conserva la referencia pactal explícita del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de חטא con לַיהוָה
  english_pob_reading: you had sinned against Yahweh
  chosen_spanish_reading: habíais pecado contra Yahvé
  alternative_spanish_readings:
  - habíais pecado a Yahvé
  - habíais faltado a Yahvé
  rationale: En español, «pecar contra» es la forma más clara y natural para la relación hostil/infiel expresada por la construcción hebrea, sin suavizar la gravedad moral y covenantal del acto.
  doctrine_reference: 'Lexical theology: covenant breach expressed by חטא + preposition ל'
- issue: עֵגֶל מַסֵּכָה
  english_pob_reading: a cast-metal calf
  chosen_spanish_reading: un becerro de fundición
  alternative_spanish_readings:
  - un becerro fundido
  - un becerro de metal fundido
  rationale: La expresión comunica tanto la forma idolátrica como el proceso/material de fabricación. «De fundición» conserva la tensión entre ídolo y manufactura sin introducir una paráfrasis interpretativa.
  doctrine_reference: 'Lexical theology: idol image made by casting metal'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios: el texto fue confirmado como estable (high_agreement, agreement 1.0). La redacción española sigue de cerca la decisión auditada del inglés POB, preservando el pluscuamperfecto retrospectivo, el nombre divino «Yahvé» y la nota léxica sobre עֵגֶל מַסֵּכָה.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera uniforme para יְהוָה.
  - 'Se conserva el paralelismo verbal en pluscuamperfecto: «habíais pecado / habíais hecho / os habíais apartado».'
  - «Camino» se usa para דרך, coherente con el lenguaje de pacto en Deuteronomio.
  - El pronombre «vosotros/os» mantiene la concordancia plural del original; puede adaptarse a «ustedes» solo si la línea editorial del contexto lo exige, pero aquí se conserva la forma bíblica directa.
