revisions:
- from: ¡Regocíjense[a], naciones, con su pueblo, porque él vengará la sangre de sus esclavos[b]; devolverá el castigo sobre sus adversarios, y hará expiación[c] por su tierra y su pueblo.
  to: ¡Regocíjense[a], naciones, con su pueblo! Porque él vengará la sangre de sus siervos[b]; les dará su merecido a sus adversarios[c], y hará expiación[d] por su tierra y su pueblo.
  rationale: Se corrige «esclavos» a «siervos» para ajustarse a la decisión contextual documentada por la POB, manteniendo la alternativa léxica en nota. Se añade la nota textual sobre la variante larga de la LXX/DSS, ausente en el borrador. Se sustituye la construcción poco idiomática «devolverá el castigo sobre» por «les dará su merecido a sus adversarios», que comunica retribución de forma natural y fiel al sentido revisado del inglés auditado. Se conservan «regocíjense», «adversarios» y «hará expiación» por su buena alineación con el hebreo y la racionalidad teológica documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:04:56Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del TM: llamado a las naciones a regocijarse con su pueblo, vindicación de la sangre derramada, retribución a los adversarios y כפר por la tierra y el pueblo. Sin embargo, se aparta del rastro auditado en dos puntos importantes: usa «esclavos» en el texto principal donde la POB inglesa eligió «servants», y omite la nota textual sobre la forma más larga preservada en la LXX y un DSS. Además, «devolverá el castigo sobre» suena menos fiel y menos natural que una formulación como «les dará su merecido a sus adversarios» o «pagará a sus adversarios».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay problemas de naturalidad y consistencia editorial. «¡Regocíjense[a], naciones» es aceptable, aunque «naciones» sin vocativo marcado puede fluir mejor con coma. Más serio: «devolverá el castigo sobre sus adversarios» es poco idiomático en español. También falta cerrar con el punto final y conviene conservar la conjunción final coordinada con más naturalidad. «Hará expiación por su tierra y su pueblo» es comprensible y teológicamente sólido.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto salvo la decisión sobre עֲבָדָיו: el inglés auditado prefirió «servants» por contexto, por lo que en español corresponde mejor «siervos» o «servidores» en el texto principal, dejando «esclavos» como alternativa de nota. «Adversarios» y «expiación» alinean bien con la racionalidad documentada.'
  issues:
  - severity: high
    issue: El texto principal usa «sus esclavos» en vez de la decisión auditada contextual equivalente a «sus siervos».
    rationale: Aunque עבדים puede significar «esclavos», la POB inglesa documentó que aquí el matiz principal es pertenencia a Dios y vindicación de su sangre, no estatus servil. En revisión española debe preservarse esa decisión contextual, dejando «esclavos» como alternativa en nota.
  - severity: high
    issue: Falta la nota textual sobre la variante larga de la LXX y un manuscrito del Mar Muerto.
    rationale: La auditoría inglesa conserva esta nota como parte significativa del aparato de traducción. Debe mantenerse en español, especialmente porque el versículo es textualmente conocido por esa expansión.
  - severity: medium
    issue: «Devolverá el castigo sobre sus adversarios» es poco natural y no representa bien la revisión inglesa final.
    rationale: La revisión inglesa cambió de «repay vengeance on» a «repay his adversaries». En español, una formulación como «les dará su merecido a sus adversarios» o «pagará a sus adversarios» preserva la retribución sin construcción forzada. «Devolverá el castigo sobre» suena torpe.
  - severity: low
    issue: La distribución de notas no sigue de cerca el anclaje y numeración funcional del inglés auditado.
    rationale: La nota de «expiación/limpiará» debe anclarse a la cláusula final, y la nota textual debe añadirse con un marcador propio, manteniendo marcadores únicos y en orden.
