translation:
  language: es
  text: Pero su concubina le fue infiel[a], y se fue de su lado a la casa de su padre, a Belén de Judá, y estuvo allí cuatro meses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «se prostituyó contra él». Algunos intérpretes antiguos entendieron la cláusula de otro modo, como «se enojó con él» o «discutió con él».
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּזְנֶה
  english_pob_choice: was unfaithful
  chosen_spanish: fue infiel
  alternatives_spanish:
  - se prostituyó
  - cometió inmoralidad sexual
  - se enojó
  lexicon: HALOT, BDB
  rationale: El verbo זנה suele expresar infidelidad sexual o prostitución. En español, 'fue infiel' comunica de manera natural esa carga moral sin especificar más de lo que exige el contexto. Mantiene también la tensión interpretativa documentada por el POB, en vez de resolverla con una paráfrasis más fuerte o con un eufemismo.
- source_word: עָלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - contra él
  lexicon: BDB
  rationale: Después de זנה, la preposición על con sufijo puede indicar deslealtad dirigida a alguien. En español, 'a él' funciona bien con 'fue infiel' y evita una formulación excesivamente marcada, aunque 'contra él' sigue siendo una posibilidad semántica.
- source_word: פִּילַגְשׁוֹ
  english_pob_choice: his concubine
  chosen_spanish: su concubina
  alternatives_spanish:
  - su esposa secundaria
  lexicon: HALOT, BDB
  rationale: '''Concubina'' es el equivalente más directo y reconocido para פילגש. ''Esposa secundaria'' explica el estatus, pero es menos preciso como término de traducción bíblica y no es el término preferido por el POB en inglés.'
- source_word: וַתֵּלֶךְ מֵאִתּוֹ
  english_pob_choice: she went away from him
  chosen_spanish: se fue de él
  alternatives_spanish:
  - lo dejó
  - se alejó de él
  lexicon: BDB
  rationale: La construcción expresa separación además de movimiento. 'Se fue de él' conserva la idea básica en español natural; 'lo dejó' es posible, pero introduce un matiz más idiomático y menos literal.
- source_word: אֶל בֵּית אָבִיהָ
  english_pob_choice: to her father's house
  chosen_spanish: a la casa de su padre
  alternatives_spanish:
  - a la casa paterna
  - a casa de su padre
  lexicon: BDB
  rationale: La expresión hebrea es un giro familiar fijo. 'A la casa de su padre' es claro, digno y suficientemente literal en español. Mantiene el valor relacional del sintagma sin expandirlo innecesariamente.
- source_word: אֶל בֵּית לֶחֶם יְהוּדָה
  english_pob_choice: to Bethlehem in Judah
  chosen_spanish: a Belén de Judá
  alternatives_spanish:
  - a Belén en Judá
  - a Belén de Judea
  lexicon: BDB
  rationale: '''Belén de Judá'' es la forma breve y tradicionalmente inteligible para identificar la localidad. Evita ambigüedad con otras referencias a Belén y refleja la dependencia del nombre del territorio de Judá.'
- source_word: וַתְּהִי שָׁם
  english_pob_choice: and was there
  chosen_spanish: y estuvo allí
  alternatives_spanish:
  - y permaneció allí
  - y quedó allí
  lexicon: BDB
  rationale: El hebreo usa היה con שם para indicar permanencia. 'Estuvo allí' es natural en narración española y conserva bien la duración implícita del relato.
- source_word: יָמִים אַרְבָּעָה חֳדָשִׁים
  english_pob_choice: for four months
  chosen_spanish: cuatro meses
  alternatives_spanish:
  - un lapso de cuatro meses
  - durante cuatro meses
  lexicon: HALOT, BDB
  rationale: La expresión hebrea idiomática literalmente combina 'días' con 'cuatro meses', pero el sentido es duración. 'Cuatro meses' transmite la medida temporal con claridad y fidelidad, sin forzar un calco poco natural en español.
theological_decisions:
- issue: Sentido de וַתִּזְנֶה en un relato moralmente cargado
  english_pob_reading: sexual unfaithfulness ('was unfaithful')
  chosen_spanish_reading: fue infiel
  alternative_spanish_readings:
  - se prostituyó
  - se enojó con él / discutió con él
  rationale: La vocalización masorética y el uso ordinario de זנה apoyan la lectura de infidelidad sexual. El español 'fue infiel' preserva ese valor sin añadir más detalle del que el texto exige. La alternativa interpretativa antigua, que suaviza la acusación, queda implícitamente respetada en la nota, no absorbida en el texto principal.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
- issue: Carga relacional de עָלָיו con זנה
  english_pob_reading: to him / against him
  chosen_spanish_reading: a él
  alternative_spanish_readings:
  - contra él
  rationale: '''A él'' es idiomático con ''fue infiel'' y mantiene la dirección personal del acto. ''Contra él'' podría resaltar el carácter agresivo o de ruptura, pero en español suena más interpretativo; por eso se deja como alternativa, no como texto principal.'
  doctrine_reference: Translation philosophy §3 (preservar tensión sin sobre-interpretar)
- issue: Estatus social de פִּילַגְשׁוֹ
  english_pob_reading: his concubine
  chosen_spanish_reading: su concubina
  alternative_spanish_readings:
  - su esposa secundaria
  rationale: '''Concubina'' conserva la categoría social y sexual del hebreo sin domesticarla con un equivalente explicativo. No se reemplaza por un término eclesiástico o moralizante, para no borrar la crudeza del relato.'
  doctrine_reference: POB lexical transparency principle
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el acuerdo alto del POB inglés y no introduce cambios sustanciales respecto a la última pasada: mantiene la lectura principal de infidelidad sexual, conserva la tensión interpretativa en nota y ajusta únicamente la formulación al español natural.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma de proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa 'Belén de Judá' como forma clara y breve para el topónimo hebreo.
  - '''Concubina'' se conserva como término técnico consistente con la política del POB para פילגש.'
  - La nota al pie se ancla en 'infiel' para reflejar la alternativa semántica documentada en el audit trail inglés.
