translation:
  language: es
  text: Entonces terminaron los siete años de abundancia que hubo en la tierra de Egipto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתִּכְלֶינָה
  english_pob_choice: came to an end
  chosen_spanish: terminaron
  alternatives_spanish:
  - llegaron a su fin
  - acabaron
  lexicon: HALOT
  rationale: La forma verbal expresa que un período llega a su conclusión. En español, «terminaron» comunica esa culminación de manera natural y fiel, sin perder el sentido de completación del hebreo.
- source_word: שֶׁבַע
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete
  lexicon: HALOT
  rationale: Número cardinal directo; se conserva sin variación semántica.
- source_word: שְׁנֵי
  english_pob_choice: years of
  chosen_spanish: años de
  alternatives_spanish:
  - años
  lexicon: HALOT
  rationale: El constructo hebreo une «años» con el sustantivo siguiente. En español, «años de abundancia» reproduce con naturalidad esa relación posesiva/calificativa.
- source_word: הַשָּׂבָע
  english_pob_choice: abundance
  chosen_spanish: abundancia
  alternatives_spanish:
  - plenty
  - plenitud
  lexicon: HALOT
  rationale: «Abundancia» es la equivalencia más clara y digna para el período de prosperidad agrícola aludido por el contexto de José. Mantiene el valor de plenitud sin rebajar el registro.
- source_word: אֲשֶׁר הָיָה
  english_pob_choice: that had been
  chosen_spanish: que había habido
  alternatives_spanish:
  - que había existido
  - que estaba
  lexicon: HALOT
  rationale: La relativa describe un período ya pasado y ahora concluido. «Había habido» conserva el matiz de anterioridad y existencia real del período, aunque suene algo repetitivo, porque refleja bien la fuerza del hebreo.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en el país de Egipto
  lexicon: HALOT
  rationale: Se conserva explícitamente אֶרֶץ como «tierra», ya que forma parte de la formulación hebrea y aporta el matiz territorial/narrativo que el texto subraya.
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue aprobada con alta concordancia y sin cambios; la redacción española sigue de cerca la sintaxis hebrea cuando es idiomática, y usa un pretérito pluscuamperfecto para reflejar la anterioridad del período respecto a su finalización.
  spanish_consistency_notes:
  - Se mantiene «Egipto» con mayúscula como nombre propio geográfico.
  - Se conserva «tierra» para אֶרֶץ por coherencia con el énfasis narrativo del hebreo.
  - 'No se introducen glosas interpretativas: el verso solo afirma el fin de los siete años de abundancia.'
