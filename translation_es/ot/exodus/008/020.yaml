review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del hebreo: Yahvé actuó, vino el enjambre a la casa de Faraón y a las de sus siervos, y la tierra quedó arruinada por causa del enjambre. También mantiene correctamente «Yahvé» para יְהוָה y «enjambre» para עָרֹב con nota de alternativa léxica. Sin embargo, «fuerte enjambre» se aparta innecesariamente de כָּבֵד, que aquí intensifica magnitud/peso y está mejor reflejado por «gran» o una formulación equivalente más cercana a la nota inglesa.'
  spanish_quality_summary: 'El español es claro y legible, pero tiene dos detalles mejorables: «fuerte enjambre» suena menos preciso que «gran enjambre» en este contexto, y la repetición «en toda la tierra de Egipto la tierra quedó arruinada» resulta algo pesada; conviene conservar el paralelismo sin redundancia innecesaria mediante puntuación más natural. El resto del registro es digno y ampliamente comprensible.'
  glossary_alignment: 'Alineación buena en términos del proyecto: יְהוָה → «Yahvé» correcto; עָרֹב → «enjambre» correcto y prudentemente no especificado como «moscas» en el texto principal; עבדים → «siervos» aceptable en este contexto cortesano. La principal desalineación es כָּבֵד, donde el borrador usa «fuerte» en vez de una opción que preserve mejor la idea de magnitud como «gran».'
  issues:
  - severity: medium
    issue: «fuerte enjambre» para כָּבֵד
    rationale: Aunque es comprensible, «fuerte» desplaza el matiz de magnitud/masa del hebreo y de la auditoría inglesa («heavy», con alternativa «great»). En español bíblico-natural, «gran enjambre» preserva mejor la intensificación sin la rareza de «enjambre pesado».
  - severity: low
    issue: Redundancia estilística en «y en toda la tierra de Egipto la tierra quedó arruinada»
    rationale: 'La repetición refleja parcialmente el hebreo, pero en español fluye mejor con una pausa: «y, por toda la tierra de Egipto, la tierra quedó arruinada…». Así se mantiene la estructura sin sonar descuidada.'
  revised_spanish_text: Yahvé hizo así[a], y llegó un gran enjambre a la casa de Faraón y a las casas de sus siervos; y, por toda la tierra de Egipto, la tierra quedó arruinada por causa del enjambre.
  revised_footnotes:
  - marker: a
    text: O «un enjambre pesado»; el hebreo puede referirse a una masa enorme de insectos, tradicionalmente entendida como moscas.
    reason: lexical_alternative
  revision_rationale: Se ajusta «fuerte» a «gran» para reflejar con más fidelidad כָּבֵד en este contexto, manteniendo a la vez un español natural. También se mejora ligeramente la puntuación para hacer más fluida la cláusula final sin alterar la estructura ni el sentido del hebreo. La nota se adapta para preservar tanto la alternativa más literal como la explicación tradicional sobre los insectos.
