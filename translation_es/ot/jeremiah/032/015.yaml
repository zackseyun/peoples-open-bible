    text: O, “de nuevo comprarán casas, campos y viñedos en esta tierra”. El verbo hebreo está en niphal y puede entenderse menos estrictamente como medio o cuasi pasivo, pero “se comprarán” preserva mejor la forma aquí.
    reason: lexical_alternative
