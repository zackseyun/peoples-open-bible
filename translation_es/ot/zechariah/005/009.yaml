  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé/Mesías/espíritu en sentido doctrinal sensible. «Viento» para רוּחַ está bien justificado por el contexto. «Efa» respeta la continuidad léxica documentada. «Los cielos» concuerda con la preferencia por reflejar el plural hebreo cuando suena natural en español.
