translation:
  language: es
  text: Pero un hombre mata por su propia maldad[a], y cuando el espíritu ha partido, no lo hace volver, ni libera un alma que ha sido arrebatada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando el aliento ha salido, no lo hace volver, ni libera una vida que ha sido arrebatada». El griego usa πνεῦμα y ψυχή, que según el contexto pueden solaparse con «aliento/espíritu» y «vida/alma».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: LSJ
  rationale: El singular genérico se conserva con «un hombre», que en español puede funcionar de modo representativo sin volver abstracto el sujeto. Mantiene la limitación humana en contraste con la acción divina del contexto.
- source_word: ἀποκτέννει
  english_pob_choice: kills
  chosen_spanish: mata
  alternatives_spanish:
  - da muerte
  - mata de muerte
  lexicon: BDAG
  rationale: El verbo expresa acción de matar de forma directa. «Mata» es el equivalente natural y claro en español, y conserva el contraste con la imposibilidad de restaurar la vida.
- source_word: τῇ κακίᾳ αὐτοῦ
  english_pob_choice: by his own wickedness
  chosen_spanish: por su propia maldad
  alternatives_spanish:
  - por su propia malicia
  - por su maldad
  lexicon: BDAG
  rationale: κακία puede abarcar maldad, mal o malicia; aquí el campo moral general se expresa bien con «maldad». «Por su propia» refleja el valor posesivo de αὐτοῦ.
- source_word: ἐξελθὸν ... πνεῦμα
  english_pob_choice: when a spirit has gone out
  chosen_spanish: cuando un espíritu ha salido
  alternatives_spanish:
  - cuando el aliento ha salido
  - cuando el espíritu ha partido
  lexicon: BDAG
  rationale: πνεῦμα puede ser espíritu, aliento o soplo. En este contexto de muerte, «espíritu» conserva la amplitud antropológica del término griego; «ha salido» reproduce el movimiento de salida sin forzar una paráfrasis.
- source_word: οὐκ ἀναστρέφει
  english_pob_choice: he does not bring it back
  chosen_spanish: no lo trae de vuelta
  alternatives_spanish:
  - no lo devuelve
  - no lo hace volver
  lexicon: LSJ
  rationale: El sentido es el de retornar lo que se fue. «Trae de vuelta» es idiomático en español y preserva la imagen concreta de restaurar lo que salió.
- source_word: οὐδὲ ἀναλύει
  english_pob_choice: nor does he release
  chosen_spanish: ni libera
  alternatives_spanish:
  - ni lo suelta
  - ni lo deja libre
  lexicon: LSJ
  rationale: ἀναλύω aquí tiene el sentido de soltar o liberar. «Libera» comunica ese valor con naturalidad en español y mantiene la idea de sacar algo del dominio de la muerte.
- source_word: ψυχὴν παραλημφθεῖσαν
  english_pob_choice: a soul that has been taken
  chosen_spanish: un alma que ha sido tomada
  alternatives_spanish:
  - una vida que ha sido tomada
  - un alma que ha sido arrebatada
  lexicon: BDAG
  rationale: ψυχή puede significar alma o vida; παραλημφθεῖσαν indica haber sido tomada/recibida. «Alma» preserva el término antropológico visible, y «ha sido tomada» sigue de cerca el participio sin resolver de más la imagen.
theological_decisions:
- issue: Distinción entre πνεῦμα y ψυχή en un contexto de muerte
  english_pob_reading: Render πνεῦμα as 'spirit' and ψυχή as 'soul' in the main text
  chosen_spanish_reading: Traducir πνεῦμα como «espíritu» y ψυχὴν como «alma» en el texto principal
  alternative_spanish_readings:
  - Traducir πνεῦμα como «aliento» y ψυχὴν como «vida»
  rationale: El versículo contrapone la capacidad humana de matar con la incapacidad de revertir la muerte. Mantener dos términos distintos en español conserva la textura conceptual del griego y evita colapsar la tensión antropológica del pasaje.
  doctrine_reference: Preservar la tensión teológica y terminológica en vez de resolverla; consistencia de términos clave con excepciones documentadas.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el registro fuente; el pasaje presenta alta concordancia con el texto griego normalizado y la auditoría inglesa, con la única tensión relevante en πνεῦμα/ψυχή, preservada mediante nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se preserva la distinción terminológica entre «espíritu» y «alma» en el texto principal y se documenta la alternativa antropológica en nota.
  - Se evita «siervo» porque el griego no contiene δοῦλος.
  - Se usa puntuación española y un registro bíblico moderno, sin arcaísmos innecesarios.
