base_translation:
  language: en
  yaml_path: translation/ot/proverbs/019/023.yaml
  text: The fear of Yahweh leads to life[a], and whoever has it will rest satisfied[c][b]; he will not be visited by harm.
  footnotes:
  - marker: a
    text: Or 'is for life'; the Hebrew expression is very concise and may be rendered more literally.
    reason: lexical_alternative
  - marker: b
    text: Or 'will spend the night satisfied' or 'will sleep satisfied.'
    reason: lexical_alternative
  - marker: c
    text: Or 'no evil/disaster will visit him.' Here 'evil' refers to calamity or harm, not moral evil.
    reason: lexical_alternative
