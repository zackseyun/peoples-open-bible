id: 2PE.1.5
reference: 2 Peter 1:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ αὐτὸ τοῦτο δὲ σπουδὴν πᾶσαν παρεισενέγκαντες ἐπιχορηγήσατε ἐν τῇ πίστει ὑμῶν τὴν ἀρετήν, ἐν δὲ τῇ ἀρετῇ τὴν γνῶσιν,
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/005.yaml
  text: And for this very reason[a], making every effort, supply in your faith virtue, and in virtue knowledge[d][c][b],
  footnotes:
  - marker: a
    text: Or 'faithfulness' or 'trust' for 'faith' (πίστις). The main text follows the project's default rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'moral excellence' for 'virtue' (ἀρετή).
    reason: lexical_alternative
  - marker: c
    text: The verb translated 'supply' can also be rendered 'add' or 'provide,' with the sense of furnishing generously.
    reason: lexical_alternative
  - marker: d
    text: Or 'supply virtue in your faith'.
    reason: previous_rendering
translation:
  language: ko
  text: 바로 이러한 이유로 여러분도 온갖 힘을 다하여 믿음에 덕을, 덕에 지식을 더하여 공급하십시오[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἐπιχορηγέω는 「풍성하게 공급하다·아낌없이 채워주다」를 뜻한다. 1:5–7은 한 덕에 다음 덕을 잇대어 「공급」하는 사슬 구조를 이룬다.
    reason: lexical_alternative
