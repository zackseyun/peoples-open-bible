translation:
  language: es
  text: Cuando el rey preguntó a Heliodoro quién podría ser apto para ser enviado una vez más[a] a Jerusalén, dijo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «quién podría ser todavía una vez apto para ser enviado a Jerusalén». «Una vez más» expresa de modo idiomático ἔτι ἅπαξ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπερωτήσαντος
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - le preguntó
  - inquirió
  lexicon: LSJ
  rationale: El genitivo absoluto introduce la circunstancia de la acción del rey. «Preguntó» es natural en español moderno y conserva el valor de interrogar sin sonar excesivamente formal.
- source_word: ποῖός τις εἴη
  english_pob_choice: who might be
  chosen_spanish: quién podría ser
  alternatives_spanish:
  - qué clase de persona podría ser
  - quién pudiera ser
  lexicon: LSJ
  rationale: La expresión busca identificar a una persona adecuada. «Quién podría ser» conserva la fuerza de pregunta indirecta y el matiz de posibilidad de εἴη.
- source_word: ἐπιτήδειος
  english_pob_choice: fit
  chosen_spanish: apto
  alternatives_spanish:
  - adecuado
  - idóneo
  - capacitado
  lexicon: LSJ
  rationale: El adjetivo indica conveniencia o idoneidad para una tarea. «Apto» transmite bien esa cualidad en español sin sobrecargar el verso.
- source_word: ἔτι ἅπαξ
  english_pob_choice: once more
  chosen_spanish: una vez más
  alternatives_spanish:
  - de nuevo una vez
  - otra vez
  - una vez todavía
  lexicon: LSJ
  rationale: La locución expresa repetición con énfasis en una sola ocasión adicional. «Una vez más» preserva esa idea de reenvío repetido y singular.
- source_word: διαπεμφθῆναι
  english_pob_choice: to be sent
  chosen_spanish: ser enviado
  alternatives_spanish:
  - ser despachado
  - ser remitido
  - ser mandado
  lexicon: LSJ
  rationale: El infinitivo pasivo alude a enviar a alguien en comisión o misión. «Ser enviado» es claro y fiel, sin añadir matices no presentes en el griego.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - para Jerusalén
  lexicon: LSJ
  rationale: Con un verbo de envío, el español natural usa «a Jerusalén». Mantiene el valor direccional del griego.
- source_word: ἔφησεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - contestó
  lexicon: LSJ
  rationale: El verbo introduce simplemente la réplica de Heliodoro. «Dijo» es la opción menos interpretativa y la más sobria en español.
translation_notes:
  revision_awareness: Se corrigió el error anterior añadiendo el marcador [a] directamente en el texto español donde corresponde, para que la nota quede anclada y valide correctamente. No se detectan revisiones sustantivas en el audit trail más allá de esta precisión de formato.
  spanish_consistency_notes:
  - Se mantuvo «Y Jerusalén» como destino directo con preposición española natural.
  - Se evitó «señor» o fórmulas reverenciales añadidas que no están en el griego.
  - Se preservó el tono narrativo simple de la frase, sin expandir el contenido del diálogo.
