translation:
  language: es
  text: Y vi en la visión, y al ver, yo estaba en Susa la ciudadela, que está en la provincia de Elam; y vi en la visión que estaba junto al canal Ulai[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «río Ulai» o «arroyo Ulai». El término hebreo para el curso de agua puede traducirse de modo más amplio, pero «canal» encaja mejor con el probable entorno de Susa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְאֶה
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y estaba viendo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva expresa un hecho pasado; en español, «vi» comunica de manera natural la acción recurrente del versículo sin perder el valor visionario.
- source_word: בֶּחָזוֹן
  english_pob_choice: in the vision
  chosen_spanish: en la visión
  alternatives_spanish:
  - en una visión
  lexicon: HALOT
  rationale: El sustantivo definido por el contexto apunta a la experiencia revelatoria específica de Daniel; «la visión» mantiene ese valor determinado.
- source_word: וַיְהִי בִּרְאֹתִי
  english_pob_choice: and when I saw
  chosen_spanish: y al ver
  alternatives_spanish:
  - y cuando vi
  - y sucedió que al ver
  lexicon: HALOT
  rationale: La construcción temporal se vuelve más idiomática en español como «al ver», conservando el matiz de simultaneidad o inmediatez del episodio.
- source_word: בְּשׁוּשַׁן
  english_pob_choice: in Susa
  chosen_spanish: en Susa
  alternatives_spanish:
  - en Shushan
  lexicon: HALOT
  rationale: «Susa» es la forma estándar en español para el topónimo; se mantiene la transliteración habitual en lugar de una traducción explicativa.
- source_word: הַבִּירָה
  english_pob_choice: the citadel
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - la fortaleza
  - el palacio
  lexicon: HALOT
  rationale: El término designa un complejo fortificado o sede real; «ciudadela» preserva la idea de recinto fortificado sin reducirlo solo a «palacio».
- source_word: אֲשֶׁר בְּעֵילָם הַמְּדִינָה
  english_pob_choice: which is in the province of Elam
  chosen_spanish: que está en la provincia de Elam
  alternatives_spanish:
  - que está en Elam la provincia
  - que estaba en la provincia de Elam
  lexicon: HALOT
  rationale: La cláusula relativa identifica la ubicación geográfica de Susa. «Provincia de Elam» transmite bien el valor administrativo de הַמְּדִינָה en este contexto.
- source_word: וַאֲנִי הָיִיתִי
  english_pob_choice: that I was
  chosen_spanish: que estaba
  alternatives_spanish:
  - y estaba
  - mientras estaba
  lexicon: HALOT
  rationale: Después de «vi en la visión», la oración comunica el contenido de lo visto; en español conviene introducirlo con «que» para claridad sintáctica.
- source_word: עַל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  lexicon: HALOT
  rationale: Con un curso de agua, עַל puede indicar ubicación adyacente más que sobre la superficie; «junto a» expresa bien esa relación espacial.
- source_word: אוּבַל
  english_pob_choice: Canal
  chosen_spanish: canal
  alternatives_spanish:
  - arroyo
  - río
  lexicon: HALOT
  rationale: El término puede referirse a un curso de agua, y en el marco geográfico de Susa «canal» es la opción más probable y la que mejor coincide con el contexto histórico.
- source_word: אוּלָי
  english_pob_choice: Ulai
  chosen_spanish: Ulai
  lexicon: HALOT
  rationale: Se conserva el nombre propio por transliteración, sin intentar traducirlo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide con la última revisión inglesa sin cambios sustanciales. Se preservó la repetición de la experiencia visionaria y la ubicación doble de Susa/Elam, y se resolvió el curso de agua con la opción más probable según el contexto geográfico.
  spanish_consistency_notes:
  - Se mantuvo «visión» para בֶּחָזוֹן en ambas apariciones.
  - Se usó «Susa» como topónimo estándar en español.
  - «Canal» se reservó para אוּבַל por coherencia con el antecedente inglés y el contexto de la ciudad persa.
  - La puntuación reproduce la estructura coordinada del hebreo con claridad natural en español.
