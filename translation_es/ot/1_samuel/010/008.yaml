review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en la secuencia principal: bajar a Gilgal, la venida de Samuel para ofrecer sacrificios, la espera de siete días y la instrucción posterior. Sin embargo, el anclaje de la nota está mal colocado: la nota léxica sobre שְׁלָמִים debe ir en ''sacrificios de paz'', no en ''he aquí''. Además, la nota b sobre la construcción cognada no es necesaria como nota al lector y recarga el texto sin respaldo del rastro inglés.'
  spanish_quality_summary: El español es mayormente claro y digno. 'Descenderás' y 'he aquí' son aceptables en registro bíblico. 'Yo desciendo a ti' suena algo menos natural que 'yo voy a descender a ti' o 'yo desciendo hacia ti', pero sigue siendo comprensible y cercano al valor aspectual documentado. La frase final 'lo que habrás de hacer' es buena. La principal mejora requerida es la gestión de notas para legibilidad y fidelidad editorial.
  glossary_alignment: 'La terminología clave está bien alineada: ''Gilgal'', ''holocaustos'', y ''sacrificios de paz'' corresponden al rastro POB. Se preserva adecuadamente la alternativa léxica de שְׁלָמִים, pero debe quedar en una única nota ligada al término sacrificial pertinente. No hay conflictos con la glosa teológica del proyecto.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en 'he aquí' pero su contenido trata sobre 'sacrificios de paz'.
    rationale: Esto rompe la correspondencia entre marcador y explicación, y puede confundir al lector. La instrucción del proyecto exige que el marcador aparezca en la palabra o frase pertinente.
  - severity: low
    issue: La nota [b] sobre la construcción 'sacrificar sacrificios' no es necesaria en el texto final.
    rationale: El rastro inglés no preserva esa observación como nota al lector; es una justificación traductológica interna, no una ambigüedad o alternativa que deba exponerse. Además, recarga el versículo innecesariamente.
  - severity: low
    issue: '''Yo desciendo a ti'' es algo rígido en español.'
    rationale: No es un error de fidelidad, pero una formulación como 'yo descenderé a ti' o 'yo voy a descender a ti' sería más natural. Aun así, dado el alcance menor, no exige una reescritura amplia fuera del ajuste principal de notas.
  revised_spanish_text: Y descenderás delante de mí a Gilgal. Y he aquí, yo desciendo a ti para ofrecer holocaustos y sacrificar sacrificios de paz[a]. Esperarás siete días, hasta que yo venga a ti y te haga saber lo que habrás de hacer.
  revised_footnotes:
  - marker: a
    text: O 'sacrificios de comunión' u 'ofrendas de bienestar'. El término hebreo se refiere a sacrificios asociados con paz, integridad y comunión compartida.
    reason: lexical_alternative
