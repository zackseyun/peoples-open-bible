lexical_decisions:
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  lexicon: HALOT
  rationale: אֵשׁ denota fuego de manera directa. «Fuego» es el equivalente natural en una lista poética de fenómenos creados.
- source_word: וּבָרָד
  english_pob_choice: and hail
  chosen_spanish: y granizo
  alternatives_spanish:
  - y pedrisco
  lexicon: HALOT
  rationale: בָּרָד significa granizo; se conserva la conjunción y el sentido meteorológico básico.
- source_word: שֶׁלֶג
  english_pob_choice: snow
  chosen_spanish: nieve
  alternatives_spanish:
  - nieve caída
  lexicon: HALOT
  rationale: שֶׁלֶג es el término estándar para nieve.
- source_word: וְקִיטוֹר
  english_pob_choice: and vapor
  chosen_spanish: y vapor
  alternatives_spanish:
  - y humo
  - y niebla
  lexicon: HALOT
  rationale: קִיטוֹר puede abarcar vapor, humo o emanación. En esta serie atmosférica, «vapor» preserva la amplitud meteorológica sin restringir indebidamente a humo.
- source_word: רוּחַ סְעָרָה
  english_pob_choice: stormy wind
  chosen_spanish: viento tempestuoso
  alternatives_spanish:
  - viento de tempestad
  - torbellino
  lexicon: HALOT
  rationale: La construcción expresa un viento caracterizado por סערה. «Viento tempestuoso» comunica con naturalidad la fuerza del hebreo y mantiene ambos elementos semánticos.
- source_word: עֹשָׂה
  english_pob_choice: doing
  chosen_spanish: que hace
  alternatives_spanish:
  - que realiza
  - que ejecuta
  lexicon: HALOT
  rationale: El participio describe la acción continua del viento respecto de la palabra de Dios. «Hace» conserva la cercanía formal con el hebreo y suena natural en español.
- source_word: דְבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mandato
  - su orden
  lexicon: HALOT
  rationale: דָּבָר suele significar «palabra», aunque en este contexto puede implicar «mandato». El texto principal conserva «palabra»; las alternativas explicitan el matiz de obediencia implícito en la poesía.
theological_decisions:
- issue: Referencia del sufijo masculino singular en דְבָרוֹ
  english_pob_reading: his word, referring to God whose creation is being summoned to praise throughout the psalm
  chosen_spanish_reading: su palabra, referida a Dios, cuyo hablar gobierna la creación en el contexto del salmo
  alternative_spanish_readings:
  - su mandato
  - su orden
  rationale: El contexto inmediato presenta criaturas y fuerzas naturales que obedecen la palabra divina. En español, «su palabra» mantiene la literalidad del hebreo y deja abierta la implicación de mandato sin forzar una paráfrasis.
  doctrine_reference: Principios de traducción §1, §6
translation_notes:
  revision_awareness: 'El paquete inglés alterna entre una traducción más literal («doing his word») y una revisión más idiomática («fulfilling his word»). En español se eligió una formulación intermedia: «que hace su palabra», fiel al participio hebreo y suficientemente natural, mientras la nota preserva el matiz funcional de «mandato».

    '
  spanish_consistency_notes:
  - Se usa «viento tempestuoso» para reflejar רוּחַ סְעָרָה sin introducir un tecnicismo ajeno al registro poético.
  - Se conserva «su palabra» en el texto principal para no borrar la tensión entre literalidad y sentido funcional documentada en el audit trail.
  - La puntuación reproduce la cadencia enumerativa del hebreo y del inglés POB.
