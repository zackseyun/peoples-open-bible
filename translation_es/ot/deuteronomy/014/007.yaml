base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/014/007.yaml
  text: 'However[a], these you shall not eat from among those that chew the cud or from among those that have a split hoof: the camel, the hare, and the rock badger; because they chew the cud but do not split the hoof[b]. They are unclean for you.'
  footnotes:
  - marker: a
    text: Or 'rabbit.' The Hebrew animal term likely refers to a hare, though exact zoological identification is debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'hyrax.' Traditional English 'coney' is archaic.
    reason: lexical_alternative
