    issue: Nota al pie con formulación redundante e imprecisa.
    rationale: «Una confianza confiada» es redundante; «dependencia fiel» desplaza hacia faithfulness. Se corrigió a «confianza o dependencia confiada».
  revised_spanish_text: Pero que pida con fe[a], sin dudar nada, porque el que duda es semejante a una ola del mar, movida por el viento y zarandeada.
  revised_footnotes:
  - marker: a
    text: O «con confianza». La expresión griega ἐν πίστει usa πίστις, que en este contexto también puede comunicar la idea de confianza o dependencia confiada.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal. Se corrigió únicamente la nota para que exprese con claridad el matiz léxico documentado en el POB inglés, sin redundancia ni desplazamiento hacia «fidelidad».
