id: LUK.2.36
reference: Luke 2:36
source:
  edition: SBLGNT
  text: Καὶ ἦν Ἅννα προφῆτις, θυγάτηρ Φανουήλ, ἐκ φυλῆς Ἀσήρ (αὕτη προβεβηκυῖα ἐν ἡμέραις πολλαῖς, ζήσασα ⸂μετὰ ἀνδρὸς ἔτη⸃ ἑπτὰ ἀπὸ τῆς παρθενίας αὐτῆς,
translation:
  text: And there was a prophetess[a], Anna, the daughter of Phanuel, from the tribe of Asher. She was advanced in years, having lived with her husband seven years from her virginity[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'very old' or 'advanced in years.' The Greek literally says 'advanced in many days,' an idiom for old age.
    reason: lexical_alternative
  - marker: b
    text: Or, 'having lived with her husband seven years after her virginity,' that is, seven years after marriage from the time she left maidenhood.
    reason: lexical_alternative
lexical_decisions:
- source_word: προφῆτις
  chosen: prophetess
  alternatives:
  - female prophet
  - prophet
  lexicon: BDAG
  rationale: The noun is explicitly feminine singular and denotes a woman recognized as a prophet. 'Prophetess' is concise, standard, and preserves the gender marking present in Greek.
- source_word: θυγάτηρ Φανουήλ
  chosen: the daughter of Phanuel
  alternatives:
  - daughter of Phanuel
  lexicon: BDAG
  rationale: A straightforward genealogical expression. 'The daughter of Phanuel' is natural in English apposition after Anna's identification.
- source_word: ἐκ φυλῆς Ἀσήρ
  chosen: from the tribe of Asher
  alternatives:
  - of the tribe of Asher
  lexicon: BDAG
  rationale: ἐκ marks origin or belonging. 'From the tribe of Asher' is idiomatic and preserves the tribal affiliation.
- source_word: προβεβηκυῖα ἐν ἡμέραις πολλαῖς
  chosen: advanced in many days
  alternatives:
  - very old
  - advanced in years
  - well along in age
  lexicon: BDAG
  rationale: The Greek idiom is literally 'advanced in many days.' Rather than flattening it fully to 'very old,' this rendering keeps the metaphor of age while remaining understandable. 'In years' would be a common smoothing, but 'days' better reflects the source wording.
- source_word: ζήσασα μετὰ ἀνδρὸς
  chosen: having lived with a husband
  alternatives:
  - having lived with her husband
  - having lived as a wife with a husband
  lexicon: BDAG
  rationale: μετὰ ἀνδρός here refers to married life, not merely cohabitation. 'Having lived with a husband' preserves the Greek construction without over-interpreting beyond what is explicit.
- source_word: ἔτη ἑπτὰ
  chosen: seven years
  lexicon: BDAG
  rationale: Simple numerical duration.
- source_word: ἀπὸ τῆς παρθενίας αὐτῆς
  chosen: from her virginity
  alternatives:
  - after her virginity
  - from the time of her virginity
  - after she was a virgin
  lexicon: BDAG
  rationale: παρθενία denotes virginity/maidenhood. 'From her virginity' is the most direct rendering, indicating the seven-year period is reckoned from the time she left maidenhood in marriage. It preserves the source expression without importing a more specific chronological explanation into the main text.
