revisions:
- from: No tuvo descendencia ni posteridad entre su pueblo[a], y no quedó sobreviviente en los lugares donde habitó[b].
  to: No tiene descendencia ni posteridad[a] entre su pueblo, y no hay sobreviviente en los lugares donde habitó[b].
  rationale: Se corrige el tiempo verbal para reflejar mejor la negación existencial del hebreo, se mejora la naturalidad y fidelidad de la segunda cláusula con «no hay sobreviviente», y se reubica la nota [a] sobre «posteridad», que es el término que explica.
