lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: En listas genealógicas o censales, בְּנֵי introduce un grupo familiar/clánico. En español, «los hijos de» conserva la forma relacional breve y transparente, sin añadir la interpretación más explicativa de «descendientes de».
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elam
  lexicon: HALOT
  rationale: Nombre propio de grupo/familia transliterado. Se conserva sin traducción para mantener la identificación del linaje.
- source_word: אַחֵר
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - otro
  - el otro
  - un segundo
  lexicon: HALOT
  rationale: אַחֵר marca distinción respecto del Elam ya mencionado en el capítulo. «Otro» comunica bien esa relación en español y evita una sobreespecificación que no está exigida por el hebreo.
- source_word: אֶלֶף מָאתַיִם חֲמִשִּׁים וְאַרְבָּעָה
  english_pob_choice: 1,254
  chosen_spanish: '1.254'
  alternatives_spanish:
  - mil doscientos cincuenta y cuatro
  lexicon: HALOT
  rationale: Número cardinal exacto de un registro censal. En español editorial se mantiene como cifra para claridad y para reflejar el formato de lista. Se usa el separador decimal convencional hispano solo como convención tipográfica; el valor numérico sigue siendo 1,254.
theological_decisions:
- issue: Distinción entre dos entradas de Elam en la lista
  english_pob_reading: another Elam
  chosen_spanish_reading: otro Elam
  alternative_spanish_readings:
  - el otro Elam
  - un segundo Elam
  rationale: 'El hebreo אַחֵר señala diferenciación dentro del mismo listado, no una afirmación doctrinal. «Otro Elam» mantiene la tensión lexical: puede leerse como un segundo grupo distinto del anterior, sin forzar una aclaración interpretativa adicional.'
  doctrine_reference: Nehemías 7:7 y 7:34; distinción genealógica/censal dentro de la lista de repatriados.
translation_notes:
  revision_awareness: El inglés POB revisó «the other Elam» a «another Elam» para mayor naturalidad, manteniendo la función distintiva de אַחֵר. La versión española sigue esa decisión con «otro Elam», que suena natural y conserva la referencia a un grupo distinto del ya listado.
  spanish_consistency_notes:
  - Se mantiene «hijos de» en contexto genealógico/censal, coherente con el tratamiento del hebreo constructo בְּנֵי.
  - Se preserva el nombre propio «Elam» sin transliteración adaptada.
  - Se deja la cifra en formato editorial breve para listas numéricas.
  - La nota al pie se ancla en «otro» para reflejar la alternativa lexical documentada.
