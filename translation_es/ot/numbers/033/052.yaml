revisions:
- from: y expulsarán[a] a todos los habitantes de la tierra de delante de ustedes, y destruirán todos sus piedras labradas, y todos sus ídolos de metal fundido los destruirán[b], y todos sus lugares altos los demolerán.
  to: y expulsarán a todos los habitantes de la tierra de delante de ustedes, y destruirán todas sus piedras labradas[a], y todos sus ídolos de metal fundido los destruirán[b], y todos sus lugares altos los demolerán.
  rationale: 'Se corrige la concordancia gramatical (''todas sus piedras labradas'') y se ajustan las notas para reflejar con mayor fidelidad el expediente léxico del POB inglés: la incertidumbre de מַשְׂכִּיּוֹת se explica donde aparece ese término, y se conserva la alternativa para las imágenes fundidas. El resto del versículo puede mantenerse.'
