- from: 'Entonces ustedes respondieron y me dijeron: «Hemos pecado contra Yahvé. Nosotros subiremos y pelearemos, conforme a todo lo que Yahvé nuestro Dios nos mandó». Entonces cada hombre se ciñó[a] sus armas de guerra, y ustedes presumptuosamente se dispusieron a subir al monte[b].'
  to: 'Entonces ustedes respondieron y me dijeron: «Hemos pecado contra Yahvé. Nosotros subiremos y pelearemos, conforme a todo lo que Yahvé nuestro Dios nos mandó». Entonces cada hombre se ciñó sus armas de guerra, y ustedes presumptuosamente[a] se dispusieron a subir a la región montañosa[b].'
