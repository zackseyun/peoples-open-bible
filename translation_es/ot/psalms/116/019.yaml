translation:
  language: es
  text: en los atrios de la casa de Yahvé[a], en medio de ti, Jerusalén. ¡Alaben a Yah[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los patios de la casa de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Yah»; de esta forma procede la expresión «Aleluya».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחַצְרוֹת
  english_pob_choice: in the courts
  chosen_spanish: en los atrios
  alternatives_spanish:
  - en los patios
  - en los recintos
  lexicon: HALOT
  rationale: חָצֵר en plural designa espacios cerrados o patios dentro de un complejo, especialmente en contexto del templo. En español, «atrios» comunica de forma natural el espacio del templo sin perder el matiz arquitectónico; «patios» sería más cotidiano pero menos preciso en este contexto.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of the LORD
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahvé, el templo
  - el templo de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casa de YHWH». Se mantiene el sustantivo «casa» para conservar la metáfora bíblica, y se usa «Yahvé» según la convención del proyecto para el nombre divino. «Templo» explicita el referente, pero interpreta más de lo que exige el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: DOCTRINE.md Contested terms — YHWH
  rationale: El Tetragrámaton se vierte como «Yahvé» en español para preservar el nombre propio divino en vez de sustituirlo por un título. «Yahveh» es una variante ortográfica posible, pero «Yahvé» es la forma preferida del proyecto.
- source_word: בְּתוֹכֵכִי
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - dentro de ti
  - en tu interior
  - en tu seno
  lexicon: HALOT
  rationale: La forma femenina singular dirige el discurso a Jerusalén personificada. «En medio de ti» es fiel y transparente, y en español «en medio de ti» / «en tu medio» puede sonar pesado; «en medio de ti» funciona con naturalidad y preserva el valor relacional, no interiorista.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: הַלְלוּ יָהּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alaben a Yah!
  alternatives_spanish:
  - ¡Alaben a Yahvé!
  - ¡Aleluya!
  lexicon: HALOT
  rationale: El imperativo plural hebreo más la forma breve del nombre divino se refleja con «Alaben a Yah». Esto conserva la estructura del hebreo y distingue יָהּ de יְהוָה. «Aleluya» es tradicional, pero como transliteración oculta el sentido literal; «Alaben a Yahvé» confundiría la forma breve con el Tetragrámaton.
theological_decisions:
- issue: Diferencia entre יְהוָה y יָהּ en el mismo versículo
  english_pob_reading: Yahweh ... Praise Yah!
  chosen_spanish_reading: Yahvé ... ¡Alaben a Yah!
  alternative_spanish_readings:
  - Yahvé ... ¡Aleluya!
  - Yahvé ... ¡Alaben al Señor!
  rationale: 'El hebreo usa dos formas relacionadas pero distintas: el nombre pleno (יהוה) y la forma breve poética (יהּ) en la exclamación final. Mantener «Yahvé» y «Yah» evita borrar esa distinción y hace visible la fuente del término litúrgico «Aleluya».'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
- issue: Personificación de Jerusalén en segunda persona femenina singular
  english_pob_reading: in your midst, Jerusalem
  chosen_spanish_reading: en medio de ti, Jerusalén
  alternative_spanish_readings:
  - dentro de ti, Jerusalén
  - entre tus habitantes, Jerusalén
  rationale: El hebreo trata a Jerusalén como interlocutora femenina singular. «En medio de ti» conserva esa personificación sin convertirla en una localización meramente física o en una explicación interpretativa.
  doctrine_reference: HALOT; source morphology for בְּתוֹכֵכִי
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el consenso de cotejo es alto; por ello se conserva la lectura base del audit trail inglés, adaptada de forma idiomática al español y manteniendo las distinciones léxicas relevantes del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme a la terminología del proyecto, y «Yah» para la forma breve יָהּ en la aclamación final.
  - Se conserva la metáfora «casa de Yahvé» en lugar de sustituirla por «templo», porque el hebreo dice literalmente «casa».
  - «Atrios» traduce con naturalidad el plural de חֲצֵרוֹת dentro del ámbito del templo; la nota alternativa preserva la posibilidad de «patios».
  - La puntuación separa la exclamación final para reflejar el carácter litúrgico del cierre hebreo.
