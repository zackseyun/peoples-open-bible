    rationale: El English POB mantuvo «he will not come into this city» precisamente para conservar el verbo «come». En español puede lograrse con naturalidad como «no vendrá a esta ciudad», sin necesidad de cambiar a «entrará».
  revised_spanish_text: Por el camino por el que vino, por él volverá, y no vendrá a esta ciudad, declara Yahvé.
