translation:
  language: es
  text: Pon una guardia, oh Yahvé, sobre mi boca; guarda la puerta[a] de mis labios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la abertura» o «la entrada» de mis labios. La imagen hebrea es literalmente la «puerta» de los labios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיתָה
  english_pob_choice: Set
  chosen_spanish: Pon
  alternatives_spanish:
  - Establece
  - Coloca
  lexicon: HALOT
  rationale: El verbo pide que Dios disponga o ponga algo en su lugar; en español, «Pon» comunica con naturalidad la petición imperativa sin perder la idea de establecer una guardia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton; la convención del proyecto es rendirlo como «Yahvé» para preservar el nombre divino propio y no sustituirlo por un título.
- source_word: שָׁמְרָה
  english_pob_choice: a guard
  chosen_spanish: una guardia
  alternatives_spanish:
  - una guardia de protección
  - un guardia
  lexicon: HALOT
  rationale: Aquí שמר funciona como la imagen concreta de una guardia o vigilancia protectora. «Una guardia» mantiene esa metáfora mejor que una abstracción como «cuidado».
- source_word: לְפִי
  english_pob_choice: over my mouth
  chosen_spanish: sobre mi boca
  alternatives_spanish:
  - en mi boca
  - para mi boca
  lexicon: HALOT
  rationale: La relación preposicional se entiende como algo colocado encima o en resguardo de la boca; «sobre mi boca» preserva la dirección y la imagen de protección.
- source_word: נִצְּרָה
  english_pob_choice: keep watch
  chosen_spanish: guarda
  alternatives_spanish:
  - vigila
  - mantén guardia
  lexicon: HALOT
  rationale: El paralelismo pide otro imperativo de vigilancia. «Guarda» conserva la idea de custodia y funciona de forma natural junto con «una guardia».
- source_word: עַל דַּל שְׂפָתָי
  english_pob_choice: the door of my lips
  chosen_spanish: la puerta de mis labios
  alternatives_spanish:
  - la abertura de mis labios
  - el portón de mis labios
  lexicon: HALOT
  rationale: La frase hebrea es una imagen literal de «puerta» aplicada a los labios. En español, «la puerta de mis labios» preserva la metáfora sin suavizarla demasiado.
theological_decisions:
- issue: Uso del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene explícitamente el nombre del pacto. Se mantiene como «Yahvé» para reflejar la política textual del proyecto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
