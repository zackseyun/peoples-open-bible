translation:
  language: es
  text: 'Y dirás a ellos: «Así dice Yahvé de los ejércitos, Dios de Israel: He aquí, yo envío y tomaré a Nabucodonosor, rey de Babilonia, mi siervo, y pondré su trono sobre estas piedras que he escondido; y él extenderá su dosel[a] sobre ellas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su pabellón», «su tienda real» o quizá otro término para un cubrimiento extendido por un rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se conserva como transliteración en español, siguiendo la práctica POB de no sustituirlo por un título. 'Yahvé' es la forma más reconocible y reverente en español para el Tetragrama.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, 'de los ejércitos' comunica bien el título divino y evita una formulación demasiado arcaica. Mantiene el valor titular de la expresión sin perder claridad.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Se conserva la estructura nominal directa y la identificación pactual de Dios con Israel.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Mira
  lexicon: HALOT
  rationale: '''He aquí'' reproduce la fuerza deíctica y solemne del anuncio profético sin sonar excesivamente explicativo.'
- source_word: שֹׁלֵחַ
  english_pob_choice: I am sending
  chosen_spanish: yo envío
  alternatives_spanish:
  - yo estoy enviando
  - yo voy a enviar
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa inminencia o acción enfática; en español, el presente 'yo envío' transmite bien ese valor profético y evita una perífrasis demasiado larga.
- source_word: וְלָקַחְתִּי
  english_pob_choice: and will take
  chosen_spanish: tomaré
  alternatives_spanish:
  - y tomaré
  - y traeré
  lexicon: HALOT
  rationale: '''Tomaré'' preserva el verbo de origen y la acción divina de apropiación/sujeción. El contexto permite entender que Dios lo toma para su propósito.'
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadrezar
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre propio, ya establecida y plenamente inteligible.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: Se mantiene la fuerza lexical de 'slave'/'esclavo' para no suavizar la relación de dominio y uso soberano. Aunque en contexto funciona como instrumento de Dios, el término conserva esa tensión y evita domesticarlo con 'siervo'.
- source_word: כִסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - su asiento
  lexicon: HALOT
  rationale: En contexto real, 'trono' es la equivalencia natural y precisa.
- source_word: מִמַּעַל לָאֲבָנִים הָאֵלֶּה
  english_pob_choice: above these stones
  chosen_spanish: por encima de estas piedras
  alternatives_spanish:
  - sobre estas piedras
  - encima de estas piedras
  lexicon: HALOT
  rationale: '''Por encima de'' expresa bien la posición superior indicada por el hebreo y resulta claro en español. Se usa ''piedras'' para comunicar naturalmente אֲבָנִים.'
- source_word: טָמָנְתִּי
  english_pob_choice: I have hidden
  chosen_spanish: he escondido
  alternatives_spanish:
  - he ocultado
  - he enterrado
  lexicon: HALOT
  rationale: '''He escondido'' es la opción más natural en español para el acto de ocultar piedras; conserva el sentido de ''hidden'' sin introducir ''enterrado'', que sería más específico de lo que el texto garantiza.'
- source_word: שפרורו
  english_pob_choice: his canopy
  chosen_spanish: su pabellón
  alternatives_spanish:
  - su dosel
  - su tienda real
  lexicon: HALOT
  rationale: Dado el carácter raro y algo incierto del término, 'pabellón' preserva la amplitud semántica de un cubrimiento o tienda real y coincide con una de las alternativas auditadas en inglés. Es suficientemente elegante y reconocible en español bíblico.
- source_word: וְנָטָה
  english_pob_choice: and he will spread
  chosen_spanish: extenderá
  alternatives_spanish:
  - y extenderá
  - desplegará
  lexicon: HALOT
  rationale: Con un objeto de cobertura, 'extenderá' refleja bien la acción de desplegar/estirar algo sobre otro objeto en español.
theological_decisions:
- issue: Nebuchadnezzar as עַבְדִּי
  english_pob_reading: Rendered 'my servant' as an instrument used by God for judgment, without implying covenant faithfulness or moral approval.
  chosen_spanish_reading: mi esclavo
  alternative_spanish_readings:
  - mi siervo
  - mi agente
  rationale: 'La traducción conserva la tensión teológica del texto: Nabucodonosor es realmente usado por Yahvé, pero no por eso se le atribuye aprobación moral o fidelidad de pacto. ''Esclavo'' mantiene la dureza del original y la relación de subordinación absoluta.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador mantiene el acuerdo alto con el texto hebreo y con la auditoría inglesa, conservando la única ambigüedad léxica relevante en la nota de pie.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Tetragrama.
  - Se mantiene 'Dios de Israel' y 'de los ejércitos' como título divino natural en español.
  - '''Mi esclavo'' conserva la tensión lexical del hebreo y del registro POB.'
  - La nota [a] se ancla únicamente en la frase 'su pabellón', donde el término es léxicamente incierto.
