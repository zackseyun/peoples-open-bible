revisions:
- from: Y será justicia[a] para nosotros si cuidamos de hacer todo este mandamiento[b] delante de Yahvé, nuestro Dios, como él nos ha mandado.
  to: Y será rectitud[a] para nosotros si cuidamos de hacer todo este mandamiento[b] delante de Yahvé nuestro Dios, como él nos ha mandado.
  rationale: Se ajusta צְדָקָה a «rectitud» para seguir la preferencia semántica documentada por la POB en contexto pactual, dejando «justicia» como alternativa válida en nota. También se elimina la coma tras «Yahvé» para un español más natural sin afectar el sentido. El resto del versículo preserva bien la estructura y el contenido del hebreo.
