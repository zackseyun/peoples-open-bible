translation:
  language: es
  text: Y no entres en juicio con tu siervo, porque ningún viviente es justo[a] delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ningún viviente será justificado delante de ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל
  english_pob_choice: And do not
  chosen_spanish: Y no entres
  alternatives_spanish:
  - No entres
  - Pero no entres
  lexicon: HALOT
  rationale: La partícula conjuntiva con la negación continúa la súplica del versículo anterior; en español, «Y no entres» conserva el flujo discursivo sin forzar un contraste que no está explícito en el hebreo.
- source_word: תָּב֣וֹא
  english_pob_choice: enter
  chosen_spanish: entres
  alternatives_spanish:
  - entres a
  - vengas
  lexicon: HALOT
  rationale: En combinación con מִשְׁפָּט, el verbo expresa la entrada en un proceso legal. «Entres» mantiene ese valor y suena natural en una petición dirigida a Dios.
- source_word: בְ֭/מִשְׁפָּט
  english_pob_choice: into judgment
  chosen_spanish: en juicio
  alternatives_spanish:
  - en juicio legal
  - en tribunal
  - en justicia
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí apunta al acto judicial o proceso de juicio, no a «justicia» como cualidad abstracta. «En juicio» conserva el marco forense con español claro y sobrio.
- source_word: אֶת עַבְדֶּ֑/ךָ
  english_pob_choice: with your servant
  chosen_spanish: con tu siervo
  alternatives_spanish:
  - con tu esclavo
  - con tu servidor
  lexicon: HALOT
  rationale: Aunque אֶת funciona como marcador de objeto en hebreo, el sentido idiomático en español exige una preposición relacional. «Siervo» reproduce el registro de oración del Salmo; se evita «esclavo» porque aquí la relación de pacto y súplica es la dominante, conforme al criterio contextual ya documentado por la POB.
- source_word: לֹֽא יִצְדַּ֖ק
  english_pob_choice: is righteous
  chosen_spanish: será justo
  alternatives_spanish:
  - es justo
  - será justificado
  - podrá estar en lo justo
  lexicon: HALOT
  rationale: צדק en este marco judicial admite la noción forense de «ser justificado» o «estar en lo justo». Se eligió «será justo» para mantener una formulación amplia y natural en español, preservando la tensión entre rectitud moral y veredicto legal.
- source_word: לְ/פָנֶ֣י/ךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  - frente a ti
  lexicon: HALOT
  rationale: La expresión es una fórmula idiomática de evaluación divina. «Delante de ti» comunica bien la idea de estar expuesto al examen de Dios y mantiene un tono poético compacto.
- source_word: כָל חָֽי
  english_pob_choice: no living one
  chosen_spanish: ningún viviente
  alternatives_spanish:
  - nadie vivo
  - ninguna persona viva
  - ningún ser vivo
  lexicon: HALOT
  rationale: Bajo negación, el sintagma tiene fuerza universal. «Ningún viviente» conserva la concisión hebrea y evita ampliar indebidamente el referente a «seres vivos» no humanos.
theological_decisions:
- issue: Matiz forense de יִצְדַּק frente a la confesión moral universal
  english_pob_reading: Rendered as a general statement of human unrighteousness before God while retaining the judicial frame.
  chosen_spanish_reading: «Porque ningún viviente será justo delante de ti» conserva la confesión universal y el marco judicial de «no entres en juicio».
  alternative_spanish_readings:
  - porque ningún viviente será justificado delante de ti
  - porque nadie vivo podrá mantenerse en lo justo delante de ti
  rationale: El hebreo une lenguaje de tribunal con una afirmación amplia sobre la imposibilidad humana de presentarse como justo ante Dios. La versión elegida mantiene ambas dimensiones sin resolver la tensión a favor de una sola lectura doctrinal.
  doctrine_reference: Preservar la tensión teológica entre justicia/justificación sin armonizarla prematuramente.
translation_notes:
  revision_awareness: 'Concordancia alta con la auditoría inglesa: se preserva el paralelismo judicial de «entrar en juicio» y la alternativa forense de צדק mediante nota. No se introdujeron cambios textuales ni revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el tetragrama.
  - Se usa «siervo» y no «esclavo» por el registro de oración del Salmo y por coherencia con el audit trail inglés.
  - Se conserva «juicio» para מִשְׁפָּט y «justo» para צדק, dejando la alternativa forense en nota.
  - La puntuación reproduce el tono poético y devocional con una sola cláusula subordinada causal clara.
