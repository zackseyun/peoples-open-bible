  yaml_path: translation/nt/matthew/025/031.yaml
  text: But when the Son of Man comes in his glory[a], and all the angels with him, then he will sit on his glorious throne.
  footnotes:
  - marker: a
    text: Or, more literally, "the throne of his glory."
