translation:
  language: es
  text: Por el sonido de mi gemido[a], mis huesos se pegan a mi carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "A causa de mi gemido". La preposición hebrea puede expresar causa además de procedencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/קּוֹל
  english_pob_choice: From the sound of
  chosen_spanish: Desde el sonido de
  alternatives_spanish:
  - Por el sonido de
  - A causa de
  - Al sonido de
  lexicon: HALOT
  rationale: La preposición מִן con קוֹל puede expresar origen o causa. En español, "Desde el sonido de" conserva la relación de procedencia/ocurrencia auditiva sin perder la posibilidad causal que el audit trail documenta. "Desde" es natural y mantiene una imagen poética clara.
- source_word: אַנְחָתִי
  english_pob_choice: my groaning
  chosen_spanish: mi gemido
  alternatives_spanish:
  - mi gemir
  - mi lamento
  - mi suspiro
  lexicon: HALOT
  rationale: אַנְחָה denota un gemido o suspiro de aflicción. "Gemido" comunica bien la intensidad del sufrimiento y funciona con el paralelismo corporal del verso. "Mi gemir" sería más verbal, pero menos natural como sustantivo en este contexto.
- source_word: דָּבְקָה
  english_pob_choice: cling
  chosen_spanish: se pegan
  alternatives_spanish:
  - se adhieren
  - se pegan fuertemente
  - se quedan pegados
  lexicon: HALOT
  rationale: דבק expresa adherirse o pegarse firmemente. "Se pegan" reproduce la imagen física de manera idiomática en español moderno. Se evita una versión excesivamente arcaica como "se allegan" o demasiado interpretativa.
- source_word: עַצְמִי
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - mis huesos mismos
  - mi osamenta
  lexicon: HALOT
  rationale: Aunque el hebreo tiene forma singular con sufijo, el plural colectivo es el equivalente natural en español para el armazón corporal. "Huesos" conserva la imagen poética y corporal del lamento.
- source_word: לִבְשָׂרִי
  english_pob_choice: to my flesh
  chosen_spanish: a mi carne
  alternatives_spanish:
  - a mi carne/flesh
  - a mi cuerpo
  - a mi piel
  lexicon: HALOT
  rationale: 'בָּשָׂר se traduce normalmente como "carne". El hebreo mantiene una imagen concreta de emaciación: huesos que se pegan a la carne. Aunque algunas revisiones inglesas discutieron "skin", el pasaje en su forma textual y el registro más literal favorecen "carne" en español, que además evita una interpretación demasiado explicativa.'
translation_notes:
  revision_awareness: El audit trail en inglés registró una oscilación entre "flesh" y "skin" para לִבְשָׂרִי; la revisión final volvió a "flesh" por mayor fidelidad formal. En español se ha mantenido "carne" para seguir el hebreo y esa decisión final, sin importar la lectura explicativa de "piel". También se ha preservado la ambigüedad de מִן + קוֹל con una nota alternativa de causa/origen.
  spanish_consistency_notes:
  - Se usó "carne" para בשר, coherente con el registro formal del POB y con la revisión final del inglés.
  - Se evitó "piel" porque no es la lectura final adoptada en el audit trail y añade una aclaración no sostenida por la forma final del verso.
  - '"Gemido" mantiene el tono de aflicción del sustantivo hebreo sin desplazarlo a un sentido demasiado suave como "suspiro".'
  - La puntuación y la estructura buscan conservar el paralelismo poético del hebreo con claridad en español.
