    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que corresponda a ‘estatuto perpetuo’, que es la frase explicada por la nota en el expediente inglés. También se ajustó ‘para memoria’ a ‘como memorial’ por mayor naturalidad y precisión cultual en español, sin alterar el sentido fuente.
