  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ ἐπιστεῖλαι αὐτοῖς τοῦ ⸀ἀπέχεσθαι τῶν ἀλισγημάτων τῶν εἰδώλων καὶ τῆς πορνείας καὶ ⸀τοῦ πνικτοῦ καὶ τοῦ αἵματος·
base_translation:
  language: en
  yaml_path: translation/nt/acts/015/020.yaml
  text: but to write to them to abstain from the pollutions of idols[a], and from sexual immorality, and from what has been strangled[c][b], and from blood.
  footnotes:
  - marker: a
    text: Or 'defilements associated with idols'; some translations narrow this to 'food sacrificed to idols,' but the Greek here is broader.
    reason: lexical_alternative
  - marker: b
    text: Or 'fornication'; the Greek term can denote sexual immorality broadly, and some understand it here more specifically as prohibited sexual unions.
    reason: alternative_reading
  - marker: c
    text: Literally 'what is strangled,' referring to meat from an animal not properly drained of blood.
    reason: cultural_note
translation:
  language: ko
  text: 다만 그들에게 편지하여 우상에게 더럽혀진 것과 음행과 목매어 죽인 것과 피를 삼가도록 하는 것입니다.
  philosophy: optimal-equivalence
