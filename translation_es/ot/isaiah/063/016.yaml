translation:
  language: es
  text: Porque tú eres nuestro Padre[a], aunque Abraham no nos conoce e Israel no nos reconoce; tú, Yahvé, eres nuestro Padre[b]; nuestro Redentor desde antaño es tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nuestro Redentor desde la eternidad es tu nombre».'
    reason: alternative_reading
  - marker: b
    text: Aquí «Israel» probablemente se refiere a Jacob, el patriarca, en paralelo con Abraham.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o explicación de la súplica con un conector causal/explanatorio natural en español. «Porque» conserva la fuerza de explicación sin volver la frase artificial.
- source_word: אָבִינוּ
  english_pob_choice: our Father
  chosen_spanish: nuestro Padre
  alternatives_spanish:
  - nuestro antepasado
  lexicon: HALOT
  rationale: El hebreo es una dirección relacional a Dios, no una mera referencia genealógica. «Padre» mantiene el sentido teológico y afectivo del texto.
- source_word: יְדָעָנוּ
  english_pob_choice: does not know us
  chosen_spanish: no nos conoce
  alternatives_spanish:
  - no nos ha conocido
  - no sabe de nosotros
  lexicon: HALOT
  rationale: El qal de ידע expresa conocimiento relacional; en español, el presente «conoce» reproduce bien el valor poético actual en una oración dirigida a Dios.
- source_word: יַכִּירָנוּ
  english_pob_choice: does not acknowledge us
  chosen_spanish: no nos reconoce
  alternatives_spanish:
  - no nos reconoce públicamente
  - no nos admite
  lexicon: HALOT
  rationale: El hifil de נכר incluye la idea de reconocer/identificar. «Reconoce» preserva la distinción con ידע y funciona con naturalidad en español, sin cargar el verbo con una interpretación demasiado amplia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, siguiendo la convención del proyecto. «Yahvé» evita la sustitución por un título y mantiene el nombre pactual revelado a Israel.
- source_word: גֹּאֲלֵנוּ
  english_pob_choice: our Redeemer
  chosen_spanish: nuestro Redentor
  alternatives_spanish:
  - nuestro rescatador
  - nuestro pariente redentor
  lexicon: HALOT
  rationale: גאל puede incluir matiz de redención por parentesco, pero aquí el texto no obliga a explicitarlo en la línea principal. «Redentor» es la equivalencia breve y reverente más natural en español.
- source_word: מֵעוֹלָם
  english_pob_choice: from of old
  chosen_spanish: desde antaño
  alternatives_spanish:
  - desde siempre
  - desde la antigüedad
  lexicon: HALOT
  rationale: La frase puede sugerir antigüedad remota o eternidad. «Desde antaño» mantiene esa amplitud temporal sin resolverla prematuramente hacia «desde siempre»; conserva la tensión documentada en el audit trail.
- source_word: שְׁמֶךָ
  english_pob_choice: is your name
  chosen_spanish: es tu nombre
  alternatives_spanish:
  - tu nombre
  lexicon: HALOT
  rationale: 'En una cláusula nominal hebrea, el verbo copulativo suele quedar implícito; el español exige «es» para la naturalidad sintáctica. Se mantiene el énfasis predicativo: la identidad/renombre de Dios es ser Redentor desde antaño.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En coherencia con la doctrina del proyecto, se conserva el nombre divino en forma transliterada y no se lo sustituye por un título genérico.
  doctrine_reference: 'DOCTRINE.md: contested terms — יהוה/YHWH → Yahvé'
- issue: Alcance temporal de מֵעוֹלָם
  english_pob_reading: from of old
  chosen_spanish_reading: desde antaño
  alternative_spanish_readings:
  - desde siempre
  - desde la eternidad
  rationale: La expresión admite un sentido de antigua duración o de eternidad. Para no cerrar indebidamente esa tensión, el texto principal opta por una formulación temporal amplia y no explícitamente metafísica.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Identidad de ‘Israel’ en el paralelismo
  english_pob_reading: Israel here likely refers to Jacob, the patriarch, parallel to Abraham.
  chosen_spanish_reading: Israel aquí probablemente alude a Jacob, el patriarca, en paralelo con Abraham.
  alternative_spanish_readings:
  - Israel como el pueblo
  - Israel sin referencia adicional
  rationale: La nota de la edición inglesa preserva la referencia patriarcal probable. En español conviene explicitarla para evitar una lectura anacrónica de «Israel» como nación, que rompería el paralelismo con Abraham.
  doctrine_reference: Nota de cruce textual / cross-reference en el POB inglés
translation_notes:
  revision_awareness: 'Se siguió el último estado revisado del audit trail inglés: se conservó la tensión temporal de מֵעוֹלָם sin resolverla en la línea principal; en español se eligió una formulación natural («desde antaño») equivalente al valor de «from of old», dejando la alternativa más fuerte en nota. También se mantuvo la distinción entre ידע y נכר mediante «conoce» / «reconoce».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar para יהוה en todo el texto.
  - «Padre» se capitaliza cuando se dirige a Dios directamente.
  - «Redentor» se mantiene como término teológico breve y consistente; no se expande a «pariente redentor» en la línea principal.
  - La repetición de «nuestro Padre» se conserva para reflejar el paralelismo hebreo.
  - «Israel» se deja sin glosa en el texto, pero se aclara su probable referencia en nota para respetar la lectura paralela documentada.
