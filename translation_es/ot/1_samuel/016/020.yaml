translation:
  language: es
  text: Entonces Isaí tomó un asno[a], pan, un odre de vino y un cabrito, y los envió por medio de[b] David su hijo a Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «un asno, pan»; es decir, probablemente un asno que llevaba o iba cargado con pan, aunque el hebreo no lo expresa de manera explícita.
    reason: lexical_alternative
  - marker: b
    text: O «por mano de David su hijo» o «mediante David su hijo»; el hebreo «por la mano de David su hijo» es un modismo de agencia o entrega.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: So Jesse took
  chosen_spanish: Así que Isaí tomó
  alternatives_spanish:
  - Entonces Isaí tomó
  - Y Isaí tomó
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; «Así que» conserva ese flujo discursivo en español sin repetir mecánicamente «y». «Tomó» es el equivalente natural y directo de לקח.
- source_word: חֲמוֹר לֶחֶם
  english_pob_choice: a donkey, bread
  chosen_spanish: un asno, pan
  alternatives_spanish:
  - un asno cargado de pan
  - un asno con pan
  lexicon: HALOT
  rationale: El hebreo presenta «asno» y «pan» en yuxtaposición, sin expresar explícitamente la relación de carga. La revisión inglesa retiró «loaded with» por no estar explícito; por eso el español conserva la misma estructura abierta sin añadir una relación no dicha.
- source_word: וְנֹאד יַיִן
  english_pob_choice: a skin of wine
  chosen_spanish: un odre de vino
  alternatives_spanish:
  - una piel de vino
  - un recipiente de vino
  lexicon: HALOT
  rationale: נֹאד designa un recipiente de cuero, normalmente un odre. «Odre» es claro en español y conserva el valor material del contenedor mejor que «botella».
- source_word: וּגְדִי עִזִּים אֶחָד
  english_pob_choice: one young goat
  chosen_spanish: un cabrito
  alternatives_spanish:
  - un cabrito de las cabras
  - un joven cabrito
  lexicon: HALOT
  rationale: La expresión refiere a un animal joven; «cabrito» comunica bien la edad y el tipo de animal en español actual. El numeral indefinido queda incluido de manera natural en «un cabrito».
- source_word: וַיִּשְׁלַח
  english_pob_choice: and sent them
  chosen_spanish: y los envió
  alternatives_spanish:
  - y los mandó
  - y los despachó
  lexicon: HALOT
  rationale: El objeto está implícito en la lista previa de dones; en español conviene suplir «los» para cerrar la frase con claridad, como hizo la traducción inglesa.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - a través de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para agencia o entrega. «Por medio de» comunica el sentido de intermediación en un español natural; la opción literal «por la mano de» suena demasiado forzada en este contexto narrativo.
- source_word: דָּוִד בְּנוֹ
  english_pob_choice: David his son
  chosen_spanish: David su hijo
  alternatives_spanish:
  - su hijo David
  - David, su hijo
  lexicon: HALOT
  rationale: Se mantiene el orden semántico claro en español y la relación filial explícita. La traducción inglesa también conservó el orden hebreo más que el inglés idiomático, por lo que «David su hijo» sigue de cerca la fuente.
- source_word: אֶל שָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - hacia Saúl
  - para Saúl
  lexicon: HALOT
  rationale: La preposición direccional simple se traduce con «a» en español moderno y bíblico, sin añadir matices.
translation_notes:
  revision_awareness: La revisión inglesa eliminó «loaded with» porque no está explícito en el hebreo. Esta pauta se siguió en español, evitando añadir una relación de carga no dicha y conservando la yuxtaposición sobria de los dones. También se mantuvo la fórmula idiomática de intermediación, equivalente a «by the hand of», sin convertirla en una explicación interpretativa más larga.
  spanish_consistency_notes:
  - Se usa «Isaí» para el nombre propio correspondiente a Jesse.
  - Se prefiere «Yahvé» para el nombre divino cuando aparece; este versículo no lo contiene.
  - Se mantiene un español bíblico claro y sobrio, sin calcos innecesarios.
  - «Odre» se usa como término consistente para נֹאד en contextos de vino.
