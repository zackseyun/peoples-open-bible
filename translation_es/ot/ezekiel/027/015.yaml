translation:
  language: es
  text: Los hijos de Dedán[a] eran tus mercaderes. Muchas costas[b] eran el mercado de tu mano; te trajeron colmillos de marfil[c] y ébano como tu pago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Los dedanitas».
    reason: lexical_alternative
  - marker: b
    text: O «islas»; el hebreo puede abarcar regiones costeras o insulares.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «cuernos de marfil».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי דְדָן
  english_pob_choice: The sons of Dedan
  chosen_spanish: Los hijos de Dedán
  alternatives_spanish:
  - Los descendientes de Dedán
  - Los dedanitas
  lexicon: HALOT
  rationale: Mantengo la forma constructa hebrea «hijos de X» porque el POB en inglés preserva esa relación formal, y en español es natural y transparente en un contexto genealógico-étnico. «Dedan» se adapta como «Dedán» por norma gráfica española.
- source_word: רֹכְלַיִךְ
  english_pob_choice: your merchants
  chosen_spanish: tus mercaderes
  alternatives_spanish:
  - tus comerciantes
  - tus tratantes
  lexicon: HALOT
  rationale: «Mercaderes» comunica bien la actividad comercial y suena más natural y elevado que «comerciantes» en este poema-oráculo. Conserva el valor comercial del término sin suavizarlo.
- source_word: אִיִּים רַבִּים
  english_pob_choice: Many coastlands
  chosen_spanish: Muchas costas
  alternatives_spanish:
  - Muchas islas
  - Muchas tierras costeras
  lexicon: HALOT
  rationale: Sigo la decisión del POB de entender אִיִּים en sentido marítimo amplio. En español, «costas» transmite mejor ese alcance geográfico-comercial que «islas» y evita restringir demasiado el término.
- source_word: סְחֹרַת יָדֵךְ
  english_pob_choice: were the market of your hand
  chosen_spanish: eran el mercado de tu mano
  alternatives_spanish:
  - eran tu mercado
  - eran la mercancía de tu mano
  - eran tu esfera comercial
  lexicon: HALOT
  rationale: Conservo la imagen concreta «de tu mano», que el POB retuvo por su transparencia hebrea. «Mercado» expresa el sentido comercial de סְחֹרָה, y la frase completa mantiene la tensión idiomática del original sin paraphrasearla en exceso.
- source_word: קַרְנוֹת שֵׁן
  english_pob_choice: ivory tusks
  chosen_spanish: marfil
  alternatives_spanish:
  - colmillos de marfil
  - colmillos
  - tuscos de marfil
  lexicon: HALOT
  rationale: El hebreo literalmente dice «cuernos de marfil/colmillo». En español, «marfil» es la manera más natural de nombrar la mercancía; por contexto comercial, el objeto está implícitamente entendido como producto de lujo. Evito una expresión demasiado dura o extraña en la línea principal.
- source_word: וְהוֹבְנִים
  english_pob_choice: ebony
  chosen_spanish: ébano
  alternatives_spanish:
  - madera de ébano
  - ébano negro
  lexicon: HALOT
  rationale: «Ébano» reproduce el bien comercial designado por el término y coincide con la lectura tradicional del POB. No añado «madera» para no introducir una precisión no explicitada en el hebreo.
- source_word: הֵשִׁיבוּ
  english_pob_choice: they brought back
  chosen_spanish: te trajeron
  alternatives_spanish:
  - te devolvieron
  - te llevaron de vuelta
  - te aportaron
  lexicon: HALOT
  rationale: En este contexto de intercambio, «trajeron» comunica de manera natural la entrega de bienes como compensación. Es más idiomático en español que «trajeron de vuelta» y conserva la idea de aporte en relación con el comercio.
- source_word: אֶשְׁכָּרֵךְ
  english_pob_choice: your payment
  chosen_spanish: tu pago
  alternatives_spanish:
  - tu remuneración
  - tu compensación
  - tu retribución
  lexicon: HALOT
  rationale: «Pago» es la equivalencia más directa y clara en el marco mercantil del versículo. Mantiene la relación de intercambio sin cargar el término con connotaciones laborales indebidas.
translation_notes:
  revision_awareness: La versión en inglés del POB se mantuvo sin cambios en la última revisión. Esta propuesta sigue esa lectura estable, pero ajusta la sintaxis al español para que el paralelismo comercial sea natural y, al mismo tiempo, conserva las imágenes hebreas relevantes («tu mano», la mercancía de lujo y el intercambio de pago).
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene la terminología comercial con «mercaderes», «mercado» y «pago» para reflejar el registro económico del pasaje.
  - «Costas» se emplea en sentido amplio, no técnico-geográfico estricto, siguiendo el valor contextual de אִיִּים en comercio marítimo.
  - La línea principal evita alargar innecesariamente la imagen de «cuernos de marfil»; esa precisión queda documentada en nota.
  - Se conserva el orden semipoético de las cláusulas para reflejar el paralelismo del hebreo.
