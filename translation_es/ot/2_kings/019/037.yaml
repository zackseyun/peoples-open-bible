translation:
  language: es
  text: Y sucedió que[a], mientras él adoraba en la casa de Nisroc su dios, Adramélec y Sarézer lo derribaron con la espada, y ellos escaparon a la tierra de Ararat. Y Esar-hadón su hijo reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Nisrok»; tradicionalmente se vierte «Nisroch».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened that
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y ocurrió que
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el evento en secuencia; «Y sucedió que» conserva esa función discursiva en español sin volverse arcaica.
- source_word: מִשְׁתַּחֲוֶה
  english_pob_choice: was worshiping
  chosen_spanish: adoraba
  alternatives_spanish:
  - se postraba
  - estaba adorando
  lexicon: HALOT
  rationale: En contexto cultual con «su dios», el participio indica adoración y no solo inclinación física. «Adoraba» es natural y fiel; evita una perífrasis excesiva que sonaría pesada en español.
- source_word: בֵּית
  english_pob_choice: in the house of
  chosen_spanish: en la casa de
  alternatives_spanish:
  - en el templo de
  lexicon: HALOT
  rationale: «Casa de» sigue de cerca el hebreo y mantiene la referencia al santuario del dios sin imponer «templo», que sería interpretativo aunque posible.
- source_word: נִסְרֹךְ
  english_pob_choice: Nisrok
  chosen_spanish: Nisroc
  alternatives_spanish:
  - Nisroch
  lexicon: HALOT
  rationale: Se conserva una transliteración directa y legible en español. «Nisroc» refleja la vocalización hebrea del texto fuente; «Nisroch» queda como variante tradicional.
- source_word: אֱלֹהָיו
  english_pob_choice: his god
  chosen_spanish: su dios
  alternatives_spanish:
  - su deidad
  lexicon: HALOT
  rationale: El sufijo posesivo singular se vierte de manera directa. «Su dios» es claro y reproduce la relación posesiva sin elevar el registro innecesariamente.
- source_word: הִכֻּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo hirieron
  alternatives_spanish:
  - lo golpearon
  - lo mataron
  lexicon: HALOT
  rationale: נכה significa «golpear/herir»; el contexto deja claro que la herida fue mortal, pero el verbo hebreo no dice explícitamente «matar». «Lo hirieron» preserva esa tensión lexical.
- source_word: בַּחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  lexicon: HALOT
  rationale: El valor instrumental de la preposición se expresa naturalmente con «con». En español bíblico «espada» es el equivalente idiomático del singular hebreo.
- source_word: נִמְלְטוּ
  english_pob_choice: escaped
  chosen_spanish: escaparon
  alternatives_spanish:
  - huyeron
  - se libraron
  lexicon: HALOT
  rationale: El nifal de מלט denota escape exitoso; «escaparon» reproduce bien el resultado sin cargarlo con matices no requeridos por el hebreo.
- source_word: אֶרֶץ אֲרָרָט
  english_pob_choice: to the land of Ararat
  chosen_spanish: a la tierra de Ararat
  alternatives_spanish:
  - a la región de Ararat
  - a la tierra de Ararat
  lexicon: HALOT
  rationale: «Tierra» traduce de forma directa אֶרֶץ y mantiene el valor geográfico del sintagma. «Ararat» se conserva como nombre propio transliterado.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - se hizo rey
  lexicon: HALOT
  rationale: En sucesión dinástica, מלך funciona como reinar/ser rey. «Reinó» es breve, idiomático y suficiente con el complemento siguiente.
- source_word: אֵסַר חַדֹּן
  english_pob_choice: Esar-haddon
  chosen_spanish: Esar-hadón
  alternatives_spanish:
  - Esar-haddon
  lexicon: HALOT
  rationale: Se adopta una transliteración que funcione bien en español y conserve la segmentación del nombre hebreo. El acento gráfico ayuda a la pronunciación sin alterar el referente.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - en vez de él
  lexicon: HALOT
  rationale: El idiomático hebreo de sucesión dinástica se expresa con «en su lugar», que es natural en español y mantiene la relación de reemplazo.
theological_decisions:
- issue: La muerte de Senaquerib se expresa con un verbo de herida/derrota, no con el verbo explícito «matar».
  english_pob_reading: struck him down
  chosen_spanish_reading: lo hirieron
  alternative_spanish_readings:
  - lo mataron
  - lo golpearon
  rationale: El hebreo usa נכה, cuyo sentido básico es golpear/herir; el resultado narrativo implica la muerte, pero el texto no la verbaliza directamente. «Lo hirieron» preserva esa precisión y mantiene la tensión del relato.
  doctrine_reference: Fidelidad léxica al valor verbal hebreo; no añadir contenido no explicitado por el texto.
translation_notes:
  revision_awareness: El audit trail inglés mantiene alta concordancia y no registra revisiones sustantivas; se sigue esa lectura estable, con una adaptación española más natural en la primera cláusula y en los nombres propios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se prefirió «su dios» y no «su deidad» para conservar la relación posesiva simple del hebreo.
  - Se evitó «templo» para בֵּית porque el inglés POB documenta «house of» y el hebreo literal permite esa opción sin forzar la interpretación.
  - Se conservó la tensión entre «hirieron» y el resultado fatal del contexto, siguiendo el valor léxico de נכה.
