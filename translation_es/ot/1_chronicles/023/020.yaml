translation:
  language: es
  text: 'Los hijos de Uzziel: Micah[a], el primero, e Isshiah[b], el segundo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El primero» sigue el valor ordinal contextual de רֹאשׁ; también puede entenderse como «el jefe» o «la cabeza».
    reason: lexical_alternative
  - marker: b
    text: El nombre «Isshiah» se representa de varias maneras en distintas versiones, entre ellas «Jeshaiah» e «Ishshiah».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: El constructo plural de בן introduce una lista genealógica. En español, «hijos de» es la equivalencia más directa y natural en este contexto; «descendientes de» sería posible, pero añade una generalidad innecesaria para dos miembros filiales directos.
- source_word: עֻזִּיאֵל
  english_pob_choice: Uzziel
  chosen_spanish: Uzziel
  lexicon: Nombre propio
  rationale: Nombre personal; se translitera sin intentar traducirlo.
- source_word: מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Micah
  alternatives_spanish:
  - Mica
  lexicon: Nombre propio
  rationale: Se conserva la forma reconocible del nombre propio. La forma hebrea es breve, pero «Micah» sigue siendo una transliteración estándar y clara en español bíblico.
- source_word: הָרֹאשׁ
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el jefe
  - la cabeza
  lexicon: HALOT
  rationale: Aunque רֹאשׁ literalmente significa «cabeza», en listas genealógicas expresa primacía u orden. «El primero» comunica ese valor ordinal de manera más natural en español que un calco como «la cabeza» o una paráfrasis jerárquica como «el jefe».
- source_word: וְיִשִּׁיָּה
  english_pob_choice: and Isshiah
  chosen_spanish: e Isshiah
  alternatives_spanish:
  - y Jeshaiah
  - y Ishshiah
  lexicon: Nombre propio
  rationale: Se conserva una transliteración cercana al hebreo consonántico. Se usa «e» por eufonía ante vocal inicial.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  lexicon: HALOT
  rationale: Adjetivo ordinal directo y transparente; se mantiene el paralelismo con «el primero».
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y mantiene la solución auditada del inglés POB para רֹאשׁ como orden ordinal, sin borrar la tensión literal «cabeza»/«primero».
  spanish_consistency_notes:
  - Se conserva «Uzziel» e «Isshiah» como nombres propios transliterados, coherentes con el tratamiento onomástico del proyecto.
  - Se evita «SEÑOR» u այլ sustituciones teológicas porque el versículo no contiene el tetragrámaton ni un término divino que requiera decisión doctrinal.
  - La puntuación con dos puntos reproduce la estructura enumerativa del hebreo y del inglés auditado.
