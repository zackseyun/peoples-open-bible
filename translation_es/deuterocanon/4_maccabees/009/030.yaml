  yaml_path: translation/deuterocanon/4_maccabees/009/030.yaml
  text: Do you not think[a], O most savage tyrant of all, that you are now being tortured more than I am[b], seeing the proud reasoning of your tyranny being conquered by our endurance for the sake of godliness?
  footnotes:
