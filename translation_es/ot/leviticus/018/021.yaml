base_translation:
  language: en
  yaml_path: translation/ot/leviticus/018/021.yaml
  text: And you shall not give any of your offspring to pass through to Molech[a], and you shall not profane the name of your God[b]. I am Yahweh.
  footnotes:
  - marker: a
    text: Or 'any of your children.' The Hebrew literally says 'from your seed.'
    reason: lexical_alternative
  - marker: b
    text: That is, to a rite associated with Molech; many understand this as child sacrifice, often described elsewhere as making children 'pass through the fire.'
    reason: alternative_reading
