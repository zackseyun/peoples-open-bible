review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva correctamente la estructura del hebreo: fórmula idiomática de muerte + verbo explícito ''murió'' + datación regnal. Sin embargo, ''se acostó con sus padres'' no refleja bien el valor idiomático tradicional de וַיִּשְׁכַּב עִם אֲבֹתָיו en español bíblico y suena demasiado físico o equívoco.'
  spanish_quality_summary: El texto es claro, pero 'se acostó con sus padres' resulta poco natural y potencialmente chocante en español contemporáneo. 'Durmió con sus padres' preserva mejor el hebraísmo funerario y evita una lectura inapropiada. También conviene ajustar la nota para explicar 'sus antepasados', en vez de 'entre los suyos', que es menos precisa.
  glossary_alignment: No hay términos del glosario principal en disputa. La revisión propuesta sigue la decisión auditada de preservar el idiom funerario y la explicitud de 'murió'.
  issues:
  - severity: medium
    issue: '''se acostó con sus padres'' es una elección española inadecuada para el hebraísmo funerario'
    rationale: Aunque intenta conservar la literalidad, en español moderno puede sugerir una acción física impropia o ambigua. La POB inglesa preserva 'slept with his fathers'; el equivalente más fiel y legible en español bíblico es 'durmió con sus padres'.
  - severity: low
    issue: La nota al pie diluye el sentido de אֲבֹתָיו con 'entre los suyos'
    rationale: El hebreo se refiere a los antepasados/padres en fórmula dinástica de muerte y sepultura. 'Entre los suyos' es más general de lo que justifica el texto fuente.
  revised_spanish_text: Y Asa durmió con sus padres y murió en el año cuarenta y uno de su reinado[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «durmió con sus padres», una expresión habitual para la muerte y la sepultura entre los antepasados de uno.'
    reason: cultural_note
