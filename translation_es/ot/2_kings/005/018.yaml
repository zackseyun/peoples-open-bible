translation:
  language: es
  text: 'En este asunto[a], que Yahvé perdone a tu siervo: cuando mi señor entre en la casa de Rimón para postrarse allí, y él se apoye en mi mano, de modo que yo también me postre en la casa de Rimón; cuando yo me postre en la casa de Rimón[b], que Yahvé, por favor, perdone a tu siervo en este asunto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para adorar allí»; el verbo hebreo puede referirse tanto al gesto corporal de inclinarse o postrarse como al acto de adoración.
    reason: lexical_alternative
  - marker: b
    text: «La casa de Rimón» se refiere al templo o santuario del dios sirio Rimón.
    reason: cultural_note
lexical_decisions:
- source_word: יִסְלַח
  english_pob_choice: may ... pardon
  chosen_spanish: perdone
  alternatives_spanish:
  - perdone, por favor
  - perdone ahora
  lexicon: HALOT
  rationale: El hebreo expresa una petición/jusivo dirigido a Yahvé. «Perdone» mantiene el valor de ruego y suena natural en español; añadir «por favor» en la segunda mitad preserva el matiz de súplica de נא.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la transliteración estándar del proyecto. No se sustituye por un título, siguiendo la pauta terminológica dada.
- source_word: לְעַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En esta fórmula cortesana, «siervo» comunica la deferencia de la autodenominación sin forzar el matiz jurídico de esclavitud. Se evita «esclavo» porque aquí no es el rasgo saliente del contexto.
- source_word: בְּבוֹא אֲדֹנִי
  english_pob_choice: when my master goes
  chosen_spanish: cuando mi señor entre
  alternatives_spanish:
  - cuando mi amo entre
  - al entrar mi señor
  lexicon: HALOT
  rationale: El infinitivo con ב expresa circunstancia temporal. «Mi señor» refleja el referente humano inmediato y evita confusión con Yahvé; «entre» conserva el movimiento al interior de la casa/santuario.
- source_word: בֵית רִמּוֹן
  english_pob_choice: the house of Rimmon
  chosen_spanish: la casa de Rimón
  alternatives_spanish:
  - el templo de Rimón
  - el santuario de Rimón
  lexicon: HALOT
  rationale: Se mantiene la literalidad de בית como «casa», que en este contexto designa un santuario. «Rimón» conserva el nombre propio en forma española.
- source_word: לְהִשְׁתַּחֲוֺת
  english_pob_choice: to bow down
  chosen_spanish: postrarse
  alternatives_spanish:
  - inclinarse
  - adorar
  lexicon: HALOT
  rationale: El verbo puede señalar el gesto corporal de reverencia/prostración. «Postrarse» preserva la acción física sin resolver si el acto implica adoración interior, manteniendo la tensión lexical y teológica del pasaje.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: Adverbio locativo simple; «allí» es natural y claro en español.
- source_word: נִשְׁעָן עַל יָדִי
  english_pob_choice: he is leaning on my hand
  chosen_spanish: se apoye en mi mano
  alternatives_spanish:
  - se incline sobre mi mano
  - descansa en mi mano
  lexicon: HALOT
  rationale: El participio describe una circunstancia acompañante. «Se apoye» reproduce la imagen del respaldo físico; «mi mano» sigue de cerca el hebreo, aunque en español puede entenderse como el brazo o la mano de guía.
- source_word: וְהִשְׁתַּחֲוֵיתִי
  english_pob_choice: so that I also bow down
  chosen_spanish: para que yo también me postre
  alternatives_spanish:
  - y yo también me postre
  - de modo que yo también me postre
  lexicon: HALOT
  rationale: El waw coordinante en contexto resulta consecutivo/explicativo; «para que» hace explícita la consecuencia implícita. «También» corresponde al valor participativo de la acción de Naaman junto con su señor.
- source_word: בְּהִשְׁתַּחֲוָיָתִי
  english_pob_choice: when I bow down
  chosen_spanish: cuando yo me postre
  alternatives_spanish:
  - en mi postración
  - al postrarme
  lexicon: HALOT
  rationale: La construcción con ב resume y enfatiza el acto concreto. «Cuando yo me postre» es idiomático y preserva la referencia temporal/reiterativa del hebreo.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - quiera
  lexicon: HALOT
  rationale: La partícula intensifica la súplica. «Por favor» comunica bien el ruego en español moderno y mantiene el tono deferente.
theological_decisions:
- issue: 'Cómo traducir הִשְׁתַּחֲוָה en un santuario pagano: ¿«adorar» o «postrarse»?'
  english_pob_reading: bow down
  chosen_spanish_reading: postrarse
  alternative_spanish_readings:
  - adorar
  - inclinarse
  rationale: El hebreo permite tanto el gesto corporal como la idea de adoración. Aquí el contexto narra una acción externa vinculada al oficio de Naaman, no una definición explícita de su fidelidad interior. «Postrarse» preserva esa ambigüedad sin resolverla prematuramente, en línea con la decisión del POB inglés de conservar la tensión.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El borrador sigue la línea de la última revisión inglesa, que quedó sin cambios después del repaso; por eso no introduce ajustes adicionales ni variantes no respaldadas por el aparato auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «postrarse» de manera consistente para הִשְׁתַּחֲוָה, preservando el sentido físico y la ambigüedad adorativa.
  - «Siervo» traduce לְעַבְדֶּךָ en registro cortesano, sin introducir el matiz de esclavitud que no domina este contexto.
  - «Casa de Rimón» conserva la literalidad del hebreo y deja claro, por la nota, que se trata de un santuario pagano.
