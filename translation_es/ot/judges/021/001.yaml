translation:
  language: es
  text: 'Y los hombres de Israel habían jurado en Mizpa[a], diciendo: “Ningún hombre de entre nosotros dará su hija a Benjamín como esposa.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo ‘a Benjamín’ probablemente significa ‘a la tribu de Benjamín’ o ‘a un benjaminita’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ יִשְׂרָאֵל
  english_pob_choice: Now the men of Israel
  chosen_spanish: Y los hombres de Israel
  alternatives_spanish:
  - Ahora los hombres de Israel
  - Y el hombre de Israel
  lexicon: HALOT
  rationale: Aunque אִישׁ está en singular, en este contexto colectivo designa al grupo de varones israelitas; por eso el plural español expresa mejor la fuerza distributiva. Conservar ‘hombres de Israel’ mantiene la referencia colectiva sin forzar un singular artificial. Se conserva la conjunción inicial como enlace narrativo natural en español.
- source_word: נִשְׁבַּע
  english_pob_choice: had sworn
  chosen_spanish: habían jurado
  alternatives_spanish:
  - juraron
  - habían hecho un juramento
  lexicon: HALOT
  rationale: El nifal de שׁבע expresa jurar / tomar juramento. ‘Habían jurado’ refleja bien el tiempo anterior al relato siguiente y conserva el valor solemne del acto. ‘Habían hecho un juramento’ es posible, pero menos directo.
- source_word: בַּמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - en Mizpah
  - en la Mizpa
  lexicon: HALOT
  rationale: La preposición con topónimo se rinde naturalmente con ‘en’ en español. Se prefiere ‘Mizpa’ como forma castellana breve y reconocible; la nota aclara que el lugar es el mismo del juramento.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - al decir
  lexicon: HALOT
  rationale: Es la fórmula quotativa habitual. ‘Diciendo’ mantiene la relación sintáctica con la cita sin añadir interpretación.
- source_word: אִישׁ מִמֶּנּוּ
  english_pob_choice: No man among us
  chosen_spanish: Ningún hombre de entre nosotros
  alternatives_spanish:
  - No uno de nosotros
  - Nadie de entre nosotros
  lexicon: HALOT
  rationale: La expresión hebrea, literalmente ‘un hombre de entre nosotros’, tiene fuerza distributiva e incluye el matiz masculino. ‘Ningún hombre de entre nosotros’ conserva esa fuerza y el carácter de voto individualizado mejor que una simplificación genérica.
- source_word: לֹא יִתֵּן
  english_pob_choice: shall give
  chosen_spanish: dará
  alternatives_spanish:
  - no dará
  - no entregará
  lexicon: HALOT
  rationale: En lenguaje de juramento, el imperfecto con negación expresa prohibición/compromiso futuro. En español, el futuro simple comunica bien esa obligación solemne. ‘No entregará’ sería más específico, pero el hebreo dice literalmente ‘dar’.
- source_word: בִּתּוֹ
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - su propia hija
  - la hija de él
  lexicon: HALOT
  rationale: El posesivo singular es directo y no requiere expansión. ‘Su hija’ es la equivalencia más natural y fiel.
- source_word: לְבִנְיָמִן
  english_pob_choice: to Benjamin
  chosen_spanish: a Benjamin
  alternatives_spanish:
  - al tribu de Benjamín
  - a los benjaminitas
  lexicon: HALOT
  rationale: Se mantiene la forma breve del hebreo, que puede referirse al nombre tribal o al colectivo de los benjaminitas. En español, ‘a Benjamin’ deja abierta esa ambigüedad documentada, sin imponer una aclaración que el texto no explicita.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - por esposa
  - en matrimonio
  lexicon: HALOT
  rationale: La construcción indica destino matrimonial. ‘Como esposa’ comunica con claridad el resultado del acto de dar a la hija, y suena más natural en español que una calca como ‘por esposa’.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y se mantuvo la lectura del audit trail inglés sin cambios sustantivos. La única tensión léxica relevante es la referencia tribal de ‘Benjamin’, que en español se preserva abierta con nota, tal como en el POB inglés.
  spanish_consistency_notes:
  - Se usa ‘Mizpa’ como forma española del topónimo, con mayúscula propia.
  - Se mantiene ‘Benjamin’ como nombre tribal, no como ‘Benjamín’, para seguir la convención del texto base y la ambigüedad documentada.
  - Se traduce la fórmula de juramento con futuro simple (‘dará’) dentro de una perífrasis narrativa en pasado perfecto (‘habían jurado’), coherente con el contexto narrativo.
