translation:
  language: es
  text: Y Joab volvió de perseguir a Abner, y reunió a todo el pueblo. Cuando fueron contados, faltaban diecinueve hombres de los siervos de David, además de Asael[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo sugiere «diecinueve hombres, y Asael»: Asael se cuenta aparte de los diecinueve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - dio la vuelta
  lexicon: HALOT
  rationale: שׁוּב en qal expresa la idea básica de volver o regresar. En español, «volvió» es natural y fiel al movimiento narrativo sin introducir matices no presentes en el hebreo.
- source_word: מֵאַחֲרֵי אַבְנֵר
  english_pob_choice: from pursuing Abner
  chosen_spanish: de perseguir a Abner
  alternatives_spanish:
  - de ir tras Abner
  - de seguir a Abner
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente «de detrás de Abner», en este contexto militar el sentido es que Joab había cesado la persecución. «De perseguir a Abner» conserva ese valor idiomático sin perder transparencia.
- source_word: וַיִּקְבֹּץ אֶת כָּל הָעָם
  english_pob_choice: and he gathered all the people
  chosen_spanish: y reunió a todo el pueblo
  alternatives_spanish:
  - y juntó a todo el pueblo
  - y congregó a toda la gente
  lexicon: HALOT
  rationale: עָם significa literalmente «pueblo» o «gente». Dado que el inglés POB corrigió «troops» a «people» por mayor cercanía léxica, «todo el pueblo» reproduce bien el sustantivo hebreo sin forzar una especificación militar que el texto no dice explícitamente.
- source_word: וַיִּפָּקְדוּ
  english_pob_choice: When they were counted
  chosen_spanish: Cuando fueron contados
  alternatives_spanish:
  - Cuando los contaron
  - Y fueron contados
  lexicon: HALOT
  rationale: La nifal de פקד aquí indica ser contado o pasado revista. «Fueron contados» mantiene la pasividad del hebreo y el flujo narrativo del relato.
- source_word: מֵעַבְדֵי דָוִד
  english_pob_choice: of David’s servants
  chosen_spanish: de los siervos de David
  alternatives_spanish:
  - de los servidores de David
  - de los hombres de David
  lexicon: HALOT
  rationale: עֲבָדִים se traduce con mayor fuerza léxica como «siervos» o «esclavos»; aquí, por contexto regio-militar y por inteligibilidad en español, «siervos» conserva la relación de servicio sin la dureza de «esclavos». Mantiene la transparencia semántica del hebreo y evita sustituirlo por un término más interpretativo como «hombres».
- source_word: תִּשְׁעָה עָשָׂר אִישׁ
  english_pob_choice: nineteen men
  chosen_spanish: diecinueve hombres
  alternatives_spanish:
  - diecinueve personas
  lexicon: HALOT
  rationale: La combinación numérica más אִישׁ se expresa naturalmente como «hombres» en este registro militar. «Personas» sería más genérico y menos preciso para el contexto.
- source_word: וַעֲשָׂה אֵל
  english_pob_choice: besides Asahel
  chosen_spanish: además de Asael
  alternatives_spanish:
  - y Asael
  - más Asael
  lexicon: HALOT
  rationale: La secuencia consonántica y el contexto paralelo indican que Asael se suma a los diecinueve. «Además de» expresa con claridad que no está incluido en ese número, preservando la tensión textual que el inglés POB anotó.
theological_decisions:
- issue: 'Conteo de bajas: Asael como adición a los diecinueve'
  english_pob_reading: nineteen men of David’s servants were missing, besides Asahel
  chosen_spanish_reading: faltaban diecinueve hombres de los siervos de David, además de Asael
  alternative_spanish_readings:
  - faltaban diecinueve hombres de los siervos de David y Asael
  - faltaban diecinueve hombres de los siervos de David, incluyendo a Asael
  rationale: La nota del POB inglés indica que la forma hebrea presenta a Asael como un elemento adicional a los diecinueve. Mantengo esa distinción en español con «además de Asael», para no diluir el valor del testimonio numérico del verso.
  doctrine_reference: Precisión textual y lectura narrativa del recuento de bajas; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el ajuste revisado del inglés POB que prefirió «the people» sobre «the troops» por mayor precisión léxica. También conserva la nota del auditorio textual sobre Asael como añadido separado, expresándola en español con una nota anclada y una formulación explícita en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» reservado para el nombre divino; aquí no aparece.
  - «Siervos» preserva la fuerza léxica de עֲבָדִים sin desplazarla a un término militar más interpretativo.
  - Se optó por «pueblo» para reflejar עָם, en línea con la revisión inglesa que corrigió la paráfrasis militarizante.
  - La nota al pie está anclada en «de los siervos de David[a]» y corresponde exactamente al marcador usado en el texto.
