  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura comparativa hebrea y las decisiones del POB inglés: repetición de «apariencia», «caballos», «jinetes», y el verbo básico «corren». Sin embargo, la nota a [a] no preserva bien la alternativa documentada del inglés entre «their appearance» y «its appearance», porque el texto español actual no marca una diferencia real entre ambas posibilidades.'
  spanish_quality_summary: 'El español es claro y digno, pero «como la apariencia de caballos» suena algo rígido. «Como el aspecto de caballos» sería más natural, aunque no es obligatorio. El problema principal está en las notas: [a] debe explicar mejor la ambigüedad del sufijo singular y ofrecer una alternativa española real; [b] debe evitar «montados», que suena poco natural en este contexto.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Jinetes» es aceptable para פָרָשִׁים, aunque «hombres de a caballo» o «caballería» podrían figurar como alternativas. «Caballos» y «corren» están bien alineados con las decisiones léxicas auditadas.
  issues:
  - severity: medium
    issue: La nota [a] no ofrece una alternativa española distintiva para el sufijo singular colectivo.
    rationale: El POB inglés conserva la opción «its appearance» frente a «their appearance». En español, repetir «su apariencia» no comunica esa diferencia; conviene explicarla en la nota sin fingir un contraste inexistente en la forma española.
  - severity: low
    issue: La alternativa «montados» en la nota [b] suena poco idiomática.
    rationale: Aunque intenta reflejar «mounted riders», en español bíblico natural «jinetes», «hombres de a caballo» o «caballería» funcionan mejor.
  revised_spanish_text: Su apariencia es como la apariencia de caballos[a], y como jinetes[b], así corren.
  revised_footnotes:
  - marker: a
    text: 'El hebreo dice literalmente «su apariencia» con un sufijo singular, aunque el referente es colectivo; por eso también puede entenderse: «la apariencia de ellos es como la apariencia de caballos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como caballería» o «como hombres de a caballo». «Jinetes» conserva mejor el paralelismo con «caballos».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y legible en español. Se corrigen las notas para reflejar con mayor precisión la ambigüedad del sufijo singular colectivo y para usar alternativas más naturales en español para פָרָשִׁים.
