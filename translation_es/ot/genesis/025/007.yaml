translation:
  language: es
  text: 'Estos son los días de los años de la vida de Abraham[a], que vivió: ciento setenta y cinco años.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «los días de los años de la vida de Abraham».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Y estos son
  - Ahora bien, estos son
  lexicon: HALOT
  rationale: La frase introduce un resumen genealógico/narrativo. En español, «Estos son» comunica de manera natural la apertura descriptiva sin forzar un «Y» inicial que suena menos idiomático.
- source_word: יְמֵי
  english_pob_choice: the days
  chosen_spanish: los días
  alternatives_spanish:
  - los años
  lexicon: HALOT
  rationale: Se conserva el valor literal de «días» en la expresión hebrea «días de los años», que el audit trail inglés decidió reflejar en la revisión. Aunque el sentido total apunta a duración de vida, aquí se mantiene la forma del hebreo por fidelidad auditable.
- source_word: שְׁנֵי חַיֵּי
  english_pob_choice: of ... life
  chosen_spanish: de los años de la vida
  alternatives_spanish:
  - de la vida
  - de la duración de la vida
  lexicon: HALOT
  rationale: La cadena constructa se vierte de modo transparente como «de los años de la vida», preservando la acumulación semítica que el inglés POB también quiso hacer visible con «days of the years of Abraham’s life».
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: standard proper name
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: אֲשֶׁר חָי
  english_pob_choice: that he lived
  chosen_spanish: que vivió
  alternatives_spanish:
  - que había vivido
  - el cual vivió
  lexicon: HALOT
  rationale: El relativo reafirma la duración de la vida. «Que vivió» conserva la simpleza y el énfasis del hebreo sin añadir matices temporales no exigidos.
- source_word: מְאַת שָׁנָה וְשִׁבְעִים שָׁנָה וְחָמֵשׁ שָׁנִים
  english_pob_choice: one hundred and seventy-five years
  chosen_spanish: ciento setenta y cinco años
  alternatives_spanish:
  - cien setenta y cinco años
  - ciento setenta y cinco
  lexicon: HALOT
  rationale: El hebreo expresa la edad por suma aditiva; en español, la forma natural y exacta es «ciento setenta y cinco años». Se mantiene el número completo sin descomposición artificial.
translation_notes:
  revision_awareness: La revisión inglesa priorizó hacer visible la expresión hebrea completa («the days of the years») en lugar de suavizarla a solo «years». El español sigue esa misma decisión, conservando el giro literal y la edad total en forma natural.
  spanish_consistency_notes:
  - Se usa «Abraham» de manera consistente para el nombre propio.
  - Se mantiene el orden hebreo visible en la primera parte de la frase, sin sustituirlo por una paráfrasis de sentido.
  - La nota al pie marca la alternativa literal completa, paralela al pie inglés.
  - No se introduce «SEÑOR», «Cristo» ni otras sustituciones terminológicas no presentes en el versículo.
