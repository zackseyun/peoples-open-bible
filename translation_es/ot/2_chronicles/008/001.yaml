translation:
  language: es
  text: Y aconteció al cabo de veinte años[a], durante los cuales Salomón había edificado la casa de Yahvé y su propia casa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su palacio». El hebreo dice literalmente «su casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce un nuevo desarrollo; «aconteció» conserva ese giro narrativo con un registro digno y natural en español bíblico contemporáneo.
- source_word: מִקֵּץ
  english_pob_choice: at the end of
  chosen_spanish: al cabo de
  alternatives_spanish:
  - al final de
  - después de
  lexicon: HALOT
  rationale: «Al cabo de» expresa con naturalidad el punto temporal alcanzado tras un lapso, sin perder la idea de culminación temporal de מִקֵּץ.
- source_word: עֶשְׂרִים שָׁנָה
  english_pob_choice: twenty years
  chosen_spanish: veinte años
  alternatives_spanish:
  - un período de veinte años
  lexicon: HALOT
  rationale: La expresión temporal es directa y no requiere expansión; «veinte años» mantiene fidelidad y fluidez.
- source_word: אֲשֶׁר
  english_pob_choice: during which
  chosen_spanish: durante los cuales
  alternatives_spanish:
  - mientras
  - en los que
  lexicon: HALOT
  rationale: La relativa temporal queda mejor explicitada en español con «durante los cuales», preservando la relación de simultaneidad retrospectiva que el inglés auditado también señala.
- source_word: בָּנָה
  english_pob_choice: had built
  chosen_spanish: había edificado
  alternatives_spanish:
  - había construido
  - construyó
  lexicon: HALOT
  rationale: El pluscuamperfecto refleja que la obra estaba completada al término del período referido. «Edificado» mantiene el registro bíblico y se ajusta bien al contexto de construcción sagrada y real.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva «casa» para reflejar literalmente בַּיִת y la terminología POB para el nombre divino, evitando sustituirla por «templo» sin necesidad textual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el equivalente español normativo del nombre divino en este proyecto, manteniendo la forma personal del Tetragrámaton en vez de una sustitución funcional.
- source_word: בֵּיתוֹ
  english_pob_choice: his own house
  chosen_spanish: su propia casa
  alternatives_spanish:
  - su casa
  - su palacio
  lexicon: HALOT
  rationale: «Su propia casa» mantiene el contraste con la casa de Yahvé y refleja el posesivo enfático del hebreo. «Palacio» queda como posibilidad contextual, pero no como traducción principal del sustantivo.
theological_decisions:
- issue: Nombre divino יְהוָה en paralelo con la casa de Salomón
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente; el proyecto pide conservar el nombre divino en español como «Yahvé». No se usa una máscara litúrgica como «SEÑOR», porque borraría una decisión teológica y lexical documentada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de בֵּיתוֹ al contrastar con בֵּית יְהוָה
  english_pob_reading: his own house
  chosen_spanish_reading: su propia casa
  alternative_spanish_readings:
  - su casa
  - su palacio
  rationale: En el contexto inmediato, la mención de la casa de Yahvé y luego la casa de Salomón establece un contraste deliberado entre el santuario y la residencia real. «Su propia casa» preserva ese contraste sin imponer «palacio» como sustitución interpretativa obligatoria.
  doctrine_reference: 'POB lexical principle: preserve literal form unless context requires a well-attested contextual equivalent'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «And it came about» a «And it happened» por preferencia estilística, sin afectar el contenido. La redacción española adopta un equivalente narrativo natural («Y aconteció») y mantiene la estructura temporal y aspectual del hebreo con el pluscuamperfecto «había edificado».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «casa» en ambos miembros para reflejar el paralelismo lexical del hebreo.
  - 'El orden temporal sigue el hebreo: marcador narrativo + período de veinte años + relativa temporal + acción completada.'
