base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/032/036.yaml
  text: For Yahweh will vindicate his people and will have compassion on his servants[a], when he sees that their strength is gone, and there is none left[d][c][b], bond or free.
  footnotes:
  - marker: a
    text: Or 'will judge his people.' Here 'vindicate' is chosen because the context points to the LORD acting on behalf of his people.
    reason: lexical_alternative
  - marker: b
    text: Or 'will relent concerning his servants.' The Hebrew verb can express relenting or being moved to compassion.
    reason: lexical_alternative
  - marker: c
    text: Literally 'hand has gone'; an idiom meaning strength or power has failed.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'confined and abandoned,' likely an idiom meaning 'slave or free' or simply 'none at all left.'
    reason: alternative_reading
