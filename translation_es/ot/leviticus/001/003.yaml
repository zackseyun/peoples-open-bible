review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido principal del hebreo: condición inicial, identificación de la עֹלָה, procedencia bovina, requisito de macho sin defecto, presentación en la entrada de la tienda de reunión y finalidad de aceptación delante de Yahvé. También preserva correctamente la ambigüedad documentada de לִרְצֹנוֹ mediante nota. Sin embargo, la nota [a] añade una glosa explicativa no respaldada por el rastro inglés, mientras que la nota alternativa realmente documentada corresponde a מִן הַבָּקָר (''del ganado vacuno'' / ''del rebaño'' / ''del hato'') y conviene alinearla mejor con el audit trail.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. ''Holocausto'', ''macho sin defecto'', ''a la entrada de la tienda de reunión'' y ''delante de Yahvé'' funcionan bien. El único ajuste necesario es de aparato de notas: quitar la nota léxica innecesaria en ''holocausto'' y mantener solo la nota que preserva la alternativa interpretativa de לִרְצֹנוֹ. Esto mejora la fidelidad editorial y evita sobrecargar el texto con una explicación no exigida por la evidencia auditada.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé''; עֹלָה → ''holocausto'' como término cultual establecido; קָרְבָּנוֹ → ''su ofrenda''; תָּמִים → ''sin defecto''; לִפְנֵי יְהוָה → ''delante de Yahvé''. La principal desalineación está en el uso de una nota léxica para עֹלָה que no refleja una alternativa preservada por el POB inglés en este versículo.'
  issues:
  - severity: medium
    issue: La nota [a] sobre 'holocausto' introduce una alternativa no preservada en el audit trail inglés.
    rationale: El POB inglés no incluyó nota para עֹלָה en este versículo; sí documentó alternativas léxicas internamente, pero no las llevó al texto publicado. La nota española añade explicación editorial extra ('ofrenda que sube por completo') que va más allá de lo requerido.
  - severity: low
    issue: Se pierde la posible alternativa publicada para מִן הַבָּקָר ('del rebaño' / 'del ganado') al usar una nota en otra palabra.
    rationale: No es un error de traducción, porque 'del ganado vacuno' es fiel y claro; pero el aparato de notas quedaría mejor alineado si solo se conserva la nota necesaria sobre לִרְצֹנוֹ.
  revised_spanish_text: Si su ofrenda es un holocausto del ganado vacuno, ofrecerá un macho sin defecto. Lo ofrecerá a la entrada de la tienda de reunión, para que sea aceptado[a] delante de Yahvé.
  revised_footnotes:
