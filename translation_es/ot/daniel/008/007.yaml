translation:
  language: es
  text: Y lo vi acercarse al carnero[a], y se enfureció contra él[b], y golpeó al carnero y le quebró los dos cuernos. Y no había fuerza en el carnero para mantenerse en pie delante de él[c]; lo arrojó a tierra y lo pisoteó, y no había quien rescatara al carnero de su mano[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegar hasta el carnero». El hebreo puede expresar tanto acercarse como alcanzar o llegar a.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se amargó contra él». La expresión hebrea puede transmitir amargura intensa o hostilidad violenta.'
    reason: lexical_alternative
  - marker: c
    text: «Mantenerse en pie delante de él» también puede entenderse como «resistirle» en este contexto de combate.
    reason: lexical_alternative
  - marker: d
    text: «De su mano» es un modismo hebreo para estar bajo el poder o el control de alguien.
    reason: cultural_note
lexical_decisions:
- source_word: וּרְאִיתִיו
  english_pob_choice: And I saw him
  chosen_spanish: Y lo vi
  alternatives_spanish:
  - Y lo observé
  - Y vi a ese animal
  lexicon: HALOT
  rationale: El verbo en primera persona con sufijo de tercera masculina singular pide una referencia directa al macho cabrío del contexto. «Lo vi» conserva la sencillez y la referencia visionaria sin añadir matices ajenos.
- source_word: מַגִּיעַ אֵצֶל
  english_pob_choice: come up to
  chosen_spanish: acercarse
  alternatives_spanish:
  - llegar hasta
  - venir hasta
  lexicon: HALOT
  rationale: La construcción expresa movimiento de aproximación o alcance. «Acercarse» comunica bien el avance del animal y evita una expresión demasiado rígida en español.
- source_word: הָאַיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho ovino
  - el carnero
  lexicon: HALOT
  rationale: En español bíblico moderno, «carnero» es natural y claro para este animal simbólico. Mantiene la imagen concreta del texto hebreo.
- source_word: וַיִּתְמַרְמַר אֵלָיו
  english_pob_choice: he was enraged against him
  chosen_spanish: se enfureció contra él
  alternatives_spanish:
  - se amargó contra él
  - se irritó profundamente contra él
  lexicon: HALOT
  rationale: El hitpael de מרר puede sugerir amargura intensa u hostilidad violenta. En este contexto de combate, «se enfureció contra él» transmite bien la hostilidad sin borrar la tensión semántica.
- source_word: וַיַּךְ
  english_pob_choice: he struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - atacó
  lexicon: HALOT
  rationale: נכה admite «golpear» o «herir». «Golpeó» es directo y suficientemente fuerte, y deja que las acciones siguientes expliciten la violencia.
- source_word: וַיְשַׁבֵּר אֶת שְׁתֵּי קְרָנָיו
  english_pob_choice: and broke its two horns
  chosen_spanish: y le quebró sus dos cuernos
  alternatives_spanish:
  - y rompió sus dos cuernos
  - y destrozó sus dos cuernos
  lexicon: HALOT
  rationale: שבר es «romper/quebrar». «Quebró» conserva la idea de fractura con tono algo más vigoroso, y el sufijo se expresa de modo natural con «le».
- source_word: וְלֹא הָיָה כֹחַ בָּאַיִל
  english_pob_choice: And there was no strength in the ram
  chosen_spanish: Y no había fuerza en el carnero
  alternatives_spanish:
  - Y el carnero no tenía fuerza
  - Y no había poder en el carnero
  lexicon: HALOT
  rationale: כֹחַ puede ser «fuerza» o «poder». Aquí «fuerza» encaja con la escena de combate y evita una abstracción innecesaria.
- source_word: לַעֲמֹד לְפָנָיו
  english_pob_choice: to stand before him
  chosen_spanish: para mantenerse en pie delante de él
  alternatives_spanish:
  - para resistirle
  - para sostenerse ante él
  lexicon: HALOT
  rationale: La expresión literal «estar de pie delante de» en este contexto implica no poder resistir. «Mantenerse en pie delante de él» conserva la imagen hebrea y comunica la imposibilidad de oponerse.
- source_word: וַיַּשְׁלִיכֵהוּ אַרְצָה
  english_pob_choice: he threw him to the ground
  chosen_spanish: lo arrojó a tierra
  alternatives_spanish:
  - lo echó al suelo
  - lo lanzó al suelo
  lexicon: HALOT
  rationale: השליך indica arrojar/castar; אַרְצָה es hacia la tierra o el suelo. «Lo arrojó a tierra» sigue de cerca la imagen original.
- source_word: וַיִּרְמְסֵהוּ
  english_pob_choice: and trampled him
  chosen_spanish: y lo pisoteó
  alternatives_spanish:
  - y lo aplastó bajo sus pies
  - y lo atropelló
  lexicon: HALOT
  rationale: רמס es «pisotear/trampear». «Pisoteó» es la correspondencia más directa en español y mantiene la violencia de la escena.
- source_word: וְלֹא הָיָה מַצִּיל לָאַיִל מִיָּדוֹ
  english_pob_choice: and there was no one to rescue the ram from his hand
  chosen_spanish: y no había quien rescatara al carnero de su mano[d]
  alternatives_spanish:
  - y no había quien lo librara de su mano
  - y no había libertador para el carnero de su mano
  lexicon: HALOT
  rationale: מַצִּיל es un participio activo de rescate/liberación. «Quien rescatara» conserva el carácter de agente. «De su mano» se mantiene como modismo de poder o control.
translation_notes:
  revision_awareness: Se mantuvo la lectura del texto hebreo masorético sin cambios de base. La revisión inglesa reciente no introdujo alteraciones sustanciales; se conservaron las equivalencias ya auditadas, ajustando al español la progresión verbal y la imagen idiomática de «mano» como poder.
  spanish_consistency_notes:
  - Se usó «carnero» de forma consistente para הָאַיִל en este contexto visionario.
  - Se preservó la secuencia narrativa de acciones violentas con verbos breves y directos.
  - Se mantuvo «de su mano» como idiomático de control/poder, con nota explicativa.
  - La puntuación sigue el ritmo del hebreo y del texto inglés auditado, con segmentos coordinados por «y».
