    rationale: Aunque intenta seguir de cerca el hebreo, en español la expresión idiomática es «hacer la paz»; sin el artículo suena forzada y reduce la legibilidad.
  - severity: medium
    issue: La nota [b] está anclada en «heveos» en vez de la cláusula «los tomaron... en batalla»
    rationale: La nota explica una alternativa para לָקְחוּ בַמִּלְחָמָה, no para הַחִוִּי. Debe moverse al segmento correspondiente.
  - severity: low
    issue: Orden algo tosco en «a todos los tomaron en batalla»
    rationale: «Los tomaron a todos en batalla» fluye mejor en español y mantiene el mismo sentido totalizante de אֶת הַכֹּל.
