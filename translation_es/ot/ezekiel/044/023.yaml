translation:
  language: es
  text: Ellos enseñarán a mi pueblo a distinguir entre lo santo y lo común[a], y les harán saber[b] la diferencia entre lo impuro y lo limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo profano»; también puede entenderse como «lo santo y lo ordinario».
    reason: lexical_alternative
  - marker: b
    text: O «los harán discernir entre lo impuro y lo limpio».
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹרוּ
  english_pob_choice: shall teach
  chosen_spanish: enseñarán
  alternatives_spanish:
  - instruirán
  - darán instrucción
  lexicon: HALOT
  rationale: El hifil de ירה expresa aquí instrucción/enseñanza en un contexto sacerdotal. «Enseñarán» es natural en español y conserva la función didáctica del sujeto.
- source_word: בֵּין קֹדֶשׁ לְחֹל
  english_pob_choice: the difference between the holy and the common
  chosen_spanish: distinguir entre lo santo y lo común
  alternatives_spanish:
  - distinguir entre lo santo y lo profano
  - distinguir entre lo sagrado y lo ordinario
  lexicon: HALOT
  rationale: בֵּין ... לְ marca una distinción; en español queda bien con «distinguir entre». «Santo» traduce קֹדֶשׁ de forma estándar. Para חֹל, «común» conserva el contraste técnico con lo santo sin cargar el término con una connotación moral más fuerte como «profano».
- source_word: טָמֵא
  english_pob_choice: unclean
  chosen_spanish: impuro
  alternatives_spanish:
  - inmundo
  - ritualmente impuro
  lexicon: HALOT
  rationale: En contextos sacerdotales y de pureza ritual, טָמֵא puede expresarse como «impuro». En español moderno, «impuro» comunica mejor la categoría ritual; se evita «inmundo» por sonar más arcaico o peyorativo.
- source_word: טָהוֹר
  english_pob_choice: clean
  chosen_spanish: lo limpio
  alternatives_spanish:
  - lo puro
  - lo limpio ritualmente
  lexicon: HALOT
  rationale: En pareja con טָמֵא, «lo limpio» es una opción clara y natural en español para la distinción ritual, manteniendo el paralelismo con «lo impuro».
- source_word: יוֹדִעֻם
  english_pob_choice: make them know
  chosen_spanish: les harán saber
  alternatives_spanish:
  - les darán a conocer
  - los harán discernir
  lexicon: HALOT
  rationale: 'El hifil de ידע es causativo: «hacer saber». «Les harán saber» preserva esa fuerza causal y resulta idiomático en español. El objeto retoma a «mi pueblo».'
- source_word: וְאֶת עַמִּי
  english_pob_choice: my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - mi pueblo
  - y a mi pueblo
  lexicon: HALOT
  rationale: 'El marcador de objeto directo con prefijo conjuntivo introduce el objeto del primer verbo. En español, el artículo y la preposición se ajustan al régimen verbal: «a mi pueblo».'
theological_decisions:
- issue: Contraste cultual de קֹדֶשׁ / חֹל
  english_pob_reading: holy / common
  chosen_spanish_reading: lo santo / lo común
  alternative_spanish_readings:
  - lo santo / lo profano
  - lo sagrado / lo ordinario
  rationale: La contraposición es de estado cultual, no principalmente moral. «Lo común» mantiene el valor técnico de חֹל como lo no santo, evitando que «profano» sugiera una culpa o irreverencia más fuerte de la que exige el hebreo.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Distinción ritual entre טָמֵא / טָהוֹר
  english_pob_reading: unclean / clean
  chosen_spanish_reading: impuro / limpio
  alternative_spanish_readings:
  - inmundo / puro
  - ritualmente impuro / ritualmente limpio
  rationale: En el marco levítico-ezequielino, el par comunica pureza ritual. «Impuro» y «limpio» preservan la oposición tradicional y son comprensibles para lectores de español contemporáneo; se evita moralizar el contraste.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail en inglés, manteniendo la estructura de dos pares contrastivos y la fuerza causativa de los verbos. Se optó por un español natural («enseñarán», «les harán saber») sin perder el registro cultual técnico. No se detectaron revisiones aplicadas en el contexto inglés más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Santo» se usa para קֹדֶשׁ y «común» para חֹל conforme al contraste cultual documentado.
  - «Impuro»/«limpio» reflejan el par ritual טָמֵא/טָהוֹר sin introducir vocabulario moral ajeno al pasaje.
  - Los marcadores de nota [a][b] se incluyen en el segmento «lo santo y lo común» para preservar la alternativa léxica documentada.
