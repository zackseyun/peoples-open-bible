translation:
  language: es
  text: Ahora, he aquí[a] los hechos de Asa, los primeros y los últimos; he aquí, están escritos en el Libro de los Reyes de Judá e Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «los asuntos/palabras de Asa, los primeros y los últimos». Aquí «hechos» refleja el sentido historiográfico de la fórmula hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: Now behold
  chosen_spanish: Ahora, he aquí
  alternatives_spanish:
  - He aquí
  - Ahora
  - Mira
  lexicon: HALOT
  rationale: Conserva tanto la partícula conjuntiva como el valor deíctico/interjectivo. 'Ahora, he aquí' reproduce el matiz introductorio y de atención del hebreo sin perder naturalidad en español.
- source_word: דִּבְרֵי
  english_pob_choice: the acts of
  chosen_spanish: los hechos de
  alternatives_spanish:
  - las palabras de
  - los asuntos de
  - las obras de
  lexicon: HALOT
  rationale: En fórmulas historiográficas, דִּבְרֵי puede abarcar la historia, los hechos o los asuntos de una persona. 'Hechos' comunica bien ese campo semántico en español y evita restringirlo a 'palabras'.
- source_word: הָרִאשׁוֹנִים וְהָאַחֲרוֹנִים
  english_pob_choice: the first and the last
  chosen_spanish: los primeros y los últimos
  alternatives_spanish:
  - desde el primero hasta el último
  - los de antes y los de después
  - los primeros y los postreros
  lexicon: HALOT
  rationale: La pareja hebrea expresa la totalidad del período abarcado. 'Los primeros y los últimos' es una correspondencia directa y comprensible en español, manteniendo la estructura paralela.
- source_word: הִנָּם כְּתוּבִים
  english_pob_choice: are written
  chosen_spanish: están escritos
  alternatives_spanish:
  - están registrados
  - se hallan escritos
  - están anotados
  lexicon: HALOT
  rationale: La forma pasiva estatativa en hebreo comunica que esos datos ya figuran en una fuente escrita. 'Están escritos' conserva la imagen y el valor de registro documental.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el libro
  - sobre el libro
  - en el rollo
  lexicon: HALOT
  rationale: Aunque עַל es literalmente 'sobre', el castellano natural en esta fórmula historiográfica es 'en el Libro'. 'Libro' mantiene el carácter archivístico sin introducir una expansión interpretativa.
- source_word: הַמְּלָכִים
  english_pob_choice: the Kings
  chosen_spanish: de los Reyes
  alternatives_spanish:
  - de los reyes
  - de las crónicas de los reyes
  - de los monarcas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'los reyes'. En español, 'Libro de los Reyes' conserva la formulación sobria y transparente del título del registro, sin añadir 'anales' u otra glosa no explícita.
- source_word: לִיהוּדָה וְיִשְׂרָאֵל
  english_pob_choice: of Judah and Israel
  chosen_spanish: de Judá e Israel
  alternatives_spanish:
  - para Judá e Israel
  - concerniente a Judá e Israel
  - de Judá y de Israel
  lexicon: HALOT
  rationale: El prefijo ל indica pertenencia o relación respecto del registro. 'De Judá e Israel' es la solución más natural y fiel en este contexto; se usa 'e' por eufonía delante de 'Israel'.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del contexto inglés, que restablece ambos 'behold' y conserva una formulación más literal de 'the first and the last'. En español se reflejó esa duplicación con 'he aquí' al inicio y nuevamente antes de 'están escritos', manteniendo el registro formal y el carácter de fórmula documental.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no hay tetragrámaton ni sustitución divina en este versículo.
  - Se mantuvo 'Libro' con mayúscula para reflejar el título de la fuente citada, en paralelo con el inglés POB.
  - '''Hechos'' se usó en sentido historiográfico, no moralizante; no se tradujo como ''obras'' para no desplazar el matiz documental del hebreo.'
