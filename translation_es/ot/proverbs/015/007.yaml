base_translation:
  language: en
  yaml_path: translation/ot/proverbs/015/007.yaml
  text: The lips of the wise spread knowledge[b][a], but the heart of fools is not so.
  footnotes:
  - marker: a
    text: Or 'scatter knowledge.' The Hebrew verb carries the image of scattering or dispersing; 'spread' is used here for natural English.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew is elliptical: literally, ''but the heart of fools, not so.'' The sense is that fools do not distribute knowledge in the same way.'
    reason: lexical_alternative
