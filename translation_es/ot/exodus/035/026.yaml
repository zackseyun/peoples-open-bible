  rationale: Se ajusta el modismo hebreo a un español más natural ('cuyos corazones las impulsaron'), se traduce בְּחָכְמָה según su sentido artesanal contextual ('con habilidad'), y se mejora la idiomaticidad de la materia textil con 'pelo de cabra', manteniendo la nota sobre la elipsis literal.
