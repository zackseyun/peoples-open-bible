lexical_decisions:
- source_word: ἐν ἴσῳ
  english_pob_choice: equally
  chosen_spanish: igualmente
  alternatives_spanish:
  - por igual
  - del mismo modo
  lexicon: LSJ
  rationale: La expresión griega idiomática pide una equivalencia de grado; «igualmente» conserva esa fuerza de manera natural en español.
- source_word: μισητά
  english_pob_choice: hateful
  chosen_spanish: detestables
  alternatives_spanish:
  - aborrecibles
  - odiosos
  lexicon: LSJ
  rationale: En español, «detestables» comunica bien el valor predicativo de algo que resulta objeto de aversión. Evita el giro pasivo «odiados», que en español suena menos directamente adjetival en este contexto.
- source_word: θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - ante Dios
  - a Dios
  lexicon: LSJ
  rationale: 'La idea es relacional y valorativa: aquello es detestable con respecto a Dios. «Para Dios» mantiene esa relación de destinatario/valoración sin sonar forzado en español.'
- source_word: ὁ ἀσεβῶν
  english_pob_choice: the ungodly man
  chosen_spanish: el hombre impío
  alternatives_spanish:
  - el impío
  - la persona impía
  lexicon: LSJ
  rationale: El participio sustantivado masculino singular se refleja de forma natural como «el hombre impío». Conserva la referencia personal y evita suavizar el matiz moral del término.
- source_word: ἡ ἀσέβεια
  english_pob_choice: ungodliness
  chosen_spanish: su impiedad
  alternatives_spanish:
  - su impiedad religiosa
  - su irreverencia
  lexicon: LSJ
  rationale: «Impiedad» mantiene la relación cognada con ἀσεβής / ἀσέβεια y expresa bien el sustantivo abstracto. Es más preciso que «maldad» y más cercano al registro bíblico del término.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de ese hombre
  lexicon: LSJ
  rationale: El posesivo en español enlaza con claridad la impiedad al sujeto masculino singular implícito en ὁ ἀσεβῶν.
theological_decisions:
- issue: Detestar tanto a la persona impía como a su impiedad
  english_pob_reading: The verse states that both the ungodly person and his ungodliness are equally hateful to God.
  chosen_spanish_reading: El verso afirma que tanto el hombre impío como su impiedad son igualmente detestables para Dios.
  alternative_spanish_readings:
  - El verso afirma que Dios aborrece por igual al impío y su impiedad.
  - El verso habla solo de la detestabilidad moral de la impiedad, sin implicar una aversión hacia la persona.
  rationale: El griego coloca explícitamente tanto a la persona como a su impiedad bajo el mismo predicado. La traducción no debe suavizar el alcance personal de la afirmación ni reducirla solo al pecado, pero tampoco convertirla en una formulación doctrinal más amplia que el verso mismo.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del expediente inglés: no hubo cambios aplicados y el pasaje quedó con acuerdo alto. La redacción española sigue esa lectura estable, manteniendo el paralelismo entre la persona impía y su impiedad.'
  spanish_consistency_notes:
  - Se mantiene «Dios» sin sustitución litúrgica, conforme al texto fuente.
  - Se conserva la duplicidad persona/acto («el hombre impío» / «su impiedad») para reflejar el paralelo griego.
  - El adverbio «igualmente» reproduce el valor de ἐν ἴσῳ sin añadir matices interpretativos.
