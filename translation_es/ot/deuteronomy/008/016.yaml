translation:
  language: es
  text: el que te alimentó con maná en el desierto, que no habían conocido tus padres[a], para humillarte y para probarte, para hacerte bien al final[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus antepasados». El hebreo dice «tus padres».
    reason: lexical_alternative
  - marker: b
    text: O «después» o «en tu porvenir».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּאֲכִלְךָ
  english_pob_choice: who fed you
  chosen_spanish: el que te alimentó
  alternatives_spanish:
  - el que te dio de comer
  - el que te hizo comer
  lexicon: HALOT
  rationale: El participio causativo hebreo expresa la acción de hacer comer / alimentar. «El que te alimentó» mantiene el valor verbal y suena natural en español sin perder el sujeto implícito de la cláusula previa.
- source_word: מָן
  english_pob_choice: manna
  chosen_spanish: maná
  alternatives_spanish:
  - manna
  lexicon: HALOT
  rationale: «Maná» es la forma española asentada para el alimento del desierto y conserva el préstamo tradicional sin apartarse del término hebreo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la estepa
  lexicon: HALOT
  rationale: En español bíblico moderno, «desierto» comunica bien el entorno del éxodo y es idiomático; «wilderness» no exige un calco más extraño.
- source_word: אֲשֶׁר לֹא יָדְעוּן אֲבֹתֶיךָ
  english_pob_choice: which your fathers had not known
  chosen_spanish: que no habían conocido tus padres
  alternatives_spanish:
  - que tus padres no habían conocido
  - que no conocieron tus padres
  lexicon: HALOT
  rationale: Se conserva la referencia explícita a «tus padres», como en el hebreo, y el pluscuamperfecto expresa adecuadamente la anterioridad retrospectiva del relato.
- source_word: לְמַעַן עַנֹּתְךָ
  english_pob_choice: in order to humble you
  chosen_spanish: para humillarte
  alternatives_spanish:
  - para afligirte
  - con el fin de humillarte
  lexicon: HALOT
  rationale: ענה en este contexto de Deuteronomio 8 apunta a humillación pedagógica más que a mera aflicción física; «humillarte» preserva esa tensión sin borrar el costo del proceso.
- source_word: וּלְמַעַן נַסֹּתֶךָ
  english_pob_choice: and in order to test you
  chosen_spanish: y para probarte
  alternatives_spanish:
  - y para ponerte a prueba
  - y para ensayarte
  lexicon: HALOT
  rationale: «Probarte» reproduce de forma breve y fiel la idea de examen/certificación del hebreo נַסָּה; «ponerte a prueba» es posible, pero menos directo.
- source_word: לְהֵיטִבְךָ
  english_pob_choice: to do you good
  chosen_spanish: para hacerte bien
  alternatives_spanish:
  - para beneficiarte
  - para tratarte bien
  lexicon: HALOT
  rationale: La forma causativa de יטב admite «hacer bien» / «hacerte bien». Esta opción es cercana al hebreo y mantiene el objeto personal directo.
- source_word: בְּאַחֲרִיתֶךָ
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - en el final
  - en tu final
  lexicon: HALOT
  rationale: Aunque el hebreo lleva sufijo de segunda persona, el contexto favorece un sentido de desenlace/resultados. «Al final» recoge la decisión revisada en el audit trail y suena natural en español.
theological_decisions:
- issue: Propósito de la humillación y la prueba en el desierto
  english_pob_reading: God's feeding, humbling, and testing are purposeful and ultimately for Israel's good.
  chosen_spanish_reading: Dios alimenta, humilla y prueba con propósito, y el desenlace es para bien.
  alternative_spanish_readings:
  - Dios alimenta, aflige y prueba con propósito, y el desenlace es para bien.
  - Dios permite humillación y prueba como disciplina punitiva.
  rationale: La clausula final de beneficio debe mantenerse para no convertir la humillación y la prueba en mero castigo. «Humillarte» y «probarte» conservan la severidad, mientras «para hacerte bien al final» preserva el telos benevolente del versículo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail al preferir «al final» para בְּאַחֲרִיתֶךָ, en lugar de una forma más literal pero menos natural. También mantiene la secuencia causal y final del hebreo: alimentación, humillación, prueba y beneficio final.'
  spanish_consistency_notes:
  - Se conservó «maná» como término bíblico estable en español.
  - Se evitó «Señor» o una sustitución honorífica porque el versículo no contiene el Nombre divino explícito en esta cláusula.
  - Se mantuvo «tus padres» para reflejar la lectura masculina plural del hebreo, en línea con el texto fuente.
  - «Para humillarte y para probarte» reproduce el paralelismo del hebreo con dos propósitos coordinados.
