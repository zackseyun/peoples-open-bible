revisions:
- from: Pero también la madre exhortaba a cada hijo, uno por uno[a], y a todos juntos[b], hacia la muerte por causa de la piedad.
  to: Pero la madre exhortaba a cada hijo, uno por uno[a], y a todos juntos, hacia la muerte por causa de la piedad[b].
  rationale: Se ajusta la apertura a «Pero» para seguir mejor la decisión auditada y sonar más natural en español. Se conserva la estructura distributiva y colectiva del original. Se reubica la nota teológica al término «piedad», que es donde corresponde explicar εὐσέβεια.
