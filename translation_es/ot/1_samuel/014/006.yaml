translation:
  language: es
  text: 'Entonces Jonatán dijo al muchacho que llevaba sus armas[a]: «Ven, crucemos al otro lado, al destacamento[b] de estos incircuncisos[c]. Quizá Yahvé actuará por nosotros, porque nada puede impedir que Yahvé salve por muchos o por pocos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que llevaba su armadura»; el hebreo se refiere al portador del equipo militar.
    reason: lexical_alternative
  - marker: b
    text: O «puesto avanzado»; el término hebreo puede referirse a una posición militar establecida.
    reason: lexical_alternative
  - marker: c
    text: Lit. «estos incircuncisos»; es un término de reproche con carga pactal.
    reason: cultural_note
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  english_pob_choice: who carried his armor
  chosen_spanish: que llevaba sus armas
  alternatives_spanish:
  - su escudero
  - que cargaba su armadura
  - que llevaba su armamento
  lexicon: HALOT
  rationale: La construcción participial expresa al portador del equipo militar de Jonatán. «Que llevaba sus armas» conserva la referencia concreta al equipamiento sin imponer una fórmula más tradicional como «escudero», que no aparece en el hebreo y puede ser más interpretativa.
- source_word: לְכָה וְנַעְבְּרָה
  english_pob_choice: Come, let us cross over
  chosen_spanish: Ven, crucemos
  alternatives_spanish:
  - Ven, pasemos
  - Ven, atravesemos
  - Vamos, crucemos
  lexicon: HALOT
  rationale: El imperativo seguido del cohortativo expresa invitación con resolución. «Crucemos» mantiene el movimiento conjunto y la fuerza decidida del hebreo; «pasemos» es posible, pero menos preciso para el movimiento táctico del contexto.
- source_word: מַצַּב
  english_pob_choice: garrison
  chosen_spanish: destacamento
  alternatives_spanish:
  - guarnición
  - puesto avanzado
  - garnición
  lexicon: HALOT
  rationale: En este contexto militar, el término designa una posición o fuerza filistea. «Destacamento» comunica bien la idea de una unidad apostada; «guarnición» también es viable, pero puede sonar más institucional que el movimiento de ataque inmediato.
- source_word: הָעֲרֵלִים
  english_pob_choice: these uncircumcised men
  chosen_spanish: estos incircuncisos
  alternatives_spanish:
  - estos hombres incircuncisos
  - estos no circuncidados
  - estos incircuncisos [hombres]
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivadamente y tiene carga de reproche pactal. «Estos incircuncisos» conserva esa fuerza y evita diluirla con un etnónimo que el hebreo no usa aquí. En español, añadir «hombres» puede suavizar la aspereza, pero no es necesario.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Quizás
  - Puede ser que
  lexicon: HALOT
  rationale: La partícula expresa esperanza sin presunción. «Quizá» es natural en español y mantiene la incertidumbre esperanzada del hebreo.
- source_word: יַעֲשֶׂה יְהוָה לָנוּ
  english_pob_choice: Yahweh will act for us
  chosen_spanish: Yahvé actuará por nosotros
  alternatives_spanish:
  - Yahvé obrará por nosotros
  - Yahvé hará algo por nosotros
  - Yahvé intervendrá por nosotros
  lexicon: HALOT
  rationale: El verbo es amplio («hacer/actuar») y en contexto implica intervención decisiva. «Actuará por nosotros» preserva esa amplitud sin forzar una especificación demasiado estrecha; «intervendrá» es posible, pero añade un matiz más explícito que el hebreo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino según el estándar del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma española establecida en los lineamientos del POB.
- source_word: מַעְצוֹר
  english_pob_choice: nothing can hinder
  chosen_spanish: no tiene impedimento
  alternatives_spanish:
  - no hay impedimento para Yahvé
  - nada puede detenerlo
  - no hay restricción para Yahvé
  lexicon: HALOT
  rationale: El sustantivo denota freno, restricción o impedimento. En español, «no tiene impedimento» reproduce la idea de ausencia de obstáculo en una forma fluida y fiel. Se evita convertirlo en un sujeto impersonal («nada puede detenerlo») para no desplazar el sustantivo hebreo al verbo de modo innecesario.
- source_word: לְהוֹשִׁיעַ
  english_pob_choice: from saving
  chosen_spanish: para salvar
  alternatives_spanish:
  - para librar
  - para rescatar
  - para salvar/liberar
  lexicon: HALOT
  rationale: El infinitivo expresa la acción de salvar o liberar. «Salvar» conserva el alcance amplio del raíz y encaja bien en la afirmación teológica del versículo.
- source_word: בְּרַב אוֹ בִמְעָט
  english_pob_choice: by many or by few
  chosen_spanish: por muchos o por pocos
  alternatives_spanish:
  - con muchos o con pocos
  - por mucha gente o por poca
  - mediante muchos o mediante pocos
  lexicon: HALOT
  rationale: La preposición en español puede expresar medio o agencia. «Por muchos o por pocos» reproduce de manera sobria la contraposición numérica y la idea de que el resultado no depende de la cantidad de combatientes.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  - Jehová
  rationale: El hebreo usa el Tetragrama directamente. Según la política del POB, se translitera como «Yahvé» en el texto principal para preservar el nombre personal de Dios, en lugar de sustituirlo por un título reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance teológico de הָעֲרֵלִים
  english_pob_reading: these uncircumcised men
  chosen_spanish_reading: estos incircuncisos
  alternative_spanish_readings:
  - estos hombres incircuncisos
  - estos filisteos
  rationale: La expresión funciona como designación polémica y pactal, no meramente descriptiva. Mantener «incircuncisos» preserva la carga de reproche y evita sustituirla por un etnónimo que el hebreo no emplea en este versículo.
  doctrine_reference: Lexical/covenantal reproach in covenant identity language
- issue: Capacidad divina sin restricción
  english_pob_reading: nothing can hinder Yahweh from saving
  chosen_spanish_reading: Yahvé no tiene impedimento para salvar
  alternative_spanish_readings:
  - nada puede impedir que Yahvé salve
  - Yahvé no está limitado para salvar
  - no hay restricción para Yahvé al salvar
  rationale: La afirmación subraya que la eficacia salvadora de Dios no depende de la cantidad humana. «No tiene impedimento» conserva el matiz del sustantivo hebreo מַעְצוֹר y mantiene la tensión lexical entre obstáculo y capacidad de salvar.
  doctrine_reference: Divine omnipotence / sovereignty in deliverance
translation_notes:
  revision_awareness: 'La versión inglesa del POB usa «garrison» con nota alternativa «outpost», «these uncircumcised men» con nota cultural, y «Perhaps Yahweh will act for us» con una nota alternativa sobre la restricción divina. La versión española conserva esas mismas tensiones léxicas: destaca el portador de armas sin imponer «escudero», mantiene la carga de «incircuncisos» y expresa la posibilidad esperanzada de la intervención divina sin resolverla en una certeza.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «Señor» para el Tetragrama, conforme al estándar del proyecto.
  - «Incircuncisos» se usa sustantivamente para preservar el reproche pactal del hebreo.
  - «Crucemos» refleja mejor la dinámica militar que un simple «pasemos», aunque se ofrece la alternativa en nota.
  - «Por muchos o por pocos» conserva la oposición numérica central del versículo sin agregar matices causales no presentes en el texto.
