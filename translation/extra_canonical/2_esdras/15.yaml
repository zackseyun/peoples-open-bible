theological_decisions:
- issue: Divine speech labels in a Latin-only Christian appendix
  chosen_reading: Render dominus / deus straightforwardly as 'the Lord' and 'God' according to the Latin forms present.
  alternative_readings:
  - Harmonize all divine references to 'the Lord God'
  - Regularize to one title for stylistic smoothness
  rationale: This chapter is a later Latin Christian addition with shifting divine speech formulas. The translation preserves those shifts rather than smoothing them away, since they belong to the compositional layer's rhetoric.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Exodus imagery applied to 'my people' in Egypt
  chosen_reading: Keep the language as a fresh prophetic reapplication of exodus deliverance rather than allegorizing it.
  alternative_readings:
  - Treat 'Egypt' as purely symbolic for oppression
  - Flatten the allusion into generic rescue language
  rationale: The Latin deliberately echoes biblical exodus diction. Preserving the concrete reference allows readers to feel the typological force without the translation deciding how literal or symbolic the oracle is.
- issue: Sexualized judgment language against Asia/Babylon
  chosen_reading: Retain the prostitution metaphor in direct terms.
  alternative_readings:
  - Soften to 'unfaithfulness' or 'immorality'
  - Generalize to political alliance imagery
  rationale: The oracle's theological accusation is conveyed through prophetic sexual metaphor. Softening it would mute the chapter's rhetoric and obscure its dependence on earlier prophetic judgment language.
  doctrine_reference: Preserve theological tension rather than resolve it.
