translation:
  language: es
  text: Si profanan mis estatutos y no guardan mis mandamientos,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «violan mis estatutos». El verbo hebreo puede denotar profanar o tratar como común; «profanan» preserva la fuerza más intensa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición simple. «Si» conserva con naturalidad el valor condicional básico del hebreo sin adelantar una certeza temporal que el término por sí mismo no expresa.
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: חֻקָּה designa disposiciones establecidas; «estatutos» preserva el registro jurídico-covenantal y corresponde bien al paralelismo con «mandamientos».
- source_word: יְחַלֵּלוּ
  english_pob_choice: profane
  chosen_spanish: profanan
  alternatives_spanish:
  - violan
  - contaminan
  - tratan como común
  lexicon: HALOT
  rationale: El piel de חלל puede implicar profanar, desacralizar o tratar como común. «Profanan» conserva en español la fuerza religiosa y la gravedad del verbo mejor que un simple «violan».
- source_word: וּמִצְוֺתַי
  english_pob_choice: and my commandments
  chosen_spanish: y mis mandamientos
  alternatives_spanish:
  - y mis órdenes
  - y mis preceptos
  lexicon: HALOT
  rationale: מִצְוָה se expresa naturalmente como «mandamiento» en contextos de pacto y ley. Mantiene la distinción estilística respecto de «estatutos».
- source_word: יִשְׁמֹרוּ
  english_pob_choice: keep
  chosen_spanish: guardan
  alternatives_spanish:
  - observan
  - cumplen
  lexicon: HALOT
  rationale: שׁמר en este contexto legal/covenantal puede ser «guardar». «Guardan» conserva la imagen de custodia obediente y suena idiomático en español; «observan» es posible, pero menos vivo aquí.
theological_decisions:
- issue: Intensidad de la infracción expresada por חלל
  english_pob_reading: Rendered as 'profane' rather than the more generic 'violate.'
  chosen_spanish_reading: «profanan» en vez de un simple «violan»
  alternative_spanish_readings:
  - «violan» mis estatutos
  - «contaminan» mis estatutos
  - «tratan como comunes» mis estatutos
  rationale: La lectura inglesa procura no suavizar la fuerza de חלל. En español, «profanan» transmite esa profanación/desecración con el peso religioso adecuado y evita perder la tensión teológica del texto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El testimonio inglés indica alta concordancia, sin revisiones aplicadas y con la lectura estable «profane ... and do not keep». La propuesta española sigue esa línea de forma transparente y conserva la fuerza lexical de חלל mediante «profanan».
  spanish_consistency_notes:
  - Se mantiene la pareja legal «estatutos / mandamientos» para reflejar el paralelismo hebreo.
  - Se evita «SEÑOR» u otras sustituciones porque este versículo no contiene el tetragrámaton.
  - «Guardar» se usa en sentido de obediencia covenantal, coherente con el valor de שׁמר en contextos legales.
