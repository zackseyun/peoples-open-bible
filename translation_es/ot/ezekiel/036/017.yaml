review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés en la mayoría de los puntos: conserva «Hijo de hombre», «la casa de Israel», el marco temporal con «cuando», la metáfora de «camino», y la comparación explícita con la impureza menstrual. Sin embargo, hay un desajuste importante de concordancia y una elección léxica mejorable: el hebreo tiene sujeto plural/corporativo con verbo plural («ellos contaminaron/impurificaron»), mientras que el español dice «la profanó», singular, lo que suena discordante tras «la casa de Israel, cuando habitaba...». Además, וַיְטַמְּאוּ expresa impureza/contaminación ritual-moral más directamente que «profanó».'
  spanish_quality_summary: El texto es generalmente legible y digno, pero la sintaxis inicial queda algo trabada por la aposición «la casa de Israel, cuando habitaba...». También «con su camino» resulta menos natural que «con su conducta» o mantener «camino» donde el contexto lo aclare; no obstante, puede conservarse por fidelidad metafórica. La revisión propuesta corrige la concordancia, mejora la naturalidad y preserva la terminología teológica clave.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. Se preserva el lenguaje cultual de impureza. La principal corrección es preferir «la contaminaron»/«la hicieron impura» sobre «la profanó» para reflejar mejor טמא. «Hijo de hombre» y «casa de Israel» están alineados con el audit trail.
  issues:
  - severity: high
    issue: Concordancia verbal inadecuada en «la profanó»
    rationale: 'El hebreo usa verbo plural וַיְטַמְּאוּ con sujeto colectivo «casa de Israel». En español, después de «la casa de Israel», el singular puede ocurrir, pero aquí la construcción con «cuando habitaban» y los posesivos plurales favorece claramente un verbo plural: «la contaminaron». La forma singular introduce tensión sintáctica y puede percibirse como error.'
  - severity: medium
    issue: «Profanó» no refleja con suficiente precisión טמא
    rationale: טמא aquí se refiere a impureza ritual-moral del territorio. «Profanar» se acerca más a חלל o a desacralización; «contaminaron» o «hicieron impura» preserva mejor el campo semántico de impureza/contaminación cultual.
  - severity: low
    issue: 'La apertura puede sonar más natural en plural: «habitaban»'
    rationale: Aunque «la casa de Israel ... habitaba» no es imposible, el contexto inmediato usa posesivos y acciones plurales. «Cuando habitaban en su propia tierra» armoniza mejor con el resto del versículo sin perder el sentido corporativo.
  revised_spanish_text: Hijo de hombre[a], cuando la casa de Israel habitaba en su propia tierra, la contaminaron con su camino y con sus obras; su camino delante de mí era como la impureza de una mujer menstruante.
  revised_footnotes:
  - marker: a
    text: O «como la impureza menstrual» o «como la impureza de la menstruación». El hebreo compara la conducta de Israel con la impureza ritual asociada a la menstruación.
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia verbal y se sustituye «profanó» por «contaminaron» para reflejar mejor טמא como impureza ritual-moral. También se suaviza la sintaxis inicial con «cuando la casa de Israel habitaba...», manteniendo «casa de Israel» y la imagen explícita de impureza menstrual. Se conserva una formulación clara y eclesialmente legible sin apartarse del audit trail.
