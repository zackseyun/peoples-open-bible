    changes_summary: Changed 'steady' to 'firm' for closer lexical correspondence to בְאֵיתָן, and rendered זְרֹעֵי יָדָיו more completely as 'the arms of his hands' rather than simply 'his arms.'
translation:
  language: es
  text: Sin embargo, su arco permaneció firme[a], y los brazos de sus manos se volvieron ágiles por las manos del Poderoso de Jacob; de allí viene[b] el Pastor[c], la Piedra de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus brazos fueron fortalecidos». El verbo hebreo es raro y puede sugerir fuerza, flexibilidad o agilidad.
    reason: lexical_alternative
  - marker: b
    text: O «de él», si la frase se entiende como referencia directa al Poderoso de Jacob más que como «de allí».
    reason: alternative_reading
  - marker: c
    text: «El Pastor, la Piedra de Israel» puede entenderse como títulos divinos; algunos lo toman en cambio como referencia a José o a un gobernante futuro. «Piedra» también podría verterse interpretativamente como «Roca».
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - quedó
  - se mantuvo
  - habitó
  lexicon: HALOT
  rationale: En este contexto el verbo no describe a un sujeto sentado, sino la permanencia firme del arco. «Permaneció» conserva la idea de continuidad y estabilidad sin forzar una imagen literal extraña en español.
- source_word: בְּאֵיתָן
  english_pob_choice: firm/steady
  chosen_spanish: firme
  alternatives_spanish:
  - sólido
  - estable
  - fuerte
  lexicon: HALOT
  rationale: אֵיתָן expresa firmeza, solidez o permanencia. «Firme» es la opción más directa y natural en español para el arco, y mantiene el enlace con la imagen de estabilidad usada en el texto fuente.
- source_word: קַשְׁתּוֹ
  english_pob_choice: his bow
  chosen_spanish: su arco
  alternatives_spanish:
  - su bow
  - su arma
  lexicon: HALOT
  rationale: La palabra designa de forma estándar un arco de combate. Se conserva la metáfora bélica del pasaje.
- source_word: וַיָּפֹזּוּ
  english_pob_choice: were made agile
  chosen_spanish: fueron hechos ágiles
  alternatives_spanish:
  - fueron fortalecidos
  - fueron hechos flexibles
  - fueron envalentonados
  lexicon: HALOT
  rationale: El verbo es raro y admite matices de fuerza, agilidad o flexibilidad. «Fueron hechos ágiles» sigue la lectura principal del POB inglés y deja visible la rareza del término sin resolverlo reductivamente.
- source_word: זְרֹעֵי יָדָיו
  english_pob_choice: the arms of his hands
  chosen_spanish: los brazos de sus manos
  alternatives_spanish:
  - sus brazos
  - sus brazos y manos
  - los brazos de sus brazos
  lexicon: HALOT
  rationale: La frase hebrea es literal y poética, no idiomática en español. Se conserva su forma más transparente en la línea principal para no perder el relieve del paralelismo, aunque «sus brazos» es una simplificación posible y está documentada en la historia de revisión inglesa.
- source_word: מִידֵי
  english_pob_choice: by the hands of
  chosen_spanish: por las manos de
  alternatives_spanish:
  - de las manos de
  - mediante las manos de
  - por medio de las manos de
  lexicon: HALOT
  rationale: La preposición marca agencia o procedencia. «Por las manos de» comunica bien la acción mediadora de Dios en español y mantiene el eco corporal del hebreo.
- source_word: אֲבִיר יַעֲקֹב
  english_pob_choice: the Mighty One of Jacob
  chosen_spanish: el Poderoso de Jacob
  alternatives_spanish:
  - el Fuerte de Jacob
  - el Poderoso de Israel
  - el Poderoso de Jacob
  lexicon: HALOT
  rationale: Es un título divino. «Poderoso» reproduce bien el valor de אֲבִיר y evita sustituirlo por un lenguaje eclesiástico menos transparente. Se mantiene el genitivo «de Jacob» como en el hebreo.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde entonces
  - de él
  lexicon: HALOT
  rationale: La forma más literal y sobria en español es «desde allí». Se deja abierta la posibilidad de que el referente sea el lugar mencionado o, interpretativamente, la fuente divina, sin decidirlo en el cuerpo del texto.
- source_word: רֹעֶה
  english_pob_choice: the Shepherd
  chosen_spanish: el Pastor
  alternatives_spanish:
  - el que pastorea
  - el pastor
  lexicon: HALOT
  rationale: Usado sustantivamente, el término funciona aquí como título. En español «Pastor» es la traducción natural y digna; se capitaliza por su valor titular en el contexto poético.
- source_word: אֶבֶן יִשְׂרָאֵל
  english_pob_choice: the Stone of Israel
  chosen_spanish: la Piedra de Israel
  alternatives_spanish:
  - la Roca de Israel
  - la piedra de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente «piedra», no el término más habitual para «roca». Se conserva «Piedra» para reflejar el source wording y la tensión poética que el POB inglés también mantiene.
theological_decisions:
- issue: ¿A quién se refieren «el Pastor» y «la Piedra de Israel»?
  english_pob_reading: 'Treat the clause as continuing the reference to God: ''from there is the Shepherd, the Stone of Israel.'''
  chosen_spanish_reading: 'La cláusula se entiende como continuación del referente divino: «desde allí está el Pastor, la Piedra de Israel».'
  alternative_spanish_readings:
  - Referir «el Pastor» y «la Piedra» a José
  - Leer la línea de forma mesiánica, como un gobernante futuro descendiente de Israel
  rationale: El contexto inmediato habla de la acción del Poderoso de Jacob, por lo que la lectura que continúa refiriéndose a Dios es la más cohesionada. Aun así, el hebreo es comprimido y admite más de una lectura; por eso no se elimina la tensión interpretativa.
  doctrine_reference: Preservar la ambigüedad teológica donde el hebreo no la resuelve claramente.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «firm» para בְּאֵיתָן y mantuvo «the arms of his hands» por mayor cercanía al hebreo, en lugar de simplificarlo a «his arms». También se respeta la decisión auditada de conservar la rareza de וַיָּפֹזּוּ con un matiz de agilidad, dejando la alternativa de fortaleza en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma editorial general, pero este versículo no contiene el tetragrámaton.
  - Se usa «Poderoso» para אֲבִיר en lugar de «Fuerte» por fidelidad al título divino y coherencia con el registro poético.
  - «Piedra» se conserva frente a «Roca» para no borrar la distinción léxica del hebreo.
  - Se capitalizan «Pastor» y «Piedra» por su posible función titular en el contexto.
  - La construcción «los brazos de sus manos» se mantiene por transparencia al hebreo, aunque el español admite una simplificación semántica en la nota.
