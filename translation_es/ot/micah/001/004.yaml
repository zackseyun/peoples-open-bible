translation:
  language: es
  text: Las montañas se derretirán debajo de él, y los valles se abrirán, como cera delante del fuego, como aguas vertidas por una pendiente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְנָמַסּוּ
  english_pob_choice: will melt
  chosen_spanish: se derretirán
  alternatives_spanish:
  - se fundirán
  - se disolverán
  lexicon: HALOT
  rationale: נמס denota derretirse o disolverse. En español, «se derretirán» comunica con naturalidad la imagen física y mantiene el paralelo con la cera.
- source_word: הֶהָרִים
  english_pob_choice: the mountains
  chosen_spanish: las montañas
  alternatives_spanish:
  - montañas
  lexicon: HALOT
  rationale: 'El plural definido se expresa de forma natural con artículo en español: «las montañas».'
- source_word: תַּחְתָּיו
  english_pob_choice: beneath him
  chosen_spanish: debajo de él
  alternatives_spanish:
  - bajo él
  - por debajo de él
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular remite a Yahvé del contexto previo. «Debajo de él» conserva esa referencia y suena idiomático en español.
- source_word: וְהָעֲמָקִים
  english_pob_choice: the valleys
  chosen_spanish: los valles
  alternatives_spanish:
  - las hondonadas
  - los valles profundos
  lexicon: HALOT
  rationale: עֲמָקִים designa lugares bajos o valles. «Los valles» es la equivalencia más directa y equilibrada en español.
- source_word: יִתְבַּקָּעוּ
  english_pob_choice: will split open
  chosen_spanish: se partirán
  alternatives_spanish:
  - se abrirán en dos
  - se resquebrajarán
  - se agrietarán
  lexicon: HALOT
  rationale: El hitpael imperfecto comunica una división violenta. «Se partirán» preserva la fuerza del verbo sin volverlo demasiado técnico.
- source_word: כַּדּוֹנַג
  english_pob_choice: like wax
  chosen_spanish: como cera
  alternatives_spanish:
  - como la cera
  lexicon: HALOT
  rationale: דּוֹנַג es cera. En español, «como cera» reproduce bien la comparación poética y fluida.
- source_word: מִפְּנֵי הָאֵשׁ
  english_pob_choice: before the fire
  chosen_spanish: delante del fuego
  alternatives_spanish:
  - ante el fuego
  - frente al fuego
  lexicon: HALOT
  rationale: La expresión hebrea indica la presencia inmediata del fuego. «Delante del fuego» mantiene esa relación espacial y la imagen poética.
- source_word: כְּמַיִם
  english_pob_choice: like waters
  chosen_spanish: como aguas
  alternatives_spanish:
  - como agua
  lexicon: HALOT
  rationale: El plural hebreo conserva un tono poético; «aguas» reproduce mejor ese registro que el singular abstracto.
- source_word: מֻגָּרִים
  english_pob_choice: poured down
  chosen_spanish: derramadas
  alternatives_spanish:
  - vertidas
  - echadas
  lexicon: HALOT
  rationale: La forma pasiva denota algo hecho fluir o verterse. «Derramadas» transmite bien el movimiento y el efecto visual.
- source_word: בְּמוֹרָד
  english_pob_choice: down a slope
  chosen_spanish: cuesta abajo
  alternatives_spanish:
  - por una pendiente
  - en declive
  lexicon: HALOT
  rationale: מורד es una bajada o pendiente. «Cuesta abajo» es la expresión española más natural para el descenso continuo de las aguas.
theological_decisions:
- issue: Referente del pronombre en «debajo de él»
  english_pob_reading: The pronoun refers to the LORD described in the preceding context, portraying creation's response to his coming.
  chosen_spanish_reading: El pronombre remite a Yahvé en el contexto inmediato, presentando la creación como respondiendo a su venida.
  alternative_spanish_readings:
  - un referente divino implícito
  - una referencia menos explícita al Señor
  rationale: La secuencia de Miqueas 1:3-4 habla de Yahvé que sale y pisa las alturas. Mantener el pronombre respeta la cohesión del hebreo y deja claro el referente por contexto sin sustituirlo innecesariamente.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y concuerda con la decisión inglesa de conservar la metáfora física, el referente pronominal y el plural poético de «aguas». No se requieren notas textuales ni variantes adicionales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como referente implícito por el contexto previo, aunque el versículo no lo repite explícitamente.
  - Se mantiene el plural poético «aguas» para reflejar el hebreo.
  - El registro es literario y bíblico sin depender de la fórmula tradicional «SEÑOR».
