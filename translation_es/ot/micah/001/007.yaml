review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del versículo y preserva la metáfora de prostitución/idolatría, pero contiene varios desajustes con el hebreo y con el rastro POB en español: cambia indebidamente el número en «אֶתְנַנֶּיהָ» (plural a singular colectivo), tiene una construcción agramatical en «todas sus ídolos», y «haré desolación» / «de salario de prostituta» no suenan naturales ni reflejan bien el valor sintáctico en español. También falta anclar correctamente la nota cultural al sintagma equivalente al inglés.'
  spanish_quality_summary: La legibilidad del borrador es irregular. «Todas sus ídolos haré desolación» es gramaticalmente incorrecto; «de salario de prostituta» es poco idiomático; y «todo el salario de prostitución» debilita la personificación femenina explícita del hebreo/POB. Con ajustes menores, el texto puede quedar fiel, natural y digno en español eclesial contemporáneo.
  glossary_alignment: Se mantiene correctamente «imágenes talladas» para פְּסִילֶיהָ y «ídolos» para עֲצַבֶּיהָ. La metáfora sexual debe conservarse con «salarios de prostituta» o «paga de prostituta», no neutralizarse como mera «prostitución». No hay términos de glosario mayor en conflicto, pero sí conviene preservar el femenino personificado de Samaria mediante «sus salarios de prostituta».
  issues:
  - severity: high
    issue: «todas sus ídolos»
    rationale: Es un error gramatical de concordancia; debe ser «todos sus ídolos».
  - severity: high
    issue: «haré desolación»
    rationale: Aunque intenta reflejar la fuerza nominal de שְׁמָמָה, en español resulta antinatural y opaco. El POB inglés revisado ya prefirió la forma verbal más natural; en español «dejaré desolados» o «haré quedar desolados» comunica fielmente el sentido.
  - severity: medium
    issue: «todo el salario de prostitución»
    rationale: El hebreo tiene plural «sus salarios/pagas» y el inglés auditado «all her prostitute’s wages». El singular colectivo español aquí reduce un matiz léxico y elimina la referencia más directa a la personificación femenina.
  - severity: medium
    issue: «de salario de prostituta» / «al salario de prostituta»
    rationale: La ausencia de artículo hace la frase poco natural en español. «De los salarios de una prostituta» y «a los salarios de una prostituta» o equivalente son más claros y fieles.
  - severity: low
    issue: Anclaje de la nota b
    rationale: La nota cultural explica «su salario de prostituta», pero en el texto el marcador está sobre «prostitución», que además no reproduce exactamente la formulación explicada por la nota.
  revised_spanish_text: Todas sus imágenes talladas[a] serán destrozadas, y todos sus salarios de prostituta[b] serán quemados con fuego; todos sus ídolos los dejaré desolados. Porque de los salarios de una prostituta los reunió,[c] y a los salarios de una prostituta volverán.
  revised_footnotes:
  - marker: a
    text: O «imágenes grabadas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus salarios de prostituta»; la frase alude metafóricamente a la riqueza obtenida mediante infidelidad idolátrica.'
    reason: cultural_note
  - marker: c
    text: O «volverán a ser salarios de prostituta».
    reason: alternative_reading
  revision_rationale: La revisión corrige la gramática española, restituye mejor el plural y la personificación del hebreo («sus salarios de prostituta»), mejora la naturalidad sintáctica de las frases con «de/a los salarios de una prostituta», y reemplaza la construcción poco idiomática «haré desolación» por «los dejaré desolados», que transmite con claridad el juicio anunciado sin perder fuerza. Se conservan las notas léxicas y la alternativa de lectura, con marcadores correctamente anclados en el texto.
