lexical_decisions:
- source_word: ἔρρωσθε
  english_pob_choice: Farewell
  chosen_spanish: ¡Adiós!
  alternatives_spanish:
  - ¡Paz!
  - ¡Estén bien!
  - Que estén bien
  lexicon: LSJ
  rationale: La fórmula epistolar griega funciona como despedida; en español, «¡Adiós!» comunica con naturalidad el cierre breve del texto sin forzar el sentido imperativo literal.
- source_word: ἔτους ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  english_pob_choice: In the one hundred forty-eighth year
  chosen_spanish: En el año ciento cuarenta y ocho
  alternatives_spanish:
  - En el año 148
  - Año ciento cuarenta y ocho
  lexicon: LSJ
  rationale: La construcción de datación se vierte de modo idiomático en español como fórmula temporal introductoria. Se conserva el tono documental y el número se escribe con palabras, como en la opción inglesa auditada.
- source_word: Διὸς Κορινθίου
  english_pob_choice: Dios Corinthios
  chosen_spanish: Dios Corintio
  alternatives_spanish:
  - Dios Corinthios
  - el mes de Dios Corintio
  - Dios-Corintio
  lexicon: LSJ
  rationale: El griego preserva el nombre macedonio del mes; en español se translitera y se adapta la forma al uso gráfico hispano. Se mantiene el término calendárico propio en lugar de sustituirlo por un mes equivalente incierto.
- source_word: τετράδι καὶ εἰκάδι
  english_pob_choice: on the twenty-fourth day
  chosen_spanish: el día veinticuatro
  alternatives_spanish:
  - el cuarto y vigésimo día
  - el día 24
  lexicon: LSJ
  rationale: La idiomática griega «el cuarto y vigésimo» corresponde al día veinticuatro. En español, la forma natural de fecha es la más clara y fiel al valor numérico.
