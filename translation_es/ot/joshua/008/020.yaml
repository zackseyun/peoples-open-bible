translation:
  language: es
  text: Entonces los hombres de Hai se volvieron y miraron detrás de sí, y he aquí que el humo de la ciudad subía al cielo[a], y no había poder en ellos[b] para huir ni de un lado ni del otro. Y el pueblo que había huido al desierto se volvió contra el perseguidor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «subía hacia el cielo». El hebreo es literalmente «hacia el cielo / cielo arriba».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: literalmente, «no había manos en ellos», es decir, no tenían poder o capacidad para escapar.'
    reason: cultural_note
  - marker: c
    text: El hebreo usa el singular «el perseguidor», probablemente como colectivo para la fuerza perseguidora.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  english_pob_choice: turned
  chosen_spanish: se volvieron atrás
  alternatives_spanish:
  - se dieron vuelta
  - se giraron
  - volvieron
  lexicon: HALOT
  rationale: פנה expresa un cambio de orientación; en español, 'se volvieron atrás' conserva el movimiento direccional y encaja con la acción siguiente de ver.
- source_word: אַנְשֵׁי הָעַי
  english_pob_choice: the men of Ai
  chosen_spanish: los hombres de Hai
  alternatives_spanish:
  - los hombres de Ai
  - la gente de Hai
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente 'hombres de'. 'Hai' sigue la forma castellana habitual del topónimo en español bíblico.
- source_word: וַיִּרְאוּ
  english_pob_choice: looked
  chosen_spanish: vieron
  alternatives_spanish:
  - miraron
  - observaron
  lexicon: HALOT
  rationale: Aquí el verbo introduce la percepción del humo; en español, 'vieron' es más natural y no confunde con el giro previo del cuerpo.
- source_word: עָלָה עֲשַׁן הָעִיר הַשָּׁמַיְמָה
  english_pob_choice: the smoke of the city was going up to the sky
  chosen_spanish: el humo de la ciudad subía al cielo
  alternatives_spanish:
  - el humo de la ciudad subía hacia el cielo
  - el humo de la ciudad ascendía al cielo
  lexicon: HALOT
  rationale: עָלָה indica ascenso continuo; 'subía' lo refleja de forma natural. הַשָּׁמַיְמָה es literalmente 'hacia el cielo', y 'al cielo' mantiene la dirección sin introducir un matiz doctrinal adicional.
- source_word: וְלֹא הָיָה בָהֶם יָדַיִם
  english_pob_choice: there was no power in them
  chosen_spanish: no tenían fuerzas
  alternatives_spanish:
  - no había poder en ellos
  - no tenían poder
  lexicon: HALOT
  rationale: El hebreo es un modismo que expresa incapacidad. 'No tenían fuerzas' comunica bien la imposibilidad de escapar y es idiomático en español; el matiz metafórico queda implícito por el contexto bélico.
- source_word: לָנוּס הֵנָּה וָהֵנָּה
  english_pob_choice: to flee this way or that way
  chosen_spanish: para huir ni de un lado ni del otro
  alternatives_spanish:
  - para huir de aquí para allá
  - para huir en cualquier dirección
  lexicon: HALOT
  rationale: La pareja adverbial expresa imposibilidad de escape en cualquier dirección. 'Ni de un lado ni del otro' conserva la idea distributiva del hebreo con fluidez en español.
- source_word: וְהָעָם הַנָּס הַמִּדְבָּר
  english_pob_choice: the people who had fled to the wilderness
  chosen_spanish: el pueblo que había huido al desierto
  alternatives_spanish:
  - el pueblo que huía al desierto
  - la gente que había huido al desierto
  lexicon: HALOT
  rationale: El participio con artículo identifica al grupo por su acción previa; el pretérito pluscuamperfecto refleja bien la secuencia narrativa.
- source_word: נֶהְפַּךְ
  english_pob_choice: turned back
  chosen_spanish: se volvió
  alternatives_spanish:
  - se volvió atrás
  - dio media vuelta
  lexicon: HALOT
  rationale: En contexto militar expresa reversión de dirección; 'se volvió' es breve y natural, y el complemento siguiente aclara el movimiento contra el enemigo.
- source_word: אֶל הָרֹדֵף
  english_pob_choice: against the pursuer
  chosen_spanish: contra el perseguidor
  alternatives_spanish:
  - hacia el perseguidor
  - contra los perseguidores
  lexicon: HALOT
  rationale: El participio singular probablemente funciona de modo colectivo. 'Contra el perseguidor' conserva la singularidad del hebreo y el sentido hostil de la reversión.
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del auditorio inglés, que prefirió una forma breve de la expresión idiomática direccional ('this way or that'). Para el español, se mantuvo la misma compacidad con 'ni de un lado ni del otro' y se preservó el contraste narrativo entre el giro de los de Hai, la subida del humo y la reversión del pueblo hacia el perseguidor.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece el nombre divino aquí.
  - Se usó 'Hai' como forma castellana del topónimo, consistente con el uso bíblico en español.
  - 'Se conservó la distinción entre ''ver'' y el cambio de dirección previo: ''se volvieron atrás ... y vieron''.'
  - Se reflejó el hebraísmo de 'no tenían fuerzas' sin sobreexplicar el modismo en el cuerpo del texto.
