base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/001/008.yaml
  text: But when the Jews had sent to him[a], from the council of elders and the elders, men to greet him, bring gifts of hospitality, and rejoice over what had happened[b], it happened that he became all the more eager to come to them as quickly as possible.
  footnotes:
