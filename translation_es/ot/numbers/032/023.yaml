review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional, mantiene correctamente «Yahvé» para יהוה, y conserva el sentido principal de advertencia. Sin embargo, dos elecciones no representan del modo más fiel el hebreo ni el rastro POB: «habrán pecado» desplaza indebidamente el perfecto hebreo/resultativo hacia un futuro perfecto español menos natural aquí, y «miren» para הִנֵּה suena más coloquial/exhortativo de lo que pide el tono solemne; una opción como «ciertamente» o «he aquí» funciona mejor en español bíblico moderno. Además, la nota al pie actual está mal redactada en español («expresa una idiomática»).'
  spanish_quality_summary: El texto es generalmente claro y legible, pero necesita pulido para sonar más natural y digno en español eclesial amplio. «Han pecado» encaja mejor que «habrán pecado» después de «si no hacen así». «Ciertamente» evita el matiz demasiado conversacional de «miren». La nota al pie debe reformularse para un español idiomático.
  glossary_alignment: 'Alineación buena con la terminología del proyecto en «Yahvé», «pecado» y el mantenimiento del modismo con nota alternativa. No hay conflicto doctrinal mayor. La principal corrección es estilístico-semántica: ajustar el valor verbal y mejorar la representación de הִנֵּה y de la nota.'
  issues:
  - severity: medium
    issue: «habrán pecado» para חֲטָאתֶם
    rationale: El hebreo perfecto en esta advertencia expresa el hecho/resultante de la culpa si no obedecen; el inglés auditado eligió «you have sinned». En español, «han pecado» comunica mejor esa fuerza resultativa y evita un futuro perfecto que suena más inferencial o desplazado temporalmente.
  - severity: low
    issue: «miren» para הִנֵּה
    rationale: Aunque comunica énfasis, «miren» introduce un registro más coloquial y una exhortación visual que no necesariamente está en el partícula discursiva. «Ciertamente» preserva mejor la solemnidad y la función enfática en español moderno digno.
  - severity: low
    issue: Redacción poco idiomática de la nota al pie
    rationale: La frase «El hebreo expresa una idiomática de exposición inevitable y consecuencia» no suena natural en español. Debe decirse algo como «El modismo hebreo expresa exposición inevitable y sus consecuencias».
  revised_spanish_text: Pero si no hacen así[a], ciertamente han pecado contra Yahvé, y sepan que su pecado los hallará.
