translation:
  language: es
  text: ¡Cómo gimen los animales! Los rebaños de ganado andan confundidos[a], porque no hay pasto para ellos; aun los rebaños de ovejas sufren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'andan perplejos' o 'están desconcertados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¿Qué...?
  lexicon: HALOT
  rationale: Se usa como exclamación de lamento, no como interrogativo literal.
- source_word: נֶּאֶנְחָה
  english_pob_choice: groan
  chosen_spanish: gimen
  alternatives_spanish:
  - gimen de dolor
  - suspiran
  lexicon: HALOT
  rationale: Expresa el gemido audible de aflicción propio del contexto de devastación.
- source_word: בְהֵמָה
  english_pob_choice: the animals
  chosen_spanish: los animales
  alternatives_spanish:
  - el ganado
  - las bestias
  lexicon: HALOT
  rationale: Es un colectivo amplio; en español 'los animales' conserva la amplitud mejor que limitarlo a ganado, aunque el contexto inmediato especifica bovinos.
- source_word: נָבֹכוּ
  english_pob_choice: wander in confusion
  chosen_spanish: andan confundidos
  alternatives_spanish:
  - andan perplejos
  - están aturdidos
  - vagan confundidos
  lexicon: HALOT
  rationale: El verbo expresa desconcierto y desorden; 'andan confundidos' mantiene la imagen concreta y natural en español.
- source_word: עֶדְרֵי בָקָר
  english_pob_choice: the herds of cattle
  chosen_spanish: los hatos de ganado
  alternatives_spanish:
  - los hatos de vacas
  - los rebaños de ganado
  lexicon: HALOT
  rationale: '''Hatos'' reproduce la idea de rebaños/agrupaciones de ganado de forma clara y natural; ''ganado'' evita restringirlo a vacas solamente.'
- source_word: כִּי אֵין מִרְעֶה לָהֶם
  english_pob_choice: because there is no pasture for them
  chosen_spanish: porque no hay pasto para ellos
  alternatives_spanish:
  - porque no tienen pasto
  - porque no hay pastura para ellos
  lexicon: HALOT
  rationale: מִרְעֶה denota pasto o lugar de pastoreo; 'no hay pasto para ellos' es idiomático y preserva la causalidad.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: Introduce intensificación y extensión del lamento a otro grupo de animales.
- source_word: עֶדְרֵי הַצֹּאן
  english_pob_choice: the flocks of sheep
  chosen_spanish: los hatos de ovejas
  alternatives_spanish:
  - los rebaños de ovejas
  - los hatos del rebaño
  lexicon: HALOT
  rationale: Conserva la imagen de agrupaciones de ovejas; 'hatos' mantiene paralelismo con la primera cola.
- source_word: נֶאְשָׁמוּ
  english_pob_choice: suffer
  chosen_spanish: sufren
  alternatives_spanish:
  - padecen
  - quedan desolados
  - cargan con la culpa
  lexicon: HALOT
  rationale: La revisión inglesa volvió la cláusula más neutral; 'sufren' refleja el resultado doloroso sin imponer culpabilidad moral a los animales.
theological_decisions:
- issue: Valor de נֶאְשָׁמוּ en relación con animales inocentes
  english_pob_reading: The flocks of sheep suffer; the text does not require that the sheep are morally guilty.
  chosen_spanish_reading: los hatos de ovejas sufren
  alternative_spanish_readings:
  - los hatos de ovejas son tenidos por culpables
  - los hatos de ovejas sufren castigo
  - los hatos de ovejas quedan desolados
  rationale: El contexto describe devastación ecológica bajo juicio, no culpa moral de las ovejas. 'Sufren' conserva la tensión judicial del verbo hebreo sin atribuirles responsabilidad ética.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente; no importar una doctrina de culpabilidad moral de los animales.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que eliminó 'punishment' y prefirió un final más neutral con 'suffer'. Por eso el español evita cualquier noción explícita de castigo y usa 'sufren'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, aunque este versículo no lo contiene.
  - Se conservó el paralelismo entre 'hatos' en ambas mitades para reflejar la estructura poética.
  - '''Ganado'' y ''ovejas'' se usan como especificaciones contextuales de los colectivos hebreos, sin forzar una distinción técnica mayor que la del verso.'
