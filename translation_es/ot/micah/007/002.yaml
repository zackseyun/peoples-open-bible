revisions:
- from: El fiel[a] ha perecido de la tierra, y no hay entre los hombres uno recto. Todos ellos acechan sangre[c][b]; cada uno caza a su hermano con una red.
  to: El fiel[a] ha perecido del país, y no hay entre la humanidad uno recto. Todos ellos acechan para derramar sangre; cada uno caza a su hermano[b] con una red[c].
  rationale: Se ajusta מִן הָאָרֶץ a 'del país' para reflejar la preferencia contextual del expediente por 'land' en un contexto profético-social, dejando 'de la tierra' como alternativa real en nota. Se cambia 'entre los hombres' por 'entre la humanidad' para respetar el valor genérico de אדם sin restricción masculina innecesaria en español. Se mejora 'acechan sangre' a 'acechan para derramar sangre' por claridad idiomática, manteniendo el sentido de violencia homicida. Se conservan 'el fiel', 'uno recto', 'su hermano' y 'con una red' por buena fidelidad léxica y legibilidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:49:26Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: pérdida del fiel, ausencia de rectitud entre la humanidad, emboscada violenta y caza del hermano con imagen de trampa/red. Sin embargo, dos decisiones principales se desalinean parcialmente del expediente POB: (1) מִן הָאָרֶץ se documentó en inglés como ''from the land'' con nota alternativa ''earth'', mientras que el español invierte esa prioridad al poner ''de la tierra'' en el texto y la misma frase en la nota; (2) בָּאָדָם se vierte como ''entre los hombres'', lo que en español actual introduce una restricción masculina no exigida por el hebreo genérico אדם ni por la revisión inglesa ''among mankind''. Además, ''acechan sangre'' es comprensible pero poco idiomático; el sentido de לְדָמִים / יֶאֱרֹבוּ se expresa mejor en español con ''acechan para derramar sangre'' o similar.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene tres tropiezos de naturalidad/precisión: ''de la tierra'' no sigue la preferencia contextual del proyecto; ''entre los hombres'' suena innecesariamente masculino; y la nota [a] repite exactamente el texto principal, por lo que no funciona como alternativa real. ''Cada uno caza a su hermano con una red'' está bien y conserva la imagen. ''El fiel ha perecido'' es correcto, aunque ''ha desaparecido'' sería más suave y menos fiel a la fuerza del hebreo.'
  glossary_alignment: 'No hay términos de glosario mayores en disputa como Yahvé, Mesías, Espíritu, etc. Las decisiones importantes sí requieren ajuste respecto a los lineamientos del expediente: אדם debe representarse genéricamente en español sin introducir masculino específico; y el expediente lexical para הָאָרֶץ privilegia ''land'', por lo que en español conviene ''la tierra'' o mejor ''el país/la tierra'' según contexto, pero la nota debe preservar la alternativa real. Aquí ''del país'' en el texto con nota ''de la tierra'' sigue mejor la racionalidad documentada.'
  issues:
  - severity: medium
    issue: '''de la tierra'' no preserva la prioridad contextual de מִן הָאָרֶץ documentada en el POB inglés'
    rationale: El expediente inglés eligió 'from the land' por el marco profético-social y dejó 'earth' como alternativa. En español, el borrador pone 'de la tierra' en el texto y además repite esa misma lectura en la nota [a], anulando la distinción documentada.
  - severity: medium
    issue: '''entre los hombres'' introduce una especificación masculina innecesaria para בָּאָדָם'
    rationale: El hebreo אדם es genérico aquí, y la revisión inglesa evitó 'upright man' precisamente para no restringir el referente. En español, 'entre la humanidad' o 'entre la gente' comunica mejor el valor inclusivo y sigue la decisión teológica auditada.
  - severity: low
    issue: '''acechan sangre'' suena poco idiomático en español'
    rationale: Aunque intenta mantener la tersura hebrea, en español la combinación resulta dura. 'Acechan para derramar sangre' expresa con claridad el sentido homicida de לְדָמִים sin alejarse del original.
  - severity: low
    issue: La nota [a] es inválida porque repite el texto principal
    rationale: Si el texto dice 'de la tierra', la nota no puede decir 'O de la tierra'. Las notas deben conservar una alternativa real y distinta.
  revised_spanish_text: El fiel[a] ha perecido del país, y no hay entre la humanidad uno recto. Todos ellos acechan para derramar sangre; cada uno caza a su hermano[b] con una red[c].
  revised_footnotes:
