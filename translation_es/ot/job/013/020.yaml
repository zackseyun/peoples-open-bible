lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  - Sólo
  lexicon: HALOT
  rationale: אַךְ introduce una restricción o excepción en la súplica de Job. «Solo» conserva esa fuerza restrictiva en español natural y digno.
- source_word: שְׁתַּיִם
  english_pob_choice: two things
  chosen_spanish: dos cosas
  alternatives_spanish:
  - dos
  - dos asuntos
  lexicon: HALOT
  rationale: El hebreo presenta el numeral femenino «dos» sin sustantivo explícito. En español, «cosas» comunica con claridad la referencia elíptica sin añadir precisión no atestiguada.
- source_word: עִמָּדִי / עִם
  english_pob_choice: do not do ... to me
  chosen_spanish: no hagas conmigo
  alternatives_spanish:
  - no hagas ... contra mí
  - no trates conmigo
  lexicon: HALOT
  rationale: עָשָׂה con עִם puede expresar «hacer/tratar con». «Conmigo» refleja la relación directa del trato divino y suena más natural que un calco como «a mí» en esta estructura.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - así
  lexicon: HALOT
  rationale: אָז marca consecuencia o resultado. «Entonces» expresa de modo claro la relación condicional-resultativa del verso.
- source_word: מִפָּנֶיךָ
  english_pob_choice: from your face
  chosen_spanish: de tu rostro
  alternatives_spanish:
  - de tu presencia
  - de tu faz
  lexicon: HALOT
  rationale: El hebreo usa la imagen concreta de «rostro»; «tu rostro» preserva esa imagen. «Presencia» es una alternativa interpretativa posible, pero el texto base mantiene la referencia facial.
- source_word: לֹא אֶסָּתֵר
  english_pob_choice: I will not hide myself
  chosen_spanish: no me esconderé
  alternatives_spanish:
  - no me ocultaré
  - no me escondería
  lexicon: HALOT
  rationale: El nifal de סתר aquí se entiende de forma intransitiva/reflexiva. En español, «no me esconderé» comunica bien la acción sin introducir un énfasis excesivamente técnico como «seré escondido».
translation_notes:
  revision_awareness: 'Revisión en alta concordancia con el estado más reciente: el sentido global se mantiene sin cambios sustantivos. Se conserva la restricción de אַךְ, la elipsis de שְׁתַּיִם y el valor reflexivo de אֶסָּתֵר, con una nota para la alternativa «presencia» en מִפָּנֶיךָ.'
  spanish_consistency_notes:
  - Se usa «rostro» para מִפָּנֶיךָ, coherente con la metáfora hebrea y con el estilo POB de preservar imágenes cuando son transparentes.
  - Se evita «SEÑOR» como sustituto de nombres divinos porque este verso no contiene el Tetragrámaton ni κύριος.
  - «No me esconderé» mantiene el matiz reflexivo/intransitivo del nifal sin forzar una voz pasiva en español.
  - La puntuación con dos puntos al final sigue el registro del inglés auditado y deja abierta la continuación del discurso.
