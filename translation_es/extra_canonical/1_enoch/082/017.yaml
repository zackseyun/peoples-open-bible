translation:
  language: es
  text: 'Y estos son los nombres de los líderes que están bajo ellos: Berkael, Zelbesael, y otro que es añadido, el jefe de mil, cuyo nombre es Helyaseph[a]. Y los días del dominio de este[b] se han cumplido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Zelbesael, y otro que es añadido, el jefe de mil, cuyo nombre es Helyaseph”. El ge''ez es algo difícil en este punto y puede indicar que se añade a la lista un oficial adicional con ese rango.'
    reason: textual_variant
  - marker: b
    text: 'O: «los días de la autoridad de este se han cumplido». El término ge''ez puede denotar autoridad, dominio o poder delegado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አስማቲሆሙ
  english_pob_choice: their names
  chosen_spanish: los nombres de ellos
  alternatives_spanish:
  - sus nombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase introduce una lista nominal. En español, 'los nombres de ellos' conserva la referencia posesiva sin forzar una construcción posesiva más abstracta.
- source_word: መራሕያነ
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - jefes
  - guiadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término señala funciones de dirección dentro de una jerarquía. 'Líderes' mantiene el valor general sin imponer un matiz militar o eclesiástico no explícito.
- source_word: እለ መትሕቴሆሙ
  english_pob_choice: who are under them
  chosen_spanish: que están bajo ellos
  alternatives_spanish:
  - que están debajo de ellos
  - que les están subordinados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición relacional expresa subordinación jerárquica. 'Bajo ellos' es la forma más natural y conserva el sentido de dependencia.
- source_word: ብርክኤል
  english_pob_choice: Berkael
  chosen_spanish: Berkael
  alternatives_spanish:
  - Barkael
  lexicon: —
  rationale: Nombre propio transliterado. Se conserva la forma cercana al testimonio etiópico, sin traducirlo.
- source_word: ዜልብስኤል
  english_pob_choice: Zelbesael
  chosen_spanish: Zelbesael
  alternatives_spanish:
  - Zelbesa'el
  lexicon: —
  rationale: Nombre propio transliterado de manera conservadora, dado que la vocalización exacta es incierta.
- source_word: ዘይትዌሰክ
  english_pob_choice: who is added
  chosen_spanish: que es añadido
  alternatives_spanish:
  - que se añade
  - que es agregado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor pasivo/reflexivo indica una figura adicional incorporada a la serie. 'Es añadido' preserva la pasividad del original con español legible.
- source_word: ርእሰ ፲፻
  english_pob_choice: the head of a thousand
  chosen_spanish: el jefe de mil
  alternatives_spanish:
  - el cabeza de mil
  - el jefe de mil hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión literalmente es 'cabeza de mil'. En español, 'jefe de mil' transmite la idea jerárquica sin sonar artificial, aunque mantiene el número de manera formal.
- source_word: ስሙ
  english_pob_choice: whose name is
  chosen_spanish: cuyo nombre es
  alternatives_spanish:
  - de nombre
  - su nombre es
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge'ez incluye explícitamente la referencia al nombre. 'Cuyo nombre es' reproduce esa relación de manera fluida y fiel.
- source_word: ሂሉያሴፍ
  english_pob_choice: Helyaseph
  chosen_spanish: Helyaseph
  alternatives_spanish:
  - Hilu yaseph
  - Helyaséf
  lexicon: —
  rationale: Nombre propio conservado por transliteración, sin normalizar la vocalización.
- source_word: ተፈጸመ መዋዕለ ስልጣኑ
  english_pob_choice: the days of his dominion are completed
  chosen_spanish: los días de su dominio se han cumplido
  alternatives_spanish:
  - los días de su autoridad se han cumplido
  - se han cumplido los días de su dominio
  - los días de su reinado se han cumplido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa consumación/completitud, y ስልጣን puede significar autoridad o dominio. 'Dominio' conserva mejor el tono de orden y potestad del pasaje; 'se han cumplido' refleja la idea de un período completado, tal como exige el contexto cíclico de la obra.
- source_word: ለዝ
  english_pob_choice: for this one
  chosen_spanish: de este
  alternatives_spanish:
  - para este
  - de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo es algo áspero en español si se vierte literalmente. 'De este' permite integrar la referencia al personaje anterior y su periodo de dominio, sin añadir interpretación excesiva.
theological_decisions:
- issue: Jerarquía de cargos en el orden luminar
  english_pob_reading: Render the terms as administrative-hierarchical language ('leaders,' 'head of a thousand') rather than angelic interpretation in the main text.
  chosen_spanish_reading: Mantener lenguaje administrativo y jerárquico ('líderes', 'jefe de mil') sin identificar explícitamente a los personajes como ángeles en el texto principal.
  alternative_spanish_readings:
  - Interpretarlos explícitamente como jefes angélicos
  - Tomarlos solo como funcionarios astronómicos
  rationale: El versículo presenta una lista ordenada de nombres y rangos, pero no define aquí la naturaleza ontológica de esos seres. La traducción conserva la jerarquía sin resolver la cuestión interpretativa.
  doctrine_reference: Preservar la tensión interpretativa sin imponer una lectura doctrinal.
- issue: Valor de 'dominio' en el cierre del versículo
  english_pob_reading: the days of his dominion are completed
  chosen_spanish_reading: los días de su dominio se han cumplido
  alternative_spanish_readings:
  - los días de su autoridad se han cumplido
  - su periodo de gobierno ha terminado
  rationale: '''Dominio'' mantiene la fuerza de ስልጣን con un matiz de soberanía/poder delegado. La formulación evita convertirla en una simple nota temporal moderna y respeta el tono formal del libro.'
  doctrine_reference: No se especifica aquí una doctrina; se conserva la amplitud semántica del original.
translation_notes:
  revision_awareness: 'La versión española toma en cuenta la revisión más reciente del audit trail: se conserva la presencia explícita de ''cuyo nombre es'' para reflejar ስሙ, y se interpreta el final como cumplimiento de días en un sentido de período concluido, coherente con el marco cíclico del pasaje. También se mantiene la secuencia nominal sin fusionar el cargo con el nombre propio.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; aquí no aparece.
  - Se mantiene 'dominio' para ስልጣን por consistencia con un registro de autoridad/cargo, no 'reinado' salvo que el contexto lo exija.
  - Los nombres propios se transliteran sin adaptación devocional.
  - Se evita 'SEÑOR' y otras sustituciones tradicionales que no corresponden al original de este versículo.
  - La sintaxis busca ser publicable y natural en español, pero sin aplanar la ambigüedad textual del ge'ez.
