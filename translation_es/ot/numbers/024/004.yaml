translation:
  language: es
  text: 'la declaración de quien oye las palabras de Dios[a], de quien ve la visión del Todopoderoso, cayendo[b], aunque con los ojos descubiertos:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el oráculo de quien oye las palabras de Dios». El hebreo נְאֻם es un término profético formal para una expresión solemne.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pero con los ojos descubiertos» o «con los ojos abiertos». Literalmente: «con los ojos descubiertos», preservando la imagen de una percepción revelada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְאֻם
  english_pob_choice: the declaration of
  chosen_spanish: el oráculo de
  alternatives_spanish:
  - la declaración de
  - la palabra de
  lexicon: HALOT
  rationale: נְאֻם es una fórmula profética solemne. En español, «oráculo de» conserva mejor ese tono técnico y ceremonial que «declaración de», sin perder el carácter de utterance profético.
- source_word: שֹׁמֵעַ
  english_pob_choice: one who hears
  chosen_spanish: quien oye
  alternatives_spanish:
  - el que oye
  - uno que oye
  lexicon: HALOT
  rationale: El participio funciona de modo sustantivo y caracteriza a Balaam. «Quien oye» es natural en español y conserva la idea de una cualidad continua.
- source_word: אִמְרֵי אֵל
  english_pob_choice: the words of God
  chosen_spanish: las palabras de Dios
  alternatives_spanish:
  - los dichos de Dios
  - las expresiones de Dios
  lexicon: HALOT
  rationale: אִמְרֵי es un plural constructo de «palabras/dichos». «Las palabras de Dios» es la opción más transparente y bíblicamente clara en español. אֵל aquí funciona como título divino común, por eso se traduce «Dios».
- source_word: מַחֲזֵה
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - una visión
  - la apariencia
  lexicon: HALOT
  rationale: מַחֲזֵה designa una visión revelatoria. El artículo definido preserva la referencia a la experiencia visionaria concreta.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Como título divino, se traduce por su valor semántico. «El Todopoderoso» es la equivalencia tradicional y comprensible en español para שַׁדַּי.
- source_word: יֶחֱזֶה
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - contempla
  - mira
  lexicon: HALOT
  rationale: Aunque el verbo aparece en forma imperfecta, aquí funciona de manera descriptiva/gnómica en paralelo con «oye». «Ve» mantiene la sencillez y el paralelismo.
- source_word: נֹפֵל
  english_pob_choice: falling down
  chosen_spanish: cayendo
  alternatives_spanish:
  - postrado
  - caído
  lexicon: HALOT
  rationale: El participio verbal conserva mejor la imagen del movimiento o estado durante la recepción profética. «Cayendo» mantiene el valor verbal sin fijar demasiado la postura.
- source_word: וּגְל֥וּי עֵינָיִם
  english_pob_choice: yet with eyes uncovered
  chosen_spanish: y con los ojos descubiertos
  alternatives_spanish:
  - pero con los ojos abiertos
  - y con los ojos velados
  lexicon: HALOT
  rationale: La imagen literal es de ojos «descubiertos» o «desvelados». En español, «con los ojos descubiertos» conserva el contraste imagístico mejor que «abiertos», aunque suene menos idiomático; el contexto poético lo sostiene.
theological_decisions:
- issue: Tratamiento de שַׁדַּי como título divino
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  rationale: La política del proyecto favorece traducir títulos divinos. «El Todopoderoso» comunica el sentido del título sin transliteración, y evita dejar sin explicar un hebraísmo que en español sería opaco.
  doctrine_reference: Translation philosophy §2 (Translate titles; transliterate names)
- issue: Fuerza concesiva de la última cola
  english_pob_reading: falling down, yet with eyes uncovered
  chosen_spanish_reading: cayendo, y con los ojos descubiertos
  alternative_spanish_readings:
  - cayendo, pero con los ojos descubiertos
  - postrado, y con los ojos descubiertos
  rationale: El hebreo yuxtapone estado físico y percepción revelatoria. Aunque el conector explícito «yet» no se marca de forma fuerte en el texto base, la coma y la coordinación conservan la tensión entre abatimiento corporal y visión abierta.
  doctrine_reference: Poetic syntax preservation / concessive nuance
translation_notes:
  revision_awareness: Se ha seguido el texto hebreo masorético dado y el resultado auditado en inglés, respetando la revisión reciente que enfatiza la relación concesiva entre la caída física y la visión profética. La elección española preserva esa tensión poética sin añadir contenido nuevo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל y «el Todopoderoso» para שַׁדַּי, conforme a la terminología del proyecto.
  - «Oráculo» se usa como equivalente solemne de נְאֻם, en lugar de una paráfrasis más débil.
  - Se conserva el paralelismo verbal «oye / ve» y la imagen corporal de «cayendo» para reflejar la estructura poética del verso.
