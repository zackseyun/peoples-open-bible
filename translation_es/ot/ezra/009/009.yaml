base_translation:
  language: en
  yaml_path: translation/ot/ezra/009/009.yaml
  text: For we are slaves[a]; yet in our slavery our God has not forsaken us, but has extended steadfast love to us before the kings of Persia, to give us reviving, to raise up the house of our God, to restore its ruins[b], and to give us a wall in Judah and in Jerusalem.
  footnotes:
  - marker: a
    text: Or 'steadfast love,' 'kindness,' or 'favor' for 'covenant faithfulness.' The Hebrew חֶסֶד carries the sense of loyal, gracious covenant mercy.
    reason: lexical_alternative
  - marker: b
    text: Or 'a protective enclosure' or 'a hedge.' The image may refer more broadly to security and protection in Judah and Jerusalem, not only to a literal wall.
    reason: lexical_alternative
