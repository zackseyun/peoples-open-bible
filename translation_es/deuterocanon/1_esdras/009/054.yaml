translation:
  language: es
  text: Y todos se fueron a comer, a beber y a alegrarse, y a enviar porciones a los que no tenían nada[a], y a alegrarse grandemente;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los que no tenían porciones preparadas»; el paralelo hebreo habla explícitamente de enviar porciones de comida a quienes carecían de ellas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾤχοντο
  english_pob_choice: went away
  chosen_spanish: se fueron
  alternatives_spanish:
  - salieron
  - se fueron de allí
  - partieron
  lexicon: LSJ
  rationale: El verbo ᾤχοντο comunica salida o alejamiento del lugar. En español, «se fueron» reproduce de manera natural ese movimiento de dispersión desde la asamblea sin añadir matices no presentes.
- source_word: φαγεῖν καὶ πιεῖν
  english_pob_choice: to eat and drink
  chosen_spanish: a comer, a beber
  alternatives_spanish:
  - para comer y beber
  - a comer y beber
  lexicon: LSJ
  rationale: La serie infinitiva expresa finalidad o contenido de la acción. La construcción española con «a» mantiene la coordinación breve y la claridad del original.
- source_word: εὐφραίνεσθαι
  english_pob_choice: to rejoice
  chosen_spanish: a alegrarse
  alternatives_spanish:
  - a regocijarse
  - a celebrar
  lexicon: LSJ
  rationale: «Alegrarse» conserva el sentido de gozo festivo sin forzar un registro demasiado litúrgico. Dado que el versículo repite la idea de regocijo, conviene distinguirla claramente en la frase.
- source_word: δοῦναι ἀποστολὰς
  english_pob_choice: to send portions
  chosen_spanish: a enviar porciones
  alternatives_spanish:
  - a mandar porciones
  - a repartir porciones
  - a enviar partes
  lexicon: LSJ
  rationale: La combinación griega, apoyada por el paralelo hebreo, apunta a porciones de comida compartidas en la fiesta. «Enviar porciones» conserva la imagen de hacer llegar alimentos a otros y respeta la forma del POB inglés.
- source_word: τοῖς μὴ ἔχουσιν
  english_pob_choice: to those who had nothing
  chosen_spanish: a los que no tenían nada
  alternatives_spanish:
  - a los que no tenían
  - a los que no tenían porciones
  - a los que carecían de alimento
  lexicon: LSJ
  rationale: El griego es elíptico; el paralelo hebreo aclara que se trata de quienes carecen de provisiones para la fiesta. «No tenían nada» mantiene la amplitud del inglés POB y sigue siendo natural en español.
- source_word: εὐφρανθῆναι μεγάλως
  english_pob_choice: to rejoice greatly
  chosen_spanish: a alegrarse grandemente
  alternatives_spanish:
  - a regocijarse grandemente
  - a alegrarse mucho
  lexicon: LSJ
  rationale: La repetición intensifica el gozo. «Grandemente» conserva el adverbio del original y evita debilitar la reiteración enfática del texto griego.
theological_decisions:
- issue: Sentido de «porciones» en relación con el paralelo hebreo
  english_pob_reading: sending portions to those who had nothing
  chosen_spanish_reading: enviar porciones a los que no tenían nada
  alternative_spanish_readings:
  - enviar porciones a los que no tenían porciones
  - repartir porciones a los que no tenían
  rationale: El hebreo paralelo habla explícitamente de enviar porciones de comida; el griego es más abreviado. La redacción española conserva la amplitud del griego y deja que el paralelo aclare el tipo de porciones sin estrechar indebidamente el sentido.
  doctrine_reference: 'PHILOSOPHY.md: los paralelos hebreos de 1 Esdras se usan como insumo real de traducción, con el griego como texto primario.'
- issue: Duplicación del verbo de gozo en el versículo
  english_pob_reading: to rejoice ... and to rejoice greatly
  chosen_spanish_reading: a alegrarse ... y a alegrarse grandemente
  alternative_spanish_readings:
  - a regocijarse ... y a regocijarse grandemente
  - a alegrarse ... y a celebrarse grandemente
  rationale: El griego distingue entre εὐφραίνεσθαι y εὐφρανθῆναι μεγάλως; no debe borrarse la repetición enfática. La traducción mantiene ambos miembros para preservar la intensificación retórica del texto.
  doctrine_reference: 'PHILOSOPHY.md: evitar aplanar tensiones léxicas o retóricas documentadas.'
translation_notes:
  revision_awareness: La redacción sigue el último pase del POB inglés, que restauró la idea explícita de «rejoicing» en la primera serie verbal. También incorpora el paralelo hebreo para mantener el sentido de las «porciones» sin perder la primacía del griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantuvo «porciones» en lugar de vocablos eclesiásticos más libres como «ofrendas» o «dones», porque el contexto de comida compartida es central.
  - Se preservó la repetición de alegría en dos miembros distintos para no borrar la intensificación del griego.
