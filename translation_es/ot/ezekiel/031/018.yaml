revisions:
- from: ¿A quién fuiste comparado[a] así en gloria y grandeza entre los árboles de Edén? Sin embargo, serás derribado con los árboles de Edén a la tierra de abajo; en medio de los incircuncisos yacerás con los muertos[b] a espada. Este es Faraón y toda su multitud[c] —declara el Señor Yahvé.
  to: ¿A quién te parecías[a] así en gloria y grandeza entre los árboles de Edén? Sin embargo, serás derribado con los árboles de Edén a la tierra de abajo[b]; en medio de los incircuncisos yacerás con los muertos por la espada. Este es Faraón y toda su multitud —declara el Señor Yahvé.
  rationale: Se corrigió la primera cláusula para reflejar fielmente דָמִיתָ como verbo de semejanza en segunda persona, evitando el pasivo no presente en el hebreo. Se reemplazó la nota [a] por una alternativa real y útil. Se añadió una nota en «tierra de abajo» para preservar las alternativas semánticas documentadas para אֶרֶץ תַּחְתִּית. También se afinó «muertos a espada» a «muertos por la espada» para mejor naturalidad y precisión.
