translation:
  language: es
  text: Pero el pueblo de la tierra mató[a] a todos los que habían conspirado contra el rey Amón, y el pueblo de la tierra hicieron rey a Josías su hijo, en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a todos los conspiradores contra el rey Amón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - mató
  - derribó
  lexicon: HALOT
  rationale: El hebreo נכה aquí describe una acción violenta y probablemente mortal contra los conspiradores. En español, «hirió» conserva la fuerza del acto sin introducir una formulación demasiado interpretativa como «mató»; además permite mantener la tensión léxica de un golpe/ataque violento.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - la población del país
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea como grupo sociopolítico, siguiendo de cerca la forma del original y la decisión auditada en inglés. «Pueblo de la tierra» es comprensible en español bíblico y evita borrar el matiz técnico de la frase.
- source_word: כָּל הַקֹּשְׁרִים
  english_pob_choice: all those who had conspired
  chosen_spanish: a todos los que habían conspirado
  alternatives_spanish:
  - a todos los conspiradores
  - a todos los que habían tramado
  lexicon: HALOT
  rationale: El participio expresa personas ya comprometidas en una conspiración; «los que habían conspirado» reproduce bien ese valor verbal y mantiene la relación causal con la violencia ejercida. Se evita «conspiradores» porque en español puede sonar más nominal y menos temporal.
- source_word: עַל הַמֶּלֶךְ אָמוֹן
  english_pob_choice: against King Amon
  chosen_spanish: contra el rey Amón
  alternatives_spanish:
  - contra el rey Amon
  - frente al rey Amón
  lexicon: HALOT
  rationale: «Contra» expresa de forma natural la hostilidad de קָשַׁר con עַל en este contexto. Se mantiene el título «rey» como en el inglés auditado, y «Amón» con acento según uso español.
- source_word: וַיַּמְלִיכוּ
  english_pob_choice: made ... king
  chosen_spanish: hizo rey a Josías
  alternatives_spanish:
  - proclamó rey a Josías
  - lo hizo rey
  lexicon: HALOT
  rationale: El hifil de מלך indica causar que alguien reine o hacerlo rey. «Hizo rey a Josías» es fiel, breve y no añade una ceremonia de coronación que el texto no menciona.
- source_word: יֹאשִׁיָּהוּ בְנוֹ
  english_pob_choice: Josiah his son
  chosen_spanish: Josías, su hijo
  alternatives_spanish:
  - su hijo Josías
  - Josías, el hijo de él
  lexicon: HALOT
  rationale: Se opta por un orden natural en español con el apposicional «su hijo», manteniendo la relación de filiación sin perder claridad. El nombre propio se translitera como «Josías».
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - en su puesto
  lexicon: HALOT
  rationale: La locución indica sucesión o reemplazo. «En su lugar» es la forma española más idiomática para un cambio de rey, y conserva la idea de sustitución sin ampliar el sentido.
- source_word: וַ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: Hebrew waw-consecutive usage
  rationale: Se mantiene el valor discursivo contrastivo del conector al inicio del versículo, en continuidad con el contexto inmediato de la muerte de Amón. «Pero» reproduce mejor el giro narrativo que un simple «y».
translation_notes:
  revision_awareness: La revisión más reciente del expediente inglés no introdujo cambios y el control cruzado reporta alta concordancia; por tanto, esta propuesta sigue de cerca la solución auditada en inglés, ajustando solo la naturalidad y la terminología española sin perder la tensión léxica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «pueblo de la tierra» de forma consistente para עַם הָאָרֶץ.
  - Se conserva «rey» para אָמוֹן y para la entronización de Josías, siguiendo el registro del texto narrativo.
  - El verbo principal se traduce con un término violento pero no excesivamente interpretativo, acorde con el valor contextual de נכה.
  - La nota al pie preserva la alternativa léxica documentada en el inglés auditado.
