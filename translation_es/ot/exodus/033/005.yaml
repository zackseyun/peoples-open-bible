translation:
  language: es
  text: 'Yahvé dijo a Moisés: «Di a los hijos de Israel: “Ustedes son un pueblo duro de cerviz. Si yo subiera en medio de ustedes[b] por un solo momento, los consumiría[c]. Así que ahora, quítense de encima sus adornos[d], para que yo sepa[e] lo que haré con ustedes”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O 'entre ustedes'; el hebreo puede leerse como presencia en medio del pueblo o entre ellos.
    reason: alternative_reading
  - marker: c
    text: O 'los destruiría'. El verbo hebreo puede expresar consumo total o destrucción completa por juicio.
    reason: lexical_alternative
  - marker: d
    text: O 'sus joyas' o 'su adorno'; el término hebreo es amplio y puede abarcar joyería y otros ornamentos.
    reason: lexical_alternative
  - marker: e
    text: El hebreo dice literalmente 'y sabré qué haré con ustedes'; se conserva el verbo 'saber' para respetar la expresión antropomórfica del original.
    reason: theological_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: rendering of the Tetragrammaton
  rationale: Se conserva el nombre propio divino como transliteración tradicional y transparente. 'Yahvé' corresponde al mismo principio que el inglés POB 'Yahweh' y evita la sustitución por un título.
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Dile
  - Habla
  lexicon: imperativo de אמר
  rationale: El imperativo directo a Moisés pide una orden breve y natural en español. 'Di' mantiene la inmediatez del mandato sin añadir matices no presentes.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: idioma filial/corporativo
  rationale: '''Hijos'' conserva la imagen hebrea de בני y funciona de manera corporativa en español. ''Israelitas'' sería más fluido, pero borra el eco lexical del hebreo que el POB inglés preserva con ''sons''.'
- source_word: עַם קְשֵׁה עֹרֶף
  english_pob_choice: a stiff-necked people
  chosen_spanish: un pueblo duro de cerviz
  alternatives_spanish:
  - un pueblo terco
  - un pueblo de cerviz dura
  lexicon: idioma hebreo
  rationale: Se mantiene la metáfora corporal del hebreo en una forma bíblicamente reconocible en español. 'Duro de cerviz' preserva la fuerza idiomática y no la aplana a 'terco'.
- source_word: רֶגַע אֶחָד
  english_pob_choice: for one moment
  chosen_spanish: por un solo momento
  alternatives_spanish:
  - por un momento
  - en un solo instante
  lexicon: duración mínima
  rationale: La expresión indica brevísima duración. 'Por un solo momento' comunica la inmediatez con un registro natural y fiel al valor temporal del hebreo.
- source_word: אֶעֱלֶה בְקִרְבְּךָ
  english_pob_choice: if I were to go up in your midst
  chosen_spanish: si yo subiera en medio de ustedes
  alternatives_spanish:
  - si yo subiera entre ustedes
  - si yo subiera en su medio
  lexicon: presencia/covenio
  rationale: '''Subiera'' conserva el verbo de ascenso, y ''en medio de ustedes'' reproduce la imagen de presencia cercana. Se resuelve el singular colectivo del hebreo como plural natural en español para Israel corporativo.'
- source_word: וְכִלִּיתִיךָ
  english_pob_choice: I would consume you
  chosen_spanish: los consumiría
  alternatives_spanish:
  - los destruiría
  - acabaría con ustedes
  lexicon: כלה de juicio total
  rationale: '''Consumiría'' mantiene el matiz de aniquilación total y la resonancia bíblica del verbo, como en el POB inglés. Se evita reducirlo a una mera derrota parcial.'
- source_word: הוֹרֵד עֶדְיְךָ מֵעָלֶיךָ
  english_pob_choice: take off your ornaments from upon you
  chosen_spanish: quítense sus adornos de encima de ustedes
  alternatives_spanish:
  - quítense sus joyas de encima
  - saquen sus adornos de sobre ustedes
  lexicon: adornment/ornament
  rationale: '''Adornos'' es lo bastante amplio para abarcar joyas y otros ornamentos, como en el análisis del POB. ''De encima de ustedes'' refleja la preposición hebrea y sugiere quitar algo llevado sobre el cuerpo.'
- source_word: וְאֵדְעָה
  english_pob_choice: that I may know
  chosen_spanish: para que yo sepa
  alternatives_spanish:
  - y sabré
  - de modo que yo sepa
  lexicon: cohortativo/resultativo
  rationale: Se expresa el valor final/resultativo del hebreo sin perder la formulación con 'conocer'. 'Para que yo sepa' corresponde al sentido que el POB preserva como lenguaje antropomórfico.
- source_word: מָה אֶעֱשֶׂה לָּךְ
  english_pob_choice: what I will do to you
  chosen_spanish: lo que haré con ustedes
  alternatives_spanish:
  - lo que les haré
  - qué haré con ustedes
  lexicon: decisión divina abierta
  rationale: '''Haré con ustedes'' conserva la apertura semántica del hebreo y la lectura auditable del POB (''do with you''). Se evita fijar anticipadamente un matiz solo punitivo.'
theological_decisions:
- issue: Lenguaje antropomórfico del conocimiento divino
  english_pob_reading: that I may know what I will do to you
  chosen_spanish_reading: para que yo sepa lo que haré con ustedes
  alternative_spanish_readings:
  - para que yo decida lo que haré con ustedes
  - para que yo determine lo que haré con ustedes
  rationale: Se preserva el verbo 'saber/conocer' en vez de suavizarlo a una mera toma de decisión. Así se mantiene la tensión teológica del texto hebreo y el valor relacional del lenguaje divino.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Forma corporativa singular/plural al dirigirse a Israel
  english_pob_reading: your midst / you / you
  chosen_spanish_reading: en medio de ustedes / los consumiría / con ustedes
  alternative_spanish_readings:
  - en medio de ti / te consumiría / contigo
  - en medio del pueblo / lo consumiría / con él
  rationale: El hebreo alterna formas singulares y plurales para Israel como colectivo. El español usa el plural para que el discurso sea natural y a la vez conserve el destinatario corporativo.
  doctrine_reference: Corporate singular addressee in Exodus 33:5
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del inglés POB: se mantuvo la colocación natural de ''por un solo momento'' y se reflejó la decisión final de preservar ''that I may know'' en vez de suavizarlo a una fórmula meramente decisoria. También se respetó la lectura corporativa de Israel y la amplitud semántica de עֶדִי y מָה אֶעֱשֶׂה לָּךְ.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrama, en coherencia con el proyecto.
  - Se mantiene 'hijos de Israel' por fidelidad lexical al hebreo, no 'israelitas'.
  - '''Duro de cerviz'' conserva el idiomatismo bíblico equivalente a ''stiff-necked''.'
  - '''Adornos'' se prefiere a ''joyas'' por amplitud semántica.'
  - Se evita traducir el conocimiento divino como simple decisión para no perder la tensión antropomórfica.
