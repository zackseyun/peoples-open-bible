base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/008/001.yaml
  text: Oh[a], that you were like a brother to me, who nursed at my mother’s breasts! If I found you outside, I would kiss you[c][b], and no one would despise me.
  footnotes:
  - marker: a
    text: Or, 'If only you were like a brother to me.' The opening Hebrew idiom expresses a wish.
    reason: lexical_alternative
  - marker: b
    text: That is, a brother who had shared the same mother’s nursing, making public affection socially acceptable.
    reason: cultural_note
  - marker: c
    text: Hebrew literally, 'they would not despise me,' using an indefinite plural for general public disapproval.
    reason: lexical_alternative
