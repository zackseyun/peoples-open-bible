translation:
  language: es
  text: Entonces[a], cuando vea que el muchacho no está, morirá, y tus siervos harán descender la canicie de tu siervo nuestro padre a Seol con dolor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "al sepulcro" o "al reino de los muertos". Hebreo: "Seol".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y sucederá
  - Y será
  lexicon: HALOT
  rationale: Funciona como conector discursivo que introduce la consecuencia del escenario anterior; en español 'Entonces' comunica mejor el valor resultativo sin calcar la fórmula hebrea.
- source_word: כִּרְאֹתוֹ
  english_pob_choice: when he sees
  chosen_spanish: cuando vea
  alternatives_spanish:
  - al verlo
  - cuando lo vea
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo temporal expresa circunstancia temporal; en español, 'cuando vea' reproduce de forma natural la relación temporal del texto.
- source_word: כִּי אֵין הַנַּעַר
  english_pob_choice: that the boy is not there
  chosen_spanish: que el muchacho no está
  alternatives_spanish:
  - que el muchacho no está allí
  - que el muchacho está ausente
  lexicon: HALOT
  rationale: אֵין expresa inexistencia o ausencia en el contexto. 'No está' mantiene la idea de ausencia percibida sin añadir la implicación de muerte que el hebreo aún no formula aquí.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el joven
  - el niño
  lexicon: HALOT
  rationale: נַעַר puede ser 'joven', 'muchacho' o 'muchacho/niño' según contexto. Aquí 'muchacho' conserva el tono afectivo y familiar del relato y encaja bien con Benjamin.
- source_word: וָמֵת
  english_pob_choice: he will die
  chosen_spanish: morirá
  alternatives_spanish:
  - y morirá
  - entonces morirá
  lexicon: HALOT
  rationale: El qatal con waw mantiene valor consecutivo de resultado futuro en el contexto. 'Morirá' expresa el futuro sin sobrecargar la frase con repeticiones innecesarias.
- source_word: וְהוֹרִידוּ
  english_pob_choice: will bring down
  chosen_spanish: harán bajar
  alternatives_spanish:
  - llevarán hacia abajo
  - harán descender
  lexicon: HALOT
  rationale: El hifil de ירד conserva el movimiento causado hacia abajo. 'Harán bajar' transmite la idea idiomática y el efecto metafórico hacia Seol.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede significar 'esclavo', en este discurso deferente ante autoridad la fórmula española más natural y fiel es 'siervos', que preserva el tono de sumisión reverente del hablante.
- source_word: שֵׂיבַת
  english_pob_choice: the gray hair
  chosen_spanish: la canicie
  alternatives_spanish:
  - las canas
  - la vejez
  lexicon: HALOT
  rationale: El término apunta literalmente a la canicie/las canas y, por extensión, a la ancianidad. 'Canicie' conserva la imagen concreta del hebreo y su valor idiomático.
- source_word: עַבְדְּךָ אָבִינוּ
  english_pob_choice: of your servant our father
  chosen_spanish: de tu siervo, nuestro padre
  alternatives_spanish:
  - de tu siervo nuestro padre
  - de tu siervo, el padre nuestro
  lexicon: HALOT
  rationale: Se preserva la aposición entre 'tu siervo' y 'nuestro padre'. El orden español mantiene la relación sintáctica y el tono respetuoso dirigido al interlocutor.
- source_word: בְּיָגוֹן
  english_pob_choice: in sorrow
  chosen_spanish: con dolor
  alternatives_spanish:
  - en dolor
  - en tristeza
  - con pesar
  lexicon: HALOT
  rationale: יָגוֹן denota dolor, pena o tristeza profunda. 'Con dolor' comunica de forma natural la carga afectiva del hebreo en español contemporáneo.
- source_word: שְׁאֹלָה
  english_pob_choice: to Sheol
  chosen_spanish: a Seol
  alternatives_spanish:
  - al Seol
  - a la tumba
  - al reino de los muertos
  lexicon: HALOT
  rationale: Se conserva el término técnico como 'Seol' para no reducir su alcance semántico a una sola noción como 'tumba'. La transliteración mantiene la tensión conceptual del hebreo.
theological_decisions:
- issue: Tratamiento de שְׁאֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: El hebreo presenta שְׁאוֹל con un campo semántico más amplio que un simple sepulcro. Mantener 'Seol' evita imponer una interpretación doctrinal cerrada y preserva el mundo conceptual del texto.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con el sentido auditado en la traducción inglesa; no se detectaron revisiones aplicadas en el expediente, y se mantiene la equivalencia óptima con preservación del término técnico Seol.
  spanish_consistency_notes:
  - Se mantuvo 'Seol' como transliteración consistente del término hebreo.
  - Se usó 'siervo' para עֶבֶד en un contexto de cortesía ante autoridad, en línea con el valor deferente del discurso.
  - '''Canicie'' conserva la imagen concreta de ''gray hair'' sin diluirla en una paráfrasis de ''vejez''.'
  - 'La cadencia española conserva la secuencia condicional-resultativa del hebreo: temporalidad, percepción, ausencia, muerte y descenso a Seol.'
