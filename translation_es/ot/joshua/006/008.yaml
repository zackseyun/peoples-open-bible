translation:
  language: es
  text: Y aconteció que, cuando Josué habló al pueblo, los siete sacerdotes que llevaban siete trompetas de cuerno de carnero[a] delante de Yahvé[b] pasaron y tocaron las trompetas; y el arca del pacto de Yahvé iba detrás de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las siete trompetas de los yobel»; en este contexto probablemente significa trompetas de cuerno de carnero, aunque «trompetas de jubileo» también es posible, pero menos probable.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en presencia de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa wayyiqtol se conserva con un giro natural en español que introduce la secuencia de eventos sin sonar mecánico. 'Aconteció' mantiene el valor discursivo tradicional y suficientemente claro.
- source_word: כֶּאֱמֹר
  english_pob_choice: when Joshua spoke
  chosen_spanish: cuando Josué habló
  alternatives_spanish:
  - as Josué dijo
  - cuando Josué había hablado
  lexicon: HALOT
  rationale: El infinitivo constructo con כ expresa temporalidad. 'Cuando habló' reproduce de manera directa la relación temporal del hebreo y evita sobrerrefinar el tiempo verbal.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la asamblea
  lexicon: HALOT
  rationale: Aquí עם designa al pueblo reunido de Israel, no una unidad militar específica. 'Pueblo' preserva el alcance colectivo y bíblico del término.
- source_word: שִׁבְעָה הַכֹּהֲנִים
  english_pob_choice: the seven priests
  chosen_spanish: los siete sacerdotes
  alternatives_spanish:
  - los siete sacerdotes
  - siete sacerdotes
  lexicon: HALOT
  rationale: Es una correspondencia directa y natural al sintagma numeral + sustantivo definido por contexto.
- source_word: נֹשְׂאִים
  english_pob_choice: carrying
  chosen_spanish: que llevaban
  alternatives_spanish:
  - que portaban
  - que cargaban
  lexicon: HALOT
  rationale: El participio describe a los sacerdotes en acción continua. 'Llevaban' es idiomático en español y conserva la imagen de portar las trompetas.
- source_word: שִׁבְעָה שׁוֹפְרוֹת הַיֹּבְלִים
  english_pob_choice: the seven ram's-horn trumpets
  chosen_spanish: siete trompetas de cuerno de carnero
  alternatives_spanish:
  - siete trompetas de carnero
  - siete cuernos de carnero
  - siete trompetas jubilares
  lexicon: HALOT
  rationale: שופר es un instrumento de cuerno/trompeta; יוֹבֵל aquí probablemente califica el material o tipo de cuerno, no el sentido técnico posterior de 'jubileo'. 'Cuerno de carnero' comunica el valor más probable y evita el tecnicismo menos seguro.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa ubicación delante o en presencia de. Se mantiene el nombre divino como 'Yahvé' según la convención de la obra, y 'delante de' conserva mejor la escena procesional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la decisión doctrinal del proyecto de reproducir el Tetragrámaton con el nombre propio 'Yahvé', no con una sustitución titulativa.
- source_word: עָבְרוּ
  english_pob_choice: passed on
  chosen_spanish: pasaron
  alternatives_spanish:
  - siguieron adelante
  - avanzaron
  - pasaron adelante
  lexicon: HALOT
  rationale: En este contexto procesional עבר describe avanzar en la marcha. 'Pasaron' es natural y suficientemente preciso en español.
- source_word: וְתָקְעוּ בַּשּׁוֹפָרוֹת
  english_pob_choice: and blew the trumpets
  chosen_spanish: y tocaron las trompetas
  alternatives_spanish:
  - y soplaron las trompetas
  - y hicieron sonar las trompetas
  - y tocaron los cuernos
  lexicon: HALOT
  rationale: תקע con שופר se rinde bien como 'tocar' en español bíblico y contemporáneo. 'Tocar las trompetas' conserva la acción instrumental sin forzar un calco.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahweh
  - el arca del pacto de Yahvé
  - el arca del pacto del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la cadena constructa con un español transparente y reverente. 'Pacto' es la equivalencia funcional de ברית; 'Yahvé' conserva el nombre divino sin sustitución.
- source_word: הֹלֵךְ אַחֲרֵיהֶם
  english_pob_choice: went behind them
  chosen_spanish: iba detrás de ellos
  alternatives_spanish:
  - seguía detrás de ellos
  - iba siguiéndolos
  - caminaba detrás de ellos
  lexicon: HALOT
  rationale: El participio con valor progresivo expresa movimiento continuo. 'Iba detrás de ellos' conserva la imagen espacial y el carácter procesional de la frase.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La lectura auditada del proyecto sustituye el Tetragrámaton por la transliteración del nombre divino. En español, 'Yahvé' es la forma estándar del mismo criterio y evita la sustitución por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de שׁוֹפְרוֹת הַיֹּבְלִים
  english_pob_reading: ram's-horn trumpets
  chosen_spanish_reading: trompetas de cuerno de carnero
  alternative_spanish_readings:
  - trompetas jubilares
  - cuernos de carnero
  rationale: El contexto de marcha ritual favorece la lectura de instrumentos de cuerno de carnero, no la acepción técnica posterior de 'jubileo'. La formulación elegida conserva la posible tensión lexical sin imponer el sentido menos probable.
  doctrine_reference: HALOT; auditable lexical choice in English POB footnote a
- issue: Procesión delante del nombre divino
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - en presencia de Yahvé
  - ante Yahvé
  rationale: La expresión indica localización ritual/procesional. 'Delante de Yahvé' mantiene la relación espacial y el matiz de presencia, concordando con el seguimiento del arca.
  doctrine_reference: HALOT; english_pob_translation footnote b
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que ajustó la secuencia verbal de 'when Joshua had spoken' a 'when Joshua spoke' por mayor ajuste al hebreo. En español se reflejó directamente con 'cuando Josué habló'. También se preservó la decisión mantenida de traducir יְהוָה con el nombre divino 'Yahvé'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה, conforme a la política del proyecto.
  - '''Arca del pacto'' sigue el orden natural en español y conserva la relación de ברית sin introducir glosa.'
  - '''Trompetas de cuerno de carnero'' evita el tecnicismo ''jubileo'' como lectura principal, pero la nota mantiene la alternativa documentada.'
  - El verbo 'iba' en la última cláusula preserva el aspecto progresivo del participio hebreo.
  - Se prefirió 'tocar las trompetas' por ser la expresión española más clara para תקע con שופר.
