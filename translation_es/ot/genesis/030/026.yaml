    text: Or 'for which I have served you,' taking the reference more specifically to the wives rather than to the whole family just mentioned.
    reason: lexical_alternative
  - marker: b
    text: '''Service'' may also be rendered ''labor'' or ''work''; the translation keeps ''service'' to reflect the repeated Hebrew root for ''serve/work'' in this verse.'
    reason: lexical_alternative
