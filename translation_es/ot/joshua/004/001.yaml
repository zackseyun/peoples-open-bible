translation:
  language: es
  text: Y sucedió[a] que, cuando toda la nación habían terminado de cruzar el Jordán, Yahvé dijo a Josué,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el pueblo»; el hebreo «toda la nación» usa un sustantivo colectivo singular para Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una nueva secuencia de eventos. «Aconteció» conserva bien el valor discursivo del hebreo sin sonar arcaico; el añadido de «Y» refleja la continuidad narrativa de וַ־.
- source_word: כַּאֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al momento en que
  - después que
  lexicon: HALOT
  rationale: La cláusula temporal pide una equivalencia directa y natural en español. «Cuando» expresa adecuadamente la simultaneidad/temporalidad del contexto.
- source_word: תַּמּוּ
  english_pob_choice: had finished
  chosen_spanish: había terminado
  alternatives_spanish:
  - terminó
  - fue terminado
  lexicon: HALOT
  rationale: El hebreo marca una acción completada antes del verbo principal; en español el pluscuamperfecto comunica mejor esa anterioridad temporal.
- source_word: כָל הַגּוֹי
  english_pob_choice: all the nation
  chosen_spanish: toda la nación
  alternatives_spanish:
  - todo el pueblo
  - la nación entera
  lexicon: HALOT
  rationale: «גּוֹי» aquí funciona como colectivo singular referido a Israel. «Toda la nación» conserva esa fuerza colectiva mejor que una simple adaptación a «pueblo», sin borrar la tensión entre colectividad y singularidad.
- source_word: לַעֲבוֹר
  english_pob_choice: crossing
  chosen_spanish: cruzar
  alternatives_spanish:
  - pasar
  - atravesar
  lexicon: HALOT
  rationale: El infinitivo de acción se traduce naturalmente con «cruzar» en este contexto del Jordán; es claro y fiel sin introducir un matiz innecesario.
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: En español bíblico y moderno «el Jordán» es suficiente y natural; añade precisión geográfica sin sobreexplicar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto en español, se mantiene «Yahvé» como nombre propio divino, no una sustitución por título.
- source_word: וַיֹּאמֶר ... לֵאמֹר
  english_pob_choice: said to Joshua,
  chosen_spanish: dijo a Josué,
  alternatives_spanish:
  - habló a Josué,
  - le dijo a Josué,
  lexicon: HALOT
  rationale: La fórmula de habla hebrea se vierte con naturalidad en español como «dijo a Josué». La coma final deja abierto el contenido que continúa en el siguiente versículo.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jehosué
  lexicon: HALOT
  rationale: «Josué» es la forma establecida y entendible en español bíblico.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El versículo contiene el Tetragrámaton directamente. En el texto español se preserva el nombre divino como «Yahvé» para no ocultar el nombre personal de Dios detrás de un título, en coherencia con la política del proyecto y con la lectura auditada del inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés auditado no mostró cambios en la última revisión y alcanzó alto acuerdo; por eso esta versión española sigue de cerca sus decisiones léxicas, especialmente en la fórmula narrativa, el colectivo singular de הַגּוֹי y el nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto en español.
  - «Toda la nación» conserva el singular colectivo del hebreo y evita borrar la tensión entre forma singular y referente plural.
  - La puntuación deja la cita abierta para el contenido del versículo siguiente, imitando la función de לֵאמֹר.
