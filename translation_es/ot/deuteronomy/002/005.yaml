base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/002/005.yaml
  text: Do not contend with them[a], for I will not give you any of their land, not even enough for the sole of a foot to tread on[c][b], because I have given Mount Seir to Esau as a possession.
  footnotes:
  - marker: a
    text: 'Or: “not even so much as a footstep” or “not even the sole of a foot.”'
    reason: lexical_alternative
  - marker: b
    text: “As a possession” may also be rendered “as an inheritance.”
    reason: lexical_alternative
  - marker: c
    text: “Mount Seir” can also refer to the mountainous region or hill country of Seir.
    reason: cultural_note
