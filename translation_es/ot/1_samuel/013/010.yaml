translation:
  language: es
  text: Y sucedió, tan pronto como terminó de ofrecer el holocausto, que en ese momento Samuel llegó. Y Saúl salió a su encuentro, para bendecirlo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para saludarlo» / «para darle el saludo». El verbo hebreo significa literalmente «bendecir», pero en este contexto de encuentro puede funcionar como un saludo formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el nuevo hecho; «Y sucedió» conserva esa función discursiva sin arcaísmo excesivo.
- source_word: כְּכַלֹּתוֹ
  english_pob_choice: as soon as he had finished
  chosen_spanish: tan pronto como terminó
  alternatives_spanish:
  - cuando terminó
  - al terminar
  lexicon: HALOT
  rationale: El valor temporal señala inmediatez al concluir la acción; «tan pronto como» expresa bien esa secuencia inmediata en español.
- source_word: לְהַעֲלוֹת
  english_pob_choice: offering up
  chosen_spanish: ofrecer
  alternatives_spanish:
  - presentar
  - subir
  lexicon: HALOT
  rationale: En el contexto sacrificial, el hifil de עלה se refiere a ofrecer un sacrificio; unido a «holocausto», «ofrecer» resulta natural y fiel.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - el sacrificio quemado
  - la ofrenda quemada
  lexicon: HALOT
  rationale: «עֹלָה» es el término técnico del sacrificio totalmente consumido por fuego; «holocausto» es el equivalente español tradicional y preciso.
- source_word: וְהִנֵּה
  english_pob_choice: that behold
  chosen_spanish: que he aquí
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: La partícula marca sorpresa o irrupción narrativa; «que he aquí» conserva ese matiz sin sonar forzado dentro del flujo español.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - estaba llegando
  lexicon: HALOT
  rationale: En esta escena de encuentro, «llegó» comunica con naturalidad la entrada de Samuel al lugar del relato.
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se salió
  - fue afuera
  lexicon: HALOT
  rationale: El verbo de movimiento hacia afuera se rinde de manera directa con «salió».
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: a recibirlo
  alternatives_spanish:
  - a su encuentro
  - para encontrarlo
  lexicon: HALOT
  rationale: La expresión idiomática indica salir para encontrarse con alguien; «a recibirlo» comunica bien la intención del movimiento en español.
- source_word: לְבָרֲכוֹ
  english_pob_choice: to bless him
  chosen_spanish: para bendecirlo
  alternatives_spanish:
  - para saludarlo
  - para felicitarlo
  lexicon: HALOT
  rationale: El verbo ברך conserva su forma literal de «bendecir»; aunque en contexto puede acercarse a un saludo formal, el español debe mantener la tensión léxica documentada.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura base del POB inglés con ajuste natural en español: «Y sucedió» para la fórmula narrativa, «holocausto» para el término sacrificial técnico y «para bendecirlo» para preservar la tensión léxica documentada en ברך. No se detectaron revisiones aplicadas en el dossier inglés.'
  spanish_consistency_notes:
  - Se usa «holocausto» como término técnico sacrificial, consistente con el valor de עֹלָה.
  - Se conserva «bendecirlo» y se aclara la alternativa de saludo en nota para no perder la ambigüedad documentada.
  - La puntuación reproduce el movimiento narrativo breve del hebreo con dos cláusulas principales separadas por punto.
