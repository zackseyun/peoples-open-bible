translation:
  language: es
  text: No desees su hermosura en tu corazón[a], ni te dejes cautivar por sus pestañas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «No codicies su hermosura en tu corazón».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no dejes que ella te tome con/por sus párpados»; la imagen es la del atractivo seductor de los ojos.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחְמֹד
  english_pob_choice: desire
  chosen_spanish: codicies
  alternatives_spanish:
  - desees
  - codicies
  - anheles
  lexicon: HALOT
  rationale: חמד expresa un deseo intenso que puede rozar la codicia. En español, «codiciar» conserva bien la fuerza interior y la posible resonancia ética sin volver el texto excesivamente técnico.
- source_word: יָפְיָהּ
  english_pob_choice: her beauty
  chosen_spanish: su hermosura
  alternatives_spanish:
  - su belleza
  - su atractivo
  - su belleza física
  lexicon: HALOT
  rationale: «Hermosura» transmite el valor estético del sustantivo y suena natural en español bíblico contemporáneo. Se evita añadir «física», que no está en el hebreo.
- source_word: בִּלְבָבֶךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - dentro de tu corazón
  - en tu interior
  lexicon: HALOT
  rationale: «Corazón» preserva el idiomа hebreo del centro interno de deseo e intención. Es la equivalencia más clara y estable en español bíblico.
- source_word: תִּקָּחֲךָ
  english_pob_choice: let yourself be captured
  chosen_spanish: te dejes cautivar
  alternatives_spanish:
  - seas tomado por ella
  - te dejes tomar por ella
  - te cautive
  lexicon: HALOT
  rationale: El verbo לקח aquí tiene fuerza de ser tomado/capturado por el atractivo seductor. «Dejes cautivar» comunica esa pasividad sin forzar una imagen militar demasiado pesada en español.
- source_word: בְּעַפְעַפֶּיהָ
  english_pob_choice: by her eyelashes
  chosen_spanish: por sus pestañas
  alternatives_spanish:
  - por sus párpados
  - por sus ojos
  - por su mirada
  lexicon: HALOT
  rationale: Aunque el término hebreo puede abarcar párpados/pestañas, «pestañas» mantiene mejor el matiz seductor y resulta más natural en español que «párpados» en este contexto.
theological_decisions:
- issue: El matiz de חמד entre deseo general y codicia ética
  english_pob_reading: desire
  chosen_spanish_reading: codiciar
  alternative_spanish_readings:
  - desear
  - codiciar con intensidad
  - anhelar
  rationale: La advertencia sapiencial apunta al movimiento interior desordenado antes de la acción. «Codiciar» conserva esa tensión moral, aunque en español también puede oírse como eco del mandamiento contra la codicia.
  doctrine_reference: Éxodo 20:17; Santiago 1:14-15
- issue: La imagen corporal de seducción en עפעפיים
  english_pob_reading: the image is of seductive eye-appeal
  chosen_spanish_reading: la imagen es de atractivo seductor en la mirada
  alternative_spanish_readings:
  - la imagen es de seducción en los ojos
  - la imagen es de atractivo de la mirada
  rationale: El hebreo presenta una imagen concreta de atractivo visual. «Pestañas» permite conservar la corporalidad de la imagen sin convertirla en una generalización interpretativa.
  doctrine_reference: Proverbios 7:21; 2 Pedro 2:14
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo directamente y se mantuvo la advertencia sapiencial en forma negativa paralela. La revisión auditada en inglés no requirió cambios, así que el español conserva la misma estructura y tensión semántica sin amplificarla.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «codiciar» para reflejar la fuerza de חמד sin perder inteligibilidad.
  - Se eligió «pestañas» en lugar de «párpados» por claridad y naturalidad en español, aunque la referencia corporal hebrea sigue siendo concreta.
