  text: מַה תֹּֽאמְרִי֙ כִּֽי יִפְקֹ֣ד עָלַ֔יִ/ךְ וְ֠/אַתְּ לִמַּ֨דְתְּ אֹתָ֥/ם עָלַ֛יִ/ךְ אַלֻּפִ֖ים לְ/רֹ֑אשׁ הֲ/ל֤וֹא חֲבָלִים֙ יֹאחֱז֔וּ/ךְ כְּמ֖וֹ אֵ֥שֶׁת לֵדָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/013/021.yaml
  text: What will you say when he appoints over you those whom you yourself taught to be leaders over you? Will not labor pains seize you like a woman in childbirth?[a][b]
  footnotes:
  - marker: a
    text: Or 'when he visits/punishes you'; the Hebrew verb can mean 'attend to, visit, punish,' but here likely carries the sense of appointing rulers over Judah.
    reason: lexical_alternative
  - marker: b
    text: Or 'chiefs' or 'close companions.' The Hebrew term can refer to clan leaders or familiar associates; in this context it likely points to those Judah had cultivated who now become her rulers.
    reason: lexical_alternative
