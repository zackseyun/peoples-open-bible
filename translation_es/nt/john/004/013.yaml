translation:
  language: es
  text: 'Jesús respondió y le dijo: «Todo el que bebe de esta agua volverá a tener sed[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «tendrá sed de nuevo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» reproduce bien el acto de replicar en narrativa y suena natural junto con «le dijo». Mantiene la correspondencia formal con el verbo aoristo de respuesta sin cargar el texto con un calco rígido.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - habló
  lexicon: BDAG
  rationale: «Le dijo» conserva la doble formulación joánica «respondió... y dijo...», explicitando el destinatario como en αὐτῇ y evitando una fusión excesiva de los dos verbos.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - le
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de forma natural en español con clítico átono. El referente femenino queda claro por el contexto inmediato y no requiere sobreexplicación en el texto principal.
- source_word: Πᾶς ὁ πίνων
  english_pob_choice: Everyone who drinks
  chosen_spanish: Todo el que bebe
  alternatives_spanish:
  - Quien bebe
  - Todo aquel que bebe
  lexicon: BDAG
  rationale: La construcción articular participial tiene valor genérico. «Todo el que bebe» es la equivalencia española más natural y fiel al alcance universal, sin introducir un masculino humano innecesario.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de
  - desde
  lexicon: BDAG
  rationale: Con verbos de beber, el español prefiere «beber de» para reflejar la procedencia del agua. «De» comunica el sentido con sobriedad y naturalidad.
- source_word: τοῦ ὕδατος τούτου
  english_pob_choice: this water
  chosen_spanish: esta agua
  alternatives_spanish:
  - esta agua
  - esta agua misma
  lexicon: BDAG
  rationale: El demostrativo señala el agua física del diálogo. «Esta agua» preserva la deixis inmediata sin añadir matices interpretativos no presentes en el griego.
- source_word: διψήσει
  english_pob_choice: will be thirsty
  chosen_spanish: volverá a tener sed
  alternatives_spanish:
  - tendrá sed de nuevo
  - volverá a tener sed
  - sedeará nuevamente
  lexicon: BDAG
  rationale: En español, el futuro griego puede expresarse con perífrasis natural. «Volverá a tener sed» conserva la idea de recurrencia que el inglés POB indicó con «again», sin forzar un calco menos idiomático.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: volverá a
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: BDAG
  rationale: El valor repetitivo de πάλιν queda mejor integrado en la perífrasis verbal española que en un adverbio separado. La repetición queda clara y fluida en el conjunto de la frase.
theological_decisions:
- issue: Doble fórmula narrativa ἀπεκρίθη ... καὶ εἶπεν
  english_pob_reading: 'Render both verbs: ''answered and said'''
  chosen_spanish_reading: 'Conservar ambos verbos: «respondió y le dijo»'
  alternative_spanish_readings:
  - respondió
  - dijo
  rationale: El griego conserva dos verbos; en español también se retienen para no suavizar la textura narrativa joánica. «Respondió y le dijo» reproduce la forma sin sobrecargarla.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor genérico de Πᾶς ὁ πίνων
  english_pob_reading: Use inclusive 'Everyone who drinks'
  chosen_spanish_reading: Usar «Todo el que bebe»
  alternative_spanish_readings:
  - Quien bebe
  - Toda persona que bebe
  rationale: La forma es genérica y no específicamente masculina. «Todo el que bebe» mantiene la universalidad y evita un giro marcadamente masculino que el griego no exige.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto en inglés quedó sin cambios y fue ratificado con alto acuerdo; no se documentaron revisiones adicionales que afecten este verso.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma estándar para Ἰησοῦς.
  - Se evita «SEÑOR» porque el texto no contiene κύριος ni una alusión directa al nombre divino.
  - «Esta agua» conserva la deixis inmediata del demostrativo τούτου.
  - La perífrasis «volverá a tener sed» refleja mejor el español natural que un futuro simple como «sedeará».
  - La nota al pie está anclada en «volverá a tener sed» para respetar la alternativa formal documentada.
