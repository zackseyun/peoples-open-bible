translation:
  language: es
  text: El oro y la plata hacen que el pie se mantenga firme[a], pero mejor que ambos es el buen consejo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “El oro y la plata hacen que el pie se mantenga firme, y por encima de ambos, buen consejo”. El paralelo griego dice igualmente: “el oro y la plata pondrán el pie, y por encima de ambos el consejo…”'
    reason: lexical_alternative
lexical_decisions:
- source_word: זהב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro
  lexicon: HALOT
  rationale: Nombra el metal precioso de forma natural en español. Mantiene la pareja fija con la plata y el sentido material del proverbio.
- source_word: וכסף
  english_pob_choice: and silver
  chosen_spanish: y la plata
  alternatives_spanish:
  - y plata
  - y la plata
  lexicon: HALOT
  rationale: Conserva la coordinación del binomio de metales preciosos y su paralelismo con el hebreo y el griego.
- source_word: יעמידו רגל
  english_pob_choice: make the foot stand firm
  chosen_spanish: hacen que el pie se mantenga firme
  alternatives_spanish:
  - hacen firme el pie
  - establecen el pie
  - dan firmeza al pie
  lexicon: HALOT
  rationale: La imagen concreta del pie se preserva, pero en español la pasiva/repr. reflexiva suena más natural que un calco directo. 'Se mantenga firme' comunica estabilidad, no mera postura física.
- source_word: ומשניהם
  english_pob_choice: but better than both
  chosen_spanish: pero mejor que ambos
  alternatives_spanish:
  - y mejor que ambos
  - y por encima de ambos
  - y más que ambos
  lexicon: HALOT
  rationale: El hebreo expresa comparación superior respecto de los dos elementos previos; 'mejor que ambos' reproduce esa fuerza comparativa con naturalidad.
- source_word: עצה טובה
  english_pob_choice: good counsel
  chosen_spanish: el buen consejo
  alternatives_spanish:
  - buen consejo
  - consejo bueno
  - consejo acertado
  lexicon: HALOT
  rationale: '''Consejo'' conserva la sustantividad proverbial de עצה, y ''el buen consejo'' refleja טובָה sin sobreinterpretar. Se evita introducir una evaluación más técnica de la que el texto exige.'
- source_word: καὶ ὑπὲρ ἀμφότερα βουλὴ εὐδοκιμεῖται
  english_pob_choice: but better than both is good counsel
  chosen_spanish: pero mejor que ambos es el buen consejo
  alternatives_spanish:
  - y por encima de ambos está el buen consejo
  - y más que ambos prevalece el buen consejo
  - pero por encima de ambos es el buen consejo
  lexicon: BDAG
  rationale: 'La frase griega refuerza el comparativo hebreo: el consejo está por encima de ambos. ''El buen consejo'' mantiene la valoración positiva de εὐδοκιμεῖται sin convertirla en una afirmación demasiado interpretativa como ''prospera'' o ''es estimado''.'
translation_notes:
  revision_awareness: La redacción española sigue el acuerdo alto entre hebreo y griego. La POB inglesa revisó 'sound counsel' a 'good counsel' para ajustarse más de cerca a טובה; en español se opta por 'el buen consejo' para conservar esa cercanía léxica sin perder naturalidad.
  spanish_consistency_notes:
  - Se usa 'oro'/'plata' para el binomio de riqueza, en continuidad con la imagen hebrea y griega.
  - Se conserva 'pie' de manera concreta, ya que el dicho habla de estabilidad física como metáfora de seguridad.
  - '''Consejo'' se mantiene como sustantivo proverbialequivalente a עצה, evitando términos más técnicos o eclesiásticos.'
  - No se introduce 'Cristo', 'SEÑOR' ni otros términos teológicos ajenos al versículo.
