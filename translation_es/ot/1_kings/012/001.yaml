translation:
  language: es
  text: Entonces Roboam fue a Siquem[a], porque todo Israel había venido a Siquem para hacerlo rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pues todo Israel había venido a Siquem para hacerlo rey».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: Then ... went
  chosen_spanish: Entonces ... fue
  alternatives_spanish:
  - Y ... fue
  - Así que ... fue
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» preserva la secuencia de forma natural en español. «Fue» comunica el movimiento narrativo con registro claro y digno.
- source_word: רְחַבְעָם
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Rehoboam
  lexicon: N/A (nombre propio transliterado por convención española)
  rationale: En español bíblico estándar, el nombre se adapta como «Roboam». Mantiene reconocimiento lector sin alterar la identidad del personaje.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  - Siquem
  lexicon: N/A (topónimo transliterado por convención española)
  rationale: «Siquem» es la forma tradicional y ampliamente reconocible en español bíblico. Conserva el topónimo sin explicación añadida.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa de la ida de Roboam. «Porque» expresa con claridad la relación causal en español moderno; «pues» sería más formal y menos directo.
- source_word: בָּא
  english_pob_choice: had come
  chosen_spanish: había venido
  alternatives_spanish:
  - vino
  - habían venido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción anterior a la ida de Roboam; el pluscuamperfecto español reproduce bien esa anterioridad relativa. Se mantiene el singular gramatical del verbo hebreo coordinado con el sujeto colectivo «todo Israel».
- source_word: כָל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - la totalidad de Israel
  - todo el Israel
  lexicon: HALOT
  rationale: La expresión funciona como designación colectiva/nacional. «Todo Israel» conserva la fuerza del hebreo sin forzar una lectura exhaustiva de cada individuo.
- source_word: לְהַמְלִיךְ אֹתוֹ
  english_pob_choice: to make him king
  chosen_spanish: para hacerlo rey
  alternatives_spanish:
  - para proclamarlo rey
  - para coronarlo rey
  lexicon: HALOT
  rationale: El hifil de מלך indica causar que alguien reine o instalarlo como rey. «Hacerlo rey» conserva la fuerza causativa sin añadir la imagen ceremonial de «coronarlo».
theological_decisions:
- issue: Alcance de «todo Israel»
  english_pob_reading: Corporate/national expression; not necessarily every individual without exception.
  chosen_spanish_reading: Expresión corporativa/nacional; no necesariamente cada individuo sin excepción.
  alternative_spanish_readings:
  - sentido exhaustivo de cada israelita
  - referencia meramente hiperbólica sin valor colectivo real
  rationale: La narración histórica usa una fórmula colectiva para el conjunto del pueblo/tribus. La traducción mantiene el texto sin exagerar ni debilitar su alcance colectivo.
  doctrine_reference: Uso bíblico de fórmulas corporativas en narrativa histórica; cf. coherencia interna del relato de la monarquía dividida.
translation_notes:
  revision_awareness: El audit trail inglés revisó «because» a «for» por un matiz más formal; en español se eligió «porque», que es la opción causal más natural y clara, sin cambiar el sentido. No se introdujeron lecturas textuales alternativas; la única nota conserva la alternativa de enlace causal en español.
  spanish_consistency_notes:
  - Se mantuvo el topónimo bíblico en forma española convencional («Siquem») y el nombre personal como forma bíblica española estándar («Roboam»).
  - Se preservó el valor causal de כִּי y la anterioridad de בָּא con pluscuamperfecto español.
  - «Todo Israel» se traduce de manera colectiva, en línea con el tratamiento auditado del inglés POB.
