translation:
  language: es
  text: No te regocijes[a], toda Filistea, porque se ha roto la vara que te golpeaba; pues de la raíz de la serpiente saldrá una víbora[b], y su fruto será una serpiente ardiente voladora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «toda tú, Filistea». El hebreo se dirige a Filistea como un colectivo femenino singular.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su descendencia será una serpiente ardiente voladora». Se conserva «fruto» en el texto principal para mantener la metáfora hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְלֶשֶׁת כֻּלֵּךְ
  english_pob_choice: all of you in Philistia
  chosen_spanish: toda tú, Filistea
  alternatives_spanish:
  - toda Filistea
  - toda tú, la Filistea
  - todo Filistea
  lexicon: HALOT
  rationale: El hebreo personifica a Filistea con segunda persona femenina singular. En español, 'toda tú, Filistea' conserva la dirección directa y el valor colectivo sin perder la personificación. 'Toda tú' refleja כֻּלֵּךְ, y el nombre propio mantiene el destinatario corporativo.
- source_word: שֵׁבֶט
  english_pob_choice: the rod
  chosen_spanish: la vara
  alternatives_spanish:
  - el cetro
  - el bastón
  - la vara de castigo
  lexicon: HALOT
  rationale: שֵׁבֶט puede ser vara, bastón o cetro. Aquí el contexto de golpe y quebranto favorece 'vara' como instrumento de golpe/aflicción. 'Cetro' introduciría una lectura regia menos segura; 'vara de castigo' explicita demasiado.
- source_word: מַכֵּךְ
  english_pob_choice: that struck you
  chosen_spanish: que te golpeaba
  alternatives_spanish:
  - que te hirió
  - del que te golpeaba
  - que te había golpeado
  lexicon: HALOT
  rationale: La forma participial con sufijo expresa al agente del golpe. 'Que te golpeaba' conserva el valor de acción agresiva y evita resolver innecesariamente el aspecto con un pretérito perfecto cerrado. 'Golpear' es más neutral y directo en español que 'herir'.
- source_word: נִשְׁבַּר
  english_pob_choice: is broken
  chosen_spanish: se ha roto
  alternatives_spanish:
  - está roto
  - ha sido quebrada
  - se quebró
  lexicon: HALOT
  rationale: El nifal perfecto expresa un quebranto consumado con relevancia actual. 'Se ha roto' mantiene el estado resultante sin sonar arcaico. 'Está roto' también sería posible, pero 'se ha roto' conserva mejor la idea del evento de ruptura.
- source_word: מִשֹּׁרֶשׁ נָחָשׁ
  english_pob_choice: from the serpent’s root
  chosen_spanish: de la raíz de la serpiente
  alternatives_spanish:
  - de la raíz serpentina
  - del tronco de la serpiente
  - de la raíz del serpiente
  lexicon: HALOT
  rationale: '''Raíz'' preserva la metáfora de origen/linaje. ''De la raíz de la serpiente'' sigue de cerca el hebreo y no interpreta la imagen. Evito ''serpentina'' porque suaviza el sustantivo y puede sonar menos preciso.'
- source_word: צֶפַע
  english_pob_choice: a viper
  chosen_spanish: una víbora
  alternatives_spanish:
  - un áspid
  - una culebra venenosa
  - una serpiente venenosa
  lexicon: HALOT
  rationale: צֶפַע designa una serpiente venenosa. 'Víbora' es el equivalente natural y mantiene la fuerza amenazante mejor que un término más técnico o genérico. 'Áspid' sería demasiado literario y menos claro para lectura pública.
- source_word: וּפִרְיוֹ
  english_pob_choice: and its fruit
  chosen_spanish: y su fruto
  alternatives_spanish:
  - y su descendencia
  - y su producción
  - y su prole
  lexicon: HALOT
  rationale: Se conserva 'fruto' para mantener la metáfora hebrea de origen y producción. Aunque puede implicar descendencia, no conviene resolverla en el cuerpo del texto cuando el inglés POB también preserva la imagen.
- source_word: שָׂרָף מְעוֹפֵף
  english_pob_choice: a flying fiery serpent
  chosen_spanish: una serpiente ardiente voladora
  alternatives_spanish:
  - una serpiente voladora de fuego
  - una serpiente ardiente que vuela
  - una serpiente ígnea voladora
  lexicon: HALOT
  rationale: שָׂרָף sugiere algo ardiente/ardoroso; מְעוֹפֵף significa volador. 'Serpiente ardiente voladora' conserva ambos rasgos y suena natural en español. El orden final 'voladora' evita una estructura demasiado pesada. No se especifica una identificación doctrinal posterior; se mantiene la imagen profética.
- source_word: כִּי
  english_pob_choice: because / for
  chosen_spanish: porque / porque
  alternatives_spanish:
  - pues / pues
  - ya que / porque
  - porque / pues
  lexicon: HALOT
  rationale: El primer כִּי introduce la razón de la prohibición; el segundo añade explicación. En español, 'porque' funciona con claridad en ambos lugares sin oscurecer la relación causal. Se evita una variación artificial que pudiera sonar menos natural en lectura pública.
theological_decisions:
- issue: Naturaleza de la imaginería de la serpiente
  english_pob_reading: Retain the imagery as political-prophetic metaphor without specifying a later doctrinal identification.
  chosen_spanish_reading: Mantener la imaginería como metáfora político-profética sin identificarla doctrinalmente con una figura posterior.
  alternative_spanish_readings:
  - Leer la serpiente como referencia directa a un rey o dinastía específicos
  - Interpretarla tipológicamente como imaginería satánica
  rationale: El hebreo intensifica la amenaza mediante imágenes de serpiente sin declarar una identificación doctrinal más precisa. La traducción española debe preservar esa tensión y no resolverla con una lectura teológica posterior que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último paso de revisión del POB en inglés: conserva el valor colectivo de Filistea, mantiene la metáfora de la raíz de la serpiente y respeta el encadenamiento causal del versículo sin añadir interpretación doctrinal extra.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Víbora'' y ''serpiente ardiente voladora'' preservan la progresión imagística del hebreo sin suavizarla.'
  - '''Raíz'', ''fruto'' y ''vara'' mantienen un campo metafórico coherente en español.'
  - La segunda persona singular femenina se conserva para reflejar el hebreo dirigido a Filistea como entidad personificada.
