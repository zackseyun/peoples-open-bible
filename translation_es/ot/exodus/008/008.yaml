translation:
  language: es
  text: Así, Moisés y Aarón salieron de delante de Faraón, y Moisés clamó a Yahvé acerca de las ranas que había puesto sobre Faraón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que había puesto contra Faraón». El hebreo usa literalmente «poner/poner contra»; «sobre Faraón» mantiene la imagen básica del verbo en este contexto de plaga.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salieron de delante de
  alternatives_spanish:
  - salieron de
  - se fueron de
  - partieron de
  lexicon: HALOT
  rationale: El hebreo narra una salida física desde la presencia de Faraón. En español, 'salieron de delante de' conserva mejor esa relación de presencia/corte de audiencia que un simple 'salieron de', sin volverlo artificial.
- source_word: מֵעִם
  english_pob_choice: from
  chosen_spanish: de delante de
  alternatives_spanish:
  - de
  - desde
  - fuera de la presencia de
  lexicon: HALOT
  rationale: La preposición hebrea expresa alejamiento de la compañía/presencia. 'De delante de' comunica esa matiz relacional de modo natural en español bíblico contemporáneo.
- source_word: וַיִּצְעַק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  - clamó a gritos
  lexicon: HALOT
  rationale: '''Clamó'' conserva la fuerza de צעק como un clamor intenso dirigido a Dios. ''Gritó'' suena demasiado coloquial; ''clamó'' mantiene la solemnidad y la intensidad.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la norma del proyecto para el Nombre divino: ''Yahvé''. En español bíblico es la forma preferida para preservar el nombre personal de Dios, no sustituirlo por un título.'
- source_word: עַל דְּבַר
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - con respecto a
  - a causa de
  lexicon: HALOT
  rationale: El giro idiomático señala el motivo/tema de la súplica. 'Acerca de' es claro y formal en español; evita la sobrecarga de 'a causa de', que podría desplazar el matiz temático.
- source_word: הַצְפַרְדְּעִים
  english_pob_choice: the frogs
  chosen_spanish: las ranas
  alternatives_spanish:
  - las ranas
  - los sapos
  lexicon: HALOT
  rationale: El término hebreo designa al animal del juicio; en español 'ranas' es la designación más natural y transparente. 'Sapos' introduciría una equivalencia más específica que el texto no exige.
- source_word: שָׂם לְפַרְעֹה
  english_pob_choice: that he had set upon Pharaoh
  chosen_spanish: que había puesto sobre Faraón
  alternatives_spanish:
  - que había colocado sobre Faraón
  - que había puesto contra Faraón
  - que había impuesto sobre Faraón
  lexicon: HALOT
  rationale: Se mantiene el verbo básico 'poner/puesto' para reflejar fielmente שׂוּם, siguiendo la revisión que prefirió 'set upon'. En español, 'puesto sobre' preserva la literalidad sin perder fluidez.
theological_decisions:
- issue: Cómo verter el Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. La traducción española conserva el nombre propio divino con la forma 'Yahvé', coherente con la política del proyecto y con el valor covenantal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: El valor de la expresión 'poner sobre Faraón' en contexto de plaga
  english_pob_reading: that he had set upon Pharaoh
  chosen_spanish_reading: que había puesto sobre Faraón
  alternative_spanish_readings:
  - que había puesto contra Faraón
  - que había traído sobre Faraón
  - que había colocado sobre Faraón
  rationale: El hebreo usa שׂוּם, literalmente 'poner/colocar'. En este contexto de plaga, 'puesto sobre Faraón' retiene la imagen original sin forzar una explicación interpretativa mayor que el texto no pide. No se sustituye por un verbo más dinámico que borre la metáfora base.
  doctrine_reference: Principio POB de conservar tensiones léxicas y no suavizar decisiones semánticas cuando el hebreo es concreto
translation_notes:
  revision_awareness: 'La traducción sigue el pasaje hebreo directo y toma en cuenta la revisión final del audit trail: se prefirió una formulación cercana a ''had set upon Pharaoh'' en vez de ''had brought upon Pharaoh'', conservando el verbo básico de שׂוּם. También se respetó la elección del Nombre divino como Yahvé y el tono intenso de צעק como ''clamó''.'
  spanish_consistency_notes:
  - Se usa 'Faraón' de forma consistente para פַּרְעֹה.
  - '''Yahvé'' se mantiene como forma estándar del Tetragrámaton en el texto principal.'
  - '''Clamó'' preserva la intensidad de la acción verbal sin caer en coloquialismo.'
  - '''Puesto sobre'' conserva la imagen verbal hebrea y evita una paráfrasis excesiva.'
