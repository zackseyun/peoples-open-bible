  text: לָ/כֵן֩ הִנְ/נִ֨י אֹֽסִפְ/ךָ֜ עַל אֲבֹתֶ֗י/ךָ וְ/נֶאֱסַפְתָּ֣ אֶל קִבְרֹתֶי/ךָ֮ בְּ/שָׁלוֹם֒ וְ/לֹא תִרְאֶ֣ינָה עֵינֶ֔י/ךָ בְּ/כֹל֙ הָֽ/רָעָ֔ה אֲשֶׁר אֲנִ֥י מֵבִ֖יא עַל הַ/מָּק֣וֹם הַ/זֶּ֑ה וַ/יָּשִׁ֥יבוּ אֶת הַ/מֶּ֖לֶךְ דָּבָֽר־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/022/020.yaml
  text: Therefore[a], behold, I will gather you to your fathers, and you shall be gathered to your graves in peace, and your eyes shall not see all the disaster that I am bringing on this place.” And they brought back word to the king.
  footnotes:
  - marker: a
    text: Or 'peacefully.' The Hebrew says 'in peace,' which may mean that Josiah would die before seeing the coming judgment, rather than specifying the exact manner of his death.
    reason: lexical_alternative
