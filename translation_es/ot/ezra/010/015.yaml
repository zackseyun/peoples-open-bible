  verdict: revise
  source_alignment_summary: 'El borrador acierta en la mayoría de los nombres, en la estructura de la frase y en la apposición «el levita» aplicada a Shabetai. Sin embargo, falla en un punto central de sentido: עָמְדוּ עַל זֹאת, en este contexto y según la auditoría inglesa, expresa oposición a la propuesta, no apoyo a ella. «Se pusieron de parte de esto» invierte el sentido del hebreo y del POB inglés. Además, la nota [b] está anclada en el nombre «Tikvá» cuando en realidad corresponde al verbo final «los apoyaron».'
  spanish_quality_summary: El español es generalmente legible, pero «se pusieron de parte de esto» suena poco natural y semánticamente equivocado en contexto. La colocación de notas también afecta la claridad. Conviene usar una formulación directa y natural como «se opusieron a esto» y mover la nota verbal al verbo correspondiente. También es preferible una forma más estándar del nombre «Shabetai» frente a «Sabahtai».
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Los nombres propios están razonablemente hispanizados. Se debe preservar la alternativa onomástica de יַחְזְיָה en nota. La decisión léxica para עֲזָרֻם como «los apoyaron» es adecuada, con nota alternativa «los ayudaron / los asistieron».
  issues:
  - severity: high
    issue: Sentido invertido en «se pusieron de parte de esto»
    rationale: 'El hebreo עָמְדוּ עַל זֹאת, en este contexto, significa que Jonatán y Jajzeías se opusieron a la propuesta. El borrador dice lo contrario: que apoyaron «esto».'
  - severity: medium
    issue: Anclaje incorrecto de la nota [b]
    rationale: La nota [b] documenta alternativas para עֲזָרֻם («los ayudaron / los asistieron»), por lo que debe ir en el verbo «los apoyaron», no junto a «Tikvá».
  - severity: low
    issue: Forma onomástica «Sabahtai» menos natural en español
    rationale: Una transliteración como «Shabetai» o «Sabetai» refleja mejor el nombre שַׁבְּתַי en español bíblico legible. No es un error grave, pero conviene mejorarla.
  revised_spanish_text: Solo Jonatán hijo de Asael y Jazeías hijo de Tikvá[a] se opusieron a esto; y Mesulán y Shabetai el levita los apoyaron[b].
  revised_footnotes:
