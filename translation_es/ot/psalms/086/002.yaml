translation:
  language: es
  text: Guarda mi vida[a], porque soy fiel; salva a tu siervo, mi Dios, que confía en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «mi alma»; aquí probablemente significa «mi vida» o «a mí» en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרָה
  english_pob_choice: Guard
  chosen_spanish: Guarda
  alternatives_spanish:
  - Cuida
  - Protege
  - Guarda y protege
  lexicon: HALOT
  rationale: El imperativo pide una acción protectora dirigida a Dios. «Guarda» es natural en español bíblico contemporáneo y conserva el sentido de resguardar sin volverse arcaico.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - a mí
  - mi ser
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ expresa la vida del salmista, no primariamente el alma inmortal. «Mi vida» sigue la lectura contextual de preservación y peligro.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en verdad
  lexicon: HALOT
  rationale: Introduce la base de la súplica. «Porque» expresa bien la relación causal en español y conserva la fuerza argumentativa de la oración.
- source_word: חָסִיד
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - piadoso
  - devoto
  - leal
  - santo
  lexicon: HALOT
  rationale: El término apunta a fidelidad de pacto, no a perfección sin pecado. «Fiel» comunica esa lealtad devota de manera breve y clara en español.
- source_word: הוֹשַׁע
  english_pob_choice: save
  chosen_spanish: salva
  alternatives_spanish:
  - rescata
  - líbrame
  - sálvame
  lexicon: HALOT
  rationale: El imperativo de ישׁע se expresa con «salva», que mantiene la amplitud de rescate y preservación propia del verbo.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En lenguaje de oración a Dios, el matiz principal es la relación humilde de servicio. «Siervo» preserva esa fórmula bíblica sin forzar el sentido de esclavitud en este contexto.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  - mi Señor
  lexicon: HALOT
  rationale: La forma posesiva simple se traduce directamente. «Mi Dios» mantiene el trato personal y el vínculo de pacto del hablante con Dios.
- source_word: הַבּוֹטֵחַ אֵלֶיךָ
  english_pob_choice: who trusts in you
  chosen_spanish: el que confía en ti
  alternatives_spanish:
  - que confía en ti
  - el confiado en ti
  - el que se refugia en ti
  lexicon: HALOT
  rationale: El participio describe al siervo de modo apposicional. «El que confía en ti» suena natural en español y conserva la idea de dependencia continua.
theological_decisions:
- issue: Sentido de חָסִיד como autodescripción del salmista
  english_pob_reading: The psalmist claims covenant faithfulness/devotion, not sinless holiness or meritorious righteousness.
  chosen_spanish_reading: El salmista se presenta como fiel en lealtad de pacto, no como moralmente perfecto ni como alguien que pretende ganar la salvación por mérito.
  alternative_spanish_readings:
  - soy piadoso
  - soy santo
  - soy uno de tus fieles
  rationale: 'La versión debe preservar la tensión teológica del texto: el orante apela a su relación leal con Dios mientras pide rescate. «Fiel» evita tanto la idealización de perfección sin pecado como una lectura meramente moralizante.'
  doctrine_reference: Translation philosophy §3; §6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que prefirió una sintaxis con comas para clarificar que «mi Dios» forma parte de la apelación directa y que el participio final describe al siervo que confía en Dios. La opción española refleja esa misma claridad sin añadir explicaciones ajenas al verso.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton; por eso no aparece aquí.
  - Se eligió «siervo» en lugar de «esclavo» por el uso relacional y oracional de עבד en este contexto.
  - Se evitó «santo» para חָסִיד porque en español puede sugerir impecabilidad moral; «fiel» preserva mejor la lealtad de pacto.
  - La puntuación con coma tras «mi Dios» sigue el ajuste editorial del POB inglés para una lectura más natural en español.
