    issue: Construcción elíptica en la medida de la altura
    rationale: La frase 'y su altura de dos codos' omite 'era', lo que en español actual resulta menos natural y ligeramente abrupto. El hebreo expresa claramente una predicación de medida, y el propio rastro inglés la hace explícita ('its height was two cubits'). Añadir 'era' mejora la legibilidad sin alterar el sentido.
