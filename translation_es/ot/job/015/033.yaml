translation:
  language: es
  text: Él sacudirá sus uvas inmaduras como una vid[a], y dejará caer su flor[b] como un olivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despojará» o «arrancará». El verbo hebreo suele tener un sentido más fuerte de violencia o despojo, pero aquí la imagen agrícola sugiere la pérdida prematura del fruto.
    reason: lexical_alternative
  - marker: b
    text: O «su floración» o «su brote». El hebreo se refiere a la flor del árbol antes de dar fruto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְמֹס
  english_pob_choice: he will shake off
  chosen_spanish: derribará
  alternatives_spanish:
  - sacudirá
  - arrancará
  - despojará
  lexicon: HALOT
  rationale: El hebreo puede expresar una acción fuerte, incluso violenta, pero en esta imagen agrícola el resultado visible es la pérdida prematura del fruto. «Derribará» conserva una acción activa y causativa sin forzar un matiz técnico excesivo en español.
- source_word: כַּגֶּפֶן
  english_pob_choice: like a vine
  chosen_spanish: como una vid
  alternatives_spanish:
  - como una parra
  - como una vid de uva
  lexicon: HALOT
  rationale: גפן se refiere a la vid. «Vid» es el equivalente más directo y natural en español bíblico contemporáneo.
- source_word: בִּסְרוֹ
  english_pob_choice: his unripe grapes
  chosen_spanish: sus uvas inmaduras
  alternatives_spanish:
  - sus uvas verdes
  - sus frutos tiernos
  - sus uvas agrias
  lexicon: HALOT
  rationale: בֹּסֶר designa uvas no maduras. «Inmaduras» expresa con claridad la idea de fruto prematuro y evita introducir el matiz de acidez, que no es el principal aquí.
- source_word: וְיַשְׁלֵךְ
  english_pob_choice: and cast off
  chosen_spanish: y echará
  alternatives_spanish:
  - y arrojará
  - y lanzará
  - y desprenderá
  lexicon: HALOT
  rationale: El Hifil de שלך mantiene la idea de echar/arrojar. «Echará» funciona bien en español para la acción de perder o soltar flores en el paralelo agrícola.
- source_word: כַּזַּיִת
  english_pob_choice: like an olive tree
  chosen_spanish: como un olivo
  alternatives_spanish:
  - como un olivo cargado
  - como un árbol de olivo
  lexicon: HALOT
  rationale: Aunque el hebreo puede referirse al olivo como árbol, en español «olivo» es la forma natural y suficientemente precisa dentro de la comparación con la flor.
- source_word: נִצָּתוֹ
  english_pob_choice: his blossom
  chosen_spanish: su flor
  alternatives_spanish:
  - su floración
  - su floración temprana
  - su brote
  lexicon: HALOT
  rationale: נִצָּה denota flor o blossom. «Flor» es la opción más clara y digna en español; en esta imagen preserva la idea de pérdida de la etapa de floración.
translation_notes:
  revision_awareness: 'El texto inglés revisado permanece sin cambios y la comparación agrícola se mantiene como en el audit trail: pérdida prematura de fruto en la vid y de flor en el olivo. La versión española sigue esa lectura sin ampliar el alcance metafórico.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre vid/olivo y fruto/flor.
  - Se evitó sustituir el verbo fuerte por una paráfrasis interpretativa.
  - «Vid» y «olivo» se eligieron por naturalidad y fidelidad al referente agrícola.
  - La relación posesiva («sus») conserva la personificación del sujeto del versículo.
