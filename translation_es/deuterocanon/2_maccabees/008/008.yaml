translation:
  language: es
  text: Pero cuando Felipe vio que aquel hombre iba progresando poco a poco y avanzaba aún más en sus éxitos[a], escribió a Tolomeo, el gobernador de Celesiria y Fenicia[b], para que acudiera en ayuda de la causa del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, Judas Macabeo, la figura de la que trata el contexto circundante.
    reason: cross_reference
  - marker: b
    text: O «los intereses del rey» o «los asuntos del rey». La expresión griega puede designar la causa real en sentido más amplio que una sola acción militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνιδὼν
  english_pob_choice: when ... saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - se dio cuenta de
  lexicon: LSJ
  rationale: El participio introduce la motivación de Felipe; en español, «vio» comunica de modo natural la observación que lleva a la acción, sin perder el valor de notar/percatarse.
- source_word: κατὰ μικρόν
  english_pob_choice: gradually
  chosen_spanish: poco a poco
  alternatives_spanish:
  - gradualmente
  - por grados
  lexicon: LSJ
  rationale: La locución expresa avance incremental. «Poco a poco» es idiomática en español y mantiene la idea de desarrollo progresivo.
- source_word: εἰς προκοπὴν ἐρχόμενον
  english_pob_choice: making progress
  chosen_spanish: hacia el progreso
  alternatives_spanish:
  - en progreso
  - hacia el adelanto
  lexicon: LSJ
  rationale: La imagen literal es de ir entrando en un estado de avance. «Hacia el progreso» conserva ese movimiento sin forzar un tecnicismo.
- source_word: τὸν ἄνδρα
  english_pob_choice: the man
  chosen_spanish: aquel hombre
  alternatives_spanish:
  - el hombre
  - ese hombre
  lexicon: LSJ
  rationale: El griego dice explícitamente «el hombre», refiriéndose a Judas en el contexto inmediato. «Aquel hombre» mantiene la referencia contextual sin añadir el nombre dentro del verso.
- source_word: πυκνότερον
  english_pob_choice: even more
  chosen_spanish: todavía más
  alternatives_spanish:
  - aún más
  - con mayor frecuencia
  lexicon: LSJ
  rationale: Aquí el comparativo intensifica el avance, no indica mera frecuencia. «Todavía más» refleja mejor el aumento de grado que una lectura temporal o habitual.
- source_word: ἐν ταῖς εὐημερίαις
  english_pob_choice: in successes
  chosen_spanish: en éxitos
  alternatives_spanish:
  - en prosperidades
  - en buenos resultados
  lexicon: LSJ
  rationale: En este contexto narrativo, el plural apunta a resultados favorables concretos. «Éxitos» transmite bien la serie de avances favorables.
- source_word: προβαίνοντα
  english_pob_choice: advancing
  chosen_spanish: progresaba
  alternatives_spanish:
  - avanzaba
  - seguía adelante
  lexicon: LSJ
  rationale: Sigue la idea de movimiento hacia adelante. «Progresaba» armoniza con «progreso» y mantiene el paralelismo del griego.
- source_word: στρατηγὸν
  english_pob_choice: governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el general
  - el comandante
  lexicon: LSJ
  rationale: Aunque στρατηγός puede ser militar, aquí designa una autoridad sobre Celesiria y Fenicia. «Gobernador» comunica mejor la función administrativa en contexto.
- source_word: ἐπιβοηθεῖν
  english_pob_choice: to come to the aid of
  chosen_spanish: acudiera en ayuda de
  alternatives_spanish:
  - viniera en ayuda de
  - ayudara a
  lexicon: LSJ
  rationale: El compuesto sugiere acudir en auxilio. «Acudiera en ayuda de» conserva la idea de respuesta urgente y direccional.
- source_word: τοῖς τοῦ βασιλέως πράγματι
  english_pob_choice: the king’s cause
  chosen_spanish: la causa del rey
  alternatives_spanish:
  - los asuntos del rey
  - los intereses del rey
  lexicon: LSJ
  rationale: πρᾶγμα puede abarcar asuntos, intereses o causa. En este contexto político-militar, «la causa del rey» es una equivalencia natural y suficientemente amplia.
theological_decisions:
- issue: Referencia contextual al personaje mencionado como «el hombre»
  english_pob_reading: That is, Judas Maccabeus, the figure under discussion in the surrounding context.
  chosen_spanish_reading: El verso alude a Judas Macabeo como personaje ya identificado por el contexto inmediato.
  alternative_spanish_readings:
  - simplemente «el hombre» sin identificación
  - «aquel hombre, es decir, Judas Macabeo»
  rationale: La aclaración pertenece al aparato, no al texto principal. En el texto se preserva la referencia genérica del griego, y la nota deja explícito el referente contextual.
  doctrine_reference: Criterio de referencia contextual y coherencia intratextual; no doctrinal.
- issue: Sentido de τοῖς τοῦ βασιλέως πράγματι
  english_pob_reading: Or 'the king’s interests' or 'the king’s affairs.' The Greek phrase can denote the royal cause more broadly than a single military action.
  chosen_spanish_reading: «la causa del rey» con amplitud semántica para asuntos e intereses reales.
  alternative_spanish_readings:
  - «los asuntos del rey»
  - «los intereses del rey»
  - «la empresa del rey»
  rationale: El español «causa» puede abarcar el trasfondo político y militar del giro griego sin reducirlo a una sola gestión. La nota preserva las alternativas documentadas por el POB inglés.
  doctrine_reference: Ninguna; decisión léxica y de alcance semántico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: πυκνότερον fue entendido como aumento de grado/intensidad, por lo que se evitó una traducción que sugiriera frecuencia. También se mantuvo la amplitud semántica de τοῖς τοῦ βασιλέως πράγματι.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece explícitamente el nombre divino; este versículo no lo contiene.
  - Se eligió «la causa del rey» para conservar el rango semántico del griego y la decisión auditada del POB inglés.
  - No se introdujo nombre propio en el cuerpo del texto para τὸν ἄνδρα; la identificación queda en nota, siguiendo el aparato.
  - Se prefirió «gobernador» para στρατηγός por el contexto administrativo del pasaje, coherente con el audit trail inglés.
