translation:
  language: es
  text: Y ahora mi alma se derrama dentro de mí[a]; los días de aflicción se apoderan de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre mí». La preposición hebrea es literalmente «sobre/en mí», pero aquí probablemente describe un derrumbe interior más que una ubicación espacial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Pero ahora
  - Ahora
  lexicon: HALOT
  rationale: Se conserva el valor conectivo-temporal del hebreo sin imponer un matiz adversativo que el texto no exige. "Y ahora" suena natural en español y mantiene el contraste con lo anterior por contexto.
- source_word: עָלַי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - sobre mí
  - en mí
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "sobre mí / en mí", en combinación con "mi alma se derrama" la imagen apunta a un colapso interior. "Dentro de mí" comunica esa fuerza idiomática en español sin borrar la tensión léxica, que queda anotada en la nota textual.
- source_word: תִּשְׁתַּפֵּךְ
  english_pob_choice: is poured out
  chosen_spanish: se derrama
  alternatives_spanish:
  - es derramada
  - se vacía
  lexicon: HALOT
  rationale: El hitpael de שפך expresa una acción de vaciamiento o derramamiento. "Se derrama" preserva la metáfora de desintegración o agotamiento con una construcción natural en español.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: '"Alma" mantiene el tono poético y antropológico del hebreo נפש en este lamento. "Vida" sería posible, pero aquí el contexto de angustia interior favorece una traducción más personal y emotiva.'
- source_word: יֹאחֲזוּנִי
  english_pob_choice: seize me
  chosen_spanish: me asen
  alternatives_spanish:
  - me toman
  - me agarran
  lexicon: HALOT
  rationale: '"Asir" reproduce bien la fuerza de אחז: sujetar, agarrar, apoderarse de alguien. "Me asen" conserva la violencia del verbo poético y resulta claro en español.'
- source_word: יְמֵי
  english_pob_choice: days of
  chosen_spanish: los días de
  alternatives_spanish:
  - días de
  lexicon: HALOT
  rationale: En español se necesita el artículo para naturalidad y claridad. El constructo hebreo se refleja con "los días de".
- source_word: עֹנִי
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - miseria
  - penuria
  - sufrimiento
  lexicon: HALOT
  rationale: '"Aflicción" preserva el campo semántico amplio de עֹנִי en Job: sufrimiento, humillación y penuria, sin reducirlo solo a pobreza material.'
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se conservó el valor temporal de וְעַתָּה, la metáfora de derramamiento de תִּשְׁתַּפֵּךְ y el sentido amplio de עֹנִי como aflicción. No hubo revisiones aplicadas en el registro inglés más reciente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando aparezca en el contexto; en este versículo no hay término divino.
  - Se prefirió «alma» para נפש por coherencia con el tono poético de Job y con el uso POB de preservar la profundidad antropológica cuando el contexto es lamentación.
  - Se evitó «sobre mí» en el cuerpo principal para no forzar una imagen espacial extraña en español, pero se preservó la alternativa en nota.
  - Se mantuvo un registro sobrio y bíblico sin acudir a lenguaje eclesiástico tradicional innecesario.
