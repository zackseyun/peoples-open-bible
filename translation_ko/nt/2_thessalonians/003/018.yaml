lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_korean: 은혜
  alternatives_korean:
  - 호의
  - 은총
  lexicon: BDAG
  rationale: 바울 서신 축복문의 표준 어휘.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  - 주인
  lexicon: BDAG
  rationale: 표준 글로서리.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_korean: 예수 메시아
  alternatives_korean:
  - 예수 그리스도
  lexicon: BDAG
  rationale: 칭호 정책 일관. 영어 POB가 「Christ」로 옮긴 한 곳이나, 본 번역은 한국어에서도 일관되게 「메시아」로 옮긴다(2:1과 2:14 등과 같이).
- source_word: μετὰ πάντων ὑμῶν
  english_pob_choice: with all of you
  chosen_korean: 여러분 모두와 함께
  alternatives_korean:
  - 여러분 모두에게
  lexicon: BDAG
  rationale: 분배적 「모두」 보존. 동사 없는 축복문에 「있기를 빕니다」 보충.
theological_decisions:
- issue: Χριστοῦ 번역의 일관성
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 번역은 모든 「Χριστός」 칭호를 일관되게 「메시아」로 옮긴다. 영어 POB의 마지막 절은 본문에서 「Christ」를 채택하나(아마도 마무리 정형 표현 어조), 본 번역의 한국어 일관성을 위해 「메시아」를 유지하고 대안은 각주.
  doctrine_reference: 'Contested terms — Χριστός'
