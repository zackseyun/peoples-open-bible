review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y el rastro de auditoría del POB: «Percibe» transmite adecuadamente el valor sapiencial-experiencial de טָעֲמָה, «que» introduce correctamente el contenido, «su mercancía» preserva el sentido comercial concreto de סַחְרָהּ, y «su lámpara no se apaga de noche» representa fielmente לֹא יִכְבֶּה ב/ליל נֵרָהּ. La única corrección necesaria está en la nota alternativa de «su comercio»/«su ganancia», donde la concordancia debe ajustarse al español.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español general. La puntuación y el ritmo proverbial funcionan bien. La calidad general es alta; solo hay un pequeño problema de concordancia gramatical en una nota al pie: «su comercio» y «su ganancia» no deben compartir «es buena» sin ajuste, porque «comercio» es masculino. Conviene reformular la nota para que ambas alternativas funcionen idiomáticamente.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Mercancía» para סַחְרָהּ está bien justificado; «lámpara» para נֵרָהּ preserva el referente concreto; y no aparecen términos teológicos sensibles del glosario general. La alternativa «prueba» para טָעֲמָה también está bien documentada como nota léxica.
  issues:
  - severity: low
    issue: Concordancia defectuosa en la nota al pie b
    rationale: 'La nota dice: «O «su comercio» o «su ganancia» es buena». «Comercio» es masculino, por lo que la formulación resulta gramaticalmente torpe. Debe reformularse para que ambas alternativas sean naturales y correctas en español.'
  revised_spanish_text: Percibe que su mercancía es buena[a][b]; su lámpara no se apaga de noche.
  revised_footnotes:
  - marker: a
    text: O «prueba», con el matiz de discernimiento por experiencia más que de comer literalmente.
    reason: lexical_alternative
  - marker: b
    text: O «su comercio es bueno» o «su ganancia es buena».
    reason: lexical_alternative
  revision_rationale: Se conserva íntegro el texto principal porque es fiel al hebreo y al POB inglés. Solo se corrige la nota b para resolver un problema menor de concordancia en español y hacer que ambas alternativas léxicas sean gramaticalmente naturales.
