translation:
  language: es
  text: entonces me aterras con sueños y me espantas con visiones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y me aterras con sueños, y de visiones me espantas». Las preposiciones hebreas pueden traducirse de manera más formal como «en/por medio de» y «de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: La conjunción abre la continuación del lamento y, en español, 'entonces' expresa mejor la relación consecutiva/resultativa que un simple 'y'.
- source_word: חִתַּתַּנִי
  english_pob_choice: you terrify me
  chosen_spanish: me aterras
  alternatives_spanish:
  - me aterrorizas
  - me amedrentas
  - me llenas de temor
  lexicon: HALOT
  rationale: El piel de חתת comunica un causar pavor o abatimiento intenso. 'Me aterras' conserva fuerza emocional sin volverlo físico ni suavizarlo demasiado.
- source_word: בַּחֲלֹמוֹת
  english_pob_choice: with dreams
  chosen_spanish: con sueños
  alternatives_spanish:
  - en sueños
  - por medio de sueños
  lexicon: HALOT
  rationale: La preposición ב admite valor instrumental/asociativo. 'Con sueños' mantiene naturalidad en español y el sentido de medio que refleja la lectura inglesa.
- source_word: וּמֵחֶזְיֹנוֹת
  english_pob_choice: with visions
  chosen_spanish: con visiones
  alternatives_spanish:
  - y desde visiones
  - y por visiones
  lexicon: HALOT
  rationale: מן puede marcar origen o medio. En paralelo con 'sueños', 'con visiones' conserva la equivalencia poética y la fuerza del paralelismo sin forzar una construcción menos idiomática.
- source_word: תְּבַעֲתַנִּי
  english_pob_choice: frighten me
  chosen_spanish: me espantas
  alternatives_spanish:
  - me asustas
  - me llenas de espanto
  - me atemorizas
  lexicon: HALOT
  rationale: El piel de בעת denota sobresalto o terror súbito. 'Me espantas' reproduce bien el efecto inmediato y evita repetir el mismo verbo que en la primera cola.
translation_notes:
  revision_awareness: 'Alineado con el pasaje hebreo WLC y con la nota inglesa: se mantiene el valor poético del paralelismo y se conserva la posibilidad alternativa de traducir las preposiciones de forma más literal.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; aquí no aparece, por lo que no se introduce.
  - '''Sueños'' y ''visiones'' conservan el campo semántico onírico/apocalíptico sin añadir especificación interpretativa.'
  - Se evita 'Señor' porque el verso no contiene יהוה ni κύριος.
