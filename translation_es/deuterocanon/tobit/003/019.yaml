translation:
  language: es
  text: Y en todo tiempo bendice a Yahvé Dios[a], y pídele que tus caminos se enderecen y que todos tus senderos y planes prosperen. Porque ninguna nación tiene consejo[b], pero Yahvé mismo da todos los bienes y humilla a quien quiere, como quiere. Y ahora, hijo, recuerda mis mandamientos, y no permitas que sean borrados de tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que tus caminos sean enderezados». El griego puede expresar tanto el llegar a ser rectos como el ser hechos rectos.'
    reason: lexical_alternative
  - marker: b
    text: La cláusula «ninguna nación tiene consejo» es breve en griego y puede entenderse como que ningún pueblo posee por sí mismo un consejo fiable, en contraste con Yahvé, que da lo bueno.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν παντὶ καιρῷ
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en cada tiempo
  lexicon: LSJ
  rationale: Conserva el valor distributivo de la expresión griega con un español natural y bíblico.
- source_word: εὐλόγει
  english_pob_choice: bless
  chosen_spanish: bendice
  alternatives_spanish:
  - alaba
  - bendice alabanza
  lexicon: LSJ
  rationale: ‘Bendice’ reproduce mejor el imperativo griego y el registro exhortativo del contexto sapiencial.
- source_word: Κύριον τὸν Θεόν
  english_pob_choice: the Lord God
  chosen_spanish: al Señor Dios
  alternatives_spanish:
  - al Señor, Dios
  - al Señor, el Dios
  lexicon: LSJ
  rationale: ‘Señor’ sigue la equivalencia habitual de κύριος; ‘Dios’ mantiene el título divino explícito del griego.
- source_word: παρʼ αὐτοῦ αἴτησον
  english_pob_choice: ask from him
  chosen_spanish: pídele
  alternatives_spanish:
  - pide de él
  - pide de parte de él
  lexicon: LSJ
  rationale: El español expresa de manera más natural la dirección ‘de parte de / desde’ con un dativo de destinatario implícito; la preposición griega queda reflejada en el sentido sin forzar una construcción extraña.
- source_word: ὅπως αἱ ὁδοί σου εὐθεῖαι γένωνται
  english_pob_choice: that your ways may be made straight
  chosen_spanish: que tus caminos sean enderezados
  alternatives_spanish:
  - que tus caminos lleguen a ser rectos
  - que tus caminos se enderecen
  lexicon: LSJ
  rationale: ‘Sean enderezados’ conserva el matiz pasivo/resultativo de γένωνται y la imagen bíblica de los caminos rectos.
- source_word: αἱ ὁδοί
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - vías
  lexicon: LSJ
  rationale: En español, ‘caminos’ comunica con claridad la metáfora de vida/conducta presente en el texto.
- source_word: πᾶσαι αἱ τρίβοι
  english_pob_choice: all your paths
  chosen_spanish: todos tus senderos
  alternatives_spanish:
  - todos tus caminos
  - todas tus sendas
  lexicon: LSJ
  rationale: ‘Senderos’ ayuda a distinguir τρίβοι de ὁδοί sin perder el paralelismo poético.
- source_word: βουλαὶ
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - propósitos
  - consejos
  lexicon: LSJ
  rationale: ‘Planes’ es la opción más clara en español moderno para las intenciones o diseños humanos en este contexto.
- source_word: εὐοδωθῶσιν
  english_pob_choice: may prosper
  chosen_spanish: prosperen
  alternatives_spanish:
  - tengan buen éxito
  - salgan bien
  lexicon: LSJ
  rationale: ‘Prosperen’ mantiene la idea de buen resultado y avance favorable, en tono de oración.
- source_word: πᾶν ἔθνος οὐκ ἔχει βουλήν
  english_pob_choice: no nation has counsel
  chosen_spanish: ninguna nación tiene consejo
  alternatives_spanish:
  - ningún pueblo tiene consejo
  - ninguna nación posee verdadero consejo
  lexicon: LSJ
  rationale: ‘Consejo’ reproduce la palabra clave βουλή y conserva la tersedad del griego; se mantiene la posible amplitud semántica sin resolverla demasiado.
- source_word: δίδωσιν πάντα τὰ ἀγαθὰ
  english_pob_choice: gives all good things
  chosen_spanish: da todos los bienes
  alternatives_spanish:
  - da todo lo bueno
  - concede todos los bienes
  lexicon: LSJ
  rationale: ‘Bienes’ comunica en español el sentido amplio de dones/bienaventuranzas y preserva la generalidad de τὰ ἀγαθά.
- source_word: ὃ ἐὰν θέλῃ ταπεινοῖ
  english_pob_choice: whomever he wills he humbles
  chosen_spanish: humilla a quien quiere
  alternatives_spanish:
  - humilla a cualquiera que quiere
  - humilla a quien él quiere
  lexicon: LSJ
  rationale: Conserva la agencia divina y evita suavizar la afirmación soberana del griego.
- source_word: καθὼς βούλεται
  english_pob_choice: as he wills
  chosen_spanish: como quiere
  alternatives_spanish:
  - según quiere
  - como él quiere
  lexicon: LSJ
  rationale: Reproduce la repetición enfática de la voluntad divina con una formulación idiomática en español.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - hijo
  - pequeño
  lexicon: LSJ
  rationale: ‘Niño’ preserva el tono afectuoso del vocativo y es aceptable en un registro directo; aunque el griego es diminutivo, no exige añadir posesión.
- source_word: μνημόνευε
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - ten presentes
  - acuerda
  lexicon: LSJ
  rationale: Imperativo simple y natural que mantiene el carácter exhortativo.
- source_word: τῶν ἐντολῶν μου
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis mandatos
  - mis instrucciones
  lexicon: LSJ
  rationale: ‘Mandamientos’ conserva la fuerza normativa y la resonancia bíblica de ἐντολαί.
- source_word: μὴ ἐξαλειφθήτωσαν ἐκ τῆς καρδίας σου
  english_pob_choice: do not let them be blotted out from your heart
  chosen_spanish: no permitas que sean borrados de tu corazón
  alternatives_spanish:
  - no dejes que sean borrados de tu corazón
  - que no sean borrados de tu corazón
  lexicon: LSJ
  rationale: ‘Borrados’/‘borrado’ comunica el metáfora de ἐξαλειφθήτωσαν; la prohibición se expresa de forma natural en español con el sentido de no consentir su desaparición.
theological_decisions:
- issue: Rendering of κύριος in a wisdom exhortation addressed to God
  english_pob_reading: the Lord God
  chosen_spanish_reading: el Señor Dios
  alternative_spanish_readings:
  - el Señor
  - el Dueño Dios
  rationale: Se conserva la equivalencia estable de κύριος como ‘Señor’ y se mantiene el título divino explícito del texto griego con ‘Dios’.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Clause stating divine sovereignty over human fortunes
  english_pob_reading: whomever he wills he humbles, as he wills
  chosen_spanish_reading: humilla a quien quiere, como quiere
  alternative_spanish_readings:
  - humilla a quien desea, según su voluntad
  - humilla a cualquiera que él quiere, como quiere
  rationale: 'La redacción conserva la tensión teológica del texto: Dios da bienes y también humilla según su voluntad, sin atenuar la afirmación.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Possible ambiguity in πᾶν ἔθνος οὐκ ἔχει βουλήν
  english_pob_reading: no nation has counsel
  chosen_spanish_reading: ninguna nación tiene consejo
  alternative_spanish_readings:
  - ningún pueblo tiene consejo
  - ninguna nación posee consejo fiable
  rationale: Se deja la sentencia en forma sobria y cercana al griego, preservando la ambigüedad entre ‘consejo’ como prudencia, plan o consejo fiable.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete y el audit trail inglés. La redacción española conserva la paralelidad entre caminos/senderos/planes, la metáfora de enderezar caminos, y la afirmación soberana sobre la voluntad divina sin resolver sus tensiones semánticas.
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ para κύριος y ‘Dios’ para Θεός, acorde con el estándar del proyecto.
  - Se usa ‘mandamientos’ para ἐντολαί por su fuerza normativa y tono bíblico.
  - ‘Bienes’ traduce τὰ ἀγαθά de forma amplia y no restrictiva; no se redujo a ‘cosas buenas’.
  - ‘Borrados de tu corazón’ preserva la metáfora de desvanecimiento/borraza del original.
  - Los marcadores de nota aparecen solo donde hay una alternativa lexical o de lectura realmente útil para el lector.
