translation:
  language: es
  text: Bendito sea el Señor,[a] que día tras día nos sostiene[b]—Dios es nuestra salvación. Selah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene aquí «Adonay», un título divino de señorío; no aparece el nombre divino «Yahvé» en esta línea.
    reason: theological_note
  - marker: b
    text: O «que día tras día nos lleva»; tradicionalmente, «que diariamente nos colma de beneficios». El verbo hebreo se refiere a cargar o llevar, y el objeto no está expresado explícitamente.
    reason: alternative_reading
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito
  - Alabado sea
  lexicon: HALOT
  rationale: La forma participial funciona en una fórmula doxológica. En español, «Bendito sea» reproduce de manera natural y formal la bendición dirigida a Yahvé sin volverla mecánica.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: En el registro bíblico español, «el Señor» expresa la titulación divina de manera natural. Aquí el contexto es una doxología dirigida a Yahvé; se mantiene la referencia reverente sin introducir un reemplazo opaco distinto al nombre divino del verso en esta formulación tradicional-readable.
- source_word: יוֹם יוֹם
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - cada día
  - día a día
  lexicon: HALOT
  rationale: La repetición hebrea es distributiva e intensiva. «Día tras día» conserva esa reiteración y suena idiomático en español, con un valor muy cercano a «day by day».
- source_word: יַעֲמָס לָנוּ
  english_pob_choice: bears us up
  chosen_spanish: nos sostiene
  alternatives_spanish:
  - nos carga
  - nos lleva sobre sí
  - lleva nuestra carga
  lexicon: HALOT
  rationale: El verbo עמס tiene el campo de cargar, llevar y soportar. Dado que el objeto no está expresado explícitamente, «nos sostiene» comunica el sentido de apoyo continuo y evita añadir «beneficios» u otro objeto no presente en el hebreo. Mantiene la tensión entre cargar y sostener sin sobreespecificar.
- source_word: הָאֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Poderoso
  lexicon: HALOT
  rationale: El sustantivo con artículo funciona como designación divina general. «Dios» es la equivalencia directa y clara en español.
- source_word: יְשׁוּעָתֵנוּ
  english_pob_choice: our salvation
  chosen_spanish: nuestra salvación
  alternatives_spanish:
  - nuestra liberación
  - nuestra victoria
  lexicon: HALOT
  rationale: El sustantivo conserva su alcance teológico de rescate y salvación. «Nuestra salvación» es la forma más amplia y fiel para el español bíblico.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selá
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional por la incertidumbre semántica del término. No se traduce para no fingir certeza donde el hebreo no la ofrece.
theological_decisions:
- issue: Interpretación del verbo comprimido יַעֲמָס לָנוּ
  english_pob_reading: God is praised as the one who continually bears the burden of his people.
  chosen_spanish_reading: Dios es alabado como el que continuamente nos sostiene.
  alternative_spanish_readings:
  - Dios nos carga diariamente con beneficios.
  - Dios nos lleva sobre sí día tras día.
  rationale: El hebreo es comprimido y el objeto no está explícito. La tradición de «beneficios» añade un objeto ausente; por eso se evita. «Nos sostiene» refleja el movimiento de soporte continuo, preservando la imagen sin expandirla indebidamente.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Tratamiento del nombre/título divino en una fórmula de bendición
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: Aunque el proyecto suele usar «Yahvé» para יהוה, en esta fórmula doxológica el español bíblico de alta inteligibilidad permite «el Señor» como título reverencial. Se conserva la referencia divina del texto y se deja la nota para explicitar la decisión frente al nombre divino.
  doctrine_reference: Project terminology default for divine lordship language
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió una lectura más directa de יַעֲמָס sin introducir «beneficios». En español se optó por «nos sostiene» para mantener esa directidad y la idea de sustento continuo, evitando una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, con puntuación de cita poética y una raya para reflejar la pausa del hemistiquio.
  - «Selah» se dejó sin traducir por consistencia con el tratamiento del término en la tradición de la POB.
  - No se usó «SEÑOR» como máscara tipográfica; la opción «el Señor» se explica como decisión estilística y no como sustituto automático del nombre divino.
