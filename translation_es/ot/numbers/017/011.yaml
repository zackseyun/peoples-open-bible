translation:
  language: es
  text: 'Entonces Moisés dijo a Aarón[a]: «Toma el incensario, y pon en él fuego del altar, y pon incienso sobre él, y ve rápidamente a la congregación y haz expiación por ellos, porque la ira ha salido de delante de Yahvé[b]; la plaga ha comenzado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el brasero».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de delante de Yahvé», es decir, de su presencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּחְתָּה
  english_pob_choice: the censer
  chosen_spanish: el incensario
  alternatives_spanish:
  - el brasero
  - la pala para brasas
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el objeto es el recipiente para brasas e incienso. «Incensario» es el equivalente natural en español bíblico y comunica mejor la función cultual que una paráfrasis más general.
- source_word: וְתֶן עָלֶיהָ אֵשׁ מֵעַל הַמִּזְבֵּחַ
  english_pob_choice: put fire from the altar in it
  chosen_spanish: pon en él fuego de sobre el altar
  alternatives_spanish:
  - pon fuego del altar en él
  - pon en él fuego del altar
  lexicon: HALOT
  rationale: El hebreo indica que el fuego procede de encima del altar y va al recipiente. «De sobre el altar» conserva la imagen espacial del original sin sonar tan forzado como un calco literal.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  lexicon: HALOT
  rationale: Es el término cultual estándar y directo en español; no requiere especificación adicional.
- source_word: וְהוֹלֵךְ מְהֵרָה
  english_pob_choice: go quickly
  chosen_spanish: ve rápidamente
  alternatives_spanish:
  - ve aprisa
  - ve de prisa
  - ve con rapidez
  lexicon: HALOT
  rationale: La secuencia verbal expresa movimiento urgente. «Ve rápidamente» mantiene el imperativo y la urgencia de forma natural en español.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: En Números, el término señala al pueblo reunido como cuerpo pactal. «Congregación» preserva ese sentido colectivo formal que la POB ya documenta en inglés.
- source_word: וְכַפֵּר עֲלֵיהֶם
  english_pob_choice: make atonement for them
  chosen_spanish: haz expiación por ellos
  alternatives_spanish:
  - haz expiación por ellos
  - haz propiciación por ellos
  - haz atonación por ellos
  lexicon: HALOT
  rationale: El hebreo כפר en contexto sacerdotal puede traducirse con fuerza ritual como «hacer expiación». Aquí se elige «haz expiación» para mantener el valor cultual del verbo sin añadir una formulación doctrinal más interpretativa.
- source_word: הַקֶּצֶף
  english_pob_choice: wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - el furor
  - la furia
  - la indignación
  lexicon: HALOT
  rationale: Aunque la POB inglesa usa «wrath», en español «ira» comunica bien el estallido judicial de juicio divino. Se evita «furia» por su matiz más emocional y menos técnico.
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: from before Yahweh
  chosen_spanish: de delante de Yahvé
  alternatives_spanish:
  - de la presencia de Yahvé
  - de ante Yahvé
  lexicon: HALOT
  rationale: «De delante de Yahvé» conserva la imagen hebrea de procedencia desde la presencia divina. Se sigue el estándar del proyecto para el nombre divino, evitando el ocultamiento con «SEÑOR».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene la forma española habitual del nombre divino en el proyecto, coherente con la política de traducción del POB.
- source_word: הֵחֵל הַנָּגֶף
  english_pob_choice: the plague has begun
  chosen_spanish: la plaga ha comenzado
  alternatives_spanish:
  - ha comenzado la plaga
  - la mortandad ha comenzado
  - el azote ha comenzado
  lexicon: HALOT
  rationale: En este pasaje, נֶגֶף designa un golpe divino mortífero sobre el pueblo. «Plaga» es natural y transmite bien la gravedad del evento sin estrechar indebidamente el término.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrama. La traducción conserva el nombre divino en vez de sustituirlo por un título, siguiendo la línea auditable del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido cultual de כפר
  english_pob_reading: make atonement for them
  chosen_spanish_reading: haz expiación por ellos
  alternative_spanish_readings:
  - haz atonación por ellos
  - haz propiciación por ellos
  rationale: El contexto describe una acción sacerdotal para detener el juicio divino. «Expiación» mantiene el valor ritual del verbo y permite que el lector perciba la función sacrificial sin añadir una explicación doctrinal externa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La POB inglesa pasó por una revisión menor en la expresión sobre el altar, simplificando «from upon the altar» a «from the altar» por naturalidad. La versión española refleja esa naturalidad con «de sobre el altar», manteniendo la relación espacial del hebreo sin calco torpe. No se detectan otros cambios sustantivos en el contenido auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «congregación» para הָעֵדָה, alineado con el sentido corporativo-covenantal del término en Números.
  - «Incensario» y «incienso» conservan el registro cultual bíblico en español.
  - «Haz expiación» preserva el verbo sacerdotal כפר sin reemplazarlo por una explicación más larga.
  - Se evita suavizar la gravedad de הַקֶּצֶף y הַנָּגֶף; «ira» y «plaga» comunican el juicio divino de forma clara.
