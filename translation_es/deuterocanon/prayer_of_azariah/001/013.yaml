translation:
  language: es
  text: tal como hablaste a ellos, diciendo que su descendencia[a] sería multiplicada como las estrellas del cielo en número y como la arena junto a la orilla del mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su semilla» o «su simiente». El griego dice literalmente «su semilla», conservando el lenguaje de la promesa ancestral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησας
  english_pob_choice: you spoke
  chosen_spanish: hablaste
  alternatives_spanish:
  - dijiste
  lexicon: BDAG
  rationale: λαλέω aquí introduce una declaración solemne dirigida a Dios; «hablaste» conserva un tono más formal y cercano al registro bíblico que «dijiste», sin perder naturalidad en español.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - con ellos
  lexicon: BDAG
  rationale: La preposición πρός con acusativo señala dirección hacia los destinatarios del habla; «a ellos» es la correspondencia directa y clara en español.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - cuando dijiste
  lexicon: BDAG
  rationale: El participio introduce el contenido de la promesa. «Diciendo» mantiene la relación sintáctica del griego sin forzar una reexpresión interpretativa.
- source_word: πολυπληθῦναι
  english_pob_choice: would be multiplied
  chosen_spanish: sería multiplicada
  alternatives_spanish:
  - sería muy numerosa
  - sería aumentada
  lexicon: LSJ
  rationale: El infinitivo expresa el resultado prometido para la descendencia. En español, la pasiva perifrástica «sería multiplicada» transmite bien la idea de incremento numérico y conserva la forma promissoria.
- source_word: τὸ σπέρμα αὐτῶν
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su semilla
  - su simiente
  - sus descendientes
  lexicon: BDAG
  rationale: Aunque σπέρμα significa literalmente «semilla» y el POB inglés preserva el eco de promesa, en español «descendencia» comunica de manera más natural el sentido genealógico y el alcance covenantal sin sonar artificial. Se mantiene la referencia a la línea prometida.
- source_word: ὡς τὰ ἄστρα τοῦ οὐρανοῦ
  english_pob_choice: like the stars of heaven
  chosen_spanish: como las estrellas del cielo
  alternatives_spanish:
  - como las estrellas del cielo
  - como las estrellas del firmamento
  lexicon: BDAG
  rationale: «Cielo» es la manera más natural de reflejar οὐρανός en este giro bíblico y conserva el registro escritural tradicional sin necesidad de paráfrasis.
- source_word: τῷ πλήθει
  english_pob_choice: in number
  chosen_spanish: en número
  alternatives_spanish:
  - por su multitud
  - en multitud
  lexicon: LSJ
  rationale: El dativo de medida o respecto se vierte de forma más transparente en español con «en número», que expresa la dimensión cuantitativa de la comparación.
- source_word: ὡς τὴν ἄμμον τὴν παρὰ τὸ χεῖλος τῆς θαλάσσης
  english_pob_choice: like the sand by the shore of the sea
  chosen_spanish: como la arena junto a la orilla del mar
  alternatives_spanish:
  - como la arena junto al borde del mar
  - como la arena en la playa
  lexicon: BDAG
  rationale: χείλος literalmente es «borde» o «labio», pero en este modismo apunta a la orilla; «junto a la orilla del mar» preserva la imagen y resulta idiomático en español.
theological_decisions:
- issue: Término covenantal σπέρμα en una alusión a la promesa patriarcal
  english_pob_reading: their offspring
  chosen_spanish_reading: su descendencia
  alternative_spanish_readings:
  - su semilla
  - su simiente
  - sus descendientes
  rationale: El inglés POB dejó constancia del trasfondo textual de «their seed», pero optó por «offspring» por fluidez. En español, «descendencia» equilibra naturalidad y resonancia patriarcal, evitando un calco que sonaría poco idiomático. La tensión intertextual se conserva por el contexto de promesa numérica a la línea prometida.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: This draft follows the adjudicated Greek override layer and the English audit trail, including the revision from 'seed' to 'offspring' for naturalness. The Spanish preserves the promise structure, the comparative imagery, and the covenantal sense of σπέρμα without forcing an English calque.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico digno y claro, con preferencia por formas naturales del español.
  - «Descendencia» se usa para evitar una literalidad opaca con σπέρμα, pero la nota conserva la alternativa literal relevante.
  - «En número» reproduce el dativo de medida sin añadir interpretación.
  - No se introduce terminología eclesiástica ajena al texto; la imagen de promesa patriarcal queda explícita en el contexto.
  - La puntuación sigue el ritmo de una cláusula comparativa con participio introductorio.
