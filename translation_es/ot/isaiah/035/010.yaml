translation:
  language: es
  text: Y los redimidos de Yahvé volverán y vendrán a Sion con canto; alegría eterna estará sobre sus cabezas. Gozo y alegría los alcanzarán[a], y la tristeza y el gemido huirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los rescatados de Yahvé». El término hebreo puede referirse a quienes han sido reclamados por redención o rescate.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְדוּיֵי יְהוָה
  english_pob_choice: the redeemed of Yahweh / the redeemed of the LORD
  chosen_spanish: los redimidos de Yahvé
  alternatives_spanish:
  - los rescatados de Yahvé
  - los rescatados por Yahvé
  lexicon: HALOT
  rationale: פְדוּיֵי es el participio pasivo plural de פדה, con valor de personas ya redimidas o rescatadas. En español, «redimidos» conserva el sentido salvífico y el vínculo de pertenencia a Yahvé. Se evita sustituirlo por un término más eclesiástico o más explicativo que el hebreo no exige.
- source_word: יְשֻׁבוּן
  english_pob_choice: will return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - volverán otra vez
  lexicon: HALOT
  rationale: שוב expresa volver/regresar. «Volverán» es natural y directo en español, y mantiene la idea de retorno sin añadir matices no presentes en el texto.
- source_word: וּבָאוּ צִיּוֹן
  english_pob_choice: and come to Zion
  chosen_spanish: y vendrán a Sion
  alternatives_spanish:
  - y llegarán a Sion
  - y entrarán en Sion
  lexicon: HALOT
  rationale: בוא significa venir/llegar. «Vendrán a Sion» reproduce bien el movimiento hacia Sion sin forzar «entrar», que sería más interpretativo. Se usa «Sion» como forma española usual del topónimo.
- source_word: בְּרִנָּה
  english_pob_choice: with singing
  chosen_spanish: con júbilo
  alternatives_spanish:
  - cantando
  - con canto gozoso
  - con regocijo
  lexicon: HALOT
  rationale: רִנָּה puede abarcar grito jubiloso, regocijo expresado en canto o aclamo. «Con júbilo» preserva el tono celebrativo sin obligar a una referencia estricta al acto de cantar, que en español podría estrechar demasiado el hebreo.
- source_word: וְשִׂמְחַת עוֹלָם
  english_pob_choice: everlasting joy
  chosen_spanish: alegría eterna
  alternatives_spanish:
  - gozo eterno
  - alegría perpetua
  lexicon: HALOT
  rationale: La construcción literalmente expresa una alegría/ gozo de duración perpetua. «Alegría eterna» es idiomática y fiel; se prefiere «alegría» aquí porque el verso ya contiene «gozo» después, y así se conserva mejor la doblete hebrea.
- source_word: עַל רֹאשָׁם
  english_pob_choice: upon their heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - encima de sus cabezas
  - en sus cabezas
  lexicon: HALOT
  rationale: La imagen poética de algo que reposa sobre la cabeza se conserva con «sobre sus cabezas». Es más natural en español que «upon» calco y mantiene la posible alusión a corona o adorno sin explicitarla.
- source_word: שָׂשׂוֹן וְשִׂמְחָה
  english_pob_choice: Gladness and joy
  chosen_spanish: Gozo y alegría
  alternatives_spanish:
  - regocijo y alegría
  - gozo y regocijo
  lexicon: HALOT
  rationale: Ambos sustantivos se solapan semánticamente. «Gozo y alegría» reproduce el doblete con dos palabras cercanas pero no idénticas, y suena natural en español bíblico contemporáneo.
- source_word: יַשִּׂיגוּ
  english_pob_choice: will overtake them
  chosen_spanish: los alcanzarán
  alternatives_spanish:
  - los overtendrán
  - los tomarán
  lexicon: HALOT
  rationale: נשׂג significa alcanzar, llegar a, sobrepasar o alcanzar inesperadamente. «Los alcanzarán» conserva la imagen de algo que llega hasta ellos y evita introducir una personificación demasiado marcada que el español podría volver pesada.
- source_word: וְנָסוּ
  english_pob_choice: will flee away
  chosen_spanish: y huirán
  alternatives_spanish:
  - y escaparán
  - y se irán huyendo
  lexicon: HALOT
  rationale: נוס es huir/escapar. En español, al estar ligados a «tristeza y gemido», el verbo puede entenderse como que esos males huyen. «Huirán» conserva bien la personificación y el movimiento rápido de alejamiento.
- source_word: יָגוֹן וַאֲנָחָה
  english_pob_choice: sorrow and sighing
  chosen_spanish: la tristeza y el gemido
  alternatives_spanish:
  - el dolor y el gemido
  - la aflicción y el suspiro
  lexicon: HALOT
  rationale: יָגוֹן denota tristeza, dolor o pesar; אֲנָחָה es gemido, suspiro o quejido. «La tristeza y el gemido» mantiene el paralelismo emocional y sonoro, y en español comunica bien la desaparición de la aflicción.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh / the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En el proyecto, la forma española principal es «Yahvé», que preserva el nombre divino en vez de ocultarlo bajo un título. «el SEÑOR» se descarta por ser una convención de sustitución, no una traducción directa del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Tensión léxica entre redención y rescate en פְדוּיֵי
  english_pob_reading: the redeemed / the ransomed
  chosen_spanish_reading: los redimidos
  alternative_spanish_readings:
  - los rescatados
  - los rescatados por rescate
  rationale: El contexto admite tanto la idea de redención como la de rescate mediante pago. «Redimidos» conserva el campo semántico amplio y se ajusta a la imagen de pertenencia restaurada. Se evita fijar el mecanismo económico si el hebreo solo lo presupone.
  doctrine_reference: 'DOCTRINE.md: Redemption language — lexical range of פדה'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del expediente inglés: no se requieren cambios adicionales. Se ha conservado la decisión principal «redimidos» frente a la alternativa «rescatados», y se ha mantenido el nombre divino como Yahvé conforme a la política del proyecto.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Sion» se conserva como topónimo consagrado por el uso bíblico español.
  - Se alternan «gozo» y «alegría» para reflejar el doblete hebreo sin sonar tautológico.
  - La personificación de la tristeza y el gemido se conserva en «huirán».
