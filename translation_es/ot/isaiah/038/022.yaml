    issue: Interrogativo español algo menos fiel/natural
    rationale: מָה אֹות se reproduce más naturalmente como «¿Qué señal…?» o «¿Qué señal hay…?» que como «¿Cuál es la señal…?». La formulación actual no es incorrecta, pero introduce una estructura más explicativa que la pregunta hebrea simple.
  - severity: low
    issue: Construcción «de que yo subiré» pesada
    rationale: Aunque gramatical, «de que yo subiré» suena cargado. En registro bíblico natural, «de que he de subir» comunica bien el futuro esperado y evita el pronombre explícito innecesario.
  - severity: low
    issue: Puntuación final española mejorable
    rationale: En composición española con comillas angulares, basta cerrar con el signo de interrogación dentro de las comillas; el punto final exterior es redundante en este contexto.
