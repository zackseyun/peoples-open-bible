translation:
  language: es
  text: El vino nuevo se lamenta; la vid se marchita; todos los alegres de corazón[a] gimen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los de corazón alegre gimen». El hebreo dice literalmente «todos los alegres de corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבַל
  english_pob_choice: mourns
  chosen_spanish: se lamenta
  alternatives_spanish:
  - llora
  - murmura de dolor
  - se duelo
  lexicon: HALOT
  rationale: El verbo expresa duelo o lamento. En español, 'se lamenta' conserva la personificación poética del vino nuevo sin reducirla a un simple deterioro físico.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - mosto
  - vino تازه
  lexicon: HALOT
  rationale: '''Vino nuevo'' es la equivalencia natural y transparente para תִּירוֹשׁ; mantiene la distinción léxica frente a ''vino'' en general y es inteligible para lectura pública.'
- source_word: אֻמְלְלָה
  english_pob_choice: withers
  chosen_spanish: se marchita
  alternatives_spanish:
  - se debilita
  - se mustia
  - se desvanece
  lexicon: HALOT
  rationale: El verbo describe el decaimiento de una planta. 'Se marchita' comunica bien la imagen agrícola de la vid y su paralelismo con el lamento del verso.
- source_word: גָּפֶן
  english_pob_choice: the vine
  chosen_spanish: la vid
  alternatives_spanish:
  - la parra
  - la viña
  lexicon: HALOT
  rationale: '''Vid'' es el equivalente más preciso y natural en español para la planta de la uva; evita la ambigüedad de ''viña'' y suena más directo que ''parra''.'
- source_word: נֶאֶנְחוּ
  english_pob_choice: groan
  chosen_spanish: gimen
  alternatives_spanish:
  - gimen de dolor
  - suspiran
  - se lamentan
  lexicon: HALOT
  rationale: El niphal sugiere un gemido audible de aflicción. 'Gimen' reproduce mejor la intensidad del hebreo y conserva el contraste con el campo semántico de alegría del final del verso.
- source_word: שִׂמְחֵי לֵב
  english_pob_choice: the glad of heart
  chosen_spanish: los de corazón alegre
  alternatives_spanish:
  - los alegres de corazón
  - los de corazón gozoso
  - los alegres
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'los alegres/alegres de corazón'. 'Los de corazón alegre' mantiene la estructura semítica sin sonar forzado y conserva el valor interior de 'corazón'.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'the merry-hearted' a 'the glad of heart'; la propuesta española sigue esa lectura más formal y cercana al hebreo, sin introducir reinterpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene 'vino nuevo' para תִּירוֹשׁ, en línea con la decisión inglesa auditada.
  - Se conserva la personificación del primer hemistiquio y el paralelismo con el gemido humano del segundo.
  - '''Corazón alegre'' refleja de forma directa la construcción hebrea y evita un giro demasiado libre como ''alegres''.'
