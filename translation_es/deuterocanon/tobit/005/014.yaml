translation:
  language: es
  text: 'Y le dijo: «Que vengas sano, hermano; y no te enojes conmigo porque quise conocer tu tribu y tu familia. Y tú resultaste ser mi hermano, de buen y noble linaje. Porque yo conocía a Ananías y a Jatán, los hijos de Semeí el grande, como solíamos ir juntos a Jerusalén para adorar, llevando los primogénitos y los diezmos de los productos; y no se extraviaron en el error de nuestros hermanos[a]. De buena raíz[b] eres, hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Nuestros hermanos» aquí se refiere a parientes o israelitas compañeros, no necesariamente sólo a hermanos varones.
    reason: lexical_alternative
  - marker: b
    text: «Buena raíz» conserva la metáfora del griego para hablar de origen y descendencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑγιαίνων ἔλθοις
  english_pob_choice: May you come in health
  chosen_spanish: Que vengas sano
  alternatives_spanish:
  - Ve en salud
  - Que llegues sano
  lexicon: LSJ
  rationale: La fórmula es un deseo convencional de bienestar; en español, «que vengas sano» conserva el valor optativo y suena natural. Se evita «ve en salud» por ser menos idiomático en este contexto.
- source_word: φυλήν
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - clan
  lexicon: LSJ
  rationale: «Tribu» preserva el sentido genealógico y social de la palabra griega en un contexto de identidad israelita.
- source_word: πατριάν
  english_pob_choice: family
  chosen_spanish: familia
  alternatives_spanish:
  - linaje
  - casa paterna
  lexicon: LSJ
  rationale: «Familia» es claro en español moderno y mantiene el ámbito de pertenencia ancestral al que apunta el término.
- source_word: ἐπιγνῶναι
  english_pob_choice: to learn
  chosen_spanish: conocer
  alternatives_spanish:
  - averiguar
  - llegar a saber
  lexicon: BDAG
  rationale: Aquí el infinitivo expresa el acto de enterarse o reconocer identidad; «conocer» funciona de manera natural en español sin perder la idea de investigación genealógica.
- source_word: τυγχάνεις
  english_pob_choice: turn out to be
  chosen_spanish: resultaste ser
  alternatives_spanish:
  - eres
  - has resultado ser
  lexicon: BDAG
  rationale: La forma griega implica descubrimiento o constatación; «resultaste ser» refleja ese matiz mejor que un simple «eres».
- source_word: ἀδελφός μου
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - mi pariente
  lexicon: BDAG
  rationale: Se conserva el término familiar directo, que mantiene la calidez y el alcance de parentesco del griego.
- source_word: γενεᾶς
  english_pob_choice: lineage
  chosen_spanish: genealogía
  alternatives_spanish:
  - linaje
  - estirpe
  lexicon: LSJ
  rationale: En este contexto el término remite a descendencia y origen familiar; «genealogía» explicita esa idea en español sin perder el contenido de procedencia.
- source_word: ἐπεγίνωσκον
  english_pob_choice: I knew
  chosen_spanish: yo conocía
  alternatives_spanish:
  - yo sabía de
  - yo reconocía
  lexicon: BDAG
  rationale: El imperfecto expresa conocimiento previo continuado; «yo conocía» comunica bien la relación previa con estas personas.
- source_word: κοινῶς
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en compañía
  - de común acuerdo
  lexicon: LSJ
  rationale: «Juntos» es la forma más clara y directa para el viaje compartido.
- source_word: προσκυνεῖν
  english_pob_choice: to worship
  chosen_spanish: adorar
  alternatives_spanish:
  - rendir culto
  - postrarnos en adoración
  lexicon: BDAG
  rationale: En el contexto de peregrinación a Jerusalén, «adorar» transmite adecuadamente el acto cultual requerido por el pasaje.
- source_word: τὰ πρωτότοκα
  english_pob_choice: the firstborn
  chosen_spanish: los primogénitos
  alternatives_spanish:
  - las primeras crías
  - los primeros nacidos
  lexicon: LSJ
  rationale: En español, «primogénitos» puede funcionar para las ofrendas o los animales primeros nacidos; conserva el enlace cultual sin añadir explicación excesiva al texto principal.
- source_word: τὰς δεκάτας τῶν γενημάτων
  english_pob_choice: the tithes of the produce
  chosen_spanish: los diezmos de los productos
  alternatives_spanish:
  - los diezmos de la cosecha
  - las décimas de los frutos
  lexicon: LSJ
  rationale: «Productos» reproduce el alcance amplio de γενήματα y «diezmos» mantiene la relación cultual del pasaje.
- source_word: οὐκ ἐπλανήθησαν ἐν τῇ πλάνῃ
  english_pob_choice: they were not led astray in the error
  chosen_spanish: no se extraviaron en el error
  alternatives_spanish:
  - no fueron desviados en el error
  - no se dejaron engañar por el extravío
  lexicon: BDAG
  rationale: La construcción de error y desviación se conserva con «extraviaron» y «error», manteniendo el juego semántico del griego.
- source_word: τῶν ἀδελφῶν ἡμῶν
  english_pob_choice: of our brothers
  chosen_spanish: de nuestros hermanos[b]
  alternatives_spanish:
  - de nuestros parientes
  - de nuestros compatriotas
  lexicon: BDAG
  rationale: Se mantiene «hermanos» para preservar el lenguaje de parentesco. La nota aclara que el plural es de kinsmen/Israelites, no sólo de hermanos varones.
- source_word: ἐκ ῥίζης καλῆς
  english_pob_choice: from a good root
  chosen_spanish: De buena raíz
  alternatives_spanish:
  - De buen linaje
  - De buena estirpe
  lexicon: LSJ
  rationale: Se conserva la metáfora vegetal del griego en «raíz», que alude a origen y calidad de descendencia; «buena» sigue de cerca el adjetivo del texto.
theological_decisions:
- issue: Lenguaje de parentesco y linaje
  english_pob_reading: Retain literal familial terms ('brother,' 'tribe,' 'family,' 'root') rather than smoothing into generalized social language.
  chosen_spanish_reading: Conservar los términos de parentesco y procedencia ('hermano', 'tribu', 'familia', 'raíz') sin neutralizarlos.
  alternative_spanish_readings:
  - Reemplazar por 'pariente' o 'compatriota'
  - Sustituir 'raíz' por 'linaje' en todo el versículo
  rationale: El pasaje resalta identidad israelita, memoria genealógica y continuidad de culto. La traducción mantiene esa textura semántica y no diluye el vocabulario de pertenencia.
  doctrine_reference: DOCTRINE.md §§1, 4, 5
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] en el texto español, evitando notas huérfanas. Se mantuvo la lectura fuente-griega y la equivalencia óptima del POB inglés.
  spanish_consistency_notes:
  - Se preserva el tono reverente y narrativo propio de Tobit.
  - Se mantiene la distinción entre parentesco literal y sentido colectivo de 'hermanos'.
  - '''Raíz'' se usa metafóricamente para no perder la imagen del original griego.'
  - Los cultismos se moderan para que el español siga siendo público y readable, sin sobreparáfrasis.
