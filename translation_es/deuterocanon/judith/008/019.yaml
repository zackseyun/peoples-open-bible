  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el griego y el rastro auditado en inglés: «Por esta razón», «fueron entregados», «a la espada», «al saqueo», «nuestros padres» y «delante/ante nuestros enemigos» preservan adecuadamente el sentido. El problema principal está en πτῶμα μέγα: el español «como un gran matadero» no representa bien el referente del griego, porque «matadero» nombra sobre todo un lugar de matanza, no el resultado de muchos muertos. Eso distorsiona la imagen bélica del original.'
  spanish_quality_summary: El texto es generalmente claro y de registro digno, pero «cayeron como un gran matadero» suena antinatural e incluso confuso en español eclesial general. Una formulación como «cayeron como una gran matanza» conserva mejor la compresión metafórica del griego y la revisión inglesa, a la vez que sigue siendo comprensible. También conviene anclar la nota al sintagma completo, no solo a «gran».
  glossary_alignment: No hay conflicto con los términos doctrinales del proyecto. «Nuestros padres» respeta la decisión de género-precisión. El ajuste requerido es léxico-estilístico para πτῶμα μέγα, no terminológico-teológico.
  issues:
  - severity: high
    issue: «como un gran matadero» para πτῶμα μέγα
    rationale: «Matadero» en español denota primariamente un lugar donde se mata animales o, por extensión, una escena muy sangrienta; aquí no comunica de forma fiel el modismo de muchos caídos y puede sonar impropio o erróneo. «Matanza» representa mejor el resultado colectivo de muertos.
  - severity: medium
    issue: Ubicación del marcador de nota
    rationale: El marcador [a] aparece solo en «gran[a]», pero la nota explica todo el sintagma griego πτῶμα μέγα. Es mejor anclarlo al final de la frase relevante para que la correspondencia sea clara.
  revised_spanish_text: Por esta razón nuestros padres fueron entregados a la espada y al saqueo, y cayeron como una gran matanza[a] delante de nuestros enemigos.
  revised_footnotes:
  - marker: a
    text: El griego dice literalmente algo como «un gran cuerpo caído» o «un gran cadáver»; es un modismo que expresa una gran cantidad de muertos.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «matadero» por «matanza» para reflejar con mayor fidelidad y naturalidad el sentido de πτῶμα μέγα en español. Se mantiene «como» para seguir la revisión auditada del inglés («as a great slaughter»), pero con una expresión española inteligible. El marcador de nota se mueve al final del sintagma que la nota realmente explica.
