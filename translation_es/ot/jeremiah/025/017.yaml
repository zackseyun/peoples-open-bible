revisions:
- from: Tomé la copa de la mano de Yahvé y di a beber a todas las naciones a las cuales Yahvé me había enviado[a][b].
  to: Tomé la copa de la mano de Yahvé y hice beber[a][b] a todas las naciones a las que Yahvé me había enviado.
  rationale: Se corrigió la cláusula final para expresar adecuadamente que Yahvé había enviado a Jeremías a esas naciones. También se prefirió 'hice beber' como representación más directa del hiphil causativo, manteniendo la alternativa 'di a beber' en nota. Se conservaron 'de la mano de Yahvé' y 'Yahvé' conforme al hebreo y a la política terminológica del proyecto.
