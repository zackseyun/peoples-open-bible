    text: O «los quemó en el fuego». El verbo hebreo puede traducirse de manera más general como «quemó», aunque «asó» conserva mejor su fuerza vívida.
    reason: lexical_alternative
  revision_rationale: Se ajusta la referencia comunitaria de לְכָל גָּלוּת a «entre todos los exiliados» para reflejar mejor el uso de la maldición como fórmula adoptada dentro del exilio; se reemplaza «desterrados» por «exiliados» por mayor precisión contextual; y se corrige la nota al pie para que preserve una alternativa real y use español natural. Se adopta «asó» en el texto principal para reflejar la decisión lexical auditada de mantener la viveza de קָלָם, dejando «los quemó en el fuego» como alternativa en nota.
