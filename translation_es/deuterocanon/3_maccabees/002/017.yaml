translation:
  language: es
  text: Hollamos la casa de la santidad[a], así como son holladas las casas de los habitantes de Jerusalén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘casa de la santificación’ o ‘casa de la consagración’. El griego dice literalmente ‘casa de la santificación’.
    reason: lexical_alternative
  - marker: b
    text: Es decir, las casas de los habitantes de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡμεῖς / We
  english_pob_choice: we
  chosen_spanish: Nosotros hemos
  alternatives_spanish:
  - Hemos
  - Nosotros
  lexicon: pronombre personal de 1.ª persona plural
  rationale: Conservo el sujeto explícito para reflejar el énfasis retórico del griego y la autoacusación colectiva. El tiempo perfecto compuesto naturaliza el pasado con resultado presente en español, sin borrar el valor de acción realizada.
- source_word: κατεπατήσαμεν
  english_pob_choice: we trampled
  chosen_spanish: hemos hollado
  alternatives_spanish:
  - hemos pisoteado
  - hemos trampled
  lexicon: LSJ
  rationale: El verbo significa pisar/tramplear bajo los pies. 'Hollar' mantiene la imagen concreta y un registro digno; 'pisotear' sería más directo, pero 'hollar' puede funcionar mejor en contexto bíblico-literario. Evito 'profanamos' porque interpreta el efecto más que la acción verbal.
- source_word: τὸν οἶκον
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el santuario
  lexicon: LSJ
  rationale: ‘οἶκος’ es literalmente ‘casa’. En contexto se refiere al edificio sagrado, pero conservo ‘casa’ para seguir de cerca la imagen griega y permitir que el genitivo siguiente especifique su carácter sagrado.
- source_word: τοῦ ἁγιασμοῦ
  english_pob_choice: of holiness
  chosen_spanish: de la santificación
  alternatives_spanish:
  - de la santidad
  - de la consagración
  lexicon: LSJ
  rationale: El sustantivo ἁγιασμός nombra la santificación/consagración, no solo una cualidad abstracta. En español, ‘casa de la santificación’ conserva la forma nominal y la tensión cultual del griego, aunque suene menos idiomático que ‘santidad’. Mantengo la posibilidad de que la casa sea entendida como la dedicada/santificada a Dios.
- source_word: ὡς καταπατοῦνται
  english_pob_choice: just as the houses ... are trampled
  chosen_spanish: así como se hollen
  alternatives_spanish:
  - así como son holladas
  - del mismo modo que se pisan
  lexicon: LSJ
  rationale: Conservo la comparación y la pasiva impersonal/reflexiva natural en español. Repito el mismo verbo raíz para preservar el paralelismo y la fuerza retórica del original.
- source_word: οἱ οἶκοι
  english_pob_choice: the houses
  chosen_spanish: las casas
  alternatives_spanish:
  - los hogares
  lexicon: LSJ
  rationale: Plural de οἶκος. ‘Casas’ mantiene el vínculo léxico con ‘casa’ y evita desplazar el sentido hacia ‘hogares’, que sería más interpretativo.
- source_word: τῶν προσολυμίων
  english_pob_choice: of the people of Jerusalem
  chosen_spanish: de los habitantes de Jerusalén
  alternatives_spanish:
  - de los jerusalemitas
  - de los de Jerusalén
  lexicon: LSJ
  rationale: El etnónimo apunta a los habitantes de la ciudad. ‘Habitantes de Jerusalén’ es claro y auditable en español, y conserva la referencia poblacional que explicaba la nota inglesa.
theological_decisions:
- issue: Cómo traducir οἶκος en un contexto de templo sin imponer una interpretación litúrgica fija
  english_pob_reading: the house of holiness
  chosen_spanish_reading: la casa de la santificación
  alternative_spanish_readings:
  - el templo de la santidad
  - el santuario
  rationale: Sigo la lectura inglesa de mantener ‘house’ para no borrar la concreción del griego. ‘Casa de la santificación’ preserva la imagen de un edificio santo/dedicado y evita sustituirla por una equivalencia eclesiástica más tradicional pero menos literal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo representar ἁγιασμός en una frase cultual
  english_pob_reading: holiness / sanctification
  chosen_spanish_reading: santificación
  alternative_spanish_readings:
  - santidad
  - consagración
  rationale: En español, ‘santidad’ sería más fluido, pero ‘santificación’ conserva mejor el sustantivo verbal del griego y sugiere el acto/estado de ser apartado para Dios. Se mantiene así la tensión entre cualidad y proceso que permite el término original.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente de ‘sanctification’ a ‘holiness’ por naturalidad y adecuación léxica. En español se optó por ‘santificación’ para conservar el sustantivo abstracto del griego ἁγιασμός y mantener la tensión lexical documentada; se registra en nota la alternativa ‘santidad’ para reflejar la misma discusión de naturalidad vs. forma nominal.
  spanish_consistency_notes:
  - Se mantiene una correspondencia formal entre el primer y el segundo verbo de ‘hollar’ para reflejar la repetición verbal del griego.
  - ‘Casa’ se conserva en ambos miembros del paralelismo para evitar oscurecer la conexión léxica con οἶκος.
  - Se usa ‘habitantes de Jerusalén’ para explicitar el etnónimo sin recurrir a un gentilicio menos transparente.
  - La puntuación conserva la comparación con ‘así como’, correspondiente a ὡς.
