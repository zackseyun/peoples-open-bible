revisions:
- from: 'Y presentarán un holocausto[a], una ofrenda encendida, de aroma agradable a Yahvé: un becerro, un carnero y siete corderos de un año, sin defecto.'
  to: 'Y presentarán un holocausto, una ofrenda hecha por fuego, de aroma agradable[a] a Yahvé: un toro, un carnero y siete corderos de un año, sin defecto.'
  rationale: Se corrige 'becerro' a 'toro' para reflejar fielmente פַּר y la decisión inglesa auditada. Se mejora אִשֵּׁה con 'ofrenda hecha por fuego', más idiomático y preciso en español cultual. Se reubica la nota al pie sobre 'aroma agradable', que es donde pertenece la alternativa léxica de רֵיחַ נִיחֹחַ, y se corrige el contenido de la nota para que la alternativa corresponda al aroma, no a la ofrenda.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:36:36Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura sacrificial del hebreo: mantiene ''holocausto'', conserva la doble expresión עֹלָה + אִשֵּׁה, traduce correctamente רֵיחַ נִיחֹחַ como aroma aceptable/agradable, y usa ''Yahvé'' para יהוה conforme al proyecto. También preserva bien la lista de animales y la cualidad ''sin defecto''. Sin embargo, hay dos desajustes importantes: פַּר אֶחָד se tradujo como ''un becerro'', que en español suele ser demasiado joven frente a ''bull'' y frente al valor sacrificial más normal de פַּר; y la nota al pie para [a] no corresponde al anclaje textual, pues comenta una alternativa de ''aroma agradable'' pero está colocada sobre ''holocausto''.'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. No obstante, 'ofrenda encendida' suena menos idiomático y menos preciso que 'ofrenda hecha por fuego' o 'ofrenda por fuego' para אִשֵּׁה. Además, la ubicación de la nota al pie crea confusión semántica. 'Un toro' mejora la precisión y la naturalidad respecto de 'un becerro'.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יהוה -> ''Yahvé'' correctamente. No hay conflictos con términos mesiánicos o doctrinales. La principal corrección léxica requerida es פַּר -> ''toro'' en vez de ''becerro''. Para אִשֵּׁה, conviene una formulación sacrificial más establecida en español (''ofrenda hecha por fuego'').'
  issues:
  - severity: high
    issue: פַּר אֶחָד fue traducido como 'un becerro'.
    rationale: El hebreo פַּר corresponde mejor a 'toro' en esta lista sacrificial. 'Becerro' suele sugerir un animal más joven y no reproduce bien la precisión del original ni la decisión inglesa auditada 'one bull'.
  - severity: medium
    issue: La nota [a] está anclada en 'holocausto', pero su contenido explica una alternativa para 'aroma agradable'.
    rationale: Esto desorienta al lector y rompe la correspondencia requerida entre marcador y palabra o frase anotada.
  - severity: medium
    issue: '''Ofrenda encendida'' es menos natural y menos precisa para אִשֵּׁה.'
    rationale: En español bíblico y cultual, 'ofrenda hecha por fuego' comunica mejor el mecanismo sacrificial y evita una expresión poco idiomática.
  - severity: low
    issue: La nota al pie dice 'una ofrenda apacible'.
    rationale: La alternativa documentada corresponde a 'aroma apacible/sosegante' o mejor 'aroma que sosiega'; no a 'ofrenda apacible', que cambia el referente semántico.
  revised_spanish_text: 'Y presentarán un holocausto, una ofrenda hecha por fuego, de aroma agradable[a] a Yahvé: un toro, un carnero y siete corderos de un año, sin defecto.'
  revised_footnotes:
