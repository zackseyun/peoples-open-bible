- from: Mi corazón clama por Moab[a]; sus fugitivos huyen hasta Zoar, hasta Eglat-selisiyá[b]. Porque por la subida de Luhit sube con llanto[c]; porque por el camino de Horonaim levantan un grito de destrucción.
  to: Mi corazón clama por Moab[a]; sus fugitivos huyen hasta Zoar, hasta Eglat-shelishiyá[b]. Porque suben por la subida de Luhit con llanto[c]; porque en el camino hacia Horonaim levantan un grito de destrucción.
  rationale: Se revisa la cláusula central para seguir la decisión auditada de plural colectivo y eliminar la ambigüedad de «sube». También se ajusta la referencia vial a «hacia Horonaim» para expresar dirección, y se mejora levemente la transliteración del topónimo incierto sin cambiar la estrategia de transliteración ni las notas.
