translation:
  language: es
  text: 'porque Sedequías, rey de Judá, lo había encerrado[a], diciendo: «¿Por qué profetizas: “Así dice Yahvé: He aquí, yo entrego esta ciudad en manos del rey de Babilonia, y él la capturará”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo había apresado», «lo había encarcelado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, debido a que
  lexicon: HALOT
  rationale: En este contexto introduce la relación causal con lo dicho antes, no solo una cláusula relativa. «Porque» comunica con naturalidad esa función discursiva en español.
- source_word: כְּלָאוֹ
  english_pob_choice: had confined him
  chosen_spanish: lo había encerrado
  alternatives_spanish:
  - lo había confinado
  - lo había apresado
  - lo había encarcelado
  lexicon: HALOT
  rationale: El verbo כלא abarca restringir, retener o encarcelar. «Encerrado» preserva la idea de privación de libertad de manera clara y natural en español; el contexto permite la alternativa más fuerte «encarcelado», pero «encerrado» mantiene una amplitud compatible con el hebreo y con la nota lexical del POB inglés.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - y dijo
  lexicon: HALOT
  rationale: Es la fórmula quotativa estándar. «Diciendo» sigue de cerca la función introductoria sin sobrecargar la frase.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Por qué razón?
  - ¿A qué viene que...?
  lexicon: HALOT
  rationale: Es una pregunta directa de reproche o protesta. «¿Por qué?» es la forma más natural y fiel en español.
- source_word: נִבָּא
  english_pob_choice: do you prophesy
  chosen_spanish: profetizas
  alternatives_spanish:
  - estás profetizando
  - haces de profeta
  lexicon: HALOT
  rationale: El verbo נבא se refiere a la acción profética. El presente simple en segunda persona transmite la queja del rey de forma idiomática; «profetizas» conserva la fuerza verbal sin añadir perífrasis innecesaria.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética clásica. Se usa «Yahvé» conforme al criterio del proyecto para יהוה, en vez de sustituirlo por un título.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo
  alternatives_spanish:
  - Mira, yo
  - Yo estoy por
  lexicon: HALOT
  rationale: La partícula introduce solemnidad e inmediatez. En español, «He aquí, yo» preserva ese tono profético sin desplazar el contenido verbal siguiente.
- source_word: נֹתֵן
  english_pob_choice: am giving
  chosen_spanish: entrego
  alternatives_spanish:
  - estoy entregando
  - voy a entregar
  lexicon: HALOT
  rationale: El participio en este contexto profético expresa acción inminente y segura. «Entrego» es una solución natural en español que mantiene la fuerza actual del anuncio; la perífrasis progresiva sería menos idiomática aquí.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - en manos de
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de entrega en poder de otro. «En mano de» mantiene el giro bíblico y es suficientemente transparente en español; «en manos de» sería una adaptación más idiomática pero menos cercana a la forma del original.
- source_word: וּלְכָדָהּ
  english_pob_choice: and he will capture it
  chosen_spanish: y la capturará
  alternatives_spanish:
  - y la tomará
  - y se apoderará de ella
  lexicon: HALOT
  rationale: לכד se usa para capturar una ciudad o posición militar. «Capturará» es preciso y conserva el valor bélico del verbo; el sujeto implícito es el rey de Babilonia.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la pauta del proyecto, se translitera como «Yahvé» para preservar el nombre propio del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Forma de la fórmula profética כֹּה אָמַר יְהוָה
  english_pob_reading: Thus says Yahweh
  chosen_spanish_reading: Así dice Yahvé
  alternative_spanish_readings:
  - Así ha dicho Yahvé
  - Así dice el SEÑOR
  rationale: Se mantiene la fórmula profética convencional y se vincula explícitamente con el nombre divino rendido como Yahvé. No se suaviza a un equivalente más libre porque la repetición fórmula-oráculo es parte del sentido del pasaje.
  doctrine_reference: Uso profético estándar en Jeremías; coherente con la terminología del proyecto para el nombre divino
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene el orden causal, el pasado previo («had confined him») y la fórmula profética sin cambios en la revisión más reciente; no se registraron correcciones. La propuesta española sigue esa lectura estable y conserva la tensión lexical de כלא con una opción principal natural y una nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Se mantuvo «capturará» para לכד, evitando diluir el sentido militar del verbo.
  - «En mano de» conserva la imagen idiomática hebrea de entrega/poder; puede alternar con «en manos de» si se busca mayor fluidez, pero no se prefirió aquí por fidelidad formal.
  - La puntuación reproduce el discurso directo anidado y respeta la secuencia de comillas de la fuente inglesa auditada.
