revisions:
- from: Por esto[a], porque de su piedad, cuando aquellos dieron sus cuerpos a aquellos sufrimientos, no solo fueron admirados por los hombres, sino que también fueron considerados dignos de una porción divina.
  to: Por esta razón[a], a causa de su piedad, cuando aquellos hombres entregaron sus cuerpos a aquellos sufrimientos, no solo fueron admirados por los hombres, sino que también fueron considerados dignos de una porción divina.
  rationale: Se corrige la sintaxis defectuosa de «porque de su piedad» a «a causa de su piedad», se explicita el referente de ἐκεῖνοι con «aquellos hombres» para mayor claridad, y se mejora la naturalidad inicial con «Por esta razón». Se mantiene «una porción divina» con su nota para preservar la ambigüedad teológica documentada.
