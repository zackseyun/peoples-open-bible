base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/004/048.yaml
  text: And he released Menelaus[a], the cause of all the evil, from among the accused; but for those wretched men—who, even if they had pleaded their case before Scythians[c][b], would have been acquitted—for them he decreed death.
  footnotes:
  - marker: a
    text: 'Literally, ''who, even if they had spoken before Scythians, would have been released uncondemned.'' The reference to Scythians heightens the irony: even a people stereotyped as harsh would have judged them innocent.'
    reason: cultural_note
  - marker: b
    text: Or 'would have been acquitted' for 'would have been released as innocent.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he sentenced them to death.'
    reason: lexical_alternative
