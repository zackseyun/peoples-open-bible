translation:
  language: es
  text: Vayamos a su morada[a]; postrémonos ante su escabel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a sus moradas». El hebreo conserva un plural; aquí se sigue la decisión de sentido reflejada en el auditorio inglés, que optó por el singular por naturalidad y contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «adorémosle ante su escabel». El hebreo expresa más literalmente el acto de inclinarse o prosternarse; «postrémonos» conserva ese gesto físico mejor que un verbo más general como «adorar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָב֥וֹאָה
  english_pob_choice: Let us go
  chosen_spanish: Entremos
  alternatives_spanish:
  - Vamos
  - Entremos nosotros
  lexicon: HALOT
  rationale: La forma cohortativa de primera persona plural expresa exhortación volitiva. En español, «Entremos» conserva bien el sentido de invitación/impulso compartido y suena natural en el registro bíblico moderno.
- source_word: לְמִשְׁכְּנוֹתָיו
  english_pob_choice: into his dwelling place
  chosen_spanish: en su morada
  alternatives_spanish:
  - en sus moradas
  - en su tabernáculo
  lexicon: HALOT
  rationale: El hebreo tiene plural, pero el propio registro auditado en inglés revisó la opción a singular por sentido y naturalidad. En español, «morada» preserva el valor concreto de מקום de habitación/divina residencia sin introducir el tecnicismo eclesiástico «tabernáculo», que aquí podría sonar más interpretativo que el hebreo del verso.
- source_word: נִשְׁתַּחֲוֶה
  english_pob_choice: let us bow down
  chosen_spanish: postrémonos
  alternatives_spanish:
  - doblemos la rodilla
  - adorémosle
  lexicon: HALOT
  rationale: El verbo denota inclinarse/prosternarse físicamente. «Postrémonos» conserva la acción corporal explícita, mientras que «adorémosle» sería más interpretativo y podría borrar la postura que el hebreo enfatiza.
- source_word: לַהֲדֹם
  english_pob_choice: at his footstool
  chosen_spanish: ante su estrado
  alternatives_spanish:
  - ante su escabel
  - a sus pies
  lexicon: HALOT
  rationale: הֲדֹם es «estrado/escabel». «Ante su estrado» suena natural en español reverencial y mantiene la imagen del objeto de apoyo bajo los pies. Se evita reducirlo a una paráfrasis vaga.
- source_word: רַגְלָיו
  english_pob_choice: his footstool
  chosen_spanish: su estrado
  alternatives_spanish:
  - el escabel de sus pies
  - su banquillo
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: «estrado de sus pies». En español conviene condensarla como «su estrado», manteniendo la imagen y la relación posesiva sin sobrecargar la frase.'
theological_decisions:
- issue: Referente del posesivo «su»
  english_pob_reading: Render the pronouns simply as 'his' without specifying whether the referent is the LORD, the ark, or David's chosen resting place.
  chosen_spanish_reading: Mantener «su» sin precisar si se refiere a Yahvé, al arca o al lugar de reposo escogido.
  alternative_spanish_readings:
  - Precísese como Yahvé
  - Precísese como el arca
  rationale: El contexto inmediato de Salmo 132 entrelaza la morada de Yahvé, Sion y el arca. El hebreo deja el referente implícito; la traducción española conserva esa tensión literaria y teológica en lugar de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que cambió «dwelling places» por «dwelling place» para ajustar mejor el sentido. La versión española adopta igualmente un singular natural («morada») sin perder la imagen del lugar de habitación divina.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverencial de la relación posesiva con «su» sin explicitar el referente.
  - Se preserva la acción corporal de reverencia mediante «postrémonos», evitando sustituirla por un equivalente exclusivamente cultual.
  - «Morada» y «estrado» conservan imágenes concretas y bíblicas sin recurrir a terminología eclesiástica más tardía.
