translation:
  language: es
  text: Hijo mío[a], si te acercas para servir a Yahvé, prepárate para toda clase de pruebas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «prepara tu alma para la prueba»; el hebreo y el griego usan un término que puede referirse a prueba o a tentación, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי / τέκνον
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Mi hijo
  - Hijo querido
  lexicon: HALOT / LXX τέκνον
  rationale: El hebreo y el griego ofrecen un vocativo filial de sabiduría. En español, 'Hijo mío' conserva el tono paternal e instruccional sin perder naturalidad. 'Hijo' sería más breve, pero menos expresivo; 'mi hijo' suena menos vocativo.
- source_word: תִּקְרַב / προσέρχῃ
  english_pob_choice: draw near
  chosen_spanish: te acercas
  alternatives_spanish:
  - te aproximas
  - te llegas
  - te acercas a
  lexicon: HALOT / BDAG
  rationale: El verbo expresa aproximación a Dios en un contexto de servicio. 'Te acercas' es natural en español y conserva la imagen de aproximarse; evita un calco rígido y mantiene la resonancia reverente del original.
- source_word: לַעֲבוֹד / δουλεύειν
  english_pob_choice: to serve
  chosen_spanish: para servir
  alternatives_spanish:
  - para prestar servicio
  - para adorar
  - para trabajar para
  lexicon: HALOT / BDAG
  rationale: '''Servir'' reproduce bien el sentido amplio de עבד y de δουλεύειν cuando Dios es el objeto. No se limita a ''adorar'' ni se vuelve demasiado técnico con ''prestar servicio''.'
- source_word: יְהֹוָה / Κυρίῳ
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Yahweh
  - Jehová
  lexicon: Tradición POB / Tetragrammaton
  rationale: El hebreo trae explícitamente el Nombre divino. Siguiendo la convención del proyecto en español, se usa 'Yahvé' y no un sustituto reverencial como 'el Señor'.
- source_word: הָכֵן / ἑτοίμασον
  english_pob_choice: prepare
  chosen_spanish: prepárate
  alternatives_spanish:
  - prepara tu alma
  - dispónte
  - alístete
  lexicon: HALOT / LSJ
  rationale: El imperativo pide una preparación reflexiva del sujeto completo. 'Prepárate' expresa bien el sentido exhortativo y evita una traducción demasiado literal de 'alma' que podría sonar dualista en español.
- source_word: נַפְשְׁךָ / τὴν ψυχήν σου
  english_pob_choice: yourself
  chosen_spanish: prepárate
  alternatives_spanish:
  - prepara tu alma
  - prepara tu vida
  - dispón tu ser
  lexicon: HALOT / BDAG
  rationale: La forma pronominal española 'prepárate' ya incorpora la idea de disponerse uno mismo. Así se conserva el alcance de נפש/ψυχή sin forzar una antropología estrecha ni añadir una palabra innecesaria.
- source_word: לְכָל / εἰς
  english_pob_choice: for every
  chosen_spanish: para toda
  alternatives_spanish:
  - para cada
  - para toda clase de
  - para todo
  lexicon: HALOT / LSJ
  rationale: La frase transmite completitud. 'Para toda prueba' es idiomático en español y recoge la amplitud del hebreo y del griego.
- source_word: נִסָּיוֹן / πειρασμόν
  english_pob_choice: trial
  chosen_spanish: prueba
  alternatives_spanish:
  - tentación
  - ensayo
  - examen
  lexicon: HALOT / BDAG
  rationale: En este contexto sapiencial el énfasis recae en la prueba que acompaña el servicio a Dios. 'Prueba' expresa mejor la idea de testing/proving sin cargar el texto con la connotación más estrecha de tentación al mal.
theological_decisions:
- issue: Nombre divino del Tetragrammaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo usa יהוה de manera directa. La serie española del proyecto mantiene 'Yahvé' para hacer visible el Nombre del pacto y evitar la sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Alcance de נַפְשְׁךָ / τὴν ψυχήν σου
  english_pob_reading: yourself
  chosen_spanish_reading: prepárate
  alternative_spanish_readings:
  - prepara tu alma
  - prepara tu vida
  rationale: En español, la forma reflexiva 'prepárate' comunica la disposición de toda la persona mejor que una versión literal que podría sonar extraña o imponer una lectura dualista. Se conserva así la tensión entre alma, vida y yo sin resolverla de modo artificial.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish'
- issue: Naturaleza de נִסָּיוֹן / πειρασμόν
  english_pob_reading: trial
  chosen_spanish_reading: prueba
  alternative_spanish_readings:
  - tentación
  - tribulación
  rationale: La sabiduría de Sirácides aquí advierte sobre el costo de servir a Dios. 'Prueba' mantiene abierta la gama semántica de test/proving y evita restringir el sentido a una tentación moral específica.
  doctrine_reference: 'DOCTRINE.md: Context-sensitive rendering of testing/temptation'
translation_notes:
  revision_awareness: El borrador sigue la concordancia alta del pasaje con el hebreo de Kahana y el paralelo griego de Swete. No se detectaron revisiones sustanciales en el pasaje anterior; se mantuvo la solución de sentido general, ajustando el español para que suene natural y conserve la tensión léxica entre prueba/tentación.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino en español dentro de este proyecto.
  - Se evita 'alma' en el texto principal porque en español puede sugerir una antropología más estrecha que נפש/ψυχή.
  - Se usa 'prueba' en el cuerpo del texto y se preserva la alternativa 'tentación' en nota para reflejar el rango semántico del término.
  - El tono del vocativo 'Hijo mío' sigue el registro sapiencial del pasaje sin arcaísmos excesivos.
