theological_decisions:
- issue: Level of violence implied by the crowd's action
  chosen_reading: Render the verbs in a way that shows hostile intent without adding details not explicit in the Greek.
  alternative_readings:
  - Use more traditional but less vivid wording such as 'cast him out' and 'brow of the hill'
  - Use more forceful wording such as 'dragged' or 'attempted to murder him'
  rationale: The verse clearly depicts an attempted killing, but the translation should let that emerge from the sequence of actions and final infinitive rather than importing explanatory language into the main text.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
