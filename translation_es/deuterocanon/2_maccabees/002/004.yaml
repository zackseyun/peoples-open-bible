revisions:
- from: Porque, cuando llegó el jefe y la fuerza que lo acompañaba[a], que parecía invencible, fueron abatidos en el templo de Nanea, por el engaño usado por los sacerdotes de Nanea.
  to: Porque, cuando el jefe y la fuerza que lo acompañaba[a], que parecía invencible, habían llegado, fueron abatidos en el templo de Nanaia, porque los sacerdotes que atendían a Nanaia habían usado engaño.
