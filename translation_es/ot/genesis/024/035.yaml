translation:
  language: es
  text: Yahvé ha bendecido mucho a mi amo, y él se ha hecho grande. Le ha dado rebaños y ganado, plata y oro, siervos[a] y siervas, camellos y asnos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavos y esclavas». Los términos hebreos pueden denotar siervos domésticos o esclavos, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יהוה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo nombra directamente a YHWH; en el proyecto español se privilegia «Yahvé» como forma principal, en lugar de ocultarlo con un equivalente reverencial. Esto mantiene la correspondencia transparente con el texto fuente.
- source_word: בֵּרַךְ + מְאֹד
  english_pob_choice: has greatly blessed
  chosen_spanish: ha bendecido mucho
  alternatives_spanish:
  - ha bendecido grandemente
  - ha bendecido abundantemente
  lexicon: HALOT
  rationale: «Bendecido» conserva el valor verbal básico de בֵּרַךְ, y «mucho» refleja מְאֹד sin volver la frase pesada. «Mucho» en español transmite con naturalidad la intensidad del original.
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi amo
  alternatives_spanish:
  - mi señor
  - mi maestro
  lexicon: HALOT
  rationale: En este contexto narrativo se trata del superior humano del hablante; «amo» preserva la relación de autoridad y propiedad social implícita en el listado de posesiones. «Mi señor» sería más ambiguo en español religioso.
- source_word: וַיִּגְדָּל
  english_pob_choice: he has become great
  chosen_spanish: ha engrandecido
  alternatives_spanish:
  - ha crecido
  - se ha hecho grande
  lexicon: HALOT
  rationale: El verbo expresa crecimiento o hacerse grande. En español, «engrandecido» conserva esa idea y encaja con la cadena de bienes enumerados, sin reducirla solo a riqueza material.
- source_word: וַיִּתֶּן לוֹ
  english_pob_choice: He has given him
  chosen_spanish: Le ha dado
  alternatives_spanish:
  - y le dio
  lexicon: HALOT
  rationale: Se mantiene la referencia al dador divino y el valor resultativo del perfectivo en el discurso. «Le ha dado» suena natural y refleja que esas posesiones resultan del acto de Dios.
- source_word: צֹאן
  english_pob_choice: flocks
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaños
  lexicon: HALOT
  rationale: Aunque צֹאן es colectivo, en español «ovejas» es el equivalente más natural dentro de una lista de bienes ganaderos; el contexto permite entenderlo como pequeño ganado en general.
- source_word: בָקָר
  english_pob_choice: herds
  chosen_spanish: vacas
  alternatives_spanish:
  - ganado mayor
  - reses
  lexicon: HALOT
  rationale: El término apunta al ganado bovino. «Vacas» es claro y corriente en español bíblico contemporáneo; aunque «ganado mayor» es más técnico, suena menos directo en esta enumeración.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  lexicon: HALOT
  rationale: Se conserva el metal precioso concreto. «Plata» es el equivalente directo y evita desmaterializar el término en una abstracción económica.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  lexicon: HALOT
  rationale: Equivalente directo del metal precioso.
- source_word: עֲבָדִם
  english_pob_choice: male servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes varones
  lexicon: HALOT
  rationale: La lista presenta personas dentro del patrimonio del patriarca; para no atenuar el peso léxico de עֲבָדִם, se usa «esclavos». Español «siervos» suavizaría una tensión lexical que el texto sí tiene.
- source_word: שְׁפָחֹת
  english_pob_choice: female servants
  chosen_spanish: esclavas
  alternatives_spanish:
  - siervas
  - sirvientas
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con עֲבָדִם y la fuerza léxica del par masculino/femenino. «Esclavas» conserva la simetría y la relación de propiedad implícita en la enumeración.
- source_word: גְמַלִּים
  english_pob_choice: camels
  chosen_spanish: camellos
  lexicon: HALOT
  rationale: Equivalente directo y estándar.
- source_word: חֲמֹרִים
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - burdéganos
  lexicon: HALOT
  rationale: «Asnos» es fiel al registro bíblico y conserva el paralelo tradicional con camellos; «burros» sería más coloquial.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama. La versión española adopta la forma programática «Yahvé», coherente con la política del proyecto de no enmascarar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: עֲבָדִם / שְׁפָחֹת en lista de bienes
  english_pob_reading: male servants and female servants
  chosen_spanish_reading: esclavos y esclavas
  alternative_spanish_readings:
  - siervos y siervas
  - sirvientes y sirvientas
  rationale: En este inventario patrimonial, la carga semántica de servidumbre/esclavitud no debe suavizarse. «Esclavos y esclavas» mantiene la tensión léxica documentada y evita neutralizar una realidad social presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: δοῦλος / servidumbre — renderizar según fuerza contextual; aquí, valor fuerte en inventario de posesiones'
translation_notes:
  revision_awareness: El texto sigue el contenido del hebreo masorético de Génesis 24:35 y toma en cuenta el audit trail inglés. No se requieren revisiones adicionales; la decisión clave es mantener la transparencia del Nombre divino y la fuerza léxica de la lista patrimonial, especialmente en עֲבָדִם / שְׁפָחֹת.
  spanish_consistency_notes:
  - Se mantuvo un español bíblico moderno y digno, evitando calcos innecesarios.
  - Se conservó la enumeración en paralelo para reflejar el ritmo del hebreo.
  - Se prefirió vocabulario transparente y no eufemístico donde el original es socialmente fuerte.
  - La nota al pie solo se aplica al Nombre divino, ya que el texto principal adopta la política del proyecto y no requiere otras variantes obligatorias.
