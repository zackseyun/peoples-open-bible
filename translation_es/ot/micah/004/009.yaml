revisions:
- from: ¿Ahora por qué gritas[a] tanto? ¿Acaso no hay rey en ti[b]? ¿Se ha perdido tu consejero, para que te hayan asaltado dolores de parto[c], como a una mujer que da a luz?
  to: Y ahora, ¿por qué gritas[a] tanto? ¿Acaso no hay rey en ti[b]? ¿Ha perecido tu consejero, para que te hayan sobrevenido dolores de parto[c], como una mujer que da a luz?
  rationale: Se ajusta «se ha perdido» a «ha perecido» para reflejar mejor אָבָד; se corrige «como a una mujer» a «como una mujer» para mantener la comparación directa del hebreo; y se suaviza la sintaxis general para un español más natural sin perder literalidad importante. También se mejora la nota sobre הֶחֱזִיקֵךְ para alternativas españolas más fieles al matiz de asir con fuerza.
