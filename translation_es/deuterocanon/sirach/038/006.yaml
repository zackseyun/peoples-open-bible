base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/038/006.yaml
  text: And he gave man understanding[c][b][a], to glory in his might.
  footnotes:
  - marker: a
    text: Or 'humankind' or 'mortals'; Hebrew 'man' here has a representative, collective sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'to boast.' The Hebrew can carry the sense of glorying or exulting, and the Greek parallel supports an exalted sense rather than mere self-congratulation.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew reads 'in his might/mighty deeds'; the Greek parallel reads 'in his wondrous things,' which supports understanding this as God's manifested works.
    reason: alternative_reading
