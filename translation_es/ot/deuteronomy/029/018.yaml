translation:
  language: es
  text: 'y cuando oye las palabras de este juramento[a], se bendice en su corazón, diciendo: «tendré paz, aunque ande en la obstinación de mi corazón»; así arrasará lo regado con lo seco[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «maldición». El término hebreo puede designar un juramento que lleva consigo maldición o sanción.
    reason: alternative_reading
  - marker: b
    text: O posiblemente «arrasar la tierra regada junto con la seca», es decir, destruirlo todo por igual.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָלָה
  english_pob_choice: oath
  chosen_spanish: juramento
  alternatives_spanish:
  - maldición
  - pacto con sanción
  lexicon: HALOT
  rationale: אָלָה puede designar un juramento enmarcado por sanción, no solo una maldición. En español, «juramento» conserva el valor formal del acto escuchado en el contexto inmediato, y la nota mantiene la alternativa «maldición» para no ocultar la fuerza sancionadora del término.
- source_word: וְהִתְבָּרֵךְ בִּלְבָבוֹ
  english_pob_choice: he blesses himself in his heart
  chosen_spanish: se bendice en su corazón
  alternatives_spanish:
  - se felicita en su corazón
  - se considera bendecido en su corazón
  lexicon: HALOT
  rationale: El hitpael es reflexivo; la forma española «se bendice en su corazón» conserva la autorreferencia y el matiz irónico de auto-certeza. «Se felicita» o «se considera bendecido» suavizan demasiado el gesto verbal.
- source_word: שָׁלוֹם יִהְיֶה לִּי
  english_pob_choice: I will have peace
  chosen_spanish: Paz tendré
  alternatives_spanish:
  - tendré paz
  - estaré seguro
  - la paz será mía
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y seguridad. «Paz tendré» suena natural en español y conserva la presunción del hablante sin restringirlo solo a seguridad física.
- source_word: בִּשְׁרִר֥וּת לִבִּי
  english_pob_choice: the stubbornness of my heart
  chosen_spanish: la obstinación de mi corazón
  alternatives_spanish:
  - la terquedad de mi corazón
  - la dureza de mi corazón
  lexicon: HALOT
  rationale: שְׁרִרוּת comunica obstinación o testarudez. «Obstinación» es claro y dignificado en español, y mantiene el contraste moral del contexto de advertencia del pacto.
- source_word: לְמַעַן סְפוֹת
  english_pob_choice: thus sweeping away
  chosen_spanish: así arrasará
  alternatives_spanish:
  - de modo que barrerá
  - para destruir
  lexicon: HALOT
  rationale: El infinitivo de ספה, en este contexto, tiene sentido destructivo. «Arrasará» transmite bien la imagen de barrer/destruir sin volverla demasiado interpretativa.
- source_word: הָרָוָה אֶת הַצְּמֵאָה
  english_pob_choice: the watered land with the dry
  chosen_spanish: lo regado con lo seco
  alternatives_spanish:
  - lo bien regado con lo seco
  - la tierra regada con la seca
  - lo húmedo con lo seco
  lexicon: HALOT
  rationale: La expresión es idiomática y difícil. «Lo regado con lo seco» preserva la metáfora y la tensión del hebreo mejor que resolverla del todo; además, el español permite una construcción neutra que no añade elementos no presentes en el texto.
theological_decisions:
- issue: Naturaleza de הָאָלָה en contexto de pacto
  english_pob_reading: Render as 'oath' in the main text while preserving 'curse' as an alternative.
  chosen_spanish_reading: Traducir como «juramento» en el texto principal y conservar «maldición» como alternativa.
  alternative_spanish_readings:
  - maldición
  - juramento con sanción
  rationale: El contexto inmediato habla de las palabras del acto solemne oídas por el transgresor. En español, «juramento» comunica mejor el acto pactal; la nota preserva la lectura tradicional «maldición» para no perder la dimensión sancionadora.
  doctrine_reference: Translation philosophy §1, §3
- issue: Manejo de la metáfora difícil de הָרָוָה אֶת הַצְּמֵאָה
  english_pob_reading: Preserve the Hebrew metaphor rather than resolve it into a single interpretive paraphrase.
  chosen_spanish_reading: 'Mantener la imagen: «lo regado con lo seco».'
  alternative_spanish_readings:
  - la tierra regada con la seca
  - todo por igual, lo bien regado y lo seco
  rationale: La frase es genuinamente difícil y probablemente proverbial. Para no borrar la tensión documentada, el texto principal conserva la metáfora; la nota ofrece una interpretación más explícita sin sustituirla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión del inglés POB, que afinó la cláusula final hacia una imagen más cercana al hebreo: en vez de resolver la expresión idiomática, se preservó la oposición «lo regado con lo seco» con un verbo español que mantiene el tono de barrido/destrucción.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en todo el proyecto, pero este versículo no lo contiene.
  - «Juramento» se eligió aquí por el contexto de palabras oídas; se preserva la alternativa «maldición» en nota para transparentar la tensión léxica.
  - «Obstinación» conserva el matiz de voluntad endurecida sin convertirlo en una paráfrasis psicológica excesiva.
  - La cláusula final mantiene la ambigüedad del hebreo en vez de explicarla completamente, en coherencia con el enfoque de la POB.
