translation:
  language: es
  text: Si todavía quedan muchos años, en proporción a ellos devolverá el precio[a] de su redención, del dinero de su compra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «su redención»; aquí el sustantivo hebreo probablemente se refiere a la cantidad que debe reembolsarse para la redención, no solo al acto abstracto de redimir.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si es que
  - Pero si
  lexicon: HALOT
  rationale: La partícula condicional introduce una cláusula jurídica hipotética; «Si» es la forma natural y fiel en español.
- source_word: ע֥וֹד רַבּ֖וֹת בַּשָּׁנִ֑ים
  english_pob_choice: many years still remain
  chosen_spanish: aún faltan muchos años
  alternatives_spanish:
  - todavía quedan muchos años
  - muchos años aún permanecen
  lexicon: HALOT
  rationale: El hebreo expresa que los años son todavía numerosos; en español, «faltan» comunica con claridad que el término de liberación está lejos, manteniendo la idea de duración restante.
- source_word: לְפִי/הֶן֙
  english_pob_choice: in proportion to them
  chosen_spanish: según ellos
  alternatives_spanish:
  - en proporción a ellos
  - conforme a ellos
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente alude a «según su boca», es decir, conforme al número de años. «Según ellos» preserva la referencia al cómputo de los años sin sonar forzado en español.
- source_word: יָשִׁ֣יב
  english_pob_choice: he shall repay
  chosen_spanish: devolverá
  alternatives_spanish:
  - pagará
  - reintegrará
  lexicon: HALOT
  rationale: En este contexto jurídico-económico, el hiphil de שוב implica devolver o reembolsar una suma. «Devolverá» conserva el valor de restitución y permite que el objeto directo siga siendo el «precio».
- source_word: גְּאֻלָּת֔/וֹ
  english_pob_choice: his redemption price
  chosen_spanish: el precio de su redención
  alternatives_spanish:
  - su redención
  - el rescate de él
  lexicon: HALOT
  rationale: Sigo la lectura contextual que entiende el sustantivo no solo como el acto de redención, sino como la cantidad que debe pagarse para obtenerla. En español, «precio de su redención» comunica bien esa fuerza económica.
- source_word: מִ/כֶּ֖סֶף מִקְנָתֽ/וֹ
  english_pob_choice: from the money of his purchase
  chosen_spanish: del dinero de su compra
  alternatives_spanish:
  - del precio de su compra
  - del dinero por el cual fue comprado
  lexicon: HALOT
  rationale: La frase hebrea se refiere al monto original de la compra del esclavo/siervo por contrato. «Dinero de su compra» es cercano al hebreo y suficientemente claro en español; el contexto ya indica que se trata de una suma de cálculo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y coincide con la solución auditada en inglés: una condición sobre los años restantes, un cómputo proporcional y una referencia al dinero de la compra como base del rescate. Se mantiene la tensión lexical entre «redención» como acto y como cantidad pagadera, resolviéndola con una nota.'
  spanish_consistency_notes:
  - Se usa «redención» de manera consistente para גאולה en el marco jurídico-económico del versículo.
  - Se eligió «dinero» en lugar de «plata» para un español contemporáneo claro, sin perder el valor de medio de pago.
  - «Según ellos» conserva la idea de proporcionalidad sin introducir una paráfrasis más extensa que la necesaria.
