review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del griego: los mártires llegan a ser más admirables, incluso para sus torturadores; son causa del derrocamiento de la tiranía contra la nación; vencen al tirano por su ὑπομονή; y por medio de ellos la patria es purificada. Sin embargo, hay dos problemas de fidelidad documental: el marcador de nota [a] está anclado en «admirables» cuando la nota trata de «patria», y el participio νικήσαντες se expresa mejor como acción previa/completada («habiendo vencido») que como gerundio simultáneo («venciendo»).'
  spanish_quality_summary: El español es claro, digno y bastante natural. «Valentía», «perseverancia», «tiranía» y «patria» funcionan bien en registro bíblico moderno. La frase «se convirtieron en causa de que fuera derribada» es algo pesada pero aceptable; la revisión propuesta mantiene su sentido y mejora levemente la relación verbal del participio. El mayor defecto formal es la colocación incorrecta de la nota al pie.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. «Patria» está bien justificado como equivalente idiomático elevado de πατρίς. «Perseverancia» para ὑπομονή es defendible, aunque «resistencia» o «constancia» también serían posibles; no requiere adjudicación.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «admirables», pero su contenido explica «patria».
    rationale: Las instrucciones exigen que cada marcador aparezca en el lugar pertinente del texto. Tal como está, la nota induce a error y no corresponde al segmento anotado.
  - severity: medium
    issue: «Venciendo al tirano» debilita el valor aspectual de νικήσαντες.
    rationale: El participio aoristo denota una acción anterior o al menos completa con respecto al resultado siguiente. «Habiendo vencido al tirano» preserva mejor la relación lógica del original y del inglés auditado.
  - severity: low
    issue: La nota sobre «patria» debería quedar asociada a esa palabra, no al adjetivo inicial.
    rationale: Además del problema técnico del marcador, la legibilidad mejora si la alternativa léxica aparece justo donde el lector la necesita.
