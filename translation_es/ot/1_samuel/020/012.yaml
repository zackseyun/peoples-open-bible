revisions:
- from: 'Y Jonatán dijo a David: «Vive Yahvé, el Dios de Israel: cuando haya sondeado a mi padre[a] para mañana a esta hora, o al tercer día, y he aquí que resulta favorable hacia David[b], ¿no te enviaré entonces y te revelaré[c]? »'
  to: 'Y Jonatán dijo a David: «Tan cierto como que vive Yahvé, el Dios de Israel: cuando haya sondeado a mi padre[a] mañana a esta hora, o al tercer día[b], y he aquí que es favorable a David, ¿no mandaré a avisarte entonces y te lo revelaré[c]?»'
  rationale: Se revisa para mejorar la naturalidad del juramento elíptico, hacer más idiomática la expresión temporal, completar en español los verbos finales («avisarte», «te lo revelaré») y alinear mejor las notas con la evidencia y el rastro de auditoría inglés.
