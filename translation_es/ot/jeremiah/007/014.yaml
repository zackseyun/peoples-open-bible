    text: Or, more literally, 'over which my name is called.' This Hebrew idiom means that the house belongs to or is identified with the LORD.
    reason: lexical_alternative
  - marker: b
    text: Shiloh was the earlier sanctuary site whose destruction served as a warning example; see 1 Samuel 4 and Jeremiah 7:12.
    reason: cross_reference
