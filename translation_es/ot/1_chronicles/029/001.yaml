base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/029/001.yaml
  text: Then King David said to all the assembly[a], “Solomon my son, whom alone God has chosen, is young and inexperienced, and the work is great; for the palace is not for man[b], but for Yahweh God.”
  footnotes:
  - marker: a
    text: Or 'young and tender.' The Hebrew describes Solomon as youthful and not yet seasoned for so great a task.
    reason: lexical_alternative
  - marker: b
    text: Or 'citadel' or 'fortress.' Here 'palace' refers to the grand building prepared for the LORD, that is, the temple complex.
    reason: lexical_alternative
