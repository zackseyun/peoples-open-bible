translation:
  language: es
  text: Pero no anduviste en sus caminos, ni actuaste según sus abominaciones[a]; como si eso fuera poco[b], te corrompiste más que ellas en todos tus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «e hiciste sus abominaciones».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo idiomático: «como una cosa muy pequeña», es decir, incluso igualar sus pecados no era suficiente; Jerusalén fue más allá.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּדַרְכֵיהֶן ... הָלַכְתְּ
  english_pob_choice: walk in their ways
  chosen_spanish: andar en sus caminos
  alternatives_spanish:
  - caminar en sus caminos
  - seguir sus caminos
  lexicon: HALOT
  rationale: Conserva la metáfora hebrea de conducta y es natural en español bíblico sin perder el valor idiomático de 'caminar/andar' como forma de vida.
- source_word: וּבְתוֹעֲבוֹתֵיהֶן עָשִׂיתִי
  english_pob_choice: act according to their abominations
  chosen_spanish: actuaste según sus abominaciones
  alternatives_spanish:
  - hiciste sus abominaciones
  - cometiste sus abominaciones
  lexicon: HALOT
  rationale: '''Actuar según'' mantiene el vínculo verbal con עשה y evita una calca demasiado dura. ''Abominaciones'' conserva la fuerza moral y cultual del término en Ezequiel.'
- source_word: תּוֹעֵבָה
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - cosas detestables
  - prácticas detestables
  lexicon: HALOT
  rationale: Es el equivalente fuerte ya establecido en Ezequiel para conductas gravemente repudiables; evita suavizar el juicio profético.
- source_word: כִּמְעַט קָט
  english_pob_choice: as if that were too little
  chosen_spanish: como si eso fuera poco
  alternatives_spanish:
  - como cosa muy pequeña
  - como si fuera muy poco
  lexicon: HALOT
  rationale: 'Reproduce el valor idiomático de escalamiento: no bastaba con igualar el pecado ajeno; en español, ''como si eso fuera poco'' comunica bien esa ironía retórica.'
- source_word: וַתַּשְׁחִתִי
  english_pob_choice: you became more corrupt
  chosen_spanish: te corrompiste más
  alternatives_spanish:
  - te volviste más corrupta
  - te pervertiste más
  lexicon: HALOT
  rationale: דּשׁחת aquí expresa deterioro moral. 'Te corrompiste más' es claro, directo y respeta la idea de intensificación comparativa.
- source_word: מֵהֵן
  english_pob_choice: than they
  chosen_spanish: que ellas
  alternatives_spanish:
  - más que ellas
  - que ellas mismas
  lexicon: HALOT
  rationale: La comparación מן después de un verbo de corrupción se expresa naturalmente con 'más que'. La forma 'que ellas' mantiene la referencia femenina plural de las ciudades/personificaciones.
- source_word: בְּכָל דְּרָכָיִךְ
  english_pob_choice: in all your ways
  chosen_spanish: en todos tus caminos
  alternatives_spanish:
  - en toda tu conducta
  - en todas tus sendas
  lexicon: HALOT
  rationale: Mantiene la repetición de 'caminos' para conservar el tejido retórico del versículo y la amplitud totalizante del reproche.
theological_decisions:
- issue: Alcance del reproche profético y escalamiento de culpa
  english_pob_reading: Jerusalem is portrayed as surpassing them in corruption, not merely imitating them.
  chosen_spanish_reading: Jerusalén no solo imitó sus pecados, sino que los sobrepasó en corrupción.
  alternative_spanish_readings:
  - Jerusalén apenas los igualó antes de corromperse
  - Jerusalén no anduvo en sus caminos pero quedó corrupta de otro modo
  rationale: La secuencia hebrea כִּמְעַט קָט + וַתַּשְׁחִתִי מֵהֵן בְּכָל דְּרָכָיִךְ pide una lectura de escalamiento. La traducción conserva esa acusación sin atenuarla ni convertirla en una mera comparación neutral.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity exists)
translation_notes:
  revision_awareness: 'Se siguió el sentido del hebreo directo y el criterio de la POB en inglés: mantener la metáfora de ''caminar/caminar en caminos'', conservar ''abominaciones'' como término fuerte, y reflejar el giro idiomático de כִּמְעַט קָט como escalamiento retórico. No se requirieron revisiones respecto del pase más reciente.'
  spanish_consistency_notes:
  - Se mantiene la segunda persona femenina singular como en el hebreo.
  - '''Caminos'' se repite para preservar la cohesión léxica del versículo.'
  - '''Abominaciones'' se usa de forma consistente con el registro profético de Ezequiel.'
  - La comparación final se expresa con 'más que ellas' para sostener la fuerza del מן comparativo.
