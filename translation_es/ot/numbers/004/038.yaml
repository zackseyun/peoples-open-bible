revisions:
- from: 'Y los contados de entre los hijos de Gersón, por sus clanes y por la casa de sus padres:'
  to: 'Y los censados de los hijos de Gersón, por sus clanes y por las casas de sus padres:'
  rationale: Se reemplaza 'los contados' por 'los censados' para reflejar con mayor naturalidad el sentido de personas registradas en el censo; se elimina 'de entre' para evitar un matiz partitivo no presente en el hebreo; y se ajusta 'la casa de sus padres' a 'las casas de sus padres' para representar mejor el modismo genealógico-administrativo del original.
