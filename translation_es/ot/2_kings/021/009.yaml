revisions:
- from: Pero ellos no escucharon[a], y Manasés los desvió para hacer más mal que las naciones[b] que Yahvé había destruido delante de los hijos de Israel.
  to: Pero ellos no escucharon, y Manasés los desvió para hacer más maldad que las naciones[a] que Yahvé había destruido delante de los hijos de Israel[b].
  rationale: 'Se ajusta «hacer más mal» a «hacer más maldad» para lograr español más natural y mantener la comparación moral del hebreo. Se sustituyen las notas para alinearlas con las alternativas documentadas por la POB inglesa: una sobre la construcción comparativa y otra sobre «los hijos de Israel». No se requieren cambios doctrinales ni adjudicación adicional.'
