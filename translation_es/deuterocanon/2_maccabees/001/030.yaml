translation:
  language: es
  text: Y los sacerdotes entonaban los himnos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los sacerdotes cantaban los himnos'. El imperfecto griego puede verterse como acción en desarrollo o como pasado simple en estilo narrativo.
