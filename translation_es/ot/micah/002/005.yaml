review_pass:
  verdict: revise
  source_alignment_summary: El borrador español capta bien la estructura de juicio y mantiene la segunda persona singular, así como 'Yahvé' para יְהוָה. Sin embargo, 'la cuerda' queda algo demasiado física y menos precisa que el sentido de חֶבֶל en contexto de reparto de tierras; el original apunta a una cuerda/línea de medir usada para la asignación. También conviene evitar la pausa marcada por coma antes de 'en la asamblea', que en español suena menos natural.
  spanish_quality_summary: El texto es claro y digno, pero una leve revisión mejora precisión y fluidez. 'No tendrás quien eche la cuerda' es comprensible, aunque 'no tendrás a nadie que eche la cuerda de medir' suena más natural y explicita la función allotmentaria ya documentada en el audit trail. La nota a conserva las alternativas léxicas; la nota b es adecuada.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה -> ''Yahvé'', קהל -> ''asamblea''. No hay conflicto doctrinal. El ajuste principal es léxico-contextual para חבל, donde ''cuerda de medir'' refleja mejor la decisión inglesa ''measuring line'' y la rationale documentada.'
  issues:
  - severity: medium
    issue: חֶבֶל se traduce como 'la cuerda' sin explicitar la función de medición/allotment.
    rationale: Aunque 'cuerda' puede ser literal, el contexto de reparto de heredad y la decisión auditada favorecen una expresión más precisa como 'cuerda de medir' o 'línea de medir'.
  - severity: low
    issue: La coma antes de 'en la asamblea de Yahvé' dificulta levemente la fluidez.
    rationale: El sintagma preposicional se integra naturalmente sin pausa en español bíblico moderno.
  revised_spanish_text: Por tanto, no tendrás a nadie que eche la cuerda de medir[a] por sorteo en la asamblea de Yahvé[b].
