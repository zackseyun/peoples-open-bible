translation:
  language: es
  text: Por tanto, ellos serán como la nube de la mañana, y como el rocío que se va temprano, como tamo arrebatado de la era, y como humo de una ventana[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de una celosía'. El término hebreo puede referirse a la abertura de una ventana o a una celosía.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español la consecuencia inferida del contexto previo, conservando el valor lógico de la partícula sin añadir explicaciones.
- source_word: יִהְיוּ
  english_pob_choice: they will be
  chosen_spanish: serán
  alternatives_spanish:
  - estarán
  lexicon: HALOT
  rationale: El futuro de היה se rinde de forma directa; 'serán' mantiene la predicación comparativa y suena natural en español bíblico moderno.
- source_word: כַּעֲנַן בֹּקֶר
  english_pob_choice: like the morning cloud
  chosen_spanish: como la nube de la mañana
  alternatives_spanish:
  - como una nube matutina
  - como la nube mañanera
  lexicon: HALOT
  rationale: Se conserva la imagen de algo tenue y pasajero. 'La nube de la mañana' sigue de cerca la estructura hebrea y mantiene el valor genérico del símil.
- source_word: וְכַטַּל מַשְׁכִּים הֹלֵךְ
  english_pob_choice: and like the dew that goes away early
  chosen_spanish: y como el rocío que se va temprano
  alternatives_spanish:
  - y como el rocío que desaparece temprano
  - y como el rocío que amanece y se va
  lexicon: HALOT
  rationale: מַשְׁכִּים comunica tempranamente; הֹלֵךְ aquí describe el irse o desaparecer. 'Se va temprano' preserva ambos matices sin volverlo pesado o excesivamente interpretativo.
- source_word: כְּמֹץ
  english_pob_choice: like chaff
  chosen_spanish: como paja
  alternatives_spanish:
  - como tamo
  - como rastrojo ligero
  lexicon: HALOT
  rationale: En español 'paja' no es la equivalencia técnica más exacta de מוֹץ, pero comunica la ligereza y lo fácilmente arrastrable del material de trilla. Se mantiene el símil agrario con lenguaje ampliamente inteligible.
- source_word: יְסֹעֵר
  english_pob_choice: whirled
  chosen_spanish: llevada por el viento
  alternatives_spanish:
  - arrebatada por el viento
  - remolinada
  lexicon: HALOT
  rationale: El verbo sugiere ser impulsado con fuerza en un remolino o vendaval. Se opta por una formulación natural en español que retiene la idea de arrastre violento y dispersión.
- source_word: מִגֹּרֶן
  english_pob_choice: from the threshing floor
  chosen_spanish: desde la era
  alternatives_spanish:
  - de la era
  - desde la era de trillar
  lexicon: HALOT
  rationale: '''Era'' es la forma tradicional y clara en español para el lugar de trilla. Se conserva el marco agrícola de la imagen.'
- source_word: וּכְעָשָׁן
  english_pob_choice: and like smoke
  chosen_spanish: y como humo
  alternatives_spanish:
  - y como humo que se disipa
  lexicon: HALOT
  rationale: Mantiene el paralelismo de los símiles y la imagen de algo evanescente que desaparece rápidamente.
- source_word: מֵאֲרֻבָּה
  english_pob_choice: from a window
  chosen_spanish: desde la ventana
  alternatives_spanish:
  - desde una ventana
  - desde la abertura
  lexicon: HALOT
  rationale: 'Se sigue la decisión principal del POB en inglés: ''window'' como traducción accesible y directa. ''Desde'' conserva el valor de origen/partida del humo; la posibilidad de ''lattice'' se reserva para nota.'
theological_decisions:
- issue: 'El alcance del símil final: ''ventana'' vs. ''enrejado'' o ''celosía'''
  english_pob_reading: from a window. The Hebrew term can refer to a window opening or latticework.
  chosen_spanish_reading: desde la ventana
  alternative_spanish_readings:
  - desde un enrejado
  - desde una celosía
  - desde una abertura
  rationale: La traducción principal conserva la opción accesible elegida en el POB inglés. Se evita sobreespecificar en el texto principal porque el hebreo admite tanto abertura como estructura enrejada, y el sentido teológico del versículo no depende de fijar uno de esos dos detalles arquitectónicos.
  doctrine_reference: Lexical ambiguity; no doctrinal issue
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la última revisión; el presente borrador español sigue esa lectura estable y reproduce su única nota léxica sobre אֲרֻבָּה con adaptación natural al español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se conserva el paralelismo acumulativo de los cuatro símiles sin fusionarlos ni explicarlos en exceso.
  - '''Era'' traduce el espacio de trilla de manera estable y comprensible para lectores de español bíblico.'
  - Se mantiene la distinción entre imágenes de evaporación ('nube', 'rocío', 'humo') y dispersión ('paja llevada por el viento') para no aplanar el hebreo.
