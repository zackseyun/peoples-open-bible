translation:
  language: es
  text: 'Entonces mi ira se encenderá contra ellos en aquel día[a], y los abandonaré y les esconderé mi rostro, y serán devorados, y muchos males y angustias los hallarán. Y dirá en aquel día[b]: «¿No es porque mi Dios no está en medio de mí que estos males me han hallado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán presa»; la expresión hebrea es comprimida y literalmente dice algo como «y será para comer». El contexto apunta a quedar expuestos a destrucción.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi Dios no está en medio de mí». La formulación en singular personifica a Israel como un solo hablante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָרָה אַפִּי
  english_pob_choice: my anger will burn
  chosen_spanish: mi enojo se encenderá
  alternatives_spanish:
  - mi enojo arderá
  - mi ira se encenderá
  lexicon: HALOT
  rationale: Conserva la imagen de calor/combustión propia del hebreo, pero en un español natural y digno. «Enojó» evita una solemnidad excesiva de «ira» cuando el contexto enfatiza reacción judicial de Yahvé.
- source_word: וַעֲזַבְתִּים
  english_pob_choice: I will forsake them
  chosen_spanish: los abandonaré
  alternatives_spanish:
  - los dejaré
  - los desampararé
  lexicon: HALOT
  rationale: «Abandonaré» expresa con claridad el retiro relacional y pactual del hebreo sin perder naturalidad en español.
- source_word: וְהִסְתַּרְתִּי פָנַי מֵהֶם
  english_pob_choice: hide my face from them
  chosen_spanish: esconderé mi rostro de ellos
  alternatives_spanish:
  - ocultaré mi rostro de ellos
  - apartaré mi rostro de ellos
  lexicon: HALOT
  rationale: Se preserva el modismo teológico «esconder mi rostro», equivalente transparente de la imagen hebrea. «Rostro» mantiene el registro bíblico sin caer en máscara reverencial tradicional.
- source_word: וְהָיָה לֶאֱכֹל
  english_pob_choice: they will be devoured
  chosen_spanish: serán devorados
  alternatives_spanish:
  - quedarán para ser comidos
  - llegarán a ser presa
  lexicon: HALOT
  rationale: La expresión hebrea comprimida apunta a quedar expuestos a destrucción/consumo; «serán devorados» sigue de cerca la revisión inglesa y conserva la pasividad vulnerable sin sobreexplicar al agente.
- source_word: וּמְצָאֻהוּ
  english_pob_choice: will find them
  chosen_spanish: los hallarán
  alternatives_spanish:
  - los encontrarán
  - los alcanzarán
  lexicon: HALOT
  rationale: «Hallar» reproduce bien el verbo hebreo y mantiene la repetición lexical con el final del versículo («me han hallado»).
- source_word: רָעוֹת רַבּוֹת וְצָרוֹת
  english_pob_choice: many evils and troubles
  chosen_spanish: muchos males y angustias
  alternatives_spanish:
  - muchas calamidades y angustias
  - muchos males y aflicciones
  lexicon: HALOT
  rationale: «Males» conserva el valor amplio de רָעוֹת; «angustias» comunica היטב la presión/estrechez de צָרוֹת en un español claro. Se mantiene la distinción léxica sin volverlos sinónimos exactos.
- source_word: וְאָמַר
  english_pob_choice: he will say
  chosen_spanish: Y dirá
  alternatives_spanish:
  - Y dirán
  - Y dirá el pueblo
  lexicon: HALOT
  rationale: Se conserva el singular del hebreo, que personifica a Israel como un solo hablante. La mayúscula inicial tras el punto previo y el conector narrativo mantienen fluidez.
- source_word: הֲלֹא עַל כִּי
  english_pob_choice: Is it not because
  chosen_spanish: ¿No es porque
  alternatives_spanish:
  - ¿No es a causa de que
  - ¿No es debido a que
  lexicon: HALOT
  rationale: Es una forma natural de la pregunta retórica causal en español y conserva el valor explicativo del hebreo.
- source_word: אֵין אֱלֹהַי בְּקִרְבִּי
  english_pob_choice: my God is not among me
  chosen_spanish: mi Dios no está en medio de mí
  alternatives_spanish:
  - mi Dios no está en mi interior
  - mi Dios no está en medio nuestro
  lexicon: HALOT
  rationale: Se prefiere «en medio de mí» por fidelidad a la persona singular del hebreo y por la carga idiomática de cercanía/presencia. Evita resolver la personificación colectiva a plural.
- source_word: מְצָאוּנִי
  english_pob_choice: have found me
  chosen_spanish: me han hallado
  alternatives_spanish:
  - me han encontrado
  - me han alcanzado
  lexicon: HALOT
  rationale: «Han hallado» conserva la repetición verbal con el primer hemistiquio y mantiene la relación textual entre el peligro que «los hallará» y el mal que «me ha hallado».
theological_decisions:
- issue: Presencia divina expresada por el modismo de ocultar el rostro
  english_pob_reading: hide my face from them
  chosen_spanish_reading: esconderé mi rostro de ellos
  alternative_spanish_readings:
  - apartaré mi rostro de ellos
  - retiraré mi presencia de ellos
  rationale: 'Se mantiene el modismo en lugar de resolverlo como mera ausencia. Así queda la tensión pactual: juicio mediante retirada relacional, sin perder la imaginería bíblica.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Sujeto singular personificado de Israel en la confesión
  english_pob_reading: he will say ... my God is not among me
  chosen_spanish_reading: Y dirá ... mi Dios no está en medio de mí
  alternative_spanish_readings:
  - Y dirán ... mi Dios no está en medio de nosotros
  - Y dirá ... mi Dios no está en medio nuestro
  rationale: Se conserva el singular del hebreo en la auto-confesión, porque el texto personifica a la nación como un solo hablante. Esto preserva la forma retórica y la tensión del original.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que prefirió «be devoured» frente a «become prey», y por eso opté por «serán devorados». También preservé la tensión documental del hebreo entre el singular personificado de Israel y las acciones plurales sobre el pueblo.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el versículo lo exige por contexto general, pero aquí el texto no contiene el nombre divino explícito; por eso el sujeto implícito se mantuvo en primera persona («mi enojo»).
  - Mantuve «rostro» y «en medio de mí» para conservar el lenguaje relacional-teológico del hebreo.
  - Elegí «males» y «angustias» para distinguir רָעוֹת de צָרוֹת sin sobretraducirlos.
  - No convertí el singular de la confesión final en plural, para respetar la personificación del hebreo.
