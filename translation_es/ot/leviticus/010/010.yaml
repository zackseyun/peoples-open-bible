  source_alignment_summary: 'El borrador español refleja fielmente la sintaxis y el sentido del hebreo: el infinitivo de propósito «para distinguir» corresponde bien a וּלֲהַבְדִּיל, y la serie repetida «entre … y entre …» preserva correctamente las categorías contrastadas. «Lo santo y lo común» mantiene adecuadamente la oposición cultual קֹדֶשׁ / חֹל según la justificación auditada, y «lo impuro y lo limpio» comunica de manera clara la distinción ritual de טָמֵא / טָהוֹר.'
