revisions:
- from: Y sucedió[a] que, después de haber comido pan y después de haber bebido, le enalbardó el asno al profeta que había hecho volver.
  to: Y sucedió[a] que, después de haber comido pan y después de haber bebido, ensilló el asno para el profeta que había hecho volver[b].
  rationale: Se reemplazó «le enalbardó» por «ensilló ... para el profeta» para reflejar con mayor naturalidad y claridad el sentido de חבש + לוֹ en español neutral y ampliamente legible. Se mantuvo «asno» y «había hecho volver» por fidelidad al hebreo, y se añadió una nota léxica para preservar la alternativa idiomática documentada para הֱשִׁיבוֹ.
