translation:
  language: es
  text: 'Los gobernantes, los sacerdotes y los levitas no se separaron de las naciones extranjeras de la tierra[a], de sus impurezas: de los cananeos, los hititas, los ferezeos, los jebuseos, los moabitas, los egipcios y los edomitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no se mantuvieron separados de las naciones extranjeras de la tierra, de sus inmundicias'. El griego es condensado; el paralelo hebreo en Esdras 9:1 apoya la idea de no separarse de esos pueblos y de sus prácticas impuras. Se conserva el plural del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ ἐχώρισαν
  english_pob_choice: have not separated themselves
  chosen_spanish: no se habían separado
  alternatives_spanish:
  - no se separaron
  - no habían guardado separación
  lexicon: BDAG
  rationale: El aoristo griego comunica una falta consumada en el pasado; en español, el pluscuamperfecto expresa bien ese estado previo en el relato. Mantengo el valor reflexivo/intransitivo de la separación sin forzar una paráfrasis.
- source_word: οἱ ἄρχοντες
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los dirigentes
  - los jefes
  - los oficiales
  lexicon: BDAG
  rationale: ἄρχοντες designa a quienes tienen autoridad. 'Gobernantes' conserva el tono formal y jerárquico del grupo sin limitarlo a un cargo específico.
- source_word: οἱ ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes oficiantes
  lexicon: BDAG
  rationale: Es la equivalencia normal y directa de ἱερεῖς en contexto cultual.
- source_word: οἱ Λευεῖται
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas del culto
  lexicon: BDAG
  rationale: Se conserva el nombre tribal/cultual tradicional en español.
- source_word: ἀλλογενῆ ἔθνη
  english_pob_choice: the foreign nations
  chosen_spanish: las naciones extranjeras
  alternatives_spanish:
  - los pueblos extranjeros
  - las naciones de otro origen
  lexicon: BDAG
  rationale: '''Naciones extranjeras'' reproduce el contraste étnico-nacional del griego sin cargar el texto con categorías modernas ajenas al contexto.'
- source_word: τῆς γῆς
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - del territorio
  lexicon: BDAG
  rationale: En este contexto γῆ puede referirse a la tierra/territorio local. 'De la tierra' mantiene el registro bíblico y la ambigüedad productiva del original.
- source_word: ἀκαθαρσίας αὐτῶν
  english_pob_choice: from their uncleannesses
  chosen_spanish: de sus impurezas
  alternatives_spanish:
  - de sus inmundicias
  - de sus contaminaciones rituales
  lexicon: BDAG
  rationale: El griego es compacto y el contexto sugiere impureza cultual y moral. 'Impurezas' conserva la pluralidad del término y su fuerza sin endurecerlo hacia 'abominaciones', que sería más fuerte que el griego aquí.
- source_word: Χαναναίων ... Ἰδουμαίων
  english_pob_choice: from the Canaanites and Hittites and Perizzites and Jebusites and Moabites and Egyptians and Edomites
  chosen_spanish: de los cananeos, los hititas, los ferezeos, los jebuseos, los moabitas, los egipcios y los edomitas
  alternatives_spanish:
  - de los cananeos ... y de los edomitas
  - de los cananeos ... y de Idumea
  lexicon: BDAG
  rationale: La lista nombra pueblos concretos; se traduce con los etnónimos habituales en español. 'Edomitas' corresponde a Ἰδουμαίων y preserva la referencia histórica sin sustituirla por una forma interpretativa.
theological_decisions:
- issue: Lenguaje de pureza/impureza
  english_pob_reading: Retain 'uncleannesses' as cultic-moral impurity language without softening to merely social separation.
  chosen_spanish_reading: Mantener 'impurezas' como lenguaje de impureza cultual-moral, sin reducirlo a una mera separación social.
  alternative_spanish_readings:
  - inmundicias
  - contaminaciones
  rationale: El texto griego participa del vocabulario postexílico de pureza. 'Impurezas' preserva la tensión entre lo ritual y lo moral sin añadir una carga interpretativa mayor que la del original.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión léxico-teológica del pasaje.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió la relación preposicional para reflejar mejor el griego: no ''con sus impurezas'', sino ''de sus impurezas''. La versión española sigue esa corrección y mantiene la frase de separación como núcleo sintáctico del versículo.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se prefirió 'naciones extranjeras' por coherencia con el audit trail en inglés y con el contraste étnico del griego.
  - '''Impurezas'' conserva el plural y el campo semántico de ἀκαθαρσία sin sobretraducción.'
