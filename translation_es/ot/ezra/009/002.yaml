  yaml_path: translation/ot/ezra/009/002.yaml
  text: For they have taken some of their daughters for themselves and for their sons[a], and the holy seed has mixed itself with the peoples of the lands[c][b]. And the hand of the officials and the deputies has been foremost in this unfaithfulness.
  footnotes:
  - marker: a
    text: Or 'have married some of their daughters.' The Hebrew says literally 'have taken from their daughters.'
    reason: lexical_alternative
  - marker: b
    text: '''The holy seed'' may also be rendered ''the holy offspring.'' The Hebrew preserves covenantal lineage language.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the hand of the officials and the deputies was first in this faithlessness,' an idiom meaning they were chiefly responsible.
    reason: lexical_alternative
