review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: imperativo exhortativo seguido de jussivo, mantiene «Yahvé» para יְהוָה y traduce adecuadamente «su santo nombre». Sin embargo, «gócese el corazón de los que buscan a Yahvé» suena menos natural en español y no refleja tan bien la referencia distributiva/plural que el propio rastro inglés ajustó a «hearts».'
  spanish_quality_summary: '«Gloríense en su santo nombre» es digno y natural. El principal problema es la segunda cláusula: «gócese el corazón» resulta algo forzado/arcaizante en registro y menos claro que una formulación plural. «Alégrense los corazones de los que buscan a Yahvé» conserva mejor el sentido exhortativo y mejora la legibilidad en español eclesial contemporáneo.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé», קָדְשׁוֹ → «santo», לֵב → «corazones» como ajuste idiomático distributivo aceptable en español, sin afectar el sentido. No hay conflicto doctrinal; la nota sobre el nombre divino puede mantenerse.'
  issues:
  - severity: medium
    issue: 'La segunda cláusula usa singular: «gócese el corazón de los que buscan a Yahvé».'
    rationale: Aunque לֵב es singular en hebreo, en español esta construcción suena rígida y menos natural con un complemento plural. El propio historial inglés corrigió a plural por claridad colectiva; en español «los corazones» comunica mejor el sentido distributivo.
  - severity: low
    issue: «Gócese» suena más marcado/arcaizante que otras opciones igualmente fieles.
    rationale: No es incorrecto, pero «alégrense» o «regocíjense» se leen con más naturalidad en español neutral contemporáneo, manteniendo el valor jussivo/exhortativo.
  revised_spanish_text: Gloríense en su santo nombre[a]; alégrense los corazones de los que buscan a Yahvé.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH» (el nombre divino); tradicionalmente se traduce «el SEÑOR», pero aquí se vierte como «Yahvé».'
    reason: alternative_reading
  revision_rationale: 'Se conserva la buena elección «Gloríense» para הִתְהַלְלוּ y «Yahvé» para יְהוָה, pero se revisa la segunda cláusula para que el español sea más natural y refleje mejor el sentido distributivo/colectivo del verso: «alégrense los corazones de los que buscan a Yahvé». No se requiere nota adicional.'
