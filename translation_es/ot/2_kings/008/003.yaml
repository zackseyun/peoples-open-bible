    rationale: El texto dice «salió para clamar al rey», pero la nota a dice «O «para clamar al rey»». Una nota textual debe aportar una alternativa real, no duplicar el texto principal.
  - severity: low
    issue: La nota no refleja con precisión las alternativas auditadas en inglés
    rationale: La auditoría inglesa conserva «to cry out» en el texto y ofrece alternativas equivalentes a «apelar/suplicar». En español conviene conservar ese abanico interpretativo de forma más útil al lector.
  revised_spanish_text: Al cabo de siete años, la mujer volvió de la tierra de los filisteos, y salió para clamar[a] al rey por su casa y por su campo.
