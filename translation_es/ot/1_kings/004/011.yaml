lexical_decisions:
- source_word: בֶּן אֲבִֽינָדָ֖ב
  english_pob_choice: Ben-abinadab
  chosen_spanish: Ben-abinadab
  alternatives_spanish:
  - el hijo de Abinadab
  - Ben Abinadab
  lexicon: HALOT
  rationale: Se conserva como nombre propio transliterado, siguiendo el valor administrativo de la lista y evitando convertirlo en una frase descriptiva que el hebreo no exige aquí.
- source_word: כָּל נָ֣פַת דֹּ֑אר
  english_pob_choice: over all the region of Dor
  chosen_spanish: sobre toda la región de Dor
  alternatives_spanish:
  - sobre toda la altura de Dor
  - sobre todo el distrito de Dor
  - sobre toda la comarca de Dor
  lexicon: HALOT
  rationale: El hebreo puede referirse a una región o distrito; se eligió 'región' porque comunica bien el ámbito territorial sin perder la amplitud del 'toda' hebreo y coincide con la revisión inglesa que prefirió 'region' sobre 'height'.
- source_word: טָפַת֙
  english_pob_choice: Taphath
  chosen_spanish: Tafat
  alternatives_spanish:
  - Tafat
  - Taphath
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma natural para español, con una grafía que refleja la pronunciación posible sin depender de la forma inglesa.
- source_word: בַּת שְׁלֹמֹ֔ה
  english_pob_choice: the daughter of Solomon
  chosen_spanish: la hija de Salomón
  alternatives_spanish:
  - la hija de Solomon
  - hija de Salomón
  lexicon: HALOT
  rationale: Se mantiene la estructura posesiva/apposicional del hebreo con una formulación clara en español. 'Salomón' es la forma usual en español para el nombre propio.
- source_word: הָ֥יְתָה לּ֖/וֹ לְ/אִשָּֽׁה
  english_pob_choice: was his wife
  chosen_spanish: era su esposa
  alternatives_spanish:
  - fue su esposa
  - llegó a ser su esposa
  - era para él esposa
  lexicon: HALOT
  rationale: El hebreo expresa una relación matrimonial estable; 'era su esposa' comunica el estado relacional de manera natural y fiel, sin forzar una lectura de cambio de estado que el contexto no exige.
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés, pero ajusta 'height' a 'región' conforme a la revisión posterior y conserva la ambigüedad territorial documentada en la nota. No se introdujeron lecturas doctrinales adicionales.
  spanish_consistency_notes:
  - Se usa 'Salomón' de forma consistente con el español bíblico estándar.
  - Se preserva la transliteración de nombres propios para mantener la transparencia del texto fuente.
  - '''Esposa'' traduce la relación matrimonial del hebreo de manera idiomática y sin añadir matices no presentes en el versículo.'
