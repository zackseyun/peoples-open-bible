  alternative_readings:
  - '''worshiped'' the king'
  - '''my master the king'''
  rationale: The verse depicts courtly homage, not divine worship. The translation preserves royal honor language while avoiding theological confusion.
  doctrine_reference: 'Translation philosophy: preserve the source''s sense without importing doctrinal claims the text does not make.'
