translation:
  language: es
  text: ¿Qué es más pesado que el plomo? ¿Y cuál es su nombre sino “necio”[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Qué será hecho más pesado que el plomo? ¿y cuál es su nombre sino “necio”?». El griego es un proverbio comprimido; la traducción principal lo suaviza para que suene natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ μόλυβον
  english_pob_choice: than lead
  chosen_spanish: que el plomo
  alternatives_spanish:
  - más que el plomo
  - por encima del plomo
  lexicon: BDAG; LSJ
  rationale: 'El griego expresa una comparación proverbial: el peso de algo en relación con el plomo. En español, «más pesado que el plomo» comunica con naturalidad la comparación sin perder la imagen original.'
- source_word: τί βαρυνθήσεται
  english_pob_choice: What is heavier
  chosen_spanish: ¿Qué es más pesado?
  alternatives_spanish:
  - ¿Qué será hecho más pesado?
  - ¿Qué pesará más?
  lexicon: BDAG
  rationale: La forma pasiva futura en griego funciona aquí de manera idiomática y proverbial. «¿Qué es más pesado?» suena natural en español y conserva el sentido comparativo y retórico.
- source_word: τί αὐτῷ ὄνομα
  english_pob_choice: what is its name
  chosen_spanish: ¿cuál es su nombre?
  alternatives_spanish:
  - ¿qué nombre tiene?
  - ¿qué nombre le pertenece?
  lexicon: LSJ
  rationale: El griego es breve y proverbial. «¿Cuál es su nombre?» reproduce con fidelidad la pregunta directa, manteniendo la ambigüedad deliberada del referente.
- source_word: ἀλλʼ ἢ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - sólo
  lexicon: BDAG
  rationale: En esta pregunta retórica, la expresión introduce la única respuesta posible. «Sino» expresa mejor la exclusión enfática del griego en español actual.
- source_word: μωρός
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - fool
  - insensato
  - tonto
  lexicon: BDAG
  rationale: En literatura sapiencial, μωρός señala torpeza moral y falta de juicio. «Necio» es un equivalente bíblico y digno en español, más preciso que «tonto» y menos coloquial que otras opciones.
translation_notes:
  revision_awareness: 'La versión inglesa revisada volvió a una formulación más literal en la segunda pregunta: «what is its name» en lugar de «what name does such a one have». La versión española sigue esa revisión con «¿cuál es su nombre?», manteniendo la concisión proverbial y la referencia implícita del dativo.'
  spanish_consistency_notes:
  - Se conservó «plomo» para μόλυβον por correspondencia directa con el metal del griego.
  - Se prefirió «necio» para μωρός por su registro sapiencial y bíblico, coherente con el tono del dicho.
  - La pregunta queda deliberadamente breve y proverbial, sin desarrollar el sujeto implícito del original.
