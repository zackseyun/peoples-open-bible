review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura de la superscripción hebrea: ''Palabras de Amós'', el origen en Tecoa, el verbo de visión, la datación doble y la referencia temporal al terremoto. También mantiene adecuadamente el sentido amplio de עַל como ''acerca de''. Sin embargo, falta la nota alternativa correspondiente a עַל יִשְׂרָאֵל (''contra Israel''), que el rastro auditado inglés preserva y que sigue siendo significativa en español.'
  spanish_quality_summary: El español es claro y digno, pero 'que estuvo entre los pastores' suena algo menos natural para una identificación ocupacional pasada; 'que era de entre los pastores' o similar podría sonar más idiomático. Aun así, el problema principal no es de fluidez sino de conservación incompleta del aparato de notas. El texto revisado hace un ajuste menor para naturalidad y mantiene la relación formal entre 'palabras' y 'vio'.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Los nombres propios y la fórmula temporal están bien. 'Pastores' concuerda con la revisión auditada del POB inglés, y la nota sobre 'criadores de ovejas' preserva la especificidad léxica original. Debe añadirse la nota sobre 'acerca de Israel' / 'contra Israel' para reflejar la decisión léxica documentada.
  issues:
  - severity: medium
    issue: Falta la nota alternativa para עַל יִשְׂרָאֵל
    rationale: El inglés POB conserva explícitamente la alternativa 'against Israel' en nota. En español, 'acerca de Israel' también deja abierta una alternativa importante ('contra Israel'), por lo que debe preservarse en una nota correspondiente.
  - severity: low
    issue: '''Que estuvo entre los pastores'' es ligeramente menos natural en español para una descripción de procedencia/oficio'
    rationale: No es incorrecto, pero en una superscripción bíblica 'que era de entre los pastores' fluye mejor y evita una lectura demasiado puntual o transitoria de 'estuvo'.
  revised_spanish_text: Palabras de Amós[a], que era de entre los pastores de Tecoa, lo que vio acerca de Israel[b] en los días de Uzías, rey de Judá, y en los días de Jeroboam, hijo de Joás, rey de Israel, dos años antes del terremoto.
  revised_footnotes:
  - marker: a
    text: O “de entre los criadores de ovejas”. El hebreo puede referirse de manera más específica a la cría de ovejas que al pastoreo en general.
    reason: lexical_alternative
  - marker: b
    text: O “contra Israel”. La preposición hebrea en contextos proféticos puede tener cualquiera de los dos sentidos; aquí se elige la formulación más amplia de la superscripción.
    reason: alternative_reading
  revision_rationale: Se añade la nota omitida para preservar la alternativa semántica de עַל יִשְׂרָאֵל documentada en el POB inglés, y se hace un ajuste leve de naturalidad en 'que era de entre los pastores' sin alterar el sentido ni la estructura formal de la superscripción.
