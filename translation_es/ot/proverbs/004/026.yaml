translation:
  language: es
  text: Allana el sendero de tus pies[a], y todos tus caminos quedarán firmes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Considera el sendero de tus pies»; el verbo hebreo también puede llevar la idea de pesar o examinar cuidadosamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּ֭לֵּס
  english_pob_choice: Level
  chosen_spanish: Allana
  alternatives_spanish:
  - Nivela
  - Pondera
  - Pesa
  lexicon: HALOT
  rationale: El imperativo piel de פלס puede expresar hacer liso o nivelar, y también ponderar. En español, "allana" conserva la imagen concreta de preparar el camino y suena natural en un contexto sapiencial; mantiene abierta la posible resonancia de valorar cuidadosamente sin perder la metáfora física.
- source_word: מַעְגַּ֣ל
  english_pob_choice: path
  chosen_spanish: sendero
  alternatives_spanish:
  - camino
  - vereda
  - trazo
  lexicon: HALOT
  rationale: El sustantivo denota un rastro o camino recorrido. "Sendero" comunica bien la imagen de una trayectoria para los pies y evita una repetición pesada con "caminos" en la segunda mitad del versículo.
- source_word: רַגְלֶךָ
  english_pob_choice: of your feet
  chosen_spanish: de tus pies
  alternatives_spanish:
  - de tu pie
  - para tus pies
  lexicon: HALOT
  rationale: La expresión hebrea mantiene la imagen corporal del andar. En español, el plural "pies" fluye de manera natural y conserva el paralelismo con el andar moral representado por el camino.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todos
  alternatives_spanish:
  - y cada
  - entonces todos
  lexicon: HALOT
  rationale: La conjunción simple más el cuantificador totaliza la segunda línea sin añadir una relación causal que el hebreo no marca explícitamente.
- source_word: דְּרָכֶיךָ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tus sendas
  - tu proceder
  lexicon: HALOT
  rationale: דֶּרֶךְ en plural suele referirse al modo de vivir o a las acciones de una persona. "Caminos" mantiene la continuidad de la imagen vial y resulta natural en español bíblico contemporáneo.
- source_word: יִכֹּנוּ
  english_pob_choice: will be established
  chosen_spanish: serán establecidos
  alternatives_spanish:
  - serán afirmados
  - quedarán firmes
  - serán hechos firmes
  lexicon: HALOT
  rationale: El nifal de כון expresa estar firme, quedar establecido o ser fijado. "Serán establecidos" reproduce bien el sentido resultativo y conserva la fuerza sapiencial de estabilidad en la conducta.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo WLC y el audit trail inglés: mantiene la metáfora concreta de camino/pies, conserva la apertura semántica de פלס mediante una nota alternativa y evita introducir un matiz causal o interpretativo que no esté explícito en el מקור.'
  spanish_consistency_notes:
  - Se preservó el paralelismo imagético entre "sendero de tus pies" y "tus caminos".
  - Se evitó "SEÑOR" u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - '"Allanar" traduce la acción de hacer nivelado el camino sin perder la posible lectura de examinar/pesar, que queda documentada en la nota.'
