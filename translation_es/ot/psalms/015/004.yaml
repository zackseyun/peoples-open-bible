translation:
  language: es
  text: A sus ojos, una persona despreciada[a] es rechazada; pero honra a los que temen a Yahvé; jura aunque sea para su propio mal[b] y no cambia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «A sus ojos, una persona vil es despreciada». La cláusula hebrea es compacta y puede verterse de más de una manera estrechamente relacionada.'
    reason: alternative_reading
  - marker: b
    text: Lit., «jura para mal»; comúnmente se entiende que cumple su juramento aun cuando le cueste caro personalmente.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְזֶה
  english_pob_choice: despised person
  chosen_spanish: persona despreciada
  alternatives_spanish:
  - persona vil
  - persona contemptible
  - alguien despreciado
  lexicon: HALOT
  rationale: El hebreo presenta una forma pasiva/adjetival que describe a alguien tenido en poco. «Persona despreciada» conserva esa valoración sin convertirla de antemano en una categoría moral más fuerte como «vil».
- source_word: בְּעֵינָיו
  english_pob_choice: in his eyes
  chosen_spanish: en sus ojos
  alternatives_spanish:
  - a sus ojos
  - en su parecer
  lexicon: HALOT
  rationale: Es un modismo hebreo de evaluación o estimación. «En sus ojos» mantiene la metáfora de manera natural en español.
- source_word: נִמְאָס
  english_pob_choice: is rejected
  chosen_spanish: es rechazada
  alternatives_spanish:
  - es despreciada
  - es desechada
  - es repudiada
  lexicon: HALOT
  rationale: El verbo comunica ser rechazado o considerado inaceptable. «Es rechazada» evita repetir exactamente la idea de desprecio ya presente y conserva el paralelismo.
- source_word: יִרְאֵי יְהוָה
  english_pob_choice: those who fear Yahweh
  chosen_spanish: los que temen a Yahvé
  alternatives_spanish:
  - los reverentes de Yahvé
  - los que reverencian a Yahvé
  lexicon: HALOT
  rationale: Es la expresión pactal habitual para quienes viven con temor reverente ante Yahvé. En español, «temen a Yahvé» conserva el verbo «temer» sin suavizarlo a «reverenciar».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: transliteración del Tetragrámaton como «Yahvé», en vez de sustituirlo por un título.'
- source_word: יְכַבֵּד
  english_pob_choice: honors
  chosen_spanish: honra
  alternatives_spanish:
  - da honra a
  - estima
  - glorifica
  lexicon: HALOT
  rationale: El piel de כבד aquí significa tratar como importante o dar honor. «Honra» es breve, claro e idiomático.
- source_word: נִשְׁבַּע
  english_pob_choice: he swears
  chosen_spanish: jura
  alternatives_spanish:
  - hace un juramento
  - ha jurado
  lexicon: HALOT
  rationale: El presente gnómico en español encaja con la descripción de carácter. «Jura» transmite el acto de jurar de forma directa y natural.
- source_word: לְהָרַע
  english_pob_choice: to his own harm
  chosen_spanish: para su propio mal
  alternatives_spanish:
  - para su propio daño
  - aunque le perjudique
  - para su propia herida
  lexicon: HALOT
  rationale: La construcción es elíptica y suele entenderse como que cumple su juramento aun cuando le resulte costoso. «Para su propio mal» conserva la literalidad semítica y sigue siendo comprensible.
- source_word: יָמִר
  english_pob_choice: does not change
  chosen_spanish: no cambia
  alternatives_spanish:
  - no lo cambia
  - no se echa atrás
  - no lo altera
  lexicon: HALOT
  rationale: El verbo hiphil de מור expresa cambiar o intercambiar; el objeto es implícito. «No cambia» es conciso y conserva el sentido de no retractarse o no alterar su juramento.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre propio divino en forma transliterada, de acuerdo con la política del proyecto y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Cláusula difícil נִבְזֶה בְּעֵינָיו נִמְאָס
  english_pob_reading: In his eyes a despised person is rejected
  chosen_spanish_reading: En sus ojos, una persona despreciada es rechazada
  alternative_spanish_readings:
  - En sus ojos, una persona vil es despreciada
  - Él desprecia a una persona reprobable
  rationale: La sintaxis hebrea es compacta y admite más de una lectura cercana. La versión elegida preserva las dos formas pasivas/adjetivales y evita resolver la ambigüedad con una categoría teológica más fuerte que el texto no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios respecto del estado anterior. Esta versión mantiene la misma resolución principal, con adaptación idiomática al español y preservando la tensión del hebreo en la primera cláusula.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se mantiene «temen» en la expresión pactal «los que temen a Yahvé», sin suavizarla a un sinónimo menos directo.
  - «No cambia» conserva la brevedad del cierre hebreo y evita explicitar indebidamente el objeto implícito.
  - La nota al pie a recoge la alternativa tradicional establecida en la tradición inglesa de POB, ahora formulada en español.
