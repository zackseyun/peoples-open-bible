  to: Y Jerusalén estaba deshabitada como un desierto; no había quien entrara ni saliera de ella[a], y el santuario era pisoteado, y los hijos de extranjeros estaban en la ciudadela[b], un alojamiento para los gentiles; y el deleite fue quitado de Jacob, y la flauta y el arpa cesaron[c].
  rationale: Se corrigió la frase central para que el español exprese con claridad la falta de movimiento en Jerusalén, en línea con el sentido contextual del griego y la revisión inglesa. También se ajustó κατάλυμα a «alojamiento» por mayor precisión semántica y κινύρα a «arpa» con nota «lira» para alinearse mejor con el audit trail del POB.
