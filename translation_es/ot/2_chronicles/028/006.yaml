translation:
  language: es
  text: Pekaj, hijo de Remalías, mató en Judá a ciento veinte mil en un solo día[a], todos ellos hombres valerosos[b], porque habían abandonado a Yahvé[c], el Dios de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un día».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hijos de valor»; es decir, hombres valientes aptos para la guerra.
    reason: lexical_alternative
  - marker: c
    text: O «cuando abandonaron a Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּהֲרֹג
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - mató a muerte
  lexicon: HALOT
  rationale: El verbo hebreo הרג expresa matar o dar muerte. En español, «mató» comunica con claridad el hecho sin arcaísmo ni perífrasis innecesaria.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - entre Judá
  - en Judea
  lexicon: HALOT
  rationale: El preposición ב indica localización; el contexto histórico es el territorio/reino de Judá. «Judá» conserva el nombre bíblico estándar y evita «Judea», que sería anacrónico aquí.
- source_word: מֵאָה וְעֶשְׂרִים אֶלֶף
  english_pob_choice: one hundred twenty thousand
  chosen_spanish: ciento veinte mil
  alternatives_spanish:
  - cien y veinte mil
  lexicon: HALOT
  rationale: Es la cifra cardinal directa del hebreo. «Ciento veinte mil» es la forma natural y fiel en español contemporáneo.
- source_word: בְּיוֹם אֶחָד
  english_pob_choice: in a single day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en un día único
  lexicon: HALOT
  rationale: La traducción literal es «en un día». «En un solo día» conserva la fuerza enfática y suena natural en español.
- source_word: הַכֹּל
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - la totalidad
  lexicon: HALOT
  rationale: El hebreo resume a los caídos mencionados antes. «Todos ellos» explicita bien el referente y mantiene el valor totalizador.
- source_word: בְּנֵי חָיִל
  english_pob_choice: valiant men
  chosen_spanish: hombres valerosos
  alternatives_spanish:
  - hombres de valor
  - guerreros
  - hombres fuertes
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «hijos de valor/fortaleza» y designa hombres aptos para la guerra. «Hombres valerosos» conserva la idea de valor militar sin restringir demasiado el sentido.
- source_word: בְּעָזְבָם
  english_pob_choice: because they had forsaken
  chosen_spanish: porque habían abandonado
  alternatives_spanish:
  - cuando abandonaron
  - pues habían dejado
  lexicon: HALOT
  rationale: El prefijo ב con el infinitivo puede ser causal o temporal. En este contexto explica el juicio, así que «porque habían abandonado» expresa adecuadamente la relación causal sin forzar el texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: La convención del proyecto para el Tetragrámaton es «Yahvé», transliteración del nombre divino, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי אֲבוֹתָם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - su Dios ancestral
  lexicon: HALOT
  rationale: La fórmula de pacto hebrea se conserva de manera directa. «El Dios de sus padres» mantiene el eco bíblico y la relación histórica del texto.
theological_decisions:
- issue: Relación causal o temporal de בְּעָזְבָם con la matanza
  english_pob_reading: 'causal: ''because they had forsaken'''
  chosen_spanish_reading: 'causal: «porque habían abandonado»'
  alternative_spanish_readings:
  - 'temporal: «cuando abandonaron»'
  - «al abandonar»
  rationale: El cronista presenta con frecuencia la derrota militar como juicio de pacto. La lectura causal preserva esa explicación teológica tal como la permite el hebreo, sin añadir elementos externos.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto inglés auditado quedó estable en la última revisión y el cotejo indicó alto acuerdo; no se documentaron cambios textuales que requirieran reflejo especial en el español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se tradujo בְּנֵי חָיִל como «hombres valerosos» para conservar el matiz de capacidad guerrera sin perder naturalidad en español.
  - Se conservó la lectura causal de בְּעָזְבָם, siguiendo el juicio teológico documentado en el audit trail.
  - La numeración y la puntuación siguen el uso editorial habitual en español bíblico contemporáneo.
