    rationale: Además de «ganancia», el inglés auditado menciona «increase/gain». En español conviene explicitar «ingreso», «aumento» o «provecho» como alternativas posibles en la nota de la cláusula difícil.
  revised_spanish_text: Quien ama la plata no se saciará de plata[a], ni quien ama la abundancia[b] con ganancia; también esto es vapor[c].
