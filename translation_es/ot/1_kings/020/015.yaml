revisions:
- from: Así que pasó revista a los jóvenes de los comandantes de las provincias[a], y eran doscientos treinta y dos; y después de ellos pasó revista a todo el pueblo, a todos los hijos de Israel, siete mil.
  to: Entonces pasó revista a los jóvenes de los comandantes de las provincias, y eran doscientos treinta y dos; y después de ellos pasó revista a todo el pueblo de Israel[a], siete mil.
  rationale: Se ajusta el conector inicial para reflejar mejor la secuencia narrativa hebrea y se rehace la segunda mitad de la oración para evitar la doble preposición poco natural en español. ‘Todo el pueblo de Israel’ conserva el referente del hebreo con buena legibilidad, mientras la nota mantiene la forma más transparente ‘todos los hijos de Israel’ y explica su valor lexical documentado en el POB inglés.
