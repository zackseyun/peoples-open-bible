translation:
  language: es
  text: Y en Seír los horeos vivían antes[a]; pero los hijos de Esaú los desposeyeron y los destruyeron de delante de ellos[b], y habitaron en su lugar, tal como hizo Israel a la tierra de su posesión[c], la cual Yahvé les dio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «antiguamente». El hebreo aquí es temporal, no espacial.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de delante de ellos», un modismo que expresa remoción de su presencia.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la tierra de su heredad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹרִים
  english_pob_choice: the Horites
  chosen_spanish: los horeos
  alternatives_spanish:
  - los horitas
  lexicon: HALOT
  rationale: Se conserva el nombre étnico tradicional en español, 'horeos', para identificar al pueblo que habitaba Seír; 'horitas' es una alternativa menos asentada y más opaca para el lector.
- source_word: לְפָנִים
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - antiguamente
  lexicon: HALOT
  rationale: El sentido es temporal, no espacial. 'Antes' comunica con naturalidad que habitaban allí en época previa.
- source_word: יִירָשׁוּם
  english_pob_choice: dispossessed them
  chosen_spanish: los desposeyeron
  alternatives_spanish:
  - los expulsaron
  - tomaron posesión de su tierra
  lexicon: HALOT
  rationale: '''Desposeer'' refleja bien la acción de tomar posesión quitando a los ocupantes anteriores, preservando tanto la fuerza de ירשׁ como la idea de reemplazo.'
- source_word: וַיַּשְׁמִידוּם
  english_pob_choice: destroyed them
  chosen_spanish: los destruyeron
  alternatives_spanish:
  - los aniquilaron
  - los exterminaron
  lexicon: HALOT
  rationale: '''Destruyeron'' reproduce la fuerza de שׁמד sin añadir un matiz de exterminio total que el contexto no exige explícitamente.'
- source_word: מִפְּנֵיהֶם
  english_pob_choice: from before them
  chosen_spanish: de delante de ellos
  alternatives_spanish:
  - de su presencia
  - ante ellos
  lexicon: HALOT
  rationale: La expresión española mantiene el valor idiomático de remoción de la presencia del otro, evitando una traducción demasiado literal que sonaría extraña.
- source_word: תַּחְתָּם
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de ellos
  - bajo ellos
  lexicon: HALOT
  rationale: '''En su lugar'' expresa de forma natural la sustitución de los habitantes previos.'
- source_word: כַּאֲשֶׁר עָשָׂה יִשְׂרָאֵל
  english_pob_choice: just as Israel did
  chosen_spanish: como hizo Israel
  alternatives_spanish:
  - tal como hizo Israel
  - así como Israel hizo
  lexicon: HALOT
  rationale: Se conserva la comparación directa y el tiempo pasado narrativo con una construcción española fluida.
- source_word: לְאֶרֶץ יְרֻשָּׁתוֹ
  english_pob_choice: to the land of his possession
  chosen_spanish: con la tierra de su posesión
  alternatives_spanish:
  - a la tierra de su herencia
  - con la tierra de su patrimonio
  lexicon: HALOT
  rationale: Se mantiene la idea de heredad/posesión sin forzar un calco rígido. 'Con' corresponde al valor comparativo del hebreo en el contexto de 'como hizo Israel con...'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'Contested terms: יְהוָה YHWH'
  rationale: Se sigue el defecto del proyecto para el Tetragrámaton con la forma 'Yahvé', que es la opción más estable y legible en español para el nombre divino.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: En español, el dativo 'les' mantiene la referencia plural a Israel de manera natural y fiel al cambio de número del hebreo.
theological_decisions:
- issue: Comparación histórica entre Israel y los hijos de Esaú
  english_pob_reading: Retain the statement as a historical comparison without resolving broader source-critical or chronological debates.
  chosen_spanish_reading: Se mantiene la comparación histórica sin suavizarla ni reinterpretarla.
  alternative_spanish_readings:
  - Se trata como una glosa editorial posterior
  - Se traduce de modo que no sugiera que Israel ya había tomado posesión
  rationale: El hebreo presenta la comparación de forma directa; la traducción debe reflejar el texto recibido sin introducir una solución armonizadora ajena a la evidencia disponible.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio divino según el estándar del proyecto, en vez de sustituirlo por un título genérico o por una forma tradicional menos consistente con el criterio editorial.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto español mediante los marcadores [a], [b] y [c], y se mantuvo la lectura fuente-directa del hebreo con las decisiones léxicas ya auditadas.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para יהוה, conforme al estándar del proyecto.
  - Se usa 'desposeyeron' para ירשׁ en contexto de conquista, no 'heredaron', para preservar la fuerza de posesión mediante desalojo.
  - Se mantiene la distinción entre 'de delante de ellos' y 'en su lugar' para reflejar dos expresiones hebreas distintas.
  - El pronombre dativo plural 'les' traduce naturalmente לָהֶם sin perder la referencia colectiva a Israel.
