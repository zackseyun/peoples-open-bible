  text: Now when these things were finished[a], the officials approached me, saying, “The people of Israel, and the priests and the Levites, have not separated themselves from the peoples of the lands, according to their abominations—the Canaanites, the Hittites, the Perizzites, the Jebusites, the Ammonites, the Moabites, the Egyptians, and the Amorites.”
  footnotes:
