translation:
  language: es
  text: Entonces, todos los del pueblo que Ismael había tomado cautivos de Mizpa se volvieron[a] y fueron a Johanán hijo de Karea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dieron vuelta' o, con más literalidad, 'se volvieron atrás'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסֹבּוּ
  english_pob_choice: turned around
  chosen_spanish: se dio vuelta
  alternatives_spanish:
  - se volvió
  - dio la vuelta
  - se volvió atrás
  lexicon: HALOT
  rationale: El hebreo expresa una reversión física de dirección; en español, 'se dio vuelta' comunica con naturalidad ese giro sin añadir matices interpretativos excesivos.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo allí
  lexicon: HALOT
  rationale: '''Pueblo'' preserva el sentido colectivo del grupo retenido y liberado en el relato, y suena más natural y reverente que una simple ''gente''.'
- source_word: אֲשֶׁר שָׁבָה יִשְׁמָעֵאל
  english_pob_choice: whom Ishmael had taken captive
  chosen_spanish: que Ishmael había tomado cautivo
  alternatives_spanish:
  - que Ishmael había capturado
  - que Ishmael había llevado cautivo
  lexicon: HALOT
  rationale: שָׁבָה en qal denota tomar cautivo. 'Había tomado cautivo' conserva la relación temporal anterior al verbo principal y mantiene la fuerza lexical sin suavizarla a 'capturado'.
- source_word: מִן הַמִּצְפָּה
  english_pob_choice: from Mizpah
  chosen_spanish: desde Mizpa
  alternatives_spanish:
  - de Mizpa
  - desde Mizpá
  lexicon: HALOT
  rationale: '''Desde'' expresa mejor el punto de partida del movimiento que el simple ''de''. Se conserva el nombre propio sin castellanización añadida.'
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: went back / returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - se volvió
  - retornó
  lexicon: HALOT
  rationale: El hebreo repite la idea de retorno tras el giro inicial. En español, 'volvió' capta esa reanudación del movimiento sin sonar redundante al lado de 'se dio vuelta'.
- source_word: וַיֵּלְכוּ אֶל
  english_pob_choice: went to
  chosen_spanish: y volvió a
  alternatives_spanish:
  - y fue a
  - y se dirigió a
  - y fue hacia
  lexicon: HALOT
  rationale: La secuencia verbal hebrea subraya el movimiento hacia Johanan; en esta frase, 'volvió a' funciona como continuación fluida del regreso al grupo aliado, sin introducir una lectura de defección más allá del verbo.
- source_word: יוֹחָנָן בֶּן קָרֵחַ
  english_pob_choice: Johanan son of Kareah
  chosen_spanish: Johanan hijo de Karea
  alternatives_spanish:
  - Johanan hijo de Kareah
  - Juan hijo de Karea
  lexicon: HALOT
  rationale: Se transliteran los nombres propios siguiendo la forma habitual del proyecto. 'Hijo de' preserva el estilo narrativo hebreo y la identificación patronímica.
translation_notes:
  revision_awareness: La versión inglesa revisada evitó la repetición 'returned and went' y prefirió 'went back' para expresar con mayor naturalidad el doble matiz de volver y desplazarse hacia Johanan. El español refleja esa misma economía narrativa con 'se dio vuelta ... y volvió a', manteniendo dos movimientos sin duplicación artificial.
  spanish_consistency_notes:
  - Se mantiene 'Mizpa' como topónimo uniforme en minúscula inicial solo por convención española, no por rebaja del nombre propio.
  - Se evita 'SEÑOR' o sustitutos teológicos porque el versículo no contiene el Tetragrámaton ni términos divinos.
  - '''Tomado cautivo'' conserva la fuerza de שבה, en línea con la decisión inglesa POB y sin diluirla en una mera detención.'
