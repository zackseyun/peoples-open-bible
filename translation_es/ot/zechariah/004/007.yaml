  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: la pregunta retórica al gran monte, su transformación en llanura ante Zorobabel, y la salida de la piedra final entre aclamaciones. Sin embargo, hay un problema importante en la nota [a]: está anclada en «tú», pero su contenido explica הָאֶבֶן הָרֹאשָׁה, no מִי אַתָּה. Además, «la piedra principal» debilita la imagen espacial de הָרֹאשָׁה / ''top stone'' mejor que alternativas como «piedra superior» o «piedra de remate».'
  spanish_quality_summary: El español es claro y digno, con buena legibilidad e idiomaticidad. «Delante de Zorobabel te convertirás en llanura» y «entre gritos de» funcionan bien. Conviene ajustar la ubicación de la nota [a] y mejorar «la piedra principal» para acercarse más al valor arquitectónico y al rastro auditado del POB.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. Nombres propios y lenguaje teológico están bien manejados. «Gracia» para חֵן está bien conservado, con alternativa «Favor» en nota. La principal desviación es léxica: הָאֶבֶן הָרֹאשָׁה se acerca mejor a «la piedra superior» o «la piedra de remate» que a «la piedra principal».'
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: En el texto español, [a] aparece en «¿Quién eres tú[a]?», pero la nota explica una alternativa para הָאֶבֶן הָרֹאשָׁה («top stone/capstone/head stone»). Esto rompe la correspondencia entre ancla y nota exigida por el proyecto.
  - severity: medium
    issue: «La piedra principal» no preserva suficientemente la imagen de «head/top stone».
    rationale: Aunque comprensible, «principal» desplaza el sentido hacia importancia o jerarquía más que hacia posición/función arquitectónica. El rastro inglés privilegia 'top stone' con nota a 'capstone'; en español, «piedra superior» mantiene mejor la literalidad moderna sin sobretecnificar.
  revised_spanish_text: '¿Quién eres tú, oh gran monte? Delante de Zorobabel te convertirás en llanura. Y él sacará la piedra superior[a], entre gritos de: «¡Gracia[b], gracia para ella!»'
