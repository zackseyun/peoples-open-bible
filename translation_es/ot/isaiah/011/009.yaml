translation:
  language: es
  text: No harán daño ni destruirán en todo mi monte santo, porque la tierra[a] estará llena del conocimiento de Yahvé, como las aguas cubren el mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país estará lleno del conocimiento de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרֵעוּ
  english_pob_choice: do harm
  chosen_spanish: harán daño
  alternatives_spanish:
  - harán mal
  - obrarán mal
  - causarán daño
  lexicon: HALOT
  rationale: El hebreo en esta forma causativa expresa causar daño o mal; «harán daño» conserva la fuerza concreta del verbo y encaja bien con el paralelismo inmediato con «destruirán». «Obrarán mal» sería más amplio y menos preciso aquí.
- source_word: יַשְׁחִיתוּ
  english_pob_choice: destroy
  chosen_spanish: destruirán
  alternatives_spanish:
  - arruinarán
  - corromperán
  - causarán destrucción
  lexicon: HALOT
  rationale: La forma hifil de שׁחת suele significar destruir o arruinar. «Destruirán» es la equivalencia más directa y natural en español, y mantiene el contraste con «harán daño» sin agregar matices no presentes en el hebreo.
- source_word: בְּכָל הַר קָדְשִׁי
  english_pob_choice: in all my holy mountain
  chosen_spanish: en todo mi monte santo
  alternatives_spanish:
  - sobre todo mi monte santo
  - en todo mi monte consagrado
  - por todo mi monte santo
  lexicon: HALOT
  rationale: Se conserva el valor locativo de בְּ con «en», y כָל con «todo». «Monte santo» traduce naturalmente הַר קָדְשִׁי y mantiene el registro bíblico sin depender de una fórmula eclesiástica tradicional ajena al texto.
- source_word: מָלְאָה
  english_pob_choice: will be full
  chosen_spanish: estará llena
  alternatives_spanish:
  - será llena
  - será colmada
  - quedará llena
  lexicon: HALOT
  rationale: Aunque el hebreo está en perfecto, el contexto profético permite sentido futuro. «Estará llena» comunica ese valor escatológico en español con fluidez y sin forzar una pasiva artificial.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el país
  - el mundo
  lexicon: HALOT
  rationale: Aquí se sigue la lectura amplia y universal del contexto, pero en español «la tierra» es la forma más natural para abarcar el conjunto del ámbito creado. «El mundo» podría sonar más interpretativo; «la tierra» mantiene apertura semántica.
- source_word: דֵּעָה אֶת יְהוָה
  english_pob_choice: the knowledge of Yahweh
  chosen_spanish: el conocimiento de Yahvé
  alternatives_spanish:
  - el conocimiento de Yahvé
  - el conocimiento acerca de Yahvé
  - el conocimiento de Yahvé
  lexicon: HALOT
  rationale: Se vierte דֵּעָה como «conocimiento», conservando su valor sustantivo. «De Yahvé» expresa relación y objeto del conocimiento sin convertirlo en mera información sobre él. Se usa «Yahvé» conforme al criterio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se adopta la forma española «Yahvé» como transliteración usada por el proyecto para el nombre divino, en lugar de sustituirlo por un título. Esto preserva la distinción entre el nombre propio y una designación honorífica.
- source_word: כַּמַּיִם לַיָּם מְכַסִּים
  english_pob_choice: as the waters cover the sea
  chosen_spanish: como las aguas cubren el mar
  alternatives_spanish:
  - como el agua cubre el mar
  - como las aguas que cubren el mar
  - igual que las aguas cubren el mar
  lexicon: HALOT
  rationale: 'Se conserva la imagen comparativa tradicional del hebreo: «las aguas» en plural y el verbo «cubren». «Mar» traduce יָם de forma directa y natural, sin necesidad de explicitar más la metáfora.'
theological_decisions:
- issue: Alcance del espacio santo y de la paz resultante
  english_pob_reading: universal scope implied by 'the earth' rather than merely the land of Israel
  chosen_spanish_reading: alcance amplio sugerido por «la tierra», sin restringirlo al territorio local
  alternative_spanish_readings:
  - 'lectura localizada: «la tierra» como país/territorio'
  - 'lectura universal explícita: «el mundo»'
  rationale: La cláusula final fundamenta la ausencia de daño en una plenitud de conocimiento que se presenta en términos amplios. «La tierra» deja abierta esa amplitud sin imponer una explicitación teológica mayor que la del hebreo.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve documented scope without collapsing ambiguity'
- issue: Posible tensión entre conocimiento y obediencia en el oráculo de paz
  english_pob_reading: the earth will be full of the knowledge of Yahweh
  chosen_spanish_reading: la tierra estará llena del conocimiento de Yahvé
  alternative_spanish_readings:
  - la tierra estará llena de conocer a Yahvé
  - la tierra estará llena del conocimiento acerca de Yahvé
  rationale: Se mantiene «conocimiento» para respetar la densidad del sustantivo hebreo דֵּעָה y no reducirlo a mera información. La frase deja intacta la tensión entre conocimiento relacional y el efecto ético de paz que el versículo afirma.
  doctrine_reference: Preserve theological tension rather than flattening lexical range
translation_notes:
  revision_awareness: 'La redacción sigue el último estado auditado de la POB inglesa: se adopta la elección más directa para יַשְׁחִיתוּ («destroy») y se mantiene la preposición locativa en la frase del monte santo. También se conserva la decisión contextual de leer el alcance como amplio, con «la tierra» en un registro español natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para el Tetragrámaton.
  - «Monte santo» conserva el lenguaje bíblico sin sustituirlo por formulaciones litúrgicas fijas.
  - La pareja verbal «harán daño / destruirán» reproduce el paralelismo hebreo sin intensificarlo más allá del texto.
  - Se evitó «SEÑOR» para no ocultar el nombre divino, conforme al criterio del proyecto.
