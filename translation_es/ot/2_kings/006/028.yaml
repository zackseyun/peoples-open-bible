translation:
  language: es
  text: 'Y el rey le dijo: «¿Qué te pasa?» Y ella dijo: «Esta mujer me dijo: “Da tu hijo, para que lo comamos hoy, y mañana comeremos a mi hijo”».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מַה לָּךְ
  english_pob_choice: What troubles you?
  chosen_spanish: ¿Qué te pasa?
  alternatives_spanish:
  - ¿Qué te preocupa?
  - ¿Qué te sucede?
  - ¿Qué te aflige?
  lexicon: HALOT
  rationale: El hebreo es una pregunta idiomática breve (“¿qué a ti?”) que pide qué la está afligiendo o alterando. «¿Qué te pasa?» es natural en español moderno y conserva la función interrogativa sin volverla más dura de lo que exige el texto.
- source_word: הָאִשָּׁה הַזֹּאת
  english_pob_choice: This woman
  chosen_spanish: Esta mujer
  alternatives_spanish:
  - Esa mujer
  lexicon: HALOT
  rationale: El demostrativo hebreo es proximal. En el discurso citado, «esta mujer» refleja mejor la forma del original que una solución distal como «esa mujer».
- source_word: אָמְרָה אֵלַי
  english_pob_choice: said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - me comentó
  lexicon: HALOT
  rationale: El verbo פשוט de decir se expresa de manera directa con «me dijo», que preserva la relación de habla sin añadir matices interpretativos.
- source_word: תְּנִי אֶת בְּנֵךְ
  english_pob_choice: Give your son
  chosen_spanish: Da tu hijo
  alternatives_spanish:
  - Entrega tu hijo
  - Dame tu hijo
  lexicon: HALOT
  rationale: נתן en imperativo aquí es «dar» en sentido directo. «Da tu hijo» mantiene la crudeza del mandato sin introducir un matiz jurídico o ceremonial que el hebreo no exige.
- source_word: וְנֹאכְלֶנּוּ
  english_pob_choice: so that we may eat him
  chosen_spanish: para que lo comamos
  alternatives_spanish:
  - y lo comeremos
  - para comerlo
  lexicon: HALOT
  rationale: La secuencia tras el imperativo expresa propósito o resultado esperado. «Para que lo comamos» conserva esa relación y evita suavizar el sentido literal, que en el texto es deliberadamente estremecedor.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente natural y exacto para el adverbio temporal.
- source_word: וְאֶת בְּנִי נֹאכַל מָחָר
  english_pob_choice: and tomorrow we will eat my son
  chosen_spanish: y mañana comeremos a mi hijo
  alternatives_spanish:
  - y mañana comeremos mi hijo
  - y mañana comeremos a mi hijo
  lexicon: HALOT
  rationale: El hebreo repite el mismo verbo y contrasta el tiempo con «mañana». En español, «comeremos a mi hijo» conserva el objeto directo humano marcado por «a» y reproduce la franqueza del original.
- source_word: בֵּן / בְּנֵךְ / בְּנִי
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - varón
  - niño
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijo/son», en español bíblico y narrativo «hijo» es la forma natural para este parentesco; además, aquí el paralelismo entre «tu hijo» y «mi hijo» se mantiene con claridad.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente hebreo y coincide con la solución auditada en inglés para מַה לָּךְ como una pregunta idiomática natural, aquí resuelta con «¿Qué te pasa?». No se requieren notas textuales adicionales, porque el versículo no presenta variantes relevantes en el paquete provisto.
  spanish_consistency_notes:
  - Se mantuvo un español moderno y sobrio, sin recurrir a fórmulas arcaizantes.
  - Se preservó la secuencia narrativa y el discurso directo con comillas dobles y comillas internas españolas.
  - Se tradujo בֵּן con «hijo» para mantener consistencia relacional en los dos miembros del paralelismo.
  - No se introdujeron notas de pie porque el versículo no contiene una variante textual o una alternativa lexical que deba marcarse en el texto español.
