translation:
  language: es
  text: 'Y ella dijo al siervo[a]: «¿Quién es este hombre que camina en el campo a nuestro encuentro?» Y el siervo dijo[b]: «Él es mi amo». Entonces tomó el velo[c] y se cubrió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Quién es aquel hombre que camina en el campo a nuestro encuentro?». El demostrativo hebreo puede equivaler a «este» o «aquel», según la perspectiva deíctica.
    reason: lexical_alternative
  - marker: b
    text: O «Él es mi señor». Aquí el hebreo se refiere al amo humano del siervo, no a un título divino.
    reason: lexical_alternative
  - marker: c
    text: 'O «se veló». El verbo hebreo es reflexivo: tomó el velo y se cubrió con él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֶבֶד
  english_pob_choice: the servant
  chosen_spanish: el esclavo
  alternatives_spanish:
  - el siervo
  - el sirviente
  lexicon: HALOT
  rationale: עֶבֶד puede significar “siervo” o “esclavo”; el POB inglés eligió “servant” por el contexto narrativo, pero en español “esclavo” conserva mejor el valor léxico general sin volverlo necesariamente áspero. Aquí sigue tratándose del servidor/casa de Abraham, pero el término mantiene la fuerza del hebreo.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién... ?
  alternatives_spanish:
  - ¿Qué persona... ?
  lexicon: HALOT
  rationale: Interrogativo directo de identificación personal; “¿Quién...?” es la forma natural y exacta en español.
- source_word: הָאִישׁ הַלָּזֶה
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - ese hombre
  - aquel hombre
  lexicon: HALOT
  rationale: El demostrativo hebreo señala al varón visible en la escena. En español, “este hombre” reproduce bien la deixis inmediata de identificación.
- source_word: הַהֹלֵךְ
  english_pob_choice: walking
  chosen_spanish: que viene caminando
  alternatives_spanish:
  - que camina
  - que va caminando
  lexicon: HALOT
  rationale: El participio de הלך describe movimiento en curso. “Viene caminando” conserva el aspecto progresivo y suena natural en una pregunta de identificación.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: por el campo
  alternatives_spanish:
  - en el campo
  - a través del campo
  lexicon: HALOT
  rationale: El hebreo indica el escenario espacial. “Por el campo” encaja con el desplazamiento del hombre y evita una rigidez excesiva.
- source_word: לִקְרָאתֵנוּ
  english_pob_choice: to meet us
  chosen_spanish: a nuestro encuentro
  alternatives_spanish:
  - para encontrarnos
  - hacia nosotros
  lexicon: HALOT
  rationale: La construcción expresa movimiento con la finalidad de encontrar a otro. “A nuestro encuentro” preserva esa dirección-intención de forma idiomática.
- source_word: הוּא אֲדֹנִי
  english_pob_choice: He is my master
  chosen_spanish: Él es mi señor
  alternatives_spanish:
  - Él es mi amo
  - Él es mi maestro
  lexicon: HALOT
  rationale: אֲדֹנִי con sufijo de primera persona singular denota relación de autoridad humana. “Mi señor” comunica bien la subordinación respetuosa sin forzar la asociación litúrgica de “Señor” en sentido divino.
- source_word: הַצָּעִיף
  english_pob_choice: the veil
  chosen_spanish: el velo
  alternatives_spanish:
  - la mantilla
  - el pañuelo
  lexicon: HALOT
  rationale: צעיף designa un cubrimiento femenino; “velo” es el equivalente tradicional y claro en español para esta escena matrimonial.
- source_word: וַתִּתְכָּס
  english_pob_choice: covered herself
  chosen_spanish: se cubrió
  alternatives_spanish:
  - se veló
  - se cubrió con él
  lexicon: HALOT
  rationale: El valor reflexivo del verbo está presente. “Se cubrió” comunica la acción sin sobrecargar la frase; el objeto “velo” ya fue mencionado.
theological_decisions:
- issue: Tratamiento de אֲדֹנִי en la respuesta del siervo
  english_pob_reading: He is my master. Or “He is my lord.” Here the Hebrew means the servant’s human master, not a divine title.
  chosen_spanish_reading: Él es mi señor.
  alternative_spanish_readings:
  - Él es mi amo.
  - Él es mi señor y amo.
  rationale: Se conserva la relación de autoridad humana del contexto. “Señor” en español puede tener uso respetuoso humano; aquí no se capitaliza ni se traslada a un uso divino, manteniendo la tensión documental del hebreo sin neutralizarla.
  doctrine_reference: No aplica; decisión de relación social y pragmática, no doctrinal.
- issue: Deixis del demostrativo hebreo הַלָּזֶה
  english_pob_reading: this / that man
  chosen_spanish_reading: este hombre
  alternative_spanish_readings:
  - ese hombre
  - aquel hombre
  rationale: El hebreo permite una deixis cercana o distante según el punto de vista. En español, la escena visual inmediata favorece “este hombre”, que reproduce la identificación deíctica sin añadir explicaciones doctrinales.
  doctrine_reference: No aplica.
- issue: Reflexividad de וַתִּתְכָּס
  english_pob_reading: covered herself / veiled herself
  chosen_spanish_reading: se cubrió
  alternative_spanish_readings:
  - se veló
  - se cubrió con el velo
  rationale: La acción es reflexiva; “se cubrió” mantiene el sentido directo y permite que “velo” funcione como objeto explícito en la cláusula anterior. Así se evita interpretar más allá del verbo hebreo.
  doctrine_reference: No aplica.
translation_notes:
  revision_awareness: 'Se ha seguido el control de revisión más reciente: no se reportan cambios aplicados y el pasaje presenta alto acuerdo con el texto fuente y la auditoría inglesa.'
  spanish_consistency_notes:
  - Se emplea “Yahvé” solo cuando el hebreo tiene el nombre divino; este versículo no lo contiene.
  - Se evita capitalizar “señor” porque aquí no es un título divino, sino una relación humana de autoridad.
  - La deixis se resolvió con “este hombre” por naturalidad española, dejando nota de la alternativa en la footnote.
  - El reflexivo “se cubrió” conserva el valor verbal sin redundancia, con la mención previa de “el velo” como soporte semántico.
