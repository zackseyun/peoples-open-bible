    37 iuxta sermones tuos sic et fiet. Quoniam uere non cogitabo

    38 super plasma eorum qui peccauerunt aut mortem aut iudicium aut perditionem ; Sed iocundabor super iustorum figmentum,

    39 peregrinationis quoque et saluationis et mercedis receptionis. Quomodo ergo locutus sum, sic et est. Sicut enim agricola

    40 serit super terram semina multa et plantationis multitudinem

    41 plantat, sed non in tempore omnia quae seminata sunt saluabuntur, sed nec omnia quae plantata sunt radicabunt, sic et qui in saeculo seminati sunt non omnes saluabuntur. Et respondi et dixi : si inueni gratiam coram te loquar.

    42 Quoniam semen agricolae si non ascenderit, non enim accepit

    43 pluuiam tuam in tempore, et si corruptum fuerit multitudine pluuiae, Hoc perit, sed homo qui manibus tuis plasmatus est et

    44 tua imago nominatus, quoniam similatus est, per quem omnia plasmasti, et similasti eum semini agricolae. Non, domine

    45 super nos, sed parce populo tuo et miserere haereditati tuae, tuae enim creaturae misereris.

    46 Et respondit ad me et dixit: quae sunt praesentia praesentibus et quae futura futuris. Multum enim tibi restat ut

    47 possis diligere meam creaturam super me, tu autem frequenter temetipsum proximasti iniustis, numquam Sed et in hoc mirabilis eris coram altissimo, Quoniam humiliasti te, sicut decet

    48 sed et in hoc mirabilis eris coram Altissimo,

    49 te, et non iudicasti te inter iustos ut plurimum glorificeris.

    50 Propter quod miseriae multae miserabiles efficientur qui habitant saeculum in nouissimis, quia in multa superbia ambulaūerunt. Tu autem pro te intellege et de similibus tuis inquire

    51 tu autem pro te intellege et de similibus tuis inquire gloriam.

    52 gloriam. Vobis enim apertus est paradisus, plantata est arbor uitae, paratum est futurum tempus, praeparata est habundantia, aedificata est ciuitas, probata est requies, perfecta est bonitas,

    53 ante perfecta sapientia. Radix signata est a uobis, infirmitas extincta est a uobis et [mors] absconsa est; infernus fugit et

    54 corruptio in obliuionem. Transierunt dolores et ostensus est

    55 in finem thesaurus inmortalitatis. Noli ergo adhuc adicere

    56 inquirendo de multitudine eorum qui pereunt. Nam et ipsi accipientes libertatem spreuerunt altissimum et legem eius

    57 contempserunt et uias eius dereliquerunt. Adhuc autem et

    58 iustos eius conculcauerunt. Et dixerunt in corde suo non esse deum, et quidem scientes sciunt quoniam moriuntur. Sicut

    59 enim uos susipient quae praedicta sunt, sic eos sitis et cruciatus quae parata sunt. non enim altissimus uoluit hominem disperdi ; Sed ipsi qui creati sunt coinquinauerunt nomen eius

    60 qui fecit eos et ingrati fuerunt ei qui praeparauit eis uitam. Quapropter iudicium meum modo adpropinquat : Quod non

    61 omnibus demonstraui nisi tibi et tibi similibus paucis. et re-

    62 spondi et dixi: Ecce nunc, domine, demonstrasti mihi multi-

    63 tudinem signorum quae incipies facere in nouissimis, sed non demonstrasti mihi quo tempore.'
