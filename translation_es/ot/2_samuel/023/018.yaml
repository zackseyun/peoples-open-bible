translation:
  language: es
  text: Ahora Abisai[a], hermano de Joab hijo de Zeruía, era jefe de los Tres. Él blandió su lanza contra trescientos y los mató[b], y tenía nombre entre los Tres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «jefe de los Tres». Algunos intérpretes, influidos por el paralelo de 1 Crónicas 11:20 y por la incertidumbre textual de esta sección, entienden el grupo como «los treinta» en vez de «los Tres».'
    reason: textual_variant
  - marker: b
    text: 'O «levantó o blandió su lanza contra trescientos y los mató». El hebreo es muy breve: literalmente, «despertó/levantó su lanza contra trescientos caídos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ הַשְּׁלֹשִׁי
  english_pob_choice: chief of the Three
  chosen_spanish: jefe de los Tres
  alternatives_spanish:
  - cabeza de los Tres
  - jefe de los treinta
  lexicon: HALOT
  rationale: רֹאשׁ expresa la idea de cabeza o jefe. Mantengo «los Tres» por la forma masorética del versículo y porque el contexto inmediato repite «entre los Tres». La alternativa «los treinta» queda como posibilidad textual/interpretativa, pero no se adopta en el texto principal.
- source_word: עוֹרֵר אֶת־חֲנִיתוֹ
  english_pob_choice: wielded his spear
  chosen_spanish: blandió su lanza
  alternatives_spanish:
  - levantó su lanza
  - empuñó su lanza
  lexicon: HALOT
  rationale: עוֹרֵר significa literalmente 'despertar/levantar/agitar'. En contexto militar, «blandió» comunica el uso activo de arma con naturalidad en español, sin perder la fuerza del hebreo. «Lanza» reproduce el objeto de manera idiomática y clara.
- source_word: עַל שְׁלֹשׁ מֵאוֹת חָלָל
  english_pob_choice: against three hundred and killed them
  chosen_spanish: contra trescientos y los mató
  alternatives_spanish:
  - contra trescientos heridos de muerte
  - sobre trescientos matados
  lexicon: HALOT
  rationale: חָלָל designa a un muerto o herido mortalmente. El hebreo es muy terse y el sentido completo en contexto es que abatió a trescientos. Siguiendo la revisión inglesa, «y los mató» expresa de manera natural lo implícito sin abandonar la referencia al número de vencidos.
- source_word: וְלוֹ שֵׁם
  english_pob_choice: and he had a name
  chosen_spanish: tenía nombre
  alternatives_spanish:
  - y tenía renombre
  - era famoso
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente 'y para él [había] un nombre'. «Tenía nombre» conserva el giro idiomático y deja oír la idea de reputación/renombre sin convertirla de inmediato en una paráfrasis explicativa.
- source_word: בַּשְּׁלֹשָׁה
  english_pob_choice: among the Three
  chosen_spanish: entre los Tres
  alternatives_spanish:
  - entre los tres guerreros
  - entre los treinta
  lexicon: HALOT
  rationale: El hebreo señala pertenencia o reconocimiento dentro del grupo. «Entre los Tres» mantiene la relación grupal del texto y el eco del título previo, sin resolver la tensión textual a favor de «los treinta».
- source_word: אֲבִישַׁי ... יוֹאָב ... צְרוּיָה
  english_pob_choice: Abishai ... Joab ... Zeruiah
  chosen_spanish: Abisai ... Joab ... Zeruía
  alternatives_spanish:
  - Abisai ... Yoab ... Zeruiah
  lexicon: convención onomástica bíblica en español
  rationale: Los nombres propios se transliteran según uso español bíblico amplio y legible. «Abisai» y «Zeruía» son formas reconocibles y coherentes en español contemporáneo de registro bíblico.
theological_decisions:
- issue: Tensión textual entre «los Tres» y la posible lectura «los treinta»
  english_pob_reading: The main text keeps 'the Three' while noting that some interpreters, influenced by 1 Chronicles 11:20 and textual uncertainty, understand 'the Thirty.'
  chosen_spanish_reading: El texto principal conserva «los Tres», con nota que reconoce la posibilidad de «los treinta».
  alternative_spanish_readings:
  - «los treinta»
  - «la treinta»
  rationale: La forma hebrea presente en este versículo y la repetición interna de «entre los Tres» favorecen mantener la lectura tradicional del pasaje masorético. Sin embargo, la nota conserva la tensión textual documentada por el aparato inglés y por el paralelo de 1 Crónicas 11:20, sin ocultarla.
  doctrine_reference: Crítica textual bíblica; armonización con 1 Crónicas 11:20 sin decidirla dogmáticamente
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente sustituyó una expresión más literal sobre «trescientos muertos/caídos» por una formulación más natural: «and killed them». La versión española sigue esa resolución en la línea principal («y los mató»), pero mantiene la nota sobre la tersedad del hebreo y la alternativa literal implícita. El resto de la frase conserva la decisión estable del audit trail: ''chief of the Three''/''among the Three''.'
  spanish_consistency_notes:
  - Se mantiene «los Tres» en mayúscula por ser designación de grupo élite, en paralelo con el inglés POB.
  - Se usa «lanza» para חֲנִית y no «jabalina», porque el contexto narrativo y militar favorece el arma de combate cuerpo a cuerpo.
  - 'Se conserva el orden genealógico natural en español: «hermano de Joab, hijo de Zeruía».'
