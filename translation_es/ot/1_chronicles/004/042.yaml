review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: un subconjunto de los hijos de Simeón fue al monte Seír, en número de quinientos, con cuatro hombres identificados como hijos de Isí en función de liderazgo. Sin embargo, la nota alternativa no preserva correctamente la alternativa documentada en el rastro inglés: repite esencialmente la lectura principal en vez de ofrecer la opción de que los cuatro nombres sean entendidos explícitamente como los líderes del grupo.'
  spanish_quality_summary: El español principal es claro, natural y digno. "Y algunos de ellos, de entre los hijos de Simeón, fueron al monte Seír —quinientos hombres—" lee bien. "A la cabeza" funciona idiomáticamente. El único problema real está en la footnote, no en la prosa principal.
  glossary_alignment: No hay términos teológicos de glosario mayor en juego. Los nombres propios y la sintaxis genealógica están bien manejados en general. La forma "Seír" es aceptable en español; "Uziel" e "Isí" son legibles. La decisión de mantener "hijos de Simeón" concuerda con la orientación genealógica del proyecto.
  issues:
  - severity: medium
    issue: La nota al pie [a] no presenta la alternativa léxica/sintáctica correcta.
    rationale: 'El inglés auditado conserva una alternativa específica: "and Pelatiah ... were their leaders". La nota española actual pone como alternativa una formulación que básicamente duplica la lectura principal ("con ... a la cabeza") en lugar de explicitar la opción de entender a esos hombres como líderes del grupo.'
  - severity: low
    issue: La formulación de la nota incluye comillas y prefijo "O:" de manera poco pulida.
    rationale: No afecta la fidelidad, pero conviene normalizar la redacción de la nota para que suene natural en español y se centre en la alternativa interpretativa real.
  revised_spanish_text: Y algunos de ellos[a], de entre los hijos de Simeón, fueron al monte Seír —quinientos hombres—, con Pelatías, Nearías, Refaías y Uziel, hijos de Isí, a la cabeza.
  revised_footnotes:
  - marker: a
    text: 'O: «y Pelatías, Nearías, Refaías y Uziel, hijos de Isí, eran sus líderes». La sintaxis hebrea coloca los nombres antes de «hijos de Isí, a la cabeza», lo que indica que estos hombres dirigían el grupo.'
    reason: lexical_alternative
  revision_rationale: 'El texto principal puede mantenerse. Se revisa la nota para preservar fielmente la alternativa documentada en el rastro inglés: no solo que iban con el grupo, sino que podían entenderse explícitamente como sus líderes.'
