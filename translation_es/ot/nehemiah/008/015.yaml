translation:
  language: es
  text: 'y que se proclamara y se hiciera correr la voz por todas sus ciudades y en Jerusalén, diciendo: «Salgan a la región montañosa y traigan ramas[a] de olivo, de árbol de aceite[b], de mirto, de palma y de otros árboles frondosos, para hacer cabañas, como está escrito».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «hojas de olivo ... hojas de mirto ...». Aquí se traduce «ramas» porque en español expresa más naturalmente el material reunido para hacer las cabañas.'
    reason: lexical_alternative
  - marker: b
    text: 'O «olivo silvestre» u «oleastro» para «árbol de aceite» (hebreo: עֵץ שֶׁמֶן). La identificación exacta de la especie es incierta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  english_pob_choice: and that
  chosen_spanish: y que
  alternatives_spanish:
  - que
  - y que se
  lexicon: HALOT
  rationale: La construcción introduce el contenido de lo mandado o proclamado; en español, «y que» conserva la subordinación fluida sin añadir interpretación extra.
- source_word: יַשְׁמִיעוּ
  english_pob_choice: they should proclaim
  chosen_spanish: se proclamara
  alternatives_spanish:
  - proclamaran
  - se diera a conocer
  lexicon: HALOT
  rationale: El hifil de שׁמע expresa hacer oír / anunciar públicamente. En español, «se proclamara» mantiene el valor público e impersonal del mandato.
- source_word: וְיַעֲבִירוּ קוֹל
  english_pob_choice: and spread the message
  chosen_spanish: y se hiciera correr la voz
  alternatives_spanish:
  - y se difundiera el mensaje
  - y se pasara la voz
  lexicon: HALOT
  rationale: La expresión idiomática hebrea de «hacer pasar una voz» comunica difusión pública. «Hiciera correr la voz» conserva el movimiento de propagación sin volverla mecánica.
- source_word: בְּכָל עָרֵיהֶם וּבִירוּשָׁלַם
  english_pob_choice: through all their cities and in Jerusalem
  chosen_spanish: por todas sus ciudades y en Jerusalén
  alternatives_spanish:
  - en todas sus ciudades y en Jerusalén
  - por todas sus urbes y en Jerusalén
  lexicon: HALOT
  rationale: «Por» expresa mejor la circulación del anuncio a través de las ciudades. «Ciudades» se conserva por consistencia con el alcance geográfico del texto.
- source_word: צְאוּ הָהָר
  english_pob_choice: Go out to the hill country
  chosen_spanish: Salgan al territorio montañoso
  alternatives_spanish:
  - Salgan al monte
  - Salgan a la región montañosa
  lexicon: HALOT
  rationale: הָהָר puede referirse al monte o a la zona montañosa. «Territorio montañoso» es claro en español y evita restringir indebidamente el alcance geográfico.
- source_word: וְהָבִיאוּ
  english_pob_choice: and bring
  chosen_spanish: y traigan
  alternatives_spanish:
  - y lleven
  - y traigan consigo
  lexicon: HALOT
  rationale: Imperativo simple de traer de vuelta los materiales desde el monte.
- source_word: עֲלֵי זַיִת
  english_pob_choice: branches of olive
  chosen_spanish: ramas de olivo
  alternatives_spanish:
  - hojas de olivo
  - ramas de olive
  lexicon: HALOT
  rationale: 'Aunque la forma literal es «hojas de», el contexto de materiales para construir cabañas favorece un equivalente natural en español: ramas, como en la auditoría inglesa.'
- source_word: עֵץ שֶׁמֶן
  english_pob_choice: oil tree
  chosen_spanish: árbol de aceite
  alternatives_spanish:
  - olivo silvestre
  - árbol de aceite / oleastro
  lexicon: HALOT
  rationale: Se mantiene la opción lexical más cercana a la revisión inglesa reciente («oil tree»). Dado que la identificación exacta es incierta, «árbol de aceite» conserva la literalidad sin fijar una especie discutida.
- source_word: הֲדַס
  english_pob_choice: myrtle
  chosen_spanish: mirto
  alternatives_spanish:
  - arrayán
  lexicon: HALOT
  rationale: Nombre común estándar y reconocible para la planta.
- source_word: תְמָרִים
  english_pob_choice: palm
  chosen_spanish: palma
  alternatives_spanish:
  - palmeras
  - palma datilera
  lexicon: HALOT
  rationale: En la lista de materiales vegetales, «palma» funciona como equivalente breve y natural, manteniendo la referencia a hojas o ramas de palma.
- source_word: עֵץ עָבֹת
  english_pob_choice: other leafy trees
  chosen_spanish: de otros árboles frondosos
  alternatives_spanish:
  - de árboles espesos
  - de otros árboles de follaje denso
  lexicon: HALOT
  rationale: עָבֹת denota espesura o follaje denso. «Frondosos» reproduce bien esa densidad en español y encaja con la lista de ramas/hojas.
- source_word: לַעֲשׂוֹת סֻכּוֹת
  english_pob_choice: to make booths
  chosen_spanish: para hacer cabañas
  alternatives_spanish:
  - para hacer tabernáculos
  - para hacer chozas
  lexicon: HALOT
  rationale: «Sucot» en este contexto festival se refiere a estructuras temporales. «Cabañas» es natural en español y puede quedar alineado con la festividad sin forzar un tecnicismo eclesiástico.
- source_word: כַּכָּתוּב
  english_pob_choice: as it is written
  chosen_spanish: como está escrito
  alternatives_spanish:
  - según está escrito
  - tal como está escrito
  lexicon: HALOT
  rationale: Fórmula idiomática estándar que indica conformidad con la Escritura.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente, que corrigió עֵץ שֶׁמֶן de «wild olive» a «oil tree». Por eso se evita fijar una identificación botánica más específica en el texto principal. También se preserva el valor idiomático de la frase hebrea de difusión pública («hacer correr la voz») y el sentido material de los elementos vegetales para las cabañas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto de fondo lo requiera explícitamente; aquí no aparece.
  - Se mantiene un registro bíblico moderno y sobrio, sin arcaísmos innecesarios.
  - «Sucot» se vierte como «cabañas» para evitar un término litúrgico poco natural en español, pero en esta unidad no se desarrolla la festividad más allá del mandato constructivo.
  - La lista vegetal sigue el patrón de materiales recogidos para la construcción, evitando una traducción demasiado literal de «hojas» que sonaría extraña en español.
