translation:
  language: es
  text: Y contigo haré pedazos al pastor y su rebaño[a]; y contigo haré pedazos al labrador y su yunta[b]; y contigo haré pedazos a los gobernadores y a los funcionarios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quebrantaré» para el verbo repetido «haré pedazos».
    reason: lexical_alternative
  - marker: b
    text: O «su par» o «su yugo» para «su yunta», refiriéndose a la pareja uncida usada en la labranza.
    reason: lexical_alternative
  - marker: c
    text: O «oficiales» para «funcionarios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִפַּצְתִּי
  english_pob_choice: I shattered
  chosen_spanish: quebantaré
  alternatives_spanish:
  - haré pedazos
  - desmenuzaré
  - quebraré
  lexicon: HALOT
  rationale: El verbo hebreo expresa una destrucción violenta y repetida. «Quebrantaré» conserva fuerza, cadencia y un registro bíblico comprensible en español sin sonar mecánico. Mantiene la repetición del hebreo.
- source_word: בְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - por medio de ti
  - a través de ti
  lexicon: HALOT
  rationale: 'El hebreo usa la preposición con valor instrumental: Babilonia es el medio por el cual otros son quebrantados. «Contigo» reproduce de forma natural esa relación instrumental y la repetición enfática del texto.'
- source_word: רֹעֶה
  english_pob_choice: the shepherd
  chosen_spanish: el pastor
  alternatives_spanish:
  - el pastor de ovejas
  - el que apacienta
  lexicon: HALOT
  rationale: Aquí el sentido literal es el de un pastor de ovejas en una lista social y agrícola. «Pastor» es la forma natural y fiel en español, y no requiere una parafrasis mayor.
- source_word: עֶדְרוֹ
  english_pob_choice: his flock
  chosen_spanish: su rebaño
  alternatives_spanish:
  - su manada
  - sus ovejas
  lexicon: HALOT
  rationale: עֵדֶר puede referirse a rebaño o hato. Con «pastor», «rebaño» mantiene la pareja semántica normal en español y el paralelismo del versículo.
- source_word: אִכָּר
  english_pob_choice: the farmer
  chosen_spanish: el labrador
  alternatives_spanish:
  - el agricultor
  - el campesino
  - el granjero
  lexicon: HALOT
  rationale: El término designa al cultivador de la tierra. «Labrador» es preciso, dignificado y más cercano al oficio agrícola del hebreo que «campesino», que puede ser más amplio socialmente.
- source_word: צִמְדּוֹ
  english_pob_choice: his team
  chosen_spanish: su yunta
  alternatives_spanish:
  - su par
  - su yugo
  - su pareja de bueyes
  lexicon: HALOT
  rationale: El término puede aludir a una pareja uncida para labranza. «Yunta» comunica bien en español la pareja de animales de trabajo y evita la ambigüedad de «yugo», que puede entenderse como el instrumento.
- source_word: פַּחוֹת
  english_pob_choice: governors
  chosen_spanish: los gobernadores
  alternatives_spanish:
  - los prefectos
  - los funcionarios
  lexicon: HALOT
  rationale: פַּחָה corresponde a un gobernador o autoridad provincial. «Gobernadores» es la equivalencia clara y estándar en español.
- source_word: סְגָנִים
  english_pob_choice: deputies
  chosen_spanish: los delegados
  alternatives_spanish:
  - los diputados
  - los subordinados
  - los oficiales
  lexicon: HALOT
  rationale: El término denota autoridades subordinadas o asistentes de rango inferior. «Delegados» transmite subordinación y función representativa de forma natural en español; se conserva la tensión con la otra lista de autoridades sin convertirlo en un cargo moderno demasiado específico.
theological_decisions:
- issue: La preposición בְּךָ en fórmulas de juicio puede leerse como instrumental o locativa.
  english_pob_reading: with you
  chosen_spanish_reading: contigo
  alternative_spanish_readings:
  - por medio de ti
  - en ti
  rationale: El contexto de juicio favorece entender Babilonia como instrumento del quebrantamiento de otros. «Contigo» mantiene esa relación sin imponer una explicación interpretativa explícita en el texto principal.
  doctrine_reference: Jeremiah 51:23; juicio divino sobre Babilonia como instrumento de Yahvé.
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo y coincide sustancialmente con la línea inglesa auditada. Se optó por conservar la repetición verbal y la estructura paralela de tres miembros, ajustando solo el léxico para que suene natural en español y preserve la fuerza del juicio. No se detectaron revisiones aplicadas en el pasaje de referencia.
  spanish_consistency_notes:
  - Se mantuvo «quebrantaré» repetido tres veces para reflejar el paralelismo enfático del hebreo.
  - «Contigo» conserva el valor instrumental de בְּךָ sin introducir explicaciones fuera del texto.
  - «Yunta» es preferible en español a un calco de «team», porque comunica la pareja de trabajo agrícola y evita ambigüedad.
  - Se eligieron formas plurales definidas («los gobernadores», «los delegados») para reflejar los sustantivos hebreos de oficio y mantener el ritmo del verso.
