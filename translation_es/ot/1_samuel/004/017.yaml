translation:
  language: es
  text: 'El mensajero respondió y dijo: «Israel ha huido ante los filisteos, y también ha habido una gran mortandad[a] entre el pueblo; y tus dos hijos también están muertos, Hofní y Finees; y el arca de Dios ha sido tomada[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «una gran derrota entre el pueblo». El término hebreo puede denotar un golpe severo, una plaga o una mortandad; aquí el contexto de batalla favorece «mortandad».
    reason: lexical_alternative
  - marker: b
    text: O, «el arca de Dios fue capturada».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְבַשֵּׂר
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el portador de noticias
  - el que trae el informe
  lexicon: HALOT
  rationale: El participio designa al que trae la noticia; «mensajero» es natural en español y conserva bien la función narrativa sin volver la frase pesada.
- source_word: נָס
  english_pob_choice: has fled
  chosen_spanish: ha huido
  alternatives_spanish:
  - huyó
  - ha escapado
  lexicon: HALOT
  rationale: El verbo expresa huida o retirada ante un enemigo. «Ha huido» refleja el aspecto de reporte inmediato y mantiene la fuerza del hecho consumado.
- source_word: לִפְנֵי פְלִשְׁתִּים
  english_pob_choice: before the Philistines
  chosen_spanish: delante de los filisteos
  alternatives_spanish:
  - ante los filisteos
  - frente a los filisteos
  lexicon: HALOT
  rationale: La preposición idiomática señala retirada en presencia del enemigo. «Delante de» conserva la imagen hebrea de huir en su presencia y suena natural en español bíblico actual.
- source_word: מַגֵּפָה גְדוֹלָה
  english_pob_choice: a great slaughter
  chosen_spanish: una gran mortandad
  alternatives_spanish:
  - una gran matanza
  - una gran derrota
  - una gran plaga
  lexicon: HALOT
  rationale: En contexto bélico, el término puede abarcar golpe severo, plaga o mortandad. «Mortandad» mantiene la amplitud semántica y permite la nota de alternativa sin forzar la imagen solo a «matanza».
- source_word: בָעָם
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - entre la gente
  - entre las tropas
  lexicon: HALOT
  rationale: El hebreo dice «el pueblo». «Entre el pueblo» conserva esa formulación y es comprensible en el contexto de la batalla.
- source_word: שְׁנֵי בָנֶיךָ
  english_pob_choice: your two sons
  chosen_spanish: tus dos hijos
  alternatives_spanish:
  - ambos hijos tuyos
  - los dos hijos tuyos
  lexicon: HALOT
  rationale: Es una rendición directa y natural del sintagma, preservando el énfasis en los dos hijos específicos.
- source_word: מֵתוּ
  english_pob_choice: are dead
  chosen_spanish: están muertos
  alternatives_spanish:
  - murieron
  - han muerto
  lexicon: HALOT
  rationale: El hebreo reporta el estado resultante de la muerte en estilo de noticia. «Están muertos» corresponde bien al ajuste de la POB inglesa y suena natural en español.
- source_word: חָפְנִי וּפִינְחָס
  english_pob_choice: Hophni and Phinehas
  chosen_spanish: Ofni y Finees
  alternatives_spanish:
  - Hofní y Finees
  - Hofni y Finees
  lexicon: Nombres propios bíblicos
  rationale: Se usan formas tradicionales y reconocibles en español bíblico para los nombres propios, manteniendo la identificabilidad sin transliteración innecesaria.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del Dios verdadero
  lexicon: HALOT
  rationale: La expresión hebrea se traduce de forma directa y transparente. «Arca de Dios» conserva el genitivo sin expandirlo más allá del texto.
- source_word: נִלְקָחָה
  english_pob_choice: has been taken
  chosen_spanish: ha sido tomada
  alternatives_spanish:
  - fue tomada
  - ha sido capturada
  lexicon: HALOT
  rationale: La voz pasiva hebrea indica que el arca fue tomada/capturada. «Ha sido tomada» mantiene la pasividad y sigue la decisión inglesa sin añadir interpretaciones.
theological_decisions:
- issue: Severidad del término מַגֵּפָה en contexto militar
  english_pob_reading: a great slaughter
  chosen_spanish_reading: una gran mortandad
  alternative_spanish_readings:
  - una gran matanza
  - una gran derrota
  - una gran plaga
  rationale: La POB inglesa documenta la tensión semántica entre golpe, plaga, derrota y matanza. En español, «mortandad» permite conservar esa amplitud y sigue siendo compatible con el contexto bélico sin cerrar prematuramente el sentido.
  doctrine_reference: 1 Samuel 4:17; léxico de מַגֵּפָה en contexto de juicio/batalla
- issue: Estado resultante de los hijos frente a la simple narración del hecho
  english_pob_reading: your two sons also are dead
  chosen_spanish_reading: tus dos hijos también están muertos
  alternative_spanish_readings:
  - tus dos hijos también murieron
  - tus dos hijos también han muerto
  rationale: La revisión inglesa prefirió «are dead» por naturalidad formal en el reporte. El español «están muertos» conserva ese valor resultativo y evita una traducción demasiado mecánica del perfecto verbal.
  doctrine_reference: Narrativa hebrea; perfectivo/resultativo en relato
- issue: Traducción del arca de Dios y su captura
  english_pob_reading: the ark of God has been taken
  chosen_spanish_reading: el arca de Dios ha sido tomada
  alternative_spanish_readings:
  - el arca de Dios fue tomada
  - el arca de Dios ha sido capturada
  rationale: «Tomada» conserva la pasiva del hebreo y la decisión inglesa de no expandir a una glosa interpretativa. La alternativa «capturada» es válida, pero más explicativa que el texto base.
  doctrine_reference: 1 Samuel 4:17; אֲרוֹן הָאֱלֹהִים / נִלְקָחָה
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «have died» por «are dead» para un reporte más natural; esta edición española sigue ese ajuste con «están muertos». También conserva la nota de alternativa para מַגֵּפָה y la pasiva para נִלְקָחָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el tetragrámaton; aquí el texto dice «Dios», por lo que no se sustituye.
  - 'Se usan nombres propios bíblicos asentados en español: Ofni y Finees.'
  - Se evita «SEÑOR» o «arca del Señor» porque el hebreo dice explícitamente «de Dios».
  - La puntuación y comillas siguen el uso tipográfico español estándar.
