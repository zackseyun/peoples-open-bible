  footnotes:
  - marker: a
    text: The first-person plural 'he told us' reflects the revelatory frame of Jubilees, in which the angelic mediator recounts divine actions. The verse likely refers to the binding of the offending angels in the subterranean depths.
    reason: cross_reference
    anchor_ref: '5:6'
  - marker: b
    text: The clause is textually and semantically difficult. The translation preserves the sense of a renewed, righteous ordering of creation according to kind rather than smoothing it into a generic statement.
    reason: textual_variant
    anchor_ref: '5:12'
  - marker: h
    text: The sequence 'in heaven ... on earth ... in light ... in darkness ... in Sheol ... in the deep ... in the place of gloom' reflects a comprehensive cosmological register. The final triad 'ordained and written and engraved' is retained to preserve the legal-record imagery.
    reason: cultural_note
    anchor_ref: '5:14'
  - marker: g
    text: The phrase 'once each year' may reflect Jubilees' calendrical theology of recurring atonement or mercy. The wording is kept explicit rather than generalized.
    reason: cross_reference
    anchor_ref: '5:18'
  - marker: f
    text: The wording 'before the Flood' is interpretive for a difficult phrase involving 'the waters of the Flood.' The sense is that no one else received favorable regard in that generation except Noah.
    reason: lexical_alternative
    anchor_ref: '5:19'
  - marker: e
    text: The date line is difficult in this verse. 'On the new moon of the second month, until the sixteenth ... on the seventeenth evening' likely marks entry into the ark and the Lord's shutting it immediately before the onset of the Flood.
    reason: segmentation_note
    anchor_ref: '5:23'
  - marker: d
    text: The phrase 'seven mouths in number' is preserved from the Ge'ez, emphasizing the structured cosmology of the deep rather than reducing it to a generic flood description.
    reason: cultural_note
    anchor_ref: '5:24'
  - marker: c
    text: 'The wording may seem paradoxical: after the fountains of the deep are ''closed,'' the mouths of the earth''s depths are ''opened'' so that the waters descend into the lower deep. The translation preserves this cosmological sequence rather than harmonizing it away.'
    reason: textual_variant
    anchor_ref: '5:29'
lexical_decisions:
- source_word: ረዐይት
  chosen: giants
  alternatives:
  - watchers
  - mighty ones
  rationale: In context this refers to the offspring of the angels and women, not the angels themselves. 'Giants' best matches the narrative role in Jubilees and distinguishes them from the angelic fathers.
- source_word: ዐመፃ
  chosen: lawlessness
  alternatives:
  - violence
  - wickedness
  rationale: The term in this chapter denotes pervasive moral disorder and rebellion, broader than physical violence alone. 'Lawlessness' preserves that covenantal-ethical force.
- source_word: ሥርዐቶሙ
  chosen: ordinances
  alternatives:
  - order
  - customs
  - appointed order
  rationale: The word suggests an established ordering or rule proper to creatures. 'Ordinances' keeps the sense of fixed order without flattening it into mere habit.
- source_word: መዓምቅቲሃ ለምድር
  chosen: the depths of the earth
  alternatives:
  - the abyss of the earth
  - the deep places of the earth
  rationale: This preserves the cosmological depth-language important in apocalyptic literature while remaining idiomatic English.
- source_word: መንፈስየ ዲበ ሰብእ
  chosen: My spirit shall not abide upon man forever
  alternatives:
  - remain in man
  - contend with man
  rationale: The Ge'ez here points to enduring presence or remaining, not specifically 'strive.' 'Abide upon' preserves the wording's force and avoids harmonizing to Genesis tradition.
- source_word: ጽላተ ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  rationale: This is a key Jubilees term for the heavenly record of decrees. 'Heavenly tablets' is established, clear, and theologically important.
- source_word: ይነሥእ ገጸ
  chosen: shows partiality
  alternatives:
  - lifts up the face
  - accepts a person
  rationale: The idiom literally involves 'lifting the face' but means favoritism in judgment. The idiomatic English rendering communicates the judicial sense.
- source_word: ኢዮቤልው
  chosen: jubilee
  alternatives:
  - jubilee cycle
  rationale: Jubilees' chronological framework must be preserved explicitly; 'jubilee' is the technical term.
- source_word: ሱባዔ
  chosen: week
  alternatives:
  - week of years
  rationale: Within Jubilees chronology this means a heptad of years. In the running text 'week' preserves the technical system; the calendrical sense is noted by context.
- source_word: በሠርቅ ለወርኅ
  chosen: on the new moon of the month
  alternatives:
  - on the first day of the month
  rationale: The phrase literally refers to the rising/beginning of the month. 'New moon' preserves the calendrical texture better than a flattened date formula.
- source_word: ሉባር
  chosen: Lubar
  alternatives:
  - Lubar mountain
  rationale: A proper name distinct from simply 'Ararat'; Jubilees specifies a summit named Lubar among Ararat's mountains, so the name is transliterated.
theological_decisions:
- issue: Identity of the offspring in verse 1
  chosen_reading: The offspring of the angels and women are rendered 'giants.'
  alternative_readings:
  - watchers
  - Nephilim
  - mighty men
  rationale: The Ge'ez term here refers to the children born from the unions, while the angelic beings are already identified separately as angels. 'Giants' best preserves the distinction and the traditional interpretation without importing Hebrew terminology not present in the line.
- issue: Meaning of God's spirit statement in verse 8
  chosen_reading: Rendered as 'My spirit shall not abide upon man forever.'
  alternative_readings:
  - shall not remain in man forever
  - shall not contend with man forever
  rationale: The Ge'ez wording supports abiding/remaining more naturally than striving. This avoids harmonizing Jubilees to a familiar Genesis rendering where the wording differs.
- issue: Verse 12 and the post-flood renewal of creation
  chosen_reading: Rendered as God making 'a new and righteous nature' for all his works.
  alternative_readings:
  - a new creation
  - a righteous order
  - a renewed ordinance
  rationale: The verse appears to describe a reordering of creation toward righteousness according to kind, not merely a moral exhortation. The wording is kept somewhat dense to preserve Jubilees' theological-cosmological claim.
- issue: Verse 18 annual mercy formula
  chosen_reading: Rendered as mercy shown 'once each year.'
  alternative_readings:
  - year by year
  - for each and every year
  rationale: The Ge'ez points to a recurring annual provision of mercy for those who turn back. This likely anticipates a liturgical or calendrical theology and should remain explicit.
