translation:
  language: es
  text: Entonces David se levantó del suelo, se lavó, se ungió y se cambió de ropa. Entró en la casa de Yahvé y se inclinó[a]. Luego fue a su casa, pidió, y le pusieron pan delante, y comió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adoró»; el verbo hebreo puede designar tanto una inclinación física de reverencia como adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El verbo de acción narrativa קום pide en español una expresión natural para incorporarse desde el estado de postración; «se levantó» comunica bien el movimiento físico sin carga estilística excesiva.
- source_word: מֵהָאָרֶץ
  english_pob_choice: from the ground
  chosen_spanish: del suelo
  alternatives_spanish:
  - de la tierra
  - del piso
  lexicon: HALOT
  rationale: En el contexto David ha estado postrado en duelo; «suelo» conserva la imagen concreta mejor que «tierra», que puede sonar más general, y que «piso», que moderniza demasiado el escenario.
- source_word: וַיִּרְחַץ
  english_pob_choice: washed
  chosen_spanish: se lavó
  alternatives_spanish:
  - se bañó
  lexicon: HALOT
  rationale: רחץ puede ser lavar o bañarse; aquí la secuencia con el ungimiento y el cambio de ropa favorece una forma breve y natural como «se lavó».
- source_word: וַיָּסֶךְ
  english_pob_choice: anointed himself
  chosen_spanish: se ungió
  alternatives_spanish:
  - se untó con aceite
  - se aplicó aceite
  lexicon: HALOT
  rationale: El contexto de fin de luto indica aplicación de aceite al cuerpo. «Se ungió» preserva la fuerza léxica de סוך y mantiene un registro digno.
- source_word: וַיְחַלֵּף שִׂמְלֹתוֹ
  english_pob_choice: changed his clothes
  chosen_spanish: cambió sus vestidos
  alternatives_spanish:
  - cambió su ropa
  - cambió sus prendas
  lexicon: HALOT
  rationale: La forma hebrea es singular con sufijo, pero en español «vestidos» mantiene mejor el paralelismo con el cambio de atuendo y evita una paráfrasis demasiado genérica.
- source_word: בֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la política editorial de la obra para יְהוָה como «Yahvé». «Casa» conserva la expresión hebrea בית y evita introducir «templo», que sería más interpretativo.
- source_word: וַיִּשְׁתָּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - adoró
  lexicon: HALOT
  rationale: El verbo puede denotar reverencia física o culto. «Se inclinó» conserva la acción corporal sin fijar de antemano la interpretación litúrgica; el contexto permite reverencia ante Yahvé.
- source_word: וַיִּשְׁאַל
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - pidió
  - inquirió
  lexicon: HALOT
  rationale: El hebreo dice simplemente que preguntó; no se explicita el objeto. «Preguntó» respeta esa sobriedad y evita suplir «comida» o «pan» antes de tiempo.
- source_word: וַיָּשִׂימוּ ל֛וֹ לֶ֖חֶם
  english_pob_choice: they set bread before him
  chosen_spanish: le pusieron pan delante
  alternatives_spanish:
  - le sirvieron pan
  - le presentaron pan
  lexicon: HALOT
  rationale: «Pusieron… delante» reproduce bien la colocación física implícita en el hebreo y conserva «pan» para לֶחֶם, que en esta frase funciona literalmente y también como metonimia alimentaria.
- source_word: וַיֹּאכַל
  english_pob_choice: he ate
  chosen_spanish: y comió
  alternatives_spanish:
  - y lo comió
  - y comió de él
  lexicon: HALOT
  rationale: Cierre narrativo simple; «y comió» es el equivalente más directo y sobrio.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se sigue la norma del proyecto para transliterar el Tetragrámaton como «Yahvé» en el texto principal, en vez de sustituirlo por «SEÑOR». Esto preserva el nombre propio del pacto y evita ocultar la referencia explícita del hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of וַיִּשְׁתָּחוּ in relation to reverence or worship
  english_pob_reading: bowed down / worshiped
  chosen_spanish_reading: se inclinó
  alternative_spanish_readings:
  - se postró
  - adoró
  rationale: El hebreo admite tanto la postración física como el acto de adoración. «Se inclinó» conserva la ambigüedad documentada, dejando que el contexto de entrar en la casa de Yahvé aporte la carga reverente sin imponer una traducción exclusivamente cultual.
  doctrine_reference: Lexical/theological note from English POB footnote on verbal ambiguity
translation_notes:
  revision_awareness: 'La redacción sigue el último pasaje revisado del audit trail inglés: se omite cualquier expansión como «por comida», porque el hebreo dice simplemente «preguntó». Se conserva «pan» para לֶחֶם y se mantiene la secuencia narrativa sin añadir información no explicitada en el texto fuente.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - «Pan» se mantiene literal para לֶחֶם, sin convertirlo en «comida», porque el contexto ya hace clara su función alimentaria.
  - «Se inclinó» preserva la tensión entre reverencia física y adoración, sin forzar una sola lectura.
