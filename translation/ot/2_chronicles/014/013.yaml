id: 2CH.14.13
reference: 2 Chronicles 14:13
source:
  edition: WLC
  text: וַ/יַּכּ֗וּ אֵ֤ת כָּל הֶֽ/עָרִים֙ סְבִיב֣וֹת גְּרָ֔ר כִּי הָיָ֥ה פַֽחַד יְהוָ֖ה עֲלֵי/הֶ֑ם וַ/יָּבֹ֨זּוּ֙ אֶת כָּל הֶ֣/עָרִ֔ים כִּֽי בִזָּ֥ה רַבָּ֖ה הָיְתָ֥ה בָ/הֶֽם־־־־־־׃
translation:
  text: And they struck down all the cities around Gerar, for the terror of Yahweh was upon them. And they plundered all the cities, for there was much spoil in them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: they struck down
  alternatives:
  - they attacked
  - they smote
  lexicon: HALOT
  rationale: From נכה in a military context, indicating forceful defeat of the cities' inhabitants/defenders rather than merely 'hit.' 'Struck down' is natural modern English and preserves the violent military sense.
- source_word: כָּל הֶעָרִים סְבִיבוֹת גְּרָר
  chosen: all the cities around Gerar
  alternatives:
  - all the towns around Gerar
  - all the cities surrounding Gerar
  lexicon: HALOT
  rationale: עָרִים is best rendered 'cities' here in a campaign narrative; 'around Gerar' captures סְבִיבוֹת idiomatically without over-literal awkwardness.
- source_word: פַּחַד יְהוָה
  chosen: the terror of the LORD
  alternatives:
  - the fear of the LORD
  - the dread of the LORD
  lexicon: HALOT
  rationale: This phrase refers to terror sent by or associated with the LORD falling on surrounding peoples, not their reverent fear toward him. 'Terror' best conveys the imposed panic in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲלֵיהֶם
  chosen: was upon them
  alternatives:
  - fell on them
  - was over them
  lexicon: HALOT
  rationale: The prepositional phrase with היה is idiomatically rendered 'was upon them,' preserving the sense of an overwhelming condition resting on the inhabitants of those cities.
- source_word: וַיָּבֹזּוּ
  chosen: they plundered
  alternatives:
  - they despoiled
  - they took spoil from
  lexicon: HALOT
  rationale: בזז in warfare means taking goods as spoil. 'Plundered' is concise, idiomatic, and preserves the military-looting sense.
- source_word: בִּזָּה רַבָּה
  chosen: much plunder
  alternatives:
  - great spoil
  - abundant booty
  lexicon: HALOT
  rationale: The noun ביזה denotes spoil/plunder taken in war. 'Much plunder' is readable modern English; 'booty' is avoided as potentially distracting in contemporary usage.
- source_word: בָהֶם
  chosen: in them
  alternatives:
  - there
  - within them
  lexicon: HALOT
  rationale: The pronoun most naturally refers back to the cities. 'In them' keeps the referent explicit enough in English when paired with 'the cities.'
