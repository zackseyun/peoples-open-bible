    rationale: La nota inglesa a conserva la alternativa de sujeto «the child» frente a «the boy». En español, la diferencia es menor, pero si se mantienen notas, conviene preservarlas de manera equivalente o eliminar notas innecesarias en vez de sustituirlas por una explicación distinta.
  - severity: low
