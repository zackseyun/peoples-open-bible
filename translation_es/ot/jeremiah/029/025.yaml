translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos, el Dios de Israel: Porque has enviado cartas en tu propio nombre[a] a todo el pueblo que está en Jerusalén, y a Sofonías hijo de Maasías, el sacerdote, y a todos los sacerdotes, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu nombre». La frase puede subrayar que Semaías actuó por su propia autoridad y no por la autoridad de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto es lo que dice
  lexicon: HALOT
  rationale: La fórmula profética requiere un giro solemne pero natural en español; «Así dice» conserva el tono mensajero sin volverse arcaizante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino del Tetragrámaton se vierte como «Yahvé» según el criterio de la POB en español, manteniendo el nombre propio del pacto y evitando la sustitución por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, «ejércitos» comunica con claridad el alcance de צְבָאוֹת. Se evita una calca menos transparente como «de los huestes».
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción posesiva directa y transparente; «Dios de Israel» conserva la identificación del Dios del pacto con Israel.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la razón causal de la reprensión; «Porque» es natural en español y reproduce la fuerza causal.
- source_word: שָׁלַחְתָּ
  english_pob_choice: you have sent
  chosen_spanish: has enviado
  alternatives_spanish:
  - enviaste
  lexicon: HALOT
  rationale: El perfecto hebreo señala una acción ya cumplida con relevancia presente; el perfecto compuesto español lo expresa bien.
- source_word: בְשִׁמְךָ
  english_pob_choice: in your own name
  chosen_spanish: en tu propio nombre
  alternatives_spanish:
  - en tu nombre
  lexicon: HALOT
  rationale: Se conserva la idea de autoautoridad destacada por el audit trail inglés. «Tu propio nombre» hace explícito el contraste con hablar en nombre de Yahvé.
- source_word: סְפָרִים
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas escritas
  - misivas
  lexicon: HALOT
  rationale: En este contexto epistolar, «cartas» es el equivalente idiomático más preciso y natural.
- source_word: כָּל הָעָם אֲשֶׁר בִּירוּשָׁלִַם
  english_pob_choice: all the people who are in Jerusalem
  chosen_spanish: todo el pueblo que está en Jerusalén
  alternatives_spanish:
  - todo el pueblo en Jerusalén
  - todo el pueblo que vive en Jerusalén
  lexicon: HALOT
  rationale: «Pueblo» refleja היטב עָם; la relativa «que está en Jerusalén» conserva la localización sin añadir inferencias.
- source_word: צְפַנְיָה בֶן מַעֲשֵׂיָה הַכֹּהֵן
  english_pob_choice: Zephaniah son of Maaseiah the priest
  chosen_spanish: Sofonías hijo de Maasías, el sacerdote
  alternatives_spanish:
  - Sofonías, hijo de Maasías, el sacerdote
  - Sofonías hijo de Maasías el sacerdote
  lexicon: HALOT
  rationale: Se transcriben los nombres propios a sus formas castellanas habituales. La aposición «el sacerdote» queda cercana al hebreo y distingue el oficio de Sofonías.
- source_word: כָּל הַכֹּהֲנִים
  english_pob_choice: all the priests
  chosen_spanish: todos los sacerdotes
  alternatives_spanish:
  - todos los sacerdotes
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente español natural de הַכֹּהֲנִים en este contexto cultual.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'para decir:'
  - 'y dijo:'
  lexicon: HALOT
  rationale: Introduce el contenido citado de las cartas; «diciendo:» prepara la continuación manteniendo la función de marcador de discurso.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política terminológica del proyecto en español pide «Yahvé» para יְהוָה. Esto preserva el nombre propio revelado y evita el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene la fórmula profética, el nombre divino transliterado, el matiz causal de יַעַן אֲשֶׁר, y la posible tensión de בְשִׁמְךָ como «en tu propio nombre». No se detectaron revisiones textuales relevantes en el registro inglés; el estado más reciente indica alta concordancia y sin cambios necesarios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - 'Se prefieren nombres propios castellanos habituales: Sofonías, Maasías.'
  - «Sacerdote/sacerdotes» se conserva para הַכֹּהֵן / הַכֹּהֲנִים.
  - La nota a pie de página queda anclada en «tu propio nombre» para preservar la alternativa de lectura documentada.
