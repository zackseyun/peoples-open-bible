translation:
  language: es
  text: y su compañía[a], y los contados de entre ellos, fueron treinta y cinco mil cuatrocientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “su hoste” o “su ejército”; el hebreo refleja la organización militar de las tribus en el censo del desierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  english_pob_choice: and his company
  chosen_spanish: y su [a]
  alternatives_spanish:
  - y su host
  - y su ejército
  - y su compañía
  lexicon: HALOT
  rationale: צָבָא puede significar un contingente organizado, host o ejército. En este contexto de censos y campamento, el sentido militar-organizativo debe conservarse, pero en español 'compañía' suena más natural solo si se explicita; aquí se deja la alusión abierta con nota para no fijar indebidamente un equivalente demasiado técnico.
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: even those numbered from them
  chosen_spanish: y los contados de ellos
  alternatives_spanish:
  - y los que fueron contados de entre ellos
  - y los musterados de entre ellos
  - y los inscritos de entre ellos
  lexicon: HALOT
  rationale: El campo semántico de פקד en este uso censal apunta a los que han sido contados o registrados. 'Los contados de ellos' reproduce con sobriedad el valor participial/censal y evita introducir un término eclesiástico o administrativo no atestado por el texto.
- source_word: חֲמִשָּׁה וּשְׁלֹשִׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  english_pob_choice: thirty-five thousand four hundred
  chosen_spanish: treinta y cinco mil cuatrocientos
  alternatives_spanish:
  - cinco y treinta mil y cuatrocientos
  lexicon: HALOT
  rationale: El número total se expresa en español moderno en el orden idiomático natural, conservando exactamente la cifra hebrea.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto hebreo y con la solución auditada en inglés; no hay revisiones aplicadas en el historial reciente y la cifra total permanece sin variantes.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y numérico propio de una lista censal.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque el versículo no contiene el Nombre divino.
  - La nota de 'host/ejército' preserva la tensión léxica de צָבָא sin cerrar el sentido en una sola opción.
