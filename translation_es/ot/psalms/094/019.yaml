translation:
  language: es
  text: Cuando mis pensamientos angustiosos son muchos dentro de mí[a], tus consolaciones[b] deleitan mi alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Cuando la multitud de mis pensamientos perturbadores estaba dentro de mí”. El sustantivo hebreo puede sugerir pensamientos turbados, divididos o que se ramifican.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “tus consuelos alegran mi alma”. El hebreo usa un sustantivo plural: “consolaciones”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֹב
  english_pob_choice: When ... are many
  chosen_spanish: Cuando ... son muchos
  alternatives_spanish:
  - En la multitud de
  - Con la abundancia de
  lexicon: HALOT
  rationale: La preposición ב con רֹב expresa abundancia o multiplicidad en una circunstancia. En español, “Cuando ... son muchos” conserva la fuerza circunstancial del hebreo sin una construcción rígida como “en la multitud de”.
- source_word: שַׂרְעַפַּי
  english_pob_choice: my anxious thoughts
  chosen_spanish: mis pensamientos angustiosos
  alternatives_spanish:
  - mis pensamientos inquietos
  - mis pensamientos divididos
  - mis cavilaciones
  lexicon: HALOT
  rationale: El sustantivo puede sugerir pensamientos que inquietan, dividen o perturban. “Angustiosos” mantiene el valor afectivo de agitación interior y suena natural en español bíblico contemporáneo.
- source_word: בְּקִרְבִּי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mi interior
  - en mis entrañas
  - en mí
  lexicon: HALOT
  rationale: La frase apunta a interioridad. “Dentro de mí” es directo, idiomático y fiel al matiz espacial/interno del hebreo.
- source_word: תנחומיך
  english_pob_choice: your consolations
  chosen_spanish: tus consolaciones
  alternatives_spanish:
  - tus consuelos
  - tu consuelo
  lexicon: HALOT
  rationale: El plural hebreo se conserva con “consolaciones”, manteniendo la pluralidad de actos o palabras de consuelo señalada por la POB inglesa.
- source_word: ישעשעו
  english_pob_choice: delight
  chosen_spanish: deleitan
  alternatives_spanish:
  - alegran
  - consuelan
  - refrescan
  lexicon: HALOT
  rationale: El verbo expresa un gozo deleitoso, no solo alivio. “Deleitan” reproduce bien la intensidad positiva y admite al sujeto plural “tus consolaciones”.
- source_word: נפשי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - mi interior
  lexicon: HALOT
  rationale: En este contexto poético-devocional, נֶפֶשׁ se refiere al yo interior. “Alma” conserva el registro religioso y la profundidad del término en español.
translation_notes:
  revision_awareness: Se siguió el tramo revisado de alta concordancia del audit trail inglés. No hay revisiones aplicadas; se mantuvo la decisión de leer el verso como una contraposición entre la agitación interior y el efecto consolador de Dios.
  spanish_consistency_notes:
  - Se preservó el plural de תנחומיך con “consolaciones”, en continuidad con la decisión inglesa.
  - Se evitó “SEÑOR” porque el verso no contiene el tetragrámaton ni una cita explícita de YHWH; el posesivo “tus” conserva la referencia divina implícita por contexto.
  - Se optó por “alma” para נַפְשִׁי siguiendo el registro devocional del salmo y la práctica POB de mantener la profundidad antropológica del término.
