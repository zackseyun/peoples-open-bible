translation:
  language: es
  text: ¡Cómo el Señor ha nublado[a], en su ira, a la hija de Sión! Ha arrojado desde los cielos a la tierra la hermosura de Israel[c], y no se acordó de su escabel[b] en el día de su ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha oscurecido» o «ha cubierto con una nube». El verbo hebreo evoca la imagen de nublar u oscurecer.
    reason: lexical_alternative
  - marker: b
    text: «Su escabel» puede referirse a Sión, al templo o al arca como lugar asociado con la presencia terrenal de Dios.
    reason: alternative_reading
  - marker: c
    text: O «la gloria de Israel» o «el esplendor de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Ah, cómo!
  - ¡Cómo es que!
  lexicon: HALOT
  rationale: La exclamación lamentosa en español se expresa naturalmente con «Cómo», manteniendo el tono poético y no interrogativo del hebreo sin convertirlo en una pregunta informativa.
- source_word: יָעִיב
  english_pob_choice: has clouded over
  chosen_spanish: ha nublado
  alternatives_spanish:
  - ha oscurecido
  - ha cubierto con una nube
  lexicon: HALOT
  rationale: El verbo hebreo evoca la imagen de cubrir u oscurecer con nube. «Ha nublado» conserva la metáfora en español y suena natural en un registro bíblico moderno.
- source_word: בְּאַפּוֹ
  english_pob_choice: in his anger
  chosen_spanish: en su ira
  alternatives_spanish:
  - en su enojo
  - en su furor
  lexicon: HALOT
  rationale: אַף literalmente se relaciona con nariz/ira, pero el sentido idiomático es «ira». «Ira» mantiene la fuerza poética y la conexión con el motivo repetido del versículo.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - Adonay
  lexicon: HALOT
  rationale: Como título divino, en español idiomático y reverente corresponde «el Señor». No se translitera porque aquí el audit trail inglés ya lo resuelve como título, no como nombre propio distinto.
- source_word: בַּת צִיּוֹן
  english_pob_choice: daughter Zion
  chosen_spanish: la hija de Sion
  alternatives_spanish:
  - Hija de Sion
  - la hija de Jerusalén
  lexicon: HALOT
  rationale: Se conserva la personificación compacta del hebreo. «Hija de Sion» es la forma más cercana y transparente para el lector español, sin expandirla innecesariamente.
- source_word: הִשְׁלִיךְ
  english_pob_choice: has cast
  chosen_spanish: ha arrojado
  alternatives_spanish:
  - ha echado
  - ha lanzado
  lexicon: HALOT
  rationale: El verbo transmite una acción fuerte de echar/arrojar. «Ha arrojado» refleja mejor la violencia del gesto que una opción más suave.
- source_word: מִשָּׁמַיִם אֶרֶץ
  english_pob_choice: from heaven to earth
  chosen_spanish: desde los cielos a la tierra
  alternatives_spanish:
  - del cielo a la tierra
  - desde el cielo hasta la tierra
  lexicon: HALOT
  rationale: Se conserva el contraste de descenso extremo. «Los cielos» reproduce el plural hebreo de manera literal y poética, sin perder inteligibilidad.
- source_word: תִּפְאֶרֶת יִשְׂרָאֵל
  english_pob_choice: the beauty of Israel
  chosen_spanish: la hermosura de Israel
  alternatives_spanish:
  - la gloria de Israel
  - el esplendor de Israel
  lexicon: HALOT
  rationale: תפארת admite «hermosura, gloria, esplendor». «Hermosura» sigue la opción concreta-poética del inglés POB («beauty») y mantiene abierta la referencia exacta sin resolverla interpretativamente.
- source_word: וְלֹא זָכַר
  english_pob_choice: and he did not remember
  chosen_spanish: y no se acordó de
  alternatives_spanish:
  - y no recordó
  - y no tuvo en cuenta
  lexicon: HALOT
  rationale: «Acordarse de» comunica bien el hebreo זכר en español y conserva la resonancia relacional/covenantal. Se prefiere una forma natural sobre un calco rígido.
- source_word: הֲדֹם רַגְלָיו
  english_pob_choice: his footstool
  chosen_spanish: su estrado
  alternatives_spanish:
  - su escabel
  - su pie de apoyo
  lexicon: HALOT
  rationale: «Estrado» mantiene la imagen de algo bajo los pies del soberano y es suficientemente reverente; «footstool» puede sonar demasiado doméstico en español. Se preserva la ambigüedad referencial documentada por el POB inglés.
- source_word: בְּיוֹם אַפּוֹ
  english_pob_choice: in the day of his anger
  chosen_spanish: en el día de su ira
  alternatives_spanish:
  - en el día de su furor
  - el día de su ira
  lexicon: HALOT
  rationale: Se reproduce la estructura temporal y el motivo de ira repetido al inicio. «En el día de su ira» es una equivalencia directa y solemne.
theological_decisions:
- issue: Referente de «su estrado» (הֲדֹם רַגְלָיו)
  english_pob_reading: Kept as 'his footstool' without specifying the referent in the main text
  chosen_spanish_reading: Se mantiene «su estrado» sin precisar si alude a Sion, al templo o al arca
  alternative_spanish_readings:
  - su templo
  - Sion como estrado de sus pies
  - el arca como estrado
  rationale: El hebreo es metafórico y no obliga a una sola identificación. Como en el inglés POB, la traducción preserva la tensión interpretativa en vez de resolverla de forma dogmática.
  doctrine_reference: Preservar la tensión textual y no imponer una identificación no explicitada por el versículo.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético de Lamentaciones 2:1 junto con el auditable inglés POB. La versión inglesa ya había optado por una imagen de nublar/oscurecer, por mantener la personificación «daughter Zion», por «beauty of Israel» con nota de alternativas, y por conservar «his footstool» sin resolver el referente. La propuesta española refleja esas decisiones, ajustándolas a un registro natural en español y manteniendo las tensiones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada del nombre divino en el proyecto, pero aquí el audit trail inglés traduce אֲדֹנָי como «the Lord»; por eso en este versículo se emplea el título reverente «el Señor» para mantener coherencia con la evidencia contextual del POB inglés.
  - Se conserva la personificación «la hija de Sion»/«Hija de Sion» sin explicitarla como ciudad o pueblo en el cuerpo del versículo.
  - «Hermosura» reproduce el campo semántico de תפארת y deja abiertas las alternativas «gloria» y «esplendor» en nota.
  - «Estrado» se eligió para evitar una reducción interpretativa; la nota conserva las alternativas documentadas por el POB inglés.
