translation:
  language: es
  text: Yahvé tu Dios expulsará[a] de delante de ti a estas naciones poco a poco; no podrás destruirlas rápidamente, no sea que los animales salvajes[b] se multipliquen demasiado para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desposeerá a estas naciones de delante de ti, poco a poco».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «las bestias del campo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשַׁל / יְהוָה
  english_pob_choice: will drive out / Yahweh
  chosen_spanish: expulsará / Yahvé
  alternatives_spanish:
  - echará / Yahvé
  - desposeerá / Yahvé
  lexicon: HALOT
  rationale: El verbo נשל en este contexto expresa quitar de la tierra a los pueblos; en español, «expulsará» comunica bien la remoción territorial sin perder naturalidad. Se mantiene «Yahvé» para el Tetragrámaton, según el estándar del POB en español.
- source_word: הַגּוֹיִם הָאֵל
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estos pueblos
  - aquellas naciones
  lexicon: HALOT
  rationale: גוֹיִם suele referirse a entidades político-étnicas; «naciones» conserva ese valor. El demostrativo «estas» sigue la fuerza inmediata del hebreo.
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La locución hebrea indica remoción desde la posición frontal o de presencia. «De delante de ti» es una equivalencia fiel y natural en español bíblico contemporáneo.
- source_word: מְעַט מְעָט
  english_pob_choice: little by little
  chosen_spanish: poco a poco
  alternatives_spanish:
  - gradualmente
  - paso a paso
  lexicon: HALOT
  rationale: La repetición intensifica la idea de gradualidad. «Poco a poco» reproduce ese efecto de manera clara y idiomática en español.
- source_word: לֹא תוּכַל כַּלֹּתָם מַהֵר
  english_pob_choice: You will not be able to destroy them quickly
  chosen_spanish: no podrás destruirlas rápidamente
  alternatives_spanish:
  - no podrás acabarlas pronto
  - no podrás exterminarlas rápidamente
  lexicon: HALOT
  rationale: כּלה expresa llevar a un fin completo; «destruirlas» comunica ese cierre total con una forma formal y directa. «Rápidamente» conserva מַהֵר. Se usa femenino plural por concordar con «las naciones» en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español, «para que no» transmite con claridad la advertencia de finalidad negativa que introduce פֶּן, evitando un giro arcaizante.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the wild animals
  chosen_spanish: la fauna del campo
  alternatives_spanish:
  - las fieras del campo
  - los animales del campo
  lexicon: HALOT
  rationale: La expresión literal es «la bestia/el animal del campo», con valor colectivo. «La fauna del campo» evita una imagen exclusivamente zoológica o demasiado cruda y mantiene el sentido colectivo de animales salvajes que podrían aumentar.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene יְהוָה de manera explícita. El POB en inglés usa «Yahweh»; en español, la forma equivalente y ya establecida en el proyecto es «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de la amenaza ecológica en פֶּן תִּרְבֶּה עָלֶיךָ חַיַּת הַשָּׂדֶה
  english_pob_reading: lest the wild animals become too numerous for you
  chosen_spanish_reading: para que no se multiplique contra ti la fauna del campo
  alternative_spanish_readings:
  - para que no aumenten demasiado los animales salvajes
  - no sea que la fauna del campo se multiplique para ti
  rationale: 'El hebreo expresa una advertencia: la permanencia de los pueblos puede provocar un aumento de animales salvajes. «Se multiplique contra ti» conserva la relación de amenaza; «fauna del campo» mantiene el valor colectivo de חַיַּת הַשָּׂדֶה sin forzar un tecnicismo o una imagen demasiado moderna.'
  doctrine_reference: Lectura semántica del contexto inmediato de Deuteronomio 7:22
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se prefirió un verbo más directo para כּלה («destruir») frente a una opción más idiomática pero menos formal, y se ajustó la relación del peligro para que refleje mejor el sentido hebreo. La versión española sigue esa preferencia por una formulación directa y sobria.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como equivalente estándar del Tetragrámaton en todo el texto.
  - Se preserva la gradualidad con «poco a poco» para מְעַט מְעָט.
  - «Destruirlas» respeta la fuerza total de כּלה y concuerda en género con «naciones».
  - «Fauna del campo» busca conservar el sentido colectivo de חַיַּת הַשָּׂדֶה sin introducir una traducción excesivamente coloquial.
