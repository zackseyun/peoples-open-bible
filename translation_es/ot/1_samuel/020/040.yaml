    rationale: Aunque el hebreo deja implícito el objeto de הָבֵיא, el POB inglés lo suple como 'them' y lo explica en nota. En español, 'lleva a la ciudad' suena truncado y menos fiel al sentido de trasladar las armas.
  - severity: low
    issue: La nota [b] sobre «Ve» no preserva una alternativa fuente relevante.
    rationale: Es una observación de estilo español más que una nota textual o léxica necesaria; añade ruido sin ayudar a la comprensión de la evidencia fuente.
