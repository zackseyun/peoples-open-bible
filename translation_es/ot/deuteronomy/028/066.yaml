    rationale: Aunque intenta reflejar 'hang in doubt', en español suena forzado. 'Pender' expresa mejor una vida suspendida precariamente y evita un gerundio innecesario.
  - severity: medium
    issue: La nota [b] está anclada en la frase equivocada
    rationale: El contenido de la nota [b] trata sobre לֹא תַאֲמִין בְּחַיֶּיךָ, no sobre 'noche y día'. Debe ir en la cláusula final para preservar la trazabilidad de las alternativas léxicas.
  - severity: low
    issue: La nota [a] podría formular la alternativa de modo más limpio en español
    rationale: La alternativa 'estará suspendida delante de ti' es correcta, pero la nota puede explicitar mejor que se trata de una imagen de vida precaria y constantemente amenazada.
