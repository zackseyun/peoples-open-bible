translation:
  language: es
  text: Porque no hay Dios fuera de ti[a], Señor. Renueva señales y cambia maravillas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La fuente griega aquí es un fragmento de oración y parece incompleta en este punto; el versículo continúa más allá de esta cláusula en su contexto.
