base_translation:
  language: en
  yaml_path: translation/ot/nahum/002/014.yaml
  text: Behold[a], I am against you, declares Yahweh of hosts, and I will burn your chariots in smoke; the sword will devour your young lions. I will cut off your prey from the earth[c][b], and the voice of your messengers will no longer be heard.
  footnotes:
  - marker: a
    text: Or 'into smoke'; the Hebrew phrase may emphasize either the manner of burning ('in smoke') or the result ('into smoke').
    reason: lexical_alternative
  - marker: b
    text: '''Young lions'' continues Nineveh''s lion imagery; it likely refers metaphorically to her warriors or rulers.'
    reason: cultural_note
  - marker: c
    text: Or 'envoys.' The Hebrew word can denote human messengers sent on official business.
    reason: lexical_alternative
