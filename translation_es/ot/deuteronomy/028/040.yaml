translation:
  language: es
  text: Tendrás olivos por todo tu territorio, pero no te ungirás con aceite, porque tus aceitunas[a] se caerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu cosecha de aceitunas se caerá» o «tu olivo soltará su fruto». El hebreo usa «tu olivo» de manera colectiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֵיתִים
  english_pob_choice: olive trees
  chosen_spanish: olivos
  alternatives_spanish:
  - árboles de olivo
  - olivares
  - aceitunas
  lexicon: HALOT
  rationale: El hebreo puede referirse a olivos o a su fruto según el contexto. Aquí, como el paralelo habla de la extensión por todo el territorio, el sentido natural es la presencia de árboles; en español, 'olivos' comunica eso de forma breve y fiel.
- source_word: יִהְיוּ לְךָ
  english_pob_choice: you will have
  chosen_spanish: tendrás
  alternatives_spanish:
  - habrá para ti
  - te pertenecerán
  lexicon: HALOT
  rationale: Es un giro posesivo/existencial. 'Tendrás' conserva el valor de posesión o presencia favorable con español natural.
- source_word: בְּכָל גְּבוּלֶךָ
  english_pob_choice: throughout all your territory
  chosen_spanish: por todo tu territorio
  alternatives_spanish:
  - en todo tu territorio
  - dentro de todos tus límites
  lexicon: HALOT
  rationale: גְּבוּל puede significar límite o territorio. En este contexto de juicio pactual, 'territorio' expresa mejor la amplitud total de la tierra, y 'por todo' refleja la dispersión por toda esa extensión.
- source_word: וְשֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - óleo
  - aceite de oliva
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'aceite'. En español bíblico moderno, 'aceite' es claro y natural; no hace falta especificar 'de oliva' porque el contexto ya está dominado por los olivos.
- source_word: לֹא תָסוּךְ
  english_pob_choice: you will not anoint yourself
  chosen_spanish: no te ungirás
  alternatives_spanish:
  - no te frotarás con aceite
  - no te untarás con aceite
  lexicon: HALOT
  rationale: סוך se refiere a aplicar aceite al cuerpo. 'Ungir' mantiene la acción sin forzar una lectura exclusivamente ceremonial; además, es suficientemente digno y reconocible en español bíblico.
- source_word: יִשַּׁל
  english_pob_choice: will fall off
  chosen_spanish: se caerán
  alternatives_spanish:
  - caerán
  - se desprenderán
  lexicon: HALOT
  rationale: El verbo describe el desprendimiento de las aceitunas antes de ser usadas. 'Se caerán' es una forma natural y directa que preserva la imagen.
- source_word: זֵיתֶךָ
  english_pob_choice: your olives
  chosen_spanish: tus aceitunas
  alternatives_spanish:
  - tu cosecha de aceitunas
  - tus olivos
  lexicon: HALOT
  rationale: Aquí el singular colectivo apunta al fruto/producción del olivo. 'Tus aceitunas' mantiene el enlace con el verbo de caída y hace visible la idea de cosecha perdida.
translation_notes:
  revision_awareness: La traducción española sigue la revisión final del POB inglés que prefirió 'will fall off' frente a 'drop off' por una formulación más natural y neutral; aquí se refleja con 'se caerán'. No se introducen cambios doctrinales ni ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene la equivalencia de pluralidad colectiva en el último miembro mediante una nota, porque el hebreo usa una forma singular colectiva y el español requiere decidir entre árbol, fruto o cosecha.
  - '''Olivos'' y ''aceitunas'' se distinguen para reflejar la diferencia entre la presencia de los árboles y la pérdida del fruto.'
  - Se evita 'SEÑOR' y 'Cristo' porque el versículo no contiene esos términos.
