base_translation:
  language: en
  yaml_path: translation/ot/zechariah/009/007.yaml
  text: I will remove his blood from his mouth and his detestable things from between his teeth[a]. Then he too will be a remnant for our God; he will be like a clan leader in Judah[c][b], and Ekron will be like the Jebusite.
  footnotes:
  - marker: a
    text: Or 'he too will remain for our God' or 'he too will be left for our God.' The Hebrew verb can be rendered more generally as 'remain,' though 'be a remnant' preserves the prophetic nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Detestable things'' likely refers to idolatrous or ritually unclean things, possibly food associated with pagan worship.'
    reason: cultural_note
  - marker: c
    text: '''Like the Jebusite'' likely suggests incorporation into Judah, as the Jebusites were absorbed into Jerusalem rather than remaining a separate hostile power.'
    reason: cross_reference
