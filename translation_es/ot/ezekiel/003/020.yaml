base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/003/020.yaml
  text: And when a righteous man turns from his righteousness and does injustice[a], and I place a stumbling block before him, he will die. Because you did not warn him, he will die in his sin, and his righteous deeds that he did will not be remembered[d][c][b]; and I will require his blood from your hand.
  footnotes:
  - marker: a
    text: Or 'commits iniquity' / 'does wrong.' The Hebrew term carries the sense of wrongdoing or injustice.
    reason: lexical_alternative
  - marker: b
    text: Or 'I set an obstacle before him.' The Hebrew literally says 'a stumbling block.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his acts of righteousness will not be remembered.'
    reason: lexical_alternative
  - marker: d
    text: That is, God will hold the watchman accountable for the man's bloodguilt.
    reason: cultural_note
