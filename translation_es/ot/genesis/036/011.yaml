review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura genealógica básica del hebreo: ''Y los hijos de Elifaz fueron...'' con la lista de nombres. Sin embargo, no preserva bien dos decisiones onomásticas auditadas por el POB inglés: צְפוֹ fue documentado como ''Zepho'' frente a la variante ''Zepo'', pero el español cambia innecesariamente a ''Zefo''; y קְנַז fue documentado como ''Kenaz'', mientras que ''Quenaz'' introduce una adaptación ortográfica no sustentada por la auditoría ni por necesidad contextual. La nota también queda desalineada porque habla de ''Zefo'' en vez de reflejar la alternativa relevante respecto de la forma principal.'
  spanish_quality_summary: La redacción es natural y clara en español. 'Y los hijos de Elifaz fueron...' funciona bien en una genealogía. No obstante, en nombres propios conviene mayor consistencia con la evidencia fuente y la racionalidad documentada del proyecto. 'Temán' y 'Elifaz' son formas españolas legibles; el principal problema de calidad es la inconsistencia interna entre la nota y la forma elegida del nombre צְפוֹ.
  glossary_alignment: 'No hay términos teológicos clave en este versículo. En transliteración onomástica, el borrador se aparta sin suficiente justificación de las decisiones auditadas: debe conservarse ''Zefo'' solo si hubiera una razón española fuerte y bien documentada, pero aquí la nota inglesa distingue ''Zepho'' de ''Zepo'', por lo que en español la forma más fiel al expediente es ''Zefo'' como equivalente regular de ''Zepho'' y la nota debe contrastarla con ''Zepo''; en cambio, ''Quenaz'' se aleja más del expediente que ''Kenaz'' y debe volver a ''Kenaz''.'
  issues:
  - severity: medium
    issue: '''Quenaz'' no refleja la decisión auditada ''Kenaz'''
    rationale: La fuente hebrea קְנַז y la auditoría inglesa eligieron 'Kenaz' con 'Qenaz' solo como alternativa estrictamente fonética. 'Quenaz' no aparece en el expediente y añade una adaptación ortográfica innecesaria.
  - severity: medium
    issue: La nota sobre צְפוֹ está mal formulada para la forma principal elegida
    rationale: Si el texto principal usa 'Zefo' como adaptación española de 'Zepho', la nota debe indicar que algunas versiones leen 'Zepo' en lugar de 'Zefo', y explicar que la forma masorética respalda la vocalización correspondiente. La nota actual menciona 'e final', lo cual no describe bien la diferencia.
  - severity: low
    issue: La racionalidad lexical para צְפוֹ debería explicitar mejor la equivalencia entre 'Zepho' y 'Zefo'
    rationale: El cambio al español puede ser aceptable por legibilidad, pero debe quedar claro que es una adaptación ortográfica del nombre auditado, no una preferencia textual distinta.
  revised_spanish_text: Y los hijos de Elifaz fueron Temán, Omar, Zefo[a], Gatam y Kenaz.
  revised_footnotes:
  - marker: a
    text: Algunas versiones leen «Zepo» en lugar de «Zefo». La vocalización masorética aquí favorece la forma «Zefo».
    reason: lexical_alternative
