    text: O «capa». El hebreo אַדֶּרֶת designa la prenda exterior distintiva de Elías.
    reason: lexical_alternative
  - marker: b
    text: O «¿Dónde está Yahvé, el Dios de Elías? También él…». El hebreo אַף הוּא es breve y difícil; puede enfatizar que el mismo Dios que estuvo con Elías sigue presente.
    reason: alternative_reading
  revision_rationale: 'La revisión hace una reparación pequeña pero importante: mantiene el texto español natural mientras preserva, mediante nota anclada, la dificultad y fuerza de אַף הוּא sin forzar una redacción española torpe en el cuerpo principal. También corrige la puntuación española de la cita. No se requiere reescritura mayor.'
