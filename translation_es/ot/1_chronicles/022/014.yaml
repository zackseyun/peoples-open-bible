translation:
  language: es
  text: He aquí[a], en mi aflicción he preparado para la casa de Yahvé cien mil talentos de oro, y un millón[b] de talentos de plata; para el bronce y para el hierro no hay peso, porque había en abundancia. He preparado madera y piedras, y tú puedes añadirles[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en mi pobreza". El hebreo puede denotar aflicción, dificultad o pobreza.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "mil millares".'
    reason: lexical_alternative
  - marker: c
    text: O "y tú les añadirás".
    reason: lexical_alternative
lexical_decisions:
- source_word: בְעָנְיִי
  english_pob_choice: in my affliction
  chosen_spanish: en mi aflicción
  alternatives_spanish:
  - en mi pobreza
  - en mi angustia
  - en mi dificultad
  lexicon: HALOT
  rationale: עֳנִי puede abarcar aflicción, miseria, hardship o pobreza. "En mi aflicción" mantiene el valor amplio y el tono de humildad del contexto, sin reducirlo solo a falta material.
- source_word: הֲכִינוֹתִי
  english_pob_choice: I have prepared
  chosen_spanish: he preparado
  alternatives_spanish:
  - preparé
  - he dejado preparado
  - he hecho listo
  lexicon: HALOT
  rationale: El hebreo perfecto expresa una acción completada con relevancia presente. El pretérito perfecto español comunica bien esa preparación ya realizada y vigente para el encargo a Salomón.
- source_word: לְבֵית יְהוָה
  english_pob_choice: for the house of Yahweh
  chosen_spanish: para la casa de Yahvé
  alternatives_spanish:
  - para el templo de Yahvé
  - para la casa del Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen literal de "casa" y el nombre divino según el criterio del proyecto. "Templo" aclara, pero pierde la resonancia hebrea de בית.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: "Yahvé" preserva el nombre del pacto y evita el reemplazo tradicional por una forma de título.'
- source_word: כִּכָּרִים
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - ciclos
  - unidades de peso
  lexicon: HALOT
  rationale: כִּכָּר corresponde a la unidad de peso tradicionalmente traducida como "talento"; es el equivalente más establecido y claro en este tipo de inventario.
- source_word: מֵאָה אֶלֶף
  english_pob_choice: one hundred thousand
  chosen_spanish: cien mil
  alternatives_spanish:
  - cien mil
  lexicon: HALOT
  rationale: Traducción directa del cardinal hebreo, sin necesidad de nota adicional.
- source_word: אֶלֶף אֲלָפִים
  english_pob_choice: one million
  chosen_spanish: un millón
  alternatives_spanish:
  - mil millares
  - mil por mil
  - un mil de millares
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "mil millares", en español actual "un millón" comunica con claridad la cantidad total sin traicionar el sentido. La forma literal se conserva en nota.
- source_word: וְלַנְּחֹשֶׁת וְלַבַּרְזֶל אֵין מִשְׁקָל
  english_pob_choice: and for the bronze and the iron there is no weight
  chosen_spanish: para el bronce y para el hierro no hay peso
  alternatives_spanish:
  - para el bronce y para el hierro no hay peso registrado
  - y del bronce y del hierro no hubo peso
  lexicon: HALOT
  rationale: '"No hay peso" refleja con fidelidad la estructura hebrea de אֵין מִשְׁקָל y la revisión auditada que prefirió una formulación literal y natural. En español suena mejor que "no hay pesaje" y evita interpretar de más.'
- source_word: כִּי לָרֹב הָיָה
  english_pob_choice: for it was in abundance
  chosen_spanish: porque era en abundancia
  alternatives_spanish:
  - porque era abundante
  - pues había muchísimo
  lexicon: HALOT
  rationale: 'Se conserva la explicación causal del hebreo: no se pesó porque había una gran cantidad. La construcción "era en abundancia" sigue de cerca el original sin sonar forzada.'
- source_word: וְעֵצִים וַאֲבָנִים
  english_pob_choice: timber and stones
  chosen_spanish: madera y piedras
  alternatives_spanish:
  - madera y piedras
  - maderos y piedras
  - madera y canteras de piedra
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por "timber" en su contexto, en español "madera" es más natural y suficientemente preciso aquí; "piedras" conserva el material de construcción básico del hebreo.
- source_word: וַעֲלֵיהֶם תּוֹסִיף
  english_pob_choice: and you may add to them
  chosen_spanish: y tú puedes añadir a ellas
  alternatives_spanish:
  - y tú puedes añadirles
  - y añade a ellas
  - y tú has de añadir a ellas
  lexicon: HALOT
  rationale: El verbo puede oírse como permiso o mandato suave. "Puedes añadir" refleja bien el matiz permisivo del audit trail inglés, y "a ellas" retiene el antecedente plural femenino de piedras y madera como materiales.
theological_decisions:
- issue: Nombre divino YHWH en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene la política del proyecto de transliterarlo como "Yahvé", conservando la referencia personal del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Relación entre "casa" y "templo"
  english_pob_reading: house of Yahweh
  chosen_spanish_reading: casa de Yahvé
  alternative_spanish_readings:
  - templo de Yahvé
  - casa del Yahvé
  rationale: En Crónicas, בית conserva el lenguaje de "casa" aun cuando el referente sea el templo. Mantenerlo preserva la textura del hebreo y evita sustituir el término bíblico por una explicación interpretativa.
  doctrine_reference: Uso contextual de בית en Crónicas
- issue: Cantidad de plata expresada como "one million"
  english_pob_reading: one million talents of silver
  chosen_spanish_reading: un millón de talentos de plata
  alternative_spanish_readings:
  - mil millares de talentos de plata
  - un mil de millares de talentos de plata
  rationale: La frase hebrea literal es "mil millares". En español, "un millón" comunica con mayor claridad la magnitud sin borrar la equivalencia numérica, y la literalidad se puede notar como alternativa.
  doctrine_reference: Decisión de equivalencia numérica contextual
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés: se prefirió "no hay peso" como formulación literal y natural de אֵין מִשְׁקָל, y se omitió "también" porque no está exigido por el hebreo. También se conservó la lectura actualizada del nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma consistente para יְהוָה.
  - '"Casa" se conserva como equivalente de בית, sin sustituirlo por "templo" en el texto principal.'
  - '"Talentos" se usa para כִּכָּרִים por claridad técnica.'
  - La cantidad de plata se expresa como "un millón" en el texto, con nota para la forma literal hebrea.
  - Se preserva el matiz permisivo de תּוֹסִיף con "puedes añadir".
