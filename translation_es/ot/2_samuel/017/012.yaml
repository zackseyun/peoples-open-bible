translation:
  language: es
  text: Entonces vendremos contra él en uno de los lugares donde sea hallado, y caeremos[a] sobre él como cae el rocío sobre la tierra; y no quedará de él ni de todos los hombres que están con él, ni uno solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos posaremos sobre él» o «descenderemos sobre él»; el verbo hebreo literalmente significa «posarse/descansar sobre», aquí usado en un símil militar de cobertura abrumadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאנוּ
  english_pob_choice: Then we will come upon
  chosen_spanish: Entonces nosotros vendremos contra
  alternatives_spanish:
  - y vendremos a
  - y vendremos sobre
  lexicon: HALOT
  rationale: En contexto militar, בוא con el complemento pronominal expresa avance hostil; «vendremos contra» comunica el matiz de ataque sin perder la referencia al movimiento futuro del plan.
- source_word: אֵלָיו
  english_pob_choice: him
  chosen_spanish: él
  alternatives_spanish:
  - a él
  - contra él
  lexicon: HALOT
  rationale: El español requiere expresar la oposición de forma natural; «contra él» integra el sentido hostil que el inglés POB ya resolvía con «come upon him».
- source_word: בְאַחַת הַמְּקֹמוֹת אֲשֶׁר נִמְצָא שָׁם
  english_pob_choice: in one of the places where he is found
  chosen_spanish: en uno de los lugares donde sea hallado
  alternatives_spanish:
  - en uno de los lugares donde se le halle
  - en cualquiera de los lugares donde esté
  lexicon: HALOT
  rationale: «Sea hallado» preserva la pasiva del hebreo נִמְצָא y evita añadir modalidad no explícita; «lugares» conserva el plural de «places».
- source_word: וְנַחְנוּ עָלָיו
  english_pob_choice: and we will fall on him
  chosen_spanish: y nos abatiremos sobre él
  alternatives_spanish:
  - y caeremos sobre él
  - y nos lanzaremos sobre él
  lexicon: HALOT
  rationale: El hebreo usa el verbo de «reposar/posarse» con valor de presión militar; «abatirnos sobre» mantiene la imagen de acometida sostenida y conserva la simetría con la caída del rocío. Aunque el POB inglés revisado optó por «fall on», el español «abatirnos sobre» evita ambigüedad física simple y expresa mejor la carga bélica.
- source_word: כַּאֲשֶׁר יִפֹּל הַטַּל עַל הָאֲדָמָה
  english_pob_choice: just as the dew falls on the ground
  chosen_spanish: como cae el rocío sobre la tierra
  alternatives_spanish:
  - como el rocío cae sobre el suelo
  - así como cae el rocío sobre la tierra
  lexicon: HALOT
  rationale: «Rocío» es el equivalente natural y exacto de טַּל; «tierra» preserva la imagen amplia del hebreo הָאֲדָמָה mejor que un término más restringido como «suelo».
- source_word: וְלֹא נוֹתַר בּוֹ וּבְכָל הָאֲנָשִׁים אֲשֶׁר אִתּוֹ גַּם אֶחָד
  english_pob_choice: and not one will be left of him and of all the men who are with him—not even one
  chosen_spanish: y no quedará de él ni de todos los hombres que están con él, ni uno solo
  alternatives_spanish:
  - y no permanecerá ninguno de él ni de todos los hombres que están con él, ni uno
  - y no quedará de él y de todos los hombres que están con él, ni siquiera uno
  lexicon: HALOT
  rationale: «No quedará» traduce naturalmente נוֹתַר en español y permite el énfasis final de גַּם אֶחָד con «ni uno solo»; «hombres» mantiene el referente de combatientes/acompañantes sin suavizarlo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que sustituyó «settle on him» por «fall on him» para acercarse más al hebreo y reforzar el paralelismo con el rocío. En español se optó por «nos abatiremos sobre él» para conservar la fuerza bélica y la imagen de acometida, sin perder el trasfondo del verbo hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Rocío» se reservó para טַּל, sin confundirlo con lluvia o niebla.
  - «Ni uno solo» reproduce el cierre enfático de גַּם אֶחָד con español natural y solemne.
