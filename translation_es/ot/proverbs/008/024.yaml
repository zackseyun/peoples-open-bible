translation:
  language: es
  text: Cuando no había abismos[a], fui dada a luz, cuando no había manantiales rebosantes de agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nací» o «fui formada». El verbo hebreo puede evocar imágenes de nacimiento; «fui dada a luz» preserva la metáfora sin especificarla demasiado.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵין
  english_pob_choice: when there were no
  chosen_spanish: cuando no había
  alternatives_spanish:
  - en ausencia de
  - antes de que hubiera
  lexicon: HALOT
  rationale: La construcción temporal hebrea introduce la circunstancia en la que ocurre la acción. «Cuando no había» conserva el valor temporal de manera natural en español y evita una paráfrasis más explicativa.
- source_word: תְּהֹמוֹת
  english_pob_choice: depths
  chosen_spanish: abismos
  alternatives_spanish:
  - profundidades
  - deeps
  - abismos primordiales
  lexicon: HALOT
  rationale: «Tehómot» nombra las aguas profundas/abyssales. «Abismos» comunica bien la imagen en español bíblico y mantiene la fuerza poética sin añadir matiz mítico no explicitado por el término.
- source_word: חוֹלָלְתִּי
  english_pob_choice: I was brought forth
  chosen_spanish: fui dada a luz
  alternatives_spanish:
  - fui nacida
  - fui formada
  - fui traída a luz
  lexicon: HALOT
  rationale: El verbo conserva imaginería de parto/nacimiento en la personificación de la Sabiduría. «Fui dada a luz» preserva la metáfora materna y la pasiva sin reducirla a una formulación demasiado biológica o abstracta.
- source_word: מַעְיָנוֹת
  english_pob_choice: springs
  chosen_spanish: fuentes
  alternatives_spanish:
  - manantiales
  - surgentes
  - pozos
  lexicon: HALOT
  rationale: El término designa fuentes naturales de agua. «Fuentes» es un equivalente claro y digno en español; «manantiales» también sería posible, pero «fuentes» funciona bien en el paralelismo poético.
- source_word: נִכְבַּדֵּי מָיִם
  english_pob_choice: abounding with water
  chosen_spanish: abundantes en agua
  alternatives_spanish:
  - llenas de agua
  - ricas en agua
  - cargadas de agua
  lexicon: HALOT
  rationale: La expresión participial describe fuentes/vertientes caracterizadas por mucha agua. «Abundantes en agua» refleja el sentido comunicado por la revisión inglesa más reciente y suena natural en español sin perder el valor descriptivo.
- source_word: מָיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural formal, el español idiomático aquí prefiere el singular «agua» para la materia líquida, manteniendo la claridad y la naturalidad.
theological_decisions:
- issue: Imaginería de nacimiento aplicada a la Sabiduría personificada
  english_pob_reading: I was brought forth
  chosen_spanish_reading: fui dada a luz
  alternative_spanish_readings:
  - fui nacida
  - fui formada
  rationale: Se conserva la metáfora de nacimiento sin resolverla doctrinalmente ni convertirla en una afirmación literal sobre una persona histórica. La redacción mantiene la tensión exegética del proverbio y evita sobreinterpretaciones cristológicas o filosóficas ajenas al verso.
  doctrine_reference: Mantener la tensión teológica y literaria del texto sapiencial sin resolverla artificialmente.
translation_notes:
  revision_awareness: El contexto auditado en inglés favoreció conservar la estructura paralela del verso y la última decisión revisada sobre «abounding with water»; en español se reflejó como «abundantes en agua» para mantener naturalidad y fidelidad semántica.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el verso no contiene el nombre divino.
  - Se mantiene el registro sapiencial poético con verbos y sustantivos concretos.
  - «Abismos» y «fuentes» conservan el paralelismo entre profundidad y surgimiento del agua.
