id: NUM.35.25
reference: Numbers 35:25
source:
  edition: WLC
  text: וְ/הִצִּ֨ילוּ הָ/עֵדָ֜ה אֶת הָ/רֹצֵ֗חַ מִ/יַּד֮ גֹּאֵ֣ל הַ/דָּם֒ וְ/הֵשִׁ֤יבוּ אֹת/וֹ֙ הָֽ/עֵדָ֔ה אֶל עִ֥יר מִקְלָט֖/וֹ אֲשֶׁר נָ֣ס שָׁ֑מָּ/ה וְ/יָ֣שַׁב בָּ֗/הּ עַד מוֹת֙ הַ/כֹּהֵ֣ן הַ/גָּדֹ֔ל אֲשֶׁר מָשַׁ֥ח אֹת֖/וֹ בְּ/שֶׁ֥מֶן הַ/קֹּֽדֶשׁ־־־־־׃
translation:
  text: Then the congregation shall rescue the manslayer from the hand of the avenger of blood[a], and the congregation shall return him to his city of refuge, where he fled; and he shall live in it until the death of the high priest[c][b], whom he was anointed with the holy oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blood avenger.' The Hebrew phrase refers to the person with legal responsibility to avenge the shedding of blood, often a near kinsman.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall remain in it' or 'he shall dwell in it.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'whom he anointed with the holy oil.' The subject of 'anointed' is not stated explicitly here; many translations smooth this to 'who had been anointed.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִצִּילוּ
  chosen: shall rescue
  alternatives:
  - shall deliver
  - shall save
  lexicon: HALOT
  rationale: Hiphil of נצל here denotes causing someone to be delivered from another's power. 'Rescue' fits the legal-protective context better than the more general 'save.'
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: In Numbers this term commonly refers to the gathered covenant community acting judicially. 'Congregation' preserves that formal communal sense.
- source_word: הָרֹצֵחַ
  chosen: the manslayer
  alternatives:
  - the killer
  - the slayer
  - the murderer
  lexicon: HALOT
  rationale: In this chapter the term can refer broadly to one who has killed, including accidental killing, not necessarily a culpable murderer. 'Manslayer' best matches the legal distinction in context.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: The idiom literally means 'from the hand of' and is transparent in English here, preserving the concrete legal idiom.
- source_word: גֹּאֵל הַדָּם
  chosen: the avenger of blood
  alternatives:
  - the blood avenger
  - the kinsman-avenger of blood
  lexicon: HALOT
  rationale: 'This is the established legal role in the passage: the one authorized to avenge a death. ''Avenger of blood'' is clear and close to the Hebrew. ''Kinsman'' is often implied by גאל but is not explicit in this immediate phrase, so it is not added to the main text.'
- source_word: וְהֵשִׁיבוּ אֹתוֹ
  chosen: shall return him
  alternatives:
  - shall bring him back
  lexicon: HALOT
  rationale: Hiphil of שוב means to cause to return. 'Return him' is concise and formally close.
- source_word: עִיר מִקְלָטוֹ
  chosen: his city of refuge
  alternatives:
  - the city of his refuge
  - his asylum city
  lexicon: HALOT
  rationale: This is the standard legal designation in the chapter. 'City of refuge' is natural English and preserves the institutional meaning.
- source_word: אֲשֶׁר נָס שָׁמָּה
  chosen: where he fled
  alternatives:
  - to which he fled
  - where he had fled
  lexicon: HALOT
  rationale: The clause identifies the refuge city as the place to which he fled. 'Where he fled' is smooth and sufficiently precise.
- source_word: וְיָשַׁב בָּהּ
  chosen: he shall live in it
  alternatives:
  - he shall remain in it
  - he shall dwell in it
  lexicon: HALOT
  rationale: ישב often means dwell/remain. 'Live in it' is idiomatic modern English while retaining the sense of residence. It also avoids overly archaic 'dwell.'
- source_word: עַד מוֹת הַכֹּהֵן הַגָּדֹל
  chosen: until the death of the high priest
  alternatives:
  - until the high priest dies
  lexicon: HALOT
  rationale: The nominal construction is preserved closely. 'High priest' is the standard rendering of the title.
- source_word: אֲשֶׁר מָשַׁח אֹתוֹ
  chosen: whom he anointed
  alternatives:
  - who had been anointed
  - who was anointed
  lexicon: HALOT
  rationale: 'The Hebrew verb is active, 3ms, with the high priest as object: ''whom he anointed.'' The subject is left implicit in Hebrew. Rather than smoothing to a passive, the draft preserves the active form, even though the unnamed subject is somewhat abrupt in English.'
- source_word: בְּשֶׁמֶן הַקֹּדֶשׁ
  chosen: with the holy oil
  alternatives:
  - with holy oil
  - with the oil of holiness
  - with the sacred oil
  lexicon: HALOT
  rationale: The phrase refers to the consecrating anointing oil. 'The holy oil' is a close rendering of the definite Hebrew expression.
