translation:
  language: es
  text: Y los hijos de Israel huyeron delante de Judá, y Dios los entregó en manos de Judá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en su mano», un modismo que significa «en su poder» o «bajo su control».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנ֥וּסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - tomaron la fuga
  lexicon: HALOT
  rationale: נוּס describe huida en contexto militar. En español, «huyeron» es natural, directo y conserva el sentido de retirada ante el enemigo sin añadir coloquialidad.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» reproduce con fidelidad la expresión hebrea y mantiene la forma masculina plural del original, tal como la POB inglesa optó por «the sons of Israel».
- source_word: מִפְּנֵי יְהוּדָה
  english_pob_choice: before Judah
  chosen_spanish: delante de Judá
  alternatives_spanish:
  - de delante de Judá
  - ante Judá
  lexicon: HALOT
  rationale: La construcción indica huida en presencia o frente al avance de Judá. «Delante de Judá» es idiomático en español y conserva la relación espacial/bélica del hebreo sin sobreexplicar.
- source_word: וַיִּתְּנֵם
  english_pob_choice: gave them
  chosen_spanish: los entregó
  alternatives_spanish:
  - los dio
  - los puso en manos de
  lexicon: HALOT
  rationale: En contexto de batalla, נתן con objeto humano expresa entregar a alguien al poder de otro. «Los entregó» comunica ese matiz de rendición o puesta bajo control mejor que un simple «dio».
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa אֱלֹהִים, no el nombre divino. Por eso corresponde «Dios»; no se debe sustituir por «el SEÑOR».
- source_word: בְּיָדָם
  english_pob_choice: into their hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en sus manos
  - en su poder
  lexicon: HALOT
  rationale: El hebreo usa el singular colectivo «mano» con sufijo plural para un modismo de dominio o control. En español, «en su mano» conserva esa imagen y permite que el antecedente sea entendido por el contexto.
theological_decisions:
- issue: Agencia divina en el resultado de la batalla
  english_pob_reading: God gave the fleeing Israelites into their hand
  chosen_spanish_reading: Dios los entregó en su mano
  alternative_spanish_readings:
  - Dios permitió que cayeran en su mano
  - Dios los puso en su poder
  rationale: El verbo נתן con Dios como sujeto atribuye directamente el desenlace a la acción divina. «Los entregó» preserva esa agencia sin diluirla en mera अनुमति o permiso.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referente del sufijo en בְּיָדָם
  english_pob_reading: their hand
  chosen_spanish_reading: su mano
  alternative_spanish_readings:
  - la mano de ellos
  - las manos de ellos
  rationale: El sufijo plural remite a Judá en el contexto narrativo, y la revisión inglesa optó por mantener la referencia más clara. En español, el posesivo singular «su» conserva el modismo bíblico y evita una redundancia poco natural.
  doctrine_reference: Translation philosophy §2, §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió mantener «their hand» para reflejar más directamente el sufijo hebreo, aunque la revisión anterior había aclarado la ambigüedad con «Judah's hand». En español se preserva el modismo con «su mano» y se deja que el contexto identifique a Judá como el antecedente, evitando una formulación explícita que el texto hebreo no exige.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, no una máscara reverencial.
  - Se conserva la imagen hebrea de «mano» como modismo de poder/control.
  - «Hijos de Israel» reproduce la forma del original y la elección auditada en inglés.
  - «Judá» se escribe sin artículo porque el hebreo tampoco lo requiere en esta construcción.
