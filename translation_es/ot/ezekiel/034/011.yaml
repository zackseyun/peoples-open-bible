review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el hebreo: «Porque así ha dicho» refleja כִּי כֹּה אָמַר, «el Señor Yahvé» preserva אֲדֹנָי יְהוִה según la pauta española del proyecto, «He aquí, yo mismo» transmite adecuadamente הִנְנִי אָ֕נִי, y «buscaré mis ovejas» representa bien וְדָרַשְׁתִּי אֶת צֹאנִי. Sin embargo, «y las haré volver» no es fiel a וּבִקַּרְתִּים, cuyo campo semántico aquí es atender, inspeccionar, cuidar o buscar personalmente, no hacer volver. Esa formulación introduce una idea de retorno que este versículo no expresa todavía.'
  spanish_quality_summary: 'El español es claro y de registro bíblico legible. «He aquí» es aceptable en un estilo digno, aunque algo tradicional; no impide comprensión. El problema principal no es de fluidez sino de precisión semántica: «las haré volver» interpreta y adelanta una acción de reunión/restauración ausente del verbo hebreo en este punto. Conviene una formulación más directa y fiel, con nota que preserve las alternativas léxicas.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה se traduce como «Yahvé», ἀ/אֱלֹהִים no es relevante aquí, y la metáfora pastoral se conserva con «mis ovejas». La excepción importante es וּבִקַּרְתִּים: la decisión española actual no sigue la razón léxica documentada en la auditoría inglesa. Debe alinearse con «buscarlas / buscarlas diligentemente» o una opción cercana, manteniendo en nota las posibilidades «atenderlas», «inspeccionarlas» o «cuidarlas».'
  issues:
