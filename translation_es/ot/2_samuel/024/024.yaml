translation:
  language: es
  text: 'Pero el rey dijo a Arauna[a]: «No; ciertamente te lo compraré por un precio. No ofreceré a Yahvé mi Dios holocaustos que no me cuesten nada[b]». Así David compró la era y el ganado[c] por cincuenta siclos de plata.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nombre propio transliterado desde el hebreo; el paralelo de 1 Crónicas usa «Ornán».
    reason: cross_reference
  - marker: b
    text: O, más literalmente, «holocaustos gratis» o «de balde».
    reason: lexical_alternative
  - marker: c
    text: O «los bueyes». El término hebreo puede referirse colectivamente al ganado vacuno o más específicamente a bovinos usados para labor o sacrificio. En 1 Crónicas 21:25, David paga seiscientos siclos de oro por el sitio; aquí se especifican cincuenta siclos de plata por la era y el ganado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרַוְנָה
  english_pob_choice: Araunah
  chosen_spanish: Arauna
  alternatives_spanish:
  - Araunah
  - Ornan
  lexicon: HALOT
  rationale: Se translitera el nombre propio en una forma natural para el español y coherente con el hebreo de este versículo. Se evita Ornan porque corresponde al paralelo de Crónicas, no a este texto.
- source_word: קָנוֹ אֶקְנֶה
  english_pob_choice: I will surely buy it
  chosen_spanish: ciertamente lo compraré
  alternatives_spanish:
  - lo compraré con certeza
  - de cierto lo compraré
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. En español, 'ciertamente' conserva la fuerza enfática sin sonar forzado.
- source_word: מֵאֹתְךָ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu mano
  - de usted
  lexicon: HALOT
  rationale: La preposición más natural en español es 'de ti', manteniendo la referencia personal al vendedor.
- source_word: בִּמְחִיר
  english_pob_choice: for a price
  chosen_spanish: por un precio
  alternatives_spanish:
  - a un precio
  - mediante pago
  lexicon: HALOT
  rationale: '''מְחִיר'' indica precio de compra o pago. ''Por un precio'' comunica claramente el matiz comercial sin añadir especificación indebida.'
- source_word: אַעֲלֶה
  english_pob_choice: I will not offer
  chosen_spanish: No ofreceré
  alternatives_spanish:
  - No subiré
  - No sacrificaré
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo hifil de עלה se entiende como 'ofrecer'. 'No ofreceré' expresa el sentido ritual de forma clara y fiel.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino según la convención del proyecto en español: ''Yahvé''.'
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios y Señor
  lexicon: HALOT
  rationale: Se mantiene el sufijo posesivo de primera persona, que expresa la confesión personal de David.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - holocaustos completos
  lexicon: HALOT
  rationale: '''עֹלוֹת'' designa ofrendas totalmente quemadas. En español, ''holocaustos'' conserva el término técnico tradicional de uso bíblico y ritual; no se usa aquí en sentido moderno, sino sacrificial.'
- source_word: חִנָּם
  english_pob_choice: that cost me nothing
  chosen_spanish: que no me cuesten nada
  alternatives_spanish:
  - gratuitamente
  - sin costo alguno
  lexicon: HALOT
  rationale: El hebreo literalmente significa 'sin costo / gratuitamente'. En este contexto, la idea es que David no presentará sacrificios obtenidos sin sacrificio personal; por eso se explicita como 'que no me cuesten nada'.
- source_word: הַגֹּרֶן
  english_pob_choice: the threshing floor
  chosen_spanish: la era
  alternatives_spanish:
  - la era de trillar
  - el piso de trilla
  lexicon: HALOT
  rationale: '''גֹּרֶן'' corresponde a la era o piso de trilla. ''La era'' es idiomática, breve y fiel.'
- source_word: הַבָּקָר
  english_pob_choice: the cattle
  chosen_spanish: los bueyes
  alternatives_spanish:
  - el ganado
  - el ganado vacuno
  lexicon: HALOT
  rationale: Aunque el término puede ser colectivo, en este contexto narrativo y sacrificial la referencia concreta a los animales de labor/sacrificio permite 'los bueyes', que conserva mejor la escena. Se mantiene la tensión léxica con la nota cruzada de la tradición textual.
- source_word: בְּכֶסֶף שְׁקָלִים חֲמִשִּׁים
  english_pob_choice: for fifty shekels of silver
  chosen_spanish: por cincuenta siclos de plata
  alternatives_spanish:
  - con cincuenta siclos de plata
  - a cambio de cincuenta siclos de plata
  lexicon: HALOT
  rationale: '''שְׁקָלִים'' se traduce con la unidad monetaria ''siclos'', y ''בְכֶסֶף'' con ''de plata''. La construcción ''por cincuenta siclos de plata'' suena natural y preserva el precio de compra.'
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  english_pob_choice: But the king said
  chosen_spanish: Pero el rey dijo
  alternatives_spanish:
  - Y el rey dijo
  lexicon: HALOT
  rationale: El waw inicial aquí introduce contraste con la oferta previa; 'Pero' reproduce mejor la función discursiva que un simple 'Y'.
- source_word: וַיִּקֶן דָּוִד
  english_pob_choice: So David bought
  chosen_spanish: Así David compró
  alternatives_spanish:
  - Y David compró
  - Entonces David compró
  lexicon: HALOT
  rationale: La waw narrativa avanza el resultado del rechazo y la compra; 'Así' comunica de forma natural la consecuencia.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se sigue la convención doctrinal del proyecto para el Tetragrámaton en español. En este versículo, el contraste entre la acción humana de comprar y el culto ofrecido a Yahvé se mantiene explícito.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido sacrificial de עֹלוֹת
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - ofrendas completamente quemadas
  rationale: 'No se diluye la categoría sacrificial. ''Holocaustos'' comunica la ofrenda totalmente consumida por el fuego y preserva el contraste teológico: David rechaza ofrecer a Dios aquello que no le cueste nada.'
  doctrine_reference: Lexical-theological consistency for sacrificial terminology
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que todos los marcadores de nota aparezcan exactamente en el texto español. Se eliminó cualquier nota no anclada y se mantuvo la distinción entre la oferta de compra, el costo del sacrificio y la referencia cruzada con Crónicas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה.
  - Se preserva el contraste entre compra onerosa y ofrenda gratuita.
  - '''Holocaustos'' se usa en sentido técnico bíblico, no moderno.'
  - '''Arauna'' se mantiene como transliteración natural del nombre en este versículo.'
