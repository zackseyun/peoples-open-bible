review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: conserva la doble repetición de וַתְּפוּצֶינָה, mantiene la causalidad de מִבְּלִי con ''por falta de'', preserva la metáfora de רֹעֶה como ''pastor'', y expresa el estado resultante de וַתִּהְיֶינָה. Sin embargo, ''animal del campo'' debilita la fuerza de חַיַּת הַשָּׂדֶה, que en este contexto profético y en la auditoría inglesa quedó fijada como ''beast of the field''; en español eclesial legible, ''bestia del campo'' preserva mejor el tono y el peligro implícito.'
  spanish_quality_summary: 'El español es claro y natural. ''Llegaron a ser alimento'' funciona, pero ''se volvieron alimento'' suena un poco más directo y fluido. El principal ajuste necesario es léxico-estilístico: ''todo animal del campo'' puede sugerir animales domésticos o neutros, mientras que el contexto exige fieras/bestias. También conviene quitar la nota en ''dispersadas'', porque la alternativa no añade valor decisivo aquí, y mantener una sola nota útil en ''bestia del campo''.'
  glossary_alignment: No hay conflicto con las terminologías troncales del proyecto. 'Pastor' respeta la metáfora. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. El ajuste a 'bestia del campo' alinea mejor el español con la decisión auditada del inglés y con la fuerza léxica del hebreo.
  issues:
  - severity: medium
    issue: '''animal del campo'' suaviza demasiado חַיַּת הַשָּׂדֶה'
    rationale: La frase hebrea en este contexto habla de bestias/fieras del campo, no de animales del campo en sentido amplio. La auditoría inglesa revisó precisamente hacia 'beast of the field' por formalidad y convencionalidad; el español debe reflejar esa misma fuerza.
  - severity: low
    issue: La nota 'O "fueron esparcidas"' es prescindible
    rationale: No corresponde a una alternativa preservada en la auditoría inglesa y no resuelve una ambigüedad nueva en español. Añade ruido sin beneficio claro.
  - severity: low
    issue: '''llegaron a ser alimento'' puede afinarse estilísticamente'
    rationale: Es fiel, pero 'se volvieron alimento' suena más natural en español bíblico moderno sin perder el matiz resultativo de וַתִּהְיֶינָה.
  revised_spanish_text: Así fueron dispersadas por falta de pastor, y se volvieron alimento para toda bestia[a] del campo, y fueron dispersadas.
  revised_footnotes:
  - marker: a
    text: O 'todo animal del campo'.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'animal del campo' por 'bestia del campo' para preservar mejor la fuerza contextual de חַיַּת הַשָּׂדֶה y alinearse con la decisión documentada del inglés POB. Se elimina la nota sobre 'esparcidas' por innecesaria, y se conserva solo una nota útil como alternativa léxica. También se ajusta 'llegaron a ser' a 'se volvieron' para una lectura más natural en español sin cambiar el sentido.
