translation:
  language: es
  text: Toquen la trompeta en Sión con trompeta de señal para los santos[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con trompeta de convocatoria para los santos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σαλπίσατε
  english_pob_choice: Sound the trumpet
  chosen_spanish: Tocad la trompeta
  alternatives_spanish:
  - Sonad la trompeta
  - Haced sonar la trompeta
  lexicon: LSJ
  rationale: Es un imperativo plural de σαλπίζω que convoca a un toque público. «Tocad la trompeta» mantiene el mandato y suena natural en español bíblico sin perder la fuerza del llamado.
- source_word: ἐν Σιὼν
  english_pob_choice: in Zion
  chosen_spanish: en Sión
  alternatives_spanish:
  - en Zion
  lexicon: LSJ
  rationale: Se conserva el topónimo bíblico tradicional «Sión» y la preposición locativa «en», que reproduce bien el marco cultual y público del texto.
- source_word: ἐν σάλπιγγι
  english_pob_choice: with the trumpet
  chosen_spanish: con la trompeta
  alternatives_spanish:
  - con trompeta
  - por la trompeta
  lexicon: LSJ
  rationale: El ἐν dativo instrumental se vierte de forma natural como «con». En español hace falta artículo para la fluidez, pero el sentido instrumental sigue claro.
- source_word: σημασίας
  english_pob_choice: signal
  chosen_spanish: de señal
  alternatives_spanish:
  - de aviso
  - de convocatoria
  - de toque de señal
  lexicon: LSJ
  rationale: σημασία expresa una señal o acto de señalización. «De señal» preserva la economía del griego y evita cargar el verso con una especificación militar que el término no exige.
- source_word: ἁγίων
  english_pob_choice: of the holy ones
  chosen_spanish: para los santos
  alternatives_spanish:
  - de los santos
  - para los santos y apartados
  lexicon: LSJ
  rationale: La revisión inglesa entiende el genitivo como objetivo, es decir, una señal dirigida a los santos. En español, «para los santos» comunica mejor esa relación que un posesivo o un simple «de».
theological_decisions:
- issue: Referente de ἁγίων
  english_pob_reading: 'The phrase is kept broad in English, but the later revision indicates the genitive is objective: a signal for the holy ones.'
  chosen_spanish_reading: «para los santos» deja abierto quiénes son exactamente, pero sí expresa que la señal va dirigida a ellos.
  alternative_spanish_readings:
  - de los santos
  - de los santos convocados
  - de los consagrados
  rationale: El griego no identifica con total precisión el subgrupo. La traducción no debe resolver esa ambigüedad más de lo que el texto permite, pero sí debe reflejar la función objetiva sugerida por la revisión auditada.
  doctrine_reference: Preservar la tensión lexical y el alcance referencial del original.
translation_notes:
  revision_awareness: El inglés auditado pasó de una lectura posesiva («of the holy ones») a una lectura objetiva («for the holy ones») y luego volvió a una formulación más cercana al griego («the trumpet of the holy signal»). La versión española sigue la última revisión en la medida posible, pero explica en la nota que el sentido puede expresarse como convocatoria o señal dirigida a los santos.
  spanish_consistency_notes:
  - Se evitó «Cristo/Mesías» porque no aparece en el verso.
  - Se mantuvo «Sión» como nombre bíblico establecido.
  - «Santos» se usa como equivalente amplio y eclesialmente comprensible de ἁγίων, sin decidir más allá del griego si se trata de fieles, consagrados o un grupo litúrgico específico.
