translation:
  language: es
  text: Pero los que estaban alrededor de Judas, habiendo invocado al gran Soberano del mundo —el que, en tiempos de Josué[a], derribó a Jericó sin arietes ni máquinas de asedio— arremetieron fieramente contra el muro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «en el tiempo de Jesús»; aquí se refiere a Josué, el líder asociado con la caída de Jericó.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ περὶ τὸν Ἰούδαν
  english_pob_choice: those around Judas
  chosen_spanish: los que estaban alrededor de Judas
  alternatives_spanish:
  - los que estaban con Judas
  - Judas y los suyos
  lexicon: LSJ
  rationale: La construcción περὶ + acusativo con una figura dirigente señala a su grupo o entorno. «Alrededor de Judas» conserva esa relación sin convertirla en una formulación militar más explícita de lo que exige el griego.
- source_word: ἐπικαλεσάμενοι
  english_pob_choice: having called on
  chosen_spanish: habiendo invocado
  alternatives_spanish:
  - habiendo llamado sobre
  - habiendo clamado a
  lexicon: LSJ
  rationale: El participio medio expresa una apelación a Dios. «Invocado» mantiene el sentido de oración/apelación solemne y se ajusta bien al registro bíblico en español.
- source_word: τὸν μέγαν τοῦ κόσμου δυνάστην
  english_pob_choice: the great Sovereign of the world
  chosen_spanish: el gran Soberano del mundo
  alternatives_spanish:
  - el gran gobernante del mundo
  - el gran potentado del mundo
  lexicon: LSJ
  rationale: δυνάστης comunica autoridad soberana y poder; «Soberano» conserva la elevación del título. «Del mundo» traduce κόσμος como el orden habitado/creado, no como término técnico cosmológico.
- source_word: τὸν ἄτερ κριῶν καὶ μηχανῶν ὀργανικῶν
  english_pob_choice: without rams or siege engines
  chosen_spanish: sin arietes ni máquinas de asedio
  alternatives_spanish:
  - sin arietes ni ingenios de guerra
  - sin arietes ni máquinas mecánicas
  lexicon: LSJ
  rationale: κριοί en contexto de asedio son «arietes». μηχαναί ὀργανικαί alude a artefactos de asedio; «máquinas de asedio» es claro y fiel en español moderno.
- source_word: κατακρημνίσαντα
  english_pob_choice: brought down
  chosen_spanish: derribó
  alternatives_spanish:
  - hizo caer
  - echó abajo
  - precipitó
  lexicon: LSJ
  rationale: El verbo expresa hacer caer con fuerza. «Derribó» es natural en español y conserva la imagen de la caída de los muros de Jericó.
- source_word: τὴν Ἰερειχὼ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericó
  lexicon: LSJ
  rationale: Nombre propio estándar en español bíblico.
- source_word: κατὰ τοὺς Ἰησοῦ χρόνους
  english_pob_choice: in the time of Joshua
  chosen_spanish: en tiempos de Josué
  alternatives_spanish:
  - en los días de Josué
  - en la época de Josué
  lexicon: LSJ
  rationale: En la LXX, Ἰησοῦς aquí remite a Josué hijo de Nun. «Josué» evita la confusión con Jesús de Nazaret y refleja el referente histórico inequívoco por la alusión a Jericó.
- source_word: ἐνέσεισαν
  english_pob_choice: assaulted
  chosen_spanish: arremetieron
  alternatives_spanish:
  - asediaron
  - embistieron
  - atacaron con violencia
  lexicon: LSJ
  rationale: El verbo transmite un golpe/choque violento contra el muro. «Arremetieron» conserva dinamismo e intensidad sin forzar una técnica militar específica.
- source_word: θηριωδῶς
  english_pob_choice: fiercely
  chosen_spanish: fieramente
  alternatives_spanish:
  - ferozmente
  - como fieras
  lexicon: LSJ
  rationale: El adverbio sugiere una violencia casi bestial. «Fieramente» preserva la fuerza idiomática sin volverlo demasiado literal o coloquial.
- source_word: τῷ τείχει
  english_pob_choice: the wall
  chosen_spanish: contra el muro
  alternatives_spanish:
  - al muro
  - sobre el muro
  lexicon: LSJ
  rationale: El dativo con ἐνέσεισαν expresa el objeto acometido; en español, «contra el muro» refleja mejor el sentido de ataque que un simple objeto directo.
theological_decisions:
- issue: Referencia de Ἰησοῦς a Josué, no a Jesús de Nazaret
  english_pob_reading: Joshua
  chosen_spanish_reading: Josué
  alternative_spanish_readings:
  - Jesús (transliteración formal del griego)
  rationale: La alusión a la caída de Jericó identifica claramente al líder israelita Josué. Traducirlo así evita una lectura engañosa y sigue la primacía del sentido original sobre la forma griega en este contexto.
  doctrine_reference: Convención de traducción de nombres propios bíblicos según el referente histórico-contextual.
translation_notes:
  revision_awareness: He tenido en cuenta la última revisión del audit trail inglés, que prefirió «those around Judas» frente a «with Judas» y ajustó el verbo para expresar una acción de ataque más que un mero sacudir. Por eso el español usa «los que estaban alrededor de Judas» y «arremetieron fieramente contra el muro».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo exija; aquí el griego habla de un título divino genérico, por lo que «Soberano del mundo» es más preciso.
  - Se conserva «Josué» para el referente histórico de Ἰησοῦς, siguiendo la decisión auditada en inglés.
  - «Arietes» y «máquinas de asedio» respetan el campo léxico militar antiguo sin modernizarlo excesivamente.
