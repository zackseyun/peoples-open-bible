  yaml_path: translation/nt/acts/023/015.yaml
  text: Now therefore[a], you, together with the council, make it known to the commander so that he may bring him down to you, as though you were about to examine more carefully the things concerning him[c][b]. But we are ready to kill him before he comes near.
  footnotes:
  - marker: a
    text: "Or 'bring him before you.' The Greek verb literally includes the idea of bringing him down."
    reason: lexical_alternative
  - marker: b
    text: "Or 'as if you were going to investigate his case more carefully.' The wording implies a pretense of further judicial examination."
    reason: lexical_alternative
  - marker: c
    text: "Or 'before he arrives.'"
    reason: lexical_alternative
translation:
  language: ko
  text: 그러니 이제 여러분이 공의회와 함께 천부장에게, 그가 바울을 여러분에게 데려오게끔 알리십시오. 마치 여러분이 그에 관한 일을 더 정확히 조사하려는 것처럼 하십시오. 그러면 우리는 그가 가까이 오기 전에 그를 죽일 준비를 하겠습니다.」
