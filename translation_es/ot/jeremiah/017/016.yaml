translation:
  language: es
  text: Pero en cuanto a mí, no me apresuré a dejar de ser pastor en pos de ti, ni deseé el día de desgracia[a]; tú lo sabes. Lo que salió de mis labios estuvo delante de tu rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el día de calamidad» o «el día de desastre». La expresión hebrea alude literalmente a un día grave o enfermizo, y probablemente se refiere al día de desastre o juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַצְתִּי
  english_pob_choice: did not hurry away
  chosen_spanish: no me apresuré a dejar de
  alternatives_spanish:
  - no me apresuré
  - no me alejé con prisa
  - no huí
  lexicon: HALOT
  rationale: El verbo expresa la idea de apresurarse o darse prisa. En este contexto, con la construcción “de ser pastor tras de ti”, “no me apresuré a dejar de” conserva el movimiento de apartarse sin perder la fuerza del verbo.
- source_word: מֵרֹעֶה אַחֲרֶיךָ
  english_pob_choice: from being a shepherd after you
  chosen_spanish: a dejar de ser pastor tras de ti
  alternatives_spanish:
  - de seguirte como pastor
  - de ser un pastor detrás de ti
  - de seguirte como pastor y guía
  lexicon: HALOT
  rationale: Se conserva la metáfora de “pastor”, porque el hebreo la usa de forma explícita. “Tras de ti” reproduce la relación de seguimiento expresada por אַחֲרֶיךָ sin reemplazarla por un término interpretativo como “líder” o “profeta”.
- source_word: יוֹם אָנושׁ
  english_pob_choice: the day of disaster
  chosen_spanish: el día de desgracia
  alternatives_spanish:
  - el día de desastre
  - el día de calamidad
  - el día de aflicción
  lexicon: HALOT
  rationale: אָנושׁ tiene un campo semántico de enfermedad/grave aflicción que, en contexto, apunta al día de juicio o calamidad. “Desgracia” permite transmitir el sentido del evento funesto sin reducirlo a un solo matiz médico ni sonar demasiado técnico.
- source_word: הִתְאַוֵּיתִי
  english_pob_choice: did not desire
  chosen_spanish: ni deseé
  alternatives_spanish:
  - ni anhelé
  - ni quise
  - ni tuve deseo de
  lexicon: HALOT
  rationale: El hitpael de אוה expresa deseo o anhelo. “Deseé” es directo y natural en español, y mantiene la negación enfática del texto.
- source_word: מוֹצָא שְׂפָתַי
  english_pob_choice: What came from my lips
  chosen_spanish: Lo que salió de mis labios
  alternatives_spanish:
  - lo que procedió de mis labios
  - la salida de mis labios
  - el dicho de mis labios
  lexicon: HALOT
  rationale: מוֹצָא alude a “lo que sale”. “Salió de mis labios” conserva la imagen concreta y resulta idiomático en español, con “labios” en lugar de “boca” por fidelidad al hebreo.
- source_word: נֹכַח פָּנֶיךָ
  english_pob_choice: before your face
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - en tu presencia
  - ante ti
  - frente a tu rostro
  lexicon: HALOT
  rationale: 'La expresión es literalmente espacial: “frente a/ante tu rostro”. “Delante de tu rostro” conserva la vividness hebrea que el POB inglés mantuvo con “before your face”.'
- source_word: הָיָה
  english_pob_choice: was
  chosen_spanish: estuvo
  alternatives_spanish:
  - fue
  - ha estado
  lexicon: HALOT
  rationale: El qatal funciona aquí como una afirmación de estado con referencia al pasado. “Estuvo” enlaza naturalmente con “delante de tu rostro” y suena más fluido que un simple “fue” en español.
- source_word: אַתָּה יָדָעְתָּ
  english_pob_choice: you know
  chosen_spanish: tú lo sabes
  alternatives_spanish:
  - tú sabes
  - lo sabes
  - tú mismo lo sabes
  lexicon: HALOT
  rationale: Aunque el hebreo está en perfecto, en este tipo de apelación directa funciona como una afirmación vigente. “Tú lo sabes” mantiene la fuerza de testimonio ante Dios.
theological_decisions:
- issue: Conservación de la metáfora pastoral en la auto-descripción de Jeremías
  english_pob_reading: Retain 'shepherd' as Jeremiah's metaphorical role under God rather than interpretively replacing it with 'prophet' or 'pastor'.
  chosen_spanish_reading: Conservar “pastor” como metáfora de su comisión, sin sustituirla por “profeta” ni explicarla más allá del texto.
  alternative_spanish_readings:
  - no me aparté de seguirte como profeta
  - no me apresuré a dejar de servirte como guía
  - no rehuí la tarea profética tras de ti
  rationale: El hebreo usa imagen pastoral; traducirla por un oficio distinto debilita la transparencia del texto fuente. La versión española preserva la tensión entre metáfora y función profética sin resolverla interpretativamente.
  doctrine_reference: Principio de primacía del idioma original; preservar imagen y ambigüedad legítima cuando el texto la presenta.
- issue: Alcance de יוֹם אָנושׁ
  english_pob_reading: day of disaster
  chosen_spanish_reading: día de desgracia
  alternative_spanish_readings:
  - día de desastre
  - día de calamidad
  - día de juicio
  rationale: El término hebreo puede evocar un día gravemente afligido o calamitoso. “Desgracia” mantiene esa amplitud y evita estrechar el sentido a una sola formulación tradicional.
  doctrine_reference: Lectura lexical contextual; mantener la tensión semántica entre aflicción grave y juicio histórico.
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del inglés POB, que ajustó la frase de יוֹם אָנושׁ de “day of sickness” a “day of disaster”. Se conserva esa actualización semántica en español, manteniendo el resto de la línea conforme al texto auditado y a la metáfora pastoral explícita.
  spanish_consistency_notes:
  - Se usó “Yahvé” en este registro no porque aparezca en este versículo, sino como norma del proyecto cuando el Tetragrámaton esté en el texto base.
  - Se evitó “SEÑOR” como máscara; aquí no es necesario porque el versículo no contiene el nombre divino explícito.
  - Se mantuvo “pastor” para רֹעֶה por transparencia lexical, sin sustituirlo por “líder” o “profeta”.
  - “Delante de tu rostro” conserva la literalidad de נֹכַח פָּנֶיךָ, aunque “en tu presencia” sería una opción más idiomática.
