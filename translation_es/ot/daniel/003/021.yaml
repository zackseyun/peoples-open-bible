translation:
  language: es
  text: Entonces estos hombres fueron atados con sus pantalones, sus túnicas[a], sus mantos y sus demás vestidos, y fueron arrojados en medio del horno ardiente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus turbantes» para el segundo término de vestimenta; el vocablo arameo es raro y su referente exacto es incierto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el horno de fuego ardiente».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Entonces mismo
  lexicon: HALOT
  rationale: El marcador discursivo arameo introduce la siguiente acción en secuencia. «Entonces» conserva la progresión narrativa de manera natural en español.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  english_pob_choice: these men
  chosen_spanish: aquellos hombres
  alternatives_spanish:
  - estos hombres
  - esos hombres
  lexicon: HALOT
  rationale: El demostrativo retoma a los tres hombres ya mencionados. «Aquellos» suena natural en narración retrospectiva y evita sobrecargar el texto con proximidad deíctica en español.
- source_word: כְּפִתוּ
  english_pob_choice: were bound
  chosen_spanish: fueron atados
  alternatives_spanish:
  - fueron amarrados
  - quedaron atados
  lexicon: HALOT
  rationale: El pasivo describe que fueron sujetos antes de ser arrojados. «Atados» es formal, claro y fiel al proceso de ejecución.
- source_word: סַרְבָּלֵיהוֹן
  english_pob_choice: their trousers
  chosen_spanish: sus pantalones
  alternatives_spanish:
  - sus pantalones anchos
  - sus calzones
  - sus vestiduras inferiores
  lexicon: HALOT
  rationale: Sigo la decisión auditada del inglés de entender el préstamo arameo-persa como una prenda inferior, probablemente pantalones. En español, «pantalones» comunica mejor esa lectura que el más tradicional pero menos preciso «manto/ropa».
- source_word: פטישי/הון
  english_pob_choice: their tunics
  chosen_spanish: sus túnicas
  alternatives_spanish:
  - sus turbantes
  - sus camisas
  - sus vestiduras
  lexicon: HALOT
  rationale: El término es raro y su referente exacto es incierto. Mantengo una prenda principal de vestir con «túnicas», sin fijar indebidamente la ambigüedad; la alternativa de «turbantes» queda reflejada en la nota.
- source_word: וְכַרְבְּלָתְהוֹן
  english_pob_choice: their cloaks
  chosen_spanish: sus mantos
  alternatives_spanish:
  - sus capas
  - sus ropas exteriores
  - sus cloaks
  lexicon: HALOT
  rationale: El término designa una prenda exterior. «Mantos» distingue esta capa externa de las otras prendas y es idiomático en español bíblico sin perder precisión.
- source_word: וּלְבֻשֵׁיהוֹן
  english_pob_choice: their other garments
  chosen_spanish: sus demás vestidos
  alternatives_spanish:
  - su ropa
  - sus vestiduras
  - sus otros vestidos
  lexicon: HALOT
  rationale: El término resume el resto del atuendo. «Demás vestidos» conserva el matiz de enumeración acumulativa que ya está presente en la lista.
- source_word: וּרְמִיו
  english_pob_choice: and they were thrown
  chosen_spanish: y fueron arrojados
  alternatives_spanish:
  - y los arrojaron
  - y los echaron
  lexicon: HALOT
  rationale: La forma narrativa centra el resultado sobre los hombres. El pasivo español reproduce bien ese foco, mientras que «arrojados» conserva la violencia del verbo.
- source_word: לְגוֹא
  english_pob_choice: into the midst of
  chosen_spanish: al medio de
  alternatives_spanish:
  - en medio de
  - dentro de
  lexicon: HALOT
  rationale: La preposición con el sustantivo «medio» refleja que no solo entran al horno, sino a su interior central. «Al medio de» es una solución natural y fiel; «en medio de» queda como alternativa cercana.
- source_word: אַתּוּן נוּרָא יָקִדְתָּא
  english_pob_choice: the blazing furnace
  chosen_spanish: el horno encendido
  alternatives_spanish:
  - el horno ardiente
  - el horno de fuego ardiente
  - el horno en llamas
  lexicon: HALOT
  rationale: Sigo la equivalencia auditada del inglés para comprimir la acumulación semítica de «horno, fuego, arder» en una expresión natural. «Encendido» preserva la intensidad sin sonar redundante en español.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la auditoría inglesa de referencia. Se mantuvo la estructura narrativa, la lista de prendas y el cierre intensificado del horno, ajustando la formulación al español natural sin perder la ambigüedad léxica documentada en el segundo término de vestimenta ni la fuerza acumulativa de la expresión final.
  spanish_consistency_notes:
  - Se conservó «Yahvé» no aplicable en este versículo.
  - Se mantuvo el orden enumerativo de las prendas para reflejar la acumulación del original.
  - La nota sobre el segundo término de vestimenta preserva la alternativa documentada en la auditoría inglesa.
  - «Horno encendido» sigue la elección dinámica del inglés, mientras la nota conserva la literalidad subyacente.
