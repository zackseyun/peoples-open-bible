review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo dice literalmente «Y dijo: “Soy siervo/servidor de Abraham”». La estructura narrativa «Y dijo» está bien. El punto clave es עֶבֶד: el audit trail inglés eligió ‘servant’ como lectura principal por el contexto de autoidentificación respetuosa, dejando ‘slave’ solo como alternativa léxica en nota. El borrador español invierte esa prioridad al poner «esclavo» en el texto principal y «sirviente» en nota, lo que no sigue fielmente la decisión documentada.'
  spanish_quality_summary: '«Y dijo: “Soy esclavo de Abraham”» es gramatical, pero suena más duro y menos contextual que el original auditado. Para un español eclesial amplio, «Soy siervo de Abraham» o «Soy servidor de Abraham» preserva mejor el registro y la función social de la frase. «Siervo» encaja bien en lectura bíblica digna; «sirviente» suena más doméstico y menos natural aquí.'
  glossary_alignment: No hay conflicto con terminología mayor del proyecto salvo en la política de עֶבֶד, que pide «esclavo» normalmente cuando la POB inglesa eligió ‘slave’. Aquí, sin embargo, la POB inglesa eligió ‘servant’ con justificación contextual explícita; por tanto, el español debe reflejar esa excepción y dejar «esclavo» como alternativa en nota.
  issues:
  - severity: high
    issue: La elección principal de «esclavo» para עֶבֶד contradice la decisión léxica principal del audit trail inglés.
    rationale: La POB inglesa decidió ‘servant’ como traducción principal en este versículo por el contexto de presentación respetuosa, y preservó ‘slave’ solo como alternativa. El español debe seguir esa jerarquía semántica.
  - severity: medium
    issue: La nota al pie invierte indebidamente la alternativa documentada.
    rationale: La nota inglesa dice «Or, “I am Abraham’s slave.”»; en español debería conservarse la alternativa fuerte como nota, no desplazarla al texto principal ni cambiarla por «sirviente».
  - severity: low
    issue: «Sirviente» como alternativa es menos adecuada que «esclavo» y menos alineada con el expediente.
    rationale: El expediente preserva explícitamente la alternativa ‘slave’, no ‘servant’/‘attendant’ en otra formulación. Además, «sirviente» puede sonar demasiado doméstico en español.
  revised_spanish_text: 'Y dijo[a]: «Soy siervo de Abraham».

    '
