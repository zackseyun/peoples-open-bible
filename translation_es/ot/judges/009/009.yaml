translation:
  language: es
  text: 'Pero el olivo les dijo: «¿He de dejar de producir mi aceite[a], por el cual son honrados los dioses[b] y los hombres, y ponerme a mecerme sobre los árboles?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi gordura» o «mi riqueza»; aquí se refiere al rico rendimiento del olivo, especialmente a su aceite.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Dios y los hombres». El hebreo tiene la forma plural אֱלֹהִים; muchos entienden aquí «dioses», mientras que otros lo toman como referencia al Dios verdadero por el uso del aceite en el culto.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַזַּיִת
  english_pob_choice: the olive tree
  chosen_spanish: el olivo
  alternatives_spanish:
  - el árbol de olivo
  - el olivo (árbol)
  lexicon: HALOT
  rationale: En este contexto de fábula, el hebreo presenta al árbol como personaje que habla. En español, «el olivo» es la forma más natural y fiel para el árbol, sin perder la referencia botánica.
- source_word: הֶחֳדַלְתִּי
  english_pob_choice: Should I stop producing
  chosen_spanish: ¿Dejaré de producir
  alternatives_spanish:
  - ¿He dejado de producir?
  - ¿Dejaré de hacer?
  - ¿Me apartaré de producir?
  lexicon: HALOT
  rationale: La forma hebrea funciona retóricamente como pregunta. En español, «¿Dejaré de producir?» conserva esa fuerza interrogativa y el sentido de cesar una producción continua.
- source_word: דִּשְׁנִי
  english_pob_choice: my oil
  chosen_spanish: mi aceite
  alternatives_spanish:
  - mi grasa
  - mi riqueza
  - mi abundancia
  lexicon: HALOT
  rationale: El término apunta literalmente a la gordura/rico rendimiento del olivo y, por extensión, a su aceite. Dado el ajuste revisional del audit trail y la claridad del español, «mi aceite» es la opción más precisa y entendible, aunque mantiene la metáfora productiva del árbol.
- source_word: אֲשֶׁר בִּי
  english_pob_choice: by which
  chosen_spanish: por el cual
  alternatives_spanish:
  - con el cual
  - en el cual
  - mediante el cual
  lexicon: HALOT
  rationale: La relación instrumental se expresa bien en español con «por el cual», que conserva el vínculo causal/medio de la cláusula relativa.
- source_word: יְכַבְּד֥וּ
  english_pob_choice: are honored
  chosen_spanish: son honrados
  alternatives_spanish:
  - honran
  - glorifican
  - se honra
  lexicon: HALOT
  rationale: El hebreo es activo, pero el foco recae en el efecto del aceite como medio de honor. La pasiva española refleja bien el resultado sin añadir un sujeto explícito.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  - lo divino
  lexicon: HALOT
  rationale: Aunque el hebreo plural admite «dioses», en español la formulación tradicional y más probable en este pasaje permite capitalizar «Dios» para mantener abierta la lectura de majestad/divinidad que el audit trail preserva en nota. Se conserva la tensión textual mediante la nota correspondiente.
- source_word: וַאֲנָשִׁים
  english_pob_choice: and men
  chosen_spanish: y los hombres
  alternatives_spanish:
  - y las personas
  - y la gente
  - y los seres humanos
  lexicon: HALOT
  rationale: Se conserva la pareja proverbial «Dios y los hombres» con un español claro y natural, respetando el paralelismo del original.
- source_word: וְהָלַכְתִּי
  english_pob_choice: and go
  chosen_spanish: y me iré
  alternatives_spanish:
  - y vaya
  - y iría
  - y marcharé
  lexicon: HALOT
  rationale: La secuencia retórica en español requiere una forma natural de futuro volitivo; «me iré» reproduce bien la intención de abandonar la función propia del olivo.
- source_word: לָנוּעַ
  english_pob_choice: to sway over
  chosen_spanish: a ondular
  alternatives_spanish:
  - a mecerme
  - a balancearme
  - a moverme de un lado a otro
  lexicon: HALOT
  rationale: El verbo describe un movimiento de vaivén aplicado aquí con ironía a una supuesta elevación sobre los árboles. «Ondular» conserva la imagen de movimiento y resulta idiomático en español.
- source_word: עַל הָעֵצִים
  english_pob_choice: over the trees
  chosen_spanish: sobre los árboles
  alternatives_spanish:
  - encima de los árboles
  - entre los árboles
  - por encima de los árboles
  lexicon: HALOT
  rationale: La preposición expresa posición por encima con matiz de dominio o preeminencia en la fábula. «Sobre los árboles» es fiel y natural.
theological_decisions:
- issue: Sentido de אֱלֹהִים en la cláusula de honor
  english_pob_reading: gods
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  - lo divino
  rationale: El audit trail inglés preserva una tensión interpretativa entre la pluralidad formal hebrea y la lectura tradicional singular. En español, «Dios» con nota permite mantener accesible la lectura tradicional sin borrar que el hebreo forma plural, dejando constancia de la alternativa 'dioses'.
  doctrine_reference: Translation philosophy §1 (primacía del texto original), §3 (preservar tensión documentada)
- issue: Imagen del aceite como medio de honor
  english_pob_reading: my oil, by which gods and men are honored
  chosen_spanish_reading: mi aceite, por el cual son honrados Dios y los hombres
  alternative_spanish_readings:
  - mi gordura
  - mi riqueza
  - mi abundancia
  rationale: El hebreo usa una expresión figurada para el rendimiento del olivo. En español, «mi aceite» comunica el referente cultural y litúrgico sin ocultar la imagen de fertilidad del árbol.
  doctrine_reference: Translation philosophy §2 (precisión léxica), §3 (no borrar la tensión lexical)
- issue: Rhetorical self-exhortation of the olive tree
  english_pob_reading: Should I stop ... and go ... ?
  chosen_spanish_reading: ¿Dejaré de producir ... y me iré ... ?
  alternative_spanish_readings:
  - ¿He de dejar de producir ...?
  - ¿Debería dejar de producir ...?
  rationale: La pregunta retórica en español necesita sonar natural sin suavizar el desafío implícito del texto. La forma elegida conserva el tono del discurso proverbial.
  doctrine_reference: Translation philosophy §2 (equivalencia óptima), §3 (preservar el tono del pasaje)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrigió la traducción de דִּשְׁנִי hacia «my oil». Por eso el texto español evita equivalentes abstractos como «riqueza» y opta por «mi aceite», manteniendo también la discusión documentada sobre אֱלֹהִים mediante nota. El resto sigue de cerca la solución estabilizada en el inglés POB.
  spanish_consistency_notes:
  - Se usa «olivo» para el personaje arbóreo, coherente con el registro bíblico y la imagen fábulaica.
  - Se mantiene «Dios» en mayúscula en el texto principal por la lectura tradicional preservada, pero la nota explicita la forma plural hebrea.
  - Se evita «Cristo», «SEÑOR» y otros sustitutos no presentes en el texto.
  - La voz retórica se mantiene en primera persona con futuro y pregunta, como exige el hebreo.
  - «Sobre los árboles» conserva la preposición relacional y la imagen de preeminencia.
