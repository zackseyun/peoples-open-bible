translation:
  language: es
  text: Y el aspecto de lo que yo vi era como el aspecto que había visto cuando vine[a] para destruir la ciudad, y las visiones eran como el aspecto que había visto junto al canal de Kebar[b]; y caí sobre mi rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando él vino para destruir la ciudad»; el hebreo dice «cuando yo vine», lo que puede reflejar la participación de Ezequiel en la visión de la destrucción de Jerusalén, más que una acción literal de su parte.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «el río Kebar»; probablemente se trataba de un canal importante en Babilonia más que de un río natural.'
    reason: cultural_note
lexical_decisions:
- source_word: מַרְאֶה / מַרְאוֹת
  english_pob_choice: appearance / visions
  chosen_spanish: aspecto / visiones
  alternatives_spanish:
  - apariencia / visiones
  - visión / visiones
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo de forma enfática y luego pasa del singular al plural. «Aspecto» funciona bien en español para la primera ocurrencia sin sonar artificial, y «visiones» conserva el plural explícito de מַרְאוֹת. «Apariencia» también es posible, pero «aspecto» ayuda a mantener el paralelismo y evita una repetición pesada.
- source_word: רָאִיתִי
  english_pob_choice: I saw / I had seen
  chosen_spanish: vi / había visto
  alternatives_spanish:
  - veía
  - había visto
  lexicon: HALOT
  rationale: El imperfecto perfecto en la comparación se expresa naturalmente en español con «había visto» para marcar anterioridad respecto del marco narrativo. En la primera cláusula, «vi» conserva la memoria directa de la visión.
- source_word: בְּבֹאִי
  english_pob_choice: when I came
  chosen_spanish: cuando vine
  alternatives_spanish:
  - cuando llegué
  - al venir
  lexicon: HALOT
  rationale: La forma temporal con sufijo de primera persona pide una expresión natural de entrada temporal. «Cuando vine» preserva la perspectiva en primera persona y la relación con la acción siguiente.
- source_word: לְשַׁחֵת
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para arruinar
  - para traer destrucción sobre
  lexicon: HALOT
  rationale: El valor verbal aquí es destructivo, no meramente genérico. «Para destruir» es directo y fiel al verbo; en español, el infinitivo con «para» fluye con naturalidad en la subordinada temporal explicativa.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Se conserva el sustantivo genérico como en el hebreo, sin explicitar Jerusalén en el cuerpo principal. Esto mantiene el registro sobrio y la referencia abierta del texto base.
- source_word: אֶל נְהַר כְּבָר
  english_pob_choice: by the Kebar Canal
  chosen_spanish: junto al canal de Kebar
  alternatives_spanish:
  - junto al río Kebar
  - en el canal de Kebar
  lexicon: HALOT
  rationale: La tradición inglesa de la POB opta por «canal» en lugar de «river» por precisión geográfica; en español se mantiene esa decisión. «Junto a» reproduce adecuadamente אֶל en este contexto y sugiere la localización sin forzar una dirección.
- source_word: וָאֶפֹּל אֶל פָּנַי
  english_pob_choice: and I fell on my face
  chosen_spanish: y me postré sobre mi rostro
  alternatives_spanish:
  - y caí sobre mi rostro
  - y caí rostro en tierra
  lexicon: HALOT
  rationale: El hebreo usa un modismo de reverencia y abrumamiento. «Me postré» comunica ese valor idiomático mejor que una calca dura, mientras «sobre mi rostro» preserva la imagen corporal del texto.
theological_decisions:
- issue: Agencia en 'cuando vine para destruir la ciudad'
  english_pob_reading: Retain the first-person wording without softening or reassigning agency.
  chosen_spanish_reading: 'Conservar la primera persona en el cuerpo del texto: «cuando vine para destruir la ciudad».'
  alternative_spanish_readings:
  - cuando él vino para destruir la ciudad
  - cuando vine y vi la ciudad destruida
  rationale: El hebreo masorético mantiene la primera persona, y la POB en inglés preserva esa tensión en lugar de resolverla. En español se conserva igual para no borrar la dificultad interpretativa ni anticipar una corrección que no está en el texto base.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB en inglés al reflejar «what I saw» como «lo que yo vi», y mantiene la secuencia temporal con «había visto» en las comparaciones. También conserva la nota sobre la posible lectura alternativa de la primera persona y la precisión geográfica de Kebar como canal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferida del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aplica aquí.
  - «Espíritu/espíritu» no aparece en este versículo.
  - Se evita explicitar «Jerusalén» en el cuerpo para respetar el sustantivo genérico del hebreo.
  - La puntuación y el orden sintáctico buscan ser publicables en español neutro sin perder la repetición enfática del original.
