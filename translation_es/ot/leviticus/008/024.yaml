translation:
  language: es
  text: Entonces hizo acercar a los hijos de Aarón, y Moisés puso parte de la sangre sobre el lóbulo[a] de la oreja derecha de ellos, sobre el pulgar de la mano derecha de ellos y sobre el dedo gordo del pie derecho de ellos. Luego Moisés salpicó la sangre contra el altar por todos lados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la punta de la oreja derecha de ellos». El término hebreo se refiere al extremo externo de la oreja; «lóbulo» es la forma más natural aquí.
    reason: lexical_alternative
  - marker: b
    text: O «arrojó» o «dio un salpicado ritual». El verbo hebreo describe lanzar la sangre en un acto sacrificial, más fuerte que un simple «rociar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: brought Aaron’s sons near
  chosen_spanish: hizo acercar
  alternatives_spanish:
  - presentó
  - trajo al frente
  lexicon: HALOT
  rationale: El hitpael/hiphil de קרב expresa llevar a alguien cerca o hacer que se acerque en un acto ritual. "Hizo acercar" conserva el movimiento concreto sin forzar un giro más técnico.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: Aaron’s sons
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  lexicon: HALOT
  rationale: En español, la construcción posesiva natural es la misma idea en forma analítica. "Hijos de Aarón" reproduce el parentesco sin añadir matiz interpretativo.
- source_word: מִן הַדָּם
  english_pob_choice: some of the blood
  chosen_spanish: parte de la sangre
  alternatives_spanish:
  - algo de la sangre
  - una porción de la sangre
  lexicon: HALOT
  rationale: El מן partitivo indica que no se aplicó toda la sangre. "Parte de la sangre" mantiene esa restricción de manera natural en español.
- source_word: תְּנוּךְ
  english_pob_choice: lobe
  chosen_spanish: lóbulo
  alternatives_spanish:
  - punta
  - extremo
  lexicon: HALOT
  rationale: En este contexto ritual, el término designa la parte externa/fleshy del oído. "Lóbulo" es la equivalencia española más clara y natural, como en la decisión inglesa auditada.
- source_word: אָזְנָם הַיְמָנִית
  english_pob_choice: their right ear
  chosen_spanish: su oreja derecha
  alternatives_spanish:
  - su oído derecho
  - la oreja derecha de ellos
  lexicon: HALOT
  rationale: El hebreo especifica el lado derecho, detalle que se conserva. "Oreja" comunica mejor el referente corporal concreto que "oído" en este rito.
- source_word: בֹּהֶן יָדָם
  english_pob_choice: the thumb of their right hand
  chosen_spanish: el pulgar de su mano derecha
  alternatives_spanish:
  - el dedo pulgar de su mano derecha
  lexicon: HALOT
  rationale: בֹּהֶן con "mano" significa pulgar. Se mantiene la referencia de la mano derecha para reflejar la simetría ritual del texto.
- source_word: בֹּהֶן רַגְלָם
  english_pob_choice: the big toe of their right foot
  chosen_spanish: el dedo gordo de su pie derecho
  alternatives_spanish:
  - el gran dedo del pie derecho
  - el dedo mayor del pie derecho
  lexicon: HALOT
  rationale: Con "pie", בֹּהֶן denota el dedo gordo/dedo mayor. "Dedo gordo" es el español más natural y preciso.
- source_word: וַיִּזְרֹק
  english_pob_choice: splashed
  chosen_spanish: salpicó
  alternatives_spanish:
  - arrojó
  - esparció
  - roció
  lexicon: HALOT
  rationale: El verbo sacrificial indica lanzar sangre con fuerza ritual sobre el altar; "salpicó" sigue la revisión inglesa auditada y comunica mejor la acción que un simple "roció".
- source_word: עַל הַמִּזְבֵּחַ סָבִיב
  english_pob_choice: against the altar all around
  chosen_spanish: contra el altar, alrededor
  alternatives_spanish:
  - sobre el altar, alrededor
  - alrededor del altar
  lexicon: HALOT
  rationale: La frase expresa contacto con el altar y distribución circundante. "Contra el altar, alrededor" preserva ambas ideas sin perder naturalidad en español.
theological_decisions:
- issue: Repetición ritual de la derecha en oreja, mano y pie
  english_pob_reading: Retain the repeated 'right' for ear, hand, and foot in the main text.
  chosen_spanish_reading: Conservar la repetición de "derecha" en oreja, mano y pie.
  alternative_spanish_readings:
  - Reducir la repetición por estilo
  - fusionar las menciones de lado derecho
  rationale: La repetición es parte del valor ceremonial del hebreo y no debe aplanarse por estilo. Mantenerla en español conserva la especificidad ritual de la consagración.
  doctrine_reference: Éxodo 29:20; Levítico 14:14
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el expediente inglés auditado. Se adoptó la decisión revisada de traducir el verbo sacrificial con un término más natural que refleje la acción ritual de la sangre sobre el altar, manteniendo además la alternativa léxica documentada en nota. También se preservó la repetición de los tres miembros corporales derechos, considerada semánticamente significativa.
  spanish_consistency_notes:
  - Se emplea "Yahvé" como forma preferida del nombre divino cuando aparezca en el contexto inmediato; en este versículo no se presenta.
  - '"Moisés" y "Aarón" siguen la forma estándar española de los nombres propios bíblicos.'
  - Se conserva el paralelismo de tres preposiciones y tres miembros corporales para reflejar la estructura ritual del hebreo.
