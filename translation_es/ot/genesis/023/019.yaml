translation:
  language: es
  text: Después de esto[a], Abrahán sepultó a Sara su esposa en la cueva del campo de Macpela, frente a Mamre (es decir, Hebrón), en la tierra de Canaán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «opuesto a Mamre». La expresión hebrea indica una ubicación delante de Mamre o en relación frontal con él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después
  - Luego de esto
  - Y después de esto
  lexicon: HALOT
  rationale: La expresión temporal marca transición narrativa. «Después de esto» conserva el valor secuencial de forma natural en español sin añadir información.
- source_word: קָבַר
  english_pob_choice: buried
  chosen_spanish: sepultó
  alternatives_spanish:
  - enterró
  - inhumó
  lexicon: HALOT
  rationale: El verbo básico significa ‘enterrar/sepultar’. «Sepultó» es claro, digno y adecuado al registro narrativo; mantiene la acción funeraria sin exceso de tecnicismo.
- source_word: אֶת שָׂרָה אִשְׁתּוֹ
  english_pob_choice: Sarah his wife
  chosen_spanish: a Sara, su esposa
  alternatives_spanish:
  - a Sara, la esposa de él
  - a Sara, mujer suya
  lexicon: HALOT
  rationale: Se conserva el objeto directo con el orden natural del español y la relación posesiva explícita. «Su esposa» mantiene el vínculo del hebreo sin introducir una repetición rígida.
- source_word: אֶל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - a
  - dentro de
  lexicon: HALOT
  rationale: Aunque la preposición puede ser literalmente ‘a/into’, aquí el español idiomático para el entierro es «en la cueva». Sigue el valor locativo asumido por la traducción inglesa auditada.
- source_word: מְעָרַת שְׂדֵה הַמַּכְפֵּלָה
  english_pob_choice: the cave of the field of Machpelah
  chosen_spanish: la cueva del campo de Macpela
  alternatives_spanish:
  - la cueva del campo de Machpelá
  - la cueva del terreno de Macpela
  lexicon: HALOT
  rationale: 'Se preserva la cadena constructa: cueva > campo > nombre propio. «Macpela» translitera el topónimo de manera usual en español bíblico sin traducirlo ni suavizar su estructura.'
- source_word: הַמַּכְפֵּלָה
  english_pob_choice: Machpelah
  chosen_spanish: Macpela
  alternatives_spanish:
  - Machpelá
  lexicon: HALOT
  rationale: Como nombre propio, se translitera. Se adapta la grafía al uso español con ‘Mac-’, manteniendo la identificación del lugar.
- source_word: עַל פְּנֵי מַמְרֵא
  english_pob_choice: facing Mamre
  chosen_spanish: frente a Mamre
  alternatives_spanish:
  - frente a
  - opuesto a Mamre
  - delante de Mamre
  lexicon: HALOT
  rationale: La expresión hebrea indica ubicación en relación espacial directa con Mamre. «Frente a» refleja esa relación de forma natural y conserva la alternativa interpretativa sin especificar indebidamente una dirección.
- source_word: הִוא חֶבְרוֹן
  english_pob_choice: that is, Hebron
  chosen_spanish: (es decir, Hebrón)
  alternatives_spanish:
  - que es Hebrón
  - o sea, Hebrón
  lexicon: HALOT
  rationale: 'El hebreo identifica el lugar: Mamre = Hebrón. «Es decir» mantiene la aclaración appositiva sin sobreexplicar el vínculo.'
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  - en la tierra de Canaan
  lexicon: HALOT
  rationale: Se conserva la fórmula geográfica formal «la tierra de Canaán», que corresponde al hebreo y al tono bíblico del pasaje.
translation_notes:
  revision_awareness: 'Se siguió el consenso del audit trail inglés: temporalidad simple, verbo funerario directo, cadena constructa preservada, topónimo transliterado, y la relación espacial de עַל פְּנֵי expresada con una alternativa de nota para no fijar en exceso un matiz direccional.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Macpela» se usa como topónimo coherente con español bíblico moderno; no se traduce como si fuera un sustantivo común.
  - «Hebrón» se escribe con tilde conforme a la ortografía española.
  - La puntuación appositiva entre paréntesis refleja la aclaración del original sin alterar el sentido.
