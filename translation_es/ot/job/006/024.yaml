lexical_decisions:
- source_word: הוֹרוּנִי
  english_pob_choice: Teach me
  chosen_spanish: Instrúyanme
  alternatives_spanish:
  - Enséñenme
  - Enséñenme ustedes
  lexicon: HALOT
  rationale: El verbo hifil de ירה admite el sentido de enseñar, instruir o dar dirección. «Instrúyanme» mantiene el tono correctivo y formal del ruego de Job, y en español conserva mejor la relación plural implícita con sus interlocutores.
- source_word: וַאֲנִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - entonces yo
  - y en cuanto a mí
  lexicon: conjunción simple
  rationale: 'Se conserva la conjunción explícita y el pronombre para mantener el énfasis: Job responde a la instrucción con su propia disposición a guardar silencio.'
- source_word: אַחֲרִישׁ
  english_pob_choice: will be silent
  chosen_spanish: callaré
  alternatives_spanish:
  - me callaré
  - estaré callado
  lexicon: HALOT
  rationale: El valor idiomático del verbo es guardar silencio. «Callaré» es natural en español y conserva la solemnidad del compromiso de Job; el pronombre reflexivo queda implícito por claridad estilística.
- source_word: וּמַה
  english_pob_choice: how
  chosen_spanish: en qué
  alternatives_spanish:
  - cómo
  - qué
  lexicon: HALOT
  rationale: Sigo la nota inglesa que entiende la expresión como una petición de especificación del error. En español, «en qué he errado» expresa mejor la idea de identificar el punto exacto de la falta que un simple «cómo».
- source_word: שָּׁגִיתִי
  english_pob_choice: I have gone astray
  chosen_spanish: he errado
  alternatives_spanish:
  - me he desviado
  - he ido por mal camino
  - me he extraviado
  lexicon: HALOT
  rationale: El verbo שׁגה incluye la idea de errar o desviarse. «He errado» mantiene la fuerza moral/jurídica del contexto de reproche, y evita una imagen demasiado física en un verso donde la pregunta principal es precisar la falta.
- source_word: הָבִינוּ לִי
  english_pob_choice: make me understand
  chosen_spanish: hagan que entienda
  alternatives_spanish:
  - háganme entender
  - explíquenmelo
  lexicon: HALOT
  rationale: El hifil de בין expresa causar entendimiento. «Hagan que entienda» preserva el valor causativo y refleja de manera directa la petición dirigida a los amigos.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el auditable inglés POB. La principal decisión de ajuste está en el segundo hemistiquio: la pregunta idiomática de וּמַה + שָׁגִיתִי se vierte como «en qué he errado», manteniendo la aclaración semántica documentada por la nota inglesa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo presente el nombre divino; este verso no lo contiene.
  - Se conserva el tono directo, plural y admonitorio del discurso de Job hacia sus interlocutores.
  - «Errado» se emplea aquí por su valor moral y relacional, coherente con la ambigüedad entre error y desviación señalada por el audit trail.
