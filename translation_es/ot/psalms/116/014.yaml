translation:
  language: es
  text: Cumpliré mis votos a Yahvé en presencia de todo su pueblo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pagaré mis votos a Yahvé». El verbo hebreo también puede significar «pagar» en el sentido de completar lo que uno ha prometido por voto.'
    reason: lexical_alternative
  - marker: b
    text: La partícula hebrea puede traducirse «sí», «ahora» o «ciertamente»; aquí añade énfasis al cumplimiento público de los votos.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְדָרַי
  english_pob_choice: my vows
  chosen_spanish: mis votos
  alternatives_spanish:
  - mis promesas votivas
  - los votos que hice
  lexicon: HALOT
  rationale: נֶדֶר designa un voto o promesa hecha ante Dios. En español, «votos» es el equivalente natural y fiel para el plural con sufijo de primera persona.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: El hebreo marca el destinatario del cumplimiento del voto con לַ־. Siguiendo el criterio del proyecto, el nombre divino se vierte como «Yahvé».
- source_word: אֲשַׁלֵּם
  english_pob_choice: I will fulfill
  chosen_spanish: cumpliré
  alternatives_spanish:
  - pagaré
  - retribuiré
  - saldaré
  lexicon: HALOT
  rationale: El verbo puede significar «pagar» o completar algo debido; aquí la idea idiomática es realizar plenamente lo prometido. «Cumpliré» preserva esa fuerza sin endurecer el español.
- source_word: נֶגְדָה נָּא
  english_pob_choice: in the presence of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - delante de
  - ante
  - ahora, delante de
  lexicon: HALOT
  rationale: נֶגֶד expresa publicamente estar frente a alguien; en español «en presencia de» comunica bien el matiz de testimonio público. La partícula נָא añade énfasis, no petición.
- source_word: לְכָל עַמּוֹ
  english_pob_choice: all his people
  chosen_spanish: todo su pueblo
  alternatives_spanish:
  - todo el pueblo de él
  - todos sus pueblos
  lexicon: HALOT
  rationale: La expresión identifica a la audiencia pública del voto cumplido. «Todo su pueblo» conserva el sentido colectivo y el posesivo de tercera persona.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En el español del POB se mantiene el nombre propio divino como «Yahvé» para preservar el término pactual y evitar el ocultamiento litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of נָא in the poetic line
  english_pob_reading: adds emphasis to the public fulfillment of the vows
  chosen_spanish_reading: añade énfasis a la publicidad del cumplimiento
  alternative_spanish_readings:
  - ahora
  - sí
  - por favor
  rationale: En este contexto נָא no funciona como ruego, sino como intensificador poético. Por eso no se traduce con un adverbio temporal ni con una fórmula de cortesía.
  doctrine_reference: HALOT s.v. נָא; POB audit trail on lexical emphasis
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «yes, before» por «in the presence of» para expresar נֶגְדָה־נָּא de forma más natural y formal. La redacción española sigue esa decisión y evita una lectura temporal de נָא.
  spanish_consistency_notes:
  - Se conserva «Yahvé» según la norma terminológica del proyecto para el nombre divino.
  - «Cumpliré» mantiene la idea idiomática de completar una obligación votiva sin reducirla a un simple acto de pago.
  - «En presencia de» refleja el carácter público del acto, coherente con el ajuste de revisión del audit trail.
  - No se añadió puntuación enfática adicional que altere la cadencia poética del verso.
