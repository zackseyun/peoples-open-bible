translation:
  language: es
  text: La persona codiciosa provoca contiendas[a], pero el que confía en Yahvé será enriquecido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'ancho de alma', un modismo para un apetito voraz o insaciable; también puede entenderse como 'el orgulloso' o 'el de gran apetito'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'será hecho gordo'; imagen hebrea de florecimiento, abundancia o bienestar.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְחַב נֶפֶשׁ
  english_pob_choice: a greedy person
  chosen_spanish: El de apetito insaciable
  alternatives_spanish:
  - la persona de alma ancha
  - el de alma ancha
  - el orgulloso
  - el de gran apetito
  lexicon: HALOT, BDB
  rationale: La expresión hebrea, literalmente 'ancho de alma', es idiomática y aquí describe una disposición de deseo voraz, no generosidad. En español, 'de apetito insaciable' comunica esa fuerza idiomática sin volver demasiado abstracto el proverbio.
- source_word: יְגָרֶה
  english_pob_choice: stirs up
  chosen_spanish: provoca
  alternatives_spanish:
  - incita
  - suscita
  - desata
  lexicon: HALOT, BDB
  rationale: El hiphil expresa causar o provocar conflicto. 'Provoca' es natural en español y conserva la idea de activar la contienda.
- source_word: מָדוֹן
  english_pob_choice: strife
  chosen_spanish: contiendas
  alternatives_spanish:
  - discordia
  - pleitos
  - querella
  lexicon: HALOT, BDB
  rationale: Es un término sapiencial de conflicto interpersonal. 'Contiendas' conserva un registro bíblico claro y recoge el matiz de disputa o conflicto.
- source_word: וּבֹטֵחַ
  english_pob_choice: but the one who trusts
  chosen_spanish: pero el que confía
  alternatives_spanish:
  - y el que confía
  - pero quien confía
  - y el que pone su confianza
  lexicon: HALOT, BDB
  rationale: El waw es adversativo dentro del paralelismo antitético. 'El que confía' mantiene el valor participial descriptivo y suena natural en español.
- source_word: עַל יְהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - sobre Yahvé
  lexicon: HALOT, BDB
  rationale: Aunque el hebreo usa 'sobre', con 'confiar' el español requiere 'en'. Se conserva además el nombre divino 'Yahvé' según la terminología del proyecto.
- source_word: יְדֻשָּׁן
  english_pob_choice: will be enriched
  chosen_spanish: será enriquecido
  alternatives_spanish:
  - prosperará
  - será prosperado
  - florecerá
  lexicon: HALOT, BDB
  rationale: El hebreo es pasivo y literalmente evoca la imagen de 'engordar' como figura de abundancia. 'Será enriquecido' refleja bien el pasivo y evita una paráfrasis excesiva, manteniendo la idea de prosperidad/florecimiento.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La pauta del proyecto pide 'Yahvé' en el texto principal para conservar el nombre del pacto sin ocultarlo mediante un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor representativo masculino en el primer miembro del proverbio
  english_pob_reading: a greedy person
  chosen_spanish_reading: el de apetito insaciable
  alternative_spanish_readings:
  - la persona de apetito insaciable
  - el hombre de apetito insaciable
  rationale: El hebreo es masculino singular y proverbial, pero en español el giro 'el de...' permite conservar el valor representativo sin forzar género específico. Se evita suavizar la dureza moral del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Imagen de abundancia en el pasivo final
  english_pob_reading: will be enriched
  chosen_spanish_reading: será enriquecido
  alternative_spanish_readings:
  - prosperará
  - florecerá
  - será engrandecido
  rationale: El pasivo hebreo y la metáfora de 'engordar' apuntan a abundancia o bienestar. 'Será enriquecido' conserva la imagen de incremento y el sentido resultante que la POB inglesa adoptó.
  doctrine_reference: HALOT, BDB
translation_notes:
  revision_awareness: La revisión inglesa reciente pasó de 'will prosper' a 'will be enriched' para reflejar más de cerca el pasivo hebreo, y de 'man' a 'person' por naturalidad. En español se optó por una solución representativa no marcada ('el de apetito insaciable') y por 'será enriquecido', que conserva el pasivo y la imagen de abundancia sin introducir un verbo demasiado interpretativo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se evita 'Señor' como sustituto del nombre divino.
  - '''Contiendas'' y ''será enriquecido'' preservan el tono sapiencial y el paralelismo antitético.'
  - Las notas [a] y [b] están ancladas en el texto para cumplir la trazabilidad solicitada.
