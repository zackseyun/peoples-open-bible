revisions:
- from: Mira[a], en esto no estás en lo correcto; yo te responderé, porque Dios es mayor que el hombre.
  to: Mira, en esto no tienes razón; te responderé, porque Dios es mayor que el hombre[a].
  rationale: 'Se ajusta la redacción a un español más natural y digno sin cambiar el sentido del hebreo: «no tienes razón» comunica mejor el valor argumentativo de לֹא צָדַקְתָּ. Se elimina la nota innecesaria sobre הֶן y se repone la alternativa léxica auditada para אֱנוֹשׁ («un mortal»), anclándola donde corresponde en el texto.'
