translation:
  language: es
  text: Y cuando oyeron la ley, separaron de Israel a toda la multitud mezclada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todos los de ascendencia mixta' o 'el grupo mezclado'. El hebreo עֵרֶב es un término colectivo para un grupo mixto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Entonces
  - Y aconteció
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce la siguiente acción narrativa; en español, una simple conjunción mantiene la secuencia con naturalidad y sin sobrecargar el texto.
- source_word: כְּשָׁמְעָם
  english_pob_choice: when they heard
  chosen_spanish: cuando oyeron
  alternatives_spanish:
  - al oír
  - así que oyeron
  lexicon: HALOT
  rationale: El valor temporal de כ + infinitivo con sufijo se expresa bien con 'cuando'. 'Oyeron' es un equivalente natural de 'heard' en este contexto público de lectura de la ley.
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: HALOT
  rationale: Aquí תּוֹרָה se refiere a la autoridad normativa leída al pueblo; 'la ley' comunica mejor ese sentido que 'Torá', que sería más técnico o menos transparente para lectores generales.
- source_word: וַיַּבְדִּילוּ
  english_pob_choice: they separated
  chosen_spanish: separaron
  alternatives_spanish:
  - se apartaron
  - expulsaron
  lexicon: HALOT
  rationale: בדל indica separar/dividir. En la construcción con מִיִּשְׂרָאֵל, el foco es la separación de un grupo respecto de Israel; 'separaron' conserva esa fuerza sin añadir una motivación no explicitada.
- source_word: עֵרֶב
  english_pob_choice: the mixed multitude
  chosen_spanish: todo el pueblo mezclado
  alternatives_spanish:
  - la multitud mezclada
  - el conjunto de mezcla
  - la mezcla de pueblos
  lexicon: HALOT
  rationale: עֵרֶב designa un grupo mixto o mezcla colectiva. 'Pueblo mezclado' transmite el carácter colectivo y humano del término en un español claro, aunque menos idiomático que 'multitud mezclada'; se mantiene el matiz de mezcla sin forzar una expresión demasiado arcaica.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - fuera de Israel
  lexicon: HALOT
  rationale: La preposición מן marca separación. 'De Israel' conserva el nombre propio y la relación de exclusión/separación con la comunidad, sin reemplazarlo por una paráfrasis interpretativa.
theological_decisions:
- issue: Sentido comunitario de Israel en un contexto de purificación postexílica
  english_pob_reading: Retain 'Israel' as the covenant-community term without paraphrasing or softening.
  chosen_spanish_reading: Conservar 'Israel' como designación de la comunidad del pacto, sin sustituirla por una forma más explicativa.
  alternative_spanish_readings:
  - de entre los israelitas
  - de la asamblea de Israel
  rationale: El hebreo usa el nombre propio יִשְׂרָאֵל, y el versículo describe una acción comunitaria en respuesta a la ley. Mantener 'Israel' preserva la identidad corporativa y pactal sin introducir interpretaciones posteriores.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo general con el control inglés es alto. Se mantuvo la decisión de leer תּוֹרָה como 'la ley' en el texto principal, pero en español se añadió una nota breve para conservar la posibilidad de 'Torá' como alternativa léxica sin desplazar el sentido contextual.
  spanish_consistency_notes:
  - Se mantuvo 'Israel' sin pluralizarlo ni convertirlo en 'israelitas', conforme al valor corporativo del hebreo.
  - '''La ley'' se usó como equivalente principal de תּוֹרָה por claridad litúrgica y narrativa.'
  - '''Pueblo mezclado'' busca una solución española legible para עֵרֶב, preservando la idea de mezcla colectiva; se reconoce que ''multitud mezclada'' es una alternativa más literal.'
  - No se empleó 'SEÑOR' ni 'Cristo', pues no aparecen en el versículo.
