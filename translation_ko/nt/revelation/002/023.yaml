  text: '또 그 여자의 자녀들을 죽음으로 죽이리라. 그러면 모든 회중이 내가 콩팥과 마음을 살피는 자[a]임을 알게 되리라. 또 나는 너희 각 사람에게 너희 행위에 따라 갚으리라.'
  philosophy: optimal-equivalence
  footnotes:
