    text: Or 'a wise saying.' The Greek λόγον σοφόν can refer to a wise utterance more broadly than a single word.
    reason: lexical_alternative
  - marker: b
    text: The expression 'add to it' likely means to build on the wise saying by contributing further insight.
    reason: lexical_alternative
  - marker: c
    text: The Greek for 'was displeased with it' is difficult; the sense in context is that he reacted negatively and dismissed what he heard.
    reason: alternative_reading
