translation:
  language: es
  text: 'Y él dijo[a]: «¿Por qué persigue mi señor así a su siervo? Pues ¿qué he hecho, y qué mal hay en mi mano?[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su siervo». Algunas traducciones suavizan la dirección directa y leen «tu siervo», pero el Texto Masorético tiene la forma en tercera persona.'
    reason: alternative_reading
  - marker: b
    text: «En mi mano» es un modismo hebreo para culpabilidad, intención o poder para hacer daño.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: Mantiene la introducción narrativa simple del wayyiqtol sin cargar la secuencia con una relación temporal más fuerte de la que exige el hebreo.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why is this / like this
  chosen_spanish: ¿Por qué ... así?
  alternatives_spanish:
  - ¿Por qué es esto...?
  - ¿Por qué entonces...?
  lexicon: HALOT
  rationale: La combinación expresa una queja interrogativa enfática; en español, ‘¿por qué ... así?’ comunica bien el valor idiomático de זֶּה sin volver la frase torpe.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi dueño
  lexicon: HALOT
  rationale: Aquí es un título de respeto dirigido a Saúl; ‘mi señor’ reproduce el valor cortesano sin confundirlo con un título divino.
- source_word: רֹדֵף אַחֲרֵי
  english_pob_choice: pursuing
  chosen_spanish: persigue
  alternatives_spanish:
  - va persiguiendo
  - va tras
  lexicon: HALOT
  rationale: El participio expresa persecución hostil continua; el presente ‘persigue’ es natural en español y conserva la acción sostenida.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: a este su siervo
  alternatives_spanish:
  - a su siervo
  - a este siervo
  lexicon: HALOT
  rationale: Se conserva la forma del texto masorético con el sufijo de tercera persona (‘su siervo’), siguiendo la nota inglesa sobre la lectura textual. ‘Siervo’ evita rebajar el matiz deferencial a una equivalencia más doméstica.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la segunda pregunta como explicación/racionalización del reclamo anterior; ‘Porque’ es la forma más directa y clara en español.
- source_word: מֶה עָשִׂיתִי
  english_pob_choice: what have I done
  chosen_spanish: ¿qué he hecho?
  alternatives_spanish:
  - ¿qué hice?
  - ¿qué he cometido?
  lexicon: HALOT
  rationale: La pregunta retórica se ajusta bien al pretérito perfecto compuesto en español, manteniendo la relevancia presente del acto cuestionado.
- source_word: וּמַה בְּיָדִי רָעָה
  english_pob_choice: and what evil is in my hand
  chosen_spanish: y qué maldad hay en mi mano
  alternatives_spanish:
  - y qué mal hay en mi mano
  - y qué culpa hay en mi mano
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea ‘en mi mano’, que alude a culpa, intención o capacidad de daño. ‘Maldad’ refleja la fuerza de רָעָה mejor que una reducción a ‘culpa’ o ‘mal’.
theological_decisions:
- issue: La expresión idiomática 'en mi mano' como culpabilidad o capacidad de hacer daño
  english_pob_reading: '''In my hand'' is a Hebrew idiom for culpability, intent, or power to do harm.'
  chosen_spanish_reading: '''en mi mano'' se mantiene literalmente como metáfora de culpa, intención o poder de dañar.'
  alternative_spanish_readings:
  - '''de mi parte'''
  - '''por mi mano'''
  - '''de lo que soy culpable'''
  rationale: El texto hebreo usa una imagen corporal que el POB inglés preserva. Traducirla literalmente permite que la nota explique su alcance idiomático sin borrar la tensión semántica.
  doctrine_reference: Uso idiomático semítico y responsabilidad moral en el discurso narrativo
- issue: La tercera persona posesiva en 'su siervo' frente a una posible normalización a 'tu siervo'
  english_pob_reading: Some translations read 'your servant' to smooth the direct address, but the Masoretic Text has the third-person form.
  chosen_spanish_reading: Se conserva 'su siervo' para reflejar la forma del texto masorético.
  alternative_spanish_readings:
  - '''tu siervo'''
  - '''este tu siervo'''
  rationale: La decisión sigue el dato textual documentado en la nota inglesa. En español, la forma de tercera persona puede sonar menos fluida, pero preserva la lectura recibida y su tensión sintáctica.
  doctrine_reference: Prioridad del testimonio textual masorético y transparencia traductológica
translation_notes:
  revision_awareness: La redacción inglesa revisada en el audit trail reordenó el inicio para hacer más natural 'Why is my lord... like this?' sin cambiar el contenido. La versión española sigue esa misma resolución, colocando '¿Por qué persigue mi señor ... así?' para mantener naturalidad sin perder el énfasis del hebreo ni la lectura textual de 'su siervo'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene 'siervo' para עבד en un contexto de deferencia cortesana, conforme al uso POB de no convertir automáticamente el término en 'esclavo' cuando el matiz dominante no es servidumbre forzada.
  - '''Maldad'' traduce רָעָה para conservar la fuerza semántica fuerte del término, evitando suavizarlo a ''mal'' cuando el español permite una forma más marcada.'
  - La puntuación y las comillas angulares siguen convenciones editoriales del español latinoamericano.
