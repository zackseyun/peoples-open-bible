base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/014/020.yaml
  text: In order to change the course of the matter[a], your servant Joab did this thing. But my lord is wise, with the wisdom of the angel of God[b], to know all that is in the land.
  footnotes:
  - marker: a
    text: Or 'turn the matter around' or 'alter the appearance of the matter.' The Hebrew idiom is literally 'change/turn the face of the matter.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all that is on the earth.' In context, 'the land' likely refers to the realm or country rather than the whole world.
    reason: lexical_alternative
