translation:
  language: es
  text: Para el director del coro[a][b][c]. Maskil de los hijos de Coré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Al director del coro». La preposición hebrea puede traducirse de ambas maneras en los encabezados de salmos.
    reason: alternative_reading
  - marker: b
    text: «Maskil» es un término técnico en los títulos de los salmos; su sentido exacto es incierto, con propuestas como «composición contemplativa» o «instructiva».
    reason: lexical_alternative
  - marker: c
    text: O «de los hijos de Coré». El encabezado puede indicar autoría, asociación o destinatarios/intérpretes.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al director del coro
  - Para el maestro de música
  - Para el líder
  lexicon: HALOT
  rationale: En los encabezados de salmos, la expresión funciona como una indicación musical/litúrgica. «Director del coro» comunica esa función de manera natural en español y conserva el matiz de destino o dedicación que el inglés POB expresó con «For». Se evita «SEÑOR» u otras paráfrasis que oscurecerían la función técnica.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - Un maskil
  - Un salmo contemplativo
  - Una composición instructiva
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado porque su sentido exacto sigue siendo incierto. Traducirlo como «contemplativo» o «instructivo» iría más allá de lo que el hebreo y la tradición de encabezados permiten afirmar con seguridad.
- source_word: לִבְנֵי
  english_pob_choice: of the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - para los hijos de
  - perteneciente a los hijos de
  - de la familia de
  lexicon: HALOT
  rationale: La preposición ל en los títulos salmódicos puede señalar autoría, asociación o destino para ejecución. «De los hijos de» preserva esa amplitud y sigue de cerca la construcción hebrea sin cerrar indebidamente la relación.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: HALOT
  rationale: Se usa la forma bíblica asentada en español, «Coré», que es idiomática y reconocible en lectura eclesial. Mantiene la referencia propia sin necesidad de transliterar el nombre en esta versión.
translation_notes:
  revision_awareness: El texto se mantiene alineado con el último pase de revisión, que indicó alta concordancia y ningún cambio necesario; no se introdujeron revisiones adicionales respecto del inglés POB auditado.
  spanish_consistency_notes:
  - Se preserva la ambigüedad funcional del encabezado hebreo en lugar de fijar autoría o función litúrgica exclusiva.
  - La terminología se mantiene sobria y publicable en español neutro, evitando calcos demasiado rígidos y también evitando sustituciones teológicas no sustentadas por el texto.
  - El nombre propio se adapta a la forma española tradicional «Coré», coherente con el uso bíblico en español.
