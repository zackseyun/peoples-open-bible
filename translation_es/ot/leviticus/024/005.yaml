translation:
  language: es
  text: Y tomarás flor de harina, y la hornearás para hacer con ella doce panes[b]; cada pan será de dos décimas[a] de un efa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “dos décimas”. En el lenguaje de medidas sacerdotales, esto significa dos décimas de un efa para cada pan.
    reason: cultural_note
  - marker: b
    text: O “doce tortas”. El término hebreo puede denotar unidades de pan horneado usadas en contextos rituales; “panes” se elige por mayor claridad en español actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: And you shall take
  chosen_spanish: Y tomarás
  alternatives_spanish:
  - Y has de tomar
  - Y deberás tomar
  lexicon: HALOT
  rationale: El hebreo encadena una instrucción cultual; en español, el futuro de mandato conserva bien el valor procedimental y la continuidad con el contexto.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina refinada
  lexicon: HALOT
  rationale: “Flor de harina” es el equivalente bíblico y cultual más natural en español para la harina refinada usada en ofrendas y panes rituales.
- source_word: וְאָפִיתָ אֹתָהּ
  english_pob_choice: and bake it into
  chosen_spanish: y la cocerás
  alternatives_spanish:
  - y la hornearás
  - y la cocerás hasta hacerla
  lexicon: HALOT
  rationale: El verbo hebreo indica cocer/hornear; en español “cocerás” funciona bien en registro bíblico para el preparado del pan, aunque “hornearás” es una alternativa moderna. El movimiento hacia el producto final queda implícito por el contexto.
- source_word: שְׁתֵּים עֶשְׂרֵה חַלּוֹת
  english_pob_choice: twelve loaves
  chosen_spanish: doce tortas
  alternatives_spanish:
  - doce panes
  - doce hogazas
  lexicon: HALOT
  rationale: חַלּוֹת designa unidades de pan aptas para uso ritual; “tortas” evita una lectura demasiado moderna de “hogazas” y permite mantener un término amplio y bíblicamente plausible.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  english_pob_choice: two-tenths of an ephah
  chosen_spanish: dos décimas de efa
  alternatives_spanish:
  - dos tentos de efa
  - dos décimas partes de un efa
  lexicon: HALOT
  rationale: Se conserva la medida literal del hebreo. Como en la nota inglesa, el sentido técnico es “dos décimas de un efa” para cada torta; en el texto principal se mantiene la forma breve y fiel.
- source_word: יִהְיֶה הַחַלָּה הָאֶחָת
  english_pob_choice: each loaf shall be
  chosen_spanish: cada torta será
  alternatives_spanish:
  - la torta una será
  - una torta será
  lexicon: HALOT
  rationale: El hebreo es distributivo; “cada torta será” expresa con naturalidad en español la aplicación de la medida a cada unidad sin perder el sentido singular distributivo.
theological_decisions:
- issue: Medida ritual de pan de la Presencia
  english_pob_reading: The bread units are rendered as loaves/cakes, with the measurement given per loaf.
  chosen_spanish_reading: Las unidades se expresan como “tortas”, con la medida distribuida a cada una.
  alternative_spanish_readings:
  - doce panes
  - doce tortas o panes
  rationale: 'No hay una decisión doctrinal controvertida aquí, pero sí una decisión terminológica cultual: mantener un término que suene bíblico y al mismo tiempo natural en español, sin ocultar la precisión de la medida.'
  doctrine_reference: Levítico 24:5; contexto del pan de la Presencia
- issue: Expresión de la medida en efa
  english_pob_reading: Literally, 'two tenths,' understood as two-tenths of an ephah per loaf.
  chosen_spanish_reading: “dos décimas de efa” conserva el literal hebreo; la distributividad queda en el contexto y en la nota implícita del patrón de medida.
  alternative_spanish_readings:
  - dos décimas de un efa
  - dos tentos por torta
  rationale: El texto hebreo usa un lenguaje de medida sacerdotal que conviene no diluir. La forma escogida preserva la tensión entre literalidad y claridad, y la aclaración distributiva se puede documentar en nota.
  doctrine_reference: Levítico 24:5; lenguaje sacerdotal de medidas
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta cambiar el sentido base. Por eso el borrador mantiene la estructura, pero ajusta el español para que sea publicable y fiel al hebreo: medida literal en el texto principal y aclaración cultural en nota.'
  spanish_consistency_notes:
  - Se usa “Yahvé” para el Tetragrámaton cuando aparezca en el contexto inmediato; en este versículo no aparece.
  - “Flor de harina” conserva el registro bíblico y cultual.
  - “Tortas” se eligió como equivalente amplio y ritual para חַלּוֹת, evitando una sobrelectura de pan doméstico moderno.
  - La nota explica la medida técnica sin reemplazar el texto principal con una paráfrasis extensa.
