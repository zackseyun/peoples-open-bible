  from: their possessors
  to: their perpetrators
  rationale: In Syriac, the word for 'lord/owner' (mara) is often used idiomatically
    in construct chains to denote the doer or author of an action (e.g., 'masters
    of offenses' = 'those who commit offenses'). Translating this literally as 'possessors'
    is awkward in English; 'perpetrators', 'authors', or 'those who committed them'
    better captures the intended meaning under optimal-equivalence.
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/021/012.job-77185.json
  category: mistranslation
  from: Even the former offenses
  to: For even the former things
  rationale: The Syriac text reads ܩܕܡܝܬܐ (qadmayatha), which means 'former things,'
    not 'former offenses.' Additionally, the conjunction ܓܝܪ (ger, 'for') is present
    in the source but missing in the draft.
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/021/012.job-77185.json
  category: lexical
  from: perpetrators
  to: possessors
  rationale: The previous revision changed 'possessors' to 'perpetrators' based on
    the mistranslation of 'former things' as 'offenses.' With the correction to 'former
    things,' the Syriac ܡܪܝܗܝܢ (marayhen, 'their lords/possessors') should be rendered
    as 'possessors' or 'authors,' as 'perpetrators' incorrectly implies a crime or
    offense.
