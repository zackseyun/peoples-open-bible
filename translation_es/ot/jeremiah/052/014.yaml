- from: Y todas las murallas de Jerusalén alrededor fueron derribadas por todo el ejército de los caldeos[a], que estaba con el capitán de la guardia[b].
  to: Y todas las murallas alrededor de Jerusalén fueron derribadas por todo el ejército de los caldeos[a], que estaba con el capitán de la guardia[b].
  rationale: Se reordenó 'alrededor' para reflejar de manera natural y fiel el valor adverbial de סָבִיב en español. También se limpió la redacción de la nota b sin cambiar su contenido lexical documentado.
