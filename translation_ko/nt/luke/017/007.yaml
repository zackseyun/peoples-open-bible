  text: Τίς δὲ ἐξ ὑμῶν δοῦλον ἔχων ἀροτριῶντα ἢ ποιμαίνοντα, ὃς εἰσελθόντι ἐκ τοῦ ἀγροῦ ἐρεῖ ⸀αὐτῷ· Εὐθέως παρελθὼν ἀνάπεσε,
base_translation:
  language: en
  yaml_path: translation/nt/luke/017/007.yaml
  text: But which of you[a], having a slave plowing or shepherding, will say to him when he has come in from the field[b], ‘Come at once and recline at the table’?
  footnotes:
  - marker: a
    text: Or 'servant' or 'bondservant' for 'slave' (Greek doulos).
    reason: alternative_reading
  - marker: b
    text: '''Recline at the table'' reflects the ancient custom of reclining for a meal; more loosely, ''sit down to eat.'''
    reason: cultural_note
translation:
  language: ko
  text: 여러분 중 누가 밭갈이하거나 양 치는 종을 두고 있을 때, 그가 들에서 돌아오면 그에게 「곧 와서 식사 자리에 앉으라」고 말하겠습니까?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλον
  english_pob_choice: slave
  chosen_korean: 종
  alternatives_korean:
  - 노예
  - 하인
  lexicon: BDAG
  rationale: 본 비유는 일상의 종-주인 관계를 가정한 비유적 그림으로, 매임의 신학적 무게보다 일하는 종의 일상 역할이 전경. 따라서 한국어 자연어 「종」을 채택. 빌립보서 1:1과 달리 매임을 강조할 필연성은 없다.
