translation:
  language: es
  text: Y David supo que Yahvé lo había establecido como rey sobre Israel[a], y que había exaltado su reino por el bien de su pueblo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el bien del pueblo de David, Israel», si el posesivo «su» se entiende como referido a David y no a Yahvé.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּדַע
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - reconoció
  lexicon: HALOT
  rationale: En español, "supo" comunica de modo natural el descubrimiento o reconocimiento de un hecho, sin perder el valor narrativo de ידע como conocimiento adquirido o reconocido. "Conoció" sonaría menos idiomático aquí; "reconoció" añade más interpretación.
- source_word: הֱכִינוֹ
  english_pob_choice: had established him
  chosen_spanish: lo había establecido
  alternatives_spanish:
  - lo había confirmado
  - lo había afianzado
  lexicon: HALOT
  rationale: La forma hifil de כון apunta a establecer, fijar o hacer firme. "Lo había establecido" conserva ese sentido en contexto real, con claridad y sin sobreparáfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en español como "Yahvé", siguiendo la política del proyecto y evitando la sustitución por un título.
- source_word: לְמֶלֶךְ
  english_pob_choice: as king
  chosen_spanish: como rey
  alternatives_spanish:
  - para rey
  - a rey
  lexicon: HALOT
  rationale: La preposición ל con el sustantivo de oficio expresa función o cargo; "como rey" es la equivalencia española más clara y fiel.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - por encima de Israel
  lexicon: HALOT
  rationale: En contexto monárquico, עַל señala autoridad y dominio. "Sobre Israel" reproduce bien esa relación de gobierno.
- source_word: נִשֵּׂא
  english_pob_choice: had exalted
  chosen_spanish: había exaltado
  alternatives_spanish:
  - había levantado
  - había elevado
  lexicon: HALOT
  rationale: El pasivo/perfecto de נשׂא en este contexto sugiere elevación o exaltación. "Había exaltado" conserva el matiz real y solemne.
- source_word: מַמְלַכְתּוֹ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su realeza
  - su reinado
  lexicon: HALOT
  rationale: '"Reino" es la opción más directa y abarcadora para ממלכה. "Reinado" sería posible, pero estrecha un poco más el alcance.'
- source_word: בַּעֲבוּר
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - a causa de
  - en favor de
  lexicon: HALOT
  rationale: La preposición expresa beneficio o propósito en favor de Israel. "Por amor de" es una forma española idiomática que mantiene el sentido de beneficio hacia el pueblo, sin implicar emoción subjetiva como requisito.
- source_word: עַמּוֹ יִשְׂרָאֵל
  english_pob_choice: his people Israel
  chosen_spanish: su pueblo Israel
  alternatives_spanish:
  - el pueblo de él, Israel
  - su pueblo, Israel
  lexicon: HALOT
  rationale: Se mantiene la estructura appositiva del hebreo y la ambigüedad del sufijo. Aunque la lectura más probable es que el posesivo remita a Yahvé, en español la forma "su pueblo Israel" preserva esa posibilidad sin recargar la frase.
theological_decisions:
- issue: Antecedente del posesivo en עַמּוֹ
  english_pob_reading: 'The suffix refers to the LORD: ''his people Israel.'''
  chosen_spanish_reading: 'El posesivo se entiende naturalmente como referido a Yahvé: ''su pueblo Israel''.'
  alternative_spanish_readings:
  - 'referirlo a David: ''su pueblo Israel'' = el pueblo de David'
  rationale: El contexto inmediato presenta a Yahvé como el sujeto que establece a David y exalta su reino. Por eso, el posesivo se entiende mejor como posesivo divino, manteniendo la intención teológica de que el reino de David sirve al pueblo de Yahvé.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la última revisión registrada: no hubo cambios necesarios en el texto base inglés; la versión española conserva la misma decisión interpretativa sobre el posesivo y adapta el registro a español natural.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva el tono narrativo sobrio y real de la frase, sin añadir explicaciones no presentes en el hebreo.
  - La nota al pie refleja la misma ambigüedad documentada en el audit trail inglés, adaptada al español sin resolverla artificialmente.
