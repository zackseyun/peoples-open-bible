    rationale: Aunque transmite bien la transición de וְעַתָּה y sigue la línea de 'So now', en español bíblico-natural 'Y ahora' o 'Ahora bien' suele sonar más fluido. No obstante, no es necesario forzar este ajuste para fidelidad.
