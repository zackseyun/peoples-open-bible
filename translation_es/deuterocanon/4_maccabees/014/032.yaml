translation:
  language: es
  text: ¡Oh naturaleza santa, y afectos[a] de los padres, y amor filial hacia los padres, y crianza, y pasiones indomables[b] de las madres!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “las ternuras de los padres”; el griego φίλτρα puede referirse literalmente a encantos amorosos, pero aquí más naturalmente alude a vínculos o afectos entrañables.
    reason: lexical_alternative
  - marker: b
    text: O “emociones indomables de las madres” o, menos probablemente en este contexto, “sufrimientos inconquistables de las madres”.
    reason: lexical_alternative
lexical_decisions:
- source_word: φύσις ἱερά
  english_pob_choice: sacred nature
  chosen_spanish: naturaleza santa
  alternatives_spanish:
  - naturaleza sagrada
  - santa naturaleza
  - vínculo natural sagrado
  lexicon: LSJ
  rationale: φύσις aquí conserva el sentido amplio de la naturaleza o el orden natural, y ἱερά eleva esa realidad con tono sacro. 'Naturaleza santa' mantiene la amplitud de 'nature' y el matiz reverente sin convertirlo en una frase más interpretativa como 'vínculo natural'.
- source_word: φίλτρα γονέων
  english_pob_choice: parents’ affections
  chosen_spanish: afectos de los padres
  alternatives_spanish:
  - amor de los padres
  - ternuras de los padres
  - los enderezos de los padres
  lexicon: LSJ
  rationale: φίλτρα puede sugerir afectos, ternuras o endearments; el contexto familiar favorece un término afectivo y no literalista. 'Afectos de los padres' comunica el vínculo emocional sin introducir una imagen extraña en español.
- source_word: γονεύσιν φιλοστόργε
  english_pob_choice: filial love toward parents
  chosen_spanish: amor filial hacia los padres
  alternatives_spanish:
  - ternura filial hacia los padres
  - afecto filial para con los padres
  - amor de hijo hacia los padres
  lexicon: LSJ
  rationale: La construcción con dativo expresa dirección 'hacia los padres'. 'Amor filial hacia los padres' conserva la reciprocidad afectiva del griego y resulta natural en español sin perder el tono retórico.
- source_word: τροφεῖα
  english_pob_choice: nurture
  chosen_spanish: crianza
  alternatives_spanish:
  - nurtura
  - crianza y alimento
  - cría
  lexicon: LSJ
  rationale: τροφεῖα abarca crianza, sustento y rearing. 'Crianza' es breve y cubre el acto de criar; en español suena más natural que 'nurtura' y evita estrechar el sentido solo a alimento.
- source_word: μητέρων ἀδάμαστα πάθη
  english_pob_choice: mothers’ unconquerable passions
  chosen_spanish: pasiones indomables de las madres
  alternatives_spanish:
  - emociones indomables de las madres
  - afectos indomables de las madres
  - sufrimientos indomables de las madres
  lexicon: LSJ
  rationale: πάθη puede ser pasiones, emociones o sufrimientos. Siguiendo el audit trail inglés, se preserva el valor emotivo-fuerte de 'passions' con 'pasiones', y ἀδάμαστα se vierte como 'indomables' para mantener la fuerza retórica.
theological_decisions:
- issue: Evitar moralizar o doctrinalizar πάθη
  english_pob_reading: Rhetorical invocation of natural family bonds and maternal affection
  chosen_spanish_reading: Invocación retórica de los vínculos familiares naturales y del afecto materno
  alternative_spanish_readings:
  - Invocación de los sufrimientos maternos
  - Invocación de las emociones familiares
  rationale: El pasaje no formula una tesis doctrinal, sino una exclamación apasionada. 'Pasiones' conserva la ambigüedad controlada del griego sin imponer el sentido de 'sufrimientos', que aquí es menos probable en contexto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del control cruzado y conserva las decisiones léxicas principales del expediente inglés, sin introducir cambios sustantivos respecto de la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene 'Dios' / 'Yahvé' y la terminología POB estable, aunque este versículo no contiene esos términos.
  - Se evita 'Cristo' porque no aparece en el texto fuente.
  - Se conserva el tono exclamativo con '¡Oh!' para reflejar el vocativo griego Ὦ.
  - '''Naturaleza'' se deja en singular abstracto para no reducir φύσις a un simple ''vínculo''.'
