revisions:
- from: 'Y Yahvé dijo a Josué: «Hoy he [a]quitado el oprobio de Egipto de sobre ustedes». Por eso se llamó Gilgal el nombre de aquel lugar[b], hasta el día de hoy.'
  to: 'Y Yahvé dijo a Josué[b]: «Hoy he hecho rodar lejos[a] el oprobio de Egipto de sobre ustedes». Por eso aquel lugar fue llamado Gilgal, hasta el día de hoy.'
  rationale: 'Se revisa para alinear mejor la traducción con la decisión léxica central del POB sobre גַּלּוֹתִי y para mejorar la naturalidad del español en la fórmula de nombramiento. También se corrigen los marcadores de nota: la nota léxica debe ir en la frase «he hecho rodar lejos» para explicar la relación con «Gilgal», y la nota sobre «el oprobio de Egipto» se conserva como alternativa léxica amplia sin cerrar la interpretación. La nota cultural se mantiene en «Josué», como en el POB inglés, ya que explica el juego con «Gilgal» que se desarrolla en la cita divina.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:35:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Yahvé habla a Josué, declara la remoción del «oprobio de Egipto», y el lugar recibe el nombre Gilgal hasta hoy. También conserva la amplitud interpretativa de חֶרְפַּת מִצְרַיִם y usa «Yahvé» conforme al proyecto. Sin embargo, debilita un rasgo importante del texto fuente y del POB inglés: גַּלּוֹתִי fue elegido en inglés como «I have rolled away» precisamente para preservar el juego verbal con «Gilgal». «He quitado» es comprensible, pero aplana demasiado esa conexión. Además, la redacción «se llamó Gilgal el nombre de aquel lugar» suena poco natural y desordenada en español.'
  spanish_quality_summary: 'El español es mayormente claro, pero presenta dos problemas de estilo/idioma: el espacio en «he [a]quitado» es incorrecto, y «Por eso se llamó Gilgal el nombre de aquel lugar» no suena idiomático; lo natural sería «Por eso aquel lugar fue llamado Gilgal» o «Por eso se llamó a aquel lugar Gilgal». También conviene ajustar la nota del juego de palabras para corresponder con la nueva formulación del texto principal.'
  glossary_alignment: Hay buena alineación con la terminología del proyecto en «Yahvé», «Josué» y «oprobio». No obstante, la decisión para גַּלּוֹתִי debería acercarse más a «he hecho rodar» o «he hecho rodar lejos» para respetar la rationale documentada del POB inglés, dejando la naturalidad española apoyada por nota si hace falta. «De sobre ustedes» preserva bien מֵעֲלֵיכֶם, aunque «de encima de ustedes» también sería más idiomático; no es necesario cambiarlo.
  issues:
  - severity: medium
    issue: La traducción de גַּלּוֹתִי como «he quitado» debilita el juego de palabras con «Gilgal».
    rationale: El expediente inglés documenta como decisión significativa preservar el sentido de «roll away». En español no hace falta calcar torpemente, pero sí conviene acercarse más a «he hecho rodar lejos» para mantener mejor la relación sonora/semántica con «Gilgal».
  - severity: medium
    issue: «se llamó Gilgal el nombre de aquel lugar» es poco natural en español.
    rationale: Aunque intenta reflejar la fórmula hebrea de nombramiento, el resultado suena invertido y tosco. Una reformulación como «aquel lugar fue llamado Gilgal» transmite el mismo sentido con claridad y dignidad.
  - severity: low
    issue: El anclaje de nota «he [a]quitado» está mal espaciado.
    rationale: En el formato exigido, el marcador debe ir pegado al término o frase correspondiente sin romper la palabra de manera antinatural.
  revised_spanish_text: 'Y Yahvé dijo a Josué[b]: «Hoy he hecho rodar lejos[a] el oprobio de Egipto de sobre ustedes». Por eso aquel lugar fue llamado Gilgal, hasta el día de hoy.'
  revised_footnotes:
