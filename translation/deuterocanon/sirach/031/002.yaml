translation:
  text: Like one who grasps at a shadow and pursues the wind, so is one who clings to dreams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Hebrew witness aligned here in Kahana reads a substantially different line: ''An evil faithful one will stir up reproach, and one who conceals a secret is a friend like oneself.'' Because the Hebrew and Greek do not match at this verse reference, the main text follows the Greek witness for 31:2.'
    reason: textual_variant
  - marker: b
    text: Or 'one who pays attention to dreams' or 'one who holds fast to dreams.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: Like
  alternatives:
  - As
  lexicon: LSJ
  rationale: Introduces a simile. 'Like' is natural modern English and preserves the comparative force.
- source_word: δρασσόμενος
  chosen: grasps at
  alternatives:
  - seizes
  - catches hold of
  lexicon: LSJ
  rationale: The participle conveys attempting to take hold of something elusive. 'Grasps at' captures both the reaching action and the futility in context better than the more successful-sounding 'seizes'.
- source_word: σκιᾶς
  chosen: a shadow
  alternatives:
  - shade
  lexicon: LSJ
  rationale: '''Shadow'' is the straightforward sense and fits the image of insubstantiality.'
- source_word: διώκων
  chosen: pursues
  alternatives:
  - chases
  - runs after
  lexicon: LSJ
  rationale: Retains the active, ongoing sense of pursuit in a concise literary register.
- source_word: ἄνεμον
  chosen: the wind
  alternatives:
  - wind
  lexicon: LSJ
  rationale: The object of pursuit is intangible; 'the wind' is idiomatic in English and preserves the proverbial image.
- source_word: ὁ ἐπέχων
  chosen: one who clings to
  alternatives:
  - one who gives attention to
  - one who holds fast to
  - one who relies on
  lexicon: LSJ
  rationale: The verb can mean to hold onto or attend to. In this simile about futile attachment, 'clings to' best conveys misplaced dependence on dreams.
- source_word: ἐνυπνίοις
  chosen: dreams
  alternatives:
  - dream-visions
  - dreams seen in sleep
  lexicon: LSJ
  rationale: The plural refers to dreams. 'Dreams' is clear and sufficient without over-specifying.
