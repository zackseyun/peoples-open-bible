translation:
  language: es
  text: 'Y dirán al dueño de la casa[a]: «El Maestro te dice: “¿Dónde está el cuarto de huéspedes donde pueda comer la Pascua con mis discípulos?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lugar para alojarse». El griego κατάλυμα se refiere a un lugar para hospedarse o a una habitación para invitados; aquí no significa específicamente «posada», y «cuarto alto» se añade solo en el versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ οἰκοδεσπότῃ τῆς οἰκίας
  english_pob_choice: the master of the house
  chosen_spanish: el dueño de la casa
  alternatives_spanish:
  - el señor de la casa
  - el jefe de la casa
  - el amo de la casa
  lexicon: BDAG
  rationale: οἰκοδεσπότης designa al cabeza o responsable del hogar. En español, «dueño de la casa» comunica con naturalidad la autoridad y pertenencia del contexto doméstico. Se evita «amo», que puede sonar demasiado duro o generar una connotación social no necesaria aquí, y «jefe» suena menos idiomático en este marco.
- source_word: ὁ διδάσκαλος
  english_pob_choice: The Teacher
  chosen_spanish: El Maestro
  alternatives_spanish:
  - el maestro
  - el profesor
  - el Rabí
  lexicon: BDAG
  rationale: διδάσκαλος funciona aquí como título de Jesús en discurso directo. «Maestro» es la forma española natural para un título respetuoso y mantiene la función titulativa sin depender del préstamo tradicional «Rabí», que el griego no usa en este versículo.
- source_word: τὸ κατάλυμα
  english_pob_choice: guest room
  chosen_spanish: el cuarto de huéspedes
  alternatives_spanish:
  - la habitación de huéspedes
  - el aposento
  - el lugar para hospedarse
  lexicon: BDAG
  rationale: κατάλυμα puede significar un lugar de alojamiento o un cuarto para invitados. Dado el entorno doméstico del relato, «cuarto de huéspedes» expresa bien la idea de una habitación preparada para recibir invitados y evita la lectura errónea de «posada/mesón». También deja abierta la relación con la mención del «cuarto alto» en el verso siguiente sin introducirla en este versículo.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pésaj
  - la Pascua judía
  - la cena de Pascua
  lexicon: BDAG
  rationale: El término griego nombra la fiesta/celebración pascual. En español bíblico, «la Pascua» es el equivalente natural y reconocible. Se evita «cena de Pascua» porque añade una especificación que el griego aquí no obliga, aunque el contexto incluya comerla.
- source_word: μετὰ τῶν μαθητῶν μου
  english_pob_choice: with my disciples
  chosen_spanish: con mis discípulos
  alternatives_spanish:
  - con mis estudiantes
  - con mis seguidores
  lexicon: BDAG
  rationale: μαθητής en los evangelios designa a discípulos en sentido relacional y formativo, no meros alumnos escolares. «Discípulos» preserva ese valor técnico y eclesial sin diluirlo en un término más general.
- source_word: φάγω
  english_pob_choice: I may eat
  chosen_spanish: pueda comer
  alternatives_spanish:
  - coma
  - voy a comer
  - pueda cenar
  lexicon: BDAG
  rationale: 'El aoristo subjuntivo en la pregunta indirecta expresa finalidad o posibilidad contemplada: «dónde pueda comer». «Pueda comer» conserva esa fuerza sin forzar un futuro en español. Se evita «cenar» porque el verbo griego es genérico («comer»), aunque el contexto sea la Pascua.'
- source_word: ἐρεῖτε
  english_pob_choice: you will say
  chosen_spanish: dirán
  alternatives_spanish:
  - ustedes dirán
  - les dirán
  - hablarán
  lexicon: BDAG
  rationale: El futuro indicativo funciona como instrucción anticipada sobre lo que los discípulos dirán. En español, «dirán» suena natural en esta fórmula indirecta. Se omite el sujeto explícito porque el contexto lo deja claro y el español admite esteipsis sin pérdida de sentido.
theological_decisions:
- issue: Título aplicado a Jesús en discurso directo
  english_pob_reading: The Teacher
  chosen_spanish_reading: El Maestro
  alternative_spanish_readings:
  - el maestro
  - Rabí
  rationale: El pasaje presenta a Jesús mediante un título funcional, no como nombre propio. Traducirlo como «Maestro» mantiene la transparencia del título y evita introducir una forma litúrgica o extranjera que el griego no requiere. La mayúscula inicial refleja su uso titular en el contexto directo.
  doctrine_reference: Translation philosophy §2 (traducir títulos; transliterar nombres)
- issue: Sentido de κατάλυμα sin introducir una localización posterior
  english_pob_reading: guest room
  chosen_spanish_reading: cuarto de huéspedes
  alternative_spanish_readings:
  - aposento
  - habitación de huéspedes
  - posada
  rationale: El texto solo pregunta por el lugar para alojarse/comer, no por el «cuarto alto» del versículo siguiente. «Cuarto de huéspedes» conserva la vaguedad útil del griego y evita cerrar prematuramente el sentido con una identificación arquitectónica que todavía no aparece en este versículo.
  doctrine_reference: Translation philosophy §3 (no añadir detalles no presentes en el versículo)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés: conserva la estructura de mandato indirecto, traduce οἰκοδεσπότης con un término doméstico natural en español, mantiene διδάσκαλος como título y evita introducir «aposento alto» en este versículo, tal como indica la revisión inglesa. Se ha ajustado el registro para que suene publicable en español sin perder la tensión lexical de κατάλυμα.'
  spanish_consistency_notes:
  - Se mantiene «Maestro» para διδάσκαλος como título en discurso directo.
  - Se usa «discípulos» de manera consistente para μαθηταί.
  - Se traduce πάσχα como «Pascua» y no como «Pésaj» para un registro bíblico broadly readable.
  - La nota al pie preserva la alternativa léxica principal de κατάλυμα y evita la lectura errónea de «posada».
