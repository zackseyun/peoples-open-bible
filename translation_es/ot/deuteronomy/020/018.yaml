translation:
  language: es
  text: para que no les enseñen a hacer conforme a todas sus abominaciones que ellos hicieron a sus dioses[a], y pequen contra Yahvé, el Dios de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para sus dioses».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן אֲשֶׁר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: La construcción introduce propósito/resultación; en español, «para que» expresa de manera natural la finalidad preventiva sin perder el valor causal de la cláusula.
- source_word: יְלַמְּדוּ
  english_pob_choice: they may not teach
  chosen_spanish: no les enseñen
  alternatives_spanish:
  - no instruyan
  - no enseñen
  lexicon: HALOT
  rationale: El piel de למד mantiene el sentido básico de enseñar; el subjuntivo con negación en español comunica bien la prevención. «Les» conserva el objeto directo humano del hebreo.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - los
  lexicon: HALOT
  rationale: El hebreo dirige la acción a Israel en plural; en español, la forma átona plural adecuada en este contexto es «les» dentro de la perífrasis verbal con subjuntivo.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: a hacer
  alternatives_spanish:
  - para hacer
  - hacer
  lexicon: HALOT
  rationale: Después de «enseñar» y con valor final, «a hacer» suena natural y conserva la relación verbal directa del infinitivo.
- source_word: כְּכֹל
  english_pob_choice: according to all
  chosen_spanish: conforme a todas
  alternatives_spanish:
  - según todas
  - de acuerdo con todas
  lexicon: HALOT
  rationale: «Conforme a» preserva la idea de conformidad normativa del hebreo; se añade «todas» para reflejar el alcance total de la expresión.
- source_word: תּוֹעֲבֹתָם
  english_pob_choice: their abominations
  chosen_spanish: sus abominaciones
  alternatives_spanish:
  - sus prácticas abominables
  - sus cosas detestables
  lexicon: HALOT
  rationale: «Abominaciones» preserva el peso moral y cultual del término תועבה y mantiene coherencia con el repertorio bíblico sin suavizarlo.
- source_word: אֲשֶׁר עָשׂוּ
  english_pob_choice: that they have done
  chosen_spanish: que ellos hicieron
  alternatives_spanish:
  - que han hecho
  - que practicaron
  lexicon: HALOT
  rationale: El hebreo describe acciones ya realizadas; «hicieron» es directo y no sobreinterpreta el tiempo perfecto. Se mantiene el sujeto explícito para claridad.
- source_word: לֵאלֹהֵיהֶם
  english_pob_choice: for their gods
  chosen_spanish: para sus dioses
  alternatives_spanish:
  - a sus dioses
  - en honor de sus dioses
  lexicon: HALOT
  rationale: La preposición ל admite matiz direccional/cultual; siguiendo el flujo del verso y la nota inglesa, «para sus dioses» conserva la ambigüedad cultual sin cerrarla excesivamente.
- source_word: וַחֲטָאתֶם
  english_pob_choice: and you would sin
  chosen_spanish: y así pequen
  alternatives_spanish:
  - y pequen
  - y entonces pequen
  lexicon: HALOT
  rationale: El waw final expresa consecuencia. En español, «y así» hace explícita la relación lógica sin añadir contenido nuevo; el subjuntivo encaja con la finalidad preventiva.
- source_word: לַיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - ante Yahvé
  - para con Yahvé
  lexicon: HALOT
  rationale: Con חטא, el destinatario ofendido se expresa naturalmente con «contra» en español. Se conserva el nombre divino «Yahvé» según el estándar del proyecto.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - el Dios de ustedes
  lexicon: HALOT
  rationale: En español neutro latinoamericano, «su Dios» evita un posesivo demasiado marcado por segunda persona plural regional y mantiene la relación pactual en apposición con Yahvé.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton de manera directa; conforme al estándar del proyecto en español, se traduce con «Yahvé» para mantener visible el nombre del pacto y no enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación semántica de חטא con el destinatario divino
  english_pob_reading: sin against Yahweh
  chosen_spanish_reading: pequen contra Yahvé
  alternative_spanish_readings:
  - pequen a Yahvé
  - pecarían frente a Yahvé
  rationale: El hebreo permite el sentido de ofender al destinatario; «pequen contra» es la forma más clara y natural en español para mantener esa carga relacional.
  doctrine_reference: Lexical/theological handling of חטא with preposition ל in biblical usage
- issue: Valor cultual de לֵאלֹהֵיהֶם
  english_pob_reading: for their gods
  chosen_spanish_reading: para sus dioses
  alternative_spanish_readings:
  - a sus dioses
  - en honor de sus dioses
  rationale: La preposición puede señalar dirección o referencia cultual. Se opta por «para» porque preserva la ambigüedad funcional del hebreo y se alinea con la lectura auditada en inglés.
  doctrine_reference: Cultic dative / directional ל in Hebrew
translation_notes:
  revision_awareness: 'La redacción inglesa revisada eliminó el segundo «so» antes de la consecuencia final; la versión española también evita duplicar marcadores causales y mantiene una sola secuencia lógica: finalidad preventiva → consecuencia de pecado.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» conforme al estándar del proyecto, no «SEÑOR».
  - «Abominaciones» se mantiene para conservar la gravedad léxica y cultual de תועבות.
  - La fórmula «contra Yahvé su Dios» conserva la relación pactual y el objeto ofendido del verbo pecar.
  - El tono es bíblico moderno, sin arcaísmos innecesarios, pero sin suavizar la fuerza moral del texto.
