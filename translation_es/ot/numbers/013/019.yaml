translation:
  language: es
  text: ¿Cómo es la tierra en la que habita? ¿Es buena o mala? ¿Y cómo son las ciudades en las que habita? ¿Están en campamentos[a] o en fortificaciones?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en asentamientos ... en fortalezas». El hebreo contrasta asentamientos de tipo campamento con lugares fortificados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָה
  english_pob_choice: And what ... like
  chosen_spanish: ¿Cómo es ...?
  alternatives_spanish:
  - ¿Y qué ...?
  - ¿Y cómo ...?
  lexicon: HALOT
  rationale: El hebreo pregunta por la condición o clase de la tierra y de las ciudades; en español, «¿Cómo es...?» comunica de forma natural esa indagación sobre cualidad sin volverla una paráfrasis excesiva.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: «Tierra» conserva el valor geográfico amplio de הארץ en el contexto del reconocimiento; «país» puede sonar moderno-administrativo y «región» estrecha demasiado el sentido.
- source_word: אֲשֶׁר הוּא יֹשֵׁב בָּהּ
  english_pob_choice: in which it dwells
  chosen_spanish: en la que habita
  alternatives_spanish:
  - donde habita
  - en la que vive
  lexicon: HALOT
  rationale: El sujeto colectivo se mantiene implícito como en la revisión inglesa («it dwells»); «habita» conserva mejor el matiz de residencia/ocupación estable que «vive», y funciona bien con el referente colectivo.
- source_word: הֲטוֹבָה הִוא אִם רָעָה
  english_pob_choice: Is it good or bad?
  chosen_spanish: es buena o mala
  alternatives_spanish:
  - es buena o mala
  - es fértil o pobre
  lexicon: HALOT
  rationale: Se preserva la evaluación amplia del hebreo. «Buena o mala» evita restringir el contraste a fertilidad agrícola, aunque tal matiz pueda estar incluido contextualmente.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los poblados
  - las plazas fuertes
  lexicon: HALOT
  rationale: «Ciudades» corresponde al contraste con campamentos y fortificaciones y mantiene la formulación más directa y reconocible.
- source_word: הַבְּמַחֲנִים
  english_pob_choice: in camps
  chosen_spanish: en campamentos
  alternatives_spanish:
  - en campamentos
  - en encampamentos
  lexicon: HALOT
  rationale: El hebreo contrasta asentamientos de tipo campamento con lugares fortificados. «Campamentos» transmite mejor en español moderno ese carácter provisional o no fortificado que una traducción demasiado técnica o arcaica.
- source_word: בְּמִבְצָרִים
  english_pob_choice: in fortifications
  chosen_spanish: en fortificaciones
  alternatives_spanish:
  - en fortalezas
  - en plazas fuertes
  lexicon: HALOT
  rationale: «Fortificaciones» conserva el sentido defensivo de מבצר y reproduce bien el contraste con campamentos; «fortalezas» sería posible, pero algo más interpretativo y menos paralelo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el packet hebreo y el audit trail inglés, incluyendo el sujeto colectivo implícito reflejado por «habita». Se conserva el contraste semántico entre campamentos y fortificaciones sin suavizarlo ni reemplazar la terminología por vocabulario eclesiástico tradicional.
  spanish_consistency_notes:
  - Se usa «la tierra» para הארץ, coherente con el registro bíblico y con el reconocimiento de Canaán.
  - Se mantiene «habita» en ambas cláusulas para reflejar la repetición del hebreo y el sujeto colectivo implícito.
  - Se emplea «campamentos»/«fortificaciones» como pares contrastivos claros y auditables, con nota alternativa para posibles equivalentes.
