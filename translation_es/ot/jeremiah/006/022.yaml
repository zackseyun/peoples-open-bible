    rationale: הִנֵּה introduce atención solemne ('he aquí', 'miren', 'vean'), pero en este registro profético 'Miren' suena más coloquial y pluralizado de lo que pide el hebreo. 'He aquí' preserva mejor la fuerza literaria y la dignidad.
  - severity: medium
    issue: '''es despertada'' para יֵעוֹר'
    rationale: Aunque עור puede significar 'despertar', en este contexto de movilización nacional el sentido es 'ser levantado/ser suscitado/ser avivado para la acción'. 'Es despertada' en español suena demasiado literal y menos idiomático.
  - severity: low
    issue: '''una nación grande'' suena menos natural que ''una gran nación'''
    rationale: Ambas son posibles, pero 'una gran nación' es la colocación más natural y digna en español bíblico moderno sin perder el adjetivo atributivo.
  revised_spanish_text: 'Así dice Yahvé: He aquí, un pueblo viene de la tierra del norte, y una gran nación es levantada desde los confines[a] de la tierra.'
