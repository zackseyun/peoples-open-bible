review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: participio sustantivado (''El que presenta''), los objetos dobles (''la sangre ... y la grasa''), la selección dentro del grupo sacerdotal (''de entre los hijos de Aarón''), la asignación legal (''le corresponderá'') y la porción final. También preserva correctamente la alternativa léxica para הַשְּׁלָמִים en nota.'
  spanish_quality_summary: La frase es comprensible, pero el orden actual suena algo trabado en español porque inserta 'de entre los hijos de Aarón' entre el segundo objeto y la cláusula principal. Además, 'pierna derecha' no sigue la decisión léxica auditada ni la referencia más precisa de שׁוֹק en este contexto sacrificial; 'muslo derecho' es más fiel y natural en registro bíblico-digno.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. ''hijos de Aarón'' y ''sacrificios de paz'' están bien alineados. El punto a corregir es שׁוֹק הַיָּמִין: la POB inglesa documenta ''right thigh'', y el español debe reflejar esa precisión con ''muslo derecho'', no ''pierna derecha''.'
  issues:
  - severity: medium
    issue: שׁוֹק הַיָּמִין fue traducido como 'la pierna derecha' en lugar de 'el muslo derecho'.
    rationale: El expediente inglés auditado eligió 'the right thigh' explícitamente frente a 'leg' por precisión anatómica y sacrificial. 'Pierna' amplía indebidamente el referente.
  - severity: low
    issue: El orden sintáctico de 'de entre los hijos de Aarón' resulta poco natural en español.
    rationale: Aunque no es inexacto, su colocación intermedia entorpece la lectura. Reubicarlo cerca de 'El que' refleja mejor 'among the sons of Aaron who...' y mejora la fluidez sin cambiar el sentido.
  revised_spanish_text: El que, de entre los hijos de Aarón, presenta la sangre de los sacrificios de paz[a] y la grasa, a él le corresponderá el muslo derecho como su porción.
  revised_footnotes:
  - marker: a
    text: O «los sacrificios de comunión».
    reason: lexical_alternative
  revision_rationale: Se revisa 'pierna derecha' a 'muslo derecho' para ajustarse a la precisión léxica de שׁוֹק y al razonamiento auditado en inglés. También se mejora el orden de la oración para una lectura más natural en español sin alterar la estructura legal-ritual del original. Se conserva la nota alternativa para שְׁלָמִים.
