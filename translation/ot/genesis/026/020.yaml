id: GEN.26.20
reference: Genesis 26:20
source:
  edition: WLC
  text: וַ/יָּרִ֜יבוּ רֹעֵ֣י גְרָ֗ר עִם רֹעֵ֥י יִצְחָ֛ק לֵ/אמֹ֖ר לָ֣/נוּ הַ/מָּ֑יִם וַ/יִּקְרָ֤א שֵֽׁם הַ/בְּאֵר֙ עֵ֔שֶׂק כִּ֥י הִֽתְעַשְּׂק֖וּ עִמּֽ/וֹ־־׃
translation:
  text: Then the shepherds of Gerar quarreled with Isaac’s shepherds[a], saying, “The water is ours.” So he named the well Esek, because they had quarreled with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esek sounds like the Hebrew word for 'contention' or 'dispute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרִיבוּ
  chosen: quarreled
  alternatives:
  - contended
  - disputed
  - strove
  lexicon: HALOT
  rationale: From ריב, denoting strife or dispute. 'Quarreled' is natural modern English and fits the interpersonal conflict over the well without sounding archaic.
- source_word: רֹעֵי גְרָר
  chosen: the shepherds of Gerar
  alternatives:
  - the herdsmen of Gerar
  lexicon: HALOT
  rationale: רֹעִים can refer to those tending flocks/herds. 'Shepherds' is the more direct and common rendering in this patriarchal context.
- source_word: עִם רֹעֵי יִצְחָק
  chosen: with Isaac’s shepherds
  alternatives:
  - with Isaac's herdsmen
  lexicon: HALOT
  rationale: Maintains the parallel structure with the first phrase and uses standard English possessive style.
- source_word: לֵאמֹר לָנוּ הַמָּיִם
  chosen: saying, “The water is ours.”
  alternatives:
  - saying, “The water belongs to us.”
  - saying, “The water is for us.”
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical but idiomatic: literally ''to us the water.'' ''The water is ours'' best captures the possessive claim in clear English.'
- source_word: וַיִּקְרָא שֵׁם הַבְּאֵר
  chosen: So he named the well
  alternatives:
  - And he called the name of the well
  - And he named the well
  lexicon: HALOT
  rationale: Hebrew idiom 'called the name of' is naturally rendered 'named.' 'So' reflects the narrative consequence relation.
- source_word: עֵשֶׂק
  chosen: Esek
  alternatives:
  - Contention
  - Dispute
  lexicon: HALOT
  rationale: As the name of the well, it should be transliterated per the translation philosophy for personal/place names. Its meaning is preserved by context and can be clarified in a footnote.
- source_word: כִּי הִתְעַשְּׂקוּ עִמּוֹ
  chosen: because they had contended with him
  alternatives:
  - because they had quarreled with him
  - because they had disputed with him
  lexicon: HALOT
  rationale: The verb is cognate with the name עֵשֶׂק, so 'contended' helps preserve the wordplay with the well's name better than repeating 'quarreled.' The subject is the shepherds of Gerar; 'him' refers most naturally to Isaac as the singular antecedent in the narrative.
