translation:
  language: es
  text: 'Y se lo dijeron a Jotam, y él fue y se paró en la cima del monte Gerizim, alzó su voz, llamó y les dijo: «Escúchenme, líderes[a] de Siquem, para que Dios los escuche[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señores de Siquem». El hebreo dice literalmente «dueños/señores de Siquem», pero aquí parece referirse a los hombres con autoridad en la ciudad.
    reason: lexical_alternative
  - marker: b
    text: O «y que Dios los escuche». El hebreo también puede entenderse como una petición coordinada, no solo como finalidad o resultado.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגִּדוּ
  english_pob_choice: they told
  chosen_spanish: se lo dijeron
  alternatives_spanish:
  - le informaron
  - le comunicaron
  lexicon: HALOT
  rationale: El verbo hebreo indica comunicar o decir algo a alguien; en español, «se lo dijeron» conserva la sencillez narrativa y el valor de transmisión de información sin volverlo demasiado técnico.
- source_word: לְיוֹתָם
  english_pob_choice: Jotham
  chosen_spanish: Jotam
  alternatives_spanish:
  - Yotam
  lexicon: Transliteración propia
  rationale: Se mantiene el nombre propio en forma española habitual y transparente. «Jotam» es legible y evita una transliteración más rígida.
- source_word: וַיֵּלֶךְ
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: En este contexto narrativo, «fue» reproduce bien la acción simple del wayyiqtol sin cargarlo de matiz adicional.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso
  alternatives_spanish:
  - se colocó
  - tomó posición
  lexicon: HALOT
  rationale: El hebreo indica que asumió una posición. «Se puso» en la cima transmite naturalmente la idea de ubicarse allí para hablar, sin perder la acción concreta.
- source_word: בְּרֹאשׁ
  english_pob_choice: on the top of
  chosen_spanish: en la cima de
  alternatives_spanish:
  - en la cumbre de
  - sobre la cima de
  lexicon: HALOT
  rationale: «En la cima de» es la equivalencia natural en español para la expresión topográfica hebrea y conserva la imagen de altura.
- source_word: הַר גְּרִזִים
  english_pob_choice: Mount Gerizim
  chosen_spanish: el monte Gerizim
  alternatives_spanish:
  - el monte Guerizim
  lexicon: Transliteración bíblica
  rationale: Se traduce הַר como «monte» con el nombre propio conservado. «Gerizim» es la forma más usual y clara en español bíblico.
- source_word: וַיִּשָּׂא קוֹלוֹ
  english_pob_choice: he lifted up his voice
  chosen_spanish: alzó su voz
  alternatives_spanish:
  - levantó su voz
  - elevó su voz
  lexicon: HALOT
  rationale: El hebreo es un modismo para hablar en voz alta. «Alzó su voz» reproduce con fidelidad ese giro sin sonar forzado.
- source_word: וַיִּקְרָא
  english_pob_choice: called out
  chosen_spanish: les gritó
  alternatives_spanish:
  - clamó
  - llamó
  lexicon: HALOT
  rationale: El contexto exige un llamado fuerte y público. «Les gritó» expresa la intensidad del acto de hablar en voz alta; se complementa con la frase anterior sin duplicar exactamente el mismo matiz.
- source_word: שִׁמְעוּ אֵלַי
  english_pob_choice: Listen to me
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - óiganme
  - presten atención a mí
  lexicon: HALOT
  rationale: El imperativo de שמע pide oír con atención. «Escúchenme» es natural en español y mantiene el tono directo de exhortación.
- source_word: בַּעֲלֵי שְׁכֶם
  english_pob_choice: leaders of Shechem
  chosen_spanish: líderes de Siquem
  alternatives_spanish:
  - señores de Siquem
  - dueños de Siquem
  lexicon: HALOT
  rationale: El hebreo literal puede ser «señores/amos de Siquem», pero el contexto de Jueces apunta a los hombres con poder o autoridad en la ciudad. Se mantiene la decisión documental del POB inglés de dar una lectura funcional, aquí como «líderes», con una nota alternativa para la fuerza literal.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo puede ser formalmente plural, aquí rige un verbo singular y el sentido es singular. «Dios» preserva esa referencia sin ambigüedad.
theological_decisions:
- issue: Relación entre la exhortación humana y la respuesta divina final
  english_pob_reading: 'Purpose/result: ''Listen to me ... that God may listen to you.'''
  chosen_spanish_reading: 'Finalidad o resultado: «Escúchenme... para que Dios los escuche.»'
  alternative_spanish_readings:
  - «Escúchenme... y Dios los escuchará»
  - «Escúchenme... y que Dios los escuche»
  rationale: El hebreo admite una relación de finalidad o resultado después del imperativo. En español, «para que» comunica con claridad esa estructura retórica y conserva la reciprocidad implícita en el discurso de Jotam sin convertirla en una promesa dogmática.
  doctrine_reference: Translation philosophy §3 (preservar tensiones genuinas)
translation_notes:
  revision_awareness: El texto inglés del POB pasó por una revisión que prefirió «leaders of Shechem» frente a «lords of Shechem» por naturalidad y precisión contextual. La versión española sigue esa lectura funcional («líderes de Siquem») pero conserva, en nota, la alternativa más literal del hebreo. También se mantuvo la fuerza del final como cláusula de finalidad/resultado, siguiendo la lectura auditada del inglés.
  spanish_consistency_notes:
  - Se usa «Dios» de manera consistente para אֱלֹהִים en este versículo, con verbo singular implícito en la cláusula final.
  - Se usa «monte Gerizim» para הר + nombre propio, según el estilo bíblico usual en español.
  - 'Se mantiene el paralelismo de dos actos de habla: «alzó su voz» / «les gritó», para reflejar el doble verbo hebreo sin borrar el énfasis retórico.'
