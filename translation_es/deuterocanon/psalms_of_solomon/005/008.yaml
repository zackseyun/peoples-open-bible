translation:
  language: es
  text: No cargues tu mano sobre nosotros[a], no sea que pequemos forzados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hagas pesada tu mano sobre nosotros, no sea que pequemos por necesidad».'
