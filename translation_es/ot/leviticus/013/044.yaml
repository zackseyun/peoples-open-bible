translation:
  language: es
  text: Es un hombre[a] leproso; es impuro. El sacerdote ciertamente lo declarará impuro; su enfermedad está en la cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, «leproso». El término hebreo alude a la afección cutánea tratada en este capítulo y no necesariamente a la lepra moderna (enfermedad de Hansen).
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: HALOT
  rationale: El hebreo es singular masculino y designa a un individuo en un caso legal; en español, «hombre» mantiene esa referencia masculina de forma natural y fiel.
- source_word: צָרוּעַ
  english_pob_choice: leprous
  chosen_spanish: leproso
  alternatives_spanish:
  - con enfermedad de la piel
  - afectado por una afección cutánea
  lexicon: HALOT
  rationale: El POB inglés conservó «leprous» por cercanía formal al hebreo revisado. En español, «leproso» reproduce esa forma tradicional y directa sin añadir una especificación médica moderna que el texto no exige.
- source_word: טָמֵא הוּא
  english_pob_choice: he is unclean
  chosen_spanish: es impuro
  alternatives_spanish:
  - es inmundo
  - está impuro
  lexicon: HALOT
  rationale: En Levítico la impureza es ritual, no moral; «impuro» comunica con claridad esa categoría cultual. «Inmundo» es posible, pero menos natural en español contemporáneo.
- source_word: טַמֵּא יְטַמְּאֶנּוּ
  english_pob_choice: shall surely pronounce him unclean
  chosen_spanish: lo declarará sin duda impuro
  alternatives_spanish:
  - lo pronunciará impuro
  - lo declarará ciertamente impuro
  lexicon: HALOT
  rationale: La intensificación del infinitivo absoluto + imperfecto se refleja con «sin duda»/«ciertamente». En el contexto sacerdotal, el sacerdote no causa la impureza sino que la declara oficialmente.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote cultual
  lexicon: HALOT
  rationale: «Sacerdote» es el equivalente español estándar para el funcionario cultual del pasaje.
- source_word: בְּרֹאשׁוֹ
  english_pob_choice: on his head
  chosen_spanish: en su cabeza
  alternatives_spanish:
  - sobre su cabeza
  - en el cuero cabelludo
  lexicon: HALOT
  rationale: La preposición hebrea admite localización; en español, «en su cabeza» resulta natural y fiel al sentido locativo general del texto.
- source_word: נִגְעוֹ
  english_pob_choice: his disease
  chosen_spanish: su afección
  alternatives_spanish:
  - su lesión
  - su plaga
  lexicon: HALOT
  rationale: En Levítico 13, נגע designa la afección o lesión diagnosticada. «Afección» evita la connotación excesivamente clínica de «enfermedad» y la carga negativa de «plaga».
theological_decisions:
- issue: Impureza ritual vs. impureza moral
  english_pob_reading: he is unclean
  chosen_spanish_reading: es impuro
  alternative_spanish_readings:
  - es inmundo
  - está ritualmente impuro
  rationale: El contexto sacerdotal de Levítico 13 es ritual y ceremonial. «Impuro» mantiene esa distinción sin moralizar el término.
  doctrine_reference: Levítico 13; pureza ritual en la legislación sacerdotal
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente, que volvió a una formulación formal («leprous man») y conservó el lenguaje diagnóstico-sacerdotal. El español refleja esa decisión con «hombre leproso» y mantiene la declaración oficial del sacerdote, sin introducir explicaciones ajenas al verso.
  spanish_consistency_notes:
  - Se conserva «impuro» para la impureza ritual, en coherencia con el uso levítico del término.
  - «Sacerdote» se usa consistentemente para הַכֹּהֵן en contextos cultuales.
  - Se mantiene un registro formal y bíblico, pero con español actual y legible.
  - La nota aclara que «leproso» es un término tradicional, sin confundirlo con la lepra moderna.
