base_translation:
  language: en
  yaml_path: translation/ot/ezra/008/022.yaml
  text: For I was ashamed to ask the king for troops and horsemen to help us against the enemy on the way[a], because we had said to the king, “The hand of our God is for good on all who seek him[b], but his strength and his anger are against all who forsake him.”
  footnotes:
  - marker: a
    text: Or “from the enemy on the journey.” The Hebrew phrase can be rendered more literally this way, but “against the enemy on the way” better fits the request for military protection.
    reason: lexical_alternative
  - marker: b
    text: “The hand of our God” is a Hebrew expression for his active favor or power.
    reason: cultural_note
