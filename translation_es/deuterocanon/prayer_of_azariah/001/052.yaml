review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: imperativo plural a la creación, ‘montes y colinas’, referencia a ‘el Señor’, y el refrán final ‘para siempre’. Sin embargo, la representación de ὑπερυψοῦτε como «exaltadlo altamente» no es idiomática en español y no preserva bien la fuerza intensiva de manera natural. Además, «Bendecid» es comprensible, pero suena peninsular/arcaizante frente al objetivo de español neutral latinoamericano; conviene usar el imperativo de ustedes.'
  spanish_quality_summary: La frase es mayormente clara y solemne, pero mezcla registro bíblico tradicional con giros poco naturales. «Cantadle alabanzas» es aceptable, aunque «cántenle alabanzas» fluye mejor en español neutro. El principal problema de legibilidad es «exaltadlo altamente», que suena calcado. Una revisión menor mejora naturalidad y dignidad sin perder literalidad.
  glossary_alignment: La decisión «el Señor» para κύριον concuerda con el rastro POB y con la guía del proyecto para contexto griego doxológico; no corresponde introducir «Yahvé» aquí. Los demás términos principales están alineados. La mejora propuesta es estilística-lexical, no doctrinal.
  issues:
  - severity: medium
    issue: Uso de imperativos en -d («Bendecid», «cantadle», «exaltadlo»)
    rationale: Aunque son correctos, no encajan bien con el estilo meta de español neutral latinoamericano/broadly church-readable. El imperativo de ustedes suena más natural y ampliamente comprendido.
  - severity: medium
    issue: «Exaltadlo altamente» es poco idiomático
    rationale: Calca la intensificación griega de forma extraña en español. «Exáltenlo en gran manera» o «exáltenlo sobremanera» preserva mejor la fuerza semántica con buena legibilidad.
  revised_spanish_text: Bendigan al Señor, montes y colinas; cántenle alabanzas y exáltenlo en gran manera para siempre.
  revision_rationale: Se ajusta el versículo al español neutral latinoamericano usando imperativos de ustedes y se reemplaza la expresión poco idiomática «exaltadlo altamente» por «exáltenlo en gran manera», que conserva la intensificación de ὑπερυψοῦτε con mejor naturalidad y dignidad litúrgica. No se requieren notas.
