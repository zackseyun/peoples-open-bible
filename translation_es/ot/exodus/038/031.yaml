translation:
  language: es
  text: las bases del patio[a] que lo rodeaba, las bases de la puerta del patio, todas las estacas[b] del tabernáculo, y todas las estacas del patio que lo rodeaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «zócalos» para «bases».
    reason: lexical_alternative
  - marker: b
    text: O «piquetas» o «estacas de tienda» para «estacas».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְנֵי
  english_pob_choice: bases
  chosen_spanish: bases
  alternatives_spanish:
  - zócalos
  - sockets
  lexicon: HALOT
  rationale: En contexto de la construcción del santuario, el término designa piezas de apoyo o fundamento de los postes y marcos. «Bases» es claro en español moderno y conserva el sentido arquitectónico concreto mejor que una solución más técnica.
- source_word: הֶחָצֵר
  english_pob_choice: courtyard
  chosen_spanish: patio
  alternatives_spanish:
  - atrio
  - corte
  lexicon: HALOT
  rationale: «Patio» comunica de forma natural el espacio exterior cercado del santuario. «Atrio» es posible en registro eclesiástico, pero «patio» evita un giro más litúrgico que no añade precisión al hebreo.
- source_word: סָבִיב
  english_pob_choice: surrounding
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - circundante
  lexicon: HALOT
  rationale: 'Aquí funciona de manera distributiva: las bases/estacas distribuidas por todo el perímetro. «Alrededor» es la forma más natural en español y mantiene el alcance periférico del término.'
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - entrada
  lexicon: HALOT
  rationale: En el contexto del patio, el término puede referirse a la abertura de acceso. «Puerta» es inteligible y suficientemente directa; «portón» suena más específico de una hoja cerrable, y «entrada» pierde la imagen física.
- source_word: יִתְדֹת
  english_pob_choice: pegs
  chosen_spanish: estacas
  alternatives_spanish:
  - piquetas
  - clavijas
  - estacas de tienda
  lexicon: HALOT
  rationale: El English POB eligió «pegs» y anotó la alternativa «stakes». En español, «estacas» preserva la fuerza material y la función de fijación mejor que «clavijas», que suena demasiado pequeña o mecánica.
- source_word: מִּשְׁכָּן
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - morada
  - tienda del encuentro
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente tradicional y preciso para este término en Éxodo. Mantiene la designación sacra del santuario portátil sin perder la continuidad terminológica del libro.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todos los
  - cada
  lexicon: HALOT
  rationale: Aparece con sustantivos femeninos plurales («estacas»). «Todas» refleja correctamente la totalidad del inventario y concuerda en género y número.
- source_word: וְאֶת / וְאֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - además
  - asimismo
  lexicon: Gramática hebrea
  rationale: Los marcadores de objeto con conjunción estructuran una lista continua. En español, la coordinación simple con «y» reproduce mejor el estilo de inventario sin sobrecargar la sintaxis.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail inglés. No hubo revisiones aplicadas en el pase más reciente, y el control cruzado indicó alto acuerdo; por eso no se introdujeron alternativas textuales ni cambios de sentido.
  spanish_consistency_notes:
  - Se mantuvo la enumeración paratáctica del hebreo con coordinación simple.
  - «Patio» se usó de forma consistente para חָצֵר en este versículo; no se optó por «atrio» para evitar un registro eclesiástico no requerido por el contexto.
  - «Tabernáculo» conserva la terminología estable del Éxodo para מִשְׁכָּן.
  - Las notas al pie se anclan solo donde el texto español admite una alternativa lexical real.
