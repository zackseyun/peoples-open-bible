translation:
  language: es
  text: Y aconteció que, mientras ellos iban caminando y hablando, he aquí, un carro de fuego y caballos de fuego separaron a los dos de ellos[b], y Elías subió en el torbellino[a] al cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el torbellino». La preposición hebrea puede entenderse como medio, acompañamiento o localización.'
    reason: lexical_alternative
  - marker: b
    text: El texto dice que el carro de fuego y los caballos de fuego separaron a Elías y Eliseo, y que Elías subió en el torbellino; no dice explícitamente que Elías haya subido en el carro.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And as it happened / And as
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Y fue que
  lexicon: HALOT
  rationale: La fórmula narrativa introduce el avance de la escena; «aconteció que» conserva el tono literario sin sonar arcaico de más.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - los dos
  - ambos
  lexicon: HALOT
  rationale: El pronombre independiente enfatiza a los sujetos; «ellos» funciona de manera natural en español y mantiene el referente dual en el contexto.
- source_word: הֹלְכִים הָלוֹךְ
  english_pob_choice: were going along
  chosen_spanish: iban caminando
  alternatives_spanish:
  - seguían andando
  - iban yendo
  lexicon: HALOT
  rationale: La forma intensiva/continuativa se expresa bien con un imperfecto progresivo natural en español.
- source_word: וְדַבֵּר
  english_pob_choice: and talking
  chosen_spanish: y hablando
  alternatives_spanish:
  - y conversando
  - y hablando entre sí
  lexicon: HALOT
  rationale: Se conserva la acción simultánea con una forma simple y idiomática en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y de pronto
  - mira
  lexicon: HALOT
  rationale: «He aquí» reproduce la función deíctica y de sorpresa del hebreo sin añadir interpretación temporal excesiva.
- source_word: רֶכֶב אֵשׁ
  english_pob_choice: a chariot of fire
  chosen_spanish: un carro de fuego
  alternatives_spanish:
  - un carro ígneo
  - un carro ardiente
  lexicon: HALOT
  rationale: «Carro» es el equivalente más natural y amplio en español para רֶכֶב en este contexto narrativo; mantiene la imagen sin tecnicismo innecesario.
- source_word: וְסוּסֵי אֵשׁ
  english_pob_choice: and horses of fire
  chosen_spanish: caballos de fuego
  alternatives_spanish:
  - caballos ígneos
  - caballos ardientes
  lexicon: HALOT
  rationale: Se conserva el paralelismo del hebreo con la misma imagen concreta y sobria.
- source_word: וַיַּפְרִדוּ בֵּין שְׁנֵיהֶם
  english_pob_choice: separated the two of them
  chosen_spanish: separaron a los dos
  alternatives_spanish:
  - se interpusieron entre ambos
  - los separaron
  lexicon: HALOT
  rationale: La relación dual explícita del hebreo se mantiene con una formulación clara y directa; el verbo en plural puede referirse al carro y los caballos como conjunto.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - se elevó
  lexicon: HALOT
  rationale: «Subió» es la traducción más inmediata y fiel de עלה, sin sobrecargar el verso con una dicción demasiado solemne.
- source_word: בַּסְעָרָה
  english_pob_choice: in the whirlwind
  chosen_spanish: en el torbellino
  alternatives_spanish:
  - en el remolino
  - en la tempestad
  lexicon: HALOT
  rationale: La preposición puede indicar medio o acompañamiento; «en el torbellino» mantiene la imagen y la ambigüedad del hebreo, en línea con la lectura auditable de la POB en inglés.
- source_word: הַשָּׁמָיִם
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - a los cielos
  - al firmamento
  lexicon: HALOT
  rationale: En este contexto narrativo, «cielo» expresa de forma natural el destino elevado de Elías en español, sin perder el registro reverente.
theological_decisions:
- issue: Si el carro de fuego llevó a Elías o si el torbellino fue el medio explícito de su ascenso
  english_pob_reading: The text says the chariot of fire and horses of fire separated Elijah and Elisha, and that Elijah went up in the whirlwind; it does not explicitly say that Elijah rode in the chariot.
  chosen_spanish_reading: El texto dice que el carro de fuego y los caballos de fuego separaron a los dos, y que Elías subió en el torbellino; no dice explícitamente que Elías haya ido montado en el carro.
  alternative_spanish_readings:
  - Elías subió en el carro de fuego
  - El carro de fuego fue el vehículo de su ascenso
  rationale: 'Se preserva la tensión textual documentada: la escena presenta el carro y los caballos como elemento separador, mientras que el ascenso de Elías se vincula explícitamente con el torbellino.'
  doctrine_reference: Mantener la distinción entre imagen y mecanismo narrativo; evitar resolver una ambigüedad que el hebreo no resuelve explícitamente.
translation_notes:
  revision_awareness: El borrador sigue de cerca el ajuste de revisión del POB inglés que prefirió «in the whirlwind to heaven» sobre «by the whirlwind into heaven» para alinearse mejor con las preposiciones hebreas y con una cadencia más natural. En español, «en el torbellino al cielo» conserva esa relación preposicional sin imponer una interpretación más precisa de la que permite el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se traduce רֶכֶב como «carro» para mantener la imagen concreta y el paralelismo con «caballos de fuego».
  - Se conserva «Elías» y no «Eliahú», conforme al uso español estándar y la pauta del proyecto para nombres propios bíblicos.
