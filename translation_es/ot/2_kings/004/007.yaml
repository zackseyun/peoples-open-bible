  to: 'Entonces ella vino y le contó al hombre de Dios[a], y él dijo: «Ve, vende el aceite, y paga tus deudas[b]; y tú y tus hijos varones podrán vivir de lo que quede[c]».'
  rationale: 'Se ajusta el texto para preservar con mayor exactitud el sentido fuente y el rastro POB: (1) «hijos varones» explicita בָּנַיִךְ como masculino específico; (2) «podrán vivir» refleja la idea de capacidad/provisión detrás de תִּחְיִי; (3) «de lo que quede» mantiene naturalidad española y recibe una nota literal sobre «el remanente»; y (4) las notas se reordenan y corrigen para que sus anclajes coincidan exactamente con el texto y con las alternativas documentadas en la auditoría inglesa.'
