translation:
  language: es
  text: 'Él vendrá y destruirá a estos arrendatarios[a], y dará la viña a otros. Pero, al oír esto, dijeron[b]: «¡Que nunca suceda!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «labradores» o «agricultores». El término griego se refiere a quienes trabajan una tierra que pertenece a otro.
    reason: lexical_alternative
  - marker: b
    text: 'O «¡De ninguna manera!» o «¡Ciertamente no!». La expresión griega es un rechazo muy fuerte: literalmente, «¡Que no suceda!»'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλεύσεται
  english_pob_choice: He will come
  chosen_spanish: Él vendrá
  alternatives_spanish:
  - Él llegará
  - Él vendrá de nuevo
  lexicon: BDAG
  rationale: El futuro de ἔρχομαι se expresa de forma natural con «vendrá». No se añade «de nuevo», porque el griego no lo exige y podría introducir una nuance no documentada.
- source_word: ἀπολέσει
  english_pob_choice: destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - hará perecer
  - arruinará
  - matará
  lexicon: BDAG
  rationale: «Destruirá» conserva la fuerza de ἀπόλλυμι en este juicio parabólico sin restringirlo indebidamente a «matará» ni suavizarlo con «arruinará».
- source_word: γεωργοὺς
  english_pob_choice: tenant farmers
  chosen_spanish: labradores
  alternatives_spanish:
  - arrendatarios
  - campesinos
  - viñadores
  lexicon: BDAG
  rationale: El griego designa a quienes trabajan la tierra ajena. En español, «labradores» comunica la función agrícola sin forzar un tecnicismo social. Dado que la nota inglesa ya aclara el matiz de tenencia, el texto principal puede mantenerse sobrio y natural.
- source_word: τούτους
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - aquellos
  lexicon: BDAG
  rationale: «Estos» preserva la proximidad demostrativa del griego y la referencia directa a los administradores mencionados.
- source_word: δώσει
  english_pob_choice: will give
  chosen_spanish: dará
  alternatives_spanish:
  - entregará
  - confiará
  lexicon: BDAG
  rationale: «Dará» reproduce la simplicidad de δίδωμι. «Entregará» podría sugerir una transferencia más interpretada; «dará» deja abierto que se trata de una cesión de la viña.
- source_word: ἀμπελῶνα
  english_pob_choice: the vineyard
  chosen_spanish: la viña
  alternatives_spanish:
  - el viñedo
  lexicon: BDAG
  rationale: «La viña» es la equivalencia bíblica natural y concisa para ἀμπελών, y mantiene bien la imagen parabólica.
- source_word: ἄλλοις
  english_pob_choice: to others
  chosen_spanish: a otros
  alternatives_spanish:
  - a otros más
  - a otras personas
  lexicon: BDAG
  rationale: El dativo plural se expresa con «a otros», forma breve y fiel que no especifica receptores más allá de lo que el griego dice.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard this
  chosen_spanish: al oírlo
  alternatives_spanish:
  - cuando lo oyeron
  - tras oír esto
  lexicon: BDAG
  rationale: El participio aoristo temporal se puede verter naturalmente como «al oírlo», que conserva la secuencia narrativa sin sobrerreforzarla.
- source_word: Μὴ γένοιτο
  english_pob_choice: May it never be!
  chosen_spanish: ¡De ninguna manera!
  alternatives_spanish:
  - ¡Que nunca suceda!
  - ¡Jamás!
  - ¡Eso no puede ser!
  lexicon: BDAG
  rationale: La expresión griega funciona como rechazo vehemente. «¡De ninguna manera!» transmite bien la repulsión e indignación del contexto, y es una opción idiomática española para una negación enfática.
theological_decisions:
- issue: Fuerza de rechazo de Μὴ γένοιτο
  english_pob_reading: 'Rendered as a wish-like repudiation: ''May it never be!'''
  chosen_spanish_reading: «¡De ninguna manera!» como rechazo vehemente
  alternative_spanish_readings:
  - «¡Que nunca suceda!»
  - «¡Jamás!»
  - «¡Eso no puede ser!»
  rationale: En Lucas 20:16 la expresión no es una mera negación lógica, sino una reacción emocional de rechazo ante la conclusión implícita de la parábola. La traducción elegida mantiene la intensidad sin cargarla de formulación litúrgica.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish) y §3 (preservar la tensión sin resolverla)
- issue: Cesión de la viña sin explicitar destinatarios
  english_pob_reading: '''will give the vineyard to others'''
  chosen_spanish_reading: «dará la viña a otros»
  alternative_spanish_readings:
  - «la entregará a otros»
  - «la confiará a otros»
  rationale: El griego no identifica a los nuevos receptores. Mantener la formulación abierta evita importar una interpretación que el versículo no explicita.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y el audit trail inglés. No se introdujeron cambios de sentido respecto de la decisión revisada más reciente; se mantuvo la intensidad del rechazo final y la imagen de transferencia de la viña sin explicaciones adicionales en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto cuando no aparece en este versículo.
  - Se evitó «Cristo»/«Mesías» porque no hay léxico correspondiente en el texto.
  - Se optó por «labradores» en el texto principal y se preservó la alternativa social de sentido en la nota, para reflejar el matiz de γεωργός sin sobrecargar el versículo.
  - La puntuación y comillas siguen el uso tipográfico español.
  - Los marcadores de nota [a] y [b] aparecen junto a los elementos que requieren aclaración léxica y de lectura.
