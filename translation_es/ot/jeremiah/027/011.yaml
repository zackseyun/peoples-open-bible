translation:
  language: es
  text: Pero la nación que trae su cuello bajo el yugo del rey de Babilonia y le sirve[a], yo la dejaré[b] en su propia tierra, declara Yahvé, y la labrará[c] y habitará en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede expresar también la relación de servicio o sujeción al rey; es decir, vasallaje político.
    reason: lexical_alternative
  - marker: b
    text: O 'la dejaré sobre su tierra' o 'la dejaré descansar en su tierra'. El verbo hebreo aquí comunica dejar permanecer, más que reposo físico.
    reason: lexical_alternative
  - marker: c
    text: O 'la cultivará'. El verbo hebreo, aplicado a la tierra, significa trabajarla agrícolamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגּוֹי
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la nación-estado
  lexicon: HALOT
  rationale: גּוֹי designa aquí un colectivo político sometido a Babilonia; 'nación' conserva ese sentido con naturalidad en español.
- source_word: יָבִיא אֶת צַוָּארוֹ בְּעֹל
  english_pob_choice: brings its neck under the yoke
  chosen_spanish: trae su cuello bajo el yugo
  alternatives_spanish:
  - mete su cuello en el yugo
  - se somete al yugo
  lexicon: HALOT
  rationale: La imagen hebrea es concreta y debe mantenerse. 'Trae su cuello bajo el yugo' conserva la metáfora de sumisión política sin sonar forzado en español.
- source_word: עֹל
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - carga
  - opresión
  lexicon: HALOT
  rationale: '''Yugo'' es el equivalente directo y preserva la figura de dominación usada en Jeremías 27.'
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  lexicon: HALOT
  rationale: Cadena constructa directa; 'Babilonia' es el nombre propio usual y claro en español.
- source_word: וַעֲבָדוֹ
  english_pob_choice: and serves him
  chosen_spanish: y lo sirve
  alternatives_spanish:
  - y es su esclavo
  - y le sirve
  lexicon: HALOT
  rationale: Aquí עבד expresa sujeción/servicio político al rey. 'Lo sirve' mantiene brevedad y admite la relación de vasallaje; no se fuerza 'esclavo' porque el contexto describe sometimiento estatal, no esclavitud personal literal.
- source_word: וְהִנַּחְתִּיו עַל אַדְמָתוֹ
  english_pob_choice: I will let remain on its own land
  chosen_spanish: yo la dejaré en su propia tierra
  alternatives_spanish:
  - yo la dejaré sobre su tierra
  - yo la haré permanecer en su tierra
  lexicon: HALOT
  rationale: El hiphil de נוח comunica dejar/permitir permanecer. En español, 'dejará en su propia tierra' transmite bien el permiso de quedarse sin añadir una noción ajena de reposo físico.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino Yahvé según la norma del proyecto, y 'declara' reproduce adecuadamente la fórmula profética נְאֻם.
- source_word: וַעֲבָדָהּ
  english_pob_choice: and it will till it
  chosen_spanish: y la labrará
  alternatives_spanish:
  - y la cultivará
  - y trabajará la tierra
  lexicon: HALOT
  rationale: El sufijo femenino remite a la tierra. עבד con tierra significa trabajarla/cultivarla; 'labrar' es un término bíblico y natural en español para ese trabajo agrícola.
- source_word: וְיָשַׁב בָּהּ
  english_pob_choice: and dwell in it
  chosen_spanish: y habitará en ella
  alternatives_spanish:
  - y vivirá en ella
  - y se asentará en ella
  lexicon: HALOT
  rationale: ישב con tierra expresa habitar/establecerse. 'Habitará en ella' mantiene el registro profético y la relación con la promesa de permanecer en la tierra.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - dice Yahvé
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la norma del proyecto, se traduce con 'Yahvé' y no se sustituye por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of עבד in the political context
  english_pob_reading: and serves him
  chosen_spanish_reading: y lo sirve
  alternative_spanish_readings:
  - y le sirve
  - y es su esclavo
  rationale: En este versículo el verbo expresa vasallaje/sujeción al rey de Babilonia. 'Lo sirve' conserva la ambigüedad controlada entre servicio y sometimiento sin introducir una esclavitud personal que el contexto no exige.
  doctrine_reference: Jeremiah 27 context of imperial subjection
- issue: Agricultural sense of עבד with land
  english_pob_reading: and it will till it
  chosen_spanish_reading: y la labrará
  alternative_spanish_readings:
  - y la cultivará
  - y trabajará la tierra
  rationale: El objeto es la tierra, por lo que el verbo debe leerse agrícolamente. 'Labrará' comunica trabajo del suelo y conserva dignidad literaria; 'cultivará' queda como alternativa válida.
  doctrine_reference: Jeremiah 27:11 land-restoration promise
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió 'till it' sobre 'work it' por ser más natural y precisa para la tierra. En español se reflejó esa decisión con 'la labrará', evitando una frase demasiado genérica. También se mantuvo la forma de Yahvé y la imagen del yugo, conforme al paquete auditado.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo verbal del hebreo: someter el cuello al yugo / servir al rey / permanecer en la tierra / labrarla / habitar en ella.'
  - Se evitó 'SEÑOR' para יְהוָה siguiendo la terminología del proyecto.
  - '''La'' en ''la labrará'' y ''habitará en ella'' retoma de forma natural el antecedente femenino ''nación'' entendido colectivamente y luego ''tierra'' por el cambio de objeto agrícola en la segunda mitad del versículo.'
  - El registro es bíblico pero moderno, sin depender de giros arcaizantes innecesarios.
