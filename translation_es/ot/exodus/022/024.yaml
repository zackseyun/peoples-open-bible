  rationale: Se corrige la cláusula central para reflejar con mayor fidelidad לֹא תִהְיֶה לוֹ כְּנֹשֶׁה y mejorar la naturalidad del español. También se ajusta la expresión de עִמָּךְ a una formulación comunitaria más clara. Se consolidan las notas para conservar las alternativas relevantes del inglés auditado y del hebreo, evitando una nota separada innecesaria para 'dinero/plata'.
