translation:
  language: es
  text: Guárdate del ojo desvergonzado[a], y no te sorprendas si peca contra ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente algo como “guárdate detrás/de un ojo desvergonzado”; la expresión es idiomática y difícil, por lo que aquí se vierte con el sentido probable de evitar esa mirada.
    reason: lexical_alternative
  - marker: b
    text: El griego no expresa explícitamente “ella”; el sujeto femenino se infiere por el contexto inmediato de Sirácida 26.
    reason: alternative_reading
lexical_decisions:
- source_word: ὀπίσω
  english_pob_choice: against
  chosen_spanish: del ojo desvergonzado
  alternatives_spanish:
  - contra el ojo desvergonzado
  - de un ojo desvergonzado
  - del ojo insolente
  lexicon: LSJ
  rationale: El griego ὀπίσω junto con el imperativo φύλαξαι forma una expresión idiomática difícil. En español, una equivalencia natural y fiel es expresar la idea de evitar o guardarse de ese “ojo” caracterizado por desvergüenza, sin forzar un calco preposicional poco idiomático.
- source_word: ἀναιδοῦς
  english_pob_choice: impudent
  chosen_spanish: desvergonzado
  alternatives_spanish:
  - impúdico
  - insolente
  - descarado
  lexicon: LSJ
  rationale: ἀναιδής expresa falta de pudor, descaro o vergüenza. “Desvergonzado” comunica bien el valor moral-social del término en español bíblico actual y conserva la fuerza ética del original.
- source_word: ὀφθαλμοῦ
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - mirada
  - vista
  - gaze
  lexicon: LSJ
  rationale: Se mantiene el sustantivo concreto “ojo” para conservar la imagen viva del griego. “Mirada” suavizaría la metáfora y perdería parte de la concreción del original.
- source_word: φύλαξαι
  english_pob_choice: Guard yourself
  chosen_spanish: Guárdate
  alternatives_spanish:
  - Cuídate
  - Vigílate
  - Mantente alerta
  lexicon: LSJ
  rationale: El imperativo medio de φυλάσσω pide una acción de resguardo personal. “Guárdate” reproduce de forma breve y natural el sentido reflexivo y preventivo.
- source_word: μὴ θαυμάσῃς
  english_pob_choice: do not be surprised
  chosen_spanish: no te sorprendas
  alternatives_spanish:
  - no te maravilles
  - no te asombres
  - no te extrañes
  lexicon: LSJ
  rationale: En este contexto sapiencial, θαυμάζω tiene el sentido de sorprenderse o quedar atónito. “No te sorprendas” es la opción más clara y directa en español contemporáneo.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - en caso de que
  lexicon: LSJ
  rationale: La partícula condicional se rinde normalmente por “si”. Aunque el contexto sugiera una expectativa probable, no se debe intensificar más allá de la forma gramatical.
- source_word: εἰς σὲ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - hacia ti
  - respecto de ti
  - sobre ti
  lexicon: LSJ
  rationale: Con πλημμελέω, la construcción marca al destinatario del agravio. “Contra ti” expresa con naturalidad la dirección relacional del daño.
- source_word: πλημμελήσῃ
  english_pob_choice: sins against you
  chosen_spanish: peca contra ti
  alternatives_spanish:
  - obra mal contra ti
  - te hace mal
  - te ofende
  lexicon: LSJ
  rationale: πλημμελέω puede significar obrar mal, cometer falta o pecar. “Peca contra ti” conserva el peso moral del verbo, tal como la POB inglesa opta por “sins against you”.
theological_decisions:
- issue: Sujeto femenino implícito en la segunda cláusula
  english_pob_reading: Use 'she' in English to reflect the immediate literary context of warnings about a bad wife/woman, while noting that the pronoun is not explicit in the Greek clause.
  chosen_spanish_reading: No se explicita el sujeto en español; se conserva la ambigüedad gramatical del griego en la segunda cláusula.
  alternative_spanish_readings:
  - si ella peca contra ti
  - si esa mujer peca contra ti
  - si una tal persona peca contra ti
  rationale: El griego no incluye pronombre sujeto explícito. En español, la forma verbal “peque” permite mantener la referencia implícita sin añadir género que no está formalmente presente, preservando la tensión interpretativa documentada.
  doctrine_reference: 'DOCTRINE.md: Preserve theological/interpretive tension rather than silently resolve ambiguity; document contextual clarifications.'
translation_notes:
  revision_awareness: Se corrigió la validación previa incluyendo en el texto principal los marcadores [a] y [b], de modo que cada nota quede anclada exactamente donde corresponde.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" fuera del versículo porque el texto griego no contiene el nombre divino.
  - Se eligió "peca contra ti" para conservar el valor moral de πλημμελέω sin volverlo demasiado explicativo.
  - Se preservó la concreción de "ojo" en lugar de suavizarla a "mirada".
  - La segunda cláusula conserva la ambigüedad del sujeto, en línea con el audit trail inglés.
