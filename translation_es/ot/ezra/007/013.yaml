translation:
  language: es
  text: 'Por mí se emite un decreto: que cualquiera en mi reino, del pueblo de Israel[a], y sus sacerdotes y levitas, que voluntariamente se ofrezca a ir a Jerusalén contigo[b], podrá ir.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo el que se ofrezca voluntariamente». El participio arameo enfatiza una acción libre y voluntaria.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y los sacerdotes de él», si el sufijo se entiende de otra manera; el contexto favorece «sus», referido a Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִנִּי
  english_pob_choice: by me
  chosen_spanish: por mí
  alternatives_spanish:
  - de mí
  - por parte de mí
  lexicon: HALOT
  rationale: La fórmula administrativa indica que el decreto procede del rey. En español, 'por mí' expresa con naturalidad el agente/origen de la promulgación sin perder el matiz de procedencia real.
- source_word: שִׂים טְעֵם
  english_pob_choice: A decree is issued
  chosen_spanish: Un decreto es promulgado
  alternatives_spanish:
  - Se emite un decreto
  - Se expide un decreto
  lexicon: HALOT
  rationale: El giro arameo literalmente es 'poner/establecer un decreto'. 'Promulgar' conserva el registro jurídico-formal y comunica bien la fuerza pública del acto.
- source_word: דִּי
  english_pob_choice: that
  chosen_spanish: ': que'
  alternatives_spanish:
  - que
  - el cual
  lexicon: HALOT
  rationale: Introduce el contenido del decreto. En español, dos puntos más 'que' preservan la estructura solemne y evitan una subordinación pesada.
- source_word: כָל מִתְנַדַּב
  english_pob_choice: anyone ... who freely offers himself
  chosen_spanish: cualquiera ... que voluntariamente se ofrezca
  alternatives_spanish:
  - todo el que se ofrezca voluntariamente
  - quienquiera que esté dispuesto
  lexicon: HALOT
  rationale: El participio hitpael subraya acción voluntaria. 'Voluntariamente se ofrezca' mantiene el matiz reflexivo y la iniciativa libre del sujeto, sin reducirlo a un mero 'querer'.
- source_word: בְּמַלְכוּתִי
  english_pob_choice: in my kingdom
  chosen_spanish: en mi reino
  alternatives_spanish:
  - en mi reino
  - dentro de mi reino
  lexicon: HALOT
  rationale: Es la forma más natural y precisa para el dominio bajo la autoridad del rey.
- source_word: מִן עַמָּה יִשְׂרָאֵל
  english_pob_choice: from the people of Israel
  chosen_spanish: del pueblo de Israel
  alternatives_spanish:
  - de entre el pueblo de Israel
  - del pueblo israelita
  lexicon: HALOT
  rationale: La expresión identifica el grupo étnico-nacional de donde pueden salir los voluntarios. 'Del pueblo de Israel' es claro y fiel al sustantivo colectivo.
- source_word: וְכָהֲנוֹהִי
  english_pob_choice: and their priests
  chosen_spanish: y sus sacerdotes
  alternatives_spanish:
  - y los sacerdotes de ellos
  - y sus sacerdotes
  lexicon: HALOT
  rationale: La concordancia con 'pueblo de Israel' favorece 'sus sacerdotes'. En español evita la ambigüedad de 'su' y mantiene la referencia al grupo israelita, no al rey.
- source_word: וְלֵוָיֵא
  english_pob_choice: and Levites
  chosen_spanish: y levitas
  alternatives_spanish:
  - y los levitas
  lexicon: HALOT
  rationale: Término tribal/templeario estándar; en español bíblico contemporáneo 'levitas' es directo y transparente.
- source_word: לִמְהָךְ
  english_pob_choice: to go
  chosen_spanish: a ir
  alternatives_spanish:
  - para ir
  - para partir
  lexicon: HALOT
  rationale: El infinitivo expresa movimiento hacia Jerusalén. 'A ir' mantiene sencillez y evita añadir el matiz de 'partir', que no está explícito.
- source_word: לִירוּשְׁלֶם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - a Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  lexicon: HALOT
  rationale: Segunda persona singular coherente con la dirección a Esdras. 'Contigo' resulta natural en español y conserva la relación directa de acompañamiento.
- source_word: יְהָךְ
  english_pob_choice: may go
  chosen_spanish: puede ir
  alternatives_spanish:
  - pueda ir
  - que vaya
  lexicon: HALOT
  rationale: En el contexto de decreto, la forma expresa permiso/autorización. 'Puede ir' comunica esa autorización con claridad; 'pueda ir' sería más subjuntivo-formal, pero menos directo.
theological_decisions:
- issue: 'Naturaleza de la fórmula real: permiso/autorización en un decreto'
  english_pob_reading: may go
  chosen_spanish_reading: puede ir
  alternative_spanish_readings:
  - pueda ir
  - que vaya
  rationale: El contexto es jurídico-administrativo, no meramente narrativo. 'Puede ir' refleja con claridad que el rey concede permiso, sin convertirlo en un mandato ni en una simple predicción.
  doctrine_reference: Autoridad civil en el contexto del exilio persa; cf. uso de edictos reales en Esdras-Nehemías.
- issue: Referencia de 'sus sacerdotes'
  english_pob_reading: their priests
  chosen_spanish_reading: sus sacerdotes
  alternative_spanish_readings:
  - los sacerdotes de ellos
  - sus sacerdotes
  rationale: El pronombre posesivo se entiende mejor referido al pueblo de Israel, no al rey. El español permite expresar esa relación sin forzar una nota extensa en el texto principal.
  doctrine_reference: Coherencia referencial del antecedente 'pueblo de Israel' en el sintagma coordinado.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'its priests and Levites' por 'their priests and Levites' para hacer más natural la concordancia con 'the people of Israel'. La redacción española sigue esa lectura contextual y mantiene el referente colectivo israelita con 'sus sacerdotes y levitas'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - '''Levitas'' se conserva como término técnico estable.'
  - Se evitó 'siervo' porque el hebreo/aramaico aquí no usa δοῦλος ni un campo semántico de servidumbre, sino voluntariedad.
  - La frase de permiso se tradujo con una modulación jurídica ('puede ir') acorde al registro de decreto real.
  - Se usó 'del pueblo de Israel' para conservar el antecedente colectivo que gobierna el posesivo siguiente.
