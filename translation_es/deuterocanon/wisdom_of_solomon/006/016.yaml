revisions:
- from: Porque ella rodea buscando a los que son dignos de ella[a], y se aparece con benevolencia en los senderos, y los encuentra en todo propósito.
  to: Porque ella va buscando a los que son dignos de ella, y se les aparece favorablemente en los senderos, y les sale al encuentro en todo propósito.[a]
  rationale: Se reemplazó «rodea buscando» por «va buscando» para expresar de manera natural el movimiento activo de περιέρχεται ζητοῦσα; se añadió «les» en la segunda cláusula para reflejar αὐτοῖς; y se cambió «los encuentra» por «les sale al encuentro» para conservar mejor la fuerza de ὑπαντᾷ como iniciativa de encuentro. Se mantuvo «en todo propósito» con nota alternativa, en línea con la revisión inglesa adjudicada.
