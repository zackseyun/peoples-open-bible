translation:
  language: es
  text: Esto todavía sería mi consuelo[a], y exultaría en dolor implacable; porque no he negado las palabras del Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con una formulación más formal: «y exultaría en dolor que él no perdona». El hebreo de esta cláusula es difícil y condensado.'
    reason: alternative_reading
lexical_decisions:
- source_word: נֶחָמָתִי
  english_pob_choice: my comfort
  chosen_spanish: mi consuelo
  alternatives_spanish:
  - mi confort
  - mi consolación
  lexicon: HALOT
  rationale: נחם en este sustantivo expresa alivio, consuelo o consolación. ‘Consuelo’ es natural en español y conserva el sentido afectivo de sostén interior que Job dice que todavía tendría.
- source_word: וַאֲסַלְּדָה
  english_pob_choice: and I would exult
  chosen_spanish: exultaría
  alternatives_spanish:
  - me gozaría
  - me alegraría
  - saltaría de gozo
  lexicon: HALOT
  rationale: El verbo es raro y difícil; en contexto describe una reacción intensa, casi desafiante. ‘Exultaría’ conserva esa intensidad mejor que un ‘me alegraría’ más débil, sin forzar una imagen corporal incierta.
- source_word: בְחִילָה
  english_pob_choice: in unrelenting pain
  chosen_spanish: en dolor implacable
  alternatives_spanish:
  - en angustia
  - en dolor incesante
  - en sufrimiento persistente
  lexicon: HALOT
  rationale: חִילָה puede denotar dolor agudo, retorcimiento o angustia. ‘Dolor implacable’ comunica la fuerza y la continuidad del sufrimiento en un español digno y claro.
- source_word: לֹא יַחְמֹל
  english_pob_choice: unrelenting
  chosen_spanish: implacable
  alternatives_spanish:
  - que no perdona
  - sin piedad
  - que no se apiada
  lexicon: HALOT
  rationale: חמל significa ‘apiadarse’ o ‘perdonar’ en el sentido de no ahorrar sufrimiento. Aquí la cláusula es compacta y difícil; ‘implacable’ recoge la idea de dolor no mitigado, como hace el inglés POB al integrarlo en la frase.
- source_word: כִּחַדְתִּי
  english_pob_choice: I have not denied
  chosen_spanish: no he negado
  alternatives_spanish:
  - no he ocultado
  - no he encubierto
  lexicon: HALOT
  rationale: כחד en piel puede significar negar u ocultar. ‘No he negado’ reproduce bien la afirmación de Job de no haber repudiado las palabras divinas.
- source_word: אִמְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los dichos de
  - las sentencias de
  lexicon: HALOT
  rationale: אִמְרֵי es un plural constructo de ‘palabra/dicho’. ‘Las palabras de’ es la opción más amplia y natural en español.
- source_word: קָדוֹשׁ
  english_pob_choice: the Holy One
  chosen_spanish: el Santo
  alternatives_spanish:
  - el Santo Uno
  - el Santo de Israel
  lexicon: HALOT
  rationale: Aquí el adjetivo funciona sustantivado como título divino. ‘El Santo’ mantiene el valor titular sin añadir especificaciones no presentes en el hebreo.
theological_decisions:
- issue: Título divino קָדוֹשׁ
  english_pob_reading: the Holy One
  chosen_spanish_reading: el Santo
  alternative_spanish_readings:
  - el santo
  rationale: El contexto indica una referencia a Dios, no a una persona santa genérica. Capitalizar el título preserva la fuerza teológica y el referente divino sin introducir terminología confesional ajena al texto.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Cláusula difícil בְחִילָה לֹא יַחְמֹל
  english_pob_reading: in unrelenting pain
  chosen_spanish_reading: en dolor implacable
  alternative_spanish_readings:
  - en dolor que no perdona
  - en dolor sin tregua
  - mientras no perdona
  rationale: El hebreo es comprimido y admite más de una lectura. La opción escogida mantiene la idea de sufrimiento continuo y no aliviado, sin deshacer la tersura del verso; las alternativas reflejan la tensión textual que el inglés POB ya reconoce.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca la solución del POB inglés, incluyendo la lectura sintética del segmento difícil y la puntuación fuerte antes de la cláusula causal. Se mantiene la tensión interpretativa del hebreo en una nota alternativa, sin resolverla por paráfrasis excesiva.
  spanish_consistency_notes:
  - Se emplea ‘consuelo’ para נֶחָמָתִי en lugar de ‘consolación’ por fluidez moderna, aunque ambas son posibles.
  - Se usa ‘exultaría’ para וַאֲסַלְּדָה por su valor intenso; no se atenúa a ‘me alegraría’.
  - ‘El Santo’ se capitaliza como título divino en paralelo funcional con el inglés POB ‘the Holy One’.
  - La clausula causal se mantiene con ‘porque’ siguiendo el sentido del hebreo y la revisión inglesa con punto y coma.
  - Se evita ‘SEÑOR’ para el nombre divino porque el término aquí es קָדוֹשׁ, no el Tetragrámaton.
