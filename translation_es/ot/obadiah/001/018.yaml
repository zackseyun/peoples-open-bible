review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: las tres ''casas'' en paralelismo, la metáfora fuego/llama/rastrojo, la destrucción total de la casa de Esaú y la clausura profética con Yahvé. También conserva correctamente ''Yahvé'' y ''sobreviviente'' según el expediente inglés. Sin embargo, ''Ellos los incendiarán'' introduce una causatividad más explícita y algo más prosaica que el hebreo/metáfora permiten; una formulación con ''arderán contra ellos'' o similar preserva mejor la imaginería poética y la nota alternativa ya documentada.'
  spanish_quality_summary: El español es claro y legible, pero 'incendiarán' suena más técnico/modernizante y menos poético que el resto del versículo. Además, el sujeto expreso 'Ellos' es innecesario en español. El resto del texto suena natural y digno.
  glossary_alignment: 'Buena alineación general con los estándares del proyecto: יְהוָה -> ''Yahvé''; בֵית -> ''casa''; שָׂרִיד -> ''sobreviviente'' con nota sobre ''remanente''. La principal excepción a corregir es וְדָלְקוּ בָהֶם, donde conviene una solución menos sobreinterpretada que ''los incendiarán''.'
  issues:
  - severity: medium
    issue: '''Ellos los incendiarán'' sobreinterpreta וְדָלְקוּ בָהֶם'
    rationale: El verbo y la preposición hebreos son compactos y metafóricos; 'incendiarán' añade una causalidad directa y un registro menos poético. Una forma como 'arderán contra ellos' mantiene mejor la imagen de fuego hostil y deja espacio a la alternativa de la nota.
  - severity: low
    issue: 'Sujeto explícito innecesario: ''Ellos'''
    rationale: En español, el verbo ya marca el sujeto; omitirlo mejora la fluidez y evita pesadez sin perder sentido.
