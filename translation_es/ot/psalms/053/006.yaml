translation:
  language: es
  text: Allí tuvieron gran temor[a], donde no había temor; porque Dios dispersó los huesos del que acampaba contra ti[b]. Tú los avergonzaste[c], porque Dios los rechazó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «temieron un temor». El hebreo usa una construcción cognada verbo-sustantivo para intensificar la idea.'
    reason: lexical_alternative
  - marker: b
    text: O, «el que acampa alrededor de ti» / «tu sitiador». El participio de «acampar» es hostil por el contexto.
    reason: lexical_alternative
  - marker: c
    text: El verso pasa de hablar de Dios en tercera persona a dirigirse a él en segunda persona; se conserva el cambio poético.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Entonces
  - Allí mismo
  lexicon: HALOT
  rationale: El adverbio locativo introduce la escena con concisión. «Allí» preserva el arranque abrupto y natural del hebreo sin añadir desarrollo narrativo.
- source_word: פָּחֲדוּ פַחַד
  english_pob_choice: they were in great fear
  chosen_spanish: tuvieron gran temor
  alternatives_spanish:
  - temieron con temor
  - estuvieron aterrados
  lexicon: HALOT
  rationale: La construcción verbo+sustantivo intensifica la idea. En español, «tuvieron gran temor» comunica esa fuerza enfática sin caer en un calco duro como «temieron temor».
- source_word: לֹא הָיָה פָחַד
  english_pob_choice: where there was no fear
  chosen_spanish: donde no había temor
  alternatives_spanish:
  - cuando no había nada que temer
  - aunque no había temor
  lexicon: HALOT
  rationale: La cláusula expresa ausencia de peligro real. «Donde no había temor» conserva la relación poética y el paralelismo, con un español claro y sobrio.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: La forma plural morfológica tiene referencia singular al Dios de Israel; «Dios» es la equivalencia directa y transparente.
- source_word: פִּזַּר
  english_pob_choice: scattered
  chosen_spanish: dispersó
  alternatives_spanish:
  - esparció
  - desparramó
  lexicon: HALOT
  rationale: El piel expresa dispersión violenta. «Dispersó» mantiene el sentido de derrota y desorden de los enemigos con registro bíblico claro.
- source_word: עַצְמוֹת
  english_pob_choice: the bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - huesos
  lexicon: HALOT
  rationale: En español el artículo definido resulta natural en este contexto y ayuda a conservar la imagen concreta del verso.
- source_word: חֹנָךְ
  english_pob_choice: the one encamping against you
  chosen_spanish: el que acampaba contra ti
  alternatives_spanish:
  - el que se acampaba contra ti
  - tu sitiador
  lexicon: HALOT
  rationale: El participio de חנה, en este contexto hostil, apunta a un enemigo que acampa contra el destinatario. «Acampaba contra ti» expresa ese valor adversativo sin introducir una interpretación más técnica que el texto no exige.
- source_word: הֱבִשֹׁתָה
  english_pob_choice: You put them to shame
  chosen_spanish: Tú los avergonzaste
  alternatives_spanish:
  - Tú los pusiste en vergüenza
  - los avergonzaste
  lexicon: HALOT
  rationale: La forma verbal se entiende como segunda persona en un cambio poético de interlocución. «Avergonzaste» preserva el acto causativo de la raíz בוש con naturalidad en español.
- source_word: מְאָסָם
  english_pob_choice: rejected them
  chosen_spanish: los rechazó
  alternatives_spanish:
  - los desechó
  - los despreció
  lexicon: HALOT
  rationale: מאס denota rechazo con desdén o repudio. «Rechazó» comunica el juicio divino sin cargar innecesariamente el matiz emotivo.
theological_decisions:
- issue: Cambio de persona y de interlocución en la mitad del verso
  english_pob_reading: 'Retain the Masoretic-style shift: first speaking about God in the third person, then directly addressing God in the second person (''You put them to shame'').'
  chosen_spanish_reading: 'Mantener el cambio abrupto: primero se habla de Dios en tercera persona y luego se le habla directamente en segunda persona («Tú los avergonzaste»).'
  alternative_spanish_readings:
  - 'Regularizar todo en tercera persona: «Dios los avergonzó»'
  - Entender la segunda persona como dirigida a Sion/Jerusalén
  rationale: El hebreo poético permite y aquí favorece el giro de narrar acerca de Dios a dirigirse a él. Conservarlo evita suavizar una tensión real del texto y sigue la lectura más coherente con el cierre «porque Dios los rechazó».
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido hostil del participio חֹנָךְ
  english_pob_reading: 'Hostile sense: ''the one encamping against you.'''
  chosen_spanish_reading: 'Sentido hostil: «el que acampaba contra ti».'
  alternative_spanish_readings:
  - «tu sitiador»
  - «el que acampaba alrededor de ti»
  rationale: El contexto de huesos dispersos y vergüenza exige una lectura bélica/enemiga. «Contra ti» hace explícita la hostilidad implícita en el participio sin exceder la evidencia léxica.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; esta propuesta mantiene esa estabilidad y sigue de cerca el audit trail inglés, con adaptación idiomática al español y sin borrar las tensiones poéticas del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, sin sustituirlo por «Señor».
  - Se traduce el efecto enfático de פָּחֲדוּ פַחַד con una expresión natural en español, sin calco mecánico.
  - «Acampaba contra ti» conserva el valor hostil documentado para חֹנָךְ.
  - Se preserva el cambio de persona en la segunda mitad del versículo.
  - «Rechazó» para מְאָסָם mantiene el matiz de repudio o desecho, no solo de desaprobación leve.
