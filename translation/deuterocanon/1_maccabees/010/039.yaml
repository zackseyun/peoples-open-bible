translation:
  text: Ptolemais and the territory adjoining it I have given as a gift to the holy ones in Jerusalem[b][a], for the expenses that come first for the holy place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ptolemais and what belongs to it' or 'Ptolemais and the district attached to it.'
    reason: lexical_alternative
  - marker: b
    text: The Greek text is awkward in the final clause; the sense is likely expenses designated for the sanctuary or sacred service. Another possible rendering is 'for the necessary expenses for the holy ones.'
    reason: alternative_reading
lexical_decisions:
- source_word: Πτολεμαΐδα
  chosen: Ptolemais
  lexicon: LSJ
  rationale: Proper place name; transliterated rather than translated in keeping with the project's policy for names.
- source_word: τὴν προσκυροῦσαν αὐτῇ
  chosen: the territory adjoining it
  alternatives:
  - what belongs to it
  - the district attached to it
  - the region adjacent to it
  lexicon: LSJ
  rationale: The participial expression denotes what is attached or contiguous to the city. 'Territory adjoining it' communicates the administrative/geographical sense more naturally than a wooden 'the things adjoining it.'
- source_word: δέδωκα
  chosen: I have given
  alternatives:
  - I gave
  lexicon: BDAG/LSJ
  rationale: Perfect tense in Greek is well represented by English present perfect here, emphasizing the standing grant rather than merely a past act.
- source_word: δόμι
  chosen: as a gift
  alternatives:
  - for a gift
  - as a donation
  lexicon: LSJ
  rationale: The transmitted form appears to represent δόμα/δόσις-like gift language in this diplomatic text. 'As a gift' captures the sense idiomatically while acknowledging the unusual form in Swete's witness.
- source_word: τοῖς ἁγίοις τοῖς ἐν Ἰερουσαλήμ
  chosen: to the holy ones in Jerusalem
  alternatives:
  - to the saints in Jerusalem
  - to those consecrated in Jerusalem
  lexicon: BDAG/LSJ
  rationale: ἅγιοι here most naturally refers to the sacred community/personnel associated with Jerusalem and the temple. 'Holy ones' is transparent to the Greek and avoids importing later ecclesiastical overtones of 'saints,' though that remains a viable alternative.
- source_word: εἰς τὴν προκαθήκουσαν δαπάνην
  chosen: for the expenses that come first
  alternatives:
  - for the regular expense
  - for the necessary expenditure
  - for the prior expenses
  lexicon: LSJ
  rationale: The phrase is somewhat awkward in the transmitted text. προκαθήκουσαν suggests what is incumbent, prior, or assigned beforehand. The rendering preserves the idea of designated/primary expenses without overclaiming precision where the Greek is unusual.
- source_word: τοῖς ἁγίοις
  chosen: for the holy place
  alternatives:
  - for the sanctuary
  - for the holy things
  lexicon: LSJ
  rationale: In the closing phrase, a literal repetition 'for the holy ones' yields poor sense after mention of expenses. In temple-finance context, the dative likely points to sacred use or sanctuary-related expenses. 'Holy place' makes the sentence coherent while staying close to cultic language.
