  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: muchos buscan acceso/favor de un gobernante, pero la justicia/decisión justa para una persona proviene de Yahvé. Conserva correctamente Yahvé para יְהוָה y mantiene la imagen literal de פְּנֵי con nota alternativa. Sin embargo, el anclaje de las notas está mal ubicado: [a] debe marcar «rostro», no «gobernante»; [c] debe marcar «justicia», no «hombre».'
  spanish_quality_summary: El español es claro, natural y digno. «Muchos buscan el rostro de un gobernante» suena aceptable en registro bíblico moderno, y «pero de Yahvé viene la justicia para un hombre» es comprensible. Aun así, la distribución de notas crea confusión interpretativa, y conviene corregirla para que cada alternativa lexical se asocie con su palabra correspondiente.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; מִשְׁפַּט → «justicia» con alternativas «juicio»/«decisión legal» bien documentadas; אִישׁ → «un hombre» con nota sobre singular genérico; פְּנֵי → «rostro» con alternativa idiomática «favor». No hay conflicto doctrinal ni terminológico, solo un problema de anclaje de notas.'
  issues:
  - severity: medium
    issue: Marcador [a] anclado a «gobernante» en vez de «rostro».
    rationale: La nota [a] explica la alternativa de פְּנֵי («rostro» / «favor»), no de מוֹשֵׁל. Debe aparecer sobre «rostro» o la frase relevante, no sobre «gobernante».
  - severity: medium
    issue: Marcador [c] anclado a «hombre» en vez de «justicia».
    rationale: La nota [c] da alternativas para מִשְׁפַּט («juicio», «decisión legal»), por lo que debe anclarse en «justicia». Tal como está, parece comentar «un hombre».
  revised_spanish_text: Muchos buscan el rostro[a] de un gobernante, pero de Yahvé viene la justicia[c] para un hombre[b].
  revised_footnotes:
