base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/050/024.yaml
  text: I set a trap for you[a], and you also were caught, Babylon, and you did not know it; you were found and also seized[c][b], because you contended against Yahweh.
  footnotes:
