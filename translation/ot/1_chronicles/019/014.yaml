id: 1CH.19.14
reference: 1 Chronicles 19:14
source:
  edition: WLC
  text: וַ/יִּגַּ֨שׁ יוֹאָ֜ב וְ/הָ/עָ֧ם אֲשֶׁר עִמּ֛/וֹ לִ/פְנֵ֥י אֲרָ֖ם לַ/מִּלְחָמָ֑ה וַ/יָּנ֖וּסוּ מִ/פָּנָֽי/ו־׃
translation:
  text: So Joab and the people who were with him advanced before Aram for battle[a], and they fled before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the Arameans' / 'against Aram.' The Hebrew reads 'before Aram,' using the proper name and a spatial idiom in a battle context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  chosen: advanced
  alternatives:
  - drew near
  - approached
  lexicon: HALOT
  rationale: The verb נגשׁ literally means 'draw near/approach.' In a military context with 'for battle,' 'advanced' conveys the movement toward engagement in natural English without over-paraphrasing.
- source_word: וְהָעָם אֲשֶׁר עִמּוֹ
  chosen: and the people who were with him
  alternatives:
  - and the troops with him
  - and the army with him
  lexicon: HALOT
  rationale: הָעָם is literally 'the people.' In battle context it refers to Joab's fighting force, but 'the people who were with him' stays closer to the Hebrew while remaining clear.
- source_word: לִפְנֵי אֲרָם
  chosen: before Aram
  alternatives:
  - against Aram
  - in front of Aram
  - before the Arameans
  lexicon: HALOT
  rationale: לִפְנֵי is literally 'before/in front of.' Here it marks movement into the presence of the Aramean forces. 'Before Aram' preserves the Hebrew idiom; 'against Aram' is interpretive. 'Aram' is retained as the proper name rather than converting to the ethnic plural.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: As a proper name, אֲרָם is best transliterated 'Aram' in keeping with the philosophy of transliterating names. 'The Arameans' is a contextual interpretation of the military force; 'Syria' is anachronistic for this setting.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for the battle
  - to battle
  - for war
  lexicon: HALOT
  rationale: 'The phrase indicates purpose: Joab advanced with a view to fighting. ''For battle'' is concise, idiomatic, and preserves the military sense.'
- source_word: וַיָּנוּסוּ
  chosen: they fled
  alternatives:
  - they ran away
  - they retreated
  lexicon: HALOT
  rationale: נוס means 'flee.' 'They fled' is the most direct and semantically accurate rendering; 'retreated' could understate the rout implied by the verb.
- source_word: מִפָּנָיו
  chosen: before him
  alternatives:
  - from before him
  - from his presence
  lexicon: HALOT
  rationale: Literally 'from his face/presence.' In English battle narrative, 'before him' naturally conveys fleeing in the face of Joab. The singular suffix most naturally refers to Joab as the immediately preceding singular subject.
