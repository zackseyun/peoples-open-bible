    reason: lexical_alternative
  - marker: b
    text: «honores de victoria» intenta reflejar ἐπινίκια, que son honores o premios concedidos por la victoria y no simplemente otro tipo de don.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para mejorar la naturalidad y el registro del español sin cambiar el sentido: «aquel cuya» fluye mejor que «cualquiera cuya», y «grandes dones» corresponde mejor al tono regio de δωρεὰς. Se conserva «una palabra» con nota por la decisión léxica documentada, y se mantiene la distinción entre dones y honores de victoria.'
