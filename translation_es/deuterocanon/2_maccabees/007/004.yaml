translation:
  language: es
  text: Y cuando los recipientes estuvieron al rojo vivo[a], ordenó que le cortaran la lengua al que había sido su portavoz[b], y, después de arrancarle el cuero cabelludo[c], que le cortaran las extremidades[d], mientras los demás hermanos y la madre miraban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «de los que habían sido calentados al rojo»; el objeto se sobreentiende por el verso anterior, donde se preparan los recipientes para el castigo.'
    reason: cross_reference
  - marker: b
    text: El término griego también puede significar «líder» o «el que iba delante de ellos»; aquí parece referirse al hermano que hablaba en nombre de los demás.
    reason: lexical_alternative
  - marker: c
    text: El participio es raro y difícil; también puede entenderse como quitar la piel alrededor de la cabeza o desollar la zona del cráneo.
    reason: lexical_alternative
  - marker: d
    text: El verbo griego denota mutilación grave; aquí puede entenderse más generalmente como «mutilarlo», aunque esta frase lo expresa más específicamente como «cortarle las extremidades».
    reason: lexical_alternative
lexical_decisions:
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: LSJ
  rationale: Expresa la rapidez temporal del participio con naturalidad en español y conserva la urgencia del contexto de tortura.
- source_word: ἐκπυρωθέντων
  english_pob_choice: they were immediately heated
  chosen_spanish: estuvieron al instante enrojecidos
  alternatives_spanish:
  - fueron calentados de inmediato
  - quedaron al rojo vivo
  lexicon: LSJ
  rationale: El griego sugiere ser puestos al rojo por calor intenso; en español, 'enrojecidos' comunica esa imagen sin fijar indebidamente el objeto, que el contexto previo ya suple.
- source_word: προήγορον
  english_pob_choice: spokesman
  chosen_spanish: portavoz
  alternatives_spanish:
  - líder
  - el que iba delante en hablar
  - vocero
  lexicon: LSJ
  rationale: En este contexto indica al hermano que hablaba por los demás. 'Portavoz' conserva la función discursiva sin forzar un matiz militar o procesional.
- source_word: γλωσσοτομεῖν
  english_pob_choice: to have his tongue cut out
  chosen_spanish: cortar la lengua
  alternatives_spanish:
  - arrancarle la lengua
  - extirparle la lengua
  lexicon: LSJ
  rationale: La acción central es la mutilación de la lengua; en español 'cortar la lengua' es claro y suficientemente directo, aunque la pasiva causativa inglesa se explicite con 'ordenó'.
- source_word: περικυλίσαντας
  english_pob_choice: after scalping him
  chosen_spanish: después de arrancarle el cuero cabelludo
  alternatives_spanish:
  - después de scalparlo
  - después de arrancarle la piel de la cabeza
  lexicon: LSJ
  rationale: El término es raro y dudoso; la traducción mantiene la idea de desollar la zona de la cabeza sin usar un anglicismo innecesario.
- source_word: ἀκρωτηριάζειν
  english_pob_choice: to cut off his extremities
  chosen_spanish: mutilarlo
  alternatives_spanish:
  - cortarle las extremidades
  - amputarlo
  lexicon: LSJ
  rationale: El verbo denota mutilación severa y puede implicar amputación de extremidades. 'Mutilarlo' preserva la amplitud semántica; la opción más específica queda como alternativa.
- source_word: συνορώντων
  english_pob_choice: looked on
  chosen_spanish: miraban
  alternatives_spanish:
  - observaban
  - presenciaban
  lexicon: LSJ
  rationale: Indica que los otros hermanos y la madre eran testigos visuales. 'Miraban' es natural en español y sostiene la crudeza inmediata de la escena.
theological_decisions:
- issue: Nivel de explicitación de la violencia ritualizada
  english_pob_reading: The verse describes escalating torture without softening the physical brutality.
  chosen_spanish_reading: La versión española conserva la crudeza de la tortura y evita eufemismos.
  alternative_spanish_readings:
  - Suavizar la escena con términos menos directos
  - Usar un lenguaje más técnico y distante
  rationale: 'No hay una tensión doctrinal aquí, pero sí una exigencia literaria y ética: no atenuar el carácter violento del texto. La redacción mantiene la secuencia de castigos con claridad.'
  doctrine_reference: No aplica; fidelidad narrativa y histórica del texto
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del griego: hace explícita la secuencia temporal, corrige la relación de los infinitivos con el sujeto que ordena, conserva la ambigüedad de περικυλίσαντας en nota y refleja con mayor precisión ἀκρωτηριάζειν como mutilación severa o corte de extremidades.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa un español moderno y sobrio, evitando calcos innecesarios como 'escalpó' en el texto principal.
  - La puntuación busca reflejar la coordinación griega y la progresión de acciones tortuosas.
  - Los hermanos y la madre se expresan como testigos colectivos, acorde con el artículo definido del griego.
