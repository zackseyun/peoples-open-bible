translation:
  language: es
  text: Vamos[a], actuemos con astucia con ellos, para que no se multipliquen; y si estalla la guerra, ellos también podrían unirse a nuestros enemigos y pelear contra nosotros y subir fuera de la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con él». Aunque el pronombre es singular, se refiere colectivamente a Israel; por eso en español se traduce por sentido como «ellos». También podría traducirse: «actuemos sabiamente con ellos».'
    reason: lexical_alternative
  - marker: c
    text: 'O «y salir de la tierra». Hebreo literalmente: «y subir fuera de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vengan
  - Vamos
  lexicon: HALOT
  rationale: Es una interjección exhortativa que convoca a una acción inmediata. «Ven» comunica la urgencia de manera natural en español; se evita un calco más pesado como «vengan ahora».
- source_word: נִתְחַכְּמָה
  english_pob_choice: let us deal shrewdly
  chosen_spanish: actuemos con astucia
  alternatives_spanish:
  - actuemos con sabiduría
  - tratemos de manera astuta
  - maquinemos
  lexicon: HALOT
  rationale: El hitpael de חכם aquí no expresa sabiduría moral positiva, sino una estrategia política calculada. «Actuemos con astucia» conserva esa carga sin sonar demasiado idiomático o demasiado fuerte.
- source_word: לוֹ
  english_pob_choice: with them
  chosen_spanish: con él
  alternatives_spanish:
  - con ellos
  lexicon: HALOT
  rationale: El hebreo usa singular, con referente colectivo a Israel. Se mantiene el singular morfológico con «él», porque la decisión española debe dejar visible esa tensión; el contexto inmediato hace claro que se trata del pueblo como unidad.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: HALOT
  rationale: Introduce un resultado temido. En español, «para que no» expresa la prevención de forma clara y natural; «no sea que» también sería posible, pero suena más marcado y menos directo.
- source_word: יִרְבֶּה
  english_pob_choice: they multiply
  chosen_spanish: se multiplique
  alternatives_spanish:
  - crezca en número
  - se haga numeroso
  lexicon: HALOT
  rationale: Se preserva el crecimiento numérico del pueblo con un verbo reflexivo natural en español. El singular del hebreo se conserva en la forma verbal, respetando la referencia colectiva.
- source_word: וְהָיָה כִּי תִקְרֶאנָה מִלְחָמָה
  english_pob_choice: and if war breaks out
  chosen_spanish: y si llega a haber guerra
  alternatives_spanish:
  - y si estalla la guerra
  - y cuando haya guerra
  lexicon: HALOT
  rationale: La cláusula presenta una eventualidad temida. «Llega a haber guerra» reproduce la contingencia del hebreo sin forzar un giro demasiado literario; «estalla la guerra» sería más idiomático, pero añade una imagen no explicitada.
- source_word: וְנוֹסַף גַּם הוּא
  english_pob_choice: they too may join
  chosen_spanish: él también se unirá
  alternatives_spanish:
  - también se añadirá
  - también se juntará
  lexicon: HALOT
  rationale: יסף con עַל expresa añadirse a un bando. Dado que el hebreo mantiene singular, la traducción conserva «él» y usa «se unirá» para reflejar el movimiento de adhesión sin perder naturalidad.
- source_word: עַל שֹׂנְאֵינוּ
  english_pob_choice: our enemies
  chosen_spanish: a nuestros enemigos
  alternatives_spanish:
  - contra nuestros enemigos
  - con nuestros enemigos
  lexicon: HALOT
  rationale: Con יסף, עַל introduce la idea de sumarse o alinearse con un grupo. En español, «a nuestros enemigos» transmite esa adhesión de manera más fiel que un simple «con».
- source_word: וְנִלְחַם בָּנוּ
  english_pob_choice: and fight against us
  chosen_spanish: peleará contra nosotros
  alternatives_spanish:
  - combatirá contra nosotros
  - hará guerra contra nosotros
  lexicon: HALOT
  rationale: El verbo de combate se expresa con un futuro natural en español dentro de una cadena de consecuencias temidas. «Peleará contra nosotros» es claro y conserva el tono hostil del hebreo.
- source_word: וְעָלָה מִן הָאָרֶץ
  english_pob_choice: and go up out of the land
  chosen_spanish: y saldrá de la tierra
  alternatives_spanish:
  - y subirá de la tierra
  - y se irá de la tierra
  lexicon: HALOT
  rationale: El hebreo dice literalmente «subir». Sin embargo, en español «saldrá de la tierra» comunica el resultado con claridad y evita una expresión que podría sonar extraña si se conservara de forma mecánica. Se mantiene la referencia al abandono del territorio, sin definir por adelantado el matiz político de «su tierra».
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés y no se aplicaron revisiones posteriores; el texto fuente muestra alta concordancia y sin cambios en la última pasada. La principal cuestión trasladada al español fue conservar la tensión entre el singular morfológico hebreo y el referente colectivo de Israel, además del valor estratégico de חכם y la imagen final de עלה מן־הארץ.
  spanish_consistency_notes:
  - Se conservó Yahvé/mesías/otros términos estándar del proyecto solo cuando correspondían; en este versículo no aparecen.
  - Se mantuvo la tensión singular-colectivo visible en «con él» y «se multiplique».
  - Se evitó suavizar el sentido estratégico de נתחכמה con una traducción positiva de «sabiduría».
  - Se prefirió una clausula condicional natural en español para la eventualidad de guerra, sin perder el matiz de temor.
  - Se tradujo el movimiento final con «saldrá de la tierra», que preserva la salida territorial sin calcar «subirá» de manera poco idiomática.
