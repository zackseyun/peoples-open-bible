    rationale: Aunque comprensible, «porque el fuego ha devorado» suena más natural y mantiene el tono elevado sin afectar el sentido. El hebreo anartro no obliga a omitir artículo en español.
  revised_spanish_text: A ti[a], Yahvé, clamo, porque el fuego ha devorado los pastizales[b] del desierto, y la llama ha chamuscado[c] todos los árboles del campo.
