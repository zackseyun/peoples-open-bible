review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura legal del hebreo: condición, cesión temporal de una porción de la heredad, retorno al príncipe en el año de libertad, y excepción para los hijos. Conserva acertadamente «príncipe» para נָשִׂיא y «año de la libertad» con nota alternativa para דְּרוֹר. Sin embargo, se aparta del rastro auditado de la POB en un punto importante: לְאַחַד מֵעֲבָדָיו fue decidido en inglés como «one of his servants», con justificación contextual explícita, pero el español lo cambia a «uno de sus esclavos» sin necesidad textual suficiente. Además, «un regalo» suena demasiado coloquial para un contexto jurídico-patrimonial.'
  spanish_quality_summary: El español es generalmente claro y digno, pero tiene dos problemas de registro/idiomaticidad. «Un regalo» resulta cotidiano y menos apropiado que «un don» o «una dádiva» en una ley sobre heredad. Y «Solo su heredad para sus hijos será de ellos» es comprensible, pero algo forzado; «Solo su heredad para sus hijos será de ellos» puede mejorarse levemente manteniendo la forma cercana al hebreo. La redacción revisada conserva fidelidad y mejora el registro eclesial-legible.
  glossary_alignment: Alineación parcial. «Príncipe» para נָשִׂיא y «libertad» para דְּרוֹר concuerdan con la POB. «Heredad» es una buena elección para נַחֲלָה. Pero «esclavos» contradice la decisión contextual auditada de traducir עֲבָדָיו aquí como «servants», y no hay razón suficientemente fuerte para apartarse del precedente documentado. Se recomienda «siervos», que en español bíblico moderno conserva dependencia sin imponer la dureza máxima de «esclavos».
  issues:
  - severity: high
    issue: «esclavos» para עֲבָדָיו contradice la decisión contextual auditada de la POB inglesa.
    rationale: El expediente inglés justificó «servants» porque el foco aquí es la distinción legal entre dependientes y hijos, no el estatus servil en sí. El español debe preservar esa decisión salvo necesidad clara, que aquí no se demuestra.
  - severity: medium
    issue: «un regalo» es demasiado coloquial para מַתָּנָה en contexto legal-patrimonial.
    rationale: Aunque semánticamente posible, «regalo» reduce el registro. «Un don» o «una dádiva» encajan mejor en español bíblico y legal sin alejarse del sentido de gift.
  - severity: low
    issue: La cláusula final suena algo rígida en español.
    rationale: La literalidad es defendible, pero conviene una forma más natural que siga reflejando la sintaxis restrictiva del hebreo sin oscurecer el sentido.
  revised_spanish_text: Pero si da un don de su heredad a uno de sus siervos[a], será suyo hasta el año de la libertad; entonces volverá al príncipe. Solo su heredad para sus hijos será de ellos.
  revised_footnotes:
