translation:
  language: es
  text: Cuando engendres hijos y nietos[a], y hayas envejecido en la tierra[b], y actúes corruptamente y hagas una imagen tallada con forma de cualquier cosa[c], y hagas lo malo ante los ojos de Yahvé tu Dios, provocándolo a ira—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “hijos y nietos varones”. El hebreo usa términos masculinos de descendencia, pero aquí probablemente funcionan de manera genérica para la descendencia a través de generaciones.
    reason: lexical_alternative
  - marker: b
    text: O “hayas permanecido mucho tiempo en la tierra”. El verbo puede enfatizar el envejecimiento o una larga permanencia asentada.
    reason: lexical_alternative
  - marker: c
    text: O “la semejanza de cualquier cosa” o “cualquier forma”.
    reason: lexical_alternative
lexical_decisions:
- source_word: תוֹלִיד
  english_pob_choice: you father
  chosen_spanish: engendres
  alternatives_spanish:
  - tengas hijos
  - engendres hijos
  lexicon: HALOT
  rationale: El verbo causativo de ילד conserva aquí la idea de engendrar; en español, ‘engendres’ mantiene la forma verbal y la orientación a la descendencia sin volverlo una paráfrasis general como ‘tengas hijos’.
- source_word: בָּנִים וּבְנֵי בָנִים
  english_pob_choice: children and grandchildren
  chosen_spanish: hijos y nietos
  alternatives_spanish:
  - hijos e hijos de hijos
  - hijos y nietos varones
  lexicon: HALOT
  rationale: La secuencia hebrea usa términos masculinos de descendencia, pero funciona generacionalmente. ‘Hijos y nietos’ comunica de forma natural el alcance de las generaciones sin imponer especificidad masculina innecesaria en español.
- source_word: וְנוֹשַׁנְתֶּם בָּאָרֶץ
  english_pob_choice: you have grown old in the land
  chosen_spanish: te hayas envejecido en la tierra
  alternatives_spanish:
  - hayas vivido mucho tiempo en la tierra
  - te hayas hecho viejo en la tierra
  lexicon: HALOT
  rationale: Se conserva la imagen del envejecimiento o de la larga permanencia asentada. ‘Te hayas envejecido en la tierra’ refleja el valor del verbo sin reducirlo solo a duración cronológica.
- source_word: וְהִשְׁחַתֶּם
  english_pob_choice: you act corruptly
  chosen_spanish: se corrompan
  alternatives_spanish:
  - actúen corruptamente
  - se corrompan ustedes
  lexicon: HALOT
  rationale: El Hifil de שׁחת expresa conducta corrupta, especialmente en contexto de idolatría. ‘Se corrompan’ reproduce bien la fuerza del comportamiento desviado sin añadir un reflexivo explícito ajeno al contexto español.
- source_word: פֶּסֶל
  english_pob_choice: a carved image
  chosen_spanish: un ídolo
  alternatives_spanish:
  - una imagen tallada
  - una imagen esculpida
  lexicon: HALOT
  rationale: Aunque el término alude a una imagen tallada, en este contexto la función cultual prohibida queda mejor comunicada por ‘ídolo’. En la apposición posterior se conserva ‘la imagen de cualquier cosa’ para no perder el matiz imagético.
- source_word: תְּמוּנַת כֹּל
  english_pob_choice: in the form of anything
  chosen_spanish: la imagen de cualquier cosa
  alternatives_spanish:
  - la semejanza de cualquier cosa
  - cualquier forma
  lexicon: HALOT
  rationale: ‘Imagen de cualquier cosa’ mantiene el sentido de representación visible de cualquier forma sin sonar forzado. Responde además al paralelo hebreo entre el ídolo y la forma representada.
- source_word: הָרַע בְּעֵינֵי
  english_pob_choice: what is evil in the eyes of
  chosen_spanish: lo malo ante los ojos de
  alternatives_spanish:
  - lo malo a los ojos de
  - lo malo a la vista de
  lexicon: HALOT
  rationale: La locución hebrea se conserva como idiomática en español. ‘Ante los ojos de’ mantiene la evaluación divina y evita una reescritura abstracta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ‘Yahvé’, transliteración reverente y transparente del nombre divino, en vez de una sustitución por título.'
- source_word: לְהַכְעִיסוֹ
  english_pob_choice: provoking him to anger
  chosen_spanish: provocándolo a ira
  alternatives_spanish:
  - para provocarlo a ira
  - irritándolo
  lexicon: HALOT
  rationale: El infinitivo con לְ expresa finalidad o resultado. ‘Provocándolo a ira’ conserva la relación causal y la referencia al enojo divino con un registro bíblico claro.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La POB inglesa ya decidió rendir el Tetragrámaton como ‘Yahweh’. En español, la forma estable del proyecto es ‘Yahvé’, que mantiene la transparencia del nombre divino sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Descendencia masculina en בָּנִים וּבְנֵי בָנִים
  english_pob_reading: children and grandchildren
  chosen_spanish_reading: hijos y nietos
  alternative_spanish_readings:
  - hijos y nietos varones
  - hijos e hijos de hijos
  rationale: Aunque el hebreo es masculino, el contexto de advertencia generacional es representativo. ‘Hijos y nietos’ conserva el alcance de generaciones sucesivas sin perder inteligibilidad en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Imagen prohibida y forma representada
  english_pob_reading: a carved image in the form of anything
  chosen_spanish_reading: un ídolo, la imagen de cualquier cosa
  alternative_spanish_readings:
  - una imagen tallada, la semejanza de cualquier cosa
  - un ídolo, cualquier forma
  rationale: 'El hebreo distingue entre el objeto tallado y la forma que representa. La combinación ‘ídolo, la imagen de cualquier cosa’ preserva esa tensión: la materialidad del objeto y la amplitud absoluta de la prohibición.'
  doctrine_reference: HALOT; DOCTRINE.md lexical transparency
translation_notes:
  revision_awareness: 'Concordancia alta con el último pase de revisión: no se requieren cambios sustanciales. Se mantuvieron las decisiones auditadas sobre el nombre divino, la descendencia generacional, el verbo de corrupción, la imagen tallada/ídolo y la evaluación idiomática ‘ante los ojos de’.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se evita ‘SEÑOR’ como sustitución del nombre divino.
  - Se conserva el paralelismo entre la acción corrupta y la fabricación del ídolo.
  - La cadencia con guion final prepara la continuación del versículo siguiente en español.
  - Los corchetes de nota están anclados solo donde hay alternativa léxica documentada.
