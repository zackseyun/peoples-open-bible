review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: prosperidad presente, orgullo, falta de percepción del poder divino, falsa suposición de continuidad en el mismo plan, y redacción de una carta contra ellos. Sin embargo, dos elecciones debilitan la fidelidad idiomática: «sino suponiendo» introduce una oposición que el griego no marca, y «escribía» suena menos natural aquí que el pretérito simple introductorio. Además, «del Dios el más grande» reproduce de forma demasiado mecánica la literalidad y resulta español defectuoso; debe ajustarse a una forma española natural sin perder la decisión léxica documentada.'
  spanish_quality_summary: 'El texto es generalmente claro, pero presenta una construcción poco natural y gramaticalmente problemática: «el poder del Dios el más grande». También conviene mejorar la fluidez de la cadena participial con «sin percibir» y eliminar «sino», que entorpece la sintaxis. «Escribió ... esta carta» es más legible y digno en español bíblico moderno que «escribía ... esta carta» en este contexto.'
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos aquí. «Dios» y «poder» están bien alineados. La decisión teológica de no armonizar τοῦ μεγίστου θεοῦ con «Altísimo» debe mantenerse, pero en español debe expresarse como «el Dios más grande» o equivalente natural; no como «el Dios el más grande».
  issues:
  - severity: high
    issue: Construcción no idiomática «del Dios el más grande»
    rationale: Aunque la auditoría inglesa preserva la literalidad de «the greatest God», el español no admite naturalmente «el Dios el más grande». Debe mantenerse la decisión léxica con una forma gramatical correcta como «del Dios más grande». La nota puede explicar la literalidad griega.
  - severity: medium
    issue: Uso de «sino suponiendo»
    rationale: El griego coordina participios con καί ... δέ, no establece una contraposición adversativa fuerte. «Sino» altera la relación lógica; «y suponiendo» o una simple continuación participial reproduce mejor el original.
  - severity: medium
    issue: «Escribía» suena menos adecuado que «escribió»
    rationale: Aunque ἔγραφεν es imperfecto, aquí introduce el contenido de la carta siguiente. En español narrativo, el pretérito simple comunica mejor esa función, en línea con la decisión inglesa auditada.
  revised_spanish_text: 'Así pues[a], envanecido por su prosperidad presente, y sin percibir el poder del Dios más grande, y suponiendo que permanecería para siempre en el mismo propósito, escribió contra ellos esta carta:'
  revised_footnotes:
  - marker: a
    text: O, «el Altísimo Dios». El griego dice literalmente «el Dios más grande».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la sintaxis para que el español sea natural y fiel: «del Dios más grande» conserva la decisión de no armonizar con «Altísimo» en el texto principal, mientras la nota preserva la alternativa tradicional y explica la literalidad griega. Se reemplaza «sino» por una coordinación no adversativa acorde con el griego, y «escribía» por «escribió» para un español narrativo más claro en la introducción de la carta.'
