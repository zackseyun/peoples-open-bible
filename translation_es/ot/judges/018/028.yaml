translation:
  language: es
  text: No hubo quien los librara[a], porque la ciudad estaba lejos de Sidón, y no tenían trato con nadie; y estaba en el valle que pertenece a Bet-rehob. Entonces reedificaron la ciudad y habitaron en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el valle cerca de Bet-rehob». La expresión hebrea es elíptica, y la preposición puede indicar proximidad más que pertenencia.
    reason: alternative_reading
lexical_decisions:
- source_word: מַצִּיל
  english_pob_choice: to deliver them
  chosen_spanish: los librara
  alternatives_spanish:
  - los rescatara
  - los salvara
  lexicon: HALOT
  rationale: El participio causativo expresa a alguien que libra o rescata de peligro. «Librar» conserva el sentido concreto de intervención en una situación de amenaza, sin cargar el texto con un matiz más técnico o soteriológico que el contexto no exige.
- source_word: רְחוֹקָה הִיא מִצִּידוֹן
  english_pob_choice: it was far from Sidon
  chosen_spanish: estaba lejos de Sidón
  alternatives_spanish:
  - era lejos de Sidón
  - estaba apartada de Sidón
  lexicon: HALOT
  rationale: El hebreo usa pronombre femenino para la ciudad; en español natural, «estaba» funciona bien con una ciudad como sujeto implícito. «Lejos de Sidón» reproduce la relación espacial sin endurecer el estilo.
- source_word: וְדָבָר אֵין לָהֶם עִם אָדָם
  english_pob_choice: they had no dealings with anyone
  chosen_spanish: no tenían trato con nadie
  alternatives_spanish:
  - no tenían relación con nadie
  - no tenían trato alguno con nadie
  - no tenían nada que ver con nadie
  lexicon: HALOT
  rationale: 'La frase es idiomática: literalmente dice que no había «palabra/cosa» para ellos con אדם. En español, «no tenían trato con nadie» comunica la aislación social o política sin volverlo demasiado explícito ni perder la fuerza idiomática.'
- source_word: אָדָם
  english_pob_choice: anyone
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - hombre
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular genérica, el valor contextual es inclusivo y general. «Nadie» preserva el alcance indefinido que el inglés POB expresó con «anyone».
- source_word: בָּעֵמֶק
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en el llano
  - en el valle bajo
  lexicon: HALOT
  rationale: עֵמֶק designa un valle o depresión del terreno; «valle» es la equivalencia directa y más transparente en español.
- source_word: אֲשֶׁר לְבֵית רְחוֹב
  english_pob_choice: that belongs to Beth-rehob
  chosen_spanish: que pertenece a Bet-rehob
  alternatives_spanish:
  - que estaba junto a Bet-rehob
  - cerca de Bet-rehob
  lexicon: HALOT
  rationale: La preposición ל puede expresar pertenencia o relación territorial. Siguiendo el criterio del POB inglés, se mantiene la lectura de pertenencia en el texto principal, con conciencia de que la frase es elíptica y admite cercanía territorial.
- source_word: רְחוֹב
  english_pob_choice: Beth-rehob
  chosen_spanish: Bet-rehob
  alternatives_spanish:
  - Beth-rehob
  lexicon: HALOT
  rationale: Se conserva el nombre propio como topónimo transliterado en español. «Bet-» es la adaptación habitual para בית en nombres geográficos bíblicos.
- source_word: וַיִּבְנוּ אֶת הָעִיר
  english_pob_choice: they rebuilt the city
  chosen_spanish: reedificaron la ciudad
  alternatives_spanish:
  - construyeron la ciudad
  - volvieron a edificar la ciudad
  lexicon: HALOT
  rationale: Aunque el hebreo dice simplemente «construyeron», el contexto inmediato presupone que la ciudad había sido arrasada. «Reedificaron» hace explícita esa implicación contextual sin añadir contenido ajeno.
- source_word: וַיֵּשְׁבוּ בָהּ
  english_pob_choice: lived in it
  chosen_spanish: habitaron en ella
  alternatives_spanish:
  - vivieron en ella
  - se establecieron en ella
  lexicon: HALOT
  rationale: ישב suele significar habitar o asentarse. «Habitaron en ella» conserva un registro bíblico sobrio y fiel, sin sonar arcaizante en exceso.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje tal como aparece en el texto hebreo y mantiene la misma decisión principal del POB inglés: «reedificaron» por el contexto narrativo y la lectura principal de la cláusula con לְבֵית רְחוֹב. También conserva la alternativa interpretativa de la localización mediante nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Bet-rehob» se mantiene como topónimo transliterado, consistente con el tratamiento de nombres propios en el proyecto.
  - «Habitaron» y «librara» mantienen un registro bíblico claro y comprensible en español latinoamericano.
  - Se evitó «SEÑOR» y no hay términos teológicos que requieran equivalencia doctrinal específica en este versículo.
