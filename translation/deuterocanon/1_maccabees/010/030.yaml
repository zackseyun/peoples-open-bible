translation:
  text: And instead of the third of the seed-sowing[a], and instead of the half of the fruit of the trees that falls to me to receive, I release it from this day and onward, from being taken from the land of Judah and from the three districts added to it from Samaria and Galilee[c][b], from this day and for all time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, ''a third of the crops and half of the fruit of the trees.'' The Greek wording is more literal: ''the third of the seed-sowing'' and ''the half of the fruit of the trees.'''
    reason: lexical_alternative
  - marker: b
    text: That is, the royal share or tax revenue otherwise due to the king.
    reason: cultural_note
  - marker: c
    text: '''Districts'' translates Greek nomoi, administrative regions; some English versions preserve the technical term ''nomes.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντὶ
  chosen: instead of
  alternatives:
  - in place of
  - in exchange for
  lexicon: LSJ
  rationale: Introduces the items remitted in place of what the king would otherwise collect; 'instead of' is the most natural English equivalent here.
- source_word: τρίτου τῆς σπορᾶς
  chosen: the third of the seed-sowing
  alternatives:
  - the third of the produce from sowing
  - a third of the sown crop
  lexicon: LSJ
  rationale: The phrase refers to a one-third levy connected with agricultural sowing/produce. 'Seed-sowing' stays close to the Greek while remaining intelligible; smoother alternatives were considered but would move further from the wording.
- source_word: τοῦ ἡμίσους τοῦ καρποῦ τοῦ ξυλίνου
  chosen: the half of the fruit of the trees
  alternatives:
  - half of the tree fruit
  - half of the orchard produce
  lexicon: LSJ
  rationale: ξύλινος here functions substantivally for tree-grown produce/wooded growth. 'Fruit of the trees' communicates the sense without the awkwardly literal 'wooden fruit.'
- source_word: τοῦ ἐπιβάλλοντός μοι λαβεῖν
  chosen: that falls to me to receive
  alternatives:
  - that is due to me to collect
  - that belongs to me to take
  lexicon: LSJ
  rationale: ἐπιβάλλω in this fiscal context denotes what accrues or is incumbent. 'Falls to me to receive' preserves the sense of entitlement without overstating coercion; taxation context is clear from the sentence.
- source_word: ἀφίημι
  chosen: I release it
  alternatives:
  - I remit it
  - I forgive it
  - I exempt it
  lexicon: LSJ
  rationale: The king is waiving a claim to revenue. 'I release it' captures the act of relinquishing the levy; 'remit' is precise but less accessible, while 'forgive' could sound moral rather than fiscal.
- source_word: τοῦ λαβεῖν
  chosen: from being taken
  alternatives:
  - from collection
  - from being received
  lexicon: LSJ
  rationale: The articular infinitive expresses the action now being waived. 'From being taken' gives clear English in a tax context.
- source_word: γῆς Ἰούδα
  chosen: the land of Judah
  alternatives:
  - the territory of Judah
  - Judea
  lexicon: LSJ
  rationale: A straightforward geographic expression. 'Land of Judah' reflects the Greek directly; 'Judea' is possible but slightly more interpretive.
- source_word: τῶν τριῶν νομῶν
  chosen: the three districts
  alternatives:
  - the three nomes
  - the three administrative regions
  lexicon: LSJ
  rationale: νομός denotes an administrative district. 'Districts' is clear modern English; 'nomes' is too technical for the main text.
- source_word: τῶν προστιθεμένων αὐτῇ
  chosen: added to it
  alternatives:
  - annexed to it
  - attached to it
  lexicon: LSJ
  rationale: A participial description of the three districts as incorporated into Judah. 'Added to it' is both accurate and readable.
- source_word: ἀπὸ τῆς Σαμαρίτιδος καὶ Γαλιλαίας
  chosen: from Samaria and Galilee
  alternatives:
  - out of Samaria and Galilee
  lexicon: LSJ
  rationale: Specifies the regions from which the three districts were taken. Standard geographic renderings are appropriate.
- source_word: εἰς τὸν ἅπαντα χρόνον
  chosen: for all time
  alternatives:
  - forever
  - for the whole time
  lexicon: LSJ
  rationale: An idiomatic expression for perpetual duration. 'For all time' preserves the formal tone without sounding archaic.
