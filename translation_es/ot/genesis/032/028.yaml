lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él le dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativa hebrea con waw-consecutiva avanza la escena; en español, «Y él le dijo» conserva ese flujo sin añadir una relación temporal más fuerte de la que exige el hebreo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a él le
  lexicon: HALOT
  rationale: El dativo clítico «le» expresa naturalmente la dirección hacia el interlocutor masculino y evita una repetición pesada en español.
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Cuál
  alternatives_spanish:
  - ¿Qué
  lexicon: HALOT
  rationale: Aunque el hebreo usa un interrogativo simple, en esta pregunta directa sobre el nombre, «¿Cuál es tu nombre?» suena más natural y fiel al sentido idiomático que una traducción rígida con «¿Qué?».
- source_word: שְּׁמֶךָ
  english_pob_choice: is your name
  chosen_spanish: es tu nombre
  alternatives_spanish:
  - tu nombre
  lexicon: HALOT
  rationale: El hebreo literalmente dice «tu nombre»; en español la cópula es necesaria para formar la pregunta completa sin alterar el contenido.
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él respondió
  alternatives_spanish:
  - Y él dijo
  lexicon: HALOT
  rationale: Aquí el contexto muestra que la segunda intervención funciona como respuesta. «Respondió» hace explícita esa función pragmática sin cambiar el contenido léxico del verbo de habla.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar; no se traduce.
