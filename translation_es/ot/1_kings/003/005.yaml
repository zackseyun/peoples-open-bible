    text: 'Hebreo: «en el sueño de la noche»; es decir, en un sueño ocurrido durante la noche.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula final para reflejar la pregunta indirecta hebrea después del imperativo: no «lo que yo te daré», sino «qué debo darte». Esto preserva mejor el sentido abierto e idiomático del original sin alterar la terminología del proyecto. Se mantiene la nota sobre «de noche» porque justifica una formulación algo más cercana al hebreo.'
