translation:
  language: es
  text: Pero los judíos, que a los ojos de las naciones parecían estar desprovistos de toda protección[a], a causa de la necesidad que los rodeaba por todas partes con cadenas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pareciendo a los gentiles estar sin ningún amparo/protección»; o, en español más natural: «que a los ojos de los gentiles parecían estar sin ningún amparo/protección».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκέπης
  english_pob_choice: protection
  chosen_spanish: protección
  alternatives_spanish:
  - amparo
  - resguardo
  - cobertura
  lexicon: LSJ
  rationale: σκέπη puede significar cobertura, refugio o protección. En este contexto de vulnerabilidad ante las naciones, «protección» comunica bien el sentido figurado sin volverlo demasiado literal.
- source_word: ἔρημοι
  english_pob_choice: deprived of
  chosen_spanish: desprovistos de
  alternatives_spanish:
  - privados de
  - desamparados de
  - carentes de
  lexicon: LSJ
  rationale: Con el genitivo πάσης σκέπης, ἔρημοι expresa carencia o privación. «Desprovistos de» conserva ese valor en un español natural y solemne.
- source_word: δοκοῦντες εἶναι
  english_pob_choice: seeming to be
  chosen_spanish: pareciendo ... estar
  alternatives_spanish:
  - pareciendo ser
  - dando la impresión de estar
  - siendo tenidos por
  lexicon: LSJ
  rationale: La frase participial marca apariencia desde la perspectiva de observadores, no una afirmación absoluta. «Pareciendo ... estar» preserva esa cautela.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los gentiles
  - ante las naciones
  - a los pueblos
  lexicon: LSJ
  rationale: Aquí ἔθνη se refiere de modo amplio a los pueblos circundantes; «a las naciones» sigue de cerca el griego y evita cargar el término con un matiz técnico posterior.
- source_word: ἀνάγκην
  english_pob_choice: necessity
  chosen_spanish: necesidad
  alternatives_spanish:
  - coacción
  - constricción
  - angustia
  lexicon: LSJ
  rationale: ἀνάγκη puede denotar necesidad, compulsión o constricción. «Necesidad» mantiene el término griego y deja que la imagen de las cadenas exprese la coerción del contexto.
- source_word: πάντοθεν περιέχουσαν αὐτοὺς μετὰ δεσμῶν
  english_pob_choice: that surrounded them on every side with chains
  chosen_spanish: que los rodeaba por todas partes con cadenas
  alternatives_spanish:
  - que los cercaba por todas partes con cadenas
  - que los ceñía por todas partes con cadenas
  - que los envolvía por todas partes con cadenas
  lexicon: LSJ
  rationale: La participial presenta una imagen vívida de cerco y sujeción. «Los rodeaba por todas partes con cadenas» es natural en español y conserva tanto la espacialidad como la opresión física.
- source_word: δεσμῶν
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - lazos
  - grilletes
  - prisiones
  lexicon: LSJ
  rationale: δεσμοί puede significar lazos, cadenas o ataduras. «Cadenas» hace explícita la imagen carcelaria y es claro para el lector moderno.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete (1909) y concuerda con el audit trail inglés en la evaluación de σκέπη, ἔρημοι, δοκοῦντες εἶναι, τοῖς ἔθνεσιν, ἀνάγκη y δεσμοί. No se requieren revisiones sustantivas respecto del sentido base; la principal adaptación es la formulación española más natural de la cláusula participial y del complemento final.
  spanish_consistency_notes:
  - Se mantuvo «naciones» para τοῖς ἔθνεσιν, en coherencia con el criterio del POB inglés de no forzar aquí el matiz técnico de «gentiles».
  - Se eligió «protección» para σκέπη, manteniendo el mismo campo semántico que el inglés auditado.
  - La oración conserva la ambigüedad relativa de la frase participial, sin convertirla en una afirmación objetiva absoluta.
  - «Cadenas» reproduce la imaginería de δεσμῶν de manera consistente con el tratamiento POB de la coerción física.
