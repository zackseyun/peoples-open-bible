  to: 'Así ha dicho Yahvé de los ejércitos: el ayuno del cuarto mes[a], y el ayuno del quinto mes, y el ayuno del séptimo mes, y el ayuno del décimo mes, llegará a ser[b] para la casa de Judá gozo y alegría, y buenas fiestas establecidas[c]. Por tanto, amen la verdad y la paz.'
  rationale: 'La revisión es pequeña pero necesaria para alinear el español con la decisión auditada del POB y con sus notas: se cambia «será» por «llegará a ser» para reflejar el matiz transformativo contextual y hacer que la nota [b] funcione correctamente como alternativa; se repite «mes» por claridad y simetría; y se sustituye «fiestas señaladas» por «fiestas establecidas» para una expresión más natural y cultualmente precisa en español.'
