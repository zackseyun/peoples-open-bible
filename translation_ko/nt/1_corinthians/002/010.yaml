  text: ἡμῖν ⸀γὰρ ⸂ἀπεκάλυψεν ὁ θεὸς⸃ διὰ τοῦ ⸀πνεύματος, τὸ γὰρ πνεῦμα πάντα ἐραυνᾷ, καὶ τὰ βάθη τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/002/010.yaml
  text: For God has revealed these things to us through the Spirit[a], for the Spirit searches all things[b], even the depths of God.
