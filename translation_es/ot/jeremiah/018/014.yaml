translation:
  language: es
  text: ¿Deja la nieve del Líbano la roca del campo abierto[a]? ¿O son alguna vez arrancadas aguas extranjeras[b], frías, que fluyen?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la roca del campo», «la peña de la campiña» o similar; la frase hebrea es difícil y probablemente evoca las alturas rocosas o el campo abierto asociados con la nieve del Líbano.
    reason: lexical_alternative
  - marker: b
    text: O «extrañas». La frase puede referirse a aguas procedentes de una fuente lejana más que a aguas «extranjeras» en sentido moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יַעֲזֹב
  english_pob_choice: Does ... leave
  chosen_spanish: ¿Deja ...?
  alternatives_spanish:
  - ¿abandona ...?
  - ¿desampara ...?
  lexicon: HALOT
  rationale: El interrogativo hebreo introduce una pregunta retórica. En español, «deja» conserva la imagen de apartarse de un lugar o fuente, sin cargar con el matiz personal de «abandonar» o «desamparar».
- source_word: מִ/צּוּר שָׂדַי
  english_pob_choice: the rock of the open country
  chosen_spanish: la roca del campo
  alternatives_spanish:
  - la roca del campo abierto
  - la peña del campo
  - la roca de la campiña
  lexicon: HALOT
  rationale: La expresión hebrea es difícil. «Roca del campo» conserva el núcleo imagístico de צוּר + שָׂדַי sin forzar una explicación interpretativa. Se mantiene la ambigüedad poética documentada por la POB en la nota.
- source_word: שֶׁלֶג לְבָנוֹן
  english_pob_choice: the snow of Lebanon
  chosen_spanish: la nieve del Líbano
  alternatives_spanish:
  - la nieve de Líbano
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera directa e idiomática. «La nieve del Líbano» preserva el referente geográfico y la imagen poética.
- source_word: אִם
  english_pob_choice: Or
  chosen_spanish: ¿O ...?
  alternatives_spanish:
  - ¿Y acaso ...?
  - ¿O si ...?
  lexicon: HALOT
  rationale: En paralelismo poético, אִם introduce una segunda pregunta retórica, no una condición. En español, «¿O ...?» transmite mejor esa coordinación interrogativa.
- source_word: יִנָּתְשׁוּ
  english_pob_choice: are ... ever uprooted
  chosen_spanish: son alguna vez arrancadas
  alternatives_spanish:
  - son arrancadas
  - son desarraigadas
  - son uprootadas
  lexicon: HALOT
  rationale: El nifal de נטש sugiere ser arrancado/arrancarse de su lugar. Como se aplica a aguas, «arrancadas» conserva la rareza metafórica sin aplanarla a «secadas» o «desaparecidas».
- source_word: מַיִם
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: El plural hebreo se refleja con el plural español en un registro poético. «Aguas» mantiene el tono bíblico y la imagen concreta.
- source_word: זָרִים
  english_pob_choice: foreign
  chosen_spanish: extranjeras
  alternatives_spanish:
  - extrañas
  - ajenas
  lexicon: HALOT
  rationale: En este contexto, el término puede aludir a aguas que vienen de fuera, no necesariamente a una cualidad moral. «Extranjeras» conserva la fuerza léxica y deja espacio para la nota sobre la alternativa «extrañas».
- source_word: קָרִים
  english_pob_choice: cold
  chosen_spanish: frías
  alternatives_spanish:
  - frígidas
  - frescas
  lexicon: HALOT
  rationale: El adjetivo expresa temperatura de forma sencilla. «Frías» es natural en español y encaja con la imaginería de aguas de montaña.
- source_word: נוֹזְלִים
  english_pob_choice: flowing
  chosen_spanish: fluyentes
  alternatives_spanish:
  - que fluyen
  - corrientes
  - fluyendo
  lexicon: HALOT
  rationale: Se conserva el participio verbal del hebreo con «fluyentes», una forma más elevada y poética que «que fluyen», adecuada al paralelismo del verso.
translation_notes:
  revision_awareness: 'Se siguió el sentido poético y la decisión de la POB en inglés de mantener la rareza de las imágenes: la primera pregunta conserva la metáfora de la nieve y la roca, y la segunda mantiene la construcción inusual sobre aguas «arrancadas» sin suavizarla hacia una paráfrasis explicativa.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo el registro poético sin caer en calco excesivo; «fluyentes» preserva la forma verbal del participio hebreo.
  - 'Se conservaron dos notas de alternativa porque el hebreo presenta ambigüedad léxica real en dos puntos: מִצּוּר שָׂדַי y זָרִים.'
