translation:
  language: es
  text: Cuando un hombre ha terminado[a], entonces apenas está comenzando; y cuando se detiene[b], entonces quedará sin saber qué hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha completado». El verbo griego también puede traducirse de manera más formal como «lleva a cumplimiento».
    reason: lexical_alternative
  - marker: b
    text: O «quedará perplejo» o «quedará desconcertado». El griego sugiere quedar sin camino claro o sin respuesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: LSJ
  rationale: Introduce una relación temporal general y proverbial en español natural, sin volverla condicional de manera demasiado fuerte.
- source_word: συντελέσῃ
  english_pob_choice: has finished
  chosen_spanish: ha terminado
  alternatives_spanish:
  - completa
  - ha completado
  - lleva a cumplimiento
  lexicon: LSJ
  rationale: «Ha terminado» expresa con claridad la idea de llegar al final de una acción o curso, y mantiene el contraste con «apenas está comenzando».
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  - la humanidad
  lexicon: LSJ
  rationale: Se conserva el singular genérico masculino del griego, siguiendo la decisión auditada del POB en inglés.
- source_word: τότε ἄρχεται
  english_pob_choice: then he is just beginning
  chosen_spanish: entonces apenas está comenzando
  alternatives_spanish:
  - entonces comienza
  - entonces empieza
  lexicon: LSJ
  rationale: «Apenas está comenzando» reproduce el matiz progresivo/inceptivo que intensifica el paradoja sapiencial, no solo un inicio puntual.
- source_word: παύσηται
  english_pob_choice: stops
  chosen_spanish: se detiene
  alternatives_spanish:
  - cesa
  - se para
  lexicon: LSJ
  rationale: «Se detiene» es un equivalente claro y natural para la cesación verbal del griego, sin cargarlo innecesariamente con una connotación técnica o finalista.
- source_word: ἀπορηθήσεται
  english_pob_choice: will be at a loss
  chosen_spanish: quedará perplejo
  alternatives_spanish:
  - estará confundido
  - no sabrá qué hacer
  - quedará desconcertado
  lexicon: LSJ
  rationale: El futuro pasivo sugiere quedar sin salida o sin respuesta. «Quedará perplejo» conserva esa idea de desconcierto y falta de recursos para avanzar.
theological_decisions:
- issue: Alcance sapiencial del proverbio
  english_pob_reading: 'The verse is rendered as a paradox about the limits of human completion and understanding: when a person thinks he has finished, he is only beginning; when he ceases, he finds himself at a loss.'
  chosen_spanish_reading: 'El versículo se traduce como un dicho paradójico sobre los límites de la realización y del entendimiento humanos: cuando alguien cree haber terminado, apenas está comenzando; cuando se detiene, queda sin salida clara.'
  alternative_spanish_readings:
  - Una afirmación específica sobre que el trabajo humano nunca termina
  - Una afirmación sobre la muerte como término de la actividad humana
  rationale: El griego es breve y proverbial, y no especifica si se trata de trabajo, vida o muerte. La traducción mantiene esa amplitud sapiencial sin cerrar la tensión interpretativa.
  doctrine_reference: Conservar la tensión teológica sin resolverla de forma restrictiva.
translation_notes:
  revision_awareness: Se revisó el texto para mantener la paradoja sapiencial del griego, conservar el matiz de incepción en ἄρχεται y reflejar el valor pasivo de ἀπορηθήσεται sin suavizarlo en exceso.
  spanish_consistency_notes:
  - Se mantuvo «un hombre» para reflejar el singular genérico masculino del original.
  - Se evitó «SEÑOR» o terminología ajena al pasaje porque no aparece el nombre divino ni un título cristológico en este versículo.
  - «Quedará perplejo» conserva el matiz de quedar sin recursos, no solo de tener dudas intelectuales.
