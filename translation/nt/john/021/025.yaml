theological_decisions:
- issue: Rhetorical hyperbole about the world's capacity for books
  chosen_reading: Preserved as deliberate hyperbolic testimony rather than flattened into a mere idiom like 'countless books.'
  alternative_readings:
  - A looser dynamic rendering such as 'the world could not contain all the books that would be written'
  rationale: The verse closes the Gospel with emphatic, eyewitness-style rhetorical excess. The translation keeps the hyperbolic image intact without forcing a literalistic or reductionistic reading.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
