translation:
  language: es
  text: El desvelo de un rico[a] va consumiendo su carne, y la ansiedad por el sustento ahuyenta el sueño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo transmitido en el primer miembro del verso es difícil. El paralelo griego dice: «Esperanzas vacías y falsas son para un hombre sin entendimiento, y los sueños dan alas a los necios». La traducción principal sigue el testimonio hebreo disponible y deja constancia de la variante.'
    reason: textual_variant
lexical_decisions:
- source_word: שקר
  english_pob_choice: wastes away
  chosen_spanish: consume
  alternatives_spanish:
  - desgasta
  - agota
  - consume lentamente
  lexicon: HALOT
  rationale: Aunque el hebreo transmitido es difícil y el griego paralelo sugiere otra línea de sentido, el contexto del verso apunta a un deterioro físico progresivo. En español, 'consume' comunica con naturalidad ese desgaste gradual.
- source_word: עשיר
  english_pob_choice: a rich man
  chosen_spanish: un rico
  alternatives_spanish:
  - un hombre rico
  - el rico
  lexicon: HALOT
  rationale: Se conserva el singular masculino como tipo humano concreto. 'Un rico' es breve, claro y acorde con el matiz de clase social del hebreo.
- source_word: ימחה שארו
  english_pob_choice: wears away his flesh
  chosen_spanish: consume su carne
  alternatives_spanish:
  - destruye su cuerpo
  - consume su cuerpo
  - desgasta su carne
  lexicon: HALOT
  rationale: '''Carne'' mantiene la imagen corporal cercana al hebreo y evita suavizarla en ''cuerpo''. El verbo ''consumir'' expresa la acción de deterioro o desgaste sin añadir más de lo que el texto exige.'
- source_word: דאגת
  english_pob_choice: the anxiety of
  chosen_spanish: la ansiedad por
  alternatives_spanish:
  - la preocupación por
  - el afán por
  - la inquietud por
  lexicon: HALOT
  rationale: '''Ansiedad'' recoge bien el peso interior del término y permite un paralelo natural con el primer miembro del verso. La preposición ''por'' hace explícita la relación con lo que sigue.'
- source_word: מחיה
  english_pob_choice: livelihood
  chosen_spanish: el sustento
  alternatives_spanish:
  - la subsistencia
  - el medio de vida
  - la manutención
  lexicon: HALOT
  rationale: En español bíblico actual, 'sustento' comunica tanto provisión material como lo necesario para vivir, sin sonar demasiado técnico. Mantiene la amplitud semántica del hebreo.
- source_word: תפריע
  english_pob_choice: drives away
  chosen_spanish: ahuyenta
  alternatives_spanish:
  - aleja
  - expulsa
  - espanta
  lexicon: HALOT
  rationale: '''Ahuyenta'' conserva la idea de hacer que algo se vaya, con un matiz vivo y natural en español. Funciona bien con el objeto ''el sueño''.'
- source_word: נומה
  english_pob_choice: sleep
  chosen_spanish: el sueño
  alternatives_spanish:
  - el dormir
  - el descanso
  - el sueño reparador
  lexicon: HALOT
  rationale: '''Sueño'' es la forma más directa y clara para el sustantivo hebreo. En este contexto, la expresión resultante es idiomática y fiel.'
theological_decisions:
- issue: Lectura del primer miembro del verso frente al paralelo griego
  english_pob_reading: The Hebrew is difficult; the main text follows the extant Hebrew witness while acknowledging that the Greek parallel reads differently.
  chosen_spanish_reading: Se sigue el testimonio hebreo transmitido, aunque el paralelo griego ofrece una formulación distinta.
  alternative_spanish_readings:
  - Las esperanzas vacías y falsas son para un hombre insensato.
  - Los sueños dan alas a los necios.
  rationale: El texto hebreo disponible y el griego no coinciden de forma directa. La traducción española debe reflejar el hebreo base del proyecto, pero sin ocultar la tensión textual documentada por el aparato inglés. Por eso se conserva el sentido hebreo y se deja constancia de la variante griega en nota.
  doctrine_reference: Crítica textual y transmisión del texto
- issue: Sentido de la experiencia descrita en el primer colon
  english_pob_reading: sleeplessness
  chosen_spanish_reading: insomnio
  alternative_spanish_readings:
  - vigilia
  - inquietud nocturna
  - desvelo
  rationale: El ajuste inglés reciente interpreta שקר como 'sleeplessness' para evitar duplicar 'anxiety' del segundo colon. 'Insomnio' reproduce bien esa decisión en español y mantiene la concreción corporal del verso.
  doctrine_reference: Coherencia semántica del paralelismo poético
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que cambió la primera cláusula de 'anxiety' a 'sleeplessness' para distinguirla de la ansiedad del segundo miembro y reflejar mejor el hebreo transmitido. La versión española adopta esa misma distinción con 'insomnio' y conserva la segunda cláusula casi de manera directa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en otros contextos del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene 'carne' para שארו por coherencia con el valor corporal del hebreo y para no diluir la imagen.
  - '''Sustento'' se eligió como equivalente natural de מחיה sin cargarlo con un sentido técnico excesivo.'
  - La nota textual marca claramente la divergencia con el griego para no borrar la tensión documentada.
