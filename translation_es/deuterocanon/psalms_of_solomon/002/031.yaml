translation:
  language: es
  text: su cuerpo, llevado[a] sobre las olas con gran indignidad[b], y no había quien lo enterrara;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «siendo arrastrado»; el griego permite un matiz más vívido de movimiento forzado.'
    reason: lexical_alternative
  - marker: b
