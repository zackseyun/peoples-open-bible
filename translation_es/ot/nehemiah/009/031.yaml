revisions:
- from: Pero en tus abundantes misericordias no les diste fin[a], ni los abandonaste, porque eres un Dios clemente y compasivo.
  to: Pero en tus abundantes misericordias no acabaste con ellos[a], ni los abandonaste, porque eres un Dios clemente y compasivo.
  rationale: Se propone una reparación menor para hacer el español más natural y fiel al idiomatismo hebreo. «No acabaste con ellos» comunica mejor לֹא עֲשִׂיתָם כָּלָה que «no les diste fin», sin sobreinterpretar el modo de destrucción. Se conserva «clemente y compasivo» porque mantiene la distinción documentada entre חַנּוּן y רַחוּם y es plenamente legible. La nota se rehace para reflejar la alternativa inglesa completa en español idiomático.
