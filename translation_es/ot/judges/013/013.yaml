revisions:
- from: 'Y el ángel de Yahvé dijo a Manoaj[a]: «La mujer debe cuidarse de hacer todo lo que yo le dije».'
  to: 'Y el ángel[a] de Yahvé dijo a Manoaj: «La mujer debe tener cuidado de hacer todo lo que yo le dije».'
  rationale: Se cambió 'debe cuidarse de hacer' por 'debe tener cuidado de hacer' para expresar con claridad el sentido de observancia cuidadosa de תִּשָּׁמֵר sin la ambigüedad de posible abstención. También se movió la nota al término 'ángel', que es el elemento léxico al que corresponde la alternativa 'mensajero'.
