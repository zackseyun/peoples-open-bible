review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: imperfectos continuos («buscaban», «temían»), sujetos correctos («los principales sacerdotes y los escribas»), intención homicida sin atenuación indebida («matarlo»), y referencia colectiva de λαός («el pueblo»). La única corrección necesaria es en la nota léxica alternativa para ἀνέλωσιν, cuya formulación española actual («poner a muerte») es poco natural y no coincide bien con la alternativa inglesa documentada («put him to death»).'
  spanish_quality_summary: El español principal es claro, natural y digno. «Principales sacerdotes» y «escribas» son legibles en registro bíblico; «buscaban cómo matarlo» suena idiomático; «porque temían al pueblo» es correcto y sobrio. Solo conviene pulir la nota para mejor español e idiomaticidad.
  glossary_alignment: 'No hay términos del glosario de proyecto en juego como Yahvé/Mesías/esclavo. Las decisiones léxicas relevantes sí se alinean con el expediente POB: «escribas», «el pueblo», y la fuerza de ἀνέλωσιν preservada en «matarlo».'
  issues:
  - severity: medium
    issue: La nota alternativa dice «cómo lo podían poner a muerte».
    rationale: «Poner a muerte» no es la formulación más natural en español bíblico general; la equivalencia documentada de «put him to death» se expresa mejor como «cómo podían darle muerte» o «cómo podían condenarlo a muerte» según contexto. Aquí, sin introducir juridización extra, «darle muerte» es la mejor reparación.
  revised_spanish_text: Y los principales sacerdotes y los escribas buscaban cómo matarlo[a], porque temían al pueblo.
  revised_footnotes:
  - marker: a
    text: 'O: «cómo podían darle muerte».'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel al griego y al expediente inglés. Solo se ajusta la nota alternativa para que el español suene natural y refleje mejor la alternativa léxica documentada para ἀνέλωσιν, sin añadir matiz judicial no explicitado en el original.
