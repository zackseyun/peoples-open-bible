translation:
  language: es
  text: Y Joaquim entregó la plata y el oro a Faraón, pero tasó la tierra para dar la plata según la orden de Faraón[a]. Exigió la plata y el oro al pueblo de la tierra, cada uno según su tasación[b], para dárselo a Faraón Necao[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «según la boca de Faraón»; es decir, según la orden o mandato de Faraón.
    reason: lexical_alternative
  - marker: b
    text: O «cada uno según su evaluación» o, de forma más interpretativa, «cada uno según sus medios».
    reason: lexical_alternative
  - marker: c
    text: También puede escribirse «Neco» o «Necho» en transliteraciones bíblicas.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַכֶּסֶף וְהַזָּהָב
  english_pob_choice: the silver and the gold
  chosen_spanish: la plata y el oro
  alternatives_spanish:
  - la plata y el oro precioso
  - el plata y el oro
  lexicon: HALOT
  rationale: Se mantiene el paralelismo concreto de los metales preciosos. En español bíblico, 'plata' comunica bien el sentido material y puede abarcar dinero por extensión, sin perder la referencia literal del hebreo.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - pagó
  lexicon: HALOT
  rationale: El contexto es un tributo o pago a Faraón, pero 'entregó' suena más natural en español que 'dio' y evita convertir prematuramente el verbo en un término técnico de pago. Conserva la acción básica del hebreo.
- source_word: הֶעֱרִיךְ
  english_pob_choice: assessed
  chosen_spanish: tasó
  alternatives_spanish:
  - evaluó
  - valoró
  - impuso una tasación
  lexicon: HALOT
  rationale: El verbo en causativo con 'la tierra' expresa imponer una tasación/carga fiscal. 'Tasó' refleja ese acto de fijar un gravamen de manera más directa y concreta que 'evaluó' o 'valoró'.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: Se conserva el giro hebreo literal y su valor político-territorial. 'La tierra' también permite enlazar con 'el pueblo de la tierra' en la misma frase.
- source_word: עַל־פִּי פַרְעֹה
  english_pob_choice: according to Pharaoh’s command
  chosen_spanish: según la orden de Faraón
  alternatives_spanish:
  - conforme al mandato de Faraón
  - de acuerdo con la palabra de Faraón
  lexicon: HALOT
  rationale: El idiomático עַל־פִּי comunica una disposición autoritativa. 'Según la orden de Faraón' expresa bien la fuerza normativa del original sin calco duro.
- source_word: אִישׁ כְּעֶרְכּוֹ
  english_pob_choice: each according to his assessment
  chosen_spanish: cada uno según su tasación
  alternatives_spanish:
  - cada uno según su evaluación
  - cada uno según su valoración
  lexicon: HALOT
  rationale: La expresión individualiza la carga fiscal conforme a una tasación personal. 'Tasación' mantiene el vínculo con el verbo anterior y evita diluir el matiz administrativo del hebreo.
- source_word: נָגַשׂ
  english_pob_choice: exacted
  chosen_spanish: exigió
  alternatives_spanish:
  - apremió
  - cobró
  - presionó
  lexicon: HALOT
  rationale: El verbo tiene fuerza coercitiva; 'exigió' comunica bien la presión para recaudar, sin sonar tan técnico o arcaico como 'exaccionó'.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - los habitantes del país
  lexicon: HALOT
  rationale: Se preserva la formulación hebrea y su posible carga socio-política sin interpretarla de más. 'Pueblo de la tierra' es más literal que 'gente' y mantiene la correspondencia con el original.
- source_word: פַרְעֹה נְכֹה
  english_pob_choice: Pharaoh Neco
  chosen_spanish: Faraón Necao
  alternatives_spanish:
  - Faraón Neco
  - Faraón Neco
  lexicon: standard transliteration
  rationale: Se usa una transliteración española estable y reconocible. 'Necao' es una forma común en español bíblico; se conserva la referencia histórica del nombre propio.
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió ''taxed'' por ''assessed'' y ''each according to his valuation'' por ''each according to his assessment''. El español sigue esa línea: usa ''tasó'' y ''tasación'' para reflejar el matiz de fijar una carga según valoración administrativa, manteniendo el verbo de coerción en ''exigió''.'
  spanish_consistency_notes:
  - Se mantiene 'Faraón' sin artículo cuando funciona como nombre/título regido por la preposición.
  - '''La tierra'' y ''el pueblo de la tierra'' conservan la literalidad del hebreo y evitan explicaciones sociales no explícitas en el verso.'
  - Se prefirió 'Necao' por naturalidad en español bíblico, dejando una nota sobre variantes transliteradas.
  - No se introdujo ningún término doctrinal porque el versículo es histórico-administrativo.
