    changes_summary: Revised 'cause it to happen before me today' to 'grant success before me today' to more naturally and accurately reflect הַקְרֵה נָא in context. Kept 'steadfast love' for חֶסֶד and the formal register.
translation:
  language: es
  text: 'Y dijo: «Oh Yahvé, Dios de mi amo Abraham, te ruego que hagas[a] que suceda delante de mí hoy,[b] y muestres amor leal[c] a mi amo Abraham».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «causes que ocurra». El verbo hebreo pide que Dios disponga providencialmente el encuentro deseado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hoy mismo».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «bondad leal», «misericordia leal» o «fidelidad del pacto». El hebreo חֶסֶד expresa lealtad bondadosa y compromiso de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino aparece explícitamente en el hebreo. En la POB inglesa se traduce como Yahweh; en español, el equivalente establecido por el proyecto es Yahvé, preservando el nombre propio del pacto y evitando la máscara tradicional “SEÑOR”.
- source_word: אֱלֹהֵי אֲדֹנִי אַבְרָהָם
  english_pob_choice: God of my master Abraham
  chosen_spanish: Dios de mi señor Abraham
  alternatives_spanish:
  - Dios de mi amo Abraham
  - Dios de mi señor y padre Abraham
  lexicon: HALOT
  rationale: La cadena constructa con sufijo posesivo expresa relación de pertenencia/autoridad del hablante hacia Abraham. “Señor” conserva mejor el registro relacional en español que “amo”, que sería más duro y menos natural en esta fórmula de oración.
- source_word: הַקְרֵה
  english_pob_choice: grant success
  chosen_spanish: hagas que tenga éxito
  alternatives_spanish:
  - hagas que ocurra
  - causes que suceda
  - concedas que acontezca
  lexicon: HALOT
  rationale: El verbo en hiphil pide que Dios haga que el encuentro resulte favorable/providencial. “Hagas que tenga éxito” refleja el sentido de éxito en la misión, siguiendo la revisión inglesa más reciente, y evita una fórmula demasiado mecánica.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: te ruego
  alternatives_spanish:
  - por favor
  - te suplico
  lexicon: HALOT
  rationale: La partícula de cortesía en una súplica se expresa con naturalidad y dignidad en español con “te ruego”, más acorde con el tono orante que el simple “por favor”.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: “Delante de mí” conserva la imagen espacial del hebreo y comunica que el acontecimiento debe darse a la vista del orante. “Ante mí” sería posible, pero “delante de mí” resulta más claro y natural.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Adverbio temporal directo y idiomático en español.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - amor constante
  - bondad leal
  - misericordia leal
  lexicon: HALOT
  rationale: חֶסֶד tiene una densidad de lealtad pactal y bondad activa que la POB inglesa preserva con “steadfast love”. En español, “amor leal” comunica mejor esa combinación sin sonar tan técnico como “fidelidad del pacto”, y mantiene la tensión entre afecto y lealtad.
- source_word: עִם אֲדֹנִי אַבְרָהָם
  english_pob_choice: to my master Abraham
  chosen_spanish: a mi señor Abraham
  alternatives_spanish:
  - con mi señor Abraham
  - para mi señor Abraham
  lexicon: HALOT
  rationale: Aunque עִם es literalmente “con”, la oración en español pide una relación beneficiaria más natural con el verbo de benevolencia. “A mi señor Abraham” conserva esa naturalidad sin perder el destinatario de la acción.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El hebreo usa el Tetragrama directamente. La POB inglesa mantiene el nombre propio; en español se sigue la convención del proyecto con Yahvé para conservar la identidad del nombre del pacto y no sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor teológico de חֶסֶד en la petición
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - bondad leal
  - misericordia
  - fidelidad del pacto
  rationale: La petición no pide una bondad genérica, sino una acción leal y comprometida de parte de Dios hacia Abraham. “Amor leal” mantiene la dimensión relacional y pactal sin sobrecargar el texto con terminología técnica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió una formulación de éxito/providencia para הַקְרֵה y mantuvo steadfast love para חֶסֶד. La versión española sigue esa dirección semántica, pero adapta la petición a un español natural y de registro bíblico digno.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se conserva señor para אֲדֹנִי en sentido relacional de respeto/autoridad contextual, sin introducir el título divino.
  - Se traduce חֶסֶד con una expresión compuesta de valor leal-pactual, evitando reducirlo a simple amabilidad.
  - La forma verbal de petición en español busca reflejar el hiphil causativo sin sonar forzada.
  - Los marcadores de nota aparecen solo en los puntos textuales donde la alternativa afecta al sentido.
