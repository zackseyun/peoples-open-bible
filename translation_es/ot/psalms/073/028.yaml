translation:
  language: es
  text: Pero en cuanto a mí[a], la cercanía de Dios es buena para mí; he hecho del Señor Yahvé mi refugio, para contar todas tus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «acercarse a Dios es bueno para mí». El sustantivo hebreo puede entenderse como cercanía relacional a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Pero yo
  - Y en cuanto a mí
  lexicon: HALOT
  rationale: La partícula adversativa con el pronombre independiente expresa contraste enfático con lo anterior. «Pero en cuanto a mí» reproduce ese giro contrastivo de manera natural en español sin perder el énfasis personal.
- source_word: קִרֲבַת אֱלֹהִים
  english_pob_choice: the nearness of God
  chosen_spanish: la cercanía de Dios
  alternatives_spanish:
  - la proximidad de Dios
  - acercarse a Dios
  lexicon: HALOT
  rationale: El sustantivo denota cercanía o proximidad. «La cercanía de Dios» conserva la forma nominal y deja abierta la tensión documentada entre la cercanía de Dios y el acercarse a Dios, sin convertirla de modo explícito en una acción.
- source_word: לִי טוֹב
  english_pob_choice: is good for me
  chosen_spanish: me es buena
  alternatives_spanish:
  - es bueno para mí
  - es mi bien
  lexicon: HALOT
  rationale: La construcción expresa beneficio o bienestar. En español, «me es buena» conserva la relación personal del hebreo y evita una paráfrasis demasiado interpretativa; la formulación es algo más formal, pero fiel al sentido.
- source_word: שַׁתִּי
  english_pob_choice: I have made
  chosen_spanish: he hecho de
  alternatives_spanish:
  - he puesto en
  - he establecido como
  lexicon: HALOT
  rationale: El verbo tiene el valor de poner/establecer/hacer. «He hecho de» funciona bien con un complemento predicativo como «mi refugio» y expresa decisión personal de confianza, como en el audit trail en inglés.
- source_word: בַּאדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: Se preserva el nombre divino como «Yahvé» según el estándar del proyecto, y se mantiene el título reverencial con «el Señor» para reflejar la combinación אדֹנָי + יהוה. La coma ayuda a mostrar el doble referente sin hacer una calca extraña en español.
- source_word: מַחְסִי
  english_pob_choice: my refuge
  chosen_spanish: mi refugio
  alternatives_spanish:
  - mi asilo
  - mi abrigo
  lexicon: HALOT
  rationale: «Refugio» es la equivalencia directa y tradicional en Salmos para la imagen de amparo y seguridad.
- source_word: לְסַפֵּר
  english_pob_choice: so that I may tell of
  chosen_spanish: para contar
  alternatives_spanish:
  - para relatar
  - para declarar
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito. «Para contar» es natural en español y mantiene la idea de narrar o referir las acciones de Dios sin sobrecargar el verso.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: El cuantificador se ajusta al sustantivo femenino plural «obras». Se mantiene la totalidad sin añadir matices ajenos al texto.
- source_word: מַלְאֲכוֹתֶיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - tus acciones
  lexicon: HALOT
  rationale: Aunque el término puede abarcar trabajo o actividad, en este contexto se refiere a lo que Dios ha hecho. «Obras» es claro en español y conserva la amplitud del hebreo y del inglés auditado.
theological_decisions:
- issue: Nombre divino en בַּאדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El texto hebreo contiene el Tetragrámaton y el título אדֹנָי. El español del proyecto usa «Yahvé» para יהוה; se añade «el Señor» para reflejar el título reverencial presente en el compuesto. Esto conserva la distinción de los dos elementos sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Tensión en קִרֲבַת אֱלֹהִים
  english_pob_reading: the nearness of God is good for me
  chosen_spanish_reading: la cercanía de Dios me es buena
  alternative_spanish_readings:
  - acercarse a Dios me es bueno
  - la proximidad de Dios me es buena
  rationale: La forma nominal puede entenderse como la cercanía de Dios o como la cercanía hacia Dios. La redacción elegida preserva esa ambigüedad teológica y relacional en vez de resolverla por completo en una sola dirección.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios sustantivos; por eso se mantiene la solución de sentido, ajustada solo a una formulación española publicable y al estándar del proyecto para el nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se mantiene «Señor» como reflejo del título אדֹנָי en el compuesto reverencial.
  - «Obras» conserva la amplitud de מַלְאֲכוֹת sin forzar «hechos» o «mighty acts».
  - La nota al pie preserva la alternativa interpretativa sobre קִרֲבַת אֱלֹהִים.
  - La sintaxis busca ser natural en español sin perder la estructura nominal del hebreo.
