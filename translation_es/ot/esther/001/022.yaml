  - marker: c
    text: Or 'that every husband should rule in his own house.' The Hebrew says 'every man,' but in context the decree concerns household authority in marriage.
    reason: lexical_alternative
  - marker: d
    text: The final clause may mean either that each man was to speak the language of his own people, or more broadly that household order should reflect the husband's linguistic identity.
    reason: alternative_reading
