base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/029/008.yaml
  text: David said to Achish[a], “But what have I done? And what have you found in your servant from the day I have been before you until this day[b], that I should not go and fight against the enemies of my lord the king?”
  footnotes:
  - marker: a
    text: Or 'from the day I came before you until this day.' The Hebrew is more literally 'from the day I was before you.'
    reason: lexical_alternative
  - marker: b
    text: '''My lord the king'' is left as spoken. David''s wording may be straightforwardly addressed to Achish, or it may carry deliberate ambiguity in the narrative context.'
    reason: alternative_reading
