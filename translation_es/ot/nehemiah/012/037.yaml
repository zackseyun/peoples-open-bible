translation:
  language: es
  text: Y junto a la Puerta de la Fuente[a], enfrente de ellos, subieron por las gradas[b] de la ciudad de David, en la subida del muro, por encima de la casa de David, y hasta la Puerta del Agua, al oriente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la Puerta del Manantial'. El término hebreo puede referirse también a un manantial o fuente de agua.
    reason: lexical_alternative
  - marker: b
    text: O 'las escaleras de la ciudad de David'. El hebreo puede entenderse como una estructura de escaleras o, de manera más general, como una subida.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁעַר הָעַיִן
  english_pob_choice: the Fountain Gate
  chosen_spanish: la Puerta de la Fuente
  alternatives_spanish:
  - la Puerta del Manantial
  - la Puerta de la Fuente de Agua
  lexicon: HALOT
  rationale: שַׁעַר es 'puerta' y עַיִן puede referirse a una fuente o manantial. 'Puerta de la Fuente' conserva la imagen topográfica y suena natural en español bíblico.
- source_word: וְנֶגְדָּם
  english_pob_choice: in front of them
  chosen_spanish: enfrente de ellos
  alternatives_spanish:
  - delante de ellos
  - opuestos a ellos
  lexicon: HALOT
  rationale: El hebreo indica ubicación relativa frente al grupo. 'Enfrente de ellos' mantiene el valor espacial claro sin introducir una lectura más fuerte que el contexto no exige.
- source_word: עָלוּ
  english_pob_choice: they went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - subieron hacia arriba
  lexicon: HALOT
  rationale: עלה en qal expresa movimiento ascendente. 'Subieron' es natural en español y preserva la imagen de ascenso.
- source_word: מַעֲלוֹת עִיר דָּוִיד
  english_pob_choice: the stairs of the city of David
  chosen_spanish: las gradas de la ciudad de David
  alternatives_spanish:
  - las escaleras de la ciudad de David
  - los escalones de la ciudad de David
  lexicon: HALOT
  rationale: מַעֲלוֹת puede significar escaleras, gradas o escalones. 'Gradas' conserva el carácter de estructura construida y resulta sobrio en español; además evita sonar demasiado moderno o demasiado literal.
- source_word: בַּמַּעֲלֶה לַחוֹמָה
  english_pob_choice: at the ascent of the wall
  chosen_spanish: en la subida del muro
  alternatives_spanish:
  - en la pendiente del muro
  - en el ascenso del muro
  lexicon: HALOT
  rationale: מַעֲלֶה es singular y denota una subida o acceso. 'En la subida del muro' refleja la localización del recorrido sin forzar una construcción extraña en español; 'muro' traduce לַחוֹמָה con el sentido físico del perímetro.
- source_word: מֵעַל לְבֵית דָּוִיד
  english_pob_choice: above the house of David
  chosen_spanish: por encima de la casa de David
  alternatives_spanish:
  - sobre la casa de David
  - por arriba de la casa de David
  lexicon: HALOT
  rationale: מֵעַל indica estar arriba o por encima de algo. 'Por encima de' expresa la relación de altura dentro de una descripción de ruta, sin sugerir necesariamente contacto o dominio.
- source_word: שַׁעַר הַמַּיִם מִזְרָח
  english_pob_choice: the Water Gate on the east
  chosen_spanish: la Puerta del Agua, hacia el oriente
  alternatives_spanish:
  - la Puerta del Agua, al oriente
  - la Puerta del Agua, en el oriente
  lexicon: HALOT
  rationale: מִזְרָח significa 'este' o 'oriente'. 'Hacia el oriente' reproduce con naturalidad la orientación topográfica y mantiene el matiz direccional que el hebreo permite.
- source_word: וְעַל
  english_pob_choice: And by
  chosen_spanish: Y junto a
  alternatives_spanish:
  - Y en
  - Y sobre
  lexicon: HALOT
  rationale: עַל en este contexto narrativo-topográfico marca ubicación cercana o adyacente. 'Junto a' comunica esa proximidad de manera natural en español.
translation_notes:
  revision_awareness: La revisión auditada en inglés ajustó la expresión de la relación con el muro de 'to the wall' a 'of the wall' para reflejar mejor el sintagma constructo. En español se adoptó 'en la subida del muro', que conserva el carácter locativo y topográfico del hebreo sin introducir la relación de finalidad que 'hacia el muro' podría sugerir.
  spanish_consistency_notes:
  - Se mantuvo 'Puerta' para שַׁעַר de modo uniforme.
  - '''Yahvé'' no aparece en este versículo.'
  - Se prefirió vocabulario topográfico claro y sobrio, evitando paraphrase excesiva.
  - '''oriente'' se usa como equivalente bíblico de מִזְרָח, coherente con registros eclesiales hispanos amplios.'
