translation:
  language: es
  text: Después de estos días[a], cada uno volvió a su heredad, y Judit fue a Betulia y permaneció en su propiedad[b], y en su tiempo llegó a ser renombrada[c] en toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de aquellos días»; también puede entenderse «después de estas cosas», pero el griego menciona explícitamente «días» y marca una transición temporal.
    reason: alternative_reading
  - marker: b
    text: O «en su hacienda» para «en su propiedad»; el griego ἐπὶ τῆς ὑπάρξεως αὐτῆς se refiere a las posesiones o tenencia propia de Judit.
    reason: lexical_alternative
  - marker: c
    text: O «honrada» / «gloriosa» para «renombrada»; ἔνδοξος puede expresar fama pública y honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τὰς ἡμέρας ταύτας
  english_pob_choice: After these days
  chosen_spanish: Después de estos días
  alternatives_spanish:
  - Después de estas cosas
  - Después de aquellos días
  lexicon: LSJ
  rationale: La expresión introduce un cambio temporal. «Después de estos días» sigue de cerca el griego ἡμέρας y suena natural en español.
- source_word: ἀνέζευξεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - partió
  - levantó el campamento y volvió
  lexicon: LSJ
  rationale: El verbo puede sugerir levantarse o reemprender marcha, pero aquí el contexto de ir a su heredad pide la idea de retorno. «Volvió» preserva el movimiento sin sonar forzado.
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - todos
  lexicon: LSJ
  rationale: «Cada uno» reproduce bien el valor distributivo del griego y concuerda con el singular posesivo implícito en la frase siguiente.
- source_word: εἰς τὴν κληρονομίαν αὐτοῦ
  english_pob_choice: to his own inheritance
  chosen_spanish: a su heredad
  alternatives_spanish:
  - a su herencia
  - a su posesión asignada
  - a su lote asignado
  lexicon: LSJ
  rationale: κλῆρονομία puede denotar herencia o porción recibida. «Heredad» conserva el sentido bíblico de porción/territorio asignado y evita reducirlo a simple propiedad.
- source_word: ἀπῆλθεν εἰς Βαιτυλουὰ
  english_pob_choice: went away to Bethulia
  chosen_spanish: fue a Betulia
  alternatives_spanish:
  - partió a Betulia
  - se fue a Betulia
  - marchó a Betulia
  lexicon: LSJ
  rationale: El verbo marca salida, pero en español la construcción más fluida es «fue a Betulia». El nombre propio se translitera como Betulia.
- source_word: κατέμεινεν
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - siguió viviendo
  - residió
  lexicon: LSJ
  rationale: El verbo expresa continuidad de residencia. «Permaneció» mantiene el tono narrativo formal.
- source_word: ἐπὶ τῆς ὑπάρξεως αὐτῆς
  english_pob_choice: on her own property
  chosen_spanish: en sus bienes
  alternatives_spanish:
  - en su propiedad
  - en su hacienda
  - en su posesión
  lexicon: LSJ
  rationale: ὑπάρξις puede referirse a bienes o posesiones. «En sus bienes» conserva la amplitud semántica sin forzar un tecnicismo legal; en nota puede admitirse la alternativa «propiedad/hacienda».
- source_word: κατὰ τὸν καιρὸν αὐτῆς
  english_pob_choice: in her time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - durante su vida
  - en sus días
  lexicon: LSJ
  rationale: La frase señala el período de su vida o generación. «En su tiempo» es claro y literal a la vez.
- source_word: ἔνδοξος
  english_pob_choice: renowned
  chosen_spanish: renombrada
  alternatives_spanish:
  - gloriosa
  - honrada
  - famosa
  lexicon: LSJ
  rationale: El adjetivo puede implicar gloria u honor público. «Renombrada» refleja la reputación extendida por toda la tierra sin sobrecargar el sentido teológico de «gloria».
- source_word: ἐν πάσῃ τῇ γῇ
  english_pob_choice: throughout all the land
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la región
  - por toda la tierra
  lexicon: LSJ
  rationale: γῇ aquí se entiende como tierra/país/región, no el mundo entero. «En toda la tierra» conserva la amplitud geográfica del griego y sigue el uso bíblico.
theological_decisions:
- issue: Sentido de κληρονομία en un contexto narrativo de retorno
  english_pob_reading: inheritance
  chosen_spanish_reading: heredad
  alternative_spanish_readings:
  - herencia
  - posesión
  - lote asignado
  rationale: No hay un matiz doctrinal central, pero «heredad» mantiene la resonancia bíblica de porción recibida y evita reducir el término a mera propiedad privada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Valor de ἔνδοξος aplicado a Judit
  english_pob_reading: renowned
  chosen_spanish_reading: renombrada
  alternative_spanish_readings:
  - gloriosa
  - honrada
  - famosa
  rationale: El texto describe la honra/reputación pública de Judit, no una afirmación teológica sobre gloria intrínseca. «Renombrada» conserva ese sentido sin exagerarlo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: se mantuvo la transición temporal, el retorno a la heredad, la residencia en sus bienes/posesiones y la reputación pública de Judit. La redacción española privilegia claridad natural sin perder la ambigüedad léxica documentada.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el tetragrámaton.
  - Se prefirió «heredad» para κληρονομία, en coherencia con el lenguaje bíblico de porción asignada.
  - Se evitó «Cristo/Mesías» porque no hay equivalente en el versículo.
  - «Renombrada» conserva el matiz de honor/reputación de ἔνδοξος sin convertirlo en lenguaje litúrgico.
