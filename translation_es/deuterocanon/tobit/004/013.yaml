  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y la auditoría inglesa en la estructura principal: vocativo tierno, mandato de amar a los hermanos, advertencia contra la soberbia interior respecto de los parientes y del pueblo, cláusula matrimonial comprimida, y proverbio final sobre las consecuencias de la ἀχρειότης. Sin embargo, hay varios puntos donde el español no preserva bien la fuerza o la naturalidad del sentido: «niño» suena demasiado infantil para παιδίον en este contexto sapiencial; «sobre tus hermanos» es poco idiomático en español para expresar exaltarse por encima de otros; y «para tomar de entre ellos una esposa para ti» es demasiado calcado. Además, la nota b introduce «maldad», que no corresponde bien al campo semántico aquí documentado.'
  spanish_quality_summary: La redacción es generalmente comprensible, pero presenta calcos que afectan la legibilidad y el tono bíblico natural en español. «Hijo» funciona mejor que «niño» como apelación paternal digna; «no te envanezcas en tu corazón por encima de...» expresa mejor la idea; y «para tomar de entre ellas una esposa» o «para tomar una esposa de entre ellos» necesita alisado idiomático. «Inutilidad» es posible por la revisión inglesa, pero en español suena abstracto y menos claro con «disminución» y «hambre»; una formulación como «ociosidad» o «holgazanería» sería más natural, pero dado el rastro auditado inglés conviene mantener la decisión con una nota mejor enfocada. También debe corregirse la concordancia implícita del grupo mixto «hijos y hijas» con «de entre ellos».
  glossary_alignment: No hay términos de glosario mayormente afectados. La revisión propuesta mantiene el sentido de ἀχρειότης con «inutilidad» por fidelidad al rastro inglés revisado, pero mejora la nota para dejar claro que en contexto apunta a inactividad improductiva. No se introducen excepciones de terminología teológica.
  issues:
  - severity: medium
    issue: «niño» para παιδίον
    rationale: Aunque literalmente posible, en español bíblico general suena demasiado infantil. El contexto de instrucción paternal sapiencial pide una apelación más digna y natural como «hijo», aun si el inglés conservó «child» para evitar sobredeterminar género.
  - severity: medium
    issue: «no te engrías ... sobre tus hermanos» es poco idiomático
    rationale: El verbo y la preposición comunican la idea general, pero «sobre tus hermanos» suena forzado. «No te envanezcas en tu corazón por encima de tus hermanos...» preserva mejor la relación de superioridad implícita por ἀπό con lenguaje de soberbia.
  - severity: medium
    issue: La cláusula matrimonial está demasiado calcada
    rationale: «para tomar de entre ellos una esposa para ti» es comprensible pero dura en español. Conviene una forma más natural como «para tomar una esposa de entre ellos», manteniendo la compresión del griego y la tensión documentada.
  - severity: medium
    issue: La nota b introduce «maldad», que no refleja bien ἀχρειότης aquí
    rationale: El expediente inglés documenta alternativas como idleness/sloth/worthlessness, no «maldad». En este contexto de mengua, necesidad y hambre, la nota debe orientar hacia inactividad improductiva, no perversidad moral general.
