base_translation:
  language: en
  yaml_path: translation/ot/proverbs/006/035.yaml
  text: He will accept no ransom[b][a], and he will not be satisfied though you multiply bribes.
  footnotes:
  - marker: a
    text: Literally, 'he will not lift up the face of any ransom,' an idiom meaning he will show no favor by accepting payment.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not consent,' that is, he will refuse to be appeased even if you offer many bribes.
    reason: lexical_alternative
