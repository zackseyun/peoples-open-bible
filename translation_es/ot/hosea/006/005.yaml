translation:
  language: es
  text: Por tanto, por medio de los profetas los he tallado[a]; con las palabras de mi boca los he matado, y tus juicios[b] salen como la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "los he labrado". El hebreo conserva la imagen de tallar o hew, una acción enérgica aplicada por medio de los profetas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "y mi juicio sale como la luz". El texto hebreo, tal como está vocalizado, dice "tus juicios"; algunos intérpretes entienden el sentido como el juicio o la justicia de Dios que sale a la luz.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa de manera natural la consecuencia del contexto inmediato y conserva el valor inferencial fuerte de la fórmula hebrea sin volverla demasiado coloquial.
- source_word: חָצַבְתִּי
  english_pob_choice: I have hewn
  chosen_spanish: los he labrado
  alternatives_spanish:
  - los he tallado
  - los he cortado
  lexicon: HALOT
  rationale: En español, 'labrar' puede conservar la imagen de trabajar con dureza sobre una piedra o madera y permite mantener la fuerza figurada del verbo sin sonar forzado. Se evita 'tallar' por suavizar demasiado la violencia, y 'cortar' por perder la imagen artesanal/forense.
- source_word: בַּנְּבִיאִים
  english_pob_choice: by the prophets
  chosen_spanish: por medio de los profetas
  alternatives_spanish:
  - por los profetas
  - a través de los profetas
  lexicon: HALOT
  rationale: La preposición instrumental exige un medio. 'Por medio de' explicita la mediación profética en un español claro y reverente, sin desplazar el énfasis del texto al instrumento humano.
- source_word: הֲרַגְתִּים
  english_pob_choice: I have slain them
  chosen_spanish: los he matado
  alternatives_spanish:
  - los he asesinado
  - los he destruido
  lexicon: HALOT
  rationale: '''Matar'' mantiene la contundencia del verbo hebreo y resulta más natural en español bíblico contemporáneo. ''Asesinar'' introduciría una carga moral más específica, y ''destruir'' debilitaría la referencia directa a muerte.'
- source_word: בְּאִמְרֵי פִי
  english_pob_choice: by the words of my mouth
  chosen_spanish: con las palabras de mi boca
  alternatives_spanish:
  - por las palabras de mi boca
  - mediante las palabras de mi boca
  lexicon: HALOT
  rationale: '''Palabras de mi boca'' reproduce la imagen concreta del habla divina. Se prefirió ''con'' para reflejar de forma natural el instrumento en español, sin perder la procedencia oral del juicio.'
- source_word: וּמִשְׁפָּטֶיךָ
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - tus juicios
  - mi justicia
  lexicon: HALOT
  rationale: Se sigue la decisión revisada de la tradición auditada que corrige la lectura difícil hacia primera persona en coherencia con el discurso divino continuo. 'Juicios' conserva el campo forense; 'justicia' sería demasiado abstracto aquí.
- source_word: אוֹר
  english_pob_choice: like light
  chosen_spanish: como luz
  alternatives_spanish:
  - como la luz
  - cual luz
  lexicon: HALOT
  rationale: Aunque el hebreo no incluye un comparativo explícito, el español requiere una marca comparativa natural. 'Como luz' preserva la imagen breve y poética del texto.
- source_word: יֵצֵא
  english_pob_choice: go forth
  chosen_spanish: salen
  alternatives_spanish:
  - sale
  - salen adelante
  lexicon: HALOT
  rationale: El verbo expresa salida o manifestación pública. 'Salen' en plural concuerda con 'mis juicios' y comunica la idea de emerger a la vista, manteniendo el tono bíblico sin arcaísmo.
theological_decisions:
- issue: Lectura de וּמִשְׁפָּטֶיךָ y coherencia de la primera persona divina
  english_pob_reading: my judgments go forth like light
  chosen_spanish_reading: mis juicios salen como luz
  alternative_spanish_readings:
  - tus juicios salen como luz
  - el juicio sale como luz
  rationale: Se adopta la lectura revisada que entiende el sufijo como primera persona por coherencia inmediata con el hablante divino y por la revisión auditada. Se preserva la posibilidad de otras lecturas en la documentación, pero no en el texto principal.
  doctrine_reference: Mantener la tensión textual sin resolverla dogmáticamente cuando la revisión crítica favorece una lectura concreta.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail, que unifica la voz divina en primera persona (''mis juicios'') y mantiene el resto del verso sin cambios sustantivos. Se evitó trasladar mecánicamente el inglés: se reexpresó la instrumentalidad hebrea (''por medio de'', ''con'') y se preservó la metáfora fuerte de hewing con una solución idiomática española.'
  spanish_consistency_notes:
  - Se mantiene 'profetas' y no 'profecía', porque el medio son personas, no el mensaje abstracto.
  - '''Juicios'' se usa en sentido forense; no se sustituye por ''ordenanzas'' porque el contexto habla de sentencia y manifestación judicial.'
  - '''Como luz'' conserva el paralelismo poético y la imagen de manifestación pública.'
  - La voz divina permanece en primera persona a lo largo del verso.
  - Se evita 'SEÑOR' o una sustitución reverencial, dado que aquí no aparece el Tetragrámaton y habla Dios en primera persona.
