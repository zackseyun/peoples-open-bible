  text: Then the five men went and came to Laish[a], and they saw the people who were in it, dwelling securely, according to the custom of the Sidonians, quiet and secure. And there was no one in the land to humiliate them in anything, possessing authority; and they were far from the Sidonians[c][b], and they had no dealings with anyone.
  footnotes:
