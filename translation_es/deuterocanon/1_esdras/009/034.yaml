  text: 'Y de los hijos de Baanei: Jeremías[a], Momdios, Maeros, Iouna, Mamdai, y Pedias, y Anos, Carabasión, y Enaseibos, y Mamntanaimos, Eliaseis, Bannous, Edialeis, Someis, Selemías, Natanías; y de los hijos de Exora: Seseis, Ezreil, Azaelos, Samatos, Zambrei[b], Phosepos.'
  philosophy: optimal-equivalence
  footnotes:
