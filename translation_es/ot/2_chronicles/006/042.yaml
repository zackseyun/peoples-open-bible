translation:
  language: es
  text: Oh, Yahvé Dios[a], no apartes el rostro de tu ungido[b]; acuérdate del amor fiel[c] mostrado a David, tu siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''no rechaces''. El hebreo dice literalmente: ''no apartes el rostro de tu ungido''.'
    reason: lexical_alternative
  - marker: b
    text: '''Tu ungido'' también puede traducirse ''tu Mesías'' o, según el contexto, ''tu rey''.'
    reason: alternative_reading
  - marker: c
    text: O 'las misericordias mostradas a David, tu siervo' o 'la lealtad de pacto mostrada a David, tu siervo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: WLC/HALOT
  rationale: Se conserva el nombre propio del pacto con la forma española establecida en el proyecto, que distingue el tetragrámaton de un título genérico y evita el ocultamiento mediante 'Señor'.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: WLC/HALOT
  rationale: En vocativo directo tras YHWH funciona como título divino común; 'Dios' es la equivalencia natural y reverente en español.
- source_word: אַל תָּשֵׁב
  english_pob_choice: do not turn away
  chosen_spanish: no apartes
  alternatives_spanish:
  - no rechaces
  - no vuelvas atrás
  lexicon: WLC/HALOT
  rationale: El hebreo expresa literalmente la imagen de 'hacer volver/apartar' el rostro. 'No apartes' preserva la metáfora sin sonar forzado en español; 'rechaces' explicita el sentido pero pierde la imagen.
- source_word: פְּנֵי
  english_pob_choice: the face
  chosen_spanish: el rostro
  alternatives_spanish:
  - la presencia
  - la persona
  lexicon: WLC/HALOT
  rationale: Se mantiene la imagen concreta del hebreo. 'Rostro' es el equivalente español más natural y conserva la fuerza poética e idiomática mejor que 'presencia'.
- source_word: מְשִׁיחֶךָ
  english_pob_choice: your anointed one
  chosen_spanish: tu ungido
  alternatives_spanish:
  - tu Mesías
  - tu rey
  lexicon: WLC/HALOT
  rationale: En este contexto oracional davídico/real, 'ungido' reproduce el valor léxico de מָשִׁיחַ sin cargar el verso con una formulación más específica de la que el contexto inmediato exige. 'Mesías' o 'rey' son posibles pero más interpretativos.
- source_word: זָכְרָה
  english_pob_choice: remember
  chosen_spanish: acuérdate
  alternatives_spanish:
  - recuerda
  - ten presente
  lexicon: WLC/HALOT
  rationale: La forma española imperativa reflexiva es idiomática en una oración dirigida a Dios y preserva el tono de súplica del hebreo.
- source_word: לְחַסְדֵי
  english_pob_choice: the steadfast love shown to
  chosen_spanish: la fidelidad amorosa mostrada a
  alternatives_spanish:
  - las misericordias mostradas a
  - la bondad de
  lexicon: HALOT
  rationale: חֶסֶד combina lealtad del pacto, amor fiel y misericordia. 'Fidelidad amorosa' intenta mantener esa tensión sin reducirla a una sola noción; 'misericordias' suena más tradicional pero menos preciso.
- source_word: דָּוִיד עַבְדֶּךָ
  english_pob_choice: David your servant
  chosen_spanish: David, tu siervo
  alternatives_spanish:
  - David, tu esclavo
  lexicon: WLC/HALOT
  rationale: Aquí עבד es una designación honorífica y pactual, no 'esclavo' en sentido social. 'Siervo' es la equivalencia española más clara y reverente para este contexto.
theological_decisions:
- issue: Cómo renderizar מְשִׁיחֶךָ sin sobrerinterpretar el alcance mesiánico
  english_pob_reading: your anointed one
  chosen_spanish_reading: tu ungido
  alternative_spanish_readings:
  - tu Mesías
  - tu rey
  rationale: El hebreo permite resonancias mesiánicas canónicas, pero en esta oración inmediata el referente es el rey davídico. 'Tu ungido' conserva la ambigüedad productiva y evita imponer una lectura más estrecha o más explícitamente cristológica que la base textual no exige aquí.
  doctrine_reference: Principio de mantener la tensión lexical donde el contexto histórico-gramatical y la lectura canónica no coinciden plenamente.
- issue: Valor semántico de חֶסֶד en una petición de memoria divina
  english_pob_reading: the steadfast love shown to David your servant
  chosen_spanish_reading: la fidelidad amorosa mostrada a David, tu siervo
  alternative_spanish_readings:
  - las misericordias mostradas a David, tu siervo
  - la lealtad de pacto mostrada a David, tu siervo
  rationale: El hebreo puede abarcar misericordia, lealtad y amor fiel. La opción elegida busca preservar la amplitud semántica sin imponer un solo matiz. 'Fidelidad amorosa' comunica la dimensión relacional y pactual que el contexto de la oración de Salomón requiere.
  doctrine_reference: Transparencia semántica y preservación de términos de pacto cuando el original los mantiene abiertos.
translation_notes:
  revision_awareness: Se cotejó el borrador con el audit trail inglés y con la lectura hebrea directa. No se detectaron revisiones aplicadas en la versión inglesa más reciente; por tanto, se mantiene la solución de alto acuerdo, con ajustes solo para naturalidad y transparencia en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como máscara para el nombre divino.
  - '''Ungido'' se conserva para מְשִׁיחַ en coherencia con el valor léxico y la ambigüedad histórica del contexto.'
  - '''Siervo'' se usa para עבד en sentido pactual, no ''esclavo''.'
  - '''Fidelidad amorosa'' intenta reflejar חֶסֶד sin reducirlo a ''misericordia'' únicamente.'
