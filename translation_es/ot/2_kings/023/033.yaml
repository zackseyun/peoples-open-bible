    text: Or 'bound him' or 'confined him.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression may be rendered 'so that he might not reign in Jerusalem' or 'from reigning in Jerusalem.'
    reason: alternative_reading
  - marker: c
    text: Or 'a penalty' or 'a fine' instead of 'a tribute.'
    reason: lexical_alternative
