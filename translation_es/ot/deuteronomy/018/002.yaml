translation:
  language: es
  text: No tendrá heredad entre sus hermanos[a]; Yahvé es su heredad[b], como le habló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes». El hebreo dice literalmente «sus hermanos», refiriéndose a sus compañeros israelitas, específicamente las demás tribus.
    reason: lexical_alternative
  - marker: b
    text: O «como le dijo». El verbo hebreo es el término ordinario para «hablar»; «prometió» es posible por implicación, pero es más interpretativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲלָה / נַחֲלָתוֹ
  english_pob_choice: inheritance
  chosen_spanish: heredad
  alternatives_spanish:
  - herencia
  - posesión
  - porción
  lexicon: HALOT
  rationale: En Deuteronomio, נַחֲלָה suele referirse a la porción heredada en el reparto de la tierra; en español, «heredad» conserva ese valor patrimonial y tradicional sin reducirlo solo a un acto de heredar. Se usa también en la frase paralela «Yahvé será su heredad» para mantener la repetición del hebreo.
- source_word: בְּקֶרֶב
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - en el seno de
  lexicon: HALOT
  rationale: «Entre sus hermanos» comunica de forma natural la relación distributiva de בְּקֶרֶב אֶחָיו y mantiene el sentido de pertenencia dentro del grupo.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compatriotas
  - sus fellow Israelites
  lexicon: HALOT
  rationale: Se conserva la expresión literal «sus hermanos» porque el hebreo dice literalmente «sus hermanos», y el contexto israelita ya delimita el referente a los demás miembros de Israel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se mantiene la convención del proyecto para el Tetragrámaton, evitando sustituir el nombre divino por una categoría como «el SEÑOR».
- source_word: הוּא
  english_pob_choice: is
  chosen_spanish: será
  alternatives_spanish:
  - es
  - él mismo será
  lexicon: HALOT
  rationale: El hebreo usa un presente gnómico/enfático, pero en español «será» fluye mejor en esta afirmación de asignación patrimonial y conserva la fuerza del predicado sin añadir explicación.
- source_word: כַּאֲשֶׁר דִּבֶּר לוֹ
  english_pob_choice: as he spoke to him
  chosen_spanish: como le habló
  alternatives_spanish:
  - como le dijo
  - como le habló Yahvé
  lexicon: HALOT
  rationale: דִּבֶּר es el verbo ordinario «hablar/decir»; «como le habló» sigue de cerca el hebreo y evita interpretar explícitamente «prometer», que el verbo no exige por sí solo.
theological_decisions:
- issue: Sentido de «Yahvé será su heredad»
  english_pob_reading: Retain the covenantal-metaphorical statement without expanding it into explanatory theology.
  chosen_spanish_reading: 'Mantener la afirmación concisa: Yahvé mismo es la heredad del levita/tribu levítica.'
  alternative_spanish_readings:
  - Yahvé será su porción
  - Yahvé será su posesión
  - Yahvé será su parte asignada en lugar de tierra
  rationale: 'La frase hebrea presenta una tensión teológica importante: no solo falta tierra, sino que Yahvé mismo ocupa el lugar de la herencia. La traducción conserva esa densidad sin explicitarla en paráfrasis.'
  doctrine_reference: Translation philosophy §1 y §3 (primacía del original y preservación de tensión teológica)
- issue: Valor colectivo de los pronombres singulares
  english_pob_reading: The singular refers collectively to the Levite/Levitical priest as representative of the tribe.
  chosen_spanish_reading: Conservar el singular español, entendido colectivamente para el levita o el cuerpo levítico.
  alternative_spanish_readings:
  - 'pluralizar: «entre sus hermanos… Yahvé será la heredad de ellos»'
  - singularizarlo como un individuo específico
  rationale: El hebreo emplea singulares representativos; en español, el singular mantiene la forma de la fuente y deja que el contexto determine el referente colectivo.
  doctrine_reference: Translation philosophy §4 y §5 (precisión gramatical y consistencia terminológica)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el recorrido auditado en inglés. Se preserva la repetición de נַחֲלָה con «heredad» y la ambigüedad sobria de דִּבֶּר con «habló», sin introducir la interpretación de «prometió». No se aplicaron revisiones previas adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se mantiene «heredad» como término repetido para נַחֲלָה/נַחֲלָתוֹ, en lugar de alternar con «posesión» o «porción», para reflejar la cohesión léxica del hebreo.
  - «Sus hermanos» conserva el género y la forma literal del hebreo; el sentido colectivo queda para el contexto.
  - La puntuación y el orden de cláusulas buscan una lectura natural en español sin debilitar la correspondencia con el hebreo.
