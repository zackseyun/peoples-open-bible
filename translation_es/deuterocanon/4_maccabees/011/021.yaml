translation:
  language: es
  text: Porque el entendimiento piadoso[a] es invencible, oh tirano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la razón piadosa» o «el conocimiento devoto». La expresión griega une reverencia hacia Dios con entendimiento racional.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνίκητος
  english_pob_choice: unconquerable
  chosen_spanish: indomable
  alternatives_spanish:
  - invencible
  - imposible de vencer
  lexicon: LSJ
  rationale: El adjetivo expresa que algo no puede ser vencido o dominado. En español, «indomable» comunica bien esa fuerza de resistencia en una forma natural y solemne, sin perder el matiz de imposibilidad de sometimiento. «Invencible» también es posible, pero «indomable» conserva mejor la idea de una cualidad que no puede ser reducida por el tirano.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: La partícula introduce la razón o explicación de la afirmación precedente. «Porque» mantiene esa función causal-explicativa en español de modo claro y directo.
- source_word: ὦ τύραννε
  english_pob_choice: O tyrant
  chosen_spanish: oh tirano
  alternatives_spanish:
  - tirano
  - oh déspota
  lexicon: LSJ
  rationale: El vocativo requiere una forma de llamada directa. «Oh tirano» reproduce el tono polémico del griego y mantiene la interpelación personal.
- source_word: ἡ εὐσεβὴς ἐπιστήμη
  english_pob_choice: godly understanding
  chosen_spanish: la piadosa comprensión
  alternatives_spanish:
  - la razón piadosa
  - el conocimiento piadoso
  - la comprensión devota
  lexicon: LSJ
  rationale: ἐπιστήμη aquí no es solo ‘conocimiento’ abstracto, sino entendimiento firme y racional; εὐσεβής añade la orientación reverente hacia Dios. «Comprensión» comunica la dimensión intelectual y práctica, y «piadosa» preserva el matiz religioso. Se evita «razón» como opción única porque puede sonar demasiado técnica o filosófica en español.
theological_decisions:
- issue: Cómo reflejar la frase programática εὐσεβὴς ἐπιστήμη en 4 Macabeos
  english_pob_reading: godly understanding
  chosen_spanish_reading: la piadosa comprensión
  alternative_spanish_readings:
  - la razón piadosa
  - el conocimiento piadoso
  rationale: El pasaje contrapone la fuerza del tirano con una comprensión humana moldeada por reverencia a Dios. «Piadosa comprensión» conserva esa síntesis entre piedad y capacidad racional sin resolverla hacia un tecnicismo filosófico. La formulación mantiene la tensión original entre devoción y entendimiento.
  doctrine_reference: 4 Macabeos 11:21; traducción de equivalencia óptima, manteniendo la tensión teológica y retórica del texto fuente.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios adicionales según el expediente inglés y la concordancia alta del control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «tirano» para τύραννε, en línea con el valor polémico del vocativo.
  - Se evita sustituir la frase clave por terminología eclesiástica tradicional no sustentada por el griego.
  - El adjetivo se coloca antes del sustantivo («piadosa comprensión») para un tono más natural y solemne en español.
  - La nota conserva las alternativas semánticas documentadas por el expediente inglés y explicita la unión de piedad y racionalidad.
