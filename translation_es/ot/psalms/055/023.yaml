translation:
  language: es
  text: Echa tu carga sobre Yahvé[a], y él te sostendrá[b]; no permitirá jamás que el justo sea conmovido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu suerte», «tu cuidado», o posiblemente «lo que te ha sido dado». El sustantivo hebreo es raro y puede referirse de manera más amplia a aquello que recae sobre una persona.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el justo»; el singular masculino tiene fuerza representativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁלֵךְ
  english_pob_choice: Cast
  chosen_spanish: Echa
  alternatives_spanish:
  - Lanza
  - Tira
  - Pon
  lexicon: HALOT
  rationale: El imperativo de שלך expresa arrojar o echar algo sobre otro. En español, «echa» conserva la imagen directa y suena natural en un exhorto de confianza; «lanza» sería más fuerte de lo necesario y «pon» debilita la metáfora.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino YHWH. «Yahvé» preserva el nombre propio del pacto y evita la sustitución por una mayúscula funcional. «Jehová» y «el SEÑOR» no reflejan igual de bien la decisión base del POB.
- source_word: יְהָבְךָ
  english_pob_choice: your burden
  chosen_spanish: tu carga
  alternatives_spanish:
  - tu peso
  - tu suerte
  - tu cuidado
  - lo que te ha sido dado
  lexicon: HALOT
  rationale: El sustantivo es raro y admite varias posibilidades semánticas. Dado el contexto exhortativo y la promesa de sustento, «carga» comunica bien lo puesto sobre la persona sin cerrar la ambigüedad documentada. No se opta por una glosa más interpretativa como «tu suerte» o «lo que te ha sido dado» en el texto principal.
- source_word: יְכַלְכְּלֶךָ
  english_pob_choice: he will sustain you
  chosen_spanish: te sostendrá
  alternatives_spanish:
  - te sustentará
  - te apoyará
  - te proveerá
  lexicon: HALOT
  rationale: כלכל puede significar sostener, mantener o proveer. «Te sostendrá» reproduce bien la idea de apoyo continuo y resulta natural en español moderno. «Sustentará» es válida pero algo más marcada; «proveerá» estrecha demasiado el sentido.
- source_word: לֹא יִתֵּן לְעוֹלָם
  english_pob_choice: he will never allow
  chosen_spanish: no permitirá jamás
  alternatives_spanish:
  - no dejará nunca
  - nunca consentirá
  - no dará por siempre
  lexicon: HALOT
  rationale: La combinación verbal expresa negativa duradera de permiso o concesión. «No permitirá jamás» conserva ese valor idiomático con una negación enfática clara en español. «No dejará nunca» sería también posible, pero menos solemne.
- source_word: מוֹט
  english_pob_choice: to be shaken
  chosen_spanish: sea sacudido
  alternatives_spanish:
  - vacile
  - sea removido
  - tropiece
  - se tambalee
  lexicon: HALOT
  rationale: El infinitivo comunica inestabilidad o caída. «Sea sacudido» mantiene la metáfora de movimiento/desestabilización y funciona bien con el pasivo perifrástico español. «Sea removido» puede sonar más abstracto; «tropiece» introduce una imagen distinta.
- source_word: לַצַּדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el hombre justo
  - los justos
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino singular, en español «el justo» reproduce la sustantivación con naturalidad y mantiene la fuerza proverbial sin sobrecargar el verso con una explicitación de género. «El hombre justo» sería más literal pero menos fluido; «los justos» perdería el singular del hebreo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Siguiendo la política del proyecto, se mantiene el nombre divino como «Yahvé» y no se enmascara con «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor representativo de לַצַּדִּיק
  english_pob_reading: the righteous
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - el justo hombre
  - la persona justa
  - los justos
  rationale: El hebreo singular masculino funciona de manera genérica/representativa. En español, «el justo» mantiene esa singularidad sin forzar una reescritura neutralizante que no aporta claridad adicional.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4, Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB en cuanto a la expresión genérica del segundo hemistiquio, pero conserva la precisión lexical documentada en el audit trail: mantiene la ambigüedad de יְהָבְךָ con «carga» y refleja el singular representativo de לַצַּדִּיק como «el justo».'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al criterio del proyecto para YHWH.
  - «Carga» preserva la ambigüedad del término raro sin volverla interpretativa.
  - «Te sostendrá» y «no permitirá jamás» respetan el paralelismo y el tono solemne del hebreo.
  - «El justo» conserva el singular sustantivado del original y resulta natural en español bíblico contemporáneo.
