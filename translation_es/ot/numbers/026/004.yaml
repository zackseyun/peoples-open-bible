translation:
  language: es
  text: Desde los veinte años en adelante, como Yahvé[c] mandó a Moisés acerca de los israelitas[a] que salieron de la tierra[b] de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Israel»; se traduce «israelitas» como nombre colectivo habitual del pueblo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de la tierra de Egipto».'
    reason: lexical_alternative
  - marker: c
    text: 'El nombre divino YHWH se vierte aquí como «Yahvé»; alternativa: «Yahweh».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמָעְלָה
  english_pob_choice: From twenty years old and upward
  chosen_spanish: Desde los veinte años en adelante
  alternatives_spanish:
  - Desde los veinte años y más
  - Los de veinte años o más
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula idiomática de umbral de edad. En español, «desde los veinte años en adelante» conserva el valor formal de límite mínimo y suena natural y digno.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio mandato
  lexicon: HALOT
  rationale: El verbo expresa un mandato directo. «Mandó» transmite bien la fuerza imperativa sin volver la frase innecesariamente pesada en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el principio del POB español de rendir el nombre divino por «Yahvé» en el texto principal, manteniendo el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: and the Israelites
  chosen_spanish: y a los israelitas
  alternatives_spanish:
  - y a los hijos de Israel
  - y a los hijos de Jacob
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «los hijos de Israel», la designación colectiva natural en español es «los israelitas». Se añade «a» porque el contexto depende del verbo «mandó» y del objeto directo implícito.
- source_word: הַיֹּצְאִים
  english_pob_choice: who came out
  chosen_spanish: que salieron
  alternatives_spanish:
  - que habían salido
  - los que salieron
  lexicon: HALOT
  rationale: El participio funciona como una identificación de la generación del éxodo. «Que salieron» comunica ese referente de forma clara y fiel en español.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  - desde la tierra de Egipto
  lexicon: HALOT
  rationale: 'El hebreo conserva la expresión territorial completa. «De la tierra de Egipto» sigue de cerca la forma del original y mantiene la referencia geográfica plena; la nota permite la alternativa «desde». '
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La línea doctrinal del proyecto evita la sustitución por «SEÑOR» y preserva el nombre divino. En español, «Yahvé» es la forma adoptada para el texto principal por su naturalidad y uso eclesial amplio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Orden del objeto indirecto/directo con «mandó»
  english_pob_reading: commanded Moses and the Israelites
  chosen_spanish_reading: mandó a Moisés y a los israelitas
  alternative_spanish_readings:
  - mandó Moisés y los israelitas
  - dio mandato a Moisés y a los israelitas
  rationale: En español, el régimen con «mandar» exige marcar con «a» a las personas afectadas por el mandato. Esto evita ambigüedad sintáctica y preserva que tanto Moisés como los israelitas están bajo la orden divina.
  doctrine_reference: Spanish syntax and discourse clarity; no doctrinal alteration
translation_notes:
  revision_awareness: 'Se revisó el antecedente inglés del POB y no se requirieron cambios sustanciales en el sentido base. La principal adaptación al español fue sintáctica: el objeto de «mandó» se marcó con preposición y se mantuvo la fórmula de edad en una expresión idiomática natural. También se preservó la tensión terminológica sobre el nombre divino mediante «Yahvé».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para YHWH, conforme al estándar del proyecto en español.
  - Se evitó una traducción literal de «hijos de Israel» en el cuerpo principal, pero se documentó la alternativa en nota.
  - «De la tierra de Egipto» reproduce la expresión territorial completa del hebreo; la nota conserva la opción «desde».
  - La estructura verbal fue ajustada al español natural sin alterar la dependencia del mandato divino.
