  glossary_alignment: No hay conflictos con la terminología marco del proyecto. «Amigos» respeta φίλοις con la nota cultural apropiada; «fuerzas» respeta δυνάμεσιν; «obedecieran» respeta ὑπακούειν. Se recomienda ajustar δόματα a «regalos» para mayor naturalidad semántica en español bíblico moderno.
