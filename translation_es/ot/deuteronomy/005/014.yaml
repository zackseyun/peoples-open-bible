translation:
  language: es
  text: 'Pero el séptimo día es sábado[a] para Yahvé tu Dios. No harás ningún trabajo: ni tú, ni tu hijo, ni tu hija, ni tu esclavo[b], ni tu esclava, ni tu buey, ni tu asno, ni ninguno de tus animales domésticos[c], ni el extranjero[d] que está dentro de tus puertas[e], para que tu esclavo y tu esclava descansen como tú.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reposo» o «día de reposo». El hebreo שַׁבָּת nombra aquí el día sagrado instituido, por eso se conserva «sábado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu siervo» / «tu sierva». El hebreo עֶבֶד / אֲמָה destaca la condición servil; por eso se conserva «esclavo / esclava» en el texto principal.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo בְּהֵמָה se refiere aquí a animales domésticos o de posesión; también puede traducirse «ganado».
    reason: lexical_alternative
  - marker: d
    text: 'O: «residente extranjero». El hebreo גֵּר se refiere a un no nativo que vive dentro de la comunidad.'
    reason: lexical_alternative
  - marker: e
    text: Literalmente, «dentro de tus puertas», un hebraísmo que designa a quienes habitan en tu comunidad o jurisdicción.
    reason: cultural_note
lexical_decisions:
- source_word: שַׁבָּת
  english_pob_choice: Sabbath
  chosen_spanish: sábado
  alternatives_spanish:
  - reposo
  - día de reposo
  lexicon: HALOT
  rationale: En español, 'sábado' es la forma más natural y reconocible para el día sagrado del séptimo día; conserva la referencia institucional del mandamiento mejor que una mera perífrasis. 'Reposo' sería más descriptivo, pero perdería la identificación del día.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - a Yahvé
  lexicon: HALOT
  rationale: La preposición hebrea ל expresa dedicación o pertenencia. 'Para Yahvé' comunica que el día está consagrado a él, manteniendo el nombre divino según el criterio del proyecto.
- source_word: מְלָאכָה
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - labor
  lexicon: HALOT
  rationale: '''Obra'' permite abarcar la categoría amplia de actividad prohibida sin reducirla solo a empleo o esfuerzo físico. ''Trabajo'' es posible, pero en español puede sonar más restrictivo o moderno que el alcance legal del hebreo.'
- source_word: עַבְדְּךָ
  english_pob_choice: your male slave
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: El contexto legal distingue explícitamente entre varón y mujer vinculados a la casa; 'esclavo' preserva esa realidad social y evita suavizarla. 'Siervo' sería menos preciso para la carga social del término.
- source_word: אֲמָתֶךָ
  english_pob_choice: your female slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu criada
  lexicon: HALOT
  rationale: Mantiene la pareja lexical con 'tu esclavo' y conserva el matiz de dependencia servil que el pasaje legisla. 'Sierva' y 'criada' atenúan o desplazan el sentido social del hebreo.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - ganado
  lexicon: HALOT
  rationale: '''Buey'' es un equivalente natural y preciso en español para el animal de tiro en contexto legal. ''Toro'' puede sonar más genérico o reproductivo; ''ganado'' es demasiado amplio.'
- source_word: חֲמוֹר
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  lexicon: HALOT
  rationale: '''Asno'' es más sobrio y tradicional en registro bíblico; ''burro'' es correcto, pero más coloquial.'
- source_word: בְּהֵמָה
  english_pob_choice: livestock
  chosen_spanish: animales
  alternatives_spanish:
  - ganado
  - bestias
  lexicon: HALOT
  rationale: El hebreo apunta a los animales domésticos del hogar/campo. 'Animales' es más amplio que 'ganado', pero aquí evita restringir indebidamente la lista de buey y asno y suena natural en español. La nota explica que el texto hebreo incluye el sentido de animales de posesión.
- source_word: גֵּר
  english_pob_choice: sojourner
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - residente extranjero
  - peregrino
  lexicon: HALOT
  rationale: '''Extranjero'' comunica la no pertenencia étnico-jurídica al pueblo. Aunque el hebreo puede incluir al residente integrado, el contexto de la nota evita perder ese matiz. Se añade una nota para reflejar la posible lectura ''residente extranjero''.'
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus puertas
  alternatives_spanish:
  - dentro de tu ciudad
  - en tus poblaciones
  lexicon: HALOT
  rationale: La imagen literal de las 'puertas' conserva el color jurídico y comunitario del hebreo. En español suena suficientemente natural y puede explicarse como una expresión idiomática de la comunidad o localidad.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: HALOT
  rationale: '''Para que'' expresa finalidad de manera clara y natural en español.'
- source_word: יָנוּחַ
  english_pob_choice: may rest
  chosen_spanish: descansen
  alternatives_spanish:
  - reposen
  - descase
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa descanso del trabajo. En español plural 'descansen' se adapta al referente doble ('tu esclavo y tu esclava') y mantiene el sentido de reposo sabático.
- source_word: כָּמוֹךָ
  english_pob_choice: as you do
  chosen_spanish: como tú
  alternatives_spanish:
  - como tú descansas
  - igual que tú
  lexicon: HALOT
  rationale: El hebreo compara el descanso de los dependientes con el del amo. 'Como tú' conserva la brevedad comparativa y deja implícito el verbo del contexto. La formulación es más directa que expandirla con una perífrasis.
theological_decisions:
- issue: Divine name יהוה in Spanish
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrama. Conforme al criterio del proyecto, se preserva el nombre divino en español como 'Yahvé' en lugar de ocultarlo con una sustitución devocional. 'SEÑOR' desharía la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Status term for עבד / אמה in Sabbath law
  english_pob_reading: male slave / female slave
  chosen_spanish_reading: esclavo / esclava
  alternative_spanish_readings:
  - siervo / sierva
  - sirviente / sirvienta
  rationale: El mandamiento incluye a personas dependientes dentro de la casa y les concede descanso legal. 'Esclavo' y 'esclava' conservan la dureza social del término y reflejan mejor el contraste legislativo que opciones suavizadas.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy for δοῦλος as servant/slave context-dependent
- issue: Scope of the final comparison כָּמוֹךָ
  english_pob_reading: as you do
  chosen_spanish_reading: como tú
  alternative_spanish_readings:
  - como tú descansas
  - igual que tú
  rationale: La comparación no introduce una doctrina abstracta de igualdad ontológica aquí; regula el descanso sabático. 'Como tú' preserva la relación funcional y evita sobreinterpretar el alcance del hebreo.
  doctrine_reference: HALOT; syntax of Deuteronomy 5:14
translation_notes:
  revision_awareness: The English POB latest revision kept the text stable except for clarifying 'the sojourner who is within your gates.' The Spanish draft reflects that clarification by rendering the relative clause explicitly as 'el extranjero que está dentro de tus puertas' and preserves the full legal list and purpose clause without further expansion.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según el estándar del proyecto, no 'SEÑOR'.
  - '''Esclavo/esclava'' se usó de forma consistente para עבד/אמה, siguiendo la lectura social y legal del pasaje.'
  - '''Puertas'' se conservó en sentido idiomático para בִּשְׁעָרֶיךָ, con nota explicativa.'
  - La comparación final quedó breve ('como tú') para respetar la sintaxis y no añadir información no explícita.
