translation:
  language: es
  text: 'Así dice Yahvé: «Por tres transgresiones de Damasco y por cuatro, no lo revocaré[a], porque trillaron a Galaad con trillos de hierro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lo haré retroceder», es decir, no invertiré el juicio anunciado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el Señor
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estándar con un español natural y solemne. Se usa «Yahvé» para el nombre divino, conforme a la guía del proyecto, en lugar de ocultarlo con una sustitución reverencial.
- source_word: עַל שְׁלֹשָׁה פִּשְׁעֵי ... וְעַל אַרְבָּעָה
  english_pob_choice: For three transgressions of Damascus, and for four
  chosen_spanish: Por tres transgresiones de Damasco, y por cuatro
  alternatives_spanish:
  - A causa de tres transgresiones de Damasco, y aun de cuatro
  - Por tres pecados de Damasco, y por cuatro
  lexicon: HALOT
  rationale: Se mantiene la fórmula numérica de intensificación de Amós. «Transgresiones» conserva el matiz de rebelión/ofensa de פֶּשַׁע mejor que «pecados», y «por cuatro» reproduce la escalada retórica.
- source_word: דַמֶּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damascó
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español bíblico y moderno.
- source_word: לֹא אֲשִׁיבֶנּוּ
  english_pob_choice: I will not revoke it
  chosen_spanish: no lo revocaré
  alternatives_spanish:
  - no lo retiraré
  - no lo haré volver
  - no me retractaré de ello
  lexicon: HALOT
  rationale: Se conserva el objeto pronominal implícito del hebreo con «lo», como en la POB inglesa. «Revocar» expresa bien la reversión de una sentencia/decisión sin añadir un objeto como «castigo» que el texto no explicita.
- source_word: עַל
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  - a causa de que
  lexicon: HALOT
  rationale: Introduce de forma natural en español la base causal del juicio, equivalente al valor explicativo que la POB inglesa aclara con «because».
- source_word: דּוּשָׁם
  english_pob_choice: they threshed
  chosen_spanish: trillaron
  alternatives_spanish:
  - pisaron
  - desmenuzaron
  - moliaron
  lexicon: HALOT
  rationale: El verbo de trillar mantiene la imagen agrícola de aplastamiento violento. «Trillaron» es más preciso y natural que una paráfrasis más general como «pisaron».
- source_word: בַּחֲרֻצוֹת הַבַּרְזֶל
  english_pob_choice: with threshing sledges of iron
  chosen_spanish: con trillos de hierro
  alternatives_spanish:
  - con trillos de hierro para trillar
  - con instrumentos de trilla de hierro
  - con trineos de trilla de hierro
  lexicon: HALOT
  rationale: «Trillos» comunica en español el instrumento de trilla con una imagen reconocible. Se evita un tecnicismo excesivo, pero se conserva el metal «de hierro» para el matiz de brutalidad.
- source_word: אֶת הַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: a Galaad
  alternatives_spanish:
  - sobre Galaad
  - a la región de Galaad
  lexicon: HALOT
  rationale: Se traduce el topónimo con la forma española tradicional «Galaad», frecuente en biblias en español, y se preserva su función de objeto directo implícitamente colectivo en el contexto de violencia contra la región y sus habitantes.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Yahveh
  rationale: La POB inglesa decide transparentar el Tetragrámaton con «Yahweh». En español, la forma coherente con la guía del proyecto es «Yahvé», manteniendo visible el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de לֹא אֲשִׁיבֶנּוּ
  english_pob_reading: I will not revoke it
  chosen_spanish_reading: no lo revocaré
  alternative_spanish_readings:
  - no lo haré retroceder
  - no me retractaré de ello
  - no lo retiraré
  rationale: Se conserva la ambigüedad funcional del pronombre objeto, sin insertar explícitamente «castigo» o «juicio» en el cuerpo del versículo. El español «revocar» expresa la no reversión de la sentencia anunciada.
  doctrine_reference: POB lexical note on judicial finality of the oracle
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la decisión auditada de la POB inglesa: fórmula profética estándar, fórmula numérica de intensificación, objeto pronominal implícito en la cláusula de juicio y metáfora concreta de trilla violenta. No se aplicaron revisiones posteriores al texto base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la guía del proyecto para el nombre divino.
  - Se prefirió «transgresiones» para פִּשְׁעֵי, manteniendo el tono jurídico-moral del oráculo.
  - «A Galaad» conserva la referencia geográfica tradicional y su valor colectivo dentro del juicio.
  - La nota al pie marca la alternativa lexical del verbo final sin sobrecargar el versículo principal.
