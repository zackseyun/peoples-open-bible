base_translation:
  language: en
  yaml_path: translation/ot/numbers/018/011.yaml
  text: 'And this is yours: the contribution of their gifts[a], with all the wave offerings of the sons of Israel. I have given them to you, and to your sons and your daughters with you, as a permanent statute[b]. Everyone in your house who is clean may eat it.'
  footnotes:
  - marker: a
    text: Or 'heave offering' for 'the contribution'; the Hebrew term refers to a portion set apart for sacred use.
    reason: lexical_alternative
  - marker: b
    text: '''Clean'' here means ritually clean, not merely physically clean or morally upright.'
    reason: cultural_note
