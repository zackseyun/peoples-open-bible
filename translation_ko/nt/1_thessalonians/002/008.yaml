id: 1TH.2.8
reference: 1 Thessalonians 2:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὕτως ὁμειρόμενοι ὑμῶν εὐδοκοῦμεν μεταδοῦναι ὑμῖν οὐ μόνον τὸ εὐαγγέλιον τοῦ θεοῦ ἀλλὰ καὶ τὰς ἑαυτῶν ψυχάς, διότι ἀγαπητοὶ ἡμῖν ⸀ἐγενήθητε.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/008.yaml
  text: So[a], longing for you in this way, we were pleased to share with you not only the gospel of God but also our own lives[b], because you had become dear to us.
  footnotes:
  - marker: a
    text: Or 'having deep affection for you' or 'yearning for you' for the rare Greek participle ὁμειρόμενοι.
    reason: lexical_alternative
  - marker: b
    text: Or 'our own souls' or 'our very selves'; here 'lives' conveys the sense of giving themselves personally and sacrificially.
    reason: lexical_alternative
translation:
  language: ko
  text: 이처럼 여러분을 사모하여[a], 우리는 하나님의 복음뿐 아니라 우리 자신의 목숨[b]까지도 여러분에게 나누어 주기를 기뻐하였습니다. 여러분이 우리에게 사랑하는 자들이 되었기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「깊은 애정을 품고」, 「그리워하며」. 드물게 쓰이는 헬라어 분사 ὁμειρόμενοι의 의미.
    reason: lexical_alternative
  - marker: b
    text: 또는 「우리 자신의 혼」, 「우리 자신을」. 자기 자신을 헌신적으로 내어주는 의미를 「목숨」으로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμειρόμενοι
  english_pob_choice: longing for
  chosen_korean: 사모하여
  alternatives_korean:
  - 깊은 애정을 품고
  - 그리워하며
  lexicon: BDAG
  rationale: 드문 어휘. 깊은 애정·열망의 의미. 「사모하다」가 합쇼체 산문의 격을 유지하면서 친밀한 정서를 담는다.
- source_word: εὐδοκοῦμεν μεταδοῦναι
  english_pob_choice: were pleased to share
  chosen_korean: 나누어 주기를 기뻐하였습니다
  alternatives_korean:
  - 나누어 주기를 즐거워하였습니다
  - 기쁨으로 나누어 주었습니다
  lexicon: BDAG
  rationale: εὐδοκέω의 「기뻐하다·기꺼이 하다」와 μεταδίδωμι의 「나누어 줌」을 자연스럽게 결합한다.
- source_word: τὰς ἑαυτῶν ψυχάς
  english_pob_choice: our own lives
  chosen_korean: 우리 자신의 목숨
  alternatives_korean:
  - 우리 자신의 혼
  - 우리 자신을
  lexicon: BDAG
  rationale: ψυχή가 본문에서는 자기 자신·생명의 의미로 쓰였다. 「목숨」이 헌신의 무게를 담으며, 5:23의 삼분법(영·혼·몸)과 구별되는 단순 의미를 보존한다.
- source_word: ἀγαπητοὶ ἡμῖν ἐγενήθητε
  english_pob_choice: had become dear to us
  chosen_korean: 우리에게 사랑하는 자들이 되었기
  alternatives_korean:
  - 우리에게 친밀한 자들이 되었기
  - 우리에게 사랑받는 자들이 되었기
  lexicon: BDAG
  rationale: ἀγαπητός는 「사랑받는·사랑하는」. 「사랑하는 자들」이 바울의 따뜻한 호칭을 그대로 담는다.
