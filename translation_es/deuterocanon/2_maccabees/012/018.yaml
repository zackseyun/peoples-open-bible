translation:
  language: es
  text: Pero no lograron atrapar a Timoteo en aquellos lugares[a], porque entonces se había retirado de allí sin lograr nada, aunque había dejado una guarnición en cierto lugar[b], y una muy fuerte, además.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no capturaron a Timoteo en aquellos lugares». El verbo griego puede dar la idea de alcanzarlo, atraparlo o apresarlo en un contexto militar.'
    reason: lexical_alternative
  - marker: b
    text: «Una muy fuerte» describe más directamente a la guarnición, aunque el sentido también puede solaparse con la fortaleza o fortificación del lugar donde fue dejada.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέλαβον
  english_pob_choice: did not catch
  chosen_spanish: no encontraron
  alternatives_spanish:
  - no lo capturaron
  - no lo alcanzaron
  - no lo apresaron
  lexicon: LSJ
  rationale: En este contexto militar, la idea es que no lo dieron con él en el lugar esperado. 'No encontraron' comunica bien la pérdida de contacto sin forzar un matiz de captura física que el griego permite pero no exige en español.
- source_word: ἐπὶ τῶν τόπων
  english_pob_choice: in those places
  chosen_spanish: en aquellos lugares
  alternatives_spanish:
  - en esos lugares
  - en aquellos sitios
  - en la región
  lexicon: LSJ
  rationale: La frase apunta a los lugares ya mencionados. 'Aquellos lugares' conserva el referente local plural sin añadir precisión geográfica que el texto no da.
- source_word: ἄπρακτον
  english_pob_choice: without accomplishing anything
  chosen_spanish: sin lograr nada
  alternatives_spanish:
  - sin haber logrado nada
  - sin éxito
  - sin resultado
  lexicon: LSJ
  rationale: El valor principal es la falta de resultado. 'Sin lograr nada' es natural en español y mantiene la fuerza negativa del participio adverbial.
- source_word: ἐκλελυκότα
  english_pob_choice: had withdrawn
  chosen_spanish: había salido de ellos
  alternatives_spanish:
  - había retirado
  - se había retirado
  - había abandonado el lugar
  lexicon: LSJ
  rationale: El contexto muestra a Timoteo ya fuera del área. 'Había salido de ellos' es fiel y claro, evitando una reinterpretación más técnica de retirada que podría sonar más interpretativa.
- source_word: καταλελοιπότα
  english_pob_choice: had left
  chosen_spanish: había dejado
  alternatives_spanish:
  - había abandonado
  - había puesto
  - había estacionado
  lexicon: LSJ
  rationale: El participio expresa que dejó algo atrás. 'Había dejado' es la base semántica más sobria, dejando que el complemento militar precise el objeto.
- source_word: φρουράν
  english_pob_choice: a garrison
  chosen_spanish: una guarnición
  alternatives_spanish:
  - una guardia
  - un destacamento
  - una fuerza de guarnición
  lexicon: LSJ
  rationale: '''Guarnición'' es el equivalente militar natural en español para φρουρά en este contexto, y preserva bien la función táctica del grupo dejado atrás.'
- source_word: ἐν τινι τόπῳ
  english_pob_choice: in a certain place
  chosen_spanish: en un lugar determinado
  alternatives_spanish:
  - en cierto lugar
  - en algún lugar
  - en un lugar
  lexicon: LSJ
  rationale: La indefinición debe conservarse. 'Un lugar determinado' suena natural y mantiene la falta de especificación del griego.
- source_word: μάλιστα ὀχυράν
  english_pob_choice: a very strong one
  chosen_spanish: una muy fuerte, además
  alternatives_spanish:
  - una muy fuerte
  - muy fortificada
  - sumamente fuerte
  lexicon: LSJ
  rationale: El adjetivo intensificado modifica a la guarnición. 'Una muy fuerte, además' reproduce el énfasis y conserva la posibilidad de que la fuerza se entienda tanto de los hombres como de la posición, tal como advierte el audit trail inglés.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés más reciente, especialmente la preferencia por un registro formal con ‘porque’/‘sin lograr nada’ y la preservación del énfasis de μάλιστα ὀχυράν. No se detectan revisiones textuales en conflicto; el punto principal de decisión en español es cómo verter κατέλαβον sin perder el matiz militar.
  spanish_consistency_notes:
  - Se mantiene 'Jesús/Mesías/Yahvé' no aplicable aquí; el texto no contiene terminología nominal teológica sensible.
  - '''Guarnición'' se usa con sentido militar estable y coherente con el contexto narrativo.'
  - Se conserva la indefinición de 'ἐν τινι τόπῳ' sin concretar el lugar.
  - La nota [a] marca la alternativa semántica de κατέλαβον; la nota [b] conserva la ambigüedad de si el énfasis recae en la guarnición o en el emplazamiento.
