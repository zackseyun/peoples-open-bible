base_translation:
  language: en
  yaml_path: translation/ot/job/038/041.yaml
  text: Who prepares prey for the raven when its young cry out to God and wander about for lack of food?[a][b][c]
  footnotes:
  - marker: a
    text: Or 'provides food for the raven.' The Hebrew verb means 'makes ready' or 'provides,' and 'prey' may be rendered more generally as 'food.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because its young cry out to God.' The conjunction can be read causally ('because/for') rather than temporally ('when').
    reason: lexical_alternative
  - marker: c
    text: Or 'go astray' or 'roam.' The Hebrew verb can denote wandering or straying in search of food.
    reason: lexical_alternative
