translation:
  language: es
  text: Un corazón alegre es la vida de un hombre[a], y el regocijo de una persona prolonga su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo transmitido al final es difícil; literalmente sugiere algo como «ha alargado su nariz/ira». El paralelo griego respalda el sentido «prolonga su vida» o «alarga sus días», que se sigue aquí.
    reason: textual_variant
lexical_decisions:
- source_word: שמחת לב
  english_pob_choice: a joyful heart
  chosen_spanish: Un corazón alegre
  alternatives_spanish:
  - La alegría del corazón
  - Un corazón gozoso
  lexicon: HALOT
  rationale: שמחת לב expresa la alegría o gozo que pertenece al corazón. En español, «un corazón alegre» suena natural y conserva la cualidad interna y afectiva del hebreo sin volverlo mecánico.
- source_word: חיי איש
  english_pob_choice: is a man's life
  chosen_spanish: es la vida de un hombre
  alternatives_spanish:
  - es la vida de una persona
  - es la vida de un ser humano
  lexicon: HALOT
  rationale: 'חיי איש tiene valor proverbial: la alegría del corazón constituye la vida del hombre. Se mantiene «hombre» para reflejar איש y conservar la fuerza antropológica del texto.'
- source_word: וגיל אדם
  english_pob_choice: and a person's gladness
  chosen_spanish: y el regocijo de una persona
  alternatives_spanish:
  - y la alegría de una persona
  - y el gozo humano
  lexicon: HALOT
  rationale: גיל denota regocijo o alegría expresiva. Aquí אדם funciona de manera general, por lo que «una persona» comunica bien el alcance humano sin borrar la variación respecto de איש.
- source_word: האריך אפו
  english_pob_choice: prolongs his life
  chosen_spanish: prolonga su vida
  alternatives_spanish:
  - alarga sus días
  - extiende su vida
  lexicon: HALOT
  rationale: El hebreo transmitido es difícil al final, y la paralela griega apoya el sentido de vida/días prolongados. En español, «prolonga su vida» mantiene ese sentido y suena sobrio y claro.
theological_decisions:
- issue: Tratamiento de los términos humanos איש / אדם
  english_pob_reading: Retain 'man' for איש and render אדם generically as 'person'
  chosen_spanish_reading: Conservar «hombre» para איש y «persona» para אדם
  alternative_spanish_readings:
  - Traducir ambos como «persona»
  - Traducir ambos como «hombre»
  rationale: 'El hebreo usa dos términos distintos para la humanidad. Mantener la diferencia ayuda a no aplanar el paralelismo y respeta el matiz del original: איש con referencia masculina/proverbial, y אדם con alcance más genérico.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Resolución del final hebreo difícil
  english_pob_reading: 'Translate according to the likely sense supported by the Greek parallel: gladness prolongs life/days'
  chosen_spanish_reading: 'Seguir el sentido probable apoyado por el paralelo griego: el regocijo prolonga la vida'
  alternative_spanish_readings:
  - Traducir literalmente el hebreo consonántico como una expresión oscura sobre «su nariz/ira»
  - Emendar de forma más explícita en el texto principal a «alarga sus días»
  rationale: La última cola hebrea presenta una dificultad textual real. Dado que el paralelo griego apunta con claridad al sentido sapiencial de vida prolongada, el texto español adopta ese sentido probable y lo documenta con una nota.
  doctrine_reference: PHILOSOPHY.md §What we are translating; transparencia principle
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que prefirió «prolonga su vida» sobre «alarga sus días» para reflejar con mayor naturalidad el sentido del hebreo difícil y mantener el paralelismo del proverbio. La redacción española sigue esa decisión.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; aquí no aparece.
  - «Corazón» traduce לב con su sentido interior/afectivo, sin espiritualizarlo indebidamente.
  - Se evitó el calco «alarga sus días» en el texto principal para seguir la última revisión auditada y el paralelo griego.
  - El tono es proverbial y sobrio, apto para publicación, sin sobreexplicar en el cuerpo del versículo.
