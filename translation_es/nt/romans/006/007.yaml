  - marker: b
    text: O, «ha sido liberado del pecado»; lit., «ha sido justificado del pecado».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal, que es fiel, natural y teológicamente adecuado. Solo se ajusta la nota sobre δεδικαίωται para alinearla con el audit trail inglés y con la decisión léxica del proyecto: mantener «justificado» como sentido principal y preservar «liberado» como alternativa contextual, sin introducir «absuelto» como alternativa principal.'
