- from: Y le recordó a nosotros a Abel[a], a quien mató Caín, y a Isaac, siendo ofrecido en holocausto, y a José en prisión.
  to: Y nos recordó a Abel, a quien Caín mató, y a Isaac siendo ofrecido en holocausto[a], y a José en prisión.
  rationale: Se corrige la sintaxis principal para reflejar ἀνεγίνωσκεν de forma idiomática en español («nos recordó»). Se mejora la fluidez de la cláusula sobre Abel y se conserva «holocausto» para mantener la alusión sacrificial del griego. La nota se mantiene, pero el ancla se mueve al sintagma pertinente en vez de al nombre Abel, ya que la alternativa literal corresponde a Isaac/ὁλοκαυτούμενον.
