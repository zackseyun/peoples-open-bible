  to: 'Y dijo[a]: «No es el sonido de un grito de victoria ni el sonido de un grito de derrota; yo oigo el sonido de cantos».'
  rationale: Se ajusta el último miembro a un español más natural («de cantos») sin apartarse de la decisión contextual del POB inglés («singing»). Se revisa la nota para reflejar mejor la alternativa documentada de shouting mediante «griterío / gritos» en lugar de «clamor», y se mejora la sintaxis española de la paráfrasis alternativa.
