    rationale: El hebreo y el inglés auditado apuntan a la acción de ponerse en marcha/partir, no simplemente «salir». «Salían» puede sugerir una acción más genérica o durativa y pierde el matiz de levantar el campamento y emprender la marcha.
  - severity: low
