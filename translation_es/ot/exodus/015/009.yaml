translation:
  language: es
  text: 'El enemigo dijo: «Perseguiré, alcanzaré, repartiré el botín; mi deseo se saciará con ellos[a]. Desenvainaré mi espada; mi mano los desposeerá»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «mi alma se saciará con ellos»; es decir, «tendré mi satisfacción de ellos» o «me hartaré de ellos».
    reason: lexical_alternative
  - marker: b
    text: O, «mi mano los destruirá» o «los expulsará».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַר / אָמַר אוֹיֵב
  english_pob_choice: said / the enemy said
  chosen_spanish: dijo / el enemigo dijo
  alternatives_spanish:
  - ha dicho
  - el adversario dijo
  lexicon: HALOT
  rationale: El perfecto narrativo en el canto se vierte naturalmente con pasado simple en español. "El enemigo" mantiene el valor representativo y colectivo que la POB documenta para esta figura adversaria.
- source_word: אֶרְדֹּף
  english_pob_choice: I will pursue
  chosen_spanish: Perseguiré
  alternatives_spanish:
  - Voy a perseguir
  - Pursuiré
  lexicon: HALOT
  rationale: El imperfecto expresa acción futura/intencional en el discurso del enemigo. "Perseguiré" es una equivalencia directa, clara y idiomática.
- source_word: אַשִּׂיג
  english_pob_choice: I will overtake
  chosen_spanish: alcanzaré
  alternatives_spanish:
  - atraparé
  - daré alcance
  lexicon: HALOT
  rationale: '"Alcanzaré" conserva la idea de dar alcance en la persecución militar sin endurecer el español con un calco técnico.'
- source_word: אֲחַלֵּק שָׁלָל
  english_pob_choice: I will divide the spoil
  chosen_spanish: repartiré el botín
  alternatives_spanish:
  - dividiré el botín
  - apartaré el botín
  lexicon: HALOT
  rationale: '"Botín" reproduce el campo semántico bélico de שָׁלָל; "repartiré" comunica con naturalidad la acción de distribuir el saqueo.'
- source_word: תִּמְלָאֵמוֹ נַפְשִׁי
  english_pob_choice: my desire will be satisfied on them
  chosen_spanish: mi alma se saciará en ellos
  alternatives_spanish:
  - mi deseo se saciará en ellos
  - mi alma se llenará de ellos
  - tendré mi satisfacción en ellos
  lexicon: HALOT
  rationale: La POB documenta aquí la tensión בין נֶפֶשׁ como 'alma' y como apetito/deseo. Se conserva "alma" para no borrar el trasfondo lexical, y "se saciará" mantiene la imagen de plenitud/consumo hostil. La preposición "en ellos" sigue la estructura del hebreo y deja abierta la ambigüedad semántica.
- source_word: אָרִיק חַרְבִּי
  english_pob_choice: I will draw my sword
  chosen_spanish: Desenvainaré mi espada
  alternatives_spanish:
  - sacaré mi espada
  - desenvainaré la espada
  lexicon: HALOT
  rationale: El verbo con espada tiene el sentido idiomático de desenvainar/draw. "Desenvainaré" es la equivalencia española más precisa y digna.
- source_word: תּוֹרִישֵׁמוֹ יָדִי
  english_pob_choice: my hand will dispossess them
  chosen_spanish: mi mano los despojará
  alternatives_spanish:
  - mi mano los desposeerá
  - mi mano los expulsará
  - mi mano los destruirá
  lexicon: HALOT
  rationale: '"Despojará" conserva el valor de ירשׁ en contexto de conquista: quitar la posesión al enemigo. Se evita "destruirá" porque la POB documenta esa opción como alternativa, no como el sentido principal.'
theological_decisions:
- issue: Sentido de נֶפֶשׁ en la cláusula hostil
  english_pob_reading: my desire will be satisfied on them
  chosen_spanish_reading: mi alma se saciará en ellos
  alternative_spanish_readings:
  - mi deseo se saciará en ellos
  - mi alma se llenará de ellos
  - tendré mi satisfacción en ellos
  rationale: La POB resalta que נֶפֶשׁ aquí no es un término técnico para el alma inmortal, sino el centro del apetito/ansia. La traducción principal conserva "alma" para respetar la tensión lexical documentada, mientras "se saciará" comunica el sentido de saciedad hostil que la frase expresa.
  doctrine_reference: Antropología bíblica / semántica de נֶפֶשׁ
- issue: Valor de תּוֹרִישֵׁמוֹ יָדִי en discurso bélico
  english_pob_reading: my hand will dispossess them
  chosen_spanish_reading: mi mano los despojará
  alternative_spanish_readings:
  - mi mano los expulsará
  - mi mano los destruirá
  - mi mano los desposeerá
  rationale: En el contexto de conquista, ירשׁ implica quitar a otros la posesión. "Despojará" mantiene la fuerza bélica y la idea de desposesión sin convertir la frase en una mera destrucción física. Se preserva así la ambigüedad entre expulsar, desposeer y vencer que la POB documenta.
  doctrine_reference: Lexicografía de conquista / semántica de ירשׁ
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no eran necesarios cambios sustantivos y mantuvo el texto sin cambios. El borrador español sigue la línea óptima del POB inglés y conserva las dos tensiones léxicas principales: נֶפֶשׁ y ירשׁ.'
  spanish_consistency_notes:
  - Se mantiene "botín" para שָׁלָל por coherencia con el campo bélico de saqueo.
  - Se usa "Yahvé" solo cuando el texto fuente lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se conserva un estilo de canto narrativo en pasado simple para אָמַר.
  - Las comillas angulares se emplean para discurso directo en español.
  - '"Desenvainaré" se prefiere a un calco como "vaciaré" por naturalidad y precisión idiomática.'
