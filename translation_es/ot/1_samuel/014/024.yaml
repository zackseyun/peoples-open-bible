translation:
  language: es
  text: 'Ahora los hombres de Israel estaban en gran aprieto aquel día,[a] y Saúl puso al pueblo bajo juramento, diciendo: «Maldito el hombre que coma alimento antes del atardecer, antes de que me haya vengado de mis enemigos». Así que ninguno del pueblo probó alimento.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «pan» en ambas ocurrencias; aquí probablemente significa alimento en general, no pan específicamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִגַּשׂ
  english_pob_choice: were hard-pressed
  chosen_spanish: estaban presionados
  alternatives_spanish:
  - estaban bajo gran presión
  - estaban oprimidos
  lexicon: HALOT
  rationale: En este contexto el verbo en nifal expresa presión o apuro, no simplemente acercamiento espacial. «Estaban presionados» conserva la fuerza idiomática del hebreo y encaja con el efecto narrativo del juramento imprudente de Saúl.
- source_word: וַיֹּאֶל
  english_pob_choice: put the people under an oath
  chosen_spanish: puso al pueblo bajo juramento
  alternatives_spanish:
  - hizo jurar al pueblo
  - los obligó con un juramento
  lexicon: HALOT
  rationale: La acción se entiende por la cláusula de maldición que sigue; en español, «poner bajo juramento» comunica bien la coerción sin volverlo arcaico. Se evita «adjuró» por su tono menos transparente.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las tropas
  lexicon: HALOT
  rationale: Aunque en el contexto se trata de combatientes, el hebreo dice simplemente «el pueblo». «El pueblo» mantiene la correspondencia textual y suena natural en español.
- source_word: אָרוּר הָאִישׁ
  english_pob_choice: Cursed is the man
  chosen_spanish: Maldito el hombre
  alternatives_spanish:
  - Sea maldito el hombre
  - Cursed is the man
  lexicon: HALOT
  rationale: La fórmula de maldición se conserva con una construcción directa y solemne. «El hombre» refleja el singular genérico del hebreo sin necesidad de pluralizar o suavizar.
- source_word: יֹאכַל לֶחֶם
  english_pob_choice: eats food
  chosen_spanish: coma pan
  alternatives_spanish:
  - coma alimento
  - coma comida
  lexicon: HALOT
  rationale: Aunque לֶחֶם puede funcionar idiomáticamente como «alimento», el hebreo dice literalmente «pan» y el contexto permite conservar esa imagen. Aun así, en nota se indica que puede significar comida en general.
- source_word: עַד הָעֶרֶב
  english_pob_choice: before evening
  chosen_spanish: antes del atardecer
  alternatives_spanish:
  - hasta la tarde
  - antes de la noche
  lexicon: HALOT
  rationale: «Atardecer» comunica con naturalidad el límite temporal del juramento. Es una opción moderna y precisa para el hebreo que marca el final del día.
- source_word: וְנִקַּמְתִּי מֵאֹיְבַי
  english_pob_choice: before I have avenged myself on my enemies
  chosen_spanish: antes de que me haya vengado de mis enemigos
  alternatives_spanish:
  - y me vengue de mis enemigos
  - hasta que me haya vengado de mis enemigos
  lexicon: HALOT
  rationale: La relación temporal se expresa de manera clara en español con «antes de que». Se mantiene la primera persona y el matiz de venganza personal del texto.
- source_word: לֹא טָעַם ... לָחֶם
  english_pob_choice: none of the people tasted food
  chosen_spanish: todo el pueblo no probó pan
  alternatives_spanish:
  - nadie del pueblo probó pan
  - ninguno del pueblo comió
  lexicon: HALOT
  rationale: «Probar» conserva el verbo del hebreo y en español mantiene la idea de no haber ingerido nada. Se mantiene «pan» en el cuerpo principal por fidelidad léxica, con la ambigüedad idiomática reconocida en la nota.
translation_notes:
  revision_awareness: Se siguió la revisión del POB inglés que prefirió «put the people under an oath» por ser más natural. En español se reflejó esa misma decisión con «puso al pueblo bajo juramento», manteniendo además la nota lexical sobre לֶחֶם/léjem.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «Saúl» para el nombre propio y «el pueblo» para הָעָם, coherente con el registro narrativo.
  - La nota [a] se ancla en «estaban[a] presionados» para señalar la ambigüedad de לֶחֶם sin recargar el texto principal.
