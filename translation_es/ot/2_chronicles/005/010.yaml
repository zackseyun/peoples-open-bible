  - marker: b
    text: 'Hebreo: «hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota b para que corresponda a la frase que realmente explica. También se ajustó 'los hijos de Israel' a 'el pueblo de Israel' en el texto principal para seguir mejor la decisión contextual del POB y la legibilidad natural en español, manteniendo la alternativa literal en nota.
