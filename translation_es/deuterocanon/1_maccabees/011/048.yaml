translation:
  language: es
  text: Y prendieron fuego a la ciudad, y tomaron mucho botín[a] en aquel día, y salvaron al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Botín» traduce el griego σκῦλα, término militar para los despojos tomados al enemigo; no se trata de una alusión moralizante, sino del resultado de saqueo bélico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεπύρισαν
  english_pob_choice: set ... on fire
  chosen_spanish: prendieron fuego a
  alternatives_spanish:
  - incendiaron
  - quemaron
  lexicon: LSJ
  rationale: 'El griego expresa una acción causativa: hacer que la ciudad arda. «Prendieron fuego a» conserva esa fuerza de manera natural en español y evita una lectura demasiado general de «quemaron».'
- source_word: πόλιν
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - población
  - villa
  lexicon: LSJ
  rationale: πόλις normalmente significa «ciudad»; no hay base en el contexto para reducirlo a un asentamiento menor.
- source_word: σκῦλα πολλὰ
  english_pob_choice: took much plunder
  chosen_spanish: mucho botín
  alternatives_spanish:
  - muchos despojos
  - mucho saqueo
  lexicon: LSJ
  rationale: σκῦλα se refiere a despojos de guerra, es decir, botín. «Botín» es el equivalente más natural y conserva el sentido militar sin añadir matices no documentados. Se conserva la cuantificación amplia con «mucho».
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - en ese mismo día
  lexicon: LSJ
  rationale: La expresión temporal es directa y se puede traducir literalmente sin pérdida. «En aquel día» mantiene el carácter deíctico del griego y es plenamente comprensible en español bíblico.
- source_word: ἔσωσαν
  english_pob_choice: saved
  chosen_spanish: salvaron
  alternatives_spanish:
  - rescataron
  - liberaron
  lexicon: LSJ
  rationale: El verbo σημαίνει «salvar/rescatar». «Salvaron» conserva la amplitud semántica del inglés POB y se ajusta al relato sin forzar una precisión interpretativa adicional.
- source_word: τὸν βασιλέα
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - al rey
  lexicon: LSJ
  rationale: Se conserva el referente directo con artículo definido. En la oración española, «salvaron al rey» es la forma idiomática, con el objeto personal marcado adecuadamente por la preposición «a».
translation_notes:
  revision_awareness: El pasaje griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; la versión española sigue esa lectura estable sin introducir variantes textuales ni decisiones doctrinales nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva el registro narrativo sobrio y militar del original, evitando ampliar el sentido de «salvaron» más allá de la acción indicada por ἔσωσαν.
  - «Botín» se usa como equivalente principal de σκῦλα, en línea con el valor bélico del término.
