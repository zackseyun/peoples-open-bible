translation:
  language: es
  text: Palal hijo de Uzai reparó frente al ángulo y la torre sobresaliente de la casa superior del rey[a], que está junto al patio de la guardia[c][b]. Después de él, Pedaías hijo de Parosh reparó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la esquina».
    reason: lexical_alternative
  - marker: b
    text: O «del palacio superior». El hebreo dice literalmente «de la casa alta del rey».
    reason: lexical_alternative
  - marker: c
    text: O «patio de la prisión». El término probablemente se refiere a un patio de custodia vigilada.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנֶּגֶד
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  - frente a
  lexicon: HALOT
  rationale: En este contexto de lista de reparaciones, la preposición indica ubicación relativa respecto de un punto arquitectónico. «Frente a» expresa bien la relación espacial sin forzar distancia ni dirección exacta.
- source_word: הַמִּקְצוֹעַ
  english_pob_choice: the angle
  chosen_spanish: el ángulo
  alternatives_spanish:
  - la esquina
  - el rincón
  - el ángulo
  lexicon: HALOT
  rationale: El sustantivo puede referirse a un ángulo o esquina de una estructura. «Ángulo» conserva el matiz arquitectónico y sigue de cerca la opción inglesa principal, mientras que «esquina» queda como alternativa válida.
- source_word: הַמִּגְדָּל הַיּוֹצֵא
  english_pob_choice: the tower projecting
  chosen_spanish: la torre que salía
  alternatives_spanish:
  - la torre proyectada
  - la torre que sobresalía
  - la torre que salía
  lexicon: HALOT
  rationale: El participio comunica una torre que se extiende hacia afuera. En español, «que salía» reproduce esa idea de protrusión de manera natural y arquitectónica.
- source_word: מִבֵּית הַמֶּלֶךְ הָעֶלְיוֹן
  english_pob_choice: from the upper house of the king
  chosen_spanish: de la casa alta del rey
  alternatives_spanish:
  - de la casa superior del rey
  - del palacio superior
  - de la casa alta del rey
  lexicon: HALOT
  rationale: «Casa» mantiene el hebreo בית sin convertirlo por defecto en «palacio». «Alta» traduce literalmente הָעֶלְיוֹן y preserva la distinción topográfica o estructural.
- source_word: אֲשֶׁר לַחֲצַר הַמַּטָּרָה
  english_pob_choice: which is by the court of the guard
  chosen_spanish: que está junto al patio de la guardia
  alternatives_spanish:
  - que está junto al patio de la guardia
  - que está junto al patio de la prisión
  - que está en el patio de la guardia
  lexicon: HALOT
  rationale: La expresión alude a un recinto vigilado o de custodia. «Patio de la guardia» preserva el sentido contextual sin decidir demasiado fuerte por «prisión».
- source_word: אַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Después de él
  - Tras él
  - Luego de él
  lexicon: HALOT
  rationale: La fórmula introduce al siguiente reparador en la secuencia. «Después de él» es claro y natural en español, y conserva la progresión del listado.
- source_word: פָּלָל
  english_pob_choice: Palal
  chosen_spanish: Palal
  alternatives_spanish:
  - Palal
  lexicon: transliteration
  rationale: Nombre propio transliterado sin adaptación.
- source_word: אוּזַי
  english_pob_choice: Uzai
  chosen_spanish: Uzai
  alternatives_spanish:
  - Uzai
  lexicon: transliteration
  rationale: Nombre propio transliterado sin adaptación.
- source_word: פְּדָיָה
  english_pob_choice: Pedaiah
  chosen_spanish: Pedaías
  alternatives_spanish:
  - Pedaías
  - Pedaiah
  lexicon: transliteration
  rationale: Se usa una transliteración española con acentuación gráfica natural para facilitar la lectura en español.
- source_word: פַּרְעֹשׁ
  english_pob_choice: Parosh
  chosen_spanish: Parosh
  alternatives_spanish:
  - Parosh
  lexicon: transliteration
  rationale: Nombre propio transliterado sin adaptación.
- source_word: '[ellipsis of verb with פְּדָיָה בֶן פַּרְעֹשׁ]'
  english_pob_choice: repaired
  chosen_spanish: reparó
  alternatives_spanish:
