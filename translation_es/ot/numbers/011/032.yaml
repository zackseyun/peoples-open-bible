source:
  edition: WLC
  text: וַ/יָּ֣קָם הָ/עָ֡ם כָּל הַ/יּוֹם֩ הַ/ה֨וּא וְ/כָל הַ/לַּ֜יְלָה וְ/כֹ֣ל י֣וֹם הַֽ/מָּחֳרָ֗ת וַ/יַּֽאַסְפוּ֙ אֶת הַ/שְּׂלָ֔ו הַ/מַּמְעִ֕יט אָסַ֖ף עֲשָׂרָ֣ה חֳמָרִ֑ים וַ/יִּשְׁטְח֤וּ לָ/הֶם֙ שָׁט֔וֹחַ סְבִיב֖וֹת הַֽ/מַּחֲנֶֽה־־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/011/032.yaml
  text: And the people rose up all that day and all that night and all the next day[a], and they gathered the quail. The one who gathered the least gathered ten homers[b], and they spread them out for themselves all around the camp.
  footnotes:
  - marker: a
    text: A homer was a large dry measure. The exact modern equivalent is uncertain; the point is that even the person who gathered the least collected a very large amount.
    reason: cultural_note
  - marker: b
    text: Or 'ten donkey-loads,' if חֳמָרִים is taken by its etymological association rather than as the standard dry measure 'homers.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
