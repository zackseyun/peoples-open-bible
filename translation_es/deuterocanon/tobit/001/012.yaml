lexical_decisions:
- source_word: καθότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: LSJ
  rationale: Introduce la causa de lo dicho antes; «porque» expresa con naturalidad la relación causal sin añadir matices no presentes en el griego.
- source_word: ἐμεμνήμην
  english_pob_choice: I remembered
  chosen_spanish: me acordé
  alternatives_spanish:
  - recordé
  - tuve presente
  - fui consciente de
  lexicon: BDAG
  rationale: El verbo griego expresa el acto de recordar o tener presente; en español, «me acordé» suena natural y conserva la referencia personal directa sin volver la frase artificial.
- source_word: τοῦ θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: El objeto del recuerdo es Dios; en español, tras «acordarse de», la construcción exige el complemento preposicional implícito en la frase completa, pero en el texto fluye de manera idiomática como «me acordé de Dios».
- source_word: ἐν ὅλῃ τῇ ψυχῇ μου
  english_pob_choice: with all my soul
  chosen_spanish: con toda mi alma
  alternatives_spanish:
  - con todo mi ser
  - con toda mi vida
  - de todo corazón
  lexicon: BDAG
  rationale: Se conserva ψυχή con «alma», que en español bíblico comunica bien la devoción interior total. «Con toda mi alma» mantiene la fuerza antropológica y la naturalidad estilística; «ser» o «corazón» suavizarían o desplazarían el término.
theological_decisions:
- issue: Valor antropológico de ψυχή
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - ser
  - vida
  - corazón
  rationale: La frase describe una memoria o devoción total interior. «Alma» preserva mejor la carga antropológica de ψυχή que una paráfrasis como «ser», y evita reducirla a una emoción puntual como «corazón».
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue el valor causal de καθότι y mantiene la cláusula de memoria devocional sin ampliar el sentido. Frente al inglés auditado, se optó por «me acordé de Dios» y «con toda mi alma» para una cadencia natural en español, conservando el peso de ψυχή sin mecanicismo.
  spanish_consistency_notes:
  - Se emplea «Dios» sin artículo, como corresponde al español bíblico en esta construcción.
  - Se prefirió «alma» para ψυχή por continuidad terminológica con el registro bíblico y por transparencia para lectores eclesiales.
  - La nota al pie conserva la alternativa directa del sentido original, sin introducir variantes doctrinales.
