id: JOS.10.11
reference: Joshua 10:11
source:
  edition: WLC
  text: וַ/יְהִ֞י בְּ/נֻסָ֣/ם מִ/פְּנֵ֣י יִשְׂרָאֵ֗ל הֵ֞ם בְּ/מוֹרַ֤ד בֵּית חוֹרֹן֙ וַֽ/יהוָ֡ה הִשְׁלִ֣יךְ עֲלֵי/הֶם֩ אֲבָנִ֨ים גְּדֹל֧וֹת מִן הַ/שָּׁמַ֛יִם עַד עֲזֵקָ֖ה וַ/יָּמֻ֑תוּ רַבִּ֗ים אֲשֶׁר מֵ֨תוּ֙ בְּ/אַבְנֵ֣י הַ/בָּרָ֔ד מֵ/אֲשֶׁ֥ר הָרְג֛וּ בְּנֵ֥י יִשְׂרָאֵ֖ל בֶּ/חָֽרֶב׀־־־־׃ס
translation:
  text: And as they fled before Israel[a], while they were on the descent of Beth-horon, Yahweh threw large stones from heaven on them as far as Azekah, and they died. More died from the hailstones than the sons of Israel killed with the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/נֻסָם
  chosen: as they fled
  alternatives:
  - while they fled
  - in their fleeing
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב plus suffix expresses contemporaneous action. 'As they fled' is natural English and preserves the temporal sense.
- source_word: מִפְּנֵי יִשְׂרָאֵל
  chosen: before Israel
  alternatives:
  - from before Israel
  - from the presence of Israel
  lexicon: HALOT
  rationale: Idiomatic Hebrew for retreating in the face of an opponent. 'Before Israel' is concise and clear in English.
- source_word: בְּמוֹרַד בֵּית חוֹרֹן
  chosen: while they were on the descent of Beth-horon
  alternatives:
  - on the slope of Beth-horon
  - at the descent of Beth-horon
  lexicon: HALOT
  rationale: מוֹרַד denotes a descent or downhill slope. 'Descent of Beth-horon' preserves the topographical specificity important to the narrative.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following established reverential convention and the LXX pattern.
- source_word: הִשְׁלִיךְ
  chosen: threw down
  alternatives:
  - cast down
  - hurled
  lexicon: HALOT
  rationale: The verb means to throw/cast. 'Threw down' fits the downward motion from heaven and reads naturally in modern English.
- source_word: אֲבָנִים גְּדֹלוֹת
  chosen: large stones
  alternatives:
  - great stones
  - big stones
  lexicon: HALOT
  rationale: The text first describes them generically as stones, with the later phrase identifying them as hailstones. Rendering this as 'large stones' preserves the progression of the Hebrew.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the sky
  lexicon: HALOT
  rationale: In this context the phrase denotes the divine source from above; 'from heaven' preserves both literal and theological resonance better than the flatter 'from the sky.'
- source_word: עַד עֲזֵקָה
  chosen: as far as Azekah
  alternatives:
  - up to Azekah
  - until Azekah
  lexicon: HALOT
  rationale: עַד here marks extent of the storm's effect along the route. 'As far as Azekah' communicates spatial reach.
- source_word: וַיָּמֻתוּ רַבִּים
  chosen: and they died. More died
  alternatives:
  - and many died
  - and a great many died
  lexicon: HALOT
  rationale: The Hebrew first states their death, then specifies comparatively that many/more died by hail. Splitting into two English sentences preserves clarity while retaining the narrative sequence. 'More died' captures the comparative force developed in the next clause.
- source_word: בְּאַבְנֵי הַבָּרָד
  chosen: from the hailstones
  alternatives:
  - by the stones of hail
  - by hailstones
  lexicon: HALOT
  rationale: This phrase identifies the previously mentioned stones as hailstones. 'From the hailstones' is idiomatic with the comparative statement and preserves the lexical link to 'stones.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine construct is retained where it refers to the covenant people in traditional ethnonymic form. A more idiomatic alternative is worth preserving in a footnote.
- source_word: בֶּחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' 'The sword' is the conventional and accurate singular collective for death in battle.
