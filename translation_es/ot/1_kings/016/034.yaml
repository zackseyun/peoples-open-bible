    issue: «Reedificó» suena más arcaico y menos natural que «reconstruyó» en español contemporáneo neutral.
    rationale: Aunque «reedificar» es posible y fiel, «reconstruir» transmite igual el sentido contextual documentado por el POB y resulta más claro para lectores hispanohablantes actuales sin perder dignidad.
  - severity: medium
