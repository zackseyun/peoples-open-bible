revisions:
- from: Y sucederá que el que escape de la espada de Hazael[a], a ese lo matará Jehú; y el que escape de la espada de Jehú, lo matará Eliseo.
  to: Y sucederá que el que escape de la espada de Hazael, Jehú lo pondrá a muerte; y el que escape de la espada de Jehú, Eliseo lo pondrá a muerte[a].
  rationale: Se corrige el anclaje de la nota para que comente la cláusula relevante sobre Eliseo y se ajusta יָמִית a 'pondrá a muerte' para reflejar mejor el hiphil causativo y la decisión léxica del POB inglés. También se simplifica el orden de la primera cláusula para un paralelismo español más natural.
