  language: en
  yaml_path: translation/ot/isaiah/054/011.yaml
  text: O afflicted one[a], storm-tossed and not comforted, behold[b], I am setting your stones in antimony and laying your foundations with sapphires.
  footnotes:
  - marker: a
    text: Or 'with lapis lazuli'; the Hebrew term traditionally rendered 'sapphires' may refer to a blue precious stone not identical to the modern sapphire.
    reason: lexical_alternative
  - marker: b
    text: '''In antimony'' likely refers to a decorative setting material for the stones; some understand a dark mortar or inlay.'
    reason: cultural_note
