translation:
  language: es
  text: ¡Qué hermosa es la sabiduría de los ancianos[a], y el entendimiento y el consejo en los que son honrados!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Qué hermosa es la sabiduría de los ancianos, y el pensamiento y el consejo en los honrados!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ὡραία
  english_pob_choice: How beautiful
  chosen_spanish: ¡Qué hermosa!
  alternatives_spanish:
  - ¡Qué bella!
  - ¡Cuán hermosa!
  lexicon: LSJ
  rationale: El exclamativo griego ὡς con ὡραία pide una exclamación en español; «¡Qué hermosa!» conserva el elogio estético natural sin convertirlo en una mera comparación.
- source_word: γερόντων
  english_pob_choice: the aged
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los viejos
  - los mayores
  - los ancianos varones
  lexicon: LSJ
  rationale: «Ancianos» expresa de manera natural la referencia a personas de edad avanzada y evita el sesgo de oficio de «ancianos» en sentido eclesial o la aspereza de «viejos». Mantiene el valor generacional del griego sin restringirlo innecesariamente a varones como grupo excluyente.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sapiencia
  - sabio juicio
  lexicon: LSJ
  rationale: En Sirácida, σοφία es un término central del campo sapiencial; «sabiduría» es la equivalencia normal y más transparente en español.
- source_word: δεδοξασμένοις
  english_pob_choice: those who are honored
  chosen_spanish: los que son honrados
  alternatives_spanish:
  - los honrados
  - los estimados
  - los glorificados
  lexicon: LSJ
  rationale: El participio perfecto comunica un estado permanente o caracterizado por honor recibido. «Los que son honrados» conserva esa cualidad sin elevar el registro a un sentido teológico ajeno al contexto sapiencial.
- source_word: διανόημα
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - pensamiento
  - discernimiento
  - inteligencia
  lexicon: LSJ
  rationale: «Entendimiento» reproduce bien la capacidad o resultado de pensar con juicio, y encaja de forma natural con el paralelismo de «consejo».
- source_word: βουλή
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - prudencia
  - deliberación
  - consejo sabio
  lexicon: LSJ
  rationale: En esta pareja sapiencial, βουλή apunta a consejo prudente o deliberación acertada. «Consejo» mantiene el tono elevado y el valor práctico del término.
theological_decisions:
- issue: Referencia de γερόντων
  english_pob_reading: Rendered inclusively as 'the aged' rather than male-specific 'old men.'
  chosen_spanish_reading: «los ancianos» como referencia inclusiva a personas de edad avanzada, no solo a varones ni a un oficio eclesial.
  alternative_spanish_readings:
  - los viejos
  - los ancianos varones
  - los mayores
  rationale: La línea sapiencial describe una observación general sobre la edad y la sabiduría; el español debe preservar esa amplitud sin importar un sentido eclesial de «ancianos» ni limitarlo al masculino exclusivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto griego breve y el audit trail en inglés muestran acuerdo alto y ninguna revisión sustantiva reciente; la versión española sigue la lectura óptima del inglés auditable, manteniendo el valor exclamativo, la referencia a la edad y el paralelismo sapiencial sin introducir ampliaciones.
  spanish_consistency_notes:
  - Se usa «sabiduría» de manera consistente para σοφία en contexto sapiencial.
  - Se evita «SEÑOR» o terminología teológica ajena; el versículo no contiene el nombre divino.
  - «Consejo» se mantiene como equivalente estable de βουλή en esta unidad.
  - La nota al pie conserva la alternativa documentada «pensamiento» para διανόημα, siguiendo el rastro inglés de «thought».
