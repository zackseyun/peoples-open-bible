    rationale: El POB inglés preserva explícitamente la alternativa de נֶפֶשׁ como «vida» o «ser». El borrador no la incluye, perdiendo una decisión lexical documentada.
  - severity: low
    issue: «escuchan de verdad» es poco idiomático en este registro.
    rationale: Aunque intenta reflejar la intensidad de שָׁמֹעַ תִּשְׁמְעוּ, en español suena coloquial. «si de veras escuchan» preserva mejor la fuerza sin perder naturalidad.
