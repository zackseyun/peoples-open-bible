review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en los elementos principales: ''la casa de Israel'', la rebelión contra Dios, el escenario ''en el desierto'', el rechazo de los estatutos/juicios, la profanación de los sábados y la intención de derramar la ira para poner fin al pueblo. Sin embargo, la cláusula central ''אֲשֶׁר יַעֲשֶׂה אֹתָם הָאָדָם וָחַי בָּהֶם'' está formulada de manera poco fiel en español con ''en los cuales'', que sugiere localización o medio impropio; el relativo debe referirse a ''mis juicios'' como objeto directo: ''los cuales, si una persona los pone por obra, vivirá por ellos'' o equivalente. También ''Derramaré mi furor'' cambia la sintaxis de intención reportada de וָאֹמַר לִשְׁפֹּךְ a un futuro directo; conviene conservar ''dije que derramaría'' o ''dije que iba a derramar''.'
  spanish_quality_summary: El texto es generalmente claro y bíblico, pero presenta algunas asperezas de naturalidad y precisión. 'En los cuales si un hombre los hace' suena forzado y poco idiomático. 'Profanaron mucho mis sábados' es comprensible, pero 'profanaron gravemente mis sábados' o 'profanaron en gran manera' suena más natural y digno. 'Para acabarlos' es entendible, aunque algo coloquial; 'para ponerles fin' o 'para exterminarlos' sería más elevado, y 'ponerles fin' coincide mejor con la línea POB. La puntuación y el registro general son adecuados.
  glossary_alignment: 'La terminología principal está mayormente alineada: ''casa de Israel'', ''estatutos'', ''juicios'', ''sábados''. No hay conflicto con la política de ''Yahvé'' porque el verso está en primera persona divina. El punto más débil no es glosarial sino sintáctico-teológico: la fórmula de vida debe conservar mejor el eco de Levítico 18:5 y el español debe expresar claramente que una persona que cumpla esos juicios vivirá por ellos. También la nota sobre ''un hombre'' ya no es necesaria si se adopta ''una persona'', en línea con la revisión inglesa auditada.'
  issues:
  - severity: high
    issue: La cláusula relativa 'en los cuales si un hombre los hace' no refleja bien el hebreo ni su sintaxis.
    rationale: אֲשֶׁר ... אֹתָם introduce 'los cuales', refiriéndose a 'mis juicios' como objeto de hacer/cumplir. 'En los cuales' altera el sentido y produce un español torpe.
  - severity: medium
    issue: '''Derramaré mi furor'' cambia la construcción reportada ''y dije [que iba] a derramar''.'
    rationale: וָאֹמַר לִשְׁפֹּךְ expresa intención declarada, no una cita directa en futuro. El POB documenta explícitamente esta decisión sintáctica.
  - severity: medium
    issue: '''Para acabarlos'' es demasiado coloquial para el registro y no refleja tan bien el matiz de לְכַלּוֹתָם.'
    rationale: Aunque posible, 'ponerles fin' preserva mejor el sentido de juicio terminal sin sonar informal.
  - severity: low
    issue: La nota [b] sobre 'un hombre' queda desalineada con la revisión inglesa auditada y puede evitarse en español.
    rationale: El rastro POB revisado usa 'a person'. En español, 'una persona' mantiene el sentido genérico singular sin pérdida teológica ni necesidad de aclaración adicional.
  revised_spanish_text: Pero la casa de Israel se rebeló contra mí en el desierto. No anduvieron en mis estatutos, y rechazaron mis juicios[a], los cuales, si una persona los pone por obra, vivirá por ellos[b]. Profanaron gravemente mis sábados. Entonces dije que derramaría mi furor sobre ellos en el desierto[b], para ponerles fin.
  revised_footnotes:
  - marker: a
    text: Hebreo 'juicios'; el término también puede traducirse 'ordenanzas' o 'decretos'.
    reason: lexical_alternative
  - marker: b
    text: Esta formulación evoca Levítico 18:5.
    reason: cross_reference
  revision_rationale: La revisión corrige la cláusula central para reflejar con fidelidad el hebreo y sonar natural en español, alineándose además con la revisión inglesa auditada que usa 'a person'. También restaura la sintaxis de intención reportada en 'Entonces dije que derramaría...' y eleva el registro de la frase final con 'para ponerles fin'. Se conserva la nota léxica sobre 'juicios' y la referencia intertextual a Levítico 18:5, anclada en la expresión de vida por obediencia.
