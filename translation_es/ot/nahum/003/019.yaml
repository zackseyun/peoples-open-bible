    text: 'O: «No hay alivio para tu quebranto; tu herida es severa».'
    reason: lexical_alternative
  - marker: b
    text: La pregunta retórica implica que la maldad de Nínive había afectado prácticamente a todos; por eso las naciones se alegran de su caída.
    reason: cultural_note
  revision_rationale: 'Se ajusta la redacción para un español más natural y fiel al perfil del POB: ''curación'' evita la marcación de ''sanidad''; ''grave'' evita sobreintensificar; y ''aplauden por tu caída'' expresa con claridad el gesto de regocijo hostil que el hebreo y la nota cultural describen. Se conserva ''maldad'' por su fuerza moral amplia.'
