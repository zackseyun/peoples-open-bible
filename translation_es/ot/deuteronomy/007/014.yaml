translation:
  language: es
  text: Serás bendito más que todos los pueblos[a]; no habrá entre los tuyos ningún varón ni mujer estériles[b], ni entre tu ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por encima de todos los pueblos». La preposición hebrea puede tener aquí valor comparativo.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo tiene explícitamente las formas masculina y femenina: «varón estéril» y «mujer estéril».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: blessed
  chosen_spanish: bendecido
  alternatives_spanish:
  - bienaventurado
  - bendito
  lexicon: HALOT
  rationale: El hebreo expresa un estado de bendición recibida. "Bendecido" mantiene ese valor pasivo y es natural en español bíblico contemporáneo sin volverlo litúrgico de más.
- source_word: תִּהְיֶה
  english_pob_choice: you will be
  chosen_spanish: serás
  alternatives_spanish:
  - estarás
  - serás tú
  lexicon: HALOT
  rationale: El imperfecto dirigido a la segunda persona singular funciona como promesa/futuro. "Serás" conserva la predicción y la forma directa del hebreo corporativo.
- source_word: מִכָּל הָעַמִּים
  english_pob_choice: above all peoples
  chosen_spanish: sobre todos los pueblos
  alternatives_spanish:
  - más que todos los pueblos
  - por encima de todos los pueblos
  lexicon: HALOT
  rationale: La preposición מן con valor comparativo permite expresar superioridad relativa. "Sobre" reproduce bien el comparativo sin sonar rígido; "pueblos" es el correlato natural de עַמִּים.
- source_word: לֹא יִהְיֶה בְךָ
  english_pob_choice: there will not be among you
  chosen_spanish: no habrá en ti
  alternatives_spanish:
  - no habrá entre ustedes
  - no se hallará en ti
  lexicon: HALOT
  rationale: La construcción existencial indica ausencia dentro del pueblo. "En ti" conserva el singular corporativo del hebreo; en español fluido puede expresar ese sentido comunitario sin ampliar innecesariamente.
- source_word: עָקָר וַעֲקָרָה
  english_pob_choice: a barren male or female
  chosen_spanish: un estéril varón o mujer
  alternatives_spanish:
  - un hombre estéril o una mujer estéril
  - un estéril masculino o femenino
  lexicon: HALOT
  rationale: El hebreo explicita formas masculina y femenina. "Varón o mujer" preserva esa distinción de modo claro y digno; "estéril" comunica el valor semántico de עקר en español actual.
- source_word: וּבִבְהֶמְתֶּךָ
  english_pob_choice: or among your livestock
  chosen_spanish: ni entre tu ganado
  alternatives_spanish:
  - ni entre tus animales
  - ni entre tu bestiada
  lexicon: HALOT
  rationale: בְּהֵמָה aquí designa animales domesticados en conjunto. "Ganado" es una forma natural y amplia en español bíblico, y evita restringir innecesariamente el campo semántico.
theological_decisions:
- issue: Mantener el contraste comparativo de la bendición nacional
  english_pob_reading: above all peoples
  chosen_spanish_reading: sobre todos los pueblos
  alternative_spanish_readings:
  - más que todos los pueblos
  - por encima de todos los pueblos
  rationale: El hebreo usa una comparación de superioridad ligada a la bendición pactal de Israel. La formulación elegida conserva esa tensión sin convertirla en una paráfrasis interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 2
- issue: Conservar el singular corporativo de Israel
  english_pob_reading: there will not be among you
  chosen_spanish_reading: no habrá en ti
  alternative_spanish_readings:
  - no habrá entre ustedes
  - no habrá entre vosotros
  rationale: El hebreo habla al pueblo como una unidad. El singular español mantiene la forma del texto fuente y evita deshacer la imagen colectiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
- issue: Preservar la explicitud sexual del binomio de infertilidad
  english_pob_reading: a barren male or female
  chosen_spanish_reading: un estéril varón o mujer
  alternative_spanish_readings:
  - un varón estéril o una mujer estéril
  - un hombre o mujer estéril
  rationale: El texto hebreo nombra ambas formas, masculina y femenina. La traducción no debe neutralizar esa explicitud; mantenerla ayuda a reflejar con precisión la bendición de fertilidad prometida.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada del POB en inglés que prefirió explicitar el binomio sexual («male or female») y mantener el valor comparativo de מן. En español se preserva esa decisión con lenguaje claro y sin aplanar la tensión lexical del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - «Pueblos» traduce עַמִּים con un registro bíblico natural en español.
  - Se evitó «SEÑOR» o formulaciones eclesiales no presentes en el hebreo.
  - «Estéril» cubre el campo semántico de עָקָר/עֲקָרָה sin medicalizar en exceso.
