  text: But in his rage he thought to vent on the Jews the malice of those who had put him to flight. Therefore he ordered the charioteer[a], driving without stopping, to press on with the journey, while the judgment from heaven was accompanying him. For in his arrogance he had said, “When I arrive there, I will make Jerusalem a burial place of Jews.”
  footnotes:
  - marker: a
    text: Or “a mass grave of Jews.” The Greek Πολυάνδριον denotes a burial place for many dead.
    reason: lexical_alternative
