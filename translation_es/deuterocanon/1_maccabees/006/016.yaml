lexical_decisions:
- source_word: ἐκθρέψαι
  english_pob_choice: to raise him up
  chosen_spanish: criarlo
  alternatives_spanish:
  - criarlo para
  - educarlo
  - hacerlo crecer
  lexicon: LSJ
  rationale: ἐκθρέψαι expresa la idea de criar o alimentar hasta la madurez; en este contexto de sucesión real, «criarlo» comunica bien la acción de rearing sin añadir material no atestiguado.
- source_word: βασιλεύειν
  english_pob_choice: to reign
  chosen_spanish: reinar
  alternatives_spanish:
  - gobernar
  - ser rey
  lexicon: LSJ
  rationale: El verbo denota ejercer el reinado; «reinar» es el equivalente español directo y mantiene el matiz monárquico sin redundancia.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - expiró
  lexicon: LSJ
  rationale: El verbo griego es directo y no eufemístico; «murió» preserva esa franqueza.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: LSJ
  rationale: La partícula de lugar se traduce naturalmente por «allí» en español.
- source_word: ἔτους ἐνάτου καὶ τεσσερακοστοῦ καὶ ἑκατοστοῦ
  english_pob_choice: in the one hundred forty-ninth year
  chosen_spanish: en el año ciento cuarenta y nueve
  alternatives_spanish:
  - en el año 149
  - en el año ciento cuarenta y nueve
  lexicon: LSJ
  rationale: La forma griega expresa un año numerado; en español conviene conservar la notación cronológica con palabras por ser más solemne y legible en registro bíblico.
translation_notes:
  revision_awareness: 'El borrador español corrige el problema previo de anclaje: la nota [a] ahora aparece exactamente en el texto junto a «rey Antíoco[a]». También refleja la revisión inglesa que simplificó βασιλεύειν a «to reign», evitando añadir «como rey».'
  spanish_consistency_notes:
  - He preferido «criarlo» sobre «hacerlo crecer» para mantener la fuerza de ἐκθρέψαι sin sonar demasiado explicativo.
  - «Reinar» conserva el sentido real de βασιλεύειν sin introducir una paráfrasis más amplia.
  - Se mantiene el nombre histórico «Antíoco» y la fecha en forma cardinal, acorde con un registro bíblico claro y sobrio.
