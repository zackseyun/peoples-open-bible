translation:
  language: es
  text: Mes a mes se renueva[a]—¡qué sobrecogedor es en su cambio! Un instrumento del ejército de lo alto[c][b], desde la extensión del cielo es su resplandor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Mes a mes, según su nombre, aumenta maravillosamente en el cambio». Esto refleja una redacción o interpretación distinta de la hebrea conservada «Mes a mes se renueva».'
    reason: alternative_reading
  - marker: b
    text: El hebreo de la segunda mitad es difícil y probablemente textualmente incierto. Masada conserva una formulación relacionada que difiere del texto de la Geniza del Cairo en esta línea; el sentido general es que la luna pertenece al ejército celestial y resplandece desde el cielo.
    reason: textual_variant
  - marker: c
    text: O «arpa de las alturas» o «lira de las alturas». La frase hebrea es inusual y puede ser metafórica más que literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: חדש בחדשו הוא מתחדש
  english_pob_choice: Month by month it renews itself
  chosen_spanish: Mes a mes se renueva
  alternatives_spanish:
  - De mes en mes se renueva
  - Mes tras mes se renueva
  lexicon: HALOT
  rationale: El hebreo repite la raíz חדש y expresa una renovación periódica. «Mes a mes» conserva el valor temporal de בחדשו y «se renueva» mantiene el matiz reflexivo de מתחדש sin forzar una paráfrasis.
- source_word: מה נורא
  english_pob_choice: how awe-inspiring
  chosen_spanish: ¡qué sobrecogedor
  alternatives_spanish:
  - ¡qué impresionante
  - ¡qué temible
  lexicon: HALOT
  rationale: נורא puede expresar temor reverente o asombro. En este contexto poético sobre la luna, «sobrecogedor» comunica bien la sensación de asombro sin reducirlo a terror.
- source_word: בהשתנותו
  english_pob_choice: in its changing
  chosen_spanish: en su cambio
  alternatives_spanish:
  - en su cambiar
  - en su transformación
  lexicon: HALOT
  rationale: La forma nominal apunta al acto de cambiar. «En su cambio» es breve y natural en español, y preserva el carácter poético de la cláusula.
- source_word: כלי צבא
  english_pob_choice: A vessel of the host
  chosen_spanish: Un vaso del ejército de lo alto
  alternatives_spanish:
  - Un instrumento del ejército de lo alto
  - Un vaso del hoste celestial
  lexicon: HALOT
  rationale: כְּלִי puede ser «vaso», «instrumento» o «utensilio», y צבא puede referirse a un ejército o a un hoste/cuerpo celestial. Dado el contexto cósmico y la decisión inglesa de evitar sobreinterpretación militar, «vaso del ejército de lo alto» conserva la tensión entre recipiente/instrumento y la imagen de la luna entre los astros.
- source_word: מרום
  english_pob_choice: on high / heights
  chosen_spanish: de lo alto
  alternatives_spanish:
  - de las alturas
  - celestial
  lexicon: HALOT
  rationale: מרום designa lo elevado, las alturas o lo alto. «De lo alto» es claro, bíblico en tono y suficientemente abierto para el registro cosmológico del pasaje.
- source_word: מרצף רקיע
  english_pob_choice: from the expanse of the sky
  chosen_spanish: desde la extensión del cielo
  alternatives_spanish:
  - desde la bóveda del cielo
  - desde el firmamento
  lexicon: HALOT
  rationale: El hebreo es difícil y el contexto pide una expresión que no resuelva artificialmente el crux. «Extensión del cielo» mantiene el sentido espacial de רקיע y refleja con sobriedad la imagen de procedencia celestial.
- source_word: מזהירתו
  english_pob_choice: is its shining
  chosen_spanish: es su resplandor
  alternatives_spanish:
  - es su brillo
  - resplandece
  lexicon: HALOT
  rationale: La forma deriva de זהר y apunta al brillo/radiancia. «Es su resplandor» conserva la construcción poética y evita añadir un verbo que el hebreo no exige explícitamente.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego en Sirácida
  english_pob_reading: Primary translation follows the extant Hebrew, with awareness of the Greek parallel where the Hebrew is obscure.
  chosen_spanish_reading: La traducción sigue principalmente el hebreo conservado, pero deja visible la oscuridad del tramo difícil y la luz del paralelo griego sin resolverlo todo.
  alternative_spanish_readings:
  - 'Seguir más de cerca el griego: «según su nombre, crece maravillosamente al cambiar».'
  - Suavizar el segundo hemistiquio con una descripción general de la luna entre los cuerpos celestes.
  rationale: Como el hebreo está conservado pero el pasaje final es difícil, conviene mantener la imaginería hebrea sin sobreexplicarla. El paralelo griego confirma el tema de la luna y su cambio, pero no obliga a sustituir el hebreo en la base de la traducción.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácida se conserva; preservar la ambigüedad antes que resolverla en exceso.'
translation_notes:
  revision_awareness: La revisión más reciente prefirió evitar una equivalencia demasiado especulativa para la segunda mitad del verso; por eso se conserva una formulación sobria y abierta, sin introducir imágenes como «arpa/lyra» que no están firmemente sustentadas en el hebreo disponible.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según las convenciones del proyecto; este versículo no los contiene.
  - «Vaso» se mantiene para כְּלִי por coherencia con la imagen cósmica y con la decisión inglesa de no forzar un término militar o musical.
  - Se conserva la ambigüedad de la línea final mediante una nota, ya que el hebreo es oscuro y el paralelo griego ofrece un matiz distinto.
