revisions:
- from: ¿No está Yahvé, su Dios, con ustedes? ¿Y no les ha dado descanso por todos lados? Porque ha entregado en mi mano a los habitantes de la tierra, y la tierra ha sido sometida delante de Yahvé y delante de su pueblo.
  to: ¿No está Yahvé, su Dios, con ustedes? ¿Y no les ha dado descanso por todas partes? Porque ha entregado en mi mano a los habitantes de la tierra, y la tierra ha sido sometida delante de Yahvé y delante de su pueblo[a].
  rationale: Se añade una nota para preservar la alternativa interpretativa documentada en el POB inglés sobre el referente de 'su pueblo', y se ajusta 'por todos lados' a 'por todas partes' para un registro más natural y digno sin alterar el sentido.
