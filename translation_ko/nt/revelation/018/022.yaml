  text: 수금 타는 자들과 음악가들과 피리 부는 자들과 나팔 부는 자들의 소리가 네 안에서 결코 다시는 들리지 아니하리라. 각종 기술자도 네 안에서 결코 다시는 발견되지 아니하리라. 맷돌 소리도 네 안에서 결코 다시는 들리지 아니하리라.
