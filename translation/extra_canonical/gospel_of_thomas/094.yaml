translation:
  text: Jesus said[a], The one who seeks will find; the one who knocks to enter[c][b],
    it will be opened for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The initial ‘Jesus said’ is partially reconstructed in the manuscript (Dilley’s
      brackets), normalized as ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ.
    reason: lacuna_or_restoration
  - marker: b
    text: ‘Knocks to enter’ reflects ⲧⲱϩⲙ with the directional ⲉϩⲟⲩⲛ (‘inwards, to
      go in’), without adding ‘door,’ which is not expressed.
    reason: cultural_note
  - marker: c
    text: ‘It will be opened for him’ renders the impersonal 3pl future ⲛⲧⲟⲟⲩ with
      passive sense; alternatively, ‘they will open (it) for him.’
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - He said, Jesus said it
  lexicon: Crum; Lambdin
  rationale: ⲡⲉϫⲉ is the standard verb “to say” (Crum s.v. ⲡⲉϫⲉ; Lambdin §152). ⲓⲏⲥⲟⲩⲥ
    is the proper name Jesus. The terse narrative incipit in Thomas is conventionally
    rendered “Jesus said.”
- source_word: ⲡⲉⲧⲉⲣⲉϣⲓⲛⲉ
  chosen: the one who seeks
  alternatives:
  - who is seeking
  - who keeps seeking
  lexicon: Layton; Crum
  rationale: Relative construction with ⲡⲉⲧⲉⲣⲉ + present conveys a generic subject
    (“the one who …”; Layton, Grammar §78). ϣⲓⲛⲉ = ‘seek, look for’ (Crum s.v. ϣⲓⲛⲉ).
    “Seeks” keeps Thomas’s gnomic terseness.
- source_word: ⲛⲧⲟϥ ⲛⲁϭⲓⲛⲉ
  chosen: he will find
  alternatives:
  - he is going to find
  lexicon: Lambdin; Crum
  rationale: Future marker ⲛⲁ- with subject pronoun ⲛⲧⲟϥ + ϭⲓⲛⲉ ‘find’ (Crum s.v.
    ϭⲓⲛⲉ; Lambdin §128). Simple English future matches aspect.
- source_word: ⲡⲉⲧⲉⲣⲉⲧⲱϩⲙ ⲉϩⲟⲩⲛ
  chosen: the one who knocks to enter
  alternatives:
  - the one who knocks (to go in)
  - the one who knocks within
  lexicon: Crum
  rationale: ⲧⲱϩⲙ = ‘knock, strike’ (Crum s.v. ⲧⲱϩⲙ). ⲉϩⲟⲩⲛ marks inward direction
    ‘to enter’ (Crum s.v. ⲉϩⲟⲩⲛ). Rendering keeps directional nuance without supplying
    ‘door,’ which the text does not state.
- source_word: ⲛⲧⲟⲟⲩ ⲛⲁ ⲟⲩⲱⲛ ⲛⲁ ⲛⲧⲟϥ
  chosen: it will be opened for him
  alternatives:
  - they will open (it) for him
  lexicon: Layton; Crum
  rationale: Impersonal 3pl future ⲛⲧⲟⲟⲩ often functions as a passive (‘it will be
    …’; Layton §154). ⲟⲩⲱⲛ = ‘open’ (Crum s.v. ⲟⲩⲱⲛ). ‘It will be opened for him’
    captures the idiomatic passive without importing a door.
textual_note: 'Dilley marks minor lacunae at the start of the line: [ⲡⲉϫ]ⲉ̣ⲓⲥ is restored
  to ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ in normalization; likewise [ⲡⲉⲧⲧⲱϩⲙ ⲉ]ϩ̣ⲟⲩⲛ is normalized to ⲡⲉⲧⲉⲣⲉⲧⲱϩⲙ
  ⲉϩⲟⲩⲛ. The manuscript writes morphemes closely (e.g., ⲛⲧⲟⲟⲩⲛⲁⲟⲩⲱⲛ ⲛⲁⲛⲧⲟϥ) that are
  segmented in normalization. No orthographic features materially alter meaning. The
  future ⲛⲧⲟⲟⲩ is an impersonal 3pl used passively. No Greek POxy witness overlaps
  Saying 94.'
