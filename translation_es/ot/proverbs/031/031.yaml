translation:
  language: es
  text: Denle del fruto de sus manos,[a] y que sus obras[b] la alaben en las puertas.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de su labor'; literalmente, 'del fruto de sus manos'.
    reason: lexical_alternative
  - marker: b
    text: O 'sus hechos'; el hebreo personifica sus obras como si dieran testimonio público de su valor.
    reason: lexical_alternative
  - marker: c
    text: O 'en las puertas de la ciudad'; las puertas eran el lugar público de reconocimiento, juicio y honor en la sociedad israelita antigua.
    reason: cultural_note
lexical_decisions:
- source_word: תְּנוּ
  english_pob_choice: Give
  chosen_spanish: Denle
  alternatives_spanish:
  - Dénle
  - Dadle
  - Den
  lexicon: HALOT
  rationale: El imperativo plural pide una orden directa. En español, 'Denle' comunica con naturalidad la exhortación y mantiene el destinatario femenino singular.
- source_word: לָהּ
  english_pob_choice: her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - la
  lexicon: HALOT
  rationale: El dativo español expresa mejor el objeto indirecto; 'le' conserva la referencia a la mujer del poema sin recargar la línea.
- source_word: מִפְּרִי
  english_pob_choice: of the fruit
  chosen_spanish: de fruto
  alternatives_spanish:
  - del fruto
  - de su fruto
  - con fruto
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de procedencia/porción con una construcción natural en español, sin añadir explicación ajena al texto.
- source_word: יָדֶיהָ
  english_pob_choice: of her hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - de su labor
  - de su trabajo
  - de su handiobra
  lexicon: HALOT
  rationale: Aunque 'manos' puede implicar labor en hebreo, el español lo expresa con suficiente claridad y conserva la metáfora concreta.
- source_word: וִיהַלְל֖וּהָ
  english_pob_choice: and let her works praise her
  chosen_spanish: que sus obras la alaben
  alternatives_spanish:
  - y sus obras la alaben
  - y que la alaben sus obras
  - que sus hechos la alaben
  lexicon: HALOT
  rationale: 'La personificación del verbo se mantiene: las obras ''alaban'' a la mujer públicamente. ''Que'' reproduce bien el valor volitivo de la forma hebrea.'
- source_word: בַשְּׁעָרִים
  english_pob_choice: in the gates
  chosen_spanish: en las puertas
  alternatives_spanish:
  - en las puertas de la ciudad
  - en los portales
  - en las entradas
  lexicon: HALOT
  rationale: '''Puertas'' es una forma natural en español y conserva la imagen de los lugares públicos de reconocimiento; se evita una nota en el texto principal para no sobrecargarlo.'
- source_word: מַעֲשֶׂיהָ
  english_pob_choice: her works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - su obra
  - sus acciones
  lexicon: HALOT
  rationale: '''Obras'' mantiene el paralelismo con ''fruto de sus manos'' y refleja adecuadamente el campo semántico de מעשה.'
theological_decisions:
- issue: Función pública de 'las puertas'
  english_pob_reading: the gates were the public place of recognition, judgment, and honor in ancient Israelite society
  chosen_spanish_reading: las puertas como lugar público de reconocimiento
  alternative_spanish_readings:
  - las puertas de la ciudad como lugar de juicio y honor
  - las puertas como foro público
  rationale: El verso no requiere amplificación interpretativa en el texto principal; el sentido cultural queda reconocido por la imagen misma, sin perder claridad.
  doctrine_reference: Vida comunitaria y honor público en la sabiduría bíblica
- issue: Personificación de las obras
  english_pob_reading: the Hebrew personifies her works as bearing public witness to her worth
  chosen_spanish_reading: sus obras la alaben
  alternative_spanish_readings:
  - sus obras den testimonio de ella
  - sus obras hablen en su favor
  rationale: Se conserva la personificación sin suavizarla. 'Alaben' deja oír que las obras funcionan como testimonio público de su valor.
  doctrine_reference: Antropología bíblica y testimonio de las obras
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió 'of the fruit' por naturalidad idiomática sin alterar el sentido. En español se refleja con 'de fruto', manteniendo la procedencia/porción de la expresión hebrea y el paralelismo con 'sus obras'.
  spanish_consistency_notes:
  - Se eligió 'puertas' en lugar de una paráfrasis como 'puertas de la ciudad' para conservar la concisión poética del hebreo.
  - No se usó 'sierva' ni 'esclava' porque el verso no contiene ese término; se mantuvo el referente femenino implícito del poema con 'le/la/sus'.
  - Se mantuvo el plural exhortativo en 'Denle' para reflejar la forma plural hebrea y el tono de llamada comunitaria.
