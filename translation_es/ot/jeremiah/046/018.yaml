review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: fórmula de juramento («Vivo yo»), marcador profético («declara»), título divino («el Rey»), nombre divino («Yahvé»), comparación doble con Tabor y Carmelo, y sujeto implícito de «vendrá» señalado en nota. Sin embargo, hay un detalle de naturalidad y fidelidad estilística: la explicitación final «él» no es necesaria en español y suena algo marcada; el hebreo solo tiene verbo 3ms sin pronombre expreso, y el inglés auditado usa «he» por necesidad idiomática inglesa, no porque el hebreo lo exija.'
  spanish_quality_summary: 'El texto es claro y digno, pero «así vendrá él» resulta menos natural que «así vendrá» en español bíblico moderno. También conviene bajar la mayúscula en «ejércitos» dentro del nombre divino: «Yahvé de los ejércitos» es más conforme al uso ortográfico normal del español, sin perder solemnidad. Lo demás es legible y bien puntuado.'
  glossary_alignment: Alinea correctamente «Yahvé» para יהוה y traduce צְבָאוֹת con «ejércitos», preservando la imaginería militar. «Carmelo» y «Tabor» son apropiados. No hay conflicto teológico sustancial; el único ajuste recomendado es estilístico-ortográfico («ejércitos») y la eliminación del pronombre añadido «él».
  issues:
  - severity: medium
    issue: Pronombre explícito «él» añadido en «así vendrá él»
    rationale: El hebreo יָבֹוא tiene sujeto implícito; en español no hace falta explicitarlo. «Él» añade énfasis no presente en el original y suena algo forzado. La nota ya explica adecuadamente el sujeto implícito.
  - severity: low
    issue: Mayúscula interna en «Yahvé de los Ejércitos»
    rationale: En español, los nombres/títulos divinos con complemento común suelen escribirse con minúscula en el sustantivo común («de los ejércitos»). Mantiene mejor la convención ortográfica sin afectar el sentido.
  revised_spanish_text: Vivo yo[a] —declara el Rey, cuyo nombre es Yahvé de los ejércitos—, ciertamente, como Tabor entre los montes y como Carmelo junto al mar[b], así vendrá.
  revised_footnotes:
  - marker: a
    text: 'O: «Tan cierto como que vivo».'
    reason: alternative_reading
  - marker: b
    text: El sujeto implícito de «vendrá» no aparece expresado en hebreo; el contexto apunta al conquistador anunciado en los versículos circundantes.
    reason: cross_reference
  revision_rationale: Se quitó «él» porque el sujeto está implícito en el hebreo y el español no necesita explicitarlo; así se evita un énfasis añadido y mejora la naturalidad. Se ajustó «Ejércitos» a «ejércitos» por ortografía española estándar. Se añadió una coma tras «ciertamente» para clarificar la estructura comparativa.
