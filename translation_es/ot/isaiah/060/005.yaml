translation:
  language: es
  text: Entonces verás y resplandecerás[a], y tu corazón temblará y se ensanchará, porque la abundancia del mar se volverá hacia ti[b]; las riquezas de las naciones vendrán a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘serás radiante’. El verbo hebreo puede llevar la idea de volverse brillante o radiante en respuesta a lo que se ve.
    reason: lexical_alternative
  - marker: b
    text: O ‘la riqueza del mar’. La frase puede referirse específicamente a riquezas marítimas llevadas a Sion.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּרְאִי
  english_pob_choice: you will see
  chosen_spanish: verás
  alternatives_spanish:
  - mirarás
  - contemplarás
  lexicon: HALOT
  rationale: Futuro 2fs de ראה en dirección a Sion/Jerusalén; ‘verás’ es la forma más natural y fiel en español para una percepción visual futura.
- source_word: וְנָהַרְתְּ
  english_pob_choice: be radiant
  chosen_spanish: resplandecerás
  alternatives_spanish:
  - serás radiante
  - brillarás
  lexicon: HALOT
  rationale: La raíz puede expresar volverse brillante o radiante; ‘resplandecerás’ conserva la imagen luminosa sin forzar una paráfrasis emocional ajena al hebreo.
- source_word: וּפָחַד
  english_pob_choice: will tremble
  chosen_spanish: temblará
  alternatives_spanish:
  - sentirá temor
  - se estremecerá
  lexicon: HALOT
  rationale: La secuencia de reacción incluye una respuesta física-emocional. ‘Temblará’ mantiene el matiz de estremecimiento sin reducirlo a miedo puro.
- source_word: וְרָחַב לְבָבֵךְ
  english_pob_choice: your heart will swell
  chosen_spanish: tu corazón ... se ensanchará
  alternatives_spanish:
  - tu corazón se dilatará
  - tu corazón se agrandará
  - tu corazón se ensanchará de gozo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente de amplitud del corazón. ‘Se ensanchará’ preserva la metáfora y en español comunica expansión interior con naturalidad.
- source_word: יֵהָפֵךְ עָלַיִךְ
  english_pob_choice: will be turned to you
  chosen_spanish: será vuelta hacia ti
  alternatives_spanish:
  - será dirigida hacia ti
  - será transferida hacia ti
  - vendrá hacia ti
  lexicon: HALOT
  rationale: El niphal de הפך sugiere giro o transferencia hacia Sion. ‘Será vuelta hacia ti’ conserva la pasividad y la dirección del movimiento.
- source_word: הֲמוֹן יָם
  english_pob_choice: the abundance of the sea
  chosen_spanish: la abundancia del mar
  alternatives_spanish:
  - la multitud del mar
  - las riquezas del mar
  lexicon: HALOT
  rationale: ‘הֲמוֹן’ admite abundancia o multitud; ‘abundancia del mar’ mantiene la amplitud semántica y sigue de cerca la elección auditada en inglés.
- source_word: חֵיל גּוֹיִם
  english_pob_choice: the wealth of the nations
  chosen_spanish: las riquezas de las naciones
  alternatives_spanish:
  - la riqueza de las naciones
  - el caudal de las naciones
  - la fortaleza de las naciones
  lexicon: HALOT
  rationale: חֵיל puede abarcar riquezas, recursos o fuerza; aquí el paralelismo con bienes que llegan a Sion favorece ‘riquezas’.
- source_word: יָבֹאוּ לָךְ
  english_pob_choice: will come to you
  chosen_spanish: vendrán a ti
  alternatives_spanish:
  - llegarán a ti
  - vendrán hacia ti
  lexicon: HALOT
  rationale: Verbo simple de movimiento con dativo; ‘vendrán a ti’ es directo y expresa la venida de los recursos de las naciones hacia Sion.
theological_decisions:
- issue: Tensión emocional de la respuesta de Sion
  english_pob_reading: A mixed response of overwhelmed joy and awe
  chosen_spanish_reading: Una respuesta mixta de asombro gozoso y temblor reverente
  alternative_spanish_readings:
  - solo temor
  - solo alegría
  - gozo sin temblor
  rationale: La secuencia ver/resplandecer/temblar/ensancharse no permite reducir la respuesta a puro miedo o pura alegría. El español conserva esa tensión entre gozo y sobrecogimiento.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió la última revisión del inglés POB, que prefirió ‘be radiant’ sobre ‘shine with joy’ y ‘swell’ sobre una expansión más explicativa. En español se reflejó esa precisión con ‘resplandecerás’ y ‘se ensanchará’, manteniendo el valor metafórico sin añadir interpretación excesiva.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como término estándar del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó ‘Cristo’/‘Mesías’ porque no aparece léxicamente en el texto.
  - ‘Mar’ traduce y conserva el sustantivo hebreo, sin aclararlo como ‘marítimo’ para no restringir de más el alcance de הֲמוֹן יָם.
  - ‘Riquezas’ funciona mejor que ‘fortaleza’ aquí por el paralelismo con bienes que llegan a Sion.
