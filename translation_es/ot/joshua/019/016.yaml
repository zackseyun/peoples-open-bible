translation:
  language: es
  text: 'Esta[a] fue la herencia de los hijos de Zebulón, según sus clanes: estas ciudades y sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Esta es la herencia de los hijos de Zebulón». El hebreo usa un demostrativo con una cláusula sin verbo, que en español también puede verterse en presente o en pasado dentro de esta fórmula de resumen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Esta es
  lexicon: HALOT
  rationale: El hebreo usa un demostrativo femenino en una cláusula nominal sin verbo; en español puede expresarse naturalmente con pasado narrativo, como en la POB inglesa, o con presente. Aquí se conserva el valor demostrativo y la formulación de resumen territorial con pasado.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la posesión
  - el lote
  lexicon: HALOT
  rationale: En listas de repartición territorial, נַחֲלָה designa una porción heredada. 'Herencia' mantiene mejor el sentido legal y de asignación tribal que 'posesión'.
- source_word: בְּנֵי זְבוּלֻן
  english_pob_choice: the sons of Zebulun
  chosen_spanish: los hijos de Zebulón
  alternatives_spanish:
  - los descendientes de Zebulón
  - el pueblo de Zebulón
  lexicon: HALOT
  rationale: Se conserva la expresión literal 'hijos de' porque el hebreo la usa de manera corporativa para la tribu, sin neutralizarla.
- source_word: לְמִשְׁפְּחוֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: La preposición con מִשְׁפָּחוֹת marca clasificación distributiva en fórmulas de reparto; 'según sus clanes' es la equivalencia española más clara y formal.
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - estas urbes
  - estas villas
  lexicon: HALOT
  rationale: עָרִים en estos listados territoriales se refiere a centros urbanos. 'Ciudades' es el equivalente natural en español bíblico contemporáneo.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: and their villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus poblados
  - y sus asentamientos
  lexicon: HALOT
  rationale: חַצְרֵי en fórmulas de territorio alude a asentamientos dependientes de las ciudades. 'Aldeas' comunica bien esa relación sin sobreinterpretar el tamaño exacto.
translation_notes:
  revision_awareness: Se corrigió el problema anterior anclando la nota al demostrativo inicial. La redacción sigue de cerca el hebreo y la POB inglesa, manteniendo la alternativa de tiempo verbal documentada en la nota.
  spanish_consistency_notes:
  - Se conservó 'hijos de Zebulón' para reflejar la expresión corporativa del hebreo.
  - '''Clanes'' traduce el valor distributivo de לְמִשְׁפְּחוֹתָם en un contexto de reparto tribal.'
  - '''Ciudades'' y ''aldeas'' mantienen la distinción urbana/rural de la lista territorial.'
  - El demostrativo inicial lleva la nota [a], de modo que toda alternativa textual está debidamente anclada.
