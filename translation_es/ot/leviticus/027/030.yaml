  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: la totalidad del diezmo agrícola, tanto de siembra como de fruto arbóreo, pertenece a Yahvé y es santo para él. También conserva correctamente el nombre divino «Yahvé» y la repetición final. Sin embargo, la formulación «santo es para Yahvé» no refleja tan bien la fórmula fuente קֹדֶשׁ לַיהוָה como «es santo para Yahvé» o «es santo a Yahvé»; además, la nota al pie no ofrece una alternativa real, sino prácticamente la misma redacción.'
  spanish_quality_summary: El texto es comprensible y digno, pero «santo es para Yahvé» suena algo invertido y menos natural en español moderno culto. «Todo diezmo» es aceptable, aunque «Todo el diezmo» podría sonar más idiomático; con todo, para preservar el distributivo de כָּל sobre un nombre singular de masa/categoría, «Todo diezmo» puede mantenerse. La nota al pie necesita corregirse porque no aporta una variante significativa y repite la misma estructura poco natural.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé» correctamente; מַעְשַׂר → «diezmo» correctamente; קֹדֶשׁ → «santo» correctamente. No hay conflicto doctrinal. El principal ajuste es estilístico-lexical en la cláusula final para que la fórmula cultual suene natural sin perder literalidad.'
  issues:
