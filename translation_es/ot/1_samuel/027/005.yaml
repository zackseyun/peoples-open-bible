review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: petición deferente de David, solicitud indirecta («que me den»), contraste entre una población rural y la ciudad real, y la pregunta retórica final. Sin embargo, se aparta del rastro auditado del POB en un punto importante: עַבְדְּךָ aquí fue documentado en inglés como ‘your servant’, no ‘your slave’, porque funciona como auto-referencia cortesana y no enfatiza condición servil. También conviene ajustar el orden final a un español más natural: «viva contigo en la ciudad real».'
  spanish_quality_summary: El español es generalmente claro y digno. «he hallado favor ante tus ojos» y «que me den un lugar» funcionan bien. No obstante, «ciudades de la campiña» suena algo rígido; «poblaciones del campo» sería más natural, pero no es necesario para una reparación mínima. El mayor problema de legibilidad/registro es «tu esclavo», que en este contexto cortesano suena demasiado duro y menos fiel al sentido contextual. Además, la nota [a] no recoge la literalidad relevante del inglés auditado, que incluía «ahora» por נָא.
  glossary_alignment: 'No hay términos divinos en juego. El punto de glosario relevante es עבד: aunque el proyecto suele preferir «esclavo» cuando el inglés POB eligió ‘slave’, aquí el propio POB documentó una excepción contextual y escogió ‘servant’. Por tanto, en español debe ir «tu siervo» o «tu servidor»; «tu siervo» encaja mejor con el registro bíblico digno y la razón documentada.'
  issues:
  - severity: high
    issue: «tu esclavo» contradice la decisión léxica auditada para עַבְדְּךָ
    rationale: El English POB justificó explícitamente ‘your servant’ por tratarse de una auto-referencia deferente en habla cortesana, no de énfasis en esclavitud. La versión española debe seguir esa misma rationale contextual.
  - severity: medium
    issue: La nota [a] omite el matiz literal ligado a נָא/«ahora»
    rationale: El inglés auditado preserva «If I have now found favor in your eyes». La nota española solo menciona «si he hallado favor en tus ojos», sin reflejar la literalidad relevante de «ahora».
  - severity: low
    issue: Orden final algo menos natural en español
    rationale: «viva contigo en la ciudad real» fluye mejor que «viva en la ciudad real contigo», sin alterar el sentido.
