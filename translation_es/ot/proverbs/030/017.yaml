    reason: lexical_alternative
  - marker: c
    text: Hebreo נָשֶׁר puede referirse a un águila o a un buitre; aquí se conserva la forma tradicional “águila”.
    reason: lexical_alternative
  revision_rationale: Se ajustó el español para reflejar mejor la imagen del hebreo (sacar el ojo, no solo arrancar algo), mejorar la naturalidad idiomática ('las crías del águila') y mantener las alternativas léxicas de las notas de forma clara y fiel al audit trail.
