translation:
  language: es
  text: Y ellos[a], al oír que estaba vivo y que había sido visto por ella[b], no creyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «está vivo» o «vive». El griego usa un verbo en presente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fue visto por ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖνοι
  english_pob_choice: And they
  chosen_spanish: Y ellos
  alternatives_spanish:
  - Y esos
  - Y ellos también
  lexicon: BDAG
  rationale: κἀκεῖνοι une καί + ἐκεῖνοι y enlaza con el grupo mencionado antes. En español, «Y ellos» conserva la continuidad narrativa con naturalidad sin introducir una marcación demostrativa innecesaria.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyeron
  - habiendo oído
  lexicon: BDAG
  rationale: El participio aoristo funciona adverbialmente y expresa tiempo. «Al oír» es una solución breve y natural en español que mantiene la relación temporal del evento sin recargar la sintaxis.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que,
  - que él
  lexicon: BDAG
  rationale: Introduce el contenido del reporte. «Que» es la equivalencia directa y adecuada en español.
- source_word: ζῇ
  english_pob_choice: he was alive
  chosen_spanish: estaba vivo
  alternatives_spanish:
  - vive
  - está vivo
  lexicon: BDAG
  rationale: El presente ζῇ señala vida continua. En español, dentro del discurso referido después de un verbo pasado, «estaba vivo» comunica de forma idiomática el contenido escuchado, sin negar la vigencia de esa vida. Se preserva así la tensión entre el presente griego y la narración pasada.
- source_word: ἐθεάθη
  english_pob_choice: had been seen
  chosen_spanish: había sido visto
  alternatives_spanish:
  - fue visto
  - se le había visto
  lexicon: BDAG
  rationale: El pasivo aoristo de θεάομαι se traduce con pasiva en español. «Había sido visto» sigue bien la secuencia del discurso referido y conserva que el énfasis recae en que fue visto, no en una aparición expresada libremente.
- source_word: ὑπ’ αὐτῆς
  english_pob_choice: by her
  chosen_spanish: por ella
  alternatives_spanish:
  - por la mujer
  - por María
  lexicon: BDAG
  rationale: El pronombre remite a la mujer del contexto inmediato. «Por ella» conserva el referente implícito sin añadir un nombre que el versículo no expresa.
- source_word: ἠπίστησαν
  english_pob_choice: did not believe
  chosen_spanish: no creyeron
  alternatives_spanish:
  - descreyeron
  - rechazaron creer
  lexicon: BDAG
  rationale: ἀπιστέω expresa falta de fe o incredulidad ante el testimonio. «No creyeron» es directo, natural y fiel al valor del verbo sin intensificarlo más allá del texto.
theological_decisions:
- issue: Expresión de vida continua de Jesús en el reporte
  english_pob_reading: he was alive
  chosen_spanish_reading: estaba vivo
  alternative_spanish_readings:
  - vive
  - está vivo
  rationale: El griego usa presente para ζῇ, indicando vida continua. En una narración en pasado, «estaba vivo» es la formulación más idiomática en español para lo oído por los testigos, mientras que «vive» o «está vivo» mantienen más literalmente la forma verbal. Se preserva la tensión sin resolverla artificialmente.
  doctrine_reference: 'Cristología y resurrección: mantener el valor del presente griego sin perder fluidez narrativa.'
- issue: Pasiva de ἐθεάθη y el modo de reportar la visión
  english_pob_reading: had been seen
  chosen_spanish_reading: había sido visto
  alternative_spanish_readings:
  - fue visto
  - se le había visto
  rationale: La forma pasiva del griego no obliga a traducir «se apareció», porque eso añadiría un matiz más interpretativo. «Había sido visto» conserva la pasiva y deja abierta la relación entre el testimonio de la mujer y el hecho de verlo.
  doctrine_reference: Respeto por la forma verbal griega y por la distinción entre ser visto y aparecer.
translation_notes:
  revision_awareness: 'Se siguió de cerca el expediente auditado en inglés: κἀκεῖνοι se mantuvo como enlace narrativo simple; ἀκούσαντες se resolvió con un participio temporal natural en español; ζῇ conserva la tensión del presente griego mediante «estaba vivo», con nota alternativa; ἐθεάθη se tradujo en pasiva para no introducir el matiz de «apareció»; ἠπίστησαν quedó en «no creyeron» por su valor directo de incredulidad.'
  spanish_consistency_notes:
  - Se conserva el pronombre en tercera persona plural «ellos» para el grupo ya referido en el contexto inmediato.
  - «Vivo» se usa para ζῇ en sentido de vida resucitada, no como simple estado biológico.
  - «No creyeron» mantiene la fuerza negativa del verbo sin sobrecargarlo con explicaciones interpretativas.
  - La pasiva española «había sido visto» respeta el énfasis del original y evita sustituirlo por una forma activa no requerida.
