translation:
  language: es
  text: 'Y dijo Moisés a Hobab hijo de Reuel el madianita[a], suegro de Moisés: «Nos estamos poniendo en camino hacia el lugar del que Yahvé dijo: “Se lo daré a ustedes”. Ven con nosotros, y te haremos bien, porque Yahvé ha hablado bien acerca de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo חֹתֵן puede designar más ampliamente a un pariente por matrimonio; por eso algunos entienden aquí 'pariente por matrimonio de Moisés' o 'cuñado de Moisés' en lugar de 'suegro'.
    reason: alternative_reading
lexical_decisions:
- source_word: חֹבָב
  english_pob_choice: Hobab
  chosen_spanish: Hobab
  alternatives_spanish:
  - Hobab
  lexicon: HALOT
  rationale: Nombre propio transliterado sin traducir, conforme al valor identificatorio del hebreo y al criterio POB de conservar los nombres personales.
- source_word: רְעוּאֵל
  english_pob_choice: Reuel
  chosen_spanish: Reuel
  alternatives_spanish:
  - Reuel
  lexicon: HALOT
  rationale: Nombre propio transliterado para mantener la correspondencia directa con el texto fuente y con el audit trail en inglés.
- source_word: הַמִּדְיָנִי
  english_pob_choice: the Midianite
  chosen_spanish: el madianita
  alternatives_spanish:
  - el midianita
  - un madianita
  lexicon: HALOT
  rationale: El gentilicio con artículo funciona naturalmente en español como identificación étnica. Se prefirió la forma tradicional/adjetival 'madianita' para evitar una traducción rígida y mantener inteligibilidad eclesial.
- source_word: חֹתֵן מֹשֶׁה
  english_pob_choice: Moses’ father-in-law
  chosen_spanish: suegro de Moisés
  alternatives_spanish:
  - pariente por matrimonio de Moisés
  - cuñado de Moisés
  lexicon: HALOT
  rationale: En español, 'suegro' conserva la lectura principal más natural del inglés POB, pero en nota se preserva la tensión lexical del hebreo חֹתֵן, que puede abarcar una relación por matrimonio más amplia.
- source_word: נֹסְעִים אֲנַחְנוּ
  english_pob_choice: We are setting out
  chosen_spanish: Nos estamos poniendo en camino
  alternatives_spanish:
  - Vamos de camino
  - Estamos partiendo
  lexicon: HALOT
  rationale: La expresión comunica el participio de movimiento inminente o en curso con naturalidad en español, sin perder el matiz de inicio de viaje.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  lexicon: HALOT
  rationale: Traducción directa y clara del sustantivo con artículo.
- source_word: אֲשֶׁר אָמַר יְהוָה אֹתוֹ אֶתֵּן לָכֶם
  english_pob_choice: of which Yahweh said, ‘I will give it to you’
  chosen_spanish: 'del que Yahvé dijo: “A él se lo daré a ustedes”'
  alternatives_spanish:
  - 'del cual Yahvé dijo: “Se lo daré a ustedes”'
  - 'del que Yahvé dijo: “Se lo daré a ustedes”'
  lexicon: HALOT
  rationale: Se conserva la relación relativa y la promesa divina. 'A él se lo daré a ustedes' refleja con claridad el pronombre singular del objeto ('lo/él') y el plural del destinatario sin neutralizar la referencia al lugar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar POB en español para el Tetragrámaton. 'Yahvé' preserva el nombre propio del pacto en vez de sustituirlo por un título.
- source_word: לְכָה אִתָּנוּ
  english_pob_choice: Come with us
  chosen_spanish: Ven con nosotros
  alternatives_spanish:
  - Venid con nosotros
  - Acompáñanos
  lexicon: HALOT
  rationale: Imperativo de invitación natural en español, manteniendo la orientación directa al interlocutor.
- source_word: וְהֵטַבְנוּ לָךְ
  english_pob_choice: and we will do you good
  chosen_spanish: y te haremos bien
  alternatives_spanish:
  - y te trataremos bien
  - y te haremos el bien
  lexicon: HALOT
  rationale: La frase reproduce el valor benefactivo del verbo sin sobreparafrasear; 'te haremos bien' es breve, natural y suficientemente literal.
- source_word: דִּבֶּר טוֹב עַל יִשְׂרָאֵל
  english_pob_choice: has spoken good concerning Israel
  chosen_spanish: ha hablado bien acerca de Israel
  alternatives_spanish:
  - ha hablado bondad acerca de Israel
  - ha prometido bien a Israel
  lexicon: HALOT
  rationale: Se conserva el verbo 'hablar' y el predicado 'bien' como en el hebreo, evitando convertirlo explícitamente en 'promesa' sin requerimiento textual. 'Acerca de' reproduce adecuadamente עַל en este contexto.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre propio divino en español según la convención POB, evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé en español'
- issue: Alcance de חֹתֵן מֹשֶׁה
  english_pob_reading: Moses’ father-in-law
  chosen_spanish_reading: suegro de Moisés
  alternative_spanish_readings:
  - pariente por matrimonio de Moisés
  - cuñado de Moisés
  rationale: La lectura principal se conserva en el cuerpo del texto para máxima claridad, pero la nota preserva la tensión semántica documentada en el audit trail. Esto evita resolver dogmáticamente una relación familiar discutida por el propio texto.
  doctrine_reference: Principio POB de auditar tensiones léxicas sin borrarlas
translation_notes:
  revision_awareness: 'Coincide con el pass más reciente del audit trail inglés: no hay revisiones aplicadas y el pasaje mantiene alta concordancia con la decisión editorial establecida.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrámaton, en línea con la terminología POB en español.
  - 'Los nombres propios se transliteraron de forma consistente: Hobab y Reuel.'
  - Se eligió una construcción española natural ('nos estamos poniendo en camino') para reflejar el participio de movimiento sin perder literalidad.
  - La nota de pie de página preserva la tensión lexical de חֹתֵן sin desplazar la lectura principal del texto.
  - '''Bien'' y ''ha hablado bien'' conservan el paralelo semántico del hebreo sin convertirlo en una paráfrasis más fuerte.'
