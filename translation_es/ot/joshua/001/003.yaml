review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido distributivo de כָּל מָקוֹם, la imagen concreta de דרך / כַּף רַגְלְכֶם, y la fuerza perfectiva de נְתַתִּיו. También conserva adecuadamente «tal como hablé a Moisés». Sin embargo, la formulación «que pise la planta de vuestro pie» suena poco natural en español porque hace que «la planta» parezca sujeto de «pise»; la alternativa documentada con «donde» resuelve mejor la relación espacial implícita en אֲשֶׁר + בּוֹ.
  spanish_quality_summary: La versión es mayormente fiel, pero «vuestro / os» no se ajusta al objetivo de español neutro latinoamericano y la sintaxis central necesita pulido para legibilidad eclesial amplia. Una redacción como «Todo lugar donde pise la planta de sus pies» mantiene la imagen hebrea y suena natural. «Se lo he dado» expresa con claridad el don ya concedido; el objeto directo explícito «lo» es español idiomático y no distorsiona la omisión inglesa motivada por estilo, no por exigencia hebrea.
  glossary_alignment: 'No hay términos del glosario principal en disputa aquí. La principal desviación es de registro dialectal: debe preferirse «sus / les / se» sobre «vuestro / os» para un español ampliamente latinoamericano. «Moisés» está bien. No hay cuestiones de Yahvé, Mesías, esclavo, etc.'
  issues:
  - severity: medium
    issue: Registro pronominal peninsular («vuestro», «os»)
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. El plural de segunda persona peninsular reduce esa neutralidad; «sus pies» y «les / se» funcionan mejor para una audiencia panhispánica.
  - severity: medium
    issue: Sintaxis poco natural en «que pise la planta de vuestro pie»
    rationale: Aunque intenta condensar אֲשֶׁר + בּוֹ, en español esta secuencia resulta trabada y puede sugerir que la planta es quien pisa. «Donde pise la planta de sus pies» o «sobre el cual pise…» comunica mejor la imagen territorial.
  - severity: low
    issue: Desajuste entre texto principal y mejor alternativa ya reconocida en la nota
    rationale: La nota ofrece «Todo lugar donde pise…», que en realidad es mejor español para el texto principal. Conviene promover esa formulación al cuerpo del versículo y mantener una nota con la alternativa más literal si se desea.
  revised_spanish_text: Todo lugar donde pise la planta de sus pies[a], se lo he dado, tal como hablé a Moisés.
  revised_footnotes:
  - marker: a
    text: 'O: «Todo lugar sobre el cual pise la planta de sus pies».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza el registro peninsular por uno neutral latinoamericano y se mejora la sintaxis central para que la imagen hebrea sea clara y natural en español. «Donde» incorpora de manera idiomática la relación de אֲשֶׁר + בּוֹ; «la planta de sus pies» conserva el plural corporativo; «se lo he dado» mantiene la fuerza del perfecto como don ya concedido.
