  language: en
  yaml_path: translation/ot/ezekiel/021/027.yaml
  text: 'In his right hand was the divination for Jerusalem: to set battering rams[a], to open the mouth with slaughter, to raise the voice with a battle cry, to set battering rams against the gates, to heap up a siege ramp[b], to build a siege wall.'
  footnotes:
