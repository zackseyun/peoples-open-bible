translation:
  language: es
  text: 'Y Jesús dijo: «¿Quién es el que me tocó?». Y, mientras todos lo negaban, Pedro dijo: «Maestro, las multitudes te rodean[a] y te aprietan[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te estrechan por todos lados».
    reason: lexical_alternative
  - marker: b
    text: O «te presionan».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁψάμενός
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - hizo contacto con
  - puso la mano sobre
  lexicon: BDAG
  rationale: El participio medio de ἅπτω en este contexto señala contacto físico real. «Tocó» es la forma natural en español y conserva la fuerza narrativa de la pregunta de Jesús sin sobrecargarla.
- source_word: ἀρνουμένων δὲ πάντων
  english_pob_choice: But while everyone was denying it
  chosen_spanish: mientras todos lo negaban
  alternatives_spanish:
  - cuando todos lo negaban
  - y mientras todos lo negaban
  lexicon: BDAG
  rationale: La idea durativa del participio presente se expresa bien con «mientras», y «lo» recupera naturalmente la negación implícita en el contexto inmediato de la pregunta de Jesús.
- source_word: Ἐπιστάτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Jefe
  - Señor
  lexicon: BDAG
  rationale: Ἐπιστάτα es un vocativo lucano de respeto y autoridad. «Maestro» comunica esa deferencia en español de forma natural, sin importar el título teológico más fuerte de «Señor», que aquí no aparece en el griego.
- source_word: ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las turbas
  - la gente
  lexicon: BDAG
  rationale: El plural griego se conserva mejor con «las multitudes», manteniendo la imagen de muchas personas alrededor de Jesús. «La gente» borra el plural; «turbas» añade una valoración que el texto no exige.
- source_word: συνέχουσίν
  english_pob_choice: are hemming you in
  chosen_spanish: te cercan
  alternatives_spanish:
  - te rodean
  - te aprietan
  lexicon: BDAG
  rationale: συνέχω aquí expresa estar rodeado o comprimido por la multitud. «Te cercan» conserva la imagen de encerrar o rodear; es más preciso que un simple «te rodean» y menos interpretativo que una perífrasis.
- source_word: ἀποθλίβουσιν
  english_pob_choice: pressing against
  chosen_spanish: te aprietan
  alternatives_spanish:
  - te presionan
  - te oprimen
  lexicon: BDAG
  rationale: ἀποθλίβω intensifica la presión física. «Te aprietan» reproduce bien la fuerza del verbo y distingue este segundo matiz del primero; «te oprimen» podría sonar más abstracto en español.
theological_decisions:
- issue: Título de Jesús Ἐπιστάτα
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Jefe
  rationale: El griego usa Ἐπιστάτα, no κύριος. Para no introducir un título cristológico más fuerte que el del texto, se conserva una fórmula respetuosa de autoridad. «Maestro» refleja adecuadamente esa relación de reconocimiento y deferencia.
  doctrine_reference: Translation philosophy §1, §2; restraint in christological titling
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que precisó la pregunta de Jesús como «Who is the one who touched me?». En español se reflejó con «¿Quién es el que me tocó?», manteniendo la construcción natural y la cercanía semántica al griego. También se conservó la distinción entre los dos verbos de presión de la multitud, tal como el audit trail inglés separa «hemming you in» y «pressing against you».
  spanish_consistency_notes:
  - Se mantuvo «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se usó «multitudes» en plural para reflejar ὄχλοι.
  - Se preservó la distinción verbal entre «cercan» y «aprietan» para no fusionar los dos matices griegos.
  - Se eligió «Maestro» como tratamiento respetuoso y no como sustituto doctrinal de «Señor».
