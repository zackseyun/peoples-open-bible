translation:
  language: es
  text: 'Y el filisteo dijo a David: «Ven a mí[a], y daré tu carne a las aves del cielo[b] y a las bestias del campo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Acércate a mí».
    reason: lexical_alternative
  - marker: b
    text: O «a las aves de los cielos».
    reason: lexical_alternative
  - marker: c
    text: O «y a los animales del campo».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el filisteo guerrero
  lexicon: HALOT
  rationale: El artículo y el sustantivo designan al adversario como representante filisteo; en español, «el filisteo» reproduce de forma natural y fiel esa referencia sin añadir «guerrero», que el hebreo no expresa aquí de manera explícita.
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven aquí
  - Acércate
  lexicon: HALOT
  rationale: En el desafío directo, el imperativo funciona como invitación/retó. «Ven» es breve, idiomático y conserva el tono desafiante sin sobreexplicar.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hasta aquí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona marca dirección hacia el hablante; «a mí» conserva la inmediatez del desafío de forma natural en español.
- source_word: וְאֶתְּנָה
  english_pob_choice: and I will give
  chosen_spanish: y daré
  alternatives_spanish:
  - y dejaré que dé
  - y pueda dar
  lexicon: HALOT
  rationale: El valor cohortativo aquí expresa determinación en el discurso directo. «Daré» transmite con naturalidad esa resolución amenazante en español.
- source_word: בְּשָׂרְךָ
  english_pob_choice: your flesh
  chosen_spanish: tu carne
  alternatives_spanish:
  - tu cuerpo
  - tu cadáver
  lexicon: HALOT
  rationale: «Carne» preserva el valor literal de בשר y mantiene la crudeza del insulto/amenaza. «Cuerpo» o «cadáver» suavizan o reinterpretan el término.
- source_word: לְעוֹף הַשָּׁמַיִם
  english_pob_choice: to the birds of the heavens
  chosen_spanish: a las aves del cielo
  alternatives_spanish:
  - a las aves del cielo
  - a las aves de los cielos
  lexicon: HALOT
  rationale: En español, «aves» suena más natural y elevado que «pájaros» en este registro; «del cielo» conserva el paralelo hebreo sin forzar una expresión arcaizante.
- source_word: וּלְבֶהֱמַת הַשָּׂדֶה
  english_pob_choice: and to the beasts of the field
  chosen_spanish: y a las bestias del campo
  alternatives_spanish:
  - y a los animales del campo
  - y a las fieras del campo
  lexicon: HALOT
  rationale: «Bestias» reproduce el matiz de animales salvajes o carroñeros que encaja con la amenaza. «Del campo» preserva la fórmula hebrea y su sabor bíblico.
theological_decisions:
- issue: El alcance de "YHWH / Yahvé" no aparece en este versículo, pero sí la representación directa del habla hostil del filisteo.
  english_pob_reading: No theological issue flagged in the English POB for this verse.
  chosen_spanish_reading: Se conserva el habla ofensiva y la amenaza corporal sin atenuación.
  alternative_spanish_readings:
  - suavizar el insulto con una formulación menos cruda
  - interpretar "carne" como "cuerpo"
  rationale: 'La fidelidad al tono del texto es importante: la escena presenta una amenaza brutal y pública. Atenuar el lenguaje borraría una tensión retórica real del pasaje.'
  doctrine_reference: Principio de integridad textual y de preservación del énfasis narrativo del relato bíblico.
translation_notes:
  revision_awareness: El inglés POB muestra alta concordancia con el texto hebreo y no registra revisiones aplicadas; esta versión española sigue directamente el hebreo y mantiene las mismas alternativas léxicas documentadas por la auditoría inglesa.
  spanish_consistency_notes:
  - Se emplea «filisteo» como sustantivo común y no como etnónimo transliterado.
  - Se mantiene «carne» para בשר por fuerza literal y expresividad.
  - Se usa «aves del cielo» en el texto principal por registro más natural; la nota conserva la alternativa «aves del cielo»/«aves del cielo» documentada en el POB inglés.
  - No se introduce terminología eclesial ajena al contexto narrativo.
