translation:
  language: es
  text: si me alegré porque mi riqueza era abundante, y porque mi mano había ganado mucho[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi mano había adquirido mucho» / «mi mano había conseguido mucho». El hebreo dice literalmente: «mi mano había encontrado mucho», un modismo para obtener algo por el propio esfuerzo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - ya sea que
  - en caso de que
  lexicon: HALOT
  rationale: Introduce la cláusula condicional de la serie de juramento/inocencia de Job. En español, 'si' es la equivalencia natural y mantiene la estructura protática del hebreo.
- source_word: אֶשְׂמַח
  english_pob_choice: I rejoiced
  chosen_spanish: me alegré
  alternatives_spanish:
  - me regocijé
  - estuve contento
  lexicon: HALOT
  rationale: שׂמח expresa alegría o regocijo; 'me alegré' comunica bien la acción interior sin sonar excesivamente elevado o arcaico.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Aquí introduce la causa del regocijo. 'Porque' preserva el valor causal de manera clara y directa.
- source_word: רַב חֵילִי
  english_pob_choice: my wealth was abundant
  chosen_spanish: mi riqueza era abundante
  alternatives_spanish:
  - mis bienes eran muchos
  - mis recursos eran abundantes
  - mi fortuna era grande
  lexicon: HALOT
  rationale: חֵיל puede abarcar riqueza, recursos o bienes; en este contexto sapiencial-material, 'riqueza' es la opción más clara. 'Abundante' conserva רַב como cuantificador, sin imponer una valoración moral adicional.
- source_word: וְכִי
  english_pob_choice: and because
  chosen_spanish: y porque
  alternatives_spanish:
  - y ya que
  - y pues
  lexicon: HALOT
  rationale: La segunda cláusula está coordinada y mantiene el paralelismo causal. 'Y porque' conserva la estructura hebrea y el ritmo del versículo.
- source_word: כַבִּיר
  english_pob_choice: great
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran medida
  - en gran cantidad
  - grandemente
  lexicon: HALOT
  rationale: כַבִּיר expresa magnitud/intensidad. Con el verbo siguiente, 'ganado mucho' resulta idiomático en español y conserva el sentido de gran cantidad obtenida.
- source_word: מָצְאָה יָדִי
  english_pob_choice: my hand had gained much
  chosen_spanish: mi mano había ganado mucho
  alternatives_spanish:
  - mi mano había adquirido mucho
  - mi mano había encontrado mucho
  - mi mano había conseguido mucho
  lexicon: HALOT
  rationale: La imagen literal es 'mi mano encontró'. En español, 'mi mano había ganado mucho' reproduce la idea de obtener por propio esfuerzo y sigue la decisión auditada del inglés de mantener el sentido idiomático sin volverlo mecánico.
theological_decisions:
- issue: 'El versículo: ¿condena la riqueza en sí o la alegría por la riqueza y la autosuficiencia?'
  english_pob_reading: Job niega haberse alegrado porque su riqueza fuera abundante y porque su propia mano hubiera obtenido mucho.
  chosen_spanish_reading: El español mantiene la negación de complacerse en la abundancia material y en el logro atribuido a la propia mano.
  alternative_spanish_readings:
  - si me alegré por tener mucha riqueza
  - si me alegré de mi fortuna
  - si me alegré porque mis bienes eran muchos
  rationale: 'El hebreo enfatiza las razones del gozo: la abundancia de bienes y el éxito atribuido a la propia mano. La traducción evita convertir el versículo en una condena absoluta de la riqueza; preserva, más bien, la tensión moral sobre la autocomplacencia y la autosuficiencia.'
  doctrine_reference: Poética sapiencial; ética de la modestia y dependencia de Dios en Job 31
translation_notes:
  revision_awareness: La redacción sigue el último estado auditado en inglés, que suaviza la segunda cláusula a «had gained much» para mayor naturalidad sin perder el modismo hebreo de «my hand found». Se conservó esa equivalencia en español con «mi mano había ganado mucho».
  spanish_consistency_notes:
  - Se usó «riqueza» para חֵיל en coherencia con el contexto material del versículo.
  - Se mantuvo «mano» como sujeto de la acción para preservar la imagen idiomática del hebreo.
  - La puntuación con raya final refleja que el versículo continúa la secuencia del juramento en el contexto mayor.
