review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y la línea principal del POB en casi todo: «separó», «corderos», la orientación del rebaño, la separación de rebaños para Jacob y la no mezcla con el rebaño de Laban. Sin embargo, dos elecciones españolas no preservan bien el sentido ni la legibilidad: «las caras del rebaño» suena poco idiomático en español para animales y puede distraer del sentido de orientación; «entre el rebaño de Laban» es menos natural que «entre los animales del rebaño de Labán» o una reformulación equivalente. Además, falta en español la nota equivalente a la nota inglesa c sobre la alternativa «entre el rebaño de Labán / en el rebaño de Labán», y conviene mantener esa trazabilidad.'
  spanish_quality_summary: El texto es generalmente claro, pero necesita un pulido menor para sonar natural en español bíblico contemporáneo. «Los listados» y «todos los oscuros» son comprensibles, aunque «rayados» y «de color oscuro» serían más transparentes; no obstante, no es imprescindible cambiarlos si se preserva la fidelidad. El problema principal de calidad es «las caras del rebaño», que en español suena forzado; «el rebaño de cara a» mantiene la imagen funcional sin una calca torpe. También conviene usar «Labán» con tilde.
  glossary_alignment: No hay términos teológicos sensibles aquí. El borrador sigue adecuadamente la decisión de הַכְּשָׂבִים como «corderos». Se mantiene el valor de עָקֹד con «listados» y de חוּם con «oscuros», ambos aceptables. La principal mejora léxica es ajustar פְּנֵי הַצֹּאן a un español más idiomático sin perder la orientación concreta, y añadir la nota de alternativa para la frase relativa al rebaño de Labán, en línea con el rastro de auditoría del POB.
  issues:
  - severity: medium
    issue: «las caras del rebaño» es una calca poco natural
    rationale: Aunque פְּנֵי הַצֹּאן es literalmente «las caras/el rostro del rebaño», en español aplicado a animales esa formulación suena extraña y puede oscurecer el sentido. Una reformulación como «puso el rebaño de cara a» conserva la orientación concreta de la escena y lee con naturalidad.
  - severity: low
    issue: Falta la nota equivalente a la nota inglesa c
    rationale: El POB inglés conserva una alternativa previa para la frase de בְּצֹאן לָבָן. La revisión española debería reflejar esa alternativa con una nota, especialmente porque la preposición puede generar preguntas de traducción.
  - severity: low
    issue: «Laban» debe llevar tilde en español
    rationale: La forma española habitual y correcta es «Labán».
  revised_spanish_text: Y Jacob separó los corderos[a], y puso el rebaño de cara a los listados y a todos los oscuros[b] entre el rebaño de Labán[c]. Luego apartó rebaños para sí, y no los puso con el rebaño de Labán.
  revised_footnotes:
  - marker: a
    text: O «las ovejas jóvenes»; el hebreo designa animales ovinos jóvenes, no necesariamente ovejas adultas.
    reason: lexical_alternative
  - marker: b
    text: O «todos los marrones»; חוּם puede referirse a color oscuro o marrón.
    reason: lexical_alternative
  - marker: c
    text: O «en el rebaño de Labán».
    reason: previous_rendering
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin apartarse del hebreo ni del rastro de auditoría del POB: «puso el rebaño de cara a» comunica mejor la orientación de פְּנֵי הַצֹּאן que la calca «las caras del rebaño»; se normalizó «Labán» con tilde; y se añadió una nota c para conservar la alternativa documentada en inglés sobre la frase referente al rebaño de Labán.'
