translation:
  language: es
  text: ¡Cuán grande es la misericordia de Yahvé[a], y su expiación para los que se vuelven a él!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «propiciación»; más técnicamente, «expiación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς μεγάλη
  english_pob_choice: How great
  chosen_spanish: ¡Cuán grande
  alternatives_spanish:
  - ¡Qué grande
  - ¡Tan grande
  lexicon: LSJ
  rationale: El griego exclamativo ὡς con adjetivo expresa admiración, no comparación. En español, «¡Cuán grande» conserva bien el tono exclamativo solemne sin volverlo arcaizante en exceso.
- source_word: ἐλεημοσύνη
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - bondad misericordiosa
  lexicon: LSJ
  rationale: En este contexto, unido a κυρίου y en paralelo con ἐξιλασμός, la idea es la compasión misericordiosa de Dios, no la limosna. «Misericordia» es la opción natural y teológicamente adecuada en español.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: LSJ
  rationale: El proyecto POB usa «Yahvé» para el nombre divino. Aquí κύριος funciona como designación divina, por lo que se mantiene ese criterio en español en vez de una sustitución por «el Señor».
- source_word: ἐξιλασμός
  english_pob_choice: atonement
  chosen_spanish: expiación
  alternatives_spanish:
  - atonación
  - propiciación
  lexicon: LSJ
  rationale: «ἐξιλασμός» denota el acto o efecto de quitar culpa y restablecer relación. En español, «expiación» conserva mejor ese campo semántico que una paráfrasis más interpretativa. «Propiciación» se deja como alternativa más técnica.
- source_word: τοῖς ἐπιστρέφουσιν
  english_pob_choice: for those who turn to
  chosen_spanish: para los que se vuelven
  alternatives_spanish:
  - para los que regresan
  - para los que se convierten
  lexicon: LSJ
  rationale: En contextos religiosos, ἐπιστρέφω implica volverse o regresar a Dios con matiz de arrepentimiento. «Se vuelven» mantiene la literalidad funcional y deja implícita la orientación religiosa por el complemento siguiente.
- source_word: ἐπʼ αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - sobre él
  lexicon: LSJ
  rationale: La preposición con ἐπιστρέφω forma el sentido idiomático «volver(se) a alguien». En español, «a él» es la forma más natural y precisa.
theological_decisions:
- issue: Renderización de ἐξιλασμός
  english_pob_reading: atonement
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - propiciación
  - atonación
  rationale: La lectura principal POB busca un término accesible sin estrechar el sentido doctrinal. «Expiación» comunica la remoción de culpa y la reconciliación sin imponer un modelo sacrificial más específico que el que el versículo exige.
  doctrine_reference: 'DOCTRINE.md: lenguaje accesible; evitar tecnicismos innecesarios'
- issue: Uso del nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el griego usa κύριος, el contexto remite al nombre divino; siguiendo la convención del proyecto, se preserva «Yahvé» para evitar el ocultamiento del nombre y mantener trazabilidad con el original.
  doctrine_reference: 'Project terminology default: יהוה / YHWH -> Yahvé'
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del POB en inglés que clarificó la segunda sintaxis con un posesivo («his atonement») y prefirió «turn to him» como giro más natural. En español, esa claridad se logra de forma directa con «su expiación» y «se vuelven a él», sin necesidad de calco posesivo explícito adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para el nombre divino.
  - Se prefiere «misericordia» frente a «compasión» por su naturalidad en registro bíblico y por el paralelismo con «expiación».
  - «Se vuelven a él» conserva el movimiento relacional y el matiz de retorno arrepentido sin sobretraducirlo como «se convierten» en el texto principal.
  - La nota textual/lexical sobre «propiciación/expiación» se preserva porque el griego admite ambas posibilidades y la POB inglesa también dejó abierta esa alternativa.
