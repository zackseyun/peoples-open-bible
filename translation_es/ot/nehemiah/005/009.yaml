translation:
  language: es
  text: 'Entonces dije[a]: «Lo que ustedes hacen no es bueno. ¿No deberían andar en el temor de nuestro Dios a causa del reproche de las naciones, nuestros enemigos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y dije». La forma hebrea también puede traducirse simplemente como una continuación narrativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: So I said
  chosen_spanish: Así dije
  alternatives_spanish:
  - Y dije
  - Entonces dije
  lexicon: WLC/HALOT
  rationale: La waw consecutiva avanza la narración; «Así dije» conserva el valor secuencial sin sonar pesado en español. «Y dije» es más literal, pero aquí resulta menos natural.
- source_word: לֹא טוֹב
  english_pob_choice: is not good
  chosen_spanish: no es bueno
  alternatives_spanish:
  - no está bien
  - no es correcto
  lexicon: HALOT
  rationale: La evaluación moral directa del hebreo se expresa de manera transparente con «no es bueno». Mantiene el peso ético de la frase sin amplificación interpretativa.
- source_word: הַדָּבָר אֲשֶׁר אַתֶּם עֹשִׂים
  english_pob_choice: What you are doing
  chosen_spanish: lo que ustedes hacen
  alternatives_spanish:
  - la cosa que ustedes hacen
  - este asunto que ustedes hacen
  lexicon: HALOT
  rationale: El nominal hebreo se vierte de forma natural como una cláusula sustantivada en español. «Lo que ustedes hacen» conserva la referencia directa a la conducta presente.
- source_word: הֲלוֹא
  english_pob_choice: Should you not
  chosen_spanish: ¿No deben...?
  alternatives_spanish:
  - ¿No deberían...?
  - ¿No tendrían que...?
  lexicon: HALOT
  rationale: La interrogación retórica tiene fuerza exhortativa. «¿No deben...?» comunica el llamado moral sin perder el matiz de amonestación.
- source_word: בְּיִרְאַת אֱלֹהֵינוּ
  english_pob_choice: in the fear of our God
  chosen_spanish: en el temor de nuestro Dios
  alternatives_spanish:
  - con reverencia por nuestro Dios
  - en reverente temor de nuestro Dios
  lexicon: HALOT
  rationale: «Temor» conserva el idioma bíblico y su fuerza pactual. No se sustituye por «reverencia» porque esa opción debilita el vínculo lexical con יִרְאָה.
- source_word: תֵּלֵכוּ
  english_pob_choice: walk
  chosen_spanish: anden
  alternatives_spanish:
  - caminen
  - vivan
  - se conduzcan
  lexicon: HALOT
  rationale: El hebreo usa la metáfora ética de «caminar». En español, «anden» permite mantener la imagen de conducta habitual; «caminen» es también posible, pero menos idiomático en este contexto exhortativo.
- source_word: מֵחֶרְפַּת
  english_pob_choice: because of the reproach of
  chosen_spanish: a causa del reproche de
  alternatives_spanish:
  - por el reproche de
  - para evitar el reproche de
  - en vista del reproche de
  lexicon: HALOT
  rationale: La preposición מִן admite aquí un matiz causal o motivacional. «A causa del reproche de» conserva la ambigüedad productiva del hebreo sin decidir de manera excesiva entre causa y evitación.
- source_word: הַגּוֹיִם אֹיְבֵינוּ
  english_pob_choice: the nations, our enemies
  chosen_spanish: las naciones, nuestros enemigos
  alternatives_spanish:
  - los pueblos, nuestros enemigos
  - las naciones que son nuestros enemigos
  lexicon: HALOT
  rationale: «Naciones» respeta גּוֹיִם en un contexto de pueblos extranjeros hostiles. El aposición «nuestros enemigos» se conserva con coma, como en el inglés POB, para mantener la identificación directa.
theological_decisions:
- issue: Metáfora ética de הלך en contexto de exhortación pactual
  english_pob_reading: Retain 'walk' rather than flattening to 'live'
  chosen_spanish_reading: Mantener «anden» para conservar la metáfora de conducta
  alternative_spanish_readings:
  - vivan
  - se conduzcan
  rationale: El pasaje exhorta a una conducta fiel delante de Dios y de las naciones. Preservar la metáfora del caminar conserva la textura bíblica y el tono admonitorio, sin oscurecer el sentido en español.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave) y §6 (español moderno legible)
- issue: Relación entre el temor de Dios y el reproche de las naciones
  english_pob_reading: because of the reproach of the nations, our enemies
  chosen_spanish_reading: a causa del reproche de las naciones, nuestros enemigos
  alternative_spanish_readings:
  - para evitar el reproche de las naciones, nuestros enemigos
  - por el reproche de las naciones, nuestros enemigos
  rationale: La preposición hebrea puede expresar motivo o evitación. Se conserva la lectura abierta que el inglés POB documenta, sin fijar demasiado el matiz. Esto respeta la tensión semántica del original.
  doctrine_reference: Principio POB de no borrar ambigüedades léxicas documentadas
translation_notes:
  revision_awareness: El borrador inglés revisado eliminó una coma tras «God» para dar mejor fluidez. En español se sigue la misma fluidez uniendo naturalmente «en el temor de nuestro Dios, a causa de...», sin coma innecesaria entre el verbo exhortativo y su complemento.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «temor» para יִרְאָה, según los valores pactuales habituales.
  - Se conserva «naciones» para גּוֹיִם, evitando «gentiles», que sería menos natural en este contexto histórico.
  - La aposición «nuestros enemigos» se mantiene pegada a «las naciones» para reflejar el hebreo y el audit trail inglés.
  - El marcador de nota [a] aparece en el texto principal en el punto donde la preposición מִן admite la alternativa documental.
