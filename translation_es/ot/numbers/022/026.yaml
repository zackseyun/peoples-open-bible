translation:
  language: es
  text: Entonces el ángel de Yahvé siguió adelante[a] y se paró en un lugar estrecho, donde no había manera de desviarse ni a la derecha ni a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘continuó’ o ‘pasó adelante’. El hebreo tiene un giro idiomático que literalmente sugiere añadir o seguir avanzando.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף
  english_pob_choice: went farther
  chosen_spanish: siguió adelante
  alternatives_spanish:
  - continuó
  - fue más adelante
  lexicon: HALOT
  rationale: El hebreo con עֲבוֹר expresa la idea idiomática de continuar avanzando. En español, 'siguió adelante' conserva ese movimiento progresivo sin sonar mecánico.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel del SEÑOR
  lexicon: HALOT
  rationale: '''מַלְאַךְ'' se traduce naturalmente como ''ángel'' en este contexto narrativo sobrenatural. ''Yahvé'' sigue el estándar del proyecto para el nombre divino.'
- source_word: עֲבוֹר
  english_pob_choice: went farther
  chosen_spanish: siguió adelante
  alternatives_spanish:
  - pasó adelante
  - continuó
  lexicon: HALOT
  rationale: El infinitivo de עבר tras וַיּוֹסֶף funciona como continuación del avance. 'Siguió adelante' recoge ese sentido idiomático en español natural.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se detuvo
  alternatives_spanish:
  - estuvo
  - se puso de pie
  lexicon: HALOT
  rationale: En el contexto del movimiento del ángel, 'se detuvo' expresa con más claridad la transición a una nueva posición que un simple 'estuvo'.
- source_word: בְּמָקוֹם צָר
  english_pob_choice: in a narrow place
  chosen_spanish: en un lugar estrecho
  alternatives_spanish:
  - en un sitio estrecho
  - en un lugar angosto
  lexicon: HALOT
  rationale: '''Lugar estrecho'' preserva la imagen espacial del hebreo sin convertirla en un modismo ajeno al texto.'
- source_word: אֲשֶׁר אֵין דֶּרֶךְ
  english_pob_choice: where there was no way
  chosen_spanish: donde no había camino
  alternatives_spanish:
  - donde no había senda
  - donde no había ruta
  lexicon: HALOT
  rationale: En español, 'camino' comunica bien la ausencia de paso o ruta disponible y mantiene la fuerza de דֶּרֶךְ en este contexto.
- source_word: לִנְטוֹת
  english_pob_choice: to turn
  chosen_spanish: para girar
  alternatives_spanish:
  - para desviarse
  - para volverse
  lexicon: HALOT
  rationale: Dado que la cláusula concreta la dirección derecha/izquierda, 'girar' es la forma más clara y natural de expresar לִנְטוֹת en español.
- source_word: יָמִין וּשְׂמֹאול
  english_pob_choice: to the right or to the left
  chosen_spanish: ni a la derecha ni a la izquierda
  alternatives_spanish:
  - a la derecha o a la izquierda
  - ni hacia la derecha ni hacia la izquierda
  lexicon: HALOT
  rationale: La duplicación negativa en español refleja la imposibilidad de apartarse en cualquiera de las dos direcciones, como en el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma 'Yahvé' sigue el estándar del proyecto en español para mantener visible el nombre del pacto, en lugar de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se revisó el pasaje con el texto hebreo masorético y el contexto auditado en inglés. La traducción inglesa resuelve el giro וַיּוֹסֶף עֲבוֹר como movimiento continuado ('went farther'); la versión española mantiene esa lectura idiomática con una formulación natural y conserva la restricción direccional final sin añadir contenido.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera consistente para יְהוָה.
  - '''Ángel'' se conserva como traducción natural de מַלְאַךְ en este relato narrativo.'
  - '''Lugar estrecho'' y ''camino'' preservan la imagen espacial del hebreo sin sobreexplicar.'
  - La negación doble 'ni... ni...' refleja adecuadamente la imposibilidad de girar en cualquiera de las dos direcciones.
