translation:
  language: es
  text: Los que vienen después quedan aterrados por su día[a][b], y los que fueron antes son presa de horror[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su día», probablemente el día de su calamidad o juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse como «los posteriores ... los anteriores»; algunos intérpretes leen el par en sentido geográfico: «los del occidente ... los del oriente».'
    reason: alternative_reading
  - marker: c
    text: Literalmente, «agarrar estremecimiento»; es un modismo para quedar dominado por el horror.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: at
  chosen_spanish: por
  alternatives_spanish:
  - ante
  - a causa de
  - al ver
  lexicon: HALOT
  rationale: En español, «por su día» expresa con naturalidad la ocasión o motivo que provoca la reacción. «Ante» podría sugerir solamente ubicación; «a causa de» explicita demasiado; «al ver» introduce una interpretación no marcada por el hebreo.
- source_word: יוֹמוֹ
  english_pob_choice: his day
  chosen_spanish: su día
  alternatives_spanish:
  - su destino
  - su calamidad
  - su tiempo
  lexicon: HALOT
  rationale: Se conserva la imagen concreta «su día», como en el texto hebreo y en la POB inglesa. El contexto de Job hace que se entienda como el día de calamidad o juicio sin necesidad de sustituirlo en el texto principal.
- source_word: נָשַׁמּוּ
  english_pob_choice: are appalled
  chosen_spanish: quedan aterrados
  alternatives_spanish:
  - quedan pasmados
  - se quedan consternados
  - quedan horrorizados
  lexicon: HALOT
  rationale: El verbo expresa quedar sobrecogido o atónito ante algo devastador. «Quedan aterrados» mantiene la fuerza emocional; «pasmados» sería más débil, y «horrorizados» se acerca, pero puede sonar más interpretativo que el hebreo en este contexto.
- source_word: אַחֲרֹנִים
  english_pob_choice: those who come after
  chosen_spanish: los que vienen después
  alternatives_spanish:
  - los posteriores
  - las generaciones posteriores
  - los que siguen
  lexicon: HALOT
  rationale: «Los que vienen después» reproduce de modo natural el contraste temporal de «los posteriores». Evita cerrar la expresión en una generación específica y conserva la amplitud del hebreo.
- source_word: וְקַדְמֹנִים
  english_pob_choice: those who went before
  chosen_spanish: los que fueron antes
  alternatives_spanish:
  - los anteriores
  - los de antes
  - los que precedieron
  lexicon: HALOT
  rationale: La frase mantiene el paralelismo temporal con «los que vienen después». «Los que fueron antes» es claro y no fuerza la imagen hacia un matiz geográfico que el contexto no exige.
- source_word: אָחֲזוּ שָׂעַר
  english_pob_choice: are seized with horror
  chosen_spanish: son presa de horror
  alternatives_spanish:
  - son arrebatados por horror
  - quedan dominados por el horror
  - son asaltados por horror
  lexicon: HALOT
  rationale: El hebreo dice literalmente «agarran/son agarrados por shuddering», un giro idiomático para quedar dominado por una emoción intensa. «Son presa de horror» comunica ese ser atrapados por el temor sin perder naturalidad en español.
theological_decisions:
- issue: Sentido de «su día» como día de calamidad o juicio
  english_pob_reading: His day is kept literal in the main text, with a note that it likely means the day of calamity or judgment.
  chosen_spanish_reading: Se mantiene «su día» en el texto principal, con nota que aclara que probablemente alude al día de su calamidad o juicio.
  alternative_spanish_readings:
  - su calamidad
  - su juicio
  - su día fatal
  rationale: 'La POB inglesa conserva la literalidad para no borrar la imagen hebrea, pero señala el sentido contextual. El español hace lo mismo: mantiene la expresión concreta y documenta la interpretación probable sin reemplazarla en el cuerpo del versículo.'
  doctrine_reference: Job 18:20; cf. uso idiomático contextual del «día» en literatura sapiencial
- issue: Posible lectura temporal frente a lectura geográfica de אַחֲרֹנִים / קַדְמֹנִים
  english_pob_reading: Those who come after ... those who went before; some understand the pair geographically as west/east.
  chosen_spanish_reading: 'Se adopta la lectura temporal en el texto principal: «los que vienen después ... los que fueron antes».'
  alternative_spanish_readings:
  - los occidentales ... los orientales
  - los de occidente ... los de oriente
  - los de atrás ... los de delante
  rationale: El paralelismo inmediato favorece el contraste temporal. La lectura geográfica queda preservada en la nota de alternativa, sin imponerla como principal.
  doctrine_reference: Job 18:20; paralelismo poético hebreo
- issue: Valor idiomático de «agarrar shuddering»
  english_pob_reading: Literally 'seize shuddering,' an idiom for being gripped with horror.
  chosen_spanish_reading: «Son presa de horror» comunica el efecto idiomático de quedar dominados por el espanto.
  alternative_spanish_readings:
  - quedan temblando
  - quedan sobrecogidos
  - son presa de estremecimiento
  rationale: La POB inglesa resuelve el idiomático con una traducción natural y una nota literal. En español, «presa de horror» transmite la idea de ser capturados por el miedo sin recurrir a un calco áspero; la nota conserva la imagen de «temblor/estremecimiento».
  doctrine_reference: HALOT sobre שָׂעַר; Job 18:20
translation_notes:
  revision_awareness: La última revisión del pasaje no introdujo cambios; el cotejo posterior indicó alta concordancia y solo asuntos menores. Esta versión española conserva la lectura temporal principal, la literalidad de «su día» y la fuerza idiomática de «agarrar estremecimiento» mediante una nota explicativa.
  spanish_consistency_notes:
  - Se mantuvo «su día» en el cuerpo del texto para respetar la imagen hebrea y la decisión inglesa documentada.
  - Se prefirió «los que vienen después / los que fueron antes» por claridad temporal y paralelismo poético.
  - «Son presa de horror» funciona como equivalente idiomático natural; la nota preserva la literalidad de la expresión hebrea.
  - No se introdujo «Yahvé» ni terminología de nombre divino, porque este versículo no contiene un referente explícito al nombre divino.
