    text: O «abre un cauce de torrente/canal»; el hebreo es difícil, especialmente נחל y גר. Muchos entienden la línea a la luz de la imaginería minera del capítulo y por eso traducen נחל como «galería» o «pozo».
    reason: alternative_reading
  - marker: b
    text: Literalmente, «olvidados por el pie». La idea es que este lugar o estos trabajadores quedan fuera del alcance o del recuerdo de quienes caminan arriba.
    reason: lexical_alternative
  - marker: c
    text: O «son bajados» o «quedan colgados». El verbo hebreo puede sugerir ser suspendidos o descendidos, probablemente mediante cuerdas en una mina.
    reason: lexical_alternative
  revision_rationale: La revisión corrige la discordancia principal con el hebreo y con la POB inglesa al restaurar el plural en la segunda mitad del verso. Así se conserva mejor la escena minera de personas suspendidas por cuerdas, se mejora la fluidez del español, y las notas vuelven a corresponder directamente al texto. Se deja intacta la elección 'galería' y la nota de alternativa para נחל, porque esa decisión contextual es razonable y bien documentada.
