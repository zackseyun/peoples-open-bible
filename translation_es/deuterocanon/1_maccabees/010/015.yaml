translation:
  language: es
  text: Y el rey Alejandro oyó las promesas que Demetrio había enviado a Jonatán, y le contaron las guerras[a] y las hazañas heroicas[b] que él y sus hermanos habían hecho, y las fatigas[c] que habían sufrido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «guerras»; no se limita a batallas aisladas.
    reason: lexical_alternative
  - marker: b
    text: El griego ἀνδραγαθίας se refiere a hechos de valor o heroísmo; «hazañas heroicas» expresa ese matiz de manera más natural en español que un calco como «varoniles».
    reason: lexical_alternative
  - marker: c
    text: «Fatigas» recoge el sentido de cargas, esfuerzos y sufrimientos soportados en conflicto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγγελίας
  english_pob_choice: promises
  chosen_spanish: promesas
  alternatives_spanish:
  - ofrecimientos
  - promesas solemnes
  lexicon: BDAG
  rationale: El griego aquí designa compromisos o aseguramientos enviados por Demetrio a Jonatán. "Promesas" conserva bien ese valor en español y mantiene el tono político del pasaje sin sobrecargarlo.
- source_word: διηγήσαντο
  english_pob_choice: they told
  chosen_spanish: le contaron
  alternatives_spanish:
  - le narraron
  - le refirieron
  lexicon: BDAG
  rationale: El verbo expresa que presentaron un relato a Alejandro. "Le contaron" es natural en español y conserva la idea de comunicarle el contenido de forma directa.
- source_word: πολέμους
  english_pob_choice: wars
  chosen_spanish: guerras
  alternatives_spanish:
  - batallas
  - campañas
  lexicon: BDAG
  rationale: El plural griego apunta a conflictos militares repetidos. "Guerras" sigue de cerca el sentido amplio del término y evita restringirlo a combates aislados.
- source_word: ἀνδραγαθίας
  english_pob_choice: brave deeds
  chosen_spanish: hazañas varoniles
  alternatives_spanish:
  - actos de valor
  - hazañas heroicas
  lexicon: LSJ
  rationale: El término alude a acciones de valor y nobleza guerrera. "Hazañas varoniles" conserva la fuerza encomiástica del compuesto griego y deja visible su matiz marcial y de virtud viril; "actos de valor" sería más llano pero menos cercano al color del original.
- source_word: κόπους
  english_pob_choice: hardships
  chosen_spanish: fatigas
  alternatives_spanish:
  - trabajos
  - penurias
  - trabajos penosos
  lexicon: BDAG
  rationale: En este contexto la palabra no significa solo labor física, sino cargas y sufrimientos soportados. "Fatigas" mantiene esa amplitud en español y encaja bien con el contexto militar.
- source_word: ἔσχοσαν
  english_pob_choice: had endured
  chosen_spanish: habían sufrido
  alternatives_spanish:
  - habían soportado
  - habían padecido
  lexicon: BDAG
  rationale: Con "fatigas" el verbo expresa haber pasado por ellas. "Habían sufrido" comunica de modo natural la experiencia padecida y mantiene el sentido de resistencia bajo presión.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos de sangre
  - parientes
  lexicon: BDAG
  rationale: El contexto se refiere a los hermanos literales de Jonatán dentro de la familia macabea. "Hermanos" es la forma directa y precisa en español.
translation_notes:
  revision_awareness: 'El texto coincide con el pasaje griego y con la auditoría inglesa: ἐπαγγελίας como promesas, διηγήσαντο como comunicar un relato, πόλεμοι como guerras, ἀνδραγαθίαι como actos de valor y κόποι como penurias/fatigas. No se registran revisiones posteriores que alteren la traducción.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «Jonatán» para Ἰωναθάν y «Alejandro»/«Demetrio» para los nombres propios, conforme al uso bíblico en español.
  - Se eligió «hazañas varoniles» en lugar de una equivalencia más neutra para no borrar el matiz guerrero y encomiástico del término griego.
