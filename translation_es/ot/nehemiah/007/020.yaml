translation:
  language: es
  text: Los hijos de Adín, seiscientos cincuenta y cinco.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de la familia de
  lexicon: HALOT
  rationale: En este contexto de lista censal, בְּנֵי funciona como designación de clan o linaje. En español, «los hijos de» conserva la estructura formal del registro y sigue siendo natural; «descendientes de» y «miembros de la familia de» suavizan esa forma, pero pierden algo del paralelismo con el hebreo.
- source_word: עָדִין
  english_pob_choice: Adin
  chosen_spanish: Adín
  alternatives_spanish:
  - Adin
  lexicon: Nombre propio
  rationale: Es un nombre propio de familia/persona, por lo que se translitera. En español se mantiene la acentuación gráfica «Adín» para reflejar la pronunciación natural y la lectura en español.
- source_word: שֵׁשׁ מֵאוֹת
  english_pob_choice: six hundred
  chosen_spanish: seiscientos
  alternatives_spanish:
  - seis cientos
  lexicon: HALOT
  rationale: La construcción numeral hebrea se expresa de forma directa en español con «seiscientos»; es la equivalencia idiomática normal y conserva exactamente el valor numérico.
- source_word: חֲמִשִּׁים וַחֲמִשָּׁה
  english_pob_choice: fifty-five
  chosen_spanish: cincuenta y cinco
  alternatives_spanish:
  - cincuenta-cinco
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cincuenta y cinco» después de los cientos. En español, la forma natural y exacta es «cincuenta y cinco»; «cincuenta-cinco» no es idiomático.
translation_notes:
  revision_awareness: El texto base en inglés no presenta notas textuales ni variantes; el hebreo masorético y la auditoría inglesa están en pleno acuerdo, por lo que no se introducen notas de variante ni tensiones doctrinales.
  spanish_consistency_notes:
  - Se mantiene el tono conciso y registral propio de una lista censal.
  - Se conserva la estructura genealógica sin añadir interpretaciones como «clan» o «familia» en el texto principal.
  - La numeración se expresa de manera completamente natural en español, sin alterar el total exacto.
