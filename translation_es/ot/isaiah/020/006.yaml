translation:
  language: es
  text: 'Y dirá el habitante de este litoral[b] en aquel día: «Mira, esta es nuestra esperanza[a], adonde huimos en busca de ayuda, para ser librados del rey de Asiria. ¿Y cómo escaparemos nosotros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «expectativa» o «aquello a lo que mirábamos». La expresión hebrea se refiere al objeto en el que habían puesto su esperanza.'
    reason: lexical_alternative
  - marker: b
    text: «Litoral» también puede traducirse «isla». En Isaías, el término a menudo se refiere más ampliamente a tierras marítimas o regiones costeras.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשֵׁב הָאִי הַזֶּה
  english_pob_choice: the inhabitant of this coastland
  chosen_spanish: el habitante de este litoral
  alternatives_spanish:
  - el residente de esta isla
  - el que habita este litoral
  - el habitante de esta costa
  lexicon: HALOT
  rationale: Se conserva el singular colectivo de יֹשֵׁב con «habitante». Para אִי, «litoral»/«costa» comunica mejor el uso profético amplio que el sentido estrictamente isleño, sin perder la referencia geográfica marítima.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética fija con un español natural y solemne.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  - Observa
  lexicon: HALOT
  rationale: «Mira» reproduce la interpelación directa y viva de הִנֵּה en un registro moderno, evitando arcaísmo innecesario.
- source_word: כֹה מַבָּטֵנוּ
  english_pob_choice: this is our hope
  chosen_spanish: este es nuestro apoyo
  alternatives_spanish:
  - esta es nuestra esperanza
  - esto es adonde mirábamos
  - este era nuestro objeto de confianza
  lexicon: HALOT
  rationale: מַבָּט expresa aquello hacia lo cual se dirige la mirada o la expectativa. Dado el contexto de buscar seguridad política, «apoyo» comunica bien el objeto de confianza sin borrar la tensión entre esperanza, expectativa y aquello en lo que se apoyaban.
- source_word: אֲשֶׁר נַסְנוּ שָׁם
  english_pob_choice: where we fled
  chosen_spanish: adonde huimos
  alternatives_spanish:
  - donde huimos
  - adonde nos refugiamos
  - donde buscamos refugio
  lexicon: HALOT
  rationale: נָס/נוּס indica huida; «adonde» conserva el movimiento hacia ese lugar como sitio de refugio. Se evita añadir más de lo que el hebreo dice.
- source_word: לְעֶזְרָה
  english_pob_choice: for help
  chosen_spanish: para ayuda
  alternatives_spanish:
  - para socorro
  - en busca de ayuda
  lexicon: HALOT
  rationale: «Ayuda» es directo y transparente; mantiene el sentido básico de עֶזְרָה.
- source_word: לְהִנָּצֵל
  english_pob_choice: to be delivered
  chosen_spanish: para ser librados
  alternatives_spanish:
  - para ser rescatados
  - para ser salvados
  - para escapar
  lexicon: HALOT
  rationale: El nifal de נצל tiene fuerza pasiva de ser librado/rescatado. «Ser librados» preserva esa pasividad y el matiz de liberación de peligro.
- source_word: מִפְּנֵי מֶלֶךְ אַשּׁוּר
  english_pob_choice: from the king of Assyria
  chosen_spanish: de delante del rey de Asiria
  alternatives_spanish:
  - de la presencia del rey de Asiria
  - del rey de Asiria
  - frente al rey de Asiria
  lexicon: HALOT
  rationale: Se conserva el valor idiomático de מִפְּנֵי («de delante de»), que mantiene con claridad la idea de quedar fuera del alcance/presencia amenazante del rey.
- source_word: וְאֵיךְ נִמָּלֵט אֲנָחְנוּ
  english_pob_choice: And how shall we escape?
  chosen_spanish: ¿Y cómo escaparemos?
  alternatives_spanish:
  - ¿Y cómo podremos escapar?
  - ¿Y cómo nos escaparemos?
  - ¿Y cómo lograremos huir?
  lexicon: HALOT
  rationale: Se traduce la pregunta retórica de forma natural en español, preservando el futuro interrogativo y el tono de impotencia.
theological_decisions:
- issue: 'Valor de אִי en Isaías: isla vs. litoral/costaland'
  english_pob_reading: coastland, with a footnote that it may also mean island and often refers more broadly to maritime lands or coastal regions
  chosen_spanish_reading: litoral
  alternative_spanish_readings:
  - isla
  - costa
  - tierras marítimas
  rationale: El contexto de Isaías favorece un término amplio que no obligue a pensar en una isla estricta. «Litoral» transmite la referencia marítima y permite incluir la extensión regional que el inglés POB documenta en su nota.
  doctrine_reference: Isaiah usage / lexical geography, not doctrine
- issue: 'Sentido de מַבָּטֵנוּ: esperanza, expectativa, objeto de mirada o confianza'
  english_pob_reading: this is our hope ... The Hebrew expression refers to the object in which they placed their hope.
  chosen_spanish_reading: este es nuestro apoyo
  alternative_spanish_readings:
  - esta es nuestra esperanza
  - este es nuestro objeto de confianza
  - esto es adonde mirábamos
  rationale: La expresión hebrea puede abarcar esperanza, expectativa y objeto de confianza. «Apoyo» conserva la idea de aquello en lo que se apoyaron para seguridad política, sin borrar el trasfondo de esperanza frustrada.
  doctrine_reference: Lexical/theological nuance in prophetic critique of misplaced trust
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: se evita expandir כֹה מַבָּטֵנוּ con una paráfrasis explicativa como «lo que ha venido a ser nuestra esperanza», porque el hebreo es más directo. Se conserva la estructura retórica, la coletilla temporal profética y la pregunta final con fuerza de impotencia.'
  spanish_consistency_notes:
  - Se mantiene «Asiria» para אַשּׁוּר y no «Asur», en coherencia con el español bíblico común y con la claridad para lectura eclesial.
  - Se usa «librados» para לְהִנָּצֵל para preservar el pasivo del nifal y evitar una simple repetición de «escapar» antes de la pregunta final.
  - «Litoral» funciona aquí como equivalente amplio de coastland; si la serie editorial prefiere una sola tradición terminológica, podría uniformarse con «costa» o «tierras costeras» en notas editoriales, pero no en el texto base sin una razón contextual adicional.
