  yaml_path: translation/ot/2_kings/004/042.yaml
  text: And a man came from Baal-shalishah and brought to the man of God bread of the firstfruits[a], twenty loaves of barley, and fresh grain in his sack. And he said, “Give it to the people[b], so that they may eat.”
  footnotes:
