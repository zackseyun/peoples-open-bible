translation:
  language: es
  text: No caigas bajo el poder de tu propio deseo[a], no sea que tu fuerza sea consumida contra ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «No caigas en la mano de tu alma»; el paralelo griego dice: «No te exaltes en el consejo de tu alma, para que tu alma no sea desgarrada como un toro». La línea hebrea final es difícil, por eso la traducción sigue el sentido compartido de una advertencia contra dejarse llevar por el propio impulso hasta la ruina.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּפּוֹל
  english_pob_choice: Do not fall into the power of your own desire
  chosen_spanish: No te dejes llevar
  alternatives_spanish:
  - No caigas
  - No te entregues
  lexicon: HALOT
  rationale: El hebreo dice literalmente «no caigas», pero con בְּיַד expresa la idea de quedar bajo el dominio o poder de algo. En español, «no te dejes llevar» comunica de modo natural la rendición a un impulso interno sin perder el matiz de advertencia.
- source_word: בְּיַד נַפְשְׁךָ
  english_pob_choice: to your own desire
  chosen_spanish: por tu propio deseo
  alternatives_spanish:
  - en la mano de tu alma
  - a tu propia alma
  - a tu propio apetito
  lexicon: HALOT
  rationale: נפש aquí no exige «alma» en sentido metafísico; en literatura sapiencial puede referirse al impulso interior, deseo o apetito. «Tu propio deseo» refleja bien el sentido contextual y evita una traducción extraña en español.
- source_word: וּתְעַבֶּה
  english_pob_choice: lest ... be consumed
  chosen_spanish: sea consumida
  alternatives_spanish:
  - sea desgarrada
  - sea destruida
  - se consuma
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el testimonio griego paralelo apunta a ruina o devastación de la vida interior. «Sea consumida» conserva el carácter de daño irreparable sin forzar una imagen demasiado literal que no queda asegurada por el hebreo transmitido.
- source_word: חֵילֵךָ
  english_pob_choice: your strength
  chosen_spanish: tu fuerza
  alternatives_spanish:
  - tu vigor
  - tu riqueza
  - tu poder
  lexicon: HALOT
  rationale: חיל puede significar fuerza, vigor o riqueza. Aquí, por el contexto de advertencia contra la autodestrucción, «fuerza» es la opción más clara y cercana al sentido de energía vital arruinada.
- source_word: עָלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - en tu contra
  lexicon: HALOT
  rationale: En este contexto de advertencia reflexiva, «contra ti» expresa con naturalidad el efecto autodestructivo del verbo y mantiene el paralelismo con la consumación de la fuerza.
theological_decisions:
- issue: Manejo de la dificultad textual entre el hebreo y el paralelo griego
  english_pob_reading: The Hebrew second clause is difficult, so the translation follows the shared sense of warning against self-indulgent desire leading to ruin.
  chosen_spanish_reading: La traducción sigue el sentido común de advertencia contra el deseo propio desordenado que lleva a ruina interior.
  alternative_spanish_readings:
  - 'Una versión más literal: «No caigas en la mano de tu alma»'
  - 'Una versión más helenizada: «no te exaltes en el consejo de tu alma»'
  rationale: El hebreo transmitido presenta una cláusula oscura y el paralelo griego confirma el tema general de no seguir el impulso interior hasta la ruina. En español conviene dejar visible la advertencia moral sin fingir una precisión que el testimonio no garantiza.
  doctrine_reference: 'PHILOSOPHY.md: Sirach is translated from Hebrew where it survives, with Swete LXX used alongside as Greek source; preserve source uncertainty honestly.'
- issue: Elección de lenguaje antropológico para נפש
  english_pob_reading: '''your own desire'' rather than a later metaphysical sense of ''soul''.'
  chosen_spanish_reading: «deseo» en lugar de «alma» como traducción principal.
  alternative_spanish_readings:
  - «alma»
  - «apetito»
  - «interior»
  rationale: Para esta línea sapiencial, «alma» en español puede sonar demasiado teológico y desplazar el sentido hacia una entidad separada. «Deseo» mantiene el foco en la inclinación interior que el proverbio exhorta a dominar.
  doctrine_reference: 'PHILOSOPHY.md: preserve anthropological nuance from wisdom literature; do not impose later metaphysical categories where context does not require them.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió una formulación más literal para בְּיַד y suavizó el final oscuro con un verbo de consumación; la versión española conserva ese equilibrio entre literalidad controlada y lectura natural, sin ocultar la dificultad textual.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» como norma general del proyecto, pero este versículo no contiene nombres divinos.
  - Se evita «Cristo» y terminología cristiana ajena al contexto sapiencial.
  - «Deseo» se usa como solución contextual para נפש, reservando «alma» para casos donde el español no introduzca una lectura indebida.
  - La nota reproduce la tensión entre hebreo y griego sin resolverla artificialmente.
