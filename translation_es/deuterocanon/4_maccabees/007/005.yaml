translation:
  language: es
  text: Porque, como un risco escarpado[a], el padre Eleazar, extendiendo su mente[b], quebró a su alrededor las olas enfurecidas de las pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un precipicio abrupto' o 'un peñasco escarpado'. La imagen griega es la de una altura rocosa abrupta y saliente frente al mar.
    reason: lexical_alternative
  - marker: b
    text: '''Pasiones'' aquí se refiere a impulsos o apetitos desordenados, un tema clave en 4 Macabeos sobre el gobierno de la mente racional.'
    reason: cultural_note
lexical_decisions:
- source_word: πρόκρημνον ἄκραν
  english_pob_choice: a sheer cliff
  chosen_spanish: un peñasco escarpado
  alternatives_spanish:
  - un precipicio abrupto
  - un risco escarpado
  - una cima escarpada
  lexicon: LSJ
  rationale: La imagen griega es la de una altura rocosa abrupta y saliente. 'Peñasco escarpado' conserva la fuerza visual y la aspereza del cuadro sin sonar forzado en español.
- source_word: διάνοιαν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  - razón
  lexicon: LSJ
  rationale: En este contexto, διάνοια apunta a la facultad racional o disposicional de Eleazar. 'Mente' es natural en español y mantiene la oposición conceptual con las pasiones sin sobreexplicar.
- source_word: ἐκτείνας
  english_pob_choice: stretching forth
  chosen_spanish: extendiendo
  alternatives_spanish:
  - estirando
  - tendiendo
  - alargando
  lexicon: LSJ
  rationale: El participio preserva la metáfora concreta de una acción de extensión. 'Extendiendo' es el equivalente más claro y sobrio en español.
- source_word: περιέκλασεν
  english_pob_choice: broke around himself
  chosen_spanish: quebró ... alrededor de sí
  alternatives_spanish:
  - rompió ... alrededor de sí
  - rechazó ... alrededor de sí
  - rechazó y dispersó
  lexicon: LSJ
  rationale: El verbo compuesto conserva la idea espacial de una ruptura que ocurre en torno a la figura de Eleazar. 'Quebró ... alrededor de sí' mantiene esa fuerza sin suavizarla demasiado.
- source_word: μαινομένους
  english_pob_choice: that were raging
  chosen_spanish: enfurecidas
  alternatives_spanish:
  - rabiosas
  - furiosas
  - desatadas
  lexicon: LSJ
  rationale: El participio describe la violencia desordenada de las olas; 'enfurecidas' comunica el movimiento tempestuoso y funciona bien con 'olas' en español.
- source_word: παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos desordenados
  - los apetitos
  - los afectos
  lexicon: LSJ
  rationale: En 4 Macabeos, πάθη es un término técnico-moral para pasiones desordenadas. 'Pasiones' preserva el peso conceptual y la relación con la argumentación del libro.
- source_word: κλύδωνας
  english_pob_choice: surging waves
  chosen_spanish: olas
  alternatives_spanish:
  - oleaje
  - ondas
  - borrascas
  lexicon: LSJ
  rationale: El sustantivo denota olas agitadas. 'Olas' es claro y fiel; el adjetivo 'enfurecidas' aporta la energía del griego y del contexto metafórico.
theological_decisions:
- issue: 'Antropología moral: mente frente a pasiones'
  english_pob_reading: Rendered διάνοια as 'mind' and πάθη as 'passions' to preserve the moral-psychological contrast without importing later technical terminology.
  chosen_spanish_reading: Mente frente a pasiones, manteniendo la imagen ética del pasaje sin convertirla en una formulación filosófica más técnica de lo que el griego exige.
  alternative_spanish_readings:
  - razón frente a emociones
  - entendimiento frente a impulsos
  rationale: El texto emplea una metáfora moral y psicológica, no una definición doctrinal cerrada. 'Mente' y 'pasiones' conservan la tensión del original y dejan visible el argumento de 4 Macabeos sobre el dominio de la facultad racional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente del inglés POB: se mantuvo la estructura retórica y el contraste entre la imagen rocosa y las olas de las pasiones, evitando redundancias y conservando el orden lógico del versículo.'
  spanish_consistency_notes:
  - Se prefirió 'mente' para διάνοια por ser natural en español y suficientemente preciso en este contexto.
  - Se mantuvo 'pasiones' como término técnico-moral del libro, en vez de suavizarlo a 'emociones'.
  - La construcción 'alrededor de sí' sigue el valor espacial de περιέκλασεν sin introducir una interpretación ajena.
  - La puntuación inicial con 'Porque' reproduce la conexión discursiva del original y del audit trail inglés.
