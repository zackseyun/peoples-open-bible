translation:
  language: es
  text: Y allí me reuniré contigo, y hablaré contigo desde arriba del propiciatorio[a], de entre los dos querubines que están sobre el arca del testimonio, acerca de todo lo que te mandaré para los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cubierta de expiación'. El término hebreo se refiere a la cubierta de oro del arca; tradicionalmente, 'propiciatorio'.
    reason: lexical_alternative
  - marker: b
    text: O 'para los israelitas' o 'a los hijos de Israel'. El hebreo dice literalmente 'a/para los hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנוֹעַדְתִּי
  english_pob_choice: I will meet with you
  chosen_spanish: me reuniré contigo
  alternatives_spanish:
  - me encontraré contigo
  - me citaré contigo
  lexicon: HALOT
  rationale: El nifal de יעד expresa una cita o encuentro concertado. 'Me reuniré contigo' comunica bien ese sentido relacional y cultual sin endurecerlo en una forma demasiado literal.
- source_word: וְדִבַּרְתִּי אִתְּךָ
  english_pob_choice: I will speak with you
  chosen_spanish: hablaré contigo
  alternatives_spanish:
  - te hablaré
  - hablaré con respecto a ti
  lexicon: HALOT
  rationale: Con דבר + את, la idea es de habla directa y relacional. 'Hablaré contigo' conserva el matiz de comunicación personal mejor que un simple 'te hablaré'.
- source_word: מֵעַל
  english_pob_choice: from above
  chosen_spanish: desde arriba de
  alternatives_spanish:
  - desde sobre
  - por encima de
  lexicon: HALOT
  rationale: La expresión marca el punto de origen de la voz divina respecto del objeto sagrado. 'Desde arriba de' es natural en español y mantiene la localización espacial.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: mercy seat
  chosen_spanish: propiciatorio
  alternatives_spanish:
  - cubierta de expiación
  - cubierta
  lexicon: HALOT
  rationale: En español bíblico, 'propiciatorio' es el equivalente tradicional para este objeto del arca y preserva su función cultual. 'Cubierta' sería más literal, pero demasiado plana para el referente sagrado.
- source_word: מִבֵּין שְׁנֵי הַכְּרֻבִים
  english_pob_choice: from between the two cherubim
  chosen_spanish: de entre los dos querubines
  alternatives_spanish:
  - entre los dos querubines
  - desde entre los dos querubines
  lexicon: HALOT
  rationale: '''De entre'' reproduce bien la relación espacial del hebreo y sugiere procedencia/origen desde el espacio entre ambos querubines.'
- source_word: הַכְּרֻבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubes
  lexicon: HALOT
  rationale: '''Querubines'' es la transliteración asentada en español y preserva la designación específica de estos seres celestiales.'
- source_word: אֲשֶׁר עַל אֲרֹן הָעֵדֻת
  english_pob_choice: that are over the ark of the testimony
  chosen_spanish: que están sobre el arca del testimonio
  alternatives_spanish:
  - que están encima del arca del testimonio
  - que están sobre el arca del pacto
  lexicon: HALOT
  rationale: '''Sobre'' conserva la posición superior de los querubines. ''Arca del testimonio'' sigue de cerca el hebreo הָעֵדֻת sin introducir una equivalencia más interpretativa como ''pacto''.'
- source_word: אֵת כָּל אֲשֶׁר אֲצַוֶּה אוֹתְךָ
  english_pob_choice: all that I will command you
  chosen_spanish: todo lo que te mandaré
  alternatives_spanish:
  - todo cuanto te mandaré
  - todo lo que te ordenaré
  lexicon: HALOT
  rationale: '''Mandar'' comunica la fuerza imperativa de צוה de manera natural en español. ''Todo lo que'' preserva la amplitud de כָּל sin necesidad de expansión.'
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - para los israelitas
  lexicon: HALOT
  rationale: Se conserva el giro filiativo masculino plural del hebreo con 'hijos de Israel'. 'Para' refleja la dirección final de los mandatos dentro del contexto inmediato.
theological_decisions:
- issue: Rendering of הַכַּפֹּרֶת
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - cubierta de expiación
  - cubierta
  rationale: El texto alude al objeto sagrado sobre el arca desde el cual habla Yahvé. 'Propiciatorio' es un término bíblico-teológico consolidado en español y mantiene el peso cultual del referente sin reducirlo a una simple cubierta.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological weight without unnecessary flattening'
- issue: Gender-accurate rendering of בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: El hebreo usa un plural masculino representativo. Se preserva la formulación filiativa del original en lugar de neutralizarla, siguiendo el principio de exactitud de género cuando el texto lo sostiene.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El auditorio inglés ajustó la última cláusula para reflejar mejor el valor de אֵת כָּל אֲשֶׁר אֲצַוֶּה como 'about all that I will command you'. La versión española ya incorpora esa relación con 'acerca de todo lo que te mandaré', manteniendo la fluidez y el alcance total del mandato.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito en el contexto de la sección, sin sustituirlo aquí porque no aparece en el versículo.
  - '''Propiciatorio'' se usa de manera consistente con la terminología bíblica española para הַכַּפֹּרֶת.'
  - '''Arca del testimonio'' conserva el paralelismo con la tradición de POB en inglés y evita interpretar ''testimonio'' como ''pacto'' sin base explícita.'
  - La preposición 'acerca de' refleja la revisión inglesa y evita que 'todo lo que te mandaré' parezca complemento directo del verbo 'hablar' sin relación temática.
