  to: Pasando por la calle cerca de su esquina[a], y va hacia su casa.
  rationale: Se ajusta la segunda cláusula para acercarla más al valor concreto de יִצְעָד sin perder la dirección hacia la casa. «Va hacia su casa» es más natural en español que «él se dirige hacia su casa» y mantiene la progresión narrativa documentada en el rastro inglés. Se conserva la nota alternativa léxica, ya que sigue reflejando opciones válidas para שוק y דרך.
