review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del POB inglés: Yahvé habla a Josué, da una doble prohibición contra el temor, ordena llevar la fuerza combatiente, subir contra Hai/Ai, y asegura que ya ha entregado al rey, su pueblo, su ciudad y su tierra. Sin embargo, la frase principal para כָּל עַם הַמִּלְחָמָה se quedó demasiado literal y poco idiomática en español (''todo el pueblo de guerra''), cuando el propio rastro del POB documenta que el sentido contextual es la fuerza combatiente masculina. También conviene suavizar ''yo he entregado'' a ''he entregado'' y mantener una formulación más natural en español sin perder el modismo ''en tu mano''.'
  spanish_quality_summary: El español es claro en general, digno y legible. 'No temas y no te desalientes', 'levántate y sube', y 'Mira' funcionan bien. El problema principal de calidad es 'todo el pueblo de guerra', que suena forzado y poco natural para lectura bíblica continua; en español amplio, 'todos los guerreros' o 'todos los hombres de guerra' comunica mejor el referente. Dado que el POB inglés puso la literalidad en nota y la interpretación contextual en texto, el español debe hacer lo mismo. El resto requiere solo ajuste menor de fluidez.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> ''Yahvé'' correctamente; nombre propio יְהוֹשֻׁעַ -> ''Josué'' correcto; הָעָי -> ''Hai'' es aceptable en tradición española; no hay conflictos teológicos mayores. La principal desalineación es con la decisión léxica documentada para כָּל עַם הַמִּלְחָמָה: el inglés eligió una expresión contextual equivalente (''all the fighting men''), mientras el español elevó al texto principal la formulación más literal que el POB reservó para nota.'
  issues:
  - severity: medium
    issue: '''todo el pueblo de guerra'' en el texto principal'
    rationale: Aunque refleja la forma hebrea de manera cercana, en español suena rígido y menos claro. El audit trail del POB ya resolvió que el referente es la fuerza combatiente; el español debería usar una expresión idiomática equivalente en el texto y dejar la literalidad en nota.
  - severity: low
    issue: Matiz enfático de 'yo he entregado'
    rationale: El pronombre 'yo' no es incorrecto, pero no está exigido por el hebreo y suena algo pesado aquí. 'He entregado en tu mano' preserva mejor la naturalidad española.
  revised_spanish_text: 'Entonces Yahvé dijo a Josué[a]: «No temas y no te desalientes. Toma contigo a todos los guerreros, levántate y sube a Hai. Mira, he entregado en tu mano al rey de Hai, a su pueblo, a su ciudad y a su tierra».'
  revised_footnotes:
  - marker: a
    text: O “todo el pueblo de guerra” / “todos los hombres de guerra”. La expresión hebrea dice literalmente “todo el pueblo de la guerra”, refiriéndose a la fuerza combatiente.
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente la expresión de כָּל עַם הַמִּלְחָמָה para que el texto principal sea idiomático y fiel al sentido contextual documentado por el POB, dejando la formulación más literal en nota. También se quita el 'yo' innecesario para mejorar la fluidez sin pérdida de sentido. No hace falta adjudicación adicional.
