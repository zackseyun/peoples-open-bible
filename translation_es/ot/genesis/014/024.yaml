  text: בִּלְעָדַ֗/י רַ֚ק אֲשֶׁ֣ר אָֽכְל֣וּ הַ/נְּעָרִ֔ים וְ/חֵ֨לֶק֙ הָֽ/אֲנָשִׁ֔ים אֲשֶׁ֥ר הָלְכ֖וּ אִתִּ֑/י עָנֵר֙ אֶשְׁכֹּ֣ל וּ/מַמְרֵ֔א הֵ֖ם יִקְח֥וּ חֶלְקָֽ/ם׃ס
base_translation:
  language: en
  yaml_path: translation/ot/genesis/014/024.yaml
  text: I will take nothing except only what the young men have eaten[a], and the share of the men who went with me—Aner, Eshcol, and Mamre[c][b]. Let them take their share.
  footnotes:
  - marker: a
    text: Or 'what the servants/retainers have eaten.' The Hebrew נְּעָרִים can refer to youths or attendants depending on context.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''they shall take their share.'' The Hebrew form may be read as a simple future, though the context favors permission: ''Let them take.'''
    reason: alternative_reading
  - marker: c
    text: Or 'except only'.
    reason: previous_rendering
