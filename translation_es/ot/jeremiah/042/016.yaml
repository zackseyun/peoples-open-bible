revisions:
- from: Entonces la espada que ustedes temen los alcanzará allí, en la tierra de Egipto, y el hambre que ustedes temen[a] se les pegará atrás[b] en Egipto; y allí morirán.
  to: Entonces la espada que ustedes temen los alcanzará allí, en la tierra de Egipto, y la hambruna que ustedes temen[a] los seguirá de cerca allí, en Egipto[b]; y allí morirán.
  rationale: Se reemplazó 'el hambre' por 'la hambruna' para reflejar mejor רָעָב como calamidad de hambre/famine, en línea con la decisión documentada. Se cambió 'se les pegará atrás' por 'los seguirá de cerca allí, en Egipto' para lograr español natural sin perder la imagen de persecución; la literalidad se preserva en la nota [b]. Se mantuvo 'temen' en paralelo con la primera cláusula, con una nota léxica para la alternativa de preocupación ansiosa.
