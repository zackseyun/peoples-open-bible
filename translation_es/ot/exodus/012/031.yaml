translation:
  language: es
  text: 'Entonces mandó llamar a Moisés y a Aarón de noche[a] y dijo: «Levántense, salgan de en medio de mi pueblo, tanto ustedes como los hijos de Israel, y vayan, sirvan a Yahvé, como han dicho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De noche» traduce el valor temporal de לַיְלָה; también puede expresarse como «por la noche».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: he called for
  chosen_spanish: lo llamó
  alternatives_spanish:
  - lo convocó
  - lo llamó a gritos
  lexicon: HALOT
  rationale: En este contexto narrativo, קרא introduce una llamada urgente de Faraón. «Lo llamó» conserva la acción sin añadir matices excesivos; «convocó» suena más administrativo y «lo llamó a gritos» exagera el tono sin base explícita.
- source_word: לַיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche[a]
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: HALOT
  rationale: La forma hebrea marca tiempo y puede leerse como «de noche» o «por la noche». Se eligió «de noche» por su naturalidad en español y porque mantiene el dato temporal breve; la nota conserva la alternativa «por la noche» implícita en la ambigüedad temporal.
- source_word: קוּמוּ
  english_pob_choice: Rise up
  chosen_spanish: Levántense
  alternatives_spanish:
  - Pónganse de pie
  - Levanténse
  lexicon: HALOT
  rationale: El imperativo plural exige una orden enérgica. En español, «Levántense» comunica la urgencia de קוּמוּ sin sonar arcaico; «Pónganse de pie» es posible pero más descriptivo y menos directo.
- source_word: צְּאוּ
  english_pob_choice: go out
  chosen_spanish: salgan
  alternatives_spanish:
  - salgan fuera
  - váyanse
  lexicon: HALOT
  rationale: יצא expresa salir físicamente. «Salgan» conserva el movimiento hacia afuera y encaja con la secuencia de mandatos; «váyanse» tiende a interpretar el resultado como partida, y «salgan fuera» sería redundante.
- source_word: מִתּוֹךְ עַמִּי
  english_pob_choice: from among my people
  chosen_spanish: de en medio de mi pueblo
  alternatives_spanish:
  - de entre mi pueblo
  - del seno de mi pueblo
  lexicon: HALOT
  rationale: מִתּוֹךְ indica salida desde el interior de un conjunto. «De en medio de mi pueblo» conserva bien la imagen espacial hebrea; «de entre mi pueblo» también es válida, mientras que «del seno de mi pueblo» es más literario y menos transparente.
- source_word: גַּם אַתֶּם גַּם בְּנֵי יִשְׂרָאֵל
  english_pob_choice: both you and the sons of Israel
  chosen_spanish: tanto ustedes como los hijos de Israel
  alternatives_spanish:
  - ustedes y también los hijos de Israel
  - tanto ustedes como la casa de Israel
  lexicon: HALOT
  rationale: El doble גַּם refuerza inclusión y énfasis. «Tanto... como...» reproduce bien esa correlación en español. «Hijos de Israel» mantiene el giro hebreo; «la casa de Israel» alteraría el sustantivo colectivo y no corresponde aquí.
- source_word: וּלְכוּ
  english_pob_choice: and go
  chosen_spanish: y vayan
  alternatives_spanish:
  - y marchen
  - y anden
  lexicon: HALOT
  rationale: הָלַךְ en imperativo continúa la cadena de órdenes. «Y vayan» es la equivalencia más natural y conserva la progresión del mandato; «marchen» añade un matiz militar, y «anden» suena menos preciso.
- source_word: עִבְדוּ
  english_pob_choice: serve
  chosen_spanish: sirvan
  alternatives_spanish:
  - adoren
  - presten servicio a
  lexicon: HALOT
  rationale: עבד puede abarcar servicio y culto. «Sirvan» conserva esa amplitud sin reducirlo únicamente a «adoren»; «presten servicio a» explicita demasiado la relación y resulta menos bíblico en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El estándar del proyecto en español es «Yahvé» para el Tetragrámaton. Se evita la sustitución por un título («el SEÑOR») para preservar el nombre divino personal revelado en el texto.
- source_word: כְּדַבֶּרְכֶם
  english_pob_choice: as you have said
  chosen_spanish: como han dicho
  alternatives_spanish:
  - como dijeron
  - según han dicho
  lexicon: HALOT
  rationale: La construcción expresa conformidad con lo que habían pedido. «Como han dicho» es natural y fiel; «como dijeron» es posible, pero la forma compuesta comunica mejor la referencia a una petición ya formulada.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo presenta el Tetragrámaton directamente. Conforme a la política del proyecto, se translitera como «Yahvé» en el texto principal para preservar el nombre propio del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de עִבְדוּ אֶת יְהוָה
  english_pob_reading: serve Yahweh
  chosen_spanish_reading: sirvan a Yahvé
  alternative_spanish_readings:
  - adoren a Yahvé
  - presten servicio a Yahvé
  rationale: El verbo עבד con Dios puede implicar servicio y culto. «Sirvan» conserva esa amplitud semántica sin estrecharse a una sola práctica litúrgica.
  doctrine_reference: HALOT; uso contextual de עבד con objeto divino
- issue: Valor del doble גַּם...גַּם
  english_pob_reading: both you and the sons of Israel
  chosen_spanish_reading: tanto ustedes como los hijos de Israel
  alternative_spanish_readings:
  - ustedes y también los hijos de Israel
  - 'ambos: ustedes y los hijos de Israel'
  rationale: La duplicación enfática se mantiene mejor con una correlación explícita en español. Así se conserva la inclusión conjunta de Moisés y Aarón junto con Israel.
  doctrine_reference: Estructura enfática del hebreo bíblico
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. La redacción mantiene la decisión auditada de tiempo nocturno para לַיְלָה y no introduce otros marcadores innecesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar español del proyecto para יְהוָה.
  - 'Se conserva la secuencia imperativa del hebreo: levantarse, salir, ir, servir.'
  - «Hijos de Israel» reproduce el giro hebreo documentado, en lugar de suavizarlo a «israelitas».
  - «Sirvan» preserva el rango semántico de עבד con Dios sin reducirlo solo a culto litúrgico.
