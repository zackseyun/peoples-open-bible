    issue: Se tradujo אֱלֹהִים como «Yahvé» en lugar de «Dios».
    rationale: El hebreo fuente usa אֱלֹהִים, no יהוה. La política terminológica del proyecto distingue el nombre divino YHWH de términos genéricos/titulativos como אֱלֹהִים. Cambiarlo a «Yahvé» introduce información no presente en el versículo.
  - severity: medium
    issue: «Muy grande entendimiento» es algo tosco en español.
    rationale: Aunque refleja הַרְבֵּה מְאֹד, la colocación española resulta menos natural. «Gran entendimiento» conserva bien el grado y mejora la fluidez sin perder sentido.
  revised_spanish_text: Dios dio a Salomón sabiduría y gran entendimiento, y anchura de corazón[a] como la arena que está en la orilla del mar.
