id: TIT.3.15
reference: Titus 3:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀσπάζονταί σε οἱ μετ’ ἐμοῦ πάντες. ἄσπασαι τοὺς φιλοῦντας ἡμᾶς ἐν πίστει. ἡ χάρις μετὰ πάντων ⸀ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/015.yaml
  text: All who are with me greet you[a]. Greet those who love us in faith. Grace be with all of you.
  footnotes:
  - marker: a
    text: Or 'in the faith'; alternatively, 'in faithfulness.'
    reason: lexical_alternative
translation:
  language: ko
  text: 나와 함께 있는 모든 이가 그대에게 문안합니다. 믿음 안에서[a] 우리를 사랑하는 자들에게 문안하십시오. 은혜가 여러분 모두와 함께 있기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그 믿음 안에서」, 「신실함으로」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζονταί σε
  english_pob_choice: greet you
  chosen_korean: 그대에게 문안합니다
  alternatives_korean:
  - 그대에게 안부를 전합니다
  lexicon: BDAG
  rationale: ἀσπάζομαι는 인사·문안. 「문안하다」가 한국 교회 서신 전통의 정립된 등가어.
- source_word: τοὺς φιλοῦντας ἡμᾶς ἐν πίστει
  english_pob_choice: those who love us in faith
  chosen_korean: 믿음 안에서 우리를 사랑하는 자들
  alternatives_korean:
  - 신실함으로 우리를 사랑하는 자들
  - 그 믿음 안에서 우리를 사랑하는 자들
  lexicon: BDAG
  rationale: φιλέω는 애정의 사랑. ἐν πίστει는 「믿음 안에서」 — 신앙 공동체의 끈을 가리킨다. 각주로 「신실함」 어감 가능성을 둔다.
- source_word: ἡ χάρις μετὰ πάντων ὑμῶν
  english_pob_choice: Grace be with all of you
  chosen_korean: 은혜가 여러분 모두와 함께 있기를 빕니다
  alternatives_korean:
  - 은혜가 너희 모두와 함께
  - 은혜가 여러분 모두에게 있기를
  lexicon: BDAG
  rationale: 바울 서신의 표준 축도 정식. 합쇼체 「있기를 빕니다」로 종결.
