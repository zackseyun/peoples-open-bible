translation:
  language: es
  text: 'El centinela dice[a]: «Llega la mañana, y también la noche. Si quieren preguntar, pregunten; vuelvan[b], vengan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ha llegado la mañana, y también la noche»; el hebreo puede oírse tanto como una afirmación general de llegada como un anuncio más inmediato.'
    reason: lexical_alternative
  - marker: b
    text: Los mandatos finales también pueden entenderse como «vuelvan atrás, vengan otra vez», lo que sugiere ya sea arrepentimiento o simplemente regresar después para preguntar de nuevo; el hebreo deja abierto ese matiz.
    reason: alternative_reading
lexical_decisions:
- source_word: שֹׁמֵר
  english_pob_choice: the watchman
  chosen_spanish: el centinela
  alternatives_spanish:
  - el vigilante
  - el guardia
  lexicon: HALOT
  rationale: El participio sustantivado denota a quien hace guardia. «Centinela» comunica bien esa función en español y suena natural en el contexto oracular.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en discurso profético introduce la cita directa con valor vivencial. «Dice» mantiene ese efecto en español.
- source_word: אָתָה
  english_pob_choice: comes
  chosen_spanish: llega
  alternatives_spanish:
  - viene
  - ha llegado
  lexicon: HALOT
  rationale: Con בֹקֶר como sujeto, el sentido es la llegada de la mañana. «Llega» expresa bien la idea de arribo sin forzar el aspecto.
- source_word: בֹקֶר
  english_pob_choice: morning
  chosen_spanish: la mañana
  alternatives_spanish:
  - el amanecer
  lexicon: HALOT
  rationale: El sentido básico es «mañana». «Amanecer» estrecharía demasiado el tiempo; «la mañana» conserva mejor el valor léxico.
- source_word: וְגַם לָיְלָה
  english_pob_choice: and also night
  chosen_spanish: y también la noche
  alternatives_spanish:
  - pero también la noche
  - y asimismo la noche
  lexicon: HALOT
  rationale: La coordinación hebrea se conserva con «y también». Aunque el contraste contextual puede sentirse adversativo, no conviene imponerlo sin necesidad.
- source_word: אִם תִּבְעָיוּן
  english_pob_choice: if you would inquire
  chosen_spanish: si quieren preguntar
  alternatives_spanish:
  - si quisieran preguntar
  - si desean preguntar
  lexicon: HALOT
  rationale: La construcción condicional + imperfecto puede expresar invitación o voluntad. En español, «si quieren preguntar» transmite de forma natural la disposición a consultar.
- source_word: בְּעָיוּ
  english_pob_choice: inquire
  chosen_spanish: pregunten
  alternatives_spanish:
  - inquieran
  - pregunten de nuevo
  lexicon: HALOT
  rationale: Se repite la misma raíz para énfasis. En español, repetir con «preguntar/pregunten» conserva el paralelismo y resulta idiomático.
- source_word: שֻׁבוּ
  english_pob_choice: return
  chosen_spanish: vuelvan
  alternatives_spanish:
  - regresen
  - den la vuelta
  lexicon: HALOT
  rationale: שׁוב suele significar volver o regresar. «Vuelvan» mantiene la apertura entre retorno físico y vuelta para preguntar otra vez.
- source_word: אֵתָיוּ
  english_pob_choice: come
  chosen_spanish: vengan
  alternatives_spanish:
  - vuelvan a venir
  - acérquense
  lexicon: HALOT
  rationale: Como imperativo de אתה, cierra la secuencia con una invitación breve. «Vengan» preserva la tersura y la ambigüedad del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el auditorio inglés; no se adoptaron cambios revisados posteriores porque el registro más reciente indica que no hubo modificaciones y el acuerdo fue alto.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo.
  - Se evitó «SEÑOR» porque el pasaje no contiene el nombre divino.
  - Se conservó la repetición verbal con «preguntar/pregunten» para reflejar el énfasis del hebreo.
  - «Centinela» se eligió por naturalidad en español bíblico contemporáneo sin perder la idea de vigilante.
