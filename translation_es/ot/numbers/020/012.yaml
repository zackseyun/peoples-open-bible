translation:
  language: es
  text: 'Yahvé dijo a Moisés y a Aarón: «Porque no me creyeron[a], para tratarme como santo[b] ante los ojos de los hijos de Israel[c], por tanto no harán entrar a esta asamblea en la tierra que les he dado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no confiaron en mí». El verbo puede expresar tanto creer como confiar.
    reason: lexical_alternative
  - marker: b
    text: O «para santificarme» o «para mantenerme como santo». El hebreo expresa el acto de tratar a Dios como santo ante el pueblo.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino transliterado, no con una sustitución de título. 'Yahvé' mantiene la política del proyecto y la transparencia del texto fuente.
- source_word: הֶאֱמַנְתֶּם בִּי
  english_pob_choice: you did not believe me
  chosen_spanish: no me creyeron
  alternatives_spanish:
  - no confiaron en mí
  - no tuvieron fe en mí
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa creer/confiar en Dios. 'No me creyeron' es una equivalencia natural y fiel; conserva la relación directa del objeto en español sin introducir una glosa interpretativa excesiva.
- source_word: לְהַקְדִּישֵׁנִי
  english_pob_choice: to treat me as holy
  chosen_spanish: para santificarme
  alternatives_spanish:
  - para tratarme como santo
  - para reconocerme como santo
  - para mantenerme como santo
  lexicon: HALOT
  rationale: El hebreo usa el causativo de קדש, con fuerza de ‘tratar como santo / santificar’ en público. Se mantiene 'santificarme' porque preserva la tensión lexical del original y refleja la forma verbal tradicionalmente asociada con este campo semántico.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: delante de los ojos de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  lexicon: HALOT
  rationale: La imagen idiomática se conserva de manera comprensible en español. 'Delante de los ojos de' mantiene el carácter público y visible del acto.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea con precisión formal. 'Los hijos de Israel' mantiene la formulación del fuente y la política del proyecto de no neutralizar el término en el texto principal.
- source_word: לָכֵן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: HALOT
  rationale: Conector consecutivo formal y natural en español bíblico contemporáneo, apropiado para la sentencia divina.
- source_word: תָבִיאוּ
  english_pob_choice: you shall not bring
  chosen_spanish: no introducirán
  alternatives_spanish:
  - no llevarán
  - no harán entrar
  lexicon: HALOT
  rationale: El verbo causativo de בוא expresa hacer entrar/introducir. En español, 'introducirán' comunica con claridad la acción de llevar al pueblo a la tierra, con tono solemne.
- source_word: הַקָּהָל
  english_pob_choice: this assembly
  chosen_spanish: esta asamblea
  alternatives_spanish:
  - esta congregación
  - esta comunidad
  lexicon: HALOT
  rationale: '''Asamblea'' refleja el sentido de קהל sin cargar el texto con un matiz eclesiástico que ''congregación'' podría sugerir en español.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En contexto pactal y narrativo del Pentateuco, 'la tierra' es la equivalencia más natural y fiel. Evita explicitar 'prometida' donde el hebreo no lo dice aquí.
- source_word: אֲשֶׁר נָתַתִּי לָהֶם
  english_pob_choice: that I have given them
  chosen_spanish: que les he dado
  alternatives_spanish:
  - que les di
  - que estoy dando
  lexicon: HALOT
  rationale: El perfecto hebreo se traduce con el perfecto compuesto español para expresar la donación divina ya realizada desde la perspectiva del hablante.
theological_decisions:
- issue: 'Moisés y Aarón: unbelief and public sanctification are both retained'
  english_pob_reading: Because you did not believe me, to treat me as holy before the eyes of the sons of Israel, therefore you shall not bring this assembly into the land that I have given them.
  chosen_spanish_reading: Por cuanto no me creyeron, para santificarme delante de los ojos de los hijos de Israel, por tanto no introducirán a esta asamblea en la tierra que les he dado.
  alternative_spanish_readings:
  - porque no confiaron en mí, para reconocerme como santo delante de los hijos de Israel
  - por no haberme santificado ante los hijos de Israel
  rationale: 'Se conserva la doble afirmación del texto: incredulidad y falla en santificar a Dios públicamente. No se reduce la acusación a una sola causa ni se añade explicación narrativa que el versículo no ofrece.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Trato de 'בני ישראל' en español
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se mantiene la forma masculina transparente del hebreo en el texto principal, conforme a la política del proyecto y al carácter formal del pasaje.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La base auditada en inglés fue revisada desde 'believe in me' a 'believe me' para mayor precisión léxica; la presente versión española sigue esa corrección con 'no me creyeron'. También conserva la tensión entre incredulidad y santificación pública sin resolverla interpretativamente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de manera consistente con el proyecto.
  - '''Asamblea'' se prefiere a ''congregación'' para קהל en contexto narrativo del desierto.'
  - '''Los hijos de Israel'' conserva la forma fuente; la nota a pie ofrece la alternativa tradicional implícita.'
  - El verbo 'santificarme' mantiene la fuerza causativa del hebreo y la terminología del campo semántico de קדש.
  - El futuro negativo 'no introducirán' conserva el tono judicial y la consecuencia divina.
