review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la estructura y el sentido del hebreo: el fuego del altar debe mantenerse encendido, no apagarse, el sacerdote debe añadir leña cada mañana, ordenar el holocausto y quemar la grasa de los sacrificios. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría inglesa: (1) los marcadores de notas están invertidos respecto de los lugares que explican; [a] está anclado en «sobre él» pero su nota explica «mañana tras mañana», mientras [b] está anclado en «cada mañana» pero su nota explica שְׁלָמִים; (2) «sacrificios de comunión» se aparta sin suficiente necesidad del término auditado «peace offerings» y de la racionalidad documentada, que favorece un término sacrificial establecido. También «hará humear» es defendible, pero en este contexto legal suena menos natural que «quemará».'
  spanish_quality_summary: El español es claro y mayormente digno, pero «será mantenido encendido» suena algo calcado; «se mantendrá encendido» es más natural. «Sobre él» repetido varias veces refleja bien el hebreo, aunque la primera ocurrencia puede mantenerse por fidelidad. «Hará humear» resulta algo rígido y menos idiomático que «quemará» o «hará subir en humo»; para legibilidad amplia, «quemará» funciona mejor con «las porciones de grasa».
  glossary_alignment: Alineación parcial. «Holocausto» para הָעֹלָה es adecuada y estable. No hay términos del glosario mayor afectados como Yahvé/Mesías. Pero para הַשְּׁלָמִים, la auditoría inglesa documenta preferencia por un término sacrificial establecido equivalente a «peace offerings»; en español conviene «sacrificios de paz» o «ofrendas de paz», dejando «de comunión» como alternativa en nota si se desea. «Las grasas» puede precisarse mejor como «las porciones de grasa» para reflejar חֶלְבֵי.
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están anclados en palabras equivocadas.
    rationale: La nota [a] explica la repetición distributiva de «mañana», por lo que debe anclarse en «cada mañana»; la nota [b] explica שְׁלָמִים, por lo que debe anclarse en «sacrificios de paz»/término equivalente. En el borrador actual, [a] aparece en «sobre él» y [b] en «cada mañana», lo cual induce error factual.
  - severity: medium
    issue: «Sacrificios de comunión» no sigue la racionalidad léxica auditada para הַשְּׁלָמִים.
    rationale: La documentación inglesa privilegia un término sacrificial establecido equivalente a «peace offerings», con alternativas como «offerings of well-being» o «fellowship offerings». «Comunión» desplaza el eje semántico hacia una interpretación relacional y no es la mejor correspondencia principal aquí.
  - severity: medium
    issue: «Será mantenido encendido» es menos natural que una formulación española directa.
    rationale: Aunque semánticamente correcto para el pasivo de mantenimiento, en español bíblico fluido «se mantendrá encendido» expresa mejor el estado continuo requerido sin sonar traducido literalmente.
  - severity: low
    issue: «Hará humear» y «las grasas» pueden mejorarse para claridad cultual.
    rationale: «Hará humear» intenta reflejar קטר, pero en español general puede sonar extraño; «quemará» en este contexto sacrificial es más idiomático. «Las porciones de grasa» refleja mejor el carácter específico de חלב en la legislación sacrificial.
