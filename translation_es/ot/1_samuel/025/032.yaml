translation:
  language: es
  text: 'David le dijo a Abigail[a]: «¡Bendito sea Yahvé, el Dios de Israel, que te envió este día[a] a mi encuentro!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «este día»; alternativamente, «hoy».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - y dijo
  lexicon: HALOT
  rationale: El verbo narrativo introduce una declaración directa. En español, 'le dijo' expresa con naturalidad el dativo del destinatario y evita un calco innecesario de la coordinación hebrea.
- source_word: לַאֲבִיגַל
  english_pob_choice: to Abigail
  chosen_spanish: a Abigail
  alternatives_spanish:
  - para Abigail
  lexicon: HALOT
  rationale: La preposición ל marca el destinatario del discurso; 'a Abigail' es la construcción natural en español.
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito es
  - Sea bendito
  lexicon: HALOT
  rationale: La forma participial funciona como fórmula de bendición/doxología. 'Bendito sea' preserva ese giro solemne y su valor optativo/elogioso en español bíblico actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la política del proyecto. 'Yahvé' evita la sustitución por un título y mantiene la referencia al Tetragrámaton.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La construcción en español requiere artículo para sonar idiomática. 'El Dios de Israel' refleja la identificación apposicional del texto.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - quien
  lexicon: HALOT
  rationale: En español, 'que' funciona bien como relativo para una cláusula referida a una persona divina sin forzar un pronombre más marcado.
- source_word: שְׁלָחֵךְ
  english_pob_choice: sent you
  chosen_spanish: te envió
  alternatives_spanish:
  - te ha enviado
  lexicon: HALOT
  rationale: El perfecto hebreo indica una acción completada; en narrativa española, el pretérito simple comunica con naturalidad la acción de Dios al enviar a Abigail.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT
  rationale: La expresión hebrea puede ser solemne y temporal. Aquí 'hoy' comunica con claridad el valor deíctico en español sin perder el sentido temporal; la nota preserva la alternativa más literal.
- source_word: לִקְרָאתִי
  english_pob_choice: to meet me
  chosen_spanish: para recibirme
  alternatives_spanish:
  - para encontrarme
  - para venir a mi encuentro
  lexicon: HALOT
  rationale: La construcción expresa propósito de encuentro. 'Para recibirme' suena natural en español y transmite el encuentro previsto con David; se conserva la alternativa más literal en la nota.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de representar el Tetragrámaton con el nombre propio divino. 'Yahvé' mantiene la distinción entre nombre y título, y es el equivalente natural en la tradición española del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula de bendición dirigida a Dios
  english_pob_reading: Blessed be Yahweh
  chosen_spanish_reading: ¡Bendito sea Yahvé!
  alternative_spanish_readings:
  - ¡Bendito es Yahvé!
  - ¡Sea bendito Yahvé!
  rationale: La bendición en hebreo tiene fuerza doxológica; 'Bendito sea' conserva mejor la solemnidad y el matiz de declaración laudatoria que una simple afirmación copulativa.
  doctrine_reference: Uso bíblico de bendición/doxología en fórmulas de alabanza
translation_notes:
  revision_awareness: Concordancia alta con el texto base inglés y el hebreo. Se preserva la estructura narrativa y la fórmula de bendición; la única decisión de tensión léxica destacable es הַיּוֹם הַזֶּה, donde el español principal usa 'hoy' por naturalidad, dejando en nota la alternativa más literal 'este día'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme a la política del proyecto.
  - Se usa 'Dios de Israel' con artículo para fluidez idiomática en español.
  - Se evita 'Cristo' y otras sustituciones no presentes en el texto fuente.
  - '''Recibirme'' se eligió por naturalidad contextual; la nota documenta la alternativa más literal del hebreo.'
