translation:
  language: es
  text: Y hacia el asedio de Jerusalén pondrás tu rostro[a], con tu brazo descubierto, y profetizarás contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de ella». El hebreo עַל puede ser más amplio, pero en este contexto de asedio y juicio la fuerza adversativa es la más adecuada.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְצוֹר
  english_pob_choice: siege
  chosen_spanish: sitio de asedio
  alternatives_spanish:
  - asedio
  - cerco
  lexicon: HALOT
  rationale: El sustantivo nombra un estado de sitiar o de estar sitiado. En español, «sitio de asedio» conserva la idea del evento/estado y suena natural en este contexto profético en el que se dramatiza el juicio sobre Jerusalén.
- source_word: תָּכִין פָּנֶיךָ
  english_pob_choice: you shall set your face
  chosen_spanish: pondrás tu rostro
  alternatives_spanish:
  - dirigirás tu rostro
  - fijarás tu rostro
  lexicon: HALOT
  rationale: La expresión idiomática hebrea con «rostro» comunica orientación resuelta hacia algo. «Pondrás tu rostro» mantiene la imagen bíblica sin volverla demasiado explicativa; «fijarás tu rostro» sería posible, pero menos directa en español.
- source_word: זְרֹעֲךָ חֲשׂוּפָה
  english_pob_choice: with your arm bared
  chosen_spanish: con tu brazo descubierto
  alternatives_spanish:
  - con tu brazo desnudo
  - con el brazo al descubierto
  lexicon: HALOT
  rationale: El hebreo es nominal y literalmente dice «y tu brazo descubierto». «Descubierto» preserva la imagen de exposición/puesta al descubierto y funciona de forma digna y clara en español; «desnudo» puede sonar más marcado de lo necesario.
- source_word: וְנִבֵּאתָ עָלֶיהָ
  english_pob_choice: and you shall prophesy against it
  chosen_spanish: y profetizarás contra ella
  alternatives_spanish:
  - y profetizarás acerca de ella
  - y hablarás proféticamente contra ella
  lexicon: HALOT
  rationale: La preposición עַל puede ser amplia, pero en este signo de juicio la fuerza adversativa es la más probable y la adoptada por la POB inglesa. Como Jerusalén es femenina en español, «contra ella» mantiene la referencia natural y el tono judicial.
theological_decisions:
- issue: Fuerza adversativa de la profecía dirigida a Jerusalén
  english_pob_reading: The prophecy is rendered as directed 'against' Jerusalem in keeping with the judgment context.
  chosen_spanish_reading: La profecía se traduce como dirigida «contra» Jerusalén, conforme al contexto de asedio y juicio.
  alternative_spanish_readings:
  - «acerca de» ella
  - «sobre» ella
  rationale: Aunque עַל puede abarcar sentidos más neutrales, aquí el acto simbólico anuncia juicio. Mantener «contra» preserva la severidad del pasaje sin añadir interpretación externa al contexto inmediato.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota con el marcador [a] dentro del texto. No se realizaron cambios de contenido adicionales respecto al sentido auditado; solo se ajustó la colocación de la nota para que coincida con el anclaje en la traducción.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda en este proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Profetizarás» conserva el verbo técnico profético sin sustituirlo por una paráfrasis.
  - «Jerusalén» se mantiene como nombre propio femenino, por lo que el pronombre retomado es «ella».
  - «Brazo descubierto» sigue la imagen corporal del hebreo sin forzar una explicación interpretativa en el texto principal.
