    text: Hebrew 'seventy sevens'; many understand this as seventy weeks of years.
    reason: lexical_alternative
  - marker: b
    text: Or 'to put an end to sins.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew reads 'vision and prophet'; some ancient and modern interpreters understand this as 'vision and prophecy.'
    reason: alternative_reading
  - marker: d
    text: Or 'to anoint a most holy one'; the Hebrew phrase can refer to the holiest place or thing, and some interpret it personally.
    reason: alternative_reading
