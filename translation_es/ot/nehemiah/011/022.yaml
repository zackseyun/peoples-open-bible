translation:
  language: es
  text: Y el encargado de los levitas en Jerusalén era Uzzi hijo de Bani, hijo de Hasabías, hijo de Matanías, hijo de Mica, de los hijos de Asaf, los cantores, a cargo[a] de la obra de la casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la obra de la casa de Dios». La preposición hebrea לְנֶגֶד puede expresar supervisión o responsabilidad en relación con el trabajo de la casa de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְקִיד
  english_pob_choice: the overseer
  chosen_spanish: el encargado
  alternatives_spanish:
  - el supervisor
  - el sobreveedor
  - el oficial
  lexicon: HALOT
  rationale: פקיד denota a alguien puesto a cargo o con función de supervisión. En español, «encargado» transmite responsabilidad administrativa sin sonar demasiado técnico ni introducir una jerarquía no expresada en el hebreo.
- source_word: הַלְוִיִּם
  english_pob_choice: of the Levites
  chosen_spanish: de los levitas
  alternatives_spanish:
  - sobre los levitas
  lexicon: HALOT
  rationale: El constructo señala relación con los levitas; «de los levitas» mantiene esa relación de manera natural en español y deja que «encargado» cargue la idea de supervisión.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Valor locativo directo y transparente.
- source_word: עֻזִּי בֶן בָּנִי בֶּן חֲשַׁבְיָה בֶּן מַתַּנְיָה בֶּן מִיכָא
  english_pob_choice: Uzzi son of Bani, son of Hashabiah, son of Mattaniah, son of Mica
  chosen_spanish: Uzzi hijo de Bani, hijo de Hasabías, hijo de Matanías, hijo de Mica
  alternatives_spanish:
  - Uzzi, descendiente de Bani, descendiente de Hasabías, descendiente de Matanías, descendiente de Mica
  lexicon: HALOT
  rationale: Los nombres propios se transliteran; בן se rinde repetidamente como «hijo de» para conservar la estructura genealógica explícita del hebreo. «Descendiente de» suavizaría la cadena genealógica y perdería precisión formal.
- source_word: מִבְּנֵי אָסָף
  english_pob_choice: from the sons of Asaph
  chosen_spanish: de los hijos de Asaf
  alternatives_spanish:
  - de entre los descendientes de Asaf
  - de los descendientes de Asaf
  lexicon: HALOT
  rationale: La expresión conserva la formulación genealógico-tribal del hebreo. «Hijos de Asaf» es más literal que «descendientes» y mantiene el vínculo textual con la lista levítica.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores del templo
  - los cantores y músicos
  - los cantores
  lexicon: HALOT
  rationale: El participio identifica a los asafitas por su función litúrgica de cantar. En español, «cantores» es preciso y más natural que «cantantes»; preserva el matiz culto de la función.
- source_word: לְנֶגֶד
  english_pob_choice: over the work
  chosen_spanish: sobre la obra
  alternatives_spanish:
  - a cargo de la obra
  - encargado de la obra
  - frente a la obra
  lexicon: HALOT
  rationale: El contexto administrativo favorece un sentido de responsabilidad/supervisión. «Sobre la obra» refleja la relación de autoridad o vigilancia sin forzar una perífrasis más interpretativa. Se conserva la tensión semántica entre «delante de» y «a cargo de» en una nota.
- source_word: מְלֶאכֶת
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - el servicio
  - la labor
  lexicon: HALOT
  rationale: מְלָאכָה puede ser trabajo, labor u obra. En el marco del templo, «obra» resulta solemne y natural en español, y mantiene la amplitud de la tarea sin restringirla a «servicio».
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casa de Dios». «Casa de Dios» preserva la forma del original; «templo de Dios» explicita la referencia pero se aparta de la metáfora textual.
theological_decisions:
- issue: Relación de לְנֶגֶד con la función de Uzzi
  english_pob_reading: ‘over the work of the house of God’ indicates oversight or responsibility regarding temple work.
  chosen_spanish_reading: «sobre la obra de la casa de Dios» sugiere responsabilidad de supervisión sin convertir la frase en una explicación explícita.
  alternative_spanish_readings:
  - a cargo de la obra de la casa de Dios
  - encargado de la obra de la casa de Dios
  - frente a la obra de la casa de Dios
  rationale: El hebreo permite una relación de supervisión/posición frente a la obra. La redacción elegida deja visible esa ambigüedad funcional y evita cerrar demasiado el sentido, en consonancia con la nota auditada del inglés.
  doctrine_reference: Nehemías 11:22; nota léxica sobre לְנֶגֶד en el audit trail
- issue: Identificación de los asafitas
  english_pob_reading: ‘the singers’ is a temple-role designation for the sons of Asaph.
  chosen_spanish_reading: «los cantores» mantiene el carácter litúrgico del grupo sin ampliarlo a una categoría general de músicos.
  alternative_spanish_readings:
  - los músicos
  - los líderes de canto
  rationale: El texto no habla de músicos en general, sino de una función cultual específica. «Cantores» es el equivalente más fiel y transparente en español.
  doctrine_reference: Nehemías 11:22; uso levítico/asafita en el contexto del templo
translation_notes:
  revision_awareness: He seguido la revisión auditada del inglés que corrigió la relación de לְנֶגֶד desde una mera finalidad («for the work») hacia una idea de responsabilidad/supervisión («over the work»). La redacción española busca conservar esa actualización sin perder la literalidad del hebreo ni volverla excesivamente interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto, pero este versículo contiene solo «Dios», por lo que no aplica aquí.
  - Se transliteran los nombres propios con criterios uniformes; «Asaf» sigue la forma española estable del nombre.
  - Se usa «casa de Dios» en lugar de «templo de Dios» para conservar la metáfora hebrea.
  - «Cantores» se emplea como término funcional-lituŕgico, no como referencia genérica a música.
  - La nota [a] se ancla en «sobre» para reflejar la alternativa de supervisión indicada por el audit trail en inglés.
