translation:
  language: es
  text: Y se acercó hasta la subida de Bet-horón[a], y Judas salió a su encuentro con solo unos pocos hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego Μεθωρών refleja el lugar comúnmente conocido como Bet-horón.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισεν
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - llegó cerca
  lexicon: LSJ
  rationale: El aoristo de ἐγγίζω expresa aproximación; «se acercó» es natural en español y conserva el movimiento hacia el lugar sin agregar matiz innecesario.
- source_word: ἕως ἀναβάσεως
  english_pob_choice: as far as the ascent
  chosen_spanish: hasta la subida
  alternatives_spanish:
  - hasta la ascensión
  - hasta el ascenso
  lexicon: LSJ
  rationale: ἕως con genitivo marca el límite del avance, y ἀνάβασις aquí designa una subida topográfica. «Subida» transmite mejor ese rasgo en español contemporáneo que un calco más abstracto.
- source_word: Μεθωρών
  english_pob_choice: Beth-horon
  chosen_spanish: Bet-horón
  alternatives_spanish:
  - Beth-horón
  - Methorón
  lexicon: LSJ
  rationale: Aunque el griego dice Μεθωρών, el lugar corresponde al conocido Bet-horón. Se adopta la forma geográfica estándar en español, siguiendo la práctica de nombres propios del POB.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió de allí
  - se fue
  lexicon: LSJ
  rationale: El verbo significa literalmente «salió»; en español es más directo y preciso que una paráfrasis militarizada no presente en el texto.
- source_word: εἰς συνάντησιν αὐτῷ
  english_pob_choice: to meet him
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarse con él
  - para salir a recibirlo
  lexicon: LSJ
  rationale: La locución idiomática indica salir para encontrarse con alguien. «A su encuentro» conserva esa idiomaticidad con buena fluidez en español.
- source_word: ὀλίγος
  english_pob_choice: with only a few men
  chosen_spanish: con solo unos pocos hombres
  alternatives_spanish:
  - con unos pocos hombres
  - con poca gente
  - con un pequeño grupo
  lexicon: LSJ
  rationale: El adjetivo funciona predicativamente y exige en español explicitar el complemento. «Con solo unos pocos hombres» comunica la escasez de efectivos sin introducir más contenido del que el griego ofrece.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden ampliamente; no se detectaron revisiones sustantivas aplicables. La única decisión relevante es la normalización del topónimo a Bet-horón en español, manteniendo el sentido topográfico de ἀνάβασις y la idea de un contingente reducido.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico sin calcos innecesarios.
  - «Bet-horón» sigue la convención de topónimos, no una transliteración mecánica del griego.
  - «Se acercó» y «salió a su encuentro» preservan la progresión narrativa del original.
  - «Con solo unos pocos hombres» explicita la cantidad implícita en ὀλίγος sin intensificar el tono militar.
