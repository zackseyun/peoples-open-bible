base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/029/026.yaml
  text: Yahweh has made you priest in place of Jehoiada the priest[a], to be officers in the house of Yahweh over every man who is mad and acts as a prophet[c][b], and you should put him into the stocks and the iron collar.
  footnotes:
  - marker: a
    text: Or 'to be officers' or 'to be supervisors'; the Hebrew has a plural noun ('overseers/officers') even though the addressee is singular.
    reason: lexical_alternative
  - marker: b
    text: Or 'prophesies'; the Hebrew participle can be rendered more neutrally, but the main text reflects the hostile tone of the speaker.
    reason: alternative_reading
  - marker: c
    text: The exact meaning of 'the neck iron' is uncertain; it likely refers to an iron restraint or collar used with the stocks.
    reason: cultural_note
