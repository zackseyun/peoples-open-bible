translation:
  language: es
  text: 'Entonces Yahvé Dios le dijo a la mujer[a]: «¿Qué es esto que has hecho?» Y la mujer dijo: «La serpiente me engañó, y comí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la esposa». El hebreo אִשָּׁה puede significar 'mujer' o 'esposa'; aquí se prefiere 'mujer' por ser la designación narrativa inmediata.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del texto hebreo con la transliteración ya adoptada por POB en español. Esto evita la sustitución por un título y mantiene la transparencia respecto del Tetragrámaton.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En la combinación יְהוָה אֱלֹהִים, 'Yahvé Dios' reproduce de modo natural la pareja nombre+título del hebreo y resulta claro en español.
- source_word: לָאִשָּׁה
  english_pob_choice: to the woman
  chosen_spanish: a la mujer
  alternatives_spanish:
  - a la esposa
  lexicon: HALOT
  rationale: Aquí 'mujer' sigue el uso narrativo inmediato del pasaje. 'Esposa' es posible por el campo semántico de אִשָּׁה, pero introduce un matiz relacional no explicitado como principal en este versículo.
- source_word: מַה זֹּאת עָשִׂית
  english_pob_choice: What is this you have done?
  chosen_spanish: ¿Qué es esto que has hecho?
  alternatives_spanish:
  - ¿Qué has hecho?
  - ¿Por qué has hecho esto?
  lexicon: HALOT
  rationale: La estructura española conserva tanto el interrogativo como el demostrativo de la expresión hebrea. '¿Qué has hecho?' es más breve, pero pierde parte del énfasis de זֹאת; '¿Por qué...?' añadiría una causalidad que el hebreo no expresa directamente.
- source_word: הַנָּחָשׁ
  english_pob_choice: the serpent
  chosen_spanish: la serpiente
  alternatives_spanish:
  - la culebra
  - la víbora
  lexicon: HALOT
  rationale: '''Serpiente'' mantiene la resonancia literaria y teológica de Génesis 3 mejor que un término coloquial como ''culebra''. El artículo y el género se ajustan al español sin cambiar el referente.'
- source_word: הִשִּׁיאַנִי
  english_pob_choice: deceived me
  chosen_spanish: me engañó
  alternatives_spanish:
  - me engañó y me desvió
  - me sedujo
  - me hizo caer
  lexicon: HALOT
  rationale: '''Engañó'' cubre bien el sentido de inducir al error o a la falsa percepción y es natural en español contemporáneo. ''Beguiled'' en inglés no obliga a una solución más arcaica en español; ''sedujo'' podría sugerir connotaciones no presentes aquí.'
- source_word: וָאֹכֵל
  english_pob_choice: and I ate
  chosen_spanish: y comí
  alternatives_spanish:
  - y yo comí
  - así que comí
  lexicon: HALOT
  rationale: La forma verbal se vierte de manera directa y sencilla. 'Comí' preserva el hecho consumado sin añadir matiz causal; 'así que' interpretaría más de lo que dice el hebreo.
theological_decisions:
- issue: Mantenimiento del nombre divino frente a la sustitución por título
  english_pob_reading: Yahweh God
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el SEÑOR Dios
  - Yahvé el Dios
  rationale: Se conserva el nombre propio divino en lugar de la sustitución tradicional por un título, siguiendo la práctica POB y la transparencia hacia el hebreo. La secuencia 'Yahvé Dios' reproduce el valor del binomio יְהוָה אֱלֹהִים sin ocultar el nombre revelado.
  doctrine_reference: Transparencia del Tetragrámaton; coherencia con la política textual de POB.
- issue: Fuerza moral del verbo de la serpiente
  english_pob_reading: The serpent deceived me
  chosen_spanish_reading: La serpiente me engañó
  alternative_spanish_readings:
  - La serpiente me engañó/engatusó
  - La serpiente me sedujo
  rationale: '''Engañó'' preserva la atribución de error y culpa sin cargar el pasaje con un tono más interpretativo o arcaizante. Se mantiene la tensión textual: la mujer atribuye el acto al engaño de la serpiente, pero no se elimina la responsabilidad humana implícita en la respuesta divina del contexto.'
  doctrine_reference: Responsabilidad moral humana en el marco narrativo de Génesis 3.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide con la decisión inglesa de mantener 'deceived me' en registro claro y moderno. No se introdujeron cambios de sentido respecto del audit trail inglés; solo se naturalizó la sintaxis al español y se preservó el nombre divino Yahvé.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se mantuvo 'Dios' para אֱלֹהִים en la combinación fija 'Yahvé Dios'.
  - '''Serpiente'' conserva el registro bíblico-literario del relato.'
  - '''Me engañó'' mantiene el valor de decepción/malentendido sin arcaísmo.'
  - El orden discursivo 'Entonces ... le dijo ... Y ... dijo' refleja la progresión narrativa hebrea sin rigidizarla.
