    rationale: Como nombre festivo reconocido, ‘Fiesta de los Panes sin Levadura’ se beneficia de mayúsculas iniciales en este proyecto y armoniza mejor con el inglés auditado.
  revised_spanish_text: Y celebraron la Fiesta de los Panes sin Levadura por siete días, con alegría, porque Yahvé los había alegrado[a] y había vuelto el corazón del rey de Asiria[b] hacia ellos[c], para fortalecer sus manos en la obra de la casa de Dios, el Dios de Israel.
