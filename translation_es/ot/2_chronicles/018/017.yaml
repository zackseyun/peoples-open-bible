translation:
  language: es
  text: 'Entonces el rey de Israel dijo a Josafat: «¿No te dije que él no profetizaría bien acerca de mí, sino solo mal[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que él no profetizaría nada bueno acerca de mí, sino solo desastre».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. «Entonces» conserva la secuencia narrativa con naturalidad en español sin perder el enlace con la escena previa.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el rey israelita
  - Israel, el rey
  lexicon: HALOT
  rationale: Se mantiene la cadena constructa de forma directa y formal. «El rey de Israel» es claro, idiomático y fiel al referente narrativo.
- source_word: אֶל יְהוֹשָׁפָט
  english_pob_choice: to Jehoshaphat
  chosen_spanish: a Josafat
  alternatives_spanish:
  - a rey Josafat
  - a Jehosafat
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del discurso. Se conserva el nombre propio sin añadir un título que el hebreo no da aquí.
- source_word: הֲלֹא
  english_pob_choice: Did I not
  chosen_spanish: ¿No te dije... ?
  alternatives_spanish:
  - ¿Acaso no te dije... ?
  - ¿No dije yo...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que presupone respuesta afirmativa. En español, «¿No te dije...?» transmite mejor el valor retrospectivo y acusatorio del contexto.
- source_word: אָמַרְתִּי אֵלֶיךָ
  english_pob_choice: tell you
  chosen_spanish: te dije
  alternatives_spanish:
  - te había dicho
  - te había comentado
  lexicon: HALOT
  rationale: El verbo en perfecto con destinatario se expresa de manera natural como «te dije». El verbo «decir» mantiene la referencia al acto de hablar sin diluir la fuerza de la reprensión.
- source_word: לֹא יִתְנַבֵּא
  english_pob_choice: he would not prophesy
  chosen_spanish: él no profetizaría
  alternatives_spanish:
  - él no profetiza
  - él no profetizará
  lexicon: HALOT
  rationale: Se refleja el valor de futuro en el discurso referido después de un verbo pasado, como en el audit trail inglés. «Profetizaría» comunica adecuadamente el futuro en el pasado en español.
- source_word: עָלַי
  english_pob_choice: concerning me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - respecto de mí
  lexicon: HALOT
  rationale: La preposición indica referencia al tema de la profecía. «Acerca de mí» es natural en español y mantiene la relación semántica sin sugerir beneficio o perjuicio por sí misma.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - algo bueno
  - lo bueno
  lexicon: HALOT
  rationale: Aunque el hebreo usa «bien/bueno» como sustantivo, en español «profetizar bien» comunica mejor la idea de una profecía favorable y evita una construcción torpe. Se conserva la oposición léxica mediante el contraste con «mal».
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: sino solo
  alternatives_spanish:
  - sino únicamente
  - pero solo
  lexicon: HALOT
  rationale: La expresión marca contraste restrictivo. «Sino solo» reproduce con naturalidad la exclusión enfática de todo lo demás.
- source_word: לְרָע
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - daño
  - desastre
  lexicon: HALOT
  rationale: En este contexto, el término contrasta con «bien» y expresa una predicción desfavorable. «Mal» preserva el paralelismo hebreo sin sobreinterpretarlo como maldad moral.
theological_decisions:
- issue: Contraste semántico entre טוב y רע
  english_pob_reading: Rendered the contrast as 'good ... but only evil' without softening to 'favorable ... unfavorable.'
  chosen_spanish_reading: Se mantiene el contraste como «bien ... sino solo mal», sin reemplazarlo por un giro explicativo más débil.
  alternative_spanish_readings:
  - «algo bueno ... sino solo desastre»
  - «lo favorable ... sino solo daño»
  rationale: El verso cita la queja de Acab sobre la costumbre profética de Micaías. En español, «bien/mal» conserva el paralelismo breve y agudo del hebreo y deja que el contexto determine que se trata de contenido profético desfavorable, no de una afirmación moral abstracta.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La base inglesa fue revisada y quedó sin cambios; por eso esta versión española sigue de cerca la decisión auditada de mantener el contraste breve y el tono narrativo directo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponde, pero en este versículo no aparece.
  - Se conserva «profetizar» como verbo técnico sin sustituirlo por una paráfrasis.
  - Se mantiene la oposición breve «bien/mal» para reflejar la antítesis hebrea.
  - Los nombres propios se adaptan a la forma española común sin alterar el referente.
