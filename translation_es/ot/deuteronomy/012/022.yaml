revisions:
- from: Pero, así como se come el ciervo[a] y el venado, así lo comerás tú[b]; el impuro y el puro, juntos, lo comerán.
  to: Pero, así como se comen la gacela[a] y el ciervo, así podrás comerlo[b]; el impuro y el puro podrán comerlo por igual.
  rationale: 'Se corrige el texto para seguir más de cerca el hebreo y el expediente inglés: se restituye «gacela» como opción principal para צבי y se conserva una alternativa zoológica en nota; se expresa el valor permisivo de los imperfectos legales con «podrás / podrán»; se reemplaza «juntos» por «por igual» para reflejar el sentido de יַחְדָּו; y se sustituye la nota b por la aclaración cultural sobre el estado ritual de quienes pueden comerlo. La redacción resultante es más fiel y más clara en español eclesial contemporáneo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:56:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura comparativa general, pero se aparta del sentido fuente y del expediente inglés en varios puntos: invierte/oscurece la identificación zoológica principal al poner «ciervo» en el texto y relegar «gacela» a nota; cambia el matiz permisivo de los imperfectos legales por futuros prescriptivos («lo comerás», «lo comerán»); y traduce יַחְדָּו como «juntos», que sugiere simultaneidad en lugar de igualdad de permiso. También la nota b no preserva la nota cultural del inglés sobre el estado ritual de las personas.'
  spanish_quality_summary: 'El español es legible, pero algunas decisiones suenan menos naturales o menos precisas para este contexto legal: «así lo comerás tú» es enfático sin necesidad; «el impuro y el puro» puede entenderse moralmente más que ritualmente; «juntos» distorsiona el sentido. Una redacción más clara y fiel en español sería «Pero, así como se comen la gacela[a] y el ciervo, así podrás comerlo[b]; el impuro y el puro podrán comerlo por igual».'
  glossary_alignment: 'No hay términos del glosario mayor directamente en juego, pero sí hay desalineación con las decisiones léxicas documentadas del POB: צבי debe reflejarse preferentemente como «gacela» con alternativa en nota, no al revés; הַטָּמֵא / הַטָּהוֹר deben conservar el contraste ritual, lo que conviene aclarar en nota cultural; y los imperfectos legales deben expresarse como permiso («podrás / podrán») mejor que como simple futuro prescriptivo.'
  issues:
  - severity: high
    issue: Identificación zoológica principal incorrectamente priorizada
    rationale: El expediente inglés elige «the gazelle» para הַצְּבִי y deja «roe deer» como alternativa. El borrador pone «ciervo»/«venado» en el texto y relega «gacela» a nota, invirtiendo la decisión auditada sin necesidad.
  - severity: high
    issue: Pérdida del matiz permisivo en los verbos
    rationale: תֹּאכְלֶנּוּ y יֹאכְלֶנּוּ se documentan como permiso legal («you may eat it»). «Lo comerás tú» y «lo comerán» tienden a sonar prescriptivos o predictivos, no permisivos.
  - severity: medium
    issue: יַחְדָּו traducido como «juntos»
    rationale: Aquí el sentido principal es «por igual / igualmente», no necesariamente comer al mismo tiempo. «Juntos» introduce una imagen de simultaneidad que el expediente inglés descartó.
  - severity: medium
    issue: Nota b no preserva la nota cultural del POB
    rationale: La nota inglesa explica que se refiere a personas ritualmente impuras y limpias. La nota española actual habla del valor normativo del verbo, pero deja sin documentar la referencia cultural principal.
  - severity: low
    issue: «Impuro»/«puro» puede requerir apoyo contextual
    rationale: La pareja es defendible en español, pero sin nota puede leerse moralmente. Conviene conservarla en el texto por concisión y aclarar en nota que se trata de estado ritual.
  revised_spanish_text: Pero, así como se comen la gacela[a] y el ciervo, así podrás comerlo[b]; el impuro y el puro podrán comerlo por igual.
  revised_footnotes:
  - marker: a
    text: O, «el corzo y el venado».
    reason: lexical_alternative
  - marker: b
    text: Es decir, tanto las personas ritualmente impuras como las ritualmente puras pueden comerlo.
    reason: cultural_note
  revision_rationale: 'Se corrige el texto para seguir más de cerca el hebreo y el expediente inglés: se restituye «gacela» como opción principal para צבי y se conserva una alternativa zoológica en nota; se expresa el valor permisivo de los imperfectos legales con «podrás / podrán»; se reemplaza «juntos» por «por igual» para reflejar el sentido de יַחְדָּו; y se sustituye la nota b por la aclaración cultural sobre el estado ritual de quienes pueden comerlo. La redacción resultante es más fiel y más clara en español eclesial contemporáneo.'
