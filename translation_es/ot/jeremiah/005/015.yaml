revisions:
- from: ¡Miren![a] Yo estoy trayendo contra ustedes una nación desde lejos, oh casa de Israel, declara Yahvé. Es una nación poderosa; es una nación antigua[b], una nación cuya lengua no conoces[c], y cuyo hablar no entiendes.
  to: ¡Miren![a] Yo estoy trayendo contra ustedes una nación desde lejos, oh casa de Israel, declara Yahvé. Es una nación poderosa; es una nación antigua[b], una nación cuya lengua no conocen[c], y cuya habla no entienden.
  rationale: Se corrige la concordancia al plural para armonizar con «ustedes» y con la lectura natural en español del referente colectivo. También se ajusta «cuyo hablar» a «cuya habla» para una expresión más idiomática sin apartarse del sentido del hebreo ni del POB inglés. El resto del verso puede conservarse.
