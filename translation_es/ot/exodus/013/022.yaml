revisions:
- from: La columna de nube durante el día y la columna de fuego durante la noche no se apartaba de delante del pueblo[a].
  to: El pilar de nube de día y el pilar de fuego de noche no se apartaba de delante del pueblo[a].
  rationale: Se revisa para alinear עַמּוּד con la elección documentada «pillar/pilar», mejorar la naturalidad del paralelismo temporal con «de día / de noche», y mantener la nota léxica sobre יָמִישׁ sin cambiar el sentido. La estructura espacial «de delante del pueblo» se conserva porque refleja adecuadamente לִפְנֵי con el verbo de apartarse.
