    text: O «que estaba encima de las aguas del río».
    reason: lexical_alternative
  - marker: b
    text: O «¿Hasta cuándo será el fin de estas cosas asombrosas?».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la pregunta principal para que el español exprese con claridad la fuerza prospectiva de עַד מָתַי sin alejarse del hebreo. Se elimina la nota errónea sobre «vestido sobre lino» y se restauran notas al pie que sí corresponden a las alternativas documentadas en la POB inglesa: la posición «sobre/encima de» las aguas y la alternativa «cosas asombrosas» para הַפְּלָאוֹת.'
