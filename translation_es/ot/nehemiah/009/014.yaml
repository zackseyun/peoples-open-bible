translation:
  language: es
  text: Les diste a conocer tu santo sábado, y les mandaste mandamientos, estatutos y una ley[a] por medio de Moisés, tu siervo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘instrucción’ para תוֹרָה, destacando el matiz de enseñanza además de obligación legal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘por la mano de Moisés, tu siervo’; es un modismo que significa ‘por medio de Moisés, tu siervo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁבַּת קָדְשְׁךָ
  english_pob_choice: your holy Sabbath
  chosen_spanish: tu santo sábado
  alternatives_spanish:
  - tu sagrado sábado
  - tu sábado santo
  lexicon: HALOT
  rationale: שַׁבַּת se traduce con precisión como 'sábado'; קָדְשְׁךָ funciona aquí adjetivalmente, por lo que 'santo' conserva la cualidad cultual sin volver más rígida la frase. 'Tu santo sábado' mantiene la referencia específica al día pactal.
- source_word: הוֹדַעַתָ
  english_pob_choice: made ... known
  chosen_spanish: hiciste conocer
  alternatives_spanish:
  - daste a conocer
  - lo revelaste
  lexicon: HALOT
  rationale: 'El hiphil de ידע es causativo: ''hacer saber / hacer conocer''. ''Hiciste conocer'' conserva el valor causativo y suena natural en español bíblico contemporáneo.'
- source_word: מִצְוֹת
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - mandatos
  lexicon: HALOT
  rationale: '''Mandamientos'' es el equivalente más directo y mantiene el registro legal-covenantal del verso.'
- source_word: חֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' preserva el matiz de disposiciones fijadas o establecidas y funciona bien en la tríada legal del texto.'
- source_word: תוֹרָה
  english_pob_choice: a law
  chosen_spanish: una ley
  alternatives_spanish:
  - instrucción
  - enseñanza
  lexicon: HALOT
  rationale: Aquí תוֹרָה aparece dentro de una secuencia jurídica junto a 'mandamientos' y 'estatutos'; por eso 'ley' es la opción más fuerte en español. Se conserva el artículo indefinido reflejando el singular anarthrous del hebreo, como en el audit trail inglés.
- source_word: צִוִּיתָ
  english_pob_choice: you commanded them
  chosen_spanish: les mandaste
  alternatives_spanish:
  - les ordenaste
  - les diste mandato
  lexicon: HALOT
  rationale: El piel de צוה expresa comando directo. 'Mandaste' preserva la fuerza imperativa sin sonar excesivamente técnico en español.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: La locución idiomática בְּיַד indica mediación/agency. En español, 'por medio de' comunica la mediación con claridad y naturalidad, mientras la nota explica el sentido literal.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En este contexto, el término vocacional y honorífico 'siervo' es la forma más natural y fiel para משה como agente de Yahvé. 'Esclavo' sería demasiado áspero para un apelativo reverente de Moisés en español.
theological_decisions:
- issue: Renderización de la tríada legal מִצְוֹת וְחֻקִּים וְתוֹרָה
  english_pob_reading: commandments and statutes and a law
  chosen_spanish_reading: mandamientos, estatutos y una ley
  alternative_spanish_readings:
  - mandamientos, estatutos e instrucción
  - mandatos, decretos y enseñanza
  rationale: Conviene mantener la diferenciación de los tres términos sin fusionarlos. 'Ley' conserva el marco normativo; 'una ley' sigue el artículo indefinido del inglés POB revisado y del hebreo anarthrous, sin suavizar la densidad jurídica del pasaje.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto inglés revisado añadió el artículo indefinido antes de 'law' para reflejar mejor el singular anarthrous; la versión española lo refleja con 'una ley'. También se decidió resolver el idiomático בְּיַד מֹשֶׁה como 'por medio de Moisés' en el cuerpo, manteniendo la transparencia semántica sin calcar la metáfora de 'mano'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en la serie POB cuando el Tetragrámaton aparezca; aquí el versículo no lo incluye explícitamente.
  - '''Mandamientos'' y ''estatutos'' conservan la tríada legal sin sustitución por términos eclesiales más libres.'
  - '''Siervo'' se usa para עַבְדֶּךָ en coherencia con un registro reverente y bíblico, evitando ''esclavo'' en un apelativo dirigido a Moisés.'
  - La nota [a] está anclada en 'ley[a]' para cumplir la correspondencia exacta entre marcador y texto.
