  text: וַ/יַּ֥עַן יַעֲקֹ֖ב וַ/יֹּ֣אמֶר לְ/לָבָ֑ן כִּ֣י יָרֵ֔אתִי כִּ֣י אָמַ֔רְתִּי פֶּן תִּגְזֹ֥ל אֶת בְּנוֹתֶ֖י/ךָ מֵ/עִמִּֽ/י־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/031/031.yaml
  text: Then Jacob answered and said to Laban[a], “Because I was afraid, for I said[b], ‘Lest you take your daughters from me by force.’”
  footnotes:
  - marker: a
    text: Or, more literally, “lest you rob/snatch your daughters from me.” The Hebrew verb carries a stronger sense of wrongful seizure than the smoother English 'take away.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for I said'.
    reason: previous_rendering
