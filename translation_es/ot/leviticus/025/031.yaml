  text: But the houses of the villages that have no wall around them shall be regarded as the fields of the land[a]; redemption shall be available for them[b], and in the Jubilee they shall go out.
  footnotes:
  - marker: a
    text: Literally, 'shall be reckoned as the field of the land,' meaning these village houses are treated legally like rural land rather than like houses in a walled city.
    reason: lexical_alternative
  - marker: b
    text: Or 'and in the Jubilee it shall go out'—that is, the property reverts in the Jubilee year.
    reason: lexical_alternative
