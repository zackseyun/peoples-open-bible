translation:
  language: es
  text: El viviente, el viviente, él te da gracias, como yo lo hago hoy; un padre da a conocer a sus hijos tu fidelidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu verdad». El hebreo אֱמֶת puede expresar verdad, fidelidad o confiabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי חַי
  english_pob_choice: The living, the living
  chosen_spanish: El viviente, el viviente
  alternatives_spanish:
  - El que vive, el que vive
  - El vivo, el vivo
  lexicon: HALOT
  rationale: La repetición hebrea es enfática y conviene conservarla. «El viviente» reproduce el sustantivo/adjetivo substantivado con tono natural en español y evita expandir innecesariamente la frase.
- source_word: יוֹדֶךָ
  english_pob_choice: he gives thanks to you
  chosen_spanish: te da gracias
  alternatives_spanish:
  - te alaba
  - te reconoce
  lexicon: HALOT
  rationale: El hifil de ידה en este contexto expresa acción de gracias dirigida a Dios. En español, «te da gracias» comunica bien la fuerza de agradecimiento sin perder la orientación personal del verbo.
- source_word: כָּמוֹנִי הַיּוֹם
  english_pob_choice: as I do today
  chosen_spanish: como yo hoy
  alternatives_spanish:
  - como yo lo hago hoy
  - como yo en este día
  lexicon: HALOT
  rationale: 'El hebreo compara al viviente con la experiencia actual del hablante. El español puede omitir el verbo elíptico y conservar la comparación de manera idiomática: «como yo hoy».'
- source_word: אָב לְבָנִים
  english_pob_choice: a father ... to children
  chosen_spanish: un padre ... a los hijos
  alternatives_spanish:
  - un padre ... a los niños
  - un padre ... a los hijos y descendientes
  lexicon: HALOT
  rationale: Aunque בָּנִים es formalmente masculino plural, aquí funciona de manera generacional. «Hijos» conserva la relación filial y el paralelismo breve del hebreo; el contexto permite una referencia amplia a la descendencia.
- source_word: יוֹדִיעַ
  english_pob_choice: makes known
  chosen_spanish: da a conocer
  alternatives_spanish:
  - hace saber
  - enseña
  lexicon: HALOT
  rationale: El hifil de ידע tiene valor causativo. «Da a conocer» es natural en español y preserva la idea de comunicar activamente algo a otros.
- source_word: אֶל אֲמִתֶּךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu verdad
  - tu confiabilidad
  lexicon: HALOT
  rationale: En este contexto de gratitud y transmisión generacional, אֱמֶת se entiende mejor como lealtad fiable de Dios. «Fidelidad» comunica la relación de pacto sin cerrar la posible resonancia de «verdad».
theological_decisions:
- issue: Cómo renderizar el valor de אֱמֶת respecto de Dios
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - verdad
  - confiabilidad
  rationale: La escena enfatiza la confiabilidad de Dios que debe proclamarse a la siguiente generación. «Fidelidad» mantiene la dimensión relacional y de pacto, mientras que «verdad» queda como alternativa léxica posible sin imponerse como la única lectura.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica-teológica cuando el término hebreo admite más de una resonancia'
- issue: Alcance generacional de בָּנִים
  english_pob_reading: children
  chosen_spanish_reading: los hijos
  alternative_spanish_readings:
  - los niños
  - los descendientes
  rationale: El hebreo masculino plural puede abarcar descendencia en general. En español, «los hijos» mantiene la forma compacta y respeta el marco familiar/generacional del proverbio sin restringirlo a varones específicos.
  doctrine_reference: 'Translation philosophy §4: precisión de género según el sentido contextual, no por calco automático'
translation_notes:
  revision_awareness: Se mantiene sin cambios la lectura de alta concordancia del audit trail inglés. La versión española sigue el hebreo con paralelismo breve, conserva la repetición enfática de «el viviente» y preserva la ambigüedad útil de אֱמֶת mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino explícito.
  - «Fidelidad» se prefiere por contexto relacional, pero se deja abierta la alternativa «verdad» en nota.
  - «Los hijos» se entiende como referencia generacional amplia, en línea con el audit trail inglés para בָּנִים.
