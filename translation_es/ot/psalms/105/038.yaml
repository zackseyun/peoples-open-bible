revisions:
- from: Egipto se alegró cuando ellos salieron[a], porque el temor de ellos había caído sobre él.
  to: Egipto se alegró cuando salieron[a], porque el temor a ellos había caído sobre ellos.
  rationale: Se corrige el referente y número de עֲלֵיהֶם con 'sobre ellos', se aclara el sentido objetivo de פַּחְדָּם con 'temor a ellos', y se aligera el español quitando el pronombre sujeto innecesario. Se conserva 'Egipto' como sujeto colectivo singular, en línea con el hebreo y el rastro de auditoría inglés.
