translation:
  language: es
  text: 'Porque no los envié, declara Yahvé, y ellos profetizan falsamente[a] en mi nombre, para que yo los expulse[b], y ustedes perecerán: ustedes y los profetas que les profetizan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «profetizan una mentira en mi nombre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los destierre»; el verbo hebreo puede implicar expulsar, apartar o causar el destierro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַחְתִּי/ם
  english_pob_choice: I did not send them
  chosen_spanish: no los envié
  alternatives_spanish:
  - no los he enviado
  lexicon: HALOT
  rationale: El perfecto hebreo con sufijo pronominal expresa una acción negada ya decidida en el discurso profético. En español, el pretérito simple suena natural y fiel; el perfecto compuesto también sería posible, pero no es necesario aquí.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con el nombre divino explícito 'Yahvé', según la pauta del proyecto. 'Declara' mantiene el tono formal de anuncio oracular mejor que un simple 'dice'.
- source_word: נִבְּאִים
  english_pob_choice: are prophesying
  chosen_spanish: profetizan
  alternatives_spanish:
  - están profetizando
  - actúan como profetas
  lexicon: HALOT
  rationale: El participio hebreo indica acción en curso, pero en español el presente simple expresa bien el valor durativo sin sonar recargado. 'Están profetizando' sería más literal al aspecto, aunque menos natural.
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - bajo mi nombre
  - por mi autoridad
  lexicon: HALOT
  rationale: Es el giro idiomático más claro y fiel en español para hablar en representación de Yahvé.
- source_word: לַשָּׁקֶר
  english_pob_choice: falsely
  chosen_spanish: falsamente
  alternatives_spanish:
  - como mentira
  - con mentira
  lexicon: HALOT
  rationale: El adverbio español reproduce el valor adverbial del hebreo sin perder la fuerza de la acusación. Alternativamente, 'como mentira' puede sugerir el contenido de lo dicho, pero es menos idiomático.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: HALOT
  rationale: Expresa de manera natural la finalidad/resultad o de la acción divina. 'Para que' es claro y adecuado en español bíblico contemporáneo.
- source_word: הַדִּיחִי
  english_pob_choice: I may drive you out
  chosen_spanish: yo los expulse
  alternatives_spanish:
  - yo los destierre
  - yo los eche fuera
  lexicon: HALOT
  rationale: El verbo hiphil de נדח puede significar apartar, expulsar o desterrar. En este contexto de juicio y exilio, 'expulse' comunica la fuerza de sacar/arrojar fuera sin introducir más especificación que el hebreo permite. Se mantiene una nota porque 'desterrar' también es posible.
- source_word: וַאֲבַדְתֶּם
  english_pob_choice: and you will perish
  chosen_spanish: y ustedes perecerán
  alternatives_spanish:
  - y ustedes serán destruidos
  - y ustedes morirán
  lexicon: HALOT
  rationale: '''Perecerán'' conserva el sentido amplio de ruina y muerte sin precisar el modo. El futuro español refleja bien la secuencia profética.'
- source_word: הַנְּבִאִים הַנִּבְּאִים לָכֶם
  english_pob_choice: the prophets who are prophesying to you
  chosen_spanish: los profetas que están profetizando para ustedes
  alternatives_spanish:
  - los profetas que profetizan para ustedes
  - los profetas que les profetizan
  lexicon: HALOT
  rationale: Se conserva la repetición hebrea de sustantivo + participio para mantener el énfasis. 'Para ustedes' refleja לָכֶם con naturalidad en español y deja abierta la idea de beneficio o destinatario de la falsa profecía.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se sigue la convención del proyecto de no velar el Tetragrámaton con 'SEÑOR'. 'Yahvé' preserva el nombre del pacto en forma reconocible y auditable para el lector hispano.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de לַשָּׁקֶר en la acusación profética
  english_pob_reading: prophesying falsely in my name
  chosen_spanish_reading: profetizan falsamente en mi nombre
  alternative_spanish_readings:
  - profetizan una mentira en mi nombre
  - profetizan en mi nombre con mentira
  rationale: La elección mantiene el juicio moral de falsedad sin borrar la posibilidad semántica de 'mentira' que el audit trail inglés preservó con nota alternativa. El adverbio español es la forma más clara y directa.
  doctrine_reference: HALOT on נבא + בשם + לשקר; English footnote a
translation_notes:
  revision_awareness: El inglés revisado cambió 'yet' por 'and' para reflejar más directamente la conjunción hebrea. La traducción española sigue esa coordinación con 'y', manteniendo la oposición contextual sin introducir contraste adversativo no presente en el hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva el paralelismo entre la falsedad de los profetas y la consecuencia de juicio.
  - Se mantiene 'profetizan' / 'profetas' para reflejar la repetición hebrea de נבא.
  - Se eligió 'para ustedes' en lugar de 'a ustedes' para לָכֶם, porque la estructura española suena más natural y mantiene la direccionalidad del discurso.
