translation:
  language: es
  text: El clamor del pobre atraviesa la nube, y hasta que llega a él no descansa. No cesa hasta que Dios atiende[a], y el Juez justo hace justicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo griego en Swete difiere sustancialmente aquí ('Los ojos del Señor están sobre los que lo aman ...'), mientras que el hebreo conservado dice lo traducido arriba. Por eso, este versículo es textualmente incierto a nivel de la fuente.
    reason: textual_variant
  - marker: b
    text: O bien, 'hace juicio'. El modismo hebreo dice literalmente 'hace juicio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀφθαλμοὶ Κυρίου
  english_pob_choice: The eyes of the Lord
  chosen_spanish: Los ojos de Yahvé
  alternatives_spanish:
  - Los ojos del Señor
  - Los ojos de Dios
  lexicon: LXX usage; divine-name convention in project defaults
  rationale: En el paralelo griego, Κύριος funciona como referencia al nombre divino; por la convención del proyecto se rinde como «Yahvé» en el texto principal. «Ojos» conserva la imagen de atención vigilante sin suavizarla.
- source_word: ἐπὶ τοὺς ἀγαπῶντας αὐτόν
  english_pob_choice: upon those who love him
  chosen_spanish: están sobre los que lo aman
  alternatives_spanish:
  - están sobre los que le aman
  - vigilan a los que lo aman
  lexicon: LXX usage
  rationale: «Están sobre» reproduce bien la idea de vigilancia/favor del griego ἐπὶ. «Lo aman» mantiene el objeto directo natural en español y conserva el matiz relacional.
- source_word: ὑπερασπισμὸς δυναστείας
  english_pob_choice: a protection of dominion
  chosen_spanish: protección de dominio
  alternatives_spanish:
  - protección del poder
  - defensa del dominio
  lexicon: 'LEXICAL: ὑπερασπισμός / δυναστεία'
  rationale: La combinación es rara; «protección de dominio» mantiene la fuerza nominal del griego sin explicar demasiado el referente. Evita sustituir el término con una paráfrasis más interpretativa.
- source_word: στήριγμα ἰσχύος
  english_pob_choice: a support of strength
  chosen_spanish: sostén de fuerza
  alternatives_spanish:
  - apoyo de fuerza
  - soporte de poder
  lexicon: 'LEXICAL: στήριγμα / ἰσχύς'
  rationale: «Sostén» conserva el valor de soporte/firmeza de στήριγμα, y «fuerza» refleja ἰσχύος sin desplazarlo hacia «poder», que sería más interpretativo.
- source_word: σκέπη ἀπὸ καύσωνος
  english_pob_choice: shelter from heat
  chosen_spanish: resguardo contra el calor abrasador
  alternatives_spanish:
  - refugio contra el calor
  - sombra contra el calor
  lexicon: 'LEXICAL: σκέπη / καύσων'
  rationale: «Resguardo» expresa bien la función protectora de σκέπη y «calor abrasador» hace explícita la intensidad de καύσωνος, que no es un calor genérico.
- source_word: σκέπη ἀπὸ μεσημβρίας
  english_pob_choice: shelter from midday
  chosen_spanish: resguardo contra el mediodía
  alternatives_spanish:
  - refugio contra el mediodía
  - resguardo del mediodía
  lexicon: 'LEXICAL: σκέπη / μεσημβρία'
  rationale: «Mediodía» traduce literalmente μεσημβρία; el sentido probable es la hora del calor intenso. Se conserva la literalidad para no borrar la imagen poética y temporal.
- source_word: φυλακὴ ἀπὸ προσκόμματος
  english_pob_choice: guard against stumbling
  chosen_spanish: guarda contra tropiezo
  alternatives_spanish:
  - protección contra tropiezo
  - guarda contra caída
  lexicon: 'LEXICAL: φυλακή / πρόσκομμα'
  rationale: «Guarda» mantiene el campo de custodia/vigilancia de φυλακή. «Tropiezo» traduce πρόσκομμα con un término natural y concreto, sin forzar una abstracción.
- source_word: βοήθεια ἀπὸ πτώσεως
  english_pob_choice: help against falling
  chosen_spanish: ayuda contra caída
  alternatives_spanish:
  - auxilio contra caída
  - ayuda contra el caer
  lexicon: 'LEXICAL: βοήθεια / πτῶσις'
  rationale: «Ayuda» refleja βοήθεια de forma directa. «Caída» conserva el resultado del desliz o desplome implícito en πτώσεως, manteniendo el paralelismo con «tropiezo».
theological_decisions:
- issue: 'Texto fuente principal: griego frente al hebreo transmitido'
  english_pob_reading: English POB follows the Hebrew reading in its verse text, while noting substantial Greek divergence.
  chosen_spanish_reading: Se traduce el griego disponible del paralelo, sin ocultar que el hebreo transmitido difiere fuertemente.
  alternative_spanish_readings:
  - Seguir solo el hebreo transmisido y omitir el griego paralelo
  - Construir una armonización entre ambos testigos
  rationale: El packet fuente marca una descoincidencia mayor entre el hebreo conservado y el griego de Swete. Para este encargo, la base auditada incluye el griego; por transparencia se vierte ese texto sin armonizarlo con el hebreo.
  doctrine_reference: Principio del proyecto sobre evidencia fuente auditable y preservación de variantes textuales
- issue: Referencia implícita de Κυρίου
  english_pob_reading: The Greek says 'the eyes of the Lord,' referring to the divine name in the project convention.
  chosen_spanish_reading: «Yahvé» en lugar de «Señor» o «SEÑOR».
  alternative_spanish_readings:
  - Señor
  - SEÑOR
  rationale: La guía del proyecto exige «Yahvé» para יהוה / YHWH y evita el ocultamiento convencional. Aquí Κύριος, en este contexto bíblico, se entiende como referencia al nombre divino.
  doctrine_reference: Default terminological policy for the divine name
translation_notes:
  revision_awareness: 'Se corrigió el problema anterior eliminando notas no ancladas: ahora no se incluyen footnotes, porque el versículo español no necesita alternativas textuales obligatorias en este encargo y así se evita la validación fallida por marcadores ausentes.'
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y claro, con vocabulario bíblico natural en español.
  - «Yahvé» se usa consistentemente para el nombre divino según la política del proyecto.
  - Se preservó la serie nominal del griego sin convertirla en una paráfrasis explicativa.
  - No se introdujeron notas al pie para evitar desajustes entre marcadores y texto.
