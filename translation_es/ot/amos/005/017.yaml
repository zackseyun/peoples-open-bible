translation:
  language: es
  text: Y en todos los viñedos habrá lamento[a][b], porque pasaré en medio de ti, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lamento» puede traducir el hebreo como duelo público; también podría expresarse como «llanto» o «lamentación».
    reason: lexical_alternative
  - marker: b
    text: «Pasaré en medio de ti» puede evocar el lenguaje bíblico de visita divina en juicio; compárese Éxodo 12:12. El verso no hace explícita la alusión.
    reason: cross_reference
lexical_decisions:
- source_word: וּ/בְ/כָל
  english_pob_choice: And in all
  chosen_spanish: Y en todos
  alternatives_spanish:
  - Y en cada
  - Y en todos los
  lexicon: HALOT
  rationale: La secuencia conjuntiva + preposición + cuantificador introduce de manera natural la serie de escenarios de duelo. En español, «en todos» conserva el valor distributivo sin añadir interpretación.
- source_word: כְּרָמִים
  english_pob_choice: the vineyards
  chosen_spanish: los viñedos
  alternatives_spanish:
  - las viñas
  - los viñedos
  lexicon: HALOT
  rationale: El plural designa áreas de cultivo de vid. «Viñedos» es claro y natural en español bíblico moderno; mantiene la referencia espacial colectiva del hebreo.
- source_word: מִסְפֵּד
  english_pob_choice: there will be wailing
  chosen_spanish: habrá lamento
  alternatives_spanish:
  - habrá llanto
  - habrá duelo
  - habrá lamentación
  lexicon: HALOT
  rationale: El término hebreo refiere duelo público, normalmente audible. «Lamento» preserva el campo semántico de duelo sin forzar un matiz exclusivamente sonoro; por eso se acompaña de una nota de alternativa léxica.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa del lamento. «Porque» expresa con claridad la relación explicativa/causal en español.
- source_word: אֶעֱבֹ֥ר
  english_pob_choice: I will pass through
  chosen_spanish: pasaré por en medio de ti
  alternatives_spanish:
  - pasaré por tu medio
  - pasaré por en medio de ustedes
  - atravesaré en medio de ti
  lexicon: HALOT
  rationale: «Pasaré por en medio de ti» conserva el verbo de movimiento con la imagen espacial del hebreo y la segunda persona singular. Evita suavizarlo a un mero «pasar por», manteniendo la tensión de visita divina en juicio.
- source_word: בְּ/קִרְבְּ/ךָ
  english_pob_choice: your midst
  chosen_spanish: por en medio de ti
  alternatives_spanish:
  - en medio de ti
  - en tu seno
  - entre ustedes
  lexicon: HALOT
  rationale: La expresión idiomática española más natural para el hebreo espacial es «por en medio de ti». Mantiene la singularidad del sufijo y la imagen corporal/colectiva de cercanía.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - dice Yahvé
  - ha dicho Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado y la fórmula profética en presente. «Dice Yahvé» suena natural en español y sigue la convención POB para יְהוָה.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En el POB español, la forma estable y reverente es «Yahvé», que preserva el nombre del pacto sin reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Movimiento divino en juicio
  english_pob_reading: I will pass through your midst
  chosen_spanish_reading: pasaré por en medio de ti
  alternative_spanish_readings:
  - pasaré por tu medio
  - pasaré entre ustedes
  rationale: La traducción mantiene la imagen de una presencia divina que atraviesa el centro del pueblo. No se explicita en el texto principal la posible alusión a Éxodo 12:12, para conservar la tensión teológica documentada.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audio de revisión en inglés quedó en alta coincidencia (0.95) sin cambios sustanciales; esta versión española sigue esa lectura estable, preservando el paralelismo del verso y la tensión teológica del movimiento divino en juicio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar POB en español.
  - Se conserva la segunda persona singular («ti») porque el sufijo hebreo es singular, aunque el referente sea colectivo.
  - «Viñedos» y no «viñas» mantiene un sustantivo más transparente para el lector general.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto principal.
