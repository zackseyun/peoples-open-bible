translation:
  language: es
  text: La razón no puede cortar[b] ninguna de sus malas tendencias[a], pero la razón es capaz de ayudarlos a no ceder[c] a la mala tendencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «malicia», «maldad» o «mala disposición». El término griego designa una disposición moral mala, no solo un acto malo aislado.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «cortar fuera» o «cortar de raíz». La imagen del verbo se conserva aquí de forma sobria.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «no ser doblado / no ser vencido» por la mala tendencia; es decir, no ceder ante ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κακοήθειάν
  english_pob_choice: evil tendencies
  chosen_spanish: malas tendencias
  alternatives_spanish:
  - malicia
  - maldad
  - mala disposición
  - vicio
  lexicon: LSJ
  rationale: κακοήθεια puede abarcar una disposición moral mala, malicia o una inclinación viciada. En español, «malas tendencias» comunica una orientación interna hacia el mal sin reducirla a un acto puntual ni cargarla con un tecnicismo excesivo.
- source_word: τις ὑμῶν
  english_pob_choice: any of your
  chosen_spanish: ninguna de vuestras
  alternatives_spanish:
  - cualquiera de vuestras
  - alguna de vuestras
  - ninguna de sus
  lexicon: LSJ
  rationale: 'El griego individualiza la disposición dentro del grupo. En español, «ninguna de vuestras» mantiene el sentido distributivo: ninguna de esas malas tendencias puede ser extirpada por la razón.'
- source_word: οὐ δύναται ἐκκόψαι
  english_pob_choice: cannot cut off
  chosen_spanish: no puede cortar
  alternatives_spanish:
  - no puede extirpar
  - no puede eliminar
  - no puede arrancar
  lexicon: LSJ
  rationale: ἐκκόπτω es literalmente «cortar fuera / cortar off». «Cortar» preserva la imagen verbal y sigue siendo claro en español; «extirpar» sería más explicativo pero menos cercano a la metáfora.
- source_word: τὸ μὴ καμφθῆναι
  english_pob_choice: not to bend
  chosen_spanish: no ceder
  alternatives_spanish:
  - no doblarse
  - no inclinarse
  - no dejarse doblegar
  lexicon: LSJ
  rationale: El infinitivo pasivo de κάμπτω es «ser doblado / doblarse». En contexto moral, la idea es no dejarse vencer o inclinar. «No ceder» conserva la fuerza ética y suena natural en español.
- source_word: τῇ κακοηθείᾳ
  english_pob_choice: to that evil tendency
  chosen_spanish: a la mala tendencia
  alternatives_spanish:
  - a esa malicia
  - al mal
  - a esa mala disposición
  lexicon: LSJ
  rationale: La dación expresa la fuerza ante la cual uno podría doblegarse. Repetir «la mala tendencia» conserva la coherencia léxica con la primera mitad del verso y evita sobreactuar la deixis en español.
- source_word: ὁ λογισμὸς
  english_pob_choice: Reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el raciocinio
  - el pensamiento racional
  - la mente
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es un término programático para la facultad racional y el juicio moral. «La razón» comunica bien ese papel, de manera natural y con mayúscula innecesaria evitada en español.
- source_word: συμμαχῆσαι
  english_pob_choice: to join in helping
  chosen_spanish: ayudar
  alternatives_spanish:
  - asistir
  - colaborar
  - prestar ayuda
  lexicon: LSJ
  rationale: συμμαχέω tiene el matiz de ayudar como aliado. En español, «ayudar» es la opción más directa y adecuada, sin introducir una imagen militar que no es necesaria en la frase.
theological_decisions:
- issue: Alcance moral de la razón frente a la mala disposición
  english_pob_reading: Reason cannot eradicate evil disposition itself, but can assist a person in resisting or not yielding to it.
  chosen_spanish_reading: La razón no puede eliminar por sí sola las malas tendencias, pero sí puede ayudar a no ceder ante ellas.
  alternative_spanish_readings:
  - La razón no puede quitar de raíz ninguna mala inclinación, pero puede ayudar a resistirla.
  - La razón no puede vencer toda malicia, pero puede ayudar a no doblegarse ante ella.
  rationale: 'El griego conserva una tensión: la razón no tiene poder absoluto para «cortar» la mala disposición, pero sí para asistir en la resistencia moral. La traducción mantiene esa tensión sin convertirla en una afirmación más fuerte o más débil de lo que el texto dice.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del inglés POB: se simplificó la ayuda a «help», se repuso el sujeto repetido «reason» para claridad, y se mantuvo el sentido singular/distributivo de la mala tendencia. En español, eso se refleja en una redacción sobria que conserva el paralelismo y la tensión moral del griego.'
  spanish_consistency_notes:
  - Se usa «razón» para λογισμός, en línea con el papel técnico del término en 4 Macabeos.
  - Se traduce κακοήθεια con una expresión de inclinación o tendencia moral, no con un pecado puntual.
  - Se conserva el contraste entre la incapacidad de cortar y la capacidad de ayudar, sin suavizarlo.
  - Se evita «Cristo», «SEÑOR» u otra terminología no pertinente; el texto no contiene vocabulario cristológico ni el nombre divino.
  - La frase final mantiene el singular conceptual de la mala tendencia, aunque el español permita una lectura plural en la primera mitad.
