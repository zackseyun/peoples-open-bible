translation:
  language: es
  text: Escuchen la instrucción de la boca[a], hijos, y el que la guarda de ningún modo será atrapado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «instrucción acerca de la boca» o «disciplina de la boca». El griego es compacto y permite varias formulaciones cercanas.
    reason: lexical_alternative
  - marker: b
    text: 'La negación enfática del griego puede traducirse también: «no será tomado en absoluto» o «jamás será atrapado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παιδείαν
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - formación
  - enseñanza
  lexicon: BDAG
  rationale: En este contexto sapiencial, παιδείαν expresa una enseñanza formativa y correctiva; «instrucción» comunica bien esa función sin perder la idea de formación moral.
- source_word: στόματος
  english_pob_choice: of the mouth
  chosen_spanish: de la boca
  alternatives_spanish:
  - de la boca
  - sobre el hablar
  - del habla
  lexicon: BDAG
  rationale: El genitivo es literalmente «de la boca». En español, «de la boca» conserva la relación directa con el órgano del habla y suena más natural que una paráfrasis interpretativa.
- source_word: ἀκούσατε
  english_pob_choice: Hear
  chosen_spanish: Oíd
  alternatives_spanish:
  - Escuchad
  - Prestad oído
  - Oigan
  lexicon: BDAG
  rationale: El imperativo plural llama a una escucha atenta. «Oíd» mantiene el tono exhortativo y es suficientemente formal para un dicho sapiencial.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos e hijas
  - criaturas
  lexicon: BDAG
  rationale: Aunque τέκνα puede ser «children», en español bíblico «hijos» funciona como vocativo plural natural y digno. Aquí evita una expresión demasiado infantil y mantiene el tono sapiencial.
- source_word: ὁ φυλάσσων
  english_pob_choice: the one who keeps it
  chosen_spanish: el que la guarda
  alternatives_spanish:
  - quien la guarda
  - el que la observa
  - el que la conserva
  lexicon: BDAG
  rationale: φυλάσσω puede significar guardar, observar o custodiar. «La guarda» mantiene la idea de cuidado y observancia respecto de la instrucción mencionada.
- source_word: οὐ μὴ
  english_pob_choice: will certainly not
  chosen_spanish: no será ciertamente
  alternatives_spanish:
  - de ningún modo será
  - no será en absoluto
  - jamás será
  lexicon: BDAG
  rationale: La negación enfática οὐ μή exige una traducción que exprese certeza absoluta. «No será ciertamente» reproduce ese énfasis de forma natural en español.
- source_word: ἁλῷ
  english_pob_choice: be caught
  chosen_spanish: atrapado
  alternatives_spanish:
  - tomado
  - cogido
  - capturado
  lexicon: BDAG
  rationale: ἁλῷ (de ἁλίσκομαι) puede rendirse como ser atrapado o ser tomado. «Atrapado» comunica bien la idea general de caer en una trampa o quedar sorprendido por el resultado negativo.
theological_decisions:
- issue: Objeto implícito de «guardar»
  english_pob_reading: The one who keeps it, referring to the instruction for speech.
  chosen_spanish_reading: El objeto queda implícito en el pronombre «la», referido a la instrucción.
  alternative_spanish_readings:
  - el que guarda
  - el que la guarda
  rationale: En español conviene explicitar el objeto para que la frase quede completa y transparente. El antecedente inmediato es la «instrucción de la boca».
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza de la cláusula final
  english_pob_reading: 'General consequence: the one who keeps this instruction will not be ensnared.'
  chosen_spanish_reading: 'Consecuencia general: quien guarda esta instrucción no caerá en la trampa del mal resultado ni quedará sorprendido por él.'
  alternative_spanish_readings:
  - no será tomado
  - no será condenado
  - no será capturado
  rationale: El griego usa una negación enfática con un verbo de ser atrapado; en un proverbio sapiencial el sentido general de quedar atrapado o sorprendido por el daño es más natural que una lectura estrictamente forense.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que ajustó el genitivo inglés de 'for the mouth' a 'of the mouth'; por eso el español conserva la relación literal «de la boca» y evita una paráfrasis más libre. También se respetó la decisión del audit trail de mantener una negación enfática al final, aunque en español se expresó con una formulación idiomática equivalente.
  spanish_consistency_notes:
  - Se mantuvo «instrucción» para παιδείαν, coherente con el contexto sapiencial.
  - Se usó «Yahvé» por norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Oíd» y «el que la guarda» conservan el tono proverbial y exhortativo del original.
  - No se introdujo lenguaje doctrinal ajeno; la frase final permanece amplia como en el griego.
