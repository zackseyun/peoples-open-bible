translation:
  language: es
  text: 'Lo puso como testimonio en José[a] cuando salió sobre la tierra de Egipto[b]. Oí un idioma que no había conocido[c]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Probablemente «José» representa aquí al pueblo de Israel, especialmente en el contexto del éxodo, pero se conserva el nombre hebreo «José».
    reason: cross_reference
  - marker: b
    text: O «contra la tierra de Egipto». La preposición hebrea puede llevar aquí cualquiera de los dos sentidos.
    reason: lexical_alternative
  - marker: c
    text: O «Oigo un idioma que no había conocido». El verbo hebreo puede entenderse en sentido presente o pasado en la poesía.
    reason: alternative_reading
lexical_decisions:
- source_word: עֵדוּת
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - decreto
  - estatuto
  lexicon: HALOT
  rationale: «עֵדוּת» suele referirse a un testimonio o testimonio solemnemente establecido; en contextos legales/cultuales puede acercarse a «estatuto». «Testimonio» conserva mejor el valor léxico y funciona con naturalidad en el contexto poético del salmo.
- source_word: בִּיהוֹסֵף
  english_pob_choice: in Joseph
  chosen_spanish: en José
  alternatives_spanish:
  - contra José
  - para José
  - en Israel
  lexicon: HALOT
  rationale: El hebreo conserva explícitamente el nombre propio. «En José» respeta esa forma y deja visible el posible valor metonímico para Israel, sin sustituirlo por una interpretación explicativa.
- source_word: שָׂמוֹ
  english_pob_choice: he made it
  chosen_spanish: puso
  alternatives_spanish:
  - lo hizo
  - lo estableció
  - lo colocó
  lexicon: HALOT
  rationale: «שִׂים» puede significar poner, establecer o नियुक्तar. En español, «puso» reproduce de modo breve y fiel la idea de establecer algo como testimonio, sin sonar forzado.
- source_word: בְּצֵאתוֹ
  english_pob_choice: when he went out
  chosen_spanish: cuando salió
  alternatives_spanish:
  - al salir
  - cuando salió de
  - en su salida
  lexicon: HALOT
  rationale: La construcción temporal con בְּ + infinitivo se vierte naturalmente como «cuando salió». Mantiene la relación temporal sin sobrecargar la frase.
- source_word: עַל אֶרֶץ מִצְרָיִם
  english_pob_choice: over the land of Egypt
  chosen_spanish: sobre la tierra de Egipto
  alternatives_spanish:
  - contra la tierra de Egipto
  - sobre el país de Egipto
  lexicon: HALOT
  rationale: «עַל» admite varias posibilidades. «Sobre» conserva la amplitud del hebreo y no decide de antemano entre cobertura espacial y orientación hostil; «tierra» es una equivalencia más bíblica y natural en español que «país» aquí.
- source_word: שְׂפַת
  english_pob_choice: a language
  chosen_spanish: un idioma
  alternatives_spanish:
  - una lengua
  - habla
  - labio
  lexicon: HALOT
  rationale: Literalmente es «labio», pero el sentido idiomático es el de lenguaje o habla. «Idioma» comunica ese valor de manera clara y actual; «lengua» también sería posible, pero puede sonar más ambigua en español moderno.
- source_word: לֹא יָדַעְתִּי
  english_pob_choice: I had not known
  chosen_spanish: no había conocido
  alternatives_spanish:
  - no conocí
  - no había sabido
  lexicon: HALOT
  rationale: El perfecto hebreo puede leerse como pasado simple o pluscuamperfecto. «No había conocido» expresa con naturalidad la anterioridad de la experiencia no familiar.
- source_word: אֶשְׁמָע
  english_pob_choice: I heard
  chosen_spanish: Oí
  alternatives_spanish:
  - oigo
  - escuché
  lexicon: HALOT
  rationale: Aunque la forma es imperfecta, en poesía puede entenderse con valor narrativo pasado. «Oí» evita una traducción mecánica al presente y mantiene la secuencia de recuerdo en el contexto.
theological_decisions:
- issue: Referente de «José»
  english_pob_reading: Joseph is retained in the main text as a metonymic name for the covenant people, especially in exodus context.
  chosen_spanish_reading: Se mantiene «José» en el texto principal como nombre metonímico del pueblo del pacto.
  alternative_spanish_readings:
  - José representa a Israel
  - José se refiere más estrechamente a las tribus del norte o a Efraín
  rationale: El hebreo nombra explícitamente a José; conservarlo respeta la primacía del original y deja al lector la inferencia del sentido representativo, en vez de reemplazarlo por una glosa interpretativa.
  doctrine_reference: Translation philosophy §§1, 2, 5
- issue: Valor de la preposición con la tierra de Egipto
  english_pob_reading: Or 'against the land of Egypt.' The Hebrew preposition can carry either sense in this context.
  chosen_spanish_reading: «sobre la tierra de Egipto» deja abierta la posibilidad de referencia espacial o de orientación hostil, sin resolverla demasiado pronto.
  alternative_spanish_readings:
  - contra la tierra de Egipto
  - sobre la tierra de Egipto, con sentido de acción extensiva
  rationale: La ambigüedad del hebreo debe mantenerse visible. «Sobre» es fiel y natural; la alternativa «contra» podría explicitar el juicio sobre Egipto, pero no es obligatoria en el cuerpo principal.
  doctrine_reference: Translation philosophy §2
- issue: Valor temporal de la última cláusula
  english_pob_reading: The Hebrew verb may be understood as present or past in poetic context.
  chosen_spanish_reading: «Oí» refleja la lectura pasada que mejor encaja con el flujo poético del recuerdo.
  alternative_spanish_readings:
  - «Oigo un idioma que no había conocido»
  - «Escuché un idioma que no había conocido»
  rationale: La poesía permite cierta tensión verbal. En español, el pasado simple ofrece una secuencia más natural; el presente mantiene la lectura alternativa, que puede indicarse en nota.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente y el audit trail inglés; no se registran revisiones aplicadas en el último pase, y la presente versión conserva las ambigüedades documentadas en José, en la preposición con Egipto y en el valor temporal del verbo final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; en este versículo no aparece el nombre divino.
  - Se mantiene el nombre propio «José» y no se sustituye por «Israel» en el texto principal.
  - Se prefiere «testimonio» para עֵדוּת y «idioma» para שְׂפַת, por claridad y fidelidad contextual.
  - La puntuación con dos puntos al final refleja la continuación poética del versículo.
