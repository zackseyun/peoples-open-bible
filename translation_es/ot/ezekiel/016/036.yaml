base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/036.yaml
  text: 'Thus says the Lord GOD: Because your lust was poured out[a], and your nakedness was uncovered in your prostitutions with your lovers, and because of all the idols of your abominations, and because of the blood of your children whom you gave to them[c][b],'
  footnotes:
  - marker: a
    text: Or possibly 'your wealth was poured out'; the Hebrew 'your bronze' may function metaphorically for wealth lavished on illicit lovers, and some take it more broadly as a figure for lewd exposure.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the idols of your abominations'; that is, your detestable idols.
    reason: lexical_alternative
  - marker: c
    text: That you gave to them, i.e., in child sacrifice to idols.
    reason: cultural_note
