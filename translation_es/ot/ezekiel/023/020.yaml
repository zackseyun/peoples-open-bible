translation:
  language: es
  text: Ella codició a sus amantes[a], cuya carne era como la carne de asnos[b], y cuya emisión era como la emisión de caballos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «sus concubinas». En este contexto, el término suele entenderse de manera metafórica como parejas o amantes sexuales.
    reason: lexical_alternative
  - marker: b
    text: «Carne» aquí probablemente funciona como eufemismo sexual, es decir, «miembros».
    reason: lexical_alternative
  - marker: c
    text: O, más explícitamente, «semen».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעְגְּבָה
  english_pob_choice: She lusted
  chosen_spanish: codició
  alternatives_spanish:
  - deseó con pasión
  - lujurió
  lexicon: HALOT
  rationale: El verbo expresa deseo erótico intenso; en español, «codició» comunica mejor la fuerza apetitiva y el tono moralmente cargado del pasaje que un simple «deseó». Evita además sonar demasiado coloquial.
- source_word: עַל
  english_pob_choice: after
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - por
  lexicon: HALOT
  rationale: Con este verbo, la preposición introduce el objeto del deseo. En español, la construcción natural es «codiciar a».
- source_word: פִּלַגְשֵׁיהֶם
  english_pob_choice: their paramours
  chosen_spanish: sus paramours
  alternatives_spanish:
  - sus concubinas
  - sus amantes
  lexicon: HALOT
  rationale: La forma hebrea es literalmente «sus concubinas», pero el contexto metafórico y sexual apunta a parejas o amantes. Se conserva «paramours» como préstamo para reflejar el sesgo formal del audit trail inglés y evitar una domesticación excesiva; se ancla con nota la alternativa literal.
- source_word: בְּשַׂר חֲמוֹרִים בְּשָׂרָם
  english_pob_choice: whose flesh was like the flesh of donkeys
  chosen_spanish: cuya carne era como la carne de asnos
  alternatives_spanish:
  - cuyos miembros eran como los de asnos
  - cuyos genitales eran como los de asnos
  lexicon: HALOT
  rationale: Se mantiene «carne» porque el hebreo dice literalmente בשר, aunque el contexto sugiere un eufemismo sexual. «Asnos» conserva el referente animal sin suavizarlo.
- source_word: וְזִרְמַת סוּסִים זִרְמָתָם
  english_pob_choice: whose emission was like the emission of horses
  chosen_spanish: cuya secreción era como la secreción de caballos
  alternatives_spanish:
  - cuyo semen era como el semen de caballos
  - cuya eyaculación era como la eyaculación de caballos
  lexicon: HALOT
  rationale: «זִרְמָה» nombra una emisión o flujo; en este contexto es claramente seminal, pero «secreción» preserva el registro eufemístico y la ambigüedad controlada del hebreo mejor que un término totalmente explícito.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que sustituyó «lovers» por «paramours» para reflejar mejor el sentido sexual con registro formal. El español conserva esa opción mediante «paramours» y mantiene las notas léxicas para las alternativas literales y más explícitas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se preserva el paralelismo sintáctico del hebreo con dos cláusulas relativas coordinadas.
  - Se evita «semen» en el cuerpo principal para respetar la misma ambigüedad eufemística que el audit trail inglés preserva.
