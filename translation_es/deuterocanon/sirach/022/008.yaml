translation:
  language: es
  text: 'Contar una historia a uno que está adormecido es como contársela a un necio[a], y al final dirá: «¿Qué fue eso?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego es algo torpe en su forma, porque repite «el que cuenta» (διηγούμενος ... ὁ διηγούμενος). El sentido es comparativo: contar algo a una persona adormecida es como contárselo a un necio.'
    reason: textual_variant
lexical_decisions:
- source_word: διηγούμενος
  english_pob_choice: telling a story
  chosen_spanish: decir un relato
  alternatives_spanish:
  - narrar
  - contar una historia
  - relatar
  lexicon: LSJ
  rationale: El participio de διηγέομαι implica relatar o narrar con detalle. «Decir un relato» conserva la idea de una comunicación discursiva y suena natural en español, sin perder el valor de narración continua que el texto griego supone.
- source_word: νυστάζοντι
  english_pob_choice: to one who is drowsy
  chosen_spanish: a uno que está adormecido
  alternatives_spanish:
  - a uno que está soñoliento
  - a un somnoliento
  - a uno que cabecea
  lexicon: LSJ
  rationale: νυστάζω expresa somnolencia o estar a punto de dormirse. «Adormecido» comunica bien la falta de atención y evita una expresión demasiado coloquial.
- source_word: μωρῷ
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un insensato
  - un tonto
  - un fatuo
  lexicon: LSJ
  rationale: En literatura sapiencial, μωρός nombra al necio en sentido moral y práctico, no solo a alguien con poca inteligencia. «Necio» mantiene ese registro bíblico-sapiencial en español.
- source_word: ἐπὶ συντελείᾳ
  english_pob_choice: at the end
  chosen_spanish: al final
  alternatives_spanish:
  - al concluir
  - cuando termine
  - en la conclusión
  lexicon: LSJ
  rationale: La frase señala el cierre de la acción de hablar. «Al final» es la forma más directa y natural en español, conservando la referencia temporal sin añadir matiz interpretativo.
- source_word: Τί ἐστιν;
  english_pob_choice: What was it?
  chosen_spanish: ¿Qué fue?
  alternatives_spanish:
  - ¿Qué era?
  - ¿Qué fue eso?
  - ¿Qué es esto?
  lexicon: LSJ
  rationale: Aunque literalmente puede leerse «¿Qué es?», el contexto de algo ya dicho y no retenido por el oyente favorece una formulación pasada en español. «¿Qué fue?» preserva la abrupta incomprensión y sigue la revisión inglesa que optó por ese ajuste contextual.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «What is it?» por «What was it?» para ajustar mejor el contexto de algo ya dicho y oírse más natural; la formulación española sigue esa misma decisión contextual sin abandonar la literalidad básica del griego.
  spanish_consistency_notes:
  - Se mantuvo «necio» para μωρός por coherencia con el registro sapiencial bíblico.
  - Se prefirió una construcción verbal sencilla («decir un relato») para no endurecer innecesariamente el paralelismo griego repetido.
  - Se conservó una pregunta final breve y abrupta, acorde con el cierre desconcertado del texto.
