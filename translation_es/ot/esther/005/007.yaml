translation:
  language: es
  text: 'Entonces Ester respondió y dijo[a]: «Mi petición y mi solicitud son:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Ester respondió y dijo: “Mi pregunta y mi solicitud son:”». El hebreo usa un par formal de casi sinónimos para la apelación de Ester.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַן
  english_pob_choice: Then ... answered
  chosen_spanish: Entonces ... respondió
  alternatives_spanish:
  - Y ... respondió
  - Luego ... respondió
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» conserva esa secuencia de manera natural en español. «Respondió» refleja el sentido normal de ענה en contexto de respuesta verbal.
- source_word: אֶסְתֵּר
  english_pob_choice: Esther
  chosen_spanish: Ester
  alternatives_spanish:
  - Esther
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en forma española habitual sin añadir explicación innecesaria. La grafía «Ester» es la más natural en español bíblico, aunque «Esther» también es reconocible.
- source_word: וַתֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - diciendo
  lexicon: HALOT
  rationale: El doblete hebreo «respondió y dijo» se refleja con dos verbos coordinados para mantener la forma del texto fuente. «Dijo» es la correspondencia más directa y natural.
- source_word: שְׁאֵלָתִי
  english_pob_choice: my petition
  chosen_spanish: mi petición
  alternatives_spanish:
  - mi pregunta
  - mi solicitud
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar «pregunta», aquí el contexto es una apelación formal ante el rey; «petición» conserva ese matiz cortesano y suplicatorio. Se evita colapsar el par de términos con el siguiente sustantivo.
- source_word: וּבַקָּשָׁתִי
  english_pob_choice: and my request
  chosen_spanish: y mi solicitud
  alternatives_spanish:
  - y mi petición
  - y mi ruego
  lexicon: HALOT
  rationale: בַּקָּשָׁה suele denotar una solicitud o ruego. «Solicitud» mantiene la cercanía semántica con «petición» sin volver idéntico el par de sinónimos formales del hebreo.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje fue confirmado con alto acuerdo. La redacción española mantiene la doble formulación verbal y el par nominal formal del hebreo, evitando simplificar ambos sustantivos en una sola idea.
  spanish_consistency_notes:
  - Se mantiene «Ester» como forma española común del nombre propio.
  - Se conserva la estructura narrativa hebrea con dos verbos coordinados.
  - 'Se distinguen los dos sustantivos con matices cercanos pero no idénticos: «petición» y «solicitud».'
  - La nota al pie preserva la alternativa semántica documentada por el POB en inglés, incluyendo «pregunta» como posibilidad lexical.
