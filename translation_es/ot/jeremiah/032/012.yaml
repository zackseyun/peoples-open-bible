base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/012.yaml
  text: Then I gave the deed of purchase to Baruch son of Neriah[a], son of Mahseiah, in the sight of Hanamel my uncle, and in the sight of the witnesses who had written in the deed of purchase[e][d][c][b], in the sight of all the Judeans who were sitting in the court of the guard.
  footnotes:
  - marker: a
    text: Or 'before' or 'in the presence of' for the repeated phrase 'in the sight of.'
    reason: lexical_alternative
  - marker: b
    text: '''Hanamel my uncle'' follows the immediate Hebrew wording; elsewhere in the chapter Hanamel is identified as Jeremiah''s cousin (the son of his uncle).'
    reason: cross_reference
  - marker: c
    text: Or 'who wrote in the deed of purchase'; the Hebrew literally says 'the witnesses, the ones writing in the deed of purchase.'
    reason: lexical_alternative
  - marker: d
    text: Or 'all the Jews'; 'Judeans' reflects the historical setting of the kingdom/province of Judah.
    reason: lexical_alternative
  - marker: e
    text: Or 'courtyard of the guard' or possibly 'court of the prison.'
    reason: lexical_alternative
