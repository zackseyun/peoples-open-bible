translation:
  language: es
  text: Solo[a], no comerás su sangre; su sangre la derramarás en la tierra como agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «solamente». El hebreo marca una restricción o excepción antes del mandato principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solamente
  alternatives_spanish:
  - Solo
  - Únicamente
  - Pero solo
  lexicon: HALOT
  rationale: El hebreo marca una restricción o excepción. «Solamente» conserva ese matiz limitativo en español natural y apto para texto bíblico.
- source_word: אֶת דָּמוֹ
  english_pob_choice: its blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de él
  - la sangre de eso
  - su propia sangre
  lexicon: HALOT
  rationale: El posesivo del hebreo se refiere a la sangre del animal. En español, «su sangre» comunica la relación posesiva sin volver el texto rígido o artificial.
- source_word: לֹא תֹאכֵל
  english_pob_choice: you shall not eat
  chosen_spanish: no comerás
  alternatives_spanish:
  - no debes comer
  - no comerás de ella
  - no la comerás
  lexicon: HALOT
  rationale: La forma legal del imperfecto se refleja bien con futuro prohibitivo en español. «No comerás» mantiene el tono de mandamiento sin añadir explicación.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - en la tierra
  - sobre el terreno
  lexicon: HALOT
  rationale: Aquí el contexto ritual permite una traducción concreta y fiel. «Tierra» conserva el hebreo y funciona bien con el verbo de derramar.
- source_word: תִּשְׁפְּכֶנּוּ
  english_pob_choice: you shall pour it out
  chosen_spanish: la derramarás
  alternatives_spanish:
  - la verterás
  - la echarás fuera
  - la derramarás por tierra
  lexicon: HALOT
  rationale: El verbo expresa derramar o verter líquido; «derramar» es natural en español y adecuado para sangre en un contexto ritual. Se evita «esparcir», que debilitaría la imagen.
- source_word: כַּמָּיִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - como si fuera agua
  - igual que el agua
  lexicon: HALOT
  rationale: La comparación es directa. «Como agua» preserva la simetría y la brevedad del hebreo.
theological_decisions:
- issue: Prohibición de consumir sangre
  english_pob_reading: Render the prohibition plainly as a legal command not to consume the animal's blood, without importing later theological explanation.
  chosen_spanish_reading: Presentar la prohibición de forma llana como una orden legal contra comer la sangre del animal, sin añadir una explicación teológica que el versículo no formula.
  alternative_spanish_readings:
  - Introducir una glosa como «la vida está en la sangre»
  - Traducir «sangre vital»
  rationale: El texto hebreo da un mandamiento concreto sobre la sangre y su derramamiento. La traducción española debe conservar esa claridad legal y no ampliar el sentido con una explicación que pertenece a otros pasajes del Pentateuco.
  doctrine_reference: 'Principio de fidelidad textual: no importar doctrinas o explicaciones que el versículo no expresa.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el trazado auditado en inglés. Se conserva la restricción inicial de רַק, la prohibición legal en futuro español, y la imagen concreta de derramar la sangre sobre la tierra como agua, sin introducir la glosa de «vida» ni otros desarrollos interpretativos.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se mantiene «sangre» y no «vida/sangre vital», porque el hebreo y el audit trail inglés favorecen la lectura literal.
  - «Tierra» conserva el paralelo con el hebreo עַל הָאָרֶץ y resulta natural en español bíblico contemporáneo.
  - La nota al pie se coloca sobre el posesivo para reflejar la alternativa lexicográfica documentada en el audit trail.
