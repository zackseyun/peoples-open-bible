translation:
  language: es
  text: Llegaron a ser esposas[a] de los clanes de los hijos de Manasés, hijo de José, y su herencia permaneció con la tribu del clan de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre las familias de los hijos de Manasés, hijo de José». El hebreo puede expresarse como «clanes» o «familias», según cuán específicamente se quiera reflejar la estructura tribal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמִּשְׁפְּחֹת
  english_pob_choice: to the clans of / from among the families of
  chosen_spanish: de las familias de
  alternatives_spanish:
  - de los clanes de
  - de entre las familias de
  lexicon: HALOT
  rationale: El hebreo usa מִן con מִשְׁפָּחָה, que puede marcar procedencia o pertenencia al grupo. En español, la formulación más natural y fiel aquí es «de las familias de», que conserva el matiz de pertenencia genealógica sin forzar una preposición menos idiomática. «Clanes» sería posible, pero en español puede sonar más técnico; «de entre» explicita demasiado la idea de origen.
- source_word: בְּנֵֽי מְנַשֶּׁה בֶן יוֹסֵף
  english_pob_choice: the sons of Manasseh son of Joseph
  chosen_spanish: los hijos de Manasés, hijo de José
  alternatives_spanish:
  - los descendientes de Manasés, hijo de José
  lexicon: HALOT
  rationale: Conservo la cadena genealógica y el lenguaje tribal del hebreo. «Hijos de» refleja bien el idioma bíblico de linaje; «descendientes» es más interpretativo y menos directo. Uso «Manasés» y «José» como formas españolas establecidas.
- source_word: הָי֣וּ לְנָשִׁ֑ים
  english_pob_choice: became wives to
  chosen_spanish: llegaron a ser esposas de
  alternatives_spanish:
  - fueron dadas por esposas a
  - se casaron con
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «fueron para esposas». En español, «llegaron a ser esposas de» conserva la construcción predicativa y mantiene a las mujeres como sujeto gramatical, como en la traducción inglesa auditada. «Se casaron con» suena natural, pero borra un poco la forma verbal del original.
- source_word: נַחֲלָתָם
  english_pob_choice: their inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su posesión heredada
  - su heredad
  lexicon: HALOT
  rationale: En este contexto legal-territorial, נַחֲלָה se refiere a la porción heredada. «Herencia» es claro en español y preserva el valor técnico del reparto tribal. El posesivo singular en español funciona bien para el referente colectivo del grupo femenino.
- source_word: וַתְּהִי
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - fue
  - quedó
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es simple («fue / llegó a ser»), el sentido contextual es que la herencia siguió vinculada al ámbito tribal correcto. «Permaneció» expresa esa continuidad sin añadir contenido ajeno.
- source_word: עַל מַטֵּה
  english_pob_choice: with the tribe of
  chosen_spanish: con la tribu de
  alternatives_spanish:
  - perteneció a la tribu de
  - sobre la tribu de
  lexicon: HALOT
  rationale: עַל en este marco legal señala adscripción o vínculo. «Con la tribu de» reproduce bien la idea de pertenencia relacional en un español natural. «Perteneció a» sería más explícito pero menos cercano a la estructura del hebreo.
- source_word: מִשְׁפַּחַת אֲבִיהֶן
  english_pob_choice: the clan of their father
  chosen_spanish: la familia de su padre
  alternatives_spanish:
  - el clan de su padre
  - la casa paterna
  lexicon: HALOT
  rationale: Aquí el hebreo usa el singular colectivo «familia»/«clan» para la unidad paterna. En español, «familia» comunica mejor al lector general y mantiene el término del campo semántico elegido en el verso. «Clan» es viable, pero puede sonar más antropológico; «casa paterna» sería demasiado interpretativo.
theological_decisions:
- issue: Permanencia de la herencia en la tribu correcta tras el matrimonio
  english_pob_reading: their inheritance remained with the tribe of the clan of their father
  chosen_spanish_reading: su herencia permaneció con la tribu de la familia de su padre
  alternative_spanish_readings:
  - su herencia quedó con la tribu de la familia de su padre
  - su herencia siguió con la tribu de la familia de su padre
  rationale: El punto teológico-jurídico del versículo es que el matrimonio no transfiere la herencia tribal fuera del linaje paterno. La redacción española conserva esa permanencia legal sin convertirla en una explicación doctrinal extraña al texto.
  doctrine_reference: Números 36:1-12; normativa de herencia tribal y preservación del reparto de la tierra en Israel
translation_notes:
  revision_awareness: 'La redacción sigue el sentido revisado del audit trail inglés: se entiende el grupo como destino relacional del matrimonio («a/de las familias de») y no como mero origen. También se conserva la equivalencia formal del marco genealógico y legal, sin suavizar la tensión léxica entre «familia» y «clan».'
  spanish_consistency_notes:
  - Mantengo «familia» en lugar de sustituir siempre por «clan» para evitar una terminología demasiado técnica en español, pero dejo abierta la alternativa en nota.
  - Uso «herencia» para נַחֲלָה por ser el término bíblico-jurídico más estable en español.
  - «Permaneció» traduce el efecto contextual de וַתְּהִי sin perder la idea de continuidad legal.
  - Conservo el orden genealógico «Manasés, hijo de José» para reflejar la estructura del hebreo.
