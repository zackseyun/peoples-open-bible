translation:
  language: es
  text: ¿Quién ha medido las aguas en el hueco de su mano, y con un palmo ha marcado los cielos[b], y ha medido el polvo de la tierra en una medida[a], y ha pesado los montes en balanzas y los collados en balanzas[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una medida de tercio». El término hebreo alude a una antigua unidad o recipiente de medida cuya equivalencia exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: O «ha medido» para «ha marcado» los cielos.
    reason: lexical_alternative
  - marker: c
    text: O «en una balanza» para «en balanzas».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién ha sido el que
  lexicon: HALOT
  rationale: El hebreo abre con una pregunta retórica. «¿Quién» conserva de forma natural el tono interrogativo y la fuerza retórica sin añadir información.
- source_word: מָדַד
  english_pob_choice: has measured
  chosen_spanish: ha medido
  alternatives_spanish:
  - midió
  - ha tomado la medida de
  lexicon: HALOT
  rationale: El perfecto hebreo en esta pregunta retórica se refleja bien con el pretérito perfecto compuesto, que mantiene la acción completa con relevancia presente.
- source_word: בְּשָׁעֳלוֹ
  english_pob_choice: in the hollow of his hand
  chosen_spanish: en el hueco de su mano
  alternatives_spanish:
  - en la palma de su mano
  - en el cuenco de su mano
  lexicon: HALOT
  rationale: שָׁעֹל designa el hueco o concavidad de la mano como recipiente de medida. «Hueco de su mano» preserva la imagen antropomórfica y es idiomático en español.
- source_word: מַיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - aguas
  - el agua
  lexicon: HALOT
  rationale: Se conserva el plural hebreo y el alcance cósmico del texto con «las aguas».
- source_word: וְשָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos altos
  - el cielo
  lexicon: HALOT
  rationale: En este contexto elevado y plural, «los cielos» comunica bien el hebreo sin perder la amplitud cósmica.
- source_word: בַּזֶּרֶת
  english_pob_choice: with a span
  chosen_spanish: con un palmo
  alternatives_spanish:
  - con un span
  - con una palma
  lexicon: HALOT
  rationale: זֶרֶת es una medida de la mano, aproximadamente un palmo. «Con un palmo» es claro en español y mantiene la concreción de la medida.
- source_word: תִּכֵּן
  english_pob_choice: marked off
  chosen_spanish: ha marcado
  alternatives_spanish:
  - ha medido
  - ha delimitado
  - ha trazado
  lexicon: HALOT
  rationale: El verbo puede significar medir, determinar o fijar dimensiones. «Ha marcado» evita repetir «medido» y reproduce bien la idea de delimitar la extensión de los cielos.
- source_word: וְכָל
  english_pob_choice: and measured
  chosen_spanish: y ha medido
  alternatives_spanish:
  - y ha calculado
  - y ha contenido
  lexicon: HALOT
  rationale: Aunque la forma morfológica del paquete muestra una cuestión textual/lemática, el contexto y la secuencia de acciones de medida apoyan el sentido de medir/contener. «Ha medido» mantiene la cadena poética de acciones cuantificadoras.
- source_word: בַּשָּׁלִישׁ
  english_pob_choice: in a measure
  chosen_spanish: en una medida
  alternatives_spanish:
  - en una medida de tres
  - en una medida de tercio
  - en una tercia
  lexicon: HALOT
  rationale: El término alude a un recipiente o unidad de medida antigua de equivalencia incierta. «En una medida» preserva el sentido sin fingir una precisión que el hebreo no garantiza.
- source_word: עֲפַר הָאָרֶץ
  english_pob_choice: the dust of the earth
  chosen_spanish: el polvo de la tierra
  alternatives_spanish:
  - el polvo de la tierra
  - el polvo del suelo
  lexicon: HALOT
  rationale: Es una cadena constructa transparente. «Polvo de la tierra» es natural y fiel al hebreo.
- source_word: וְשָׁקַל
  english_pob_choice: and weighed
  chosen_spanish: y ha pesado
  alternatives_spanish:
  - y pesó
  - y ha sopesado
  lexicon: HALOT
  rationale: Continúa la serie de acciones perfectivas de medida y pesaje. «Ha pesado» conserva bien el paralelismo con «ha medido».
- source_word: בַּפֶּלֶס
  english_pob_choice: in scales
  chosen_spanish: en balanzas
  alternatives_spanish:
  - en básculas
  - con balanzas
  - en una balanza
  lexicon: HALOT
  rationale: פֶּלֶס denota un instrumento de pesada. «En balanzas» sigue la revisión inglesa que prefirió el plural para reflejar mejor el hebreo y mantiene el paralelismo con «en una balanza»/«en balanzas» del miembro final.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: «Montes» es una buena equivalencia para el hebreo en poesía bíblica y permite un paralelo más sobrio con «collados».
- source_word: וּגְבָעוֹת
  english_pob_choice: and the hills
  chosen_spanish: y los collados
  alternatives_spanish:
  - y las colinas
  - y los montes menores
  lexicon: HALOT
  rationale: גְּבָעוֹת puede renderizarse como collados o colinas. «Collados» conserva un registro bíblico claro y diferencia el segundo miembro del primero.
- source_word: בְּמֹאזְנָיִם
  english_pob_choice: in balances
  chosen_spanish: en una balanza
  alternatives_spanish:
  - en balanzas
  - con balanzas
  lexicon: HALOT
  rationale: El plural dual se refiere a balanzas o instrumentos de pesar. En español, «en una balanza» evita la aspereza de un plural instrumental en el último miembro, aunque la nota conserva la alternativa plural como posible lectura.
theological_decisions:
- issue: Imágenes antropomórficas de medir y pesar aplicadas a Dios
  english_pob_reading: Retains the bodily and manual imagery literally
  chosen_spanish_reading: Mantener literalmente el «hueco de su mano», el «palmo» y las «balanzas»
  alternative_spanish_readings:
  - parafrasear con expresiones abstractas como «con su poder» o «con exactitud»
  rationale: El versículo usa imágenes concretas de medida para subrayar la incomparabilidad y soberanía de Dios sobre la creación. No hay necesidad doctrinal de suavizar la imaginería; conservarla refleja mejor la poesía hebrea.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referencia a los cielos y a las aguas en lenguaje cósmico plural
  english_pob_reading: Preserves 'the heavens' and 'the waters'
  chosen_spanish_reading: «los cielos» y «las aguas»
  alternative_spanish_readings:
  - «el cielo» y «el agua»
  rationale: El hebreo emplea plurales con alcance cósmico. El plural español mantiene mejor esa amplitud y evita reducir el campo semántico.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado del inglés POB: mantiene la serie de acciones perfectivas y conserva el ajuste revisado de «in scales / in balances» como plural instrumental en el miembro de los montes, pero en español opta por una solución idiomática final singular («en una balanza») con nota alternativa para no forzar la sintaxis. También refleja la decisión del inglés de preservar la imaginería antropomórfica literal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando el texto fuente exija el nombre divino, pero este versículo no lo contiene.
  - Se conserva «cielos» en plural para alinear con el hebreo.
  - Se evita «SEÑOR» o paráfrasis devocionales no requeridas por el hebreo.
  - «Montes» y «collados» siguen un registro bíblico claro y uniforme con la poesía profética.
  - Las notas mantienen las alternativas semánticas donde el hebreo presenta una medida antigua o una posible ambigüedad instrumental.
