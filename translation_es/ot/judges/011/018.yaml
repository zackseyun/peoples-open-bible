translation:
  language: es
  text: Entonces fue por el desierto y rodeó la tierra de Edom y la tierra de Moab[a], y llegó a la parte oriental de la tierra de Moab, y acamparon al otro lado del Arnón[b]; pero no entraron en el territorio de Moab, porque el Arnón era el límite de Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «desde la salida del sol hacia la tierra de Moab», un giro idiomático que indica aproximación por el este.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «más allá del Arnón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went through
  chosen_spanish: fue por
  alternatives_spanish:
  - fue
  - viajó por
  - atravesó
  lexicon: HALOT
  rationale: הלך es el verbo básico 'ir/caminar'. En contexto con בַּמִּדְבָּר, 'fue por el desierto' comunica el desplazamiento por esa zona sin forzar un valor más específico que el hebreo no exige.
- source_word: בַּמִּדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el desierto semidespoblado
  - el yermo
  - el desierto / la estepa
  lexicon: HALOT
  rationale: מִדְבָּר puede referirse a desierto, yermo o región árida de pastoreo. 'Desierto' es claro y natural en español bíblico contemporáneo; se mantiene el sentido geográfico amplio sin precisar arena.
- source_word: וַיָּסָב
  english_pob_choice: went around
  chosen_spanish: rodeó
  alternatives_spanish:
  - dio la vuelta a
  - circundó
  - pasó alrededor de
  lexicon: HALOT
  rationale: סבב aquí expresa tomar una ruta alrededor de Edom y Moab. 'Rodeó' es la opción española más directa y fiel al movimiento de evitar pasar por esas tierras.
- source_word: אֶרֶץ אֱדוֹם
  english_pob_choice: the land of Edom
  chosen_spanish: la tierra de Edom
  alternatives_spanish:
  - el territorio de Edom
  - la región de Edom
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra, territorio o país. 'Tierra' conserva bien el paralelismo del texto y la referencia geográfica sin tecnicismo innecesario.
- source_word: אֶרֶץ מוֹאָב
  english_pob_choice: the land of Moab
  chosen_spanish: la tierra de Moab
  alternatives_spanish:
  - el territorio de Moab
  - la región de Moab
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia que para Edom por consistencia estilística y semántica.
- source_word: וַיָּבֹא מִמִּזְרַח שֶׁמֶשׁ לְאֶרֶץ מוֹאָב
  english_pob_choice: came to the east side of the land of Moab
  chosen_spanish: llegó a la parte oriental de la tierra de Moab
  alternatives_spanish:
  - llegó desde el oriente a la tierra de Moab
  - llegó al lado oriental de la tierra de Moab
  - llegó desde la salida del sol a la tierra de Moab
  lexicon: HALOT
  rationale: מִמִּזְרַח שֶׁמֶשׁ, literalmente 'desde el nacimiento/salida del sol', funciona como giro idiomático para indicar aproximación por el este. 'Parte oriental' recoge el sentido geográfico con español natural sin perder la imagen direccional.
- source_word: וַיַּחֲנוּן
  english_pob_choice: they camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - levantaron el campamento
  - se acamparon
  lexicon: HALOT
  rationale: חנה significa acampar/establecer campamento. 'Acamparon' mantiene el valor narrativo y militar del verbo con español claro.
- source_word: בְּעֵבֶר אַרְנוֹן
  english_pob_choice: beyond the Arnon
  chosen_spanish: al otro lado del Arnón
  alternatives_spanish:
  - más allá del Arnón
  - del otro lado del Arnón
  - en la otra orilla del Arnón
  lexicon: HALOT
  rationale: עֵבֶר indica el lado opuesto o más allá desde un punto de referencia. 'Al otro lado del Arnón' preserva esa perspectiva sin decidir de forma excesiva la geografía exacta.
- source_word: וְלֹא בָאוּ בִּגְבוּל מוֹאָב
  english_pob_choice: they did not enter the territory of Moab
  chosen_spanish: no entraron en el territorio de Moab
  alternatives_spanish:
  - no llegaron al borde de Moab
  - no entraron en el límite de Moab
  - no cruzaron el territorio de Moab
  lexicon: HALOT
  rationale: גבול puede significar borde, límite o territorio. 'Territorio' comunica mejor en español la idea de penetrar dentro del dominio moabita, en línea con la explicación del verso.
- source_word: כִּי אַרְנוֹן גְּבוּל מוֹאָב
  english_pob_choice: for the Arnon was the border of Moab
  chosen_spanish: porque el Arnón era el límite de Moab
  alternatives_spanish:
  - porque el Arnón era la frontera de Moab
  - pues el Arnón era el borde de Moab
  lexicon: HALOT
  rationale: Se conserva el valor explicativo de כִּי. 'Límite' reproduce bien גְּבוּל en español, con un tono natural y coherente con 'territorio' en la cláusula anterior.
theological_decisions:
- issue: Relación entre 'territorio' y 'límite/frontera' en גבול
  english_pob_reading: they did not enter the territory of Moab, for the Arnon was the border of Moab
  chosen_spanish_reading: no entraron en el territorio de Moab, porque el Arnón era el límite de Moab
  alternative_spanish_readings:
  - no entraron en la frontera de Moab, porque el Arnón era la frontera de Moab
  - no entraron en el borde de Moab, porque el Arnón era el borde de Moab
  rationale: El hebreo usa גבול dos veces con un valor que abarca límite/borde/frontera. En español, 'territorio' para la primera cláusula y 'límite' para la segunda preserva la explicación causal sin aplanar el paralelismo ni repetir una palabra menos natural.
  doctrine_reference: no aplica; decisión geográfica y lexical
translation_notes:
  revision_awareness: 'Concordante con el contexto auditado en inglés: se mantiene la lectura óptima del giro idiomático מִמִּזְרַח שֶׁמֶשׁ como aproximación por el lado oriental, y de בְּעֵבֶר אַרְנוֹן como ubicación al otro lado del río. No se registraron revisiones aplicadas en el contexto fuente.'
  spanish_consistency_notes:
  - Se conservó 'Yahvé' implícito no porque no aparezca en el versículo, sino porque aquí no hay tetragrámaton ni título divino explícito.
  - '''Tierra'' se usó de manera uniforme para אֶרֶץ, siguiendo el paralelismo del texto.'
  - Se prefirió 'Arnón' como forma española estable del topónimo.
  - Se evitó 'SEÑOR' o paráfrasis devocional, porque el versículo es narrativo-geográfico y no contiene nombre divino.
