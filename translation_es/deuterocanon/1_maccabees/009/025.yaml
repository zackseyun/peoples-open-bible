translation:
  language: es
  text: Y Báquides escogió a hombres impíos y los nombró gobernantes de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señores de la tierra». El griego usa literalmente un término que significa «señores» o «amos», pero aquí probablemente se refiere a autoridades políticas.
