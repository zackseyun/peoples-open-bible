translation:
  language: es
  text: Si el impío restituye la prenda[a], restituye lo que ha robado, anda en los estatutos de la vida[b] sin hacer injusticia, vivirá ciertamente; no morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo que fue tomado en prenda'—el hebreo se refiere a la restitución de un objeto retenido como garantía de un préstamo.
    reason: lexical_alternative
  - marker: b
    text: O 'anda en estatutos que dan vida' o 'anda por los estatutos que dan vida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲבֹל
  english_pob_choice: the pledge
  chosen_spanish: la prenda
  alternatives_spanish:
  - lo que fue tomado en prenda
  - la garantía
  lexicon: HALOT
  rationale: El sustantivo se refiere a un objeto retenido como seguridad de un préstamo. En español, 'prenda' conserva el sentido jurídico-económico de algo dado o retenido en garantía, y permite una expresión natural sin perder el trasfondo legal.
- source_word: יָשִׁיב
  english_pob_choice: restores
  chosen_spanish: restituye
  alternatives_spanish:
  - devuelve
  - retorna
  lexicon: HALOT
  rationale: En este contexto de reparación legal, 'restituye' comunica mejor la idea de devolver algo retenido o perdido por injusticia que el simple 'devuelve'.
- source_word: רָשָׁע
  english_pob_choice: the wicked man
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el culpable
  lexicon: HALOT
  rationale: El término es sustantivado y singular. 'Impío' es una equivalencia bíblica natural en español y mantiene el tono moral y forense del pasaje.
- source_word: גְּזֵלָה
  english_pob_choice: what he has stolen
  chosen_spanish: lo que ha robado
  alternatives_spanish:
  - lo robado
  - lo hurtado
  lexicon: HALOT
  rationale: El hebreo nombra el objeto de la apropiación ilícita; 'lo que ha robado' expresa con claridad el referente y armoniza con el verbo siguiente de pago o reparación.
- source_word: יְשַׁלֵּם
  english_pob_choice: repays
  chosen_spanish: paga
  alternatives_spanish:
  - hace restitución por
  - resarcirá
  lexicon: HALOT
  rationale: El verbo pi'el aquí tiene fuerza de compensación o restitución. 'Paga' es breve y natural en español; en este marco jurídico transmite la idea de saldar la deuda de lo robado.
- source_word: בְּחֻקּוֹת הַחַיִּים
  english_pob_choice: in the statutes of life
  chosen_spanish: en los estatutos de la vida
  alternatives_spanish:
  - por los estatutos de la vida
  - en los estatutos que dan vida
  - en estatutos que dan vida
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea con un giro directo y publicable en español. La construcción deja abierta, como en el inglés POB, la tensión entre estatutos caracterizados por la vida y estatutos que producen vida.
- source_word: הָלַךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  lexicon: HALOT
  rationale: En español bíblico 'andar' conserva la metáfora de conducta o manera de vida sin sonar tan literal o técnico como 'caminar' en este contexto.
- source_word: לְבִלְתִּי עֲשׂוֹת עָוֶל
  english_pob_choice: without doing injustice
  chosen_spanish: sin hacer injusticia
  alternatives_spanish:
  - sin cometer injusticia
  - para no hacer mal
  lexicon: HALOT
  rationale: La construcción infinitiva expresa abstención de la conducta injusta. 'Sin hacer injusticia' preserva la relación directa entre el acto moral y el sustantivo siguiente.
- source_word: עָוֶל
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - mal
  - iniquidad
  lexicon: HALOT
  rationale: En este contexto jurídico-profético, 'injusticia' es la opción más precisa y transparente para el lector en español.
- source_word: חָיוֹ יִחְיֶה
  english_pob_choice: he shall surely live
  chosen_spanish: vivirá ciertamente
  alternatives_spanish:
  - vivirá de seguro
  - ciertamente vivirá
  - vivirá, sí, vivirá
  lexicon: HALOT
  rationale: La combinación del infinitivo absoluto con el imperfecto intensifica la certeza. 'Vivirá ciertamente' conserva la fuerza enfática sin sonar forzado en español.
- source_word: לֹא יָמוּת
  english_pob_choice: he shall not die
  chosen_spanish: no morirá
  alternatives_spanish:
  - no llegará a morir
  - no tendrá muerte
  lexicon: HALOT
  rationale: La negación directa mantiene el paralelismo y la solemnidad del cierre oracular.
theological_decisions:
- issue: Alcance de 'vida' y 'muerte' en la promesa y la advertencia
  english_pob_reading: Retain the text's direct promise and warning as 'he shall surely live; he shall not die' without specifying whether the reference is temporal, covenantal, or eschatological.
  chosen_spanish_reading: 'Mantener la promesa directa: ''vivirá ciertamente; no morirá'', sin especificar si se trata de supervivencia física, restauración pactual o vida escatológica.'
  alternative_spanish_readings:
  - vivirá físicamente
  - tendrá restauración pactual
  - vivirá para siempre
  rationale: El hebreo presenta una afirmación contundente sin aclarar de modo explícito el nivel de cumplimiento. La traducción española conserva esa tensión teológica en vez de cerrarla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión sigue de cerca el sentido y la estructura del hebreo, en consonancia con la traducción inglesa auditada; no se detectaron revisiones posteriores que alteren las decisiones léxicas o teológicas principales.
  spanish_consistency_notes:
  - '''Impío'' mantiene el valor sustantivado singular de רָשָׁע.'
  - '''Prenda'' y ''restituye'' conservan el campo jurídico-económico del acto de reparación.'
  - Se preserva la ambigüedad controlada de 'estatutos de la vida', como en el expediente inglés.
  - '''Vivirá ciertamente'' reproduce la intensificación del infinitivo absoluto + imperfecto.'
  - '''No morirá'' mantiene el paralelismo final y la forma sobria del oráculo.'
