    issue: «que sea rociado» debilita יִצְטַבַּע
    rationale: El arameo y la decisión léxica inglesa apuntan a ser mojado intensamente («drenched»), no meramente recibir rocío por aspersión. «Empapado» o «empapado con el rocío» preserva mejor la fuerza.
  - severity: low
    issue: «descendía desde los cielos» es menos natural en español
    rationale: Aunque el plural semítico está detrás del original, en español bíblico corriente «del cielo» comunica el mismo referente con mejor fluidez. No se pierde contenido fuente relevante.
