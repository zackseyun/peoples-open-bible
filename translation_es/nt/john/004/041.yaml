translation:
  language: es
  text: Y muchos más creyeron por su palabra[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos más todavía». El griego usa una expresión comparativa intensificada.
    reason: lexical_alternative
  - marker: b
    text: O «mensaje».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλῷ πλείους
  english_pob_choice: many more
  chosen_spanish: muchos más
  alternatives_spanish:
  - muchísimos más
  - muchos otros
  - mucho más
  lexicon: BDAG
  rationale: La expresión griega intensifica el comparativo πλείους con el dativo πολλῷ. «Muchos más» comunica el aumento comparativo de manera natural en español y mantiene la idea de incremento respecto al versículo anterior sin forzar una paráfrasis.
- source_word: ἐπίστευσαν
  english_pob_choice: believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - llegaron a creer
  - pusieron su fe
  - creyeron en él
  lexicon: BDAG
  rationale: El aoristo de πιστεύω se puede rendir de forma directa por «creyeron». En este versículo el objeto explícito no aparece, así que «creyeron» conserva la formulación del griego sin añadir una aclaración que el texto no da.
- source_word: διὰ
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - por causa de
  lexicon: BDAG
  rationale: 'Con acusativo, διά expresa causa o motivo. En español, «por» es una forma natural y fiel para indicar la razón de la fe: la palabra de Jesús.'
- source_word: λόγον
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - discurso
  - enseñanza
  lexicon: BDAG
  rationale: Aunque «mensaje» también sería posible, «palabra» preserva mejor la dicción joánica y refleja la referencia inmediata a lo que Jesús dijo. En español también deja abierta la resonancia temática de λόγος en Juan sin sobreexplicar.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de Jesús
  lexicon: BDAG
  rationale: El pronombre refiere a Jesús en el contexto inmediato. «Su» es el equivalente español directo y claro.
theological_decisions:
- issue: πιστεύω sin objeto explícito en un contexto de fe
  english_pob_reading: believed
  chosen_spanish_reading: creyeron
  alternative_spanish_readings:
  - creyeron en él
  - llegaron a creer en él
  - pusieron su fe en él
  rationale: El griego afirma simplemente que muchos más «creyeron» a causa de su palabra. Como no hay objeto explícito en este versículo, la traducción evita añadirlo. Así se conserva la tensión textual y se deja que el contexto joánico identifique a Jesús como el referente implícito.
  doctrine_reference: Primacía del texto original; no ampliar la formulación doctrinal más allá del versículo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y coincide sustancialmente con el audit trail inglés: conserva el comparativo intensificado de πολλῷ πλείους, traduce πιστεύω de forma simple como «creyeron» y vierte λόγος como «palabra» para mantener la resonancia joánica. No se registraron revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando aparece el nombre divino, pero este versículo no lo contiene.
  - Se evita introducir «en él» porque el griego no lo expresa en esta cláusula.
  - «Palabra» mantiene mejor la terminología joánica que «mensaje», aunque se conserva la alternativa en nota por la ambigüedad léxica.
  - El tono es moderno y sobrio, apto para publicación eclesial sin depender de fórmulas tradicionales ajenas al griego.
