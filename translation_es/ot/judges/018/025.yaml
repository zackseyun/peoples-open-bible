translation:
  language: es
  text: 'Y los hijos de Dan[a] le dijeron: «No hagas oír tu voz entre nosotros[b], no sea que hombres de alma amarga caigan sobre ti, y pierdas tu vida y la de los de tu casa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los danitas». El hebreo conserva la expresión tribal literal, que aquí se traduce de forma más transparente.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «No hagas oír tu voz entre nosotros». La expresión hebrea usa el idioma de “oír tu voz” para advertirle que deje de hablar en presencia de ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי דָן
  english_pob_choice: the sons of Dan
  chosen_spanish: los hijos de Dan
  alternatives_spanish:
  - los danitas
  lexicon: HALOT
  rationale: Conserva la expresión genealógica/tribal del hebreo sin sustituirla por un etnónimo más interpretativo. En español, «hijos de Dan» es natural y mantiene la forma del original.
- source_word: אַל תַּשְׁמַע קוֹלְךָ עִמָּנוּ
  english_pob_choice: Do not let your voice be heard among us
  chosen_spanish: No hagas oír tu voz entre nosotros
  alternatives_spanish:
  - No dejes que se oiga tu voz entre nosotros
  - No nos hables más
  lexicon: HALOT
  rationale: La frase hebrea usa el idioma de «oír tu voz». «No hagas oír tu voz» preserva esa imagen y comunica la advertencia de callar en su presencia, sin volverla una paráfrasis más distante.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - por si
  lexicon: HALOT
  rationale: «No sea que» reproduce bien el valor de advertencia y consecuencia inminente del hebreo, con registro natural en español bíblico contemporáneo.
- source_word: יִפְגְּעוּ בָכֶם
  english_pob_choice: fall upon you
  chosen_spanish: caigan sobre ustedes
  alternatives_spanish:
  - los ataquen
  - se lancen sobre ustedes
  lexicon: HALOT
  rationale: «Caigan sobre ustedes» conserva la vividez del hebreo y la ambigüedad de encuentro hostil/asalto que el POB inglés deja en «fall upon you». Se evita endurecerlo prematuramente a un solo matiz.
- source_word: אֲנָשִׁים מָרֵי נֶפֶשׁ
  english_pob_choice: men bitter of soul
  chosen_spanish: hombres amargados de alma
  alternatives_spanish:
  - hombres de alma amarga
  - hombres desesperados
  - hombres feroces
  lexicon: HALOT
  rationale: «Amargados de alma» mantiene la metáfora hebrea y la tensión lexical que el POB preserva. «Feroz» o «desesperado» interpretan más el efecto que la forma; por eso se deja la imagen del alma amargada.
- source_word: וְאָסַפְתָּה נַפְשְׁךָ
  english_pob_choice: and you lose your life
  chosen_spanish: y pierdas tu vida
  alternatives_spanish:
  - y recojas tu vida
  - y pierdas el alma
  lexicon: HALOT
  rationale: El verbo אסף con נפש aquí expresa la pérdida/remoción de la vida. «Pierdas tu vida» comunica el sentido idiomático en español sin introducir una metáfora extraña como «recoger tu vida».
- source_word: וְנֶפֶשׁ בֵּיתֶךָ
  english_pob_choice: and the lives of your household
  chosen_spanish: y la vida de tu casa
  alternatives_spanish:
  - y las vidas de tu casa
  - y la vida de tu familia
  lexicon: HALOT
  rationale: El hebreo singular נפש puede funcionar de modo colectivo. «La vida de tu casa» preserva esa forma concentrada y corresponde al sentido de la amenaza sobre toda la casa; «familia» explicita más de lo que el hebreo dice.
translation_notes:
  revision_awareness: El pasaje coincide en sustancia con el audit trail inglés y el control cruzado marca alta concordancia. No se requieren revisiones textuales; la principal decisión en español es mantener la imagen hebrea de «oír la voz» y la amenaza idiomática sobre la vida de la casa, con una ligera adaptación para fluidez natural.
  spanish_consistency_notes:
  - Se conserva «hijos de Dan» de manera consistente con la preferencia por expresiones tribales transparentes.
  - Se evita «SEÑOR» o sustituciones tradicionales no motivadas porque no hay un Tetragrámaton en este versículo.
  - Se mantiene el léxico de vida/alma/casa conforme al hebreo, sin convertir נפש en «alma» de forma automática.
  - La puntuación y el diálogo siguen un formato bíblico moderno, claro y publicable.
