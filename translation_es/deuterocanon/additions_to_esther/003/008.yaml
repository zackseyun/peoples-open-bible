revisions:
- from: Y ahora, Señor Dios, Rey, Dios de Abraham, perdona[a] a tu pueblo[b], porque nos miran para destrucción y han deseado destruir tu herencia desde el principio.
  to: Y ahora, Señor Dios, Rey, Dios de Abraham, preserva a tu pueblo, porque nos vigilan[a] para destruirnos y han deseado destruir tu herencia[b] desde el principio.
  rationale: Se cambió «perdona» por «preserva» para reflejar con precisión φεῖσαι como súplica de no destruir o librar, no de absolver culpa. Se reformuló «nos miran para destrucción» como «nos vigilan para destruirnos» para lograr un español natural que conserve la intención hostil del griego y del audit trail inglés. También se reubicaron las notas al lugar correspondiente en el texto.
