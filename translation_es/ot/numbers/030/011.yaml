translation:
  language: es
  text: Y si en la casa de su marido hizo un voto, o se obligó a sí misma por juramento a una obligación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «ató una obligación vinculante sobre sí misma con un juramento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Pero si
  lexicon: HALOT
  rationale: La forma condicional introduce una nueva casuística legal. «Y si» conserva el enlace con el contexto inmediato y suena natural en español.
- source_word: בֵּית אִישָׁהּ
  english_pob_choice: in her husband's house
  chosen_spanish: en la casa de su marido
  alternatives_spanish:
  - en la casa de su esposo
  - en el hogar de su marido
  - en la casa de su marido
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «la casa de su marido». En español, «en la casa de su marido» preserva bien el ámbito doméstico y legal sin añadir matices no atestiguados.
- source_word: נָדָרָה
  english_pob_choice: she made a vow
  chosen_spanish: hizo un voto
  alternatives_spanish:
  - hizo un voto solemne
  - votó
  - prometió
  lexicon: HALOT
  rationale: נדר expresa hacer un voto. «Hizo un voto» es claro y relativamente literal en español; se evita «prometió» porque suaviza el carácter formal del acto.
- source_word: אָסְרָה אִסָּר
  english_pob_choice: bound herself by an obligation
  chosen_spanish: se impuso una obligación
  alternatives_spanish:
  - se ató con una obligación
  - se vinculó con un compromiso
  - se obligó con un vínculo
  lexicon: HALOT
  rationale: El hebreo usa un verbo y sustantivo cognados para intensificar la idea de autoimposición vinculante. «Se impuso una obligación» comunica ese sentido legal de manera natural y conserva la fuerza de la construcción.
- source_word: עַל נַפְשָׁהּ
  english_pob_choice: bound herself
  chosen_spanish: se impuso
  alternatives_spanish:
  - sobre sí misma
  - a sí misma
  - sobre su vida
  lexicon: HALOT
  rationale: En este modismo, נֶפֶשׁ se refiere a la persona misma, no solo al alma en sentido estrecho. El español puede absorberlo en «se impuso» sin perder el valor reflexivo del acto.
- source_word: בִּשְׁבֻעָה
  english_pob_choice: with an oath
  chosen_spanish: con juramento
  alternatives_spanish:
  - con un juramento
  - bajo juramento
  - mediante juramento
  lexicon: HALOT
  rationale: La preposición indica medio o acompañamiento. «Con juramento» expresa el carácter solemne del acto y evita la posible ambigüedad de «juramento» como simple fórmula verbal.
translation_notes:
  revision_awareness: La redacción sigue de cerca la estructura hebrea y el ajuste auditado de la versión inglesa, que reordenó el final para reflejar mejor la relación entre juramento y obligación. El español adopta una formulación equivalente y natural sin perder la secuencia legal del texto.
  spanish_consistency_notes:
  - Se mantuvo «voto» para נדר y «obligación» para אִסָּר, siguiendo la distinción funcional del hebreo.
  - Se evitó «SEÑOR» o cualquier perífrasis teológica, ya que el versículo no contiene el nombre divino.
  - «Marido» conserva el referente doméstico/legal del texto hebreo sin introducir una lectura sociológica adicional.
