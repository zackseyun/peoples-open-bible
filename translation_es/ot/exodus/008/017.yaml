base_translation:
  language: en
  yaml_path: translation/ot/exodus/008/017.yaml
  text: For if you do not let my people go[a], behold, I am sending the swarm upon you, upon your servants, upon your people, and into your houses. The houses of Egypt will be filled with the swarm[b], and also the ground on which they are.
  footnotes:
  - marker: a
    text: Or 'the flies.' The Hebrew עָרֹב likely denotes a swarm, traditionally understood as flies; the broader rendering preserves the lexical uncertainty.
    reason: lexical_alternative
  - marker: b
    text: Or 'the land on which they are.' Hebrew אֲדָמָה can mean 'ground' or 'land.'
    reason: lexical_alternative
