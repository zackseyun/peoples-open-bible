revisions:
- from: En el año en que el Tartan[a] llegó a Asdod, cuando Sargón, rey de Asiria, lo envió, y peleó contra Asdod y la capturó,
  to: En el año en que el Tartan[a] vino a Asdod, cuando Sargón, rey de Asiria, lo envió, y combatió contra Asdod y la capturó,
