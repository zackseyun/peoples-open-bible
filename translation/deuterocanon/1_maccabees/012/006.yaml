translation:
  text: Jonathan the high priest of the nation[a], and the council of elders, and the priests, and the rest of the people of the Jews, to their Spartan brothers[b], greetings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judeans' for 'Jews'; the Greek term can denote the people of Judea in ethnic-political as well as religious terms.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' reflects the Greek wording of diplomatic kinship; it need not imply literal siblinghood.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀρχιερεὺς
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: Standard rendering for the Jewish office; 'high priest' is the clear and established sense in this context.
- source_word: τοῦ ἔθνους
  chosen: of the nation
  alternatives:
  - of the people
  lexicon: BDAG
  rationale: ἔθνος here refers to the Jewish national body rather than 'Gentiles.' 'Of the nation' preserves the political-collective sense attached to Jonathan's office.
- source_word: γερουσία
  chosen: council of elders
  alternatives:
  - senate
  - eldership
  lexicon: LSJ
  rationale: The term denotes the governing body of elders. 'Council of elders' is more transparent to modern readers than 'senate' while preserving the institutional sense.
- source_word: ὁ λοιπὸς δῆμος
  chosen: the rest of the people
  alternatives:
  - the remaining populace
  - the rest of the assembly
  lexicon: LSJ
  rationale: δῆμος means the people as a civic body; 'the rest of the people' naturally distinguishes them from the named leaders and priests.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Judeans
  lexicon: BDAG
  rationale: In 1 Maccabees this term can carry ethnic, religious, and political force. 'Jews' is the most natural English rendering here for the collective sender identity, though 'Judeans' is a possible alternative.
- source_word: Σπαρτιάταις
  chosen: Spartan
  alternatives:
  - Lacedaemonian
  lexicon: LSJ
  rationale: The dative identifies the recipients as Spartans. 'Spartan' is the standard and clearest English ethnonym.
- source_word: τοῖς ἀδελφοῖς
  chosen: brothers
  alternatives:
  - kinsmen
  - brothers and allies
  lexicon: BDAG
  rationale: The Greek explicitly says 'brothers.' In this diplomatic context it expresses claimed kinship or fraternity. Per translation philosophy, the masculine term is retained rather than neutralized.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - sends greetings
  lexicon: BDAG
  rationale: This is the conventional epistolary infinitive in Hellenistic letters. 'Greetings' best captures the formula in idiomatic English.
