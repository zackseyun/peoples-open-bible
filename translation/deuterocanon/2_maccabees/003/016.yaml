id: 2MA.3.16
reference: 2 Maccabees 3:16
source:
  edition: lxx-swete-1909
  text: ἦν δὲ ὁρῶντα τὴν τοῦ ἀρχιερέως ἰδέαν τιτρώσκεσθαι τὴν διάνοιαν· ἥ γὰρ ὄψις καὶ τῆς χρόας παρηλλαγμένον ἐνέφαινεν τὴν κατὰ ψυχὴν ἀγωνίαν.
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: To see the appearance of the high priest was enough to wound the mind[b][a]; for his face and altered color made visible the agony in his soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to pierce the mind' or 'to distress the mind.' The Greek uses a verb of wounding metaphorically for the effect on the observer.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the agony according to the soul,' that is, the inward anguish of his soul.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν ... ὁρῶντα
  chosen: To one who saw
  alternatives:
  - for one seeing
  - to anyone who looked at
  lexicon: LSJ
  rationale: The construction is idiomatic and elliptical in Greek, expressing the effect on any observer. 'To one who saw' preserves the impersonal/general force without over-literal awkwardness.
- source_word: ἰδέαν
  chosen: appearance
  alternatives:
  - look
  - form
  - bearing
  lexicon: LSJ
  rationale: Here the term refers to the visible aspect of the high priest. 'Appearance' is natural English and broad enough to include expression and bearing.
- source_word: τιτρώσκεσθαι τὴν διάνοιαν
  chosen: to wound the mind
  alternatives:
  - to pierce the mind
  - to distress the mind
  - to wound the heart
  lexicon: LSJ
  rationale: The verb literally denotes wounding. 'Mind' reflects διάνοια more closely than 'heart,' while still conveying inward mental anguish caused in the observer.
- source_word: ὄψις
  chosen: face
  alternatives:
  - appearance
  - look
  lexicon: LSJ
  rationale: In the explanatory clause, paired with changed color, the word points to the visible countenance. 'Face' makes the image concrete in English.
- source_word: χρόας παρηλλαγμένον
  chosen: changed color
  alternatives:
  - altered complexion
  - color drained/changed
  - changed countenance
  lexicon: LSJ
  rationale: χρόα refers to bodily color/complexion, and παρηλλαγμένον indicates alteration. 'Changed color' is straightforward modern English and leaves the exact direction of the change implicit, as in the Greek.
- source_word: ἐνέφαινεν
  chosen: made visible
  alternatives:
  - showed
  - revealed
  - displayed
  lexicon: LSJ
  rationale: The verb means to show forth or make evident. 'Made visible' fits the emphasis on outward signs disclosing inward distress.
- source_word: τὴν κατὰ ψυχὴν ἀγωνίαν
  chosen: the agony in his soul
  alternatives:
  - the anguish in his soul
  - his inward agony
  - the distress in his inner being
  lexicon: LSJ
  rationale: ἀγωνία denotes intense anguish or struggle. 'In his soul' reflects the Greek phrase closely and preserves the inward/spiritual dimension without over-interpreting it.
