translation:
  language: es
  text: 'Entonces los hombres de la ciudad dijeron a Eliseo: «Por favor, mira: el emplazamiento de la ciudad es bueno, como mi señor ve; pero el agua es mala, y la tierra[a] es infecunda».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el terreno». El hebreo de «es infecunda» puede denotar que causa pérdida de descendencia y, en este contexto, puede extenderse a la esterilidad o improductividad de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  lexicon: HALOT
  rationale: La forma narrativa hebrea avanza la acción; «entonces» transmite bien el enlace temporal sin perder naturalidad en español.
- source_word: אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - la gente de la ciudad
  - los ciudadanos
  lexicon: HALOT
  rationale: אַנְשֵׁי es masculino plural en constructo, así que se conserva «hombres» para mantener la precisión formal del hebreo.
- source_word: הִנֵּה נָא
  english_pob_choice: Please see
  chosen_spanish: Por favor, mira
  alternatives_spanish:
  - Por favor, ve
  - Mira, por favor
  lexicon: HALOT
  rationale: La combinación expresa atención y ruego; «por favor» recoge נָא y «mira» conserva la fuerza deíctica de הִנֵּה en un español natural.
- source_word: מוֹשַׁב הָעִיר
  english_pob_choice: the situation of the city
  chosen_spanish: la situación de la ciudad
  alternatives_spanish:
  - el sitio de la ciudad
  - el lugar de la ciudad
  - la ubicación de la ciudad
  lexicon: HALOT
  rationale: Aquí מוֹשָׁב apunta al estado o condición del asentamiento, no solo a un punto geográfico; «situación» refleja bien ese valor en español.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - favorable
  - bueno
  lexicon: HALOT
  rationale: Concuerda con «situación» y expresa una valoración positiva sencilla y fiel al hebreo.
- source_word: כַּאֲשֶׁר אֲדֹנִי רֹאֶה
  english_pob_choice: as my lord sees
  chosen_spanish: como mi señor ve
  alternatives_spanish:
  - como mi señor puede ver
  - según ve mi señor
  lexicon: HALOT
  rationale: Se conserva el título respetuoso «mi señor» para אֲדֹנִי, sin convertirlo en fórmula litúrgica. «Ve» reproduce de forma directa el verbo del original.
- source_word: וְהַמַּיִם רָעִים
  english_pob_choice: but the water is bad
  chosen_spanish: pero el agua es mala
  alternatives_spanish:
  - y el agua es mala
  - pero las aguas son malas
  lexicon: HALOT
  rationale: Se mantiene el contraste adversativo implícito por el contexto. «Agua» en singular es natural en español para el suministro de agua.
- source_word: וְהָאָרֶץ
  english_pob_choice: and the land
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y el suelo
  - y el terreno
  lexicon: HALOT
  rationale: «Tierra» preserva la amplitud semántica entre territorio y suelo productivo, como permite el hebreo.
- source_word: מְשַׁכָּלֶת
  english_pob_choice: is unfruitful
  chosen_spanish: es infecunda
  alternatives_spanish:
  - es estéril
  - es improductiva
  - causa pérdidas de hijos
  lexicon: HALOT
  rationale: La POB inglesa optó por «unfruitful» para abarcar el sentido amplio y contextual. «Infecunda» mantiene esa amplitud, puede sugerir esterilidad agrícola y humana, y evita reducir el término a una sola imagen sin base contextual suficiente.
theological_decisions:
- issue: Término final מְשַׁכָּלֶת y su tensión entre esterilidad agrícola y pérdida de hijos
  english_pob_reading: The Hebrew for “causes miscarriages” can denote causing loss of offspring and may extend to agricultural barrenness in context.
  chosen_spanish_reading: «Infecunda» conserva la amplitud del hebreo sin fijar solo una lectura biológica o solo agrícola.
  alternative_spanish_readings:
  - «causa abortos/mortinatos»
  - «es estéril»
  - «es improductiva»
  rationale: El contexto habla del agua y de la tierra del lugar; por eso conviene una formulación amplia que no borre la tensión lexical documentada. «Infecunda» permite ambas dimensiones sin endurecer el pasaje hacia una sola interpretación.
  doctrine_reference: Nota lexical del pasaje; mantener la tensión semántica documentada en la fuente
translation_notes:
  revision_awareness: 'La redacción sigue el cierre revisado del audit trail inglés: se prefirió una equivalencia más cercana para el ruego («por favor, mira»), se mantuvo «situación» para מוֹשַׁב, y se evitó una traducción demasiado literal y chocante de מְשַׁכָּלֶת, optando por una solución amplia como en la última revisión inglesa («unfruitful»).'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - «Mi señor» refleja el honorífico אֲדֹנִי sin implicar deidad.
  - Se evitó «Cristo» porque el pasaje no contiene Χριστός/משיח como título.
  - La puntuación de cita sigue el estilo español y conserva el tono respetuoso del discurso directo.
