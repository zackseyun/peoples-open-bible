revisions:
- from: Y ningún[a] hombre estará en la tienda de reunión cuando entre para hacer expiación en el lugar santo, hasta que salga. Y hará expiación por sí mismo, por su casa y por toda la asamblea de Israel.
  to: Y ninguna persona[a] estará en la tienda de reunión cuando entre para hacer expiación en el lugar santo, hasta que salga. Y hará expiación por sí mismo, por su familia y por toda la asamblea de Israel.
  rationale: Se revisa el texto principal para seguir la decisión auditada vigente sobre כָל אָדָם con una formulación española naturalmente genérica ('ninguna persona'), preservando en nota la alternativa más literal de forma gramatical ('ningún hombre'). También se cambia 'su casa' por 'su familia' para expresar mejor el sentido de household de בֵּיתוֹ en este contexto ritual. El resto del verso ya es fiel al hebreo y de buena calidad en español.
