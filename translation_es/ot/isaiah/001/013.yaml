  text: לֹ֣א תוֹסִ֗יפוּ הָבִיא֙ מִנְחַת שָׁ֔וְא קְטֹ֧רֶת תּוֹעֵבָ֛ה הִ֖יא לִ֑/י חֹ֤דֶשׁ וְ/שַׁבָּת֙ קְרֹ֣א מִקְרָ֔א לֹא אוּכַ֥ל אָ֖וֶן וַ/עֲצָרָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/001/013.yaml
  text: Do not continue bringing worthless grain offerings[a]; incense is an abomination to me. New moon and Sabbath[b], the calling of an assembly—I cannot endure iniquity and solemn assembly.
  footnotes:
