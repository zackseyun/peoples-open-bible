id: 1TH.5.8
reference: 1 Thessalonians 5:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ ἡμέρας ὄντες νήφωμεν, ἐνδυσάμενοι θώρακα πίστεως καὶ ἀγάπης καὶ περικεφαλαίαν ἐλπίδα σωτηρίας·
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/008.yaml
  text: But since we are of the day[a], let us be sober, having put on the breastplate of faith and love[b], and the hope of salvation as a helmet.
  footnotes:
  - marker: a
    text: Or 'faithfulness and love.' The Greek word pistis can mean 'faith,' 'trust,' or 'faithfulness'; here 'faith' is retained in the main text as the default rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'and as a helmet the hope of salvation'.
    reason: previous_rendering
translation:
  language: ko
  text: 그러나 우리는 낮에 속한 사람들이니, 믿음[a]과 사랑의 가슴받이[b]를 입고 구원의 소망을 투구로 쓰고서 정신을 차립시다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「신실함과 사랑」. 헬라어 πίστις는 「믿음·신뢰·신실함」 모두를 담을 수 있으며, 본문은 기본값 「믿음」을 따른다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「구원의 소망을 투구로 쓰고」를 「가슴받이를 입고 구원의 소망을 투구로 쓰고」로 분리해 옮길 수도 있다.
    reason: previous_rendering
lexical_decisions:
- source_word: ἡμέρας ὄντες
  english_pob_choice: since we are of the day
  chosen_korean: 낮에 속한 사람들이니
  alternatives_korean:
  - 낮의 사람들이니
  - 낮에 속한 자들이므로
  lexicon: BDAG
  rationale: 속격의 「속함」 의미를 5:5와 일관되게 유지.
- source_word: θώρακα πίστεως καὶ ἀγάπης
  english_pob_choice: breastplate of faith and love
  chosen_korean: 믿음과 사랑의 가슴받이
  alternatives_korean:
  - 믿음과 사랑의 흉배
  - 믿음과 사랑의 갑옷
  lexicon: BDAG
  rationale: θώραξ는 가슴을 보호하는 갑옷 부위. 「가슴받이」가 현대 한국어로 자연스럽고 「흉배」는 한자어로 거리감이 있다.
- source_word: περικεφαλαίαν ἐλπίδα σωτηρίας
  english_pob_choice: the hope of salvation as a helmet
  chosen_korean: 구원의 소망을 투구로 쓰고서
  alternatives_korean:
  - 구원의 소망인 투구를 쓰고
  - 투구로서 구원의 소망을 쓰고
  lexicon: BDAG
  rationale: 동격 구문(「투구—곧 구원의 소망」)을 「~을 투구로 쓰고서」로 자연스럽게 옮긴다.
