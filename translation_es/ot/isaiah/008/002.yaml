revisions:
- from: 'Y atestiguaré para mí testigos fieles[a][b]: Urías el sacerdote y Zacarías hijo de Jeberequías.'
  to: 'Y tomaré para mí mismo testigos fieles[a][b]: Urías el sacerdote y Zacarías hijo de Jeberequías.'
  rationale: Se reemplaza «atestiguaré» por «tomaré» para reflejar con precisión que el hablante asegura o designa testigos, en línea con el hebreo y la decisión auditada en inglés. Se añade «mismo» para expresar con más naturalidad el matiz de לִּי en español. Se conserva «fieles» con nota alternativa y el resto de los nombres y títulos permanecen adecuados.
