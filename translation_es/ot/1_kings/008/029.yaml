translation:
  language: es
  text: 'para que tus ojos estén abiertos hacia esta casa noche y día, hacia el lugar del que dijiste: «Mi nombre estará allí»[a], para escuchar la oración que tu siervo ore hacia este lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mi nombre estará allí» es lenguaje del templo para la asociación escogida de Dios con este lugar, lo cual implica su presencia pactal sin reducir la frase a esa sola glosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִהְיוֹת
  english_pob_choice: that ... may be
  chosen_spanish: para que ... estén
  alternatives_spanish:
  - para ser
  - a fin de que ... estén
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa finalidad; en español, «para que» transmite con naturalidad ese valor de propósito. El subjuntivo «estén» conserva la idea de estado deseado sin endurecer la sintaxis.
- source_word: עֵינֶךָ פְתֻחוֹת
  english_pob_choice: your eyes may be open
  chosen_spanish: tus ojos estén abiertos
  alternatives_spanish:
  - tus ojos permanezcan abiertos
  - tu atención esté puesta
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica de ojos abiertos, como en el inglés POB. «Estén abiertos» refleja el hebreo sin reemplazarlo por una abstracción interpretativa como «tu atención».
- source_word: אֶל הַבַּיִת הַזֶּה
  english_pob_choice: toward this house
  chosen_spanish: hacia esta casa
  alternatives_spanish:
  - sobre esta casa
  - a esta casa
  lexicon: HALOT
  rationale: אֶל indica dirección u orientación. «Hacia» preserva ese matiz y suena natural en español. «Casa» mantiene el lenguaje del templo tal como aparece en el hebreo.
- source_word: לַיְלָה וָיוֹם
  english_pob_choice: night and day
  chosen_spanish: noche y día
  alternatives_spanish:
  - de noche y de día
  - constantemente
  lexicon: HALOT
  rationale: La pareja idiomática expresa continuidad. «Noche y día» reproduce el hebraísmo con claridad y sin añadir una paráfrasis como «constantemente».
- source_word: אֶל הַמָּקוֹם
  english_pob_choice: toward the place
  chosen_spanish: hacia el lugar
  alternatives_spanish:
  - hacia este lugar
  - al lugar
  lexicon: HALOT
  rationale: Se conserva el valor direccional de אֶל. «Lugar» mantiene el motivo teológico del sitio designado por Dios para su nombre.
- source_word: אֲשֶׁר אָמַרְתָּ יִהְיֶה שְׁמִי שָׁם
  english_pob_choice: of which you said, ‘My name will be there,’
  chosen_spanish: 'del que dijiste: “Mi nombre estará allí”'
  alternatives_spanish:
  - 'donde dijiste: “Mi nombre estará allí”'
  - 'acerca del cual dijiste: “Mi nombre estará allí”'
  lexicon: HALOT
  rationale: Se preserva la formulación «Mi nombre estará allí», porque el texto hebreo dice literalmente «mi nombre». «Estará allí» reproduce el futuro y evita reducir el enunciado a una glosa interpretativa en el texto principal.
- source_word: שְׁמִי
  english_pob_choice: My name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi presencia
  lexicon: HALOT
  rationale: Se mantiene «mi nombre» para respetar el lenguaje explícito del hebreo y la tensión teológica asociada con la presencia/cobertura divina sin resolverla en la línea principal.
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para escuchar
  alternatives_spanish:
  - para oír
  - con el fin de escuchar
  lexicon: HALOT
  rationale: En contexto de oración, «escuchar» comunica una recepción atenta y relacional. Aunque «oír» es posible, «escuchar» suena más natural en español y preserva la idea de atención divina.
- source_word: אֶל הַתְּפִלָּה
  english_pob_choice: the prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la plegaria
  - la petición
  lexicon: HALOT
  rationale: תְּפִלָּה es el término normal para oración. «Oración» es la equivalencia directa y comprensible en español bíblico contemporáneo.
- source_word: יִתְפַּלֵּל
  english_pob_choice: prays
  chosen_spanish: haga
  alternatives_spanish:
  - ore
  - esté orando
  lexicon: HALOT
  rationale: En español, una relativa como «la oración que tu siervo haga» conserva el matiz de acción repetida o habitual sin forzar un presente perifrástico. «Ore» sería también viable, pero «haga» sigue más de cerca la construcción hebrea dentro de la frase nominal.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aunque el valor léxico puede ser «esclavo», en este contexto de oración reverente ante Dios el español natural y fiel es «siervo». Aquí se prioriza el registro devocional reconocido por el uso bíblico, sin perder la relación de sujeción.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: toward this place
  chosen_spanish: hacia este lugar
  alternatives_spanish:
  - a este lugar
  - sobre este lugar
  lexicon: HALOT
  rationale: Se repite el mismo valor direccional de אֶל. «Lugar» evita una reinterpretación del enfoque espacial y mantiene la referencia al sitio del templo.
theological_decisions:
- issue: Lenguaje antropomórfico sobre los ojos de Dios
  english_pob_reading: 'Retain the anthropomorphic expression literally: ''your eyes may be open'''
  chosen_spanish_reading: 'Conservar literalmente la imagen: «tus ojos estén abiertos»'
  alternative_spanish_readings:
  - que tu atención esté sobre esta casa
  - que veles por esta casa
  rationale: El hebreo presenta una imagen corporal de vigilancia atenta. Mantenerla en español respeta el tenor poético-teológico del original y evita convertirla en una explicación abstracta.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de «Mi nombre estará allí»
  english_pob_reading: Preserve 'My name will be there' in the main text
  chosen_spanish_reading: Preservar «Mi nombre estará allí» en el texto principal
  alternative_spanish_readings:
  - mi presencia estará allí
  - allí habitaré
  rationale: La fórmula del nombre es parte central de la teología del templo. Traducirla literalmente permite que el lector vea el idioma bíblico y, a la vez, sostenga la implicación de presencia pactal sin colapsarla en una sola paráfrasis.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo base y con la auditoría inglesa de alta concordancia; no se registran revisiones aplicadas en el ciclo más reciente, por lo que la presente redacción sigue de cerca la solución validada en inglés, adaptada al español con equivalencia óptima y preservando las tensiones léxicas relevantes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada solo cuando el hebreo lo exige explícitamente; en este versículo no aparece el Tetragrámaton.
  - Se conserva el motivo repetido de dirección con «hacia» para אֶל en ambas ocurrencias.
  - Se evita «Cristo» y terminología eclesiástica no presente en el hebreo.
  - Se usa «siervo» para עבד en un contexto de oración reverente, coherente con el registro devocional y la práctica del POB en pasajes similares.
