revisions:
- from: Si no lo sabes, tú, la más hermosa entre las mujeres, sal[a] tras las huellas del rebaño, y apacienta tus cabritas junto a las tiendas de los pastores.
  to: Si no lo sabes, tú, la más hermosa entre las mujeres, sal por ti misma tras las huellas[a] del rebaño, y apacienta tus cabras jóvenes junto a las tiendas de los pastores.
  rationale: Se ajusta el texto para reflejar el matiz de לָךְ en «sal por ti misma», se mueve la nota al pie al sintagma que realmente comenta («huellas»), y se sustituye «cabritas» por una expresión más neutral y precisa en registro general («cabras jóvenes»). No se requieren cambios doctrinales ni adjudicación adicional.
