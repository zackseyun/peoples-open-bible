  text: אַל תִּֽירְאוּ֙ בַּהֲמ֣וֹת שָׂדַ֔י כִּ֥י דָשְׁא֖וּ נְא֣וֹת מִדְבָּ֑ר כִּֽי עֵץ֙ נָשָׂ֣א פִרְי֔/וֹ תְּאֵנָ֥ה וָ/גֶ֖פֶן נָתְנ֥וּ חֵילָֽ/ם־־׃
