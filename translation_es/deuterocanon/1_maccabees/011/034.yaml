base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/011/034.yaml
  text: Therefore we have confirmed for them the borders of Judea and the three districts—Aphairema and Lydda and Ramathaim—which were added to Judea from Samaria[a], and all that adjoins them, for all who offer sacrifice in Jerusalem[c][b], instead of the royal taxes that the king formerly received from them each year from the produce of the land and the fruit trees.
  footnotes:
  - marker: a
    text: Greek νομοὺς literally refers to administrative districts; older scholarship sometimes leaves this as 'nomes.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'all that belongs with them' renders a broad Greek expression that may include dependent villages, lands, or other appurtenances associated with the three districts.
    reason: lexical_alternative
  - marker: c
    text: Or 'the fruits of the trees.' The Greek term can refer broadly to produce from trees, including fruit or nuts.
    reason: lexical_alternative
