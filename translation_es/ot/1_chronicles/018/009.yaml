    issue: El verbo principal הִכָּה se tradujo como 'había derrotado'.
    rationale: Aunque es admisible en contexto militar, el rastro de auditoría inglés justificó una opción más fuerte ('had struck down'). En español, 'había abatido' conserva mejor la fuerza del hebreo sin perder naturalidad.
  revised_spanish_text: Cuando Toú[a], rey de Hamat, oyó que David había abatido a todo el ejército de Hadadézer, rey de Zobá,
