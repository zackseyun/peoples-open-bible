review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo y del paralelo griego: hizo todo, dio sabiduría a quienes le temen, e incluye la cola hebrea añadida por la revisión inglesa reciente. Sin embargo, no sigue la preferencia terminológica del proyecto para ה'' / YHWH, que en español debe ir como «Yahvé» en el texto principal. Además, la nota textual debería explicar mejor que la frase final es una adición del testigo hebreo frente al griego, no solo que «el hebreo añade esta cola final».'
  spanish_quality_summary: El español es claro, natural y digno. «Hizo todo», «a los que lo temen» y «les dio sabiduría» leen bien. «La alabanza de los padres de antaño es eterna» también es legible, aunque algo más natural y cercano al valor de אבות עולם es «de los padres antiguos». La puntuación con punto y coma funciona. El principal ajuste necesario es terminológico y de precisión en la nota.
  glossary_alignment: 'Desalineado en el término divino: el proyecto pide «Yahvé» para יהוה / ה'' en el texto principal, salvo razón documentada muy fuerte; aquí la justificación ofrecida depende del inglés y de κύριος, pero la evidencia fuente primaria es hebrea con ה''. Los demás términos clave están bien alineados: חכמה → «sabiduría»; ליראיו → «a los que lo temen» preserva bien el hebreo.'
  issues:
  - severity: high
    issue: Uso de «El Señor» en lugar de «Yahvé» para ה'
    rationale: La directriz del proyecto para español establece «Yahvé» en el texto principal para יהוה / ה'. El hecho de que el inglés use «The Lord» y el griego tenga κύριος no anula la preferencia española cuando la fuente primaria hebrea tiene la abreviatura reverencial del nombre divino.
  - severity: medium
    issue: Nota textual incompleta sobre la frase final
    rationale: La nota actual dice que el hebreo añade la cola final, pero no aclara que esta adición probablemente sea arrastre/carryover de la sección siguiente según el expediente inglés. Conviene reflejar con más transparencia la tensión textual.
  - severity: low
    issue: «padres de antaño» puede mejorarse levemente
    rationale: No es incorrecto, pero «padres antiguos» o «padres de antiguo» refleja de manera más directa אבות עולם y suena algo más sobrio en registro bíblico moderno.
  revised_spanish_text: Yahvé hizo todo[a], y a los que lo temen les dio sabiduría[b]; la alabanza de los padres antiguos es eterna.
  revised_footnotes:
  - marker: a
    text: El testigo hebreo añade al final «la alabanza de los padres antiguos es eterna», una frase que probablemente fue arrastrada de la sección siguiente; el paralelo griego termina con «les dio sabiduría».
    reason: textual_variant
  - marker: b
    text: O «a los piadosos», siguiendo el paralelo griego; el hebreo dice más literalmente «a los que lo temen».
    reason: alternative_reading
  revision_rationale: Se revisa para ajustarse a la terminología obligatoria del proyecto («Yahvé» para ה'), recuperar la transparencia de las dos notas del expediente inglés (variante textual y lectura alternativa), y pulir levemente la frase final sin cambiar su sentido.
