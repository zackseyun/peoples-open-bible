translation:
  language: es
  text: 'Estos son los clanes[a] de Isacar, según su número[b]: sesenta y cuatro mil y trescientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Clanes» traduce el hebreo מִשְׁפְּחֹת con el valor social y censal del término, más preciso aquí que «familias».
    reason: lexical_alternative
  - marker: b
    text: O «según los contados de ellos» o «por su empadronamiento». La expresión hebrea se refiere al cómputo censal de los inscritos de estos clanes.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: clanes
  alternatives_spanish:
  - familias
  lexicon: HALOT
  rationale: En contexto censal y tribal, el término denota grupos de parentesco extensos dentro de una tribu. «Clanes» preserva mejor esa unidad social que «familias», que en español puede sonar demasiado nuclear.
- source_word: יִשָּׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issachar
  lexicon: Tradición bíblica española / transliteración estándar
  rationale: En español bíblico es natural y reconocible la forma «Isacar». Mantiene el nombre propio sin añadir explicación ajena al texto.
- source_word: לִפְקֻדֵיהֶם
  english_pob_choice: according to those numbered of them
  chosen_spanish: conforme a los contados de ellos
  alternatives_spanish:
  - según su número
  - por su empadronamiento
  - según los registrados de ellos
  lexicon: HALOT
  rationale: La expresión hebrea apunta al conteo censal de los miembros registrados. «Conforme a los contados de ellos» conserva la relación con las personas contadas sin borrar la referencia al censo.
- source_word: אַרְבָּעָה וְשִׁשִּׁים אֶלֶף
  english_pob_choice: sixty-four thousand
  chosen_spanish: sesenta y cuatro mil
  alternatives_spanish:
  - cuatro y sesenta mil
  lexicon: Uso numeral español
  rationale: El español estándar antepone la cifra en orden moderno, pero el valor numérico se mantiene exactamente. Se conserva la lectura clara de censo.
- source_word: וּשְׁלֹשׁ מֵאוֹת
  english_pob_choice: and three hundred
  chosen_spanish: y trescientos
  alternatives_spanish:
  - y trescientos hombres
  lexicon: Uso numeral español
  rationale: Completa la cifra total de manera directa y fiel. No se añade «hombres» porque el hebreo no lo expresa explícitamente en este versículo.
translation_notes:
  revision_awareness: El texto hebreo es un enunciado censal breve y estable. La versión inglesa auditada mantiene «clans» y una nota para la expresión censal de לִפְקֻדֵיהֶם; la presente redacción española conserva esa precisión con una formulación natural y sobria, sin expandir el contenido.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Cristo/Mesías» sin incidencia en este versículo.
  - Se usa un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios salvo el orden numeral tradicional «sesenta y cuatro mil y trescientos», que resulta natural en español bíblico.
  - La nota al pie solo se ancla en «clanes» porque allí está la principal decisión léxica relevante para el lector español.
