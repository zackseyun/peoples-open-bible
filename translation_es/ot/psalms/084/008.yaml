revisions:
- from: Van de fuerza en fuerza[a]; cada uno se presenta ante Dios en Sion[b].
  to: Van de fuerza en fuerza[a]; cada uno se presenta ante Dios en Sión[b].
  rationale: Se mantiene la traducción principal porque es fiel al hebreo y a la auditoría inglesa, pero se corrige «Sion» a «Sión» por naturalidad y ortografía estándar en español, y se precisa la nota sobre «ante Dios» para reflejar mejor la diferencia entre la preposición literal y el sentido idiomático cultual.
