base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/026/002.yaml
  text: Son of man[a], because Tyre said concerning Jerusalem, ‘Aha! The gateway of the peoples is broken; it has turned to me. I will be filled[b], now that she is laid waste,’
  footnotes:
  - marker: a
    text: Or 'the gates of the peoples' or 'the doors of the peoples.' The Hebrew phrase is compressed and may portray Jerusalem as an entry point for many nations.
    reason: lexical_alternative
  - marker: b
    text: That is, Tyre expects to profit from Jerusalem's fall, as trade or access is redirected to her.
    reason: cultural_note
