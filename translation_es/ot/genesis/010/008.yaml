translation:
  language: es
  text: Y Cush engendró a Nimrod; él comenzó a ser un hombre poderoso[a][b] en la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «un poderoso».'
    reason: lexical_alternative
  - marker: b
    text: «Poderoso» puede entenderse también como «héroe» o «guerrero», según la amplitud con que se tome גִּבּוֹר aquí.
    reason: lexical_alternative
  - marker: c
    text: 'O: «en el país» o «sobre la tierra». El hebreo אֶרֶץ puede significar «tierra» o «país», y la preposición puede expresarse de forma más idiomática como «sobre» en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כּוּשׁ
  english_pob_choice: And Cush
  chosen_spanish: Yahvé[c] Cush
  alternatives_spanish:
  - Y Cush
  - Y Cush
  lexicon: HALOT
  rationale: La conjunción וְ se refleja con continuidad narrativa; Cush se translitera como nombre propio. No se introduce una equivalencia interpretativa adicional.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - padreó
  lexicon: HALOT
  rationale: En genealogías, ילד expresa engendrar/fathering. 'Engendró' preserva la relación genealógica con dignidad y naturalidad en español moderno.
- source_word: נִמְרֹד
  english_pob_choice: Nimrod
  chosen_spanish: Nimrod
  alternatives_spanish:
  - Nemrod
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar y reconocible.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: Hebrew grammar
  rationale: El pronombre independiente se conserva con 'él', que mantiene el énfasis/resumen sin sobrerreformar el texto.
- source_word: הֵחֵל לִהְיוֹת
  english_pob_choice: began to be
  chosen_spanish: comenzó a ser
  alternatives_spanish:
  - empezó a ser
  - comenzó a llegar a ser
  lexicon: HALOT
  rationale: La secuencia verbal expresa inicio/inceptivo. 'Comenzó a ser' refleja el comienzo de una condición sin añadir la idea de prioridad que a veces se infiere en otras traducciones.
- source_word: גִּבֹּר
  english_pob_choice: a mighty man
  chosen_spanish: un hombre poderoso[a][b]
  alternatives_spanish:
  - un poderoso
  - un héroe
  - un guerrero
  lexicon: HALOT
  rationale: גִּבּוֹר admite un campo semántico amplio. 'Hombre poderoso' comunica la fuerza/valía sin restringir prematuramente a lo militar; las notas conservan las alternativas léxicas relevantes.
- source_word: בָּ/אָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra[d]
  alternatives_spanish:
  - sobre la tierra
  - en el país[c]
  lexicon: HALOT
  rationale: אֶרֶץ puede ser 'tierra' o 'país/land'. En este contexto se mantiene 'tierra' por amplitud y para reflejar el alcance del texto, con nota para la alternativa 'país/land'.
theological_decisions:
- issue: Alcance de אֶרֶץ
  english_pob_reading: earth (global scope)
  chosen_spanish_reading: tierra (alcance amplio)
  alternative_spanish_readings:
  - país
  - territorio
  rationale: En la genealogía de las naciones, el sentido amplio de אֶרֶץ es preferible. 'Tierra' conserva esa amplitud sin decidir innecesariamente entre 'tierra' y 'país'.
  doctrine_reference: Decisión contextual de traducción; no doctrinal
- issue: Valor de הֵחֵל לִהְיוֹת
  english_pob_reading: he began to be
  chosen_spanish_reading: comenzó a ser
  alternative_spanish_readings:
  - empezó a ser
  - fue el primero en ser
  rationale: Se evita introducir la noción interpretativa de prioridad ('el primero en') y se preserva el valor inceptivo del hebreo con una formulación natural en español.
  doctrine_reference: Translation philosophy §6; preservar el sentido fuente en español legible
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota a un marcador presente en el texto. La redacción mantiene el valor inceptivo de הֵחֵל לִהְיוֹת, el campo semántico amplio de גִּבּוֹר y la ambigüedad de אֶרֶץ sin sobretraducir.
  spanish_consistency_notes:
  - Usé 'engendró' para la genealogía, coherente con ילד en contexto genealógico.
  - '''Hombre poderoso'' conserva el rango semántico de גִּבּוֹר sin estrecharlo a ''guerrero''.'
  - '''En la tierra'' refleja el hebreo con naturalidad española; la nota permite la alternativa ''país''.'
  - No se usó 'Cristo', 'SEÑOR' ni otro vocabulario no presente en el hebreo fuente.
