    text: 'Hebrew: ''Ah, Lord GOD''; the divine title is אֲדֹנָי יְהוִה, traditionally rendered ''Lord GOD'' to represent both ''Lord'' and the divine name YHWH. Alternatively, ''Lord Yahweh.'''
