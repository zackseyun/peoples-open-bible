  lexicon: observación sintáctica del hebreo
  rationale: El hebreo del versículo contiene solo tres nombres, sin verbo explícito. Por fidelidad a la forma del texto, el español conserva la secuencia nominal breve en lugar de suplir verbos que el versículo no expresa.
theological_decisions:
- issue: Secuencia genealógica sin verbo explícito
  english_pob_reading: The Hebrew verse itself lists only the names, with the father-son relationship understood from context.
  chosen_spanish_reading: El versículo enumera solo los nombres; la relación padre-hijo se entiende por el contexto genealógico.
  alternative_spanish_readings:
  - «Enoc engendró a Matusalén, y Matusalén engendró a Lamec»
  - «Enoc, hijo de…»
  rationale: No hay afirmación adicional en el hebreo más allá de la lista de nombres. La relación genealógica es real y está presupuesta por el contexto, pero no debe explicitarse como si el versículo formulara una oración completa.
  doctrine_reference: Génesis 5; 1 Crónicas 1:1-4
