translation:
  language: es
  text: 'Entonces Absalón, su hermano, le dijo[a]: «¿Ha estado Amnón, tu hermano, contigo? Pero ahora, hermana mía, guarda silencio; él es tu hermano. No lleves este asunto al corazón». Así Tamar se quedó, devastada[b], en casa de Absalón, su hermano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Ha estado Amnón, tu hermano, contigo?», una expresión discreta que alude a la agresión sexual.'
    reason: lexical_alternative
  - marker: b
    text: O «desolada». El término hebreo expresa ruina, desolación o devastación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le respondió
  lexicon: WLC / uso narrativo estándar
  rationale: El hebreo introduce el discurso directo con un verbo simple de habla; en español, «le dijo» conserva la naturalidad narrativa sin añadir matices no presentes.
- source_word: הָיָה עִמָּךְ
  english_pob_choice: been with you
  chosen_spanish: ha estado contigo
  alternatives_spanish:
  - ha estado contigo sexualmente
  - ha estado con usted
  lexicon: HALOT
  rationale: Se mantiene la expresión indirecta del hebreo, que funciona como eufemismo discreto en este contexto. «Ha estado contigo» preserva la reserva del original sin explicitar la agresión en el texto principal.
- source_word: הַחֲרִישִׁי
  english_pob_choice: keep silent
  chosen_spanish: guarda silencio
  alternatives_spanish:
  - calla
  - no digas nada
  lexicon: HALOT
  rationale: El imperativo de חרשׁ pide silencio; «guarda silencio» suena natural en español y mantiene la fuerza de la orden.
- source_word: אָחִי/ךְ הוּא
  english_pob_choice: he is your brother
  chosen_spanish: él es tu hermano
  alternatives_spanish:
  - él sí es tu hermano
  - es tu hermano
  lexicon: HALOT
  rationale: Se conserva la afirmación brusca de parentesco tal como está en el hebreo, sin suavizarla.
- source_word: אַל תָּשִׁיתִי אֶת לִבֵּךְ לַדָּבָר הַזֶּה
  english_pob_choice: Do not take this matter to heart
  chosen_spanish: No pongas tu corazón en este asunto
  alternatives_spanish:
  - No tomes esto a corazón
  - No tomes este asunto en serio
  lexicon: HALOT
  rationale: El hebreo literalmente dice poner el corazón hacia este asunto. «No pongas tu corazón» preserva la imagen idiomática mejor que una simple paráfrasis psicológica; «asunto» refleja לַדָּבָר הַזֶּה.
- source_word: וַתֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: se quedó
  alternatives_spanish:
  - permaneció
  - estuvo
  lexicon: HALOT
  rationale: El verbo puede describir permanencia o asentarse; en este contexto narrativo, «se quedó» comunica bien el estado resultante sin forzar un calco.
- source_word: וְשֹׁמֵמָה
  english_pob_choice: devastated
  chosen_spanish: devastada
  alternatives_spanish:
  - desolada
  - arruinada
  lexicon: HALOT
  rationale: Se conserva el campo semántico de ruina/desolación con una forma natural en español. «Devastada» reproduce bien el impacto emocional y social señalado por el audit trail inglés.
- source_word: בֵּית אַבְשָׁלוֹם
  english_pob_choice: in the house of Absalom
  chosen_spanish: en casa de Absalón
  alternatives_spanish:
  - en la casa de Absalón
  - en el hogar de Absalón
  lexicon: HALOT
  rationale: «Casa de» es idiomático en español, pero «en casa de Absalón» mantiene el sentido doméstico/familiar del constructo hebreo con mayor fluidez.
theological_decisions:
- issue: Eufemismo narrativo para la agresión sexual
  english_pob_reading: Preserve the Hebrew's indirect wording ('been with you') in the main text rather than making the sexual act explicit.
  chosen_spanish_reading: Preservar el giro indirecto («ha estado contigo») en el texto principal, sin explicitar la agresión.
  alternative_spanish_readings:
  - ¿Ha abusado de ti Amnón, tu hermano?
  - ¿Ha yacido contigo Amnón, tu hermano?
  rationale: El hebreo usa una formulación discreta que, en el contexto narrativo, alude a la violencia sin nombrarla directamente. Mantener esa reserva respeta la forma del original y evita interpretar dentro del cuerpo del versículo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo y del audit trail inglés; no se registraron cambios posteriores en la revisión más reciente, por lo que el borrador sigue la lectura aprobada con equivalencia óptima y sin alteraciones sustantivas.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en la serie, pero este versículo no contiene el tetragrámaton.
  - Se mantiene la distinción entre el eufemismo del hebreo y una explicitación interpretativa en nota.
  - «Casa de Absalón» se adapta como «en casa de Absalón» para mayor naturalidad, sin perder el valor doméstico del constructo.
  - Se conserva «hermano» repetido porque el hebreo lo enfatiza varias veces en el discurso.
