  yaml_path: translation/deuterocanon/susanna/001/005.yaml
  text: 'And in that year two elders from the people were appointed as judges[a], concerning whom the Master had spoken: “Lawlessness came out from Babylon, from elders who were judges[b], who seemed to govern the people.”'
