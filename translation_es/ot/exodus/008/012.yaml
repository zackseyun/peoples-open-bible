translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Di a Aarón: “Extiende tu vara y golpea el polvo de la tierra, y se convertirá en piojos[a] en toda la tierra de Egipto”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jejenes»; el término hebreo se refiere a insectos pequeños que pican o irritan, y la especie exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: Proyecto POB / Tetragrámaton
  rationale: Se sigue el default del proyecto para el nombre divino, conservando el nombre propio del pacto en lugar de ocultarlo con un sustituto funcional. «Yahvé» es la forma de referencia estable en español del POB y mantiene la correspondencia con el hebreo יְהוָה.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y dijo
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» comunica secuencia narrativa natural en español sin perder la progresión del texto.
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Dile
  - Habla
  lexicon: HALOT
  rationale: El imperativo dirigido a Moisés introduciendo la orden a Aarón queda más natural en español con «Di».
- source_word: נְטֵה
  english_pob_choice: Stretch out
  chosen_spanish: Extiende
  alternatives_spanish:
  - Alarga
  - Tiende
  lexicon: HALOT
  rationale: El verbo expresa extender la vara en un gesto visible; «Extiende» mantiene el valor físico del movimiento con buena naturalidad en español.
- source_word: מַטְּךָ
  english_pob_choice: your staff
  chosen_spanish: tu vara
  alternatives_spanish:
  - tu bastón
  - tu cayado
  lexicon: HALOT
  rationale: «Vara» preserva el objeto de mando/acción en el relato y evita introducir una matización pastoral que no está en el hebreo. En este contexto funciona bien para la vara de Aarón/Moisés.
- source_word: וְהַךְ
  english_pob_choice: and strike
  chosen_spanish: y golpea
  alternatives_spanish:
  - y hiere
  - y pega
  lexicon: HALOT
  rationale: נכה aquí exige una acción de impacto; «golpea» es claro y no introduce un tono más arcaico como «hiere» ni más coloquial como «pega».
- source_word: עֲפַר הָאָרֶץ
  english_pob_choice: the dust of the earth
  chosen_spanish: el polvo de la tierra
  alternatives_spanish:
  - el polvo del suelo
  - el polvo de la tierra
  lexicon: HALOT
  rationale: Se conserva la imagen material del hebreo con una expresión natural en español. «Polvo» corresponde al sentido amplio de עָפָר y evita estrecharlo a ‘tierra’ en sentido de suelo compactado.
- source_word: וְהָיָה
  english_pob_choice: and it will become
  chosen_spanish: y se convertirá
  alternatives_spanish:
  - y será
  - y llegará a ser
  lexicon: HALOT
  rationale: El contexto muestra transformación del polvo en una plaga; «se convertirá» comunica el resultado con claridad sin exceder el texto.
- source_word: לְכִנִּם
  english_pob_choice: gnats
  chosen_spanish: jejenes
  alternatives_spanish:
  - piojos
  - mosquitos
  lexicon: HALOT
  rationale: La especie exacta es incierta; el POB inglés opta por un término genérico para pequeños insectos molestos o que pican. «Jejenes» mantiene esa indeterminación mejor que «piojos», que puede sugerir demasiado una especie concreta y no siempre encaja con la percepción común del pasaje.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: throughout all the land of Egypt
  chosen_spanish: en toda la tierra de Egipto
  alternatives_spanish:
  - por toda la tierra de Egipto
  - a través de toda la tierra de Egipto
  lexicon: HALOT
  rationale: «En toda la tierra de Egipto» transmite la extensión total de manera directa y fluida; «tierra» conserva el valor geográfico de אֶרֶץ.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre del pacto revelado en el hebreo en vez de sustituirlo por un título impersonal. La forma española del POB es «Yahvé», coherente con la decisión inglesa de no enmascarar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lexical ambiguity of לְכִנִּם
  english_pob_reading: gnats
  chosen_spanish_reading: jejenes
  alternative_spanish_readings:
  - piojos
  - mosquitos
  rationale: La traducción debe conservar la incertidumbre botánica/zoológica. «Jejenes» funciona como equivalente de pequeños insectos que pican o irritan, sin imponer una identificación más precisa de la que el hebreo garantiza.
  doctrine_reference: HALOT; nota lexical del POB inglés
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia, sin revisiones aplicadas en la última pasada. La versión española sigue la misma lectura que el POB inglés, preservando el nombre divino, el imperativo narrativo y la ambigüedad lexical de כִּנִּים sin introducir cambios no sustentados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para יְהוָה, conforme al estándar del proyecto.
  - Se usa «tierra de Egipto» para אֶרֶץ מִצְרַיִם, evitando alternar con «país» o «territorio» para no debilitar la imagen bíblica.
  - «Vara» se conserva como término narrativo estable en el relato del éxodo.
  - La nota sobre «jejenes» preserva la alternativa semántica sin fijar una identificación zoológica cerrada.
