theological_decisions:
- issue: Referent of the singular suffix in תְּנִיחֶנּוּ ('gave him rest')
  chosen_reading: Singular retained as a corporate singular referring to Israel/your people.
  alternative_readings:
  - 'Pluralized in translation: ''gave them rest'' to match ''your people'''
  - Referent taken as an individual leader
  rationale: The Hebrew suffix is singular, but the surrounding context speaks of God's people corporately. Retaining 'him' preserves the source form and the collective-singular usage common in Hebrew poetry, while still fitting the context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Meaning of רוּחַ יְהוָה
  chosen_reading: '''the Spirit of Yahweh'''
  alternative_readings:
  - '''the wind of the LORD'''
  rationale: Although רוּחַ can mean wind, breath, or spirit, the context of divine guidance and rest in recalling the exodus favors a personal divine agency. This also coheres with the immediate broader context in Isaiah 63.
  doctrine_reference: Original-language primacy over translation tradition; do not import claims beyond the text.
