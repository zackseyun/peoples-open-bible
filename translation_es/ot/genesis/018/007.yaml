translation:
  language: es
  text: Y Abraham corrió al ganado[a] y tomó un becerro tierno y bueno, y se lo dio al joven[b]; y el joven se apresuró a prepararlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el ganado vacuno»; בָּקָר es un colectivo de bovinos, no una sola res.
    reason: lexical_alternative
  - marker: b
    text: O «el siervo» o «el muchacho» para הַנַּעַר; el término hebreo puede designar a un joven o a un servidor según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּקָר
  english_pob_choice: the herd
  chosen_spanish: el ganado
  alternatives_spanish:
  - la manada
  - el hato
  - el ganado vacuno
  lexicon: HALOT
  rationale: בָּקָר designa bovinos en conjunto; en español, «el ganado» expresa naturalmente un colectivo de reses sin reducirlo a una sola pieza animal. «Ganado vacuno» sería más explícito pero menos fluido; «manada» puede sonar menos propio para bovinos en registro bíblico.
- source_word: רָץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - se apresuró
  - fue corriendo
  lexicon: HALOT
  rationale: El verbo hebreo indica correr de forma directa. «Corrió» preserva esa vivacidad narrativa y la urgencia de la hospitalidad de Abraham.
- source_word: בֶּן־בָּקָר
  english_pob_choice: a calf
  chosen_spanish: un becerro
  alternatives_spanish:
  - un ternero
  - un novillo joven
  lexicon: HALOT
  rationale: La expresión idiomática señala un bovino joven. «Becerro» comunica bien esa idea en español bíblico y actual; «ternero» también es posible, pero «becerro» mantiene mejor el registro tradicional sin perder claridad.
- source_word: רַךְ וָטוֹב
  english_pob_choice: tender and good
  chosen_spanish: tierno y bueno
  alternatives_spanish:
  - tierno y fino
  - tierno y selecto
  lexicon: HALOT
  rationale: רַךְ significa «tierno»; טוֹב describe la calidad, no necesariamente moral. «Bueno» sigue de cerca el hebreo y conserva la sencillez del texto. «Selecto» sería más interpretativo.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el siervo
  lexicon: HALOT
  rationale: נַעַר puede significar joven, muchacho o servidor según el contexto. El POB inglés preserva la ambigüedad con «the young man»; en español, «el joven» la mantiene sin imponer «siervo» como lectura principal.
- source_word: וַיְמַהֵר
  english_pob_choice: he hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - se apuró
  lexicon: HALOT
  rationale: El verbo expresa rapidez en la acción. «Se apresuró» es natural en español y conserva el énfasis narrativo en la prontitud.
- source_word: לַעֲשׂוֹת אֹתוֹ
  english_pob_choice: to prepare it
  chosen_spanish: para prepararlo
  alternatives_spanish:
  - para hacerlo
  - para aderezarlo
  lexicon: HALOT
  rationale: En contexto de comida, עשה funciona idiomáticamente como «preparar». «Para prepararlo» refleja el sentido contextual que el POB inglés ya documenta, evitando la literalidad de «hacerlo».
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la línea auditada en inglés. La única decisión con posible tensión es הַנַּעַר: se conserva la ambigüedad con «el joven», como en el POB inglés, sin forzar la identificación con «siervo»; y לַעֲשׂוֹת אֹתוֹ se vierte con el sentido culinario contextual de «prepararlo».'
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '«Corrió» y «se apresuró» reproducen dos matices distintos de rapidez: acción corporal y prontitud en la preparación.'
  - «Becerro» conserva un registro bíblico natural y coherente con el contexto de hospitalidad.
  - La ambigüedad de הַנַּעַר queda explicitada en nota sin introducir una lectura doctrinal o narrativa innecesaria.
