translation:
  language: es
  text: No temas a este verdugo[a], sino, llegando a ser digno de tus hermanos, acepta la muerte, para que, en misericordia[b], yo te reciba de nuevo[c] junto con tus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a este torturador». El griego δήμιος designa más propiamente a un verdugo, aunque el contexto amplio incluye tortura.
    reason: lexical_alternative
  - marker: b
    text: La expresión «en misericordia» probablemente se refiere a la misericordia divina, pero aquí Dios no está nombrado explícitamente en el griego.
    reason: alternative_reading
  - marker: c
    text: O «yo te recupere» o «yo te reciba». La frase expresa la esperanza materna de volver a reunirse con su hijo junto con sus hermanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ φοβηθῇς
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: BDAG
  rationale: La prohibición directa se expresa de forma natural y sobria en español con «No temas», preservando el tono exhortativo inmediato.
- source_word: τὸν δήμιον τοῦτον
  english_pob_choice: this executioner
  chosen_spanish: a este verdugo
  alternatives_spanish:
  - a este ejecutor
  - a este torturador
  lexicon: LSJ
  rationale: «Verdugo» comunica bien al agente que ejecuta la sentencia y suena natural en español. El inglés POB opta por «executioner» y admite «torturer»; en español, «verdugo» conserva esa fuerza sin perder la referencia inmediata al ejecutor de muerte.
- source_word: τῶν ἀδελφῶν σου ἄξιος γενόμενος
  english_pob_choice: becoming worthy of your brothers
  chosen_spanish: haciéndote digno de tus hermanos
  alternatives_spanish:
  - llegando a ser digno de tus hermanos
  - siendo digno de tus hermanos
  lexicon: BDAG
  rationale: El participio γενόμενος se vierte de modo procesual con «haciéndote digno», que mantiene la idea de llegar a esa condición sin sonar rígido. Se conserva «hermanos» por tratarse de los hermanos literales en el contexto.
- source_word: ἐπίδεξαι τὸν θάνατον
  english_pob_choice: accept death
  chosen_spanish: acepta la muerte
  alternatives_spanish:
  - recibe la muerte
  - soporta la muerte
  lexicon: LSJ
  rationale: «Aceptar la muerte» transmite la exhortación voluntaria del griego con naturalidad; en español, «acepta la muerte» es la formulación más directa y fiel al valor de ἐπιδέχομαι aquí.
- source_word: ἐν τῷ ἐλέει
  english_pob_choice: in mercy
  chosen_spanish: en misericordia
  alternatives_spanish:
  - por misericordia
  - en la misericordia de Dios
  lexicon: BDAG
  rationale: Se conserva la expresión compacta sin añadir explícitamente «de Dios», porque el griego no lo dice de forma directa en esta cláusula. «En misericordia» mantiene la ambigüedad teológica documentada por el POB inglés.
- source_word: σὺν τοῖς ἀδελφοῖς σου
  english_pob_choice: together with your brothers
  chosen_spanish: junto con tus hermanos
  alternatives_spanish:
  - con tus hermanos
  lexicon: BDAG
  rationale: «Junto con» conserva el matiz de acompañamiento y reunión que el inglés POB destaca con «together with», sin recargar la frase.
- source_word: κομίσωμαί σε
  english_pob_choice: I may receive you back
  chosen_spanish: yo te reciba de nuevo
  alternatives_spanish:
  - yo te reciba
  - yo te recupere
  lexicon: BDAG
  rationale: «Recibir de nuevo» preserva el sentido de recuperación/reencuentro que el inglés POB señala con «receive you back». La forma «te reciba de nuevo» mantiene la esperanza de reunificación sin explicitar más allá del griego.
theological_decisions:
- issue: Explicitar o no a Dios en ἐν τῷ ἐλέει
  english_pob_reading: Leave the phrase as 'in mercy' without adding 'of God.'
  chosen_spanish_reading: Dejar «en misericordia» sin añadir «de Dios».
  alternative_spanish_readings:
  - en la misericordia de Dios
  - por la misericordia de Dios
  rationale: El contexto sugiere misericordia divina, pero la cláusula griega no nombra a Dios. La traducción conserva esa tensión teológica en vez de resolverla por adición interpretativa.
  doctrine_reference: Preservar la tensión teológica; primacía del texto fuente.
- issue: Matiz de restauración en κομίσωμαί σε
  english_pob_reading: I may receive you back
  chosen_spanish_reading: «yo te reciba de nuevo» para sugerir reencuentro/restauración.
  alternative_spanish_readings:
  - yo te reciba
  - yo te recupere
  rationale: La madre expresa esperanza de reunirse con su hijo junto con los hermanos. «De nuevo» ayuda a conservar ese matiz de retorno sin convertir la frase en una explicitación doctrinal ajena al griego.
  doctrine_reference: Preservar la esperanza de reunificación sin sobreexplicar el mecanismo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó «proving yourself worthy» a «becoming worthy» para acercarse más a γενόμενος. La redacción española adopta un progresivo natural («haciéndote digno») y conserva la relación entre la condición de dignidad, la aceptación de la muerte y la esperanza de reencuentro. También se respetó la cautela del POB sobre δήμιος y sobre ἐν τῷ ἐλέει, sin añadir «de Dios» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se usa «misericordia» en minúscula porque corresponde a una cláusula común, no a un título divino.
  - «Verdugo» se emplea por su fuerza natural en español y por corresponder al campo semántico de δήμιος en este contexto.
  - «Hermanos» conserva el referente literal masculino del texto.
  - El ritmo de la frase sigue la estructura exhortación–contraste–propósito del original griego.
