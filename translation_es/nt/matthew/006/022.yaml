review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego y el rastro de auditoría inglés en casi todos los puntos: «ojo», «lámpara», «cuerpo», la inferencia de οὖν, y el futuro «estará». También mantiene correctamente ἁπλοῦς en el texto principal con un sentido funcional equivalente a «healthy». Sin embargo, la nota léxica no preserva con precisión una de las alternativas documentadas en inglés: «sound» se convirtió en «íntegro», que desplaza el matiz hacia integridad moral más que hacia condición sana/normal del ojo.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. «El ojo es la lámpara del cuerpo» y «todo tu cuerpo estará lleno de luz» suenan bien. «Por tanto» es aceptable y readable. La única reparación necesaria es en la nota para evitar una alternativa menos fiel y potencialmente confusa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El pasaje no contiene términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión principal «sano» para ἁπλοῦς concuerda con la rationale documentada.
  issues:
  - severity: medium
    issue: La nota usa «íntegro» como alternativa para ἁπλοῦς.
    rationale: El POB inglés documenta «sound», que en este contexto de visión se entiende mejor como «saludable», «sano» o quizá «en buen estado», no «íntegro». «Íntegro» introduce una lectura ética o de integridad que no corresponde tan directamente al campo semántico inmediato del ojo como órgano de visión.
  revised_spanish_text: El ojo es la lámpara del cuerpo. Por tanto[a], si tu ojo es sano, todo tu cuerpo estará lleno de luz.
  revised_footnotes:
  - marker: a
    text: O «simple», «claro» o «en buen estado»; la palabra griega también puede expresar la idea de algo no dividido y, en algunos contextos, generoso.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel, claro y natural. Solo se ajusta la nota para reflejar mejor las alternativas documentadas para ἁπλοῦς en este contexto visual, evitando «íntegro», que sugiere integridad moral más que el funcionamiento sano del ojo.
