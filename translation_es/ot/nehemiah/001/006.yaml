translation:
  language: es
  text: Te ruego que tu oído esté atento y tus ojos estén abiertos, para oír la oración de tu siervo, que estoy orando delante de ti hoy, día y noche, por los hijos de Israel, tus siervos[a], y confesando los pecados de los hijos de Israel, que hemos pecado contra ti. Aun yo y la casa de mi padre hemos pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «los hijos de Israel», preservando una expresión filial de pacto; también puede entenderse como «el pueblo de Israel» o «los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהִי נָא
  english_pob_choice: Please let ... be
  chosen_spanish: Te ruego que ... esté
  alternatives_spanish:
  - Por favor, que ... esté
  - Que ... esté, te ruego
  lexicon: HALOT
  rationale: La forma volitiva con נָא expresa súplica cortés. «Te ruego que» comunica bien la petición reverente en español natural, sin perder la fuerza de ruego.
- source_word: אָזְנְךָ קַשֶּׁבֶת
  english_pob_choice: your ear be attentive
  chosen_spanish: tu oído esté atento
  alternatives_spanish:
  - tu oído esté atento y escuchando
  - tu oído preste atención
  lexicon: HALOT
  rationale: El hebreo usa la imagen singular de oído atento. En español, «oído» conserva la metáfora y «esté atento» transmite קַשֶּׁבֶת con claridad.
- source_word: וְעֵינֶיךָ פְתֻוּחוֹת
  english_pob_choice: and your eyes open
  chosen_spanish: tus ojos estén abiertos
  alternatives_spanish:
  - tus ojos permanezcan abiertos
  - tus ojos abiertos
  lexicon: HALOT
  rationale: Se conserva el paralelismo antropomórfico con una construcción natural en español; el verbo «estar» hace explícita la condición continua de apertura.
- source_word: לִשְׁמֹעַ אֶל
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  - para oír atentamente
  lexicon: HALOT
  rationale: «Oír» refleja mejor el valor básico de שׁמע aquí y suena más sobrio en una oración formal; el sentido de atención ya quedó en la cláusula anterior.
- source_word: תְּפִלַּת עַבְדְּךָ
  english_pob_choice: the prayer of your servant
  chosen_spanish: la oración de tu siervo
  alternatives_spanish:
  - la oración de tu esclavo
  - la oración de tu servidor
  lexicon: HALOT
  rationale: En este contexto de súplica reverente, «siervo» es la equivalencia española más fiel y tradicional al valor relacional de עבד sin forzar la dureza de «esclavo».
- source_word: אֲשֶׁר אָנֹכִי מִתְפַּלֵּל לְפָנֶיךָ
  english_pob_choice: that I am praying before you
  chosen_spanish: que hoy estoy orando delante de ti
  alternatives_spanish:
  - que estoy orando delante de ti
  - que hoy oro delante de ti
  lexicon: HALOT
  rationale: El participio indica acción en curso. «Estoy orando» preserva esa continuidad; «delante de ti» reproduce לְפָנֶיךָ con una expresión natural de presencia ante Dios. Se integra «hoy» por el valor temporal del texto.
- source_word: הַיּוֹם יוֹמָם וָלַיְלָה
  english_pob_choice: today, day and night
  chosen_spanish: hoy, día y noche
  alternatives_spanish:
  - hoy, constantemente, de día y de noche
  - hoy, día tras día y noche tras noche
  lexicon: HALOT
  rationale: La secuencia expresa simultáneamente el marco actual de la oración y su duración continua. «Hoy, día y noche» mantiene ambas ideas sin recargar el español.
- source_word: עַל בְּנֵי יִשְׂרָאֵל עֲבָדֶיךָ
  english_pob_choice: for the children of Israel, your servants
  chosen_spanish: por los hijos de Israel, tus siervos
  alternatives_spanish:
  - por el pueblo de Israel, tus siervos
  - por los israelitas, tus siervos
  lexicon: HALOT
  rationale: Se conserva «hijos de Israel» para respetar la expresión filial-covenantal del hebreo. «Tus siervos» mantiene la aposición y la relación de pertenencia a Dios.
- source_word: וּמִתְוַדֶּה
  english_pob_choice: while confessing
  chosen_spanish: y confesando
  alternatives_spanish:
  - mientras confieso
  - al confesar
  lexicon: HALOT
  rationale: El participio coordinado expresa una acción concurrente con la oración. «Y confesando» es breve y fiel en español, sin añadir matices no requeridos.
- source_word: חַטֹּאות
  english_pob_choice: the sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - las culpas
  - las faltas
  lexicon: HALOT
  rationale: En un contexto penitencial, «pecados» es la equivalencia más clara y teológicamente directa para חַטֹּאות.
- source_word: אֲשֶׁר חָטָאנוּ לָךְ
  english_pob_choice: that we have sinned against you
  chosen_spanish: que hemos pecado contra ti
  alternatives_spanish:
  - que hemos pecado contra ti
  - que hemos faltado contra ti
  lexicon: HALOT
  rationale: El hebreo con ל expresa la dirección del daño en contra de la persona divina. «Contra ti» preserva esa orientación relacional y moral.
- source_word: וַאֲנִי וּבֵית אָבִי
  english_pob_choice: Even I and my father's house
  chosen_spanish: Yo y la casa de mi padre
  alternatives_spanish:
  - Aun yo y la casa de mi padre
  - Yo, y la casa de mi padre
  lexicon: HALOT
  rationale: La construcción hebrea incluye al hablante y a su linaje. «Yo y la casa de mi padre» conserva el hebraísmo sin sobreinterpretar el énfasis; la primera persona queda explícita.
- source_word: חָטָאנוּ
  english_pob_choice: have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  - hemos cometido pecado
  lexicon: HALOT
  rationale: El perfecto se expresa naturalmente con presente perfecto en una confesión que vincula pasado y presente. «Hemos pecado» conserva ese valor.
theological_decisions:
- issue: Lenguaje antropomórfico para la atención de Dios ('oído', 'ojos')
  english_pob_reading: Retained as direct anthropomorphic prayer language
  chosen_spanish_reading: Se conserva como lenguaje antropomórfico directo de oración
  alternative_spanish_readings:
  - Se parafrasea como 'atiende' y 'observa'
  - Se elimina la imaginería corporal
  rationale: El hebreo formula una súplica con imágenes corporales deliberadas. Mantener «oído» y «ojos» preserva la retórica del texto y evita suavizar una figura intencional.
  doctrine_reference: Principio de primacía de la fuente; preservar la tensión teológica en vez de resolverla
- issue: Renderización de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: '''the children of Israel'''
  chosen_spanish_reading: «los hijos de Israel»
  alternative_spanish_readings:
  - «el pueblo de Israel»
  - «los israelitas»
  rationale: El hebreo dice literalmente «hijos de Israel». Se preserva la expresión filial para mantener el color covenantal y la precisión del original, en vez de neutralizarla.
  doctrine_reference: Precisión léxica y sensibilidad al texto fuente
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión inglesa que ajustó 'today', 'am praying', 'and confessing', 'children of Israel' y el énfasis de 'Even I'. La redacción española refleja esos mismos ajustes con un español natural y mantiene el paralelismo de la súplica.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no en el texto porque este versículo no contiene el nombre divino explícito; las referencias son pronominales.
  - 'Se mantuvo el registro reverente y penitencial con vocabulario consistente: ''siervo'', ''pecado/pecados'', ''hemos pecado''.'
  - 'Se preservó el paralelismo del hebreo con dos pares coordinados: oído/ojos y orando/confesando.'
  - Se evitó sustituir 'hijos de Israel' por una forma más neutra en el cuerpo del texto, pero se explicó la alternativa en nota.
