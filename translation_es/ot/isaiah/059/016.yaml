    issue: «se asombró» suaviza demasiado וַיִּשְׁתּוֹמֵם
    rationale: El hebreo y la auditoría inglesa apuntan a estupor consternado o appalled amazement, no mero asombro. «Quedó consternado» o equivalente preserva mejor la gravedad moral.
  - severity: medium
    issue: El texto principal usa «su justicia» en vez de reflejar la decisión base «his righteousness»
    rationale: La documentación inglesa fija «righteousness» como lectura principal y «justice» como alternativa. En español, dejar «justicia» en el texto principal invierte esa prioridad y reduce el matiz de rectitud/fidelidad.
  - severity: medium
    issue: La nota b no conserva la alternativa correcta del audit trail
    rationale: 'La nota española ofrece «rectitud» como alternativa a «justicia», pero la nota inglesa preserva «justice» como alternativa a «righteousness». En revisión debe quedar invertido: texto principal «rectitud» y nota «justicia».'
  revised_spanish_text: Vio que no había hombre[a], y quedó consternado de que no hubiera quien intercediera; por eso su propio brazo le trajo salvación, y su rectitud[b] lo sostuvo.
