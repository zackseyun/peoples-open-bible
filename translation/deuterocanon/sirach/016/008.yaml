translation:
  text: And he did not spare Lot’s neighbors[b][a], who became arrogant in their pride.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Lot’s neighbors' or 'the people among whom Lot sojourned.' The Hebrew phrase is unusual; the Greek parallel has 'the sojourning community of Lot.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'who made themselves detestable because of their pride.' The Hebrew form is difficult, and the Greek parallel supports the sense of becoming abhorrent on account of pride.
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא חָמַל
  chosen: and he did not spare
  alternatives:
  - and he did not pity
  - and he had no compassion on
  lexicon: HALOT
  rationale: חמל commonly denotes sparing or showing pity/compassion. 'Did not spare' is concise, idiomatic, and fits judgment context well; the Greek οὐκ ἐφείσατο supports this sense.
- source_word: מְגוּרֵי לוֹט
  chosen: Lot’s sojourners
  alternatives:
  - Lot’s neighbors
  - those dwelling with Lot
  - Lot’s district
  lexicon: HALOT
  rationale: The Hebrew derives from גור, relating to sojourning/dwelling as an alien. The Greek παροικία can denote a sojourning community or settlement. 'Lot’s sojourners' preserves the Hebrew social sense better than the more interpretive 'neighbors,' while still indicating the people associated with Lot’s place of residence, i.e., Sodom.
- source_word: הַמִּתְעַבְּרִים
  chosen: were abominable
  alternatives:
  - made themselves detestable
  - were detestable
  lexicon: HALOT
  rationale: The form is difficult, but in context and in light of the Greek οὓς ἐβδελύξατο ('whom he abhorred' / 'who became abhorrent'), the sense is one of becoming detestable or abominable. 'Were abominable' gives natural English while preserving the moral revulsion conveyed.
- source_word: בְּגַאֲוָתָם
  chosen: in their pride
  alternatives:
  - because of their pride
  - through their arrogance
  lexicon: HALOT
  rationale: The preposition ב can be rendered instrumentally or causally here. 'In their pride' is slightly more formal and preserves the Hebrew construction, while still communicating that their pride characterized the conduct for which they were judged. The Greek διὰ τὴν ὑπερηφανίαν αὐτῶν confirms pride/arrogance as the cause.
