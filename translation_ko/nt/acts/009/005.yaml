  text: 그가 말하였습니다. 「주여, 당신은 누구십니까?」 그가 대답하셨습니다. 「나는 네가 박해하는 예수다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 테오파니의 일대일 응답 구조
  chosen_reading: 「주여, 당신은 누구십니까?」 / 「나는 네가 박해하는 예수다.」
  alternative_readings:
  - 주여, 누구십니까? / 나는 네가 핍박하는 예수다
  rationale: 사울의 질문에는 합쇼체 존칭 어미(-십니까)를, 부활하신 예수의 응답에는 비대칭의 평어형 「예수다」를 사용해, 부르심의 주권적 비대칭성을 한국어 어미 체계로 보존한다.
  doctrine_reference: 'DOCTRINE.md: speech-act register; preserve voice-asymmetry'
