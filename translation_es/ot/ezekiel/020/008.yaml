base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/008.yaml
  text: But they rebelled against me and were not willing to listen to me[a]. No man threw away the detestable things before his eyes, and they did not abandon the idols of Egypt. Then I said I would pour out my wrath on them[b], to exhaust my anger against them in the midst of the land of Egypt.
  footnotes:
  - marker: a
    text: Hebrew 'the detestable things of his eyes,' an idiom for the abhorrent objects each person fixed his gaze on or desired.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'idols' here is especially contemptuous; it can carry the sense of something filthy or vile.
    reason: lexical_alternative
