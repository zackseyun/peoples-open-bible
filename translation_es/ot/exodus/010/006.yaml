revisions:
- from: Y se llenarán tus casas[a], las casas de todos tus siervos[b], y las casas de todo Egipto[c]—algo que tus padres y los padres de tus padres no han visto desde el día en que estuvieron sobre la tierra[d] hasta este día.” Entonces él se volvió y salió de la presencia de Faraón.
  to: Y llenarán tus casas, las casas de todos tus siervos, y las casas de todo Egipto—algo[a] que tus padres y los padres de tus padres no han visto desde el día en que estuvieron sobre la tierra[b] hasta este día.” Entonces se volvió y salió de la presencia de Faraón.
  rationale: Se corrigió la voz verbal a 'Y llenarán' para reflejar mejor el activo contextual del hebreo; se reubicaron y redujeron las notas para que coincidan con los puntos léxicos realmente documentados; y se suavizó 'Entonces él se volvió' a 'Entonces se volvió' para mejorar la naturalidad del español sin alterar el sentido.
