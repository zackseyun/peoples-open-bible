translation:
  language: es
  text: Cuando Apolonio supo cada una de estas cosas, elogió a Simón por su lealtad al rey, pero subió adonde estaba Seleuco y le informó acerca de la tesorería de fondos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tesorería de dinero». La frase griega se refiere a un depósito de recursos monetarios; «tesorería de fondos» conserva ese énfasis financiero de manera más natural en español que «tesoro de fondos».
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτων ἕκαστα
  english_pob_choice: each of these things
  chosen_spanish: cada una de estas cosas
  alternatives_spanish:
  - todas estas cosas, una por una
  - estas cosas una por una
  lexicon: LSJ
  rationale: La construcción distributiva pide un equivalente que conserve el matiz de detalle o individualidad. «Cada una de estas cosas» suena natural en español y preserva la idea de que Apolonio las conoció por separado o en conjunto pormenorizado.
- source_word: γνούς
  english_pob_choice: learned
  chosen_spanish: supo
  alternatives_spanish:
  - llegó a saber
  - se enteró de
  lexicon: LSJ
  rationale: El participio aoristo introduce la circunstancia previa a las acciones principales. «Supo» mantiene la brevedad narrativa y evita sobrecargar el español con una perífrasis más pesada.
- source_word: κηδεμονίας
  english_pob_choice: loyalty to the king
  chosen_spanish: lealtad
  alternatives_spanish:
  - cuidado
  - solicitud
  - fidelidad
  lexicon: LSJ
  rationale: La revisión inglesa favorece la idea de lealtad contextual hacia el rey. En español, «lealtad» comunica mejor esa intención que «cuidado» o «solicitud», que sonarían demasiado débiles o ambiguos. Se conserva el complemento «al rey» para explicitar el destinatario de esa lealtad.
- source_word: ἐπαινεί
  english_pob_choice: praised
  chosen_spanish: elogió
  alternatives_spanish:
  - alabó
  - aprobó
  lexicon: LSJ
  rationale: «Elogió» reproduce bien la aprobación explícita sin sonar demasiado devocional. «Alabó» podría sugerir un registro más religioso o litúrgico en español.
- source_word: ἀναβὰς
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: LSJ
  rationale: El participio literalmente significa «habiendo subido». «Subió» conserva esa imagen de movimiento ascendente o hacia una sede superior, sin añadir información geográfica.
- source_word: κατήμηνυε
  english_pob_choice: reported
  chosen_spanish: le informó de
  alternatives_spanish:
  - le reportó
  - denunció
  lexicon: LSJ
  rationale: El verbo puede significar informar o reportar, a veces con matiz acusatorio. Aquí el objeto es el tesoro, no una persona, por lo que «le informó de» evita introducir una acusación más fuerte de la que exige el griego.
- source_word: τὸν τῶν χρημάτων θησαυρόν
  english_pob_choice: the treasury of funds
  chosen_spanish: el tesoro de fondos
  alternatives_spanish:
  - el tesoro de dinero
  - la tesorería de fondos
  - el tesoro del dinero
  lexicon: LSJ
  rationale: Se mantiene la referencia concreta a dinero/fondos y la imagen de un depósito o tesoro. «Tesoro de fondos» conserva la literalidad relativa del original y la decisión inglesa, aunque en español suene algo formal; sigue siendo inteligible y cercana al texto fuente.
- source_word: ὁ Ἀπολλώνιος
  english_pob_choice: Apollonius
  chosen_spanish: Apolonio
  lexicon: project policy
  rationale: Nombre propio transliterado de forma estándar al español.
- source_word: Σίμωνι
  english_pob_choice: Simon
  chosen_spanish: Simón
  lexicon: project policy
  rationale: Nombre propio transliterado de forma estándar al español.
- source_word: Σέλευκον
  english_pob_choice: Seleucus
  chosen_spanish: Seleuco
  lexicon: project policy
  rationale: Nombre propio transliterado de forma estándar al español.
theological_decisions:
- issue: Matiz de κηδεμονίας en contexto político
  english_pob_reading: loyalty to the king
  chosen_spanish_reading: lealtad al rey
  alternative_spanish_readings:
  - cuidado del rey
  - solicitud hacia el rey
  - fidelidad al rey
  rationale: El contexto no describe una tutela legal sino una disposición favorable hacia el rey. «Lealtad al rey» comunica mejor el valor relacional y político que refleja la revisión inglesa, sin suavizarlo a un simple «cuidado».
  doctrine_reference: Lexical/contextual decision; no doctrinal claim.
- issue: Posible matiz acusatorio de κατήμηνυε
  english_pob_reading: reported the treasury of funds
  chosen_spanish_reading: le informó de el tesoro de fondos
  alternative_spanish_readings:
  - lo denunció por el tesoro de fondos
  - reportó el tesoro de fondos
  rationale: La escena presenta a Apolonio comunicando información estratégica a Seleuco. En español, «informó de» conserva el acto de notificar sin cargar el verbo con una acusación personal que el objeto gramatical no exige.
  doctrine_reference: Lexical/contextual decision; no doctrinal claim.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajusta κηδεμονίας hacia «loyalty to the king» y κατήμηνυε hacia «reported». La versión española sigue esa lectura, pero conserva un registro natural y auditable, evitando tanto una paráfrasis excesiva como un calco innecesario.
  spanish_consistency_notes:
  - Se usa «Apolonio», «Simón» y «Seleuco» de forma uniforme según la transliteración española estándar.
  - Se mantiene «fondos» para preservar el matiz económico del griego χρημάτων, aunque la combinación «tesoro de fondos» resulte algo formal; responde a la fidelidad al audit trail.
  - Se evita «SEÑOR» o un término litúrgico para βασιλέα, porque el referente es un rey humano, no el nombre divino.
