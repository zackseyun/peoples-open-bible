theological_decisions:
- issue: Nature of the disturbance in the valley
  chosen_reading: Rendered as physical-cosmic upheaval ('convulsion') rather than a merely emotional or social disturbance.
  alternative_readings:
  - great turmoil
  - great commotion
  rationale: In the Parables, judgment scenes often depict creation itself in violent disturbance. 'Convulsion' keeps the imagery concrete and apocalyptic without over-specifying earthquake language not explicit in the Ge'ez.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic judgment language into generic prose.
