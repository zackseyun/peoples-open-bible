    text: '''Mount Mizar'' may be a place-name; alternatively, ''the little mountain'' or ''the hill Mizar.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'from the land of the Jordan, and Hermon,'.
    reason: previous_rendering
