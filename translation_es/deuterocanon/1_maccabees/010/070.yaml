revisions:
- from: 'Y lo envió a Jonatán, el sumo sacerdote[a], diciendo: «Tú solo te alzas[b] contra nosotros, mientras yo he venido a ser objeto de burla y de oprobio por causa de ti[c]; ¿y por qué ejerces autoridad sobre nosotros en las montañas?»'
  to: 'Y envió a Jonatán, el sumo sacerdote, diciendo: «Tú solo te alzas[a] contra nosotros, mientras yo he venido a ser objeto de burla y de oprobio por causa de ti[b]; ¿y por qué ejerces autoridad sobre nosotros en las montañas[c]?»'
  rationale: 'Se corrige un error de traducción en la apertura: ἀπέστειλεν πρὸς no significa «lo envió a Jonatán», sino que envió una comunicación a Jonatán. También se preserva en nota la posibilidad contextual de «región montañosa» para ἐν τοῖς ὄρεσιν, en línea con el rastro de auditoría inglés. El resto del texto puede mantenerse con ajustes mínimos.'
