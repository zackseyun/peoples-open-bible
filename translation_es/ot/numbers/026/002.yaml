  to: Hagan un censo[a] de toda la congregación de los hijos de Israel, de veinte años para arriba[b], por sus casas paternas, todos en Israel que salen a la guerra[c].
  rationale: Se corrigió el imperativo al plural para ajustarlo al hebreo שְׂאוּ. Se mejoró la naturalidad de la fórmula de edad sin perder el valor de 'y upward'. Se completó la nota literal del modismo según el audit trail inglés. El resto del versículo se mantuvo por ser fiel al sentido fuente y al razonamiento léxico documentado.
