revisions:
- from: Antes de que mueras[a], haz bien a un ser amado, y según lo que alcanza tu mano[b], dale a él.
  to: Antes de que mueras[a], haz bien a quien amas, y según lo que alcanza tu mano[b], dale.
  rationale: Se ajusta el destinatario a «a quien amas» para reflejar mejor el valor relacional del hebreo y la decisión documentada en inglés, sin cerrar el sentido a «amigo». Se cambia «dale a él» por «dale» para un español natural y digno, manteniendo intacto el mandato de dar conforme a los propios medios. Se conserva la imagen de la mano con nota explicativa, en línea con la rationale léxica del POB.
