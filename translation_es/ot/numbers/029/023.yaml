    issue: Puntuación antes de «sin defecto»
    rationale: La coma hace que «sin defecto» parezca un añadido parentético, cuando en el hebreo es un modificador atributivo directo de los corderos. Sin coma, el español preserva mejor la relación sintáctica y fluye con más naturalidad cultual.
  revised_spanish_text: 'Y en el cuarto día: diez toros, dos carneros, catorce corderos de un año sin defecto,'
  revision_rationale: Se elimina la coma antes de «sin defecto» para reflejar mejor que el hebreo presenta esta cualidad como descriptor directo de los corderos y para mejorar la naturalidad del español litúrgico.
