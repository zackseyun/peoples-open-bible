revisions:
- from: Y José era el gobernador sobre la tierra; él era el que vendía grano a todo el pueblo de la tierra[a]. Y los hermanos de José vinieron y se inclinaron ante él, con el rostro en tierra.
  to: José era el gobernante del país; él era quien vendía grano a toda la gente del país. Cuando llegaron los hermanos de José, se inclinaron ante él[a], con el rostro en tierra.
  rationale: Se ajusta אֶרֶץ a «país» para reflejar el referente local del contexto, se cambia «gobernador» por «gobernante» para corresponder mejor a הַשַּׁלִּיט / ‘ruler’, y se pule la sintaxis narrativa para un español más natural sin perder el contenido fuente. Se conserva la nota alternativa sobre el verbo de reverencia, con anclaje correcto en el texto.
