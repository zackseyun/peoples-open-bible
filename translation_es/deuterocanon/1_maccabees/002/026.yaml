translation:
  language: es
  text: Y mostró celo por la ley[a], como hizo Finees contra Zambri hijo de Salom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres griegos aquí son Zambri hijo de Salom; las mismas figuras son más conocidas en Números 25 como Zimri hijo de Salu.
    reason: cross_reference
lexical_decisions:
- source_word: ἐζήλωσεν
  english_pob_choice: was zealous
  chosen_spanish: tuvo celo
  alternatives_spanish:
  - fue celoso
  - mostró celo
  - ardió en celo
  lexicon: BDAG
  rationale: El verbo ζηλόω aquí expresa un celo intenso y decidido. «Tuvo celo» conserva la fuerza del griego sin introducir una imagen demasiado interpretativa; «fue celoso» suena más abstracto en español, y «ardió en celo» sería más enfático que el texto base.
- source_word: τῷ νόμῳ
  english_pob_choice: for the law
  chosen_spanish: por la ley
  alternatives_spanish:
  - para la ley
  - respecto de la ley
  - por la Ley
  lexicon: BDAG
  rationale: El dativo con ζηλόω indica el objeto del celo. «Por la ley» es natural en español y conserva la relación de motivo/objeto; se evita capitalizar «Ley» porque el griego no lo marca y el contexto no exige una convención litúrgica.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - justamente como
  - tal como
  lexicon: BDAG
  rationale: La comparación histórica queda clara con «como». «Así como» sería también posible, pero «como» es más directo y no añade matiz innecesario.
- source_word: ἐποίησεν
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - procedió
  - obró
  lexicon: BDAG
  rationale: En la cláusula comparativa, ἐποίησεν es amplio. «Hizo» permite que el complemento con «contra Zambri» precise la acción, sin sobreinterpretarla.
- source_word: Φινεὲς
  english_pob_choice: Phinehas
  chosen_spanish: Finees
  alternatives_spanish:
  - Finees
  - Finees
  lexicon: LSJ
  rationale: 'Se conserva la transliteración más cercana al griego: Φινεὲς → Finees. Esta forma es clara en español y mantiene la ancladura al texto griego, aunque la tradición hebrea sea más conocida con otra vocalización.'
- source_word: τῷ Ζαμβρὶ
  english_pob_choice: against Zambri
  chosen_spanish: contra Zambri
  alternatives_spanish:
  - frente a Zambri
  - en contra de Zambri
  - a Zambri
  lexicon: BDAG
  rationale: Aunque morfológicamente es dativo, en el aludido relato la relación es adversativa. «Contra Zambri» expresa mejor el sentido narrativo y la referencia a Números 25.
- source_word: υἱῷ Σαλώμ
  english_pob_choice: son of Salom
  chosen_spanish: hijo de Salom
  alternatives_spanish:
  - el hijo de Salom
  - hijo de Salu
  - hijo de Salom
  lexicon: LSJ
  rationale: Se sigue la forma griega Σαλώμ → Salom y se traduce υἱῷ de manera natural como «hijo de». La alternativa «hijo de Salu» se reserva para nota, ya que corresponde a la tradición hebrea más familiar.
theological_decisions:
- issue: Mantener la comparación con Finees sin suavizar su carga violenta o explicarla en exceso
  english_pob_reading: Retain the comparison straightforwardly without softening or expanding it
  chosen_spanish_reading: Conservar la comparación de manera directa, sin suavizar ni desarrollar el trasfondo
  alternative_spanish_readings:
  - Parafrasear para explicar la alusión
  - atenuar el lenguaje de celo para evitar la asociación violenta
  rationale: El griego presenta una comparación histórica explícita con Finees. La traducción debe preservar esa tensión narrativa y teológica, sin resolverla por vía explicativa ni rebajarla por sensibilidad moderna.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica; primacía del original sobre la tradición traductora.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió una formulación más directa y formal («was zealous») frente a una imagen más idiomática. En español, «tuvo celo» conserva esa sobriedad y proximidad al griego, evitando una paráfrasis emocional excesiva.
  spanish_consistency_notes:
  - Se usa «ley» en minúscula, en consonancia con el contexto judío de Torah sin marcar una convención tipográfica especial.
  - Se mantiene la ancladura a las formas griegas de los nombres (Finees, Zambri, Salom) y se reserva la correspondencia más conocida de Números 25 para la nota.
  - «Por la ley» conserva el objeto del celo sin forzar una expansión doctrinal.
  - No se introduce «Mesías/Cristo» ni otras terminologías ajenas al versículo.
