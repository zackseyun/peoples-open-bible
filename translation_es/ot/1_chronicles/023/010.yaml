translation:
  language: es
  text: 'Y los hijos de Simei: Jahat, Zina[a], Jeús y Bería. Estos fueron los hijos de Simei: cuatro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas traducciones leen el segundo nombre como «Zizá» (compárese 1 Crónicas 23:11); aquí el hebreo lee «Zina».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: En una lista genealógica, בְנֵי se expresa de forma natural como «los hijos de». El conector ו se conserva como «Y» para reflejar la continuidad del registro genealógico sin forzar una paráfrasis.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simei
  alternatives_spanish:
  - Shimei
  lexicon: Transliteración onomástica
  rationale: Se translitera el nombre propio al español con una forma bíblica comprensible y usual. La adaptación «Simei» mantiene la referencia al mismo nombre sin introducir traducción semántica.
- source_word: יַחַת
  english_pob_choice: Jahath
  chosen_spanish: Jahat
  alternatives_spanish:
  - Jahath
  - Yahat
  lexicon: Transliteración onomástica
  rationale: Se conserva el nombre propio con una transliteración española breve y legible. La forma inglesa auditada se refleja sin añadir información no presente en el hebreo.
- source_word: זִינָא
  english_pob_choice: Zina
  chosen_spanish: Zina
  alternatives_spanish:
  - Zizá
  - Zizah
  lexicon: Transliteración onomástica
  rationale: El hebreo consonántico aquí favorece «Zina», como en la decisión auditada en inglés. Se mantiene esa forma en español; la variante relacionada se documenta en la nota.
- source_word: וִיעוּשׁ
  english_pob_choice: Jeush
  chosen_spanish: Jeús
  alternatives_spanish:
  - Jeus
  - Jeush
  lexicon: Transliteración onomástica
  rationale: Se vierte el nombre propio con ortografía española transparente. La vocalización final se adapta a la ortografía castellana/latina para lectura eclesial sin alterar el referente.
- source_word: וּבְרִיעָה
  english_pob_choice: Beriah
  chosen_spanish: Berías
  alternatives_spanish:
  - Bería
  - Beriah
  lexicon: Transliteración onomástica
  rationale: Se adopta una forma española legible del nombre propio. La terminación se ajusta para facilitar la lectura en español, manteniendo el mismo referente del texto hebreo.
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Estos son
  - Éstos eran
  lexicon: HALOT
  rationale: En español narrativo-genealógico, «Estos fueron» reproduce bien la función resumptiva del hebreo y encaja con el registro histórico de Crónicas.
- source_word: בְנֵי שִׁמְעִי
  english_pob_choice: the sons of Shimei
  chosen_spanish: los hijos de Simei
  alternatives_spanish:
  - los hijos de Shimei
  - los descendientes de Simei
  lexicon: HALOT
  rationale: Se mantiene la repetición resumptiva de la frase hebrea para conservar claridad genealógica. «Hijos» es la opción más directa y fiel al patrón del listado.
- source_word: אַרְבָּעָה
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - '4'
  lexicon: HALOT
  rationale: El cardinal se traduce de forma simple y directa; el versículo establece explícitamente el total de cuatro nombres.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y la decisión auditada en inglés, sin cambios de sentido ni ampliaciones. Se preserva la nota sobre la variante nominal relacionada con 1 Crónicas 23:11.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece ningún tetragrámaton ni sustitución divina en este versículo.
  - Se mantiene un registro genealógico sobrio y directo, adecuado para listas de nombres propios.
  - La nota al pie marca solo la variante de nombre ya documentada en el audit trail inglés, sin añadir otras conjeturas.
