  - severity: medium
    issue: '''muchacho'' debilita el tono afectuoso y familiar de παιδίον'
    rationale: En un discurso de padre a hijo, 'muchacho' puede sonar más coloquial o distante. 'Hijo' conserva mejor la ternura contextual y la legibilidad eclesial.
  - severity: low
    issue: La nota al pie tiene puntuación y comillas torpes
    rationale: La forma actual con comillas duplicadas es poco limpia. Conviene normalizarla a una redacción española estándar.
