translation:
  language: es
  text: Pero ahora, Yahvé, tú eres nuestro Padre; nosotros somos el barro, y tú eres nuestro alfarero; todos nosotros somos obra de tu mano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La conjunción con valor de transición y contraste se expresa mejor en español con «pero ahora», que conserva el giro desde la súplica anterior sin volverlo excesivamente interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino del Tetragrámaton con la forma española establecida en el proyecto: «Yahvé». Así se evita la sustitución por un título y se preserva el nombre propio del pacto.'
- source_word: אָבִינוּ
  english_pob_choice: our Father
  chosen_spanish: nuestro Padre
  alternatives_spanish:
  - nuestro padre
  - nuestro progenitor
  lexicon: HALOT
  rationale: El sustantivo relacional y de pacto se traduce de modo directo y reverente como «nuestro Padre». En español, la mayúscula en contexto teológico ayuda a señalar la referencia a Dios sin cambiar el sentido.
- source_word: אֲנַחְנוּ הַחֹמֶר
  english_pob_choice: we are the clay
  chosen_spanish: nosotros somos el barro
  alternatives_spanish:
  - nosotros somos la arcilla
  - somos barro
  lexicon: HALOT
  rationale: Aunque «clay» suele corresponder a «arcilla», en español bíblico «barro» comunica mejor la imagen de material maleable y conserva naturalidad poética. «La arcilla» sigue siendo posible, pero puede sonar más técnico en este contexto.
- source_word: יֹצְרֵנוּ
  english_pob_choice: our potter
  chosen_spanish: nuestro alfarero
  alternatives_spanish:
  - el que nos forma
  - nuestro formador
  lexicon: HALOT
  rationale: La imagen del barro hace explícita la metáfora artesanal; «alfarero» preserva ese campo semántico en español mejor que una abstracción como «formador». La relación metafórica se mantiene íntegra.
- source_word: וּמַעֲשֵׂה יָדְךָ
  english_pob_choice: the work of your hand
  chosen_spanish: obra de tu mano
  alternatives_spanish:
  - trabajo de tu mano
  - hechura de tu mano
  lexicon: HALOT
  rationale: «Obra de tu mano» reproduce con fidelidad la construcción hebrea y su dignidad poética. «Hechura» es posible, pero en español puede sonar más pesada; «obra» resulta más natural sin perder el paralelismo.
- source_word: כֻּלָּנוּ
  english_pob_choice: we all
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - todos
  - todos y cada uno de nosotros
  lexicon: HALOT
  rationale: La colocación final enfatiza la totalidad del pueblo. «Todos nosotros» conserva ese énfasis colectivo con un orden natural en español.
theological_decisions:
- issue: Traducción del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa יְהוָה directamente; el proyecto POB evita la sustitución por «Señor». En español, «Yahvé» es la forma de referencia del nombre divino elegida para mantener la transparencia textual y la consistencia terminológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje paternal aplicado a Dios
  english_pob_reading: our Father
  chosen_spanish_reading: nuestro Padre
  alternative_spanish_readings:
  - nuestro progenitor
  - nuestro padre
  rationale: El hebreo emplea un término familiar masculino literal; no hay base para neutralizarlo. «Nuestro Padre» conserva el valor relacional y de pacto, y encaja con la teología del texto.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over gender-neutral)'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura auditada del inglés POB y del hebreo: mantiene el contraste inicial, el nombre divino como nombre propio, la metáfora barro-alfarero y el cierre enfático colectivo. No se detectan revisiones previas que exijan nota de cambio.'
  spanish_consistency_notes:
  - Se preserva la terminología del proyecto para יְהוָה como «Yahvé».
  - Se evitó «Señor» como sustituto del nombre divino.
  - «Barro» y «alfarero» mantienen la metáfora artesanal del hebreo sin volverla abstracta.
  - El orden final «todos nosotros» conserva el énfasis de כֻּלָּנוּ.
