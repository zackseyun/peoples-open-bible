translation:
  language: es
  text: Mira[a], Yahvé tu Dios ha puesto la tierra delante de ti. Sube y toma posesión, tal como Yahvé, el Dios de tus padres, te ha hablado. No temas ni te acobardes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ve». El hebreo usa un imperativo de atención; «Mira» se mantiene en el texto principal por sonar más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Ve
  lexicon: HALOT
  rationale: El imperativo funciona como llamado de atención. «Mira» conserva la inmediatez y suena natural en español bíblico moderno; evita la rigidez de un calco como «ve» y mantiene el tono exhortativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» preserva el Tetragrámaton en la forma española establecida y evita la sustitución por un título genérico.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  - tu Dios y Señor
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se vierte de manera directa con «tu Dios». Mantiene la relación de pacto sin añadir matices no presentes en el hebreo.
- source_word: נָתַן ... לְפָנֶיךָ
  english_pob_choice: has set ... before you
  chosen_spanish: ha puesto ... delante de ti
  alternatives_spanish:
  - ha puesto ... delante de ti
  - ha dado ... delante de ti
  - ha colocado ... delante de ti
  lexicon: HALOT
  rationale: El hebreo combina dar con la imagen espacial de poner delante. «Ha puesto ... delante de ti» reproduce mejor la presentación de la tierra como algo colocado al alcance que un simple «ha dado».
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En Deuteronomio el referente es la tierra prometida. «La tierra» es natural y suficientemente amplio en español; se evita «país», que estrecharía el sentido.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Sube
  - Súbete
  - Asciende
  lexicon: HALOT
  rationale: El hebreo usa un mandato idiomático de avance. «Sube» conserva la imagen espacial y funciona bien en español sin sonar arcaizante.
- source_word: רֵשׁ
  english_pob_choice: take possession
  chosen_spanish: toma posesión
  alternatives_spanish:
  - toma posesión
  - posee
  - ocupa
  lexicon: HALOT
  rationale: El verbo expresa apropiación activa de lo concedido. «Toma posesión» transmite con claridad la fuerza imperativa y evita el matiz demasiado técnico o abstracto de «posee».
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as ... has spoken
  chosen_spanish: tal como ... te ha dicho
  alternatives_spanish:
  - tal como ... te ha dicho
  - tal como ... ha hablado
  - como ... ha hablado
  lexicon: HALOT
  rationale: El verbo hebreo es «hablar/decir», no explícitamente «prometer». «Te ha dicho» preserva esa literalidad básica; el contexto de pacto queda implícito sin introducir una paráfrasis más fuerte.
- source_word: אֱלֹהֵי אֲבֹתֶיךָ
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de tus padres
  alternatives_spanish:
  - el Dios de tus padres
  - el Dios de tus antepasados
  lexicon: HALOT
  rationale: Se conserva la fórmula de pacto con el plural masculino del hebreo. «Padres» sigue la expresión bíblica tradicional y evita neutralizar el término principal del texto.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - te
  - a ti
  lexicon: HALOT
  rationale: El dativo se integra con naturalidad en español dentro de «te ha dicho». Mantiene la referencia directa al destinatario sin sobrecargar la sintaxis.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No temas
  - No tengas miedo
  lexicon: HALOT
  rationale: La prohibición con ירא se traduce de forma concisa y solemne. «No temas» conserva el registro bíblico y la fuerza directa del mandato.
- source_word: וְאַל תֵּחָת
  english_pob_choice: or be dismayed
  chosen_spanish: ni te desanimes
  alternatives_spanish:
  - ni te desanimes
  - ni te acobardes
  - ni desfallezcas
  lexicon: HALOT
  rationale: חתת expresa quedar quebrantado, intimidado o abatido. «Ni te desanimes» comunica bien el efecto emocional en español, aunque deja una amplitud semántica algo distinta del hebreo; se prefiere por claridad y fluidez.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: Se mantiene el nombre propio del pacto y no se lo sustituye por un título en mayúsculas. Esto preserva la distinción entre el nombre divino y otras designaciones de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La fórmula de pacto אֱלֹהֵי אֲבֹתֶיךָ
  english_pob_reading: the God of your fathers
  chosen_spanish_reading: el Dios de tus padres
  alternative_spanish_readings:
  - el Dios de tus padres
  - el Dios de tus antepasados
  rationale: Se conserva la fórmula histórica y covenantal del hebreo, que enmarca la promesa de la tierra como continuidad con los patriarcas. No se neutraliza a «antepasados» en el texto principal porque el hebreo dice literalmente «padres».
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'Se revisó el texto más reciente del POB en inglés y el cotejo de revisión indica alto acuerdo, sin cambios necesarios. La versión española sigue de cerca las decisiones léxicas auditadas: nombre divino, fórmula de pacto, imperativos y el par prohibitivo final, sin introducir paráfrasis no sustentadas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «tu Dios»/«el Dios de tus padres» como fórmula de pacto.
  - «No temas ni te desanimes» conserva el paralelismo de las dos prohibiciones del hebreo.
  - El marcador [a] está anclado en «Mira» y ofrece una alternativa breve conforme al audito en inglés.
