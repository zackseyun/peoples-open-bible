    issue: La cláusula final no refleja bien el matiz inclusivo de וַאֲשֶׁר
    rationale: El hebreo añade un grupo adicional con sentido inclusivo/climático («incluso/aun a las que…»). El simple «y a las que he afligido» puede leerse como coordinación plana y pierde parte de la fuerza discursiva preservada por el inglés POB.
  - severity: medium
    issue: Inconsistencia entre singular colectivo y plural en la última frase
    rationale: «La coja» y «la desterrada» conservan el singular colectivo femenino del hebreo, pero «las que he afligido» cambia a plural y rompe la textura sintáctica. Conviene una solución española que mantenga naturalidad y refleje la adición inclusiva.
  - severity: low
