translation:
  language: es
  text: 'Y esto es para ti: la contribución[a] de sus dones, con todas las ofrendas mecidas de los hijos de Israel. Te las he dado a ti, y a tus hijos y a tus hijas contigo, por estatuto perpetuo. Todo el que esté limpio[b] en tu casa podrá comerlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda alzada» para «la contribución»; el término hebreo designa una porción apartada para uso sagrado.
    reason: lexical_alternative
  - marker: b
    text: «Limpio» aquí significa ritualmente limpio, no simplemente físicamente limpio ni moralmente intachable.
    reason: cultural_note
lexical_decisions:
- source_word: תְּרוּמַת
  english_pob_choice: the contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda alzada
  - la ofrenda
  - la contribución apartada
  lexicon: HALOT
  rationale: תְּרוּמָה designa una porción separada para uso sagrado. «Contribución» conserva la idea de algo apartado y entregado, sin recurrir a una expresión arcaica como «ofrenda alzada».
- source_word: מַתָּנָם
  english_pob_choice: their gifts
  chosen_spanish: sus regalos
  alternatives_spanish:
  - sus dones
  - sus ofrendas
  - sus dádivas
  lexicon: HALOT
  rationale: La forma plural con sufijo indica «sus» y el sustantivo básico es «don/regalo». «Regalos» es el equivalente más directo en español y mantiene la relación con el grupo anterior sin convertirlo prematuramente en un término técnico de sacrificio.
- source_word: תְּנוּפֹת
  english_pob_choice: wave offerings
  chosen_spanish: ofrendas mecidas
  alternatives_spanish:
  - ofrendas agitadas
  - ofrendas presentadas meciéndolas
  - ofrendas mecidas ante Yahvé
  lexicon: HALOT
  rationale: תְּנוּפָה es el término técnico cultual de la ofrenda movida o mecida. «Ofrendas mecidas» conserva el sentido ritual sin forzar un calco demasiado pesado.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma heredada del hebreo, como en el inglés POB, porque el texto usa la designación colectiva literal «hijos de Israel».
- source_word: נְתַתִּי/ם
  english_pob_choice: I have given them
  chosen_spanish: Te las he dado
  alternatives_spanish:
  - te las doy
  - te las he entregado
  - te las he asignado
  lexicon: HALOT
  rationale: El perfecto verbal expresa un don ya otorgado con vigencia presente. «Te las he dado» reproduce bien esa fuerza y concuerda con el plural implícito del referente anterior.
- source_word: וּלְבָנֶיךָ וְלִבְנֹתֶיךָ אִתְּךָ
  english_pob_choice: and to your sons and your daughters with you
  chosen_spanish: y a tus hijos y a tus hijas contigo
  alternatives_spanish:
  - y a tus hijos e hijas contigo
  - y a tus hijos y a tus hijas que están contigo
  - y a tus descendientes contigo
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente varones y mujeres; se preservan ambos sustantivos en español. «Contigo» mantiene la idea de pertenencia al ámbito de Aarón.
- source_word: לְחָק עוֹלָם
  english_pob_choice: as a permanent statute
  chosen_spanish: por estatuto perpetuo
  alternatives_spanish:
  - como estatuto permanente
  - como estatuto perpetuo
  - por ley perpetua
  lexicon: HALOT
  rationale: חֹק es una disposición legal fija; עוֹלָם añade duración continuada. «Por estatuto perpetuo» conserva el valor jurídico y la permanencia sin diluirlo en una simple costumbre.
- source_word: כָּל טָהוֹר
  english_pob_choice: Everyone in your house who is clean
  chosen_spanish: Todo el que esté limpio
  alternatives_spanish:
  - Toda persona limpia
  - Todo el que sea limpio
  - Todo el que esté ritualmente limpio
  lexicon: HALOT
  rationale: En el contexto sacerdotal, טָהוֹר se refiere a limpieza ritual, no a limpieza moral o física en sentido general. «Todo el que esté limpio» mantiene la concisión del inglés POB; el matiz ritual se explica en nota.
- source_word: בְּבֵיתְךָ
  english_pob_choice: in your house
  chosen_spanish: en tu casa
  alternatives_spanish:
  - en tu hogar
  - en tu casa/tu familia
  - en tu casa, es decir, tu casa
  lexicon: HALOT
  rationale: La expresión denota la esfera doméstica/hogar. «En tu casa» es una traducción natural y fiel al hebreo.
- source_word: יֹאכַל אֹתוֹ
  english_pob_choice: may eat it
  chosen_spanish: podrá comerlo
  alternatives_spanish:
  - puede comerlo
  - comerá de ello
  - le está permitido comerlo
  lexicon: HALOT
  rationale: El imperfecto aquí expresa autorización. «Podrá comerlo» comunica permiso y derecho, conservando el tono legal del precepto.
theological_decisions:
- issue: Limpieza ritual frente a limpieza moral
  english_pob_reading: Rendered טָהוֹר as 'clean' in a priestly/ritual sense, not moral purity.
  chosen_spanish_reading: «Limpio» se entiende aquí en sentido ritual, no como impecabilidad moral ni mera higiene física.
  alternative_spanish_readings:
  - puro
  - ceremonialmente limpio
  - ritualmente puro
  rationale: El contexto regula quién puede comer porciones sagradas dentro de la casa sacerdotal. En español, «limpio» es breve y natural en el texto principal; la nota aclara la categoría ritual para evitar un malentendido doctrinal.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: Se siguió la última revisión del texto inglés POB, que prefirió «of the gifts, with all» frente a la anterior «from their gifts, from all», por una correspondencia más ajustada con la construcción hebrea. En español se reflejó con «de sus regalos, con todas las ofrendas mecidas».
  spanish_consistency_notes:
  - Se mantuvo «hijos de Israel» para conservar la forma colectiva literal del hebreo y la pauta del inglés POB.
  - Se eligió «contribución» para תְּרוּמָה, coherente con el valor de porción apartada para Dios y con el criterio POB de evitar arcaísmos innecesarios.
  - «Ofrendas mecidas» preserva el tecnicismo cultual de תְּנוּפָה sin sustituirlo por una generalización.
  - «Por estatuto perpetuo» reproduce el valor legal de חֹק עוֹלָם.
  - La nota sobre «limpio» protege la distinción ritual propia del contexto sacerdotal.
