revisions:
- from: Tu madre era como una vid[a], plantada junto a aguas; era fructífera y llena de ramas por causa de muchas aguas.
  to: Tu madre era como una vid[a] en tu sangre, plantada junto a las aguas; era fructífera y llena de ramas por causa de aguas abundantes.
  rationale: La revisión restituye en el texto principal la lectura difícil del hebreo, en línea con la primacía de la fuente y con la decisión léxica/theológica documentada en el expediente inglés. La nota conserva las alternativas interpretativas sin resolver silenciosamente la dificultad. También se mejora la naturalidad de עַל מַיִם con 'junto a las aguas' y de מִמַּיִם רַבִּים con 'aguas abundantes'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:42:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no preserva fielmente toda la secuencia del hebreo. Omite en el texto principal la frase difícil בְּדָמְךָ (''en tu sangre'') y la reemplaza implícitamente con ''junto a aguas'', que en realidad traduce עַל מַיִם. Así, fusiona dos segmentos fuente en uno y borra la dificultad textual que el expediente inglés documenta como significativa. El resto del verso sí refleja bien la imagen: madre como vid, plantada junto a las aguas, fructífera y ramificada por aguas abundantes.'
  spanish_quality_summary: El español es claro y natural, pero la estructura actual sacrifica precisión fuente. 'Junto a aguas' suena algo poco idiomático en español; 'junto a las aguas' o 'junto a aguas' poético son posibles, pero aquí conviene una redacción más fluida. 'Llena de ramas' es comprensible; 'frondosa' sería más idiomático pero perdería la referencia explícita a ramas, así que puede mantenerse. La principal reparación requerida es reinsertar la frase oscura en el texto principal y dejar la nota para las alternativas.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. Las decisiones léxicas clave son mayormente adecuadas, salvo בְּדָמְךָ, donde el borrador contradice tanto la evidencia fuente como la política de preservar la dificultad textual. Debe decir 'en tu sangre' en el texto principal, con nota sobre 'en tu semejanza' o 'en tu viña/viñedo'.
  issues:
  - severity: high
    issue: Omisión de בְּדָמְךָ en el texto principal
    rationale: El hebreo incluye explícitamente una frase difícil ('en tu sangre'). El borrador la elimina del cuerpo principal y la desplaza solo a nota, lo que altera el contenido fuente.
  - severity: high
    issue: Duplicación funcional de עַל מַיִם
    rationale: Al usar 'junto a aguas' para cubrir בְּדָמְךָ, el borrador luego traduce nuevamente la idea locativa de עַל מַיִם, desalineando la correspondencia con el original.
  - severity: medium
    issue: Justificación léxica inconsistente
    rationale: 'La decisión léxica para בְּדָמְךָ dice ''chosen_spanish: junto a aguas'', pero esa frase no corresponde a ese término hebreo sino a עַל מַיִם.'
  - severity: low
    issue: Ligera falta de naturalidad en 'junto a aguas'
    rationale: Aunque posible en registro poético, en español bíblico contemporáneo suele sonar mejor 'junto a las aguas' o 'junto al agua'.
  revised_spanish_text: Tu madre era como una vid[a] en tu sangre, plantada junto a las aguas; era fructífera y llena de ramas por causa de aguas abundantes.
  revised_footnotes:
  - marker: a
    text: 'Hebreo difícil: literalmente «en tu sangre». Algunos lo interpretan o enmiendan como «en tu semejanza» o «en tu viña/viñedo».'
    reason: alternative_reading
  revision_rationale: La revisión restituye en el texto principal la lectura difícil del hebreo, en línea con la primacía de la fuente y con la decisión léxica/theológica documentada en el expediente inglés. La nota conserva las alternativas interpretativas sin resolver silenciosamente la dificultad. También se mejora la naturalidad de עַל מַיִם con 'junto a las aguas' y de מִמַּיִם רַבִּים con 'aguas abundantes'.
