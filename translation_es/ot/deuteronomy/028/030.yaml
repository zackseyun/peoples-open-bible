translation:
  language: es
  text: Te comprometerás con una esposa[a], pero otro hombre se acostará con ella[b]; edificarás una casa, pero no habitarás en ella; plantarás una viña, pero no empezarás a usar su fruto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Te desposarás con una esposa».'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo para «se acostará con ella» es un término sexual brusco; algunas traducciones lo expresan más fuertemente, como «la violará» o «la forzará sexualmente», pero aquí se evita especificar fuerza más allá de lo explícito en esta forma.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «no la profanarás / no la harás común»; es un modismo para comenzar a usar el fruto de una viña para consumo ordinario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִשָּׁה תְאָרֵשׂ
  english_pob_choice: You will become engaged to a wife
  chosen_spanish: Te comprometerás con una mujer
  alternatives_spanish:
  - Te desposarás con una mujer
  - Prometerás matrimonio a una mujer
  - Te comprometerás con una esposa
  lexicon: HALOT
  rationale: ארשׂ expresa el acto legal previo al matrimonio; en español, «comprometerse con» comunica ese estado sin forzar el término técnico «desposar» ni sonar a simple noviazgo. «Mujer» mantiene el objeto directo del hebreo, mientras el contexto ya indica la relación matrimonial futura.
- source_word: אִישׁ אַחֵר
  english_pob_choice: another man
  chosen_spanish: otro hombre
  alternatives_spanish:
  - un hombre distinto
  - un varón diferente
  lexicon: HALOT
  rationale: La frase contrasta de forma directa con la persona a la que se habla. «Otro hombre» es la equivalencia natural y conserva la oposición del hebreo sin añadir matices.
- source_word: ישגלנה
  english_pob_choice: will lie with her
  chosen_spanish: se acostará con ella
  alternatives_spanish:
  - yacerá con ella
  - tendrá relaciones con ella
  - la violará
  lexicon: HALOT
  rationale: El verbo hebreo es un término sexual brusco. En español, «se acostará con ella» conserva el acto sexual sin introducir explícitamente violencia que el verbo, en esta forma, no marca de manera inequívoca. Se evita «tener relaciones» por suavizar demasiado el tono y «violar» por añadir fuerza no explicitada por la forma verbal.
- source_word: בַּ֥יִת תִּבְנֶ֖ה וְ/לֹא תֵשֵׁ֣ב בּ֑/וֹ
  english_pob_choice: you will build a house, but you will not live in it
  chosen_spanish: edificarás una casa, pero no habitarás en ella
  alternatives_spanish:
  - construirás una casa, pero no vivirás en ella
  - levantarás una casa, pero no morarás en ella
  lexicon: HALOT
  rationale: «Edificarás» reproduce bien el verbo construir/edificar del hebreo y su registro bíblico. «Habitarás» refleja el sentido de ישב con una casa en español bíblico y actual, y mantiene el paralelismo formal del texto.
- source_word: כֶּ֥רֶם תִּטַּ֖ע
  english_pob_choice: you will plant a vineyard
  chosen_spanish: plantarás una viña
  alternatives_spanish:
  - plantarás una vid
  - sembrarás una viña
  lexicon: HALOT
  rationale: כרם designa un viñedo o viña cultivada. «Viña» es la equivalencia natural y tradicional en español bíblico, más precisa que «vid» (planta individual) y más idiomática que una explicación más larga.
- source_word: וְ/לֹ֥א תְחַלְּלֶּֽ/נּוּ
  english_pob_choice: you will not begin to use its fruit
  chosen_spanish: no empezarás a usar su fruto
  alternatives_spanish:
  - no lo profanarás
  - no lo harás común
  - no disfrutarás de él
  lexicon: HALOT
  rationale: El piel de חלל aplicado a una viña expresa comenzar a hacer común/ordinario el fruto, es decir, iniciar su uso alimentario. «Empezarás a usar su fruto» conserva ese valor técnico sin reducirlo a una sola interpretación metafórica. Se evita «profanar» como traducción principal porque en español puede sonar demasiado religiosa o abstracta para el uso agrícola concreto.
theological_decisions:
- issue: Tono del acto sexual en el juicio deuteronómico
  english_pob_reading: The Hebrew verb is a blunt sexual term; the English draft renders it without specifying force beyond the form.
  chosen_spanish_reading: se acostará con ella
  alternative_spanish_readings:
  - la violará
  - yacerá con ella
  - tendrá relaciones con ella
  rationale: La elección preserva la crudeza sexual del hebreo sin añadir violencia explícita que no está gramaticalmente determinada en esta forma. Esto mantiene la tensión lexical documentada por el POB inglés y evita una domesticación excesiva o una ampliación interpretativa.
  doctrine_reference: Éxodo 20:14; Deuteronomio 22:22-29
- issue: Valor idiomático de תְחַלְּלֶּנּוּ en relación con la viña
  english_pob_reading: Literally, 'you will not profane/common it,' an idiom for beginning to use a vineyard's fruit for ordinary consumption.
  chosen_spanish_reading: no empezarás a usar su fruto
  alternative_spanish_readings:
  - no lo profanarás
  - no lo harás común
  - no disfrutarás de él
  rationale: La versión española sigue el sentido idiomático explicado por el POB inglés y lo vuelve transparente para el lector sin perder la relación con la práctica agrícola subyacente. Así se conserva la tensión entre sentido literal y sentido técnico del hebreo.
  doctrine_reference: Levítico 19:23-25
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail en inglés. La única tensión notable es el verbo sexual coarse ישגלנה, donde el español conserva una expresión directa sin intensificar a violencia explícita. También se mantuvo la explicación idiomática de תְחַלְּלֶּנּוּ mediante una formulación natural en español, con nota que preserva el sentido literal alternativo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se prefirió «comprometerás» para ארשׂ, en línea con la equivalencia funcional del POB inglés, con nota formal alternativa.
  - Se evitó «Cristo», «SEÑOR» y otras terminologías no presentes en el versículo.
  - «Viña» se mantuvo como término agrícola estándar para כרם.
  - La puntuación sigue el paralelismo del hebreo y conserva las tres cláusulas de juicio.
