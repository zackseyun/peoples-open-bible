translation:
  language: es
  text: Y mi pueblo habitará en una morada pacífica[a], en moradas seguras[b], y en lugares de descanso tranquilos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una morada de paz».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lugares de descanso tranquilos»; o «lugares de descanso en calma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשַׁב
  english_pob_choice: And ... will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - y habitará
  - y vivirá
  - y morará
  lexicon: HALOT
  rationale: El hebreo expresa residencia estable y continuada; en español, «habitará» comunica mejor esa permanencia que «sentará» o un simple «vivirá». Se omite la conjunción inicial separada porque el orden natural del español ya incorpora el enlace con «Y».
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: HALOT
  rationale: La expresión relacional y pactal del hebreo se vierte naturalmente como «mi pueblo». «Nación» es posible, pero desplaza el matiz de pertenencia personal.
- source_word: בִּנְוֵה
  english_pob_choice: in a ... habitation
  chosen_spanish: en una morada
  alternatives_spanish:
  - en una habitación
  - en una vivienda
  - en una morada
  lexicon: HALOT
  rationale: נוה puede significar morada, habitación o residencia. Aquí el paralelismo con «moradas» y «lugares de descanso» favorece un sentido residencial; «morada» es claro y bíblico sin sonar técnico.
- source_word: שָׁלוֹם
  english_pob_choice: peaceful
  chosen_spanish: de paz
  alternatives_spanish:
  - pacífica
  - de bienestar
  - en paz
  lexicon: HALOT
  rationale: El hebreo modifica a «morada» mediante שלום. En español, «morada de paz» conserva el vínculo nominal y mantiene el valor de shalom como paz integral, no solo ausencia de conflicto. «Pacífica» sería más adjetival y menos cercano a la estructura del hebreo.
- source_word: וּבְמִשְׁכְּנוֹת
  english_pob_choice: and in ... dwellings
  chosen_spanish: en moradas
  alternatives_spanish:
  - en viviendas
  - en tabernáculos
  - en tiendas
  lexicon: HALOT
  rationale: משכנות designa lugares de habitación. «Moradas» conserva el paralelismo y el registro bíblico; «tabernáculos» introduciría asociaciones cultuales no exigidas por el contexto.
- source_word: מִבְטַחִים
  english_pob_choice: secure
  chosen_spanish: seguras
  alternatives_spanish:
  - seguras y confiables
  - seguras/firmes
  - en seguridad
  lexicon: HALOT
  rationale: El término indica seguridad objetiva. En español, «moradas seguras» reproduce de forma directa la cualidad del sustantivo sin mover el sentido hacia la confianza subjetiva.
- source_word: וּבִמְנוּחוֹת
  english_pob_choice: and in ... resting places
  chosen_spanish: en lugares de descanso
  alternatives_spanish:
  - en descansos
  - en sitios de reposo
  - en lugares de reposo
  lexicon: HALOT
  rationale: 'מנוחות es plural y concreto: lugares de descanso o reposo. «Lugares de descanso» preserva el plural y suena natural en español; «reposo» sería válido pero un poco más abstracto.'
- source_word: שַׁאֲנַנּוֹת
  english_pob_choice: quiet
  chosen_spanish: tranquilos
  alternatives_spanish:
  - quietos
  - serenos
  - seguros
  lexicon: HALOT
  rationale: שאנן combina calma, seguridad y ausencia de perturbación. En esta colocación con «lugares de descanso», «tranquilos» expresa bien esa serenidad sin reducirlo a mera inmovilidad.
theological_decisions:
- issue: Naturaleza de la promesa de paz y seguridad
  english_pob_reading: Describe condiciones concretas y comunitarias de paz y seguridad para el pueblo de Dios, sin fijar aquí el marco temporal de cumplimiento.
  chosen_spanish_reading: Describe condiciones concretas y comunitarias de paz y seguridad para el pueblo de Dios, sin fijar aquí el marco temporal de cumplimiento.
  alternative_spanish_readings:
  - Promesa principalmente histórica para Judá
  - Promesa principalmente escatológica o mesiánica
  rationale: El hebreo presenta la promesa, pero no delimita en este versículo por sí solo si el cumplimiento es histórico inmediato, tipológico o escatológico. La redacción española mantiene esa tensión teológica sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica; no imponer un marco interpretativo exclusivo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el expediente auditado en inglés: conserva el paralelismo de tres miembros, el valor de shalom como «paz», el plural concreto de mekhonot/menuḥot y la cualidad objetiva de seguridad/calma sin introducir una lectura escatológica cerrada. No se detectaron revisiones posteriores en el expediente, así que no se incorporaron cambios adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí porque no aparece el tetragrámaton en el versículo.
  - Se prefirió «morada/moradas» para mantener consistencia léxica con el paralelismo hebreo.
  - «Paz» se mantiene como equivalente principal de shalom; «tranquilos» se reserva para שאנן, evitando colapsar ambos términos.
  - Las notas a pie marcan solo alternativas reales atestiguadas por el expediente auditado en inglés, ajustadas al español.
