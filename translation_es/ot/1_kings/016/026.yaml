  rationale: Se corrige el nombre propio «Nabat» a «Nebat» para ajustarlo al hebreo y al expediente inglés. También se suaviza «con los que» a «con los cuales» para mejor legibilidad sin cambiar el sentido. Se conserva la nota léxica sobre «vanidades / cosas inútiles» porque preserva la carga polémica de הבל.
