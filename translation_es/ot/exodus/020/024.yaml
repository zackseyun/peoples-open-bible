    rationale: El contenido de la nota explica la alternativa léxica para אַזְכִּיר אֶת שְׁמִי, no para מִזְבַּח אֲדָמָה. El anclaje actual induce a error y no cumple la disciplina de notas.
  - severity: low
    issue: '''Haga recordar mi nombre'' es comprensible pero poco idiomático en español.'
    rationale: Una formulación como 'haga que se recuerde mi nombre' preserva el causativo hebreo con mejor fluidez y legibilidad en español eclesial general.
  revised_spanish_text: Harás para mí un altar de tierra, y sobre él sacrificarás tus holocaustos y tus ofrendas de paz, tu rebaño y tu ganado. En todo lugar donde yo haga que se recuerde mi nombre[a], vendré a ti y te bendeciré.
  revised_footnotes:
