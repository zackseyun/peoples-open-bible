base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/043/009.yaml
  text: Take large stones in your hand and hide them in the mortar[a], in the brick pavement that is at the entrance of Pharaoh’s house in Tahpanhes[c][b], before the eyes of the Jewish men.
  footnotes:
  - marker: a
    text: Or 'bury them' for 'hide them'; the Hebrew verb can denote concealing by placing something in the ground or structure.
    reason: lexical_alternative
  - marker: b
    text: Or 'brickwork,' 'brick terrace,' or possibly 'brick kiln' for 'brick pavement'; the Hebrew term is rare and its precise architectural sense is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'Judean men.' The Hebrew adjective can refer either to Jews/Judahites ethnically or to people of Judah more specifically.
    reason: lexical_alternative
