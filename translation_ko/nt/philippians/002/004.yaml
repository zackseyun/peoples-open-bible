id: PHP.2.4
reference: Philippians 2:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μὴ τὰ ἑαυτῶν ⸀ἕκαστοι ⸀σκοποῦντες, ἀλλὰ καὶ τὰ ἑτέρων ⸁ἕκαστοι.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/004.yaml
  text: Each of you should look not only to your own interests, but also to the interests of others.
translation:
  language: ko
  text: 여러분 각자는 자기 자신의 일만이 아니라 다른 사람의 일도 함께 살피십시오[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 보다 직역적으로는 「자기 것을 보지 말고 다른 이의 것도 보십시오」. 헬라어 τὰ ἑαυτῶν / τὰ ἑτέρων은 「자기 것/다른 이의 것」으로 폭넓게 「이익·관심사」를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκοποῦντες
  english_pob_choice: should look to
  chosen_korean: 살피다
  alternatives_korean:
  - 주목하다
  - 바라보다
  - 마음을 두다
  lexicon: BDAG
  rationale: σκοπέω는 주의 깊게 살피는 행위를 가리킨다. 「살피다」가 한국어로 그 의미를 가장 자연스럽게 옮긴다.
- source_word: τὰ ἑαυτῶν
  english_pob_choice: your own interests
  chosen_korean: 자기 자신의 일
  alternatives_korean:
  - 자기 자신의 것
  - 자기 자신의 이익
  - 자기 자신의 관심사
  lexicon: BDAG
  rationale: τὰ ἑαυτῶν은 폭넓게 「자기에게 속한 것·관심사」를 가리킨다. 「일」은 한국어에서 관심사·사무를 모두 아우르는 자연스러운 어휘이다.
- source_word: ἕκαστοι
  english_pob_choice: Each of you
  chosen_korean: 여러분 각자
  alternatives_korean:
  - 각 사람
  - 각자
  lexicon: BDAG
  rationale: 분배적 ἕκαστος를 한국어 「여러분 각자」로 옮겨 개별적 호소를 살린다.
- source_word: ἀλλὰ καὶ
  english_pob_choice: not only ... but also
  chosen_korean: ~만이 아니라 ~도
  alternatives_korean:
  - 단지 ~만이 아니라 ~도
  lexicon: BDAG
  rationale: 한국어 대조·추가 구문 「~만이 아니라 ~도」가 가장 자연스럽다.
- source_word: τὰ ἑτέρων
  english_pob_choice: the interests of others
  chosen_korean: 다른 사람의 일
  alternatives_korean:
  - 다른 이의 것
  - 다른 사람의 관심사
  lexicon: BDAG
  rationale: 앞의 τὰ ἑαυτῶν과 평행을 이루도록 「다른 사람의 일」로 옮긴다.
