translation:
  language: es
  text: Y sucedió que, cuando el rey oyó las palabras de la mujer, rasgó sus vestidos mientras pasaba sobre la muralla, y el pueblo vio, y he aquí que llevaba cilicio sobre su cuerpo, por debajo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «de dentro»; indica que el cilicio estaba puesto debajo de la ropa exterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִשְׁמֹעַ
  english_pob_choice: when ... heard
  chosen_spanish: cuando oyó
  alternatives_spanish:
  - al oír
  - en cuanto oyó
  lexicon: HALOT
  rationale: La construcción temporal introduce una acción precedente o simultánea; «cuando oyó» conserva la secuencia narrativa con español natural y fiel al valor temporal.
- source_word: דִּבְרֵי
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - el relato
  - el asunto
  lexicon: HALOT
  rationale: Aquí se alude al discurso reportado de la mujer; «las palabras» mantiene el sentido más directo sin desplazarlo a «relato» o «asunto».
- source_word: וַיִּקְרַע אֶת־בְּגָדָיו
  english_pob_choice: he tore his clothes
  chosen_spanish: rasgó sus vestidos
  alternatives_spanish:
  - rasgó sus ropas
  - rompió sus vestidos
  lexicon: HALOT
  rationale: En español bíblico, «rasgar los vestidos» comunica bien el gesto de duelo o horror. Se prefirió «vestidos» por su registro más tradicional y claro, sin cambiar el acto idiomático.
- source_word: וְהוּא עֹבֵר עַל־הַחֹמָה
  english_pob_choice: as he was passing by on the wall
  chosen_spanish: mientras pasaba sobre la muralla
  alternatives_spanish:
  - mientras pasaba por la muralla
  - así como pasaba sobre la muralla
  lexicon: HALOT
  rationale: עֹבֵר עַל־הַחֹמָה describe desplazamiento sobre la muralla. «Sobre la muralla» conserva la imagen espacial; «mientras» expresa la simultaneidad circunstancial.
- source_word: וַיַּרְא הָעָם
  english_pob_choice: the people looked
  chosen_spanish: el pueblo vio
  alternatives_spanish:
  - la gente vio
  - el pueblo miró
  lexicon: HALOT
  rationale: El hebreo usa ראה, «ver». Aunque el inglés optó por «looked» por fluidez, en español es más preciso mantener «vio», dado que el detalle visible es el foco del versículo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: «He aquí que» conserva la sorpresa o el señalamiento repentino del hebreo y corresponde al valor discursivo de הִנֵּה.
- source_word: הַשַּׂק
  english_pob_choice: sackcloth
  chosen_spanish: el cilicio
  alternatives_spanish:
  - la tela de cilicio
  - el saco
  lexicon: HALOT
  rationale: En español bíblico, «cilicio» es el equivalente usual del saco/vestidura áspera de duelo. Aunque «sackcloth» puede verterse literalmente como «tela áspera», aquí «cilicio» comunica mejor la prenda sin perder el sentido de penitencia o aflicción.
- source_word: עַל־בְּשָׂרוֹ
  english_pob_choice: on his body
  chosen_spanish: sobre su cuerpo
  alternatives_spanish:
  - sobre su carne
  - sobre su piel
  lexicon: HALOT
  rationale: בשר se refiere al cuerpo/flesh visible, pero en español «sobre su cuerpo» es claro y conserva la referencia física general sin una literalidad incómoda.
- source_word: מִבָּיִת
  english_pob_choice: underneath
  chosen_spanish: debajo
  alternatives_spanish:
  - por dentro
  - por debajo
  lexicon: HALOT
  rationale: El hebreo literalmente indica «de adentro / desde dentro», es decir, que el cilicio estaba bajo la ropa exterior. «Debajo» reproduce la relación espacial de forma breve y natural.
translation_notes:
  revision_awareness: 'La redacción sigue la estructura del hebreo y toma en cuenta el audit trail inglés: se mantiene la secuencia temporal, el gesto de rasgar los vestidos, la visibilidad del cilicio y el valor de sorpresa de הִנֵּה. Se ajustó «the people looked» a «el pueblo vio» por mayor precisión respecto de ראה.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la traducción principal solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «cilicio» para הַשַּׂק, consistente con el registro bíblico y eclesial del español, sin neutralizar el matiz de prenda de aflicción.
  - Se mantiene «pueblo» en singular colectivo para הָעָם, acorde con el hebreo y con el estilo narrativo bíblico.
