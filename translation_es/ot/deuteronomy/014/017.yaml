review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la lista coordinada de tres aves del hebreo y sigue de cerca las decisiones léxicas auditadas por la POB en inglés: הַקָּאָת = «pelícano», הָרָחָמָה = «buitre de carroña», הַשָּׁלָךְ = «cormorán». La conjunción y la omisión del marcador de objeto están bien manejadas. La única desalineación significativa está en las notas: la nota [c] omite la alternativa más específica del inglés («fishing owl») y la diluye a «ave pescadora», y la distribución de notas no preserva bien el hecho de que el inglés ancla dos notas al último término.'
  spanish_quality_summary: El texto principal es natural, claro y de registro adecuado. «Buitre de carroña» suena algo redundante en español, pero es inteligible y fiel al matiz de 'carrion vulture'; no exige corrección. Las notas son legibles, pero conviene ajustar [c] para conservar mejor la alternativa léxica documentada y hacerla más precisa en español.
  glossary_alignment: No hay términos teológicos del glosario principal en este versículo. Las decisiones zoológicas concuerdan en general con la pista auditada inglesa. Se preserva correctamente la incertidumbre léxica mediante notas, aunque una alternativa en [c] debe alinearse mejor con la documentación inglesa.
  issues:
  - severity: medium
    issue: La nota [c] traduce de forma imprecisa la alternativa inglesa 'fishing owl' como «ave pescadora».
    rationale: El inglés auditado conserva una alternativa léxica concreta, no una paráfrasis genérica. En español, «búho pescador» o «búho pescador(a)» preserva mejor la evidencia y la razón léxica documentada.
  - severity: low
    issue: El patrón de anclaje de notas del inglés coloca dos notas sobre «cormorant», mientras que el español distribuye una de esas incertidumbres solo en «buitre de carroña».
    rationale: No es un error grave, porque la nota [b] sí corresponde a הָרָחָמָה y [c] a הַשָּׁלָךְ, pero al revisar conviene mantener notas bien especificadas y plenamente alineadas con cada término.
  revised_spanish_text: el pelícano[a], el buitre de carroña[b] y el cormorán[c],
  revised_footnotes:
