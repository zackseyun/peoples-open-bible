base_translation:
  language: en
  yaml_path: translation/ot/isaiah/034/004.yaml
  text: All the host of heaven will rot away[a], and the skies will be rolled up like a scroll; all their host will wither like a leaf withers from the vine[e][d][c][b], and like a withered fig from the fig tree.
  footnotes:
  - marker: a
    text: Or 'will dissolve' for 'will rot away.' The Hebrew verb can denote wasting away, decaying, or dissolving.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the host of heaven,' a phrase that can refer to the heavenly array, especially the stars.
    reason: cultural_note
  - marker: c
    text: Or 'the heavens will be rolled up like a scroll.'
    reason: lexical_alternative
  - marker: d
    text: Literally 'all their host,' likely referring to the heavenly bodies belonging to the skies/heavens.
    reason: lexical_alternative
  - marker: e
    text: Or 'like a leaf falling from the vine, and like a fig falling from the fig tree.' The Hebrew imagery allows either emphasis on withering or on the resulting fall.
    reason: alternative_reading
