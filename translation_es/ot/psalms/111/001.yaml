translation:
  language: es
  text: ¡Alaben a Yah! Daré gracias a Yahvé con todo mi corazón, en el consejo[a] de los rectos y en la congregación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la asamblea de los rectos». El hebreo puede denotar un consejo, un círculo íntimo o una reunión congregada.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ֥לְלוּ יָ֨הּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alaben a Yah!
  alternatives_spanish:
  - ¡Aleluya!
  - ¡Alaben al SEÑOR!
  lexicon: HALOT
  rationale: El imperativo plural exige una exhortación directa en español. Se conserva la distinción entre יָהּ y יְהוָה con «Yah», siguiendo la transparencia del POB inglés y evitando colapsar ambos nombres en una sola forma litúrgica.
- source_word: אוֹדֶ֣ה
  english_pob_choice: I will give thanks
  chosen_spanish: Daré gracias
  alternatives_spanish:
  - Alabaré
  - Confesaré
  lexicon: HALOT
  rationale: En contexto de alabanza, la forma hifil comunica gratitud expresada a Dios. «Daré gracias» es natural en español y mantiene el matiz de acción personal futura.
- source_word: יְ֭הוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יהוה: «Yahvé» en el texto principal, en lugar de la sustitución por «SEÑOR». Esto conserva el nombre pactual y la distinción frente a יָהּ en el mismo versículo.'
- source_word: בְּ/כָל לֵבָ֑ב
  english_pob_choice: with my whole heart
  chosen_spanish: con todo mi corazón
  alternatives_spanish:
  - con mi corazón entero
  - de todo corazón
  lexicon: HALOT
  rationale: La expresión hebrea denota entrega total. «Con todo mi corazón» es idiomático en español y reproduce bien la idea de integridad interior.
- source_word: בְּ/ס֖וֹד
  english_pob_choice: in the council
  chosen_spanish: en el consejo
  alternatives_spanish:
  - en el círculo íntimo
  - en la asamblea
  lexicon: HALOT
  rationale: סוֹד puede significar consejo, círculo confidencial o reunión cercana. «Consejo» preserva la posible connotación deliberativa y distingue este término de עֵדָה.
- source_word: יְשָׁרִ֣ים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: «Rectos» refleja de forma directa el valor moral de יְשָׁרִים y mantiene una diferencia útil frente a otros términos de justicia o rectitud en español.
- source_word: וְ/עֵדָֽה
  english_pob_choice: and in the congregation
  chosen_spanish: y en la congregación
  alternatives_spanish:
  - y en la asamblea
  lexicon: HALOT
  rationale: עֵדָה designa una comunidad reunida. «Congregación» funciona bien en registro bíblico y conserva la distinción respecto de «consejo» para סוֹד.
theological_decisions:
- issue: Tratamiento de los dos nombres divinos en el versículo
  english_pob_reading: Render יָהּ as 'Yah' and יְהוָה as 'Yahweh'
  chosen_spanish_reading: Renderizar יָהּ como «Yah» y יְהוָה como «Yahvé»
  alternative_spanish_readings:
  - «Aleluya» / «SEÑOR»
  - «Alaben a Yah» / «Jehová»
  rationale: La decisión conserva la diferencia entre el nombre breve יָהּ y el Tetragrama יְהוָה. «Yahvé» sigue la terminología española del proyecto para el nombre pactual, mientras que «Yah» preserva la forma corta invocada al inicio del verso.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for יהוה YHWH'
translation_notes:
  revision_awareness: The English audit trail shows no applied revisions and a high-agreement review with no issues; the Spanish draft follows the same source decisions while adapting the divine-name policy to the Spanish project defaults.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «Yah» y «Yahvé» para reflejar los dos nombres divinos del verso.
  - «Consejo» y «congregación» conservan la diferencia léxica entre סוֹד y עֵדָה.
  - «Daré gracias» respeta el valor verbal de אוֹדֶה sin convertirlo en una mera alabanza general.
