translation:
  language: es
  text: En la ofrenda de la tarde[a], me levanté de mi ayuno, con mi vestidura y mi manto rasgados; me arrodillé y extendí mis manos a Yahvé mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, 'en la ofrenda de grano de la tarde'. El término hebreo suele referirse a una ofrenda de grano, aunque aquí también puede designar más generalmente el tiempo del sacrificio vespertino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְמִנְחַת הָעֶרֶב
  english_pob_choice: At the evening offering
  chosen_spanish: Al caer la tarde[a]
  alternatives_spanish:
  - En la ofrenda de la tarde
  - En la ofrenda vespertina
  - En el tiempo de la ofrenda de la tarde
  lexicon: HALOT
  rationale: מִנְחָה puede aludir a una ofrenda, pero aquí el contexto también puede señalar el momento sacrificial de la tarde. En español, 'caer la tarde' comunica con naturalidad el marco temporal; la nota preserva la posibilidad cultual más específica de 'ofrenda' o 'ofrenda vegetal/granular'.
- source_word: קַמְתִּי
  english_pob_choice: I rose
  chosen_spanish: me levanté
  alternatives_spanish:
  - me puse de pie
  - me alzé
  - me levanté de pie
  lexicon: HALOT
  rationale: קוּם expresa levantarse o ponerse en pie. 'Me levanté' es natural en español y conserva la secuencia narrativa de acción inmediata.
- source_word: מִתַּעֲנִיתִי
  english_pob_choice: from my fasting
  chosen_spanish: de mi ayuno
  alternatives_spanish:
  - de mi aflicción
  - de mi humillación
  - de mi abstinencia
  lexicon: HALOT
  rationale: תַּעֲנִית suele designar el ayuno en este tipo de contexto, aunque etimológicamente remite a aflicción/humillación. 'Ayuno' es la opción más clara y concreta en español; la alternativa 'abstinencia' es posible pero menos directa.
- source_word: וּבְקָרְעִי בִגְדִי וּמְעִילִי
  english_pob_choice: with my garment and my robe torn
  chosen_spanish: con mi ropa y mi manto rasgados
  alternatives_spanish:
  - con mi vestidura y mi manto rasgados
  - mientras mi ropa y mi manto estaban rasgados
  - con mis vestidos y mi manto rasgados
  lexicon: HALOT
  rationale: 'El hebreo presenta una circunstancia acompañante: Ezra permanece con las prendas rasgadas como señal de duelo. ''Ropa'' y ''manto'' distinguen las dos prendas sin volver la frase pesada; ''rasgados'' mantiene la imagen física y ritual.'
- source_word: וָאֶכְרְעָה עַל בִּרְכַּי
  english_pob_choice: and I fell on my knees
  chosen_spanish: me arrodillé
  alternatives_spanish:
  - caí de rodillas
  - me incliné sobre mis rodillas
  - me hincé de rodillas
  lexicon: HALOT
  rationale: כרע significa doblarse o arrodillarse. En español, 'me arrodillé' expresa el gesto de oración con sobriedad y sin añadir una caída física que el hebreo no exige.
- source_word: וָאֶפְרְשָׂה כַפַּי
  english_pob_choice: and spread out my hands
  chosen_spanish: extendí mis manos
  alternatives_spanish:
  - abrí mis manos
  - levanté mis manos
  - tendí mis manos
  lexicon: HALOT
  rationale: פרשׂ con כַּפַּיִם describe el gesto de abrir o extender las manos en oración. 'Extendí mis manos' conserva la imagen corporal con buena naturalidad en español.
- source_word: אֶל יְהוָה אֱלֹהָי
  english_pob_choice: to Yahweh my God
  chosen_spanish: a Yahvé mi Dios
  alternatives_spanish:
  - hacia Yahvé mi Dios
  - ante Yahvé mi Dios
  - a Yahvé, mi Dios
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'Se sigue la terminología del proyecto para el Tetragrámaton: ''Yahvé''. La preposición אֶל en un contexto de oración se vierte naturalmente con ''a'' en español.'
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino. Según la terminología del proyecto, se debe preservar el nombre en la traducción española como 'Yahvé', en lugar de sustituirlo por un título que lo oculte.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audit trail en inglés mantuvo la lectura óptima ''At the evening offering'' con una nota que reconoce la posibilidad más específica de ''evening grain offering''. La presente versión española conserva esa tensión: el cuerpo del texto prioriza la referencia temporal natural (''Al caer la tarde'') y la nota explica el posible matiz cultual del hebreo מִנְחָה. No se registraron revisiones aplicadas en el expediente inglés final.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה, conforme al criterio doctrinal del proyecto.
  - Se prefirió 'mi ayuno' frente a 'mi aflicción' porque el contexto narrativo es una postura de humillación expresada concretamente en ayuno.
  - '''Ropa'' y ''manto'' mantienen la distinción de בֶּגֶד y מְעִיל sin excesiva rigidez estilística.'
  - '''Me arrodillé'' preserva el gesto de oración sin sobreinterpretar ''caí de rodillas''.'
