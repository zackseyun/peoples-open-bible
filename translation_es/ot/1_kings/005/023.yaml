  - marker: b
    text: Lit. «pan para mi casa»; aquí «pan» probablemente significa alimento o provisiones para la casa real de Hiram.
    reason: lexical_alternative
  revision_rationale: Se ajustó «los recogerás» a «tú te los llevarás» para reflejar mejor תִשָּׂא y la logística del pasaje. Se mantuvo la nota sobre «pan»/«alimento». También se hizo más natural el trayecto marítimo con «por el mar» y se suavizó la cláusula final con «dando alimento».
