translation:
  language: es
  text: 'Y le dio instrucciones al primero[a], diciendo: «Cuando Esaú, mi hermano, te encuentre y te pregunte: “¿A quién perteneces[b], y adónde vas, y a quién pertenecen estos delante de ti[c]?”...»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y dio órdenes al primero». צוה puede traducirse como dar instrucciones, dar órdenes o mandar; aquí se eligió una forma natural en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿de quién eres?». La pregunta hebrea usa una fórmula de pertenencia o posesión; «¿a quién perteneces?» expresa bien ese matiz.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «delante de ti». En este contexto, la expresión se refiere a lo que precede al mensajero, probablemente el ganado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: And he commanded
  chosen_spanish: Y le dio instrucciones
  alternatives_spanish:
  - Y mandó
  - Y ordenó
  lexicon: HALOT
  rationale: צוה puede expresar mandar o instruir. En español, «dio instrucciones» conserva el sentido directivo de Jacob sin sonar excesivamente militar o rígido para este contexto narrativo.
- source_word: הָרִאשׁוֹן
  english_pob_choice: the first one
  chosen_spanish: al primero
  alternatives_spanish:
  - al primero de ellos
  - al primer hombre
  lexicon: HALOT
  rationale: El sustantivo implícito designa al primero del grupo. «Al primero» es natural en español y no añade ‘siervo’ ni otro sustantivo que el hebreo no menciona en este versículo.
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: Aquí introduce una situación anticipada, no meramente hipotética. «Cuando» sigue la decisión del POB en inglés y refleja mejor la expectativa de Jacob.
- source_word: יִפְגָּשְׁךָ
  english_pob_choice: meets you
  chosen_spanish: te encuentre
  alternatives_spanish:
  - te encuentre por casualidad
  - te salga al encuentro
  lexicon: HALOT
  rationale: פגשׁ significa encontrar o salir al encuentro. «Te encuentre» es fiel y funciona bien en una cláusula subordinada de anticipación.
- source_word: עֵשָׂו אָחִי
  english_pob_choice: Esau my brother
  chosen_spanish: Esaú, mi hermano
  alternatives_spanish:
  - mi hermano Esaú
  lexicon: HALOT
  rationale: Mantengo el apóstrofe explicativo de la relación familiar. El orden hebreo se puede reproducir con coma en español sin perder naturalidad.
- source_word: וִשְׁאֵלְךָ
  english_pob_choice: and asks you
  chosen_spanish: y te pregunte
  alternatives_spanish:
  - y te pida cuenta
  - y te interrogue
  lexicon: HALOT
  rationale: שׁאל aquí es pedir información. En subordinación con «cuando», el subjuntivo español es natural y comunica la consulta futura sin sobrecargar el estilo.
- source_word: לְמִי אַתָּה
  english_pob_choice: To whom do you belong
  chosen_spanish: ¿A quién perteneces?
  alternatives_spanish:
  - ¿De quién eres?
  - ¿A quién perteneces tú?
  lexicon: HALOT
  rationale: El hebreo pregunta por pertenencia/posesión. «¿A quién perteneces?» refleja con más precisión la fuerza relacional y de pertenencia que «¿de quién eres?».
- source_word: וְאָ֣נָה תֵלֵ֔ךְ
  english_pob_choice: and where are you going
  chosen_spanish: y adónde vas
  alternatives_spanish:
  - y hacia dónde vas
  - y a dónde te diriges
  lexicon: HALOT
  rationale: אָנָה pide destino y הלך expresa movimiento. «Adónde vas» es idiomático y mantiene la sencillez del hebreo.
- source_word: וּלְמִי אֵלֶּה לְפָנֶיךָ
  english_pob_choice: and to whom do these before you belong
  chosen_spanish: y de quién son estos que van delante de ti
  alternatives_spanish:
  - y a quién pertenecen estos que van delante de ti
  - y de quién son estos ante ti
  lexicon: HALOT
  rationale: El hebreo pregunta por la pertenencia de los animales que están «delante de ti». «Que van delante de ti» conserva la imagen espacial y resulta más claro en español que una traducción más literal, sin perder el matiz de posesión.
translation_notes:
  revision_awareness: El inglés auditado fue revisado para hacer más natural la secuencia y para explicitar la pregunta de pertenencia con “to whom do you belong”, además de usar puntos suspensivos porque la cita continúa en el versículo siguiente. La versión española sigue esa línea, pero adapta la sintaxis a un español fluido y conserva la apertura de la cita con suspensión final.
  spanish_consistency_notes:
  - Se usa «Esaú» y no un equivalente traducido del nombre, conforme al texto fuente.
  - Se mantiene la referencia de pertenencia con verbos y preposiciones que expresan relación/posesión, sin suavizarla a una mera pregunta de identidad.
  - La cita termina con puntos suspensivos para indicar que el discurso continúa en el versículo siguiente.
  - Se evita introducir «siervo» o «ganado» en el texto principal, porque no aparecen explícitamente en este versículo.
