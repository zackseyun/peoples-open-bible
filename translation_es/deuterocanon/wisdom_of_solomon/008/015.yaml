  text: Fearsome tyrants will fear me when they hear[a]; among the multitude I will appear good[b], and in war courageous.
  footnotes:
  - marker: a
    text: Or 'fearsome tyrants.' The Greek adjective may describe the tyrants themselves as dreadful, not merely that they will become frightened.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will be seen as noble/beneficent among the multitude.' The Greek ἀγαθός can suggest practical goodness in public leadership, not only moral goodness in the abstract.
