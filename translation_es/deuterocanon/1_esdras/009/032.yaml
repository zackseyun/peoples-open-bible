translation:
  language: es
  text: 'Y de los hijos de Annán[a]: Eliodas, Asaías, Melquías, Sabbaias y Simón Chosamaus.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos nombres de esta lista tienen equivalentes paralelos en las tradiciones hebreas de Esdras/Nehemías (por ejemplo, Annán/Hanán; Sabbaias/Shabetai). El texto principal sigue la forma griega de 1 Esdras, y los paralelos hebreos se usan solo como verificación.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Entonces
  lexicon: LSJ
  rationale: Conecta la entrada con la lista previa sin añadir matiz; en español, 'Y' conserva el flujo enumerativo del griego.
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: from the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - entre los hijos de
  - de entre los hijos de
  lexicon: LSJ
  rationale: La construcción genealógica se expresa naturalmente en español como pertenencia al grupo familiar. 'De los hijos de' reproduce la relación del griego sin sobreexplicar.
- source_word: Ἀννὰν
  english_pob_choice: Annan
  chosen_spanish: Annán
  alternatives_spanish:
  - Annan
  - Hanan
  lexicon: LSJ
  rationale: Se mantiene la forma griega como base del texto principal, con acento gráfico español para pronunciación. La tradición hebrea paralela Hanan se documenta como variante, no como sustitución del texto fuente.
- source_word: Ἐλιωδὰς
  english_pob_choice: Eliodas
  chosen_spanish: Eliodas
  alternatives_spanish:
  - Eliodás
  lexicon: LSJ
  rationale: Nombre propio transliterado de manera cercana al griego; se conserva la forma simple y transparente del audit trail inglés.
- source_word: Ἀσαίας
  english_pob_choice: Asaiah
  chosen_spanish: Asaías
  alternatives_spanish:
  - Asaiah
  - Asaias
  lexicon: LSJ
  rationale: El final griego -ίας suele corresponder de forma natural al patrón español -ías en nombres bíblicos. Así se preserva la audibilidad semítica sin depender de una ortografía inglesa.
- source_word: Μελχείας
  english_pob_choice: Melchiah
  chosen_spanish: Melquías
  alternatives_spanish:
  - Melchías
  - Melquiah
  lexicon: LSJ
  rationale: La secuencia griega refleja un nombre semítico afín a formas con -q/-k y final -iah. 'Melquías' ofrece una transliteración española inteligible y bíblicamente reconocible, sin imponer la paralela hebrea como forma principal.
- source_word: Σαββαίας
  english_pob_choice: Sabbaias
  chosen_spanish: Sabaías
  alternatives_spanish:
  - Sabbaias
  - Shabbethai
  lexicon: LSJ
  rationale: Se preserva la forma griega con una adaptación ortográfica española fluida. La equivalente hebrea tradicional se deja como alternativa documentada, no como reemplazo del testimonio griego.
- source_word: Σίμων
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simon
  lexicon: LSJ
  rationale: Nombre propio bíblico estándar en español, directamente correspondiente al griego Σίμων.
- source_word: Χοσάμαος
  english_pob_choice: Chosamaus
  chosen_spanish: Chosamao
  alternatives_spanish:
  - Hosamao
  - Chosamais
  lexicon: LSJ
  rationale: Nombre propio difícil y de control externo limitado; se translitera de manera cercana al griego, usando una forma española transparente que evite armonizaciones no sustentadas.
translation_notes:
  revision_awareness: 'El pasaje revisado no requería cambios sustanciales según el último pase: la concordancia con el griego de Swete 1909 es alta y la lista nominal se mantiene estable. Se conservó la política de anclar el texto principal en la forma griega, usando los paralelos hebreos únicamente como control secundario.'
  spanish_consistency_notes:
  - Se mantuvo 'Annán' como forma principal con nota de paralelo hebreo, siguiendo el audit trail inglés.
  - Se optó por transliteraciones españolas estables y legibles para los nombres propios, evitando sustituirlos por formas hebreas cuando el griego es la fuente primaria.
  - No hay decisiones teológicas de contenido; el versículo es una lista genealógica nominal.
