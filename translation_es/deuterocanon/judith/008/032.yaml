translation:
  language: es
  text: 'Y Judit les dijo: «Escúchenme[a], y yo haré una acción[b] que llegará hasta generaciones de generaciones entre los hijos de nuestro pueblo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Óiganme».
    reason: lexical_alternative
  - marker: b
    text: O «un hecho» o «una cosa». El griego πρᾶγμα aquí apunta a una acción concreta.
    reason: lexical_alternative
  - marker: c
    text: Lit. «los hijos de nuestro pueblo». El griego dice «hijos/sons», que puede funcionar colectivamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσατέ
  english_pob_choice: Listen
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Háganme caso
  - Oiganme
  - Escuchen
  lexicon: BDAG
  rationale: El imperativo de ἀκούω aquí pide una atención obediente o receptiva. «Escúchenme» es natural en español moderno y conserva la fuerza directa del mandato mejor que un calco más arcaico.
- source_word: ποιήσω
  english_pob_choice: I will do
  chosen_spanish: haré
  alternatives_spanish:
  - haré una cosa
  - realizaré
  - haré
  lexicon: BDAG
  rationale: El futuro de ποιέω en este contexto introduce una acción concreta de Judit. «Haré» es la forma más sobria y fiel en español, sin sobrecargar el verbo con matices no exigidos por el griego.
- source_word: πρᾶγμα
  english_pob_choice: a deed
  chosen_spanish: una obra
  alternatives_spanish:
  - un hecho
  - una acción
  - un asunto
  lexicon: BDAG
  rationale: πρᾶγμα puede ser cosa, asunto, acto o hecho. Como Judit anuncia una acción significativa que tendrá alcance duradero, «una obra» comunica bien una acción intencional y de peso, sin especificar más de lo que el texto da.
- source_word: ἀφίξεται
  english_pob_choice: will reach
  chosen_spanish: llegará
  alternatives_spanish:
  - alcanzará
  - vendrá hasta
  - se extenderá hasta
  lexicon: BDAG
  rationale: El verbo sugiere llegar o alcanzar. En español, «llegará» con «hasta generaciones de generaciones» transmite de manera natural el alcance duradero del efecto, evitando una construcción pesada.
- source_word: εἰς γενεὰς γενεῶν
  english_pob_choice: to generations of generations
  chosen_spanish: hasta generaciones de generaciones
  alternatives_spanish:
  - por generaciones
  - de generación en generación
  - a generaciones de generaciones
  lexicon: LEH
  rationale: La expresión es idiomática y marca duración prolongada. «Hasta generaciones de generaciones» conserva la reiteración del griego y sugiere el efecto que se extiende sucesivamente en el tiempo.
- source_word: υἱοῖς
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos varones de
  - los descendientes de
  - la descendencia de
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «hijos/sons», en español «los hijos de» mantiene el término explícito y puede funcionar colectivamente. Dado que el contexto lo usa como designación grupal, se conserva sin neutralizarlo a una forma no marcada.
- source_word: τοῦ γένους ἡμῶν
  english_pob_choice: our people
  chosen_spanish: nuestro pueblo
  alternatives_spanish:
  - nuestra raza
  - nuestra familia
  - nuestro linaje
  lexicon: BDAG
  rationale: γένος aquí refiere al grupo de parentesco o pueblo. «Nuestro pueblo» es natural, claro y evita connotaciones modernas problemáticas de «raza», manteniendo el sentido colectivo.
theological_decisions:
- issue: Expresión masculina colectiva en υἱοῖς τοῦ γένους ἡμῶν
  english_pob_reading: the sons of our people
  chosen_spanish_reading: los hijos de nuestro pueblo
  alternative_spanish_readings:
  - los descendientes de nuestro pueblo
  - los hijos y las hijas de nuestro pueblo
  rationale: El griego usa un plural masculino explícito. En español, «los hijos» conserva la forma del texto y puede funcionar de modo colectivo en este contexto, sin borrar la tensión entre la forma gramatical masculina y el alcance grupal.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la frase temporal a una forma más literal («generations of generations») y cambió la referencia colectiva a «children of our people» por una lectura más amplia. La versión española conserva la literalidad de la repetición temporal y mantiene «los hijos de nuestro pueblo» para reflejar la forma masculina explícita del griego y su sentido colectivo.
  spanish_consistency_notes:
  - Se mantiene «Judit» para Ἰουδεὶθ.
  - Se usa «nuestro pueblo» para γένος en sentido colectivo/étnico.
  - Se preserva la repetición enfática de «generaciones de generaciones» sin suavizarla a una equivalencia más idiomática.
  - No se introduce «Mesías», «Yahvé» ni otros términos no presentes en el pasaje.
