translation:
  language: es
  text: 'Esta será la ley para la persona con afección leprosa[a] en el día de su purificación: será llevada al sacerdote.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: מְצֹרָע, término tradicionalmente vertido «leproso», pero que refiere a una condición asociada con צָרַעַת y no necesariamente a la lepra moderna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This
  chosen_spanish: Esta
  alternatives_spanish:
  - Esto
  lexicon: HALOT
  rationale: El demostrativo femenino singular introduce la norma ritual y concuerda con תּוֹרַת, por eso en español se naturaliza como «Esta». Mantiene el valor de apertura legal del hebreo sin añadir elementos.
- source_word: תִּהְיֶה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  lexicon: HALOT
  rationale: En formulación legal española, el futuro simple comunica bien el valor prescriptivo del hebreo imperfecto. «Será» conserva el tono normativo sin volverlo demasiado rígido o arcaico.
- source_word: תּוֹרַת
  english_pob_choice: the law for
  chosen_spanish: la ley para el
  alternatives_spanish:
  - la instrucción para el
  - la regulación para el
  lexicon: HALOT
  rationale: Aquí תּוֹרָה designa la disposición ritual concreta, no la Torá como conjunto abstracto. «Ley» es el equivalente más natural y reconoce la función normativa del pasaje.
- source_word: הַמְּצֹרָע
  english_pob_choice: the leprous person
  chosen_spanish: el hombre afligido por צָרַעַת
  alternatives_spanish:
  - el leproso
  - la persona con afección cutánea
  lexicon: HALOT
  rationale: La POB inglesa evita identificar sin más el término con la lepra moderna. En español, «afligido por צָרַעַת» conserva la tensión lexical y evita una equivalencia médica demasiado precisa. Se añade «hombre» porque el sustantivo masculino con artículo funciona como designación personal en este contexto ritual.
- source_word: בְּיוֹם
  english_pob_choice: on the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - cuando
  - el día de
  lexicon: HALOT
  rationale: La expresión temporal hebrea se refleja de manera directa. «En el día de» es claro, idiomático y mantiene la estructura del original.
- source_word: טָהֳרָתוֹ
  english_pob_choice: his cleansing
  chosen_spanish: su purificación
  alternatives_spanish:
  - su limpieza ritual
  - su purificación ritual
  lexicon: HALOT
  rationale: El contexto es de restauración ritual, y «purificación» expresa mejor ese valor que «limpieza» en español. «Su» conserva la referencia posesiva del sufijo pronominal.
- source_word: וְהוּבָא
  english_pob_choice: he shall be brought
  chosen_spanish: será llevado
  alternatives_spanish:
  - y será llevado
  - será traído
  lexicon: HALOT
  rationale: La pasiva causativa hebrea se expresa con naturalidad como «será llevado». «Traído» sería posible, pero en español suena menos idiomático en una instrucción ritual de desplazamiento hacia una autoridad cultual.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote oficiante
  - al sacerdote
  lexicon: HALOT
  rationale: La POB inglesa conserva «the priest» como figura concreta. En español, «sacerdote» es el equivalente bíblico claro y natural; el artículo definido queda incorporado en la contracción «al».
theological_decisions:
- issue: Cómo traducir מְצֹרָע sin reducirlo a la lepra moderna
  english_pob_reading: the leprous person
  chosen_spanish_reading: el hombre afligido por צָרַעַת
  alternative_spanish_readings:
  - el leproso
  - la persona con afección cutánea
  rationale: El término hebreo designa una condición ritual asociada a צָרַעַת, no necesariamente la lepra médica moderna. La redacción elegida preserva esa tensión, evita una identificación clínica indebida y mantiene el vínculo con la tradición bíblica sin convertirlo en diagnóstico médico.
  doctrine_reference: Consistencia terminológica y primacía del texto original; evitar equivalencias anacrónicas en vocabulario ritual.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene alta concordancia con el hebreo y no registra revisiones aplicadas. El español sigue esa línea, conservando la estructura legal del versículo y la distinción lexical de מְצֹרָע sin introducir interpretaciones médicas modernas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en la tradición general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «sacerdote» para כֹּהֵן por ser el término bíblico natural en español; no hay razón aquí para «cura» o «presbítero».
  - La nota al pie marca la tensión semántica de מְצֹרָע para no perder la precisión del término hebreo.
