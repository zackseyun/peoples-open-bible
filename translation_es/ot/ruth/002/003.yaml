translation:
  language: es
  text: Así que ella fue, vino y espigó en el campo detrás de los segadores; y por casualidad[a] llegó a la parte del campo que pertenecía a Booz, quien era de la familia de Elimélec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y le sucedió su casualidad»; es un giro idiomático que expresa aparente azar desde la perspectiva humana, mientras el libro en conjunto invita a percibir la providencia de Dios.'
    reason: theological_note
lexical_decisions:
- source_word: וַתֵּלֶךְ
  english_pob_choice: she went
  chosen_spanish: ella fue
  alternatives_spanish:
  - ella fue andando
  - ella se fue
  lexicon: HALOT
  rationale: הלך en este movimiento narrativo simple se expresa con naturalidad en español como «fue», conservando la secuencia del wayyiqtol sin añadir matices no presentes.
- source_word: וַתָּבוֹא
  english_pob_choice: and came
  chosen_spanish: y vino
  alternatives_spanish:
  - y llegó
  - y arribó
  lexicon: HALOT
  rationale: בוא mantiene la progresión narrativa; «vino» reproduce bien el encadenamiento verbal del hebreo y evita una paráfrasis más explicativa.
- source_word: וַתְּלַקֵּט
  english_pob_choice: and gleaned
  chosen_spanish: y espigó
  alternatives_spanish:
  - y recogió las espigas
  - y juntó lo que quedaba
  lexicon: HALOT
  rationale: לקט en este contexto agrícola es el acto técnico de recoger espigas sobrantes; «espigó» es el término español preciso y breve para «gleaned».
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el terreno
  - en la parcela
  lexicon: HALOT
  rationale: שׂדה se traduce de forma directa por «campo» en español bíblico contemporáneo; aquí mantiene la referencia agrícola común sin forzar precisión técnica.
- source_word: אַחֲרֵי הַקֹּצְרִים
  english_pob_choice: behind the reapers
  chosen_spanish: detrás de los segadores
  alternatives_spanish:
  - tras los segadores
  - siguiendo a los segadores
  lexicon: HALOT
  rationale: אַחֲרֵי expresa posición espacial en la escena de espiga; «detrás de los segadores» comunica con claridad la relación espacial sin perder el trasfondo agrícola.
- source_word: וַיִּקֶר מִקְרֶהָ
  english_pob_choice: she happened to come
  chosen_spanish: y por casualidad llegó
  alternatives_spanish:
  - y sucedió que llegó
  - y le tocó llegar
  lexicon: HALOT
  rationale: El giro verbal + sustantivo expresa un acontecimiento que parece fortuito desde la perspectiva humana. «Por casualidad» conserva esa lectura aparente sin resolverla en el texto principal.
- source_word: חֶלְקַת הַשָּׂדֶה
  english_pob_choice: the portion of the field
  chosen_spanish: al terreno del campo
  alternatives_spanish:
  - a la parcela del campo
  - a la porción del campo
  lexicon: HALOT
  rationale: חֶלְקָה es un lote o porción de tierra; «terreno del campo» funciona naturalmente en español y mantiene la idea de una subdivisión concreta del campo.
- source_word: לְבֹעַז
  english_pob_choice: belonging to Boaz
  chosen_spanish: que era de Booz
  alternatives_spanish:
  - que pertenecía a Booz
  - de Booz
  lexicon: HALOT
  rationale: El ל de posesión/relación se expresa de forma idiomática como pertenencia o adscripción. «Que era de Booz» es sobrio y evita sobreexplicar el vínculo.
- source_word: אֲשֶׁר מִמִּשְׁפַּחַת אֱלִימֶלֶךְ
  english_pob_choice: who was from the family of Elimelech
  chosen_spanish: quien era de la familia de Elimélec
  alternatives_spanish:
  - quien pertenecía a la familia de Elimélec
  - de la casa de Elimélec
  lexicon: HALOT
  rationale: מִשְׁפָּחָה aquí designa la unidad familiar amplia; «familia» es el equivalente más accesible y fiel, sin cargarlo de un matiz antropológico innecesario.
theological_decisions:
- issue: Tensión entre aparente casualidad y providencia
  english_pob_reading: 'Render the idiom in ordinary terms of apparent happenstance: ''she happened to come'''
  chosen_spanish_reading: 'Traducir el giro como acontecimiento aparentemente casual: «por casualidad llegó»'
  alternative_spanish_readings:
  - «sucedió que llegó»
  - «le tocó llegar»
  - «vino a dar»
  rationale: El hebreo presenta el hecho desde la perspectiva humana como algo fortuito; la trama mayor del libro sugiere providencia sin enunciarla aquí. La versión española conserva esa tensión en vez de resolverla explícitamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios sustanciales en el pasaje; la formulación española mantiene el ritmo narrativo, el valor técnico de לקט y la tensión entre casualidad aparente y providencia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «Booz» para el nombre propio, siguiendo la grafía española habitual y consistente.
  - «Espigó» preserva el término técnico agrícola equivalente a «gleaned», evitando una paráfrasis más larga.
  - La frase de causalidad aparente se conserva sin añadir explícitamente «providencia» en el texto principal.
