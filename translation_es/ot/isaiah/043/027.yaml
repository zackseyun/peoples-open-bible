translation:
  language: es
  text: Tu primer padre[a] pecó, y tus mediadores[b] transgredieron contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu más antiguo antepasado pecó». La frase hebrea puede referirse de manera colectiva o representativa al ancestro principal del pueblo.
    reason: lexical_alternative
  - marker: b
    text: O «tus intérpretes» o «tus representantes». El término hebreo puede designar a quienes hablan en nombre de otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבִיךָ
  english_pob_choice: your first father
  chosen_spanish: tu primer padre
  alternatives_spanish:
  - tu padre
  - tu primer antepasado
  - tu ancestro primero
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo con sufijo de 2.ª persona y un adjetivo que señala prioridad temporal o anterioridad. «Padre» conserva la imagen del texto, y «primer» mantiene la ambigüedad del referente sin identificarlo indebidamente.
- source_word: הָרִאשׁוֹן
  english_pob_choice: first
  chosen_spanish: primer
  alternatives_spanish:
  - primero
  - anterior
  - más antiguo
  lexicon: HALOT
  rationale: «Primer» es la forma natural en español ante sustantivo y reproduce la idea de lo primero o más antiguo sin cerrar la referencia histórica.
- source_word: חָטָא
  english_pob_choice: sinned
  chosen_spanish: pecó
  alternatives_spanish:
  - cometió pecado
  - faltó
  - erró
  lexicon: HALOT
  rationale: En contexto moral y profético, «pecó» es una equivalencia directa, clara y digna en español, sin atenuar la culpa expresada por el verbo hebreo.
- source_word: מְלִיצֶיךָ
  english_pob_choice: your mediators
  chosen_spanish: tus mediadores
  alternatives_spanish:
  - tus intérpretes
  - tus voceros
  - tus representantes
  lexicon: HALOT
  rationale: El término puede designar personas que hablan o actúan en nombre de otros. «Mediadores» sigue la revisión inglesa más reciente y conserva el matiz de representación ante otra parte, sin restringirlo a una función técnica específica.
- source_word: פָּשְׁעוּ
  english_pob_choice: transgressed
  chosen_spanish: transgredieron
  alternatives_spanish:
  - se rebelaron
  - prevaricaron
  - rompieron el pacto
  lexicon: HALOT
  rationale: «Transgredieron» mantiene el registro formal y la fuerza de infracción voluntaria. En español conserva mejor la relación con פשע que un término más general como «pecaron».
- source_word: בִי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - frente a mí
  - en mi contra
  lexicon: HALOT
  rationale: Con פָּשַׁע, la preposición expresa oposición relacional; «contra mí» comunica de forma natural el sentido adversativo del hebreo.
theological_decisions:
- issue: Identidad de «tu primer padre»
  english_pob_reading: Rendered generically as 'your first father' without identifying the referent.
  chosen_spanish_reading: Se mantiene «tu primer padre» sin identificar si se trata de Adán, Abraham, Jacob u otro antepasado principal.
  alternative_spanish_readings:
  - Adán
  - Abraham
  - Jacob
  - tu primer antepasado
  rationale: El hebreo no nombra al referente, y el español debe preservar esa tensión interpretativa en vez de resolverla por cuenta propia. La redacción deja abierta la lectura histórica o representativa.
  doctrine_reference: Preservar la tensión exegética sin sobreespecificar el referente.
- issue: Intensidad de פָּשְׁעוּ
  english_pob_reading: '''transgressed'' in a formal register, after a prior revision from ''rebelled''.'
  chosen_spanish_reading: Se refleja con «transgredieron», sin eliminar el matiz de rebelión o ruptura de pacto que puede oírse en el hebreo.
  alternative_spanish_readings:
  - se rebelaron
  - quebrantaron
  - faltaron gravemente
  rationale: El español puede expresar la infracción jurídica o moral de forma más directa con «transgredieron», mientras que una nota semántica conserva el trasfondo de rebelión covenantal.
  doctrine_reference: Mantener la fuerza moral/covenantal del término sin forzar una sola glosa.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'your spokesmen rebelled' a 'your mediators transgressed' para acercarse más a מְלִיצֶיךָ y פָּשְׁעוּ. La redacción española sigue esa última decisión, pero ajusta el verbo a un equivalente natural en español ('transgredieron') y mantiene la ambigüedad del primer padre sin nombrar un referente específico.
  spanish_consistency_notes:
  - Se usa «tu»/«tus» de forma coherente con el segundo singular del hebreo.
  - Se mantiene el registro bíblico formal sin caer en arcaísmos innecesarios.
  - «Mediadores» conserva la función representativa documentada por el audit trail y evita imponer una sola lectura institucional.
  - No se introduce «Mesías», «SEÑOR» ni otros equivalentes no pertinentes a este versículo.
