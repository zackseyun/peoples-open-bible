translation:
  language: es
  text: Al sur pertenecía a Efraín, y al norte a Manasés; el mar era su límite. Por el norte colindaba[a] con Aser, y por el oriente con Isacar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegaba hasta Aser por el norte y hasta Isacar por el oriente». El verbo hebreo puede traducirse «encontrarse con», «tocar» o «colindar con» en descripciones territoriales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגְבָּה
  english_pob_choice: Southward
  chosen_spanish: Al sur
  alternatives_spanish:
  - Hacia el sur
  - Del lado sur
  lexicon: HALOT
  rationale: La forma direccional indica el lado meridional del reparto territorial. En español, «Al sur» mantiene la concisión y el paralelismo de lista de límites sin sonar forzado.
- source_word: לְאֶפְרַיִם
  english_pob_choice: it belonged to Ephraim
  chosen_spanish: pertenecía a Efraín
  alternatives_spanish:
  - era para Efraín
  - se asignaba a Efraín
  lexicon: HALOT
  rationale: En este contexto de delimitación, ל expresa asignación o pertenencia territorial. «Pertenecía a» conserva esa fuerza posesiva sin añadir una paráfrasis innecesaria.
- source_word: וְצָפוֹנָה
  english_pob_choice: and northward
  chosen_spanish: y al norte
  alternatives_spanish:
  - y hacia el norte
  - y del lado norte
  lexicon: HALOT
  rationale: Es el correlato direccional de «al sur». La construcción breve funciona naturalmente en español y conserva el estilo telegráfico del hebreo.
- source_word: לִמְנַשֶּׁה
  english_pob_choice: to Manasseh
  chosen_spanish: a Manasés
  alternatives_spanish:
  - para Manasés
  - pertenecía a Manasés
  lexicon: HALOT
  rationale: Se mantiene la misma relación territorial de asignación expresada por ל. No se repite «pertenecía» para evitar una redundancia ajena al hebreo elíptico.
- source_word: וַיְהִי הַיָּם גְּבוּלוֹ
  english_pob_choice: and the sea was its border
  chosen_spanish: el mar era su límite
  alternatives_spanish:
  - y el mar era su frontera
  - y el mar fue su límite
  lexicon: HALOT
  rationale: גְּבוּל en descripciones de territorio se entiende bien como «límite» o «frontera». «Límite» suena más natural en español bíblico actual y refleja el valor geográfico del término.
- source_word: וּבְאָשֵׁר יִפְגְּעוּן
  english_pob_choice: they reached Asher
  chosen_spanish: colindaba con Aser
  alternatives_spanish:
  - tocaba a Aser
  - llegaba hasta Aser
  - se encontraba con Aser
  lexicon: HALOT
  rationale: פגע en fórmulas de fronteras puede significar «encontrarse con», «tocar» o «colindar con». «Colindaba con» expresa claramente la relación de contacto territorial que el POB documenta en la nota alternativa.
- source_word: מִצָּפוֹן
  english_pob_choice: on the north
  chosen_spanish: al norte
  alternatives_spanish:
  - por el norte
  - del lado norte
  lexicon: HALOT
  rationale: La preposición marca el lado adyacente de la frontera. «Al norte» es la manera más natural de expresar esa ubicación en español.
- source_word: וּבְיִשָּׂשכָר
  english_pob_choice: and on the east Issachar
  chosen_spanish: y al oriente con Isacar
  alternatives_spanish:
  - y al este con Isacar
  - y colindaba con Isacar
  lexicon: HALOT
  rationale: Se conserva la elipsis verbal del hebreo y la dirección correspondiente. «Oriente» es una opción digna y ampliamente inteligible; se prefiere aquí por su registro bíblico y su claridad.
- source_word: מִמִּזְרָח
  english_pob_choice: on the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - al este
  - por el oriente
  lexicon: HALOT
  rationale: La forma indica el lado oriental en la descripción de frontera. «Al oriente» mantiene el paralelismo con «al norte» y evita la repetición de «este» como sustantivo direccional.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el tenor del texto hebreo y el criterio del POB en inglés: cláusulas direccionales breves, posesión territorial expresada con pertenencia/asignación, y un verbo de frontera que admite más de una solución legítima. Se integra la nota alternativa sobre פגע sin ampliar el contenido del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Efraín», «Manasés», «Aser» e «Isacar» como formas españolas establecidas de los topónimos tribales.
  - «Al norte / al oriente» conserva el paralelismo direccional del hebreo sin introducir términos explicativos adicionales.
  - La nota al pie preserva la tensión lexical de פגע que el POB inglés documenta, sin forzar una sola interpretación exclusiva.
