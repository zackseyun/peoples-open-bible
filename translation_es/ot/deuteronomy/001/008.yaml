  to: Mira[a], yo he puesto la tierra delante de ustedes. Entren y tomen posesión[b] de la tierra que Yahvé juró a sus padres[c] —a Abraham, a Isaac y a Jacob— para dársela a ellos y a su descendencia[d] después de ellos.
  rationale: Se conserva el sentido del borrador, pero se añaden las notas necesarias para reflejar plenamente el rastro de auditoría inglés y las alternativas exegéticamente relevantes. Además, se pule la cláusula final con 'para dársela' para mejorar la fluidez del español sin alejarse del hebreo.
