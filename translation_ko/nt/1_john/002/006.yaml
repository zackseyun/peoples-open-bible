  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ λέγων ἐν αὐτῷ μένειν ὀφείλει καθὼς ἐκεῖνος περιεπάτησεν καὶ ⸀αὐτὸς περιπατεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/006.yaml
  text: The one who says he remains in him ought also to walk just as that one walked[a][b][c].
  footnotes:
  - marker: a
    text: Or 'abides in him.' The Greek verb μένω is a key Johannine term for continuing, remaining, or abiding in relationship.
    reason: lexical_alternative
  - marker: b
    text: '''That one'' refers to Jesus and preserves the emphatic demonstrative force of the Greek; many translations simply read ''he.'''
    reason: alternative_reading
  - marker: c
    text: '''Walk'' is a biblical metaphor for one''s manner of life; that is, one ought to live as Jesus lived.'
    reason: cultural_note
translation:
  language: ko
  text: 그분 안에 머문다고 말하는 사람은 그분이 걸으셨던 그대로 자기도 걸어가야 합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μένειν
  english_pob_choice: remains
  chosen_korean: 머문다
  alternatives_korean:
  - 거한다
  - 있다
  lexicon: BDAG
  rationale: μένω는 1 요한서의 핵심어 — 지속적 거함. 「머물다」가 한국어에서 그 지속의 함의를 자연스럽게 담는다.
- source_word: ἐκεῖνος
  english_pob_choice: that one
  chosen_korean: 그분
  alternatives_korean:
  - 그 사람
  - 그분이신 분
  lexicon: BDAG
  rationale: 원지시대명사로 예수를 가리킨다. 「그분」으로 존칭하여 인격적 지시를 분명히 한다.
