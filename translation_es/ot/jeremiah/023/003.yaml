translation:
  language: es
  text: Y yo mismo reuniré el remanente de mi rebaño de todas las tierras adonde los he expulsado[a], y los haré volver a sus pastos[b]; y serán fecundos y se multiplicarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adonde los he dispersado». El verbo hebreo puede denotar hacer que alguien sea echado o dispersado; «he expulsado» se eligió para preservar mejor la fuerza del juicio divino.
    reason: lexical_alternative
  - marker: b
    text: O «a sus apriscos» o «a su morada». El término hebreo puede referirse a pasto, lugar de descanso o habitación; «pastos» encaja mejor con la imagen del rebaño.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And I myself
  chosen_spanish: Y yo mismo
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; «yo mismo» conserva ese énfasis de manera natural en español. La conjunción inicial se mantiene como «Y» según el flujo del contexto.
- source_word: אֲקַבֵּץ
  english_pob_choice: will gather
  chosen_spanish: reuniré
  alternatives_spanish:
  - juntaré
  - agruparé
  lexicon: HALOT
  rationale: En contexto de restauración, קבץ expresa reunir a los dispersados. «Reuniré» es natural en español y comunica la acción de convocar de nuevo al rebaño.
- source_word: שְׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el resto
  - los sobrevivientes
  lexicon: HALOT
  rationale: «Remanente» es el término profético establecido en español y conserva el matiz teológico de un grupo preservado tras el juicio.
- source_word: צֹאנִי
  english_pob_choice: my flock
  chosen_spanish: mis ovejas
  alternatives_spanish:
  - mi rebaño
  lexicon: HALOT
  rationale: Aunque el sustantivo puede ser colectivo, aquí el contexto pastoral hace explícitas las ovejas; «mis ovejas» mantiene la imagen y es claro en español. Se conserva la relación de posesión divina.
- source_word: מִכֹּל הָאֲרָצוֹת
  english_pob_choice: out of all the lands
  chosen_spanish: de todas las tierras
  alternatives_spanish:
  - de todos los países
  - de todas las naciones
  lexicon: HALOT
  rationale: «Tierras» reproduce mejor el campo semántico de אֲרָצוֹת en lenguaje profético sin imponer una equivalencia moderna demasiado específica.
- source_word: הִדַּחְתִּי
  english_pob_choice: I have driven
  chosen_spanish: he dispersado
  alternatives_spanish:
  - he arrojado
  - he expulsado
  lexicon: HALOT
  rationale: El hebreo puede implicar ser echados o dispersados. En español, «he dispersado» mantiene la tensión del juicio divino y resulta idiomático; se reserva la fuerza de expulsión mediante la nota alternativa.
- source_word: וַהֲשִׁבֹתִי
  english_pob_choice: I will bring them back
  chosen_spanish: las haré volver
  alternatives_spanish:
  - las devolveré
  - las restituiré
  lexicon: HALOT
  rationale: La forma causativa de שוב expresa hacer regresar. «Las haré volver» conserva el movimiento concreto y el agente divino.
- source_word: עַל נְוֵיהֶן
  english_pob_choice: to their pasture
  chosen_spanish: a sus pastos
  alternatives_spanish:
  - a sus apriscos
  - a su morada
  lexicon: HALOT
  rationale: נָוֶה puede referirse a pasto, redil o lugar de descanso. En una imagen de rebaño, «pastos» integra bien el campo pastoril en español. Se usa «a» por la idiomaticidad de destino.
- source_word: וּפָרוּ
  english_pob_choice: they will be fruitful
  chosen_spanish: fructificarán
  alternatives_spanish:
  - darán fruto
  - serán fecundos
  lexicon: HALOT
  rationale: «Fructificar» conserva el paralelismo bíblico y la resonancia de плод/fruitfulness sin expandir demasiado el sentido.
- source_word: וְרָבוּ
  english_pob_choice: and multiply
  chosen_spanish: y se multiplicarán
  alternatives_spanish:
  - y aumentarán
  - y serán muchos
  lexicon: HALOT
  rationale: «Multiplicarse» preserva la pareja formularia con פרה y el eco de bendición/restauración.
theological_decisions:
- issue: Agencia divina en el exilio y la restauración
  english_pob_reading: Retain both God's role in driving them away and his promise to gather and return them.
  chosen_spanish_reading: Mantener tanto la acción de Dios al dispersarlos como su promesa de reunirlos y hacerlos volver.
  alternative_spanish_readings:
  - Suavizar la agencia divina diciendo simplemente que fueron dispersados.
  - Presentar la restauración sin aludir al juicio previo.
  rationale: El hebreo afirma explícitamente «he dispersado»; la traducción debe conservar esa tensión entre juicio y restauración, sin atenuar el papel activo de Yahvé en ambos actos.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en vez de resolverla)
translation_notes:
  revision_awareness: La lectura coincide con el texto hebreo consonante y con el audit trail inglés de alta concordancia; se mantuvo la tensión entre juicio y restauración y se ajustó la imagen pastoral a un español natural.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término editorial estándar solo cuando corresponda; en este versículo no aparece el nombre divino explícito en la forma base castellana, por lo que no fue necesario insertarlo.
  - Se prefirió «reuniré»/«haré volver» sobre calcos más rígidos para conservar naturalidad sin perder el movimiento causativo del hebreo.
  - Se mantuvo el paralelismo «fructificarán y se multiplicarán» como fórmula bíblica reconocible en español.
