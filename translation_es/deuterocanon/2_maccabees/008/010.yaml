    issue: La frase «sacándolo de la cautividad de los judíos» añade explicitación no presente en el griego.
    rationale: El original dice simplemente «de la cautividad de los judíos» como fuente del pago. «Sacándolo de» introduce un pronombre y una construcción más interpretativa, además de menos sobria en español bíblico.
  - severity: low
