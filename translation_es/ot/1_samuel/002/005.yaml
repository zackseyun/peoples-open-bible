review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la inversión poética del hebreo y mantiene adecuadamente «pan», «estéril» y «siete». Sin embargo, no preserva del todo la decisión documentada de בָּנִים como «sons»: «muchos hijos» en español puede leerse genéricamente y debilita la precisión masculina que el audit trail inglés decidió conservar. Además, «se han alquilado» para נִשְׂכָּרוּ suena poco natural para personas en español; una formulación como «se han puesto a trabajar por pan» o «se han alquilado por pan» sería interpretable, pero la primera se aparta más del matiz lexical. Conviene reparar la naturalidad sin perder el sentido de dependencia laboral.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «se han alquilado por pan» resulta áspero y poco idiomático para lectores amplios. «Han cesado» funciona, aunque exige la nota. «Muchos hijos» es fluido, pero precisamente por eso pierde la especificidad de «hijos varones/sons». Una leve revisión mejora fidelidad y legibilidad.
  glossary_alignment: 'No hay conflictos con terminología mayor del proyecto. La cuestión principal es la alineación con la decisión léxica documentada para בָּנִים: debe mantenerse un masculino específico mejor que el actual «hijos» genérico. También conviene ajustar נִשְׂכָּרוּ a un español más natural sin borrar el matiz de trabajo asalariado/dependiente.'
  issues:
  - severity: medium
    issue: «la que tenía muchos hijos» no preserva suficientemente el masculino específico de בָּנִים
    rationale: El audit trail inglés retuvo «sons» por razón de precisión de género. En español, «hijos» suele funcionar de manera inclusiva/genérica; aquí conviene explicitar «hijos varones» o una formulación equivalente.
  - severity: medium
    issue: «se han alquilado por pan» es poco natural aplicado a personas
    rationale: Aunque intenta reflejar el nifal de שׂכר, en español general suena torpe y puede distraer. Debe mejorarse la idiomaticidad sin perder la idea de dependencia laboral por pan.
  - severity: low
    issue: Falta la nota correspondiente al matiz de «sons» que sí preserva el audit trail inglés
    rationale: Si el texto principal explicita «hijos varones», la nota puede no ser necesaria; pero si se usa una expresión menos literal, debe documentarse. Dado que el inglés sí lo señaló, conviene reflejarlo en español.
