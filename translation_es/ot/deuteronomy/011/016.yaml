translation:
  language: es
  text: Tengan cuidado, no sea que su corazón sea engañado y ustedes se aparten, sirvan a otros dioses y se postren ante ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sea seducido». El verbo hebreo puede tener el sentido de ser persuadido, seducido o engañado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמְרוּ לָכֶם
  english_pob_choice: Be careful
  chosen_spanish: Cuídense
  alternatives_spanish:
  - Manténganse alertas
  - Tengan cuidado
  - Guárdense
  lexicon: HALOT
  rationale: La forma reflexiva del mandato se expresa de modo natural en español con «Cuídense», que conserva la advertencia directa y el sentido de vigilancia personal sin añadir una perífrasis pesada. En este contexto de exhortación pactal, la fuerza imperativa queda clara.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - a fin de que no
  - no vaya a ser que
  lexicon: HALOT
  rationale: La partícula introduce una cláusula de prevención; «no sea que» comunica bien el valor de advertencia solemne en español moderno y conserva la relación lógica de peligro sin sobretraducción.
- source_word: יִפְתֶּה
  english_pob_choice: be deceived
  chosen_spanish: sea seducido
  alternatives_spanish:
  - sea engañado
  - sea persuadido
  - sea incitado
  lexicon: HALOT
  rationale: El verbo hebreo puede incluir la idea de persuadir, atraer o engañar. Dado que el contexto conduce a apostasía e idolatría, «sea seducido» preserva la ambigüedad productiva entre atracción engañosa y engaño, sin eliminar el matiz de tentación interna. Se evita fijarlo solo como «engañado», porque el hebreo no obliga a ese único matiz.
- source_word: לְבַבְכֶם
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  - su ser interior
  lexicon: HALOT
  rationale: «Corazón» es el equivalente establecido para לֵבָב en contextos de alianza y obediencia, manteniendo el centro volitivo y cognitivo de la persona. En español resultaría menos exacto reducirlo a «mente».
- source_word: וְסַרְתֶּם
  english_pob_choice: and you turn aside
  chosen_spanish: y se aparten
  alternatives_spanish:
  - y se desvíen
  - y se vuelvan atrás
  - y se desvíen del camino
  lexicon: HALOT
  rationale: סור expresa apartarse del camino debido; «se aparten» conserva la imagen direccional y la progresión del texto, con un español claro y sobrio.
- source_word: וַעֲבַדְתֶּם
  english_pob_choice: and serve
  chosen_spanish: y sirvan
  alternatives_spanish:
  - y adoren
  - y sean esclavos de
  - y presten servicio a
  lexicon: HALOT
  rationale: Aunque el léxico de עבד puede tener el valor más fuerte de «esclavitud» en otros contextos, aquí con «dioses» la POB inglesa eligió «serve» por su valor cultual. En español, «sirvan» conserva esa relación de lealtad religiosa sin forzar una palabra más cargada que pudiera sonar artificial en una secuencia paralela.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  lexicon: HALOT
  rationale: La correspondencia directa «otros dioses» es precisa y transparente. «Ajenos» o «extraños» introducirían una interpretación que el hebreo aquí no exige.
- source_word: וְהִשְׁתַּחֲוִיתֶם לָהֶם
  english_pob_choice: and bow down to them
  chosen_spanish: y se postren ante ellos
  alternatives_spanish:
  - y se inclinen ante ellos
  - y se postren a ellos
  - y los adoren
  lexicon: HALOT
  rationale: השתחוה denota postración física, normalmente en contexto de culto. «Se postren ante ellos» conserva la imagen concreta del gesto y deja visible la dimensión idolátrica sin reemplazarla por el más abstracto «adoren».
theological_decisions:
- issue: Secuencia interior-exterior de la apostasía
  english_pob_reading: The verse warns Israel against inner deception leading to covenantal apostasy expressed in serving and bowing to other gods.
  chosen_spanish_reading: El versículo advierte contra una seducción interior que conduce a apartarse de Yahvé y a actos externos de idolatría.
  alternative_spanish_readings:
  - El versículo advierte contra ser simplemente engañados para adorar ídolos.
  - El versículo enfatiza solo la conducta idolátrica, no la interior.
  rationale: La estructura hebrea va del corazón a apartarse, servir y postrarse. La traducción conserva ese movimiento sin borrar la tensión entre lo interior («corazón») y lo exterior (servir/postrarse).
  doctrine_reference: Deuteronomio 11:16; advertencia pactal contra la idolatría
- issue: Referencia al nombre divino en un contexto de advertencia de pacto
  english_pob_reading: The verse uses a general covenant warning without needing explicit mention of the divine name.
  chosen_spanish_reading: Aunque en este versículo no aparece el nombre divino explícito, la advertencia se entiende en el marco del pacto con Yahvé.
  alternative_spanish_readings:
  - Sustituir el marco implícito por una formulación más general.
  - Mencionar Yahvé solo en una nota interpretativa.
  rationale: El hebreo del versículo no nombra a Yahvé, pero el contexto de Deuteronomio lo presupone. No se inserta el nombre en el texto para no añadir material ausente, aunque la lectura teológica se mantiene dentro del marco pactal del libro.
  doctrine_reference: Contexto de Deuteronomio 11
- issue: Valor de יִפְתֶּה
  english_pob_reading: The Hebrew verb can carry the sense of being persuaded, enticed, or deceived.
  chosen_spanish_reading: El verbo puede significar ser seducido, persuadido o engañado.
  alternative_spanish_readings:
  - solo «ser engañado»
  - solo «ser seducido»
  rationale: El hebreo admite una gama semántica amplia y la POB inglesa preserva esa tensión con una nota. En español conviene mantener también esa amplitud para no fijar indebidamente un único matiz y para reflejar la posibilidad de atracción engañosa o persuasión ilícita.
  doctrine_reference: Deuteronomio 11:16; nota léxica sobre יפתה
translation_notes:
  revision_awareness: 'Se siguió el ajuste de la revisión inglesa al eliminar una frase innecesaria equivalente a «por ustedes mismos». La versión española usa un imperativo natural («Cuídense») sin añadir redundancia. También se mantuvo la progresión del hebreo: advertencia interior, desvío, servicio a otros dioses y postración.'
  spanish_consistency_notes:
  - Se preservó «Yahvé» en lugar de una ocultación con «SEÑOR», conforme al estándar del proyecto, aunque este versículo no lo mencione explícitamente.
  - Se usó «dioses» en minúscula para referirse a deidades falsas o rivales, coherente con el uso bíblico en contextos idolátricos.
  - Se evitó «adorar» en el texto principal para no perder el gesto concreto de «postrarse», aunque la nota permite la equivalencia semántica.
  - La cláusula inicial quedó compacta y natural en español, manteniendo el tono de advertencia solemne del original.
