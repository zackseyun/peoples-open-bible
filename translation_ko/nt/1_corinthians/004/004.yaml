id: 1CO.4.4
reference: '1 Corinthians 4:4'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐδὲν γὰρ ἐμαυτῷ σύνοιδα, ἀλλ’ οὐκ ἐν τούτῳ δεδικαίωμαι, ὁ δὲ ἀνακρίνων με κύριός ἐστιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/004.yaml
  text: For I am aware of nothing against myself[a], but I am not justified by this[c][b]; the one who examines me is the Lord.
  footnotes:
  - marker: a
    text: 'Or ''I am conscious of nothing in myself'' or ''I know nothing against myself.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''I am not acquitted by this'' or ''I am not vindicated by this.'' The Greek uses a forensic term also used elsewhere in Paul for being justified.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''the one who judges me''; the verb can mean examine, investigate, or evaluate in a judicial setting.'
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 내 자신에 대해 아무것도 의식하는 바가 없으나, 그렇다고 이로써 의롭다 함을 받은 것은 아닙니다. 나를 심판하시는 분은 주이십니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σύνοιδα
  english_pob_choice: I am aware … against myself
  chosen_korean: 의식하는 바가 없으나
  alternatives_korean:
  - 양심에 거리끼는 바가 없으나
  lexicon: BDAG
  rationale: σύνοιδα + 여격 재귀(자기 자신에 대해 양심으로 함께 아는 바).
- source_word: δεδικαίωμαι
  english_pob_choice: I am … justified
  chosen_korean: 의롭다 함을 받은
  alternatives_korean:
