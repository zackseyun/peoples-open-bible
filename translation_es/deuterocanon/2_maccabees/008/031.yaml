translation:
  language: es
  text: Después de despojarlos cuidadosamente de sus armas[a], pusieron todo en los lugares apropiados, y el resto del botín lo llevaron a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «recogiendo de ellos sus armas». El participio griego puede subrayar tanto el desarme de los caídos como la recolección de las armas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁπλολογήσαντες
  english_pob_choice: stripping them of their arms
  chosen_spanish: despojarlos cuidadosamente de sus armas
  alternatives_spanish:
  - recogerles las armas
  - desarmarlos
  lexicon: LSJ
  rationale: El participio compuesto sugiere la acción concreta de quitar o recoger las armas a los vencidos. «Despojarlos de sus armas» conserva esa fuerza material sin volverlo demasiado abstracto; «cuidadosamente» refleja ἐπιμελῶς.
- source_word: ἐπιμελῶς
  english_pob_choice: carefully
  chosen_spanish: cuidadosamente
  alternatives_spanish:
  - diligentemente
  - con cuidado
  lexicon: LSJ
  rationale: Adverbio de manera que expresa atención y es natural en español contemporáneo.
- source_word: πάντα συνέθηκαν
  english_pob_choice: they put everything
  chosen_spanish: pusieron todo
  alternatives_spanish:
  - depositaron todo
  - colocaron todo
  lexicon: LSJ
  rationale: El verbo aquí indica poner o depositar en un lugar; «pusieron todo» sigue de cerca el sentido directo que el POB inglés revisado mantuvo con «put».
- source_word: εἰς τοὺς ἐπικαίρους τόπους
  english_pob_choice: in the proper places
  chosen_spanish: en los lugares apropiados
  alternatives_spanish:
  - en los lugares convenientes
  - en los lugares adecuados
  - en los lugares oportunos
  lexicon: LSJ
  rationale: ἐπίκαιρος puede significar conveniente, apto o adecuado; «apropiados» comunica la idea de lugares idóneos sin forzar una lectura estratégica.
- source_word: τὰ δὲ λοιπὰ τῶν σκύλων
  english_pob_choice: the rest of the spoils
  chosen_spanish: el resto del botín
  alternatives_spanish:
  - las demás presas de guerra
  - lo restante del saqueo
  lexicon: LSJ
  rationale: σκῦλα es «botín» o «despojos de guerra»; «botín» es el equivalente más natural y fiel en español.
- source_word: ἤνεγκαν εἰς Ἰεροσόλυμα
  english_pob_choice: they carried ... to Jerusalem
  chosen_spanish: lo llevaron a Jerusalén
  alternatives_spanish:
  - lo transportaron a Jerusalén
  - lo trajeron a Jerusalén
  lexicon: LSJ
  rationale: El aoristo de φέρω expresa traslado físico. «Lo llevaron» es idiomático y conserva la concreción del acto.
translation_notes:
  revision_awareness: 'El contexto griego confirma una secuencia militar concreta: desarmar cuidadosamente, poner/colocar lo obtenido en lugares adecuados y llevar el resto del botín a Jerusalén. La revisión inglesa prefirió «put» frente a «stored», por lo que en español se evitó un verbo demasiado interpretativo y se usó «pusieron todo».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se eligió «botín» para σκῦλα por concordar con el campo semántico de guerra y con el registro del pasaje.
  - «Llevaron» conserva la simplicidad del traslado físico sin añadir matices no presentes en el griego.
