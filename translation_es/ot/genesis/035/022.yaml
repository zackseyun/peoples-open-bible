translation:
  language: es
  text: Y aconteció, mientras Israel habitaba en aquella tierra, que Rubén fue y se acostó con Bilha, concubina de su padre, e Israel se enteró[a]. Ahora bien, los hijos de Jacob eran doce[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «e Israel oyó». El objeto no aparece expresado, pero el contexto remite claramente al acto de Rubén; en español se puede sobreentender o explicitar con una fórmula natural como «se enteró».'
    reason: lexical_alternative
  - marker: b
    text: 'También podría leerse de manera más literal: «Y los hijos de Jacob eran doce». La cláusula probablemente funciona como transición hacia la lista de los hijos en los versículos siguientes.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce un desarrollo del relato; «aconteció» conserva ese valor discursivo en español sin caer en un calco áspero.
- source_word: בִּשְׁכֹּן
  english_pob_choice: while Israel was dwelling
  chosen_spanish: mientras Israel habitaba
  alternatives_spanish:
  - cuando Israel habitaba
  - mientras Israel vivía
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia temporal continua. «Habitaba» mantiene el sentido de residencia/estancia y suena natural en registro bíblico.
- source_word: בָּאָרֶץ הַהִוא
  english_pob_choice: in that land
  chosen_spanish: en aquella tierra
  alternatives_spanish:
  - en esa tierra
  - en aquel país
  lexicon: HALOT
  rationale: אָרֶץ aquí refiere a la región/territorio, no al mundo. «Aquella tierra» conserva el deíctico y el tono narrativo.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - salió
  lexicon: HALOT
  rationale: El verbo separado refuerza la acción previa a la transgresión. «Fue» reproduce esa secuencia de forma breve y directa en español.
- source_word: וַיִּשְׁכַּב אֶת
  english_pob_choice: lay with
  chosen_spanish: se acostó con
  alternatives_spanish:
  - se acostó con ella
  - tuvo relaciones sexuales con
  lexicon: HALOT
  rationale: El hebreo usa el idiomático שׁכב con una persona para indicar relación sexual. En español, «se acostó con» comunica el hecho con claridad y sin la explicitud clínica de una expansión interpretativa.
- source_word: פִּילֶגֶשׁ
  english_pob_choice: concubine
  chosen_spanish: concubina
  alternatives_spanish:
  - mujer secundaria
  - compañera
  lexicon: HALOT
  rationale: «Concubina» es el término español estándar y preciso para una mujer con estatus conyugal reconocido pero inferior al de esposa.
- source_word: אָבִיו
  english_pob_choice: his father's
  chosen_spanish: de su padre
  alternatives_spanish:
  - de su padre
  lexicon: HALOT
  rationale: Se conserva el posesivo simple del hebreo y del audit trail inglés, sin añadir matices ajenos.
- source_word: וַיִּשְׁמַע יִשְׂרָאֵל
  english_pob_choice: and Israel heard of it
  chosen_spanish: e Israel se enteró
  alternatives_spanish:
  - e Israel oyó
  - e Israel se enteró de ello
  lexicon: HALOT
  rationale: El hebreo dice literalmente «Israel oyó» sin objeto expreso. En español, «se enteró» comunica el hecho implícito con naturalidad; el objeto queda igualmente sobreentendido por el contexto.
- source_word: וַיִּהְיוּ בְנֵי יַעֲקֹב שְׁנֵים עָשָׂר
  english_pob_choice: Now the sons of Jacob were twelve
  chosen_spanish: Ahora bien, los hijos de Jacob eran doce
  alternatives_spanish:
  - Y los hijos de Jacob eran doce
  - Los hijos de Jacob eran doce
  lexicon: HALOT
  rationale: La cláusula funciona como nota de transición hacia la lista siguiente. «Ahora bien» conserva el giro discursivo; «eran doce» expresa con sencillez el dato numérico del hebreo.
theological_decisions:
- issue: Cómo traducir el idiomático sexual hebreo sin suavizarlo demasiado ni volverlo clínico
  english_pob_reading: lay with
  chosen_spanish_reading: se acostó con
  alternative_spanish_readings:
  - tuvo relaciones sexuales con
  - durmió con
  rationale: El verso narra una falta grave y el español debe reflejarla con claridad. «Se acostó con» mantiene la fuerza idiomática del hebreo y evita tanto eufemismo excesivo como explicitud innecesaria.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Tratamiento de la frase final como transición narrativa sin cargarla de implicaciones adicionales
  english_pob_reading: Include the clause as a simple transitional statement
  chosen_spanish_reading: 'Incluir la cláusula como simple nota de transición: «Ahora bien, los hijos de Jacob eran doce»'
  alternative_spanish_readings:
  - Unirla sin marcador discursivo
  - Inferir una reacción judicial o moral de Israel
  rationale: El texto solo afirma que Israel oyó y luego añade la observación sobre los hijos de Jacob. La traducción no debe introducir reacciones, juicios o conclusiones que el hebreo no expresa.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'Coincide con la última revisión del texto fuente inglés: no se documentaron cambios posteriores, y el estado de revisión indica alta concordancia y ausencia de correcciones pendientes. La versión española sigue esa decisión estable, manteniendo el mismo reparto discursivo y las mismas ambigüedades controladas del original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Israel» y «Jacob» conforme al hebreo, sin armonizarlos artificialmente.
  - «Concubina/concubina» se conserva por precisión léxica y coherencia con el audit trail inglés.
  - El marcador [a] en el texto señala la alternativa sobre el objeto implícito de וַיִּשְׁמַע; el marcador [b] señala la posible lectura alternativa de la cláusula final.
