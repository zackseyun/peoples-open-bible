  spanish_consistency_notes:
  - Se mantiene la estructura coordinada del hebreo con repetición de 'y' para cada nombre.
  - Se conserva la secuencia de tres nombres propios sin añadir artículo ni glosa.
  - La adaptación de los nombres busca coherencia con uso bíblico en español sin perder la correspondencia con la forma hebrea.
