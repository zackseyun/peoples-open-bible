translation:
  language: es
  text: y las ollas, las palas, las vasijas[a][c], y todos estos utensilios que Hiram hizo para el rey Salomón para la casa de Yahvé eran de bronce bruñido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuencos'.
    reason: lexical_alternative
  - marker: b
    text: O 'bronce pulido'.
    reason: lexical_alternative
  - marker: c
    text: O 'y todos estos utensilios que Hiram hizo para el rey Salomón para la casa de Yahvé, de bronce bruñido'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַסִּירוֹת
  english_pob_choice: the pots
  chosen_spanish: las ollas
  alternatives_spanish:
  - las ollas de cocer
  - las vasijas
  lexicon: HALOT
  rationale: סִירוֹת nombra recipientes de metal, normalmente ollas o calderos. En español, 'ollas' es natural, claro y suficientemente amplio sin forzar una función más específica que el texto no da.
- source_word: הַיָּעִים
  english_pob_choice: the shovels
  chosen_spanish: las palas
  alternatives_spanish:
  - las palas de ceniza
  - las cucharas
  lexicon: HALOT
  rationale: יָעִים designa herramientas para retirar cenizas o mover material del altar. 'Palas' comunica bien esa función en español y evita una especificación excesiva.
- source_word: הַמִּזְרָקוֹת
  english_pob_choice: the basins
  chosen_spanish: los tazones
  alternatives_spanish:
  - las fuentes
  - las vasijas
  lexicon: HALOT
  rationale: מִזְרָקוֹת son recipientes para contener o rociar líquidos. 'Tazones' mantiene la idea de recipiente; se conserva la nota alternativa porque en castellano también podría entenderse como 'tazones' o 'fuentes' según el matiz funcional.
- source_word: כָּל־הַכֵּלִים הָאֵלֶּה
  english_pob_choice: all these vessels
  chosen_spanish: todos estos utensilios
  alternatives_spanish:
  - todos estos vasos
  - todos estos objetos
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para implementos o recipientes. 'Utensilios' funciona bien en un inventario cultual y suena natural en español; 'estos' conserva la referencia inmediata a los objetos listados.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - formó
  lexicon: HALOT
  rationale: El verbo básico עָשָׂה se traduce de forma directa como 'hizo'. En este contexto de artesanía, 'hizo' es fiel y no añade matices estilísticos no requeridos.
- source_word: חִירָם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  alternatives_spanish:
  - Huram
  lexicon: transliteration
  rationale: La forma consonántica admite la transliteración estándar 'Hiram'. Se mantiene el nombre propio sin adaptación adicional.
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: for King Solomon
  chosen_spanish: para el rey Salomón
  alternatives_spanish:
  - para el rey, Salomón
  - para el rey Solomon
  lexicon: HALOT
  rationale: La preposición לַ aquí marca finalidad o destinatario. 'Para el rey Salomón' es el equivalente más natural y preciso en español.
- source_word: בֵּית יְהוָה
  english_pob_choice: for the house of the LORD
  chosen_spanish: para la casa de Yahvé
  alternatives_spanish:
  - para la casa de YHWH
  - para el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva 'casa' para seguir de cerca el hebreo בֵּית, y 'Yahvé' según la convención doctrinal del proyecto para יְהוָה. 'Templo' sería comprensible, pero desplaza ligeramente la forma del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: doctrinal transliteration
  rationale: El Tetragrámaton se vierte como 'Yahvé' en el texto español, conforme al criterio del proyecto para preservar el nombre divino en lugar de sustituirlo por un título.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: En el contexto de objetos del santuario, נְחֹשֶׁת se entiende normalmente como 'bronce'. 'Bronce' es la opción española más estable y precisa aquí.
- source_word: מְמֹרָט
  english_pob_choice: burnished
  chosen_spanish: bruñido
  alternatives_spanish:
  - pulido
  - abrillantado
  lexicon: HALOT
  rationale: El participio expresa metal alisado o pulido hasta el brillo. 'Bruñido' conserva el registro técnico y el matiz de acabado brillante de la artesanía metálica.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el nombre propio divino en transliteración española en lugar de ocultarlo con una sustitución como 'el SEÑOR'. Esto sigue la política del proyecto y mantiene visible el nombre del pacto en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sintaxis final sin verbo explícito en el hebreo
  english_pob_reading: were of burnished bronze
  chosen_spanish_reading: eran de bronce bruñido
  alternative_spanish_readings:
  - son de bronce bruñido
  - estaban hechos de bronce bruñido
  rationale: El hebreo concluye con un predicado nominal sobre todos los objetos listados. En español se expresa naturalmente con 'eran de...', manteniendo el valor de estado/material sin introducir una reconstrucción innecesaria.
  doctrine_reference: 'DOCTRINE.md: source-anchored verbless clause handling'
translation_notes:
  revision_awareness: 'El texto español sigue la lectura revisada del inglés auditado: la cláusula final se entiende como predicativa sobre toda la lista de objetos, no como una frase colgante. Por eso se expresa de forma natural en español como ''eran de bronce bruñido''.'
  spanish_consistency_notes:
  - Se mantiene 'casa de Yahvé' para בֵּית יְהוָה, coherente con la terminología del proyecto.
  - Se conserva el nombre propio 'Hiram' sin variación.
  - '''Utensilios'' se usa como término amplio para כֵּלִים, apropiado para un inventario cultual.'
  - 'El orden de la lista sigue el hebreo: ollas, palas, tazones, y todos estos utensilios.'
