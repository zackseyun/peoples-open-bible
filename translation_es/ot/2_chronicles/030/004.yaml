translation:
  language: es
  text: El asunto pareció bien[a] a los ojos del rey y a los ojos de toda la asamblea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El asunto fue correcto a los ojos del rey y de toda la asamblea».
