translation:
  language: es
  text: Puesto que ciertos hombres perniciosos[a] se apoderaron del reino de nuestros padres, y deseo recuperar el reino para restaurarlo como era antes, he reclutado numerosas tropas[b] y he equipado naves de guerra[c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ciertas plagas se apoderaron del reino de nuestros padres»; el griego usa λοιμοί, literalmente «plagas/pestilencias», en sentido metafórico para personas dañinas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «he reunido» o «he levantado» fuerzas; ἐξενολόγησα puede implicar reunir o alistar tropas, a veces con matiz de fuerzas extranjeras o mercenarias.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «he preparado» o «he construido» naves de guerra; κατεσκεύασα puede abarcar preparar, equipar o construir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδὴ
  english_pob_choice: Since
  chosen_spanish: Puesto que
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: LSJ
  rationale: Introduce la base causal o explicativa de la acción; 'puesto que' suena natural en español y conserva el valor explicativo del griego.
- source_word: τινες λοιμοὶ
  english_pob_choice: certain pestilent men
  chosen_spanish: ciertos hombres pestilentes
  alternatives_spanish:
  - ciertas plagas
  - ciertos destructores
  - ciertas personas pestilentes
  lexicon: LSJ
  rationale: λοιμοί puede ser literal ('plagas') o metafórico para personas dañinas. En español, 'hombres pestilentes' conserva el insulto y la metáfora sin neutralizarla.
- source_word: κατεκράτησαν
  english_pob_choice: seized control of
  chosen_spanish: se apoderaron de
  alternatives_spanish:
  - tomaron el control de
  - obtuvieron dominio sobre
  - prevalecieron sobre
  lexicon: LSJ
  rationale: El verbo con genitivo expresa dominio tomado por la fuerza; 'se apoderaron de' transmite bien la idea política y violenta.
- source_word: τῆς βασιλείας τῶν πατέρων ἡμῶν
  english_pob_choice: the kingdom of our fathers
  chosen_spanish: el reino de nuestros padres
  alternatives_spanish:
  - el reino ancestral de nuestros padres
  - la realeza de nuestros padres
  lexicon: LSJ
  rationale: La construcción genitiva es sencilla y se mantiene sin sobreinterpretar βασιλεία. 'Nuestros padres' conserva el tono dinástico y ancestral.
- source_word: βούλομαι
  english_pob_choice: I want
  chosen_spanish: deseo
  alternatives_spanish:
  - quiero
  - me propongo
  - estoy resuelto a
  lexicon: LSJ
  rationale: '''Deseo'' suena más formal y digno en español que ''quiero'', sin perder la intención expresa del hablante.'
- source_word: ἀντιποιήσασθαι τῆς βασιλείας
  english_pob_choice: to reclaim the kingdom
  chosen_spanish: recuperar el reino
  alternatives_spanish:
  - reivindicar el reino
  - reclamar el reino como propio
  - volver a tomar el reino
  lexicon: LSJ
  rationale: El verbo medio puede implicar reclamar o recuperar un derecho. 'Recuperar' capta la idea de restituir lo perdido y encaja con el contexto de restauración.
- source_word: ὅπως ἀποκαταστήσω αὐτὴν
  english_pob_choice: so that I may restore it
  chosen_spanish: para restaurarlo
  alternatives_spanish:
  - para restablecerlo
  - a fin de restaurarlo
  lexicon: LSJ
  rationale: La cláusula final expresa propósito; en español, 'para restaurarlo' es conciso y natural. Se mantiene el sentido de restablecimiento.
- source_word: ὡς ἦν τὸ πρότερον
  english_pob_choice: as it was before
  chosen_spanish: como era antes
  alternatives_spanish:
  - como era anteriormente
  - a su estado anterior
  lexicon: LSJ
  rationale: Reproduce de forma directa la idea de volver a un estado previo sin añadir matices no presentes en el griego.
- source_word: ἐξενολόγησα
  english_pob_choice: I have enlisted
  chosen_spanish: he reunido
  alternatives_spanish:
  - he reclutado
  - he alistado
  - he levantado
  lexicon: LSJ
  rationale: El verbo puede implicar reunir o reclutar fuerzas, incluso con matiz de tropas extranjeras o mercenarias. 'He reunido' es más amplio y evita forzar un detalle no explicitado en esta línea.
- source_word: πλῆθος δυνάμεων
  english_pob_choice: a multitude of forces
  chosen_spanish: una multitud de fuerzas
  alternatives_spanish:
  - muchas tropas
  - un gran ejército
  - una gran cantidad de fuerzas
  lexicon: LSJ
  rationale: Se conserva la abundancia del sustantivo πλῆθος y el sentido militar de δυνάμεων.
- source_word: κατεσκεύασα πλοῖα πολεμικά
  english_pob_choice: equipped warships
  chosen_spanish: he equipado naves de guerra
  alternatives_spanish:
  - he preparado naves de guerra
  - he construido naves de guerra
  - he equipado barcos de guerra
  lexicon: LSJ
  rationale: κατεσκευάσα puede significar preparar, equipar o construir. 'He equipado naves de guerra' sigue de cerca la opción auditada en inglés y evita decidir innecesariamente por 'construido'.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de ''lay claim to'' a ''reclaim'' por considerarse más natural y ajustado a ἀντιποιήσασθαι τῆς βασιλείας. La presente redacción española refleja esa revisión con ''recuperar el reino'', manteniendo el matiz de restitución de un reino ancestral. También se conservaron las tres ambigüedades léxicas principales del griego: λοιμοί como insulto metafórico, ἐξενολόγησα como reunir/alistar fuerzas, y κατεσκεύασα como preparar/equipar/construir.'
  spanish_consistency_notes:
  - Se mantuvo 'reino' para βασιλεία en coherencia con la decisión inglesa y con el contexto dinástico.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas irrelevantes aquí, ya que el versículo no contiene lenguaje divino.
  - Se conservó un registro político-militar elevado y no se suavizó el tono peyorativo de λοιμοί.
  - La voz verbal en perfecto compuesto ('he reunido', 'he equipado') sigue la presentación inglesa del resultado ya realizado.
