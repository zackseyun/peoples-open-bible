translation:
  language: es
  text: Comían[a], bebían, se casaban y se daban en matrimonio, hasta el día en que Noé entró en el arca, y vino el diluvio y los destruyó a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más compacta: «se casaban y se daban en matrimonio». El griego distingue dos verbos: uno activo («contraer matrimonio» / «tomar esposa») y otro pasivo («ser dado en matrimonio»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤσθιον
  english_pob_choice: they were eating
  chosen_spanish: Comían
  alternatives_spanish:
  - estaban comiendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción habitual o continua en pasado. En español, el imperfecto simple «comían» comunica ese trasfondo de actividad ordinaria sin volver la frase pesada con un progresivo innecesario.
- source_word: ἔπινον
  english_pob_choice: they were drinking
  chosen_spanish: bebían
  alternatives_spanish:
  - estaban bebiendo
  lexicon: BDAG
  rationale: Se mantiene la serie de imperfectos con un verbo español natural y paralelo a «comían», preservando el aspecto durativo/cotidiano del original.
- source_word: ἐγάμουν
  english_pob_choice: they were marrying
  chosen_spanish: se casaban
  alternatives_spanish:
  - se estaban casando
  - contraían matrimonio
  lexicon: BDAG
  rationale: El verbo activo γαμέω en este contexto describe la acción de casarse/tomar cónyuge. «Se casaban» es idiomático en español y conserva el valor general de la acción sin sobrecargar con una formulación técnica.
- source_word: ἐγαμίζοντο
  english_pob_choice: they were being given in marriage
  chosen_spanish: se daban en matrimonio
  alternatives_spanish:
  - eran dadas en matrimonio
  - eran entregadas en matrimonio
  lexicon: BDAG
  rationale: El pasivo de γαμίζω distingue una acción diferente del primer verbo. «Se daban en matrimonio» conserva la pasividad relacional de la construcción y sugiere el arreglo matrimonial sin fusionarla con el verbo anterior.
- source_word: ἄχρι ἧς ἡμέρας
  english_pob_choice: until the day
  chosen_spanish: hasta el día en que
  alternatives_spanish:
  - hasta el día que
  - hasta el día cuando
  lexicon: BDAG
  rationale: La expresión temporal se vierte con una estructura natural en español que mantiene el límite temporal marcado por el griego.
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - entró a
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa con pretérito perfecto simple. «Entró» es directo y fiel al evento completado.
- source_word: κιβωτόν
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca de Noé
  lexicon: BDAG
  rationale: En el contexto de Noé, κιβωτός designa el arca. «El arca» es la forma bíblica clara y tradicional en español, sin añadir información que el texto no explicita.
- source_word: κατακλυσμός
  english_pob_choice: the flood
  chosen_spanish: el diluvio
  alternatives_spanish:
  - la inundación
  - el cataclismo
  lexicon: BDAG
  rationale: En el eco de Génesis, «diluvio» es la equivalencia bíblica más estable en español y reproduce bien la referencia narrativa al juicio de Noé.
- source_word: ἀπώλεσεν πάντας
  english_pob_choice: destroyed them all
  chosen_spanish: los destruyó a todos
  alternatives_spanish:
  - los acabó a todos
  - destruyó a todos
  lexicon: BDAG
  rationale: «ἀπώλεσεν» comunica destrucción/ruina con resultado total; «los destruyó a todos» expresa con naturalidad el objeto humano implícito en πάντας y conserva la totalidad del juicio.
theological_decisions:
- issue: Mantener la distinción entre los dos verbos matrimoniales
  english_pob_reading: they were marrying, they were being given in marriage
  chosen_spanish_reading: se casaban y se daban en matrimonio
  alternative_spanish_readings:
  - se casaban y eran casados
  - contraían matrimonio y eran dadas en matrimonio
  rationale: El griego usa dos verbos imperfectos distintos, uno activo y otro pasivo. La traducción los mantiene diferenciados para no borrar la textura social del pasaje ni suavizar la repetición enfática de la vida cotidiana antes del juicio.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Conservar el aspecto imperfectivo de la serie verbal inicial
  english_pob_reading: they were eating, they were drinking, they were marrying, they were being given in marriage
  chosen_spanish_reading: Comían, bebían, se casaban y se daban en matrimonio
  alternative_spanish_readings:
  - Estaban comiendo, estaban bebiendo, se estaban casando y se estaban dando en matrimonio
  rationale: Los imperfectos griegos describen actividad en curso o habitual. El imperfecto simple español reproduce bien ese trasfondo sin introducir una perifrasis más pesada que no añade precisión exegética.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el estado de acuerdo es alto y solo presentó observaciones menores. Esta versión sigue el texto griego SBLGNT y mantiene la distinción verbal matrimonial señalada en el aparato auditado en inglés.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no la contiene.
  - Se mantiene el valor aspectual del imperfecto con formas españolas naturales y no calcos pesados.
  - «Arca» y «diluvio» se eligen por su estabilidad bíblica en español y su claridad intertextual con Noé.
