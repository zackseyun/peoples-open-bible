  rationale: Se hizo una corrección menor para mejorar la naturalidad y dignidad del español («los que te nacieron» > «que te nacieron») sin alterar el sentido fuente. También se corrigió la nota c para que preserve una alternativa real, en vez de duplicar la lectura principal. El resto del versículo refleja bien el hebreo y las decisiones auditadas del POB.
