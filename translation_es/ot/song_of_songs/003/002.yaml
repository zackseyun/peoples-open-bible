review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: resolución cohortativa, recorrido por la ciudad, búsqueda repetida y fracaso en hallarlo. Sin embargo, la frase clave אֵת שֶׁאָהֲבָה נַפְשִׁי no está bien preservada en español con «al que ama mi alma», porque invierte el sujeto y pasa de ‘mi alma ama’ a ‘ama a mi alma’.'
  spanish_quality_summary: El español es generalmente claro y poético. «Me levantaré ahora» y «Lo busqué, pero no lo hallé» funcionan bien. No obstante, «por las plazas del mercado» suena algo forzado frente a opciones más naturales como «en los mercados» o «en las plazas», y la cláusula «al que ama mi alma» resulta ambigua y poco idiomática, además de alterar el sentido.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Se conserva bien «alma» para נֶפֶשׁ, lo cual coincide con la justificación del POB inglés. La nota al pie también debe corregirse para reflejar la alternativa inglesa documentada sin invertir la relación verbal.
  issues:
  - severity: high
    issue: La frase «al que ama mi alma» invierte el sentido del hebreo.
    rationale: שֶׁאָהֲבָה נַפְשִׁי significa ‘a quien mi alma ama’ / ‘el que mi alma ama’, no ‘el que ama mi alma’. El borrador cambia el sujeto de amar y por tanto altera el significado central del estribillo.
  - severity: medium
    issue: La nota al pie repite la misma formulación incorrecta.
    rationale: La nota pretende dar la alternativa más formal documentada en inglés, pero conserva la inversión errónea del sujeto. Debe decir algo equivalente a «a quien ama mi alma».
  - severity: low
    issue: «por las plazas del mercado» suena menos natural que otras opciones posibles.
    rationale: Aunque intenta reflejar שׁוּק como espacio público de mercado, en español neutral la frase resulta algo pesada. «En los mercados» preserva mejor la imagen pública sin pérdida importante de precisión.
  revised_spanish_text: Me levantaré ahora y recorreré la ciudad[a], en los mercados y en las calles; buscaré al que mi alma ama. Lo busqué, pero no lo hallé.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «a quien ama mi alma».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula principal para conservar el sentido exacto del hebreo y del POB inglés: es mi alma la que ama, no el referente quien ama a mi alma. También se ajusta la nota para reflejar la alternativa formal correcta. Además, «recorreré la ciudad» y «en los mercados» mejoran la naturalidad del español sin apartarse del valor de סבב y שׁוּק.'
