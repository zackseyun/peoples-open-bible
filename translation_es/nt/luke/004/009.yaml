base_translation:
  language: en
  yaml_path: translation/nt/luke/004/009.yaml
  text: Then he led him to Jerusalem and set him on the pinnacle of the temple[a], and said to him, “If you are the Son of God[c][b], throw yourself down from here;”
  footnotes:
  - marker: a
    text: Or 'on the wing of the temple.' The Greek term refers to a projecting extremity or high point of the temple complex.
    reason: lexical_alternative
  - marker: b
    text: Greek ἱερόν refers to the temple complex, not specifically the inner sanctuary.
    reason: cultural_note
  - marker: c
    text: Or 'Since you are the Son of God.' The Greek condition can be read that way, but here it is rendered 'If' to preserve the tempter's challenge.
    reason: alternative_reading
