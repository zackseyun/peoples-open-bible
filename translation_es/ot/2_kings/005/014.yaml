base_translation:
  language: en
  yaml_path: translation/ot/2_kings/005/014.yaml
  text: So he went down and dipped himself in the Jordan seven times[a], according to the word of the man of God; and his flesh was restored like the flesh of a little boy[b], and he was cleansed.
  footnotes:
