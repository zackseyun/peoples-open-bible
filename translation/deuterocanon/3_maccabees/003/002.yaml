theological_decisions:
- issue: Referent and force of γένος in a hostile political context
  chosen_reading: the nation
  alternative_readings:
  - the people
  - the race
  rationale: The verse concerns slander against the Jewish collective. 'Nation' best conveys a people-group under political pressure while avoiding modern racialized misunderstandings that 'race' may introduce.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of ἀφορμή in context of anti-Jewish agitation
  chosen_reading: an occasion
  alternative_readings:
  - a pretext
  - an opportunity
  rationale: The context suggests a basis for hostile action, possibly a pretext. Because the Greek itself does not force the more accusatory 'pretext,' the main text keeps the broader 'occasion,' with alternatives documented.
  doctrine_reference: Translation philosophy §3, §5
