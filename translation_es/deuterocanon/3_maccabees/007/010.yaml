  yaml_path: translation/deuterocanon/3_maccabees/007/010.yaml
  text: But when they received this letter[a], they did not immediately hasten for the departure; instead, they urged the king that those of the Jewish race who had willfully transgressed the law of the holy God might, through them[c][b], receive the punishment that was due.
  footnotes:
