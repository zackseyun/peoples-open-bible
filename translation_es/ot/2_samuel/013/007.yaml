translation:
  language: es
  text: 'Entonces David envió un mensaje a Tamar en casa, diciendo: «Por favor, ve a la casa de tu hermano Amnón y prepara la comida[a] para él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prepárale un plato restaurador» o «prepárale la comida». El término hebreo se refiere a alimentos preparados para una persona enferma o convaleciente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent word
  chosen_spanish: envió un mensaje
  alternatives_spanish:
  - envió
  - mandó decir
  lexicon: HALOT
  rationale: El hebreo expresa un envío de comunicación a una persona seguido por לֵאמֹר; en español, «envió un mensaje» conserva el acto comunicativo con naturalidad y evita una calca demasiado seca.
- source_word: הַבַּיְתָה
  english_pob_choice: at home
  chosen_spanish: en casa
  alternatives_spanish:
  - a casa
  - en el hogar
  lexicon: HALOT
  rationale: El valor direccional de la forma puede sonar extraño si se vierte literalmente; «en casa» comunica bien la ubicación de Tamar en español sin perder la idea contextual.
- source_word: לְכִי נָא
  english_pob_choice: Please go
  chosen_spanish: Por favor, ve
  alternatives_spanish:
  - Ve, por favor
  - Por favor, anda
  lexicon: HALOT
  rationale: La forma femenina singular imperativa con נָא pide una solicitud cortés. «Por favor, ve» preserva el tono de petición sin añadir énfasis innecesario.
- source_word: בֵּית אַמְנ֣וֹן אָחִ֔י/ךְ
  english_pob_choice: the house of your brother Amnon
  chosen_spanish: la casa de tu hermano Amnón
  alternatives_spanish:
  - la casa de Amnón, tu hermano
  - la casa de tu hermano Amnón
  lexicon: HALOT
  rationale: La cadena constructa se vuelve naturalmente «la casa de tu hermano Amnón»; se mantiene el parentesco y el nombre propio con un orden normal en español.
- source_word: וַעֲשִׂי ל֖וֹ
  english_pob_choice: prepare the food for him
  chosen_spanish: prepara la comida para él
  alternatives_spanish:
  - haz la comida para él
  - prepárasela
  lexicon: HALOT
  rationale: עָשָׂה aquí tiene sentido culinario/operativo. «Prepara la comida para él» refleja bien el español corriente y conserva el destinatario explícito.
- source_word: הַבִּרְיָה
  english_pob_choice: the food
  chosen_spanish: la comida
  alternatives_spanish:
  - el alimento
  - la comida de recuperación
  lexicon: HALOT
  rationale: El término alude a una comida preparada para una persona enferma o convaleciente. «La comida» es una equivalencia sobria y fiel en el texto principal, dejando la especificidad semántica para nota.
translation_notes:
  revision_awareness: 'La redacción sigue la lectura consolidada del POB inglés revisado: se favorece una formulación natural y formal («envió un mensaje», «en casa», «prepara la comida») sin perder la estructura de petición y preparación culinaria del hebreo. La nota reproduce la tensión léxica documentada entre una equivalencia general y el matiz de comida para convaleciente.'
  spanish_consistency_notes:
  - Se mantiene «David», «Tamar» y «Amnón» de forma consistente con la terminología bíblica estándar de la serie.
  - Se usa «comida» en el cuerpo principal por sobriedad, y la nota aclara el sentido más específico del hebreo.
  - No se introduce «Mesías», «SEÑOR» ni otro término no pertinente a este versículo.
