lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then spoke
  chosen_spanish: Entonces habló
  alternatives_spanish:
  - Y habló
  - Y dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce la acción narrativa en secuencia; en español, «Entonces habló» conserva el avance discursivo sin sonar forzado. «Dijo» sería posible, pero «habló» refleja mejor la fórmula de introducción a un discurso divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del texto hebreo con la forma española estándar «Yahvé», coherente con la política del proyecto de no sustituir el Tetragrámaton por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla; «a» es el equivalente natural en español contemporáneo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española usual y reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula infinitiva introductoria se vierte de manera natural como «diciendo» para anunciar el contenido del discurso siguiente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton; la traducción conserva el nombre propio del pacto en vez de sustituirlo por un título. «Yahvé» es la forma española más establecida para ese nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no requiere revisiones textuales: coincide plenamente con el hebreo masorético y la decisión principal es la normalización española del nombre divino a «Yahvé».'
  spanish_consistency_notes:
  - Se conserva la estructura narrativa breve del hebreo con un inicio temporal («Entonces») seguido del verbo de habla.
  - El nombre divino se mantiene como «Yahvé» según la política del proyecto; no se sustituye por «SEÑOR».
  - La puntuación con coma antes de «diciendo» reproduce la fórmula introductoria de habla en español bíblico moderno.
