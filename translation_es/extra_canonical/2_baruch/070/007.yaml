translation:
  language: es
  text: y algunos serán arruinados por los suyos. Entonces el Altísimo revelará a los pueblos que preparó de antemano, y vendrán a hacer guerra contra los gobernantes que queden en ese tiempo.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: glā / reveal
  english_pob_choice: reveal
  chosen_spanish: revelará
  alternatives_spanish:
  - manifestará
  - dará a conocer
  - pondrá de manifiesto
  lexicon: revelar
  rationale: El verbo siriaco, según la revisión del audit trail, significa 'revelar' o 'descubrir'. 'Revelará' conserva la acción apocalíptica de sacar a la luz a unos pueblos previamente reservados, sin debilitarla con un sentido más general como 'suscitar' o 'incitar'.
- source_word: w-n'twn / come
  english_pob_choice: and they will come and wage war
  chosen_spanish: y vendrán y harán guerra
  alternatives_spanish:
  - y vendrán para guerrear
  - y llegarán y combatirán
  lexicon: venir / hacer guerra
  rationale: La nota de revisión indica que el siriaco incluye explícitamente el verbo de movimiento 'venir' antes de 'hacer guerra'. Por eso se conserva en español para no perder la secuencia de acciones.
- source_word: w-n'bdwn qrbā / wage war
  english_pob_choice: wage war
  chosen_spanish: harán guerra
  alternatives_spanish:
  - entablarán batalla
  - combatirán
  lexicon: hacer guerra
  rationale: '''Harán guerra'' mantiene la fuerza directa del giro bíblico y corresponde bien al sustantivo de guerra/combate del original, sin suavizarlo.'
- source_word: prepared beforehand
  english_pob_choice: whom he prepared beforehand
  chosen_spanish: que preparó de antemano
  alternatives_spanish:
  - que había preparado de antemano
  - que dispuso מראש
  lexicon: preparar de antemano
  rationale: '''Preparó de antemano'' refleja la idea de preparación previa con claridad natural en español y conserva el matiz temporal y providencial del texto.'
- source_word: Most High
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: Altísimo
  rationale: '''El Altísimo'' es la forma más natural y reverente en español para el título divino, y preserva la referencia sin introducir perífrasis innecesarias.'
theological_decisions:
- issue: Revelación apocalíptica de los pueblos reservados
  english_pob_reading: the Most High will reveal the peoples whom he prepared beforehand
  chosen_spanish_reading: Entonces el Altísimo revelará a los pueblos que preparó de antemano
  alternative_spanish_readings:
  - Entonces el Altísimo manifestará a los pueblos que preparó de antemano
  - Entonces el Altísimo dará a conocer a los pueblos que preparó de antemano
  rationale: La revisión del audit trail corrige una lectura anterior como 'stir up' y fija 'reveal'. En español, 'revelará' comunica mejor la carga apocalíptica de algo oculto o reservado que ahora se muestra.
  doctrine_reference: Apocalipsis / escatología reservada por la providencia divina
- issue: Secuencia de movimiento y combate
  english_pob_reading: and they will come and wage war against the rulers who remain at that time
  chosen_spanish_reading: y vendrán y harán guerra contra los gobernantes que queden en ese tiempo
  alternative_spanish_readings:
  - y harán guerra contra los gobernantes que queden en ese tiempo
  - y vendrán para combatir contra los gobernantes que queden en ese tiempo
  rationale: Se conserva tanto el movimiento ('vendrán') como el acto bélico ('harán guerra'), porque el texto fuente los presenta como acciones sucesivas y no como una sola idea resumida.
  doctrine_reference: Escatología narrativa / juicio final
translation_notes:
  revision_awareness: 'Se siguió el audit trail revisado: se corrigió la lectura de ''stir up'' a ''reveal'' y se conservó el verbo de movimiento ''come'' antes de ''wage war''. La redacción española refleja ambas decisiones de revisión sin depender mecánicamente del inglés previo.'
  spanish_consistency_notes:
  - Se usó 'Altísimo' para el título divino, en línea con el español bíblico formal y la terminología POB.
  - Se mantuvo 'pueblos' y 'gobernantes' como términos transparentes y no eclesiásticos, coherentes con el contexto apocalíptico-político del pasaje.
  - '''Deshechos por los suyos'' reproduce la relación de pertenencia/agency del texto base sin suavizarla.'
