base_translation:
  language: en
  yaml_path: translation/ot/genesis/014/008.yaml
  text: Then the king of Sodom[a], the king of Gomorrah, the king of Admah, the king of Zeboiim, and the king of Bela (that is, Zoar) went out, and they arrayed themselves for battle against them in the Valley of Siddim.
  footnotes:
  - marker: a
    text: Or 'with them in battle'; the Hebrew expression is literally 'with them battle,' and some translations render the sense more explicitly as 'against them.'
    reason: lexical_alternative
