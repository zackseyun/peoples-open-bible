    issue: «jefes» para שָׂרֵי
    rationale: Aunque no es incorrecto, «jefes» puede sonar demasiado coloquial o restringido y no refleja tan bien el sentido amplio de autoridades/líderes que la auditoría inglesa fijó como «leaders». «Líderes» preserva mejor la decisión léxica y la amplitud administrativa del hebreo.
  revised_spanish_text: Entonces David mandó a todos los líderes de Israel que ayudaran a Salomón, su hijo.
  revision_rationale: Se reemplaza «jefes» por «líderes» para alinearse mejor con el valor de שָׂרֵי y con la decisión léxica documentada en el POB inglés, manteniendo un español natural y claro. No se requieren notas al pie.
