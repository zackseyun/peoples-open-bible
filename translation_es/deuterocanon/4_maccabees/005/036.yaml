translation:
  language: es
  text: Ni mancharás mi venerable boca de anciano, ni la edad[a] de una vida conforme a la ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Edad» refleja ἡλικίαν de manera directa; el griego puede aludir al tramo o estado de la vida, no solo a los años contados.
    reason: lexical_alternative
  - marker: b
    text: La expresión mantiene la referencia a una vida en conformidad con la ley, probablemente con resonancia de la ley judía en el contexto de 4 Macabeos, sin precisar más allá del texto griego.
    reason: theological_note
lexical_decisions:
- source_word: μιαινεῖς
  english_pob_choice: defile
  chosen_spanish: contaminarás
  alternatives_spanish:
  - mancharás
  - profanarás
  lexicon: BDAG
  rationale: En este contexto de pureza y honra corporal, «contaminarás» comunica mejor la idea de volver impuro que un simple «mancharás», sin perder la fuerza ética del verbo.
- source_word: σεμνὸν
  english_pob_choice: venerable
  chosen_spanish: venerable
  alternatives_spanish:
  - digno
  - honroso
  - reverente
  lexicon: LSJ
  rationale: «Venerable» reproduce bien la dignidad y gravedad que el adjetivo expresa en relación con la vejez, y mantiene el matiz de respeto debido a la edad.
- source_word: γήρως
  english_pob_choice: of old age
  chosen_spanish: de la vejez
  alternatives_spanish:
  - por la vejez
  - de la ancianidad
  lexicon: LSJ
  rationale: La construcción genitiva se refleja de forma natural en español con «de la vejez», manteniendo la relación entre la boca y la condición de anciano.
- source_word: στόμα
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - boca
  - labio
  lexicon: BDAG
  rationale: «Boca» conserva el sentido literal del órgano del habla y la integridad corporal evocada por el texto.
- source_word: νομίμου βίου
  english_pob_choice: of a law-abiding life
  chosen_spanish: de una vida conforme a la ley
  alternatives_spanish:
  - de una vida legal
  - de una vida obediente a la ley
  lexicon: LSJ
  rationale: En este marco judío, la frase apunta a una vida regida por la ley; «conforme a la ley» preserva esa referencia sin sobreespecificar más allá del griego.
- source_word: ἡλικίαν
  english_pob_choice: the age
  chosen_spanish: la edad
  alternatives_spanish:
  - la etapa de vida
  - la madurez
  lexicon: BDAG
  rationale: Dado el paralelo con «vejez», «edad» expresa la fase de vida aludida sin introducir una interpretación adicional como «años».
theological_decisions:
- issue: Referencia de la ley en νομίμου βίου
  english_pob_reading: The phrase refers to a life lived in accordance with the Jewish law, without over-specifying beyond the text.
  chosen_spanish_reading: La frase se entiende como una vida vivida conforme a la ley judía, sin añadir más especificación que la que el texto permite.
  alternative_spanish_readings:
  - una vida recta en sentido general
  - una vida según la ley sin referencia explícita a la Torá
  rationale: En 4 Macabeos el tema de la ley es central; por eso la traducción debe conservar esa resonancia, pero sin insertar «Torá» ni otro término no presente en el verso.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más literal del audit trail: conserva la estructura del griego, evita expandir «ἡλικίαν» a «años», y mantiene el valor ritual/moral de μιαινεῖς con un verbo fuerte en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este verso, sino porque el proyecto reserva ese término para el nombre divino cuando corresponda; aquí no hay ocurrencia.
  - Se prefirió «boca» para στόμα por su literalidad y por preservar la imagen corporal del martirio.
  - Se evitó «Cristo/Mesías» porque el verso no contiene cristología.
  - No se incluyeron notas sin anclaje en el texto; cada marcador [a] y [b] aparece exactamente donde corresponde.
