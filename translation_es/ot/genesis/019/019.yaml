revisions:
- from: Mira[a], por favor, tu siervo ha hallado favor ante tus ojos, y has engrandecido tu misericordia que has mostrado conmigo, al preservar mi vida. Pero yo no puedo huir a la montaña[b], no sea que me alcance el desastre y muera.
  to: Mira[a], por favor, tu siervo ha hallado favor ante tus ojos, y has engrandecido tu amor leal[b], que me has mostrado al preservar mi vida. Pero yo no puedo huir al monte, no sea que me alcance el desastre[c] y muera.
  rationale: Se corrigió «misericordia» a «amor leal» para reflejar mejor חֶסֶד según el expediente del POB y se añadió una nota con alternativas legítimas. Se reemplazó «que has mostrado conmigo» por «que me has mostrado» por fidelidad idiomática al sentido de עָשִׂיתָ עִמָּדִי. Se movió la nota lexical al sintagma correcto («desastre») para conservar la observación sobre הָרָעָה. También se ajustó «a la montaña» a «al monte» por naturalidad sin perder el singular direccional.
