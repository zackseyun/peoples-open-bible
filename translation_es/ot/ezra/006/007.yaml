    text: O «los judeanos» en lugar de «los judíos». El término arameo puede designar al pueblo de Judá en sentido étnico o regional.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto casi por completo porque es fiel y legible. Solo se ajusta «en su lugar» a «en su sitio» para alinearlo mejor con עַל אַתְרֵהּ y con la decisión documentada del POB inglés («on its site»), manteniendo un español natural.
