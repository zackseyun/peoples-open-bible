  yaml_path: translation/ot/amos/008/008.yaml
  text: Because of this[a], will not the land tremble, and every one who dwells in it mourn? All of it will rise like the Nile[b]; it will be driven along and sink like the Nile of Egypt.
  footnotes:
  - marker: a
    text: Or 'the earth' instead of 'the land.' The Hebrew אֶרֶץ can bear either sense; here the local sense is preferred because the verse focuses on the judged territory and its inhabitants.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like the Nile ... like the Nile of Egypt.' The image is of the Nile's annual rising and subsiding, used here as a picture of overwhelming upheaval.
    reason: cultural_note
