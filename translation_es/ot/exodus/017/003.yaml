base_translation:
  language: en
  yaml_path: translation/ot/exodus/017/003.yaml
  text: And there the people thirsted for water[a], and the people grumbled against Moses and said, “Why did you bring us up from Egypt, to kill me and my children and my livestock with thirst?”
  footnotes:
