translation:
  language: es
  text: ¡Apresúrate, escapa allí, porque no puedo hacer nada hasta que llegues allí! Por tanto, la ciudad fue llamada[a] Zoar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «él llamó el nombre de la ciudad Zoar».'
    reason: lexical_alternative
  - marker: b
    text: «Zoar» suena al hebreo para «pequeño» o «insignificante»; véase Génesis 19:20.
    reason: cross_reference
lexical_decisions:
- source_word: מַהֵר
  english_pob_choice: Hurry
  chosen_spanish: ¡Apresúrate!
  alternatives_spanish:
  - ¡Date prisa!
  - ¡Apresúrate rápidamente!
  lexicon: HALOT
  rationale: El imperativo expresa urgencia inmediata; «apresúrate» conserva ese empuje con registro digno y natural en español.
- source_word: הִמָּלֵט
  english_pob_choice: escape
  chosen_spanish: escapa
  alternatives_spanish:
  - ponte a salvo
  - huye
  lexicon: HALOT
  rationale: El niphal imperativo comunica escapar o librarse del peligro; «escapa» conserva la fuerza directa sin suavizarla.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - hasta allí
  lexicon: HALOT
  rationale: El adverbio direccional se expresa de modo natural como «allí» en español, manteniendo el movimiento hacia el lugar señalado.
- source_word: לֹא אוּכַל
  english_pob_choice: I cannot
  chosen_spanish: no puedo
  alternatives_spanish:
  - no seré capaz
  - no podré
  lexicon: HALOT
  rationale: La forma expresa incapacidad presente; «no puedo» preserva esa afirmación sin añadir explicación ajena al texto.
- source_word: לַעֲשׂוֹת דָּבָר
  english_pob_choice: do anything
  chosen_spanish: hacer nada
  alternatives_spanish:
  - hacer algo
  - hacer ninguna cosa
  lexicon: HALOT
  rationale: Aunque literalmente es «hacer una cosa», en esta negación el español idiomático exige «nada»; se conserva el alcance total de la expresión.
- source_word: עַד בֹּאֲךָ
  english_pob_choice: until you arrive
  chosen_spanish: hasta que llegues
  alternatives_spanish:
  - hasta tu llegada
  - hasta que vengas
  lexicon: HALOT
  rationale: El infinitivo con sufijo apunta al momento de llegada; «hasta que llegues» comunica bien la temporalidad en español.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La fórmula inferencial se traduce con un conector formal y claro que mantiene el enlace narrativo.
- source_word: קָרָא שֵׁם הָעִיר
  english_pob_choice: the city was called
  chosen_spanish: la ciudad fue llamada
  alternatives_spanish:
  - la ciudad fue nombrada
  - se llamó la ciudad
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa más natural y fiel al sentido resultante, sin forzar un pasivo impersonal menos claro en español.
- source_word: צֹעַר
  english_pob_choice: Zoar
  chosen_spanish: Zoar
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva sin traducir.
theological_decisions:
- issue: Declaración de incapacidad en contexto de juicio
  english_pob_reading: I cannot do anything until you arrive there
  chosen_spanish_reading: no puedo hacer nada hasta que llegues allí
  alternative_spanish_readings:
  - no debo hacer nada hasta que llegues allí
  - no puedo hacer esto hasta que llegues allí
  rationale: Se conserva la afirmación directa de incapacidad, sin atenuarla ni explicarla teológicamente. Así permanece la tensión narrativa del texto, en línea con la lectura auditada en inglés.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: 'Se incorporó la revisión inglesa más reciente en la cláusula final: la forma más natural y exacta en el audit trail es «the city was called Zoar», no una calca más pesada de «the name of the city was called Zoar». La versión española sigue esa actualización con «la ciudad fue llamada Zoar».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» porque no aparece en el hebreo de este verso.
  - La negación «no puedo hacer nada» conserva el valor total de דָּבָר en contexto.
  - Se conserva el nombre propio «Zoar» y se explicita su posible juego fonético en la nota a.
