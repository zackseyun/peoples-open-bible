base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/018/022.yaml
  text: Then Ahimaaz son of Zadok said again to Joab[a], “Come what may, please let me also run after the Cushite.” But Joab said, “Why would you run, my son[b], since you have no message that will bring reward?”
  footnotes:
  - marker: a
    text: Or, 'Come what may, please let me also run after the Cushite.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the final clause is difficult; it may mean 'you have no news that will be favorably received' or 'you will get no reward for the news.'
    reason: alternative_reading
