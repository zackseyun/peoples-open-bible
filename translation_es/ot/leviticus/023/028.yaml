review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: prohibición de trabajo, énfasis temporal, razón cultual, expiación en favor del pueblo, y referencia a Yahvé como Dios del destinatario plural. También preserva correctamente la nota sobre el plural hebreo «expiaciones».'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «No harán ningún trabajo» suena menos natural y algo redundante frente a «No harán ningún trabajo alguno» evitado; además «en este mismo día» es comprensible pero menos idiomático que «en este mismo día»/«en este día mismo», y la combinación más natural y legal en español bíblico moderno es «No harán ningún trabajo en este mismo día». El problema principal es semántico-pragmático en «Yahvé su Dios», que en español resulta ambiguo o menos natural sin la preposición posesiva explícita. «Yahvé, su Dios» o mejor «Yahvé su Dios» sigue siendo duro; «Yahvé su Dios» puede leerse casi apelativamente. Debe ajustarse a «Yahvé, su Dios» o «Yahvé su Dios» con mejor contexto. La opción más natural y fiel es «delante de Yahvé su Dios» -> «delante de Yahvé, su Dios» o «ante Yahvé su Dios»; aún mejor, «delante de Yahvé su Dios» con coma para aposición.
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé», «Día de Expiación» y «hacer expiación». No hay conflicto teológico de fondo. La única mejora es de español y precisión posesiva en «su Dios».
  issues:
  - severity: medium
    issue: «Yahvé su Dios» necesita puntuación o ajuste de formulación
    rationale: El hebreo לִפְנֵי יְהוָה אֱלֹהֵיכֶם significa «delante de Yahvé su Dios / vuestro Dios». En español actual, «Yahvé su Dios» sin coma suena trabado y algo ambiguo. Una coma aposicional mejora claramente la legibilidad sin alterar el sentido.
  - severity: low
    issue: El inicio podría sonar más idiomático en registro legal-bíblico
    rationale: «No harán ningún trabajo» es aceptable, pero la construcción legal puede fluir mejor manteniendo la fuerza prohibitiva con la misma formulación. No es error grave, pero conviene pulir solo lo necesario.
  revised_spanish_text: No harán ningún trabajo en este mismo día[a], porque es un Día de Expiación, para hacer expiación por ustedes delante de Yahvé, su Dios.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «un día de expiaciones». El español suele expresar el nombre de la fiesta como «Día de Expiación».'
    reason: lexical_alternative
  revision_rationale: Se conserva casi todo el borrador porque es fiel al hebreo y al rastro de auditoría inglés. Solo se ajusta la puntuación en «Yahvé, su Dios» para que el español sea natural y claro, preservando la relación de pacto expresada por אֱלֹהֵיכֶם. No se requiere una revisión doctrinal adicional.
