translation:
  language: es
  text: Y golpearé la casa de invierno junto con la casa de verano, y las casas de marfil[a] perecerán, y muchas casas llegarán a su fin, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «las casas adornadas con marfil»; probablemente se trata de casas lujosas decoradas con incrustaciones de marfil, no de casas construidas literalmente de marfil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכֵּיתִי
  english_pob_choice: And I will strike
  chosen_spanish: golpearé
  alternatives_spanish:
  - heriré
  - golpearé con juicio
  - castigaré
  lexicon: HALOT
  rationale: נכה expresa el acto de golpear o herir. En español, «golpearé» conserva la fuerza directa del verbo sin añadir una interpretación más específica que el hebreo no exige. Evita el matiz demasiado interpretativo de «castigaré».
- source_word: בֵית הַחֹרֶף
  english_pob_choice: the winter house
  chosen_spanish: la casa de invierno
  alternatives_spanish:
  - la casa invernal
  - la residencia de invierno
  - la casa del invierno
  lexicon: HALOT
  rationale: La construcción señala una casa usada en invierno. «Casa de invierno» conserva la estructura nominal y el contraste social entre residencias estacionales.
- source_word: עַל
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - junto a
  - con
  - al mismo tiempo que
  lexicon: HALOT
  rationale: Aquí עַל coordina el juicio sobre dos casas. «Junto con» comunica adecuadamente la unión de ambos objetivos del golpe sin introducir una idea espacial de «sobre».
- source_word: בֵית הַקָּיִץ
  english_pob_choice: the summer house
  chosen_spanish: la casa de verano
  alternatives_spanish:
  - la casa estival
  - la residencia de verano
  - la casa del verano
  lexicon: HALOT
  rationale: Paralelo directo de «casa de invierno». La frase conserva el contraste estacional y el valor social de viviendas múltiples.
- source_word: וְאָבְדוּ
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidas
  - se perderán
  - desaparecerán
  lexicon: HALOT
  rationale: אָבד puede expresar perecer, perderse o ser destruido. «Perecerán» mantiene el matiz de ruina/fin sin forzar un mecanismo concreto.
- source_word: בָּתֵּי הַשֵּׁן
  english_pob_choice: the houses of ivory
  chosen_spanish: las casas de marfil
  alternatives_spanish:
  - las casas adornadas con marfil
  - las casas de marfil pulido
  - las viviendas de marfil
  lexicon: HALOT
  rationale: La forma hebrea es literalmente «casas del marfil». Como en el audit trail inglés, la traducción principal conserva la imagen literal y permite la posible alusión a lujo e incrustaciones de marfil, sin explicitarlo en el texto principal.
- source_word: וְסָפוּ
  english_pob_choice: will come to an end
  chosen_spanish: llegarán a su fin
  alternatives_spanish:
  - serán consumidas
  - serán barridas
  - terminarán
  lexicon: HALOT
  rationale: סוף en este contexto expresa llegar a un final. «Llegarán a su fin» suena natural en español y conserva el resultado de consumación sin agregar la imagen de barrido.
- source_word: בָּתִּים רַבִּים
  english_pob_choice: the great houses
  chosen_spanish: las casas grandes
  alternatives_spanish:
  - muchas casas
  - las casas numerosas
  - las casas señoriales
  lexicon: HALOT
  rationale: Aunque רַבִּים puede ser cuantitativo («muchas»), el contexto de residencias lujosas favorece la idea de casas grandes o prominentes. «Casas grandes» conserva esa posible referencia social sin volverla explícitamente aristocrática.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se traduce naturalmente como «declara». YHWH se rinde como «Yahvé» según el criterio del proyecto, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se transcribe «Yahvé» conforme a la terminología del proyecto y al uso español actual para el nombre divino revelado.
theological_decisions:
- issue: Valor del nombre divino יְהוָה en la fórmula profética final
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - oráculo de Yahvé
  rationale: Se conserva el nombre propio divino, no el sustituto tradicional «SEÑOR», porque el texto hebreo usa el Tetragrámaton de manera explícita. La fórmula profética se mantiene con «declara» para respetar el tono oracular.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de רַבִּים en בָּתִּים רַבִּים
  english_pob_reading: the great houses
  chosen_spanish_reading: las casas grandes
  alternative_spanish_readings:
  - muchas casas
  - las casas señoriales
  rationale: El inglés POB revisó esta expresión desde «many houses» hacia «the great houses» por el contexto de residencias de lujo. En español se refleja con «casas grandes», que mantiene la apertura entre tamaño físico y prominencia social sin cerrarla demasiado.
  doctrine_reference: Contexto literario y social de Amos 3:15; revisión auditada del POB
- issue: Referente de בָּתֵּי הַשֵּׁן
  english_pob_reading: the houses of ivory
  chosen_spanish_reading: las casas de marfil
  alternative_spanish_readings:
  - las casas adornadas con marfil
  - las casas con incrustaciones de marfil
  rationale: Se preserva la literalidad de la imagen hebrea, pero en la nota se deja abierta la interpretación de lujo y decoración con marfil, como hizo el audit trail inglés. No se resuelve de forma dogmática si el material es estructural o decorativo.
  doctrine_reference: HALOT; nota lexical del POB inglés
- issue: Relación sintáctica de עַל
  english_pob_reading: together with
  chosen_spanish_reading: junto con
  alternative_spanish_readings:
  - con
  - al mismo tiempo que
  rationale: La preposición no debe leerse aquí con un valor espacial de «sobre». La traducción mantiene la coordinación de juicio sobre ambas casas, sin exagerar la imagen de impacto físico más allá del hebreo.
  doctrine_reference: Sintaxis hebrea de juicio coordinado
translation_notes:
  revision_awareness: He seguido la revisión auditada del POB inglés que ajustó la frase de coordinación a un registro más formal y, sobre todo, la lectura de רַבִּים hacia «great houses» por contexto. En español reflejo esa decisión con «casas grandes», manteniendo también la literalidad de «casas de marfil» y su alternativa explicativa en nota, como en el trail inglés.
  spanish_consistency_notes:
  - He usado «Yahvé» de forma consistente para יְהוָה.
  - He mantenido el paralelismo «casa de invierno / casa de verano» para reflejar la estructura hebrea.
  - «Casas de marfil» conserva la imagen literal; la nota evita perder la posible referencia a decoración lujosa.
  - No he añadido interpretaciones doctrinales ajenas al verso; el texto permanece en clave profética de juicio.
