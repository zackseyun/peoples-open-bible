revisions:
- from: 'Y el pueblo habló contra Dios y contra Moisés: «¿Por qué nos hiciste salir de Egipto para morir en el desierto? Porque no hay pan ni agua, y detestamos este pan despreciable[a]».'
  to: 'Y el pueblo habló contra Dios y contra Moisés: «¿Por qué nos sacaste de Egipto para morir en el desierto? Pues no hay pan ni agua, y detestamos este pan sin valor[a]».'
