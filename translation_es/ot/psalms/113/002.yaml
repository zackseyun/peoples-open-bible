translation:
  language: es
  text: Que el nombre de Yahvé sea bendito desde ahora y para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Que el nombre de Yahvé sea bendecido».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May ... be
  chosen_spanish: Que ... sea
  alternatives_spanish:
  - Sea ...
  - Ojalá ... sea
  lexicon: HALOT
  rationale: El yiqtol jussivo expresa deseo o bendición, no una afirmación simple. En español, «Que ... sea» transmite de manera natural el valor exhortativo/benedictorio sin endurecer el tono.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nombre
  - fama
  lexicon: HALOT
  rationale: «Nombre» conserva el sentido hebreo de identidad, reputación y presencia representada; «fama» estrecha innecesariamente el campo semántico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española tradicional del proyecto, «Yahvé», en lugar de sustituirlo por un título. Esto mantiene la referencia directa al Tetragrámaton.
- source_word: מְבֹרָךְ
  english_pob_choice: blessed
  chosen_spanish: bendecido
  alternatives_spanish:
  - bendito
  - alabado
  lexicon: HALOT
  rationale: El participio pasivo de ברך admite «bendecido» en español, que expresa bien la bendición pronunciada sobre el nombre. «Alabado» sería más interpretativo y menos preciso lexicográficamente.
- source_word: מֵעַתָּה
  english_pob_choice: from now
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de ahora en adelante
  - desde este momento
  lexicon: HALOT
  rationale: «Desde ahora» reproduce la referencia temporal inmediata con naturalidad y sin añadir matices no presentes en el hebreo.
- source_word: וְעַד עוֹלָם
  english_pob_choice: and forever
  chosen_spanish: y para siempre
  alternatives_spanish:
  - y para siempre jamás
  - y por toda la eternidad
  lexicon: HALOT
  rationale: La construcción indica duración indefinida/perpetua. «Y para siempre» es idiomático y fiel, sin caer en arcaísmo ni ampliar el sentido.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La decisión mantiene el nombre personal de Dios en español y evita la sustitución por un título, conforme a la política del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto fuente y el audit trail en inglés muestran alta concordancia y no registran revisiones textuales relevantes; esta versión sigue la lectura estable y conserva la bendición jussiva del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la terminología del proyecto para יְהוָה.
  - «Bendecido» conserva mejor el valor pasivo de מְבֹרָךְ que una paráfrasis como «alabado».
  - La formulación «desde ahora y para siempre» mantiene el paralelismo temporal del hebreo con español natural.
