  to: 'Habla a los hijos de Israel[a], diciendo: El día quince de este séptimo mes es la fiesta de las enramadas, durante siete días, para Yahvé.'
  rationale: 'Se corrige la redacción para que el español suene natural y digno sin perder la forma fuente: «El día quince» expresa mejor la fecha; «es la fiesta» refleja mejor la cláusula nominal hebrea que «será»; «enramadas» representa con mayor precisión סֻכּוֹת que «cabañas»; y «durante siete días» mejora la fluidez temporal. Se mantiene la nota tradicional sobre «Tabernáculos» y el uso de «Yahvé» conforme al proyecto.'
