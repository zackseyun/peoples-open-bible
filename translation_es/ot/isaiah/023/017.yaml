    issue: «Yahvé atenderá a Tiro» suena poco natural y semánticamente impreciso para יִפְקֹד.
    rationale: En español, «atender a» suele significar prestar atención, atender un cliente o responder a una necesidad. Aquí el hebreo indica una intervención divina decisiva pero no especificada. «Se ocupará de Tiro» conserva mejor esa neutralidad interventiva y es más idiomático.
  - severity: low
