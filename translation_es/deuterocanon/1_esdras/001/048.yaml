revisions:
- from: Y Yahvé, el Dios de sus padres, envió por medio de su ángel para visitar a su pueblo y llamarlos de vuelta[a], porque tuvo compasión de ellos y de su morada[b].
  to: Y el Rey[a] de sus padres, el Dios de sus padres, envió por medio de su ángel[b] para visitar a su pueblo y hacerlos volver, porque tuvo compasión de ellos y de su morada.
  rationale: La revisión elimina la introducción indebida de «Yahvé», restituye la doble designación extraña del griego según el rastro auditado del POB, conserva la nota necesaria sobre esa apertura, mantiene la alternativa léxica de ἄγγελος, y mejora levemente la naturalidad de «llamarlos de vuelta» a «hacerlos volver».
