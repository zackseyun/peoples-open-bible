translation:
  language: es
  text: y Ophir[a], Javilá y Jobab. Todos estos fueron hijos de Joktán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Joktán». El hebreo dice literalmente «hijos de Joktán», pero en contextos genealógicos esa expresión puede abarcar el linaje en un sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - y también
  lexicon: HALOT
  rationale: En esta lista genealógica, la partícula con prefijo de coordinación se refleja naturalmente con la conjunción española 'y'. El marcador de objeto no se expresa en español, y no aporta una función semántica adicional aquí.
- source_word: אוֹפִיר
  english_pob_choice: Ophir
  chosen_spanish: Ophir
  alternatives_spanish:
  - Ofir
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma bíblica reconocible 'Ophir' para mantener consistencia con el uso tradicional en español y con la identificación del nombre como propio.
- source_word: חֲוִילָה
  english_pob_choice: Havilah
  chosen_spanish: Havilá
  alternatives_spanish:
  - Javila
  - Havilah
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con adaptación gráfica natural. Se evita una forma excesivamente anglicada; 'Havilá' mantiene la referencia al nombre hebreo con lectura fluida en español.
- source_word: יוֹבָב
  english_pob_choice: Jobab
  chosen_spanish: Jobab
  alternatives_spanish:
  - Yobab
  lexicon: HALOT
  rationale: Nombre propio. Se conserva la forma bíblica habitual en español 'Jobab', que es clara y establecida.
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos ellos
  - Estos todos
  lexicon: HALOT
  rationale: La expresión resume la lista precedente. 'Todos estos' preserva el valor demostrativo y es natural en español.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: En español, la fórmula genealógica 'hijos de' comunica de manera natural la relación de linaje y conserva el paralelismo del hebreo. Aunque 'sons' en inglés fue conservado por precisión léxica, el español permite 'hijos de' sin perder la referencia genealógica.
- source_word: יָקְטָן
  english_pob_choice: Joktan
  chosen_spanish: Joktán
  alternatives_spanish:
  - Joktan
  - Yoktán
  lexicon: HALOT
  rationale: Nombre propio transliterado según la forma bíblica más natural en español. El acento ayuda a la pronunciación y a la lectura pública.
