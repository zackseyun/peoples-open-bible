translation:
  language: es
  text: 'Los sacerdotes: los hijos de Jedaías[a], de la casa de Jesúa[b], novecientos setenta y tres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hijos de» puede indicar descendientes o miembros de una línea familiar, no sólo hijos inmediatos.
    reason: lexical_alternative
  - marker: b
    text: O «Jesúa», forma que refleja mejor el hebreo postexílico יֵשׁוּעַ; no se toma aquí la equivalencia tradicional «Josué».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֲנִים
  english_pob_choice: The priests
  chosen_spanish: Los sacerdotes
  alternatives_spanish:
  - La clase sacerdotal
  - Los sacerdotes eran
  lexicon: HALOT
  rationale: El sustantivo plural definido introduce un grupo dentro del censo. «Los sacerdotes» conserva el sentido llano y el formato nominal de lista, sin añadir un verbo que el hebreo no expresa.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de
  lexicon: HALOT
  rationale: En contextos genealógicos o censales, בְּנֵי puede señalar linaje o pertenencia a un clan. «Los hijos de» mantiene la estructura formal del hebreo y es natural en español bíblico.
- source_word: יְדַעְיָה
  english_pob_choice: Jedaiah
  chosen_spanish: Jedaías
  alternatives_spanish:
  - Yedaías
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio con la forma española usual en contextos bíblicos. «Jedaías» refleja bien la forma hebrea y es reconocible para el lector hispano.
- source_word: לְבֵית יֵשׁוּעַ
  english_pob_choice: of the house of Jeshua
  chosen_spanish: de la casa de Jesúa
  alternatives_spanish:
  - pertenecientes a la casa de Jesúa
  - de la familia de Jesúa
  lexicon: HALOT
  rationale: בַּיִת en construcción con nombre propio denota casa, familia o linaje. «De la casa de» preserva esa afiliación de clan. Se elige «Jesúa» por reflejar la forma postexílica del nombre hebreo יֵשׁוּעַ en español, sin sustituirlo por la forma litúrgica «Jesús».
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Josué
  lexicon: Nombre propio transliterado
  rationale: En Esdras-Nehemías el nombre postexílico יֵשׁוּעַ se distingue de «Josué». «Jesúa» conserva esa forma y evita confundirlo con el nombre más conocido de Josué.
- source_word: תְּשַׁע מֵאֹת שִׁבְעִים וּשְׁלֹשָׁה
  english_pob_choice: nine hundred seventy-three
  chosen_spanish: novecientos setenta y tres
  alternatives_spanish:
  - novecientos setenta y tres
  lexicon: HALOT
  rationale: La secuencia cardinal suma 973. Se conserva la forma numérica clara y natural en español, sin insertar conjunciones innecesarias.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y el hebreo masorético, sin cambios de sentido respecto del registro de censo. Se mantiene la estructura nominal de la lista y la ambigüedad genealógica de בְּנֵי mediante nota.
  spanish_consistency_notes:
  - Se usa «Jesúa» para יֵשׁוּעַ en este contexto postexílico, en coherencia con una transliteración distintiva frente a «Jesús» y «Josué».
  - Se prefiere «los hijos de» como calco funcional de בְּנֵי porque en listas genealógicas conserva la relación de linaje sin perder naturalidad.
  - No se introduce puntuación interpretativa más allá de los dos puntos tras «Los sacerdotes» para reflejar la estructura de encabezado de lista.
