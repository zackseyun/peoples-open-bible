translation:
  language: es
  text: Entonces el rey de Asiria descubrió una conspiración[a] en Oseas, porque había enviado mensajeros a So[b] rey de Egipto y no había hecho subir[c] tributo al rey de Asiria, año tras año. Y el rey de Asiria lo detuvo[d] y lo ató en prisión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘halló traición en Oseas’. El hebreo dice literalmente ‘halló conspiración en Oseas’, un modismo para detectar una trama o deslealtad política en él.
    reason: lexical_alternative
  - marker: b
    text: ‘So’ es una transliteración del nombre hebreo. La identidad histórica de este rey de Egipto es incierta.
    reason: cultural_note
  - marker: c
    text: O ‘no había hecho subir tributo’ puede expresarse como ‘no había llevado tributo’ o, de manera más dinámica, ‘no había pagado tributo’.
    reason: lexical_alternative
  - marker: d
    text: 'El hebreo distingue dos acciones: el rey de Asiria primero lo detuvo o confinó, y luego lo ató en prisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָא
  english_pob_choice: discovered
  chosen_spanish: descubrió
  alternatives_spanish:
  - encontró
  - detectó
  lexicon: HALOT
  rationale: En este contexto político, el verbo no es un simple hallazgo físico; expresa que el rey de Asiria puso al descubierto la acción oculta de Oseas. «Descubrió» mantiene la idea de desenmascarar la conspiración sin suavizarla.
- source_word: קֶשֶׁר
  english_pob_choice: a conspiracy
  chosen_spanish: una conspiración
  alternatives_spanish:
  - una traición
  - un complot
  lexicon: HALOT
  rationale: El sustantivo designa una trama o conjura política. «Conspiración» conserva bien el valor de rebelión oculta y coincide con la lectura auditada en inglés.
- source_word: בְּהוֹשֵׁעַ
  english_pob_choice: in Hoshea
  chosen_spanish: en Oseas
  alternatives_spanish:
  - contra Oseas
  - en relación con Oseas
  lexicon: HALOT
  rationale: El hebreo usa la preposición con el sentido idiomático de encontrar algo ‘en’ una persona, es decir, en su conducta. «En Oseas» preserva esa construcción sin añadir una glosa interpretativa al texto principal.
- source_word: שָׁלַח מַלְאָכִים
  english_pob_choice: had sent messengers
  chosen_spanish: había enviado mensajeros
  alternatives_spanish:
  - había enviado enviados
  - había despachado mensajeros
  lexicon: HALOT
  rationale: מַלְאָכִים puede ser mensajeros o embajadores. «Mensajeros» es el equivalente léxico más amplio y claro; el contexto diplomático ya hace visible que se trata de una gestión política.
- source_word: סוֹא
  english_pob_choice: So
  chosen_spanish: So
  alternatives_spanish:
  - Seó
  - Sô
  lexicon: HALOT
  rationale: Es un nombre propio transliterado. Se conserva «So» por transparencia textual y porque la identificación histórica del rey egipcio permanece incierta.
- source_word: מִנְחָה
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - ofrenda
  - presente
  lexicon: HALOT
  rationale: En un marco de vasallaje internacional, el sustantivo no significa una ofrenda cultual sino pago de sometimiento. «Tributo» refleja adecuadamente ese valor político.
- source_word: הֶעֱלָה
  english_pob_choice: had not sent up
  chosen_spanish: no había hecho subir
  alternatives_spanish:
  - no había presentado
  - no había pagado
  lexicon: HALOT
  rationale: 'La expresión hebrea es literalmente idiomática: ‘hacer subir’ tributo. «No había hecho subir» mantiene la transparencia del hebreo y evita sustituir el giro por un equivalente más interpretativo como «pagado».'
- source_word: כְּשָׁנָה בְשָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - anualmente
  lexicon: HALOT
  rationale: El hebreo expresa repetición anual. «Año tras año» es idiomático en español y conserva el carácter reiterativo del original.
- source_word: וַיַּעַצְרֵהוּ
  english_pob_choice: confined him
  chosen_spanish: lo detuvo
  alternatives_spanish:
  - lo confinó
  - lo retuvo
  lexicon: HALOT
  rationale: El verbo puede abarcar detener, retener o confinar. Elegí «lo detuvo» porque en español fluye bien como primer paso de la acción y deja espacio para que el siguiente verbo marque la atadura y el encierro.
- source_word: וַיַּאַסְרֵהוּ
  english_pob_choice: bound him
  chosen_spanish: lo ató
  alternatives_spanish:
  - lo encadenó
  - lo sujetó
  lexicon: HALOT
  rationale: El verbo significa básicamente ‘atar’. «Lo ató» conserva la distinción léxica respecto del verbo anterior y permite que el lugar de encierro complete la escena.
- source_word: בֵּית כֶּלֶא
  english_pob_choice: in prison
  chosen_spanish: en la prisión
  alternatives_spanish:
  - en la cárcel
  - en un lugar de confinamiento
  lexicon: HALOT
  rationale: La expresión significa literalmente ‘casa de prisión/confinamiento’. «En la prisión» es una traducción natural y fiel, sin perder la referencia a un lugar de reclusión.
theological_decisions:
- issue: Secuencia de detención e imposición de prisión
  english_pob_reading: 'The Hebrew distinguishes two actions: the king of Assyria first detained or confined Hoshea, then bound him in prison.'
  chosen_spanish_reading: El rey de Asiria primero lo detuvo y luego lo ató en la prisión.
  alternative_spanish_readings:
  - lo confinó y lo ató en prisión
  - lo retuvo y lo ató en la prisión
  rationale: La distinción verbal del hebreo se preserva en español con dos acciones separadas. Aunque «detuvo» no agota todo el rango posible de וַיַּעַצְרֵהוּ, combinado con «lo ató en la prisión» comunica bien la progresión sin borrar la diferencia documentada por la revisión inglesa.
  doctrine_reference: No aplica; decisión de dinámica verbal y narración histórica.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado: se conserva «So» como nombre propio sin coma interna, se mantiene la lectura literal de «year by year» como repetición anual, y se preserva la distinción entre la detención previa y el acto de atarlo en prisión. La variante textual/interpretativa principal documentada en inglés para קֶשֶׁר se refleja en la nota [a].'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda en otros pasajes; aquí no aparece el Tetragrámaton.
  - Se mantiene «Asiria» y «Egipto» como nombres geopolíticos establecidos.
  - «Oseas» sigue la forma española habitual del nombre del rey de Israel, sin alterar la referencia histórica.
  - La puntuación reproduce una cadencia narrativa natural en español sin introducir explicaciones ajenas al verso.
