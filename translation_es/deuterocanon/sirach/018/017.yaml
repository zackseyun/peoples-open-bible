translation:
  language: es
  text: ¿No es una palabra mejor que un buen regalo? Y ambas están con un hombre amable[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «discurso» o «dicho»; el griego contrapone una palabra pronunciada con un regalo material.
    reason: lexical_alternative
  - marker: b
    text: O «ambas se hallan en un hombre amable». La frase griega puede indicar que las dos cualidades pertenecen a tal hombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἰδοὺ
  english_pob_choice: Is not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿Acaso no es?
  - ¿No es acaso?
  lexicon: LSJ
  rationale: La combinación funciona como introducción retórica a una pregunta. En español, «¿No es…?» transmite naturalmente esa fuerza interrogativa sin añadir un calco arcaizante como «he aquí».
- source_word: λόγος
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un decir
  - una palabra dicha
  - una expresión
  lexicon: LSJ
  rationale: Aquí λόγος contrasta con un don material y puede referirse a una respuesta verbal. «Palabra» conserva el valor proverbial y breve del griego; «palabra» es la forma más natural en español para esta oposición.
- source_word: ὑπὲρ
  english_pob_choice: better than
  chosen_spanish: mejor que
  alternatives_spanish:
  - por encima de
  - más que
  lexicon: LSJ
  rationale: En esta construcción comparativa, ὑπέρ expresa superioridad. «Mejor que» reproduce el sentido evaluativo del proverbio en español de manera clara y directa.
- source_word: δόμα ἀγαθόν
  english_pob_choice: a good gift
  chosen_spanish: un buen regalo
  alternatives_spanish:
  - un don bueno
  - un regalo generoso
  lexicon: LSJ
  rationale: δόμα significa regalo o don, y ἀγαθόν califica su calidad. «Buen regalo» mantiene el contraste con la palabra dicha y suena natural en español contemporáneo.
- source_word: ἀμφότερα
  english_pob_choice: both
  chosen_spanish: ambas
  alternatives_spanish:
  - las dos cosas
  - ambos
  lexicon: LSJ
  rationale: El pronombre remite a la palabra y al regalo. «Ambas» conserva la referencia dual sin repetir innecesariamente los sustantivos.
- source_word: παρὰ
  english_pob_choice: are with
  chosen_spanish: están con
  alternatives_spanish:
  - pertenecen a
  - se hallan con
  lexicon: LSJ
  rationale: Con παρά más dativo de persona, el sentido es que estas cualidades se encuentran en la esfera o posesión de tal persona. «Están con» conserva el giro griego sin volverlo demasiado abstracto.
- source_word: ἀνδρὶ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: LSJ
  rationale: El griego usa un dativo singular masculino. Se mantiene «hombre» por fidelidad al singular representativo masculino del original y al criterio del proyecto de no neutralizar sin base textual.
- source_word: κεχαριτωμένῳ
  english_pob_choice: gracious
  chosen_spanish: graciado
  alternatives_spanish:
  - agraciado
  - lleno de gracia
  - benevolente
  lexicon: LSJ
  rationale: El participio está relacionado con lenguaje de gracia/favor. Para no borrar la tensión entre favor recibido y conducta graciosa, se usa «graciado», que refleja esa condición marcada por gracia; se evita «agraciado» por su ambigüedad estética moderna y «lleno de gracia» por sonar más teológico que el proverbio.
theological_decisions:
- issue: Cómo verter κεχαριτωμένῳ sin desplazar el matiz de favor/gracia
  english_pob_reading: gracious man
  chosen_spanish_reading: un hombre graciado
  alternative_spanish_readings:
  - un hombre lleno de gracia
  - un hombre favorecido
  rationale: La frase griega puede indicar a alguien caracterizado por gracia o favor, y el auditable inglés opta por «gracious». En español, «graciado» permite conservar el nexo con χάρις sin imponer de entrada una lectura exclusivamente devocional o meramente cortesana.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Singular masculino representativo en literatura sapiencial
  english_pob_reading: a gracious man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  rationale: El original tiene ἀνδρὶ, forma masculina singular. Se conserva el masculino representativo conforme a la política del proyecto y al valor proverbial del dicho.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El cotejo de revisión indica alta concordancia y ningún cambio requerido; esta versión conserva el contraste proverbial entre palabra y regalo, mantiene el masculino singular del griego y explicita en español el matiz de gracia/favor de κεχαριτωμένῳ sin sobreteologizarlo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «Cristo» y no hay terminología cristológica en este pasaje.
  - «Hombre» se conserva por fidelidad al singular masculino del griego y por coherencia con la política del proyecto.
  - Las notas a y b separan la alternativa léxica de λόγος y la alternativa semántica de la cláusula final, como en el expediente inglés.
