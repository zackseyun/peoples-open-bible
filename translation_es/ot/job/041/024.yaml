translation:
  language: es
  text: Detrás de él resplandece un sendero[a]; se pensaría que la profundidad parece canosa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Después de él resplandece un sendero». El hebreo admite un matiz temporal («después de») o espacial («detrás de»); el contexto del paso de Leviatán por el agua favorece «detrás de».'
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «la profundidad para canicie / para canas». La imagen es la del mar o de las aguas profundas blanqueadas por la espuma, como si se vieran canosas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  english_pob_choice: Behind him
  chosen_spanish: Detrás de él
  alternatives_spanish:
  - Después de él
  lexicon: HALOT
  rationale: El hebreo puede leerse en sentido espacial o temporal. En este cuadro poético del movimiento de Leviatán por el agua, el sentido espacial expresa mejor la estela que deja tras de sí.
- source_word: יָאִיר
  english_pob_choice: shines
  chosen_spanish: resplandece
  alternatives_spanish:
  - brilla
  - da luz
  - se ilumina
  lexicon: HALOT
  rationale: El hifil de אור puede significar 'dar luz' o 'resplandecer'. En español, 'resplandece' comunica bien la visibilidad luminosa del rastro dejado en el agua sin sonar mecánico.
- source_word: נָתִיב
  english_pob_choice: a path
  chosen_spanish: un sendero
  alternatives_spanish:
  - un camino
  - una huella
  - una estela
  lexicon: HALOT
  rationale: El sustantivo designa un camino o vía; aquí funciona metafóricamente para la estela luminosa en el agua. 'Sendero' mantiene la imagen de camino sin perder naturalidad en español.
- source_word: יַחְשֹׁב
  english_pob_choice: one would think
  chosen_spanish: se pensaría
  alternatives_spanish:
  - uno pensaría
  - parecería
  - se cree
  lexicon: HALOT
  rationale: Aunque la forma es 3ms, en hebreo puede funcionar impersonalmente. 'Se pensaría' conserva el matiz de impresión del observador y suena natural en español.
- source_word: תְּהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - el mar profundo
  - la profundidad
  lexicon: HALOT
  rationale: El término puede referirse a las aguas profundas. En este verso, el efecto visual del mar cubierto de espuma se expresa bien con 'abismo', sin cerrar indebidamente la imagen.
- source_word: לְשֵׂיבָה
  english_pob_choice: to be gray-haired
  chosen_spanish: canoso
  alternatives_spanish:
  - de canas
  - de cabello blanco
  - gris
  lexicon: HALOT
  rationale: La imagen apunta al blanco o gris del agua espumosa, como si el abismo estuviera 'encanecido'. 'Canoso' conserva esa metáfora visual en un español claro y bíblicamente digno.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la resolución auditada de la POB inglesa: lectura espacial de אַחֲרָיו, verbo de brillo para יָאִיר, imagen metafórica de camino/estela para נָתִיב, y la metáfora visual de ''gray-haired'' aplicada al abismo. No se detectaron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se preserva 'Yahvé' por defecto solo cuando aparece el Tetragrámaton; en este versículo no aplica.
  - Se evitó 'Señor' o formulaciones litúrgicas ajenas al hebreo.
  - '''Abismo'' mantiene el valor poético de תְּהוֹם sin precisar ''océano'' ni ''mar'' más de lo que exige el verso.'
  - '''Canoso'' recoge la imagen de blancura/hoariness sin convertirla en mera descripción de edad humana.'
