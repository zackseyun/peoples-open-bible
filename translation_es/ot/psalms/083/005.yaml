    rationale: Debe escribirse «borrémoslos»; además, conviene ajustar la alternativa a un español natural y fiel.
  - severity: low
    issue: «no sea recordado más» es aceptable, pero puede mejorarse en naturalidad y fuerza.
    rationale: «No sea recordado nunca más» suena más natural en español bíblico moderno y encaja con la intención de borrar por completo la memoria del nombre de Israel.
