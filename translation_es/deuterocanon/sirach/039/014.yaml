translation:
  language: es
  text: Alcen sus voces y bendigan juntos[a], y den gracias a Yahvé por todas sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Y como incienso difundan fragancia, y florezcan como un lirio; esparzan fragancia y canten un canto de alabanza». Esta redacción refleja una forma textual distinta y más plena que la línea hebrea conservada.'
    reason: alternative_reading
lexical_decisions:
- source_word: הרימו
  english_pob_choice: Raise
  chosen_spanish: Alcen
  alternatives_spanish:
  - Levanten
  - Elevan
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural con sentido de elevar o alzar la voz. «Alcen» conserva la imagen concreta y suena natural en español bíblico contemporáneo.
- source_word: קולכם
  english_pob_choice: your voices
  chosen_spanish: sus voces
  alternatives_spanish:
  - su voz
  - sus sonidos
  lexicon: HALOT
  rationale: Aunque el hebreo usa un sustantivo en singular con sufijo plural, el contexto exige plural en español por el imperativo plural. «Sus voces» refleja mejor la concordancia y la revisión inglesa más reciente.
- source_word: וברכו
  english_pob_choice: and bless
  chosen_spanish: y bendigan
  alternatives_spanish:
  - y alaben
  - y bendecid
  lexicon: HALOT
  rationale: ברך en el pi'el mantiene el valor de «bendecir» en lenguaje litúrgico. En español, «bendigan» preserva esa dicción sin sustituirla por un simple «alaben».
- source_word: יחדו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - como uno
  lexicon: HALOT
  rationale: El adverbio expresa acción comunitaria. «Juntos» es claro, directo y estilísticamente apropiado.
- source_word: והודו
  english_pob_choice: and give thanks
  chosen_spanish: y den gracias
  alternatives_spanish:
  - y agradezcan
  - y confiesen
  lexicon: HALOT
  rationale: La forma verbal se usa en contextos de culto con el sentido de dar gracias. «Den gracias» comunica esa acción de manera natural y fiel.
- source_word: ליהוה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo tiene el nombre divino YHWH; la norma del proyecto es traducirlo como «Yahvé». Se evita el sustituto litúrgico «SEÑOR» para mantener transparencia textual.
- source_word: על כל מעשיו
  english_pob_choice: for all his works
  chosen_spanish: por todas sus obras
  alternatives_spanish:
  - por todos sus hechos
  - por todo lo que ha hecho
  lexicon: HALOT
  rationale: «מעשים» puede rendirse como obras o hechos. «Obras» conserva el tono bíblico de alabanza y la relación con la creación/acción divina sin volverlo demasiado explicativo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El hebreo conserva el Tetragrámaton. Siguiendo la política del proyecto, se usa el nombre propio «Yahvé» para no ocultar el dato textual y mantener la transparencia de la fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre el hebreo conservado y el paralelo griego más amplio
  english_pob_reading: Main text follows the extant Hebrew exhortation; the Greek parallel is preserved in a footnote as a fuller alternative tradition.
  chosen_spanish_reading: El texto principal sigue la exhortación hebrea conservada; el paralelo griego se documenta en nota como tradición alternativa más amplia.
  alternative_spanish_readings:
  - Traducir la forma griega más amplia en el cuerpo principal
  - Omitir la nota griega
  rationale: El testimonio hebreo disponible es coherente y de alta confianza, mientras que el griego ofrece una forma poética más extensa y distinta. Para no borrar esa tensión textual, se mantiene el hebreo en el texto principal y se registra el griego en nota.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; use Greek parallel as actual input while keeping Hebrew primary'
translation_notes:
  revision_awareness: La base inglesa revisó «your voice» a «your voices» para concordar con el imperativo plural; el español ya incorpora esa precisión con «sus voces». También se conservó la decisión auditada de usar Yahvé para el Tetragrámaton y de documentar el paralelo griego en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto para יהוה.
  - Se eligió un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - La nota reproduce el sentido amplio del paralelo griego sin imponerlo sobre el hebreo principal.
  - «Bendigan» y «den gracias» conservan el tono litúrgico del exhorto comunitario.
