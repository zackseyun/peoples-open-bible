review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca la POB inglesa: mantiene la analogía de כֵּן, la referencia a la sabiduría, la condición de hallarla, la idea de אַחֲרִית como perspectiva futura y la metáfora de la esperanza no ''cortada''. Sin embargo, el anclaje de las notas no coincide con la evidencia auditada: la nota [a] en inglés corresponde a אַחֲרִית (''future/outcome/end''), mientras que la [b] corresponde a ''for your soul'' (לְנַפְשֶׁךָ). El español actual reasigna [a] a ''si la encuentras'' y [b] a ''un futuro'', lo que rompe la trazabilidad del aparato y omite la nota sobre ''alma''.'
  spanish_quality_summary: El español es claro y digno. No obstante, 'Reconoce' para דְּעֶה es menos directo que 'Sabe' y suena más interpretativo que el imperativo simple del hebreo. Además, 'entonces hay un futuro' es comprensible, pero 'hay futuro' suena más idiomático en español bíblico y general. La frase 'no será cortada' preserva la metáfora, aunque resulta algo rígida; aun así es aceptable y fiel.
  glossary_alignment: 'No hay conflictos con la terminología global del proyecto. ''Sabiduría'', ''alma'' y ''esperanza'' están bien alineadas. La principal desviación no es terminológica sino de notas: falta una nota para ''alma'' y la nota sobre אַחֲרִית está mal marcada.'
  issues:
  - severity: high
    issue: Las notas al pie no siguen la asignación semántica auditada por la POB inglesa.
    rationale: La POB inglesa documenta una nota para אַחֲרִית y otra para 'for your soul'. El borrador español pone [a] en 'si la encuentras' y [b] en 'un futuro', dejando sin nota 'alma'. Esto afecta la trazabilidad y la fidelidad al expediente lexical.
  - severity: medium
    issue: '''Reconoce'' es una elección menos fiel que ''Sabe'' para דְּעֶה.'
    rationale: El imperativo ידע se vierte más naturalmente y con mayor precisión como 'Sabe' o 'Conoce'. 'Reconoce' añade un matiz de admitir o aceptar que no es necesario en el hebreo.
  - severity: low
    issue: '''Entonces hay un futuro'' es menos idiomático que ''entonces hay futuro'' o ''hay un porvenir''.'
    rationale: El sentido es correcto, pero en español la construcción sin artículo suele sonar más natural en este tipo de enunciado sapiencial.
  revised_spanish_text: 'Sabe que la sabiduría es así para tu alma[a]: si la encuentras, entonces hay futuro[b], y tu esperanza no será cortada.'
