translation:
  language: es
  text: Y se reunieron con él todas las fuerzas que Demetrio había[a] despedido, y pelearon contra él; y huyó y fue puesto en fuga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había enviado lejos» o «había dado de baja». El verbo griego puede denotar apartar tropas del servicio o despedirlas de la presencia de alguien; el contexto favorece una destitución militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνήχθησαν
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: LSJ
  rationale: El aoristo pasivo con πρὸς αὐτόν expresa que las fuerzas se juntaron en torno a él para sumarse al conflicto. En español, «se reunieron» conserva bien la idea de convergencia militar sin volver el texto rígido o excesivamente literal.
- source_word: δυνάμεις
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - tropas
  - ejércitos
  lexicon: LSJ
  rationale: En este contexto bélico, δυνάμεις designa contingentes armados. «Fuerzas» reproduce con naturalidad la amplitud militar del término y evita la especificidad potencialmente excesiva de «tropas» o «ejércitos».
- source_word: ἀπεκρόακεν
  english_pob_choice: had dismissed
  chosen_spanish: había despedido
  alternatives_spanish:
  - había enviado away
  - había descargado
  lexicon: LSJ
  rationale: El verbo griego puede referirse a apartar o remover de servicio a soldados. «Había despedido» comunica el acto de enviar fuera o dar de baja, y deja abierta la ambigüedad entre separación administrativa y militar que el contexto sugiere.
- source_word: ἐπολέμησαν πρὸς αὐτόν
  english_pob_choice: they fought against him
  chosen_spanish: pelearon contra él
  alternatives_spanish:
  - combatieron contra él
  - hicieron guerra contra él
  lexicon: LSJ
  rationale: La preposición πρὸς con el verbo aquí es claramente adversativa. «Pelearon contra él» es idiomático en español y conserva el sentido frontal de hostilidad bélica.
- source_word: ἔφυγεν
  english_pob_choice: he fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: LSJ
  rationale: El aoristo narrativo es breve y directo. «Huyó» mantiene la concisión del griego y el tono militar del relato.
- source_word: ἐτροπώθη
  english_pob_choice: was routed
  chosen_spanish: fue derrotado
  alternatives_spanish:
  - fue puesto en fuga
  - fue desbaratado
  lexicon: LSJ
  rationale: El pasivo de τρέπω en contexto militar puede significar ser hecho retroceder o puesto en fuga. «Fue derrotado» es más natural para el español bíblico actual; aunque atenúa la imagen táctica de «routed», sigue expresando una derrota militar real sin sonar forzado.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en la secuencia narrativa y en la lectura militar de los términos clave. Se mantuvo la tensión lexical de ἀπεκρόακεν con una nota, pero en español se prefirió una forma natural y transparente que no sobrecarga el verso.
  spanish_consistency_notes:
  - Se usó «fuerzas» para δυνάμεις, en coherencia con el registro militar y con el criterio inglés.
  - Se prefirió «huyó» para ἔφυγεν por su concisión narrativa.
  - «Fue derrotado» se eligió por fluidez en español, aunque la nota preserva la posibilidad de un matiz más técnico de «routed».
  - No se introdujeron términos eclesiásticos ni interpretativos ajenos al campo militar del versículo.
