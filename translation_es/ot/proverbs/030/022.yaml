translation:
  language: es
  text: Bajo un esclavo cuando llega a ser rey[a], y un necio cuando se sacia de pan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando reina». El verbo hebreo también puede expresar el hecho de reinar, pero aquí «cuando llega a ser rey» hace más explícito el cambio de condición social.
    reason: lexical_alternative
  - marker: b
    text: «Pan» también puede representar más ampliamente «comida» o «alimento».
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּֽחַת
  english_pob_choice: under
  chosen_spanish: Debajo de
  alternatives_spanish:
  - bajo
  - en lugar de
  - por causa de
  lexicon: HALOT
  rationale: El hebreo תַּחַת introduce aquí la condición o situación que provoca desconcierto. «Debajo de» conserva la imagen espacial compacta del original y sugiere la idea de una inversión de orden; «en lugar de» sería posible, pero desplaza el énfasis hacia sustitución más que hacia condición.
- source_word: עֶ֭בֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: עֶבֶד designa una persona en condición de servidumbre o esclavitud. Dado que el contexto proverbia la inversión social, «esclavo» mantiene con más fuerza el contraste que «siervo», y sigue la decisión inglesa de conservar la dureza lexical.
- source_word: כִּ֣י
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - si
  - que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la circunstancia temporal en que ocurre la inversión social. «Cuando» es la equivalencia natural en español y evita una lectura causal que no es la principal en el proverbio.
- source_word: יִמְל֑וֹךְ
  english_pob_choice: he becomes king
  chosen_spanish: reina
  alternatives_spanish:
  - llega a reinar
  - se hace rey
  - comienza a reinar
  lexicon: HALOT
  rationale: El verbo puede significar «reinar» o «llegar a ser rey». En español, «reina» comunica de forma breve y proverbial el ejercicio de la realeza; se conserva en nota la alternativa de sentido inceptivo reflejada por la traducción inglesa.
- source_word: נָבָ֗ל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - fool
  - insensato
  - hombre necio
  lexicon: HALOT
  rationale: En literatura sapiencial, נָבָל no describe solo falta de inteligencia sino una torpeza moral y social. «Necio» es un término natural en español bíblico y mantiene esa carga sapiencial sin volverlo meramente coloquial.
- source_word: יִֽשְׂבַּֽע
  english_pob_choice: he is filled
  chosen_spanish: se sacia
  alternatives_spanish:
  - queda lleno
  - se llena
  - queda satisfecho
  lexicon: HALOT
  rationale: El verbo expresa estar colmado o harto. «Se sacia» reproduce bien la idea de plenitud corporal y puede implicar también exceso, sin añadir más de lo que el hebreo exige.
- source_word: לָֽחֶם
  english_pob_choice: bread
  chosen_spanish: de pan
  alternatives_spanish:
  - de comida
  - de alimento
  lexicon: HALOT
  rationale: לָחֶם es literalmente «pan», y el inglés POB preserva esa imagen. En español, «de pan» mantiene el símbolo de sustento básico; «de comida» o «de alimento» generalizarían el término y debilitarían la concreción del proverbio.
translation_notes:
  revision_awareness: La versión española sigue el trazado del texto hebreo y la decisión inglesa de mantener la imagen proverbial compacta. Se preservó el paralelismo sintético entre el ascenso del esclavo y la saciedad del necio, con ajustes mínimos para que el verso suene natural en español sin perder la tensión léxica del original.
  spanish_consistency_notes:
  - Se mantuvo «pan» para conservar la imagen concreta de לָחֶם, en paralelo con la nota inglesa.
  - Se eligió «esclavo» en lugar de «siervo» para respetar la fuerza social del contraste proverbial.
  - «Necio» conserva el registro sapiencial y evita reducir el término a simple falta de inteligencia.
  - La puntuación reproduce la coordinación hebrea con una coma antes de la segunda cola del verso.
