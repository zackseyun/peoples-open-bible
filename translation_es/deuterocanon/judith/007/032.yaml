translation:
  language: es
  text: Y dispersó al pueblo a su campamento[a], y fueron a los muros y a las torres de su ciudad, y envió a las mujeres y a los niños a sus casas; y estaban en gran humillación[b] en la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene un verbo singular («fue»), pero el contexto apunta a los mismos dispersados como los que van a los muros y las torres; por eso se expresa aquí el sentido distributivo/plural.
    reason: textual_variant
  - marker: b
    text: O «en gran aflicción». La expresión griega puede denotar ser abatidos o rebajados, con matices de humillación, sufrimiento o miseria.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσκόρπισεν
  english_pob_choice: dispersed
  chosen_spanish: dispersó
  alternatives_spanish:
  - esparció
  - diseminó
  lexicon: BDAG
  rationale: El verbo expresa la acción de separar y distribuir a un grupo; «dispersó» conserva bien ese sentido sin añadir una tonalidad excesiva de caos.
- source_word: λαός
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - población
  lexicon: BDAG
  rationale: En este contexto se trata del conjunto de los habitantes reunidos, no de un cuerpo militar técnico; «pueblo» es natural y fiel al alcance amplio del término.
- source_word: παρεμβολή
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - real
  lexicon: BDAG
  rationale: «Campamento» transmite de manera clara el lugar de reunión o asentamiento; en español resulta más natural que un calco más técnico.
- source_word: ἀπῆλθεν
  english_pob_choice: they went away
  chosen_spanish: se dirigió
  alternatives_spanish:
  - se alejaron
  - partieron
  lexicon: BDAG
  rationale: Aunque la forma griega es singular en el texto citado, el contexto apunta a una referencia distributiva al pueblo dispersado. En español se opta por una formulación que mantiene la fluidez narrativa y deja visible la tensión textual en la nota.
- source_word: τείχη
  english_pob_choice: walls
  chosen_spanish: muros
  alternatives_spanish:
  - murallas
  - paredes
  lexicon: BDAG
  rationale: «Muros» es un equivalente directo y sobrio; «murallas» también sería posible, pero «muros» evita una especificación más interpretativa.
- source_word: πύργους
  english_pob_choice: towers
  chosen_spanish: torres
  alternatives_spanish:
  - torretas
  - torres de vigilancia
  lexicon: BDAG
  rationale: El término básico es suficiente; no hay indicio en el verso de que deba especificarse «de vigilancia».
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  - mandó
  lexicon: BDAG
  rationale: El verbo indica poner a las mujeres y a los niños en camino hacia sus casas; «envió» es neutral y claro en español.
- source_word: οἴκους
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - moradas
  lexicon: BDAG
  rationale: «Casas» sigue de cerca el sentido material del griego y evita una carga más devocional que no está exigida por el texto.
- source_word: ταπείνωσις
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - aflicción
  - abatimiento
  - angustia
  lexicon: BDAG
  rationale: La frase describe un estado de abatimiento profundo. «Humillación» conserva la idea de estar rebajados o avergonzados, como en la elección inglesa.
- source_word: πολλῇ
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - mucha
  - profunda
  lexicon: BDAG
  rationale: «Gran» funciona como intensificador idiomático natural en español y mantiene el valor enfático del adjetivo.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión auditada del inglés: mantiene «campamento» sin el posesivo «propio», armoniza «muros y torres» y traduce el final con una intensificación natural («gran humillación») sin perder la ambigüedad lexical del griego. También conserva la tensión textual de ἀπῆλθεν mediante una nota explicativa.'
  spanish_consistency_notes:
  - Se usa «Y» inicial para reflejar la coordinación narrativa del griego.
  - Se mantiene un registro bíblico moderno y sobrio, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
  - «Humillación» se conserva como término principal, con «aflicción» en nota para no borrar la amplitud semántica de ταπείνωσις.
  - Las preposiciones y artículos se ajustan a la sintaxis natural del español sin añadir información no presente en el texto fuente.
