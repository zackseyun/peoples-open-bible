translation:
  language: es
  text: El crisol es para la plata[a], y el horno para el oro; pero Yahvé prueba los corazones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El crisol es para la plata, y el horno para el oro, y Yahvé examina los corazones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַצְרֵף
  english_pob_choice: crucible
  chosen_spanish: crisola
  alternatives_spanish:
  - crisol
  - vasija de fundición
  lexicon: HALOT
  rationale: El término hebreo designa un recipiente o instrumento de refinado de metales. En español, «crisola» conserva bien la imagen metalúrgica y suena natural en un proverbio; «crisol» también sería posible, pero «crisola» evita cierta ambigüedad figurada en uso moderno.
- source_word: לַכֶּסֶף
  english_pob_choice: for silver
  chosen_spanish: para la plata
  alternatives_spanish:
  - para la plata
  - para la plata refinada
  lexicon: HALOT
  rationale: La preposición ל expresa finalidad o relación de uso. «Para la plata» reproduce esa función de manera idiomática en español y mantiene el paralelismo proverbial sin añadir precisión inexistente en el hebreo.
- source_word: כּוּר
  english_pob_choice: furnace
  chosen_spanish: horno
  alternatives_spanish:
  - horno de fundición
  - furnace
  lexicon: HALOT
  rationale: El vocablo hebreo nombra un horno usado para fundir o refinar metales. «Horno» es la equivalencia breve y clara en español; el contexto metalúrgico ya queda asegurado por el paralelismo con la «crisola».
- source_word: לַזָּהָב
  english_pob_choice: for gold
  chosen_spanish: para el oro
  alternatives_spanish:
  - para el oro
  - para el oro refinado
  lexicon: HALOT
  rationale: Como en la primera cola, la ל indica destino o aplicación. «Para el oro» conserva la economía proverbial y la simetría con «para la plata».
- source_word: וּבֹחֵן
  english_pob_choice: tests
  chosen_spanish: prueba
  alternatives_spanish:
  - examina
  - somete a prueba
  - prueba
  lexicon: HALOT
  rationale: El participio de בחן puede expresar probar, examinar o poner a prueba para revelar autenticidad. «Prueba» mantiene la fuerza evaluativa y la correspondencia con la imagen de refinamiento del metal, sin desplazarla hacia un simple examen intelectual.
- source_word: לִבּוֹת
  english_pob_choice: hearts
  chosen_spanish: los corazones
  alternatives_spanish:
  - corazones
  - las mentes
  - el interior
  lexicon: HALOT
  rationale: En antropología hebrea, «corazón» designa el centro interior de la persona, incluyendo pensamientos y voluntad. «Los corazones» preserva la metáfora bíblica y su plural hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme al criterio del proyecto, en lugar de sustituirlo por un título. Así se conserva el nombre propio divino que aparece en el hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה en un proverbio de sabiduría
  english_pob_reading: Yahweh tests hearts
  chosen_spanish_reading: Yahvé prueba los corazones
  alternative_spanish_readings:
  - Yahvé examina los corazones
  - el SEÑOR prueba los corazones
  rationale: El hebreo usa el nombre propio divino, no un simple título. «Yahvé» preserva esa referencia personal y de pacto; «prueba» mantiene el paralelo entre el refinamiento de metales y el discernimiento divino del interior humano.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de בחן aplicada al interior humano
  english_pob_reading: tests hearts
  chosen_spanish_reading: prueba los corazones
  alternative_spanish_readings:
  - examina los corazones
  - somete a prueba los corazones
  rationale: En este contexto sapiencial, la acción divina se compara con el proceso de evaluar la pureza del metal. «Prueba» conserva tanto la idea de evaluación como la de autenticidad revelada, sin introducir un matiz más forense o psicológico de lo que exige el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo masorético y con el audit trail inglés: se conserva la metáfora metalúrgica, la estructura paralela y la decisión de traducir el nombre divino como «Yahvé». No se detectaron revisiones pendientes en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético con dos miembros nominales seguidos de una cláusula verbal adversativa.
  - Se prefirió «los corazones» para reflejar el plural hebreo לִבּוֹת y conservar el sentido antropológico bíblico.
  - Se evitó «SEÑOR» para no ocultar el Tetragrámaton, conforme al criterio del proyecto.
  - 'La nota al pie recoge la alternativa lexical documentada en inglés: «examina» frente a «prueba».'
