  lexicon: LSJ
  rationale: La frase repite la raíz de ἀδύνατον y modifica a ᾅδου μυχῶν. Se conserva la repetición léxica en español con «impotente» para no borrar el juego verbal del griego, aunque la sintaxis resulta comprimida.
- source_word: ᾅδου
