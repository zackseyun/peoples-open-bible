    rationale: El hebreo שַׁחַת aquí, en contexto de caza, apunta a una fosa/hoyo de captura. «Pozo» en español tiende a evocar un pozo de agua y debilita la imagen concreta que el inglés POB quiso preservar con «pit» y la nota alternativa «trap».
  - severity: low
    issue: «oyeron de él» suena algo forzado
