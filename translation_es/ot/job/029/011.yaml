translation:
  language: es
  text: Porque cuando un oído oyó, me llamaba bienaventurado, y cuando un ojo vio, testificó por mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dio testimonio de mí». El verbo hebreo puede significar testificar o dar testimonio; en contexto, se trata de un testimonio favorable sobre Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  - En efecto
  lexicon: HALOT
  rationale: Aquí introduce la explicación del honor anterior de Job; «Porque» conserva la relación causal y funciona naturalmente en español al abrir la cláusula.
- source_word: אֹזֶן
  english_pob_choice: an ear
  chosen_spanish: un oído
  alternatives_spanish:
  - un oído humano
  - una oreja
  - el oído
  lexicon: HALOT
  rationale: El hebreo usa un singular genérico para cualquier oyente. «Un oído» mantiene la imagen corporal y la generalidad; «oído» suena más natural que «oreja» en este registro.
- source_word: שָׁמְעָה
  english_pob_choice: heard
  chosen_spanish: oía
  alternatives_spanish:
  - oyó
  - escuchaba
  lexicon: HALOT
  rationale: El verbo expresa simple percepción auditiva en paralelo con «veía». «Oía» preserva el aspecto descriptivo y la generalización del original.
- source_word: וַתְּאַשְּׁרֵנִי
  english_pob_choice: called me blessed
  chosen_spanish: me llamaba bienaventurado
  alternatives_spanish:
  - me declaraba bienaventurado
  - me tenía por feliz
  - me pronunciaba bienaventurado
  lexicon: HALOT
  rationale: El verbo de אשר comunica declarar a alguien en estado favorecido. «Bienaventurado» conserva la evaluación positiva fuerte del texto; se evita «feliz» por ser demasiado débil en español contemporáneo.
- source_word: וְעַיִן
  english_pob_choice: and when an eye
  chosen_spanish: y cuando un ojo
  alternatives_spanish:
  - y cuando un ojo humano
  - y un ojo
  - y cuando el ojo
  lexicon: HALOT
  rationale: Se mantiene el paralelismo de un observador genérico. «Un ojo» refleja la singularidad hebrea y la repetición estructural con «un oído».
- source_word: רָאֲתָה
  english_pob_choice: saw
  chosen_spanish: veía
  alternatives_spanish:
  - vio
  - miraba
  lexicon: HALOT
  rationale: La percepción visual se expresa de modo directo. «Veía» conserva el paralelismo imperfectivo con «oía» y la escena típica de reconocimiento continuado.
- source_word: וַתְּעִידֵנִי
  english_pob_choice: it testified for me
  chosen_spanish: daba testimonio de mí
  alternatives_spanish:
  - testificaba a favor de mí
  - me daba testimonio
  - atestiguaba por mí
  lexicon: HALOT
  rationale: El verbo עוד/עיד puede significar testificar o dar testimonio. En el contexto favorable de Job, «daba testimonio de mí» conserva la ambigüedad de un testimonio favorable sin sobreespecificar demasiado.
theological_decisions:
- issue: Naturaleza del testimonio del observador
  english_pob_reading: in context it is favorable testimony about Job
  chosen_spanish_reading: el testimonio es favorable respecto de Job
  alternative_spanish_readings:
  - testimonio en favor de Job
  - testimonio acerca de Job
  rationale: El hebreo permite «testimoniar contra/por» según contexto. Aquí, siguiendo la lectura inglesa auditada, el sentido es positivo; por eso se expresa con una fórmula neutra que en español sigue dejando ver que el testimonio es favorable.
  doctrine_reference: none
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión inglesa no modificó el texto base y que el control cruzado reportó alta concordancia con solo observaciones menores; por eso se mantiene el sentido auditado sin introducir cambios interpretativos nuevos.
  spanish_consistency_notes:
  - Se conserva el paralelismo oído/ojo para reflejar la estructura hebrea.
  - Se prefiere un registro bíblico claro pero natural en español latinoamericano.
  - Se evita sustituir el testimonio favorable por una formulación más técnica que oscurezca el tono evaluativo del pasaje.
