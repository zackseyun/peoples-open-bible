review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente la estructura bipartita del hebreo y el sentido central: el hombre injusto resulta aborrecible para los justos, y el de camino recto resulta aborrecible para el malvado/impío. Sin embargo, en español suena más natural invertir el orden nominal marcado del hebreo sin perder el paralelismo. Además, conviene conservar la alternativa documentada para תּוֹעֲבַת y aclarar la expresión hebrea ''recto de camino''.'
  spanish_quality_summary: El texto actual es comprensible y bastante fiel, pero 'Abominación para los justos es...' suena rígido y poco natural en español contemporáneo. 'El recto en su camino' es entendible, aunque más idiomático y cercano al audit trail sería 'el que es recto en su camino' o 'el de camino recto'. La revisión propuesta mejora fluidez y legibilidad sin perder literalidad ni la metáfora sapiencial de 'camino'.
  glossary_alignment: No hay términos de glosario mayor en juego como Yahvé, Mesías o δοῦλος. 'Los justos' para צַדִּיקִים, 'injusto' para עָוֶל, 'el impío' para רָשָׁע y 'camino' para דָּרֶךְ están alineados con el audit trail. 'Abominación' preserva bien תּוֹעֲבַת, con nota alternativa útil.
  issues:
  - severity: medium
    issue: Orden oracional demasiado calcado en español
    rationale: Aunque el hebreo encabeza ambos hemistiquios con 'abominación de/para', en español 'Abominación para los justos es...' suena forzado. Reordenar a 'El hombre injusto es abominación para los justos' conserva el sentido y el paralelismo con mejor naturalidad.
  - severity: low
    issue: Expresión 'el recto en su camino' algo dura
    rationale: No es incorrecta, pero 'el que es recto en su camino' reproduce mejor el valor personal de יְשַׁר דָּרֶךְ y suena más idiomática en español amplio.
  - severity: low
    issue: Faltan notas útiles presentes en el audit trail inglés
    rationale: El inglés preserva alternativas léxicas para 'abominación' y explica la construcción 'upright of way'. Es apropiado mantener esas ayudas también en español.
  revised_spanish_text: El hombre injusto es abominación[a] para los justos, y el que es recto en su camino[b] es abominación[a] para el impío.
  revised_footnotes:
  - marker: a
    text: O 'detestable para' o 'aborrecible para'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''recto de camino'', es decir, uno cuya conducta es recta.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el orden para un español más natural sin apartarse del sentido ni del paralelismo hebreo. Se mejora la segunda expresión personalizando 'recto en su camino' y se añaden las notas léxicas ya sustentadas por el audit trail inglés.
