translation:
  language: es
  text: Allí está el pequeño Benjamín, guiándolos[a]; los príncipes de Judá, en su compañía[b]; los príncipes de Zabulón; los príncipes de Neftalí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘gobernándolos’ o ‘teniendo dominio sobre ellos’. El participio hebreo puede sugerir gobierno o precedencia; aquí el texto principal lo expresa como liderazgo dentro de la procesión.
    reason: lexical_alternative
  - marker: b
    text: O ‘en su multitud’ o ‘en su muchedumbre’. El término hebreo es raro y su matiz preciso es incierto, pero denota un grupo reunido que acompaña a Judá.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There is
  chosen_spanish: Allí está
  alternatives_spanish:
  - Allí hay
  - Allí
  lexicon: HALOT
  rationale: El adverbio deíctico locativo se conserva con una fórmula natural en español. 'Allí está' mantiene la presencia escénica del verso y evita un arranque fragmentario.
- source_word: בִּנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Nombre propio tribal; la forma habitual en español es Benjamín.
- source_word: צָעִיר
  english_pob_choice: little
  chosen_spanish: el pequeño
  alternatives_spanish:
  - el menor
  - el joven
  - el más pequeño
  lexicon: HALOT
  rationale: En este contexto poético expresa pequeñez o menor rango de Benjamín, no necesariamente edad. 'El pequeño' preserva el matiz de status con claridad natural en español.
- source_word: רֹדֵם
  english_pob_choice: leading them
  chosen_spanish: conduciéndolos
  alternatives_spanish:
  - gobernándolos
  - dominándolos
  - guiándolos
  lexicon: HALOT
  rationale: La forma participial admite la idea de gobierno o precedencia. Dado el contexto procesional, 'conduciéndolos' expresa liderazgo sin imponer un sentido político excesivo, pero conserva la alternativa más fuerte en la nota.
- source_word: שָׂרֵי
  english_pob_choice: princes
  chosen_spanish: los príncipes
  alternatives_spanish:
  - los jefes
  - los líderes
  - los principales
  lexicon: HALOT
  rationale: '''Príncipes'' preserva el registro elevado y la categoría de jefes tribales mejor que equivalentes más planos.'
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio tribal; la forma española estándar es Judá.
- source_word: רִגְמָתָם
  english_pob_choice: in their throng
  chosen_spanish: en su multitud
  alternatives_spanish:
  - en su compañía
  - en su muchedumbre
  - en su tropa
  lexicon: HALOT
  rationale: El sustantivo es raro y su sentido preciso es incierto. 'En su multitud' comunica bien la idea de un grupo reunido acompañando a Judá, sin forzar una especificación mayor que la evidencia no garantiza.
- source_word: זְבֻלֻון
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  lexicon: HALOT
  rationale: La forma española tradicional y más extendida es Zabulón.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: HALOT
  rationale: Nombre propio tribal; la forma española estándar es Neftalí.
translation_notes:
  revision_awareness: La versión coincide con el consenso del paquete fuente inglés y no requiere revisión adicional; se mantiene la distinción entre liderazgo procesional y dominio más literal, así como la incertidumbre léxica de רִגְמָתָם.
  spanish_consistency_notes:
  - 'Se mantienen nombres tribales en su forma española habitual: Benjamín, Judá, Zabulón, Neftalí.'
  - Se evita traducir רֹדֵם de manera rígidamente política en el texto principal, pero se preserva la alternativa en nota.
  - '''Allí está'' reproduce con naturalidad la presencia locativa de שָׁם sin perder el tono poético.'
  - '''Los príncipes'' conserva el registro elevado de שָׂרֵי en poesía bíblica.'
  - '''En su multitud'' comunica la idea colectiva de רִגְמָתָם sin cerrar el sentido a una sola opción.'
