translation:
  language: es
  text: 'los que estaban en aquellos días: Uzías hijo de Miqueas[a], de la tribu de Simeón, y Chabris hijo de Gotoniel, y Charmis hijo de Melquiel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa una expresión simple, «los que estaban en aquellos días», que probablemente se refiere a quienes ocupaban un cargo o estaban presentes en ese tiempo.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἳ ἦσαν ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: who were in those days
  chosen_spanish: los que estaban en aquellos días
  alternatives_spanish:
  - los que vivían en aquellos días
  - los que estaban allí en aquellos días
  lexicon: LSJ
  rationale: La construcción griega es una relativa simple con ἦσαν, sin verbo de oficio explícito. En español, «estaban» conserva la sobriedad y la ambigüedad del griego; «vivían» introduce una interpretación más fuerte, y «estaban allí» añade un matiz local no garantizado por el texto.
- source_word: Ὀζείας
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Ozías
  lexicon: LSJ
  rationale: Se adopta la forma bíblica castellana más reconocible y cercana al uso eclesial. «Ozías» refleja más directamente la grafía griega, pero es menos natural en español bíblico.
- source_word: ὁ τοῦ Μειχὰ
  english_pob_choice: son of Micah
  chosen_spanish: hijo de Miqueas
  alternatives_spanish:
  - de Miqueas
  - el hijo de Miqueas
  lexicon: LSJ
  rationale: La fórmula griega de filiación se vierte de modo idiomático con «hijo de». «De Miqueas» suena demasiado elíptico; «el hijo de Miqueas» es correcto, pero menos fluido en esta lista.
- source_word: ἐκ τῆς φυλῆς Συμεὼν
  english_pob_choice: from the tribe of Simeon
  chosen_spanish: de la tribu de Simeón
  alternatives_spanish:
  - de entre la tribu de Simeón
  - procedente de la tribu de Simeón
  lexicon: LSJ
  rationale: Aunque ἐκ puede sugerir «de entre» o «procedente de», en español la fórmula estable y clara para pertenencia tribal es «de la tribu de». Mantiene la relación sin sobreinterpretar el matiz preposicional.
- source_word: Χαβρεὶς
  english_pob_choice: Chabris
  chosen_spanish: Chabris
  alternatives_spanish:
  - Jabris
  - Habris
  lexicon: LSJ
  rationale: Se conserva la transliteración del nombre griego como nombre propio deuterocanónico. La grafía con Ch sigue la pauta del proyecto para nombres griegos en estos libros.
- source_word: ὁ τοῦ Γοθονιὴλ
  english_pob_choice: son of Gothoniel
  chosen_spanish: hijo de Gotoniel
  alternatives_spanish:
  - de Gotoniel
  - el hijo de Gotoniel
  lexicon: LSJ
  rationale: Se mantiene la misma fórmula de filiación que en el resto del versículo. «Gotoniel» simplifica la transliteración al español sin alterar el nombre propio.
- source_word: Χαρμεὶς
  english_pob_choice: Charmis
  chosen_spanish: Carmis
  alternatives_spanish:
  - Charmis
  - Jarmis
  lexicon: LSJ
  rationale: Se adapta la transliteración al español con C inicial para una lectura más natural, conservando la identidad del nombre propio. «Charmis» mantiene más de cerca el griego, pero resulta menos natural en español.
- source_word: ὁ τοῦ Μελχειήλ
  english_pob_choice: son of Melchiel
  chosen_spanish: hijo de Melquiel
  alternatives_spanish:
  - de Melquiel
  - el hijo de Melquiel
  lexicon: LSJ
  rationale: Se conserva la filiación con «hijo de» y se ajusta la transliteración a una forma castellana fluida. «Melquiel» refleja mejor la pronunciación española que una forma demasiado pegada al griego.
theological_decisions:
- issue: Valor de la frase relativa «los que estaban en aquellos días»
  english_pob_reading: who were in those days; likely meaning those who held office or were present at that time
  chosen_spanish_reading: los que estaban en aquellos días, sin explicitar oficio
  alternative_spanish_readings:
  - los que ocupaban cargos en aquellos días
  - los que ejercían autoridad en aquellos días
  rationale: El POB inglés preserva la ambigüedad del griego y la comenta en nota. El español mantiene esa misma apertura sin convertirla en una identificación segura de oficio, porque el texto base no lo expresa de forma explícita.
  doctrine_reference: Principio de fidelidad al alcance semántico del texto fuente; evitar especificaciones no garantizadas por el griego.
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y sin cambios necesarios; esta versión sigue de cerca el texto griego y la auditoría inglesa, manteniendo la ambigüedad de la cláusula temporal y la estructura nominal de la lista sin añadir interpretaciones no atestiguadas.
  spanish_consistency_notes:
  - Se usa «Uzías» como forma bíblica española habitual, coherente con nombres propios deuterocanónicos en estilo de iglesia amplia.
  - Se mantiene «de la tribu de Simeón» como fórmula natural en español, evitando un calco excesivo de ἐκ.
  - Las tres cadenas de filiación se traducen uniformemente con «hijo de» para conservar claridad y paralelismo.
  - «Chabris» y «Carmis» se conservan como nombres propios, sin traducir ni normalizar más allá de la transliteración.
  - La nota al pie se ancla en la frase temporal para reflejar la misma observación auditada en la versión inglesa.
