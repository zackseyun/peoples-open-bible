lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For even
  chosen_spanish: Porque también
  alternatives_spanish:
  - Pues también
  - Porque aun
  lexicon: LSJ
  rationale: καὶ γάρ combina explicación/causa con énfasis. En español, «Porque también» conserva bien ambos valores sin forzar una construcción calca del inglés.
- source_word: τοὺς παλαιοὺς
  english_pob_choice: the ancient
  chosen_spanish: los antiguos
  alternatives_spanish:
  - los de antaño
  - los antiguos de
  lexicon: LSJ
  rationale: παλαιούς describe a quienes pertenecieron a un período anterior; «antiguos» mantiene el sentido temporal directo y es natural en español bíblico.
- source_word: οἰκήτορας
  english_pob_choice: inhabitants
  chosen_spanish: habitantes
  alternatives_spanish:
  - moradores
  - dwellers
  lexicon: LSJ
  rationale: El sustantivo se refiere a quienes viven en un lugar. «Habitantes» es la equivalencia más idiomática y fiel; «moradores» sería posible pero más marcado.
- source_word: τῆς ἁγίας σου γῆς
  english_pob_choice: of your holy land
  chosen_spanish: de tu tierra santa
  alternatives_spanish:
  - de tu país santo
  - de tu tierra sagrada
  lexicon: LSJ
  rationale: γῆ aquí designa un territorio concreto, no «tierra» en el sentido de suelo o planeta. «Tierra santa» preserva la referencia geográfica y la cualidad de santidad con naturalidad en español.
theological_decisions:
- issue: γῆ como 'tierra' territorial versus 'tierra' material / 'earth'
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - territorio
  - mundo
  rationale: El contexto apunta a la tierra perteneciente a Dios en la historia de Israel, no a la tierra física general. «Tierra» en español conserva esa referencia covenantal-geográfica sin introducir una abstracción innecesaria.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern Spanish'
translation_notes:
  revision_awareness: Concordancia alta con el texto griego normalizado y con la solución inglesa auditada. No se detectaron revisiones sustantivas en el pasaje fuente; se mantiene la breve estructura del original sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo semántico de la frase griega: conectivo explicativo + adverbio de énfasis + sujeto humano + genitivo territorial-sacral.'
  - «Tierra santa» sigue el valor geográfico-covenantal de γῆ y evita la lectura cósmica de «mundo» o una paráfrasis excesiva.
  - La nota alternativa «moradores» se incluye porque el inglés auditado preserva la posibilidad lexical 'dwellers'.
