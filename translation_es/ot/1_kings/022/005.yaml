translation:
  language: es
  text: 'Y Josafat dijo al rey de Israel[a]: «Por favor, consulta hoy a Yahvé por una palabra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «busca la palabra de Yahvé», o «consulta hoy por la palabra de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; en español, «Y ... dijo» conserva la progresión sin sobrecargar el estilo. «Entonces» también es posible, pero aquí no es necesario.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  lexicon: Convención bíblica española
  rationale: Se usa la forma española estándar del nombre propio, claramente identificable para el lector bíblico y fluida en español.
- source_word: אֶל מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: to the king of Israel
  chosen_spanish: al rey de Israel
  alternatives_spanish:
  - al rey israelita
  - al rey de Israel
  lexicon: HALOT
  rationale: La construcción preposicional se rinde de forma directa y natural. Se mantiene el título real sin paraphrasearlo como posesivo, para preservar la estructura del hebreo.
- source_word: דְּרָשׁ
  english_pob_choice: inquire
  chosen_spanish: consulta
  alternatives_spanish:
  - pregunta
  - busca
  lexicon: HALOT
  rationale: En este contexto, דרש expresa buscar/consultar una palabra divina. «Consulta» comunica bien la idea de acudir a Yahvé por una respuesta, en español natural y con el matiz formal de petición de oráculo.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: נא marca ruego o cortesía. «Por favor» es la equivalencia moderna más clara y sobria en español.
- source_word: כַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en el día de hoy
  - ahora mismo
  lexicon: HALOT
  rationale: El sentido temporal inmediato se expresa naturalmente con «hoy», manteniendo la urgencia del ruego sin añadir énfasis no requerido.
- source_word: אֶת דְּבַר יְהוָה
  english_pob_choice: for the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - una palabra de Yahvé
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: Se conserva «palabra» para reflejar el objeto buscado en la expresión idiomática de consultar a Dios. Se omite una preposición explícita equivalente a «for» porque en español «consultar la palabra de Yahvé» comunica mejor el sentido que una construcción forzada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene la transliteración «Yahvé» conforme a la terminología del proyecto para el Nombre divino, evitando la sustitución por «SEÑOR».
theological_decisions:
- issue: Uso del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura auditada del POB inglés preserva el Nombre divino. En español, «Yahvé» mantiene la misma decisión teológica y textual, sin ocultar el tetragrámaton bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de דרש en contexto de consulta profética
  english_pob_reading: inquire
  chosen_spanish_reading: consulta
  alternative_spanish_readings:
  - busca
  - pregunta
  rationale: El verbo no se limita a «preguntar» en sentido ordinario; en este contexto pide buscar una respuesta revelada por Yahvé. «Consulta» conserva la dimensión de búsqueda de oráculo o dirección divina.
  doctrine_reference: HALOT; contexto narrativo de consulta profética
translation_notes:
  revision_awareness: El inglés auditado no muestra revisiones aplicadas y mantiene alta concordancia. La versión española sigue esa lectura estable, conservando la sintaxis narrativa básica, el objeto de consulta («la palabra de Yahvé») y la decisión consistente de nombrar el Tetragrámaton como «Yahvé».
  spanish_consistency_notes:
  - Se preserva el estilo bíblico sobrio y directo, sin añadir explicaciones interpretativas en el texto principal.
  - «Yahvé» se usa de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - «Consulta» traduce el valor de דרש en un contexto de búsqueda de revelación, evitando un giro demasiado general como «pregunta» en el texto principal.
  - La nota al pie recoge alternativas legítimas sin debilitar la lectura preferida.
