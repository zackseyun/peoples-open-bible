revisions:
- from: Porque he aquí, acechan mi vida; hombres feroces se juntan contra mí, sin transgresión ni pecado mío[a][b][c], Yahvé.
  to: Porque he aquí[a], acechan mi vida; hombres feroces[b] se agrupan contra mí, sin transgresión mía ni pecado mío[c], oh Yahvé.
  rationale: 'La revisión conserva todas las decisiones léxicas principales del original y del rastro POB, pero corrige tres puntos de español: añade un vocativo natural (''oh Yahvé''), restaura el posesivo en ambos sustantivos de la cláusula final, y sustituye ''se juntan'' por ''se agrupan'' para un tono más digno y literario.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:01:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: כִּי como explicación, הִנֵּה con fuerza deíctica, אָרְבוּ como acecho, לְנַפְשִׁי con sentido de vida, יָגוּרוּ עָלַי como agrupación hostil, y la cláusula final como declaración de inocencia dirigida a Yahvé. Sin embargo, la redacción española ''acechan mi vida'' suena menos natural que ''acechan contra mi vida'' o ''acechan mi vida'' revisado dentro de una frase más idiomática, y sobre todo la colocación ''..., Yahvé'' al final sin vocativo marcado resulta poco natural en español. También conviene ajustar la cláusula final para expresar con mayor claridad que la inocencia pertenece al hablante sin sonar truncada.'
  spanish_quality_summary: 'El español es en general claro y digno, pero tiene dos asperezas principales: 1) la coma antes de ''Yahvé'' deja un vocativo brusco; en español bíblico natural funciona mejor ''oh Yahvé'' o ''Yahvé'' integrado con mejor puntuación; 2) ''sin transgresión ni pecado mío'' queda desbalanceado, porque ''mío'' modifica claramente solo ''pecado''. Una formulación paralela como ''sin transgresión mía ni pecado mío'' mejora precisión y fluidez. También ''se juntan'' puede elevarse levemente a ''se agrupan'' para un tono más literario sin perder fidelidad.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: ''Yahvé'' para יהוה, ''vida'' para נֶפֶשׁ en contexto de peligro mortal, y ''pecado'' para חטאת. ''Transgresión'' preserva bien פשע. No hay conflictos doctrinales; el único ajuste es estilístico-sintáctico para español más natural.'
  issues:
  - severity: medium
    issue: Vocativo final insuficientemente natural en español
    rationale: El hebreo termina con יְהוָה como invocación. En español, '..., Yahvé' sin 'oh' ni otra integración suena abrupto. 'oh Yahvé' transmite mejor el vocativo.
  - severity: medium
    issue: Paralelismo posesivo incompleto en 'sin transgresión ni pecado mío'
    rationale: 'El hebreo tiene posesivo con ambos sustantivos: ''mi transgresión'' y ''mi pecado''. La traducción debe reflejarlo con claridad: ''sin transgresión mía ni pecado mío'' o equivalente.'
  - severity: low
    issue: Registro ligeramente coloquial en 'se juntan'
    rationale: Aunque fiel, 'se agrupan' o 'se reúnen' encaja mejor con el tono poético-digno del salmo sin alejarse del sentido de גור en contexto hostil.
  revised_spanish_text: Porque he aquí[a], acechan mi vida; hombres feroces[b] se agrupan contra mí, sin transgresión mía ni pecado mío[c], oh Yahvé.
  revised_footnotes:
  - marker: a
    text: También puede entenderse como ‘mi alma’; aquí se prefiere ‘mi vida’ por el contexto de peligro mortal.
    reason: lexical_alternative
  - marker: b
    text: ‘Hombres feroces’ puede verterse también ‘hombres fuertes’ o ‘los poderosos’; el contexto hostil favorece el matiz de violencia.
    reason: lexical_alternative
  - marker: c
    text: La frase hebrea afirma literalmente ausencia de ‘transgresión’ y de ‘pecado’ míos; también puede leerse como ‘aunque no hay transgresión mía ni pecado mío’.
    reason: alternative_reading
  revision_rationale: 'La revisión conserva todas las decisiones léxicas principales del original y del rastro POB, pero corrige tres puntos de español: añade un vocativo natural (''oh Yahvé''), restaura el posesivo en ambos sustantivos de la cláusula final, y sustituye ''se juntan'' por ''se agrupan'' para un tono más digno y literario.'
