    issue: La nota [a] está anclada dos veces en el texto para una sola nota.
    rationale: La instrucción exige marcadores únicos y no reutilizados para dos anclajes distintos en el mismo registro. La nota sobre la lectura alternativa de כִּי debe anclarse una sola vez en la cláusula final pertinente.
  - severity: low
    issue: La nota [b] es editorialmente innecesaria y no preserva una alternativa fuente relevante en español.
    rationale: El inglés auditado tenía una nota léxica ligada a su política antigua de «the LORD», pero en español el proyecto ya fija «Yahvé» en texto principal. La explicación sobre «los pueblos» y el Tetragrámaton no añade una ambigüedad nueva ni una alternativa textual necesaria.
