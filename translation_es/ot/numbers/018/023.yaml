revisions:
- from: Pero el levita mismo hará el servicio de la tienda de reunión[a], y ellos llevarán su iniquidad. Es un estatuto perpetuo[b] para todas sus generaciones, y entre los hijos de Israel no heredarán heredad[c].
  to: Pero el levita mismo hará el servicio de la tienda de reunión, y ellos llevarán su iniquidad[a]. Es un estatuto perpetuo por todas sus generaciones, y entre los hijos de Israel[b] no heredarán heredad[c].
  rationale: 'Se ajustó «para todas sus generaciones» a «por todas sus generaciones» para reflejar mejor לְדֹרֹתֵיכֶם y sonar más natural en español. Se eliminaron notas secundarias o redundantes y se restauraron las notas léxicas principales preservadas por la auditoría inglesa: la ambigüedad de «llevarán su iniquidad», la alternativa «israelitas» para «hijos de Israel», y la explicación de la repetición enfática «heredarán heredad».'
  reviewer_model: gpt-5.4
