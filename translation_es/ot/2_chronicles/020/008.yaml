    rationale: La auditoría inglesa eligió «they lived» por naturalidad moderna y distinguió alternativas más tradicionales como «dwelt». En español, «habitaron» introduce un tono más literario/tradicional que la elección base no exige. «Vivieron» comunica mejor la residencia continua en registro natural y digno.
