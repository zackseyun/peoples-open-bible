translation:
  language: es
  text: Porque, cuando el jefe y la fuerza que lo acompañaba[a], que parecía invencible, habían llegado, fueron abatidos en el templo de Nanaia, porque los sacerdotes que atendían a Nanaia habían usado engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que parecía irresistible» para la expresión difícil que describe la fuerza que lo acompañaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενόμενος
  english_pob_choice: had arrived
  chosen_spanish: llegó
  alternatives_spanish:
  - había venido
  - había llegado
  lexicon: LSJ
  rationale: En este contexto narrativo, el participio señala la llegada al lugar antes del ataque. «Llegó» reproduce esa secuencia de forma natural en español sin perder el valor de movimiento implícito en el griego.
- source_word: ἡγεμών
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - comandante
  - gobernante
  lexicon: LSJ
  rationale: El término es general y el contexto es militar. «Jefe» comunica mando sin especificar indebidamente un cargo civil como «gobernante» o uno técnico como «comandante».
- source_word: ἡ περὶ αὐτὸν ... δύναμις
  english_pob_choice: the force around him
  chosen_spanish: la fuerza que lo acompañaba
  alternatives_spanish:
  - la fuerza a su alrededor
  - su tropa
  - el ejército con él
  lexicon: LSJ
  rationale: Δύναμις en contexto bélico apunta a una fuerza armada; περὶ αὐτόν expresa compañía o cercanía. «La fuerza que lo acompañaba» mantiene ambas ideas de manera natural en español.
- source_word: ἀνυπόστατος δοκοῦσα εἶναι
  english_pob_choice: which seemed invincible
  chosen_spanish: que parecía invencible
  alternatives_spanish:
  - que parecía irresistible
  - que parecía imposible de resistir
  - que parecía inabordable
  lexicon: LSJ
  rationale: La frase es difícil, pero el contexto militar exige la idea de algo imposible de derrotar o resistir. «Invencible» sigue de cerca la interpretación contextual de la POB inglesa.
- source_word: κατεκόπησαν
  english_pob_choice: they were cut down
  chosen_spanish: fueron abatidos
  alternatives_spanish:
  - fueron derribados
  - fueron muertos
  - fueron cortados
  lexicon: LSJ
  rationale: El pasivo expresa una matanza violenta. «Abatidos» conserva la fuerza del golpe mortal en un español fluido y digno.
- source_word: ἐν τῷ τῆς Ναναίας ἱερῷ
  english_pob_choice: in the temple of Nanaia
  chosen_spanish: en el templo de Nanea
  alternatives_spanish:
  - en el santuario de Nanea
  - en el templo de Nanaia
  lexicon: LSJ
  rationale: ἱερόν se traduce de forma natural como «templo». Para el nombre propio, el español puede adaptar mínimamente la transliteración a una forma más eufónica; aun así, se preserva el referente de la diosa, como en la POB inglesa.
- source_word: παραλογισμῷ χρησαμένων
  english_pob_choice: because ... had used deceit
  chosen_spanish: por el engaño usado
  alternatives_spanish:
  - por la astucia empleada
  - mediante engaño
  - por un ardid
  lexicon: LSJ
  rationale: El genitivo absoluto explica el medio o la circunstancia de la acción. «Engaño» es una equivalencia directa y clara para παραλογισμός en este contexto.
- source_word: τῶν περὶ τὴν Ναναίαν ἱερέων
  english_pob_choice: the priests attending Nanaia
  chosen_spanish: por los sacerdotes de Nanea
  alternatives_spanish:
  - por los sacerdotes que atendían a Nanea
  - por los sacerdotes de Nanaia
  lexicon: LSJ
  rationale: La construcción περὶ + acusativo indica asociación o pertenencia al culto de la deidad. En español, «sacerdotes de Nanea» es la forma más concisa y fiel para expresar esa relación cultual.
theological_decisions:
- issue: Nombre de la deidad Ναναία
  english_pob_reading: Nanaia
  chosen_spanish_reading: Nanea
  alternative_spanish_readings:
  - Nanaia
  - Nanaya
  rationale: Se trata de un nombre propio de una deidad, por lo que corresponde transliterarlo y no traducirlo. Aquí se adopta una forma española eufónica, sin cambiar la referencia al nombre griego del original.
  doctrine_reference: Transliteración de nombres propios; no traducción de deidades.
- issue: Fuerza militar descrita como aparentemente invencible
  english_pob_reading: which seemed invincible
  chosen_spanish_reading: que parecía invencible
  alternative_spanish_readings:
  - que parecía irresistible
  - que parecía imposible de resistir
  rationale: La frase griega es difícil y admite más de un matiz. Se conserva la tensión lexicográfica con una opción que refleja la lectura contextual dada por la POB inglesa, sin neutralizar la dificultad del término.
  doctrine_reference: Principio de equivalencia óptima con respeto a la ambigüedad textual.
translation_notes:
  revision_awareness: Se siguió la lectura interpretativa de la POB inglesa para γενόμενος y ἀνυπόστατος, pero se ajustó el español a una sintaxis natural y publicable, manteniendo el sentido narrativo y la violencia del pasaje. También se preservó el nombre propio de la diosa como transliteración, con adaptación mínima a la eufonía del español.
  spanish_consistency_notes:
  - Se mantuvo «Nanea» de forma consistente en el texto y en las decisiones para asegurar uniformidad gráfica.
  - Se evitó «SEÑOR» o cualquier sustitución teológica indebida, ya que el pasaje contiene un nombre de deidad pagana, no el tetragrámaton.
  - «Abatidos» conserva el tono narrativo sin caer en arcaísmo excesivo.
