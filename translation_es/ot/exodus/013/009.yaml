base_translation:
  language: en
  yaml_path: translation/ot/exodus/013/009.yaml
  text: And it shall be for you as a sign on your hand and as a memorial between your eyes[a], so that the law of Yahweh may be in your mouth[c][b]; for with a strong hand Yahweh brought you out of Egypt.
  footnotes:
  - marker: a
    text: Or 'between your eyes' may be understood idiomatically as 'on your forehead'; the Hebrew wording is kept literal here.
    reason: lexical_alternative
  - marker: b
    text: Or 'the instruction of the LORD.' Hebrew torah can mean 'law' or 'instruction,' depending on context.
    reason: lexical_alternative
  - marker: c
    text: Traditional English often has 'with a mighty hand.'
    reason: lexical_alternative
