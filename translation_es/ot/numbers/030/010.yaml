translation:
  language: es
  text: Y el voto de una viuda o de una mujer divorciada—todo aquello por lo que se haya obligado a sí misma—quedará en firme contra ella[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será vinculante para ella» para «quedará en firme contra ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵדֶר
  english_pob_choice: vow
  chosen_spanish: voto
  alternatives_spanish:
  - promesa
  - juramento
  lexicon: HALOT
  rationale: En el contexto legal/cultual de Números 30, נדר se refiere a una obligación hecha delante de Dios. «Voto» es el equivalente español estándar y preciso, y conserva mejor el valor técnico que «promesa».
- source_word: אַלְמָנָה
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  lexicon: HALOT
  rationale: Equivalente léxico directo y natural en español, sin pérdida semántica.
- source_word: גְרוּשָׁה
  english_pob_choice: divorced woman
  chosen_spanish: mujer divorciada
  alternatives_spanish:
  - divorciada
  lexicon: HALOT
  rationale: El participio pasivo hebreo describe a una mujer que ha sido divorciada o enviada fuera. «Mujer divorciada» es claro, neutral y mantiene el matiz legal.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: everything by which
  chosen_spanish: todo aquello con que
  alternatives_spanish:
  - todo lo que
  - todo aquello por lo cual
  lexicon: HALOT
  rationale: La expresión amplía el sustantivo inicial y abarca cualquier obligación asumida. «Todo aquello con que» reproduce el alcance comprehensivo sin forzar una paráfrasis demasiado libre.
- source_word: אָסְרָה
  english_pob_choice: has bound
  chosen_spanish: se haya obligado
  alternatives_spanish:
  - se ha atado
  - ha ligado
  lexicon: HALOT
  rationale: Aunque el hebreo usa el verbo 'atar/bind', en español jurídico y natural «obligarse» expresa bien la autoimposición de una carga o compromiso. Se conserva la idea de vínculo sin sonar artificial.
- source_word: נַפְשָׁהּ
  english_pob_choice: herself
  chosen_spanish: ella misma
  alternatives_spanish:
  - su persona
  - su propia vida
  lexicon: HALOT
  rationale: Literalmente significa «su alma/vida», pero aquí funciona idiomáticamente como reflexivo. «Ella misma» evita oscurecer el sentido y preserva el referente reflexivo.
- source_word: יָקוּם
  english_pob_choice: shall stand
  chosen_spanish: quedará en firme
  alternatives_spanish:
  - permanecerá
  - será válido
  lexicon: HALOT
  rationale: En lenguaje legal, קום puede significar permanecer válido o establecido. «Quedará en firme» conserva la fuerza jurídica y el matiz de validez establecida mejor que un simple «será válido».
- source_word: עָלֶיהָ
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - sobre ella
  - en su contra
  - obligándola
  lexicon: HALOT
  rationale: La preposición עַל en este marco legal transmite la idea de una obligación que recae sobre la persona. «Contra ella» sigue de cerca la decisión inglesa y mantiene la carga obligatoria del texto, aunque el sentido puede incluir el matiz de obligación que pesa sobre ella.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético (WLC) y el audit trail inglés: נֵדֶר como «voto», גְרוּשָׁה como «mujer divorciada», y יָקוּם עָלֶיהָ como una fórmula legal de validez/obligación que queda asentada sobre la mujer. No hubo revisiones aplicadas en el registro inglés, y el acuerdo cruzado fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo el registro jurídico-formal propio del pasaje.
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Voto» se usó como término técnico coherente con Números 30.
  - La construcción «quedará en firme» preserva la metáfora legal sin volverla innecesariamente rígida.
