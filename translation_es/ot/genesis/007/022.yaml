translation:
  language: es
  text: Todo lo que estaba en la tierra seca, en cuyas narices estaba el aliento del espíritu de vida, murió[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el aliento de vida». Hebreo literalmente: «el aliento del espíritu de vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: Everything ... that
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Todo aquel que
  - Todo ser que
  lexicon: HALOT
  rationale: La construcción hebrea es inclusiva y abarca a todos los seres afectados por la inundación; en español, 'Todo lo que' conserva la amplitud sin forzar un giro personal donde el contexto incluye animales.
- source_word: נִשְׁמַת
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - respiración
  - aliento de vida
  lexicon: HALOT
  rationale: '''נשמת'' puede referirse al soplo vital; ''aliento'' es natural en español y mantiene la fuerza de un principio de vida sin hacer la frase demasiado técnica.'
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - viento
  - aliento
  lexicon: HALOT
  rationale: Se conserva 'espíritu' para no aplanar la doble expresión hebrea נִשְׁמַת רוּחַ חַיִּים. Aunque en español 'aliento del espíritu de vida' suena algo solemne, refleja mejor la composición del original que una simplificación total a 'aliento de vida'.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida viviente
  - vida
  lexicon: HALOT
  rationale: 'El plural hebreo funciona idiomáticamente como un singular de contenido: ''vida''. En español, ''vida'' preserva esa fuerza idiomática.'
- source_word: בְּאַפָּיו
  english_pob_choice: in its nostrils
  chosen_spanish: en cuyos orificios nasales
  alternatives_spanish:
  - en cuyas narices
  - en cuya nariz
  lexicon: HALOT
  rationale: '''Orificios nasales'' evita un registro demasiado coloquial de ''nariz/narices'' y hace explícita la metáfora corporal del hebreo. Se usa una relativa de posesión para reflejar el hebreo distributivo y el antecedente colectivo.'
- source_word: חָרָבָה
  english_pob_choice: dry land
  chosen_spanish: tierra seca
  alternatives_spanish:
  - tierra firme
  - suelo seco
  lexicon: HALOT
  rationale: '''חָרָבָה'' contrapone la zona emergida y seca al ámbito cubierto por las aguas. ''Tierra seca'' es claro, bíblico y natural en español, con una leve resonancia de desolación congruente con el contexto del diluvio.'
- source_word: מֵתוּ
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - murieron
  - perecieron
  lexicon: HALOT
  rationale: El verbo qatal expresa la muerte consumada; 'murió' funciona en español como singular colectivo con un sujeto inclusivo 'todo lo que'. 'Perecieron' sería más interpretativo; 'murió' es más directo y sobrio.
theological_decisions:
- issue: Expresión hebrea doble de vida/breath/spirit
  english_pob_reading: the breath of the spirit of life
  chosen_spanish_reading: el aliento del espíritu de vida
  alternative_spanish_readings:
  - el aliento de vida
  - el soplo del espíritu de vida
  rationale: La POB inglesa conserva la estructura más plena del hebreo para no borrar la tensión lexical entre נשמת, רוח y חיים. En español, 'aliento del espíritu de vida' mantiene esa densidad semántica; la alternativa 'aliento de vida' sería más fluida pero simplificaría demasiado el original.
  doctrine_reference: Génesis 2:7; Génesis 7:22
translation_notes:
  revision_awareness: La redacción sigue el pasaje con alta concordancia del hebreo, manteniendo la estructura relativa ('en cuyos orificios nasales estaba') y la expresión compuesta de vida/espíritu. La nota preserva la alternativa documentada por la POB inglesa y la simplificación aceptable en español sin perder la forma más literal del original.
  spanish_consistency_notes:
  - Se mantiene 'espíritu' para רוּחַ en esta fórmula compuesta, aunque en otros contextos puede requerir 'viento' o 'aliento'.
  - '''Tierra seca'' traduce consistentemente חָרָבָה en contexto de diluvio, sin sustituirlo por una frase más teológica o tradicional.'
  - '''Murió'' conserva el enunciado directo del resultado final, en vez de ''pereció'', para no añadir matiz interpretativo no exigido por el hebreo.'
