translation:
  text: And in Isaac he established[a], because of Abraham his father, a covenant with every firstborn[b], and the blessing rested on the head of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''a blessing of all men and a covenant,'' where the Hebrew here reads ''a covenant with every firstborn.'' The Hebrew line is difficult, and the Greek preserves a broader universal sense.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew text appears troubled at the point where it reads 'son'; the Greek parallel supports the sense 'covenant' in this verse.
    reason: textual_variant
lexical_decisions:
- source_word: וגם ליצחק הקים
  chosen: And in Isaac he established
  alternatives:
  - And for Isaac he established
  - He also established in Isaac
  lexicon: HALOT
  rationale: The Hebrew preposition ל with יצחק can be rendered 'for Isaac' or, in light of the Greek parallel ἐν τῷ Ἰσαὰκ, 'in Isaac.' The Greek suggests the sense of establishing something in/through Isaac rather than merely giving something to him, so 'in Isaac he established' best reflects both witnesses.
- source_word: בן
  chosen: a covenant
  alternatives:
  - a son
  lexicon: HALOT
  rationale: The Hebrew as transmitted reads בן ('son'), which fits the preceding line about Isaac but does not fit the syntax of the verse's second colon. The Greek parallel has διαθήκην ('covenant'), and the following Hebrew phrase ברית all ראשון נתיו strongly indicates covenantal language. This appears to be a corruption or displacement in the Hebrew tradition; the translation follows the sense supported by the Greek and the immediate Hebrew context.
- source_word: בעבור אברהם אביו
  chosen: because of Abraham his father
  alternatives:
  - for the sake of Abraham his father
  - on account of Abraham his father
  lexicon: HALOT
  rationale: בעבור commonly means 'because of' or 'for the sake of.' 'Because of' is natural modern English and preserves the causal force without overinterpreting.
- source_word: ברית
  chosen: a covenant
  alternatives:
  - the covenant
  lexicon: HALOT
  rationale: The noun denotes a covenantal arrangement. The Greek also supports διαθήκη. The article is not explicit in the Hebrew phrase as preserved, so 'a covenant' is retained in English.
- source_word: כל ראשון
  chosen: with every firstborn
  alternatives:
  - for every firstborn
  - of every firstborn
  lexicon: HALOT
  rationale: The Hebrew phrase is difficult, but its plain lexical sense is 'every firstborn.' The Greek parallel instead reads 'of all men' (πάντων ἀνθρώπων), showing a significant variant. Since the primary witness is Hebrew, the main text keeps 'every firstborn,' while the Greek-based alternative is preserved in a footnote.
- source_word: נתיו
  chosen: he gave
  alternatives:
  - he placed
  - he granted
  lexicon: HALOT
  rationale: The form likely reflects נתן, 'to give.' In idiomatic English with 'covenant,' 'established' in the first clause carries the action, so the sense is represented there rather than repeated woodenly.
- source_word: וברכה נחה על ראש ישראל
  chosen: and the blessing rested on the head of Israel
  alternatives:
  - and a blessing came to rest on Israel's head
  - and the blessing settled upon the head of Israel
  lexicon: HALOT
  rationale: נחה means 'rested' or 'settled.' 'On the head of Israel' preserves the Hebrew image of blessing bestowed upon Jacob/Israel.
