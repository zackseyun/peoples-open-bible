translation:
  language: es
  text: Y Demetrio nombró a Apolonio, que estaba a cargo de Celesiria, y reunió una gran fuerza[a], y acampó en Jamnia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran ejército». El griego δύναμις puede designar una fuerza militar en sentido amplio, no solo un ejército formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: nombró
  alternatives_spanish:
  - designó
  - puso como jefe
  lexicon: BDAG
  rationale: En este contexto administrativo y militar, el verbo indica colocar a alguien en un cargo o función. «Nombró» comunica bien la acción de investir a Apolonio en una posición de autoridad sin añadir matices inexistentes.
- source_word: τὸν ὄντα ἐπὶ Κοίλης Συρίας
  english_pob_choice: who was over Coele-Syria
  chosen_spanish: que estaba sobre Celesiria
  alternatives_spanish:
  - que gobernaba Celesiria
  - a cargo de Celesiria
  lexicon: BDAG
  rationale: «Sobre» refleja el valor de ἐπί con sentido de autoridad o gobierno, y «que estaba» sigue de cerca el participio identificador. Se conserva el nombre geográfico tradicional «Celesiria».
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - congregó
  - musteró
  lexicon: BDAG
  rationale: El verbo significa traer o juntar. «Reunió» es natural en español y mantiene el sentido militar de juntar efectivos sin forzar una traducción más técnica que el griego no exige aquí.
- source_word: δύναμιν μεγάλην
  english_pob_choice: a great force
  chosen_spanish: una gran fuerza
  alternatives_spanish:
  - un gran ejército
  - una gran hueste
  lexicon: LSJ
  rationale: «Fuerza» preserva la amplitud de δύναμις, que puede referirse a un contingente militar sin limitarlo necesariamente a un ejército formal. Se mantiene el adjetivo «gran» para reflejar μεγάλην.
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - levantó el campamento
  - hizo campamento
  lexicon: BDAG
  rationale: El verbo es el término militar estándar para instalar un campamento. «Acampó» es el equivalente español más directo y natural en narrativa bélica.
- source_word: ἐν Ἰαμνείᾳ
  english_pob_choice: in Jamnia
  chosen_spanish: en Jamnia
  alternatives_spanish:
  - en Yabné
  - junto a Jamnia
  lexicon: LSJ
  rationale: Se conserva «Jamnia» como transliteración tradicional del topónimo en este contexto histórico. «En» sigue el valor más literal de ἐν y funciona bien en español.
translation_notes:
  revision_awareness: 'Se siguió el texto griego de Swete 1909 y el audit trail inglés. No hubo revisiones aplicadas en el pase más reciente; la única tensión relevante es lexical: δύναμις puede renderizarse como «fuerza» o «ejército», y se conservó la opción más amplia del POB inglés.'
  spanish_consistency_notes:
  - Se mantuvo un registro militar sobrio y narrativo, sin introducir términos eclesiásticos.
  - «Celesiria» y «Jamnia» se conservaron como topónimos históricos coherentes con el contexto de 1 Macabeos.
  - La puntuación reproduce una sola oración coordinada, acorde con el griego y el inglés auditado.
