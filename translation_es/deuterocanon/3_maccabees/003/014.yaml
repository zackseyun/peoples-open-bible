translation:
  language: es
  text: en cuanto a nuestra campaña hacia Asia, que ustedes mismos también conocen, la cual, por la alianza inquebrantable[a] de los dioses, fue llevada, como correspondía, hasta su conclusión[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la alianza invencible de los dioses». El adjetivo ἀρρωστῷ literalmente sugiere algo no débil ni enfermizo; de ahí el sentido de firme, inquebrantable o que no falla.
    reason: lexical_alternative
  - marker: b
    text: O «fue llevada hasta el final».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστρατείας
  english_pob_choice: campaign
  chosen_spanish: campaña
  alternatives_spanish:
  - expedición
  - campaña militar
  lexicon: LSJ
  rationale: El sustantivo griego designa una expedición o campaña militar. «Campaña» es natural en español y conserva el sentido bélico sin añadir elementos no presentes.
- source_word: εἰς τὴν Ἀσίαν
  english_pob_choice: into Asia
  chosen_spanish: a Asia
  alternatives_spanish:
  - hacia Asia
  - en Asia
  lexicon: LSJ
  rationale: εἰς con nombre de lugar expresa dirección hacia/into. En español, «a Asia» comunica esa orientación de forma más natural que una traducción más literal pero menos idiomática.
- source_word: γενομένης ἡμῖν
  english_pob_choice: our campaign
  chosen_spanish: nuestra campaña
  alternatives_spanish:
  - la campaña emprendida por nosotros
  - la campaña realizada por nosotros
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto con dativo idiomáticamente remite a la campaña que nos ocurrió/emprendimos. En español, el posesivo «nuestra» mantiene la implicación del sujeto sin sobrerreexplicar.
- source_word: ἧς ἴστε καὶ αὐτοί
  english_pob_choice: which you yourselves also know
  chosen_spanish: que ustedes mismos también conocen
  alternatives_spanish:
  - que ustedes también conocen
  - de la que ustedes mismos están al tanto
  lexicon: LSJ
  rationale: «Ustedes mismos» refleja el énfasis de αὐτοί y «también» reproduce καί. «Conocen» conserva la apelación directa al saber compartido.
- source_word: ἀρρωστῷ
  english_pob_choice: unfailing
  chosen_spanish: infalible
  alternatives_spanish:
  - invencible
  - inquebrantable
  - firme
  lexicon: LSJ
  rationale: Literalmente el adjetivo sugiere algo no débil, no enfermo, por tanto firme o no fallido. «Infalible» en español transmite bien la idea de una alianza que no falla, aunque mantiene una resonancia elevada; se prefiere aquí por su fuerza idiomática en este contexto solemne.
- source_word: συμμαχίᾳ
  english_pob_choice: alliance
  chosen_spanish: alianza
  alternatives_spanish:
  - ayuda
  - apoyo
  lexicon: LSJ
  rationale: El término denota alianza o cooperación militar. «Alianza» es el equivalente directo y encaja con el genitivo «de los dioses».
- source_word: τῶν θεῶν
  english_pob_choice: of the gods
  chosen_spanish: de los dioses
  alternatives_spanish:
  - de Dios
  - por la ayuda divina
  lexicon: LSJ
  rationale: El texto griego usa plural deidades, y el contexto es discurso real pagano. Debe preservarse esa voz religiosa histórica sin normalizarla a monoteísmo bíblico.
- source_word: κατὰ λόγον
  english_pob_choice: as was fitting
  chosen_spanish: como era de esperarse
  alternatives_spanish:
  - como era justo
  - según la razón
  - como convenía
  lexicon: LSJ
  rationale: La expresión puede significar «conforme a la razón / como corresponde». En este contexto retrospectivo, «como era de esperarse» transmite la evaluación de un resultado adecuado o previsible sin perder naturalidad en español.
- source_word: ἐπὶ τέλος ἀχθείσης
  english_pob_choice: was brought ... to its conclusion
  chosen_spanish: fue llevada ... hasta su conclusión
  alternatives_spanish:
  - fue llevada hasta el final
  - fue conducida a término
  - fue completada
  lexicon: LSJ
  rationale: La frase participial indica ser llevada hasta el final o la conclusión. «Hasta su conclusión» preserva el matiz de completación y el pasivo del griego.
theological_decisions:
- issue: Referencia a «los dioses» en discurso de un rey pagano
  english_pob_reading: of the gods
  chosen_spanish_reading: de los dioses
  alternative_spanish_readings:
  - de Dios
  - por ayuda divina
  rationale: El griego presenta explícitamente el plural τῶν θεῶν. En un discurso real pagano, la traducción debe conservar esa formulación histórica y religiosa, sin armonizarla con lenguaje monoteísta posterior.
  doctrine_reference: Primacía del texto fuente; no importar correcciones doctrinales que el pasaje no formula.
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y el texto griego; no se detectaron cambios textuales posteriores relevantes. La versión española conserva la voz pagana del original y refleja el matiz de ἀρρωστῷ mediante una equivalencia idiomática, con nota alternativa para la lectura más literal.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός en general, pero aquí el texto exige explícitamente «los dioses» por τῶν θεῶν.
  - Se usa «alianza» para συμμαχία por su registro militar y diplomático.
  - Se evita «SEÑOR» o cualquier máscara reverencial, porque el pasaje no contiene el nombre divino sino una referencia pagana plural.
  - La puntuación conserva una sola cláusula larga, acorde con la sintaxis solemne del griego.
