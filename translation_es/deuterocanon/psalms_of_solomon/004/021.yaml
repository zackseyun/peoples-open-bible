review_pass:
  verdict: revise
  source_alignment_summary: El borrador español capta bien la estructura imprecatoria del optativo griego, mantiene la imaginería concreta de σάρκες como 'carne', refleja correctamente la corrección textual a ὀστᾶ como 'huesos', y conserva la exposición vergonzosa 'delante del sol'. Sin embargo, se aparta innecesariamente de παρανόμων ('de los sin ley / transgresores / malvados') al elegir 'impíos', que desplaza el matiz legal-moral del original.
  spanish_quality_summary: 'El español es mayormente claro y digno. ''Que ... sea dispersada'' funciona bien. ''Complacientes con los hombres'' es entendible pero algo rígido; la nota ayuda. El principal ajuste necesario es léxico: ''impíos'' suena bíblico, pero aquí debilita el componente de ilegalidad presente en παράνομος. También conviene preferir ''deshonor'' sobre ''deshonra'' para corresponder mejor al registro de la auditoría inglesa, aunque ambas son aceptables.'
  glossary_alignment: 'Cumple con las convenciones principales del proyecto. No hay términos divinos en juego. La mayor divergencia es παρανόμων: el expediente inglés documenta ''the lawless'', y el español debería preservar ese valor con ''los transgresores'' o ''los sin ley'' antes que ''los impíos''.'
  issues:
  - severity: medium
    issue: '''impíos'' para παρανόμων'
    rationale: παράνομος enfatiza actuar contra la ley; 'impíos' se inclina hacia irreverencia o falta de piedad y pierde parte del matiz legal-moral que el audit trail quiso conservar con 'the lawless'.
  - severity: low
    issue: '''complacientes con los hombres'' suena algo forzado'
    rationale: Es fiel, pero menos natural que 'los que agradan a los hombres'. Como el inglés final retuvo 'people-pleasers', puede mantenerse una formulación compacta en el texto con nota aclaratoria o elegir la opción más natural en español.
  - severity: low
    issue: '''deshonra'' frente a ''deshonor'''
    rationale: No es error, pero 'deshonor' refleja más de cerca la decisión inglesa documentada y su tono formal-judicial.
  revised_spanish_text: Que la carne de los que agradan a los hombres[a] sea dispersada por las fieras, y los huesos de los transgresores queden delante del sol en deshonor.
  revised_footnotes:
  - marker: a
    text: 'O: “de los complacientes con los hombres”.'
    reason: lexical_alternative
  revision_rationale: Se ajusta παρανόμων a 'los transgresores' para preservar el matiz de actuar contra la ley. Se mejora la naturalidad de ἀνθρωπαρέσκων con 'los que agradan a los hombres', manteniendo una nota con la alternativa más compacta del borrador. Se normaliza 'deshonor' para alinearlo mejor con ἀτιμία y con la auditoría inglesa. El resto del verso es fiel y puede conservarse.
