translation:
  language: es
  text: Así que me volví para desesperar[a] en mi corazón[b] por todo el trabajo en el que había trabajado[c] debajo del sol[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Entonces me volví para entregar mi corazón a la desesperación» o «Entonces me volví para darme por vencido en mi corazón». El hebreo es compacto y puede expresarse de varias maneras cercanas.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «mi corazón»; en hebreo puede abarcar el interior, el pensamiento y la voluntad.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo repite la misma raíz para reforzar la idea de esfuerzo penoso: «trabajo ... había trabajado».'
    reason: lexical_alternative
  - marker: d
    text: «Debajo del sol» es una fórmula recurrente de Eclesiastés para la vida en la esfera presente y terrenal.
    reason: cross_reference
lexical_decisions:
- source_word: וְסַבּוֹתִי
  english_pob_choice: So I turned
  chosen_spanish: Así que me volví
  alternatives_spanish:
  - Entonces me volví
  - Así me volví
  lexicon: HALOT
  rationale: El verbo indica un giro o cambio de dirección interior. «Me volví» conserva la idea de cambio de curso; «Así que» refleja la progresión discursiva del hebreo y del inglés POB sin sonar mecánico.
- source_word: לְיַאֵשׁ
  english_pob_choice: to despair
  chosen_spanish: a desesperar
  alternatives_spanish:
  - a darme por vencido
  - a caer en desesperación
  lexicon: HALOT
  rationale: El verbo expresa el estado o movimiento hacia la desesperación. En español, «desesperar» mantiene bien esa fuerza emocional sin añadir un matiz más coloquial como «darme por vencido».
- source_word: אֶת־לִבִּי
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - mi corazón
  - en mi interior
  - en mi mente
  lexicon: HALOT
  rationale: El hebreo «corazón» nombra el centro interior de pensamiento y voluntad. «En mi corazón» conserva la metáfora hebrea y evita estrecharla indebidamente a «mente».
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - respecto de
  - sobre
  lexicon: HALOT
  rationale: Aquí introduce el motivo u ocasión de la desesperación. En español «por» comunica con naturalidad la causa o motivo afectivo; «sobre» suena menos idiomático en este contexto.
- source_word: כָּל הֶעָמָל
  english_pob_choice: all the labor
  chosen_spanish: todo el trabajo
  alternatives_spanish:
  - toda la labor
  - todo el afán
  - todo el toil
  lexicon: HALOT
  rationale: עָמָל suele denotar trabajo penoso, esfuerzo fatigoso o afán. «Trabajo» es claro y digno en español; «labor» también sería posible, pero «trabajo» suena más natural aquí. Se evita «siempre» o «afán» como generalización no requerida.
- source_word: שֶׁעָמַלְתִּי
  english_pob_choice: at which I had labored
  chosen_spanish: con que me había afanado
  alternatives_spanish:
  - en que había trabajado
  - por el que me había afanado
  - en que me había fatigado
  lexicon: HALOT
  rationale: El hebreo repite la raíz para subrayar el esfuerzo realizado. «Afanado» conserva el matiz de esfuerzo costoso y mantiene la repetición conceptual con עָמָל; «trabajado» sería correcto pero menos expresivo. La construcción «con que» sigue bien el vínculo con el trabajo anterior.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  - en este mundo
  - en la tierra
  lexicon: HALOT
  rationale: Es una expresión recurrente en Eclesiastés para la esfera de la vida presente. «Debajo del sol» reproduce de forma muy transparente el giro tradicional del libro y evita una paráfrasis explicativa excesiva.
theological_decisions:
- issue: Sentido de «bajo/debajo del sol» como fórmula de Eclesiastés
  english_pob_reading: A recurring Ecclesiastes expression for life in the present world and its earthly sphere.
  chosen_spanish_reading: Fórmula repetida para la vida en el ámbito presente, terrenal.
  alternative_spanish_readings:
  - expresión para este mundo
  - fórmula para la vida terrena
  rationale: No se explica en el texto principal para no sobrecargar el verso, pero se mantiene la fórmula literal y su valor técnico literario. Esto preserva la tensión sapiencial del libro sin reducirla a una mera locución geográfica.
  doctrine_reference: Eclesiastés 1:3; 1:9; 2:11
- issue: «Corazón» como centro interior de la persona
  english_pob_reading: in my heart
  chosen_spanish_reading: en mi corazón
  alternative_spanish_readings:
  - en mi interior
  - en mi mente
  rationale: Se conserva la antropología bíblica del corazón como sede de pensamiento, voluntad y afecto. «Mente» sería una reducción moderna que atenúa la densidad del hebreo.
  doctrine_reference: Proverbios 4:23; Deuteronomio 6:5
translation_notes:
  revision_awareness: 'Se siguió el aviso de revisión: no hay cambios necesarios respecto del análisis auditado; la versión española conserva la brevedad, la repetición de la raíz y la fórmula fija de Eclesiastés sin añadir explicación al cuerpo del verso.'
  spanish_consistency_notes:
  - Se mantuvo «corazón» por consistencia con la antropología bíblica del hebreo.
  - Se prefirió «debajo del sol» para conservar la fórmula literaria de Eclesiastés.
  - Se usó «desesperar» para reflejar la fuerza verbal del hebreo sin suavizarla en exceso.
  - Se evitó «Señor» u այլ sustitutos porque el texto no contiene el nombre divino.
