    issue: «reconoce» para וְיָדַעְתָּ
    rationale: El hebreo usa ידע en fuerza exhortativa de ‘saber/conocer’. «Reconoce» introduce un matiz adicional de admisión o concesión que no es necesario y puede sonar más interpretativo que el original.
  - severity: low
    issue: Redacción algo pesada en «para tomar posesión de ella»
    rationale: Es fiel, pero más larga de lo necesario. «Para poseerla» comunica bien el sentido principal documentado por la POB y mejora la fluidez; la nota ya preserva «heredarla» como alternativa.
  - severity: low
    issue: Conector final mejor como «pues»
    rationale: El segundo כִּי introduce la explicación/razón. «Porque» no es incorrecto, pero «pues» encaja con mayor naturalidad y claridad en este período formal.
  revised_spanish_text: Así que sabe que no es por tu justicia que Yahvé tu Dios te está dando esta buena tierra para poseerla[a], pues eres un pueblo de dura cerviz.
  revised_footnotes:
  - marker: a
    text: O «heredarla». El verbo hebreo puede denotar recibir una herencia, pero en Deuteronomio a menudo incluye el sentido de tomar posesión de la tierra.
    reason: lexical_alternative
  revision_rationale: Se ajusta «reconoce» a «sabe» para reflejar con mayor precisión el valor exhortativo de וְיָדַעְתָּ sin añadir matiz interpretativo. Se simplifica «para tomar posesión de ella» a «para poseerla» por fluidez natural en español, manteniendo en la nota la alternativa «heredarla» y la explicación del matiz de posesión. Se cambia «porque» por «pues» para expresar mejor la relación explicativa del segundo כִּי en un registro formal y legible.
