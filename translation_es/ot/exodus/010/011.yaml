review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y del POB inglés: rechazo abrupto, restricción a los varones, uso de Yahvé, y expulsión de la presencia de Faraón. Sin embargo, «¡No, no así!» sobretraduce לֹא כֵן al combinar a la vez la opción idiomática principal y la alternativa formal documentada. El original y la auditoría inglesa optan por una negación abrupta simple, con «Not so» solo en nota.'
  spanish_quality_summary: El español es claro y de registro adecuado, pero «¡No, no así!» suena algo redundante y menos natural que «¡No!». El resto del versículo es legible y digno. Las notas son útiles, aunque la nota a necesita una redacción española más natural.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה -> «Yahvé», הַגְּבָרִים -> «los hombres» conservando la restricción masculina, y עבד -> «sirvan». No hay conflictos terminológicos mayores.'
  issues:
  - severity: medium
    issue: «¡No, no así!» mezcla lectura principal y alternativa
    rationale: לֹא כֵן puede representarse como «¡No!» o más formalmente «No así», pero juntar ambas en el texto principal añade material no exigido y resulta menos natural en español.
  - severity: low
    issue: Redacción de la nota a poco idiomática
    rationale: «una forma más formal de rendir» suena calcado. «una forma más formal de expresar» o «de traducir» sería más natural.
  revised_spanish_text: ¡No! Vayan ahora los hombres[a] y sirvan a Yahvé, porque eso es lo que ustedes buscan.” Entonces los expulsó de la presencia de Faraón.
  revised_footnotes:
  - marker: a
    text: 'O: «No así»; una forma más formal de expresar el rechazo brusco de Faraón.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hombres», específicamente los varones, no todo el pueblo.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la apertura para ajustarla mejor al hebreo y a la decisión auditada del POB inglés: una negación abrupta simple en el texto principal, dejando «No así» como alternativa en nota. También se mejora levemente la naturalidad de la nota. Además, se conserva la nota sobre «los hombres»; como debe anclarse en el texto, se coloca [a] tras «hombres» y la nota alternativa pasa a marcador b implícitamente en el arreglo completo.'
