translation:
  language: es
  text: y sal al valle de Ben Hinom[a], que está a la entrada de la puerta de los tiestos, y proclama allí las palabras que te hablaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la puerta de los tiestos'; el nombre hebreo de la puerta es algo incierto, y algunos lo conservan más formalmente como 'la puerta de Harsut'.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָצָאתָ
  english_pob_choice: and go out
  chosen_spanish: y sal
  alternatives_spanish:
  - y saldrás
  - y debes salir
  - entonces sal
  lexicon: HALOT
  rationale: La forma hebrea tiene fuerza de instrucción dentro de una secuencia profética; en español, el imperativo 'sal' comunica mejor esa fuerza que una futura simple. Se conserva el matiz direccional de יצא con 'sal'.
- source_word: גֵּיא בֶן הִנֹּם
  english_pob_choice: the Valley of Ben Hinnom
  chosen_spanish: el valle de Ben Hinom
  alternatives_spanish:
  - el valle del hijo de Hinom
  - Gehenna
  lexicon: HALOT
  rationale: Se preserva el topónimo con transliteración, siguiendo la decisión auditada de no importar 'Gehenna' aquí. 'Ben Hinom' mantiene el nombre propio tradicionalmente reconocido y es más natural que una traducción literal larga.
- source_word: פֶּתַח שַׁעַר הַחַרְסוּת
  english_pob_choice: which is at the entrance of the Potsherd Gate
  chosen_spanish: que está a la entrada de la puerta de los tiestos
  alternatives_spanish:
  - que está a la entrada de la puerta de los pedazos de barro
  - que está a la entrada de la puerta de Harsut
  - que está a la entrada de la puerta de los tiestos rotos
  lexicon: HALOT
  rationale: '''פֶּתַח שַׁעַר'' se vierte naturalmente como ''a la entrada de la puerta''. Para הַחַרְסוּת, se elige ''tiestos'' por su relación transparente con cerámica rota y con el contexto de la imagen del capítulo. Se evita fijar una forma demasiado cerrada donde el nombre de la puerta es algo incierto.'
- source_word: וְקָרָאתָ
  english_pob_choice: and proclaim
  chosen_spanish: y proclama
  alternatives_spanish:
  - y clama
  - y anuncia
  - y grita
  lexicon: HALOT
  rationale: En contexto profético, קרא expresa hablar en voz alta y públicamente. 'Proclama' conserva mejor ese valor declarativo y público que 'habla' o 'dice'.
- source_word: אֶת הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - el mensaje
  - las cosas dichas
  lexicon: HALOT
  rationale: '''דברים'' se mantiene de forma literal como ''palabras'', preservando la conexión formal con el discurso divino. ''Mensaje'' sería más dinámico, pero menos transparente respecto al término hebreo.'
- source_word: אֲשֶׁר אֲדַבֵּר אֵלֶיךָ
  english_pob_choice: that I will speak to you
  chosen_spanish: que yo te hablaré
  alternatives_spanish:
  - que yo te diré
  - que voy a hablarte
  lexicon: HALOT
  rationale: Se conserva el futuro de la palabra divina con 'hablaré', y el orden 'yo te hablaré' refleja de manera clara el destinatario directo del habla. 'Decir' sería posible, pero 'hablar' corresponde mejor a דִּבֵּר en este contexto.
translation_notes:
  revision_awareness: La comparación con el texto inglés auditado muestra alta concordancia y ninguna revisión aplicada; se mantiene la misma resolución principal para el topónimo y la puerta, con español natural y transparente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija; este versículo no contiene el tetragrámaton.
  - Se mantiene 'Ben Hinom' como topónimo transliterado para conservar la referencia geográfica.
  - '''Proclama'' se elige por la fuerza pública de קרא en contexto profético.'
  - Se evita 'SEÑOR' o paráfrasis que oculten el sentido del hebreo.
  - La nota al pie conserva la incertidumbre sobre el nombre de la puerta, como en el audit trail inglés.
