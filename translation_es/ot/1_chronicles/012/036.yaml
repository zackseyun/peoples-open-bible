translation:
  language: es
  text: De Dan[a], veintiocho mil seiscientos preparados para la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en formación para la batalla» o «arrayados para la batalla». El participio hebreo enfatiza la preparación militar o la disposición en orden de combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: From
  chosen_spanish: De
  alternatives_spanish:
  - Y de
  - Desde
  lexicon: HALOT
  rationale: La secuencia hebrea incluye la conjunción y la preposición, pero en español la enumeración tribal suena natural con una simple preposición de pertenencia/origen. «De» conserva el valor de procedencia sin añadir una coordinación innecesaria.
- source_word: הַדָּנִי
  english_pob_choice: Dan
  chosen_spanish: Dan
  alternatives_spanish:
  - el danita
  - la tribu de Dan
  lexicon: HALOT
  rationale: El gentilicio con artículo funciona aquí como designación tribal en una lista militar. «Dan» es la forma más sobria y fiel al contexto de enumeración; en español, «el danita» sería menos idiomático y más marcado.
- source_word: עֹרְכֵי מִלְחָמָה
  english_pob_choice: prepared for battle
  chosen_spanish: preparados para la batalla
  alternatives_spanish:
  - en formación para la batalla
  - arrayados para la batalla
  - dispuestos para la guerra
  lexicon: HALOT
  rationale: El participio describe a quienes están organizados o listos para el combate. «Preparados para la batalla» comunica bien la disposición militar sin perder la idea de formación o arreglo para guerra que conserva el hebreo.
- source_word: עֶשְׂרִים וּשְׁמוֹנָה אֶלֶף וְשֵׁשׁ מֵאוֹת
  english_pob_choice: twenty-eight thousand six hundred
  chosen_spanish: veintiocho mil seiscientos
  alternatives_spanish:
  - '28.600'
  - veintiocho mil y seiscientos
  lexicon: HALOT
  rationale: La serie numeral hebrea corresponde de manera directa a 28,600. La forma en palabras mantiene el registro bíblico y es plenamente clara en español.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la revisión más reciente; el borrador español sigue esa lectura estable y conserva la única variación léxica relevante en el sintagma militar.
  spanish_consistency_notes:
  - Se mantiene «Dan» como designación tribal breve, coherente con una lista militar y genealógica.
  - «Preparados para la batalla» evita un calco rígido y refleja la idea de disposición bélica del participio hebreo.
  - La cifra se expresa en palabras para concordar con el tono bíblico y facilitar la lectura pública.
