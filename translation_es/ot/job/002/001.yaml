translation:
  language: es
  text: Otra vez hubo un día en que los hijos de Dios vinieron a presentarse ante Yahvé[a], y también vino entre ellos el Adversario[b] para presentarse ante Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Dios». Esto puede referirse a seres celestiales o a miembros del consejo divino.'
    reason: lexical_alternative
  - marker: b
    text: 'O «Satanás»; el hebreo tiene el artículo: «el satan», probablemente funcionando aquí como título con el sentido de «el adversario» o «el acusador».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  english_pob_choice: Again there was a day
  chosen_spanish: Otra vez hubo un día
  alternatives_spanish:
  - Había otra vez un día
  - Y otra vez hubo un día
  - Un día más
  lexicon: HALOT
  rationale: Conserva la repetición narrativa de la escena anterior y expresa en español el valor de recurrencia de la fórmula sin forzar una paráfrasis.
- source_word: בְּנֵי הָאֱלֹהִים
  english_pob_choice: the sons of God
  chosen_spanish: los hijos de Dios
  alternatives_spanish:
  - los seres celestiales
  - los seres divinos
  lexicon: HALOT
  rationale: Se mantiene la transparencia formal del hebreo y, como en el POB inglés, se preserva la tensión interpretativa en vez de resolverla dentro del texto principal.
- source_word: לְהִתְיַצֵּב עַל יְהוָה
  english_pob_choice: to present themselves before Yahweh
  chosen_spanish: presentarse ante Yahvé
  alternatives_spanish:
  - ponerse de pie ante Yahvé
  - tomar posición ante Yahvé
  lexicon: HALOT
  rationale: En español, 'presentarse ante' comunica mejor la escena de comparecencia formal que un calco como 'estar de pie ante'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del POB de transliterar el nombre divino y no sustituirlo por un título cubierto.
- source_word: הַשָּׂטָן
  english_pob_choice: the Adversary
  chosen_spanish: el Adversario
  alternatives_spanish:
  - Satanás
  - el Satanás
  - el acusador
  lexicon: HALOT
  rationale: El artículo hebreo sugiere un título o función. 'El Adversario' preserva ese valor titular en español mejor que un nombre propio fijo.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  lexicon: HALOT
  rationale: '''Entre ellos'' es la equivalencia natural y clara en español, con el mismo alcance inclusivo del grupo reunido.'
theological_decisions:
- issue: Tratamiento de הַשָּׂטָן como título o nombre propio
  english_pob_reading: the Adversary
  chosen_spanish_reading: el Adversario
  alternative_spanish_readings:
  - Satanás
  - el Satanás
  - el acusador
  rationale: La presencia del artículo definido en hebreo apunta a una designación titular más que a un nombre propio plenamente fijado. La traducción conserva la tensión teológica y filológica, en línea con la decisión del POB inglés.
  doctrine_reference: Primacía del texto original y preservación de la ambigüedad significativa.
translation_notes:
  revision_awareness: Se conservó la estructura narrativa y la repetición verbal del hebreo, siguiendo el audit trail inglés. No se introdujeron armonizaciones doctrinales ni se resolvió la ambigüedad de הַשָּׂטָן más allá de lo que el texto respalda. La única adaptación idiomática importante fue 'presentarse ante' para לְהִתְיַצֵּב עַל, por ser la opción española más natural y fiel a la comparecencia formal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה, conforme al estándar español del proyecto.
  - '''Adversario'' conserva el valor titular de הַשָּׂטָן y evita imponer una lectura de nombre propio.'
  - '''Hijos de Dios'' reproduce la transparencia léxica del hebreo, con la aclaración en nota.'
  - La comparación con la versión inglesa POB se respetó en contenido y en las dos notas de apertura interpretativa.
