translation:
  language: es
  text: Y cuando oyó que levanté mi voz y grité[a], dejó su prenda junto a mí[b], huyó y salió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «alcé mi voz y llamé a gritos»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dejó su prenda conmigo»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִ֣י כְ/שָׁמְע֔/וֹ
  english_pob_choice: And when he heard
  chosen_spanish: Y sucedió que, al oír
  alternatives_spanish:
  - Cuando oyó
  - Y cuando oyó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea con וַיְהִי + כְּ/infinitivo se vierte de manera natural en español con una cláusula temporal. 'Y sucedió que' conserva el arranque narrativo sin sonar mecánico, y 'al oír' refleja la simultaneidad temporal del hebreo.
- source_word: כִּֽי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo oído. 'Que' es la forma más natural en español para esa subordinación y evita forzar un valor causal o temporal que el contexto no exige.
- source_word: הֲרִימֹ֥תִי קוֹלִ֖/י
  english_pob_choice: I had raised my voice
  chosen_spanish: había alzado mi voz
  alternatives_spanish:
  - había levantado mi voz
  - había subido la voz
  lexicon: HALOT
  rationale: 'El hebreo es idiomático: literalmente ''levanté alzé mi voz''. ''Había alzado mi voz'' mantiene la imagen verbal y la anterioridad respecto de ''oyó''. En español ''alzar la voz'' es comprensible y fiel, sin perder la tensión del idioma.'
- source_word: וָ/אֶקְרָא
  english_pob_choice: and cried out
  chosen_spanish: y gritado
  alternatives_spanish:
  - y clamado
  - y llamado
  lexicon: HALOT
  rationale: En este contexto קרא denota un clamor fuerte de alarma o auxilio. 'Gritado' conserva la urgencia; unido a 'alzado mi voz' evita suavizar el doble énfasis del hebreo. 'Gritado' también permite una lectura conjunta con el verbo anterior, como en el audit trail inglés.
- source_word: וַ/יַּעֲזֹ֤ב בִּגְד/וֹ֙
  english_pob_choice: he left his garment
  chosen_spanish: dejó su ropa
  alternatives_spanish:
  - dejó su vestido
  - abandonó su ropa
  lexicon: HALOT
  rationale: בגד puede significar prenda/ropa; en español 'ropa' funciona de forma natural y evita un término demasiado técnico. 'Dejó' reproduce el acto puntual sin cargarlo con una connotación más fuerte que el hebreo.
- source_word: אֶצְלִ֔/י
  english_pob_choice: beside me
  chosen_spanish: junto a mí
  alternatives_spanish:
  - conmigo
  - a mi lado
  lexicon: HALOT
  rationale: La preposición señala proximidad física. 'Junto a mí' comunica claramente la colocación de la prenda y evita la ambigüedad de 'conmigo', que podría sonar relacional más que espacial.
- source_word: וַ/יָּ֖נָס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - corrió huyendo
  lexicon: HALOT
  rationale: נוס expresa huida rápida. 'Huyó' es la equivalencia directa y mantiene la fuerza narrativa del escape.
- source_word: וַ/יֵּצֵ֥א הַ/חֽוּצָ/ה
  english_pob_choice: and went outside
  chosen_spanish: y salió afuera
  alternatives_spanish:
  - y salió
  - y fue afuera
  lexicon: HALOT
  rationale: La combinación verbal con la dirección 'afuera' indica salida del espacio interior. 'Salió afuera' refleja el hebreo con claridad; aunque es ligeramente enfático, reproduce el movimiento direccional del original y del audit trail inglés.
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del control de revisiones: sin cambios aplicados y con alta concordancia en el repaso, por lo que no se introdujeron ajustes textuales adicionales respecto del sentido auditado.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino fuera de este versículo, ya que no aparece en el hebreo base.
  - 'Se conservó el paralelismo narrativo del original: oír → dejar la prenda → huir → salir.'
  - '''Ropa'' se usa aquí como equivalente natural de בגד en una escena concreta; no se fuerza ''vestidura'' por estilo tradicional.'
  - La puntuación busca reflejar una progresión narrativa fluida en español sin añadir elementos interpretativos.
