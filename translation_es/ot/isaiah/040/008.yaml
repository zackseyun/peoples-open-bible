translation:
  language: es
  text: La hierba se seca[a], la flor se marchita, pero la palabra de nuestro Dios permanecerá para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La hierba se marchita, la flor se marchita». El hebreo usa dos verbos relacionados pero distintos para el deterioro de la vegetación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָבֵשׁ
  english_pob_choice: withers
  chosen_spanish: se marchita
  alternatives_spanish:
  - se seca
  - se agosta
  lexicon: HALOT
  rationale: El verbo hebreo expresa el proceso de perder vigor y secarse; en español, 'se marchita' comunica bien la imagen poética de transitoriedad y mantiene el paralelismo con la segunda cláusula sin sonar demasiado técnico.
- source_word: חָצִיר
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - césped
  lexicon: HALOT
  rationale: '''Hierba'' es natural y amplio en español bíblico contemporáneo; conserva la referencia a vegetación común sin restringirla a césped domesticado ni a un regionalismo.'
- source_word: נָבֵל
  english_pob_choice: fades
  chosen_spanish: se desvanece
  alternatives_spanish:
  - se marchita
  - se cae
  lexicon: HALOT
  rationale: El segundo verbo aporta una imagen relacionada pero distinta del primero. 'Se desvanece' conserva la idea de pérdida de vitalidad y permite distinguirlo de 'se marchita' sin forzar una repetición mecánica.
- source_word: צִיץ
  english_pob_choice: flower
  chosen_spanish: flor
  alternatives_spanish:
  - capullo
  - floración
  lexicon: HALOT
  rationale: '''Flor'' es el equivalente más claro y natural en español para este contexto poético; preserva la imagen general de belleza frágil y efímera.'
- source_word: וּדְבַר
  english_pob_choice: but the word
  chosen_spanish: pero la palabra
  alternatives_spanish:
  - y la palabra
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente 'y', el contraste poético y teológico entre lo perecedero y lo permanente se expresa de modo más natural con 'pero' en español, sin alterar el sentido del paralelo.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: of our God
  chosen_spanish: de nuestro Dios
  alternatives_spanish:
  - de nuestros dioses
  - de nuestro Señor
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona plural se traduce de manera idiomática y singular como 'nuestro Dios', manteniendo el referente del texto hebreo.
- source_word: יָקוּם
  english_pob_choice: will stand
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se mantendrá
  - estará firme
  lexicon: HALOT
  rationale: קום significa literalmente 'levantarse/estar en pie'. En este contexto de permanencia, 'permanecerá' transmite la idea de durabilidad continua en un español natural; 'estará firme' sería más figurado, pero menos fluido en la línea.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '''Para siempre'' es la equivalencia moderna más clara y directa para la duración indefinida absoluta del hebreo en este contexto.'
theological_decisions:
- issue: La conjunción entre las dos mitades del versículo
  english_pob_reading: Use 'but' in the main text
  chosen_spanish_reading: Usar 'pero' en el texto principal
  alternative_spanish_readings:
  - usar 'y' de manera más literal
  rationale: El contraste entre la fragilidad de la creación y la permanencia de la palabra divina es central en el versículo. 'Pero' expresa esa oposición de forma idiomática en español y refleja la lectura auditada del POB sin introducir contenido ajeno.
  doctrine_reference: Translation philosophy §1, §6
- issue: La expresión דְבַר אֱלֹהֵינוּ
  english_pob_reading: word of our God
  chosen_spanish_reading: palabra de nuestro Dios
  alternative_spanish_readings:
  - mensaje de nuestro Dios
  - promesa de nuestro Dios
  rationale: '''Palabra'' conserva el alcance léxico amplio del hebreo דָּבָר y permite que el enunciado abarque la declaración divina en general, no solo una promesa específica o un mensaje aislado.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción española sigue la revisión auditada del POB que ajustó la primera cláusula para distinguir mejor los dos verbos hebreos y preservar el contraste poético. También toma en cuenta que la versión inglesa final prefirió 'withers' / 'fades' y 'will stand forever' para reflejar la permanencia del דבר de Dios, mientras que en español se optó por un equivalente más natural de 'will stand' en este contexto, 'permanecerá'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y no se introduce una mayúscula teológica adicional fuera de lo normal en español.
  - '''Palabra'' se conserva como término amplio y bíblico, evitando estrechar el sentido a ''promesa'' o ''mensaje''.'
  - Se usa 'para siempre' como equivalente idiomático de לְעוֹלָם, coherente con el registro bíblico moderno y claramente entendible.
