translation:
  language: es
  text: Solía ir a Media[a], y deposité diez talentos de plata[b] con Gabael, el hermano de Gabri, en Rages[c] de Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Fui a Media». El imperfecto griego puede sugerir una acción repetida o habitual, no solo un viaje puntual.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dejé en custodia diez talentos de plata». El verbo griego también puede implicar poner algo bajo el cuidado de otra persona, especialmente en un contexto financiero.'
    reason: lexical_alternative
  - marker: c
    text: El nombre del lugar puede renderizarse también «Rhages de Media».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπορευόμην
  english_pob_choice: I used to go
  chosen_spanish: Solía ir
  alternatives_spanish:
  - Iba
  - Solía viajar
  - Fui
  lexicon: BDAG
  rationale: El imperfecto griego sugiere una acción habitual o repetida en el pasado; «solía ir» conserva mejor ese valor aspectual que un pretérito simple.
- source_word: παρεθέμην
  english_pob_choice: I deposited
  chosen_spanish: deposité
  alternatives_spanish:
  - confié
  - entregué en depósito
  - encomendé
  lexicon: BDAG
  rationale: En contexto financiero, el verbo indica poner dinero bajo resguardo de otra persona. «Deposité» comunica con claridad ese acto sin perder el matiz de custodia implícito.
- source_word: ἀργυρίου
  english_pob_choice: silver
  chosen_spanish: de plata
  alternatives_spanish:
  - de dinero
  - de plata acuñada
  lexicon: BDAG
  rationale: El griego dice literalmente «de plata»; mantener el metal preserva la expresión monetaria antigua sin convertirla en un equivalente moderno más interpretativo.
- source_word: τάλαντα δέκα
  english_pob_choice: ten talents
  chosen_spanish: diez talentos
  alternatives_spanish:
  - diez talentos de peso
  - diez unidades de talento
  lexicon: BDAG
  rationale: «Talentos» es la equivalencia establecida para τάλαντον; evita una paráfrasis cuantificadora moderna y conserva la medida antigua.
- source_word: Γαβηλῷ
  english_pob_choice: Gabael
  chosen_spanish: Gabael
  alternatives_spanish:
  - Gabel
  - Gabael
  lexicon: convención onomástica
  rationale: Se conserva la transliteración habitual del nombre propio griego en español, que es natural y reconocible para el lector.
- source_word: τῷ ἀδελφῷ Γαβρίᾳ
  english_pob_choice: the brother of Gabri
  chosen_spanish: el hermano de Gabri
  alternatives_spanish:
  - Gabri, su hermano
  - el hermano de Gabriel
  lexicon: BDAG
  rationale: La construcción genitiva identifica a Gabael como «el hermano de Gabri»; se mantiene el orden más cercano al griego sin forzar una aclaración innecesaria.
- source_word: ἐν Ῥάγοις τῆς Μηδείας
  english_pob_choice: in Rages of Media
  chosen_spanish: en Rages de Media
  alternatives_spanish:
  - en Rhages de Media
  - en Rages, en Media
  lexicon: BDAG
  rationale: «Rages» reproduce la forma tradicional del topónimo griego y «de Media» refleja la construcción geográfica del original.
