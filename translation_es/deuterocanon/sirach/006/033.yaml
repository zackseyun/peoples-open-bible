translation:
  language: es
  text: Si estás dispuesto a escuchar[a], recibirás instrucción; si inclinas tu oído[b], llegarás a ser sabio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado para este versículo es difícil y parece más breve que el griego. El paralelo griego dice: "Si amas escuchar, recibirás instrucción, y si inclinas tu oído, llegarás a ser sabio". La traducción sigue el hebreo como base, usando el griego para aclarar el sentido y conservar el paralelismo más pleno.'
    reason: textual_variant
  - marker: b
    text: O "recibirás instrucción" en lugar de "aprenderás disciplina".
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם תּוֹבֵא לִשְׁמֹעַ / ἐὰν ἀγαπήσῃς ἀκούειν
  english_pob_choice: If you are willing to listen
  chosen_spanish: Si estás dispuesto a escuchar
  alternatives_spanish:
  - Si quieres escuchar
  - Si amas escuchar
  - Si te dispones a oír
  lexicon: HALOT; LXX parallel
  rationale: El hebreo transmitido es difícil y el paralelo griego aclara una disposición voluntaria hacia oír. En español, 'estar dispuesto a escuchar' preserva esa voluntad sin forzar un calco literal poco natural.
- source_word: תִּוָּסֵר / ἐκδέξῃ
  english_pob_choice: you will receive instruction
  chosen_spanish: recibirás instrucción
  alternatives_spanish:
  - serás instruido
  - recibirás corrección
  - aprenderás disciplina
  lexicon: HALOT; contexto sapiencial
  rationale: La forma hebrea puede abarcar instrucción/corrección. 'Recibirás instrucción' refleja el sentido más directo y mantiene el tono sapiencial; 'recibirás corrección' quedaría más duro y 'aprenderás disciplina' suena menos preciso en español aquí.
- source_word: וְתֵט אָזְנְךָ / κλίνῃς τὸ οὖς σου
  english_pob_choice: if you incline your ear
  chosen_spanish: si inclinas tu oído
  alternatives_spanish:
  - si doblas tu oído
  - si prestas atención
  - si inclinas tu oreja
  lexicon: HALOT; idiomática española
  rationale: Se conserva la metáfora hebrea/griega de atención auditiva. 'Oído' es más natural y fiel que 'oreja' en registro bíblico contemporáneo, y evita sustituir la imagen por una paráfrasis.
- source_word: σοφὸς ἔσῃ
  english_pob_choice: you will become wise
  chosen_spanish: serás sabio
  alternatives_spanish:
  - llegarás a ser sabio
  - te harás sabio
  lexicon: BDAG; LXX parallel
  rationale: El griego expresa resultado futuro. En español, 'serás sabio' comunica el resultado con sencillez; 'llegarás a ser sabio' sería más explícito, pero menos sobrio.
theological_decisions:
- issue: Relación entre el hebreo más breve y el paralelo griego más pleno
  english_pob_reading: The translation follows the Hebrew as primary while using the Greek to clarify the sense and preserve the fuller parallelism.
  chosen_spanish_reading: La redacción sigue el hebreo como base, pero refleja el paralelo griego para conservar el sentido y el paralelismo completo.
  alternative_spanish_readings:
  - Traducir solo el hebreo transmitido
  - Traducir solo el griego paralelo
  rationale: El testimonio hebreo disponible parece más corto y difícil; el griego preserva una segunda cola con 'serás sabio'. La solución española conserva ambas líneas de sentido sin ocultar la tensión textual.
  doctrine_reference: Crítica textual / uso de testigos paralelos en literatura sapiencial
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'learn discipline' por 'receive instruction' para reflejar con más precisión תִּוָּסֵר. La versión española adopta directamente 'recibirás instrucción' y conserva la segunda cláusula del paralelo griego ('serás sabio'), siguiendo la lógica de la última revisión auditada.
  spanish_consistency_notes:
  - Se usa 'oído' para mantener la imagen bíblica de atención, en armonía con el español moderno.
  - Se prefiere 'instrucción' sobre 'disciplina' para תִּוָּסֵר, según la revisión auditada y el matiz sapiencial.
  - No se introduce 'Mesías', 'Yahvé' ni otros términos no presentes en el versículo.
  - La puntuación con punto y coma refleja las dos colas condicionales del paralelo griego.
