    issue: Marcadores de notas mal anclados
    rationale: En el texto, [b][c] están sobre «primer aro», pero la nota b explica «completas» (תַמִּים). Esto incumple la disciplina requerida de anclar cada nota en la palabra o frase pertinente.
  - severity: low
    issue: Nota a ofrece una alternativa defectuosa
    rationale: Dice «O «emparejadas» o «a juego»», pero «emparejadas» no es alternativa, sino la lectura principal. Debe ofrecer variantes reales como «gemelas» o «a juego».
  - severity: low
    issue: Ligera mejora de naturalidad en la cláusula resumitiva
    rationale: «Así será para las dos» es comprensible, pero «Así será para ambas» suena más natural y mantiene el referente femenino implícito sin pérdida de sentido.
  revised_spanish_text: Estarán emparejadas abajo[a], y juntas estarán completas[b] en su parte superior, hasta el primer aro[c]. Así será para ambas; serán para las dos esquinas.
