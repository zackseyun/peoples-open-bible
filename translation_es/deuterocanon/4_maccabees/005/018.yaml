revisions:
- from: Y sin embargo[a], aun si nuestra ley no fuera verdaderamente divina, como tú supones, aunque nosotros pensamos que es divina, de todos modos no tendrías derecho a anular nuestra reputación en materia de piedad.
  to: Y sin embargo[a], aun si nuestra ley no fuera verdaderamente divina, como tú supones, aunque nosotros pensamos que es divina, de todos modos no tendrías derecho a anular nuestra honra por nuestra piedad.
  rationale: Se revisa δόξα a «honra» para reflejar mejor el sentido de condición honorable o buen nombre fundado en la piedad, manteniendo «reputación de piedad» como alternativa legítima en nota. También se reemplaza «en materia de piedad» por «por nuestra piedad» para un español más natural y acorde con el tono del pasaje.
