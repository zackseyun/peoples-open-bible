translation:
  language: es
  text: Una multitud de camellos te cubrirá[a], los camellos jóvenes de Madián y Efa; todos ellos vendrán de Saba. Llevarán oro y olíbano, y proclamarán las alabanzas de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los dromedarios de Madián y Efa'. El término hebreo se refiere a camellos jóvenes.
    reason: lexical_alternative
  - marker: b
    text: O 'anunciarán buenas noticias de las alabanzas de Yahvé'. El verbo puede llevar el sentido de heraldar buenas nuevas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁפְעַת
  english_pob_choice: A multitude of
  chosen_spanish: Una multitud de
  alternatives_spanish:
  - una abundancia de
  - un gran número de
  lexicon: HALOT
  rationale: El sustantivo expresa abundancia o profusión. 'Una multitud de' conserva la imagen de gran cantidad sin volverla demasiado abstracta o interpretativa en español.
- source_word: גְּמַלִּים
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - dromedarios
  lexicon: HALOT
  rationale: Es la equivalencia léxica directa y clara para el plural hebreo.
- source_word: תְּכַסֵּךְ
  english_pob_choice: will cover you
  chosen_spanish: te cubrirá
  alternatives_spanish:
  - te envolverá
  - te colmará
  lexicon: HALOT
  rationale: El verbo en piel de כסה significa 'cubrir'. En español, 'te cubrirá' conserva la imagen profética y el destinatario femenino singular implícito en el hebreo.
- source_word: בִּכְרֵי
  english_pob_choice: the young camels of
  chosen_spanish: los camellos jóvenes de
  alternatives_spanish:
  - las dromedarias jóvenes de
  - las crías de
  lexicon: HALOT
  rationale: El término se refiere a camellos jóvenes. 'Camellos jóvenes' preserva el sentido léxico con claridad moderna; 'dromedarios' es una posibilidad tradicional, pero menos transparente.
- source_word: מִדְיָן וְעֵיפָה
  english_pob_choice: Midian and Ephah
  chosen_spanish: Madián y de Efa
  alternatives_spanish:
  - Madián y Efa
  lexicon: HALOT
  rationale: Se transliteran los nombres propios. Se mantiene la preposición repetida por naturalidad del sintagma en español y para reflejar el movimiento 'de' origen.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: La forma pronominal explícita del hebreo queda reflejada con 'todos ellos'.
- source_word: מִשְּׁבָא
  english_pob_choice: from Sheba
  chosen_spanish: de Saba
  alternatives_spanish:
  - desde Saba
  lexicon: HALOT
  rationale: El nombre propio se transcribe como Saba en español bíblico. 'De Saba' mantiene el origen expresado por la preposición.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: HALOT
  rationale: Equivalencia directa y transparente para el metal precioso mencionado.
- source_word: וּלְבוֹנָה
  english_pob_choice: frankincense
  chosen_spanish: incienso
  alternatives_spanish:
  - olíbano
  lexicon: HALOT
  rationale: Aunque el hebreo designa específicamente el olíbano/frankincense, 'incienso' es el término más inteligible en español bíblico y litúrgico amplio. Se preserva la referencia al aromático ofrecido junto con el oro.
- source_word: יִשָּׂאוּ
  english_pob_choice: will carry
  chosen_spanish: traerán
  alternatives_spanish:
  - llevarán
  - portarán
  lexicon: HALOT
  rationale: En contexto de tributo que se aproxima a Sion, 'traerán' comunica naturalmente la acción del traslado sin perder la idea de portar/cargar.
- source_word: וּתְהִלֹּת יְהוָה
  english_pob_choice: the praises of Yahweh
  chosen_spanish: las alabanzas de Yahvé
  alternatives_spanish:
  - las alabanzas a Yahvé
  - las proezas de Yahvé
  lexicon: HALOT
  rationale: '''Tehillot'' puede referirse a alabanzas o a cosas dignas de alabanza. ''Las alabanzas de Yahvé'' conserva la compactación hebrea y la ambigüedad útil sin explicitar más de lo debido.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en la forma de uso del proyecto en español, en vez de sustituirlo por un título como 'el SEÑOR'.
- source_word: יְבַשֵּׂרוּ
  english_pob_choice: they will proclaim
  chosen_spanish: proclamarán
  alternatives_spanish:
  - anunciarán
  - heraldarán
  lexicon: HALOT
  rationale: El piel de בשר tiene el sentido de anunciar buenas nuevas. 'Proclamarán' es una opción sobria y fiel que funciona bien con el objeto 'las alabanzas de Yahvé'.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El hebreo contiene directamente el Tetragrámaton. Se preserva el nombre propio divino en español en lugar de ocultarlo tras un título, siguiendo la convención del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé/Yahweh'
- issue: Relación entre 'alabanzas' y el verbo 'proclamar' en וּתְהִלֹּת יְהוָה יְבַשֵּׂרוּ
  english_pob_reading: they will proclaim the praises of Yahweh
  chosen_spanish_reading: proclamarán las alabanzas de Yahvé
  alternative_spanish_readings:
  - anunciarán las alabanzas de Yahvé
  - proclamarán las proezas de Yahvé
  rationale: El hebreo permite una relación compacta entre el contenido proclamado y el verbo de anuncio. 'Proclamarán las alabanzas de Yahvé' mantiene esa ambigüedad y no fuerza una paráfrasis teológica más amplia.
  doctrine_reference: HALOT / POB audit trail for בשר and תהילות
translation_notes:
  revision_awareness: El borrador sigue el sentido y las decisiones léxicas del audit trail inglés sin depender mecánicamente de su redacción. Se conserva la imagen de abundancia, el valor de los nombres propios, la precisión de לְבוֹנָה como incienso/olíbano, y la ambigüedad de יְבַשֵּׂרוּ con una solución española natural. No se detectaron revisiones aplicadas en la fuente inglesa reciente; el pasaje se traduce de forma coherente con el pass marcado 'unchanged'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto en español.
  - '''Camellos jóvenes'' evita el término zoológico más tradicional ''dromedarios'' salvo en la nota alternativa.'
  - '''Incienso'' se emplea como término comprensible en español, con la nota que reconoce el valor específico del hebreo.'
  - Se mantiene el paralelismo del versículo con dos miembros coordinados y una clausula final de proclamación.
