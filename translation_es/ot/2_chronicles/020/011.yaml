review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría en los puntos principales: mantiene la apelación enfática de וְהִנֵּה, conserva el pronombre enfático הֵם, refleja la ironía de גֹּמְלִים עָלֵינוּ, y preserva la distinción teológica entre «tu posesión» y la herencia dada a Israel. Sin embargo, «nos están pagando» en español suena más naturalmente a pago literal o incluso favorable, y no transmite con suficiente claridad la idea de retribución hostil/irónica del hebreo en este contexto.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «nos están pagando viniendo» resulta algo tosco e idiomáticamente débil en español bíblico natural. «Nos están pagando así al venir a expulsarnos» mejora la fluidez y explicita la ironía contextual sin apartarse del sentido fuente. El resto de la frase es legible y adecuado para un registro eclesial moderno.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Tu posesión» / «como herencia» respeta correctamente la distinción documentada. La revisión propuesta afecta solo la naturalidad y precisión contextual de גמל.
  issues:
  - severity: medium
    issue: «nos están pagando» es ambiguo y poco idiomático en este contexto
    rationale: Aunque literaliza la idea de retribución, en español puede entenderse como pago económico o incluso positivo. El hebreo expresa una devolución irónica de trato hostil; conviene explicitarlo mejor.
  - severity: low
    issue: La construcción «viniendo a expulsarnos» suena algo mecánica
    rationale: Refleja el inglés auditado, pero en español suena más natural «al venir a expulsarnos» o «al venir para expulsarnos», manteniendo el valor de medio/propósito.
  - severity: low
    issue: Alternativa léxica «Y behold» en decisiones léxicas
    rationale: Es un anglicismo dentro de las alternativas en español y no debería figurar como opción española válida, aunque no afecta el texto principal.
  revised_spanish_text: Y he aquí[a], ellos nos están pagando así al venir a expulsarnos de tu posesión, que tú nos diste como herencia.
