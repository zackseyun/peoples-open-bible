translation:
  language: es
  text: Ellos hicieron reyes, pero no por mí; nombraron príncipes[a], pero yo no lo sabía. Con su plata y su oro hicieron ídolos para sí, para que fueran exterminados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pusieron oficiales» para «nombraron príncipes».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «para que sea destruido», con verbo singular; el referente puede ser Israel/Samaria como colectivo o, posiblemente, el ídolo.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִמְלִיכוּ
  english_pob_choice: made kings
  chosen_spanish: hicieron reyes
  alternatives_spanish:
  - pusieron reyes
  - instalaron reyes
  - nombraron reyes
  lexicon: HALOT
  rationale: El verbo hebreo en hiphil expresa causar que alguien reine; en español, “hicieron reyes” conserva la fuerza causativa sin añadir una interpretación más específica como “instalaron”. Mantiene también el paralelismo con la segunda cola del versículo.
- source_word: מִמֶּנִּי
  english_pob_choice: by me
  chosen_spanish: por mí
  alternatives_spanish:
  - de mí
  - sin mí
  lexicon: HALOT
  rationale: Aunque el sentido literal es “de mí”, en este contexto la preposición comunica autorización o procedencia. “Por mí” conserva la idea de agencia/aval divino y resulta natural en español. No se suaviza a “sin mí”, porque eso resolvería demasiado la tensión del hebreo.
- source_word: הֵשִׂירוּ
  english_pob_choice: appointed princes
  chosen_spanish: nombraron príncipes
  alternatives_spanish:
  - pusieron príncipes
  - instalaron príncipes
  - nombraron oficiales
  lexicon: HALOT
  rationale: El término es textualmente discutido en contexto, pero el paralelismo con “hicieron reyes” apunta a la designación de gobernantes. “Nombraron príncipes” preserva esa relación y evita forzar una glosa demasiado técnica.
- source_word: יָדָעְתִּי
  english_pob_choice: I did not know it
  chosen_spanish: yo no lo sabía
  alternatives_spanish:
  - yo no lo reconocí
  - yo no lo aprobé
  - yo nada sabía de ello
  lexicon: HALOT
  rationale: “No lo sabía” reproduce bien la expresión hebrea sin explicitar más de lo que el texto dice. En contexto profético implica también falta de reconocimiento o aprobación, pero esa carga se deja en la nota teológica para no borrar la tensión del original.
- source_word: כַּסְפָּם וּזְהָבָם
  english_pob_choice: with their silver and their gold
  chosen_spanish: con su plata y su oro
  alternatives_spanish:
  - de su plata y de su oro
  - usando su plata y su oro
  lexicon: HALOT
  rationale: El hebreo coloca los materiales en primer plano; “con” es la manera más natural de conservar el valor instrumental/material en español sin perder la imagen concreta.
- source_word: עֲצַבִּים
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  - esculturas idolátricas
  - representaciones
  lexicon: HALOT
  rationale: “Ídolos” transmite el referente y la valoración negativa profética mejor que un término neutral como “imágenes”. Mantiene la carga teológica del término hebreo.
- source_word: לְמַעַן יִכָּרֵת
  english_pob_choice: so that they might be cut off
  chosen_spanish: para que fueran destruidos
  alternatives_spanish:
  - para que fueran cortados
  - para que fuesen eliminados
  - con el fin de que fueran destruidos
  lexicon: HALOT
  rationale: El verbo está en niphal singular y admite ambigüedad de referente. En español, “fueran destruidos” comunica el resultado judicial de forma idiomática y mantiene abierta la referencia colectiva implícita en el contexto, sin resolverla en exceso.
theological_decisions:
- issue: Autoridad divina en los cambios políticos de Israel
  english_pob_reading: The verse states that Israel established rulers without God's authorization or acknowledgment.
  chosen_spanish_reading: El versículo afirma que Israel estableció reyes y príncipes sin el aval de Yahvé y sin que él los reconociera.
  alternative_spanish_readings:
  - El versículo solo indica que Dios no estaba informado en un sentido narrativo.
  - El versículo condena únicamente cambios dinásticos concretos, no el patrón general.
  rationale: La duplicación de cláusulas y el contexto profético señalan desaprobación pactual, no ignorancia literal. La traducción conserva la expresión del hebreo (“por mí”, “no lo sabía”) en el texto principal para no borrar la tensión, y la lectura teológica se explicita aquí.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Referente del singular final יִכָּרֵת
  english_pob_reading: Rendered as a collective plural result referring to the people who made the idols.
  chosen_spanish_reading: 'Se entiende como un resultado colectivo: quienes hicieron los ídolos quedan destinados a ser destruidos.'
  alternative_spanish_readings:
  - Se refiere a Israel/Samaria como colectivo singular.
  - Se refiere a cada ídolo como objeto de destrucción.
  rationale: El hebreo termina con un singular ambiguo. En español, un singular literal sería opaco; por eso se traduce con plural colectivo, preservando el juicio sin cerrar indebidamente el referente. La ambigüedad textual queda reconocida en la nota.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción sigue el último pase revisado del POB en inglés: se conserva la distinción entre autorización divina (“por mí”) y conocimiento/reconocimiento (“no lo sabía”), y se mantiene la ambigüedad final del singular hebreo mediante una nota. Frente al inglés, se optó por un español más natural y publicable sin perder las tensiones documentadas del original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» implícitamente en la nota teológica, conforme al estándar del proyecto para el tetragrámaton.
  - «Ídolos» mantiene el tono peyorativo profético de עֲצַבִּים.
  - Se conserva el paralelismo político de «reyes / príncipes» para reflejar la estructura hebrea.
  - La nota b recoge la alternativa lexical documentada en el audit trail inglés sin introducir un cambio doctrinal.
