base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/005/024.yaml
  text: And it trains in righteousness[a], so that one may be fair in all matters of conduct, and it teaches piety[b], so that one may worship only the God who truly exists with due majesty.
  footnotes:
  - marker: a
    text: 'Or ''justice'': the Greek δικαιοσύνη can denote righteousness or justice; here the main text keeps the project''s default ''righteousness.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'only the true God.' The Greek literally emphasizes 'the God who is,' contrasting the real God with false gods.
    reason: alternative_reading
