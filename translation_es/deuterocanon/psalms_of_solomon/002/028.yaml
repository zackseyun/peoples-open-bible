review_pass:
  verdict: revise
  source_alignment_summary: 'La base griega pide: «derramar su ira sobre nosotros» + una frase compacta «ἐν ἁρπάγματι» que expresa despojo/saqueo violento, y luego «no retrases… el devolverles sobre sus cabezas». El borrador acierta en «derramar», «ira», «no tardes» y en la fórmula de retribución sobre la cabeza. Sin embargo, «en medio de saqueo» es poco natural en español y omite el artículo, además no refleja tan bien el valor instrumental/circunstancial que el inglés auditado resolvió como “in plundering” con nota alternativa. También la nota b está mal alineada con el texto: el inglés conserva una nota histórica sobre la traducción previa de ἐν ἁρπάγματι, no sobre «cabezas».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «en medio de saqueo» suena forzado y poco idiomático; «en el saqueo» o «con saqueo» son más legibles. La segunda oración fluye bien. Conviene también ajustar las notas para que el marcador [b] ancle donde realmente corresponde la variante de ἐν ἁρπάγματι.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «Dios», «ira» y la fórmula retributiva están bien. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión principal a corregir es léxica-estilística para ἐν ἁρπάγματι.'
