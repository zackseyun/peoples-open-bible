translation:
  language: es
  text: las tenazas[a], los tazones, las copas y los braseros; de oro puro; y la entrada de la casa, sus puertas interiores para el Lugar Santísimo, y las puertas de la casa para la nave[b], eran de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «corta-mechas». El término hebreo designa un utensilio para recortar o apagar mechas; aquí se ha preferido una forma breve y natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «la sala principal del templo» o «el santuario». El hebreo הֵיכָל nombra aquí el recinto principal del templo, distinto del Lugar Santísimo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְזַמְּרוֹת
  english_pob_choice: snuffers
  chosen_spanish: tenazas
  alternatives_spanish:
  - pinzas
  - corta-mechas
  lexicon: HALOT
  rationale: El término apunta a un utensilio para recortar o apagar mechas; en español, "tenazas" comunica de forma natural la función instrumental sin forzar una tecnificación innecesaria. "Corta-mechas" es más explicativo, pero menos sobrio; "pinzas" puede resultar demasiado genérico.
- source_word: מִּזְרָקוֹת
  english_pob_choice: basins
  chosen_spanish: tazones
  alternatives_spanish:
  - vasijas
  - cuencos
  lexicon: HALOT
  rationale: Se refiere a recipientes rituales, probablemente para recibir o esparcir sangre. "Tazones" mantiene la distinción con la siguiente palabra y suena más natural en español bíblico que "basins" literalizado como "cuencas" o algo más técnico.
- source_word: כַּפּוֹת
  english_pob_choice: bowls
  chosen_spanish: copas
  alternatives_spanish:
  - cuencos
  - tazas
  lexicon: HALOT
  rationale: El término puede designar recipientes pequeños. "Copas" conserva la idea de un contenedor más pequeño que los anteriores y evita repetir "tazones"; aunque puede sugerir un vaso para beber, en español bíblico funciona bien como vasija pequeña de culto.
- source_word: מַּחְתּוֹת
  english_pob_choice: firepans
  chosen_spanish: incensarios
  alternatives_spanish:
  - braseros
  - palas para brasas
  lexicon: HALOT
  rationale: Aunque el inglés POB prefiere el término amplio "firepans" para no limitar el uso al incienso, en español "incensarios" es el equivalente cultual más reconocible para un recipiente de fuego en el templo. Se conserva el carácter ritual sin introducir una interpretación excesivamente específica de otra clase de objeto.
- source_word: זָהָב סָגוּר
  english_pob_choice: pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - de oro fino
  lexicon: HALOT
  rationale: '"סָגוּר" expresa oro refinado/de alta calidad. "Oro puro" es la correspondencia más clara y digna en español, y reproduce bien el valor predicativo del hebreo.'
- source_word: פֶּתַח הַבַּיִת
  english_pob_choice: the entrance of the house
  chosen_spanish: la entrada de la casa
  alternatives_spanish:
  - el acceso de la casa
  - la puerta de la casa
  lexicon: HALOT
  rationale: '"פֶּתַח" designa una abertura o entrada. "Entrada de la casa" conserva esa amplitud y deja que la especificación siguiente precise las puertas.'
- source_word: דַּלְתוֹתָיו הַפְּנִימִיּוֹת
  english_pob_choice: its inner doors
  chosen_spanish: sus puertas interiores
  alternatives_spanish:
  - sus hojas interiores
  - sus puertas internas
  lexicon: HALOT
  rationale: El plural hebreo alude a puertas/hojas dobles; "puertas interiores" es claro para lectores modernos y mantiene la oposición con las puertas exteriores implícitas en la segunda mitad del versículo.
- source_word: לְקֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: for the Most Holy Place
  chosen_spanish: para el Lugar Santísimo
  alternatives_spanish:
  - para el Santo de los Santos
  - para el Santo Lugar
  lexicon: HALOT
  rationale: '"Lugar Santísimo" es la expresión más conocida y fiel en español para el superlativo hebreo. Se conserva el valor cultual del término sin perder inteligibilidad.'
- source_word: הֵיכָל
  english_pob_choice: nave
  chosen_spanish: el nave
  alternatives_spanish:
  - el salón del templo
  - el templo hall
  - el santuario
  lexicon: HALOT
  rationale: El hebreo se refiere al salón principal del templo, distinto del Lugar Santísimo. Aquí se conserva la decisión inglesa de distinguir ese espacio, pero en español la forma más natural y transparente es "la nave" como sala principal del templo; sin embargo, por la ambigüedad del sustantivo español y para evitar sobreinterpretación, se mantiene la referencia funcional en nota.
- source_word: זָהָב
  english_pob_choice: were of gold
  chosen_spanish: eran de oro
  alternatives_spanish:
  - estaban hechos de oro
  - eran de oro puro
  lexicon: HALOT
  rationale: El predicado final indica materialidad. "Eran de oro" es la formulación más simple y directa en español; en conjunto con "oro puro" antes, deja claro el contraste material entre los implementos y las puertas.
theological_decisions:
- issue: Distinción entre el Lugar Santísimo y el recinto principal del templo
  english_pob_reading: Most Holy Place / nave are kept distinct, with a note clarifying that hekal is the main room of the temple, not the inner sanctuary.
  chosen_spanish_reading: Lugar Santísimo / nave (con nota aclaratoria sobre el valor de הֵיכָל como salón principal del templo)
  alternative_spanish_readings:
  - Santo de los Santos / santuario
  - Lugar Santísimo / salón del templo
  rationale: 'El versículo separa claramente dos espacios: el interiorísimo y el recinto principal. La traducción mantiene esa distinción, y la nota evita que "nave" se entienda de forma eclesiástica anacrónica o que "santuario" borre la diferencia con el Lugar Santísimo.'
  doctrine_reference: Templología bíblica; distinción entre el Lugar Santísimo y el lugar santo / sala principal
- issue: Traducción de los utensilios de culto sin sobreespecificar su función
  english_pob_reading: snuffers, basins, bowls, and firepans are rendered with general cultic terms, preserving some functional breadth.
  chosen_spanish_reading: tenazas, tazones, copas e incensarios
  alternative_spanish_readings:
  - corta-mechas, recipientes, cuencos y braseros
  - pinzas, vasijas, copas y palas para brasas
  rationale: El hebreo enumera objetos rituales de uso variado. La versión española conserva la amplitud del inventario y evita restringir indebidamente un utensilio a un solo uso cuando el contexto es inventarial, no explicativo.
  doctrine_reference: Lexicografía bíblica; fidelidad al inventario del templo
translation_notes:
  revision_awareness: La redacción inglesa revisada unificó la puntuación para que la lista de objetos y la cláusula final de materialidad quedaran sintácticamente ligadas. La versión española sigue esa misma estructura, manteniendo el inventario seguido por la especificación de oro y luego por la mención de la entrada y las puertas, sin introducir divisiones no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general, aunque este versículo no contiene el Nombre divino.
  - Se conserva "Lugar Santísimo" para קֹדֶשׁ הַקֳּדָשִׁים, evitando calcos innecesarios.
  - '"Oro puro" traduce adecuadamente זָהָב סָגוּר sin introducir una valoración teológica adicional.'
  - La decisión sobre הֵיכָל se registra en nota para preservar la distinción espacial del templo.
