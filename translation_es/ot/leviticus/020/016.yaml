translation:
  language: es
  text: Si una mujer se acerca a cualquier animal para aparearse con él[a], matarás a la mujer y al animal. Ciertamente se les dará muerte[b]; su sangre estará sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para acostarse con él». El verbo hebreo se refiere específicamente a un acto sexual, literalmente con la idea de montar.
    reason: lexical_alternative
  - marker: b
    text: O «su culpa de sangre estará sobre ellos». El modismo expresa que la responsabilidad por su muerte recae sobre ellos mismos.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְרַב
  english_pob_choice: approaches
  chosen_spanish: se acerca
  alternatives_spanish:
  - se aproxima
  - se allega
  - se llega a
  lexicon: HALOT
  rationale: קרב expresa movimiento de acercamiento. «Se acerca» conserva la acción concreta y el registro jurídico sin convertir el verbo en una paráfrasis sexual por sí mismo.
- source_word: בְּהֵמָה
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  lexicon: HALOT
  rationale: בהמה tiene un alcance amplio de animal/animal doméstico o bestia. «Animal» es claro en español moderno y evita tanto el arcaísmo de «bestia» como una restricción indebida a «ganado».
- source_word: לְרִבְעָה אֹתָהּ
  english_pob_choice: to mate with it
  chosen_spanish: para unirse con él
  alternatives_spanish:
  - para acostarse con él
  - para tener relaciones sexuales con él
  - para montarlo
  lexicon: HALOT
  rationale: El infinitivo de רבע aquí señala una relación sexual bestial, con la imagen literal de montarse. «Para unirse con él» comunica el acto sexual sin introducir un giro demasiado técnico ni un calco rudo, aunque mantiene la ambigüedad mínima que el hebreo permite. Se evita «montarlo» en el texto principal por sonar demasiado explicativo y mecánico en español.
- source_word: וְהָרַגְתָּ
  english_pob_choice: you shall kill
  chosen_spanish: matarás
  alternatives_spanish:
  - deberás matar
  - entonces matarás
  lexicon: HALOT
  rationale: La forma verbal en ley transmite mandato. «Matarás» conserva el tono legal directo y natural en español bíblico contemporáneo.
- source_word: מוֹת יוּמָתוּ
  english_pob_choice: They shall surely be put to death
  chosen_spanish: Ciertamente serán muertos
  alternatives_spanish:
  - Sin duda morirán
  - Serán ciertamente muertos
  - Serán puestos a muerte
  lexicon: HALOT
  rationale: La combinación del infinitivo absoluto con el verbo finito intensifica la sentencia. «Ciertamente» refleja esa fuerza enfática; «serán muertos» preserva la pasiva judicial y el vínculo con el castigo decretado.
- source_word: דְּמֵיהֶם בָּם
  english_pob_choice: their blood is on them
  chosen_spanish: su sangre caerá sobre ellos
  alternatives_spanish:
  - su sangre está sobre ellos
  - su sangre es sobre ellos
  - la culpa de su sangre recae sobre ellos
  lexicon: HALOT
  rationale: El hebreo usa un modismo de responsabilidad penal. «Caerá sobre ellos» expresa en español la idea de culpa y consecuencia recaída sobre los culpables, sin reducirla solo a una fórmula técnica ni alejarse demasiado del peso idiomático del original.
theological_decisions:
- issue: Tratamiento de un delito sexual severo con sanción capital
  english_pob_reading: Translate the legal sanction directly and without euphemistic softening.
  chosen_spanish_reading: Traducir la prohibición y la sanción de manera directa, sin suavizar el carácter penal del texto.
  alternative_spanish_readings:
  - Usar un eufemismo más suave como «acostarse con él»
  - usar una formulación más literal y oscura como «para ser montado por ella»
  rationale: El contexto es ley penal. La traducción debe conservar la gravedad de la prohibición y la sentencia sin añadir comentario moral ni rebajar la explicitud del hebreo. Por eso se mantiene una referencia sexual clara, pero en un español digno y publicable.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: No hubo cambios en la última pasada de revisión; el acuerdo de revisión fue alto y no se aplicaron revisiones posteriores. Esta propuesta mantiene la misma línea de decisión léxica y legal, con adaptación idiomática al español.
  spanish_consistency_notes:
  - Se conserva «animal» para בְּהֵמָה, en línea con el valor genérico del término.
  - Se mantiene el registro jurídico directo con futuros de mandato («matarás», «serán muertos»).
  - Se evita reemplazar el modismo penal por una explicación excesiva en el texto principal; la nota recoge la alternativa.
  - La formulación principal procura claridad pública sin perder la dureza legal del pasaje.
