translation:
  language: es
  text: No cometerán injusticia en el juicio[a], en las medidas de longitud, en el peso o en la medida de capacidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No harán mal en el juicio, en la medida, en el peso o en la medida de capacidad»'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: You shall not commit
  chosen_spanish: No harás
  alternatives_spanish:
  - No cometerás
  - No hagan
  - No cometeréis
  lexicon: HALOT
  rationale: El hebreo es una prohibición en segunda persona plural. En español bíblico moderno, la forma plural directa 'no harán' no es natural; 'No harás' mantiene la fuerza prohibitiva en un registro legible y solemne, aunque individualiza la forma para la publicación. La idea de 'cometer' se reserva implícitamente por el objeto 'injusticia'.
- source_word: עָוֶל
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - mal
  - injusticia/fraude
  - injusticia o agravio
  lexicon: HALOT
  rationale: עוֶל denota injusticia, maldad o trato torcido. 'Injusticia' es la equivalencia más directa y encaja con el contexto legal-comercial del versículo.
- source_word: בַּמִּשְׁפָּט
  english_pob_choice: in judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en el juicio legal
  - en la justicia
  - en el fallo
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar juicio, justicia o decisión legal. Se eligió 'juicio' porque conserva la amplitud del término hebreo y suena natural en español jurídico-bíblico. Se evita 'justicia' aquí para no repetir el sustantivo ya usado para עָוֶל.
- source_word: בַּמִּדָּה
  english_pob_choice: in measures of length
  chosen_spanish: en las medidas de longitud
  alternatives_spanish:
  - en la medida
  - en la medición
  - en medidas
  lexicon: HALOT
  rationale: מִדָּה es 'medida' en sentido general; por el paralelo con peso y capacidad, la referencia es a medidas comerciales concretas, especialmente de longitud. 'Medidas de longitud' reproduce bien la categoría especificada por el POB inglés sin forzar un tecnicismo innecesario.
- source_word: בַּמִּשְׁקָל
  english_pob_choice: weight
  chosen_spanish: en el peso
  alternatives_spanish:
  - en el pesaje
  - en la balanza
  - en el peso justo
  lexicon: HALOT
  rationale: מִשְׁקָל significa peso o cosa pesada. 'Peso' es la traducción más directa y mantiene el paralelismo con las otras dos categorías de medida.
- source_word: וּבַמְּשׂוּרָה
  english_pob_choice: volume
  chosen_spanish: o en la capacidad de medida
  alternatives_spanish:
  - o en el volumen
  - o en la medida de capacidad
  - o en la capacidad
  lexicon: HALOT
  rationale: מְשׂוּרָה designa una cantidad medida, especialmente una medida de capacidad, no necesariamente 'volumen' en sentido moderno geométrico. 'Capacidad de medida' conserva la amplitud semántica y refleja la alternativa auditada del POB inglés ('capacity measure').
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'measurement of length' por 'measures of length' para reflejar mejor el sentido colectivo/plural. La redacción española 'medidas de longitud' ya incorpora ese valor colectivo y evita una forma singular menos natural.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en el proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se usa 'juicio' para מִשְׁפָּט y no 'justicia' para preservar la distinción con עָוֶל.
  - Se evita 'Señor' o fórmulas de sustitución, ya que el versículo no incluye el tetragrámaton.
  - '''Capacidad de medida'' se elige como equivalente neutral para מְשׂוּרָה, siguiendo la nota alternativa del POB inglés.'
