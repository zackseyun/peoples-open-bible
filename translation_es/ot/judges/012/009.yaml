translation:
  language: es
  text: Tuvo treinta hijos varones[a] y treinta hijas; las envió fuera, y trajo de fuera treinta hijas para sus hijos. Y juzgó a Israel siete años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «casó a treinta hijas fuera de su clan o casa, y trajo de fuera treinta mujeres para sus hijos». El hebreo dice literalmente «hijas» en ambas cláusulas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ
  english_pob_choice: He had
  chosen_spanish: Tuvo
  alternatives_spanish:
  - Y hubo para él
  - Y tenía
  lexicon: HALOT
  rationale: El hebreo expresa posesión con היה + ל. En español, 'tuvo' comunica con naturalidad esa posesión sin forzar una estructura literal poco idiomática.
- source_word: שְׁלֹשִׁים בָּנִים
  english_pob_choice: thirty sons
  chosen_spanish: treinta hijos
  alternatives_spanish:
  - treinta hijos varones
  - treinta varones
  lexicon: HALOT
  rationale: '''בנים'' puede leerse literalmente como ''hijos'' en español. Dado que el verso contrapone después ''hijas'', ''hijos'' conserva la simetría textual sin perder el sentido masculino implícito.'
- source_word: וּשְׁלֹשִׁים בָּנוֹת
  english_pob_choice: and thirty daughters
  chosen_spanish: treinta hijas
  alternatives_spanish:
  - treinta mujeres
  - treinta muchachas
  lexicon: HALOT
  rationale: '''בנות'' significa ''hijas''. Se mantiene el paralelismo directo con la frase anterior y con la repetición posterior del versículo.'
- source_word: שִׁלַּח הַחוּצָה
  english_pob_choice: he sent away
  chosen_spanish: las envió fuera
  alternatives_spanish:
  - las despidió
  - las mandó afuera
  lexicon: HALOT
  rationale: '''שׁלח'' es ''enviar/mandar''. ''Las envió fuera'' conserva la idea de sacarlas de su casa o ámbito, sin decidir de manera excesiva el matiz matrimonial en el cuerpo principal.'
- source_word: וּשְׁלֹשִׁים בָּנוֹת הֵבִיא לְבָנָיו מִן הַחוּץ
  english_pob_choice: and he brought in thirty daughters from outside for his sons
  chosen_spanish: trajo de fuera treinta hijas para sus hijos
  alternatives_spanish:
  - trajo de fuera treinta mujeres para sus hijos
  - trajo desde afuera treinta hijas para sus hijos
  lexicon: HALOT
  rationale: Se mantiene la repetición de 'hijas' del hebreo, aunque el contexto apunta a esposas. 'De fuera' vierte מִן הַחוּץ de modo natural y conserva la oposición con el círculo doméstico o clan.
- source_word: מִן הַחוּץ
  english_pob_choice: from outside
  chosen_spanish: de fuera
  alternatives_spanish:
  - desde afuera
  - de afuera
  lexicon: HALOT
  rationale: '''De fuera'' es una expresión natural en español y mantiene la referencia a origen externo sin precisar geografía mayor de la que el hebreo exige.'
- source_word: וַיִּשְׁפֹּט אֶת יִשְׂרָאֵל
  english_pob_choice: And he judged Israel
  chosen_spanish: Y juzgó a Israel
  alternatives_spanish:
  - Y gobernó a Israel
  - Y fue juez de Israel
  lexicon: HALOT
  rationale: En Jueces, שׁפט es el verbo técnico del juez-libertador. 'Juzgó' preserva la terminología del libro mejor que equivalentes interpretativos.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: seven years
  chosen_spanish: siete años
  lexicon: HALOT
  rationale: Expresión temporal directa y estándar; no requiere ajuste.
theological_decisions:
- issue: Relación entre 'hijas' y el sentido matrimonial implícito
  english_pob_reading: The Hebrew literally says 'daughters' in both clauses; the English note preserves the possibility that the sense is 'he married off ... and brought in ... women/wives.'
  chosen_spanish_reading: Se conserva 'hijas' en ambas cláusulas, dejando implícito —sin explicitarlo en el texto principal— el posible sentido de matrimonio o de arreglo familiar/clánico.
  alternative_spanish_readings:
  - '''las casó fuera y trajo esposas para sus hijos'''
  - '''entregó fuera a sus hijas y trajo mujeres para sus hijos'''
  rationale: El hebreo repite 'hijas'; la traducción no debe borrar esa tensión lexical. En español, explicitar 'esposas' resolvería el pasaje interpretativamente y dejaría de reflejar la literalidad del original.
  doctrine_reference: N/A
- issue: Función de שׁפט en Jueces
  english_pob_reading: And he judged Israel
  chosen_spanish_reading: Y juzgó a Israel
  alternative_spanish_readings:
  - Y gobernó a Israel
  - Y fue juez de Israel
  rationale: El libro de Jueces usa un término técnico para los caudillos/jueces. 'Juzgó' conserva la recurrencia literaria y no sustituye el verbo por una explicación más amplia.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Revisé el contexto de audit trail en inglés y mantuve el acuerdo alto del borrador: se conservan la repetición de ''hijas'', el valor técnico de ''juzgó'', y la ambigüedad matrimonial implícita sin sobreinterpretación en el texto principal. La nota al pie recoge la alternativa explicativa donde el inglés POB la preserva.'
  spanish_consistency_notes:
  - Se usa 'fuera' en lugar de 'afuera' para mantener un registro bíblico natural y uniforme en una frase de movimiento/origen.
  - Se conserva 'juzgó' para coherencia con la terminología del libro de Jueces.
  - '''Hijos/hijas'' se mantiene como opción transparente que respeta la repetición del hebreo, con nota aclaratoria sobre la posible referencia a esposas.'
