translation:
  language: es
  text: Y cuando los hombres de la ciudad los vieron en la cima del monte, tomaron sus armas y salieron de la ciudad hacia la cima del monte; y todos los honderos[a] entre ellos les impedían subir y les seguían arrojando piedras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego σφενδονήτης: «hondero», más literalmente «el que usa honda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἄνδρες τῆς πόλεως
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - los varones de la ciudad
  - los hombres de la población
  lexicon: BDAG
  rationale: Conservo el plural masculino explícito del griego, como hace la POB inglesa, sin neutralizarlo. En español, 'hombres de la ciudad' es natural y fiel.
- source_word: ἐπὶ τὴν κορυφὴν τοῦ ὄρους
  english_pob_choice: on the top of the mountain
  chosen_spanish: en la cima del monte
  alternatives_spanish:
  - sobre la cima del monte
  - en la cumbre del monte
  lexicon: LSJ
  rationale: κορυφή denota la parte más alta; 'cima' comunica bien el sentido topográfico en español y evita la repetición demasiado literal de 'sobre la cima'.
- source_word: ἀνέλαβον τὰ ὅπλα αὐτῶν
  english_pob_choice: they took up their weapons
  chosen_spanish: tomaron sus armas
  alternatives_spanish:
  - tomaron sus armas de guerra
  - alzaron sus armas
  lexicon: BDAG
  rationale: ὅπλα puede traducirse con 'armas' en español de forma natural. 'Tomaron sus armas' conserva la acción de prepararse para el combate sin forzar un calco como 'tomaron sus armas arriba'.
- source_word: ἐπῆλθον ἔξω τῆς πόλεως
  english_pob_choice: went out of the city
  chosen_spanish: salieron de la ciudad
  alternatives_spanish:
  - salieron fuera de la ciudad
  - avanzaron fuera de la ciudad
  lexicon: BDAG
  rationale: El sentido básico es de salida desde la ciudad; 'salieron' es la forma más natural y fiel en español, sin añadir el matiz ofensivo que a veces puede implicar el verbo compuesto griego.
- source_word: πᾶς ἀνὴρ σφενδονήτης
  english_pob_choice: every slinger among them
  chosen_spanish: todo hondero entre ellos
  alternatives_spanish:
  - cada hondero entre ellos
  - todo hombre hondero entre ellos
  lexicon: LSJ
  rationale: σφενδονήτης significa 'hondero' o 'el que usa honda'. 'Todo hondero entre ellos' conserva el valor distributivo de πᾶς y evita una paráfrasis excesiva. En nota se explica la alternativa literal.
- source_word: διεκράτησαν τὴν ἀνάβασιν αὐτῶν
  english_pob_choice: held back their ascent
  chosen_spanish: detuvo su ascenso
  alternatives_spanish:
  - contenía su ascenso
  - les impedía subir
  - retenía su subida
  lexicon: BDAG
  rationale: El verbo transmite contención o bloqueo del avance cuesta arriba. En español, 'detuvo su ascenso' comunica con claridad la resistencia física del movimiento hacia arriba. El singular se entiende distributivamente dentro del sujeto colectivo.
- source_word: ἔβαλλον ἐν λίθοις ἐπʼ αὐτούς
  english_pob_choice: kept throwing stones at them
  chosen_spanish: les arrojaba piedras
  alternatives_spanish:
  - les lanzaba piedras
  - les tiraba piedras
  lexicon: BDAG
  rationale: El imperfecto pide una acción reiterada; 'arrojaba' preserva el aspecto progresivo en español. 'Piedras' expresa el instrumental griego de manera idiomática.
theological_decisions:
- issue: Mantenimiento del lenguaje masculino colectivo
  english_pob_reading: the men of the city / every slinger among them
  chosen_spanish_reading: los hombres de la ciudad / todo hondero entre ellos
  alternative_spanish_readings:
  - las personas de la ciudad
  - cada persona con honda entre ellos
  rationale: La POB inglesa conserva los masculinos del texto fuente y no los neutraliza. Se mantiene esa decisión en español para no borrar la forma del original ni la tensión gramatical del pasaje.
  doctrine_reference: fidelidad formal al género gramatical del texto fuente
- issue: Imagen de resistencia militar en el ascenso
  english_pob_reading: held back their ascent
  chosen_spanish_reading: detuvo su ascenso
  alternative_spanish_readings:
  - les impedía subir
  - bloqueó su subida
  rationale: No se suaviza el cuadro de hostilidad. 'Ascenso' mantiene la dimensión topográfica y estratégica del ataque desde abajo hacia la altura, coherente con el griego.
  doctrine_reference: coherencia contextual y narrativa del texto bíblico
translation_notes:
  revision_awareness: La POB inglesa fue revisada para preferir 'every slinger among them' en lugar de una perífrasis más larga. Esta versión española sigue esa revisión con 'todo hondero entre ellos', manteniendo la concisión y el valor distributivo del griego. También se evita traducir mecánicamente la repetición de κορυφή con una fórmula pesada, optando por una equivalencia natural ('en la cima del monte' / 'hacia la cima del monte') que conserva el movimiento del relato.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Armas'' traduce ὅπλα de forma sobria y comprensible en español contemporáneo.'
  - Se mantiene la repetición de 'cima del monte' para reflejar la reiteración espacial del griego.
  - El imperfecto final ('arrojaba') intenta reflejar la acción continua del griego ἔβαλλον.
