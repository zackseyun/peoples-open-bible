translation:
  language: es
  text: 'Y tuvo mucha sed[a], y clamó a Yahvé y dijo: «Tú has dado esta gran liberación[b] por mano de tu siervo, y ahora ¿moriré de sed y caeré en manos de los incircuncisos?[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se puso muy sediento».
    reason: lexical_alternative
  - marker: b
    text: «Esta gran liberación» también puede traducirse «esta gran salvación» o «esta gran victoria».
    reason: lexical_alternative
  - marker: c
    text: «Los incircuncisos» es un término con carga de pacto para los enemigos de Israel, aquí especialmente los filisteos.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּצְמָא מְאֹד
  english_pob_choice: he became very thirsty
  chosen_spanish: sintió mucha sed
  alternatives_spanish:
  - se quedó muy sediento
  - tuvo mucha sed
  lexicon: HALOT
  rationale: צמא expresa la experiencia de sed; en español, «sintió mucha sed» suena natural y conserva el sentido ingressivo sin calcar la estructura inglesa.
- source_word: וַיִּקְרָא אֶל יְהוָה
  english_pob_choice: he called to Yahweh
  chosen_spanish: clamó a Yahvé
  alternatives_spanish:
  - llamó a Yahvé
  - invocó a Yahvé
  lexicon: HALOT
  rationale: קרא אל en este contexto es un clamor dirigido en oración. «Clamó a Yahvé» comunica mejor la súplica que un simple «llamó», y mantiene la transparencia reverente del acto de oración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: «Yahvé», transliteración directa y no sustitución por un título.'
- source_word: בְיַד עַבְדְּךָ
  english_pob_choice: by the hand of your servant
  chosen_spanish: en mano de tu siervo
  alternatives_spanish:
  - por medio de tu siervo
  - por la mano de tu siervo
  lexicon: HALOT
  rationale: La expresión ביד conserva en español su imagen de agencia/instrumento con «en mano de», fórmula natural y suficientemente transparente. «Siervo» aquí es adecuado porque el hablante se presenta deferencialmente ante Dios; «esclavo» sería demasiado fuerte para este uso convencional.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aunque עבד puede ser «esclavo», en esta auto-designación orante el matiz predominante es el de subordinación reverente. «Siervo» evita una dureza innecesaria en español y corresponde al uso contextual.
- source_word: הַתְּשׁוּעָה הַגְּדֹלָה הַזֹּאת
  english_pob_choice: this great deliverance
  chosen_spanish: la gran liberación esta
  alternatives_spanish:
  - esta gran salvación
  - esta gran victoria
  lexicon: HALOT
  rationale: תשועה puede ser «liberación», «salvación» o «victoria». «Liberación» preserva el rescate concreto dado por Dios y evita reducir el término a una victoria meramente militar; el orden en español se ajusta para sonar natural manteniendo el demostrativo enfático.
- source_word: וְעַתָּה
  english_pob_choice: and now
  chosen_spanish: y ahora
  alternatives_spanish:
  - ahora
  lexicon: HALOT
  rationale: La conjunción marca el giro retórico entre la acción pasada de Dios y la crisis presente. «Y ahora» conserva ese contraste.
- source_word: אָמ֣וּת בַּצָּמָ֔א
  english_pob_choice: shall I die from thirst
  chosen_spanish: ¿moriré de sed?
  alternatives_spanish:
  - ¿he de morir de sed?
  - ¿moriré por la sed?
  lexicon: HALOT
  rationale: El hebreo plantea una pregunta retórica con fuerza de lamentación. En español, «moriré de sed» es idiomático y claro; «de sed» transmite bien la causa/circunstancia.
- source_word: וְנָפַלְתִּ֖י בְּיַ֥ד
  english_pob_choice: and fall into the hand of
  chosen_spanish: y caeré en mano de
  alternatives_spanish:
  - y caeré en poder de
  - y caeré en manos de
  lexicon: HALOT
  rationale: נפל ביד es un modismo de caer en poder de alguien. «Caeré en mano de» preserva la imagen hebrea y la continuidad con el lenguaje bíblico, sin perder inteligibilidad.
- source_word: הָעֲרֵלִים
  english_pob_choice: the uncircumcised
  chosen_spanish: los incircuncisos
  alternatives_spanish:
  - los no circuncidados
  - los filisteos
  lexicon: HALOT
  rationale: Se conserva el término literal por su carga de alianza y contraste identitario. «Incircuncisos» mantiene la tensión teológica del hebreo mejor que sustituirlo por el grupo étnico.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrámaton directamente. Se conserva el nombre propio del pacto en lugar de enmascararlo con un título, siguiendo la convención del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Covenantal force of הָעֲרֵלִים
  english_pob_reading: the uncircumcised
  chosen_spanish_reading: los incircuncisos
  alternative_spanish_readings:
  - los filisteos
  - los no circuncidados
  rationale: La expresión funciona como designación cargada de pacto, no solo como descripción étnica. «Los incircuncisos» conserva esa tensión y el contraste con el pueblo del pacto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
- issue: Semantic range of תְּשׁוּעָה
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - victoria
  rationale: En el contexto de Jueces el acto es un rescate concreto concedido por Dios con dimensión militar. «Liberación» permite mantener ambas dimensiones sin estrechar el sentido a una victoria militar solamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 4
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el último pase de revisión y con el control de acuerdo alto; la principal adaptación al español fue ajustar el orden sintáctico y la naturalidad de «clamó», «en mano de» y «los incircuncisos» sin perder la transparencia del hebreo ni la decisión doctrinal sobre Yahvé.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología POB para el Nombre divino.
  - Se prefirió «siervo» por la deferencia orante ante Dios, no como sustitución automática de עבד en todo contexto.
  - «Los incircuncisos» conserva el valor covenantal del hebreo; no se reemplazó por «filisteos» en el texto principal.
  - La ubicación del demostrativo en «la gran liberación esta» se ajustó a un español más natural; la nota explica la equivalencia léxica del elemento enfático.
