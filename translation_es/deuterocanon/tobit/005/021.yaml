    issue: «le dijo a ella» suena algo más explícito que el español normal
    rationale: El griego αὐτῇ significa «a ella», pero en español ordinario bastaría «le dijo». Sin embargo, la formulación actual sigue siendo comprensible y fiel, así que no exige revisión.
