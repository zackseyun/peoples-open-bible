translation:
  language: es
  text: Babilonia también debe caer por los muertos de Israel[a], así como por Babilonia han caído los muertos de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Babilonia también ha caído, ustedes, muertos de Israel»; la sintaxis hebrea del primer miembro es comprimida y se ha entendido de más de una manera.'
