revisions:
- from: Mientras él hablaba con ellos[a], he aquí que subía el campeón[b] —Goliat, el filisteo, de Gat, de las filas de los filisteos—, y habló esas palabras[c], y David lo oyó.
  to: Mientras él hablaba con ellos, he aquí que subió el campeón[a] —Goliat, el filisteo, de Gat, de las filas de los filisteos[b]—, y habló estas palabras, y David lo oyó.
  rationale: Se corrigieron los anclajes de notas para que coincidan con las frases que realmente explican, se eliminó la nota duplicada sobre 'campeón', se cambió 'subía' a 'subió' para alinearse con la revisión auditada final del POB inglés y mejorar la naturalidad narrativa en español, y se ajustó 'esas' a 'estas' para reflejar mejor הָאֵלֶּה.
