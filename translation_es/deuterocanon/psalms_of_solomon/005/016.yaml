translation:
  language: es
  text: Pero tu dádiva es abundante en bondad y rica[a], y la esperanza en ti no será defraudada en la dádiva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «no hay nadie cuya esperanza esté en ti que escatime al dar»; el griego es condensado y algo elíptico en la última cláusula.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δόμα
  english_pob_choice: gift
  chosen_spanish: dádiva
  alternatives_spanish:
  - don
  - regalo
  - ofrenda
  lexicon: LSJ
  rationale: δόμα designa algo dado; en español, «dádiva» conserva el matiz de don concedido y encaja con el contraste de la generosidad divina frente a la mezquindad humana en el contexto inmediato. «Regalo» suena más cotidiano; «ofrenda» puede insinuar un sentido cultual no exigido por el griego.
- source_word: πολύ
  english_pob_choice: abundant
  chosen_spanish: muy abundante
  alternatives_spanish:
  - abundante
  - grande
  - mucho
  lexicon: LSJ
  rationale: El adverbio/adjetivo intensifica la magnitud del don. «Muy abundante» conserva la fuerza enfática de πολύ en un español natural.
- source_word: μετὰ χρηστότητος
  english_pob_choice: with kindness
  chosen_spanish: en bondad
  alternatives_spanish:
  - con bondad
  - con amabilidad
  - con benignidad
  lexicon: LSJ
  rationale: La preposición con χρηστότης puede expresarse como acompañamiento o modo. «En bondad» sigue la revisión inglesa que prefería una relación más natural de esfera/modo, y evita una redundancia torpe con «abundante»; «bondad» transmite el carácter benigno del dar divino.
- source_word: πλούσιον
  english_pob_choice: rich
  chosen_spanish: rica
  alternatives_spanish:
  - rica en abundancia
  - copiosa
  - pródiga
  lexicon: LSJ
  rationale: El griego dice literalmente «rico». Mantener «rica» preserva la concisión poética y la imagen de abundancia material/benefactora sin sobreexplicar.
- source_word: ἡ ἐλπὶς ἐπὶ σέ
  english_pob_choice: the hope in you
  chosen_spanish: la esperanza en ti
  alternatives_spanish:
  - la esperanza puesta en ti
  - quien espera en ti
  - la esperanza sobre ti
  lexicon: LSJ
  rationale: La construcción griega es elíptica. «La esperanza en ti» conserva la forma nominal sin convertirla en una cláusula activa; en español suena natural y mantiene la tensión interpretativa documentada por la tradición de traducción inglesa.
- source_word: οὐ φείσεται
  english_pob_choice: will not be disappointed
  chosen_spanish: no será defraudada
  alternatives_spanish:
  - no será tratada con tacañería
  - no escatimará
  - no se le negará
  lexicon: LSJ
  rationale: φείδομαι admite la idea de ahorrar, reservar o escatimar, pero el contexto poético sobre la confianza en Dios favorece una versión receptiva en español. «No será defraudada» expresa que la esperanza no quedará fallida, sin forzar al sujeto humano a ser el dador, como advirtió la revisión inglesa.
- source_word: ἐν δόματι
  english_pob_choice: in the gift
  chosen_spanish: en la dádiva
  alternatives_spanish:
  - en el don
  - en el dar
  - en la ofrenda
  lexicon: LSJ
  rationale: La frase preposicional es comprimida. «En la dádiva» mantiene el vínculo con δόμα y permite leer la escena como el ámbito del don recibido o del acto de dar, sin cerrar prematuramente la ambigüedad del griego.
theological_decisions:
- issue: Relación entre el don de Dios y la esperanza humana
  english_pob_reading: The gift is abundant and the hope in God will not be disappointed in the gift.
  chosen_spanish_reading: Tu dádiva es abundante, y la esperanza puesta en ti no quedará frustrada en la dádiva.
  alternative_spanish_readings:
  - Tu don es abundante, y el que espera en ti no quedará defraudado.
  - Tu dádiva es abundante, y quien espera en ti no escatimará en dar.
  rationale: La revisión inglesa dejó claro que el sujeto de la segunda mitad no debe convertirse en el dador generoso; el texto habla de la confianza de los pobres en Dios frente a su provisión. Por eso el español mantiene a la esperanza como realidad receptiva y evita presentar al que espera como el agente principal del dar.
  doctrine_reference: Sabiduría divina y provisión; contraste entre la generosidad de Dios y la insuficiencia humana.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la secuencia de revisiones inglesas: primero una lectura activa de οὐ φείσεται atribuida al que espera, luego una corrección que evitó hacer del esperante el dador, y finalmente una redacción más cercana al griego con «the hope in you». El español adopta una solución intermedia fiel al tenor del griego y a la advertencia del revisor: la esperanza no se convierte en sujeto de la generosidad. También se reflejó la preferencia revisada por una relación más natural para μετὰ χρηστότητος.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se usó «dádiva» para δόμα en coherencia con un léxico de don/generosidad, sin introducir vocabulario eclesiástico ajeno.
  - «Esperanza en ti» mantiene la elipsis griega sin convertirla en paráfrasis extensa.
  - La nota [a] señala la ambigüedad residual del pasaje sin duplicar marcadores.
