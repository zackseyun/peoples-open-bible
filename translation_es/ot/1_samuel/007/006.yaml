  to: 'Entonces se reunieron en Mizpa[a], sacaron agua y la derramaron delante de Yahvé[b]. Ayunaron aquel día y dijeron allí: “Hemos pecado contra Yahvé.” Y Samuel juzgó a los hijos de Israel en Mizpa.'
