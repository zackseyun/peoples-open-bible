translation:
  language: es
  text: Bendito serás cuando entres[a][b], y bendito serás cuando salgas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo singular «tú»; Israel es abordado como un pueblo corporativo mediante un singular representativo.
    reason: cultural_note
  - marker: b
    text: 'O: «al entrar ... al salir»; la expresión probablemente funciona como un merismo para el curso entero de la vida y la actividad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed shall you be
  chosen_spanish: Bendito serás
  alternatives_spanish:
  - Serás bendito
  - Bendecido serás
  lexicon: HALOT
  rationale: El participio pasivo funciona aquí como fórmula de bendición pactual; en español, «Bendito serás» conserva el tono proclamativo y el paralelismo del hebreo sin volverlo demasiado explicativo.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: serás / entres / salgas (sujeto implícito de segunda persona singular)
  alternatives_spanish:
  - seréis
  - ustedes serán
  lexicon: HALOT
  rationale: El hebreo usa segunda masculina singular para dirigirse a Israel de forma corporativa. En español, el singular se conserva por medio de la flexión verbal; no se expande a plural en el texto principal.
- source_word: בְּבֹאֶךָ
  english_pob_choice: when you come in
  chosen_spanish: cuando entres
  alternatives_spanish:
  - cuando vengas en
  - en tu entrar
  lexicon: HALOT
  rationale: La construcción preposición + infinitivo con sufijo expresa la circunstancia de entrar. «Cuando entres» es natural en español y conserva el sentido idiomático de movimiento/actividad.
- source_word: וּבָרוּךְ
  english_pob_choice: and blessed shall you be
  chosen_spanish: y bendito serás
  alternatives_spanish:
  - y serás bendito
  - y bendecido serás
  lexicon: HALOT
  rationale: Repetir la cláusula reproduce el paralelismo hebreo. Se mantiene «bendito» para una cadencia más cercana a la fórmula bíblica, sin perder inteligibilidad.
- source_word: בְּצֵאתֶךָ
  english_pob_choice: when you go out
  chosen_spanish: cuando salgas
  alternatives_spanish:
  - en tu salir
  - cuando partas
  lexicon: HALOT
  rationale: La expresión completa el merismo «entrar/salir», que abarca el curso de la vida y actividad. «Cuando salgas» preserva el movimiento literal y la amplitud idiomática.
theological_decisions:
- issue: Sujeto singular representativo aplicado a Israel
  english_pob_reading: Retain singular 'you' without expanding to plural or interpretive paraphrase.
  chosen_spanish_reading: Mantener el singular verbal sin explicitar pluralidad en el texto principal.
  alternative_spanish_readings:
  - Benditos serán ustedes cuando entren y cuando salgan.
  - Bendito será Israel cuando entre y cuando salga.
  rationale: El hebreo dirige la bendición a Israel mediante un singular masculino representativo. El español puede conservar esa forma con la morfología verbal, sin introducir una paráfrasis interpretativa en el cuerpo del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4, §5
- issue: Merismo de actividad total ('entrar / salir')
  english_pob_reading: The expression likely functions as a merism for the whole course of life and activity.
  chosen_spanish_reading: Conservar la expresión literal en el texto y anotar su valor merístico.
  alternative_spanish_readings:
  - en todas tus actividades
  - en toda tu vida
  rationale: El hebreo permite leer la pareja como merismo. En español conviene mantener la imagen concreta y explicar su alcance en una nota, en vez de sustituirla por una explicación dentro del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que la lectura inglesa final quedó confirmada; esta versión española sigue esa línea sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «bendito» en lugar de «bendecido» para conservar la cadencia bíblica y el paralelismo.
  - Se conserva el singular verbal para reflejar el singular representativo del hebreo.
  - No se sustituye el merismo por una paráfrasis en el texto principal; la explicación queda en nota.
  - La puntuación y el orden de miembros reproducen el paralelismo hebreo de forma natural en español.
