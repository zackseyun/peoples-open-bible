    changes_summary: Changed 'tell it' to 'tell you' for lexical accuracy, since the object is implicit rather than explicitly 'it'; changed 'So' to 'Therefore' for a slightly more formal register.
translation:
  language: es
  text: Al comienzo de tus súplicas[a], salió una palabra[b], y yo he venido para decírtelo, porque eres muy amado[c]. Por tanto, considera la palabra y entiende la visión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “tus ruegos” o “tus peticiones”. El hebreo destaca una súplica insistente y fervorosa.
    reason: lexical_alternative
  - marker: b
    text: O “salió un mensaje”. El hebreo dice literalmente “salió una palabra”, expresión que puede referirse a un mensaje comunicado o a una orden emitida.
    reason: lexical_alternative
  - marker: c
    text: O “eres altamente estimado”. La expresión hebrea comunica que Daniel es especialmente valioso o amado.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּתְחִלַּת
  english_pob_choice: At the beginning of
  chosen_spanish: Al comienzo de
  alternatives_spanish:
  - Al principio de
  - Al inicio de
  lexicon: HALOT
  rationale: La frase marca el punto temporal de la acción siguiente. 'Al comienzo de' conserva la referencia temporal con un español natural y digno, sin perder el tono formal.
- source_word: תַּחֲנוּנֶיךָ
  english_pob_choice: your pleas
  chosen_spanish: tus súplicas
  alternatives_spanish:
  - tus ruegos
  - tus peticiones
  lexicon: HALOT
  rationale: El término hebreo expresa ruego insistente y oración implorante. 'Súplicas' mantiene esa fuerza y es más preciso que 'peticiones' en este contexto.
- source_word: יָצָא דָבָר
  english_pob_choice: a word went out
  chosen_spanish: salió una palabra
  alternatives_spanish:
  - salió un mensaje
  - se emitió una palabra
  - salió un decreto
  lexicon: HALOT
  rationale: Conservo la imagen hebrea 'salió una palabra' para no borrar el giro idiomático. 'Mensaje' sería una interpretación posible, pero menos pegada al texto; 'decreto' sería demasiado específico.
- source_word: וַאֲנִי בָּאתִי לְהַגִּיד
  english_pob_choice: and I have come to tell you
  chosen_spanish: y yo he venido para darte a conocer
  alternatives_spanish:
  - y he venido para decírtelo
  - y he venido para anunciarlo
  - y he venido para decirte
  lexicon: HALOT
  rationale: El infinitivo לְהַגִּיד indica comunicar/poner en conocimiento. 'Darte a conocer' expresa bien la función del mensajero en español sin añadir un objeto explícito que el hebreo no desarrolla.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la venida del mensajero. 'Porque' es claro y directo, y funciona bien en el registro formal.
- source_word: חֲמוּדוֹת אָתָּה
  english_pob_choice: you are greatly beloved
  chosen_spanish: eres muy amado
  alternatives_spanish:
  - eres altamente estimado
  - eres sumamente amado
  - eres precioso
  lexicon: HALOT
  rationale: La expresión hebrea comunica aprecio/favor especial. 'Muy amado' preserva la relación afectiva y evita resolver la tensión entre 'amado' y 'estimado' de manera excesivamente interpretativa.
- source_word: וּבִין
  english_pob_choice: Therefore consider
  chosen_spanish: Por tanto, considera
  alternatives_spanish:
  - Por eso, considera
  - Así que considera
  - Por tanto, entiende
  lexicon: HALOT
  rationale: La forma imperativa exhorta a discernir/considerar. 'Por tanto' refleja la conexión lógica con la razón anterior; 'considera' conserva el llamado a atención reflexiva.
- source_word: בַּדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: Mantengo la continuidad léxica con 'salió una palabra'. En español, 'la palabra' sigue siendo comprensible y reproduce el vínculo interno del hebreo.
- source_word: וְהָבֵן
  english_pob_choice: and understand
  chosen_spanish: y entiende
  alternatives_spanish:
  - y comprende
  - y discierne
  lexicon: HALOT
  rationale: Segunda exhortación a la comprensión. 'Entiende' es idiomático; 'comprende' y 'discierne' son posibles, pero algo menos directos en este mandato paralelo.
- source_word: בַּמַּרְאֶה
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - la apariencia
  - lo visto
  lexicon: HALOT
  rationale: En Daniel, מַרְאֶה remite normalmente a una revelación visionaria. 'La visión' es el equivalente contextual más natural y fiel.
theological_decisions:
- issue: 'Sentido de חֲמוּדוֹת אָתָּה: favor divino hacia Daniel'
  english_pob_reading: you are greatly beloved
  chosen_spanish_reading: eres muy amado
  alternative_spanish_readings:
  - eres altamente estimado
  - eres precioso
  rationale: La frase expresa una valoración especial de Daniel por parte de Dios sin cargar el texto con categorías doctrinales posteriores. 'Muy amado' conserva el matiz relacional del hebreo y deja abierta la riqueza semántica de la expresión.
  doctrine_reference: Preservar la tensión lexical; evitar sobreinterpretación doctrinal; trato reverente de la favorabilidad divina.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el cierre revisado del audit trail inglés: mantiene la secuencia temporal, conserva el valor idiomático de ‘a word went out’, refleja la finalidad de la venida del mensajero con un infinitivo natural en español, y reproduce el tono formal de ''Therefore'' con ''Por tanto''. También se mantiene la doble exhortación final (''considera'' / ''entiende'') y la expresión de favor divino sin resolverla en exceso.'
  spanish_consistency_notes:
  - Se conserva 'palabra' para דָבָר en ambos lugares para mantener la continuidad léxica.
  - '''Súplicas'' traduce תַּחֲנוּנִים con un registro bíblico claro y no arcaico.'
  - '''Muy amado'' evita sustituir el matiz por un equivalente más interpretativo como ''estimado'' en el texto principal, aunque se documenta la alternativa.'
  - 'La segunda mitad del verso mantiene paralelismo verbal: ''considera'' / ''entiende''.'
