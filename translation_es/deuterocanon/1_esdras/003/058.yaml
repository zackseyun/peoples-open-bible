  glossary_alignment: 'No hay términos doctrinales o glosario mayor en juego. La decisión clave es léxica: mantener la fuerza dinámica de ἀποτρέχει sin caer en un calco extraño. «Vuelve corriendo» o «regresa corriendo» cumple mejor que «corre de vuelta».'
