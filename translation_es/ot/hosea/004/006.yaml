  to: Mi pueblo es destruido por falta de conocimiento[a]. Porque tú has rechazado el conocimiento, yo también te rechazo de ser sacerdote para mí. Puesto que has olvidado la ley de tu Dios[b], yo también olvidaré tu descendencia[c].
  rationale: 'Se revisa para alinearse mejor con el hebreo y con las decisiones auditadas del POB inglés: ''te rechazo'' preserva la reciprocidad presente de וְאֶמְאָסְאֲךָ; ''de ser sacerdote para mí'' evita añadir una finalidad no explícita; ''has olvidado'' mantiene la acusación vigente; y ''tu descendencia'' refleja mejor el valor colectivo de בָּנֶיךָ, conservando en nota la alternativa más estrecha ''tus hijos''.'
