base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/007/022.yaml
  text: And they will say[a], ‘Because they forsook Yahweh, the God of their fathers, who brought them out of the land of Egypt, and embraced other gods, and bowed down to them and served them[b], therefore he has brought all this disaster on them.’
  footnotes:
  - marker: a
    text: Or “clung to other gods” or “embraced other gods.” The Hebrew verb literally means “took hold of,” expressing deliberate attachment to foreign gods.
    reason: lexical_alternative
  - marker: b
    text: “All this disaster” refers to calamity/judgment, not moral evil.
    reason: lexical_alternative
