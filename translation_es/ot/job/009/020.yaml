    rationale: Aunque intenta seguir «prove me crooked», en español «probar a alguien torcido» suena forzado. «Me mostraría torcido» conserva el sujeto «mi boca» y el matiz de exhibir/poner en evidencia en un contexto forense.
  - severity: low
    issue: «en lo correcto» es entendible pero menos natural que una formulación más breve.
    rationale: «Tener razón» o «estar en lo justo» suenan más fluidos en español bíblico moderno. No obstante, no es un error grave de fidelidad.
