base_translation:
  language: en
  yaml_path: translation/ot/leviticus/022/003.yaml
  text: 'Say to them[a], throughout your generations: Any man from any of your offspring who comes near the holy things that the sons of Israel consecrate to Yahweh while his uncleanness is on him—that person shall be cut off from before me[c][b]. I am Yahweh.'
  footnotes:
  - marker: a
    text: Or 'from my presence.'
    reason: lexical_alternative
  - marker: b
    text: '''Shall be cut off'' is a standard covenantal penalty formula; the precise mode of removal is debated.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the sons of Israel'; that is, the Israelites.
    reason: lexical_alternative
