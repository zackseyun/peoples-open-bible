base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/020/021.yaml
  text: After consulting with the people[a], he appointed singers to Yahweh, who praised the splendor of holiness as they went out before the vanguard, saying, “Give thanks to Yahweh[c][b], for his steadfast love endures forever.”
  footnotes:
  - marker: a
    text: Or “the beauty of holiness.” The Hebrew phrase may also be rendered “holy splendor.”
    reason: lexical_alternative
  - marker: b
    text: Or “before the advance troops” or “before the front line.”
    reason: lexical_alternative
  - marker: c
    text: Or “for his mercy endures forever.” The Hebrew חֶסֶד includes the sense of steadfast, covenantal love.
    reason: lexical_alternative
