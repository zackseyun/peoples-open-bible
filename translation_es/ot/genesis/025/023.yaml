translation:
  language: es
  text: 'Yahvé le dijo: “Dos naciones hay en tu vientre, y dos pueblos se separarán desde dentro de ti; uno de los pueblos será más fuerte que el otro, y el mayor servirá al menor[a].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “el grande servirá al pequeño”.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del texto hebreo, en línea con la política del POB en inglés. En español, 'Yahvé' transmite el Tetragrama como nombre personal y evita la sustitución por un título.
- source_word: שְׁנֵי גיים
  english_pob_choice: two nations
  chosen_spanish: dos naciones
  alternatives_spanish:
  - dos pueblos
  - dos gentes
  lexicon: HALOT
  rationale: גוי designa aquí colectivos étnico-políticos; 'naciones' mantiene ese valor. La forma plural concuerda con el paralelismo del versículo.
- source_word: בְּבִטְנֵךְ
  english_pob_choice: in your womb
  chosen_spanish: en tu vientre
  alternatives_spanish:
  - en tu seno
  - en tu matriz
  lexicon: HALOT
  rationale: En español, 'vientre' comunica el contexto de embarazo con naturalidad y dignidad. Aunque 'womb' en inglés se vertió como 'womb', el hebreo permite un término corporal amplio; 'vientre' evita una dureza innecesaria sin perder precisión.
- source_word: שְׁנֵי לְאֻמִּים
  english_pob_choice: two peoples
  chosen_spanish: dos pueblos
  alternatives_spanish:
  - dos naciones
  - dos clanes
  lexicon: HALOT
  rationale: לְאֹם/לְאֻמִּים se refiere a comunidades o pueblos. Se mantiene la distinción paralela con 'naciones' en la primera cola del versículo.
- source_word: מִמֵּעַיִךְ
  english_pob_choice: from within you
  chosen_spanish: desde dentro de ti
  alternatives_spanish:
  - de tus entrañas
  - desde tus entrañas
  lexicon: HALOT
  rationale: La expresión hebrea alude a lo que saldrá del cuerpo materno. 'Desde dentro de ti' sigue el sentido idiomático del POB en inglés y suena natural en español contemporáneo.
- source_word: יִפָּרֵדוּ
  english_pob_choice: will be separated
  chosen_spanish: se separarán
  alternatives_spanish:
  - serán separados
  - se dividirán
  lexicon: HALOT
  rationale: El nifal expresa separación/división con sentido intransitivo. 'Se separarán' conserva ese movimiento sin introducir una pasiva forzada.
- source_word: וּלְאֹם מִלְאֹם
  english_pob_choice: one people ... than the other
  chosen_spanish: uno de los pueblos ... el otro
  alternatives_spanish:
  - un pueblo ... que el otro
  - un pueblo ... frente al otro
  lexicon: HALOT
  rationale: El hebreo presenta una comparación entre colectivos; en español, la estructura 'uno de los pueblos será más fuerte que el otro' expresa la relación comparativa de forma clara y fiel.
- source_word: יֶאֱמָץ
  english_pob_choice: will be stronger
  chosen_spanish: será más fuerte
  alternatives_spanish:
  - prevalecerá
  - se fortalecerá
  lexicon: HALOT
  rationale: El verbo expresa fuerza o superioridad de vigor. 'Será más fuerte' reproduce bien la comparación establecida en el texto.
- source_word: רַב
  english_pob_choice: the older
  chosen_spanish: el mayor
  alternatives_spanish:
  - el mayor de los dos
  - el más grande
  - el mayor en edad
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice 'grande', en este contexto de gemelos la referencia es al mayor por orden de nacimiento. 'El mayor' es la opción española más natural y precisa.
- source_word: יַעֲבֹד
  english_pob_choice: will serve
  chosen_spanish: servirá
  alternatives_spanish:
  - estará sujeto a
  - trabajará para
  lexicon: HALOT
  rationale: עבד aquí denota servicio/sujeción. 'Servirá' mantiene la relación de subordinación sin añadir matices ajenos.
- source_word: צָעִיר
  english_pob_choice: the younger
  chosen_spanish: el menor
  alternatives_spanish:
  - el más joven
  - el menor de los dos
  lexicon: HALOT
  rationale: En contraste con 'el mayor', 'el menor' comunica bien la oposición fraterna y la relación de nacimiento implícita en el pasaje.
theological_decisions:
- issue: Interpretación de וְרַב יַעֲבֹד צָעִיר
  english_pob_reading: the older will serve the younger
  chosen_spanish_reading: el mayor servirá al menor
  alternative_spanish_readings:
  - el mayor servirá al más joven
  - el grande servirá al pequeño
  rationale: 'Se sigue la lectura contextual del POB en inglés: el contraste es entre gemelos y, por tanto, entre orden de nacimiento. En español, ''mayor/menor'' preserva la tensión sin resolverla en términos abstractos de mérito o valor.'
  doctrine_reference: Preservar la tensión textual sin neutralizarla; nota contextual sobre la comparación entre hermanos.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que consolidó la redacción sin cambios adicionales. También se respetó la decisión auditada de mantener 'Yahweh' en inglés y su equivalente español 'Yahvé', así como la alternativa interpretativa en la cláusula final.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo 'naciones/pueblos' para reflejar el hebreo גויים / לאומים.
  - Se evitó 'SEÑOR' para no ocultar el nombre divino.
  - '''Mayor/menor'' se eligieron por claridad contextual en una escena de gemelos, sin borrar la posibilidad literal de ''grande/pequeño''.'
  - La puntuación respeta el estilo bíblico en español moderno y el discurso directo.
  - No se introdujeron notas adicionales porque el único punto de ambigüedad significativa ya queda cubierto por la nota a.
