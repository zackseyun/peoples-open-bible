lexical_decisions:
- source_word: וגם בריתו עם דוד
  chosen: And his covenant was with David
  alternatives:
  - And also his covenant was with David
  - and the covenant with David
  lexicon: HALOT
  rationale: The extant Hebrew for this verse begins with וגם בריתו עם דוד, which naturally reads 'and/also his covenant was with David.' The pronominal suffix on ברית is retained as 'his covenant,' with the antecedent understood from context as God's covenant. English keeps the clause straightforward rather than expanding interpretively.
- source_word: בן ישי
  chosen: son of Jesse
  lexicon: HALOT
  rationale: A standard patronymic; transliteration of the personal name follows project policy to transliterate names rather than translate them.
- source_word: למטה יהודה
  chosen: from the tribe of Judah
  alternatives:
  - of the tribe of Judah
  - from Judah's tribe
  lexicon: HALOT
  rationale: מטה in genealogical contexts denotes 'tribe.' 'From the tribe of Judah' is idiomatic modern English and preserves the lineage emphasis.
- source_word: κληρονομία βασιλέως
  chosen: the inheritance of the king
  alternatives:
  - a king's inheritance
  - the royal inheritance
  lexicon: BDAG
  rationale: The Hebrew witness is shorter here, while the Greek parallel supplies the balancing contrast. κληρονομία is best rendered 'inheritance.' Keeping 'of the king' rather than 'royal' preserves the concrete parallel with Aaron.
- source_word: υἱοῦ ἐξ υἱοῦ μόνου
  chosen: from son to son alone
  alternatives:
  - from one son to another alone
  - for only one son after another
  lexicon: BDAG
  rationale: 'The Greek clarifies the sense absent from the abbreviated Hebrew line: the Davidic royal inheritance passes in a single dynastic line. ''From son to son alone'' is concise and preserves the exclusivity marked by μόνου.'
- source_word: אשר תהיה לו ולזרעו, כהונה גדולה על עולם / κληρονομία Ἀαρὼν καὶ τῷ σπέρματι αὐτοῦ
  chosen: but the inheritance of Aaron is also for his offspring
  alternatives:
  - and Aaron's inheritance is for his seed
  - while Aaron's inheritance belongs also to his descendants
  lexicon: HALOT, BDAG
  rationale: The Hebrew fragment from the preceding clause states that the high priesthood would belong to Aaron and his seed forever; the Greek parallel restates this as Aaron's inheritance for his seed. Because the verse as transmitted in Hebrew is compressed and mismatched, the English uses the Greek-supported contrast to complete the thought while preserving the Hebrew idea of hereditary priesthood.
