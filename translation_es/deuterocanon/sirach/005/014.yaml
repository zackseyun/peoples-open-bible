translation:
  language: es
  text: Sé firme en tu entendimiento[a], y que tu palabra sea una.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No seas llamado murmurador ... hay mala condena sobre el de doble lengua». Esto apoya la idea de que «que tu palabra sea una» advierte contra el habla dividida o doble.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֱיֶה
  english_pob_choice: Be
  chosen_spanish: Sé
  alternatives_spanish:
  - Estate
  - Sé tú
  lexicon: HALOT
  rationale: Es un imperativo directo de היה. En español, «Sé» transmite con naturalidad la exhortación breve y sapiencial sin añadir proceso ni expansión innecesaria.
- source_word: סָמוּךְ
  english_pob_choice: firm
  chosen_spanish: firme
  alternatives_spanish:
  - estable
  - firme de ánimo
  - sólido
  lexicon: HALOT
  rationale: La idea de estar sostenido, establecido o estable se expresa bien con «firme» en español bíblico contemporáneo. Conserva la fuerza moral e intelectual del consejo.
- source_word: עַל דַּעְתֶּךָ
  english_pob_choice: in your understanding
  chosen_spanish: en tu entendimiento
  alternatives_spanish:
  - en tu conocimiento
  - en tu juicio
  - en tu mente
  lexicon: HALOT
  rationale: «דעת» aquí apunta a entendimiento/discernimiento, no solo a información. «Entendimiento» mantiene la dimensión sapiencial y suena natural en español.
- source_word: וְאֶחָד
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - única
  - una sola
  - unificada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «uno/una». En español, concordando con «palabra», «una» conserva la concisión del hebreo y la idea de discurso no dividido.
- source_word: יְהִי
  english_pob_choice: let ... be
  chosen_spanish: sea
  alternatives_spanish:
  - que sea
  - esté
  - permanezca
  lexicon: HALOT
  rationale: El jussivo exhortativo se expresa de forma natural con «sea» en español. Evita una paráfrasis más larga y mantiene el tono sapiencial.
- source_word: דְבָרֶךָ
  english_pob_choice: your word
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tu խոսa?
  - tu dicho
  - tu hablar
  lexicon: HALOT
  rationale: «דבר» puede ser palabra, discurso o asunto. Aquí «tu palabra» preserva el singular del hebreo y la brevedad del mandato; en español comunica bien la unidad de la խոս...
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego, que menciona al murmurador, la lengua y el doble discurso
  english_pob_reading: 'Main text translates the Hebrew directly: ''Be firm in your understanding, and let your word be one,'' with the Greek anti-duplicity sense preserved in a footnote.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «Sé firme en tu entendimiento, y sea una tu palabra», y la nota conserva la advertencia griega contra la doblez y el murmurador.'
  alternative_spanish_readings:
  - «No seas llamado murmurador, y con tu lengua no aceches... porque la vergüenza es para el ladrón, y mala condenación para el de doble lengua»
  - «Mantén tu lenguaje sin doblez»
  rationale: 'En Sirácides, donde el hebreo está disponible, se prioriza el testimonio hebreo. A la vez, el paralelo griego aporta una tensión léxica real: el foco pasa de la estabilidad interior y la palabra única a la denuncia de la lengua engañosa. La nota permite conservar esa evidencia sin desplazar el texto hebreo.'
  doctrine_reference: 'PHILOSOPHY.md: primacía del hebreo en Sirach when extant; Greek parallel preserved as auditably relevant alternative witness.'
translation_notes:
  revision_awareness: No se requieren cambios respecto al último pase auditado; el hebreo conservado se traduce directamente, y el paralelo griego se refleja en la nota para mantener la tensión textual documentada.
  spanish_consistency_notes:
  - Se mantiene «entendimiento» para דעת por coherencia con la preferencia sapiencial del pasaje.
  - Se usa «palabra» en singular para reflejar la unidad del hebreo y no diluirla en un plural como «palabras» o «hablar».
  - La nota a pie preserva la advertencia del griego sobre la doble lengua sin introducirla en el cuerpo del versículo, siguiendo la primacía del hebreo.
