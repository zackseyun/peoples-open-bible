translation:
  language: es
  text: La ley de su Dios está en su corazón[a]; sus pasos no resbalan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La instrucción de su Dios está en su corazón; sus pasos no tropiezan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  english_pob_choice: the law of
  chosen_spanish: la ley de
  alternatives_spanish:
  - la instrucción de
  - la enseñanza de
  lexicon: HALOT
  rationale: En este contexto sapiencial, תּוֹרָה puede abarcar instrucción o ley. Siguiendo el valor auditado del POB inglés, «ley» conserva el peso normativo y pactal del término, y en español suena natural con el complemento en genitivo («de su Dios»).
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de él
  - su Dios
  lexicon: HALOT
  rationale: 'El sufijo posesivo de 3ms expresa relación personal: «su Dios». Es la forma más directa y fiel en español, manteniendo la cercanía del vínculo sin añadir explicaciones.'
- source_word: בְּלִבּוֹ
  english_pob_choice: is in his heart
  chosen_spanish: está en su corazón
  alternatives_spanish:
  - está dentro de su corazón
  - está en lo profundo de su corazón
  lexicon: HALOT
  rationale: La preposición ב con «corazón» expresa interiorización. «Corazón» reproduce bien el hebreo como centro de la persona; «está en su corazón» comunica el mismo sentido de interioridad de manera idiomática en español.
- source_word: לֹא
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no es que
  - nunca
  lexicon: HALOT
  rationale: La negación es gnómica y general, por lo que el simple «no» mantiene la fuerza del hebreo sin sobretraducción temporal.
- source_word: תִמְעַד
  english_pob_choice: slip
  chosen_spanish: resbalan
  alternatives_spanish:
  - resbala
  - tambalean
  - vacilan
  lexicon: HALOT
  rationale: El verbo מעד puede significar resbalar, tropezar o tambalearse. Con el sujeto plural «sus pasos», «resbalan» preserva la imagen de andar seguro y resulta natural en español. El POB inglés opta por «slip»; aquí se usa el equivalente más idiomático en plural.
- source_word: אֲשֻׁרָיו
  english_pob_choice: his steps
  chosen_spanish: sus pasos
  alternatives_spanish:
  - sus huellas
  - sus pisadas
  - sus andares
  lexicon: HALOT
  rationale: El sustantivo plural refiere a pasos o huellas. «Sus pasos» es conciso y mantiene la metáfora del caminar como curso de vida, en línea con la decisión inglesa auditada.
theological_decisions:
- issue: Valor de תּוֹרָה en un salmo sapiencial
  english_pob_reading: Rendered as 'law' rather than a more diffuse 'instruction.'
  chosen_spanish_reading: «ley» en lugar de «instrucción»
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: La POB inglesa documenta la tensión semántica de תּוֹרָה y elige «law» para conservar el peso autoritativo del término. En español, «ley» transmite mejor ese valor normativo y de alianza, sin negar que el campo semántico pueda incluir instrucción. No se requiere nota doctrinal adicional.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El registro inglés más reciente indica que no hubo cambios en la revisión final (latest_revision_pass: unchanged=true), y la concordancia de revisión fue alta; por ello la propuesta española sigue de cerca el trazado auditado sin introducir expansiones nuevas.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «ley» para תּוֹרָה, conforme a los defaults del proyecto y al análisis contextual.
  - Se conserva la metáfora del caminar con «pasos» y el verbo de inestabilidad con «resbalan», evitando una paráfrasis más libre.
  - El tono es bíblico y publicable, pero con español moderno y natural; no se recurre a «SEÑOR» ni a fórmulas eclesiásticas no requeridas por la fuente.
