review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: hallazgo de las palabras, ingestión metafórica, resultado de gozo interior, y la cláusula causal con el nombre divino. También mantiene correctamente «Yahvé». Sin embargo, «tu nombre es invocado sobre mí» desplaza el sentido de נִקְרָא שִׁמְךָ עָלַי hacia ‘invocación’ más que hacia el idiomático ‘ser llamado sobre/por el nombre’, y «Dios de los ejércitos» se aparta del estándar auditado «God of hosts», que en español conviene reflejar como «Dios de los ejércitos celestiales» o mejor «Dios de las huestes» según contexto; aquí «Dios de las huestes» preserva mejor la amplitud de צבאות.'
  spanish_quality_summary: El español es mayormente claro y digno. «Fueron halladas» y «las comí» funcionan bien. No obstante, «llegaron a ser para mí gozo y alegría de mi corazón» suena algo rígido; «fueron para mí gozo y alegría de mi corazón» o «se volvieron para mí…» sería más natural. Además, la mezcla «Yahvé, Dios de los ejércitos» es comprensible, pero «Dios de las huestes» suena más bíblico y más fiel al título tradicional sin estrecharlo solo a ejércitos.
  glossary_alignment: Alinea bien con «Yahvé» y con el plural «palabras». Necesita mejor alineación en el título אֱלֹהֵי צְבָאוֹת, donde «huestes» corresponde mejor al racional documentado de no reducir צבאות a fuerzas militares. También conviene ajustar el idiomático נִקְרָא שִׁמְךָ עָלַי a una formulación española que preserve la tensión literal con una nota alternativa.
  issues:
  - severity: high
    issue: «tu nombre es invocado sobre mí» no representa bien el idiomático נִקְרָא שִׁמְךָ עָלַי
    rationale: El hebreo usa קרא ‘llamar’ en pasivo/nifal con ‘tu nombre’ como sujeto; «invocado» introduce otra idea léxica distinta y puede sugerir oración o invocación ritual, no principalmente pertenencia por portar el nombre.
  - severity: medium
    issue: «Dios de los ejércitos» estrecha צְבָאוֹת más de lo deseable
    rationale: El audit trail inglés defendió «hosts» precisamente para conservar la amplitud semántica. En español, «huestes» mantiene mejor ese rango que «ejércitos».
  - severity: low
    issue: «llegaron a ser para mí gozo y alegría de mi corazón» suena algo calcado
    rationale: Aunque es fiel, en español bíblico natural «fueron para mí gozo y alegría de mi corazón» fluye mejor sin pérdida de sentido resultativo en este contexto.
  revised_spanish_text: Tus palabras fueron halladas, y yo las comí; y tus palabras fueron para mí gozo y alegría de mi corazón, porque tu nombre es llamado sobre mí[a], Yahvé, Dios de las huestes.
  revised_footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «soy llamado por tu nombre».'
    reason: lexical_alternative
  revision_rationale: Se corrige el modismo hebreo para conservar el verbo «llamar» en vez de introducir «invocar», y se mantiene la alternativa idiomática en nota, como en la auditoría inglesa. También se ajusta אֱלֹהֵי צְבָאוֹת a «Dios de las huestes», más fiel al racional léxico documentado, y se alisa la sintaxis española con «fueron para mí».
