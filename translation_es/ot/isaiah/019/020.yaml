base_translation:
  language: en
  yaml_path: translation/ot/isaiah/019/020.yaml
  text: It will be for a sign and for a witness to Yahweh of Armies in the land of Egypt. For they will cry out to Yahweh because of oppressors[a], and he will send them a savior and champion, and he will deliver them.
  footnotes:
