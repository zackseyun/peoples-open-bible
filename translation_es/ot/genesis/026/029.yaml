translation:
  language: es
  text: que no nos harás daño[a], así como nosotros no te hemos tocado[b] y así como solo te hemos hecho bien y te despedimos en paz[c]. Ahora eres bendecido por Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si nos haces daño». El hebreo אִם puede leerse de forma más literal como «si», aunque aquí probablemente introduce el contenido del juramento que están pidiendo a Isaac.'
    reason: lexical_alternative
  - marker: b
    text: «Tocar» también puede implicar «hacer daño» en este contexto.
    reason: lexical_alternative
  - marker: c
    text: 'O: «y te hemos despedido en paz».'
    reason: previous_rendering
lexical_decisions:
- source_word: אִם
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - si
  lexicon: HALOT
  rationale: Aquí אִם introduce el contenido de lo que están pidiendo/jurando, no una condición simple. En español, «que» expresa mejor ese valor de cláusula subordinada dentro del juramento implícito.
- source_word: תַּעֲשֵׂה עִמָּנוּ רָעָה
  english_pob_choice: you will do us no harm
  chosen_spanish: nos harás daño
  alternatives_spanish:
  - nos harás mal
  - nos harás algún daño
  - nos harás daño alguno
  lexicon: HALOT
  rationale: עָשָׂה + רָעָה expresa hacer daño/mal. «Hacer daño» es natural en español y conserva el sentido concreto de agresión o perjuicio sin volverlo demasiado abstracto.
- source_word: נְגַעֲנוּךָ
  english_pob_choice: we have not touched you
  chosen_spanish: no te hemos tocado
  alternatives_spanish:
  - no te hemos hecho daño
  - no te hemos golpeado
  lexicon: HALOT
  rationale: נגע significa literalmente «tocar». Se conserva el verbo concreto en español para mantener el paralelismo retórico del hebreo, dejando al contexto la implicación de no haber causado daño.
- source_word: עָשִׂינוּ עִמְּךָ רַק טוֹב
  english_pob_choice: we have done to you only good
  chosen_spanish: te hemos hecho solo bien
  alternatives_spanish:
  - te hemos hecho únicamente bien
  - solo te hemos tratado bien
  lexicon: HALOT
  rationale: 'רַק טוֹב enfatiza exclusividad: «solo bien». En español, «hacer bien» reproduce bien el contraste con «daño» y mantiene la fuerza enfática del hebreo.'
- source_word: וַנְּשַׁלֵּחֲךָ בְּשָׁלוֹם
  english_pob_choice: and sent you away in peace
  chosen_spanish: te hemos despedido en paz
  alternatives_spanish:
  - te despedimos en paz
  - te enviamos en paz
  - te hemos enviado en paz
  lexicon: HALOT
  rationale: El hebreo describe el acto de despedir/enviar fuera. «Despedir en paz» funciona bien en español bíblico actual y conserva la relación entre salida y trato pacífico; «en paz» mantiene שָׁלוֹם.
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - pacíficamente
  - en seguridad
  lexicon: HALOT
  rationale: שָׁלוֹם aquí comunica salida sin hostilidad y con seguridad relacional. «En paz» es la forma más natural y fiel en español.
- source_word: בְּרוּךְ יְהוָה
  english_pob_choice: blessed by Yahweh
  chosen_spanish: bendecido por Yahvé
  alternatives_spanish:
  - bendito por Yahvé
  - bendecido de Yahvé
  lexicon: HALOT
  rationale: 'בָּרוּךְ es participio pasivo: «bendecido». Se mantiene la referencia directa al nombre divino como «Yahvé», conforme al estándar del proyecto, y «por» expresa el agente de la bendición en español.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente, y el estándar español del proyecto pide «Yahvé» en el texto principal. Esto preserva el nombre del pacto sin enmascararlo con una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de רָעָה frente al paralelismo con נגע
  english_pob_reading: do us no harm / touched you
  chosen_spanish_reading: nos harás daño / no te hemos tocado
  alternative_spanish_readings:
  - nos harás mal / no te hemos hecho daño
  rationale: 'El hebreo contrapone no causar daño con no haber hecho contacto. Se conserva esa tensión: el primer miembro se interpreta como daño concreto, y el segundo mantiene el verbo literal «tocar» para no borrar el paralelismo semántico.'
  doctrine_reference: HALOT, עָשָׂה + רָעָה; נגע
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que suavizó la secuencia verbal a «we have done... and sent you away in peace». En español, la solución más natural fue compactar a «te hemos hecho solo bien y te hemos despedido en paz», manteniendo el valor retrospectivo y la fluidez sin repetir innecesariamente auxiliares. También se conservó la decisión teológica del proyecto para יְהוָה → Yahvé.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - Se prefirió el verbo concreto «tocar» para נגע y se explicó su posible valor de daño en nota.
  - «En paz» traduce שָׁלוֹם de forma idiomática y mantiene el matiz relacional.
  - La cláusula inicial con «que» refleja el valor de contenido del hebreo אִם en este contexto de juramento implícito.
