translation:
  language: es
  text: Y las tropas salieron del campamento y tomaron posición para hacerles frente[a]; la caballería se dividió en dos partes, y los honderos y los arqueros iban delante del ejército, y todos los hombres valientes estaban en las primeras filas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para salir a su encuentro». El griego εἰς συνάντησιν αὐτοῖς combina la idea de ponerse en posición con la de encontrarse con el enemigo; en contexto militar, «hacerles frente» expresa bien esa maniobra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  english_pob_choice: moved out
  chosen_spanish: salió
  alternatives_spanish:
  - se puso en marcha
  - avanzó
  - partió
  lexicon: LSJ
  rationale: En un contexto militar, ἀπῆρεν señala la salida de la tropa desde el campamento hacia la acción. «Salió» es natural en español y conserva el movimiento táctico sin volverlo excesivamente técnico.
- source_word: ἡ δύναμις
  english_pob_choice: the force
  chosen_spanish: el ejército
  alternatives_spanish:
  - la fuerza
  - las tropas
  lexicon: LSJ
  rationale: Aunque δύναμις puede ser «fuerza», aquí designa un cuerpo armado. «Ejército» comunica mejor el conjunto militar en español, sin perder el sentido colectivo del pasaje.
- source_word: παρεμβολῆς
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campaña
  - encampamento
  lexicon: LSJ
  rationale: «Campamento» es el equivalente militar claro en español y mantiene la referencia al lugar de reunión y despliegue.
- source_word: ἔστησαν εἰς συνάντησιν αὐτοῖς
  english_pob_choice: took their stand to meet them
  chosen_spanish: se puso frente a ellos para enfrentarlos
  alternatives_spanish:
  - se detuvo para encontrarlos
  - tomó posición para recibirlos
  lexicon: LSJ
  rationale: La expresión combina colocarse en posición y salir al encuentro. En español, «se puso frente a ellos para enfrentarlos» comunica la formación de combate y la intención de confrontación.
- source_word: ἡ ἵππος
  english_pob_choice: the cavalry
  chosen_spanish: la caballería
  alternatives_spanish:
  - los jinetes
  - la tropa de caballos
  lexicon: LSJ
  rationale: En griego militar, ἵππος funciona colectivamente para la caballería. «Caballería» es la equivalencia idiomática estándar en español.
- source_word: ἐμερίσθη ... εἰς δύο μέρη
  english_pob_choice: was divided into two parts
  chosen_spanish: se dividió en dos partes
  alternatives_spanish:
  - se repartió en dos divisiones
  - se partió en dos
  lexicon: LSJ
  rationale: La pasiva describe una disposición táctica. «Se dividió en dos partes» sigue de cerca el griego y es transparente para el lector.
- source_word: σφενδονῆται
  english_pob_choice: slingers
  chosen_spanish: honderos
  alternatives_spanish:
  - tiradores de honda
  - lanceros de honda
  lexicon: LSJ
  rationale: «Honderos» es el término natural y tradicional en español para los soldados armados con honda.
- source_word: τοξόται
  english_pob_choice: archers
  chosen_spanish: arqueros
  alternatives_spanish:
  - flecheros
  - tiradores con arco
  lexicon: LSJ
  rationale: «Arqueros» es el equivalente militar normal y claro en español.
- source_word: προεπορεύοντο τῆς δυνάμεως
  english_pob_choice: went before the force
  chosen_spanish: iban delante del ejército
  alternatives_spanish:
  - marchaban delante del ejército
  - precedían al ejército
  lexicon: LSJ
  rationale: El verbo indica ir por delante del cuerpo principal. «Iban delante del ejército» conserva la relación espacial sin añadir más de lo que dice el texto.
- source_word: πρωταγωνισταὶ
  english_pob_choice: the front ranks
  chosen_spanish: las primeras filas
  alternatives_spanish:
  - la vanguardia
  - las filas delanteras
  lexicon: LSJ
  rationale: El griego es comprimido y probablemente alude a los que combatían en la primera línea. «Las primeras filas» expresa bien el valor táctico sin imponer una lectura más específica de la que el texto exige.
- source_word: πάντες οἱ δυνατοί
  english_pob_choice: all the mighty men
  chosen_spanish: todos los hombres valientes
  alternatives_spanish:
  - todos los hombres fuertes
  - todos los valientes
  lexicon: LSJ
  rationale: 'δυνατοί aquí describe hombres fuertes y aptos para la batalla. «Hombres valientes» conserva el peso militar y evita una repetición demasiado literal de «fuertes» junto con «filas». '
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado del inglés POB, especialmente la clausura: los hombres valientes quedan identificados como los que estaban en las primeras filas, sin añadir una unión interpretativa como «junto con». También se mantuvo la estructura militar completa: salida del campamento, toma de posición, división de la caballería y avance de honderos y arqueros.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ terminología de sustitución porque no hay lenguaje divino en el versículo.
  - 'Se usaron términos militares transparentes y contemporáneos: «ejército», «campamento», «caballería», «honderos» y «arqueros».'
  - «Las primeras filas» conserva la tensión del griego comprimido en πρωταγωνισταὶ πάντες οἱ δυνατοί sin convertirlo en una paráfrasis amplia.
