translation:
  language: es
  text: 'Y me dijeron: «Haz para nosotros dioses[a] que vayan delante de nosotros, porque este Moisés, el hombre que nos sacó de la tierra de Egipto, no sabemos qué le ha sucedido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un dios». Aunque este versículo usa un sustantivo plural con verbo plural («dioses ... vayan»), algunos intérpretes y traducciones entienden el sentido como singular a la luz del becerro en el contexto inmediato.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ לִי
  english_pob_choice: And they said to me
  chosen_spanish: Y me dijeron
  alternatives_spanish:
  - Entonces me dijeron
  - Así me dijeron
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce avance narrativo; en español, «Y me dijeron» conserva la secuencia sin añadir matiz temporal o conclusivo excesivo.
- source_word: עֲשֵׂה לָנוּ
  english_pob_choice: Make for us
  chosen_spanish: Haz para nosotros
  alternatives_spanish:
  - Haznos
  - Fabrica para nosotros
  lexicon: HALOT
  rationale: El imperativo de עשה aquí es «hacer/fabricar». «Haz para nosotros» conserva el mandato y el dativo sin forzar un giro idiomático menos natural.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - un dios
  - Dios
  lexicon: HALOT
  rationale: Aunque el sustantivo puede funcionar de manera singular, aquí el verbo plural הבא en la cláusula relativa apoya el plural. «Dioses» refleja la forma gramatical y evita resolver la tensión textual.
- source_word: אֲשֶׁר יֵלְכוּ לְפָנֵינוּ
  english_pob_choice: which will go before us
  chosen_spanish: que vayan delante de nosotros
  alternatives_spanish:
  - que vayan al frente de nosotros
  - que nos precedan
  lexicon: HALOT
  rationale: «Ir delante de» es un equivalente natural del modismo bíblico para guiar o encabezar el camino. «Vayan» reproduce el valor prospectivo del futuro/subjuntivo en español de petición.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la petición; «porque» es claro y directo en español contemporáneo.
- source_word: זֶה מֹשֶׁה הָאִישׁ
  english_pob_choice: this Moses, the man
  chosen_spanish: este Moisés, el hombre
  alternatives_spanish:
  - este hombre Moisés
  - este Moisés, el varón
  lexicon: HALOT
  rationale: La combinación demostrativo + nombre propio tiene un tono algo distanciador. «Este Moisés, el hombre» conserva ese matiz sin volver la frase artificial.
- source_word: אֲשֶׁר הֶעֱלָנוּ מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: who brought us up from the land of Egypt
  chosen_spanish: que nos sacó de la tierra de Egipto
  alternatives_spanish:
  - que nos hizo subir de la tierra de Egipto
  - que nos subió de la tierra de Egipto
  - que nos sacó de Egipto
  lexicon: HALOT
  rationale: En contexto del éxodo, הֶעֱלָנוּ expresa la salida guiada por Dios/Moisés; en español, «nos sacó» comunica la idea con claridad natural. «De la tierra de Egipto» mantiene el alcance completo del hebreo.
- source_word: לֹא יָדַעְנוּ
  english_pob_choice: we do not know
  chosen_spanish: no sabemos
  alternatives_spanish:
  - no hemos sabido
  - no sabíamos
  lexicon: HALOT
  rationale: En cita directa, el presente español expresa adecuadamente el estado resultante del perfecto hebreo. «No sabemos» es la opción más natural.
- source_word: מֶה הָיָה לוֹ
  english_pob_choice: what has happened to him
  chosen_spanish: qué le ha sucedido
  alternatives_spanish:
  - qué le pasó
  - qué ha sido de él
  - qué ocurrió con él
  lexicon: HALOT
  rationale: Es un modismo sobre el destino o estado de una persona. «Qué le ha sucedido» es claro, sobrio y suficientemente cercano al valor del hebreo.
theological_decisions:
- issue: Si אֱלֹהִים debe entenderse en singular o plural en el pedido citado por Aarón
  english_pob_reading: 'plural: ''gods'''
  chosen_spanish_reading: 'plural: «dioses»'
  alternative_spanish_readings:
  - 'singular: «un dios»'
  rationale: El verbo plural יֵלְכוּ favorece con fuerza la lectura plural. Mantener «dioses» deja visible la tensión del texto y evita armonizarlo con la figura del becerro posterior.
  doctrine_reference: 'Translation philosophy #3 (preservar la tensión teológica en vez de resolverla)'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó «who will go before us» a «which will go before us» para concordar con el referente no personal «gods». En español se resolvió con «que vayan delante de nosotros», que mantiene la neutralidad referencial y el plural del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado en este proyecto solo cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton ni un equivalente directo.
  - Se preserva el plural «dioses» para no borrar la tensión gramatical y narrativa del hebreo.
  - «Tierra de Egipto» se conserva para reflejar la formulación completa del hebreo, no solo «Egipto».
  - La cita directa usa un español moderno y bíblicamente digno, sin arcaísmos innecesarios.
