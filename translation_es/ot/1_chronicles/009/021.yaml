  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura básica del hebreo: nombre propio, filiación, función de guardia, y localización en la entrada del santuario. Sin embargo, se aparta de la decisión auditada de conservar אֹהֶל מוֹעֵד de forma más directa. ''Tabernáculo del encuentro'' introduce una reformulación interpretativa donde el inglés POB documenta ''tent of meeting'' como preferible a ''tabernacle''.'
  spanish_quality_summary: El español es claro y digno, pero 'era portero a la entrada del tabernáculo del encuentro' suena algo menos natural que 'era portero a la entrada de la tienda de reunión'. Además, la combinación 'tabernáculo del encuentro' no es la forma española más estable ni la más cercana al hebreo. Conviene ajustar para fidelidad y mejor idiomaticidad bíblica.
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé o Mesías. La decisión clave es cultual: אֹהֶל מוֹעֵד. Debe mantenerse de manera más literal como ''tienda de reunión'' en vez de sustituirse por ''tabernáculo'', ya que el expediente inglés justifica precisamente evitar esa abreviatura interpretativa.'
  issues:
  - severity: medium
    issue: Uso de 'tabernáculo' para אֹהֶל מוֹעֵד
    rationale: El expediente inglés documenta que 'tent of meeting' es preferible a 'tabernacle' para preservar la designación hebrea sin interpretación adicional. En español, 'tabernáculo' se aleja de esa decisión fuente.
  - severity: low
    issue: '''del encuentro'' en lugar de ''de reunión'''
    rationale: '''Encuentro'' no es imposible, pero ''tienda de reunión'' es la formulación bíblica más reconocible y más cercana al sentido fijo de אֹהֶל מוֹעֵד en español eclesial general.'
  - severity: low
    issue: Nota alternativa necesita alinearse con el texto revisado
    rationale: Si el texto principal cambia a 'tienda de reunión', la nota debe conservar la alternativa léxica de פֶּתַח/שֹׁעֵר sin mantener la formulación revisada que ya no aparece en el texto.
  revised_spanish_text: Zacarías, hijo de Meshelemías, era portero a la entrada de la tienda de reunión[a].
