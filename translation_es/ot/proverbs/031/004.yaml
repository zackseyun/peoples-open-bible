    text: 'O, más literalmente: «ni para los gobernantes: ¿dónde está la bebida fuerte?». La expresión hebrea es breve y puede describir a gobernantes que buscan bebida embriagante.'
    reason: lexical_alternative
  revision_rationale: 'Se hacen ajustes menores para mejorar la fidelidad léxica y la naturalidad en español: ''bebida fuerte'' representa mejor שֵׁכָר que ''licor fuerte'', y se simplifica el vocativo a ''Lemuel'' para un registro más idiomático y digno. Se conserva la nota alternativa, adaptando su anclaje al nuevo término principal.'
