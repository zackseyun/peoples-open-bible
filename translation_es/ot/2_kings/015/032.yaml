translation:
  language: es
  text: En el segundo año de Pekaj, hijo de Remalías, rey de Israel, Jotam, hijo de Uzías, rey de Judá[a], comenzó a reinar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Uzías también es llamado Azarías en otros pasajes.
    reason: cross_reference
  - marker: b
    text: O bien, «llegó a ser rey». El verbo hebreo puede referirse a la accesión al trono o al comienzo del reinado.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת שְׁתַּיִם
  english_pob_choice: In the second year of
  chosen_spanish: En el segundo año de
  alternatives_spanish:
  - En el año dos de
  - Durante el segundo año de
  lexicon: HALOT
  rationale: La fórmula hebrea de datación real pide un español idiomático con valor ordinal; «en el segundo año de» conserva la estructura cronológica y la relación de pertenencia temporal.
- source_word: לְ/פֶקַח
  english_pob_choice: of Pekah
  chosen_spanish: de Pekaj
  alternatives_spanish:
  - de Pekah
  - para Pekaj
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula marca el año de reinado asociado a Pekaj; en español se expresa naturalmente con «de». Se usa «Pekaj» para reflejar la transliteración del hebreo.
- source_word: בֶּן רְמַלְיָהוּ
  english_pob_choice: son of Remaliah
  chosen_spanish: hijo de Remalías
  alternatives_spanish:
  - hijo de Remalía
  - hijo de Remalyahu
  lexicon: HALOT
  rationale: Se preserva la relación patronímica. «Remalías» sigue la forma hispanizada habitual y mantiene la identificación histórica.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: HALOT
  rationale: Título regio directo y sin ambigüedad; «rey de Israel» reproduce con precisión el hebreo y el valor apposicional del título.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - llegó a ser rey
  - reinó
  lexicon: HALOT
  rationale: En noticias de entronización, el verbo hebreo puede ser ingresivo; «comenzó a reinar» conserva el inicio del reinado y evita la lectura meramente durativa de «reinó».
- source_word: יוֹתָם
  english_pob_choice: Jotham
  chosen_spanish: Jotam
  alternatives_spanish:
  - Yotam
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional y reconocible del nombre propio, adecuada para lectura eclesial.
- source_word: בֶּן עֻזִיָּהוּ
  english_pob_choice: son of Uzziah
  chosen_spanish: hijo de Uzías
  alternatives_spanish:
  - hijo de Uzzías
  - hijo de Azarías
  lexicon: HALOT
  rationale: El hebreo aquí dice עֻזִיָּהוּ; se traduce con «Uzías», la forma que corresponde a ese nombre en español. Se conserva la referencia a este rey sin sustituirla por el nombre alterno documentado en otros pasajes.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Título regio explícito que modifica a Jotam en aposición; se mantiene en español para no perder el dato histórico del texto.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que los marcadores de nota [a] y [b] aparezcan exactamente en el texto español y queden anclados en las palabras o frases correspondientes. La redacción mantiene el orden natural del español y conserva el valor ingresivo de מָלַךְ.
  spanish_consistency_notes:
  - Se usó «Pekaj» para el nombre del rey de Israel y «Uzías» para el padre de Jotam, manteniendo transliteración coherente y reconocible.
  - Se conservó la aposición «rey de Israel» y «rey de Judá» para reflejar con precisión la sintaxis hebrea.
  - No se introdujo terminología doctrinal innecesaria; el versículo es una nota histórica de entronización.
