translation:
  language: es
  text: 'Y el rey lo sentó junto a sí[a], y dijo a sus oficiales: «Salgan con él al centro de la ciudad, y proclamen que nadie interponga una queja contra él por ningún asunto, y que nadie lo moleste por ningún motivo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ‘sentó a su lado’. El griego puede entenderse como un gesto de honor cortesano: el rey lo coloca a su propia altura y en su compañía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάθισεν αὐτὸν ὁ βασιλεὺς μετʼ αὑτοῦ
  english_pob_choice: the king seated him with himself
  chosen_spanish: el rey lo sentó junto a sí
  alternatives_spanish:
  - el rey lo sentó con él
  - el rey hizo que se sentara con él
  lexicon: LSJ
  rationale: El aoristo causativo de καθίζω pide una expresión que conserve la acción de ‘hacer sentar’. ‘Junto a sí’ comunica el honor y la cercanía cortesana de manera natural en español, sin perder el valor relacional del griego.
- source_word: τοῖς ἄρχουσιν
  english_pob_choice: his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus gobernantes
  - sus comandantes
  - los príncipes
  lexicon: LSJ
  rationale: ἄρχοντες designa personas con autoridad; en este contexto de corte, ‘oficiales’ es amplio y adecuado para funcionarios reales, sin forzar un rango militar específico.
- source_word: Ἐξέλθατε μετʼ αὐτοῦ εἰς μέσον τῆς πόλεως
  english_pob_choice: Go out with him into the middle of the city
  chosen_spanish: Salgan con él al centro de la ciudad
  alternatives_spanish:
  - Salgan con él al medio de la ciudad
  - Salgan con él en medio de la ciudad
  lexicon: LSJ
  rationale: εἰς μέσον es literalmente ‘al medio/en el centro’. ‘Al centro de la ciudad’ suena natural en español y mantiene el carácter público y visible del lugar de la proclamación.
- source_word: κηρύξατε
  english_pob_choice: proclaim
  chosen_spanish: proclamen
  alternatives_spanish:
  - anuncien
  - hagan una proclamación
  lexicon: LSJ
  rationale: κηρύσσω es el acto formal de pregonar públicamente. ‘Proclamen’ conserva mejor el tono oficial que ‘anuncien’.
- source_word: τοῦ μηδένα ἐντυγχάνειν κατὰ τούτου περὶ μηδενὸς πράγματος
  english_pob_choice: that no one is to bring a complaint against him about any matter
  chosen_spanish: que nadie interponga una queja contra él por ningún asunto
  alternatives_spanish:
  - que nadie presente una petición contra él por ningún asunto
  - que nadie lo acuse por ningún asunto
  lexicon: LSJ
  rationale: ἐντυγχάνειν puede significar acercarse, presentar una petición o formular una queja/acusación, especialmente en un marco oficial o legal. ‘Interponer una queja’ preserva ese matiz procesal sin afirmar más de lo que el contexto exige.
- source_word: μηδεὶς αὐτῷ ἐνοχλείτω
  english_pob_choice: let no one trouble him
  chosen_spanish: que nadie lo moleste
  alternatives_spanish:
  - que nadie lo perturbe
  - que nadie lo acose
  lexicon: LSJ
  rationale: ἐνοχλέω significa ‘molestar, perturbar, incomodar’. ‘Moleste’ comunica bien la prohibición general de interferencia y suena natural en español moderno.
- source_word: περὶ παντὸς λόγου
  english_pob_choice: for any reason
  chosen_spanish: por ninguna palabra
  alternatives_spanish:
  - por ningún motivo
  - por ningún asunto
  - por ninguna causa
  lexicon: LSJ
  rationale: λόγος aquí puede abarcar ‘asunto, motivo, causa, palabra’. Mantener ‘palabra’ conserva el término literal del griego, pero en español puede sonar algo más duro o técnico; por eso se registra la alternativa natural ‘por ningún motivo’.
translation_notes:
  revision_awareness: La base griega y el control inglés muestran alta concordancia y no requieren cambios textuales mayores. Se mantiene el sentido jurídico-cortesano del mandato real y la amplitud de las prohibiciones, con una sola nota para reflejar la posible traducción alternativa de la última expresión.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Mesías/Cristo’, ‘esclavo/siervo’ y otras terminologías marcadas no aparecen aquí.
  - La estructura de mandato directo se conserva con imperativos en plural para ‘los oficiales’ y con subjuntivo exhortativo en español, conforme al tono del griego.
