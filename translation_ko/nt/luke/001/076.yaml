source:
  edition: SBLGNT
  text: καὶ σὺ ⸀δέ, παιδίον, προφήτης Ὑψίστου κληθήσῃ, προπορεύσῃ γὰρ ⸀ἐνώπιον κυρίου ἑτοιμάσαι ὁδοὺς αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/luke/001/076.yaml
  text: And you also[a], child, will be called a prophet of the Most High, for you will go before the Lord to prepare his ways[b],
  footnotes:
  - marker: a
    text: Or 'in the presence of the Lord.' The phrase can denote going before someone or ministering before them.
    reason: lexical_alternative
  - marker: b
    text: The wording echoes prophetic promises about preparing the way before the Lord (compare Isa 40:3; Mal 3:1). In Luke's narrative, this is fulfilled in John's ministry before Jesus.
    reason: cross_reference
translation:
  language: ko
  text: 그리고 너 어린아이야, 너는 지극히 높으신 분의 예언자라 일컬어질 것이니, 이는 네가 야훼[a] 앞서 나아가 그분의 길을 예비할 것이기 때문이며,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본 구절은 사 40:3 + 말 3:1을 결합하여 반향하므로, 예비되는 길의 주체는 야훼이다.
    reason: alternative_reading
