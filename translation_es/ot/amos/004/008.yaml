review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: conserva la imagen de varias ciudades convergiendo a una sola para beber agua, la falta de satisfacción y el llamado profético a volver a Yahvé. También mantiene correctamente «Yahvé». Sin embargo, hay pequeños problemas de fidelidad y naturalidad: «se tambaleaban» puede sonar demasiado físico o etílico para ciudades, y «hacia una sola ciudad» expresa dirección pero no tan directamente como «a una ciudad». Además, la secuencia verbal en imperfecto («se tambaleaban… no quedaban… no volvíais») puede sonar menos nítida que un pasado narrativo en español para este contexto.'
  spanish_quality_summary: 'El texto es legible y digno, pero puede mejorarse para sonar más natural y preciso en español bíblico moderno. «Iban de una ciudad a otra» no corresponde; aquí son ciudades/personas de varias ciudades que van a una sola. La mejor mejora es usar «iban tambaleándose» o «vacilaban al ir», y ajustar a un pasado simple: «fueron… no quedaron satisfechas… no volvieron». También conviene simplificar la puntuación final.'
  glossary_alignment: 'La alineación terminológica es buena: «Yahvé» respeta la política del proyecto; «volver a mí» preserva bien שׁוב con su fuerza de retorno pactal; «satisfechas» es aceptable para שׂבע, aunque «saciadas» también sería posible. No hay conflicto doctrinal serio. La principal revisión es estilística y de matiz lexical.'
  issues:
