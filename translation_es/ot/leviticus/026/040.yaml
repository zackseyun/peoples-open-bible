revisions:
- from: Pero si confiesan su iniquidad y la iniquidad de sus padres[a], en la infidelidad con que fueron infieles contra mí, y también que anduvieron contrariamente a mí[b],
  to: Pero si confiesan su iniquidad y la iniquidad de sus padres, en la infidelidad[a] con que me fueron infieles, y también que anduvieron en oposición a mí[b],
  rationale: Se hicieron ajustes menores para evitar calcos poco naturales y mejorar la precisión idiomática del español sin alterar la exégesis de base. 'Me fueron infieles' preserva mejor la ruptura relacional de מָעֲלוּ בִי, y 'anduvieron en oposición a mí' expresa con claridad la idea de conducta contraria/hostil contenida en בְּקֶרִי. También se reubicó la nota a al término relevante.
