review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del ruego y preserva correctamente «Yahvé» y «mi Dios». También refleja adecuadamente el valor petitorio de וְאַל con «no permitas». Sin embargo, se desvía del rastro léxico de la POB inglesa en כְצִדְקְךָ: el inglés escogió «according to your righteousness» con nota alternativa «justice», mientras el español principal puso «justicia» y relegó «rectitud» a nota, invirtiendo el énfasis documentado. Además, «por mí» para לִי en este contexto adversarial suena ambiguo en español y no expresa con suficiente claridad el sentido de regocijo hostil a expensas del salmista.'
  spanish_quality_summary: El español es generalmente claro y devocional. «Hazme justicia» es idiomático y fiel para שָׁפְטֵנִי. No obstante, «conforme a tu justicia» duplica «justicia» en una construcción menos elegante con «Hazme justicia», y «se alegren por mí» puede entenderse como alegría en favor del salmista, lo contrario del sentido contextual. Una leve revisión mejora precisión y legibilidad.
  glossary_alignment: 'Alineación buena en «Yahvé», «mi Dios» y la fuerza de súplica. La principal desalineación es terminológica en צדק: por defecto y según la auditoría inglesa, debe priorizarse «rectitud»/«justicia» según contexto, pero aquí el inglés documentó explícitamente «righteousness» como lectura principal y «justice» como alternativa; en español conviene reflejar esa prioridad con «rectitud» en el texto principal y «justicia» en nota. No hay otros conflictos mayores con el glosario del proyecto.'
  issues:
  - severity: medium
    issue: La elección principal para כְצִדְקְךָ no sigue la decisión auditada de la POB inglesa.
    rationale: El inglés principal es «according to your righteousness» con alternativa «justice». El español puso «conforme a tu justicia» y dejó «rectitud» en nota, invirtiendo la priorización léxica documentada.
  - severity: medium
    issue: «se alegren por mí» es semánticamente ambiguo en español.
    rationale: En español puede sugerir alegría a favor del salmista. El hebreo en este contexto expresa regocijo hostil a su costa; «se alegren de mí» o «a costa de mí» lo comunica mejor.
  - severity: low
    issue: La combinación «Hazme justicia conforme a tu justicia» suena repetitiva.
    rationale: Aunque no es incorrecta, la repetición de «justicia» en dos sentidos cercanos reduce naturalidad. «conforme a tu rectitud» evita la cacofonía y mantiene el peso teológico.
  revised_spanish_text: Hazme justicia conforme a tu rectitud[a], Yahvé, mi Dios, y no permitas que se alegren de mí.
  revised_footnotes:
