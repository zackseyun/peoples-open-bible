revisions:
- from: 'Porque como calcula dentro de sí[a], así es él: “Come y bebe”, te dice; pero su corazón no está contigo.'
  to: 'Porque como calcula en su interior[a], así es: «Come y bebe», te dice; pero su corazón no está contigo.'
  rationale: Se hizo una reparación menor de estilo para que el español suene más natural y proverbial, manteniendo intacto el sentido fuente y la decisión léxica principal de 'calcula'. También se suavizó la nota para alinearla con la redacción revisada y con el matiz de reckoning/calculating.
