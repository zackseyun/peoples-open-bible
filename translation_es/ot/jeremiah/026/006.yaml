translation:
  language: es
  text: entonces haré que esta casa sea como Silo[a], y haré de esta ciudad una maldición[b] a todas las naciones de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Silo era el antiguo lugar de santuario que cayó bajo juicio; la comparación señala devastación y rechazo.
    reason: cultural_note
  - marker: b
    text: 'O: «haré de esta ciudad un objeto de maldición para todas las naciones de la tierra». El hebreo puede expresar que la ciudad misma llegue a ser una fórmula de maldición o un objeto citado al maldecir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: then I will make
  chosen_spanish: entonces haré que
  alternatives_spanish:
  - y haré que
  - entonces pondré
  - entonces la haré
  lexicon: HALOT
  rationale: נתן en esta construcción causativa con dos objetos expresa hacer que algo llegue a ser de cierta manera. «Haré que» comunica bien la fuerza causativa en español sin perder la naturalidad del enunciado profético; «entonces» refleja la continuidad discursiva del contexto.
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - esta casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva «casa» para mantener el hebreo בַּיִת y su resonancia teológica, sin explicitar «templo» en el cuerpo principal. En Jeremías 26 el referente es el templo, pero la elección preserva la formulación original.
- source_word: כְּשִׁלֹה
  english_pob_choice: like Shiloh
  chosen_spanish: como Silo
  alternatives_spanish:
  - igual que Silo
  - como en Silo
  lexicon: HALOT
  rationale: El prefijo כ marca comparación. Se translitera el topónimo como «Silo» en español, manteniendo la alusión a un santuario anterior juzgado.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  lexicon: HALOT
  rationale: Correspondencia directa y sobria del demostrativo, con referencia contextual a Jerusalén.
- source_word: אֶתֵּן לִקְלָלָה
  english_pob_choice: I will make ... a curse
  chosen_spanish: haré que ... sea una maldición
  alternatives_spanish:
  - la daré por maldición
  - la convertiré en maldición
  - haré ... objeto de maldición
  lexicon: HALOT
  rationale: La expresión נתן + ל + קללה permite entender una transformación o designación para maldecir. «Haré que ... sea una maldición» preserva el sentido idiomático en español y evita resolver demasiado la ambigüedad entre ser maldición y ser objeto de maldición.
- source_word: לְכֹל גּוֹיֵי הָאָרֶץ
  english_pob_choice: to all the nations of the earth
  chosen_spanish: para todas las naciones de la tierra
  alternatives_spanish:
  - a todas las naciones de la tierra
  - ante todas las naciones de la tierra
  - para todas las naciones del mundo
  lexicon: HALOT
  rationale: «גּוֹיֵי הָאָרֶץ» se entiende naturalmente como «las naciones de la tierra». «Para» expresa el efecto y la referencia de la maldición de manera clara en español, concordando con el uso idiomático de la construcción.
theological_decisions:
- issue: Referencia a Silo como lugar de juicio
  english_pob_reading: Shiloh was the earlier sanctuary site that came under judgment; the comparison signals devastation and rejection.
  chosen_spanish_reading: Silo se entiende como el antiguo lugar de santuario que cayó bajo juicio; la comparación comunica devastación y rechazo.
  alternative_spanish_readings:
  - Silo como simple topónimo sin explicación
  - Silo como referencia al tabernáculo
  rationale: La traducción mantiene el nombre propio sin sobreexplicar en el texto, pero la nota reconoce la carga histórica y teológica del paralelo con Silo como santuario anterior juzgado.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza de la fórmula de juicio sobre la ciudad
  english_pob_reading: I will make this city a curse
  chosen_spanish_reading: haré que esta ciudad sea una maldición
  alternative_spanish_readings:
  - haré de esta ciudad una maldición
  - haré que esta ciudad sea objeto de maldición
  rationale: El hebreo permite tanto la idea de ser una maldición como la de convertirse en objeto de maldición. Se deja la formulación breve en el texto principal y se conserva la alternativa en nota para no cerrar indebidamente la ambigüedad.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió «to all the nations of the earth» frente a «for all the nations». Por eso se usa «para todas las naciones de la tierra», manteniendo la relación de efecto/referencia sin forzar una preposición menos natural en español.
  spanish_consistency_notes:
  - Se preserva «casa» en vez de «templo» por coherencia con la política POB de retener el léxico hebreo cuando aporta resonancia teológica.
  - Se usa «maldición» en lugar de una paráfrasis más interpretativa para mantener la tensión semántica de לְקְלָלָה.
  - Se translitera «Silo» de manera consistente con el tratamiento de topónimos bíblicos.
  - La frase «para todas las naciones de la tierra» mantiene el alcance universal de גּוֹיֵי הָאָרֶץ sin suavizarlo.
