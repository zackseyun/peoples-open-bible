- issue: Scope of βλασφημεῖν in Paul's persecution
  chosen_reading: Rendered generically as 'to blaspheme' without specifying the object.
  alternative_readings:
  - to blaspheme Jesus
  - to curse the Christian confession
  rationale: The context strongly suggests coerced blasphemy against Jesus or the Christian message, but the Greek leaves the object unstated. To preserve the text's wording and avoid importing more specificity than expressed, the main text remains general.
  doctrine_reference: Preserve theological tension rather than resolve it.
