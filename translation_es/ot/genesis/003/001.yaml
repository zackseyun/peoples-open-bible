base_translation:
  language: en
  yaml_path: translation/ot/genesis/003/001.yaml
  text: Now the serpent was more crafty than any beast of the field that Yahweh God had made[a]. And he said to the woman, “Indeed, has God said[c][b], ‘You shall not eat from any tree of the garden’?”
  footnotes:
  - marker: a
    text: Or 'more shrewd' or 'more subtle.' The Hebrew term can describe prudence in some contexts, but here it carries a deceptive nuance.
    reason: lexical_alternative
  - marker: b
    text: The narrator says 'the LORD God,' but the serpent says only 'God,' preserving a shift in the Hebrew wording.
    reason: alternative_reading
  - marker: c
    text: Or 'from every tree of the garden.' In this negated question, 'any tree' best conveys the serpent's exaggeration of God's command.
    reason: lexical_alternative
