translation:
  language: es
  text: Toda palabra de Dios es pura[a]; él es escudo para los que se refugian en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Toda declaración de Dios es refinada' o 'pura'. El hebreo evoca metal probado en el fuego y mostrado genuino.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: Every
  chosen_spanish: Toda
  alternatives_spanish:
  - Cada
  - Toda una
  lexicon: HALOT
  rationale: El distributivo del hebreo apunta a la totalidad de las expresiones divinas consideradas una por una. En español, 'Toda palabra' comunica naturalmente esa amplitud sin sonar forzado; 'Cada palabra' también sería posible, pero 'Toda' preserva mejor el tono proverbial.
- source_word: אִמְרַת
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - expresión
  - declaración
  - dicho
  lexicon: HALOT
  rationale: אִמְרָה puede abarcar palabra, dicho o declaración. 'Palabra' es la equivalencia más natural y amplia en español para la frase hebrea, y mantiene bien la referencia al habla de Dios sin tecnicismo excesivo.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Altísimo
  lexicon: HALOT
  rationale: El título divino singular se vierte directamente como 'Dios', sin expansión doctrinal. En este proverbio no hay indicio de que deba especificarse el nombre del pacto.
- source_word: צְרוּפָה
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - refinada
  - probada
  - purificada
  lexicon: HALOT
  rationale: El campo semántico alude a metal refinado/probado en fuego y, por tanto, genuino y limpio. 'Pura' reproduce bien el resultado en español y sigue la revisión auditada del POB en inglés; 'refinada' o 'purificada' conservan mejor la metáfora metalúrgica, pero aquí 'pura' es más idiomática.
- source_word: מָגֵן
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - protección
  - defensa
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de מָגֵן. 'Escudo' es el equivalente directo y mantiene la fuerza poética y la resonancia bíblica del símil.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: él es
  alternatives_spanish:
  - es
  - eso es
  lexicon: HALOT
  rationale: El pronombre retoma a Dios, no a 'palabra'. En español, 'él es escudo' explicita con naturalidad el sujeto personal de la segunda cola.
- source_word: לַחֹסִים
  english_pob_choice: to those who take refuge
  chosen_spanish: para los que se refugian
  alternatives_spanish:
  - para los que buscan refugio
  - para los que confían
  lexicon: HALOT
  rationale: El participio de חסה expresa buscar o tomar refugio. 'Se refugian' conserva la imagen de protección y evita reducirla a una abstracción como 'confían'.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en ello
  lexicon: HALOT
  rationale: El sufijo pronominal se entiende mejor como referente a Dios, en paralelo con 'él es escudo'. 'En él' mantiene ese referente personal y evita ambigüedad innecesaria.
theological_decisions:
- issue: Referente de los pronombres en la segunda cola
  english_pob_reading: 'The pronouns refer to God: ''he is a shield to those who take refuge in him.'''
  chosen_spanish_reading: 'Los pronombres se refieren a Dios: ''él es escudo para los que se refugian en él.'''
  alternative_spanish_readings:
  - '''es escudo para los que se refugian en su palabra'''
  - '''la palabra de Dios es escudo para los que se refugian en ella'''
  rationale: La sintaxis permite una conexión con el sujeto divino anterior, y el paralelismo bíblico favorece leer a Dios como protector personal. Se conserva esa lectura sin borrar la posibilidad abstracta, pero la redacción elegida expresa mejor el sentido más probable del proverbio.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones teológicas documentadas sin resolverlas arbitrariamente'
translation_notes:
  revision_awareness: Se siguió la revisión auditada del POB en inglés que corrigió 'proven' a 'pure' para צְרוּפָה. La redacción española adopta 'pura' como equivalente principal, manteniendo abierta en nota la alternativa metalúrgica 'refinada' y el matiz de prueba por fuego.
  spanish_consistency_notes:
  - Se conserva 'Dios' para אֱלוֹהַּ, conforme al criterio del proyecto.
  - Se usa 'escudo' para מָגֵן, preservando la imagen concreta en vez de una paráfrasis abstracta.
  - Se mantiene el referente personal de los pronombres en la segunda cola como 'él/en él', en línea con el audit trail en inglés.
  - La nota [a] coloca las alternativas semánticas relevantes sin sobrecargar el texto principal.
