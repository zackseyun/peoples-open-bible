translation:
  language: es
  text: He proclamado justicia[a] en la gran asamblea; he aquí, no he refrenado mis labios[b]; Yahvé, tú sabes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud». El hebreo צֶדֶק puede tener matices tanto morales como judiciales.
    reason: lexical_alternative
  - marker: b
    text: O «no he contenido mis labios».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשַּׂרְתִּי
  english_pob_choice: I have proclaimed
  chosen_spanish: He proclamado
  alternatives_spanish:
  - He anunciado buenas nuevas
  - He declarado
  lexicon: HALOT
  rationale: El verbo hebreo puede llevar el sentido de anunciar buenas noticias, pero aquí el complemento es צֶדֶק. En español, «proclamar» conserva el matiz público y solemne de anuncio sin forzar una formulación específicamente evangelística que el contexto no exige.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - lo justo
  lexicon: HALOT
  rationale: El hebreo צֶדֶק puede abarcar justicia y rectitud. Aquí se eligió «justicia» porque en español comunica bien el campo semántico moral y judicial del término; la alternativa «rectitud» queda como posibilidad válida pero menos directa en este verso.
- source_word: בְּקָהָל רָב
  english_pob_choice: in the great assembly
  chosen_spanish: en la gran asamblea
  alternatives_spanish:
  - en la gran congregación
  - ante la gran asamblea
  lexicon: HALOT
  rationale: «Asamblea» reproduce con naturalidad el carácter de reunión pública del hebreo קָהָל, y «gran» conserva el valor de רָב como multitud o amplitud.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ciertamente
  lexicon: HALOT
  rationale: «He aquí» mantiene el tono poético y enfático del marcador hebreo mejor que opciones más coloquiales o interpretativas.
- source_word: שְׂפָתַי
  english_pob_choice: my lips
  chosen_spanish: mis labios
  alternatives_spanish:
  - mi boca
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. «Labios» refleja el paralelismo poético y la referencia a la palabra pronunciada.
- source_word: לֹא אֶכְלָא
  english_pob_choice: I have not restrained
  chosen_spanish: no he refrenado
  alternatives_spanish:
  - no he contenido
  - no he retenido
  lexicon: HALOT
  rationale: «Refrenar» comunica bien la idea de no contener ni impedir el habla, y funciona de manera natural con «mis labios» en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: La forma de destino para el Tetragrámaton en este proyecto es «Yahvé». Se evita la sustitución por «SEÑOR» para preservar el nombre divino personal del hebreo.
- source_word: יָדָעְתָּ
  english_pob_choice: you know
  chosen_spanish: tú lo sabes
  alternatives_spanish:
  - tú sabes
  - lo sabes
  lexicon: HALOT
  rationale: En vocativo directo, el perfecto hebreo expresa de manera natural un conocimiento presente. «Tú lo sabes» suena idiomático en español y conserva la apelación directa a la omnisciencia divina.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: O Yahweh, you know
  chosen_spanish_reading: Yahvé, tú lo sabes
  alternative_spanish_readings:
  - Yahvé, tú sabes
  - Yahvé, tú lo conoces
  rationale: Se preserva el nombre propio divino en lugar de una sustitución titular. La cláusula final mantiene la forma de confianza/apelación directa al conocimiento de Dios sin añadir explicaciones no presentes en el verso.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB se mantuvo esencialmente estable en la revisión más reciente; no se reportaron cambios aplicados. La presente versión sigue su lectura óptima-equivalente y conserva la única tensión léxica documentada en צֶדֶק mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - Se conserva el paralelismo poético con «labios» y la estructura declarativa breve del hebreo.
  - La nota de «justicia» preserva la alternativa semántica documentada sin sobreexplicar el verso.
