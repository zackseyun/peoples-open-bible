translation:
  language: es
  text: 'Y David dijo a toda la asamblea de Israel: «Si les parece bien[a], y si proviene de Yahvé nuestro Dios, enviemos aviso a nuestros hermanos que permanecen en todas las tierras de Israel, y también a los sacerdotes y a los levitas que están con ellos en las ciudades de sus tierras de pastoreo[b], para que se reúnan con nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «si les es bueno»; la frase expresa aprobación o consentimiento.'
    reason: alternative_reading
  - marker: b
    text: Es decir, las tierras abiertas o de pastoreo pertenecientes a sus ciudades.
    reason: cultural_note
lexical_decisions:
- source_word: קְהַל
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - comunidad
  lexicon: HALOT
  rationale: «Asamblea» conserva el sentido de un cuerpo reunido nacionalmente sin introducir un matiz eclesiástico más fuerte que «congregación» en español.
- source_word: אִם עֲלֵיכֶם טוֹב
  english_pob_choice: If it seems good to you
  chosen_spanish: Si les parece bien
  alternatives_spanish:
  - Si es bueno a sus ojos
  - Si es bueno para ustedes
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y expresa aprobación. «Les parece bien» comunica con naturalidad la idea de consentimiento sin perder el juicio de conveniencia.
- source_word: וּמִן יְהוָה אֱלֹהֵינוּ
  english_pob_choice: and if it is from Yahweh our God
  chosen_spanish: y si proviene de Yahvé nuestro Dios
  alternatives_spanish:
  - y si es de Yahvé nuestro Dios
  - y si viene de Yahvé nuestro Dios
  lexicon: HALOT
  rationale: «Proviene de» refleja con claridad la idea de procedencia o sanción divina presente en la construcción. Se conserva el nombre divino como «Yahvé» según el criterio base del proyecto.
- source_word: נִשְׁלְחָה
  english_pob_choice: let us send word
  chosen_spanish: enviemos mensaje
  alternatives_spanish:
  - enviemos
  - mandemos aviso
  lexicon: HALOT
  rationale: El hebreo omite el objeto explícito; el contexto requiere un acto comunicativo. «Mensaje» explicita ese valor sin añadir contenido ajeno. Se evita volverlo más pesado con «mensajeros» porque la acción es el foco del verbo.
- source_word: עַל אַחֵינוּ
  english_pob_choice: to our brothers
  chosen_spanish: a nuestros hermanos
  alternatives_spanish:
  - a nuestros parientes
  - a nuestros compatriotas
  lexicon: HALOT
  rationale: «Hermanos» conserva el término familiar representativo aplicado a los israelitas, como en la lectura inglesa. «Nuestros hermanos» mantiene el alcance inclusivo del hebreo.
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: who remain
  chosen_spanish: que quedan
  alternatives_spanish:
  - que permanecen
  - los que han quedado
  lexicon: HALOT
  rationale: «Que quedan» reproduce de forma directa y natural la idea de los que aún permanecen repartidos por el territorio, sin cargar el término con la noción técnica de «remanente».
- source_word: בְּכֹל אַרְצוֹת יִשְׂרָאֵל
  english_pob_choice: in all the lands of Israel
  chosen_spanish: en todas las tierras de Israel
  alternatives_spanish:
  - en todas las regiones de Israel
  - en todas las tierras de Israel
  lexicon: HALOT
  rationale: El plural hebreo se conserva mejor con «tierras» en español, aunque «regiones» también sería posible. Se evita singularizar la expresión.
- source_word: וְעִמָּהֶם
  english_pob_choice: and also to ... with them
  chosen_spanish: y también a ... que están con ellos
  alternatives_spanish:
  - y con ellos
  - y junto con ellos
  lexicon: HALOT
  rationale: La frase enlaza a sacerdotes y levitas con el grupo previamente mencionado. «Que están con ellos» aclara la relación sin sobrecargar la sintaxis española.
- source_word: מִגְרְשֵׁיהֶם
  english_pob_choice: pasturelands
  chosen_spanish: ejidos
  alternatives_spanish:
  - tierras de pastoreo
  - pastizales
  lexicon: HALOT
  rationale: «Ejidos» funciona en español amplio para las tierras abiertas o anexas a una ciudad, y ayuda a conservar el matiz de terrenos asociados a uso común/pastoreo. Se evita un giro demasiado técnico o ruralizante que no siempre sería transparente.
- source_word: וְיִקָּבְצוּ אֵלֵינוּ
  english_pob_choice: that they may gather to us
  chosen_spanish: para que se reúnan con nosotros
  alternatives_spanish:
  - para que se congreguen con nosotros
  - para que se junten con nosotros
  lexicon: HALOT
  rationale: El propósito de la convocatoria se expresa naturalmente con «para que se reúnan con nosotros». Mantiene la idea colectiva y el movimiento hacia el centro convocante.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: La base del proyecto exige traducir el Tetragrámaton como «Yahvé» y no enmascararlo como «SEÑOR». Se mantiene la coherencia con el estándar doctrinal y con el valor del nombre de pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que eliminó la expansión «far and wide» por no estar explícita en el hebreo. Por eso el español evita cualquier intensificación adverbial no sustentada y conserva una formulación directa de la comisión de David. También se respetó la preferencia del contexto POB por un verbo de envío claro («enviemos mensaje») sin añadir elementos ajenos al texto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - «Asamblea» se usó para קְהַל, evitando «congregación» por su posible resonancia eclesial.
  - «Hermanos» preserva el uso representativo del hebreo para los israelitas.
  - «Tierras» conserva el plural de אַרְצוֹת.
  - «Ejidos» busca reflejar de manera comprensible el valor contextual de מִגְרְשֵׁיהֶם como terrenos anexos/abiertos de las ciudades levíticas.
