    text: Or “they lamented over him.” The Hebrew verb refers to mourning for the dead, often in a formal lament.
    reason: lexical_alternative
  - marker: b
    text: “My brother” is likely a lament formula expressing kinship or solidarity, not necessarily a statement of biological relation.
