  text: So he wrote them a second letter[a], saying, “If you are for me and if you are listening to my voice, take the heads of the men, the sons of your master, and come to me at this time tomorrow at Jezreel.” Now the king’s sons, seventy men, were with the great men of the city[c][b], who were raising them.
  footnotes:
  - marker: a
    text: Or, 'if you obey me.' The Hebrew says literally, 'if you are listening to my voice,' an idiom that often includes obedience.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'take the heads of the men, the sons of your master'—that is, the severed heads of your master's sons.
    reason: lexical_alternative
  - marker: c
    text: Or, 'to Jezreel.' The Hebrew form includes a directional ending.
    reason: lexical_alternative
