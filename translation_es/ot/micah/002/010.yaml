review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea básica: dos imperativos, negación de מְנוּחָה como lugar de reposo, cláusula causal con טָמְאָה, y la intensificación final con verbo + sustantivo cognado. Sin embargo, hay dos desajustes importantes: el marcador [a] está anclado en «váyanse» pero la nota trata de «lugar de reposo/descanso», y el español «por causa de impureza trae destrucción» queda algo abrupto y menos natural sin artículo. Además, «sí, destrucción gravísima» preserva el énfasis, pero «incluso destrucción gravísima» o «hasta destrucción gravísima» refleja mejor el valor aditivo/enfático de וְ.'
  spanish_quality_summary: 'El español es en general claro y digno. «Levántense y váyanse» suena natural y fuerte. «Este no es el lugar de reposo» es legible, aunque «este» podría también ser «este lugar»; no es necesario cambiarlo. La principal mejora es hacer más idiomática la cláusula causal: «por causa de la impureza trae destrucción» fluye mejor. También conviene mover la nota [a] al sintagma relevante.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé, Mesías, Espíritu, etc. «Impureza» es aceptable para טָמְאָה en este contexto profético; «inmundicia» sería posible pero no necesaria. «Reposo» y «lugar de reposo» respetan la decisión auditada sobre מְנוּחָה.
  issues:
  - severity: high
    issue: El marcador de nota [a] está colocado en «váyanse», pero la nota explica «lugar de reposo/descanso».
    rationale: Esto rompe la correspondencia obligatoria entre anclaje en el texto y contenido de la nota, y puede confundir al lector sobre qué palabra se está documentando.
  - severity: medium
    issue: La frase «por causa de impureza» suena incompleta o menos idiomática en español sin artículo.
    rationale: Aunque no es gramaticalmente imposible, «por causa de la impureza» comunica mejor la construcción causal nominal y mejora la legibilidad sin alterar el sentido.
  - severity: low
    issue: «sí, destrucción gravísima» es posible, pero no es la mejor representación del valor enfático/aditivo final.
    rationale: «Incluso destrucción gravísima» suena más natural en español contemporáneo y refleja mejor el escalonamiento intensificador del hebreo y del inglés POB revisado ('even grievous destruction').
  revised_spanish_text: Levántense y váyanse, porque este no es el lugar de reposo[a]; por causa de la impureza[b] trae destrucción, incluso destrucción gravísima.
