translation:
  language: es
  text: Entonces te lavé con agua[a], te enjuagué tu sangre de encima de ti[b] y te ungí con aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te bañé con agua».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te lavé tu sangre de encima de ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְחָצֵךְ
  english_pob_choice: I washed you
  chosen_spanish: te lavé
  alternatives_spanish:
  - te bañé
  lexicon: HALOT
  rationale: רחץ denota lavar o bañar. En español, "te lavé" es natural, conciso y conserva la acción concreta de limpieza corporal sin añadir una lectura más amplia de la necesaria.
- source_word: בַּמַּיִם
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - en agua
  lexicon: HALOT
  rationale: La preposición ב puede reflejar medio o esfera. "Con agua" expresa bien el instrumento del lavado en español y mantiene la fuerza del original sin sonar forzado.
- source_word: וָאֶשְׁטֹף
  english_pob_choice: rinsed
  chosen_spanish: te enjuagué
  alternatives_spanish:
  - te lavé
  - te limpié
  lexicon: HALOT
  rationale: שטף puede significar lavar arrastrando o enjuagar. "Te enjuagué" reproduce mejor la idea de quitar algo adherido, en paralelo con la sangre que se retira.
- source_word: דָּמַיִךְ
  english_pob_choice: your blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - tu sangre
  - las manchas de sangre
  lexicon: HALOT
  rationale: El hebreo dice literalmente "tu sangre"; sin embargo, en español "te enjuagué la sangre" comunica la imagen física del texto y evita una construcción menos natural. Se preserva la referencia corporal sin convertirla en paráfrasis doctrinal.
- source_word: מֵעָלַיִךְ
  english_pob_choice: off you
  chosen_spanish: de ti
  alternatives_spanish:
  - de sobre ti
  - de encima de ti
  lexicon: HALOT
  rationale: La expresión significa literalmente "de sobre ti". "De ti" es la forma más fluida en español, aunque la idea de remoción queda ya implícita en "enjuagué".
- source_word: וָאֲסֻכֵךְ
  english_pob_choice: anointed you
  chosen_spanish: te ungí
  alternatives_spanish:
  - te perfumé
  - te froté con aceite
  lexicon: HALOT
  rationale: סוך significa ungir o frotar con aceite. "Te ungí" es la equivalencia más fiel y también conserva el tono dignificador del acto.
- source_word: בַּשָּׁמֶן
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - con óleo
  lexicon: HALOT
  rationale: שמן es simplemente "aceite"; "con aceite" es claro y exacto. "Óleo" sería más eclesiástico y menos directo en español contemporáneo.
theological_decisions:
- issue: Naturaleza de las acciones de limpieza dentro de la alegoría
  english_pob_reading: Render the actions as literal bodily care within the metaphor, without importing sacramental or doctrinal symbolism into the translation.
  chosen_spanish_reading: Presentar las acciones como cuidado corporal concreto dentro de la metáfora, sin introducir simbolismo sacramental o doctrinal en la redacción.
  alternative_spanish_readings:
  - Interpretar el lavado y la unción de manera más explícitamente cultual o sacramental en el texto principal
  rationale: Ezequiel 16 desarrolla una alegoría extensa. El verso describe lavar, quitar sangre y ungir. La traducción debe conservar la imaginería concreta y dejar que la implicación teológica surja del contexto, no de una amplificación del verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto sigue de cerca el estado más reciente del audit trail inglés, que quedó sin cambios tras la última revisión y fue corroborado con alta concordancia por el control cruzado.
  spanish_consistency_notes:
  - Se mantiene "aceite" y no "óleo", para evitar un registro litúrgico no marcado por el hebreo.
  - '"Ungí" conserva el valor verbal de סוך sin expandirlo a una acción ceremonial explícita.'
  - '"Enjuagué la sangre" intenta reflejar tanto el arrastre de שטף como la remoción de sangre de sobre la persona.'
  - No se introduce ninguna terminología de tradición eclesiástica que sustituya la imaginería concreta del texto.
