translation:
  language: es
  text: Y los de la ciudadela[a] entregaron los rehenes a Jonatán, y él los devolvió a sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἄκρα se refiere aquí a la fortaleza o ciudadela de Jerusalén, tradicionalmente llamada Acra.
    reason: cultural_note
lexical_decisions:
- source_word: παρέδωκαν
  english_pob_choice: handed over
  chosen_spanish: entregaron
  alternatives_spanish:
  - pusieron en manos de
  - cedieron
  - dieron
  lexicon: BDAG
  rationale: El verbo griego expresa la acción simple de pasar algo a otra parte. En español, «entregaron» comunica bien ese acto sin añadir matices jurídicos o violentos que el contexto no exige.
- source_word: οἱ ἐκ τῆς ἄκρας
  english_pob_choice: those from the citadel
  chosen_spanish: los de la ciudadela
  alternatives_spanish:
  - los de la fortaleza
  - los de la Acra
  - los hombres de la ciudadela
  lexicon: LSJ
  rationale: ἄκρα en este contexto histórico designa la fortaleza/citadela de Jerusalén. «Ciudadela» conserva el sentido topográfico e histórico y resulta natural en español; no se introduce «Acra» en el texto principal porque la equivalencia funcional es más clara, aunque la nota puede señalar la referencia histórica.
- source_word: Ἰωναθὰν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Transliteración estándar al español bíblico
  rationale: «Jonatán» es la forma usual y reconocible en español bíblico, fiel al nombre propio griego y plenamente inteligible para lectores en español.
- source_word: τὰ ὅμηρα
  english_pob_choice: the hostages
  chosen_spanish: los rehenes
  alternatives_spanish:
  - los hostajes
  - los cautivos
  - los prisioneros
  lexicon: LSJ
  rationale: ὅμηρα designa personas retenidas como garantía; en español «rehenes» comunica con precisión esa función. «Cautivos» o «prisioneros» serían más amplios y menos exactos.
- source_word: ἀπέδωκαν αὐτοὺς
  english_pob_choice: he returned them
  chosen_spanish: los devolvió
  alternatives_spanish:
  - los regresó
  - los restituyó
  - los volvió a dar
  lexicon: BDAG
  rationale: El griego indica dar de vuelta lo que se había recibido o retenido. «Los devolvió» expresa bien esa idea en español y mantiene la relación con los rehenes como personas concretas.
- source_word: τοῖς γονεῦσιν αὐτῶν
  english_pob_choice: to their parents
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus progenitores
  - a sus padres y madres
  - a sus familias
  lexicon: BDAG
  rationale: γονεῦσιν significa «padres» en sentido parental. En español, «padres» cubre adecuadamente el sentido sin ampliar innecesariamente a «familias» ni volverlo artificioso con una perífrasis más técnica.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, que añadió «over» para reflejar mejor παρέδωκαν y reordenó «Jonathan» tras «the hostages» para reproducir con más claridad la construcción griega. En español, ese ajuste se refleja con «entregaron... los rehenes a Jonatán», manteniendo el orden natural sin perder la relación sintáctica del original.
  spanish_consistency_notes:
  - Se usa «Jonatán» para el nombre propio, coherente con el uso bíblico habitual en español.
  - Se mantiene «rehenes» por fuerza lexical del griego ὅμηρα; no se suaviza a «prendas» ni «garantías».
  - «Ciudadela» traduce ἄκρα de forma funcional; la nota preserva la identificación histórica con la Acra.
  - La frase final «a sus padres» sigue el valor directo de γονεῦσιν sin añadir interpretaciones colectivas.
