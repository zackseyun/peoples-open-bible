translation:
  language: es
  text: 'Y dijeron al pueblo[a]: «Avancen y rodeen la ciudad, y que los hombres armados[b] pasen delante del arca de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las tropas» o «al ejército», si עָם se entiende aquí en sentido colectivo-militar.
    reason: lexical_alternative
  - marker: b
    text: O «la vanguardia», es decir, los hombres armados que iban delante del arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Entonces dijeron
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción en la secuencia narrativa; «Y dijeron» conserva el flujo del relato sin añadir matiz temporal extra.
- source_word: אֶל־הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a los hombres
  lexicon: HALOT
  rationale: עָם se traduce de forma amplia como «pueblo». En este contexto militar puede aludir al conjunto reunido, pero «pueblo» mantiene el valor léxico básico sin estrechar indebidamente el referente.
- source_word: עִבְרוּ
  english_pob_choice: Pass on
  chosen_spanish: Pasad adelante
  alternatives_spanish:
  - Avanzad
  - Pasad
  lexicon: HALOT
  rationale: Es un imperativo plural de עבר con sentido de movimiento en procesión. «Pasad adelante» expresa avance en secuencia y evita confundirlo con «cruzar» una frontera o un río.
- source_word: וְסֹבּוּ אֶת־הָעִיר
  english_pob_choice: and go around the city
  chosen_spanish: y rodead la ciudad
  alternatives_spanish:
  - y circundad la ciudad
  - y marchad alrededor de la ciudad
  lexicon: HALOT
  rationale: סבב significa ir alrededor o encerrar. «Rodead» es natural en español y conserva el sentido espacial sin añadir una carga militar no explicitada por el verbo.
- source_word: וְהֶחָלוּץ
  english_pob_choice: the armed men
  chosen_spanish: los hombres armados
  alternatives_spanish:
  - la vanguardia
  - los hombres equipados para la batalla
  lexicon: HALOT
  rationale: חָלוּץ designa a los preparados/armados para la batalla, a menudo como contingente de avanzada. «Los hombres armados» es claro y suficientemente literal; «vanguardia» se reserva como alternativa interpretativa.
- source_word: יַעֲבֹר
  english_pob_choice: let ... pass
  chosen_spanish: pasen
  alternatives_spanish:
  - deben pasar
  - han de pasar
  lexicon: HALOT
  rationale: El imperfecto singular funciona con fuerza jussiva/instruccional. En español, «que ... pasen» reproduce mejor el mandato que una simple futura afirmación.
- source_word: לִפְנֵי אֲרוֹן יְהוָה
  english_pob_choice: before the ark of Yahweh
  chosen_spanish: delante del arca de Yahvé
  alternatives_spanish:
  - en frente del arca de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי indica posición delante de. «Delante de» mantiene la relación espacial directa y «arca de Yahvé» conserva el nombre divino según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del Nombre divino con la forma adoptada por el proyecto en español, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El versículo usa el Tetragrámaton directamente. Conforme a la doctrina del proyecto, se translitera el Nombre divino como «Yahvé» para preservar su identidad propia en vez de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Función de וְהֶחָלוּץ
  english_pob_reading: the armed men
  chosen_spanish_reading: los hombres armados
  alternative_spanish_readings:
  - la vanguardia
  - los guerreros
  rationale: El término hebreo puede señalar a los armados o al contingente de avanzada. Se conserva la formulación amplia «los hombres armados» para no cerrar indebidamente la ambigüedad léxica; la idea de vanguardia queda como posible matiz, no como sustitución obligatoria.
  doctrine_reference: 'Lexical transparency: preserve documented ambiguities where the source allows them'
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo (WLC) y el audit trail inglés. La decisión principal es conservar el nombre divino como Yahvé/Yahvé y mantener la ambigüedad de חָלוּץ sin convertirla en una interpretación más cerrada que la permitida por el hebreo. No se reportaron revisiones aplicadas en el rastro inglés reciente, por lo que la redacción española se alinea con el estado estable del versículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Delante de» se eligió para לִפְנֵי por su transparencia espacial y su registro natural en español.
  - «Hombres armados» preserva la fuerza militar de חָלוּץ sin imponer de entrada el tecnicismo «vanguardia».
  - 'El mandato se expresó con subjuntivo exhortativo: «que ... pasen», coherente con el jussivo hebreo.'
