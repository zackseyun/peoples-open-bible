base_translation:
  language: en
  yaml_path: translation/ot/exodus/034/020.yaml
  text: You shall redeem the firstborn of a donkey with a lamb[a]; and if you do not redeem it, then you shall break its neck. You shall redeem every firstborn of your sons[c][b]. And none shall appear before me empty-handed.
  footnotes:
  - marker: a
    text: Or 'with a sheep' or more broadly 'with one of the flock'; Hebrew שֶׂה can refer to a sheep or goat from the flock.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'before my face.' This is a Hebrew idiom for appearing in God's presence.
    reason: lexical_alternative
  - marker: c
    text: That is, not without a gift or offering.
    reason: cultural_note
