  spanish_quality_summary: El texto principal es natural, claro y digno en español eclesial general. 'Yahvé está cerca de todos los que lo invocan ... en verdad' suena idiomático y fiel. La única reparación necesaria es mover el marcador de nota al segmento correcto para evitar ambigüedad exegética y desalineación con la evidencia auditada.
