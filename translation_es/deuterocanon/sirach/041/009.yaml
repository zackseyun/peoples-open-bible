translation:
  language: es
  text: Si prosperas[a], será por desastre; y si engendras hijos, será para lamento. Si tropiezas, será para gozo eterno; y si mueres, será para maldición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo transmitido en este versículo es algo difícil y difiere en algunos detalles del griego. El paralelo griego dice: “si nacéis, naceréis para una maldición, y si morís, seréis asignados a una maldición”, lo cual ayuda a orientar el sentido aquí.'
    reason: textual_variant
lexical_decisions:
- source_word: תפרו
  english_pob_choice: If you prosper
  chosen_spanish: Si prosperas
  alternatives_spanish:
  - Si prosperáis
  - Si floreces
  - Si te va bien
  lexicon: HALOT
  rationale: El hebreo admite una idea de prosperar o tener éxito; el contexto de la sentencia irónica favorece una condición de prosperidad contrapuesta a un resultado desastroso. 'Prosperas' mantiene la fuerza breve y directa del condicional.
- source_word: תולידו / γεννηθῆτε
  english_pob_choice: if you beget children / if you are born
  chosen_spanish: si engendras hijos
  alternatives_spanish:
  - si das a luz
  - si nacen hijos para ti
  - si eres engendrado
  lexicon: HALOT; BDAG
  rationale: La tradición hebrea aquí apunta a 'engendrar' más que a un nacimiento pasivo; el griego paralelo sugiere el campo de 'nacer', pero el texto hebreo conservado favorece la idea de procreación. Se elige una formulación natural en español que conserva la referencia a descendencia.
- source_word: לאנחה
  english_pob_choice: for groaning
  chosen_spanish: para gemido
  alternatives_spanish:
  - para lamento
  - para quejarse
  - para suspiros
  lexicon: HALOT
  rationale: '''אנחה'' es un gemido, suspiro o lamento. ''Para gemido'' retiene la sustantivación y la relación de resultado marcada por la preposición.'
- source_word: תכשלו
  english_pob_choice: if you stumble
  chosen_spanish: Si tropiezas
  alternatives_spanish:
  - Si caes
  - Si te tambaleas
  - Si te equivocas
  lexicon: HALOT
  rationale: '''Tropezar'' expresa bien la imagen de fallo o caída figurada del verbo, sin perder la metáfora corporal que sostiene el contraste.'
- source_word: לשמחת עולם
  english_pob_choice: for everlasting rejoicing
  chosen_spanish: para gozo eterno
  alternatives_spanish:
  - para alegría eterna
  - para regocijo perpetuo
  - para júbilo sin fin
  lexicon: HALOT
  rationale: '''שמחת עולם'' significa alegría/gozo de duración perpetua. ''Gozo eterno'' es idiomático en español y mantiene tanto el sustantivo como la duración ilimitada.'
- source_word: מתו / ἀποθάνητε
  english_pob_choice: if you die
  chosen_spanish: si mueres
  alternatives_spanish:
  - si falleces
  - si pereces
  - si llegas a morir
  lexicon: HALOT; BDAG
  rationale: '''Morir'' es el equivalente más directo y sobrio. Mantiene el paralelismo con las otras condicionales.'
- source_word: לקללה / εἰς κατάραν
  english_pob_choice: for a curse
  chosen_spanish: para maldición
  alternatives_spanish:
  - para una maldición
  - hacia una maldición
  - como maldición
  lexicon: HALOT; BDAG
  rationale: '''לקללה'' nombra el estado o destino de maldición. ''Para maldición'' conserva el valor resultativo/télico sin añadir artículo innecesario.'
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego en una sección con desajuste textual
  english_pob_reading: Follow the Hebrew witness as primary, but let the Greek clarify the sense and complete the second colon's meaning.
  chosen_spanish_reading: Seguir el hebreo conservado como base, dejando que el griego ayude a confirmar el valor de la estructura condicional y del destino final de 'maldición'.
  alternative_spanish_readings:
  - Traducir solo el hebreo de forma más literal aunque suene menos claro
  - Preferir por completo el griego en esta cláusula
  rationale: La pauta editorial pide priorizar el hebreo en Sirácida cuando se conserva, pero la nota del expediente indica una discrepancia menor y ofrece el griego como control. La redacción española intenta reflejar el hebreo legible sin contradecir el sentido corroborado por el griego.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva en Sirácida; usar el paralelo griego como insumo real cuando está presente.'
translation_notes:
  revision_awareness: Esta redacción incorpora la revisión más reciente del expediente, que corrigió un borrador anterior demasiado literal y omitía varios miembros de la sentencia. Se conservaron las cuatro cláusulas condicionales del hebreo, con apoyo del griego para el marco semántico del versículo y el destino de maldición final.
  spanish_consistency_notes:
  - Se usa 'maldición' para לקללה / κατάραν, consistente con el léxico POB.
  - Se evita 'Señor' o 'Cristo', pues no aparecen en el versículo.
  - Se conserva el tono sentencioso y paralelo del hebreo, con puntuación española fluida.
  - '''Gozo eterno'' traduce לשמחת עולם con una expresión natural y fiel al valor de duración perpetua.'
