revisions:
- from: David golpeó la tierra y no dejó con vida[a] ni a hombre ni a mujer, y tomó ovejas, ganado, asnos, camellos y ropa. Luego regresó y vino a Aquis.
  to: David atacó la región y no dejó con vida[a] ni a hombre ni a mujer, y tomó ovejas, ganado, asnos, camellos y ropa. Luego regresó y vino a Aquis.
  rationale: Se corrige la expresión literalista 'golpeó la tierra' por 'atacó la región' para reflejar mejor el sentido contextual de וְהִכָּה אֶת הָאָרֶץ en español natural y claro, manteniendo la sobriedad del original sin suavizar ni amplificar la violencia. Se conserva la estructura restante y la nota alternativa porque son fieles al hebreo y al audit trail inglés.
