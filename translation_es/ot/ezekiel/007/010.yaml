translation:
  language: es
  text: ¡Mira[a], el día! ¡Mira, viene! Ha salido la condena; ha retoñado la vara; ha florecido la soberbia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mañana»; el término hebreo es difícil y puede referirse literalmente a la mañana o figuradamente al giro fatal que ha llegado.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica exige atención urgente y repetición retórica. «Mira» comunica la inmediatez profética con español actual; «He aquí» sería más tradicional pero más arcaico.
- source_word: הַיּוֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - el día
  - el tiempo
  - el día del juicio
  lexicon: HALOT
  rationale: Se conserva la expresión nominal simple del hebreo sin expandirla interpretativamente. «El día» mantiene la ambigüedad profética y el tono ominoso.
- source_word: בָאָה
  english_pob_choice: it comes
  chosen_spanish: viene
  alternatives_spanish:
  - viene
  - ha venido
  - está viniendo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en discurso profético comunica inminencia y certeza. «Viene» suena natural en español y preserva ese valor.
- source_word: יָצְאָה
  english_pob_choice: has gone out
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha salido
  - ha salido fuera
  - sale
  lexicon: HALOT
  rationale: '«Salir» reproduce con claridad יצא y conserva el valor resultativo del perfecto: el mal ya ha irrumpido.'
- source_word: הַצְּפִרָה
  english_pob_choice: doom
  chosen_spanish: el desastre
  alternatives_spanish:
  - la mañana
  - el giro
  - el destino
  lexicon: HALOT
  rationale: El término es difícil y debatido. En el contexto inmediato de juicio, «el desastre» comunica bien el sentido contextual sin fijar indebidamente una lectura literal que el hebreo no obliga a resolver.
- source_word: צָץ
  english_pob_choice: has budded
  chosen_spanish: ha retoñado
  alternatives_spanish:
  - ha brotado
  - ha germinado
  - ha retoñado
  lexicon: HALOT
  rationale: Se conserva la imagen vegetal. «Ha retoñado» enlaza naturalmente con el paralelo siguiente y mantiene el matiz de aparición visible y temprana.
- source_word: הַמַּטֶּה
  english_pob_choice: the rod
  chosen_spanish: la vara
  alternatives_spanish:
  - la vara
  - el bastón
  - el cetro
  lexicon: HALOT
  rationale: «Vara» es el equivalente natural en español para un instrumento de golpe/autoridad en este contexto. «Cetro» sería demasiado específico; «bastón» debilita la fuerza de la imagen.
- source_word: פָּרַח
  english_pob_choice: has blossomed
  chosen_spanish: ha florecido
  alternatives_spanish:
  - ha florecido
  - ha brotado
  - ha abierto
  lexicon: HALOT
  rationale: Se mantiene el paralelismo vegetal con צָץ. «Ha florecido» es claro y fiel al campo semántico de פרח.
- source_word: הַזָּדוֹן
  english_pob_choice: arrogance
  chosen_spanish: la soberbia
  alternatives_spanish:
  - la soberbia
  - la arrogancia
  - la presunción
  - la insolencia
  lexicon: HALOT
  rationale: El sustantivo denota orgullo presuntuoso e insolente. «Soberbia» es un equivalente bíblico claro en español y conserva el peso moral del reproche.
theological_decisions:
- issue: Interpretación de הַצְּפִרָה en un oráculo de juicio
  english_pob_reading: Rendered as 'doom' in the main text, with a footnote preserving 'morning' as an alternative
  chosen_spanish_reading: Se vierte como «el desastre» en el texto principal, con nota que preserva «la mañana» como alternativa
  alternative_spanish_readings:
  - la mañana
  - el giro
  - el destino
  rationale: El contexto inmediato es una proclamación de juicio inminente, y las imágenes cercanas son de calamidad que irrumpe. «El desastre» transmite el sentido contextual sin borrar la tensión textual; la nota mantiene la lectura más literal «la mañana», dado que el hebreo es debatido.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica/textual en lugar de resolverla prematuramente.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión del contexto inglés: no se reportaron cambios y el estado fue de alta concordancia.'
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo verbal de inminencia y resultatividad: «viene / ha salido / ha retoñado / ha florecido».'
  - Se evita introducir «SEÑOR» o expansiones interpretativas no presentes en el hebreo.
  - Se conserva la ambigüedad de הַצְּפִרָה mediante una nota, en línea con el tratamiento auditado del inglés POB.
