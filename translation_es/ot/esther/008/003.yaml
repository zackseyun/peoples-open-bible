translation:
  language: es
  text: Entonces Ester habló de nuevo delante del rey. Cayó a sus pies[a], lloró y le rogó que apartara el plan malvado[b] de Amán el agagueo y el plan que había tramado contra los judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postró ante sus pies»; el hebreo describe una caída o postración suplicante ante el rey.
    reason: lexical_alternative
  - marker: b
    text: O «el mal plan» o «el daño»; el hebreo puede expresar el mal o daño que Amán pretendía causar, aquí en paralelo con el plan que había tramado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתּוֹסֶף אֶסְתֵּר וַתְּדַבֵּר
  english_pob_choice: Then Esther spoke again
  chosen_spanish: Entonces Ester habló de nuevo
  alternatives_spanish:
  - Y Ester siguió hablando
  - Entonces Ester añadió y habló
  lexicon: HALOT
  rationale: יסף con un verbo finito siguiente expresa continuación o repetición; en español, «habló de nuevo» comunica bien el valor iterativo sin calco innecesario.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  - ante el rey
  lexicon: HALOT
  rationale: La expresión de corte indica presencia formal. «Delante del rey» conserva la escena judicial/cortesana y suena natural en español bíblico moderno.
- source_word: וַתִּפֹּל לִפְנֵי רַגְלָיו
  english_pob_choice: She fell before his feet
  chosen_spanish: Se postró a los pies de él[a]
  alternatives_spanish:
  - Cayó a sus pies
  - Se arrojó a sus pies
  lexicon: HALOT
  rationale: נפל con לפני רגליו describe postración suplicante. «Se postró a los pies de él» transmite la humillación y el gesto físico, aunque el español requiera una formulación más idiomática que «cayó».
- source_word: וַתֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - sollozó
  - se echó a llorar
  lexicon: HALOT
  rationale: בכה admite «llorar» o «llanto». «Lloró» mantiene solemnidad y es plenamente natural en español.
- source_word: וַתִּתְחַנֶּן לוֹ
  english_pob_choice: pleaded with him
  chosen_spanish: le rogó
  alternatives_spanish:
  - le suplicó
  - le imploró
  lexicon: HALOT
  rationale: חנן en hitpael expresa súplica intensa por favor o misericordia. «Le rogó» preserva la petición urgente sin forzar un matiz más técnico de gracia/favor en el cuerpo del versículo.
- source_word: לְהַעֲבִיר
  english_pob_choice: to avert
  chosen_spanish: que apartara
  alternatives_spanish:
  - que removiera
  - que hiciera pasar
  - que revocara
  lexicon: HALOT
  rationale: En contexto, עבר en hiphil comunica hacer pasar, retirar o dejar sin efecto. «Apartara» funciona bien en español para expresar que la calamidad/plan sea quitado o desviado.
- source_word: אֶת רָעַת הָמָן
  english_pob_choice: the evil plan of Haman
  chosen_spanish: la maldad[b] de Amán
  alternatives_spanish:
  - el mal plan de Amán
  - la calamidad de Amán
  - el mal de Amán
  lexicon: HALOT
  rationale: רָעָה puede ser maldad, mal, calamidad o daño. Dado que la frase siguiente ya habla del «plan», se conserva aquí el valor moral con «maldad» y se deja la especificación del plan para la cola del verso. «Amán» sigue la forma española del nombre.
- source_word: הָאֲגָגִי
  english_pob_choice: the Agagite
  chosen_spanish: el agagueo
  alternatives_spanish:
  - el agagita
  - el descendiente de Agag
  lexicon: HALOT
  rationale: El gentilicio/dinástico apunta a Agag. «Agagueo» evita una terminación poco natural y sigue la equivalencia funcional de la designación étnica.
- source_word: וְאֵת מַחֲשַׁבְתּוֹ אֲשֶׁר חָשַׁב
  english_pob_choice: and the scheme that he had devised
  chosen_spanish: y el plan que había tramado
  alternatives_spanish:
  - y la trama que había ideado
  - y la intención que había concebido
  lexicon: HALOT
  rationale: El sustantivo más el verbo de חשב refuerzan la deliberación. «Plan... tramado» mantiene esa coordinación semántica con un español natural y reconoce el carácter premeditado del complot.
- source_word: עַל הַיְּהוּדִים
  english_pob_choice: against the Jews
  chosen_spanish: contra los judíos
  alternatives_spanish:
  - sobre los judíos
  - a costa de los judíos
  lexicon: HALOT
  rationale: Con חשב en contexto hostil, עַל tiene fuerza adversativa. «Contra los judíos» explicita correctamente la hostilidad.
theological_decisions:
- issue: Postración y súplica como acto de dependencia ante la autoridad humana suprema del relato
  english_pob_reading: She fell before his feet, wept, and pleaded with him
  chosen_spanish_reading: Se postró a los pies de él, lloró y le rogó
  alternative_spanish_readings:
  - Cayó a sus pies, lloró y le suplicó
  - Se arrojó a sus pies, lloró y lo imploró
  rationale: No hay necesidad de añadir carga devocional; el texto presenta una súplica extrema ante el rey. «Se postró» conserva la intensidad sin convertir el gesto en una fórmula litúrgica.
  doctrine_reference: Narrative humility / court supplication; no doctrinal claim beyond the text
- issue: Distinción entre la maldad/daño y el plan tramado
  english_pob_reading: the evil plan of Haman ... and the scheme that he had devised
  chosen_spanish_reading: la maldad de Amán ... y el plan que había tramado
  alternative_spanish_readings:
  - el mal plan de Amán ... y la trama que había ideado
  - la calamidad de Amán ... y el proyecto que había concebido
  rationale: El hebreo separa רָעָה de מַחֲשָׁבָה/חָשַׁב. Mantener ambas expresiones evita borrar la tensión semántica entre la maldad/daño y el complot deliberado.
  doctrine_reference: Lexical distinction in Hebrew narrative; no special doctrinal position
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «the evil of Haman» a «the evil plan of Haman» para reflejar mejor רָעַת en contexto y mantener la distinción con «his scheme». La versión española conserva esa separación entre «la maldad de Amán» y «el plan que había tramado», sin fusionarlas en una sola idea.
  spanish_consistency_notes:
  - Se usa «Ester» y «Amán» de forma consistente con el español bíblico actual.
  - Se conserva «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Judíos» se mantiene como designación del pueblo objetivo del complot, siguiendo el contexto hostil del hebreo.
  - Se evita «Cristo/Mesías» por no ser pertinente en este pasaje.
