revisions:
- from: Jeroboam hizo una fiesta en el octavo mes[a], el día quince del mes, como la fiesta que estaba en Judá; y subió al altar. Así hizo en Betel, sacrificando a los becerros que había hecho[b]; y estableció en Betel a los sacerdotes de los lugares altos que había hecho.
  to: Jeroboam hizo una fiesta en el octavo mes[a], el día quince del mes, como la fiesta que había en Judá; y subió al altar.[b] Así hizo en Betel, sacrificando a los becerros que había hecho; y estableció en Betel a los sacerdotes de los lugares altos que él había hecho.
  rationale: Se ajustó 'que estaba en Judá' a 'que había en Judá' para un español más natural y fiel al sentido. Se ancló la nota léxica [b] directamente a 'altar', donde corresponde. También se pulió la nota b. Se mantuvo 'estableció' por ser aceptable en español, pero se añadió 'él' para ayudar a que el relativo final se entienda como referido a los lugares altos establecidos por Jeroboam.
