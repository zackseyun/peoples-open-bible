  spanish_quality_summary: 'La principal dificultad es de naturalidad y gramática: ''estarán una desolación'' suena impropio en español bíblico y general; ''serán una desolación'' es la forma idiomática y fiel para היה + sustantivo de estado. El resto del verso es claro y digno. La nota b ya no corresponde bien al texto principal porque este ya explicita ''a los egipcios''; conviene reformularla para explicar que el hebreo dice ''Egipto'' y luego pasa a un plural referido a sus habitantes.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La elección 'a los egipcios' en vez de 'Egipto' es una adaptación permisible para claridad en español, pero debe justificarse en la nota porque el POB inglés documentó el cambio metonímico del hebreo.
  issues:
  - severity: medium
    issue: '''estarán una desolación'' es poco natural en español'
    rationale: Aunque intenta reflejar la estructura nominal hebrea, en español 'estar' con 'una desolación' suena no idiomático. 'Serán una desolación' conserva mejor el sentido resultativo y la legibilidad.
  - severity: medium
    issue: La nota b no se ajusta del todo al texto español revisado
    rationale: El texto principal ya traduce explícitamente 'a los egipcios', por lo que la nota no debe hablar de 'objeto plural implícito en el verbo siguiente' como si el lector aún viera 'Egipto' en el cuerpo del versículo. Debe explicar que el hebreo usa primero el nombre territorial y luego un plural referido a sus habitantes.
  revised_spanish_text: Y haré la tierra de Egipto una desolación en medio de tierras desoladas[a], y sus ciudades serán una desolación en medio de ciudades arruinadas durante cuarenta años[b]; y esparciré a los egipcios entre las naciones y los dispersaré por las tierras.
  revised_footnotes:
  - marker: a
    text: 'O: «entre tierras devastadas»; el hebreo usa términos estrechamente relacionados para desolación y ruina en cláusulas paralelas.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, los habitantes de Egipto; el hebreo dice primero «Egipto» y luego pasa a un plural referido a ellos.
    reason: lexical_alternative
  revision_rationale: Se cambió 'estarán una desolación' por 'serán una desolación' para lograr un español natural y fiel. También se ajustó la nota b para que corresponda al hecho de que el texto español explicita 'a los egipcios', mientras el hebreo usa primero el nombre territorial y luego un plural para sus habitantes. Se prefirió 'durante cuarenta años' por fluidez natural sin alterar el sentido.
