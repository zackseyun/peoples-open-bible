review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Yahvé está exaltado por encima de todas las naciones y su gloria está por encima de los cielos. Conserva correctamente el nombre divino «Yahvé», el paralelismo de «sobre»/«sobre», y «gloria» para כְּבוֹדוֹ. Sin embargo, «es alto» en español suena algo físico o débil; «es exaltado» expresa mejor el predicado poético רָם sin perder la imagen de elevación.'
  spanish_quality_summary: El texto es claro y legible, pero «Yahvé es alto» resulta menos natural y menos digno en registro bíblico que «Yahvé es exaltado». El resto fluye bien en español eclesial neutro. «Está sobre los cielos» funciona, aunque omitir «está» en la segunda cola da más fuerza poética.
  glossary_alignment: 'La alineación terminológica es buena: יְהוָה → «Yahvé» conforme a la política del proyecto; כָּבוֹד → «gloria» correctamente; שָּׁמַיִם → «cielos» preserva el valor poético. La única mejora léxica recomendada es רָם → «exaltado» en vez de «alto» por fidelidad estilística al hebreo poético y mejor español.'
  issues:
  - severity: medium
    issue: «es alto» para רָם suena poco idiomático en este contexto doxológico
    rationale: Aunque semánticamente posible, en español bíblico contemporáneo «alto» puede sonar demasiado físico. «Exaltado» comunica mejor supremacía y elevación poética, una alternativa ya reconocida en la auditoría inglesa.
  - severity: low
    issue: La segunda cola puede sonar más poética sin «está»
    rationale: «Su gloria sobre los cielos» es demasiado elíptico, pero «su gloria está por encima de los cielos» o «su gloria está sobre los cielos» mantienen claridad. Aquí no es un error, solo una cuestión de pulido estilístico.
  revised_spanish_text: Yahvé es exaltado sobre todas las naciones; su gloria está sobre los cielos.
  revision_rationale: Se ajusta רָם de «es alto» a «es exaltado» para reflejar mejor el tono poético y la supremacía de Yahvé en español natural y digno, sin alterar el sentido ni la estructura paralela del versículo.
