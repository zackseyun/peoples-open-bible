translation:
  language: es
  text: 'Jesús respondió[a]: «Si me glorifico a mí mismo, mi gloria no es nada. Es mi Padre quien me glorifica, de quien ustedes dicen: “Él es nuestro Dios”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «el Dios de ustedes» en vez de «nuestro Dios».
    reason: textual_variant
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En diálogo narrativo, ἀποκρίνομαι admite un verbo de respuesta idiomático. «Respondió» conserva el tono natural y formal del español sin añadir matices de disputa que no están en el griego.
- source_word: δοξάσω
  english_pob_choice: glorify
  chosen_spanish: me glorifico
  alternatives_spanish:
  - me doy gloria
  - me honro
  lexicon: BDAG
  rationale: Se conserva «glorificar» por la carga teológica de δόξα/δοξάζω en Juan. En la voz media/reflexiva del contexto, «me glorifico a mí mismo» refleja que Jesús habla de atribuirse gloria por sí mismo.
- source_word: ἡ δόξα μου οὐδέν ἐστιν
  english_pob_choice: my glory is nothing
  chosen_spanish: mi gloria no es nada
  alternatives_spanish:
  - mi gloria no vale nada
  - mi gloria no es nada en absoluto
  lexicon: BDAG
  rationale: «No es nada» sigue de cerca οὐδέν ἐστιν y mantiene el valor absoluto de la negación sin suavizarla con una paráfrasis explicativa.
- source_word: ὁ πατήρ μου
  english_pob_choice: My Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi Padre
  lexicon: BDAG
  rationale: Se mantiene el sentido relacional directo del griego. En español, la mayúscula no es necesaria para preservar la referencia divina, aunque el contexto deja claro que se trata del Padre de Jesús.
- source_word: ὁ δοξάζων με
  english_pob_choice: is the one who glorifies me
  chosen_spanish: quien me glorifica
  alternatives_spanish:
  - el que me glorifica
  - el que está glorificándome
  lexicon: BDAG
  rationale: El participio articular presente se vierte con una relativa natural en español. «Quien me glorifica» conserva el sentido descriptivo/continuo sin sobrecargar la frase.
- source_word: ὃν ὑμεῖς λέγετε ὅτι θεὸς ἡμῶν ἐστιν
  english_pob_choice: of whom you say, ‘He is our God,’
  chosen_spanish: 'de quien ustedes dicen: “Él es nuestro Dios”'
  alternatives_spanish:
  - de quien ustedes dicen que es nuestro Dios
  - 'a quien ustedes dicen: “Él es nuestro Dios”'
  lexicon: BDAG
  rationale: Se preserva la estructura relativa con «de quien», como en la revisión inglesa más reciente («of whom»), y el contenido del dicho directo. «Ustedes» mantiene el contraste polémico del discurso.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  lexicon: BDAG
  rationale: Aquí el referente es el Dios de Israel; por eso corresponde «Dios» con mayúscula en español.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - vuestro
  lexicon: NA28/SBLGNT textual tradition
  rationale: Se sigue la lectura base ἡμῶν («nuestro»). La variante textual con ὑμῶν se conserva en nota, no en el texto principal.
theological_decisions:
- issue: Lectura pronominal en θεὸς ἡμῶν / ὑμῶν ἐστιν
  english_pob_reading: our God
  chosen_spanish_reading: nuestro Dios
  alternative_spanish_readings:
  - vuestro Dios
  rationale: El texto base griego leído en SBLGNT tiene ἡμῶν, así que el español principal debe decir «nuestro Dios». La variante «vuestro Dios» es interpretativamente significativa en la controversia y no debe ocultarse.
  doctrine_reference: Translation philosophy §1, §3
- issue: Forma de παρουσία/δόξα en contexto joánico
  english_pob_reading: glorify / glory
  chosen_spanish_reading: glorificar / gloria
  alternative_spanish_readings:
  - honrar / honor
  rationale: En Juan, δόξα y δοξάζω tienen un peso temático propio; «glorificar/gloria» conserva esa red de significado mejor que «honrar/honor», que sería más restrictivo y menos joánico.
  doctrine_reference: John 7–12 glory theme; translation philosophy §2
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente: el segundo miembro se vertió con una relativa natural («de quien ustedes dicen») y se mantuvo el contenido de la cita directa con puntuación clara. También se respetó la decisión auditada de conservar «gloria/glorificar» por el peso joánico del término.'
  spanish_consistency_notes:
  - Se conservó el registro formal y bíblico sin recurrir a un calco rígido.
  - Se mantuvo «Dios» con mayúscula por el referente claro al Dios de Israel.
  - La cita interna se marcó con comillas españolas y la nota textual quedó anclada en «nuestro Dios».
