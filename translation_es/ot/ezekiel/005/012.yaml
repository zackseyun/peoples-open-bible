    reason: cultural_note
  - marker: b
    text: 'O: «sacaré una espada tras ellos».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige el anclaje de las notas para que coincidan con el contenido documentado por el POB inglés, mejora la precisión de רָעָב con «hambruna», y ajusta «detrás de ellos» a «tras ellos» para reflejar mejor el matiz de persecución. Se preservan la personificación de Jerusalén y las imágenes concretas del juicio del hebreo.
