revisions:
- from: Y después que hubo entrado por todas las puertas[a], se puso delante del rey; y él estaba sentado en el trono de su reino[b], y vestido con toda la magnificencia de su esplendor.
  to: Y después de entrar por todas las puertas[a], se presentó ante el rey; y él estaba sentado en el trono de su reino, revestido de todo el esplendor de su majestad[b].
  rationale: 'La revisión conserva el sentido del griego y del POB inglés, mejora la naturalidad del español y corrige dos desajustes: la formulación cortesana de κατέστη ἐνώπιον y la expresión final de la magnificencia real. También reubica la nota léxica al lugar donde realmente existe la alternativa documentada: θύρας.'
  reviewer_model: gpt-5.4
