translation:
  language: es
  text: Entonces no les bastó errar[a] acerca del conocimiento de Dios, sino que también, viviendo en una gran guerra de ignorancia[b], llaman paz a tan grandes males.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser llevados a errar» acerca del conocimiento de Dios. El infinitivo griego admite una matiz más pasivo.
    reason: lexical_alternative
  - marker: b
    text: 'La expresión «una gran guerra de ignorancia» conserva la metáfora griega: la ignorancia se presenta como un estado de conflicto o combate dominado por ella.'
    reason: cultural_note
lexical_decisions:
- source_word: Εἶτʼ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  - Además
  lexicon: LSJ
  rationale: Marca una continuación o consecuencia del razonamiento. «Entonces» conserva el avance discursivo de manera natural en español.
- source_word: οὐκ ἤρκεσεν
  english_pob_choice: it was not enough
  chosen_spanish: no les bastó
  alternatives_spanish:
  - no fue suficiente
  - no les resultó suficiente
  lexicon: LSJ
  rationale: La construcción impersonal se vuelve idiomática en español con «no les bastó», preservando la idea de insuficiencia moral de lo anterior.
- source_word: τὸ πλανᾶσθαι
  english_pob_choice: to go astray
  chosen_spanish: errar
  alternatives_spanish:
  - andar extraviados
  - desviarse
  - ser desviados
  lexicon: LSJ
  rationale: «Errar» conserva el sentido moral e intelectual de desviación sin forzar demasiado la voz verbal; deja abierta la tensión entre actividad propia y pasividad implícita del infinitivo griego.
- source_word: περὶ τὴν τοῦ θεοῦ γνῶσιν
  english_pob_choice: concerning the knowledge of God
  chosen_spanish: acerca del conocimiento de Dios
  alternatives_spanish:
  - respecto al conocimiento de Dios
  - en cuanto al conocimiento de Dios
  - sobre el conocimiento de Dios
  lexicon: LSJ
  rationale: «Conocimiento de Dios» mantiene el peso teológico de γνῶσις, y «acerca de» reproduce bien la relación preposicional sin volverla interpretativa.
- source_word: μεγάλῳ ... ἀγνοίας πολέμῳ
  english_pob_choice: in a great war of ignorance
  chosen_spanish: en una gran guerra de ignorancia
  alternatives_spanish:
  - en un gran conflicto de ignorancia
  - en una gran lucha de ignorancia
  - en una gran guerra nacida de la ignorancia
  lexicon: LSJ
  rationale: Se conserva la metáfora de πόλεμος como «guerra» para no diluir la imagen. «Ignorancia» traduce el genitivo de forma directa y mantiene el campo semántico de ceguera o falta de conocimiento.
- source_word: ζῶντες
  english_pob_choice: while living
  chosen_spanish: viviendo
  alternatives_spanish:
  - mientras viven
  - al vivir
  - así viviendo
  lexicon: LSJ
  rationale: El participio queda bien en español como gerundio circunstancial, ligado al verbo principal «llaman».
- source_word: τὰ τοσαῦτα κακὰ
  english_pob_choice: such great evils
  chosen_spanish: tan grandes males
  alternatives_spanish:
  - tales males tan grandes
  - tan numerosos males
  - tales grandes males
  lexicon: LSJ
  rationale: «Tan grandes males» transmite la magnitud y el juicio moral del griego. «Males» resulta más natural que «maldades» en este contexto.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - seguridad
  - orden
  lexicon: LSJ
  rationale: Se conserva el término simple y directo para sostener la ironía del pasaje sin ampliarlo a conceptos no explicitados por el griego.
- source_word: προσαγορεύουσιν
  english_pob_choice: they call
  chosen_spanish: llaman
  alternatives_spanish:
  - nombran
  - designan
  - saludan como
  lexicon: LSJ
  rationale: «Llaman» es conciso y fiel al acto de dar un nombre erróneo a lo que en realidad son males.
theological_decisions:
- issue: Si πλανᾶσθαι debe sonar más activo o más pasivo en español
  english_pob_reading: to go astray
  chosen_spanish_reading: errar
  alternative_spanish_readings:
  - ser extraviados
  - ser llevados a errar
  - andar extraviados
  rationale: La evidencia griega permite una matiz pasivo, pero la frase apunta primero al hecho de apartarse del conocimiento de Dios. «Errar» mantiene esa crítica sin atribuir explícitamente una causa externa que el texto no formula aquí.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Si εἰρήνην debe ampliarse a «seguridad» u otra expresión interpretativa
  english_pob_reading: peace
  chosen_spanish_reading: paz
  alternative_spanish_readings:
  - seguridad
  - orden
  - paz y seguridad
  rationale: El griego dice simplemente «paz». Mantener «paz» preserva el contraste irónico entre la realidad moral y el nombre que le dan, sin introducir una expansión conceptual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, incorporando el «también» implícito en καὶ mediante la coordinación «sino que también» y manteniendo el orden discursivo progresivo de Εἶτʼ con «Entonces».
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se conservó «paz» sin ampliación interpretativa, para reflejar la ironía del cierre.
  - Se mantuvo la metáfora fuerte de «guerra» para πόλεμος, evitando neutralizarla.
  - La opción «errar» deja visible la tensión entre un matiz activo y uno pasivo, alineada con el aparato auditado en inglés.
