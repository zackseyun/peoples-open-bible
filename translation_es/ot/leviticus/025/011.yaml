  to: Es año de jubileo; el año cincuenta[a] será para ustedes. No sembrarán, ni segarán su brote espontáneo[b], ni vendimiarán los racimos de sus vides no podadas[c].
  rationale: Se ajusta la apertura a una formulación más natural e institucional en español ('Es año de jubileo'), se elimina una nota no sustentada por la auditoría inglesa (capitalización), y se conservan solo las alternativas léxicas pertinentes para el año cincuenta, el crecimiento espontáneo y las vides sin podar.
