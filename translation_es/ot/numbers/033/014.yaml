translation:
  language: es
  text: Salieron de Alús y acamparon en Refidim, pero allí no había agua para que el pueblo bebiera.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: En la fórmula itinerante del desierto, נסע expresa mover el campamento y continuar el viaje. «Salieron» comunica de forma natural ese avance sin cargar el verbo con un matiz demasiado literal o técnico.
- source_word: מֵאָלֻשׁ
  english_pob_choice: from Alush
  chosen_spanish: de Alús
  alternatives_spanish:
  - desde Alús
  lexicon: Topónimo
  rationale: Se translitera el nombre propio. «De Alús» conserva el origen del desplazamiento y suena natural en español.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron el campamento
  lexicon: HALOT
  rationale: חנה es el verbo normal para establecer campamento en las listas del desierto. «Acamparon» es claro y fiel; evita una calca excesiva como «encamparon».
- source_word: בִּרְפִידִם
  english_pob_choice: at Rephidim
  chosen_spanish: en Refidim
  alternatives_spanish:
  - en Rephidim
  - en Refidím
  lexicon: Topónimo
  rationale: Se conserva el nombre propio en forma transliterada. «En» funciona mejor que «a» para el lugar donde se acampa en español.
- source_word: וְלֹא הָיָה שָׁם
  english_pob_choice: but there was no ... there
  chosen_spanish: pero allí no había
  alternatives_spanish:
  - y allí no había
  - pero no había allí
  lexicon: HALOT
  rationale: La partícula adversativa se refleja con «pero», como en la lectura contextual del inglés POB. «Allí» mantiene el valor locativo del hebreo.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: מַיִם se traduce por «agua» en español común y bíblico contemporáneo. El plural hebreo no requiere reproducirse en español.
- source_word: לָעָם
  english_pob_choice: for the people
  chosen_spanish: para el pueblo
  alternatives_spanish:
  - para la gente
  - para el pueblo de Israel
  lexicon: HALOT
  rationale: עָם aquí designa a la comunidad israelita como colectivo. «Pueblo» preserva ese sentido comunitario sin introducir una especificación no presente en el hebreo.
- source_word: לִשְׁתּוֹת
  english_pob_choice: to drink
  chosen_spanish: para que el pueblo bebiera
  alternatives_spanish:
  - para beber
  - para que bebiera el pueblo
  lexicon: HALOT
  rationale: El infinitivo de propósito se vierte de modo natural en español con una subordinada final. «Bebiera» expresa la finalidad con fluidez y evita una construcción pesada.
theological_decisions:
- issue: Ninguna tensión teológica especial; solo una nota de traducción sobre la adversativa.
  english_pob_reading: but there was no water there for the people to drink
  chosen_spanish_reading: pero allí no había agua para que el pueblo bebiera
  alternative_spanish_readings:
  - y allí no había agua para que el pueblo bebiera
  - no había agua allí para que el pueblo bebiera
  rationale: 'No hay decisión doctrinal de fondo en este versículo. La única cuestión es retórica: el hebreo marca una situación desfavorable tras el campamento, y «pero» reproduce adecuadamente ese contraste, tal como hace el inglés POB.'
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: El inglés POB está marcado como acuerdo alto y sin cambios recientes; por eso la versión española sigue de cerca su estructura semántica, ajustando solo lo necesario para la naturalidad del español y manteniendo el mismo contenido informativo.
  spanish_consistency_notes:
  - Se usa «Alús» y «Refidim» como transliteraciones consistentes de topónimos.
  - Se prefiere «agua» en singular como término colectivo normal en español, aunque el hebreo sea plural.
  - Se mantiene el tono sobrio y narrativo del itinerario del desierto, sin añadir información contextual no presente en el texto.
