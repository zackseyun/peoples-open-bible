translation:
  language: es
  text: Y el mandato de Ester confirmó estos asuntos de Purim[a], y fue escrito[b] en el libro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estos asuntos/palabras de las observancias de Purim». Hebreo דִּבְרֵי puede significar «palabras», pero también «asuntos» o «materias» en contextos administrativos.
    reason: lexical_alternative
  - marker: b
    text: O «y fue registrado en el libro».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַאֲמַר
  english_pob_choice: command
  chosen_spanish: mandato
  alternatives_spanish:
  - comando
  - decreto
  - orden
  lexicon: HALOT
  rationale: En este contexto administrativo, מַאֲמַר no es solo una palabra dicha, sino una disposición con fuerza normativa. «Mandato» conserva la fuerza oficial sin sonar tan rígido como «decreto».
- source_word: אֶסְתֵּר
  english_pob_choice: Esther
  chosen_spanish: Ester
  alternatives_spanish:
  - Esther
  lexicon: nombre propio bíblico
  rationale: 'Se conserva el nombre propio en forma usual del español bíblico: «Ester».'
- source_word: קִיַּם
  english_pob_choice: confirmed
  chosen_spanish: confirmó
  alternatives_spanish:
  - estableció
  - ratificó
  - sostuvo
  lexicon: HALOT
  rationale: El verbo expresa hacer que algo quede establecido o firme. «Confirmó» comunica bien la idea de ratificación en un marco legal o institucional.
- source_word: דִּבְרֵי
  english_pob_choice: these matters
  chosen_spanish: estos asuntos
  alternatives_spanish:
  - estas palabras
  - estos hechos
  - estas disposiciones
  lexicon: HALOT
  rationale: דִּבְרֵי puede significar «palabras», pero aquí apunta al contenido o la materia de la observancia de Purim. «Asuntos» mantiene ese alcance sin forzar una lectura meramente verbal.
- source_word: הַפֻּרִים
  english_pob_choice: Purim
  chosen_spanish: Purim
  alternatives_spanish:
  - la fiesta de Purim
  lexicon: nombre festivo
  rationale: Se conserva el nombre de la fiesta. Añadir «fiesta» sería explicativo, pero el hebreo solo nombra Purim.
- source_word: הָאֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - tales
  - dichos
  lexicon: demostrativo
  rationale: Se mantiene el demostrativo para reflejar la referencia a los asuntos de Purim mencionados inmediatamente antes.
- source_word: וְנִכְתָּב
  english_pob_choice: and it was written
  chosen_spanish: y fue escrito
  alternatives_spanish:
  - y fue registrado
  - y quedó escrito
  lexicon: HALOT
  rationale: La pasiva refleja el Niphal con sencillez. «Fue escrito» es la equivalencia más directa y transparente en español.
- source_word: בַּסֵּפֶר
  english_pob_choice: in the book
  chosen_spanish: en el libro
  alternatives_spanish:
  - en el registro
  - en el rollo
  lexicon: HALOT
  rationale: סֵפֶר puede referirse a libro, rollo o registro. Aquí «libro» es lo más neutro y no sobreespecifica el documento.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran alta concordancia; no hay revisiones aplicadas ni tensiones textuales relevantes. Se conservó la estructura coordinada simple y la ambigüedad legítima de דִּבְרֵי y בַּסֵּפֶר mediante notas alternativas.
  spanish_consistency_notes:
  - Se usó «Ester» como forma española del nombre propio.
  - Se evitó «SEÑOR» u այլ sustituciones porque el versículo no contiene el nombre divino.
  - Se mantuvo «Purim» como nombre fijo de la festividad.
  - La pasiva «fue escrito» conserva el valor del hebreo sin añadir sujeto explícito.
  - «Mandato» y «asuntos» reflejan el tono administrativo del contexto sin introducir términos eclesiásticos.
