translation:
  text: For they chose for themselves this time that cannot pass away without anguish,
    and they chose for themselves that time whose end is full of laments and evils,
    and they rejected the world that does not age those who come to it, and they rejected
    the time of glory, so that they should not come to the honor of which I told you
    before.
