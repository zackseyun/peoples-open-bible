base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/014/026.yaml
  text: But Alcimus[a], perceiving the goodwill toward one another and learning of the agreements that had been made, came to Demetrius and said that Nicanor was favoring interests contrary to the state; for he had appointed Judas, the plotter against his kingdom[b], as successor.
  footnotes:
  - marker: a
    text: Or, more literally, 'was thinking things alien to public affairs.' The Greek idiom conveys political disloyalty or conduct contrary to the interests of the realm.
    reason: lexical_alternative
  - marker: b
    text: '''Agreements'' may also be rendered ''treaties'' or ''terms,'' referring to the arrangements made between the parties.'
    reason: lexical_alternative
