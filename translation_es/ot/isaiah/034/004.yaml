translation:
  language: es
  text: Toda la hueste de los cielos se pudrirá[a], y los cielos se enrollarán como un rollo[c]; toda su hueste[d] se marchitará como se marchita una hoja de la vid[e], y como un higo marchito de la higuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se disolverá»; el verbo hebreo puede denotar deshacerse, decaer o disolverse.
    reason: lexical_alternative
  - marker: c
    text: O «los cielos serán enrollados como un rollo».
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «toda su hueste», probablemente refiriéndose a los cuerpos celestes que pertenecen a los cielos.
    reason: lexical_alternative
  - marker: e
    text: O «como una hoja que cae de la vid, y como un higo que cae de la higuera». La imagen hebrea puede enfatizar tanto el marchitarse como la caída resultante.
    reason: alternative_reading
lexical_decisions:
- source_word: נָמַקּוּ
  english_pob_choice: will rot away
  chosen_spanish: se pudrirá
  alternatives_spanish:
  - se disolverá
  - se desvanecerá
  - se descompondrá
  lexicon: HALOT
  rationale: El verbo hebreo comunica deshacerse, decaer o pudrirse. En este contexto poético de juicio cósmico, «se pudrirá» conserva la fuerza física e imagística que la POB inglesa quiso preservar con «rot away».},{
- source_word: צְבָא הַשָּׁמַיִם
  english_pob_choice: the host of heaven
  chosen_spanish: la hueste de los cielos
  alternatives_spanish:
  - el ejército de los cielos
  - las estrellas de los cielos
  lexicon: HALOT
  rationale: «Hueste» mantiene el idiomatismo hebreo de צָבָא como host/ejército sin reducir prematuramente la referencia, que puede abarcar el conjunto celestial, especialmente los astros.
- source_word: וְנָגֹלּוּ
  english_pob_choice: will be rolled up
  chosen_spanish: se enrollarán
  alternatives_spanish:
  - se rollarán
  - se doblarán
  - se recogerán
  lexicon: HALOT
  rationale: El verbo de גלל expresa la imagen de ser enrollado. «Se enrollarán» es natural en español y reproduce bien la comparación con un rollo.
- source_word: כַסֵּפֶר
  english_pob_choice: like a scroll
  chosen_spanish: como un rollo
  alternatives_spanish:
  - como un libro
  - como un documento
  - como un pergamino
  lexicon: HALOT
  rationale: Aunque el trasfondo puede ser «scroll/pergamino», en español «rollo» comunica la imagen de algo enrollado con claridad y evita una especificación demasiado moderna o técnica.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the skies
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  - las alturas
  lexicon: HALOT
  rationale: La segunda ocurrencia conserva «cielos» para mantener el paralelismo con la primera mitad del versículo y la amplitud cósmica del hebreo.
- source_word: וְכָל צְבָאָם
  english_pob_choice: all their host
  chosen_spanish: toda su hueste
  alternatives_spanish:
  - todo su ejército
  - todas sus estrellas
  - todo su séquito
  lexicon: HALOT
  rationale: El sufijo de tercera persona plural remite a «los cielos». «Toda su hueste» preserva la relación posesiva y la ambigüedad referencial, sin decidir de más si se trata de estrellas, cuerpos celestes o el conjunto del firmamento.
- source_word: יִבּוֹל
  english_pob_choice: will wither
  chosen_spanish: se marchitará
  alternatives_spanish:
  - se secará
  - se ajará
  - se desvanecerá
  lexicon: HALOT
  rationale: נבל se usa de vegetación que pierde vida o se marchita. «Se marchitará» encaja con las comparaciones vegetales que siguen y suena natural en español.
- source_word: כִּנְבֹל עָלֶה מִגֶּפֶן
  english_pob_choice: like a leaf withers from the vine
  chosen_spanish: como se marchita una hoja de la vid
  alternatives_spanish:
  - como cae una hoja de la vid
  - como una hoja que se marchita en la vid
  - como una hoja de la vid que cae
  lexicon: HALOT
  rationale: La comparación hebrea permite el matiz de marchitarse y, por extensión, caer. El español elegido mantiene el vínculo verbal con «se marchitará» y la imagen agrícola de la vid.
- source_word: וּכְנֹבֶלֶת מִתְּאֵנָה
  english_pob_choice: and like a withered fig from the fig tree
  chosen_spanish: y como un higo marchito de la higuera
  alternatives_spanish:
  - y como un higo que se marchita de la higuera
  - y como un higo caído de la higuera
  - y como un higo seco de la higuera
  lexicon: HALOT
  rationale: El femenino participial hebreo evoca algo marchito o en proceso de caída; en español, «higo marchito» conserva la relación léxica con נבל y hace explícito el sustantivo implícito para que la imagen sea clara.
theological_decisions:
- issue: Naturaleza de la imaginería cósmica
  english_pob_reading: Render the language straightforwardly as cosmic de-creation/judgment imagery without reducing it to mere metaphor or forcing a specific eschatological system.
  chosen_spanish_reading: Traducir el lenguaje como imaginería cósmica de juicio y des-creación, sin reducirlo a mera metáfora ni fijarlo dentro de un sistema escatológico específico.
  alternative_spanish_readings:
  - imaginería puramente metafórica de colapso político
  - dissolución astronómica estrictamente literal
  rationale: La poesía profética presenta el juicio divino con imágenes cósmicas intensas. La redacción española debe conservar esa tensión sin resolverla de antemano hacia una lectura solo figurada o solo literal.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador mantiene la decisión óptima de equivalencia del texto inglés, con ajustes naturales al español y sin resolver indebidamente la ambigüedad cósmica del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se conserva el paralelismo de «cielos/hueste» para reflejar la estructura hebrea.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al texto.
  - La segunda cláusula mantiene el paralelo vegetal entre la hoja de la vid y el higo de la higuera.
