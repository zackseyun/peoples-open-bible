translation:
  language: es
  text: Y ahora[a], quiten los dioses extranjeros que hay entre ustedes, y vuelvan su corazón a Yahvé[b], el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aparten los dioses extranjeros».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «inclinen su corazón a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Ahora
  - Y ahora
  lexicon: HALOT
  rationale: La partícula combinada introduce una exhortación inmediata y conectada con lo anterior. «Así que ahora» conserva el valor discursivo de transición y urgencia mejor que un simple «ahora».
- source_word: הָסִירוּ
  english_pob_choice: remove
  chosen_spanish: quiten
  alternatives_spanish:
  - remuevan
  - saquen
  - aparten
  lexicon: HALOT
  rationale: El imperativo plural exige una acción concreta de deshacerse de esos ídolos. «Quiten» es natural en español y mantiene el sentido de quitar/retirar sin elevar el tono de forma innecesaria.
- source_word: אֱלֹהֵי הַנֵּכָר
  english_pob_choice: the foreign gods
  chosen_spanish: los dioses extranjeros
  alternatives_spanish:
  - los dioses foráneos
  - los dioses ajenos
  - los dioses de los extranjeros
  lexicon: HALOT
  rationale: La expresión hebrea refiere a divinidades asociadas con pueblos extranjeros, no simplemente a dioses «raros». «Extranjeros» comunica bien la pertenencia a cultos ajenos y es la opción más transparente en español.
- source_word: אֲשֶׁר בְּקִרְבְּכֶם
  english_pob_choice: that are among you
  chosen_spanish: que hay entre ustedes
  alternatives_spanish:
  - que están en medio de ustedes
  - que están entre ustedes
  lexicon: HALOT
  rationale: «Entre ustedes» reproduce el valor colectivo de בקרבכם sin sugerir interioridad personal. Se eligió «hay» para un español más fluido y natural que una repetición pesada de «están».
- source_word: וְהַטּוּ
  english_pob_choice: turn
  chosen_spanish: vuelvan
  alternatives_spanish:
  - inclinen
  - dirijan
  - doblen
  lexicon: HALOT
  rationale: Con «corazón» y la preposición de dirección, el verbo expresa orientar la lealtad interior hacia Yahvé. «Vuelvan» conserva el movimiento volitivo sin perder claridad.
- source_word: לְבַבְכֶם
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - su mente
  - su interior
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular colectivo; en español, el singular «su corazón» preserva esa fuerza unificada y suena más natural que pluralizarlo.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrámaton como «Yahvé». La preposición «a» expresa dirección de forma natural con verbos de orientación como «volver».
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción posesiva-identificadora se mantiene de manera directa. «El Dios de Israel» es la forma más clara y fiel en español bíblico contemporáneo.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El packet de origen y el criterio del proyecto indican que el nombre divino debe aparecer de forma auditable, no enmascarado. «Yahvé» conserva la referencia al Tetragrámaton y sigue la terminología estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: El contexto inglés revisado no introdujo cambios textuales posteriores; el estado más reciente indica que no hubo modificaciones necesarias y el acuerdo con la auditoría fue alto. La redacción española sigue esa lectura estable, pero ajusta la superficie al español natural y al criterio del proyecto para el nombre divino.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה según la norma del proyecto.
  - Se traduce el plural imperativo con un verbo natural en español («quiten», «vuelvan») sin perder la fuerza de mandato.
  - «Su corazón» mantiene el singular colectivo del hebreo.
  - No se usa «SEÑOR» como máscara del nombre divino en el texto principal.
  - La nota de «inclinen su corazón» preserva la metáfora hebrea de orientación interior.
