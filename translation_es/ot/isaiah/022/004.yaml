translation:
  language: es
  text: 'Por eso dije[a]: «Apártense de mí; déjenme llorar amargamente. No se esfuercen por consolarme por la destrucción de la hija de mi pueblo».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vuélvanse de mí; lloraré amargamente». El hebreo también puede expresarse de forma más literal como «estar amarga en el llanto».'
    reason: lexical_alternative
  - marker: b
    text: «La hija de mi pueblo» es una expresión poética profética para mi pueblo, personificado como una hija.
    reason: cultural_note
lexical_decisions:
- source_word: שְׁעוּ
  english_pob_choice: Look away
  chosen_spanish: Apártense de mí
  alternatives_spanish:
  - Aléjense de mí
  - Desvíen la mirada de mí
  - Vuélvanse de mí
  lexicon: HALOT
  rationale: El imperativo plural expresa pedir a otros que se retiren de la escena o aparten la mirada. En español, «Apártense de mí» conserva la idea de distancia y resulta natural en un lamento.
- source_word: מִנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi lado
  - de mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona es directa; «de mí» reproduce con sencillez el complemento pedido por el verbo.
- source_word: אֲמָרֵר בַּבֶּכִי
  english_pob_choice: let me weep bitterly
  chosen_spanish: déjenme llorar amargamente
  alternatives_spanish:
  - permítanme llorar amargamente
  - déjenme llorar con amargura
  - dejen que llore con amargura
  lexicon: HALOT
  rationale: El verbo intensivo con el sustantivo «llanto/llorar» comunica dolor extremo. «Llorar amargamente» mantiene la imagen sin volverla demasiado literal o extraña en español.
- source_word: תָּאִיצוּ
  english_pob_choice: Do not labor to comfort me
  chosen_spanish: No se esfuercen por consolarme
  alternatives_spanish:
  - No insistan en consolarme
  - No se empeñen en consolarme
  - No se afanen por consolarme
  lexicon: HALOT
  rationale: El hifil de אוץ puede implicar apremiar o esforzarse con insistencia. La revisión inglesa pasó de «press on» a «labor», y en español «esfuercen» conserva la idea de empeño insistente sin sonar arcaico.
- source_word: לְנַחֲמֵנִי
  english_pob_choice: to comfort me
  chosen_spanish: consolarme
  alternatives_spanish:
  - consolarme
  - darme consuelo
  lexicon: HALOT
  rationale: נחם en este contexto es consolación ante el duelo. «Consolarme» es la forma más natural y precisa en español.
- source_word: שֹׁד
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - la ruina
  - la devastación
  - el saqueo
  lexicon: HALOT
  rationale: El sustantivo puede abarcar devastación violenta. «Destrucción» sigue bien el alcance amplio que la POB inglesa documenta.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - mi pueblo
  - la hija de mi nación
  - la hija de mi gente
  lexicon: HALOT
  rationale: Se preserva el giro profético personificador. En español «hija» conserva el valor poético y la tensión literaria, en lugar de convertirlo directamente en «mi pueblo».
theological_decisions:
- issue: Preservación del idiomatismo profético בַּת עַמִּי
  english_pob_reading: Retain 'the daughter of my people' in the main text
  chosen_spanish_reading: Mantener «la hija de mi pueblo» en el texto principal
  alternative_spanish_readings:
  - mi pueblo
  - Sion / Jerusalén
  rationale: La expresión hebrea es una personificación poética. Mantenerla evita perder el recurso literario y no introduce una identificación más específica que el verso mismo no explicita.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que sustituyó «press on» por «labor» para reflejar mejor el esfuerzo insistente del hebreo. También conserva la nota sobre la alternativa literal del primer miembro y mantiene el idiomatismo poético de «la hija de mi pueblo».
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» no aplica en este versículo; no se introduce terminología teológica ajena al texto.
  - Se preserva el tono de lamento con verbos de súplica e imperativo plural respetuoso («Apártense», «No se esfuercen»).
  - «Hija» se mantiene en sentido poético y no como referencia biológica literal.
