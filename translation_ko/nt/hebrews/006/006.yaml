id: HEB.6.6
reference: Hebrews 6:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ παραπεσόντας, πάλιν ἀνακαινίζειν εἰς μετάνοιαν, ἀνασταυροῦντας ἑαυτοῖς τὸν υἱὸν τοῦ θεοῦ καὶ παραδειγματίζοντας.
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/006/006.yaml
  text: and having fallen away, to renew them again to repentance, since they are crucifying again for themselves the Son of God and exposing him to public shame.
translation:
  language: ko
  text: 타락하였다면[a], 다시 회개하도록 그들을 새롭게 하는 것은 불가능합니다[b]. 그들은 자기들에게 있어 하나님의 아들을 다시 십자가에 못 박고, 공공연히 욕되게 하기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 παραπεσόντας는 「곁으로 떨어지다, 길에서 벗어나 떨어지다, 배교하다」를 가리키는 분사형. 본문은 단순한 일탈이 아니라 의도적 배반을 의미한다.
    reason: lexical_alternative
  - marker: b
    text: 「불가능합니다」(Ἀδύνατον)는 6:4 모두에 있는 술어로, 4-6절 전체에 걸린다.
    reason: interpretive_clarification
theological_decisions:
- issue: 6:4-6 배교에 대한 경고의 강도
  chosen_reading: 헬라어의 강한 어휘(Ἀδύνατον, παραπεσόντας, ἀνασταυροῦντας, παραδειγματίζοντας)를 완화시키지 않고 「불가능」, 「타락」, 「다시 십자가에 못 박고」, 「공공연히 욕되게」로 직역
  alternative_readings:
  - 부드럽게 「어려운」, 「실족한」으로 옮김
  - 조건절로 처리하여 위협을 약화
  rationale: 본문은 신앙 공동체에 대한 엄중한 경고로 의도된 강한 어휘를 사용한다. 한국 전통 번역이 「불가능」을 「어려운」 등으로 약화시키는 경향이 있으나, 저자의 신학적 의도는 이 위협의 무게를 그대로 듣게 하려는 것이다. 북극성 원칙(저자가 청중에게 전하려 한 것의 참되고 강한 의미)에 따라 강도를 보존한다.
  doctrine_reference: 'DOCTRINE.md §1 §5: original-language primacy; north-star — render the source''s strongest plain meaning'
