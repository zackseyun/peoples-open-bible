translation:
  language: es
  text: para el pan de la disposición[a], y para la ofrenda vegetal regular[b], y para el holocausto regular[b], para los sábados, las lunas nuevas, los tiempos señalados[c], y las cosas santas[d], y para las ofrendas por el pecado[e], para hacer expiación por Israel, y para toda la obra de la casa de nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el pan de la proposición» o «el pan puesto en orden».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la ofrenda vegetal continua» y «el holocausto continuo».'
    reason: lexical_alternative
  - marker: c
    text: «Tiempos señalados» también puede incluir las ocasiones festivas establecidas.
    reason: lexical_alternative
  - marker: d
    text: 'O: «las ofrendas santas» o «las cosas consagradas».'
    reason: lexical_alternative
  - marker: e
    text: «Ofrendas por el pecado» también puede entenderse en algunos contextos como «ofrendas de purificación».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם הַמַּעֲרֶכֶת
  english_pob_choice: the bread of the arrangement
  chosen_spanish: el pan de la disposición
  alternatives_spanish:
  - el pan de la ordenación
  - el pan de la mesa dispuesta
  - el pan de la presentación
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ‘pan de la disposición/colocación en orden’. ‘Disposición’ conserva la imagen del pan colocado según un arreglo ritual, sin recurrir de entrada a un término tradicional más opaco. Se evita ‘pan de la proposición’ por ser menos transparente en español actual.
- source_word: מִנְחַת הַתָּמִיד
  english_pob_choice: the regular grain offering
  chosen_spanish: la ofrenda vegetal regular
  alternatives_spanish:
  - la ofrenda de cereal regular
  - la ofrenda de grano regular
  - la ofrenda continua de cereal
  lexicon: HALOT
  rationale: מִנְחָה en contexto cultual puede referirse a una ofrenda vegetal/cereal, no a una ofrenda en sentido general. ‘Vegetal’ comunica el carácter no animal de la ofrenda y evita la ambigüedad de ‘ofrenda’ sola. ‘Regular’ reproduce תָּמִיד como repetición prescrita.
- source_word: עֹלַת הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - la ofrenda quemada regular
  - el sacrificio íntegramente quemado regular
  - el holocausto continuo
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio completamente quemado; en español bíblico, ‘holocausto’ sigue siendo el equivalente más preciso y reconocido. ‘Regular’ mantiene תָּמִיד como recurrencia establecida.
- source_word: הַשַּׁבָּת֨וֹת הֶחֳדָשִׁ֜ים לַמּוֹעֲדִ֗ים
  english_pob_choice: for the Sabbaths, the new moons, the appointed times
  chosen_spanish: para los sábados, las lunas nuevas, las ocasiones señaladas
  alternatives_spanish:
  - para los sábados, las lunas nuevas, las fiestas señaladas
  - para los sábados, las nuevas lunas, los tiempos señalados
  - para los sábados, los meses nuevos, las festividades
  lexicon: HALOT
  rationale: El hebreo enumera elementos calendáricos/cultuales. ‘Sábados’ y ‘lunas nuevas’ son directos. ‘Ocasiones señaladas’ preserva el alcance de מוֹעֲדִים sin reducirlo a ‘fiestas’; además, evita forzar una interpretación festiva donde el texto mantiene amplitud.
- source_word: וְלַקֳּדָשִׁים
  english_pob_choice: and the holy things
  chosen_spanish: y las cosas santas
  alternatives_spanish:
  - y las cosas sagradas
  - y las ofrendas santas
  - y los objetos consagrados
  lexicon: HALOT
  rationale: קֳדָשִׁים es amplio y puede abarcar cosas, bienes u ofertas consagradas. ‘Las cosas santas’ conserva esa amplitud mejor que ‘ofrendas’, que estrecharía indebidamente el sentido.
- source_word: וְלַחַטָּאוֹת
  english_pob_choice: and for the sin offerings
  chosen_spanish: y para las ofrendas por el pecado
  alternatives_spanish:
  - y para los sacrificios por el pecado
  - y para las ofrendas de expiación
  - y para las ofrendas de purificación
  lexicon: HALOT
  rationale: חַטָּאת en contexto sacrificial se traduce de manera estándar como ‘ofrenda por el pecado’. Esta forma mantiene la categoría cultual sin decidir aquí entre matiz de pecado o purificación, aunque la nota puede reconocer esa alternativa.
- source_word: לְכַפֵּר עַל יִשְׂרָאֵל
  english_pob_choice: to make atonement for Israel
  chosen_spanish: para hacer expiación por Israel
  alternatives_spanish:
  - para hacer atonement por Israel
  - para expiar por Israel
  - para hacer propiciación por Israel
  lexicon: HALOT
  rationale: כפר en lenguaje sacrificial se expresa bien como ‘hacer expiación’, que conserva el acto cultual y el resultado de cubrir/expiar. ‘Expiación’ es claro en español y evita importar una explicación doctrinal ajena al contexto inmediato.
- source_word: וְכֹל מְלֶאכֶת בֵּית אֱלֹהֵינוּ
  english_pob_choice: and for all the work of the house of our God
  chosen_spanish: y para toda la obra de la casa de nuestro Dios
  alternatives_spanish:
  - y para todo el trabajo de la casa de nuestro Dios
  - y para todo el servicio de la casa de nuestro Dios
  - y para toda la labor de la casa de nuestro Dios
  lexicon: HALOT
  rationale: מְלָאכָה es ‘obra/trabajo/labor’ en sentido amplio. ‘Obra’ funciona bien en español bíblico y no restringe el verso a servicio litúrgico solamente; así conserva el alcance administrativo y material del templo.
theological_decisions:
- issue: Categorías sacrificiales y cultuales en una lista de provisiones del templo
  english_pob_reading: Retain established cultic terms such as 'grain offering,' 'burnt offering,' 'sin offerings,' and 'make atonement.'
  chosen_spanish_reading: 'Mantener términos cultuales reconocibles: ‘ofrenda vegetal’, ‘holocausto’, ‘ofrendas por el pecado’ y ‘hacer expiación’.'
  alternative_spanish_readings:
  - usar equivalentes más interpretativos como ‘ofrenda de cereal’ o ‘ofrenda de purificación’
  - reemplazar ‘holocausto’ por ‘ofrenda totalmente quemada’
  rationale: El versículo enumera provisiones y obligaciones del templo. Conviene conservar categorías sacrificiales estables sin sobreexplicar ni modernizar en exceso, pero tampoco borrar su precisión cultual.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de קֳּדָשִׁים
  english_pob_reading: Translate broadly as 'the holy things.'
  chosen_spanish_reading: Traducir ampliamente como ‘las cosas santas’.
  alternative_spanish_readings:
  - ‘las ofrendas santas’
  - ‘las cosas consagradas’
  rationale: El hebreo es suficientemente amplio como para no reducirse solo a ofrendas. ‘Las cosas santas’ conserva esa apertura semántica y evita resolver una ambigüedad que el texto deja en pie.
  doctrine_reference: Translation philosophy §3
- issue: Matiz de חַטָּאת en contexto sacrificial
  english_pob_reading: '''Sin offerings'' may also be understood in some contexts as ''purification offerings.'''
  chosen_spanish_reading: ‘ofrendas por el pecado’, con reconocimiento de que el contexto puede también permitir ‘ofrendas de purificación’.
  alternative_spanish_readings:
  - ‘ofrendas de purificación’
  - ‘sacrificios por el pecado’
  rationale: En español, ‘ofrendas por el pecado’ es la designación cultual más directa y entendible. Sin embargo, se mantiene abierta la tensión lexical reconocida por la tradición académica, sin imponer ‘purificación’ como si fuera inequívoco.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: 'La redacción revisa la secuencia cultual para que los elementos queden enumerados como en el hebreo: el pan de la disposición, la ofrenda vegetal regular, el holocausto regular, luego los sábados, las lunas nuevas y las ocasiones señaladas. También conserva la amplitud de ‘cosas santas’ y no reduce מוֹעֲדִים a ‘fiestas’ exclusivamente.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por defecto solo cuando el hebreo lo requiera explícitamente; este versículo no lo contiene.
  - ‘Holocausto’ se mantiene como término cultual fijo por su correspondencia estable con עֹלָה.
  - Se prefiere ‘expiación’ sobre ‘atonement’ transliterado y sobre ‘propiciación’, porque el contexto sacrificial pide un término español establecido y menos doctrinalmente estrecho.
  - Se evita ‘siervo’ o ‘servicio’ para מְלָאכָה, porque aquí la referencia es a toda la obra/trabajo del templo, no solo al ministerio litúrgico.
