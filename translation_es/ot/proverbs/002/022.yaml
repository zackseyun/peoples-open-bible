base_translation:
  language: en
  yaml_path: translation/ot/proverbs/002/022.yaml
  text: But the wicked will be cut off from the land[b][a], and the treacherous will be uprooted from it.
  footnotes:
  - marker: a
    text: Or 'from the earth.' The Hebrew אֶרֶץ can mean 'land' or 'earth'; here 'land' fits the contrast with the upright remaining in it in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be uprooted from it.' The Hebrew verb conveys forcible removal.
    reason: lexical_alternative
