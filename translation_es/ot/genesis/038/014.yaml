translation:
  language: es
  text: Así que se quitó sus vestidos de viudez, se cubrió con un velo, se envolvió y se sentó a la entrada de Enaim[a], que está en el camino de Timnat. Porque vio que Selá había crecido, pero no le había sido dada por esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Enaim» puede reflejar un nombre de lugar; la forma hebrea también puede entenderse más literalmente como «ojos» o posiblemente «manantiales».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּסַר
  english_pob_choice: took off
  chosen_spanish: se quitó
  alternatives_spanish:
  - se apartó
  - se retiró
  lexicon: HALOT
  rationale: El verbo en este contexto expresa quitarse una prenda; en español, «se quitó» comunica con naturalidad la acción de remover la ropa sin perder el valor separativo del hebreo.
- source_word: בִּגְדֵי אַלְמְנוּתָהּ
  english_pob_choice: her widow’s garments
  chosen_spanish: sus vestidos de viudez
  alternatives_spanish:
  - los vestidos de su viudez
  - su ropa de viudez
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «vestidos de su viudez». «Vestidos de viudez» conserva el sentido social y señalador del luto, y suena natural en español bíblico contemporáneo.
- source_word: וַתְּכַס בַּצָּעִיף
  english_pob_choice: covered herself with a veil
  chosen_spanish: se cubrió con un velo
  alternatives_spanish:
  - se tapó con un velo
  - se cubrió con un velo
  lexicon: HALOT
  rationale: El hebreo expresa cobertura con un velo; «se cubrió con un velo» mantiene la acción explícita y evita reducirla a una simple colocación del velo.
- source_word: וַתִּתְעַלָּף
  english_pob_choice: wrapped herself up
  chosen_spanish: se envolvió
  alternatives_spanish:
  - se cubrió
  - se arropó
  lexicon: HALOT
  rationale: Aquí el verbo puede expresar envolverse o cubrirse por completo. «Se envolvió» conserva la idea física sin añadir de manera demasiado interpretativa la noción de disfraz.
- source_word: בְּפֶתַח עֵינַיִם
  english_pob_choice: at the entrance of Enaim
  chosen_spanish: a la entrada de Enaim
  alternatives_spanish:
  - en la entrada de Enaim
  - junto a la entrada de Enaim
  lexicon: HALOT
  rationale: Se conserva «Enaim» como nombre propio, siguiendo la decisión auditada de no forzar una traducción etimológica en el texto principal. «A la entrada de» es la forma natural en español para פתח.
- source_word: עֵינַיִם
  english_pob_choice: Enaim may reflect a place-name; the Hebrew form can also be understood more literally as 'eyes' or possibly 'springs.'
  chosen_spanish: Enaim
  alternatives_spanish:
  - Ojales
  - Manantiales
  lexicon: HALOT
  rationale: El contexto favorece el topónimo. Se deja la transliteración en el texto principal para evitar una lectura especulativa de «ojos» o «manantiales» que no está asegurada por el flujo narrativo.
- source_word: אֲשֶׁר עַל דֶּרֶךְ תִּמְנָתָה
  english_pob_choice: which is on the road to Timnah
  chosen_spanish: que está en el camino de Timnat
  alternatives_spanish:
  - que está junto al camino de Timnat
  - que queda sobre el camino de Timnat
  lexicon: HALOT
  rationale: La cláusula relativa localiza el lugar. «Que está en el camino de Timnat» reproduce con claridad el valor locativo y el nombre propio en forma española habitual.
- source_word: כִּי רָאֲתָה
  english_pob_choice: For she saw
  chosen_spanish: Porque vio
  alternatives_spanish:
  - Pues vio
  - Ya que vio
  lexicon: HALOT
  rationale: El כִּי introduce la razón de su acción. «Porque» es la equivalencia más transparente en español para expresar causa o motivo narrativo.
- source_word: כִּי גָדַל שֵׁלָה
  english_pob_choice: that Shelah had grown up
  chosen_spanish: que Selá había crecido
  alternatives_spanish:
  - que Selá ya era mayor
  - que Selá había madurado
  lexicon: HALOT
  rationale: גָדַל indica que alcanzó madurez o crecimiento suficiente para el contexto matrimonial. «Había crecido» es fiel y no añade una precisión de edad que el texto no da.
- source_word: וְהִוא לֹא נִתְּנָה לוֹ לְאִשָּׁה
  english_pob_choice: yet she had not been given to him as a wife
  chosen_spanish: pero no le había sido dada por esposa
  alternatives_spanish:
  - pero no le habían dado por esposa
  - y no le había sido dada como esposa
  lexicon: HALOT
  rationale: El pasivo hebreo נתן + ל + אשה expresa ser dada en matrimonio. «Le había sido dada por esposa» conserva el valor matrimonial del pasivo y suena más natural en español que una fórmula demasiado literal.
theological_decisions:
- issue: Topónimo עֵינַיִם / Enaim y su posible sentido literal
  english_pob_reading: Enaim may reflect a place-name; the Hebrew form can also be understood more literally as 'eyes' or possibly 'springs.'
  chosen_spanish_reading: Se mantiene «Enaim» como nombre propio en el texto principal, sin traducirlo como «ojos» o «manantiales».
  alternative_spanish_readings:
  - la entrada de Ojos
  - la entrada de Manantiales
  rationale: La cláusula siguiente identifica el lugar por su relación con Timnat, lo que apoya el valor de topónimo. Traducirlo literalmente introduciría una ambigüedad que el contexto inmediato no exige.
  doctrine_reference: Principio de precisión textual y cautela ante etimologías no seguras.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que eliminó el redundante equivalente de «from herself», mantuvo dos verbos consecutivos para la acción de velarse y optó por «entrance of Enaim». En español se conserva esa doble acción con «se cubrió con un velo, se envolvió», y se formula la localización como «a la entrada de Enaim».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantiene «Selá» como forma española del nombre propio, coherente con el texto fuente y con la tradición transliterada en POB.
  - Se evita «Cristo» o terminología eclesiástica ajena al pasaje.
  - Se conserva el tono narrativo sobrio y la secuencia verbal del hebreo sin añadir interpretación psicológica.
