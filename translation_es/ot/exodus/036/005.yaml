translation:
  language: es
  text: 'Y le dijeron a Moisés[a]: «El pueblo está trayendo mucho más de lo suficiente para la obra de la tarea que Yahvé mandó hacer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El pueblo está trayendo demasiado para la obra». El hebreo subraya que las contribuciones exceden lo que se necesita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֶל־מֹשֶׁה לֵּאמֹר
  english_pob_choice: And they said to Moses
  chosen_spanish: Y ellos dijeron a Moisés
  alternatives_spanish:
  - Y le dijeron a Moisés
  - Y dijeron a Moisés, diciendo
  lexicon: WLC / HALOT
  rationale: Conservo la introducción narrativa y el destinatario directo. En español, «dijeron a Moisés» comunica el hebreo sin forzar el gerundio redundante «diciendo», que aquí no añade contenido.
- source_word: מַרְבִּים הָעָם לְהָבִיא
  english_pob_choice: are bringing much more than enough
  chosen_spanish: está trayendo mucho más de lo suficiente
  alternatives_spanish:
  - está trayendo demasiado
  - está aportando mucho más de lo necesario
  lexicon: HALOT
  rationale: El participio hifil y el infinitivo expresan una acción en curso y excedente. «Está trayendo» mantiene el aspecto progresivo; «mucho más de lo suficiente» conserva la idea de exceso cuantitativo sin borrar la tensión lexical documentada.
- source_word: מִדֵּי
  english_pob_choice: much more than enough
  chosen_spanish: de lo suficiente
  alternatives_spanish:
  - de lo necesario
  - más que suficiente
  lexicon: HALOT
  rationale: La expresión hebrea marca suficiencia y, por contexto, exceso. En español la construcción natural es «mucho más de lo suficiente», que preserva la comparación y evita suavizar el matiz de sobra.
- source_word: הָעֲבֹדָה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - el servicio
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, «obra» comunica mejor el conjunto de la labor material y artesanal. «Trabajo» es posible, pero «obra» suena más natural en una sección de construcción sagrada sin perder la idea de actividad.
- source_word: לַמְּלָאכָה
  english_pob_choice: of the task
  chosen_spanish: del trabajo
  alternatives_spanish:
  - de la tarea
  - de la labor
  - de la construcción
  lexicon: HALOT
  rationale: 'מְלָאכָה apunta a tarea o labor concreta. Lo uno con «obra» en una coordinación semántica natural en español: «la obra del trabajo». Aunque no es una calca, mantiene la doble noción hebrea de labor y tarea asignada.'
- source_word: אֲשֶׁר צִוָּה יְהוָה
  english_pob_choice: that Yahweh commanded
  chosen_spanish: que Yahvé mandó
  alternatives_spanish:
  - que Yahvé ordenó
  - que Yahvé había mandado
  lexicon: WLC / DOCTRINE.md contested terms
  rationale: 'Sigo la terminología del proyecto para יְהוָה: «Yahvé». «Mandó» expresa bien צִוָּה y funciona con naturalidad en español bíblico contemporáneo.'
- source_word: לַעֲשֹׂת אֹתָהּ
  english_pob_choice: to be done
  chosen_spanish: hacer
  alternatives_spanish:
  - ser hecha
  - realizar
  lexicon: HALOT
  rationale: El hebreo enfoca la realización de la obra mandada. En español, el infinitivo «hacer» es la forma más concisa y fiel; el pasivo «ser hecha» suena más pesado y menos natural en este contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El sistema del proyecto pide «Yahvé» para el Tetragrámaton. Mantiene la identidad del nombre del pacto y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Exceso de las ofrendas frente a la necesidad del tabernáculo
  english_pob_reading: The people are bringing much more than enough
  chosen_spanish_reading: El pueblo está trayendo mucho más de lo suficiente
  alternative_spanish_readings:
  - El pueblo está trayendo demasiado
  - El pueblo trae más de lo necesario
  rationale: Conservo el valor de exceso sin convertirlo en simple reproche. La frase refleja que la aportación supera la necesidad, que es justamente la observación del texto.
  doctrine_reference: Ex 36:5; auditable lexical tension between sufficiency and excess
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene la introducción narrativa, conserva el matiz de exceso de מַרְבִּים + מִדֵּי, y adopta la convención del proyecto para יְהוָה como «Yahvé». No se detectan revisiones posteriores que obliguen a cambiar la solución inglesa de referencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Obra» y «trabajo» se combinan para reflejar la pareja semántica עֲבֹדָה / מְלָאכָה sin perder naturalidad en español.
  - Se conserva un tono bíblico moderno, evitando arcaísmos innecesarios como «diciendo» o «SEÑOR».
