  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia principal del hebreo: repetición de כִּי, doble verbo de gozo, imagen de la ternera que trilla y del relincho, y la personificación femenina de Babilonia. Sin embargo, altera de forma significativa שֹׁסֵי («despojadores/plunderers», plural) al convertirlo en singular femenino «despojadora», cuando el texto fuente conserva una tensión intencional entre los verbos femeninos singulares y el participio plural. También falta en español la nota léxica correspondiente a «mi heredad/herencia» que el rastro inglés conserva para נַחֲלָתִי.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «¡despojadora de mi heredad!» suena algo forzado e introduce una exclamación no marcada por el hebreo. «Exultas» es aceptable aunque algo menos idiomático; el resto fluye bien. Conviene mantener el plural «despojadores» y evitar la exclamación para mayor fidelidad y naturalidad. También es preferible integrar la nota en «mi heredad[a]» y reservar otra para «sementales[b]».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Heredad» es defendible para נַחֲלָתִי, aunque debe preservarse la alternativa «herencia/patrimonio» en nota por coherencia con el audit trail. La personificación femenina puede mantenerse con «te alegras / exultas / brincas / relinchas» sin forzar el participio al singular.
  issues:
  - severity: high
    issue: Cambio de número en שֹׁסֵי
    rationale: El hebreo tiene un participio plural («despojadores»), mientras el borrador usa «despojadora» singular femenina. La nota explica la tensión, pero el texto principal no debe sustituir un rasgo léxico explícito del original si puede conservarse en español.
  - severity: medium
    issue: Falta la nota léxica sobre נַחֲלָתִי
    rationale: El audit trail inglés conserva una alternativa significativa («my inheritance / my heritage»). En español debe reflejarse como «mi heredad» con alternativa «mi herencia» o similar.
  - severity: low
    issue: Exclamación añadida en el vocativo
    rationale: Los signos de exclamación alrededor de «despojadora de mi heredad» no vienen del hebreo y cargan el tono más de lo necesario.
  revised_spanish_text: Porque te alegras, porque exultas, despojadores de mi heredad[a], porque brincas como ternera que trilla y relinchas como sementales[b],
  revised_footnotes:
  - marker: a
    text: «Mi heredad» también puede traducirse «mi herencia», refiriéndose al pueblo y/o a la tierra que pertenecen a Yahvé.
    reason: lexical_alternative
  - marker: b
    text: «Sementales» explicita el matiz equino de אַבִּירִים; también puede entenderse como «caballos fuertes» o «corceles».
    reason: lexical_alternative
  revision_rationale: La revisión restaura el participio plural explícito del hebreo («despojadores») y elimina la exclamación añadida, mientras conserva la segunda persona singular femenina implícita en los verbos, reflejando así la personificación de Babilonia sin perder el número del participio. También añade la nota léxica exigida para נַחֲלָתִי y mantiene la nota sobre «sementales».
