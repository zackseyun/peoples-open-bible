revisions:
- from: Y ahora[a], Yahvé, que la palabra que has hablado acerca de tu siervo y acerca de su casa[b] sea estable para siempre, y haz conforme a lo que has hablado.
  to: Y ahora, Yahvé, que la palabra que has hablado acerca de tu siervo y acerca de su casa[a] sea confirmada para siempre, y haz conforme a lo que has hablado.
  rationale: Se ajusta יֵאָמֵן a «sea confirmada», que representa mejor la idea de promesa ratificada/establecida en español natural. Se elimina la nota sobre «Y ahora» por no ser necesaria para la claridad ni por crear una ambigüedad relevante en español. Se conserva «Yahvé», «su casa» y la nota dinástica, en línea con la evidencia fuente y la política terminológica.
