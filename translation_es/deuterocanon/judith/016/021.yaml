    issue: «en sus bienes» suena poco natural y semánticamente impreciso para ἐπὶ τῆς ὑπάρξεως αὐτῆς
    rationale: La frase griega indica que Judit permaneció en su propia posesión/propiedad. En español, «permaneció en sus bienes» no describe bien un lugar de residencia; «en su propiedad» comunica mejor el referente locativo y coincide con la rationale del POB inglés.
  - severity: low
