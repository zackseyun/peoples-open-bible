translation:
  language: es
  text: Y acamparon junto al Jordán, desde Bet-yesimot hasta Abel-sitim, en las llanuras[a] de Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las estepas de Moab». El término hebreo señala la región llana o esteparia de Moab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲנוּ
  english_pob_choice: And they camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon
  - se acamparon
  lexicon: HALOT
  rationale: El verbo narra la siguiente etapa del viaje de Israel. «Acamparon» comunica de manera natural en español la acción de establecer el campamento, sin añadir matices no presentes en el hebreo. Se evita una forma más pesada como «se acamparon».
- source_word: עַל הַיַּרְדֵּן
  english_pob_choice: by the Jordan
  chosen_spanish: junto al Jordán
  alternatives_spanish:
  - al lado del Jordán
  - por el Jordán
  lexicon: HALOT
  rationale: Con un río, עַל puede señalar posición junto a él, no literalmente «sobre». «Junto al Jordán» conserva el sentido locativo y suena natural en español.
- source_word: מִבֵּית הַיְשִׁמֹת
  english_pob_choice: from Beth-jeshimoth
  chosen_spanish: desde Bet-jesimot
  alternatives_spanish:
  - desde Bet-yesimot
  - desde Beth-jeshimot
  lexicon: HALOT
  rationale: Se translitera el topónimo de forma consistente y readable en español. «Desde» expresa el límite inicial del tramo geográfico.
- source_word: עַד אָבֵל הַשִּׁטִּים
  english_pob_choice: as far as Abel-shittim
  chosen_spanish: hasta Abel-sitim
  alternatives_spanish:
  - hasta Abel-shittim
  - hasta Abel de Sitim
  lexicon: HALOT
  rationale: «Hasta» expresa el extremo del recorrido. «Sitim» reproduce en español la raíz toponímica habitual para שִׁטִּים, evitando una calca innecesaria y manteniendo el nombre propio reconocible.
- source_word: בְּעַרְבֹת מוֹאָב
  english_pob_choice: in the plains of Moab
  chosen_spanish: en las llanuras de Moab
  alternatives_spanish:
  - en las estepas de Moab
  - en los llanos de Moab
  lexicon: HALOT
  rationale: עֲרָבוֹת designa la región llana/esteparia de Moab. «Llanuras» es una equivalencia clara y digna en español; conserva la referencia geográfica sin oscurecerla.
translation_notes:
  revision_awareness: El inglés POB optó por «by the Jordan» y añadió una nota alternativa para בְּעַרְבֹת מוֹאָב («the steppes of Moab»). La presente versión mantiene ese alcance geográfico con español natural, conservando la distinción entre el río, los topónimos y la región final.
  spanish_consistency_notes:
  - Se mantiene el uso de «Jordán» para el río y la transliteración de los topónimos hebreos sin domesticarlos.
  - «Llanuras» funciona como equivalente principal de עֲרָבוֹת; la nota conserva la alternativa más técnica «estepas».
  - No se introduce «SEÑOR» ni vocabulario teológico ajeno al versículo.
