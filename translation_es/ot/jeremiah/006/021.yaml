    text: 'Hebreo: “los padres y los hijos juntos; vecino y su amigo”. La frase subraya que el juicio alcanzará a todos los niveles de la vida familiar y social.'
    reason: cultural_note
  revision_rationale: 'Se realizaron ajustes menores para mejorar la precisión semántica y la naturalidad del español sin apartarse del original ni del POB inglés: ''con ellos'' expresa mejor el tropiezo causado por obstáculos, y ''los padres y los hijos'' reduce ambigüedad respecto de los términos masculinos específicos del hebreo.'
