translation:
  language: es
  text: 'O si yo traigo una espada[a] contra aquella tierra y digo: «Que pase una espada por la tierra», y corto de ella al hombre y al animal[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «espada», un término profético para guerra o juicio devastador.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hombre y animal», fórmula fija que abarca la vida humana y la animal en la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֛וֹ
  english_pob_choice: Or if
  chosen_spanish: O si
  alternatives_spanish:
  - O
  lexicon: HALOT
  rationale: El hebreo introduce otra posibilidad condicional dentro de la serie de juicios; «O si» comunica con naturalidad ese valor alternativo en español.
- source_word: חֶ֥רֶב
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - la espada
  lexicon: HALOT
  rationale: El sustantivo es anartro en hebreo y funciona como metáfora profética de guerra o juicio; «una espada» conserva ese carácter indefinido y natural en español.
- source_word: אָבִ֖יא
  english_pob_choice: I bring
  chosen_spanish: yo traigo
  alternatives_spanish:
  - hago venir
  - yo traigo sobre
  lexicon: HALOT
  rationale: El hifil de בוא expresa traer/hacer venir. «Traigo» mantiene la agencia divina y suena más natural que una perífrasis más literal.
- source_word: עַל הָ/אָ֣רֶץ הַ/הִ֑יא
  english_pob_choice: against that land
  chosen_spanish: sobre aquella tierra
  alternatives_spanish:
  - contra aquella tierra
  - sobre esa tierra
  lexicon: HALOT
  rationale: El valor de עַל en contexto de juicio puede ser hostil o adversativo, pero el español «sobre» conserva la imagen de amenaza que cae sobre la tierra sin cargar innecesariamente la frase con una preposición más interpretativa.
- source_word: וְ/אָמַרְתִּ֗י
  english_pob_choice: and say
  chosen_spanish: y digo
  alternatives_spanish:
  - y diré
  - y declaro
  lexicon: HALOT
  rationale: En la secuencia profética, el imperfecto narrativo/directivo queda bien representado por presente en español; «digo» conserva la inmediatez del decreto divino.
- source_word: חֶ֚רֶב תַּעֲבֹ֣ר בָּ/אָ֔רֶץ
  english_pob_choice: Let a sword pass through the land
  chosen_spanish: Que pase una espada por la tierra
  alternatives_spanish:
  - Pase una espada por la tierra
  - Que una espada pase por la tierra
  lexicon: HALOT
  rationale: La cláusula expresa un mandato/decreto divino; el subjuntivo exhortativo «Que pase» refleja mejor esa fuerza que una simple afirmación. «Por la tierra» preserva el movimiento de atravesar el ámbito entero.
- source_word: וְ/הִכְרַתִּ֥י
  english_pob_choice: and I cut off
  chosen_spanish: y de ella corto
  alternatives_spanish:
  - y la corto
  - y extirpo de ella
  - y elimino de ella
  lexicon: HALOT
  rationale: כרת en fórmulas de juicio significa cortar fuera/arrancar. «Corto» mantiene la metáfora verbal; el complemento «de ella» hace explícito el referente femenino de la tierra.
- source_word: מִמֶּ֖/נָּה
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de allí
  - de esa tierra
  lexicon: HALOT
  rationale: El pronombre retoma a «la tierra», que en español es femenino; «de ella» es la forma más natural y fiel para esa referencia.
- source_word: אָדָ֥ם
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - a la gente
  lexicon: HALOT
  rationale: En la fórmula fija «hombre y bestia», «hombre» preserva el paralelo léxico y la fuerza genérica del hebreo sin diluirlo en un término más abstracto.
- source_word: וּ/בְהֵמָֽה
  english_pob_choice: and beast
  chosen_spanish: al animal
  alternatives_spanish:
  - a la bestia
  - al ganado
  lexicon: HALOT
  rationale: El hebreo abarca vida animal en general dentro de la fórmula de juicio. En español, «animal» comunica ese alcance más claramente que «bestia» o «ganado»; se mantiene la pareja humana/animal del hebreo.
theological_decisions:
- issue: Expresión de la fórmula de juicio «hombre y bestia»
  english_pob_reading: Hebrew 'man and beast,' a stock expression for the removal of both human and animal life from the land.
  chosen_spanish_reading: «al hombre y al animal»
  alternative_spanish_readings:
  - «al hombre y a la bestia»
  - «a las personas y a los animales»
  rationale: La fórmula hebrea es una expresión fija de desolación judicial que abarca vida humana y animal. En español, «hombre y animal» mantiene el paralelismo semántico sin forzar un término más cargado como «bestia», que puede sonar menos natural para lectores modernos.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral; lexical force in stock expressions'
- issue: Valor del mandato divino en la cláusula «que pase una espada por la tierra»
  english_pob_reading: Let a sword pass through the land
  chosen_spanish_reading: «Que pase una espada por la tierra»
  alternative_spanish_readings:
  - «Pase una espada por la tierra»
  - «Que la espada pase por la tierra»
  rationale: El hebreo transmite una orden/decreto divino más que una mera predicción. El subjuntivo exhortativo español conserva esa fuerza directiva sin añadir elementos interpretativos.
  doctrine_reference: Syntax and discourse force in prophetic direct speech
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que corrigió «the sword» por «a sword» en la cita directa para reflejar el hebreo sin artículo. La redacción española adopta «una espada» para conservar esa indefinición.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito en la voz divina del contexto, sin necesidad de introducirlo en este versículo.
  - Se eligió «espada» para חֶרֶב por coherencia con el valor metonímico de juicio, y no «guerra», para no perder la imagen concreta del texto.
  - Se conserva el paralelismo humano/animal del hebreo mediante «hombre» y «animal», evitando una paráfrasis más abstracta.
