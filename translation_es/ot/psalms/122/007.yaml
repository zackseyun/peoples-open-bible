    reason: lexical_alternative
  - marker: c
    text: O «dentro de tus palacios». El hebreo puede referirse a palacios o a fortalezas elevadas.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el texto para alinearlo mejor con el expediente léxico auditado del POB: ''baluartes'' refleja mejor חֵיל en su sentido de fortificación defensiva, y ''ciudadelas'' preserva el matiz preferido para אַרְמְנוֹת en este contexto. También se eliminan exclamaciones innecesarias y se corrigen las notas a un español natural y correcto. Se conserva ''prosperidad'' para שַׁלְוָה, con nota que mantiene las alternativas ''seguridad'' y ''tranquilidad''.'
