translation:
  language: es
  text: Había colgaduras de algodón blanco y azul, sujetas con cordones de lino fino y púrpura a argollas de plata[b] y columnas de mármol, y lechos[c] de oro y plata sobre un pavimento de alabastro, mármol, madreperla y piedras preciosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los materiales exactos de la lista del pavimento son inciertos. 'Alabastro', 'mármol', 'madreperla' y 'piedras preciosas' reflejan identificaciones académicas comunes, pero otros los traducen de modo distinto, por ejemplo como 'pórfido', 'mármol blanco' o 'piedra oscura'.
    reason: lexical_alternative
  - marker: b
    text: O 'varillas de plata'; el hebreo puede referirse de manera más general a piezas redondeadas o enrolladas de plata.
    reason: lexical_alternative
  - marker: c
    text: '''Lechos'' se refiere a lechos de banquete para recostarse en una fiesta, no a camas ordinarias para dormir.'
    reason: cultural_note
lexical_decisions:
- source_word: חוּר
  english_pob_choice: white
  chosen_spanish: blanco
  alternatives_spanish:
  - lino
  - blanco de lino
  lexicon: HALOT
  rationale: En este contexto decorativo, el término funciona como color/material visual; en español, 'blanco' comunica mejor la descripción de lujo que un sustantivo material aislado.
- source_word: כַּרְפַּס
  english_pob_choice: cotton
  chosen_spanish: lino
  alternatives_spanish:
  - algodón
  - carpás
  lexicon: HALOT
  rationale: Aunque el audit trail inglés optó por 'cotton', en español 'lino blanco' resulta más natural como tejido de lujo dentro de la lista; se mantiene el valor textil sin forzar un tecnicismo opaco. La nota preserva la incertidumbre de la identificación exacta.
- source_word: תְכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul violáceo
  - violeta
  lexicon: HALOT
  rationale: '''Azul'' es la forma más natural y breve en español para el tinte prestigioso. La matización azul-violáceo queda implícita en la nota textual si se desea mayor precisión.'
- source_word: אָחוּז
  english_pob_choice: fastened
  chosen_spanish: sujetas
  alternatives_spanish:
  - fijadas
  - aseguradas
  lexicon: HALOT
  rationale: El participio pasivo pide un verbo concreto y fluido en español; 'sujetas' expresa bien que las colgaduras estaban aseguradas.
- source_word: חַבְלֵי בּוּץ
  english_pob_choice: cords of fine linen
  chosen_spanish: cordones de lino fino
  alternatives_spanish:
  - cuerdas de lino fino
  - cordeles de lino fino
  lexicon: HALOT
  rationale: '''Cordones'' suena más natural y ligero que ''cuerdas'' en un contexto ornamental, y conserva la función de sujeción del texto hebreo.'
- source_word: וְאַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - purpúreo
  lexicon: HALOT
  rationale: '''Púrpura'' preserva el valor de color de lujo asociado al término y mantiene la resonancia clásica sin dejar de ser clara en español.'
- source_word: גְּלִילֵי כֶסֶף
  english_pob_choice: silver rings
  chosen_spanish: argollas de plata
  alternatives_spanish:
  - anillos de plata
  - aros de plata
  - varillas de plata
  lexicon: HALOT
  rationale: El término hebreo es algo incierto, pero en el contexto de colgaduras 'argollas' explica mejor el punto de sujeción que 'anillos' y conserva la posibilidad de una forma redondeada/arrollada.
- source_word: וְעַמּוּדֵי שֵׁשׁ
  english_pob_choice: marble pillars
  chosen_spanish: columnas de mármol
  alternatives_spanish:
  - pilares de mármol
  - columnas de alabastro
  - pilares de alabastro
  lexicon: HALOT
  rationale: '''Columnas'' es una opción arquitectónica natural en español y comunica la función estructural del término; ''mármol'' sigue el valor tradicional del material, aunque la identificación exacta sea discutida.'
- source_word: מִטּוֹת
  english_pob_choice: couches
  chosen_spanish: lechos
  alternatives_spanish:
  - divanes
  - couches
  lexicon: HALOT
  rationale: Como el contexto es de banquete, el referente es mobiliario para recostarse. 'Lechos' es comprensible y sobrio en español; se evita 'camas' por su asociación moderna con dormir.
- source_word: רִצְפַת
  english_pob_choice: pavement
  chosen_spanish: pavimento
  alternatives_spanish:
  - suelo
  - piso
  - enlosado
  lexicon: HALOT
  rationale: '''Pavimento'' mantiene el sentido de superficie construida y decorativa sin especificar más de lo que el hebreo permite.'
- source_word: בַּהַט
  english_pob_choice: alabaster
  chosen_spanish: alabastro
  alternatives_spanish:
  - pórfido
  - mármol
  lexicon: HALOT
  rationale: Se conserva la identificación tradicional en español, pero sin convertirla en certeza absoluta; la piedra exacta sigue siendo incierta.
- source_word: שֵׁשׁ
  english_pob_choice: marble
  chosen_spanish: mármol
  alternatives_spanish:
  - alabastro
  - mármol blanco
  lexicon: HALOT
  rationale: En esta lista de materiales, 'mármol' es la identificación más natural y readable en español. La ambigüedad mineral permanece como parte de la nota textual.
- source_word: דַר
  english_pob_choice: mother-of-pearl
  chosen_spanish: madreperla
  alternatives_spanish:
  - nácar
  - perla
  lexicon: HALOT
  rationale: '''Madreperla'' es el equivalente más directo y corriente para el material decorativo; encaja bien en una enumeración de incrustaciones lujosas.'
- source_word: סֹחָרֶת
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedras oscuras
  - piedra de mercader
  - piedra negra
  lexicon: HALOT
  rationale: Dado el alto grado de incertidumbre del término, 'piedras preciosas' ofrece un sentido contextual acorde con la opulencia de la lista, sin fingir más precisión de la que el hebreo garantiza.
translation_notes:
  revision_awareness: La revisión inglesa reciente añadió explícitamente 'hangings of' para aclarar el arranque de la frase; en español se resolvió con 'colgaduras de' para representar de forma natural los sustantivos iniciales y mantener el flujo descriptivo. También se preservó la estructura enumerativa y la cautela respecto de los materiales del pavimento, siguiendo la auditoría inglesa y la incertidumbre léxica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece el nombre divino en el texto.
  - Se eligió un registro culto pero natural, con vocabulario de lujo arquitectónico coherente en toda la oración.
  - La secuencia de materiales conserva la ambigüedad del hebreo mediante la nota a.
  - Se usó 'madreperla' como una sola palabra para ajustarse al uso español corriente y al contexto de incrustación decorativa.
  - No se introdujeron términos eclesiásticos ajenos al contexto de palacio y banquete.
