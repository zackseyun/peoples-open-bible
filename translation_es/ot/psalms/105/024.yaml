    text: 'O: «multiplicó mucho a su pueblo». El verbo hebreo puede enfatizar hacer fecundo o hacer crecer en número.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «lo hizo más fuerte que sus adversarios», con un singular que se refiere al colectivo «su pueblo».'
    reason: lexical_alternative
  revision_rationale: La revisión mantiene el mismo sentido y las mismas decisiones exegéticas del expediente inglés, pero mejora la naturalidad del español y alinea correctamente los marcadores de nota con los elementos hebreos pertinentes. «Hizo que su pueblo fuera muy fecundo» preserva la imagen de פרה mejor que «hizo fructífero a su pueblo», y la nota del singular colectivo se ubica donde realmente corresponde, en la segunda cláusula.
