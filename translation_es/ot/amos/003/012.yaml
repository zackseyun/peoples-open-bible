translation:
  language: es
  text: 'Así dice Yahvé: Como el pastor rescata de la boca del león dos patas o un pedazo de oreja, así serán rescatados los hijos de Israel[a] que habitan en Samaria, con la esquina de una cama y el diván de Damasco[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los israelitas». El hebreo dice literalmente «los hijos de Israel».'
    reason: lexical_alternative
  - marker: b
    text: La frase final en hebreo es difícil. Literalmente dice «con la esquina de una cama y el diván de Damasco». Puede aludir a muebles de lujo, o posiblemente a «un diván damasceno» o a «un diván en Damasco».
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, siguiendo la práctica del POB inglés de transliterar el Tetragrámaton en vez de sustituirlo por un título. En español, 'Yahvé' es la forma directa y ampliamente reconocible para mantener la transparencia textual.
- source_word: כַּאֲשֶׁר ... כֵּן
  english_pob_choice: As ... so
  chosen_spanish: Como ... así
  alternatives_spanish:
  - Así como ... así
  - Tal como ... así
  lexicon: HALOT
  rationale: La comparación explícita del hebreo se mantiene con una correlación directa y natural en español, sin suavizar la fuerza proverbial del paralelismo.
- source_word: יַצִּיל / יִנָּצְלוּ
  english_pob_choice: rescues / will be rescued
  chosen_spanish: rescata / serán rescatados
  alternatives_spanish:
  - libra / serán librados
  - salva / serán salvados
  lexicon: HALOT
  rationale: '''Rescata'' y ''serán rescatados'' conservan la conexión verbal entre el causativo y el pasivo, y respetan la imagen concreta del rescate parcial. ''Librar'' o ''salvar'' serían posibles, pero menos vinculados al campo semántico visible del texto.'
- source_word: הָרֹעֶה
  english_pob_choice: the shepherd
  chosen_spanish: el pastor
  alternatives_spanish:
  - un pastor
  - el que pastorea
  lexicon: HALOT
  rationale: El artículo del hebreo se refleja con 'el pastor', manteniendo el valor ilustrativo singular del símil y el registro profético.
- source_word: מִפִּי הָאֲרִי
  english_pob_choice: from the mouth of the lion
  chosen_spanish: de la boca del león
  alternatives_spanish:
  - de la boca del león feroz
  - de las fauces del león
  lexicon: HALOT
  rationale: '''Boca del león'' reproduce con claridad la imagen hebrea y evita un intensificador innecesario. ''Fauces'' es posible, pero más literario y menos directo.'
- source_word: שְׁתֵּי כְרָעַיִם
  english_pob_choice: two legs
  chosen_spanish: dos patas
  alternatives_spanish:
  - dos piernas
  - dos zancas
  - dos miembros
  lexicon: HALOT
  rationale: '''Patas'' refleja mejor el valor de restos corpóreos sueltos y el tono crudo de la imagen. ''Piernas'' puede sonar demasiado humano y ''zancas'' resulta regional o arcaizante.'
- source_word: בְדַל אֹזֶן
  english_pob_choice: a piece of an ear
  chosen_spanish: un pedazo de oreja
  alternatives_spanish:
  - un trozo de oreja
  - una porción de oreja
  - un fragmento de oreja
  lexicon: HALOT
  rationale: '''Pedazo'' conserva el carácter fragmentario y coloquial del resto mínimo recuperado; ''oreja'' es más natural aquí que ''oído'' porque el contexto es anatómico y visual.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión formal y genealógica del hebreo. 'Los israelitas' sería válida, pero borra la forma literal y la carga covenantal que el POB inglés conserva.
- source_word: הַיֹּשְׁבִים בְּשֹׁמְרוֹן
  english_pob_choice: who dwell in Samaria
  chosen_spanish: los que habitan en Samaria
  alternatives_spanish:
  - los que viven en Samaria
  - los que moran en Samaria
  lexicon: HALOT
  rationale: '''Habitan'' preserva el matiz participial y el registro algo elevado del oráculo, sin caer en un arcaísmo innecesario.'
- source_word: בִּפְאַת מִטָּה
  english_pob_choice: with the corner of a bed
  chosen_spanish: con la esquina de una cama
  alternatives_spanish:
  - con el extremo de una cama
  - junto a la esquina de una cama
  - con la orilla de una cama
  lexicon: HALOT
  rationale: '''Esquina'' y ''cama'' ofrecen una correspondencia clara y comprensible. La preposición ''con'' sigue la opción instrumental/associativa del POB inglés, manteniendo la concisión del hebreo sin forzar una interpretación más precisa de la que el texto permite.'
- source_word: וּבִדְמֶשֶׁק עָרֶשׂ
  english_pob_choice: and the couch of Damascus
  chosen_spanish: y el respaldo de un diván
  alternatives_spanish:
  - y la cama de Damasco
  - y el diván de Damasco
  - y un diván damasceno
  lexicon: HALOT
  rationale: Se evita introducir 'Damasco' en el texto principal porque el audit trail inglés reconoce la dificultad y la posible lectura no locativa. 'Respaldo de un diván' intenta reflejar el objeto de lujo de la imagen sin fijar una interpretación incierta. La ambigüedad del hebreo queda preservada para una nota.
theological_decisions:
- issue: 'Alcance de la salvación descrita: rescate parcial e irónico, no liberación amplia'
  english_pob_reading: Preserve the stark simile of minimal rescue
  chosen_spanish_reading: Conservar el símil tajante de un rescate mínimo y vergonzoso
  alternative_spanish_readings:
  - Presentar la idea de una salvación general
  - Suavizar la imagen para que suene a preservación parcial pero digna
  rationale: La imagen de dos patas o un pedazo de oreja implica restos apenas recuperados de la boca del león; por tanto, la profecía no anuncia un rescate glorioso, sino una supervivencia mínima. La traducción no atenúa esa tensión teológica.
  doctrine_reference: Preservar la tensión profética sin resolverla artificialmente.
- issue: Tratamiento del final difícil de la oración
  english_pob_reading: Retain the Masoretic wording in the main text and preserve major interpretive alternatives in a footnote
  chosen_spanish_reading: Mantener una traducción prudente en el texto principal y explicar la ambigüedad en nota
  alternative_spanish_readings:
  - Emendar a una referencia a una tela de Damasco
  - Leerlo como una ubicación literal en Damasco
  - Identificarlo de modo definitivo como mobiliario lujoso
  rationale: El hebreo final es oscuro y no exige una resolución doctrinal. La publicación debe mostrar la incertidumbre en vez de ocultarla bajo una paráfrasis segura.
  doctrine_reference: Primacía del texto original y transparencia ante variantes interpretativas.
translation_notes:
  revision_awareness: 'El audit trail inglés mantuvo la simetría ''As ... so'' y revisó el final oscuro para evitar fijar prematuramente la lectura ''de Damasco'' en el texto principal. Esta versión española sigue esa línea: conserva el paralelismo, la crudeza del rescate parcial y la ambigüedad final con una nota explicativa, evitando depender mecánicamente del inglés mientras respeta sus decisiones ya auditadas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, de acuerdo con la política del proyecto.
  - Se conserva 'hijos de Israel' en el texto principal para reflejar el hebreo; la alternativa más idiomática queda en nota.
  - '''Rescatados'' mantiene la relación verbal con ''rescata'' y reproduce mejor el campo semántico de נצל que una paráfrasis como ''librados''.'
  - El término 'diván' se usa como objeto de mueble de prestigio, no como reinterpretación doctrinal; la nota expone la ambigüedad del hebreo final.
  - Se evita 'Cristo', 'Señor' y otras sustituciones tradicionales que no corresponden al audit trail ni al texto fuente.
