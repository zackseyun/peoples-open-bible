  text: 'and swore by the one who lives forever and ever[a], who created heaven and the things in it, and the earth and the things on it, and the sea and the things in it, that there will no longer be any delay.'
  footnotes:
  - marker: a
    text: 'Or, more literally, ''time will be no more.'' Here χρόνος is understood in context as ''delay''—that the waiting period before God''s final action has ended.'
