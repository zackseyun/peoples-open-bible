revisions:
- from: 'Así que las dos siguieron andando hasta llegar a Belén. Y cuando llegaron a Belén[a], toda la ciudad se alborotó por causa de ellas, y las mujeres dijeron: «¿Es esta Noemí?».'
  to: 'Así, las dos siguieron su camino hasta que llegaron a Belén. Y cuando llegaron a Belén[a], toda la ciudad se conmocionó por causa de ellas, y las mujeres dijeron: «¿Es esta Noemí?»'
  rationale: Se ajusta el verbo inicial a una formulación más natural y sobria en español («siguieron su camino»), se hace más directa la meta temporal («hasta que llegaron») y se sustituye «se alborotó» por «se conmocionó» para reflejar mejor la agitación colectiva sin sobrerrepresentar desorden. Se conserva la nota sobre el femenino plural, con redacción ligeramente más natural en español.
