translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé[a]: Porque han hablado falsedad y han visto una mentira, por tanto, he aquí, estoy contra ustedes, declara el Señor Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Señor Yahvé»; se conserva en español la distinción entre el título «Señor» y el nombre divino «Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Marca la consecuencia y enlaza con la sentencia profética. 'Por tanto' conserva el valor discursivo y formal del hebreo sin sonar arcaico.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Mantiene la fórmula profética establecida en español bíblico contemporáneo, con tiempo presente para el acto proclamativo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: 'Se preserva la distinción título + nombre divino según la política del proyecto: יְהוָה se vierte ''Yahvé''. En español, ''el Señor Yahvé'' evita la repetición artificial ''Señor Señor'' y mantiene la reverencia del título.'
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del juicio de forma clara y natural en español, manteniendo la fuerza causal del hebreo.
- source_word: דַּבֶּרְכֶם
  english_pob_choice: you have spoken
  chosen_spanish: han hablado
  alternatives_spanish:
  - han dicho
  - han hablado ustedes
  lexicon: HALOT
  rationale: El hebreo expresa la acción culpable de hablar; el perfecto compuesto español comunica bien el hecho consumado y su relevancia judicial.
- source_word: שָׁוְא
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - engaño
  - vanidad
  lexicon: HALOT
  rationale: '''Falsedad'' conserva el sentido de habla vacía o engañosa sin introducir un matiz demasiado estrecho. En español bíblico suena más natural que ''vanidad'' para este contexto.'
- source_word: וַחֲזִיתֶם
  english_pob_choice: and seen
  chosen_spanish: y han visto
  alternatives_spanish:
  - y han tenido visiones
  - y han contemplado
  lexicon: HALOT
  rationale: Se conserva el verbo básico 'ver' en el contexto visionario profético. 'Han visto' sigue de cerca el hebreo sin forzar una interpretación técnica excesiva.
- source_word: כָּזָב
  english_pob_choice: a lie
  chosen_spanish: una mentira
  alternatives_spanish:
  - una falsedad
  - un engaño
  lexicon: HALOT
  rationale: '''Mentira'' comunica de modo directo el contenido falso de la visión. En español complementa bien ''falsedad'' sin repetir exactamente el mismo sustantivo.'
- source_word: הִנְנִי אֲלֵיכֶם
  english_pob_choice: behold, I am against you
  chosen_spanish: he aquí, estoy contra ustedes
  alternatives_spanish:
  - miren, estoy contra ustedes
  - aquí estoy contra ustedes
  lexicon: HALOT
  rationale: La fórmula divina de amenaza se mantiene solemne y transparente. 'He aquí' conserva la interjección profética; 'estoy contra ustedes' expresa oposición hostil.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - afirma
  - oráculo de
  lexicon: HALOT
  rationale: '''Declara'' reproduce la fórmula de autenticación profética con registro claro y moderno. Evita el tono más técnico de ''oráculo de'' en el texto principal.'
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: Se sigue la decisión doctrinal del proyecto de traducir יְהוָה como 'Yahvé'. En español, la combinación 'el Señor Yahvé' preserva tanto el título reverencial אֲדֹנָי como el nombre de pacto, evitando una sustitución genérica por 'Dios' que diluiría la distinción del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La traducción inglesa auditada no requirió revisiones posteriores; el veredicto de revisión fue de alta concordancia y sin cambios. La versión española sigue esa lectura estable, manteniendo la estructura retórica y las dos fórmulas de juicio del verso.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal para יְהוָה, conforme a la política terminológica del proyecto.
  - Se conserva el paralelismo semántico entre 'falsedad' y 'mentira' para reflejar los dos términos hebreos distintos.
  - '''Señor'' se usa solo para אֲדֹנָי; no se sustituye por una forma litúrgica que oculte el nombre divino.'
