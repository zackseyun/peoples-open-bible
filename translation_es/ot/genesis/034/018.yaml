lexical_decisions:
- source_word: וַיִּיטְבוּ
  english_pob_choice: seemed good
  chosen_spanish: parecieron buenas
  alternatives_spanish:
  - fueron buenas
  - resultaron agradables
  lexicon: HALOT
  rationale: El verbo con el giro evaluativo בְּעֵינֵי expresa aprobación/aceptación. En español, «parecieron buenas» conserva el sentido de valoración sin volver la frase dura o artificial.
- source_word: דִבְרֵיהֶם
  english_pob_choice: their words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su propuesta
  - su hablar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus palabras». Mantener «palabras» sigue de cerca la forma del original y evita estrechar innecesariamente el sentido a «propuesta».
- source_word: בְּעֵינֵי
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - en los ojos de
  - en opinión de
  lexicon: HALOT
  rationale: El hebreo usa la imagen idiomática de valoración «en los ojos de». En español, la preposición «a» tras «parecieron buenas» comunica naturalmente el juicio de aprobación sin perder el valor semántico del idioma.
- source_word: חֲמוֹר
  english_pob_choice: Hamor
  chosen_spanish: Hamor
  alternatives_spanish:
  - Jamor
  lexicon: Transliteración propia
  rationale: Nombre propio; se conserva la forma transliterada usada en el contexto POB.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Shequem
  alternatives_spanish:
  - Siquem
  lexicon: Transliteración propia
  rationale: Nombre propio; se mantiene la transliteración correspondiente al criterio de este proyecto, sin sustituirla por la forma tradicional castellana.
- source_word: בֶּן חֲמוֹר
  english_pob_choice: son of Hamor
  chosen_spanish: hijo de Hamor
  alternatives_spanish:
  - Hamor's son
  lexicon: HALOT
  rationale: La expresión filial hebrea se vierte de manera directa con «hijo de», preservando el orden narrativo y la identificación del personaje.
translation_notes:
  revision_awareness: 'El pasaje coincide con el audio/trazado inglés de la POB: se conserva la valoración positiva expresada por ייטבו y la construcción idiomática de aprobación, sin cambios textuales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo una solución sobria y narrativa, acorde con el estilo de la POB.
  - No se introdujo lenguaje interpretativo como «propuesta» para no estrechar דִבְרֵיהם.
  - Se evitó «en los ojos de» por ser menos natural en español, aunque la nota deja constancia de la alternativa literal.
  - Se respetó la transliteración de los nombres propios conforme al marco del proyecto.
