revisions:
- from: Mi amado[a] es como una gacela o como un cervatillo de los venados. ¡Mira! Allí está, detrás de nuestro muro, asomándose por las ventanas[b], mirando a través de la celosía.
  to: Mi amado[a] es como una gacela o como un joven venado. ¡Mira! Allí está de pie, detrás de nuestro muro, mirando por las ventanas, atisbando por la celosía[b].
  rationale: Se ajusta la referencia animal para un español más natural que conserve la imagen masculina destacada por la POB inglesa; se fortalece עוֹמֵד con 'está de pie'; se mejora el paralelismo de los participios de visión; y se corrige el anclaje de la nota cultural para que corresponda a 'celosía'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:57:59Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido básico del hebreo: comparación del amado con animales ágiles, deíxis vívida, ubicación detrás del muro, y doble imagen de mirar por aberturas. Sin embargo, dos elecciones no preservan del todo la fuerza léxica documentada: עוֹמֵד se debilita en ''allí está'' en vez de expresar ''está de pie/se encuentra de pie'', y ''cervatillo de los venados'' no refleja tan bien la racionalidad inglesa de mantener una imagen masculina específica como ''joven venado'' o equivalente. Además, la nota b está anclada en ''ventanas'' cuando su contenido explica ''celosía/lattice''.'
  spanish_quality_summary: El español es claro y poético, pero puede sonar más natural y preciso con pequeños ajustes. 'Asomándose por las ventanas' funciona, aunque combinado con 'mirando a través de la celosía' produce una progresión algo desigual; 'mirando por las ventanas, atisbando por la celosía' conserva mejor el paralelismo de dos participios de visión. 'Joven venado' es más natural y digno que 'cervatillo de los venados'.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. ''Mi amado'' para דוֹדִי y ''gacela'' para צְבִי están bien alineados. La excepción principal es estilística/lexical: conviene reflejar mejor la imagen masculina de לְעֹפֶר הָאַיָּלִים y reubicar la nota cultural para que corresponda a ''celosía''.'
  issues:
  - severity: medium
    issue: '''un cervatillo de los venados'' suena forzado y no preserva de la mejor manera la imagen masculina específica'
    rationale: La POB inglesa justificó 'young stag' precisamente para mantener la imagen masculina. En español, 'cervatillo de los venados' es literalizante y menos natural; 'un joven venado' comunica juventud y masculinidad con mejor legibilidad.
  - severity: medium
    issue: La nota [b] está anclada en 'ventanas' pero explica 'celosía'
    rationale: La disciplina de notas exige que el marcador aparezca en la palabra o frase pertinente. Aquí la nota cultural trata el valor de חֲרַכִּים / 'celosía', no de 'ventanas'.
  - severity: low
    issue: '''Allí está'' atenúa la fuerza visual de עוֹמֵד'
    rationale: El participio 'standing' fue una decisión explícita de la auditoría inglesa. En español poético y natural, 'allí está de pie' preserva mejor la escena.
  - severity: low
    issue: La pareja verbal 'asomándose... mirando a través' no reproduce tan limpiamente el paralelismo de dos verbos de mirar
    rationale: מַשְׁגִּיחַ y מֵצִיץ son ambos actos visuales; 'mirando... atisbando' conserva mejor el paralelismo y la progresión poética sin introducir tono siniestro.
  revised_spanish_text: Mi amado[a] es como una gacela o como un joven venado. ¡Mira! Allí está de pie, detrás de nuestro muro, mirando por las ventanas, atisbando por la celosía[b].
  revised_footnotes:
  - marker: a
    text: 'O: «un cervatillo de los ciervos». El hebreo se refiere a un miembro joven de la familia de los venados; aquí se escoge «joven venado» para conservar la imagen masculina de la formulación hebrea de manera natural en español.'
    reason: lexical_alternative
  - marker: b
    text: «Celosía» se refiere a una abertura con entramado o listones en la pared o en el área de la ventana; no necesariamente a un accesorio moderno separado.
    reason: cultural_note
  revision_rationale: Se ajusta la referencia animal para un español más natural que conserve la imagen masculina destacada por la POB inglesa; se fortalece עוֹמֵד con 'está de pie'; se mejora el paralelismo de los participios de visión; y se corrige el anclaje de la nota cultural para que corresponda a 'celosía'.
