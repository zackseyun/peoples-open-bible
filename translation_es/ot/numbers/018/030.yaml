translation:
  language: es
  text: 'Y les dirás: «Cuando eleven[a] su mejor parte de él, se les contará a los levitas como el producto de la era y como el producto del lagar.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su grasa»; aquí el término se usa idiomáticamente para la porción más rica o mejor de la ofrenda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: And you shall say to them
  chosen_spanish: Y hablarás a ellos
  alternatives_spanish:
  - Y dirás a ellos
  - Entonces hablarás a ellos
  lexicon: HALOT
  rationale: Mantiene la instrucción directa en segunda persona masculina singular dirigida a Moisés. ‘Hablarás’ conserva el valor de comunicación ordenada sin sonar forzado en español; ‘a ellos’ reproduce el complemento dativo.
- source_word: בַּהֲרִימְכֶם
  english_pob_choice: When you lift up
  chosen_spanish: Cuando aparten
  alternatives_spanish:
  - Cuando levanten
  - Cuando ofrezcan
  lexicon: HALOT
  rationale: El hebreo expresa el gesto de levantar/apartar una porción como contribución. En español, ‘apartar’ comunica mejor la idea de separar una parte del total sin perder la fuerza cultual del acto. Se evita ‘ofrezcan’ porque introduce una interpretación más específica que el hebreo aquí no exige.
- source_word: חֶלְבּוֹ
  english_pob_choice: its best part
  chosen_spanish: su mejor parte
  alternatives_spanish:
  - su grasa
  - su parte más rica
  - su porción escogida
  lexicon: HALOT
  rationale: Como en la nota inglesa, el sentido no es grasa literal de animal sino la porción más rica o selecta de la ofrenda. ‘Su mejor parte’ conserva la tensión entre el sentido literal y el idiomático sin fijarlo indebidamente.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - de eso
  lexicon: HALOT
  rationale: Retoma el antecedente colectivo de la contribución/tithed produce en español neutro. ‘De ello’ evita marcar género donde el hebreo es pronominal y general.
- source_word: וְנֶחְשַׁב
  english_pob_choice: it shall be counted
  chosen_spanish: será contado
  alternatives_spanish:
  - será considerado
  - será estimado
  lexicon: HALOT
  rationale: ‘Contado’ mantiene el valor contable/legal del pasivo de חשׁב, alineado con la decisión inglesa. ‘Considerado’ o ‘estimado’ suavizan demasiado la noción de cómputo o acreditación.
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: para los levitas
  alternatives_spanish:
  - a los levitas
  - en favor de los levitas
  lexicon: HALOT
  rationale: En este contexto de imputación, ‘para’ comunica más claramente la relación de beneficio o asignación que el valor direccional simple. Mantiene la función del dativo en la cuenta cultual.
- source_word: כִּתְבוּאַת גֹּרֶן
  english_pob_choice: as the produce of the threshing floor
  chosen_spanish: como el producto de la era
  alternatives_spanish:
  - como el fruto de la era
  - como el rendimiento de la era
  lexicon: HALOT
  rationale: ‘תבואה’ se rinde como ‘producto’ para conservar el sentido de rendimiento agrícola. ‘Era’ es el término español que mejor corresponde a ‘threshing floor’ en un registro bíblico claro y natural.
- source_word: וְכִתְבוּאַת יָקֶב
  english_pob_choice: and as the produce of the winepress
  chosen_spanish: y como el producto del lagar
  alternatives_spanish:
  - y como el fruto del lagar
  - y como el producto de la prensa de vino
  lexicon: HALOT
  rationale: ‘Lagar’ comunica el lugar/instalación de prensado de uvas con naturalidad bíblica en español. Se conserva el paralelismo con ‘producto’ para reflejar la estructura hebrea.
theological_decisions:
- issue: Sentido de חֶלְבּוֹ en un contexto de ofrenda de producto, no de grasa animal literal
  english_pob_reading: its best part; idiomatic richest or best portion
  chosen_spanish_reading: su mejor parte
  alternative_spanish_readings:
  - su grasa
  - su porción escogida
  rationale: 'Se preserva la tensión lexical documentada por la nota inglesa: el hebreo dice literalmente ‘su grasa’, pero el contexto de contribuciones agrícolas apunta a una porción selecta o más rica. La traducción evita borrar esa tensión y evita también una literalidad engañosa en español.'
  doctrine_reference: Lexical theology of sacrificial/contribution terminology; cf. usage of חֵלֶב as rich/best portion in offering contexts.
- issue: Valor de וְנֶחְשַׁב como acreditación/estimación legal para los levitas
  english_pob_reading: it shall be counted to the Levites
  chosen_spanish_reading: será contado para los levitas
  alternative_spanish_readings:
  - será considerado para los levitas
  - les será acreditado
  rationale: La pasiva conserva el matiz contable-jurídico sin introducir una paráfrasis interpretativa. ‘Para los levitas’ expresa la asignación del cálculo sin neutralizar el destinatario cultual.
  doctrine_reference: Covenantal/legal accounting language in the Torah; stewardship and allocated portions for the Levites.
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y la revisión más reciente sin cambios. La principal decisión pendiente era cómo trasladar el valor idiomático de חֶלְבּוֹ en español sin perder la nota de literalidad; se resolvió manteniendo una formulación que deja visible la tensión entre lo literal y lo idiomático.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar cuando el texto lo requiera; este versículo no la contiene.
  - Se emplea ‘levitas’ en minúscula como nombre de grupo étnico-funcional en español bíblico.
  - Se conserva un estilo bíblico moderno, sin recurrir a arcaísmos innecesarios como ‘dirásles’ o ‘será reputado’.
