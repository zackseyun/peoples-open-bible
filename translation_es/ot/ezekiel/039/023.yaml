base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/039/023.yaml
  text: And the nations will know that the house of Israel went into exile for their iniquity[a], because they acted unfaithfully against me; so I hid my face from them and gave them into the hand of their adversaries[b], and they all fell by the sword.
  footnotes:
  - marker: a
    text: Or, 'they trespassed against me' / 'they dealt treacherously with me.' The Hebrew verb carries the sense of covenant unfaithfulness or breach of faith.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'into the hand of their adversaries,' a Hebrew idiom for being delivered into another's power.
    reason: lexical_alternative
