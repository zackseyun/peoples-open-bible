translation:
  language: es
  text: Entonces añadió a sus actos de prostitución, y vio hombres retratados en la pared, imágenes de caldeos[a] retratadas en bermellón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «imágenes de babilonios»; el hebreo dice «caldeos», el pueblo asociado con Babilonia.
    reason: lexical_alternative
  - marker: b
    text: «Bermellón» designa un pigmento rojo brillante; alternativamente, «pigmento rojo» o posiblemente «cinabrio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתּ֖וֹסֶף
  english_pob_choice: Then she added
  chosen_spanish: Entonces añadió
  alternatives_spanish:
  - Y añadió
  - Entonces siguió
  lexicon: HALOT
  rationale: Conserva el valor consecutivo del verbo y el avance narrativo. «Añadió» mantiene la idea de incremento presente en el hebreo sin diluirla en una mera continuidad.
- source_word: אֶל תַּזְנוּתֶ֑י/הָ
  english_pob_choice: to her acts of prostitution
  chosen_spanish: a sus actos de prostitución
  alternatives_spanish:
  - a sus prostituciones
  - a sus actos de infidelidad
  lexicon: HALOT
  rationale: El plural hebreo sugiere actos múltiples; «actos de prostitución» reproduce esa pluralidad y conserva la fuerza metafórica del texto profético.
- source_word: וַתֵּ֗רֶא
  english_pob_choice: and she saw
  chosen_spanish: y vio
  alternatives_spanish:
  - y miró
  - y contempló
  lexicon: HALOT
  rationale: «Ver» es el sentido directo y suficiente del verbo, sin añadir matices no sustentados por el hebreo.
- source_word: אַנְשֵׁי֙ מְחֻקֶּ֣ה
  english_pob_choice: men portrayed
  chosen_spanish: hombres retratados
  alternatives_spanish:
  - hombres representados
  - figuras de hombres dibujadas
  lexicon: HALOT
  rationale: El participio pasivo indica hombres representados visualmente. «Retratados» funciona bien en español para figuras en una pared y evita sobredeterminar el medio técnico.
- source_word: עַל הַ/קִּ֔יר
  english_pob_choice: on the wall
  chosen_spanish: sobre la pared
  alternatives_spanish:
  - en la pared
  - en el muro
  lexicon: HALOT
  rationale: «Sobre la pared» sigue de cerca la preposición hebrea y es natural en español; «pared» es más neutral y común que «muro» en este contexto.
- source_word: צַלְמֵ֣י כשדיים
  english_pob_choice: images of Chaldeans
  chosen_spanish: imágenes de caldeos
  alternatives_spanish:
  - imágenes de babilonios
  - imágenes de los caldeos
  lexicon: HALOT
  rationale: Se conserva «caldeos» para mantener el término del original y la referencia étnico-política asociada a Babilonia. La alternativa «babilonios» queda como posibilidad contextual.
- source_word: חֲקֻקִ֖ים
  english_pob_choice: portrayed
  chosen_spanish: retratadas
  alternatives_spanish:
  - grabadas
  - esculpidas
  - inscritas
  lexicon: HALOT
  rationale: El mismo campo léxico de representación/inscripción reaparece aquí. En español, «retratadas» mantiene la coherencia con la primera mitad del verso y suena natural para imágenes en una pared.
- source_word: בַּ/שָּׁשַֽׁר
  english_pob_choice: in vermilion
  chosen_spanish: en bermellón
  alternatives_spanish:
  - en rojo intenso
  - con cinabrio
  lexicon: HALOT
  rationale: «Bermellón» es un equivalente español preciso para el pigmento rojo brillante aludido por el hebreo. Se preserva la incertidumbre del color exacto con alternativas semánticas cercanas.
theological_decisions:
- issue: Lenguaje sexual metafórico para la infidelidad pactal
  english_pob_reading: Retain 'acts of prostitution' in the main text
  chosen_spanish_reading: Mantener «actos de prostitución» en el texto principal
  alternative_spanish_readings:
  - infidelidad
  - fornicación
  - actos de prostitución ritual
  rationale: Ezequiel usa deliberadamente una imagen sexual fuerte para describir la infidelidad idolátrica y política. En español, «actos de prostitución» preserva esa tensión profética sin suavizarla en una abstracción moralizada.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión teológica del lenguaje profético.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó un segundo «engraved» por «portrayed» para armonizar el lenguaje de representación en el verso. Por eso el español usa «retratadas» en ambas mitades, manteniendo coherencia estilística con la imagen de figuras en la pared y respetando el campo semántico del hebreo.
  spanish_consistency_notes:
  - Se mantiene «caldeos» como término principal, con nota alternativa para «babilonios», siguiendo la tensión lexical documentada en el aparato inglés.
  - Se evita «SEÑOR» y no hay terminología divina en este versículo.
  - «Bermellón» conserva la referencia a un pigmento rojo brillante sin fijar con exceso la identificación química.
