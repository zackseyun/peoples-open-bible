base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/040.yaml
  text: At the time of the end[a], the king of the South will clash with him, and the king of the North will storm against him with chariots, horsemen, and many ships[d][c][b]; he will enter the lands and overflow and pass through.
  footnotes:
  - marker: a
    text: Or 'will push at him.' The Hebrew verb literally evokes butting or goring and is used figuratively for hostile collision.
    reason: lexical_alternative
  - marker: b
    text: Or 'will come against him like a storm' / 'like a whirlwind.' The verb carries imagery of violent rushing.
    reason: lexical_alternative
  - marker: c
    text: Or 'countries' for 'lands.' The Hebrew plural can denote multiple territories or nations.
    reason: lexical_alternative
  - marker: d
    text: The pronoun 'him' is left unspecified in the Hebrew text; interpreters differ on its exact referent in context.
    reason: alternative_reading
