translation:
  language: es
  text: Y Alcimo contendió por el sumo sacerdocio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠγωνίσατο
  english_pob_choice: contended
  chosen_spanish: contendió
  alternatives_spanish:
  - luchó
  - se esforzó
  - compitió
  lexicon: BDAG
  rationale: El verbo ἀγωνίζομαι expresa esfuerzo intenso o contienda. En este contexto político e institucional, «contendió» conserva la idea de disputa por un cargo sin forzar una imagen meramente física.
- source_word: Ἄλκιμος
  english_pob_choice: Alcimus
  chosen_spanish: Alcimo
  alternatives_spanish:
  - Alquimo
  lexicon: convención onomástica española
  rationale: Se adapta el nombre propio a la forma española tradicional y legible «Alcimo», manteniendo la transliteración histórica del nombre griego sin alterar la identidad del personaje.
- source_word: περὶ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - acerca de
  - en cuanto a
  lexicon: BDAG
  rationale: Con un verbo de contienda, περὶ introduce el objeto o causa por la cual se disputa. En español, «por» comunica naturalmente la finalidad o el interés en obtener el cargo.
- source_word: τῆς ἀρχιερωσύνης
  english_pob_choice: the high priesthood
  chosen_spanish: el sumo sacerdocio
  alternatives_spanish:
  - el oficio de sumo sacerdote
  - el sacerdocio supremo
  lexicon: LSJ
  rationale: ἀρχιερωσύνη designa el cargo o dignidad del sumo sacerdote. «Sumo sacerdocio» es una expresión española natural y fiel al sentido institucional del término.
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta notas ni revisiones textuales; el griego transmitido es breve y directo, y la traducción española sigue de cerca su estructura sin añadir información implícita.
  spanish_consistency_notes:
  - Se conserva el sentido institucional de ἀρχιερωσύνη como cargo, no como una referencia genérica al sacerdocio.
  - No se introduce capitalización devocional ni equivalente eclesiástico posterior que no esté apoyado por el texto griego.
  - El nombre propio se normaliza en español como «Alcimo» para legibilidad, siguiendo una convención onomástica estable.
