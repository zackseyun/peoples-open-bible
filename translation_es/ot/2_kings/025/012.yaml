  to: Pero de los más pobres del país, el capitán[a] de la guardia dejó a algunos para ser viñadores y agricultores[b].
  rationale: Se ajusta «de la tierra» a «del país» para una lectura histórica más natural en español y se añaden las notas léxicas que la POB inglesa documentó para el título militar y el término agrícola final.
