translation:
  language: es
  text: Pero cuando el rebaño estaba[a] débil, él no ponía las varas[b]; así los débiles quedaron para Labán, y los fuertes[c], para Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando el rebaño estaba flaco». El término hebreo puede referirse a animales débiles; algunos lo entienden más específicamente respecto de la cría tardía o inferior.
    reason: lexical_alternative
  - marker: b
    text: Es decir, no colocaba las varas delante de ellos, como en los versículos anteriores.
    reason: cross_reference
  - marker: c
    text: O «los robustos» o «los vigorosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהַעֲטִיף
  english_pob_choice: when the flock were feeble
  chosen_spanish: cuando el rebaño estaba débil
  alternatives_spanish:
  - cuando el rebaño estaba feeble
  - cuando el rebaño estaba flaco
  - cuando el rebaño estaba weak
  lexicon: HALOT
  rationale: La construcción temporal se expresa naturalmente con «cuando». En este contexto pastoral, «débil» comunica la idea de animales poco vigorosos sin cargar una traducción demasiado técnica. «Rebaño» es un equivalente natural de צֹאן en español bíblico lector.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el flock
  - la grey
  - el ganado menor
  lexicon: HALOT
  rationale: צֹאן designa el conjunto de ovejas y cabras, y «rebaño» es una opción española clara y idiomática. «Ganado menor» sería más técnico; «grey» suena más eclesiástico y menos natural en este contexto.
- source_word: לֹא יָשִׂים
  english_pob_choice: he would not put them in
  chosen_spanish: él no lo ponía
  alternatives_spanish:
  - él no lo colocaba
  - él no los ponía allí
  - él no los colocaba allí
  lexicon: HALOT
  rationale: El verbo שׂים conserva el sentido básico de poner/colocar. En el contexto inmediato, el objeto implícito son las varas mencionadas antes; en español, el pronombre singular neutro «lo» permite referirse a ese elemento sin forzar la frase.
- source_word: וְהָיָה
  english_pob_choice: so ... became
  chosen_spanish: así ... quedaron
  alternatives_spanish:
  - y ... fueron
  - y ... se volvieron
  - así ... llegaron a ser
  lexicon: HALOT
  rationale: La secuencia expresa resultado. «Así» reproduce bien el valor consecutivo, y «quedaron» comunica el estado resultante de pertenencia/asignación sin sonar artificial.
- source_word: הָעֲטֻפִים
  english_pob_choice: the feeble ones
  chosen_spanish: los débiles
  alternatives_spanish:
  - los flacos
  - los endebles
  - los débiles
  lexicon: HALOT
  rationale: Se conserva el contraste léxico con el primer miembro. «Los débiles» es más natural que un calco como «los feebles» y mantiene la ambigüedad razonable entre debilidad general y falta de vigor físico.
- source_word: לְלָבָן
  english_pob_choice: Laban’s
  chosen_spanish: para Labán
  alternatives_spanish:
  - de Labán
  - pertenecieron a Labán
  - de parte de Labán
  lexicon: HALOT
  rationale: La preposición לְ puede indicar pertenencia o asignación. En español, «para Labán» refleja bien el reparto/resultante del ganado sin necesidad de introducir una posesión más rígida que el hebreo.
- source_word: וְהַקְּשֻׁרִים
  english_pob_choice: the strong ones
  chosen_spanish: los fuertes
  alternatives_spanish:
  - los robustos
  - los vigorosos
  - los fuertes
  lexicon: HALOT
  rationale: La forma rara se entiende por contraste con «los débiles». «Los fuertes» preserva ese contraste con claridad y sin exagerar un matiz zootécnico que el hebreo no especifica del todo.
- source_word: לְיַעֲקֹב
  english_pob_choice: Jacob’s
  chosen_spanish: para Jacob
  alternatives_spanish:
  - de Jacob
  - pertenecieron a Jacob
  - a Jacob
  lexicon: HALOT
  rationale: Como con לְלָבָן, se mantiene la idea de asignación/resultante. «Para Jacob» conserva la construcción relacional del hebreo y sugiere el reparto final.
translation_notes:
  revision_awareness: 'La revisión más reciente no alteró el contenido (sin cambios). El contexto auditado en inglés favorece una equivalencia óptima: se mantiene el contraste entre animales débiles y fuertes, la secuencia resultante y la referencia implícita a las varas sin sobreexplicar el verso.'
  spanish_consistency_notes:
  - Se mantiene «Labán» y «Jacob» como nombres propios tradicionales y transparentes.
  - Se usa un término pastoral común («rebaño») en vez de una calca técnica.
  - El contraste semántico débil/fuerte se preserva de forma explícita, siguiendo el cierre del verso.
  - La referencia implícita al objeto de «poner» queda suficientemente clara por el contexto inmediato; el pie de nota no fue necesario para esa aclaración en el texto base español.
