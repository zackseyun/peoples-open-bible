translation:
  language: es
  text: Por favor, di que eres mi hermana, para que me vaya bien[a] por causa de ti, y se me preserve la vida[b] por tu causa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las dos expresiones hebreas de causalidad, «por causa de ti» y «por tu causa», son muy cercanas; ambas subrayan que Abram espera que su seguridad y un trato favorable vengan por la relación que Sarai declare con él.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y mi vida (literalmente, mi nephesh) vivirá por causa de ti». Aquí «vida» reproduce el sentido idiomático de nephesh como la vida o el ser de Abram.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרִי נָא
  english_pob_choice: Please say
  chosen_spanish: Por favor, di
  alternatives_spanish:
  - Di, por favor
  - Por favor, declara
  lexicon: HALOT
  rationale: El imperativo femenino singular con la partícula de ruego נָא expresa una petición suave pero urgente. «Por favor, di» transmite bien la súplica sin volver la frase artificial.
- source_word: אֲחֹתִי אָתְּ
  english_pob_choice: that you are my sister
  chosen_spanish: que eres mi hermana
  alternatives_spanish:
  - que eres mi hermana mayor
  - que eres mi hermana,
  - que eres hermana mía
  lexicon: HALOT
  rationale: La construcción predicativa se expresa de manera natural en español con una cláusula introducida por «que». «Mi hermana» conserva el valor directo de אֲחוֹתִי sin añadir matices no presentes en el hebreo.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: La forma final/purpose se traduce de modo idiomático con «para que», que conserva la intención y resulta plenamente natural en español actual.
- source_word: יִיטַב לִי
  english_pob_choice: it may go well with me
  chosen_spanish: me vaya bien
  alternatives_spanish:
  - me trate bien
  - me resulte bien
  - me sea favorable
  lexicon: HALOT
  rationale: El hebreo expresa un modismo de bienestar/favor. «Me vaya bien» reproduce esa idea sin sobreespecificar el mecanismo de trato, en línea con la decisión inglesa revisada a «go well with me».
- source_word: בַּעֲבוּרֵךְ
  english_pob_choice: because of you
  chosen_spanish: por causa de ti
  alternatives_spanish:
  - a causa de ti
  - por tu causa
  - debido a ti
  lexicon: HALOT
  rationale: La preposición con עֲבוּר expresa causalidad u ocasión. «Por causa de ti» conserva el valor causal de manera clara y evita duplicar exactamente la misma locución que aparece al final.
- source_word: וְחָיְתָה נַפְשִׁי
  english_pob_choice: and my life may be spared
  chosen_spanish: y se me conserve la vida
  alternatives_spanish:
  - y viva yo
  - y mi vida viva
  - y yo siga con vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí funciona idiomáticamente como vida o ser. «Se me conserve la vida» preserva la idea de supervivencia y mantiene algo del matiz pasivo/resultativo del hebreo sin imponer una lectura teológica de «alma».
- source_word: בִּגְלָלֵךְ
  english_pob_choice: on your account
  chosen_spanish: por tu causa
  alternatives_spanish:
  - a tu cuenta
  - debido a ti
  - en consideración a ti
  lexicon: HALOT
  rationale: La segunda expresión causal es cercana a la anterior. «Por tu causa» reproduce la relación causal y mantiene la repetición retórica del hebreo, aunque en español suene más fluida que una duplicación literal.
theological_decisions:
- issue: נֶפֶשׁ (nephesh) como vida o alma
  english_pob_reading: '''my life may be spared''; footnote notes that ''soul'' is an idiom for Abram''s life or self.'
  chosen_spanish_reading: «se me conserve la vida»
  alternative_spanish_readings:
  - mi alma viva
  - se me salve el alma
  - viva yo
  rationale: Se evita «alma» porque el contexto no trata del componente inmortal sino de la preservación de la vida de Abram. La formulación elegida mantiene el valor idiomático de נֶפֶשׁ sin borrar el punto lexical señalado por el POB.
  doctrine_reference: Antropología bíblica; uso idiomático de נֶפֶשׁ
- issue: Repetición de dos expresiones causales
  english_pob_reading: '''because of you'' and ''on your account'' are closely related and both emphasize that Abram expects his safety and favorable treatment to come through Sarai''s claimed relationship to him.'
  chosen_spanish_reading: «por causa de ti» / «por tu causa»
  alternative_spanish_readings:
  - a causa de ti / a causa tuya
  - por ti / por ti
  rationale: Se conserva la doble causalidad del hebreo con dos giros muy cercanos en español. No se colapsan en una sola expresión para no perder la insistencia retórica del texto.
  doctrine_reference: Observación retórica y semántica del paralelismo hebreo
translation_notes:
  revision_awareness: La revisión inglesa cambió «go well for me» por «go well with me» para reflejar mejor el modismo de ייטב לי. La versión española adopta ese ajuste con «me vaya bien», que conserva el valor idiomático y la naturalidad. También se mantiene la distinción entre las dos expresiones causales del hebreo, tal como refleja el aparato inglés.
  spanish_consistency_notes:
  - Se usa «hermana» y no «esposa» porque el hebreo dice explícitamente «mi hermana».
  - Se evita «alma» en el texto principal para no imponer una antropología que el contexto no exige, aunque la nota conserve el dato lexical de נֶפֶשׁ.
  - La duplicación causal se conserva con dos giros distintos en español para respetar la reiteración del hebreo.
  - El registro es formal, claro y publicable, sin calco excesivo del inglés.
