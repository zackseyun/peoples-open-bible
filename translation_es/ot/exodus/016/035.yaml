translation:
  language: es
  text: Y los hijos de Israel comieron el maná cuarenta años[a], hasta que llegaron a una tierra habitada[b]; comieron el maná hasta que llegaron al límite[c] de la tierra de Canaán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» / «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel», una designación pactual estándar del pueblo de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «una tierra asentada». La frase contrasta el desierto con una tierra apta para asentamiento humano estable.
    reason: lexical_alternative
  - marker: c
    text: O «el borde de la tierra de Canaán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: And the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva el giro genealógico y corporativo del hebreo. En español, «los hijos de Israel» mantiene la forma bíblica sin caer en una expresión demasiado forzada; «los israelitas» sería más idiomático, pero pierde la literalidad del designación covenantal que el POB inglés quiso resguardar.
- source_word: אָכְלוּ
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - estuvieron comiendo
  - consumieron
  lexicon: HALOT
  rationale: El perfecto qal narra una acción concluida; «comieron» es el pretérito simple natural en español y reproduce bien el valor narrativo.
- source_word: הַמָּן
  english_pob_choice: the manna
  chosen_spanish: el maná
  alternatives_spanish:
  - el maná
  lexicon: HALOT
  rationale: «Maná» es el término establecido en español; el artículo definido conserva la referencia determinada del texto.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  alternatives_spanish:
  - 40 años
  lexicon: HALOT
  rationale: Es una expresión de duración estándar; se traduce de forma directa y natural.
- source_word: עַד בֹּאָם
  english_pob_choice: until they came
  chosen_spanish: hasta que llegaron
  alternatives_spanish:
  - hasta su llegada
  - hasta que entraron
  lexicon: HALOT
  rationale: El hebreo marca un límite temporal con «hasta que» + verbo de llegada. «Llegaron» conserva el verbo de movimiento sin interpretarlo más allá de lo necesario.
- source_word: אֶל אֶרֶץ נוֹשָׁבֶת
  english_pob_choice: to an inhabited land
  chosen_spanish: a una tierra habitada
  alternatives_spanish:
  - a una tierra poblada
  - a una tierra asentada
  lexicon: HALOT
  rationale: «Habitada» refleja bien el participio pasivo/resultativo hebreo y mantiene el contraste con el desierto. «Tierra» suena más natural en español que «land» traducido como «país» o «suelo».
- source_word: עַד בֹּאָם אֶל קְצֵה אֶרֶץ כְּנָעַן
  english_pob_choice: until they came to the border of the land of Canaan
  chosen_spanish: hasta que llegaron al borde de la tierra de Canaán
  alternatives_spanish:
  - hasta que llegaron al límite de la tierra de Canaán
  - hasta que llegaron a la frontera de la tierra de Canaán
  lexicon: HALOT
  rationale: קְצֵה puede significar borde, extremo o borde/frontera. Aquí se conserva el valor espacial concreto con «borde», cercano al inglés POB «border» y sin imponer una terminología más técnica de la que exige el hebreo.
translation_notes:
  revision_awareness: La versión inglesa más reciente no introdujo cambios y el dictamen de revisión fue de alta concordancia; esta propuesta sigue esa lectura sin añadir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un reemplazo necesario.
  - Se conserva «el maná» como término bíblico ya asentado en español.
  - Se usa «tierra» para אֶרֶץ por coherencia con el contraste entre desierto y territorio habitable, y para evitar una traducción demasiado técnica.
  - «Hijos de Israel» preserva el valor corporativo y genealógico del hebreo, en línea con la decisión inglesa documentada.
