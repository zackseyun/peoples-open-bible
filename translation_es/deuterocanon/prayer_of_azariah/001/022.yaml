  rationale: La formulación española mantiene la predicación exclusiva de la deidad al destinatario, sin diluir la fuerza monoteísta del griego.
  doctrine_reference: 'DOCTRINE.md: κύριος → Señor; preservar el significado fuente sobre fórmulas heredadas'
translation_notes:
  revision_awareness: El texto inglés revisado añadió 'and' para reflejar el καὶ antes de ἔνδοξος, preservando dos predicados coordinados ('are the Lord God' y 'glorious'). La versión española también conserva esa coordinación con 'y'.
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος en sentido divino, conforme al contexto judío-griego.
  - '''Tierra habitada'' mantiene el matiz de οἰκουμένη sin convertirlo en un simple ''mundo'' moderno.'
  - '''solo'' queda unido al sujeto divino para reflejar la exclusividad de μόνος.'
