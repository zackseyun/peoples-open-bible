base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/015/029.yaml
  text: And as the ark of the covenant of Yahweh came to the city of David[a], Michal the daughter of Saul looked out through the window and saw King David dancing and playing, and she despised him in her heart.
  footnotes:
