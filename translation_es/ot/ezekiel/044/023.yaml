    text: O «lo profano»; también puede entenderse como «lo santo y lo ordinario».
    reason: lexical_alternative
  - marker: b
    text: O «los harán discernir entre lo impuro y lo limpio».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto base español porque comunica bien el sentido del hebreo y la elección principal «lo común» está bien justificada. Se corrigen únicamente las notas para que coincidan con la auditoría inglesa: una nota para la alternativa de חֹל y otra para la alternativa causativa/discernitiva de la segunda cláusula.'
