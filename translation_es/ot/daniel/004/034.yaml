translation:
  language: es
  text: Ahora yo, Nabucodonosor, alabo, exalto y honro al Rey del cielo, porque todas sus obras son verdad[a], y sus caminos son justicia[a]; y a los que andan con soberbia él puede humillar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas sus obras son verdaderas, y sus caminos son justos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «él puede abajar» o «rebajar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora bien
  - En este momento
  lexicon: HALOT
  rationale: Como adverbio discursivo de conclusión y transición, 'Ahora' comunica el cambio al testimonio de Nabucodonosor sin añadir una especificación temporal que el arameo no exige.
- source_word: מְשַׁבַּ֨ח וּ/מְרוֹמֵ֤ם וּ/מְהַדַּר
  english_pob_choice: praise and exalt and honor
  chosen_spanish: alabo, exalto y honro
  alternatives_spanish:
  - alabo y exalto y honro
  - alabo, engrandezco y honro
  lexicon: HALOT
  rationale: Conservo la tríada verbal completa. 'Alabo' corresponde a משבח, 'exalto' a מרומם, y 'honro' transmite bien מהדר en español moderno, manteniendo el tono doxológico sin perder la fuerza del tercer verbo.
- source_word: לְ/מֶ֣לֶךְ שְׁמַיָּ֔/א
  english_pob_choice: the King of heaven
  chosen_spanish: al Rey del cielo
  alternatives_spanish:
  - al Rey de los cielos
  - al Rey celestial
  lexicon: HALOT
  rationale: Sigo la forma idiomática española 'Rey del cielo'. 'Cielos' sería una posibilidad literal, pero en español bíblico y culto la singularidad conserva mejor la fórmula titulativa.
- source_word: דִּ֤י
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la base causal de la alabanza. 'Porque' hace explícita la relación causal de manera natural en español; no fuerzo una traducción más formal que oscurezca la conexión.
- source_word: כָל מַעֲבָד֨וֹ/הִי֙
  english_pob_choice: all his works
  chosen_spanish: todas sus obras
  alternatives_spanish:
  - todas sus acciones
  - todas sus obras hechas
  lexicon: HALOT
  rationale: '''Obras'' mantiene el alcance amplio de las acciones divinas y la resonancia bíblica del término, sin reducirlo a ''deeds'' en un sentido demasiado estrecho.'
- source_word: קְשֹׁ֔ט
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - verdaderas
  - fidelidad
  lexicon: HALOT
  rationale: Sigo la lectura nominal del POB en inglés. El hebreo/arameo emplea un predicado sustantivo; 'verdad' conserva esa fuerza abstracta mejor que 'verdaderas', aunque se reconoce la alternativa adjetival.
- source_word: וְ/אֹרְחָתֵ֖/הּ
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus senderos
  - su manera de obrar
  lexicon: HALOT
  rationale: '''Caminos'' es la metáfora bíblica natural para la conducta y manera de actuar de Dios. ''Senderos'' suena más literal pero menos idiomático; ''manera de obrar'' explicita demasiado la metáfora.'
- source_word: דִּ֑ין
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - justo
  - juicio
  lexicon: HALOT
  rationale: Mantengo el sustantivo abstracto 'justicia' para reflejar el paralelismo con 'verdad'. 'Juicio' es posible, pero en español aquí puede sonar más procesal y menos acorde con el paralelismo doxológico.
- source_word: וְ/דִי֙ מַהְלְכִ֣ין בְּ/גֵוָ֔ה
  english_pob_choice: those who walk in pride
  chosen_spanish: a los que andan con soberbia
  alternatives_spanish:
  - a los que caminan con orgullo
  - a los que viven con soberbia
  lexicon: HALOT
  rationale: Preservo la metáfora de 'andar' para conservar la imagen conductual. 'Con soberbia' expresa היטב בגאווה; en español 'orgullo' puede ser ambiguo, mientras que 'soberbia' conserva mejor el matiz negativo.
- source_word: יָכִ֖ל לְ/הַשְׁפָּלָֽה
  english_pob_choice: he is able to humble
  chosen_spanish: él puede humillar
  alternatives_spanish:
  - él es capaz de humillar
  - él puede abajar
  lexicon: HALOT
  rationale: '''Humillar'' reproduce bien el efecto del arameo: Dios rebaja al soberbio. Aunque ''abajar'' o ''abatir'' son posibles, ''humillar'' es más claro y suficientemente fuerte en español contemporáneo.'
theological_decisions:
- issue: Predicado nominal 'truth / justice' frente a lectura adjetival
  english_pob_reading: all his works are truth, and his ways are justice
  chosen_spanish_reading: todas sus obras son verdad, y sus caminos son justicia
  alternative_spanish_readings:
  - todas sus obras son verdaderas, y sus caminos son justos
  rationale: Conservo el paralelismo nominal del POB inglés y del arameo. En español, 'verdad' y 'justicia' como predicados sustantivos mantienen con más fuerza el tono confesional y la densidad teológica del texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Título divino 'King of heaven'
  english_pob_reading: the King of heaven
  chosen_spanish_reading: el Rey del cielo
  alternative_spanish_readings:
  - el Rey de los cielos
  - el Rey celestial
  rationale: Aunque la forma aramea es plural, la fórmula tradicional y natural en español culto es singular. No se pierde contenido teológico al seguir la idiomaticidad reconocida por el POB en inglés.
  doctrine_reference: Translation philosophy §6
- issue: Pride language and divine action
  english_pob_reading: those who walk in pride he is able to humble
  chosen_spanish_reading: y a los que andan con soberbia él puede humillar
  alternative_spanish_readings:
  - y a los que caminan con orgullo él puede humillar
  - y a los soberbios él puede humillar
  rationale: Mantengo la imagen de 'andar' para respetar el hebraísmo/arameísmo de conducta. 'Soberbia' conserva el matiz moral negativo mejor que 'orgullo', y 'humillar' expresa la acción divina sin suavizarla.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del POB en inglés, que sustituyó 'because' por 'for' para un enlace más formal. En español, 'porque' conserva con naturalidad esa relación causal sin sonar menos solemne. También mantengo la lectura nominal de 'truth' y 'justice', porque el arameo y el audit trail inglés la tratan como una elección deliberada y teológicamente cargada.
  spanish_consistency_notes:
  - Usé 'Yahvé' según la norma del proyecto solo cuando el texto lo requiera explícitamente; aquí el versículo habla del 'Rey del cielo', así que no aparece el tetragrámaton.
  - Mantuve 'verdad' y 'justicia' como sustantivos para conservar el paralelismo y no diluir el peso teológico.
  - Elegí 'soberbia' para בגאווה por su matiz moral negativo y por evitar la ambigüedad positiva de 'orgullo'.
  - Conservé la tríada verbal completa ('alabo, exalto y honro') para no perder la cadencia retórica del original.
