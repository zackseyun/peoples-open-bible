    changes_summary: Revised 'has two sides' to 'is twofold' for a more literal and formal rendering of כִפְלַיִם. Revised 'has overlooked' to 'has forgotten' to more directly reflect יַשֶּׁה while preserving natural English.
translation:
  language: es
  text: y te haría saber las cosas ocultas de la sabiduría[a], porque la sabiduría sólida es doble[b]. Sabe, pues, que Dios ha olvidado parte de tu iniquidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los secretos de la sabiduría».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «porque es doble para la sabiduría sólida»; es un modismo que indica que la sabiduría es más compleja o de varios lados de lo que parece.
    reason: lexical_alternative
  - marker: c
    text: 'O: «Dios ha pasado por alto parte de tu iniquidad» o «Dios te exige menos de lo que merece tu culpa»; el verbo hebreo es difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיַגֶּד
  english_pob_choice: and would tell
  chosen_spanish: y te haría saber
  alternatives_spanish:
  - y te diría
  - y te daría a conocer
  lexicon: HALOT
  rationale: El valor causativo de נגד en esta forma se expresa bien en español con 'haría saber' o 'daría a conocer'. 'Te haría saber' conserva el matiz volitivo del contexto y evita un futuro simple demasiado mecánico.
- source_word: תַּעֲלֻמוֹת חָכְמָה
  english_pob_choice: the hidden things of wisdom
  chosen_spanish: los secretos de la sabiduría
  alternatives_spanish:
  - las cosas ocultas de la sabiduría
  - las cosas escondidas de la sabiduría
  lexicon: HALOT
  rationale: '''תעלומות'' admite ''secretos'' o ''cosas ocultas''. ''Los secretos de la sabiduría'' mantiene el plural concreto y es natural en español, sin borrar el carácter velado del término.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la base explicativa de la afirmación anterior. 'Porque' reproduce de forma clara la relación causal/explanatoria en español.
- source_word: כִפְלַיִם
  english_pob_choice: is twofold
  chosen_spanish: es de dos aspectos
  alternatives_spanish:
  - es doble
  - es de doble faz
  lexicon: HALOT
  rationale: La imagen idiomática de dualidad no suena natural si se vierte literalmente como 'es doble' sin más. 'Es de dos aspectos' conserva la idea de complejidad o doble cara de la sabiduría, según el contexto auditado.
- source_word: לְתוּשִׁיָּה
  english_pob_choice: sound wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - el buen juicio
  - la prudencia
  lexicon: HALOT
  rationale: En este paralelismo con חָכְמָה, el término difícil תושיה queda bien recogido por 'sabiduría' con matiz de sabiduría sólida. La elección evita introducir un concepto demasiado interpretativo como 'prudencia'.
- source_word: וְדַע
  english_pob_choice: Know, then
  chosen_spanish: Sabe, pues
  alternatives_spanish:
  - Y sabe
  - Así que sabe
  lexicon: HALOT
  rationale: El imperativo de ידע se expresa con 'Sabe'. 'Pues' mantiene la conexión inferencial con la explicación previa, equivalente al 'then' del audit trail inglés.
- source_word: יַשֶּׁה לְךָ
  english_pob_choice: has forgotten some of
  chosen_spanish: ha olvidado parte de
  alternatives_spanish:
  - ha pasado por alto parte de
  - te ha perdonado parte de
  lexicon: HALOT
  rationale: El verbo es difícil y el audit trail inglés reconoce la tensión entre 'forget', 'overlook' y lecturas afines. En español, 'ha olvidado parte de' conserva la ambigüedad sin resolverla de manera excesiva, y permite el sentido partititvo indicado por el complemento.
- source_word: אֱלוֹהַ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Señor
  lexicon: HALOT
  rationale: El singular poético אֱלוֹהַ se traduce de forma natural y fiel como 'Dios', sin añadir expansión interpretativa.
- source_word: מֵעֲוֺנֶךָ
  english_pob_choice: some of your iniquity
  chosen_spanish: parte de tu iniquidad
  alternatives_spanish:
  - parte de tu culpa
  - algo de tu pecado
  lexicon: HALOT
  rationale: El prefijo מן expresa aquí una idea partitiva. 'Parte de tu iniquidad' refleja mejor esa porción/medida que una simple equivalencia totalizante.
theological_decisions:
- issue: Sentido del verbo difícil יַשֶּׁה en la acusación de Zofar
  english_pob_reading: God has forgotten some of your iniquity
  chosen_spanish_reading: Dios ha olvidado parte de tu iniquidad
  alternative_spanish_readings:
  - Dios ha pasado por alto parte de tu iniquidad
  - Dios te ha perdonado parte de tu iniquidad
  - Dios te exige menos de lo que merece tu culpa
  rationale: El hebreo es difícil y el contexto favorece la acusación de Zofar de que Job no está recibiendo todo el trato que merece. 'Ha olvidado' mantiene la lectura tradicional de la forma difícil sin afirmar una doctrina sobre la memoria divina; deja visible la tensión textual y semántica.
  doctrine_reference: Translation philosophy §1, §3
- issue: Naturaleza de la relación entre חָכְמָה y תּוּשִׁיָּה
  english_pob_reading: sound wisdom is twofold
  chosen_spanish_reading: la sabiduría es de dos aspectos
  alternative_spanish_readings:
  - la sabiduría es doble
  - la sabiduría tiene dos caras
  rationale: La frase hebrea es proverbial e idiomática. En español conviene preservar la idea de complejidad o facetas múltiples sin convertirla en una afirmación filosófica rígida sobre 'dos' en sentido literal.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El borrador sigue de cerca el último estado auditado en inglés, pero adapta la tensión de כִפְלַיִם y יַשֶּׁה a un español publicable sin perder la ambigüedad reconocida por la auditoría. Se conserva el paralelismo de sabiduría/תושיה y la acusación de Zofar respecto a la iniquidad de Job.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלוֹהַ conforme al estándar del proyecto.
  - Se usa 'iniquidad' para עוון, conservando el peso ético del término.
  - '''Sabiduría'' se emplea para תושיה en esta cláusula por el paralelismo inmediato con חָכְמָה; la nota preserva la alternativa lexical.'
  - Los marcadores de nota se colocan en el texto sobre el término o frase a la que remiten.
