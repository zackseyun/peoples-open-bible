translation:
  language: es
  text: Porque hicieron lo malo de una vez[a], sin escuchar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De una vez» refleja εἰς ἅπαξ en forma breve y natural. También podría entenderse como «una vez para siempre» o, más libremente, «por completo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no oír» o «para no oír». «Sin escuchar» expresa en español de forma natural la idea de no prestar oído o no atender.
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηρὰ
  english_pob_choice: evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - cosas malas
  - lo perverso
  lexicon: LSJ
  rationale: El griego expresa una cualidad moral amplia. En español, «lo malo» conserva esa amplitud sin volverla demasiado técnica o más fuerte de lo que el texto exige.
- source_word: ἐποίησαν
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - cometieron
  - practicaron
  lexicon: LSJ
  rationale: El verbo común «hacer» reproduce bien la concisión del griego y se integra naturalmente con «lo malo».
- source_word: εἰς ἅπαξ
  english_pob_choice: once for all
  chosen_spanish: de una vez
  alternatives_spanish:
  - una vez para siempre
  - de una sola vez
  - por completo
  lexicon: LSJ
  rationale: La expresión aquí apunta a un acto hecho de manera decisiva o total. «De una vez» mantiene la fuerza puntual y evita forzar en español una fórmula demasiado doctrinal o demasiado absoluta.
- source_word: τοῦ μὴ ἀκοῦσαι
  english_pob_choice: not listening
  chosen_spanish: no escuchando
  alternatives_spanish:
  - sin escuchar
  - rehusando escuchar
  - para no escuchar
  lexicon: LSJ
  rationale: El infinitivo articular con μή expresa la acción negativa ligada al acto previo. «No escuchando» conserva la relación verbal y la idea de resistencia a oír.
translation_notes:
  revision_awareness: El inglés auditado pasó por una oscilación entre «together» y «once for all» para εἰς ἅπαξ; la versión más reciente volvió a «once for all» y al sentido literal de «not listening». La redacción española sigue esa última decisión y evita introducir una lectura de «juntos».
  spanish_consistency_notes:
  - He mantenido un registro sobrio y bíblico, pero sin recurrir a fórmulas tradicionales que oscurezcan el valor semántico del griego.
  - No se usó «SEÑOR» ni terminología teológica adicional porque el versículo no los requiere.
  - «No escuchando» conserva mejor la relación con ἀκοῦσαι que una paráfrasis más interpretativa.
