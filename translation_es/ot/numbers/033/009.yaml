translation:
  language: es
  text: Salieron de Mará y llegaron a Elim. En Elim había doce fuentes de agua y setenta palmeras, y acamparon allí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: נסע en fórmulas de itinerario expresa la acción de levantar el campamento y continuar el viaje. «Salieron» es natural en español y conserva ese movimiento narrativo sin volverlo más técnico de lo necesario.
- source_word: מִמָּרָה
  english_pob_choice: from Marah
  chosen_spanish: de Mará
  alternatives_spanish:
  - desde Mará
  lexicon: HALOT
  rationale: Nombre propio de lugar transliterado. En español, «de Mará» fluye bien en la secuencia del recorrido y mantiene el topónimo sin traducirlo.
- source_word: וַיָּבֹאוּ
  english_pob_choice: and came
  chosen_spanish: y llegaron
  alternatives_spanish:
  - y vinieron
  - y arribaron
  lexicon: HALOT
  rationale: בוא puede significar «venir» o «llegar». «Llegaron» expresa con claridad la meta del desplazamiento en español actual, sin añadir la idea de entrada que no está exigida por el hebreo.
- source_word: אֵילִמָה / בְאֵילִם
  english_pob_choice: to Elim / At Elim
  chosen_spanish: a Elim / En Elim
  alternatives_spanish:
  - a Elim / en Elim
  lexicon: HALOT
  rationale: El formativo direccional se rinde con «a», y la localización posterior con «en». Se conserva el nombre propio transliterado como en el texto fuente.
- source_word: שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce
  lexicon: HALOT
  rationale: Número cardinal equivalente directo e idiomático en español.
- source_word: עֵינֹת מַיִם
  english_pob_choice: springs of water
  chosen_spanish: fuentes de agua
  alternatives_spanish:
  - manantiales de agua
  - fuentes
  lexicon: HALOT
  rationale: עין en este contexto designa una fuente o manantial natural. «Fuentes de agua» conserva la imagen de un punto de brote de agua y es claro para el lector español; «manantiales de agua» es posible, pero más técnico.
- source_word: וְשִׁבְעִים
  english_pob_choice: and seventy
  chosen_spanish: y setenta
  alternatives_spanish:
  - y setenta
  lexicon: HALOT
  rationale: Cardinal simple con coordinación directa al sustantivo siguiente.
- source_word: תְּמָרִים
  english_pob_choice: palm trees
  chosen_spanish: palmeras
  alternatives_spanish:
  - palmas
  - palmeras datileras
  lexicon: HALOT
  rationale: תמרים designa palmeras, probablemente datileras, pero el texto no exige la precisión de «datileras». «Palmeras» es natural en español y suficientemente fiel.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and they camped there
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - levantaron el campamento allí
  lexicon: HALOT
  rationale: חנה en este marco itinerante significa acampar o acampar/acamparse. «Acamparon allí» conserva el sentido narrativo y el lugar implícito del hebreo, explicitado al final por el adverbio.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y concuerda plenamente con el sentido auditado en la versión inglesa: salida de Mará, llegada a Elim, inventario de agua y palmeras, y permanencia allí. No se detectaron variantes textuales ni tensiones teológicas relevantes en este versículo.'
  spanish_consistency_notes:
  - Se mantiene la transliteración de topónimos propios («Mará», «Elim») para coherencia con el proyecto.
  - Se prefirió «fuentes de agua» sobre «pozos» o «manantiales» para reflejar el léxico del hebreo sin sobrerrestringir el tipo de fuente.
  - «Acamparon» conserva el valor de itinerario del verbo hebreo y es estilísticamente natural en español.
  - No se usó «SEÑOR» ni terminología teológica ajena al versículo.
  - La sintaxis española respeta la secuencia narrativa breve del original, con puntuación moderna y sin añadir información interpretativa.
