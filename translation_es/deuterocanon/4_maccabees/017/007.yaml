translation:
  language: es
  text: Pero si nos fuera posible, como lo haría un pintor, retratar la piedad[a] de tu relato, ¿no se estremecerían los que la vieran al contemplar a una madre de siete hijos sufriendo diversas torturas hasta la muerte por causa de la piedad?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «devoción»; εὐσέβεια puede traducirse como «piedad» o «devoción reverente» en este contexto. La misma palabra griega aparece también en «por causa de la piedad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ δὲ ἔξον ἡμῖν ἦν
  english_pob_choice: But if it were possible for us
  chosen_spanish: Pero si nos fuera posible
  alternatives_spanish:
  - Pero si nos fuera permitido
  - Pero si pudiéramos
  lexicon: LSJ
  rationale: ἔξον con ἦν expresa posibilidad o lo que está a nuestro alcance. En español, «nos fuera posible» conserva bien el valor hipotético sin volver la frase pesada o forzada.
- source_word: ὥσπερ τινός, ζωγραφῆσαι
  english_pob_choice: as for a painter, to portray
  chosen_spanish: como para un pintor, retratar
  alternatives_spanish:
  - como para un artista, pintar
  - como si un pintor pudiera dibujar
  lexicon: LSJ
  rationale: ζωγραφῆσαι conserva la imagen de pintar o representar visualmente. «Retratar» comunica la acción de representar con naturalidad en español y mantiene la metáfora pictórica.
- source_word: τὴν τῆς ἱστορίας σου εὐσέβειαν
  english_pob_choice: the godliness of your story
  chosen_spanish: la piedad de tu relato
  alternatives_spanish:
  - la devoción de tu relato
  - la piedad de tu historia
  lexicon: LSJ
  rationale: εὐσέβεια en 4 Macabeos designa reverencia fiel hacia Dios; «piedad» preserva esa carga y coincide con la alternativa documental del POB inglés. ἱστορία aquí es más naturalmente «relato» que «historia» en sentido moderno técnico.
- source_word: οὐκ ἂν ἔφριττον
  english_pob_choice: would not ... shudder
  chosen_spanish: no se estremecerían
  alternatives_spanish:
  - no se horrorizarían
  - no temblarían
  lexicon: LSJ
  rationale: ἔφριττον expresa una reacción física de sobresalto o escalofrío ante algo terrible. «Se estremecerían» recoge bien ese matiz visceral en español.
- source_word: οἱ θεωροῦντες
  english_pob_choice: those who saw it
  chosen_spanish: los que la vieran
  alternatives_spanish:
  - los que la viesen
  - los espectadores
  lexicon: LSJ
  rationale: El participio presente marca a quienes observan la escena. «Los que la vieran» integra el referente del relato representado y suena natural en la pregunta retórica.
- source_word: μητέρα ἑπτὰ τέκνων
  english_pob_choice: a mother of seven children
  chosen_spanish: a una madre de siete hijos
  alternatives_spanish:
  - a una madre de siete niños
  - a una madre de siete descendientes
  lexicon: LSJ
  rationale: τέκνα significa «hijos/niños» en sentido amplio; aquí el contexto narrativo permite «hijos» como equivalente natural y adecuado.
- source_word: διʼ εὐσέβειαν
  english_pob_choice: because of godliness
  chosen_spanish: por causa de la piedad
  alternatives_spanish:
  - a causa de la piedad
  - por la piedad
  lexicon: LSJ
  rationale: διά con acusativo indica causa. Repetir «piedad» mantiene la coherencia terminológica con el primer εὐσέβεια y evita variar sin necesidad el término clave del pasaje.
- source_word: ποικίλας βασάνους
  english_pob_choice: various tortures
  chosen_spanish: diversas torturas
  alternatives_spanish:
  - múltiples tormentos
  - torturas de varias clases
  lexicon: LSJ
  rationale: ποικίλας subraya variedad de tipos; βάσανοι en este contexto martirial son «torturas» más que sufrimientos genéricos. «Diversas torturas» es fiel y claro.
- source_word: μέχρι θανάτου ὑπομενούσαν
  english_pob_choice: unto death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - hasta el final, hasta la muerte
  lexicon: LSJ
  rationale: ὑπομένω implica resistencia perseverante bajo sufrimiento. «Hasta la muerte» comunica el límite de la resistencia de forma directa y solemne.
theological_decisions:
- issue: Cómo traducir εὐσέβεια en 4 Macabeos
  english_pob_reading: godliness / piety
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - devotamente fiel reverencia a Dios
  rationale: El POB inglés dejó abierta la alternativa «piety». En español, «piedad» conserva el sentido de reverencia religiosa sin reducirlo a mera emoción devocional; además, permite mantener la misma palabra en ambas ocurrencias del versículo, preservando la fuerza temática del pasaje.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; consistencia terminológica y preservación de tensiones léxicas'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «depict» a «portray», de «those who looked on» a «those who saw it», y de «varied tortures ... all the way to death» a «various tortures unto death». La versión española sigue esas decisiones semánticas con un registro igualmente formal, manteniendo la metáfora pictórica, el sujeto observador y la culminación martirial sin suavizar el lenguaje.
  spanish_consistency_notes:
  - Se mantiene «piedad» para εὐσέβεια en ambas ocurrencias para conservar la repetición temática del griego.
  - «Relato» se usa para ἱστορία por ser más natural que «historia» en castellano bíblico sin perder el sentido narrativo.
  - «Hasta la muerte» reproduce con sobriedad el alcance de μέχρι θανάτου, sin añadir interpretación adicional.
