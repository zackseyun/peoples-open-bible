  to: ¿Ves a un hombre hábil[a] en su trabajo? Estará delante de reyes; no estará delante de hombres sin distinción[b].
  rationale: Se reemplaza «se pondrá» por «estará» para reflejar mejor el valor de יִתְיַצָּב en paralelo y sonar más natural en español. Se cambia «hombres oscuros» en el texto principal a «hombres sin distinción» para comunicar el sentido metafórico correcto del hebreo, mientras la nota conserva el literal y explica la imagen.
