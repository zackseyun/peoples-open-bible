    text: Or more explicitly, 'because of this Philistine.' The Hebrew reads 'because of him,' with the referent supplied by context.
    reason: alternative_reading
  - marker: b
    text: Or 'Let no man lose heart.' The Hebrew idiom is literally 'let not the heart of a man fall.'
    reason: lexical_alternative
