translation:
  language: es
  text: 'Y se informó al rey Salomón que Joab había huido a la tienda de Yahvé[a], y he aquí que estaba junto al altar. Entonces Salomón envió a Benaías hijo de Joyadá, diciendo: «Ve[b], abátelo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tabernáculo de Yahvé». El hebreo dice «tienda de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «Ve, cae sobre él» / «Ve, atácalo». El verbo hebreo puede denotar golpear o arremeter contra; aquí, por el contexto, lleva el sentido de asestar un golpe letal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: se informó
  alternatives_spanish:
  - se le dijo
  - le fue informado
  lexicon: HALOT
  rationale: La forma pasiva comunica que la noticia llegó al rey sin destacar al mensajero. «Se informó» mantiene ese valor impersonal y suena natural en español.
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: to King Solomon
  chosen_spanish: al rey Salomón
  alternatives_spanish:
  - al rey, Salomón
  - a Salomón el rey
  lexicon: HALOT
  rationale: La apposición título+nombredel rey se conserva con un orden idiomático en español.
- source_word: נָס
  english_pob_choice: had fled
  chosen_spanish: había huido
  alternatives_spanish:
  - había escapado
  - huyó
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja que la huida ocurrió antes del reporte. «Huir» conserva mejor la imagen verbal que «escapar».
- source_word: אֶל אֹהֶל יְהוָה
  english_pob_choice: to the tent of Yahweh
  chosen_spanish: al templo de Yahvé
  alternatives_spanish:
  - a la tienda de Yahvé
  - al tabernáculo de Yahvé
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tienda», pero en este contexto de santuario y altar, «templo» comunica mejor al lector hispanohablante la función del lugar sin perder la referencia al lugar sagrado. Se mantiene «Yahvé» según el criterio del proyecto.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he ahí
  lexicon: HALOT
  rationale: «He aquí» conserva la señal discursiva de atención y la viveza del hebreo sin sonar arcaizante en exceso.
- source_word: אֵצֶל הַמִּזְבֵּחַ
  english_pob_choice: he was beside the altar
  chosen_spanish: estaba junto al altar
  alternatives_spanish:
  - estaba al lado del altar
  - estaba cerca del altar
  lexicon: HALOT
  rationale: «Junto a» expresa cercanía con naturalidad y evita una rigidez innecesaria.
- source_word: וַיִּשְׁלַח
  english_pob_choice: So Solomon sent
  chosen_spanish: Entonces Salomón envió
  alternatives_spanish:
  - Y Salomón envió
  - Así que Salomón envió
  lexicon: HALOT
  rationale: «Entonces» marca bien la secuencia narrativa y la consecuencia del reporte.
- source_word: בְּנָיָהוּ בֶן יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: a Benaías hijo de Joyadá
  alternatives_spanish:
  - a Benaía hijo de Joyadá
  - a Benaías, hijo de Joyadá
  lexicon: HALOT
  rationale: Se adopta la forma española usual de los nombres propios bíblicos y el patronímico directo «hijo de».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Introduce el discurso directo de manera simple y fiel.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ve allá
  lexicon: HALOT
  rationale: Imperativo breve y natural en español.
- source_word: פְּגַע בּוֹ
  english_pob_choice: strike him down
  chosen_spanish: hiérelo
  alternatives_spanish:
  - golpéalo
  - atácalo
  - abátelo
  lexicon: HALOT
  rationale: El hebreo puede significar «golpear, atacar, arremeter contra»; en este contexto de ejecución, «hiérelo» mantiene la fuerza verbal sin explicitar más de lo que el verbo obliga. Se evita traducirlo directamente como «mátalo» para no cerrar una ambigüedad verbal que el hebreo conserva.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahvéh
  rationale: El texto hebreo contiene el Tetragrámaton. Siguiendo el criterio del proyecto, se vierte como «Yahvé» y no como una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: אֹהֶל יְהוָה en contexto narrativo del santuario
  english_pob_reading: tent of Yahweh
  chosen_spanish_reading: templo de Yahvé
  alternative_spanish_readings:
  - tienda de Yahvé
  - tabernáculo de Yahvé
  rationale: Aunque el hebreo usa literalmente «tienda», el español «templo» funciona como equivalente contextual para el recinto sagrado donde está el altar. Se conserva la referencia al lugar de Yahvé sin forzar un calco que suene extraño.
  doctrine_reference: Contextual lexical decision; no doctrinal dispute
- issue: פְּגַע בּוֹ en orden de ejecución
  english_pob_reading: strike him down
  chosen_spanish_reading: hiérelo
  alternative_spanish_readings:
  - abátelo
  - atácalo
  - golpéalo
  rationale: La orden es violenta y probablemente mortal, pero el hebreo verbal se centra en el acto de herir/abatir. «Hiérelo» preserva esa tensión sin resolverla de modo más tajante que el original.
  doctrine_reference: Lexical tension in verb semantics; HALOT
translation_notes:
  revision_awareness: 'Coincide con la última revisión en el sentido global y en la lectura de alto acuerdo: no se requieren cambios sustantivos respecto del audit trail en cuanto a la secuencia narrativa, el nombre divino ni la fuerza violenta del mandato. Se mantiene visible la tensión del verbo פגע y la referencia literal al מקום santuario, aunque en español se opta por un equivalente contextual («templo») con nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - 'Se conserva el tono narrativo con conectores simples: «Y», «Entonces», «y he aquí».'
  - 'Los nombres propios siguen formas españolas corrientes: Salomón, Benaías, Joyadá.'
  - Se evita la sustitución devocional «SEÑOR» para no ocultar el nombre divino del hebreo.
  - El verbo de violencia se mantiene en una forma breve y ambigua («hiérelo»), con nota para reflejar el rango semántico del hebreo.
