    reference: Sirach 48:12
translation:
  text: Elijah was hidden in the storehouse[a], and Elisha was filled with his spirit. Twice as many signs, and many wonders[b], came from his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Elijah, who was covered in a whirlwind.'' The Hebrew witness instead reads ''Elijah was hidden in the storehouse.'''
    reason: textual_variant
  - marker: b
    text: Or 'twice as many signs'; the Hebrew phrase literally says 'double' with reference to the signs, likely echoing Elisha's double portion.
    reason: lexical_alternative
lexical_decisions:
- source_word: שבאוצר נסתר
  chosen: was hidden in the storehouse
  alternatives:
  - was concealed in the whirlwind
  - was hidden away
  - was taken up in the storm
  lexicon: HALOT
  rationale: The Hebrew witness reads literally 'was hidden in the storehouse/treasury.' This differs from the Greek parallel, which has 'was covered in a whirlwind.' Because Hebrew is the primary witness where extant, the main text follows the Hebrew wording. 'Storehouse' preserves אוצר straightforwardly while allowing the idiom to remain somewhat enigmatic. The Greek alternative is significant enough to preserve in a footnote.
- source_word: ונמלא רוחו אלישע
  chosen: and Elisha was filled with his spirit
  alternatives:
  - and Elisha was filled with his Spirit
  - and Elisha was filled with his breath
  lexicon: HALOT
  rationale: The Hebrew syntax most naturally means Elisha was filled with Elijah's spirit, matching the Greek πνεύματος αὐτοῦ. Lowercase 'spirit' avoids importing a stronger pneumatological claim than the context requires.
- source_word: פי שנים
  chosen: He doubled
  alternatives:
  - twice as many
  - a double portion of
  - twofold
  lexicon: HALOT
  rationale: Literally 'double of' or 'twice.' In context with 'many signs,' the phrase is elliptical. Rendering it verbally as 'He doubled' communicates that Elisha performed signs in doubled measure, likely echoing the double portion motif associated with Elisha, without over-specifying the object beyond the immediate clause.
- source_word: אותות הרבה
  chosen: many signs
  alternatives:
  - many miracles
  - many tokens
  lexicon: HALOT
  rationale: אותות commonly means 'signs.' 'Signs' is preferable to 'miracles' here because the next term already covers wondrous acts, and the pairing 'signs and wonders' is a familiar biblical collocation.
- source_word: ומופתים
  chosen: and wonders
  alternatives:
  - and marvels
  - and portents
  lexicon: HALOT
  rationale: מופתים is well rendered 'wonders' in biblical idiom, especially alongside אותות.
- source_word: כל מוצא פיהו
  chosen: came from his mouth
  alternatives:
  - at every utterance of his mouth
  - whenever his mouth spoke
  - everything that went out from his mouth
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed. A more literal rendering would be 'every outgoing of his mouth,' meaning his spoken word. 'Came from his mouth' gives readable English while preserving the source image that the wonders were associated with his utterance.
