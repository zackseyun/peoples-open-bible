  rationale: 'Se corrigió la naturalidad de עָלוּ מִן הָרַחְצָה con ''han salido del lavado'' y se rehicieron por completo las notas para alinearlas con la evidencia fuente y la auditoría inglesa: [a] ahora explica מַתְאִימוֹת y [b] explica שַׁכֻּלָה. Se conservó en el texto principal la metáfora ovina de fecundidad/completitud, en línea con el POB inglés, usando una formulación natural en español.'
