translation:
  language: es
  text: 'Allí Sadoc, el sacerdote, y Natán, el profeta, lo ungirán rey sobre Israel, y ustedes tocarán el shofar[a] y dirán: «¡Viva el rey Salomón!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Shofar» conserva el término hebreo para el cuerno usado como señal o proclamación pública; en traducciones tradicionales suele verterse «trompeta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁח
  english_pob_choice: shall anoint
  chosen_spanish: ungirán
  alternatives_spanish:
  - deberán ungir
  - han de ungir
  lexicon: HALOT
  rationale: El hebreo tiene fuerza instructiva en la secuencia; en español, el futuro simple puede expresar mandato/proyección con naturalidad. «Ungirán» conserva el acto ritual sin volverlo demasiado explicativo.
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - allí mismo
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio locativo remite al lugar ya indicado en el contexto; «Allí» es breve y fiel.
- source_word: צָדוֹק הַכֹּהֵן
  english_pob_choice: Zadok the priest
  chosen_spanish: a Sadoc, el sacerdote
  alternatives_spanish:
  - Sadoc, el sacerdote
  - Sadoc el sacerdote
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado al español bíblico y se traduce el título sacerdotal de modo directo. Aquí no se introduce una forma litúrgica distinta.
- source_word: וְנָתָן הַנָּבִיא
  english_pob_choice: and Nathan the prophet
  chosen_spanish: y Natán, el profeta
  alternatives_spanish:
  - y Natán el profeta
  lexicon: HALOT
  rationale: La coordinación conserva los dos agentes de la unción. Se traduce נָבִיא por «profeta» según su valor estándar.
- source_word: לְמֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - como rey
  lexicon: HALOT
  rationale: El לְ marca función/oficio en la fórmula de entronización; en español, «rey» funciona como complemento predicativo natural dentro de «ungir rey». «Como rey» es posible, pero añade una paráfrasis leve que no es necesaria.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - para Israel
  lexicon: HALOT
  rationale: El hebreo expresa autoridad real sobre el pueblo; «sobre Israel» reproduce mejor esa relación de gobierno que «para Israel».
- source_word: וּתְקַעְתֶּם בַּשּׁוֹפָר
  english_pob_choice: you shall blow the trumpet
  chosen_spanish: tocarán el shofar
  alternatives_spanish:
  - harán sonar el shofar
  - tocarán la trompeta
  - harán sonar el cuerno
  lexicon: HALOT
  rationale: Se conserva el término hebreo «shofar» porque la nota de la POB inglesa documenta que designa un cuerno usado para proclamación pública. En español, el préstamo evita perder la especificidad ritual y sonora.
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: and say
  chosen_spanish: y dirán
  alternatives_spanish:
  - y ustedes dirán
  - y proclamarán
  lexicon: HALOT
  rationale: La secuencia de instrucciones permite un futuro exhortativo en español. «Dirán» mantiene la fluidez sin sobrecargar el estilo con repeticiones de sujeto.
- source_word: יְחִי
  english_pob_choice: Long live
  chosen_spanish: ¡Viva!
  alternatives_spanish:
  - ¡Que viva!
  - ¡Larga vida al...!
  lexicon: HALOT
  rationale: El jussivo/aclamación se vuelve una fórmula española natural. «¡Viva!» preserva el carácter de aclamación real sin introducir un sujeto adicional.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - Salomón, el rey
  - el rey, Salomón
  lexicon: HALOT
  rationale: En español, la aposición «el rey Salomón» es clara y solemne. Aquí se evita poner el título solamente antes del nombre porque la forma de aclamación funciona bien con artículo + título + nombre.
theological_decisions:
- issue: Fórmula de unción real como legitimación de sucesión
  english_pob_reading: Zadok the priest and Nathan the prophet shall anoint him king over Israel
  chosen_spanish_reading: Sadoc, el sacerdote, y Natán, el profeta, lo ungirán rey sobre Israel
  alternative_spanish_readings:
  - lo ungirán como rey sobre Israel
  - lo consagrarán rey sobre Israel
  rationale: La frase refleja la instalación pública y legítima de Salomón. Se evita «consagrarán» porque diluye la imagen concreta de la unción; «ungir» conserva la base ritual y política del texto.
  doctrine_reference: 1 Samuel 10:1; 16:13; 1 Reyes 1:39
- issue: Aclamación real y fórmula de vida
  english_pob_reading: Long live King Solomon!
  chosen_spanish_reading: ¡Viva el rey Salomón!
  alternative_spanish_readings:
  - ¡Que viva el rey Salomón!
  - ¡Larga vida al rey Salomón!
  rationale: La exclamación española mantiene la función performativa de lealtad y reconocimiento regio. Se prefiere una fórmula breve y idiomática que no pierda el matiz de proclamación.
  doctrine_reference: 2 Samuel 16:16; 1 Reyes 1:25
translation_notes:
  revision_awareness: El contexto inglés no requirió cambios de revisión; se mantiene la lectura estable de la instrucción de unción, el toque del shofar y la aclamación regia.
  spanish_consistency_notes:
  - Se siguió el patrón POB de preservar términos con carga cultural específica cuando el español pierde precisión con una equivalencia genérica.
  - Se evitó «SEÑOR» u otras sustituciones innecesarias; aquí no aparece el Tetragrámaton.
  - Se mantuvo un registro bíblico claro y contemporáneo, con puntuación que favorece la lectura pública.
