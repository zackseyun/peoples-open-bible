translation:
  language: es
  text: 'Estate preparado[a], y prepárate tú mismo: tú y toda tu asamblea, los que se han reunido alrededor de ti; y sé guardia para ellos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Prepárate y prepárate tú mismo». La duplicación de imperativos intensifica la orden de estar listo y hacer preparación deliberada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sé su guardia» o «sé custodio para ellos». El hebreo puede sugerir guardia, vigilancia, custodia o la responsabilidad de velar por ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכֹּן
  english_pob_choice: Be prepared
  chosen_spanish: Prepárate
  alternatives_spanish:
  - Estate preparado
  - Ponte listo
  lexicon: HALOT
  rationale: El imperativo niphal de כון expresa quedar/ponerse en estado de preparación. «Prepárate» es natural en español, mantiene el matiz de disposición previa y preserva la fuerza del mandato sin volverlo técnico o arcaico.
- source_word: וְהָכֵן לְךָ
  english_pob_choice: and prepare yourself
  chosen_spanish: y prepárate tú mismo
  alternatives_spanish:
  - y hazte preparado
  - y haz preparación para ti mismo
  lexicon: HALOT
  rationale: El imperativo hiphil con לְךָ intensifica la orden y añade una acción deliberada sobre uno mismo. «Prepárate tú mismo» conserva esa insistencia reflexiva mejor que una simple repetición estilística de «prepárate».
- source_word: קְהָלֶךָ
  english_pob_choice: your assembly
  chosen_spanish: tu asamblea
  alternatives_spanish:
  - tu compañía
  - tu contingente
  - tu multitud reunida
  lexicon: HALOT
  rationale: קָהָל designa un grupo reunido. «Asamblea» es fiel al campo semántico y suficientemente amplio para no especificar indebidamente si se trata de tropas, aliados o una muchedumbre organizada.
- source_word: הַנִּקְהָלִים עָלֶיךָ
  english_pob_choice: who are gathered around you
  chosen_spanish: los que se han reunido alrededor de ti
  alternatives_spanish:
  - los que se reúnen contra ti
  - los que están reunidos a tu alrededor
  - los que se congregan en torno a ti
  lexicon: HALOT
  rationale: El participio pasivo/medio de קהל describe a quienes están siendo reunidos. «Se han reunido alrededor de ti» conserva el hecho de la reunión y traduce עָלֶיךָ de manera idiomática en español, sin forzar una lectura más adversarial de la que el hebreo exige aquí.
- source_word: וְהָיִיתָ לָהֶם לְמִשְׁמָר
  english_pob_choice: and be a guard for them
  chosen_spanish: y sé para ellos un guardia
  alternatives_spanish:
  - y sé su guardia
  - y mantenlos bajo guardia
  - y sé para ellos un custodio
  lexicon: HALOT
  rationale: מִשְׁמָר puede significar guardia, vigilancia, custodia o deber de guardar. «Un guardia» conserva el sustantivo y la imagen de función asignada, sin convertirla en una interpretación demasiado elaborada. Se evita «siervo» o «guardián» por no ser las opciones más directas para este contexto.
translation_notes:
  revision_awareness: Se siguió el alto acuerdo del control cruzado y no hubo revisiones textuales aplicadas en el pasaje base. La redacción española conserva la duplicación imperativa, el valor colectivo de קָהָל y la ambigüedad funcional de מִשְׁמָר, con notas donde el español exige optar por una sola forma principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se traduce «asamblea» para קָהָל sin sobrecargarlo con terminología eclesiástica.
  - «Guardia» se usa como sustantivo funcional para reflejar מִשְׁמָר sin imponer una interpretación doctrinal adicional.
