translation:
  language: es
  text: Antes de que todas las cosas fueran creadas[a], ya le era conocido; así también después de completarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Antes de que todas las cosas fueran creadas, ya lo conocía; igualmente después de la consumación». El griego ἔγνωσται puede expresarse en español de más de una manera, aunque el sentido de conocimiento pleno y anterior es claro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν ἢ
  english_pob_choice: Before
  chosen_spanish: Antes de que
  alternatives_spanish:
  - Antes
  - Previo a
  lexicon: LSJ
  rationale: Expresa prioridad temporal de manera natural en español y conserva el sentido introductorio de la cláusula.
- source_word: κτισθῆναι
  english_pob_choice: were created
  chosen_spanish: fueran creadas
  alternatives_spanish:
  - fueran formadas
  - llegaran a ser creadas
  lexicon: LSJ
  rationale: El pasivo de κτίζω se vierte con un pasivo natural en español; 'creadas' mantiene el valor de creación sin añadir matices ajenos.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - la totalidad de las cosas
  lexicon: LSJ
  rationale: Reproduce el alcance totalizador del griego con una forma idiomática y clara en español.
- source_word: ἔγνωσται
  english_pob_choice: it was known
  chosen_spanish: era conocido
  alternatives_spanish:
  - había sido conocido
  - ya lo conocía
  lexicon: LSJ
  rationale: El perfecto griego expresa un estado resultante de conocimiento previo completo; 'era conocido' comunica esa estatividad en español sin forzar el sujeto.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: para él
  alternatives_spanish:
  - a él
  - por él
  lexicon: LSJ
  rationale: En este contexto, el dativo se entiende como referencia de conocimiento respecto de Dios; 'para él' suena más natural en español y conserva la relación de destinación/referencia sin introducir agente.
- source_word: οὕτως καὶ
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - de igual modo
  - también así
  lexicon: LSJ
  rationale: Mantiene la correlación explícita entre la cláusula anterior y la posterior.
- source_word: μετὰ τὸ συντελεσθῆναι
  english_pob_choice: after they are completed
  chosen_spanish: después de haber sido llevadas a cabo
  alternatives_spanish:
  - después de completarse
  - tras ser terminadas
  lexicon: LSJ
  rationale: El infinitivo articular con μετά indica posterioridad a la culminación; 'haber sido llevadas a cabo' preserva el pasivo y el sentido de завершение/consumación sin vincularlo rígidamente a un sujeto explícito en español.
theological_decisions:
- issue: Referente implícito de αὐτῷ en un contexto de sabiduría divina
  english_pob_reading: Rendered as 'to him,' with the referent understood as God from the surrounding context.
  chosen_spanish_reading: Se deja el referente implícito en la forma pronominal/dativa con el sentido de que el conocimiento pertenece a Dios por el contexto.
  alternative_spanish_readings:
  - conocido por él
  - era conocido por Dios
  rationale: El texto no nombra a Dios explícitamente en la cláusula; conviene conservar esa economía mientras el contexto identifica al referentе. Evita importar una glosa innecesaria al verso.
  doctrine_reference: Preservar la tensión textual sin resolverla de forma explicativa fuera del versículo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Sirach 23:20 y el criterio del POB inglés de preservar la estatividad del perfecto ἔγνωσται y la relación temporal antes/después, sin introducir una paráfrasis expansiva.
  spanish_consistency_notes:
  - Se usa 'Dios' solo en la nota teológica, no en el texto base, para respetar el referente implícito del griego.
  - '''Creadas'' conserva el campo semántico de κτίζω sin optar por ''formadas'', que sería más interpretativo.'
  - '''Así también'' mantiene el paralelismo con οὕτως καὶ.'
  - La nota[a] ofrece la alternativa donde ἔγνωσται se vierte como 'lo conocía', siguiendo el margen inglés sobre la ambigüedad legítima del perfecto griego.
