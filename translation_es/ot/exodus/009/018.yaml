translation:
  language: es
  text: He aquí[a], como a esta hora mañana haré llover granizo muy pesado, como nunca ha habido en Egipto desde el día en que fue fundado[b] hasta ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a esta hora mañana».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «desde el día en que fue establecido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Observa
  - Ciertamente
  lexicon: HALOT
  rationale: La fórmula introduce una घोषणा solemne y deíctica. «He aquí» conserva el tono enfático y bíblico sin volverse artificiosa en español.
- source_word: מַמְטִיר
  english_pob_choice: I will rain down
  chosen_spanish: haré llover
  alternatives_spanish:
  - haré caer
  - mandaré llover
  - haré que llueva
  lexicon: HALOT
  rationale: El hifil expresa acción causativa directa. «Haré llover» conserva esa causalidad divina y suena natural en español, manteniendo la imagen de una lluvia enviada por Dios.
- source_word: כָּעֵת מָחָר
  english_pob_choice: about this time tomorrow
  chosen_spanish: mañana a esta hora
  alternatives_spanish:
  - aproximadamente a esta hora mañana
  - a esta hora de mañana
  - más o menos a esta misma hora mañana
  lexicon: HALOT
  rationale: La frase señala el mismo momento aproximado del día siguiente. En español, «mañana a esta hora» comunica bien la referencia temporal; la idea de aproximación queda implícita por el contexto y el כ.
- source_word: בָּרָד
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - hielo
  - pedrisco
  lexicon: HALOT
  rationale: «Granizo» es el término meteorológico estándar y preciso en español para בָּרָד.
- source_word: כָּבֵד מְאֹד
  english_pob_choice: very heavy
  chosen_spanish: muy pesado
  alternatives_spanish:
  - extremadamente severo
  - sumamente pesado
  - muy grave
  lexicon: HALOT
  rationale: Se preserva el valor literal de «pesado» para כָּבֵד y la intensificación de מְאֹד. En español, aplicado al granizo, «muy pesado» es claro y cercano al hebreo.
- source_word: אֲשֶׁר לֹא הָיָה כָמֹהוּ
  english_pob_choice: such as has never been
  chosen_spanish: cual nunca ha habido
  alternatives_spanish:
  - tal que nunca ha habido
  - como nunca ha habido
  - de la cual nunca ha habido
  lexicon: HALOT
  rationale: La cláusula relativa expresa una comparación absoluta con toda experiencia previa. «Cual nunca ha habido» mantiene el sentido superlativo y evita una paráfrasis excesiva.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - dentro de Egipto
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural del locativo.
- source_word: לְמִן הַיּוֹם הִוָּסְדָה
  english_pob_choice: from the day it was founded
  chosen_spanish: desde el día en que fue fundado
  alternatives_spanish:
  - desde el día en que fue establecido
  - desde que fue fundado
  - desde el día de su fundación
  lexicon: HALOT
  rationale: El niphal de הוּסד indica ser fundado/establecido. «Fue fundado» mantiene el pasivo y la concreción histórica. El español requiere un referente implícito neutro para Egipto como entidad.
- source_word: וְעַד עָתָּה
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta este momento
  - hasta hoy
  lexicon: HALOT
  rationale: Expresa la continuidad temporal hasta el presente de forma natural y fiel.
theological_decisions:
- issue: Causación divina explícita en la plaga
  english_pob_reading: God directly declares, 'I will rain down,' preserving explicit divine causation.
  chosen_spanish_reading: 'Dios habla en primera persona y afirma: «haré llover», manteniendo la agencia divina directa.'
  alternative_spanish_readings:
  - caerá granizo
  - vendrá granizo
  - enviaré granizo
  rationale: El hifil con sujeto de primera persona no debe suavizarse a una pasiva o impersonal. La formulación elegida conserva que Yahvé es quien dispone y ejecuta la plaga.
  doctrine_reference: Éxodo 9:18; providencia y soberanía divina en el juicio
translation_notes:
  revision_awareness: 'La versión sigue de cerca el auditable English POB y el hebreo: conserva la apertura deíctica («He aquí»), la causalidad divina explícita («haré llover») y el matiz de aproximación temporal de כָּעֵת מָחָר. No se introdujeron cambios doctrinales ni estilísticos no sustentados por la fuente.'
  spanish_consistency_notes:
  - Se usa «granizo» para בָּרָד, conforme al uso meteorológico estándar.
  - Se mantiene «Yahvé» cuando el texto fuente lo requiera explícitamente; en este versículo no aparece el tetragrámaton en forma escrita.
  - «Fue fundado» conserva el pasivo del niphal y evita convertir a Egipto en agente.
  - No se sustituye la imagen de «pesado» por una paráfrasis interpretativa más débil.
