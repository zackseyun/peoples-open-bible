review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y sigue la auditoría inglesa en los puntos principales: בְּגַפּוֹ como modismo de entrar/salir sin acompañantes, el paralelismo jurídico entra/sale, y בַּעַל אִשָּׁה con sentido idiomático de hombre casado. Sin embargo, la nota b en español no preserva fielmente la lógica de la nota inglesa: presenta «si está casado» como alternativa idiomática, cuando esa ya es la lectura principal del texto, y omite la alternativa más transparente al hebreo.'
  spanish_quality_summary: 'El español es claro y natural. «Si entra solo, solo saldrá» y «su esposa saldrá con él» suenan bien en registro bíblico moderno. El único problema real está en las notas: la nota a mezcla español y hebreo de forma algo torpe, y la nota b es redundante y poco útil porque repite exactamente el texto principal en vez de aportar la alternativa formal documentada.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. «Esposa» es aceptable para אִשְׁתּוֹ en este contexto, aunque «mujer» también sería posible; no hace falta cambiarlo. «Está casado» es una buena aplicación contextual del valor idiomático de בַּעַל אִשָּׁה.
  issues:
  - severity: medium
    issue: La nota b no conserva la alternativa léxica pertinente.
    rationale: 'La auditoría inglesa conserva como texto principal «if he is married» y deja constancia de una alternativa más formal/literal. En español, la nota dice «O, más idiomáticamente: “si está casado”», pero eso no añade información porque ya es exactamente el texto principal.'
  - severity: low
    issue: La redacción de la nota a puede mejorarse para sonar más natural en español.
    rationale: '«Hebreo: “con su גַּף”» es comprensible, pero «Literalmente, “con su גַּף”» o una explicación equivalente es más idiomática y precisa para una nota léxica.'
  revised_spanish_text: Si entra[a] solo, solo saldrá; si está casado[b], su esposa saldrá con él.
  revised_footnotes:
  - marker: a
    text: Literalmente, «con su גַּף»; es un modismo hebreo que significa que entró solo, sin compañía.
    reason: lexical_alternative
  - marker: b
    text: Más literalmente, «si es marido de una mujer», es decir, «si está casado».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene intacto el texto principal porque es fiel, claro y natural. Solo se corrigen las notas para que preserven mejor la documentación léxica del POB: la nota a se formula con español más natural, y la nota b ahora registra la alternativa más literal del hebreo en lugar de repetir inútilmente la redacción principal.'
