  spanish_consistency_notes:
  - Se mantiene 'Yahvé' únicamente cuando el texto fuente lo requiere; aquí no aparece.
  - '''Hijo de'' se conserva de forma uniforme en toda la cadena genealógica para evitar ambigüedad.'
  - Los nombres propios se transliteran sin adaptar a grafías tradicionales ajenas al hebreo de este versículo.
