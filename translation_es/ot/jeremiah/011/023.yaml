translation:
  language: es
  text: Y no les quedará remanente, porque traeré desastre sobre los hombres de Anatot en el año de su castigo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el año de su visitación». El término hebreo puede significar «visitación» en sentido neutral, pero aquí se refiere a una visitación punitiva; por eso se traduce «castigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁאֵרִית
  english_pob_choice: And no remnant will remain
  chosen_spanish: Y no quedará remanente
  alternatives_spanish:
  - Y no habrá remanente
  - Y no quedará ningún sobreviviente
  lexicon: HALOT
  rationale: שְׁאֵרִית designa lo que queda, un remanente. «Remanente» conserva el vínculo léxico y profético; «quedará» comunica bien el valor idiomático de היה en este contexto.
- source_word: לֹא תִהְיֶה לָהֶם
  english_pob_choice: will remain for them
  chosen_spanish: quedará ... para ellos
  alternatives_spanish:
  - será para ellos
  - les quedará
  lexicon: HALOT
  rationale: La construcción hebrea equivale literalmente a «no será para ellos». En español, «quedará para ellos» refleja la idea de que no les quedará nada de remanente.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del juicio anunciado, y «porque» es natural y claro en español bíblico contemporáneo.
- source_word: אָבִיא
  english_pob_choice: I will bring
  chosen_spanish: traeré
  alternatives_spanish:
  - haré venir
  - traeré sobre ellos
  lexicon: HALOT
  rationale: El hifil de בוא expresa causar que algo venga. «Traeré» conserva ese valor de acción judicial sin sobrecargar la frase.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - mal
  lexicon: HALOT
  rationale: En un oráculo de juicio, רָעָה refiere calamidad, no mal moral. «Desastre» comunica con claridad la aflicción enviada sin sugerir maldad en Dios.
- source_word: אֶל אַנְשֵׁי עֲנָתוֹת
  english_pob_choice: on the men of Anathoth
  chosen_spanish: sobre los hombres de Anatot
  alternatives_spanish:
  - contra los hombres de Anatot
  - sobre la gente de Anatot
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». «Sobre» reproduce bien la carga de juicio de אֶל en este contexto, y «hombres de Anatot» mantiene la precisión del hebreo.
- source_word: שְׁנַת פְּקֻדָּתָם
  english_pob_choice: in the year of their punishment
  chosen_spanish: en el año de su castigo
  alternatives_spanish:
  - en el año de su visitación
  - en el tiempo de su castigo
  lexicon: HALOT
  rationale: פְּקֻדָּה puede significar «visitación» o «castigo» según el contexto. Aquí el sentido es punitivo, por eso se elige «castigo»; «año de su castigo» conserva la estructura temporal de שְׁנַת.
theological_decisions:
- issue: Sentido de רָעָה cuando Yahvé es el sujeto implícito de «traeré»
  english_pob_reading: Rendered as 'disaster' rather than 'evil'
  chosen_spanish_reading: «desastre» en lugar de «mal»
  alternative_spanish_readings:
  - mal
  - calamidad
  rationale: En este anuncio de juicio, רָעָה describe una calamidad enviada, no una maldad moral atribuida a Dios. «Desastre» preserva la fuerza punitiva del texto sin importar una lectura doctrinal ajena.
  doctrine_reference: Principio de primacía del texto original; distinguir mal moral de calamidad judicial.
- issue: Alcance de אַנְשֵׁי עֲנָתוֹת
  english_pob_reading: Rendered specifically as 'the men of Anathoth'
  chosen_spanish_reading: «los hombres de Anatot»
  alternative_spanish_readings:
  - la gente de Anatot
  - los habitantes de Anatot
  rationale: El hebreo es explícitamente masculino plural, y el contexto inmediato señala a los conspiradores. Se mantiene esa precisión en vez de neutralizar el término.
  doctrine_reference: Principio de precisión léxica y fidelidad al género gramatical cuando el texto lo especifica.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: el texto fuente y el audit trail inglés muestran alta concordancia, y no se requieren cambios sustantivos respecto de la lectura base. La decisión clave sigue siendo la misma: פְּקֻדָּה se entiende aquí como visitación punitiva, por lo que se vierte «castigo».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma del proyecto cuando el contexto alude al juicio divino, aunque aquí el hebreo no nombra explícitamente el tetragrámaton.
  - «Remanente» conserva el término profético clásico sin sustituirlo por una paráfrasis.
  - «Hombres de Anatot» respeta la forma masculina plural del hebreo.
  - «Desastre» evita la posible confusión de traducir רָעָה como mal moral.
  - La nota al pie marca la alternativa semántica legítima de פְּקֻדָּה sin borrar la decisión contextual principal.
