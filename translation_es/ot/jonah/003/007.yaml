base_translation:
  language: en
  yaml_path: translation/ot/jonah/003/007.yaml
  text: 'And he proclaimed and said in Nineveh[a], by decree of the king and his nobles: “Let neither man nor beast, herd nor flock, taste anything. Let them not graze[b], and let them not drink water.”'
  footnotes:
  - marker: a
    text: Or 'the king and his nobles' or 'the king and his officials.' The Hebrew literally says 'the king and his great ones.'
    reason: lexical_alternative
  - marker: b
    text: '''Man'' renders Hebrew adam here as a collective term for human beings, in contrast with animals; alternatively, ''humankind.'''
    reason: lexical_alternative
