translation:
  language: es
  text: 'Pero Isaías exclama acerca de Israel[a]: “Aunque el número de los hijos de Israel sea como la arena del mar[b], solo el remanente será salvo[c].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Israel» o «los israelitas». El griego dice «los hijos de Israel», una designación tradicional de pacto.
    reason: lexical_alternative
  - marker: b
    text: O «si el número de los hijos de Israel es como la arena del mar». El condicional griego puede traducirse de modo más literal, aunque aquí tiene fuerza concesiva en el contexto.
    reason: alternative_reading
  - marker: c
    text: O «será librado». La expresión refleja el eco de la profecía de Isaías sobre un remanente que sobrevive.
    reason: cross_reference
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: En español, «Pero» conserva el leve contraste y la transición retórica que introduce la cita profética mejor que una simple coordinación.
- source_word: κράζει
  english_pob_choice: cries out
  chosen_spanish: exclama
  alternatives_spanish:
  - clama
  - grita
  - proclama
  lexicon: BDAG
  rationale: «Exclama» transmite el presente vívido y la fuerza expresiva de κράζω sin sonar excesivamente coloquial en español bíblico.
- source_word: ὑπὲρ τοῦ Ἰσραήλ
  english_pob_choice: concerning Israel
  chosen_spanish: acerca de Israel
  alternatives_spanish:
  - sobre Israel
  - en cuanto a Israel
  - en favor de Israel
  lexicon: BDAG
  rationale: Aquí ὑπέρ funciona en el sentido de asunto o referente de la declaración profética; «acerca de» evita la lectura de intercesión que el contexto no exige.
- source_word: τῶν υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los descendientes de Israel
  - los israelitas
  - los hijos varones de Israel
  lexicon: BDAG
  rationale: La fórmula conserva el valor corporativo y de pacto del giro bíblico sin forzar una neutralización innecesaria; «hijos» es natural en español bíblico y fiel al paralelismo.
- source_word: Ἐὰν ᾖ
  english_pob_choice: Though ... is
  chosen_spanish: Aunque ... sea
  alternatives_spanish:
  - Si ... es
  - Aun si ... sea
  lexicon: BDAG
  rationale: El griego condicional tiene fuerza concesiva en esta cita; «Aunque» expresa mejor la lógica del contraste que un condicional rígido en español.
- source_word: ὡς ἡ ἄμμος τῆς θαλάσσης
  english_pob_choice: like the sand of the sea
  chosen_spanish: como la arena del mar
  alternatives_spanish:
  - como la arena de la playa
  - como la arena junto al mar
  lexicon: BDAG
  rationale: Se mantiene la imagen escritural reconocible con español natural y sobrio.
- source_word: τὸ ὑπόλειμμα
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el resto
  - los que queden
  lexicon: BDAG
  rationale: «Remanente» preserva el término técnico profético y paulino para el grupo sobreviviente preservado por Dios.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvo
  alternatives_spanish:
  - será rescatado
  - será liberado
  - será preservado
  lexicon: BDAG
  rationale: «Será salvo» mantiene el peso soteriológico de Romanos y su resonancia bíblica, mientras que «liberado» quedaría demasiado interpretativo en este contexto.
theological_decisions:
- issue: Alcance de ὑπὲρ τοῦ Ἰσραήλ
  english_pob_reading: concerning Israel
  chosen_spanish_reading: acerca de Israel
  alternative_spanish_readings:
  - en favor de Israel
  - por Israel
  rationale: La frase introduce una cita profética dirigida al tema de Israel; traducirla como «en favor de» sugeriría intercesión o mediación que no está explícita en el texto griego.
  doctrine_reference: Evitar añadir relaciones de mediación no declaradas por el texto
- issue: Fuerza de Ἐὰν ᾖ en la cita
  english_pob_reading: Though ... is
  chosen_spanish_reading: Aunque ... sea
  alternative_spanish_readings:
  - Si ... es
  - Aun si ... sea
  rationale: 'La cita no pretende plantear una condición hipotética ordinaria, sino subrayar la paradoja: una multitud innumerable puede, aun así, dejar solo un remanente salvo. «Aunque» conserva esa tensión sin resolverla.'
  doctrine_reference: Preservar la tensión salvífico-histórica de Romanos 9–11
- issue: Sentido de σωθήσεται
  english_pob_reading: will be saved
  chosen_spanish_reading: será salvo
  alternative_spanish_readings:
  - será liberado
  - será preservado
  rationale: En el marco paulino de Romanos 9–11, «salvo» es la opción más natural y teológicamente amplia; mantiene la posibilidad de ecos de liberación profética sin reducir el sentido a mera supervivencia física.
  doctrine_reference: Ortodoxia cristiana histórica; evitar reducir o estrechar el alcance del verbo
- issue: Término del grupo restante
  english_pob_reading: the remnant
  chosen_spanish_reading: el remanente
  alternative_spanish_readings:
  - el resto
  - los sobrevivientes
  rationale: «Remanente» es el término bíblico establecido para el grupo preservado por Dios y reproduce mejor la terminología profética que «resto», demasiado genérico.
  doctrine_reference: Isaías y la teología paulina del remanente
translation_notes:
  revision_awareness: 'El borrador sigue el paso de revisión más reciente sin cambios sustanciales, en concordancia con el estado de alta coincidencia del control cruzado. Se mantuvieron las decisiones clave de la auditoría inglesa: valor concesivo de Ἐὰν ᾖ, ὑπέρ como referencia temática y σωθήσεται como salvación; además, se preservó el lenguaje técnico de «remanente».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece.
  - «Mesías» no aplica en este versículo.
  - Se mantiene la distinción entre «hijos de Israel» y una paráfrasis neutral, con nota alternativa para lectores que prefieran «israelitas».
  - El orden y la puntuación siguen una cadencia bíblica legible en español moderno sin depender de fórmulas eclesiásticas arcaicas.
