translation:
  language: es
  text: 'Porque así ha dicho Yahvé: Mira[a], yo estoy arrojando con honda a los habitantes del país[b] en esta ocasión, y los angustiaré para que lo encuentren[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». La expresión hebrea marca inmediatez y énfasis.
    reason: lexical_alternative
  - marker: b
    text: O «los habitantes de la tierra», si la frase se toma en un sentido más amplio.
    reason: alternative_reading
  - marker: c
    text: La cláusula final es difícil. También puede entenderse como «para que sean hallados», «para que lo sientan» o «para que queden atrapados».
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: mantener la referencia del pacto con una forma transliterada y reconocible en español, sin ocultarla mediante una sustitución reverencial.'
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: Miren, yo estoy
  alternatives_spanish:
  - He aquí, yo estoy
  - Vean, yo estoy
  lexicon: HALOT
  rationale: La partícula marca inmediatez y énfasis profético. En español, "Miren" conserva esa fuerza exhortativa; "yo estoy" refleja el valor enfático y progresivo de la forma que sigue.
- source_word: קוֹלֵעַ
  english_pob_choice: slinging out
  chosen_spanish: arrojando con honda
  alternatives_spanish:
  - lanzando con honda
  - hondeando fuera
  - arrojando
  lexicon: HALOT
  rationale: El verbo evoca el gesto de la honda, no solo una expulsión genérica. "Arrojando con honda" preserva la imagen concreta y el matiz violento del hebreo.
- source_word: יוֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los habitantes de la tierra
  - los moradores del país
  - los habitantes del país
  lexicon: HALOT
  rationale: En el contexto inmediato de Jeremías, אֶרֶץ se entiende como "tierra" en el sentido del territorio habitado; se mantiene la amplitud del término y la referencia contextual sin forzar "mundo".
- source_word: בַּפַּעַם הַזֹּאת
  english_pob_choice: at this time
  chosen_spanish: en esta ocasión
  alternatives_spanish:
  - en este momento
  - ahora
  - en este golpe
  lexicon: HALOT
  rationale: La expresión señala el presente acto de juicio. "En esta ocasión" es natural en español y conserva el valor temporal sin añadir interpretación.
- source_word: וַהֲצֵר֥וֹתִי
  english_pob_choice: I will distress them
  chosen_spanish: los angustiaré
  alternatives_spanish:
  - los afligiré
  - los apretaré
  - los oprimiré
  lexicon: HALOT
  rationale: La forma hifil transmite causar constricción o aflicción. "Angustiar" comunica bien el efecto de presión y aflicción sin restringirlo indebidamente a un solo escenario militar.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  - para ellos
  lexicon: HALOT
  rationale: En español, el verbo transitivo con objeto directo requiere pronombre átono de objeto directo; se evita una estructura más interpretativa.
- source_word: לְמַעַן יִמְצָאוּ
  english_pob_choice: so that they may find it
  chosen_spanish: para que encuentren[d]
  alternatives_spanish:
  - para que lo encuentren
  - para que sean hallados
  - para que lo sientan
  lexicon: HALOT
  rationale: Se preserva la ambigüedad del hebreo. El verbo מצא puede significar "hallar/ encontrar" o, en pasiva implícita por el contexto, quedar alcanzados; el español mantiene la tensión sin resolverla demasiado.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - mundo
  - país
  rationale: El contexto del oráculo es el juicio sobre Judá y Jerusalén; "tierra" conserva el alcance contextual sin universalizar indebidamente el juicio.
  doctrine_reference: Translation philosophy §1, §5
- issue: Ambigüedad de לְמַעַן יִמְצָאוּ
  english_pob_reading: so that they may find it
  chosen_spanish_reading: para que encuentren
  alternative_spanish_readings:
  - para que sean hallados
  - para que lo sientan
  - para que queden atrapados
  rationale: La cláusula final es difícil. Se deja una forma breve y abierta para no borrar la tensión del hebreo; la nota señala la posible lectura alternativa relacionada con quedar atrapados o alcanzados.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que prefirió un sentido más directo para וַהֲצֵרֹתִי y mantuvo la dificultad de לְמַעַן יִמְצָאוּ. La versión española conserva esa apertura, pero opta por una formulación natural que no aplana la metáfora de la honda ni resuelve de antemano el final ambiguo.
  spanish_consistency_notes:
  - Se usa Yahvé conforme al estándar del proyecto para יְהוָה.
  - Se mantiene un tono bíblico contemporáneo y comprensible, evitando calcos duros.
  - Se preserva la metáfora de la honda en lugar de una expulsión genérica.
  - La ambigüedad final se marca con nota para no borrar el problema textual/semántico.
  - '"Tierra" se usa aquí por el contexto de juicio local, no como afirmación universal.'
