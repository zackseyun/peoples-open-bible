translation:
  language: es
  text: Y Canaán engendró a Sidón[a], su primogénito, y a Het[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede transliterarse «Zidón», siguiendo una transliteración inglesa más antigua del nombre.
