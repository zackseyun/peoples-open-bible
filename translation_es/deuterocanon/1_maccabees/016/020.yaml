translation:
  language: es
  text: Y envió a otros para apoderarse de Jerusalén y del monte del templo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse más literalmente como «el monte del santuario»; la forma «monte del templo» refleja mejor el uso idiomático de la referencia topográfica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑτέρους
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - algunos otros
  - otras personas
  lexicon: LSJ
  rationale: ἑτέρους indica un grupo adicional distinto de los ya mencionados. En español, «otros» conserva esa indefinición plural sin añadir matices innecesarios.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: El verbo narrativo expresa el envío de personas con una misión. «Envió» es natural, claro y suficientemente formal en español bíblico contemporáneo.
- source_word: καταλαβέσθαι
  english_pob_choice: to seize
  chosen_spanish: apoderarse de
  alternatives_spanish:
  - capturar
  - tomar por la fuerza
  lexicon: LSJ
  rationale: En este contexto militar-político, el infinitivo sugiere tomar control hostilmente. «Apoderarse de» conserva la acción de toma y el matiz de dominio mejor que una formulación neutral.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: standard proper noun
  rationale: Nombre propio estándar en español.
- source_word: τὸ ὄρος τοῦ ἱεροῦ
  english_pob_choice: the temple mount
  chosen_spanish: el monte del templo
  alternatives_spanish:
  - el monte del santuario
  - el monte del templo sagrado
  lexicon: LSJ
  rationale: El griego dice literalmente «el monte del santuario». Dado que la revisión inglesa optó por «temple mount» por naturalidad, en español «monte del templo» comunica de forma idiomática esa referencia topográfica sin perder la relación con ἱερόν.
translation_notes:
  revision_awareness: El inglés auditado pasó de «the hill of the sanctuary» a «the temple mount» para ganar naturalidad e identificar mejor la referencia topográfica. La versión española sigue ese mismo criterio, manteniendo al mismo tiempo la base griega del sintagma.
  spanish_consistency_notes:
  - Se mantiene un estilo narrativo bíblico sobrio y moderno.
  - Se evitó «templo» a secas porque el griego especifica una elevación/topónimo, no solo el edificio.
  - «Apoderarse de» preserva el matiz hostil de καταλαβέσθαι sin sobretraducir el método de captura.
