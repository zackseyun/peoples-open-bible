  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: contraste enfático («Pero ustedes»), abandono de Yahvé, servicio a otros dioses y consecuencia judicial. Sin embargo, se aparta de una decisión léxica importante del POB en לְהוֹשִׁיעַ, donde el inglés auditado eligió «save» y preservó «deliver/rescue» en nota. El español invierte esa prioridad al poner «libraré» en el texto principal y dejar «salvar» en nota.'
  spanish_quality_summary: El español es claro, natural y digno. «Pero ustedes me han abandonado y han servido a otros dioses; por tanto...» fluye bien. La única reparación necesaria es alinear mejor el verbo principal con la decisión auditada del POB y ajustar la nota para que preserve las alternativas adecuadas en español.
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías/etc. La cuestión terminológica relevante es ישע: para mantener la racionalidad lexical y teológica documentada por el POB, el texto principal debe preferir «salvaré» y la nota debe conservar «libraré» y «rescataré» como alternativas contextuales.'
  issues:
