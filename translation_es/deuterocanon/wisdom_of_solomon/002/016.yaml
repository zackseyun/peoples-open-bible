  yaml_path: translation/deuterocanon/wisdom_of_solomon/002/016.yaml
  text: We were considered by him to be counterfeit[a], and he keeps away from our ways as from uncleannesses; he calls the end of the righteous blessed[c][b], and boasts that God is his father.
