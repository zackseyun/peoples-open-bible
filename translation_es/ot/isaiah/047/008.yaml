translation:
  language: es
  text: 'Y ahora[a], escucha esto, tú amante del lujo, que te sientas con seguridad, que dices en tu corazón: “Yo soy, y no hay nadie además de mí[b]. No me sentaré como viuda, ni conoceré la pérdida de hijos[c]”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “delicada”, “mimada” o “voluptuosa”. El hebreo describe una autoindulgencia lujosa.
    reason: lexical_alternative
  - marker: b
    text: O “Yo soy, y no hay nada más”. La frase expresa una pretensión arrogante de supremacía sin rival.
    reason: alternative_reading
  - marker: c
    text: Hebreo “conocer la pérdida de hijos”; es decir, experimentar la pérdida de hijos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: La partícula introduce un giro exhortativo y confrontativo; en español, “Ahora” es natural y fiel. “Y ahora” suena más coordinado que enfático, mientras que “Ahora pues” añade un matiz más interpretativo.
- source_word: שִׁמְעִי זֹאת
  english_pob_choice: hear this
  chosen_spanish: escucha esto
  alternatives_spanish:
  - oye esto
  - escucha esto ahora
  lexicon: HALOT
  rationale: El imperativo profético pide atención directa. “Escucha esto” conserva el tono imperativo y suena más solemne y natural que un calco rígido.
- source_word: עֲדִינָה
  english_pob_choice: lover of luxury
  chosen_spanish: amante del lujo
  alternatives_spanish:
  - delicada
  - mimada
  - voluptuosa
  lexicon: HALOT
  rationale: El hebreo describe suavidad, delicadeza o vida lujosa autoindulgente. Siguiendo la decisión inglesa auditada, “amante del lujo” expresa mejor el matiz moral y social que un adjetivo más literal pero potencialmente ambiguo.
- source_word: הַיּוֹשֶׁבֶת לָבֶטַח
  english_pob_choice: who sit securely
  chosen_spanish: que te sientas con seguridad
  alternatives_spanish:
  - que habitas con seguridad
  - que vives segura
  - que te sientas en seguridad
  lexicon: HALOT
  rationale: La imagen de “sentarse” se preserva para mantener el paralelismo con el final del versículo. “Con seguridad” expresa לָבֶטַח sin volverlo demasiado interpretativo.
- source_word: בִּלְבָבָהּ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - dentro de ti
  - en tu interior
  lexicon: HALOT
  rationale: La expresión idiomática es perfectamente natural en español y conserva el valor introspectivo de la frase.
- source_word: אֲנִי וְאַפְסִי עוֹד
  english_pob_choice: I am, and there is no one besides me
  chosen_spanish: Yo soy, y no hay nadie además de mí
  alternatives_spanish:
  - Yo soy, y no hay nada más
  - Yo soy, y no hay nadie fuera de mí
  lexicon: HALOT
  rationale: Se mantiene la arrogante autoafirmación personal del hebreo, tal como la lectura inglesa auditada. “Nadie además de mí” conserva la tensión teológica y la contundencia del exclusivismo sin resolverla.
- source_word: לֹא אֵשֵׁב אַלְמָנָה
  english_pob_choice: I will not sit as a widow
  chosen_spanish: No me sentaré como viuda
  alternatives_spanish:
  - No viviré como viuda
  - No quedaré como viuda
  lexicon: HALOT
  rationale: “Sentarse” reproduce el verbo hebreo y enlaza con “que te sientas con seguridad”. “Como viuda” conserva el estado figurado de la ciudad/personificación.
- source_word: וְלֹא אֵדַע שְׁכוֹל
  english_pob_choice: nor will I know the loss of children
  chosen_spanish: ni conoceré la pérdida de hijos
  alternatives_spanish:
  - ni experimentaré la pérdida de hijos
  - ni sabré lo que es perder hijos
  lexicon: HALOT
  rationale: “Conocer” mantiene la fuerza experiencial del hebreo אֵדַע, y “pérdida de hijos” traduce con claridad concreta שְׁכוֹל. Se conserva la relación entre conocimiento y experiencia sin suavizarla.
theological_decisions:
- issue: La autoafirmación arrogante “Yo soy, y no hay nadie además de mí”
  english_pob_reading: I am, and there is no one besides me
  chosen_spanish_reading: Yo soy, y no hay nadie además de mí
  alternative_spanish_readings:
  - Yo soy, y no hay nada más
  - Yo soy, y no existe nadie fuera de mí
  rationale: La frase reproduce deliberadamente un lenguaje de supremacía exclusiva; en este contexto se pone en labios de Babilonia como parodia arrogante. La traducción española conserva esa tensión teológica sin explicarla dentro del verso.
  doctrine_reference: Preservar la tensión teológica sin resolverla en el texto principal.
translation_notes:
  revision_awareness: La versión inglesa auditada mantuvo su lectura final sin cambios tras revisión; no hubo correcciones pendientes en el pasaje y la alta concordancia del control cruzado confirma estabilidad textual y de decisión.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preserva el paralelismo verbal entre “sentarse” y “sentarse como viuda”, siguiendo la fuerza del hebreo y de la versión inglesa auditada.
  - Se evita sustituir la autoafirmación por una paráfrasis explicativa; la tensión retórica permanece en el texto principal y se documenta en nota.
