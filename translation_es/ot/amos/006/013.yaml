translation:
  language: es
  text: 'ustedes que se alegran por cosas sin valor[a], y que dicen[b]: «¿No nos hemos apoderado de cuernos con nuestra propia fuerza?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «por nada» también puede aludir por juego de palabras al nombre propio Lo-debar, insinuando alegría por una ciudad conquistada cuyo nombre suena a «nada» o «ninguna cosa».
    reason: lexical_alternative
  - marker: b
    text: 'O posiblemente: «¿No hemos tomado Karnaim para nosotros con nuestra propia fuerza?». El hebreo traducido «cuernos» también puede evocar Karnaim, probablemente con un juego de palabras entre poder militar y conquista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׂמֵחִים
  english_pob_choice: you who rejoice
  chosen_spanish: ustedes que se alegran
  alternatives_spanish:
  - los que se alegran
  - ustedes que están alegres
  lexicon: HALOT
  rationale: El participio plural mantiene la acusación directa del contexto profético; en español, el vocativo con «ustedes que» conserva esa interpelación sin sonar forzado.
- source_word: לְלֹא דָבָר
  english_pob_choice: over nothing
  chosen_spanish: por nada
  alternatives_spanish:
  - sobre nada
  - por una cosa que no es nada
  - por Lo-debar
  lexicon: HALOT
  rationale: La expresión hebrea comunica algo vano o sin valor. «Por nada» es idiomático en español y preserva el sentido básico; la posible alusión a Lo-debar se deja en nota.
- source_word: הָאֹמְרִים
  english_pob_choice: who say
  chosen_spanish: ustedes que dicen
  alternatives_spanish:
  - que dicen
  - diciendo
  lexicon: HALOT
  rationale: Mantiene el paralelo con el participio anterior y conserva el tono de denuncia directa.
- source_word: הֲלוֹא
  english_pob_choice: Have we not
  chosen_spanish: ¿No hemos... ?
  alternatives_spanish:
  - ¿Acaso no hemos... ?
  - ¿No es verdad que hemos... ?
  lexicon: HALOT
  rationale: La pregunta retórica se expresa naturalmente con «¿No hemos...?» en español, conservando el matiz de autoconfianza altiva.
- source_word: בְחָזְקֵנוּ
  english_pob_choice: by our own strength
  chosen_spanish: con nuestra propia fuerza
  alternatives_spanish:
  - por nuestra propia fuerza
  - con nuestra fuerza
  lexicon: HALOT
  rationale: El sustantivo puede ser «fuerza» o «poder». «Con nuestra propia fuerza» conserva el énfasis del posesivo y el tono de jactancia.
- source_word: לָקַחְנוּ
  english_pob_choice: taken
  chosen_spanish: tomado
  alternatives_spanish:
  - capturado
  - adquirido
  - conquistado
  lexicon: HALOT
  rationale: «Tomado» es suficientemente amplio para la acción de obtener por conquista sin sobreespecificar el modo; permite mantener la ambigüedad militar del contexto.
- source_word: קַרְנָיִם
  english_pob_choice: horns
  chosen_spanish: cuernos
  alternatives_spanish:
  - Karnaim
  - fuerza
  lexicon: HALOT
  rationale: Aunque el hebreo puede aludir al topónimo Karnaim, el sentido literal es «cuernos», imagen habitual de poder. En español, «cuernos» preserva la metáfora y deja abierta la posible alusión geográfica.
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el pasaje quedó en alta concordancia y sin objeciones textuales o de traducción adicionales. Por eso la propuesta española sigue de cerca la decisión léxica del POB en inglés, conservando las dos ambigüedades señaladas en nota.'
  spanish_consistency_notes:
  - Se usa el tratamiento plural «ustedes» para reflejar el participio plural hebreo con tono profético directo.
  - «Fuerza» traduce el campo semántico de חָזְקֵנוּ y evita una paráfrasis más interpretativa.
  - Se mantiene «cuernos» en el texto principal para respetar la imagen literal y permitir el juego de palabras con Karnaim en la nota.
  - La puntuación con dos puntos antes de la cita reproduce la transición entre la acusación descriptiva y la jactancia citada.
