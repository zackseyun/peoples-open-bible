id: ISA.9.8
reference: Isaiah 9:8
source:
  edition: WLC
  text: וְ/יָדְעוּ֙ הָ/עָ֣ם כֻּלּ֔/וֹ אֶפְרַ֖יִם וְ/יוֹשֵׁ֣ב שֹׁמְר֑וֹן בְּ/גַאֲוָ֛ה וּ/בְ/גֹ֥דֶל לֵבָ֖ב לֵ/אמֹֽר׃
translation:
  text: And all the people will know—Ephraim and the inhabitants of Samaria—who say in pride and in arrogance of heart,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'in greatness of heart.' Here the idiom carries the sense of proud self-exaltation, hence 'arrogance of heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: And ... will know
  alternatives:
  - And ... knew
  - And ... shall know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries a future/resultative sense in English. Rendering as future fits the following quoted boast in v. 9 and the prophetic announcement context better than a simple past.
- source_word: הָעָם כֻּלּוֹ
  chosen: all the people
  alternatives:
  - the whole people
  - all the nation
  lexicon: HALOT
  rationale: Combines the noun with the suffixed כֻּלּוֹ for totality. 'All the people' is natural English and preserves the comprehensiveness.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - the tribe of Ephraim
  - Israel
  lexicon: HALOT
  rationale: Proper name is transliterated per project philosophy. In context it stands metonymically for the northern kingdom, but the text itself names Ephraim, so the transliteration is retained.
- source_word: וְיוֹשֵׁב שֹׁמְרוֹן
  chosen: and the inhabitants of Samaria
  alternatives:
  - and the one dwelling in Samaria
  - and those who dwell in Samaria
  lexicon: HALOT
  rationale: The singular participle with collective force is best rendered idiomatically in English as a plural collective, 'the inhabitants of Samaria.' This preserves the sense without awkward singular English.
- source_word: בְּגַאֲוָה
  chosen: in pride
  alternatives:
  - with pride
  - in haughtiness
  lexicon: HALOT
  rationale: גַּאֲוָה denotes pride/exaltation. 'In pride' fits the paired prepositional phrases and keeps the moral tone.
- source_word: וּבְגֹדֶל לֵבָב
  chosen: and in arrogance of heart
  alternatives:
  - and in greatness of heart
  - and in stubbornness of heart
  - and in proudness of heart
  lexicon: HALOT
  rationale: Literally 'in greatness of heart,' but in this context the idiom conveys proud self-exaltation rather than positive largeness. 'Arrogance of heart' communicates the negative force clearly in modern English.
- source_word: לֵאמֹר
  chosen: who say
  alternatives:
  - saying
  - to say
  lexicon: HALOT
  rationale: Introduces the content of the people's boast in the next verse. Because English punctuation can carry the continuation, 'who say' smoothly links the relative description to the forthcoming quotation.
