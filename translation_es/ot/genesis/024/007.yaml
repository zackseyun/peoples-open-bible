revisions:
- from: 'Yahvé[a], el Dios del cielo, que me tomó de la casa de mi padre y de la tierra de mi nacimiento, y que me habló y me juró, diciendo: «A tu descendencia le daré esta tierra»; él enviará su ángel delante de ti, y tú tomarás para mi hijo una mujer de allí.'
  to: 'Yahvé, el Dios del cielo, que me tomó de la casa de mi padre y de la tierra de mi nacimiento, y que me habló y me juró, diciendo: «A tu descendencia le daré esta tierra»; él enviará su ángel[a] delante de ti, y tomarás una esposa para mi hijo de allí.'
  rationale: Se corrige el anclaje de la nota para que recaiga sobre «ángel», que es el término al que realmente corresponde la alternativa léxica del hebreo מַלְאָךְ. Además, se mejora la naturalidad y precisión contextual de la última cláusula con «tomarás una esposa para mi hijo», que refleja mejor el sentido matrimonial de אִשָּׁה aquí y armoniza con el POB inglés.
