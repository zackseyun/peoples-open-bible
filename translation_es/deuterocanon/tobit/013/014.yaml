translation:
  language: es
  text: ¡Oh, dichosos los que te aman; se alegrarán por tu paz. Dichosos todos los que se entristecieron por tus aflicciones[a], porque se alegrarán en ti al ver toda tu gloria; y mi alma se alegrará para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «azotes», «plagas» o «castigos» para «aflicciones». El griego μάστιξ puede referirse literalmente a un látigo o, figuradamente, a golpes de sufrimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ μακάριοι
  english_pob_choice: Oh, blessed
  chosen_spanish: ¡Oh[a], dichosos
  alternatives_spanish:
  - ¡Oh, bienaventurados
  - ¡Oh, felices
  lexicon: BDAG
  rationale: Conservo el exclamativo ὦ y traduzco μακάριοι con un término reverente y natural en español. «Dichosos» comunica la proclamación solemne sin el peso eclesiástico de «bienaventurados» ni la ligereza de «felices».
- source_word: οἱ ἀγαπῶντές σε
  english_pob_choice: those who love you
  chosen_spanish: los que te aman
  alternatives_spanish:
  - los que te quieren
  - los que te tienen amor
  lexicon: BDAG
  rationale: El participio presente sustantivado expresa una acción continua o característica; «los que te aman» lo refleja de manera directa y fluida en español.
- source_word: χάρησονται
  english_pob_choice: they will rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - reirarán
  - gozarán
  lexicon: BDAG
  rationale: Para este futuro medio/deponente, «se alegrarán» transmite bien la acción futura de gozo y mantiene un registro natural en español. «Gozarán» es posible, pero menos idiomático aquí.
- source_word: ἐπὶ τῇ εἰρήνῃ σου
  english_pob_choice: over your peace
  chosen_spanish: por tu paz
  alternatives_spanish:
  - a causa de tu paz
  - sobre tu paz
  - en tu paz
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo indica ocasión o base del gozo. En español, «por tu paz» expresa con naturalidad ese motivo de alegría, preservando el foco en la restauración de Jerusalén.
- source_word: ὅσοι ἐλυπήθησαν
  english_pob_choice: all who were grieved
  chosen_spanish: todos los que se entristecieron
  alternatives_spanish:
  - todos los que se dolieron
  - todos los que lamentaron
  lexicon: BDAG
  rationale: La forma pasiva/aorista de λυπέω se refleja bien con una construcción reflexiva pasiva en español. «Se entristecieron» evita añadir matices funerarios que no exige el griego.
- source_word: ἐπὶ ταῖς μάστιξίν σου
  english_pob_choice: over your afflictions
  chosen_spanish: por tus aflicciones
  alternatives_spanish:
  - por tus azotes
  - por tus escarmientos
  - por tus castigos
  lexicon: BDAG
  rationale: μάστιξ puede significar literalmente azotes o, figuradamente, golpes de sufrimiento. Aquí, como en el análisis inglés, «aflicciones» comunica el padecimiento de la ciudad sin volver la imagen excesivamente corporal.
- source_word: θεασάμενοι
  english_pob_choice: when they see
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vean
  - habiendo visto
  lexicon: BDAG
  rationale: El participio aoristo se vierte de forma temporal e idiomática. «Al ver» conserva la relación temporal con el posterior gozo.
- source_word: πᾶσαν τὴν δόξαν σου
  english_pob_choice: all your glory
  chosen_spanish: toda tu gloria
  alternatives_spanish:
  - tu gloria entera
  - toda la gloria que es tuya
  lexicon: BDAG
  rationale: «Toda tu gloria» mantiene la fuerza totalizadora de πᾶσαν y el sentido de honor/restauración de δόξα con un español claro y solemne.
- source_word: εὐφρανθήσεται
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se gozará
  - estará alegre
  lexicon: BDAG
  rationale: Sigo la revisión inglesa que prefirió «rejoice» para mayor cercanía léxica con el vocabulario de gozo del versículo. «Se alegrará» es natural y consistente con los otros verbos de júbilo.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - para la eternidad
  lexicon: BDAG
  rationale: «Para siempre» es el equivalente idiomático más claro en español para duración perpetua.
- source_word: ἡ ψυχή μου
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo mismo
  - mi vida
  lexicon: BDAG
  rationale: «Mi alma» conserva el registro devocional y personal de ψυχή, como en la traducción inglesa, sin reducirlo a un simple «yo».
theological_decisions:
- issue: Referente de los pronombres femeninos de segunda persona
  english_pob_reading: Addressed to Jerusalem/Zion as a personified city
  chosen_spanish_reading: Dirigido a Jerusalén/Sion personificada como ciudad amada
  alternative_spanish_readings:
  - Dirigido al pueblo de Dios en general
  rationale: El contexto inmediato habla de tu paz, tus aflicciones y tu gloria; por eso el español conserva el trato directo en segunda persona y entiende el referente principal como Jerusalén personificada.
  doctrine_reference: Jerusalén como Sion personificada en la poesía bíblica; cf. lenguaje profético y salmódico de personificación urbana.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que unificó el campo semántico del gozo en el versículo, cambiando la cláusula final a «my soul will rejoice forever». Por eso el español usa también «se alegrará» en la clausula final, manteniendo la correspondencia con χαίρω/εὐφραίνω sin introducir un matiz distinto. Se preservó además la nota léxica sobre μάστιξ para no ocultar la alternativa literal documentada por el audit trail.
  spanish_consistency_notes:
  - Se conservó «dichosos» para μακάριοι como término reverente pero natural, coherente con el tono laudatorio del himno.
  - Se evitó «SEÑOR» u otra sustitución no motivada, porque el texto no contiene aquí el tetragrámaton ni κύριος.
  - Se mantuvo la segunda persona singular para la ciudad personificada, siguiendo el patrón del original y del audit trail inglés.
  - La secuencia de gozo se tradujo con verbos reflexivos naturales en español («se alegrarán», «se alegrará») para respetar el léxico de alegría sin mecanicismo.
