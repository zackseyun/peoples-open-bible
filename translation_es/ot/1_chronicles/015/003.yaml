    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente el infinitivo «subir» a «hacer subir» para reflejar mejor el valor causativo de לְהַעֲלוֹת y sonar más natural en español. Además, se reubica la nota del pronombre para que ancle donde realmente surge la ambigüedad («su lugar»), siguiendo más de cerca la práctica del inglés auditado.
