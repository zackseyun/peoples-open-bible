translation:
  language: es
  text: o con cualquier piedra con la cual alguien pudiera morir[a], sin ver, la dejó caer sobre él, de modo que murió, aunque no era su enemigo ni estaba buscando su daño—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sin ver». La frase indica falta de conocimiento o advertencia, no necesariamente ausencia total de vista.
    reason: lexical_alternative
lexical_decisions:
- source_word: א֣וֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - u
  lexicon: HALOT
  rationale: Mantiene la disyunción legal simple del hebreo en una secuencia casuística.
- source_word: בְ/כָל אֶ֜בֶן
  english_pob_choice: with any stone
  chosen_spanish: con cualquier piedra
  alternatives_spanish:
  - con toda piedra
  - con alguna piedra
  lexicon: HALOT
  rationale: El ב instrumental se expresa naturalmente con 'con'; 'cualquier' conserva el alcance amplio de כָּל sin sobreinterpretarlo.
- source_word: אֲשֶׁר יָמ֥וּת בָּ/הּ
  english_pob_choice: by which one could die
  chosen_spanish: con la cual alguien pudiera morir
  alternatives_spanish:
  - con la cual se pudiera morir
  - por la cual uno pudiera morir
  lexicon: HALOT
  rationale: El hebreo describe una piedra capaz de causar muerte. 'Alguien pudiera morir' conserva el valor genérico sin hacer masculina la referencia ni volverla demasiado explicativa.
- source_word: בְּ/לֹ֣א רְא֔וֹת
  english_pob_choice: without seeing
  chosen_spanish: sin ver
  alternatives_spanish:
  - sin darse cuenta
  - sin advertirlo
  lexicon: HALOT
  rationale: Se mantiene la expresión concreta del hebreo; la idea de inadvertencia queda implícita, como en la nota inglesa.
- source_word: וַ/יַּפֵּ֥ל עָלָ֖י/ו
  english_pob_choice: he dropped it on him
  chosen_spanish: la arrojó sobre él
  alternatives_spanish:
  - la hizo caer sobre él
  - la dejó caer sobre él
  lexicon: HALOT
  rationale: El causativo de נפל pide marcar agencia. En español, 'arrojó sobre él' comunica mejor la acción causada que un pasivo intransitivo.
- source_word: וַ/יָּמֹ֑ת
  english_pob_choice: so that he died
  chosen_spanish: y murió
  alternatives_spanish:
  - de modo que murió
  - así que murió
  lexicon: HALOT
  rationale: En español, el simple coordinado conserva el resultado sin recargar la frase; el contexto legal ya implica la consecuencia.
- source_word: וְ/הוּא֙ לֹא אוֹיֵ֣ב ל֔/וֹ
  english_pob_choice: though he was not his enemy
  chosen_spanish: aunque no era su enemigo
  alternatives_spanish:
  - y no era su enemigo
  - siendo que no era su enemigo
  lexicon: HALOT
  rationale: La relación es concesiva/explanatoria en el contexto jurídico. 'Aunque' transmite ese matiz sin añadir contenido.
- source_word: וְ/לֹ֥א מְבַקֵּ֖שׁ רָעָתֽ/וֹ
  english_pob_choice: and was not seeking his harm
  chosen_spanish: ni estaba buscando su mal
  alternatives_spanish:
  - ni procuraba su daño
  - ni buscaba hacerle mal
  lexicon: HALOT
  rationale: רָעָה en este contexto apunta a daño o perjuicio interpersonal; 'mal' es breve y fiel, y la coordinación con 'ni' reproduce bien la negativa hebrea.
theological_decisions:
- issue: Imputación de intención hostil vs. accidente legalmente relevante
  english_pob_reading: though he was not his enemy and was not seeking his harm
  chosen_spanish_reading: aunque no era su enemigo ni estaba buscando su mal
  alternative_spanish_readings:
  - y no era su enemigo ni buscaba su mal
  - aunque no le tenía enemistad ni buscaba dañarlo
  rationale: El verso no niega solo el resultado, sino la intención hostil. En español conviene conservar la concesión para reflejar que la muerte ocurrió sin enemistad ni búsqueda de daño, como exige el marco legal del pasaje.
  doctrine_reference: Números 35:23; cf. legislación sobre homicidio involuntario en Números 35:9–15
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del POB inglés, incluida la revisión de 'one could die' como expresión genérica. Donde el inglés dice 'without seeing', se mantuvo la misma imagen concreta en español y se preservó la nota explicativa sobre la ambigüedad lexical. También se conservó el matiz concesivo de 'though he was not his enemy' y la fuerza causativa de וַיַּפֵּל en una formulación española natural.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - '''Piedra'' mantiene el sustantivo concreto del hebreo; no se generalizó a ''objeto''.'
  - '''Mal'' traduce רָעָה en un contexto legal interpersonal, sin convertirlo en maldad abstracta.'
  - Se evitó 'pecado' o 'culpa' porque el hebreo aquí habla de daño/hostilidad, no de esa categoría.
  - La puntuación con punto y coma separa el resultado de muerte del comentario concesivo final, respetando el flujo jurídico del verso.
