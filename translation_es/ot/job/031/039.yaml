translation:
  language: es
  text: si he comido su fruto sin pagar, o he hecho perder el ánimo[a] a sus dueños—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «he hecho expirar la vida de sus dueños» o «he hecho jadear a sus dueños». El verbo hebreo es raro y la cláusula puede expresar opresión extrema o causar la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּחָהּ
  english_pob_choice: its produce
  chosen_spanish: su fruto
  alternatives_spanish:
  - su produce
  - su rendimiento
  - su fuerza
  lexicon: HALOT
  rationale: En contexto agrícola, el hebreo כֹּחַ puede referirse no solo a 'fuerza' sino al poder productivo o rendimiento de la tierra. 'Fruto' comunica de manera natural en español aquello que la tierra produce, sin perder la idea de rendimiento que el inglés POB resolvió como 'produce'.
- source_word: אָכַלְתִּי
  english_pob_choice: I have eaten
  chosen_spanish: he comido
  alternatives_spanish:
  - comí
  - he consumido
  lexicon: HALOT
  rationale: El verbo básico 'comer' mantiene el sentido directo del hebreo y encaja con la forma juramentaria introducida por אִם. El perfecto compuesto en español resulta natural y cercano al valor que el POB conserva con 'I have eaten'.
- source_word: בְלִי כָסֶף
  english_pob_choice: without payment
  chosen_spanish: sin pagar
  alternatives_spanish:
  - sin dinero
  - sin plata
  - sin pago
  lexicon: HALOT
  rationale: כֶּסֶף es literalmente 'plata', pero aquí funciona como dinero o compensación. 'Sin pagar' expresa con claridad la idea económica de obtención injusta que el contexto exige, como equivalente natural del inglés 'without payment'.
- source_word: נֶפֶשׁ
  english_pob_choice: lose heart
  chosen_spanish: desfallecer el alma
  alternatives_spanish:
  - perder el ánimo
  - desanimar profundamente
  - hacer expirar la vida
  lexicon: HALOT
  rationale: El inglés POB decidió no traducir literalmente 'life/soul' en el cuerpo principal porque el hebreo puede aludir a una aflicción extrema. En español, 'desfallecer el alma' conserva la tensión entre vida/aliento/ánimo y evita reducir demasiado el alcance semántico.
- source_word: בְּעָלֶיהָ
  english_pob_choice: its owners
  chosen_spanish: sus dueños
  alternatives_spanish:
  - sus propietarios
  - sus poseedores
  - sus amos
  lexicon: HALOT
  rationale: בַּעַל en plural constructo con sufijo femenino indica quienes poseen la tierra. 'Dueños' es la forma más clara y natural en español para el sentido posesivo del hebreo, en paralelo con el inglés POB 'its owners'.
- source_word: הִפָּחְתִּי
  english_pob_choice: caused its owners to lose heart
  chosen_spanish: he hecho desfallecer
  alternatives_spanish:
  - he hecho expirar
  - he hecho jadear
  - he agotado
  lexicon: HALOT
  rationale: El hifil de נפח es raro y admite varias posibilidades intensas. 'He hecho desfallecer' mantiene la severidad del efecto sin decidir de manera absoluta por 'muerte' o por una mera sensación emocional, respetando la cautela del POB y la ambigüedad léxica del hebreo.
theological_decisions:
- issue: Grado de severidad en la última cláusula
  english_pob_reading: The Hebrew verb is rare and the clause may express either extreme oppression or causing death.
  chosen_spanish_reading: La cláusula puede expresar opresión extrema o incluso causar la muerte/desfallecimiento.
  alternative_spanish_readings:
  - causar la muerte
  - hacerlos jadear
  - agotarlos por opresión
  rationale: El hebreo permite más de una intensificación, y el POB preserva esa tensión mediante una nota. En español conviene no cerrar el sentido a una sola opción; por eso el texto principal usa 'desfallecer' y la nota mantiene la posibilidad de un alcance más fuerte.
  doctrine_reference: Job 31:39; lexical caution in rare-verb interpretation
translation_notes:
  revision_awareness: El material fuente no muestra revisiones aplicadas; se sigue la lectura vigente del texto hebreo WLC y la solución óptimo-equivalente del POB en inglés, manteniendo la ambigüedad léxica relevante en la cláusula final.
  spanish_consistency_notes:
  - Se preserva el valor jurídico-económico de בְלִי כָסֶף como 'sin pagar', con nota para el matiz literal de 'plata/dinero'.
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino.
  - '''dueños'' mantiene la referencia posesiva de בְּעָלֶיהָ sin introducir terminología eclesiástica.'
  - La cláusula final se formula con cautela para reflejar la rareza verbal y la tensión entre 'desfallecer', 'jadear' y 'expirar'.
