revisions:
- from: Pero Onán sabía que el descendiente no sería suyo[a]; así que, cada vez que se llegaba a la mujer de su hermano, derramaba el semen en tierra[b], para no dar descendencia a su hermano.
  to: Pero Onán sabía que la descendencia no sería suya[a]; así que, cada vez que se unía a la mujer de su hermano, lo derramaba en el suelo[b], para no dar descendencia a su hermano.
  rationale: Se ajustó 'el descendiente' a 'la descendencia' para reflejar mejor זרע en contexto levirático y sonar más natural en español. Se cambió 'se llegaba' por 'se unía' para evitar una construcción poco idiomática sin perder el eufemismo sexual. Se sustituyó 'derramaba el semen' por 'lo derramaba' para no explicitar más de lo que dice el hebreo ni más de lo que preserva el POB inglés en el texto principal; la nota conserva la aclaración necesaria.
