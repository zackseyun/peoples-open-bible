translation:
  language: es
  text: Rescata al oprimido de sus opresores[a], y no dejes que tu espíritu[b] se impaciente en juzgar con rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Inclina tu oído al pobre, y respóndele pacíficamente con mansedumbre». El testimonio hebreo aquí, en cambio, habla de rescatar al oprimido y no impacientarse en un juicio recto.'
    reason: alternative_reading
  - marker: b
    text: «Espíritu» refleja el hebreo רוּחַ; aquí se entiende como la disposición interior de la persona, no como el Espíritu Santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹשַׁע
  english_pob_choice: Rescue
  chosen_spanish: Saca
  alternatives_spanish:
  - Rescata
  - Líbralo
  - Sálvalo
  lexicon: HALOT
  rationale: El imperativo pide intervención activa. «Sacar» conserva el valor dinámico de apartar a alguien de una situación de opresión sin cargar innecesariamente con el matiz teológico de «salvar»; en español suena natural junto al complemento de procedencia.
- source_word: מוּצָק
  english_pob_choice: the oppressed
  chosen_spanish: al oprimido
  alternatives_spanish:
  - al injustamente tratado
  - al que sufre presión
  - al afligido
  lexicon: HALOT
  rationale: El participio pasivo describe a una persona sometida a presión o maltrato. «Oprimido» es idiomático en español y mantiene la fuerza social y ética del hebreo.
- source_word: מִמְּצִיקָיו
  english_pob_choice: from his oppressors
  chosen_spanish: de sus opresores
  alternatives_spanish:
  - de quienes lo afligen
  - de sus tormentadores
  - de los que lo presionan
  lexicon: HALOT
  rationale: La forma derivada del mismo campo de presión/opresión se refleja con «opresores», que conserva la relación léxica y la dimensión social del mandato.
- source_word: וְאַל תָּקוֹץ רוּחֲךָ
  english_pob_choice: do not let your spirit be impatient
  chosen_spanish: no dejes que tu espíritu se impaciente
  alternatives_spanish:
  - no permitas que tu espíritu se irrite
  - no te impacientes en tu espíritu
  - no te hastíes en tu espíritu
  lexicon: HALOT
  rationale: קוץ puede expresar impaciencia, disgusto o irritación. Dado el contexto de juicio recto, «se impaciente» comunica bien la reacción interior que podría entorpecer la justicia, manteniendo el sujeto «tu espíritu».
- source_word: בְּמִשְׁפַט יֹשֶׁר
  english_pob_choice: in judging rightly
  chosen_spanish: en juzgar con rectitud
  alternatives_spanish:
  - al juzgar justamente
  - en un juicio recto
  - al emitir juicio con justicia
  lexicon: HALOT
  rationale: La frase combina la acción judicial con la idea de rectitud. El infinitivo «juzgar con rectitud» suena natural en español y conserva la orientación práctica del hebreo.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego divergente
  english_pob_reading: Follow the extant Hebrew as the main text, with the Greek preserved in a footnote as a notable alternative tradition.
  chosen_spanish_reading: Seguir el hebreo conservado como texto principal, y señalar el paralelo griego en una nota como tradición alternativa destacada.
  alternative_spanish_readings:
  - 'Tomar el griego como texto principal: «Inclina tu oído al pobre, y respóndele pacíficamente con mansedumbre».'
  - Fundir ambas tradiciones en una sola paráfrasis.
  rationale: En Sirácides, donde el hebreo está conservado, la política del proyecto da primacía al testimonio hebreo. Aquí el griego presenta una formulación sustancialmente distinta; por eso se mantiene el hebreo en el texto principal y se preserva honestamente la tradición griega en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde sobrevive; usar el paralelo griego como entrada real y preservar la incertidumbre con honestidad.'
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa, que afinó la segunda cláusula hacia una formulación más natural y más cercana a la construcción hebrea: «be impatient in judging rightly». El texto español reproduce esa dirección con «no dejes que tu espíritu se impaciente en juzgar con rectitud».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton.
  - Se usa «opresores/oprimido» para conservar el campo semántico de presión y abuso documentado por el hebreo.
  - Se evita «siervo» o «salvar» por falta de respaldo contextual en este versículo y para no diluir la tensión social del imperativo.
  - «Espíritu» se entiende en sentido antropológico interior, no pneumatológico.
