translation:
  language: es
  text: Vuélvanse a mí y queden atónitos[a], y pongan la mano sobre la boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «queden espantados». El verbo hebreo puede denotar quedar estupefactos, sobrecogidos o desolados; aquí expresa una reacción de conmoción.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנוּ אֵלַי
  english_pob_choice: Turn to me
  chosen_spanish: Vuélvanse a mí
  alternatives_spanish:
  - Tórnense a mí
  - Diríjanse a mí
  - Miren hacia mí
  lexicon: HALOT
  rationale: El imperativo plural de פנה expresa volver el rostro o dirigirse a alguien; en español, «vuélvanse a mí» conserva la dirección personal y el tono urgente mejor que un simple «miren». Además, mantiene bien el paralelo con la reacción posterior.
- source_word: וְהָשַׁמּוּ
  english_pob_choice: and be appalled
  chosen_spanish: queden asombrados[a]
  alternatives_spanish:
  - queden atónitos
  - queden espantados
  - queden desolados
  lexicon: HALOT
  rationale: La forma puede expresar quedar estupefacto, sobrecogido o appalled/astonished. En español, «queden asombrados» es natural y preserva el impacto de quedar sobrecogido; la nota mantiene la alternativa semántica más fuerte de «atónitos/espantados».
- source_word: וְשִׂימוּ
  english_pob_choice: and put
  chosen_spanish: y pongan
  alternatives_spanish:
  - y coloquen
  - y pongan la mano
  - y extiendan
  lexicon: HALOT
  rationale: שׂים es un imperativo común de poner/colocar. «Pongan» es la opción más directa y natural para el gesto descrito.
- source_word: יָד
  english_pob_choice: your hand
  chosen_spanish: la mano
  alternatives_spanish:
  - su mano
  - la mano de ustedes
  lexicon: HALOT
  rationale: Aunque el hebreo no explicita posesivo, el español puede dejarlo implícito porque el gesto ya presupone el sujeto plural. «La mano» evita recargar la frase y funciona bien con el imperativo plural.
- source_word: עַל פֶּה
  english_pob_choice: over your mouth
  chosen_spanish: sobre la boca
  alternatives_spanish:
  - sobre su boca
  - sobre la boca de ustedes
  - sobre la boca/mouth
  lexicon: HALOT
  rationale: La expresión idiomática señala el gesto de silencio o de quedar sin palabras. «Sobre la boca» conserva la imagen corporal sin forzar un posesivo innecesario; en español es comprensible como gesto ritualizado de silencio.
translation_notes:
  revision_awareness: 'El texto hebreo y la auditoría inglesa coinciden en la secuencia imperativa: dirigirse al hablante, reaccionar con conmoción y guardar silencio con la mano sobre la boca. La versión española mantiene ese orden y ese gesto idiomático sin añadir interpretación ajena al verso.'
  spanish_consistency_notes:
  - Se mantuvo un español neutral y bíblico, evitando calcos innecesarios como «sobre la boca» con posesivo explícito cuando el gesto ya es claro por contexto.
  - Se usó «asombrados» como opción más pública y fluida, con nota para la alternativa semántica de mayor intensidad.
  - No hay referencias teológicas específicas en este verso; la traducción se centra en la fuerza retórica y gestual del hebreo.
