translation:
  language: es
  text: 'Cuando Jehú llegó a la puerta[a], ella dijo: «¿Hay paz, Zimri[c][b], asesino de su amo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jezabel llama «Zimri» a Jehú en tono de burla, comparándolo con Zimri, quien mató a su amo y usurpó el trono (véase 1 Reyes 16:9–20).
    reason: cross_reference
  - marker: b
    text: 'O: «¿Está todo bien?»'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «asesino de su amo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  english_pob_choice: came into
  chosen_spanish: entró por
  alternatives_spanish:
  - vino a
  - entró en
  lexicon: HALOT
  rationale: El hebreo indica movimiento de llegada/entrada. En español, «entró por la puerta» suena natural y conserva la imagen concreta de acceso por la puerta, equivalente al inglés POB «came into the gate».
- source_word: בַשָּׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de la ciudad
  - la entrada
  lexicon: HALOT
  rationale: שַׁעַר puede referirse a la puerta o portal de la ciudad. «La puerta» mantiene la brevedad del hebreo y funciona bien en español sin sobreexplicar; el contexto histórico sostiene la referencia urbana.
- source_word: וַתֹּאמֶר
  english_pob_choice: she said
  chosen_spanish: ella dijo
  alternatives_spanish:
  - y dijo
  - dijo
  lexicon: HALOT
  rationale: El verbo es femenino singular y se refiere a Jezabel por el contexto. En español se explicita el sujeto para claridad, como en el inglés auditado.
- source_word: הֲשָׁלוֹם
  english_pob_choice: Is it peace
  chosen_spanish: ¿Hay paz?
  alternatives_spanish:
  - ¿Todo está bien?
  - ¿Vienes en paz?
  - ¿Está bien?
  lexicon: HALOT
  rationale: שָׁלוֹם aquí es una pregunta breve sobre paz/bienestar. «¿Hay paz?» conserva la tersura y la ironía del hebreo sin convertirla en una paráfrasis más explicativa.
- source_word: זִמְרִי
  english_pob_choice: Zimri
  chosen_spanish: Zimri
  lexicon: transliteración estándar
  rationale: Los nombres propios se transliteran. Se conserva «Zimri» porque es la alusión burlona a un personaje histórico anterior, tal como en el inglés POB.
- source_word: הֹרֵג
  english_pob_choice: murderer of
  chosen_spanish: asesino de
  alternatives_spanish:
  - matador de
  - homicida de
  - el que mató a
  lexicon: HALOT
  rationale: 'El participio tiene fuerza acusatoria: literalmente «matando / matador». «Asesino de» reproduce mejor el tono de insulto y la carga moral que «el que mató a», sin diluir la denuncia.'
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su amo y señor
  - su dueño
  lexicon: HALOT
  rationale: אֲדֹן puede significar «señor» o «amo», pero aquí se trata de un superior humano, no del título divino. «Su señor» evita la confusión con Yahvé y conserva la relación de subordinación del texto.
theological_decisions:
- issue: La burla de Jezabel al llamar «Zimri» a Jehú
  english_pob_reading: Treat as a sarcastic taunt identifying Jehu with the earlier usurper Zimri rather than as a literal naming.
  chosen_spanish_reading: Tratar «Zimri» como un insulto sarcástico que compara a Jehú con el usurpador anterior, no como un simple nombre aislado.
  alternative_spanish_readings:
  - Dejar la referencia sin señalizar en el texto principal.
  - Expandir la alusión con una nota explicativa dentro del versículo.
  rationale: El hebreo permite leer el vocativo como una comparación mordaz. La traducción española conserva esa tensión y la ironía sin sobreexplicar en el cuerpo del texto; la nota aclara la referencia histórica.
  doctrine_reference: 1 Reyes 16:9–20
translation_notes:
  revision_awareness: La versión española sigue el pasaje hebreo y el trazado auditado del POB en inglés sin cambios de revisión relevantes; se mantiene la lectura irónica y alusiva de la frase, con equivalentes naturales en español y sin suavizar la acusación.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término predeterminado para el nombre divino cuando no aparece en este versículo.
  - Se preserva la alusión histórica a Zimri mediante transliteración y nota, sin amplificar el texto principal.
  - Se mantiene el tono breve e ირónico del hebreo en una sintaxis española natural y publicable.
