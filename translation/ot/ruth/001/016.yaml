theological_decisions:
- issue: Rendering the verbless covenantal-identification clauses
  chosen_reading: Use future in the first clause ('Your people will be my people') but retain compact verbless style in the second ('and your God my God')
  alternative_readings:
  - Use present for both clauses
  - Use future for both clauses
  rationale: Hebrew omits the copula in both clauses. English requires some interpretive smoothing. The future in the people-clause clarifies Ruth's pledged allegiance, while the compact second clause preserves the memorable force of the confession. This does not alter theology but reflects optimal equivalence and literary weight.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning without unnecessary paraphrase'
