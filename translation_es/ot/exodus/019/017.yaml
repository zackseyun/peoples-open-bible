translation:
  language: es
  text: Entonces Moisés sacó al pueblo del campamento al encuentro de Dios, y ellos se colocaron al pie del monte.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la base del monte». La expresión hebrea se refiere a la parte baja del monte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  english_pob_choice: brought ... out
  chosen_spanish: sacó
  alternatives_spanish:
  - hizo salir
  - trajo ... fuera
  lexicon: HALOT
  rationale: 'El hifil de יצא es causativo: Moisés hizo que el pueblo saliera. En español, «sacó» expresa bien esa causatividad de manera natural y directa, sin añadir la idea de guía que tendría «condujo».'
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  lexicon: HALOT
  rationale: «El pueblo» conserva mejor el sentido colectivo e identitario del hebreo en el contexto del pacto y la teofanía.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para encontrarse con
  alternatives_spanish:
  - para ir al encuentro de
  - para hallar
  lexicon: HALOT
  rationale: La construcción indica movimiento hacia un encuentro. «Para encontrarse con» comunica la relación de acercamiento y encuentro sin sonar rígido ni sobreinterpretar.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español bíblico normal la referencia al Dios de Israel se expresa simplemente como «Dios». «El Dios» sería poco natural y no necesario aquí.
- source_word: מִן הַמַּחֲנֶה
  english_pob_choice: out of the camp
  chosen_spanish: del campamento
  alternatives_spanish:
  - fuera del campamento
  - desde el campamento
  lexicon: HALOT
  rationale: «Del campamento» reproduce bien el origen espacial de la salida y fluye de forma natural en español con el verbo «sacar».
- source_word: וַיִּתְיַצְּבוּ
  english_pob_choice: they took their stand
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - tomaron su posición
  - se pusieron en pie
  lexicon: HALOT
  rationale: El hitpael de יצב puede expresar colocarse o ponerse firmemente en posición. En este contexto narrativo, «se detuvieron» comunica la quietud y el asentamiento ante la montaña, aunque pierde algo del matiz formal de postura deliberada. Se conserva el sentido de quedarse de pie y en lugar fijo, sin forzar una expresión más artificial.
- source_word: בְּתַחְתִּית
  english_pob_choice: at the foot of
  chosen_spanish: al pie de
  alternatives_spanish:
  - en la base de
  - en el pie de
  lexicon: HALOT
  rationale: En contexto de montaña, el sustantivo designa la parte baja o base. «Al pie de» es la equivalencia idiomática natural y precisa en español.
- source_word: הָהָר
  english_pob_choice: the mountain
  chosen_spanish: el monte
  alternatives_spanish:
  - la montaña
  lexicon: HALOT
  rationale: En estilo bíblico español, «el monte» es una forma clara y reverente para este contexto sin perder precisión geográfica.
theological_decisions:
- issue: Referencia a Dios en la teofanía del Sinaí
  english_pob_reading: to meet God
  chosen_spanish_reading: para encontrarse con Dios
  alternative_spanish_readings:
  - para encontrarse con el Dios
  rationale: Se mantiene la referencia directa al Dios de Israel sin añadir determinación innecesaria. La escena describe el encuentro del pueblo con Dios en el Sinaí, y el español bíblico común expresa naturalmente esa referencia como «Dios».
  doctrine_reference: Teofanía del Sinaí; fidelidad al referente divino sin encubrimiento del nombre ni sobreexplicación.
- issue: Matiz de postura en וַיִּתְיַצְּבוּ
  english_pob_reading: they took their stand
  chosen_spanish_reading: se detuvieron
  alternative_spanish_readings:
  - tomaron su posición
  - se pusieron firmes
  rationale: El inglés de POB preserva el carácter deliberado de la postura. En español, «se detuvieron» conserva la escena de quietud ante el monte, aunque atenúa el matiz formal de presentarse en posición. Se prefiere por claridad y fluidez, sin afirmar más de lo que la sintaxis española admite con naturalidad.
  doctrine_reference: Precisión narrativa; no doctrinal en sentido estricto, pero sí relevante para el matiz aspectual del verbo hebreo.
translation_notes:
  revision_awareness: Se tomó como contexto auditado la decisión inglesa revisada de preferir 'out of the camp' sobre 'out from the camp', y se siguió su sentido espacial natural en español con «del campamento». También se mantuvo el equivalente idiomático de 'at the foot of the mountain' como «al pie de» y se evitó calcar estructuras inglesas innecesarias.
  spanish_consistency_notes:
  - Se usa «Dios» en sentido teofánico, coherente con el tratamiento habitual de אֱלֹהִים cuando se refiere al Dios de Israel.
  - Se prefirió «monte» por registro bíblico español, manteniendo la misma referencia que «mountain» en inglés.
  - La nota textual/lexical está anclada en «al pie de» para reflejar la alternativa de «la base del monte» sin duplicar marcadores.
