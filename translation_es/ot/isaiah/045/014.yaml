translation:
  language: es
  text: 'Así dice Yahvé: la riqueza de Egipto y las mercancías de Cus y los sabeos, hombres de estatura, pasarán a ti y serán tuyos; irán detrás de ti, pasarán en cadenas; se inclinarán ante ti, orarán[a] a ti: «Ciertamente, Dios está en ti, y no hay otro; no hay ningún otro Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te suplicarán». El verbo hebreo puede denotar oración o súplica ferviente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor del nombre divino como nombre propio, no como sustituto reverencial. «Yahvé» mantiene la decisión del proyecto y evita masking litúrgico.
- source_word: יְגִיעַ
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - ganancia
  - producto
  - labor
  lexicon: HALOT
  rationale: En construcción con Egipto, la idea es lo producido o acumulado como resultado de su labor. «Riqueza» comunica bien ese sentido material en español.
- source_word: סְחַר
  english_pob_choice: merchandise
  chosen_spanish: comercio
  alternatives_spanish:
  - mercancía
  - trafico
  - ganancia comercial
  lexicon: HALOT
  rationale: El término apunta al ámbito del comercio y sus bienes. «Comercio» conserva la referencia económica sin sonar demasiado arcaico, aunque deja abierta la noción de mercancías.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Etiopía
  lexicon: HALOT
  rationale: Se translitera el topónimo según uso bíblico en español. «Cus» evita una equivalencia moderna potencialmente anacrónica.
- source_word: סְבָאִים
  english_pob_choice: the Sabeans
  chosen_spanish: los sabeos
  alternatives_spanish:
  - los de Seba
  - los sabeos
  lexicon: HALOT
  rationale: Se mantiene el etnónimo tradicional y claro en español.
- source_word: אַנְשֵׁי מִדָּה
  english_pob_choice: men of stature
  chosen_spanish: hombres de estatura
  alternatives_spanish:
  - hombres de gran estatura
  - hombres de medida
  - hombres altos
  lexicon: HALOT
  rationale: La expresión hebrea describe talla/porte notable. «Hombres de estatura» conserva la idea sin añadir un intensificador que el texto revisado en inglés ya había atenuado.
- source_word: עָלַיִךְ יַעֲבֹרוּ
  english_pob_choice: will pass over to you
  chosen_spanish: pasarán a ti
  alternatives_spanish:
  - pasarán sobre ti
  - vendrán a ti
  lexicon: HALOT
  rationale: La dirección resultativa hacia la destinataria se expresa con naturalidad en español con «a ti», sin introducir un matiz físico innecesario.
- source_word: וְלָךְ יִהְיוּ
  english_pob_choice: will be yours
  chosen_spanish: serán tuyos
  alternatives_spanish:
  - te pertenecerán
  - serán para ti
  lexicon: HALOT
  rationale: «Serán tuyos» reproduce de forma idiomática la posesión/subordinación implícita.
- source_word: אַחֲרַיִךְ יֵלֵכוּ
  english_pob_choice: they will walk behind you
  chosen_spanish: irán detrás de ti
  alternatives_spanish:
  - caminarán detrás de ti
  - te seguirán
  lexicon: HALOT
  rationale: Se conserva la imagen espacial del hebreo en una forma natural para español.
- source_word: בַּזִּקִּים
  english_pob_choice: in chains
  chosen_spanish: en cadenas
  alternatives_spanish:
  - con cadenas
  - en grilletes
  - en prisiones
  lexicon: HALOT
  rationale: «En cadenas» preserva la imagen de sujeción/cautiverio con claridad y concisión.
- source_word: וְאֵלַיִךְ יִשְׁתַּחֲוּוּ
  english_pob_choice: they will bow down to you
  chosen_spanish: se inclinarán ante ti
  alternatives_spanish:
  - se postrarán ante ti
  - te adorarán
  lexicon: HALOT
  rationale: Se evita «adorarán» para no sugerir culto divino a la destinataria; «se inclinarán» comunica el gesto de homenaje sin borrar la tensión del pasaje.
- source_word: אֵלַיִךְ יִתְפַּלָּלוּ
  english_pob_choice: they will pray to you
  chosen_spanish: te rogarán
  alternatives_spanish:
  - te suplicarán
  - te dirigirán súplicas
  - rezarán a ti
  lexicon: HALOT
  rationale: El hitpael de פלל puede expresar oración o súplica ferviente. Dado el contexto confesional inmediato, «te rogarán» preserva la fuerza de petición sin implicar necesariamente devoción dirigida a la persona misma.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguramente
  - En verdad
  - Sólo
  lexicon: HALOT
  rationale: Introduce una afirmación enfática; «Ciertamente» es natural en español bíblico contemporáneo.
- source_word: בָּךְ אֵל
  english_pob_choice: God is in you
  chosen_spanish: Dios está en ti
  alternatives_spanish:
  - Dios está dentro de ti
  - Dios está contigo
  - Dios está entre ustedes
  lexicon: HALOT
  rationale: Se mantiene el valor locativo de la preposición con la segunda femenina singular. «En ti» conserva la afirmación de presencia divina en la destinataria.
- source_word: וְאֵין עוֹד אֶפֶס אֱלֹהִים
  english_pob_choice: there is no other; there is no other God
  chosen_spanish: y no hay otro; no hay ningún otro Dios
  alternatives_spanish:
  - y no hay otro, no hay Dios alguno
  - y no existe otro; no existe ningún Dios más
  lexicon: HALOT
  rationale: Se conserva la acumulación enfática de exclusión del hebreo sin fusionar en exceso las dos cláusulas.
theological_decisions:
- issue: Cómo renderizar יִשְׁתַּחֲוּוּ respecto de una destinataria femenina singular sin sugerir culto indebido
  english_pob_reading: Rendered as 'bow down to you' to preserve homage without implying worship of Zion/Israel
  chosen_spanish_reading: se inclinarán ante ti
  alternative_spanish_readings:
  - se postrarán ante ti
  - te adorarán
  rationale: La escena describe homenaje ante la destinataria, pero la confesión posterior atribuye la divinidad a Dios en ella. «Se inclinarán» conserva el gesto físico y evita que el español suene a culto a la destinataria.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla por anticipado.
- issue: Cómo entender אֵלַיִךְ יִתְפַּלָּלוּ en un contexto donde la oración culmina en confesión sobre Dios
  english_pob_reading: Rendered formally as 'they will pray to you' with footnote preserving the supplication nuance
  chosen_spanish_reading: te rogarán
  alternative_spanish_readings:
  - te suplicarán
  - rezarán a ti
  - te dirigirán súplicas
  rationale: El hebreo admite oración/súplica. En español, «te rogarán» conserva el carácter de petición y evita un giro que podría sonar más cultual de lo que el contexto inmediato exige.
  doctrine_reference: Equivalencia óptima con preservación de ambigüedad legítima.
- issue: Cómo reflejar la doble exclusividad de la cláusula final
  english_pob_reading: there is no other; there is no other God
  chosen_spanish_reading: y no hay otro; no hay ningún otro Dios
  alternative_spanish_readings:
  - y no hay otro, no hay Dios alguno
  - y no existe otro; no existe ningún Dios más
  rationale: El hebreo acumula expresiones de exclusión. Se conservan ambas afirmaciones en español para no suavizar el monoteísmo enfático del texto.
  doctrine_reference: Monoteísmo exclusivo en la formulación profética.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se evita intensificar innecesariamente «hombres de estatura» con «grande», se mantiene la transliteración de Cus, y se conserva la clausura enfática final con dos enunciados de exclusividad. También se ajusta el español para que el gesto de homenaje y la súplica no se lean como culto directo a la destinataria.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para el nombre divino.
  - Se translitera «Cus» y «sabeos» de forma consistente con el registro bíblico en español.
  - Se evita «adorarán» para no borrar la tensión entre homenaje a la destinataria y confesión sobre Dios.
  - La cláusula final mantiene dos miembros separados para reflejar la repetición enfática del hebreo.
  - El tono es bíblico contemporáneo, claro y reverente, sin arcaísmos innecesarios.
