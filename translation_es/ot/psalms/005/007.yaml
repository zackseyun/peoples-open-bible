translation:
  language: es
  text: Tú destruyes a los que hablan mentiras[a]; Yahvé aborrece a un hombre de derramamiento de sangre y engaño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tú destruirás a los que hablan falsedad’. El verbo hebreo puede leerse como futuro o como una afirmación general de la acción de Dios.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘un hombre de sangres y engaño’, un modismo para alguien marcado por derramamiento de sangre y traición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּאַבֵּד
  english_pob_choice: You destroy
  chosen_spanish: Tú destruyes
  alternatives_spanish:
  - Tú destruirás
  - Tú haces perecer
  lexicon: HALOT
  rationale: El verbo piel de אבד expresa causar destrucción o pérdida. En español, el presente gnómico mantiene bien la acción habitual o característica de Dios; el futuro también es posible, pero el presente suena más natural y conserva el valor general del hebreo.
- source_word: דֹּבְרֵי כָזָב
  english_pob_choice: those who speak lies
  chosen_spanish: los que hablan mentira
  alternatives_spanish:
  - los que hablan falsedad
  - mentirosos
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente ‘hablantes de mentira/falsedad’. Se conserva la fuerza verbal con ‘los que hablan’, evitando reducirla a una mera etiqueta nominal.
- source_word: אִישׁ דָּמִים
  english_pob_choice: a man of bloodshed
  chosen_spanish: el hombre de sangre
  alternatives_spanish:
  - un hombre de sangre
  - un hombre de derramamiento de sangre
  - un sanguinario
  lexicon: HALOT
  rationale: Se conserva el singular masculino אִישׁ y el modismo de ‘sangre’ para reflejar el hebreo ‘hombre de sangres’. ‘De sangre’ en español mantiene el carácter idiomático sin estrecharlo solo a ‘asesino’.
- source_word: וּמִרְמָה
  english_pob_choice: and deceit
  chosen_spanish: y de engaño
  alternatives_spanish:
  - y de fraude
  - y de treachery
  lexicon: HALOT
  rationale: מִרְמָה puede significar engaño, fraude o treachery. ‘Engaño’ es la opción más clara y natural en español, y armoniza con ‘sangre’ como rasgo moral del tipo de persona descrito.
- source_word: יְתָעֵב
  english_pob_choice: abhors
  chosen_spanish: aborrece
  alternatives_spanish:
  - detesta
  - abomina
  lexicon: HALOT
  rationale: El piel de תעב expresa fuerte repulsión moral. ‘Aborrece’ conserva la intensidad poética del hebreo en registro bíblico sin sonar arcaizante en exceso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como ‘Yahvé’, siguiendo la terminología del proyecto en español y evitando la sustitución por un título como ‘Señor’.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto pide conservar el nombre divino en español como ‘Yahvé’, no sustituirlo por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor del singular אִישׁ
  english_pob_reading: a man of bloodshed
  chosen_spanish_reading: el hombre de sangre
  alternative_spanish_readings:
  - una persona de sangre
  - los sanguinarios
  rationale: Se preserva el singular masculino del hebreo y su modismo semítico. Aunque puede entenderse colectivamente, el texto fuente presenta una figura singular caracterizada por sangre y engaño.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El audit trail inglés muestra acuerdo alto y sin cambios recientes; se conservan las decisiones clave: presente gnómico para el verbo, traducción verbal de דֹּבְרֵי כָזָב, singular masculino para אִישׁ y el nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se evita ‘SEÑOR’ como sustituto del nombre divino.
  - Se mantiene una construcción verbal para דֹּבְרֵי כָזָב.
  - ‘Sangre’ conserva el modismo hebreo de דָּמִים sin reducirlo a una sola categoría penal.
  - Las notas al pie reflejan la tensión futuro/presente y el modismo de ‘sangres’.
