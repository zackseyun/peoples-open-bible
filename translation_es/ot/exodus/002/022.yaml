    rationale: Aunque «Gersón» existe en tradición bíblica española, aquí el inglés POB documenta explícitamente un juego de palabras con la explicación del nombre. «Gershom» preserva mejor la forma fuente y evita introducir una adaptación que puede oscurecer la relación explicativa.
  - severity: medium
    issue: La nota al pie a atribuye a «Gersón» una conservación del juego sonoro que en realidad no reproduce bien la explicación hebrea.
    rationale: La nota debe describir con precisión que el nombre suena al trasfondo hebreo relacionado con «forastero allí» o con la autoidentificación de Moisés como forastero, no afirmar sin matiz que la forma española escogida lo conserva.
