    text: 'O: «el forastero», «el residente extranjero» o «el extranjero». El término hebreo designa a una persona no nativa que vive entre Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el huérfano». El hebreo expresa literalmente la categoría de quien no tiene padre.'
    reason: lexical_alternative
  revision_rationale: Se corrige una nota no publicable, se alinea mejor לַיָּתוֹם con la decisión léxica auditada en inglés al usar «el que no tiene padre» con «huérfano» como alternativa, y se pule ligeramente la naturalidad del cierre con «toda la obra de tus manos». No se requiere adjudicación especial porque el sentido fuente es claro y la reparación es local.
