translation:
  language: es
  text: Fue expulsado[a] de entre los hijos de los hombres, y su corazón[b] fue hecho semejante al de las bestias, y su morada estuvo entre los asnos monteses[c]. Fue alimentado con hierba como los bueyes, y su cuerpo fue empapado con el rocío del cielo, hasta que reconoció que el Dios Altísimo gobierna sobre el reino de la humanidad[d] y pone sobre él a quien quiere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue ahuyentado» o «fue echado fuera»; el arameo expresa la idea de ser removido o expulsado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su mente fue hecha semejante a la de las bestias»; el arameo literalmente dice «su corazón fue hecho como [el de] las bestias».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los asnos salvajes» o «los onagros»; el término se refiere a asnos monteses del desierto.'
    reason: cultural_note
  - marker: d
    text: 'O: «sobre el reino de los hombres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: טְרִיד
  english_pob_choice: was driven away
  chosen_spanish: fue ahuyentado
  alternatives_spanish:
  - fue expulsado
  - fue echado
  lexicon: HALOT
  rationale: El pasivo/resultativo expresa remoción y humillación. «Ahuyentado» conserva la fuerza de ser apartado y funciona de manera natural en español, sin suavizar el movimiento del texto.
- source_word: בְּנֵי אֲנָשָׁא
  english_pob_choice: the sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  lexicon: HALOT
  rationale: La imagen se mantiene con una traducción bastante literal, porque el contraste con las bestias es importante en el verso. «Hombres» aquí es genérico, no restrictivo.
- source_word: לִבְבֵהּ ... שוי
  english_pob_choice: his heart was made like
  chosen_spanish: su corazón fue hecho semejante al de
  alternatives_spanish:
  - su mente fue hecha semejante a
  - su corazón fue puesto como
  lexicon: HALOT
  rationale: «Corazón» conserva el equivalente directo y bíblico del arameo, incluyendo interioridad/disposición, sin decidir prematuramente por «mente».
- source_word: חֵיוְתָא
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - las fieras
  lexicon: HALOT
  rationale: «Bestias» reproduce el registro y la oposición entre el rey humillado y el mundo animal del verso.
- source_word: עֲרָדַיָּא
  english_pob_choice: the wild donkeys
  chosen_spanish: los asnos monteses
  alternatives_spanish:
  - los asnos salvajes
  - los onagros
  lexicon: HALOT
  rationale: El término alude a los onagros/asnos salvajes. En español, «asnos monteses» es claro, idiomático y suficientemente preciso; se evita el arcaísmo de «asnos salvajes» y el tecnicismo de «onagros» en el texto principal.
- source_word: מְדוֹרֵהּ
  english_pob_choice: his dwelling
  chosen_spanish: su morada
  alternatives_spanish:
  - su habitación
  - su lugar de habitación
  lexicon: HALOT
  rationale: «Morada» es natural y digna en español bíblico, y conserva el sentido de lugar donde habita.
- source_word: עִשְׂבָּא
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - vegetación
  lexicon: HALOT
  rationale: En este contexto de alimentación animal, «hierba» funciona bien en español y evita la posible reducción de «pasto» a forraje doméstico.
- source_word: כְתוֹרִין
  english_pob_choice: like oxen
  chosen_spanish: como a los toros
  alternatives_spanish:
  - como a los bueyes
  - como al ganado
  lexicon: HALOT
  rationale: El paralelo animal pide una comparación concreta. «Toros» mantiene la referencia a bovinos fuertes y resulta natural para lectores contemporáneos; «bueyes» sería posible, pero puede sonar demasiado domesticado frente al contexto de humillación.
- source_word: יְטַעֲמוּנֵּהּ
  english_pob_choice: He was fed
  chosen_spanish: Le dieron
  alternatives_spanish:
  - Fue alimentado
  - Le hicieron comer
  lexicon: HALOT
  rationale: Aunque la forma es pasiva/resultativa, el español admite una construcción breve y clara que transmite el hecho de recibir alimento. Se evita volverla demasiado literal o pesada.
- source_word: גִּשְׁמֵהּ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su persona
  - su carne
  lexicon: HALOT
  rationale: «Cuerpo» es el equivalente más claro y directo del sustantivo arameo en este contexto físico.
- source_word: יִצְטַבַּע
  english_pob_choice: was drenched
  chosen_spanish: fue empapado
  alternatives_spanish:
  - fue mojado
  - fue saturado
  lexicon: HALOT
  rationale: La forma reflexiva/passiva indica una humectación intensa. «Empapado» recoge mejor esa intensidad que «mojado».
- source_word: אֱלָהָא עליא
  english_pob_choice: the Most High God
  chosen_spanish: el Dios Altísimo
  alternatives_spanish:
  - el Dios Supremo
  - el Altísimo Dios
  lexicon: HALOT
  rationale: «Dios Altísimo» es la forma natural en español para el título divino, y preserva la elevación del epíteto sin oscurecer el nombre común «Dios».
- source_word: שַׁלִּיט
  english_pob_choice: rules over
  chosen_spanish: domina sobre
  alternatives_spanish:
  - reina sobre
  - gobierna sobre
  lexicon: HALOT
  rationale: El término expresa autoridad real y efectiva. «Domina sobre» conserva la soberanía activa del arameo y suena bien en español bíblico moderno.
- source_word: בְּמַלְכוּת אֲנָשָׁא
  english_pob_choice: over the kingdom of mankind
  chosen_spanish: sobre el reino de los hombres
  alternatives_spanish:
  - sobre el reino de la humanidad
  - sobre el reino de la gente
  lexicon: HALOT
  rationale: «Reino de los hombres» conserva el paralelismo con el arameo y evita introducir una abstracción ajena al texto. La frase sigue siendo genérica, no masculinizante en sentido exclusivo.
- source_word: וּלְמַן דִּי יִצְבֵּה יְהָקֵים עליה
  english_pob_choice: and sets over it whomever he wills
  chosen_spanish: y pone sobre él a quien él quiere
  alternatives_spanish:
  - y establece sobre él a quien desea
  - y coloca sobre él a quien quiere
  lexicon: HALOT
  rationale: El verbo expresa nombramiento/establecimiento con libertad soberana. «Pone sobre él» mantiene la sencillez y la fuerza del original; «a quien él quiere» refleja la volición divina.
theological_decisions:
- issue: Soberanía divina en la clausula final
  english_pob_reading: the Most High God rules over the kingdom of mankind and sets over it whomever he wills
  chosen_spanish_reading: el Dios Altísimo domina sobre el reino de los hombres y pone sobre él a quien él quiere
  alternative_spanish_readings:
  - el Dios Altísimo es soberano sobre el reino de los hombres y establece sobre él a quien desea
  - el Dios Altísimo gobierna sobre el reino de los hombres y coloca sobre él a quien quiere
  rationale: La frase afirma de forma directa la autoridad activa de Dios sobre los reinos humanos. Se conserva esa afirmación sin diluirla en una formulación más técnica o más interpretativa de lo que exige el arameo.
  doctrine_reference: Daniel 5:21; soberanía divina
- issue: Valor de בני אנשא como lenguaje representativo
  english_pob_reading: the sons of men
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - los seres humanos
  - la humanidad
  rationale: Se preserva la imagen y el contraste con las bestias. Aunque la expresión es genérica, el texto quiere mantener su forma idiomática y su fuerza literaria.
  doctrine_reference: Daniel 5:21; lenguaje representativo
- issue: Alcance de לבב/לבביה como interioridad
  english_pob_reading: his heart was made like the beasts
  chosen_spanish_reading: su corazón fue hecho semejante al de las bestias
  alternative_spanish_readings:
  - su mente fue hecha semejante a la de las bestias
  - su interior fue hecho como el de las bestias
  rationale: «Corazón» reproduce la metáfora semítica y evita reducir el sentido a lo meramente intelectual. En el contexto puede incluir mente/disposición, pero el texto mantiene la imagen original.
  doctrine_reference: Daniel 5:21; antropología bíblica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la idea de voz pasiva en el verbo de alimentación; por eso se evitó una construcción que sonara enteramente activa en español y se prefirió una formulación breve compatible con el pasivo/resultativo. También se mantuvo la lectura de soberanía divina explícita sin suavizarla, conforme al auditoría inglesa.
  spanish_consistency_notes:
  - Se usó «Dios Altísimo» para el título divino, coherente con el valor del epíteto en Daniel.
  - Se mantuvo «hijos de los hombres» para conservar el paralelismo con las bestias y la textura idiomática del arameo.
  - Se prefirió «morada» y «cuerpo» como equivalentes transparentes y estables en español bíblico.
  - «Asnos monteses» evita un arcaísmo innecesario en el texto principal, pero la nota preserva la alternativa culturalmente relevante.
  - La referencia final a la soberanía se tradujo con un verbo de autoridad («domina») y un verbo de asignación («pone») para reflejar ambos matices del arameo.
