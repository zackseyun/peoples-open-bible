translation:
  language: es
  text: Y subió al altar que había hecho en Betel, el día quince del mes octavo, en el mes que había inventado según su propio corazón[a], e hizo una fiesta para los hijos de Israel[b]; y subió al altar para quemar incienso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el mes que había inventado por su propia voluntad» o «de su propia elección».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Israel», designación nacional estándar del pueblo de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: he went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hasta
  lexicon: HALOT
  rationale: עלה en este contexto cultual conserva el movimiento hacia el altar; en español, «subió» es natural y mantiene la repetición narrativa del original sin añadir matiz innecesario.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el ara
  - el altar sacrificial
  lexicon: HALOT
  rationale: מזבח se vierte de forma directa como «altar». «Ara» sería más eclesiástico y menos transparente; «altar sacrificial» explicita algo que el contexto ya deja claro.
- source_word: אֲשֶׁר עָשָׂה בְּבֵית אֵל
  english_pob_choice: that he had made in Bethel
  chosen_spanish: que había hecho en Betel
  alternatives_spanish:
  - que había hecho en Bet-el
  - que había construido en Betel
  lexicon: HALOT
  rationale: La relativa expresa con claridad la ubicación y la acción. «Hecho» conserva la amplitud del hebreo עשה, que puede abarcar fabricar, construir o preparar; no se estrecha innecesariamente.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם
  english_pob_choice: on the fifteenth day
  chosen_spanish: el día quince
  alternatives_spanish:
  - el quince
  - en el día quince
  lexicon: HALOT
  rationale: En español, la fecha queda más natural como «el día quince» dentro de la secuencia temporal del versículo. El valor de «on» ya queda cubierto por la estructura de la frase.
- source_word: בַּחֹדֶשׁ הַשְּׁמִינִי
  english_pob_choice: in the eighth month
  chosen_spanish: del mes octavo
  alternatives_spanish:
  - en el octavo mes
  - del octavo mes
  lexicon: HALOT
  rationale: La secuencia hebrea usa construcción temporal por «mes». «Del mes octavo» suena idiomático en español bíblico moderno y conserva la referencia calendárica.
- source_word: בַּחֹדֶשׁ אֲשֶׁר בָּדָא מִלְּבַד
  english_pob_choice: in the month that he had devised from his own heart
  chosen_spanish: en el mes que había inventado de su propio corazón
  alternatives_spanish:
  - en el mes que había ideado por sí mismo
  - en el mes que había concebido de su propio corazón
  lexicon: HALOT
  rationale: בדא expresa inventar/idear algo no establecido; «inventado» retiene la crítica del narrador. «De su propio corazón» preserva la antropología evaluativa del hebreo y la observación de que el mes procedía de su iniciativa interior, no de mandato divino.
- source_word: וַיַּעַשׂ חָג
  english_pob_choice: he made a feast
  chosen_spanish: e hizo fiesta
  alternatives_spanish:
  - e instituyó una fiesta
  - y celebró una fiesta
  lexicon: HALOT
  rationale: עשה + חג se puede verter de forma cercana como «hacer fiesta». «Hizo fiesta» conserva la sencillez del hebreo y evita imponer un término litúrgico más elaborado de lo que exige el texto.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los hijos de Israel, es decir, los israelitas
  - para los israelitas
  lexicon: HALOT
  rationale: Se mantiene la expresión formal «hijos de Israel» para reflejar el hebreo בני ישראל. «Hijos» aquí funciona como designación nacional/corporativa, no como restricción biológica.
- source_word: לְהַקְטִיר
  english_pob_choice: to burn incense
  chosen_spanish: para quemar incienso
  alternatives_spanish:
  - para ofrecer incienso
  - para hacer subir incienso
  lexicon: HALOT
  rationale: הקטיר literalmente implica hacer subir humo; en este contexto cultual, «quemar incienso» es la equivalencia española natural y precisa, sin perder el sentido ritual.
theological_decisions:
- issue: Mes festivo de invención humana frente a institución divina
  english_pob_reading: in the month that he had devised from his own heart
  chosen_spanish_reading: en el mes que había inventado de su propio corazón
  alternative_spanish_readings:
  - en el mes que había ideado por sí mismo
  - en el mes que había concebido de su propio corazón
  rationale: 'La frase debe conservar la evaluación implícita del narrador: la fiesta no procede de Yahvé sino de una iniciativa humana. «De su propio corazón» mantiene el tono hebreo y la crítica teológica sin explicitar más de lo que el verso dice.'
  doctrine_reference: 'Translation philosophy #3, #5'
- issue: Designación corporativa בני ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - Israelitas
  - pueblo de Israel
  rationale: Se preserva la forma masculina plural del hebreo como designación histórica y corporativa. En español, «hijos de Israel» puede sonar más formal, pero refleja mejor la estructura del original y evita neutralizar un rasgo textual real.
  doctrine_reference: 'Translation philosophy #4'
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran acuerdo alto y no registran revisiones aplicadas. La redacción española sigue de cerca las decisiones ya auditadas, preservando el matiz crítico de «inventado de su propio corazón» y la formulación formal «hijos de Israel» sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino explícito; en este versículo no aparece.
  - «Betel» se conserva como topónimo usual en español bíblico sin adaptación adicional.
  - La repetición de «subió al altar» en ambos cola del versículo refleja la reiteración del hebreo.
  - Se evitó «SEÑOR» o «Cristo» porque no corresponden al texto de base.
