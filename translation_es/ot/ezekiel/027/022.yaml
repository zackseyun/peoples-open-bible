  text: רֹכְלֵ֤י שְׁבָא֙ וְ/רַעְמָ֔ה הֵ֖מָּה רֹכְלָ֑יִ/ךְ בְּ/רֹ֨אשׁ כָּל בֹּ֜שֶׂם וּ/בְ/כָל אֶ֤בֶן יְקָרָה֙ וְ/זָהָ֔ב נָתְנ֖וּ עִזְבוֹנָֽיִ/ךְ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/027/022.yaml
  text: The merchants of Sheba and Raamah—they were your merchants; with the finest of every spice[a], with every precious stone, and gold, they paid for your wares.
  footnotes:
  - marker: a
    text: Or 'they gave for your merchandise.' The Hebrew verb is literally 'gave,' but here it functions in a commercial sense.
    reason: lexical_alternative
