review_pass:
  verdict: revise
  source_alignment_summary: ‘El borrador español refleja bien la estructura y el sentido general del griego: ἀνθρώποις = ‘hombres’, τὰς ψυχὰς αὐτῶν = ‘sus vidas’, ὑπὲρ τοῦ ὀνόματος = ‘por el nombre’, y κυρίου ἡμῶν Ἰησοῦ Χριστοῦ = ‘de nuestro Señor Jesús Mesías’. También sigue correctamente la decisión auditada de traducir Χριστοῦ como título (‘Mesías’). La única desalineación relevante está en la nota a: presentada como alternativa, repite exactamente el texto principal en vez de preservar la alternativa documentada (‘han puesto en riesgo sus vidas’ / literal ‘habiendo entregado...’).’
  spanish_quality_summary: El español principal es claro, digno y natural. ‘Hombres que han entregado sus vidas...’ suena bien en registro bíblico contemporáneo. La nota b es comprensible, aunque ‘Jesús Cristo’ no es la formulación más idiomática en español; aun así, como explicación de la forma griega, puede mantenerse. La reparación necesaria es menor y se limita a la nota a para evitar redundancia y reflejar mejor el expediente inglés.
  glossary_alignment: ‘Buena alineación con la terminología del proyecto: Χριστός -> ‘Mesías’, Ἰησοῦς -> ‘Jesús’, κύριος -> ‘Señor’, ψυχή -> ‘vida’ por contexto. No hay conflicto con los defaults doctrinales. La revisión propuesta mantiene intacto ese alineamiento.’
  issues:
  - severity: medium
    issue: La nota [a] no preserva una alternativa real
    rationale: ‘La nota dice ‘O: “han entregado sus vidas”’, que duplica el texto principal y no cumple la función de nota léxica alternativa. El expediente inglés documenta como alternativa ‘have handed over their lives’ y explica el sentido idiomático de exposición a peligro mortal; en español conviene reflejar una alternativa auténtica, por ejemplo ‘han puesto en riesgo sus vidas’, y conservar la explicación literal.’
  - severity: low
    issue: La formulación de la nota [b] (‘Jesús Cristo’) es poco idiomática en español
    rationale: No afecta el texto bíblico principal ni la decisión teológica correcta (‘Jesús Mesías’), pero la nota explicativa puede sonar extraña al lector. Aun así, no exige adjudicación difícil; basta con una formulación más natural que aclare que el griego tiene ‘Jesús Christos/Jesús Cristo’ y que aquí se traduce semánticamente como ‘Jesús Mesías’.
  revised_spanish_text: hombres que han entregado sus vidas por el nombre de nuestro Señor Jesús Mesías[a][b].
  revised_footnotes:
  - marker: a
    text: ‘O: «han puesto en riesgo sus vidas»; el griego es más literalmente «habiendo entregado sus vidas», un giro idiomático para exponerse a peligro mortal.’
    reason: lexical_alternative
  - marker: b
    text: El griego dice ‘Jesús Cristo’; aquí se traduce ‘Jesús Mesías’ porque Χριστός funciona como título con el sentido de ‘Mesías’.
    reason: alternative_reading
  revision_rationale: El texto principal puede mantenerse. Solo hace falta corregir la nota [a] para que ofrezca una alternativa léxica real y conserve la explicación del idiomatismo griego, en vez de repetir exactamente la redacción principal.
