  text: Τοῦτο δέ φημι, ἀδελφοί, ὅτι σὰρξ καὶ αἷμα βασιλείαν θεοῦ κληρονομῆσαι οὐ ⸀δύναται, οὐδὲ ἡ φθορὰ τὴν ἀφθαρσίαν κληρονομεῖ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/050.yaml
  text: 'Now I say this[a], brothers: flesh and blood cannot inherit the kingdom of God[b], nor does the perishable inherit the imperishable.'
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and may address the whole congregation inclusively.
    reason: lexical_alternative
  - marker: b
    text: '''Flesh and blood'' is an idiom for mortal human life in its present condition, not a denial of bodily resurrection.'
    reason: cultural_note
translation:
  language: ko
  text: 형제 여러분, 내가 이것을 말합니다. 살과 피는 하나님의 나라를 상속받을 수 없으며, 썩는 것이 썩지 아니함을 상속받지도 못합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「살과 피」는 죽을 수밖에 없는 현재의 인간 생명을 가리키는 관용 표현으로, 신체적 부활을 부정하는 진술이 아니다.
    reason: cultural_note
