source:
  edition: SBLGNT
  text: Περιτομὴ μὲν γὰρ ὠφελεῖ ἐὰν νόμον πράσσῃς· ἐὰν δὲ παραβάτης νόμου ᾖς, ἡ περιτομή σου ἀκροβυστία γέγονεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/002/025.yaml
  text: Circumcision indeed is beneficial if you practice the law[a]; but if you are a transgressor of the law[d][c][b], your circumcision has become uncircumcision.
  footnotes:
  - marker: a
    text: Or 'is of value' for 'is beneficial.'
    reason: lexical_alternative
  - marker: b
    text: Or 'if you keep the law.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a lawbreaker.'
    reason: lexical_alternative
  - marker: d
    text: Lit. 'your circumcision has become uncircumcision'; that is, covenant circumcision loses its value when the law is transgressed.
    reason: cultural_note
translation:
  language: ko
  text: 할례는 네가 율법을 행하면 유익하지만, 네가 율법을 범하는 자라면, 너의 할례는 무할례가 된다.
  philosophy: optimal-equivalence
lexical_decisions:
