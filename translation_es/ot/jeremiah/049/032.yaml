review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: camellos como botín, abundancia de ganado como despojo, dispersión en todas direcciones, calamidad traída desde todos lados, y la fórmula profética con Yahvé. Sin embargo, la nota [a] está mal anclada: el marcador aparece sobre «botín», pero la nota explica קְצוּצֵי פֵאָה, no לָבַז. Además, «las puntas del cabello» no corresponde bien a פֵאָה, que alude a los bordes/laterales/sienes, no a las puntas.'
  spanish_quality_summary: El español es claro y digno, pero hay un problema formal importante de notas y una mejora léxica necesaria para evitar una imagen incorrecta. «A todo viento» es inteligible, aunque «a todo viento»/«a cada viento» ambas son posibles; la formulación actual funciona. «Desde todos los lados haré venir su calamidad sobre ellos» es comprensible, aunque algo rígida; puede mejorarse levemente sin perder cercanía al original.
  glossary_alignment: Se respeta correctamente «Yahvé» para יהוה. No hay conflictos con la terminología doctrinal principal. La diferenciación entre לָבַז («botín») y לְשָׁלָל («despojo») está bien mantenida.
  issues:
  - severity: high
    issue: El marcador de la nota [a] está anclado a «botín», pero la nota trata sobre «los que se cortan las puntas del cabello».
    rationale: Las instrucciones exigen que cada nota aparezca en el lugar correspondiente del texto. Tal como está, la nota induce a interpretar erróneamente לָבַז.
  - severity: medium
    issue: «Las puntas del cabello» traduce de forma inexacta קְצוּצֵי פֵאָה.
    rationale: פֵאָה aquí se refiere a los bordes/lados/extremos laterales del cabello, probablemente las sienes o las comisuras del peinado, no a las puntas del cabello en sentido general.
  - severity: low
    issue: La secuencia «desde todos los lados haré venir su calamidad sobre ellos» suena algo pesada en español.
    rationale: Aunque fiel, una leve reordenación mejora la naturalidad sin perder la doble idea de procedencia y destino del juicio.
  revised_spanish_text: Sus camellos serán botín, y la abundancia de su ganado, despojo. Yo los esparciré a todo viento, a los que se cortan los bordes del cabello[a], y desde todos los lados haré venir sobre ellos su calamidad[b], declara Yahvé.
  revised_footnotes:
  - marker: a
    text: O «a los que llevan las sienes cortadas». La expresión hebrea alude a una práctica distintiva de arreglo del cabello, probablemente el recorte del borde o las sienes.
    reason: lexical_alternative
  - marker: b
    text: O «desde todas partes» o «de todos lados».
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota [a] para que corresponda a קְצוּצֵי פֵאָה y no a «botín». También se cambió «las puntas del cabello» por «los bordes del cabello», que representa mejor פֵאָה. Finalmente, se reordenó ligeramente la cláusula final a «haré venir sobre ellos su calamidad» para un español más natural conservando el sentido fuente.
