  text: כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל כַּ/תְּאֵנִ֥ים הַ/טֹּב֖וֹת הָ/אֵ֑לֶּה כֵּֽן אַכִּ֞יר אֶת גָּל֣וּת יְהוּדָ֗ה אֲשֶׁ֨ר שִׁלַּ֜חְתִּי מִן הַ/מָּק֥וֹם הַ/זֶּ֛ה אֶ֥רֶץ כַּשְׂדִּ֖ים לְ/טוֹבָֽה־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/024/005.yaml
  text: 'Thus says Yahweh[a], the God of Israel: Like these good figs, so I will regard the exiles of Judah, whom I sent away from this place to the land of the Chaldeans[b], for good.'
  footnotes:
  - marker: a
    text: Or 'the exile of Judah' or 'the captivity of Judah.' The Hebrew can denote either the exiled people or the state/event of exile; here the personal sense best fits 'whom I sent away.'
    reason: alternative_reading
  - marker: b
    text: Or 'for their good.' The Hebrew simply says 'for good,' leaving the beneficiary implicit.
    reason: lexical_alternative
