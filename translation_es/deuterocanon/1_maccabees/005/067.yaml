translation:
  language: es
  text: Aquel día cayeron sacerdotes en combate, porque querían actuar con valentía[a], cuando salieron al combate sin consejo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «distinguirse» o «hacer una hazaña heroica»; el verbo griego expresa mostrar valor.
    reason: lexical_alternative
  - marker: b
    text: O «sin deliberación» o «sin tomar consejo»; el adverbio significa literalmente «sin consejo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσαν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - murieron
  - fueron muertos
  lexicon: BDAG
  rationale: El verbo se usa con frecuencia como eufemismo de muerte en contexto bélico. «Cayeron» conserva el registro militar y suena natural en español sin explicitar más de lo que el griego permite.
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - los sacerdotes
  - presbíteros
  lexicon: BDAG
  rationale: El plural sin artículo se refiere a la clase sacerdotal. «Sacerdotes» comunica bien el oficio en español y evita forzar una determinación que el griego no marca.
- source_word: πολέμῳ
  english_pob_choice: in battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - en guerra
  - en combate
  lexicon: BDAG
  rationale: El dativo expresa el ámbito o circunstancia de la muerte. «En la batalla» mantiene el matiz bélico de manera idiomática.
- source_word: βουλομένου αὐτοῦ
  english_pob_choice: because they wanted
  chosen_spanish: porque querían
  alternatives_spanish:
  - porque él quería
  - mientras querían
  lexicon: BDAG
  rationale: Aunque la construcción griega es de genitivo absoluto singular, el contexto de revisión inglesa favorece un sujeto plural implícito. En español se conserva esa lectura contextual con «querían», sin resolver de forma artificiosa el antecedente implícito.
- source_word: ἀνδραγαθῆσαι
  english_pob_choice: to act bravely
  chosen_spanish: actuar con valentía
  alternatives_spanish:
  - hacer una hazaña heroica
  - distinguirse con valor
  lexicon: LSJ
  rationale: El verbo expresa valor o conducta heroica. «Actuar con valentía» transmite el sentido de forma clara y digna, sin introducir un giro demasiado literal o marcado por género.
- source_word: ἐν τῷ αὐτοὺς ἐξελθεῖν
  english_pob_choice: when they went out
  chosen_spanish: cuando salieron
  alternatives_spanish:
  - al salir ellos
  - en su salir
  lexicon: BDAG
  rationale: El infinitivo articular con sujeto en acusativo funciona temporalmente. «Cuando salieron» es la forma española más natural y fiel al valor temporal.
- source_word: εἰς τὸν πόλεμον
  english_pob_choice: into battle
  chosen_spanish: al combate
  alternatives_spanish:
  - a la guerra
  - hacia la batalla
  lexicon: BDAG
  rationale: El movimiento hacia un conflicto concreto se expresa de forma idiomática en español con «al combate». Mantiene la concreción militar del texto.
- source_word: ἀβουλεύτως
  english_pob_choice: without counsel
  chosen_spanish: sin consejo
  alternatives_spanish:
  - sin deliberación
  - temerariamente
  - sin tomar consejo
  lexicon: LSJ
  rationale: El adverbio significa literalmente «sin consejo» o «sin deliberación». «Sin consejo» preserva la fuerza léxica básica y deja abierta la posible implicación de imprudencia o falta de consulta.
theological_decisions:
- issue: Referencia implícita de βουλομένου αὐτοῦ ἀνδραγαθῆσαι
  english_pob_reading: The English audit trail revised the line to plural 'they wanted' to fit the surrounding context and the infinitive construction, while leaving the referent implicit.
  chosen_spanish_reading: Se opta por un plural implícito en español («querían») para reflejar la lectura contextual del pasaje, sin nombrar indebidamente al referente no explicitado en este versículo.
  alternative_spanish_readings:
  - «porque él quería actuar con valentía»
  - «porque querían actuar con valentía» con antecedente explícito
  rationale: El griego transmitido y el proceso de revisión inglesa muestran una tensión entre la forma singular de la construcción y el sentido contextual plural. La traducción española conserva esa tensión de manera responsable al no resolver el antecedente más allá de lo que el texto permite.
  doctrine_reference: Primacía del texto fuente y preservación de ambigüedad contextual; no sobreespecificar un referente no explícito.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió «he wanted» a «they wanted» para ajustarse al contexto plural implícito, y suprimió el artículo repetido antes de «battle». La presente redacción española sigue esa revisión contextual, manteniendo la ambigüedad del referente implícito sin forzarlo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» en todo el proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - «Sacerdotes» se usa para ἱερεῖς como clase sacerdotal, no «siervos» ni otro término eclesiástico.
  - «Sin consejo» conserva el valor léxico de ἀβουλεύτως y evita paraphrasear hacia una simple condena moral.
  - La puntuación y el orden sintáctico buscan sonar naturales en español sin perder el paralelismo causal-temporal del griego.
