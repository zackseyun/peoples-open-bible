review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: los hijos de Gad residían en relación espacial con el grupo anterior, en Basán, hasta Salecá. Sin embargo, la nota a [a] se desvía del matiz léxico documentado: el hebreo לְנֶגְדָּם expresa posición relativa (‘frente a / opuesto a / delante de’), no ‘estuvieron junto a ellos’ ni requiere repetir ‘estuvieron’.'
  spanish_quality_summary: El texto principal es claro, natural y digno. ‘Habitaron’, ‘frente a ellos’, ‘en la tierra de Basán’ y ‘hasta Salecá’ son lecturas españolas fluidas. La mejora necesaria es principalmente en la nota, para alinear alternativas con el expediente inglés y evitar una opción menos fiel (‘junto a ellos’ formulada como ‘estuvieron junto a ellos’).
  glossary_alignment: No hay términos del glosario mayor en juego. Los nombres propios ‘Gad’ y ‘Basán’ están bien. La transliteración ‘Salecá’ es aceptable con nota alternativa ‘Salká’.
  issues:
  - severity: medium
    issue: 'La nota [a] ofrece una alternativa menos fiel al hebreo: ‘estuvieron junto a ellos’.'
    rationale: 'El expediente inglés documenta ‘next to them’ como posibilidad, pero el español propuesto cambia innecesariamente el verbo y debilita el valor espacial principal de לְנֶגְדָּם. Conviene mantener alternativas nominalmente paralelas al texto principal: ‘junto a ellos’ o ‘frente a ellos’/‘delante de ellos’.'
  - severity: low
    issue: La razón de la nota [a] podría expresarse con mayor precisión y naturalidad en español.
    rationale: ‘Señala posición relativa respecto del grupo mencionado antes’ es entendible, pero ‘indica una ubicación relativa con respecto al grupo mencionado antes’ suena más natural y exacto.
  revised_spanish_text: Y los hijos de Gad habitaron[a] frente a ellos en la tierra de Basán, hasta Salecá[b].
  revised_footnotes:
  - marker: a
    text: O ‘junto a ellos’ o ‘delante de ellos’; la expresión hebrea indica una ubicación relativa con respecto al grupo mencionado antes.
    reason: lexical_alternative
  - marker: b
    text: También puede transliterarse ‘Salká’.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Se corrige la nota [a] para ajustar mejor las alternativas al valor espacial de לְנֶגְדָּם y al expediente inglés, evitando el cambio innecesario de verbo y mejorando la precisión del comentario.
