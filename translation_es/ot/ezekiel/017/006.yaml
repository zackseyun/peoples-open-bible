translation:
  language: es
  text: Y brotó y llegó a ser una vid extendida[a], de baja estatura, con sus ramas vueltas hacia él[b] y sus raíces debajo de él[b]. Así llegó a ser una vid[c] y produjo ramas y echó frondas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «frondosa» o «ramificada» para «extendida».
    reason: lexical_alternative
  - marker: b
    text: Los pronombres masculinos singulares «él» probablemente se refieren al gran águila de la alegoría (cf. Ezequiel 17:3–4), aunque algunos traducen más impersonalmente «ello».
    reason: cross_reference
  - marker: c
    text: La repetición de «llegó a ser una vid» se conserva del hebreo para énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְמַח
  english_pob_choice: it sprouted
  chosen_spanish: brotó
  alternatives_spanish:
  - creció
  - surgió
  lexicon: HALOT
  rationale: צמח describe la aparición inicial del crecimiento; 'brotó' conserva la imagen vegetal concreta y natural en español.
- source_word: וַיְהִי לְגֶפֶן
  english_pob_choice: became a ... vine
  chosen_spanish: llegó a ser una vid
  alternatives_spanish:
  - se volvió una vid
  - se hizo vid
  lexicon: HALOT
  rationale: La construcción expresa resultado o transformación; 'llegó a ser' mantiene bien ese valor sin sonar forzado.
- source_word: סֹרַחַת
  english_pob_choice: spreading
  chosen_spanish: extendida
  alternatives_spanish:
  - frondosa
  - ramificada
  lexicon: HALOT
  rationale: La participio indica expansión lateral; 'extendida' conserva la idea de expansión sin sobrecargarla con una valoración de exuberancia.
- source_word: שִׁפְלַת קוֹמָה
  english_pob_choice: low in stature
  chosen_spanish: baja en estatura
  alternatives_spanish:
  - de baja estatura
  - de poca altura
  lexicon: HALOT
  rationale: La expresión es literalmente 'baja de estatura/altura'; 'baja en estatura' es claro y fiel al paralelismo físico-metafórico.
- source_word: דָּלִיּוֹתָיו
  english_pob_choice: its branches
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus sarmientos
  - sus ramas colgantes
  lexicon: HALOT
  rationale: El término se refiere a ramas extendidas/colgantes de la vid; 'ramas' es el equivalente más natural y transparente en español.
- source_word: אֵלָיו
  english_pob_choice: him
  chosen_spanish: hacia él
  alternatives_spanish:
  - hacia él mismo
  - en dirección a él
  lexicon: HALOT
  rationale: Se conserva el pronombre personal masculino singular para no despersonalizar la alegoría; 'hacia él' refleja la orientación direccional.
- source_word: וְשָׁרָשָׁיו תַּחְתָּיו יִהְיוּ
  english_pob_choice: and its roots beneath him
  chosen_spanish: y sus raíces debajo de él
  alternatives_spanish:
  - y sus raíces bajo él
  - mientras sus raíces quedaban debajo de él
  lexicon: HALOT
  rationale: La cláusula presenta la localización de las raíces; 'debajo de él' mantiene la imagen espacial y el referente personal.
- source_word: וַתְּהִי לְגֶפֶן
  english_pob_choice: So it became a vine
  chosen_spanish: Así llegó a ser una vid
  alternatives_spanish:
  - Y se hizo una vid
  - Entonces se convirtió en vid
  lexicon: HALOT
  rationale: Se preserva la repetición enfática del hebreo con una formulación natural en español.
- source_word: וַתַּעַשׂ בַּדִּים
  english_pob_choice: produced branches
  chosen_spanish: produjo ramas
  alternatives_spanish:
  - hizo ramas
  - echó ramas
  lexicon: HALOT
  rationale: עָשָׂה con בַּדִּים expresa producción de ramas; 'produjo' transmite mejor el resultado vegetativo que un calco literal.
- source_word: וַתְּשַׁלַּח פֹּארוֹת
  english_pob_choice: sent out boughs
  chosen_spanish: echó boughs
  alternatives_spanish:
  - echó brotes
  - envió ramas
  lexicon: HALOT
  rationale: פֹּארוֹת, según el audit trail, se entendió como ramas/boughs más que brotes; se deja 'boughs' sin traducir por falta de un equivalente español breve y seguro en este registro, aunque el estilo es revisable.
theological_decisions:
- issue: Referente de los sufijos masculinos singulares en la alegoría
  english_pob_reading: Render the suffixes personally as 'him,' referring to the eagle/kingly figure in the allegory
  chosen_spanish_reading: Mantener el referente personal con 'él'
  alternative_spanish_readings:
  - neutralizar con 'ello'
  - impersonalizar con 'él/ella'
  rationale: El hebreo usa sufijos masculinos singulares; en la alegoría el referente saliente es el águila/figura regia. Conservar 'él' preserva la personificación y la dependencia política insinuada.
  doctrine_reference: Ezequiel 17:3–4; coherencia narrativa de la parábola
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió 'boughs' en lugar de 'shoots' para פֹּארוֹת. En español, se evitó una traducción demasiado específica como 'brotes' y se dejó una solución provisional que puede revisarse para reflejar mejor ramas/ramaje más desarrollado.
  spanish_consistency_notes:
  - Se mantuvo 'vid' en singular para seguir el paralelismo del hebreo.
  - Se preservó el pronombre masculino singular 'él' por coherencia con el antecedente alegórico.
  - 'La puntuación sigue el ritmo de dos movimientos: crecimiento inicial y desarrollo posterior.'
