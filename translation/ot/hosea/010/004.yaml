theological_decisions:
- issue: Sense of מִשְׁפָּט in a denunciation context
  chosen_reading: judgment
  alternative_readings:
  - justice
  rationale: The verse depicts the social-legal result of false speech and covenant-breaking as something toxic spreading through the land. Rendering מִשְׁפָּט as 'justice' could sound positive in English and obscure the irony/condemnation. 'Judgment' better matches the immediate imagery and prophetic tone.
