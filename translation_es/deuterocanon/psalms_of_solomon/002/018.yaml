revisions:
- from: Tú descubriste sus pecados para que tu juicio[a] fuera revelado[b].
  to: Tú descubriste sus pecados para que se manifestara tu juicio[a].
  rationale: Se conserva el sentido del griego y del POB inglés, pero se ajusta la cláusula final a un español más natural y elegante. «Se manifestara» refleja bien φανῇ y evita el calco menos idiomático «fuera revelado». Se elimina la nota sobre «sentencia» porque «juicio» ya es claramente la mejor opción y la alternativa no es necesaria en español aquí.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:55:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: ἀνέκαλυψας = sacar a la luz, ἁμαρτίας = pecados, ἵνα φανῇ = para que/se manifestara, τὸ κρίμα σου = tu juicio. Sin embargo, «fuera revelado» suena menos natural en español con «juicio» que una formulación pronominal como «se manifestara», y el inglés POB preserva precisamente esa alternativa para φανῇ.'
  spanish_quality_summary: «Tú descubriste sus pecados» es claro y fiel. La cláusula final es comprensible, pero «tu juicio fuera revelado» resulta algo rígida y calcada; «se manifestara tu juicio» o «tu juicio se manifestara» suena más idiomático y mantiene dignidad. Las notas actuales quedan desbalanceadas si se adopta la formulación más natural.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «pecados» para ἁμαρτίας y «juicio» para κρίμα están bien. La mejora propuesta afecta solo la naturalidad y la mejor representación del pasivo/intransitivo de φανῇ en español.
  issues:
  - severity: medium
    issue: La expresión «para que tu juicio fuera revelado» es poco idiomática en español.
    rationale: Aunque es formalmente cercana al inglés auditado, en español bíblico natural «se manifestara tu juicio» representa mejor φανῇ y evita un calco pesado con «revelado».
  - severity: low
    issue: La nota [b] ofrece una alternativa más natural que el texto principal.
    rationale: Si «se manifestara» es mejor español y sigue siendo fiel a φανῇ, conviene promoverla al texto principal y dejar «fuera revelado» como alternativa, no al revés.
  revised_spanish_text: Tú descubriste sus pecados para que se manifestara tu juicio[a].
  revised_footnotes:
  - marker: a
    text: 'También: «para que tu juicio fuera revelado».'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del griego y del POB inglés, pero se ajusta la cláusula final a un español más natural y elegante. «Se manifestara» refleja bien φανῇ y evita el calco menos idiomático «fuera revelado». Se elimina la nota sobre «sentencia» porque «juicio» ya es claramente la mejor opción y la alternativa no es necesaria en español aquí.
