    text: 'Hebreo: ''hacer pasar por el fuego a su hijo o a su hija'', un modismo cultual que se refiere a ofrecer niños en un rito asociado con Molec, probablemente sacrificio infantil.'
    reason: cultural_note
  - marker: b
    text: O 'nadie'. 'Hombre' aquí tiene fuerza genérica; el hebreo usa singular masculino con sentido representativo.
    reason: lexical_alternative
  - marker: c
    text: O posiblemente 'para Molec'; menos probable, algunos entienden las consonantes como 'para el rey'.
    reason: alternative_reading
