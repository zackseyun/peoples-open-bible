translation:
  language: es
  text: Porque un cuerpo perecedero[a] pesa sobre el alma, y la tienda terrenal agobia una mente llena de cuidados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un cuerpo hecho de tierra agobia la mente llena de pensamientos».
    reason: lexical_alternative
lexical_decisions:
- source_word: φθαρτὸν
  english_pob_choice: perishable
  chosen_spanish: perecedero
  alternatives_spanish:
  - corruptible
  - mortal
  lexicon: LSJ/BDAG
  rationale: El adjetivo expresa algo sujeto a descomposición o ruina. «Perecedero» comunica esa fragilidad en español actual sin limitar el sentido solo a la mortalidad corporal.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - organismo
  - carne
  lexicon: LSJ/BDAG
  rationale: Es el equivalente natural y fiel para el cuerpo físico; no hay razón contextual para desplazarlo a un término más interpretativo.
- source_word: βαρύνει
  english_pob_choice: weighs down
  chosen_spanish: pesa sobre
  alternatives_spanish:
  - agobia
  - oprime
  - sobrecarga
  lexicon: LSJ/BDAG
  rationale: El verbo comunica hacer pesado u opresivo. «Pesa sobre» conserva la metáfora de carga y suena natural en español, manteniendo la relación con el alma.
- source_word: ψυχήν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - yo
  - ser
  lexicon: LSJ/BDAG
  rationale: En este contexto sapiencial se contrasta la fragilidad corporal con la realidad interior. «Alma» preserva mejor ese contraste antropológico que «vida» o «yo».
- source_word: βρίθει
  english_pob_choice: burdens
  chosen_spanish: agobia
  alternatives_spanish:
  - oprime
  - carga
  - presiona
  lexicon: LSJ
  rationale: El verbo sugiere peso y presión. «Agobia» transmite la imagen de una carga pesada y enlaza bien con el primer hemistiquio sin perder la fuerza del paralelismo.
- source_word: γεῶδες
  english_pob_choice: earthly
  chosen_spanish: terrenal
  alternatives_spanish:
  - hecho de tierra
  - de tierra
  - terrestre
  lexicon: LSJ
  rationale: El adjetivo significa «de la tierra» o «hecho de tierra». «Terrenal» es claro, digno y mantiene la contraposición entre lo terrenal y la facultad interior.
- source_word: σκῆνος
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tabernáculo
  - morada
  - carpa
  lexicon: LSJ
  rationale: Literalmente es una tienda o habitación temporal. «Tienda» conserva la metáfora de una morada pasajera sin introducir un término eclesiástico o arcaizante.
- source_word: νοῦν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - razón
  lexicon: LSJ/BDAG
  rationale: El término apunta a la facultad intelectual o racional. «Mente» es la equivalencia más natural y clara en español moderno.
- source_word: πολυφρόντιδα
  english_pob_choice: full of cares
  chosen_spanish: llena de cuidados
  alternatives_spanish:
  - llena de pensamientos
  - afligida
  - preocupada
  lexicon: LSJ
  rationale: La palabra denota estar ocupado con muchas preocupaciones o pensamientos. «Llena de cuidados» preserva el sentido de ocupación mental, y «cuidados» refleja bien el peso de múltiples preocupaciones en español bíblico contemporáneo.
theological_decisions:
- issue: Distinción antropológica entre ψυχή y νοῦς
  english_pob_reading: Render ψυχή as 'soul' and νοῦς as 'mind,' preserving the verse's layered distinction between bodily existence and inner faculties.
  chosen_spanish_reading: Traducir ψυχή como «alma» y νοῦς como «mente», conservando la distinción entre la dimensión interior general y la facultad racional.
  alternative_spanish_readings:
  - ψυχή como «vida» y νοῦς como «entendimiento»
  - ψυχή y νοῦς ambas como «ser interior»
  rationale: El versículo mantiene una tensión poética entre el cuerpo perecedero y las funciones interiores del ser humano. Usar «alma» y «mente» evita fusionar ambos términos y deja visible la antropología diferenciada del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
translation_notes:
  revision_awareness: La versión española sigue la revisión final del inglés POB que eliminó el énfasis añadido por «this» antes de «earthly tent». Por eso el texto no introduce un demostrativo equivalente. También conserva el paralelismo de dos miembros con cargas verbales distintas, sin convertirlos en una sola idea.
  spanish_consistency_notes:
  - Se mantuvo «alma» para ψυχή y «mente» para νοῦς para conservar la distinción antropológica.
  - «Tienda terrenal» respeta σκῆνος como morada temporal sin recurrir a «tabernáculo», que sonarían más litúrgico que el griego.
  - No se usó «SEÑOR» ni terminología de sustitución que no corresponde a este pasaje.
  - 'La nota [a] refleja la alternativa lexical del audit trail: «hecho de tierra / llena de pensamientos», útil porque el griego admite esa doble lectura en el hemistiquio final.'
