translation:
  language: es
  text: 'El primero[a] le dice a Sión: «Miren, ahí están[b][c]»; y a Jerusalén doy un heraldo de buenas noticias[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Primero a Sión:».'
    reason: previous_rendering
  - marker: b
    text: El hebreo no especifica quiénes son «ellos»; puede referirse a las personas o a los hechos recién anunciados.
    reason: alternative_reading
  - marker: c
    text: 'O: «Miren, aquí están».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «Daré a Jerusalén un mensajero que trae buenas noticias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רִאשׁוֹן
  english_pob_choice: The first
  chosen_spanish: El primero
  alternatives_spanish:
  - El primero que habla
  - El primero en decirlo
  - El primero
  lexicon: HALOT
  rationale: Rendí רִאשׁוֹן con un sustantivado natural en español para conservar la concisión poética y la fuerza de prioridad del hebreo. 'El primero' mantiene la ambigüedad entre prioridad temporal y valor de antecedente sin añadir sujeto explícito.
- source_word: לְצִיּוֹן
  english_pob_choice: to Zion
  chosen_spanish: a Sión
  alternatives_spanish:
  - para Sión
  lexicon: HALOT
  rationale: La preposición ל aquí marca dirección o destinatario; 'a Sión' es la forma más directa y natural en español para preservar ese valor dativo/direccional.
- source_word: הִנֵּה הִנָּם
  english_pob_choice: Look, here they are!
  chosen_spanish: Miren, ahí están
  alternatives_spanish:
  - ¡Miren, aquí están!
  - Vean, ahí están
  - ¡Miren, he aquí que están!
  lexicon: HALOT
  rationale: El doble deíctico intensivo se expresa bien con 'Miren, ahí están', que suena natural en español y conserva el énfasis imperativo/de mostración. Se evita 'he aquí' por ser más arcaico y menos claro para lectura pública.
- source_word: וְלִירוּשָׁלַם
  english_pob_choice: and to Jerusalem
  chosen_spanish: y para Jerusalén
  alternatives_spanish:
  - y a Jerusalén
  lexicon: HALOT
  rationale: En paralelo con 'a Sión', 'para Jerusalén' refleja el matiz de destinatario/beneficio que el contexto poético permite, sin forzar el texto. 'A Jerusalén' también es posible, pero aquí el paralelo con 'doy' favorece 'para'.
- source_word: מְבַשֵּׂר
  english_pob_choice: a herald of good news
  chosen_spanish: un heraldo de buenas noticias
  alternatives_spanish:
  - un mensajero de buenas noticias
  - uno que trae buenas noticias
  - un anunciador de buenas noticias
  lexicon: HALOT
  rationale: 'בחר el participio agentivo con un sustantivo español que preserve el oficio/función: ''heraldo'' mantiene el carácter oficial del anunciador y ''de buenas noticias'' expresa el contenido del mensaje. ''Mensajero'' es posible, pero menos específico.'
- source_word: אֶתֵּן
  english_pob_choice: I give
  chosen_spanish: doy
  alternatives_spanish:
  - daré
  - entrego
  - pondré
  lexicon: HALOT
  rationale: El imperfecto 1cs en discurso profético puede traducirse en presente para dar viveza inmediata. 'Doy' mantiene la tersura del verso y evita introducir una futura que no es necesaria en el español poético.
theological_decisions:
- issue: Identidad del sujeto implícito en 'El primero'
  english_pob_reading: The first says to Zion...
  chosen_spanish_reading: El primero dice a Sión...
  alternative_spanish_readings:
  - Yo soy el primero y digo a Sión...
  - El primero para Sión...
  rationale: 'Se conserva la ambigüedad del hebreo y del POB inglés revisado: el sujeto no se explicita en el texto base. Añadir ''yo'' o completar la frase resolvería una tensión sintáctica que el hebreo deja comprimida.'
  doctrine_reference: Preservar la tensión textual y la economía del original
- issue: Referente de 'ahí están'
  english_pob_reading: the Hebrew does not explicitly identify who 'they' are
  chosen_spanish_reading: Miren, ahí están
  alternative_spanish_readings:
  - Miren, ahí están ellos
  - Miren, ahí están las cosas anunciadas
  - Miren, ahí están los que vuelven
  rationale: El hebreo no especifica el antecedente plural; por eso la traducción conserva la indeterminación. No se identifica si son personas, acontecimientos o agentes enviados.
  doctrine_reference: Preservar la ambigüedad referencial del hebreo
- issue: Relación de Yahvé con la palabra anunciada a Jerusalén
  english_pob_reading: I give a herald of good news
  chosen_spanish_reading: doy un heraldo de buenas noticias
  alternative_spanish_readings:
  - daré un heraldo de buenas noticias
  - doy un mensajero de buenas noticias
  rationale: La frase mantiene la acción divina de conceder/designar al heraldo sin convertirla en una paráfrasis interpretativa. 'Heraldo' conserva mejor la función proclamadora que un simple 'mensajero'.
  doctrine_reference: La iniciativa de la revelación y del anuncio pertenece a Dios
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que volvió más literal la relación sintáctica de רִאשׁוֹן לְצִיּוֹן, evitando suplir un sujeto explícito. También conserva la decisión auditada de traducir מְבַשֵּׂר como un sustantivo agentivo ('heraldo de buenas noticias') y de mantener la referencia plural de הִנָּם sin precisar el antecedente.
  spanish_consistency_notes:
  - Se usa 'Sión' y 'Jerusalén' con mayúscula como nombres propios geográficos y teológicos.
  - Se mantiene la economía poética del verso, evitando añadir verbos o sujetos que no estén en el hebreo.
  - '''Buenas noticias'' se usa de manera consistente para el contenido de בָּשַׂר/מְבַשֵּׂר en este pasaje.'
  - Se evita 'SEÑOR' u otra sustitución para el nombre divino porque el verso no contiene el tetragrámaton.
