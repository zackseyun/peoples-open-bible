source:
  edition: SBLGNT
  text: ὃς παρεδόθη διὰ τὰ παραπτώματα ἡμῶν καὶ ἠγέρθη διὰ τὴν δικαίωσιν ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/004/025.yaml
  text: who was handed over because of our trespasses and was raised for our justification[a][b].
  footnotes:
  - marker: a
    text: Or "because of our justification."
