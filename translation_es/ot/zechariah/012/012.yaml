    reason: alternative_reading
  revision_rationale: Se reubicó y ajustó la nota distributiva para anclarla correctamente a «familia por familia». Se añadió la nota alternativa exigida por el audit trail para הָאָרֶץ. Se cambió «sus mujeres» por «sus esposas» para reflejar mejor וּנְשֵׁיהֶם en este contexto. También se mejoró la naturalidad con «se lamentará».
