review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura retórica del hebreo: dos preguntas paralelas seguidas por la inferencia «¿Por qué entonces…?». Conserva adecuadamente «Galaad», «médico» y la personificación «la hija de mi pueblo». Sin embargo, «no ha sobrevenido» para לֹא עָלְתָה/«has not come about» suena poco natural en este contexto de sanidad; «no ha llegado» o «no se ha producido» comunica mejor el sentido resultativo sin extrañeza. Además, la nota a contiene un error ortográfico («balsamo»).'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero requiere un ajuste de naturalidad léxica en la última cláusula. «¿Por qué entonces no ha llegado la curación…?» fluye mejor en español bíblico contemporáneo que «no ha sobrevenido». También conviene corregir la ortografía y puntuación tipográfica de la nota a. La nota b actualmente ofrece «curación» como alternativa de «curación», lo cual no añade información útil; debe preservar las alternativas del inglés: «recuperación» o «restauración/restablecimiento».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Bálsamo», «Galaad», «médico» y «la hija de mi pueblo» están alineados con el rastro léxico y teológico del POB. Se recomienda mantener «bálsamo» con alternativas en nota («resina», «bálsamo») según el audit trail; en español puede añadirse «resina» y mantener «bálsamo» como principal. La excepción necesaria es mejorar la expresión de לֹא עָלְתָה a «no ha llegado», más idiomática en español.
  issues:
  - severity: medium
    issue: «no ha sobrevenido» suena forzado para la llegada/aparición de la curación
    rationale: Aunque semánticamente posible, no es la formulación más natural ni más clara en español contemporáneo para אֲרֻכַת ... לֹא עָלְתָה. «No ha llegado» preserva mejor el sentido resultativo/documentado.
  - severity: medium
    issue: La nota b repite el término principal en vez de dar alternativas reales
    rationale: Dice «O “curación” o “restablecimiento” para “la curación”»; «curación» no es alternativa de sí misma. Debe reflejar las alternativas del audit trail inglés, p. ej. «recuperación» o «restauración»/«restablecimiento».
  - severity: low
    issue: 'Error ortográfico en la nota a: «balsamo»'
    rationale: En español debe escribirse «bálsamo».
