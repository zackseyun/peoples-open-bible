base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/006/012.yaml
  text: Therefore I urge those who read this book not to be disheartened because of these calamities[a], but to consider that these punishments are not for destruction[c][b], but for the discipline of our people.
  footnotes:
