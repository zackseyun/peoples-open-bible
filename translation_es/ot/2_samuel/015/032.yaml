    issue: '''donde adoraba a Dios'' sobreinterpreta el aspecto verbal'
    rationale: El hebreo imperfecto admite matiz habitual, pero la revisión final del POB inglés retiró 'used to' por no estar expresado. En español, 'adoraba' favorece ese matiz más de lo necesario; 'donde adoró a Dios' o una nota que preserve la alternativa es más fiel al estado auditado.
  - severity: high
