translation:
  language: es
  text: 'Entonces él irrumpe como el viento[b] y sigue de largo; se vuelve culpable[a]: esta fuerza suya es su dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula final en hebreo es breve y también puede entenderse como: «se vuelve culpable, atribuyendo esta fuerza a su dios» o «su fuerza pertenece a su dios».'
    reason: alternative_reading
  - marker: b
    text: La palabra hebrea traducida «viento» también puede significar «espíritu»; aquí el contexto favorece la imagen de movimiento rápido y violento.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces, en ese momento
  lexicon: HALOT
  rationale: Marca la secuencia temporal del oráculo; «Entonces» es natural, solemne y fiel al valor discursivo del adverbio.
- source_word: חָלַף רוּחַ
  english_pob_choice: sweeps by like the wind
  chosen_spanish: pasa como el viento
  alternatives_spanish:
  - sigue como el viento
  - se desliza como el viento
  lexicon: HALOT
  rationale: El hebreo combina la idea de pasar con la imagen de rapidez impetuosa; en español, «pasa como el viento» conserva la comparación sin sobrecargar el verbo.
- source_word: וַיַּעֲבֹר
  english_pob_choice: and passes on
  chosen_spanish: y sigue de largo
  alternatives_spanish:
  - y pasa adelante
  - y continúa
  lexicon: HALOT
  rationale: Mantiene la secuencia verbal y la impresión de avance rápido. «Sigue de largo» suena idiomático y todavía transmite el movimiento continuo.
- source_word: וְאָשֵׁם
  english_pob_choice: he becomes guilty
  chosen_spanish: se vuelve culpable
  alternatives_spanish:
  - se hace culpable
  - incurre en culpa
  - queda culpable
  lexicon: HALOT
  rationale: El verbo expresa volverse culpable o incurrir en culpa; «se vuelve culpable» preserva el valor verbal y evita reducirlo a un mero adjetivo estático.
- source_word: כֹחוֹ
  english_pob_choice: strength of his
  chosen_spanish: esta fuerza suya
  alternatives_spanish:
  - su fuerza
  - su poder
  - esta fortaleza suya
  lexicon: HALOT
  rationale: Se trata de la potencia militar/imperial del personaje; «fuerza» es suficientemente concreta y «suya» conserva el énfasis pronominal del hebreo.
- source_word: לֵאלֹהוֹ
  english_pob_choice: is his god
  chosen_spanish: es su dios
  alternatives_spanish:
  - pertenece a su dios
  - es para su dios
  - se la atribuye a su dios
  lexicon: HALOT
  rationale: El cierre hebreo es terse y admite varias relaciones sintácticas. «Es su dios» sigue la lectura crítica donde la fuerza misma funciona como objeto de idolatría o auto-deificación.
theological_decisions:
- issue: Lectura del cierre lē-ʾĕlōhō, especialmente la relación entre la fuerza y el dios mencionado
  english_pob_reading: The Chaldean is guilty because he regards his own strength as his god.
  chosen_spanish_reading: Se mantiene la acusación de culpabilidad y la posible idea de que su propia fuerza funciona como su dios.
  alternative_spanish_readings:
  - Se vuelve culpable, atribuyendo esta fuerza a su dios.
  - Se vuelve culpable, y esta fuerza pertenece a su dios.
  rationale: 'El hebreo es muy compacto y permite más de una construcción. La opción principal conserva la tensión teológica sin resolverla de forma excesiva: la violencia imperial queda asociada con una culpabilidad que puede deberse a la idolatría de la propia fuerza o a su atribución indebida a una divinidad.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado de alta concordancia confirma que no se requieren ajustes adicionales respecto del paquete fuente y el audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene «dios» en minúscula porque el hebreo final no exige aquí el nombre divino Yahvé, sino un sustantivo común dentro de una acusación de idolatría o de relación sintáctica ambigua.
  - Se evita «SEÑOR» por no corresponder al texto hebreo de este versículo.
  - «Culpable» preserva el valor verbal de וְאָשֵׁם sin convertirlo en una simple etiqueta adjetival.
  - La comparación con «el viento» sigue la lectura contextual del inglés POB; no se fuerza «espíritu» en el texto principal, pero se documenta la alternativa en nota.
