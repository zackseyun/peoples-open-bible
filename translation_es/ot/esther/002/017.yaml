translation:
  language: es
  text: Y el rey amó a Ester más que a todas las mujeres[a], y ella halló favor y bondad delante de él[b] más que a todas las vírgenes[c]. Puso sobre su cabeza la corona real y la hizo reina en lugar de Vasti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por encima de todas las mujeres». El hebreo expresa una comparación explícita.
    reason: alternative_reading
  - marker: b
    text: O «ganó favor y bondad delante de él». El hebreo dice literalmente que «llevó/portó» favor y bondad delante de él.
    reason: lexical_alternative
  - marker: c
    text: «Vírgenes» traduce un término hebreo más específico que «mujeres» al comienzo del versículo; se conserva la distinción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱהַב
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amaba
  - llegó a amar
  lexicon: HALOT
  rationale: אהב expresa amor/afecto de manera directa. En español, «amó» conserva ese sentido con tono narrativo sobrio y fiel, sin rebajarlo a mera preferencia.
- source_word: מִכָּל הַנָּשִׁים
  english_pob_choice: more than all the women
  chosen_spanish: más que a todas las mujeres
  alternatives_spanish:
  - por encima de todas las mujeres
  - más que a cualquier mujer
  lexicon: HALOT
  rationale: La construcción comparativa se conserva con claridad en español. «Mujeres» refleja נָשִׁים como término general en el contexto de la corte, sin forzar un sentido más específico.
- source_word: וַתִּשָּׂא חֵן וָחֶסֶד
  english_pob_choice: she found favor and kindness
  chosen_spanish: halló favor y bondad
  alternatives_spanish:
  - ganó favor y bondad
  - halló gracia y bondad
  lexicon: HALOT
  rationale: Se mantiene la distinción entre חֵן y חֶסֶד con dos sustantivos en español. «Halló» comunica el valor idiomático de la expresión, evitando una traducción literal poco natural del hebreo.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - a su vista
  lexicon: HALOT
  rationale: La frase expresa presencia y relación de favor. «Delante de él» reproduce bien el valor espacial-relacional del hebreo sin perder naturalidad en español.
- source_word: מִכָּל הַבְּתוּלֹת
  english_pob_choice: more than all the virgins
  chosen_spanish: más que a todas las vírgenes
  alternatives_spanish:
  - más que a todas las jóvenes vírgenes
  - más que a cualquier virgen
  lexicon: HALOT
  rationale: Se conserva la diferencia léxica respecto de «mujeres». «Vírgenes» refleja בְּתוּלֹת con la especificidad del hebreo y mantiene la tensión semántica que el texto presenta.
- source_word: וַיָּשֶׂם כֶּתֶר מַלְכוּת
  english_pob_choice: he placed the royal crown
  chosen_spanish: Puso sobre su cabeza la corona real
  alternatives_spanish:
  - colocó la corona real sobre su cabeza
  - puso la corona del reino
  lexicon: HALOT
  rationale: «Corona real» expresa כֶּתֶר מַלְכוּת de forma natural y fiel. La adición «sobre su cabeza» sigue el hebreo y hace explícita la imagen ceremonial.
- source_word: וַיַּמְלִיכֶהָ
  english_pob_choice: made her queen
  chosen_spanish: la hizo reina
  alternatives_spanish:
  - la coronó reina
  - la estableció como reina
  lexicon: HALOT
  rationale: El hifil de מלך indica hacer reinar o hacer rey/reina. «La hizo reina» conserva ese valor causativo sin añadir elementos no presentes en el texto.
- source_word: תַּחַת וַשְׁתִּי
  english_pob_choice: instead of Vashti
  chosen_spanish: en lugar de Vasti
  alternatives_spanish:
  - en vez de Vasti
  - en sustitución de Vasti
  lexicon: HALOT
  rationale: «En lugar de» reproduce con precisión el valor de reemplazo de תַּחַת en este contexto sucesorio. «Vasti» sigue la forma española usual del nombre propio.
theological_decisions:
- issue: Distinción entre חֵן y חֶסֶד
  english_pob_reading: she found favor and kindness
  chosen_spanish_reading: halló favor y bondad
  alternative_spanish_readings:
  - halló gracia y bondad
  - halló favor y misericordia
  rationale: Se conserva la doble expresión sin fusionarla en un solo término. «Bondad» permite reflejar חֶסֶד aquí como benevolencia amable, tal como lo entendió el POB en inglés, sin cargarlo innecesariamente con el matiz técnico de «misericordia» o «amor leal» que no se explicita en este versículo.
  doctrine_reference: Uso contextual de חֶסֶד en el AT; distinción léxica de gracia/favor y benevolencia.
- issue: Título de realeza para Ester
  english_pob_reading: made her queen
  chosen_spanish_reading: la hizo reina
  alternative_spanish_readings:
  - la estableció como reina
  - la coronó reina
  rationale: El hebreo expresa un acto de entronización o instalación real, no solo un gesto honorífico. «La hizo reina» conserva el causativo sin introducir una ceremonia específica que el texto no detalla.
  doctrine_reference: Traducción causal de la forma hifil de מלך.
translation_notes:
  revision_awareness: La consulta base y el control de revisión indican alta concordancia y no presentan cambios aplicados; este borrador sigue de cerca el texto hebreo y el criterio de equivalencia óptima del POB en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «Vasti» como forma española estable del nombre propio.
  - Se preserva la distinción entre «favor» y «bondad» para reflejar el paralelismo hebreo.
  - Se evita convertir בְּתוּלֹת en una expresión más genérica, para no borrar la diferencia léxica presente en el hebreo.
