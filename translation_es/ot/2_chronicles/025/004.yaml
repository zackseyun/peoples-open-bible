revisions:
- from: 'Pero no hizo morir a sus hijos, porque está escrito en la Ley, en el Libro de Moisés, donde Yahvé mandó, diciendo: «Los padres no morirán por los hijos, y los hijos no morirán por los padres; sino que cada hombre morirá por su propio pecado».'
  to: 'Pero no puso a muerte a sus hijos[a], porque está escrito en la Ley, en el Libro de Moisés, donde Yahvé mandó, diciendo: «Los padres no serán puestos a muerte por los hijos, y los hijos no serán puestos a muerte por los padres; sino que cada hombre morirá por su propio pecado».'
  rationale: Se ajusta el español para reflejar mejor el valor causativo y judicial de מות en el contexto legal. «Puso a muerte» y «serán puestos a muerte» comunican con más precisión la idea de ejecución judicial, en línea con la evidencia fuente y la decisión léxica documentada en el POB inglés. Se añade la nota alternativa literal ya preservada en la auditoría inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:54:52Z'
