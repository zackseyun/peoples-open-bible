translation:
  language: es
  text: 'Así dice Yahvé acerca de los profetas que desvían a mi pueblo, que muerden con sus dientes[a] y claman: «Paz», pero contra cualquiera que no les ponga algo en la boca[b], consagran guerra[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que muerden con sus dientes». La imagen probablemente retrata a profetas depredadores que anuncian bienestar cuando son alimentados o pagados.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «que no pone en su boca» o «sobre su boca». El sentido es darles comida o pago.
    reason: lexical_alternative
  - marker: c
    text: O «consagran guerra santa contra él». El hebreo dice «consagran guerra», usando lenguaje cultual para preparar un ataque.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto en forma transparente, siguiendo el criterio del proyecto para el tetragrámaton y evitando la sustitución por un título genérico.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - sobre
  lexicon: HALOT
  rationale: 'La preposición introduce el objeto del oráculo: lo que Yahvé dice respecto de los profetas. «Acerca de» refleja bien ese valor contextual sin convertirlo de entrada en una fórmula de condena, que el verso mismo ya desarrolla.'
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sustantivo plural con artículo.
- source_word: הַמַּתְעִים
  english_pob_choice: who lead ... astray
  chosen_spanish: que desvían
  alternatives_spanish:
  - que engañan
  - que hacen errar
  lexicon: HALOT
  rationale: El participio causativo expresa llevar a otro fuera del camino. «Desvían» conserva la fuerza activa y resulta idiomático en español sin perder el matiz de extravío.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi pueblo
  lexicon: HALOT
  rationale: Se mantiene la fórmula de pertenencia del pacto con el posesivo en primera persona.
- source_word: הַנֹּשְׁכִים בְּשִׁנֵּיהֶם
  english_pob_choice: who bite with their teeth
  chosen_spanish: que muerden con sus dientes
  alternatives_spanish:
  - que muerden con los dientes
  - que mordisquean con sus dientes
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de depredación. «Con sus dientes» mantiene el hebraísmo y evita suavizar el cuadro de explotación.
- source_word: וְקָרְאוּ שָׁלוֹם
  english_pob_choice: and cry, “Peace,”
  chosen_spanish: 'y claman: «Paz»'
  alternatives_spanish:
  - 'y proclaman: «Paz»'
  - 'y gritan: «Paz»'
  lexicon: HALOT
  rationale: קרא con discurso directo se vierte bien como «clamar». «Paz» traduce שָׁלוֹם como bienestar/seguridad anunciados de manera interesada.
- source_word: וַאֲשֶׁר לֹא יִתֵּן עַל פִּיהֶם
  english_pob_choice: but against anyone who does not put something into their mouths
  chosen_spanish: pero contra cualquiera que no les ponga algo en la boca
  alternatives_spanish:
  - pero contra cualquiera que no les dé de comer
  - pero contra cualquiera que no les ponga nada en la boca
  lexicon: HALOT
  rationale: Se retiene la imagen literal de alimentar/pagar a los profetas sin convertirla del todo en un equivalente interpretativo. «Algo» evita añadir un objeto que el hebreo no especifica, y «les ponga en la boca» conserva el giro corporal del texto.
- source_word: וְקִדְּשׁוּ עָלָיו מִלְחָמָה
  english_pob_choice: they consecrate war against him
  chosen_spanish: consagran guerra
  alternatives_spanish:
  - declaran guerra santa
  - preparan guerra
  lexicon: HALOT
  rationale: 'Se preserva el lenguaje cultual sorprendente del hebreo: no solo hacen guerra, sino que la «consagran». En español, el complemento «contra cualquiera...» ya queda en la cláusula previa, así que no se repite para mantener fluidez sin perder la relación sintáctica del ataque.'
theological_decisions:
- issue: Conservar la acusación profética con su metáfora económica y cultual sin suavizarla
  english_pob_reading: Retain the concrete metaphors of biting, putting into their mouths, and consecrating war
  chosen_spanish_reading: Conservar muerden, ponen algo en la boca y consagran guerra
  alternative_spanish_readings:
  - reducir todo a soborno y hostilidad
  - parafrasear como rechazo de quienes no los alimentan
  rationale: La denuncia no es solo contra opiniones falsas, sino contra profetas cuya palabra se condiciona por lo que reciben. Mantener las imágenes deja visible la retórica profética y evita convertir el verso en una abstracción moderna.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada más reciente del POB inglés: el final se ordena como una acción verbal principal dirigida contra el que no alimenta a los profetas, mientras se conserva la frase sorprendente «consagran guerra» para reflejar el hebreo קִדְּשׁוּ עָלָיו מִלְחָמָה. Se atendió también a la decisión de mantener la sintaxis clara sin borrar la imagen original.'
  spanish_consistency_notes:
  - Se usa Yahvé como forma principal del nombre divino, conforme al estándar del proyecto.
  - Se evita «Señor» como sustituto del tetragrámaton en el texto principal.
  - «Paz» conserva el valor de bienestar/seguridad anunciado interesadamente, no solo ausencia de guerra.
  - La imagen de «la boca» se mantiene literal para respetar el hebraísmo y su posible fuerza económica.
  - «Consagran guerra» se deja sin normalizar a «declaran guerra» para no perder la tensión cultual del original.
