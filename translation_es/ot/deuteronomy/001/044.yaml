translation:
  language: es
  text: Entonces los amorreos[a] que habitaban en aquella región montañosa[b] salieron a su encuentro y los persiguieron como hacen las abejas, y los abatieron en Seír hasta Horma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el amorreo'; el hebreo usa singular con sentido colectivo para la población amorrea, pero los verbos siguientes están en plural.
    reason: lexical_alternative
  - marker: b
    text: O 'aquel monte'; aquí 'región montañosa' refleja el sentido regional del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salió
  - se adelantaron
  lexicon: HALOT
  rationale: El verbo יצא en narrativa indica salir o salir al encuentro. En español, el plural "salieron" refleja el valor colectivo que el contexto exige por los verbos plurales siguientes.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular formal, el contexto inmediato presenta una pluralidad colectiva; por eso el plural español comunica mejor el referente poblacional sin perder fidelidad.
- source_word: הַיֹּשֵׁב בָּהָר הַהוּא
  english_pob_choice: who lived in that hill country
  chosen_spanish: que habitaban en aquel país montañoso
  alternatives_spanish:
  - que vivían en aquel monte
  - que moraban en aquella región montañosa
  lexicon: HALOT
  rationale: El participio expresa residencia estable. "País montañoso" conserva el sentido regional de הָהָר mejor que un calco de "monte", y suena natural en español bíblico moderno.
- source_word: לִקְרַאתְכֶם
  english_pob_choice: to meet you
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarles
  - contra ustedes
  lexicon: HALOT
  rationale: לקראת significa primariamente "al encuentro de". En este contexto hostil, "a su encuentro" mantiene el núcleo léxico y deja que la acción enemiga se interprete por el resto del versículo.
- source_word: וַיִּרְדְּפוּ אֶתְכֶם
  english_pob_choice: pursued you
  chosen_spanish: los persiguieron
  alternatives_spanish:
  - los acosaron
  - los siguieron
  lexicon: HALOT
  rationale: רדף es el verbo habitual para persecución militar. "Persiguieron" es preciso y solemne en español.
- source_word: כַּאֲשֶׁר תַּעֲשֶׂינָה הַדְּבֹרִים
  english_pob_choice: as bees do
  chosen_spanish: como hacen las abejas
  alternatives_spanish:
  - como las abejas hacen
  - como hacen las abejas ellas
  lexicon: HALOT
  rationale: La comparación proverbial funciona naturalmente en español con "como hacen las abejas". Se conserva la imagen sin añadir explicación interpretativa.
- source_word: וַיַּכְּתוּ אֶתְכֶם
  english_pob_choice: they struck you down
  chosen_spanish: los derrotaron
  alternatives_spanish:
  - los golpearon
  - los abatieron
  - los derribaron
  lexicon: HALOT
  rationale: כתת en este contexto denota una derrota violenta y contundente. "Los derrotaron" comunica el resultado bélico en español con claridad, aunque reconoce una leve nivelación frente a la imagen de golpe aplastante.
- source_word: בְּשֵׂעִיר
  english_pob_choice: in Seir
  chosen_spanish: en Seír
  alternatives_spanish:
  - por Seír
  - en la región de Seír
  lexicon: HALOT
  rationale: La preposición ב marca ubicación. "En Seír" es la opción más directa y transparente.
- source_word: עַד חָרְמָה
  english_pob_choice: as far as Hormah
  chosen_spanish: hasta llegar a Horma
  alternatives_spanish:
  - hasta Horma
  - así como Horma
  lexicon: HALOT
  rationale: עַד expresa límite espacial. "Hasta llegar a Horma" conserva la idea de alcance del ataque/derrota y fluye bien en español.
translation_notes:
  revision_awareness: Se sigue el estado más reciente del audit trail, que mantiene sin cambios la solución inglesa. La única tensión relevante es la referencia colectiva de "el amorreo" frente al plural contextual; en español se resuelve de forma explícita con "los amorreos" sin perder la base hebrea singular formal.
  spanish_consistency_notes:
  - Se usa "Yahvé" para el nombre divino solo cuando aparece en el texto; aquí no aparece.
  - Se mantiene el nombre geográfico "Seír" y "Horma" como topónimos propios sin adaptación.
  - La comparación con las abejas se conserva de manera idiomática y no se domestica más allá de lo requerido por el español.
  - No se introduce vocabulario eclesiástico ajeno al registro narrativo del pasaje.
