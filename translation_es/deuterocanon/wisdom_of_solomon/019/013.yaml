base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/019/013.yaml
  text: And punishments came upon the sinners[a], not without the evidence of the things that had happened in the violence of the thunderbolts; for they justly suffered for their own wicked deeds[b], for they practiced an even harsher hatred of strangers.
  footnotes:
  - marker: a
    text: Or 'not without proofs from the events, in the force of the thunderbolts.' The Greek syntax is compressed, and the phrase may be taken slightly differently while keeping the same overall sense.
    reason: lexical_alternative
  - marker: b
    text: '''Hatred of strangers'' may also be rendered ''inhospitality,'' but the Greek term can imply active hostility toward foreigners or guests, not merely failure to welcome them.'
    reason: lexical_alternative
