  text: καὶ αὐτὸς προελεύσεται ἐνώπιον αὐτοῦ ἐν πνεύματι καὶ δυνάμει Ἠλίου, ἐπιστρέψαι καρδίας πατέρων ἐπὶ τέκνα καὶ ἀπειθεῖς ἐν φρονήσει δικαίων, ἑτοιμάσαι κυρίῳ λαὸν κατεσκευασμένον.
base_translation:
  language: en
  yaml_path: translation/nt/luke/001/017.yaml
  text: And he will go before him in the spirit and power of Elijah[a], to turn the hearts of fathers to children, and the disobedient to the wisdom of the righteous[c][b], to prepare for the Lord a people made ready.
  footnotes:
  - marker: a
    text: Or 'toward children.' The phrase echoes Malachi 4:6 and may carry the sense of restored family reconciliation.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the mindset of the righteous' or 'in the prudence of the righteous.'
    reason: lexical_alternative
  - marker: c
    text: '''In the spirit and power of Elijah'' refers to Elijah-like prophetic ministry and empowerment, not necessarily Elijah''s literal personal return.'
    reason: cross_reference
translation:
  language: ko
  text: 그가 엘리야의 영과 능력으로 그분 앞서 나아가, 아버지들의 마음을 자녀들에게로 돌이키고 거역하는 자들을 의인의 지혜로 돌이켜, 잘 준비된 백성을 주를 위해 예비할 것입니다.
  philosophy: optimal-equivalence
