translation:
  language: es
  text: Compra[a] la verdad, y no la vendas; sabiduría, instrucción[b] y entendimiento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Adquiere la verdad». El verbo hebreo puede significar «comprar» o, de modo más amplio, «adquirir» u «obtener»; aquí se conserva la imagen comercial porque el mandato siguiente dice «no la vendas».'
    reason: lexical_alternative
  - marker: b
    text: «Instrucción» también puede traducirse «disciplina» o «corrección».
    reason: lexical_alternative
  - marker: c
    text: «Entendimiento» también puede traducirse «discernimiento» o «perspicacia».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - veracidad
  - fidelidad
  - realidad
  lexicon: HALOT
  rationale: En este contexto sapiencial, אֱמֶת abarca verdad y confiabilidad moral. «Verdad» es la equivalencia española más natural y amplia, y conserva la fuerza ética del mandamiento sin estrecharlo a solo «veracidad» o «fidelidad».
- source_word: קְנֵה
  english_pob_choice: Buy
  chosen_spanish: Compra
  alternatives_spanish:
  - Adquiere
  - Consigue
  lexicon: HALOT
  rationale: El hebreo puede significar «comprar» o, más ampliamente, «adquirir». Aquí se conserva la imagen comercial por el paralelismo con «no la vendas»; «Compra» mantiene esa antítesis con claridad en español.
- source_word: וְאַל תִּמְכֹּר
  english_pob_choice: and do not sell
  chosen_spanish: y no la vendas
  alternatives_spanish:
  - pero no la vendas
  - ni la vendas
  lexicon: HALOT
  rationale: La forma negativa con coordinación se expresa de manera directa en español. «No la vendas» preserva la imagen comercial y el contraste retórico con «Compra».
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sapiencia
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente natural y establecido en Proverbios para חָכְמָה, manteniendo su sentido práctico, moral y orientado a Dios.
- source_word: מוּסָר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - corrección
  lexicon: HALOT
  rationale: El inglés POB eligió «instruction» para no restringir מוּסָר solo a castigo o reprensión. En español, «instrucción» comunica bien la formación sapiencial y mantiene amplitud semántica.
- source_word: בִינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  lexicon: HALOT
  rationale: «Entendimiento» es el equivalente español amplio y fluido para בִינָה, y encaja bien en la tríada con «sabiduría» e «instrucción» sin sobretecnicizar el término.
translation_notes:
  revision_awareness: No hubo cambios necesarios respecto al último pase revisado; se mantiene la lectura de alta concordancia con el texto hebreo y el audit trail en inglés.
  spanish_consistency_notes:
  - Se conservó el paralelismo comercial de «comprar/vender» en vez de suavizarlo con «adquirir/obtener», porque el hebreo parece intencionalmente metafórico.
  - Se usó «la» en «no la vendas» para referirla a «la verdad», manteniendo la fluidez natural del español.
  - La tríada final se mantuvo como sustantivos coordinados, siguiendo la concisión proverbial del original.
