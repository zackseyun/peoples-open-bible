translation:
  language: es
  text: Un león acecha a su presa[a]; así los pecados acechan a los que practican la injusticia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Un león embosca a su presa; así los pecados emboscan a los que hacen injusticias.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: λέων
  english_pob_choice: A lion
  chosen_spanish: Un león
  alternatives_spanish:
  - el león
  - león
  lexicon: LSJ
  rationale: El singular anartro se usa proverbialmente; en español, el artículo indefinido transmite mejor la generalidad de la sentencia sapiencial.
- source_word: θήραν
  english_pob_choice: prey
  chosen_spanish: a su presa
  alternatives_spanish:
  - presa
  - caza
  lexicon: LSJ
  rationale: La idea es la de un animal cazado como objetivo; 'presa' es el equivalente natural y mantiene la imagen predatoria.
- source_word: ἐνεδρεύει
  english_pob_choice: lies in wait
  chosen_spanish: acecha
  alternatives_spanish:
  - está al acecho de
  - embosca
  lexicon: LSJ
  rationale: El verbo expresa estar al acecho o tender una emboscada. 'Acecha' conserva la viveza de la imagen en español sin sobreexplicar.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de la misma manera
  lexicon: LSJ
  rationale: Introduce el paralelo de forma breve y proverbial, con el equivalente español más natural.
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - las faltas
  - las transgresiones
  lexicon: LSJ
  rationale: El plural se conserva como sustantivo; 'pecados' mantiene la fuerza moral y la personificación del original.
- source_word: ἐργαζομένους
  english_pob_choice: those who practice
  chosen_spanish: los que practican
  alternatives_spanish:
  - los que hacen
  - los que obran
  lexicon: LSJ
  rationale: El participio sugiere acción habitual o sostenida; 'practican' transmite bien ese valor continuo.
- source_word: ἄδικα
  english_pob_choice: injustice
  chosen_spanish: la injusticia
  alternatives_spanish:
  - cosas injustas
  - lo injusto
  - injusticias
  lexicon: LSJ
  rationale: La forma neutra plural/adverbial admite una equivalencia más idiomática; 'practican la injusticia' conserva el sentido ético de manera clara y natural.
theological_decisions:
- issue: Personificación de 'pecados' como cazadores
  english_pob_reading: sins are personified as predators that stalk wrongdoers
  chosen_spanish_reading: los pecados son presentados como cazadores que acechan a los culpables de injusticia
  alternative_spanish_readings:
  - las consecuencias del pecado acechan a los culpables
  - los castigos por el pecado acechan a los injustos
  rationale: El griego dice literalmente 'pecados', no una abstracción como 'consecuencias' o 'castigos'. La traducción mantiene la personificación sin resolverla interpretativamente.
  doctrine_reference: Conservar la tensión figurativa del texto; no suavizarla por explicación doctrinal.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparece exactamente en el texto principal donde corresponde.
  spanish_consistency_notes:
  - 'Se mantuvo un registro lexical coherente: ''pecados'' para ἁμαρτίαι, ''injusticia'' para ἄδικα y ''acecha'' para ἐνεδρεύει.'
  - La puntuación sigue el español estándar y conserva la estructura proverbial de comparación del griego.
  - La nota a pie de página ofrece una alternativa léxica real sin introducir interpretación ajena al texto.
