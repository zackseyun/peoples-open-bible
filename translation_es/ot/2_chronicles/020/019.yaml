    issue: El marcador de nota [a] está anclado a «levitas» en vez de a la frase de volumen final.
    rationale: La nota inglesa y la evidencia hebrea se refieren a בְּקוֹל גָּדוֹל לְמָעְלָה, no a הַלְוִיִּם. La disciplina del proyecto exige que el marcador aparezca exactamente en la palabra o frase pertinente.
