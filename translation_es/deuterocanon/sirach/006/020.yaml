    rationale: La nota [b] explica 'falto de corazón', pero está anclada a 'necio' junto con [a], mientras que el hebraísmo corresponde a la segunda cola del versículo. Conviene mover el anclaje al sintagma pertinente.
  revised_spanish_text: Difícil es para el necio[a], y el que carece de entendimiento[b] no perseverará en ello.
