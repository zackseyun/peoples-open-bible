review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: fórmula introductoria, temporalidad de בְּהִבָּרְאָם, modismo בְּיוֹם, nombre divino Yahvé, y el orden final «tierra y cielos». Sin embargo, «descendientes» para תוֹלְדוֹת no preserva fielmente el valor de fórmula de encabezado en Génesis y suena semánticamente inadecuado para «los cielos y la tierra», que no tienen «descendientes» en español natural. Además, la nota c está anclada al final, pero corresponde al nombre divino dentro de «Yahvé Dios».'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «los descendientes de los cielos y de la tierra» resulta poco natural y confuso en español bíblico. «Generaciones» es más fiel al patrón de Génesis y además queda respaldado por la nota explicativa. También conviene mover la nota sobre YHWH para que quede junto a «Yahvé».
  glossary_alignment: 'Alineado con el glosario en «Yahvé» y «Dios». La principal desviación es תוֹלְדוֹת: el inglés auditado escogió «generations» precisamente para conservar el vínculo formal de la fórmula toledot; en español, «generaciones» cumple mejor esa función que «descendientes».'
  issues:
  - severity: high
    issue: «descendientes» para תוֹלְדוֹת
    rationale: 'Aunque etimológicamente sugiere procedencia, en Génesis 2:4 produce un sentido impropio: «los cielos y la tierra» no tienen «descendientes» en español idiomático. El término de encabezado se preserva mejor con «generaciones», apoyado por nota léxica.'
  - severity: medium
    issue: Ubicación de la nota sobre YHWH
    rationale: La nota c explica «Yahvé», pero en el borrador está anclada al final de la oración tras «los cielos». Debe anclarse en «Yahvé» para corresponder al elemento explicado.
  - severity: low
    issue: Formulación de la nota b
    rationale: El texto hebreo es בְּיוֹם, mejor reflejado como «en el día en que» que «en el día de». Es una corrección menor de precisión en la nota.
  revised_spanish_text: Estas son las generaciones[a] de los cielos y la tierra cuando fueron creados, en el día en que[b] Yahvé[c] Dios hizo la tierra y los cielos.
  revised_footnotes:
