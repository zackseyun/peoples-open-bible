review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura de súplica imprecatoria del griego: petición de venganza sobre el hombre y su campamento, caída a espada, recuerdo de sus δυσφημίαι, y negación de μονή. Sin embargo, hay dos problemas de fidelidad/forma: (1) los marcadores de notas están invertidos respecto al contenido anclado; [a] aparece en ''campamento'' pero la nota trata de ''blasfemias'', y [b] aparece en ''blasfemias'' pero la nota trata de μονή; (2) ''Haz venganza de este hombre'' es comprensible pero poco natural en español y menos fiel al giro idiomático esperado en una oración dirigida a Dios que ''Toma venganza de este hombre'' o ''Véngate de este hombre''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'Haz venganza' suena forzado. 'No les concedas permanencia' es defendible y readable, aunque algo abstracto; funciona si se mantiene la nota que explica las alternativas ('descanso', 'estancia', matiz de supervivencia/continuidad). 'Campamento' y 'blasfemias' son buenos. La principal reparación necesaria es de naturalidad idiomática y del sistema de notas.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Blasfemias' sigue correctamente la decisión teológica auditada para δυσφημιῶν. No hay nombres divinos ni términos sensibles del glosario principal implicados aquí. La elección de 'campamento' para παρεμβολή es adecuada. Para μονή, 'permanencia' respeta la gama semántica mejor que 'descanso' solo, aunque conviene explicarlo en nota.
  issues:
  - severity: high
    issue: Los marcadores de notas al pie no corresponden a las notas que explican.
    rationale: En el texto, [a] está anclado a 'campamento' pero la nota [a] trata de 'blasfemias'; [b] está anclado a 'blasfemias' pero la nota [b] trata de μονή. Esto incumple directamente la disciplina requerida de anclar cada nota al lugar pertinente.
  - severity: medium
    issue: '''Haz venganza de este hombre'' suena antinatural en español.'
    rationale: Aunque reproduce literalmente el giro griego, en español eclesial y general la colocación natural es 'toma venganza de' o 'véngate de'. La redacción actual resulta rígida y distrae sin ganar precisión.
  - severity: low
    issue: La nota sobre μονή menciona la revisión inglesa y mezcla demasiada explicación metatraductológica.
    rationale: La nota debe priorizar la explicación léxica útil para el lector español. Puede simplificarse manteniendo las alternativas relevantes ('descanso', 'estancia', 'supervivencia/permanencia').
