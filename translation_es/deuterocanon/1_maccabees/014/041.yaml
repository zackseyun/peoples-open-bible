translation:
  language: es
  text: y que a los judíos y a los sacerdotes les pareció bien que Simón fuera su líder y sumo sacerdote para siempre[a], hasta que se levantara un profeta confiable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un profeta fiel» o «un profeta verdadero». El griego πιστόν puede denotar a alguien fiel, confiable o digno de confianza.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδόκησαν
  english_pob_choice: were pleased
  chosen_spanish: estuvieron de acuerdo
  alternatives_spanish:
  - les pareció bien
  - aprobaron
  - estuvieron complacidos
  lexicon: BDAG
  rationale: El verbo expresa aprobación favorable; en español, «estuvieron de acuerdo» comunica aceptación formal sin sonar afectado. Mantiene la idea de asentimiento de judíos y sacerdotes a la designación de Simón.
- source_word: ἡγούμενον
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - gobernante
  - jefe
  - caudillo
  lexicon: BDAG
  rationale: Aquí funciona como título de función o mando. «Líder» es amplio y comprensible, y no introduce un cargo político más específico que el griego no explicita.
- source_word: ἀρχιερέα
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - jefe de los sacerdotes
  - pontífice
  lexicon: BDAG
  rationale: Es la forma normal y fiel para el oficio sacerdotal supremo. «Sumo sacerdote» es claro y mantiene la terminología bíblica reconocible sin depender de una fórmula eclesiástica ajena.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para la edad
  lexicon: BDAG
  rationale: «Para siempre» es la equivalencia idiomática natural en español y conserva el sentido de duración abierta o permanente, sin borrar la tensión con la cláusula siguiente.
- source_word: ἕως τοῦ ἀναστῆναι
  english_pob_choice: until ... should arise
  chosen_spanish: hasta que se levantara
  alternatives_spanish:
  - hasta que surgiera
  - hasta el levantamiento de
  lexicon: BDAG
  rationale: La construcción marca un límite temporal. «Se levantara» reproduce con naturalidad el valor prospectivo del aoristo infinitivo en un español bíblico claro.
- source_word: προφήτην πιστόν
  english_pob_choice: a trustworthy prophet
  chosen_spanish: un profeta confiable
  alternatives_spanish:
  - un profeta fiel
  - un profeta verdadero
  lexicon: BDAG
  rationale: πιστός puede significar fiel, confiable o digno de confianza. Aquí «confiable» refleja bien la idea de legitimidad y fiabilidad del profeta esperado, mientras que «fiel» queda como alternativa válida.
theological_decisions:
- issue: Tensión entre «para siempre» y la cláusula limitante «hasta que...»
  english_pob_reading: The text grants Simon an enduring office 'forever' in conventional covenantal/political language, but explicitly qualifies it with 'until a trustworthy prophet should arise.'
  chosen_spanish_reading: 'El texto concede a Simón un cargo expresado como permanente, pero lo califica explícitamente con un límite temporal: «hasta que se levantara un profeta confiable».'
  alternative_spanish_readings:
  - interpretar «para siempre» como absoluto y suavizar la cláusula siguiente
  - traducir con una fórmula débil que diluya la permanencia
  rationale: 'La traducción conserva ambas afirmaciones sin resolver la tensión: una concesión de duración abierta y, a la vez, un límite definido. Esto sigue la pauta de preservar la tensión teológica e ისტორica del pasaje en lugar de armonizarla artificialmente.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa reciente que ajustó la sintaxis de 'for Simon to be' a 'that Simon should be'; por ello el español usa una subordinada natural de contenido ('en que Simón fuera...') y no una construcción de finalidad. También se conservó el cierre temporal de la cláusula, tal como quedó reafirmado en la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - «Sumo sacerdote» se mantiene como término técnico estable para ἀρχιερεύς.
  - «Profeta confiable» preserva la amplitud semántica de πιστός sin imponer solo 'fiel'.
  - La puntuación reproduce la tensión del original con coma antes de la cláusula 'hasta que...'.
