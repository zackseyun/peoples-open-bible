  to: 'Cuando Raquel vio que no le había dado hijos a Jacob, tuvo celos de su hermana y dijo a Jacob: «Dame hijos, o moriré».'
  rationale: Se ajusta el español para reflejar mejor el sentido de יָלַד en contexto femenino («no le había dado hijos a Jacob»), se corrige קנא a «tuvo celos de su hermana» en línea con la decisión auditada y con el matiz contextual, y se elimina la segunda repetición de «Raquel» por fluidez natural en español sin pérdida sustancial de sentido.
