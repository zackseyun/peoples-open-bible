id: PSA.59.14
reference: Psalms 59:14
source:
  edition: WLC
  text: כַּלֵּ֥ה בְ/חֵמָה֮ כַּלֵּ֪ה וְֽ/אֵ֫ינֵ֥/מוֹ וְֽ/יֵדְע֗וּ כִּֽי אֱ֭לֹהִים מֹשֵׁ֣ל בְּ/יַעֲקֹ֑ב לְ/אַפְסֵ֖י הָ/אָ֣רֶץ סֶֽלָה־׃
translation:
  text: Consume them in wrath[a]; consume them until they are no more, so that they may know that God rules in Jacob to the ends of the earth[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Destroy them in wrath; destroy them, and they will be no more.' The Hebrew can be rendered more abruptly and literally.
    reason: lexical_alternative
  - marker: b
    text: '''In Jacob'' refers to God''s rule in relation to Jacob, that is, Israel; some translate ''over Jacob.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּלֵּה
  chosen: Consume
  alternatives:
  - Destroy
  - Finish off
  - Bring to an end
  lexicon: HALOT
  rationale: The Piel imperative of כלה carries the sense of bringing to completion/end, often by consuming or destroying. 'Consume' preserves the forceful poetic imagery and works naturally with 'in wrath.' The repetition is retained for emphasis.
- source_word: בְחֵמָה
  chosen: in wrath
  alternatives:
  - in fury
  - with wrath
  - in anger
  lexicon: HALOT
  rationale: חֵמָה denotes burning anger/wrath. 'In wrath' is concise and idiomatic, preserving the instrumental or modal sense of the preposition ב.
- source_word: וְאֵינֵמוֹ
  chosen: until they are no more
  alternatives:
  - and they are not
  - so that they are no more
  - leaving none of them
  lexicon: HALOT
  rationale: The phrase literally means 'and they are not/no more.' In English, after the repeated imperative, 'until they are no more' best conveys the resultative force and reads naturally in context.
- source_word: וְיֵדְעוּ
  chosen: so that they may know
  alternatives:
  - and let them know
  - then they will know
  lexicon: HALOT
  rationale: Though formally a waw + imperfect, in this prayer context it expresses intended result/purpose following the imprecations. 'So that they may know' captures that nuance better than a simple future.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The noun here refers to the one true God in Israel's psalmic context; 'God' is the standard direct rendering.
- source_word: מֹשֵׁל
  chosen: rules
  alternatives:
  - is ruling
  - reigns
  - is ruler
  lexicon: HALOT
  rationale: The participle denotes ongoing rule or dominion. 'Rules' is a clear modern English rendering; 'reigns' is possible but can sound more elevated than the surrounding diction requires.
- source_word: בְּיַעֲקֹב
  chosen: in Jacob
  alternatives:
  - over Jacob
  - among Jacob/Israel
  lexicon: HALOT
  rationale: The preposition is literally 'in.' 'Jacob' is retained as the covenant people designation rather than interpreting it as 'Israel' in the main text. The sense is God's rule in relation to Jacob/Israel.
- source_word: לְאַפְסֵי הָאָרֶץ
  chosen: to the ends of the earth
  alternatives:
  - to earth's farthest limits
  - to the remotest parts of the earth
  lexicon: HALOT
  rationale: This is a standard idiom for the farthest reaches of the world. 'To the ends of the earth' is both accurate and natural English.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning remains uncertain; standard practice is to transliterate rather than conjecturally translate.
