translation:
  language: es
  text: tú, cuya ropa está caliente cuando la tierra está en calma por el viento del sur[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "desde el sur". El hebreo dice literalmente "desde el sur", lo que puede referirse de manera más general al cuadrante meridional; "viento del sur" hace explícito el sentido meteorológico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: you whose
  chosen_spanish: tú, cuyas
  alternatives_spanish:
  - que
  - el que
  - quien
  lexicon: HALOT
  rationale: El hebreo introduce un relativo que modifica al interlocutor directo de Eliú. En español, "tú, cuyas" conserva el valor relacional y la segunda persona sin volver la frase pesada o poco natural.
- source_word: בְּגָדֶיךָ
  english_pob_choice: your garments
  chosen_spanish: vestiduras
  alternatives_spanish:
  - tus ropas
  - tus vestidos
  - tu ropa
  lexicon: HALOT
  rationale: El término hebreo designa prendas/ropa. "Vestiduras" mantiene el registro poético y elevado de "garments" sin sonar arcaico en exceso; además encaja con el paralelismo y la imaginería del verso.
- source_word: חַמִּים
  english_pob_choice: are hot
  chosen_spanish: están calientes
  alternatives_spanish:
  - están calientes
  - arden
  - están tibias
  lexicon: HALOT
  rationale: El adjetivo expresa calor físico. "Están calientes" es directo y fiel; "arden" sería más interpretativo y añade intensidad no garantizada por el hebreo.
- source_word: בְּהַשְׁקִט
  english_pob_choice: when ... is still
  chosen_spanish: cuando ... está en calma
  alternatives_spanish:
  - cuando ... está quieta
  - cuando ... está en reposo
  - al estar ... en calma
  lexicon: HALOT
  rationale: La raíz שקט comunica quietud, calma o sosiego. "En calma" refleja bien la imagen atmosférica y evita un calco rígido; el sujeto implícito se entiende naturalmente como "la tierra".
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - la región
  lexicon: HALOT
  rationale: En este contexto meteorológico, "la tierra" reproduce el alcance amplio de la imagen y suena natural en español. "El país" o "la región" limitarían demasiado el sentido.
- source_word: מִדָּרוֹם
  english_pob_choice: because of the south wind
  chosen_spanish: por el viento del sur
  alternatives_spanish:
  - desde el sur
  - a causa del sur
  - por el sur
  lexicon: HALOT
  rationale: El hebreo dice literalmente "desde el sur", con posible referencia al cuadrante meridional o al viento cálido del sur. Dado el contexto meteorológico, "por el viento del sur" hace explícita la fuerza causal que el inglés POB también señala en su nota.
translation_notes:
  revision_awareness: El texto base y la revisión más reciente del inglés no muestran cambios sustantivos; la lectura aprobada mantiene la equivalencia óptima con la nota léxica sobre מִדָּרוֹם.
  spanish_consistency_notes:
  - Se mantiene un registro poético y claro, con "vestiduras" para conservar dignidad sin caer en arcaísmo pesado.
  - La frase "en calma" traduce bien el valor temporal de בְּהַשְׁקִט y funciona de manera natural con "la tierra".
  - La nota al pie conserva la alternativa literal "desde el sur" para reflejar la tensión entre el hebreo y la explicitación meteorológica del texto principal.
