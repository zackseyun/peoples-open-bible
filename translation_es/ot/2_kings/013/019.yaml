translation:
  language: es
  text: 'Entonces el hombre de Dios se enojó con él y dijo: «Debiste haber golpeado[a] cinco o seis veces; entonces habrías golpeado a Aram hasta acabar con él[b]. Pero ahora golpearás a Aram solo tres veces».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo simplemente «golpear»; no se menciona aquí «la tierra», aunque el gesto remite al acto del versículo anterior.
    reason: cross_reference
  - marker: b
    text: 'O: «hasta consumirlo» / «hasta su completa destrucción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְצֹף
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - estalló en ira
  - se irritó
  lexicon: HALOT
  rationale: קצף expresa enojo/ira. «Se enojó» es natural en español moderno y conserva la reprensión narrativa sin intensificar más de lo que exige el hebreo.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea estándar con un equivalente transparente. «Profeta» sería interpretativo; el contexto lo identifica como tal, pero el sintagma original es «hombre de Dios».
- source_word: לְהַכּוֹת
  english_pob_choice: have struck
  chosen_spanish: haber golpeado
  alternatives_spanish:
  - haber golpeado la tierra
  - haber herido
  lexicon: HALOT
  rationale: Aquí el infinitivo retoma la acción simbólica de golpear en el v. 18. En español, «golpear» preserva el enlace verbal con la señal y no obliga a suplir un objeto explícito que el hebreo no dice en este versículo.
- source_word: חָמֵשׁ אוֹ שֵׁשׁ פְּעָמִים
  english_pob_choice: five or six times
  chosen_spanish: cinco o seis veces
  alternatives_spanish:
  - cinco, o seis veces
  lexicon: HALOT
  rationale: La expresión numérica se vierte de forma literal y clara.
- source_word: הִכִּיתָ אֶת אֲרָם
  english_pob_choice: you would have struck Aram
  chosen_spanish: habrías golpeado a Aram
  alternatives_spanish:
  - habrías vencido a Aram
  - habrías herido a Aram
  lexicon: HALOT
  rationale: Se conserva el mismo verbo para mantener la correspondencia con el gesto simbólico. «Golpear» es suficientemente amplio para la acción y evita interpretar prematuramente el resultado como mera victoria militar sin apoyo textual explícito.
- source_word: עַד כַּלֵּה
  english_pob_choice: until it was consumed
  chosen_spanish: hasta consumirlo
  alternatives_spanish:
  - hasta acabar con él
  - hasta su completa destrucción
  lexicon: HALOT
  rationale: כּלה expresa consumación o terminación total. «Hasta consumirlo» comunica esa plenitud de manera concisa y mantiene el tono de totalización del hebreo sin volverlo más explicativo de lo necesario.
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora bien
  lexicon: HALOT
  rationale: La partícula introduce contraste con la posibilidad frustrada. «Pero ahora» hace visible la oposición retórica.
- source_word: שָׁלֹשׁ פְּעָמִים תַּכֶּה אֶת אֲרָם
  english_pob_choice: you will strike Aram only three times
  chosen_spanish: golpearás a Aram solo tres veces
  alternatives_spanish:
  - golpearás a Aram tres veces
  - herirás a Aram solo tres veces
  lexicon: HALOT
  rationale: El futuro aquí es predictivo. Se añade «solo» porque el contraste con «cinco o seis veces» está implícito en la reprensión y el propio contexto lo exige para captar el sentido completo.
theological_decisions:
- issue: Mantener la relación simbólica entre golpear la tierra en el v. 18 y golpear a Aram en este versículo
  english_pob_reading: Retain 'strike' for both actions, while supplying 'the ground' in the first clause from context.
  chosen_spanish_reading: Conservar «golpear» en ambos casos, sin añadir «la tierra» en este versículo.
  alternative_spanish_readings:
  - golpear la tierra cinco o seis veces
  - herir a Aram
  rationale: El hebreo de este versículo no menciona el objeto de la primera acción; la conexión con el signo profético viene del contexto inmediato. Mantener el mismo verbo permite ver el vínculo sin introducir un complemento no presente aquí.
  doctrine_reference: 'Philosophy: optimal-equivalence; coherencia contextual narrativa'
- issue: Cómo traducir עַד כַּלֵּה
  english_pob_reading: until it was consumed
  chosen_spanish_reading: hasta consumirlo
  alternative_spanish_readings:
  - hasta que fuera consumido
  - hasta acabar con él
  rationale: El hebreo comunica consumación/fin completo. «Hasta consumirlo» preserva esa fuerza totalizante y permite que el lector perciba el alcance del juicio sin ampliar la frase con una explicitación interpretativa adicional.
  doctrine_reference: 'Philosophy: optimal-equivalence; semántica de כּלה'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se eliminó ‘the ground’ en inglés por no estar explícito en este versículo y se prefirió una traducción más directa de עַד כַּלֵּה. En español, por fidelidad al hebreo y al contexto inmediato, se mantuvo el verbo de acción sin añadir objeto explícito y se optó por una fórmula totalizante breve («hasta consumirlo») coherente con la revisión, aunque la alternativa ‘hasta acabar con él’ sigue siendo válida como matiz léxico.'
  spanish_consistency_notes:
  - Se usa «Dios» y no una paráfrasis teológica.
  - «Aram» se mantiene como nombre propio del reino/entidad.
  - El tono es de reprensión profética, por lo que se evita suavizar el juicio.
  - Se conserva la repetición del verbo «golpear» para reflejar la correspondencia entre la señal y su interpretación.
