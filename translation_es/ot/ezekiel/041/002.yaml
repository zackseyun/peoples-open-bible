translation:
  language: es
  text: 'Y el ancho de la entrada era de diez codos[a], y los costados de la entrada eran de cinco codos de este lado y cinco codos de aquel lado. Luego midió su longitud: cuarenta codos, y el ancho: veinte codos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hombros de la entrada»; es decir, las secciones laterales que flanquean la entrada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: ancho
  alternatives_spanish:
  - anchura
  - ancho
  lexicon: HALOT
  rationale: En un contexto arquitectónico y de medidas, "ancho" es natural y preciso en español. Mantiene la medida sin forzar un calco técnico innecesario.
- source_word: הַפֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - la abertura
  - el vano
  - la puerta
  lexicon: HALOT
  rationale: '"La entrada" comunica bien el espacio arquitectónico medido y evita restringir el sentido a la puerta física.'
- source_word: עֶשֶׂר אַמּוֹת
  english_pob_choice: ten cubits
  chosen_spanish: diez codos
  alternatives_spanish:
  - diez codos de ancho
  - diez codos
  lexicon: HALOT
  rationale: Se conserva la unidad de medida del texto fuente con la forma usual en español bíblico, sin añadir información que no está explícita.
- source_word: כִתְפוֹת
  english_pob_choice: sidewalls
  chosen_spanish: los costados
  alternatives_spanish:
  - los hombros
  - los lados
  - las jambas laterales
  lexicon: HALOT
  rationale: El hebreo literalmente significa "hombros", pero en este contexto arquitectónico designa las partes laterales que flanquean la entrada. "Los costados" preserva la imagen espacial sin introducir un tecnicismo extraño.
- source_word: מִפּוֹ ... מִפּוֹ
  english_pob_choice: on this side ... on that side
  chosen_spanish: de este lado ... de aquel lado
  alternatives_spanish:
  - a un lado ... al otro lado
  - de un lado ... del otro lado
  lexicon: HALOT
  rationale: La expresión distributiva se vuelve idiomática en español con "de este lado... de aquel lado", manteniendo el paralelismo bilateral del original.
- source_word: וַיָּמָד
  english_pob_choice: Then he measured
  chosen_spanish: Luego midió
  alternatives_spanish:
  - Entonces midió
  - Y midió
  lexicon: HALOT
  rationale: La forma narrativa consecutiva se expresa de manera fluida con "Luego midió", conservando la secuencia del relato.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: su longitud
  alternatives_spanish:
  - la longitud de ella
  - su largo
  lexicon: HALOT
  rationale: '"Longitud" mantiene el registro de medición más formal y corresponde bien al estilo técnico del pasaje.'
- source_word: אַרְבָּעִים אַמָּה
  english_pob_choice: forty cubits
  chosen_spanish: cuarenta codos
  alternatives_spanish:
  - cuarenta codos de longitud
  lexicon: HALOT
  rationale: Se conserva la unidad de medida y la literalidad del número sin expansión interpretativa.
- source_word: וְרֹחַב עֶשְׂרִים אַמָּה
  english_pob_choice: 'and the width: twenty cubits'
  chosen_spanish: 'y su ancho: veinte codos'
  alternatives_spanish:
  - 'y el ancho: veinte codos'
  - y tenía veinte codos de ancho
  lexicon: HALOT
  rationale: La elipsis hebrea en fórmulas de medición se refleja con dos puntos, como en el audit trail inglés, para conservar concisión y claridad. "Su ancho" enlaza naturalmente con el objeto medido.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con la revisión auditada en inglés sin cambios sustanciales; se ha adaptado el registro a un español bíblico moderno y claro, manteniendo la misma estructura de medición y la nota lexical sobre כִתְפוֹת.
  spanish_consistency_notes:
  - Se mantuvo "codos" como unidad estable para אַמּוֹת, coherente con el español bíblico tradicional y con la correspondencia formal al hebreo.
  - Se evitó "SEÑOR" u otra sustitución teológica, ya que el versículo es puramente descriptivo y no contiene el Tetragrámaton.
  - '"Entrada" y "costados" reflejan el campo arquitectónico del pasaje sin sobreinterpretar el término como una puerta física o como jambas técnicas.'
