    text: 'O "permanece aquí conmigo" o "quédate aquí conmigo". El hebreo usa un verbo concreto de postura: "estar de pie".'
    reason: lexical_alternative
  - marker: b
    text: O "para heredarla" o "para tomar posesión de ella".
    reason: lexical_alternative
  revision_rationale: Se ajusta עֲמֹד para conservar la postura concreta de estar de pie en presencia de Dios, y se enfoca la nota [b] en las alternativas léxicas documentadas para לְרִשְׁתָּהּ. El resto del borrador puede mantenerse porque refleja bien la sintaxis, la tríada legal y el singular de "mandamiento".
