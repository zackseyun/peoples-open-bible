translation:
  language: es
  text: 'Porque así dice Yahvé, el Dios de Israel, acerca de las casas de esta ciudad y de las casas[a] de los reyes de Judá, que han sido derribadas para las rampas de asedio[b] y para la espada[c]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los palacios de los reyes de Judá’.
    reason: lexical_alternative
  - marker: b
    text: O ‘los terraplenes de asedio’ o ‘las obras de asedio’.
    reason: lexical_alternative
  - marker: c
    text: ‘La espada’ es una figura hebrea para la guerra o la matanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino, preservando el Tetragrámaton con una forma española estable y reverente. No se sustituye por un título enmascarado.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israelito
  lexicon: HALOT
  rationale: La cadena constructa es directa y en español resulta natural y fiel como ‘el Dios de Israel’. Se mantiene el singular teológico y la referencia pactual.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la base o explicación del dicho profético; ‘Porque’ conserva bien el valor explicativo y fluye con naturalidad en español bíblico moderno.
- source_word: כֹה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. ‘Así dice’ mantiene el presente formular y la fuerza proclamativa del hebreo mejor que una simple narración en pasado.
- source_word: בָּתֵּי הָעִיר הַזֹּאת
  english_pob_choice: the houses of this city
  chosen_spanish: las casas de esta ciudad
  alternatives_spanish:
  - las casas de la ciudad esta
  - las viviendas de esta ciudad
  lexicon: HALOT
  rationale: Se conserva ‘casas’ para reflejar la repetición léxica del hebreo. ‘Esta ciudad’ reproduce el demostrativo y evita especificar más de lo que el texto dice.
- source_word: בָּתֵּי מַלְכֵי יְהוּדָה
  english_pob_choice: the houses of the kings of Judah
  chosen_spanish: las casas de los reyes de Judá
  alternatives_spanish:
  - los palacios de los reyes de Judá
  - las casas reales de Judá
  lexicon: HALOT
  rationale: Se mantiene ‘casas’ como en el hebreo y como decisión auditada en inglés, aunque ‘palacios’ sea una alternativa contextual posible. Así se preserva la repetición con בָּתֵּי y la posible amplitud semántica.
- source_word: הַנְּתֻצִים
  english_pob_choice: that are torn down
  chosen_spanish: que están derribadas
  alternatives_spanish:
  - que han sido derribadas
  - derribadas
  lexicon: HALOT
  rationale: El participio pasivo se vierte con un adjetivo participial natural en español. ‘Derribadas’ conserva el estado resultante y el matiz de demolición violenta sin forzar una perífrasis excesiva.
- source_word: אֶל הַסֹּלְלוֹת
  english_pob_choice: for the siege ramps
  chosen_spanish: para las rampas de asedio
  alternatives_spanish:
  - para los terraplenes de asedio
  - para las obras de asedio
  lexicon: HALOT
  rationale: ‘Rampas de asedio’ comunica el referente militar de סֹלְלוֹת de forma concreta y clara en español. ‘Para’ reproduce la función/uso expresado por אֶל en este contexto.
- source_word: וְאֶל הֶחָרֶב
  english_pob_choice: and for the sword
  chosen_spanish: y para la espada
  alternatives_spanish:
  - y para la guerra
  - y para la matanza
  lexicon: HALOT
  rationale: Se conserva la metonimia hebrea ‘espada’ para guerra o matanza, tal como el inglés POB la preserva. ‘Para’ sigue la misma relación funcional que en la primera cláusula final.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La traducción del nombre pactual mantiene la decisión confesional y textual del proyecto. ‘Yahvé’ permite identificar el Tetragrámaton sin ocultarlo bajo un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: La imagen bélica de ‘la espada’
  english_pob_reading: '''The sword'' is a Hebrew figure for warfare or slaughter.'
  chosen_spanish_reading: ‘la espada’ se conserva como figura hebrea de guerra o matanza
  alternative_spanish_readings:
  - la guerra
  - la matanza
  - el ataque
  rationale: No se aplana la metáfora militar a un término abstracto, porque el POB en inglés preserva la imagen. En español, ‘espada’ mantiene la fuerza figurada y permite la misma nota explicativa.
  doctrine_reference: POB audit trail — lexical_alternative for הֶחָרֶב
translation_notes:
  revision_awareness: La revisión inglesa final prefirió ‘that are torn down’ para reflejar mejor el participio hebreo en forma natural. La versión española sigue esa misma decisión con ‘que están derribadas’, manteniendo el estado resultante y la fluidez. También se conservó la distinción entre ‘houses’ y la alternativa contextual ‘palaces’ mediante nota, tal como el audit trail inglés la documenta.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma estándar para יְהוָה en todo el proyecto.
  - Se conserva ‘casas’ para בָּתֵּי para respetar la repetición léxica; no se sustituye por ‘palacios’ en el texto principal.
  - ‘Rampas de asedio’ traduce de forma concreta y moderna sin perder el sentido militar del sustantivo.
  - ‘Espada’ se deja literal por la metonimia bíblica, con nota para explicitar el valor figurado.
  - La puntuación reproduce el arranque profético con dos puntos al final, como introducción de la cita oracular.
