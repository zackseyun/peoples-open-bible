review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del hebreo: Sansón invoca a Yahvé, pide ser recordado y fortalecido solo esta vez, y solicita venganza sobre los filisteos por sus dos ojos. Sin embargo, hay dos puntos de ajuste. Primero, וַיִּקְרָא fue auditado en inglés como “called”; «clamó» es posible, pero añade más intensidad de la necesaria. Segundo, la última cláusula suena poco natural en español con «me vengue de los filisteos ... con una sola venganza»; conviene expresar mejor el cognado intensivo sin perder el orden semántico preservado por la revisión inglesa.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero contiene giros algo forzados: «clamó a Yahvé» y especialmente «con una sola venganza». También la nota [a] está anclada al final de toda la cita, cuando corresponde más directamente a «mis dos ojos». Una leve revisión mejora naturalidad, precisión y ubicación de la nota sin parafrasear.'
  glossary_alignment: 'Alineación buena en nombres divinos: «Yahvé» respeta la política del proyecto, y «Señor Yahvé» preserva la doble apelación de אֲדֹנָי יֱהֹוִה en español mejor que ocultar el nombre divino. «Dios» para הָאֱלֹהִים también es correcto. No hay conflicto doctrinal serio; el principal ajuste es estilístico-lexical en «llamó» y «con un solo acto de venganza».'
  issues:
  - severity: medium
    issue: «clamó a Yahvé» intensifica más que el hebreo auditado por POB
    rationale: קרא אל־יהוה aquí fue decidido como “called”, no necesariamente un clamor fuerte. «Llamó a Yahvé» o «invocó a Yahvé» preserva mejor la sobriedad del original y del rastro de auditoría.
  - severity: medium
    issue: «con una sola venganza» suena torpe en español
    rationale: Aunque intenta reflejar el cognado נְקַם אַחַת, en español resulta poco idiomático. «Con un solo acto de venganza» conserva singularidad y énfasis sin perder fidelidad.
  - severity: low
    issue: La nota [a] está colocada al final de la cita en vez de anclarse a «mis dos ojos»
    rationale: La nota explica específicamente la frase «por mis dos ojos». Debe anclarse allí para una correspondencia clara entre texto y nota.
  revised_spanish_text: 'Entonces Sansón llamó a Yahvé y dijo: «Señor Yahvé, por favor acuérdate de mí, y por favor fortaléceme solo esta vez, oh Dios, para que me vengue de los filisteos por mis dos ojos[a] con un solo acto de venganza».

    '
