  - severity: low
    issue: La justificación léxica de הַכַּרְמְלִי contradice el texto elegido
    rationale: La explicación admite que la lectura directa es ‘el carmelita’, pero el texto principal usa ‘el ceneo’. Eso revela inconsistencia interna en la decisión.
  revised_spanish_text: su segundo[a], Chileab, de Abigail, la esposa de Nabal el carmelita; y el tercero, Absalón, hijo de Maacá, hija de Talmai, rey de Gesur.
