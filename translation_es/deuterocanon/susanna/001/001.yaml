lexical_decisions:
- source_word: ΚΑΙ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: LSJ
  rationale: El καί inicial funciona como enlace narrativo; «Ahora bien» conserva el arranque discursivo natural del inglés POB «Now» sin forzar un simple «Y» en español.
- source_word: ἦν ἀνὴρ
  english_pob_choice: there was a man
  chosen_spanish: había un hombre
  alternatives_spanish:
  - era un hombre
  - existía un hombre
  lexicon: BDAG
  rationale: La fórmula presenta a un personaje en la narración; «había un hombre» reproduce bien esa introducción en español y evita una construcción menos natural.
- source_word: οἰκῶν
  english_pob_choice: living
  chosen_spanish: que vivía
  alternatives_spanish:
  - que habitaba
  - residiendo
  lexicon: BDAG
  rationale: El participio indica residencia/habitación. «Que vivía» es claro y narrativo; «habitaba» sería más formal, y «residiendo» más duro.
- source_word: ἐν Βαβυλῶνι
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en Babilonia la
  lexicon: LSJ
  rationale: «Babilonia» es la forma española establecida del topónimo Βαβυλών; conserva la referencia geográfica sin añadir matices no presentes.
- source_word: ὄνομα αὐτῷ
  english_pob_choice: his name was
  chosen_spanish: se llamaba
  alternatives_spanish:
  - su nombre era
  - le llamaban
  lexicon: BDAG
  rationale: La fórmula nominal griega se expresa de manera idiomática en español con «se llamaba», que mantiene la sencillez narrativa y el valor presentacional.
- source_word: Ἰωακείμ
  english_pob_choice: Joakim
  chosen_spanish: Joakim
  alternatives_spanish:
  - Joaquín
  - Joaquim
  lexicon: LSJ
  rationale: Se conserva la transliteración más cercana a la forma griega Ἰωακείμ y al criterio del POB en inglés, en lugar de adaptar al nombre tradicional «Joachim».
theological_decisions:
- issue: Transliteración del nombre propio frente a forma tradicional
  english_pob_reading: Joakim rather than Joachim
  chosen_spanish_reading: Joakim
  alternative_spanish_readings:
