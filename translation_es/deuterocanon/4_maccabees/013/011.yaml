lexical_decisions:
- source_word: Θάρρει
  english_pob_choice: Take courage
  chosen_spanish: Ten ánimo
  alternatives_spanish:
  - Toma valor
  - Ánimo
  - Ten coraje
  lexicon: LSJ
  rationale: El imperativo expresa exhortación y aliento; 'Ten ánimo' es natural en español y conserva el tono de fortalecimiento personal sin sonar forzado.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano mío
  - hermano!
  lexicon: LSJ
  rationale: Vocativo singular directo. 'Hermano' reproduce el vínculo fraterno del contexto de los mártires sin añadir matices inexistentes.
- source_word: Εὐγενῶς
  english_pob_choice: nobly
  chosen_spanish: noblemente
  alternatives_spanish:
  - con nobleza
  - valerosamente
  - con espíritu noble
  lexicon: LSJ
  rationale: El adverbio describe el modo honorable y elevado del aguante; 'noblemente' conserva la carga ética y de honor del término griego.
- source_word: καρτέρησον
  english_pob_choice: Endure
  chosen_spanish: Resiste
  alternatives_spanish:
  - Persevera
  - Soporta
  - Mantente firme
  lexicon: LSJ
  rationale: El imperativo de καρτερέω pide aguante firme bajo sufrimiento; 'Resiste' comunica la idea de perseverar y sobrellevar la prueba con concisión. En contexto, 'resiste noblemente' mantiene bien la fuerza exhortativa.
- source_word: ὁ μέν ... ὁ δέ
  english_pob_choice: one ... another
  chosen_spanish: uno ... otro
  alternatives_spanish:
  - el uno ... el otro
  - uno ... el otro
  lexicon: LSJ
  rationale: La correlación contrasta a dos hablantes sucesivos. 'Uno ... otro' fluye naturalmente en español y evita introducir un sustantivo no explicitado por el griego.
- source_word: ἔλεγεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - iba diciendo
  - decía
  lexicon: LSJ
  rationale: Aunque el imperfecto puede sugerir continuidad, aquí la escena marca exhortaciones sucesivas; 'dijo' es la forma narrativa más natural en español.
theological_decisions:
- issue: Contraste entre dos hablantes en secuencia
  english_pob_reading: one said ... while another said
  chosen_spanish_reading: Y uno dijo ... mientras otro dijo ...
  alternative_spanish_readings:
  - Y el uno dijo ... pero el otro dijo ...
  - Uno decía ... y otro decía ...
  rationale: Se conserva la estructura distributiva del griego ὁ μέν ... ὁ δέ y la sucesión de voces sin suavizar la alternancia entre los hermanos.
  doctrine_reference: Narrativa martirial de 4 Macabeos; no aplica una doctrina específica
- issue: Matiz moral de Εὐγενῶς
  english_pob_reading: nobly
  chosen_spanish_reading: noblemente
  alternative_spanish_readings:
  - valerosamente
  - con nobleza
  rationale: La traducción mantiene el componente ético y honorífico del adverbio, evitando reducirlo solo a valentía física.
  doctrine_reference: Ética del sufrimiento fiel en contexto martirial
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete con alta concordancia y sin revisiones aplicadas; la redacción española conserva el paralelismo y la alternancia de voces del original.
  spanish_consistency_notes:
  - Se emplea 'hermano' para ἀδελφέ, coherente con el contexto fraterno.
  - '''Resiste'' se eligió para καρτέρησον por su concisión y su adecuación al mandato de aguante firme.'
  - '''Noblemente'' mantiene el tono honorífico de Εὐγενῶς sin introducir una ampliación interpretativa.'
