  text: As they explained to us that they had found not fire but thick water[a], he ordered them, after drawing some out, to bring it. Then when the things for the sacrifices had been brought forward[c][b], Nehemiah ordered the priests to sprinkle the water on both the wood and what was laid upon it.
  footnotes:
