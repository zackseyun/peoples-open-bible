base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/018/020.yaml
  text: Joab said to him[a], “You are not a bearer of news today. You may carry news on another day, but today you must not carry news, because the king’s son is dead.”
  footnotes:
  - marker: a
    text: Or “a bearer of good news.” The Hebrew term can denote news or tidings, often favorable, but here the context is the death of the king’s son.
    reason: lexical_alternative
