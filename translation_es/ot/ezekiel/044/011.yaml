revisions:
- from: Pero serán ministros en mi santuario[a], con supervisión en las puertas de la casa y ministrando en la casa. Ellos matarán el holocausto y el sacrificio para el pueblo[c][b], y estarán delante de ellos para ministrarles.
  to: Pero serán ministros en mi santuario, encargados de la supervisión de las puertas del templo[a] y ministrando en el templo[b]. Ellos degollarán el holocausto y el sacrificio para el pueblo[c], y estarán delante de ellos para ministrarles.
  rationale: Se revisa para alinearse con la decisión documentada de traducir בַּיִת como 'templo' en este contexto visionario, mejorando claridad y consistencia con la auditoría POB. También se afina el estilo español con 'encargados de la supervisión' y se usa 'degollarán' para reflejar mejor el verbo sacrificial hebreo.
