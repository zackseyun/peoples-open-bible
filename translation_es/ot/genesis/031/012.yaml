translation:
  language: es
  text: 'Y le dijo: «Por favor, alza tus ojos y mira: todos los machos cabríos que se aparean con el rebaño[a] son listados[b], punteados y manchados, porque he visto todo lo que Labán te está haciendo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están montando al rebaño». El hebreo usa un modismo de reproducción animal.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, עֲקֻדִּים suele verterse «rayados» o «anillados».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂא נָא עֵינֶיךָ
  english_pob_choice: Please lift up your eyes
  chosen_spanish: Por favor, alza tus ojos
  alternatives_spanish:
  - Levanta, por favor, tus ojos
  - Mira hacia arriba, por favor
  lexicon: HALOT
  rationale: El hebreo usa un modismo con «ojos» para invitar a levantar la mirada. «Alza tus ojos» conserva la imagen sin sonar forzado en español, y «por favor» refleja bien la partícula de cortesía נָא.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  - y contempla
  lexicon: HALOT
  rationale: El imperativo de ראה admite tanto «ver» como «mirar». «Mira» funciona mejor en español con la exhortación inmediata del sueño y mantiene la vivacidad de la escena.
- source_word: הָעַתֻּדִים
  english_pob_choice: the male goats
  chosen_spanish: los machos cabríos
  alternatives_spanish:
  - los cabríos
  - los chivos
  lexicon: HALOT
  rationale: עתודים se refiere a machos cabríos, no a carneros. «Machos cabríos» conserva la referencia zoológica precisa y es claro en español bíblico moderno.
- source_word: הָעֹלִים עַל הַצֹּאן
  english_pob_choice: that are mating with the flock
  chosen_spanish: que se aparean con el rebaño
  alternatives_spanish:
  - que montan al rebaño
  - que suben sobre el rebaño
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo de apareamiento animal. «Se aparean con el rebaño» expresa el sentido sexual/biológico que el POB inglés resolvió con «mating with».
- source_word: עֲקֻדִּים
  english_pob_choice: striped
  chosen_spanish: listados
  alternatives_spanish:
  - rayados
  - estriados
  - con rayas
  lexicon: HALOT
  rationale: El término describe animales marcados con bandas o franjas. «Listados» es natural en español para animales con listas y mantiene la distinción respecto de los dos términos siguientes.
- source_word: נְקֻדִּים
  english_pob_choice: speckled
  chosen_spanish: punteados
  alternatives_spanish:
  - moteados
  - salpicados
  lexicon: HALOT
  rationale: El hebreo apunta a pequeñas manchas o puntos. «Punteados» comunica bien la idea de puntos pequeños y preserva la serie de tres descripciones.
- source_word: וּבְרֻדִּים
  english_pob_choice: spotted
  chosen_spanish: pintados
  alternatives_spanish:
  - manchados
  - moteados
  - pintarrajeados
  lexicon: HALOT
  rationale: ברד en esta forma adjetival designa animales con marcas variadas o abigarradas. «Pintados» da la idea de un patrón visible y distinto de «punteados», aunque no agota todos los matices posibles.
- source_word: כִּי רָאִיתִי
  english_pob_choice: for I have seen
  chosen_spanish: porque he visto
  alternatives_spanish:
  - pues he visto
  - ya que he visto
  lexicon: HALOT
  rationale: La partícula causal כִּי se traduce naturalmente por «porque». El perfecto «he visto» conserva la percepción completada con relevancia presente.
- source_word: אֵת כָּל אֲשֶׁר לָבָן עֹשֶׂה לָּךְ
  english_pob_choice: all that Laban is doing to you
  chosen_spanish: todo lo que Labán te está haciendo
  alternatives_spanish:
  - todo lo que Labán hace contra ti
  - todo cuanto Labán te hace
  lexicon: HALOT
  rationale: El participio sugiere acción en curso, por eso «te está haciendo» reproduce mejor el aspecto que un pasado simple. «A ti»/«te» recoge el sentido desfavorable del texto, no un beneficio.
theological_decisions:
- issue: Cómo traducir el lenguaje divino en una visión sin introducir formulación interpretativa adicional
  english_pob_reading: And he said
  chosen_spanish_reading: Y le dijo
  alternative_spanish_readings:
  - Y dijo
  - Entonces le dijo
  rationale: El texto hebreo presenta simplemente una voz que habla en la visión; no exige identificar al hablante en la traducción. «Le dijo» conserva la apertura narrativa sin añadir una precisión no explicitada aquí.
  doctrine_reference: Genesis 31:10-13; narrativa de revelación onírica
- issue: Valor semántico de la secuencia de tres adjetivos de color/patrón
  english_pob_reading: striped, speckled, and spotted
  chosen_spanish_reading: listados, punteados y pintados
  alternative_spanish_readings:
  - rayados, moteados y manchados
  - estriados, punteados y manchados
  rationale: El hebreo ofrece tres términos distintos; la traducción debe mantener la triple diferenciación sin colapsarla en un solo rasgo. «Listados / punteados / pintados» busca distinguir las tres clases en español, aun cuando no exista correspondencia perfecta entre lenguas.
  doctrine_reference: No doctrinal issue; lexical differentiation only
- issue: Sentido del verbo relacional con el rebaño
  english_pob_reading: that are mating with the flock
  chosen_spanish_reading: que se aparean con el rebaño
  alternative_spanish_readings:
  - que montan al rebaño
  - que suben sobre el rebaño
  rationale: El giro hebreo es un eufemismo reproductivo animal. En español, «se aparean» comunica esa relación sin perder el matiz técnico y evita una literalidad opaca.
  doctrine_reference: No doctrinal issue; breeding idiom
- issue: Dirección del daño en la cláusula final
  english_pob_reading: all that Laban is doing to you
  chosen_spanish_reading: todo lo que Labán te está haciendo
  alternative_spanish_readings:
  - todo lo que Labán hace contigo
  - todo lo que Labán hace para ti
  rationale: El contexto favorece una lectura de perjuicio. «Te está haciendo» mantiene la dirección adversa y respeta el participio hebreo como acción continua.
  doctrine_reference: Genesis 31:7, 31:41; Laban's treatment of Jacob
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de WLC y toma en cuenta la auditoría inglesa. Se adoptó la revisión más reciente del POB para עֲקֻדִּים como «striped», pero en español se prefirió «listados» por ser más natural para animales con marcas lineales y por distinguir mejor los tres adjetivos. También se preservó la lectura de acción continua en la cláusula final con el presente progresivo «te está haciendo».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se mantuvo «Labán» como nombre propio estándar en español.
  - Se preservó la tríada descriptiva del ganado como tres rasgos distintos, evitando sinónimos redundantes.
  - Se reflejó la cortesía de נָא con «por favor».
