translation:
  language: es
  text: Pisoteé a los pueblos en mi ira[a]; los embriagué en mi furor, y hice descender a la tierra la sangre de su vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naciones».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «su nitscham»; posiblemente «su jugo» o «su sangre». «La sangre de su vida» preserva la imaginería de juicio en contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבוּס
  english_pob_choice: I trampled
  chosen_spanish: pisoteé
  alternatives_spanish:
  - trillé
  - hollé
  - aplasté
  lexicon: HALOT
  rationale: בוס expresa la acción de hollar o pisotear bajo los pies. «Pisoteé» conserva la imagen violenta en un español natural y digno, sin suavizarla.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos y naciones
  lexicon: HALOT
  rationale: El plural עַמִּים puede significar «pueblos» o «naciones». «Los pueblos» evita la lectura moderna de estados-nación y sigue bien el paralelismo del juicio.
- source_word: בְּאַפִּי
  english_pob_choice: in my anger
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi enojo
  - en mi furor
  lexicon: HALOT
  rationale: אַף remite literalmente a nariz/nostril, pero idiomáticamente significa ira. «Ira» comunica el sentido sin perder el registro solemne.
- source_word: וַאֲשַׁכְּרֵם
  english_pob_choice: I made them drunk
  chosen_spanish: los embriagué
  alternatives_spanish:
  - los hice beber hasta embriagarlos
  - los hice beber y tambalear
  lexicon: HALOT
  rationale: El piel de שׁכר significa hacer beber hasta embriagar. «Los embriagué» es directo y mantiene la imagen de juicio, posiblemente vinculada al lagar.
- source_word: בַּחֲמָתִי
  english_pob_choice: in my wrath
  chosen_spanish: en mi furor
  alternatives_spanish:
  - en mi ira
  - en mi cólera
  lexicon: HALOT
  rationale: חֲמָה puede ser «furor», «ira» o «cólera». «Furor» distingue este término de אַף/ira y conserva el tono judicial y enérgico.
- source_word: וְאוֹרִיד
  english_pob_choice: I brought ... down
  chosen_spanish: hice descender
  alternatives_spanish:
  - lo bajé
  - lo arrojé
  lexicon: HALOT
  rationale: El hifil de ירד significa causar que algo descienda. «Hice descender» refleja con precisión el valor verbal y evita introducir la imagen de derramar que el hebreo no exige aquí.
- source_word: לָאָרֶץ
  english_pob_choice: to the earth
  chosen_spanish: hasta la tierra
  alternatives_spanish:
  - a la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: אָרֶץ puede ser «tierra», «suelo» o «país». Dado el movimiento descendente, «hasta la tierra» conserva el destino final del descenso y suena natural en español.
- source_word: נִצְחָם
  english_pob_choice: their lifeblood
  chosen_spanish: su sangre vital
  alternatives_spanish:
  - su sangre
  - su savia
  - su jugo
  lexicon: HALOT
  rationale: נִצְחָם es difícil y el contexto de lagar favorece una realidad líquida vinculada a la vida derramada. «Sangre vital» preserva el juicio sangriento y la tensión metafórica mejor que una traducción demasiado literal como «jugo».
theological_decisions:
- issue: Mantener la imaginería violenta del juicio sin diluir el paralelismo de lagar/líquido
  english_pob_reading: 'The verse is translated as divine judgment using winepress imagery: ''I made them drunk ... I brought their lifeblood down to the earth.'''
  chosen_spanish_reading: 'El versículo se vierte como juicio divino con imaginería de lagar: «los embriagué ... y hice descender su sangre vital hasta la tierra».'
  alternative_spanish_readings:
  - «los embriagué con mi furor» para explicitar el instrumento
  - «hice descender su jugo hasta la tierra» para conservar más literalmente la metáfora
  rationale: El hebreo combina pisoteo, embriaguez y descenso de un líquido a la tierra. La formulación elegida conserva la severidad del juicio y la tensión metafórica entre uvas pisadas y sangre derramada, sin añadir doctrina ajena al texto.
  doctrine_reference: Principios de traducción POB §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió la lectura revisada más reciente del audit trail inglés, especialmente en la cláusula final, donde se prefirió una formulación de descenso («hice descender») para reflejar con más cercanía el verbo hebreo y el complemento «hasta la tierra», manteniendo «sangre vital» para נִצְחָם. El conjunto se mantiene alineado con el alto grado de acuerdo del control cruzado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; en este verso no aparece.
  - Se mantiene el contraste semántico entre «ira» y «furor» para distinguir אַף de חֲמָה.
  - «Pueblos» se usa en sentido colectivo amplio, no como referencia a entidades políticas modernas.
  - La imaginería de juicio corporal se conserva sin suavizarse ni expandirse más allá del hebreo.
