    rationale: La alternativa 'continuamente mal' comenta la frase final hebrea 'solo mal todo el día'; conviene anclarla más directamente en la expresión temporal/final revisada.
  revised_spanish_text: Yahvé vio que la maldad del hombre era grande en la tierra, y que toda inclinación de los pensamientos de su corazón era solamente mala[a] todo el día[b].
