translation:
  language: es
  text: Entonces el estandarte del campamento de Rubén partió según sus divisiones[a][b], y al frente de su compañía estaba Elizur hijo de Sedeur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bandera»; דֶּגֶל puede referirse al estandarte o insignia que guiaba al campamento.
    reason: lexical_alternative
  - marker: b
    text: O «según sus compañías/tropas»; el hebreo puede tener un matiz organizado, incluso de tipo militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַע
  english_pob_choice: Then ... set out
  chosen_spanish: Entonces ... partió
  alternatives_spanish:
  - Y ... partió
  - Entonces ... salió
  lexicon: HALOT
  rationale: El waw consecutivo expresa avance narrativo; «entonces» comunica la secuencia en español sin forzar una glosa mecánica. «Partió» es natural en contexto de marcha campamental y conserva la idea de desplazamiento.
- source_word: דֶּגֶל
  english_pob_choice: banner
  chosen_spanish: estandarte
  alternatives_spanish:
  - bandera
  - banner
  lexicon: HALOT
  rationale: En contexto militar/tribal, דֶּגֶל designa el estandarte bajo el cual marcha el campamento. «Estandarte» es claro y digno en español; «bandera» puede sonar más moderna pero menos precisa para este contexto.
- source_word: מַחֲנֵה רְאוּבֵן
  english_pob_choice: the camp of Reuben
  chosen_spanish: el campamento de Rubén
  alternatives_spanish:
  - el campamento de Reuben
  - el campamento de la tribu de Rubén
  lexicon: HALOT
  rationale: La cadena constructa es posesiva. «Campamento de Rubén» sigue de cerca el hebreo y es idiomático en español bíblico contemporáneo.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: según sus divisiones
  alternatives_spanish:
  - por sus divisiones
  - de acuerdo con sus compañías
  - según sus tropas
  lexicon: HALOT
  rationale: צְבָא aquí describe agrupaciones ordenadas para la marcha. «Según sus divisiones» transmite bien la organización sin militarizar excesivamente el término. Mantiene el plural del sufijo.
- source_word: וְעַל צְבָאוֹ
  english_pob_choice: and over its company was
  chosen_spanish: y sobre su compañía estaba
  alternatives_spanish:
  - y sobre su división estaba
  - y al frente de su compañía estaba
  - y sobre su tropa estaba
  lexicon: HALOT
  rationale: El sentido de עַל es de supervisión/autoridad. «Sobre su compañía estaba» conserva la relación de mando y refleja el singular del sustantivo con sufijo. «Compañía» es más natural que repetir «división» en la segunda cláusula.
- source_word: אֱלִיצוּר
  english_pob_choice: Elizur
  chosen_spanish: Elizur
  alternatives_spanish:
  - Elisur
  lexicon: standard transliteration
  rationale: Los nombres propios se transliteran de manera estable. Se mantiene la forma habitual «Elizur» para el nombre personal.
- source_word: בֶּן שְׁדֵיאוּר
  english_pob_choice: son of Shedeur
  chosen_spanish: hijo de Sedeur
  alternatives_spanish:
  - hijo de Shedeur
  lexicon: standard transliteration
  rationale: Se conserva el patronímico con transliteración española del nombre propio. «Sedeur» respeta la adaptación fonética usual en español.
theological_decisions:
- issue: Orden tribal y autoridad en la marcha
  english_pob_reading: The verse describes the Reuben camp moving in ordered divisions, with Elizur overseeing the company.
  chosen_spanish_reading: El versículo presenta al campamento de Rubén avanzando en divisiones ordenadas, con Elizur sobre su compañía.
  alternative_spanish_readings:
  - El campamento de Rubén partió en orden de batalla
  - Elizur era el jefe de su división
  rationale: No se debe reducir el texto a una imagen puramente bélica ni suavizarlo hasta perder la estructura organizada. «Divisiones» y «compañía» conservan la tensión entre orden tribal y posible matiz militar sin imponer más de lo que el hebreo exige.
  doctrine_reference: Numbers 10:14-28; orderly movement of the tribes under appointed leadership
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió la segunda cláusula de «division» a «company» para reflejar mejor el singular de צְבָא. El español sigue ese ajuste con «compañía» y mantiene la continuidad léxica de la primera cláusula con «divisiones».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; aquí no hay mención divina explícita.
  - Se prefirió «estandarte» para דֶּגֶל y «compañía» para צְבָא en la segunda cláusula, siguiendo la tensión léxica del audit trail.
  - Los nombres propios se transliteran de forma estable y legible para español bíblico.
  - El estilo mantiene paralelismo con el orden hebreo sin sonar mecánico.
