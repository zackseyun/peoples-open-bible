translation:
  language: ko
  text: 다윗은 하늘에 올라가지 못하였으나, 그가 친히 이렇게 말합니다. 『야훼께서[a] 내 주께 말씀하셨다. 「너는 내 오른편에 앉아 있어라.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 시편 110:1 인용. 첫 번째 「주」는 히브리어 본문의 신명 YHWH이고, 두 번째 「주」는 다윗의 주(메시아)이다. 따라서 첫 번째 「주」를 「야훼」로, 두 번째 「주」는 그대로 「주」로 옮긴다.
    reason: cross_reference
theological_decisions:
- issue: 시편 110:1 인용에서 두 「주」의 분별
  chosen_reading: 첫째 κύριος → 야훼, 둘째 κυρίῳ → 주
  alternative_readings:
  - 둘 다 「주」
  rationale: 히브리어 본문 시 110:1은 「YHWH가 내 아도나이에게 말씀하셨다」로, 70인역의 두 κύριος는 서로 다른 지시 대상을 가진다. 첫째는 신명 YHWH, 둘째는 다윗의 주(메시아)이다. 두 위치를 분별하여 옮긴다.
  doctrine_reference: 'KOREAN_PIPELINE.md: κύριος(=YHWH) → 야훼'
