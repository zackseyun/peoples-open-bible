base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/034/010.yaml
  text: 'Thus says the Lord GOD: Behold[a], I am against the shepherds, and I will require my flock from their hand, and I will stop them from shepherding the flock. The shepherds will no longer shepherd them, and I will rescue my flock from their mouth[c][b], and it will no longer be food for them.'
  footnotes:
  - marker: a
    text: Hebrew 'from their hand,' an idiom of accountability and repossession.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will demand my flock from them' / 'I will call them to account for my flock.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'from their mouth,' preserving the image of the shepherds as devourers rather than protectors.
    reason: lexical_alternative
