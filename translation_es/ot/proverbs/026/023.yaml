translation:
  language: es
  text: Como escoria de plata recubierta sobre una vasija de barro, así son los labios ardientes[a] con un corazón malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fervientes»; el participio hebreo literalmente evoca calor o ardor, y aquí describe un habla que suena intensamente cálida o ansiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּסֶף סִיגִים
  english_pob_choice: silver dross
  chosen_spanish: escoria de plata
  alternatives_spanish:
  - plata de escoria
  - escoria plateada
  lexicon: HALOT
  rationale: La expresión hebrea no describe plata pura, sino el residuo impuro asociado con la plata. «Escoria de plata» conserva la imagen de un material que aparenta valor metálico pero es desechable, en línea con el contraste proverbial.
- source_word: מְצֻפֶּה
  english_pob_choice: overlaid
  chosen_spanish: sobrepuesta / recubierta
  alternatives_spanish:
  - plated
  - cubierta
  lexicon: HALOT
  rationale: El participio pasivo de צפה indica estar cubierto o revestido. En español, «sobrepuesta» dentro de la frase nominal comunica la idea de una capa externa aplicada, sin sugerir que el material sea sólido o auténtico.
- source_word: עַל חָרֶשׂ
  english_pob_choice: on earthenware
  chosen_spanish: sobre barro
  alternatives_spanish:
  - sobre loza
  - sobre cerámica
  - sobre vasija de barro
  lexicon: HALOT
  rationale: חָרֶשׂ se refiere al material de alfarería/arcilla. «Barro» es una forma breve y transparente en español bíblico para el material barato y frágil al que se contrasta la apariencia metálica.
- source_word: שְׂפָתַיִם
  english_pob_choice: lips
  chosen_spanish: la boca
  alternatives_spanish:
  - los labios
  - la lengua
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «labios», en español «la boca» puede funcionar como equivalente natural para la expresión verbal. Sin embargo, se reconoce que el cuerpo-partido hebreo apunta al habla externa.
- source_word: דֹּלְקִים
  english_pob_choice: fervent
  chosen_spanish: encendida
  alternatives_spanish:
  - ardiente
  - ardorosa
  - en fuego
  lexicon: HALOT
  rationale: El participio sugiere literalmente «arder/estar encendido». «Encendida» conserva la metáfora del calor o fuego en el habla, como la nota inglesa que permite la lectura alternativa de «burning lips».
- source_word: וְלֶב רָע
  english_pob_choice: with an evil heart
  chosen_spanish: con corazón malo
  alternatives_spanish:
  - y un corazón malo
  - pero un corazón malo
  - con un corazón perverso
  lexicon: HALOT
  rationale: La construcción une la exterioridad de las palabras con la realidad interior. «Corazón malo» mantiene la categoría moral de רָע sin suavizarla; «con» expresa adecuadamente la coexistencia entre el habla encendida y el interior corrupto.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el criterio óptimo de la POB inglesa. La única tensión relevante es la metáfora de דֹּלְקִים, que en hebreo puede leerse con calor literal o figurado; en español se mantuvo «encendida» y se señaló la alternativa en nota. No se detectaron revisiones posteriores sustanciales.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial de la comparación, sin convertirla en explicación interpretativa.
  - Se evitó «SEÑOR» u այլ terminología no presente en el versículo.
  - Se prefirió un español sobrio y bíblico, pero natural, preservando la imagen de superficie brillante frente a realidad interior corrompida.
