revisions:
- from: Estos hombres mataron a sus jóvenes con la espada alrededor del santo templo[a], y no tuvieron compasión de joven ni de virgen, de viejo ni de joven[b].
  to: Estos hombres mataron a sus jóvenes varones con la espada alrededor del santo templo, y no tuvieron compasión de joven varón ni de virgen, de anciano ni de menor[a].[b]
  rationale: Se revisa para conservar la fuerza masculina de νεανίσκους/νεανίσκου, distinguirla de νεωτέρου, mejorar el registro con «anciano», y reubicar correctamente la nota lexical. La revisión sigue de cerca el griego y el razonamiento ya documentado en la auditoría inglesa.
