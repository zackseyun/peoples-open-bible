    issue: Las notas al pie están ancladas en lugares incorrectos respecto al audit trail inglés y al contenido de cada nota.
    rationale: La nota sobre sacrificios explica 'Con sus rebaños y con sus vacadas', no 'no lo hallarán'. La nota sobre alternativas de 'se ha apartado' corresponde a חלץ מֵהֶם, no a 'Yahvé'.
