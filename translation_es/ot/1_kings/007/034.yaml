translation:
  language: es
  text: Y había cuatro soportes[a] en las cuatro esquinas de cada base móvil; sus soportes formaban parte de la base móvil misma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hombros»; probablemente se refiere a salientes estructurales o piezas de soporte en las esquinas de la base móvil.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֵפוֹת
  english_pob_choice: supports
  chosen_spanish: soportes
  alternatives_spanish:
  - hombros
  - proyecciones
  - piezas laterales
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «hombros», en este contexto arquitectónico se trata de elementos estructurales que sostienen o sobresalen de la base. «Soportes» comunica la función sin forzar una imagen corporal en español.
- source_word: פִּנּוֹת
  english_pob_choice: corners
  chosen_spanish: esquinas
  alternatives_spanish:
  - ángulos
  - lados
  lexicon: HALOT
  rationale: En una pieza cuadrada o rectangular, «esquinas» es el equivalente natural y claro en español para las cuatro extremidades de la base.
- source_word: מְּכֹנָה
  english_pob_choice: stand
  chosen_spanish: base
  alternatives_spanish:
  - soporte
  - estandarte
  - carro
  lexicon: HALOT
  rationale: En 1 Reyes 7 este término designa la estructura fabricada que sostiene el lavamanos o recipiente. «Base» funciona bien en español bíblico y conserva el sentido de estructura de apoyo; «soporte» se reservaría para los elementos internos mencionados en la frase.
- source_word: הָאֶחָת
  english_pob_choice: each
  chosen_spanish: cada
  alternatives_spanish:
  - la única
  - una
  lexicon: HALOT
  rationale: El singular hebreo tiene valor distributivo en el contexto de la descripción artesanal. «Cada base» reproduce ese sentido natural en español.
- source_word: מִן
  english_pob_choice: part of
  chosen_spanish: formaban parte de
  alternatives_spanish:
  - eran de
  - procedían de
  - salían de
  lexicon: HALOT
  rationale: 'Aquí la preposición indica relación integral o derivativa: los soportes pertenecían estructuralmente a la base. «Formaban parte de» expresa mejor esa unidad constructiva que un simple «de» o «desde».'
- source_word: כְּתֵפֶיהָ
  english_pob_choice: its supports
  chosen_spanish: sus soportes
  alternatives_spanish:
  - sus hombros
  - sus piezas laterales
  lexicon: HALOT
  rationale: Se mantiene la misma palabra de la primera ocurrencia para conservar la coherencia terminológica del objeto descrito y evitar una traducción demasiado literal de «hombros».
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «the one stand» a «each stand» para reflejar el singular distributivo hebreo; por eso el español usa «cada base». También se mantuvo la lectura funcional de כְּתֵפוֹת como elementos estructurales, no anatómicos.
  spanish_consistency_notes:
  - He mantenido un registro técnico y sobrio, adecuado para una descripción de manufactura del templo.
  - «Base» y «soportes» se distinguen con consistencia para reflejar la relación entre la estructura principal y sus partes.
  - No se añadió nota de pie porque el español puede expresar aquí la alternativa principal sin ambigüedad fuerte.
