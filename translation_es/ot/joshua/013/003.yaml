translation:
  language: es
  text: 'desde el Sijor[a], que está frente a Egipto[b], hasta la frontera de Ecrón, hacia el norte[c] —se considera territorio cananeo—, los cinco gobernantes de los filisteos: el gazita, el asdodita, el ascalonita, el gatita y el ecronita, y los Avim[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Arroyo de Egipto», si aquí el Sijor se entiende como ese curso de agua fronterizo.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo literalmente: «que está sobre la faz de Egipto».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «al norte»; el hebreo usa una forma direccional.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «los avitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַשִּׁיחוֹר
  english_pob_choice: from the Shihor
  chosen_spanish: desde el Sijor
  alternatives_spanish:
  - desde el Shihor
  - desde el arroyo de Egipto
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado en español como topónimo. Mantenerlo evita decidir en el texto principal entre identificación geográfica e interpretación tradicional.
- source_word: עַל פְּנֵי מִצְרַיִם
  english_pob_choice: which is before Egypt
  chosen_spanish: que está frente a Egipto
  alternatives_spanish:
  - que está antes de Egipto
  - que está delante de Egipto
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente espacial y no debe endurecerse como una dirección cardinal que el hebreo no dice explícitamente. 'Frente a Egipto' conserva la imagen relacional y resulta natural en español.
- source_word: גְּבוּל עֶקְרוֹן צָפוֹנָה
  english_pob_choice: the border of Ekron northward
  chosen_spanish: hasta la frontera de Ecrón, hacia el norte
  alternatives_spanish:
  - hasta la frontera septentrional de Ecrón
  - hasta el límite de Ecrón hacia el norte
  lexicon: HALOT
  rationale: '''Frente a'' se combina con un giro español natural para la dirección. ''Hacia el norte'' conserva el valor direccional de צָפוֹנָה sin sobreinterpretarlo como un borde fijo perteneciente a Ecrón.'
- source_word: לַכְּנַעֲנִי תֵּחָשֵׁב
  english_pob_choice: it is counted as Canaanite territory
  chosen_spanish: se considerará territorio cananeo
  alternatives_spanish:
  - se contará como territorio cananeo
  - se considerará cananeo
  lexicon: HALOT
  rationale: El nifal de חשב expresa ser considerado o contado. En español, añadir 'territorio' explicita el referente geográfico que exige el contexto sin agregar contenido doctrinal.
- source_word: חֲמֵשֶׁת סַרְנֵי פְלִשְׁתִּים
  english_pob_choice: the five rulers of the Philistines
  chosen_spanish: los cinco gobernantes de los filisteos
  alternatives_spanish:
  - los cinco jefes de los filisteos
  - los cinco señores de los filisteos
  lexicon: HALOT
  rationale: '''סַרְנֵי'' designa a los líderes políticos distintivos de los filisteos. ''Gobernantes'' comunica autoridad en español actual sin cargar con el matiz feudal de ''señores''.'
- source_word: הָעַזָּתִי / הָאַשְׁדּוֹדִי / הָאֶשְׁקְלוֹנִי / הַגִּתִּי / הָעֶקְרוֹנִי
  english_pob_choice: the Gazite, the Ashdodite, the Ashkelonite, the Gittite, and the Ekronite
  chosen_spanish: el de Gaza, el de Asdod, el de Ascalón, el de Gat, el de Ecrón
  alternatives_spanish:
  - el gazita, el asdodita, el ascalonita, el gittita y el ecronita
  - los de Gaza, los de Asdod, los de Ascalón, los de Gat y los de Ecrón
  lexicon: HALOT
  rationale: Se traduce la forma gentilicia de modo explicativo, usando una construcción española natural. Esto evita forzar demónimos poco asentados o demasiado artificiales y mantiene claro que se trata de representantes de cada ciudad.
- source_word: וְהָעַוִּים
  english_pob_choice: and the Avvim
  chosen_spanish: y los Avim
  alternatives_spanish:
  - y los avitas
  - y los avvitas
  lexicon: HALOT
  rationale: Se conserva el etnónimo como nombre de pueblo. 'Avim' sigue de cerca la forma hebrea y respeta la decisión del POB inglés de transliterar el grupo étnico en el texto principal.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del expediente inglés: mantiene la traducción del Sijor como nombre propio en el texto principal, conserva la relación espacial ''frente a Egipto'' en lugar de convertirla en una dirección cardinal, y reproduce el matiz direccional de צָפוֹנָה con una expresión española natural (''hacia el norte''). También preserva la alternativa tradicional de identificar el Sijor con el Arroyo de Egipto en nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el Tetragrámaton; no ocurre en este versículo.
  - Se mantiene 'filisteos' y no 'Peleset' u otra transliteración, por consistencia bíblica en español.
  - 'Se conserva la transliteración de topónimos y etnónimos clave: Sijor, Ecrón, Asdod, Ascalón, Gat, Avim.'
  - No se introduce 'SEÑOR' ni 'Cristo'; el versículo no contiene esos términos.
