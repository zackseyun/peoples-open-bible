translation:
  language: es
  text: Entonces Moisés acercó a Aarón y a sus hijos varones, y los lavó con agua.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: brought ... near
  chosen_spanish: hizo acercar
  alternatives_spanish:
  - acercó
  - presentó
  lexicon: HALOT
  rationale: El hifil de קרב expresa hacer que alguien se acerque o lo traiga cerca. En español, 'hizo acercar' conserva la acción causativa y la cercanía ritual sin sonar demasiado rígido; 'presentó' sería más interpretativo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Transliteración estándar
  rationale: Nombre propio bíblico en forma española establecida.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: Transliteración estándar
  rationale: Nombre propio bíblico en forma española establecida con acento ortográfico.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus hijos'; en este contexto se refiere a los hijos varones de Aarón que serán consagrados, pero en español 'sus hijos' reproduce mejor la forma del original sin añadir especificación no explícita en la cláusula.
- source_word: וַיִּרְחַץ
  english_pob_choice: washed
  chosen_spanish: los lavó
  alternatives_spanish:
  - los bañó
  - los lavó
  lexicon: HALOT
  rationale: רחץ significa lavar o bañar. 'Los lavó' es natural en español y no reduce indebidamente el acto ritual; 'bañó' podría sugerir inmersión más fuerte de la que el verso afirma.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los
  lexicon: Pronombre de objeto directo
  rationale: El pronombre español concuerda con Aarón y sus hijos como objeto directo plural masculino.
- source_word: בַּמָּיִם
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - con agua
  - en agua
  lexicon: HALOT
  rationale: La preposición beth puede expresar medio o instrumento; en español, 'con agua' transmite de forma natural el medio del lavado. 'En agua' sería posible, pero menos idiomático aquí.
theological_decisions:
- issue: Naturaleza del acto ritual de lavado
  english_pob_reading: washed them with water
  chosen_spanish_reading: los lavó con agua
  alternative_spanish_readings:
  - los bañó con agua
  - los lavó en agua
  rationale: El texto describe un lavado ritual previo a la investidura sacerdotal. 'Los lavó con agua' mantiene la neutralidad del hebreo sin convertir el acto en una inmersión específica ni en una interpretación litúrgica posterior.
  doctrine_reference: Éxodo 29:4; Levítico 8:6
translation_notes:
  revision_awareness: El texto inglés auditado usa 'brought Aaron and his sons near' y 'washed them with water' sin notas; la versión española sigue esa lectura con equivalencia óptima, preservando la secuencia narrativa y el sentido ritual del hebreo.
  spanish_consistency_notes:
  - Se mantuvo el orden narrativo con 'Entonces' para reflejar la waw consecutiva.
  - Se evitó 'presentó' porque en español puede sonar más formal que el simple acercamiento ritual del hebreo.
  - Se evitó 'bañó' para no sugerir más de lo que el verbo רחץ exige en este contexto.
  - No se añadieron notas al texto porque no hay variantes o tensiones textuales documentadas en el paquete fuente.
