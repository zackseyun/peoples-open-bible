revisions:
- from: Y si me sobreviene mal[a] por causa de él, todo el que lo oiga se guardará de él.
  to: Y si me sobreviene algún mal[a] por medio de él, todo el que oiga se guardará de él.
  rationale: Se ajusta διʼ αὐτόν a «por medio de él» para seguir más de cerca la auditoría inglesa final y el griego; se elimina «lo» en «todo el que lo oiga» porque el objeto no está expreso; y se suaviza «me sobreviene mal» a «me sobreviene algún mal» para mejorar la naturalidad sin perder amplitud semántica.
