revisions:
- from: Porque él, sus hermanos y la casa de su padre se mantuvieron firmes[a], y combatieron a los enemigos de Israel, y establecieron libertad para ellos, y la registraron en tablillas de bronce, y la colocaron en una columna en el monte Sión.
  to: Porque él, sus hermanos y la casa de su padre se mantuvieron firmes, y combatieron a los enemigos de Israel, y establecieron libertad para ellos[a], y lo consignaron en tablillas de bronce, y las colocaron en una columna en el monte Sión.
  rationale: Se movió la nota al sintagma correcto ('para ellos[a]'), se corrigió la referencia pronominal para que las tablillas sean el objeto plural de la última cláusula ('las colocaron'), y se sustituyó 'registraron' por 'consignaron' para un español más natural en contexto epigráfico. Se mantuvo 'columna' como opción accesible aunque 'estela' también sería posible.
