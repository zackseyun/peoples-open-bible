    rationale: Aunque no es errónea, en español bíblico natural la construcción de pacto se expresa mejor como 'seré su Dios'. Esto preserva el sentido de היה + ל + אלהים con mayor naturalidad y coincide mejor con el audit trail en inglés ('their God').
