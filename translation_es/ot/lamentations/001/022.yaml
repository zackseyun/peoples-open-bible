translation:
  language: es
  text: Que venga delante de ti toda su maldad[a], y trátalos[b] como me has tratado a mí, por todas mis transgresiones; porque mis gemidos son muchos[c], y mi corazón está enfermo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maldad» traduce el valor moral probable de רָעָה aquí; en otros contextos puede significar «calamidad» o «desgracia».
    reason: lexical_alternative
  - marker: b
    text: 'O: «haz con ellos». El hebreo repite el mismo verbo en ambas cláusulas, de modo que el matiz puede expresarse también como una sola acción verbal repetida.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «mis suspiros son muchos». אַנְחָה puede referirse a suspiros o gemidos de dolor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּבֹא
  english_pob_choice: Let ... come
  chosen_spanish: Que venga
  alternatives_spanish:
  - Que llegue
  - Que aparezca
  lexicon: HALOT
  rationale: El hebreo es un imperfecto qal usado con fuerza jussiva en una súplica. «Que venga» conserva bien el tono petitionario en español natural.
- source_word: רָעָתָם
  english_pob_choice: their evil
  chosen_spanish: su maldad
  alternatives_spanish:
  - su mal
  - su maldad / su perversidad
  - su calamidad
  lexicon: HALOT
  rationale: En este contexto el valor culpable encaja mejor que «calamidad». «Maldad» mantiene la carga moral del término y funciona con claridad en español.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión idiomática hebrea apunta a comparecer ante Dios. «Delante de ti» es natural y conserva la idea de comparecencia sin volverlo demasiado litúrgico.
- source_word: וְעוֹלֵל לָמוֹ
  english_pob_choice: and deal with them
  chosen_spanish: y trátalos
  alternatives_spanish:
  - y obra con ellos
  - y haz con ellos
  lexicon: HALOT
  rationale: El verbo עלל aquí expresa tratar/obrar contra alguien, a menudo con dureza. «Trátalos» es breve y permite sostener la repetición con la siguiente cláusula.
- source_word: כַּאֲשֶׁר עוֹלַלְתָּ לִי
  english_pob_choice: as you have dealt with me
  chosen_spanish: como me has tratado a mí
  alternatives_spanish:
  - como has obrado conmigo
  - como me has hecho
  lexicon: HALOT
  rationale: Se conserva la relación verbal entre ambos miembros del versículo. «Me has tratado» refleja con naturalidad el mismo campo semántico de עלל sin perder la correspondencia.
- source_word: עַל כָּל פְּשָׁעָי
  english_pob_choice: because of all my transgressions
  chosen_spanish: por todas mis transgresiones
  alternatives_spanish:
  - a causa de todas mis rebeliones
  - por todos mis delitos
  lexicon: HALOT
  rationale: פֶּשַׁע tiene fuerza de transgresión/rebelión contra Dios. «Transgresiones» reproduce esa gravedad y mantiene el matiz penitencial del contexto.
- source_word: רַבּוֹת אַנְחֹתַי
  english_pob_choice: my groans are many
  chosen_spanish: mis gemidos son muchos
  alternatives_spanish:
  - mis suspiros son muchos
  - mis lamentos son muchos
  lexicon: HALOT
  rationale: אַנְחָה puede ser suspiro o gemido. Aquí «gemidos» preserva la intensidad dolorosa que el POB refleja con «groans», sin forzar un tono más débil.
- source_word: וְלִבִּי דַוָּי
  english_pob_choice: my heart is sick
  chosen_spanish: mi corazón está enfermo
  alternatives_spanish:
  - mi corazón está débil
  - mi corazón está dolido
  lexicon: HALOT
  rationale: דַוָּי expresa enfermedad, debilidad o aflicción. «Está enfermo» conserva la metáfora corporal interna y el peso emocional del cierre.
theological_decisions:
- issue: Naturaleza de la petición de juicio contra los adversarios
  english_pob_reading: The verse is rendered as a plea that God bring the enemies' evil before himself and treat them correspondingly, without specifying a doctrine of personal vengeance beyond the text.
  chosen_spanish_reading: El versículo se traduce como una súplica para que Dios haga comparecer la maldad de los enemigos ante sí y los trate de manera correspondiente, sin añadir una lectura doctrinal de venganza personal que el texto no explicita.
  alternative_spanish_readings:
  - Una imprecación más fuerte que enfatice castigo retributivo
  - Una formulación más suave centrada solo en que Dios note su maldad
  rationale: El hebreo presenta una oración de lamentación que pide a Dios actuar en respuesta al mal del enemigo, en paralelo con el juicio ya sufrido por Sion. La redacción española conserva ese carácter judicial sin intensificarlo ni atenuarlo más allá del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se verificó el último pase de revisión: sin cambios requeridos; acuerdo alto con el control cruzado y sin observaciones abiertas.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma por defecto cuando corresponda al nombre divino; este versículo no la contiene.
  - Se preservó la repetición verbal del hebreo con «tratar» / «tratado» para sostener la correspondencia estilística y semántica.
  - «Transgresiones» se eligió por su peso moral y por conservar el tono penitencial del lamento.
  - «Gemidos» y «corazón está enfermo» mantienen la imaginería corporal del cierre sin suavizarla.
