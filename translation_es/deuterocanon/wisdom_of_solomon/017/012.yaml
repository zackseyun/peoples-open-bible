translation:
  language: es
  text: Porque el miedo no es otra cosa que la traición de las ayudas que provienen de la razón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las ayudas derivadas del razonamiento».'
