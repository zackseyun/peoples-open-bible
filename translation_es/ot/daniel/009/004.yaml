translation:
  language: es
  text: 'Y oré a Yahvé mi Dios, y confesé, y dije: «Te ruego, Señor, el Dios grande e imponente[a], que guarda el pacto y el amor leal[b] para los que lo aman y guardan sus mandamientos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asombroso». El hebreo expresa a quien inspira temor reverente.
    reason: lexical_alternative
  - marker: b
    text: O «misericordia» / «fidelidad pactal». El hebreo חֶסֶד lleva la idea de amor fiel, lealtad de pacto y misericordia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָֽאֶתְפַּֽלְלָה
  english_pob_choice: And I prayed
  chosen_spanish: Y oré
  alternatives_spanish:
  - Y estaba orando
  - Y hice oración
  lexicon: HALOT
  rationale: El wayyiqtol narra la acción en secuencia; «oré» transmite el pasado narrativo con naturalidad en español sin perder el valor de acción puntual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahweh
  lexicon: HALOT
  rationale: 'En esta traducción española se sigue el criterio del proyecto para יהוה: «Yahvé». La preposición de dirección en la oración se expresa naturalmente con «a».'
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios y Señor
  lexicon: HALOT
  rationale: El sufijo de primera persona singular debe conservarse; «mi Dios» es directo y fiel al valor posesivo.
- source_word: וָאֶתְוַדֶּה
  english_pob_choice: and confessed
  chosen_spanish: y confesé
  alternatives_spanish:
  - y hice confesión
  - y reconocí mi pecado
  lexicon: HALOT
  rationale: En este contexto penitencial, «confesé» preserva la idea de confesión de pecado sin explicitar más de lo que el hebreo dice.
- source_word: וָאֹמְרָה
  english_pob_choice: and said
  chosen_spanish: y dije
  alternatives_spanish:
  - y decía
  - y exclamé
  lexicon: HALOT
  rationale: Continúa la introducción de la oración; «y dije» es la equivalencia simple y natural en español.
- source_word: אָנָּא
  english_pob_choice: Please
  chosen_spanish: Te ruego
  alternatives_spanish:
  - Por favor
  - Ah, te suplico
  lexicon: HALOT
  rationale: En una súplica dirigida a Dios, «Te ruego» comunica mejor la entreaty reverente que un simple «por favor».
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Señor Dios
  lexicon: HALOT
  rationale: Como título de dirección, «Señor» es el equivalente español natural; se evita «mi Señor» por sonar menos idiomático aquí.
- source_word: הָאֵל
  english_pob_choice: God
  chosen_spanish: el Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: 'El hebreo mantiene el artículo: «el Dios» preserva mejor la forma titulación en vocativo que una simple repetición de «Dios».'
- source_word: הַגָּדוֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  lexicon: HALOT
  rationale: En español, «gran» fluye mejor ante un sustantivo singular definido y conserva la idea de grandeza.
- source_word: וְהַנּוֹרָא
  english_pob_choice: awesome
  chosen_spanish: temible
  alternatives_spanish:
  - asombroso
  - imponente
  lexicon: HALOT
  rationale: Se conserva la tensión de reverente temor del término hebreo. «Temible» es más fuerte que «asombroso» y preserva el matiz de temor reverente que la nota inglesa documenta.
- source_word: שֹׁמֵר
  english_pob_choice: who keeps
  chosen_spanish: que guarda
  alternatives_spanish:
  - que mantiene
  - que observa
  lexicon: HALOT
  rationale: El participio describe una acción característica de Dios; «que guarda» transmite bien el sentido de custodiar/observar el pacto.
- source_word: הַבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - la alianza
  - el convenio
  lexicon: HALOT
  rationale: «Pacto» es el término bíblico español más estable para בְּרִית en contexto teológico y jurídico.
- source_word: וְהַחֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: la lealtad
  alternatives_spanish:
  - el amor constante
  - la misericordia
  - el amor leal
  lexicon: HALOT
  rationale: חֶסֶד en contexto de pacto combina amor, lealtad y fidelidad. «Lealtad» intenta conservar la dimensión de fidelidad pactal sin diluirla en un afecto genérico; se deja abierta la tensión semántica documentada en la nota inglesa.
- source_word: לְאֹהֲבָיו
  english_pob_choice: for those who love him
  chosen_spanish: para los que lo aman
  alternatives_spanish:
  - a los que lo aman
  - para quienes lo aman
  lexicon: HALOT
  rationale: La preposición y el participio plural se vuelven naturalmente «para los que lo aman», manteniendo el valor relacional.
- source_word: וּלְשֹׁמְרֵי מִצְוֺתָיו
  english_pob_choice: and keep his commandments
  chosen_spanish: y guardan sus mandamientos
  alternatives_spanish:
  - y observan sus mandamientos
  - y cumplen sus mandamientos
  lexicon: HALOT
  rationale: 'La coordinación con «los que lo aman» se expresa como una segunda relativa: «y guardan sus mandamientos». «Mandamientos» conserva la fuerza normativa de מִצְוֺת.'
theological_decisions:
- issue: Rendering of יהוה in Spanish
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». Esto evita la máscara litúrgica «SEÑOR» y preserva el nombre pactal del Dios de Israel.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of חֶסֶד in a covenant context
  english_pob_reading: steadfast love
  chosen_spanish_reading: lealtad
  alternative_spanish_readings:
  - amor constante
  - misericordia
  - amor leal
  rationale: El contexto enlaza חֶסֶד con el pacto y con quienes aman y obedecen. «Lealtad» intenta expresar esa fidelidad relacional y pactal; se reconoce que el término también puede abarcar amor constante y misericordia.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: Rendering of הַנּוֹרָא
  english_pob_reading: awesome
  chosen_spanish_reading: temible
  alternative_spanish_readings:
  - asombroso
  - imponente
  rationale: La nota inglesa explica el elemento de temor reverente. «Temible» conserva la tensión semántica sin rebajarla a un mero elogio estético.
  doctrine_reference: HALOT on נורא; English POB footnote a
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión inglesa más reciente, que prefirió «awesome» para הַנּוֹרָא, pero aquí se opta por «temible» para conservar de modo más explícito el temor reverente señalado por la nota lexical. También se mantiene el giro de pacto de חֶסֶד con una solución española que no aplana la riqueza semántica del término.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al criterio del proyecto.
  - Se conserva «pacto» para בְּרִית y no «alianza», por ser el término bíblico más asentado en español.
  - «Mandamientos» traduce מִצְוֺתָיו con sentido normativo claro.
  - Se evita «SEÑOR» como máscara del nombre divino y se reserva «Señor» para אֲדֹנָי.
  - La nota sobre הַנּוֹרָא se ancla en la frase «temible» para preservar la alternativa lexical documentada.
