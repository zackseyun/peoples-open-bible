translation:
  language: es
  text: 'Y los hijos de Eliab: Nemuel[a], Datán y Abiram. Estos son aquellos Datán y Abiram, los llamados de la congregación, que se enfrentaron a Moisés y a Aarón en la compañía de Coré, cuando se enfrentaron a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los escogidos de la congregación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y los hijos de
  lexicon: HALOT
  rationale: En una lista genealógica, בנים se refiere con naturalidad a descendientes varones; 'hijos de' conserva la relación genealógica con el hebreo y funciona bien en español bíblico actual.
- source_word: הוּא
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Este es
  - Son
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular resumptivo, el referente inmediato incluye dos nombres; 'Estos son' transmite la función identificadora con naturalidad en español sin perder el énfasis.
- source_word: קרואי העדה
  english_pob_choice: the called ones of the congregation
  chosen_spanish: los llamados de la congregación
  alternatives_spanish:
  - los escogidos de la congregación
  - los convocados de la congregación
  - los llamados de la asamblea
  lexicon: HALOT
  rationale: קרואי conserva el sentido léxico de 'llamados'. En español, 'llamados de la congregación' mantiene la ambigüedad entre personas convocadas o reconocidas sin imponer una lectura más interpretativa.
- source_word: העדה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  lexicon: HALOT
  rationale: עֵדָה se ajusta bien a 'congregación' en el contexto del desierto y el censo, con un registro bíblico claro y comprensible.
- source_word: הִצּוּ
  english_pob_choice: contended against
  chosen_spanish: se enfrentaron a
  alternatives_spanish:
  - contendieron contra
  - se opusieron a
  - lucharon contra
  lexicon: HALOT
  rationale: נצה expresa disputa o contienda. 'Se enfrentaron a' comunica la hostilidad con español natural; 'contendieron contra' se conservaría como alternativa más cercana al calco, pero menos fluida.
- source_word: בַּעֲדַת קֹרַח
  english_pob_choice: in the company of Korah
  chosen_spanish: en la compañía de Coré
  alternatives_spanish:
  - junto con Coré
  - entre los de Coré
  lexicon: HALOT
  rationale: La frase sitúa a Datan y Abiram dentro del grupo de Coré. 'En la compañía de Coré' conserva la imagen relacional del hebreo sin forzar una estructura eclesial ajena al texto.
- source_word: בְּהַצֹּתָם
  english_pob_choice: when they contended
  chosen_spanish: cuando se enfrentaron
  alternatives_spanish:
  - cuando contendieron
  - en su contienda
  - cuando se rebelaron
  lexicon: HALOT
  rationale: El infinitivo con ב indica circunstancia temporal. Se repite en español la misma idea verbal que antes para mantener coherencia lexical y fuerza adversarial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Mantiene el nombre propio divino sin sustituirlo por un título.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo nombra explícitamente a Yahvé. En español, 'Yahvé' sigue el nombre personal divino conforme al estándar del proyecto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Valor de קרואי העדה
  english_pob_reading: the called ones of the congregation
  chosen_spanish_reading: los llamados de la congregación
  alternative_spanish_readings:
  - los escogidos de la congregación
  - los convocados de la congregación
  rationale: El hebreo puede apuntar a personas convocadas o a quienes eran reconocidos como representantes. La traducción principal conserva la tensión sin resolverla de forma excesiva.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión más reciente del inglés POB, que sustituyó una lectura pasiva de קרואי העדה por una forma más nominal ('called ones of the congregation') y añadió énfasis demostrativo en 'These are that Dathan and Abiram'. En español se refleja ese ajuste con 'Estos son aquel Datan y Abiram' y con 'los llamados de la congregación', manteniendo la cautela lexical sin perder la identificación enfática del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Coré' con acento gráfico conforme al uso español.
  - Se usa 'Moisés', 'Aarón' y 'Yahvé' de forma consistente con la terminología del proyecto.
  - La repetición de 'se enfrentaron' procura reproducir la reiteración del hebreo para el mismo verbo de contienda.
