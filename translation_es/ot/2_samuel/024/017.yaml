translation:
  language: es
  text: 'Entonces David dijo a Yahvé, cuando vio al ángel que golpeaba al pueblo: «He aquí, he pecado y he obrado mal[a]; pero estas ovejas, ¿qué han hecho? Por favor, que tu mano esté contra mí y contra la casa de mi padre[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «he cometido iniquidad» o «he actuado perversamente».
    reason: lexical_alternative
  - marker: b
    text: «La casa de mi padre» se refiere al hogar de David o a su linaje familiar.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor del Nombre divino como nombre propio del pacto, de acuerdo con el criterio del proyecto en español. «Yahvé» preserva la referencia directa y evita el enmascaramiento litúrgico con «SEÑOR».
- source_word: בִּרְאֹתוֹ
  english_pob_choice: when he saw
  chosen_spanish: cuando vio
  alternatives_spanish:
  - al ver
  - mientras veía
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo con sufijo expresa simultaneidad o temporalidad; «cuando vio» es natural en español y conserva la relación temporal del hebreo.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En este contexto judicial y sobrenatural, «ángel» es la lectura directa y corresponde al sentido asumido en el audit trail en inglés.
- source_word: הַמַּכֶּה בָעָם
  english_pob_choice: striking the people
  chosen_spanish: que golpeaba al pueblo
  alternatives_spanish:
  - que hería al pueblo
  - que castigaba al pueblo
  - que estaba golpeando al pueblo
  lexicon: HALOT
  rationale: El participio de נכה indica acción de golpear/herir. «Golpeaba» conserva la acción activa sin interpretar de más como «castigaba», y «al pueblo» mantiene el objeto directo colectivo.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: «He aquí» reproduce la fuerza enfática y el registro elevado de הִנֵּה sin caer en calco mecánico; además armoniza bien con la formulación formal del resto del versículo.
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: yo he pecado
  alternatives_spanish:
  - yo pequé
  - he pecado
  lexicon: HALOT
  rationale: El perfecto expresa culpa reconocida con relevancia presente. «He pecado» es la equivalencia más directa y digna; se añade el pronombre para mantener la fuerza enfática de אָנֹכִי.
- source_word: הֶעֱוֵיתִי
  english_pob_choice: I have done wrong
  chosen_spanish: yo he obrado mal
  alternatives_spanish:
  - yo he cometido iniquidad
  - yo he actuado perversamente
  - yo soy culpable
  lexicon: HALOT
  rationale: La forma causativa/intensiva de עוה añade una nota de desviación moral distinta de חָטָאתִי. «He obrado mal» conserva esa diferencia en un español claro y no demasiado técnico.
- source_word: הַצֹּאן
  english_pob_choice: these sheep
  chosen_spanish: estas ovejas
  alternatives_spanish:
  - este rebaño
  - estas ovejas del rebaño
  lexicon: HALOT
  rationale: Se mantiene la metáfora pastoral del hebreo, como en el audit trail inglés. «Ovejas» es más natural que «ovejas» en plural con demostrativo en español y preserva el contraste afectivo con el juicio sobre el pueblo.
- source_word: מֶה עָשׂוּ
  english_pob_choice: what have they done?
  chosen_spanish: ¿qué han hecho?
  alternatives_spanish:
  - ¿qué hicieron?
  - ¿qué han cometido?
  lexicon: HALOT
  rationale: La pregunta retórica en perfecto en español transmite la inocencia continuada de las víctimas frente al juicio, en paralelo al valor del inglés auditado.
- source_word: תְּהִי נָא יָדְךָ
  english_pob_choice: Please let your hand be
  chosen_spanish: Que, por favor, tu mano sea
  alternatives_spanish:
  - Por favor, que tu mano esté
  - Que tu mano caiga
  lexicon: HALOT
  rationale: Se conserva la imagen de la mano divina como agente de acción/jucio. «Sea» mantiene el jussivo; se evita paraphrasear a «castiga» para no borrar la metáfora teológica.
- source_word: בִּי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - en mí
  lexicon: HALOT
  rationale: Con «tu mano», el español idiomático expresa bien la dirección hostil con «contra mí», correspondiente al valor punitivo del hebreo.
- source_word: וּבְבֵית אָבִי
  english_pob_choice: and against my father's house
  chosen_spanish: y contra la casa de mi padre
  alternatives_spanish:
  - y contra mi familia
  - y contra la casa paterna
  lexicon: HALOT
  rationale: «Casa de mi padre» preserva la expresión de linaje/hogar familiar del hebreo, como lo hace el audit trail inglés. Se evita reducirla a «familia» para no perder la carga kinship/household.
theological_decisions:
- issue: Imagen del pueblo como ovejas
  english_pob_reading: Retain the metaphor explicitly in the main text
  chosen_spanish_reading: Mantener explícitamente la metáfora de «ovejas» en el texto principal
  alternative_spanish_readings:
  - «estas personas»
  - «este pueblo»
  rationale: La metáfora forma parte de la argumentación de David y subraya la inocencia/vulnerabilidad del pueblo frente al juicio. Traducirla de forma explícita evita aplanar el sentido pastoral del hebreo.
  doctrine_reference: Translation philosophy §1, §6
- issue: ‘Tu mano’ como imagen de juicio divino
  english_pob_reading: Preserve 'your hand' in the main text
  chosen_spanish_reading: Preservar «tu mano» como imagen de acción/jucio divino
  alternative_spanish_readings:
  - «castígame»
  - «hiéreme»
  - «haz caer tu juicio sobre mí»
  rationale: La mano divina es una imagen teológicamente cargada de acción soberana y disciplina. Mantenerla en español respeta la forma del original y la lectura auditada en inglés, sin eliminar la agencia divina.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador en inglés revisó una forma más coloquial de la interjección inicial para acercarse a הִנֵּה y mantener un registro formal. En español se optó por «He aquí» para reflejar ese mismo ajuste de formalidad y proximidad al hebreo. También se mantuvo la metáfora de las ovejas y la imagen de la mano divina, como en el audit trail final.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el Nombre divino, de acuerdo con el estándar del proyecto en español.
  - Se mantiene la metáfora pastoral «ovejas» en paralelo con el inglés auditado.
  - «Casa de mi padre» conserva la expresión de linaje/hogar familiar sin explicitarla en el texto principal.
  - El registro es formal y bíblico, pero con sintaxis española natural.
