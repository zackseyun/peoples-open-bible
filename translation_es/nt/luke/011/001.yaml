translation:
  language: es
  text: 'Y sucedió que, mientras él oraba en cierto lugar, cuando se detuvo, uno de sus discípulos le dijo: «Señor, enséñanos a orar, así como también Juan enseñó a sus discípulos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula narrativa introduce un nuevo episodio. «Y sucedió» conserva el arranque coordinante de καί y la función discursiva de ἐγένετο con un español natural y digno.
- source_word: ἐν τῷ εἶναι αὐτὸν ... προσευχόμενον
  english_pob_choice: while he was praying
  chosen_spanish: mientras él oraba
  alternatives_spanish:
  - cuando él oraba
  - mientras estaba orando
  lexicon: BDAG
  rationale: La construcción articular con infinitivo expresa circunstancia contemporánea. «Mientras él oraba» reproduce bien el aspecto progresivo y suena natural en español. Se mantiene «orar» como equivalente idiomático de προσεύχομαι en este contexto litúrgico.
- source_word: ἐν τόπῳ τινὶ
  english_pob_choice: in a certain place
  chosen_spanish: en un lugar determinado
  alternatives_spanish:
  - en cierto lugar
  - en algún lugar
  lexicon: BDAG
  rationale: El griego subraya indefinición. «Un lugar determinado» conserva esa referencia vaga sin volverla coloquial, y mantiene el matiz narrativo de «a certain place».
- source_word: ὡς ἐπαύσατο
  english_pob_choice: when he stopped
  chosen_spanish: al detenerse
  alternatives_spanish:
  - cuando se detuvo
  - cuando terminó
  lexicon: BDAG
  rationale: ἐπαύσατο indica cese de la acción. «Al detenerse» es conciso y respeta el valor de interrupción; evita interpretar de más con «terminó», aunque el contexto implique que dejó de orar.
- source_word: τις τῶν μαθητῶν αὐτοῦ
  english_pob_choice: one of his disciples
  chosen_spanish: uno de sus discípulos
  alternatives_spanish:
  - uno de sus alumnos
  - un discípulo suyo
  lexicon: BDAG
  rationale: La construcción partitiva se expresa naturalmente como «uno de sus discípulos». «Discípulos» conserva el sentido técnico del seguimiento de Jesús y evita diluir la relación formativa.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: El vocativo κύριε se traduce aquí como «Señor», que en español bíblico y eclesial conserva el valor reverencial y la posible resonancia cristológica sin convertirlo en una mera petición pedagógica.
- source_word: δίδαξον ἡμᾶς προσεύχεσθαι
  english_pob_choice: teach us to pray
  chosen_spanish: enséñanos a orar
  alternatives_spanish:
  - enséñanos a rezar
  - enséñanos cómo orar
  lexicon: BDAG
  rationale: El infinitivo complementario se vierte de forma directa con «enseñarnos a orar». «Orar» es preferible a «rezar» por su amplitud bíblica y por mantener un registro más neutro en el marco lucano.
- source_word: καθὼς καὶ Ἰωάννης ἐδίδαξεν τοὺς μαθητὰς αὐτοῦ
  english_pob_choice: just as John also taught his disciples
  chosen_spanish: así como también Juan enseñó a sus discípulos
  alternatives_spanish:
  - tal como Juan también enseñó a sus discípulos
  - igual que Juan enseñó también a sus discípulos
  lexicon: BDAG
  rationale: καθώς introduce comparación, y καί aquí suma la idea de «también». «Así como también» refleja ambas relaciones sin forzar el énfasis. Se conserva «enseñó a sus discípulos» como expresión transparente del griego.
theological_decisions:
- issue: Traducción del vocativo κύριε aplicado a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Se mantiene el tratamiento reverencial de κύριος con «Señor», coherente con el uso neotestamentario y con el valor de reconocimiento que el contexto atribuye a Jesús. «Maestro» reduciría el alcance del vocativo a un simple rol docente.
  doctrine_reference: 'DOCTRINE.md — Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El texto inglés POB no presenta notas en este versículo y el estado de revisión más reciente indica 'unchanged' con alta concordancia; por ello no se introducen variantes textuales ni notas de aparato, solo decisiones léxicas y sintácticas necesarias para una redacción española publicable.
  spanish_consistency_notes:
  - Se conserva el nombre propio «Juan» sin añadir epítetos.
  - Se usa «orar» en todo el versículo para mantener consistencia verbal.
  - No se introduce «Cristo» ni «Mesías» porque el versículo no contiene Χριστός ni lenguaje mesiánico directo.
  - El vocativo se normaliza como «Señor» en armonía con la pauta del proyecto para κύριος.
