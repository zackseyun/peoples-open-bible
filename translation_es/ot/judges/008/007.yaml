translation:
  language: es
  text: 'Y Gedeón dijo: «Por tanto, cuando Yahvé entregue a Zebá y a Zalmuná en mi mano, yo trillaré vuestra carne con las espinas del desierto y con los abrojos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "zarzas"; el nombre preciso de la planta del término hebreo es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר גִּדְעוֹן
  english_pob_choice: And Gideon said
  chosen_spanish: Y Gedeón dijo
  alternatives_spanish:
  - Entonces Gedeón dijo
  - Y dijo Gedeón
  lexicon: HALOT
  rationale: Conservo la fórmula narrativa simple y natural del hebreo; 'dijo' expresa adecuadamente וַיֹּאמֶר sin añadir matiz no atestiguado. El nombre propio se mantiene como Gedeón en español bíblico estándar.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula introduce una conclusión o consecuencia respecto de la negativa anterior; 'por tanto' preserva bien ese valor inferencial en español sin volverlo demasiado coloquial.
- source_word: בְּתֵת יְהוָה
  english_pob_choice: when Yahweh gives
  chosen_spanish: cuando Yahvé entregue
  alternatives_spanish:
  - cuando Yahvé dé
  - al dar Yahvé
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa temporalidad futura. 'Entregue' comunica mejor la idea de poner algo en manos de otro, que en el contexto es la entrega de los enemigos al poder de Gedeón.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT / project default
  rationale: Sigo el término rector del proyecto para el Tetragrámaton. 'Yahvé' conserva el nombre divino y evita el reemplazo por un título.
- source_word: בְּיָדִי
  english_pob_choice: into my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mi poder
  - en mi dominio
  lexicon: HALOT
  rationale: El hebreo usa una imagen concreta de posesión/poder. 'En mi mano' mantiene la metáfora corporal y la fuerza idiomática, sin explicitarla con demasiada interpretación.
- source_word: וְדַשְׁתִּי
  english_pob_choice: I will thresh
  chosen_spanish: yo trillaré
  alternatives_spanish:
  - yo pisotearé
  - yo desgranaré
  lexicon: HALOT
  rationale: '''Trillar'' es el equivalente español más cercano al verbo agrícola דושׁ y preserva la metáfora violenta del castigo. ''Pisotearé'' suaviza demasiado el campo semántico; ''desgranaré'' se aparta del uso figurado.'
- source_word: בְּשַׂרְכֶם
  english_pob_choice: your flesh
  chosen_spanish: vuestra carne
  alternatives_spanish:
  - vuestro cuerpo
  - vuestra piel
  lexicon: HALOT
  rationale: '''Carne'' corresponde de forma directa a בשר y conserva la crudeza del amenaza. Uso ''vuestra'' por concordar con el plural y mantener un registro bíblico claro en español.'
- source_word: קוֹצֵי הַמִּדְבָּר
  english_pob_choice: the thorns of the wilderness
  chosen_spanish: las espinas del desierto
  alternatives_spanish:
  - los espinos del desierto
  - las zarzas del desierto
  lexicon: HALOT
  rationale: '''Espinas'' reproduce bien el término genérico para vegetación punzante y suena natural en español. ''Desierto'' traduce aquí מִדְבָּר en un registro bíblico comprensible; ''del desierto'' conserva el vínculo locativo.'
- source_word: הַבַּרְקֳנִים
  english_pob_choice: briers
  chosen_spanish: los abrojos
  alternatives_spanish:
  - los briers
  - los zarzales
  lexicon: HALOT
  rationale: El término hebreo es incierto botánicamente y designa vegetación espinosa. 'Abrojos' ofrece un equivalente español tradicional y comprensible para una planta/zarza áspera y punzante, sin cerrar indebidamente la identificación exacta.
theological_decisions:
- issue: Nombre divino יְהוָה en una amenaza narrativa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Mantengo el nombre propio divino tal como exige la política del proyecto. En este verso no hay razón textual para ocultarlo detrás de un título; además, la forma elegida sostiene la continuidad con el original hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del auditor inglés: conserva la fuerza inferencial de לָכֵן, el futuro temporal de בְּתֵת, la imagen concreta de בְּיָדִי, el verbo violento-agrócola דַשְׁתִּי y la incertidumbre botánica de הַבַּרְקֳנִים. No se detectaron revisiones pendientes en el pasaje fuente, así que no se introducen cambios de alcance interpretativo.'
  spanish_consistency_notes:
  - He usado 'Yahvé' de forma consistente para יְהוָה.
  - He mantenido 'carne' para בְּשַׂרְכֶם por fuerza léxica y coherencia con la amenaza.
  - '''Trillaré'' conserva el tenor agrícola y violento del hebreo mejor que una paráfrasis general.'
  - La nota al pie marca la incertidumbre botánica sin anular la traducción principal de 'abrojos'.
