  text: וְ/הָיָ֤ה כָל רֹאַ֨יִ/ךְ֙ יִדּ֣וֹד מִמֵּ֔/ךְ וְ/אָמַר֙ שָׁדְּדָ֣ה נִֽינְוֵ֔ה מִ֖י יָנ֣וּד לָ֑/הּ מֵ/אַ֛יִן אֲבַקֵּ֥שׁ מְנַחֲמִ֖ים לָֽ/ךְ־׃
base_translation:
  language: en
  yaml_path: translation/ot/nahum/003/007.yaml
  text: And it will happen that all who see you will flee from you and say[a], ‘Nineveh is devastated[b]; who will mourn for her? Where can I seek comforters for you?’
  footnotes:
  - marker: a
    text: Or 'will flee from you' for 'will shrink from you.' The Hebrew verb can denote moving away or wandering off; here it likely expresses recoiling in horror at Nineveh's fall.
    reason: lexical_alternative
  - marker: b
    text: Or 'who will bemoan her?' The Hebrew can refer to showing sympathy or lamenting with mourning gestures.
    reason: lexical_alternative
