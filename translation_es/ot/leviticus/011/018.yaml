  - marker: b
    text: El hebreo קָּאָת se suele traducir «pelícano», aunque también se ha propuesto «cormorán» u otra ave del desierto.
    reason: lexical_alternative
  - marker: c
    text: רָחָם probablemente designa un ave carroñera, como un buitre; traducciones inglesas tradicionales suelen poner «gier eagle».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתִּנְשֶׁמֶת
  english_pob_choice: the horned owl
  chosen_spanish: la lechuza
  alternatives_spanish:
  - el búho cornudo
  - el búho
  - la lechuza cornuda
  lexicon: HALOT
  rationale: El hebreo identifica un ave precisa pero de identificación zoológica incierta; el audit trail inglés finalmente especifica 'horned owl', pero el español común y digno no gana claridad con una calca demasiado técnica. 'Lechuza' comunica el género general de ave nocturna impura sin afirmar una especie más allá de la evidencia. Se preserva la alternativa más específica en nota.
- source_word: הַקָּאָת
  english_pob_choice: the pelican
  chosen_spanish: el pelícano
  alternatives_spanish:
  - el cormorán
  - otra ave del desierto
  lexicon: HALOT
  rationale: El término hebreo es incierto, pero 'pelícano' tiene fuerte precedente de traducción y mantiene continuidad con la tradición de traducción auditada en inglés. En español es claro y natural, y no fuerza una identificación más precisa que el texto no garantiza.
- source_word: הָרָחָם
  english_pob_choice: the carrion vulture
  chosen_spanish: el buitre carroñero
  alternatives_spanish:
  - el buitre
  - el águila carroñera
  - el gier-eagle
  lexicon: HALOT
  rationale: '''Buitre carroñero'' expresa mejor en español contemporáneo la función semántica de ave carroñera que el término hebreo probablemente denota. Conserva la idea de impureza por alimentación carroñera y evita el arcaísmo de ''gier-eagle''.'
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: gramática hebrea
  rationale: La partícula hebrea repetida introduce la enumeración; en español se vierte naturalmente con una coordinación simple de la serie. Se mantiene la lista fluida sin repetir innecesariamente la conjunción delante de cada elemento.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de un genérico 'owl' a 'horned owl' para precisar תִּנְשֶׁמֶת. En español se prefirió no sobredeterminar la especie en el texto principal y se preservó la incertidumbre en nota, manteniendo la claridad natural del registro bíblico.
  spanish_consistency_notes:
  - Se usó 'y' ante 'el pelícano' porque la coordinación no exige euphony especial con la vocal siguiente.
  - Se evitó 'SEÑOR' o terminología cultual ajena porque el verso es una lista zoológica sin implicaciones teológicas directas.
  - '''Buitre carroñero'' conserva la fuerza semántica del inglés auditado sin introducir una especie concreta no sustentada por el hebreo.'
