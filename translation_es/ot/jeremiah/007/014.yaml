review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y conserva correctamente la distinción entre «casa» y «lugar», así como «sus padres» y la referencia a Silo. Sin embargo, hay dos desajustes importantes con el sentido fuente y la auditoría inglesa: 1) וְעָשִׂיתִי לַבַּיִת ... כַּאֲשֶׁר עָשִׂיתִי לְשִׁלֹה expresa «haré a la casa... como hice a Silo», donde el objeto del juicio queda ominosamente implícito; en español «haré a la casa» es poco idiomático y suena incompleto, por lo que conviene explicitar mínimamente «haré con la casa». 2) לְשִׁלֹה se compara con un destino sufrido por Silo; en español «hice con Silo» es más fiel que «hice con Silo» ya presente, pero el primer verbo también debe coordinarse con «con» para mantener coherencia. El modismo «que lleva mi nombre» es aceptable, pero «que es llamada por mi nombre» se alinea mejor con el hebreo נִקְרָא שְׁמִי עָלָיו y con la nota auditada.'
  spanish_quality_summary: El español es claro y digno, pero la frase inicial «Entonces haré a la casa» no es natural ni completa en español bíblico actual. También «di a ustedes» funciona, aunque «les di» sería más idiomático; sin embargo, puede mantenerse la preposición explícita si se desea cercanía a la forma fuente. La mejor reparación es ajustar la construcción verbal y afinar el modismo del nombre divino para mayor fidelidad y naturalidad.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé en el cuerpo del versículo; la nota a pie lo usa correctamente. Se preservan «casa», «lugar», «padres» y «Silo» de acuerdo con la racionalidad léxica documentada. La principal mejora es pasar de «lleva mi nombre» a «es llamada por mi nombre» para acercarse más al giro fuente y al audit trail inglés.
  issues:
  - severity: high
    issue: 'Construcción verbal inicial poco natural y semánticamente incompleta: «haré a la casa»'
    rationale: El hebreo permite dejar implícita la acción ominosa con עשה + ל, pero en español «haré a la casa» suena agramatical o truncado. «Haré con la casa» conserva la elipsis del castigo sin perder inteligibilidad.
  - severity: medium
    issue: El modismo «que lleva mi nombre» suaviza innecesariamente el giro hebreo
    rationale: Aunque comunica pertenencia, נִקְרָא שְׁמִי עָלָיו corresponde más de cerca a «que es llamada por mi nombre», y así también se alinea mejor con la auditoría inglesa y con la nota literal.
  - severity: low
    issue: La formulación «que di a ustedes» es menos natural que «que les di»
    rationale: No es un error y preserva la preposición repetida, pero una leve mejora de fluidez puede lograrse con «que les di a ustedes y a sus padres» sin perder la distinción fuente.
  revised_spanish_text: Entonces haré con la casa que es llamada por mi nombre[a], en la que ustedes confían, y con el lugar que les di a ustedes y a sus padres[b], tal como hice con Silo.
  revised_footnotes:
