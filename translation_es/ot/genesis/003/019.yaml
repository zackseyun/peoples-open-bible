translation:
  language: es
  text: Con el sudor de tu rostro[a] comerás pan hasta que vuelvas a la tierra, porque de ella fuiste tomado; pues polvo eres, y al polvo volverás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Con el sudor de tu frente». El hebreo dice «el sudor de tu rostro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּזֵעַת אַפֶּיךָ
  english_pob_choice: By the sweat of your face
  chosen_spanish: Con el sudor de tu rostro
  alternatives_spanish:
  - Con el sudor de tu ceño
  - Con el sudor de tu frente
  lexicon: HALOT
  rationale: La imagen hebrea dice literalmente ‘la cara/rostro’. En español, ‘rostro’ conserva la correspondencia léxica con mayor transparencia que ‘ceño’ o ‘frente’, sin perder naturalidad.
- source_word: תֹּאכַל לֶחֶם
  english_pob_choice: you will eat bread
  chosen_spanish: comerás pan
  alternatives_spanish:
  - comerás alimento
  - comerás comida
  lexicon: HALOT
  rationale: לֶחֶם es ‘pan’ en sentido literal; aunque puede extenderse a comida en general, el término concreto mantiene mejor el paralelismo y la fuerza del hebreo.
- source_word: עַד שׁוּבְךָ אֶל הָאֲדָמָה
  english_pob_choice: until you return to the ground
  chosen_spanish: hasta que vuelvas a la tierra
  alternatives_spanish:
  - hasta que regreses al suelo
  - hasta que vuelvas al terreno
  lexicon: HALOT
  rationale: אֲדָמָה designa la tierra/suelo del que el ser humano fue tomado. ‘Tierra’ es la opción más natural en español y conserva el juego con el origen humano.
- source_word: כִּי מִמֶּנָּה לֻקָּחְתָּ
  english_pob_choice: because from it you were taken
  chosen_spanish: porque de ella fuiste tomado
  alternatives_spanish:
  - porque de ella fuiste sacado
  - porque de ella fuiste tomado
  lexicon: HALOT
  rationale: El pasivo hebreo expresa haber sido ‘tomado’; ‘fuiste tomado’ mantiene esa voz y el vínculo con la tierra personificada por el pronombre femenino.
- source_word: עָפָר
  english_pob_choice: dust
  chosen_spanish: polvo
  alternatives_spanish:
  - polvo de la tierra
  - tierra pulverizada
  lexicon: HALOT
  rationale: En español bíblico, ‘polvo’ comunica con claridad la fragilidad humana y el eco de la fórmula ‘al polvo volverás’. Aunque ‘dust’ puede ser ‘polvo’, aquí la equivalencia es directa y tradicional sin ser arcaizante.
- source_word: תָּשׁוּב
  english_pob_choice: you will return
  chosen_spanish: volverás
  alternatives_spanish:
  - regresarás
  - retornarás
  lexicon: HALOT
  rationale: ‘Volverás’ es la forma más natural y solemne en español moderno, y preserva el anuncio de retorno inevitable al polvo.
theological_decisions:
- issue: Mortalidad humana y retorno material a la tierra
  english_pob_reading: The verse is rendered as a declaration that the man will return physically to the ground/dust from which he was taken.
  chosen_spanish_reading: La versículo se entiende como una declaración de que el hombre volverá materialmente a la tierra y al polvo de donde fue tomado.
  alternative_spanish_readings:
  - Una lectura más metafórica que enfatice humillación más que muerte física
  rationale: El paralelo ‘tierra/polvo’ y el movimiento ‘de ella fuiste tomado... al polvo volverás’ apuntan a mortalidad real. La traducción conserva esa tensión sin añadir explicaciones doctrinales externas.
  doctrine_reference: Primacía del sentido del texto original; preservar la tensión teológica sin resolverla por tradición interpretativa.
translation_notes:
  revision_awareness: Se siguió el texto hebreo (WLC) y el audit trail en inglés POB. No hubo revisiones aplicadas en el pasaje fuente; la versión española mantiene la imagen literal de ‘rostro’ en nota y opta por ‘tierra/polvo’ como equivalentes naturales y fieles.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino en este proyecto; aquí no aparece.
  - Se mantiene ‘polvo’ para עָפָר por coherencia con la fórmula bíblica y la resonancia antropológica.
  - ‘fuiste tomado’ conserva el pasivo y la dependencia del ser humano respecto de la tierra.
  - La nota al pie preserva la alternativa idiomática sin desplazar la lectura principal del texto.
