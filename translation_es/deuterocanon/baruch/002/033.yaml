translation:
  language: es
  text: Y se apartarán de su espalda dura[a] y de sus malas obras, porque recordarán el camino de sus padres, que pecaron delante del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su lomo duro»; más interpretativamente, «de su obstinación». El griego literalmente dice «de su espalda dura», no la imagen más común de la «cerviz dura».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστρέψουσιν
  english_pob_choice: they will turn away
  chosen_spanish: se apartarán
  alternatives_spanish:
  - se volverán
  - se apartarán de
  lexicon: BDAG
  rationale: El futuro expresa un cambio venidero de dirección moral. En español, «se apartarán» comunica bien la idea de apartarse de una conducta previa sin perder naturalidad.
- source_word: ἀπὸ τοῦ νώτου αὐτῶν τοῦ σκληροῦ
  english_pob_choice: from their stiff neck
  chosen_spanish: de su cerviz dura
  alternatives_spanish:
  - de su cuello duro
  - de su cerviz obstinada
  lexicon: LSJ
  rationale: El griego usa literalmente «espalda»/«lomo» con un adjetivo de dureza, pero la revisión inglesa observó que la imagen idiomática más natural en español es «cerviz dura». «Cerviz» preserva el matiz bíblico de obstinación corporal sin reemplazarlo por una abstracción.
- source_word: πονηρῶν πραγμάτων
  english_pob_choice: evil deeds
  chosen_spanish: malas obras
  alternatives_spanish:
  - obras malas
  - acciones perversas
  lexicon: BDAG
  rationale: πράγματα aquí se refiere a prácticas o acciones, no a «cosas». «Malas obras» es claro y mantiene el peso moral del término.
- source_word: μνησθήσονται
  english_pob_choice: they will remember
  chosen_spanish: recordarán
  alternatives_spanish:
  - se acordarán
  - tendrán presente
  lexicon: BDAG
  rationale: El futuro medio de μιμνῄσκομαι significa «recordar». «Recordarán» es directo y natural en español.
- source_word: τῆς ὁδοῦ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la conducta
  lexicon: BDAG
  rationale: «Camino» conserva la metáfora bíblica de modo de vida y funciona bien con el genitivo siguiente.
- source_word: πατέρων αὐτῶν
  english_pob_choice: their fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - de sus antepasados
  - de sus padres y mayores
  lexicon: BDAG
  rationale: El griego es masculino plural y alude a los antepasados varones. En español, «padres» mantiene el paralelismo tradicional y la referencia genealógica sin neutralizar innecesariamente.
- source_word: τῶν ἁμαρτόντων
  english_pob_choice: who sinned
  chosen_spanish: que pecaron
  alternatives_spanish:
  - los que pecaron
  - que habían pecado
  lexicon: BDAG
  rationale: El participio aoristo se expresa de forma natural con una relativa simple. «Pecaron» reproduce con precisión la acción pasada.
- source_word: ἔναντι Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - ante el Señor
  - en presencia del Señor
  lexicon: BDAG
  rationale: «Delante de»/«ante» expresa bien la idea de estar en la presencia o ante la mirada del Señor. Se mantiene «Señor» porque el texto griego usa Κύριος.
theological_decisions:
- issue: Imagen corporal de obstinación en τοῦ νώτου αὐτῶν τοῦ σκληροῦ
  english_pob_reading: Retain the bodily image rather than interpretively replacing it with 'stubbornness.'
  chosen_spanish_reading: 'Conservar una imagen corporal idiomática: «su cerviz dura».'
  alternative_spanish_readings:
  - su obstinación
  - su cuello duro
  - su cerviz obstinada
  rationale: El griego no usa el término más común para «cuello», sino una imagen corporal que apunta a dureza/obstinación. «Cerviz dura» conserva el rasgo metafórico sin borrar la concreción del original.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Referencia a Κυρίου
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: Aquí el texto griego dice Κύριος. En un contexto griego deuterocanónico, «el Señor» es la equivalencia auditada apropiada; no se introduce «Yahvé» porque no hay un nombre hebreo explícito en la línea fuente.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
- issue: Uso de «padres» para πατέρων αὐτῶν
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: La forma griega es masculina plural. «Padres» mantiene la relación genealógica y el paralelismo semítico sin desdibujar el dato del original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que prefirió una imagen corporal más natural para τοῦ νώτου αὐτῶν τοῦ σκληροῦ, pero la expresa en español con «cerviz dura» para mantener tanto la fuerza idiomática como la transparencia al original. También se integró la decisión de conservar «el Señor» para Κύριος y de mantener la referencia masculina plural «padres» para πατέρων αὐτῶν.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro, moderno y digno, sin calcos excesivos.
  - «Señor» se usa de manera consistente para Κύριος en este versículo.
  - La metáfora corporal no se abstrae a un término genérico como «obstinación», salvo en la nota como alternativa.
  - «Camino» y «padres» conservan el tono bíblico y la estructura del original.
