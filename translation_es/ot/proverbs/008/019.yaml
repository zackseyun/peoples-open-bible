translation:
  language: es
  text: Mi fruto es mejor que el oro[a], aun que el oro fino, y mi rendimiento mejor que la plata escogida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y mi producto que el oro puro». «Oro» traduce חָרוּץ como oro en general; luego el hebreo añade פָּז, «oro fino», para intensificar la comparación.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: better than
  chosen_spanish: es mejor que
  alternatives_spanish:
  - es bueno frente a
  - es más valioso que
  lexicon: HALOT
  rationale: En posición comparativa con la idea de superioridad, el hebreo expresa comparación de calidad/valor, no solo cualidad moral. «Es mejor que» transmite con naturalidad esa relación comparativa en español.
- source_word: פִּרְיִי
  english_pob_choice: my fruit
  chosen_spanish: mi fruto
  alternatives_spanish:
  - mi fruto producido
  - mi producto
  lexicon: HALOT
  rationale: El sustantivo פְּרִי puede significar «fruto» o «produce». «Fruto» conserva la imagen agrícola y corresponde bien al paralelo con «mi rendimiento».
- source_word: מֵחָרוּץ
  english_pob_choice: than gold
  chosen_spanish: que el oro
  alternatives_spanish:
  - que el oro puro
  - que el oro refinado
  lexicon: HALOT
  rationale: חרוץ aquí se entiende como oro en general. En español, «el oro» deja espacio para que el segundo miembro añada la cualidad intensiva sin duplicarla.
- source_word: וּמִפָּז
  english_pob_choice: even fine gold
  chosen_spanish: sí, que el oro fino
  alternatives_spanish:
  - y que el oro puro
  - e incluso el oro fino
  lexicon: HALOT
  rationale: פָּז denota oro especialmente fino o puro. «Sí, que el oro fino» reproduce el incremento retórico del hebreo y evita perder la progresión entre los dos términos de metal precioso.
- source_word: וּתְבוּאָתִי
  english_pob_choice: and my yield
  chosen_spanish: y mi rendimiento
  alternatives_spanish:
  - y mi fruto
  - y mi produce
  - y mi cosecha
  lexicon: HALOT
  rationale: תְּבוּאָה puede ser rendimiento, producto o cosecha. «Rendimiento» comunica bien la idea de lo que la sabiduría produce y mantiene el paralelo con «fruto» sin forzar una imagen agrícola demasiado literal.
- source_word: מִכֶּסֶף נִבְחָר
  english_pob_choice: than choice silver
  chosen_spanish: que la plata escogida
  alternatives_spanish:
  - que la plata selecta
  - que la plata más fina
  lexicon: HALOT
  rationale: נִבְחָר significa escogido/seleccionado. «Plata escogida» conserva la cualidad de alta selección sin introducir un grado interpretativo mayor que el del hebreo.
translation_notes:
  revision_awareness: El pasaje mantiene alta concordancia con el texto hebreo y con la línea inglesa auditada. La principal decisión española fue distinguir con naturalidad entre «oro» y «oro fino» para respetar la progresión lexical del hebreo, y elegir «rendimiento» para תְבוּאָה por claridad y paralelismo.
  spanish_consistency_notes:
  - Se conserva el paralelismo poético con dos miembros sobre frutos/rendimiento y dos sobre metales preciosos.
  - «Fruto» y «rendimiento» mantienen un registro comprensible y digno, sin tecnicismos innecesarios.
  - La nota[a] explica la distinción hebrea entre oro general y oro especialmente fino, siguiendo la observación auditada en inglés.
