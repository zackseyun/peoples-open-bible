revisions:
- from: 'Es todo uno[a]; por eso digo[b]: «Él destruye al íntegro y al impío».'
  to: 'Todo es lo mismo[a]; por eso digo: «Él destruye[b] tanto al íntegro como al impío».'
  rationale: Se ajusta el modismo inicial a un español más natural y se restituye la nota clave del expediente inglés sobre la posible lectura impersonal de הוּא מְכַלֶּה. Se mantiene «digo» en el texto principal como buena representación contextual de אָמַרְתִּי, pero no se le asigna la nota [b], ya que en este versículo la alternativa más importante documentada por el POB es la del sujeto del verbo final.
