  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: pregunta retórica de reprensión, movimiento inquieto para cambiar de rumbo, y vergüenza/humillación por depender de Egipto como antes de Asiria. Sin embargo, hay dos desajustes importantes: «te andas tanto» no suena idiomático en español y debilita la imagen de movimiento inquieto; además, el paralelismo de בושׁ con מִן queda mejor si se mantiene «por Egipto ... por Asiria» y una formulación pasiva/resultativa más consistente.'
  spanish_quality_summary: La frase principal necesita pulido para sonar natural y digna en español eclesial general. «¿Por qué te andas tanto?» es poco idiomático; «¿Por qué andas de un lado a otro tanto...?» expresa mejor el hebreo y coincide con la nota alternativa. También conviene uniformar «serás avergonzada ... fuiste avergonzada» para conservar el paralelismo y evitar el cambio innecesario a voz media.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Camino» preserva adecuadamente la amplitud de דרך. No aparecen términos del glosario sensible como Yahvé, Mesías, Espíritu, etc. La decisión sobre בושׁ debe reflejar mejor la humillación resultante y la dependencia frustrada.
  issues:
  - severity: medium
    issue: «te andas tanto» es poco natural en español
    rationale: Aunque intenta reflejar el movimiento del hebreo, en español general suena extraño y poco claro. «Andas de un lado a otro» o «andas tanto de un lado a otro» comunica mejor el matiz de movilidad inquieta.
  - severity: medium
    issue: Inconsistencia en la expresión de בושׁ
    rationale: El inglés auditado escoge «be put to shame / were put to shame». El borrador mezcla «serás avergonzada» con «te avergonzaste», lo que debilita el paralelismo verbal y el matiz resultativo de humillación.
  - severity: low
    issue: Preposición final «de Asiria» rompe el paralelismo con «por Egipto»
    rationale: Dado que el borrador ya eligió «por Egipto» para marcar fuente/ocasión de vergüenza, «por Asiria» mantiene mejor la simetría y la lógica del verso.
