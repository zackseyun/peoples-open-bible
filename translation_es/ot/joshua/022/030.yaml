translation:
  language: es
  text: Cuando Finees el sacerdote, los líderes de la congregación y los jefes de los millares de Israel[a] que estaban con él oyeron las palabras que habían hablado los hijos de Rubén, los hijos de Gad y los hijos de Manasés, les pareció bien[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «los jefes de los millares de Israel»; la expresión puede referirse a dirigentes de subdivisiones tribales o clánicas, no necesariamente a una cantidad numérica estricta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «les agradó» / «les pareció bueno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּינְחָס
  english_pob_choice: Phinehas
  chosen_spanish: Finees
  alternatives_spanish:
  - Finees
  lexicon: uso bíblico tradicional de nombres propios; transliteración al español
  rationale: Para este nombre bíblico, 'Finees' es una forma española estable y transparente. Evita una castellanización artificial y mantiene identificable el nombre propio.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficial
  - el sacerdote de Israel
  lexicon: HALOT / uso bíblico básico
  rationale: '''כֹּהֵן'' aquí designa el cargo sacerdotal de Finees; ''sacerdote'' es la equivalencia natural y fiel en español.'
- source_word: וּנְשִׂיאֵי הָעֵדָה
  english_pob_choice: the leaders of the congregation
  chosen_spanish: los líderes de la congregación
  alternatives_spanish:
  - los jefes de la congregación
  - los príncipes de la asamblea
  lexicon: HALOT
  rationale: '''נְשִׂיאִים'' comunica autoridad/dirigencia; ''líderes'' es claro y no sobreatribula rango. ''Congregación'' conserva el colectivo israelita reunido.'
- source_word: וְרָאשֵׁי אַלְפֵי יִשְׂרָאֵל
  english_pob_choice: the heads of the thousands of Israel
  chosen_spanish: los jefes de los millares de Israel
  alternatives_spanish:
  - los jefes de los miles de Israel
  - los jefes de las subdivisiones de Israel
  lexicon: HALOT
  rationale: Se conserva el valor literal de 'אַלְפֵי' como 'millares', siguiendo la revisión inglesa que prefirió reflejar más de cerca el hebreo. 'Millares' mantiene el registro formal y evita interpretar de más la estructura social.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que estaban con Finees
  - que iban con él
  lexicon: HALOT
  rationale: La cláusula relativa se vierte de manera natural en español y conserva el referente pronominal del hebreo sin añadir información no explícita.
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las cosas
  - los asuntos
  lexicon: HALOT
  rationale: En contexto de discurso, 'דברים' se entiende mejor como 'palabras'. 'Asuntos' sería posible, pero aquí el verso subraya el contenido verbal que fue oído.
- source_word: דִּבְּרוּ
  english_pob_choice: spoke
  chosen_spanish: habían hablado
  alternatives_spanish:
  - dijeron
  - hablaron
  lexicon: HALOT
  rationale: 'En la subordinada relativa, el pluscuamperfecto español da una relación temporal natural: primero hablaron ellos, luego lo oyeron los demás. ''Hablaron'' también sería posible, pero ''habían hablado'' fluye mejor con la secuencia narrativa.'
- source_word: בְּנֵי רְאוּבֵן וּבְנֵי גָד וּבְנֵי מְנַשֶּׁה
  english_pob_choice: the sons of Reuben, the sons of Gad, and the sons of Manasseh
  chosen_spanish: los hijos de Rubén, los hijos de Gad y los hijos de Manasés
  alternatives_spanish:
  - los rubenitas, los gaditas y los manasitas
  - la tribu de Rubén, la tribu de Gad y la tribu de Manasés
  lexicon: HALOT
  rationale: Se conserva la repetición hebrea de 'hijos de' para reflejar el ritmo y la forma del original. Se prefiere 'Manasés' con acento español estándar en el nombre propio.
- source_word: וַיִּיטַב בְּעֵינֵיהֶם
  english_pob_choice: it was good in their eyes
  chosen_spanish: les pareció bien
  alternatives_spanish:
  - fue bueno a sus ojos
  - les agradó
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se traduce con un español natural que conserve la evaluación favorable sin perder el sentido de juicio/aprobación. 'Les pareció bien' mantiene la idea de aceptación.
theological_decisions:
- issue: Tratamiento del nombre divino y de la referencia comunitaria
  english_pob_reading: No aparece el nombre divino; the congregation refers to Israel's gathered covenant community.
  chosen_spanish_reading: No se introduce ningún equivalente divino; 'congregación' se entiende como la comunidad reunida de Israel.
  alternative_spanish_readings:
  - asamblea
  - comunidad
  rationale: El versículo no contiene teónimo ni cita del nombre divino, así que no hay decisión sobre Yahvé. Para הָעֵדָה, 'congregación' es fiel y suficientemente amplio sin cargar una connotación eclesiástica anacrónica.
  doctrine_reference: Ninguna especial; fidelidad al referente histórico-literario del texto.
- issue: Sentido de 'heads of the thousands of Israel'
  english_pob_reading: The English audit trail preserves the literal 'thousands' rather than flattening to clans.
  chosen_spanish_reading: Se conserva 'millares' en vez de reinterpretar como 'clanes'.
  alternative_spanish_readings:
  - jefes de los clanes de Israel
  - jefes de las divisiones de Israel
  rationale: La revisión inglesa decidió acercarse más al hebreo אַלְפֵי. En español, 'millares' conserva esa cercanía y evita cerrar prematuramente la posible ambigüedad administrativa/tribal.
  doctrine_reference: Principio de transparencia textual y respeto por la ambigüedad léxica donde el original la mantiene.
- issue: Evaluación final 'it was good in their eyes'
  english_pob_reading: Or, 'it pleased them' / 'it seemed good to them.'
  chosen_spanish_reading: '''Les pareció bien'' preserva la evaluación favorable y admite la misma ambigüedad entre agrado y juicio favorable.'
  alternative_spanish_readings:
  - les agradó
  - se les hizo bueno
  rationale: La frase española mantiene el valor idiomático y la posibilidad de leerlo como aprobación práctica, sin convertirlo en un mero sentimiento subjetivo.
  doctrine_reference: Ninguna especial; decisión de estilo semántico.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'heads of the clans of Israel' a 'heads of the thousands of Israel' para reflejar más de cerca אַלְפֵי. La versión española sigue esa decisión con 'jefes de los millares de Israel'. También se conserva el sentido idiomático final mediante 'les pareció bien', equivalente al rango de alternativas documentadas en el audit trail.
  spanish_consistency_notes:
  - 'Se mantiene la misma estructura tripartita del sujeto: Finees, los líderes de la congregación y los jefes de los millares de Israel.'
  - '''Hijos de'' se conserva de forma consistente para las tres tribus, en paralelo con la cadencia hebrea.'
  - '''Millares'' evita sustituir el término por ''clanes'', para no borrar la tensión lexical documentada en el original.'
  - La nota sobre Finees[a] usa una transliteración española estable y no una glosa interpretativa en el texto principal.
