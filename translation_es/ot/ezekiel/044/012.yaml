  to: Porque les sirvieron[a] delante de sus ídolos y se convirtieron en un tropiezo de iniquidad para la casa de Israel, por tanto he alzado mi mano contra ellos[b] —declara el Señor Yahvé[c]—, y llevarán su iniquidad.
  rationale: Se corrigen los anclajes de las notas para que coincidan con las palabras explicadas, se añade la nota sobre la ambigüedad de אוֹתָם conservada en el rastro inglés, y se mejora la naturalidad del español con 'les sirvieron' y 'se convirtieron en' sin perder el matiz cultual ni el sentido resultativo del hebreo.
