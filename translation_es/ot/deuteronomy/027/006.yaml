translation:
  language: es
  text: Construirás el altar de Yahvé tu Dios con piedras enteras[a], y ofrecerás sobre él holocaustos a Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘piedras sin labrar’. El hebreo dice literalmente ‘piedras enteras’ o ‘piedras completas’; ‘sin labrar’ refleja la instrucción del contexto cercano (v. 5), donde se prohíbe usar herramientas de hierro sobre ellas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָנִים שְׁלֵמוֹת
  english_pob_choice: whole stones
  chosen_spanish: piedras completas
  alternatives_spanish:
  - piedras enteras
  - piedras sin labrar
  - piedras no talladas
  lexicon: HALOT
  rationale: שְׁלֵמוֹת expresa la cualidad de piedras ‘completas’, ‘íntegras’ o ‘enteras’. En español, ‘piedras completas’ conserva ese valor léxico sin introducir por sí mismo la inferencia contextual de ‘sin labrar’; esa interpretación queda como alternativa, de acuerdo con el audit trail inglés.
- source_word: תִּבְנֶה
  english_pob_choice: you shall build
  chosen_spanish: Construirás
  alternatives_spanish:
  - edificarás
  - deberás construir
  lexicon: HALOT
  rationale: El imperfecto exhortativo/directivo en este contexto legal se vierte naturalmente con futuro de mandato en español. ‘Construirás’ comunica la obligación sin volver la frase rígida.
- source_word: מִזְבַּח
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - ara
  - altar sacrificial
  lexicon: HALOT
  rationale: ‘Altar’ es el equivalente preciso y normal para מִזְבַּח en este contexto sacrificial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme a la pauta del proyecto. ‘Yahvé’ preserva el nombre personal del pacto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios del pacto
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La forma con sufijo de 2ms expresa posesión/covenio de manera directa. ‘Tu Dios’ es la solución más fiel y natural en español.
- source_word: וְהַעֲלִיתָ עָלָיו
  english_pob_choice: and you shall offer on it
  chosen_spanish: y ofrecerás sobre él
  alternatives_spanish:
  - y harás subir sobre él
  - y presentarás sobre él
  lexicon: HALOT
  rationale: El Hifil de עלה con objeto sacrificial se entiende como ‘ofrecer’. En español, ‘ofrecerás sobre él’ comunica el acto sacrificial con fluidez y precisión.
- source_word: עוֹלֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas enteramente quemadas
  lexicon: HALOT
  rationale: ‘Holocaustos’ es el término litúrgico español tradicional para עוֹלֹת, y expresa el ofrecimiento totalmente quemado. Se prefiere aquí por su precisión terminológica y su inteligibilidad en registro bíblico.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahvé tu Dios
  lexicon: HALOT
  rationale: La preposición ל en contexto sacrificial indica dirección/dedicación. ‘A Yahvé’ comunica naturalmente la dedicación del sacrificio; se mantiene la repetición del nombre divino por fidelidad al hebreo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea editorial del proyecto rechaza la sustitución por un título y preserva el nombre del pacto. ‘Yahvé’ es la forma española estable para esa transliteración y conserva el testimonio del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Valor de שְׁלֵמוֹת: literal vs. contextual'
  english_pob_reading: whole stones
  chosen_spanish_reading: piedras completas
  alternative_spanish_readings:
  - piedras sin labrar
  - piedras enteras
  rationale: 'El audit trail inglés preserva el sentido léxico directo (‘whole stones’) y deja ‘unhewn stones’ como alternativa contextual. El español sigue esa misma decisión: se mantiene el valor de ‘completas’ en el texto principal y no se traslada la inferencia contextual al cuerpo del versículo.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pase revisado, que fue marcado como sin cambios necesarios y con alto grado de concordancia entre revisores. Se preservó la decisión principal sobre שְׁלֵמוֹת (‘whole stones’ → ‘piedras completas’) y la transliteración del nombre divino como Yahvé, con la alternativa contextual de ‘sin labrar’ relegada a nota.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y solemne, pero con sintaxis española natural.
  - Se evitó ‘SEÑOR’ para YHWH, conforme a la terminología del proyecto.
  - Se usó ‘holocaustos’ como término sacrificial técnico en español, sin añadir explicación innecesaria en el texto principal.
  - La nota conserva la tensión léxica entre el adjetivo hebreo directo y la inferencia contextual del versículo previo.
