translation:
  language: es
  text: Y madrugaron por la mañana, el día veinticinco del mes noveno, es decir, el mes de Casleu[a], en el año ciento cuarenta y ocho[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «el mes Χασελεὺ»; el nombre del mes judío se conoce comúnmente como Kislev o Quisleu.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice simplemente «en el año ciento cuarenta y ocho»; históricamente se refiere a la era seléucida.
    reason: cultural_note
lexical_decisions:
- source_word: ὤρθρισαν
  english_pob_choice: they rose early
  chosen_spanish: madrugaron
  alternatives_spanish:
  - se levantaron temprano
  - se pusieron en pie de madrugada
  lexicon: LSJ
  rationale: El verbo griego expresa levantarse muy temprano, con matiz de amanecer. «Madrugaron» reproduce bien esa fuerza temporal en español natural y sobrio.
- source_word: τὸ πρωὶ
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - temprano por la mañana
  lexicon: LSJ
  rationale: La expresión refuerza la idea de temprana hora. «Por la mañana» mantiene la redundancia suave del griego sin sonar forzado en español.
- source_word: τῇ πέμπτῃ καὶ εἰκάδι
  english_pob_choice: on the twenty-fifth day
  chosen_spanish: el día veinticinco
  alternatives_spanish:
  - el veinticinco
  - en el día veinticinco
  lexicon: LSJ
  rationale: Es la forma natural de expresar la fecha en español. Como el mes ya se nombra después, «el día veinticinco» conserva el valor dativo temporal.
- source_word: τοῦ μηνὸς τοῦ ἐνάτου
  english_pob_choice: of the ninth month
  chosen_spanish: del mes noveno
  alternatives_spanish:
  - del noveno mes
  - del mes nueve
  lexicon: LSJ
  rationale: «Mes noveno» sigue de cerca la estructura griega y es claro en español. Evita introducir un nombre del mes que el griego todavía no da en la primera mención.
- source_word: Χασελεὺ
  english_pob_choice: Chislev
  chosen_spanish: Casleu
  alternatives_spanish:
  - Chislev
  - Kislev
  lexicon: LSJ
  rationale: El audit trail inglés conserva la forma griega convencional «Chislev» y nota la variante del nombre judío del mes. En español, «Casleu» es una transliteración tradicional y reconocible del mismo término griego, adecuada aquí como nombre del mes.
- source_word: τοῦ ὀγδόου καὶ τεσσερακοστοῦ καὶ ἑκατοστοῦ ἔτους
  english_pob_choice: in the one hundred and forty-eighth year
  chosen_spanish: en el año ciento cuarenta y ocho
  alternatives_spanish:
  - en el año ciento cuarenta y ocho de la era seléucida
  - en el año 148
  lexicon: LSJ
  rationale: La frase griega da simplemente el año 148. «En el año ciento cuarenta y ocho» es fiel y idiomático; la identificación con la era seléucida se deja fuera del texto principal, como en el POB inglés, porque no está explícita en la frase griega.
theological_decisions:
- issue: Referencia de era en la datación
  english_pob_reading: The verse is rendered as a historical date formula without specifying the era in the main text.
  chosen_spanish_reading: La datación se presenta como fórmula histórica sin añadir «era seléucida» en el texto principal.
  alternative_spanish_readings:
  - en el año ciento cuarenta y ocho de la era seléucida
  rationale: El griego solo dice «en el año ciento cuarenta y ocho». Añadir la era en el texto principal sería interpretativo y excedería la forma explícita del versículo. Puede anotarse como trasfondo histórico, pero no insertarse en la traducción.
  doctrine_reference: Primacía del texto original; no incorporar precisiones históricas no expresadas de manera explícita en el versículo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete y el criterio del POB en inglés: conserva la redundancia temporal («madrugaron por la mañana») y evita añadir la era seléucida al cuerpo principal, aunque sí la explica en nota cultural.'
  spanish_consistency_notes:
  - Se usa «mes noveno» en la primera mención y «Casleu» en la nota para respetar el orden y la economía del griego.
  - «Madrugaron» y «por la mañana» juntos preservan la doble señal temporal de ὤρθρισαν τὸ πρωὶ.
  - Se mantiene «año ciento cuarenta y ocho» sin abreviación, por consistencia formal y lectura pública.
