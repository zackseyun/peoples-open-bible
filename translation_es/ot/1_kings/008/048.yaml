review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la mayor parte del hebreo: «vuelvan a ti», «con todo su corazón y con toda su alma», «en la tierra de sus enemigos», «la ciudad que elegiste» y la primera persona en «he edificado» preservan adecuadamente el sentido y la rationale auditada. Sin embargo, hay una desalineación importante en וְהִתְפַּלְלוּ אֵלֶיךָ דֶּרֶךְ אַרְצָם: el texto español dice «y oren hacia su tierra», omitiendo explícitamente «a ti». El hebreo tiene ambos elementos: destinatario de la oración («a ti») y orientación («hacia su tierra»).'
  spanish_quality_summary: 'El español es claro y digno, pero conviene reparar la cláusula de oración para que sea fiel y natural: «y te oren orientados hacia su tierra» o más sencillamente «y te oren hacia su tierra» suena menos natural; la mejor solución es «y te oren vueltos hacia su tierra» o «y oren a ti hacia su tierra». La opción más natural y fiel en español eclesial es «y te oren vueltos hacia su tierra». Además, la nota b actual es defectuosa porque repite la lectura principal («hacia su tierra») en vez de ofrecer una alternativa real como «vueltos hacia su tierra» o «en dirección a su tierra».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. Se preserva «casa» para בַּיִת, en línea con la decisión POB. También se mantiene correctamente «padres» y no «antepasados» en el texto principal.
  issues:
  - severity: high
    issue: Omisión de «a ti» en la cláusula de oración
    rationale: וְהִתְפַּלְלוּ אֵלֶיךָ significa «y oren a ti / te oren». El borrador «y oren hacia su tierra» conserva solo la orientación espacial de דֶּרֶךְ אַרְצָם, pero pierde el destinatario de la oración, alterando el sentido fuente.
  - severity: medium
    issue: Decisión léxica interna inconsistente para וְהִתְפַּלְלוּ אֵלֶיךָ
    rationale: Las decisiones léxicas dicen «y oren hacia ti», pero el texto principal tiene «y oren hacia su tierra». Esto muestra confusión entre el complemento de destinatario («a ti») y el de dirección («hacia su tierra»).
  - severity: low
    issue: Nota b no ofrece una alternativa genuina
    rationale: La nota b dice «O ‘hacia su tierra’», que es esencialmente igual al texto principal y no añade valor. Debe reflejar una alternativa real como «vueltos hacia su tierra» o «en dirección a su tierra», conforme a la rationale inglesa.
  revised_spanish_text: y vuelvan a ti con todo su corazón y con toda su alma, en la tierra de sus enemigos que los hicieron cautivos[a], y te oren[b] vueltos hacia su tierra, que tú diste a sus padres, la ciudad que elegiste, y la casa que he edificado[c] para tu nombre.
  revised_footnotes:
