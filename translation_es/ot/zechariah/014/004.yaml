translation:
  language: es
  text: En aquel día sus pies estarán sobre el Monte de los Olivos[a], que está delante de Jerusalén, al oriente; y el Monte de los Olivos se partirá por la mitad, de oriente a occidente, en un valle muy grande[b], y la mitad del monte se moverá hacia el norte y la otra mitad hacia el sur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que está opuesto a Jerusalén, al oriente».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «será partido» o «será hendido»; el hebreo describe al monte dividiéndose de modo que sus dos mitades se apartan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמְדוּ
  english_pob_choice: will stand
  chosen_spanish: se afirmarán
  alternatives_spanish:
  - estarán de pie
  - se pondrán
  lexicon: HALOT
  rationale: El hebreo usa una acción corporal concreta en contexto profético futuro. En español, «se afirmarán» conserva la idea de estar firmes/puestos sin sonar forzado, y mantiene la imagen de los pies sin suavizarla.
- source_word: רַגְלָיו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus plantas
  - sus piernas
  lexicon: HALOT
  rationale: La referencia literal a los pies es clara en hebreo y debe conservarse para respetar la imagen corporal del texto.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: Es la fórmula profética estándar; «En aquel día» es natural en español bíblico y mantiene el valor escatológico.
- source_word: הַר הַזֵּתִים / הַר הַזֵּיתִים
  english_pob_choice: the Mount of Olives
  chosen_spanish: monte de los Olivos
  alternatives_spanish:
  - monte de las aceitunas
  - Monte de los Olivos
  lexicon: HALOT
  rationale: «monte de los Olivos» es la equivalencia geográfica establecida y fiel al constructo hebreo, con el artículo en genitivo español natural.
- source_word: אֲשֶׁר עַל פְּנֵי יְרוּשָׁלִַם מִקֶּדֶם
  english_pob_choice: which is before Jerusalem on the east
  chosen_spanish: que está delante de Jerusalén, al oriente
  alternatives_spanish:
  - que está frente a Jerusalén, al oriente
  - que queda opuesto a Jerusalén, al oriente
  lexicon: HALOT
  rationale: «delante de» reproduce bien עַל־פְּנֵי sin convertirlo en una simple localización estática; «al oriente» expresa מִקֶּדֶם de forma clara y eclesialmente comprensible.
- source_word: וְנִבְקַע
  english_pob_choice: will be split in two
  chosen_spanish: se partirá por la mitad
  alternatives_spanish:
  - será dividido en dos
  - se henderá
  lexicon: HALOT
  rationale: El nifal de בקע expresa ruptura/separación. «Se partirá por la mitad» comunica el resultado de manera natural en español y conserva la división en dos mitades.
- source_word: מֵחֶצְיוֹ מִזְרָחָה וָיָמָּה
  english_pob_choice: from east to west
  chosen_spanish: de oriente a occidente
  alternatives_spanish:
  - desde el oriente hasta el occidente
  - de este a oeste
  lexicon: HALOT
  rationale: La expresión direccional se traduce con el par tradicional y claro «oriente/occidente», que refleja el eje espacial del hebreo sin perder solemnidad.
- source_word: גֵּיא גְּדוֹלָה מְאֹד
  english_pob_choice: into a very great valley
  chosen_spanish: en un valle muy grande
  alternatives_spanish:
  - en un valle grandísimo
  - en un valle extremadamente grande
  lexicon: HALOT
  rationale: «gֵיא» es valle o quebrada; «valle muy grande» conserva la intensificación de מְאֹד con un español natural. No se añadió más interpretación del espacio.
- source_word: וּמָשׁ
  english_pob_choice: with half of the mountain moving
  chosen_spanish: y la mitad del monte se moverá
  alternatives_spanish:
  - y la mitad del monte se desplazará
  - y la mitad del monte se apartará
  lexicon: HALOT
  rationale: El verbo indica desplazamiento/separación. «Se moverá» mantiene la sencillez del hebreo y el paralelismo con la otra mitad.
- source_word: צָפוֹנָה
  english_pob_choice: northward
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - en dirección norte
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma clara y natural en español.
- source_word: נֶגְבָּה
  english_pob_choice: southward
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - en dirección sur
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma clara y natural en español.
theological_decisions:
- issue: Lenguaje corporal aplicado al personaje divino
  english_pob_reading: Retain the literal wording 'his feet will stand' without softening it.
  chosen_spanish_reading: 'Conservar la imagen concreta: «sus pies se afirmarán».'
  alternative_spanish_readings:
  - su presencia se manifestará
  - él aparecerá en el monte de los Olivos
  rationale: El hebreo usa lenguaje corporal explícito. En español conviene preservarlo para no resolver la tensión teológica del texto ni diluir la imagen antropomórfica.
  doctrine_reference: Preservar la tensión teológica del texto sin suavizarla.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió «is before Jerusalem on the east» por mayor proximidad al hebreo y registro más formal. La versión española conserva esa misma precisión espacial con «está delante de Jerusalén, al oriente» y mantiene el lenguaje corporal y la división del monte sin atenuarlos.
  spanish_consistency_notes:
  - Se usa «monte de los Olivos» como nombre geográfico establecido, coherente con el uso POB en inglés.
  - Se mantiene «oriente/occidente» para el eje direccional, alineado con el valor espacial del hebreo y con un registro bíblico claro.
  - Se conserva la futura profética en español con formas simples y directas, sin convertirla en paráfrasis interpretativa.
  - No se sustituye el lenguaje corporal por formulaciones abstractas; se preserva la tensión teológica documentada en el audit trail inglés.
