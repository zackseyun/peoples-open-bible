- from: Y pondré mi gloria entre las naciones[a], y todas las naciones verán mi juicio que he ejecutado[b], y mi mano que he puesto sobre ellas.
  to: Y pondré mi gloria entre las naciones, y todas las naciones verán mi juicio[a] que he ejecutado, y mi mano[b] que he puesto sobre ellas.
  rationale: Se conserva íntegramente la traducción principal porque es sustancialmente fiel al hebreo y al POB inglés. Solo se corrigen los anclajes de las notas para que la alternativa léxica recaiga sobre «mi juicio» y la nota cultural recaiga sobre «mi mano», en conformidad con la evidencia fuente y la disciplina editorial del proyecto.
