    issue: 'Expresión poco natural: ''su furor, porque es duro'''
    rationale: Aunque 'duro' refleja de cerca la idea léxica de dureza, en español no modifica naturalmente 'furor' en este contexto poético. 'Violento' o 'severo' transmite mejor la fuerza contextual sin apartarse del sentido.
  - severity: low
    issue: Nota al pie no localizada al español
    rationale: La nota reproduce la alternativa inglesa ('Accursed is their anger ...') en vez de ofrecer una formulación española. Esto afecta la calidad editorial y la utilidad para el lector hispanohablante.
  revised_spanish_text: Maldita sea su ira[a], porque es feroz, y su furor, porque es violento. Los dividiré en Jacob y los dispersaré en Israel.
  revised_footnotes:
  - marker: a
    text: 'O: «Maldita es su ira ... y su furor, porque es violento»'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor: se sustituyó ''es duro'' por ''es violento'' para lograr un español más natural y claro en contexto, manteniendo la intensidad condenatoria del hebreo; y se tradujo la nota al pie al español, preservando la alternativa documentada de estructura predicativa (''Maldita es''). No se requieren cambios doctrinales ni estructurales.'
