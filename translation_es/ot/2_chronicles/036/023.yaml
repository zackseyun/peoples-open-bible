translation:
  language: es
  text: '«Así dice Ciro, rey de Persia: Yahvé, el Dios de los cielos, me ha dado todos los reinos de la tierra, y él me ha encargado construirle una casa en Jerusalén, que está en Judá. Quienquiera[a] de entre ustedes, de todo su pueblo, que Yahvé su Dios esté con él[b], y suba[c].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más suavemente: «Quienquiera de entre ustedes pertenezca a alguno de todo su pueblo». La expresión hebrea es condensada y puede representarse en español de más de una manera cercana.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yahvé su Dios está con él». El hebreo puede leerse como una afirmación indicativa, aunque el contexto favorece el sentido de bendición o deseo.'
    reason: alternative_reading
  - marker: c
    text: Es decir, que suba a Jerusalén; «subir» es el modo bíblico convencional de referirse al ascenso a la ciudad santa.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética/proclamatoria en español suena natural como «Así dice», conservando el tono solemne y presente de proclamación del hebreo.
- source_word: כּוֹרֶשׁ מֶלֶךְ פָּרַס
  english_pob_choice: Cyrus king of Persia
  chosen_spanish: Ciro, rey de Persia
  alternatives_spanish:
  - Koresh, rey de Persia
  - Ciro rey de Persia
  lexicon: HALOT
  rationale: Se usa el nombre español tradicional «Ciro», con el título en aposición directa, fiel al hebreo y comprensible en español.
- source_word: כָּל מַמְלְכוֹת הָאָרֶץ
  english_pob_choice: all the kingdoms of the earth
  chosen_spanish: todos los reinos de la tierra
  alternatives_spanish:
  - todos los reinos del mundo
  - todos los reinos de la tierra habitada
  lexicon: HALOT
  rationale: «Tierra» refleja el sentido amplio geopolítico de אֶרֶץ aquí y evita estrecharlo a una mera región local.
- source_word: נָתַן לִי
  english_pob_choice: has given me
  chosen_spanish: me ha dado
  alternatives_spanish:
  - me dio
  - me ha concedido
  lexicon: HALOT
  rationale: El perfecto español expresa bien el resultado presente de la acción divina en el discurso de Ciro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el nombre divino, preservando el Tetragrámaton sin sustituirlo por un título.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios de los cielos
  alternatives_spanish:
  - el Dios del cielo
  - el Dios celestial
  lexicon: HALOT
  rationale: En español bíblico, el plural «los cielos» conserva el giro consagrado del hebreo y suena natural y reverente.
- source_word: וְהוּא פָקַד עָלַי
  english_pob_choice: and he has charged me
  chosen_spanish: y él me ha encargado
  alternatives_spanish:
  - y él me ha mandado
  - y él me ha comisionado
  lexicon: HALOT
  rationale: «Encargado» comunica tanto autoridad como asignación de tarea, sin perder la fuerza de comisión del verbo en este contexto.
- source_word: לִבְנוֹת לוֹ בַיִת
  english_pob_choice: to build for him a house
  chosen_spanish: construirle una casa
  alternatives_spanish:
  - edificarle una casa
  - construir para él un templo
  lexicon: HALOT
  rationale: «Casa» preserva la literalidad del hebreo בַּיִת y su resonancia teológica; «construirle» expresa naturalmente el dativo beneficiario.
- source_word: בִּירוּשָׁלִַם אֲשֶׁר בִּיהוּדָה
  english_pob_choice: in Jerusalem, which is in Judah
  chosen_spanish: en Jerusalén, que está en Judá
  alternatives_spanish:
  - en Jerusalén, la cual está en Judá
  - en Jerusalén, en Judá
  lexicon: HALOT
  rationale: Se mantiene la cláusula relativa explícita del hebreo, sin comprimirla indebidamente.
- source_word: מִי בָכֶם מִכָּל עַמּוֹ
  english_pob_choice: Whoever is among you of all his people
  chosen_spanish: ¿Quién de entre ustedes, de todo su pueblo, está con él?
  alternatives_spanish:
  - ¿Quién de entre ustedes pertenece a todo su pueblo?
  - ¿Quién entre ustedes, de entre todo su pueblo, está con él?
  lexicon: HALOT
  rationale: La sintaxis hebrea es comprimida; en español, la formulación interrogativa mantiene la invitación inclusiva y el sentido partitivo («de entre»), evitando una construcción torpe.
- source_word: יְהוָה אֱלֹהָיו עִמּוֹ
  english_pob_choice: may Yahweh his God be with him
  chosen_spanish: Que Yahvé su Dios esté con él
  alternatives_spanish:
  - Que Yahvé, su Dios, esté con él
  - Yahvé su Dios está con él
  lexicon: HALOT
  rationale: El contexto favorece una bendición/deseo. «Que ... esté» expresa bien el valor jussivo en español, sin forzar una lectura indicativa.
- source_word: וְיָעַל
  english_pob_choice: and let him go up
  chosen_spanish: y suba
  alternatives_spanish:
  - y que suba
  - y ascienda
  lexicon: HALOT
  rationale: «Suba» conserva el idiomatismo bíblico de העלה/עלה para ir a Jerusalén, sin explicitar innecesariamente el destino en el verbo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto según la norma del proyecto, en vez de reemplazarlo por un título devocional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de לִבְנוֹת לוֹ בַיִת
  english_pob_reading: to build for him a house
  chosen_spanish_reading: construirle una casa
  alternative_spanish_readings:
  - construirle un templo
  - edificarle una casa
  rationale: Se mantiene «casa» por fidelidad al hebreo y porque en este contexto refiere naturalmente al templo sin necesidad de reinterpretar el sustantivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Fuerza de יְהוָה אֱלֹהָיו עִמּוֹ
  english_pob_reading: 'benedictory/jussive: ''may Yahweh his God be with him'''
  chosen_spanish_reading: 'bendición/deseo: «Que Yahvé su Dios esté con él»'
  alternative_spanish_readings:
  - 'indicativa: «Yahvé su Dios está con él»'
  rationale: La clausura funciona mejor como fórmula de bendición para quien responda al llamado; el subjuntivo exhortativo español expresa ese matiz con naturalidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Sentido de מִי בָכֶם מִכָּל עַמּוֹ
  english_pob_reading: Whoever is among you of all his people
  chosen_spanish_reading: ¿Quién de entre ustedes, de todo su pueblo, está con él?
  alternative_spanish_readings:
  - ¿Quién de entre ustedes pertenece a todo su pueblo?
  - ¿Quién entre ustedes está de entre todo su pueblo?
  rationale: El hebreo es comprimido y admite un matiz partitivo/inclusivo. La pregunta mantiene la apertura del llamado sin sobrecargar la estructura en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada sobre מִי בָכֶם מִכָּל עַמּוֹ, que en inglés pasó de una solución demasiado torpe a una formulación partitiva más natural. En español se resolvió con «¿Quién de entre ustedes, de todo su pueblo, está con él?», manteniendo el valor inclusivo y la llamada a la respuesta. También se conservó la lectura benedictoria final preferida por el audit trail.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «casa» para בַּיִת y no «templo», para respetar la literalidad documentada.
  - «Suba» conserva el idiomático hebreo de ascender a Jerusalén.
  - Se evitó el calco rígido de la construcción partitiva hebrea, pero sin perder su sentido inclusivo.
  - Se usó puntuación de cita y signos de interrogación propios del español.
  - En el texto principal se ancla la nota a para la lectura alternativa de la cláusula final; las notas b y c amplían el matiz jussivo y cultural.
