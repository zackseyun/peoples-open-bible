  language: en
  yaml_path: translation/ot/ezekiel/007/015.yaml
  text: The sword is outside[a], and pestilence and famine are inside. Whoever is in the field will die by the sword, and whoever is in the city[b], famine and pestilence will consume him.
  footnotes:
