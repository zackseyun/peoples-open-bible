revisions:
- from: No los escuchen[a]. Sirvan al rey de Babilonia y vivan[b]. ¿Por qué esta ciudad habría de convertirse en ruina?
  to: No los escuchen[a]. Sirvan al rey de Babilonia y vivan. ¿Por qué esta ciudad habría de convertirse en una ruina[b]?
  rationale: Se corrigió la nota [b] para que preserve la alternativa léxica documentada para חָרְבָּה en lugar de comentar 'y vivan'. También se mejoró la naturalidad de la frase final con 'una ruina', manteniendo el valor nominal del hebreo.
