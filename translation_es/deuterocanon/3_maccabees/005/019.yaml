translation:
  language: es
  text: Pero cuando el que había informado[a] que durante la noche la orden se había llevado a cabo por completo, y sus amigos habían dado testimonio,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego en Swete es textual y morfológicamente difícil, pero la cláusula en conjunto deja claro que se informó que la acción ordenada había sido completada durante la noche.
    reason: textual_variant
lexical_decisions:
- source_word: ὑποδείξαντος
  english_pob_choice: had reported
  chosen_spanish: había informado
  alternatives_spanish:
  - había señalado
  - había indicado
  - había mostrado
  lexicon: LSJ
  rationale: El participio expresa dar a conocer o indicar algo; en este contexto narrativo, «había informado» comunica bien el acto de comunicar el hecho sin forzar un matiz técnico de proclamación.
- source_word: νυκτός
  english_pob_choice: during the night
  chosen_spanish: durante la noche
  alternatives_spanish:
  - de noche
  - por la noche
  lexicon: LSJ
  rationale: La genitiva temporal se expresa naturalmente en español como «durante la noche», que mantiene el valor temporal de manera clara y digna.
- source_word: τὸ προσταγέν
  english_pob_choice: the order
  chosen_spanish: la orden
  alternatives_spanish:
  - el mandato
  - lo mandado
  lexicon: LSJ
  rationale: El participio articular de προστάσσω se refiere a lo que fue mandado. «La orden» conserva la referencia a una instrucción oficial y es idiomática en español.
- source_word: ἐπὶ τέλος
  english_pob_choice: to completion
  chosen_spanish: hasta su cumplimiento
  alternatives_spanish:
  - completamente
  - hasta el fin
  - a plenitud
  lexicon: LSJ
  rationale: La expresión señala cumplimiento o consumación; «hasta su cumplimiento» mantiene la idea de haber llegado al resultado previsto sin añadir una valoración ajena.
- source_word: ἠγοχέναι
  english_pob_choice: had been carried out to completion
  chosen_spanish: se había llevado a cabo
  alternatives_spanish:
  - se había cumplido
  - se había ejecutado
  - se había realizado
  lexicon: LSJ
  rationale: La forma es difícil en el testimonio de Swete, pero el contexto muestra que la acción ordenada fue ejecutada durante la noche. «Se había llevado a cabo» preserva ese sentido procesual y administrativo.
- source_word: προσμαρτυρησάντων
  english_pob_choice: had borne witness
  chosen_spanish: habían dado testimonio
  alternatives_spanish:
  - habían testificado
  - habían corroborado
  lexicon: LSJ
  rationale: El verbo compuesto implica añadir testimonio o confirmar mediante testigos. «Habían dado testimonio» conserva el matiz testimonial sin volverlo excesivamente técnico.
- source_word: φίλων
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - compañeros
  - aliados
  lexicon: LSJ
  rationale: El sentido ordinario es «amigos», y no hay suficiente indicio aquí para rebajarlo a una relación más débil como «compañeros».
translation_notes:
  revision_awareness: 'Se siguió de cerca el griego de Swete y el cauce de la traducción inglesa auditable, pero se prefirió un español más natural y directo: «había informado» para ὑποδείξαντος y «se había llevado a cabo» para la idea de ejecución/completamiento. Se mantuvo la dificultad textual en nota.'
  spanish_consistency_notes:
  - Se usa «la orden» para τὸ προσταγέν, en coherencia con el valor de mandato oficial del participio articular.
  - Se eligió «durante la noche» para νυκτός por claridad y registro neutral.
  - Se conservó el matiz de testimonio en «habían dado testimonio» para προσμαρτυρησάντων.
  - La nota al pie marca la dificultad textual sin ocultar la incertidumbre del verbo griego.
