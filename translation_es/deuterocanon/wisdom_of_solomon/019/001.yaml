translation:
  language: es
  text: Pero a los impíos[a], una ira implacable[b] les sobrevino hasta el fin mismo; porque él sabía de antemano[c] tanto a ellos como lo que estaba por venir,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los irreverentes' para ἀσεβέσιν.
    reason: lexical_alternative
  - marker: b
    text: O 'sin misericordia' para ἀνελεήμων.
    reason: lexical_alternative
  - marker: c
    text: El sujeto del verbo está implícito en griego; por el contexto, lo más natural es entender a Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσεβέσιν
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreverentes
  - los malvados
  lexicon: BDAG / LSJ
  rationale: ἀσεβής describe a quienes viven sin reverencia hacia Dios. En español, 'impíos' conserva el matiz religioso y moral del término mejor que 'malvados', que suena más general, y encaja con el registro bíblico sin volverse arcaico.
- source_word: ἀνελεήμων
  english_pob_choice: merciless
  chosen_spanish: implacable
  alternatives_spanish:
  - sin misericordia
  - despiadada
  lexicon: LSJ
  rationale: El adjetivo niega la misericordia. 'Implacable' comunica bien la severidad judicial y suena natural en español bíblico moderno; evita una construcción demasiado pesada como 'sin misericordia'.
- source_word: θυμὸς
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - ira juzgadora
  lexicon: BDAG
  rationale: '''Ira'' es el equivalente más directo y comprensible en español. ''Furor'' puede sonar más intensivo de lo que el contexto exige; aquí el matiz judicial queda suficientemente expresado por el conjunto de la cláusula.'
- source_word: ἐπέστη
  english_pob_choice: came upon them
  chosen_spanish: les sobrevino
  alternatives_spanish:
  - vino sobre ellos
  - cayó sobre ellos
  lexicon: LSJ
  rationale: El verbo indica irrupción o llegada sobre alguien. 'Les sobrevino' preserva esa idea de venir encima de ellos de manera efectiva y natural en español.
- source_word: μέχρι τέλους
  english_pob_choice: to the very end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - por completo
  lexicon: LSJ
  rationale: La frase es temporal y enfática. 'Hasta el fin' reproduce el sentido de duración completa y mantiene el tono solemne del texto.
- source_word: προῄδει
  english_pob_choice: knew beforehand
  chosen_spanish: conocía de antemano
  alternatives_spanish:
  - sabía de antemano
  - previó
  lexicon: BDAG
  rationale: El verbo expresa conocimiento previo. 'Conocía de antemano' es claro y no carga el término con matices teológicos adicionales que podría sugerir 'previó' o 'predestinó'.
- source_word: τὰ μέλλοντα
  english_pob_choice: what was to come
  chosen_spanish: lo que había de venir
  alternatives_spanish:
  - lo que iba a suceder
  - los acontecimientos venideros
  lexicon: LSJ
  rationale: La construcción sustantivada apunta a eventos futuros. 'Lo que había de venir' conserva el carácter formal y profético de la expresión griega.
theological_decisions:
- issue: Sujeto implícito de προῄδει
  english_pob_reading: Rendered as 'he knew beforehand,' leaving the antecedent implicit but most naturally referring to God from the surrounding context.
  chosen_spanish_reading: Se dejó el sujeto implícito con 'él conocía de antemano', manteniendo que el referente más natural es Dios por el contexto.
  alternative_spanish_readings:
  - '''Dios conocía de antemano'''
  - '''él, es decir, Dios, conocía de antemano'''
  rationale: El griego no menciona explícitamente el sujeto. En español hace falta un sujeto, pero conviene no introducir 'Dios' si no está expresado en la cláusula. 'Él' conserva la economía del original y deja la identificación al contexto, preservando la tensión textual.
  doctrine_reference: Preservar la ambigüedad contextual sin resolverla más allá del texto.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB al preferir una formulación breve y formal para τὰ μέλλοντα; en español se optó por 'lo que había de venir' para conservar ese registro. También se respetó la decisión auditada de mantener implícito el sujeto de 'knew beforehand', sin resolverlo explícitamente en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo 'impíos' para ἀσεβέσιν, coherente con el valor religioso-moral del término y con el uso POB de 'ungodly'.
  - Se prefirió 'ira' en el texto y se evitó 'furor' para no intensificar indebidamente el juicio.
  - Se usó 'conocía de antemano' en vez de 'previó' para no introducir un matiz especulativo.
  - La puntuación refleja una sola cláusula causal con dos miembros, en línea con la sintaxis griega.
