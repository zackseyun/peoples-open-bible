review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien el sentido básico del hebreo y sigue la decisión principal del POB en חַטַּאת = «pecado», preservando correctamente la alternativa «ofrenda por el pecado». También capta el valor idiomático de יִשְׂאוּ נַפְשׁוֹ como deseo codicioso. Sin embargo, «Comen el pecado» suena menos natural y algo más literal que la opción inglesa «feed on», y la nota b no explica del todo el problema de «he/they ... his soul» con suficiente claridad en español.
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «Comen el pecado» resulta algo áspera en español bíblico contemporáneo. «Se alimentan del pecado» comunica mejor la idea de aprovecharse del pecado sin perder la metáfora de consumo. «Apetecen su iniquidad» es entendible, pero una formulación más explícita como «ponen su apetito en su iniquidad» refleja mejor la decisión idiomática del POB y enlaza con la nota textual.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Iniquidad» y «pecado» están bien elegidos. La gestión de la ambigüedad de חַטַּאת es adecuada. La revisión propuesta mejora la correspondencia con la decisión inglesa sobre el idiomático «set their appetite on».
  issues:
  - severity: medium
    issue: «Comen el pecado» suena poco natural y reduce el matiz de explotación implícito en יֹאכֵלוּ en este contexto.
    rationale: Aunque el hebreo dice literalmente «comen», el POB inglés eligió «feed on» para transmitir mejor la idea figurada de aprovecharse del pecado del pueblo. En español, «se alimentan del pecado» conserva la metáfora y suena más idiomático.
  - severity: medium
    issue: «Apetecen su iniquidad» no refleja tan claramente la construcción idiomática detrás de יִשְׂאוּ נַפְשׁוֹ.
    rationale: La traducción es aceptable, pero el rastro auditado del POB quiso conservar la imagen de orientar el apetito hacia algo. «Ponen su apetito en su iniquidad» comunica mejor ese matiz y hace que la nota literal tenga más anclaje.
  - severity: low
    issue: La nota b podría expresar con más precisión la dificultad gramatical del singular «su alma» en contexto plural.
    rationale: El inglés señala explícitamente la rareza de «he/they lift(s) up his soul». En español conviene conservar esa observación de manera más transparente para el lector.
  revised_spanish_text: Se alimentan del pecado[a] de mi pueblo, y ponen su apetito en su iniquidad[b].
