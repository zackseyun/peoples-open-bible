translation:
  language: es
  text: Los que se santifican y se purifican para entrar en los jardines[a], siguiendo a uno en medio, comiendo carne de cerdo y cosas detestables y ratones, perecerán juntos, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «siguiendo a uno en medio». La expresión es difícil; puede referirse a seguir a un dirigente ritual, a seguir a uno hacia el centro, o a avanzar uno tras otro en un rito cultual.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמִּתְקַדְּשִׁים
  english_pob_choice: those who sanctify themselves
  chosen_spanish: los que se santifican
  alternatives_spanish:
  - los que se consagran
  - los que se hacen santos
  lexicon: HALOT
  rationale: El participio hitpael expresa acción reflexiva; en español, «se santifican» conserva la idea de auto-santificación/auto-consagración y mantiene la ironía del contexto.
- source_word: וְהַמִּטַּהֲרִים
  english_pob_choice: and purify themselves
  chosen_spanish: y se purifican
  alternatives_spanish:
  - y se limpian
  - y se hacen puros
  lexicon: HALOT
  rationale: «Purifican» refleja היטפעל reflexivo de טהר y encaja naturalmente junto a «se santifican» en un marco ritual.
- source_word: אֶל הַגַּנּוֹת
  english_pob_choice: to go into the gardens
  chosen_spanish: para entrar en los jardines
  alternatives_spanish:
  - hacia los jardines
  - a los jardines
  lexicon: HALOT
  rationale: אֶל marca movimiento hacia/entrada; «entrar en los jardines» hace explícito el desplazamiento implícito sin añadir más interpretación de la necesaria. Se usa «jardines» como equivalente español claro de הַגַּנּוֹת.
- source_word: אַחַר אחד בַּתָּוֶךְ
  english_pob_choice: following one in the midst
  chosen_spanish: siguiendo a uno en medio
  alternatives_spanish:
  - siguiendo a uno en el centro
  - tras uno en medio
  - siguiendo a uno, en medio
  lexicon: HALOT
  rationale: La frase es oscura y debe conservarse como tal. «Siguiendo a uno en medio» mantiene la ambigüedad del hebreo sin identificar dogmáticamente al «uno» ni suavizar la dificultad.
- source_word: אֹכְלֵי
  english_pob_choice: eating
  chosen_spanish: comiendo
  alternatives_spanish:
  - que comen
  lexicon: HALOT
  rationale: El participio continúa la cadena descriptiva; «comiendo» fluye en español y conserva la función aspectual de la forma verbal.
- source_word: בְּשַׂר הַחֲזִיר
  english_pob_choice: the flesh of pigs
  chosen_spanish: carne de cerdo
  alternatives_spanish:
  - carne de cerdos
  - carne de puerco
  - carne de los cerdos
  lexicon: HALOT
  rationale: «Cerdo» es el equivalente natural y claro en español para הַחֲזִיר, y «carne» preserva בשר. Se evita un calco innecesariamente duro sin perder el sentido.
- source_word: וְהַשֶּׁקֶץ
  english_pob_choice: detestable things
  chosen_spanish: cosas detestables
  alternatives_spanish:
  - abominaciones
  - cosas abominables
  - cosas impuras
  lexicon: HALOT
  rationale: שׁקץ designa lo abominable/detestable, especialmente en sentido ritual. «Cosas detestables» es comprensible y no amplía indebidamente la categoría.
- source_word: וְהָעַכְבָּר
  english_pob_choice: mice
  chosen_spanish: ratones
  alternatives_spanish:
  - mices
  - ratas
  lexicon: HALOT
  rationale: El término hebreo normalmente apunta a ratón/ratones. «Ratones» es la opción más segura y natural en español.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: todos
  alternatives_spanish:
  - juntos
  - todos juntos
  lexicon: HALOT
  rationale: «Juntos» es el valor adverbial básico; se incorpora junto con «todos» en la frase final para hacer claro el alcance colectivo del juicio. La combinación evita ambigüedad en español.
- source_word: יָסֻפוּ
  english_pob_choice: shall come to an end
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - se acabarán
  - llegarán a su fin
  lexicon: HALOT
  rationale: El verbo indica ser llevados a un fin/destrucción. «Perecerán» comunica bien el juicio final en español bíblico sin exagerar o minimizar el resultado.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la norma del proyecto. «Declara» reproduce con dignidad la fórmula profética נְאֻם.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton; por norma del proyecto, en español se vierte como «Yahvé» para no ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Conservación de la frase oscura אַחַר אחד בַּתָּוֶךְ
  english_pob_reading: following one in the midst
  chosen_spanish_reading: siguiendo a uno en medio
  alternative_spanish_readings:
  - siguiendo a uno en el centro
  - siguiendo a uno tras otro
  - siguiendo a un líder ritual
  rationale: La expresión es genuinamente difícil. La traducción española conserva la oscuridad y evita resolverla de manera especulativa, preservando el margen interpretativo señalado en el audit trail.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Juicio expresado por יָסֻפוּ
  english_pob_reading: shall come to an end
  chosen_spanish_reading: perecerán
  alternative_spanish_readings:
  - llegarán a su fin
  - serán destruidos
  - serán consumidos
  rationale: En este contexto profético, el fin anunciado implica juicio y ruina. «Perecerán» comunica ese peso sin introducir una imagen más específica de la que el hebreo exige.
  doctrine_reference: HALOT / contexto profético de Isaías 66
translation_notes:
  revision_awareness: La versión anterior del registro inglés no recibió cambios en la última revisión; se mantiene el acuerdo alto del cotejo. La presente redacción española sigue ese estado estable y conserva la ambigüedad documentada del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se evitó sustituir la imagen cultual oscura por una explicación interpretativa en el texto principal.
  - «Se santifican / se purifican» conserva la reflexividad del hitpael.
  - «Carne de cerdo» y «cosas detestables» reflejan con claridad el registro ritual del pasaje.
