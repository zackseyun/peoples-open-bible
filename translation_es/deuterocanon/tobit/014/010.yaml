base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/014/010.yaml
  text: And bury me properly[a], and your mother with me, and do not remain any longer in Nineveh. Child, see what Nadab did to Ahikar, who had reared him—how he brought him from the light into the darkness, and what he repaid him. But Ahikar was saved, while that man received the repayment, and he himself went down into the darkness. Manasseh did mercy, and he was saved from the deadly snare that Nadab had set for him[b]; but Nadab fell into the trap and perished.
  footnotes:
  - marker: a
    text: Greek Ἀδὰμ here is the personal name of the treacherous courtier in the Ahikar story, not the first man Adam. The name is rendered 'Nadab' to avoid confusion; 'Adam' is a more literal transliteration of the Greek form.
    reason: alternative_reading
  - marker: b
    text: Or 'almsgiving' for 'acts of mercy'; the Greek term ἐλεημοσύνη often refers specifically to charitable giving in Tobit.
    reason: lexical_alternative
