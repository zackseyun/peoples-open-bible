translation:
  language: es
  text: Desde más allá de los ríos de Cus[a], mis suplicantes[b], la hija de mis dispersos[c], traerán mi ofrenda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cus» designa la antigua región al sur de Egipto, no exactamente la Etiopía moderna.
    reason: cultural_note
  - marker: b
    text: O «mis adoradores». El término hebreo probablemente se refiere a quienes oran o suplican, y por extensión a quienes adoran.
    reason: lexical_alternative
  - marker: c
    text: 'También puede leerse: «la hija de mis esparcidos»; la expresión hebrea es compacta y puede funcionar como un título poético para una comunidad dispersa.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵעֵבֶר
  english_pob_choice: from beyond
  chosen_spanish: desde más allá de
  alternatives_spanish:
  - desde el otro lado de
  - desde la parte de allá de
  lexicon: HALOT
  rationale: La construcción expresa procedencia desde el otro lado de una frontera geográfica. «Desde más allá de» conserva el valor direccional y suena natural en español.
- source_word: לְנַהֲרֵי כוּשׁ
  english_pob_choice: the rivers of Cush
  chosen_spanish: los ríos de Cus
  alternatives_spanish:
  - los ríos de Etiopía
  - las corrientes de Cus
  lexicon: HALOT
  rationale: Se conserva el topónimo histórico «Cus» para mantener el referente antiguo sin sustituirlo por un nombre moderno no equivalente. «Ríos» refleja bien el plural constructo.
- source_word: עֲתָרַי
  english_pob_choice: my suppliants
  chosen_spanish: mis suplicantes
  alternatives_spanish:
  - los que me suplican
  - mis orantes
  lexicon: HALOT
  rationale: El sustantivo deriva del campo de «suplicar/entreat», por lo que «suplicantes» preserva la fuerza léxica mejor que una domesticación a «adoradores».
- source_word: בַּת
  english_pob_choice: the daughter of
  chosen_spanish: la hija de
  alternatives_spanish:
  - hija de
  - la comunidad de
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de filiación colectiva. En español, «la hija de» conserva la metáfora sin convertirla prematuramente en explicación abstracta.
- source_word: פוּצַי
  english_pob_choice: my dispersed ones
  chosen_spanish: mis dispersos
  alternatives_spanish:
  - mis esparcidos
  - los que he dispersado
  lexicon: HALOT
  rationale: La forma participial/adjetival apunta a personas dispersas. «Mis dispersos» es conciso, poético y fiel; evita decidir de más si la dispersión fue por causa divina o meramente descriptiva.
- source_word: יוֹבִלּוּן
  english_pob_choice: will bring
  chosen_spanish: traerán
  alternatives_spanish:
  - presentarán
  - conducirán
  lexicon: HALOT
  rationale: En contexto de ofrenda, el verbo causativo de movimiento se expresa naturalmente con «traerán», que comunica la acción de presentar un tributo/ofrenda.
- source_word: מִנְחָתִי
  english_pob_choice: my offering
  chosen_spanish: mi ofrenda
  alternatives_spanish:
  - mi presente
  - mi tributo
  lexicon: HALOT
  rationale: «Ofrenda» captura el sentido cultual de מִנְחָה en este contexto profético. «Tributo» quedaría demasiado político, y «presente» sería menos preciso.
theological_decisions:
- issue: Lectura compacta de עֲתָרַי בַּת פוּצַי
  english_pob_reading: 'Taken appositionally as a description of the people coming from afar: ''my suppliants, the daughter of my dispersed ones.'''
  chosen_spanish_reading: 'Se mantiene la aposición compacta: «mis suplicantes, la hija de mis dispersos».'
  alternative_spanish_readings:
  - «mis suplicantes ... mis dispersos» como dos grupos separados
  - «la hija de mis dispersos» como título colectivo explicado
  rationale: El hebreo es comprimido y poético. La versión española conserva la tensión entre descripción y título colectivo sin resolverla interpretativamente, siguiendo la cautela del POB en inglés.
  doctrine_reference: Restauración del pueblo disperso y su retorno en adoración/ofrenda a Yahvé.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se prefirió un término equivalente a «suppliants» frente a una traducción más general como «adoradores», y se mantuvo el resto de la línea con máxima cercanía al hebreo y naturalidad en español.'
  spanish_consistency_notes:
  - Se usa «Cus» y no «Etiopía» para respetar el referente histórico del topónimo.
  - Se usa «ofrenda» para מִנְחָה en este contexto cultual, manteniendo el matiz de presentación ritual.
  - Se preserva «mis dispersos» sin explicitar causalidad, porque el hebreo permite esa ambigüedad.
  - La puntuación reproduce la cadencia poética y la aposición del original sin añadir conectores interpretativos.
