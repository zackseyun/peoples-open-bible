translation:
  language: es
  text: En el año diecisiete[a] de Peka, hijo de Remalías, comenzó a reinar Ahaz, hijo de Jotam, rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión hebrea usa una construcción de datación regnal; aquí ''diecisiete'' tiene sentido ordinal: ''en el año diecisiete''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת
  english_pob_choice: In the ... year of
  chosen_spanish: En el año ... de
  alternatives_spanish:
  - Durante el año ... de
  - En el ... año de
  lexicon: HALOT
  rationale: La fórmula cronológica de sincronismo regnal se expresa con naturalidad en español como 'En el año ... de'. Mantiene la relación temporal sin sobrecargar la estructura.
- source_word: שְׁבַע עֶשְׂרֵה שָׁנָה
  english_pob_choice: seventeenth year
  chosen_spanish: diecisiete[a]
  alternatives_spanish:
  - decimoséptimo
  - diecisiete años
  lexicon: HALOT
  rationale: En este tipo de datación, el valor es ordinal, no de duración. Se conserva el número cardinal en español dentro de la fórmula fija, con el marcador para indicar que el sentido es 'el año diecisiete'.
- source_word: לְ/פֶקַח בֶּן רְמַלְיָהוּ
  english_pob_choice: of Pekah son of Remaliah
  chosen_spanish: de Peka, hijo de Remalías
  alternatives_spanish:
  - de Pekah, hijo de Remalías
  - de Peka hijo de Remalías
  lexicon: HALOT
  rationale: Se mantiene el patronímico hebreo de manera transparente. 'Peka' y 'Remalías' reflejan la adaptación habitual de nombres propios al español bíblico, sin añadir títulos ajenos al hebreo.
- source_word: מָלַךְ
  english_pob_choice: began to reign
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - reinó
  - llegó a reinar
  lexicon: HALOT
  rationale: En fórmulas regnales, el verbo indica la entronización o inicio del reinado. 'Comenzó a reinar' preserva esa lectura aspectual de ingreso al trono.
- source_word: אָחָז בֶּן יוֹתָם
  english_pob_choice: Ahaz son of Jotham
  chosen_spanish: Ahaz, hijo de Jotam
  alternatives_spanish:
  - Acaz, hijo de Jotam
  lexicon: HALOT
  rationale: Se conserva 'Ahaz' como forma transliterada usada en el texto POB en inglés y 'Jotam' como adaptación española del nombre, manteniendo la cadena patronímica sin reinterpretación.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: La aposición titulativa se traduce de forma directa y natural. 'Judá' conserva el topónimo histórico sin sustitución por una forma litúrgica.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal y quede anclado al numeral correspondiente.
  spanish_consistency_notes:
  - Se mantiene la fórmula regnal con 'En el año ... de' para conservar el paralelismo histórico.
  - Se preservan los patronímicos como construcciones de parentesco ('hijo de') en lugar de títulos expansivos.
  - No se introduce ninguna nota teológica, porque el versículo es puramente cronológico-histórico.
