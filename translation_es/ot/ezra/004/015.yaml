  text: דִּ֡י יְבַקַּר֩ בִּֽ/סְפַר דָּכְרָ֨נַיָּ֜/א דִּ֣י אֲבָהָתָ֗/ךְ וּ֠/תְהַשְׁכַּח בִּ/סְפַ֣ר דָּכְרָנַיָּ/א֮ וְ/תִנְדַּע֒ דִּי֩ קִרְיְתָ֨/א דָ֜ךְ קִרְיָ֣א מָֽרָדָ֗א וּֽ/מְהַנְזְקַ֤ת מַלְכִין֙ וּ/מְדִנָ֔ן וְ/אֶשְׁתַּדּוּר֙ עָבְדִ֣ין בְּ/גַוַּ֔/הּ מִן יוֹמָ֖ת עָלְמָ֑/א עַ֨ל דְּנָ֔ה קִרְיְתָ֥/א דָ֖ךְ הָֽחָרְבַֽת־־־׃
