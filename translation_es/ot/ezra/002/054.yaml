  spanish_consistency_notes:
  - Se preservó la estructura repetitiva «los hijos de... los hijos de...» como rasgo formal del registro genealógico.
  - Los nombres propios se adaptaron a una ortografía española legible, sin traducirlos ni explicarlos.
  - No se añadieron notas al pie porque no hay variantes textuales, tensiones léxicas ni decisiones teológicas documentadas en el paquete fuente.
