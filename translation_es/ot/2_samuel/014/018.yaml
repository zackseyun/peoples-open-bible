translation:
  language: es
  text: 'Entonces el rey respondió y dijo a la mujer[a]: «Por favor, no me ocultes nada de lo que te pregunto». Y la mujer dijo: «Por favor, hable[b], mi señor el rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no me ocultes cosa alguna de lo que te pregunto».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más formalmente: «Que hable mi señor el rey».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En español, «respondió» mantiene bien el valor narrativo de réplica formal y natural en diálogo. Evita un tono demasiado coloquial y conserva la secuencia verbal del relato.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: «Dijo» es el verbo más transparente para introducir discurso directo en español y refleja adecuadamente el verbo hebreo de habla.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: Traducción directa del sustantivo con artículo; conserva el título real sin añadir matices no presentes en el hebreo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la mujer
  - la esposa
  lexicon: HALOT
  rationale: El contexto identifica a la mujer de Tecoa, no a una esposa. «La mujer» es preciso y neutral en español.
- source_word: אַל נָא
  english_pob_choice: Please do not
  chosen_spanish: Por favor, no
  alternatives_spanish:
  - No, por favor
  - Te ruego que no
  lexicon: HALOT
  rationale: La combinación de prohibición y súplica se expresa de forma natural con «Por favor, no». Mantiene el tono cortés del hebreo sin volverlo artificial.
- source_word: תְכַחֲדִי
  english_pob_choice: hide
  chosen_spanish: me ocultes
  alternatives_spanish:
  - me escondas
  - me disimules
  lexicon: HALOT
  rationale: «Ocultar» reproduce bien la idea de no encubrir o retener información. En español, con objeto personal indirecto («me»), comunica el sentido de no esconder nada al hablante.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: me
  alternatives_spanish:
  - de mí
  lexicon: HALOT
  rationale: En español, la relación de alejamiento o retención se integra naturalmente en el verbo pronominal con dativo «me ocultes», sin perder el sentido de ocultar algo al rey.
- source_word: דָּבָר
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - nada en absoluto
  lexicon: HALOT
  rationale: Después de una prohibición negativa, «nada» expresa con naturalidad el valor indefinido del hebreo y evita un calco poco idiomático.
- source_word: אֲשֶׁר אָנֹכִי שֹׁאֵל אֹתָךְ
  english_pob_choice: that I ask you
  chosen_spanish: de lo que te pregunto
  alternatives_spanish:
  - que te pregunto
  - de aquello que te pregunto
  lexicon: HALOT
  rationale: El participio con valor presente se vierte de manera fluida como «te pregunto». La construcción «de lo que» mantiene la referencia al contenido de la pregunta sin sonar forzada.
- source_word: יְדַבֶּר נָא
  english_pob_choice: Please speak
  chosen_spanish: hable
  alternatives_spanish:
  - hable, por favor
  - diga
  lexicon: HALOT
  rationale: Aunque el hebreo permite una forma deferencial equivalente a «que hable», en español la réplica corta «hable» conserva el jussivo respetuoso y el contexto cortesano. La nota recoge la alternativa más formal.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi soberano el rey
  lexicon: HALOT
  rationale: «Mi señor el rey» mantiene la fórmula de tratamiento cortesano y el paralelismo con el hebreo. Se evita «señor» como simple cortesía moderna y se conserva su valor honorífico.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura auditada del POB en inglés y conserva la tensión léxica entre «ocultar» y la alternativa más literal «no me ocultes una cosa», además de la deferencia del jussivo final, ajustándolos a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantuvo «el rey» para הַמֶּלֶךְ, consistente con el contexto narrativo.
  - Se usó «la mujer» para הָאִשָּׁה, evitando «esposa» por falta de apoyo contextual.
  - Se preservó el matiz cortés de אַל נָא y יְדַבֶּר נָא con fórmulas españolas naturales.
  - La nota a conserva la alternativa léxica del inglés POB para דָּבָר y תְכַחֲדִי.
  - La nota b preserva la alternativa formal reconocida en el audit trail para el cierre deferencial.
