translation:
  language: es
  text: La casa de Israel sabrá que yo soy Yahvé, su Dios, desde aquel día en adelante[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde aquel día y en adelante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: And ... will know
  chosen_spanish: sabrá
  alternatives_spanish:
  - y sabrá
  - conocerá
  - reconocerá
  lexicon: HALOT
  rationale: En español, el futuro simple expresa bien el valor profético-resultativo del verbo. 'Sabrá' conserva el sentido de conocimiento cierto sin añadir explícitamente 'reconocerá', que sería una interpretación más marcada.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - la familia de Israel
  lexicon: HALOT
  rationale: Se conserva el giro hebreo colectivo 'casa de Israel' para mantener el énfasis corporativo del original y la transparencia del texto base.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto para el Tetragrámaton, se usa 'Yahvé' como forma española principal, manteniendo el nombre divino personal en vez de sustituirlo por un título.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ellos
  - Dios de ellos
  lexicon: HALOT
  rationale: El sufijo posesivo plural se vierte de manera natural como 'su Dios' en español. El referente sigue siendo singular en sentido de pacto, aunque la forma hebrea sea plural con sufijo.
- source_word: מִן הַיּוֹם הַהוּא וָהָלְאָה
  english_pob_choice: from that day onward
  chosen_spanish: desde aquel día en adelante
  alternatives_spanish:
  - desde aquel día
  - desde aquel día y más allá
  - desde ese día en adelante
  lexicon: HALOT
  rationale: La combinación española reproduce el punto inicial ('desde aquel día') y la extensión continua ('en adelante') que el inglés POB resumió con 'onward'.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La referencia es al nombre propio de Dios en el texto hebreo; se evita la sustitución por un título y se usa la forma española de uso bíblico 'Yahvé', coherente con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo de WLC y coincide sustancialmente con la auditoría inglesa: cláusula profética de conocimiento, identidad corporativa de Israel, nombre divino explícito y matiz temporal continuo. Se ajustó la forma del nombre divino al estándar español del proyecto (''Yahvé'').'
  spanish_consistency_notes:
  - Se mantiene 'casa de Israel' por transparencia idiomática y continuidad con el hebreo.
  - '''Su Dios'' preserva la relación posesiva del sufijo hebreo sin recargar la frase.'
  - La nota temporal mantiene la alternativa documentada por el POB inglés con una formulación natural en español.
  - No se introduce puntuación teológica adicional ni se atenúa el nombre divino.
