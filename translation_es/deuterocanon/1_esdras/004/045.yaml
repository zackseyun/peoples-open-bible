translation:
  language: es
  text: y tú prometiste reconstruir el templo que los judeanos quemaron, cuando Judea fue asolada por los caldeos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «que los judeanos quemaron». Esta es una lectura difícil y difiere del relato más conocido, en el que el templo es quemado por los caldeos o babilonios.'
    reason: alternative_reading
lexical_decisions:
- source_word: εὔξω
  english_pob_choice: you vowed
  chosen_spanish: juraste
  alternatives_spanish:
  - prometiste
  - hiciste un voto
  - votaste
  lexicon: LSJ
  rationale: En este contexto, εὔχομαι + infinitivo expresa una obligación/compromiso asumido; en español, «juraste» transmite con fuerza un compromiso formal y público sin desplazar el sentido hacia la oración. «Hiciste un voto» sería más explícito, pero menos natural en una línea narrativa.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to rebuild
  chosen_spanish: edificar
  alternatives_spanish:
  - reconstruir
  - construir
  lexicon: LSJ
  rationale: El griego dice literalmente «construir/edificar». Como el objeto es un templo previamente destruido, el inglés opta por «rebuild». En español, «edificar» conserva la idea de levantar una estructura sin imponer por sí mismo el prefijo «re-», que en este verso ya queda sugerido por el contexto histórico.
- source_word: ναός
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: LSJ
  rationale: «Templo» es la equivalencia más clara y natural para el edificio de Jerusalén en este pasaje. «Santuario» es posible, pero menos directo para lectores generales.
- source_word: ἐνεπύρισαν
  english_pob_choice: burned
  chosen_spanish: quemaron
  alternatives_spanish:
  - incendiaron
  - pusieron en fuego
  lexicon: LSJ
  rationale: El verbo indica prender fuego o quemar. «Quemaron» es fiel, simple y idiomático en español; no añade el matiz de destrucción total que el griego por sí solo no exige aquí.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Judeans
  chosen_spanish: los judeanos
  alternatives_spanish:
  - los judíos
  lexicon: LSJ
  rationale: Se mantiene «judeanos» para reflejar el valor histórico-geográfico de Ἰουδαῖοι en este contexto y evitar desplazar el texto hacia una designación más amplia o posterior. Aunque «judíos» es más común, «judeanos» preserva mejor el matiz del original y la decisión del POB inglés.
- source_word: ἐρημώθη
  english_pob_choice: was laid waste
  chosen_spanish: fue asolada
  alternatives_spanish:
  - fue devastada
  - quedó desolada
  lexicon: LSJ
  rationale: El pasivo aoristo expresa ruina, desolación y devastación. «Fue asolada» es una formulación natural y fuerte en español, cercana a «was laid waste».
- source_word: Χαλδαίων
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los chaldeos
  - los babilonios
  lexicon: LSJ
  rationale: Se conserva «caldeos» para seguir con la forma más literal del griego. «Babilonios» explicita el trasfondo histórico, pero borra el término específico usado por el texto.
theological_decisions:
- issue: 'Lectura difícil: el sujeto de «quemaron» son los judeanos, no los caldeos'
  english_pob_reading: Retained the Greek wording 'the Judeans burned' without harmonizing to the more familiar historical tradition that the Babylonians/Chaldeans burned the temple.
  chosen_spanish_reading: Se conserva «los judeanos quemaron» sin armonizarlo con la tradición histórica más conocida.
  alternative_spanish_readings:
  - que fue quemado por los caldeos
  - que los babilonios quemaron
  rationale: El testimonio griego recibido presenta explícitamente a οἱ Ἰουδαῖοι como sujeto de ἐνεπύρισαν. Dado que el criterio es traducir el texto fuente tal como está, se mantiene la lectura difícil y se deja visible la tensión histórica en una nota, en lugar de corregirla por concordancia con paralelos conocidos.
  doctrine_reference: Primacía de la fuente original; honestidad textual ante lecturas difíciles y variantes históricas.
translation_notes:
  revision_awareness: 'La versión inglesa auditada quedó sin cambios en la última revisión (unchanged: true). Se ha mantenido la misma lectura difícil del griego, sin armonización con la tradición histórica más familiar.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto en el proyecto, pero este verso no contiene el nombre divino.
  - Se mantuvo la distinción histórica de «judeanos» frente a «judíos» para reflejar el valor regional del griego Ἰουδαῖοι.
  - «Fue asolada» y «los caldeos» conservan el tono bíblico sin recurrir a eufemismos o a una paráfrasis más libre.
