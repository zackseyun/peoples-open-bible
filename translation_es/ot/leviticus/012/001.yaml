lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El hebreo introduce una fórmula narrativa de habla divina. En español, «habló» conserva mejor la idea de acto de comunicación formal y solemne; «dijo» también sería posible, pero es menos marcado para esta apertura narrativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio divino según el criterio POB: transliterar el Tetragrámaton como «Yahvé» en lugar de ocultarlo con una sustitución titulada. «Jehová» queda como alternativa histórica, pero no preferida en este proyecto.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca destinatario de la palabra divina. En español, «a» es la equivalencia natural y más directa para el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español para מֹשֶׁה.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como fórmula introductoria de discurso directo. «Diciendo» conserva la estructura formal del hebreo y el valor introductorio de la cita.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El verso contiene explícitamente el Tetragrámaton. En la línea del POB en inglés, se preserva el nombre divino como nombre propio, no como título sustitutivo. En español, «Yahvé» es la forma coherente con esa decisión editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: Coincide con el testimonio hebreo base (WLC) y con la decisión del POB en inglés de preservar el nombre divino. No hay variaciones textuales ni revisiones posteriores que alteren el contenido de esta cláusula de introducción.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con sintaxis natural para español moderno.
  - «Yahvé» se usa como nombre propio, sin mayúsculas de sustitución tipo «SEÑOR».
  - La fórmula «habló... diciendo» conserva el tono formal del hebreo sin añadir contenido interpretativo.
