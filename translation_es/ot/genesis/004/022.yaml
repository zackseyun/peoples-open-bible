translation:
  language: es
  text: Zilá también dio a luz a Tubal-caín[a], forjador de toda herramienta cortante de bronce y de hierro[b]. Y la hermana de Tubal-caín fue Naamá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «afilador/martillador de toda herramienta de bronce y de hierro»; el hebreo después de «Tubal-caín» es difícil, y algunos entienden que lo describe como un trabajador del metal más que como el fabricante de herramientas de metal.'
    reason: alternative_reading
  - marker: b
    text: «Bronce» también puede traducirse «cobre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם הִוא
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - igualmente
  - ella también
  lexicon: HALOT
  rationale: La partícula aditiva añade a Zilá al relato genealógico; «también» expresa con naturalidad esa suma en español sin sobrecargar el pronombre.
- source_word: יָלְדָה
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - engendró
  - parió
  lexicon: HALOT
  rationale: En contexto genealógico, «dio a luz» es claro y digno en español moderno; conserva el sentido biológico/narrativo de ילד sin sonar áspero como «parió».
- source_word: תּוּבַל קַיִן
  english_pob_choice: Tubal-cain
  chosen_spanish: Tubal-Caín
  alternatives_spanish:
  - Tubal-cain
  - Tubal Caín
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva el guion para reflejar la forma compuesta tradicional, y se adapta la acentuación gráfica al español en «Caín».
- source_word: לֹטֵשׁ
  english_pob_choice: forger
  chosen_spanish: forjador
  alternatives_spanish:
  - forjador
  - afilador
  - martillador
  lexicon: HALOT
  rationale: El participio puede denotar afilar, martillar o forjar. «Forjador» comunica mejor un oficio metalúrgico en español y encaja con el contexto inmediato de bronce e hierro, sin cerrar del todo la tensión semántica que el hebreo deja abierta.
- source_word: כָּל חֹרֵשׁ
  english_pob_choice: every cutting tool
  chosen_spanish: toda herramienta cortante
  alternatives_spanish:
  - todo instrumento cortante
  - todo útil cortante
  - todo artesano
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que toma la expresión como un objeto fabricado, no como una persona. «Herramienta cortante» preserva la idea de implemento y la función de corte; «toda» refleja bien el alcance distributivo de כָּל.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: «Bronce» es el equivalente natural en español para este metal en listas antiguas; mantengo la alternativa «cobre» como posibilidad léxica reconocida por el hebreo.
- source_word: בַרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - fierro
  lexicon: HALOT
  rationale: Traducción estándar y transparente del metal.
- source_word: אֲחוֹת
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - hermana
  lexicon: HALOT
  rationale: Término de parentesco directo, sin necesidad de ampliación.
- source_word: נַעֲמָה
  english_pob_choice: Naamah
  chosen_spanish: Naamá
  alternatives_spanish:
  - Naamah
  lexicon: HALOT
  rationale: Nombre propio transliterado al español, con acento gráfico para la pronunciación natural.
theological_decisions:
- issue: Cómo expresar la función de לֹטֵשׁ y la frase difícil כָּל חֹרֵשׁ
  english_pob_reading: forger of every cutting tool of bronze and iron, with a note that the Hebrew may instead describe a metalworker or sharpener/hammerer
  chosen_spanish_reading: forjador de toda herramienta cortante de bronce y de hierro, con nota que admite la lectura alternativa de un metalurgista o afilador/martillador
  alternative_spanish_readings:
  - afilador de toda herramienta cortante de bronce y de hierro
  - martillador de toda herramienta cortante de bronce y de hierro
  - forjador de todo artesano del bronce y del hierro
  rationale: El hebreo es difícil y la POB inglesa preserva la tensión interpretativa. La redacción principal favorece la lectura de implementos metalúrgicos; la nota conserva la posibilidad de entender al personaje como trabajador del metal o como afilador/martillador, sin borrar la ambigüedad documental.
  doctrine_reference: No aplica; se trata de decisión léxica/semántica, no doctrinal.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «tool» por «cutting tool» para reflejar mejor la idea del hebreo de un implemento fabricado mediante afilado o martillado. La redacción española sigue esa revisión y conserva la nota de ambigüedad del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino solo cuando aparezca; este versículo no lo contiene.
  - Se usa transliteración consistente para nombres propios compuestos con guion cuando el original inglés lo hace y el español lo admite.
  - Se preserva la tensión semántica de לֹטֵשׁ sin convertirla en una traducción demasiado cerrada.
  - «Bronce» se usa como término principal con la alternativa «cobre» en nota, conforme al auditor inglés.
