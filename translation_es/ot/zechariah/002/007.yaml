translation:
  language: es
  text: Y he aquí[a] el ángel que hablaba conmigo salió, y otro ángel salió a su encuentro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el ángel que hablaba conmigo».'
    reason: lexical_alternative_for_discourse_marker
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí
  lexicon: HALOT
  rationale: He aquí conserva la función discursiva de atención y el tono vívido del hebreo. Se añade ‘Y’ para reflejar la continuidad narrativa del וְ inicial.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En este contexto visionario de seres celestiales, ‘ángel’ comunica mejor el referente que ‘mensajero’, aunque el hebreo permita ambos sentidos.
- source_word: הַדֹּבֵר בִּי
  english_pob_choice: who was speaking with me
  chosen_spanish: que hablaba conmigo
  alternatives_spanish:
  - que estaba hablando conmigo
  - que hablaba con/para mí
  lexicon: HALOT
  rationale: El participio hebreo marca acción en curso, por eso ‘hablaba’. ‘Conmigo’ reproduce de forma natural la relación expresada por בִּי en esta fórmula recurrente de Zacarías.
- source_word: יֹצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - estaba saliendo
  - iba saliendo
  lexicon: HALOT
  rationale: En narrativa española, el perfecto simple expresa bien el movimiento puntual de salida. Aunque el hebreo es participial, el contexto lo verbaliza como evento sucesivo.
- source_word: וּמַלְאָךְ אַחֵר
  english_pob_choice: and another angel
  chosen_spanish: y otro ángel
  alternatives_spanish:
  - y un ángel distinto
  lexicon: HALOT
  rationale: ‘Otro ángel’ es la equivalencia idiomática más natural y mantiene la distinción entre dos figuras sin añadir identificación interpretativa.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: a recibirlo
  alternatives_spanish:
  - a encontrarlo
  - para encontrarse con él
  lexicon: HALOT
  rationale: ‘A recibirlo’ expresa con naturalidad la finalidad de ir al encuentro de alguien. Se evita sobrecargar la frase con una fórmula más literal que suena menos idiomática en español.
theological_decisions:
- issue: Identidad y función de los dos ángeles
  english_pob_reading: Both instances of מַלְאָךְ are rendered generically as 'angel' without identifying either figure beyond the text.
  chosen_spanish_reading: Ambas apariciones de מַלְאָךְ se traducen simplemente como ‘ángel’, sin identificar a ninguna de las figuras más allá del texto.
  alternative_spanish_readings:
  - el primer ángel como intérprete y el segundo como mensajero específico
  - ángel mensajero / ángel interpretador
  rationale: El versículo solo distingue a los personajes por su papel y movimiento. La traducción conserva esa tensión narrativa sin introducir una identificación que el hebreo no explicita.
  doctrine_reference: Preservar la tensión teológica/narrativa en lugar de resolverla.
translation_notes:
  revision_awareness: El texto inglés revisado no muestra cambios respecto del pasaje base; se sigue la lectura estable con alta concordancia del auditor, manteniendo la alternativa léxica documentada para הַדֹּבֵר בִּי.
  spanish_consistency_notes:
  - Se mantiene ‘ángel’ para מַלְאָךְ en coherencia con la decisión POB en un contexto visionario celestial.
  - Se usa ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - ‘Conmigo’ refleja la fórmula relacional de Zacarías sin introducir un matiz doctrinal no presente en el hebreo.
  - ‘A recibirlo’ conserva el movimiento intencional de לִקְרָאתוֹ sin forzar una literalidad poco natural en español.
