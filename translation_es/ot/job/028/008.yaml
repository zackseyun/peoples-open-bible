revisions:
- from: Los animales orgullosos no han hollado[a] en ella; el león no ha pasado sobre ella.
  to: Las fieras orgullosas[a] no la han hollado; el león no ha pasado sobre ella.
  rationale: Se corrige la sintaxis española de «hollar» usando objeto directo («no la han hollado») y se fortalece בְנֵי שָׁחַץ con «las fieras orgullosas», que refleja mejor el contexto poético y el paralelismo con «el león», manteniendo la nota literal documentada.
