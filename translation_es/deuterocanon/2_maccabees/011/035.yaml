translation:
  language: es
  text: En cuanto a las cosas que Lisias, el pariente del rey, les concedió, nosotros también aprobamos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπὲρ ὧν
  english_pob_choice: Concerning the things that
  chosen_spanish: En cuanto a las cosas que
  alternatives_spanish:
  - Con respecto a lo que
  - Sobre lo que
  lexicon: LSJ
  rationale: La frase introduce el asunto del que se habla, no una idea de sustitución. «En cuanto a» mantiene el enlace formal del griego y suena natural en español jurídico-diplomático.
- source_word: Λυσίας
  english_pob_choice: Lysias
  chosen_spanish: Lisias
  alternatives_spanish:
  - Lysias
  lexicon: Convención onomástica
  rationale: 'Se adapta el nombre propio a la forma usual en español bíblico: Lisias.'
- source_word: ὁ συγγενὴς τοῦ βασιλέως
  english_pob_choice: the king’s kinsman
  chosen_spanish: el pariente del rey
  alternatives_spanish:
  - el familiar del rey
  - el pariente cercano del rey
  lexicon: LSJ
  rationale: συγγενής significa pariente o familiar. «Pariente» es claro y fiel; «del rey» conserva la relación cortesana sin añadir un rango no explicitado.
- source_word: συνεχώρησεν
  english_pob_choice: granted
  chosen_spanish: concedió
  alternatives_spanish:
  - permitió
  - otorgó
  lexicon: LSJ
  rationale: En un contexto diplomático, el verbo expresa una concesión oficial o una autorización. «Concedió» preserva ese matiz sin sonar demasiado técnico.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  lexicon: Gramática del español
  rationale: El dativo indirecto se naturaliza con «les» porque el destinatario ya está explícito en el contexto. Es una solución idiomática en español formal.
- source_word: συνευδοκοῦμεν
  english_pob_choice: we also approve
  chosen_spanish: nosotros también aprobamos
  alternatives_spanish:
  - también consentimos
  - también estamos de acuerdo
  lexicon: LSJ
  rationale: συνευδοκέω expresa sumarse a una aprobación o consentimiento. «Aprobamos» refleja una adhesión positiva a lo concedido por Lisias, no solo acuerdo abstracto.
translation_notes:
  revision_awareness: El griego y la auditoría inglesa concuerdan de forma alta; no hay variantes textuales ni tensiones teológicas relevantes en este versículo, por lo que la revisión se limita a ajustes de idiomaticidad española y precisión léxica.
  spanish_consistency_notes:
  - Se mantiene un tono diplomático y sobrio acorde con una carta oficial.
  - No se introducen términos eclesiásticos posteriores ni equivalentes interpretativos no respaldados por el griego.
  - Se conserva la relación entre la concesión de Lisias y la aprobación de los hablantes en una sola cláusula fluida.
