translation:
  language: es
  text: 'Entonces le dijo a Abram: «Sabe con certeza que tu descendencia será forastera[a] en una tierra que no es la suya, y la esclavizarán[b] y la afligirán durante cuatrocientos años».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extranjera» o «residente forastera». El hebreo גֵר se refiere a quien vive en una tierra que no es la suya.
    reason: lexical_alternative
  - marker: b
    text: O «la harán servir». El verbo hebreo puede denotar servicio forzado; aquí el contexto apoya «la esclavizarán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לְאַבְרָם
  english_pob_choice: Then he said to Abram
  chosen_spanish: Entonces le dijo a Abram
  alternatives_spanish:
  - Y le dijo a Abram
  - Luego le dijo a Abram
  lexicon: HALOT
  rationale: La secuencia narrativa del waw-consecutivo se expresa de forma natural con «Entonces». Se conserva el destinatario «Abram» por fidelidad al texto fuente y al audit trail en inglés.
- source_word: יָדֹעַ תֵּדַע
  english_pob_choice: Know for certain
  chosen_spanish: Sabe con certeza
  alternatives_spanish:
  - Sabrás con certeza
  - Ciertamente sabrás
  lexicon: HALOT
  rationale: El infinitivo absoluto con imperfecto intensifica la certeza. «Sabe con certeza» mantiene la fuerza enfática en español moderno sin volverlo arcaico.
- source_word: גֵר
  english_pob_choice: sojourners
  chosen_spanish: extranjera
  alternatives_spanish:
  - forastera
  - residente foránea
  - peregrina
  lexicon: HALOT
  rationale: En español, «extranjera» comunica bien la idea de no pertenecer al lugar, pero el matiz de residencia temporal y ajena queda parcialmente abierto. Se evita «peregrinos» por su posible carga religiosa posterior. El contexto de una tierra que no les pertenece sostiene esta opción, y la nota preserva la alternativa conceptual de «forasteros»/«residentes foráneos».
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu linaje
  - tu simiente
  - tus descendientes
  lexicon: HALOT
  rationale: «Descendencia» mantiene el valor colectivo singular de זֶרַע sin la literalidad menos natural de «simiente». Es una forma bíblica y comprensible en español.
- source_word: בְּאֶרֶץ לֹא לָהֶם
  english_pob_choice: in a land not theirs
  chosen_spanish: en una tierra que no es la suya
  alternatives_spanish:
  - en una tierra que no les pertenece
  - en una tierra ajena
  lexicon: HALOT
  rationale: La frase expresa falta de posesión y pertenencia. «Que no es la suya» es cercano al hebreo y idiomático en español.
- source_word: וַעֲבָדוּם
  english_pob_choice: they will enslave them
  chosen_spanish: la esclavizarán
  alternatives_spanish:
  - los harán servir
  - los someterán a servidumbre
  - los esclavizarán
  lexicon: HALOT
  rationale: El verbo puede abarcar servicio forzado, pero el contexto de opresión y el audit trail inglés favorecen explicitar la coerción con «esclavizarán». El objeto directo se ajusta al antecedente colectivo «tu descendencia»; se usa «la» por concordancia con el sustantivo colectivo singular «descendencia».
- source_word: וְעִנּוּ אֹתָם
  english_pob_choice: and afflict them
  chosen_spanish: y la afligirán
  alternatives_spanish:
  - y la oprimirán
  - y la humillarán
  - y la maltratarán
  lexicon: HALOT
  rationale: עִנּוּ expresa aflicción/opresión. «Afligirán» preserva la amplitud semántica sin cerrar el sentido a una sola forma de maltrato. Se mantiene la referencia pronominal unitaria por el antecedente colectivo.
- source_word: אַרְבַּע מֵאוֹת שָׁנָה
  english_pob_choice: four hundred years
  chosen_spanish: durante cuatrocientos años
  alternatives_spanish:
  - por cuatrocientos años
  - cuatrocientos años
  lexicon: HALOT
  rationale: El hebreo presenta la duración al final; en español conviene expresar explícitamente la duración temporal con «durante» para una lectura natural y precisa.
theological_decisions:
- issue: Forma del sujeto y del objeto en los verbos de esclavizar y afligir
  english_pob_reading: The inhabitants of the foreign land will enslave and afflict Abram's offspring.
  chosen_spanish_reading: «La» remite a la descendencia colectiva de Abram, y el sujeto implícito son los habitantes de la tierra extranjera.
  alternative_spanish_readings:
  - «Los» esclavizarán y afligirán, con referencia plural explícita
  - Se esclavizarán y afligirán (pasivo)
  rationale: 'El hebreo tiene verbos plurales con objeto sufijado: el agente es plural y el objeto es la descendencia de Abram. En español, el singular colectivo «descendencia» permite una referencia pronominal singular («la»), pero se conserva la idea de acción ejercida por los habitantes de la tierra. Se evita el pasivo porque no refleja con precisión la forma verbal hebrea.'
  doctrine_reference: Gn 15:13; comparación interna con Gn 15:14
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del audit trail inglés al mantener una formulación activa para los verbos de esclavizar y afligir, evitando la pasiva que había aparecido en un paso anterior. También se preservó la secuencia narrativa y la duración explícita de cuatrocientos años sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el Tetragrámaton.
  - «Descendencia» se mantiene como singular colectivo para conservar la concordancia natural con el hebreo.
  - Se evita «Mesías/Cristo» porque no corresponde a este versículo.
  - Se conserva un registro bíblico moderno y comprensible, sin calco rígido.
