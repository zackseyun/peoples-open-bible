translation:
  language: es
  text: 'Ellos le dijeron: «No, sino que ciertamente te ataremos y te entregaremos en sus manos[a]; pero de ningún modo te mataremos». Entonces lo ataron con dos cuerdas nuevas y lo subieron desde la peña[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te entregaremos en su poder». El hebreo dice literalmente «te entregaremos en su mano».
    reason: lexical_alternative
  - marker: b
    text: O «desde el peñasco» o «desde la roca». El hebreo סלע puede referirse a una elevación rocosa, no solo a una roca individual.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כִּי
  english_pob_choice: No, but
  chosen_spanish: No, sino que
  alternatives_spanish:
  - No, pero
  - No, más bien
  lexicon: HALOT
  rationale: La secuencia hebrea niega la propuesta previa y la corrige o matiza. En español, «No, sino que» conserva mejor esa oposición que un simple «pero» y suena natural en el registro bíblico contemporáneo.
- source_word: אָסֹר נֶאֱסָרְךָ
  english_pob_choice: we will surely bind you
  chosen_spanish: de cierto te ataremos
  alternatives_spanish:
  - ciertamente te ataremos
  - te ataremos sin falta
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. «De cierto» comunica bien la seguridad/enfasis sin sonar tan rígido como una repetición literal de «seguramente».
- source_word: וּנְתַנּוּךָ בְיָדָם
  english_pob_choice: hand you over into their hand
  chosen_spanish: te entregaremos en su mano
  alternatives_spanish:
  - te entregaremos en su poder
  - te pondremos en sus manos
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de «mano» porque el POB inglés la preserva por valor idiomático y porque en español «en su mano» es entendible aunque menos usual. «Entregaremos» expresa el acto de poner a alguien bajo dominio de otro.
- source_word: וְהָמֵת לֹא נְמִיתֶךָ
  english_pob_choice: yet we will certainly not put you to death
  chosen_spanish: pero de ningún modo te mataremos
  alternatives_spanish:
  - pero ciertamente no te mataremos
  - pero no te daremos muerte
  lexicon: HALOT
  rationale: La negación enfática se conserva con «de ningún modo». «Mataremos» es más directo en español actual; «poner a muerte» o «dar muerte» serían más literales, pero menos naturales aquí.
- source_word: וַיַּאַסְרֻהוּ
  english_pob_choice: they bound him
  chosen_spanish: lo ataron
  alternatives_spanish:
  - lo sujetaron
  - lo amarraron
  lexicon: HALOT
  rationale: Mantengo el mismo campo léxico de אסר con «atar»/«atado», que es claro y sobrio en español.
- source_word: בִּשְׁנַיִם עֲבֹתִים חֲדָשִׁים
  english_pob_choice: with two new ropes
  chosen_spanish: con dos cuerdas nuevas
  alternatives_spanish:
  - con dos sogas nuevas
  - con dos cordeles nuevos
  lexicon: HALOT
  rationale: עֲבֹתִים son cuerdas gruesas; «cuerdas» comunica bien el referente en español moderno sin exagerar con «sogas». «Nuevas» conserva el detalle narrativamente significativo.
- source_word: וַיַּעֲלֻהוּ מִן הַסָּלַע
  english_pob_choice: brought him up from the rock
  chosen_spanish: lo hicieron subir desde la peña
  alternatives_spanish:
  - lo subieron desde la roca
  - lo hicieron subir desde el peñasco
  lexicon: HALOT
  rationale: סֶלַע puede ser «roca», «peña» o «peñasco». «Peña» suena natural en español bíblico y conserva la idea de un lugar rocoso elevado, en línea con la nota inglesa sobre un posible crag/cliff.
translation_notes:
  revision_awareness: El texto inglés POB y el control de revisión indican alta concordancia y sin cambios sustantivos. La versión española sigue esa lectura estable, conservando la doble intensificación del juramento negativo, la idiomática «en su mano» y la ambigüedad de סלע con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene la correspondencia de aṣar/אסר con «atar»/«cuerdas» para coherencia léxica.
  - Se conserva la imagen de «mano» en la entrega, pero con nota alternativa para lectores que prefieran el sentido idiomático de dominio.
  - «Peña» se usa como equivalente estilístico de סלע, sin cerrar la posibilidad de «roca/peñasco» indicada por la nota.
