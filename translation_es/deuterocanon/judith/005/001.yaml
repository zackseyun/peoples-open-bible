base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/005/001.yaml
  text: And it was reported to Holofernes[a], the commander-in-chief of the forces of Assyria, that the sons of Israel had prepared for war, and had blocked the roads of the hill country and fortified every summit of every high mountain[b], and had set up obstacles in the plains.
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the children of Israel.' The Greek reads literally 'the sons of Israel,' a standard ethnic designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'traps' or 'barricades' for 'obstacles'; the Greek term can denote something that causes stumbling, but here it refers to physical impediments in a military setting.
    reason: lexical_alternative
