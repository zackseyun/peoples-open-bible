id: GEN.33.14
reference: Genesis 33:14
source:
  edition: WLC
  text: יַעֲבָר נָ֥א אֲדֹנִ֖/י לִ/פְנֵ֣י עַבְדּ֑/וֹ וַ/אֲנִ֞י אֶֽתְנָהֲלָ֣ה לְ/אִטִּ֗/י לְ/רֶ֨גֶל הַ/מְּלָאכָ֤ה אֲשֶׁר לְ/פָנַ/י֙ וּ/לְ/רֶ֣גֶל הַ/יְלָדִ֔ים עַ֛ד אֲשֶׁר אָבֹ֥א אֶל אֲדֹנִ֖/י שֵׂעִֽירָ/ה־־־־׃
translation:
  text: Please let my lord pass on ahead of his servant[a], and I will proceed slowly, at the pace of the livestock that is before me and at the pace of the children[c][b], until I come to my lord at Seir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will proceed gently' for 'I will lead on slowly'; the Hebrew verb can describe moving along carefully rather than explicitly leading others.
    reason: lexical_alternative
  - marker: b
    text: '''The livestock'' translates a Hebrew term that often means ''work,'' ''property,'' or ''possessions,'' but here likely refers specifically to the animals being driven along.'
    reason: lexical_alternative
  - marker: c
    text: Or 'until I come to my lord, to Seir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲבָר נָא
  chosen: Please let ... pass on ahead
  alternatives:
  - please pass on
  - let ... go ahead
  lexicon: HALOT
  rationale: Qal jussive of עבר with particle נָא expresses a polite request rather than a simple future. 'Please let ... pass on ahead' captures both the deference and the directional sense.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: Here Jacob addresses Esau deferentially. 'My lord' preserves the social posture and repeated address without importing divine overtones.
- source_word: לִפְנֵי עַבְדּוֹ
  chosen: ahead of his servant
  alternatives:
  - before his servant
  lexicon: HALOT
  rationale: The idiom literally means 'before his servant,' but in context it indicates going in front. 'Ahead of his servant' is natural English while preserving the servant-language.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - your servant
  lexicon: HALOT
  rationale: The Hebrew form is third person singular with suffix, matching Jacob's self-reference in deferential speech. English can preserve this formal self-reference as 'his servant' rather than smoothing to 'your servant.'
- source_word: אֶתְנָהֲלָה
  chosen: I will lead on
  alternatives:
  - I will proceed
  - I will move along gently
  lexicon: HALOT
  rationale: The hitpael of נהל conveys conducting oneself or moving along in a guided, careful way. 'Lead on' fits Jacob's role over people and animals better than a merely intransitive 'go on.'
- source_word: לְאִטִּי
  chosen: slowly
  alternatives:
  - gently
  - at my leisure
  lexicon: HALOT
  rationale: The phrase indicates gradual, unhurried movement. 'Slowly' is the clearest modern rendering; the nuance of gentleness is then reinforced by the following pace expressions.
- source_word: לְרֶגֶל
  chosen: at the pace of
  alternatives:
  - according to the pace of
  - in step with
  lexicon: HALOT
  rationale: Literally 'according to the foot of,' an idiom for movement regulated by the pace of others. 'At the pace of' is idiomatic and precise.
- source_word: הַמְּלָאכָה
  chosen: the livestock
  alternatives:
  - the possessions
  - the work animals
  - the drove
  lexicon: HALOT
  rationale: Although מְלָאכָה often means 'work' or 'property,' in this pastoral context it refers concretely to the animals under Jacob's care. 'Livestock' communicates the referent clearly in modern English.
- source_word: אֲשֶׁר לְפָנַי
  chosen: that is before me
  alternatives:
  - that is ahead of me
  - under my care before me
  lexicon: HALOT
  rationale: A straightforward relative clause describing the livestock in front of Jacob. 'That is before me' preserves the spatial wording without overinterpreting.
- source_word: הַיְלָדִים
  chosen: the children
  alternatives:
  - the little ones
  lexicon: HALOT
  rationale: The term refers to Jacob's children traveling with the group. 'The children' is accurate and natural; 'little ones' is possible but slightly more interpretive.
- source_word: עַד אֲשֶׁר אָבֹא
  chosen: until I come
  alternatives:
  - until I arrive
  lexicon: HALOT
  rationale: Simple temporal clause with first person singular verb of coming. 'Until I come' is direct and sufficiently formal.
- source_word: שֵׂעִירָה
  chosen: at Seir
  alternatives:
  - to Seir
  lexicon: HALOT
  rationale: With אֶל earlier in the clause, English idiom can render the destination as 'at Seir' after 'come to my lord.' This avoids awkward repetition while preserving the sense of arrival at Esau's region.
