translation:
  language: es
  text: Y tomó todo el oro y la plata[a], y todos los utensilios hallados en la casa de Dios con Obed-edom, y los tesoros de la casa del rey, y rehenes[b], y volvió a Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en custodia de Obed-edom»; el hebreo dice literalmente «con Obed-edom».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de las prendas»; probablemente personas tomadas como garantía, es decir, rehenes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַזָּהָב וְהַכֶּסֶף
  english_pob_choice: all the gold and the silver
  chosen_spanish: todo el oro y la plata
  alternatives_spanish:
  - todo el oro y la plata
  lexicon: HALOT
  rationale: Mantiene el valor totalizador de כָּל con una expresión natural en español. Conservar «el oro y la plata» refleja la coordinación hebrea de ambos metales preciosos sin diluir su distinción.
- source_word: כָּל הַכֵּלִים
  english_pob_choice: all the vessels
  chosen_spanish: todos los utensilios
  alternatives_spanish:
  - todos los vasos
  - todos los objetos
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para objetos/implementos; en contexto de bienes del santuario, «utensilios» comunica bien la idea de objetos sagrados o funcionales sin limitarla innecesariamente a recipientes.
- source_word: הַנִּמְצְאִים
  english_pob_choice: found
  chosen_spanish: hallados
  alternatives_spanish:
  - que se hallaban
  - encontrados
  lexicon: HALOT
  rationale: El participio expresa que estaban presentes/encontrados allí. «Hallados» conserva la concisión y el sentido pasivo, con registro bíblico natural en español.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se conserva la formulación más cercana al hebreo. «Casa de Dios» evita introducir «templo» como interpretación, aunque esa sea la referencia contextual.
- source_word: עִם עֹבֵד אֱדוֹם
  english_pob_choice: with Obed-edom
  chosen_spanish: con Obed-edom
  alternatives_spanish:
  - bajo el cuidado de Obed-edom
  - en custodia de Obed-edom
  lexicon: HALOT
  rationale: La preposición עִם es literalmente «con». Se mantiene esa relación en el texto principal; las alternativas expresan la posible idea de custodia sin sustituir la forma hebrea.
- source_word: אֹצְרוֹת בֵּית הַמֶּלֶךְ
  english_pob_choice: the treasures of the king’s house
  chosen_spanish: los tesoros de la casa del rey
  alternatives_spanish:
  - los tesoros del palacio real
  - las arcas de la casa del rey
  lexicon: HALOT
  rationale: «Tesoros» reproduce bien אֹצְרוֹת, y «casa del rey» mantiene el hebreo de manera fiel. «Palacio» sería interpretativo, aunque posible por el contexto.
- source_word: בְּנֵי הַתַּעֲרֻבוֹת
  english_pob_choice: hostages
  chosen_spanish: los hijos de las prendas
  alternatives_spanish:
  - hostages
  - los hijos de los rehenes
  - los hijos dados como garantía
  lexicon: HALOT
  rationale: Se preserva la literalidad del hebreo, que en forma estricta dice «hijos de las prendas/garantías». Esto mantiene visible la tensión lexical que el inglés POB resolvió como «hostages». En español, «hijos de las prendas» es duro, pero auditable y no borra la ambigüedad del original.
- source_word: וַיָּשָׁב שֹׁמְרוֹן
  english_pob_choice: and returned to Samaria
  chosen_spanish: y volvió a Samaria
  alternatives_spanish:
  - y regresó a Samaria
  lexicon: HALOT
  rationale: El wayyiqtol narra avance secuencial y se vierte naturalmente con «volvió». Se conserva Samaria como destino nombrado explícitamente por el hebreo.
theological_decisions:
- issue: Traducción de בְּנֵי הַתַּעֲרֻבוֹת como relación de seguridad humana
  english_pob_reading: likely meaning persons taken as security, that is, hostages
  chosen_spanish_reading: los hijos de las prendas
  alternative_spanish_readings:
  - los hostages
  - los hijos dados como garantía
  - los rehenes
  rationale: No se suaviza el término ni se sustituye por una lectura eclesiástica. La frase conserva la dureza del hebreo y deja visible la interpretación probable de personas retenidas como garantía, tal como lo documenta la nota inglesa.
  doctrine_reference: Lexical semantics of hostage/security language in historical narrative
- issue: Relación de la casa de Dios con Obed-edom
  english_pob_reading: with Obed-edom / in the custody of Obed-edom
  chosen_spanish_reading: con Obed-edom
  alternative_spanish_readings:
  - bajo el cuidado de Obed-edom
  - en custodia de Obed-edom
  rationale: Se mantiene la lectura literal de la preposición para no borrar la tensión entre la forma hebrea y el sentido contextual posible de custodia. Esto conserva la transparencia del texto y permite al lector ver la base original.
  doctrine_reference: Textual transparency and lexical caution
- issue: Casa de Dios como formulación del santuario
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - el templo de Dios
  rationale: No se reemplaza la expresión hebrea por un equivalente más interpretativo. Aunque «templo» puede ser contextual, «casa de Dios» es más auditable y respeta el sintagma del original.
  doctrine_reference: Source-form preservation
translation_notes:
  revision_awareness: El texto sigue de cerca la versión inglesa POB auditada, pero corrige el cierre narrativo para reflejar el hebreo וַיָּשָׁב שֹׁמְרוֹן como «y volvió a Samaria». Se preserva la alternativa interpretativa en nota para עִם עֹבֵד אֱדוֹם y la dificultad léxica de בְּנֵי הַתַּעֲרֻבוֹת.
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» en vez de «templo» para fidelidad al sintagma hebreo.
  - Se usa «utensilios» para כֵּלִים por su amplitud semántica en contexto sagrado.
  - Se conserva la literalidad de «con Obed-edom» y se explica la posible custodia en nota.
  - «Los hijos de las prendas» preserva la tensión del hebreo; la nota aclara la interpretación probable como rehenes.
  - «Volvió a Samaria» sigue el hebreo y evita agregar sujeto explícito innecesario.
