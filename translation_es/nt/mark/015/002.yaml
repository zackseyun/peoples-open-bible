translation:
  language: es
  text: 'Y Pilato le preguntó[a]: «¿Eres tú el rey de los judíos?» Y él le respondió: «Tú lo dices[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le interrogó». Aquí «le preguntó» refleja el sentido normal del verbo en este contexto ante Pilato.
    reason: lexical_alternative
  - marker: b
    text: O «Tú dices» o, más explícitamente, «Eso es lo que dices». La respuesta de Jesús es breve y deja una ambigüedad deliberada.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπηρώτησεν
  english_pob_choice: asked
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le interrogó
  - le preguntó por ello
  lexicon: BDAG
  rationale: El verbo denota preguntar o interrogar. En este contexto, «le preguntó» comunica la acción de manera natural y fiel, sin añadir una dureza judicial que el griego no exige por sí solo.
- source_word: Σὺ εἶ
  english_pob_choice: Are you
  chosen_spanish: ¿Eres tú
  alternatives_spanish:
  - ¿Tú eres
  - ¿Eres tú mismo
  lexicon: BDAG
  rationale: En una pregunta directa, el pronombre explícito y el verbo se vierten de forma natural como interrogativa española, conservando el énfasis en el «tú».
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - gobernante
  - soberano
  lexicon: BDAG
  rationale: «Rey» es el equivalente directo y mantiene la carga real y política de la acusación. «Gobernante» sería más general y perdería precisión.
- source_word: Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: Se conserva la expresión establecida del cargo político en la pasión. Aunque «judeanos» es posible lexicográficamente, aquí la formulación tradicional del cargo es la que mejor refleja el contexto narrativo sin desactivar su sentido forense.
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - dio respuesta
  - contestó
  lexicon: BDAG
  rationale: El participio se integra de manera idiomática con «respondió», siguiendo el ajuste revisionado del inglés POB que evita una construcción participial artificial y conserva la sencillez del giro griego.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: le respondió
  alternatives_spanish:
  - le dice
  - dijo
  lexicon: BDAG
  rationale: Aunque Marcos usa con frecuencia el presente histórico, en español «le respondió» fluye de forma natural y preserva la relación con ἀποκριθεὶς. La versión no necesita forzar el presente si ello entorpece la lectura.
- source_word: Σὺ λέγεις
  english_pob_choice: You say so
  chosen_spanish: Tú lo dices
  alternatives_spanish:
  - Tú dices
  - Eso dices tú
  - Tú lo estás diciendo
  lexicon: BDAG
  rationale: La frase es elíptica y deja una ambigüedad intencional. «Tú lo dices» preserva esa reserva en español sin convertirla en una afirmación explícita ni en una negación.
theological_decisions:
- issue: Fuerza de la respuesta de Jesús en Σὺ λέγεις
  english_pob_reading: A restrained, somewhat ambiguous acknowledgment rendered as “You say so.”
  chosen_spanish_reading: 'Una respuesta sobria y ambigua: «Tú lo dices».'
  alternative_spanish_readings:
  - «Sí, así es»
  - «Tú dices»
  - «Eso es lo que dices»
  rationale: El griego no añade un «sí» explícito. Por fidelidad al tensionamiento del texto, la traducción debe conservar la reserva de Jesús y no resolverla en una afirmación completa ni en una negación.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB en inglés que reemplazó la frase participial incómoda «And answering him, he says» por la más natural «And he answered him». Por eso el español usa una construcción verbal directa y fluida («le respondió») sin reproducir de forma rígida el participio griego.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la concatenación narrativa de Marcos.
  - «rey de los judíos» se conserva como fórmula fija del cargo en la pasión.
  - La respuesta de Jesús queda en forma breve y sobria para preservar su ambigüedad.
  - No se introduce «Cristo» ni otro término no presente en el versículo.
