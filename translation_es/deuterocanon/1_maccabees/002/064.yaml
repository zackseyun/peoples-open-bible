translation:
  language: es
  text: Y ustedes, hijos e hijas, sean fuertes y valientes[a] en su ley, porque en ella serán glorificados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «anímense» o «sean valientes». El griego usa una imagen masculina en el verbo, pero el español aquí la expresa de forma idiomática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «serán honrados» o «recibirán gloria».'
    reason: alternative_reading
lexical_decisions:
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - niños
  - hijos
  lexicon: LSJ
  rationale: τέκνα es un término amplio para descendencia/children. En español, 'hijos' puede abarcar al conjunto de los descendientes en un contexto familiar y mantiene la dirección directa del discurso sin agregar una perífrasis más pesada. Se evita estrechar a 'hijos varones' porque el griego no lo exige.
- source_word: ἰσχύετε
  english_pob_choice: be strong
  chosen_spanish: sean fuertes
  alternatives_spanish:
  - sean firmes
  - refuércense
  - sean fuertes
  lexicon: LSJ
  rationale: El imperativo presente exhorta a fortaleza/solidez. 'Sean fuertes' es natural, digno y conserva la fuerza exhortativa del griego sin suavizarla.
- source_word: ἀνδρίζεσθε
  english_pob_choice: be courageous
  chosen_spanish: valientes
  alternatives_spanish:
  - cobren ánimo
  - sean varoniles
  - actúen como hombres
  lexicon: LSJ
  rationale: El verbo contiene imaginería masculina explícita, pero en español una expresión literal como 'actúen como hombres' sonaría menos natural y podría desorientar al lector moderno. 'Valientes' preserva el valor exhortativo que el propio audit trail inglés identificó como sentido idiomático, sin forzar un calco impropio en español.
- source_word: ἐν τῷ νόμῳ ὑμῶν
  english_pob_choice: in your law
  chosen_spanish: en su ley
  alternatives_spanish:
  - en la ley de ustedes
  - en vuestra ley
  - en su ley
  lexicon: LSJ
  rationale: Se conserva la referencia a la ley propia del grupo. En español, 'su ley' funciona de manera natural y solemne; el contexto hace claro que se trata de la ley del pueblo al que se dirige.
- source_word: δοξασθήσεσθε
  english_pob_choice: you will be glorified
  chosen_spanish: serán glorificados
  alternatives_spanish:
  - serán honrados
  - recibirán gloria
  - serán glorificados
  lexicon: LSJ
  rationale: El futuro pasivo de δοξάζω apunta a ser glorificado/honrado. 'Serán glorificados' preserva la conexión verbal con gloria y evita reducir la promesa a mera reputación social. En español se mantiene la pasiva para conservar el matiz del original.
theological_decisions:
- issue: Imaginería masculina de ἀνδρίζεσθε
  english_pob_reading: be courageous
  chosen_spanish_reading: valientes
  alternative_spanish_readings:
  - varoniles
  - como hombres
  - cobren ánimo
  rationale: El griego usa una forma con imaginería masculina, pero el español exige una decisión idiomática que no oscurezca el sentido exhortativo. 'Valientes' conserva el llamado a la firmeza y permite mantener la nota sobre el trasfondo masculino sin imponer una frase poco natural al texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fuerza de δοξασθήσεσθε
  english_pob_reading: you will be glorified
  chosen_spanish_reading: serán glorificados
  alternative_spanish_readings:
  - serán honrados
  - obtendrán gloria
  rationale: La promesa permanece abierta respecto al agente y al modo exacto de la glorificación/honor. 'Serán glorificados' conserva esa tensión teológica y no la reduce a una simple aprobación humana.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del audit trail inglés: mantiene τέκνα como un plural familiar amplio, ἰσχύετε con fortaleza exhortativa, ἀνδρίζεσθε con el valor idiomático de valentía sin calco rígido, τῷ νόμῳ ὑμῶν como ''su ley'', y δοξασθήσεσθε en pasiva futura para conservar la ambigüedad entre gloria y honor. La revisión inglesa reciente prefirió ''be courageous'' sobre ''act like men''; el español adopta una solución igualmente natural (''valientes'') sin perder la nota sobre la imaginería masculina.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiere; aquí no aparece.
  - Se mantiene el registro bíblico formal y publicable.
  - La pasiva 'serán glorificados' conserva la tensión semántica de δοξάζω.
  - No se introduce 'Cristo' ni terminología ajena al versículo.
