    rationale: El rastro inglés preserva explícitamente la observación de que el hebreo usa plural («the waters ... and they will be turned»), aunque el texto inglés lo suaviza a singular. Como el español sí puede conservar el plural de manera natural, esa es la decisión léxica que debe explicarse en nota si se incluye una nota.
  - severity: low
    issue: «Mira» puede resultar demasiado coloquial para el tono solemne de la fórmula profética.
    rationale: Aunque transmite deíxis e inmediatez, en este contexto «he aquí» suena más digno y sigue siendo inteligible en español eclesial amplio.
  - severity: low
