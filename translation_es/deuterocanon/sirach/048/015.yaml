translation:
  language: es
  text: Sin embargo, con todo esto, el pueblo no volvió atrás[a], y no cesó de pecar[c], hasta que fue arrancado de su tierra y fue dispersado por toda la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no se arrepintió». El hebreo dice literalmente «no volvió atrás», mientras el paralelo griego usa explícitamente la idea de arrepentimiento.
    reason: lexical_alternative
  - marker: b
    text: O «fue dispersado por muchas tierras». El hebreo «por toda la tierra» puede denotar una dispersión amplia entre muchas tierras; el griego también dice «en toda la tierra».
    reason: alternative_reading
  - marker: c
    text: 'El paralelo griego continúa aquí más allá del hebreo conservado: «y al pueblo le quedaron muy pocos, y un gobernante en la casa de David». Este borrador sigue el hebreo conservado como texto principal.'
    reason: textual_variant
lexical_decisions:
- source_word: בכל זאת / ἐν πᾶσιν τούτοις
  english_pob_choice: Yet for all this
  chosen_spanish: Sin embargo, con todo esto
  alternatives_spanish:
  - Con todo esto
  - No obstante
  lexicon: HALOT; LXX Swete 1909
  rationale: La frase introduce contraste concesivo después de las acciones previas de juicio. «Sin embargo, con todo esto» conserva ese giro adversativo en español natural y solemne, sin volverlo demasiado literal ni demasiado coloquial.
- source_word: לא שב / οὐ μετενόησεν
  english_pob_choice: did not turn back
  chosen_spanish: no se volvió
  alternatives_spanish:
  - no volvió atrás
  - no se arrepintió
  lexicon: HALOT; LSJ
  rationale: El hebreo שוב conserva la imagen concreta de volverse/retornar; el griego añade explícitamente la idea de arrepentimiento. «No se volvió» mantiene la metáfora del giro moral sin borrar la tensión entre el hebreo y el griego.
- source_word: העם / ὁ λαός
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: «El pueblo» es el equivalente natural para עם en este sentido colectivo y mantiene el tono bíblico sin cargarlo de matiz político.
- source_word: ולא חדלו
  english_pob_choice: and they did not cease
  chosen_spanish: y no cesó
  alternatives_spanish:
  - y no dejó
  - y no se detuvo
  lexicon: HALOT
  rationale: «חדל» expresa cesar o dejar de hacerlo. En español, «no cesó» reproduce bien la gravedad de la acción continuada; al tener sujeto colectivo, puede formularse de modo impersonal o con sujeto tácito ligado a «el pueblo».
- source_word: מחטאתם / ἀπὸ τῶν ἁμαρτιῶν
  english_pob_choice: from their sins
  chosen_spanish: de sus pecados
  alternatives_spanish:
  - de sus pecados
  - de pecar
  lexicon: HALOT; LXX Swete 1909
  rationale: 'El plural hebreo y el griego apoyan un plural concreto: «pecados». «De sus pecados» suena natural en español y conserva la referencia a actos culpables concretos.'
- source_word: עד אשר נסחו מארצם / ἕως ἐπρονομεύθησαν ἀπὸ τῆς γῆς αὐτῶν
  english_pob_choice: until they were uprooted from their land
  chosen_spanish: hasta que fue arrancado de su tierra
  alternatives_spanish:
  - hasta que fueron arrancados de su tierra
  - hasta que fueron desarraigados de su tierra
  lexicon: HALOT; LXX Swete 1909
  rationale: El hebreo y el griego describen una expulsión forzosa. «Fue arrancado de su tierra» conserva la imagen vegetal de desarraigo con naturalidad en español; al presentarse en singular colectivo, sigue la forma del hebreo con sujeto «el pueblo».
- source_word: ויפוצו בכל הארץ / καὶ ἐσκορπίσθησαν ἐν πάσῃ τῇ γῇ
  english_pob_choice: and were scattered throughout the earth
  chosen_spanish: y dispersado por toda la tierra
  alternatives_spanish:
  - y dispersado por toda la tierra
  - y esparcido por toda la tierra
  lexicon: HALOT; LXX Swete 1909
  rationale: פוץ y ἐσκορπίσθησαν significan dispersar/esparcir. «Dispersado por toda la tierra» corresponde bien al sentido de exilio amplio; se usa un participio pasivo coordinado para mantener la fluidez con el giro previo.
theological_decisions:
- issue: Repentance sense in Hebrew שוב versus Greek μετενόησεν
  english_pob_reading: did not turn back
  chosen_spanish_reading: no se volvió
  alternative_spanish_readings:
  - no se arrepintió
  - no volvió atrás
  rationale: 'El hebreo principal conserva la imagen de volver/retroceder, mientras el griego explicita la dimensión de arrepentimiento. «No se volvió» preserva ambas capas: la figurativa hebrea y la moral implícita confirmada por el paralelo griego.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve ambiguity where possible'
- issue: Scope of בכל הארץ / ἐν πάσῃ τῇ γῇ
  english_pob_reading: throughout the earth
  chosen_spanish_reading: por toda la tierra
  alternative_spanish_readings:
  - por toda la tierra
  - por toda la tierra/por toda la región
  rationale: El contexto de exilio requiere una dispersión amplia. «Por toda la tierra» refleja el alcance del hebreo/greigo sin forzar una precisión geográfica moderna; además, mantiene abierta la posibilidad semántica entre «tierra» y «territorio».
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve significant alternatives in footnotes'
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo de Kahana como texto principal, pero toma en cuenta el paralelo griego para no perder la fuerza moral de μετενόησεν ni la amplitud de la dispersión. Se mantiene la tensión hebreo/griego sin armonizarla artificialmente.
  spanish_consistency_notes:
  - Se usó «tierra» para conservar la ambigüedad bíblica de ארץ / γῆ entre territorio y mundo habitado.
  - Se prefirió «el pueblo» y no «la nación» para mantener el colectivo bíblico sin politizarlo.
  - Se evitó «SEÑOR»; este versículo no contiene el tetragrámaton.
  - La concordancia verbal se acomodó al español de forma natural, aunque el hebreo alterna formas colectivas y el griego usa plural.
