translation:
  language: es
  text: Y cuando los más fuertes[a] del rebaño se apareaban, Jacob ponía las varas delante de los ojos del rebaño en los abrevaderos[b], para que se aparearan entre las varas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los robustos» o «los vigorosos» para «los más fuertes»; el hebreo se refiere a los animales más recios, en contraste con los débiles del versículo siguiente.
    reason: lexical_alternative
  - marker: b
    text: O «en los canales» o «en los conductos»; el término hebreo se refiere a los lugares de agua donde los animales iban a beber.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And whenever
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y siempre que
  - Y cada vez que
  lexicon: HALOT
  rationale: La construcción narrativa iterativa se vierte de manera natural en español con una temporalidad repetida. «Y cuando» conserva el valor habitual sin sonar mecánico.
- source_word: בְּכָל יַחֵם
  english_pob_choice: whenever ... were breeding
  chosen_spanish: se apareaba
  alternatives_spanish:
  - estaba en celo
  - estaba criándose
  - se reproducía
  lexicon: HALOT
  rationale: En este contexto de ganadería, el sentido es la actividad reproductiva del ganado. «Se apareaba» expresa el hecho biológico sin introducir una explicación extraña al texto.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: el ganado
  alternatives_spanish:
  - el rebaño
  - la manada
  - las reses
  lexicon: HALOT
  rationale: Aunque צאן puede referirse a ovejas y cabras en conjunto, en español «ganado» comunica mejor el colectivo animal de manera amplia. «Rebaño» puede sonar más restrictivo para ovejas.
- source_word: הַמְקֻשָּׁרוֹת
  english_pob_choice: the stronger
  chosen_spanish: más fuerte
  alternatives_spanish:
  - robusto
  - más vigoroso
  - más recio
  lexicon: HALOT
  rationale: La idea contrastiva con el verso siguiente es la de animales más sólidos o fuertes. «Más fuerte» mantiene esa fuerza comparativa con claridad. En el verso siguiente se preservará la oposición con los débiles.
- source_word: וְשָׂם
  english_pob_choice: Jacob would place
  chosen_spanish: Jacob ponía
  alternatives_spanish:
  - Jacob colocaba
  - Jacob ponía allí
  - Jacob colocaba allí
  lexicon: HALOT
  rationale: El imperfecto en contexto habitual se expresa en español con una acción repetida. «Ponía» es natural y conserva el valor iterativo.
- source_word: הַמַּקְלוֹת
  english_pob_choice: the rods
  chosen_spanish: las varas
  alternatives_spanish:
  - los palos
  - los bastones
  - las ramas
  lexicon: HALOT
  rationale: El referente son las varas usadas por Jacob. «Varas» es la equivalencia más precisa y consistente con el contexto inmediato.
- source_word: לְעֵינֵי הַצֹּאן
  english_pob_choice: before the eyes of the flock
  chosen_spanish: delante de los ojos del ganado
  alternatives_spanish:
  - frente al ganado
  - a la vista del ganado
  - ante los ojos del ganado
  lexicon: HALOT
  rationale: La expresión conserva el énfasis visual del hebreo. «Delante de los ojos» mantiene la imagen sin volverla opaca en español.
- source_word: בָּרֳהָטִים
  english_pob_choice: in the watering troughs
  chosen_spanish: en los abrevaderos
  alternatives_spanish:
  - en los canales
  - en los cauces
  - en los pesebres de agua
  lexicon: HALOT
  rationale: El término designa los lugares donde bebía el ganado. «Abrevaderos» expresa bien la función de esos recipientes o canales de agua en español actual.
- source_word: לְיַחְמֵנָּה
  english_pob_choice: so that they might breed
  chosen_spanish: para que se aparearan
  alternatives_spanish:
  - para hacerlas reproducirse
  - para que se criaran
  - para que entraran en celo
  lexicon: HALOT
  rationale: El prefijo de finalidad se expresa con una cláusula final natural en español. «Se aparearan» mantiene el sentido reproductivo sin sobreexplicar causalidad.
- source_word: בַּמַּקְלוֹת
  english_pob_choice: among the rods
  chosen_spanish: entre las varas
  alternatives_spanish:
  - con las varas
  - junto a las varas
  - entre los palos
  lexicon: HALOT
  rationale: La preposición locativa se vierte de modo idiomático con «entre», reflejando que el apareamiento ocurría con las varas presentes en el entorno inmediato.
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el audit trail inglés y no requiere revisión sustantiva. La principal decisión española fue conservar el contraste de fuerza del ganado y el matiz locativo de los abrevaderos, con una formulación idiomática natural.
  spanish_consistency_notes:
  - Se mantuvo el valor iterativo del marco narrativo con imperfecto habitual en español.
  - «Varas» se usó de manera consistente para מקלות, evitando alternar con otros equivalentes menos precisos.
  - «Ganado» se eligió para צאן por su alcance colectivo en español y por su adecuación al contexto de crianza.
  - Se preservó la imagen visual de «delante de los ojos» porque forma parte del efecto narrativo del hebreo.
