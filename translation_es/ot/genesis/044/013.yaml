translation:
  language: es
  text: Entonces rasgaron su ropa[a], y cada uno cargó su asno, y volvieron a la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus vestiduras» o «sus prendas». El hebreo puede referirse de manera general a la ropa exterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְעוּ
  english_pob_choice: they tore
  chosen_spanish: rasgaron
  alternatives_spanish:
  - rompieron
  - desgarraron
  lexicon: HALOT
  rationale: קרע expresa el acto físico de desgarrar o romper ropa en señal de dolor o aflicción. En español, "rasgaron" conserva la fuerza concreta y el registro narrativo sin sonar demasiado técnico.
- source_word: שִׂמְלֹתָם
  english_pob_choice: their clothes
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - su ropa
  - sus prendas
  - sus vestidos
  lexicon: HALOT
  rationale: שִׂמְלָה puede referirse de manera general a ropa exterior o vestimenta. "Vestiduras" mantiene la amplitud semántica y el tono bíblico, y evita estrechar el sentido a una sola prenda.
- source_word: וַיַּעֲמֹס אִישׁ עַל חֲמֹרוֹ
  english_pob_choice: each man loaded his donkey
  chosen_spanish: cada uno cargó su asno
  alternatives_spanish:
  - cada uno puso carga sobre su asno
  - cada hombre cargó su asno
  lexicon: HALOT
  rationale: עמס significa cargar o poner una carga sobre algo. El hebreo presenta un singular distributivo con אִישׁ; por eso "cada uno" reproduce mejor el valor distributivo que una simple forma plural literal. "Cargó su asno" refleja la idea narrativa de preparar el animal para el viaje, siguiendo el sentido que el inglés POB resumió con naturalidad.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada cual
  lexicon: HALOT
  rationale: Aunque אִישׁ es literalmente "hombre", aquí funciona distributivamente. En español, "cada uno" expresa ese valor sin forzar el masculino explícito cuando el contexto ya identifica al grupo.
- source_word: חֲמֹרוֹ
  english_pob_choice: his donkey
  chosen_spanish: su asno
  alternatives_spanish:
  - su burro
  - su mula
  lexicon: HALOT
  rationale: חֲמוֹר es el término común para asno/donkey. "Asno" es fiel al campo semántico del hebreo y mantiene el registro bíblico; "burro" sería más coloquial.
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: they returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - se volvieron
  lexicon: HALOT
  rationale: שׁוּב significa volver o regresar. "Volvieron" es natural en español narrativo y conserva el movimiento de retorno.
- source_word: הָעִירָה
  english_pob_choice: to the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - hacia la ciudad
  - de vuelta a la ciudad
  lexicon: HALOT
  rationale: La he direccional indica movimiento hacia la ciudad. En español se expresa de forma natural con "a la ciudad"; "hacia la ciudad" es posible, pero menos directo en esta narración.
translation_notes:
  revision_awareness: Alineado con el pasaje hebreo y con la revisión inglesa final sin cambios; se ha conservado el valor distributivo de אִישׁ y la amplitud de שִׂמְלֹתָם sin mecanizar desde el inglés.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto hebreo contiene el nombre divino; aquí no aparece.
  - Se mantiene "asno" para חֲמוֹר por fidelidad léxica y registro bíblico, en lugar de sustituirlo por un término más coloquial.
  - Se evita "garments" literal como calco; "vestiduras" preserva la amplitud semántica de שִׂמְלָה en un español readable.
  - La construcción distributiva se resuelve con "cada uno" para reflejar el singular hebreo con sentido plural.
