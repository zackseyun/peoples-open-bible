  - engendró a
  rationale: 'No hay tensión doctrinal aquí, pero sí una decisión lexical importante: la genealogía debe conservar el valor causativo/paterno del verbo hebreo. «Engendró» comunica la relación de filiación con concisión y sin suavizar el sentido.'
  doctrine_reference: Genealogía/descendencia en registros bíblicos; no aplica una doctrina específica.
