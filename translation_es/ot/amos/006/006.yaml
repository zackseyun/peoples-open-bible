translation:
  language: es
  text: los que beben vino de tazones y se ungen con los mejores aceites[a], pero no se afligen por la ruina de José[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los aceites más selectos'; literalmente, 'el primero de los aceites'.
    reason: lexical_alternative
  - marker: b
    text: '''José'' aquí se refiere poéticamente al pueblo de Israel, especialmente al reino del norte.'
    reason: cultural_note
lexical_decisions:
- source_word: הַשֹּׁתִים
  english_pob_choice: who drink
  chosen_spanish: los que beben
  alternatives_spanish:
  - quienes beben
  - los bebedores
  lexicon: HALOT
  rationale: El participio con artículo mantiene la descripción continua de la denuncia; en español, la construcción relativa 'los que beben' reproduce bien esa caracterización sin añadir información.
- source_word: בְּמִזְרְקֵי יַיִן
  english_pob_choice: wine from bowls
  chosen_spanish: vino de tazones
  alternatives_spanish:
  - vino en tazones
  - vino por tazones
  lexicon: HALOT
  rationale: מִזְרָק señala un recipiente grande, tipo tazón o cuenco. 'De tazones' conserva la imagen de beber desde recipientes lujosos; 'en tazones' suena menos natural en español y diluye el matiz de procedencia.
- source_word: וְרֵאשִׁית שְׁמָנִים
  english_pob_choice: the finest oils
  chosen_spanish: los mejores aceites
  alternatives_spanish:
  - los aceites más selectos
  - el primero de los aceites
  - los aceites de primera
  lexicon: HALOT
  rationale: רֵאשִׁית aquí funciona idiomáticamente como lo primero/mejor/escogido. 'Los mejores aceites' expresa con naturalidad la idea de lujo y calidad, manteniendo la fuerza del hebreo.
- source_word: יִמְשָׁחוּ
  english_pob_choice: anoint themselves with
  chosen_spanish: se ungen con
  alternatives_spanish:
  - se untan con
  - se aplican
  - se embadurnan con
  lexicon: HALOT
  rationale: מָשַׁח normalmente es 'ungir'. Aunque aquí no se trata de un rito, la misma raíz comunica el uso abundante de aceite; 'se ungen con' preserva el vínculo léxico mejor que una paráfrasis más genérica.
- source_word: וְלֹא נֶחְלוּ
  english_pob_choice: but are not grieved
  chosen_spanish: pero no se afligen
  alternatives_spanish:
  - pero no se duelen
  - pero no sienten dolor
  - pero no se entristecen
  lexicon: HALOT
  rationale: El nifal de חלה puede llevar la idea de debilitarse o dolerse; en este contexto la POB entiende el sentido afectivo de no compadecerse. 'No se afligen' comunica bien la ausencia de dolor solidario sin forzar una lectura médica.
- source_word: עַל שֵׁבֶר יוֹסֵף
  english_pob_choice: over the ruin of Joseph
  chosen_spanish: por la ruina de José
  alternatives_spanish:
  - sobre la ruina de José
  - por la fractura de José
  - por la calamidad de José
  lexicon: HALOT
  rationale: שֵׁבֶר literalmente implica quebranto/ruptura y por extensión desastre o ruina. 'Ruina de José' conserva la metáfora de destrucción y suena natural en español; el sustantivo 'José' mantiene el nombre poético del texto.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - la casa de José
  - Israel
  lexicon: HALOT
  rationale: El hebreo conserva el nombre propio. Traducir 'José' respeta la forma del original y mantiene la designación poética del reino del norte; la aclaración referencial puede ir en nota.
theological_decisions:
- issue: Uso metonímico de 'José' para Israel del norte
  english_pob_reading: Retain 'Joseph' in the main text as a poetic designation for the northern kingdom/people of Israel.
  chosen_spanish_reading: Mantener 'José' en el texto principal como designación poética del reino del norte/pueblo de Israel.
  alternative_spanish_readings:
  - traducir interpretivamente como 'Israel'
  - traducir como 'la casa de José'
  rationale: No hay controversia doctrinal, pero sí una decisión de fidelidad a la imagen profética. Conservar el nombre propio evita nivelar la metáfora del texto y respeta la estrategia de primacía del original; la nota aclara el referente para el lector.
  doctrine_reference: Transliteration and metonymy handling in prophetic poetry; original-language primacy over interpretive flattening.
translation_notes:
  revision_awareness: El pasaje mantiene el acuerdo alto del registro inglés auditado; no se registraron revisiones aplicadas en la fuente inglesa y no se requieren ajustes adicionales en español más allá de una formulación idiomática natural.
  spanish_consistency_notes:
  - Se conservó el nombre propio 'José' para reflejar el hebreo יוֹסֵף y su función metonímica, en línea con la política de preservar nombres del original.
  - '''Ungen'' se mantuvo para conservar la raíz משׁח, aunque el contexto no es ritual; esto preserva la tensión léxica documentada.'
  - '''Ruina'' traduce שֵׁבֶר con una solución idiomática y no técnica, sin perder el sentido de quebranto/catástrofe.'
