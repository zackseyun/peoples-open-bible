lexical_decisions:
- source_word: לְ/הַטּוֹת
  english_pob_choice: to turn aside
  chosen_spanish: torcer
  alternatives_spanish:
  - desviar
  - pervertir
  - apartar
  lexicon: HALOT
  rationale: El verbo en hifil expresa la acción de hacer que algo se desvíe o se incline fuera de su curso recto. En este contexto jurídico, 'torcer' comunica de manera breve y natural la idea de desviar indebidamente una decisión o un derecho, sin perder la fuerza de la imagen verbal.
- source_word: מִשְׁפַּט
  english_pob_choice: justice
  chosen_spanish: el derecho
  alternatives_spanish:
  - la justicia
  - el juicio
  - el debido legal
  lexicon: HALOT
  rationale: Aquí el término apunta al derecho o reclamo legal que corresponde a una persona, más que a 'justicia' en sentido abstracto. 'El derecho' conserva bien el matiz jurídico y suena natural en español; 'justicia' queda como alternativa válida, pero menos específica.
- source_word: גָּבֶר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un varón
  lexicon: HALOT
  rationale: El sustantivo es masculino y el contexto mantiene la referencia individual. 'Un hombre' sigue la precisión de género del hebreo y coincide con la decisión inglesa de no neutralizar innecesariamente el referente.
- source_word: נֶגֶד פְּנֵי
  english_pob_choice: before the face of
  chosen_spanish: delante del rostro de
  alternatives_spanish:
  - en presencia de
  - ante el rostro de
  - delante de
  lexicon: HALOT
  rationale: La expresión es literalmente 'delante de la faz/rostro de'. 'Delante del rostro de' conserva la vivacidad semítica; 'en presencia de' sería una equivalencia más idiomática, pero menos visual.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Exaltado
  - el Más Alto
  lexicon: HALOT
  rationale: Es un título divino, no un nombre propio. 'El Altísimo' es la forma bíblica y clara en español para este título, preservando la referencia teológica a la supremacía de Dios.
theological_decisions:
- issue: Título divino עֶלְיוֹן
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Exaltado
  - el Más Alto
  rationale: Se trata de un título para Dios y no de un nombre. 'El Altísimo' comunica la supremacía divina sin introducir una interpretación adicional.
  doctrine_reference: 'Translation philosophy: translate titles; transliterate names.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que volvió a un verbo más cercano al hebreo ('turn aside') y mantuvo la imagen de 'before the face of the Most High'. En español se conserva esa cercanía mediante 'torcer' y una fórmula visual equivalente.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' para עֶלְיוֹן, coherente con el título divino ya documentado.
  - Se prefiere 'derecho' para מִשְׁפַּט en este contexto legal, sin perder la posibilidad alternativa de 'justicia' señalada por el inglés POB.
  - No se usa un equivalente eclesiástico tradicional como 'Señor' para עֶלְיוֹן, porque el hebreo no emplea aquí el tetragrámaton sino un título divino.
