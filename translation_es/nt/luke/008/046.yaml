  source_alignment_summary: El texto tiene la construcción idiomática correcta «que de mí había salido poder» y conserva «percibí» para ἔγνων. Sin embargo, la auditoría del EN POB muestra que la redacción final aprobada (tras doctrine-realignment) eligió «I knew» para ἔγνων, revirtiendo la revisión intermedia que había preferido «perceived». En español, «supe» (primera persona del aoristo de saber/conocer) es la equivalencia más directa de ἔγνων en este contexto, mientras que «percibí» se acerca más a la alternativa descartada «perceived». Para mantener la alineación con la decisión final del EN POB, el texto principal debe usar «supe» y la nota debe ofrecer «percibí» como alternativa.
  spanish_quality_summary: Fuera del problema de «percibí» vs. «supe», el texto es idiomático y digno. «De mí había salido poder» reproduce correctamente δύναμιν ἐξεληλυθυῖαν ἀπ’ ἐμοῦ. «Alguien me tocó» es fiel a Ἥψατό μού τις.
  glossary_alignment: δύναμις → «poder» sin adjetivos calificativos, en línea con la decisión de no añadir «sanador» o «divino». «Jesús» está bien. El ajuste es estrictamente de concordancia verbal con el EN POB.
