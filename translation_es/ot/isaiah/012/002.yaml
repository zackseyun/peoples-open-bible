base_translation:
  language: en
  yaml_path: translation/ot/isaiah/012/002.yaml
  text: Behold[a], God is my salvation; I will trust and not be afraid, for Yah, Yahweh, is my strength and song[b], and he has become my salvation.
  footnotes:
