translation:
  language: es
  text: Y delante del trono había algo[a] como un mar de vidrio, semejante al cristal. Y en medio del trono y alrededor del trono había cuatro seres vivientes[c][b], llenos de ojos por delante y por detrás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''un mar cristalino''. El griego presenta una comparación: ''algo como un mar de vidrio''.'
    reason: lexical_alternative
  - marker: b
    text: O 'cuatro criaturas vivientes'. El término griego no significa las 'bestias' hostiles de pasajes posteriores de Apocalipsis.
    reason: lexical_alternative
  - marker: c
    text: La frase 'en medio del trono y alrededor del trono' es espacialmente difícil; el griego probablemente refleja la perspectiva de la visión y se mantiene deliberadamente muy cerca de la fuente.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: En español, 'delante de' expresa con naturalidad la relación espacial frente al trono y conserva la idea de posición anterior sin cargar innecesariamente con un matiz ceremonial que no exige el griego.
- source_word: ὡς
  english_pob_choice: something like
  chosen_spanish: algo como
  alternatives_spanish:
  - como
  - algo semejante a
  lexicon: BDAG
  rationale: El griego introduce comparación, no identificación estricta. 'Algo como' mantiene explícita la aproximación visionaria y evita convertir la imagen en una descripción literal.
- source_word: θάλασσα ὑαλίνη
  english_pob_choice: a sea of glass
  chosen_spanish: un mar de vidrio
  alternatives_spanish:
  - un mar vítreo
  - un mar cristalino
  lexicon: BDAG
  rationale: '''Mar de vidrio'' sigue de cerca la imagen básica del inglés POB y del griego, con un sustantivo español claro y publicable. ''Vidrio'' evita la impresión de agua literal y conserva la superficie transparente/brillante.'
- source_word: ὁμοία κρυστάλλῳ
  english_pob_choice: like crystal
  chosen_spanish: semejante al cristal
  alternatives_spanish:
  - como cristal
  - parecido al cristal
  lexicon: BDAG
  rationale: '''Semejante al cristal'' conserva la segunda comparación y su fuerza cualitativa, sin perder la relación de semejanza que el griego añade para intensificar la transparencia y resplandor.'
- source_word: ἐν μέσῳ τοῦ θρόνου καὶ κύκλῳ τοῦ θρόνου
  english_pob_choice: in the midst of the throne and around the throne
  chosen_spanish: en medio del trono y alrededor del trono
  alternatives_spanish:
  - en el centro del trono y alrededor del trono
  - en medio del trono y en torno al trono
  lexicon: BDAG
  rationale: Se conserva la dificultad espacial tal como la mantiene el POB inglés. 'En medio' y 'alrededor' dejan intacta la tensión visionaria sin resolverla interpretativamente.
- source_word: ζῷα
  english_pob_choice: living creatures
  chosen_spanish: seres vivientes
  alternatives_spanish:
  - criaturas vivientes
  - seres vivos
  - bestias
  lexicon: BDAG
  rationale: '''Seres vivientes'' es una opción española digna y transparente para el contexto apocalíptico. Evita la carga negativa de ''bestias'' y no introduce una lectura zoológica demasiado concreta.'
- source_word: γέμοντα ὀφθαλμῶν
  english_pob_choice: full of eyes
  chosen_spanish: llenos de ojos
  alternatives_spanish:
  - repletos de ojos
  - colmados de ojos
  lexicon: BDAG
  rationale: La frase española reproduce de forma directa y natural la imagen participial. 'Llenos de ojos' es breve, literal en el mejor sentido y adecuada al registro visionario.
- source_word: ἔμπροσθεν καὶ ὄπισθεν
  english_pob_choice: in front and behind
  chosen_spanish: por delante y por detrás
  alternatives_spanish:
  - delante y detrás
  - por delante y por detrás
  lexicon: BDAG
  rationale: La pareja adverbial española mantiene el sentido de orientación total de los ojos. 'Por delante y por detrás' suena natural y conserva la amplitud visual del original.
theological_decisions:
- issue: Modo de nombrar ζῷα en una visión del trono celestial
  english_pob_reading: living creatures
  chosen_spanish_reading: seres vivientes
  alternative_spanish_readings:
  - criaturas vivientes
  - bestias
  rationale: La escena alude a seres celestiales alrededor del trono; 'seres vivientes' preserva la dignidad visionaria y evita confundirlos con las 'bestias' hostiles de otros pasajes de Apocalipsis. También mantiene eco suficiente del término sin domesticarlo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Conservar la tensión espacial de ἐν μέσῳ... καὶ κύκλῳ...
  english_pob_reading: preserve the wording 'in the midst of the throne and around the throne'
  chosen_spanish_reading: conservar 'en medio del trono y alrededor del trono'
  alternative_spanish_readings:
  - armonizarlo como 'en el centro del trono y alrededor del trono'
  - explicarlo como una relación puramente periférica
  rationale: El griego presenta una dificultad real o una perspectiva visionaria no lineal. La traducción española mantiene esa tensión en lugar de resolverla, en coherencia con el POB inglés y con la transparencia frente al texto fuente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y coincide sustancialmente con la línea auditada del POB inglés; no se registraron revisiones posteriores que requirieran ajustes, y la concordancia externa reporta acuerdo alto y sin incidencias.
  spanish_consistency_notes:
  - Se mantuvo 'trono' de manera uniforme para θρόνος.
  - Se usó 'seres vivientes' en lugar de 'bestias' para ζῷα, conforme al contexto apocalíptico y a la decisión auditada en inglés.
  - Se preservó la comparación doble ('algo como' / 'semejante') para reflejar tanto ὡς como ὁμοία.
  - Se conservó la tensión espacial sin intentar armonizarla.
  - Se eligió 'por delante y por detrás' para reproducir la idea de visión total con español natural.
