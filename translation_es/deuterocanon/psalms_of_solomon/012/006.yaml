translation:
  language: es
  text: Que Yahvé proteja un alma tranquila que odia a los injustos, y que Yahvé guíe a un hombre que procura la paz en la casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el hogar' o 'en la casa' entendida como 'hogar doméstico'; aquí se prefiere 'en la casa' por ser la lectura más directa de ἐν οἴκῳ.
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάξαι
  english_pob_choice: protect
  chosen_spanish: proteja
  alternatives_spanish:
  - guarde
  - preserve
  lexicon: BDAG
  rationale: El optativo aoristo expresa un deseo o ruego; en español, el subjuntivo en una fórmula de petición comunica naturalmente esa función. 'Proteger' mantiene la idea de preservación activa.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: DOCTRINE.md / POB default terminology
  rationale: En la política de terminología del proyecto, el nombre divino se vierte como 'Yahvé' cuando el texto fuente lo presenta como título divino. Aquí la secuencia benedictoria y el contexto devocional justifican evitar el encubrimiento con 'Señor'.
- source_word: ψυχὴν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - yo
  - persona
  lexicon: BDAG
  rationale: '''Ψυχή'' puede significar alma, vida o yo. En este contexto moral y devocional, ''alma'' conserva mejor el centro interior del sujeto sin forzar una paráfrasis.'
- source_word: ἡσύχιον
  english_pob_choice: quiet
  chosen_spanish: tranquila
  alternatives_spanish:
  - quieta
  - pacífica
  - serena
  lexicon: BDAG
  rationale: '''Ἡσύχιος'' denota calma, quietud o sosiego. ''Tranquila'' suena natural en español y preserva el rasgo de serenidad interior.'
- source_word: μισοῦσαν ἀδίκους
  english_pob_choice: that hates the unjust
  chosen_spanish: que odia a los injustos
  alternatives_spanish:
  - que aborrece a los injustos
  - que odia a los injustos
  - que odia a los malvados
  lexicon: BDAG
  rationale: La forma participial califica a 'alma'. 'Los injustos' mantiene la fuerza adjetival de ἀδίκους; el verbo 'odiar' conserva la intensidad moral del original.
- source_word: κατευθύναι
  english_pob_choice: guide
  chosen_spanish: guíe
  alternatives_spanish:
  - dirija
  - enderece
  - encamine
  lexicon: BDAG
  rationale: '''Guiar'' es una equivalencia natural y fiel para el sentido de orientar o dirigir el camino. Conserva la imagen de conducción bajo cuidado divino.'
- source_word: ἄνδρα
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - varón
  lexicon: BDAG
  rationale: El griego está en masculino singular; 'hombre' reproduce esa fuerza formal en español.
- source_word: ποιοῦντα εἰρήνην
  english_pob_choice: who makes peace
  chosen_spanish: que hace paz
  alternatives_spanish:
  - que promueve la paz
  - que hace la paz
  - que trabaja por la paz
  lexicon: BDAG
  rationale: '''Hacer paz'' refleja de manera directa la construcción verbal del griego y evita introducir una interpretación más expansiva. En español es comprensible y cercano al original.'
- source_word: ἐν οἴκῳ
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en el hogar
  - en la casa
  - en la familia
  lexicon: BDAG
  rationale: '''Οἶκος'' puede significar casa o casa/hogar/household. Dado el ajuste de revisión del inglés POB hacia ''in the house'', ''en la casa'' es la opción más directa y transparente.'
theological_decisions:
- issue: Nombre divino en una fórmula de petición
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El proyecto español prioriza 'Yahvé' para יהוה y evita el reemplazo por 'Señor' cuando no es necesario por el griego o por una convención litúrgica fija. Aquí la petición benedictoria no exige encubrimiento del nombre divino.
  doctrine_reference: POB Spanish terminology defaults
- issue: Lectura moral de ἀδίκους
  english_pob_reading: the unjust
  chosen_spanish_reading: los injustos
  alternative_spanish_readings:
  - los malvados
  - los que hacen injusticia
  - los injustos
  rationale: Se mantiene la tensión moral/legal de ἄδικος como 'injusto', en vez de suavizarla a una formulación más general. Esto conserva la oposición ética del texto.
  doctrine_reference: BDAG; semantic field of δικαιοσύνη/ἀδικία
translation_notes:
  revision_awareness: La revisión inglesa pasó de ‘in the home’ a ‘in the house’ para hacer más directa la relación con ἐν οἴκῳ. La versión española sigue ese ajuste con ‘en la casa’, sin añadir glosas interpretativas más amplias.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para Κύριος cuando funciona como título divino en este tipo de contexto.
  - Se mantiene ‘alma’ para ψυχή en un contexto devocional, acorde con el uso habitual del proyecto.
  - ‘Hace paz’ conserva la estructura verbal simple del griego y evita ampliar prematuramente a ‘promueve la paz’.
  - ‘En la casa’ refleja la decisión revisada del inglés POB y preserva la ambigüedad mínima de οἶκος sin sobreinterpretar.
