  source_alignment_summary: 'El borrador español refleja fielmente el hebreo primario: un contraste exclamativo entre ser honrado en la riqueza y ser despreciado en la pobreza. Mantiene bien la sintaxis paralela con «en su riqueza / en su pobreza» y no importa indebidamente la comparación intensiva del paralelo griego.'
  spanish_quality_summary: El español es natural, claro y digno. «¡Cuán honrado es uno en su riqueza, y cuán despreciado en su pobreza!» suena bien en registro sapiencial y conserva la fuerza retórica. La puntuación y el flujo son apropiados.
  glossary_alignment: 'No hay términos del glosario de alto impacto en este versículo. Las decisiones léxicas clave están bien alineadas con la auditoría inglesa: נִכְבָּד -> «honrado», וְנִקְלֶה -> «despreciado», בְּעָשְׁרוֹ / בְּעָנְיוֹ -> «en su riqueza / en su pobreza». La nota sobre el griego también preserva correctamente la prioridad del hebreo.'
