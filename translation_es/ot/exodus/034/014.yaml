translation:
  language: es
  text: Porque no te inclinarás ante otro dios[a], pues Yahvé, cuyo nombre es Celoso[b][c], es un Dios celoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te postrarás ante otro dios». El verbo hebreo literalmente se refiere a inclinarse o postrarse, a menudo en acto de adoración.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «porque Yahvé —Celoso es su nombre— es un Dios celoso».'
    reason: lexical_alternative
  - marker: c
    text: «Celoso» aquí expresa el reclamo exclusivo de Yahvé sobre la adoración de su pueblo, no una envidia pecaminosa.
    reason: cultural_note
lexical_decisions:
- source_word: תִֽשְׁתַּחֲוֶ֖ה
  english_pob_choice: shall not bow down
  chosen_spanish: no te inclinarás
  alternatives_spanish:
  - no te postrarás
  - no adorarás
  lexicon: HALOT
  rationale: El hebreo indica el acto concreto de inclinarse o postrarse. «No te inclinarás» conserva ese gesto físico sin perder el sentido cultual que el contexto exige. «Adorar» sería más interpretativo; «postrarte» es posible, pero en español resulta un poco más marcado y menos natural aquí.
- source_word: לְאֵ֣ל אַחֵ֑ר
  english_pob_choice: to another god
  chosen_spanish: ante otro dios
  alternatives_spanish:
  - a otro dios
  - delante de otro dios
  - ante un dios ajeno
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «a/para otro dios», en español el verbo de inclinarse pide un complemento más idiomático. «Ante otro dios» mantiene la escena de reverencia/prostración y conserva el valor de «otro». «A otro dios» también es posible, pero suena menos natural con «inclinarse».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino revelado en el texto, conforme al criterio del proyecto. «Yahvé» es la forma española más estable y legible en contexto bíblico, en lugar de sustituirlo por un título.
- source_word: קַנָּא
  english_pob_choice: Jealous
  chosen_spanish: Celoso
  alternatives_spanish:
  - Celoso
  - Celador
  lexicon: HALOT
  rationale: «Celoso» reproduce el valor léxico de קַנָּא y, aplicado a Yahvé, expresa su reclamo exclusivo de lealtad de pacto. Aunque «celoso» puede sonar ambiguo en español cotidiano, en este contexto bíblico conserva mejor la fuerza del término que «celador», que no refleja la misma carga semántica.
- source_word: שְׁמ֔/וֹ
  english_pob_choice: whose name is
  chosen_spanish: cuyo nombre es
  alternatives_spanish:
  - cuyo nombre es
  - su nombre es
  lexicon: HALOT
  rationale: La construcción relativa española «cuyo nombre es» refleja con claridad el hebreo «su nombre». Además, permite que «Celoso» funcione como designación nominal, no solo como adjetivo.
- source_word: אֵ֥ל קַנָּ֖א הֽוּא
  english_pob_choice: is a jealous God
  chosen_spanish: es un Dios celoso
  alternatives_spanish:
  - es un Dios celoso
  - él es un Dios celoso
  lexicon: HALOT
  rationale: La frase hebrea repite y explica el título anterior. «Es un Dios celoso» conserva la estructura predicativa y mantiene la intensidad del término sin suavizarlo a «celoso» en sentido moral negativo.
theological_decisions:
- issue: Modo de rendir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se conserva el nombre propio del pacto en transliteración, siguiendo la decisión doctrinal del proyecto. No se sustituye por «SEÑOR», porque eso ocultaría el nombre revelado en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido teológico de קַנָּא aplicado a Yahvé
  english_pob_reading: Jealous / jealous
  chosen_spanish_reading: Celoso / celoso
  alternative_spanish_readings:
  - zeloso / zeloso
  - celador / celador
  rationale: 'Se preserva la tensión lexical: Yahvé es llamado «Celoso» y se afirma que es «un Dios celoso». En español, «celoso» comunica la exclusividad de pacto y la oposición a la idolatría, sin convertir el término en «envidia» ni diluirlo en «zeloso».'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Relación entre «inclinarse» y «adorar»
  english_pob_reading: shall not bow down
  chosen_spanish_reading: no te inclinarás
  alternative_spanish_readings:
  - no adorarás
  - no te postrarás
  rationale: Se prioriza el gesto corporal literal del hebreo. El contexto de culto hace que la lectura idolátrica siga siendo clara; por eso no es necesario reemplazarlo por «adorar», que sería menos preciso.
  doctrine_reference: HALOT; POB lexical note on bowing in worship
translation_notes:
  revision_awareness: El borrador sigue el pasaje base sin cambios textuales recientes relevantes; se mantiene la decisión auditada de preservar el sentido concreto de שחה, el nombre divino יְהוָה como Yahvé, y el doble uso de קַנָּא como nombre/título y como predicado. La solución española mantiene esas tensiones sin suavizarlas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, no «SEÑOR».
  - Se mantiene «celoso» para קַנָּא en ambos miembros del versículo para conservar la repetición hebrea.
  - «Inclinarse» se usa como equivalente concreto de la postura de culto, con la alternativa de «postrarse» anotada en nota.
  - La puntuación reproduce la relación causal del hebreo con dos cláusulas introducidas por «porque/pues».
