revisions:
- from: Habla a los hijos de Israel[a], para que tomen para mí una ofrenda. De todo hombre cuyo corazón lo mueva[b], tomarán mi ofrenda.
  to: Habla a los hijos de Israel[a], que tomen para mí una ofrenda. De todo hombre cuyo corazón lo mueva[b], ustedes tomarán mi ofrenda.
  rationale: Se corrigió la cláusula final para reflejar claramente la segunda persona plural de תִּקְחוּ y evitar que el español atribuya el verbo a «ellos». También se suavizó el anglicismo «covenantal» en la nota [a]. Se mantuvo «ofrenda», «hijos de Israel» y el modismo del corazón por su buena fidelidad al hebreo y a la auditoría POB.
