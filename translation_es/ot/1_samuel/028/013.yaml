translation:
  language: es
  text: 'El rey le dijo[a]: «No tengas miedo. ¿Qué ves?» Y la mujer dijo a Saúl[b]: «Veo dioses que suben de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿qué has visto?». El verbo está formalmente en pasado/perfecto, aunque en contexto puede entenderse como una pregunta inmediata de visión.'
    reason: lexical_alternative
  - marker: b
    text: אֱלֹהִים es plural en forma y puede traducirse «dioses» o, en contexto, «un ser divino».
    reason: alternative_reading
lexical_decisions:
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey Saúl
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo común con artículo, no el nombre propio. «El rey» conserva el estilo narrativo; Saúl se identifica en la cláusula siguiente.
- source_word: אַל תִּירְאִי
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengas miedo
  alternatives_spanish:
  - No temas
  lexicon: HALOT
  rationale: Es un imperativo negativo estándar de ירא. «No tengas miedo» es natural en español moderno y mantiene el sentido exhortativo.
- source_word: כִּי מָה רָאִית
  english_pob_choice: What do you see?
  chosen_spanish: ¿Qué ves?
  alternatives_spanish:
  - ¿Qué has visto?
  lexicon: HALOT
  rationale: El inglés POB mantuvo la pregunta en presente por el contexto inmediato de visión; en español, «¿Qué ves?» expresa con naturalidad esa misma inmediatez. La alternativa en perfecto queda como posibilidad legítima por el valor formal del hebreo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la médium
  lexicon: HALOT
  rationale: El hebreo dice simplemente «la mujer». Se conserva esa designación sin introducir una etiqueta interpretativa en el texto principal.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - un ser divino
  - Dios
  - un espíritu
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים es plural en forma, y el POB inglés final optó por «gods» para reflejar más de cerca la forma plural del hebreo. En español, «dioses» preserva esa tensión formal y evita resolverla prematuramente. La nota sostiene la posibilidad alternativa de un ser divino en sentido contextual.
- source_word: עֹלִים
  english_pob_choice: coming up
  chosen_spanish: que suben
  alternatives_spanish:
  - que ascienden
  - que van subiendo
  lexicon: HALOT
  rationale: El participio de עלה indica movimiento hacia arriba. «Que suben» es claro, directo y corresponde bien a la escena de emergencia desde abajo.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - desde la tierra
  - de la tierra baja
  lexicon: HALOT
  rationale: «De la tierra» reproduce la imaginería hebrea con naturalidad en español. Aunque «desde la tierra» también es posible, «de la tierra» suena más fluido y conserva el origen de la subida.
theological_decisions:
- issue: Cómo reflejar אֱלֹהִים en el dicho de la mujer sin borrar la ambigüedad teológica
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - un ser divino
  - Dios
  rationale: El versículo informa la percepción de la mujer, no una afirmación doctrinal del narrador. «Dioses» mantiene la pluralidad formal del hebreo y la ambigüedad del episodio; la nota deja abierta la lectura contextual de un ser divino sin resolver el texto por adelantado.
  doctrine_reference: Preservar la tensión textual y teológica sin armonizarla artificialmente.
translation_notes:
  revision_awareness: 'Se atendió la observación de validación anterior: ahora los marcadores [a] y [b] aparecen exactamente en el texto español en los puntos correspondientes, y las notas quedan ancladas sin marcadores huérfanos. También se alineó el español con la revisión más reciente del POB inglés, que favorece la pluralidad formal de אֱלֹהִים.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de YHWH como «Yahvé» en este proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Saúl» como nombre propio solo donde lo indica el hebreo.
  - «Dioses» se conserva en el cuerpo principal por fidelidad a la forma plural de אֱלֹהִים; la nota evita cerrar la ambigüedad.
