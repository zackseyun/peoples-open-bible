revisions:
- from: Y yo los envié a Iddo[a], el principal en el lugar de Casifía, y puse en su boca palabras para hablar a Iddo y a sus hermanos, los servidores del templo[b] en el lugar de Casifía, para traernos ministros para la casa de nuestro Dios.
  to: Y yo los envié a Iddo, el principal en el lugar de Casifía, y puse en sus bocas palabras para hablar a Iddo y a sus hermanos, los servidores del templo[a] en el lugar de Casifía, para traernos ministros[b] para la casa de nuestro Dios.
