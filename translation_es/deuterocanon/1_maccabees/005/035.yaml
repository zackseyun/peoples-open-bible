translation:
  language: es
  text: Y se desvió hacia Maafa[a] y combatió contra ella, la capturó, mató a todo varón que había en ella, tomó sus despojos y la quemó con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nombre propio transliterado desde el griego Μααφά; la forma española puede variar ligeramente según la tradición de transliteración.
    reason: source_note
lexical_decisions:
- source_word: ἀπέκλινεν
  english_pob_choice: turned aside
  chosen_spanish: se desvió hacia
  alternatives_spanish:
  - se apartó hacia
  - giró hacia
  - se desvió a
  lexicon: LSJ
  rationale: El verbo expresa un cambio de dirección o desvío del camino. «Se desvió hacia» conserva ese matiz de movimiento sin convertirlo en una fórmula militar más fuerte que el griego.
- source_word: Μααφὰ
  english_pob_choice: Maapha
  chosen_spanish: Maafa
  alternatives_spanish:
  - Maapha
  - Maafá
  lexicon: transliteración
  rationale: Se conserva el nombre propio por transliteración. «Maafa» refleja bien la forma griega Μααφά y resulta natural en español; la acentuación puede quedar implícita por el uso en castellano bíblico.
- source_word: ἐπολέμησεν αὐτήν
  english_pob_choice: fought against it
  chosen_spanish: combatió contra ella
  alternatives_spanish:
  - luchó contra ella
  - hizo guerra contra ella
  - peleó contra ella
  lexicon: BDAG
  rationale: «Combatió contra ella» mantiene el sentido militar directo del griego y suena natural en español. Se evita intensificarlo indebidamente con una formulación más elaborada.
- source_word: κατελάβετο
  english_pob_choice: captured
  chosen_spanish: la capturó
  alternatives_spanish:
  - la tomó
  - la se apoderó de ella
  - la conquistó
  lexicon: LSJ
  rationale: En este contexto bélico, el verbo indica tomar posesión por la fuerza. «La capturó» reproduce la acción de conquista de modo claro y conciso.
- source_word: πᾶν ἀρσενικὸν αὐτῆς
  english_pob_choice: every male in it
  chosen_spanish: todo varón en ella
  alternatives_spanish:
  - cada varón en ella
  - todos los varones que había en ella
  - todo hombre en ella
  lexicon: LSJ
  rationale: «Varón» conserva el valor de sexo masculino del término griego ἀρσενικόν y mantiene la dureza del enunciado. «En ella» traduce el referente de la ciudad o localidad como entidad femenina en español.
- source_word: τὰ σκῦλα
  english_pob_choice: its spoils
  chosen_spanish: sus despojos
  alternatives_spanish:
  - su botín
  - sus botines
  - su saqueo
  lexicon: BDAG
  rationale: «Despojos» es un equivalente natural para el botín de guerra y conserva el tono militar del pasaje. Se prefiere a «botín» por su cercanía a la formulación bíblica y su alcance colectivo.
- source_word: ἐνέπρησεν αὐτὴν ἐν πυρί
  english_pob_choice: burned it with fire
  chosen_spanish: la quemó con fuego
  alternatives_spanish:
  - la incendió
  - la quemó en fuego
  - la prendió fuego
  lexicon: LSJ
  rationale: 'El griego expresa de forma explícita el medio: «con fuego». «La quemó con fuego» preserva ese rasgo sin suavizar la fórmula de destrucción.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no hay revisiones aplicadas y la redacción española sigue de cerca la secuencia verbal del original sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - 'Se mantiene la cadena narrativa de acciones en orden: desvío, combate, captura, matanza, toma de despojos y quema.'
  - Se evita «SEÑOR» u otros sustitutos teológicos porque el verso no contiene el nombre divino.
  - Se conserva un registro bíblico sobrio y militar, sin arcaísmos innecesarios.
