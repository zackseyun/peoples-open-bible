  text: וְ/עַתָּ֗ה הֲ/לֹ֥א בֹ֨עַז֙ מֹֽדַעְתָּ֔/נוּ אֲשֶׁ֥ר הָיִ֖ית אֶת נַעֲרוֹתָ֑י/ו הִנֵּה ה֗וּא זֹרֶ֛ה אֶת גֹּ֥רֶן הַ/שְּׂעֹרִ֖ים הַ/לָּֽיְלָה־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ruth/003/002.yaml
  text: And now[a], is not Boaz our relative, with whose young women you have been? Look[b], he is winnowing barley at the threshing floor tonight.
  footnotes:
  - marker: a
    text: Or 'our kinsman.' The Hebrew term can denote a relative or clan connection, not merely an acquaintance.
    reason: lexical_alternative
  - marker: b
    text: Or 'with whose servant girls you have been.' The Hebrew can refer to Boaz's female workers or attendants.
    reason: lexical_alternative
