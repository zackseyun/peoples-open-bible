translation:
  language: es
  text: 'Y de Leví dijo: «Tus Tumim y tus Urim son para tu fiel[a], a quien pusiste a prueba en Masá[b], con quien contendiste en las aguas de Meribá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu piadoso» o «tu leal». La expresión hebrea puede designar a alguien marcado por fidelidad de pacto.
    reason: lexical_alternative
  - marker: b
    text: Masá significa «prueba» o «puesta a prueba»; Meribá se asocia con «contienda» o «pleito» (véase Éx 17:1–7; Nm 20:1–13).
    reason: cross_reference
lexical_decisions:
- source_word: וּלְלֵוִי
  english_pob_choice: And of Levi
  chosen_spanish: Y de Leví
  alternatives_spanish:
  - Y para Leví
  - Y acerca de Leví
  lexicon: HALOT
  rationale: La preposición ל con un nombre tribal en este tipo de fórmulas de bendición introduce naturalmente al tema o destinatario; en español, «de Leví» suena idiomático y conserva la construcción hebrea sin endurecerla.
- source_word: אָמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - dijo acerca de él
  - habló
  lexicon: HALOT
  rationale: Es una introducción narrativa simple dentro del discurso de Moisés; «dijo» comunica el valor verbal sin añadir especificación interpretativa.
- source_word: תֻּמֶּיךָ
  english_pob_choice: your Thummim
  chosen_spanish: tus Tumim
  alternatives_spanish:
  - tus perfecciones
  - tus Tumim
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado, porque su referente exacto es especializado y no seguro. Mantener el término evita aplanar el sentido cultual.
- source_word: וְאוּרֶיךָ
  english_pob_choice: and your Urim
  chosen_spanish: y tus Urim
  alternatives_spanish:
  - y tus luces
  lexicon: HALOT
  rationale: «Urim» también es un término técnico sacerdotal; la transliteración preserva la especificidad histórica y ritual mejor que una glosa explicativa en el texto principal.
- source_word: לְאִישׁ חֲסִידֶךָ
  english_pob_choice: belong to your faithful one
  chosen_spanish: pertenecen a tu fiel[a]
  alternatives_spanish:
  - pertenecen a tu piadoso
  - pertenecen a tu leal
  lexicon: HALOT
  rationale: El hebreo es una cláusula sin verbo explícito; en español se entiende de forma natural con «pertenecen a». חָסִיד expresa fidelidad leal/covenantal, por eso «fiel» es la opción más sobria y precisa. «Fiel» evita especificar indebidamente género o cargo y sigue la decisión revisada en el audit trail inglés.
- source_word: אֲשֶׁר נִסִּיתוֹ
  english_pob_choice: whom you tested
  chosen_spanish: a quien probaste
  alternatives_spanish:
  - a quien pusiste a prueba
  - a quien examinaste
  lexicon: HALOT
  rationale: נָסָה en piel significa probar, testar o poner a prueba; «probaste» es directo, bíblico y fiel al evento aludido.
- source_word: בְּמַסָּה
  english_pob_choice: at Massah
  chosen_spanish: en Masá[b]
  alternatives_spanish:
  - en Massah
  - en la prueba
  lexicon: HALOT
  rationale: Se translitera el topónimo como «Masá», con tilde española, y se añade nota por su etimología de «prueba». Mantiene el referente geográfico-eventual del texto.
- source_word: תְּרִיבֵהוּ
  english_pob_choice: with whom you contended
  chosen_spanish: con quien contendiste
  alternatives_spanish:
  - con quien disputaste
  - con quien reñiste
  lexicon: HALOT
  rationale: ריב expresa contienda, disputa o pleito. «Contendiste» conserva la fuerza relacional y polémica del verbo sin volverlo demasiado coloquial.
- source_word: עַל מֵי מְרִיבָה
  english_pob_choice: at the waters of Meribah
  chosen_spanish: junto a las aguas de Meribá
  alternatives_spanish:
  - en las aguas de Meribá
  - junto a las aguas de Meribá
  lexicon: HALOT
  rationale: «Meribá» se translitera como nombre propio y se usa «junto a» para reflejar el marco locativo-eventual del episodio de contendencia. «Aguas» mantiene el plural hebreo y el eco narrativo.
theological_decisions:
- issue: Referente de «tu fiel» en la bendición a Leví
  english_pob_reading: The English POB preserves the ambiguity of «your faithful one» without identifying the referent.
  chosen_spanish_reading: Se mantiene la ambigüedad con «tu fiel», sin identificar si se trata de Aarón, de Leví como antepasado, o del grupo levítico en conjunto.
  alternative_spanish_readings:
  - tu hombre fiel
  - tu leal
  rationale: El hebreo singular permite varias lecturas y el aparato inglés deliberadamente no las resuelve. La traducción española conserva esa tensión interpretativa en vez de precisar indebidamente el referente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que cambió «faithful man» por «faithful one» para evitar especificación innecesaria de género. La redacción española sigue esa revisión con «tu fiel», sin añadir identificación referencial no resuelta por el texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se preservaron los nombres técnicos «Tumim» y «Urim» por su carácter cultual especializado.
  - Se mantuvo la ambigüedad del sujeto singular fiel sin resolverla en nota ni en texto principal.
  - Se respetó la locución locativa «junto a las aguas» para conservar el eco narrativo de los episodios de Masá y Meribá.
