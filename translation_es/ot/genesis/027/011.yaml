    text: Or “Behold” or “See” for the particle introducing Jacob’s objection.
    reason: lexical_alternative
  - marker: b
    text: “Smooth” here refers to Jacob’s lack of bodily hair, in contrast to Esau being hairy.
    reason: cultural_note
