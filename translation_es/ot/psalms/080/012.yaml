translation:
  language: es
  text: Extendió sus ramas[a] hasta el mar, y sus brotes hasta el Río[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sarmientos» por «ramas». El término hebreo aquí es poco común y puede referirse de manera más general al crecimiento extendido de la vid.
    reason: lexical_alternative
  - marker: b
    text: «El Río» probablemente se refiere al Éufrates, evocando la extensión ideal del territorio de Israel desde el mar hasta el Río.
    reason: cross_reference
lexical_decisions:
- source_word: תְּשַׁלַּח
  english_pob_choice: it sent out
  chosen_spanish: extendió
  alternatives_spanish:
  - envió
  - desplegó
  - echó
  lexicon: HALOT
  rationale: El piel de שלח expresa aquí la expansión de la vid o de su crecimiento. «Extendió» conserva la imagen dinámica en español con naturalidad y sin perder el matiz de propagación.
- source_word: קְצִירֶהָ
  english_pob_choice: its branches
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus sarmientos
  - sus boughs
  - sus brotes
  lexicon: HALOT
  rationale: Aunque el término hebreo es inusual en este contexto, la POB inglesa lo entiende como el crecimiento extenso de la vid. «Ramas» mantiene una imagen clara y amplia en español; «sarmientos» sería más técnica y «brotes» se reserva mejor para יוֹנְקוֹתֶיהָ.
- source_word: עַד יָם
  english_pob_choice: as far as the sea
  chosen_spanish: hasta el mar
  alternatives_spanish:
  - hasta el mar Mediterráneo
  - hasta el mar
  lexicon: HALOT
  rationale: «Hasta» expresa bien el alcance. «Mar» es el equivalente idiomático natural en español para el límite occidental probable de la imagen territorial.
- source_word: וְאֶל נָהָר
  english_pob_choice: and to the River
  chosen_spanish: y hasta el Río
  alternatives_spanish:
  - y al Río
  - y hasta el río
  lexicon: HALOT
  rationale: La mayúscula en «Río» preserva la convención bíblica de referencia al Éufrates en este lenguaje de fronteras ideales. «Hasta» refuerza el alcance paralelo a «hasta el mar».
- source_word: יוֹנְקוֹתֶיהָ
  english_pob_choice: its shoots
  chosen_spanish: sus brotes
  alternatives_spanish:
  - sus retoños
  - sus vástagos
  - sus retoños tiernos
  lexicon: HALOT
  rationale: El término procede de una raíz asociada con brotar/chupar y designa renuevos frescos de la vid. «Brotes» es claro y mantiene el paralelismo botánico con «ramas».
theological_decisions:
- issue: Límite geográfico ideal de la vid de Israel
  english_pob_reading: '''The River'' likely refers to the Euphrates, echoing the ideal extent of Israel''s territory from the sea to the River.'
  chosen_spanish_reading: «El Río» probablemente alude al Éufrates, evocando el límite ideal del territorio de Israel desde el mar hasta el Río.
  alternative_spanish_readings:
  - «el río» de modo genérico
  - «el Éufrates» en el texto principal
  rationale: La mayúscula en el texto principal deja la referencia en forma bíblica reconocible sin explicitarla de más; la nota aclara la identificación probable con el Éufrates, manteniendo la tensión entre denominación idiomática y precisión histórica.
  doctrine_reference: Límites pactales de la tierra en Gn 15:18; Ex 23:31; Dt 11:24
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo y con la evaluación de alta concordancia del audit trail inglés; no se identificaron revisiones aplicadas ni cambios pendientes.
  spanish_consistency_notes:
  - Se mantuvo «Río» con mayúscula para conservar la convención bíblica señalada en el audit trail.
  - Se eligió «brotes» para יוֹנְקוֹתֶיהָ y «ramas» para קְצִירֶהָ, evitando que ambas palabras se neutralicen en una sola imagen.
  - No se usó «SEÑOR» ni otros sustitutos teológicos, porque el versículo no contiene el Tetragrámaton ni un equivalente directo.
