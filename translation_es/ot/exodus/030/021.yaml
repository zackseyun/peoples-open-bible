revisions:
- from: Lavarán sus manos y sus pies[a], para que no mueran. Esto será para ellos[b] un estatuto perpetuo, para él y para su descendencia, por sus generaciones.
  to: Lavarán sus manos y sus pies, para que no mueran. Esto será para ellos un estatuto permanente[a], para él[b] y para su descendencia, por todas sus generaciones.
  rationale: Se reubicaron los marcadores de notas para que correspondan a las expresiones que explican; se ajustó «perpetuo» a «permanente» para alinearlo mejor con la decisión auditada en inglés sobre עוֹלָם; y se mejoró la idiomaticidad de לְדֹרֹתָם con «por todas sus generaciones».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y el rastro auditado en casi todos los puntos: futuro normativo («Lavarán»), finalidad preventiva («para que no mueran»), pronombre singular («para él») y continuidad generacional. Sin embargo, la colocación de las notas está invertida respecto a su contenido: [a] aparece anclada en «pies» aunque la nota trata de חָק עוֹלָם, y [b] aparece anclada en «ellos» aunque la nota explica «para él».'
  spanish_quality_summary: 'El español es claro y digno, pero conviene mejorar dos detalles: reubicar los marcadores de nota al lugar correcto y suavizar «por sus generaciones» a la expresión más idiomática «por todas sus generaciones» o similar. El resto es natural y fiel. «Estatuto perpetuo» es aceptable en español bíblico, aunque el inglés auditado prefirió «permanent»; no es un error, pero «permanente» armoniza mejor con la decisión documentada.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Estatuto» para חָק y «descendencia» para זֶרַע son adecuados. La elección «perpetuo» para עוֹלָם es defendible, pero «permanente» se alinea mejor con la decisión léxica/teológica auditada en inglés. Se conserva correctamente «para él» en vez de explicitar «Aarón» en el texto principal.
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están anclados en frases equivocadas.
    rationale: La nota [a] explica חָק עוֹלָם, por lo que debe ir junto a «estatuto permanente/perpetuo», no junto a «sus pies». La nota [b] explica «para él», por lo que debe anclarse allí, no en «ellos». Esto afecta la usabilidad y la fidelidad del aparato crítico.
  - severity: medium
    issue: «Por sus generaciones» suena menos idiomático en español bíblico contemporáneo.
    rationale: Aunque es comprensible, «por todas sus generaciones» o «a lo largo de sus generaciones» comunica mejor לְדֹרֹתָם y mantiene el tono legal formular sin sonar calcado.
  - severity: low
    issue: «Perpetuo» no sigue exactamente la preferencia auditada «permanent».
    rationale: La nota inglesa y la decisión teológica favorecen «permanent» para evitar posibles sobrelecturas. En español, «permanente» replica mejor esa cautela, aunque «perpetuo» sigue siendo posible.
  revised_spanish_text: Lavarán sus manos y sus pies, para que no mueran. Esto será para ellos un estatuto permanente[a], para él[b] y para su descendencia, por todas sus generaciones.
  revised_footnotes:
  - marker: a
    text: O «estatuto perpetuo» o «estatuto eterno». La expresión hebrea חָק עוֹלָם es una fórmula legal estándar para una ordenanza duradera.
    reason: lexical_alternative
  - marker: b
    text: «Para él» se refiere a Aarón en el contexto inmediato.
    reason: cross_reference
  revision_rationale: Se reubicaron los marcadores de notas para que correspondan a las expresiones que explican; se ajustó «perpetuo» a «permanente» para alinearlo mejor con la decisión auditada en inglés sobre עוֹלָם; y se mejoró la idiomaticidad de לְדֹרֹתָם con «por todas sus generaciones».
