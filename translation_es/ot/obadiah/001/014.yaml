translation:
  language: es
  text: No te pongas en la encrucijada para cortar a sus fugitivos[a][c], ni entregues[a][b] a sus sobrevivientes en el día de la angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el cruce de caminos» o «en el paso de la montaña». El término hebreo se refiere a un lugar donde podían ser interceptados los fugitivos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «poner en manos de» o «entregar». El verbo hebreo significa literalmente «cerrar», aquí usado en el sentido de poner a personas en manos del enemigo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «su remanente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּעֲמֹד
  english_pob_choice: stand
  chosen_spanish: te pongas
  alternatives_spanish:
  - te detengas
  - te sitúes
  - te pongas de pie
  lexicon: HALOT
  rationale: El hebreo expresa la idea concreta de colocarse o permanecer en un punto estratégico. En español, "te pongas" comunica esa posición activa en el lugar de interceptación sin sonar forzado. Se conserva el matiz prohibitivo de una acción deliberada.
- source_word: הַפֶּרֶק
  english_pob_choice: the crossroads
  chosen_spanish: la encrucijada
  alternatives_spanish:
  - el cruce de caminos
  - el cruce
  - el desfiladero
  lexicon: HALOT
  rationale: El término señala un lugar donde los caminos se dividen y donde podían interceptarse fugitivos. "Encrucijada" es natural en español y mantiene la imagen espacial del punto estratégico, como hace "crossroads" en la traducción inglesa auditada.
- source_word: לְהַכְרִית
  english_pob_choice: to cut off
  chosen_spanish: cortar
  alternatives_spanish:
  - destruir
  - exterminar
  - borrar
  lexicon: HALOT
  rationale: La raíz כרת conserva una imaginería de corte/eliminación. "Cortar" refleja mejor esa fuerza verbal que "destruir", y evita suavizar el lenguaje del texto. En este contexto, el objeto directo ya aclara que se trata de personas perseguidas.
- source_word: פְּלִיטָיו
  english_pob_choice: his fugitives
  chosen_spanish: sus fugitivos
  alternatives_spanish:
  - sus escapados
  - los que huyeron de él
  - sus huidos
  lexicon: HALOT
  rationale: '"Fugitivos" reproduce bien la idea de personas que han huido y están siendo perseguidas. Es más directo y más cercano al valor semántico del hebreo que una perífrasis explicativa.'
- source_word: תַּסְגֵּר
  english_pob_choice: hand over
  chosen_spanish: entregues
  alternatives_spanish:
  - pongas en manos de
  - sometas
  - des por entregado
  lexicon: HALOT
  rationale: Aunque el verbo hebreo significa literalmente cerrar/encerrar, aquí el sentido idiomático es poner a alguien a merced del enemigo. "Entregues" expresa de manera natural esa cesión de personas bajo poder hostil, como explica el audit trail inglés con la alternativa "deliver up / surrender".
- source_word: שְׂרִידָיו
  english_pob_choice: his survivors
  chosen_spanish: sus sobrevivientes
  alternatives_spanish:
  - su remanente
  - los que quedan de él
  - sus sobrevivientes restantes
  lexicon: HALOT
  rationale: '"Sobrevivientes" mantiene el sentido inmediato de quienes quedaron con vida tras la catástrofe. Se evita "remanente" como opción principal para no introducir, sin necesidad, la carga técnico-teológica que ese término suele tener en español bíblico.'
- source_word: בְּיוֹם צָרָה
  english_pob_choice: in the day of distress
  chosen_spanish: en el día de la angustia
  alternatives_spanish:
  - en el día del desastre
  - en el día de la aflicción
  - en el día de la tribulación
  lexicon: HALOT
  rationale: '"Angustia" traduce bien צָרָה en un registro bíblico natural para el español contemporáneo. Conserva el tono grave y temporal de la fórmula sin debilitarla con un término demasiado general.'
theological_decisions:
- issue: Valor de שְׂרִידָיו frente a "remanente"
  english_pob_reading: Rendered as 'his survivors' rather than 'his remnant.'
  chosen_spanish_reading: '"sus sobrevivientes" en vez de "su remanente"'
  alternative_spanish_readings:
  - su remanente
  rationale: La escena juzga la violencia contra refugiados concretos; no desarrolla aquí el motivo teológico del "remanente" como categoría técnica. "Sobrevivientes" conserva el sentido histórico inmediato y evita importar una carga doctrinal no exigida por el contexto.
  doctrine_reference: 'Translation philosophy: preserve lexical precision and avoid importing theological terminology beyond the immediate context.'
translation_notes:
  revision_awareness: El pasaje no muestra revisiones aplicadas en el expediente inglés; la concordancia general fue alta y el último pase indicó que no se necesitaban cambios. Esta versión española sigue esa lectura sin introducir ajustes innecesarios.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma reservada para el nombre divino cuando aparezca; aquí no ocurre.
  - 'Se conserva el paralelismo prohibitivo con dos mandatos negativos: no colocarse para interceptar y no entregar a los sobrevivientes.'
  - Se evita el tecnicismo "remanente" como lectura principal para no sobrecargar el verso con una connotación profética no explícita en el contexto inmediato.
  - '"Encrucijada" y "sobrevivientes" buscan equilibrio entre fidelidad semántica y lectura natural en español latinoamericano.'
