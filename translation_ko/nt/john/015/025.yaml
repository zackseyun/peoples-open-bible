id: JHN.15.25
reference: 'John 15:25'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: ἀλλ’ ἵνα πληρωθῇ ὁ λόγος ὁ ⸂ἐν τῷ νόμῳ αὐτῶν γεγραμμένος⸃ ὅτι Ἐμίσησάν με δωρεάν.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/025.yaml
  text: 'But this happened so that the word written in their Law might be fulfilled: ‘They hated me without cause.’[a][b][c]'
  footnotes:
  - marker: a
    text: Or, more formally, 'But so that the word written in their Law might be fulfilled.' The Greek leaves the main clause elliptical, and English often supplies 'this happened' from the context.
    reason: lexical_alternative
  - marker: b
    text: '''Their Law'' uses ''Law'' in the broader Jewish sense of the Scriptures; the quotation is from the Psalms (cf. Ps 35:19; 69:4).'
    reason: cross_reference
  - marker: c
    text: Or 'for no reason.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 이것은 그들의 율법에 기록된 말씀, 「그들은 까닭 없이 나를 미워하였다」가 이루어지게 하기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 더 격식적으로 「그러나 그들의 율법에 기록된 말씀이 이루어지게 하기 위함이다」. 헬라어는 주절을 생략하고 있어, 한국어에서는 「이것은… 위함이다」를 보충한다.
    reason: lexical_alternative
  - marker: b
    text: '「그들의 율법」은 유대 성경 전체를 포괄하는 넓은 의미의 「율법」이다. 인용은 시편(시 35:19; 69:4 참조)에서 가져온 것이다.'
    reason: textual_clarification
  - marker: c
    text: 또는 「이유 없이」.
    reason: lexical_alternative
lexical_decisions:
- source_word: πληρωθῇ
  english_pob_choice: be fulfilled
  chosen_korean: 이루어지다
  alternatives_korean:
