translation:
  language: es
  text: 'Y él dijo: «Dejadlo en paz; que nadie mueva sus huesos». Así dejaron sus huesos en paz[a], junto con los huesos del profeta que había venido de Samaria.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Entonces perdonaron sus huesos, junto con los huesos del profeta que vino de Samaria» o «Entonces dejaron en paz sus huesos, junto con los huesos del profeta que había venido de Samaria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּיחוּ לוֹ
  english_pob_choice: Leave him alone
  chosen_spanish: Dejadlo en paz
  alternatives_spanish:
  - Dejadlo
  - Dejadlo tranquilo
  lexicon: HALOT
  rationale: El imperativo con objeto pronominal expresa la orden de no seguir interviniendo en el cuerpo del muerto. «Dejadlo en paz» suena natural en español y conserva la idea de no tocarlo más sin suavizar el mandato.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - ninguna persona
  lexicon: HALOT
  rationale: El hebreo usa un singular genérico con valor prohibitivo. En español, «nadie» comunica mejor la fuerza universal de la prohibición y evita una construcción artificial como «ningún hombre».
- source_word: אַל יָנַע
  english_pob_choice: let no man disturb
  chosen_spanish: que nadie mueva
  alternatives_spanish:
  - que nadie perturbe
  - que nadie disturbe
  lexicon: HALOT
  rationale: El verbo נוע aquí apunta a mover o remover los huesos de su lugar. «Mueva» mantiene la concreción física del texto; «disturbe» sería posible, pero es más interpretativo.
- source_word: עַצְמֹתָיו
  english_pob_choice: his bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - sus restos
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «huesos», que el texto repite con intención. «Restos» sería más natural en algunos contextos, pero perdería precisión léxica.
- source_word: וַיְמַלְּטוּ עַצְמֹתָיו
  english_pob_choice: So they let his bones alone
  chosen_spanish: Así dejaron en paz sus huesos
  alternatives_spanish:
  - Así los dejaron intactos
  - Así los preservaron
  lexicon: HALOT
  rationale: El piel de מלט aquí tiene el sentido de librar de daño o preservar. «Dejaron en paz» sigue de cerca la decisión anterior y expresa la idea de no tocarlos sin introducir una explicación extra.
- source_word: אֵת עַצְמוֹת הַנָּבִיא
  english_pob_choice: along with the bones of the prophet
  chosen_spanish: junto con los huesos del profeta
  alternatives_spanish:
  - con los huesos del profeta
  - al lado de los huesos del profeta
  lexicon: HALOT
  rationale: «Junto con» refleja la coordinación añadida por אֵת de manera clara y natural en español. Mantiene la inclusión de ambos conjuntos de huesos sin forzar una equivalencia técnica del marcador acusativo.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se conserva el término estándar y directo «profeta», sin añadir especificaciones que el hebreo no da aquí.
- source_word: אֲשֶׁר בָּא מִשֹּׁמְרוֹן
  english_pob_choice: who had come from Samaria
  chosen_spanish: que había venido de Samaria
  alternatives_spanish:
  - que vino de Samaria
  lexicon: HALOT
  rationale: El qatal remite a una acción anterior al momento narrativo, por eso «había venido» expresa mejor la anterioridad. «Samaria» conserva el nombre geográfico habitual en español.
theological_decisions:
- issue: Tratamiento de los huesos y del respeto debido al muerto
  english_pob_reading: The verse describes sparing the bones from disturbance, without adding doctrinal commentary.
  chosen_spanish_reading: El versículo se traduce de forma concreta, sin ampliar el sentido más allá de no mover y dejar en paz los huesos.
  alternative_spanish_readings:
  - «No tocaron sus huesos»
  - «Respetaron sus huesos»
  rationale: El texto habla específicamente de no mover los huesos y de dejarlos en paz. Evité formulaciones más amplias como «respetaron» porque introducen una valoración que no está explícita en el hebreo.
  doctrine_reference: Respeto a la integridad del cuerpo en el contexto narrativo; no se formula una doctrina sistemática.
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó una formulación más interpretativa («left his bones undisturbed») por otra más cercana al hebreo («let his bones alone»). La redacción española sigue esa revisión con una repetición intencional de la idea de «dejar en paz» para reflejar tanto הַנִּיחוּ לוֹ como וַיְמַלְּטוּ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - Se conserva «profeta» como término estable para נָבִיא.
  - Se evita «Cristo», «SEÑOR» o terminología eclesiástica añadida, porque el hebreo no la exige.
  - La repetición de «huesos» se preserva para respetar el énfasis del original.
  - La nota alternativa se ancla en el saludo inicial porque la versión inglesa también ofrece una alternativa de traducción para el conjunto de la cláusula.
