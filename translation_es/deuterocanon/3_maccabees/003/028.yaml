translation:
  language: es
  text: Y el que quiera denunciar[a], por ello recibirá los bienes del que cae bajo la sanción, y dos mil dracmas del tesoro real, y será coronado con libertad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delatar» o «informar contra». El griego μηνύειν tiene aquí fuerza acusatoria en un decreto legal.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «será coronado con libertad». La imagen puede aludir a manumisión o a la concesión de libertad como recompensa.'
    reason: cultural_note
lexical_decisions:
- source_word: μηνύειν
  english_pob_choice: to inform against
  chosen_spanish: denunciar
  alternatives_spanish:
  - delatar
  - informar contra
  - acusar
  lexicon: LSJ
  rationale: En este contexto administrativo-jurídico, el verbo expresa una acción acusatoria ante la autoridad. 'Denunciar' conserva bien la fuerza de señalamiento contra alguien sin sonar excesivamente técnica o arcaica en español.
- source_word: τὸν βουλόμενον
  english_pob_choice: whoever wishes
  chosen_spanish: el que quiera
  alternatives_spanish:
  - quien desee
  - quien quiera
  - el que desee
  lexicon: LSJ
  rationale: El participio articular funciona de modo genérico. 'El que quiera' es natural en español y mantiene la apertura indefinida del decreto.
- source_word: ἐφʼ ᾧ
  english_pob_choice: for this
  chosen_spanish: por esto
  alternatives_spanish:
  - por lo cual
  - por ello
  - a causa de ello
  lexicon: LSJ
  rationale: La revisión inglesa dejó ver que la relación causal es mejor en forma breve y natural. 'Por esto' refleja la conexión entre la denuncia y la recompensa sin introducir una paráfrasis más fuerte que el griego.
- source_word: οὐσίαν
  english_pob_choice: property
  chosen_spanish: la propiedad
  alternatives_spanish:
  - los bienes
  - las posesiones
  - el patrimonio
  lexicon: LSJ
  rationale: Aquí se trata de bienes confiscables del acusado. 'Propiedad' mantiene el sentido legal y patrimonial que el inglés POB fijó.
- source_word: τοῦ ἐμπίπτοντος ὑπὸ τὴν εὔθυναν
  english_pob_choice: of the one who falls under the penalty
  chosen_spanish: del que cae bajo la sanción
  alternatives_spanish:
  - del que cae bajo el castigo
  - del que queda sujeto a examen judicial
  - del que incurre en responsabilidad
  lexicon: LSJ
  rationale: εὔθυνα puede aludir a examen o rendición de cuentas, pero en este decreto el efecto práctico es sancionatorio. 'Sanción' conserva la idea de consecuencia legal sin cerrar indebidamente la posible tensión entre examen y castigo.
- source_word: ἐκ τοῦ βασιλικοῦ
  english_pob_choice: from the royal treasury
  chosen_spanish: del tesoro real
  alternatives_spanish:
  - de las arcas reales
  - de los fondos reales
  - del tesoro del rey
  lexicon: LSJ
  rationale: El griego alude a recursos reales. 'Tesoro real' reproduce con claridad la elipsis del sustantivo implícito y su función administrativa.
- source_word: δραχμὰς δισχιλίας
  english_pob_choice: two thousand drachmas
  chosen_spanish: dos mil dracmas
  alternatives_spanish:
  - dos mil dracmas de plata
  - dos mil monedas de dracma
  lexicon: LSJ
  rationale: Se conserva la unidad monetaria histórica sin modernizarla artificialmente. 'Dracmas' es comprensible en español bíblico y preserva el dato numérico exacto.
- source_word: τῆς ἐλευθερίας στεφανωθήσεται
  english_pob_choice: will be crowned with freedom
  chosen_spanish: será coronado con libertad
  alternatives_spanish:
  - será coronado de libertad
  - será premiado con libertad
  - recibirá la libertad como corona
  lexicon: LSJ
  rationale: La imagen de στεφανόω se mantiene con 'coronado', y 'libertad' conserva el posible sentido de manumisión o concesión de libertad como recompensa. La formulación evita aplanar la metáfora.
theological_decisions:
- issue: Sentido de la recompensa final 'coronado con libertad'
  english_pob_reading: Literal imagery preserved; likely means manumission or emancipation as a reward.
  chosen_spanish_reading: Mantener la imagen de coronación y dejar visible que la 'libertad' puede entenderse como concesión efectiva de libertad o manumisión.
  alternative_spanish_readings:
  - será liberado como premio
  - recibirá la libertad
  - será honrado con libertad
  rationale: No hay aquí una cuestión doctrinal central, pero sí una imagen legal-honorífica que conviene no diluir. La traducción conserva la metáfora y permite la lectura jurídica sin imponerla.
  doctrine_reference: Translation philosophy §6 (claridad moderna con preservación de peso retórico)
- issue: Valor de εὔθυνα en contexto punitivo
  english_pob_reading: The Greek phrase can refer to being brought under official examination or liability, here in a punitive decree.
  chosen_spanish_reading: '''Sanción'' deja abierta la referencia a responsabilidad oficial, a la vez que comunica el carácter penal del decreto.'
  alternative_spanish_readings:
  - examen judicial
  - responsabilidad
  - castigo
  rationale: El texto puede apuntar tanto a examen administrativo como a consecuencia penal. 'Sanción' preserva esa ambivalencia sin borrar la tensión documentada.
  doctrine_reference: Translation philosophy §6 (preserve lexical/theological tension)
translation_notes:
  revision_awareness: La revisión inglesa reciente aclaró que ἐφʼ ᾧ funciona mejor como una relación causal breve (“for this”) que como una construcción más pesada. En español se reflejó con “por esto”, manteniendo el flujo natural y la dependencia entre la denuncia y la recompensa, sin perder la estructura de premio legal del griego.
  spanish_consistency_notes:
  - Se mantuvo 'libertad' al final para conservar la metáfora de coronación y no sustituirla por una paráfrasis interpretativa.
  - Se eligió 'denunciar' frente a 'informar' por la fuerza acusatoria del contexto, pero se dejó nota de alternativa para no borrar el matiz de acusación formal.
  - '''Tesoro real'' sigue el valor administrativo del griego y armoniza con el registro del decreto.'
  - Se evitó 'SEÑOR' u otras convenciones no presentes, porque el versículo no contiene lenguaje divino.
  - Se conservó 'dracmas' como unidad histórica, sin equivalencias modernas.
