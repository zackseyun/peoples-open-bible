translation:
  language: es
  text: Entonces me llevó a la entrada de la puerta de la casa de Yahvé, que mira hacia el norte, y he aquí, allí las mujeres estaban sentadas, llorando[b] por Tammuz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tammuz era una deidad mesopotámica asociada con ritos de lamento estacional; aquí se presenta a las mujeres participando en ese duelo.
    reason: cultural_note
  - marker: b
    text: O ‘haciendo duelo por Tammuz’. El verbo hebreo significa literalmente ‘llorando’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא אֹתִי
  english_pob_choice: Then he brought me
  chosen_spanish: Entonces me llevó
  alternatives_spanish:
  - Entonces me trajo
  - Y me llevó
  lexicon: HALOT
  rationale: El causativo de בוא expresa que alguien hace venir a otra persona. En español, 'me llevó' comunica bien el movimiento guiado en la visión sin sonar forzado; 'me trajo' también es posible, pero 'llevó' encaja mejor con la escena de conducción espacial.
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - entrada
  - apertura
  - umbral
  lexicon: HALOT
  rationale: פֶּתַח designa una abertura o acceso. 'Entrada' es la forma natural en español para un acceso arquitectónico y conserva la idea del punto de paso.
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - puerta
  - portón
  - portal
  lexicon: HALOT
  rationale: En español bíblico, 'puerta' puede representar היטב el hebreo שַׁעַר cuando se refiere al acceso de un recinto. 'Portón' sería más específico, pero 'puerta' resulta más claro y fluido para lectores amplios.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: Se conserva la imagen literal 'casa' del hebreo בֵּית, que el audit trail inglés también preserva. 'Templo' explicita el referente, pero introduce más interpretación que el texto exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se adopta la forma española tradicional del nombre divino usado en la POB en español: ''Yahvé''. Se evita la sustitución por ''SEÑOR'' porque el proyecto busca transparentar el Tetragrámaton.'
- source_word: אֲשֶׁר אֶל הַצָּפוֹנָה
  english_pob_choice: that faces north
  chosen_spanish: que mira hacia el norte
  alternatives_spanish:
  - que da al norte
  - que está hacia el norte
  - que mira al norte
  lexicon: HALOT
  rationale: La cláusula relativa identifica la orientación de la puerta. 'Mira hacia el norte' es idiomática en español y conserva la fuerza direccional sin añadir información.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y he aquí
  - y mira
  - y sucedió que
  lexicon: HALOT
  rationale: '''He aquí'' reproduce el marcador discursivo de sorpresa y atención del hebreo y mantiene el tono profético.'
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allí
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: '''Allí'' es la equivalencia locativa más natural y conserva la referencia espacial inmediata de la visión.'
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - mujeres
  - las señoras
  lexicon: HALOT
  rationale: Se refleja el artículo definido del hebreo. 'Las mujeres' identifica al grupo visible en la escena sin introducir matices ajenos.
- source_word: יֹשְׁבֹת
  english_pob_choice: were sitting
  chosen_spanish: estaban sentadas
  alternatives_spanish:
  - estaban sentadas
  - se hallaban sentadas
  - estaban sentadas allí
  lexicon: HALOT
  rationale: El participio presenta una postura continua. 'Estaban sentadas' comunica bien el estado resultante y es natural en español.
- source_word: מְבַכּוֹת
  english_pob_choice: weeping for
  chosen_spanish: llorando por
  alternatives_spanish:
  - llorando por
  - haciendo duelo por
  - lamentando a
  lexicon: HALOT
  rationale: בכה significa literalmente llorar. 'Llorando por' mantiene el sentido básico y deja abierta la posibilidad cultual sin convertirla en interpretación principal.
- source_word: אֶת הַתַּמּוּז
  english_pob_choice: Tammuz
  chosen_spanish: Tammuz
  alternatives_spanish:
  - Tammuz
  - el dios Tammuz
  lexicon: HALOT
  rationale: Se translitera el nombre propio. No se añade 'dios' al texto principal porque el hebreo presenta el nombre directamente; la identificación cultual se reserva para nota.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: La POB distingue el nombre del título y evita el reemplazo litúrgico. En español, 'Yahvé' es la forma estándar adoptada para representar el Tetragrámaton con transparencia.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identificación de Tammuz como figura/deidad
  english_pob_reading: Tammuz
  chosen_spanish_reading: Tammuz
  alternative_spanish_readings:
  - el dios Tammuz
  - Tamuz
  rationale: El texto hebreo usa el nombre propio; la carga idolátrica se entiende por el contexto y se explicita en nota, no en la línea principal, para no sobretraducir.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Translate titles; transliterate names'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la POB inglesa auditada. No se observan revisiones aplicadas en el paquete fuente; por eso se mantiene la decisión de traducir el nombre divino con transparencia, conservar la estructura visual de la escena y dejar la ambigüedad cultual de מְבַכּוֹת en una nota alternativa.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה, en línea con el estándar español del proyecto.
  - Se conserva la imagen literal ‘casa de Yahvé’ en lugar de ‘templo’ para reflejar בֵּית sin mayor interpretación.
  - ‘Llorando por Tammuz’ mantiene el valor literal de בכה; la nota ofrece la alternativa interpretativa ‘haciendo duelo’.
  - El uso de ‘y he aquí’ preserva el marcador narrativo/profético וְהִנֵּה con tono bíblico claro en español.
