- from: Mejores son dos que uno[a], porque tienen buena recompensa por su labor.
  to: Más valen dos que uno[a], porque tienen buena recompensa por su labor.
  rationale: Se revisa para mejorar la naturalidad proverbial del español («Más valen dos que uno») sin cambiar el sentido del hebreo ni la decisión comparativa del POB. También se ajusta la nota para alinear mejor la alternativa con עָמָל mediante «trabajo», manteniendo la opción de «retorno» documentada en inglés.
