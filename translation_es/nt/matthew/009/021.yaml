translation:
  language: es
  text: 'Porque ella se decía a sí misma[a]: «Si tan solo toco su manto, seré salvada[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dentro de sí» o «para sí».'
    reason: alternative_reading
  - marker: b
    text: 'O: «seré sanada» o «quedaré sana». El griego dice «seré salvada», usando un verbo que también puede referirse a la sanidad según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: se decía
  alternatives_spanish:
  - decía
  - iba diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa una acción interna en curso o repetida; «se decía» conserva ese matiz aspectual y el carácter reflexivo de la frase griega.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación narrativa de la escena; «Porque» comunica bien la relación causal/explanatoria en español natural.
- source_word: ἐν ἑαυτῇ
  english_pob_choice: to herself
  chosen_spanish: a sí misma
  alternatives_spanish:
  - dentro de sí
  - en sí misma
  lexicon: BDAG
  rationale: La expresión idiomática señala discurso interior; «a sí misma» es natural y claro en español contemporáneo.
- source_word: Ἐὰν μόνον
  english_pob_choice: If only
  chosen_spanish: Si tan solo
  alternatives_spanish:
  - Si solamente
  - Con que
  lexicon: BDAG
  rationale: La combinación expresa una condición mínima con énfasis; «Si tan solo» conserva la intensidad y la restricción del original.
- source_word: ἅψωμαι
  english_pob_choice: I touch
  chosen_spanish: toque
  alternatives_spanish:
  - tocara
  - tocare
  lexicon: BDAG
  rationale: En una cláusula condicional, el subjuntivo presente español expresa adecuadamente la posibilidad futura; «toque» mantiene el valor de simple contacto.
- source_word: τοῦ ἱματίου αὐτοῦ
  english_pob_choice: his garment
  chosen_spanish: su manto
  alternatives_spanish:
  - su vestido
  - su vestidura
  lexicon: BDAG
  rationale: ἱμάτιον suele referirse a una prenda exterior. «Manto» es una equivalencia digna y natural en español bíblico, sin precisar indebidamente el tipo exacto de prenda.
- source_word: σωθήσομαι
  english_pob_choice: I will be saved
  chosen_spanish: seré salvada
  alternatives_spanish:
  - seré sanada
  - seré sanada y salvada
  lexicon: BDAG
  rationale: Se preserva el verbo amplio «salvar» para respetar la fuerza léxica de σῴζω; en este contexto incluye sanidad, pero no debe reducirse solo a un sentido médico en el texto principal.
theological_decisions:
- issue: Sentido de σωθήσομαι en contexto de curación
  english_pob_reading: I will be saved, with footnote noting healed/made well
  chosen_spanish_reading: seré salvada, con nota que advierte la posibilidad de «seré sanada / seré hecha sana»
  alternative_spanish_readings:
  - seré sanada
  - seré hecha sana
  rationale: El episodio trata de sanidad física, pero el verbo griego es σῴζω, de alcance más amplio. Mantener «salvada» respeta la textura del original y evita perder la posible resonancia salvífica; la nota preserva la lectura contextual de sanidad.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente inglés; se mantuvo la decisión léxica principal de preservar σῴζω con una nota contextual de sanidad.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «salvar» y «sanar» en el texto principal y la nota, siguiendo el valor amplio de σῴζω.
  - «Manto» funciona como equivalente natural de ἱμάτιον en este contexto narrativo, sin imponer una precisión innecesaria.
  - La puntuación y las comillas siguen el uso español; la frase interna conserva el tono directo y meditativo del original.
