translation:
  language: es
  text: 'Entonces le dijo a su siervo[a]: «Por favor, sube y mira hacia el mar[b]». Él subió y miró, y dijo: «No hay nada». Entonces le dijo: «Vuelve siete veces[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su joven» o «su asistente».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «mira en dirección al mar».
    reason: lexical_alternative
  - marker: c
    text: Es decir, repite el recorrido y vuelve a mirar hasta completar siete veces.
    reason: cultural_note
lexical_decisions:
- source_word: נַעֲרוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su joven
  - su asistente
  lexicon: HALOT
  rationale: El hebreo נַעַר puede significar joven, muchacho, sirviente o asistente según el contexto. Aquí la relación funcional es de subordinación y encargo, por lo que «siervo» conserva la fuerza narrativa sin perder naturalidad en español. «Asistente» o «joven» suavizan demasiado el vínculo de autoridad.
- source_word: עֲלֵה נָא
  english_pob_choice: Please go up
  chosen_spanish: Por favor, sube
  alternatives_spanish:
  - Sube, por favor
  - Por favor, asciende
  lexicon: HALOT
  rationale: El imperativo עֲלֵה expresa movimiento ascendente, y נָא añade un matiz de ruego o cortesía. «Por favor, sube» reproduce ambos elementos en español de manera clara y pública­ble; «asciende» sería demasiado solemne y menos natural.
- source_word: הַבֵּט דֶּרֶךְ יָם
  english_pob_choice: look toward the sea
  chosen_spanish: mira hacia el mar
  alternatives_spanish:
  - mira en dirección del mar
  - mira hacia la costa
  lexicon: HALOT
  rationale: הַבֵּט significa «mirar» o «observar», y דֶּרֶךְ con complemento direccional indica «hacia / en dirección de». «Mira hacia el mar» es la forma más idiomática en español y mantiene la orientación espacial del hebreo. «Mar» sigue el uso bíblico español común para יָם.
- source_word: אֵין מְאוּמָה
  english_pob_choice: There is nothing
  chosen_spanish: No hay nada
  alternatives_spanish:
  - No hay absolutamente nada
  - No se ve nada
  lexicon: HALOT
  rationale: La expresión hebrea es una negación enfática de ausencia visible. «No hay nada» es conciso y fiel; evita añadir la idea de visibilidad explícita, que está implícita por el contexto pero no expresada de forma directa.
- source_word: שֻׁב
  english_pob_choice: Go back
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuelve a ir
  lexicon: HALOT
  rationale: שׁוּב en este contexto funciona como mandato de repetir la acción. «Vuelve» comunica de forma natural la repetición del viaje sin forzar una perífrasis. El sentido de «regresar» es válido, pero «vuelve» encaja mejor con el diálogo directo.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete ocasiones
  - siete repeticiones
  lexicon: HALOT
  rationale: La expresión numérica es directa y no requiere expansión. «Siete veces» conserva la simplicidad del hebreo y el valor temporal/repetitivo del mandato.
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: no hubo cambios pendientes y el cotejo final indicó alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «siervo» para נַעַר por la relación de subordinación en el contexto narrativo.
  - Se conserva «mar» para יָם, de acuerdo con el hebreo y la formulación idiomática en español bíblico.
  - La repetición de órdenes breves en español refleja el encadenamiento verbal del hebreo sin añadir información interpretativa.
