translation:
  language: es
  text: y un macho cabrío como ofrenda por el pecado[a], además del holocausto regular y de su ofrenda de cereal y de su libación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como sacrificio por el pecado».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «su ofrenda de cereal y su libación», en referencia al holocausto regular.
    reason: cross_reference
lexical_decisions:
- source_word: וּ/שְׂעִיר
  english_pob_choice: and one male goat
  chosen_spanish: un macho cabrío
  alternatives_spanish:
  - un cabrito macho
  - un macho de las cabras
  lexicon: HALOT
  rationale: שָׂעִיר designa específicamente un macho de las cabras. En español, «macho cabrío» transmite esa especificidad con naturalidad y conserva el valor sacrificial del término.
- source_word: חַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación
  alternatives_spanish:
  - por ofrenda por el pecado
  - para ofrenda por el pecado
  lexicon: HALOT
  rationale: En este contexto cultual, el hebreo puede referirse tanto a la ofrenda por el pecado como a la expiación resultante. «Para expiación» mantiene la función sacrificial sin forzar una perífrasis pesada en español; la tensión léxica entre pecado/expiación queda reflejada en la nota textual.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - una sola
  lexicon: HALOT
  rationale: El numeral especifica la cantidad del animal sacrificial. En español, el artículo indefinido basta y suena más idiomático que repetir el numeral.
- source_word: מִ/לְּ/בַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - además del
  lexicon: HALOT
  rationale: La locución marca adición respecto del holocausto continuo. «Además de» expresa con claridad esa relación en español moderno y conserva el valor inclusivo de la expresión.
- source_word: עֹלַת
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda holocausto
  lexicon: HALOT
  rationale: «Holocausto» es el equivalente bíblico tradicional y preciso para עֹלָה. Aunque «ofrenda quemada» es más transparente etimológicamente, «holocausto» es la forma establecida y comprensible en español bíblico.
- source_word: הַ/תָּמִיד
  english_pob_choice: the regular
  chosen_spanish: regular
  alternatives_spanish:
  - continua
  - diaria
  lexicon: HALOT
  rationale: Siguiendo la decisión inglesa de comunicar la ofrenda recurrente con lenguaje natural, «regular» transmite bien su carácter establecido y continuo. «Continua» o «diaria» son posibles, pero «regular» evita restringir indebidamente la frecuencia.
- source_word: וּ/מִנְחָתָהּ
  english_pob_choice: and its grain offering
  chosen_spanish: y de su ofrenda de cereal
  alternatives_spanish:
  - y de su ofrenda vegetal
  - y de su oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial se refiere a la ofrenda de cereal. «Ofrenda de cereal» es una traducción clara y suficientemente fiel; «de su» conserva el sufijo femenino que remite al holocausto.
- source_word: וְ/נִסְכָּהּ
  english_pob_choice: and its drink offering
  chosen_spanish: y de su libación
  alternatives_spanish:
  - y de su ofrenda líquida
  - y de su bebida derramada
  lexicon: HALOT
  rationale: נֶסֶךְ apunta a la ofrenda derramada. «Libación» es el término bíblico adecuado en español y evita una paráfrasis explicativa que debilitaría la forma cultual del texto.
theological_decisions:
- issue: Relación de adición respecto del holocausto continuo
  english_pob_reading: besides the regular burnt offering and its grain offering and its drink offering
  chosen_spanish_reading: además del holocausto regular y de su ofrenda de cereal y de su libación
  alternative_spanish_readings:
  - aparte del holocausto regular y de su ofrenda de cereal y de su libación
  - además del holocausto continuo y de su ofrenda de cereal y de su libación
  rationale: El hebreo presenta esta ofrenda como suplementaria al sacrificio cotidiano establecido. «Además de» mantiene el valor teológico de adición sin oscurecer la dependencia del rito principal.
  doctrine_reference: Números 29; legislación sacrificial levítica sobre la ofrenda continua
translation_notes:
  revision_awareness: Se siguió el sentido cultual del hebreo y el tramo de auditoría inglés sin cambios relevantes; la versión española ajusta la terminología para lectura bíblica natural en español, preservando la relación sacrificial y la referencia anafórica del sufijo femenino.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este registro cuando el tetragrámaton aparece; aquí no está presente.
  - Se prefirió «holocausto» para עֹלָה por consistencia con terminología bíblica estable en español.
  - Se mantuvo «ofrenda de cereal» para מִנְחָה y «libación» para נֶסֶךְ, en línea con un registro cultual claro.
  - El marcador [a] se ancla en «expiación» para señalar la posible alternativa semántica de חַטָּאת.
  - El marcador [b] se ancla en «libación» para aclarar la referencia posesiva al holocausto regular.
