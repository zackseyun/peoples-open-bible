translation:
  language: es
  text: Pero día tras día me buscan, y se deleitan en conocer mis caminos, como si fueran una nación que practicara justicia y no hubiera abandonado la justicia de su Dios. Me piden juicios justos; se deleitan en la cercanía de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se deleitan en acercarse a Dios» o «se deleitan en el acercamiento a Dios». La frase hebrea puede referirse tanto a la cercanía de Dios como al acto de acercarse a él.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאוֹתִי
  english_pob_choice: Yet ... me
  chosen_spanish: Pero ... me
  alternatives_spanish:
  - Y ... me
  - Mas ... me
  lexicon: HALOT
  rationale: La conjunción introduce contraste con la denuncia anterior; en español, "Pero" transmite mejor la oposición retórica que "Y" y mantiene el objeto directo "me".
- source_word: יוֹם יוֹם
  english_pob_choice: day after day
  chosen_spanish: día tras día
  alternatives_spanish:
  - diariamente
  - día a día
  lexicon: HALOT
  rationale: La repetición hebrea expresa continuidad habitual; "día tras día" conserva esa reiteración con naturalidad en español.
- source_word: יִדְרֹשׁוּן
  english_pob_choice: they seek
  chosen_spanish: me buscan
  alternatives_spanish:
  - me buscan a mí
  - me consultan
  lexicon: HALOT
  rationale: En este contexto, דרשׁ expresa buscar a Dios en sentido religioso. "Buscar" es la equivalencia más natural y fiel; el objeto explícito "me" debe mantenerse por la sintaxis del hebreo.
- source_word: וְדַעַת דְּרָכַי יֶחְפָּצוּן
  english_pob_choice: they delight to know my ways
  chosen_spanish: se deleitan en conocer mis caminos
  alternatives_spanish:
  - desean conocer mis caminos
  - tienen placer en conocer mis caminos
  lexicon: HALOT
  rationale: El hebreo une conocimiento y deleite; "se deleitan en conocer" preserva el matiz volitivo y afectivo sin volverlo mecánico. "Caminos" conserva la metáfora bíblica de la conducta y el obrar divinos.
- source_word: כְּגוֹי אֲשֶׁר
  english_pob_choice: as if they were a nation that
  chosen_spanish: como si fueran una nación que
  alternatives_spanish:
  - como una nación que
  - cual nación que
  lexicon: HALOT
  rationale: La comparación es irónica y no meramente descriptiva. "Como si fueran" hace audible esa ironía en español sin añadir contenido ajeno al texto.
- source_word: צְדָקָה עָשָׂה
  english_pob_choice: practiced righteousness
  chosen_spanish: practicara justicia
  alternatives_spanish:
  - hiciera justicia
  - obrara con justicia
  lexicon: HALOT
  rationale: El hebreo "hacer justicia" admite una formulación idiomática. "Practicar justicia" comunica la conducta habitual y evita un calco rígido; el subjuntivo sigue el valor comparativo de la oración.
- source_word: וּמִשְׁפַּט אֱלֹהָיו לֹא עָזָב
  english_pob_choice: had not forsaken the justice of its God
  chosen_spanish: y no hubiera abandonado la justicia de su Dios
  alternatives_spanish:
  - y no hubiera dejado el juicio de su Dios
  - y no hubiera abandonado la norma de su Dios
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar justicia, juicio u orden normativo. En este contexto de denuncia ética, "justicia" capta mejor el sentido general y mantiene la relación léxica con צְדָקָה.
- source_word: יִשְׁאָל֨וּ/נִי
  english_pob_choice: They ask me
  chosen_spanish: Me piden
  alternatives_spanish:
  - Me preguntan
  - Me consultan
  lexicon: HALOT
  rationale: שאל puede significar pedir o preguntar/inquirir. Aquí la construcción con objetos cultuales y legales favorece "pedir" en español, que resulta natural y no pierde la idea de solicitar respuesta.
- source_word: מִשְׁפְּטֵי צֶדֶק
  english_pob_choice: righteous judgments
  chosen_spanish: juicios justos
  alternatives_spanish:
  - juicios de justicia
  - sentencias justas
  lexicon: HALOT
  rationale: El plural constructo apunta a decisiones o dictámenes conformes a justicia. "Juicios justos" mantiene el enlace con el campo semántico de משפט y צֶדֶק sin forzar tecnicismos.
- source_word: קִרְבַת אֱלֹהִים
  english_pob_choice: the nearness of God
  chosen_spanish: la cercanía de Dios
  alternatives_spanish:
  - la proximidad de Dios
  - el acercamiento a Dios
  lexicon: HALOT
  rationale: קִרְבָה denota cercanía o aproximación. "Cercanía de Dios" sigue el valor nominal del hebreo y es más idiomático en español que una forma abstracta más pesada.
- source_word: יֶחְפָּצוּן
  english_pob_choice: they delight
  chosen_spanish: se deleitan
  alternatives_spanish:
  - se complacen
  - desean
  lexicon: HALOT
  rationale: חפץ expresa deleite, deseo o complacencia. "Se deleitan" funciona en ambos miembros del versículo y conserva la ironía de una devoción aparente.
theological_decisions:
- issue: Cómo reflejar la ironía profética del símil
  english_pob_reading: as if they were a nation that practiced righteousness...
  chosen_spanish_reading: como si fueran una nación que practicara justicia...
  alternative_spanish_readings:
  - como una nación que practicara justicia...
  - cual nación que practicara justicia...
  rationale: El contexto acusa religiosidad hipócrita. El "como si" explicita la ironía ya presente en el hebreo y ayuda a que el lector español perciba el contraste sin añadir una interpretación externa.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sentido de קִרְבַת אֱלֹהִים
  english_pob_reading: the nearness of God
  chosen_spanish_reading: la cercanía de Dios
  alternative_spanish_readings:
  - el acercamiento a Dios
  - la proximidad de Dios
  rationale: La forma nominal hebrea permite entender tanto la cercanía como el acercamiento. La redacción principal conserva la ambigüedad básica con una expresión natural en español; el matiz alterno se mantiene en nota.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: He seguido el texto fuente hebreo y el rastro auditado en inglés. No hay revisiones aplicadas en el archivo inglés, y el consenso de revisión es alto; por eso la propuesta mantiene el sentido y la ambigüedad documentada de קִרְבַת אֱלֹהִים sin sobreexplicarla en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y «justicia» para צְדָקָה/מִשְׁפָּט en un marco ético coherente con Isaías 58.
  - Se mantuvo el paralelismo entre «se deleitan» y «cercanía de Dios» para conservar el tono retórico del versículo.
  - El símil con «como si fueran» preserva la ironía señalada en el audit trail inglés.
