translation:
  language: es
  text: 'Entonces el rey dijo a Sadoc el sacerdote: «¿Eres un vidente[a]? Vuelve a la ciudad en paz, y tus dos hijos contigo, Ahimaaz tu hijo y Jonatán hijo de Abiatar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «¿Ves, no es así?» La forma hebrea puede entenderse como una referencia a Sadoc como «vidente» o como una pregunta sobre ver o percibir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/רוֹאֶה
  english_pob_choice: Are you a seer?
  chosen_spanish: ¿Eres un[a] vidente?
  alternatives_spanish:
  - ¿Ves?
  - ¿Eres un vidente?
  lexicon: HALOT
  rationale: La forma hebrea admite la lectura de “vidente” o una pregunta sobre ver/percibir. En español, “vidente” conserva mejor esa ambigüedad que una pregunta plana de percepción. Se marca el género con forma inclusiva/neutral en la redacción dada, sin alterar la referencia a Sadoc como interlocutor.
- source_word: שֻׁ֥בָ/ה
  english_pob_choice: Return
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuelve de nuevo
  lexicon: HALOT
  rationale: El imperativo de שוב pide un verbo natural en español. “Vuelve” es directo, claro y suficientemente formal sin sonar arcaico.
- source_word: הָ/עִ֖יר
  english_pob_choice: the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - a la ciudadela
  - a la ciudad
  lexicon: HALOT
  rationale: Con el movimiento implícito del imperativo, el español requiere la preposición de destino. “A la ciudad” expresa con naturalidad el rumbo indicado por el hebreo.
- source_word: בְּ/שָׁל֑וֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - seguro
  lexicon: HALOT
  rationale: “Shalom” aquí comunica una partida/retorno sin peligro y en bienestar. “En paz” conserva la conexión léxica con shalom y suena idiomático en español.
- source_word: וַ/אֲחִימַ֨עַץ בִּנְ/ךָ֜ וִ/יהוֹנָתָ֧ן בֶּן אֶבְיָתָ֛ר
  english_pob_choice: with Ahimaaz your son and Jonathan son of Abiathar
  chosen_spanish: y tus dos hijos contigo, Ahimaaz tu hijo y Jonatán hijo de Abiatar
  alternatives_spanish:
  - con Ahimaaz tu hijo y Jonatán hijo de Abiatar
  - y con Ahimaaz tu hijo y Jonatán hijo de Abiatar
  lexicon: HALOT
  rationale: 'Sigo el orden aclarado por la revisión inglesa: primero la frase resumen “tus dos hijos contigo”, luego la identificación appositiva de los nombres. Mantengo las genealogías explícitas para no diluir la estructura hebrea.'
- source_word: שְׁנֵ֥י בְנֵי/כֶ֖ם
  english_pob_choice: your two sons
  chosen_spanish: tus dos hijos
  alternatives_spanish:
  - los dos hijos tuyos
  - ambos tus hijos
  lexicon: HALOT
  rationale: La expresión resume a Ahimaaz y Jonatán conjuntamente. “Tus dos hijos” es la forma más natural y fiel al valor colectivo del hebreo.
- source_word: אִתְּ/כֶֽם
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - con vosotros
  lexicon: HALOT
  rationale: El hebreo usa el singular dirigido a Sadoc; en español, “contigo” reproduce mejor la relación directa e íntima que una forma plural.
- source_word: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙
  english_pob_choice: Then the king said
  chosen_spanish: Entonces el rey dijo
  alternatives_spanish:
  - Y el rey dijo
  - Luego el rey dijo
  lexicon: HALOT
  rationale: “Entonces” da continuidad narrativa natural y conserva el avance secuencial del waw hebreo. “El rey” sigue siendo la referencia explícita a David en este contexto.
- source_word: צָד֣וֹק הַ/כֹּהֵ֔ן
  english_pob_choice: Zadok the priest
  chosen_spanish: Sadoc el sacerdote
  alternatives_spanish:
  - Sadoc, el sacerdote
  - el sacerdote Sadoc
  lexicon: HALOT
  rationale: “El sacerdote” traduce כהן con el término bíblico directo y claro. No se sustituye por un título eclesiástico más cargado teológicamente que el hebreo.
theological_decisions:
- issue: Posible lectura de הֲרוֹאֶה como título/función de “vidente” frente a una simple pregunta sobre ver
  english_pob_reading: Are you a seer?
  chosen_spanish_reading: ¿Eres un vidente?
  alternative_spanish_readings:
  - ¿Ves?
  - ¿Eres un[a] vidente?
  rationale: La POB inglesa preserva la tensión entre una lectura funcional (“seer”) y una interrogativa sobre ver/percepción. En español, “vidente” mantiene esa ambigüedad y evita reducir el pasaje a mera visión física.
  doctrine_reference: 1 Samuel 9:9; 2 Samuel 24:11
- issue: Conservación de שָׁלוֹם sin convertirlo en un simple saludo
  english_pob_reading: in peace
  chosen_spanish_reading: en paz
  alternative_spanish_readings:
  - seguro
  - en bienestar
  rationale: El contexto es la instrucción de David a Sadoc para regresar sin violencia ni peligro. “En paz” mantiene el peso semántico de shalom sin perder inteligibilidad.
  doctrine_reference: Números 6:26; 1 Samuel 1:17
translation_notes:
  revision_awareness: 'La revisión inglesa reordenó la frase final para reflejar con mayor claridad el hebreo: primero el resumen colectivo “your two sons with you”, y luego la identificación appositiva “Ahimaaz your son and Jonathan son of Abiathar”. La redacción española sigue ese mismo orden aclarado y conserva la ambigüedad de הֲרוֹאֶה mediante “vidente”.'
  spanish_consistency_notes:
  - Se usa “Yahvé” como norma del proyecto cuando aparezca el tetragrámaton; aquí no aparece.
  - Se mantiene “Sadoc” como forma española del nombre propio, siguiendo uso bíblico estándar y la transliteración hispana habitual.
  - “El sacerdote” traduce כהן de manera directa y no eclesiástica.
  - La puntuación reproduce el cierre del discurso directo con comillas españolas y mantiene el ritmo narrativo breve del versículo.
