translation:
  language: es
  text: 'Porque así dice el Señor Yahvé: He aquí, yo traigo contra Tiro a Nabucodonosor[a], rey de Babilonia, desde el norte, rey de reyes, con caballos, carros, jinetes y una asamblea y un pueblo numeroso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La grafía hebrea aquí corresponde más de cerca a «Nabucodrezar»; la tradición española suele usar «Nabucodonosor».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación profética del oráculo de juicio. En español, 'Porque' conserva la conexión causal/discursiva sin sonar forzado.
- source_word: כֹה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - de este modo dice
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. 'Así dice' es natural en español y mantiene el valor solemne del hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se preserva el nombre divino como 'Yahvé' según la convención del proyecto, en lugar de ocultarlo tras 'SEÑOR'. 'Señor' traduce אֲדֹנָי; la combinación refleja el título compuesto del hebreo.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: Marca una autoanunciación solemne de Dios. 'He aquí' reproduce bien el tono profético y la deixis intensiva.
- source_word: מֵבִיא אֶל
  english_pob_choice: I am bringing against
  chosen_spanish: traigo contra
  alternatives_spanish:
  - estoy trayendo contra
  - traeré contra
  lexicon: HALOT
  rationale: En este contexto bélico de juicio, אֶל se expresa mejor como 'contra'. El participio con הִנְנִי indica acción inminente; 'traigo' mantiene la vivacidad profética sin sobrerrogar el tiempo verbal.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  - la ciudad de Tiro
  lexicon: HALOT
  rationale: Nombre geográfico tradicional en español; es claro y ampliamente reconocido.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodrezar
  - Nebucadrezar
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y reconocible. La variante hebrea más cercana se documenta como alternativa en el audit trail inglés, pero no se impone en el texto principal.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - rey de Babel
  lexicon: HALOT
  rationale: Traducción directa y estable del constructo. 'Babilonia' es la forma usual en español bíblico y moderno.
- source_word: מִצָּפוֹן
  english_pob_choice: from the north
  chosen_spanish: desde el norte
  alternatives_spanish:
  - del norte
  - del lado del norte
  lexicon: HALOT
  rationale: '''Desde el norte'' conserva el valor direccional/origen del hebreo con buena naturalidad en español.'
- source_word: מֶלֶךְ מְלָכִים
  english_pob_choice: king of kings
  chosen_spanish: rey de reyes
  alternatives_spanish:
  - rey sobre reyes
  - rey entre reyes
  lexicon: HALOT
  rationale: La construcción appositiva expresa supremacía imperial. 'Rey de reyes' conserva el paralelismo y la fuerza idiomática del hebreo sin añadir una lectura teológica ajena al contexto.
- source_word: בְּסוּס
  english_pob_choice: with horses
  chosen_spanish: con caballos
  alternatives_spanish:
  - con corceles
  - con caballería
  lexicon: HALOT
  rationale: El sustantivo colectivo se vierte de forma natural en plural en español.
- source_word: וּבְרֶכֶב
  english_pob_choice: and chariots
  chosen_spanish: carros
  alternatives_spanish:
  - y carros
  - y carros de guerra
  lexicon: HALOT
  rationale: El contexto militar hace que 'carros' sea suficiente y claro; el sentido bélico se sobreentiende por la lista de fuerzas.
- source_word: וּבְפָרָשִׁים
  english_pob_choice: and horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - y caballería
  - y hombres de a caballo
  lexicon: HALOT
  rationale: '''Jinetes'' corresponde de modo directo al personal montado y evita la abstracción de ''caballería''.'
- source_word: וְקָהָל
  english_pob_choice: and an assembly
  chosen_spanish: una asamblea
  alternatives_spanish:
  - un conjunto
  - una multitud
  lexicon: HALOT
  rationale: '''Asamblea'' conserva el valor de grupo reunido/contingente, sin precisar indebidamente su organización.'
- source_word: וְעַם רָב
  english_pob_choice: and a numerous people
  chosen_spanish: un pueblo numeroso
  alternatives_spanish:
  - y mucha gente
  - y un gran pueblo
  lexicon: HALOT
  rationale: '''Pueblo numeroso'' reproduce el sustantivo עַם con el adjetivo רָב de forma natural y sobria, manteniendo el carácter colectivo del original.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: Se preserva el Tetragrámaton como 'Yahvé' según la terminología del proyecto, en vez de ocultarlo bajo una máscara tipográfica. 'Señor' traduce אֲדֹנָי; la combinación mantiene la distinción del título compuesto y la claridad para el lector.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de מֶלֶךְ מְלָכִים
  english_pob_reading: king of kings
  chosen_spanish_reading: rey de reyes
  alternative_spanish_readings:
  - rey sobre reyes
  - rey entre reyes
  rationale: En este contexto, la frase funciona como aposición de supremacía política para Nabucodonosor, no como título exclusivo de uso posterior. 'Rey de reyes' conserva la forma hebrea y evita sobrerinterpretar el sintagma.
  doctrine_reference: 'Ezequiel 26:7: título imperial apposicional, no formulación cristológica'
translation_notes:
  revision_awareness: He seguido el texto hebreo y el audit trail inglés, manteniendo el cambio de revisión que eliminó el artículo innecesario antes de 'rey de reyes'. No se requirieron notas al pie porque no se preservó ninguna alternativa textual en el texto español principal.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se evitó 'SEÑOR' como máscara tipográfica para el nombre divino.
  - '''Tiro'', ''Babilonia'' y ''Nabucodonosor'' siguen las formas españolas estándar y audibles.'
  - 'La lista militar se mantuvo concreta y paralela: caballos, carros, jinetes.'
  - No se añadió artículo antes de 'rey de reyes', siguiendo la revisión auditada del inglés.
