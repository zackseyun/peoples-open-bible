translation:
  language: es
  text: No torcerás el derecho del extranjero residente[a] ni del huérfano, ni tomarás en prenda la prenda de vestir de la viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forastero» o «extranjero». El término hebreo designa a una persona no nativa que vive entre Israel bajo sus protecciones sociales y legales.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַטֶּה
  english_pob_choice: pervert
  chosen_spanish: pervertirás
  alternatives_spanish:
  - desviarás
  - torcerás
  - falsearás
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto jurídico expresa torcer o desviar un fallo o derecho. En español, «pervertir» comunica bien la corrupción de un derecho/juicio, con fuerza jurídica semejante a la elección inglesa.
- source_word: מִשְׁפַּט
  english_pob_choice: the justice due to
  chosen_spanish: el derecho
  alternatives_spanish:
  - la justicia
  - el juicio
  - la justicia debida a
  lexicon: HALOT
  rationale: En esta cláusula el sustantivo apunta al derecho o reclamación justa de una persona vulnerable. «El derecho» permite una formulación natural en español y conserva la idea de una pretensión legal protegida.
- source_word: גֵּר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - extranjero residente
  - residente extranjero
  - inmigrante
  lexicon: HALOT
  rationale: El hebreo designa a una persona no nativa que vive dentro de la comunidad y está bajo protección legal. «Forastero» es más breve y natural en español, aunque en una nota se conserva la precisión social-jurídica del término.
- source_word: יָתוֹם
  english_pob_choice: orphan
  chosen_spanish: huérfano
  alternatives_spanish:
  - huérfano de padre
  - sin padre
  lexicon: HALOT
  rationale: El término denota al menor privado de la protección paterna. «Huérfano» es la opción clara y estándar en español, como en la decisión inglesa.
- source_word: תַחֲבֹל
  english_pob_choice: take ... as a pledge
  chosen_spanish: tomar en prenda
  alternatives_spanish:
  - tomar como garantía
  - recibir como prenda
  - empeñar
  lexicon: HALOT
  rationale: El verbo en lenguaje legal indica tomar un objeto como garantía por una deuda. «Tomar en prenda» reproduce con precisión el sentido jurídico y suena natural en español bíblico contemporáneo.
- source_word: בֶּגֶד
  english_pob_choice: garment
  chosen_spanish: la ropa
  alternatives_spanish:
  - el manto
  - la vestidura
  - la prenda
  lexicon: HALOT
  rationale: El hebreo es un término amplio para ropa o vestidura. «La ropa» es comprensible y no especifica indebidamente el tipo de prenda.
- source_word: אַלְמָנָה
  english_pob_choice: widow’s
  chosen_spanish: de la viuda
  alternatives_spanish:
  - de una viuda
  - viuda
  lexicon: HALOT
  rationale: El posesivo español conserva la protección legal de una mujer viuda, sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: Categoría legal de גֵּר
  english_pob_reading: sojourner
  chosen_spanish_reading: forastero
  alternative_spanish_readings:
  - extranjero residente
  - residente extranjero
  - forastero residente
  rationale: La elección mantiene la idea de una persona no nativa integrada bajo la protección de la ley de Israel. «Forastero» es menos técnico que «extranjero residente», pero en el cuerpo del texto resulta más fluido; la nota preserva la precisión social-jurídica.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en lectura y alcance; no hay cambios revisados posteriores que afecten la formulación española. Se mantuvo la estructura legal negativa y la protección de tres sujetos vulnerables, con una sola nota para la ambigüedad de גֵּר.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo negativo de dos cláusulas con «ni».
  - «Derecho» evita sobrecargar «justicia» y conserva el valor jurídico de מִשְׁפָּט.
  - No se especificó el tipo de prenda ni de ropa, en línea con el hebreo general.
  - Se usó «viuda» en singular possessivo para reflejar el sustantivo hebreo en su función legal.
