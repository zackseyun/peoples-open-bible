base_translation:
  language: en
  yaml_path: translation/ot/isaiah/032/004.yaml
  text: The heart of the hasty will understand knowledge[b][a], and the tongue of stammerers will hasten to speak clearly.
  footnotes:
  - marker: a
    text: Or 'the rash' instead of 'the hasty.' The Hebrew describes those who are impulsive or quick in judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be quick to speak plainly/distinctly.'
    reason: lexical_alternative
