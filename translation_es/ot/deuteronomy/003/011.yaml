translation:
  language: es
  text: Porque solo Og, rey de Basán, quedó del resto de los refaítas[a]. Mira, su cama era una cama de hierro. ¿No está en Rabá de los amonitas? Su longitud era de nueve codos y su anchura de cuatro codos[b], según el codo de un hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los gigantes». Hebreo רְפָאִים, nombre de un pueblo antiguo probablemente asociado con gran estatura.
    reason: alternative_reading
  - marker: b
    text: 'O «según un codo ordinario» o «de acuerdo con el codo común». El hebreo dice literalmente: «por el codo de un hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: HALOT
  rationale: La partícula restringe de forma exclusiva al sujeto mencionado; «solo» expresa esa exclusividad de manera natural en español sin añadir énfasis innecesario.
- source_word: נִשְׁאַר מִיֶּתֶר
  english_pob_choice: was left of the remnant of
  chosen_spanish: quedó de
  alternatives_spanish:
  - quedó del remanente de
  - sobrevivió del resto de
  lexicon: HALOT
  rationale: El hebreo combina el verbo con la idea de residuo; en español, «quedó de» transmite con concisión que Og fue el único que permaneció de ese grupo remanente.
- source_word: הָרְפָאִים
  english_pob_choice: the Rephaim
  chosen_spanish: los refaítas
  alternatives_spanish:
  - los Refaím
  - los gigantes
  lexicon: HALOT
  rationale: Se conserva el nombre del grupo como término transliterado y adaptado al español, en vez de sustituirlo por la glosa interpretativa «gigantes», para no borrar la tensión lexical del hebreo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, observa
  lexicon: HALOT
  rationale: La forma deíctica introduce una referencia visible o conocida; «Mira» mantiene la fuerza apelativa con español contemporáneo y digno.
- source_word: עַרְשׂוֹ ... עֶרֶשׂ
  english_pob_choice: his bed was a bed
  chosen_spanish: su cama era una cama
  alternatives_spanish:
  - su lecho era un lecho
  - su cama era una tarima
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática del sustantivo, como en el hebreo, y «cama» es el equivalente más natural y amplio en este contexto, sin forzar un sentido funerario no exigido por el pasaje.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - de hierro
  lexicon: HALOT
  rationale: Término material directo y sin ambigüedad; en español se mantiene la sustancia nombrada por el hebreo.
- source_word: בְּרַבַּת בְּנֵי עַמּוֹן
  english_pob_choice: in Rabbah of the Ammonites
  chosen_spanish: en Rabá de los amonitas
  alternatives_spanish:
  - en Rabá de los hijos de Amón
  - en Rabat de los amonitas
  lexicon: HALOT
  rationale: Se usa el nombre geográfico asentado en español bíblico, «Rabá», y el etnónimo se naturaliza como «amonitas» para evitar una construcción más pesada que el hebreo original.
- source_word: תֵּשַׁע אַמּוֹת ... וְאַרְבַּע אַמּוֹת
  english_pob_choice: nine cubits ... four cubits
  chosen_spanish: nueve codos ... cuatro codos
  alternatives_spanish:
  - nueve medidas ... cuatro medidas
  lexicon: HALOT
  rationale: Se conservan las medidas antiguas sin convertirlas, para respetar la forma y el efecto retórico del texto fuente.
- source_word: בְּאַמַּת אִישׁ
  english_pob_choice: by the cubit of a man
  chosen_spanish: según el codo de un hombre
  alternatives_spanish:
  - por el codo de un hombre
  - según un codo ordinario
  lexicon: HALOT
  rationale: La frase se traslada de modo bastante literal para conservar la posible referencia a una medida humana estándar, sin decidir de antemano entre las alternativas interpretativas.
theological_decisions:
- issue: Cómo representar הָרְפָאִים sin sustituir el término por una interpretación
  english_pob_reading: the Rephaim; likely the name of an ancient people associated with great size
  chosen_spanish_reading: los refaítas
  alternative_spanish_readings:
  - los gigantes
  rationale: La traducción preserva el nombre del grupo y deja al lector la inferencia sobre su asociación con gran tamaño. Así no se pierde la opción lexical documentada ni se convierte una posible implicación en el significado principal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo entender עֶרֶשׂ en este contexto
  english_pob_reading: bed
  chosen_spanish_reading: cama
  alternative_spanish_readings:
  - lecho
  - bier
  - sarcófago
  rationale: El contexto inmediato presenta dimensiones de un objeto de gran tamaño, y «cama» es la opción más natural en español. No se adopta un sentido funerario porque el hebreo no lo exige aquí y la audit trail lo mantiene como alternativa no preferida.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que ajustó la relación preposicional de «from the remnant» a «of the remnant»; por eso se eligió «quedó de» en vez de una formulación más pesada. Se mantuvieron sin cambios las demás decisiones del contexto auditado.
  spanish_consistency_notes:
  - Se preserva la distinción entre nombre propio transliterado («refaítas») y glosa interpretativa alternativa en nota.
  - Se mantiene el paralelismo léxico «su cama era una cama» para reflejar la repetición enfática del hebreo.
  - «Codos» y «codo de un hombre» conservan la medida antigua y la posible nota de medida estándar sin convertirla.
  - El tono es sobrio y publicable, evitando tanto arcaísmos excesivos como paráfrasis expansivas.
