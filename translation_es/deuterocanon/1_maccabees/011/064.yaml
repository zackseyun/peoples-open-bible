- from: Y fue a encontrarse con ellos[a], pero dejó a su hermano Simón en la región.
  to: Y fue a encontrarse con ellos[a], y dejó a su hermano Simón en el territorio.
  rationale: Se ajusta la coordinación para no imponer una adversativa más fuerte que el griego δέ, y se cambia «región» por «territorio» para que la nota léxica conserve alternativas reales y refleje mejor el rango semántico de χώρα.
