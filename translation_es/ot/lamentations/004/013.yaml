base_translation:
  language: en
  yaml_path: translation/ot/lamentations/004/013.yaml
  text: Because of the sins of her prophets[a], the iniquities of her priests, who poured out in her midst the blood of the righteous[b],
  footnotes:
  - marker: a
    text: Or 'who shed in her midst the blood of the righteous.' The Hebrew participle can be rendered with either 'poured out' or the more idiomatic 'shed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the innocent.' The Hebrew צַדִּיקִים more literally means 'the righteous ones.'
    reason: lexical_alternative
