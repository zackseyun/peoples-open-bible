translation:
  language: es
  text: Muchos[a], por causa de la maldad, se apartaron; tuvieron miedo de ser defraudados en vano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Muchos se apartaron a causa del mal; temieron ser engañados sin compensación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Muchas personas
  lexicon: LSJ
  rationale: El sujeto es indefinido y plural; "Muchos" conserva la generalización con naturalidad en español y evita añadir un sustantivo que el griego no expresa.
- source_word: χάριν πονηρίας
  english_pob_choice: because of wickedness
  chosen_spanish: por causa de la maldad
  alternatives_spanish:
  - a causa de la maldad
  - por la maldad
  - por causa de la perversidad
  lexicon: LSJ
  rationale: χάριν con genitivo funciona aquí con valor causal, no como "gracia". "Por causa de" comunica la relación causal de manera clara y bíblica; "maldad" conserva la fuerza ética del término griego.
- source_word: ἀπέστρεψαν
  english_pob_choice: turned away
  chosen_spanish: se apartaron
  alternatives_spanish:
  - se volvieron atrás
  - se retiraron
  - se desviaron
  lexicon: LSJ
  rationale: El verbo expresa apartarse o retirarse. "Se apartaron" es idiomático en español y mantiene la idea de retirada o negativa a actuar que exige el contexto.
- source_word: ἀποστερηθῆναι
  english_pob_choice: being defrauded
  chosen_spanish: ser defraudados
  alternatives_spanish:
  - ser privados
  - ser despojados
  - ser engañados
  lexicon: LSJ
  rationale: El pasivo infinitivo sugiere sufrir una pérdida injusta o fraudulenta. "Ser defraudados" conserva esa fuerza económica y moral sin volverla demasiado general.
- source_word: δωρεὰν
  english_pob_choice: gratuitously
  chosen_spanish: gratuitamente
  alternatives_spanish:
  - sin compensación
  - sin motivo
  - en vano
  lexicon: LSJ
  rationale: Aquí δωρεάν no significa "gratis" en sentido neutral, sino "sin retribución / sin compensación" y con la idea de una pérdida injusta. "Gratuitamente" refleja bien el matiz formal del audit trail inglés y sugiere "sin causa/compensación".
- source_word: εὐλαβήθησαν
  english_pob_choice: were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - fueron cautelosos
  - temieron
  - estuvieron recelosos
  lexicon: LSJ
  rationale: En este contexto económico, el verbo expresa temor práctico ante un posible perjuicio. "Tuvieron miedo" comunica con claridad la motivación de su conducta sin introducir un matiz religioso ajeno al pasaje.
theological_decisions:
- issue: Valor moral de πονηρίας en un contexto sapiencial y económico
  english_pob_reading: wickedness
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - perversidad
  - maldad moral
  - maldad / mal proceder
  rationale: El griego presenta una evaluación moral negativa ligada a la conducta social en el préstamo. "Maldad" preserva el juicio ético sin especificar más de lo que el texto obliga, y permite mantener la conexión con el temor a ser defraudados.
  doctrine_reference: Principio de primacía del texto original y de conservación de la fuerza ética del vocabulario sapiencial.
- issue: Matiz de δωρεάν en una frase de pérdida financiera
  english_pob_reading: gratuitously
  chosen_spanish_reading: gratuitamente
  alternative_spanish_readings:
  - sin compensación
  - sin retribución
  - sin causa
  rationale: La revisión inglesa prefirió un registro más formal que "for nothing". En español, "gratuitamente" conserva ese registro y el sentido de pérdida injusta o inmerecida, sin diluirlo en una mera idea de gratuidad benigna.
  doctrine_reference: Transparencia auditada y fidelidad semántica con respeto al registro del texto fuente.
translation_notes:
  revision_awareness: Se siguió el giro revisado del contexto inglés, que pasó de una formulación más coloquial a "gratuitously" para reflejar con mayor precisión δωρεάν. Por eso el español usa "gratuitamente" en un registro formal y "por causa de la maldad" para conservar el valor causal de χάριν con genitivo.
  spanish_consistency_notes:
  - Se mantuvo "maldad" para πονηρία, coherente con la valoración moral del contexto sapiencial.
  - '"Se apartaron" reproduce el valor de retirada/alejamiento de ἀπέστρεψαν sin sobrerinterpretar.'
  - La nota alternativa conserva la ambigüedad útil entre defraudación y engaño, ya presente en el audit trail inglés.
  - No se usó "SEÑOR" ni terminología cristológica, porque el versículo no contiene nombres divinos ni títulos mesiánicos.
