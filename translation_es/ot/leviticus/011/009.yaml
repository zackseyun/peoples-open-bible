translation:
  language: es
  text: 'De todo lo que hay en las aguas, esto podrán comer: todo lo que en las aguas, en los mares y en las corrientes[a], tenga aletas y escamas, eso podrán comer.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ríos' para 'corrientes' (hebreo נְחָלִים), un término que puede referirse a arroyos, cauces de río o wadis según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת זֶה
  english_pob_choice: These you may eat
  chosen_spanish: Estas podrán comer
  alternatives_spanish:
  - Esto podrán comer
  - Estas podrán comer de esto
  lexicon: HALOT
  rationale: El hebreo usa un demostrativo con valor de encabezado legal. En español, el plural femenino 'Estas' concuerda naturalmente con los animales implícitos y refleja el ajuste revisado de la POB inglesa al plural del contexto.
- source_word: תֹּאכְל֔וּ
  english_pob_choice: you may eat
  chosen_spanish: podrán comer
  alternatives_spanish:
  - podrán comer
  - pueden comer
  - deben comer
  lexicon: HALOT
  rationale: La forma legal permisiva se expresa mejor con 'podrán comer', que comunica autorización sin volverla obligatoria. 'Comer' conserva la fuerza concreta del hebreo en una norma dietética.
- source_word: מִכֹּל אֲשֶׁר בַּמָּיִם
  english_pob_choice: from all that are in the waters
  chosen_spanish: de todo lo que hay en las aguas
  alternatives_spanish:
  - de todo lo que está en las aguas
  - entre todo lo que hay en las aguas
  lexicon: HALOT
  rationale: '''מִן'' tiene sentido partitivo, y ''todo lo que hay en las aguas'' mantiene el alcance general del hebreo. Se prefiere ''aguas'' en plural para conservar el plural bíblico.'
- source_word: כֹּל אֲשֶׁר ל/וֹ
  english_pob_choice: whatever in the waters ... has
  chosen_spanish: todo lo que hay en las aguas
  alternatives_spanish:
  - todo lo que tiene
  - cualquier cosa que tenga
  lexicon: HALOT
  rationale: El relativo distributivo se integra en una construcción española natural. El valor posesivo de ל/וֹ queda expresado por la relación verbal 'hay/tenga' según el contexto inmediato.
- source_word: סְנַפִּיר
  english_pob_choice: fins
  chosen_spanish: aletas
  alternatives_spanish:
  - aletas
  - aleta
  lexicon: HALOT
  rationale: '''Aletas'' es el equivalente zoológico idiomático en español y funciona bien con el par técnico ''aletas y escamas''. Aunque el hebreo es singular, en español el plural es más natural como nombre de clase.'
- source_word: וְקַשְׂקֶשֶׂת
  english_pob_choice: scales
  chosen_spanish: escamas
  alternatives_spanish:
  - escamas
  - escama
  lexicon: HALOT
  rationale: Como término de clasificación animal, 'escamas' es la forma idiomática en español y preserva el valor de clase del hebreo.
- source_word: בַּמָּיִם
  english_pob_choice: in the waters
  chosen_spanish: en las aguas
  alternatives_spanish:
  - en el agua
  - en las aguas
  lexicon: HALOT
  rationale: Se conserva el plural hebreo y el ritmo repetido de la cláusula legal. 'En las aguas' también evita reducir el término a una masa singular.
- source_word: בַּיַּמִּים וּבַנְּחָלִים
  english_pob_choice: in the seas and in the streams
  chosen_spanish: en los mares y en los ríos
  alternatives_spanish:
  - en los mares y en las corrientes
  - en los mares y en los arroyos
  lexicon: HALOT
  rationale: '''יַמִּים'' se rinde con ''mares'' y ''נְחָלִים'' se traduce aquí como ''ríos'' para una lectura amplia y comprensible en español. La POB inglesa anotó ''streams'' con una nota sobre ''rivers''; el español adopta ''ríos'' como equivalente natural dentro de ese mismo campo semántico.'
- source_word: אֹתָם תֹּאכֵֽלוּ
  english_pob_choice: these you may eat
  chosen_spanish: estas podrán comer
  alternatives_spanish:
  - estas podrán comer
  - las podrán comer
  lexicon: HALOT
  rationale: El demostrativo final retoma y enfatiza a los animales permitidos. Se mantiene la concordancia femenina plural con el referente implícito y con el demostrativo inicial.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: se adopta el plural demostrativo inicial y final (''Estas... estas'') para concordar con el sentido del hebreo, y se mantiene la lista de medios acuáticos con una nota lexical donde el inglés POB preservó la alternativa ''rivers/streams''.'
  spanish_consistency_notes:
  - Se conserva 'aguas' en plural para reflejar el hebreo y evitar la singularización estilística.
  - Se usa 'podrán comer' como permiso legal, no como mandato.
  - '''Aletas y escamas'' se mantiene como pareja técnica estable en español bíblico y zoológico.'
  - La nota sobre נְחָלִים se ancla en el término 'ríos' para señalar la alternativa semántica sin sobrecargar el texto principal.
