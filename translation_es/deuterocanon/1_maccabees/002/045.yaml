revisions:
- from: Y Matatías y sus hijos anduvieron por allí y derribaron sus altares,
  to: Y Matatías y sus hijos fueron por todas partes y derribaron sus altares,
  rationale: Se reemplaza 'anduvieron por allí' por 'fueron por todas partes' para reflejar mejor el valor de ἐκύκλωσεν como recorrido deliberado sin sugerir un cerco militar. Se mantiene 'derribaron sus altares' porque preserva bien καθεῖλον τοὺς βωμοὺς αὐτῶν y la referencia contextual a los altares ilícitos de los opositores.
