id: PHP.2.7
reference: Philippians 2:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ ἑαυτὸν ἐκένωσεν μορφὴν δούλου λαβών, ἐν ὁμοιώματι ἀνθρώπων γενόμενος· καὶ σχήματι εὑρεθεὶς ὡς ἄνθρωπος
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/007.yaml
  text: 'but emptied himself, taking the form of a slave, becoming in the likeness of men; and being found in appearance as a man'
translation:
  language: ko
  text: 도리어 자기를 비우셔서[a] 노예[c]의 형체[b]를 취하시고, 사람들의 모습[e]으로 나심으로써[d], 그 외양[f]에서도 사람으로 발견되셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자기를 무로 만드셨다」. 헬라어 ἐκένωσεν은 「비우다」를 뜻하며, 이어지는 분사들이 그 자기 비움의 방식을 설명한다. 본 번역은 후대 케노시스 이론을 본문에 끌어들이지 않고 본문 비유 그대로를 보존한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「종의 형체」. 헬라어 μορφή는 본질적 정체를 드러내는 「형체」를 가리키며 6절의 「하나님의 형체」와 의도적 평행을 이룬다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「종」. 헬라어 δοῦλος는 매임(bonded status)을 본질로 하며, 본 절의 자기 낮춤의 무게를 살리기 위해 DOCTRINE.md 원칙과 영어 POB의 결정에 따라 「노예」로 옮긴다.
    reason: lexical_alternative
  - marker: d
    text: '헬라어: γενόμενος ἐν ὁμοιώματι ἀνθρώπων — 문자적으로는 「사람들의 모습 속에 되심」. 「나심」은 출생의 의미를 본문이 말하지 않는 것을 더하지 않고 담아낸다.'
    reason: cross_reference
  - marker: e
    text: 또는 「사람의 모양」. 헬라어 ὁμοίωμα는 「모습·유사」를 뜻하며, 본문은 메시아의 참된 인성을 부정하지 않는다.
    reason: lexical_alternative
  - marker: f
    text: 헬라어 σχῆμα는 외적 모양(visible mode)을 가리키며, 6·7절의 μορφή(형체)와 구분된다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_korean: 도리어
  alternatives_korean:
  - 오히려
  - 그러나
  lexicon: BDAG
  rationale: 강한 대조를 표시하는 어휘. 「도리어」가 앞 절의 부정과 자기 비움의 대조를 가장 자연스럽게 살린다.
- source_word: ἑαυτὸν ἐκένωσεν
  english_pob_choice: emptied himself
  chosen_korean: 자기를 비우셔서
  alternatives_korean:
  - 자기를 비우셨다
  - 자기를 무로 만드셨다
  - 자기를 부어내셨다
  lexicon: BDAG
  rationale: 글로사리에 정한 표준 표현. 「비우다」 비유를 그대로 보존하며, 이어지는 분사들이 그 자기 비움의 방식을 설명하도록 한다. 케노시스 이론적 해석을 본문에 끌어들이지 않는다.
- source_word: μορφὴν
  english_pob_choice: form
  chosen_korean: 형체
  alternatives_korean:
  - 본성
  - 신분
  - 본질
  lexicon: BDAG
  rationale: 6절의 μορφή θεοῦ와 의도적 평행을 이루는 어휘이므로 동일하게 「형체」로 옮긴다. 「모양」은 σχῆμα에 배정해 어휘 구분을 살린다.
- source_word: δούλου
  english_pob_choice: slave
  chosen_korean: 노예
  alternatives_korean:
  - 종
  - 하인
  lexicon: BDAG
  rationale: DOCTRINE.md 지침과 영어 POB의 결정에 따라, 매임(bonded status)이 드러나야 할 본문 흐름에서는 「노예」로 옮긴다. 자기 낮춤의 대조가 본 절의 핵심이므로 「종」으로 약화시키지 않는다.
- source_word: λαβών
  english_pob_choice: taking
  chosen_korean: 취하시고
  alternatives_korean:
  - 받으시고
  - 가지심으로
  lexicon: BDAG
  rationale: 부정과거 분사로 자기 비움의 방식을 설명한다. 한국어 「취하시고」가 자연스러우면서 분사적 연결을 보존한다.
- source_word: γενόμενος ἐν ὁμοιώματι ἀνθρώπων
  english_pob_choice: being born in human likeness
  chosen_korean: 사람들의 모습으로 나심으로써
  alternatives_korean:
  - 사람들의 모양 가운데 되심으로써
  - 사람의 유사함 속에 들어오심으로써
  - 사람들의 모습으로 오심으로써
  lexicon: BDAG
  rationale: γίνομαι + ἐν 구문은 성육신적 맥락에서 출생·존재화의 의미를 함께 담는다. 「나심」은 본문이 말하지 않는 것을 덧붙이지 않으면서 γίνομαι의 「되어 들어옴」을 자연스럽게 담는다. ὁμοίωμα는 「모습」으로 옮겨 참된 인성을 부정하지 않는 어조를 살린다.
- source_word: σχήματι εὑρεθεὶς ὡς ἄνθρωπος
  english_pob_choice: being found in human form
  chosen_korean: 그 외양에서도 사람으로 발견되셨다
  alternatives_korean:
  - 외적 모양으로 사람으로 인지되셨다
  - 그 모양에서 사람으로 보이셨다
  lexicon: BDAG
  rationale: σχῆμα는 외적 모양(visible mode)을 가리키며 앞의 μορφή(형체)와 구분된다. 「외양」으로 옮겨 두 어휘의 차이를 살린다. 「사람」은 헬라어 단수 ἄνθρωπος가 일반(generic)이므로 성별을 특정하지 않는 「사람」을 유지한다.
theological_decisions:
- issue: 'ἐκένωσεν의 기독론적 함의: 자기 비움'
  chosen_reading: 「자기를 비우다」 비유를 보존하고, 이어지는 분사들이 그 방식을 정의하도록 한다
  alternative_readings:
  - 「자기를 무로 만드셨다」
  - 신적 속성의 포기로 해석
  rationale: 본 절 자체가 자기 비움을 「노예의 형체를 취하심」과 「사람으로 나심」으로 설명한다. 동사를 문자 그대로 옮겨 본문의 신학적 긴장을 보존하며, 니케아·칼케돈의 경계와 충돌하는 케노시스 이론을 본문에 끌어들이지 않는다.
  doctrine_reference: Nicene Creed (381 AD); Definition of Chalcedon (451 AD)
- issue: ὁμοίωμα의 의미와 메시아의 참된 인성
  chosen_reading: 「모습」으로 옮기되 단순 외양·인성 부정의 어조를 도입하지 않는다
  alternative_readings:
  - 단순 외양으로 해석
  - 헬라어 표현보다 더 강한 동일시로 옮김
  rationale: 바울의 어휘를 그대로 보존해야 한다. 이어지는 「외양에서도 사람으로 발견되셨다」는 참된 인성을 부정하지 않고 보완한다. 번역은 헬라어가 정한 긴장 이상으로 해소하지 않는다.
  doctrine_reference: Definition of Chalcedon (451 AD)
- issue: δοῦλος를 「노예」로 옮김
  chosen_reading: 노예
  alternative_readings:
  - 종
  - 하인
  rationale: DOCTRINE.md는 매임이 드러나야 할 본문 흐름에서 δοῦλος를 「슬레이브」 어휘로 옮기도록 한다. 본 절의 자기 낮춤은 매임의 무게가 분명히 드러나야 하는 곳이므로 한국어 전통의 「종」보다는 「노예」를 채택한다.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος'
