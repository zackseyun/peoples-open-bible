translation:
  language: es
  text: Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH; tradicionalmente vertido ''el SEÑOR'' en versiones en inglés y ''el SEÑOR'' o ''Jehová'' en español. La forma elegida aquí preserva el Nombre divino.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: habló
  alternatives_spanish:
  - y habló
  - entonces habló
  - dijo
  lexicon: HALOT
  rationale: El wayyiqtol de דבר avanza la narración y en español natural se expresa mejor con un verbo de habla directo. Se mantiene el valor formal de introducción de discurso divino sin forzar un calco de 'and'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: La política en español del POB usa 'Yahvé' para el Tetragrámaton. Conserva el nombre propio del pacto y evita la sustitución por un título impersonal.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla; en español, 'a' es la forma natural y precisa para este complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español, inteligible y estándar en lectura eclesial.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula לֵאמֹר introduce el contenido del discurso; 'diciendo' preserva su función marcador de cita sin añadir contenido interpretativo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Nombre divino directamente. En la tradición POB no se enmascara con un título; en español 'Yahvé' mantiene la referencia al Nombre del pacto y la coherencia con la política editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y ninguna revisión pendiente; el hebreo coincide con la lectura auditada. No se requieren ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se conserva el nombre propio 'Yahvé' en lugar de una sustitución por mayúsculas o título eclesiástico.
  - '''Moisés'' y la puntuación de cita siguen el uso normal del español bíblico.'
  - '''diciendo'' mantiene la fórmula introductoria sin sobretraducirla.'
