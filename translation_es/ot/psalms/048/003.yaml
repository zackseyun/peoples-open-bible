revisions:
- from: Hermoso en elevación[a], el gozo de toda la tierra, es el monte Sion, en los confines del norte, la ciudad del gran Rey.
  to: Hermoso en lo alto[a], el gozo de toda la tierra, es Monte Sion, en los confines del norte, la ciudad del gran Rey.
  rationale: Se reemplaza «en elevación» por «en lo alto» para expresar נוֹף con un español más idiomático y poético, sin perder el matiz de altura. También se ajusta «el monte Sion» a «Monte Sion» por naturalidad como nombre geográfico en aposición. Se conserva la nota sobre «los confines del norte» porque la ambigüedad interpretativa de יַרְכְּתֵי צָפוֹן debe mantenerse visible. La marca [a] se conserva anclada al primer sintagma descriptivo, donde el lector percibe la descripción topográfica del monte.
