translation:
  language: es
  text: 'Jehú encontró a los hermanos[a] de Ahazías, rey de Judá, y dijo: «¿Quiénes son ustedes?». Ellos respondieron: «Nosotros somos los hermanos de Ahazías, y hemos bajado para preguntar por el bienestar[b] de los hijos del rey y de los hijos de la reina madre[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hermanos de Ahazías». En narrativa real, el término puede abarcar parientes cercanos o miembros del clan, no sólo hermanos literales.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para ver si todo estaba bien con los hijos del rey y los hijos de la reina madre».'
    reason: lexical_alternative
  - marker: c
    text: «Reina madre» traduce hebreo gebirah, un título cortesano para la madre del rey.
    reason: cultural_note
lexical_decisions:
- source_word: מָצָא
  english_pob_choice: found
  chosen_spanish: encontró
  alternatives_spanish:
  - halló
  - dio con
  lexicon: HALOT
  rationale: El verbo indica un encuentro real con el grupo; «encontró» es natural en español y mantiene la fuerza directa del hebreo.
- source_word: אֲחֵי אֲחַזְיָהוּ
  english_pob_choice: the brothers of Ahaziah
  chosen_spanish: los hermanos de Ahazías
  alternatives_spanish:
  - los parientes de Ahazías
  - los consanguíneos de Ahazías
  lexicon: HALOT
  rationale: Se conserva el término fuente «hermanos», como en la auditoría inglesa, sin resolverlo de antemano a un parentesco más amplio; la nota permite la amplitud posible en contexto real.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Correspondencia directa y idiomática del título real.
- source_word: מִי אַתֶּם
  english_pob_choice: Who are you?
  chosen_spanish: ¿Quiénes son ustedes?
  alternatives_spanish:
  - ¿Quiénes son?
  - ¿Quiénes son ustedes, pues?
  lexicon: HALOT
  rationale: En español la pregunta suena más natural con verbo copulativo explícito; mantiene la interrogación breve del hebreo.
- source_word: וַנֵּרֶד
  english_pob_choice: we have come down
  chosen_spanish: hemos bajado
  alternatives_spanish:
  - bajamos
  - hemos venido de arriba
  lexicon: HALOT
  rationale: «Bajado» conserva la imagen espacial del hebreo y funciona bien en el diálogo en español; el perfecto refleja la acción presentada como reciente o relevante para la explicación.
- source_word: לִשְׁלוֹם
  english_pob_choice: to ask about the welfare of
  chosen_spanish: para preguntar por el bienestar de
  alternatives_spanish:
  - para ver cómo estaban
  - para ver si todo iba bien con
  lexicon: HALOT
  rationale: La expresión hebrea pide una formulación explicativa en español para el sentido idiomático de indagar por la paz/bienestar de alguien, no un simple saludo.
- source_word: בְּנֵי הַמֶּלֶךְ
  english_pob_choice: the sons of the king
  chosen_spanish: los hijos del rey
  alternatives_spanish:
  - los hijos del monarca
  - los hijos del rey
  lexicon: HALOT
  rationale: «Hijos» es la opción más natural en español para el hebreo בני en este contexto de descendencia real; se conserva el paralelismo con la siguiente frase.
- source_word: הַגְּבִירָה
  english_pob_choice: the queen mother
  chosen_spanish: la reina madre
  alternatives_spanish:
  - la madre del rey
  - la gran señora
  lexicon: HALOT
  rationale: En contexto de corte judía, el término designa un cargo; «reina madre» comunica el valor institucional sin perder claridad.
- source_word: וּבְנֵי הַגְּבִירָה
  english_pob_choice: the sons of the queen mother
  chosen_spanish: los hijos de la reina madre
  alternatives_spanish:
  - los hijos de la madre del rey
  lexicon: HALOT
  rationale: Se mantiene el paralelismo sintáctico con «los hijos del rey» y la referencia a la figura cortesana.
translation_notes:
  revision_awareness: La auditoría inglesa mantiene una lectura altamente concordante y no registra revisiones aplicadas; por eso el español sigue de cerca el sentido hebreo con una sola nota lexical para «hermanos» y una nota cultural para gebirah, sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «reina madre» como término técnico de corte, coherente con la terminología POB.
  - Se mantiene el paralelismo «los hijos del rey / los hijos de la reina madre» para reflejar la estructura hebrea.
  - No se suaviza «hermanos» a «parientes» en el texto principal para no borrar la tensión lexical documentada en la fuente.
