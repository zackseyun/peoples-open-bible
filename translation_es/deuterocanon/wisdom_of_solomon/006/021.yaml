revisions:
- from: Por tanto[a], si os deleitáis en tronos y cetros, oh gobernantes de pueblos, honrad la sabiduría, para que reinéis para siempre.
  to: Por tanto[a], si se deleitan en tronos y cetros, gobernantes de pueblos, honren la sabiduría, para que reinen para siempre.
  rationale: Se ajusta el versículo al español neutro latinoamericano reemplazando «os deleitáis» por «se deleitan» y «honrad/reinéis» por «honren/reinen», manteniendo el mismo sentido del griego y del POB inglés. También se omite «oh» para una lectura más natural, sin alterar el vocativo ni la fuerza exhortativa. La nota léxica sobre τύραννοι se conserva sin cambios sustanciales.
