translation:
  language: es
  text: Y de entre todos mis hijos varones—porque Yahvé me ha dado muchos hijos—eligió a Salomón, mi hijo, para sentarse en el trono del reino de Yahvé sobre Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque Yahvé me dio muchos hijos». La cláusula hebrea es explicativa y en español puede expresarse con pretérito perfecto o con pretérito simple.'
    reason: lexical_alternative
  - marker: b
    text: «El trono del reino de Yahvé» subraya que la monarquía de Israel pertenece en último término a Yahvé, aunque Salomón sea el rey humano.
    reason: theological_note
lexical_decisions:
- source_word: וּמִכָּל
  english_pob_choice: And from among all
  chosen_spanish: Y de entre todos
  alternatives_spanish:
  - Y de todos
  - Y de entre
  lexicon: HALOT
  rationale: La combinación de la conjunción con מִן y כָּל expresa selección desde un conjunto; «de entre todos» comunica con naturalidad esa idea de elección dentro de un grupo.
- source_word: בָּנַי
  english_pob_choice: my sons
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos varones
  - mis hijos
  lexicon: HALOT
  rationale: El hebreo es literalmente «mis hijos/mi hijos varones», pero el contexto real es sucesorio y español suele decir «hijos» con valor masculino inclusivo del linaje. Se conserva la referencia paterna sin endurecer innecesariamente el género en la redacción principal.
- source_word: כִּי רַבִּים בָּנִים
  english_pob_choice: for ... many sons
  chosen_spanish: porque ... muchos hijos
  alternatives_spanish:
  - pues ... muchos hijos
  - ya que ... muchos hijos
  lexicon: HALOT
  rationale: כִּי introduce una cláusula explicativa. «Porque» mantiene la explicación causal/explicativa en español sin sobrecargarla.
- source_word: נָתַן לִי יְהוָה
  english_pob_choice: the LORD has given me
  chosen_spanish: Yahvé me ha dado
  alternatives_spanish:
  - Yahvé me dio
  - el SEÑOR me ha dado
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para יְהוָה: «Yahvé». El perfecto español expresa bien el resultado presente: David tiene muchos hijos porque Yahvé se los dio.'
- source_word: וַיִּבְחַר
  english_pob_choice: he chose
  chosen_spanish: eligió
  alternatives_spanish:
  - y eligió
  - escogió
  lexicon: HALOT
  rationale: El sujeto sigue siendo Yahvé por continuidad inmediata del discurso. «Eligió» es natural y fiel; evita repetir innecesariamente la conjunción narrativa si el español fluye mejor sin ella.
- source_word: בִּשְׁלֹמֹה בְנִי
  english_pob_choice: Solomon my son
  chosen_spanish: a Salomón, mi hijo
  alternatives_spanish:
  - en Salomón, mi hijo
  - Salomón, mi hijo
  lexicon: HALOT
  rationale: Con בחר, la preposición ב marca a la persona elegida; en español la estructura natural es «eligió a Salomón». Se conserva «mi hijo» para reflejar el sufijo posesivo.
- source_word: לָשֶׁבֶת
  english_pob_choice: to sit
  chosen_spanish: para sentarse
  alternatives_spanish:
  - para sentarse a reinar
  - para ocupar el trono
  lexicon: HALOT
  rationale: En contexto de trono, ישב significa «sentarse» como fórmula de reinar. «Para sentarse» mantiene la imagen original sin añadir una interpretación más explícita que el hebreo no exige aquí.
- source_word: עַל כִּסֵּא
  english_pob_choice: on the throne
  chosen_spanish: en el trono
  alternatives_spanish:
  - sobre el trono
  - en el trono
  lexicon: HALOT
  rationale: «En el trono» es el equivalente idiomático en español para lenguaje de entronización; comunica ubicación/función mejor que un calco más rígido.
- source_word: מַלְכוּת יְהוָה
  english_pob_choice: of the kingdom of the LORD
  chosen_spanish: del reino de Yahvé
  alternatives_spanish:
  - del reino de Yahvé
  - de la realeza de Yahvé
  - del reino del Yahvé
  lexicon: HALOT
  rationale: El constructo expresa que el reino pertenece a Yahvé. «Del reino de Yahvé» mantiene la afirmación teológica sin desplazarla a una formulación más abstracta como «realeza».
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre Israel
  - en Israel
  lexicon: HALOT
  rationale: עַל con lenguaje real indica dominio/autoridad. «Sobre Israel» conserva esa relación de gobierno que el inglés POB también preserva.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se aplica el estándar del proyecto para el Tetragrámaton. «Yahvé» conserva la referencia al nombre propio del Dios de Israel y evita la sustitución por un título que borra el dato del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Afirma que el reino es de Yahvé, aunque el rey humano es Salomón
  english_pob_reading: the throne of the kingdom of Yahweh ... emphasizes that Israel's monarchy belongs ultimately to Yahweh
  chosen_spanish_reading: el trono del reino de Yahvé sobre Israel
  alternative_spanish_readings:
  - el trono real de Israel
  - el trono del reino de Israel
  rationale: 'Se mantiene la atribución explícita del reino a Yahvé para no suavizar la afirmación teológica del hebreo: la monarquía davídica es delegada y derivada, no autónoma.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la verificación cruzada fue alto. La redacción española sigue de cerca el sentido del hebreo y del texto POB en inglés, conservando la cláusula explicativa, la elección de Salomón y la atribución del reino a Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el paralelismo entre la abundancia de hijos y la elección divina sin ampliar el contenido.
  - «Sobre Israel» mantiene el valor de dominio de עַל en lenguaje monárquico.
  - La formulación es idiomática en español latinoamericano sin perder la imagen de entronización.
