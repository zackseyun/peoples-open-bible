technical_vocabulary_note: 'Key Valentinian terms are kept with theological weight:
  Sonship (ⲥⲁⲛϩⲣⲉ) denotes a distinct salvific hypostasis; Unity (ⲙ̄ⲛ̄ⲧⲟⲩⲉⲉⲓ) is the
  One/Oneness as an active source; Error (ⲡⲗⲁⲛⲏ) is personified misguidance. ‘The
  All’ renders ⲡⲣⲏⲧⲉ as a reified totality. Motion verbs (‘go up’) are kept concrete
  to preserve the ascent motif. In the ‘Living Book’ passage, we preserve the letter
  imagery with technical grammatical terms (‘vowels’, ‘consonants’) and the metaphysical
  claim that each ‘letter’ is a complete ‘thought’, written by the Unity, to avoid
  flattening the contemplative theology.'
textual_note: 'The English reflects the sequence and imagery attested on Codex I p.
  22–23: naming/calling, hearing, answering, turning, ascent, doing the will, entering
  rest, and the metaphor of the Living Book’s letters. Where Codex I is syntactically
  compressed (e.g., the repeated ‘he prepared them’ and ‘he wrote them’ phrases),
  we render the parallelism as ‘He wrote them beforehand—having prepared them in his
  thought and in his will’ to reflect the double attestation of preparation and inscription.
  The phrase ‘Each letter is a complete thought, like a book that is complete’ translates
  ⲡⲥϩⲉⲓ ⲙ̄ⲡⲣⲏⲧⲉ ⲛ̄ⲛⲟⲩϫⲱⲱⲙ, taking ⲡⲣⲏⲧⲉ as ‘complete’ by sense parallel rather than
  as ‘the All’ in this subclause, to avoid an unnatural English repetition and to
  align with the letter/book comparison in context.'
