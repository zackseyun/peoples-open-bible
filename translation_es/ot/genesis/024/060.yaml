base_translation:
  language: en
  yaml_path: translation/ot/genesis/024/060.yaml
  text: And they blessed Rebekah and said to her[a], “Our sister, may you become thousands of ten thousands[b], and may your offspring possess the gate of those who hate them.”
  footnotes:
  - marker: a
    text: Or “myriads” or “countless multitudes”; literally “thousands of ten thousands.”
    reason: lexical_alternative
  - marker: b
    text: Or “inherit the gate of his enemies.” The Hebrew literally says “possess the gate of those who hate him,” using “gate” as an image of a city’s strength and control.
    reason: lexical_alternative
