translation:
  language: es
  text: Un hombre[a] que suele ser reprendido y endurece su cerviz, de repente será quebrantado, y no habrá remedio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Un hombre de muchas reprensiones, que endurece su cerviz, de repente será quebrantado, y no habrá remedio».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Una persona
  - Uno
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino representativo en un proverbio sapiencial. En español, «el hombre» mantiene el valor proverbial y la referencia genérica sin perder la forma marcada del original.
- source_word: תּוֹכָחוֹת
  english_pob_choice: often reproved
  chosen_spanish: que suele ser reprendido
  alternatives_spanish:
  - de reprensiones
  - reprendido muchas veces
  - de correcciones
  lexicon: HALOT
  rationale: La pluralidad hebrea comunica repetición de reprensión. «Que suele ser reprendido» conserva la idea de reproche reiterado de manera natural en español, sin convertir la expresión en una mera etiqueta nominal.
- source_word: מַקְשֶׁה עֹרֶף
  english_pob_choice: stiffening his neck
  chosen_spanish: endurece su cerviz
  alternatives_spanish:
  - endurece su cuello
  - es obstinado
  - se pone duro de cerviz
  lexicon: HALOT
  rationale: La imagen idiomática hebrea es la de la cerviz/cuello endurecido como señal de resistencia obstinada. «Endurece su cerviz» preserva el tropo corporal y es más fiel al registro bíblico que una paráfrasis como «es obstinado».
- source_word: פֶּתַע
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - en un instante
  - de pronto
  lexicon: HALOT
  rationale: El adverbio marca la abrupta llegada del quiebre. «De repente» es natural en español y conserva la inmediatez del término hebreo.
- source_word: יִשָּׁבֵר
  english_pob_choice: will be broken
  chosen_spanish: será quebrantado
  alternatives_spanish:
  - será roto
  - será quebrado
  - será destrozado
  lexicon: HALOT
  rationale: 'El nifal de שׁבר expresa pasividad: ser quebrado/roto. «Será quebrantado» mantiene el sentido de ruptura con un matiz bíblico y solemne, sin especificar si la fractura es física, moral o judicial.'
- source_word: וְאֵין מַרְפֵּא
  english_pob_choice: beyond healing
  chosen_spanish: y no habrá remedio
  alternatives_spanish:
  - y no habrá sanidad
  - y no tendrá cura
  - sin remedio
  lexicon: HALOT
  rationale: La frase hebrea afirma la ausencia de curación o remedio. «No habrá remedio» es la equivalencia española más directa y consolidada para expresar esa finalización irreversible.
theological_decisions:
- issue: Valor proverbial del sujeto singular
  english_pob_reading: A man often reproved
  chosen_spanish_reading: El hombre que suele ser reprendido
  alternative_spanish_readings:
  - Una persona que suele ser reprendida
  - Uno que suele ser reprendido
  rationale: Se conserva el singular representativo del proverbio sin suavizar el masculino del hebreo. En español, «el hombre» funciona como genérico proverbial y refleja mejor la forma fuente que una neutralización completa.
  doctrine_reference: Sabiduría proverbial / uso genérico del singular
- issue: Metáfora de la cerviz endurecida
  english_pob_reading: who stiffens his neck
  chosen_spanish_reading: endurece su cerviz
  alternative_spanish_readings:
  - endurece su cuello
  - se muestra obstinado
  rationale: La POB inglesa retuvo la metáfora corporal. En español, «cerviz» conserva con fidelidad la imagen bíblica y evita reducirla a una cualidad abstracta como «obstinado», que pierde parte de la tensión retórica.
  doctrine_reference: Antropología bíblica / resistencia a la reprensión
- issue: Finalidad irreversible del juicio
  english_pob_reading: will suddenly be broken beyond healing
  chosen_spanish_reading: de repente será quebrantado, y no habrá remedio
  alternative_spanish_readings:
  - será quebrantado sin remedio
  - será destruido sin posibilidad de cura
  rationale: El hebreo y la lectura inglesa apuntan a un quebranto repentino e irremediable. «No habrá remedio» mantiene la fuerza de clausura sin añadir más de lo que el texto dice.
  doctrine_reference: Consecuencia del endurecimiento
- issue: Sentido de מַרְפֵּא
  english_pob_reading: no remedy
  chosen_spanish_reading: no habrá remedio
  alternative_spanish_readings:
  - no habrá sanidad
  - no tendrá cura
  rationale: «Remedio» permite abarcar tanto sanidad como reparación, de acuerdo con la amplitud semántica del sustantivo hebreo. Así se preserva la posibilidad de una ruina integral, no solo médica.
  doctrine_reference: HALOT / uso sapiencial de מרפא
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo: mantiene el sujeto proverbial singular, la imagen corporal de la cerviz endurecida, el adverbio de abrupta irrupción y la clausula final de irremediabilidad. El punto de mayor decisión fue cómo verter תּוֹכָחוֹת y מַקְשֶׁה עֹרֶף en un español natural sin perder la metáfora ni la intensidad sapiencial.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - Se mantiene «cerviz» por consistencia con el lenguaje bíblico y para conservar la metáfora corporal.
  - «Que suele ser reprendido» refleja la repetición implícita de תּוֹכָחוֹת sin recurrir a una paráfrasis excesiva.
  - «Quebrantado» conserva el matiz de ruptura y juicio del verbo pasivo hebreo.
  - «No habrá remedio» deja abierta la amplitud semántica de מַרְפֵּא entre cura, reparación y solución.
