base_translation:
  language: en
  yaml_path: translation/ot/2_kings/025/030.yaml
  text: And his allowance[a], a continual allowance, was given to him from the king, the portion for each day on its day[b], all the days of his life.
  footnotes:
  - marker: a
    text: Or 'ration,' 'portion,' or 'provision' for 'allowance.' The Hebrew term refers to an allotted provision supplied to him.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the matter of a day on its day,' an idiom meaning that the provision was supplied day by day, according to each day's allotment.
    reason: lexical_alternative
