lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas que
  - No permitas que
  lexicon: HALOT
  rationale: La partícula negativa en una súplica se expresa con un imperativo negativo natural en español. «No» conserva la fuerza breve y directa del hebreo sin añadir énfasis ajeno.
- source_word: תַּעַזְבֵנִי
  english_pob_choice: forsake me
  chosen_spanish: me abandones
  alternatives_spanish:
  - me dejes
  - me desampares
  lexicon: HALOT
  rationale: עָזַב tiene el sentido de dejar/abandonar/abandonar en el contexto lamentatorio. «Abandones» comunica bien la intensidad de la petición; «desampares» sería más tradicional, pero «abandones» es más claro y moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: El texto fuente nombra directamente el Tetragrámaton. El estándar del proyecto en español es «Yahvé», que preserva el nombre propio divino sin sustituirlo por un título.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona se traduce de manera directa como «mi Dios». Mantiene la apelación personal y el paralelismo con el nombre divino.
- source_word: תִּרְחַק
  english_pob_choice: be far
  chosen_spanish: estés lejos
  alternatives_spanish:
  - te alejes
  - estés apartado
  lexicon: HALOT
  rationale: רָחַק expresa estar lejos o alejarse. En una súplica poética, «estés lejos» es natural en español y conserva el registro del Salmo.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - alejado de mí
  lexicon: HALOT
  rationale: La preposición con sufijo se vierte de forma simple con «de mí», que se ajusta mejor a «estar lejos» en español que un complemento más pesado.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se sigue la política del proyecto de no ocultar el nombre propio divino detrás de un sustituto. «Yahvé» es la forma estándar del POB en español y corresponde al Tetragrámaton del verso.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El inglés POB ya había estabilizado el sentido como una súplica directa: «Do not forsake me... do not be far from me.» No se requieren revisiones sustantivas; la principal adaptación es aplicar el estándar español del proyecto para el nombre divino («Yahvé») y mantener el paralelismo poético con una formulación natural en español.'
  spanish_consistency_notes:
  - Se preserva el paralelismo entre «No me abandones» y «no estés lejos de mí».
  - Se evita la sustitución litúrgica «SEÑOR» porque el proyecto requiere transliterar el nombre divino.
  - El tono es de lamentación orante, por lo que se prefieren verbos directos y breves.
