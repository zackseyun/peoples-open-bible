revisions:
- from: Como ovejas, están destinados para Sheol[a]; la muerte los pastoreará, y los rectos dominarán sobre ellos por la mañana. Su forma se consumirá en Sheol[d][c][b], lejos de su morada eminente.
  to: Como ovejas, están destinados a Seol[c]; la muerte los pastoreará, y los rectos dominarán sobre ellos por la mañana[b]. Su forma[a] se consumirá en Seol[d], lejos de su morada eminente.
  rationale: Se corrige el anclaje de notas para que cada una explique la palabra o cláusula correspondiente, se mejora la naturalidad del español con 'a Seol', y se adopta 'Seol' por legibilidad bíblica en español, sin cambiar la decisión teológica de conservar el concepto hebreo en lugar de reducirlo a 'tumba' o 'sepulcro'.
