translation:
  language: es
  text: No se transferirá ninguna herencia de una tribu a otra tribu[a], porque las tribus de los hijos de Israel se mantendrán unidas a su propia herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «las tribus de Israel». Hebreo: «las tribus de los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִסֹּב
  english_pob_choice: shall pass
  chosen_spanish: se transferirá
  alternatives_spanish:
  - pasará
  - se moverá
  - se cambiará
  lexicon: HALOT
  rationale: En este contexto legal, סבב no describe un giro físico, sino un cambio de afiliación tribal de la herencia. «Se transferirá» conserva la idea de traslado jurídico de manera natural en español, sin perder precisión.
- source_word: נַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - posesión
  - patrimonio
  - lote de herencia
  lexicon: HALOT
  rationale: Aquí נַחֲלָה se refiere a la porción de tierra asignada dentro del orden tribal de Israel. «Herencia» es un equivalente claro y bíblicamente adecuado en español, y mantiene el sentido de derecho recibido.
- source_word: מִמַּטֶּה ... לְמַטֶּה אַחֵר
  english_pob_choice: from one tribe to another tribe
  chosen_spanish: de una tribu a otra tribu
  alternatives_spanish:
  - de tribu en tribu
  - de una vara a otra tribu
  - de un linaje a otro linaje
  lexicon: HALOT
  rationale: Aunque מַטֶּה puede significar literalmente «vara», en este contexto denota una unidad tribal. «Tribu» reproduce el sentido contextual y evita una calca que sería ininteligible en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición. «Porque» es la opción más natural y precisa en español para una cláusula causal en estilo jurídico.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada una
  alternatives_spanish:
  - cada
  - todo
  - cada hombre
  lexicon: HALOT
  rationale: El hebreo usa un singular distributivo. En español, la referencia recae sobre las tribus mencionadas; por eso «cada una» expresa mejor la distribución sin masculinizar innecesariamente el referente.
- source_word: בְּנַחֲלָתוֹ
  english_pob_choice: to his own inheritance
  chosen_spanish: a su propia herencia
  alternatives_spanish:
  - en su herencia
  - de su herencia
  - a su heredad
  lexicon: HALOT
  rationale: Con דבק, la idea es permanecer adherido a la propia porción. «Apegarse a su propia herencia» comunica bien ese valor de adhesión y conserva la relación posesiva del hebreo.
- source_word: יִדְבְּקוּ
  english_pob_choice: shall hold fast
  chosen_spanish: se apegará
  alternatives_spanish:
  - se mantendrá unido
  - se aferrará
  - permanecerá adherida
  lexicon: HALOT
  rationale: דבק implica adherirse, pegarse, mantenerse unido. «Apegarse» es una opción española viva y fiel al campo semántico; el verbo en singular sigue el distributivo hebreo aplicado a cada tribu.
- source_word: מַטּוֹת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the tribes of the sons of Israel
  chosen_spanish: las tribus de los hijos de Israel
  alternatives_spanish:
  - las tribus de Israel
  - las tribus de los israelitas
  - las tribus de los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva explícitamente «los hijos de Israel» para reflejar la expresión hebrea y la decisión auditada del POB inglés. En español suena natural y mantiene la forma tradicional del texto bíblico sin neutralizar el término.
theological_decisions:
- issue: Expresión de género en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La frase hebrea es masculina plural y el POB inglés optó por conservarla. En español, «los hijos de Israel» reproduce fielmente la forma del original y mantiene la referencia corporativa al pueblo del pacto sin borrar la forma gramatical del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Valor jurídico de la prohibición y del verbo de adhesión
  english_pob_reading: No inheritance shall pass... shall hold fast
  chosen_spanish_reading: No se transferirá... se apegará
  alternative_spanish_readings:
  - No pasará... se mantendrá unida
  - No se moverá... se adherirá
  rationale: La cláusula tiene tono legal y regulativo. «Se transferirá» conserva el sentido jurídico de cambio de pertenencia; «se apegará» conserva la metáfora de adhesión de דבק sin diluirla en una simple idea de posesión estática.
  doctrine_reference: Numbers 36:9 legal context; HALOT on סבב and דבק
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en el acuerdo del singular distributivo: el sujeto colectivo se expresa en forma distributiva («cada una de las tribus»), mientras el verbo y la posesión se mantienen naturales en español («se apegará a su propia herencia»). Se preserva también la precisión jurídica de la prohibición, evitando suavizar el traslado de la herencia entre tribus.'
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» en consonancia con la decisión auditada del texto inglés y con la política de reproducir la forma hebrea explícita cuando no estorba la claridad.
  - «Herencia» se usa de manera consistente para נַחֲלָה en este contexto de reparto tribal de tierras.
  - «Apegarse» se eligió para דבק por su valor de adherencia; no se sustituyó por un término más eclesiástico o abstracto.
  - La nota al pie ofrece la alternativa textual ya documentada en el POB inglés, sin añadir variantes no sustentadas por el expediente.
