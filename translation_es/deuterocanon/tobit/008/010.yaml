translation:
  language: es
  text: 'Y Ragüel se levantó[a], fue y cavó una sepultura, diciendo: «Quizá él también muera».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «No sea que quizá él también muera». El griego expresa el temor de Ragüel de que Tobías muera como los novios anteriores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción siguiente en secuencia narrativa. «Se levantó» es natural en español y conserva el movimiento físico sin sobrecarga estilística.
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - salió
  - partió
  lexicon: BDAG
  rationale: El verbo indica desplazamiento; aquí simplemente avanza a la acción de cavar. «Fue» reproduce la sequencia narrativa de manera breve y fiel.
- source_word: ὤρυξεν
  english_pob_choice: dug
  chosen_spanish: cavó
  alternatives_spanish:
  - excavó
  - hizo un hoyo
  lexicon: BDAG
  rationale: El sentido es literal y narrativo. «Cavó» es el equivalente directo y natural en español.
- source_word: τάφον
  english_pob_choice: a grave
  chosen_spanish: una tumba
  alternatives_spanish:
  - una sepultura
  - una fosa
  lexicon: BDAG
  rationale: Tάφος puede significar tumba o sepulcro. Dado que el contexto es cavar, «una tumba» comunica bien el acto funerario sin restringir innecesariamente el término.
- source_word: Μὴ καὶ
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Lest perhaps
  - Tal vez
  lexicon: BDAG
  rationale: La construcción expresa una posibilidad temida. «Quizá» conserva la incertidumbre y funciona con naturalidad en español.
- source_word: οὗτος
  english_pob_choice: he too
  chosen_spanish: él también
  alternatives_spanish:
  - este también
  - este hombre también
  lexicon: BDAG
  rationale: El demostrativo se refiere a Tobías como posible víctima adicional. «Él también» transmite la comparación implícita de forma clara.
- source_word: ἀποθάνῃ
  english_pob_choice: may die
  chosen_spanish: muera
  alternatives_spanish:
  - pueda morir
  - merezca morir
  lexicon: BDAG
  rationale: El subjuntivo después de μή καί expresa una posibilidad temida. «Muera» mantiene ese matiz de eventualidad y temor sin añadir elementos.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota [a] directamente en el texto español; además, se mantuvo la ausencia de «out», conforme a la revisión inglesa posterior.
  spanish_consistency_notes:
  - Se mantiene el sujeto propio «Raguel» para seguir la forma del audit trail inglés y evitar oscurecer el nombre propio.
  - «Tumba» se eligió por el contexto inmediato de cavar; en español puede abarcar el lugar de sepultura sin forzar una imagen arquitectónica.
