translation:
  language: es
  text: Pues verdaderamente el combate que ocurrió por medio de ellos fue divino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el combate divino realizado por ellos». La frase griega puede enfatizar tanto que el combate ocurrió por medio de su acción como que se realizó en su caso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - verdaderamente
  - ciertamente
  lexicon: BDAG
  rationale: Ἀληθῶς intensifica afirmando con énfasis. «En verdad» conserva ese tono solemne y natural en español.
- source_word: ἀγών
  english_pob_choice: contest
  chosen_spanish: combate
  alternatives_spanish:
  - contienda
  - lucha
  - certamen
  lexicon: LSJ
  rationale: En 4 Macabeos el término se mueve en el campo del enfrentamiento heroico/martirial. «Combate» mantiene la fuerza agonística mejor que «lucha», y suena digno en español contemporáneo.
- source_word: θεῖος
  english_pob_choice: divine
  chosen_spanish: divino
  alternatives_spanish:
  - de Dios
  - celestial
  - sagrado
  lexicon: LSJ
  rationale: El adjetivo califica el combate como perteneciente al ámbito divino. «Divino» es la correspondencia directa y no atenúa el valor teológico.
- source_word: ὁ διʼ αὐτῶν γεγενημένος
  english_pob_choice: that came about through them
  chosen_spanish: que llegó a ser por medio de ellos
  alternatives_spanish:
  - que se produjo por medio de ellos
  - que ocurrió por medio de ellos
  - realizado por ellos
  lexicon: BDAG
  rationale: La construcción con διά + genitivo expresa mediación/agencia. «Por medio de ellos» conserva esa mediación sin convertirlos en la fuente última del combate; «llegó a ser» refleja el matiz perfectivo del participio γεγενημένος.
theological_decisions:
- issue: Cómo reflejar la relación entre el combate y la acción de los mártires en διʼ αὐτῶν
  english_pob_reading: The contest that came about through them was divine.
  chosen_spanish_reading: El combate fue divino y llegó a ser por medio de ellos.
  alternative_spanish_readings:
  - el combate divino realizado por ellos
  - el combate que aconteció en ellos
  rationale: 'La traducción preserva la tensión del griego: el combate es «divino», pero se produjo «por medio de ellos». No se diluye ni se reemplaza esa mediación con una causalidad simplificada.'
  doctrine_reference: Preservar la tensión teológica entre la procedencia divina y la participación instrumental humana.
translation_notes:
  revision_awareness: 'Se siguió el último ajuste del audit trail inglés: la idea de un evento que «llegó a ser» y no simplemente de algo «provocado»; por eso se prefirió una forma española que conserve el matiz perfectivo de γεγενημένος y la mediación de διά.'
  spanish_consistency_notes:
  - Se mantuvo «divino» para θεῖος, en coherencia con el estándar del proyecto.
  - Se evitó «Señor» o cualquier sustitución interpretativa, porque no aparece el tetragrámaton ni κύριος en este versículo.
  - «Combate» se eligió por su cercanía al valor agonístico de ἀγών en contexto martirial.
  - La nota al pie conserva la alternativa de lectura que el audit trail inglés consideró importante no resolver del todo.
