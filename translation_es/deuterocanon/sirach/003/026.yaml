review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo principal: «לֵב כָּבֵד» como «corazón pesado», «יִרְבּוּ מַכְאֹבָיו» como multiplicación de dolores, y «עָוֹן עַל עָוֹן» como acumulación moral. También conserva correctamente en nota la divergencia del paralelo griego. La única desalineación importante está en la nota griega: «será pesado al final» no refleja bien βαρυνθήσεται, que aquí se entiende mejor como «será cargado/agravado» o «quedará agobiado».'
  spanish_quality_summary: El español es generalmente claro y digno. «El corazón pesado» suena algo literal, pero es defendible por fidelidad al hebreo y está bien justificado. «Actúa con desenfreno» es legible, aunque algo más estrecho que «se comporta temerariamente»; no obstante, la nota léxica compensa bien la amplitud semántica. La principal mejora necesaria es pulir la nota alternativa griega para que suene natural y exacta en español.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. Las decisiones clave respetan el criterio de priorizar el hebreo de Sirácida y documentar el griego como lectura alternativa.
  issues:
  - severity: medium
    issue: La nota [a] traduce «καρδία σκληρὰ βαρυνθήσεται ἐπ᾽ ἐσχάτων» como «un corazón duro será pesado al final».
    rationale: «Será pesado» en español suena poco idiomático y no comunica bien el valor pasivo/resultativo de βαρυνθήσεται. La nota inglesa auditada usa «will be weighed down». En español conviene «quedará agobiado» o «será cargado/agravado».
  - severity: low
    issue: La nota [a] usa «al final» donde también cabría «al fin» o «en el fin».
    rationale: No es incorrecto, pero «al final» puede sonar algo coloquial. Aun así, no requiere cambio obligatorio si se mantiene la claridad.
  revised_spanish_text: El corazón pesado multiplica sus dolores[a], y el que actúa con desenfreno añade pecado sobre pecado[b].
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «un corazón duro será afligido al final» y «un corazón duro quedará agobiado al final».'
    reason: alternative_reading
  - marker: b
    text: El término hebreo detrás de «actúa con desenfreno» es difícil y también puede sugerir actuar con locura, autoengaño o arrogancia jactanciosa.
    reason: lexical_alternative
  revision_rationale: El texto principal es fiel y legible, pero la nota del paralelo griego necesita una corrección pequeña para reflejar con mayor precisión e idiomaticidad el sentido de βαρυνθήσεται. Se conserva todo lo demás.
