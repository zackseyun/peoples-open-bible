translation:
  language: es
  text: de modo que incluso Seleuco[a], rey de Asia[b], solía proveer, de sus propias rentas, todos los gastos requeridos para los ministerios de los sacrificios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Séleuco».
    reason: lexical_alternative
  - marker: b
    text: «Asia» aquí se refiere al dominio helenístico del rey seléucida, no al continente en sentido moderno.
    reason: cultural_note
lexical_decisions:
- source_word: ὥστε καὶ
  english_pob_choice: so that even
  chosen_spanish: de modo que incluso
  alternatives_spanish:
  - así que incluso
  - de manera que incluso
  lexicon: LSJ
  rationale: ὥστε introduce un resultado; «de modo que» conserva la relación consecutiva sin sonar forzado, e «incluso» refleja el énfasis de καί.
- source_word: Σέλευκον
  english_pob_choice: Seleucus
  chosen_spanish: Seleuco
  alternatives_spanish:
  - Seleucio
  lexicon: N/A (nombre propio)
  rationale: 'El nombre propio se adapta al uso histórico y bíblico normal en español: Seleuco.'
- source_word: τὸν τῆς Ἀσίας βασιλέα
  english_pob_choice: the king of Asia
  chosen_spanish: rey de Asia
  alternatives_spanish:
  - rey sobre Asia
  - rey del territorio asiático
  lexicon: LSJ
  rationale: Se mantiene el título histórico helenístico con una forma natural en español. La nota aclara que «Asia» aquí nombra el ámbito real seléucida y no el continente en sentido moderno.
- source_word: χορηγεῖν
  english_pob_choice: used to provide
  chosen_spanish: solía proveer
  alternatives_spanish:
  - proveía
  - solía suministrar
  - solía proporcionar
  lexicon: LSJ
  rationale: El infinitivo expresa una acción continuada o habitual en el trasfondo narrativo; «solía proveer» comunica bien esa iteración y el sentido de suministro financiero.
- source_word: ἐκ τῶν ἰδίων προσόδων
  english_pob_choice: from his own revenues
  chosen_spanish: de sus propias rentas
  alternatives_spanish:
  - de sus propios ingresos
  - con sus propios recursos
  lexicon: LSJ
  rationale: «Rentas» conserva el matiz fiscal y real de πρόσοδοι mejor que «recursos», y «propias» refleja ἰδίων.
- source_word: πάντα τὰ πρὸς τὰς λειτουργίας
  english_pob_choice: all the expenses incurred for the ministries
  chosen_spanish: todos los gastos que incumbían a los ministerios
  alternatives_spanish:
  - todos los gastos necesarios para los servicios
  - todos los gastos relativos a los ministerios
  lexicon: LSJ
  rationale: Se conserva la carga formal de λειτουργίαι como «ministerios», siguiendo el POB inglés, pero sin imponer una terminología eclesiástica posterior. «Incumbían» reproduce la idea de obligación o cargo de ἐπιβάλλοντα.
- source_word: τῶν θυσιῶν
  english_pob_choice: of the sacrifices
  chosen_spanish: de los sacrificios
  alternatives_spanish:
  - sacrificiales
  - para los sacrificios
  lexicon: LSJ
  rationale: Se mantiene la relación genitiva simple y transparente, dejando claro el contexto cultual sin sobreinterpretar la sintaxis.
- source_word: ἐπιβάλλοντα δαπανήματα
  english_pob_choice: the expenses incurred
  chosen_spanish: los gastos que incumbían
  alternatives_spanish:
  - los gastos necesarios
  - los gastos debidos
  lexicon: LSJ
  rationale: La expresión griega indica gastos que caen sobre alguien como carga u obligación. «Incumbían» preserva ese matiz de deuda o carga financiera; la nota admite la alternativa de gastos necesarios/obligatorios.
theological_decisions:
- issue: Terminología cultual y administrativa en un contexto histórico de templo
  english_pob_reading: Render temple-financial language in straightforward historical terms without importing later theological categories.
  chosen_spanish_reading: Traducir el lenguaje de gastos del templo con términos administrativos claros, manteniendo el matiz cultual de λειτουργίαι como «ministerios».
  alternative_spanish_readings:
  - Usar «liturgias» para λειτουργίαι
  - usar «servicios» para λειτουργίαι
  - usar «ministraciones» para λειτουργίαι
  rationale: El versículo describe financiamiento real de las actividades sacrificiales de Jerusalén. «Ministerios» conserva la solemnidad y el vínculo con el servicio cultual sin anacronismos denominacionales; «gastos que incumbían» preserva el carácter obligatorio de la erogación.
  doctrine_reference: Principio de equivalencia óptima y respeto del contexto histórico-cultual del texto.
translation_notes:
  revision_awareness: La solución sigue de cerca el texto griego de Swete y toma como contexto la decisión revisada del inglés POB de expresar χορηγεῖν como provisión sostenida y λειτουργίαι como «ministries». En español se eligió una formulación natural, manteniendo el énfasis fiscal y cultual, y se evitó sustituir «ministerios» por una palabra más eclesial que borraría el carácter histórico del pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aplica aquí.
  - «ministerios» se conserva como término técnico contextual para λειτουργίαι, en coherencia con el audit trail inglés.
  - Se mantiene el título histórico «rey de Asia» con una nota explicativa para evitar una lectura geográfica moderna.
