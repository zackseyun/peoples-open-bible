translation:
  language: es
  text: Y todo Israel oyó el juicio que había dictado el rey, y temió al rey[a], porque vio que la sabiduría de Dios estaba dentro de él para hacer justicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «reverenció al rey» o «sintió temor del rey». El hebreo puede expresar temor, reverencia o sobrecogimiento ante una autoridad reconocida.
    reason: lexical_alternative
  - marker: b
    text: O, «para administrar justicia» o «para dictar sentencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard of
  chosen_spanish: oyó
  alternatives_spanish:
  - oyó hablar de
  - escuchó
  lexicon: HALOT
  rationale: En español, con objeto directo explícito ('el juicio'), 'oyó' comunica que Israel recibió noticia del caso/resolución sin añadir perífrasis innecesaria. 'Oyó hablar de' sería más explicativo, pero menos sobrio.
- source_word: כָל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - todos los israelitas
  lexicon: HALOT
  rationale: Se conserva el giro colectivo hebreo como nombre del pueblo. 'Todo Israel' suena natural y mantiene la unidad nacional del sujeto.
- source_word: הַמִּשְׁפָּט
  english_pob_choice: the judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la sentencia
  - la decisión
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט se refiere a la decisión judicial concreta dada por Salomón. 'Juicio' conserva el registro legal; 'sentencia' sería posible, pero puede sonar más técnico o restrictivo.
- source_word: שָׁפַט
  english_pob_choice: had rendered
  chosen_spanish: había pronunciado
  alternatives_spanish:
  - había dictado
  - había juzgado
  lexicon: HALOT
  rationale: En español, para una resolución judicial, 'pronunciar' o 'dictar' funcionan de modo natural. 'Pronunciado' mantiene la idea de emitir formalmente el veredicto sin calcar el inglés.
- source_word: וַיִּרְאוּ מִפְּנֵי הַמֶּלֶךְ
  english_pob_choice: they feared the king
  chosen_spanish: temieron al rey
  alternatives_spanish:
  - tuvieron temor del rey
  - reverenciaron al rey
  lexicon: HALOT
  rationale: ירא con מִפְּנֵי puede expresar temor, respeto o sobrecogimiento. Dado que el inglés POB retuvo 'feared' tras revisar la ambigüedad, 'temieron' preserva la carga de temor/respetuoso reconocimiento sin introducir una paráfrasis interpretativa como 'reverenciaron'.
- source_word: כִּי רָאוּ
  english_pob_choice: because they saw
  chosen_spanish: porque vieron
  alternatives_spanish:
  - pues vieron
  - porque habían visto
  lexicon: HALOT
  rationale: La causalidad se expresa de forma directa con 'porque'. El verbo simple 'vieron' sigue el valor perfecto del hebreo en narración, sin necesidad de pluscuamperfecto en español.
- source_word: חָכְמַת אֱלֹהִים
  english_pob_choice: the wisdom of God
  chosen_spanish: la sabiduría de Dios
  alternatives_spanish:
  - sabiduría divina
  - sabiduría dada por Dios
  lexicon: HALOT
  rationale: 'Se conserva la relación genitiva explícita del hebreo: la sabiduría pertenece a Dios o proviene de él. ''Sabiduría de Dios'' evita diluir la referencia personal a Dios en un adjetivo general.'
- source_word: בְּקִרְבּוֹ
  english_pob_choice: was within him
  chosen_spanish: estaba dentro de él
  alternatives_spanish:
  - estaba en él
  - habitaba en él
  lexicon: HALOT
  rationale: La imagen de interioridad se expresa de manera natural con 'dentro de él'. Esta opción preserva la localización interna de la sabiduría sin sonar extraña en español.
- source_word: לַעֲשׂוֹת מִשְׁפָּט
  english_pob_choice: to administer justice
  chosen_spanish: para hacer justicia
  alternatives_spanish:
  - para administrar justicia
  - para dictar sentencia
  lexicon: HALOT
  rationale: '''Hacer justicia'' es una expresión española transparente y fiel al infinitivo de finalidad. Aunque ''administrar justicia'' es posible, ''hacer justicia'' mantiene el paralelismo con el hebreo sin endurecer el estilo.'
theological_decisions:
- issue: מִשְׁפָּט como acto judicial concreto y como categoría de justicia
  english_pob_reading: the judgment ... to administer justice
  chosen_spanish_reading: el juicio ... para hacer justicia
  alternative_spanish_readings:
  - la sentencia ... para administrar justicia
  - la decisión ... para dictar sentencia
  rationale: El contexto narra una resolución judicial específica y su efecto público. 'Juicio' y 'hacer justicia' preservan tanto el acto singular como la función general del rey, sin borrar la tensión entre decisión legal y justicia ejercida.
  doctrine_reference: Translation philosophy §3
- issue: וַיִּרְאוּ מִפְּנֵי הַמֶּלֶךְ como temor/reverencia
  english_pob_reading: they feared the king
  chosen_spanish_reading: temieron al rey
  alternative_spanish_readings:
  - reverenciaron al rey
  - sintieron temor del rey
  rationale: El hebreo admite una gama entre temor, respeto y asombro. Dado el contexto de sabiduría reconocida, 'temieron' conserva la ambivalencia sin suavizarla demasiado; el lector puede percibir temor reverente más que pánico puro.
  doctrine_reference: Translation philosophy §3
- issue: אֱלֹהִים en un contexto de sabiduría real
  english_pob_reading: the wisdom of God
  chosen_spanish_reading: la sabiduría de Dios
  alternative_spanish_readings:
  - sabiduría divina
  rationale: No hay motivo contextual para impersonalizar אֱלֹהִים. La traducción mantiene la atribución explícita a Dios, coherente con la teología narrativa del capítulo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El texto sigue el cierre revisado del POB inglés más reciente, que prefirió 'feared the king' frente a 'stood in awe of the king' por mayor cercanía léxica al hebreo. En español se reflejó ese ajuste con 'temieron al rey', manteniendo además la idea de reconocimiento respetuoso que permite el contexto.
  spanish_consistency_notes:
  - Se usa 'Israel' como sujeto colectivo sin artículo, siguiendo el giro hebreo y la práctica narrativa bíblica.
  - '''Yahvé'' no aparece en este versículo; por tanto no se introduce terminología divina adicional.'
  - '''Dios'' se mantiene como traducción directa de אֱלֹהִים.'
  - '''justicia'' se usa para מִשְׁפָּט cuando la frase expresa la función judicial; ''juicio'' se reserva para la decisión concreta.'
  - 'Las notas al pie se anclan solo en los puntos con ambigüedad real en español: el temor ante el rey y la finalidad judicial final.'
