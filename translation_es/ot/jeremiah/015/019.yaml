    rationale: Aunque formalmente puede leerse como futuro con valor modal, en español actual se entiende fácilmente como simple predicción. El rastro POB señaló explícitamente la fuerza prohibitiva. Conviene expresarla con 'no debes volverte a ellos' o similar.
