review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo y la línea del POB inglés: pueblo en Sion/Jerusalén, cese del llanto, gracia divina, clamor oído y respuesta. Sin embargo, «tendrá piedad de ti» se aparta del término preferido y del razonamiento auditado para חָנוֹן יָחְנְךָ, donde el POB documenta explícitamente «be gracious to you». Además, «al oír tu clamor» desplaza levemente לְקוֹל זַעֲקֶךָ (‘al sonido de tu clamor’) hacia la cláusula siguiente, donde ya aparece el oír. Conviene ajustar ambos puntos para preservar mejor la imaginería y la decisión léxica auditada.'
  spanish_quality_summary: El español es claro y digno, pero puede ganar naturalidad y precisión con «te mostrará gracia» y «al sonido de tu clamor». «En Sion habitará en Jerusalén» suena algo rígido, pero sigue siendo inteligible y cercano a la sintaxis fuente. El resto lee bien en español bíblico moderno.
  glossary_alignment: 'Buen ajuste general con la terminología del proyecto. No hay ocurrencia directa de Yahvé en el texto, pero la nota ya lo menciona correctamente. El principal desajuste es חנן: el proyecto favorece «gracia» cuando corresponde, y aquí el propio POB inglés justificó ‘be gracious’. «Tendrá piedad» inclina el matiz hacia misericordia/compasión en vez de gracia/favor.'
  issues:
  - severity: medium
    issue: חָנוֹן יָחְנְךָ se tradujo «tendrá piedad de ti»
    rationale: El POB inglés auditó este giro como ‘He will surely be gracious to you’ y la nota habla de ‘the LORD’s favor’. En español, «te mostrará gracia» o «te será propicio» preserva mejor חנן y la racionalidad teológica documentada.
  - severity: low
    issue: לְקוֹל זַעֲקֶךָ se tradujo «al oír tu clamor»
    rationale: El hebreo dice literalmente ‘al sonido de tu clamor’, preservando una imagen auditiva previa a la siguiente cláusula ‘cuando lo oiga’. La versión actual adelanta la acción de oír y reduce el paralelismo.
  - severity: low
    issue: La nota b usa «siendo compasivo, tendrá compasión de ti»
    rationale: La glosa explicativa debería alinearse con la decisión léxica principal sobre חנן y con la nota inglesa, destacando gracia/favor más que compasión.
  revised_spanish_text: Porque un pueblo en Sion habitará en Jerusalén; no llorarás más[a]. Ciertamente te mostrará gracia[b] al sonido de tu clamor; cuando lo oiga, te responderá.
