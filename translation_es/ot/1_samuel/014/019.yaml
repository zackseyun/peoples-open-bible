    issue: La nota [a] está mal anclada y explica una frase distinta de la marcada.
    rationale: En el texto español, [a] aparece tras «Y aconteció», pero la nota comenta «mientras Saúl hablaba al sacerdote». Esto rompe la correspondencia exigida entre marcador y lugar relevante.
  - severity: medium
    issue: Se perdió la nota léxica principal sobre אֱסֹף יָדֶךָ.
    rationale: El POB inglés conserva la literalidad «gather your hand» y explica que Saúl ordena al sacerdote cesar la acción. El español debería preservar esa evidencia con una nota equivalente, especialmente porque «Retira tu mano» ya es una interpretación contextual.
  revised_spanish_text: 'Y aconteció, mientras Saúl hablaba al sacerdote, que el tumulto en el campamento de los filisteos iba aumentando cada vez más. Entonces Saúl dijo al sacerdote: «Retira[a] tu mano».'
  revised_footnotes:
