review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general el marco jurídico de לְעַוֵּת ... בְּרִיבוֹ, pero falla en dos puntos relevantes: (1) traduce אֲדֹנָי como «Yahvé», aunque la fuente dice el título divino Adonai, no el tetragrámaton; (2) «no lo ha visto» introduce un objeto («lo») ausente en hebreo y un perfecto compuesto innecesariamente marcado. Además, «desviar a un hombre en su causa» suena poco natural y no expresa tan claramente la injusticia judicial como «negar justicia».'
  spanish_quality_summary: El español es comprensible, pero «desviar a un hombre en su causa» y «no lo ha visto» resultan poco idiomáticos en este contexto. «Negar justicia a un hombre en su causa» es más claro, forense y natural. El anclaje de notas debe ir pegado a la frase relevante, sin partir el auxiliar verbal.
  glossary_alignment: Se respeta bien «hombre» para אָדָם. Sin embargo, el glosario del proyecto da «Yahvé» por defecto para יהוה / YHWH, no para אֲדֹנָי; aquí corresponde «el Señor». También conviene mantener «ve» como texto principal si se sigue la decisión teológica documentada, dejando «aprueba» en nota.
  issues:
  - severity: high
    issue: «Yahvé» para אֲדֹנָי
    rationale: La fuente hebrea usa אֲדֹנָי, título divino, no יהוה. El propio expediente inglés escogió «the Lord». Sustituirlo por «Yahvé» borra una distinción léxica importante.
  - severity: high
    issue: «no lo ha visto» añade objeto no presente
    rationale: לֹא רָאָה es simplemente «no vio / no ve»; no lleva pronombre objeto. «Lo» sobreinterpreta el referente y altera la sintaxis.
  - severity: medium
    issue: Tiempo verbal «ha visto» menos adecuado que presente gnómico
    rationale: En este contexto sentencioso, el español natural equivalente al perfecto hebreo general es «no ve» o «no vio», no necesariamente el perfecto compuesto «ha visto».
  - severity: medium
    issue: «desviar a un hombre en su causa» es poco natural y débil jurídicamente
    rationale: Aunque intenta reflejar la idea de torcer, en español no comunica con claridad la perversión judicial. «Negar justicia a un hombre en su causa» recoge mejor la decisión léxica auditada y suena más idiomático.
  - severity: low
    issue: Ubicación del anclaje de notas
    rationale: Los marcadores no deben interrumpir «ha visto». Deben anclarse a la palabra o frase relevante completa.
  revised_spanish_text: 'negar justicia a un hombre en su causa[a]: el Señor no ve[b].'
