    rationale: El original denota un flujo/descarga corporal; luego דָּם especifica que ese flujo es sangre. 'Hemorragia' introduce un matiz clínico de sangrado abundante o anormal que el hebreo no exige.
  - severity: low
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota explica la alternativa para בִּבְשָׂרָהּ ('en su carne/cuerpo'), pero en el borrador el marcador [a] aparece sobre 'hemorragia' en vez de junto a 'cuerpo' o la expresión correspondiente.
  - severity: low
    issue: '''Cualquiera que la toque'' es menos idiomático para estilo bíblico-jurídico'
    rationale: Aunque es fiel, 'todo el que la toque' refleja mejor el alcance general de כָּל + participio y suena más natural en registro bíblico formal.
  revised_spanish_text: Cuando una mujer tenga un flujo, y su flujo en su cuerpo[a] sea sangre, permanecerá en su impureza menstrual siete días[b]; y todo el que la toque será impuro hasta la tarde.
