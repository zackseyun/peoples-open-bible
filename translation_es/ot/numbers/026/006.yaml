translation:
  language: es
  text: de Hezrón[a], el clan de los hezronitas; de Carmi, el clan de los carmitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para Hezrón ... para Carmi'; la preposición hebrea puede traducirse más literalmente así, pero aquí funciona en sentido genealógico/censal, indicando descendencia o derivación de clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/חֶצְרֹן
  english_pob_choice: from Hezron
  chosen_spanish: de Hezrón
  alternatives_spanish:
  - para Hezrón
  - desde Hezrón
  lexicon: HALOT
  rationale: En esta fórmula censal/genealógica, el prefijo לְ señala procedencia o adscripción de linaje. En español, «de» expresa mejor esa relación de pertenencia/descendencia que una traducción más literal como «para».
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: la familia de
  alternatives_spanish:
  - el clan de
  - la estirpe de
  lexicon: HALOT
  rationale: En un contexto genealógico, מִשְׁפָּחָה designa una subdivisión de parentesco. «Familia» es más natural en español que «clan» y conserva la idea de agrupación por linaje; se mantiene el paralelo de la fórmula.
- source_word: הַֽ/חֶצְרוֹנִי
  english_pob_choice: the Hezronites
  chosen_spanish: los hezronitas
  alternatives_spanish:
  - la familia hezronita
  - el hezronita
  lexicon: HALOT
  rationale: El gentilicio hebreo nombra al grupo descendiente de Hezrón. En español, el plural colectivo «hezronitas» comunica esa pertenencia grupal de manera transparente y mantiene la función corporativa del término.
- source_word: לְ/כַרְמִי
  english_pob_choice: from Carmi
  chosen_spanish: de Carmi
  alternatives_spanish:
  - para Carmi
  - desde Carmi
  lexicon: HALOT
  rationale: Se conserva el mismo valor genealógico de לְ que en la primera mitad del versículo. «De Carmi» expresa con naturalidad la derivación de linaje.
- source_word: הַ/כַּרְמִי
  english_pob_choice: the Carmites
  chosen_spanish: los carmitas
  alternatives_spanish:
  - la familia carmita
  - el carmita
  lexicon: HALOT
  rationale: El gentilicio indica el grupo descendiente de Carmi. «Carmitas» conserva el paralelismo con «hezronitas» y evita una perífrasis menos fluida.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: la familia de
  alternatives_spanish:
  - el clan de
  - la estirpe de
  lexicon: HALOT
  rationale: Se repite el mismo término censal; por consistencia se mantiene la misma equivalencia en ambos miembros del paralelismo.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios, con acuerdo alto entre revisores. En español se siguió la misma lectura genealógica de la preposición לְ como relación de descendencia/adscripción, sin introducir variantes textuales ni teológicas.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo sintáctico de dos miembros: nombre propio + relación genealógica + gentilicio.'
  - Se prefirió «familia» sobre «clan» por naturalidad en español, sin perder el valor técnico del término censal.
  - Se conservaron los etnónimos en minúscula conforme al uso editorial en español para gentilicios derivados de nombres propios.
