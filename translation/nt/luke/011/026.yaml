id: LUK.11.26
reference: Luke 11:26
source:
  edition: SBLGNT
  text: τότε πορεύεται καὶ παραλαμβάνει ⸂ἕτερα πνεύματα πονηρότερα ἑαυτοῦ ἑπτά⸃, καὶ ⸀εἰσελθόντα κατοικεῖ ἐκεῖ, καὶ γίνεται τὰ ἔσχατα τοῦ ἀνθρώπου ἐκείνου χείρονα τῶν πρώτων.
translation:
  text: Then it goes and takes along seven other spirits more evil than itself[a], and they enter and live there[c][b]; and the last state of that man becomes worse than the first.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more wicked than itself.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'spirits,' not explicitly 'demons' or 'unclean spirits' in this verse, though the context makes the hostile sense clear.
    reason: lexical_alternative
  - marker: c
    text: Or 'the final condition of that man becomes worse than the former.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the narrative; 'Then' is the natural English connector.
- source_word: πορεύεται
  chosen: it goes
  alternatives:
  - it departs
  - it travels
  lexicon: BDAG
  rationale: Middle/passive deponent with straightforward motion sense here; 'it goes' is idiomatic and preserves the narrative progression.
- source_word: παραλαμβάνει
  chosen: takes along
  alternatives:
  - takes
  - brings with itself
  lexicon: BDAG
  rationale: The verb suggests taking with oneself/alongside rather than merely seizing; 'takes along' captures the accompanying sense.
- source_word: ἕτερα
  chosen: other
  alternatives:
  - different
  lexicon: BDAG
  rationale: ἕτερος can stress 'other/different,' but in this context 'other' is the most natural English with the comparative phrase supplying the distinction.
- source_word: πνεύματα
  chosen: spirits
  alternatives:
  - unclean spirits
  - demons
  lexicon: BDAG
  rationale: The noun itself is simply 'spirits.' Although the context is demonic/unclean, those qualifiers are not repeated in this verse and should not be imported into the main text.
- source_word: πονηρότερα ἑαυτοῦ
  chosen: more evil than itself
  alternatives:
  - more wicked than itself
  - more evil than he is
  lexicon: BDAG
  rationale: Comparative adjective with reflexive genitive. 'More evil than itself' preserves the comparison with the returning spirit. Neuter 'itself' matches πνεῦμα grammatically and avoids overpersonalizing beyond the Greek.
- source_word: ἑπτά
  chosen: seven
  lexicon: BDAG
  rationale: Cardinal number retained directly.
- source_word: εἰσελθόντα
  chosen: after entering
  alternatives:
  - and entering
  - when they enter
  lexicon: BDAG
  rationale: Aorist participle, nominative neuter plural, coordinated with the plural spirits; 'after entering' conveys antecedent action relative to the main verb in smooth English.
- source_word: κατοικεῖ
  chosen: they live there
  alternatives:
  - they dwell there
  - it lives there
  lexicon: BDAG
  rationale: Although κατοικεῖ is singular in the transmitted text, the participle εἰσελθόντα is plural and the sense is naturally collective with the seven spirits plus the original spirit. English plural best reflects the sense without forcing awkward singular agreement.
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Simple locative adverb.
- source_word: γίνεται
  chosen: becomes
  alternatives:
  - turns out to be
  lexicon: BDAG
  rationale: Standard inchoative/copulative sense; 'becomes' is concise and natural.
- source_word: τὰ ἔσχατα
  chosen: the last state
  alternatives:
  - the final condition
  - the latter end
  lexicon: BDAG
  rationale: Idiomatic expression for a person's later condition/outcome. 'The last state' is clear modern English and preserves the contrast with 'the first.'
- source_word: τοῦ ἀνθρώπου ἐκείνου
  chosen: of that man
  alternatives:
  - of that person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to the specific male individual in the illustration. Per gender-accurate policy, 'man' is preferred over a neutralized rendering.
- source_word: χείρονα τῶν πρώτων
  chosen: worse than the first
  alternatives:
  - worse than the former state
  - worse than the earlier things
  lexicon: BDAG
  rationale: Comparative adjective with genitive of comparison. English idiom requires supplying 'state' conceptually from the prior phrase; 'the first' preserves the concise contrast of the Greek.
