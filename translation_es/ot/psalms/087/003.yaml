translation:
  language: es
  text: Cosas gloriosas se dicen de ti[a], ciudad de Dios. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de ti», «sobre ti» o «en ti». La preposición hebrea puede entenderse de más de una manera aquí; «de ti» encaja bien con el sentido de alabanza dirigida a Sion.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְבָּדוֹת
  english_pob_choice: Glorious things
  chosen_spanish: Cosas gloriosas
  alternatives_spanish:
  - Cosas honorables
  - Cosas magníficas
  - Cosas pesadas
  lexicon: HALOT
  rationale: El adjetivo sustantivado en plural femenino expresa cosas dignas de honor, esplendor o peso. «Cosas gloriosas» conserva el tono poético y la carga de excelencia sin forzar una paráfrasis.
- source_word: מְדֻבָּר
  english_pob_choice: are spoken
  chosen_spanish: se han dicho
  alternatives_spanish:
  - son dichas
  - se dicen
  - son habladas
  lexicon: HALOT
  rationale: El participio pual de דבר funciona predicativamente con el sujeto plural. En español, una pasiva refleja o perfecta impersonal comunica bien que se habla de estas cosas. «Se han dicho» mantiene naturalidad y dignidad poética.
- source_word: בָּךְ
  english_pob_choice: of you
  chosen_spanish: de ti
  alternatives_spanish:
  - sobre ti
  - en ti
  - acerca de ti
  lexicon: HALOT
  rationale: La preposición ב aquí admite matices de referencia al tema del habla. «De ti» es la equivalencia más natural y fiel en español, y conserva la relación de discurso dirigido a Sion/ciudad.
- source_word: עִיר הָאֱלֹהִים
  english_pob_choice: city of God
  chosen_spanish: ciudad de Dios
  alternatives_spanish:
  - la ciudad de Dios
  - ciudad de Dios,
  - ciudad divina
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma directa y transparente. Se conserva la forma sin artículo porque el hebreo ya presenta el vocativo-aposición y el español lo admite con fluidez.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera por su fuerza litúrgico-musical incierta, sin interpretarla ni normalizarla.
translation_notes:
  revision_awareness: La versión inglesa revisó 'spoken about you' a 'spoken of you' para acercarse más al hebreo y suprimir puntuación innecesaria antes de Selah; la propuesta española sigue esa línea al usar «de ti» y no añadir coma antes de Selah.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al criterio POB.
  - Se conserva «Selah» transliterado por transparencia al marcador hebreo.
  - Se evitó «SEÑOR» u otros sustitutos no presentes en este versículo.
