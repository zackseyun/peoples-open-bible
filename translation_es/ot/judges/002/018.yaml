translation:
  language: es
  text: Siempre que Yahvé levantaba jueces para ellos[a], Yahvé estaba con el juez y los salvaba de la mano de sus enemigos durante todos los días del juez, porque Yahvé era movido a compasión por sus gemidos, a causa de quienes los oprimían y los afligían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé se compadecía» o «Yahvé cedía»; el verbo hebreo puede expresar una respuesta compasiva o un cambio de disposición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma española establecida en el proyecto, en lugar de sustituirlo por un título. Esto mantiene la transparencia auditiva y la distinción entre el nombre propio y un título reverencial.
- source_word: הֵקִים
  english_pob_choice: raised up
  chosen_spanish: levantaba
  alternatives_spanish:
  - levantó
  - designaba
  - hacía surgir
  lexicon: HALOT
  rationale: El contexto de Jueces presenta una acción repetida y habitual; por eso se prefiere el imperfecto 'levantaba' para reflejar la recurrencia expresada por 'Whenever' en la versión inglesa y por וְכִי en hebreo.
- source_word: שֹׁפְטִים
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - líderes
  - libertadores
  lexicon: HALOT
  rationale: '''Jueces'' es el equivalente establecido y preciso en este libro; la función liberadora se expresa en el verbo siguiente, no en el sustantivo.'
- source_word: וְהָיָה יְהוָה עִם הַשֹּׁפֵט
  english_pob_choice: Yahweh was with the judge
  chosen_spanish: Yahvé estaba con el juez
  alternatives_spanish:
  - Yahvé llegaba a estar con el juez
  - Yahvé acompañaba al juez
  lexicon: HALOT
  rationale: '''Estaba con'' reproduce de forma natural y fiel la presencia y respaldo divinos sin añadir interpretación extra.'
- source_word: וְהוֹשִׁיעָם
  english_pob_choice: saved them
  chosen_spanish: los salvaba
  alternatives_spanish:
  - los libraba
  - los rescataba
  lexicon: HALOT
  rationale: El hiphil de ישׁע expresa rescate/liberación. 'Salvaba' mantiene la fuerza semántica y conserva el aspecto habitual del pasaje.
- source_word: מִיַּד אֹיְבֵיהֶם
  english_pob_choice: from the hand of their enemies
  chosen_spanish: de la mano de sus enemigos
  alternatives_spanish:
  - del poder de sus enemigos
  - de manos de sus enemigos
  lexicon: HALOT
  rationale: Se conserva el hebraísmo 'de la mano de' por su transparencia y por su valor concreto de dominio hostil.
- source_word: כֹּל יְמֵי הַשּׁוֹפֵט
  english_pob_choice: all the days of the judge
  chosen_spanish: durante todos los días del juez
  alternatives_spanish:
  - a lo largo de todos los días del juez
  - mientras vivía el juez
  lexicon: HALOT
  rationale: La fórmula temporal se conserva de manera clara y directa en español, dejando que el contexto determine el alcance de la vida o período de liderazgo del juez.
- source_word: יִנָּחֵם
  english_pob_choice: was moved to pity
  chosen_spanish: era movido a compasión
  alternatives_spanish:
  - se compadecía
  - se conmovía
  - se arrepentía
  lexicon: HALOT
  rationale: La forma niphal de נחם aquí expresa respuesta compasiva ante el sufrimiento. 'Era movido a compasión' conserva la tensión antropopática sin sugerir que Dios cometiera error o tuviera que corregir una falta.
- source_word: מִנַּאֲקָתָם
  english_pob_choice: by their groaning
  chosen_spanish: por su gemido
  alternatives_spanish:
  - por su clamor
  - a causa de su gemido
  lexicon: HALOT
  rationale: '''Gemido'' comunica bien el sustantivo hebreo en un español natural y solemne. Se prefiere la relación causal con ''por'' para reflejar la ocasión de la compasión divina.'
- source_word: מִפְּנֵי לֹחֲצֵיהֶם וְדֹחֲקֵיהֶם
  english_pob_choice: because of those who oppressed and afflicted them
  chosen_spanish: a causa de quienes los oprimían y los afligían
  alternatives_spanish:
  - por causa de sus opresores y de quienes los acosaban
  - a causa de sus opresores y agobiadores
  lexicon: HALOT
  rationale: 'Se mantienen dos participios con valor activo: ''oprimían'' y ''afligían''. ''Afligían'' diferencia el segundo verbo sin perder su cercanía semántica con el primero.'
theological_decisions:
- issue: Nombre divino יְהוָה en el texto español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. La forma española 'Yahvé' preserva el nombre propio de Dios y evita la sustitución por un título, manteniendo la política de transparencia del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lenguaje antropopático en יִנָּחֵם יְהוָה
  english_pob_reading: Yahweh was moved to pity
  chosen_spanish_reading: Yahvé era movido a compasión
  alternative_spanish_readings:
  - Yahvé se arrepentía
  - Yahvé se compadecía
  - Yahvé se conmovía
  rationale: '''Era movido a compasión'' conserva la respuesta afectiva de Dios al clamor humano sin introducir la idea doctrinalmente problemática de arrepentimiento por pecado. Así se mantiene la tensión del texto hebreo y la lectura auditada en inglés.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indica que no se necesitaban cambios y que el acuerdo con la auditoría inglesa es alto. Esta propuesta sigue esa lectura sin introducir variantes no justificadas por el hebreo o por la auditoría existente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se usa 'juez/jueces' para שֹׁפֵט/שֹׁפְטִים, conforme al libro de Jueces.
  - '''Salvaba'' y ''era movido a compasión'' conservan el aspecto habitual del contexto narrativo repetitivo.'
  - Se preserva el hebraísmo 'de la mano de' por su concreción y transparencia.
  - '''Gemido'' y ''afligían'' buscan equilibrio entre fidelidad léxica y español publicable.'
