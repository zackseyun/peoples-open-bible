translation:
  language: es
  text: 'Y algunos de los jefes de las casas paternas dieron al tesoro para la obra: veinte mil dáricos de oro y dos mil doscientas minas[a][b][c] de plata.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un dárico era una moneda persa de oro.
    reason: cultural_note
  - marker: b
    text: O, más literalmente, «de entre los jefes de las casas paternas».
    reason: lexical_alternative
  - marker: c
    text: Una mina era una antigua unidad de peso y, por extensión, de valor monetario.
    reason: cultural_note
lexical_decisions:
- source_word: וּמֵרָאשֵׁי הָאָבוֹת
  english_pob_choice: And some of the heads of the fathers’ houses
  chosen_spanish: Y algunos de los jefes de las casas paternas
  alternatives_spanish:
  - Y de entre los jefes de las casas paternas
  - Y algunos de los jefes de familia
  lexicon: HALOT
  rationale: La construcción con מִן en hebreo puede expresar procedencia o selección «de entre», y el POB inglés la tomó como «some of». En español, «algunos de los jefes» comunica bien esa selección sin forzar una literalidad torpe. «Casas paternas» conserva la estructura social genealógica del hebreo mejor que «familias», aunque ambas serían posibles.
- source_word: נָתְנוּ
  english_pob_choice: gave
  chosen_spanish: dieron
  alternatives_spanish:
  - contribuyeron
  - donaron
  lexicon: HALOT
  rationale: El qal perfecto פשוט de נָתַן pide un verbo simple. «Dieron» mantiene la neutralidad del hebreo y evita introducir una interpretación más específica que el texto no exige.
- source_word: לְאוֹצַר הַמְּלָאכָה
  english_pob_choice: to the treasury for the work
  chosen_spanish: al tesoro para la obra
  alternatives_spanish:
  - al tesoro del trabajo
  - al almacén de la obra
  lexicon: HALOT
  rationale: אוֹצָר puede ser tesoro o depósito de valores; «tesoro» es natural en español y conserva el matiz de fondo de bienes destinados al proyecto. הַמְּלָאכָה se refiere a la obra/reconstrucción en curso, por eso «para la obra» expresa finalidad sin sobreespecificar.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - de oro
  lexicon: HALOT
  rationale: El hebreo nombra el material directamente. En español, después de una unidad monetaria, «de oro» suele sonar más natural que repetir «oro» desnudo; por eso aparece como modificador del valor monetario.
- source_word: דַּרְכְּמוֹנִים
  english_pob_choice: darics
  chosen_spanish: dáricos
  alternatives_spanish:
  - monedas dáricas
  - monedas de oro
  lexicon: HALOT
  rationale: Se preserva el nombre histórico de la moneda persa. «Dáricos» es el equivalente español más reconocido y mantiene la especificidad cultural del término mejor que una generalización como «monedas de oro».
- source_word: שְׁתֵּי רִבּוֹת
  english_pob_choice: twenty thousand
  chosen_spanish: veinte mil
  alternatives_spanish:
  - dos miríadas
  - dos veces diez mil
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «dos decenas de millares», pero el español corriente usa «veinte mil». Esta opción sigue la decisión del POB inglés de usar la cifra estándar y evita un calco innecesario.
- source_word: וְכֶסֶף
  english_pob_choice: and ... of silver
  chosen_spanish: y ... de plata
  alternatives_spanish:
  - y plata
  - y en plata
  lexicon: HALOT
  rationale: כֶּסֶף puede significar «plata» o, por metonimia, «dinero». Aquí el contexto de pesos/unidades y el paralelo con oro favorecen el metal. Se conserva la coordinación simple del hebreo con «y».
- source_word: מָנִים
  english_pob_choice: minas
  chosen_spanish: minas
  alternatives_spanish:
  - manes
  - manás
  lexicon: HALOT
  rationale: «Mina» es la unidad antigua de peso/valor correspondiente al hebreo מָנֶה. Se mantiene el tecnicismo histórico, como hizo el POB inglés, en lugar de modernizarlo a una equivalencia aproximada.
- source_word: אַלְפַּיִם וּמָאתָיִם
  english_pob_choice: two thousand two hundred
  chosen_spanish: dos mil doscientos
  alternatives_spanish:
  - dos mil y doscientos
  lexicon: HALOT
  rationale: La secuencia numérica hebrea se traduce con la forma estándar del español contemporáneo. Así se conserva el valor exacto sin alterar el registro.
translation_notes:
  revision_awareness: 'Se sigue el consenso alto de la revisión inglesa: no se introdujeron cambios de sentido respecto del POB, y se mantuvieron las decisiones históricas sobre «dáricos» y «minas», además de la lectura de «from among» en la frase inicial.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - «Casas paternas» se conserva como término socio-genealógico consistente con otros pasajes de listas y censos.
  - La moneda y la unidad de peso se mantienen como tecnicismos históricos para preservar la especificidad del pasaje.
  - La puntuación con dos puntos sigue la segmentación natural del enunciado enumerativo en español.
