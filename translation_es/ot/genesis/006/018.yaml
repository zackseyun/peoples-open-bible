translation:
  language: es
  text: Pero yo estableceré mi pacto contigo[a], y entrarás en el arca—tú, tus hijos, tu esposa y las esposas de tus hijos contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «confirmaré mi pacto contigo». El verbo hebreo puede llevar uno u otro matiz en contextos de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  english_pob_choice: But I will establish
  chosen_spanish: Pero yo estableceré
  alternatives_spanish:
  - Y yo estableceré
  - Pero yo confirmaré
  lexicon: HALOT
  rationale: El verbo en contexto de pacto admite el matiz de ‘establecer’ o ‘confirmar’. ‘Estableceré’ conserva la fuerza de un acto divino futuro y resulta natural en español. ‘Pero’ refleja el contraste discursivo con el juicio anunciado antes.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  lexicon: HALOT
  rationale: En español bíblico y eclesial, ‘pacto’ comunica de modo claro el término de relación formal y comprometida. ‘Alianza’ sería posible, pero ‘pacto’ mantiene mejor la terminología del pasaje y su continuidad canónica.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - conmigo
  lexicon: HALOT
  rationale: La preposición expresa relación de pacto y luego acompañamiento. ‘Contigo’ es idiomático y conserva la proximidad personal sin añadir explicaciones.
- source_word: וּבָאתָ
  english_pob_choice: and you shall enter
  chosen_spanish: y tú entrarás
  alternatives_spanish:
  - y tú irás al
  - y tú te meterás en
  lexicon: HALOT
  rationale: ‘Entrar’ expresa de forma clara el movimiento hacia el arca y evita el calco menos natural de ‘venir’. El pronombre explícito preserva el énfasis del hebreo.
- source_word: הַתֵּבָה
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - la nave
  - el barco
  lexicon: HALOT
  rationale: En el relato de Noé, תֵּבָה se refiere a la gran caja flotante tradicionalmente llamada ‘arca’. ‘Arca’ es el equivalente consagrado y más preciso en este contexto.
- source_word: וּבָנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos varones
  alternatives_spanish:
  - tus hijos
  - tus muchachos
  lexicon: HALOT
  rationale: El hebreo dice específicamente ‘hijos’ varones. En español, ‘tus hijos varones’ evita ambigüedad y conserva la fuerza del término sin perder naturalidad.
- source_word: וְאִשְׁתְּךָ
  english_pob_choice: your wife
  chosen_spanish: tu esposa
  alternatives_spanish:
  - tu mujer
  - tu esposa y
  lexicon: HALOT
  rationale: ‘Esposa’ es la forma más digna y clara en español contemporáneo para este contexto familiar.
- source_word: וּנְשֵׁי בָנֶיךָ
  english_pob_choice: your sons’ wives
  chosen_spanish: las esposas de tus hijos
  alternatives_spanish:
  - tus nueras
  - las mujeres de tus hijos
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente ‘las mujeres/esposas de tus hijos’. ‘Las esposas de tus hijos’ sigue de cerca el original y es transparente; ‘nueras’ sería más interpretativo.
theological_decisions:
- issue: Sentido de וַהֲקִמֹתִי en contexto de pacto
  english_pob_reading: 'future-oriented covenant promise: ''I will establish my covenant with you'''
  chosen_spanish_reading: 'promesa futura de pacto: ‘estableceré mi pacto contigo’'
  alternative_spanish_readings:
  - ‘confirmaré mi pacto contigo’
  rationale: El hebreo permite tanto ‘establecer’ como ‘confirmar’ en contextos de pacto. La traducción principal conserva la amplitud sin decidir una discusión teológica mayor sobre si el pacto es inaugurado o reafirmado.
  doctrine_reference: Preservar la tensión léxica sin resolverla dogmáticamente.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y coincide sustancialmente con la lectura auditada en inglés; no se detectaron revisiones posteriores que requirieran ajuste.
  spanish_consistency_notes:
  - Se prefirió ‘pacto’ para בְּרִית por consistencia bíblica y claridad teológica.
  - Se mantuvo ‘arca’ para תֵּבָה conforme al uso establecido en el relato de Noé.
  - Se explicitó el pronombre ‘tú’ para reflejar el énfasis del hebreo.
  - Se evitó ‘siervo’ o formulaciones litúrgicas no presentes en el texto fuente.
