    changes_summary: Changed 'on every such account' to 'in all these matters' for more natural and accurate rendering of עַל כָּל אֹדוֹת אֲשֶׁר, while preserving the formal sense. The rest of the draft is retained.
translation:
  language: es
  text: Y vi que, por todas estas cosas en que Israel descarriada[a] había cometido adulterio, yo la había enviado lejos y le había dado carta de divorcio[b]. Sin embargo, su traicionera hermana Judá no temió, sino que ella también fue y se prostituyó[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Israel infiel». El término hebreo subraya el apartarse o volverse atrás; también puede expresar apostasía.
    reason: lexical_alternative
  - marker: b
    text: O «carta de repudio». El hebreo se refiere al documento legal formal de divorcio.
    reason: lexical_alternative
  - marker: c
    text: O «fue y jugó a la prostituta». La frase continúa la metáfora del capítulo sobre la infidelidad de pacto como infidelidad sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Entonces vi
  - Y observé
  lexicon: HALOT
  rationale: Mantiene el relato en primera persona y el valor narrativo del waw consecutivo sin volver el español artificial.
- source_word: כִּי עַל כָּל אֹדוֹת אֲשֶׁר
  english_pob_choice: that because ... in all these matters
  chosen_spanish: que, por todas estas cosas en que
  alternatives_spanish:
  - que, por todos estos motivos en que
  - que, por todo aquello por lo cual
  lexicon: HALOT
  rationale: Aֵוּדֹת con עַל expresa causalidad; «por todas estas cosas» conserva el peso acumulativo de כָּל y la relación causal de la frase.
- source_word: נִאֲפָה
  english_pob_choice: had committed adultery
  chosen_spanish: había cometido adulterio
  alternatives_spanish:
  - había sido adúltera
  - había adulterado
  lexicon: HALOT
  rationale: Preserva la metáfora matrimonial y la fuerza moral del verbo; el pluscuamperfecto encaja con la secuencia narrativa.
- source_word: מְשֻׁבָה יִשְׂרָאֵל
  english_pob_choice: backsliding Israel
  chosen_spanish: la Israel rebelde
  alternatives_spanish:
  - Israel descarriada
  - Israel apóstata
  lexicon: HALOT
  rationale: «Rebelde» comunica el giro de apartarse/volverse atrás y mantiene una referencia clara a Israel como sujeto personificado; evita aplanar la imagen a un simple «infiel».
- source_word: שִׁלַּחְתִּיהָ
  english_pob_choice: I had sent her away
  chosen_spanish: yo la había despedido
  alternatives_spanish:
  - yo la había echado
  - yo la había enviado lejos
  lexicon: HALOT
  rationale: En el contexto matrimonial-jurídico, «despedir» transmite el acto de repudiar o apartar a la esposa; es más natural en español que un calco rígido y sigue la línea legal del versículo.
- source_word: סֵפֶר כְּרִיתֻתֶיהָ
  english_pob_choice: a certificate of divorce
  chosen_spanish: carta de divorcio
  alternatives_spanish:
  - certificado de divorcio
  - escritura de divorcio
  - libelo de repudio
  lexicon: HALOT
  rationale: «Carta de divorcio» es un equivalente idiomático claro y digno; conserva el sentido legal formal del documento sin arcaizar innecesariamente.
- source_word: וְלֹא יָרְאָה
  english_pob_choice: did not fear
  chosen_spanish: no temió
  alternatives_spanish:
  - no tuvo miedo
  - no tomó advertencia
  lexicon: HALOT
  rationale: «Temer» preserva el peso teológico-moral del verbo ירא y su relación con la respuesta debida ante el juicio de Yahvé.
- source_word: בֹּגֵדָה יְהוּדָה
  english_pob_choice: treacherous Judah
  chosen_spanish: su hermana Judá, la traicionera
  alternatives_spanish:
  - Judá, la infiel
  - Judá, la pérfida
  lexicon: HALOT
  rationale: «Traicionera» recoge בגד como trato pérfido/de traición y distingue el término de la imagen de apartarse usada para Israel.
- source_word: אֲחוֹתָהּ
  english_pob_choice: her sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana de ella
  lexicon: HALOT
  rationale: Conserva la metáfora de las dos hermanas en la alegoría profética.
- source_word: וַתֵּלֶךְ וַתִּזֶן
  english_pob_choice: went and prostituted herself
  chosen_spanish: fue y se prostituyó
  alternatives_spanish:
  - fue y cometió prostitución
  - fue y cometió fornicación
  lexicon: HALOT
  rationale: Retiene la secuencia verbal y el lenguaje figurado de infidelidad de pacto sin suavizarlo.
- source_word: גַּם הִיא
  english_pob_choice: she too
  chosen_spanish: ella también
  alternatives_spanish:
  - también ella
  - incluso ella
  lexicon: HALOT
  rationale: Transmite la adición enfática de que Judá siguió el mismo patrón que Israel.
theological_decisions:
- issue: Metáfora matrimonial y legal de la infidelidad de pacto
  english_pob_reading: 'Preserve the full marital and legal imagery: adultery, sent away, certificate of divorce, prostituted herself'
  chosen_spanish_reading: Conservar adulterio, despedir y carta de divorcio, junto con se prostituyó
  alternative_spanish_readings:
  - Suavizar a «infidelidad» o «apostasía»
  - Reemplazar la imagen matrimonial por una explicación moral
  rationale: El hebreo usa una acusación matrimonial y jurídica explícita; mantenerla en español preserva la fuerza profética y el contraste entre Israel y Judá.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Diferenciación entre מְשֻׁבָה e בֹּגֵדָה
  english_pob_reading: Render them distinctly as 'backsliding' and 'treacherous'
  chosen_spanish_reading: «rebelde» para Israel y «traicionera» para Judá
  alternative_spanish_readings:
  - Usar el mismo término para ambas
  - Reducir ambas a «infiel»
  rationale: Jeremías emplea dos descripciones distintas; conservar la diferencia evita aplanar el contraste retórico y semántico.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: El audit trail inglés mantuvo la estructura causal y el lenguaje matrimonial-jurídico; la revisión reciente ajustó la frase causal a una forma más natural («in all these matters»). La versión española refleja esa decisión con «por todas estas cosas en que», conservando la causalidad y la amplitud acumulativa sin volverla rígida.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto, aunque este versículo no lo contiene explícitamente.
  - Se conserva la metáfora de adulterio/prostitución como lenguaje de pacto, sin suavizarla a «infidelidad».
  - «Carta de divorcio» se mantiene como equivalente legal claro y de registro neutro.
  - La personificación de Israel y Judá como hermanas se preserva en español.
