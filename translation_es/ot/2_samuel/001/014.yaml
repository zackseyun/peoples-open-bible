translation:
  language: es
  text: 'Entonces David le dijo[a]: «¿Cómo no tuviste temor de extender tu mano para destruir al ungido de Yahvé[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «¿Por qué no tuviste temor…?». El hebreo אֵיךְ literalmente significa «¿Cómo?» y expresa un reproche de asombro.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el ungido de Yahvé». Es decir, el rey consagrado por Yahvé.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva esa secuencia con español natural y digno.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a ese hombre
  lexicon: HALOT
  rationale: El dativo pronominal se expresa de manera natural con el clítico indirecto «le» en español.
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿Por qué?
  lexicon: HALOT
  rationale: «Cómo» mantiene el matiz de reproche asombrado del hebreo; «Por qué» sería más interpretativo.
- source_word: יָרֵאתָ
  english_pob_choice: were you not afraid
  chosen_spanish: no tuviste temor
  alternatives_spanish:
  - no temiste
  - no tuviste miedo
  lexicon: HALOT
  rationale: «Temor» reproduce el campo semántico de ירא y suena sobrio en este reproche judicial; evita una formulación demasiado coloquial.
- source_word: לִשְׁלֹחַ יָדְךָ
  english_pob_choice: to put out your hand
  chosen_spanish: poner tu mano
  alternatives_spanish:
  - extender tu mano
  - alzar tu mano
  lexicon: HALOT
  rationale: La POB inglesa optó por una versión más directa del modismo; «poner tu mano» conserva la acción idiomática en español sin volverla excesivamente literal.
- source_word: לְשַׁחֵת
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - matar
  - arruinar
  lexicon: HALOT
  rationale: «Destruir» cubre el sentido amplio de שחת y funciona bien en la acusación sin restringirlo indebidamente a un solo matiz.
- source_word: מְשִׁיחַ
  english_pob_choice: anointed
  chosen_spanish: ungido
  alternatives_spanish:
  - mesías
  - ungido del Señor
  lexicon: HALOT
  rationale: En este contexto histórico se refiere al rey consagrado por Dios; «ungido» preserva el sentido sin importar el título mesiánico posterior.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para renderizar el Tetragrámaton con el nombre propio «Yahvé», no con una sustitución titulada.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre divino directamente. La norma del proyecto pide transliterarlo como «Yahvé» para preservar el nombre covenantal revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering of מְשִׁיחַ in reference to Saul
  english_pob_reading: the LORD’s anointed
  chosen_spanish_reading: el ungido de Yahvé
  alternative_spanish_readings:
  - el mesías de Yahvé
  - el ungido del Señor
  rationale: En este pasaje narrativo, מְשִׁיחַ designa a Saúl como rey consagrado; «ungido» evita introducir una lectura cristológica ajena al contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: translate titles with attention to context'
- issue: Hebrew אֵיךְ as shocked reproach
  english_pob_reading: How were you not afraid...?
  chosen_spanish_reading: ¿Cómo no tuviste temor...?
  alternative_spanish_readings:
  - ¿Por qué no tuviste temor...?
  - ¿Cómo no te atreviste...?
  rationale: «Cómo» conserva el tono de reproche conmocionado señalado por la POB inglesa; «Por qué» desplaza el énfasis hacia la causa y pierde el golpe retórico.
  doctrine_reference: Hebrew discourse nuance in interrogatives
translation_notes:
  revision_awareness: La redacción sigue el último estado auditado de la POB inglesa, que ajustó el modismo de לִשְׁלֹחַ יָדְךָ a una forma más directa («put out your hand») sin alterar el sentido básico. La versión española mantiene esa directitud con «poner tu mano» y conserva el tono de reproche de אֵיךְ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se usa «ungido» y no «Mesías», porque el referente inmediato es Saúl como rey consagrado.
  - «Temor» refleja el campo semántico de ירא y evita una banalización emotiva.
  - La puntuación y el orden siguen un registro bíblico claro y publicable, sin calcos innecesarios.
