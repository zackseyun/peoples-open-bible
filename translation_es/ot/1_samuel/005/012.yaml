translation:
  language: es
  text: Y los hombres que no murieron fueron heridos con tumores[a], y el clamor de la ciudad subió hasta el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con hinchazones’; el término hebreo puede referirse a una tumefacción o tumor corporal. Las traducciones tradicionales a veces especifican ‘hemorroides’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲנָשִׁים
  english_pob_choice: And the men
  chosen_spanish: Y los hombres
  alternatives_spanish:
  - Y la gente
  - Y los varones
  - Y los hombres de la ciudad
  lexicon: HALOT
  rationale: אֲנָשִׁים es el plural común de 'hombres'; en este contexto no exige una ampliación a 'gente'. 'Hombres' conserva la referencia masculina y sigue de cerca el valor inmediato del hebreo.
- source_word: אֲשֶׁר לֹא מֵתוּ
  english_pob_choice: who did not die
  chosen_spanish: que no murieron
  alternatives_spanish:
  - que no habían muerto
  - los cuales no murieron
  lexicon: HALOT
  rationale: La cláusula relativa distingue a los sobrevivientes de los que sí murieron. El pretérito simple en español es natural y fiel, sin introducir un matiz temporal no necesario.
- source_word: הֻכּוּ
  english_pob_choice: were struck
  chosen_spanish: fueron heridos
  alternatives_spanish:
  - fueron golpeados
  - fueron heridos / castigados
  - fueron abatidos
  lexicon: HALOT
  rationale: El pasivo de נכה comunica que recibieron un golpe o una plaga. 'Fueron heridos' conserva la pasividad y la fuerza del evento; 'golpeados' suena más físico en español pero menos idiomático aquí.
- source_word: בָּעֳפָלִים
  english_pob_choice: with tumors
  chosen_spanish: con tumores[a]
  alternatives_spanish:
  - con hinchazones[a]
  - con swellings / hinchazones
  - con hemorroides[a]
  lexicon: HALOT
  rationale: עפלים denota una inflamación o tumoración corporal en este relato. 'Tumores' es claro y moderno; se mantiene la nota porque el hebreo permite un rango de referencia corporal que el español también podría expresar como 'hinchazones'. Se evita 'hemorroides' como especificación demasiado estrecha.
- source_word: וַתַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - se elevó
  - subió al cielo
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente. 'Subió' reproduce de manera natural la imagen del clamor que asciende, sin añadir 'al cielo' al verbo mismo.
- source_word: שַׁוְעַת
  english_pob_choice: the cry
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - la súplica
  - el clamor / grito de auxilio
  lexicon: HALOT
  rationale: שַׁוְעָה es un clamor o grito de auxilio. 'Clamor' comunica mejor el carácter colectivo y urgente del dolor que un simple 'grito'.
- source_word: הָעִיר
  english_pob_choice: of the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la ciudad entera
  - de la población
  lexicon: HALOT
  rationale: 'El constructo es directo: el clamor pertenece a la ciudad como colectividad. ''De la ciudad'' respeta la relación posesiva sin interpretarla como ''desde la ciudad''.'
- source_word: הַשָּׁמָיִם
  english_pob_choice: to heaven
  chosen_spanish: hasta los cielos
  alternatives_spanish:
  - hasta el cielo
  - al cielo
  lexicon: HALOT
  rationale: שָׁמַיִם es plural formal; 'los cielos' preserva mejor esa forma que el singular 'cielo'. 'Hasta' comunica el ascenso del clamor de manera natural en español.
theological_decisions:
- issue: La expresión final sobre el ascenso del clamor
  english_pob_reading: the cry of the city went up to heaven
  chosen_spanish_reading: el clamor de la ciudad subió hasta los cielos
  alternative_spanish_readings:
  - el clamor de la ciudad subió al cielo
  - el clamor de la ciudad llegó hasta los cielos
  rationale: 'No hay una decisión doctrinal compleja, pero sí una elección de registro y forma: conservar el ascenso real/imagístico del clamor sin convertirlo en una paráfrasis explicativa. ''Hasta los cielos'' mantiene el plural hebreo y la imagen de elevación.'
  doctrine_reference: Ninguna; decisión poética/lexical.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la lectura auditada en inglés: sobrevivientes heridos con una afección corporal y el clamor de la ciudad que asciende al cielo. No se detectaron revisiones textuales que exigieran ajustes.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' según la convención del proyecto; aquí no aparece porque el versículo no contiene el nombre divino.
  - Se prefirió 'tumores' con nota lexical para mantener la ambigüedad médica del hebreo sin adoptar una especificación tradicional no obligatoria.
  - Se mantuvo 'los cielos' para reflejar el plural formal de שָׁמַיִם y conservar la imaginería bíblica del ascenso del clamor.
