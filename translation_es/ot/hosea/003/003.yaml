translation:
  language: es
  text: 'Y le dije a ella: «Por muchos días deberás quedarte para mí; no te prostituirás, y no serás para un hombre[a]; y yo también seré para ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «no serás para un hombre»; también puede entenderse «no serás de otro hombre» o «no tendrás marido».'
    reason: alternative_reading
lexical_decisions:
- source_word: תֵּשְׁבִי
  english_pob_choice: you must remain
  chosen_spanish: deberás quedarte
  alternatives_spanish:
  - deberás permanecer
  - deberás estar
  - deberás habitar
  lexicon: HALOT
  rationale: ישב puede significar sentarse, permanecer o habitar. En este contexto de espera y restricción, «quedarte» expresa permanencia sin forzar una imagen espacial; el deber refleja el valor directivo del discurso.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - conmigo
  - mío
  - en relación conmigo
  lexicon: HALOT
  rationale: La preposición ל con sufijo de primera persona es literalmente «para mí / a mí». «Para mí» conserva la relación marcada por el hebreo y evita sobreinterpretar la frase como simple compañía.
- source_word: יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - muchos días
  - durante muchos días
  - por un largo tiempo
  lexicon: HALOT
  rationale: La expresión es literalmente «días muchos». En español, añadir «por» hace natural la duración temporal sin perder la cercanía formal al hebreo.
- source_word: תִזְנִי
  english_pob_choice: prostitute yourself
  chosen_spanish: te prostituirás
  alternatives_spanish:
  - cometerás prostitución
  - practicarás la prostitución
  - serás sexualmente inmoral
  lexicon: HALOT
  rationale: זנה en Oseas puede cargar connotaciones literales y simbólicas. Aquí, por el contexto matrimonial inmediato, «te prostituirás» mantiene la fuerza sexual del verbo sin diluirla en una formulación más general.
- source_word: תִהְיִי לְאִישׁ
  english_pob_choice: you must not be for a man
  chosen_spanish: no serás para un hombre
  alternatives_spanish:
  - no serás de un hombre
  - no serás con un hombre
  - no pertenecerás a un hombre
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «ser para un hombre». «Para un hombre» preserva la forma y la amplitud de sentido, dejando abierta la relación sexual o marital sin estrecharla indebidamente a «esposo».
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un marido
  - un esposo
  lexicon: HALOT
  rationale: אישׁ puede significar «hombre» o «marido». El indefinido de la frase favorece una lectura amplia; por eso «hombre» es más fiel que «marido», que estrecharía el alcance.
- source_word: וְגַם אֲנִי אֵלָיִךְ
  english_pob_choice: and I also will be for you
  chosen_spanish: y yo también seré para ti
  alternatives_spanish:
  - y yo también estaré para ti
  - y yo también seré contigo
  - y yo también seré hacia ti
  lexicon: HALOT
  rationale: La cláusula final es elíptica en hebreo. «Seré para ti» preserva la brevedad y la ambigüedad relacional del original, sin resolverla en una interpretación más específica como «esperaré por ti».
theological_decisions:
- issue: Cláusula final elíptica y reciprocidad simbólica
  english_pob_reading: The final clause is elliptical in Hebrew and may also be understood as 'and I also will be for you' or, more interpretively, 'and I also will wait for you.'
  chosen_spanish_reading: «y yo también seré para ti» conserva la elipsis y la ambigüedad relacional del hebreo.
  alternative_spanish_readings:
  - y yo también esperaré por ti
  - y yo también estaré para ti
  - y yo también seré hacia ti
  rationale: El pasaje forma parte del signo actuado de Oseas sobre una relación suspendida, pero no destruida. La traducción debe preservar esa tensión, no resolverla prematuramente en un sentido emocional, marital o temporal específico.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del POB inglés en dos puntos clave: conserva «seré para ti» para la cláusula final y mantiene la literalidad de «ser para un hombre». Se ha ajustado el resto al español natural, respetando el valor directivo del original y la ambigüedad teológica final.'
  spanish_consistency_notes:
  - Se usa «te prostituirás» para preservar la fuerza léxica de זנה, en línea con el POB inglés.
  - Se mantiene «un hombre» y no «un marido» en el cuerpo principal para no estrechar indebidamente el sentido del hebreo.
  - La fórmula «para ti» refleja la simetría con «para mí» y conserva la relación abierta del cierre hebreo.
  - Se prefiere «quedarte» sobre «habitar» o «sentarte» por claridad idiomática en español sin perder permanencia.
