  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español y reflejar mejor el sentido del griego: «sentado junto a su trabajo» evita una construcción forzada, «preocupado por su trabajo» expresa mejor el cuidado continuo de ἐν μερίμνῃ κεῖται διὰ παντός, y «toda su labor» corresponde mejor a πᾶσα ἡ ἐργασία αὐτοῦ que «toda su obra», además de alinearse más estrechamente con el audit trail inglés.'
