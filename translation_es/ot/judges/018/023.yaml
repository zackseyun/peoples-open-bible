translation:
  language: es
  text: 'Ellos llamaron en voz alta a los hijos de Dan[a], y se volvieron y le dijeron a Micaía: «¿Qué te pasa[b], que has clamado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a los hijos de Dan»; es decir, a los danitas.'
    reason: lexical_alternative
  - marker: b
    text: O «¿Qué tienes?», «¿Qué te ocurre?».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  english_pob_choice: They called out
  chosen_spanish: llamaron
  alternatives_spanish:
  - clamaron
  - llamaron a gritos
  lexicon: HALOT
  rationale: El hebreo קרא puede significar 'llamar' o 'clamar'. En este contexto narrativo, «llamaron» conserva el acto audible de dirigirse al grupo sin añadir necesariamente la carga emotiva de un grito.
- source_word: אֶל בְּנֵי דָן
  english_pob_choice: to the sons of Dan
  chosen_spanish: a los hijos de Dan
  alternatives_spanish:
  - a los danitas
  lexicon: HALOT
  rationale: «Hijos de Dan» sigue de cerca la expresión hebrea y mantiene la formulación genealógica/tribal. «Danitas» sería natural, pero suaviza la imagen literal presente en el texto fuente.
- source_word: וַיַּסֵּבּוּ פְּנֵיהֶם
  english_pob_choice: they turned around
  chosen_spanish: se volvieron
  alternatives_spanish:
  - volvieron la cara
  - se dieron vuelta
  lexicon: HALOT
  rationale: El modismo hebreo literalmente dice que 'volvieron sus rostros'. «Se volvieron» expresa con claridad y naturalidad en español el cambio de orientación sin perder la acción física.
- source_word: לְמִיכָה
  english_pob_choice: to Micah
  chosen_spanish: a Micaía
  alternatives_spanish:
  - a Micah
  lexicon: N/A (nombre propio)
  rationale: Se mantiene el nombre propio en forma española habitual, «Micaía», para un texto bíblico en español legible y consistente.
- source_word: מַה לְּךָ
  english_pob_choice: What is the matter with you
  chosen_spanish: ¿Qué te pasa?
  alternatives_spanish:
  - ¿Qué tienes?
  - ¿Qué te ocurre?
  lexicon: HALOT
  rationale: La pregunta idiomática hebrea expresa qué le ocurre o preocupa a alguien. «¿Qué te pasa?» comunica bien esa fuerza idiomática en español contemporáneo sin sobreexplicar.
- source_word: כִּי נִזְעָקְתָּ
  english_pob_choice: that you have called out
  chosen_spanish: que has clamado
  alternatives_spanish:
  - que has gritado
  - que has alzado la voz
  lexicon: HALOT
  rationale: El nifal de זעק denota clamar/elevar un grito de protesta o auxilio. «Has clamado» conserva mejor esa intensidad que un simple «llamaste», y mantiene el eco del cuestionamiento de los danitas.
translation_notes:
  revision_awareness: El texto inglés del POB fue revisado y quedó sin cambios; la versión española sigue el mismo sentido, pero ajusta la idiomaticidad en español y conserva la referencia literal «hijos de Dan» con nota explicativa, dado que el inglés audita esa opción como alternativa lexical.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el nombre divino solo cuando aparezca en el contexto; aquí no aplica.
  - Se prefirió el paréntesis explicativo mediante nota para conservar la expresión tribal literal sin sacrificar claridad.
  - El verbo «clamar» se reservó para reflejar la intensidad del nifal de זעק en la cláusula final, mientras que el primer verbo se traduce más neutralmente como «llamar».
