  - severity: low
    issue: 'Puntuación inicial: «Ahora, el resto de...»'
    rationale: La coma después de «Ahora» no aporta claridad aquí y hace más pesada la fórmula. «Ahora el resto de...» o «Y el resto de...» suena más natural.
