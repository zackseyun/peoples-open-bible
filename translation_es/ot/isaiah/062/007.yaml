translation:
  language: es
  text: y no le den reposo[a] hasta que establezca, y hasta que haga de Jerusalén una alabanza en la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «silencio»; el sustantivo hebreo puede denotar silencio o quietud, y la expresión presenta una súplica incesante dirigida a Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O «en el país»; el hebreo אֶרֶץ puede significar «tierra» o «país».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל תִּתְּנ֥וּ
  english_pob_choice: and give ... no
  chosen_spanish: y no le den
  alternatives_spanish:
  - y no le den descanso
  - y no le concedan
  lexicon: HALOT
  rationale: La combinación de partícula negativa con el verbo נתן en este contexto exhorta a una insistencia continua. En español, «no le den» conserva la forma verbal y permite expresar el valor idiomático sin forzar una repetición artificial.
- source_word: דֳמִ֖י
  english_pob_choice: rest
  chosen_spanish: reposo
  alternatives_spanish:
  - silencio
  - quietud
  - descanso
  lexicon: HALOT
  rationale: El sustantivo puede significar silencio o quietud, pero aquí la imagen es no conceder pausa en la intercesión. «Reposo» comunica bien la idea de no dejar cesar la súplica, sin perder la tensión lexical entre silencio y quietud; la alternativa «silencio» queda reflejada en nota.
- source_word: ל֑וֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere a Yahvé en el contexto inmediato. En español, el dativo «le» es natural y suficiente aquí.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  lexicon: HALOT
  rationale: Marca límite temporal y finalidad persistente. «Hasta que» reproduce con claridad la estructura hebrea y evita ambigüedad en español.
- source_word: יְכוֹנֵ֞ן
  english_pob_choice: he establishes
  chosen_spanish: él establezca
  alternatives_spanish:
  - él restaure
  - él afirme
  - él ponga firmemente
  lexicon: HALOT
  rationale: כון en este stem expresa establecer, hacer firme, asentar. «Establezca» conserva el valor de fijar y consolidar, y funciona bien con Jerusalén como objeto implícito desde el contexto.
- source_word: וְ/עַד יָשִׂ֧ים
  english_pob_choice: and until he makes
  chosen_spanish: y hasta que haga
  alternatives_spanish:
  - y hasta que ponga
  - y hasta que establezca
  lexicon: HALOT
  rationale: שׂים abarca poner, hacer, establecer. Con un predicado nominal, «haga de Jerusalén» expresa de forma natural la transformación que presenta el hebreo.
- source_word: יְרֽוּשָׁלִַ֛ם תְּהִלָּ֖ה
  english_pob_choice: Jerusalem a praise
  chosen_spanish: de Jerusalén una alabanza
  alternatives_spanish:
  - a Jerusalén una alabanza
  - de Jerusalén un motivo de alabanza
  - de Jerusalén una fama
  lexicon: HALOT
  rationale: El hebreo presenta a Jerusalén como predicado nominal de תהלה. «Una alabanza» preserva la metáfora directa y el carácter nominal, aunque en español pueda sonar un poco más marcado que una paráfrasis como «motivo de alabanza».
- source_word: בָּאָרֶץ
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en el mundo
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra o país/land. Dado el alcance profético universal y la resonancia natural en español, «en la tierra» conserva la amplitud del texto sin cerrarlo a un territorio local.
theological_decisions:
- issue: Referencia del pronombre final y de la acción persistente de intercesión
  english_pob_reading: The pronoun refers to the LORD, whom the watchmen are urged to petition without ceasing.
  chosen_spanish_reading: El pronombre «le» se refiere a Yahvé, a quien los vigilantes deben seguir suplicando sin cesar.
  alternative_spanish_readings:
  - se refiere a un destinatario divino implícito
  - puede leerse como una referencia genérica a Dios
  rationale: El contexto inmediato de Isaías 62:6 habla de los que recuerdan a Yahvé y no callan; el versículo 7 continúa esa exhortación. Traducir con pronombre de objeto indirecto mantiene la referencia a Dios sin explicitarla de modo innecesario en el cuerpo del texto.
  doctrine_reference: Isaías 62:6-7; continuidad del sujeto divino en la sección
- issue: Valor de תְּהִלָּה como predicado de Jerusalén
  english_pob_reading: make Jerusalem a praise
  chosen_spanish_reading: hacer de Jerusalén una alabanza
  alternative_spanish_readings:
  - hacer de Jerusalén un motivo de alabanza
  - convertir a Jerusalén en alabanza
  rationale: La frase hebrea conserva una metáfora nominal fuerte. «Una alabanza» mantiene esa tensión poética y no la reduce demasiado a una explicación abstracta, respetando la forma en que la ciudad aparece transformada en objeto de alabanza.
  doctrine_reference: Poética profética de la restauración de Sion; Isaías 62:1-7
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido y la estructura del texto hebreo, en continuidad con la traducción inglesa auditada. Se mantuvo la tensión lexical de דֳמִי como una expresión de reposo/silencio y la amplitud de אֶרֶץ como «tierra», evitando una reducción interpretativa excesiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» de acuerdo con el estándar del proyecto para el Tetragrámaton cuando el contexto inmediato refiere al Señor a quien se dirige la súplica.
  - Se conserva el paralelismo de dos cláusulas introducidas por «hasta que» para reflejar la insistencia del hebreo.
  - «Alabanza» se mantiene como sustantivo predicativo para respetar la imagen profética de Jerusalén como objeto de reconocimiento público.
