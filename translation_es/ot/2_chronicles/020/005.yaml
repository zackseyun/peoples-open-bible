    issue: La nota al pie usa «la nueva corte» como alternativa de «nuevo atrio».
    rationale: «Corte» no es una alternativa natural para חָצֵר en español bíblico moderno y puede inducir a pensar en un tribunal o corte palaciega. El inglés auditado ofrece «the new courtyard», por lo que la nota española debe reflejar un equivalente arquitectónico como «el nuevo patio».
  revised_spanish_text: Y Josafat se puso en pie en la asamblea de Judá y Jerusalén, en la casa de Yahvé, delante del nuevo atrio[a].
