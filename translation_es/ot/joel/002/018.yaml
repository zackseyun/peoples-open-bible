    issue: La nota al pie duplica la lectura principal en vez de dar una alternativa léxica real.
    rationale: 'El inglés preserva la alternativa ''was zealous for his land''. La nota española dice ''O: «se mostró celoso por su tierra»'', que no añade una opción distinta y por tanto no conserva el rango semántico documentado.'
  - severity: low
    issue: '''Se mostró celoso'' añade un matiz de manifestación más que de cambio de estado.'
    rationale: El hebreo narrativo y la auditoría inglesa favorecen un valor ingresivo/resultativo ('se puso', 'llegó a estar', 'tuvo celo'). No es un error grave, pero 'se puso celoso' refleja mejor 'became jealous'.
