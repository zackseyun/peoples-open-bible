translation:
  language: es
  text: 'Y Daniel les dijo[a]: «Sepárenlos bien lejos el uno del otro, y yo los examinaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los interrogaré». El verbo griego puede denotar examen judicial o interrogatorio.
