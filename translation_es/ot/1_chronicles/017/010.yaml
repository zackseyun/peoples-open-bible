translation:
  language: es
  text: desde los días en que establecí jueces sobre mi pueblo Israel. Y someteré a todos tus enemigos. Además, te digo que Yahvé te edificará una casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé edificará una casa para ti», es decir, establecerá una dinastía para ti.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְמִיָּמִים
  english_pob_choice: from the days
  chosen_spanish: desde los días
  alternatives_spanish:
  - desde aquellos días
  - desde el tiempo en que
  lexicon: HALOT
  rationale: La expresión hebrea combina una preposición temporal con 'días'; en español, 'desde los días' conserva el valor temporal y suena natural. Mantiene la continuidad con el contexto anterior sin forzar una paráfrasis.
- source_word: אֲשֶׁר צִוִּיתִי שֹׁפְטִים
  english_pob_choice: when I appointed judges
  chosen_spanish: en que establecí jueces
  alternatives_spanish:
  - cuando nombré jueces
  - cuando designé jueces
  lexicon: HALOT
  rationale: Aunque צוה suele ser 'mandar', aquí con 'jueces' el sentido histórico es instituir/poner en funciones. 'Establecí' conserva esa idea de investidura sin perder el trasfondo de autoridad divina.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  english_pob_choice: over my people Israel
  chosen_spanish: sobre mi pueblo Israel
  alternatives_spanish:
  - para mi pueblo Israel
  lexicon: HALOT
  rationale: '''Sobre'' conserva la relación de gobierno o autoridad que expresa עַל. ''Mi pueblo Israel'' retiene la carga pactual presente en el hebreo y en la traducción inglesa auditada.'
- source_word: וְהִכְנַעְתִּי
  english_pob_choice: I will subdue
  chosen_spanish: someteré
  alternatives_spanish:
  - domaré
  - humillaré
  lexicon: HALOT
  rationale: El verbo puede abarcar la idea de sujetar o someter; en este contexto militar y de promesa real, 'someteré' comunica mejor el resultado sobre los enemigos que 'humillaré'.
- source_word: אֶת כָּל אוֹיְבֶיךָ
  english_pob_choice: all your enemies
  chosen_spanish: a todos tus enemigos
  alternatives_spanish:
  - a cada uno de tus enemigos
  lexicon: HALOT
  rationale: '''Todos'' conserva la totalidad de כָּל. El objeto directo con ''a'' es natural en español con este verbo y no altera el sentido.'
- source_word: וָאַגִּד לָךְ
  english_pob_choice: Moreover, I tell you
  chosen_spanish: Además, te digo
  alternatives_spanish:
  - Y te declaro
  - Y, además, te digo
  lexicon: HALOT
  rationale: נגד aquí introduce una declaración solemne. 'Además' refleja la progresión del discurso, y 'te digo' conserva el carácter performativo sin exagerar con lenguaje más interpretativo.
- source_word: וּבַיִת יִבְנֶה לְּךָ יְהוָה
  english_pob_choice: Yahweh will build you a house
  chosen_spanish: Yahvé te edificará una casa
  alternatives_spanish:
  - Yahvé te construirá una casa
  - Yahvé edificará para ti una casa
  lexicon: HALOT
  rationale: Se conserva 'casa' para mantener el juego intencional con la promesa dinástica. 'Edificará' suena más digno en español bíblico que 'construirá' y conserva el paralelismo con el hebreo y el audit trail inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal, no la sustitución tradicional ''SEÑOR''.'
theological_decisions:
- issue: Sentido de 'casa' al final del versículo
  english_pob_reading: Retain 'house' in the main text, implying dynastic promise by context rather than replacing it with 'dynasty.'
  chosen_spanish_reading: Mantener 'casa' en el texto principal, dejando que el contexto sugiera la promesa dinástica.
  alternative_spanish_readings:
  - Yahvé te establecerá una dinastía
  - Yahvé te edificará una casa, es decir, una dinastía
  rationale: 'El hebreo usa בַּיִת con intención de doble sentido: casa/templo y casa real/dinastía. Traducir ''dinastía'' en el cuerpo del texto resolvería una tensión literaria que el pasaje conserva; por eso se mantiene ''casa'' y se deja la interpretación al contexto y a notas si fueran necesarias.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo masorético y coincide sustancialmente con la decisión inglesa auditada. No se identificaron revisiones posteriores que requieran ajuste textual; se conserva la tensión de בַּיִת ('casa') en la línea principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se prefiere 'casa' en lugar de 'dinastía' en el texto principal para conservar el juego semántico.
  - '''Someteré'' mantiene la fuerza militar de וְהִכְנַעְתִּי sin debilitarla a una mera idea moral.'
  - La puntuación separa la declaración divina en unidades breves y publicables.
  - La nota al pie complementa, pero no sustituye, el sentido principal del texto.
