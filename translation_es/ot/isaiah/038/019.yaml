revisions:
- from: El viviente, el viviente, él te da gracias[a], como yo hoy; un padre da a conocer a los hijos[b] tu fidelidad.
  to: El viviente, el viviente, él te da gracias, como yo lo hago hoy; un padre da a conocer a sus hijos tu fidelidad[a].
  rationale: Se corrige la ubicación de la nota para que recaiga sobre «tu fidelidad», que es donde corresponde la alternativa léxica documentada. Se hace explícita la elipsis en «como yo lo hago hoy» para un español más natural sin añadir sentido. Se ajusta «a los hijos» a «a sus hijos» para mejorar la relación sintáctica con «un padre» y mantener la transmisión generacional; aunque el English POB usó «children», esta reparación mínima conserva fidelidad al hebreo y legibilidad en español sin introducir una paráfrasis mayor. No se requiere adjudicación adicional.
