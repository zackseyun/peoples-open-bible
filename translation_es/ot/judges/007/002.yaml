review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé habla a Gedeón, el problema es que el pueblo es demasiado numeroso para que Yahvé entregue a Madián en su mano, y la razón es evitar que Israel se atribuya la salvación. Sin embargo, hay un desajuste importante en la cláusula de prevención: פֶּן pide una idea de prevención como «no sea que»/«para que no», pero el español actual «para que Israel no se gloríe» suena más a finalidad directa de Yahvé que a prevención; además, «se gloríe contra mí» es menos natural y preciso que «se jacte contra mí». La nota b también está mal formulada en español y mezcla inglés («deliver»).'
  spanish_quality_summary: El texto es generalmente legible y digno, pero tiene varias asperezas menores. «La gente ... es demasiada» es comprensible, aunque «el pueblo ... es demasiado numeroso» suena más bíblico y natural en este contexto. «En su mano» preserva el singular idiomático, pero en español requiere nota aclaratoria, ya presente. «Se gloríe contra mí» es poco idiomático para el sentido de jactancia; «se jacte contra mí» comunica mejor el valor de יִתְפָּאֵר עָלַי. La puntuación y la cita están bien, aunque el punto final debe ir dentro de las comillas angulares solo si cierra toda la oración; aquí conviene mantener la puntuación final tras la cita dentro del cierre completo de la oración, como en la revisión propuesta.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé», יָד como imagen -> «mano», הוֹשִׁיעָה -> «ha salvado». No hay conflicto con Mesías/Cristo u otros términos sensibles. La principal mejora es estilística-semántica: preferir «se jacte» para יִתְפָּאֵר en este contexto de autoexaltación contra Yahvé.'
  issues:
  - severity: medium
    issue: «para que Israel no se gloríe» debilita el matiz preventivo de פֶּן
    rationale: Aunque puede funcionar, en español suena más a propósito positivo que a advertencia preventiva. «No sea que Israel se jacte contra mí» refleja mejor el valor de lest.
  - severity: medium
    issue: «se gloríe contra mí» es poco natural para el sentido de jactancia
    rationale: El hitpael de פאר aquí expresa autoexaltación/boasting. «Jactarse» comunica mejor ese valor en español contemporáneo y evita ambigüedad con glorificación cultual.
  - severity: low
    issue: «La gente ... es demasiada» suena menos adecuado que «el pueblo ... es demasiado numeroso»
    rationale: הָעָם en este contexto militar-narrativo se vierte con más naturalidad y tono bíblico como «el pueblo». La frase revisada mejora fluidez sin perder el singular colectivo.
  - severity: low
    issue: 'La nota b contiene una formulación incorrecta: «librando me» y mezcla inglés'
    rationale: Debe decir «me ha librado» o equivalente, y no incluir «deliver» en una nota española.
  revised_spanish_text: 'Yahvé dijo a Gedeón[a]: «El pueblo que está contigo es demasiado numeroso para que yo entregue a Madián en su mano, no sea que Israel se jacte contra mí, diciendo[b]: “Mi propia mano me ha salvado”.»'
  revised_footnotes:
