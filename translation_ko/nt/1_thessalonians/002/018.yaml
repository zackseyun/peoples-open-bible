  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀διότι ἠθελήσαμεν ἐλθεῖν πρὸς ὑμᾶς, ἐγὼ μὲν Παῦλος καὶ ἅπαξ καὶ δίς, καὶ ἐνέκοψεν ἡμᾶς ὁ Σατανᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/018.yaml
  text: Because we wanted to come to you—I[a], Paul, again and again—but Satan hindered us.
  footnotes:
  - marker: a
    text: Literally, 'once and twice,' an idiom meaning 'more than once.'
    reason: lexical_alternative
translation:
  language: ko
  text: 우리가 여러분에게 가기를 원하였기 때문입니다. 나 바울로서는 한 번 두 번[a] 그렇게 하려 하였으나, 사탄이 우리를 가로막았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「한 번 그리고 두 번」, 「여러 차례」를 뜻하는 관용어.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ μὲν Παῦλος
  english_pob_choice: I, Paul
  chosen_korean: 나 바울로서는
  alternatives_korean:
  - 나 바울은
  - 특히 나 바울은
  lexicon: BDAG
  rationale: μέν은 다른 구성원과의 대비를 함의한다(실루아노·디모데는 다른 빈도로). 「~로서는」이 그 한정의 어감을 자연스럽게 담는다.
- source_word: ἅπαξ καὶ δίς
  english_pob_choice: again and again
  chosen_korean: 한 번 두 번
  alternatives_korean:
  - 여러 차례
  - 거듭거듭
  lexicon: BDAG
  rationale: 한국어 「한 번 두 번」이 헬라어의 직접적 어감을 보존하면서 관용적으로 「여러 번」을 의미한다.
- source_word: ἐνέκοψεν ἡμᾶς ὁ Σατανᾶς
  english_pob_choice: Satan hindered us
  chosen_korean: 사탄이 우리를 가로막았습니다
  alternatives_korean:
  - 사탄이 우리를 방해하였습니다
  - 사탄이 우리의 길을 막았습니다
  lexicon: BDAG
  rationale: ἐγκόπτω의 「길을 끊다·가로막다」를 「가로막다」로 옮긴다. 「사탄」은 한국 교회 전통의 정형 어휘.
