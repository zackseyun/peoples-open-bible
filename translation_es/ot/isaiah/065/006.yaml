translation:
  language: es
  text: 'Mira[a], está escrito delante de mí: no me quedaré callado, sino que retribuiré; sí, retribuiré[b] en su regazo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «queda escrito delante de mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en su seno». La imagen hebrea es la de una retribución devuelta directamente a la persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Fíjate
  lexicon: HALOT
  rationale: La partícula introduce una proclamación solemne y llama la atención. «Mira» conserva la fuerza deíctica en español moderno con dignidad, sin el arcaísmo de «He aquí».
- source_word: כְתוּבָה לְפָנַי
  english_pob_choice: it is written before me
  chosen_spanish: está escrito delante de mí
  alternatives_spanish:
  - está escrito ante mí
  - queda escrito delante de mí
  - está registrado delante de mí
  lexicon: HALOT
  rationale: El participio pasivo con la frase preposicional expresa un registro permanente y presente ante Dios. «Está escrito delante de mí» mantiene la imagen y suena natural en español.
- source_word: לֹא אֶחֱשֶׂה
  english_pob_choice: I will not keep silent
  chosen_spanish: no me quedaré callado
  alternatives_spanish:
  - no callaré
  - no guardaré silencio
  - no me mantendré en silencio
  lexicon: HALOT
  rationale: חשה significa guardar silencio o callarse. «No me quedaré callado» expresa bien la resolución futura en un español fluido, sin perder la idea de silencio deliberado.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - antes bien
  - más bien
  lexicon: HALOT
  rationale: En este contexto, la locución introduce el contraste con la cláusula negada. «Sino» reproduce mejor la estructura adversativa del hebreo en español.
- source_word: שִׁלַּמְתִּי
  english_pob_choice: I will repay
  chosen_spanish: pagaré
  alternatives_spanish:
  - recompensaré
  - daré pago
  - pagaré de vuelta
  lexicon: HALOT
  rationale: Aunque la forma es perfecta, en discurso profético expresa una acción futura resuelta. «Pagaré» conserva la idea de retribución judicial sin estrecharla indebidamente a castigo.
- source_word: וְשִׁלַּמְתִּי
  english_pob_choice: indeed, I will repay
  chosen_spanish: sí, pagaré
  alternatives_spanish:
  - y pagaré
  - ciertamente, pagaré
  - en verdad, pagaré
  lexicon: HALOT
  rationale: La repetición intensifica la certeza. «Sí» refleja esa reafirmación enfática sin perder la naturalidad del español.
- source_word: עַל חֵיקָם
  english_pob_choice: into their lap
  chosen_spanish: en su seno
  alternatives_spanish:
  - en su regazo
  - en su pecho
  - en su falda
  lexicon: HALOT
  rationale: חֵיק alude al área del pecho/regazo y, en contextos de retribución, comunica que el pago vuelve directamente sobre la persona. «En su seno» conserva la imagen bíblica tradicional y la cercanía de la retribución; «en su regazo» sería más literal, pero menos natural aquí.
theological_decisions:
- issue: Tiempo y aspecto de שִׁלַּמְתִּי / וְשִׁלַּמְתִּי
  english_pob_reading: 'Future sense: ''I will repay ... indeed, I will repay'''
  chosen_spanish_reading: 'Futuro: «pagaré ... sí, pagaré»'
  alternative_spanish_readings:
  - 'Perfecto: «he pagado»'
  - 'Resultado presente: «ya he pagado»'
  rationale: En el lenguaje profético, los perfectos hebreos suelen expresar una acción futura segura. El futuro español preserva esa decisión divina sin introducir un matiz pasado que el contexto no exige.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Naturaleza de la retribución
  english_pob_reading: Judicial recompense without specifying more than the text states
  chosen_spanish_reading: Retribución judicial sin especificar más de lo que dice el texto
  alternative_spanish_readings:
  - castigo
  - venganza
  rationale: El verbo שׁלם aquí significa pagar o retribuir. «Pagaré» conserva la reciprocidad judicial del hebreo sin limitarla indebidamente a una sola categoría interpretativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: alta concordancia, sin revisiones aplicadas; se mantuvieron las decisiones clave de deíctico, pasiva escrita permanente, futuro profético de los perfectos y metáfora de retribución devuelta directamente al destinatario.'
  spanish_consistency_notes:
  - Se usó «Mira» para הִנֵּה siguiendo el valor deíctico solemne y un registro español moderno.
  - Se prefirió «pagaré» sobre «recompensaré» para mantener la fuerza de retribución judicial sin añadir especificación interpretativa.
  - Se conservó «en su seno» como imagen bíblica de retorno directo, con nota alternativa para «en su regazo».
