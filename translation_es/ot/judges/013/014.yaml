translation:
  language: es
  text: No debe comer nada que provenga de la vid[a], ni beber vino ni bebida fuerte; ni debe comer nada inmundo. Debe guardar todo lo que le mandé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de todo lo que sale de la vid del vino», es decir, cualquier cosa derivada de la vid.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכֹּל אֲשֶׁר יֵצֵא מִגֶּפֶן הַיַּיִן
  english_pob_choice: anything that comes from the grapevine
  chosen_spanish: nada que provenga de la vid
  alternatives_spanish:
  - nada de la vid
  - nada que salga de la vid
  - nada derivado de la vid
  lexicon: HALOT
  rationale: La frase hebrea es amplia y abarca cualquier cosa que provenga de la vid. 'Provenga de la vid' conserva el valor de יֵצֵא ('salir/proceder') sin sonar forzado en español. 'Vid' es natural y suficiente para reproducir la imagen; 'grapevine' se vuelve simplemente 'vid' en español, sin perder la referencia al fruto.
- source_word: לֹא תֹאכַל
  english_pob_choice: she must not eat
  chosen_spanish: No debe comer
  alternatives_spanish:
  - No comerá
  - No ha de comer
  - No comerá de
  lexicon: HALOT
  rationale: La prohibición hebrea se expresa de manera natural con 'no debe'. Mantiene el carácter de mandato sin introducir un tono arcaico o excesivamente rígido.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: HALOT
  rationale: יַיִן corresponde de forma estándar a 'vino'. No hay razón para especificar más en el texto principal.
- source_word: שֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: bebida fuerte
  alternatives_spanish:
  - licor fuerte
  - bebida embriagante
  - bebida alcohólica
  lexicon: HALOT
  rationale: '''Bebida fuerte'' reproduce la equivalencia tradicional de שֵׁכָר sin estrecharla a una sola clase de bebida. Aunque suena algo más formal, es fiel y comprensible en contexto bíblico.'
- source_word: אַל תֵּשְׁתְּ
  english_pob_choice: she must not drink
  chosen_spanish: ni beber
  alternatives_spanish:
  - ni debe beber
  - ni ha de beber
  - ni beberá
  lexicon: HALOT
  rationale: Se coordinó con la prohibición anterior para evitar repetición pesada. El sentido prohibitivo permanece claro en la estructura 'ni beber vino ni bebida fuerte'.
- source_word: וְכָל טֻמְאָה
  english_pob_choice: anything unclean
  chosen_spanish: nada impuro
  alternatives_spanish:
  - nada inmundo
  - ninguna cosa impura
  - nada de impureza
  lexicon: HALOT
  rationale: '''Impuro'' preserva el registro ritual/covenantal de טֻמְאָה. En español, ''impuro'' comunica el campo semántico sin la posible carga más técnica de ''inmundo''.'
- source_word: כֹּל אֲשֶׁר צִוִּיתִיהָ
  english_pob_choice: all that I commanded her
  chosen_spanish: todo lo que le he mandado
  alternatives_spanish:
  - todo lo que le mandé
  - todo lo que le he ordenado
  - todo lo que le he comandado
  lexicon: HALOT
  rationale: El hebreo resume la instrucción como una totalidad. 'Le he mandado' conserva la fuerza imperativa y es natural en español bíblico contemporáneo.
- source_word: תִּשְׁמֹר
  english_pob_choice: she must keep
  chosen_spanish: Debe guardar
  alternatives_spanish:
  - Debe observar
  - Debe cumplir
  - Debe mantener
  lexicon: HALOT
  rationale: שׁמר aquí significa guardar/observar instrucciones. 'Guardar' funciona bien en español bíblico para el sentido de custodiar y cumplir una orden.
theological_decisions:
- issue: Alcance de la prohibición sobre la vid
  english_pob_reading: Anything derived from the grapevine; the wording is intentionally broad.
  chosen_spanish_reading: Nada que provenga de la vid; la prohibición se entiende de forma amplia.
  alternative_spanish_readings:
  - Solo uvas o productos inmediatos de la uva
  - Nada de la vid en un sentido más estrecho
  rationale: El hebreo מִכֹּל אֲשֶׁר יֵצֵא מִגֶּפֶן הַיַּיִן es amplio. El español conserva esa amplitud con 'provenga de la vid' para no restringir indebidamente la prohibición.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Registro de טֻמְאָה
  english_pob_reading: anything unclean; preserve covenantal/ritual category language.
  chosen_spanish_reading: nada impuro; mantiene el registro ritual.
  alternative_spanish_readings:
  - nada inmundo
  - nada contaminado
  - nada impuro moralmente
  rationale: '''Impuro'' mantiene el vínculo con el lenguaje bíblico de pureza/impureza y evita reducirlo a una noción meramente moral o higiénica.'
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Se siguió el cierre revisado del inglés POB, que prefirió 'grapevine' por ser más natural. En español se resolvió con 'la vid', que comunica el mismo alcance y evita una calca innecesaria. También se ajustó la coordinación de las prohibiciones para que el versículo fluya con naturalidad sin perder la serie de mandatos.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en el estilo general de la colección, aunque en este versículo el hablante directo no incluye el nombre divino.
  - Se evitó 'SEÑOR' como sustituto del nombre divino, conforme al criterio del proyecto.
  - '''Bebida fuerte'' conserva la terminología bíblica tradicional para שֵׁכָר y no se reemplazó por ''alcohol'' o ''licor'' por ser menos preciso en el registro bíblico.'
  - '''Impuro'' se eligió para טֻמְאָה por coherencia con el lenguaje de pureza ritual en la Torá.'
  - La nota [a] se ancla en 'vid' para explicar el alcance semántico del hebreo sin sobrecargar el texto principal.
