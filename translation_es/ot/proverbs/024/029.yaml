translation:
  language: es
  text: 'No digas[a]: «Como él me hizo, así le haré yo; pagaré al hombre conforme a su acción.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le pagaré al hombre según lo que hizo.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No vayas a decir
  - No digas nunca
  lexicon: HALOT
  rationale: La prohibición con אַל + imperfecto se expresa de forma natural en español con “No digas”. Conserva el tono directo del consejo sapiencial sin intensificarlo indebidamente.
- source_word: כַּאֲשֶׁר עָשָׂה לִי
  english_pob_choice: As he has done to me
  chosen_spanish: Como él me ha hecho
  alternatives_spanish:
  - Tal como él me hizo
  - Así como él me ha hecho
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marca comparación/reiteración. “Como” comunica bien la correspondencia; el perfecto compuesto español mantiene la acción pasada con efecto presente, como en el inglés auditado.
- source_word: כֵּן אֶעֱשֶׂה לּוֹ
  english_pob_choice: so I will do to him
  chosen_spanish: así le haré yo
  alternatives_spanish:
  - así yo le haré
  - de la misma manera le haré
  lexicon: HALOT
  rationale: La correlación כַּאֲשֶׁר...כֵּן pide una equivalencia directa. “Así le haré yo” conserva la reciprocidad y el paralelismo retórico del hebreo.
- source_word: אָשִׁיב
  english_pob_choice: I will repay
  chosen_spanish: pagaré
  alternatives_spanish:
  - retribuiré
  - le devolveré
  - le pagaré
  lexicon: HALOT
  rationale: En este contexto vengativo, אָשִׁיב expresa compensación/represalia. “Pagaré” es breve, idiomático y transmite la idea de devolver el daño con medida retributiva sin sonar más técnico que el hebreo.
- source_word: לָאִישׁ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ese hombre
  - a la persona
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y el POB inglés optó por mantener esa forma. “Al hombre” preserva el referente individual y la precisión gramatical del término.
- source_word: כְּפָעֳלוֹ
  english_pob_choice: according to his deed
  chosen_spanish: conforme a su hecho
  alternatives_spanish:
  - según su obra
  - según su acción
  - de acuerdo con su obra
  lexicon: HALOT
  rationale: פָּעַל/פָּעֳלֽוֹ aquí apunta a la acción realizada y al criterio de retribución. “Conforme a su hecho” refleja la singularidad del sustantivo y la medida exacta del castigo/repago; “obra” sería posible, pero menos directo en español moderno en este contexto.
theological_decisions:
- issue: Prohibición de venganza personal en la forma sapiencial
  english_pob_reading: The verse prohibits vengeful self-talk and personal repayment in kind, without expanding beyond the text into a full doctrine of civil justice.
  chosen_spanish_reading: El dicho prohíbe proponerse vengarse o devolver el mal en la misma medida, sin ampliar el texto hacia una doctrina completa de justicia civil.
  alternative_spanish_readings:
  - Es una prohibición absoluta de toda retribución
  - Es solo una advertencia contra hablar impulsivamente
  rationale: El hebreo veta decirse a sí mismo que hará al otro lo mismo que recibió y que le pagará según su acción. La traducción debe preservar esa fuerza moral y retributiva, pero sin introducir conclusiones doctrinales que el proverbio no formula.
  doctrine_reference: Mantener la tensión teológica del texto; no resolverla añadiendo categorías que el proverbio no explicita.
translation_notes:
  revision_awareness: Se siguió el ajuste del audit trail que favorece 'deed' sobre 'work' para פעלו, por ser más natural y preciso en este contexto de retribución personal. La versión española conserva esa singularidad con 'hecho' y mantiene el paralelismo retórico del hebreo.
  spanish_consistency_notes:
  - Se usó 'hecho' para פָּעֳלוֹ, evitando 'obra' por su mayor carga positiva en español religioso.
  - Se mantuvo la primera persona futura en 'le haré' y 'pagaré' para reflejar el compromiso retaliatorio prohibido por el proverbio.
  - No se introdujo 'Señor' ni términos doctrinales ajenos; el versículo es sapiencial y no contiene nombres divinos.
