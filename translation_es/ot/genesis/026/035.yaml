translation:
  language: es
  text: Y fueron causa de amargura de espíritu para Isaac y Rebeca[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y llegaron a ser causa de amargura de espíritu para Isaac y Rebeca».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo «amargura de espíritu» expresa profunda aflicción o pesar.
    reason: cultural_note
  - marker: c
    text: 'O: «para Isaac y para Rebeca».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַתִּהְיֶיןָ
  english_pob_choice: And they were
  chosen_spanish: Y fueron
  alternatives_spanish:
  - Y llegaron a ser
  - Y se volvieron
  lexicon: HALOT
  rationale: El hebreo con wayyiqtol introduce la continuación narrativa y predica un estado de las sujetas femeninas plurales. En español, «fueron» conserva la copulativa sin forzar una paráfrasis, mientras que «llegaron a ser» o «se volvieron» introducen un matiz más explícito de cambio.
- source_word: מֹרַת
  english_pob_choice: a bitterness
  chosen_spanish: una amargura
  alternatives_spanish:
  - amargura
  - una fuente de amargura
  - dolor
  lexicon: HALOT
  rationale: El constructo nominal expresa una cualidad/estado de amargura o vexación. «Una amargura» mantiene la forma sustantiva concreta que el POB inglés preserva con «a bitterness», sin suavizarla a una interpretación más abstracta.
- source_word: רוּחַ
  english_pob_choice: of spirit
  chosen_spanish: de espíritu
  alternatives_spanish:
  - de ánimo
  - de corazón
  - de mente
  lexicon: HALOT
  rationale: Aquí רוּחַ alude al interior, al ánimo o disposición interna. «De espíritu» conserva el giro hebreo y la tensión idiomática; «de ánimo» o «de corazón» serían más explicativos pero menos pegados al texto.
- source_word: לְיִצְחָק
  english_pob_choice: to Isaac
  chosen_spanish: para Isaac
  alternatives_spanish:
  - a Isaac
  - en Isaac
  lexicon: HALOT
  rationale: La preposición ל marca al afectado por la situación. En español, con este predicado resulta natural y fiel expresar el impacto como «para Isaac»; «a Isaac» también es posible, pero menos idiomático con «una amargura de espíritu».
- source_word: וּלְרִבְקָה
  english_pob_choice: and to Rebekah
  chosen_spanish: y para Rebeca
  alternatives_spanish:
  - y a Rebeca
  - y en Rebeca
  lexicon: HALOT
  rationale: Se mantiene la misma función de ל con el segundo destinatario/afectado. «Rebeca» sigue la forma española usual del nombre; la repetición de la preposición se conserva con «para» para reflejar el paralelismo hebreo sin sonar forzado.
translation_notes:
  revision_awareness: El audit trail inglés mantiene «bitterness of spirit» como expresión idiomática y registra como alternativa «became bitterness of spirit». La versión española conserva esa misma tensión entre estado resultante y cualidad nominal, sin convertirla en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se preservó el valor nominal de מֹרַת con «amargura», en paralelo con el «bitterness» inglés.
  - Se mantuvo «de espíritu» para רוּחַ por fidelidad idiomática, no como equivalente psicológico modernizado.
  - El paralelismo de los dos complementos con ל se refleja mediante «para Isaac y para Rebeca» en la nota, aunque el texto principal usa la construcción más fluida «para Isaac y Rebeca».
  - Se usa «Rebeca» como forma española estándar del nombre propio.
