translation:
  language: es
  text: Pero esto era la acción invencible de la providencia del que desde el cielo ayuda a los judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «la operación invencible de la providencia de quien desde el cielo ayuda a los judíos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέργεια
  english_pob_choice: working
  chosen_spanish: acción
  alternatives_spanish:
  - obra
  - operación
  - actividad
  lexicon: LSJ
  rationale: ἐνέργεια expresa una operación eficaz o acción en curso. En español, «acción» comunica bien el efecto activo sin sonar técnico en exceso; «operación» sería más explícito pero más abstracto, y «obra» podría sugerir solo un resultado terminado.
- source_word: προνοίας
  english_pob_choice: providence
  chosen_spanish: providencia
  alternatives_spanish:
  - previsión
  - cuidado
  - provisión
  lexicon: LSJ
  rationale: Aquí el término apunta al cuidado soberano de Dios, no solo a previsión humana. «Providencia» conserva el peso teológico que el contexto exige y corresponde al uso asentado en español cristiano.
- source_word: τοῦ βοηθοῦντος
  english_pob_choice: of the one helping
  chosen_spanish: del que ayuda
  alternatives_spanish:
  - de quien ayuda
  - del que ayuda
  lexicon: LSJ
  rationale: El participio articular griego funciona de manera sustantiva. «Del que ayuda» mantiene esa forma indirecta sin añadir explícitamente un nombre divino que el griego no da en este punto.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los judeanos
  - a los judíos
  lexicon: LSJ
  rationale: En 3 Macabeos designa al pueblo judío como grupo étnico-religioso. «Judíos» es la opción natural y fiel en español; «judeanos» sería más técnica pero menos idiomática aquí.
- source_word: ἐξ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde el cielo
  - celestial
  lexicon: LSJ
  rationale: La construcción indica procedencia. «Desde el cielo» suena más fluido en español que un genitivo literal y conserva la idea de origen divino/heavenly.
- source_word: ἀνίκητον
  english_pob_choice: invincible
  chosen_spanish: invencible
  alternatives_spanish:
  - invencible
  - inconquistable
  - irresistible
  lexicon: LSJ
  rationale: El adjetivo afirma que esa acción no podía ser vencida. «Invencible» reproduce con precisión la fuerza del griego y es el equivalente más natural en español.
theological_decisions:
- issue: Referente implícito del que ayuda a los judíos desde el cielo
  english_pob_reading: An implicit reference to God, rendered without making the subject more explicit than the Greek does.
  chosen_spanish_reading: Referencia implícita a Dios, expresada sin volver explícito el sujeto más de lo que permite el griego.
  alternative_spanish_readings:
  - «Dios, el que ayuda a los judíos desde el cielo»
  - «la providencia invencible de Dios desde el cielo»
  rationale: 'El griego usa un participio sustantivado y no nombra a Dios directamente. La traducción española conserva esa tensión: el referente divino se entiende por el contexto, pero no se lo inserta como sujeto explícito en el cuerpo del texto.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se siguió el estado más reciente sin cambios sustanciales; el punto principal de decisión sigue siendo mantener el referente divino implícito y traducir ἐνέργεια con un término natural en español que no sobreinterprete la noción de acción eficaz.
  spanish_consistency_notes:
  - Se mantuvo «providencia» para προνοίας, en línea con la tradición teológica y con el audit trail inglés.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque el griego aquí no lo ofrece; el referente permanece implícito.
  - Se usó «judíos» por fidelidad contextual en 3 Macabeos, donde el término designa al pueblo, no solo a habitantes geográficos.
