  to: no sea que haya entre ustedes un hombre o una mujer[a], o un clan o una tribu, cuyo corazón se aparta hoy de Yahvé nuestro Dios para ir y servir a los dioses de esas naciones; no sea que haya entre ustedes una raíz que produzca veneno y ajenjo.
