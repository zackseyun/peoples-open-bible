translation:
  language: es
  text: Y nos sacó de allí, para hacernos entrar y darnos la tierra que juró a nuestros padres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «a nuestros antepasados». Hebreo: «a nuestros padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֹתָנוּ
  english_pob_choice: And us
  chosen_spanish: Y nos
  alternatives_spanish:
  - Y a nosotros
  - Y nos, además
  lexicon: HALOT
  rationale: El hebreo antepone el objeto directo con conjunción; en español natural se integra como «Y nos» para conservar la continuidad discursiva sin duplicar innecesariamente el objeto.
- source_word: הוֹצִיא
  english_pob_choice: brought ... out
  chosen_spanish: sacó
  alternatives_spanish:
  - sacó de allí
  - nos sacó
  - nos hizo salir
  lexicon: HALOT
  rationale: El hiphil de יצא expresa sacar/hacer salir. «Sacó» reproduce bien el movimiento de salida del éxodo y funciona con la referencia posterior a «llevarnos».
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: «De allí» es una equivalencia breve y natural para el adverbio locativo, manteniendo la referencia deíctica del texto.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de
  lexicon: HALOT
  rationale: Aquí introduce finalidad. En español, «para» permite unir con naturalidad los infinitivos siguientes («llevarnos y darnos») sin perder la fuerza purposiva.
- source_word: הָבִיא אֹתָנוּ
  english_pob_choice: he might bring us in
  chosen_spanish: llevarnos
  alternatives_spanish:
  - traernos
  - hacernos entrar
  lexicon: HALOT
  rationale: El hiphil de בוא aquí significa introducir/traer adentro. En español, «llevarnos» expresa el movimiento hacia la tierra de manera idiomática y conserva el paralelismo con «sacó».
- source_word: לָתֵת לָנוּ
  english_pob_choice: to give us
  chosen_spanish: y darnos
  alternatives_spanish:
  - para darnos
  - para entregarnos
  lexicon: HALOT
  rationale: 'El infinitivo de נתן expresa el propósito de la entrada: recibir la tierra. «Darnos» es claro y mantiene la coordinación natural con «llevarnos».'
- source_word: אֶת־הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En contexto pactal deuteronómico, la expresión apunta a la tierra prometida. «La tierra» preserva el uso bíblico convencional y no restringe indebidamente el alcance geográfico.
- source_word: אֲשֶׁר נִשְׁבַּע
  english_pob_choice: that he swore
  chosen_spanish: que juró
  alternatives_spanish:
  - que prometió bajo juramento
  - que había jurado
  lexicon: HALOT
  rationale: נשבע subraya el juramento solemne de Dios. «Juró» conserva la carga legal/covenantal mejor que una simple «promesa».
- source_word: לַאֲבֹתֵינוּ
  english_pob_choice: to our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  - a nuestros padres patriarcas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a nuestros padres». Se mantiene esa forma por fidelidad lexical y por su valor pactal patriarcal, en línea con la decisión inglesa de no neutralizarla.
theological_decisions:
- issue: Referencia patrimonial/covenantal en לַאֲבֹתֵינוּ
  english_pob_reading: to our fathers
  chosen_spanish_reading: a nuestros padres
  alternative_spanish_readings:
  - a nuestros antepasados
  rationale: El contexto de Deuteronomio remite a los patriarcas como receptores del juramento divino. Se conserva el masculino plural para no diluir la referencia histórica y teológica del pacto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Lenguaje del juramento en נִשְׁבַּע
  english_pob_reading: that he swore
  chosen_spanish_reading: que juró
  alternative_spanish_readings:
  - que prometió
  rationale: El texto fundamenta la donación de la tierra en un juramento de Yahvé, no solo en una promesa genérica. «Juró» mantiene ese peso de compromiso pactual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: La traducción sigue de cerca el hebreo y concuerda con el audit trail inglés. No se detectaron revisiones aplicadas en la versión de referencia; por eso no se incorporan notas de variante textual ni se introduce tensión lexical adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto para el nombre divino cuando aparezca, aunque en este versículo no hay término explícito en el texto hebreo.
  - Se conserva un registro bíblico sobrio y claro, evitando arcaísmos innecesarios como «hízonos» o «entrarnos».
  - «Tierra» se usa en sentido pactal, no como mera geografía general.
  - La coordinación «sacó… para llevarnos y darnos» reproduce el paralelismo semántico entre sacar e introducir del hebreo.
