    issue: «Vestidos» podría también haberse vertido como «ropas».
    rationale: No es un error; «vestidos» sigue siendo inteligible y de registro bíblico. La elección actual es aceptable.
  - severity: low
    issue: «Anochecer» interpreta עֶרֶב como el comienzo de la tarde-noche.
    rationale: Es una opción española natural y suficientemente fiel al marco ritual; no crea distorsión material frente a «la tarde» o «la noche».
