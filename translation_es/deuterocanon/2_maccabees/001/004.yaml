translation:
  language: es
  text: y abrir[a] vuestro corazón a su ley y sus mandamientos, y conceder paz;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y que él abra vuestro corazón a su ley y sus mandamientos, y conceda paz». Los infinitivos griegos continúan la oración del versículo anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: διανοίξαι
  english_pob_choice: open
  chosen_spanish: abrir
  alternatives_spanish:
  - abrir del todo
  - hacer receptivo
  lexicon: LSJ
  rationale: El infinitivo aoristo continúa la súplica del versículo anterior. «Abrir» conserva la imagen de la receptividad interior sin añadir interpretación que el griego no exige.
- source_word: καρδίαν
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón interior
  - mente
  - interior
  lexicon: LSJ
  rationale: En español bíblico, «corazón» comunica bien la sede interior de voluntad, entendimiento y afecto. Mantiene el idiomático paralelo con el griego sin reducirlo a «mente».
- source_word: ἐν τῷ νόμῳ αὐτοῦ
  english_pob_choice: in his law
  chosen_spanish: a su ley
  alternatives_spanish:
  - en su ley
  - dentro de su ley
  lexicon: LSJ
  rationale: Aunque el griego usa ἐν, en español «abrir el corazón a» expresa mejor la orientación o dirección del acto. Se conserva la referencia a «su ley» sin calcar una preposición menos natural en esta construcción.
- source_word: προστάγμασιν
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las ordenanzas
  - los decretos
  lexicon: LSJ
  rationale: «Mandamientos» es la correspondencia más clara y ampliamente inteligible para πρόσταγμα en un contexto religioso-ético, y empareja naturalmente con «ley».
- source_word: εἰρήνην ποιῆσαι
  english_pob_choice: grant peace
  chosen_spanish: conceder paz
  alternatives_spanish:
  - dar paz
  - hacer paz
  - otorgar paz
  lexicon: LSJ
  rationale: ποιῆσαι εἰρήνην puede sonar en español como «hacer paz», pero en una oración resulta más natural «conceder paz». Conserva la agencia divina implícita y evita una lectura demasiado conflictiva o diplomática.
theological_decisions:
- issue: Sujeto implícito y continuidad de la súplica del versículo anterior
  english_pob_reading: The Greek infinitives continue the prayer from the previous verse.
  chosen_spanish_reading: Se mantiene la continuidad implícita de la oración, sin introducir un sujeto explícito en la línea principal.
  alternative_spanish_readings:
  - y que él abra vuestro corazón a su ley y a los mandamientos, y conceda paz;
  - y abra vuestro corazón a su ley y a los mandamientos, y conceda paz;
  rationale: El griego presenta infinitivos dependientes de la súplica previa. Para un versículo aislado en español, mantener la frase como continuación oracional preserva la dependencia sin forzar una reexpresión que el texto aquí no desarrolla.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión sintáctica original.
translation_notes:
  revision_awareness: 'El contexto inglés revisado pasó de una redacción más literal («in his law and in the commandments», «bring about peace») a otra más idiomática («to his law and commandments», «grant peace»). La versión española sigue esa línea de naturalidad, pero vuelve a anclar el sentido en el griego: καρδίαν se conserva como «corazón» y la continuidad infinitiva se señala en nota para no perder la relación sintáctica con el versículo precedente.'
  spanish_consistency_notes:
  - Se mantiene «ley» para νόμος y «mandamientos» para προστάγματα, siguiendo el campo semántico del texto griego y la pauta POB.
  - «Paz» se traduce de forma directa, sin ampliarla a «bienestar» o «armonía», para conservar el valor bíblico-covenantal de εἰρήνη.
  - No se introducen términos eclesiásticos tradicionales que no estén exigidos por el griego.
