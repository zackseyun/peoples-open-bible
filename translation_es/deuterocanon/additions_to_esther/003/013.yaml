review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: súplica continua, doble título divino, apelación directa a Dios como rey, pedido de ayuda, condición de soledad y exclusión de cualquier otro ayudador. Sin embargo, hay dos desajustes importantes con la evidencia y la política del proyecto: κύριος en este contexto debe evitar «Señor» como convención de enmascaramiento y preferir «Yahvé»; y «ayudador» suena poco natural en español bíblico actual, aunque intente conservar βοηθός.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «tú solo eres el único» resulta algo redundante y rígido en español, y «no tengo ayudador» suena forzado. «Sola, sin ningún ayudador excepto tú» mantiene mejor el sustantivo personal y mejora la fluidez. También conviene ajustar la puntuación para que la oración suene natural en español.
  glossary_alignment: Debe alinearse con la terminología del proyecto usando «Yahvé» en lugar de «Señor» para κύριος en el texto principal. «Señor mío» como vocativo también debería revisarse a «Yahvé mío» para coherencia con la política dada, ya que aquí no hay razón contextual documentada para mantener «Señor». No hay conflicto con Mesías/Cristo u otros términos del glosario.
  issues:
  - severity: high
    issue: Uso de «Señor» para κύριος en vez de «Yahvé»
    rationale: La instrucción del proyecto establece que יהוה / YHWH debe representarse como «Yahvé» en el texto principal y pide explicar casos de κύριος vinculados al nombre divino. En esta oración dirigida al Dios de Israel, mantener «Señor» contradice la política terminológica.
  - severity: medium
    issue: «No tengo ayudador» es poco idiomático
    rationale: Aunque intenta conservar βοηθός como sustantivo personal, «ayudador» suena artificial en español neutral eclesial. «Sin ningún ayudador» o «sin nadie que me ayude» sería más natural; la primera conserva mejor el sustantivo personal.
  - severity: low
    issue: «Tú solo eres el único» suena redundante en español
    rationale: La redundancia refleja el énfasis de μόνος, pero en español puede mantenerse la tensión con una formulación más natural como «tú solo eres» en el texto y la nota, o «tú eres el único». Dado que la nota ya preserva la elipsis, la formulación principal puede suavizarse un poco sin perder fidelidad.
