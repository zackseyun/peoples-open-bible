    rationale: Aunque intenta preservar el valor lexical de מַעֲלוֹת, ‘ascensos’ suena técnico y ajeno al registro bíblico natural. ‘Cántico de las subidas’ conserva mejor el sentido y la forma de título reconocible.
  - severity: high
