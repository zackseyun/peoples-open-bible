base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/008/011.yaml
  text: 'He said[a], “This will be the custom of the king who will reign over you: he will take your sons and assign them to his chariots and among his horsemen[c][b], and they will run before his chariots.”'
  footnotes:
  - marker: a
    text: Or “the legal right of the king.” The Hebrew mishpat can denote a customary practice, a legal claim, or a judicial norm; here it refers to the way a king will typically act toward the people.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “your sons,” specifically male offspring, fitting the context of royal military service.
    reason: cultural_note
  - marker: c
    text: Or “before his chariot.” The Hebrew singular may be understood individually or collectively.
    reason: lexical_alternative
