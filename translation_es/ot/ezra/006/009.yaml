translation:
  language: es
  text: Y todo lo que haga falta—toros jóvenes, carneros y corderos para holocaustos al Dios del cielo, trigo, sal, vino y aceite, conforme a la palabra[a] de los sacerdotes que están en Jerusalén—que les sea dado día tras día, sin falta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según la instrucción de los sacerdotes que están en Jerusalén». La frase aramea dice literalmente «conforme a la palabra de los sacerdotes».
    reason: lexical_alternative
  - marker: b
    text: O «sin omisión» / «para que no falte nada». La cláusula final subraya que la provisión diaria no debe interrumpirse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָה חַשְׁחָן
  english_pob_choice: whatever is needed
  chosen_spanish: lo que haga falta
  alternatives_spanish:
  - y lo que se necesite
  - todo lo que haga falta
  lexicon: HALOT
  rationale: La combinación aramea introduce una provisión abierta y suficiente para la necesidad. «Lo que haga falta» conserva el sentido administrativo de requerimiento sin añadir más contenido del que el texto justifica.
- source_word: בְנֵי תוֹרִין
  english_pob_choice: young bulls
  chosen_spanish: toros jóvenes
  alternatives_spanish:
  - becerros
  - novillos
  lexicon: HALOT
  rationale: La expresión literal es idiomática; en contexto sacrificial se refiere a animales jóvenes. «Toros jóvenes» mantiene el valor sacrificial y evita una paráfrasis demasiado libre.
- source_word: דִכְרִין
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - borregos machos
  lexicon: HALOT
  rationale: «Carneros» es el equivalente natural y preciso para el animal sacrificial macho.
- source_word: אִמְּרִין
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderos jóvenes
  - borregos
  lexicon: HALOT
  rationale: En una lista de sacrificios, «corderos» comunica con claridad la referencia zoológica y cultual.
- source_word: לַעֲלָוָן
  english_pob_choice: for burnt offerings
  chosen_spanish: para holocaustos
  alternatives_spanish:
  - para ofrendas quemadas
  - para ofrendas de ascensión
  lexicon: HALOT
  rationale: El término cultual corresponde a holocaustos. «Holocaustos» es el vocablo tradicional y exacto para este tipo de ofrenda totalmente consumida.
- source_word: לֶאֱלָהּ שְׁמַיָּא
  english_pob_choice: to the God of heaven
  chosen_spanish: al Dios del cielo
  alternatives_spanish:
  - al Dios de los cielos
  lexicon: HALOT
  rationale: La fórmula aramea en Esdras designa al Dios verdadero; «del cielo» sigue de cerca la forma singular del original y su matiz de soberanía celeste.
- source_word: חִנְטִין
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - grano
  lexicon: HALOT
  rationale: La palabra denota trigo de manera específica. «Trigo» evita generalizar indebidamente a «grano».
- source_word: מְלַח
  english_pob_choice: salt
  chosen_spanish: sal
  lexicon: HALOT
  rationale: Equivalente léxico directo.
- source_word: חֲמַר
  english_pob_choice: wine
  chosen_spanish: vino
  lexicon: HALOT
  rationale: En este contexto de provisiones, la referencia es a vino.
- source_word: וּמְשַׁח
  english_pob_choice: and oil
  chosen_spanish: y aceite
  alternatives_spanish:
  - y aceite de oliva
  lexicon: HALOT
  rationale: El sustantivo significa aceite; el contexto sugiere aceite comestible/ritual, pero el texto no especifica oliva, así que no se añade.
- source_word: כְּמֵאמַר
  english_pob_choice: according to the word
  chosen_spanish: conforme a la palabra
  alternatives_spanish:
  - según la orden
  - de acuerdo con la instrucción
  lexicon: HALOT
  rationale: La traducción conserva la tensión semántica de «palabra» como expresión autorizada. «Conforme a la palabra» permite oír tanto el valor de declaración como el de instrucción administrativa.
- source_word: כָּהֲנַיָּא דִי בִירוּשְׁלֶם
  english_pob_choice: of the priests who are in Jerusalem
  chosen_spanish: de los sacerdotes que están en Jerusalén
  alternatives_spanish:
  - de los sacerdotes en Jerusalén
  lexicon: HALOT
  rationale: Se mantiene la relativa explícita del arameo para reflejar con claridad la referencia a los sacerdotes residentes en Jerusalén.
- source_word: לֶהֱוֵא מִתְיְהֵב
  english_pob_choice: let it be given
  chosen_spanish: que les sea dado
  alternatives_spanish:
  - que se les dé
  - que sea entregado
  lexicon: HALOT
  rationale: La construcción jussiva se vierte como mandato impersonal. «Que les sea dado» conserva el tono oficial y evita sobreespecificar al agente.
- source_word: לְהֹם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El dativo se incorpora naturalmente en español dentro de «les sea dado».
- source_word: יוֹם בְּיוֹם
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - día por día
  - cada día
  lexicon: HALOT
  rationale: La expresión idiomática repite la idea de provisión continua. «Día tras día» conserva la reiteración y su fluidez en español.
- source_word: דִּי לָא שָׁלוּ
  english_pob_choice: without fail
  chosen_spanish: sin falta
  alternatives_spanish:
  - sin omisión
  - sin descuido
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «without fail» por naturalidad. En español, «sin falta» comunica bien la ausencia de omisión o interrupción en el suministro diario.
theological_decisions:
- issue: Título divino arameo 'Dios del cielo'
  english_pob_reading: to the God of heaven
  chosen_spanish_reading: al Dios del cielo
  alternative_spanish_readings:
  - al Dios de los cielos
  rationale: Se conserva el título sin sustituirlo por una fórmula más litúrgica. El singular «cielo» sigue la forma del arameo y mantiene la resonancia administrativa de Esdras.
  doctrine_reference: Esdras 6:9; uso del título divino en el marco de la soberanía de Yahvé.
- issue: 'Tipo de ofrenda: burnt offerings'
  english_pob_reading: for burnt offerings
  chosen_spanish_reading: para holocaustos
  alternative_spanish_readings:
  - para ofrendas quemadas
  - para ofrendas de ascensión
  rationale: «Holocaustos» es el término cultual establecido para la ofrenda totalmente quemada. No se sustituye por un giro más explicativo que debilitaría la precisión sacrificial.
  doctrine_reference: Levítico 1; Esdras 6:9
- issue: Fórmula final de obligación continua
  english_pob_reading: without fail
  chosen_spanish_reading: sin falta
  alternative_spanish_readings:
  - sin omisión
  - sin interrupción
  rationale: El arameo indica que el suministro diario no debe cesar ni quedar incompleto. «Sin falta» transmite de forma natural ese mandato de continuidad.
  doctrine_reference: Esdras 6:9; énfasis administrativo en provisión continua
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «without neglect» a «without fail» por mayor naturalidad idiomática. La presente traducción sigue esa decisión y conserva el sentido de provisión diaria ininterrumpida. También se mantiene la opción de «according to the word» en una formulación española cercana al original, con nota alternativa para la lectura administrativa de «instrucción».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal del nombre divino en el proyecto, pero aquí el hebreo/arameo emplea el título «Dios del cielo», por lo que no corresponde introducir el nombre propio.
  - Se evita «Cristo» porque el versículo no contiene lenguaje mesiánico.
  - «Holocaustos» se mantiene como término cultual técnico y no como generalización a «ofrendas».
  - La secuencia de provisiones se conserva en orden para respetar la enumeración del original.
  - La puntuación con rayas reproduce el encuadre de una lista administrativa y su cláusula normativa final.
