revisions:
- from: 'Y nosotros también les escribimos en respuesta: Sus ganados y sus posesiones son nuestros[a], y las nuestras son suyas[c][b]. Por tanto, damos órdenes de que les informen de esto conforme a ello.'
  to: 'Y nosotros también les escribimos en respuesta: Sus ganados y sus posesiones son nuestros[a], y lo nuestro es suyo[c][b]. Por tanto, damos órdenes de que les informen de esto en el mismo sentido.'
  rationale: Se revisa la reciprocidad central para reflejar mejor τὰ ἡμῶν mediante «lo nuestro», que en español abarca el conjunto de bienes mencionados. También se sustituye «conforme a ello» por «en el mismo sentido» para representar con mayor naturalidad y precisión κατὰ τὰ αὐτά. Finalmente, se corrige la nota alternativa de ἀντιγράφομεν para que no repita la traducción principal.
