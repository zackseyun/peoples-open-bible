translation:
  language: es
  text: 'Pero ciertamente haremos toda palabra que salió de nuestra boca: ofrecer incienso a la Reina del Cielo y derramarle libaciones, como hicimos nosotros, nuestros padres, nuestros reyes y nuestros oficiales, en las ciudades de Judá y en las calles de Jerusalén; entonces teníamos pan en abundancia[a], estábamos bien[b] y no vimos calamidad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘estábamos saciados de pan’; literalmente, ‘fuimos llenos de pan’.
    reason: lexical_alternative
  - marker: b
    text: O ‘nos iba bien’.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Pues
  - Porque
  - Y
  lexicon: HALOT
  rationale: En el contexto retoma la respuesta del pueblo con valor adversativo frente a la exhortación previa; ‘Pero’ transmite mejor ese giro que un causal neutro.
- source_word: עָשֹׂה נַעֲשֶׂה
  english_pob_choice: we will surely do
  chosen_spanish: ciertamente haremos
  alternatives_spanish:
  - seguramente haremos
  - haremos sin falta
  - haremos ciertamente
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la afirmación; en español, ‘ciertamente’ conserva la fuerza enfática sin sonar artificial.
- source_word: כָּל הַדָּבָר אֲשֶׁר יָצָא מִפִּינוּ
  english_pob_choice: every word that has gone out from our mouth
  chosen_spanish: todo lo que salió de nuestra boca
  alternatives_spanish:
  - cada palabra que salió de nuestra boca
  - toda la palabra que salió de nuestra boca
  - todo lo que ha salido de nuestra boca
  lexicon: HALOT
  rationale: דָּבָר puede ser ‘palabra’ o ‘cosa/materia’; aquí el sentido es lo dicho o prometido. ‘Todo lo que salió de nuestra boca’ preserva la idiomática hebrea sin volverla rígida.
- source_word: לְקַטֵּר
  english_pob_choice: to burn incense
  chosen_spanish: ofrecer incienso
  alternatives_spanish:
  - quemar incienso
  - hacer humo de incienso
  - quemar ofrendas de incienso
  lexicon: HALOT
  rationale: En español bíblico moderno, ‘ofrecer incienso’ comunica bien el acto cultual y evita una literalidad menos natural que ‘quemar incienso’.
- source_word: לִמְלֶכֶת הַשָּׁמַיִם
  english_pob_choice: to the Queen of Heaven
  chosen_spanish: a la Reina del Cielo
  alternatives_spanish:
  - a la reina de los cielos
  - a la Reina de los Cielos
  lexicon: HALOT
  rationale: Se conserva el título idolátrico de la deidad tal como aparece en la fuente; ‘Reina del Cielo’ es la forma más directa y reconocible en español.
- source_word: וְהַסֵּיךְ לָהּ נְסָכִים
  english_pob_choice: and to pour out drink offerings to her
  chosen_spanish: y derramarle libaciones
  alternatives_spanish:
  - y derramarle ofrendas de bebida
  - y ofrecerle libaciones
  - y vaciarle libaciones
  lexicon: HALOT
  rationale: נסך + נסכים es un tecnicismo sacrificial; ‘derramarle libaciones’ conserva precisión cultual. Se evita ‘bebidas’ por ser menos técnico.
- source_word: כַּאֲשֶׁר עָשִׂינוּ
  english_pob_choice: just as ... did
  chosen_spanish: como hicimos
  alternatives_spanish:
  - tal como hicimos
  - así como hicimos
  - igual que hicimos
  lexicon: HALOT
  rationale: La comparación remite a una costumbre pasada; ‘como hicimos’ reproduce el paralelismo sin recargar el español.
- source_word: אֲנַחְנוּ וַאֲבֹתֵינוּ מְלָכֵינוּ וְשָׂרֵינוּ
  english_pob_choice: we and our fathers, our kings and our officials
  chosen_spanish: nosotros, nuestros padres, nuestros reyes y nuestros jefes
  alternatives_spanish:
  - nosotros, nuestros antepasados, nuestros reyes y nuestros príncipes
  - nosotros, nuestros padres, nuestros reyes y nuestros oficiales
  lexicon: HALOT
  rationale: ‘Padres’ conserva el tono genealógico del hebreo. ‘Jefes’ evita que ‘príncipes’ suene demasiado monárquico en español contemporáneo, aunque ambas opciones son posibles.
- source_word: בְּעָרֵי יְהוּדָה וּבְחֻצוֹת יְרוּשָׁלִָם
  english_pob_choice: in the cities of Judah and in the streets of Jerusalem
  chosen_spanish: en las ciudades de Judá y en las calles de Jerusalén
  alternatives_spanish:
  - en las ciudades de Judá y en las plazas de Jerusalén
  - en los pueblos de Judá y en las calles de Jerusalén
  lexicon: HALOT
  rationale: ‘Calles’ es una forma natural para חֻצוֹת en este contexto urbano; mantiene la imagen de práctica pública difundida.
- source_word: וַנִּשְׂבַּע לֶחֶם
  english_pob_choice: then we had plenty of bread
  chosen_spanish: entonces teníamos pan en abundancia
  alternatives_spanish:
  - entonces estábamos saciados de pan
  - entonces quedábamos satisfechos de pan
  - entonces teníamos suficiente pan
  lexicon: HALOT
  rationale: La expresión literal sugiere saciedad con pan; ‘pan en abundancia’ conserva la imagen sin sonar antinatural, acorde con la nota inglesa sobre suficiencia material.
- source_word: וַנִּהְיֶה טוֹבִים
  english_pob_choice: were well
  chosen_spanish: estábamos bien
  alternatives_spanish:
  - nos iba bien
  - prosperábamos
  - estábamos prosperando
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘fuimos/estuvimos bien’. Se evita ‘prosperábamos’ porque añade un matiz interpretativo más fuerte que la revisión inglesa final.
- source_word: וְרָעָה לֹא רָאִינוּ
  english_pob_choice: and saw no disaster
  chosen_spanish: y no vimos calamidad
  alternatives_spanish:
  - y no vimos mal
  - y no experimentamos calamidad
  - y no vimos desgracia
  lexicon: HALOT
  rationale: רָעָה aquí se refiere a calamidad/desastre, no a mal moral. ‘Calamidad’ preserva el sentido de aflicción nacional o material.
theological_decisions:
- issue: Título de una deidad idolátrica
  english_pob_reading: Queen of Heaven
  chosen_spanish_reading: Reina del Cielo
  alternative_spanish_readings:
  - reina de los cielos
  - Reina de los Cielos
  rationale: Se mantiene el título como designación cultual de la deidad mencionada en el texto, sin suavizarlo ni reinterpretarlo, preservando su fuerza polémica.
  doctrine_reference: Jeremiah 44:17; idolatría y culto falso denunciados en el contexto profético
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma en cuenta la revisión inglesa más reciente, especialmente la preferencia por un equivalente más literal de וַנִּהְיֶה טוֹבִים (‘estábamos bien’). También conserva la intensificación de la forma verbal inicial y la construcción cultual de ‘libaciones’ sin introducir paráfrasis interpretativas.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino cuando aparezca; en este versículo no se requiere.
  - Se mantiene ‘Reina del Cielo’ como título propio idolátrico, consistente con el audit trail en inglés.
  - ‘Jefes’ se elige por claridad contemporánea para שָׂרֵינוּ, sin perder el valor de autoridad gobernante.
  - ‘Calamidad’ traduce רָעָה en sentido de desastre y evita una lectura moralizante.
