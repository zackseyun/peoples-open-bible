translation:
  language: es
  text: Porque yo estoy listo para tropezar[a], y mi dolor está siempre delante de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estoy listo para cojear/tropezar», preservando la imagen más literal de inestabilidad física o figurada del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Conecta la afirmación con la razón dada en el contexto previo; «Porque» conserva bien la fuerza causal o explicativa de כִּי en español natural y digno.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - —
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre explícito mantiene el énfasis personal del hebreo y fluye con naturalidad en español.
- source_word: לְצֶלַע
  english_pob_choice: to stumble
  chosen_spanish: tropezar
  alternatives_spanish:
  - dar un paso en falso
  - cojear
  - caer
  lexicon: HALOT
  rationale: El campo semántico de צלע incluye lamer/se inclinarse/cojear/tropezar; «tropezar» comunica bien la imagen de inestabilidad inminente en español sin perder la tensión de fragilidad física o figurada.
- source_word: נָכוֹן
  english_pob_choice: am ready
  chosen_spanish: estoy listo
  alternatives_spanish:
  - estoy preparado
  - estoy dispuesto
  - estoy firme
  lexicon: HALOT
  rationale: En la construcción con לְצֶלַע, נָכוֹן expresa estar dispuesto o preparado para esa caída/inestabilidad; «estoy listo» reproduce de forma natural esa disponibilidad inmediata.
- source_word: וּמַכְאוֹבִי
  english_pob_choice: and my pain
  chosen_spanish: y mi dolor
  alternatives_spanish:
  - y mi sufrimiento
  - y mi aflicción
  - y mi pena
  lexicon: HALOT
  rationale: מַכְאוֹב designa dolor, sufrimiento o aflicción; «dolor» es la equivalencia más directa y comprensible en español, manteniendo el sentido físico y emotivo posible.
- source_word: נֶגְדִּי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - frente a mí
  - siempre ante mis ojos
  lexicon: HALOT
  rationale: La idea es de algo puesto en la línea de visión o constantemente presente; «delante de mí» conserva la imagen espacial y la vigencia continua del texto.
- source_word: תָמִיד
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - sin cesar
  lexicon: HALOT
  rationale: «Siempre» expresa la continuidad de תָמִיד con claridad y sobriedad, sin sobrecargar el verso.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo de WLC y el juicio revisado del POB en inglés, que prefirió «stumble» frente a «fall» para reflejar mejor לְצֶלַע. En español se optó por «tropezar» como equivalente natural que conserva la idea de inestabilidad o caída inminente.
  spanish_consistency_notes:
  - Se mantiene «dolor» para מַכְאוֹב, en coherencia con el valor léxico directo y sin suavizar el peso del término.
  - Se evita «SEÑOR» u otra sustitución teológica no presente en este verso.
  - El orden español conserva la cláusula causal inicial y la imagen locativa de נֶגְדִּי con «delante de mí».
