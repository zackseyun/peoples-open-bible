    issue: Cambio de persona en נְשֻׂאֹתֵיכֶם
    rationale: El sufijo hebreo es 2mp («vuestras»/«sus» de ustedes), y el inglés POB lo audita como «your loads». El borrador lo convirtió en tercera persona («Sus cargas»), perdiendo un detalle formal del texto fuente.
  - severity: medium
    issue: Aspecto verbal de כָּרַע
    rationale: El hebreo perfecto se usa proféticamente con presente vívido en el POB auditado. «Se ha inclinado» introduce un matiz perfectivo que no sigue la decisión documentada; «se inclina» preserva mejor el efecto.
  - severity: medium
    issue: La nota [a] no corresponde al lugar léxico correcto
    rationale: La nota inglesa [a] explica una alternativa para עֲצַבֵּיהֶם («their images»), no para כָּרַע. En español la nota quedó anclada en «se ha inclinado», alterando la justificación auditada.
  - severity: low
    issue: «Como un peso» puede mejorarse
    rationale: Aunque no es incorrecto, «peso» debilita el eco de מַשָּׂא como carga/fardo. «Como una carga» suena más idiomático y más cercano al campo semántico del verso.
