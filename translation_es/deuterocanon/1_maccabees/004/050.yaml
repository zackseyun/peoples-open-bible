translation:
  language: es
  text: Y quemaron incienso sobre el altar, e encendieron las lámparas que estaban sobre el candelabro, y brillaban[a] en el templo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «daban luz en el templo». El verbo griego puede reflejarse más literalmente con las lámparas como sujetos que brillan.
    reason: lexical_alternative
  - marker: b
    text: «Templo» aquí puede denotar más específicamente el área del santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθυμίασαν
  english_pob_choice: they burned incense
  chosen_spanish: quemaron incienso
  alternatives_spanish:
  - ofrecieron incienso
  - hicieron un ofrecimiento de incienso
  lexicon: LSJ
  rationale: θυμιάω se refiere de modo específico a quemar incienso; «quemaron incienso» conserva esa acción cultual concreta con naturalidad en español.
- source_word: ἐπὶ τὸ θυσιαστήριον
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - al altar
  lexicon: LSJ
  rationale: ἐπί con acusativo indica la acción realizada sobre la superficie del altar; «sobre el altar» es la forma más directa y natural en español.
- source_word: ἐξῆψαν
  english_pob_choice: they lit
  chosen_spanish: encendieron
  alternatives_spanish:
  - prendieron
  - encendieron fuego a
  lexicon: LSJ
  rationale: El verbo expresa prender o encender; «encendieron» funciona bien con lámparas y mantiene la claridad del rito.
- source_word: τοὺς λύχνους
  english_pob_choice: the lamps
  chosen_spanish: las lámparas
  alternatives_spanish:
  - las luces
  lexicon: LSJ
  rationale: λύχνος designa una lámpara concreta, no la luz en abstracto; «lámparas» preserva el objeto físico del mobiliario del templo.
- source_word: τῆς λυχνίας
  english_pob_choice: the lampstand
  chosen_spanish: el candelabro
  alternatives_spanish:
  - el candelero
  - la menorá
  lexicon: LSJ
  rationale: λυχνία es el soporte de las lámparas. «Candelabro» es transparente y comprensible en español; «menorá» introduciría un término transliterado no exigido por el griego.
- source_word: ἐφαίνοντο
  english_pob_choice: they shone
  chosen_spanish: brillaban
  alternatives_spanish:
  - resplandecían
  - daban luz
  lexicon: LSJ
  rationale: El imperfecto describe la visibilidad continua de las lámparas encendidas; «brillaban» refleja bien el efecto de la luz sin forzar una explicación interpretativa.
- source_word: ἐν τῷ ναῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el santuario
  lexicon: LSJ
  rationale: ναός puede referirse al santuario propiamente dicho, pero «templo» es claro y fiel en el contexto narrativo de la rededicación.
theological_decisions:
- issue: Lenguaje ritual concreto en la rededicación del templo
  english_pob_reading: 'Retain concrete ritual language: ''burned incense,'' ''altar,'' ''lampstand,'' and ''temple.'''
  chosen_spanish_reading: 'Conservar el lenguaje ritual concreto: «quemaron incienso», «altar», «candelabro» y «templo».'
  alternative_spanish_readings:
  - Generalizar a lenguaje de adoración menos específico
  - Sustituir por términos más devocionales y menos materiales
  rationale: La escena narra acciones litúrgicas precisas en la purificación/rededicación del templo; la traducción debe mantener su concreción ritual y no diluirla en lenguaje genérico.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió la última cláusula de «they gave light in the temple» a «they shone in the temple» para reflejar con mayor precisión ἐφαίνοντο y el sujeto implícito, las lámparas. La redacción española sigue esa decisión con «brillaban en el templo».
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo cultual del inglés auditado: incienso, altar, lámparas, candelabro y templo.'
  - Se evitó «SEÑOR» u այլ sustituciones no pertinentes; este versículo no contiene el nombre divino.
  - «Candelabro» se usa como equivalente funcional de λυχνία, sin introducir tecnicismos innecesarios.
  - Las notas a y b se anclan en palabras del texto para preservar la alternativa léxica y la posible precisión espacial de ναός.
