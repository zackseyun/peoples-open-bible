translation:
  language: es
  text: 'Y Susana gimió y dijo: «Estoy acorralada por todas partes[a]. Porque si hago esto, es muerte para mí; pero si no lo hago[b], no escaparé de sus manos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estoy oprimida por todos lados».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no escaparé de sus manos», un modismo para quedar en su poder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεστέναξεν
  english_pob_choice: groaned
  chosen_spanish: gimió
  alternatives_spanish:
  - suspiró hondamente
  - se lamentó
  lexicon: LSJ
  rationale: El verbo expresa un suspiro o gemido profundo de angustia. «Gimió» conserva mejor el peso emotivo que «suspiró», y es natural en español.
- source_word: Στενά μοι πάντοθεν
  english_pob_choice: I am hemmed in on every side
  chosen_spanish: Estoy acorralada por todas partes
  alternatives_spanish:
  - Estoy oprimida por todos lados
  - Estoy en aprietos por todas partes
  lexicon: LSJ
  rationale: La expresión idiomática comunica estar sin salida, cercada por completo. «Acorralada por todas partes» reproduce bien la constricción y la urgencia del griego.
- source_word: ἐὰν γὰρ τοῦτο πράξω
  english_pob_choice: if I do this
  chosen_spanish: si hago esto
  alternatives_spanish:
  - si hago esta cosa
  - si obro así
  lexicon: LSJ
  rationale: El demostrativo puede quedar implícito en español. «Hago esto» mantiene la sencillez y el paralelismo retórico del original.
- source_word: θάνατός μοί ἐστιν
  english_pob_choice: it is death for me
  chosen_spanish: es muerte para mí
  alternatives_spanish:
  - significa muerte para mí
  - yo moriré
  lexicon: LSJ
  rationale: La construcción nominal es abrupta y directa. «Es muerte para mí» conserva ese golpe estilístico mejor que una paráfrasis más interpretativa.
- source_word: ἐὰν μὴ πράξω
  english_pob_choice: if I do not do it
  chosen_spanish: si no lo hago
  alternatives_spanish:
  - si no actúo
  - si me niego
  lexicon: LSJ
  rationale: Se repite el verbo del contexto anterior para mantener el paralelismo. «Si no lo hago» es claro y fiel sin introducir una lectura adicional.
- source_word: οὐκ ἐκφεύξομαι
  english_pob_choice: I will not escape
  chosen_spanish: no escaparé
  alternatives_spanish:
  - no podré escapar
  - no me libraré
  lexicon: LSJ
  rationale: El futuro medio se refleja bien con «no escaparé», conservando la fuerza predictiva y la simetría del verso.
- source_word: τὰς χεῖρας ὑμῶν
  english_pob_choice: your hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - su poder
  - su dominio
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «vuestras manos», en español el plural de trato puede resultar ambiguo; «sus manos» mantiene la imagen concreta de estar en poder de los acusadores y evita un giro poco natural en la narración.
theological_decisions:
- issue: Conservar la presión coercitiva y la falta de salida en la escena
  english_pob_reading: The verse preserves the stark either-or pressure and threat implied by the elders' demand.
  chosen_spanish_reading: 'El versículo conserva la disyuntiva extrema y la amenaza implícita: obedecer significa muerte; desobedecer no le da escape.'
  alternative_spanish_readings:
  - Una versión más suave que aluda solo a vergüenza o peligro social
  - Una paráfrasis que reduzca la tensión narrativa
  rationale: La sintaxis española mantiene el tono abrupto del griego y no atenúa la coerción moral y narrativa. Esto preserva la gravedad del dilema sin domesticarlo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete, alineado con la traducción inglesa auditada. Se conserva la imagen idiomática de constricción y la construcción nominal de muerte, sin suavizar la amenaza. Se ajusta τὰς χεῖρας ὑμῶν a «sus manos» para que el español suene natural, pero la nota conserva el valor literal y el sentido idiomático.
  spanish_consistency_notes:
  - Se usó «Y» inicial para corresponder al arranque narrativo del griego.
  - Se prefirió «gimió» por coherencia con el valor de ἀνεστέναξεν ya documentado en el audit trail.
  - Se mantuvo «muerte para mí» para respetar la concisión nominal del griego.
  - Se evitó «Cristo» o terminología no pertinente; el texto no contiene esos términos.
  - Se trató «sus manos» como referencia a los acusadores, preservando la imagen de poder sin forzar el plural de trato en español.
