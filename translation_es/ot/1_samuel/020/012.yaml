translation:
  language: es
  text: 'Y Jonatán dijo a David: «Tan cierto como que vive Yahvé, el Dios de Israel: cuando haya sondeado a mi padre[a] mañana a esta hora, o al tercer día[b], y he aquí que es favorable a David, ¿no mandaré a avisarte entonces y te lo revelaré[c]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «haya buscado/averiguado a mi padre»; aquí el sentido es sondear su disposición.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo temporal está condensado; también puede entenderse: «mañana a esta hora, en/al tercer día».'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo literalmente: «te descubriré el oído»; es un modismo que significa «te lo revelaré» o «te lo comunicaré» confidencialmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal del Tetragrama según el criterio del proyecto. «Yahvé» es la forma española estable y transparente que conserva la distinción frente a un sustituto honorífico como «SEÑOR».
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La construcción en genitivo se vierte de manera directa y natural en español, preservando el valor identificador del título sin añadir interpretación.
- source_word: אֶחְקֹר
  english_pob_choice: I sound out
  chosen_spanish: haya sondeado
  alternatives_spanish:
  - haya investigado
  - haya examinado
  lexicon: HALOT
  rationale: En contexto Jonathan no realiza una investigación formal sino que prueba la disposición de su padre. «Sondear» conserva esa idea interpersonal y exploratoria que el inglés POB captura con «sound out».
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - Saúl
  - mi papá
  lexicon: HALOT
  rationale: Se conserva el parentesco literal del hebreo, que es importante para la escena y no requiere sustituirlo por el nombre propio en el texto principal.
- source_word: כָּעֵת מָחָר הַשְּׁלִשִׁית
  english_pob_choice: about this time tomorrow, or the third day
  chosen_spanish: para mañana a esta hora, o al tercer día
  alternatives_spanish:
  - a esta hora mañana, o al tercer día
  - por aquí mañana a esta hora, o al tercer día
  lexicon: HALOT
  rationale: El hebreo es comprimido y algo elíptico. La traducción española conserva la misma secuencia temporal sin expandirla en exceso, manteniendo la alternativa temporal del texto.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y resulta que
  - y mira
  lexicon: HALOT
  rationale: Se conserva el marcador discursivo enfático con una fórmula natural en español bíblico contemporáneo, sin perder su carácter de giro llamativo.
- source_word: טוֹב אֶל דָּוִד
  english_pob_choice: it is favorable toward David
  chosen_spanish: resulta favorable hacia David
  alternatives_spanish:
  - es bueno para David
  - mi padre está bien dispuesto hacia David
  lexicon: HALOT
  rationale: La frase expresa la disposición de Saúl respecto de David. «Favorable hacia David» mantiene la relación direccional de אֶל y evita reducirla a un simple «bueno» genérico.
- source_word: וְלֹא אָז אֶשְׁלַח אֵלֶיךָ
  english_pob_choice: shall I not then send to you
  chosen_spanish: ¿no te enviaré entonces?
  alternatives_spanish:
  - ¿acaso no te enviaré entonces?
  - entonces te enviaré
  lexicon: HALOT
  rationale: Se conserva el valor retórico/solémne del hebreo difícil. En español, la pregunta retórica reproduce mejor la fuerza de la promesa implícita que una afirmación lisa y llana.
- source_word: וְגָלִיתִי אֶת אָזְנֶךָ
  english_pob_choice: and uncover your ear
  chosen_spanish: y te revelaré
  alternatives_spanish:
  - y te lo comunicaré
  - y te lo daré a conocer
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal que significa comunicar algo confidencialmente. En español, «revelaré» expresa el sentido idiomático con claridad; la nota preserva la observación literal y evita oscurecer el texto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el principio del proyecto de no ocultar el nombre divino mediante una sustitución tradicional. «Yahvé» reproduce la decisión auditada del POB inglés en un equivalente español reconocido y transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Elliptical oath formula in Jonathan's speech
  english_pob_reading: As Yahweh, the God of Israel, lives
  chosen_spanish_reading: Vive Yahvé, el Dios de Israel
  alternative_spanish_readings:
  - Por vida de Yahvé, el Dios de Israel
  - Tan cierto como que vive Yahvé, el Dios de Israel
  rationale: El hebreo introduce una fórmula juratoria con una cláusula elíptica. En español, la expresión verbal «Vive Yahvé» preserva el núcleo del juramento sin sobrecargar la frase ni añadir una explicación ajena al texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy'
- issue: Idiomatic expression וְגָלִיתִי אֶת אָזְנֶךָ
  english_pob_reading: and disclose it to you
  chosen_spanish_reading: y te revelaré
  alternative_spanish_readings:
  - y te lo comunicaré
  - y te descubriré el oído
  rationale: La imagen hebrea literal es transparente para el análisis, pero en español suena extraña si se mantiene sin mediación. Se traduce por el sentido idiomático, preservando la literalidad en nota para no perder la huella del original.
  doctrine_reference: 'DOCTRINE.md: source-language primacy; idioms rendered by sense when necessary for intelligibility'
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB inglés que resuelve el tiempo verbal de אֶחְקֹר con un perfecto de anterioridad en español («haya sondeado») y que trata la cláusula final como una pregunta retórica de promesa. También incorpora la actualización que favorece una expresión idiomática clara para וְגָלִיתִי אֶת אָזְנֶךָ, manteniendo nota para el sentido literal hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrama, conforme al estándar del proyecto.
  - Se conserva «David» como nombre propio y «el Dios de Israel» como título apposicional.
  - Se evita «SEÑOR» como máscara del nombre divino.
  - Se mantiene la distinción entre traducción en el cuerpo del texto y observación idiomática en nota, para no perder la tensión léxica del hebreo.
