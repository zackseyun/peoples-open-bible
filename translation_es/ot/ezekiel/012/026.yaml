translation:
  language: es
  text: 'Y vino a mí la palabra de Yahvé, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: En la fórmula profética introductoria, וַיְהִי funciona como enlace narrativo/secuencial. En español, «Y vino» reproduce de forma natural la llegada de la palabra sin volver la frase rígidamente literal con una estructura impersonal más pesada.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  lexicon: HALOT
  rationale: La construcción דְבַר יְהוָה es la fórmula profética estable «la palabra de Yahvé». «La palabra» conserva mejor el valor técnico y teológico del giro que «el mensaje», que sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se usa «Yahvé» para transliterar el nombre divino del Tetragrámaton, manteniendo el nombre personal del Dios del pacto en vez de sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: El complemento con sufijo de primera persona singular expresa destino/dirección clara. «A mí» es la equivalencia natural y fiel en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso que sigue. «Diciendo» es la forma española usual y suficientemente formal para esta fórmula profética.
theological_decisions:
- issue: Cómo rendir el nombre divino יהוה en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, por lo que la traducción debe preservar el nombre revelado y no reemplazarlo por un título. «Yahvé» mantiene esa decisión de forma auditable y coherente con el proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado y la revisión más reciente coinciden en que no se requieren cambios; la versión española sigue esa lectura estable sin añadir variantes textuales ni tensiones léxicas adicionales.
  spanish_consistency_notes:
  - Se mantuvo la fórmula profética breve y solemne.
  - Se eligió «Yahvé» como forma consistente para יְהוָה.
  - No se introdujeron notas al pie porque no hay variante significativa ni ambigüedad nueva en español.
