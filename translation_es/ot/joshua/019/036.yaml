review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo contiene tres topónimos coordinados por waw: אֲדָמָה, הָרָמָה, חָצוֹר. El borrador español preserva correctamente la estructura de lista y no introduce significado no presente. Sin embargo, las formas ''Adama'' y especialmente ''Ramá'' se apartan innecesariamente de las transliteraciones auditadas por el POB (''Adamah'', ''Ramah'') sin una razón fuerte de uso establecido en español para este versículo.'
  spanish_quality_summary: La frase es legible y natural en español, pero en listas de topónimos bíblicos conviene mantener formas más estables y reconocibles. 'Ramá' puede sonar adaptado de manera inconsistente frente a 'Hazor' y frente al criterio de transliterar nombres propios. La puntuación y la coordinación con 'y' son correctas.
  glossary_alignment: 'No hay términos teológicos del glosario principal en juego. El punto relevante es la política de nombres propios: aquí conviene seguir transliteraciones consistentes con el expediente inglés y evitar adaptar selectivamente los nombres sin justificación documentada. ''Hazor'' está bien; ''Adamah'' y ''Ramah'' alinean mejor con la evidencia y la auditoría.'
  issues:
  - severity: medium
    issue: '''Adama'' omite la h final de la transliteración auditada ''Adamah''.'
    rationale: Aunque en español podría simplificarse, el expediente POB documenta transliteración del topónimo, no adaptación semántica. Mantener 'Adamah' preserva mejor la forma del nombre y la coherencia con otros topónimos transliterados.
  - severity: medium
    issue: '''Ramá'' adapta el topónimo de forma innecesaria.'
    rationale: El hebreo הָרָמָה se resolvió en la auditoría inglesa como 'Ramah', omitiendo el artículo pero conservando la transliteración establecida. 'Ramá' no es imposible en español, pero introduce una hispanización no documentada y menos consistente con el criterio del proyecto.
  revised_spanish_text: Adamah, Ramah y Hazor.
  revision_rationale: 'Se ajustan dos topónimos para reflejar de manera más fiel y consistente la transliteración auditada en el POB: ''Adamah'' y ''Ramah''. No se requieren notas, porque no hay ambigüedad adicional en español ni variantes que deban preservarse en este versículo.'
