translation:
  language: es
  text: Quien codicia la ganancia[a] perturba su casa, pero el que aborrece los sobornos vivirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «ganancia»; el texto no añade explícitamente «injusta», aunque la expresión completa sugiere afán codicioso por obtener provecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹכֵר
  english_pob_choice: troubles
  chosen_spanish: perturba
  alternatives_spanish:
  - causa problemas
  - trastorna
  lexicon: HALOT
  rationale: El participio expresa causar turbación o desorden. «Perturba» conserva la fuerza moral del proverbio y suena natural en español sin exagerar a «arruina».
- source_word: בֵּיתוֹ
  english_pob_choice: his own house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su familia
  lexicon: HALOT
  rationale: En español «su casa» conserva la imagen hebrea y puede implicar la esfera doméstica completa, como en el inglés auditado 'his own house'.
- source_word: בּוֹצֵעַ בָּצַע
  english_pob_choice: is greedy for gain
  chosen_spanish: es avaro de ganancia
  alternatives_spanish:
  - codicia ganancia
  - busca provecho
  - es ambicioso de ganancia
  lexicon: HALOT
  rationale: La construcción intensiva apunta a deseo desordenado de beneficio. «Avaro de ganancia» comunica la avidez sin añadir el calificativo «injusta», que no está en el hebreo base de esta revisión.
- source_word: וְשׂוֹנֵא
  english_pob_choice: but he who hates
  chosen_spanish: pero el que aborrece
  alternatives_spanish:
  - y el que odia
  - sino el que aborrece
  lexicon: HALOT
  rationale: El contraste proverbial se expresa mejor con «pero». «Aborrece» refleja con más fuerza el rechazo activo del paralelo hebreo.
- source_word: מַתָּנֹת
  english_pob_choice: bribes
  chosen_spanish: los sobornos
  alternatives_spanish:
  - los regalos
  - las dádivas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «dones/regalos», el contexto sapiencial y el contraste con la ganancia codiciosa favorecen «sobornos». Esto sigue la decisión auditada del inglés POB y evita una lectura demasiado inocente de «regalos».
- source_word: יִחְיֶה
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá plenamente
  - seguirá con vida
  lexicon: HALOT
  rationale: El imperfecto de חיה en proverbios mantiene la tersedad de una promesa general. «Vivirá» es la equivalencia natural y breve en español.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo WLC y la auditoría inglesa. Se conservó la estructura antitética del proverbio y se evitó introducir el calificativo «injusta» delante de «ganancia», en consonancia con la revisión reciente del texto inglés. La nota mantiene abierta la tensión lexical de בּוֹצֵעַ בָּצַע sin sobretraducirla.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia explícita al nombre divino.
  - Se prefirió «sobornos» para מַתָּנֹת por el contexto; la nota preserva el sentido más literal «ganancia» en el otro miembro del paralelismo.
  - La sintaxis castellana conserva el paralelismo sapiencial hebreo con una sola antítesis clara.
