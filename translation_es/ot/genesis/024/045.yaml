translation:
  language: es
  text: 'Antes de que terminara de hablar en mi corazón[a], he aquí que Rebeca salió con su cántaro sobre su hombro, y descendió al manantial[b] y sacó agua. Entonces le dije: «Por favor, dame de beber».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hablar a mi corazón», un modismo para el habla interior o la oración.'
    reason: lexical_alternative
  - marker: b
    text: O «fuente»; el término hebreo designa una surgencia de agua, no la palabra más usual para «pozo».
    reason: lexical_alternative
lexical_decisions:
- source_word: טֶרֶם אֲכַלֶּה
  english_pob_choice: Before I had finished
  chosen_spanish: Antes de terminar
  alternatives_spanish:
  - Antes de haber terminado
  - Antes de que terminara
  lexicon: HALOT
  rationale: טֶרֶם expresa anterioridad con un matiz de acción no concluida; en español, «Antes de terminar» comunica esa idea de forma natural y fiel sin añadir interpretación innecesaria.
- source_word: לְדַבֵּר אֶל־לִבִּי
  english_pob_choice: speaking in my heart
  chosen_spanish: hablar en mi corazón
  alternatives_spanish:
  - hablarme a mí mismo
  - hablar en mi mente
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «hablar a mi corazón». Conservé el giro con «en mi corazón» para mantener visible el modismo interior, como hace la POB inglesa, en vez de reducirlo a una paráfrasis psicológica.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y mira
  - y he aquí
  lexicon: HALOT
  rationale: La partícula introduce una escena súbita y vívida. «He aquí» conserva el tono narrativo enfático sin sonar forzado en español bíblico moderno.
- source_word: רִבְקָה
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rebecca
  lexicon: Transliteración hebrea estándar
  rationale: «Rebeca» es la forma asentada en español y refleja bien el nombre hebreo con la grafía habitual de lectura bíblica en español.
- source_word: כַדָּהּ
  english_pob_choice: her jar
  chosen_spanish: su cántaro
  alternatives_spanish:
  - su jarra
  - su jarro
  lexicon: HALOT
  rationale: כד designa un recipiente para agua; «cántaro» es claro en español y mantiene el objeto de uso doméstico para acarrear agua. Evita la ambigüedad de «jarra» en contexto moderno.
- source_word: עַל־שִׁכְמָהּ
  english_pob_choice: on her shoulder
  chosen_spanish: sobre su hombro
  alternatives_spanish:
  - en su hombro
  - sobre el hombro
  lexicon: HALOT
  rationale: La relación espacial es directa; «sobre su hombro» es idiomático y preciso en español.
- source_word: הָעַיְנָה
  english_pob_choice: the spring
  chosen_spanish: la fuente
  alternatives_spanish:
  - el manantial
  - el pozo
  lexicon: HALOT
  rationale: El hebreo עין se refiere aquí a una fuente/surgencia de agua, no al término más general de «pozo». «Fuente» preserva la distinción señalada por la POB inglesa y su nota textual.
- source_word: וַתִּשְׁאָב
  english_pob_choice: drew water
  chosen_spanish: sacó agua
  alternatives_spanish:
  - extrajo agua
  - sacó de agua
  lexicon: HALOT
  rationale: El verbo implica sacar agua para beber. «Sacó agua» es natural en español y evita una redundancia pesada con el recipiente y la fuente.
- source_word: הַשְׁקִינִי נָא
  english_pob_choice: Please give me a drink
  chosen_spanish: Por favor, dame de beber
  alternatives_spanish:
  - Por favor, hazme beber
  - Por favor, sírveme de beber
  lexicon: HALOT
  rationale: El hifil de שקה significa «dar de beber, hacer beber». «Dame de beber» conserva la petición directa y sonoridad natural en español; «Por favor» representa נָא.
theological_decisions:
- issue: אֶל־לִבִּי como habla interior / oración
  english_pob_reading: speaking in my heart
  chosen_spanish_reading: hablar en mi corazón
  alternative_spanish_readings:
  - hablarme interiormente
  - hablar en mi mente
  rationale: El texto presenta una forma de habla interior, posiblemente oración o reflexión. Mantener «en mi corazón» conserva el modismo hebreo sin decidir en exceso entre pensamiento y oración.
  doctrine_reference: Antropología bíblica; lenguaje hebreo del corazón como sede de interioridad.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido y la estructura del hebreo masorético, en plena concordancia con la POB inglesa y su nota sobre el modismo interior y la distinción entre «spring/fountain» y «well». No se registran revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la tradición general de la POB, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene «Rebeca» como transliteración bíblica estándar en español.
  - Se conserva la distinción fuente/manantial frente a pozo, conforme al análisis léxico del hebreo עין.
  - La petición final se formula como frase natural en español sin perder el valor causativo del hifil.
