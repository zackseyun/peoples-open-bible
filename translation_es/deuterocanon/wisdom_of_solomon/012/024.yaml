translation:
  language: es
  text: Porque se extraviaron aún más en los caminos del error[a], tomando por dioses incluso a los animales deshonrados de sus enemigos[b], engañados como infantes insensatos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fueron llevados aún más al extravío'. El griego puede acentuar tanto su propio vagar como el hecho de haber sido desviados.
    reason: lexical_alternative
  - marker: b
    text: O 'tomando por dioses incluso a los animales deshonrosos de sus enemigos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν πλάνης ὁδῶν
  english_pob_choice: the ways of error
  chosen_spanish: los caminos del error
  alternatives_spanish:
  - las sendas del error
  - los caminos del extravío
  lexicon: LSJ
  rationale: πλάνη puede significar error, extravío o vagar; el giro en plural con ὁδοί conserva la imagen de trayectoria moral desviada. 'Caminos del error' mantiene esa metáfora y su fuerza evaluativa sin sonar forzado en español.
- source_word: μακρότερον ἐπλανήθησαν
  english_pob_choice: wandered even farther
  chosen_spanish: se extraviaron aún más
  alternatives_spanish:
  - anduvieron aún más lejos
  - fueron llevados aún más lejos del camino
  lexicon: LSJ
  rationale: El comparativo intensifica el verbo de extravío. 'Se extraviaron aún más' conserva el matiz de aumento en el desvío y resulta natural en español, a la vez que mantiene la responsabilidad de su errar.
- source_word: θεοὺς ὑπολαμβάνοντες
  english_pob_choice: supposing as gods
  chosen_spanish: suponiendo como dioses
  alternatives_spanish:
  - considerando como dioses
  - tomando por dioses
  lexicon: LSJ
  rationale: ὑπολαμβάνω aquí expresa asumir o considerar erróneamente. 'Suponiendo como dioses' sigue de cerca la construcción participial y deja visible la falsa valoración.
- source_word: τὰ ... ἄτιμα
  english_pob_choice: the dishonored animals
  chosen_spanish: los animales deshonrados
  alternatives_spanish:
  - los animales deshonrosos
  - las criaturas deshonradas
  lexicon: LSJ
  rationale: ἄτιμα significa sin honor, deshonrados. El español 'deshonrados' conserva el juicio negativo sin convertirlo en una cualidad moral distinta; 'animales' sigue el reajuste del POB inglés revisado para reflejar más directamente ζῴοις.
- source_word: ἐν ζῴοις τῶν ἐχθρῶν
  english_pob_choice: the animals of their enemies
  chosen_spanish: los animales de sus enemigos
  alternatives_spanish:
  - los animales pertenecientes a sus enemigos
  - los animales de los enemigos
  lexicon: LSJ
  rationale: ζῷα son animales o seres vivos. La relación genitiva se expresa de modo directo como 'de sus enemigos', sin añadir especificaciones que el griego no da.
- source_word: νηπίων δίκην ἀφρόνων
  english_pob_choice: like foolish infants
  chosen_spanish: como infantes insensatos
  alternatives_spanish:
  - como niños necios
  - a la manera de infantes insensatos
  lexicon: LSJ
  rationale: νηπίων son infantes o niños pequeños; δίκην introduce comparación; ἄφρων es insensato, necio. 'Como infantes insensatos' conserva el tono de reproche y la comparación, evitando una paráfrasis más libre.
- source_word: ψευσθέντες
  english_pob_choice: having been deceived
  chosen_spanish: habiendo sido engañados
  alternatives_spanish:
  - siendo engañados
  - habiendo sido deludidos
  lexicon: LSJ
  rationale: El participio aoristo pasivo expresa haber sido engañados o inducidos a error. 'Habiendo sido engañados' conserva el valor pasivo y el enlace temporal del participio en la cadena de acciones.
theological_decisions:
- issue: Condena de la idolatría como extravío moral e intelectual
  english_pob_reading: Retain the text's negative assessment with 'error,' 'dishonored,' and 'deceived' rather than softening to neutral language.
  chosen_spanish_reading: Mantener una valoración negativa explícita con 'error', 'deshonrados' y 'engañados', sin suavizar el juicio.
  alternative_spanish_readings:
  - Usar términos más neutros como 'equivocación' o 'animales comunes'
  - Reducir la carga moral a una mera ignorancia
  rationale: El griego presenta la idolatría como extravío, deshonor y engaño. La traducción debe conservar ese peso teológico y no diluir la crítica presente en el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la revisión final del POB en inglés que reemplazó una redacción más explicativa por 'the dishonored animals of their enemies', por lo que en español se optó por una formulación directa ('los animales deshonrados de sus enemigos') que conserva el juicio valorativo y la referencia zoológica sin añadir elementos ausentes del griego.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεός solo cuando aparezca; en este versículo no corresponde.
  - Se usó 'infantes' para νηπίων por cercanía semántica al griego y para conservar el matiz de inmadurez.
  - Se preservó la cadencia participial del cierre con 'habiendo sido engañados' para reflejar la secuencia griega.
  - La puntuación divide las dos primeras acciones del versículo de forma fluida y publicable en español.
