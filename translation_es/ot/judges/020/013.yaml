    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''escuchar la voz de'', un modismo que también puede significar ''obedecer'' o ''hacer caso''.'
    reason: lexical_alternative
  - marker: c
    text: O 'los israelitas'.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la expresión idiomática y la naturalidad del español sin apartarse del hebreo ni del audit trail inglés: ''hijos de maldad'' preserva mejor el carácter semítico y moral de בְּנֵי בְלִיַּעַל, y ''les demos muerte'' expresa con claridad la intención judicial de וּנְמִיתֵם. También se normaliza la puntuación de la nota b.'
