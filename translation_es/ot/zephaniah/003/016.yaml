translation:
  language: es
  text: 'En aquel día se dirá a Jerusalén: «No temas»; a Sion: «No dejes que tus manos se debiliten[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No dejes caer tus manos» / «No dejes que tus manos queden flácidas». El hebreo usa un modismo que habla de perder fuerza, resolución o ánimo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La expresión temporal profética se conserva con una forma natural y solemne en español. «En aquel día» comunica bien el valor de referencia escatológica sin resultar arcaica de manera excesiva.
- source_word: יֵאָמֵר
  english_pob_choice: it will be said
  chosen_spanish: se le dirá
  alternatives_spanish:
  - se dirá
  - será dicho
  lexicon: HALOT
  rationale: El nifal impersonal permite un pasivo español natural. «Se le dirá» mantiene el matiz de palabra dirigida a Jerusalén, en paralelo con el hebreo, sin introducir un sujeto no expresado.
- source_word: לִירוּשָׁלַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - para Jerusalén
  - sobre Jerusalén
  lexicon: HALOT
  rationale: La lamed introduce el destinatario del dicho; en español, «a Jerusalén» expresa mejor la dirección del habla que un valor temático como «sobre». Mantiene la personificación de la ciudad como receptora del mensaje.
- source_word: אַל תִּירָאִי
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No seas temerosa
  lexicon: HALOT
  rationale: La forma femenina singular del mandato se puede reflejar en español con el imperativo genérico «No temas», que es idiomático y fiel al tono breve y directo. La variante explícitamente femenina sería menos natural en español bíblico contemporáneo.
- source_word: צִיּוֹן
  english_pob_choice: to Zion
  chosen_spanish: a Sion
  alternatives_spanish:
  - Sion
  - Oh Sion
  lexicon: HALOT
  rationale: Aunque el hebreo omite aquí la preposición explícita, el valor de destinatario continúa del miembro anterior. En español, «a Sion» conserva el paralelismo directo con «a Jerusalén» y evita ambigüedad.
- source_word: אַל יִרְפּוּ יָדָיִךְ
  english_pob_choice: Do not let your hands grow weak
  chosen_spanish: No dejes caer tus manos
  alternatives_spanish:
  - No permitas que tus manos se debiliten
  - No dejes que tus manos cuelguen flácidas
  - No dejes caer las manos
  lexicon: HALOT
  rationale: Se conserva la imagen corporal y la fuerza idiomática del hebreo. La POB inglesa preservó la alternativa literal de «drop/slack»; en español, «dejes caer tus manos» mantiene esa tensión con una expresión natural, sin perder el sentido de desaliento o falta de energía.
theological_decisions:
- issue: Personificación de Jerusalén y Sion como destinatarias femeninas singulares
  english_pob_reading: Retained the city-personification in direct address without expanding to 'the people of Jerusalem/Zion.'
  chosen_spanish_reading: Se conserva la personificación de la ciudad como destinataria directa, sin expandir a «la gente de Jerusalén/Sion».
  alternative_spanish_readings:
  - Dirás a la gente de Jerusalén/Sion
  - A los habitantes de Jerusalén y Sion
  rationale: El hebreo dirige la palabra a las ciudades mismas, tratadas como receptoras femeninas singulares. Mantener esa figura evita una paráfrasis interpretativa que no está exigida por el texto y preserva la imaginería profética.
  doctrine_reference: Principio de primacía del texto original y conservación de la personificación profética sin expansión explicativa obligatoria.
translation_notes:
  revision_awareness: El texto base del POB inglés fue de alta concordancia con el hebreo y no requirió cambios sustantivos. La principal decisión española consistió en expresar con naturalidad el pasivo impersonal y el modismo de las manos sin perder la imagen literal ni el tono profético. Se mantuvo la personificación de Jerusalén y Sion como destinatarias directas.
  spanish_consistency_notes:
  - Se usó «Sion» sin tilde, conforme a la forma bíblica común en español.
  - Se prefirió «No temas» como imperativo breve y natural, equivalente al hebreo femenino singular sin sobrecargar la frase.
  - La nota de pie preserva la alternativa idiomática y la tensión entre literalidad e imagen corporal, siguiendo el audit trail inglés.
