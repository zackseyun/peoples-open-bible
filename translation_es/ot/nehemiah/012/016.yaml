theological_decisions:
- issue: Valor del prefijo ל en una lista de nombres
  english_pob_reading: The Hebrew uses the preposition ל ('to/for/of') before the clan names in this list. Here it is rendered 'for' to convey representation.
  chosen_spanish_reading: Se traduce con «por» para indicar representación o asignación en la lista.
  alternative_spanish_readings:
  - para
  - de
  rationale: En español, «por» expresa con naturalidad la idea de alguien que actúa en representación de otro o de un grupo en una enumeración. Evita una lectura posesiva rígida y conserva la tensión semántica del hebreo breve.
  doctrine_reference: Ninguna doctrina específica; decisión de función gramatical y lista genealógica.
translation_notes:
  revision_awareness: 'Se corrigió el primer nombre conforme al hebreo y al registro revisado del POB: Iddo, no Adaía. Se mantuvo la estructura breve de lista y la relación representativa marcada por ל en ambos pares de nombres.'
  spanish_consistency_notes:
  - Se conserva un registro sobrio y listable, acorde con la naturaleza nominal del versículo.
  - Se evita «Señor» u otras equivalencias no presentes; el pasaje es puramente nominal.
  - Se usa «por» de forma consistente para ambos miembros de la lista, siguiendo la función del prefijo hebreo.
  - Los nombres propios se transliteran en formas españolas usuales o cercanas al hebreo, sin expansión interpretativa.
