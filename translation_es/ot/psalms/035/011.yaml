translation:
  language: es
  text: Se alzan[a] testigos violentos; me preguntan por cosas que no sé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «falsos testigos» o «testigos maliciosos»; el hebreo dice literalmente «testigos de violencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְקוּמוּן
  english_pob_choice: rise up
  chosen_spanish: se levantan
  alternatives_spanish:
  - se alzan
  - se ponen en pie
  lexicon: HALOT
  rationale: En este contexto adversarial y forense, קום expresa que los testigos toman posición o se presentan contra el salmista. En español, 'se levantan' conserva la imagen dinámica de aparecer y ponerse en acción sin sonar forzado.
- source_word: עֵדֵי חָמָס
  english_pob_choice: violent witnesses
  chosen_spanish: testigos violentos
  alternatives_spanish:
  - testigos de violencia
  - testigos maliciosos
  - falsos testigos
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'testigos de violencia'. 'Testigos violentos' mantiene la compactación y el valor injurioso de חָמָס sin restringirlo indebidamente a falsedad técnica.
- source_word: אֲשֶׁר לֹא יָדַעְתִּי
  english_pob_choice: things I do not know
  chosen_spanish: cosas que no conozco
  alternatives_spanish:
  - lo que no conocía
  - asuntos que no conozco
  - cosas que no sabía
  lexicon: HALOT
  rationale: El hebreo no expresa un objeto explícito; el español necesita uno mínimo. 'Cosas' reproduce la adición ligera del inglés POB y 'no conozco' conserva la ignorancia actual del salmista sin exagerar el tiempo verbal.
- source_word: יִשְׁאָלֽוּ/נִי
  english_pob_choice: they ask me about
  chosen_spanish: me preguntan por
  alternatives_spanish:
  - me interrogan acerca de
  - me cuestionan sobre
  - me preguntan acerca de
  lexicon: HALOT
  rationale: שׁאל puede significar preguntar o inquirir. 'Me preguntan por' suena natural en español y refleja la acción hostil sin introducir un matiz penal más fuerte como 'interrogan'.
translation_notes:
  revision_awareness: 'Se mantuvo la línea del POB inglés en alta concordancia con la revisión más reciente: no hubo cambios necesarios en la lectura base. El español ajusta el orden y la preposición para naturalidad idiomática, sin perder la imaginería jurídica del hebreo.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' por norma del proyecto solo cuando corresponde; este versículo no lo contiene.
  - Se evitó 'SEÑOR' y 'falsos testigos' como texto principal para no borrar la fuerza lexical de חָמָס.
  - Se preservó el registro sobrio y jurídico del salmo, con español claro y contemporáneo.
