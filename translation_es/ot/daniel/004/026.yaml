translation:
  language: es
  text: Al cabo de doce meses[a], él estaba caminando sobre el techo del palacio real de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba caminando en la azotea del palacio real de Babilonia». El arameo dice literalmente «sobre el palacio del reino de Babilonia», y puede referirse al techo o a la parte superior de la estructura.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/קְצָ֥ת
  english_pob_choice: At the end of
  chosen_spanish: Al cabo de
  alternatives_spanish:
  - Al final de
  - Después de
  lexicon: HALOT
  rationale: La construcción temporal indica la conclusión de un período. «Al cabo de» transmite de forma natural ese cierre temporal en español sin añadir explicación interpretativa.
- source_word: יַרְחִ֖ין תְּרֵי עֲשַׂ֑ר
  english_pob_choice: twelve months
  chosen_spanish: doce meses
  alternatives_spanish:
  - un año
  - doce lunas
  lexicon: HALOT
  rationale: El arameo dice literalmente «meses». «Doce meses» conserva la imagen temporal directa mejor que comprimirlo a «un año».
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La preposición señala ubicación. «Sobre» mantiene la relación espacial sin decidir más de lo que el texto dice por sí mismo.
- source_word: הֵיכַל
  english_pob_choice: palace
  chosen_spanish: palacio
  alternatives_spanish:
  - templo
  - gran casa
  lexicon: HALOT
  rationale: En este contexto real babilónico, la palabra se refiere a una residencia palaciega, no a un templo. «Palacio» es el equivalente natural y preciso.
- source_word: מַלְכוּתָא
  english_pob_choice: the kingdom of
  chosen_spanish: palacio real
  alternatives_spanish:
  - reino
  - soberanía real
  lexicon: HALOT
  rationale: La revisión inglesa adoptó «royal palace» para reflejar mejor la referencia local del pasaje. En español, «palacio real» comunica ese valor contextual con claridad y sin forzar una traducción demasiado literal de la construcción aramea.
- source_word: בָבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  lexicon: HALOT
  rationale: Topónimo estándar en español.
- source_word: מְהַלֵּ֥ךְ הֲוָה
  english_pob_choice: he was walking
  chosen_spanish: mientras caminaba
  alternatives_spanish:
  - andaba
  - estaba caminando
  lexicon: HALOT
  rationale: El participio con היה expresa acción en curso en pasado. En español, «mientras caminaba» reproduce bien la progresividad y fluidez del movimiento sin sonar mecánico.
theological_decisions:
- issue: Precisión espacial del lugar donde caminaba el rey
  english_pob_reading: walking on the roof of the royal palace of Babylon
  chosen_spanish_reading: mientras caminaba sobre el techo del palacio real de Babilonia
  alternative_spanish_readings:
  - sobre el palacio real de Babilonia
  - en la azotea del palacio real de Babilonia
  rationale: El audit trail inglés reconoce que el hebreo/arameo puede referirse al techo o a la estructura superior del palacio. «Techo» mantiene la lectura principal sin excluir la posibilidad del tejado/azotea y evita sobreinterpretar el espacio.
  doctrine_reference: No aplica; cuestión de localización textual
- issue: Relación entre «palacio» y la expresión literal «palacio del reino»
  english_pob_reading: royal palace of Babylon
  chosen_spanish_reading: palacio real de Babilonia
  alternative_spanish_readings:
  - palacio del reino de Babilonia
  - palacio del dominio de Babilonia
  rationale: La revisión inglesa decidió privilegiar el sentido contextual del edificio real. En español, «palacio real» preserva esa decisión y evita una construcción rígida que oscurezca el sentido inmediato.
  doctrine_reference: No aplica; cuestión léxica-contextual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrigió una traducción demasiado literal de la ubicación a «roof of the royal palace of Babylon». La versión española adopta esa decisión contextual y la expresa con una formulación natural y audit-able.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como topónimo estándar en español.
  - Se conserva la progresividad del imperfecto con «caminaba» y la relación temporal con «mientras».
  - La nota conserva la tensión textual entre la formulación literal aramea y la localización contextual aceptada por la revisión inglesa.
