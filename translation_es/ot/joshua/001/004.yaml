translation:
  language: es
  text: Desde el desierto y este Líbano, hasta el gran río, el río Éufrates, toda la tierra de los hititas, y hasta el mar grande[a], hacia la puesta[b] del sol, será vuestro límite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el mar Mediterráneo.
    reason: cross_reference
  - marker: b
    text: O 'hacia el oeste'; literalmente, 'hacia la puesta del sol'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵהַמִּדְבָּר
  english_pob_choice: From the wilderness
  chosen_spanish: Desde el desierto
  alternatives_spanish:
  - Desde el desierto agreste
  - Desde la región desértica
  lexicon: HALOT
  rationale: El hebreo puede referirse a una zona de desierto o estepa; en español, 'desierto' comunica bien el territorio fronterizo sin sonar técnico o forzado. 'Desde' reproduce la idea de punto de partida en la enumeración de límites.
- source_word: וְהַלְּבָנוֹן הַזֶּה
  english_pob_choice: and this Lebanon
  chosen_spanish: y este Líbano
  alternatives_spanish:
  - y el Líbano
  - y este monte Líbano
  lexicon: HALOT
  rationale: Se conserva el demostrativo 'este' porque está explícito en el hebreo. 'Líbano' funciona como nombre geográfico propio en español y no requiere expansión.
- source_word: וְעַד הַנָּהָר הַגָּדוֹל נְהַר פְּרָת
  english_pob_choice: as far as the great river, the Euphrates River
  chosen_spanish: hasta el gran río, el río Éufrates
  alternatives_spanish:
  - hasta el gran río, el Éufrates
  - hasta el gran río Éufrates
  lexicon: HALOT
  rationale: 'Se preserva la estructura appositiva del hebreo: primero ''el gran río'' y luego la identificación ''el río Éufrates''. ''Hasta'' expresa correctamente el alcance de frontera.'
- source_word: כֹּל אֶרֶץ הַחִתִּים
  english_pob_choice: all the land of the Hittites
  chosen_spanish: toda la tierra de los hititas
  alternatives_spanish:
  - toda la tierra de los hititas
  - todo el país de los hititas
  lexicon: HALOT
  rationale: '''Tierra'' mantiene el valor geográfico del hebreo אֶרֶץ, y ''los hititas'' conserva la referencia étnica-territorial sin interpretar más de la cuenta. ''Toda'' refleja כֹּל.'
- source_word: וְעַד הַיָּם הַגָּדוֹל
  english_pob_choice: and as far as the Great Sea
  chosen_spanish: y hasta el mar grande
  alternatives_spanish:
  - y hasta el Gran Mar
  - y hasta el mar Mediterráneo
  lexicon: HALOT
  rationale: Se conserva la designación literal del hebreo 'mar grande'. 'Mar grande' suena natural en español y evita importar la identificación geográfica al texto principal, aunque esta pueda aclararse en nota.
- source_word: מְבוֹא הַשָּׁמֶשׁ
  english_pob_choice: toward the going down of the sun
  chosen_spanish: hacia la puesta del sol
  alternatives_spanish:
  - hacia el ocaso del sol
  - hacia el occidente
  lexicon: HALOT
  rationale: '''מְבוֹא הַשָּׁמֶשׁ'' expresa literalmente el descenso o puesta del sol. ''Hacia la puesta del sol'' conserva la imagen hebrea y es comprensible en español; ''occidente'' sería una equivalencia más interpretativa.'
- source_word: יִהְיֶה גְּבוּלְכֶם
  english_pob_choice: shall be your border
  chosen_spanish: será vuestro límite
  alternatives_spanish:
  - será vuestro borde
  - será vuestra frontera
  lexicon: HALOT
  rationale: '''Límite'' comunica bien el sentido territorial de גְּבוּל en un pasaje de demarcación. ''Vuestro'' conserva el plural de la promesa dirigida a Israel.'
translation_notes:
  revision_awareness: La versión revisada en inglés no introdujo cambios sustantivos; se mantuvo la misma lectura base y, por tanto, esta propuesta española sigue el mismo perfil de equivalencia óptima con mínima intervención interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiera; en este versículo no aparece.
  - Se conserva la distinción geográfica literal entre 'gran río' y 'río Éufrates'.
  - '''Mar grande'' se deja en el texto principal y la identificación con el Mediterráneo se traslada a nota, en continuidad con el tratamiento auditado del inglés.'
  - '''Puesta del sol'' preserva la imagen hebrea y permite la alternativa interpretativa ''oeste'' en nota.'
  - El registro es bíblico-formal pero en español natural, evitando calcos como 'hacia el going down' o 'será vuestra border'.
