revisions:
- from: En un monte alto y encumbrado pusiste tu cama[a]; allí también subiste para sacrificar sacrificio.
  to: En un monte alto y elevado pusiste tu cama; allí también[a] subiste para sacrificar un sacrificio.
  rationale: Se corrige la ubicación de la nota para que explique correctamente גַּם שָׁם, se mejora la naturalidad de נִשָּׂא con 'elevado', y se ajusta la cláusula final a un español más legible manteniendo el cognado explícito del hebreo.
