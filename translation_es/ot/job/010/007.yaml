translation:
  language: es
  text: Aunque sabes que no soy malvado[a], no hay quien me libre de tu mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no soy culpable». El hebreo dice literalmente «no soy malvado», lo cual subraya la negación de una conducta o carácter perverso más que una declaración de impecabilidad absoluta.'
    reason: lexical_alternative
  - marker: b
    text: «De tu mano» es una expresión hebrea para estar bajo el poder o control de alguien.
    reason: cultural_note
lexical_decisions:
- source_word: עַל דַּעְתְּךָ
  english_pob_choice: Though you know
  chosen_spanish: Aunque tú sabes
  alternatives_spanish:
  - Tú sabes
  - Puesto que tú sabes
  - Por cuanto tú sabes
  lexicon: HALOT
  rationale: La construcción con עַל + דעת + sufijo funciona aquí de modo adverbial y concesivo. En español, «aunque tú sabes» conserva la relación concesiva del contexto y mantiene la apelación directa a Dios sin sonar mecánica.
- source_word: לֹא אֶרְשָׁע
  english_pob_choice: I am not wicked
  chosen_spanish: no soy malvado
  alternatives_spanish:
  - no soy culpable
  - no he obrado mal
  - no soy impío
  lexicon: HALOT
  rationale: El verbo רשע apunta a ser ‘malvado/impío’, no a una inocencia absoluta. «No soy malvado» conserva mejor el valor moral del término que «no soy culpable», que estrecha el matiz, y evita sobretraducir hacia sin pecado.
- source_word: וְאֵין
  english_pob_choice: there is no one
  chosen_spanish: no hay quien
  alternatives_spanish:
  - no existe quien
  - no hay nadie que
  - y no hay
  lexicon: HALOT
  rationale: La negación existencial en español suena natural como «no hay quien», que reproduce bien la fuerza absoluta de אֵין en este contexto.
- source_word: מִיָּדְךָ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu poder
  - de tu mano poderosa
  - desde tu mano
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de la ‘mano’ como poder o control, tal como la nota del POB inglés la explica. «De tu mano» es claro en español y no borra la imagen.
- source_word: מַצִּיל
  english_pob_choice: who can deliver
  chosen_spanish: libre
  alternatives_spanish:
  - rescata
  - pueda librar
  - pueda salvar
  lexicon: HALOT
  rationale: El participio hiphil de נצל expresa el acto de librar o rescatar. En español, «libre» en la expresión «no hay quien libre» transmite con concisión la idea de rescate/liberación en una construcción natural y formal.
theological_decisions:
- issue: La afirmación de Job sobre su propia condición moral
  english_pob_reading: Render Job's statement as a protest of non-wickedness without implying absolute sinlessness.
  chosen_spanish_reading: Traducirla como una protesta de no ser malvado, sin convertirla en una afirmación de perfección moral absoluta.
  alternative_spanish_readings:
  - Traducir «soy inocente»
  - Traducir «no soy culpable»
  - Traducir «nunca he pecado»
  rationale: El hebreo usa רשע (‘malvado/impío’), no un término más fuerte para inocencia total. Mantener «no soy malvado» preserva la tensión teológica del libro y evita resolverla en favor de una sinless claim que el texto no exige.
  doctrine_reference: Preservar la tensión literaria y teológica de Job sin suavizarla ni dogmatizarla.
- issue: La imagen de la mano de Dios como poder soberano
  english_pob_reading: '''From your hand'' is a Hebrew expression for being under someone''s power or control.'
  chosen_spanish_reading: Conservar «de tu mano» como metáfora de poder o control divino.
  alternative_spanish_readings:
  - «de tu poder»
  - «de tu autoridad»
  - «de tu dominio»
  rationale: La nota del POB inglés indica que ‘hand’ es un modismo de poder/control. En español, conservar la imagen mantiene la auditable relación con el hebreo y no diluye el carácter figurado del texto.
  doctrine_reference: La soberanía de Dios expresada por imagen semítica, no por una paráfrasis abstracta.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «Although» por «Though» para un tono más natural y formal; en español se reproduce con «Aunque», que conserva el valor concesivo y la formalidad del registro. La elección «no soy malvado» sigue de cerca la lectura revisada y el análisis lexical del hebreo, evitando tanto un endurecimiento doctrinal como una dilución del término רשע.
  spanish_consistency_notes:
  - Se mantiene «mano» como imagen de poder/control, coherente con el auditorio POB y con la nota cultural del inglés.
  - «Malvado» refleja mejor רשע que «culpable» en este versículo, y deja abierta la tensión teológica del libro de Job.
  - La puntuación y el orden español buscan fluidez publicable sin perder la estructura concesiva del hebreo y del POB inglés.
