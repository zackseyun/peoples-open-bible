  to: 'Entonces los filisteos dijeron: «¿Quién hizo esto?». Y dijeron: «Sansón, el yerno del timnita, porque tomó a su mujer y se la dio a su compañero[a]». Entonces los filisteos subieron y la quemaron a ella y a su padre con fuego[b].'
