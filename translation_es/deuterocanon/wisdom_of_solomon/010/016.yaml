- from: Ella entró en el alma de un esclavo del Señor[a], y se enfrentó a reyes temibles[b] con prodigios y señales.
  to: Ella entró en el alma de un siervo del Señor[a], y se enfrentó a reyes temibles con prodigios y señales[b].
  rationale: Se reemplaza «esclavo» por «siervo» porque θεράπων implica servicio personal con dignidad y no corresponde al término más fuerte para esclavo. Se conserva la nota contextual sobre Moisés y la alternativa instrumental de la frase final, en línea con el expediente inglés y con mejor fidelidad léxica al griego.
