revisions:
- from: y se comprometieron a despedir a sus esposas[a], y para expiación, carneros por su ignorancia[b].
  to: y se comprometieron a enviar lejos a sus esposas[a], y para expiación, carneros por su ignorancia[b].
  rationale: Se reemplaza «despedir» por «enviar lejos» para reflejar mejor ἐκβαλεῖν en contexto matrimonial y evitar una lectura moderna equívoca. También se ajusta la nota a para representar con mayor precisión la alternativa más literal del modismo griego. No se requiere cambiar «expiación», «carneros» ni «ignorancia».
