    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. Formas como «cuéntenles» y «sus hijos» son más panhispánicas.
  - severity: medium
    issue: Falta de explicitación del verbo en las cláusulas finales.
    rationale: Aunque el hebreo lo omite, la auditoría inglesa lo repone para claridad. En español, «y vuestros hijos a sus hijos, y sus hijos a otra generación» suena elíptico y menos natural.
  - severity: low
    issue: El texto principal usa «hijos» sin reflejar suficientemente la nota de sentido inclusivo.
    rationale: La nota ya explica el valor representativo, pero conviene anclarla directamente en «hijos[a]» y mantener la redacción de la nota en español natural.
