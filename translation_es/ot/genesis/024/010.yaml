translation:
  language: es
  text: Entonces el esclavo tomó diez de los camellos de su amo[c] y fue, con todo tipo de bienes de su amo en su mano[b][d]. Y se levantó y fue a Aram-naharaim[a], a la ciudad de Nacor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Aram-naharaim; tradicionalmente “Mesopotamia” o “Aram de los dos ríos”.
    reason: alternative_reading
  - marker: b
    text: 'O: «y todos los bienes de su amo estaban en su mano»; el hebreo puede denotar posesión o control, y aquí probablemente se refiere a regalos valiosos que llevaba consigo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «diez camellos de entre los camellos de su amo».'
    reason: previous_rendering
  - marker: d
    text: 'O: «con todo tipo de cosas buenas de su amo en su mano».'
    reason: previous_rendering
lexical_decisions:
- source_word: הָעֶבֶד
  english_pob_choice: the servant
  chosen_spanish: el esclavo
  alternatives_spanish:
  - el siervo
  - el servidor
  lexicon: HALOT
  rationale: En este contexto narrativo, עֶבֶד mantiene su fuerza de dependencia servil. El POB en inglés eligió 'servant' por naturalidad, pero en español 'esclavo' conserva mejor la carga léxica del término sin introducir una categoría distinta; 'siervo' suavizaría demasiado el valor semántico.
- source_word: עֲשָׂרָה גְמַלִּים
  english_pob_choice: ten camels
  chosen_spanish: diez de los camellos
  alternatives_spanish:
  - diez camellos
  - diez de los camellos de su amo
  lexicon: HALOT
  rationale: El hebreo tiene un valor partitivo con el número y el sustantivo repetido. En español, 'diez de los camellos' reproduce esa selección sin perder fluidez; se sobreentiende por el contexto que son camellos del amo.
- source_word: מִגְּמַלֵּי אֲדֹנָיו
  english_pob_choice: from his master's camels
  chosen_spanish: de los camellos de su amo
  alternatives_spanish:
  - de entre los camellos de su amo
  - de los camellos de su señor
  lexicon: HALOT
  rationale: La preposición מן marca selección 'de entre'. 'De los camellos de su amo' comunica la relación posesiva y el matiz partitivo, manteniendo la referencia doméstica de אָדוֹן como 'amo'.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su maestro
  lexicon: HALOT
  rationale: En esta escena de casa y bienes, 'amo' es el correlato más directo de אָדוֹן con sufijo posesivo. 'Señor' podría sonar demasiado solemne y desdibujar la relación de pertenencia/autoridad.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: partió
  alternatives_spanish:
  - fue
  - se fue
  - salió
  lexicon: HALOT
  rationale: Aunque הלך literalmente es 'ir', aquí el movimiento inicial del viaje queda mejor expresado en español por 'partió', que conserva el sentido narrativo de ponerse en camino.
- source_word: וְכָל טוּב אֲדֹנָיו בְּיָדוֹ
  english_pob_choice: with all kinds of good things from his master in his hand
  chosen_spanish: con todo tipo de bienes de su amo en su mano
  alternatives_spanish:
  - y todos los bienes de su amo en su mano
  - con toda la riqueza de su amo en su mano
  - con todo lo mejor de su amo en su mano
  lexicon: HALOT
  rationale: טוּב aquí apunta a bienes/valores concretos, no a una abstracción de 'bondad'. 'Todo tipo de bienes' preserva la amplitud semántica sin forzar 'mejor'. 'En su mano' mantiene el idiomático בְּיָדוֹ como posesión, control o custodia, tal como refleja el POB.
- source_word: וַיָּקָם
  english_pob_choice: he arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: HALOT
  rationale: קוּם en secuencia narrativa puede marcar el inicio de una acción decidida. 'Se levantó' es la forma natural y conserva el ritmo hebreo sin interpretarlo excesivamente como 'salió'.
- source_word: אֲרַם נַהֲרַיִם
  english_pob_choice: Aram-naharaim
  chosen_spanish: Aram-naharaim
  alternatives_spanish:
  - Aram de los dos ríos
  - Mesopotamia
  lexicon: HALOT
  rationale: Se conserva la transliteración del topónimo, siguiendo el criterio del proyecto de no reemplazar el nombre hebreo por una glosa tradicional. La nota explica la lectura alternativa tradicional.
- source_word: עִיר נָחוֹר
  english_pob_choice: the city of Nahor
  chosen_spanish: la ciudad de Nacor
  alternatives_spanish:
  - la ciudad de Nahor
  - la ciudad de Nacor
  lexicon: HALOT
  rationale: Se traduce el nombre propio con la forma española habitual 'Nacor'. 'La ciudad de Nacor' mantiene la construcción posesiva hebrea sin añadir especificaciones sobre fundación o propiedad.
theological_decisions:
- issue: Valor semántico de עֶבֶד en un contexto familiar y patriarcal
  english_pob_reading: the servant
  chosen_spanish_reading: el esclavo
  alternative_spanish_readings:
  - el siervo
  - el servidor
  rationale: No hay base en el versículo para atenuar el término. Mantener 'esclavo' deja visible la tensión histórica y social del hebreo עֶבֶד, sin convertirlo en un título honorífico o devocional.
  doctrine_reference: Éxodo 21; uso léxico contextual de עֶבֶד en el AT
translation_notes:
  revision_awareness: 'Tomé como base el texto hebreo masorético y el audit trail inglés, respetando las decisiones revisadas del POB sobre el valor partitivo de מִגְּמַלֵּי y el idiomatismo de בְּיָדוֹ. En español, opté por una redacción más directa y publicable, manteniendo las tensiones léxicas relevantes: esclavo/siervo, bienes en su mano, y la transliteración de Aram-naharaim. También ajusté el nombre propio final a la forma española común ''Nacor''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología estándar del proyecto cuando aparezca el Tetragrámaton; aquí no ocurre.
  - Se conserva la transliteración de Aram-naharaim y se evita 'Mesopotamia' en el texto principal.
  - '''Amo'' se usa para אָדוֹן con sufijo en un contexto doméstico; no se emplea ''señor'' para evitar una elevación innecesaria del término.'
  - Las notas a,b,c,d están ancladas en el texto en los puntos correspondientes y distinguen alternativas léxicas sin duplicar marcadores.
