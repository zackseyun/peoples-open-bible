translation:
  language: es
  text: Pero cuando ella llegó ante el rey[a], él mandó por carta que su malvado plan, que había tramado contra los judíos, volviera sobre su propia cabeza[b]; y lo colgaron a él y a sus hijos en el madero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, ‘él dijo con la carta/libro’; el sentido es que el rey emitió un decreto por escrito.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo también puede entenderse como ‘impalar’, y ‘el madero’ puede referirse a una estaca o poste de madera más que a una horca moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְבֹאָהּ
  english_pob_choice: when she came
  chosen_spanish: cuando ella llegó
  alternatives_spanish:
  - cuando llegó
  - cuando Esther llegó
  lexicon: HALOT
  rationale: El sufijo femenino singular remite naturalmente a Ester en el contexto; ‘ella’ conserva la referencia anafórica sin repetir innecesariamente el nombre.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - delante del rey
  - en presencia del rey
  lexicon: HALOT
  rationale: Es un giro idiomático para presentarse en la presencia real; ‘ante el rey’ suena natural y mantiene un registro formal.
- source_word: אָמַר עִם הַסֵּפֶר
  english_pob_choice: he commanded by letter
  chosen_spanish: mandó por carta
  alternatives_spanish:
  - ordenó por carta
  - mandó por escrito
  - dijo con el libro/carta
  lexicon: HALOT
  rationale: El hebreo es comprimido e idiomático; en este contexto se trata de un decreto escrito del rey. ‘Mandó por carta’ conserva la idea de decreto formal sin forzar una traducción literal extraña.
- source_word: יָשׁוּב
  english_pob_choice: should return
  chosen_spanish: volviera
  alternatives_spanish:
  - regresara
  - fuera devuelto
  - se volviera
  lexicon: HALOT
  rationale: El verbo expresa la reversión del plan de Amán sobre él mismo. En español, el subjuntivo ‘volviera’ funciona bien tras el mandato real implícito.
- source_word: מַחֲשַׁבְתּוֹ הָרָעָה
  english_pob_choice: his evil scheme
  chosen_spanish: su malvado plan
  alternatives_spanish:
  - su malvado designio
  - su malvado esquema
  - su mal pensamiento
  lexicon: HALOT
  rationale: El sustantivo designa un plan o maquinación, no solo un pensamiento interno. ‘Plan’ es claro en español; ‘malvado’ mantiene la valoración moral del texto.
- source_word: אֲשֶׁר חָשַׁב
  english_pob_choice: which he had devised
  chosen_spanish: que había tramado
  alternatives_spanish:
  - que había planeado
  - que había ideado
  lexicon: HALOT
  rationale: ‘Tramar’ conserva el matiz de maquinación hostil y enlaza bien con ‘plan’.
- source_word: עַל הַיְּהוּדִים
  english_pob_choice: against the Jews
  chosen_spanish: contra los judíos
  alternatives_spanish:
  - sobre los judíos
  - respecto de los judíos
  lexicon: HALOT
  rationale: Aquí עַל indica intención hostil, por eso ‘contra’ es la mejor equivalencia.
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: on his own head
  chosen_spanish: sobre su propia cabeza
  alternatives_spanish:
  - en su propia cabeza
  - sobre su cabeza
  lexicon: HALOT
  rationale: Es un modismo de retribución que expresa reversión del mal sobre el culpable. ‘Su propia cabeza’ hace explícita la referencia reflexiva.
- source_word: וְתָלוּ אֹתוֹ וְאֶת בָּנָיו
  english_pob_choice: and they hanged him and his sons
  chosen_spanish: y colgaron a él y a sus hijos
  alternatives_spanish:
  - y lo colgaron a él y a sus hijos
  - y lo pendieron a él y a sus hijos
  - y los impalaron
  lexicon: HALOT
  rationale: El verbo תלה en Ester puede referirse a suspensión/ejecución en un madero. ‘Colgaron’ mantiene esa amplitud; se evita cerrar indebidamente la imagen solo a ‘ahorcar’.
- source_word: עַל הָעֵץ
  english_pob_choice: on the gallows
  chosen_spanish: en el madero
  alternatives_spanish:
  - en el árbol
  - en la horca
  - en el poste de madera
  lexicon: HALOT
  rationale: En Ester, el término apunta al instrumento de ejecución preparado por Amán. ‘Madero’ conserva la referencia material sin imponer una estructura moderna como ‘gallows/horca’.
theological_decisions:
- issue: Reversión retributiva del mal sobre el perpetrador
  english_pob_reading: his evil scheme ... should return on his own head
  chosen_spanish_reading: que su malvado plan ... volviera sobre su propia cabeza
  alternative_spanish_readings:
  - que su malvado plan regresara sobre su cabeza
  - que su plan maligno cayera sobre él mismo
  rationale: 'La formulación conserva el patrón hebreo de retribución: el mal planeado para otros recae sobre el autor. ‘Sobre su propia cabeza’ mantiene la fuerza idiomática sin explicarla en exceso.'
  doctrine_reference: Lex talionis / retribución narrativa en el libro de Ester
translation_notes:
  revision_awareness: 'Se siguió de cerca la revisión inglesa más reciente: se prefirió ‘por carta’ frente a formulaciones más genéricas de ‘escrito’ para reflejar mejor עִם הַסֵּפֶר. También se preservó la nota sobre la ambigüedad del instrumento de ejecución mediante una alternativa en nota.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma del proyecto para el nombre divino, pero este versículo no lo contiene.
  - Se usó ‘judíos’ para הַיְּהוּדִים, en coherencia con el registro histórico del libro.
  - Se prefirió ‘madero’ a ‘horca’ para no introducir una imagen moderna no garantizada por el hebreo.
