translation:
  language: es
  text: »El que secuestra a un hombre y lo vende[a], o es hallado en su poder[b], ciertamente será condenado a muerte.«
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «roba a un hombre». En contexto, la expresión se refiere al secuestro o al tráfico de personas.
    reason: lexical_alternative
  - marker: b
    text: Lit., «en su mano»; un modismo hebreo para posesión o control.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹנֵב אִישׁ
  english_pob_choice: kidnaps a man
  chosen_spanish: secuestra a un hombre
  alternatives_spanish:
  - rapta a un hombre
  - roba a un hombre
  lexicon: HALOT
  rationale: El hebreo usa literalmente el verbo de 'robar/robarse' con el objeto 'un hombre', pero el contexto legal aclara que se trata de secuestro o trata de personas. 'Secuestra' comunica mejor el delito moderno sin perder la fuerza de la sustracción ilícita. Mantengo 'un hombre' para respetar el singular masculino del hebreo.
- source_word: וּמְכָרוֹ
  english_pob_choice: and sells him
  chosen_spanish: y lo vende
  alternatives_spanish:
  - y lo vende fuera
  - y lo comercializa
  lexicon: HALOT
  rationale: El verbo מכר con sufijo de tercera persona masculina singular indica vender a la persona secuestrada. 'Y lo vende' es directo, fiel y natural en español legal.
- source_word: וְנִמְצָא בְיָדוֹ
  english_pob_choice: or he is found in his hand
  chosen_spanish: o si es hallado en su poder
  alternatives_spanish:
  - o si es encontrado en su mano
  - o si está en su posesión
  lexicon: HALOT
  rationale: La expresión hebrea 'en su mano' es un modismo de posesión o control. 'En su poder' conserva la idea de dominio/posesión y suena idiomático en español, mientras que la nota preserva la literalidad hebrea.
- source_word: מֹות יוּמָת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - deberá morir
  - será ejecutado
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo intensifica la certeza de la pena. En español legal, 'ciertamente morirá' conserva la fuerza del hebreo y evita introducir una formulación interpretativa más explícita que el texto no exige.
theological_decisions:
- issue: Alcance del delito
  english_pob_reading: The verse prohibits kidnapping/man-stealing, whether the victim has already been sold or is still found in the kidnapper's possession.
  chosen_spanish_reading: El versículo prohíbe el secuestro de una persona, ya sea que ya haya sido vendida o que todavía se encuentre bajo el poder del secuestrador.
  alternative_spanish_readings:
  - El versículo prohíbe robar a una persona y venderla.
  - El versículo prohíbe secuestrar a una persona y retenerla.
  rationale: 'La sintaxis hebrea presenta el secuestro de una persona como delito capital, con dos circunstancias: haber sido vendida o seguir en posesión del culpable. Traducir ''o si es hallado en su poder'' mantiene abierta la alternativa legal sin borrar el paralelismo del original.'
  doctrine_reference: Éxodo 21:16; cf. 1 Timoteo 1:10 (raptores / secuestradores en listas de pecados)
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés de la POB y el hebreo base, manteniendo la tensión entre la literalidad de 'robar' y la especificidad contextual de 'secuestrar'. No se requiere revisión adicional según el resumen de última pasada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - '''Hombre'' conserva el singular masculino del hebreo, coherente con la política de fidelidad de género en pasajes legales.'
  - '''En su poder'' fue preferido sobre ''en su mano'' en el cuerpo por claridad natural; la nota preserva el modismo hebreo para auditar la decisión.'
