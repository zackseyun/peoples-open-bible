translation:
  language: es
  text: El herrero trabaja con una herramienta de corte[a], y sobre las brasas; con martillos le da forma y lo trabaja con su brazo fuerte. También siente hambre, y no le queda fuerza; no ha bebido agua, y desfallece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una azuela', 'una herramienta de grabar' o 'un cincel' para el instrumento específico nombrado aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרָשׁ בַּרְזֶל
  english_pob_choice: The ironsmith
  chosen_spanish: El herrero
  alternatives_spanish:
  - El herrero de hierro
  - El metalúrgico
  - El artesano del hierro
  lexicon: HALOT
  rationale: La construcción señala al obrero caracterizado por el hierro, es decir, un herrero. En español, 'herrero' comunica con naturalidad la figura artesanal sin recargar el sintagma; el complemento 'de hierro' sería más literal pero menos idiomático.
- source_word: מַעֲצָד
  english_pob_choice: a cutting tool
  chosen_spanish: una herramienta de corte
  alternatives_spanish:
  - un hacha de labrar
  - un cincel
  - una herramienta para tallar
  lexicon: HALOT
  rationale: El término designa un instrumento de trabajo de metal o madera cuya identificación exacta es incierta. 'Herramienta de corte' conserva la función sin fijar indebidamente un nombre técnico específico.
- source_word: בַּפֶּחָם
  english_pob_choice: over the coals
  chosen_spanish: sobre las brasas
  alternatives_spanish:
  - sobre el carbón
  - en el fuego
  - sobre las carboneras
  lexicon: HALOT
  rationale: El contexto es de herrería. 'Brasas' expresa bien el carbón encendido o material incandescente en español natural, manteniendo la imagen del trabajo del metal.
- source_word: וּבַמַּקָּבוֹת
  english_pob_choice: with hammers
  chosen_spanish: con martillos
  alternatives_spanish:
  - con mazos
  - con martillos de golpe
  - con macetas
  lexicon: HALOT
  rationale: El plural hebreo pide plural en español. 'Martillos' es la equivalencia directa y clara para las herramientas con las que se da forma al objeto.
- source_word: יִצְּרֵהוּ
  english_pob_choice: he shapes it
  chosen_spanish: le da forma
  alternatives_spanish:
  - lo forma
  - lo modela
  - lo moldea
  lexicon: HALOT
  rationale: El verbo יצר implica formar o modelar. 'Le da forma' suena natural en español y mantiene el sentido de configuración del objeto trabajado.
- source_word: וַיִּפְעָלֵהוּ
  english_pob_choice: works it
  chosen_spanish: lo trabaja
  alternatives_spanish:
  - trabaja en él
  - lo labra
  - lo hace
  lexicon: HALOT
  rationale: Se conserva la idea repetida de labor intensa. 'Lo trabaja' mantiene la raíz de trabajo/operación sin perder el paralelismo con el verbo anterior.
- source_word: בִּזְרֹעַ כֹּחוֹ
  english_pob_choice: with his strong arm
  chosen_spanish: con su brazo fuerte
  alternatives_spanish:
  - con el brazo de su fuerza
  - con su brazo poderoso
  - con la fuerza de su brazo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'con el brazo de su fuerza'. 'Con su brazo fuerte' es una equivalencia natural que preserva el énfasis en el esfuerzo físico.
- source_word: גַּם רָעֵב
  english_pob_choice: He also becomes hungry
  chosen_spanish: También tiene hambre
  alternatives_spanish:
  - También se pone hambriento
  - También se queda hambriento
  - Hasta hambre le da
  lexicon: HALOT
  rationale: La secuencia describe agotamiento progresivo. En español, 'tiene hambre' expresa con naturalidad el estado resultante sin añadir interpretación.
- source_word: וְאֵין כֹּחַ
  english_pob_choice: and there is no strength
  chosen_spanish: y no le queda fuerza
  alternatives_spanish:
  - y no hay fuerza
  - y no tiene fuerzas
  - y su fuerza se acaba
  lexicon: HALOT
  rationale: La cláusula sin verbo afirma ausencia de fuerza. 'No le queda fuerza' transmite bien la pérdida de energía del trabajador y suena idiomático en español.
- source_word: לֹא שָׁתָה מַיִם
  english_pob_choice: he has not drunk water
  chosen_spanish: no ha bebido agua
  alternatives_spanish:
  - no bebió agua
  - no ha tomado agua
  - no había bebido agua
  lexicon: HALOT
  rationale: El perfecto en la secuencia presenta un estado de agotamiento por falta de agua. 'No ha bebido agua' mantiene ese valor resultante y es natural en español.
- source_word: וַיִּיעָף
  english_pob_choice: and he grows faint
  chosen_spanish: y desfallece
  alternatives_spanish:
  - y se cansa
  - y se fatiga
  - y cae exhausto
  lexicon: HALOT
  rationale: El verbo indica desfallecimiento o agotamiento extremo. 'Desfallece' capta bien la culminación física del esfuerzo, la sed y el hambre.
theological_decisions:
- issue: Satira profética sobre la fabricación de ídolos sin añadir comentario interpretativo al texto principal
  english_pob_reading: Render the verse concretely as a description of the smith's exhausting labor, without importing interpretive commentary into the main text.
  chosen_spanish_reading: Presentar la escena de trabajo del herrero de modo concreto, dejando que la ironía profética emerja del contexto inmediato y no de una paráfrasis añadida.
  alternative_spanish_readings:
  - Enfatizar explícitamente en el texto principal la inutilidad de la idolatría
  - Insertar una glosa interpretativa sobre la vanidad de los ídolos
  rationale: El versículo describe la labor física y el desgaste del artesano. La carga teológica contra la idolatría pertenece al contexto amplio de Isaías 44, pero no debe imponerse con lenguaje explicativo dentro del versículo mismo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] exactamente en 'herramienta de corte[a]' dentro del texto español.
  spanish_consistency_notes:
  - Se mantuvo un registro neutro y bíblico, sin recurrir a fórmulas eclesiásticas que oscurezcan el cuadro artesanal.
  - 'Se preservó la progresión del agotamiento: hambre, falta de fuerza, ausencia de agua y desfallecimiento.'
  - Se evitó traducir mecánicamente 'over the coals' por una construcción inglesa; 'sobre las brasas' es natural y fiel al contexto de herrería.
  - No se introdujo 'Mesías', 'SEÑOR' ni otras equivalencias no pertinentes al verso.
