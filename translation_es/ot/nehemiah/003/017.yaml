base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/003/017.yaml
  text: 'After him the Levites carried out repairs: Rehum son of Bani[a]. Next to him Hashabiah, ruler of half the district of Keilah[c][b], carried out repairs for his district.'
  footnotes:
  - marker: a
    text: Or 'repaired'; the Hebrew verb literally means 'made strong' but in Nehemiah 3 refers to repair work on the wall.
    reason: lexical_alternative
  - marker: b
    text: Literally 'at his hand,' an idiom here meaning 'next to him' or 'beside him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for his section.' The Hebrew may refer either to the district under Hashabiah's authority or to the portion assigned to him.
    reason: lexical_alternative
