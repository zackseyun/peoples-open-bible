  yaml_path: translation/deuterocanon/sirach/051/015.yaml
  text: From her blossom[a], like a ripening cluster of grapes, my heart rejoiced in her; my foot trod in uprightness[c][b]; from my youth I tracked her down.
  footnotes:
  - marker: a
    text: Or 'like a reddening cluster of grapes'; the Greek image may emphasize the grapes taking on color as they ripen.
    reason: lexical_alternative
  - marker: b
    text: Or 'my foot stepped in straightness' or 'on a straight path'; the Greek can carry both literal path imagery and moral uprightness.
    reason: lexical_alternative
  - marker: c
    text: Or 'I traced her' / 'I sought her out'; the Greek verb literally evokes tracking by footprints.
    reason: lexical_alternative
