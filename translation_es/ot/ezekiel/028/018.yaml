    text: O «tu comercio ambulante», «tu actividad comercial» o «tu tráfico comercial».
    reason: lexical_alternative
  - marker: b
    text: «Santuarios» conserva el plural del hebreo. También podría entenderse como «lugares santos».
    reason: lexical_alternative
  - marker: c
    text: Algunos traducen «saqué fuego de dentro de ti»; el hebreo describe el fuego como saliendo de en medio de ti como instrumento de juicio.
    reason: alternative_reading
  revision_rationale: Se revisa para conservar todas las alternativas y ambigüedades relevantes del audit trail inglés, mejorar la naturalidad de la referencia pronominal al fuego y usar la locución española más idiomática «reducir a cenizas».
