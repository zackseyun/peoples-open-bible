translation:
  language: es
  text: Pero, teniendo una mente como de adamante, y encaminando[a] a sus hijos hacia la inmortalidad, tanto más los exhortaba a la muerte por la devoción a Dios, suplicándoles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haciendo resonar de vuelta el número de sus hijos hacia la inmortalidad». El participio griego es inusual y metafórico, por lo que la imagen exacta es difícil de reproducir con claridad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδάμαντινον
  english_pob_choice: like adamant
  chosen_spanish: como de adamante
  alternatives_spanish:
  - como adamantino
  - como de diamante
  - inquebrantable
  lexicon: LSJ
  rationale: El adjetivo expresa dureza extrema e invencibilidad. «Adamante» conserva el eco metálico y literario sin convertir la metáfora en una simple cualidad abstracta.
- source_word: νοῦν
  english_pob_choice: mind
  chosen_spanish: ánimo
  alternatives_spanish:
  - mente
  - entendimiento
  - resolución
  lexicon: LSJ
  rationale: Aquí el contexto enfatiza la firmeza interior ante el martirio; «ánimo» mantiene la idea de disposición interior sin sonar mecánico. «Mente» sería posible, pero suena menos natural en español en esta construcción metafórica.
- source_word: ἀντικτυποῦσα
  english_pob_choice: sending ... on
  chosen_spanish: encaminando
  alternatives_spanish:
  - haciendo resonar
  - devolviendo
  - repicando
  lexicon: LSJ
  rationale: El participio es figurado y difícil. «Encaminando» preserva la dirección hacia la inmortalidad y evita resolver en exceso la imagen, que el inglés POB también trata con cautela.
- source_word: εἰς ἀθανασίαν
  english_pob_choice: toward immortality
  chosen_spanish: hacia la inmortalidad
  alternatives_spanish:
  - para la inmortalidad
  - en la inmortalidad
  - a la inmortalidad
  lexicon: LSJ
  rationale: La preposición indica dirección o meta. «Hacia la inmortalidad» conserva ese valor telico con claridad natural en español.
- source_word: τὸν τῶν υἱῶν ἀριθμόν
  english_pob_choice: the number of her sons
  chosen_spanish: el número de sus hijos
  alternatives_spanish:
  - la cuenta de sus hijos
  - el número de sus hijos varones
  lexicon: LSJ
  rationale: «Hijos» es el modo más natural de reproducir el genitivo en español y concuerda con el contexto narrativo. «Hijos varones» sería más explícito, pero la fuente ya usa υἱῶν, por lo que «hijos» basta.
- source_word: μᾶλλον
  english_pob_choice: all the more
  chosen_spanish: tanto más
  alternatives_spanish:
  - más bien
  - cada vez más
  lexicon: LSJ
  rationale: La comparación intensifica la acción; «tanto más» reproduce bien el valor adverbial y su fuerza retórica.
- source_word: εὐσεβείας
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción a Dios
  - religiosidad
  - piedad para con Dios
  lexicon: LSJ
  rationale: En este contexto de fidelidad martirial, el término señala devoción reverente a Dios. «Piedad» es la opción más sobria y tradicional en español, aunque se conserva la posibilidad de entenderla como piedad hacia Dios y no mera religiosidad exterior.
- source_word: προετρέπετο
  english_pob_choice: was urging them on
  chosen_spanish: los exhortaba
  alternatives_spanish:
  - los instaba
  - los animaba
  - los urgía
  lexicon: LSJ
  rationale: El verbo implica exhortación enérgica. «Exhortaba» mantiene el tono elevado del pasaje y evita un giro demasiado coloquial.
- source_word: ἱκετεύουσα
  english_pob_choice: pleading with them
  chosen_spanish: suplicándoles
  alternatives_spanish:
  - rogándoles
  - implorándoles
  lexicon: LSJ
  rationale: El participio añade intensidad emotiva. «Suplicándoles» expresa bien la súplica insistente y encaja con el registro solemne del texto.
theological_decisions:
- issue: εὐσέβεια en contexto de martirio
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - reverencia
  - religiosidad
  rationale: El término en 4 Macabeos remite a fidelidad devota a Dios expresada en obediencia y perseverancia. «Piedad» conserva esa orientación sin cargar el texto con una formulación doctrinal posterior. Se evita «religiosidad» por su matiz ambiguo o externo.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica; preservar la orientación a Dios'
- issue: La cláusula metafórica sobre ἀντικτυποῦσα y la inmortalidad
  english_pob_reading: sending the number of her sons on to immortality
  chosen_spanish_reading: encaminando hacia la inmortalidad el número de sus hijos
  alternative_spanish_readings:
  - haciendo resonar el número de sus hijos hacia la inmortalidad
  - devolviendo el número de sus hijos a la inmortalidad
  - mandando el número de sus hijos a la inmortalidad
  rationale: El griego es densamente metafórico y no totalmente transparente. La traducción española conserva la orientación teleológica hacia la inmortalidad sin intentar resolver la imagen de forma explicativa. Así se mantiene la tensión retórica documentada en el inglés POB.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y retórica'
translation_notes:
  revision_awareness: Se ha seguido la revisión más reciente del inglés POB, que corrigió la imagen de ἀντικτυποῦσα para acercarla a un movimiento dirigido hacia la inmortalidad. La versión española evita tanto una traducción mecánica como una paráfrasis interpretativa, y conserva el paralelismo entre la firmeza interior, la dirección hacia la inmortalidad y la súplica materna.
  spanish_consistency_notes:
  - Se usa «Dios»/«piedad» según el valor devocional del contexto, sin introducir vocabulario eclesiástico ajeno.
  - «Adamante» mantiene la metáfora de dureza extrema sin desplazarla a una explicación abstracta.
  - El orden de las participios en español busca legibilidad manteniendo la densidad retórica del griego.
  - Se prefiere una solución que preserve la metáfora de movimiento hacia la inmortalidad en lugar de explicarla plenamente.
