    text: O ‘disciplina de reyes’; el sustantivo hebreo puede significar ‘disciplina’ o ‘ataduras/grilletes’, pero ‘ataduras’ encaja mejor con el paralelismo con ‘ata un cinturón’.
    reason: lexical_alternative
  - marker: b
    text: 'La imagen puede sugerir humillación o subyugación: Dios despoja a los reyes de su poder y los ata como a hombres comunes o cautivos.'
    reason: cultural_note
  revision_rationale: 'La revisión es menor: mejora la naturalidad del español al eliminar la redundancia, y al mismo tiempo alinea mejor el verbo con el hebreo y con la decisión documentada del POB de mantener la tensión literal ''suelta / ata''. Se conservan la imaginería y la ambigüedad teológica del original.'
