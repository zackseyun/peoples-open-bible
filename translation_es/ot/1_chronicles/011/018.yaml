revisions:
- from: Y los tres abrieron paso entre el campamento de los filisteos y sacaron agua del pozo de Belén que estaba junto a la puerta, y la llevaron a David. Pero David no quiso beberla; más bien, la derramó a Yahvé[a].
  to: Y los tres se abrieron paso en el campamento de los filisteos, y sacaron agua del pozo de Belén que estaba junto a la puerta, y la cargaron y la llevaron a David. Pero David no quiso beberla; más bien, la derramó a Yahvé[a].
  rationale: Se corrige la expresión verbal inicial para un español más natural y fiel al contexto militar («se abrieron paso»). También se restituyen las dos acciones narrativas del hebreo («la cargaron y la llevaron») en vez de fusionarlas en una sola. Se conserva el resto del texto, incluida la nota sobre el matiz cultual de «la derramó».
  reviewer_model: gpt-5.4
