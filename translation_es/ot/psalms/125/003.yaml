revisions:
- from: Porque el cetro de la maldad no reposará sobre la suerte de los justos[a][b], para que los justos no extiendan sus manos a la iniquidad[c].
  to: Porque el cetro de la maldad[a] no reposará sobre la suerte[b] de los justos, para que los justos no extiendan sus manos al mal[c].
  rationale: 'La revisión corrige el problema principal de fidelidad editorial: el anclaje incorrecto de las notas. También mejora levemente la naturalidad de la expresión final sin perder la imagen hebrea ni las alternativas preservadas por el POB inglés. El resto del versículo puede mantenerse.'
