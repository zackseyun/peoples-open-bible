translation:
  language: es
  text: Y se levantaron contra los dos ancianos, porque Daniel había probado, por sus propias palabras, que eran falsos testigos, y les hicieron lo mismo que ellos habían planeado maliciosamente hacer.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνέστησαν ἐπὶ
  english_pob_choice: rose up against
  chosen_spanish: se levantaron contra
  alternatives_spanish:
  - se alzaron contra
  - se pusieron contra
  lexicon: LSJ
  rationale: La construcción griega expresa acción hostil dirigida contra alguien, no solo ponerse en pie. «Se levantaron contra» conserva el sentido idiomático y judicial de oposición activa.
- source_word: πρεσβύτας
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - viejos
  - presbíteros
  lexicon: LSJ
  rationale: En Susana, el término no describe solo edad, sino una función reconocida de autoridad. «Ancianos» comunica esa dignidad comunitaria sin introducir un tecnicismo eclesiástico ajeno al contexto.
- source_word: συνέστησεν
  english_pob_choice: had convicted
  chosen_spanish: los había dejado convictos
  alternatives_spanish:
  - los había condenado
  - los había desenmascarado
  - los había demostrado culpables
  lexicon: LSJ
  rationale: El verbo apunta a que Daniel estableció su culpabilidad mediante su propio testimonio contradictorio. «Dejar convictos» conserva el matiz forense de prueba judicial y evita una traducción demasiado general.
- source_word: ἐκ τοῦ στόματος αὐτῶν
  english_pob_choice: out of their own mouth
  chosen_spanish: por su propia boca
  alternatives_spanish:
  - de su propia boca
  - con su propio testimonio
  - de sus propios labios
  lexicon: LSJ
  rationale: La expresión idiomática señala que sus propias palabras los incriminaron. «Por su propia boca» es natural en español y mantiene la imagen legal del original.
- source_word: ψευδομάρτυρας ὄντας
  english_pob_choice: of being false witnesses
  chosen_spanish: de ser falsos testigos
  alternatives_spanish:
  - como falsos testigos
  - de haber dado falso testimonio
  - de ser testigos falsos
  lexicon: LSJ
  rationale: El término es claramente forense. «Falsos testigos» preserva el campo judicial central de la escena y evita suavizar la acusación a un sentido meramente moral.
- source_word: ἐποίησαν
  english_pob_choice: they did
  chosen_spanish: les hicieron
  alternatives_spanish:
  - procedieron con ellos
  - obraron así con ellos
  lexicon: LSJ
  rationale: El verbo es simple y el contenido lo aporta el complemento. «Les hicieron» es natural en español y permite mantener la relación causal con lo que sigue.
- source_word: τὸν τρόπον
  english_pob_choice: as
  chosen_spanish: lo mismo que
  alternatives_spanish:
  - de la misma manera que
  - tal como
  lexicon: LSJ
  rationale: La frase adverbial indica correspondencia entre lo que quisieron hacer y lo que recibieron. «Lo mismo que» hace explícita esa equivalencia retributiva sin añadir contenido extra.
- source_word: ἐπονηρεύσαντο
  english_pob_choice: had maliciously planned to do
  chosen_spanish: habían planeado maliciosamente hacer
  alternatives_spanish:
  - habían maquinado hacer el mal
  - habían tramado hacerle daño
  - habían proyectado mal hacer
  lexicon: LSJ
  rationale: El medio aquí señala su designio perverso contra Susana. «Habían planeado maliciosamente hacer» conserva la intención dañina y el tono jurídico del relato.
theological_decisions:
- issue: Retribución judicial en la cláusula final
  english_pob_reading: The elders received the penalty they had wickedly intended for Susanna.
  chosen_spanish_reading: El cierre deja claro que recibieron para sí lo que habían querido imponer a Susana.
  alternative_spanish_readings:
  - Y les hicieron conforme a lo que habían hecho maliciosamente
  - Y les aplicaron el mismo trato que ellos habían preparado
  rationale: 'La escena no solo narra castigo, sino justicia retributiva: la pena vuelve sobre los falsos testigos. La redacción española conserva ese forcejeo legal sin introducir una formulación ajena al versículo.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y tiene en cuenta el audit trail inglés: mantiene la fuerza jurídica de ἀνέστησαν ἐπὶ, conserva el valor forense de ψευδομάρτυρας, y refleja la retribución final sin depender de una glosa excesiva. También toma en cuenta la revisión inglesa que favoreció la lectura idiomática «out of their own mouth», equivalente aquí a «por su propia boca».'
  spanish_consistency_notes:
  - Se usa «ancianos» para πρεσβύτας, coherente con el rol de autoridad del pasaje y con una opción no clericalizada.
  - Se mantiene un registro sobrio y jurídico, apropiado para Susana.
  - No se introduce «Cristo», «SEÑOR» ni otras convenciones que no corresponden a este versículo.
