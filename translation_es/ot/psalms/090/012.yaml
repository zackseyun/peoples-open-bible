    issue: «contar» en vez de una forma más formal como «numerar»
    rationale: Es una elección plenamente válida y natural en español; solo pierde un matiz leve de concreción tradicional respecto de «number», pero no afecta la fidelidad.
  - severity: low
    issue: La nota dice «así a contar» en lugar de explorar también «así a numerar»
    rationale: No es un problema real de fidelidad; la nota sigue adecuadamente el rastro auditado y preserva la dificultad del hebreo final.
