translation:
  language: es
  text: ¡Ay del corazón que no confía[a], pues tampoco se mantendrá en pie!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «¡Ay del corazón decaído, porque no cree; por eso no será protegido!». El hebreo dice «corazón» y «no se mantendrá en pie».'
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹי / οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de…!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay del…
  lexicon: HALOT / LSJ
  rationale: En español, '¡Ay de…!' conserva el tono de amenaza/lamento sapiencial y profético de 'Woe' sin sonar artificial. '¡Ay!' solo sería más exclamativo y menos preciso para la fórmula.
- source_word: לְלֵב / καρδίᾳ
  english_pob_choice: to the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el alma
  - la mente
  - el interior
  lexicon: HALOT / LSJ
  rationale: '''Corazón'' reproduce la antropología bíblica del centro interior de la persona y coincide con el griego καρδία. Mantiene la imagen sin sustituirla por una abstracción moderna.'
- source_word: אֲשֶׁר לֹא יַאֲמִין / οὐ πιστεύει
  english_pob_choice: that does not trust
  chosen_spanish: que no confía
  alternatives_spanish:
  - que no cree
  - que no tiene fe
  lexicon: HALOT / LSJ
  rationale: '''Confiar'' comunica en español actual la fuerza práctica de confiar/creer en este contexto sapiencial. Se evita ''cree'' porque puede sonar más doctrinal que relacional; ''fe'' abstrae demasiado.'
- source_word: וְאַף הוּא / διὰ τοῦτο
  english_pob_choice: for it also
  chosen_spanish: porque tampoco
  alternatives_spanish:
  - y también
  - por eso también
  lexicon: HALOT / contextual
  rationale: La línea hebrea dice que el corazón 'tampoco se mantendrá en pie'; el griego añade la consecuencia de no ser 'cubierto/protegido'. 'Porque tampoco' integra esa consecuencia y preserva el paralelismo de juicio sin sobrecargar la frase.
- source_word: לֹא יָקוּם / οὐ σκεπασθήσεται
  english_pob_choice: will not stand
  chosen_spanish: se mantendrá en pie
  alternatives_spanish:
  - permanecerá firme
  - resistirá
  - será protegido
  lexicon: HALOT / LSJ
  rationale: '''Mantenerse en pie'' conserva el valor básico de קום/σταθῆναι en este contexto: no resistir, no permanecer firme. Además, permite una nota que reconozca la lectura griega alternativa ''ser cubierto/protegido'' sin imponerla en el texto principal.'
theological_decisions:
- issue: Relación entre la lectura hebrea 'no se mantendrá en pie' y la lectura griega 'no será cubierto/protegido'
  english_pob_reading: The Hebrew reads 'heart' and 'will not stand.'
  chosen_spanish_reading: 'El texto principal sigue la lectura hebrea: ''no se mantendrá en pie''.'
  alternative_spanish_readings:
  - '''no será cubierto'''
  - '''no será protegido'''
  rationale: La tradición base de este registro es el hebreo de Kahana, y el POB inglés ya documenta la variante griega en nota. Por fidelidad auditada, el español conserva la frase hebrea en el cuerpo y deja constancia de la alternativa griega en nota.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 3, 6; contested variants in Wisdom literature'
translation_notes:
  revision_awareness: 'Este borrador sigue la revisión más reciente sin cambios sustantivos: mantiene la prioridad del hebreo Kahana en el texto principal y documenta la variante griega de manera transparente en nota.'
  spanish_consistency_notes:
  - Se conserva 'corazón' como término antropológico bíblico, en coherencia con el proyecto.
  - '''Confiar'' se vierte como ''confiar''/''confía'' en vez de ''creer'' para mantener el sentido relacional y práctico del contexto sapiencial.'
  - Se evita 'SEÑOR' porque no aparece el Tetragrámaton en este versículo.
  - '''Mantenerse en pie'' refleja la imagen de firmeza/resistencia y permite notar la alternativa griega sin mezclar lecturas en el texto base.'
