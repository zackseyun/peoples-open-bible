base_translation:
  language: en
  yaml_path: translation/ot/isaiah/062/001.yaml
  text: For Zion’s sake I will not keep silent[a], and for Jerusalem’s sake I will not be quiet[c][b], until her righteousness goes out like brightness and her salvation burns like a torch.
  footnotes:
  - marker: a
    text: Or 'I will not rest' for 'I will not be quiet.' The Hebrew verb can carry the sense of being quiet, still, or at rest.
    reason: lexical_alternative
  - marker: b
    text: Or 'her vindication' for 'her righteousness.' The Hebrew can denote righteousness in a moral/covenantal sense or public vindication.
    reason: lexical_alternative
  - marker: c
    text: The speaker is not explicitly identified in the verse; interpreters differ on whether this is the prophet, the LORD, or another representative voice.
    reason: alternative_reading
