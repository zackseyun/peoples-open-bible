    reason: lexical_alternative
  - marker: b
    text: O «contra Jehú» o «para encontrarse con Jehú»; el hebreo dice literalmente «a Jehú», aunque el contexto sugiere un encuentro hostil.
    reason: lexical_alternative
  - marker: c
    text: Lit. «cortar» o «extirpar»; la expresión hebrea conserva un modismo de juicio contra la casa de Acab.
    reason: lexical_alternative
  revision_rationale: La revisión devuelve al texto principal la neutralidad de אֶל («hacia/a Jehú») y traslada la lectura hostil a nota, en línea con la auditoría inglesa y el hebreo. También preserva la variación formal Joram/Jehoram presente en el original y sustituye «exterminar» por «eliminar» con nota para retener mejor el modismo de «cut off». Se elimina «Ahora bien» por innecesario.
