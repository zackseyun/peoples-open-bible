translation:
  language: es
  text: Pero los judíos que estaban en Susa se reunieron el día trece de él[a] y el día catorce de él, y descansaron el día quince de él, y lo hicieron un día de banquete y alegría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «el día trece de él ... el día catorce de él ... el día quince de él», con «él» referido al mes por el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un día de festín y gozo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיְּהוּדִים
  english_pob_choice: But the Jews
  chosen_spanish: Pero los judíos
  alternatives_spanish:
  - Y los judíos
  - Ahora los judíos
  lexicon: HALOT
  rationale: El waw introduce contraste con el contexto previo; en español, «Pero» comunica mejor ese giro discursivo que un simple «Y». «Los judíos» mantiene el etnónimo sin carga interpretativa adicional.
- source_word: אֲשֶׁר בְּשׁוּשָׁן
  english_pob_choice: who were in Susa
  chosen_spanish: que estaban en Susa
  alternatives_spanish:
  - que estaban en Shushán
  - que se hallaban en Susa
  lexicon: HALOT
  rationale: «Estaban en Susa» expresa con naturalidad la ubicación del grupo dentro de la capital; «Susa» sigue la forma habitual en español para שׁוּשָׁן.
- source_word: נִקְהֲלוּ
  english_pob_choice: assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: El nifal de קהל indica reunirse/convocarse. «Se reunieron» conserva el sentido de asamblea sin añadir matices de motivo que el hebreo no exige.
- source_word: בִּשְׁלֹשָׁה עָשָׂר בּוֹ
  english_pob_choice: on the thirteenth day of it
  chosen_spanish: el día trece de él
  alternatives_spanish:
  - el día trece del mes
  - el trece de él
  lexicon: HALOT
  rationale: Se mantiene la referencia pronominal de «él», que remite al mes por el contexto, en lugar de resolverla completamente como «del mes». «Día trece» es la forma natural en español para la fecha implícita.
- source_word: וּבְאַרְבָּעָה עָשָׂר בּוֹ
  english_pob_choice: and on the fourteenth day of it
  chosen_spanish: y el día catorce de él
  alternatives_spanish:
  - y el día catorce del mes
  - y el catorce de él
  lexicon: HALOT
  rationale: Se conserva la repetición paralela del hebreo y la misma referencia pronominal. La secuencia de días se vuelve clara en español sin eliminar la tensión textual del sufijo.
- source_word: וְנוֹחַ
  english_pob_choice: and rested
  chosen_spanish: y descansaron
  alternatives_spanish:
  - y tuvieron descanso
  - y reposaron
  lexicon: HALOT
  rationale: נוח aquí indica cesar de la actividad y entrar en reposo tras la acción previa. «Descansaron» es la opción más natural en español y mantiene la relación temporal con los días anteriores.
- source_word: בַּחֲמִשָּׁה עָשָׂר בּוֹ
  english_pob_choice: on the fifteenth day of it
  chosen_spanish: el día quince de él
  alternatives_spanish:
  - el día quince del mes
  - el quince de él
  lexicon: HALOT
  rationale: La misma construcción dativa se conserva con referencia pronominal explícita para reflejar la literalidad del hebreo y su dependencia del contexto.
- source_word: וְעָשֹׂה אֹתוֹ
  english_pob_choice: and made it
  chosen_spanish: y lo hicieron
  alternatives_spanish:
  - y lo designaron
  - y lo convirtieron
  lexicon: HALOT
  rationale: עָשָׂה + objeto pronominal puede expresar tratar/designar un día de cierta manera. En español, «lo hicieron» mantiene la idiomaticidad y permite que el complemento siguiente precise la designación.
- source_word: יוֹם מִשְׁתֶּה וְשִׂמְחָה
  english_pob_choice: a day of feasting and gladness
  chosen_spanish: un día de banquete y alegría
  alternatives_spanish:
  - un día de festín y alegría
  - un día de banquete y gozo
  lexicon: HALOT
  rationale: מִשְׁתֶּה se traduce mejor aquí como «banquete» por su referencia concreta a una comida festiva; «alegría» vierte שִׂמְחָה con un sustantivo natural en español y conserva el tono celebrativo.
theological_decisions:
- issue: Valor de la referencia pronominal «de él» en las fechas
  english_pob_reading: on the thirteenth day of it ... of it ... of it, with 'it' referring to the month from context
  chosen_spanish_reading: el día trece de él ... el día catorce de él ... el día quince de él
  alternative_spanish_readings:
  - el día trece del mes ... del mes ... del mes
  - el trece ... el catorce ... el quince
  rationale: Se preserva la dependencia contextual del pronombre, como hace el texto base, para no borrar la forma hebrea ni su referencia implícita al mes. En español, el pronombre puede sonar áspero, pero sirve para transparentar la estructura del original.
  doctrine_reference: No aplica; decisión de transparencia textual y seguimiento del hebreo
translation_notes:
  revision_awareness: 'Se revisó el error previo de anclaje: ahora el marcador [a] aparece exactamente en el texto español, ligado a la secuencia de fechas. No se dejan notas sin ancla. La redacción general sigue la última pasada sin cambios sustantivos, pero corrige la disciplina de notas al pie.'
  spanish_consistency_notes:
  - Se mantiene «Susa» como transliteración española estándar para שׁוּשָׁן.
  - Se conserva la referencia pronominal «de él» para reflejar la literalidad hebrea y la dependencia contextual del mes.
  - «Banquete» se usa para מִשְׁתֶּה por su fuerza concreta y por ser plenamente natural en español bíblico contemporáneo.
