translation:
  language: es
  text: Y su deleite estará en el temor de Yahvé[a]; y no juzgará por lo que sus ojos ven, ni decidirá por lo que sus oídos oyen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «su olfato/percepción estará en el temor de Yahvé»; el verbo hebreo es difícil y puede sugerir un discernimiento agudo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲרִיחוֹ
  english_pob_choice: his delight shall be
  chosen_spanish: su deleite estará
  alternatives_spanish:
  - olerá
  - su percepción estará
  lexicon: HALOT
  rationale: El hebreo Hiphil de ריח es difícil y no debe forzarse a un calco verbal español. Siguiendo la lectura contextual de la POB en inglés, opto por una formulación idiomática que exprese disposición gozosa/afinidad con el temor de Yahvé, sin perder la nota de discernimiento excepcional. La alternativa literal se conserva en la nota.
- source_word: בְּיִרְאַת
  english_pob_choice: in the fear of
  chosen_spanish: en el temor de
  alternatives_spanish:
  - con reverencia por
  - por el temor de
  lexicon: HALOT
  rationale: ‘Temor’ preserva la fuerza de יִרְאָה como reverencia temerosa ante Dios. ‘En el temor de’ sigue de cerca la construcción hebrea y es claro en español bíblico moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio según el estándar del proyecto para יהוה. ‘Yahvé’ es la forma preferida en español y evita la sustitución por un título.
- source_word: לְמַרְאֵה עֵינָיו
  english_pob_choice: by what his eyes see
  chosen_spanish: por lo que ven sus ojos
  alternatives_spanish:
  - según la apariencia ante sus ojos
  - por la vista de sus ojos
  lexicon: HALOT
  rationale: La expresión hebrea contrasta el juicio verdadero con la mera apariencia visible. En español, ‘por lo que ven sus ojos’ conserva el paralelismo sensorial y el sentido de decisión basada solo en la vista.
- source_word: יִשְׁפּוֹט
  english_pob_choice: he shall judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - hará justicia
  - gobernará juzgando
  lexicon: HALOT
  rationale: שׁפט aquí mantiene su sentido judicial. ‘Juzgará’ es la forma más directa y se coordina bien con la cláusula paralela.
- source_word: לְמִשְׁמַע אָזְנָיו
  english_pob_choice: by what his ears hear
  chosen_spanish: por lo que oyen sus oídos
  alternatives_spanish:
  - por el oír de sus oídos
  - por rumores
  lexicon: HALOT
  rationale: La imagen paralela a ‘sus ojos’ pide una equivalencia sensorial en español. ‘Por lo que oyen sus oídos’ conserva la concreción del hebreo y evita reducirlo a un abstracto como ‘rumores’.
- source_word: יוֹכִיחַ
  english_pob_choice: decide
  chosen_spanish: decidirá
  alternatives_spanish:
  - arbitrará
  - reprenderá
  - fallará
  lexicon: HALOT
  rationale: יכח en este contexto tiene un matiz de dictar/verificar una decisión judicial. ‘Decidirá’ mantiene el paralelismo con ‘juzgará’ sin cargar el verbo con una sola opción demasiado estrecha.
theological_decisions:
- issue: Sentido difícil de וַהֲרִיחוֹ
  english_pob_reading: The ruler is characterized by reverent delight in the fear of Yahweh, while a literal smell/perception reading remains possible and is noted.
  chosen_spanish_reading: El texto principal expresa deleite en el temor de Yahvé; la posibilidad de un matiz literal de oler/percibir queda señalada en nota.
  alternative_spanish_readings:
  - Su olfato/percepción estará en el temor de Yahvé
  - olerá en el temor de Yahvé
  rationale: La estrofa sigue con dos cláusulas sobre juicio no basado en apariencias u oídas, lo que favorece una lectura de discernimiento moral y espiritual. Para no ocultar la tensión léxica del hebreo, la alternativa literal se documenta como nota.
  doctrine_reference: 'Translation philosophy §§1, 3, 6; Contested terms: וַהֲרִיחוֹ'
- issue: Nombre divino en el contexto del rey mesiánico
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: La POB inglesa distingue el nombre personal de Dios. En español se mantiene esa transparencia con ‘Yahvé’, preservando el valor teológico del Tetragrámaton en un pasaje mesiánico.
  doctrine_reference: 'Contested terms: יְהוָה → Yahweh/Yahvé'
translation_notes:
  revision_awareness: 'Se siguió el consenso alto del auditor: no hubo cambios pendientes en la última pasada revisada, y la solución española conserva la decisión contextual de la POB inglesa sin ocultar la dificultad léxica del verbo inicial.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se mantuvo el paralelismo sensorial ojos/oídos en la segunda mitad del versículo.
  - Se evitó ‘Cristo’ porque el hebreo y la POB inglesa aquí hablan del rey davídico esperado sin ese título.
  - Se prefirió ‘juzgará/decidirá’ por el marco judicial del versículo, sin añadir matices no sustentados.
