translation:
  language: es
  text: El que engendra[a] un necio, engendra para su propia tristeza; y el padre de un necio no se alegra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que hace nacer». El hebreo es compacto y puede verterse con un giro más literal; «engendra» expresa mejor el paralelismo paterno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹלֵד
  english_pob_choice: He who fathers
  chosen_spanish: el que engendra
  alternatives_spanish:
  - el que hace nacer
  - el que engendra un hijo
  - quien engendra
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva con sentido de engendrar/fundar paternidad. En español, 'engendra' mantiene la fuerza verbal y el paralelismo con 'padre' en el segundo hemistiquio. 'Hace nacer' sonaría menos natural y desplaza el foco del acto paterno.
- source_word: כְּסִיל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un insensato
  - un tonto
  - un necio obstinado
  lexicon: HALOT
  rationale: En la literatura sapiencial, כְּסִיל designa al necio moralmente torpe y terco, no solo a alguien con poca inteligencia. 'Necio' conserva bien ese valor tradicional y bíblico en español, sin suavizar el término.
- source_word: לְתוּגָה
  english_pob_choice: to his own grief
  chosen_spanish: para su propia tristeza
  alternatives_spanish:
  - para su propio dolor
  - para su propia angustia
  - en tristeza para sí
  lexicon: HALOT
  rationale: El sustantivo תּוּגָה expresa tristeza, pesar o aflicción. La preposición ל con el sufijo pronominal comunica resultado o consecuencia para el sujeto; 'para su propia tristeza' reproduce ese efecto de modo natural en español.
- source_word: לוֹ
  english_pob_choice: his own
  chosen_spanish: su propia
  alternatives_spanish:
  - para él
  - para sí
  - de él
  lexicon: HALOT
  rationale: El sufijo remite al mismo sujeto que engendra. En español, 'su propia' hace explícita la referencia reflexiva implícita en el hebreo sin añadir contenido nuevo.
- source_word: וְלֹא יִשְׂמַח
  english_pob_choice: has no joy
  chosen_spanish: no se alegra
  alternatives_spanish:
  - no tiene alegría
  - no se goza
  - no se regocija
  lexicon: HALOT
  rationale: El imperfecto expresa la situación general propia del proverbio. 'No se alegra' conserva el valor gnómico con una formulación natural y digna en español.
- source_word: אֲבִי
  english_pob_choice: the father of
  chosen_spanish: el padre de
  alternatives_spanish:
  - un padre de
  - el padre del
  lexicon: HALOT
  rationale: La forma constructa exige complemento. 'El padre de' reproduce con claridad el paralelo del segundo hemistiquio y el sentido genérico de la sentencia.
- source_word: נָבָל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un infame
  - un vil
  - un hombre necio
  lexicon: HALOT
  rationale: La revisión inglesa volvió a 'fool' para mantener consistencia léxica con כְּסִיל y evitar una sobreinterpretación. En español, 'necio' permite esa misma consistencia y no introduce una carga moral adicional no exigida por el contexto inmediato.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que reemplazó una traducción más interpretativa de נָבָל por 'fool' para mantener consistencia léxica en el proverbio. Por eso el español evita un equivalente moralmente más cargado y conserva 'necio' en ambos miembros.
  spanish_consistency_notes:
  - Se mantuvo un registro sapiencial natural, sin arcaísmos innecesarios.
  - Se evitó 'SEÑOR' u otros sustitutos teológicos porque el versículo no contiene el nombre divino.
  - Se preservó el paralelismo semántico con dos ocurrencias de 'necio', como en la revisión inglesa.
  - La nota a pie de página marca la alternativa más literal para יֹלֵד sin alterar el texto principal.
