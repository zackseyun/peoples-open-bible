translation:
  language: es
  text: Así que guardarás sus estatutos y sus mandamientos, que hoy yo te estoy mandando[a], para que te vaya bien[b] a ti y a tus hijos[c] después de ti, y para que prolongues tus días sobre la tierra[d] que Yahvé tu Dios te da por todos tus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que hoy yo te ordeno». El hebreo usa un participio de mandato en curso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que te sea bien». El hebreo expresa el sentido de que las cosas te vayan bien.'
    reason: lexical_alternative
  - marker: c
    text: «Tus hijos» también puede traducirse «tus hijos varones» o, más ampliamente, «tus descendientes», según cuán específicamente se entienda el término en este contexto.
    reason: lexical_alternative
  - marker: d
    text: 'O: «en la tierra». La preposición hebrea es literalmente «sobre», pero en español también puede decirse idiomáticamente «en la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַרְתָּ
  english_pob_choice: So you shall keep
  chosen_spanish: Así que guardarás
  alternatives_spanish:
  - Y guardarás
  - Por tanto, guardarás
  lexicon: HALOT
  rationale: שמר en contexto de pacto significa guardar/observar. «Así que» conserva la conexión discursiva del waw y el valor inferencial del contexto, mientras que el futuro español expresa bien la fuerza exhortativa.
- source_word: חֻקָּיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» distingue היטב este término de מִצְוֹת y mantiene un registro jurídico-covenantal natural en español.
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - sus órdenes
  lexicon: HALOT
  rationale: «Mandamientos» preserva el valor de commandment/command y mantiene la correspondencia semántica con el término anterior sin fusionarlos.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que hoy yo te estoy mandando
  alternatives_spanish:
  - que hoy te mando
  - que hoy yo te ordeno
  lexicon: HALOT
  rationale: El participio intensifica la acción en curso. «Te estoy mandando» refleja bien la inmediatez del acto de habla; «hoy» se adelanta para sonar natural en español sin perder el valor temporal.
- source_word: אֲשֶׁר יִיטַב לְךָ
  english_pob_choice: so that it may go well with you
  chosen_spanish: para que te vaya bien
  alternatives_spanish:
  - para que te sea bien
  - para que te vaya bien a ti
  lexicon: HALOT
  rationale: La idiomática hebrea expresa bienestar/prosperidad. «Te vaya bien» es el equivalente natural en español y conserva el matiz de resultado sin literalidad extraña.
- source_word: וּלְבָנֶיךָ אַחֲרֶיךָ
  english_pob_choice: and with your children after you
  chosen_spanish: con tus hijos después de ti
  alternatives_spanish:
  - con tus hijos tras de ti
  - con tus descendientes después de ti
  lexicon: HALOT
  rationale: «Hijos» mantiene la referencia generacional. «Después de ti» sigue de cerca el hebreo; se conserva la expresión amplia sin convertirla en «descendientes», que estrecharía/explicitaría más de lo que el texto exige.
- source_word: וּלְמַעַן תַּאֲרִיךְ יָמִים
  english_pob_choice: and so that you may prolong your days
  chosen_spanish: y para que prolongues tus días
  alternatives_spanish:
  - y para que alargues tus días
  - y para que vivas largos años
  lexicon: HALOT
  rationale: «Prolongues tus días» conserva la imagen hebrea de alargar/prolongar días y sigue el registro bíblico sin perder inteligibilidad.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el suelo
  lexicon: HALOT
  rationale: «Sobre la tierra» traduce con fidelidad la preposición עַל y evita la sustitución interpretativa «en», aunque «tierra» funciona de modo natural en español bíblico para אֲדָמָה en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención POB en español para el Tetragrama: «Yahvé», transliteración del nombre divino, en lugar de la sustitución «SEÑOR».'
- source_word: נֹתֵן לְךָ
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te está entregando
  lexicon: HALOT
  rationale: El participio puede expresar acción en curso o inminente. En español, el presente simple «te da» suena natural y conserva la fuerza de donación divina continua/prometida.
- source_word: כָּל הַיָּמִים
  english_pob_choice: for all your days
  chosen_spanish: por todos tus días
  alternatives_spanish:
  - todos tus días
  - para siempre
  lexicon: HALOT
  rationale: «Por todos tus días» mantiene la duración total del período vital y refleja el hebreo sin colapsarlo en un adverbio más abstracto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El verso contiene el Tetragrama directamente. La tradición POB exige preservar el nombre propio de Dios; en español, «Yahvé» es la forma adoptada para mantener esa distinción frente a títulos sustitutivos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido idiomático de יִיטַב לְךָ
  english_pob_reading: so that it may go well with you
  chosen_spanish_reading: para que te vaya bien
  alternative_spanish_readings:
  - para que te sea bien
  - para que prosperes
  rationale: La construcción expresa bienestar general, no solo prosperidad material. «Te vaya bien» conserva la amplitud idiomática y evita restringir indebidamente el sentido.
  doctrine_reference: Deut. 4:40 lexical/idiomatic note
- issue: Valor generacional de בָּנֶיךָ
  english_pob_reading: your children
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus descendientes
  - tus hijos varones
  rationale: El contexto apunta a posteridad generacional amplia. «Hijos» es suficientemente inclusivo en español bíblico sin forzar una paráfrasis más explícita que el hebreo no exige.
  doctrine_reference: Deut. 4:40 lexical note on בנים
translation_notes:
  revision_awareness: El texto inglés auditado presenta acuerdo alto y no requiere cambios de fondo; la principal decisión española ha sido conservar el nombre divino como «Yahvé», el valor idiomático de יִיטַב לְךָ como «te vaya bien», y una formulación natural para el mandato en presente progresivo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama, coherente con el estándar del proyecto.
  - Se distinguen «estatutos» y «mandamientos» para reflejar la dupla hebrea חֻקִּים / מִצְוֹת.
  - «Te vaya bien» conserva el sentido idiomático de bienestar, no solo éxito material.
  - «Sobre la tierra» sigue la preposición עַל de manera más cercana que «en la tierra».
