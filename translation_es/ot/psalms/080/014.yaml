review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: un jabalí procedente del bosque causa daño destructivo a la viña/vid, y animales salvajes del campo se alimentan de ella. Sin embargo, hay un problema de concordancia referencial en español: los sufijos hebreos son femeninos, por lo que el objeto debe referirse como «la/ella», no «lo/él».'
  spanish_quality_summary: 'El español es claro y digno, con buena naturalidad general. «Jabalí del bosque» y «bestias salvajes del campo» son legibles, aunque «animales salvajes» sería un poco más natural. El problema principal es pronominal: «lo destroza» y «de él» chocan con el antecedente femenino implícito del contexto («la vid»/«la viña»).'
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales están bien alineadas con la POB inglesa: כרסם como destrucción animal, חזיר como «jabalí», y רעה como alimentarse/pacer. Conviene mantener el referente femenino implícito del hebreo en español.'
  issues:
  - severity: high
    issue: Pronombres masculinos donde el hebreo usa sufijos femeninos
    rationale: יְכַרְסְמֶנָּה e יִרְעֶנָּה llevan sufijo femenino singular. En el contexto del salmo, el referente es la vid/viña. «Lo destroza» y «de él» no preservan esa referencia y suenan discordantes en español bíblico.
  - severity: low
    issue: La nota [a] usa «la devastan» en plural
    rationale: 'La alternativa debe concordar con el sujeto singular «un jabalí» y con el objeto femenino singular: «la devasta», no «la devastan».'
  - severity: low
    issue: La nota [b] no refleja la alternativa inglesa más pertinente para el verbo final
    rationale: La nota inglesa [b] corresponde a «graze on it», es decir, una alternativa para יִרְעֶנָּה, no para «wild animals of the field». En español conviene trasladar esa alternativa al verbo («pastan en ella» o similar) y no a la frase nominal.
  revised_spanish_text: Un jabalí del bosque la destroza[a], y las bestias salvajes del campo pastan en ella[b].
