    text: O «harina fina». סֹלֶת se refiere a harina finamente molida usada en las ofrendas.
    reason: lexical_alternative
  revision_rationale: Se corrige «incienso» a «franquincienso» para reflejar con precisión לְבֹנָה / frankincense según la evidencia fuente y la auditoría inglesa. También se ajusta la nota alternativa de מִנְחָה para evitar la ambigüedad de «vegetal» y se aligera la puntuación para mayor naturalidad en español.
