    text: 'O: «según las divisiones ancestrales» o «según las divisiones de los padres».'
    reason: lexical_alternative
  - marker: b
    text: El griego difiere notablemente del paralelo hebreo aproximado de 2 Crónicas 35:10, que habla de jefes levíticos que proveen animales para la Pascua; esta traducción sigue el texto griego de 1 Esdras.
    reason: textual_variant
  revision_rationale: 'La revisión mantiene la escena griega y la variante textual documentada, pero mejora tres puntos: 1) ajusta τῷ κυρίῳ a «al Señor» por fidelidad a la evidencia griega inmediata y a la rationale del POB auditado; 2) aclara μεριδαρχίας τῶν πατέρων con «divisiones de las casas paternas», preservando el carácter patriarcal sin opacidad; y 3) pule la naturalidad del español con «sucedieron» y «en buen orden».'
