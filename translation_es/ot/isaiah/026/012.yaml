translation:
  language: es
  text: Yahvé, tú establecerás paz para nosotros[a], porque en efecto todas nuestras obras las has realizado para nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Paz'' (shalom) también puede llevar el sentido de bienestar o plenitud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Yahvé
  - Oh SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre del pacto en la forma española indicada para יְהוָה. El vocativo 'Oh' refleja la llamada directa del hebreo y del inglés POB sin convertirlo en un título genérico.
- source_word: תִּשְׁפֹּת
  english_pob_choice: you will establish
  chosen_spanish: establecerás
  alternatives_spanish:
  - pondrás
  - asentarás
  - fijarás
  lexicon: HALOT
  rationale: '''Establecer'' comunica la idea de asentar o disponer firmemente la paz, con un registro natural en español y sin perder el matiz de acción divina decisiva.'
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - shalom
  lexicon: HALOT
  rationale: '''Paz'' es la equivalencia principal y mantiene el término bíblico común; el alcance de bienestar/entereza queda implícito sin expandir el texto principal.'
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - a nosotros
  - en nuestro favor
  lexicon: HALOT
  rationale: '''Para nosotros'' expresa beneficio de modo claro y natural en español, conservando la dirección favorable del preposición ל.'
- source_word: כִּי גַּם
  english_pob_choice: for indeed
  chosen_spanish: porque, en efecto
  alternatives_spanish:
  - porque también
  - pues en verdad
  - porque incluso
  lexicon: HALOT
  rationale: La combinación introduce fundamento con énfasis; 'porque, en efecto' comunica ambas cosas sin sobrecargar el verso.
- source_word: כָּל מַעֲשֵׂינוּ
  english_pob_choice: all our works
  chosen_spanish: todas nuestras obras
  alternatives_spanish:
  - todas nuestras acciones
  - todo lo que hacemos
  - todas nuestras labores
  lexicon: HALOT
  rationale: '''Obras'' preserva la cercanía léxica con מַעֲשֶׂה y mantiene la amplitud del término sin especificar indebidamente el tipo de acción.'
- source_word: פָּעַלְתָּ
  english_pob_choice: you have accomplished
  chosen_spanish: las has realizado
  alternatives_spanish:
  - las has hecho
  - las has efectuado
  - las has obrado
  lexicon: HALOT
  rationale: '''Realizar'' expresa el acto de llevar a cabo o efectuar algo consumado, y funciona bien con ''obras'' en español. Evita un calco demasiado pesado y conserva la agencia divina activa.'
- source_word: לָּנוּ
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - en nosotros
  - por nosotros
  - a nuestro favor
  lexicon: HALOT
  rationale: La preposición final se conserva como beneficio para el pueblo. 'Para nosotros' deja abierta la tensión interpretativa entre efecto externo y acción interna sin resolverla de antemano.
theological_decisions:
- issue: Tensión interpretativa de 'all our works you have accomplished for us'
  english_pob_reading: The verse attributes the people's accomplished works ultimately to God's agency on their behalf.
  chosen_spanish_reading: El verso atribuye las obras del pueblo, en última instancia, a la acción de Dios en su favor.
  alternative_spanish_readings:
  - Dios ha prosperado las empresas del pueblo.
  - Dios ha hecho todo por el pueblo.
  - Dios ha obrado nuestras obras en nosotros.
  rationale: Se mantiene la tensión entre agencia humana y agencia divina sin forzar el hebreo hacia una formulación doctrinal más cerrada. 'Para nosotros' refleja mejor el valor de ל y preserva la lectura principal, mientras la nota recoge la posibilidad interpretativa alternativa.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el trazado auditado del POB en inglés y no introduce cambios frente al último pase revisado; se conserva la misma decisión de fondo sobre el valor de לָנוּ y la tensión de agencia en 'nuestras obras'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del nombre divino, conforme al criterio del proyecto.
  - '''Obras'' conserva la relación léxica con מַעֲשֶׂה y evita sustituirla por un término más interpretativo.'
  - '''Para nosotros'' se usa de manera consistente para לָנוּ, dejando abierta la nota alternativa ''en nosotros''.'
  - El registro es bíblico y digno, pero en español contemporáneo natural.
