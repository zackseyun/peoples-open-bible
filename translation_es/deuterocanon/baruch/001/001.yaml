translation:
  language: es
  text: Y estas son las palabras del libro que Baruc, hijo de Nerías, hijo de Maaseías, hijo de Sedequías, hijo de Hasadías[a], hijo de Hilcías, escribió en Babilonia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los manuscritos griegos aquí dan el nombre como Asadías; la forma Hasadías refleja la transliteración semítica bíblica estándar adoptada por el proyecto.
