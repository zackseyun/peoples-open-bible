    reason: lexical_alternative
  - marker: b
    text: O ‘en la casa del capitán de la guardia, a la casa de la prisión’.
    reason: previous_rendering
  - marker: c
    text: O ‘en la prisión’, o más formalmente ‘en la casa de detención’.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para mejorar la naturalidad del español sin apartarse del hebreo ni del rastro inglés: ‘casa de la prisión’ preserva mejor el compuesto que ‘casa de la cárcel’; se corrigen y reordenan las notas para reflejar fielmente las alternativas documentadas en inglés, incluyendo la nota necesaria sobre ‘capitán de la guardia’.'
