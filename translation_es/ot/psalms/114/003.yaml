translation:
  language: es
  text: El mar vio y huyó[a][b]; el Jordán retrocedió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'volvió atrás'. La expresión hebrea literalmente significa 'se volvió hacia la parte de atrás / hacia atrás'.
    reason: lexical_alternative
  - marker: b
    text: El verso alude poéticamente al cruce del mar en el éxodo y al detenimiento del Jordán en los días de Josué.
    reason: cross_reference
lexical_decisions:
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: HALOT
  rationale: יַּם/יָם designa aquí 'mar'. En español, 'el mar' es el equivalente natural y fiel. No se especifica 'Mar Rojo' en el hebreo de este verso, aunque la alusión histórica sea clara por el contexto poético.
- source_word: רָאָה
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - contempló
  lexicon: HALOT
  rationale: El verbo básico es 'ver'. 'Vio' conserva la simplicidad y la personificación poética del verso sin añadir matices interpretativos.
- source_word: וַיָּנֹס
  english_pob_choice: and fled
  chosen_spanish: y huyó
  alternatives_spanish:
  - y escapó
  - y se apartó
  lexicon: HALOT
  rationale: נוס significa 'huir'. 'Huyó' reproduce bien la fuerza verbal y el movimiento de repliegue temeroso sugerido por el hebreo.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  - el Jordán
  lexicon: HALOT
  rationale: Es el nombre propio del río. 'El Jordán' es idiomático en español y conserva la forma breve del hebreo con artículo.
- source_word: יִסֹּב
  english_pob_choice: turned back
  chosen_spanish: retrocedió
  alternatives_spanish:
  - volvió atrás
  - se volvió hacia atrás
  lexicon: HALOT
  rationale: La raíz סבב aquí expresa girar o volver hacia atrás. 'Retrocedió' comunica la idea de retirarse hacia atrás en español con naturalidad y sin cargar la frase con explicaciones.
- source_word: לְאָחוֹר
  english_pob_choice: back
  chosen_spanish: —
  alternatives_spanish:
  - atrás
  - hacia atrás
  lexicon: HALOT
  rationale: La expresión adverbial ya queda absorbida por 'retrocedió'. No hace falta duplicarla en la línea principal; en español sonaría redundante.
theological_decisions:
- issue: Alusión histórica-poética sin explicitación
  english_pob_reading: Retain the personified description of the sea and the Jordan without making the implied exodus/conquest events explicit in the main text.
  chosen_spanish_reading: Mantener la personificación del mar y del Jordán sin explicitar en el texto principal el éxodo ni la conquista.
  alternative_spanish_readings:
  - El mar vio a Dios y huyó; el Jordán retrocedió.
  - El mar vio eso y huyó; el Jordán retrocedió.
  rationale: El hebreo deja indeterminado el objeto de 'vio' y funciona poéticamente por personificación. En español, añadir un objeto precisaría indebidamente el verso y debilitaría la retórica del salmo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la última revisión disponible: no se registran cambios aplicados y el control cruzado informó alta concordancia (1.0).'
  spanish_consistency_notes:
  - Se conserva un registro breve y poético, acorde con la estructura paralela del hebreo.
  - '''Jordán'' se mantiene con artículo y sin añadir ''río'' para respetar la concisión del original.'
  - No se explicita el objeto de 'vio' en la línea principal, siguiendo la cautela interpretativa del POB en inglés.
