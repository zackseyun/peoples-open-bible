revisions:
- from: Porque todo primogénito es mío[a]. El día en que herí de muerte a todo primogénito en la tierra de Egipto, consagré para mí todo primogénito en Israel, desde hombre hasta bestia. Míos serán[b]. Yo soy Yahvé.
  to: Porque todo primogénito es mío[a]. El día en que herí de muerte a todo primogénito en la tierra de Egipto, consagré para mí todo primogénito en Israel, desde hombre hasta bestia[b]. Serán míos. Yo soy Yahvé.
  rationale: 'La revisión corrige un problema formal importante: la nota sobre el merismo humano-animal ahora está anclada en la frase que realmente explica. También mejora ligeramente la naturalidad del español con «Serán míos», manteniendo el énfasis posesivo del hebreo, y pule la redacción de la nota a. No se requieren cambios doctrinales ni una relectura de fondo del versículo.'
  reviewer_model: gpt-5.4
