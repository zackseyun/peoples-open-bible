  text: וַ/יְהִ֞י כִּ/שְׁמֹ֤עַ כָּל יִשְׂרָאֵל֙ כִּֽי שָׁ֣ב יָרָבְעָ֔ם וַֽ/יִּשְׁלְח֗וּ וַ/יִּקְרְא֤וּ אֹת/וֹ֙ אֶל הָ֣/עֵדָ֔ה וַ/יַּמְלִ֥יכוּ אֹת֖/וֹ עַל כָּל יִשְׂרָאֵ֑ל לֹ֤א הָיָה֙ אַחֲרֵ֣י בֵית דָּוִ֔ד זוּלָתִ֥י שֵֽׁבֶט יְהוּדָ֖ה לְ/בַדּֽ/וֹ־־־־־־־׃
