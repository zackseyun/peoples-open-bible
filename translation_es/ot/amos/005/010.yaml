translation:
  language: es
  text: Aborrecen al que reprende en la puerta[a], y detestan al que habla con integridad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En la puerta» alude a la puerta de la ciudad, lugar habitual de juicio, deliberación pública y asuntos legales.
    reason: cultural_note
  - marker: b
    text: 'O: «al que habla lo que es intachable» / «al que habla con rectitud».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂנְאוּ
  english_pob_choice: They hate
  chosen_spanish: aborrecen
  alternatives_spanish:
  - odian
  - han odiado
  lexicon: HALOT
  rationale: El perfecto qal plural se usa aquí como descripción profética de una conducta presente y habitual; en español, el presente comunica mejor esa realidad continua. Se eligió 'aborrecen' para intensificar el desprecio moral sin perder el valor de odio activo del hebreo.
- source_word: בַשַּׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - en el tribunal de la ciudad
  lexicon: HALOT
  rationale: '''La puerta'' conserva el hebraísmo y, en el contexto profético, remite al lugar de juicio y deliberación pública. ''Puerta'' es fiel y natural; la aclaración del sentido judicial se deja para nota.'
- source_word: מוֹכִיחַ
  english_pob_choice: the one who reproves
  chosen_spanish: al que reprende
  alternatives_spanish:
  - al reprensor
  - al que corrige
  lexicon: HALOT
  rationale: El participio expresa a la persona que ejerce reprensión/corrección, con matiz forense o disciplinario. 'Reprende' conserva esa fuerza y resulta más natural en español que un sustantivo pesado.
- source_word: וְדֹבֵר
  english_pob_choice: the one who speaks
  chosen_spanish: al que habla
  alternatives_spanish:
  - al que dice
  - al que pronuncia
  lexicon: HALOT
  rationale: Se mantiene el paralelismo participial con 'al que reprende'. 'Habla' es el verbo más general y adecuado para el segundo hemistiquio, sin añadir contenido ajeno al texto.
- source_word: תָּמִים
  english_pob_choice: with integrity
  chosen_spanish: con integridad
  alternatives_spanish:
  - con rectitud
  - de manera intachable
  - con blamelessness
  lexicon: HALOT
  rationale: En este contexto de habla pública y veraz, 'con integridad' comunica bien la idea de integridad moral y sinceridad. 'Rectitud' también sería posible, pero 'integridad' mantiene mejor la asociación con habla íntegra en español contemporáneo.
- source_word: יְתָעֵבוּ
  english_pob_choice: they abhor
  chosen_spanish: detestan
  alternatives_spanish:
  - aborrecen
  - tienen por abominable
  lexicon: HALOT
  rationale: El pi‘el expresa repulsión fuerte. En español, 'detestan' evita repetir 'aborrecen' en ambos miembros y conserva una intensidad elevada; el primer verbo ya comunica el odio, y el segundo refuerza la reacción de rechazo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y la decisión inglesa de mantener el marco jurídico-social de 'the gate', con ajuste natural al español. No se detectaron cambios textuales posteriores en la fuente auditada; se preserva el paralelismo entre reprensión pública y habla íntegra.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes porque el versículo no contiene el tetragrámaton ni κύριος.
  - Se mantuvo 'puerta' en lugar de expandir en el cuerpo para no sobreinterpretar, dejando la función judicial en nota.
  - Se eligió un presente gnómico ('aborrecen', 'detestan') para reflejar el valor descriptivo profético del perfecto hebreo.
