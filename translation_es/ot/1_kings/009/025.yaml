  to: Y Salomón ofreció holocaustos y ofrendas de paz sobre el altar que había edificado para Yahvé tres veces al año, y quemaba incienso con él[a] delante de Yahvé. Así completó la casa[b].
  rationale: Se corrige el tiempo verbal principal a pretérito simple, se restituye el anclaje correcto de la nota léxica sobre וְהַקְטֵיר, se reemplaza una formulación española forzada por una más natural en el texto principal, y se añade la nota necesaria sobre «la casa». También se afina «terminó» a «completó» para reflejar mejor שלם y el registro del POB.
