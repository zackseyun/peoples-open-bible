    text: 'O: «No intercedas por este pueblo para su bienestar».'
    reason: lexical_alternative
  revision_rationale: Se ajusta לְטוֹבָה a una formulación más idiomática en español («por el bien de este pueblo») y se corrige la nota alternativa para que preserve la prohibición completa y refleje mejor la alternativa documentada en inglés («on behalf of ... for their welfare»).
