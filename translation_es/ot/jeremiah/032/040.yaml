    text: O 'pacto perpetuo' o 'pacto perdurable'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'mi temor'; es decir, temor dirigido hacia mí.
    reason: lexical_alternative
  revision_rationale: Se corrige el calco 'de tras ellos' a 'de ellos' para preservar el sentido hebreo con español natural. Se cambia 'mi temor' por 'el temor de mí' para seguir la decisión léxica documentada y evitar ambigüedad, manteniendo una nota que explique el hebreo literal. Se ajusta la nota a para que contenga alternativas reales en español. No se requiere adjudicación adicional porque el sentido fuente y la solución española son suficientemente claros.
