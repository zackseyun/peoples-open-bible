  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Los nombres propios y términos clave están bien. La principal cuestión léxica es בָנִים: el inglés POB documentó una adaptación idiomática a ''children'', y el español debería hacer una adaptación equivalente en vez de mantener ''hijos'' en el texto principal.'
