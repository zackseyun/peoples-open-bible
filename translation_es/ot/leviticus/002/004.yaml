  language: en
  yaml_path: translation/ot/leviticus/002/004.yaml
  text: 'And if you bring near an offering of a grain offering baked in an oven[a], it shall be of fine flour: unleavened cakes mixed with oil, or unleavened wafers anointed with oil.'
  footnotes:
