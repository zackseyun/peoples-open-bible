translation:
  language: es
  text: Todos se han desviado; juntos se han corrompido[a]. No hay quien haga el bien, ni siquiera uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “se han manchado” o “se han vuelto impuros”. El verbo hebreo expresa la idea de volverse corrupto, deteriorado o manchado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Toda la humanidad
  - כולם / todos ellos
  lexicon: HALOT
  rationale: El hebreo con artículo expresa un conjunto total; en este contexto humano, “Todos” conserva la amplitud universal sin introducir una perífrasis más pesada.
- source_word: סָר
  english_pob_choice: have turned aside
  chosen_spanish: se han desviado
  alternatives_spanish:
  - han vuelto atrás
  - se han apartado
  - han ido por otro camino
  lexicon: HALOT
  rationale: El verbo comunica apartarse o desviarse. En español, el plural concordado con el sujeto colectivo suena natural y mantiene la idea de apartamiento sin añadir una metáfora no explicitada.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a una
  - en conjunto
  - al mismo tiempo
  lexicon: HALOT
  rationale: La adverbialidad colectiva se refleja bien con “juntos”, que preserva la acción corporativa y resulta idiomática en español.
- source_word: נֶאֱלָחוּ
  english_pob_choice: have become corrupt
  chosen_spanish: se han corrompido
  alternatives_spanish:
  - se han contaminado
  - se han vuelto impuros
  - se han echado a perder
  lexicon: HALOT
  rationale: El nifal indica un estado resultante de corrupción o deterioro. “Se han corrompido” es fiel y claro; conserva la tensión léxica entre deterioro moral y corrupción adquirida.
- source_word: אֵין
  english_pob_choice: There is none
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No se encuentra
  lexicon: HALOT
  rationale: La partícula de inexistencia se expresa naturalmente con “No hay”, que introduce la negación enfática en español con sencillez y fuerza.
- source_word: עֹשֵׂה טוֹב
  english_pob_choice: who does good
  chosen_spanish: quien haga el bien
  alternatives_spanish:
  - quien hace el bien
  - quien practica el bien
  - quien obre bien
  lexicon: HALOT
  rationale: El participio describe una acción característica. En una cláusula negativa general, el subjuntivo “haga” fluye de manera natural en español y mantiene el valor de cualidad continua; “el bien” preserva el sustantivo טוב sin reducirlo a una mera conducta social.
- source_word: גַּם אֶחָד
  english_pob_choice: not even one
  chosen_spanish: ni siquiera uno
  alternatives_spanish:
  - ni uno solo
  - no uno siquiera
  lexicon: HALOT
  rationale: La combinación intensificadora se vierte con una negación enfática idiomática. “Ni siquiera uno” reproduce bien la fuerza acumulativa de גַּם אֶחָד.
theological_decisions:
- issue: Alcance universal de la acusación sobre la humanidad
  english_pob_reading: Render as a universal indictment without softening or narrowing it.
  chosen_spanish_reading: Mantener una acusación universal sin suavizarla ni restringirla a “muchos” o “la mayoría”.
  alternative_spanish_readings:
  - Algunos se han desviado; juntos se han corrompido
  - La mayoría se ha desviado
  rationale: El hebreo usa marcadores de totalidad y negación enfática (“todos”, “no hay”, “ni siquiera uno”). La traducción debe preservar esa amplitud retórica y teológica sin resolverla hacia una formulación más débil.
  doctrine_reference: Mantener la tensión teológica del texto; primacía del original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el audit trail; esta versión sigue de cerca la lectura inglesa aprobada y ajusta la sintaxis al español natural sin perder el alcance universal ni la fuerza moral del hebreo.
  spanish_consistency_notes:
  - Se mantiene “Dios/Yahvé” fuera de este versículo porque no aparece en el texto fuente.
  - 'Se preserva la negación enfática con doble estructura: “No hay... ni siquiera uno”.'
  - Se usa “el bien” para reflejar טוב de forma sobria y bíblica, sin ampliar a “lo correcto” o “lo bueno” más allá de lo necesario.
  - La nota textual/lexical se ancla en “se han corrompido”, porque el hebreo permite alternativas de deterioro que el audit trail documenta.
