id: 1TH.2.2
reference: 1 Thessalonians 2:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ προπαθόντες καὶ ὑβρισθέντες καθὼς οἴδατε ἐν Φιλίπποις ἐπαρρησιασάμεθα ἐν τῷ θεῷ ἡμῶν λαλῆσαι πρὸς ὑμᾶς τὸ εὐαγγέλιον τοῦ θεοῦ ἐν πολλῷ ἀγῶνι.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/002.yaml
  text: But after we had already suffered and been shamefully mistreated[a], as you know, in Philippi[c][b], we were bold in our God to speak the gospel of God to you amid much conflict.
  footnotes:
  - marker: a
    text: Or 'been insulted,' 'been outrageously treated,' or 'been abused.' The Greek verb includes the idea of being treated with insolence or public dishonor.
    reason: lexical_alternative
  - marker: b
    text: Or 'we spoke boldly in our God.' The Greek verb can itself include the act of bold speaking; the translation separates 'were bold' from 'to speak' to reflect the following infinitive.
    reason: lexical_alternative
  - marker: c
    text: Or 'in much struggle' or 'with much opposition.'
    reason: lexical_alternative
translation:
  language: ko
  text: 오히려 여러분이 아시는 대로 빌립보에서 미리 고난을 받고 모욕[a]을 당하였음에도 불구하고, 우리는 우리 하나님 안에서 담대히[b] 여러분에게 하나님의 복음을 큰 싸움[c] 가운데서 전하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「수치스러운 학대를 당하였음」, 「모욕을 당하였음」. 헬라어 ὑβρίζω는 공적 모욕·무례한 대우의 의미를 담는다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「우리 하나님 안에서 담대히 말하였습니다」. 헬라어 παρρησιάζομαι는 그 자체로 「담대히 말하다」를 뜻하기도 한다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「큰 분투」, 「많은 반대」.
    reason: lexical_alternative
lexical_decisions:
- source_word: προπαθόντες καὶ ὑβρισθέντες
  english_pob_choice: had already suffered and been shamefully mistreated
  chosen_korean: 미리 고난을 받고 모욕을 당하였음에도
  alternatives_korean:
  - 먼저 고난당하고 수치스러운 학대를 받았음에도
  - 앞서 고난과 모욕을 당하였음에도
  lexicon: BDAG
  rationale: προ- 접두사의 「먼저·미리」 의미와 ὑβρίζω의 공적 모욕성을 함께 담는다. 「모욕」이 「학대」보다 본문의 명예 박탈 의미를 더 정확히 담는다.
- source_word: ἐπαρρησιασάμεθα ἐν τῷ θεῷ
  english_pob_choice: were bold in our God
  chosen_korean: 우리 하나님 안에서 담대히 ... 전하였습니다
  alternatives_korean:
  - 하나님 안에서 담대함을 얻었습니다
  - 하나님 안에서 담대히 말하였습니다
  lexicon: BDAG
  rationale: παρρησιάζομαι의 담대한 발언 의미와 이어지는 부정사 λαλῆσαι를 함께 묶어 한국어 합쇼체 종결로 자연스럽게 풀어낸다.
- source_word: ἐν πολλῷ ἀγῶνι
  english_pob_choice: amid much conflict
  chosen_korean: 큰 싸움 가운데서
  alternatives_korean:
  - 많은 분투 가운데서
  - 많은 반대 가운데서
  lexicon: BDAG
  rationale: ἀγών은 경기·분투·싸움의 의미를 함께 담는다. 「큰 싸움」이 사역적 압박과 외적 반대를 자연스럽게 담는다.
