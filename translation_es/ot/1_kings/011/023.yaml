translation:
  language: es
  text: Y Dios levantó para él un adversario[a], Rezón hijo de Eliada, que había huido de Hadadézer, rey de Zobá, su amo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo satan; aquí es un sustantivo común con el sentido de «adversario» u «opositor», no el nombre propio Satanás.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  english_pob_choice: raised up
  chosen_spanish: levantó
  alternatives_spanish:
  - hizo surgir
  - levantó en oposición
  lexicon: HALOT
  rationale: El hifil de קום expresa causar que alguien se levante o aparezca para cumplir una función; en español, «levantó» conserva la iniciativa divina y resulta natural. «Hizo surgir» es más explicativo, pero menos idiomático en esta construcción narrativa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En este contexto narrativo se refiere al Dios de Israel; «Dios» es la forma natural y fiel en español.
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - contra él
  lexicon: HALOT
  rationale: La preposición ל con sufijo puede mantenerse de modo transparente como «para él»; la fuerza adversarial ya queda expresada por «adversario». «Contra él» explicita la oposición, pero va más allá de la forma más directa del hebreo.
- source_word: שָׂטָן
  english_pob_choice: an adversary
  chosen_spanish: un adversario[a]
  alternatives_spanish:
  - un opositor
  - un enemigo
  lexicon: HALOT
  rationale: Aquí שָׂטָן funciona como sustantivo común, no como nombre propio. «Adversario» preserva la tensión lexical y evita importar el nombre «Satanás» al texto.
- source_word: רְזוֹן
  english_pob_choice: Rezon
  chosen_spanish: Rezón
  alternatives_spanish:
  - Rezón
  lexicon: Transliteración
  rationale: Nombre propio transliterado de forma estable al español bíblico.
- source_word: בֶּן אֶלְיָדָע
  english_pob_choice: son of Eliada
  chosen_spanish: hijo de Eliada
  alternatives_spanish:
  - hijo de Elíada
  lexicon: Transliteración
  rationale: La construcción patronímica se rinde de forma directa; se conserva el nombre propio con acentuación española para lectura pública.
- source_word: אֲשֶׁר בָּרַח
  english_pob_choice: who had fled
  chosen_spanish: que había huido
  alternatives_spanish:
  - que huyó
  lexicon: HALOT
  rationale: El pluscuamperfecto en español refleja mejor la anterioridad narrativa de la huida respecto al acto de Dios de levantarlo.
- source_word: מֵאֵת הֲדַדְעֶזֶר
  english_pob_choice: from Hadadezer
  chosen_spanish: de Hadad-ezer
  alternatives_spanish:
  - desde Hadad-ezer
  lexicon: HALOT
  rationale: «De» es suficiente para marcar separación; se mantiene la transliteración del nombre con guion para claridad de lectura.
- source_word: מֶלֶךְ צוֹבָה
  english_pob_choice: king of Zobah
  chosen_spanish: rey de Sobá
  alternatives_spanish:
  - rey de Zobá
  lexicon: HALOT
  rationale: Se translitera el topónimo con la forma española más legible («Sobá»), manteniendo el orden constructo natural en español.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su dueño
  lexicon: HALOT
  rationale: En este contexto político-servil, «amo» comunica subordinación personal con más precisión que «señor», evitando además la posible ambigüedad reverencial del español religioso.
theological_decisions:
- issue: Sentido de שָׂטָן en el versículo
  english_pob_reading: common noun 'adversary,' not the proper name Satan
  chosen_spanish_reading: «adversario», no «Satanás»
  alternative_spanish_readings:
  - «opositor»
  - «enemigo»
  rationale: La escena describe un antagonista humano en el plano político-histórico. Traducirlo como nombre propio introduciría una identificación teológica no sustentada por el contexto inmediato.
  doctrine_reference: Primacía del sentido del texto fuente sobre la tradición de traducción; evitar importar una lectura demonológica donde el hebreo presenta un sustantivo común.
- issue: Valor de ל/וֹ junto con el verbo 'levantar'
  english_pob_reading: '''for him'' with adversarial force carried by ''adversary'''
  chosen_spanish_reading: «para él» con la oposición expresada por «adversario»
  alternative_spanish_readings:
  - «contra él»
  rationale: Mantener «para él» preserva la transparencia formal del hebreo; la oposición queda explícita por el sustantivo que sigue. «Contra él» sería interpretativo y desplazaría el matiz de la construcción original.
  doctrine_reference: Equilibrio entre fidelidad formal y claridad semántica sin agregar información no presente en la frase.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó el dos puntos por una coma para mantener la aposición con mayor fluidez. En español se adopta también una construcción continua con coma, sin añadir segmentación fuerte entre «adversario» y la identificación de Rezón.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en contexto narrativo israelita.
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene la transliteración de nombres propios en forma española estable y legible.
  - «Amo» se usa en sentido de subordinación personal, no como título divino.
