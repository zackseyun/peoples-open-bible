translation:
  language: es
  text: 'Y cuando lo hubieron levantado, cayó a los pies de Judit y se postró ante ella, y dijo: «Bendita eres tú en toda morada de Judá[a] y entre toda nación[b]; los que oigan tu nombre quedarán turbados».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tienda». El griego σκηνώματι puede significar «tienda» o, más ampliamente, «morada, habitación».
    reason: lexical_alternative
  - marker: b
    text: O «serán turbados» / «serán sacudidos». El verbo puede expresar también perturbación o conmoción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέλαβον
  english_pob_choice: had taken him up
  chosen_spanish: lo hubieron levantado
  alternatives_spanish:
  - lo hubieran recibido
  - lo hubieran alzado
  - lo hubieran tomado
  lexicon: LSJ
  rationale: Aquí el verbo expresa la acción concreta de levantarlo o ayudarlo a incorporarse; «levantar» conserva el movimiento físico sin añadir la idea de recibirlo como invitado.
- source_word: προσέπεσεν τοῖς ποσὶν
  english_pob_choice: fell at Judith’s feet
  chosen_spanish: cayó a los pies de Judit
  alternatives_spanish:
  - se arrojó a los pies de Judit
  - cayó ante los pies de Judit
  lexicon: LSJ
  rationale: La locución describe una postración o súplica. «Cayó a los pies» es natural en español y mantiene la imagen corporal del texto.
- source_word: προσεκύνησεν τῷ προσώπῳ αὐτῆς
  english_pob_choice: bowed before her
  chosen_spanish: se postró ante su rostro
  alternatives_spanish:
  - se inclinó ante ella
  - le rindió homenaje
  - adoró delante de ella
  lexicon: LSJ
  rationale: En este contexto humano, προσκυνέω no debe sonar como adoración divina. «Se postró» conserva la reverencia física; «ante su rostro» refleja de modo directo la construcción griega, sin forzar una expansión interpretativa.
- source_word: Εὐλογημένη σὺ
  english_pob_choice: Blessed are you
  chosen_spanish: Bendita eres tú
  alternatives_spanish:
  - Bendita eres
  - Tú eres bendita
  lexicon: LSJ
  rationale: La fórmula de bendición queda en español con el orden natural y solemne «Bendita eres tú», que conserva el valor vocativo y laudatorio del griego.
- source_word: ἐν παντὶ σκηνώματι Ἰούδα
  english_pob_choice: in every dwelling of Judah
  chosen_spanish: en toda morada de Judá
  alternatives_spanish:
  - en toda tienda de Judá
  - en todo tabernáculo de Judá
  - en toda habitación de Judá
  lexicon: LSJ
  rationale: σκηνώματι puede significar tienda, morada o habitación. «Morada» comunica una residencia o lugar habitado sin reducirlo de manera obligatoria a una tienda, y funciona bien en español bíblico contemporáneo.
- source_word: ἐν παντὶ ἔθνει
  english_pob_choice: among every nation
  chosen_spanish: entre toda nación
  alternatives_spanish:
  - en toda nación
  - entre todas las naciones
  lexicon: LSJ
  rationale: La preposición con dativo puede expresarse de manera idiomática con «entre». Esta opción conserva la extensión de la fama de Judit más allá de Judá sin exagerar el alcance.
- source_word: ταραχθήσονται
  english_pob_choice: will be thrown into confusion
  chosen_spanish: quedarán turbados
  alternatives_spanish:
  - serán trastornados
  - se turbarán
  - quedarán confundidos
  lexicon: LSJ
  rationale: El futuro pasivo de ταράσσω expresa agitación o perturbación. «Quedarán turbados» recoge ese efecto de conmoción sin limitarlo solo a miedo o solo a confusión intelectual.
theological_decisions:
- issue: Sentido de προσκυνέω aplicado a Judit, una persona humana
  english_pob_reading: Rendered as an act of obeisance ('bowed ... before her') rather than divine worship
  chosen_spanish_reading: Se traduce como postración o reverencia física, no como adoración religiosa
  alternative_spanish_readings:
  - la adoró
  - le rindió culto
  - le hizo reverencia
  rationale: El objeto inmediato es Judit. Para no importar una categoría de culto divino que el contexto no exige, se conserva el gesto corporal de sumisión/reverencia, manteniendo la tensión del texto sin resolverla teológicamente.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica y traducir según el contexto inmediato del texto.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente al evitar expansiones interpretativas innecesarias en el gesto de προσκυνέω. Se mantiene una equivalencia cercana y legible, sin suavizar la fuerza corporal de la escena ni el alcance de la bendición y la conmoción anunciada.
  spanish_consistency_notes:
  - Se usa «Judit» como forma española estable del nombre.
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Morada» evita imponer la imagen de tienda, pero la nota conserva la alternativa textual documentada.
  - «Turbados» preserva la perturbación pasiva del griego sin cerrar del todo el matiz de confusión o sacudida.
