    issue: Marcador de nota al pie colocado en la frase equivocada
    rationale: La nota explica una lectura alternativa de תַעֲנֵנִי («tú me responderás»), pero el marcador [a] aparece en «te invoco[a]». Debe anclarse en «me respondes[a]» para cumplir la disciplina de notas y evitar confusión.
  - severity: low
    issue: Duplicación y expansión innecesaria en alternativas léxicas internas
    rationale: En las decisiones léxicas aparece «mi aflicción» repetido y «mi aflicción y dolor» añade contenido no presente en el hebreo. Esto no afecta el texto principal, pero muestra menor precisión editorial.
  revised_spanish_text: En el día de mi angustia te invoco, pues tú me respondes[a].
