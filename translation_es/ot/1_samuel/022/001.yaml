translation:
  language: es
  text: Así que David se fue de allí y escapó a la cueva de Adulam. Cuando sus hermanos y toda la familia de su padre oyeron esto[a], bajaron allá adonde él estaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «huyó a la cueva de Adulam». El verbo hebreo puede denotar escape o huida; «escapó» se eligió para resaltar el resultado de haber salido del peligro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - partió
  lexicon: HALOT
  rationale: El verbo básico de movimiento en la narración admite en español un giro natural y idiomático como «se fue», que conserva el desplazamiento sin forzar un calco.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - de ahí
  lexicon: HALOT
  rationale: La deixis espacial se expresa de forma directa con «de allí», equivalente natural de «from there».
- source_word: וַיִּמָּלֵט
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - huyó
  - se libró
  lexicon: HALOT
  rationale: El nifal de מלט puede significar escapar o librarse. «Escapó» comunica bien el resultado de salir con vida del peligro, siguiendo la decisión inglesa de resaltar la liberación efectiva.
- source_word: מְעָרַת עֲדֻלָּם
  english_pob_choice: the cave of Adullam
  chosen_spanish: la cueva de Adulam
  alternatives_spanish:
  - la cueva en Adulam
  - una cueva de Adulam
  lexicon: HALOT
  rationale: La construcción se mantiene como un nombre de lugar reconocible en español; «la cueva de Adulam» es la forma más clara y sobria para el topónimo.
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - se enteraron
  lexicon: HALOT
  rationale: שמע en narración básica se traduce naturalmente con «oyeron». Aquí no se añade explícitamente la inferencia de información más allá de la escucha, aunque el contexto la implique.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus hermanos de sangre
  lexicon: HALOT
  rationale: El plural masculino se refleja con «sus hermanos», que en español comunica de manera natural el vínculo fraternal masculino sin redundancia.
- source_word: וְכָל בֵּית אָבִיו
  english_pob_choice: all his father's household
  chosen_spanish: toda la casa de su padre
  alternatives_spanish:
  - toda la familia de su padre
  - todo el linaje de su padre
  lexicon: HALOT
  rationale: La expresión idiomática hebrea בֵּית אָבִיו conserva mejor su fuerza social y familiar con «casa de su padre»; «casa» aquí mantiene el valor de clan/hogar extendido, como en el hebreo.
- source_word: וַיֵּרְדוּ
  english_pob_choice: they went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron hacia abajo
  lexicon: HALOT
  rationale: ירד conserva el sentido literal de bajar/descender. «Descendieron» preserva la dirección topográfica y mantiene el registro digno del texto.
- source_word: אֵלָיו שָׁמָּה
  english_pob_choice: there to him
  chosen_spanish: allí hacia él
  alternatives_spanish:
  - allí con él
  - allí donde él estaba
  lexicon: HALOT
  rationale: La combinación de dirección y localización se refleja con «allí hacia él», que conserva el movimiento hacia David y el adverbio locativo sin volver torpe la sintaxis española.
translation_notes:
  revision_awareness: El texto inglés auditado presenta una única nota léxica sobre וַיִּמָּלֵט ('escaped' frente a 'fled'); en español se ha seguido la misma línea semántica con «escapó», sin añadir nota porque la opción elegida ya es transparente y natural en este versículo.
  spanish_consistency_notes:
  - Se mantuvo «Adulam» como forma hispana del topónimo, coherente con el uso bíblico habitual y con el nombre de lugar en la fuente.
  - 'Se preservó el contraste narrativo de movimiento con dos verbos diferentes: «se fue» y «escapó», para no nivelar el hebreo a una sola idea general de desplazamiento.'
  - «Casa de su padre» se dejó sin explicar en el cuerpo para conservar la imagen idiomática hebrea de household/clan; el valor colectivo queda implícito en el contexto.
  - No se introdujo ningún término doctrinal que altere el relato; el versículo es narrativo y no exige decisiones teológicas explícitas.
