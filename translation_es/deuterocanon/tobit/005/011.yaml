translation:
  language: es
  text: 'Y Tobit le dijo: «Hermano, ¿de qué tribu y de qué patria eres tú? Dímelo.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀδελφέ
  english_pob_choice: Brother
  chosen_spanish: Hermano
  alternatives_spanish:
  - Amigo
  - hermano
  lexicon: BDAG
  rationale: El vocativo Ἀδελφέ conserva el parentesco literal y también un tono cortés hacia un desconocido. «Hermano» reproduce esa cercanía de manera natural en español y sigue de cerca la decisión inglesa de conservar el término literal.
- source_word: φυλῆς
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - clan
  - linaje
  lexicon: LEH
  rationale: φυλή denota una división tribal o de linaje. «Tribu» es la equivalencia más directa y comprensible en español bíblico.
- source_word: πατρίδος
  english_pob_choice: homeland
  chosen_spanish: patria
  alternatives_spanish:
  - tierra natal
  - país
  - lugar de origen
  lexicon: LEH
  rationale: πατρίς se refiere al lugar natal o región de origen. «Patria» comunica ese origen territorial en español sin añadir una idea nacional moderna demasiado fuerte; se prefiere sobre «tierra natal» por concisión y tono bíblico.
- source_word: ὑπόδειξόν
  english_pob_choice: Tell me
  chosen_spanish: Dímelo
  alternatives_spanish:
  - Muéstramelo
  - Indícame
  - Hazme saber
  lexicon: BDAG
  rationale: El imperativo aoristo de ὑποδείκνυμι puede significar «mostrar, indicar, dar a conocer». En este contexto pide identificación verbal, no una acción visual; por eso «Dímelo» refleja bien el sentido que el propio registro inglés también terminó privilegiando tras su revisión.
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El dativo pronominal se mantiene naturalmente como complemento indirecto en español.
translation_notes:
  revision_awareness: El inglés POB pasó de «Show me» a «Tell me» por ser más natural y preciso en contexto, aunque el griego literalmente puede significar «mostrar/indicar». El español sigue esa misma resolución contextual con «Dímelo».
  spanish_consistency_notes:
  - Se mantiene el vocativo directo con comillas españolas y tratamiento de segunda persona singular.
  - «Patria» se usa en sentido de lugar de origen, no con carga política moderna.
  - No se añadió nota al pie porque «Dímelo» ya comunica el valor contextual del verbo griego sin perder la fuerza de identificación.
