  yaml_path: translation/ot/2_samuel/003/018.yaml
  text: Now then[a], do it, for Yahweh has spoken concerning David, saying, ‘By the hand of my servant David I will save my people Israel from the hand of the Philistines and from the hand of all their enemies.’
