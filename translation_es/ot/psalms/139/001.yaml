translation:
  language: es
  text: Para el director del coro[a]. De David[b]. Salmo. Yahvé, me has escudriñado y me has conocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Al director del coro»; la preposición hebrea puede expresar dirección o dedicación en los encabezados de los salmos.
    reason: lexical_alternative
  - marker: b
    text: O «Por David»; el encabezado «De David» conserva la ambigüedad hebrea sobre autoría, dedicación o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro del coro
  - Al director del coro
  lexicon: HALOT
  rationale: La expresión de encabezado indica la función musical/litúrgica del responsable. En español, «director del coro» comunica de manera clara y digna esa función sin perder el sentido de dirección musical. «Para» conserva la fuerza de la preposición ל en el superscrito, con posibilidad direccional o de dedicación.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  - A David
  lexicon: HALOT
  rationale: La preposición ל en los encabezados de salmos mantiene ambigüedad sobre autoría, dedicación o asociación. «De David» preserva esa ambigüedad mejor que una forma más interpretativa como «por David».
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  lexicon: HALOT
  rationale: El sustantivo designa el género poético-musical del encabezado. En español, «Salmo» es la forma breve y reconocible en un superscrito; el artículo no es necesario en este contexto titular.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en español como «Yahvé», conforme a la decisión del proyecto para יְהוָה. No se sustituye por un título como «SEÑOR», porque eso ocultaría el nombre personal del pacto.
- source_word: חֲקַרְתַּנִי
  english_pob_choice: you have searched me
  chosen_spanish: me has examinado
  alternatives_spanish:
  - me has buscado
  - me has investigado
  - me has sondeado
  lexicon: HALOT
  rationale: El verbo expresa búsqueda/examen minucioso. «Examinar» conserva bien el valor de indagación profunda en español y suena natural en el tono solemne del salmo. «Buscar» sería demasiado general; «sondear» puede ser correcto pero algo más figurado.
- source_word: וַתֵּדָע
  english_pob_choice: and known me
  chosen_spanish: y me has conocido
  alternatives_spanish:
  - y me conoces
  - y conociste
  - y llegaste a conocerme
  lexicon: HALOT
  rationale: El verbo ידע comunica conocimiento pleno. «Me has conocido» mantiene la secuencia verbal completa en español y refleja el resultado del examen divino. «Me conoces» sería posible, pero suaviza el matiz perfectivo del hebreo poético inicial.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. La edición española debe preservar el nombre propio divino con una forma reverente y reconocible para el lector hispanohablante. «Yahvé» sigue la norma del proyecto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con la evaluación de alta concordancia: no se identificaron revisiones necesarias respecto del análisis inglés auditado. La redacción española sigue de cerca la estructura del superscrito hebreo, preservando la ambigüedad de לְדָוִד y la referencia directa al nombre divino.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se usa estilo de encabezado breve y publicable, adecuado para un superscrito de salmo.
  - Se evita «SEÑOR» como sustituto del nombre divino para no perder la distinción lexical del texto fuente.
  - El tiempo verbal compuesto «me has examinado y me has conocido» transmite el perfecto hebreo de manera natural en español.
  - Los marcadores de nota se colocan solo donde hay una alternativa realmente significativa en el texto.
