translation:
  language: es
  text: Así haga Yahvé a Jonatán, y aun añada más, si mi padre pretende hacerte mal, y yo no te lo revelo[a][b] y te dejo ir, para que vayas en paz. Y que Yahvé esté contigo, como ha estado con mi padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «descubrir tu oído», un modismo que significa «informarte» o «revelártelo».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa aquí una construcción juratoria que, en contexto, implica la cláusula «y yo no te lo revelo y te dejo ir»; por eso la traducción expresa de forma explícita la omisión que atraería la maldición del juramento.
    reason: theological_note
lexical_decisions:
- source_word: כֹּה יַעֲשֶׂה יְהוָה לִיהוֹנָתָן וְכֹה יֹסִיף
  english_pob_choice: May Yahweh do so to Jonathan, and more also
  chosen_spanish: Yahvé haga así a Jonatán, y aun añada más
  alternatives_spanish:
  - Así haga Yahvé a Jonatán, y así añada
  - Que Yahvé haga esto a Jonatán, y aun más
  lexicon: HALOT
  rationale: Es una fórmula juratoria/imprecatoria fija. En español, «haga así ... y aun añada más» conserva la fuerza solemne sin sonar calcado del inglés, y mantiene el sujeto explícito «Yahvé» para reflejar el nombre divino del hebreo.
- source_word: יֵיטִב אֶל אָבִי אֶת הָרָעָה עָלֶיךָ
  english_pob_choice: if my father intends evil against you
  chosen_spanish: si mi padre quiere hacerte mal
  alternatives_spanish:
  - si a mi padre le parece bien hacerte daño
  - si mi padre está dispuesto a traerte mal
  lexicon: HALOT
  rationale: La construcción hebrea es elíptica e idiomática. «Quiere hacerte mal» comunica de manera natural la intención de daño sin perder la orientación volitiva del hebreo.
- source_word: וְגָלִיתִי אֶת אָזְנֶךָ
  english_pob_choice: and I do not disclose it to you
  chosen_spanish: y yo no te lo comunico
  alternatives_spanish:
  - y no te descubro el oído
  - y no te lo revelo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «descubrir tu oído», un modismo que significa informar. En español, «te lo comunico» expresa con claridad el valor idiomático y evita una calca opaca.
- source_word: וְשִׁלַּחְתִּיךָ
  english_pob_choice: and send you away
  chosen_spanish: y te envío fuera
  alternatives_spanish:
  - y te despido
  - y te dejo ir
  lexicon: HALOT
  rationale: El verbo tiene un matiz causativo de despachar/mandar fuera. «Te envío fuera» preserva ese movimiento de salida provocado por Jonatán.
- source_word: וְהָלַכְתָּ לְשָׁלוֹם
  english_pob_choice: so that you may go in peace
  chosen_spanish: para que vayas en paz
  alternatives_spanish:
  - y vayas en paz
  - para que te vayas en paz
  lexicon: HALOT
  rationale: La frase es una expresión hebrea estable. «Para que vayas en paz» mantiene el valor de propósito y reproduce el tono idiomático con naturalidad.
- source_word: וִיהִי יְהוָה עִמָּךְ
  english_pob_choice: And may Yahweh be with you
  chosen_spanish: Y que Yahvé esté contigo
  alternatives_spanish:
  - Y esté Yahvé contigo
  - Que Yahvé esté contigo
  lexicon: HALOT
  rationale: El yusivo se expresa bien con «Y que...». Se conserva el nombre divino como «Yahvé» según la norma del proyecto.
- source_word: כַּאֲשֶׁר הָיָה עִם אָבִי
  english_pob_choice: as he has been with my father
  chosen_spanish: como ha estado con mi padre
  alternatives_spanish:
  - como estuvo con mi padre
  - tal como ha estado con mi padre
  lexicon: HALOT
  rationale: El perfecto hebreo puede referirse a una realidad pasada con vigencia actual. «Ha estado» mantiene esa continuidad mejor que un pasado simple.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión del proyecto de traducir el Tetragrámaton por «Yahvé» para conservar el nombre personal divino y no ocultarlo tras un título.
theological_decisions:
- issue: Fórmula de juramento con destinatario en tercera persona
  english_pob_reading: May Yahweh do so to Jonathan, and more also
  chosen_spanish_reading: Yahvé haga así a Jonatán, y aun añada más
  alternative_spanish_readings:
  - Así haga Yahvé a Jonatán, y así añada más
  - Que Yahvé haga así a Jonatán, y aun añada más
  rationale: El hebreo usa a Jonatán como destinatario explícito del juramento. Se mantiene esa forma en tercera persona para no suavizar la fuerza del juramento ni convertirlo en una mera exhortación.
  doctrine_reference: Translation philosophy §1, §3
- issue: Negación implícita en la cláusula del juramento
  english_pob_reading: and I do not disclose it to you and send you away
  chosen_spanish_reading: y yo no te lo comunico y te envío fuera
  alternative_spanish_readings:
  - y yo no te lo comunico ni te envío fuera
  - y yo no dejo de comunicártelo y enviarte fuera
  rationale: 'El hebreo comprime la idea de falla/omisión dentro del juramento. En español se hace explícita la negación para que la frase sea inteligible y conserve el sentido: si Jonatán no cumple con avisar y liberar a David, caiga la maldición.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Nombre divino en la última cláusula
  english_pob_reading: And may Yahweh be with you, as he has been with my father
  chosen_spanish_reading: Y que Yahvé esté contigo, como ha estado con mi padre
  alternative_spanish_readings:
  - Y que el SEÑOR esté contigo, como ha estado con mi padre
  rationale: Se conserva la misma decisión terminológica para יְהוָה en todo el versículo, evitando oscilar entre «Yahvé» y un sustituto reverencial. Esto preserva la coherencia teológica y textual.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: La redacción española sigue el texto hebreo y el seguimiento auditado en inglés. Se reflejan la fórmula de juramento, la negación implícita que el inglés hizo explícita, el modismo «descubrir el oído» y la decisión del proyecto de traducir יְהוָה por «Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el versículo.
  - «Jonatán» conserva la grafía habitual en español bíblico.
  - Se usa «paz» como equivalente estable de לְשָׁלוֹם.
  - La cláusula «no te lo comunico» expresa el valor idiomático sin introducir comentario exegético en el cuerpo del texto.
