translation:
  language: es
  text: Pero lavará con agua sus entrañas y sus patas, y el sacerdote hará subir todo ello en humo sobre el altar, holocausto, ofrenda de alimento[a], aroma agradable[b] para Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una ofrenda hecha por fuego» o «una ofrenda por fuego» para «ofrenda de alimento».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un aroma agradable»; es una fórmula sacrificial fija que indica que la ofrenda resulta aceptable para Yahvé.'
    reason: theological_note
  - marker: c
    text: O «a Yahvé». El texto principal sigue el estándar del proyecto con «para Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וְקִרְבּוֹ
  english_pob_choice: its entrails
  chosen_spanish: sus entrañas
  alternatives_spanish:
  - sus partes internas
  - sus vísceras
  lexicon: HALOT
  rationale: En contexto sacrificial, קֶרֶב se refiere a los órganos internos del animal. «Entrañas» comunica esa realidad concreta en español y mantiene un registro natural y bíblico sin volverlo técnico de más.
- source_word: וּכְרָעָיו
  english_pob_choice: its legs
  chosen_spanish: sus piernas
  alternatives_spanish:
  - sus patas
  - sus patas traseras
  lexicon: HALOT
  rationale: El término apunta a las extremidades inferiores del animal. «Piernas» es comprensible y bastante neutro en español; evita la posible ambigüedad de «patas», que puede sonar menos digno en un contexto cultual.
- source_word: יִרְחַץ בַּמָּיִם
  english_pob_choice: he shall wash ... with water
  chosen_spanish: lavará con agua
  alternatives_spanish:
  - lavará en agua
  - las lavará con agua
  lexicon: HALOT
  rationale: El verbo expresa lavado ritual; en español, «lavar con agua» conserva la acción sin forzar un calco sintáctico. Se mantiene el sujeto implícito del sacerdote de la cláusula anterior y posterior.
- source_word: וְהִקְטִיר
  english_pob_choice: shall turn ... into smoke
  chosen_spanish: hará subir todo ello en humo
  alternatives_spanish:
  - quemará todo ello
  - ofrecerá todo ello en humo
  lexicon: HALOT
  rationale: En lenguaje sacrificial, הִקְטִיר no es solo «quemar», sino hacer ascender la ofrenda en humo sobre el altar. «Hará subir ... en humo» preserva ese matiz cultual mejor que un simple «quemará».
- source_word: אֶת הַכֹּל
  english_pob_choice: all of it
  chosen_spanish: todo ello
  alternatives_spanish:
  - todo
  - la totalidad
  lexicon: HALOT
  rationale: La frase enfatiza totalidad. «Todo ello» es idiomático en español y conserva que la ofrenda se presenta íntegramente, no solo una parte.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: La preposición indica colocación ritual en la superficie del altar. «Sobre el altar» es natural y refleja mejor la acción que «en el altar».
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: como holocausto
  alternatives_spanish:
  - como ofrenda totalmente quemada
  - como ofrenda ascendente
  lexicon: HALOT
  rationale: Aunque el término literal tiene relación con «subir», el equivalente establecido y reconocido en español bíblico es «holocausto». Se usa como denominación cultual sin perder el matiz de ofrenda totalmente consumida.
- source_word: אִשֵּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda hecha por fuego
  lexicon: HALOT
  rationale: La POB inglesa documenta la opción «offering by fire / fire offering» para este término. En español, «ofrenda encendida» conserva el componente de fuego sin sugerir que el fuego sea el contenido de la ofrenda; evita además una expresión poco natural como «ofrenda de comida».
- source_word: רֵיחַ נִיחוֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: de aroma agradable
  alternatives_spanish:
  - de grato aroma
  - de aroma placentero
  lexicon: HALOT
  rationale: La fórmula cultual expresa aceptación agradable para Dios, no una descripción literal de olfato divino. «Aroma agradable» conserva la metáfora con claridad y sobriedad en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Señor
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: «Yahvé». Se usa «para» en lugar de «a» porque la expresión ritual de aceptación y destino del sacrificio suena más natural en español como pertenencia/ofrecimiento a Yahvé.'
theological_decisions:
- issue: Nombre divino יהוה en la fórmula sacrificial
  english_pob_reading: to Yahweh
  chosen_spanish_reading: para Yahvé
  alternative_spanish_readings:
  - a Yahvé
  - para el Señor
  rationale: El hebreo lleva explícitamente el Tetragrámaton. Se mantiene «Yahvé» conforme al estándar del proyecto, sin máscara reverencial. La preposición «para» comunica bien la orientación del sacrificio hacia Dios y evita sonar demasiado mecánica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sentido fijo de רֵיחַ נִיחוֹחַ
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: de aroma agradable
  alternative_spanish_readings:
  - de grato aroma
  - de aroma placentero
  rationale: La expresión es una fórmula sacrificial estable que indica aceptación divina. Se conserva como metáfora y no se amplía a una explicación interpretativa dentro del texto principal, para no perder la tensión cultual del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: Valor sacrificial de הִקְטִיר
  english_pob_reading: shall turn ... into smoke
  chosen_spanish_reading: hará subir todo ello en humo
  alternative_spanish_readings:
  - quemará todo ello
  - lo ofrecerá en humo
  rationale: La idea no es simplemente combustión, sino la elevación ritual de la ofrenda en humo sobre el altar. «Hará subir en humo» mantiene mejor el carácter técnico-sacrificial del verbo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se ajustó la puntuación en inglés para reflejar la aposición del original («a burnt offering, a food offering, a pleasing aroma»). En español se conserva la misma secuencia appositiva con comas implícitas en el flujo natural de la frase y sin alterar el sentido cultual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, coherente con el estándar del proyecto.
  - Se evita «SEÑOR» por ser una convención de ocultamiento no adoptada aquí.
  - «Holocausto» se conserva como término cultual establecido en español bíblico para עֹלָה.
  - «Ofrenda encendida» traduce el matiz de אִשֵּׁה sin forzar «ofrenda de comida», que sería engañoso en español.
  - «Aroma agradable» mantiene la fórmula sacrificial sin explicarla en exceso dentro del texto principal.
