lexical_decisions:
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - edomitas
  lexicon: HALOT
  rationale: Se conserva el nombre propio nacional/geográfico como transliteración, siguiendo el valor de entidad política designada por el hebreo y la decisión inglesa de mantener la forma nominal directa.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - moabitas
  lexicon: HALOT
  rationale: También es un nombre propio de nación/territorio; la transliteración mantiene la forma del texto fuente sin convertirla en etnónimo derivado.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - los hijos de Amón
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hijos de Amón'. En español, 'los hijos de Amón' conserva la imagen de parentesco y sigue de cerca la forma fuente; 'amonitas' sería más idiomático, pero menos transparente respecto a la redacción hebrea.
- source_word: אֶת ... וְאֶת ... וְאֶת
  english_pob_choice: '[direct objects carried into English as simple list items]'
  chosen_spanish: '[lista simple sin marcas de objeto directo]'
  alternatives_spanish:
  - repetición explícita de marcadores de objeto directo
  lexicon: gramática hebrea
  rationale: El marcador de objeto directo אֶת no tiene equivalente natural en español y se omite. La lista se expresa de forma limpia con coordinación española estándar.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y conserva la lista de entidades como nombres propios; se adoptó la equivalencia óptima al traducir בְּנֵי עַמּוֹן de modo transparente pero idiomático en español.
  spanish_consistency_notes:
  - Se usa 'Amón' con tilde en el nombre propio español para mantener la adaptación habitual del topónimo.
  - Se mantiene la lista nominal breve y sin verbos, como en el hebreo.
  - La nota al pie conserva la alternativa etnónimica documentada por el POB inglés.
