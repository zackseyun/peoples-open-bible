review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y sigue de cerca la decisión inglesa revisada: futuro simple para וְיִתְאָו, causal para כִּי, y una formulación no sobredeterminada para וְהִשְׁתַּחֲוִי לּוֹ. Sin embargo, la nota [a] está mal formulada: presenta como alternativa exactamente la misma frase del texto principal (''tu hermosura'') en vez de explicar la alternativa real sobre el valor verbal (''el rey deseará tu hermosura''). Además, la nota [b] usa la construcción poco natural ''rinde homenaje a él''; en español idiomático debe ser ''ríndele homenaje'' o ''rinde homenaje ante él''.'
  spanish_quality_summary: El texto principal es claro, digno y legible en español general. 'Y el rey deseará tu hermosura' suena natural y conserva el tono poético. 'Porque él es tu señor' es fiel al hebreo y apropiado al contexto real-nupcial. 'Inclínate ante él' comunica bien la reverencia sin forzar 'adora'. La calidad general es buena; los ajustes necesarios son menores y se concentran en las notas.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Señor' para אֲדֹנַיִךְ está justificado aquí como título relacional humano, no divino. No aparecen términos sensibles como Yahvé/Mesías/Espíritu. La elección 'inclínate' mantiene la tensión teológica documentada para וְהִשְׁתַּחֲוִי.
  issues:
  - severity: medium
    issue: La nota [a] no preserva la alternativa documentada en el audit trail inglés.
    rationale: 'El texto de la nota dice ''O “tu hermosura”'', pero la alternativa relevante no afecta a ''hermosura'' sino a la fuerza verbal de וְיִתְאָו: futuro simple frente a matiz volitivo/exhortativo.'
  - severity: low
    issue: La nota [b] contiene una formulación poco idiomática en español.
    rationale: '''Rinde homenaje a él'' suena forzado; en español natural sería ''ríndele homenaje'' o ''rinde homenaje ante él''. La nota debe ser fiel y también idiomática.'
  revised_spanish_text: Y el rey deseará tu hermosura[a], porque él es tu señor[b]; inclínate ante él.
  revised_footnotes:
  - marker: a
    text: O 'el rey desee tu hermosura'; la forma hebrea puede leerse como una afirmación futura o como un deseo/exhortación con fuerza volitiva.
    reason: lexical_alternative
  - marker: b
    text: O 'ríndele homenaje'; el verbo puede denotar inclinarse en reverencia ante un superior, ya sea en contexto real o religioso. Algunos también traducen 'adóralo'.
    reason: alternative_reading
  revision_rationale: Se mantiene intacto el texto principal, que es fiel y natural. Se corrigen las notas para que reflejen con precisión las alternativas documentadas y usen un español idiomático.
