revisions:
- from: Y capturó a Arfaxad en los montes de Ragau[a], y lo sobrepujó con sus jabalinas, y lo destruyó hasta este día.
  to: Y capturó a Arfaxad en los montes de Ragau[a], y lo venció por la fuerza con sus jabalinas, y lo destruyó hasta aquel día.
  rationale: Se reemplaza «lo sobrepujó» por «lo venció por la fuerza» para expresar de manera clara e idiomática el sometimiento violento de κατηνάγκισεν. Se cambia «hasta este día» por «hasta aquel día» para reflejar mejor el demostrativo ἐκείνης del griego. Se conserva «Ragau» con su nota y «jabalinas» como equivalente adecuado de σιβύναις.
  reviewer_model: gpt-5.4
