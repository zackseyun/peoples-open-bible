  to: Entonces Ezequías ordenó preparar[a] aposentos[b] en la casa de Yahvé, y los prepararon.
  rationale: Se cambia «cámaras» por «aposentos» para lograr un español más natural y eclesialmente legible sin perder el sentido arquitectónico de לְשָׁכוֹת. Se ajusta la concordancia pronominal a «los prepararon». Además, la nota alternativa incorpora «depósitos» para reflejar la opción funcional preservada en el audit trail inglés.
