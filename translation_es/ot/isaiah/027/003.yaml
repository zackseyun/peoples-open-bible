revisions:
- from: Yo, Yahvé, soy su guardián[a]; lo riego continuamente[b]. Para que nadie lo castigue, lo guardo de noche y de día.
  to: Yo[a], Yahvé, soy quien la guarda; la riego continuamente[b]. No sea que alguien la castigue[c], la guardo de noche y de día.
  rationale: Se corrige la concordancia con el referente femenino implícito ('viña') usando 'la' en todas las referencias. Se ajusta la primera cláusula a 'soy quien la guarda' para preservar mejor el participio con sufijo femenino sin forzar un sustantivo masculino. Se reemplaza 'Para que nadie' por 'No sea que alguien' para reflejar mejor el valor preventivo de פֶּן. Además, se añade una nota para el rango semántico de יִפְקֹד עָלֶיהָ. También se normalizan las notas para que los marcadores correspondan exactamente al texto revisado.
