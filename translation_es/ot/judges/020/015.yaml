translation:
  language: es
  text: 'Y aquel día los hijos de Benjamín fueron pasados en revista de las ciudades: veintiséis mil hombres que sacaban la espada,[a] aparte de los habitantes de Gibeá, que fueron pasados en revista como setecientos hombres escogidos.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron contados» o «fueron inscritos»; el verbo hebreo se refiere a ser contado para el servicio militar.
    reason: lexical_alternative
  - marker: b
    text: O «setecientos hombres selectos»; el término hebreo también puede describir a hombres jóvenes, pero aquí probablemente destaca guerreros escogidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפָּקְדוּ / הִתְפָּקְדוּ
  english_pob_choice: were mustered
  chosen_spanish: fueron pasados en revista
  alternatives_spanish:
  - fueron numerados
  - fueron alistados
  - se reunieron
  lexicon: HALOT
  rationale: El hebreo en hitpael de פקד aquí comunica un conteo/enrolamiento con sentido militar. En español, «pasados en revista» conserva la idea de revisión militar y de recuento mejor que «numerados», que suena más mecánico.
- source_word: בְנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - el pueblo de Benjamín
  lexicon: HALOT
  rationale: La forma filial refleja con mayor fidelidad el hebreo y mantiene el sabor genealógico/tribal del texto. «Benjaminitas» es posible, pero suaviza la expresión original.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - aquel día
  lexicon: HALOT
  rationale: La frase temporal es un idiomatismo claro; «en aquel día» es natural en español y conserva el valor demostrativo fuerte del hebreo.
- source_word: מֵהֶעָרִים
  english_pob_choice: from the cities
  chosen_spanish: desde las ciudades
  alternatives_spanish:
  - de las ciudades
  - salidos de las ciudades
  lexicon: HALOT
  rationale: «Desde» comunica bien el punto de procedencia del recuento militar. «De las ciudades» también es posible, pero «desde» hace más visible el origen del grupo.
- source_word: עֶשְׂרִים וְשִׁשָּׁה אֶלֶף אִישׁ
  english_pob_choice: twenty-six thousand men
  chosen_spanish: veintiséis mil hombres
  alternatives_spanish:
  - veintiséis mil soldados
  lexicon: HALOT
  rationale: אִישׁ después de un número suele equivaler a «hombres». «Soldados» explicita demasiado y añade una interpretación que el hebreo no pone de forma directa.
- source_word: שֹׁלֵף חָרֶב
  english_pob_choice: drawing the sword
  chosen_spanish: que sacaban espada
  alternatives_spanish:
  - que desenvainaban la espada
  - portadores de espada
  lexicon: HALOT
  rationale: La imagen concreta es la de hombres armados. «Que sacaban espada» conserva la fuerza verbal y resulta más natural que una traducción demasiado literal como «desenvainando la espada».
- source_word: לְבַד
  english_pob_choice: besides
  chosen_spanish: aparte de
  alternatives_spanish:
  - además de
  - salvo
  lexicon: HALOT
  rationale: Marca una adición separada del total anterior. «Aparte de» comunica con claridad que el grupo de Gueba se cuenta por separado.
- source_word: מִיֹּשְׁבֵי הַגִּבְעָה
  english_pob_choice: the inhabitants of Gibeah
  chosen_spanish: los habitantes de Gueba
  alternatives_spanish:
  - los moradores de Gueba
  - los residentes de Gueba
  lexicon: HALOT
  rationale: «Habitantes» es una equivalencia natural y transparente. Se usa «Gueba» para seguir la forma española habitual del topónimo bíblico y mantener consistencia geográfica.
- source_word: שְׁבַע מֵאוֹת אִישׁ
  english_pob_choice: seven hundred men
  chosen_spanish: setecientos hombres
  alternatives_spanish:
  - setecientos soldados
  lexicon: HALOT
  rationale: La numeración es directa y el sustantivo «hombres» reproduce el hebreo sin añadir precisión militar extra.
- source_word: בָּחוּר
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - seleccionados
  - jóvenes
  lexicon: HALOT
  rationale: En este contexto militar, בָּחוּר apunta a hombres seleccionados/escogidos, no simplemente jóvenes. «Escogidos» preserva esa elección de elite sin reducirla a edad.
theological_decisions:
- issue: Cómo reflejar el sentido militar de פקד sin borrar su ambigüedad de conteo/enrolamiento
  english_pob_reading: were mustered
  chosen_spanish_reading: fueron pasados en revista
  alternative_spanish_readings:
  - fueron numerados
  - fueron alistados
  - fueron enrolados
  rationale: El hebreo puede abarcar conteo y organización para servicio militar. «Pasados en revista» mantiene el marco castrense y no reduce el verbo a un mero cálculo aritmético.
  doctrine_reference: Ninguno; decisión léxico-histórica
- issue: Cómo traducir בָּחוּר en un contexto de guerreros sin perder el matiz de elección
  english_pob_reading: chosen men
  chosen_spanish_reading: hombres escogidos
  alternative_spanish_readings:
  - hombres selectos
  - jóvenes hombres
  rationale: El contexto favorece la idea de tropas seleccionadas. «Escogidos» conserva la valoración de elite, mientras que «jóvenes» desplaza el énfasis hacia la edad.
  doctrine_reference: Ninguno; decisión léxico-contextual
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el pasaje presenta alto acuerdo entre el texto fuente y el audit trail inglés, sin cambios editoriales pendientes.
  spanish_consistency_notes:
  - Se mantiene «Benjamín» como nombre de la tribu y «Gueba» como topónimo, conforme a uso bíblico español consistente.
  - Se eligió «fueron pasados en revista» para uniformar el doble uso del verbo פקד en el verso, preservando la repetición del hebreo.
  - Se evitó «Cristo» u otra terminología no pertinente; el versículo es narrativo y militar, sin carga cristológica.
  - «Escogidos» se emplea como equivalente de בָּחוּר para no perder el matiz de selección militar.
