    text: 'Hebreo: «el qiqayón»; la identificación exacta de la planta es incierta. Algunas versiones tradicionales la traducen «enredadera» o «vid».'
    reason: lexical_alternative
  revision_rationale: Se ajusta חַסְתָּ a 'tuviste compasión' para un registro más digno y eclesialmente legible, sin perder el sentido del reproche. Se mejora la naturalidad con 'por la que'. Se elimina la nota sobre 'lástima' porque ya no corresponde al texto revisado. La nota del qiqayón se mantiene, adaptada al español en lugar de hablar de versiones 'en inglés'.
