    issue: «prefieren» para προαιρῶνται debilita la idea de elección deliberada
    rationale: El griego denota decisión voluntaria o elección, y la auditoría inglesa optó por «choose». En español, «prefieren» puede sugerir solo inclinación o gusto, no necesariamente una decisión formal.
  - severity: low
    issue: «lo añadió por escrito» deja ambiguo el referente de «lo»
    rationale: Aunque refleja bien ὑπέγραψεν, en español resulta más natural y claro decir «añadió por escrito» o «agregó por escrito», especialmente antes de una cita documental.
