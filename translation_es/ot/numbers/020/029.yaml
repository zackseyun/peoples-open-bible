translation:
  language: es
  text: Cuando toda la asamblea vio que Aarón había muerto[a], toda la casa de Israel[b] lloró por Aarón durante treinta días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se dio cuenta de que Aarón había muerto». El hebreo literalmente dice «vio que Aarón había muerto», y «ver» puede implicar reconocimiento del hecho.'
    reason: lexical_alternative
  - marker: b
    text: «Toda la casa de Israel» es una expresión corporativa para todo el pueblo de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - se dio cuenta de
  - reconoció
  lexicon: HALOT
  rationale: ראה normalmente significa “ver”; en este contexto incluye la percepción/recognición de la muerte de Aarón. “Vio” preserva la forma verbal y deja abierta esa fuerza de reconocimiento sin sobretraducirla.
- source_word: כָּל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la congregación
  - toda la comunidad
  lexicon: HALOT
  rationale: עֵדָה se refiere al conjunto reunido del pueblo. “Asamblea” es natural en español bíblico y conserva el matiz corporativo y reunido mejor que una lectura más eclesiástica de “congregación” o más general de “comunidad”.
- source_word: גָוַע
  english_pob_choice: had died
  chosen_spanish: había muerto
  alternatives_spanish:
  - había expirado
  - había fallecido
  lexicon: HALOT
  rationale: גוע es un verbo reverente para morir/expirar. “Había muerto” es claro, digno y suficientemente directo en español; “había expirado” suena más técnico y “había fallecido” suaviza menos la equivalencia con el hebreo.
- source_word: וַיִּבְכּוּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloraron
  - hizo duelo
  lexicon: HALOT
  rationale: בכה significa “llorar/llorar por”. Dado que el sujeto colectivo ya fue introducido, “lloró” funciona como singular colectivo en español y conserva el acto de llorar más concretamente que “hizo duelo”.
- source_word: אֶת אַהֲרֹן
  english_pob_choice: for Aaron
  chosen_spanish: por Aarón
  alternatives_spanish:
  - sobre Aarón
  - a causa de Aarón
  lexicon: HALOT
  rationale: Con בכה, el objeto introducido por אֶת señala a la persona llorada. “Por Aarón” es la forma natural en español y mantiene el valor de lamento dirigido hacia él.
- source_word: שְׁלֹשִׁים יוֹם
  english_pob_choice: thirty days
  chosen_spanish: treinta días
  alternatives_spanish:
  - por treinta días
  lexicon: HALOT
  rationale: El acusativo de duración se expresa naturalmente en español como “treinta días” después del verbo principal. Añadir “por” sería posible, pero no necesario y puede sobrecargar la frase.
- source_word: כֹּל בֵּית יִשְׂרָאֵל
  english_pob_choice: all the house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - todo Israel
  - toda la familia de Israel
  lexicon: HALOT
  rationale: בֵּית יִשְׂרָאֵל es una expresión corporativa fija. “Casa de Israel” preserva esa fórmula covenantal y “toda” reproduce el alcance total del hebreo.
translation_notes:
  revision_awareness: 'Alineado con el último pase de revisión: no se requieren cambios respecto del testimonio principal; se preserva la equivalencia óptima y la ambigüedad lexical de ראה sin endurecerla más allá del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo “Aarón” con tilde según la ortografía española.
  - Se usó “asamblea” para עֵדָה y “casa de Israel” para בֵּית יִשְׂרָאֵל, conservando el lenguaje corporativo del Pentateuco.
  - Se evitó “SEÑOR” u otros reemplazos no presentes; el versículo no contiene el nombre divino.
  - Se preservó el tiempo compuesto (“había muerto”) para reflejar correctamente el valor del hebreo en contexto narrativo retrospectivo.
