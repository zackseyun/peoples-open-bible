  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé en este versículo. 'Fidelidad' para אֱמוּנָה está bien. 'Amor constante' para חֶסֶד es defendible y coherente con la racional documentada, aunque no es la opción más técnica.
