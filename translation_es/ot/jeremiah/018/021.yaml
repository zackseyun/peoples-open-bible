translation:
  language: es
  text: Por tanto, entrega a sus hijos al hambre[a], y entrégalos al poder de la espada. Que sus esposas queden privadas de sus hijos[b] y viudas, y que sus hombres sean muertos por muerte[c], sus jóvenes abatidos por la espada en batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entrégalos en manos de la espada». El hebreo usa una imagen más concreta que el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O «queden sin hijos». El hebreo subraya la pérdida de hijos, no solo la ausencia de ellos.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «muertos de muerte», una expresión hebrea difícil que intensifica la idea de destrucción mortal.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula inferencial introduce la consecuencia de la súplica previa; «Por tanto» conserva bien la relación lógica en español y mantiene el tono formal.
- source_word: תֵּן ... לָרָעָב
  english_pob_choice: give ... over to famine
  chosen_spanish: entrega ... al hambre
  alternatives_spanish:
  - da ... al hambre
  - entrega ... a la hambre
  lexicon: HALOT
  rationale: נתן con ל expresa poner a alguien en manos de un destino o poder. «Entregar ... al hambre» reproduce esa idea de abandono judicial de forma natural en español.
- source_word: בְּנֵיהֶם
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus descendientes
  lexicon: HALOT
  rationale: En este contexto de juicio, בנים puede ser colectivo. «Hijos» mantiene la amplitud posible sin forzar exclusivamente «niños»; el contexto permite también la lectura más general de descendencia.
- source_word: וְהַגִּרֵם
  english_pob_choice: hand them over
  chosen_spanish: entrégalos
  alternatives_spanish:
  - entrégales
  - arrójalos
  lexicon: HALOT
  rationale: El verbo en forma causativa/idiomática expresa hacer que queden expuestos a la espada. «Entrégalos» conserva la fuerza de abandono o entrega a un poder destructivo.
- source_word: עַל יְדֵי חֶרֶב
  english_pob_choice: to the power of the sword
  chosen_spanish: al poder de la espada
  alternatives_spanish:
  - en manos de la espada
  - bajo la espada
  lexicon: HALOT
  rationale: La imagen hebrea es más concreta que un simple «por la espada». «Al poder de la espada» conserva la metáfora de estar bajo la capacidad destructiva de la espada.
- source_word: וְתִהְיֶינָה נְשֵׁיהֶם שַׁכֻּלוֹת וְאַלְמָנוֹת
  english_pob_choice: Let their wives become bereaved and widowed
  chosen_spanish: Que sus esposas queden viudas y sin hijos
  alternatives_spanish:
  - Que sus esposas queden bereadas y viudas
  - Que sus mujeres queden sin hijos y viudas
  lexicon: HALOT
  rationale: La jussiva se expresa bien con «Que... queden». Para שַׁכֻּלוֹת, «sin hijos» explicita la pérdida de hijos y evita una forma menos natural como «bereadas»; aun así, el sentido de desamparo familiar queda presente. «Esposas» refleja el contexto posesivo y social.
- source_word: שַׁכֻּלוֹת
  english_pob_choice: bereaved
  chosen_spanish: sin hijos
  alternatives_spanish:
  - desoladas
  - privadas de hijos
  lexicon: HALOT
  rationale: El adjetivo alude a la pérdida de hijos o descendencia. «Sin hijos» hace explícita la noción central en español contemporáneo y evita ambigüedad, aunque la idea más amplia de duelo permanece en el conjunto de la línea.
- source_word: וְאַנְשֵׁיהֶם
  english_pob_choice: their men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - sus varones
  - sus maridos
  lexicon: HALOT
  rationale: אֲנָשִׁים aquí contrasta con «esposas» y «jóvenes», por lo que «sus hombres» mantiene el paralelo social y de género sin restringir indebidamente a «maridos».
- source_word: הֲרֻגֵי מָוֶת
  english_pob_choice: be slain by death
  chosen_spanish: sean muertos por muerte
  alternatives_spanish:
  - sean muertos de muerte
  - sean asesinados por la muerte
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y literalmente intensiva. «Sean muertos por muerte» preserva la rareza del giro y su fuerza fatal sin resolverla excesivamente; mantiene una tensión léxica que el texto hebreo también tiene.
- source_word: בַּחוּרֵיהֶם
  english_pob_choice: their young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus mozos
  - sus muchachos
  lexicon: HALOT
  rationale: בחור designa jóvenes en edad vigorosa, a menudo en contexto militar. «Sus jóvenes» es claro y general; en español cubre la edad y el grupo social con naturalidad.
- source_word: מֻכֵּי חֶרֶב
  english_pob_choice: struck down by the sword
  chosen_spanish: heridos por la espada
  alternatives_spanish:
  - golpeados por la espada
  - abatidos por la espada
  lexicon: HALOT
  rationale: El participio pasivo indica ser alcanzados violentamente por la espada. «Heridos por la espada» conserva la imagen y es idiomático en español, aunque «abatidos» también sería posible.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en la guerra
  alternatives_spanish:
  - en batalla
  - en combate
  lexicon: HALOT
  rationale: מִלְחָמָה refiere a guerra/combate bélico. «En la guerra» mantiene el alcance amplio del término; «en batalla» sería más específico, pero menos general que el hebreo.
theological_decisions:
- issue: Preservar la forma imprecatoria y violenta de la oración
  english_pob_reading: Preserve the direct petition for judgment without softening
  chosen_spanish_reading: Conservar la súplica directa de juicio sin atenuarla
  alternative_spanish_readings:
  - Convertirlo en futuro descriptivo
  - Suavizar el lenguaje violento
  rationale: El hebreo usa imperativos/jusivos dirigidos a Dios. La traducción debe reflejar esa tensión teológica y retórica sin convertirla en mera predicción ni suavizar el juicio expresado.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «become victims of death» a «be slain by death» para ajustar mejor הרג. La versión española conserva esa fuerza verbal con «sean muertos por muerte», evitando una paráfrasis que debilite la rareza del hebreo. También se mantuvo la distinción entre la entrega al hambre/la espada y el destino de los hombres, jóvenes y esposas, siguiendo la estructura del texto fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantuvo «espada» como objeto figurado de violencia, sin convertirla en una mera referencia instrumental.
  - «Hijos» se emplea como posible colectivo de descendencia, coherente con el uso hebreo en contextos de juicio.
  - Se conservó la simetría poética de las líneas finales, respetando el paralelo entre esposas, hombres y jóvenes.
