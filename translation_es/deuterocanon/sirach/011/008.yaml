revisions:
- from: Antes de investigar[a], no hables contra él; examina primero[b], y después reprende.
  to: Antes de investigar[a], no censures[b]; examina primero, y después reprende.
  rationale: Se reemplaza 'no hables contra él' por 'no censures' para evitar añadir un objeto no presente en el hebreo y para reflejar mejor la decisión léxica auditada ('do not find fault' como advertencia contra la censura prematura). También se mueve la nota [b] al verbo correspondiente, ya que su explicación lexical pertenece a אַל תְּסַלֵּף, no a 'primero'. Se mantiene 'reprende' y la nota griega, porque el expediente inglés ya documenta esa tensión textual y la solución principal sigue siendo defendible en español.
