translation:
  language: es
  text: Condenémoslo a una muerte vergonzosa, porque se hará examen[a] de él conforme a sus palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'habrá cuidado de él', 'habrá vindicación de él', o 'sus palabras serán probadas por lo que le suceda'. El griego ἐπισκοπή puede referirse ampliamente a la atención o intervención divina.
