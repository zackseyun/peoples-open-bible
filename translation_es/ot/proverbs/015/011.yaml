translation:
  language: es
  text: Seol y Abadón[a] están abiertos ante Yahvé; cuánto más los corazones de los hijos del hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Abadón'' puede entenderse también como ''destrucción'' o como el ámbito o lugar de destrucción.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''los hijos del hombre'', un modismo para los seres humanos en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Conservo el nombre hebreo transliterado para mantener el concepto del inframundo/ámbito de los muertos sin reducirlo a un equivalente doctrinal más específico que el hebreo no exige.
- source_word: אֲבַדּוֹן
  english_pob_choice: Abaddon
  chosen_spanish: Abadón
  alternatives_spanish:
  - Destrucción
  - el lugar de destrucción
  lexicon: HALOT
  rationale: Sigo la decisión de preservar el término como nombre casi propio en paralelo con Seol, porque en este proverbio funciona como designación de una esfera ligada a la muerte y no solo como un sustantivo abstracto.
- source_word: נֶגֶד
  english_pob_choice: lie open before
  chosen_spanish: están abiertos ante
  alternatives_spanish:
  - están delante de
  - están expuestos ante
  lexicon: HALOT
  rationale: En español, 'están abiertos ante' comunica la idea idiomática de plena visibilidad o exposición ante Yahvé mejor que una traducción meramente espacial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Sigo el estándar del proyecto para el Nombre divino, preservando la referencia pactual del Tetragrámaton en vez de ocultarlo tras un sustituto litúrgico.
- source_word: אַף כִּי
  english_pob_choice: how much more
  chosen_spanish: ¡cuánto más!
  alternatives_spanish:
  - ¡mucho más!
  - con mayor razón
  lexicon: HALOT
  rationale: La secuencia introduce una argumentación a fortiori; '¡cuánto más!' transmite de manera natural el salto lógico desde lo mayormente oculto a lo todavía más obvio.
- source_word: לִבּוֹת
  english_pob_choice: hearts
  chosen_spanish: los corazones
  alternatives_spanish:
  - las mentes
  - los pensamientos íntimos
  lexicon: HALOT
  rationale: '''Corazones'' conserva la antropología hebrea del centro interior de la persona, incluyendo intención, voluntad y pensamiento, mejor que reducirlo a ''mente''.'
- source_word: בְּנֵי אָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos de hombre
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  lexicon: HALOT
  rationale: Mantengo la forma más cercana al hebreo, con fuerza representativa y masculina gramatical, sin borrar la locución idiomática. En español suena algo más natural que 'los hijos del hombre' y sigue siendo reconocible como calco controlado.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea editorial del proyecto preserva el Nombre divino. 'Yahvé' mantiene la identidad revelada de Dios en el texto y evita la sustitución tradicional por una mayúscula funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Naturaleza de Seol y Abadón
  english_pob_reading: Sheol and Abaddon
  chosen_spanish_reading: Seol y Abadón
  alternative_spanish_readings:
  - el sepulcro y la destrucción
  - el reino de los muertos y el lugar de destrucción
  rationale: 'Preservo la tensión lexical del proverbio: no especifica una doctrina completa del más allá, sino que nombra las regiones más recónditas conocidas en la imaginación hebrea. Traducirlas demasiado pronto apagaría el contraste retórico.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Alcance humano de בְּנֵי אָדָם
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos de hombre
  alternative_spanish_readings:
  - los seres humanos
  - la humanidad
  rationale: 'Conservo la fórmula idiomática masculina y representativa del hebreo, pero el sentido es genérico: incluye a la humanidad en general. Una nota aclara ese valor sin sustituir el giro del original.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Gender-accurate over gender-neutral; Contested terms: אָדָם → man / humankind (context)'
translation_notes:
  revision_awareness: El contexto auditado muestra alto acuerdo y sin revisiones aplicadas en la última pasada; mantengo la decisión principal de preservar Seol/Abadón, el Nombre divino como Yahvé y la idiomática hebrea de 'los hijos de hombre' con nota explicativa.
  spanish_consistency_notes:
  - Uso 'Yahvé' en lugar de 'SEÑOR' conforme al estándar del proyecto.
  - Mantengo transliteraciones controladas 'Seol' y 'Abadón' para no borrar el paralelismo semántico del proverbio.
  - Conservo una construcción castellana natural ('están abiertos ante') que refleja la exposición ante Dios sin sobreexplicar el hebreo.
  - La nota b aclara el valor inclusivo del hebraísmo sin reemplazarlo en el texto principal.
