    text: 'O: «su alma está profundamente apegada a su hija» / «la desea».'
    reason: lexical_alternative
  revision_rationale: Se corrige la preposición para reflejar mejor el sentido de חָשְׁקָה ... בְּבִתְּכֶם, se simplifica la súplica cortés para sonar más natural en español, y se ajusta la nota para mantener la referencia plural/colectiva del original sin cambiar el sentido.
