translation:
  language: es
  text: Yered vivió ochocientos años después de engendrar a Hanoc[a], y engendró hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hanoc» sigue de cerca la forma hebrea חֲנוֹךְ; la forma tradicional española es «Enoc».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - continuó viviendo
  lexicon: HALOT
  rationale: En las fórmulas genealógicas del hebreo, חיה con wayyiqtol expresa la duración de la vida; en español, «vivió» es la equivalencia natural y clara, sin perder el sentido de periodo vital contado.
- source_word: יֶרֶד
  english_pob_choice: Yered
  chosen_spanish: Yered
  alternatives_spanish:
  - Jared
  lexicon: HALOT
  rationale: Se conserva la transliteración más cercana al hebreo, coherente con la primacía del texto original. «Jared» sería la forma tradicional en español, pero aquí no se adopta como forma base.
- source_word: הוֹלִידוֹ
  english_pob_choice: he fathered
  chosen_spanish: haber engendrado
  alternatives_spanish:
  - haber sido padre de
  - haber dado a luz a
  lexicon: HALOT
  rationale: El hiphil de ילד en genealogías indica generación/paternidad. En español, «engendrar» conserva la fuerza genealógica y evita la suavización de un simple «tener» o «dar a luz».
- source_word: אֶת חֲנוֹךְ
  english_pob_choice: Hanokh
  chosen_spanish: Hanoc[a]
  alternatives_spanish:
  - Enoc
  lexicon: HALOT
  rationale: Se translitera el nombre hebreo con forma cercana a la original. La terminación «-c» en «Hanoc» representa de modo funcional la consonante final gutural del hebreo; «Enoc» es la forma tradicional española, pero aquí se privilegia la forma hebrea.
- source_word: שְׁמֹנֶה מֵאוֹת שָׁנָה
  english_pob_choice: eight hundred years
  chosen_spanish: ochocientos años
  alternatives_spanish:
  - ochocientos años de vida
  lexicon: HALOT
  rationale: La frase numeral expresa duración. «Ochocientos años» es la formulación española idiomática y precisa, manteniendo el valor temporal del hebreo.
- source_word: וַיּוֹלֶד
  english_pob_choice: and he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - y fue padre de
  - y procreó
  lexicon: HALOT
  rationale: La repetición del verbo en la fórmula genealógica se preserva con «engendró», que reproduce la relación causal de paternidad sin ampliar el sentido.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos
  - descendientes
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente ambos sexos de la descendencia. «Hijos e hijas» mantiene esa especificidad mejor que el genérico «hijos» o «descendientes».
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios sustantivos; el texto siguió estable y el acuerdo de revisión fue alto, por lo que la versión española mantiene la estructura genealógica directa del original sin ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - 'Se conserva el orden genealógico simple del hebreo: vida posterior al nacimiento, duración, y luego descendencia adicional.'
  - Se evita la forma eclesiástica tradicional «Enoc» en el texto principal para seguir la política de transliteración cercana al original, dejando constancia en nota.
  - Se usa «engendró» en ambos verbos genealógicos para mantener consistencia semántica con el hebreo ילד en contexto de genealogía.
