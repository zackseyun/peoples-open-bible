revisions:
- from: Entonces Gedeón tomó diez hombres de entre sus siervos y hizo como Yahvé le había hablado. Pero, porque temía a la casa de su padre y a los hombres de la ciudad, no se atrevió a hacerlo de día[a]; lo hizo de noche.
  to: Entonces Gedeón tomó diez hombres de entre sus siervos e hizo como Yahvé le había hablado. Pero, porque temía a la casa de su padre y a los hombres de la ciudad como para hacerlo de día[a], lo hizo de noche.
  rationale: Se corrige la cláusula de temor para seguir más de cerca la sintaxis y el sentido del hebreo y del audit trail inglés, evitando el matiz añadido de 'no se atrevió'. También se mantiene la nota léxica para preservar la alternativa más literal documentada. El cambio de 'y' a 'e' antes de 'hizo' mejora la fluidez ortográfica del español.
  reviewer_model: gpt-5.4
