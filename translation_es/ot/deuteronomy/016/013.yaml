review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la fiesta, la duración de siete días y el marco temporal de la recolección desde la era y el lagar. Sin embargo, la decisión principal sobre תַּעֲשֶׂה לְךָ no preserva bien el valor idiomático legal-festivo. «Harás la fiesta» suena demasiado literal y menos natural en español para la observancia de una solemnidad.'
  spanish_quality_summary: El español es comprensible, pero «Harás la fiesta» resulta poco idiomático en registro bíblico y puede sugerir ‘organizar’ más que ‘observar/celebrar’. El resto —«por siete días», «cuando recojas», «era», «lagar»— es fiel y legible, aunque «era» puede sonar algo literario; aquí sigue siendo aceptable en una Biblia de tono digno.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La nota con «tabernáculos» como alternativa tradicional está bien justificada. La elección «cabañas» para סֻכּוֹת es defendible y transparente. La principal corrección necesaria es preferir «celebrarás» u «observarás» sobre «harás» para el giro festivo con חַג.
  issues:
  - severity: medium
    issue: «Harás la fiesta» no reproduce bien el sentido idiomático de תַּעֲשֶׂה לְךָ con חַג.
    rationale: Aunque עשה literalmente es ‘hacer’, con una fiesta en contexto legal significa observarla o celebrarla. En español, «harás la fiesta» suena calcado y menos natural; «celebrarás» comunica mejor la obligación festiva sin perder fuerza.
  - severity: low
    issue: La nota al pie tiene comillas y puntuación algo torpes.
    rationale: El contenido es correcto, pero conviene formularla con estilo español más limpio y sin la comilla inicial innecesaria.
  revised_spanish_text: Celebrarás la fiesta de las cabañas[a] por siete días, cuando recojas de tu era y de tu lagar.
  revised_footnotes:
  - marker: a
    text: 'También: «la fiesta de los tabernáculos». El hebreo se refiere literalmente a cabañas o refugios temporales.'
    reason: lexical_alternative
