translation:
  language: es
  text: Y Dios dio a Daniel favor y compasión ante el jefe de los eunucos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el jefe de los oficiales de la corte» o «el jefe de los oficiales del palacio»; el término hebreo puede referirse tanto a eunucos literales como, más ampliamente, a funcionarios reales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - otorgó
  - concedió
  lexicon: HALOT
  rationale: El wayyiqtol de נתן expresa aquí la acción narrativa directa de Dios. «Dio» es la forma más natural y fiel al movimiento simple del original, sin añadir matices innecesarios.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El sustantivo designa al Dios verdadero en contexto. En español, «Dios» es el equivalente normal y claro; no aparece el nombre de pacto divino aquí.
- source_word: אֶת דָּנִיֵּאל
  english_pob_choice: Daniel
  chosen_spanish: a Daniel
  alternatives_spanish:
  - Daniel
  lexicon: —
  rationale: El marcador de objeto directo no tiene equivalente independiente en español; se expresa con la preposición «a» por el objeto personal directo.
- source_word: לְחֶסֶד
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - bondad
  - gracia
  - benevolencia
  lexicon: HALOT
  rationale: En este contexto relacional y cortesano, el sentido es quedar en una posición de aceptación favorable ante otro. «Favor» comunica mejor esa idea que un término de carga más teológica.
- source_word: וּלְרַחֲמִים
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia
  - piedad
  - ternura
  lexicon: HALOT
  rationale: El plural sugiere sentimientos de compasión o misericordia. «Compasión» se empareja naturalmente con «favor» y evita un tono arcaico.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y marca la perspectiva del oficial respecto de Daniel. «Delante de» conserva esa imagen espacial con naturalidad en español.
- source_word: שַׂר
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - oficial
  - capitán
  - príncipe
  lexicon: HALOT
  rationale: שַׂר señala a una persona de rango y autoridad. En este contexto de corte, «jefe» comunica supervisión sin sobrecargar el texto con un término demasiado específico.
- source_word: הַסָּרִיסִים
  english_pob_choice: the eunuchs
  chosen_spanish: los eunucos
  alternatives_spanish:
  - los oficiales de la corte
  - los oficiales del palacio
  lexicon: HALOT
  rationale: El sentido léxico básico de סָרִיס es «eunuco», aunque también puede referirse a funcionarios de palacio. Se mantiene el valor directo en el texto principal y se preserva la alternativa en nota.
theological_decisions:
- issue: Sentido de סָרִיסִים en el contexto babilónico
  english_pob_reading: the eunuchs
  chosen_spanish_reading: los eunucos
  alternative_spanish_readings:
  - los oficiales de la corte
  - los oficiales del palacio
  rationale: El hebreo permite una referencia literal a eunucos o una referencia institucional a oficiales reales. La traducción principal conserva el término más directo, sin forzar una eufemización; la alternativa queda disponible para lectores que entiendan el cargo más ampliamente.
  doctrine_reference: Principios de traducción §3, §5
translation_notes:
  revision_awareness: Se revisó el expediente inglés y la base hebrea. No hubo cambios editoriales aplicados en la última pasada; el español mantiene la lectura principal del POB y conserva la ambigüedad léxica de סָרִיסִים en una nota.
  spanish_consistency_notes:
  - Se usa «Dios» sin máscara por «SEÑOR», conforme al nombre divino presente en el hebreo.
  - Se mantiene la distinción entre «favor» y «compasión» para reflejar los dos sustantivos hebreos separados.
  - «Delante de» reproduce el valor locativo-relacional de לִפְנֵי sin introducir una interpretación adicional.
  - «Eunucos» se conserva en el cuerpo con alternativa institucional en nota, como en el expediente inglés.
