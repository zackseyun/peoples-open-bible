translation:
  language: es
  text: Galaad es mío, y Manasés es mío; Efraín es la fortaleza de mi cabeza; Judá es mi cetro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “mi legislador” o “mi bastón de mando”. El término hebreo puede referirse a quien decreta o al bastón o cetro que simboliza el mando.
    reason: alternative_reading
lexical_decisions:
- source_word: לִי
  english_pob_choice: is mine
  chosen_spanish: es mío
  alternatives_spanish:
  - me pertenece
  - es para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de 1ª persona expresa posesión; en español, “es mío” comunica de forma directa y natural la pertenencia personal del hablante.
- source_word: גִלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: HALOT
  rationale: Nombre propio geográfico/tradicional. En español bíblico amplio, “Galaad” es la forma asentada y transparente.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: HALOT
  rationale: Nombre propio tribal. “Manasés” es la forma española estándar y fiel al referente.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: HALOT
  rationale: Nombre propio tribal. “Efraín” es la forma española habitual y plenamente inteligible.
- source_word: מָעוֹז
  english_pob_choice: stronghold
  chosen_spanish: fortaleza
  alternatives_spanish:
  - baluarte
  - refugio
  - fuerza
  lexicon: HALOT
  rationale: El sustantivo denota una realidad de defensa o fortificación. “Fortaleza” preserva la imagen militar/política en español sin volverla abstracta.
- source_word: רֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - mi jefe
  - mi parte principal
  lexicon: HALOT
  rationale: Se mantiene el valor literal de la metáfora. En español, “cabeza” conserva la imagen que el texto presenta sin interpretarla de antemano.
- source_word: מְחֹקְקִי
  english_pob_choice: my scepter
  chosen_spanish: mi cetro
  alternatives_spanish:
  - mi gobernante
  - mi bastón de mando
  - mi legislador
  lexicon: HALOT
  rationale: En este contexto de imaginería real y territorial, “cetro” comunica mejor el emblema/instrumento de realeza. Se conserva, sin embargo, la tensión lexical con la opción tradicional “legislador” en nota.
theological_decisions:
- issue: Valor de מְחֹקְקִי en paralelo con la imaginería real
  english_pob_reading: my scepter
  chosen_spanish_reading: mi cetro
  alternative_spanish_readings:
  - mi legislador
  - mi bastón de mando
  rationale: El verso enumera territorios y funciones simbólicas de dominio; “mi cetro” preserva el sentido régio y político. La lectura tradicional “legislador” sigue siendo posible por la ambigüedad del hebreo y se mantiene como alternativa documentada.
  doctrine_reference: Translation philosophy §3, §5
- issue: Metáfora de Ephraim como protección para la cabeza
  english_pob_reading: the stronghold of my head
  chosen_spanish_reading: la fortaleza de mi cabeza
  alternative_spanish_readings:
  - una fortaleza para mi cabeza
  - la fortaleza para mi cabeza
  rationale: Se conserva la construcción nominal y la relación metafórica sin suavizarla en exceso. Aunque suene figurativo en español, la imagen resulta comprensible y fiel al original.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La revisión inglesa osciló entre una formulación más dinámica ('a stronghold for my head') y una más literal ('the stronghold of my head'). La redacción española conserva la imagen literal (‘la fortaleza de mi cabeza’) en la nota y usa una forma publicada más natural (‘fortaleza de mi cabeza’) sin perder la metáfora. También se reflejó la decisión final de mantener 'scepter' para מְחֹקְקִי, aquí como 'cetro', con la alternativa histórica 'legislador' preservada en nota.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' donde corresponda en el proyecto, pero este versículo no lo contiene.
  - 'Se prefirieron topónimos y nombres tribales en formas españolas asentadas: Galaad, Manasés, Efraín, Judá.'
  - Se conservó el paralelismo poético con puntuación breve y ritmo sintético.
  - No se introdujo un lenguaje eclesiástico tradicional donde el hebreo no lo exige.
