translation:
  language: es
  text: Pero entre estos no hubo ni un hombre de los que Moisés y Aarón el sacerdote contaron, a quienes contaron entre los hijos[a] de Israel en el desierto de Sinaí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel», una designación familiar tradicional para Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְאֵלֶּה
  english_pob_choice: But among these
  chosen_spanish: Pero entre estos
  alternatives_spanish:
  - Y entre estos
  - Entre estos
  lexicon: HALOT
  rationale: El hebreo combina conjunción y preposición, con posible matiz adversativo por el contexto inmediato. «Pero entre estos» conserva la relación locativa y refleja bien el contraste sin forzar una paráfrasis.
- source_word: לֹא הָיָה אִישׁ
  english_pob_choice: there was not a man
  chosen_spanish: no hubo ni un hombre
  alternatives_spanish:
  - no había un hombre
  - no hubo un hombre
  lexicon: HALOT
  rationale: La fórmula hebrea expresa inexistencia de cualquier individuo dentro del grupo. «No hubo ni un hombre» conserva el singular de אִישׁ y la fuerza enfática del enunciado.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - uno
  lexicon: HALOT
  rationale: El término es singular masculino y aquí se refiere a los varones de la generación censada previamente. «Hombre» mantiene ese valor y evita neutralizar el rasgo gramatical que el hebreo usa.
- source_word: מִפְּקוּדֵי
  english_pob_choice: from those counted by
  chosen_spanish: de los contados por
  alternatives_spanish:
  - de los registrados por
  - de los censados por
  lexicon: HALOT
  rationale: La raíz פקד en este contexto alude al conteo/censo de personas. «Contados por» comunica con naturalidad que se trata de los incluidos en el censo anterior realizado por esas autoridades.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote principal
  - el sumo sacerdote
  lexicon: HALOT
  rationale: Aunque Aarón ejercía como sumo sacerdote, el texto hebreo dice simplemente «el sacerdote». En español, «sacerdote» es la forma más fiel y evita añadir un título que el versículo no da.
- source_word: אֲשֶׁר פָּקְדוּ
  english_pob_choice: who counted
  chosen_spanish: que contaron
  alternatives_spanish:
  - que registraron
  - que hicieron el censo
  lexicon: HALOT
  rationale: El relativo se refiere a Moisés y Aarón como quienes realizaron el conteo. «Que contaron» reproduce de modo directo el valor verbal del hebreo sin explicitar más de lo necesario.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar/covenantal del hebreo. En español «hijos de Israel» es la forma tradicional y transparente que mantiene el eco del original mejor que una normalización a «israelitas».
- source_word: בְּמִדְבַּר סִינָי
  english_pob_choice: in the wilderness of Sinai
  chosen_spanish: en el desierto de Sinaí
  alternatives_spanish:
  - en el desierto del Sinaí
  - en el desierto de Sinaí
  lexicon: HALOT
  rationale: מִדְבָּר puede traducirse por «desierto» o «desierto/wilderness» según el registro. «En el desierto de Sinaí» es natural en español y preserva el sentido geográfico del texto.
theological_decisions:
- issue: Mantenimiento del contraste implícito en וּבְאֵלֶּה
  english_pob_reading: '''But among these'' captures an adversative force tied to the prior verse'
  chosen_spanish_reading: «Pero entre estos» conserva el valor contrastivo sin volverlo explícitamente exegético
  alternative_spanish_readings:
  - Y entre estos
  - Entre estos
  rationale: La conexión con el versículo anterior sugiere un giro contrastivo. En español, «pero» comunica esa relación de manera natural sin alterar el contenido del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
- issue: Léxico masculino en אִישׁ y בְּנֵי יִשְׂרָאֵל
  english_pob_reading: Retain 'man' and 'sons of Israel' in the main text
  chosen_spanish_reading: Mantener «hombre» y «hijos de Israel»
  alternative_spanish_readings:
  - persona
  - israelitas
  - pueblo de Israel
  rationale: El pasaje habla de la generación masculina censada; la forma hebrea es explícitamente masculina. La traducción conserva ese rasgo y no lo neutraliza, siguiendo la precisión de género del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Título de Aarón en הַכֹּהֵן
  english_pob_reading: the priest
  chosen_spanish_reading: «el sacerdote» sin añadir «sumo»
  alternative_spanish_readings:
  - el sumo sacerdote
  - el sacerdote principal
  rationale: El hebreo no añade el adjetivo correspondiente a «sumo». Mantener solo «sacerdote» evita expandir el texto y respeta la formulación exacta del verso.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: El pasaje mantiene alta concordancia con el audit trail inglés. Se siguió la lectura contrastiva de וּבְאֵלֶּה, se preservó el lenguaje masculino de אִישׁ y בְּנֵי יִשְׂרָאֵל, y no se añadió «sumo» a הַכֹּהֵן. No hubo revisiones previas que requirieran cambio adicional.
  spanish_consistency_notes:
  - Se usó «Moisés y Aarón» como nombres propios estándar en español.
  - «Desierto de Sinaí» mantiene el nombre geográfico de forma clara y publicable.
  - La puntuación reproduce una sola cláusula principal con relativa final, como en el hebreo.
