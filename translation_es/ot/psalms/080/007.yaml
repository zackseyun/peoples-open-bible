translation:
  language: es
  text: Tú nos conviertes en motivo de contienda para nuestros vecinos, y nuestros enemigos se burlan de nosotros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de ellos». El pronombre hebreo final es de tercera persona plural («ellos»), probablemente refiriéndose a «nuestros vecinos», aunque algunas traducciones entienden el sentido más generalmente como burla dirigida contra nosotros.
    reason: alternative_reading
lexical_decisions:
- source_word: תְּשִׂימֵנוּ
  english_pob_choice: You make us
  chosen_spanish: Tú nos conviertes
  alternatives_spanish:
  - Tú nos pones
  - Tú nos haces
  lexicon: HALOT
  rationale: El hebreo de שׂים aquí expresa que Dios nos coloca o hace que quedemos en cierta condición. En español, «conviertes» comunica bien el efecto resultante sin perder la idea causativa del verbo.
- source_word: מָדוֹן
  english_pob_choice: a cause of strife
  chosen_spanish: motivo de pleito
  alternatives_spanish:
  - causa de conflicto
  - objeto de contienda
  - motivo de disputa
  lexicon: HALOT
  rationale: מָדוֹן denota contienda, disputa o pleito. «Motivo de pleito» conserva el matiz relacional e idiomático de ser el punto que provoca conflicto, con naturalidad en español.
- source_word: לִשְׁכֵנֵינוּ
  english_pob_choice: to our neighbors
  chosen_spanish: para nuestros vecinos
  alternatives_spanish:
  - a nuestros vecinos
  - entre nuestros vecinos
  lexicon: HALOT
  rationale: 'La preposición ל marca relación o dirección: somos hechos motivo de pleito en relación con nuestros vecinos. «Para nuestros vecinos» mantiene esa relación sin forzar una lectura espacial.'
- source_word: וְאֹיְבֵינוּ
  english_pob_choice: and our enemies
  chosen_spanish: y nuestros enemigos
  lexicon: HALOT
  rationale: La coordinación simple se conserva de forma directa para mantener el paralelismo del verso.
- source_word: יִלְעֲגוּ
  english_pob_choice: mock
  chosen_spanish: se burlan
  alternatives_spanish:
  - se mofan
  - se ríen de
  - nos escarnecen
  lexicon: HALOT
  rationale: El verbo לעג implica burlarse, mofarse o escarnecer. «Se burlan» es natural en español contemporáneo y conserva el tono de menosprecio del lamento.
- source_word: לָמוֹ
  english_pob_choice: them/us (textual/interpretive issue)
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de ellos
  - de aquéllos
  lexicon: HALOT
  rationale: Aunque el pronombre hebreo puede generar una tensión interpretativa en tradiciones de traducción, el contexto de la segunda cola del verso apunta a que los enemigos se burlan de Israel, es decir, «de nosotros». Esta solución sigue la revisión inglesa que corrigió la referencia final a la primera persona plural.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del contexto inglés, que corrigió el referente final de tercera persona a primera persona plural para ajustar el pronombre hebreo al sentido del verso. También se tuvo en cuenta que el hebreo presenta un valor relacional en לִשְׁכֵנֵינוּ y no una finalidad estricta.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de dos miembros: primero la condición de pleito frente a los vecinos, luego la burla de los enemigos.'
  - Se evitó «SEÑOR» porque el verso no contiene el Tetragrámaton.
  - «Vecinos» se eligió para לִשְׁכֵנֵינוּ por ser un equivalente más natural en español bíblico que «prójimos» en este contexto.
  - «Se burlan de nosotros» sigue la lectura final revisada del audit trail, en vez de reflejar la vieja posibilidad de «de ellos».
