  - 도유
  lexicon: BDAG
  rationale: χρῖσμα는 기름 부음의 행위·결과. 본 문맥에서 성령의 임재와 가르치심을 가리킨다. 「기름 부으심」으로 옮겨 행위의 무게를 살린다(2:27에서도 동일).
- source_word: τοῦ ἁγίου
  english_pob_choice: the Holy One
  chosen_korean: 그 거룩하신 분
  alternatives_korean:
  - 거룩하신 자
  lexicon: BDAG
  rationale: 기독론적 칭호 — 그리스도 또는 하나님을 가리킨다. 「그 거룩하신 분」으로 칭호적 무게를 살린다.
