revisions:
- from: 'Los emitas[a] habitaban allí[b] antiguamente: un pueblo grande, numeroso y alto como los anaceos.'
  to: Los Emim vivían allí[a], un pueblo grande, numeroso y alto como los anaquitas.
  rationale: 'Se ajusta el texto para seguir más de cerca la evidencia fuente y el rastro POB: «Emim» conserva la transliteración del etnónimo; «vivían allí» expresa naturalmente יָשְׁבוּ בָהּ; la nota [a] recoge la alternativa documentada para לְפָנִים sin sobrecargar el texto; y «anaquitas» ofrece un etnónimo español claro y ampliamente inteligible para כָּעֲנָקִים.'
