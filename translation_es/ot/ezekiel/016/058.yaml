revisions:
- from: Has llevado tu lujuria y tus abominaciones[a], declara Yahvé.
  to: Has cargado con tu conducta desvergonzada y tus abominaciones[a], declara Yahvé.
  rationale: Se reemplaza 'tu lujuria' por 'tu conducta desvergonzada' para reflejar mejor el valor de זִמָּה en Ezequiel como conducta sexualmente vergonzosa e infame, no solo deseo sensual. Se ajusta 'has llevado' a 'has cargado con' para un español más natural que aún preserve la ambigüedad entre culpa, castigo y consecuencia. Se mantienen 'abominaciones' y 'Yahvé' por fidelidad al hebreo y a la terminología del proyecto.
