translation:
  language: es
  text: 'planta, pero no todo lo que ha sido sembrado será salvado en su tiempo, ni todo lo que ha sido plantado echará raíz; así también no todos los que han sido sembrados en el mundo serán salvados." Y respondí y dije: "Si he hallado favor delante de ti, déjame hablar."'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: plantat
  english_pob_choice: plants
  chosen_spanish: planta
  alternatives_spanish:
  - siembra
  - planta
  lexicon: plantare
  rationale: El latín inicia con una forma verbal simple, sin introducir de nuevo la imagen ampliada del labrador; por eso en español se mantiene el verbo breve y directo, ‘planta’. ‘Siembra’ sería posible, pero desplaza el foco hacia el acto de sembrar más que hacia la continuidad de la comparación agrícola del contexto.
- source_word: saluabuntur
  english_pob_choice: will be saved
  chosen_spanish: será salvado
  alternatives_spanish:
  - serán preservados
  - serán salvados
  lexicon: salvare
  rationale: Conservo ‘salvado’ para seguir de cerca el valor del latín y la elección inglesa, evitando sustituirlo por ‘preservado’, que ya fue descartado en la revisión. En español, el singular de ‘todo’ exige ‘será salvado’.
- source_word: in tempore
  english_pob_choice: in its time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en su momento
  lexicon: tempus
  rationale: ‘En su tiempo’ refleja con más precisión la relación temporal del latín y preserva el paralelismo agrícola. ‘A su tiempo’ es idiomático, pero menos transparente respecto de la estructura original.
- source_word: radicabunt
  english_pob_choice: take root
  chosen_spanish: echará raíz
  alternatives_spanish:
  - arraigará
  - echarán raíz
  lexicon: radicare
  rationale: El verbo latino expresa literalmente el echar raíces; en español, ‘echar raíz’ reproduce bien la imagen. Mantengo el singular concuerdo con ‘todo lo que ha sido plantado’.
- source_word: seminati sunt
  english_pob_choice: have been sown
  chosen_spanish: han sido sembrados
  alternatives_spanish:
  - han sido sembradas
  - fueron sembrados
  lexicon: seminare
  rationale: ‘Sembrados’ conserva la pasiva y la metáfora agrícola. Dado que el latín usa masculino plural referido a personas, el español sigue esa referencia con ‘los que’.
- source_word: in saeculo
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - en la era
  - en este siglo
  lexicon: saeculum
  rationale: Aunque ‘saeculum’ puede ser ‘edad’ o ‘siglo’, la tradición auditable en inglés ya optó por ‘the world’, y en español ‘en el mundo’ conserva la lectura antropológica y existencial, sin forzar una jerga temporal más ambigua.
- source_word: loquar
  english_pob_choice: let me speak
  chosen_spanish: déjame hablar
  alternatives_spanish:
  - permitidme hablar
  - hablaré
  lexicon: loqui
  rationale: El subjuntivo latino expresa petición/permiso; ‘déjame hablar’ lo comunica de manera natural y respetuosa en español. ‘Hablaré’ debilitaría el matiz de súplica.
- source_word: gratiam
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - benevolencia
  lexicon: gratia
  rationale: Sigo la elección inglesa ‘favor’ porque aquí gratiam es una fórmula de cortesía ante un superior, no una referencia técnica a ‘gracia’ como término teológico. En español ‘favor’ evita sobrerreligiosizar la petición.
theological_decisions:
- issue: Destino de los ‘sembrados’ y alcance de la salvación
  english_pob_reading: those who have been sown in the world will not all be saved
  chosen_spanish_reading: los que han sido sembrados en el mundo no todos serán salvados
  alternative_spanish_readings:
  - todos los que han sido sembrados en el mundo no serán salvados
  - no todos los que han sido sembrados en el mundo serán salvados
  rationale: 'Mantengo la formulación negativa parcial del original y de la revisión inglesa: no se afirma que ninguno sea salvo, sino que no todos lo serán. El orden español conserva la tensión entre universalidad de la imagen (‘los que han sido sembrados’) y la limitación del resultado (‘no todos’).'
  doctrine_reference: 2 Esdras 8:41; comparación agrícola y juicio escatológico
- issue: ‘Favor’ frente a ‘gracia’ en la petición final
  english_pob_reading: If I have found favor before you, let me speak
  chosen_spanish_reading: Si he hallado favor delante de ti, déjame hablar
  alternative_spanish_readings:
  - si he hallado gracia delante de ti, déjame hablar
  - si he hallado benevolencia delante de ti, permíteme hablar
  rationale: La frase es una fórmula de acceso respetuoso a un superior; traducirla como ‘gracia’ introduciría un peso teológico que el contexto inmediato no exige. ‘Favor’ preserva el tono de súplica y cortesía del latín.
  doctrine_reference: Fórmula de cortesía reverente; no doctrinal
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que corrige la expansión indebida del inglés anterior: el latín de 2 Esdras 8:41 no repite la escena completa del labrador sembrando muchas semillas, sino que abre con una afirmación breve (‘plantat’) y luego desarrolla el paralelo entre lo sembrado, lo plantado y los que han sido sembrados en el mundo. También se respetó la corrección sobre ‘in tempore’ → ‘en su tiempo’ y la coherencia de ‘saluabuntur’ como ‘será/serán salvado(s)’ en ambos miembros.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ según la norma del proyecto solo cuando el texto lo exija; aquí no aparece.
  - Se usa ‘Mesías/Cristo’ no aplica a este versículo.
  - Se conserva el paralelismo verbal y nominal del latín sin añadir material narrativo ajeno.
  - La nota al pie marca solo la primera palabra por ser la única alternativa léxica relevante en esta línea.
