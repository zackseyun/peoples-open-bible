revisions:
- from: 'Cuando ella se lo acercó para que comiera[a], él la asió y le dijo: «Ven, acuéstate conmigo, hermana mía».'
  to: 'Cuando ella le acercó la comida para que comiera[a], él la sujetó y le dijo: «Ven, acuéstate conmigo, hermana mía».'
