translation:
  language: es
  text: 'Aquel día sacrificaron a Yahvé del botín[a] que habían traído: setecientos bovinos y siete mil ovejas[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del despojo». El término hebreo se refiere a bienes tomados como botín de guerra.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo puede significar más ampliamente «animales de rebaño» o ganado menor, no solo ovejas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבְּחוּ
  english_pob_choice: they sacrificed
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - ofrecieron sacrificios
  - inmolaron ritualmente
  lexicon: HALOT
  rationale: En contexto cultual, זבח se refiere a ofrecer sacrificios animales. «Sacrificaron» es natural en español y conserva el sentido ritual sin añadir perífrasis innecesaria.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: La pauta del proyecto en español usa «Yahvé» para יהוה. La preposición ל introduce el destinatario del sacrificio, por eso en español se expresa con «a».
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: Aquel día
  alternatives_spanish:
  - En aquel día
  - Ese día
  lexicon: HALOT
  rationale: La expresión temporal se vierte de modo natural con «Aquel día», que conserva la referencia deíctica del hebreo sin sonar forzada.
- source_word: מִן הַשָּׁלָל
  english_pob_choice: from the spoil
  chosen_spanish: con el botín
  alternatives_spanish:
  - del botín
  - de lo tomado como botín
  lexicon: HALOT
  rationale: El hebreo indica el origen de los animales ofrecidos, procedentes del botín de guerra. En español, «con el botín que habían traído» comunica bien ese trasfondo; «botín» preserva el valor lexical de שָׁלָל.
- source_word: הֵבִיאוּ
  english_pob_choice: they had brought
  chosen_spanish: habían traído
  alternatives_spanish:
  - trajeron
  - habían llevado
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja que el botín ya estaba traído antes de la acción de sacrificar, como en el audit trail inglés.
- source_word: בָּקָר
  english_pob_choice: cattle
  chosen_spanish: bovinos
  alternatives_spanish:
  - ganado vacuno
  - cattle
  lexicon: HALOT
  rationale: בָּקָר es un término colectivo para animales bovinos. «Bovinos» mantiene la amplitud semántica mejor que «bueyes» u «oxen», y evita restringir indebidamente el referente.
- source_word: שְׁבַע מֵאוֹת
  english_pob_choice: seven hundred
  chosen_spanish: setecientos
  alternatives_spanish:
  - siete cientos
  lexicon: HALOT
  rationale: Número cardinal directo y transparente.
- source_word: וְצֹאן
  english_pob_choice: and seven thousand sheep
  chosen_spanish: y siete mil animales de rebaño
  alternatives_spanish:
  - y siete mil ovejas
  - y siete mil ganado menor
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y cabras, es decir, ganado menor. Dado que el inglés POB preserva la amplitud con una nota, el español la expresa en el cuerpo como «animales de rebaño» para no restringir el sentido a ovejas únicamente.
- source_word: שִׁבְעַת אֲלָפִים
  english_pob_choice: seven thousand
  chosen_spanish: siete mil
  alternatives_spanish:
  - siete millares
  lexicon: HALOT
  rationale: Número cardinal directo y estándar en español bíblico contemporáneo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue la convención doctrinal del proyecto para representar el Tetragrámaton con «Yahvé», manteniendo visible el nombre del pacto en lugar de sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de צֹאן
  english_pob_reading: sheep, with note that the term can more broadly mean flock animals
  chosen_spanish_reading: animales de rebaño
  alternative_spanish_readings:
  - ovejas
  - ganado menor
  rationale: El hebreo permite un alcance más amplio que «ovejas». En español, «animales de rebaño» conserva esa amplitud y evita una restricción innecesaria que borraría la tensión lexical señalada por el POB en inglés.
  doctrine_reference: Principio de fidelidad lexical y preservación de ambigüedad documentada
translation_notes:
  revision_awareness: Se tomó en cuenta que el texto inglés del POB ya había sido revisado y mantenido sin cambios sustanciales, con acuerdo alto en la verificación cruzada. La versión española conserva esa lectura y traslada sus decisiones léxicas principales sin introducir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar español del proyecto para יהוה.
  - Se prefirió «sacrificaron» por su valor ritual y claridad.
  - «Botín» y la nota correspondiente preservan el matiz de שָׁלָל.
  - «Animales de rebaño» mantiene la amplitud de צֹאן sin reducirlo a «ovejas».
  - La puntuación con dos puntos refleja bien la relación entre el sacrificio y la enumeración de las víctimas ofrecidas.
