    rationale: La documentación fuente ya resolvió que el referente debe tratarse como objeto inanimado en el texto principal. Conviene alinear el español con esa rationale.
  revised_spanish_text: Aun eso será llevado a Asiria como tributo para el rey Yareb[a]; Efraín recibirá vergüenza[b], e Israel se avergonzará de su consejo.
  revised_footnotes:
