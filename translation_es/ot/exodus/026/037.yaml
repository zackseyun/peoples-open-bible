translation:
  language: es
  text: Y harás para la pantalla[a] cinco columnas de madera de acacia, y las revestirás de oro; sus ganchos serán de oro; y fundirás para ellas cinco bases de bronce[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cortina’ o ‘velo’ para ‘pantalla’; el término hebreo aquí se refiere al colgante de la entrada, distinto del velo interior del Lugar Santísimo.
    reason: lexical_alternative
  - marker: b
    text: O ‘zócalos de bronce’ para ‘bases de bronce’.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמָּסָךְ / מָּסָךְ
  english_pob_choice: screen
  chosen_spanish: pantalla
  alternatives_spanish:
  - cortina
  - velo
  - mampara
  lexicon: HALOT
  rationale: El contexto es la entrada del tabernáculo, una cobertura de acceso distinta del velo interior. En español, ‘pantalla’ comunica bien la función de separador/entrada sin confundirla con el velo del Lugar Santísimo. ‘Cortina’ y ‘velo’ son posibles, pero pueden borrar esa distinción funcional.
- source_word: עַמּוּדֵי שִׁטִּים
  english_pob_choice: pillars of acacia wood
  chosen_spanish: columnas de madera de acacia
  alternatives_spanish:
  - postes de madera de acacia
  - pilares de madera de acacia
  lexicon: HALOT
  rationale: ‘עַמּוּדִים’ admite ‘columnas’ o ‘pilares’; en español ‘columnas’ suena natural y solemne en lenguaje de construcción sagrada. ‘Madera de acacia’ refleja con claridad שִׁטִּים sin añadir material ajeno.
- source_word: וְצִפִּיתָ אֹתָם זָהָב
  english_pob_choice: overlay them with gold
  chosen_spanish: las revestirás de oro
  alternatives_spanish:
  - las cubrirás de oro
  - las platearás de oro
  lexicon: HALOT
  rationale: צפה aquí describe un recubrimiento metálico. ‘Revestir’ conserva la idea de cubrir/forrar con una capa de oro y suena natural en español bíblico moderno. ‘Platear’ es más técnico, pero menos transparente para lectura pública.
- source_word: וָוֵיהֶם
  english_pob_choice: their hooks
  chosen_spanish: sus ganchos
  alternatives_spanish:
  - sus argollas
  - sus clavijas
  - sus ganchos/argollas
  lexicon: HALOT
  rationale: וָוִים en este entorno de cortinajes y suspensión se refiere a piezas para colgar o sujetar. ‘Ganchos’ es la equivalencia más directa y comprensible en español, manteniendo la función del herraje.
- source_word: אַדְנֵי נְחֹשֶׁת
  english_pob_choice: bases of bronze
  chosen_spanish: bases de bronce
  alternatives_spanish:
  - zócalos de bronce
  - sockets de bronce
  - pedestales de bronce
  lexicon: HALOT
  rationale: ‘Bases’ sigue de cerca el valor constructivo de אַדְנֵי y evita tecnicismos menos transparentes. ‘Bronce’ es preferible a ‘latón’ o ‘brass’ por exactitud metalúrgica y consistencia con la terminología POB.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: En contextos del tabernáculo, נְחֹשֶׁת se vierte mejor como ‘bronce’ en español contemporáneo. ‘Cobre’ estrecha demasiado el material; ‘latón’ es anacrónico e impreciso.
- source_word: וְיָצַקְתָּ לָהֶם
  english_pob_choice: you shall cast for them
  chosen_spanish: les fundirás
  alternatives_spanish:
  - les echarás
  - les vaciarás
  - les harás fundir
  lexicon: HALOT
  rationale: יצק en metalistería describe la fundición/vaciado de piezas. ‘Fundir’ comunica el proceso de fabricar las bases metálicas para las columnas. ‘Vaciar’ también sería posible, pero ‘fundir’ resulta más idiomático en español bíblico técnico.
theological_decisions:
- issue: Distinción entre la pantalla de entrada y el velo interior
  english_pob_reading: screen refers to the entrance hanging, distinct from the inner veil of the Most Holy Place
  chosen_spanish_reading: pantalla
  alternative_spanish_readings:
  - cortina
  - velo
  rationale: La versión española mantiene la distinción funcional que el POB documenta. ‘Pantalla’ evita confundir esta pieza con el ‘velo’ interior y preserva la arquitectura ritual del tabernáculo.
  doctrine_reference: Éxodo 26; cf. la diferenciación interna del mobiliario y separaciones del tabernáculo en la Torá
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el cotejo final indica alta concordancia y sin cambios necesarios. La presente redacción sigue de cerca el trazado auditado del POB, ajustándolo a un español natural sin perder las distinciones léxicas del original.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto original lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene ‘bronce’ de forma consistente para נְחֹשֶׁת.
  - Se conserva el registro técnico-litúrgico sin recurrir a formulaciones eclesiásticas no sustentadas por el hebreo.
  - 'Los objetos de soporte se traducen con terminología comprensible y uniforme: ‘columnas’, ‘ganchos’, ‘bases’.'
