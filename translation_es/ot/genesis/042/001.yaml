translation:
  language: es
  text: 'Cuando Jacob vio que había grano en Egipto[a], les dijo a sus hijos: «¿Por qué siguen mirándose unos a otros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué se muestran?». El verbo hebreo puede entenderse de otra manera, pero en este contexto probablemente se refiere a que los hermanos se miran entre sí con vacilación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y ... vio
  - Ahora ... vio
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Cuando» expresa con naturalidad la relación temporal con el discurso siguiente sin perder el valor narrativo del hebreo.
- source_word: כִּי יֶשׁ
  english_pob_choice: that there was
  chosen_spanish: que había
  alternatives_spanish:
  - que hay
  - que existía
  lexicon: HALOT
  rationale: La construcción existencial introduce el contenido percibido por Jacob. En narración pasada, «que había» es la formulación más natural y fiel al valor existencial.
- source_word: שֶׁבֶר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - alimento
  - trigo
  - cereal
  lexicon: HALOT
  rationale: En el relato de José, שֶׁבֶר designa provisión de grano para compra en tiempo de hambre. «Grano» conserva mejor el sentido específico que «alimento» y evita el arcaísmo de otras opciones.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: La preposición locativa בְּ con el nombre propio se traduce de forma directa y natural como «en Egipto».
- source_word: לְבָנָיו
  english_pob_choice: to his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos, los varones
  lexicon: HALOT
  rationale: Aunque el hebreo forma un masculino plural que aquí se refiere a los hijos varones, «hijos» es un equivalente natural en español y no introduce una restricción innecesaria en la frase narrativa; el contexto inmediato deja claro que se trata de los hermanos.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Para qué
  lexicon: HALOT
  rationale: La interrogativa directa se conserva de manera sencilla y precisa.
- source_word: תִּתְרָאוּ
  english_pob_choice: do you keep looking at one another
  chosen_spanish: se quedan mirándose unos a otros
  alternatives_spanish:
  - se miran unos a otros
  - se están mirando unos a otros
  - se muestran
  lexicon: HALOT
  rationale: El hitpael de ראה en este contexto sugiere una acción recíproca e indecisa entre los hermanos. «Se quedan mirándose unos a otros» comunica mejor la idea de inacción/hesitación que una traducción más literal y mantiene la tensión de la escena.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura revisada de alta concordancia del texto fuente y de la auditoría inglesa: la frase de acción narrativa y la alternativa léxica de תִּתְרָאוּ no requieren cambio sustancial. La redacción española sigue la decisión óptima-equivalente, conservando el matiz de hesitación que el inglés POB identificó.'
  spanish_consistency_notes:
  - Se usó «grano» para שֶׁבֶר, coherente con el contexto de hambre y compra de provisiones.
  - Se conservó «Jacob» como nombre propio por consistencia con el texto fuente y la tradición textual del pasaje.
  - Se prefirió «hijos» para לְבָנָיו, sin forzar una perífrasis de género, porque el contexto narrativo ya delimita el grupo como los hermanos.
