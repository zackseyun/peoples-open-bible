review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del griego: ἀνίκητος como cualidad de no ser vencido, γὰρ como explicación, ὦ τύραννε como vocativo directo, y ἡ εὐσεβὴς ἐπιστήμη como la noción programática de entendimiento/razón moldeada por reverencia a Dios. Sin embargo, «indomable» se desvía ligeramente de la fuerza más exacta de ἀνίκητος, que apunta a imposibilidad de ser vencido más que a imposibilidad de ser domesticado o domado.'
  spanish_quality_summary: El español es legible y digno, pero «Porque indomable es» suena algo rígido y «la piadosa comprensión» resulta menos natural y menos clara que una formulación con «entendimiento». Además, «oh» lleva tilde en uso interjectivo/vocativo. Una leve revisión mejora precisión y fluidez sin apartarse del texto fuente.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión clave es εὐσεβὴς ἐπιστήμη: conviene mantener la síntesis de reverencia a Dios y discernimiento racional. «piadoso entendimiento» o «entendimiento piadoso» se alinea mejor con el POB inglés («godly understanding») que «piadosa comprensión».'
  issues:
  - severity: medium
    issue: «indomable» para ἀνίκητος
    rationale: Aunque comunica resistencia, en español suele evocar algo que no puede ser domado o sometido, no específicamente algo invencible o imposible de vencer. «Invencible» o «imposible de vencer» se acercan más al valor léxico de ἀνίκητος.
  - severity: medium
    issue: «la piadosa comprensión» para ἡ εὐσεβὴς ἐπιστήμη
    rationale: «Comprensión» en español puede sugerir empatía o mera captación, y la secuencia suena menos idiomática. «Entendimiento piadoso» preserva mejor la combinación de discernimiento racional y reverencia religiosa.
  - severity: low
    issue: Acentuación de «oh»
    rationale: En español la interjección vocativa se escribe «¡oh!» cuando es interjección enfática, pero en una frase como esta la forma asentada es «oh» sin tilde; «oh tirano» es preferible a «oh tirano» con acento inexistente. El borrador muestra «oh», lo cual está bien, pero conviene mantenerlo así en la revisión final con mejor puntuación y fraseo.
  revised_spanish_text: Porque el entendimiento piadoso[a] es invencible, oh tirano.
