translation:
  language: es
  text: De la misma manera[a], sus dioses de madera, cubiertos de oro y plata, son como un espantapájaros en un jardín, sobre el cual se posa toda ave, y también como un cadáver arrojado en la oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un poste/figura de vigilancia en un jardín'. El término griego es raro, y la imagen es la de un objeto colocado en un jardín sobre el cual se posa toda ave libremente.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν αὐτὸν τρόπον
  english_pob_choice: In the same way
  chosen_spanish: De la misma manera
  alternatives_spanish:
  - Asimismo
  - Igualmente
  lexicon: LSJ
  rationale: Expresa de forma natural la comparación introductoria y conserva el valor relacional del griego sin volverlo pesado en español.
- source_word: βάμψῳ
  english_pob_choice: a scarecrow
  chosen_spanish: un espantapájaros
  alternatives_spanish:
  - un poste
  - una figura de vigilancia en un jardín
  lexicon: LSJ
  rationale: La imagen del contexto —un objeto en un jardín sobre el que se posan las aves— se comunica bien con 'espantapájaros' en español. Mantiene la rareza e inercia del referente, aunque el término griego puede ser más literalmente un poste o figura.
- source_word: ἐν κήπῳ
  english_pob_choice: in a garden
  chosen_spanish: en un jardín
  alternatives_spanish:
  - en un huerto
  lexicon: LSJ
  rationale: κήπος admite 'jardín' de manera directa; 'huerto' estrecharía el sentido sin necesidad.
- source_word: ἐφ’ ἧς πᾶν τὸ ὄρνεον ἐπικάθηται
  english_pob_choice: on which every bird sits
  chosen_spanish: sobre el cual se posa toda ave
  alternatives_spanish:
  - en el que se posa toda ave
  - sobre el que se sienta toda ave
  lexicon: LSJ
  rationale: '''Se posa'' refleja mejor la acción de las aves en un objeto fijo y mantiene la imagen de posarse/perchar sin añadir interpretación.'
- source_word: τῷ νεκρῷ ἐρριμμένῳ ἐν σκότει
  english_pob_choice: a dead body thrown out in the dark
  chosen_spanish: a un cadáver arrojado en la oscuridad
  alternatives_spanish:
  - a un muerto echado en la oscuridad
  - a un cadáver arrojado en lo oscuro
  lexicon: LSJ
  rationale: '''Cadáver'' expresa con precisión νεκρός en este contexto; ''arrojado'' conserva ἐρριμμένῳ; ''en la oscuridad'' traduce ἐν σκότει de forma natural y no metafórica.'
- source_word: ἀφωμοίωνται
  english_pob_choice: are made like
  chosen_spanish: son hechos semejantes a
  alternatives_spanish:
  - son asemejados a
  - quedan comparados con
  lexicon: LSJ
  rationale: La pasiva comparativa se mantiene clara en español con 'son hechos semejantes a', sin perder el carácter de comparación formal del verbo.
- source_word: οἱ θεοὶ αὐτῶν ξύλινοι καὶ περίχρυσοι καὶ περιάργυροι
  english_pob_choice: their wooden gods overlaid with gold and silver
  chosen_spanish: sus dioses de madera, cubiertos de oro y plata
  alternatives_spanish:
  - sus dioses de madera, recubiertos de oro y plata
  - sus dioses de madera, sobrepuestos de oro y plata
  lexicon: LSJ
  rationale: '''De madera'' conserva ξύλινοι como sustancia; ''cubiertos de oro y plata'' comunica el recubrimiento/overlayer de περίχρυσοι y περιάργυροι de forma idiomática en español. Se evita ''Cristo'' o terminología tradicional ajena al texto porque aquí se trata de ídolos.'
theological_decisions:
- issue: Carácter polémico contra la idolatría
  english_pob_reading: 'The verse compares idols to lifeless, useless objects: a garden scarecrow/post and a discarded corpse.'
  chosen_spanish_reading: 'El versículo compara a los ídolos con objetos inertes e inútiles: un espantapájaros en un jardín y un cadáver arrojado en la oscuridad.'
  alternative_spanish_readings:
  - Los compara con un poste de jardín y un cadáver abandonado en tinieblas.
  - Los compara con una figura de vigilancia en un jardín y un cuerpo muerto echado en la oscuridad.
  rationale: 'La traducción conserva la fuerza polémica del pasaje sin suavizar la acusación: los dioses de madera son equiparados con cosas sin vida y sin poder.'
  doctrine_reference: 'Principio POB: primacía del original y preservación del contraste teológico contra la idolatría'
translation_notes:
  revision_awareness: El inglés POB permaneció sin cambios en la última revisión; el único punto sensible es βάμψῳ, donde se mantiene la decisión interpretativa de una figura de jardín/espantapájaros y se conserva la alternativa literal en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - '''Dioses'' se conserva en plural porque el griego habla de οἱ θεοὶ αὐτῶν.'
  - '''Cadáver'' y ''cadáver arrojado'' mantienen el matiz de un cuerpo desechado, no de muerte heroica o sepultura.'
  - La nota al pie marca la rareza léxica del término griego sin imponer una sola solución en el texto principal.
