translation:
  language: es
  text: porque son una hermosa guirnalda para tu cabeza y collares para tu cuello[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una guirnalda de favor» para tu cabeza.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cadenas» para tu cuello.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Introduce la razón de la exhortación anterior; en español, «porque» expresa de forma natural esa relación causal.
- source_word: לִוְיַת
  english_pob_choice: wreath
  chosen_spanish: guirnalda
  alternatives_spanish:
  - corona
  - wreath
  lexicon: HALOT
  rationale: El sustantivo sugiere algo entrelazado o ceñido. «Guirnalda» conserva la imagen ornamental y funciona bien con «para tu cabeza» sin volver el español artificial.
- source_word: חֵן
  english_pob_choice: graceful
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - hermosura
  - gracia
  lexicon: HALOT
  rationale: El hebreo puede describir la cualidad atractiva o encantadora del adorno. «De gracia» mantiene el sustantivo de la raíz hebrea y deja abierta la ambigüedad entre belleza/encanto y favor.
- source_word: הֵם
  english_pob_choice: they are
  chosen_spanish: son
  alternatives_spanish:
  - ellos son
  - ellas son
  lexicon: HALOT
  rationale: El español no requiere pronombre explícito en la cópula; el referente son la instrucción del padre y la enseñanza de la madre del versículo anterior.
- source_word: לְרֹאשֶׁךָ
  english_pob_choice: for your head
  chosen_spanish: para tu cabeza
  alternatives_spanish:
  - sobre tu cabeza
  - en tu cabeza
  lexicon: HALOT
  rationale: «Para» reproduce bien la relación de adorno o destinación y suena natural con la imagen de la guirnalda.
- source_word: וַעֲנָקִים
  english_pob_choice: necklaces
  chosen_spanish: collares
  alternatives_spanish:
  - collares
  - cadenas
  - pendientes
  lexicon: HALOT
  rationale: El plural hebreo se conserva con un plural español. «Collares» comunica adorno de cuello con claridad; «cadenas» quedaría como alternativa más cercana al posible matiz de adornos colgantes.
- source_word: לְגַרְגְּרֹתֶיךָ
  english_pob_choice: for your neck
  chosen_spanish: para tu cuello
  alternatives_spanish:
  - en tu cuello
  - alrededor de tu cuello
  - para tu garganta
  lexicon: HALOT
  rationale: Aunque el hebreo puede aludir más literalmente a la garganta/cuello, «cuello» es la expresión natural en español en un contexto de joyería o adorno.
translation_notes:
  revision_awareness: Redacción estable sin cambios relevantes respecto del control anterior; se mantiene la imagen ornamental del hebreo y la ambigüedad léxica documentada en חֵן y עֲנָקִים.
  spanish_consistency_notes:
  - Se conserva el tono sapiencial y la estructura paralela del verso.
  - Se prefirió «guirnalda» y «collares» por naturalidad en español, sin perder la metáfora de adorno.
  - Se evita sustituir «gracia» por un equivalente teológicamente cerrado; la nota preserva la lectura alternativa de «favor».
