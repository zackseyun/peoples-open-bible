id: PSA.66.15
reference: Psalms 66:15
source:
  edition: WLC
  text: עֹ֘ל֤וֹת מֵחִ֣ים אַעֲלֶה לָּ֭/ךְ עִם קְטֹ֣רֶת אֵילִ֑ים אֶ֥עֱשֶֽׂה בָקָ֖ר עִם עַתּוּדִ֣ים סֶֽלָה־־־׃
translation:
  text: I will offer to you burnt offerings of fattened animals[a], with the smoke of rams; I will prepare cattle and goats[d][c][b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the aroma of rams'; the Hebrew term can refer to the smoke or odor produced by burning a sacrifice.
    reason: lexical_alternative
  - marker: b
    text: '''Goats'' is more specifically ''male goats'' or ''he-goats.'''
    reason: lexical_alternative
  - marker: c
    text: '''Selah'' is traditionally left untranslated because its exact meaning is uncertain, possibly a musical or liturgical notation.'
    reason: cultural_note
  - marker: d
    text: Or 'cattle with goats'.
    reason: previous_rendering
lexical_decisions:
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard sacrificial term for offerings wholly burned on the altar. 'Burnt offerings' is the natural and established English equivalent without unnecessary expansion.
- source_word: מֵחִים
  chosen: fattened animals
  alternatives:
  - fat ones
  - marrow-fed animals
  lexicon: HALOT
  rationale: The noun refers to well-fed/fat animals suitable for costly sacrifice. 'Fattened animals' communicates the sense clearly in modern English better than the opaque 'fat ones.'
- source_word: אַעֲלֶה לָךְ
  chosen: I will offer to you
  alternatives:
  - I will bring up to you
  - I will cause to ascend to you
  lexicon: HALOT
  rationale: The Hiphil of עלה in sacrificial context means to offer up. 'Offer to you' conveys the idiomatic sacrificial sense while preserving the direct address to God.
- source_word: עִם קְטֹרֶת אֵילִים
  chosen: with the smoke of rams
  alternatives:
  - with the incense/aroma of rams
  - with the burning of rams
  lexicon: HALOT
  rationale: קְטֹרֶת can denote smoke arising from burning, not only incense in the narrow cultic sense. Since rams themselves are in view, 'smoke of rams' best fits the sacrificial imagery; 'incense of rams' would mislead English readers.
- source_word: אֶעֱשֶׂה
  chosen: I will prepare
  alternatives:
  - I will offer
  - I will sacrifice
  - I will make
  lexicon: HALOT
  rationale: עשה here functions idiomatically in sacrificial context. 'I will prepare' preserves the verbal distinction from the earlier 'offer' while still fitting the context of presenting sacrifices.
- source_word: בָקָר
  chosen: cattle
  alternatives:
  - bulls
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: The singular collective noun commonly denotes bovine livestock generally. 'Cattle' preserves the collective sense better than the more specific 'bulls,' which some translations supply interpretively.
- source_word: עִם עַתּוּדִים
  chosen: with goats
  alternatives:
  - with male goats
  - with he-goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers specifically to male goats, often he-goats or bucks. 'Goats' keeps the line readable; the more specific male sense is worth preserving in a footnote.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force remains uncertain; transliteration is preferable to speculative translation.
