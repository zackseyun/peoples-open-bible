  to: 'Y Yahvé dijo a Moisés[a]: «Mira, estás por reunirte con tus padres. Entonces este pueblo se levantará y se prostituirá tras los dioses extranjeros de la tierra, en cuyo medio van a entrar[b]. Me abandonarán y quebrantarán mi pacto que hice con ellos[c]»'
  rationale: La revisión corrige un modismo español potencialmente engañoso, recupera el matiz espacial de 'en cuyo medio', y sigue la decisión auditada del POB de aclarar los singulares colectivos hebreos con plurales naturales en español. También mantiene 'Yahvé' y la metáfora fuerte de la prostitución idolátrica.
