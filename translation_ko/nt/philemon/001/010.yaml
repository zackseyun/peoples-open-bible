id: PHM.1.10
reference: Philemon 1:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: παρακαλῶ σε περὶ τοῦ ἐμοῦ τέκνου, ὃν ἐγέννησα ἐν τοῖς ⸀δεσμοῖς Ὀνήσιμον,
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/010.yaml
  text: I appeal to you concerning my child[a], Onesimus, whom I fathered in my chains[b],
  footnotes:
  - marker: a
    text: Or 'whom I became a father to in my imprisonment.' The Greek uses a birth/begetting metaphor for Paul's spiritual relationship to Onesimus.
    reason: lexical_alternative
  - marker: b
    text: '''In my chains'' may also be understood as ''in imprisonment''; the Greek keeps the concrete image of bonds.'
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 그대에게 나의 자식[a], 곧 내가 결박 중에[b] 낳은 오네시모에 관하여 호소합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「내가 갇혀 있는 동안 아버지가 되어 준 자」. 헬라어는 바울이 오네시모와 맺은 영적 관계를 낳음·출생의 비유로 표현한다.
    reason: lexical_alternative
  - marker: b
    text: 「결박 중에」는 「옥살이 중에」로도 이해될 수 있으나, 헬라어는 사슬의 구체적 이미지를 보존한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλῶ
  english_pob_choice: I appeal
  chosen_korean: 호소합니다
  alternatives_korean:
  - 권면합니다
  - 청합니다
  lexicon: BDAG
  rationale: 9절과 일관되게 「호소합니다」.
- source_word: σε
  english_pob_choice: you
  chosen_korean: 그대에게
  lexicon: BDAG
  rationale: 단수 2인칭. 빌레몬 합쇼체 호칭은 「그대」.
- source_word: περὶ τοῦ ἐμοῦ τέκνου
  english_pob_choice: concerning my child
  chosen_korean: 나의 자식 ... 에 관하여
  alternatives_korean:
  - 내 자식에 관하여
  - 나의 친자식에 관하여
  lexicon: BDAG
  rationale: περί + 속격은 「~에 관하여」. ἐμοῦ의 강조성(소유대명사형)은 「나의」로 충분히 살아난다. τέκνον은 영적 자녀 비유이므로, 한국어 「자식」이 「자녀」보다 부성적·정서적 무게를 자연스럽게 담아낸다.
- source_word: τέκνου
  english_pob_choice: child
  chosen_korean: 자식
  alternatives_korean:
  - 자녀
  - 아들
  lexicon: BDAG
  rationale: τέκνον은 성별 중립적. 오네시모는 남성이지만 「아들」(υἱός 아님)로 좁히지 않는다. 「자식」은 한국어에서 「자녀」보다 정서적 친밀함을 담아낸다.
- source_word: ὃν ἐγέννησα
  english_pob_choice: whom I fathered
  chosen_korean: 내가 ... 낳은
  alternatives_korean:
  - 내가 낳아 준
  - 내가 영적으로 낳은
  lexicon: BDAG
  rationale: γεννάω는 문자적으로 「낳다/출생시키다」. 바울의 영적 부성 비유는 「낳다」가 가장 직접적이며, 「아비가 되다」 식의 해석적 풀이는 피한다.
- source_word: ἐν τοῖς δεσμοῖς
  english_pob_choice: in my chains
  chosen_korean: 결박 중에
  alternatives_korean:
  - 사슬 중에
  - 갇힌 중에
  lexicon: BDAG
  rationale: δεσμοί는 문자적으로 「사슬·결박」이며 환유적으로 「옥살이」를 가리킨다. 「결박 중에」가 구체적 이미지와 자연스러움을 함께 살린다.
- source_word: Ὀνήσιμον
  english_pob_choice: Onesimus
  chosen_korean: 오네시모
  lexicon: BDAG
  rationale: 한국 성서 전통의 정착된 음역.
theological_decisions:
- issue: 바울과 오네시모의 관계
  chosen_reading: 「낳음」의 영적 부성 비유를 그대로 보존하되, 본문에 없는 회심·전도 등의 명시 표현은 더하지 않음
  alternative_readings:
  - 갇혀 있는 동안 영적 아버지가 된 자
  - 옥중에서 내 자식이 된 자
  rationale: 본문은 바울이 오네시모를 신앙으로 이끈 것을 강하게 함의하지만, 헬라어는 ἐγέννησα라는 비유로 표현할 뿐 명시적 회심 정형을 쓰지 않는다. 본 번역은 비유적·관계적 무게를 보존하고 본문이 말하지 않는 것을 더하지 않는다.
  doctrine_reference: 'Translation philosophy §1, §3'
