base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/012.yaml
  text: 'And you[a], son of man, say to the sons of your people: The righteousness of the righteous will not deliver him in the day of his transgression, and the wickedness of the wicked—he will not stumble by it in the day he turns from his wickedness[c][b]; and the righteous will not be able to live by it in the day of his sin.'
  footnotes:
  - marker: a
    text: Or, more dynamically, 'your people.' The Hebrew says 'the sons of your people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not fall because of it.' The Hebrew uses the image of stumbling.
    reason: lexical_alternative
  - marker: c
    text: That is, by his prior righteousness. The Hebrew pronoun is feminine singular, matching 'righteousness.'
    reason: lexical_alternative
