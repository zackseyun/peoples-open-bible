base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/006/025.yaml
  text: And it will be righteousness for us if we are careful to do all this commandment before Yahweh our God[b][a], as he has commanded us.
  footnotes:
  - marker: a
    text: Or 'justice for us.' The Hebrew צְדָקָה can denote what is right or just, though 'righteousness' best fits this covenantal context.
    reason: lexical_alternative
  - marker: b
    text: Or 'this whole commandment.' The singular 'commandment' likely refers to the instruction as a unified whole.
    reason: lexical_alternative
