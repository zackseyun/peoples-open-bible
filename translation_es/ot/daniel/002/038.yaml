  to: Y en todo lugar donde habitan los hijos de los hombres[a], las bestias del campo y las aves de los cielos[c], él los ha entregado en tu mano y te ha puesto como gobernante sobre todos ellos[b]. Tú eres la cabeza de oro.
  rationale: Se reemplazó «todo eso» por «los» para reflejar con mayor precisión el objeto plural implícito en el arameo y preservado en el inglés POB («them»), refiriéndose a las criaturas enumeradas. También se ajustó la puntuación para mantener una oración más natural en español sin alterar el sentido. El resto del versículo puede conservarse tal como está, pues representa bien la estructura y el tono del original.
