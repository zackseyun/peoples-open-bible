    rationale: עַל puede indicar colocación/adhesión, pero en español de descripción de objetos cultuales «para el pectoral» o «en el pectoral» suele leerse con mayor naturalidad. «Para» evita imaginar una localización superficial imprecisa.
  revised_spanish_text: E hicieron para el pectoral cadenas trenzadas[a], trabajadas como cuerdas, de oro puro.
  revised_footnotes:
