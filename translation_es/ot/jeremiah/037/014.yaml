base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/037/014.yaml
  text: But Jeremiah said[a], “That is a lie; I am not defecting to the Chaldeans.” But he would not listen to him[c][b], and Irijah seized Jeremiah and brought him to the officials.
  footnotes:
  - marker: a
    text: Or “I am not going over to the Chaldeans” or “I am not defecting to the Chaldeans.”
    reason: lexical_alternative
  - marker: b
    text: “Chaldeans” refers to the Babylonian forces.
    reason: cultural_note
  - marker: c
    text: Or “the princes”; the Hebrew term can denote high-ranking rulers or officials.
    reason: lexical_alternative
