translation:
  language: es
  text: Tú sabes cuándo me siento y cuándo me levanto; entiendes mi pensamiento[a] desde lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Desde lejos» puede referirse a distancia espacial, o bien a que Dios discierne el pensamiento mucho antes de que se exprese.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתָּ
  english_pob_choice: know
  chosen_spanish: sabes
  alternatives_spanish:
  - has sabido
  - conoces
  - sabes bien
  lexicon: HALOT
  rationale: El perfecto qal en 2ms dirigido a Dios expresa conocimiento pleno y continuo; en español, «sabes» comunica de manera natural ese valor durativo sin sonar forzado. Mantiene el trato directo del salmo.
- source_word: שִׁבְתִּי
  english_pob_choice: my sitting down
  chosen_spanish: mi sentarme
  alternatives_spanish:
  - mi sentarme y descansar
  - cuando me siento
  - mi asiento
  lexicon: HALOT
  rationale: La forma nominal/verbal con sufijo de 1cs se refiere al acto de sentarse. «Mi sentarme» conserva la relación con «mi levantarme» y reproduce bien el paralelismo merístico del hebreo.
- source_word: וְקוּמִי
  english_pob_choice: my rising up
  chosen_spanish: mi levantarme
  alternatives_spanish:
  - mi alzarme
  - cuando me levanto
  - mi puesta en pie
  lexicon: HALOT
  rationale: «Levantarse» transmite el movimiento ordinario de ponerse en pie y mantiene la pareja con «sentarme». Es una equivalencia natural y suficientemente cercana al hebreo.
- source_word: בַּנְתָּה
  english_pob_choice: understand
  chosen_spanish: entiendes
  alternatives_spanish:
  - disciernes
  - comprendes
  - consideras
  lexicon: HALOT
  rationale: בין aquí apunta a comprensión penetrante. «Entiendes» es natural en español y conserva la diferencia con el verbo previo «sabes», evitando aplanar el contraste.
- source_word: לְרֵעִי
  english_pob_choice: my thought
  chosen_spanish: mi pensamiento
  alternatives_spanish:
  - mi intención
  - mi propósito
  - mi idea
  lexicon: HALOT
  rationale: Aunque el campo semántico puede incluir intención o propósito, en este contexto la referencia al contenido interior es más clara con «pensamiento». Es una opción publication-readable que conserva la amplitud sin especificar de más.
- source_word: מֵרָחוֹק
  english_pob_choice: from afar
  chosen_spanish: desde lejos
  alternatives_spanish:
  - desde muy lejos
  - a distancia
  - de lejos
  lexicon: HALOT
  rationale: La preposición hebrea mantiene la imagen espacial abierta, y la nota inglesa deja la posibilidad de comprensión temporal/anticipatoria. «Desde lejos» preserva esa ambigüedad sin interpretarla en exceso.
theological_decisions:
- issue: Alcance del conocimiento divino en el versículo
  english_pob_reading: The verse describes God's exhaustive personal knowledge of the psalmist's actions and inner thought without specifying a philosophical model of omniscience.
  chosen_spanish_reading: El versículo describe el conocimiento exhaustivo y personal de Dios acerca de las acciones del salmista y de su pensamiento interior, sin fijar un modelo filosófico de omnisciencia.
  alternative_spanish_readings:
  - El versículo enseña la omnisciencia divina en términos filosóficos
  - El versículo solo habla de cercanía espacial
  rationale: El hebreo sostiene tanto la observación de actos externos como la comprensión del interior, y la frase final puede aludir a distancia espacial o a anticipación del pensamiento. La traducción conserva esa tensión en vez de resolverla con una paráfrasis doctrinal.
  doctrine_reference: Preservar la tensión teológica sin simplificarla.
translation_notes:
  revision_awareness: 'Coincido con el pase más reciente: no fueron necesarias revisiones sustantivas. El español mantiene el paralelismo, la ambigüedad de מֵרָחוֹק y la distinción entre saber/entender.'
  spanish_consistency_notes:
  - Se prefirió el tuteo reverente coherente con el poema y la sintaxis directa del hebreo.
  - Se usó «pensamiento» en singular para reflejar la lectura auditada del sustantivo, sin cerrar indebidamente el abanico semántico de intención o propósito.
  - Se mantuvo «desde lejos» para conservar la imagen y la ambigüedad interpretativa del original.
