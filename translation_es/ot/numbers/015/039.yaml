review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura principal del hebreo: el צִיצִת como objeto visible que provoca memoria y obediencia, el nombre divino Yahvé, y la advertencia contra seguir corazón y ojos con la metáfora fuerte de infidelidad. Sin embargo, hay dos desajustes relevantes: (1) וּרְאִיתֶם אֹתוֹ tiene fuerza temporal/secuencial mejor expresada como «cuando la vean» que como simple futuro coordinado; (2) la nota de «fleco» describe de manera imprecisa el objeto como «franja/bordado colgante», donde «bordado» no corresponde bien al referente. Además, la alternativa de la nota b («se apartarán tras...») no representa bien el matiz documentado en la auditoría inglesa.'
  spanish_quality_summary: El español es generalmente claro y digno. «Y será para ustedes una borla» suena natural, y «los pondrán por obra» es una buena formulación idiomática. No obstante, «la verán y recordarán» pierde la conexión condicional/temporal práctica del hebreo; «cuando la vean, recordarán» lee mejor. La cláusula final «en pos de los cuales ustedes se prostituyen» es fuerte pero comprensible; conviene mantenerla por fidelidad a la metáfora. Las notas necesitan pulido para mayor precisión y naturalidad.
  glossary_alignment: Se alinea bien con las convenciones del proyecto en «Yahvé» para יְהוָה y en mantener la fuerza de זֹנִים con «se prostituyen». «Borla» es aceptable para צִיצִת con nota alternativa «fleco». «Mandamientos» preserva bien מִצְוֺת. No hay conflicto serio de glosario, pero sí conviene ajustar la nota léxica de תָתֻרוּ para reflejar «seguir/ir tras» o «desviarse» sin la formulación menos natural «se apartarán tras».
  issues:
  - severity: medium
    issue: La secuencia «la verán y recordarán» no refleja tan bien la fuerza temporal de וּרְאִיתֶם אֹתוֹ.
    rationale: 'La auditoría inglesa documenta que, aunque la forma hebrea es coordinada, el sentido práctico es temporal/secuencial: al ver la borla, recuerdan. En español «cuando la vean» comunica mejor esa relación.'
  - severity: medium
    issue: La nota a define el referente de צִיצִת con «franja/bordado colgante», lo cual es impreciso.
    rationale: «Bordado» no corresponde bien al objeto textil prescrito; la nota inglesa habla de una franja o borla adherida a la prenda. Debe explicarse como fleco/borla o franja con borlas.
  - severity: low
    issue: 'La nota b ofrece una alternativa poco natural e insuficientemente fiel: «se apartarán tras su corazón y tras sus ojos».'
    rationale: La documentación inglesa destaca la idea de seguir/perseguir/ir tras. «Apartarse tras» no suena idiomático y no representa bien el verbo; mejor «irán tras» o «seguirán a su corazón y a sus ojos».
  revised_spanish_text: Y será para ustedes una borla[a]; cuando la vean, recordarán todos los mandamientos de Yahvé y los pondrán por obra. No se desviarán[b] tras su corazón ni tras sus ojos, en pos de los cuales ustedes se prostituyen[c].
  revised_footnotes:
