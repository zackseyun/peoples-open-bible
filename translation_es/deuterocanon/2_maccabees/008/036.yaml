    text: O «cautividad»; el griego alude a la captura o cautiverio de los habitantes de Jerusalén como la fuente esperada del tributo.
    reason: lexical_alternative
  - marker: b
    text: O «campeón»; el griego ὑπέρμαχον designa a alguien que pelea en favor de otro. El defensor no se nombra explícitamente aquí; el contexto sugiere a Dios.
    reason: lexical_alternative
  revision_rationale: Se corrigió la construcción financiera para reflejar explícitamente la obligación de pagar el tributo, se mejoró la naturalidad de la expresión de fuente esperada del pago, y se sustituyó «campeón» por «defensor» en el texto principal para mayor claridad en español, manteniendo el matiz combativo y la implicación teológica en nota.
