id: JOS.9.15
reference: Joshua 9:15
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ לָ/הֶ֤ם יְהוֹשֻׁ֨עַ֙ שָׁל֔וֹם וַ/יִּכְרֹ֥ת לָ/הֶ֛ם בְּרִ֖ית לְ/חַיּוֹתָ֑/ם וַ/יִּשָּׁבְע֣וּ לָ/הֶ֔ם נְשִׂיאֵ֖י הָ/עֵדָֽה׃
translation:
  text: So Joshua made peace with them and made a covenant with them to let them live[c][b][a], and the leaders of the congregation swore to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''made a covenant with them.'' Hebrew: ''cut a covenant.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'to preserve them alive' or 'to spare their lives.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the leaders of the assembly' or 'the chiefs of the community.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ ... שָׁלוֹם
  chosen: made peace
  alternatives:
  - made peace terms
  - made peace with
  lexicon: HALOT
  rationale: The idiom עשה שלום means to establish peaceful relations, not merely to 'do peace' woodenly. 'Made peace with them' is natural English and preserves the covenantal-political sense.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal names are transliterated by standard English convention.
- source_word: וַיִּכְרֹת ... בְּרִית
  chosen: cut a covenant
  alternatives:
  - made a covenant
  - entered into a covenant
  lexicon: HALOT
  rationale: כרת ברית is the standard Hebrew idiom 'cut a covenant.' Retaining 'cut' preserves the source-language imagery and covenantal register; it remains understandable in English.
- source_word: לְחַיּוֹתָם
  chosen: to let them live
  alternatives:
  - to preserve them alive
  - to spare their lives
  lexicon: HALOT
  rationale: 'The infinitive with pronominal suffix expresses the purpose of the covenant: that they remain alive. ''To let them live'' is clear modern English and avoids over-paraphrase.'
- source_word: וַיִּשָּׁבְעוּ לָהֶם
  chosen: swore to them
  alternatives:
  - took an oath to them
  - swore an oath to them
  lexicon: HALOT
  rationale: The verb שבע in this context denotes oath-taking. 'Swore to them' is concise and idiomatic; the oath sense is inherent in the verb.
- source_word: נְשִׂיאֵי הָעֵדָה
  chosen: the leaders of the congregation
  alternatives:
  - the chiefs of the congregation
  - the princes of the assembly
  - the leaders of the community
  lexicon: HALOT
  rationale: נשיאים are recognized leaders/chiefs, and עדה here is the assembled covenant community. 'Leaders of the congregation' is accurate, readable, and fits the narrative setting better than the archaic 'princes.'
