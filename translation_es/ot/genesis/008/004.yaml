translation:
  language: es
  text: En el séptimo mes, a los diecisiete días del mes, el arca quedó en reposo sobre las montañas de Ararat[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las montañas de Ararat»; el texto se refiere a una región montañosa, no específicamente a un solo pico como el monte Ararat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּנַח
  english_pob_choice: came to rest
  chosen_spanish: descansó
  alternatives_spanish:
  - reposó
  - llegó a descansar
  lexicon: HALOT
  rationale: El verbo נוח en este contexto describe que el arca llegó a un lugar de reposo. «Descansó» comunica bien el resultado eventivo en español sin perder la idea de asentamiento; «reposó» es posible, pero puede sonar más estático.
- source_word: הַתֵּבָה
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - la caja
  - el arca
  lexicon: HALOT
  rationale: Para la תֵּבָה de Noé, «arca» es el equivalente tradicional y preciso en español bíblico. «Caja» sería demasiado general y menos fiel al uso contextual.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - durante el séptimo mes
  - en el mes séptimo
  lexicon: HALOT
  rationale: La preposición temporal con el nombre del mes se vierte naturalmente como «en el séptimo mes». Mantiene el valor cronológico idiomático del hebreo.
- source_word: בְּשִׁבְעָה עָשָׂר יוֹם לַחֹדֶשׁ
  english_pob_choice: on the seventeenth day of the month
  chosen_spanish: el día diecisiete del mes
  alternatives_spanish:
  - el diecisieteavo día del mes
  - en el día diecisiete del mes
  lexicon: HALOT
  rationale: La fórmula hebrea de fecha se expresa de manera clara y natural en español con «el día diecisiete del mes». Conserva el sentido sin forzar una construcción arcaizante.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: El preposición local aquí indica apoyo o ubicación sobre una superficie o región. «Sobre» reproduce bien esa relación espacial en español.
- source_word: הָרֵי אֲרָרָט
  english_pob_choice: the mountains of Ararat
  chosen_spanish: las montañas de Ararat
  alternatives_spanish:
  - el monte Ararat
  - las alturas de Ararat
  - las montañas de Ararat
  lexicon: HALOT
  rationale: El hebreo está en plural constructo, por lo que conviene conservar «montañas» y no reducirlo a un singular tradicional. «De Ararat» mantiene la relación geográfica sin especificar indebidamente un solo pico.
theological_decisions:
- issue: Expresión geográfica plural הָרֵי אֲרָרָט
  english_pob_reading: the mountains of Ararat
  chosen_spanish_reading: las montañas de Ararat
  alternative_spanish_readings:
  - el monte Ararat
  - Mont Ararat
  rationale: La decisión preserva el plural hebreo y evita importar una identificación más específica que la que ofrece el texto. Es una cuestión geo-lexical, no doctrinal, y refleja la primacía del original sobre la tradición de traducción.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; no importar afirmaciones que el texto no hace.'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios necesarios; la formulación española sigue de cerca el valor eventivo de נוח, conserva el plural geográfico y mantiene una sintaxis natural para lectura pública.
  spanish_consistency_notes:
  - Se usa «arca» como término fijo para la תֵּבָה de Noé, en línea con el uso bíblico habitual y con la decisión inglesa auditada.
  - Se evita la singularización de הָרֵי אֲרָרָט para no perder el plural del hebreo.
  - 'La cronología se expresa con una forma española estándar y solemne: «en el séptimo mes, el día diecisiete del mes».'
