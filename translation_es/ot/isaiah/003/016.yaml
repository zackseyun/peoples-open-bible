translation:
  language: es
  text: 'Y Yahvé dijo: Por cuanto las hijas de Sion son altivas, y andan con el cuello extendido, y miran con los ojos[a], andando y dando pasos cortos, y haciendo un tintineo con sus pies[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lanzan miradas con los ojos». La expresión hebrea es rara y puede aludir a miradas insinuantes o calculadas; la redacción principal conserva una lectura más neutral.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «haciendo sonar sus tobilleras con sus pies». El hebreo probablemente alude al tintineo de adornos en los tobillos, aunque el texto no nombra explícitamente esas tobilleras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en la forma de proyecto en español, siguiendo la política terminológica del POB para יהוה. 'SEÑOR' ocultaría el nombre personal; 'Yahweh' es comprensible pero menos natural en español que 'Yahvé'.
- source_word: יַעַן כִּי
  english_pob_choice: Because
  chosen_spanish: Por cuanto
  alternatives_spanish:
  - Porque
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: La construcción introduce la causa del juicio; 'Por cuanto' mantiene el valor causal y el tono profético solemne sin sonar arcaizante en exceso.
- source_word: גָבְהוּ
  english_pob_choice: are haughty
  chosen_spanish: se han enaltecido
  alternatives_spanish:
  - son soberbias
  - se han vuelto altivas
  - se han engrandecido
  lexicon: HALOT
  rationale: El verbo tiene la idea de hacerse altas/elevadas y aquí expresa arrogancia. 'Se han enaltecido' conserva la elevación literal y la carga moral sin endurecerlo en un tecnicismo.
- source_word: בְּנוֹת צִיּוֹן
  english_pob_choice: the daughters of Zion
  chosen_spanish: las hijas de Sion
  alternatives_spanish:
  - las mujeres de Sion
  - las hijas de Jerusalén
  lexicon: HALOT
  rationale: Se preserva la expresión personificada del hebreo y la denominación de Sion, sin sustituirla por una paráfrasis geográfica más amplia.
- source_word: נטוות גָּרוֹן
  english_pob_choice: with outstretched necks
  chosen_spanish: con el cuello extendido
  alternatives_spanish:
  - con el cuello erguido
  - con el cuello estirado
  lexicon: HALOT
  rationale: La imagen corporal se traslada de manera directa y natural al español. 'Extendido' conserva el gesto afectado y altivo del original.
- source_word: מְשַׂקְּרֹות עֵינָיִם
  english_pob_choice: glancing with their eyes
  chosen_spanish: miran con los ojos
  alternatives_spanish:
  - lanzan miradas
  - coquetean con los ojos
  - hacen guiños con los ojos
  lexicon: HALOT
  rationale: La expresión hebrea es rara y el POB inglés optó por un giro sobrio y neutral ('glancing with their eyes') tras revisar una lectura más interpretativa. En español, 'miran con los ojos' mantiene esa neutralidad y evita añadir una connotación no asegurada por el texto.
- source_word: הָלֹוךְ וְטָפֹף תֵּלַכְנָה
  english_pob_choice: walking and mincing as they go
  chosen_spanish: andando y dando pasos cortos al caminar
  alternatives_spanish:
  - yendo con pasitos menudos
  - andando y menudeando el paso
  - caminando y menudeando
  lexicon: HALOT
  rationale: Se conserva la repetición intensiva del hebreo con una expresión española clara. 'Dar pasos cortos' comunica el valor de טָפֹף sin depender de un término demasiado literario como 'menudear'.
- source_word: וּבְרַגְלֵיהֶם תְּעַכַּסְנָה
  english_pob_choice: making a jingling with their feet
  chosen_spanish: haciendo tintinear sus pies
  alternatives_spanish:
  - haciendo sonar sus tobilleras
  - haciendo sonar sus pies
  - haciendo un tintineo con sus pies
  lexicon: HALOT
  rationale: Se conserva el efecto sonoro sin introducir explícitamente 'tobilleras', ya que el objeto no aparece en el versículo. 'Tintinear' comunica el ruido ornamental de manera fiel y comprensible.
theological_decisions:
- issue: Nombre divino יהוה en un oráculo de juicio
  english_pob_reading: Yahweh said
  chosen_spanish_reading: Yahvé dijo
  alternative_spanish_readings:
  - El SEÑOR dijo
  - Yahweh dijo
  rationale: Se mantiene el nombre divino en forma visible en español, coherente con la política del proyecto y con el carácter del oráculo directo. No se sustituye por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa reciente redujo una interpretación más marcada de מְשַׂקְּרֹות עֵינָיִם a una formulación más neutral ('glancing with their eyes'). Esta versión española refleja esa decisión con 'miran con los ojos' en lugar de una lectura como 'coquetean' o 'miradas seductoras'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה conforme a la terminología del proyecto en español.
  - Se evitó 'Cristo' porque no aplica a este versículo.
  - Se mantuvo 'Sion' con ortografía española habitual, sin acento.
  - Se preservó la imagen sonora del final sin añadir 'tobilleras' en el texto principal.
  - Las opciones alternativas en notas se formularon para reflejar las ambigüedades del hebreo sin sobreinterpretar.
