lexical_decisions:
- source_word: ἐμαυτὸν ἐδούλωσα
  english_pob_choice: I made myself a slave
  chosen_korean: 스스로 노예가 되었다
  alternatives_korean:
  - 스스로를 종으로 삼다
  - 스스로 종이 되다
  lexicon: BDAG
  rationale: 「자유로움(ἐλεύθερος)」과 「노예 됨(ἐδούλωσα)」의 대비가 본문의 핵심이다. 한국 전통의 「종」은 매임의 무게를 약화시키므로, 영어 POB의 「slave」 결정과 DOCTRINE.md §1 원칙에 따라 「노예」로 옮긴다.
- source_word: κερδήσω
  english_pob_choice: win
  chosen_korean: 얻다
  lexicon: BDAG
  rationale: 복음을 위해 사람을 얻는 일을 가리키는 동사. 「얻다」가 한국어로 자연스럽다.
theological_decisions:
- issue: 9:19 ἐμαυτὸν ἐδούλωσα — 자유와 노예 됨의 대비 보존
  chosen_reading: 스스로 노예가 되었다
  alternative_readings:
  - 스스로를 종으로 삼다
  rationale: 바울이 그리스도의 자유인이면서도 복음을 위해 스스로 매임의 위치를 선택했다는 강한 자기 결단의 무게가 본문에 있다. 「종」은 친숙하지만 매임의 무게가 옅어진다. DOCTRINE.md의 원어 우선·전통 약화 회피 원칙에 따라 「노예」를 채택한다.
  doctrine_reference: 'DOCTRINE.md §1: Original-language primacy; Contested terms table for δοῦλος'
