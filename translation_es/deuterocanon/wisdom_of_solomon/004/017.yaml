translation:
  language: es
  text: Porque verán el fin del sabio[a], y no entenderán lo que Yahvé planeó acerca de él[b], ni con qué propósito lo hizo seguro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la muerte del sabio». El griego τελευτή puede significar «fin» o «muerte»; se conserva «fin» en el texto principal para mantener el alcance más amplio del contexto.
    reason: lexical_alternative
  - marker: b
    text: O «para qué fin Yahvé lo mantuvo a salvo» / «lo protegió». El griego deja implícita la forma precisa de esa seguridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄψονται
  english_pob_choice: they will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán con sus propios ojos
  - contemplarán
  lexicon: BDAG
  rationale: El futuro de ὁράω expresa percepción directa. «Verán» es natural en español y conserva la simpleza del verbo de percepción.
- source_word: τελευτὴν
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - la muerte
  - el desenlace
  lexicon: BDAG
  rationale: τελευτή puede significar «fin» o «muerte». «El fin» mantiene la amplitud semántica del griego y deja abierta la tensión entre la muerte visible y el desenlace completo.
- source_word: σοφοῦ
  english_pob_choice: the wise man
  chosen_spanish: del sabio
  alternatives_spanish:
  - del hombre sabio
  - de la persona sabia
  lexicon: BDAG
  rationale: El griego es masculino singular. «Del sabio» reproduce con naturalidad la referencia representativa masculina sin volver la frase pesada.
- source_word: οὐ νοήσουσιν
  english_pob_choice: will not understand
  chosen_spanish: no entenderán
  alternatives_spanish:
  - no comprenderán
  - no percibirán
  lexicon: BDAG
  rationale: νοέω aquí expresa no captar el sentido de lo que se ve. «No entenderán» es claro, idiomático y fiel al valor cognitivo.
- source_word: ἐβουλεύσατο
  english_pob_choice: planned
  chosen_spanish: planeó
  alternatives_spanish:
  - se propuso
  - determinó
  lexicon: BDAG
  rationale: El medio de βουλεύω apunta al propósito o diseño deliberado del Señor. «Planeó» comunica intención sin cargar el texto de arcaísmo.
- source_word: περὶ αὐτοῦ
  english_pob_choice: concerning him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - respecto de él
  lexicon: BDAG
  rationale: περί con genitivo significa «acerca de / concerniente a». «Acerca de él» conserva el vínculo entre la intención divina y la persona.
- source_word: εἰς τί
  english_pob_choice: for what purpose
  chosen_spanish: con qué propósito
  alternatives_spanish:
  - para qué
  - con qué fin
  lexicon: BDAG
  rationale: La expresión pregunta hacia qué fin se ordenó la acción divina. «Con qué propósito» expresa bien la fuerza teleológica en español contemporáneo.
- source_word: ἠσφαλίσατο
  english_pob_choice: he made him secure
  chosen_spanish: lo hizo seguro
  alternatives_spanish:
  - lo mantuvo a salvo
  - lo protegió
  lexicon: BDAG
  rationale: ἀσφαλίζω significa hacer seguro o firme. «Lo hizo seguro» preserva la acción causativa y mantiene abierta la naturaleza de esa seguridad.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Yahvé
  - el Soberano
  lexicon: BDAG
  rationale: En este contexto de la LXX, κύριος traduce el Nombre divino; sin embargo, siguiendo el patrón del texto fuente en español se mantiene «el Señor» como forma natural y reverente para la cita de esta sección, sin perder la referencia divina implícita.
theological_decisions:
- issue: Alcance de τελευτή respecto de la muerte del justo
  english_pob_reading: Rendered as 'the end' rather than narrowing to 'death.'
  chosen_spanish_reading: Traducido como «el fin» y no como «la muerte»
  alternative_spanish_readings:
  - la muerte
  - el desenlace
  rationale: El contexto incluye la muerte aparente del justo, pero la frase contrasta lo que otros ven con lo que no entienden del plan de Dios. «El fin» conserva esa amplitud y la ironía del resultado verdadero.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza de ἠσφαλίσατο αὐτὸν
  english_pob_reading: Rendered as 'he made him secure.'
  chosen_spanish_reading: Traducido como «lo hizo seguro»
  alternative_spanish_readings:
  - lo mantuvo a salvo
  - lo protegió
  rationale: El griego no especifica el modo exacto de esa seguridad. «Lo hizo seguro» preserva la tensión teológica entre una muerte visible y una seguridad real dada por Dios.
  doctrine_reference: Translation philosophy §3
- issue: Valor de κύριος en una cita sapiencial griega
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto usa «Yahvé» para el Nombre divino en el texto principal, aquí la forma de cita sapiencial en español puede conservar «el Señor» como equivalente reverente y reconocible de κύριος, sin alterar el sentido ni la referencia a Dios.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios; la traducción española refleja la misma decisión de mantener el alcance amplio de τελευτή y la ambigüedad controlada de ἠσφαλίσατο, con ajustes naturales de estilo en español.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico moderno y sobrio.
  - Se evitó forzar «Yahvé» en esta cláusula porque el audit trail inglés ya fijó «the Lord» como equivalencia de κύριος en esta unidad.
  - «Sabio» se dejó en masculino singular, siguiendo la forma griega y la convención del POB inglés.
  - Las notas al pie preservan la alternativa semántica principal sin sobrecargar el texto principal.
