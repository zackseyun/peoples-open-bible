id: ISA.58.6
reference: Isaiah 58:6
source:
  edition: WLC
  text: הֲ/ל֣וֹא זֶה֮ צ֣וֹם אֶבְחָרֵ/הוּ֒ פַּתֵּ֨חַ֙ חַרְצֻבּ֣וֹת רֶ֔שַׁע הַתֵּ֖ר אֲגֻדּ֣וֹת מוֹטָ֑ה וְ/שַׁלַּ֤ח רְצוּצִים֙ חָפְשִׁ֔ים וְ/כָל מוֹטָ֖ה תְּנַתֵּֽקוּ־׃
translation:
  text: 'Is not this the fast that I choose: to loosen the chains of wickedness[a], to untie the cords of the yoke, to send the oppressed out free[c][b], and to tear off every yoke?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bonds of wickedness' for 'chains of wickedness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the crushed' for 'the oppressed.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew repeats 'yoke' twice for emphasis, portraying oppression as a physical restraint to be removed.
    reason: cultural_note
lexical_decisions:
- source_word: צ֣וֹם
  chosen: fast
  alternatives:
  - fasting
  lexicon: HALOT
  rationale: Noun referring to the religious practice itself; 'fast' is the most natural English equivalent in this predicative construction ('the fast that I choose').
- source_word: אֶבְחָרֵהוּ
  chosen: that I choose
  alternatives:
  - that I delight in
  - that I have chosen
  lexicon: HALOT
  rationale: From בחר, 'choose/select.' The imperfect here in context expresses Yahweh's present evaluative preference. 'Choose' is more direct and textually grounded than interpretive expansions like 'delight in.'
- source_word: פַּתֵּחַ
  chosen: to loosen
  alternatives:
  - to open
  - to release
  lexicon: HALOT
  rationale: Infinitive/imperatival sense introducing the content of the true fast. With bonds/chains as object, 'loosen' is idiomatic and preserves the concrete image better than the more generic 'release.'
- source_word: חַרְצֻבּוֹת
  chosen: chains
  alternatives:
  - bonds
  - fetters
  lexicon: HALOT
  rationale: Refers to restraints or bonds. 'Chains' gives a vivid, accessible image in modern English while retaining the oppression metaphor.
- source_word: רֶשַׁע
  chosen: wickedness
  alternatives:
  - evil
  - injustice
  lexicon: HALOT
  rationale: The noun commonly denotes wickedness/guilt. 'Wickedness' preserves the moral dimension without narrowing it only to legal injustice, though social oppression is clearly in view.
- source_word: הַתֵּר
  chosen: to untie
  alternatives:
  - to loosen
  - to unbind
  lexicon: HALOT
  rationale: From נתר/התיר in the sense of loosening or untying. Since the previous verb is already rendered 'loosen,' 'untie' provides natural English variation while preserving the distinct action.
- source_word: אֲגֻדּוֹת
  chosen: cords
  alternatives:
  - bands
  - bonds
  lexicon: HALOT
  rationale: Denotes bands or bindings. 'Cords' fits the yoke imagery well and distinguishes this term from the earlier 'chains.'
- source_word: מוֹטָה
  chosen: yoke
  alternatives:
  - bar
  - yoke-bar
  lexicon: HALOT
  rationale: The term denotes a yoke or bar of oppression. 'Yoke' is the standard and most recognizable biblical image in English.
- source_word: וְשַׁלַּח
  chosen: to send ... out
  alternatives:
  - to let go
  - to release
  lexicon: HALOT
  rationale: From שלח, literally 'send.' In context of liberation, 'send ... out free' preserves the verbal force better than flattening it to simply 'release.'
- source_word: רְצוּצִים
  chosen: the oppressed
  alternatives:
  - the crushed
  - those who are broken
  lexicon: HALOT
  rationale: Passive participial form from רצץ, 'crush/oppress.' 'The oppressed' best communicates the social and ethical force in idiomatic English; 'crushed' is more literal but less natural here.
- source_word: חָפְשִׁים
  chosen: free
  alternatives:
  - as free people
  - into freedom
  lexicon: HALOT
  rationale: Adjectival complement indicating liberated status. 'Free' is concise and natural after 'send ... out.'
- source_word: תְּנַתֵּקוּ
  chosen: to tear off
  alternatives:
  - to break
  - to snap apart
  lexicon: HALOT
  rationale: From נתק, to pull apart, tear away, or break off. 'Tear off' preserves the forceful image of removing oppressive restraints more vividly than the generic 'break.'
- source_word: וְכָל מוֹטָה
  chosen: every yoke
  alternatives:
  - every yoke-bar
  - every bar
  lexicon: HALOT
  rationale: The repetition of מוֹטָה is retained for emphasis. 'Every yoke' keeps the rhetorical force and the oppression metaphor consistent across the verse.
