  glossary_alignment: No hay conflictos con la terminología de proyecto. «Sacerdote» para כֹהֵן y «reprenda» para יכח son adecuados. «Sin embargo» para אַךְ es defendible. La elección impersonal «nadie» por אִישׁ también es aceptable en español. La revisión propuesta preserva las decisiones léxicas del POB y mejora su presentación.
