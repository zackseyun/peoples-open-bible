translation:
  language: es
  text: Salmo de David[a]. Yahvé, ¿quién puede habitar en tu tienda[b]? ¿Quién puede morar en tu santo monte?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el superscrito hebreo «de David» puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
  - marker: b
    text: O «tabernáculo»; el hebreo dice literalmente «tienda» y probablemente evoca el santuario como morada de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Salmo/poema
  lexicon: מִזְמוֹר
  rationale: «Salmo» es el equivalente natural y tradicional para este encabezado poético, sin añadir información que el hebreo no da.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  lexicon: לְ
  rationale: La preposición לְ en el superscrito admite relación de autoría, dedicación o asociación; «de David» mantiene esa amplitud en español con naturalidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: יהוה
  rationale: La política terminológica del proyecto pide «Yahvé» en el texto principal para el Tetragrámaton. Se conserva la forma propia en español en vez de sustituirla por una convención de máscara.
- source_word: אָהֶל
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tabernáculo
  - carpa
  lexicon: אָהֶל
  rationale: «Tienda» traduce literalmente el sustantivo y mantiene la imagen de morada/santuario evocada por el contexto; «tabernáculo» explicita interpretación pero va más allá del término básico.
- source_word: יָגוּר
  english_pob_choice: dwell
  chosen_spanish: habitar
  alternatives_spanish:
  - vivir
  - residir
  lexicon: גור
  rationale: «Habitar» comunica bien la residencia estable solicitada por la pregunta y conserva el matiz de permanencia.
- source_word: יִשְׁכֹּן
  english_pob_choice: live
  chosen_spanish: morar
  alternatives_spanish:
  - habitar
  - residir
  lexicon: שׁכן
  rationale: «Morar» permite un paralelo poético con «habitar» sin perder el sentido de residencia en un lugar santo.
theological_decisions:
- issue: Superscription ascription/dedication
  english_pob_reading: Or 'by David' or 'for David'; the Hebrew superscription 'of David' can indicate authorship, association, or dedication.
  chosen_spanish_reading: «de David» con nota sobre posibles relaciones de autoría, asociación o dedicación.
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo del superscrito no obliga a una sola relación; la traducción base conserva la ambigüedad documentada y la nota recoge las opciones alternativas.
  doctrine_reference: Salmos, superscripciones y atribución literaria
- issue: Divine name rendering
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La decisión sigue la terminología del proyecto y evita ocultar el nombre divino detrás de una sustitución litúrgica; no se detecta aquí una cita griega que exija otra solución.
  doctrine_reference: Tetragrámaton / nombre divino
- issue: Sanctuary imagery
  english_pob_reading: Or 'tabernacle'; the Hebrew literally says 'tent,' likely evoking the sanctuary as God's dwelling place.
  chosen_spanish_reading: «tienda» con nota que reconoce la posible alusión al santuario.
  alternative_spanish_readings:
  - tabernáculo
  rationale: Mantener «tienda» preserva el término literal y la imagen poética; la nota explica la posible referencia cultual sin reemplazar el vocablo de base.
  doctrine_reference: Imaginería del santuario en los Salmos
translation_notes:
  revision_awareness: La revisión inglesa añadió correctamente la invocación a Yahvé y las dos preguntas del hebreo, además de fijar «Yahweh» para יְהוָה y «dwell/live» para los dos verbos paralelos. El borrador español sigue esa ampliación completa del versículo, conserva la forma interrogativa doble y mantiene la distinción poética entre habitar/morar.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה en el texto principal.
  - Se preserva la ambigüedad del superscrito con «de David» y nota explicativa.
  - «Tienda» se mantiene como traducción literal del hebreo, con nota sobre la posible lectura cultual.
  - 'El paralelismo verbal se refleja con dos verbos cercanos pero no idénticos: «habitar» y «morar».'
