base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/009.yaml
  text: 'Say[a], ‘Thus says the Lord GOD: Will it prosper? Will he not pull up its roots and cut off its fruit, so that it withers? All the fresh leaves of its growth will wither[b]. And not with a great arm or with many people will it be lifted from its roots.’'
  footnotes:
  - marker: a
    text: Hebrew 'arm'; a figurative expression for strength or power.
    reason: lexical_alternative
  - marker: b
    text: Or 'uproot its roots' for the first clause; the Hebrew verb can emphasize tearing loose or pulling away.
    reason: lexical_alternative
