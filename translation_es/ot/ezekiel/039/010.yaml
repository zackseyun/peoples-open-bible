translation:
  language: es
  text: No llevarán leña del campo, ni la cortarán de los bosques; porque con las armas harán fuego[a]. Y despojarán a los que los despojaron, y saquearán a los que los saquearon[b], declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque con las armas quemarán fuego», es decir, usarán las armas de los invasores como combustible.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite términos de la misma raíz: «despojarán a sus despojadores y saquearán a sus saqueadores», para enfatizar la reversión y la retribución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂאוּ עֵצִים
  english_pob_choice: carry wood
  chosen_spanish: llevarán leña
  alternatives_spanish:
  - cargarán leña
  - tomarán leña
  lexicon: HALOT
  rationale: נשא con עצים expresa aquí llevar madera/leña para combustible. «Llevarán leña» conserva la acción concreta en español natural sin sugerir recolección agrícola más específica de lo que el hebreo exige.
- source_word: מִן הַשָּׂדֶה
  english_pob_choice: from the field
  chosen_spanish: del campo
  alternatives_spanish:
  - de la campiña
  - de la tierra abierta
  lexicon: HALOT
  rationale: שָׂדֶה es singular con artículo; en este contexto funciona colectivamente. «Del campo» mantiene la cercanía al singular hebreo y suena natural en español.
- source_word: יַחְטְבוּ
  english_pob_choice: cut it
  chosen_spanish: la cortarán
  alternatives_spanish:
  - la talarán
  - la henderán
  lexicon: HALOT
  rationale: El verbo significa cortar o hachar madera. En español, «la cortarán» es claro y evita un arcaísmo innecesario, manteniendo el referente implícito de la leña.
- source_word: מִן הַיְּעָרִים
  english_pob_choice: from the forests
  chosen_spanish: de los bosques
  alternatives_spanish:
  - de los montes
  - de los árboles
  lexicon: HALOT
  rationale: יַעַר en plural se refiere a bosques/selvas arboladas. «Bosques» es la equivalencia más directa y natural en español.
- source_word: כִּי בַנֶּשֶׁק יְבַעֲרוּ אֵשׁ
  english_pob_choice: for they will make fires with the weapons
  chosen_spanish: porque con las armas encenderán fuego
  alternatives_spanish:
  - pues con las armas harán fuego
  - porque con las armas harán arder el fuego
  lexicon: HALOT
  rationale: El hebreo indica que las armas servirán como combustible o medio para el fuego. «Con las armas encenderán fuego» conserva la fuerza instrumental de ב y evita suavizar la imagen bélica.
- source_word: בַנֶּשֶׁק
  english_pob_choice: with the weapons
  chosen_spanish: con las armas
  alternatives_spanish:
  - con las armas de guerra
  - con el armamento
  lexicon: HALOT
  rationale: נשק aquí es el armamento de los invasores derrotados. «Armas» es el término más claro y abarca bien el sentido colectivo.
- source_word: וְשָׁלְלוּ אֶת שֹׁלְלֵיהֶם
  english_pob_choice: They will plunder those who plundered them
  chosen_spanish: Y despojarán a los que los despojaron
  alternatives_spanish:
  - Y saquearán a los que los saquearon
  - Y arruinarán a los que los arruinaron
  lexicon: HALOT
  rationale: La construcción cognada del hebreo preserva la reversión retributiva. «Despojarán» reproduce la raíz con un matiz algo más literal y formal que «saquearán».
- source_word: וּבָזְזוּ אֶת בֹּזְזֵיהֶם
  english_pob_choice: and loot those who looted them
  chosen_spanish: y saquearán a los que los saquearon
  alternatives_spanish:
  - y despojarán a los que los despojaron
  - y robarán a los que los robaron
  lexicon: HALOT
  rationale: Se mantiene el paralelismo cognado del hebreo con un verbo distinto del anterior para reflejar la pareja léxica. «Saqueo» transmite con claridad la reversión de violencia y expolio.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord Yahweh
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Yahveh
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: נְאֻם se rinde como fórmula profética de declaración. YHWH se traduce según el criterio del proyecto como «Yahvé», y אֲדֹנָי queda como «Señor» para mantener la distinción de los títulos divinos.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH en la fórmula final
  english_pob_reading: declares the Lord Yahweh
  chosen_spanish_reading: declara el Señor Yahvé
  alternative_spanish_readings:
  - declara el Señor Yahveh
  - declara el Señor
  rationale: Se conserva el nombre propio divino mediante «Yahvé», siguiendo la norma del proyecto y evitando la sustitución por una máscara litúrgica que borraría el nombre del texto fuente. «Señor» traduce אֲדֹנָי, manteniendo ambos títulos diferenciados.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Reversión retributiva mediante verbos cognados
  english_pob_reading: They will plunder those who plundered them and loot those who looted them
  chosen_spanish_reading: Y despojarán a los que los despojaron, y saquearán a los que los saquearon
  alternative_spanish_readings:
  - Y despojarán a los que los despojaron, y robarán a los que los robaron
  - Y saquearán a los que los saquearon, y despojarán a los que los despojaron
  rationale: El hebreo repite raíces emparentadas para subrayar el giro de justicia retributiva. El español conserva esa repetición en la medida posible para no perder el énfasis retórico ni la tensión semántica.
  doctrine_reference: Tema bíblico de retribución y reversión del expolio
translation_notes:
  revision_awareness: Se siguió el ajuste final del auditorio inglés que prefirió una formulación formal con «for» y actualizó el nombre divino a «Yahweh»; en español se reflejó con una causal formal («porque») y con «Yahvé» según la convención del proyecto. También se preservó la reversión cognada destacada en la nota inglesa mediante paralelismo léxico en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה y «Señor» para אֲדֹנָי, evitando colapsar ambos títulos.
  - «Armas» mantiene el sentido colectivo de בַּנֶּשֶׁק sin precisar un tipo específico de armamento.
  - Se eligió un registro bíblico actual y digno, evitando arcaísmos como «dijo» o «oráculo» salvo donde la fórmula profética lo pida.
  - La repetición de «despojarán/saquearán» conserva el efecto de reversión y la simetría del hebreo.
