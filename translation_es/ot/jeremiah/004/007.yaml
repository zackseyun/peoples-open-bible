translation:
  language: es
  text: Un león ha salido de su espesura[a], y un destructor de naciones ha partido; ha salido de su lugar para dejar tu tierra en desolación. Tus ciudades serán asoladas[b], sin habitante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su guarida». El hebreo se refiere a una cobertura densa o espesura de la que emerge el león.
    reason: lexical_alternative
  - marker: b
    text: O «Tus ciudades serán arrasadas, sin nadie que habite en ellas».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  english_pob_choice: has come up
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha subido
  - ha venido
  lexicon: HALOT
  rationale: En este contexto de avance invasor, el valor direccional de עלה se comunica de manera natural en español con «ha salido» junto con la imagen del león emergiendo de su cobertura. Mantiene el movimiento sin forzar un calco de «subir» que sonaría menos idiomático aquí.
- source_word: אַרְיֵה
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - leona
  - fiera
  lexicon: HALOT
  rationale: La metáfora rectora del invasor es un «león», por lo que se conserva literalmente en español. No se reduce a «enemigo» para no borrar la imagen fuente.
- source_word: מִסֻּבְּכוֹ
  english_pob_choice: from his thicket
  chosen_spanish: de su matorral
  alternatives_spanish:
  - de su espesura
  - de su guarida
  lexicon: HALOT
  rationale: El término hebreo apunta a una cobertura densa o entretejida. «Matorral» conserva la imagen vegetal y hace audible la metáfora del león que emerge de la maleza; se prefiere a «guarida» porque esa opción desplaza la imagen hacia el escondite animal más que hacia el terreno cubierto.
- source_word: מַשְׁחִית גּוֹיִם
  english_pob_choice: a destroyer of nations
  chosen_spanish: un destructor de naciones
  alternatives_spanish:
  - el destructor de naciones
  - uno que destruye naciones
  lexicon: HALOT
  rationale: La construcción participial funciona de modo apposicional respecto de «león». En español, «un destructor de naciones» conserva la indefinición y la fuerza descriptiva sin volverlo un título fijo.
- source_word: נָסַע
  english_pob_choice: has set out
  chosen_spanish: ha partido
  alternatives_spanish:
  - ha emprendido marcha
  - ha salido de campamento
  - ha arrancado
  lexicon: HALOT
  rationale: El verbo puede implicar levantar campamento y ponerse en marcha. «Ha partido» comunica bien en español moderno la idea de avanzar desde un punto de origen sin añadir detalles no explícitos.
- source_word: יָצָא מִמְּקֹמוֹ
  english_pob_choice: he has gone out from his place
  chosen_spanish: ha salido de su lugar
  alternatives_spanish:
  - ha salido de su sitio
  - ha salido desde su lugar
  lexicon: HALOT
  rationale: 'Se mantiene la secuencia hebrea de movimiento: salir de su lugar de procedencia. «Su lugar» conserva la referencia espacial general sin introducir una localización más específica de la que ofrece el texto.'
- source_word: לָשׂוּם אַרְצֵךְ לְשַׁמָּה
  english_pob_choice: to make your land a desolation
  chosen_spanish: para convertir tu tierra en desolación
  alternatives_spanish:
  - para hacer de tu tierra una desolación
  - para volver tu tierra desolación
  lexicon: HALOT
  rationale: «Desolación» preserva el registro profético de שַׁמָּה mejor que «ruina» o «desierto». «Convertir» expresa con claridad el propósito/resultante de la frase verbal sin debilitar el golpe retórico.
- source_word: עָרַיִךְ תִּצֶּינָה
  english_pob_choice: Your cities will be laid waste
  chosen_spanish: Tus ciudades serán asoladas
  alternatives_spanish:
  - Tus ciudades quedarán arrasadas
  - Tus ciudades serán devastadas
  lexicon: HALOT
  rationale: El verbo comunica devastación/arrasamiento de las ciudades. «Serán asoladas» refleja bien el pasivo resultativo y mantiene un tono profético formal, cercano al valor del hebreo y al ajuste revisado del inglés POB.
- source_word: מֵאֵין יוֹשֵׁב
  english_pob_choice: without inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin nadie que habite
  - sin moradores
  lexicon: HALOT
  rationale: Se conserva la concisión del idiomatismo hebreo y del inglés POB. «Sin habitante» suena sobrio y formal, y mantiene el singular colectivo sin expandirlo innecesariamente.
translation_notes:
  revision_awareness: El inglés POB revisó la última cláusula de «will become ruins» a «will be laid waste» para reflejar con más precisión el verbo hebreo y mantener la consistencia formal con «desolation». La versión española sigue ese ajuste con «serán asoladas», y conserva el cierre breve «sin habitante» como equivalente formal del idiomatismo final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este corpus cuando aparezca el nombre divino, pero en este versículo no hay referencia explícita al Tetragrámaton.
  - Se evita «SEÑOR» como sustituto automático, siguiendo la política del proyecto, aunque aquí no aplica directamente.
  - «Naciones» se conserva en plural para reflejar גּוֹיִם sin neutralizar el alcance universal de la imagen.
  - El paralelismo interno de la línea hebrea se preserva con dos miembros coordinados y una clausula final breve de resultado.
