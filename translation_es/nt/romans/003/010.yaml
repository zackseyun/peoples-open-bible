review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite correctamente la fórmula de cita («Como está escrito:») y la negación universal de οὐκ ἔστιν δίκαιος οὐδὲ εἷς. Sin embargo, la inserción del marcador de nota entre «hay» y «justo» rompe innecesariamente la fluidez, y la nota alternativa «No existe justo» no mejora el castellano ni refleja una alternativa particularmente útil frente al texto principal.
  spanish_quality_summary: El español principal es claro y fiel, pero suena más natural con «No hay ningún justo, ni siquiera uno» o «No hay justo, ni siquiera uno». Dado que la teología y el audit trail buscan la fuerza universal sin añadir «persona», conviene reforzar la idiomaticidad mínima con «ningún», que en español suena más completo sin cambiar el sentido. También debe eliminarse la nota, ya que no aporta claridad y el anclaje actual estorba la lectura.
  glossary_alignment: «justo» para δίκαιος está bien alineado con la decisión del proyecto. No hay términos de glosario mayor en disputa. La revisión propuesta mantiene la fuerza universal y la terminología paulina esperada en español bíblico legible.
  issues:
  - severity: medium
    issue: Anclaje de nota intrusivo en el texto principal
    rationale: «No hay [a] justo» interrumpe una frase muy breve y solemne; las notas deben reservarse para ambigüedades reales o alternativas útiles.
  - severity: medium
    issue: Nota léxica de poco valor
    rationale: «No existe justo» es menos natural en español bíblico corriente y no preserva mejor el griego que «No hay». No justifica una nota.
  - severity: low
    issue: Leve mejora de naturalidad en la negación universal
    rationale: Añadir «ningún» en «No hay ningún justo» hace la frase más idiomática en español sin introducir una categoría teológica nueva ni alterar el alcance absoluto.
  revised_spanish_text: 'Como está escrito: «No hay ningún justo, ni siquiera uno».'
  revision_rationale: Se elimina la nota porque no aporta una alternativa necesaria y su ubicación afecta la lectura. Se ajusta la cláusula a «No hay ningún justo» para lograr un español más natural y completo, manteniendo intactos el sentido existencial, la universalidad de la negación y la fuerza enfática del original griego.
