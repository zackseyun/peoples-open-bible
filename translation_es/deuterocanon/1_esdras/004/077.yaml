translation:
  language: es
  text: Y escribió que se diera sustento a los levitas hasta el día en que se terminara la casa[a] y Jerusalén fuera edificada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo» para «la casa»; el griego dice literalmente «la casa», una manera común de referirse al templo en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Jerusalén fuera reedificada». El contexto es de restauración, aunque el verbo griego simplemente dice «ser edificada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: he wrote that
  chosen_spanish: y escribió que
  alternatives_spanish:
  - y ordenó por escrito que
  - y escribió
  lexicon: LSJ
  rationale: El verbo griego introduce una instrucción escrita; «escribió que» conserva ese valor directivo de manera natural en español sin añadir más fuerza de la que el texto da.
- source_word: δοῦναι
  english_pob_choice: should be given
  chosen_spanish: se diera
  alternatives_spanish:
  - fuera dado
  - se dé
  lexicon: LSJ
  rationale: El infinitivo depende de ἔγραψεν y expresa el contenido del mandato. «Se diera» comunica la orden en español con tono formal y pasivo impersonal.
- source_word: τὴν χορηγίαν
  english_pob_choice: support
  chosen_spanish: sustento
  alternatives_spanish:
  - provisión
  - asistencia
  lexicon: LSJ
  rationale: χορηγία se refiere a provisión o mantenimiento suministrado para las necesidades. «Sustento» mantiene la idea de provisión continua sin especificar indebidamente la forma material.
- source_word: τοῖς Λευείταις
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - para los levitas
  lexicon: LSJ
  rationale: El dativo señala a los destinatarios de la provisión. «A los levitas» es la correspondencia directa y readable en español.
- source_word: ἕως τῆς ἡμέρας ἧς
  english_pob_choice: until the day when
  chosen_spanish: hasta el día en que
  alternatives_spanish:
  - hasta el día cuando
  - hasta que
  lexicon: LSJ
  rationale: La fórmula temporal introduce el límite de la provisión. «Hasta el día en que» preserva la estructura temporal de manera natural.
- source_word: ἐπιτελεσθῇ
  english_pob_choice: is completed
  chosen_spanish: se terminara
  alternatives_spanish:
  - se completara
  - quedara terminada
  lexicon: LSJ
  rationale: El pasivo subjuntivo indica la culminación de la obra. En español, el imperfecto de subjuntivo encaja con «hasta el día en que» y transmite bien la idea de conclusión.
- source_word: ὁ οἶκος
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: LSJ
  rationale: El griego dice literalmente «la casa». Se mantiene esa forma para respetar la dicción del texto; el contexto permite entender la referencia al templo sin reemplazarla en el cuerpo del verso.
- source_word: Ἰερουσαλὴμ οἰκοδομηθῆναι
  english_pob_choice: Jerusalem is built
  chosen_spanish: Jerusalén fuera construida
  alternatives_spanish:
  - Jerusalén se edificara
  - Jerusalén fuera reedificada
  lexicon: LSJ
  rationale: οἰκοδομηθῆναι significa «ser edificada/construida». «Fuera construida» mantiene la literalidad básica y suena natural en español en esta cláusula dependiente de finalidad/tiempo.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés en sus dos notas léxicas principales: mantener «la casa» en el texto y dejar abierta la opción contextual de «templo» en nota; asimismo, conservar la literalidad de οἰκοδομηθῆναι sin imponer «reedificada» en el cuerpo, aunque se reconoce como alternativa contextual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando aparece el nombre divino; este verso no lo contiene.
  - Se mantuvo un registro sobrio y bíblico, evitando «templo» en el cuerpo principal para respetar el griego literal «la casa».
  - «Levitas» se conservó como nombre de grupo sacerdotal estable en español bíblico.
  - La sintaxis intenta reflejar el mandato escrito del griego sin sobrecargar con explicaciones interpretativas.
