translation:
  language: es
  text: No vuelve más a su casa, y su lugar ya no lo reconoce[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y su lugar ya no lo conoce». El verbo hebreo puede significar «reconocer» o «conocer/acknowledge», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשׁוּב
  english_pob_choice: return
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  lexicon: HALOT
  rationale: שׁוּב expresa la idea de volver o regresar. En español, «vuelve» comunica con naturalidad la repetición negada por עוֹד, sin perder la imagen básica del hebreo.
- source_word: ע֣וֹד (first occurrence)
  english_pob_choice: again
  chosen_spanish: más
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: HALOT
  rationale: Aquí עוֹד intensifica la negación temporal. En español, «no vuelve más» da un giro idiomático natural y conserva la permanencia de la ausencia.
- source_word: לְבֵיתוֹ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su morada
  lexicon: HALOT
  rationale: בַּיִת es literalmente «casa». «A su casa» preserva la imagen concreta del texto hebreo mejor que una paráfrasis como «hogar».
- source_word: יַכִּירֶנּוּ
  english_pob_choice: does not know him anymore
  chosen_spanish: no lo reconoce más
  alternatives_spanish:
  - no lo conoce más
  - no lo identifica ya
  lexicon: HALOT
  rationale: El hiphil de נכר puede significar reconocer o reconocer como propio/identificar. Dado que el sujeto es «su lugar», «no lo reconoce más» mantiene la personificación poética y la posible alternativa semántica sin forzar «conocer».
- source_word: מְקֹמוֹ
  english_pob_choice: his place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su sitio
  - el lugar donde estaba
  lexicon: HALOT
  rationale: מָקוֹם significa «lugar». «Su lugar» es breve y fiel, y conserva la personificación del segundo miembro del verso.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió el segundo hemistiquio de una formulación más literal («his place knows him no more») a otra más natural («his place does not know him anymore»). La versión española refleja esa misma naturalidad sin perder la personificación hebrea ni la fuerza permanente de la negación.
  spanish_consistency_notes:
  - Se mantiene la terminología directa y concreta («casa», «lugar») para conservar la imaginería del hebreo.
  - Se evita «SEÑOR» u otra sustitución teológica porque este versículo no contiene el nombre divino.
  - La nota al pie preserva la tensión léxica entre «conocer» y «reconocer», análoga a la alternativa auditada en inglés.
