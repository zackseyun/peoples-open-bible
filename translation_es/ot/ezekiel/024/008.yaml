revisions:
- from: Para hacer subir la ira[a], para tomar venganza, he puesto su sangre[b] sobre una roca desnuda, para que no fuera cubierta.
  to: Para provocar la ira, para tomar venganza[a], he puesto su sangre[b] sobre una roca desnuda, para que no fuera cubierta.
  rationale: Se reemplaza «hacer subir la ira» por «provocar la ira» para reflejar el valor idiomático de לְהַעֲלוֹת חֵמָה en español natural y fiel. También se mueve la nota [a] a «tomar venganza» para que su contenido corresponda exactamente al segmento hebreo לִנְקֹם נָקָם. No se requieren cambios adicionales.
  reviewer_model: gpt-5.4
