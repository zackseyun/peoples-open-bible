translation:
  language: es
  text: ustedes que apartan el día malo y acercan la sede de la violencia[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el día de desastre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el trono de la violencia» o «el reinado de la violencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְנַדִּים
  english_pob_choice: you who put far away
  chosen_spanish: ustedes que apartan
  alternatives_spanish:
  - ustedes que ponen lejos
  - ustedes que alejan
  - ustedes que posponen
  lexicon: HALOT
  rationale: El participio interpela directamente a los oyentes; en español, "ustedes que apartan" conserva la acusación y la imagen de causar distancia. "Apartan" es más natural que un calco de "poner lejos" y mantiene la fuerza verbal del hebreo.
- source_word: לְיוֹם רָע
  english_pob_choice: the evil day
  chosen_spanish: el día malo
  alternatives_spanish:
  - el día de desastre
  - el día de calamidad
  - el día malo que viene
  lexicon: HALOT
  rationale: El POB inglés preserva la expresión compacta y ambigua. "Día malo" respeta esa concisión en español sin resolver de más el sentido hacia una sola interpretación explicativa.
- source_word: וַתַּגִּישׁוּן
  english_pob_choice: and bring near
  chosen_spanish: y acercan
  alternatives_spanish:
  - y hacen llegar
  - y traen cerca
  - y hacen aproximar
  lexicon: HALOT
  rationale: El verbo causativo se vierte con "acercan", que en español comunica la idea de hacer venir cerca. Se evita una construcción más pesada que entorpecería la ironía del verso.
- source_word: שֶׁבֶת
  english_pob_choice: the seat
  chosen_spanish: el asiento
  alternatives_spanish:
  - el trono
  - la sede
  - el lugar de gobierno
  lexicon: HALOT
  rationale: El POB inglés opta por "seat" y deja abiertas varias posibilidades. "Asiento" conserva la metáfora espacial sin sobreinterpretar hacia una monarquía explícita; en español suena algo marcado, pero mantiene la ambigüedad necesaria.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: de violencia
  alternatives_spanish:
  - de opresión
  - de injusticia
  - de violencia cruel
  lexicon: HALOT
  rationale: '"Violencia" es la equivalencia directa y profética más transparente. Se mantiene el sustantivo simple para no debilitar la dureza del término hebreo.'
theological_decisions:
- issue: Relación entre el 'día malo' y el 'asiento de violencia'
  english_pob_reading: The line accuses the complacent elite of dismissing the coming day of calamity while at the same time hastening the establishment of violent oppression or the judgment it invites.
  chosen_spanish_reading: El verso acusa a los complacientes de apartar de sí el día de calamidad y, al mismo tiempo, de acercar el ámbito o establecimiento de la violencia.
  alternative_spanish_readings:
  - dicen no preocuparse por el juicio, pero en realidad lo apresuran
  - postergan el desastre y entronizan la violencia social
  rationale: El hebreo permite una tensión entre juicio venidero y orden social violento. La traducción española conserva esa ambigüedad sin decidir unilateralmente entre un sentido puramente escatológico o uno exclusivamente social.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requiere cambio sustantivo; se conserva la solución de alta concordancia y la tensión interpretativa del hebreo.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre "día malo" y "violencia" sin armonizarlas interpretativamente.
  - '"Asiento" sigue la decisión del POB inglés de no fijar de antemano "trono" o "reinado".'
  - La interpela­ción en segunda persona plural se expresa con "ustedes" para claridad y naturalidad en español latinoamericano.
