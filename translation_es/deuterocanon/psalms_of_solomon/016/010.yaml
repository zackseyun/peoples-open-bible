translation:
  language: es
  text: Viste mi lengua y mis labios con palabras de verdad[a]; mantén lejos de mí la ira y el furor insensato[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Rodea», «Guarda» o «Envuelve» mi lengua y mis labios con palabras de verdad.
    reason: lexical_alternative
  - marker: b
    text: O «ira irracional» o «furor irrazonable».
    reason: lexical_alternative
lexical_decisions:
- source_word: περίστειλον
  english_pob_choice: Clothe
  chosen_spanish: Cubre
  alternatives_spanish:
  - Víste
  - Rodea
  - Envuelve
  lexicon: LSJ
  rationale: El verbo griego sugiere envolver, cubrir o ceñir. En español, «cubre» conserva la imagen concreta de poner algo sobre la lengua y los labios, sin sonar tan pesado como un calco de «vestir» aplicado a órganos del habla. También deja abierta la idea de protección o control que la nota inglesa recoge con alternativas como surround/guard/restrain.
- source_word: γλῶσσάν
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - lengua hablada
  - habla
  lexicon: LSJ
  rationale: «Lengua» es el equivalente directo y mantiene la imagen corporal del original junto con «labios». «Habla» suavizaría la metáfora y perdería el paralelismo poético.
- source_word: χείλη
  english_pob_choice: lips
  chosen_spanish: labios
  alternatives_spanish:
  - boca
  lexicon: LSJ
  rationale: «Labios» reproduce con precisión el plural griego y conserva el binomio poético lengua/labios. «Boca» sería más general y debilitaría la correspondencia.
- source_word: ἐν λόγοις ἀληθείας
  english_pob_choice: with words of truth
  chosen_spanish: con palabras de verdad
  alternatives_spanish:
  - en palabras verdaderas
  - con palabras verdaderas
  lexicon: LSJ
  rationale: La construcción se vierte de forma natural como «con palabras de verdad». Se mantiene el plural de λόγοις y el sustantivo «verdad» para preservar el tono elevado del texto y no reducirlo a un simple adjetivo.
- source_word: ὀργὴν
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - ira
  lexicon: LSJ
  rationale: El término griego designa un enojo/ira. «Ira» encaja mejor con el registro bíblico-poético español y permite distinguirlo de θυμός, que se vuelve con un término distinto y más intenso.
- source_word: θυμὸν
  english_pob_choice: wrath
  chosen_spanish: furor
  alternatives_spanish:
  - ira vehemente
  - rabia
  - enojo violento
  lexicon: LSJ
  rationale: Como la frase griega presenta dos términos relacionados pero no idénticos, «furor» conserva una intensidad mayor que «ira» sin colapsar la distinción. «Furor» también comunica mejor la energía emotiva de θυμός en este contexto.
- source_word: ἄλογον
  english_pob_choice: senseless
  chosen_spanish: insensato
  alternatives_spanish:
  - irracional
  - irrazonable
  - necio
  lexicon: LSJ
  rationale: «Insensato» transmite la carencia de razón o juicio que sugiere ἄλογον y suena natural en español bíblico. «Irracional» sería exacto pero más técnico; «insensato» conserva mejor el registro devocional.
- source_word: μακρὰν ποίησον ἀπʼ ἐμοῦ
  english_pob_choice: keep ... far from me
  chosen_spanish: mantén lejos de mí
  alternatives_spanish:
  - haz ... lejos de mí
  - pon ... lejos de mí
  - aléjalo de mí
  lexicon: LSJ
  rationale: 'La expresión idiomática se naturaliza en español como una petición de alejamiento: «mantén lejos de mí». Así se conserva el sentido sin forzar una construcción demasiado literal.'
translation_notes:
  revision_awareness: La versión inglesa revisada fijó el primer miembro como «Clothe my tongue and my lips with words of truth» y mantuvo un segundo miembro separado para la ira y el furor. La presente versión española sigue esa estructura final y evita la duplicación del clausulado final detectada en revisiones anteriores. También responde a la corrección adjudicada del matiz de περιστέλλω, optando por «cubre» como solución natural en español para la imagen de envolver/ceñir la lengua y los labios con palabras verdaderas.
  spanish_consistency_notes:
  - Se mantiene el paralelismo corporal «lengua / labios».
  - Se conserva la distinción entre «ira» y «furor» para no fusionar ὀργή y θυμός.
  - El adjetivo ἄλογον se vierte como «insensato» para preservar el registro poético sin tecnicismos.
  - La puntuación separa claramente las dos peticiones del verso.
  - Las notas recogen alternativas de traducción reales, no paráfrasis libres.
