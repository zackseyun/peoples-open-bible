lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw-consecutivo marca avance narrativo. En español, «Entonces» comunica bien esa secuencia. Elegí «habló» para conservar el matiz de hablar/dirigir una palabra, en lugar del más genérico «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del texto hebreo con la forma proyectada por el proyecto en español: «Yahvé». No se sustituye por un título como «SEÑOR», para mantener la transparencia del nombre del pacto.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se vierte naturalmente con «a» en español, sin perder el valor de destino del original.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio con equivalencia estable en español bíblico.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula hebrea introduce el discurso directo siguiente. «Diciendo» preserva esa función sin convertirla en una paráfrasis más libre.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. Siguiendo la política del proyecto y la transparencia frente al original, se mantiene el nombre propio del Dios del pacto como «Yahvé», en lugar de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto base en inglés no requiere corrección sustantiva según el audit trail más reciente; la versión española sigue la misma lectura textual y conserva la decisión teológica central sobre יְהוָה con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - «Moisés» y «diciendo» respetan la fórmula narrativa hebrea sin sobrerreformulación.
  - La coma antes de «diciendo» refleja el arranque de cita en español y mantiene claridad tipográfica.
