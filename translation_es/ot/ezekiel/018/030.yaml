translation:
  language: es
  text: Por tanto, yo juzgaré a cada hombre según sus caminos, oh casa de Israel, declara el Señor Dios Yahvé. Arrepiéntanse y apártense de todas sus transgresiones, para que la iniquidad no llegue a ser para ustedes piedra de tropiezo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que su iniquidad no llegue a ser su ruina». La frase hebrea final es compacta y puede enfatizar ya sea la iniquidad como piedra de tropiezo, o la iniquidad como aquello que conduce a la ruina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Expresa con naturalidad la consecuencia inferida del contexto previo, conservando el valor lógico de la partícula.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: Mantiene el valor distributivo individual del hebreo y preserva la forma masculina representativa que la POB documenta en inglés.
- source_word: כִּדְרָכָיו
  english_pob_choice: according to his ways
  chosen_spanish: según sus caminos
  alternatives_spanish:
  - conforme a su conducta
  - según su manera de vivir
  lexicon: HALOT
  rationale: “Caminos” conserva la metáfora hebrea de conducta habitual y encaja con el lenguaje profético del pasaje.
- source_word: אֶשְׁפֹּט אֶתְכֶם
  english_pob_choice: I will judge
  chosen_spanish: yo juzgaré
  alternatives_spanish:
  - haré juicio
  - dictaré juicio
  lexicon: HALOT
  rationale: El verbo tiene fuerza judicial/forense; “juzgaré” es la equivalencia directa y natural en español.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel,
  - casa de Israel, ¡
  lexicon: HALOT
  rationale: Se conserva el vocativo profético sin añadir elementos innecesarios; el guion reproduce el aparte exhortativo de la línea.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - dice el Señor Yahvé
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se mantiene el valor de fórmula profética con “declara” y se usa “Yahvé” como el nombre divino principal según la terminología del proyecto, en lugar de la sustitución por “SEÑOR”.
- source_word: שׁוּבוּ
  english_pob_choice: Repent
  chosen_spanish: Arrepiéntanse
  alternatives_spanish:
  - Vuélvanse
  - Conviértanse
  lexicon: HALOT
  rationale: En este contexto exhortativo, el hebreo implica un retorno moral y relacional; “arrepiéntanse” expresa ese sentido sin perder la fuerza de la llamada.
- source_word: וְהָשִׁיבוּ
  english_pob_choice: turn away
  chosen_spanish: vuélvanse
  alternatives_spanish:
  - apártense
  - déjense
  lexicon: HALOT
  rationale: El hifil de שוב con מן pide apartarse de los delitos; “vuélvanse” conserva la relación semántica con el primer imperativo y evita una repetición demasiado rígida.
- source_word: מִכָּל פִּשְׁעֵיכֶם
  english_pob_choice: from all your transgressions
  chosen_spanish: de todos sus delitos
  alternatives_spanish:
  - de todas sus transgresiones
  - de todas sus rebeliones
  lexicon: HALOT
  rationale: פֶּשַׁע puede expresar rebelión o transgresión; “delitos” comunica la culpa moral y judicial en español sin sobredeterminar el matiz.
- source_word: לְמִכְשׁוֹל
  english_pob_choice: a stumbling block
  chosen_spanish: tropezadero
  alternatives_spanish:
  - piedra de tropiezo
  - obstáculo
  lexicon: HALOT
  rationale: “Tropezadero” preserva la imagen verbal de algo en lo que uno tropieza y evita una frase demasiado interpretativa.
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - el pecado
  - la culpa
  lexicon: HALOT
  rationale: Se conserva “iniquidad” para respetar el término moral fuerte del hebreo y la tensión semántica que la POB documenta en la nota inglesa.
theological_decisions:
- issue: El uso de Yahvé para יְהוִה dentro de la fórmula profética
  english_pob_reading: declares the Lord GOD
  chosen_spanish_reading: declara el Señor Yahvé
  alternative_spanish_readings:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  rationale: La POB distingue entre אֲדֹנָי y el nombre divino; en español se conserva esa distinción con “Señor Yahvé”, evitando la convención de enmascarar el nombre propio y manteniendo la transparencia del texto fuente.
  doctrine_reference: DOCTRINE.md §Terminología del nombre divino
- issue: La llamada שׁוּבוּ / וְהָשִׁיבוּ como arrepentimiento y apartamiento
  english_pob_reading: Repent and turn away
  chosen_spanish_reading: Arrepiéntanse y vuélvanse
  alternative_spanish_readings:
  - Arrepiéntanse y apártense
  - Vuélvanse y apártense
  rationale: El hebreo combina retorno interior con abandono efectivo del pecado; “arrepiéntanse” y “vuélvanse” preservan ambos movimientos sin reducirlos a mera emoción o a puro cambio externo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: La frase final compacta לְמִכְשׁוֹל עָוֺן
  english_pob_reading: iniquity may not become a stumbling block to you
  chosen_spanish_reading: la iniquidad no les sea tropezadero
  alternative_spanish_readings:
  - la iniquidad no les resulte tropiezo
  - su iniquidad no los arruine
  rationale: El hebreo es condensado y admite una relación entre iniquidad, tropiezo y ruina. La redacción principal conserva la imagen de tropiezo sin resolver de más la ambigüedad que la POB deja abierta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente que prefirió “Repent and turn away” para שׁוּבוּ / וְהָשִׁיבוּ y ajustó la relación final con “stumbling block to you”. En español se optó por una solución equivalente y más natural: “Arrepiéntanse y vuélvanse… para que la iniquidad no les sea tropezadero”, manteniendo la duplicidad exhortativa y la imagen final sin sobreexplicar la cláusula compacta hebrea.'
  spanish_consistency_notes:
  - Se conserva Yahvé como nombre divino principal, coherente con la política terminológica del proyecto.
  - Se mantiene “iniquidad” para reflejar la tensión léxica de עָוֺן entre culpa, pecado y consecuencia.
  - “Caminos” reproduce la metáfora hebrea y armoniza con el lenguaje profético del capítulo.
  - La puntuación con raya tras “casa de Israel” ayuda a reflejar el vocativo del hebreo y la cadencia profética en español.
