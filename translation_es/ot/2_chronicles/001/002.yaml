    rationale: La auditoría inglesa preserva la alternativa «said to all Israel». En español debe corresponder a «dijo a todo Israel», no a «les habló a todo Israel», que repite el mismo verbo-base ya elegido y no representa la alternativa real.
  - severity: medium
    issue: Falta una nota cultural para la frase equivalente a «the heads of the fathers’ houses».
    rationale: La auditoría inglesa incluye una nota explicativa sobre líderes de clan o casa ancestral. En español, la expresión es potencialmente menos transparente, por lo que conviene conservar la nota con anclaje explícito.
  - severity: low
    issue: «Casas paternas» es comprensible, pero algo rígido y menos idiomático en español bíblico moderno.
    rationale: Una forma como «las casas de sus padres» suena más natural para lectura eclesial amplia y mantiene el matiz patrilineal del hebreo sin neutralizarlo.
