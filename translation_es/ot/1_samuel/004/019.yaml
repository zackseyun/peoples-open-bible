translation:
  language: es
  text: Y ahora su nuera, la esposa de Finehás, estaba embarazada y a punto de dar a luz. Cuando oyó el informe de que el arca de Dios había sido tomada[a], y de que su suegro y su marido habían muerto[b], se inclinó y dio a luz, porque le sobrevinieron sus dolores de parto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sobre la captura del arca de Dios». El hebreo también puede entenderse como el contenido del informe («de que el arca de Dios había sido tomada») o de manera más nominal.
    reason: lexical_alternative
  - marker: b
    text: O, «de que su suegro y su marido estaban muertos». El verbo hebreo puede expresarse como estado resultante o como hecho previo.
    reason: lexical_alternative
  - marker: c
    text: Lit., «sus dolores se volvieron sobre ella»; es un modismo que expresa que los dolores de parto le sobrevinieron de repente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכַלָּתוֹ
  english_pob_choice: Now his daughter-in-law
  chosen_spanish: Y ahora su nuera
  alternatives_spanish:
  - Y su nuera
  - Ahora su nuera
  lexicon: HALOT
  rationale: כַּלָּה aquí designa a la nuera. Conservé la conexión narrativa de וְ con "Y ahora", que suena natural en español y sigue el avance del relato sin añadir interpretación.
- source_word: אֵשֶׁת פִּינְחָס
  english_pob_choice: the wife of Phinehas
  chosen_spanish: la esposa de Finehas
  alternatives_spanish:
  - la mujer de Finehas
  - la esposa de Phinehas
  lexicon: HALOT
  rationale: La construcción en aposición identifica a la nuera de modo más preciso. "Esposa" es claro y formal en español; "mujer" sería posible, pero menos preciso y menos digno en este contexto.
- source_word: הָרָה לָלַת
  english_pob_choice: was pregnant, about to give birth
  chosen_spanish: estaba embarazada y a punto de dar a luz
  alternatives_spanish:
  - estaba encinta y a punto de dar a luz
  - estaba embarazada, cerca de dar a luz
  lexicon: HALOT
  rationale: הָרָה indica embarazo y לָלַת añade inminencia del parto. "Estaba embarazada y a punto de dar a luz" preserva ambas ideas con español natural.
- source_word: וַתִּשְׁמַע אֶת־הַשְּׁמֻעָה
  english_pob_choice: When she heard the report
  chosen_spanish: Cuando oyó el informe
  alternatives_spanish:
  - Cuando escuchó la noticia
  - Cuando oyó la noticia
  lexicon: HALOT
  rationale: שְׁמוּעָה puede ser "reporte", "noticia" o "informe". Elegí "informe" para mantener el tono formal de relato y porque el contenido sigue siendo específico y transmitido como anuncio.
- source_word: אֶל הִלָּקַח אֲרוֹן הָאֱלֹהִים
  english_pob_choice: that the ark of God had been taken
  chosen_spanish: de que el arca de Dios había sido capturada
  alternatives_spanish:
  - de que el arca de Dios había sido tomada
  - sobre la captura del arca de Dios
  lexicon: HALOT
  rationale: El infinitivo pasivo con אֶל introduce el contenido del informe. "Había sido capturada" refleja bien el pasivo y mantiene la fuerza del hecho sin caer en perífrasis más nominales.
- source_word: וּמֵת חָמִיהָ וְאִישָׁהּ
  english_pob_choice: and that her father-in-law and her husband were dead
  chosen_spanish: y de que su suegro y su marido habían muerto
  alternatives_spanish:
  - y de que su suegro y su marido estaban muertos
  - y de que su suegro y su esposo habían muerto
  lexicon: HALOT
  rationale: מֵת admite un valor estativo o de evento previo. Opté por "habían muerto" siguiendo la posibilidad verbal señalada en la nota inglesa y porque suena más natural junto al resto del contenido del informe.
- source_word: וַתִּכְרַע
  english_pob_choice: she bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - dobló las rodillas
  lexicon: HALOT
  rationale: כרע literalmente implica doblarse, inclinarse o arrodillarse. En este contexto de parto, "se inclinó" evita una lectura demasiado ritual o demasiado interpretativa, y mantiene el movimiento corporal de manera sobria.
- source_word: וַתֵּלֶד
  english_pob_choice: and gave birth
  chosen_spanish: y dio a luz
  alternatives_spanish:
  - y dio a luz a un hijo
  - y parió
  lexicon: HALOT
  rationale: ילד en este uso femenino significa "dar a luz". La forma breve mantiene el ritmo narrativo y es idiomática en español contemporáneo.
- source_word: כִּי נֶהֶפְכוּ עָלֶיהָ צִרֶיהָ
  english_pob_choice: because her labor pains came upon her
  chosen_spanish: porque sus dolores de parto la sobrevinieron
  alternatives_spanish:
  - porque le sobrevinieron sus dolores de parto
  - porque sus dolores de parto cayeron sobre ella
  lexicon: HALOT
  rationale: צִירִים se refiere a dolores de parto. La expresión idiomática נֶהֶפְכוּ עָלֶיהָ admite la idea de venir/caer/sobrevenir. "La sobrevinieron" conserva la imagen de irrupción súbita y el tono más cercano al hebreo.
theological_decisions:
- issue: Traducción del nombre divino en "אֲרוֹן הָאֱלֹהִים"
  english_pob_reading: the ark of God
  chosen_spanish_reading: el arca de Dios
  alternative_spanish_readings:
  - el arca de Yahvé
  - el arca de Dios
  rationale: El hebreo aquí dice literalmente "arca de Dios"; no hay YHWH en la frase. Mantengo "Dios" para respetar el texto y la formulación ya auditada en inglés, sin introducir el Nombre divino donde el versículo no lo usa.
  doctrine_reference: No aplica; fidelidad léxica al referente divino en el texto.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió "bent down" por "bowed down" para hacer más natural y formal la traducción de וַתִּכְרַע. En español, opté por "se inclinó" como equivalente sobrio y no ritualizante, adecuado al contexto obstétrico y coherente con la revisión de evitar un giro demasiado literal o excesivamente devocional.
  spanish_consistency_notes:
  - Se mantuvo "arca de Dios" conforme al hebreo y al audit trail; no se sustituyó por "arca del Señor".
  - '"Finehas" sigue la transliteración española habitual de פִּינְחָס.'
  - Se preservó la secuencia narrativa con dos cláusulas de contenido introducidas por "de que", siguiendo la estructura del informe en español natural.
  - '"Dar a luz" se usa para ילדה en contexto de parto femenino; no se empleó "parir" por ser más áspero y menos idiomático en registro bíblico contemporáneo.'
  - Las notas a pie de página se anclan en la alternativa de "capturada", en el valor verbal de "habían muerto" y en el modismo de los dolores de parto.
