revisions:
- from: Estos son los descendientes de los cielos y de la tierra cuando fueron creados[a][b], en el día en que Yahvé Dios hizo la tierra y los cielos[c].
  to: Estas son las generaciones[a] de los cielos y la tierra cuando fueron creados, en el día en que[b] Yahvé[c] Dios hizo la tierra y los cielos.
  rationale: Se reemplaza «descendientes» por «generaciones» para reflejar con fidelidad la fórmula תוֹלְדוֹת de Génesis y evitar un español semánticamente impropio. Se reubica la nota sobre YHWH junto a «Yahvé» y se ajusta la nota del modismo temporal para mayor precisión. El resto del versículo puede mantenerse.
