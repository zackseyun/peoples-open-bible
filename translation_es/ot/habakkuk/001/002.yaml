review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la fórmula de lamento עַד אָ֧נָה como «¿Hasta cuándo?», el nombre divino «Yahvé», el clamor de socorro, «¡Violencia!» para חָמָס, y el cierre «y no salvas». Sin embargo, la nota al pie no preserva correctamente la alternativa del audit trail inglés: la supuesta alternativa literal repite esencialmente el texto principal y omite el matiz perfectivo documentado («he clamado» / «he pedido ayuda»).'
  spanish_quality_summary: El español es claro y digno. «¿Hasta cuándo, Yahvé, clamaré por ayuda y no escucharás?» es legible y transmite bien el lamento. «Clamo a ti» funciona, aunque «clamo a ti»/«clamo a ti» tiene un tinte algo formal; no es problemático. La principal corrección necesaria es documental y de fidelidad de nota, no de fluidez principal.
  glossary_alignment: 'Alineación correcta con la terminología del proyecto: יְהוָה → «Yahvé»; חָמָס → «Violencia»; ישׁע → «salvas». No hay conflicto terminológico relevante.'
  issues:
  - severity: medium
    issue: La nota al pie [a] no refleja la alternativa preservada en el audit trail inglés.
    rationale: El inglés documenta como alternativa más literal «Until when, O LORD, have I cried for help…?». En español, la nota debería reflejar el valor más literal/perfectivo, por ejemplo «¿Hasta cuándo, Yahvé, he clamado por ayuda...?». La nota actual repite «clamaré», que no ofrece una alternativa real al texto principal.
  revised_spanish_text: '¿Hasta cuándo[a], Yahvé, clamaré por ayuda y no escucharás? Clamo a ti: «¡Violencia!», y no salvas.'
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Hasta cuándo, Yahvé, he clamado por ayuda...?».'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel, natural y coherente con la revisión inglesa que prefirió una formulación de lamento prospectivo/iterativo. Se corrige únicamente la nota [a] para que preserve de verdad la alternativa más literal documentada en el audit trail inglés, con el matiz perfectivo de שִׁוַּעְתִּי.
