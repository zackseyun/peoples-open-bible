translation:
  language: es
  text: Y de entre[a] los sacerdotes, los levitas y los jefes de sus casas paternas[b] vinieron los ancianos que habían visto la casa anterior[c], y ante la construcción de esta clamaron con un gran clamor y un gran llanto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''De entre'' refleja la procedencia dentro del grupo sacerdotal; no significa necesariamente que todos los sacerdotes estuvieran presentes.'
    reason: lexical_alternative
  - marker: b
    text: '''Casas paternas'' conserva el lenguaje de linaje familiar del griego y de la formulación bíblica tradicional; no se refiere a casas en sentido arquitectónico.'
    reason: cultural_note
  - marker: c
    text: El griego dice 'la casa anterior' y 'esta', conservando el idioma de 'casa' para el santuario.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκ τῶν ἱερέων
  english_pob_choice: from the priests
  chosen_spanish: de entre los sacerdotes
  alternatives_spanish:
  - de los sacerdotes
  - de entre los sacerdotes y
  lexicon: BDAG
  rationale: El griego marca origen o procedencia dentro de un grupo. 'De entre' preserva mejor ese matiz que un simple 'de' y evita sugerir que todos los sacerdotes participaron.
- source_word: τῶν Λευειτῶν
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  - los descendientes de Leví
  lexicon: BDAG
  rationale: '''Levitas'' es el equivalente natural y bíblico en español, claro y fiel al término de grupo del original.'
- source_word: τῶν προκαθημένων
  english_pob_choice: the heads
  chosen_spanish: los cabezas
  alternatives_spanish:
  - los jefes
  - los principales
  - los que presidían
  lexicon: LSJ
  rationale: El inglés POB eligió 'heads' para mantener el sentido de jefatura familiar. En español, 'cabezas' conserva esa imagen de manera directa y enlaza bien con 'casas paternas'.
- source_word: κατὰ τὰς πατριὰς αὐτῶν
  english_pob_choice: of their ancestral houses
  chosen_spanish: de sus casas paternas
  alternatives_spanish:
  - según sus familias
  - de sus linajes paternos
  - de sus casas ancestrales
  lexicon: LSJ
  rationale: La expresión apunta a la organización por linajes paternos. 'Casas paternas' es la fórmula bíblica más transparente en español y conserva el matiz de linaje doméstico.
- source_word: οἱ πρεσβύτεροι
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los ancianos
  - los mayores
  - los presbíteros
  lexicon: BDAG
  rationale: Aunque 'ancianos' puede sonar también a oficio, aquí el contexto enfatiza edad y memoria testimonial de quienes habían visto el templo anterior.
- source_word: ἑωρακότες
  english_pob_choice: who had seen
  chosen_spanish: que habían visto
  alternatives_spanish:
  - habiendo visto
  - que habían contemplado
  lexicon: BDAG
  rationale: El participio perfecto expresa una visión previa con relevancia presente. 'Habían visto' lo comunica con naturalidad y sin añadir solemnidad innecesaria.
- source_word: τὸν πρὸ τοῦ οἶκον
  english_pob_choice: the former house
  chosen_spanish: la casa anterior
  alternatives_spanish:
  - la casa anterior
  - la casa de antes
  - el templo anterior
  lexicon: LSJ
  rationale: Se conserva el idioma del 'house' para el santuario, pero en español 'la casa anterior' suena más natural que 'la casa anterior' con artículo masculino concordado con una traducción rígida del inglés. 'Casa' mantiene la referencia al templo sin explicitar más de lo que el texto dice.
- source_word: πρὸς τὴν τούτου οἰκοδομήν
  english_pob_choice: at the building of this one
  chosen_spanish: al ver la construcción de esta
  alternatives_spanish:
  - en la construcción de esta
  - ante la edificación de esta
  - cuando se construía esta
  lexicon: LSJ
  rationale: La construcción griega es comprimida y contextual. En español, 'al ver la construcción de esta' integra la reacción con el acto de observar la obra en curso, sin perder el contraste con la casa anterior.
- source_word: μετὰ κραυγῆς καὶ κλαυθμοῦ μεγάλου
  english_pob_choice: with a loud cry and great weeping
  chosen_spanish: con un gran clamor y un gran llanto
  alternatives_spanish:
  - con un fuerte clamor y mucho llanto
  - con un gran grito y gran llanto
  - con un clamor fuerte y profundo llanto
  lexicon: BDAG
  rationale: El griego distingue claramente entre el grito/clamor y el llanto, ambos intensificados. 'Gran clamor' y 'gran llanto' preservan esa doble expresión emocional sin forzar una frase verbal que no exige el original.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando los marcadores de nota directamente en el texto español y alineando la puntuación con el contenido de las notas.
  spanish_consistency_notes:
  - Se mantuvo 'casa' para el templo, siguiendo el idiomático 'house' del original y la decisión auditada en inglés.
  - Se usó 'ancianos' para οἱ πρεσβύτεροι, evitando introducir un cargo eclesiástico no explicitado por el contexto.
  - 'Se conservó la doble fuerza emocional del griego: clamor y llanto, ambos intensificados por ''gran''.'
