  text: הֲ/יֻקַּ֤ח מִמֶּ֨/נּוּ֙ עֵ֔ץ לַ/עֲשׂ֖וֹת לִ/מְלָאכָ֑ה אִם יִקְח֤וּ מִמֶּ֨/נּוּ֙ יָתֵ֔ד לִ/תְל֥וֹת עָלָ֖י/ו כָּל כֶּֽלִי־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/015/003.yaml
  text: Is wood taken from it to make anything? Or do they take from it a peg to hang every vessel on it?[a][b][c]
  footnotes:
  - marker: a
    text: Or, 'to make anything for work' / 'for any useful task.' The Hebrew phrase לַעֲשׂוֹת לִמְלָאכָה emphasizes practical usefulness.
    reason: lexical_alternative
  - marker: b
    text: '''Peg'' could also be rendered ''stake'' or ''nail,'' but the sense is a fixed support from which objects are hung.'
    reason: lexical_alternative
  - marker: c
    text: '''Vessel'' here is a broad term for an article, implement, or container, not only pottery.'
    reason: lexical_alternative
