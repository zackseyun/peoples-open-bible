review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: la carreta llega al campo de Josué de Bet-semes, se detiene allí, hay una piedra grande, parten la madera de la carreta y ofrecen las vacas en holocausto a Yahvé. La mayor desviación no está en el texto principal sino en la nota c, que dice ''La fuente hebrea dice literalmente «a Yahvé»'', aunque el texto principal ya traduce exactamente eso; además no preserva la alternativa auditada del inglés (''a Yahvé'' frente a ''al SEÑOR'').'
  spanish_quality_summary: El español es natural, claro y digno. 'La carreta', 'se detuvo allí', 'piedra grande' y 'holocausto' funcionan bien. El gentilicio 'bet-semesita' es aceptable en este proyecto, aunque algo técnico; no exige cambio. Conviene ajustar la nota c para que sea realmente informativa y coherente con el expediente.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé'', עֹלָה -> ''holocausto'', הָעֲגָלָה -> ''carreta'', הַפָּרוֹת -> ''vacas''. No hay conflicto doctrinal. La única corrección necesaria es de aparato de nota, no de glosario principal.'
  issues:
  - severity: medium
    issue: La nota c es redundante e inexacta como nota textual
    rationale: Dice 'La fuente hebrea dice literalmente «a Yahvé»', pero el texto español ya dice 'a Yahvé'; por tanto no aporta información útil. Además, el expediente inglés preserva como alternativa la forma tradicional 'al SEÑOR', y eso debería reflejarse si se mantiene una nota aquí.
  - severity: low
    issue: El aparato de notas no sigue del todo la lógica del audit trail inglés
    rationale: La nota c en inglés registra una alternativa de traducción para el Tetragrama. En español, la nota debería explicar la alternativa relevante ('al SEÑOR') o eliminarse, no repetir literalmente la lectura adoptada.
  revised_spanish_text: La carreta[a] llegó al campo de Josué el bet-semesita y se detuvo allí[b], donde había una piedra grande. Entonces partieron la madera de la carreta y ofrecieron las vacas como holocausto a Yahvé[c].
  revised_footnotes:
  - marker: a
    text: O «el carro». El hebreo עֲגָלָה nombra un vehículo de ruedas; aquí se refiere a la carreta que llevaba el arca y la ofrenda.
    reason: lexical_alternative
  - marker: b
    text: O «y estuvo allí». El verbo hebreo dice literalmente «estuvo de pie», pero aplicado a una carreta en movimiento se entiende que se detuvo.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «a Yahvé»; alternativamente, «al SEÑOR».
    reason: alternative_reading
  revision_rationale: 'El texto principal puede mantenerse. Solo hace falta reparar la nota c para que refleje de manera útil y fiel el expediente: el hebreo usa el nombre divino, y la alternativa relevante frente a la decisión del proyecto es «al SEÑOR», no una repetición redundante de «a Yahvé».'
