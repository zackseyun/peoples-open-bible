    issue: Marcadores de notas mal anclados
    rationale: La nota [a] explica ψιθυρ- («labios calumniosos / calumniadores»), pero está puesta sobre «inicuos». La nota [b] sobre «casas» está anclada a «inocentes». Esto incumple la disciplina requerida de que cada nota aparezca exactamente en la palabra o frase pertinente.
  - severity: medium
