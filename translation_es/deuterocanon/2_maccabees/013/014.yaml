translation:
  language: es
  text: Y después de encomendar el resultado al Señor del mundo[a], y de exhortar a los que estaban con él a luchar valerosamente hasta la muerte por las leyes, el templo, la ciudad, la patria y la comunidad política[b], acampó cerca de Modeín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘al Señor del universo’. El griego κόσμος puede significar el mundo o el universo ordenado.
    reason: lexical_alternative
  - marker: b
    text: ‘Comunidad política’ traduce πολιτεία, que también puede significar ‘constitución’, ‘orden cívico’ o ‘modo de vida’.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοὺς δὲ τὴν ἐπιτροπὴν
  english_pob_choice: after entrusting the outcome
  chosen_spanish: después de encomendar el resultado
  alternatives_spanish:
  - después de confiar la tarea
  - después de poner el asunto en manos de
  lexicon: LSJ
  rationale: El participio aoristo con ἐπιτροπήν expresa el acto de poner algo bajo la custodia o disposición de otro. En este contexto militar no suena natural en español hablar de ‘supervisión’; ‘encomendar el resultado’ sigue el sentido de entregar el desenlace a Dios.
- source_word: τῷ κυρίῳ τοῦ κόσμου
  english_pob_choice: to the Lord of the world
  chosen_spanish: al Señor del mundo
  alternatives_spanish:
  - al Señor del universo
  lexicon: LSJ
  rationale: κύριος se mantiene como ‘Señor’ según el uso bíblico del término; κόσμος se vierte por ‘mundo’ como opción más directa y cercana al griego, dejando abierta la alternativa ‘universo’ documentada en el audit trail.
- source_word: παρακαλέσας
  english_pob_choice: urging
  chosen_spanish: exhortar
  alternatives_spanish:
  - animar
  - instar
  lexicon: LSJ
  rationale: El participio introduce una exhortación militar solemne. ‘Exhortar’ conserva el tono de llamado serio y público, más preciso que un simple ‘animar’.
- source_word: τοὺς σὺν αὐτῷ
  english_pob_choice: those with him
  chosen_spanish: a los que estaban con él
  alternatives_spanish:
  - a sus compañeros
  - a los que lo acompañaban
  lexicon: LSJ
  rationale: La construcción es descriptiva y no exige identificar de manera más estrecha a los hombres. ‘Los que estaban con él’ mantiene la amplitud del griego sin añadir interpretación.
- source_word: γενναίως ἀγωνίσασθαι
  english_pob_choice: to fight bravely
  chosen_spanish: luchar valerosamente
  alternatives_spanish:
  - contender noblemente
  - combatir con valentía
  lexicon: LSJ
  rationale: En contexto bélico, ἀγωνίζομαι puede traducirse naturalmente por ‘luchar’; γενναίως añade el matiz de nobleza y coraje, bien expresado por ‘valerosamente’.
- source_word: μέχρι θανάτου
  english_pob_choice: to the death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - hasta el final
  lexicon: LSJ
  rationale: La frase idiomática se expresa de modo natural como ‘hasta la muerte’, que preserva la disposición extrema del griego.
- source_word: περὶ νόμων, ἱεροῦ, πόλεως, πατρίδος, πολιτείας
  english_pob_choice: for the laws, the temple, the city, the homeland, and the commonwealth
  chosen_spanish: por las leyes, el templo, la ciudad, la patria y la comunidad política
  alternatives_spanish:
  - por la Ley, el santuario, la ciudad, la tierra patria y el orden cívico
  - por las leyes, el lugar santo, la ciudad, la patria y la constitución
  lexicon: LSJ
  rationale: 'περὶ aquí tiene valor de defensa o causa: ‘por’. νόμων aparece en plural, por eso ‘las leyes’. ἱεροῦ se entiende mejor como ‘templo’ en este contexto. πατρίς se vierte por ‘patria’, forma clara y natural en español. πολιτεία conserva la dimensión cívico-política con ‘comunidad política’, evitando reducirla solo a ‘constitución’ o solo a ‘modo de vida’.'
- source_word: περὶ δὲ Μωδεεὶμ
  english_pob_choice: near Modein
  chosen_spanish: cerca de Modeín
  alternatives_spanish:
  - en las cercanías de Modeín
  - junto a Modeín
  lexicon: LSJ
  rationale: Con topónimos, περὶ indica proximidad. ‘Cerca de’ reproduce esa cercanía de manera sobria y natural en español.
- source_word: ἐποιήσατο τὴν στρατιάν
  english_pob_choice: he encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - formó su ejército
  - dispuso sus tropas
  lexicon: LSJ
  rationale: La revisión inglesa entendió la frase en sentido militar de acampar/establecer el ejército. ‘Acampó’ es la traducción más directa y fluida para ese movimiento narrativo.
theological_decisions:
- issue: Título divino en κύριος aplicado al soberano del mundo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Soberano
  rationale: Se conserva el título teológico tradicional y bíblico ‘Señor’ para κύριος, conforme al criterio del proyecto, sin ocultar el lenguaje del texto griego.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sentido de πολιτεία en un contexto de defensa nacional-religiosa
  english_pob_reading: commonwealth
  chosen_spanish_reading: comunidad política
  alternative_spanish_readings:
  - orden cívico
  - constitución
  - estado
  rationale: ‘Comunidad política’ preserva la idea de cuerpo cívico o colectivo nacional sin estrechar indebidamente πολιτεία a una constitución escrita o a una forma moderna de Estado.
  doctrine_reference: LSJ πολιτεία; English POB note on commonwealth
- issue: Fuerza de μάχομαι/ἀγωνίζομαι en contexto militar
  english_pob_reading: fight bravely
  chosen_spanish_reading: luchar valerosamente
  alternative_spanish_readings:
  - combatir con valentía
  - pelear con valor
  rationale: La exhortación pide una respuesta militar concreta, pero el verbo griego también mantiene una idea de contienda. ‘Luchar valerosamente’ sostiene ambas dimensiones sin volverlo demasiado coloquial.
  doctrine_reference: Contexto narrativo de 2 Maccabees 13:14
translation_notes:
  revision_awareness: La versión inglesa revisada cambió ‘oversight’ por ‘outcome’ para ἐπιτροπή y ‘set his army in order near Modein’ por ‘encamped near Modein’. Por eso la redacción española evita ideas administrativas y usa ‘encomendar el resultado’ y ‘acampó cerca de Modeín’, siguiendo la revisión más reciente y el sentido militar inmediato.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar del proyecto para el Nombre divino, pero aquí el texto griego usa κύριος y el contexto exige ‘Señor’.
  - Se preserva la distinción entre ‘leyes’ y ‘templo’, sin fusionar ἱεροῦ con ‘santuario’ salvo que el contexto lo requiriera.
  - ‘Patria’ se usa como equivalente natural de πατρίς, mientras que πολιτεία se resuelve por ‘comunidad política’ para no perder la dimensión cívica.
  - 'El orden verbal sigue la secuencia participial del griego con una estructura natural en español: encomendar/exhortar/acampar.'
