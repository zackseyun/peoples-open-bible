lexical_decisions:
- source_word: τοῦ ἐπιθεῖναι
  english_pob_choice: to bring down
  chosen_spanish: abatir
  alternatives_spanish:
  - poner
  - derribar
  - rebajar
  lexicon: LSJ
  rationale: El infinitivo articular expresa la finalidad de una acción previa; en español, 'abatir' reproduce con naturalidad la idea de reducir o humillar sin añadir un matiz más fuerte que el griego.
- source_word: τὴν ὑπερηφανίαν
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - orgullo
  - soberbia
  - altivez
  lexicon: BDAG
  rationale: ὑπερηφανία denota autoexaltación orgullosa y despreciativa; 'arrogancia' conserva bien esa fuerza negativa en español contemporáneo.
- source_word: τοῦ δράκοντος
  english_pob_choice: the dragon
  chosen_spanish: del dragón
  alternatives_spanish:
  - de la serpiente
  - del monstruo
  lexicon: LSJ
  rationale: Se conserva la imagen literal de δράκων para no resolver interpretativamente el referente en el texto principal.
- source_word: ἐν ἀτιμίᾳ
  english_pob_choice: in dishonor
  chosen_spanish: en deshonra
  alternatives_spanish:
  - en deshonor
  - en vergüenza
  - en ignominia
  lexicon: BDAG
  rationale: ἀτιμία expresa deshonra, pérdida de honor o humillación pública. 'En deshonra' mantiene ese valor más directamente que una paráfrasis idiomática como 'poner en vergüenza'.
theological_decisions:
- issue: Identidad del dragón
  english_pob_reading: Retain the metaphor as 'the dragon' in the main text.
  chosen_spanish_reading: Mantener 'el dragón' en el texto principal.
  alternative_spanish_readings:
  - Identificarlo explícitamente como un gobernante histórico o poder opresor
  rationale: El versículo no nombra al referente y usa una imagen figurada. Mantenerla preserva la tensión interpretativa y evita resolverla en la traducción principal.
  doctrine_reference: Preservar la tensión teológica e interpretativa sin resolverla de antemano.
- issue: Relación entre ἐπιθεῖναι y ἐν ἀτιμίᾳ
  english_pob_reading: Bring down the arrogance ... in dishonor
  chosen_spanish_reading: Abatir ... en deshonra
  alternative_spanish_readings:
  - poner ... en vergüenza
  - humillar ... con deshonra
  rationale: La revisión auditada destaca el peso de ἀτιμία como deshonra pública. 'Abatir ... en deshonra' conserva esa carga sin diluirla en una expresión meramente idiomática.
  doctrine_reference: No aplica; decisión de matiz léxico y retórico.
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión más reciente, que corrigió una paráfrasis de 'turn ... into dishonor' hacia una forma más cercana a ἐπιθεῖναι y ἐν ἀτιμίᾳ. Por eso se eligió 'abatir ... en deshonra', que mantiene el valor de humillación pública y la estructura final de finalidad.
  spanish_consistency_notes:
  - Se conserva 'dragón' de forma literal, siguiendo la decisión inglesa de retener la metáfora.
  - '''Deshonra'' se prefirió a ''vergüenza'' para reflejar mejor ἀτιμία como pérdida pública de honor.'
  - '''Arrogancia'' traduce de forma natural ὑπερηφανία sin suavizar su tono negativo.'
