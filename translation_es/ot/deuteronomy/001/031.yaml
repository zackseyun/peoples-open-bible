translation:
  language: es
  text: y en el desierto[a], donde viste que Yahvé tu Dios te cargó, como un hombre lleva a su hijo[b], por todo el camino que ustedes han recorrido, hasta llegar a este lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''en el yermo''.'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'como un hombre lleva a su hijo'; algunas versiones lo vuelven más general, 'como uno lleva a un niño'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַמִּדְבָּר
  english_pob_choice: and in the wilderness
  chosen_spanish: y en el desierto
  alternatives_spanish:
  - y en el desierto
  - y en el yermo
  lexicon: HALOT
  rationale: מִדְבָּר nombra el área árida del éxodo; en español, 'desierto' es la equivalencia más natural y transparente aquí. Mantiene el sentido geográfico sin volverlo más interpretativo que el hebreo.
- source_word: אֲשֶׁר רָאִיתָ
  english_pob_choice: where you saw
  chosen_spanish: donde viste
  alternatives_spanish:
  - donde viste
  - en el cual viste
  lexicon: HALOT
  rationale: La relativa se integra de modo natural con 'en el desierto'. 'Donde viste' comunica la experiencia directa de Israel sin rigidizar innecesariamente la sintaxis.
- source_word: נְשָׂאֲךָ
  english_pob_choice: carried you
  chosen_spanish: te llevó en brazos
  alternatives_spanish:
  - te llevó
  - te sostuvo
  lexicon: HALOT
  rationale: נשא tiene el sentido de cargar/portar. En este contexto, 'te llevó en brazos' preserva la imagen de cuidado personal y se ajusta a la comparación inmediata con el padre que lleva a su hijo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino explícito, conforme al criterio POB, en vez de sustituirlo por una forma de título. 'Yahvé' es la forma castellana estable del transliterado.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: La construcción de pacto se expresa de manera directa y sobria en español. 'Tu Dios' conserva la relación posesiva y covenantal del hebreo.
- source_word: כַּאֲשֶׁר יִשָּׂא אִישׁ אֶת בְּנוֹ
  english_pob_choice: just as a man carries his son
  chosen_spanish: como un hombre lleva a su hijo
  alternatives_spanish:
  - como un hombre lleva a su hijo
  - como un padre lleva a su hijo
  - como alguien lleva a su hijo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'un hombre' y 'su hijo'. Se conserva esa imaginería masculina sin neutralizarla ni intensificarla a 'padre'. 'Lleva a su hijo' reproduce la acción de cargar con naturalidad en español.
- source_word: בְּכָל הַדֶּרֶךְ
  english_pob_choice: all along the way
  chosen_spanish: por todo el camino
  alternatives_spanish:
  - por todo el camino
  - a lo largo de todo el camino
  lexicon: HALOT
  rationale: La frase expresa duración continua durante el trayecto. 'Por todo el camino' comunica bien ese matiz en español contemporáneo y evita una construcción demasiado pesada.
- source_word: אֲשֶׁר הֲלַכְתֶּם
  english_pob_choice: that you traveled
  chosen_spanish: que ustedes han andado
  alternatives_spanish:
  - que ustedes han andado
  - que caminaron
  - que ustedes recorrieron
  lexicon: HALOT
  rationale: הָלַךְ es literalmente 'andar/ir'. 'Han andado' mantiene el verbo de movimiento y, con el perfecto compuesto, suena natural en el discurso retrospectivo de Moisés.
- source_word: עַד בֹּאֲכֶם
  english_pob_choice: until you came
  chosen_spanish: hasta llegar
  alternatives_spanish:
  - hasta llegar
  - hasta que llegaron
  lexicon: HALOT
  rationale: La idea temporal se expresa de forma idiomática con un infinitivo de finalidad/resultante en español. 'Hasta llegar' evita una repetición excesiva de verbos finitos y conserva la progresión del viaje.
- source_word: עַד הַמָּקוֹם הַזֶּה
  english_pob_choice: to this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - a este lugar
  - hasta este lugar
  lexicon: HALOT
  rationale: La deixis final apunta al sitio presente en el discurso de Moisés. 'Este lugar' es claro y natural; el uso de 'a' mantiene la dirección del movimiento sin añadir matices no requeridos.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: Se preserva el nombre propio del pacto en lugar de ocultarlo tras 'SEÑOR'. En español, 'Yahvé' comunica de forma reconocible la decisión auditada por el POB y evita perder la referencia al nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen familiar masculina en la comparación
  english_pob_reading: just as a man carries his son
  chosen_spanish_reading: como un hombre lleva a su hijo
  alternative_spanish_readings:
  - como un hombre lleva a su hijo
  - como un padre lleva a su hijo
  rationale: 'Se conserva la tensión lexical del hebreo: אִישׁ es ''hombre'', no específicamente ''padre''. La comparación sigue siendo filial y protectora sin fortalecer el término más allá del texto.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y conserva la revisión auditada del POB que afina la cláusula relativa con 'que' en vez de una formulación más libre. En español se mantuvo esa mayor directitud sintáctica, con 'donde viste que...' para reflejar la relación entre el lugar y la experiencia de Israel sin introducir paráfrasis.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Tetragrama, conforme al estándar POB.
  - Se conserva 'tu Dios' como fórmula de pacto, sin convertirla en una construcción más teológica que la del hebreo.
  - Se mantiene la imaginería masculina del símil sin neutralizarla.
  - '''Desierto'' se eligió como equivalente natural de מִדְבָּר; la nota recoge la alternativa lexical.'
  - El verbo 'lleva' refleja la idea de portar/cargar con fluidez en español; 'te llevó en brazos' en la cláusula principal ayuda a visualizar la acción sin ampliar el sentido más allá del contexto.
