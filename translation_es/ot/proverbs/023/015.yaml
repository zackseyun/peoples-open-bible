translation:
  language: es
  text: Hijo mío[a], si tu corazón es sabio, mi corazón también se alegrará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi corazón —yo mismo— se alegrará», preservando la fuerza enfática de «también / incluso yo» en el hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo mío, muchacho mío
  - Hijo
  lexicon: HALOT
  rationale: El hebreo es un vocativo paterno literal, masculino y singular. En español, «Hijo mío» conserva esa relación y el tono sapiencial sin neutralizar el género ni perder la cercanía afectiva.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición directa. «Si» reproduce mejor la estructura condicional del hebreo que «cuando», que sugeriría un matiz más esperado o asumido.
- source_word: חָכַם
  english_pob_choice: is wise
  chosen_spanish: es sabio
  alternatives_spanish:
  - se hace sabio
  - ha llegado a ser sabio
  lexicon: HALOT
  rationale: 'Aunque la forma verbal hebrea es perfecta, aquí funciona con sentido estativo/resultativo: el corazón del hijo está en estado de sabiduría. «Es sabio» transmite esa condición de manera natural en español.'
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: Se conserva «corazón» para respetar la imagen antropológica hebrea y su paralelismo con «mi corazón» en la segunda línea. «Mente» o «interior» explicarían la idea, pero borrarían la metáfora textual.
- source_word: יִשְׂמַח
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se gozará
  - se regocijará
  lexicon: HALOT
  rationale: El imperfecto expresa consecuencia futura tras la condición. En español, «se alegrará» es claro y digno; mantiene la respuesta afectiva sin volverse excesivamente solemne o arcaico.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - yo
  lexicon: HALOT
  rationale: El texto hebreo dice explícitamente «mi corazón», no solo «yo». Mantener «corazón» conserva el paralelismo con «tu corazón» y la ubicación afectiva del gozo.
- source_word: גַם אָנִי
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso yo
  - yo también
  lexicon: HALOT
  rationale: «También» reproduce bien el valor aditivo de גַם y encaja con la fluidez del español. La intensificación personal de «yo también / incluso yo» queda disponible en nota, como en el audit trail inglés.
translation_notes:
  revision_awareness: 'El pasaje coincide con el control de alta concordancia: no hubo revisiones aplicadas en el texto fuente inglés ni observaciones doctrinales pendientes. La redacción española sigue de cerca el hebreo y conserva la ambigüedad enfática de גַם אָנִי en nota.'
  spanish_consistency_notes:
  - Se mantiene «corazón» de forma consistente para לֵב/לִבּ en lugar de sustituirlo por «mente» o «interior».
  - Se usa «sabio»/«sabia» en sentido estativo para חָכַם, conforme al valor resultativo del contexto condicional.
  - «También» se coloca de forma natural en español, con la opción enfática explicada en la nota.
  - La puntuación refleja una oración condicional simple y una cláusula principal futura, acorde con la estructura hebrea.
