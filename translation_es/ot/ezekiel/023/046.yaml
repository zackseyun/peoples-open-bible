translation:
  language: es
  text: 'Porque así dice el Señor Yahvé: Haz subir contra ellas una asamblea, y entrégalas[a] al terror y al saqueo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «al horror y al saqueo». El sustantivo hebreo זַעֲוָה puede traducirse como «horror» o «espanto», destacando que llegan a ser un objeto de pavor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé de los ejércitos
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español, "el Señor Yahvé" conserva ambos elementos sin crear una repetición artificial como "Señor Señor" y sigue la convención del proyecto para YHWH.
- source_word: הַעֲלֵה
  english_pob_choice: Bring up
  chosen_spanish: Haz subir
  alternatives_spanish:
  - Trae
  - Haz venir
  lexicon: HALOT
  rationale: El imperativo hifil conserva la imagen de subir o hacer ascender a un grupo hostil. "Haz subir" es natural en español y mantiene la dirección verbal del hebreo.
- source_word: קָהָל
  english_pob_choice: an assembly
  chosen_spanish: una asamblea
  alternatives_spanish:
  - una multitud
  - una compañía
  - un ejército reunido
  lexicon: HALOT
  rationale: קָהָל designa un grupo reunido. "Asamblea" preserva la idea de reunión sin introducir de manera excesiva una especificación militar que el sustantivo por sí solo no exige.
- source_word: וְנָתֹן
  english_pob_choice: and give
  chosen_spanish: entrégalos
  alternatives_spanish:
  - dales
  - ponlos
  lexicon: HALOT
  rationale: Aquí la secuencia verbal funciona como mandato de entregar a alguien en una situación de juicio. "Entrégalos" expresa bien esa idea de ponerlos en manos de terror y saqueo, sin suavizar el verbo.
- source_word: לְזַעֲוָה
  english_pob_choice: to terror
  chosen_spanish: al terror
  alternatives_spanish:
  - al horror
  - para horror
  - para espanto
  lexicon: HALOT
  rationale: זַעֲוָה puede significar terror u horror. "Al terror" conserva el impacto semántico de ser entregados a un estado/resultado de espanto, sin eliminar la alternativa lexical documentada.
- source_word: וְלָבַז
  english_pob_choice: and plunder
  chosen_spanish: y al saqueo
  alternatives_spanish:
  - y al pillaje
  - y al botín
  lexicon: HALOT
  rationale: בַּז refiere a despojo o saqueo. "Saqueo" es natural y fiel en español; mantiene el paralelismo con "terror" y expresa la devastación resultante.
- source_word: עֲלֵיהֶם / אֶתְהֶן
  english_pob_choice: against them ... them
  chosen_spanish: contra ellos ... los
  alternatives_spanish:
  - contra ellos ... las
  - contra ellas ... las
  lexicon: HALOT
  rationale: El hebreo pasa de masculino plural a femenino plural al final del verso, una oscilación que refleja el discurso profético. En español conviene no borrar esa tensión; sin embargo, en el texto principal se prioriza la referencia colectiva con el pronombre masculino genérico, y la nota puede señalar la variante femenina si se requiere precisión.
theological_decisions:
- issue: Renderizado del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé, el Señor
  rationale: El hebreo contiene el Tetragrama directamente. Siguiendo la convención del proyecto para YHWH, se usa "Yahvé" en lugar de una máscara reverencial como "SEÑOR". La colocación con "Señor" respeta el título אֲדֹנָי sin borrar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy §2'
- issue: Valor de זַעֲוָה en contexto de juicio
  english_pob_reading: to terror / for horror
  chosen_spanish_reading: al terror
  alternative_spanish_readings:
  - al horror
  - para horror
  - al espanto
  rationale: La POB inglesa preserva la alternativa lexical 'horror'. En español, 'terror' comunica bien el efecto judicial y mantiene abierta la tensión semántica con 'horror/espanto' sin atenuarla.
  doctrine_reference: HALOT; nota léxica sobre זַעֲוָה en el audit trail
- issue: Relación sintáctica de לְזַעֲוָה וְלָבַז
  english_pob_reading: to terror and plunder
  chosen_spanish_reading: al terror y al saqueo
  alternative_spanish_readings:
  - para horror y para saqueo
  - al horror y al pillaje
  rationale: El hebreo presenta dos complementos coordinados con ל. En español, la repetición 'al ... y al ...' conserva la estructura de destino/resultado y evita diluir la fuerza judicial del verso.
  doctrine_reference: HALOT; sintaxis del paralelismo hebreo
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje inglés auditado, su filosofía de equivalencia óptima y la nota léxica sobre זַעֲוָה. No se siguió mecánicamente el inglés en el tratamiento del nombre divino: el español adopta la convención del proyecto para יְהוָה como Yahvé, manteniendo la distinción con el título אֲדֹנָי. También se preservó la estructura de mandato acumulativo del hebreo y la alternativa semántica de זַעֲוָה.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal para יְהוָה.
  - Se usó «Señor» para reflejar אֲדֹנָי dentro del título compuesto.
  - Se eligió «saqueo» para בַז por claridad contemporánea y fidelidad léxica.
  - Se conservó «terror» en el texto principal y se documentó «horror/espanto» como alternativa.
  - Se evitó borrar la fuerza imperativa del hebreo en la secuencia verbal.
