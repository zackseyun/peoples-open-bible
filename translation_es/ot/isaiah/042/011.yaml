translation:
  language: es
  text: Que alcen su voz[a] el desierto y sus ciudades, las aldeas donde habita Quedar; canten con júbilo los habitantes de Sela; griten desde las cumbres de los montes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los habitantes de la roca», si סֶלַע se toma como sustantivo común y no como el nombre propio Sela.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂא֤וּ
  english_pob_choice: let ... lift up
  chosen_spanish: ¡Levanten ...
  alternatives_spanish:
  - ¡Alcen ...
  - ¡Levanten en alto ...
  lexicon: HALOT
  rationale: El hebreo es un imperfecto yusivo en una secuencia exhortativa; en español, el imperativo plural expresa mejor la invitación. Se conserva la imagen de 'levantar' implícitamente aplicada a la voz, como en el audit trail inglés.
- source_word: מִדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el desierto yermo
  - la estepa
  lexicon: HALOT
  rationale: Aquí 'desierto' funciona de manera natural en español y mantiene el registro poético. 'Wilderness' puede reflejarse así sin perder la imagen de una región despoblada que se personifica.
- source_word: וְעָרָיו
  english_pob_choice: and its cities
  chosen_spanish: y sus ciudades
  alternatives_spanish:
  - y sus poblados
  - y sus urbes
  lexicon: HALOT
  rationale: El sufijo de 3ms se entiende con antecedente gramatical 'desierto' en el paralelismo. 'Sus ciudades' conserva la referencia relacional sin masculinizarla en español.
- source_word: חֲצֵרִים
  english_pob_choice: the settlements
  chosen_spanish: las aldeas
  alternatives_spanish:
  - los asentamientos
  - las poblaciones
  lexicon: HALOT
  rationale: חֲצֵרִים señala aldeas o asentamientos no amurallados. 'Aldeas' es una opción natural y concreta en español, compatible con el contexto de Quedar.
- source_word: תֵּשֵׁב קֵדָר
  english_pob_choice: where Kedar dwells
  chosen_spanish: donde habita Quedar
  alternatives_spanish:
  - donde mora Quedar
  - la morada de Quedar
  lexicon: HALOT
  rationale: La cláusula se vuelve relativa para sonar natural en español y conservar la idea de habitación asociada con Quedar como nombre propio.
- source_word: יָרֹנּוּ
  english_pob_choice: let ... sing for joy
  chosen_spanish: canten con júbilo
  alternatives_spanish:
  - canten de alegría
  - prorrumpan en júbilo
  lexicon: HALOT
  rationale: רנן expresa canto/exclamación jubilosa; 'canten con júbilo' recoge bien el valor celebrativo y permite un paralelismo fluido con los demás verbos exhortativos.
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los moradores de
  - los que habitan en
  lexicon: HALOT
  rationale: El participio sustantivado se vierte de manera idiomática como 'los habitantes de'.
- source_word: סֶלַע
  english_pob_choice: Sela
  chosen_spanish: Sela
  alternatives_spanish:
  - la roca
  lexicon: HALOT
  rationale: Se conserva como nombre propio, siguiendo la decisión inglesa de tratarlo probablemente como topónimo. La alternativa léxica 'roca' queda documentada en nota.
- source_word: מֵרֹאשׁ הָרִים
  english_pob_choice: from the tops of the mountains
  chosen_spanish: desde la cumbre de los montes
  alternatives_spanish:
  - desde las cimas de los montes
  - desde la cabeza de los montes
  lexicon: HALOT
  rationale: La frase espacial se expresa con un equivalente natural en español. 'Cumbre' comunica bien el sentido de 'top/peak' y 'montes' preserva el plural poético.
- source_word: יִצְוָחוּ
  english_pob_choice: let them shout
  chosen_spanish: griten
  alternatives_spanish:
  - clamen
  - griten en voz alta
  lexicon: HALOT
  rationale: צוח denota un grito fuerte; en contexto de alabanza, 'griten' comunica la exclamación jubilosa sin introducir una connotación negativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, sin cambios de revisión aplicados; se mantiene la lectura de Sela como topónimo, con la alternativa léxica documentada en nota.
  spanish_consistency_notes:
  - Se mantiene un registro poético y exhortativo coherente en toda la línea.
  - Se prefieren formas naturales del español moderno sin perder la personificación del desierto y sus poblaciones.
  - 'El paralelo final conserva la sucesión verbal de llamada a la alabanza: levanten, canten, griten.'
