- from: El rey Salomón también construyó una flota de naves en Ezión-geber[a], que está junto a Elot, en la orilla del mar de Suf, en la tierra de Edom.
  to: El rey Salomón también construyó una flota de naves en Ezión-geber[a], que está junto a Elot, en la orilla del Mar Rojo, en la tierra de Edom.
  rationale: 'Se corrige la principal divergencia con la decisión léxica auditada: el texto principal debe decir ''Mar Rojo'' en este contexto geográfico, mientras la forma más literal ''mar de Suf'' se conserva en nota. El resto del versículo puede mantenerse, pues es fiel al hebreo y natural en español.'
