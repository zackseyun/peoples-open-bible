translation:
  language: es
  text: Pero la prudencia es la más soberana[a] de todas, de la cual procede, en efecto, el dominio de la razón sobre las pasiones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "suprema sobre todas". El superlativo griego κυριωτάτη puede expresar altura de rango, autoridad o dominio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "la razón prevalece sobre las pasiones". El verbo puede significar prevalecer, imponerse o ejercer dominio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κυριωτάτη
  english_pob_choice: the most sovereign
  chosen_spanish: la más soberana
  alternatives_spanish:
  - suprema
  - la más autoritativa
  - la más dominante
  lexicon: LSJ
  rationale: Conserva la fuerza de superlativo con matiz de dominio o autoridad. En español, 'soberana' comunica bien la idea de primacía gobernante sin perder naturalidad.
- source_word: φρόνησις
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - sabiduría práctica
  - entendimiento
  - buen juicio
  lexicon: LSJ
  rationale: En este contexto filosófico-ético, φρόνησις apunta a la capacidad de juicio recto y práctico. 'Prudencia' es la equivalencia más estable y sobria en español.
- source_word: ἐξ ἧς
  english_pob_choice: from which
  chosen_spanish: de la cual
  alternatives_spanish:
  - de ella
  - a partir de la cual
  - desde la cual
  lexicon: LSJ
  rationale: Mantiene con claridad la relación de fuente/derivación respecto de la prudencia, sin introducir una glosa explicativa.
- source_word: λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - la facultad racional
  - el pensamiento racional
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός funciona como la facultad racional. 'La razón' es natural en español y conserva el centro conceptual del argumento.
- source_word: ἐπικρατεῖ
  english_pob_choice: gains mastery over
  chosen_spanish: prevalece sobre
  alternatives_spanish:
  - ejerce dominio sobre
  - vence a
  - gana dominio sobre
  lexicon: LSJ
  rationale: '''Prevalece sobre'' expresa la idea de superioridad operante del razonamiento sobre las pasiones sin endurecer demasiado el verbo ni añadir una imagen excesivamente técnica.'
- source_word: πάθη
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos
  - las emociones
  - los afectos
  lexicon: LSJ
  rationale: En el registro moral helenístico, πάθη alude a impulsos pasionales desordenados. 'Las pasiones' preserva esa carga ética sin importar categorías posteriores ajenas al texto.
- source_word: δὴ
  english_pob_choice: indeed
  chosen_spanish: en efecto
  alternatives_spanish:
  - ciertamente
  - de hecho
  - —
  lexicon: LSJ
  rationale: Partícula enfática que refuerza la afirmación. 'En efecto' suena natural en español y conserva el énfasis retórico.
theological_decisions:
- issue: Relación entre razón y pasiones en un marco filosófico-antropológico
  english_pob_reading: Render the verse in terms of reason mastering the passions, without importing later doctrinal categories such as 'sinful nature.'
  chosen_spanish_reading: Traducir el versículo como la superioridad de la prudencia y la prevalencia de la razón sobre las pasiones, sin introducir categorías doctrinales posteriores.
  alternative_spanish_readings:
  - la razón domina las emociones
  - la mente gobierna los deseos
  rationale: El griego pertenece al discurso moral helenístico. La traducción debe mantener ese horizonte conceptual y no resolverlo con vocabulario teológico posterior que no está presente en el original.
  doctrine_reference: Preservar la tensión lexical y antropológica del texto; primacía del original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión del texto inglés: conserva la estructura causal de ἐξ ἧς y evita añadir un conector innecesario. También mantiene el matiz de dominio de κυριωτάτη sin volverlo una paráfrasis más débil.'
  spanish_consistency_notes:
  - Se usa 'prudencia' para φρόνησις, en continuidad con el POB inglés y con el registro filosófico del pasaje.
  - '''La razón'' traduce λογισμός de manera natural en español y conserva la función racional central.'
  - '''Las pasiones'' mantiene el valor técnico-moral de πάθη sin convertirlo en ''emociones'' o ''deseos'' por defecto.'
  - La puntuación y el orden reflejan el original griego con un tono readable en español bíblico contemporáneo.
