id: 1SA.28.15
reference: 1 Samuel 28:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר שְׁמוּאֵל֙ אֶל שָׁא֔וּל לָ֥/מָּה הִרְגַּזְתַּ֖/נִי לְ/הַעֲל֣וֹת אֹתִ֑/י וַ/יֹּ֣אמֶר שָׁ֠אוּל צַר לִ֨/י מְאֹ֜ד וּ/פְלִשְׁתִּ֣ים נִלְחָמִ֣ים בִּ֗/י וֵֽ/אלֹהִ֞ים סָ֤ר מֵֽ/עָלַ/י֙ וְ/לֹֽא עָנָ֣/נִי ע֗וֹד גַּ֤ם בְּ/יַֽד הַ/נְּבִיאִם֙ גַּם בַּ֣/חֲלֹמ֔וֹת וָ/אֶקְרָאֶ֣/ה לְ/ךָ֔ לְ/הוֹדִיעֵ֖/נִי מָ֥ה אֶעֱשֶֽׂה־־׀־־־׃ס
translation:
  text: Then Samuel said to Saul[a], “Why have you disturbed me by bringing me up?” Saul answered, “I am in great distress. The Philistines are fighting against me, and God has turned away from me and no longer answers me, either by prophets or by dreams[b]. So I have called you to tell me what I should do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why have you troubled me by bringing me up?'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'by the hand of the prophets,' an idiom meaning 'through the prophets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְגַּזְתַּנִי
  chosen: have you disturbed me
  alternatives:
  - have you troubled me
  - have you agitated me
  lexicon: HALOT
  rationale: The verb from רגז conveys causing unrest, disturbance, or agitation. 'Disturbed' is natural modern English and fits the context of Samuel being summoned from the realm of the dead without overinterpreting the mechanism.
- source_word: לְהַעֲלוֹת אֹתִי
  chosen: by bringing me up
  alternatives:
  - to bring me up
  - to raise me up
  lexicon: HALOT
  rationale: עלה literally means 'to bring up/go up.' In this necromantic context, 'bringing me up' preserves the spatial imagery of summoning Samuel from below. 'Raise me up' could misleadingly suggest resurrection language.
- source_word: צַר לִי מְאֹד
  chosen: I am in great distress
  alternatives:
  - I am greatly distressed
  - it is very distressing for me
  lexicon: HALOT
  rationale: The clause expresses severe personal anguish or pressure. Rendering it idiomatically as 'I am in great distress' communicates the state clearly in English.
- source_word: נִלְחָמִים בִּי
  chosen: are fighting against me
  alternatives:
  - are warring against me
  - are attacking me
  lexicon: HALOT
  rationale: The preposition plus לחם indicates hostile action directed against Saul. 'Fighting against me' is straightforward and preserves the military sense.
- source_word: וֵאלֹהִים סָר מֵעָלַי
  chosen: God has turned away from me
  alternatives:
  - God has departed from me
  - God has withdrawn from me
  lexicon: HALOT
  rationale: סור מעל conveys withdrawal or turning aside. 'Turned away from me' is idiomatic and captures relational abandonment without implying metaphysical absence beyond the text.
- source_word: וְלֹא עָנָנִי עוֹד
  chosen: and no longer answers me
  alternatives:
  - and does not answer me anymore
  - and has not answered me further
  lexicon: HALOT
  rationale: ענה here means to answer/respond. 'No longer answers me' reflects עוד as cessation of prior response and reads naturally.
- source_word: גַּם בְּיַד הַנְּבִיאִם
  chosen: either by the prophets
  alternatives:
  - also by the prophets
  - through the prophets
  lexicon: HALOT
  rationale: ביד often means 'by means of/through the agency of.' 'By the prophets' is concise and idiomatic; paired with 'either ... or ...' it reflects the correlative גם ... גם structure.
- source_word: גַּם בַּחֲלֹמוֹת
  chosen: or by dreams
  alternatives:
  - also by dreams
  - through dreams
  lexicon: HALOT
  rationale: This is the second member of the גם ... גם pairing. 'Or by dreams' works naturally in English with the preceding 'either' and preserves dreams as a mode of divine communication.
- source_word: וָאֶקְרָאֶה לְךָ
  chosen: So I have called for you
  alternatives:
  - So I called to you
  - So I summoned you
  lexicon: HALOT
  rationale: קרא with ל can mean call to/summon. Given the séance context, 'called for you' communicates summoning without importing technical occult terminology not present in the Hebrew.
- source_word: לְהוֹדִיעֵנִי
  chosen: to tell me
  alternatives:
  - to make known to me
  - to inform me
  lexicon: HALOT
  rationale: ידע in the Hiphil means to make known. 'Tell me' is a readable modern equivalent; the fuller sense is preserved by the following clause.
- source_word: מָה אֶעֱשֶׂה
  chosen: what I should do
  alternatives:
  - what I am to do
  - what I must do
  lexicon: HALOT
  rationale: The Hebrew is literally 'what shall I do?' In indirect discourse, 'what I should do' is idiomatic English and preserves Saul's request for guidance.
