translation:
  language: es
  text: Como quien agarra las partes íntimas de una mujer y orina, así es el que entra de repente en la casa de su vecino.[b][a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo aquí presenta un proverbio corporal y deliberadamente crudo. «Partes íntimas» intenta reflejar el sentido obsceno sin caer en una vulgaridad innecesaria; otros sentidos posibles de בָּאַמָה no encajan bien en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'El griego ofrece una línea distinta: «Sus dientes son dientes de león, destruyendo las vidas de los hombres». Esto parece reflejar una forma textual sustancialmente diferente.'
    reason: textual_variant
lexical_decisions:
- source_word: הָאוֹחֵז
  english_pob_choice: like one who grasps
  chosen_spanish: Como quien agarra
  alternatives_spanish:
  - como quien se apodera de
  - como quien toma de
  lexicon: HALOT
  rationale: El participio expresa acción de sujetar o agarrar con fuerza. «Agarra» conserva la imagen concreta y violenta del proverbio sin volverlo artificial en español.
- source_word: בָּאַמָה
  english_pob_choice: a woman’s private parts
  chosen_spanish: las partes íntimas de una mujer
  alternatives_spanish:
  - el brazo
  - el codo
  - la sirvienta
  lexicon: HALOT
  rationale: En este contexto, los sentidos comunes de «brazo/codo» no encajan con la imagen obscena reforzada por la segunda cola. «Partes íntimas» comunica el sentido eufemístico/sexual con claridad y sin crudeza innecesaria.
- source_word: וּמַשְׁתִּין מָיִם
  english_pob_choice: and urinates
  chosen_spanish: y orina
  alternatives_spanish:
  - y pasa agua
  - y mea
  lexicon: HALOT
  rationale: El hebreo dice literalmente «orina agua». En español, «orina» conserva el valor corporal del dicho y evita un registro vulgar o excesivamente técnico.
- source_word: וְהַנִּכְנָס
  english_pob_choice: so is one who suddenly enters
  chosen_spanish: así es el que entra de repente
  alternatives_spanish:
  - así es el que entra
  - así es el que irrumpe
  lexicon: HALOT
  rationale: La forma participial funciona proverbially. «Así es el que entra de repente» mantiene el paralelismo y expresa la entrada inesperada que el texto destaca.
- source_word: לְבֵית חֲבֵרוֹ
  english_pob_choice: his neighbor’s house
  chosen_spanish: en la casa de su vecino
  alternatives_spanish:
  - en la casa de su amigo
  - en la casa de su compañero
  lexicon: HALOT
  rationale: «חבר» puede ser amigo, compañero o vecino. «Vecino» refleja bien a la persona socialmente cercana sin implicar mayor intimidad que la que exige el proverbio.
- source_word: פִּתְאוֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - sin aviso
  - repentinamente
  lexicon: HALOT
  rationale: «De repente» es natural en español y conserva la intrusión inesperada del adverbio.
- source_word: ὀδόντες λέοντος οἱ ὀδόντες αὐτῆς, ἀναιροῦντες ψυχὰς ἀνθρώπων
  english_pob_choice: used as a control only, not translated in the main text
  chosen_spanish: Sus dientes son dientes de león, destruyendo las vidas de los hombres.
  alternatives_spanish:
  - Sus dientes son como dientes de león, quitando la vida a los hombres.
  - Sus dientes son dientes de león, matando almas de hombres.
  lexicon: LSJ
  rationale: La línea griega presenta un testimonio textual sustancialmente distinto. Se conserva solo como variante textual documentada; si se tradujera, «destruyendo las vidas de los hombres» sería una manera natural de expresar ἀναιροῦντες ψυχὰς ἀνθρώπων en español.
theological_decisions:
- issue: Base textual en un versículo de Sirácides con divergencia fuerte entre hebreo y griego
  english_pob_reading: Translate the extant Hebrew proverb in the main text, while preserving the Greek as a textual-variant footnote.
  chosen_spanish_reading: Traducir el proverbio hebreo conservado en el texto principal y registrar la línea griega como variante textual.
  alternative_spanish_readings:
  - Traducir la línea griega de los dientes de león en el texto principal
  - Intentar una fusión armonizada de ambos testigos
  rationale: El hebreo está atestiguado y es suficientemente claro; la divergencia con el griego es de contenido, no solo de matiz. Mantener el hebreo en el texto principal evita una armonización engañosa y preserva honestamente la historia textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; preservar con honestidad la incertidumbre textual'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el último pase editorial indicó que no eran necesarios cambios adicionales.
  spanish_consistency_notes:
  - Se mantiene «vecino» para חבר en sentido sapiencial de persona cercana socialmente.
  - Se conserva el contraste entre la crudeza corporal del símil y un español publicable, sin suavizar en exceso el proverbio.
  - «Orina» se usa como equivalente neutral de וּמַשְׁתִּין מָיִם, evitando modismos excesivamente coloquiales.
  - La variante griega se documenta sin integrarla en el texto principal, conforme al criterio de priorizar el hebreo donde está conservado.
