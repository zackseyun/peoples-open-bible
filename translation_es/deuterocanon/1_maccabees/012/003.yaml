translation:
  language: es
  text: 'Y fueron a Roma, y entraron en la sala del consejo[a], y dijeron: «Jonatán el sumo sacerdote y la nación de los judíos nos han enviado para renovar con ellos la alianza como antes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «casa del consejo» / «sala de deliberación»; el griego nombra el lugar de reunión del consejo gobernante, no un título institucional romano formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθησαν
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - fueron de viaje
  - se dirigieron
  lexicon: LSJ
  rationale: El verbo indica desplazamiento; «fueron» es natural en español y conserva la simpleza del movimiento sin añadir matices no presentes en el griego.
- source_word: Ῥώμην
  english_pob_choice: Rome
  chosen_spanish: Roma
  alternatives_spanish:
  - Roma
  lexicon: LSJ
  rationale: Nombre propio geográfico estándar en español. No requiere adaptación interpretativa.
- source_word: τὸ βουλευτήριον
  english_pob_choice: council chamber
  chosen_spanish: la sala del consejo
  alternatives_spanish:
  - la cámara del consejo
  - la sala de deliberación
  - el senado
  lexicon: LSJ
  rationale: El término señala el lugar donde se reúne el consejo gobernante. «Sala del consejo» conserva el valor locativo y evita importar un título institucional romano más específico que el griego no expresa.
- source_word: Ἰωναθὰν ὁ ἀρχιερεύς
  english_pob_choice: Jonathan the high priest
  chosen_spanish: Jonatán el sumo sacerdote
  alternatives_spanish:
  - Jonatán, el sumo sacerdote
  - Jonatán el jefe de los sacerdotes
  lexicon: LSJ
  rationale: ἀρχιερεύς corresponde de manera directa a «sumo sacerdote». «Jonatán» es la forma habitual en español de Ἰωναθάν.
- source_word: τὸ ἔθνος τῶν Ἰουδαίων
  english_pob_choice: the nation of the Jews
  chosen_spanish: la nación de los judíos
  alternatives_spanish:
  - la nación judía
  - el pueblo de los judíos
  - la nación de Judea
  lexicon: LSJ
  rationale: Se conserva la estructura del griego y la referencia al cuerpo nacional. «Judíos» es la forma más inteligible y estable en español para Ἰουδαῖοι en este libro.
- source_word: ἀπέστειλαν ἡμῖς
  english_pob_choice: have sent us
  chosen_spanish: nos han enviado
  alternatives_spanish:
  - nos enviaron
  lexicon: LSJ
  rationale: El perfecto/aoristo en contexto de discurso directo se expresa naturalmente con el perfecto compuesto español, manteniendo la relevancia actual de la comisión.
- source_word: ἀνανεώσασθαι
  english_pob_choice: to renew
  chosen_spanish: renovar
  alternatives_spanish:
  - restablecer
  - renovar de nuevo
  lexicon: LSJ
  rationale: El infinitivo verbal pide una forma directa. «Renovar» refleja la idea de hacer vigente de nuevo sin añadir una repetición innecesaria.
- source_word: συμμαχίαν
  english_pob_choice: alliance
  chosen_spanish: la alianza
  alternatives_spanish:
  - el pacto
  - la alianza militar
  - el tratado
  lexicon: LSJ
  rationale: En este contexto político-diplomático, «alianza» es el equivalente más claro y menos cargado. Evita sobretraducir hacia «pacto» o «tratado» cuando el griego enfatiza la relación de alianza.
- source_word: κατὰ τὸ πρότερον
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como anteriormente
  - según lo anterior
  - como en tiempos pasados
  lexicon: LSJ
  rationale: «Como antes» reproduce de forma idiomática la referencia retrospectiva al estado previo de la alianza.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al expresar la finalidad con «para renovar con ellos la alianza», evitando el error anterior de «para ellos». También conserva la distinción espacial de βουλευτήριον como lugar de reunión del consejo, no como institución abstracta.
  spanish_consistency_notes:
  - Se mantuvo «alianza» para συμμαχία a fin de ser consistente con el valor político-diplomático del término en 1 Macabeos.
  - Se usó «sumo sacerdote» por tratarse del equivalente técnico ya asentado para ἀρχιερεύς en contextos bíblicos.
  - Se prefirió «Roma» y formas españolas corrientes de nombres propios para una lectura pública clara.
