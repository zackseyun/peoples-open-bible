translation:
  language: es
  text: 'Algunos de Manasés también se pasaron a David cuando vino con los filisteos contra Saúl a la batalla[a], aunque no los ayudaron, porque los señores de los filisteos, después de deliberar, lo despidieron, diciendo[b]: «A costa de nuestras cabezas, podría pasarse a su amo Saúl».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cayeron a David» / «se unieron a David»; el modismo hebreo significa pasarse al bando de alguien.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con nuestras cabezas»; un modismo que significa «a costa de nuestras vidas» o «para nuestra ruina».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִמְּנַשֶּׁה
  english_pob_choice: Some from Manasseh also
  chosen_spanish: Algunos de Manasés también
  alternatives_spanish:
  - Y de Manasés también
  - También algunos de Manasés
  lexicon: HALOT
  rationale: El hebreo introduce un grupo partitivo con valor aditivo. «Algunos de Manasés» expresa mejor la parte del clan que se menciona y mantiene el matiz de adición con «también».
- source_word: נָפְל֣וּ עַל דָּוִ֗יד
  english_pob_choice: defected to David
  chosen_spanish: se pasaron a David
  alternatives_spanish:
  - defectaron a David
  - se unieron a David
  lexicon: HALOT
  rationale: La idiomática נפל על en contextos político-militares no es caída literal, sino cambio de bando. En español, «se pasaron a» conserva el movimiento de lealtad sin sonar demasiado técnico.
- source_word: בְּבֹא֨וֹ עִם פְּלִשְׁתִּים עַל שָׁא֛וּל לַמִּלְחָמָה
  english_pob_choice: when he came with the Philistines against Saul for battle
  chosen_spanish: cuando él vino con los filisteos contra Saúl para la guerra
  alternatives_spanish:
  - cuando vino con los filisteos a pelear contra Saúl
  - cuando llegó con los filisteos contra Saúl para la batalla
  lexicon: HALOT
  rationale: Se conserva la secuencia temporal y la relación de acompañamiento con los filisteos. «Para la guerra» refleja el sustantivo לַמִּלְחָמָה de manera natural en español, sin perder el sentido bélico.
- source_word: וְלֹא עֲזָרֻם
  english_pob_choice: though they did not help them
  chosen_spanish: aunque no los ayudaron
  alternatives_spanish:
  - pero no los ayudaron
  - y no los ayudaron
  lexicon: HALOT
  rationale: El sufijo plural retoma de forma más natural a los filisteos, como en la lectura auditada inglesa. «Aunque» preserva el giro adversativo y la conexión con la cláusula previa.
- source_word: כִּי בְעֵצָה
  english_pob_choice: because ... after taking counsel
  chosen_spanish: porque, después de tomar consejo
  alternatives_spanish:
  - porque, tras deliberar
  - pues, después de aconsejarse
  lexicon: HALOT
  rationale: בְעֵצָה expresa deliberación/consejo. «Después de tomar consejo» sigue de cerca el valor semántico y mantiene el carácter formal del pasaje.
- source_word: שִׁלְּחֻהוּ
  english_pob_choice: sent him away
  chosen_spanish: lo enviaron lejos
  alternatives_spanish:
  - lo despidieron
  - lo echaron
  lexicon: HALOT
  rationale: El verbo indica despachar o apartar a alguien. «Lo enviaron lejos» conserva la imagen y evita añadir una connotación más fuerte de rechazo que el hebreo no exige.
- source_word: סַרְנֵי פְלִשְׁתִּים
  english_pob_choice: the lords of the Philistines
  chosen_spanish: los señores de los filisteos
  alternatives_spanish:
  - los gobernantes de los filisteos
  - los jefes de los filisteos
  lexicon: HALOT
  rationale: סַרְנֵי es un título distintivo filisteo. «Señores» mantiene el tono titular y la dignidad del cargo sin especificar de más.
- source_word: בְּרָאשֵׁינוּ
  english_pob_choice: at the cost of our heads
  chosen_spanish: a costa de nuestras cabezas
  alternatives_spanish:
  - con nuestras cabezas
  - al precio de nuestras cabezas
  lexicon: HALOT
  rationale: La idiomática hebrea alude al costo vital o al peligro de muerte. «A costa de nuestras cabezas» conserva la imagen concreta y el sentido de riesgo extremo.
- source_word: יִפּוֹל אֶל אֲדֹנָיו שָׁאוּל
  english_pob_choice: he may defect to his master Saul
  chosen_spanish: él puede pasarse a su señor Saúl
  alternatives_spanish:
  - puede defectar a su señor Saúl
  - puede volverse hacia su amo Saúl
  lexicon: HALOT
  rationale: Se mantiene el valor de lealtad/cambio de bando con «pasarse a». «Señor» refleja אֲדֹנָיו en el marco de servicio o pertenencia política, sin cargarlo con una connotación teológica ajena al contexto.
theological_decisions:
- issue: Tratamiento de אֲדֹנָיו aplicado a Saúl
  english_pob_reading: his master Saul
  chosen_spanish_reading: su señor Saúl
  alternative_spanish_readings:
  - su amo Saúl
  - su señor y dueño Saúl
  rationale: El término aquí es relacional y político, no un título divino. «Señor» reproduce con sobriedad el valor de superioridad/autoridad del hebreo en este contexto, mientras que el texto aclara por el marco narrativo que se trata de Saúl.
  doctrine_reference: No aplica como doctrina; decisión léxica-contextual sobre título humano.
- issue: Valor de נפל על en contexto militar-político
  english_pob_reading: defected to David
  chosen_spanish_reading: se pasaron a David
  alternative_spanish_readings:
  - defectaron a David
  - se unieron a David
  rationale: La frase describe cambio de alianza, no caída física. En español, «se pasaron a» conserva el matiz de transición de lealtad con la menor interferencia interpretativa.
  doctrine_reference: No aplica como doctrina; decisión semántica sobre idiomatismo hebreo.
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó la cláusula final para acercarla al orden y al sentido del hebreo: «At the cost of our heads he may defect to his master Saul». La redacción española refleja ese mismo orden al colocar primero el costo y luego la posibilidad de cambio de bando. También se conserva la lectura auditada de que el sufijo plural en «no los ayudaron» apunta naturalmente a los filisteos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se evita traducir mecánicamente desde el inglés donde el hebreo pide un idiomatismo de lealtad, no una caída literal.
  - «Señor» se usa aquí por tratarse de Saúl y no de lenguaje divino.
  - «Filisteos» y «señores de los filisteos» se mantienen coherentes con la nomenclatura histórica del pasaje.
