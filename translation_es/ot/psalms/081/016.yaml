translation:
  language: es
  text: Los que odian a Yahvé le fingirían sumisión[a], y su tiempo sería para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se someterían falsamente a él», «fingirían obedecerle» o «se encogerían ante él».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su tiempo para siempre». Esto puede significar que su tiempo señalado, su destino o su castigo permanecería indefinidamente.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְשַׂנְאֵי
  english_pob_choice: those who hate
  chosen_spanish: los que odian
  alternatives_spanish:
  - los que aborrecen
  - los odiadores de
  lexicon: HALOT
  rationale: El participio funciona sustantivamente; en español, «los que odian» suena natural y conserva la idea de un grupo caracterizado por una acción continua.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor del nombre divino con la forma española establecida en el proyecto.
- source_word: יְכַחֲשׁוּ לוֹ
  english_pob_choice: would cringe before him
  chosen_spanish: le fingirían obediencia
  alternatives_spanish:
  - se someterían falsamente ante él
  - le harían una sumisión fingida
  - se encogerían ante él
  lexicon: HALOT
  rationale: El verbo puede expresar una sumisión fingida o una obediencia simulada; en español, «fingirían obediencia» preserva mejor la tensión lexical que una simple idea de temor físico.
- source_word: וִיהִי
  english_pob_choice: would be
  chosen_spanish: sería
  alternatives_spanish:
  - y sería
  - entonces sería
  lexicon: HALOT
  rationale: El valor modal del imperfecto/jusivo se vierte con condicional en español para mantener el tono poético y prospectivo.
- source_word: עִתָּם
  english_pob_choice: their time
  chosen_spanish: su tiempo
  alternatives_spanish:
  - su destino
  - su suerte
  - su plazo
  lexicon: HALOT
  rationale: «Tiempo» es la base léxica más directa; se conserva la ambigüedad entre tiempo asignado, destino o castigo sin resolverla prematuramente.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: Es la equivalencia más natural y concisa en español para el valor adverbial de duración indefinida.
theological_decisions:
- issue: Sentido de la cláusula final «וִיהִי עִתָּם לְעוֹלָם»
  english_pob_reading: their time would be forever
  chosen_spanish_reading: su tiempo sería para siempre
  alternative_spanish_readings:
  - su castigo sería para siempre
  - su destino sería para siempre
  - su suerte sería perpetua
  rationale: La frase hebrea es breve y mantiene ambigüedad entre tiempo, destino o castigo. La traducción principal conserva esa apertura semántica sin imponer una interpretación doctrinal más específica que la del texto.
  doctrine_reference: Preservar la tensión léxica y no cerrar indebidamente el sentido.
translation_notes:
  revision_awareness: 'Se corrigió el problema previo: ahora cada marcador de nota aparece explícitamente en el texto español y no hay notas sin ancla. La redacción principal mantiene la ambigüedad del hebreo en la cláusula final, pero la nota aclara las lecturas alternativas ya documentadas en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto para יהוה.
  - Se evitó «Cristo» u otras sustituciones no presentes en el versículo.
  - «fingirían obediencia» mantiene la idea de sumisión insincera atestiguada en el audit trail.
  - «su tiempo sería para siempre» conserva el núcleo temporal de עִתָּם y la duración de לְעוֹלָם.
  - Los corchetes de notas están anclados exactamente en el texto principal.
