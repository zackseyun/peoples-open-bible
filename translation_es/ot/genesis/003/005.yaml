- from: Porque Dios sabe que el día que coman de él[a], se les abrirán los ojos, y serán como Dios, conocedores del bien y del mal.
  to: Porque Dios sabe que, el día que ustedes coman de él[a], sus ojos serán abiertos y ustedes serán como Dios, conociendo el bien y el mal.
  rationale: Se ajusta la redacción para conservar de manera más explícita la segunda persona plural del hebreo mediante «ustedes», y se cambia «conocedores» por «conociendo» para reflejar mejor el participio atributivo/resultativo de יֹדְעֵי. Se mantiene «como Dios» con la nota de alternativa, en conformidad con la decisión lexical y teológica auditada.
