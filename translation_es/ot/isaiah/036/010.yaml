revisions:
- from: 'Y ahora[a], ¿fue aparte de Yahvé que subí contra esta tierra para destruirla? Yahvé me dijo: «Sube contra esta tierra y destrúyela».'
  to: 'Y ahora[a], ¿acaso subí contra esta tierra para destruirla sin Yahvé? Yahvé me dijo: «Sube contra esta tierra y destrúyela».'
  rationale: Se revisa únicamente la formulación de la pregunta retórica para evitar un calco del inglés y producir un español natural y fiel. «Sin Yahvé» expresa con claridad el valor de הֲמִבַּלְעֲדֵי, mientras la nota conserva las alternativas más literales que también documenta el rastro POB.
