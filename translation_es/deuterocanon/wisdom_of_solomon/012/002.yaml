translation:
  language: es
  text: Por eso reprendes a los que se apartan poco a poco, y al recordarles las cosas en que pecan los amonestas, para que, habiendo sido liberados de la maldad, crean en ti,[a] Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «confíen en ti». El griego πιστεύσωσιν ἐπὶ σέ expresa fe o confianza dirigida hacia Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: διό
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: Expresa bien la inferencia lógica del contexto anterior en un español natural y digno; evita un calco demasiado rígido de 'Therefore'.
- source_word: τοὺς παραπίπτοντας
  english_pob_choice: those who fall away
  chosen_spanish: a los que se apartan
  alternatives_spanish:
  - a los que caen
  - a los que se desvían
  - a los que transgreden
  lexicon: BDAG/LSJ
  rationale: '''Se apartan'' comunica la idea de desviación o defection moral sin limitarla a un mero tropiezo puntual. Mantiene el matiz relacional y ético del verbo griego.'
- source_word: κατʼ ὀλίγον
  english_pob_choice: little by little
  chosen_spanish: poco a poco
  alternatives_spanish:
  - gradualmente
  - bit a bit
  - de a poco
  lexicon: LSJ
  rationale: Equivale de forma idiomática y clara a la gradualidad del original, conservando la idea de un proceso paulatino.
- source_word: ἐλέγχεις
  english_pob_choice: rebuke
  chosen_spanish: reprendes
  alternatives_spanish:
  - corriges
  - repruebas
  - confrontas
  lexicon: BDAG/LSJ
  rationale: '''Reprendes'' preserva el sentido correctivo y de exposición del error, con un registro natural en español bíblico contemporáneo.'
- source_word: ἐν οἷς ἁμαρτάνουσιν
  english_pob_choice: of the things in which they sin
  chosen_spanish: las cosas en que pecan
  alternatives_spanish:
  - las cosas en las que pecan
  - aquello en que pecan
  - los ámbitos en que pecan
  lexicon: BDAG/LSJ
  rationale: La construcción española explicita el ámbito específico del pecado sin sobreinterpretar el texto, manteniendo la concreción del griego.
- source_word: ὑπομιμνήσκων
  english_pob_choice: by reminding them
  chosen_spanish: al recordarles
  alternatives_spanish:
  - recordándoles
  - trayéndoles a la memoria
  lexicon: BDAG/LSJ
  rationale: 'El participio de medio o modo se vierte de manera fluida como una acción concomitante: ''al recordarles''. Conserva la función instrumental del verbo en la frase.'
- source_word: νουθετεῖς
  english_pob_choice: admonish
  chosen_spanish: los exhortas
  alternatives_spanish:
  - los amonestas
  - los exhortas y corriges
  - los instruyes
  lexicon: BDAG/LSJ
  rationale: '''Exhortas'' comunica la admonición correctiva de νουθετέω sin sonar excesivamente técnico; en español eclesial es claro y adecuado. Se evitó ''amonestas'' por posible dureza o ambigüedad en el uso moderno.'
- source_word: ἀπαλλαγέντες
  english_pob_choice: having been freed
  chosen_spanish: habiendo sido liberados
  alternatives_spanish:
  - habiendo sido librados
  - habiendo sido puestos en libertad
  - una vez liberados
  lexicon: BDAG/LSJ
  rationale: '''Liberados'' preserva el pasivo y la idea de rescate de una condición opresiva. Es natural en español y mantiene el valor de liberación moral.'
- source_word: τῆς κακίας
  english_pob_choice: from wickedness
  chosen_spanish: de la maldad
  alternatives_spanish:
  - de la malicia
  - del mal
  - del vicio
  lexicon: BDAG/LSJ
  rationale: '''Maldad'' abarca el campo moral de κακία de forma amplia y directa, adecuada al contexto de liberación ética.'
- source_word: πιστεύσωσιν ἐπὶ σέ
  english_pob_choice: believe in you
  chosen_spanish: crean en ti
  alternatives_spanish:
  - pongan fe en ti
  - confíen en ti
  - crean hacia ti
  lexicon: BDAG
  rationale: En español, 'crean en ti' expresa con naturalidad la fe o confianza dirigida a Dios. Se evita una fórmula demasiado técnica que oscurezca el sentido.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Oh Señor
  lexicon: BDAG/LSJ
  rationale: Como vocativo dirigido a Dios, 'Señor' es la forma española natural y reverente. No se usa 'Yahvé' aquí porque el griego conserva κύριε en la invocación, y el título vocativo funciona adecuadamente en español.
theological_decisions:
- issue: Cómo expresar πιστεύσωσιν ἐπὶ σέ
  english_pob_reading: they may believe in you
  chosen_spanish_reading: crean en ti
  alternative_spanish_readings:
  - pongan fe en ti
  - confíen en ti
  rationale: La construcción griega indica fe dirigida hacia Dios. 'Crean en ti' preserva esa dirección de confianza en un español común y bíblicamente reconocible, sin imponer una abstracción innecesaria.
  doctrine_reference: 'DOCTRINE.md: contested πίστις/πιστεύω language; translation philosophy on directed trust'
- issue: Tratamiento de Κύριε en una invocación dirigida a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Oh Señor
  - Señor mío
  rationale: El vocativo expresa oración directa. En español, 'Señor' conserva la relación de súplica y reverencia sin introducir una forma artificial. Se mantiene la distinción entre el título vocativo griego y el nombre divino explícito cuando corresponde.
  doctrine_reference: Project terminology default for κύριος; vocative prayer register
- issue: Valor de νουθετεῖς
  english_pob_reading: admonish
  chosen_spanish_reading: los exhortas
  alternative_spanish_readings:
  - los amonestas
  - los corriges
  rationale: La admonición incluye corrección moral e invitación a cambiar; 'exhortas' transmite esa función pastoral en español contemporáneo. No se reduce a simple instrucción ni se endurece a reprensión pura.
  doctrine_reference: BDAG/LSJ usage note on νουθετέω; corrective exhortation
- issue: Sentido de παραπίπτοντας
  english_pob_reading: those who fall away
  chosen_spanish_reading: los que se apartan
  alternative_spanish_readings:
  - los que caen
  - los que se desvían
  rationale: Se conserva la idea de alejamiento moral o espiritual, no solo tropiezo accidental. 'Apartarse' es suficientemente amplio para el matiz de defection del contexto sapiencial.
  doctrine_reference: BDAG/LSJ on παραπίπτω; moral deviation
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del POB inglés: νουθετεῖς pasó de ''warn'' a ''admonish'' para reflejar mejor la corrección exhortativa, y πιστεύσωσιν ἐπὶ σέ se volvió a ''believe in you''. La versión española refleja esa misma trayectoria con ''exhortas'' y ''crean en ti'', evitando un término demasiado débil para la segunda acción. También se mantuvo la progresión gradual de κατʼ ὀλίγον con ''poco a poco''.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος/κύριε en la invocación directa, conforme al registro litúrgico natural del español y al uso del texto griego aquí.
  - Se evitó 'maldad' en plural o como término demasiado concreto; el singular abstracto conserva el alcance moral de κακία.
  - '''Crean en ti'' se usa como equivalente idiomático de fe dirigida, coherente con el criterio del proyecto para πιστεύω cuando el contexto lo requiere.'
  - 'El participio final se traduce con una subordinada de finalidad fluida: ''para que, habiendo sido liberados...'' conservando la relación causal-final del griego.'
