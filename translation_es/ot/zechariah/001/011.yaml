translation:
  language: es
  text: 'Y respondieron al ángel de Yahvé, que estaba de pie entre los mirtos, y dijeron: «Hemos recorrido la tierra, y he aquí[a], toda la tierra está en reposo y tranquila[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hemos ido por toda la tierra» o «hemos andado de un lado a otro por la tierra».
    reason: lexical_alternative
  - marker: b
    text: O «toda la tierra está en reposo y quieta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - dieron respuesta
  lexicon: HALOT
  rationale: En este contexto narrativo de diálogo, ענה significa responder. «Respondieron» conserva la relación de habla directa y suena natural en español.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar «mensajero» o «ángel»; en esta escena visionaria, «ángel» es la opción más natural y tradicional en español, mientras que se mantiene Yahvé para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el valor del nombre divino en el original y el criterio del proyecto: traducir יְהוָה como «Yahvé» en el texto principal, no como un título sustituto.'
- source_word: הָעֹמֵד
  english_pob_choice: who was standing
  chosen_spanish: que estaba de pie
  alternatives_spanish:
  - que estaba en pie
  - que permanecía de pie
  lexicon: HALOT
  rationale: El participio expresa una postura continua en la escena. «Que estaba de pie» comunica bien esa acción/estado sin forzar el español.
- source_word: בֵּין הַהֲדַסִּים
  english_pob_choice: among the myrtle trees
  chosen_spanish: entre los arrayanes
  alternatives_spanish:
  - entre los mirtos
  - entre los árboles de arrayán
  lexicon: HALOT
  rationale: הֲדַסִּים son mirtos; en español, «arrayanes» es una equivalencia botánica y bíblica válida y más idiomática que una calca. «Entre» conserva el valor espacial de בֵּין.
- source_word: הִתְהַלַּכְנוּ
  english_pob_choice: have gone throughout / have gone about / have walked to and fro
  chosen_spanish: hemos recorrido
  alternatives_spanish:
  - hemos andado por
  - hemos ido y venido por
  - hemos pasado por
  lexicon: HALOT
  rationale: El hitpael de הלך aquí describe movimiento por una zona en el informe de los exploradores. «Hemos recorrido» transmite bien la idea de desplazarse por toda la tierra sin cargar el verso con una explicación interpretativa excesiva.
- source_word: בָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el mundo
  lexicon: HALOT
  rationale: Aunque el contexto puede abarcar amplitud general, «la tierra» preserva la ambigüedad del hebreo entre suelo/territorio y mundo, sin imponer una lectura más amplia de manera innecesaria.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miren
  - y vean
  lexicon: HALOT
  rationale: «Y he aquí» conserva el marcador discursivo de atención y el tono profético del hebreo; es una forma natural y reconocible en español bíblico.
- source_word: כָל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - la tierra entera
  - todo el mundo
  lexicon: HALOT
  rationale: La construcción hebrea enfatiza la totalidad. «Toda la tierra» reproduce bien esa amplitud sin añadir matiz interpretativo.
- source_word: יֹשֶׁבֶת
  english_pob_choice: is at rest / is sitting still
  chosen_spanish: está quieta
  alternatives_spanish:
  - está en reposo
  - permanece asentada
  - está sentada
  lexicon: HALOT
  rationale: El participio femenino singular describe una condición estable de la tierra. «Está quieta» refleja bien el estado de calma; «en reposo» queda reforzado en la siguiente frase para mantener el paralelismo.
- source_word: וְשֹׁקָטֶת
  english_pob_choice: and quiet
  chosen_spanish: y en reposo
  alternatives_spanish:
  - y tranquila
  - y sosegada
  - y quieta
  lexicon: HALOT
  rationale: שׁקט expresa quietud, tranquilidad o descanso no perturbado. «En reposo» mantiene la fuerza de estabilidad y complementa «quieta» en la primera parte del paralelo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto en el texto principal, siguiendo el criterio del proyecto y evitando el ocultamiento del Tetragrámaton detrás de un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nature of מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: El texto hebreo usa מַלְאַךְ con יְהוָה. Se mantiene «ángel» en español por ser la forma más asentada en la escena visionaria, sin resolver indebidamente la tensión teológica del personaje.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Ajusté el marcador discursivo y la clausula final para que cada nota de pie quede anclada explícitamente en el texto español. También preferí un español bíblico natural («y he aquí», «en reposo») sin perder la correspondencia semántica con el hebreo y con el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «ángel» para מַלְאַךְ en un contexto visionario.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - Se preserva la paralelación entre «quieta» y «en reposo» para yֹשֶׁבֶת / וְשֹׁקָטֶת.
  - Los marcadores [a] y [b] están insertados exactamente en el texto donde corresponden.
