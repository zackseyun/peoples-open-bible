    text: 'O: ''su muerte célebre'' o ''su muerte renombrada''. El adjetivo griego sugiere literalmente una muerte ''cantada'' o celebrada en alabanza.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, al probar el alimento prohibido y así conservar la vida.
    reason: cultural_note
