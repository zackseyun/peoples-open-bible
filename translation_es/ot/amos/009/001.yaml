translation:
  language: es
  text: 'Vi al Señor[a] de pie junto al altar, y dijo: «Golpea el capitel[b], para que tiemblen los umbrales; hazlos pedazos[c] sobre la cabeza de todos ellos. Y mataré a espada a sus sobrevivientes[d]; no escapará de entre ellos ningún fugitivo, ni será librado ninguno que escape».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de pie sobre el altar». La preposición hebrea puede rendirse «sobre», pero la escena también puede implicar que está en posición de juicio junto al altar.
    reason: lexical_alternative
  - marker: b
    text: O «la pieza superior» o «el remate». El término hebreo designa el elemento arquitectónico alto de la estructura.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo es difícil: «y rómpelos/córtalos sobre la cabeza de todos ellos». El sentido es que la estructura quebrada cae sobre los presentes.'
    reason: lexical_alternative
  - marker: d
    text: O «su remanente». Aquí el contexto favorece a los que quedan vivos después de la destrucción inicial.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: HALOT
  rationale: En la visión profética, אֲדֹנָי funciona como título soberano/divino. En español, «el Señor» comunica esa dignidad con naturalidad y evita usar el tetragrámaton, ya que aquí no aparece יהוה.
- source_word: נִצָּב עַֽל הַמִּזְבֵּחַ
  english_pob_choice: standing beside the altar
  chosen_spanish: de pie junto al altar
  alternatives_spanish:
  - de pie sobre el altar
  - de pie en el altar
  lexicon: HALOT
  rationale: La preposición עַל admite «sobre», pero el contexto de juicio en visión permite entender proximidad/posición de vigilancia. «Junto al altar» conserva la imagen de presencia inmediata sin forzar una lectura de apoyo físico sobre el altar.
- source_word: הַ֨ךְ
  english_pob_choice: Strike
  chosen_spanish: Golpea
  alternatives_spanish:
  - Hiere
  - Pega
  lexicon: HALOT
  rationale: El imperativo de נכה en un oráculo de juicio pide un verbo fuerte y claro. «Golpea» es idiomático en español y mantiene la fuerza del mandato.
- source_word: הַכַּפְתּוֹר
  english_pob_choice: the capital
  chosen_spanish: el capitel
  alternatives_spanish:
  - la pieza superior
  - el remate
  lexicon: HALOT
  rationale: El término designa un elemento arquitectónico superior. «Capitel» es la equivalencia más precisa y comprensible en español para la parte alta de una estructura.
- source_word: הַסִּפִּים
  english_pob_choice: the thresholds
  chosen_spanish: los umbrales
  alternatives_spanish:
  - los dinteles
  - los umbrales de la puerta
  lexicon: HALOT
  rationale: El paralelo arquitectónico favorece «umbrales» como elemento de entrada/sostén. Aunque «dinteles» también es posible, «umbrales» conserva mejor el vínculo con el derrumbe de la estructura.
- source_word: וְיִרְעֲשׁוּ
  english_pob_choice: so that the thresholds may shake
  chosen_spanish: para que tiemblen
  alternatives_spanish:
  - y tiemblen
  - para que se estremezcan
  lexicon: HALOT
  rationale: La forma expresa resultado tras el golpe. «Para que tiemblen» mantiene esa relación causal y es natural en español.
- source_word: וּבְצַעַם
  english_pob_choice: shatter them
  chosen_spanish: hazlos pedazos
  alternatives_spanish:
  - rómpelos
  - destrúyelos
  lexicon: HALOT
  rationale: El hebreo es difícil y el POB inglés entiende aquí una fractura/derribo de los elementos arquitectónicos. «Hazlos pedazos» conserva la idea de ruptura visible sin pretender precisar más de lo que el texto permite.
- source_word: בְּרֹאשׁ כֻּלָּם
  english_pob_choice: on the heads of all of them
  chosen_spanish: sobre la cabeza de todos ellos
  alternatives_spanish:
  - encima de la cabeza de todos
  - sobre las cabezas de todos
  lexicon: HALOT
  rationale: La imagen concreta del derrumbe sobre quienes están abajo debe mantenerse. La singular colectiva «la cabeza de todos ellos» sigue de cerca el hebreo y el sentido del inglés auditado.
- source_word: וְאַחֲרִיתָם
  english_pob_choice: their survivors
  chosen_spanish: sus sobrevivientes
  alternatives_spanish:
  - su remanente
  - los que queden de ellos
  lexicon: HALOT
  rationale: En este contexto de juicio total, el término no sugiere un remanente esperanzador sino los que aún quedan vivos después del derrumbe. «Sobrevivientes» hace explícita esa referencia.
- source_word: בַּחֶרֶב אֶהֱרֹג
  english_pob_choice: I will kill ... with the sword
  chosen_spanish: mataré a espada
  alternatives_spanish:
  - mataré con la espada
  - daré muerte con la espada
  lexicon: HALOT
  rationale: La construcción hebrea de instrumento se reproduce con naturalidad en español. «Mataré a espada» es breve, idiomático y fiel al juicio directo de Dios.
- source_word: לֹא יָנוּס לָהֶם נָס
  english_pob_choice: not one who flees among them will get away
  chosen_spanish: no escapará de ellos quien huya
  alternatives_spanish:
  - no huirá para ellos ningún fugitivo
  - ningún fugitivo de ellos escapará
  lexicon: HALOT
  rationale: El hebreo usa un juego de palabras entre huir y fugitivo. La versión española conserva el paralelismo con una formulación natural y enfática de imposibilidad de escape.
- source_word: וְלֹא יִמָּלֵט לָהֶם פָּלִיט
  english_pob_choice: not one who escapes among them will be delivered
  chosen_spanish: ni será librado el que logre escapar
  alternatives_spanish:
  - ni escapará quien escape
  - ni será salvado el fugitivo
  lexicon: HALOT
  rationale: El verbo נמלט puede implicar escapar o ser librado. «Será librado» preserva la pasiva y el matiz de liberación/escape que el inglés POB también mantiene en tensión.
theological_decisions:
- issue: Título divino en la visión profética
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: El texto presenta a Dios como juez soberano en una visión. «El Señor» expresa adecuadamente אֲדֹנָי sin convertirlo en el nombre divino YHWH, que no está escrito aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος/Kyrios → Lord; YHWH → the LORD'
translation_notes:
  revision_awareness: Pasaje verificado contra el texto hebreo consonántico masorético y el audit trail inglés. No hubo revisiones aplicadas en el registro fuente; la versión inglesa ya mostraba acuerdo alto con solo cuestiones menores, por lo que la redacción española mantiene la misma solución interpretativa central.
  spanish_consistency_notes:
  - Se mantuvo «el Señor» para אֲדֹנָי, no «SEÑOR», porque aquí no aparece el Tetragrámaton.
  - Se preservó la tensión arquitectónica de capitel/umbrales y la ambigüedad de posposición causal en el hebreo mediante un resultado natural en español.
  - «Sobrevivientes» refleja la lectura contextual de persona-resto vivo, no un remanente positivo.
  - 'El par final «escapará / será librado» conserva el doble énfasis del hebreo: huida humana imposible y rescate igualmente imposible.'
