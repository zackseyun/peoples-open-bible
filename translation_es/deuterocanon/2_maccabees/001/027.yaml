translation:
  language: es
  text: Reúne a nuestro pueblo disperso[a], libera a los esclavizados entre las naciones, mira a los despreciados y aborrecidos; y que las naciones sepan que tú eres nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «nuestra dispersión». La traducción hace explícito que la oración se refiere a la comunidad dispersa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνάγαγε
  english_pob_choice: Gather ... together
  chosen_spanish: Reúne
  alternatives_spanish:
  - Junta
  - Reúne ... juntamente
  lexicon: LSJ
  rationale: El imperativo pide que Dios vuelva a congregar a los dispersos. «Reúne» comunica la acción con naturalidad en español y conserva la fuerza de συλλέγειν/ἐπισυνάγω sin redundancia innecesaria.
- source_word: τὴν διασπορὰν ἡμῶν
  english_pob_choice: our dispersed people
  chosen_spanish: nuestra dispersión
  alternatives_spanish:
  - nuestro pueblo disperso
  - nuestra diáspora
  lexicon: LSJ
  rationale: La frase griega dice literalmente «nuestra dispersión». En este contexto oracional, el sustantivo puede abarcar al pueblo disperso; en español mantengo la forma más cercana al griego y la nota explica el referente implícito.
- source_word: ἐλευθέρωσον
  english_pob_choice: free
  chosen_spanish: libera
  alternatives_spanish:
  - pon en libertad
  - suelta
  lexicon: LSJ
  rationale: El verbo expresa liberación. «Libera» es directo, bíblico y fiel al imperativo.
- source_word: τοὺς δουλεύοντας
  english_pob_choice: those enslaved
  chosen_spanish: a los esclavizados
  alternatives_spanish:
  - a los que están en esclavitud
  - a los que sirven como esclavos
  lexicon: LSJ
  rationale: Sigo la fuerza de δουλεύω con lenguaje de esclavitud, como pide la guía del proyecto para la familia de δοῦλος, evitando suavizarla como simple servicio.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: LSJ
  rationale: «ἔθνη» aquí designa a las naciones circundantes. «Entre las naciones» es natural en español y conserva la referencia colectiva sin cargarla con un término confesional no necesario.
- source_word: τοὺς ἐξουθενημένους
  english_pob_choice: those who are despised
  chosen_spanish: los despreciados
  alternatives_spanish:
  - los tenidos en poco
  - los humillados
  lexicon: LSJ
  rationale: El participio pasivo denota a los que han sido rebajados a nada o tratados con desprecio. «Los despreciados» conserva esa condición social sin sobreexplicar.
- source_word: βδελυκτοὺς
  english_pob_choice: abhorred
  chosen_spanish: aborrecidos
  alternatives_spanish:
  - detestados
  - abominados
  lexicon: LSJ
  rationale: El adjetivo expresa repulsión intensa. «Aborrecidos» transmite bien la fuerza afectiva sin introducir un matiz técnico ajeno al contexto.
- source_word: ἔφιδε
  english_pob_choice: look upon
  chosen_spanish: mira
  alternatives_spanish:
  - pon tus ojos en
  - atiende a
  lexicon: LSJ
  rationale: En lenguaje de oración, el verbo de ver/considerar se rinde naturalmente como «mira». Mantiene el sentido de prestar atención, sin añadir la benevolencia explícita de «favorece».
- source_word: γνώτωσαν
  english_pob_choice: let the nations know
  chosen_spanish: que las naciones sepan
  alternatives_spanish:
  - que las naciones reconozcan
  - haz saber a las naciones
  lexicon: LSJ
  rationale: La forma jussiva se expresa bien con «que... sepan». Es una petición clara y idiomática en español.
- source_word: ὅτι σὺ ὁ θεὸς ἡμῶν
  english_pob_choice: that you are our God
  chosen_spanish: que tú eres nuestro Dios
  alternatives_spanish:
  - que tú eres Dios para nosotros
  - que tú, Dios, eres nuestro
  lexicon: LSJ
  rationale: 'La predicación es directa: «tú eres nuestro Dios». Conservar el pronombre enfático y el orden natural del español hace transparente la afirmación.'
theological_decisions:
- issue: Referencia de «nuestra dispersión»
  english_pob_reading: The prayer concerns the scattered community, not merely the abstract state of dispersion.
  chosen_spanish_reading: Mantener «nuestra dispersión» en el texto, con nota que explicita que se refiere a la comunidad dispersa.
  alternative_spanish_readings:
  - nuestro pueblo disperso
  - nuestra diáspora
  rationale: El griego literalmente dice «nuestra dispersión». En vez de reemplazarlo por una paráfrasis más interpretativa, conservo la metáfora sustantiva y dejo la aclaración en nota para no borrar la relación con el original.
  doctrine_reference: Translation philosophy §1, §6
- issue: Lenguaje de esclavitud en δουλεύοντας
  english_pob_reading: Rendered with slavery/bondage force ('those enslaved') rather than softened service language.
  chosen_spanish_reading: «los esclavizados» / «a los esclavizados»
  alternative_spanish_readings:
  - los que sirven
  - los que están en servidumbre
  - los cautivos
  rationale: La petición habla de opresión real entre las naciones. Traduzco con fuerza de esclavitud para no atenuar la carga del término, conforme a la política del proyecto sobre δοῦλος y su familia léxica.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail: se prefirió una formulación más cercana a τὴν διασπορὰν ἡμῶν y se evitó añadir elementos redundantes. Por eso opté por «nuestra dispersión» con nota explicativa, manteniendo además el lenguaje fuerte de esclavitud para δουλεύοντας y la secuencia oracional del griego.'
  spanish_consistency_notes:
  - Usé «Dios» para ὁ θεός, sin sustituirlo por una convención de mayúsculas litúrgicas.
  - Mantuve «naciones» para ἔθνη, conforme al contexto judío del pasaje.
  - No suavicé el campo semántico de δουλεύω; conservé esclavitud/opresión.
  - La puntuación reproduce el ritmo de petición del griego con dos puntos y punto y coma.
  - El marcador [a] aparece exactamente en el texto, asociado solo a la nota correspondiente.
