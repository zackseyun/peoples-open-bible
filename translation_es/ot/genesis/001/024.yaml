translation:
  language: es
  text: 'Y dijo Dios[a]: «Que la tierra produzca seres vivientes según sus especies: ganado, animales que se arrastran y animales salvajes de la tierra según sus especies». Y fue así.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seres vivos»; literalmente «una nefesh/alma viviente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֱלֹהִים
  english_pob_choice: And God said
  chosen_spanish: Y dijo Dios
  alternatives_spanish:
  - Y dijo el Dios
  - Y Dios dijo
  lexicon: HALOT
  rationale: Se conserva la fórmula narrativa breve y solemne del hebreo. En español, «Y dijo Dios» suena natural y sigue de cerca el orden del original sin volverlo rígido.
- source_word: תּוֹצֵא
  english_pob_choice: Let the earth bring forth
  chosen_spanish: Produzca la tierra
  alternatives_spanish:
  - Que la tierra produzca
  - La tierra produzca
  lexicon: HALOT
  rationale: El valor causativo-jusivo del hifil se refleja bien con un mandato dirigido a la tierra. «Produzca» comunica la orden divina con concisión y evita una paráfrasis excesiva.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra / el mundo
  - la tierra firme
  lexicon: HALOT
  rationale: En el contexto de la creación, el término abarca la realidad terrestre en sentido amplio. «La tierra» es la opción más clara y fiel en español.
- source_word: נֶפֶשׁ חַיָּה
  english_pob_choice: living creatures
  chosen_spanish: seres vivientes
  alternatives_spanish:
  - seres vivos
  - criaturas vivientes
  - almas vivientes
  lexicon: HALOT
  rationale: Se evita «alma» por su carga doctrinal en español moderno. «Seres vivientes» expresa bien la idea de vida animada y mantiene abierta la tensión léxica del hebreo sin antropologizarla.
- source_word: לְמִינָהּ
  english_pob_choice: according to their kinds
  chosen_spanish: según sus clases
  alternatives_spanish:
  - según sus especies
  - según sus géneros
  - según su clase
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con sufijo femenino, el sentido distributivo es plural en la lista de criaturas. «Según sus clases» comunica ese valor de manera natural en español y evita restringirlo a una taxonomía moderna específica.
- source_word: בְּהֵמָה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - bestias
  - animales domésticos
  - animales de labor
  lexicon: HALOT
  rationale: «Ganado» es un término breve y bíblicamente reconocible para animales domésticos o de cría, y en este contexto preserva el contraste con las criaturas salvajes.
- source_word: וָרֶמֶשׂ
  english_pob_choice: creeping things
  chosen_spanish: animales que se arrastran
  alternatives_spanish:
  - reptiles
  - animales rastreros
  - bichos que se arrastran
  lexicon: HALOT
  rationale: La expresión española reproduce el movimiento a ras de suelo sin limitar indebidamente la referencia a una clase zoológica moderna. Mantiene la amplitud semántica del hebreo.
- source_word: וְחַיְתוֹ אֶרֶץ
  english_pob_choice: wild animals of the earth
  chosen_spanish: animales salvajes de la tierra
  alternatives_spanish:
  - bestias de la tierra
  - animales del campo
  - animales de la tierra
  lexicon: HALOT
  rationale: 'Se explicita el contraste con בְּהֵמָה: aquí se trata de animales no domesticados. «Animales salvajes de la tierra» conserva ese contraste con claridad en español actual.'
- source_word: וַיְהִי כֵן
  english_pob_choice: And it was so
  chosen_spanish: Y fue así
  alternatives_spanish:
  - Y así fue
  - Y así sucedió
  - Y fue conforme
  lexicon: HALOT
  rationale: Se mantiene la fórmula de cumplimiento de Génesis 1. «Y fue así» es breve, solemne y plenamente idiomático en español.
theological_decisions:
- issue: Cómo rendir נֶפֶשׁ חַיָּה sin cargar el texto con una doctrina del alma
  english_pob_reading: 'living creatures; footnote: Or “living beings”; literally “a living nephesh/soul.”'
  chosen_spanish_reading: seres vivientes
  alternative_spanish_readings:
  - almas vivientes
  - seres vivos
  - criaturas vivientes
  rationale: El hebreo describe criaturas animadas en general. «Seres vivientes» conserva el sentido sin introducir debates doctrinales sobre el alma en español contemporáneo. Se preserva así la tensión del término original.
  doctrine_reference: Preservar la tensión léxica sin convertirla en una afirmación doctrinal sobre el alma animal.
translation_notes:
  revision_awareness: Se siguió el hilo auditado del inglés POB y su nota sobre נֶפֶשׁ חַיָּה, manteniendo la misma cautela lexical en español. No hubo revisiones posteriores que alteraran el sentido o la estructura del versículo.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se mantuvo el paralelismo de «según sus clases» en ambas apariciones de לְמִינָהּ.
  - Se evitó «SEÑOR» y no hay referencia al tetragrámaton en este versículo.
  - Se prefirió un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
