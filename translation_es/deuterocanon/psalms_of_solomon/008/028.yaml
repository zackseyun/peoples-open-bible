revisions:
- from: Y los devotos de Dios eran como corderos en inocencia en medio de ellos.
  to: Y los santos[a] de Dios eran como corderos en inocencia en medio de ellos[b].
  rationale: Se reemplaza 'devotos' por 'santos' para ajustarse a la elección auditada vigente del POB ('holy ones') y preservar mejor la fuerza religiosa de ὅσιοι. Se mantienen 'corderos', 'en inocencia' y 'en medio de ellos' por su fidelidad al griego y buena legibilidad. Se añaden notas mínimas para conservar alternativas significativas del expediente inglés sin sobrecargar el texto.
