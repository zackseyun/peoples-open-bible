base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/038/017.yaml
  text: 'Then Jeremiah said to Zedekiah[a], “Thus says Yahweh, the God of hosts, the God of Israel: If you indeed go out to the officials of the king of Babylon, your life will be spared, and this city will not be burned with fire[c][b]; and you and your household will live.”'
  footnotes:
  - marker: a
    text: Or, more literally, 'If you surely go out.' The Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'your soul will live.' Here 'soul' refers to your life or self, that is, your survival.
    reason: lexical_alternative
  - marker: c
    text: Or 'you and your house will live.' 'Household' conveys the sense of family and dependents, not merely the building.
    reason: lexical_alternative
