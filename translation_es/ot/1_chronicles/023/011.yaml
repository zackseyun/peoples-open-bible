base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/023/011.yaml
  text: Jahath was the first and Zizah the second[a]; Jeush and Beriah did not have many sons[b], so they became one father’s house for one reckoning.
  footnotes:
