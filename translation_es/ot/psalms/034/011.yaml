translation:
  language: es
  text: Los leones jóvenes pasan necesidad y tienen hambre[a], pero los que buscan a Yahvé no carecen de ningún bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «empobrecen y tienen hambre». El hebreo puede expresar estar en necesidad o volverse pobre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּפִירִים
  english_pob_choice: Young lions
  chosen_spanish: leoncillos
  alternatives_spanish:
  - leones jóvenes
  - cachorros de león
  lexicon: HALOT
  rationale: El término se refiere a leones jóvenes y vigorosos. «Leoncillos» conserva la imagen poética de animales fuertes que, aun así, pueden faltar de sustento, sin sonar excesivamente técnico.
- source_word: רָשׁוּ
  english_pob_choice: suffer want
  chosen_spanish: pasan necesidad
  alternatives_spanish:
  - están en necesidad
  - empobrecen
  - carecen
  lexicon: HALOT
  rationale: El verbo expresa estar en falta o volverse pobre. «Pasan necesidad» transmite esa carencia de manera natural en español y mantiene el tono proverbial.
- source_word: וְרָעֵבוּ
  english_pob_choice: and hunger
  chosen_spanish: y tienen hambre
  alternatives_spanish:
  - y están hambrientos
  - y pasan hambre
  lexicon: HALOT
  rationale: El verbo significa tener hambre. «Y tienen hambre» expresa el paralelo directo con la primera mitad del verso y conserva claridad idiomática.
- source_word: וְדֹרְשֵׁי יְהוָה
  english_pob_choice: those who seek Yahweh
  chosen_spanish: los que buscan a Yahvé
  alternatives_spanish:
  - los que buscan a Yahveh
  - los que inquieren de Yahvé
  - los buscadores de Yahvé
  lexicon: HALOT
  rationale: El participio describe a personas caracterizadas por buscar a YHWH. «Los que buscan a Yahvé» es natural y respeta el nombre divino según la política del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española establecida por el proyecto. No se sustituye por un título, para mantener la transparencia del Tetragrámaton.
- source_word: לֹא יַחְסְרוּ
  english_pob_choice: lack no
  chosen_spanish: no carecen de
  alternatives_spanish:
  - no les faltará
  - no faltarán
  - no carecerán de
  lexicon: HALOT
  rationale: La forma imperfecta expresa una verdad general o proverbial. «No carecen de» comunica bien la negación de falta en español y deja abierta la fuerza durativa/proverbial.
- source_word: כָל טוֹב
  english_pob_choice: good thing
  chosen_spanish: ningún bien
  alternatives_spanish:
  - todo bien
  - ninguna cosa buena
  - nada bueno
  lexicon: HALOT
  rationale: La expresión abarca la totalidad de lo bueno. «Ningún bien» es una formulación breve y fiel para el cierre proverbial, equivalente al sentido de «no lack any good thing».
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: La política del proyecto pide transliterar el Tetragrámaton en lugar de sustituirlo por «Señor». «Yahvé» preserva el nombre personal del pacto y es la forma preferida en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión previa falló porque el marcador [a] no aparecía en el texto. Esta versión inserta [a] directamente después de «hambre» para anclar la nota sin cambiar el sentido del verso.
  spanish_consistency_notes:
  - Se mantiene la distinción entre carencia económica («pasan necesidad») y hambre física («tienen hambre»).
  - «Yahvé» se usa de forma consistente para יְהוָה, conforme a la política del proyecto.
  - La estructura poética binaria del hebreo se conserva con una cláusula contrastiva introducida por «pero».
