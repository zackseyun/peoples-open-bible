translation:
  language: es
  text: Sé bondadoso conmigo, Yahvé, porque estoy en angustia; mi ojo[a] se ha consumido por el dolor, mi alma[b] y también mi vientre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi ojo se ha oscurecido por la aflicción» o «mi ojo desfallece de dolor».
    reason: lexical_alternative
  - marker: b
    text: «Mi alma» también puede traducirse «mi vida» o «mi ser».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «mi vientre»; el término también puede referirse más ampliamente a las entrañas o partes internas.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  english_pob_choice: Be gracious to me
  chosen_spanish: Ten gracia de mí
  alternatives_spanish:
  - Mírame con favor
  - Concédeme tu gracia
  - Ten misericordia de mí
  lexicon: HALOT
  rationale: El hebreo es una súplica imperativa de favor/gracia. En español, «Ten gracia de mí» conserva la fuerza de ruego directo sin convertirlo en una fórmula litúrgica más interpretativa. Se evita «misericordia» como opción principal para no desplazar el matiz de favor pedido al nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrama; el proyecto español establece «Yahvé» como forma principal para el nombre divino. Se preserva el nombre propio, no un sustituto titular.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la súplica. «Porque» es la conjunción causal natural en español y mantiene la relación explicativa del hebreo.
- source_word: צַר לִי
  english_pob_choice: I am in distress
  chosen_spanish: estoy en angustia
  alternatives_spanish:
  - estoy en apuro
  - estoy afligido
  - estoy en estrechez
  lexicon: HALOT
  rationale: La expresión hebrea denota presión, estrechez o angustia personal. «Angustia» comunica bien el estado lamentoso en español y conserva la intensidad; se evita una paráfrasis más general como «en problemas».
- source_word: עָשְׁשָׁה
  english_pob_choice: has wasted away
  chosen_spanish: se han consumido
  alternatives_spanish:
  - se han debilitado
  - se han gastado
  - han languidecido
  lexicon: HALOT
  rationale: El verbo expresa debilitamiento o consumición de una facultad corporal. «Se han consumido» reproduce la idea de desgaste visible y funciona bien con «mis ojos» en español poético.
- source_word: בְכַעַס
  english_pob_choice: with grief
  chosen_spanish: con el dolor
  alternatives_spanish:
  - por la vexación
  - con la aflicción
  - con la ira
  lexicon: HALOT
  rationale: Aunque כעס puede significar ira o vexación, en este lamento el contexto favorece un sufrimiento interno que alcanza al cuerpo. «Con el dolor» mantiene la ambigüedad afectiva hacia el padecimiento sin imponer «ira» como sentido único.
- source_word: עֵינִי
  english_pob_choice: my eye
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi ojo
  lexicon: HALOT
  rationale: El hebreo es singular, pero en español «mis ojos» es la forma idiomática más natural para una expresión poética de desgaste visual y evita una construcción menos fluida con singular distributivo.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - mi yo
  lexicon: HALOT
  rationale: נפש puede ser alma, vida o yo mismo. «Mi alma» preserva el término antropológico amplio y la tensión poética del texto, sin reducirlo a mera interioridad psicológica.
- source_word: וּבִטְנִי
  english_pob_choice: my belly as well
  chosen_spanish: mi vientre
  alternatives_spanish:
  - mis entrañas
  - mi cuerpo
  - mis partes internas
  lexicon: HALOT
  rationale: בטן se refiere literalmente al vientre y, por extensión, a las entrañas. «Mi vientre» es la opción más directa y transparente en español; el añadido «también» recoge la coordinación con las líneas anteriores y se integra naturalmente en la sintaxis.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el nombre propio del pacto en lugar de sustituirlo por un título. La forma española normalizada del proyecto es «Yahvé», en continuidad con el criterio auditable de transliteración del Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Antropología poética: alma, ojos y vientre'
  english_pob_reading: my soul ... my belly as well
  chosen_spanish_reading: mi alma ... mi vientre
  alternative_spanish_readings:
  - mi vida ... mis entrañas
  - mi ser ... mis entrañas
  rationale: La enumeración hebrea conserva una tensión entre facultades corporales e interioridad personal. «Mi alma» y «mi vientre» mantienen esa amplitud sin neutralizarla; no se resuelve el lenguaje hacia una antropología más moderna de manera indebida.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: 'El análisis inglés revisado mantiene la lectura óptima sin cambios sustanciales; la versión española sigue la misma decisión principal: nombre divino como Yahvé, súplica de gracia/favor, y conservación de la antropología poética del verso. Se ajustó la redacción para que el español sea natural y publicable, sin borrar las alternativas lexicográficas documentadas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה.
  - Se prefirió «gracia» como núcleo semántico de חנן, con nota sobre el matiz de favor.
  - Se mantuvo el paralelismo corporal/interior con «ojos», «alma» y «vientre».
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - La puntuación conserva el ritmo lamentativo del hebreo con una pausa fuerte antes del segundo hemistiquio.
