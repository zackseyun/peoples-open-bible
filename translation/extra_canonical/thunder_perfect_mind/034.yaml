translation:
  text: And do not cast me out among those who are lacking in worthlessness[a]; for
    I—I am merciful, and I am hard‑hearted. Do not hate my obedience; and my self-control[h][g][f][e][d][c][b],
    love it in my weakness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The underlying noun likely means ‘worthlessness/uselessness’; ‘dung‑heap’
      concretizes the image and is traditional in Thunder renderings, but ‘in disgrace’
      is a plausible alternative.
    reason: lexical_alternative
  - marker: b
    text: ⲛⲟⲩϫⲧ ⲉⲃⲟⲗ expresses expulsion; the direct object ‘me’ is implied by context,
      not explicit in this excerpt.
    reason: alignment_note
  - marker: c
    text: 'ⲟⲩϣⲁⲛϩⲧⲏⲥ vs. ⲟⲩⲁⲧϩⲏⲧ: literally ‘soft‑hearted’ vs ‘hard‑hearted/without
      heart’; rendered as ‘merciful … hard‑hearted’ to preserve the ethical paradox.'
    reason: lexical_alternative
  - marker: d
    text: ⲧⲁⲙⲛ̄ⲧⲥⲧⲙⲏⲧ could be ‘my humiliation,’ ‘my disgrace,’ or ‘my state of contempt’;
      chosen ‘humiliation’ for readability.
    reason: lexical_alternative
  - marker: e
    text: ⲧⲁⲙⲛ̄ⲧϭⲱⲃ may be read as a collective singular ‘my kingdom’ or as plural
      ‘my kingdoms’; plural retained here to echo the poem’s expansiveness.
    reason: lexical_alternative
  - marker: f
    text: Or 'And when you see me on the dung‑heap, do not cast me out;'.
    reason: previous_rendering
  - marker: g
    text: Or 'Do not leave my humiliation;'.
    reason: previous_rendering
  - marker: h
    text: Or 'and my self‑control you will find in my kingdoms.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙ̄ⲡⲣ̄ⲛⲟⲩϫⲧ ⲉⲃⲟⲗ
  chosen: do not cast (me) out
  alternatives:
  - do not throw out
  - do not expel
  - do not reject
  lexicon: Crum; Layton
  rationale: Negative prohibitive with ⲙ̄ⲡⲣ̄ + verb; ⲛⲟⲩϫⲧ ⲉⲃⲟⲗ carries sense of expelling.
    Object is contextually the speaker; kept explicit in English for clarity.
- source_word: ϩⲛ̄ ⲟⲩⲙⲛ̄ⲧⲁⲭⲣⲏⲥⲧⲏⲣⲟⲥ
  chosen: on the dung‑heap
  alternatives:
  - in worthlessness
  - in disgrace
  - on the refuse‑heap
  lexicon: Crum; Greek cognate ἀχρηστία ‘uselessness’
  rationale: The noun likely denotes ‘worthlessness/uselessness’; many render the
    image as a refuse/dung heap. Chosen for concrete imagery but flagged as interpretive.
- source_word: ⲟⲩϣⲁⲛϩⲧⲏⲥ
  chosen: merciful
  alternatives:
  - compassionate
  - soft‑hearted
  lexicon: Crum
  rationale: Idiomatic ‘one with a soft heart’; ‘merciful’ preserves ethical nuance
    and balances the paradox with ‘hard‑hearted.’
- source_word: ⲟⲩⲁⲧϩⲏⲧ
  chosen: hard‑hearted
  alternatives:
  - pitiless
  - merciless
  lexicon: Crum
  rationale: Antonymic to ⲟⲩϣⲁⲛϩⲧⲏⲥ; captures the paradox without smoothing.
- source_word: ⲙⲉⲥⲧⲉ
  chosen: leave
  alternatives:
  - abandon
  - desert
  lexicon: Crum
  rationale: Basic sense ‘leave behind’; paired with the negative as a prohibition.
- source_word: ⲧⲁⲙⲛ̄ⲧⲥⲧⲙⲏⲧ
  chosen: my humiliation
  alternatives:
  - my contempt
  - my disgrace
  - my scorn (state)
  lexicon: Crum
  rationale: Abstract state of being scorned; ‘humiliation’ conveys the condition
    without shifting agency.
- source_word: ⲧⲁⲉⲅⲕⲣⲁⲧⲉⲓⲁ
  chosen: my self‑control
  alternatives:
  - my continence
  - my restraint
  lexicon: Greek loan ἐγκράτεια
  rationale: Well‑established Greek ethical term; ‘self‑control’ is standard and clear.
- source_word: ⲙⲉⲣⲓⲧⲥ
  chosen: you will find
  alternatives:
  - you will discover
  lexicon: Crum
  rationale: Common verb ‘to find’; future sense from construction with ⲛ̄ⲧⲉⲧⲛ̄.
- source_word: ⲧⲁⲙⲛ̄ⲧϭⲱⲃ
  chosen: my kingdoms
  alternatives:
  - my dominion
  - my royalty
  - my kingdom
  lexicon: Crum
  rationale: Semantic range includes ‘royal power/kingdom’; number may be collective.
    Plural retained to match the parallel motif of multiple realms.
parallelism_check: 'The paradoxical pair is preserved explicitly: “I—I am merciful,
  and I am hard‑hearted.” Two imperatives (“do not cast me out… Do not leave my humiliation…”)
  balance the assertions, and the final promise (“you will find… in my kingdoms”)
  completes the triad without collapsing tensions.'
voice_check: Kept first‑person self‑revelation with repeated “I—I am,” and second‑person
  plural imperatives addressing the audience. The cadence mirrors short Coptic cola
  with semicolon breaks.
alignment_risk_note: 'Overall alignment: medium. The phrase rendered “on the dung‑heap”
  corresponds to ⲩⲙⲛ̄ⲧⲁⲭⲣⲏⲥⲧⲏⲣⲟⲥ, whose core sense is ‘worthlessness/uselessness’;
  the concrete image ‘dung‑heap’ is a common interpretive choice but not strictly
  literal. The object ‘me’ after “do not cast out” is not overt in the excerpt and
  is inferred from the surrounding context. Number of ‘kingdom(s)’ is somewhat flexible
  in Coptic; plural chosen but could be read as a collective singular.'
