translation:
  language: es
  text: Y Edna, su esposa, y Sara, su hija, lloraron[a]; y los acogieron de buena gana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los recibieron cordialmente» o «los recibieron con calidez»; el adverbio griego enfatiza una hospitalidad pronta y de todo corazón.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔδνα
  english_pob_choice: Edna
  chosen_spanish: Edna
  alternatives_spanish:
  - Edna
  lexicon: nombre propio
  rationale: Se translitera el nombre propio sin traducción, conforme al uso estándar y al tratamiento del POB en inglés.
- source_word: ἡ γυνὴ αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - la esposa de él
  lexicon: BDAG
  rationale: γυνή aquí designa claramente relación marital; en español moderno y digno, 'esposa' comunica mejor que un calco literal.
- source_word: Σάρρα
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sarah
  lexicon: nombre propio
  rationale: Se usa la forma española habitual del nombre propio, sin alterar la referencia.
- source_word: ἡ θυγάτηρ αὐτοῦ
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - la hija de él
  lexicon: BDAG
  rationale: La relación familiar se expresa de forma natural en español con posesivo; no hay necesidad de un calco sintáctico.
- source_word: ἔκλαυσαν
  english_pob_choice: wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - lloraron amargamente
  - se pusieron a llorar
  lexicon: BDAG
  rationale: El aoristo indica el hecho de llorar sin exigir un matiz aspectual adicional; 'lloraron' es fiel y natural.
- source_word: ὑπεδέξαντο
  english_pob_choice: welcomed
  chosen_spanish: recibieron con alegría
  alternatives_spanish:
  - recibieron con agrado
  - los acogieron
  lexicon: BDAG
  rationale: El verbo puede significar recibir o dar acogida; en este contexto de hospitalidad, 'recibieron con alegría' conserva el sentido cordial que el POB inglés expresó con 'welcomed eagerly'.
- source_word: προθύμως
  english_pob_choice: eagerly
  chosen_spanish: con alegría
  alternatives_spanish:
  - con prontitud
  - de buena voluntad
  - con gusto
  lexicon: BDAG
  rationale: El adverbio enfatiza disposición pronta y de todo corazón. 'Con alegría' comunica bien la acogida entusiasta en español, aunque la cualidad de prontitud queda implícita en el contexto.
translation_notes:
  revision_awareness: El texto griego coincide plenamente con el paquete fuente y el audit trail inglés; se mantiene la misma escena y sentido general, con ajuste natural al español para la acogida hospitalaria.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios en forma española habitual cuando existe.
  - Se evita el calco sintáctico literal de 'la mujer de él' por 'su esposa', que es más idiomático y fiel al valor relacional de γυνή.
  - '''Recibieron con alegría'' busca reflejar el componente de hospitalidad de ὑπεδέξαντο y la prontitud afectuosa de προθύμως sin exagerar el adverbio.'
