translation:
  language: es
  text: Por favor, pase mi señor delante de su esclavo[a], y yo iré despacio, al paso del ganado[b] que va delante de mí y al paso de los niños, hasta que llegue a mi señor en Seír[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "su siervo"; se eligió "esclavo" para conservar la fuerza léxica del hebreo y la deferencia extrema de Jacob.
    reason: lexical_alternative
  - marker: b
    text: '"Ganado" traduce aquí un término hebreo que a menudo puede significar "trabajo", "propiedad" o "posesiones", pero en este contexto probablemente se refiere específicamente a los animales que avanzan con la caravana.'
    reason: lexical_alternative
  - marker: c
    text: O "hasta que llegue a mi señor, a Seír".
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲבָר נָא
  english_pob_choice: Please let ... pass on ahead
  chosen_spanish: Por favor, pase ... delante
  alternatives_spanish:
  - Por favor, deje que ... pase
  - Que ... pase delante, por favor
  lexicon: HALOT
  rationale: El jussivo con נָא expresa una petición cortés. En español, "Por favor, pase... delante" conserva la deferencia y el movimiento hacia adelante sin sonar mecánico.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: Jacob se dirige a Esaú con un título de respeto humano. "Mi señor" mantiene la relación social y evita confundirlo con lenguaje divino.
- source_word: לִפְנֵי עַבְדּוֹ
  english_pob_choice: ahead of his servant
  chosen_spanish: delante de su esclavo
  alternatives_spanish:
  - antes que su esclavo
  - por delante de su esclavo
  lexicon: HALOT
  rationale: La frase hebrea literalmente dice "delante de su siervo/esclavo". Se conserva "esclavo" porque el POB inglés retiene la fuerza léxica de דּוֹ, y "delante de" comunica naturalmente la posición frontal.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su servidor
  lexicon: HALOT
  rationale: Aquí el hebreo usa la forma posesiva de tercera persona en la auto-humillación de Jacob. Se eligió "esclavo" por coherencia con la preferencia léxica del proyecto y por la fuerza de deferencia extrema.
- source_word: אֶתְנָהֲלָה
  english_pob_choice: I will proceed slowly
  chosen_spanish: yo avanzaré despacio
  alternatives_spanish:
  - yo me conduciré despacio
  - yo iré despacio
  lexicon: HALOT
  rationale: El hitpael de נהל indica moverse o conducirse con cuidado. "Avanzaré despacio" comunica el sentido dinámico de progreso lento sin perder la idea de proceder de manera medida.
- source_word: לְאִטִּי
  english_pob_choice: slowly
  chosen_spanish: despacio
  alternatives_spanish:
  - lentamente
  - con calma
  lexicon: HALOT
  rationale: Adverbio de movimiento gradual y no apresurado. "Despacio" es natural y claro en español contemporáneo, y encaja con el paralelismo del ritmo en la cláusula siguiente.
- source_word: לְרֶגֶל
  english_pob_choice: at the pace of
  chosen_spanish: al paso de
  alternatives_spanish:
  - según el paso de
  - a la medida del paso de
  lexicon: HALOT
  rationale: El modismo literalmente remite al "pie" como medida del ritmo. "Al paso de" es idiomático en español y preserva la idea de movimiento regulado por el ritmo del ganado y de los niños.
- source_word: הַמְּלָאכָה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - las reses
  - los animales
  lexicon: HALOT
  rationale: Aunque מְלָאכָה puede significar trabajo, posesión o propiedad, el contexto pastoril apunta a animales conducidos. "Ganado" es un equivalente natural y concreto en español para ese contexto.
- source_word: אֲשֶׁר לְפָנַי
  english_pob_choice: that is before me
  chosen_spanish: que va delante de mí
  alternatives_spanish:
  - que está delante de mí
  - que tengo delante de mí
  lexicon: HALOT
  rationale: La relación espacial se traduce de forma natural como movimiento delante de Jacob. "Va delante de mí" mantiene la imagen sin sobreexplicar la estructura relativa.
- source_word: הַיְלָדִים
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los hijos
  - los pequeños
  lexicon: HALOT
  rationale: El término se refiere a los hijos de Jacob en la caravana. "Niños" es una traducción clara y amplia; en español bíblico moderno puede abarcar a los menores del grupo sin perder naturalidad.
- source_word: עַד אֲשֶׁר אָבֹא
  english_pob_choice: until I come
  chosen_spanish: hasta que llegue
  alternatives_spanish:
  - hasta que vaya
  - hasta que venga
  lexicon: HALOT
  rationale: La cláusula temporal expresa la llegada futura de Jacob. En español, "hasta que llegue" resulta natural y conserva el valor prospectivo del verbo hebreo.
- source_word: שֵׂעִירָה
  english_pob_choice: at Seir
  chosen_spanish: en Seír
  alternatives_spanish:
  - a Seír
  - hasta Seír
  lexicon: HALOT
  rationale: El nombre propio se translitera como Seír. Se usa "en" porque el sentido de llegada al lugar funciona mejor en español con destino ya alcanzado o previsto al llegar a la región.
theological_decisions:
- issue: Tratamiento de אֲדֹנִי en el diálogo entre Jacob y Esaú
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - señor mío
  - mi amo
  rationale: No se espiritualiza el término. El contexto muestra un gesto de sumisión social y cortesía extrema entre hermanos, no una referencia divina. "Mi señor" reproduce ese registro con dignidad.
  doctrine_reference: Génesis 33:3-14; cortesía honorífica en el discurso narrativo
- issue: Valor de עַבְדּוֹ en la auto-presentación de Jacob
  english_pob_reading: his servant
  chosen_spanish_reading: su esclavo
  alternative_spanish_readings:
  - su siervo
  rationale: Se conserva la dureza semántica del vínculo servil que el POB inglés decidió no suavizar. En esta escena, la humillación retórica forma parte del sentido narrativo y no debe atenuarse sin base textual.
  doctrine_reference: Lexical force of עבד in deferential speech; narrativa de reconciliación en Génesis 33
- issue: Sentido de הַמְּלָאכָה
  english_pob_reading: the livestock
  chosen_spanish_reading: el ganado
  alternative_spanish_readings:
  - las posesiones
  - la hacienda
  rationale: El contexto pastoril y la lógica de avanzar al paso de lo que se conduce favorecen una referencia concreta a animales. "Ganado" preserva la tensión lexical entre el significado amplio del término y su uso aquí.
  doctrine_reference: Contextual semantics in pastoral narrative
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió 'proceed slowly' sobre 'lead on slowly'. En español se reflejó esa misma aclaración mediante 'avanzaré despacio', que conserva el matiz de movimiento cuidadoso sin forzar una imagen de conducción explícita. También se mantuvo la lectura contextual de 'livestock' para הַמְּלָאכָה, con nota léxica por la posible amplitud semántica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca en este versículo, sino como consistencia de proyecto para el Tetragrámaton cuando corresponda.
  - Se preservó 'esclavo' para עבד en la auto-humillación de Jacob, siguiendo la fuerza léxica documentada por el POB inglés.
  - Se usó 'mi señor' para אֲדֹנִי como fórmula de respeto humano, evitando cualquier ambigüedad con usos divinos de אדון.
