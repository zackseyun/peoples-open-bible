translation:
  language: es
  text: 'Estos son los clanes de los zabulonitas según los que fueron contados de ellos: sesenta mil quinientos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas fueron
  lexicon: HALOT
  rationale: La fórmula deíctica introductoria se expresa con presente copulativo en español para mantener la vivacidad de la enumeración censal, sin alterar el valor referencial del hebreo.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En español, 'familias' comunica bien el grupo de parentesco del contexto tribal; 'clanes' es posible, pero puede sonar más técnico o menos natural en lectura bíblica. Aquí se conserva la dimensión genealógica del término.
- source_word: הַזְּבוּלֹנִי
  english_pob_choice: the Zebulunites
  chosen_spanish: los zabulonitas
  alternatives_spanish:
  - la tribu de Zabulón
  - las familias zabulonitas
  lexicon: HALOT
  rationale: El gentilicio colectivo del hebreo se vierte de forma idiomática al español como 'zabulonitas', manteniendo el vínculo tribal colectivo sin imponer una perífrasis explicativa que el texto no exige.
- source_word: לִפְקֻדֵיהֶם
  english_pob_choice: according to those numbered from them
  chosen_spanish: según los que fueron contados de entre ellos
  alternatives_spanish:
  - según su registro
  - según su número
  - como fueron contados
  lexicon: HALOT
  rationale: Se mantiene el sentido censal de פקד con una construcción natural en español que preserve la relación entre el grupo y el total registrado, sin reducirlo a un simple 'número' ni a un término administrativo más abstracto.
- source_word: שִׁשִּׁים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: sixty thousand and five hundred
  chosen_spanish: sesenta mil quinientos
  alternatives_spanish:
  - '60.500'
  lexicon: HALOT
  rationale: El cardinal se expresa en palabras, como corresponde al estilo formal de los censos bíblicos, y porque el español no requiere la conjunción 'y' entre millar y centenas en esta forma breve.
translation_notes:
  revision_awareness: El inglés auditado eliminó una coma tras 'Zebulunites' para mayor fluidez; en español no se requiere una coma equivalente. No hay variantes textuales ni tensiones teológicas relevantes en este versículo.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece el nombre divino en este versículo.
  - Se conserva el registro censal y genealógico del pasaje, con léxico sobrio y no interpretativo.
  - '''Familias'' se usa aquí como equivalente funcional de מִשְׁפְּחֹת dentro de la enumeración tribal.'
