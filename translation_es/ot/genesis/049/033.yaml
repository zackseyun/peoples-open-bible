translation:
  language: es
  text: Cuando Jacob terminó de dar instrucciones a sus hijos, recogió sus pies en la cama[a], exhaló su último aliento[b] y fue reunido a su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «recogió sus pies hacia la cama». El hebreo emplea un giro idiomático con «recoger».'
    reason: lexical_alternative
  - marker: b
    text: Es una expresión hebrea asociada con la muerte y la reunión con los propios; no equivale simplemente a decir que fue sepultado.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְכַל
  english_pob_choice: finished
  chosen_spanish: terminó
  alternatives_spanish:
  - acabó
  - finalizó
  lexicon: HALOT
  rationale: כלה marca que Jacob concluye su acción de hablar/instruir. «Terminó» comunica bien la завершación narrativa en español moderno sin perder la secuencia del hebreo.
- source_word: לְצַוֹּת
  english_pob_choice: commanding
  chosen_spanish: dar instrucciones
  alternatives_spanish:
  - mandar
  - encargar
  lexicon: HALOT
  rationale: צוה puede ser «mandar/ordenar»; aquí, en el contexto de las palabras finales de Jacob a sus hijos, «dar instrucciones» conserva el acto solemne sin sonar excesivamente militar en español.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos», y en español «hijos» puede funcionar como colectivo masculino en este contexto familiar. Se evita añadir precisión no exigida por el texto.
- source_word: וַיֶּאֱסֹף רַגְלָיו אֶל הַמִּטָּה
  english_pob_choice: he drew his feet up into the bed
  chosen_spanish: recogió sus pies sobre la cama
  alternatives_spanish:
  - recogió sus pies en la cama
  - metió sus pies en la cama
  lexicon: HALOT
  rationale: אָסַף conserva la idea de «recoger/reunir», y el español natural aquí es «recogió sus pies». «Sobre la cama» refleja el movimiento hacia la superficie donde estaba recostado sin forzar una idiomática demasiado literal.
- source_word: הַמִּטָּה
  english_pob_choice: the bed
  chosen_spanish: la cama
  alternatives_spanish:
  - el lecho
  - la cama
  lexicon: HALOT
  rationale: מִטָּה puede ser cama o lecho. «La cama» es claro, digno y totalmente comprensible en esta escena de muerte.
- source_word: וַיִּגְוַע
  english_pob_choice: breathed his last
  chosen_spanish: exhaló su último aliento
  alternatives_spanish:
  - respiró su último aliento
  - murió
  lexicon: HALOT
  rationale: גוע apunta a expirar. «Exhaló su último aliento» preserva la imagen física y diferencia este verbo de la cláusula siguiente, como hace el inglés POB.
- source_word: וַיֵּאָסֶף אֶל עַמָּיו
  english_pob_choice: was gathered to his people
  chosen_spanish: fue reunido con su pueblo
  alternatives_spanish:
  - fue reunido a su pueblo
  - fue incorporado a su pueblo
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática de muerte y reunión con los propios. «Con su pueblo» mantiene la resonancia comunitaria y no la reduce a un simple entierro.
theological_decisions:
- issue: Sentido de «fue reunido con su pueblo»
  english_pob_reading: Retain the idiomatic expression without reducing it to mere burial.
  chosen_spanish_reading: Mantener la expresión idiomática sin reducirla al entierro.
  alternative_spanish_readings:
  - fue enterrado con sus antepasados
  - murió y se unió a sus padres
  rationale: El hebreo presenta una fórmula de muerte con resonancia de pertenencia y reunión, y el contexto inmediato no la limita a la sepultura. La traducción conserva esa tensión teológica y literaria sin explicarla en exceso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Coincide con el consenso alto del audit trail inglés; no se requirieron revisiones adicionales.
  spanish_consistency_notes:
  - Se conservó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se prefirió «Dios/espíritu/Mesías» según los defaults del proyecto, pero este versículo no contiene esos términos.
  - «Hijos» se usa como colectivo masculino acorde con el hebreo y el contexto narrativo.
  - Se mantuvo la distinción entre la acción física de «recoger los pies» y la fórmula idiomática de ser reunido con su pueblo.
