revisions:
- from: Quien es avaro[a] de ganancia perturba su casa, pero el que aborrece los sobornos vivirá.
  to: Quien codicia la ganancia[a] perturba su casa, pero el que aborrece los sobornos vivirá.
  rationale: Se reemplaza «es avaro de ganancia» por «codicia la ganancia» para reflejar con más fidelidad y naturalidad la construcción hebrea intensiva de codicia por provecho. También se reubica y ajusta la nota para que corresponda al elemento lexical realmente discutido. No se requiere adjudicación adicional.
