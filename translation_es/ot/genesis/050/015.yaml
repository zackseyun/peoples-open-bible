translation:
  language: es
  text: 'Cuando los hermanos de José vieron que su padre había muerto, dijeron: «Tal vez José nos odie[a] y ciertamente nos pague todo el mal que le hicimos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos guarde rencor». El verbo hebreo puede denotar hostilidad sostenida, no solo una reacción emocional inmediata.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo usa una construcción enfática: literalmente, «de cierto devolverá»; expresa que él seguramente les pagará por completo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - se dieron cuenta
  - percibieron
  lexicon: HALOT
  rationale: ראה conserva el sentido básico de ver; en este contexto narrativo introduce la toma de conciencia ante un hecho nuevo. «Vieron» mantiene la imagen hebrea con naturalidad en español.
- source_word: אֲחֵי יוֹסֵף
  english_pob_choice: Joseph’s brothers
  chosen_spanish: los hermanos de José
  alternatives_spanish:
  - los hermanos de José
  - los hermanos de José
  lexicon: HALOT
  rationale: La construcción posesiva del inglés corresponde de forma natural al genitivo relacional español «los hermanos de José».
- source_word: כִּי מֵת אֲבִיהֶם
  english_pob_choice: that their father was dead
  chosen_spanish: que su padre había muerto
  alternatives_spanish:
  - que su padre estaba muerto
  - que su padre había fallecido
  lexicon: HALOT
  rationale: El hebreo presenta el estado resultante con מֵת. En español, «había muerto» comunica bien la constatación sin sonar tan abrupto como «estaba muerto».
- source_word: ל֥וּ
  english_pob_choice: Perhaps
  chosen_spanish: Tal vez
  alternatives_spanish:
  - Quizá
  - Quizás
  - A lo mejor
  lexicon: HALOT
  rationale: לוּ aquí introduce una suposición temerosa. «Tal vez» conserva la incertidumbre sin volver la frase demasiado coloquial.
- source_word: יִשְׂטְמֵנוּ
  english_pob_choice: hates us
  chosen_spanish: nos guarde rencor
  alternatives_spanish:
  - nos odie
  - nos tenga odio
  - nos sea hostil
  lexicon: HALOT
  rationale: שׂטם denota hostilidad sostenida o resentimiento. «Nos guarde rencor» evita reducirlo solo a una emoción momentánea y refleja bien la posible carga durativa del verbo.
- source_word: וְהָשֵׁב יָשִׁיב
  english_pob_choice: surely repay
  chosen_spanish: ciertamente nos pague
  alternatives_spanish:
  - seguramente nos retribuya
  - de seguro nos pague
  - sin duda nos pague
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito expresa intensidad o certeza. En español, «ciertamente» conserva la fuerza enfática; «nos pague» mantiene la idea de retribución sin forzar un tecnicismo.
- source_word: לָנוּ
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: HALOT
  rationale: El complemento pronominal español integra de forma natural el dativo de ventaja/perjuicio implícito en el hebreo.
- source_word: אֵת כָּל הָרָעָה
  english_pob_choice: for all the evil
  chosen_spanish: todo el mal
  alternatives_spanish:
  - todo el mal
  - toda la maldad
  - todo el daño
  lexicon: HALOT
  rationale: רָעָה conserva aquí peso moral. «Mal» mantiene la fuerza ética del término mejor que opciones más débiles como «daño».
- source_word: אֲשֶׁר גָּמַלְנוּ אֹתוֹ
  english_pob_choice: that we did to him
  chosen_spanish: que le hicimos
  alternatives_spanish:
  - que le causamos
  - que le tratamos así
  - que le hicimos a él
  lexicon: HALOT
  rationale: גמל puede abarcar el modo de tratar o recompensar. «Le hicimos» es idiomático en español y suficiente para abarcar la acción contra José sin añadir especificación no exigida por el hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue el estado editorial más reciente del POB inglés: se prefirió una formulación equivalente a «Perhaps ... will» frente a una introducción demasiado libre, y se conservó el valor enfático del infinitivo absoluto en la segunda mitad del versículo.'
  spanish_consistency_notes:
  - Se mantuvo «José» para el nombre propio y «hermanos» para אֲחֵי, en línea con el registro narrativo bíblico en español.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que aquí no aparece el nombre divino.
  - Se eligió «mal» para הָרָעָה por su peso moral, en coherencia con el uso ético del pasaje.
  - La puntuación con comillas y dos puntos sigue el estilo editorial bíblico moderno en español.
