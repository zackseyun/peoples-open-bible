  text: But if anyone thinks he is behaving improperly toward his virgin[a], if she is past her youth and it ought to be so, let him do what he wants; he is not sinning. Let them marry.
  footnotes:
  - marker: a
    text: 'Or ''toward his fiancée/betrothed virgin''; traditionally also understood as ''toward his virgin daughter.'' The Greek is ambiguous.'
