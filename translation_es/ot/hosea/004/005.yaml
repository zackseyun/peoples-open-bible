translation:
  language: es
  text: Tropezarás de día, y el profeta[a] también tropezará contigo de noche; y destruiré[b] a tu madre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un profeta también tropezará contigo»; el hebreo permite la lectura indefinida.
    reason: lexical_alternative
  - marker: b
    text: O «callaré» o «cortaré»; el verbo hebreo puede llevar sentidos relacionados en un contexto de juicio.
    reason: lexical_alternative
  - marker: c
    text: «Tu madre» probablemente alude metafóricamente al pueblo, la nación o la comunidad del pacto.
    reason: cultural_note
lexical_decisions:
- source_word: וְכָשַׁלְתָּ
  english_pob_choice: you will stumble
  chosen_spanish: tropezarás
  alternatives_spanish:
  - te tambalearás
  - caerás
  lexicon: HALOT / כשל
  rationale: El verbo comunica la imagen de perder firmeza o fracasar en el andar; en español, «tropezar» conserva bien la metáfora sin volverla más absoluta que el hebreo.
- source_word: הַיּוֹם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - en el día
  - durante el día
  lexicon: HALOT / יום
  rationale: La oposición con «de noche» pide una pareja temporal natural en español; «de día» expresa el contraste con claridad y brevedad.
- source_word: וְכָשַׁל
  english_pob_choice: will stumble
  chosen_spanish: tropezará
  alternatives_spanish:
  - tambaleará
  - caerá
  lexicon: HALOT / כשל
  rationale: Se mantiene el mismo campo semántico que en la primera cláusula para conservar la repetición enfática del hebreo.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - hasta
  lexicon: HALOT / גם
  rationale: «También» es la equivalencia más directa y natural para añadir al profeta a la acusación.
- source_word: נָבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - un profeta
  lexicon: HALOT / נביא
  rationale: Aunque el hebreo es indefinido, en español el artículo definido funciona bien para una figura representativa dentro de una denuncia profética. La alternativa indefinida queda implícitamente posible en el contexto.
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - a tu lado
  lexicon: HALOT / עם
  rationale: «Contigo» es la forma idiomática del español para expresar la relación directa con el interlocutor masculino singular.
- source_word: לָיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT / לילה
  rationale: Se preserva el paralelismo día/noche con una formulación natural en español.
- source_word: וְדָמִיתִי
  english_pob_choice: I will destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - callaré
  - cortaré
  lexicon: HALOT / דמה
  rationale: En este contexto judicial, el verbo admite sentidos relacionados de ruina, silencio o corte. El POB inglés opta por «destroy», y «destruiré» comunica con fuerza el juicio sin borrar la tensión semántica que se conserva en la nota.
- source_word: אִמֶּךָ
  english_pob_choice: your mother
  chosen_spanish: tu madre
  alternatives_spanish:
  - tu madre, es decir, tu pueblo
  - la madre nación
  lexicon: HALOT / אם
  rationale: Se mantiene la metáfora familiar de forma literal en el texto principal, porque Hosea la usa como imagen profética y no conviene resolverla interpretivamente dentro del versículo.
theological_decisions:
- issue: Referente de «tu madre»
  english_pob_reading: '''Your mother'' likely refers metaphorically to the people, nation, or covenant community.'
  chosen_spanish_reading: «tu madre» se conserva como metáfora, probablemente alusiva al pueblo o la comunidad del pacto.
  alternative_spanish_readings:
  - Israel
  - la nación
  - la madre-ciudad
  rationale: 'La decisión sigue la cautela del POB inglés: no se explicita el referente en el cuerpo del texto para no aplanar la imagen profética, pero la nota puede orientar al lector sin cerrar la interpretación.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y literaria.'
translation_notes:
  revision_awareness: El borrador sigue el pasaje base sin cambios de revisión recientes; el contexto auditado indica acuerdo alto y ninguna modificación pendiente.
  spanish_consistency_notes:
  - Se mantuvo la metáfora de «tu madre» sin sustituirla por una explicación en el texto principal.
  - Se conservaron los paralelismos día/noche y la repetición de כשל con el mismo verbo base en español.
  - «Destruiré» refleja la decisión inglesa principal y deja abierta la polisemia contextual en la nota.
  - El registro es bíblico y contemporáneo, apto para lectura eclesial en español neutral.
