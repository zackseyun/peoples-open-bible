base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/009/003.yaml
  text: Now the donkeys belonging to Kish[a], Saul’s father, were lost. So Kish said to Saul his son, “Please take with you one of the young men, and get up, go[b], seek the donkeys.”
  footnotes:
