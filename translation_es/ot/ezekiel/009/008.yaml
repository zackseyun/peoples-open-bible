  to: 'Y sucedió que, mientras ellos los abatían y yo quedaba solo, caí rostro en tierra y clamé, y dije: «¡Ah, Señor Yahvé[a], destruirás a todo el remanente de Israel cuando derrames tu ira sobre Jerusalén?»'
  rationale: Se quitó el marcador [a] de «Y sucedió» y se colocó correctamente sobre la expresión que la nota explica, «Señor Yahvé». Se sustituyó «caí sobre mi rostro» por «caí rostro en tierra» para un español más natural que conserve la imagen de postración. Se cambió «vas a destruir» por «destruirás» para mantener un registro más digno y adecuado a la súplica profética, sin alterar el sentido interrogativo del hebreo.
