translation:
  language: es
  text: Cuando Ahitofel vio que su consejo no había sido seguido[a], aparejó su asno, se levantó y fue a su casa en su ciudad. Puso su casa en orden[b], luego se ahorcó[c] y murió; y fue sepultado en la tumba de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su consejo no había sido llevado a cabo». El hebreo dice literalmente: «su consejo no fue hecho».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Dio órdenes a su casa/hogar». El hebreo, más literalmente, dice: «dio órdenes a su casa».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «se estranguló». El verbo puede indicar muerte por ahorcamiento o por estrangulamiento; en este contexto describe el suicidio de Ahitofel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצָתוֹ
  english_pob_choice: his counsel
  chosen_spanish: su consejo
  alternatives_spanish:
  - su consejo asesor
  - su plan
  lexicon: HALOT
  rationale: עֵצָה puede significar consejo, asesoramiento o plan. "Consejo" conserva el sentido estratégico y deliberativo del término sin introducir una paráfrasis más fuerte que el hebreo.
- source_word: נֶעֶשְׂתָה
  english_pob_choice: had not been followed
  chosen_spanish: no había sido seguido
  alternatives_spanish:
  - no había sido hecho
  - no había sido llevado a cabo
  lexicon: HALOT
  rationale: El hebreo dice literalmente que "no fue hecho", pero en contexto se refiere a que la propuesta de Ahitofel no se implementó. "No había sido seguido" expresa ese sentido idiomático con naturalidad en español.
- source_word: וַיַּחֲבֹשׁ אֶת־הַחֲמוֹר
  english_pob_choice: he saddled his donkey
  chosen_spanish: aparejó su asno
  alternatives_spanish:
  - ensilló su asno
  - aparejó el asno
  lexicon: HALOT
  rationale: חבש aplicado a un asno puede significar prepararlo para el viaje, es decir, aparejarlo o ensillarlo. "Aparejó" evita sonar mecánico y conserva la acción de preparar el animal para salir.
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: HALOT
  rationale: Es un verbo narrativo común. "Se levantó" mantiene el movimiento secuencial de la narración en español claro y natural.
- source_word: אֶל־בֵּיתוֹ אֶל־עִירוֹ
  english_pob_choice: to his house in his city
  chosen_spanish: a su casa en su ciudad
  alternatives_spanish:
  - a su casa, en su ciudad
  - a la casa que tenía en su ciudad
  lexicon: HALOT
  rationale: La doble preposición señala el destino hacia su casa y ubica esa casa dentro de su ciudad. "A su casa en su ciudad" preserva ambos elementos sin sobreinterpretar la relación.
- source_word: וַיְצַו אֶל־בֵּיתוֹ
  english_pob_choice: He set his house in order
  chosen_spanish: Puso en orden su casa
  alternatives_spanish:
  - Dio órdenes a su casa
  - Puso orden en su casa
  lexicon: HALOT
  rationale: El hebreo permite la idea de dar instrucciones a la casa/entorno doméstico o poner sus asuntos en orden. La POB inglesa opta por una expresión idiomática; en español, "Puso en orden su casa" comunica bien la preparación final sin forzar el sentido.
- source_word: וַיֵּחָנַק
  english_pob_choice: hanged himself
  chosen_spanish: se ahorcó
  alternatives_spanish:
  - se stranguló
  - se colgó
  lexicon: HALOT
  rationale: El verbo puede referirse a ahorcarse o estrangularse en este contexto de suicidio. "Se ahorcó" es la forma idiomática más clara en español, manteniendo la referencia a la muerte por suspensión.
- source_word: בְּקֶבֶר אָבִיו
  english_pob_choice: in his father's tomb
  chosen_spanish: en la tumba de su padre
  alternatives_spanish:
  - en el sepulcro de su padre
  - en la sepultura de su padre
  lexicon: HALOT
  rationale: קֶבֶר puede ser tumba, sepulcro o sepultura. "Tumba" es natural en español contemporáneo y conserva el carácter funerario familiar del contexto.
theological_decisions:
- issue: Modo de muerte de Ahitofel y alcance del verbo hebreo
  english_pob_reading: Or 'strangled himself.' The verb can denote death by hanging or strangling; in context it describes Ahithophel's suicide.
  chosen_spanish_reading: se ahorcó
  alternative_spanish_readings:
  - se estranguló
  - se colgó
  rationale: 'No se pierde la tensión semántica: el hebreo permite ahorcarse o estrangularse. En español, "se ahorcó" es la forma narrativa más reconocible para este suicidio, sin afirmar más de lo que el contexto exige.'
  doctrine_reference: Narrativa histórica; principio de equivalencia léxica con ambigüedad conservada en nota.
- issue: Sentido idiomático de 'poner en orden su casa'
  english_pob_reading: Or 'He set his house in order.' The Hebrew more literally says 'he gave orders to his house/household.'
  chosen_spanish_reading: Puso en orden su casa
  alternative_spanish_readings:
  - Dio órdenes a su casa
  - Puso orden en su casa
  rationale: 'La expresión española preserva el sentido de preparación final antes de la muerte y refleja la lectura idiomática adoptada por la POB inglesa. No se impone una imagen ajena al texto, pero se admite que el hebreo es más literal: dar órdenes a la casa/entorno doméstico.'
  doctrine_reference: Narrativa histórica; ambigüedad idiomática reconocida en traducción y nota.
translation_notes:
  revision_awareness: La POB inglesa fue revisada desde una redacción más literal ('gave orders to his household') a la idiomática 'set his house in order'. En español se siguió esa revisión con 'Puso en orden su casa', pero se conservó en nota la posibilidad más literal del hebreo. También se respetó la revisión inglesa que ajustó el poseedor del asno; en español, 'su asno' mantiene el posesivo explícito del hebreo.
  spanish_consistency_notes:
  - Se usó "Ahitofel" para el nombre propio de forma consistente y tradicionalmente legible en español.
  - Se prefirió "asno" en lugar de "burro" por tono bíblico neutro y dignidad narrativa.
  - No se sustituyó "consejo" por "plan" para preservar la fuerza consultiva/estratégica de עֵצָה.
  - La estructura narrativa sigue el orden de acciones del hebreo y de la POB inglesa sin añadir detalles interpretativos.
