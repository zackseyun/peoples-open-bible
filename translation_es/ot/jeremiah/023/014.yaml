review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB en casi todo: «entre los profetas de Jerusalén», «he visto», la acusación doble de adulterio y falsedad, el modismo «fortalecido las manos», y la comparación final con Sodoma y Gomorra. Sin embargo, hay un desajuste importante de notas: la nota [a] en español explica la imagen hebrea de «andar en mentira», pero en el rastro inglés la nota a preserva una alternativa para «nadie/no one» vs. el singular distributivo «man», mientras que la nota b preserva el matiz de שוב = «volverse/arreentirse». Además, en español conviene reflejar ese segundo matiz con una nota sobre «se vuelva».'
  spanish_quality_summary: El español es claro, natural y digno. «Andar en mentira» suena algo marcado, pero es comprensible y defendible por fidelidad metafórica. «Nadie se vuelva de su maldad» es idiomático y evita una rigidez innecesaria. Una leve mejora de orden puede hacer más natural «Todos ellos son para mí como Sodoma».
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La decisión de mantener «se vuelva» en vez de «se arrepienta» concuerda con la racionalidad documentada para שוב. La forma «nadie» como equivalente natural del distributivo אִישׁ es aceptable en español si se conserva en nota la información del singular representativo.
  issues:
  - severity: medium
    issue: Las notas al pie no preservan la misma información léxica/teológica significativa del rastro POB en inglés.
    rationale: La nota [a] del inglés corresponde a la alternativa «no man/no one» y el singular distributivo אִישׁ; la nota [b] corresponde al posible matiz de «turns back/repents». En el borrador español, [a] comenta «andar en mentira» y [b] cubre solo el distributivo. Falta una nota para el matiz de שוב y sobra una nota no sustentada por el rastro.
  - severity: low
    issue: El orden «Para mí todos ellos son como Sodoma» es correcto pero menos fluido que otra opción.
    rationale: «Todos ellos son para mí como Sodoma» mantiene igual sentido y suena ligeramente más natural en español formal.
  revised_spanish_text: 'Y entre los profetas de Jerusalén he visto una cosa horrible: cometer adulterio y andar en mentira; han fortalecido las manos de los malhechores, para que nadie[a] se vuelva[b] de su maldad. Todos ellos son para mí como Sodoma, y sus habitantes como Gomorra.'
  revised_footnotes:
  - marker: a
    text: El hebreo usa el singular distributivo «un hombre»; en español se expresa aquí con «nadie» para comunicar de manera natural ese sentido representativo.
    reason: lexical_alternative
  - marker: b
    text: «Se vuelva» también puede traducirse «se arrepienta», ya que el verbo hebreo suele llevar el sentido de volverse del mal.
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el texto base casi intacto, pero corrige las notas para alinearlas con las decisiones léxicas y teológicas auditadas en inglés: una nota para el singular distributivo אִישׁ y otra para el matiz de שוב como arrepentimiento. También se elimina una nota innecesaria sobre «andar en mentira» y se ajusta levemente el orden final para mayor naturalidad.'
