translation:
  language: es
  text: Así terminó Salomón la casa de Yahvé, la casa del rey[a], y todo lo que vino sobre el corazón de Salomón[b] para hacer en la casa de Yahvé y en su propia casa, lo realizó con éxito[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el palacio real» por «la casa del rey».
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: «todo lo que vino sobre el corazón de Salomón», es decir, lo que él pensó, deseó o se propuso hacer.'
    reason: cultural_note
  - marker: c
    text: O «lo hizo prosperar» / «tuvo éxito». El verbo hebreo puede significar lograr éxito o hacer que algo tenga éxito.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַל
  english_pob_choice: finished
  chosen_spanish: terminó
  alternatives_spanish:
  - acabó
  - completó
  lexicon: HALOT
  rationale: כלה en la forma narrativa expresa llevar algo a su conclusión. «Terminó» es natural en español moderno y conserva la idea de concluir la obra.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva «casa» para reflejar literalmente בית y no sustituirlo por «templo», que es más interpretativo.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the house of the king
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio real
  - la residencia del rey
  lexicon: HALOT
  rationale: La expresión hebrea repite «casa»; por eso se mantiene esa repetición en el texto principal en vez de reemplazarla por una glosa más interpretativa.
- source_word: כָּל הַבָּא עַל לֵב שְׁלֹמֹה
  english_pob_choice: everything that came upon Solomon’s heart
  chosen_spanish: todo lo que vino sobre el corazón de Salomón
  alternatives_spanish:
  - todo lo que pasó por la mente de Salomón
  - todo lo que Salomón había concebido
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de lo que «viene sobre el corazón», entendida como intención o deseo, sin neutralizarla por completo en una paráfrasis mentalista.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para llevar a cabo
  - para realizar
  lexicon: HALOT
  rationale: עשה es amplio; «hacer» preserva la generalidad del verbo y funciona bien con los proyectos de construcción mencionados.
- source_word: וּבְבֵיתוֹ
  english_pob_choice: in his own house
  chosen_spanish: en su propia casa
  alternatives_spanish:
  - en su casa
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere a Salomón; añadir «propia» distingue su casa de «la casa del rey» y mantiene la referencia clara en español.
- source_word: הִצְלִיחַ
  english_pob_choice: he successfully accomplished
  chosen_spanish: lo llevó a feliz cumplimiento
  alternatives_spanish:
  - lo realizó con éxito
  - lo hizo prosperar
  lexicon: HALOT
  rationale: הצליח puede implicar éxito o hacer prosperar. En este contexto de obras realizadas, «lo llevó a feliz cumplimiento» comunica el resultado exitoso sin reducirlo a simple «prosperó».
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; el proyecto español mantiene el nombre divino como «Yahvé» para preservar la identidad del pacto, conforme al uso base del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el auditorio inglés auditado: conserva la repetición de «casa», mantiene el modismo del «corazón» y deja abierta la ambigüedad de הצליח con una nota de alternativa léxica. No se requieren revisiones adicionales respecto del pasaje auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «casa» en ambas ocurrencias de בית para respetar el paralelismo hebreo.
  - «Corazón» conserva el valor semítico de sede de intención y deseo, no solo emoción.
  - El marcador [a] aparece junto a «casa del rey»; [b] junto a «corazón de Salomón»; [c] junto a «cumplimiento», sin reutilización de marcadores.
