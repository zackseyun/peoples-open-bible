  text: סַבּ֤וּ/נִי כִ/דְבוֹרִ֗ים דֹּ֭עֲכוּ כְּ/אֵ֣שׁ קוֹצִ֑ים בְּ/שֵׁ֥ם יְ֝הוָ֗ה כִּ֣י אֲמִילַֽ/ם׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/118/012.yaml
  text: They surrounded me like bees[a]; they were extinguished like a fire of thorns. In the name of Yahweh[b], I surely cut them down.
