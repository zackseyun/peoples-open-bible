id: ROM.16.26
reference: Romans 16:26
source:
  edition: robinson-pierpont-2005-byzantine
  text: φανερωθέντος δὲ νῦν, διά τε γραφῶν προφητικῶν, κατ' ἐπιταγὴν τοῦ αἰωνίου θεοῦ,
    εἰς ὑπακοὴν πίστεως εἰς πάντα τὰ ἔθνη γνωρισθέντος,
  language: Greek
translation:
  text: but[a] has now been revealed, and through the prophetic Scriptures made known
    to all nations, according to the command of the eternal God, to bring about the
    obedience of faith,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is a continuation of the closing doxology (Romans 16:25–27).
      See note on Romans 16:25 regarding its placement and manuscript evidence.
    reason: textual_critical
lexical_decisions:
- source_word: φανερόω
  chosen: revealed
  alternatives:
  - manifested
  - disclosed
  lexicon: BDAG
  rationale: The participle refers back to the 'mystery' in verse 25; 'revealed' effectively
    captures the bringing to light of a divine secret that was previously hidden.
- source_word: γραφή
  chosen: Scriptures
  alternatives:
  - writings
  lexicon: BDAG
  rationale: Modified by 'prophetic' (προφητικῶν), this plural noun specifically designates
    the sacred writings of the Old Testament.
- source_word: ἐπιταγή
  chosen: command
  alternatives:
  - decree
  - commandment
  lexicon: BDAG
  rationale: Denotes an authoritative directive or injunction, emphasizing that the
    global proclamation of the gospel is directly ordered by God.
- source_word: ὑπακοή
  chosen: obedience
  alternatives:
  - submission
  lexicon: BDAG
  rationale: Paired with 'of faith' (πίστεως), it forms the phrase 'obedience of faith,'
    forming an intentional bookend with the exact same phrase used in the opening
    of the epistle (Romans 1:5).
- source_word: ἔθνος
  chosen: nations
  alternatives:
  - Gentiles
  lexicon: BDAG
  rationale: While frequently translated 'Gentiles' in Pauline literature to contrast
    with Jews, 'nations' is chosen here to emphasize the universal, global scope of
    the gospel's proclamation.
theological_decisions: []
