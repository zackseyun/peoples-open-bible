base_translation:
  language: en
  yaml_path: translation/ot/leviticus/023/003.yaml
  text: For six days work may be done[a], but on the seventh day is a Sabbath of complete rest, a holy convocation. You shall do no work[b]; it is a Sabbath to Yahweh in all your dwellings.
  footnotes:
  - marker: a
    text: Or 'a sabbath-rest' or 'a sabbath of solemn rest.' The Hebrew phrase intensifies the idea of Sabbath rest.
    reason: lexical_alternative
  - marker: b
    text: Or 'throughout all your settlements.' The Hebrew can refer to dwelling places or settled communities.
    reason: lexical_alternative
