translation:
  language: es
  text: Y salió fuego de Yahvé[a] y consumió a los doscientos cincuenta hombres que ofrecían el incienso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «de delante de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵשׁ
  english_pob_choice: And fire
  chosen_spanish: Y salió fuego
  alternatives_spanish:
  - Y fuego salió
  - Y un fuego salió
  lexicon: HALOT
  rationale: אֵשׁ significa 'fuego'. En español, 'salió fuego' preserva la imagen narrativa sin añadir un artículo innecesario; el prefijo conjuntivo se rinde con 'Y' para mantener la secuencia del relato.
- source_word: יָצְאָה
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - salió de
  lexicon: HALOT
  rationale: יצא se expresa naturalmente en español como 'salir'. 'Salió' comunica el movimiento desde el ámbito divino con claridad y concisión.
- source_word: מֵ/אֵת יְהוָה
  english_pob_choice: from Yahweh / from the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - de delante de Yahvé
  lexicon: HALOT
  rationale: La preposición y la construcción indican origen/fuente. Se conserva el nombre divino como 'Yahvé' según la terminología base del proyecto. 'De delante de Yahvé' sería una alternativa más formal, pero menos natural aquí.
- source_word: וַ/תֹּאכַל
  english_pob_choice: and consumed
  chosen_spanish: y consumió
  alternatives_spanish:
  - y devoró
  - y se lo tragó
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente 'comer', con fuego como sujeto el sentido idiomático es 'consumir'. 'Consumió' mantiene la fuerza del juicio sin volverse arcaizante.
- source_word: הַ/חֲמִשִּׁים וּ/מָאתַ֨יִם אִ֔ישׁ
  english_pob_choice: the two hundred and fifty men
  chosen_spanish: a los doscientos cincuenta hombres
  alternatives_spanish:
  - a los 250 hombres
  - a los doscientos cincuenta varones
  lexicon: HALOT
  rationale: La frase numérica con אִישׁ designa a un grupo contado de hombres. 'A los doscientos cincuenta hombres' es natural en español y conserva el objeto directo marcado por 'a'.
- source_word: מַקְרִיבֵ֖י
  english_pob_choice: who were offering
  chosen_spanish: que ofrecían
  alternatives_spanish:
  - que estaban ofreciendo
  - ofrendantes
  lexicon: HALOT
  rationale: El participio de קרב aquí caracteriza a los hombres por la acción en curso. 'Que ofrecían' da una relativa clara y fiel al valor aspectual sin sobrecargar el español.
- source_word: הַ/קְּטֹרֶת
  english_pob_choice: the incense
  chosen_spanish: el incienso
  alternatives_spanish:
  - el sahumerio
  - el perfume
  lexicon: HALOT
  rationale: קְטֹרֶת se refiere al incienso cultual. 'El incienso' es el equivalente estándar y el más transparente para el lector español.
theological_decisions:
- issue: Cómo representar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se mantiene la práctica del proyecto de traducirlo como 'Yahvé' en el texto principal, evitando el reemplazo litúrgico por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de וַתֹּאכַל con sujeto fuego
  english_pob_reading: and consumed
  chosen_spanish_reading: y consumió
  alternative_spanish_readings:
  - y devoró
  - y comió
  rationale: Con fuego como sujeto, el verbo hebreo se entiende idiomáticamente como acción de destrucción por consumo. 'Consumió' preserva esa fuerza y evita la literalidad extraña de 'comió'.
  doctrine_reference: Lexical semantics of אכל in judgment contexts
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y toma el audit trail inglés como apoyo para decisiones semánticas, pero adapta la sintaxis al español natural. Se conserva la tensión lexical de מֵאֵת יְהוָה como fuente/origen, expresada aquí de forma idiomática con 'de Yahvé', sin ocultar la alternativa más formal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se usa 'incienso' para קְטֹרֶת en coherencia con el uso cultual del término.
  - La numeración 'doscientos cincuenta' se escribe con palabras por estilo bíblico formal en español.
