review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo: condición adversativa, giro interior del corazón, negativa a escuchar, ser apartado, postrarse ante otros dioses y servirlos. Sin embargo, la nota al pie actual no refleja bien las alternativas documentadas en el audit trail inglés para וְנִדַּחְתָּ, y conviene ajustar levemente la redacción para una correspondencia más natural con el matiz pasivo de ‘ser apartado/arrastrado’.'
  spanish_quality_summary: El español es claro y digno, pero ‘eres arrastrado’ suena algo brusco en este contexto y la nota ‘te dejas arrastrar’ introduce una voluntariedad que el hebreo no exige. Además, ‘los sirves’ es comprensible, pero ‘les sirves’ suena más natural con referente personal/deidad en español culto bíblico. Una pequeña revisión mejora naturalidad y fidelidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘otros dioses’ es correcto para אֱלֹהִים אֲחֵרִים. ‘te postras’ preserva bien הִשְׁתַּחֲוִיתָ. La revisión propuesta mantiene el valor de שׁמע como ‘escuchar’ y de עבד como ‘servir’.
  issues:
  - severity: medium
    issue: La nota al pie para וְנִדַּחְתָּ no coincide bien con las alternativas auditadas.
    rationale: El inglés documenta ‘drawn away’ y ‘driven away’; la nota española introduce ‘te dejas arrastrar’, que añade mayor agencia del sujeto, y ‘eres desviado’, que suena menos natural.
  - severity: low
    issue: ‘los sirves’ es menos natural que ‘les sirves’ al referirse a dioses.
    rationale: 'Ambas formas existen, pero en español general y registro bíblico actual ‘servir a alguien’ suele expresarse con pronombre indirecto: ‘les sirves’.'
  - severity: low
    issue: ‘eres arrastrado’ puede sonar físicamente fuerte en exceso.
    rationale: Aunque no es incorrecto, ‘eres apartado’ refleja mejor el ser desviado de la lealtad debida y armoniza mejor con la nota explicativa.
  revised_spanish_text: Pero si tu corazón se desvía, y no escuchas, y eres apartado[a], y te postras ante otros dioses y les sirves,
  revised_footnotes:
  - marker: a
    text: O «eres arrastrado» o «eres desviado». El verbo hebreo puede transmitir la idea de ser apartado del camino recto o alejado de la lealtad debida.
    reason: lexical_alternative
  revision_rationale: Se ajusta וְנִדַּחְתָּ a «eres apartado» para expresar con más naturalidad en español la idea pasiva de ser desviado de la fidelidad. La nota al pie se corrige para reflejar alternativas léxicas compatibles con el audit trail inglés sin introducir voluntariedad no marcada en el hebreo. También se cambia «los sirves» por «les sirves» por mayor naturalidad idiomática.
