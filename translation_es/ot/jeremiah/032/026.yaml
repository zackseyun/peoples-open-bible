lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces vino
  alternatives_spanish:
  - Y aconteció
  - Y vino a suceder
  - Entonces aconteció
  lexicon: HALOT
  rationale: La forma con waw consecutiva introduce la secuencia narrativa; en español, «Entonces vino» conserva el avance del relato sin caer en un calco pesado como «y aconteció».
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En la fórmula profética דְּבַר יְהוָה, «la palabra» preserva la expresión técnica y su peso teológico en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se vierte como «Yahvé» según el criterio del proyecto para YHWH; mantiene el nombre propio en vez de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección hacia Jeremías; en español la preposición natural es «a».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: «Diciendo» reproduce la función introductoria de la fórmula de discurso sin forzar una subordinación innecesaria.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Para el español del proyecto, se conserva el nombre divino como «Yahvé» para no ocultar la referencia personal del pacto y mantener coherencia con la norma establecida.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El cotejo inglés muestra alto acuerdo y sin cambios recientes; por tanto, el borrador español sigue de cerca la estructura y decisiones auditadas, ajustándolas a la norma terminológica del proyecto en español.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética breve y directa.
  - «Yahvé» conserva el nombre divino en vez de una sustitución por mayúsculas o título.
  - «Diciendo» funciona como marcador discursivo estándar en español bíblico moderno.
