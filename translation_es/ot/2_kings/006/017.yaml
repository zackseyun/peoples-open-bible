translation:
  language: es
  text: 'Entonces Eliseo oró y dijo[a]: «Yahvé, por favor, abre sus ojos para que vea». Entonces Yahvé abrió los ojos del joven, y vio; y he aquí[b], el monte estaba lleno de caballos y carros de fuego alrededor de Eliseo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el servidor» para «el joven»; el hebreo naʿar puede designar un muchacho o un asistente/servidor según el contexto.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa aquí el nombre divino YHWH, tradicionalmente vertido como «SEÑOR» en algunas versiones; también puede transliterarse como «Yahweh».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - rogó
  - hizo oración
  lexicon: HALOT
  rationale: El hitpael de פלל aquí expresa una oración dirigida a Dios; en español, «oró» es natural, preciso y solemne sin añadir matices que el hebreo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton como «Yahvé», conforme al criterio POB y a la directriz del proyecto, evitando sustituirlo por un título.
- source_word: פְּקַח נָא
  english_pob_choice: please open
  chosen_spanish: por favor abre
  alternatives_spanish:
  - abre, por favor
  - abre ahora
  lexicon: HALOT
  rationale: פְּקַח es una petición imperativa de abrir, especialmente los ojos; נָא añade ruego/cortesía. «Por favor abre» transmite bien la súplica sin temporalizar innecesariamente como «ahora».
- source_word: עֵינָיו
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos de él
  lexicon: HALOT
  rationale: Se mantiene el referente singular masculino implícito en el contexto, con una traducción posesiva natural en español.
- source_word: וְיִרְאֶה
  english_pob_choice: so that he may see
  chosen_spanish: para que vea
  alternatives_spanish:
  - y vea
  - a fin de que vea
  lexicon: HALOT
  rationale: El prefijo verbal aquí expresa propósito/resultado tras la súplica; «para que vea» hace explícita esa relación en español de manera fluida.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el servidor
  lexicon: HALOT
  rationale: נער puede significar joven, muchacho o sirviente según el contexto. Aquí «el joven» preserva el sentido léxico sin imponer una función social que el versículo no explicita directamente.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - suddenly
  lexicon: HALOT
  rationale: Esta partícula marca atención y sorpresa ante lo que se ve; «y he aquí» conserva bien ese efecto discursivo bíblico.
- source_word: הָהָר
  english_pob_choice: the mountain
  chosen_spanish: el monte
  alternatives_spanish:
  - la montaña
  - el cerro
  lexicon: HALOT
  rationale: «Monte» reproduce con dignidad el referente topográfico en español bíblico sin forzar una precisión geomorfológica mayor que la del hebreo.
- source_word: מָלֵא
  english_pob_choice: was full of
  chosen_spanish: estaba lleno de
  alternatives_spanish:
  - estaba repleto de
  - se hallaba lleno de
  lexicon: HALOT
  rationale: El adjetivo predicativo מָלֵא se rinde de forma directa con «estaba lleno de», una equivalencia idiomática y clara.
- source_word: סוּסִים וְרֶכֶב אֵשׁ
  english_pob_choice: horses and chariots of fire
  chosen_spanish: caballos y carros de fuego
  alternatives_spanish:
  - caballos y carros ígneos
  - caballos y carrocería de fuego
  lexicon: HALOT
  rationale: La coordinación de sustantivos se conserva de manera natural. «De fuego» mantiene el vínculo descriptivo con los carros y el vigor imagístico del hebreo, sin resolver más de lo que el texto dice sobre la naturaleza de la escena.
- source_word: סְבִיבֹת אֱלִישָׁע
  english_pob_choice: all around Elisha
  chosen_spanish: alrededor de Eliseo
  alternatives_spanish:
  - rodeando a Eliseo
  - en torno a Eliseo
  lexicon: HALOT
  rationale: סְבִיבֹת expresa circundación; «alrededor de» es la forma más natural en español y conserva la idea de cerco protector.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh/Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El versículo usa directamente el Tetragrámaton. Se preserva el nombre divino como «Yahvé» para mantener la transparencia del texto y la distinción entre nombre propio y título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nature of the vision
  english_pob_reading: The text presents a divinely enabled sight of heavenly protection without specifying whether the horses and chariots are literal, visionary, or angelic in ontological detail.
  chosen_spanish_reading: El texto presenta una visión concedida por Dios de una protección celestial, sin precisar si los caballos y carros son literales, visionarios o angélicos en su detalle ontológico.
  alternative_spanish_readings:
  - una aparición literalmente visible de un ejército angelical
  - una visión puramente simbólica
  rationale: La traducción conserva la afirmación del texto —ojos abiertos y visión real— sin resolver la naturaleza metafísica de la escena más allá de lo que el hebreo explicita.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el control cruzado muestra alto acuerdo; se mantiene la solución base sin alteraciones sustanciales.
  spanish_consistency_notes:
  - Se mantiene la transliteración «Yahvé» para יְהוָה, en coherencia con el criterio del proyecto y la audit trail en inglés.
  - «Eliseo» y «Yahvé» se usan de forma consistente en todo el versículo.
  - «El joven» conserva la ambigüedad de נער; la nota al pie ofrece la alternativa contextual «el servidor» sin cerrar indebidamente la lectura.
