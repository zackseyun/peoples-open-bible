translation:
  language: es
  text: Así Yahvé salvó a Israel aquel día de la mano de Egipto[a], y Israel vio a los egipcios muertos en la orilla del mar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de la mano de Egipto», un modismo para la liberación del poder de Egipto.'
    reason: cultural_note
  - marker: b
    text: 'O: «a la orilla del mar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשַׁע
  english_pob_choice: saved
  chosen_spanish: salvó
  alternatives_spanish:
  - libró
  - rescató
  lexicon: HALOT
  rationale: El hifil de ישׁע expresa rescate/liberación divina. «Salvó» comunica de forma natural la acción de Yahvé y conserva el peso teológico de la intervención salvadora, sin debilitarla a un mero auxilio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La política terminológica del proyecto para el Tetragrámaton es usar «Yahvé» en el texto principal. Mantiene el nombre divino personal revelado a Israel y evita la sustitución por un título.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte de manera idiomática en español como «aquel día». Mantiene la referencia puntual y suena natural sin añadir énfasis extra.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de
  lexicon: HALOT
  rationale: Conservo la metáfora hebrea de la «mano» para no borrar el idiomático sentido de dominio o poder. En español puede sonar figurado, pero sigue siendo comprensible y auditable.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - los egipcios
  - de Egipto
  lexicon: HALOT
  rationale: Aquí el sustantivo designa la potencia/nación opresora más que a individuos concretos, por eso «Egipto» reproduce bien el alcance colectivo del hebreo.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  lexicon: HALOT
  rationale: Es el verbo narrativo básico para ראה. «Vio» es directo y fiel, sin introducir matices interpretativos.
- source_word: מֵת
  english_pob_choice: dead
  chosen_spanish: muertos
  alternatives_spanish:
  - muerto
  - caídos muertos
  lexicon: HALOT
  rationale: Aunque el hebreo usa un adjetivo singular colectivo, el referente en español es plural («los egipcios»), por lo que «muertos» ajusta el número sin alterar el sentido.
- source_word: עַל שְׂפַת הַיָּם
  english_pob_choice: on the seashore
  chosen_spanish: en la orilla del mar
  alternatives_spanish:
  - sobre la orilla del mar
  - en la playa
  lexicon: HALOT
  rationale: «Orilla del mar» comunica con claridad el hebreo «la orilla/labio del mar». Prefiero esta forma a «seashore» calcado o a «playa», que estrecharía demasiado el término.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La fuente hebrea usa directamente el Tetragrámaton. El español del POB debe reflejar el nombre propio de Dios en vez de ocultarlo tras una sustitución titulada. «Yahvé» es la forma establecida en el proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se revisó el antecedente inglés con filosofía optimal-equivalence, sin cambios en la última pasada y con alta concordancia del control cruzado. La versión española sigue la misma lectura auditada: conserva la metáfora de «la mano» y la alternativa léxica sobre la ubicación final, ajustando solo la sintaxis natural del español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה en todo el texto principal.
  - Se conserva la metáfora de «la mano de» para el idiomático מִיַּד, con nota explicativa.
  - «Egipto» se usa para la potencia nacional en la primera cláusula y «los egipcios» para las personas en la segunda, siguiendo la distinción semántica del hebreo.
  - La expresión espacial final se da como «en la orilla del mar», con nota de alternativa para reflejar el rango posible del hebreo שְׂפַת הַיָּם.
