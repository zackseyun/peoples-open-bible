translation:
  language: es
  text: Y ahora[a], Yahvé, por favor, quítame la vida, porque mi muerte es mejor que mi vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «porque es mejor para mí morir que vivir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y ahora mismo
  lexicon: HALOT
  rationale: La conjunción con el adverbio temporal introduce con naturalidad la súplica de Jonás; «Y ahora» conserva la conexión discursiva y la inmediatez del clamor sin endurecer el español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como forma transparente en español. «Yahvé» sigue la decisión doctrinal del proyecto y evita la sustitución por un título.
- source_word: קַח נָא
  english_pob_choice: please take
  chosen_spanish: por favor, quítame
  alternatives_spanish:
  - por favor, toma
  - por favor, llévame
  lexicon: HALOT
  rationale: El imperativo pide que Yahvé retire la vida de Jonás; en español «quítame» expresa mejor la separación pedida que un simple «toma». «Por favor» conserva la partícula de ruego.
- source_word: אֶת נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: la vida
  alternatives_spanish:
  - mi alma
  - mi vida
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ se refiere a la vida de Jonás, no a «alma» en sentido abstracto. Como ya está expresado en el verbo «quítame», se puede decir naturalmente «la vida»; en la versión final se integra como «quítame la vida» para conservar el sentido idiomático.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi lado
  - lejos de mí
  lexicon: HALOT
  rationale: La preposición marca separación; en español queda absorbida de modo natural por «quítame la vida», que implica el alejamiento de esa vida respecto de Jonás.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la petición. «Porque» es la equivalencia más clara y fluida en español.
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - más bueno
  lexicon: HALOT
  rationale: En la comparación, el adjetivo expresa superioridad; «mejor» comunica correctamente el valor comparativo sin calco.
- source_word: מוֹתִי
  english_pob_choice: my death
  chosen_spanish: mi muerte
  alternatives_spanish:
  - mi morir
  - mi fallecimiento
  lexicon: HALOT
  rationale: El sustantivo con sufijo es literalmente «mi muerte»; se conserva la forma nominal y la equivalencia más natural en español. Evita forzar un infinitivo donde el hebreo usa un sustantivo.
- source_word: מֵחַיָּי
  english_pob_choice: than my life
  chosen_spanish: que mi vida
  alternatives_spanish:
  - que vivir
  - que mi vivir
  lexicon: HALOT
  rationale: La comparación hebrea con מִן se expresa en español de forma normal con «que». «Mi vida» corresponde directamente al sentido de חַיַּי y mantiene la simetría con «mi muerte».
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. La lectura española del proyecto es «Yahvé», preservando el nombre personal de Dios en vez de un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נֶפֶשׁ en el contexto
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi ser
  rationale: En esta súplica de muerte, נֶפֶשׁ no pide una entidad separada del cuerpo, sino la vida misma de Jonás. «Mi vida» respeta el uso idiomático y evita introducir una antropología ajena al contexto.
  doctrine_reference: HALOT; contexto narrativo de Jonás 4:3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión posterior del POB inglés que prefirió la forma más natural y formalmente equivalente «my death / my life» frente a un calco más literal. La versión española sigue esa misma dirección, usando «mi muerte / mi vida» y evitando un gerundio o una perífrasis menos natural.
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - La comparación final se expresa con «mejor es mi muerte que mi vida», que es idiomática y formalmente equivalente al hebreo.
  - No se usa «alma» para נֶפֶשׁ en este contexto, para no oscurecer el sentido de una petición de muerte.
