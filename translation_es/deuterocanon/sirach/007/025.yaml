review_pass:
  verdict: revise
  source_alignment_summary: El borrador español capta bien el sentido matrimonial de הוֹצֵא y la exhortación final de darla a un hombre discerniente. Sin embargo, en la cláusula central adopta en el texto principal la expansión griega ('habrás terminado una gran tarea') en lugar del sentido hebreo preferido por el POB auditado ('el asunto quedará resuelto'). Dado que la evidencia principal es hebrea y el inglés POB ya resolvió esa tensión dejando la lectura griega en nota, el español debe hacer lo mismo.
  spanish_quality_summary: El español es claro y legible, pero 'Casa a una hija' suena algo brusco; 'Casa a una hija' sigue siendo aceptable, aunque 'Da en matrimonio a una hija' sería más explícito. La principal mejora necesaria es alinear la cláusula media con el texto base y ajustar las notas para que la nota [a] no describa incorrectamente el griego como 'da a una hija' en vez de 'dala en matrimonio / entrégala'. 'Dásela' funciona idiomáticamente en contexto.
  glossary_alignment: No hay términos del glosario mayor en juego. 'prudente' para נָבוֹן/συνετός es una elección sólida y bien justificada. La revisión necesaria es de prioridad de fuente y manejo de alternativa textual, no de terminología doctrinal.
  issues:
  - severity: high
    issue: La cláusula principal 'habrás terminado una gran tarea' sigue la expansión griega en vez de la lectura hebrea priorizada por el POB.
    rationale: El texto fuente hebreo dice וְיֵצֵא עֵסֶק, con sentido de que el asunto/negocio queda concluido o resuelto. El inglés auditado decidió 'the matter will be settled' y relegó la lectura griega a nota. El español debe preservar esa misma decisión de fuente.
  - severity: medium
    issue: La nota [a] formula de manera imprecisa el paralelo griego como 'da a una hija'.
    rationale: El griego ἔκδου θυγατέρα expresa darla en matrimonio / entregarla, no simplemente 'dar a una hija'. Conviene explicarlo con mayor precisión en español.
  - severity: low
    issue: La distribución de notas no refleja bien la lógica del POB auditado.
    rationale: En el inglés, la nota sobre la cláusula central explica la literalidad hebrea y el apoyo del griego; y la otra nota preserva la alternativa léxica de la última cláusula. El español actual fusiona y desplaza esas funciones de forma confusa.
  revised_spanish_text: Casa a una hija, y el asunto quedará resuelto[a]; y dásela[b] a un hombre prudente.
  revised_footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: ''y el asunto saldrá''; el sentido es que la preocupación queda concluida. El paralelo griego lo expresa más explícitamente: ''y habrás completado una gran tarea''.'
    reason: alternative_reading
  - marker: b
    text: 'O: ''dala en matrimonio a un hombre prudente''.'
    reason: lexical_alternative
  revision_rationale: Se restituye en el texto principal la decisión del POB basada en el hebreo para וְיֵצֵא עֵסֶק ('el asunto quedará resuelto') y se deja la expansión griega en nota, como en la auditoría inglesa. También se corrigen y redistribuyen las notas para reflejar con precisión la evidencia fuente y la alternativa léxica de la cláusula final.
