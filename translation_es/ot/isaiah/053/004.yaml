    issue: Coordinación verbal incompleta en «ha llevado… y cargado»
    rationale: 'Aunque entendible, en español suena más natural y pulido repetir el auxiliar o usar dos formas paralelas completas: «ha llevado… y ha cargado…». Esto mejora la legibilidad sin alterar el sentido.'
  - severity: medium
