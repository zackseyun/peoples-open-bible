revisions:
- from: Pero en cuanto a mí[a], mis pies casi se apartaron; mis pasos casi resbalaron.
  to: Pero en cuanto a mí[a], mis pies casi tropezaron; mis pasos por poco resbalaron.
  rationale: Se reemplaza «se apartaron» por «tropezaron» para ajustarse mejor al hebreo en contexto y a la revisión auditada del POB inglés, que favorece la idea de tambaleo/tropiezo sobre la de desviación. También se actualiza la nota para conservar una alternativa legítima y vigente, y se mejora la naturalidad de la segunda cola con «por poco» sin cambiar el sentido.
