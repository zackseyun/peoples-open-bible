translation:
  language: es
  text: Dios de los ejércitos, por favor, vuelve; mira desde el cielo y ve, y visita[a] esta vid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atiende a esta vid». El verbo hebreo puede significar «visitar», «atender a», «cuidar de» o «inspeccionar»; aquí la idea es intervenir para su bienestar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים צְבָאוֹת
  english_pob_choice: God of hosts
  chosen_spanish: Dios de los ejércitos
  alternatives_spanish:
  - Dios de los ejércitos celestiales
  - Dios de las huestes
  lexicon: HALOT
  rationale: La construcción titulada dirige la oración a Dios como soberano de las huestes. En español, «ejércitos» comunica mejor que «huestes» el alcance militar/cósmico del hebreo y mantiene la transparencia del título sin pasar a un equivalente más interpretativo como «Todopoderoso».
- source_word: שׁוּב נָא
  english_pob_choice: please return
  chosen_spanish: por favor vuelve
  alternatives_spanish:
  - por favor, vuelve
  - vuelve, por favor
  - te rogamos que vuelvas
  lexicon: HALOT
  rationale: שׁוּב expresa la idea de volver/retornar; el español imperativo «vuelve» preserva el valor directo de la súplica. «Por favor» refleja היטב נָא como ruego cortés y mantiene el tono de lamentación.
- source_word: הַבֵּט מִשָּׁמַיִם
  english_pob_choice: look down from heaven
  chosen_spanish: mira desde el cielo
  alternatives_spanish:
  - mira desde los cielos
  - mira hacia abajo desde el cielo
  - haz una mirada desde el cielo
  lexicon: HALOT
  rationale: הַבֵּט es un mirar atento; en español, «mira desde el cielo» conserva el gesto de observación desde la esfera celestial sin añadir de manera innecesaria el adverbio «abajo», que ya está implícito en el movimiento pedido por el contexto.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y ve
  alternatives_spanish:
  - y mira
  - y contempla
  lexicon: HALOT
  rationale: El imperativo simple de ראה se expresa con naturalidad como «ve» en la secuencia poética «mira… y ve». Se evita sobrecargar el paralelismo con una paráfrasis más explicativa.
- source_word: וּפְקֹד
  english_pob_choice: and visit this vine
  chosen_spanish: y visita esta vid
  alternatives_spanish:
  - y atiende a esta vid
  - y cuida de esta vid
  - y haz una visita a esta vid
  lexicon: HALOT
  rationale: 'פקד tiene un campo semántico amplio: visitar, atender, inspeccionar, intervenir en favor de. Dado el ajuste del auditorial inglés a «visit», «visita» reproduce con fidelidad la forma verbal y, en este contexto de súplica por bienestar, permite la idea de intervención favorable sin perder la literalidad poética.'
- source_word: גֶּפֶן זֹאת
  english_pob_choice: this vine
  chosen_spanish: esta vid
  alternatives_spanish:
  - esta parra
  - esta planta de vid
  lexicon: HALOT
  rationale: גפן es singular y metafórica; «vid» es el equivalente más sobrio y exacto en español bíblico para conservar la imagen de Israel como planta cultivada, sin convertirla en «viñedo».
theological_decisions:
- issue: Título divino צְבָאוֹת
  english_pob_reading: God of hosts
  chosen_spanish_reading: Dios de los ejércitos
  alternative_spanish_readings:
  - Dios Todopoderoso
  - Dios de las huestes
  rationale: Se preserva la imagen de dominio sobre las huestes/ejércitos celestiales. «Todopoderoso» suaviza o sustituye el contenido imagético del título y no refleja tan directamente la base léxica del hebreo.
  doctrine_reference: Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión auditada en inglés, que pasó de «attend to» a «visit» para reflejar más directamente וּפְקֹד. En español se mantuvo ese ajuste con «visita», conservando el paralelismo imperativo y el tono de súplica.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים y no una sustitución por «SEÑOR», conforme al criterio POB de transparencia.
  - Se eligió «ejércitos» para צְבָאוֹת por su valor imagético y su equivalencia tradicional pero no deformante en español.
  - «vid» se mantuvo en singular para respetar la metáfora del hebreo, no «viñedo».
  - La nota al pie preserva la ambigüedad semántica de פקד sin eliminar la opción de «visitar/atender/cuidar» que el texto permite.
