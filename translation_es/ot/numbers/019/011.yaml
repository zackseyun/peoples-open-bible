  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: una formulación legal general sobre quien toca un muerto humano y queda ritualmente impuro durante siete días. Sin embargo, ''de una persona'' debilita el alcance distributivo de לְכָל נֶפֶשׁ אָדָם (''de cualquier persona/ser humano''), y conviene ajustarlo para preservar mejor el énfasis de totalidad.'
  spanish_quality_summary: El español es claro y natural. 'Cualquiera que toque' y 'quedará impuro' funcionan bien en registro bíblico moderno. No obstante, 'de una persona' suena menos preciso que 'de cualquier persona', y 'por siete días' puede afinarse a 'durante siete días' para expresar duración con mayor naturalidad en este contexto legal.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la distinción genérica de אָדָם, que debe mantenerse como referente humano no masculino. 'Persona' es adecuado, pero aquí debe ir con cuantificador inclusivo ('cualquier'). El resto de las decisiones terminológicas son compatibles con el proyecto.
  issues:
