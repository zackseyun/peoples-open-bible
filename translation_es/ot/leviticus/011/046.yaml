review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea y la mayoría de las decisiones del POB inglés: «ley», «ganado», «aves», «ser viviente», «en las aguas» y «sobre la tierra» reflejan adecuadamente תּוֹרַת, הַבְּהֵמָה, הָעוֹף, נֶפֶשׁ הַחַיָּה, בַּמָּיִם y עַל הָאָרֶץ. Sin embargo, hay una desviación significativa en הַשֹּׁרֶצֶת, donde el inglés auditado escogió «that swarms» y el hebreo שׁרץ expresa pulular/enjambrear/infestar más que simplemente arrastrarse. «Que se arrastra» acerca indebidamente este término a רמש del miembro anterior y borra el contraste léxico del original.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico moderno. La frase fluye bien y las notas están formuladas con claridad. El único problema relevante de calidad es léxico: «que se arrastra» no es la mejor opción en español para שׁרץ aquí, porque suena demasiado restringido a reptiles o movimiento rastrero y reduce la distinción con «que se mueve» antes. Una reparación breve produce un texto más fiel sin perder legibilidad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto (no aparecen Yahvé, Mesías, δοῦλος, etc.). Las decisiones principales concuerdan con el rastro del POB. La excepción es שׁרץ, donde conviene alinear mejor con la rationale inglesa mediante «que pulula» o equivalente; «pulula» conserva mejor la idea de abundancia/movimiento de seres pequeños.
  issues:
  - severity: medium
    issue: הַשֹּׁרֶצֶת fue traducido como «que se arrastra».
    rationale: El hebreo שׁרץ y la decisión inglesa «that swarms» apuntan a criaturas que pululan o se multiplican/mueven en enjambre. «Arrastrarse» introduce un matiz más estrecho y además confunde el contraste con רמש («que se mueve») en la cláusula anterior.
  - severity: low
    issue: La nota c añade «en la tierra» como alternativa para עַל הָאָרֶץ.
    rationale: No es grave, pero «en la tierra» cambia la preposición más de lo necesario. Las alternativas más ceñidas serían «sobre la tierra» / «sobre el suelo» / quizá «sobre la tierra firme». Puede mantenerse una nota más ajustada al hebreo y al POB inglés.
  revised_spanish_text: Esta es la ley acerca[a] del ganado, de las aves, de todo ser viviente[b] que se mueve en las aguas, y de todo ser que pulula sobre la tierra[c].
  revised_footnotes:
