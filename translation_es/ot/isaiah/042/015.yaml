translation:
  language: es
  text: Arrasaré montes y colinas, y secaré toda su vegetación; convertiré los ríos en islas[a], y secaré los estanques.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «costas marítimas»; el término hebreo puede designar islas o tierras litorales.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרִיב
  english_pob_choice: I will lay waste
  chosen_spanish: Arrasaré
  alternatives_spanish:
  - devastaré
  - destruiré
  lexicon: HALOT
  rationale: El hifil de חרב comunica causar desolación o ruina. «Arrasaré» conserva la fuerza causativa y el tono profético de juicio sin exagerar hacia aniquilación total.
- source_word: הָרִים
  english_pob_choice: mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  lexicon: HALOT
  rationale: «Hills/mountains» en español puede expresarse naturalmente con «montes y colinas»; «montes» conserva la elevación del paisaje y evita una repetición demasiado rígida.
- source_word: וּגְבָעוֹת
  english_pob_choice: and hills
  chosen_spanish: y colinas
  alternatives_spanish:
  - y cerros
  - y alturas
  lexicon: HALOT
  rationale: גבעות denota colinas; «colinas» es el equivalente directo y claro en español. Se evita «alturas» porque podría sugerir un sentido cultual no indicado aquí.
- source_word: וְכָל עֶשְׂבָּם
  english_pob_choice: and all their vegetation
  chosen_spanish: y toda su vegetación
  alternatives_spanish:
  - y toda su hierba
  - y toda su yerba
  - y toda su herbaje
  lexicon: HALOT
  rationale: עֶשֶׂב puede abarcar hierba, plantas o vegetación. Como el sufijo se refiere conjuntamente a montes y colinas, «vegetación» captura mejor todo el crecimiento vegetal sin estrechar el sentido.
- source_word: אוֹבִישׁ
  english_pob_choice: I will dry up
  chosen_spanish: secaré
  alternatives_spanish:
  - haré secar
  - agotaré
  lexicon: HALOT
  rationale: 'El hifil de יבש es causativo: hacer seco. «Secaré» funciona bien para vegetación y aguas, y mantiene la repetición retórica del versículo.'
- source_word: וְשַׂמְתִּי
  english_pob_choice: I will turn
  chosen_spanish: convertiré
  alternatives_spanish:
  - pondré
  - haré
  lexicon: HALOT
  rationale: שׂים significa poner/colocar/hacer. Con un objeto y un complemento predicativo, «convertiré» expresa de manera idiomática el cambio resultante («ríos en islas») y preserva el sentido transformador.
- source_word: נְהָרוֹת
  english_pob_choice: rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - corrientes
  - arroyos
  lexicon: HALOT
  rationale: נְהָרוֹת significa normalmente ríos; no hay razón contextual para rebajarlo a un término más débil.
- source_word: לָאִיִּים
  english_pob_choice: into islands
  chosen_spanish: en islas
  alternatives_spanish:
  - en costas
  - en tierra seca
  lexicon: HALOT
  rationale: אִיִּים puede significar islas o tierras marítimas. El paralelo con el secado de las aguas favorece la imagen concreta de islas; se conserva la alternativa semántica en nota.
- source_word: וַאֲגַמִּים
  english_pob_choice: and pools
  chosen_spanish: los estanques
  alternatives_spanish:
  - las lagunas
  - los pantanos
  lexicon: HALOT
  rationale: אגמים se refiere a aguas estancadas, estanques o charcas. «Estanques» es breve y natural en español; «lagunas» o «pantanos» podrían cargar matices más específicos que el hebreo no exige.
- source_word: אוֹבִישׁ
  english_pob_choice: I will dry up
  chosen_spanish: secaré
  alternatives_spanish:
  - haré secar
  lexicon: HALOT
  rationale: Se mantiene el mismo verbo español para conservar la repetición y el paralelismo del original.
theological_decisions:
- issue: Imagen de juicio divino sobre la creación
  english_pob_reading: Render the verse as a declaration of the LORD's power to desolate terrain and waters without softening the imagery into mere metaphor.
  chosen_spanish_reading: Presentar el versículo como una declaración del poder de Yahvé para arrasar el terreno y las aguas, sin suavizar la imagen ni resolverla como mera metáfora.
  alternative_spanish_readings:
  - Leerlo principalmente como lenguaje figurado sobre quitar obstáculos
  - Reducirlo a una hipérbole poética sin referencia concreta
  rationale: El hebreo usa imágenes concretas del mundo natural. Aunque el contexto más amplio pueda admitir implicaciones figuradas, la traducción debe conservar la fuerza literal de la imagen y no decidir si es exclusivamente metafórica o también histórica/cósmica.
  doctrine_reference: 'Principio de la POB: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó repeticiones innecesarias de «I will» antes del segundo y cuarto verbos para lograr mayor naturalidad sin cambiar el sentido. La versión española sigue ese mismo criterio, manteniendo el paralelismo y la repetición verbal donde aporta énfasis.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la norma del proyecto.
  - 'Se conserva el paralelismo verbal con tres acciones principales en español: arrasar, secar, convertir/secar.'
  - «Islas» queda anclado con nota porque el hebreo admite también «costas marítimas», y esa ambigüedad debe permanecer visible.
