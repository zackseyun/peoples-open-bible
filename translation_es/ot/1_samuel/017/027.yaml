  glossary_alignment: 'No hay términos teológicos sensibles aquí. La revisión propuesta mantiene las decisiones léxicas del POB: conservar «palabra» en כַּדָּבָר הַזֶּה, mantener la pasiva en כֹּה יֵעָשֶׂה, y evitar especificar «matar» en יַכֶּנּוּ dentro del texto principal, dejando la alternativa en nota.'
