review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro inglés en la estructura general: el padre consumido por el duelo, la hechura de una imagen, la honra del difunto como a un dios y la transmisión de prácticas cultuales a sus subordinados. Sin embargo, hay dos desajustes importantes con la evidencia fuente y con las decisiones auditadas: τέκνου se volvió ''hijo'' en lugar de ''hijo/hija'' genérico (''hijo'' restringe indebidamente el sexo), y παρέδωκεν se tradujo ''entregó'', que pierde el matiz de transmisión/tradición de ''handed down''. Además, ''dolor prematuro'' suena menos natural en español que una formulación que haga explícito que el duelo fue ''antes de tiempo''.'
  spanish_quality_summary: 'El texto es legible, pero algunas elecciones suenan poco idiomáticas o demasiado calcadas: ''dolor prematuro'' es extraño en español, y ''rápidamente arrebatado'' resulta rígido. Una redacción como ''consumido por un dolor antes de tiempo por el niño[a] arrebatado tan pronto'' o mejor ''por el niño arrebatado demasiado pronto'' comunica el sentido con mayor naturalidad. También conviene evitar ''entregó misterios y ritos'' en favor de ''transmitió'' o ''legó'', que encaja mejor con prácticas religiosas heredadas.'
  glossary_alignment: 'No hay conflicto con términos teológicos mayores del glosario del proyecto. ''como a un dios'' respeta bien θεός en contexto idolátrico. ''Misterios y ritos'' también coincide con la decisión inglesa y con la nota cultural. El principal problema terminológico es τέκνον: el borrador se aparta de la decisión auditada ''child'' al elegir ''hijo'' sin justificación suficiente.'
  issues:
  - severity: high
    issue: τέκνου se tradujo como 'hijo'
    rationale: El griego τέκνον es no específico en cuanto al sexo. La auditoría inglesa eligió explícitamente 'child' y rechazó 'son'. En español, 'niño', 'hijo/a' o 'criatura' según contexto preservan mejor la genericidad; 'hijo' añade información no presente.
  - severity: medium
    issue: παρέδωκεν se tradujo como 'entregó'
    rationale: El verbo aquí tiene el sentido de transmitir o legar prácticas cultuales a quienes estaban bajo su autoridad. 'Entregó' puede sonar a simple cesión momentánea y no conserva bien el matiz de tradición heredada reflejado por 'handed down'.
  - severity: medium
    issue: ἀώρῳ πένθει quedó como 'dolor prematuro'
    rationale: Aunque semánticamente aproximado, en español 'dolor prematuro' no es una colocación natural. El sentido es duelo/luto causado por una muerte antes de tiempo. 'Consumido por un dolor antes de tiempo' o 'por un duelo prematuro' suenan mejor; 'dolor por la muerte prematura...' también sería posible.
  - severity: low
    issue: '''rápidamente arrebatado'' suena rígido'
    rationale: La nota inglesa aclara que el énfasis es en ser quitado antes de tiempo. En español, 'arrebatado demasiado pronto' o 'quitado tan pronto' suena más natural que el adverbio literal 'rápidamente'.
  revised_spanish_text: Porque un padre, consumido por el dolor de su niño[a] arrebatado demasiado pronto, hizo una imagen del que entonces estaba muerto, y ahora lo honró como a un dios, y transmitió misterios y ritos a los que estaban bajo su autoridad[b];
  revised_footnotes:
  - marker: a
    text: O 'quitado tan pronto' o 'arrebatado de repente'. El griego destaca que el niño fue removido antes de tiempo.
    reason: lexical_alternative
  - marker: b
    text: '''Misterios y ritos'' se refiere a observancias religiosas secretas o iniciáticas asociadas con prácticas de culto.'
    reason: cultural_note
  revision_rationale: Se corrigió 'hijo' a 'niño' para respetar la falta de especificación de τέκνον; se sustituyó 'entregó' por 'transmitió' para reflejar mejor παρέδωκεν como transmisión de tradición cultual; y se rehízo el inicio para evitar la expresión poco natural 'dolor prematuro', preservando el sentido de duelo por una pérdida antes de tiempo. También se suavizó 'rápidamente arrebatado' a 'arrebatado demasiado pronto' para un español más natural y fiel al matiz contextual.
