revisions:
- from: Ahora bien, cuando Jeroboam hijo de Nebat oyó de ello[a]—mientras todavía estaba en Egipto[b], adonde había huido de delante del rey Salomón—Jeroboam seguía viviendo en Egipto.
  to: Ahora bien, cuando Jeroboam hijo de Nebat oyó de eso[a]—mientras todavía estaba en Egipto, adonde había huido del rey Salomón[b]—Jeroboam seguía viviendo en Egipto.
  rationale: 'Se hicieron dos reparaciones menores para mejorar la fidelidad idiomática del español sin perder el sentido fuente ni el razonamiento documentado: ''oyó de ello'' se cambió a ''oyó de eso'', y la formulación demasiado calcada ''de delante del rey Salomón'' se suavizó en el texto principal, conservando su matiz en una nota.'
  reviewer_model: gpt-5.4
