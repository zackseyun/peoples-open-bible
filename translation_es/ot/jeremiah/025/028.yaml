review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo en la estructura condicional, la imagen de «la copa», la fórmula profética y el nombre divino «Yahvé». Sin embargo, el verbo final שָׁתוֹ תִשְׁתּוּ es segunda persona plural («ustedes beberán») y no tercera persona («beberán» sin sujeto explícito suficientemente claro). En español conviene explicitar «ustedes» o usar una forma que mantenga inequívocamente la segunda persona. Además, la nota al pie actual repite exactamente el texto principal en vez de ofrecer la alternativa documentada en inglés.
  spanish_quality_summary: El español es claro y digno. «Y si ellos rehúsan» suena algo rígido pero aceptable; «entonces les dirás» y «Así dice Yahvé de los ejércitos» son buenos. La principal reparación necesaria es la concordancia de persona en la cláusula final y el ajuste de la nota para que realmente preserve la alternativa léxica. También es más natural anclar la nota en la cláusula enfática final, no en «beber».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» para יהוה y «la copa» sin expansión interpretativa. «Yahvé de los ejércitos» es defendible y consistente con el expediente. No hay conflicto teológico relevante; el problema es gramatical y de fidelidad verbal.'
  issues:
  - severity: high
    issue: 'La cláusula final está en persona incorrecta: «Ciertamente beberán».'
    rationale: 'El hebreo תִשְׁתּוּ es segunda persona plural, dirigida a los destinatarios: «ustedes ciertamente beberán». La forma española actual puede leerse como tercera persona plural y pierde la confrontación directa del original.'
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real.
    rationale: 'La nota dice «O: “Ciertamente beberán”», que repite el texto principal. El expediente inglés preserva una alternativa del tipo «Seguramente/ciertamente beberán» o una explicación del énfasis; la nota debe reflejar una variante genuina.'
  - severity: low
    issue: La ubicación del ancla de nota es poco natural.
    rationale: El fenómeno explicado por la nota pertenece a la cláusula enfática final («ciertamente beberán»), no al infinitivo «para beber» anterior.
  revised_spanish_text: 'Y si ellos rehúsan tomar la copa de tu mano para beber, entonces les dirás: «Así dice Yahvé de los ejércitos: Ustedes ciertamente beberán[a]».'
  revised_footnotes:
  - marker: a
    text: 'O: «Ustedes seguramente beberán». El hebreo usa un infinitivo absoluto con un verbo finito para intensificar la certeza.'
    reason: lexical_alternative
