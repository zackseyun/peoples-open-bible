  language: en
  yaml_path: translation/ot/jeremiah/023/015.yaml
  text: 'Therefore this is what Yahweh of Armies says concerning the prophets: ‘Look[a], I am feeding them wormwood and making them drink poisoned water, because from the prophets of Jerusalem ungodliness has gone out into all the land.’'
  footnotes:
