translation:
  language: es
  text: De Salomón[a]. Oh, Dios, da tus juicios al rey, y tu rectitud[b] al hijo del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Para Salomón» o «A Salomón» en la superscripción.
    reason: alternative_reading
  - marker: b
    text: «Rectitud» también puede traducirse «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁלֹמֹה
  english_pob_choice: Of Solomon
  chosen_spanish: De Salomón
  alternatives_spanish:
  - Para Salomón
  - A Salomón
  lexicon: HALOT
  rationale: El ל inicial en un encabezado de salmo puede expresar relación, dedicación o autoría. «De Salomón» conserva esa ambigüedad de modo natural en español y funciona bien como superscripción breve.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: Oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí el sustantivo está en vocativo; en español conviene marcar la invocación con «Oh Dios» para reflejar la dirección de la oración.
- source_word: מִשְׁפָּטֶיךָ
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tu justicia
  - tus decisiones judiciales
  - tus decretos
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar juicio, decisión judicial y justicia. En este contexto real y oracional, «juicios» mantiene el plural concreto y el matiz de decisiones judiciales concedidas al rey.
- source_word: לְמֶלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - para el rey
  - al monarca
  lexicon: HALOT
  rationale: La preposición expresa destinatario; «al rey» es la forma más directa y natural en español.
- source_word: תֵּן
  english_pob_choice: give
  chosen_spanish: da
  alternatives_spanish:
  - concede
  - otorga
  lexicon: HALOT
  rationale: El imperativo simple «da» corresponde con precisión a la petición dirigida a Dios, sin añadir solemnidad no requerida por el hebreo.
- source_word: וְצִדְקָתְךָ
  english_pob_choice: and your righteousness
  chosen_spanish: y tu justicia
  alternatives_spanish:
  - y tu rectitud
  - y tu justicia/righteousness
  lexicon: HALOT
  rationale: צִדְקָה admite «justicia» o «rectitud». Dado que la POB inglesa preserva la alternativa lexical, en español «justicia» comunica bien el campo moral-jurídico sin perder la posibilidad de «rectitud».
- source_word: לְבֶן מֶלֶךְ
  english_pob_choice: to the king’s son
  chosen_spanish: al hijo del rey
  alternatives_spanish:
  - al hijo real
  - al hijo del monarca
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de modo literal y claro. «Hijo del rey» conserva la referencia dinástica sin decidir si el título apunta al heredero inmediato o al rey en lenguaje dinástico.
theological_decisions:
- issue: Identidad de «el rey» y «el hijo del rey»
  english_pob_reading: Retain the royal prayer in its immediate historical sense without making an explicit messianic identification in the main text.
  chosen_spanish_reading: Mantener la oración real en su sentido histórico inmediato, sin identificar explícitamente al rey como Mesías en el texto principal.
  alternative_spanish_readings:
  - Una lectura mesiánica explícita
  - Una lectura exclusivamente salomónica
  rationale: El versículo conserva una tensión legítima entre el marco salomónico/dinástico y una proyección ideal-escatológica. La traducción debe dejar esa tensión abierta en vez de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue el estado de revisión más reciente sin cambios sustanciales; se conserva la decisión de mantener la ambigüedad del encabezado y la tensión entre «juicios» y «justicia»/«rectitud».
  spanish_consistency_notes:
  - Se usa «Dios» en vocativo con «Oh» para naturalidad litúrgica sin perder la dirección de la oración.
  - Se evita «SEÑOR» porque el hebreo aquí dice אֱלֹהִים y no el Tetragrámaton.
  - Se mantiene «rey» y «hijo del rey» sin ampliar a «Mesías» para respetar la cautela interpretativa del POB inglés.
  - Se prefiere «justicia» como término principal y se deja la alternativa «rectitud» en nota, en continuidad con la decisión léxica inglesa.
