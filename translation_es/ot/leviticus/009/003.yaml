translation:
  language: es
  text: 'Y a los hijos de Israel hablarás, diciendo: ‘Tomen un macho cabrío como ofrenda por el pecado[a], y un becerro y un cordero, ambos de un año, sin defecto, para holocausto.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrenda de purificación' para el hebreo חַטָּאת en contextos sacrificiales sacerdotales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  english_pob_choice: And to
  chosen_spanish: Y a
  alternatives_spanish:
  - Entonces a
  - Y hacia
  lexicon: HALOT
  rationale: La preposición más natural en español para introducir la instrucción dirigida al grupo es 'a'. Se conserva el enlace con el contexto previo mediante 'Y', sin añadir una secuencia temporal que el hebreo no exige.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los niños de Israel
  - los israelitas
  lexicon: HALOT
  rationale: '''Hijos'' reproduce de forma transparente el plural constructo masculino y mantiene la forma fuente sin neutralizarla. ''Israelitas'' sería más idiomático, pero menos transparente respecto del hebreo.'
- source_word: תְּדַבֵּר
  english_pob_choice: you shall speak
  chosen_spanish: hablarás
  alternatives_spanish:
  - deberás hablar
  - hablarás tú
  lexicon: HALOT
  rationale: 'El imperfecto con valor exhortativo/instructivo se expresa naturalmente en español con futuro: ''hablarás''. Evita una perífrasis más pesada y conserva el mandato dirigido a Moisés.'
- source_word: לֵ/אמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - así diciendo
  - y dirás
  lexicon: HALOT
  rationale: El infinitivo de cita se vierte con 'diciendo', la equivalencia más directa y sobria en español.
- source_word: קְח֤וּ
  english_pob_choice: Take
  chosen_spanish: Tomad
  alternatives_spanish:
  - Tomen
  - Lleven
  lexicon: HALOT
  rationale: El imperativo plural se traduce con 'Tomad' para mantener el mandato directo del hebreo. Se conserva el matiz de tomar/obtener sin añadir la idea de traslado implícita en 'lleven'.
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: a male goat
  chosen_spanish: un macho cabrío
  alternatives_spanish:
  - un cabrío
  - un macho de las cabras
  lexicon: HALOT
  rationale: '''Macho cabrío'' expresa bien la especificación sexual del sustantivo y es una forma clara en español bíblico contemporáneo. Evita ambigüedad frente a un simple ''cabro'' o ''cabra''.'
- source_word: לְ/חַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación[a]
  alternatives_spanish:
  - como ofrenda por el pecado
  - para ofrenda por el pecado
  lexicon: HALOT
  rationale: En este contexto sacrificial, חטאת puede referir al rito/ofrenda de purificación más que al pecado abstracto. Se mantiene la tensión lexical que el POB documenta entre 'sin offering' y 'purification offering' mediante una nota, mientras el texto principal usa 'expiación' para evitar una fórmula demasiado estrecha en español.
- source_word: וְ/עֵ֨גֶל
  english_pob_choice: and a calf
  chosen_spanish: y un becerro
  alternatives_spanish:
  - y un ternero
  - y un novillo joven
  lexicon: HALOT
  rationale: '''Becerro'' es un equivalente natural y tradicional para עגל en contexto sacrificial, más estable en español que ''ternero'' y menos interpretativo que ''novillo joven''.'
- source_word: וָ/כֶ֧בֶשׂ
  english_pob_choice: and a lamb
  chosen_spanish: y un cordero
  alternatives_spanish:
  - y una oveja
  - y un borrego
  lexicon: HALOT
  rationale: כֶּבֶשׂ se refiere aquí al animal joven adecuado para sacrificio; 'cordero' es la equivalencia más clara y precisa en español.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: each a year old
  chosen_spanish: ambos de un año
  alternatives_spanish:
  - cada uno de un año
  - de un año cada uno
  lexicon: HALOT
  rationale: La expresión distributiva se aplica al becerro y al cordero. 'Ambos de un año' suena natural en español y comunica la edad requerida sin perder el valor distributivo.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - íntegros
  lexicon: HALOT
  rationale: '''Sin defecto'' comunica de forma clara la ausencia de imperfección física exigida para el sacrificio. Es una expresión estándar y fiel al contexto cultual.'
- source_word: לְ/עֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para ofrenda quemada
  lexicon: HALOT
  rationale: '''Holocausto'' es el equivalente bíblico tradicional en español para la ofrenda totalmente consumida por el fuego. Aunque ''ofrenda quemada'' sería más descriptiva, ''holocausto'' es la forma consagrada y clara para este contexto.'
theological_decisions:
- issue: חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: para expiación
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de purificación
  rationale: El POB deja abierta la posibilidad de 'purification offering' porque חטאת en textos sacerdotales puede enfatizar la purificación ritual. En español, 'expiación' permite evitar restringirlo solo al pecado subjetivo y mantiene una formulación suficientemente amplia para la función cultual del rito, mientras la nota preserva la alternativa lexical documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: Bְּנֵי יִשְׂרָאֵל como designación corporativa
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos/descendientes de Israel
  rationale: Se conserva la forma masculina plural del hebreo, siguiendo la política de transparencia y precisión morfológica del proyecto. No se neutraliza a 'israelitas' en el texto principal porque la fuente específica usa una construcción masculina plural.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El contexto auditado del POB en inglés muestra acuerdo alto y sin revisiones aplicadas; por eso la redacción española sigue de cerca las decisiones léxicas principales, pero ajusta 'sin ofender' a un español litúrgico claro y evita calcos innecesarios. Se mantiene la nota sobre חטאת para conservar la tensión lexical documentada entre 'sin offering' y 'purification offering'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conservan formas bíblicas claras y tradicionales cuando son la equivalencia más fiel ('holocausto', 'hijos de Israel').
  - El marcador de nota [a] aparece en el texto principal junto a la decisión léxica sobre חטאת.
