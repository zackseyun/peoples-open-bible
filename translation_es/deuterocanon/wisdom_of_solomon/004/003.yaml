revisions:
- from: Pero la numerosa descendencia de los impíos no servirá de nada[a], y de injertos espurios[b] no echará raíz en lo profundo, ni establecerá una base firme.
  to: Pero la numerosa descendencia de los impíos no servirá de nada, y de retoños ilegítimos[a] no echarán raíces en lo profundo[b], ni establecerán una base firme.
  rationale: Se revisa «injertos espurios» a «retoños ilegítimos» para alinearse mejor con μοσχεύματα como brotes/retoños dentro de la metáfora vegetal y con la decisión auditada del POB. Se pasan a plural los verbos de la segunda mitad para reflejar con mayor claridad el sujeto metafórico implícito. Se ajustan las notas para conservar las alternativas significativas y la literalidad del giro sobre la raíz en profundidad.
