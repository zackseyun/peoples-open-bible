review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia narrativa, la autoidentificación enfática y la distinción de אדון como superior humano. Sin embargo, «Yo soy» en español queda incompleto y puede evocar otras resonancias no pretendidas; el hebreo exige una autoidentificación natural, mejor expresada como «Soy yo» o «Yo soy él».
  spanish_quality_summary: El texto es mayormente claro y digno, pero «Yo soy» suena poco idiomático en este contexto. «Dile a tu amo» es comprensible, aunque «di a tu amo» seguiría más de cerca la estructura hebrea; no obstante, «dile a tu amo» es español natural y aceptable. La puntuación y el registro son buenos.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. La distinción entre título humano y divino se preserva bien con «amo». El nombre «Elías» es correcto. La principal corrección es idiomática y semántica en la autoidentificación de אָ֑נִי.
  issues:
  - severity: high
    issue: «Yo soy» no transmite naturalmente la autoidentificación de אָ֑נִי
    rationale: En español, «Yo soy» sin predicado suena truncado y puede sugerir una formulación teológica o existencial ajena al contexto. El inglés auditado ya nota que el pronombre funciona como autoidentificación; en español, «Soy yo» lo expresa con fidelidad y naturalidad.
  - severity: low
    issue: Ligera desviación de «say» a «dile»
    rationale: El hebreo tiene dos imperativos, «ve» y «di/di a». «Dile a tu amo» es una adaptación idiomática válida en español y no distorsiona el sentido, por lo que no requiere cambio obligatorio.
  revised_spanish_text: 'Y él le dijo[a]: «Soy yo. Ve y dile a tu amo: “Mira, Elías está aquí”».'
  revised_footnotes:
