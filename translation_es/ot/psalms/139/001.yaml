review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del sobrescrito hebreo y mantiene correctamente «Yahvé» para יְהוָה. También preserva la ambigüedad de לְדָוִד con «De David» y la nota correspondiente. Sin embargo, hay dos ajustes necesarios: (1) la nota [a] no ofrece una alternativa real, porque repite exactamente la lectura principal en vez de la alternativa documentada «Al director del coro»; (2) «me has examinado» es aceptable, pero «me has escudriñado» representa mejor la fuerza poética y más penetrante de חקר en este salmo.'
  spanish_quality_summary: 'El español es claro y digno, pero puede afinarse para mayor naturalidad bíblica y precisión semántica. «Salmo» funciona en sobrescrito. «Yahvé, tú me has…» es gramatical, aunque el pronombre explícito no es necesario. La mejora principal es léxica: «escudriñado» encaja mejor en registro bíblico culto que «examinado» y conserva la intensidad del original.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente. No hay conflicto con otros términos glosario. La revisión propuesta fortalece la fidelidad léxica de חקר sin alterar el resto.'
  issues:
  - severity: medium
    issue: La nota [a] repite la lectura principal en lugar de dar una alternativa real.
    rationale: El texto principal ya dice «Para el director del coro», pero la nota dice «O «Para el director del coro»». Según el rastro inglés, la alternativa es «To the choirmaster», que en español debe reflejarse como «Al director del coro» o equivalente.
  - severity: medium
    issue: «me has examinado» atenúa la fuerza de חֲקַרְתַּנִי.
    rationale: Aunque «examinar» es posible, חקר en este contexto poético expresa sondeo profundo o escudriñamiento. «Me has escudriñado» suena natural en español bíblico moderno y preserva mejor la intensidad semántica documentada por el POB.
  - severity: low
    issue: El pronombre «tú» es innecesario.
    rationale: En español, la forma verbal ya marca la segunda persona. Omitir «tú» mejora la fluidez sin pérdida de sentido ni énfasis obligatorio en el hebreo.
  revised_spanish_text: Para el director del coro[a]. De David[b]. Salmo. Yahvé, me has escudriñado y me has conocido.
