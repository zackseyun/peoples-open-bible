translation:
  language: es
  text: David tomó los escudos de oro que llevaban los siervos de Hadadezer y los llevó a Jerusalén[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escudos dorados»; el hebreo puede referirse a escudos recubiertos de oro.
    reason: lexical_alternative
  - marker: b
    text: «Siervos» aquí probablemente significa retenedores reales o asistentes militares de Hadadezer, no necesariamente esclavos domésticos en el sentido moderno restringido.
    reason: cultural_note
  - marker: c
    text: Algunas tradiciones textuales y el paralelo de 2 Samuel escriben el nombre «Hadarezer».
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - se apoderó de
  lexicon: HALOT
  rationale: Tomó conserva el sentido narrativo básico de לקח sin forzar un matiz más interpretativo que el hebreo no exige por sí solo.
- source_word: שִׁלְטֵי הַזָּהָב
  english_pob_choice: the shields of gold
  chosen_spanish: los escudos de oro
  alternatives_spanish:
  - los escudos dorados
  - los escudos de oro recubierto
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «escudos de oro / de el oro». «Escudos de oro» mantiene el sustantivo principal y la relación material sin imponer una paráfrasis.
- source_word: אֲשֶׁר הָיוּ עַל
  english_pob_choice: that were on
  chosen_spanish: que estaban sobre
  alternatives_spanish:
  - que estaban en
  - que pertenecían a
  lexicon: HALOT
  rationale: «Que estaban sobre» reproduce con naturalidad la imagen del hebreo y evita decidir de antemano si los escudos iban puestos, transportados o asociados a los hombres.
- source_word: עַבְדֵי הֲדַדְעָזֶר
  english_pob_choice: the servants of Hadadezer
  chosen_spanish: los servidores de Hadadezer
  alternatives_spanish:
  - los siervos de Hadadezer
  - los oficiales de Hadadezer
  - los hombres de Hadadezer
  lexicon: HALOT
  rationale: «Servidores» comunica en español la idea de dependientes o asistentes de una corte militar sin la carga moderna de «esclavos»; el contexto permite una referencia amplia a retenedores o acompañantes del rey.
- source_word: הֲדַדְעָזֶר
  english_pob_choice: Hadadezer
  chosen_spanish: Hadadezer
  alternatives_spanish:
  - Hadarezer
  lexicon: textual tradition
  rationale: Se conserva la forma masorética del versículo. La variante «Hadarezer» queda documentada en nota por el paralelo textual.
- source_word: וַיְבִיאֵם יְרוּשָׁלִָם
  english_pob_choice: and brought them to Jerusalem
  chosen_spanish: y los llevó a Jerusalén
  alternatives_spanish:
  - y los trajo a Jerusalén
  lexicon: HALOT
  rationale: «Llevó» es un equivalente idiomático de הביא en español y representa bien el movimiento dirigido hacia Jerusalén; el pronombre objeto plural «los» remite a los escudos.
theological_decisions:
- issue: Nombre divino ausente; uso de topónimo y nombres propios en contexto histórico-militar
  english_pob_reading: No theological footnote or doctrinal issue was required in the English POB record.
  chosen_spanish_reading: No se añade lectura teológica especial; el verso se traduce como relato histórico directo.
  alternative_spanish_readings:
  - Introducir una lectura moralizante del triunfo de David
  - Añadir equivalencias litúrgicas no presentes en el hebreo
  rationale: El texto hebreo es narrativo y no presenta aquí un término con carga doctrinal que requiera ampliación; conviene mantener el sentido histórico sin sobreinterpretación.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto inglés auditado permanece sin cambios en la última pasada. La versión española sigue esa lectura estable y conserva las tres notas críticas del original: alternativa léxica en los escudos, precisión cultural sobre «servidores» y variante textual del nombre propio.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero aquí no aparece el Tetragrámaton.
  - Se prefiere «escudos de oro» frente a «escudos dorados» para reflejar la construcción hebrea sin perder naturalidad.
  - «Servidores» evita el anacronismo de «esclavos» y, a la vez, no estrecha indebidamente el rango social del término.
  - «Llevar» se eligió por fluidez española; el sentido de traslado hacia Jerusalén queda claro en contexto.
