translation:
  language: es
  text: 'Y Saúl dijo[a]: «Los trajeron de entre los amalecitas, porque el pueblo preservó lo mejor de las ovejas y del ganado, para sacrificarlos a Yahvé tu Dios; pero el resto lo dedicamos a la destrucción».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo destruimos por completo». El hebreo usa una forma de חָרַם, término técnico para dedicar algo a la destrucción bajo el anatema.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר שָׁאוּל
  english_pob_choice: And Saul said
  chosen_spanish: Y Saúl dijo
  alternatives_spanish:
  - Saúl dijo
  - Entonces Saúl dijo
  lexicon: WLC / narrativa hebrea
  rationale: Se conserva la secuencia narrativa con una conjunción simple; el verbo en pasado directo suena natural en español y mantiene el valor de discurso reportado.
- source_word: מֵעֲמָלֵקִי
  english_pob_choice: from the Amalekites
  chosen_spanish: de los amalecitas
  alternatives_spanish:
  - de Amalec
  - de los de Amalec
  lexicon: HALOT
  rationale: La forma gentilicia apunta al pueblo, no solo al territorio. 'Amalecitas' es claro y mantiene el referente colectivo.
- source_word: חָמַל ... עַל
  english_pob_choice: spared
  chosen_spanish: perdonó
  alternatives_spanish:
  - se apiadó de
  - tuvo compasión de
  lexicon: HALOT
  rationale: En este contexto de guerra y destrucción ritual, el verbo expresa abstenerse de destruir. 'Perdonó' comunica bien la acción concreta en español, sin perder la idea de dejar con vida.
- source_word: מֵיטַב
  english_pob_choice: the best
  chosen_spanish: lo mejor
  alternatives_spanish:
  - lo más selecto
  - lo más fino
  lexicon: HALOT
  rationale: El constructo indica la porción superior o selecta. 'Lo mejor' es idiomático y suficientemente preciso.
- source_word: הַצֹּאן וְהַבָּקָר
  english_pob_choice: the sheep and the cattle
  chosen_spanish: de las ovejas y de los bueyes
  alternatives_spanish:
  - del rebaño y de la vacada
  - de las ovejas y del ganado vacuno
  lexicon: HALOT
  rationale: Los sustantivos específicos reproducen la distinción de animales sacrificables. 'Bueyes' sigue bien la categoría de ganado mayor en este contexto.
- source_word: לְמַעַן זְבֹחַ
  english_pob_choice: in order to sacrifice them
  chosen_spanish: para sacrificarlos
  alternatives_spanish:
  - con el fin de sacrificarlos
  - para ofrecerlos en sacrificio
  lexicon: HALOT
  rationale: לְמַעַן expresa finalidad; el infinitivo puede ser naturalizado en español sin añadir información extra. El objeto implícito se hace explícito con 'los'.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahvé Dios
  lexicon: 'Contested terms table: יְהוָה YHWH'
  rationale: 'Se sigue el estándar del proyecto: el Nombre divino se vierte como ''Yahvé'' en el texto principal, preservando el nombre del pacto y evitando el ocultamiento litúrgico.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios propio
  - el Dios de ti
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular conserva la distancia retórica con Samuel; 'tu Dios' es la forma natural y fiel en español.
- source_word: הַיּוֹתֵר
  english_pob_choice: the rest
  chosen_spanish: lo demás
  alternatives_spanish:
  - el resto
  - lo restante
  lexicon: HALOT
  rationale: Designa lo que quedó aparte de lo selecto que fue perdonado. 'Lo demás' mantiene el contraste sin sonar pesado.
- source_word: הֶחֱרַמְנוּ
  english_pob_choice: we devoted to destruction
  chosen_spanish: lo hemos dedicado a la destrucción
  alternatives_spanish:
  - lo hemos consignado al anatema
  - lo hemos destruido por completo
  lexicon: HALOT
  rationale: La raíz חרם tiene fuerza técnica de 'poner bajo el ban/anatema'. 'Dedicado a la destrucción' conserva la idea teológica sin depender de un tecnicismo oscuro en la línea principal.
theological_decisions:
- issue: Valor técnico de חרם en contexto de guerra santa/jucio
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: lo hemos dedicado a la destrucción
  alternative_spanish_readings:
  - lo hemos destruido por completo
  - lo hemos puesto bajo el anatema
  rationale: La frase debe preservar que no se trata solo de destrucción casual, sino de una acción vinculada al juicio divino y al uso técnico de חרם. La redacción elegida mantiene esa tensión y sigue siendo legible.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Forma del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama; en este proyecto se traduce como 'Yahvé' para preservar la identidad del Nombre del pacto y evitar la convención de sustitución.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto inglés confirma una traducción de alta concordancia sin cambios sustantivos en la revisión más reciente; se mantiene la decisión terminológica central sobre חרם y el nombre divino, ajustando el español para máxima naturalidad sin perder fuerza técnica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יהוה en todo el texto principal.
  - Se conserva el contraste entre 'lo mejor' y 'lo demás' para reflejar la selección parcial del botín.
  - '''Perdonó'' se usa aquí en sentido de abstenerse de destruir; en notas se preserva la alternativa técnica de חרם.'
  - La frase final evita suavizar חרם a un simple 'destruyeron', porque el contexto exige la noción de anatema o consagración a destrucción.
