translation:
  language: es
  text: Y yo vengo[a] a la presencia de Holofernes, el comandante en jefe de vuestras fuerzas, para anunciar palabras de verdad, y mostraré delante de él el camino por el cual irá y ganará dominio sobre toda la región montañosa, y no faltará de entre sus hombres ni una sola carne[b], ni un aliento de vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vengo» conserva el presente vivaz del griego κἀγὼ ἔρχομαι, como en el POB inglés «I am coming».
    reason: lexical_alternative
  - marker: b
    text: O «ni un solo cuerpo de sus hombres, ni un aliento de vida»; el griego dice literalmente «ni una sola carne», preservando una imagen corporal vívida.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ ἔρχομαι
  english_pob_choice: And I am coming
  chosen_spanish: Y yo vengo
  alternatives_spanish:
  - Y yo estoy viniendo
  - Y yo voy
  lexicon: LSJ
  rationale: El presente de movimiento conserva la inmediatez del griego y suena natural en español. "Vengo" mantiene la escena viva sin introducir una dirección no explicitada por el texto.
- source_word: εἰς τὸ πρόσωπον
  english_pob_choice: into the presence of
  chosen_spanish: a la presencia de
  alternatives_spanish:
  - delante de
  - ante
  lexicon: LSJ
  rationale: La locución idiomática expresa acceso a la presencia personal de alguien; "a la presencia de" es claro y mantiene la imagen concreta sin calco pesado.
- source_word: Ὀλοφέρνου
  english_pob_choice: Holofernes
  chosen_spanish: Holofernes
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado de manera constante con la tradición del libro y el audit trail inglés.
- source_word: ἀρχιστρατήγου
  english_pob_choice: commander-in-chief
  chosen_spanish: comandante en jefe
  alternatives_spanish:
  - generalísimo
  - comandante supremo
  lexicon: LSJ
  rationale: '"Comandante en jefe" transmite el rango militar supremo de ἀρχιστρατηγός con naturalidad en español contemporáneo.'
- source_word: δυνάμεως ὑμῶν
  english_pob_choice: of your forces
  chosen_spanish: de sus fuerzas
  alternatives_spanish:
  - de su ejército
  - de su poder
  lexicon: LSJ
  rationale: En este contexto militar, δύναμις se refiere a tropas o fuerzas armadas. El posesivo se adapta a la referencia implícita a Holofernes en el discurso español.
- source_word: τοῦ ἀναγγεῖλαι
  english_pob_choice: to announce
  chosen_spanish: para anunciar
  alternatives_spanish:
  - para declarar
  - para informar
  lexicon: LSJ
  rationale: El infinitivo final expresa propósito; "anunciar" conserva el tono formal y declarativo del original.
- source_word: ῥήματα ἀληθείας
  english_pob_choice: words of truth
  chosen_spanish: palabras de verdad
  alternatives_spanish:
  - palabras verdaderas
  - palabras veraces
  lexicon: LSJ
  rationale: '"Palabras de verdad" reproduce el genitivo con solemnidad y conserva la fuerza retórica de la expresión griega.'
- source_word: δείξω ... ὁδὸν
  english_pob_choice: I will show ... the way
  chosen_spanish: mostraré ... el camino
  alternatives_spanish:
  - señalaré ... el camino
  - le mostraré ... la ruta
  lexicon: LSJ
  rationale: '"Mostraré el camino" conserva la imagen concreta y el valor estratégico del gesto de guiar una campaña.'
- source_word: καθʼ ἣν πορεύσεται
  english_pob_choice: by which he will go
  chosen_spanish: por el cual él irá
  alternatives_spanish:
  - por la cual marchará
  - que tomará
  lexicon: LSJ
  rationale: La relativa expresa el trayecto. "Irá" evita sobreespecificar "marchará" sin perder la referencia al desplazamiento.
- source_word: κυριεύσει
  english_pob_choice: gain mastery over
  chosen_spanish: ganará dominio sobre
  alternatives_spanish:
  - se adueñará de
  - dominará
  lexicon: LSJ
  rationale: En un contexto de conquista, κυριεύω implica ejercer control o dominio. "Ganará dominio sobre" conserva el matiz de adquisición de control.
- source_word: πάσης τῆς ὀρινῆς
  english_pob_choice: all the hill country
  chosen_spanish: toda la región montañosa
  alternatives_spanish:
  - todo el territorio montañoso
  - todas las tierras altas
  lexicon: LSJ
  rationale: '"Región montañosa" comunica con claridad el ámbito geográfico de ὀρινή sin depender de una expresión idiomática más anglosajona como "hill country".'
- source_word: οὐ διαφωνήσει
  english_pob_choice: will not be lacking
  chosen_spanish: no faltará
  alternatives_spanish:
  - no estará ausente
  - no será echado de menos
  lexicon: LSJ
  rationale: La construcción idiomática apunta a que ninguno quedará ausente o faltante; "no faltará" refleja bien el valor de carencia preservado en la revisión inglesa.
- source_word: τῶν ἀνδρῶν αὐτοῦ
  english_pob_choice: of his men
  chosen_spanish: de sus hombres
  alternatives_spanish:
  - entre sus hombres
  lexicon: LSJ
  rationale: 'La frase partitiva se expresa naturalmente como posesivo en español: "de sus hombres".'
- source_word: σὰρξ μία
  english_pob_choice: not one flesh
  chosen_spanish: ni una sola carne
  alternatives_spanish:
  - ni un solo cuerpo
  - ni un solo hombre
  lexicon: LSJ
  rationale: Se conserva el término concreto "carne" para mantener la imaginería corporal del griego y la decisión léxica documentada por el POB inglés.
- source_word: οὐδὲ πνεῦμα ζωῆς
  english_pob_choice: nor a breath of life
  chosen_spanish: ni un aliento de vida
  alternatives_spanish:
  - ni un soplo de vida
  - ni un espíritu de vida
  lexicon: LSJ
  rationale: La expresión denota aliento vital, no el Espíritu Santo. "Aliento de vida" es idiomático y fiel al sentido biológico/bodily del original.
theological_decisions:
- issue: Renderizado de σάρξ en contexto militar literal
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - cuerpo
  - hombre
  rationale: Aquí σάρξ describe la integridad corporal de los hombres de Holofernes, no una noción moral o paulina de "naturaleza pecaminosa". "Carne" preserva la concreción del griego y la tensión imagética.
  doctrine_reference: 'DOCTRINE.md contested terms: σάρξ'
- issue: οὐ διαφωνήσει como ausencia/falta, no como discordia
  english_pob_reading: will be lacking
  chosen_spanish_reading: no faltará
  alternative_spanish_readings:
  - no será faltante
  - no estará ausente
  rationale: El contexto y la revisión inglesa favorecen la idea de que ninguno quedará ausente o faltante entre los hombres de Holofernes. "No faltará" mantiene esa lectura sin introducir el sentido de desacuerdo de διαφωνέω.
  doctrine_reference: Notas de revisión del POB inglés sobre οὐ διαφωνήσει
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés en la cláusula final, que ajusta el sentido de οὐ διαφωνήσει desde "will be lost" a "will be lacking". La versión española adopta "no faltará" para reflejar esa corrección y conserva el paralelismo con "ni un aliento de vida". También se mantuvo la fuerza corporal de σάρξ με carne, conforme a la decisión doctrinal documentada.
  spanish_consistency_notes:
  - Se usa "Holofernes" de forma uniforme como transliteración del nombre propio.
  - Se mantiene el registro formal y narrativo propio del POB, sin elevar el texto a una paráfrasis interpretativa.
  - '"Carne" y "aliento de vida" conservan la imaginería física del original, en armonía con la terminología POB para σάρξ y πνεῦμα ζωῆς.'
  - La frase "a la presencia de" sigue el valor idiomático de εἰς τὸ πρόσωπον sin traducirlo de manera demasiado literal.
