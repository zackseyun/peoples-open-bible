translation:
  language: es
  text: 'Pero David volvió a jurar y dijo[a]: «Tu padre ciertamente sabe que he hallado favor ante tus ojos, y ha dicho: “No dejes que Jonatán sepa esto, para que no se entristezca”. Pero, por vida de Yahvé y por vida de tu alma, no hay sino un paso entre mí y la muerte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no hay sino un paso entre mí y la muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע עוֹד
  english_pob_choice: swore again
  chosen_spanish: volvió a jurar
  alternatives_spanish:
  - juró de nuevo
  - juro otra vez
  lexicon: HALOT
  rationale: La forma con עוֹד expresa un juramento renovado o añadido en el avance del diálogo. «Volvió a jurar» conserva esa reiteración con español natural y solemne.
- source_word: יָדֹעַ יָדַע
  english_pob_choice: certainly knows
  chosen_spanish: ciertamente sabe
  alternatives_spanish:
  - sabe con certeza
  - bien sabe
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica el verbo finito. «Ciertamente sabe» preserva la fuerza enfática sin sonar forzado.
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: I have found favor in your eyes
  chosen_spanish: he hallado gracia en tus ojos
  alternatives_spanish:
  - he hallado favor en tus ojos
  - he encontrado gracia ante tus ojos
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo de aceptación favorable. «Gracia» respeta el matiz ya documentado por la POB y conserva la relación personal del giro «en tus ojos».
- source_word: אַל יֵדַע זֹאת יְהוֹנָתָן
  english_pob_choice: Do not let Jonathan know this
  chosen_spanish: Que Jonatán no sepa esto
  alternatives_spanish:
  - No dejes que Jonatán sepa esto
  - Que esto no lo sepa Jonatán
  lexicon: HALOT
  rationale: La negación con imperfecto expresa mandato o deseo negativo. «Que Jonatán no sepa esto» refleja bien ese valor en español bíblico actual, sin perder naturalidad.
- source_word: פֶּן יֵעָצֵב
  english_pob_choice: lest he be grieved
  chosen_spanish: para que no se entristezca
  alternatives_spanish:
  - para que no se aflija
  - no sea que se entristezca
  lexicon: HALOT
  rationale: El nifal de עצב comunica aflicción o tristeza. «Entristezca» preserva el sentido emocional en una forma fluida; «aflija» queda como alternativa válida.
- source_word: וְאוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: La partícula introduce contraste fuerte entre lo que Saúl quiere ocultar y la afirmación solemne de David. «Pero» es conciso y fiel.
- source_word: חַי יְהוָה
  english_pob_choice: as Yahweh lives
  chosen_spanish: por vida de Yahvé
  alternatives_spanish:
  - vive Yahvé
  - tan cierto como que Yahvé vive
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo y la fuerza de juramento. «Por vida de Yahvé» es una fórmula española comprensible y reverente para este juramento.
- source_word: וְחֵי נַפְשֶׁךָ
  english_pob_choice: and as your soul lives
  chosen_spanish: y por vida de tu alma
  alternatives_spanish:
  - y por tu vida
  - y como vive tu alma
  lexicon: HALOT
  rationale: La expresión hebrea duplica el juramento con un paralelo referido a la vida del interlocutor. «Tu alma» conserva el paralelismo semítico; en español suena solemne y transparente.
- source_word: כְפֶשַׂע בֵּינִי וּבֵין הַמָּוֶת
  english_pob_choice: there is but a step between me and death
  chosen_spanish: no hay sino un paso entre yo y la muerte
  alternatives_spanish:
  - hay solo un paso entre yo y la muerte
  - estoy a un paso de la muerte
  lexicon: HALOT
  rationale: פֶּשַׂע aquí significa «paso», no transgresión. «No hay sino un paso» reproduce el valor idiomático de cercanía extrema y mantiene el tono formal del pasaje.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה en juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrama, y la línea editorial de la POB indica su transliteración como «Yahvé». Se preserva así el nombre del pacto sin enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de נֶפֶשׁ en el paralelismo juramentario
  english_pob_reading: your soul lives
  chosen_spanish_reading: tu alma
  alternative_spanish_readings:
  - tu vida
  - tú mismo
  rationale: En esta fórmula de juramento, נֶפֶשׁ no se reduce simplemente a «vida»; el hebreo conserva un paralelismo formal con el juramento anterior. «Tu alma» mantiene esa tensión semítica y la distingue de una paráfrasis más plana.
  doctrine_reference: 'Lexical/theological note: semitic oath parallelism'
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB inglés, especialmente la preferencia por una negación exhortativa en la cita interior («Que Jonatán no sepa esto») y la forma idiomática «no hay sino un paso» para כְפֶשַׂע. También mantengo la referencia explícita al nombre divino en el juramento, conforme al trazado auditado.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene «gracia en tus ojos» para respetar el modismo hebreo y la decisión léxica auditada.
  - «Tu alma» se conserva en el juramento por paralelismo con el hebreo y para no neutralizar la fórmula.
  - La puntuación interna distingue claramente la cita principal de la cita secundaria, siguiendo el flujo del original.
