lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: HALOT
  rationale: El hebreo introduce una fórmula narrativa de habla divina. En español, «habló» conserva el acto de comunicación de manera natural y digna; «dijo» sería posible, pero aquí suena menos específico en la fórmula de apertura.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: La política del proyecto pide traducir el Tetragrámaton como «Yahvé». En español bíblico, «Yahvé» es la forma estable y reconocible para preservar el nombre divino propio, evitando la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso. En español, «a» es la correspondencia directa y más natural para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - así
  lexicon: HALOT
  rationale: La construcción infinitiva hebrea introduce la fórmula de discurso que sigue. «Diciendo» conserva la estructura formal en español sin añadir contenido interpretativo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se mantiene la decisión doctrinal y textual del POB de no ocultar el nombre divino detrás de una sustitución. «Yahvé» preserva el valor del Tetragrámaton en la recepción bíblica en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: una fórmula narrativa breve de introducción al discurso divino, sin variantes textuales ni revisiones pendientes en el expediente actual.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto, no «SEÑOR».
  - La puntuación con coma tras «Moisés» y tras «diciendo» reproduce la cadencia de introducción de discurso en español bíblico claro y publicable.
  - No se añadió material explicativo no presente en el hebreo.
