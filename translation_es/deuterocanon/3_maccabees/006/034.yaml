translation:
  language: es
  text: Y los que antes los habían consignado a destrucción y a ser devorados por aves[a], y los habían inscrito con alegría, gimieron profundamente, cubriéndose de vergüenza[b], y su audacia ardiente fue totalmente apagada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega es oscura en este punto; el sentido general, confirmado por la tradición auditada en inglés, es que antes habían destinado a esos hombres a la destrucción y a quedar expuestos como presa de las aves.
    reason: textual_variant
  - marker: b
    text: Lit. «poniéndose vergüenza sobre sí»; la metáfora conserva la imagen de una vergüenza que se viste o se carga como un vestido.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ τε πρὶν
  english_pob_choice: And those who had previously
  chosen_spanish: Y los que antes
  alternatives_spanish:
  - Y aquellos que anteriormente
  - Y quienes antes
  lexicon: LSJ
  rationale: πρὶν marca anterioridad; «antes» es natural y fiel en español, y conserva el contraste temporal con la reversión narrativa posterior.
- source_word: εἰς ὄλεθρον
  english_pob_choice: for destruction
  chosen_spanish: a destrucción
  alternatives_spanish:
  - para destrucción
  - para ruina
  lexicon: LSJ
  rationale: La preposición con εἰς admite un resultado o destino; «a destrucción» comunica el movimiento hacia ese fin sin añadir matices ajenos.
- source_word: οἰωνόβρωτους
  english_pob_choice: to be devoured by birds
  chosen_spanish: a ser devorados por aves
  alternatives_spanish:
  - para que las aves los devoraran
  - devorados por aves
  lexicon: LSJ
  rationale: El compuesto indica cadáveres dejados como presa de aves; «aves» suena más natural que un calco como «pájaros» en este registro, y mantiene la imagen de exposición postmortem.
- source_word: ἐξεσθιέμενοι
  english_pob_choice: been reckoning them
  chosen_spanish: los habían consignado
  alternatives_spanish:
  - los habían considerado
  - los habían tenido por
  lexicon: LSJ
  rationale: El testimonio griego es difícil y la audit trail inglesa ya optó por una reconstrucción hostil y administrativa. «Consignado» preserva la idea de haberlos entregado/adscrito a un destino, sin reducirlo a mera opinión.
- source_word: ἀπογραφάμενοι
  english_pob_choice: had registered them
  chosen_spanish: los habían registrado
  alternatives_spanish:
  - los habían inscrito
  - los habían listado
  lexicon: LSJ
  rationale: ἀπογράφω suele referirse a inscribir o registrar oficialmente; «registrado» conserva el tono burocrático del texto.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - gozosamente
  - alegres
  lexicon: LSJ
  rationale: La frase es simple y directa; «con alegría» mantiene el contraste irónico con el desenlace de vergüenza.
- source_word: κατεστέναξαν
  english_pob_choice: groaned deeply
  chosen_spanish: gimieron profundamente
  alternatives_spanish:
  - suspiraron con dolor
  - lamentaron hondamente
  lexicon: LSJ
  rationale: El compuesto intensifica el gemido; «gimieron profundamente» reproduce bien esa fuerza en español formal.
- source_word: αἰσχύνην ἐφʼ ἑαυτοῖς περιβαλόμενοι
  english_pob_choice: clothing themselves with shame
  chosen_spanish: cubriéndose de vergüenza
  alternatives_spanish:
  - vistiéndose de vergüenza
  - envolviéndose en vergüenza
  lexicon: LSJ
  rationale: La imagen literal es de ponerse vergüenza como una prenda. «Cubriéndose de vergüenza» suena natural y conserva la metáfora sin resultar forzada.
- source_word: πυρόπνουν τόλμαν
  english_pob_choice: fire-breathing boldness
  chosen_spanish: audacia de fuego
  alternatives_spanish:
  - audacia ardiente
  - osadía llameante
  lexicon: LSJ
  rationale: Se preserva la metáfora ignífera y el matiz negativo. «Audacia» responde bien a τόλμα; «de fuego» conserva el carácter vívido del compuesto.
- source_word: ἀκμαίως ἐσβεσμένοι
  english_pob_choice: was utterly quenched
  chosen_spanish: fue totalmente apagada
  alternatives_spanish:
  - fue completamente extinguida
  - fue del todo sofocada
  lexicon: LSJ
  rationale: ἐσβεσμένοι evoca apagar/extinguir una llama; «totalmente apagada» transmite el final absoluto que añade ἀκμαίως, sin sonar artificial en español.
translation_notes:
  revision_awareness: La redacción sigue la lectura auditada más reciente del inglés POB, especialmente la revisión que pasó de una reconstrucción más vacilante del participio oscuro a «consigned them to destruction», y de «vigorously quenched» a «utterly quenched». En español se optó por mantener la fuerza total del apagamiento con «totalmente apagada» y por dejar explícita la oscuridad sintáctica en una nota.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología por defecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton ni títulos divinos.
  - «Audacia» se eligió para τόλμα por concordar con la imagen negativa y con el español eclesial contemporáneo, sin sustituirlo por términos morales más interpretativos.
  - Se evitó suavizar «gimieron profundamente» o «cubriéndose de vergüenza», porque el griego intensifica ambos gestos y la imagen metafórica es importante para el efecto retórico.
