  revision_awareness: El texto sigue el estado revisado sin cambios del audit trail inglés ('No changes needed') y conserva el mismo perfil de equivalencia óptima, ajustando solo la naturalidad del español sin alterar el valor de las relaciones genealógicas y geográficas.
