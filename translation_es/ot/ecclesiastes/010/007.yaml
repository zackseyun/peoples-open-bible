  rationale: Se mantiene la fuerza léxica principal del borrador, pero se corrige la ubicación de la nota [c] y se sustituye la expresión rígida 'sobre la tierra' por 'por el suelo', que comunica mejor en español el contraste concreto con ir montados sin apartarse indebidamente del hebreo.
