    rationale: Esto crea una incoherencia entre el texto principal y la nota lexical. El lector entenderá erróneamente que «aguas» puede traducirse como «curso de agua» o «canal», cuando esas alternativas pertenecen a «arroyo».
  - severity: medium
    issue: «Junto a las aguas» es menos natural y menos preciso que «junto al agua» para עַל מַיִם en este contexto.
    rationale: El hebreo usa מַיִם, pero en español la expresión idiomática de proximidad a una fuente hídrica en singular no contable suena más natural. Además, sigue mejor la decisión auditada «by water».
  - severity: low
    issue: «En año de sequía» suena algo elíptico en español contemporáneo.
    rationale: «En un año de sequía» conserva el sentido proverbial y mejora la fluidez sin añadir contenido indebido.
