lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo narrativo hebreo introduce una fórmula estándar de revelación. En español, «habló» conserva mejor el registro formal y la cadencia narrativa que «dijo», especialmente antes de «diciendo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión del POB en inglés de transliterar el nombre divino en vez de ocultarlo con un título. En español, «Yahvé» es la forma más natural y reconocible para preservar el nombre personal del pacto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición expresa dirección hacia Moisés; «a» es el equivalente natural y fiel en español.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce discurso directo; «diciendo» preserva la estructura hebrea y la señal de que sigue el contenido de la խոսra hablada.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La fuente hebrea contiene el Tetragrámaton de manera directa. Siguiendo la política del POB, se conserva el nombre propio en lugar de sustituirlo por un título; en español, «Yahvé» comunica ese mismo valor nominal y covenantal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La revisión más reciente no requirió cambios y el cruce de control informó alto acuerdo; se mantiene la misma decisión de fondo: conservar el nombre divino y la fórmula narrativa sin expansión interpretativa.'
  spanish_consistency_notes:
  - Se evita la sustitución por «SEÑOR» para no ocultar el Tetragrámaton.
  - «Habló... diciendo» reproduce la fórmula narrativa hebrea con naturalidad en español.
  - No se introducen matices teológicos adicionales fuera de lo que el hebreo y el audit trail sustentan.
