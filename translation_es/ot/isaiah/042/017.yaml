translation:
  language: es
  text: 'Volverán atrás[a]; quedarán completamente avergonzados[b] los que confían en un ídolo[c], los que dicen a una imagen fundida[d]: «Ustedes son nuestros dioses[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «retrocederán hacia atrás»; el hebreo puede denotar tanto volverse atrás como ser obligados a retroceder.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «serán avergonzados con vergüenza», una expresión enfática que significa «quedarán completamente avergonzados».
    reason: lexical_alternative
  - marker: c
    text: O «imagen tallada» para «ídolo». El hebreo usa aquí un término distinto del siguiente para objetos de culto fabricados.
    reason: lexical_alternative
  - marker: d
    text: O «imagen de fundición» o «imagen de metal». El hebreo usa aquí un término distinto del anterior y enfatiza el modo de fabricación.
    reason: lexical_alternative
  - marker: e
    text: El hebreo dice literalmente, «Ustedes son nuestros dioses», con forma plural; algunas versiones lo suavizan a singular.
    reason: alternative_reading
lexical_decisions:
- source_word: נָסֹגוּ אָחוֹר
  english_pob_choice: will be turned back
  chosen_spanish: Volverán atrás
  alternatives_spanish:
  - Serán echados atrás
  - Retrocederán
  - Volverán hacia atrás
  lexicon: HALOT
  rationale: El hebreo expresa la idea de retroceder o ser hechos retroceder. «Volverán atrás» conserva la imagen direccional de manera natural en español y mantiene abierto el matiz de retroceso o retirada.
- source_word: יֵבֹשׁוּ בֹשֶׁת
  english_pob_choice: will be utterly put to shame
  chosen_spanish: serán avergonzados con vergüenza
  alternatives_spanish:
  - serán totalmente avergonzados
  - quedarán avergonzados con vergüenza
  - serán cubiertos de vergüenza
  lexicon: HALOT
  rationale: El hebreo usa una intensificación por repetición cognada. En español, «avergonzados con vergüenza» preserva esa redundancia enfática sin suavizarla demasiado; la nota explica el sentido de intensidad.
- source_word: הַבֹּטְחִים
  english_pob_choice: those who trust
  chosen_spanish: los que confían
  alternatives_spanish:
  - los que se apoyan
  - los que ponen su confianza
  - los que se fían
  lexicon: HALOT
  rationale: El participio sustantivado describe a un grupo caracterizado por confiar en el objeto de culto. «Los que confían» es directo, fiel y natural en español.
- source_word: בַּפָּסֶל
  english_pob_choice: in an idol
  chosen_spanish: en un ídolo
  alternatives_spanish:
  - en una imagen tallada
  - en una imagen esculpida
  - en una figura tallada
  lexicon: HALOT
  rationale: פֶּסֶל nombra un objeto de culto fabricado, con énfasis en su condición de ídolo. «Ídolo» comunica bien la carga polémica religiosa del término en español.
- source_word: לְמַסֵּכָה
  english_pob_choice: to a cast image
  chosen_spanish: a una imagen fundida
  alternatives_spanish:
  - a una imagen de fundición
  - a una imagen vaciada
  - a una imagen de metal fundido
  lexicon: HALOT
  rationale: El término señala una imagen hecha por fundición. «Imagen fundida» conserva esa manufactura y diferencia este vocablo del anterior.
- source_word: אַתֶּם אֱלֹהֵינוּ
  english_pob_choice: You are our gods
  chosen_spanish: Ustedes son nuestros dioses
  alternatives_spanish:
  - Ustedes son nuestro dios
  - Vosotros sois nuestros dioses
  lexicon: HALOT
  rationale: El hebreo es plural tanto en el pronombre como en el sustantivo predicado. Se conserva ese plural para no borrar la forma gramatical del texto fuente.
theological_decisions:
- issue: Distinción entre פֶּסֶל y מַסֵּכָה
  english_pob_reading: Differentiate them as 'idol' and 'cast image'
  chosen_spanish_reading: Distinguir «ídolo» e «imagen fundida»
  alternative_spanish_readings:
  - Traducir ambos simplemente como «ídolo»
  - Traducirlos como «imagen tallada» e «imagen fundida»
  rationale: El verso usa dos términos distintos para objetos de culto manufacturados. Mantenerlos diferenciados preserva la fuerza retórica de la denuncia y evita aplanar el paralelismo hebreo.
  doctrine_reference: Principios de transparencia textual y equivalencia óptima de la POB
- issue: Número plural de אֱלֹהֵינוּ
  english_pob_reading: Retain the plural 'our gods'
  chosen_spanish_reading: «nuestros dioses» en plural
  alternative_spanish_readings:
  - «nuestro dios» en singular
  - «nuestro Dios»
  rationale: El hebreo presenta forma plural; la traducción la conserva para no normalizarla. Aunque suena menos idiomático al dirigirse a un solo ídolo, la transparencia al texto fuente tiene prioridad.
  doctrine_reference: Principios de transparencia textual y equivalencia óptima de la POB
translation_notes:
  revision_awareness: Se revisó el pasaje con atención al paralelismo hebreo, a la intensificación de בֹּשֶׁת y a la distinción entre פֶּסֶל y מַסֵּכָה. La lectura vigente del inglés POB se mantiene en su enfoque óptimo-equivalente, sin cambios recientes en la última revisión.
  spanish_consistency_notes:
  - Se conserva un español moderno y reverente, evitando fórmulas eclesiásticas que oscurezcan el hebreo.
  - «Ídolo» se usa para פֶּסֶל por su fuerza polemizante; «imagen fundida» distingue el segundo término.
  - Se mantiene el plural «nuestros dioses» para reflejar la morfología hebrea.
  - Los corchetes de notas se colocan solo donde hay una alternativa relevante o una tensión textual que conviene explicitar.
