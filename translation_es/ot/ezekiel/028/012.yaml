translation:
  language: es
  text: 'Hijo de hombre, pronuncia una endecha sobre el rey de Tiro, y dile: «Así dice el Señor Yahvé: Tú eres[a] el sello de la perfección[b], lleno de sabiduría y perfecto en hermosura».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú fuiste». El hebreo no tiene verbo copulativo explícito; el tiempo verbal se suple por el contexto.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «el sello de la perfección»; también puede entenderse como «el anillo de sello de la perfección» o «el que sella el modelo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Es un llamado fijo a Ezequiel. «Hijo de hombre» conserva el valor idiomático y la resonancia literaria del hebreo mejor que suavizarlo a «ser humano» o «mortal».
- source_word: שָׂא קִינָה
  english_pob_choice: raise a lament
  chosen_spanish: pronuncia una endecha
  alternatives_spanish:
  - eleva un lamento
  - entona una lamentación
  lexicon: HALOT
  rationale: El giro hebreo significa iniciar o emitir una composición fúnebre. «Pronuncia una endecha» comunica el acto de declarar/recitar un canto de duelo con registro digno y natural en español bíblico contemporáneo.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - acerca de
  - contra
  lexicon: HALOT
  rationale: Con lenguaje de endecha, «sobre» conserva la relación del lamento con su destinatario y mantiene la imagen idiomática del hebreo.
- source_word: מֶלֶךְ צוֹר
  english_pob_choice: the king of Tyre
  chosen_spanish: el rey de Tiro
  alternatives_spanish:
  - el rey de Tiro
  lexicon: HALOT
  rationale: Traducción directa del sintagma constructo con el topónimo habitual en español.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice Yahvé Dios
  alternatives_spanish:
  - Así dice el Señor Yahvé
  - Así dice el Señor Dios
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para יְהוָה como «Yahvé», y se conserva «Dios» para אֲדֹנָי יְהוִה en una fórmula profética solemne y clara en español.
- source_word: אַתָּה
  english_pob_choice: You were
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Tú eras
  - Tú fuiste
  lexicon: HALOT
  rationale: El hebreo no expresa explícitamente el verbo copulativo. Dado que el inglés POB documenta la tensión entre presente y pasado, el español mantiene el presente para reflejar la forma desnuda del hebreo y deja abierta la lectura contextual.
- source_word: חוֹתֵם תָּכְנִית
  english_pob_choice: the seal of perfection
  chosen_spanish: el sello de la perfección
  alternatives_spanish:
  - el signet de la perfección
  - el sello del modelo
  lexicon: HALOT
  rationale: «Sello» comunica el sentido básico de חוֹתֵם como aquello que sella o marca, y «perfección» refleja תָּכְנִית en el campo de completitud/ajuste ideal. Se preserva así la expresión compacta y elevada del hebreo.
- source_word: מָלֵא חָכְמָה
  english_pob_choice: full of wisdom
  chosen_spanish: lleno de sabiduría
  alternatives_spanish:
  - colmado de sabiduría
  lexicon: HALOT
  rationale: Es un equivalente directo y natural que mantiene el paralelismo poético.
- source_word: וּכְלִיל יֹפִי
  english_pob_choice: perfect in beauty
  chosen_spanish: perfecto en hermosura
  alternatives_spanish:
  - completo en hermosura
  - pleno de belleza
  lexicon: HALOT
  rationale: «Perfecto» reproduce la idea de plenitud/completud de כְלִיל, y «hermosura» conserva el registro bíblico solemne de יֹפִי.
theological_decisions:
- issue: Nombre divino en la fórmula profética (אֲדֹנָי יְהוִה)
  english_pob_reading: the Lord GOD / Lord Yahweh as a doctrinally noted alternative
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: El proyecto español prioriza el nombre del pacto «Yahvé» para יְהוָה. En la combinación con אֲדֹנָי, «Yahvé Dios» evita la máscara «SEÑOR» y conserva la distinción de los dos elementos divinos sin forzar una duplicación impropia en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión temporal en אַתָּה con copula implícita
  english_pob_reading: 'You were ...; note: alternatively, You are ... the Hebrew lacks an explicit copular verb, and the tense is supplied from context.'
  chosen_spanish_reading: Tú eres ...
  alternative_spanish_readings:
  - Tú eras ...
  - Tú fuiste ...
  rationale: El hebreo presenta una forma nominal sin verbo explícito. El español puede reflejar esa ausencia con presente, mientras el contexto lamentatorio permite entender también una valoración retrospectiva. Se preserva la tensión sin cerrarla artificialmente.
  doctrine_reference: 'Grammar/Poetics: implicit copula in Hebrew nominal clauses'
- issue: Valor de חוֹתֵם תָּכְנִית
  english_pob_reading: the seal of perfection; alternatively, the signet of perfection or the one sealing the pattern.
  chosen_spanish_reading: el sello de la perfección
  alternative_spanish_readings:
  - el signet de la perfección
  - el que sella el modelo
  rationale: Se conserva la ambigüedad lexical de חוֹתֵם sin imponer una paráfrasis interpretativa. «Sello» permite tanto el valor de marca/garantía como el de objeto que imprime una forma ideal.
  doctrine_reference: Lexical ambiguity in Wisdom/poetic imagery
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y se siguió la lectura poética del texto hebreo sin depender mecánicamente de la versión inglesa. Se conservó la tensión temporal de אַתָּה y la ambigüedad de חוֹתֵם תָּכְנִית, mientras se aplicó la convención del proyecto para el Tetragrámaton como «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo «Hijo de hombre» como vocativo fijo del libro de Ezequiel.
  - Se usó «endecha» para conservar el tono fúnebre-poético de קִינָה.
  - Se evitó «SEÑOR» como máscara del nombre divino; se usó «Yahvé» según la terminología del proyecto.
  - Se mantuvo «hermosura» por su registro bíblico y su correspondencia con יֹפִי.
  - La puntuación y las comillas siguen convenciones españolas, sin alterar el contenido fuente.
