  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: sujeto implícito entendido como Dios, «atrapa» para לֹכֵד, «los sabios» para חֲכָמִים, y fuerza moral negativa para עָרְמָם y נִפְתָּלִים. Sin embargo, la segunda cláusula no queda bien en español con «es apresurado», porque sugiere más naturalmente que el consejo mismo es imprudente, no que es llevado precipitadamente. Además, la nota c repite la forma principal en vez de ofrecer una alternativa real.'
