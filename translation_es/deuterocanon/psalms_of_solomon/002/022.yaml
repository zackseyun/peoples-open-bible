revisions:
- from: Quitó la diadema[a] de gloria que Dios había puesto sobre ella[b].
  to: Se quitó el tocado[a] de gloria que Dios había puesto sobre ella[b].
  rationale: Se cambia «diadema» por «tocado» para reflejar mejor la adjudicación inglesa de μίτραν como «headdress», manteniendo «diadema» como alternativa léxica válida. Se ajusta «quitó» a «se quitó» para representar con más naturalidad el valor medio de περιείλατο. Se conserva «de gloria» y «Dios había puesto sobre ella» como fieles al original; la nota [b] recoge una alternativa española cercana para la construcción verbal sin alterar el sentido. No requiere adjudicación adicional.
