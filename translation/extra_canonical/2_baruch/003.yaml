translation:
  text: '1 And I said[a], “O Lord, my Lord, is it for this that I have asked, that I should see this? No, my Lord.

    2 Let your mercies be shown to me. Take my spirit to yourself, that I may go to my fathers and not see the destruction of my mother.

    3 For I cannot endure that I should die with many, or that I should die with my assembly; but neither can my soul endure to see the evil of my mother.

    4 But one thing I will say before you, O Lord:

    5 What then will happen after these things?

    6 For if you destroy your city and deliver up your land[b][c][d][e],

    7 ...'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “My mother” is Baruch’s lamenting way of speaking about Jerusalem/Zion; the metaphor is retained rather than replaced with a flatter explanatory term.
    reason: cultural_note
    anchor_ref: '3:1'
  - marker: e
    text: The chapter’s closing questions run across a page edge in the Ceriani bucket. The rendering follows the primary Syriac trajectory, with control witnesses helping confirm the continuation and chapter boundary.
    reason: textual_variant
    anchor_ref: 3:5-9
  - marker: d
    text: '“Primeval silence” expresses cosmic-reversal imagery: Baruch fears that Jerusalem’s fall would seem to undo the ordered world shaped by God’s covenant purposes.'
    reason: cross_reference
    anchor_ref: '3:7'
  - marker: c
    text: Or 'take away my spirit first'.
    reason: previous_rendering
  - marker: b
    text: Or 'I cannot resist you'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܐܡܝ
  chosen: my mother
  alternatives:
  - my city
  - Zion
  lexicon: Payne Smith
  rationale: The maternal image is a deliberate lament metaphor for Jerusalem/Zion. Retaining “my mother” preserves the emotional and poetic force rather than interpreting it away in the main text.
- source_word: ܣܒ ܠܘܬܟ ܪܘܚܝ
  chosen: take away my spirit
  alternatives:
  - receive my spirit
  - take my life
  lexicon: Payne Smith
  rationale: The phrase expresses a plea for death before Jerusalem’s fall. “Take away my spirit” keeps the idiom vivid without flattening it into a merely abstract request.
- source_word: ܐܒ̈ܗܝ
  chosen: my fathers
  alternatives:
  - my ancestors
  lexicon: Payne Smith
  rationale: “My fathers” preserves the ancestral, covenantal idiom common to biblical and related literature; “ancestors” is possible but less textured.
- source_word: ܬܘܒܕ / ܬܫܠܡ
  chosen: destroy / give over
  alternatives:
  - bring to ruin / hand over
  - wipe out / deliver up
  lexicon: Payne Smith
  rationale: 'The paired verbs intensify the catastrophe: Jerusalem is ruined and the land handed to hostile nations. The chosen English keeps both actions distinct.'
- source_word: ܥܠܡܐ ... ܫܬܝܩܘܬܐ ܩܕܡܝܬܐ
  chosen: the world return to its former state ... primeval silence
  alternatives:
  - the world revert to its former nature ... ancient silence
  lexicon: Payne Smith
  rationale: The line uses cosmic reversal language, not mere political collapse. “Primeval silence” preserves the apocalyptic breadth of the complaint.
- source_word: ܢܡܘܣܐ
  chosen: law
  alternatives:
  - instruction
  - teaching
  lexicon: Payne Smith
  rationale: In this setting Baruch asks who will receive and interpret God’s revealed covenant teaching. “Law” best preserves that canonical-covenantal sense.
