translation:
  language: es
  text: Por eso llamaron Purim[a] a estos días, por el nombre de Pur. Por eso, a causa de todas las palabras de esta carta, y de lo que habían visto acerca de este asunto, y de lo que les había sucedido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «por Pur». El hebreo literalmente dice: «por el nombre de Pur».'
    reason: lexical_alternative
  - marker: b
    text: O «lo que les había sobrevenido».
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְאוּ
  english_pob_choice: they called
  chosen_spanish: llamaron
  alternatives_spanish:
  - nombraron
  lexicon: HALOT
  rationale: En contexto de denominación de una fiesta, el verbo español natural es 'llamar'. Conserva la fuerza nominativa del hebreo sin volverlo más interpretativo de lo necesario.
- source_word: לַיָּמִים הָאֵלֶּה
  english_pob_choice: these days
  chosen_spanish: a estos días
  alternatives_spanish:
  - a aquellos días
  lexicon: HALOT
  rationale: '''Estos días'' conserva la deixis del hebreo y encaja en español con la construcción verbal ''llamar a''.'
- source_word: פוּרִים
  english_pob_choice: Purim
  chosen_spanish: Purim
  lexicon: HALOT
  rationale: Es el nombre propio de la fiesta; transliterarlo mantiene la referencia histórica y litúrgica.
- source_word: עַל שֵׁם הַפּוּר
  english_pob_choice: after the name of Pur
  chosen_spanish: por el nombre de Pur
  alternatives_spanish:
  - a partir del nombre de Pur
  - después del nombre de Pur
  lexicon: HALOT
  rationale: La expresión עַל שֵׁם se rinde mejor en español con 'por el nombre de' para reflejar la relación etimológica/nominativa. 'Pur' se conserva como préstamo, como en la nota inglesa.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La frase aparece dos veces y en español 'Por eso' conserva bien el valor consecutivo sin sonar excesivamente solemne.
- source_word: עַל כָּל דִּבְרֵי הָאִגֶּרֶת הַזֹּאת
  english_pob_choice: because of all the words of this letter
  chosen_spanish: a causa de todas las palabras de esta carta
  alternatives_spanish:
  - por todos los asuntos de esta carta
  - debido a todo lo escrito en esta carta
  lexicon: HALOT
  rationale: '''Palabras de esta carta'' es formalmente cercano a דִּבְרֵי, y ''a causa de'' reproduce el valor causal de עַל en este contexto.'
- source_word: וּמָה רָאוּ עַל כָּכָה
  english_pob_choice: and what they had seen concerning this matter
  chosen_spanish: y de lo que habían visto acerca de este asunto
  alternatives_spanish:
  - y lo que habían visto en este respecto
  - y lo que habían observado sobre esto
  lexicon: HALOT
  rationale: '''Visto'' mantiene el verbo hebreo רָאוּ, mientras ''acerca de este asunto'' expresa naturalmente el alcance de עַל כָּכָה sin perder la referencia.'
- source_word: וּמָה הִגִּיעַ אֲלֵיהֶם
  english_pob_choice: and what had happened to them
  chosen_spanish: y de lo que les había sucedido
  alternatives_spanish:
  - y de lo que les había sobrevenido
  - y de lo que había venido sobre ellos
  lexicon: HALOT
  rationale: El hebreo puede significar 'suceder' o 'sobrevenir'; 'les había sucedido' es idiomático en español y conserva la retrospectiva del relato.
translation_notes:
  revision_awareness: La redacción española sigue el valor causal y la repetición de עַל כֵּן del hebreo, y conserva la incompletud sintáctica del versículo con una estructura fluida en español, en línea con el repaso reciente que no encontró un ajuste mínimo mejor sin extender el sentido.
  spanish_consistency_notes:
  - Se mantuvo 'Purim' como nombre de la fiesta y 'Pur' como préstamo etimológico, coherente con el tratamiento POB del término.
  - Se prefirió 'llamaron' sobre 'nombraron' para la denominación del festival, por naturalidad y fidelidad al acto de asignar un nombre.
  - Se conservó la doble repetición de 'Por eso' para reflejar la estructura del hebreo.
  - '''Carta'' traduce אִגֶּרֶת en un registro sobrio y comprensible para español bíblico moderno.'
