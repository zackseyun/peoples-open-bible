translation:
  language: es
  text: y el Arabá[a] hasta el mar de Quinerot al oriente, y hasta el mar del Arabá, el mar Salado, al oriente, por el camino de Bet-yesimot, y hacia el sur[b], debajo de las laderas de Pisgá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llanura» por «el Arabá»; aquí probablemente se refiere a la región específica del valle del Jordán en la depresión del Arabá, y no a una llanura genérica.
    reason: lexical_alternative
  - marker: b
    text: «El mar del Arabá, el mar Salado» se refiere a lo que más tarde comúnmente se llama el mar Muerto.
    reason: cultural_note
lexical_decisions:
- source_word: הָעֲרָבָה
  english_pob_choice: the Arabah
  chosen_spanish: el Arabá
  alternatives_spanish:
  - la llanura
  - el valle del Jordán
  lexicon: HALOT
  rationale: Se conserva como nombre geográfico propio, no como sustantivo común. En español, «el Arabá» mantiene la referencia al rift/región geográfica específica que el contexto de límites presupone.
- source_word: יָם כִּנְרוֹת
  english_pob_choice: the Sea of Kinnereth
  chosen_spanish: el mar de Quinerot
  alternatives_spanish:
  - el mar de Chinerot
  - el lago de Quineret
  lexicon: HALOT
  rationale: Se translitera el topónimo hebreo de manera transparente y formal. «Mar» mantiene la forma del texto fuente sin introducir la identificación moderna como lago.
- source_word: מִזְרָחָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: La forma adverbial marca dirección en una lista territorial; «hacia el oriente» conserva el movimiento direccional con un registro bíblico claro y natural en español.
- source_word: יָם הָעֲרָבָה יָם הַמֶּלַח
  english_pob_choice: the Sea of the Arabah, the Salt Sea
  chosen_spanish: el mar del Arabá, el mar Salado
  alternatives_spanish:
  - el mar del Arabá, es decir, el mar Salado
  - el Arabá marino, el mar Muerto
  lexicon: HALOT
  rationale: Se conserva la estructura aposicional del hebreo. «Mar Salado» refleja el apelativo del texto fuente sin sustituirlo por «mar Muerto», que sería una identificación interpretativa no expresada aquí.
- source_word: דֶּרֶךְ
  english_pob_choice: by way of
  chosen_spanish: por el camino de
  alternatives_spanish:
  - por la ruta de
  - a través de
  lexicon: HALOT
  rationale: En una descripción de frontera, «por el camino de» comunica recorrido o línea de paso con naturalidad y sin exceder el alcance del hebreo.
- source_word: בֵּית הַיְשִׁמֹת
  english_pob_choice: Beth-jeshimoth
  chosen_spanish: Bet-yesimot
  alternatives_spanish:
  - Beth-yesimot
  - Bet-yesimot
  lexicon: HALOT
  rationale: Se translitera como nombre propio de lugar. Se eligió una forma breve y legible en español, evitando traducir el nombre o normalizarlo con una grafía tradicional no justificada por el texto.
- source_word: וּמִתֵּימָן
  english_pob_choice: and southward
  chosen_spanish: y hacia el sur
  alternatives_spanish:
  - y al sur
  - y desde el sur
  lexicon: HALOT
  rationale: La frase marca el lado/sentido meridional del límite. «Y hacia el sur» conserva el valor direccional que la revisión inglesa afinó con «southward».
- source_word: תַּחַת
  english_pob_choice: below
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - por debajo de
  lexicon: HALOT
  rationale: En la descripción topográfica, «debajo de» expresa con claridad la relación espacial sin cargarla de matices adicionales.
- source_word: אַשְׁדּוֹת
  english_pob_choice: the slopes of
  chosen_spanish: las laderas de
  alternatives_spanish:
  - las pendientes de
  - los declives de
  lexicon: HALOT
  rationale: «Laderas» comunica bien el relieve de montes o alturas en español y mantiene la precisión topográfica del término hebreo.
- source_word: הַפִּסְגָּה
  english_pob_choice: Pisgah
  chosen_spanish: Pisgá
  alternatives_spanish:
  - Pisga
  - Pisgah
  lexicon: HALOT
  rationale: Se trata como topónimo propio y se adapta la acentuación a la ortografía española. Se conserva el nombre sin añadir el artículo, como en el tratamiento habitual de lugares propios.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente: mantiene la puntuación que separa con claridad las unidades de la lista territorial y refleja la forma direccional de מִזְרָחָה y וּמִתֵּימָן con «hacia el oriente» y «hacia el sur». También preserva la aposición de «el mar del Arabá, el mar Salado» sin expandirla a una identificación posterior.'
  spanish_consistency_notes:
  - Se usa «Arabá» como nombre geográfico consistente con la decisión POB de tratar הָעֲרָבָה como topónimo.
  - Se mantiene «mar» para יָם aun cuando el referente histórico sea un cuerpo de agua interior, para seguir el paralelismo del texto fuente.
  - 'Los nombres propios se transliteran de forma estable: Quinerot, Bet-yesimot, Pisgá.'
  - No se introduce «SEÑOR» ni otras sustituciones teológicas, porque el versículo no contiene el Tetragrámaton ni títulos divinos.
