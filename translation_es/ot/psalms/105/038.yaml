translation:
  language: es
  text: Egipto se alegró cuando salieron[a], porque el temor a ellos había caído sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Egipto se regocijó al salir ellos, porque el temor a ellos había caído sobre ellos».'
