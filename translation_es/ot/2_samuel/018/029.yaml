    rationale: Aquí la expresión es una fórmula de deferencia cortesana de autorreferencia. En español bíblico natural y fiel, 'tu siervo' preserva el registro sin introducir una literalidad social más fuerte que la intención pragmática del hebreo.
  - severity: low
