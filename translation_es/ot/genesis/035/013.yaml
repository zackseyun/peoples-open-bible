translation:
  language: es
  text: Entonces Dios subió de allí, en el lugar donde había hablado con él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ascendió de sobre él». El hebreo conserva la imagen de movimiento hacia arriba en la partida de Dios del encuentro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - fue hacia arriba
  - se fue
  lexicon: HALOT
  rationale: עלה en qal conserva la imagen concreta de movimiento hacia arriba. En español, «subió» mantiene esa verticalidad mejor que «se fue» y suena natural en un contexto teofánico.
- source_word: מֵעָלָיו
  english_pob_choice: from him
  chosen_spanish: de junto a él
  alternatives_spanish:
  - de él
  - de sobre él
  - de encima de él
  lexicon: HALOT
  rationale: La preposición transmite salida desde la cercanía de la persona. «De junto a él» conserva la idea relacional de separación sin forzar un calco incómodo como «de sobre él».
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - la deidad
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים rige verbo singular y se refiere al Dios de Israel. En español, «Dios» comunica correctamente ese referente singular.
- source_word: בַּמָּקוֹם
  english_pob_choice: in the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en el sitio
  - en ese lugar
  lexicon: HALOT
  rationale: El valor locativo de בְּ con מקום se expresa de manera natural con «en». «Lugar» es fiel y comprensible en español bíblico contemporáneo.
- source_word: אֲשֶׁר
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el que
  - en donde
  lexicon: HALOT
  rationale: Como el antecedente es espacial, «donde» reproduce bien la relación locativa sin volver la frase artificial.
- source_word: דִּבֶּר אִתּוֹ
  english_pob_choice: he had spoken with him
  chosen_spanish: había hablado con él
  alternatives_spanish:
  - habló con él
  - le había hablado
  lexicon: HALOT
  rationale: El pi‘el de דבר con אֵת/אִתּוֹ expresa hablar con alguien, y el pluscuamperfecto refleja la acción completada antes de la subida de Dios. «Con él» mantiene la reciprocidad relacional del hebreo mejor que «le había hablado».
theological_decisions:
- issue: Lenguaje espacial aplicado a la acción de Dios
  english_pob_reading: Retain the spatial language 'went up from him' without reducing it to a non-spatial paraphrase.
  chosen_spanish_reading: Conservar «subió de junto a él» como lenguaje espacial de la teofanía, sin diluirlo en una paráfrasis abstracta.
  alternative_spanish_readings:
  - Dios se retiró de él
  - Dios se apartó de él
  rationale: El hebreo usa un verbo ordinario de ascenso; la traducción debe preservar esa imaginería sin explicar filosóficamente el movimiento. «Subió» mantiene la tensión narrativa del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota al incluir [a] en el texto principal, manteniendo la decisión léxica de preservar el movimiento ascendente del hebreo. La redacción evita el calco «de sobre él» por resultar poco natural en español, pero conserva la cercanía relacional con «de junto a él».
  spanish_consistency_notes:
  - Se usa «Dios» de forma singular conforme al verbo hebreo singular.
  - Se mantiene el pluscuamperfecto «había hablado» para reflejar que la palabra ocurrió antes de la partida.
  - Se conserva una estructura locativa directa («en el lugar donde») acorde con el hebreo y con el estilo POB.
  - No se sustituye el lenguaje espacial por una paráfrasis doctrinal, para respetar la imaginería teofánica del pasaje.
