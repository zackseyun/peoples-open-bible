translation:
  language: es
  text: Y cuando los hombres de su ciudad oyeron su voz, se apresuraron a bajar a la puerta de su ciudad y convocaron a los ancianos de la ciudad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ἐγένετο ὡς
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Y aconteció que cuando
  - Y al escuchar
  lexicon: BDAG
  rationale: La fórmula introduce una secuencia narrativa temporal. En español, «Y cuando» conserva la relación de tiempo sin volver la frase rígida o redundante.
- source_word: οἱ ἄνδρες τῆς πόλεως αὐτῆς
  english_pob_choice: the men of her city
  chosen_spanish: los hombres de su ciudad
  alternatives_spanish:
  - los varones de su ciudad
  - los hombres de aquella ciudad
  - la gente de su ciudad
  lexicon: BDAG
  rationale: ἄνδρες es masculino específico; por eso se mantiene «los hombres» y no una forma neutral. «Su ciudad» reproduce bien el referente de αὐτῆς, que vuelve a Judith.
- source_word: τὴν φωνὴν αὐτῆς
  english_pob_choice: her voice
  chosen_spanish: su voz
  alternatives_spanish:
  - la voz de ella
  - su llamado
  - su sonido
  lexicon: BDAG
  rationale: φωνή normalmente significa «voz» o «sonido». Aquí el sentido natural es que la oyeron hablar o llamar, y «su voz» es la opción más directa y fiel.
- source_word: ἐσπούδασαν
  english_pob_choice: they hurried
  chosen_spanish: se apresuraron
  alternatives_spanish:
  - se dieron prisa
  - se apuraron
  - se precipitaron
  lexicon: BDAG
  rationale: El verbo expresa prisa y acción urgente. «Se apresuraron» conserva bien ese matiz en un español digno y claro.
- source_word: τοῦ καταβῆναι
  english_pob_choice: down
  chosen_spanish: a bajar
  alternatives_spanish:
  - a descender
  - a ir abajo
  - a bajar de
  lexicon: BDAG
  rationale: El infinitivo con τοῦ expresa la acción a la que se apresuran. «A bajar» es natural en español y mantiene la dirección descendente del griego.
- source_word: ἐπὶ τὴν πύλην τῆς πόλεως αὐτῶν
  english_pob_choice: to the gate of their city
  chosen_spanish: a la puerta de su ciudad
  alternatives_spanish:
  - a la puerta de la ciudad
  - a la puerta de su pueblo
  - a la puerta de la ciudad de ellos
  lexicon: BDAG
  rationale: πύλη puede ser «puerta» o «puerta/portón»; en contexto urbano, «puerta» comunica bien el acceso de la ciudad. «De su ciudad» conserva la referencia posesiva del texto griego.
- source_word: συνεκάλεσαν
  english_pob_choice: called together
  chosen_spanish: reunieron
  alternatives_spanish:
  - convocaron
  - llamaron juntos
  - agruparon
  lexicon: BDAG
  rationale: El verbo compuesto indica convocar o juntar a otros. «Reunieron» funciona de modo natural en español y expresa la acción comunitaria sin perder el sentido convocante.
- source_word: τοὺς πρεσβυτέρους τῆς πόλεως
  english_pob_choice: the elders of the city
  chosen_spanish: a los ancianos de la ciudad
  alternatives_spanish:
  - a los ancianos de la ciudad
  - a los presbíteros de la ciudad
  - a los mayores de la ciudad
  lexicon: BDAG
  rationale: πρεσβύτεροι aquí designa a los dirigentes/ancianos de la ciudad. «Ancianos» es el equivalente más transparente y tradicionalmente comprensible en español; «presbíteros» sería demasiado eclesial y menos ajustado al contexto cívico.
theological_decisions:
- issue: Mantenimiento del masculino específico en οἱ ἄνδρες
  english_pob_reading: the men of her city
  chosen_spanish_reading: los hombres de su ciudad
  alternative_spanish_readings:
  - la gente de su ciudad
  - los habitantes de su ciudad
  rationale: La lectura inglesa preserva el masculino específico de ἄνδρες. En español se mantiene esa precisión, sin neutralizar el término con una expresión colectiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El texto inglés POB y el audit trail concuerdan plenamente con el griego: secuencia narrativa, referencia posesiva a Judith, urgencia de ἐσπούδασαν, movimiento descendente hacia la puerta y convocatoria de los ancianos. No se detectan revisiones ni notas textuales que requieran marcar variantes en español.'
  spanish_consistency_notes:
  - Se mantiene «su ciudad» para αὐτῆς y «su ciudad»/«de la ciudad» con consistencia posesiva respecto del contexto narrativo.
  - Se evita «SEÑOR» o terminología litúrgica ajena porque el versículo no contiene lenguaje divino.
  - Se usa vocabulario cívico y narrativo simple, acorde con una traducción pública y auditable.
