translation:
  language: es
  text: 'Jonatán dijo a David: «Ve en paz, puesto que los dos hemos jurado en el nombre de Yahvé, diciendo: “Que Yahvé esté entre tú y yo[a], y entre mi descendencia y tu descendencia para siempre”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé estará entre tú y yo». La forma hebrea puede leerse como futuro simple, pero en este contexto de juramento probablemente tiene fuerza invocativa: «Que Yahvé esté».'
    reason: alternative_reading
lexical_decisions:
- source_word: לֵךְ לְשָׁלוֹם
  english_pob_choice: Go in peace
  chosen_spanish: Vete en paz
  alternatives_spanish:
  - Ve en paz
  - Vete tranquilamente
  lexicon: HALOT
  rationale: Fórmula idiomática de despedida y bendición. «Vete en paz» conserva el mandato de irse y el matiz relacional de שָׁלוֹם sin sonar artificial.
- source_word: אֲשֶׁר / נִשְׁבַּעְנוּ שְׁנֵינוּ אֲנַחְנוּ
  english_pob_choice: since the two of us have sworn
  chosen_spanish: puesto que los dos nos hemos jurado
  alternatives_spanish:
  - ya que los dos hemos jurado
  - pues los dos nos hemos jurado
  lexicon: HALOT
  rationale: «Puesto que» reproduce bien la relación causal/conductual que el contexto exige. «Los dos» preserva el énfasis en la mutualidad del juramento.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en el nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  - en nombre de Yahvé
  lexicon: HALOT
  rationale: La fórmula juramentaria en español se expresa de manera natural con «en el nombre de». Se mantiene «Yahvé» según el criterio del proyecto para יהוה.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Introduce la cita del juramento. «Diciendo» es la correspondencia directa y clara en español.
- source_word: יְהוָה יִהְיֶה בֵּינִי וּבֵינֶךָ
  english_pob_choice: May Yahweh be between me and you
  chosen_spanish: Yahvé estará entre tú y yo
  alternatives_spanish:
  - Que Yahvé esté entre tú y yo
  - Yahvé sea entre tú y yo
  lexicon: HALOT
  rationale: Se conserva la tensión del hebreo imperfecto, que puede leerse como futuro o con fuerza invocativa. Aquí se opta por una forma futura en español, como permite la nota auditada del POB en inglés, sin resolver por completo la ambigüedad.
- source_word: זַרְעִי ... זַרְעֲךָ
  english_pob_choice: my offspring ... your offspring
  chosen_spanish: mi descendencia ... tu descendencia
  alternatives_spanish:
  - mi linaje ... tu linaje
  - mis hijos ... tus hijos
  lexicon: HALOT
  rationale: «Descendencia» comunica bien el valor colectivo de זֶרַע y su alcance genealógico/pactual sin sonar arcaico.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: «Para siempre» es una forma natural y amplia para la duración indefinida del pacto.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» y no sustituirlo por un título.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Fuerza de יִהְיֶה en el juramento
  english_pob_reading: May Yahweh be between me and you
  chosen_spanish_reading: Yahvé estará entre tú y yo
  alternative_spanish_readings:
  - Que Yahvé esté entre tú y yo
  - Yahvé sea entre tú y yo
  rationale: El contexto es juramentario y pactal, pero la forma verbal hebrea mantiene una ambigüedad entre futuro e invocación. Se preserva esa tensión con una traducción futura, sin añadir explícitamente «testigo» en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el auditor inglés actualizado: mantiene «since/puesto que», conserva la fórmula juramentaria, y refleja la decisión revisada de no traducir el imperfecto únicamente como mandato, sino preservar su ambigüedad contextual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se eligió «descendencia» para זֶרַע por ser natural y colectiva en español.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - La puntuación conserva la cita interna y el carácter solemne del juramento.
  - Los marcadores [a] y [b] aparecen exactamente en el texto principal y están anclados al punto pertinente.
