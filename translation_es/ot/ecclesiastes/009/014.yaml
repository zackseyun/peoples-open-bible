translation:
  language: es
  text: Había una ciudad[a] pequeña, y había pocos hombres en ella; y vino contra ella un gran rey, la rodeó y levantó grandes obras de asedio contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “construyó grandes baluartes contra ella” o “construyó grandes rampas de asedio contra ella”. El hebreo מְצוֹדִים puede referirse en general a estructuras o fortificaciones de asedio.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִיר קְטַנָּה
  english_pob_choice: a small city
  chosen_spanish: una ciudad pequeña
  alternatives_spanish:
  - una ciudad chica
  - una ciudad de poco tamaño
  lexicon: HALOT
  rationale: עִיר es 'ciudad' y קְטַנָּה indica tamaño reducido. 'Ciudad pequeña' conserva la sencillez y el contraste retórico con el rey grande sin recurrir a un giro rebuscado.
- source_word: וַאֲנָשִׁים בָּהּ מְעָט
  english_pob_choice: and few men were in it
  chosen_spanish: pocos hombres había en ella
  alternatives_spanish:
  - y pocas personas había en ella
  - y los hombres en ella eran pocos
  lexicon: HALOT
  rationale: אֲנָשִׁים es plural masculino de 'hombre(s)'. Se conserva 'hombres' para mantener la fuerza léxica y la correspondencia de género, y se reordena la frase para que suene natural en español.
- source_word: וּבָא אֵלֶיהָ
  english_pob_choice: came against it
  chosen_spanish: vino contra ella
  alternatives_spanish:
  - vino a ella
  - vino para atacarla
  lexicon: HALOT
  rationale: El contexto militar, reforzado por 'la rodeó' y 'levantó obras de asedio', permite explicitar el valor hostil de בוא + אֶל como 'venir contra'. 'Contra ella' comunica esa dirección bélica sin sobreexplicar.
- source_word: מֶלֶךְ גָּדוֹל
  english_pob_choice: a great king
  chosen_spanish: un rey grande
  alternatives_spanish:
  - un rey poderoso
  - un gran rey
  lexicon: HALOT
  rationale: Se mantiene 'grande' para conservar la correspondencia léxica directa y el contraste formal con 'pequeña' y 'pocos'. En español 'un rey grande' es comprensible y refleja el texto con transparencia.
- source_word: וְסָבַב אֹתָהּ
  english_pob_choice: surrounded it
  chosen_spanish: la rodeó
  alternatives_spanish:
  - la cercó
  - la cercó por completo
  lexicon: HALOT
  rationale: סבב en este contexto de asedio significa rodear o cercar. 'La rodeó' es la forma más natural y clara en español; 'cercó' sería posible, pero menos directo para el lector general.
- source_word: וּבָנָה עָלֶיהָ
  english_pob_choice: and built ... against it
  chosen_spanish: levantó ... contra ella
  alternatives_spanish:
  - construyó ... contra ella
  - edificó ... contra ella
  lexicon: HALOT
  rationale: בנה puede ser 'construir' o 'levantar'. En español, 'levantó' transmite bien la acción de erigir estructuras de asedio y evita una traducción demasiado técnica o pesada.
- source_word: מְצוֹדִים גְּדֹלִים
  english_pob_choice: great siegeworks
  chosen_spanish: grandes obras de asedio
  alternatives_spanish:
  - grandes baluartes
  - grandes rampas de asedio
  - grandes fortificaciones
  lexicon: HALOT
  rationale: מְצוֹדִים puede referirse de manera amplia a estructuras o fortificaciones de asedio. 'Obras de asedio' preserva esa amplitud sin fijar indebidamente un tipo específico de maquinaria o construcción.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo, con la misma secuencia narrativa: ciudad pequeña, pocos hombres, llegada del rey, cerco y construcción de obras de asedio. Se conserva la ambigüedad léxica de מְצוֹדִים mediante una nota alternativa, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el valor masculino de אֲנָשִׁים con 'hombres' para no neutralizar el plural hebreo.
  - '''Obras de asedio'' evita restringir el sentido de מְצוֹדִים a una sola clase de fortificación.'
