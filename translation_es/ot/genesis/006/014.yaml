translation:
  language: es
  text: Hazte un arca de madera de gopher[a]; harás compartimentos[b] en el arca, y la recubrirás[c] por dentro y por fuera con brea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madera de ciprés»; el término hebreo gopher aparece solo aquí, por lo que el tipo exacto de madera es incierto.
    reason: lexical_alternative
  - marker: b
    text: O «nidos» o «celdas»; literalmente, «nidos».
    reason: lexical_alternative
  - marker: c
    text: O «la cubrirás» o «la sellarás» ... con bitumen/asfalto. El hebreo usa palabras relacionadas para el acto de cubrir y para la sustancia de recubrimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּבַת
  english_pob_choice: ark
  chosen_spanish: arca
  alternatives_spanish:
  - caja
  - cofre
  lexicon: HALOT
  rationale: En Génesis 6 el referente es la gran embarcación ordenada a Noé. «Arca» es el equivalente español natural y mantiene la continuidad intertextual con Génesis 6–9, sin perder el carácter distinto del término hebreo frente a «barco» o «nave».
- source_word: עֲצֵי גֹפֶר
  english_pob_choice: gopher wood
  chosen_spanish: madera de gopher
  alternatives_spanish:
  - madera de ciprés
  - madera resinosa
  lexicon: HALOT
  rationale: גֹפֶר es un término raro y de identificación incierta. Mantener «gopher» en español conserva la transparencia auditiva y evita fijar una especie hipotética. «Madera de» expresa el valor de עֲצֵי sin sobreinterpretar la clase de madera.
- source_word: קִנִּים
  english_pob_choice: rooms
  chosen_spanish: compartimentos
  alternatives_spanish:
  - nidos
  - celdas
  - habitaciones
  lexicon: HALOT
  rationale: El sustantivo se relaciona literalmente con «nidos», pero en esta construcción designa divisiones internas del arca. «Compartimentos» comunica bien la función arquitectónica en español y conserva la tensión entre el sentido literal de base y el uso contextual.
- source_word: וְכָפַרְתָּ
  english_pob_choice: cover it
  chosen_spanish: la recubrirás
  alternatives_spanish:
  - la cubrirás
  - la sellarás
  lexicon: HALOT
  rationale: El verbo כפר en este contexto no cultual indica cubrir o recubrir. «Recubrir» suena natural en español y refleja mejor el acto de aplicar una capa protectora. «Sellar» expresa el efecto, pero es más interpretativo.
- source_word: בַּכֹּפֶר
  english_pob_choice: with pitch
  chosen_spanish: con brea
  alternatives_spanish:
  - con pez
  - con asfalto
  - con alquitrán
  lexicon: HALOT
  rationale: En este pasaje כֹּפֶר designa una sustancia de recubrimiento impermeabilizante. «Brea» es clara y tradicional en español bíblico, y funciona bien con el verbo de recubrir. «Asfalto» o «alquitrán» serían más técnicos o más específicos de lo que el hebreo exige.
- source_word: מִבַּיִת וּמִחוּץ
  english_pob_choice: inside and outside
  chosen_spanish: por dentro y por fuera
  alternatives_spanish:
  - en el interior y en el exterior
  - desde dentro y desde fuera
  lexicon: HALOT
  rationale: La pareja preposicional señala ambas superficies del arca. «Por dentro y por fuera» es idiomático en español y conserva la distribución completa de la acción.
- source_word: עֲשֵׂה לְךָ
  english_pob_choice: Make yourself
  chosen_spanish: Hazte
  alternatives_spanish:
  - Haz para ti
  - Constrúyete
  lexicon: HALOT
  rationale: La forma imperativa con לְךָ tiene el matiz de acción dirigida al sujeto en su propio beneficio. «Hazte» es breve, natural y suficientemente fiel sin restringir innecesariamente el verbo hebreo a «construir».
- source_word: תַּעֲשֶׂה אֶת־הַתֵּבָה
  english_pob_choice: make rooms in the ark
  chosen_spanish: harás compartimentos en el arca
  alternatives_spanish:
  - harás compartimentos para el arca
  - harás el arca con compartimentos
  lexicon: HALOT
  rationale: El hebreo literalmente dice «harás el arca nidos/compartimentos», una construcción compacta que en español requiere reexpresión. «Harás compartimentos en el arca» preserva la relación interna sin añadir elementos ajenos al texto.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo masorético de Génesis 6:14 con alta concordancia respecto del audit trail inglés; no hubo revisiones aplicadas en la etapa inglesa y no se detectaron variantes textuales que exigieran nota adicional en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se eligió «arca» para תֵּבָה por continuidad bíblica e inteligibilidad, no por equivalencia con una embarcación moderna.
  - Se evitó «siervo» o «esclavo» porque no corresponden a ninguno de los lexemas de este versículo.
  - 'La puntuación y el orden reflejan una redacción publicable en español sin perder las dos acciones principales: fabricación del arca y recubrimiento impermeabilizante.'
