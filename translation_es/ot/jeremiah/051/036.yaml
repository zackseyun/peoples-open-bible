translation:
  language: es
  text: 'Por tanto, así dice Yahvé: He aquí, defenderé tu causa[a] y tomaré venganza por ti; secaré su mar[b] y secaré su fuente[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «contenderé por tu causa». El hebreo usa un modismo jurídico de litigio: «defenderé tu causa».'
    reason: lexical_alternative
  - marker: b
    text: 'O «su mar». El hebreo personifica a Babilonia en femenino: literalmente, «su mar» = «el mar de ella».'
    reason: lexical_alternative
  - marker: c
    text: O «su manantial» o «su origen».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca una conclusión inferida del contexto previo. «Por tanto» preserva el valor consecutivo con registro digno y natural en español.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - así ha dicho Yahvé
  - así dice el Señor
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera directa. «Yahvé» sigue la terminología del proyecto para יְהוָה.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí yo
  lexicon: HALOT
  rationale: La fórmula deíctica introduce una acción divina inmediata. «He aquí» mantiene el tono profético sin añadir aspecto temporal no explicitado.
- source_word: רָב אֶת רִיבֵךְ
  english_pob_choice: plead your case
  chosen_spanish: defenderé tu causa
  alternatives_spanish:
  - pleitearé tu pleito
  - sostendré tu demanda
  lexicon: HALOT
  rationale: Se trata de un modismo jurídico de disputa. «Defenderé tu causa» comunica bien la imagen forense en español y evita un calco opaco.
- source_word: וְנִקַּמְתִּי אֶת נִקְמָתֵךְ
  english_pob_choice: take vengeance for you
  chosen_spanish: tomaré venganza por ti
  alternatives_spanish:
  - te vengaré
  - ejecutaré tu venganza
  lexicon: HALOT
  rationale: La construcción enfática con la raíz de venganza se vierte con fuerza equivalente. «Tomaré venganza por ti» conserva el valor judicial y personal.
- source_word: וְהַחֲרַבְתִּי
  english_pob_choice: I will dry up
  chosen_spanish: secaré
  alternatives_spanish:
  - dejaré desolado
  - devastaré
  lexicon: HALOT
  rationale: Con los objetos acuáticos del verso, el sentido inmediato es causar que las aguas desaparezcan. «Secaré» reproduce de forma natural el efecto del verbo.
- source_word: אֶת יַמָּהּ
  english_pob_choice: her sea
  chosen_spanish: su mar
  alternatives_spanish:
  - su mar
  - su lago
  lexicon: HALOT
  rationale: El sufijo femenino se conserva como «su» para respetar la personificación de Babilonia. «Mar» mantiene la imagen del texto hebreo.
- source_word: וְהֹבַשְׁתִּי
  english_pob_choice: and dry up
  chosen_spanish: secaré
  alternatives_spanish:
  - haré secar
  - haré que se seque
  lexicon: HALOT
  rationale: El paralelismo verbal pide una segunda forma equivalente en español. Repetir «secaré» refleja bien la duplicación enfática del hebreo.
- source_word: אֶת מְקוֹרָהּ
  english_pob_choice: her fountain
  chosen_spanish: su fuente
  alternatives_spanish:
  - su manantial
  - su pozo
  lexicon: HALOT
  rationale: מָקוֹר puede referirse a fuente, manantial o naciente. «Su fuente» es claro, literario y suficientemente amplio para el contexto.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva el nombre divino con la forma española establecida por el proyecto, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Personificación femenina de Babilonia en los sufijos poseídos
  english_pob_reading: her sea / her fountain
  chosen_spanish_reading: su mar / su fuente
  alternative_spanish_readings:
  - su mar / su manantial
  - su mar / su origen
  rationale: El hebreo usa sufijos femeninos para Babilonia personificada. «Su» conserva esa referencia sin forzar una explicación explícita en el texto principal.
  doctrine_reference: Jeremiah 51 personificación de Babilonia; consistencia con el audit trail en inglés
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo directamente y se reflejó el ajuste del audit trail inglés que eliminó cualquier idea de inminencia añadida («am about to») y prefirió una repetición verbal directa para el cierre acuático del verso.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del nombre divino en el texto principal.
  - Se prefirió un español bíblico claro y contemporáneo, evitando calcos como «pleitear tu pleito» o «hacer desolado» donde el contexto acuático pide «secar».
  - Se conservó la personificación femenina de Babilonia mediante los posesivos «su», sin sobreexplicar en el cuerpo del versículo.
