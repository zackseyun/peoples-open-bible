translation:
  language: es
  text: Y envió[a] y convocó a todos los nobles de Persia y de Media, y a los sátrapas, los generales, los gobernadores de distrito[b] y los gobernadores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo enviado, llamó»; el participio griego puede describir explícitamente el envío previo de mensajeros antes de realizar la convocatoria.
    reason: lexical_alternative
  - marker: b
    text: «Toparcas» designa a gobernantes sobre distritos o regiones locales.
    reason: cultural_note
  - marker: c
    text: El término final también puede traducirse «cónsules» o, más literalmente en algunos contextos, «altos oficiales»; aquí se vierte según el marco administrativo persa, no como título romano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαποστείλας
  english_pob_choice: he sent out
  chosen_spanish: envió
  alternatives_spanish:
  - habiendo enviado
  - despachó mensajeros
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción previa de envío; en español, «envió» conserva la secuencia narrativa con naturalidad. La nota marcada aclara la alternativa participial sin sobrecargar el texto principal.
- source_word: ἐκάλεσεν
  english_pob_choice: summoned
  chosen_spanish: convocó
  alternatives_spanish:
  - llamó
  - invitó
  lexicon: LSJ
  rationale: En un contexto real y administrativo, «convocó» comunica mejor la idea de reunir por autoridad que «llamó», y evita la suavización de «invitó».
- source_word: μεγιστᾶνας
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - magnates
  - grandes
  - príncipes
  lexicon: LSJ
  rationale: Designa a los grandes de alto rango; «nobles» es claro, solemne y fiel al peso social del término sin volverlo demasiado técnico.
- source_word: σατράπας
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  lexicon: LSJ
  rationale: Se mantiene el título persa específico para preservar el marco histórico y administrativo del pasaje.
- source_word: στρατηγοὺς
  english_pob_choice: generals
  chosen_spanish: los generales
  alternatives_spanish:
  - los comandantes
  lexicon: LSJ
  rationale: En esta lista de autoridades, «generales» es la equivalencia directa más transparente para líderes militares.
- source_word: τοπάρχας
  english_pob_choice: local rulers
  chosen_spanish: los gobernadores de distrito
  alternatives_spanish:
  - los gobernantes locales
  - los toparcas
  lexicon: LSJ
  rationale: El término alude a gobernantes de una región o distrito; «gobernadores de distrito» aclara su ámbito sin recurrir al tecnicismo opaco «toparcas».
- source_word: ὑπάτους
  english_pob_choice: governors
  chosen_spanish: los gobernadores
  alternatives_spanish:
  - los cónsules
  - los altos oficiales
  lexicon: LSJ
  rationale: Aunque el término puede significar «cónsules» en otros contextos, aquí la lista persa favorece una función civil superior más que un cargo romano; «gobernadores» refleja esa decisión contextual.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y coincide con el audit trail inglés en la interpretación de la secuencia participial y de la lista de cargos persas. Se conserva la tensión lexical entre el posible valor técnico de ciertos títulos y su función contextual en la corte persa, evitando romanizar ὑπάτους o neutralizar σατράπας.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «sátrapas» como préstamo histórico consistente con el tono administrativo del pasaje.
  - «Gobernadores de distrito» evita la opacidad de «toparcas» en el texto principal, mientras la nota preserva el término cultural.
  - La puntuación enumera con comas coordinadas en estilo español natural, sin alterar la estructura acumulativa del original.
