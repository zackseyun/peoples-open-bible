translation:
  language: es
  text: Y él envió a los jóvenes de los hijos de Israel[a], y ellos ofrecieron holocaustos y sacrificaron a Yahvé sacrificios de comunión[b] de novillos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los jóvenes de los israelitas».
    reason: lexical_alternative
  - marker: b
    text: O «sacrificios de paz», o «sacrificios de bienestar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El hebreo narra la acción con un verbo simple de envío. En español, «envió» comunica de manera natural y fiel la acción sin añadir matiz militar o administrativo.
- source_word: נַעֲרֵי בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the young men of the sons of Israel
  chosen_spanish: los jóvenes de los hijos de Israel
  alternatives_spanish:
  - los jóvenes de los israelitas
  - los muchachos de los hijos de Israel
  lexicon: HALOT
  rationale: נַעַר puede referirse a jóvenes/varones jóvenes. Se conserva la cadena constructa «de los hijos de Israel» para reflejar con precisión la forma hebrea y su referencia masculina gramatical.
- source_word: וַיַּעֲלוּ עֹלֹת
  english_pob_choice: they offered up burnt offerings
  chosen_spanish: ofrecieron holocaustos
  alternatives_spanish:
  - ofrecieron sacrificios de ascensión
  - elevaron holocaustos
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio que se quema por completo; en español bíblico contemporáneo, «holocausto» es el término tradicional y reconocible. Se mantiene el sentido sacrificial sin calco pesado.
- source_word: וַיִּזְבְּחוּ
  english_pob_choice: and sacrificed
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - inmolaron
  - ofrecieron sacrificios
  lexicon: HALOT
  rationale: En contexto cultual, זבח significa sacrificar. «Sacrificaron» es directo y conserva el paralelismo con la acción anterior.
- source_word: זְבָחִים שְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: sacrificios de comunión
  alternatives_spanish:
  - sacrificios de paz
  - ofrendas de comunión
  - sacrificios de bienestar
  lexicon: HALOT
  rationale: Se opta por «sacrificios de comunión» para expresar el valor relacional y compartido de שְׁלָמִים en un español natural, sin perder la categoría sacrificial. Se preserva la posibilidad tradicional de «sacrificios de paz» como alternativa interpretativa.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'Se sigue el estándar del proyecto para el nombre divino en español: «Yahvé». La preposición «a» refleja adecuadamente la dirección cultual de la ofrenda en español.'
- source_word: פָּרִים
  english_pob_choice: of bulls
  chosen_spanish: novillos
  alternatives_spanish:
  - toros
  - bueyes
  lexicon: HALOT
  rationale: פָּרִים designa bovinos jóvenes aptos para sacrificio. «Novillos» comunica bien la especie sacrificial en español y fluye mejor que una construcción literal «de toros».
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto exige transliterar el Tetragrámaton como «Yahvé» en el texto principal, preservando el nombre del pacto sin la convención de ocultamiento por mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: בְּנֵי יִשְׂרָאֵל como expresión masculina y representativa
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina y genealógica del hebreo en el texto principal. La alternativa más idiomática queda implícita en la decisión léxica, pero no sustituye la forma fuente sin razón textual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: זְבָחִים שְׁלָמִים como categoría sacrificial
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de comunión
  alternative_spanish_readings:
  - sacrificios de paz
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: La categoría שְׁלָמִים conserva una dimensión de comunión, plenitud y relación con Dios. «Sacrificios de comunión» evita una traducción que suene demasiado abstracta o exclusivamente emotiva, y mantiene el carácter técnico-sacrificial.
  doctrine_reference: HALOT; uso cultual de שְׁלָמִים
translation_notes:
  revision_awareness: El audit trail inglés muestra alta concordancia y sin revisiones aplicadas. La principal adaptación al español fue resolver la categoría ritual שְׁלָמִים con un equivalente natural y técnico («sacrificios de comunión») manteniendo, en nota, las alternativas semánticas preservadas por el POB en inglés. También se ajustó la referencia a פָּרִים con un sustantivo más idiomático en español («novillos»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva el orden narrativo del hebreo sin añadir sujetos u objetos no presentes.
  - «Holocaustos» se usa como equivalente tradicional y reconocido de עֹלֹת.
  - «Sacrificios de comunión» se emplea como término principal para שְׁלָמִים, con alternativas en nota.
  - La expresión «los hijos de Israel» refleja la forma hebrea masculina y constructa.
