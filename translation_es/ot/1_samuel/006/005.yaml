review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y el rastro de auditoría POB: imágenes de los tumores, imágenes de los ratones, dar gloria al Dios de Israel, y la esperanza de que él quite el peso de su mano de ellos, de sus dioses y de su tierra. También preserva correctamente la nota léxica sobre עפלים. Sin embargo, hay un desajuste puntual con la decisión léxica auditada para עכברים: el inglés POB eligió ''mice'', no ''rats''. En español, el borrador registra ''ratones'' en las decisiones léxicas pero el texto principal dice ''ratones'' correctamente? Sí, pero el problema real es de naturalidad en la conjunción ''e imágenes'', que no es necesaria antes de ''imágenes'', y sobre todo la frase relativa ''que están devastando la tierra'' puede interpretarse como modificando solo a ''ratones''; eso es aceptable, pero conviene mantenerlo claro. El punto principal a reparar es la expresión ''de sobre ustedes'', que aunque auditivamente cercana al hebreo,
    suena forzada en español; ''de encima de ustedes'' conserva mejor la imagen sin perder fidelidad. Asimismo, para paralelismo debe ajustarse en las tres ocurrencias.'
  spanish_quality_summary: El español es mayormente claro y digno, pero contiene una literalidad algo rígida en 'de sobre ustedes / de sobre sus dioses / de sobre su tierra'. En español bíblico moderno, 'de encima de' comunica mejor la metáfora del peso de la mano sin sonar calcado. El resto del versículo es legible. 'Así que hagan' funciona bien; 'tumores' con nota es correcto; 'den gloria' es idiomático; 'Quizá' es adecuado.
  glossary_alignment: 'No hay conflicto con los términos de proyecto: ''Dios'' está bien; no hay ocurrencias de Yahvé, Mesías, etc. Se preserva ''su mano'' según la decisión teológica auditada. La nota sobre ''hemorroides'' mantiene la ambigüedad léxica documentada. La revisión propuesta no altera terminología teológica, solo mejora la naturalidad española del giro preposicional repetido.'
  issues:
  - severity: medium
    issue: 'Giro preposicional demasiado calcado: ''de sobre ustedes / de sobre sus dioses / de sobre su tierra'''
    rationale: Aunque refleja la estructura hebrea, en español suena poco natural. 'De encima de' conserva la imagen de una carga retirada y mejora la legibilidad sin borrar el paralelismo repetido.
  - severity: low
    issue: Conjunción eufónica 'e imágenes' innecesaria
    rationale: Antes de 'imágenes' no se requiere 'e'; 'y imágenes' es la forma normal y más transparente en español.
  revised_spanish_text: Así que hagan imágenes de sus tumores[a] y imágenes de sus ratones que están devastando la tierra, y den gloria al Dios de Israel. Quizá él aligere su mano de encima de ustedes, de encima de sus dioses y de encima de su tierra.
  revised_footnotes:
  - marker: a
    text: O «hemorroides». El hebreo se refiere a hinchazones o tumores corporales; la traducción tradicional más específica es posible, pero no segura.
    reason: lexical_alternative
  revision_rationale: 'Se hacen ajustes menores de estilo y fidelidad funcional al español: se sustituye el calco rígido ''de sobre'' por ''de encima de'' en las tres repeticiones, preservando la metáfora de la mano pesada que se retira, y se normaliza la conjunción a ''y imágenes''. No se cambia el contenido semántico ni las decisiones teológicas/lexicales principales.'
