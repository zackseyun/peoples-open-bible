translation:
  language: es
  text: el bálsamo y el aceite para la luz[a], y para el aceite de la unción y para el incienso de especias[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la especia» o «la sustancia aromática» para הַבֹּשֶׂם.
    reason: lexical_alternative
  - marker: b
    text: O «el incienso aromático» para «el incienso de especias».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֹּשֶׂם
  english_pob_choice: the balsam
  chosen_spanish: el bálsamo
  alternatives_spanish:
  - la especia
  - la sustancia aromática
  - el perfume
  - el bálsamo aromático
  lexicon: HALOT
  rationale: בֹּשֶׂם designa una sustancia aromática, especia o bálsamo. En este inventario de materiales del tabernáculo, «el bálsamo» conserva el valor concreto de una sustancia aromática, sin volverlo demasiado genérico como «especia» ni demasiado abstracto como «perfume».
- source_word: הַשָּׁמֶן
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el aceite de oliva
  lexicon: HALOT
  rationale: שֶׁמֶן es el término ordinario para aceite. «Aceite de oliva» es posible culturalmente, pero el hebreo no especifica oliva aquí, así que «el aceite» es más fiel al dato textual.
- source_word: לְמָאוֹר
  english_pob_choice: for the light
  chosen_spanish: para la luz
  alternatives_spanish:
  - para alumbrar
  - para la lámpara
  - para iluminación
  lexicon: HALOT
  rationale: מָאוֹר puede significar luz o luminaria. En esta lista de provisiones cultuales, «para la luz» mantiene la referencia funcional sin sobreespecificar una lámpara singular que el hebreo no nombra.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - el aceite para ungir
  - el aceite de ungimiento
  lexicon: HALOT
  rationale: La construcción constructa hebrea es la fórmula cultual estándar para el aceite sagrado de ungir. «El aceite de la unción» preserva ese valor y sigue siendo natural en español.
- source_word: קְטֹרֶת הַסַּמִּים
  english_pob_choice: the incense of spices
  chosen_spanish: el incienso de especias
  alternatives_spanish:
  - el incienso aromático
  - el incienso de aromas
  - el incienso de perfumes
  lexicon: HALOT
  rationale: קְטֹרֶת es incienso y סַמִּים son especias aromáticas. «El incienso de especias» mantiene visibles ambos sustantivos y refleja la estructura hebrea sin convertirla en un adjetivo libre.
- source_word: וְאֶת ... וְאֶת ... וּלְ ... וְלִ
  english_pob_choice: and ... and ... and for ... and for
  chosen_spanish: y ... y ... y para ... y para
  alternatives_spanish:
  - con ... con ... para ... para
  lexicon: syntax
  rationale: La serie con conjuntivos y marcadores de objeto muestra la continuación de una lista itemizada de ofrendas. En español se conserva con repeticiones de «y» y «para», manteniendo el ritmo enumerativo del hebreo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el cotejo externo reporta alta concordancia con solo observaciones menores; por ello se mantiene una solución española cercana al audit trail inglés, pero ajustada a la naturalidad idiomática del español y al valor concreto de los sustantivos hebreos.
  spanish_consistency_notes:
  - Se prefirió «aceite» y no «óleo» para mantener registro neutral y contemporáneo, coherente con el uso bíblico básico de שֶׁמֶן.
  - Se mantuvo «bálsamo» como equivalente concreto de בֹּשֶׂם, con nota de alternativas por la amplitud semántica del hebreo.
  - La lista conserva paralelismo sintáctico para reflejar la acumulación de materiales en el texto fuente.
