  text: 'Woe to you[a], scribes and Pharisees, hypocrites! For you tithe mint and dill and cumin, and have neglected the weightier matters of the law: justice and mercy and faith. These you ought to have done, without neglecting the others.'
  footnotes:
  - marker: a
    text: Or 'faithfulness.' The Greek word can denote faith, trust, or fidelity; in this ethical context many understand it as covenant faithfulness.
    reason: alternative_reading
