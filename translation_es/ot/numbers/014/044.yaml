revisions:
- from: Pero ellos presumieron subir[a] al cerro, aunque el arca del pacto de Yahvé[b] y Moisés no se movieron de en medio del campamento.
  to: Pero ellos subieron con presunción[a] a la cima del monte, mientras que el arca del pacto de Yahvé[b] y Moisés no se movieron de en medio del campamento.
  rationale: Se revisa para reflejar con mayor fidelidad רֹאשׁ הָהָר como 'la cima del monte', mejorar la naturalidad del español en וַיַּעְפִּלוּ mediante 'subieron con presunción', y corregir la nota b para que preserve una alternativa sintáctica real en español en lugar de repetir la misma frase.
