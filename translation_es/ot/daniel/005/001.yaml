translation:
  language: es
  text: El rey Belsasar hizo un gran banquete[a] para mil de sus nobles, y, en presencia de los mil, estaba bebiendo vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y delante de los mil bebía vino». La expresión aramea puede traducirse más literalmente con «delante de», pero aquí probablemente indica que bebía públicamente, en presencia de los mil invitados.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכָּא
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey Belsasar
  - rey
  lexicon: HALOT
  rationale: El sustantivo arameo en estado enfático funciona en aposición con el nombre propio; en español, «el rey Belsasar» es natural y conserva el orden idiomático sin perder el valor titular.
- source_word: עֲבַד
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - preparó
  - celebró
  - organizó
  lexicon: HALOT
  rationale: El verbo básico significa ‘hacer’. En el contexto del banquete, «hizo» mantiene la literalidad de la acción sin imponer una paráfrasis más interpretativa.
- source_word: לְחֶם רַב
  english_pob_choice: a great feast
  chosen_spanish: un gran banquete
  alternatives_spanish:
  - una gran fiesta
  - un gran festín
  - una gran comida
  lexicon: HALOT
  rationale: Aunque el valor literal de לְחֶם es ‘pan/comida’, aquí designa una comida festiva de corte. «Banquete» comunica bien ese sentido en español y conserva el matiz de grandeza de רַב.
- source_word: לְרַבְרְבָנֹוהִי
  english_pob_choice: for ... his nobles
  chosen_spanish: para ... sus nobles
  alternatives_spanish:
  - para ... sus grandes señores
  - para ... sus grandes hombres
  - para ... sus dignatarios
  lexicon: HALOT
  rationale: «Nobles» reproduce de manera concisa el grupo de altos funcionarios o grandes del reino, sin introducir una especificidad feudal ajena al contexto.
- source_word: אֲלַף
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - un millar
  - mil personas
  lexicon: HALOT
  rationale: Número cardinal directo; «mil» es la forma natural en español y preserva la precisión cuantitativa.
- source_word: וְלָקֳבֵל
  english_pob_choice: in the presence of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - delante de
  - ante
  - frente a
  lexicon: HALOT
  rationale: La expresión puede significar ‘delante de/en frente de/en presencia de’. Aquí el contexto sugiere bebida pública ante los invitados, por eso «en presencia de» comunica la fuerza social de la escena.
- source_word: חַמְרָא
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino tinto
  - licor
  lexicon: HALOT
  rationale: Término arameo estándar para vino; «vino» es la equivalencia directa y natural.
- source_word: שָׁתֵה
  english_pob_choice: he was drinking
  chosen_spanish: estaba bebiendo
  alternatives_spanish:
  - bebía
  - estaba tomando
  lexicon: HALOT
  rationale: La forma verbal participial expresa acción continua. «Estaba bebiendo» preserva mejor ese aspecto progresivo que un pretérito simple.
translation_notes:
  revision_awareness: 'Coincidencia alta con el audit trail inglés: se preservan las decisiones clave de ‘made’, ‘great feast’, ‘in the presence of’ y el aspecto progresivo de ‘was drinking’. No se documentan revisiones textuales adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y publicable, con vocabulario de corte (‘rey’, ‘nobles’, ‘banquete’).
  - Se evitó ‘SEÑOR’ u այլ masking porque no hay aquí el Tetragrámaton ni un caso de κύριος.
  - La nota de pie conserva la alternativa literal de וְלָקֳבֵל, que en español también puede ser ‘delante de’.
