    reason: lexical_alternative
  - marker: c
    text: 'La frase «porque había hablado con él» también puede entenderse temporalmente: «cuando habló con él».'
    reason: alternative_reading
  - marker: d
    text: Es decir, con Yahvé.
    reason: alternative_reading
  revision_rationale: Se ajustó la sintaxis española para reflejar mejor el marco temporal del hebreo con una formulación más natural («descendió ... al bajar»), y se restauró la nota fuente importante sobre la ambigüedad temporal/causal de בְּדַבְּרוֹ. También se reordenaron los anclajes de notas para que correspondan exactamente a los puntos relevantes del texto.
