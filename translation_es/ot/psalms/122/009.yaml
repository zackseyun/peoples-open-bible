translation:
  language: es
  text: Por amor de la casa de Yahvé nuestro Dios, buscaré tu bien[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «buscaré tu bienestar» o «buscaré prosperidad para ti». El hebreo «bien» aquí se refiere al bienestar de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: For the sake of
  chosen_spanish: Por causa de
  alternatives_spanish:
  - Por amor de
  - A causa de
  lexicon: HALOT
  rationale: La preposición expresa motivo o propósito. «Por causa de» conserva bien el valor causal/motivacional del hebreo en español natural y solemne.
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el templo de
  lexicon: HALOT
  rationale: Se mantiene «casa» para respetar la expresión hebrea y su resonancia pactual; en contexto alude al templo, pero la literalidad semántica es importante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» conserva el nombre propio del pacto, en vez de una sustitución litúrgica.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: La construcción posesiva de primera persona plural se rinde de forma directa y natural en español.
- source_word: אֲבַקְשָׁה
  english_pob_choice: I will seek
  chosen_spanish: buscaré
  alternatives_spanish:
  - procuraré
  - buscaré con empeño
  lexicon: HALOT
  rationale: El forma cohortativa/imperfecta expresa determinación. En este contexto, «buscaré» comunica bien la intención resuelta sin sobreexplicar.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: tu bien
  alternatives_spanish:
  - tu bienestar
  - tu prosperidad
  lexicon: HALOT
  rationale: «Bien» conserva la amplitud semántica de טוֹב y funciona naturalmente en español para el bienestar de Jerusalén. Se evita restringirlo solo a prosperidad material.
- source_word: לָךְ
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - para ti
  - de ti
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere a Jerusalén. En español, el posesivo «tu» da una frase más natural que una construcción preposicional.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se preserva el nombre del pacto como forma principal en español, conforme a la política del proyecto y sin masking litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de טוֹב en el contexto de Jerusalén
  english_pob_reading: good / welfare / prosperity
  chosen_spanish_reading: bien
  alternative_spanish_readings:
  - bienestar
  - prosperidad
  rationale: El audit trail inglés señala que «good» apunta al bienestar de Jerusalén. «Bien» mantiene la amplitud semántica y evita reducir el sentido a prosperidad económica.
  doctrine_reference: Lexical note in English POB footnote a
translation_notes:
  revision_awareness: No hubo cambios en la última pasada editorial del antecedente inglés; el consenso de revisión fue alto y sin objeciones. Esta versión española sigue ese estado estable, conservando la decisión principal y la nota lexical alternativa sobre טוֹב.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para YHWH en el texto principal.
  - Se conserva «casa» y no «templo» para reflejar el hebreo בֵּית sin perder el trasfondo cultual.
  - «Tu bien» se integra en un español fluido y respeta la amplitud de טוֹב.
  - La nota al pie usa alternativas que corresponden al audit trail inglés y aclaran el alcance semántico.
