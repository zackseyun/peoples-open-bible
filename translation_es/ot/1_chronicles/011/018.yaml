  yaml_path: translation/ot/1_chronicles/011/018.yaml
  text: So the three broke through into the camp of the Philistines and drew water from the well of Bethlehem that was by the gate[a], and carried it and brought it to David. But David was not willing to drink it; instead, he poured it out to Yahweh.
  footnotes:
