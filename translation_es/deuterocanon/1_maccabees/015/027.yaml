translation:
  language: es
  text: Y no quiso aceptarlos, sino que rechazó[a] todo lo que antes había convenido con él, y se distanció de él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «puso a un lado» o «anuló» todo lo que antes había convenido con él.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se volvió ajeno a él» o «se alienó de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠβούλετο
  english_pob_choice: was willing
  chosen_spanish: quiso
  alternatives_spanish:
  - estuvo dispuesto
  - era su voluntad
  lexicon: BDAG
  rationale: El imperfecto medio de βούλομαι expresa disposición o voluntad sostenida. En español, «quiso» comunica de manera natural la negativa de voluntad en este contexto; «estuvo dispuesto» también sería posible, pero suena más marcado y menos directo.
- source_word: αὐτὰ
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - estas cosas
  - eso
  lexicon: BDAG
  rationale: El pronombre neutro plural remite a los términos o propuestas ya mencionados. En español, el clítico «los» mantiene la referencia anafórica sin precisar más de lo que el verso permite.
- source_word: δέξασθαι
  english_pob_choice: accept
  chosen_spanish: recibir
  alternatives_spanish:
  - aceptar
  - tomar
  lexicon: BDAG
  rationale: Aunque «aceptar» sería muy natural, «recibir» conserva mejor la amplitud del griego δέξασθαι y permite que el rechazo abarque lo ofrecido o enviado en el contexto diplomático.
- source_word: ἠθέτησεν
  english_pob_choice: rejected
  chosen_spanish: invalidó
  alternatives_spanish:
  - rechazó
  - puso a un lado
  - anuló
  lexicon: BDAG
  rationale: ἀθετέω puede significar poner a un lado o anular. «Invalidó» refleja con fuerza la idea de dejar sin efecto lo previamente acordado, sin reducirlo solo a una negativa emocional. El español mantiene así la tensión jurídica/diplomática del verbo.
- source_word: πάντα ὅσα συνέθετο
  english_pob_choice: everything that he had previously agreed to
  chosen_spanish: todo lo que antes había convenido
  alternatives_spanish:
  - todo lo que antes había acordado
  - todos los términos que había establecido antes
  lexicon: BDAG
  rationale: συντίθημι en voz media puede referirse a hacer un acuerdo. «Había convenido» conserva el sentido de pacto o arreglo previo, y «todo» reproduce la fuerza comprehensiva de πάντα.
- source_word: τὸ πρότερον
  english_pob_choice: previously
  chosen_spanish: antes
  alternatives_spanish:
  - previamente
  - anteriormente
  lexicon: BDAG
  rationale: El acusativo adverbial señala tiempo anterior. «Antes» es la forma más natural y compacta en español.
- source_word: ἠλλοτριοῦτο
  english_pob_choice: became estranged
  chosen_spanish: se apartó
  alternatives_spanish:
  - se alienó
  - se volvió extraño
  - se distanció
  lexicon: LSJ
  rationale: El verbo expresa volverse ajeno o quedar alienado. «Se apartó de él» transmite la ruptura relacional de manera clara y sobria; también deja abierta la intensidad del alejamiento sin convertirla en hostilidad explícita.
- source_word: αὐτῷ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - con él
  - respecto de él
  lexicon: BDAG
  rationale: Con un verbo de extrañamiento, el dativo se expresa naturalmente en español como «de él», indicando separación relacional.
