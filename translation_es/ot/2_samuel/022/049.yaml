translation:
  language: es
  text: que me saca[a] de mis enemigos; me exalta por encima de los que se levantan contra mí; me libra del hombre violento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y me saca de mis enemigos»; la conjunción hebrea inicial puede expresarse explícitamente en español.
    reason: lexical_alternative
  - marker: b
    text: O «de un hombre de violencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמוֹצִיאִי
  english_pob_choice: who brings me out
  chosen_spanish: me sacas
  alternatives_spanish:
  - y me sacas
  - me libras
  lexicon: HALOT
  rationale: La forma causativa de יצא/הוציא expresa sacar o hacer salir. En español, «me sacas» conserva la imagen concreta y el movimiento del verbo mejor que una generalización como «me libras». Omitir explícitamente la conjunción inicial es natural en español poético, aunque «y me sacas» sigue siendo posible.
- source_word: מֵאֹיְבָי
  english_pob_choice: from my enemies
  chosen_spanish: de mis enemigos
  alternatives_spanish:
  - de entre mis enemigos
  - fuera de mis enemigos
  lexicon: HALOT
  rationale: La preposición con sufijo posesivo se expresa de manera natural como «de mis enemigos». «De entre» añadiría matiz no exigido por el hebreo, y «fuera de» suena menos natural en español.
- source_word: וּמִקָּמַי
  english_pob_choice: those who rise against me
  chosen_spanish: los que se levantan contra mí
  alternatives_spanish:
  - mis adversarios
  - los que se alzan contra mí
  lexicon: HALOT
  rationale: קום en sentido hostil conserva la imagen de levantarse contra alguien. «Los que se levantan contra mí» mantiene esa fuerza verbal mejor que «mis adversarios», aunque «se alzan» también sería una alternativa válida.
- source_word: תְּרוֹמְמֵנִי
  english_pob_choice: you exalt me above
  chosen_spanish: me exaltas
  alternatives_spanish:
  - me alzas en alto
  - me pones en alto
  lexicon: HALOT
  rationale: רום en causativo comunica elevación y supremacía. En español, «me exaltas» conserva el sentido de elevar y honrar por encima de los enemigos; añadir «sobre» en la misma cláusula puede repetirse innecesariamente porque el complemento siguiente ya expresa la oposición.
- source_word: מֵאִישׁ חֲמָסִים
  english_pob_choice: from the violent man
  chosen_spanish: del hombre violento
  alternatives_spanish:
  - de un hombre de violencia
  - del hombre de violencia
  lexicon: HALOT
  rationale: El hebreo usa singular con una cualidad de violencia. «Hombre violento» preserva la singularidad y resulta idiomático en español; «hombre de violencia» es más literal pero menos natural.
- source_word: תַּצִּילֵנִי
  english_pob_choice: you deliver me
  chosen_spanish: me libras
  alternatives_spanish:
  - me rescatas
  - me salvas
  lexicon: HALOT
  rationale: נצל puede traducirse como librar, rescatar o salvar. «Me libras» funciona bien en español bíblico contemporáneo y encaja con el registro poético; evita el posible solapamiento semántico con «salvar» en contextos donde la liberación concreta es el énfasis.
translation_notes:
  revision_awareness: Se tuvo en cuenta el alto grado de acuerdo del control cruzado y su observación de asunto menor. La redacción mantiene la línea semántica del hebreo y de la POB inglesa, con ajustes naturales para el español sin introducir paráfrasis no sustentadas.
  spanish_consistency_notes:
  - Se usa el tratamiento directo «tú» porque el verso continúa la dirección a Dios en segunda persona.
  - Se mantiene el tono poético y la secuencia de acciones de liberación/elevación/liberación final.
  - Se evita «SEÑOR» para el tetragrámaton en coherencia con el estándar del proyecto, aunque este versículo no lo contiene explícitamente.
