review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego en la mayor parte del versículo: «Escucha mi súplica», «vuelve nuestro duelo en alegría», «cantemos alabanzas a tu nombre», «no destruyas la boca de los que te alaban» y «la muerte estaba ante sus ojos» reflejan bien el texto fuente y el rastro inglés. Sin embargo, hay dos desajustes importantes: (1) la nota [b] está anclada en «sus fuerzas», pero su contenido explica la cláusula final sobre «la muerte estaba ante sus ojos»; y (2) «a tu suerte» para τῷ κλήρῳ σου, aunque muy literal, suena en español moderno como azar/fortuna y no preserva bien el sentido de porción/heredad/pueblo asignado que el propio expediente inglés documenta como trasfondo semántico principal.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «sé favorable a tu suerte» resulta poco natural y potencialmente confuso en registro eclesial general. Además, la nota mal ubicada crea una lectura defectuosa. Conviene ajustar κλήρῳ a una forma más inteligible en español sin perder cercanía léxica, y reanclar la nota a la cláusula correcta.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Señor» para κύριε en este testimonio griego es apropiado; no hay conflicto con Yahvé. «Cantemos alabanzas» preserva bien ὑμνῶμεν. La principal excepción es κλῆρος: «suerte» en español tiende a desviar hacia ''luck'', por lo que «heredad» comunica mejor la porción/posesión pactual sin sobreexpandir demasiado. También debe corregirse la gestión de la nota [b].'
  issues:
  - severity: high
    issue: La nota [b] está anclada en la frase equivocada.
    rationale: En el texto aparece después de «con todas sus fuerzas», pero la nota explica literalmente «la muerte estaba ante sus ojos». Esto rompe la correspondencia obligatoria entre ancla y contenido de la nota.
  - severity: medium
    issue: «a tu suerte» para τῷ κλήρῳ σου suena engañoso en español actual.
    rationale: Aunque κλῆρος puede significar literalmente 'suerte/lote', en español bíblico y general «tu suerte» se entiende fácilmente como fortuna o destino. El contexto pide la idea de porción/heredad/pueblo perteneciente a Dios.
  - severity: low
    issue: «vuelve nuestro duelo en alegría» es comprensible pero menos idiomático que una opción con «convierte».
    rationale: No es infiel, pero una formulación más natural mejora la legibilidad sin perder el motivo de reversión.
