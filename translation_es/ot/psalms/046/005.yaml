  rationale: Se reemplazó «el santo lugar de moradas del Altísimo» por «las santas moradas del Altísimo» para reflejar con más fidelidad y naturalidad el plural hebreo מִשְׁכְּנֵי, mantener la aposición con «la ciudad de Dios» y evitar una construcción española artificiosa. También se ajustó la nota alternativa de apertura para que recoja la opción completa documentada y se reubicaron los anclajes de las notas.
