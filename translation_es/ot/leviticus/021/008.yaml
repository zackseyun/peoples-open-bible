translation:
  language: es
  text: Lo tratarás como santo[a], porque ofrece el alimento de tu Dios. Santo será para ti, porque santo soy yo, Yahvé, el que los santifica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pan de tu Dios». Aquí «pan» probablemente se refiere de manera más amplia a las ofrendas de alimento presentadas a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתּוֹ
  english_pob_choice: You shall treat him as holy
  chosen_spanish: Lo tratarás como santo
  alternatives_spanish:
  - lo santificarás
  - lo consagrarás
  - lo considerarás santo
  lexicon: HALOT
  rationale: El piel de קדשׁ con objeto directo expresa hacer/considerar santo o apartar como santo. En español, «tratar como santo» mantiene el valor exhortativo y relacional, y evita un tecnicismo que podría sonar menos natural en este contexto sacerdotal.
- source_word: לֶחֶם אֱלֹהֶיךָ
  english_pob_choice: the food of your God
  chosen_spanish: el alimento de tu Dios
  alternatives_spanish:
  - el pan de tu Dios
  - las ofrendas de tu Dios
  lexicon: HALOT
  rationale: לֶחֶם puede significar «pan», pero aquí el contexto cultual apunta a comida/ofrenda presentada a Dios. «Alimento» conserva el sentido amplio sin limitarlo a pan literal, siguiendo la decisión auditada del POB en inglés.
- source_word: מַקְרִיב
  english_pob_choice: he offers
  chosen_spanish: ofrece
  alternatives_spanish:
  - presenta
  - acerca
  lexicon: HALOT
  rationale: El participio hifil de קרב en lenguaje sacrificial significa ofrecer o presentar una ofrenda. «Ofrece» es el equivalente más natural en español y mantiene la fuerza cultual del verbo.
- source_word: קָדֹשׁ יִהְיֶה לָּךְ
  english_pob_choice: He shall be holy to you
  chosen_spanish: Santo será para ti
  alternatives_spanish:
  - Será santo para ti
  - Será consagrado para ti
  - Te será santo
  lexicon: HALOT
  rationale: La repetición de la raíz קדשׁ se conserva con «santo». El orden «Santo será para ti» suena solemne y fiel al hebreo, sin introducir una paráfrasis innecesaria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración de יְהוָה, conforme al principio del proyecto y al valor de nombre propio que documenta el POB en inglés.
- source_word: מְקַדִּשְׁכֶם
  english_pob_choice: who sanctify you
  chosen_spanish: el que te santifica
  alternatives_spanish:
  - el que los santifica
  - el que os santifica
  - el que te hace santo
  lexicon: HALOT
  rationale: El participio preserva la acción continua o característica de Yahvé como santificador. En segunda persona singular, «te santifica» mantiene la correspondencia directa con el hebreo y la cohesión léxica con קדשׁ.
theological_decisions:
- issue: Hebreo cultual לֶחֶם אֱלֹהֶיךָ
  english_pob_reading: the food of your God
  chosen_spanish_reading: el alimento de tu Dios
  alternative_spanish_readings:
  - el pan de tu Dios
  - la comida de tu Dios
  rationale: El versículo habla del servicio sacerdotal en relación con las ofrendas. «Alimento» evita estrechar el sentido a pan literal y conserva la amplitud cultual que el POB documenta en inglés.
  doctrine_reference: Translation philosophy §5
- issue: Repetición de קדשׁ en el versículo
  english_pob_reading: holy / sanctify
  chosen_spanish_reading: santo / santifica
  alternative_spanish_readings:
  - santo / consagra
  - consagrado / santifica
  - separado / santifica
  rationale: Se preserva la relación verbal y temática entre el deber de tratar al sacerdote como santo y la santidad de Yahvé como fundamento. «Santo» y «santifica» mantienen esa conexión sin diluirla.
  doctrine_reference: Translation philosophy §5
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se evita la sustitución por un título y se conserva el nombre propio revelado, conforme a la política terminológica del proyecto y a la decisión auditada en inglés.
  doctrine_reference: Project terminology default
translation_notes:
  revision_awareness: Se siguió el pasaje auditado en inglés sin cambios de revisión pendientes; la traducción española conserva la repetición de קדשׁ, el valor cultual de לֶחֶם y el nombre divino Yahvé, en armonía con la última pasada de revisión marcada como sin cambios.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la raíz de santidad con «santo/santifica» para reflejar el hebreo קדשׁ.
  - «Alimento» se emplea en sentido cultual, no cotidiano, para לֶחֶם אֱלֹהֶיךָ.
  - La nota al pie marca la alternativa «pan» como lectura léxica válida pero más estrecha.
