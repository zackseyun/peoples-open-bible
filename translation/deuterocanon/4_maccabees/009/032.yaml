  text: σὺ δὲ ἐν ταῖς τῆς ἀσεβείας ἀπειλαῖς βασανίζῃ· οὐκ ἐκφεύξῃ δέ, μιερώτατε τύραννε, τὰς τῆς θείας ὀργῆς δίκας.
