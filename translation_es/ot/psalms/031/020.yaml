review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura exclamativa, la bondad divina, el sentido de reserva en צָפַנְתָּ, y la metáfora de refugio en לַחֹסִים בָּךְ. Sin embargo, בְּנֵי אָדָם no debe verterse como «los hijos de Adán», porque aquí es una expresión idiomática para los seres humanos en general, no una referencia al personaje Adán. Además, la nota al pie existente no corresponde a la alternativa preservada por el rastro inglés, que pide aclarar la expresión antropológica, no טוּבְךָ.
  spanish_quality_summary: 'El español es generalmente claro y digno, pero el texto tiene un problema de puntuación: falta el cierre de la exclamación inicial. «Delante de» es aceptable, aunque «ante» suena más natural y conciso en este contexto. La frase completa fluye bien una vez corregidos esos puntos y la expresión antropológica.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Bondad», «temen» y «se refugian en ti» están bien alineados. La desviación importante está en בְּנֵי אָדָם: el inglés auditado conservó una forma cercana al original con nota aclaratoria; en español, «los hijos del hombre» reproduce mejor la forma fuente que «los hijos de Adán», acompañado de una nota que explique el sentido representativo de humanidad.'
  issues:
  - severity: high
    issue: «los hijos de Adán» para בְּנֵי אָדָם
    rationale: בְּנֵי אָדָם aquí es una expresión antropológica común, equivalente a seres humanos / gente, no una referencia específica a Adán. «Los hijos de Adán» introduce una asociación interpretativa innecesaria y se aparta del rastro léxico inglés documentado.
  - severity: medium
    issue: La nota al pie está anclada en «bondad» en vez de aclarar la expresión antropológica final
    rationale: El POB inglés preserva la alternativa en la frase «sons of man», no en «your goodness». La nota española actual desvía la atención a un punto léxico secundario y omite la aclaración realmente necesaria para el lector.
  - severity: low
    issue: Falta el signo de cierre de exclamación
    rationale: '«¡Cuán abundante...» requiere cierre correcto en español: «... bondad!». Es un ajuste menor pero necesario para la corrección ortográfica.'
  revised_spanish_text: ¡Cuán abundante es tu bondad, que has guardado para los que te temen, que has obrado para los que se refugian en ti ante los hijos del hombre[a]!
