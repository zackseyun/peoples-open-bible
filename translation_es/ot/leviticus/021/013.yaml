translation:
  language: es
  text: Y él tomará mujer[a] por esposa, en su virginidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “como virgen”. El hebreo dice literalmente “en su virginidad”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: And he
  chosen_spanish: Y él
  alternatives_spanish:
  - Y él mismo
  - Él
  lexicon: HALOT
  rationale: El ו conjuntivo más el pronombre independiente marcan continuidad discursiva y un leve énfasis en el sujeto. En español, “Y él” conserva ese hilo narrativo y la presencia explícita del sujeto sin sobrecargarlo.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  - una mujer para esposa
  lexicon: HALOT
  rationale: En un contexto de tomar a alguien en matrimonio, אִשָּׁה puede referirse a la esposa más que a la mujer en sentido genérico. “Esposa” comunica el valor matrimonial del sustantivo de manera natural en español.
- source_word: בִּבְתוּלֶיהָ
  english_pob_choice: in her virginity
  chosen_spanish: en su virginidad
  alternatives_spanish:
  - como virgen
  - siendo virgen
  - de entre las vírgenes
  lexicon: HALOT
  rationale: La construcción preposicional con ב y el sustantivo de virginidad con sufijo posesivo expresa el estado de virginidad de la mujer. “En su virginidad” conserva mejor la forma hebrea que una paráfrasis interpretativa.
- source_word: יִקָּח
  english_pob_choice: shall take
  chosen_spanish: tomará
  alternatives_spanish:
  - tomará por esposa
  - se casará
  lexicon: HALOT
  rationale: לקח mantiene el sentido básico de “tomar”, usado idiomáticamente para tomar esposa en matrimonio. En español, el futuro simple “tomará” preserva el tono legal y formulaico del hebreo sin forzar una glosa más explicativa.
theological_decisions:
- issue: Idioma legal matrimonial en la legislación sacerdotal
  english_pob_reading: Retain the idiom 'take a wife' rather than paraphrasing as 'marry' alone.
  chosen_spanish_reading: Conservar el giro “tomará una esposa” en vez de reemplazarlo solo por “se casará”.
  alternative_spanish_readings:
  - Se casará con una virgen
  - Tomará por esposa a una mujer en su virginidad
  rationale: El versículo pertenece a una formulación legal y estereotipada. Mantener el verbo “tomar” preserva la textura del hebreo y la fuerza idiomática del texto fuente, a la vez que sigue siendo comprensible en español actual.
  doctrine_reference: 'Translation philosophy: optimal equivalence; primacía del original sobre la tradición de traducción'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto quedó confirmado sin observaciones. El presente borrador español sigue esa lectura estable y no añade variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa “esposa” por el contexto matrimonial, no “mujer” en sentido genérico.
  - Se preserva el registro legal con “tomará” para reflejar לקח sin suavizarlo a una paráfrasis moderna.
