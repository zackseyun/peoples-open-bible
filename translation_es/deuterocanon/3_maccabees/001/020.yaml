  to: Y las madres y las nodrizas además de estas[a], dejando a los recién nacidos, unas en sus casas y otras en las calles, se iban reuniendo hacia el santuario supremamente exaltado[b] sin volver atrás.
  rationale: Se corrigió el anclaje de la nota b para que aparezca en la frase que realmente comenta. También se reforzó la traducción de πανυπέρτατον con «supremamente exaltado», que preserva mejor el intensivo del griego y la rationale auditada en inglés. Por último, se suavizó la sintaxis española reubicando «hacia el santuario...» antes de «sin volver atrás».
