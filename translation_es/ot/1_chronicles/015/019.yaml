revisions:
- from: Los cantores eran Hemán, Asaf y Etán, con címbalos de bronce para hacerse oír[a].
  to: Los cantores eran Hemán, Asaf y Etán, con címbalos de bronce para hacerlos oír[a].
  rationale: Se ajusta לְהַשְׁמִיעַ para reflejar mejor el valor causativo del hebreo en un contexto musical, evitando la matización reflexiva de «hacerse oír». La revisión procura mantener la naturalidad del español y la línea de la auditoría inglesa, que eliminó un objeto añadido en inglés pero conservó el sentido de hacer sonar de manera audible. En español, «hacerlos oír» mantiene el referente implícito en «címbalos» y comunica mejor la función instrumental.
