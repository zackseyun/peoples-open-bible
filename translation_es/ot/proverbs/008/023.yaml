translation:
  language: es
  text: Desde la eternidad fui establecida[a], desde el principio, antes de que existiera la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fui puesta»; el verbo hebreo es debatido y también se ha entendido como «fui instalada» o, menos probablemente aquí, «fui ungida».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעוֹלָם
  english_pob_choice: From everlasting
  chosen_spanish: Desde la eternidad
  alternatives_spanish:
  - Desde siempre
  - Desde los tiempos antiguos
  - Desde la antigüedad
  lexicon: HALOT
  rationale: עוֹלָם puede expresar antigüedad remota o eternidad según el contexto. En este marco sapiencial, previo a la creación, “la eternidad” comunica bien la amplitud temporal elevada sin volver la frase artificial en español.
- source_word: נִסַּכְתִּי
  english_pob_choice: I was established
  chosen_spanish: fui establecida
  alternatives_spanish:
  - fui puesta
  - fui instalada
  - fui consagrada
  lexicon: HALOT
  rationale: El nifal de נסך es debatido. El POB inglés opta por “established” para expresar una puesta en lugar / designación previa a la creación. En español, “fui establecida” conserva esa idea de ser colocada o constituida, sin introducir una lectura más cargada como “ungida”.
- source_word: מֵרֹאשׁ
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  - desde el primero
  lexicon: HALOT
  rationale: רֹאשׁ en expresiones temporales suele indicar el comienzo. “Desde el principio” es idiomático y mantiene el paralelismo temporal del verso.
- source_word: מִקַּדְמֵי אָרֶץ
  english_pob_choice: from before the earth
  chosen_spanish: desde antes de la tierra
  alternatives_spanish:
  - desde antes que existiera la tierra
  - antes de la tierra
  - desde los tiempos previos a la tierra
  lexicon: HALOT
  rationale: קַדְמֵי expresa lo anterior o antiguo; con אָרֶץ, el sentido es anterior a la creación en relación con la tierra. “Desde antes de la tierra” conserva la concisión del hebreo y su alcance cósmico.
theological_decisions:
- issue: Lectura cristológica de la Sabiduría personificada
  english_pob_reading: Translate the verse as personified Wisdom speaking of pre-creation establishment without importing explicit messianic or Trinitarian terminology.
  chosen_spanish_reading: Traducir el verso como la Sabiduría personificada que habla de su establecimiento previo a la creación, sin introducir terminología mesiánica o trinitaria explícita.
  alternative_spanish_readings:
  - fui ungida
  - fui consagrada
  rationale: Aunque la teología cristiana histórica puede leer Proverbios 8 tipológicamente en relación con el Hijo, el texto hebreo inmediato presenta Sabiduría personificada. Por eso la redacción evita vocabulario doctrinalmente cargado que el verso no exige.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El pasaje coincide con el consenso alto del control cruzado y no requirió cambios respecto del último pase; se mantuvo la solución léxica principal del inglés POB, adaptada a un español natural y auditable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo» porque el verso trata de Sabiduría personificada y no demanda un equivalente litúrgico o cristológico.
  - «Desde antes de la tierra» conserva la relación precreacional sin añadir glosa explicativa al cuerpo del texto.
