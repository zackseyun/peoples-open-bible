  yaml_path: translation/deuterocanon/2_maccabees/001/021.yaml
  text: When they reported to us that they had found no fire[a], but thick water, he ordered them to draw some out and bring it. Then, when the things for the sacrifices had been brought forward[b], Nehemiah ordered the priests to sprinkle the water on both the wood and what was laid on it.
  footnotes:
  - marker: a
    text: Or 'dense water' or 'thick liquid.' The Greek expression is unusual and is kept fairly literal because the narrative turns on the substance's unexpected character.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'the things of the sacrifices,' an elliptical expression for the materials or items connected with the sacrificial offering.
    reason: lexical_alternative
