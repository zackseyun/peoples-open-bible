id: MAN.1.2
reference: Prayer of Manasseh 1:2
source:
  edition: charles-1913-apot-vol1
  text: ὁ ποιήσας τὸν οὐρανὸν καὶ τὴν γῆν σὺν παντὶ τῷ κόσμῳ αὐτῶν,
  language: Greek
  pages:
  - 636
  - 637
  - 638
  - 639
  - 640
translation:
  text: the one who made heaven and earth[a], with all their host,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all their adornment' or 'all their arrangement.' The Greek κόσμος here likely refers to the ordered array belonging to heaven and earth, not a second mention of 'the world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ποιήσας
  chosen: the one who made
  alternatives:
  - who made
  - the one who created
  lexicon: BDAG
  rationale: Aorist participle with article functioning substantivally, referring to God descriptively. 'The one who made' preserves the participial force and reads naturally in English. 'Created' is possible, but 'made' stays closer to ποιέω here without adding theological nuance beyond the Greek.
- source_word: τὸν οὐρανὸν
  chosen: heaven
  alternatives:
  - the heaven
  - sky
  lexicon: LSJ
  rationale: In this cosmological pairing with 'earth,' οὐρανός is best rendered 'heaven,' the standard biblical expression. 'Sky' is too narrow, and 'the heaven' is unnecessarily wooden in English.
- source_word: τὴν γῆν
  chosen: earth
  alternatives:
  - land
  lexicon: LSJ
  rationale: In the fixed merism 'heaven and earth,' γῆ means the earth/world rather than a particular land.
- source_word: σὺν
  chosen: together with
  alternatives:
  - with
  - along with
  lexicon: BDAG
  rationale: σὺν marks accompaniment. 'Together with' makes explicit that the following phrase is included in what God made, while remaining idiomatic.
- source_word: παντὶ τῷ κόσμῳ αὐτῶν
  chosen: all their order
  alternatives:
  - all their adornment
  - all their arrangement
  - all that is in them
  lexicon: LSJ
  rationale: κόσμος can denote order, arrangement, or adornment, not only 'world/universe.' Since heaven and earth have already been named, rendering κόσμος here as 'world' would be confusing or redundant. 'All their order' captures the sense of the total ordered array belonging to heaven and earth. The genitive-like possessive force of αὐτῶν is reflected by 'their.'
