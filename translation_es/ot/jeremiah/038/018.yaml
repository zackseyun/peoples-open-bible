translation:
  language: es
  text: Pero si no sales a los oficiales[a] del rey de Babilonia, esta ciudad será entregada en manos[b] de los caldeos, y la quemarán con fuego, y tú no escaparás de sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «príncipes» o «comandantes». El término hebreo puede referirse de manera amplia a altos funcionarios.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en la mano de los caldeos» ... «de su mano», un modismo para estar bajo el poder de otro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula introduce una condición con contraste respecto de la advertencia previa; «Pero si» conserva ese matiz adversativo de manera natural en español.
- source_word: תֵצֵא
  english_pob_choice: you do not go out
  chosen_spanish: no sales
  alternatives_spanish:
  - no salgas
  - no te rindes
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «salir». En este contexto, la salida hacia los funcionarios babilonios implica rendición, pero «no sales» preserva la forma del original y deja que el contexto aporte la implicación.
- source_word: אֶל שָׂרֵי מֶלֶךְ בָּבֶל
  english_pob_choice: to the officials of the king of Babylon
  chosen_spanish: a los oficiales[a] del rey de Babilonia
  alternatives_spanish:
  - a los príncipes del rey de Babilonia
  - a los comandantes del rey de Babilonia
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar oficiales, príncipes o comandantes. «Oficiales» es amplio y natural en español; se mantiene la ambigüedad jerárquica sin estrechar el rango más de lo que el hebreo exige.
- source_word: וְנִתְּנָה הָעִיר הַזֹּאת
  english_pob_choice: then this city will be given
  chosen_spanish: esta ciudad será entregada
  alternatives_spanish:
  - esta ciudad será dada
  - esta ciudad será puesta en manos
  lexicon: HALOT
  rationale: El pasivo de נתן se expresa bien con «ser entregada». En español comunica la idea de ser puesta bajo el control de otro sin perder la pasividad del hebreo.
- source_word: בְּיַד הַכַּשְׂדִּים
  english_pob_choice: into the hand of the Chaldeans
  chosen_spanish: en mano de los caldeos
  alternatives_spanish:
  - en la mano de los caldeos
  - en poder de los caldeos
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «mano» porque el hebreo usa una metáfora concreta de dominio/poder. «En mano de» suena bíblico y comprensible en español; «caldeos» reproduce el etnónimo tradicional del texto.
- source_word: וּשְׂרָפוּהָ בָּאֵשׁ
  english_pob_choice: and they will burn it with fire
  chosen_spanish: y la quemarán con fuego[b]
  alternatives_spanish:
  - y la prenderán fuego
  - y la incendiarán
  lexicon: HALOT
  rationale: La expresión hebrea es enfática; «quemarán con fuego» mantiene la redundancia intensiva del original. En español resulta clara y fiel, sin suavizar la imagen.
- source_word: וְאַתָּה לֹא תִמָּלֵט מִיָּדָם
  english_pob_choice: and you will not escape from their hand
  chosen_spanish: y tú no escaparás de su mano
  alternatives_spanish:
  - y no serás librado de su mano
  - y no te librarás de su mano
  lexicon: HALOT
  rationale: El nifal de מלט significa «escapar». Se conserva además la metáfora de «mano» para reflejar la expresión hebrea de poder o dominio, paralela a «en mano de». El pronombre explícito «tú» hace visible el énfasis del hebreo.
theological_decisions:
- issue: La imagen de «mano» como dominio o poder
  english_pob_reading: The Hebrew idiom 'into the hand of the Chaldeans' ... 'from their hand,' an idiom for being under another's power.
  chosen_spanish_reading: «en mano de los caldeos» / «de su mano» como idiomas de dominio y control
  alternative_spanish_readings:
  - «en poder de los caldeos» / «de su poder»
  - «en sus manos» / «de ellos»
  rationale: Se mantiene la metáfora corporal del hebreo porque forma parte del argumento profético y del paralelismo del versículo. En español, «mano» sigue funcionando como idiomática de poder sin necesidad de explicitarla en el texto principal.
  doctrine_reference: Uso bíblico del hebreo y su metáfora de soberanía humana bajo juicio divino
translation_notes:
  revision_awareness: 'Coincido con el control de revisión de alta concordancia: no se registran cambios necesarios respecto del análisis base. La redacción española mantiene la fuerza condicional, la metáfora de la mano y la expresión intensiva de quemar con fuego.'
  spanish_consistency_notes:
  - Se mantiene «caldeos» para el etnónimo del hebreo, en continuidad con la tradición bíblica y con el POB inglés.
  - Se conserva la metáfora de «mano» en ambos miembros del versículo para reflejar el paralelismo semítico.
  - «Oficiales» deja abierta la amplitud semántica de שָׂרִים sin forzar una jerarquía militar específica.
  - La negación y el tiempo verbal siguen el valor prospectivo del hebreo en una advertencia profética.
