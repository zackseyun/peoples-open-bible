    issue: '''Anzuelo'' para חַחִי es demasiado específico y puede evocar pesca más que sujeción'
    rationale: El hebreo se refiere a un gancho/aro usado para controlar a un animal o cautivo. En español bíblico y general, 'garfio' o 'gancho' preservan mejor esa imagen coercitiva que 'anzuelo'.
  - severity: low
    issue: '''Han subido hasta mis oídos'' añade un matiz de destino final no necesario'
    rationale: El hebreo literalmente expresa que han 'subido en/a mis oídos'. 'Han subido a mis oídos' conserva la imagen de manera más directa y natural.
