base_translation:
  language: en
  yaml_path: translation/ot/isaiah/037/029.yaml
  text: Because your raging against me and your complacency have come up into my ears[a], I will put my hook in your nose and my bit in your lips[b], and I will turn you back by the way that you came.
  footnotes:
  - marker: a
    text: Or 'your arrogance' for 'your complacency'; the Hebrew term can denote being at ease or secure, and in context likely carries the sense of arrogant self-assurance.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the way by which you came'.
    reason: previous_rendering
