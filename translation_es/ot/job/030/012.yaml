translation:
  language: es
  text: A la derecha se levanta una turba[a]; hacen retroceder mis pies[b], y levantan contra mí sus sendas de desastre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Turba» traduce aquí el valor despectivo de פִּרְחַח. Alternativas como «chusma» o «horda» son posibles, pero «turba» mantiene el tono colectivo sin volverse excesivamente regional o coloquial.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «envían» o «hacen irse mis pies». La expresión puede implicar que los hacen desviarse, retroceder o perder firmeza; el español aclara la imagen sin fijar una sola paráfrasis interpretativa.
    reason: lexical_alternative
  - marker: c
    text: 'También: «sus caminos de calamidad» o «sus caminos de ruina». El hebreo mantiene la metáfora de construir un camino en sentido hostil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל יָמִין
  english_pob_choice: On the right
  chosen_spanish: A la derecha
  alternatives_spanish:
  - A mi derecha
  - Del lado derecho
  lexicon: HALOT
  rationale: La frase es espacial y hostil; en español, «A la derecha» conserva la posición sin introducir un posesivo que el texto revisado en inglés retiró por literalidad.
- source_word: פִּרְחַח
  english_pob_choice: a brood
  chosen_spanish: una turba
  alternatives_spanish:
  - un grupo despreciable
  - una chusma
  - una horda
  lexicon: HALOT
  rationale: El hebreo es un término raro y despectivo para un conjunto despreciable o desordenado de personas. «Turba» preserva el matiz colectivo y despectivo con naturalidad en español, sin volverlo demasiado coloquial.
- source_word: יָקוּמוּ
  english_pob_choice: rises up
  chosen_spanish: se levanta
  alternatives_spanish:
  - se alza
  - se pone en pie
  - surge
  lexicon: HALOT
  rationale: El verbo expresa un levantarse hostil o tomar posición. «Se levanta» es natural y mantiene el gesto de oposición.
- source_word: רַגְלַי שִׁלֵּחוּ
  english_pob_choice: they drive away my feet
  chosen_spanish: echan mis pies
  alternatives_spanish:
  - desvían mis pies
  - hacen vacilar mis pies
  - empujan mis pies
  lexicon: HALOT
  rationale: La secuencia hebrea es difícil y literalmente habla de «enviar/soltar» los pies. «Echan mis pies» conserva la fuerza del movimiento forzado y deja abierta la imagen de sacarlos de su curso, sin explicar más de lo que el hebreo obliga.
- source_word: וַיָּסֹלּוּ
  english_pob_choice: they build up
  chosen_spanish: levantan
  alternatives_spanish:
  - allanan
  - apisonan
  - construyen
  lexicon: HALOT
  rationale: סלל conserva la imagen de construir o levantar un camino. En español, «levantan» mantiene la metáfora de un terraplén o senda preparada contra el hablante, de forma breve y clara.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - encima de mí
  lexicon: HALOT
  rationale: En este contexto adversativo, «contra mí» expresa mejor la hostilidad que una mera relación espacial.
- source_word: אָרְחוֹת אֵידָם
  english_pob_choice: their paths of disaster
  chosen_spanish: sus sendas de desastre
  alternatives_spanish:
  - sus caminos de calamidad
  - sus rutas de ruina
  - sus sendas de destrucción
  lexicon: HALOT
  rationale: אָרְחוֹת significa «sendas/caminos», y אֵיד denota desastre, calamidad o ruina. «Sendas de desastre» conserva el campo semántico y la imaginería vial, con español claro y sobrio.
translation_notes:
  revision_awareness: 'El inglés auditado revisó la primera cláusula para eliminar el posesivo implícito y ajustar la naturalidad de la segunda: el español sigue esa revisión con «A la derecha» y una formulación breve en la acción sobre los pies, pero conserva de modo más transparente la metáfora de סלל como levantar/erigir un camino hostil.'
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» según corresponda en otras entradas del proyecto; aquí no aplica.
  - No se introduce lenguaje eclesiástico tradicional donde el hebreo pide una imagen concreta y despectiva.
  - La elección de «sendas» preserva la metáfora vial del texto hebreo y la audita con el inglés POB.
