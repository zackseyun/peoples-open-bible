translation:
  language: es
  text: Y David buscó a Dios por el niño[a]. David ayunó, entró, pasó la noche y se acostó en tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a favor del niño». El hebreo usa una expresión intercesora con בְּעַד.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבַקֵּשׁ
  english_pob_choice: sought
  chosen_spanish: buscó
  alternatives_spanish:
  - imploró
  - rogó
  lexicon: HALOT
  rationale: בקש en este contexto expresa una búsqueda intensa dirigida a Dios. «Buscó» conserva el valor básico del verbo sin añadir explícitamente una intensidad que el hebreo no exige por sí mismo.
- source_word: אֶת־הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: HALOT
  rationale: El objeto directo con האלהים identifica claramente a la persona buscada. En español, «a Dios» es la forma natural y fiel.
- source_word: בְּעַד
  english_pob_choice: on behalf of
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - en nombre de
  lexicon: HALOT
  rationale: Aquí בְּעַד tiene fuerza intercesora. «Por» es la opción más concisa en español y puede expresar intercesión; «en favor de» sería más explícito pero más largo.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el niño
  alternatives_spanish:
  - el muchacho
  - el niño pequeño
  lexicon: HALOT
  rationale: נַעַר puede abarcar niño, muchacho o joven según el contexto. Dado que se trata del hijo enfermo de David, «el niño» comunica mejor el referente que «muchacho» en español actual.
- source_word: וַיָּצָם ... צוֹם
  english_pob_choice: fasted
  chosen_spanish: ayunó
  alternatives_spanish:
  - guardó ayuno
  - ayunó un ayuno
  lexicon: HALOT
  rationale: El hebreo usa un cognado intensivo (verbo + sustantivo). El español natural no suele reproducirlo literalmente; «ayunó» preserva el hecho sin forzar una construcción artificial.
- source_word: וּבָא
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue adentro
  - se metió
  lexicon: HALOT
  rationale: בוא indica movimiento hacia adentro. «Entró» es breve y claro en español, y mantiene el flujo narrativo.
- source_word: וְלָן
  english_pob_choice: spent the night
  chosen_spanish: pasó la noche
  alternatives_spanish:
  - pernoctó
  - se quedó toda la noche
  lexicon: HALOT
  rationale: לון expresa pasar la noche. «Pasó la noche» es idiomático en español moderno y conserva el valor temporal.
- source_word: וְשָׁכַב אָרְצָה
  english_pob_choice: lay on the ground
  chosen_spanish: acostado en tierra
  alternatives_spanish:
  - echado en tierra
  - tendido en el suelo
  lexicon: HALOT
  rationale: שכב con ארצה señala la postura de estar recostado hacia la tierra/suelo. «Acostado en tierra» mantiene la imagen de humillación y duelo sin introducir un contexto espacial específico como «suelo» o «piso».
theological_decisions:
- issue: Alcance intercesor de בְּעַד
  english_pob_reading: on behalf of the boy
  chosen_spanish_reading: por el niño
  alternative_spanish_readings:
  - en favor del niño
  - a favor del niño
  rationale: La escena presenta a David suplicando ante Dios en representación del niño. «Por el niño» preserva la relación intercesora sin añadir una fórmula eclesiástica ajena al hebreo.
  doctrine_reference: Intercesión / oración de súplica
- issue: Referencia de הַנַּעַר
  english_pob_reading: the boy
  chosen_spanish_reading: el niño
  alternative_spanish_readings:
  - el hijo
  - el muchacho
  rationale: El contexto inmediato identifica al menor como el hijo enfermo de David, pero el sustantivo hebreo sigue siendo ‘naʿar’. «El niño» equilibra contexto y léxico sin borrar la tensión entre edad y función del término.
  doctrine_reference: Precisión léxica contextual
translation_notes:
  revision_awareness: 'La revisión inglesa reciente suavizó «fasted a fast» a «fasted» y compactó la secuencia final a una sola cadena narrativa natural. El español sigue esa misma línea de naturalidad, pero conserva todos los movimientos del texto hebreo: buscar a Dios, ayunar, entrar, pasar la noche y acostarse en tierra.'
  spanish_consistency_notes:
  - Se usa «Dios» para הָאֱלֹהִים, conforme al estándar del proyecto.
  - Se usa «ayunó» sin amplificación artificial, porque el español no requiere reproducir el cognado intensivo para ser fiel.
  - «Tierra» se mantiene para אָרְצָה, evitando interpretar de más como «suelo» o «piso».
  - El orden verbal conserva el encadenamiento narrativo del hebreo y de la POB inglesa.
