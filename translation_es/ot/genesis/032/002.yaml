translation:
  language: es
  text: Y Jacob siguió su camino[a], y los ángeles de Dios le salieron al encuentro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su camino».
    reason: lexical_alternative
  - marker: b
    text: O «se encontraron con él» o «vinieron sobre él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יַעֲקֹ֖ב
  english_pob_choice: And Jacob
  chosen_spanish: Y Jacob
  alternatives_spanish:
  - Ahora Jacob
  lexicon: HALOT
  rationale: Se conserva la simple conjunción narrativa וְ con «Y», manteniendo el flujo del relato sin añadir una marca discursiva más fuerte de la que exige el hebreo.
- source_word: הָלַ֣ךְ לְ/דַרְכּ֑/וֹ
  english_pob_choice: went on his way
  chosen_spanish: siguió su camino
  alternatives_spanish:
  - fue por su camino
  - iba en su camino
  lexicon: HALOT
  rationale: El hebreo expresa continuación de la marcha; en español, «siguió su camino» comunica de manera natural esa progresión sin perder el matiz de viaje continuado. «Ir por su camino» sonaría más literal y menos idiomático.
- source_word: וַ/יִּפְגְּעוּ ב֖/וֹ
  english_pob_choice: met him
  chosen_spanish: lo encontraron
  alternatives_spanish:
  - se encontraron con él
  - lo sorprendieron al paso
  lexicon: HALOT
  rationale: פגע con ב puede significar «encontrar/encounter». Aquí «lo encontraron» refleja el encuentro sin introducir accidentalidad o hostilidad que el verbo por sí solo no obliga a inferir. Se evita «se encontraron con él» para no volver reflexivo un verbo que en este contexto suena menos directo.
- source_word: מַלְאֲכֵ֥י אֱלֹהִֽים
  english_pob_choice: the angels of God
  chosen_spanish: los ángeles de Dios
  alternatives_spanish:
  - los mensajeros de Dios
  - los ángeles divinos
  lexicon: HALOT
  rationale: «Ángeles» mantiene la lectura celestial adoptada en el POB inglés y se ajusta al contexto inmediato, donde la escena posterior confirma un referente sobrenatural. «De Dios» conserva el constructo hebreo de manera transparente.
theological_decisions:
- issue: Referente de מַלְאֲכֵי אֱלֹהִים
  english_pob_reading: heavenly angels
  chosen_spanish_reading: ángeles celestiales
  alternative_spanish_readings:
  - mensajeros de Dios
  rationale: Aunque מַלְאֲכִים puede designar mensajeros humanos en otros contextos, aquí el marco narrativo favorece seres celestiales. La traducción principal mantiene «ángeles» y no fuerza una lectura humana que el contexto no exige.
  doctrine_reference: Génesis 32:1-2; cf. el desarrollo narrativo inmediato en 32:3.
translation_notes:
  revision_awareness: Se corrigió el problema anterior anclando las notas con marcadores visibles en el texto español. Además, se evitó duplicar marcadores y se mantuvo una sola ocurrencia de cada uno, en correspondencia exacta con sus notas.
  spanish_consistency_notes:
  - Se prefirió «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se usó «ángeles» y no «mensajeros» por el contexto narrativo inmediato.
  - Se mantuvo un registro digno y bíblico sin calco rígido del inglés.
