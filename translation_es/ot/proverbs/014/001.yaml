translation:
  language: es
  text: La más sabia de las mujeres[a] edifica su casa[b], pero la mujer insensata la derriba con sus propias manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toda mujer sabia». El hebreo inicial puede entenderse de manera genérica como una afirmación de clase, no solo como una expresión superlativa.'
    reason: lexical_alternative
  - marker: b
    text: «Casa» también puede incluir el sentido de «hogar» o «familia/establecimiento familiar», no solo la vivienda física.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַכְמוֹת נָשִׁים
  english_pob_choice: the wisest of women
  chosen_spanish: la más sabia de las mujeres
  alternatives_spanish:
  - mujeres sabias
  - toda mujer sabia
  - la mujer más sabia
  lexicon: HALOT
  rationale: El hebreo plural חַכְמוֹת con נָשִׁים funciona de manera idiomática y puede expresar un superlativo o una afirmación genérica de clase. En español, «la más sabia de las mujeres» conserva ese valor comparativo/superlativo sin perder la fuerza proverbial ni forzar un plural sujeto que desajustaría el verbo singular.
- source_word: בָּנְתָה
  english_pob_choice: builds
  chosen_spanish: edifica
  alternatives_spanish:
  - construye
  - ha edificado
  - edifica
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, el proverbio expresa verdad general. «Edifica» en presente transmite bien el valor gnómico y mantiene el contraste concreto con «derriba».
- source_word: בֵיתָהּ
  english_pob_choice: her house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su familia
  - su casa y hogar
  lexicon: HALOT
  rationale: «Casa» preserva la imagen concreta del hebreo y en español también puede abarcar, por extensión, el ámbito del hogar o la casa como establecimiento familiar. En nota se conserva esa amplitud semántica.
- source_word: אִוֶּלֶת
  english_pob_choice: a foolish woman
  chosen_spanish: la mujer insensata
  alternatives_spanish:
  - una mujer necia
  - la necia
  - la insensatez
  lexicon: HALOT
  rationale: El sustantivo femenino singular pide una referencia personal y concreta en la segunda cola. «Insensata» comunica bien el sentido de אִוֶּלֶת sin volverlo abstracto.
- source_word: בְּיָדֶיהָ
  english_pob_choice: with her own hands
  chosen_spanish: con sus propias manos
  alternatives_spanish:
  - con sus manos
  - por sus manos
  - con la ayuda de sus manos
  lexicon: HALOT
  rationale: La expresión es instrumental y enfática. «Con sus propias manos» reproduce de forma natural en español la idea de agencia personal directa, tal como hace el inglés auditado.
- source_word: תֶהֶרְסֶנּוּ
  english_pob_choice: tears it down
  chosen_spanish: la derriba
  alternatives_spanish:
  - la destruye
  - la demuele
  - la arrasa
  lexicon: HALOT
  rationale: הרס significa demoler o derribar; «derriba» mantiene el paralelismo directo con «edifica» y conserva la metáfora de construcción/destrucción. El pronombre se entiende por referencia a «casa».
theological_decisions:
- issue: Alcance de «casa»
  english_pob_reading: '''House'' may also include the sense of ''household'' or ''family establishment,'' not only the physical dwelling.'
  chosen_spanish_reading: «Casa» puede incluir el sentido de «hogar» o «familia/establishment familiar», no solo la vivienda física.
  alternative_spanish_readings:
  - su hogar
  - su familia
  - su casa y su hogar
  rationale: No conviene reducir el hebreo a una vivienda material. Mantener «casa» preserva la imagen del texto y deja abierta la amplitud semántica que el audit trail documenta.
  doctrine_reference: Sabiduría proverbial y semántica hebrea de בַּיִת
- issue: Valor genérico o superlativo de la primera cola
  english_pob_reading: The Hebrew opening may be understood generically as a class statement rather than as a superlative expression.
  chosen_spanish_reading: La primera cola puede leerse como una afirmación genérica de clase o como superlativo expresado en español con «la más sabia de las mujeres».
  alternative_spanish_readings:
  - toda mujer sabia
  - mujeres sabias
  rationale: El hebreo permite ambas lecturas; la traducción elegida comunica el efecto retórico más natural en español sin borrar la posibilidad genérica documentada en la nota del inglés.
  doctrine_reference: Poética sapiencial hebrea y paralelismo
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión, con acuerdo alto y solo observaciones menores; por eso la redacción española sigue de cerca las decisiones léxicas ya documentadas, sin introducir reajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «casa» y no «hogar» en el cuerpo principal para conservar la metáfora hebrea, pero la nota aclara su amplitud.
  - Se usa un femenino singular personal («la mujer insensata») en paralelo con la primera cola para reflejar la sintaxis y el contraste del hebreo.
  - «Edifica/derriba» conserva el campo semántico de construcción-demolición del proverbio.
  - Se evita «SEÑOR» u այլ reemplazos teológicos porque el versículo no contiene el nombre divino ni una cita directa que lo requiera.
