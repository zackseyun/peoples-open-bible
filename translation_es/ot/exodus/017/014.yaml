translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Escribe esto como memorial en el libro, y haz que Josué lo oiga[b], porque ciertamente borraré[c] el recuerdo de Amalec de debajo del cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un libro» o «en el rollo»; el hebreo dice literalmente «en el libro».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ponlo en los oídos de Josué»; es decir, házselo oír o recítaselo.
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea «borraré, sí, borraré» intensifica la acción; es enfática.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el nombre divino explícito; en español se mantiene como nombre propio transliterado. 'Yahvé' sigue el valor del POB en inglés ('Yahweh') y evita la sustitución por un título.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar y ampliamente reconocible.
- source_word: כְּתֹב
  english_pob_choice: Write
  chosen_spanish: Escribe
  alternatives_spanish:
  - Anota
  - Registra
  lexicon: HALOT
  rationale: El imperativo de כתב es directamente 'escribe'; en español suena natural y conserva la orden concreta.
- source_word: זֹאת זִכָּרוֹן
  english_pob_choice: this as a memorial
  chosen_spanish: esto como memorial
  alternatives_spanish:
  - esto para memorial
  - esto como recuerdo
  lexicon: HALOT
  rationale: '''Memorial'' preserva la función conmemorativa y el tono formal del sustantivo זִכָּרוֹן, sin reducirlo a mera ''recordación''.'
- source_word: בַּסֵּפֶר
  english_pob_choice: in the book
  chosen_spanish: en el libro
  alternatives_spanish:
  - en un libro
  - en el rollo
  lexicon: HALOT
  rationale: Se conserva el artículo definido del hebreo. 'Libro' es fiel al audit trail inglés y suficientemente claro en español, sin introducir 'rollo' como interpretación material.
- source_word: וְשִׂים בְּאָזְנֵי יְהוֹשֻׁעַ
  english_pob_choice: and put it in Joshua’s hearing
  chosen_spanish: y ponlo en los oídos de Josué
  alternatives_spanish:
  - y recítaselo a Josué
  - y haz que Josué lo oiga
  - y ponlo en el oído de Josué
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal ('poner en los oídos'). El español lo permite sin volverse oscuro, y evita aplanar la imagen idiomática que el POB inglés quiso conservar.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josué
  lexicon: HALOT
  rationale: Forma española estándar del nombre propio bíblico.
- source_word: מָחֹה אֶמְחֶה
  english_pob_choice: I will surely blot out
  chosen_spanish: ciertamente borraré
  alternatives_spanish:
  - borraré del todo
  - sin duda borraré
  - borraré completamente
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la acción. En español, 'ciertamente' transmite bien la certeza enfática sin forzar una duplicación poco natural; 'borraré' conserva la metáfora de eliminación del recuerdo.
- source_word: זֵכֶר
  english_pob_choice: the remembrance of Amalek
  chosen_spanish: el recuerdo de Amalec
  alternatives_spanish:
  - la memoria de Amalec
  - el nombre de Amalec
  lexicon: HALOT
  rationale: '''Recuerdo'' refleja el valor de זֵכֶר y funciona bien como contraste con el memorial anterior. ''Memoria'' sería posible, pero aquí ''recuerdo'' suena más natural en español y mantiene la idea de aquello que será borrado.'
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalec
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma española tradicional.
- source_word: מִתַּחַת הַשָּׁמָיִם
  english_pob_choice: from under heaven
  chosen_spanish: de debajo de los cielos
  alternatives_spanish:
  - de debajo del cielo
  - de la tierra
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de cobertura total. En español, 'de debajo de los cielos' refleja el plural del original, aunque 'del cielo' sería más idiomático en abstracto; aquí se prioriza la correspondencia formal.
theological_decisions:
- issue: Renderización del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragramatón y el POB lo rinde como nombre propio. 'Yahvé' preserva esa decisión y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Intensificación de la promesa de juicio
  english_pob_reading: I will surely blot out
  chosen_spanish_reading: ciertamente borraré
  alternative_spanish_readings:
  - borraré del todo
  - borraré completamente
  rationale: La construcción hebrea con infinitivo absoluto expresa énfasis. 'Ciertamente' comunica la certeza solemne sin añadir matices ajenos al texto.
  doctrine_reference: Exegesis of Hebrew infinitive absolute with finite verb in emphatic declaration
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se mantiene el nombre divino como nombre propio, el modismo de ''poner en los oídos'', y la intensificación del verbo final sin sobretraducción. No se detectaron revisiones aplicadas en el contexto inglés reciente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'memorial' para זִכָּרוֹן y 'recuerdo' para זֵכֶר, preservando el contraste léxico del versículo.
  - Se traduce el modismo hebreo de manera suficientemente literal para no perder la imagen auditiva.
  - '''Cielos'' refleja el plural hebreo; no se normaliza a singular para no borrar un rasgo formal del texto.'
