review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y el paralelo griego en lo esencial: mantiene la imagen de acampar, la proximidad circundante, la casa de la Sabiduría personificada y la acción de fijar una estaca junto al muro. Sin embargo, el singular «muro» en el texto principal no refleja tan bien la alternativa griega plural preservada en la nota, y conviene afinar la preposición para conservar mejor la fuerza de «into/in» sin sonar forzada.'
  spanish_quality_summary: El español es claro, natural y digno. «El que acampa alrededor de su casa» suena bien. La única mejora menor es «clava su estaca en el muro de su casa», que evita una repetición posesiva algo ambigua y suena más idiomática en español, manteniendo la referencia femenina por medio de «su casa».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La personificación femenina de la Sabiduría se conserva adecuadamente. Las decisiones léxicas principales («acampa», «alrededor de», «casa», «clava», «estaca», «muro») son compatibles con la auditoría inglesa. La nota alternativa debe seguir distinguiendo hebreo «alrededor» y griego «cerca».
  issues:
  - severity: medium
    issue: La frase «en su muro» después de «su casa» deja una doble posesión algo ambigua en español.
    rationale: Aunque contextualmente se entiende que ambos pronombres remiten a la Sabiduría, «en el muro de su casa» suena más natural y mantiene la referencia sin tropiezo estilístico.
  - severity: low
    issue: La nota usa «sus muros» como alternativa griega, mientras el texto principal dice «su muro».
    rationale: No es incorrecto, porque la nota marca una alternativa, pero conviene que la formulación principal y la nota se relacionen con más claridad; el ajuste propuesto lo hace sin perder fidelidad.
  revised_spanish_text: El que acampa alrededor de su casa y clava su estaca en el muro de su casa.[a]
  revised_footnotes:
