translation:
  language: es
  text: 'Y aun cuando la ley[a] había sido leída en voz alta, él no dejaba de insistir en que debía entrar, diciendo: «Aunque ellos han sido privados de este honor, a mí no me corresponde[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la norma» o «el precepto». νόμος aquí no funciona como «costumbre» genérica, sino como una ley o regulación concreta leída públicamente.
    reason: lexical_alternative
  - marker: b
    text: 'O «yo no debo ser privado de ello». El griego final es elíptico: literalmente, «pero en cuanto a mí, no debe [ser así]».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ ... νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la norma
  - el precepto
  lexicon: LSJ
  rationale: νόμος aquí se refiere al mandamiento o regulación legal invocada en el contexto; «la ley» conserva la fuerza formal y el trasfondo judío del término, como en la traducción inglesa auditada.
- source_word: παραναγνωσθέντος
  english_pob_choice: had been read out
  chosen_spanish: había sido leída
  alternatives_spanish:
  - había sido leída en voz alta
  - había sido proclamada
  lexicon: LSJ
  rationale: El participio pasivo indica una lectura pública o ante alguien. En español, «había sido leída» es natural y deja implícita la lectura pública sin sobrecargar el estilo.
- source_word: οὐδ᾽ ὣς
  english_pob_choice: even ... still
  chosen_spanish: aun cuando ... no dejaba de
  alternatives_spanish:
  - ni aun así
  - y aun así
  lexicon: LSJ
  rationale: La locución expresa concesión con persistencia. La combinación «aun cuando ... no dejaba de» reproduce la obstinación del griego con español fluido.
- source_word: ἀπέλειπεν
  english_pob_choice: did not stop
  chosen_spanish: no dejaba de
  alternatives_spanish:
  - no cesaba de
  - no desistía de
  lexicon: LSJ
  rationale: El imperfecto marca continuidad. «No dejaba de» preserva esa duración y es idiomático en español contemporáneo.
- source_word: προφερόμενος
  english_pob_choice: insisting
  chosen_spanish: insistir
  alternatives_spanish:
  - sostener
  - afirmar con insistencia
  lexicon: LSJ
  rationale: El participio describe que seguía presentando o presionando su দাবি; «insistir» transmite bien la obstinación verbal del contexto.
- source_word: ἑαυτὸν δεῖν εἰσελθεῖν
  english_pob_choice: that he ought to enter
  chosen_spanish: que debía entrar
  alternatives_spanish:
  - que tenía que entrar
  - que le correspondía entrar
  lexicon: LSJ
  rationale: δεῖ expresa obligación o necesidad. «Debía entrar» mantiene esa fuerza sin exagerar hacia imposición absoluta, siguiendo la cautela del inglés auditado.
- source_word: ἐστέρηνται
  english_pob_choice: have been deprived of
  chosen_spanish: fueron privados de
  alternatives_spanish:
  - han sido privados de
  - se les negó
  lexicon: LSJ
  rationale: El perfecto pasivo comunica un estado de privación. En el discurso citado, el español puede formularlo como pasado resultativo; «fueron privados de» preserva la idea de despojo de honor.
- source_word: ταύτης τῆς τιμῆς
  english_pob_choice: this honor
  chosen_spanish: este honor
  alternatives_spanish:
  - esta honra
  - este privilegio
  lexicon: LSJ
  rationale: τιμή aquí alude a honor o prestigio conferido por acceso. «Este honor» es la equivalencia más directa y mantiene el valor social del término.
- source_word: ἐμὲ δὲ οὐ δεῖ
  english_pob_choice: I ought not to be
  chosen_spanish: yo no debo[b]
  alternatives_spanish:
  - a mí no me corresponde
  - yo no debo ser privado de ello
  lexicon: LSJ
  rationale: La cláusula griega es elíptica; literalmente, «pero en cuanto a mí, no debe/ no es necesario [que sea así]». En español, «yo no debo» preserva la tensión y deja explícita la elipsis mediante nota.
translation_notes:
  revision_awareness: El inglés POB revisó el cierre desde una formulación más enfática a una más cercana al griego («I ought not to be»). La versión española sigue esa revisión, evitando añadir énfasis ajeno al texto y preservando la elipsis final con una nota.
  spanish_consistency_notes:
  - Se mantiene «ley» para νόμος, conforme al valor formal/jurídico señalado en el audit trail.
  - Se conserva «honor» para τιμή por su valor social y relacional, sin sustituirlo por un término más interpretativo.
  - La elipsis final se conserva de forma transparente en la nota, en paralelo con la solución inglesa auditada.
  - No se introduce terminología eclesiástica ajena al contexto; el registro es sobrio y bíblico, pero en español moderno natural.
