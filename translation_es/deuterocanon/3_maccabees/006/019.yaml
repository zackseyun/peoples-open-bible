    issue: ἀντέστησαν traducido como 'se opusieron'
    rationale: El inglés POB eligió 'rose up' por su fuerza narrativa, dejando 'stood against/resisted' como alternativa. 'Se opusieron' conserva oposición, pero atenúa el movimiento súbito del relato y no preserva la preferencia auditada.
  - severity: medium
    issue: πέδαις traducido como 'cadenas'
    rationale: Aunque comprensible, 'cadenas' es más general. πέδαις alude a grilletes/fetters, especialmente como restricción corporal. 'Grilletes' es más preciso y sigue mejor la justificación léxica inglesa.
  - severity: low
    issue: Nota a no refleja la alternativa principal correctamente
    rationale: Si el texto principal pasa a 'se levantaron', la nota debe presentar la alternativa de resistencia/oposición. En el borrador actual, la nota ya presupone una decisión principal distinta.
