translation:
  language: es
  text: Porque tus dioses, oh Judá, han llegado a ser tantos como tus ciudades; y tantos como las calles de Jerusalén, ustedes han levantado altares a la Vergüenza[a], altares para quemar incienso a Baal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''Vergüenza'', un sustituto despectivo para una deidad pagana, probablemente Baal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''para ofrecer una ofrenda de humo a Baal''. El verbo hebreo suele referirse específicamente a hacer una ofrenda que sube en humo, a menudo de incienso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la denuncia previa. 'Porque' conserva el valor causal de כִּי y suena natural en español bíblico moderno.
- source_word: מִסְפַּר
  english_pob_choice: as numerous as
  chosen_spanish: tantos como
  alternatives_spanish:
  - tan numerosos como
  - igual de numerosos que
  lexicon: HALOT
  rationale: La expresión hebrea comunica equivalencia numérica. 'Tantos como' preserva esa comparación de manera fluida y precisa en español.
- source_word: עָרֶיךָ
  english_pob_choice: your cities
  chosen_spanish: tus ciudades
  alternatives_spanish:
  - tus poblaciones
  - tus urbes
  lexicon: HALOT
  rationale: Es el equivalente directo y natural de עָרֶיךָ en plural con sufijo de segunda persona singular.
- source_word: הָיוּ אֱלֹהֶיךָ יְהוּדָה
  english_pob_choice: your gods, O Judah, have become
  chosen_spanish: tus dioses, oh Judá, han llegado a ser
  alternatives_spanish:
  - tus dioses, oh Judá, fueron
  - tus dioses, Judá, se volvieron
  lexicon: HALOT
  rationale: 'El perfecto hebreo describe un estado resultante: los dioses de Judá han alcanzado la misma cantidad que sus ciudades. ''Han llegado a ser'' conserva ese valor mejor que un simple ''eran''.'
- source_word: חֻצוֹת
  english_pob_choice: the streets
  chosen_spanish: las calles
  alternatives_spanish:
  - las plazas
  - los espacios abiertos
  lexicon: HALOT
  rationale: En este contexto urbano, 'calles' comunica bien la idea de vías o lugares públicos de Jerusalén.
- source_word: שַׂמְתֶּם
  english_pob_choice: you have set up
  chosen_spanish: han puesto
  alternatives_spanish:
  - han levantado
  - han establecido
  lexicon: HALOT
  rationale: Con altares, שׂים implica colocar o establecer. 'Han puesto' es una solución breve y fiel; 'han levantado' también sería posible, pero menos directa aquí.
- source_word: מִזְבְּחוֹת
  english_pob_choice: altars
  chosen_spanish: altares
  lexicon: HALOT
  rationale: Término estándar para el altar sacrificial/cúltico.
- source_word: לַבֹּשֶׁת
  english_pob_choice: to Shame
  chosen_spanish: a la Vergüenza
  alternatives_spanish:
  - a la vergüenza
  - al Deshonor
  lexicon: HALOT
  rationale: Se conserva el sentido polémico del hebreo בֹּשֶׁת como sustituto despectivo de una deidad pagana. 'Vergüenza' mantiene el valor nominal y el tono de escarnio.
- source_word: לְקַטֵּר
  english_pob_choice: to burn incense
  chosen_spanish: para quemar incienso
  alternatives_spanish:
  - para ofrecer incienso
  - para hacer humo de incienso
  lexicon: HALOT
  rationale: El verbo puede referirse específicamente a una ofrenda de humo/incenso. 'Quemar incienso' refleja bien el uso cultual y es idiomático en español.
- source_word: לַבָּעַל
  english_pob_choice: to Baal
  chosen_spanish: a Baal
  alternatives_spanish:
  - para Baal
  lexicon: HALOT
  rationale: Nombre propio del dios pagano, conservado sin sustituirlo por un término genérico.
theological_decisions:
- issue: Tratamiento de יְהוּדָה como vocativo y del cambio de persona gramatical
  english_pob_reading: Address Judah as a collective entity ('Judah') while retaining the plural 'you have set up' for the people collectively.
  chosen_spanish_reading: Tratar a Judá como vocativo colectivo ('oh Judá') y mantener el plural en 'han puesto' para el pueblo en conjunto.
  alternative_spanish_readings:
  - Hacer todo singular para suavizar la construcción
  - Mantener la oscilación sin marcarla
  rationale: El hebreo personifica a Judá en singular y luego se dirige al pueblo colectivamente. El español debe conservar esa tensión sin eliminarla; 'oh Judá' hace visible la invocación directa.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Interpretación de לַבֹּשֶׁת
  english_pob_reading: Render as 'Shame' in the main text, with likely reference to Baal preserved in a footnote.
  chosen_spanish_reading: Renderizar como 'Vergüenza' en el texto principal, con la posible referencia a Baal en nota.
  alternative_spanish_readings:
  - Traducir directamente como 'Baal'
  - Traducir como 'el ídolo vergonzoso'
  rationale: El hebreo usa un sustituto polémico que significa 'vergüenza'. Traducirlo conserva la denuncia profética; la identificación probable con Baal se documenta aparte.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor cultual de לְקַטֵּר
  english_pob_reading: '''to burn incense'' with note that the Hebrew verb often refers specifically to making a smoke offering.'
  chosen_spanish_reading: '''para quemar incienso'' en el texto principal.'
  alternative_spanish_readings:
  - '''para ofrecer incienso'''
  - '''para hacer ofrendas de humo'''
  rationale: La expresión española habitual conserva el sentido de ofrenda cultual y refleja mejor el valor específico del verbo que una formulación demasiado general.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail: se mantiene la dirección vocativa hacia Judá, se conserva la comparación numérica, y se prefiere una expresión cultual precisa para לְקַטֵּר (''quemar incienso''). La puntuación marca con claridad el quiebre sintáctico entre la primera y la segunda mitad del versículo.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton; aquí el versículo no lo contiene.
  - '''Baal'' se mantiene como nombre propio; el término polémico לַבֹּשֶׁת se traduce por ''Vergüenza'' para preservar la ironía profética.'
  - Se usa 'oh Judá' para reflejar el vocativo y no aplanar el cambio de persona del hebreo.
  - '''Quemar incienso'' se prefiere por ser una equivalencia cultual clara y bien atestiguada para לְקַטֵּר.'
