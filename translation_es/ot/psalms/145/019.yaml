translation:
  language: es
  text: Él cumple el deseo de los que le temen[a]; oye su clamor por ayuda y los salva[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su petición de ayuda».
    reason: lexical_alternative
  - marker: b
    text: O «y los libra».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְצוֹן
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - voluntad
  - placer
  lexicon: HALOT
  rationale: En este contexto, רְצוֹן expresa aquello que los fieles anhelan o desean, no la benevolencia divina. «Deseo» conserva bien el sentido del objeto de יַעֲשֶׂה y suena natural en español bíblico moderno.
- source_word: יְרֵאָיו
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que le reverencian
  - los temerosos de él
  lexicon: HALOT
  rationale: La forma participial describe a personas caracterizadas por el temor de Dios. «Los que le temen» preserva la fuerza léxica de ירא y evita suavizarla a una mera reverencia.
- source_word: יַעֲשֶׂה
  english_pob_choice: fulfills
  chosen_spanish: cumple
  alternatives_spanish:
  - hace
  - realiza
  - atiende
  lexicon: HALOT
  rationale: Aunque el verbo es literalmente «hacer», con «deseo» en español la formulación natural y fiel es «cumple el deseo». Mantiene el valor de realización efectiva sin sonar mecánico.
- source_word: שַׁוְעָתָם
  english_pob_choice: their cry for help
  chosen_spanish: su clamor por ayuda
  alternatives_spanish:
  - su clamor
  - su súplica de auxilio
  lexicon: HALOT
  rationale: שַׁוְעָה es un clamor de angustia que pide rescate. «Clamor por ayuda» hace explícita la dimensión de urgencia implícita en el término y encaja con la clausula siguiente.
- source_word: יִשְׁמַע
  english_pob_choice: he hears
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - atiende
  lexicon: HALOT
  rationale: El verbo básico es «oír». En un contexto de oración, «oye» conserva la forma léxica y deja que el contexto comunique la respuesta atenta.
- source_word: וְיוֹשִׁיעֵם
  english_pob_choice: and saves them
  chosen_spanish: y los salva
  alternatives_spanish:
  - y los libra
  - y los rescata
  lexicon: HALOT
  rationale: La forma hifil de יָשַׁע significa salvar/librar. «Los salva» mantiene la resonancia bíblica amplia sin restringir indebidamente el alcance a una sola situación.
theological_decisions:
- issue: Preservación del lenguaje de temor reverente
  english_pob_reading: those who fear him
  chosen_spanish_reading: los que le temen
  alternative_spanish_readings:
  - los que le reverencian
  rationale: El salmo usa explícitamente el lenguaje de temor de Yahvé para describir a los fieles. No conviene reemplazarlo por una formulación más suave, porque eso diluiría la fuerza teológica y sapiencial del hebreo.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Alcance de la salvación en וְיוֹשִׁיעֵם
  english_pob_reading: and saves them
  chosen_spanish_reading: y los salva
  alternative_spanish_readings:
  - y los libra
  rationale: El verbo puede abarcar rescate temporal o salvación en sentido amplio. «Los salva» preserva esa amplitud y la resonancia teológica, sin limitar el pasaje a una sola modalidad de liberación.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincido con el estado de revisión más reciente: no se requieren cambios adicionales según el audit trail en inglés; la redacción española sigue de cerca las decisiones léxicas y teológicas documentadas.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito en el pronombre «le» según el flujo del verso, sin introducir un término no presente en el hebreo.
  - Se prefirió «los que le temen» frente a «reverencian» para conservar la fuerza del participio hebreo יְרֵאָיו.
  - «Clamor por ayuda» conserva la idea de súplica angustiada indicada por שַׁוְעָה y evita una simplificación a «clamor» sin matiz.
  - La cláusula final usa «salva» en armonía con la amplitud de יושיעם; «libra» queda como alternativa anotada.
