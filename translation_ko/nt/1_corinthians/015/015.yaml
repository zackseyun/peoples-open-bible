id: 1CO.15.15
reference: 1 Corinthians 15:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εὑρισκόμεθα δὲ καὶ ψευδομάρτυρες τοῦ θεοῦ, ὅτι ἐμαρτυρήσαμεν κατὰ τοῦ θεοῦ ὅτι ἤγειρεν τὸν Χριστόν, ὃν οὐκ ἤγειρεν εἴπερ ἄρα νεκροὶ οὐκ ἐγείρονται.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/015.yaml
  text: Then we are even found to be false witnesses about God[a], because we testified about God that he raised the Messiah[b], whom he did not raise if in fact the dead are not raised.
  footnotes:
  - marker: a
    text: Or 'false witnesses about God.' The Greek genitive in 'false witnesses of God' can be understood as testimony concerning God, though the following phrase 'against God' supports the stronger sense in the main text.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title rather than a name-like form in this context.
    reason: alternative_reading
translation:
  language: ko
  text: 또한 우리는 하나님에 대한 거짓 증인으로 드러나게 됩니다. 우리가 하나님에 관하여 그분께서 메시아를 일으키셨다고 증언하였는데, 만일 죽은 자들이 일으킴을 받지 않는다면 하나님께서 그분을 일으키지 않으신 것이 되기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤγειρεν
  english_pob_choice: raised
  chosen_korean: 일으키다
  alternatives_korean:
  - 살리다
  - 부활시키다
  lexicon: BDAG
  rationale: ἐγείρω 능동형은 「일으키다」, 수동형은 「일어나다/일으킴을 받다」로 일관되게 옮긴다.
