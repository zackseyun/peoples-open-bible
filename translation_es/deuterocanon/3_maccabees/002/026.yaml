base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/002/026.yaml
  text: He was not only inflamed with shameless debaucheries[a], but also advanced to such a degree of audacity that slanders were being spread in the places, and many of his friends, urging on the king’s purpose[b], were themselves following his will.
  footnotes:
  - marker: a
    text: Or 'evil reports' or 'defamations' for 'slanders.' The Greek term can denote abusive or defamatory speech more broadly.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in the places' may mean 'throughout the districts' or 'in the localities.'
    reason: lexical_alternative
