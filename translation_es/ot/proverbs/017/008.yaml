translation:
  language: es
  text: Un soborno es una piedra talismán[a] a los ojos de su dueño; adondequiera que vaya,[b] prospera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “una piedra preciosa”, “una piedra mágica” o “un amuleto afortunado”. Hebreo: “una piedra de favor”.'
    reason: lexical_alternative
  - marker: b
    text: Lit. “adondequiera que se vuelva”. O “tiene éxito”. El verbo hebreo puede denotar actuar con éxito o prosperar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֶן חֵן
  english_pob_choice: a charm-stone
  chosen_spanish: una piedra de encanto
  alternatives_spanish:
  - una piedra preciosa
  - una piedra de favor
  - una piedra mágica
  - un amuleto afortunado
  lexicon: HALOT
  rationale: 'La expresión hebrea es literal: “piedra de favor/gracia”. En este proverbio funciona de modo idiomático y sugiere un objeto visto como portador de ventaja o suerte. “Piedra de encanto” conserva la imagen de la piedra y comunica el valor atractivo o talismánico sin forzar una explicación demasiado interpretativa.'
- source_word: הַשֹּׁחַד
  english_pob_choice: a bribe
  chosen_spanish: un soborno
  alternatives_spanish:
  - un regalo
  lexicon: HALOT
  rationale: El sustantivo suele denotar soborno, no un regalo neutral. En un proverbio de sabiduría, el matiz moral negativo encaja mejor con “soborno”, que transmite la idea de ventaja corrupta.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - en la opinión de
  - para
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español para expresar perspectiva o estimación, manteniendo la metáfora hebrea.
- source_word: בְעָלָיו
  english_pob_choice: its owner
  chosen_spanish: su dueño
  alternatives_spanish:
  - su poseedor
  - su propietario
  lexicon: HALOT
  rationale: El sufijo remite al soborno como algo poseído. “Dueño” es claro y natural en español; evita introducir un matiz jerárquico más fuerte de lo necesario.
- source_word: אֶל כָּל אֲשֶׁר יִפְנֶה
  english_pob_choice: wherever he turns
  chosen_spanish: a dondequiera que se vuelva
  alternatives_spanish:
  - a cualquier lugar adonde se vuelva
  - en cualquier dirección que tome
  lexicon: HALOT
  rationale: La cláusula hebrea es una forma idiomática de amplitud direccional. “A dondequiera que se vuelva” mantiene el alcance general y suena fluido en español.
- source_word: יַשְׂכִּיל
  english_pob_choice: he prospers
  chosen_spanish: prospera
  alternatives_spanish:
  - tiene éxito
  - sucede con éxito
  - actúa con acierto
  lexicon: HALOT
  rationale: El hifil de שׂכל puede significar prosperar o tener éxito, con resonancias de actuar con eficacia. Aquí el sentido práctico es el de éxito obtenido, por lo que “prospera” conserva esa fuerza; las alternativas quedan abiertas para el matiz de éxito/eficacia.
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo y con la decisión inglesa auditada; no se registran revisiones aplicadas y el control de revisión indica que el borrador previo seguía igual.
  spanish_consistency_notes:
  - Se mantuvo la imagen de la piedra y del soborno sin suavizarla hacia un lenguaje moralmente neutro.
  - Se preservó la ambigüedad lexical de יַשְׂכִּיל mediante una nota que permite tanto “prospera” como “tiene éxito”.
  - Se eligió un español contemporáneo, formal y publicable, evitando calcos innecesarios pero conservando la metáfora del original.
