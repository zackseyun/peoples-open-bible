translation:
  language: es
  text: El atavío[a] de un hombre, y la risa de sus dientes, y los pasos de una persona proclaman lo que tiene que ver con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atuendo». El griego dice literalmente algo como «arreglo/adorno»; se eligió «atavío» para un español más natural y visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: στολισμὸς
  english_pob_choice: attire
  chosen_spanish: atavío
  alternatives_spanish:
  - vestidura
  - atuendo
  - aderezo
  lexicon: LSJ
  rationale: El griego denota arreglo u ornamento visible. «Atavío» comunica la presentación externa sin cargar el término hacia un sentido moralizante ni sonar demasiado abstracto.
- source_word: ἀνδρὸς
  english_pob_choice: man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de un varón
  - del hombre
  lexicon: LSJ
  rationale: Mantiene el singular masculino del griego y su valor representativo en el proverbio. «De un hombre» es natural en español y conserva la forma de la fuente.
- source_word: γέλως ὀδόντων
  english_pob_choice: the laughter of his teeth
  chosen_spanish: la risa de sus dientes
  alternatives_spanish:
  - la sonrisa de sus dientes
  - el mostrar de sus dientes
  - la risa de los dientes
  lexicon: LSJ
  rationale: La imagen griega es literalmente «risa de dientes», una expresión poco usual que sugiere la expresión visible en la boca. Se conserva la rareza del giro en el texto principal para no suavizarla en exceso.
- source_word: βήματα ἀνθρώπου
  english_pob_choice: a person's steps
  chosen_spanish: los pasos de una persona
  alternatives_spanish:
  - los pasos de un hombre
  - la manera de andar de una persona
  lexicon: LSJ
  rationale: βήματα son «pasos» o el andar. «Una persona» refleja el cambio de ἀνδρός a ἀνθρώπου, más general en el griego, y evita masculinizar de nuevo el segundo miembro.
- source_word: ἀναγγέλλει
  english_pob_choice: proclaim
  chosen_spanish: proclaman
  alternatives_spanish:
  - anuncian
  - dan a conocer
  - revelan
  lexicon: LSJ
  rationale: «Proclaman» conserva la fuerza declarativa del verbo sin volverlo técnico. El plural en español sigue el sujeto coordinado del proverbio.
- source_word: τὰ περὶ αὐτοῦ
  english_pob_choice: what is about him
  chosen_spanish: lo que hay en él
  alternatives_spanish:
  - lo que concierne a él
  - las cosas acerca de él
  - lo que es de él
  lexicon: LSJ
  rationale: 'La expresión griega significa literalmente «las cosas concernientes a él». «Lo que hay en él» es una equivalencia interpretativa prudente para el contexto sapiencial: señala que la apariencia externa revela algo de la persona, sin restringirlo solo a reputación o solo a carácter.'
translation_notes:
  revision_awareness: 'El texto griego es breve y presenta dos imágenes inusuales: «la risa de sus dientes» y «lo que hay en él». La redacción española conserva esas tensiones en lugar de armonizarlas por completo, siguiendo el criterio de equivalencia óptima del POB inglés y la revisión sin cambios reportada en el expediente.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, pero en español moderno.
  - No se usó «SEÑOR» ni terminología cristológica; el pasaje no lo requiere.
  - La coordinación verbal en plural («proclaman») sigue el sujeto compuesto del original.
  - La nota al pie preserva la alternativa semántica de «aderezo/atuendo» sin introducir una paráfrasis extensa.
