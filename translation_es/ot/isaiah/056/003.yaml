    reason: lexical_alternative
  - marker: c
    text: O «oficial de la corte» en algunos contextos; aquí «eunuco» encaja mejor, especialmente por la imagen de «un árbol seco».
    reason: alternative_reading
  revision_rationale: 'Se corrigen las notas para que correspondan al hebreo y al precedente de la auditoría inglesa: el énfasis se marca en «ciertamente me apartará», no en «árbol seco»; y la nota sobre «eunuco» se restituye como alternativa léxica contextual. Se elimina la nota metatraductológica sobre la revisión inglesa, innecesaria para el lector final.'
