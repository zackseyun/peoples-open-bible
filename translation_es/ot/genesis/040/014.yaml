  glossary_alignment: No hay términos teológicos del glosario principal en juego. «Bondad» para חָסֶד es defendible en este contexto interpersonal. «Faraón» y «casa» están bien. La revisión propuesta mantiene la literalidad suficiente sin calcos impropios.
