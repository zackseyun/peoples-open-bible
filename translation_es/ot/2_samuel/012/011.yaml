base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/012/011.yaml
  text: 'Thus says Yahweh: Behold[a], I am raising up disaster against you from your own house, and I will take your wives before your eyes and give them to your neighbor[b], and he will lie with your wives in the sight of this sun.'
  footnotes:
  - marker: a
    text: Or 'neighbor.' The Hebrew רֵעַ can mean 'neighbor,' 'companion,' or 'associate.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the sight of this sun,' that is, openly and publicly.
    reason: lexical_alternative
