base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/030/004.yaml
  text: And a sword will come upon Egypt[a], and there will be anguish in Cush, when the slain fall in Egypt, and they take away her multitude[c][b], and her foundations are torn down.
  footnotes:
  - marker: a
    text: Cush is the region south of Egypt, often corresponding broadly to ancient Nubia rather than the modern nation-state of Ethiopia.
    reason: cultural_note
  - marker: b
    text: Or 'there will be trembling in Cush.' The Hebrew term can denote shaking, writhing, or anguish in response to disaster.
    reason: lexical_alternative
  - marker: c
    text: Or 'they take away her multitude/abundance.' The Hebrew word can refer to a population, abundance, or wealth; here it is rendered in the sense of plundered riches.
    reason: lexical_alternative
