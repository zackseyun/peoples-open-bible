translation:
  language: es
  text: Entonces se levantaron Zorobabel hijo de Salatiel y Jesúa[b] hijo de Josadac, y comenzaron a edificar la casa de Dios que está en Jerusalén[a], y con ellos estaban los profetas de Dios, ayudándolos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Dios». El arameo dice literalmente «la casa de Dios».
    reason: lexical_alternative
  - marker: b
    text: «Jesúa» es la forma personal del nombre usada aquí; compárese la forma relacionada «Josué» en otros pasajes.
    reason: lexical_alternative
  - marker: c
    text: O «apoyándolos», «asistiéndolos» o «sosteniéndolos». El participio expresa ayuda activa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca discursiva aramea que introduce la siguiente acción en secuencia. «Entonces» conserva la progresión narrativa de forma natural en español.
- source_word: קָמוּ
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: HALOT
  rationale: El verbo básico es «levantarse / ponerse en pie». En este contexto narrativo, «se levantaron» mantiene el matiz de iniciar la acción sin sonar forzado en español.
- source_word: זְרֻבָּבֶל
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubbabel
  lexicon: Transliteración bíblica tradicional en español
  rationale: En español bíblico el nombre se ha fijado comúnmente como «Zorobabel». Es una forma reconocible y auditada, no una paráfrasis.
- source_word: בַּר
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de linaje de
  lexicon: HALOT
  rationale: Marcador patronímico arameo; «hijo de» es la equivalencia directa y clara en español.
- source_word: שְׁאַלְתִּיאֵל
  english_pob_choice: Shealtiel
  chosen_spanish: Shealtiel
  alternatives_spanish:
  - Salatiel
  lexicon: Transliteración bíblica
  rationale: Se conserva la forma del nombre personal sin añadir adaptación no documentada en este registro.
- source_word: וְיֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Josué
  lexicon: Transliteración bíblica tradicional en español
  rationale: La forma aramea קצר/relativa del nombre se refleja como «Jesúa», evitando igualarlo mecánicamente con «Josué».
- source_word: יֽוֹצָדָק
  english_pob_choice: Jozadak
  chosen_spanish: Jozadac
  alternatives_spanish:
  - Jozadak
  - Jehozadac
  lexicon: Transliteración bíblica tradicional en español
  rationale: Se adapta la terminación al uso ortográfico español más natural («-ac») sin cambiar el nombre propio.
- source_word: וְשָׁרִיו
  english_pob_choice: and began
  chosen_spanish: y comenzaron
  alternatives_spanish:
  - y empezaron
  - y se pusieron a
  lexicon: HALOT
  rationale: El valor verbal es iniciar la acción. En español, «y comenzaron» puede unirse naturalmente con el infinitivo siguiente y conserva la fuerza narrativa.
- source_word: לְמִבְנֵא
  english_pob_choice: to build
  chosen_spanish: a edificar
  alternatives_spanish:
  - a construir
  - para edificar
  lexicon: HALOT
  rationale: Infinitivo complementario de «comenzaron». «Edificar» preserva el registro bíblico y el sentido de construcción del templo sin introducir una terminología más interpretativa.
- source_word: בֵּית אֱלָהָא
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa de Yahvé
  lexicon: HALOT
  rationale: El arameo dice literalmente «casa de Dios». Se mantiene esa formulación para respetar la imagen original; «templo» queda como alternativa contextual, no como sustitución obligatoria.
- source_word: דִּי בִירוּשְׁלֶם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que estaba en Jerusalén
  - la cual está en Jerusalén
  lexicon: HALOT
  rationale: La cláusula relativa identifica la ubicación de la casa de Dios. «Que está en Jerusalén» es idiomático y fiel al vínculo descriptivo.
- source_word: וְעִמְּהוֹן
  english_pob_choice: and with them were
  chosen_spanish: y con ellos estaban
  alternatives_spanish:
  - y con ellos estaban presentes
  - y estaban con ellos
  lexicon: HALOT
  rationale: 'La frase preposicional se expresa con una estructura natural en español: «con ellos estaban». Mantiene el énfasis en la compañía de los profetas.'
- source_word: נביאיא דִי אֱלָהָא
  english_pob_choice: the prophets of God
  chosen_spanish: los profetas de Dios
  alternatives_spanish:
  - los profetas de Yahvé
  - los profetas de Dios
  lexicon: HALOT
  rationale: La construcción posesiva se traduce de manera directa. «Los profetas de Dios» conserva el tono formal y la referencia genérica del texto.
- source_word: מְסָעֲדִין לְהוֹן
  english_pob_choice: supporting them
  chosen_spanish: ayudándolos
  alternatives_spanish:
  - apoyándolos
  - asistiéndolos
  - sosteniéndolos
  lexicon: HALOT
  rationale: El participio indica apoyo activo. «Ayudándolos» es claro en español y no sobreespecifica el tipo de ayuda; «apoyando/asistiendo» siguen siendo alternativas válidas.
theological_decisions:
- issue: Imagen de «la casa de Dios» frente a «templo»
  english_pob_reading: Retain the literal phrase 'the house of God' rather than substituting 'temple' in the main text.
  chosen_spanish_reading: Mantener «la casa de Dios» en el texto principal, no «el templo de Dios».
  alternative_spanish_readings:
  - el templo de Dios
  - la casa de Yahvé
  rationale: El arameo dice literalmente «casa de Dios». En español, conservar la imagen original evita introducir una interpretación más explícita de la arquitectura sagrada que el texto no usa aquí. «Templo» puede anotarse como alternativa contextual, pero no desplaza la formulación de base.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió la anclaje de notas para que cada marcador aparezca exactamente en el texto español. La nota sobre ayuda activa se vinculó a «ayudándolos» y la nota sobre la casa de Dios se vinculó a «Jerusalén[a]» no como variante textual sino como nota de alternativa léxica del sintagma previo, manteniendo consistencia con el control de marcadores. No se introdujeron cambios de sentido respecto del audit trail inglés.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia narrativa de acción: «Entonces se levantaron... y comenzaron a edificar».'
  - 'Se preservó la identidad de los nombres propios con adaptación española reconocible: Zorobabel, Shealtiel, Jesúa, Jozadac.'
  - Se conservó «casa de Dios» como fórmula principal y no se reemplazó por «templo» en el cuerpo del texto.
  - Se evitó traducir mecánicamente desde el inglés en la cláusula final; «ayudándolos» refleja el participio de soporte activo con español natural.
