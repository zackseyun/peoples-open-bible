translation:
  language: es
  text: 'Si un hombre anduviera con viento y falsedad[a], mintiendo: «Te predicaré acerca de vino y bebida embriagante», sería el predicador de este pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Te profetizaré acerca de vino y bebida embriagante … sería el profeta de este pueblo». El verbo hebreo es el mismo en ambas cláusulas y a menudo se usa para el habla profética; aquí aparece con ironía mordaz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - Si fuera que
  lexicon: HALOT
  rationale: Introduce una condición hipotética breve y natural en español, sin añadir matiz optativo que el contexto satírico no exige.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa singular masculino; «un hombre» conserva la forma y el tono retórico del original.
- source_word: הֹלֵךְ רוּחַ וָשֶׁקֶר
  english_pob_choice: should go about with wind and falsehood
  chosen_spanish: anduviera con viento y falsedad
  alternatives_spanish:
  - anduviera en viento y falsedad
  - fuera un viento y una mentira
  - anduviera como charlatán y mentiroso
  lexicon: HALOT
  rationale: «Viento» conserva la imagen de vaciedad o insustancialidad; «falsedad» nombra el engaño. «Anduviera con» mantiene el movimiento idiomático sin volverlo excesivamente interpretativo.
- source_word: כִּזֵּב
  english_pob_choice: lying
  chosen_spanish: mintiendo
  alternatives_spanish:
  - mintiera
  - engañando
  lexicon: HALOT
  rationale: Expresa el acto de falsear o mentir y encaja bien con la cláusula anterior como rasgo concomitante.
- source_word: אַטִּף
  english_pob_choice: I will preach
  chosen_spanish: te profetizaré
  alternatives_spanish:
  - te predicaré
  - profetizaré para ti
  - haré profecía para ti
  lexicon: HALOT
  rationale: En este contexto נטף funciona como verbo de habla profética, con ironía. «Profetizaré» conserva esa fuerza y deja visible la relación con la nota alternativa del POB inglés.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El dativo directo en discurso citado suena más natural como clítico en español.
- source_word: לַיַּיִן וְלַשֵּׁכָר
  english_pob_choice: of wine and strong drink
  chosen_spanish: acerca de vino y bebida fuerte
  alternatives_spanish:
  - sobre vino y bebida fuerte
  - de vino y licor
  - acerca del vino y de la bebida fuerte
  lexicon: HALOT
  rationale: «Acerca de» refleja el contenido temático del mensaje; «bebida fuerte» conserva la amplitud del hebreo שֵׁכָר mejor que términos más estrechos como «licor».
- source_word: וְהָיָה מַטִּיף
  english_pob_choice: he would be the preacher
  chosen_spanish: sería el profeta
  alternatives_spanish:
  - sería el predicador
  - sería quien profetiza
  - sería el que profetiza
  lexicon: HALOT
  rationale: El hebreo repite el verbo de habla profética; en español «profeta» preserva mejor la ironía y la conexión con la nota alternativa del POB que «predicador», que sería posible pero menos preciso aquí.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo aquí
  - este pueblo mismo
  lexicon: HALOT
  rationale: «Pueblo» reproduce el sustantivo colectivo hebreo y mantiene el tono profético de reprensión.
theological_decisions:
- issue: Valor irónico del verbo profético נטף
  english_pob_reading: preach / preacher, with footnoted prophesy / prophet
  chosen_spanish_reading: profetizaré / profeta
  alternative_spanish_readings:
  - predicaré / predicador
  - diré / portavoz
  rationale: El pasaje critica al mensajero acomodaticio que anuncia lo que el pueblo desea oír. Traducir con «profetizaré» y «profeta» conserva el vínculo verbal entre ambas cláusulas y hace visible la ironía del hebreo, mientras que la nota permite recordar la alternativa más técnica.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés: la cláusula final se alineó con la construcción más directa «de este pueblo», reflejada en «de este pueblo»; además, se conservó la ambigüedad profética del verbo repetido mediante «profetizaré» / «profeta» y nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; este versículo no contiene el nombre divino.
  - Se eligió «bebida fuerte» para mantener la amplitud semántica de שֵׁכָר sin restringirla a una sola categoría moderna.
  - Se mantuvo el tono profético-satírico sin suavizar la crítica del hebreo.
  - La puntuación española reproduce una cita directa clara y natural para lectura pública.
