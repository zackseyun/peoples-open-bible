translation:
  language: es
  text: Mi corazón se retuerce dentro de mí[a], y los terrores de la muerte han caído sobre mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi corazón tiembla dentro de mí». El verbo hebreo puede expresar retorcerse, temblar o estar en angustia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  - mi ser interior
  lexicon: HALOT
  rationale: לֵב/לֵבָב designa el centro interior de pensamiento y emoción. En este lamento, «corazón» conserva en español la carga afectiva y corporal que el hebreo expresa mejor que «mente».
- source_word: יָחִיל
  english_pob_choice: writhes
  chosen_spanish: se retuerce
  alternatives_spanish:
  - tiembla
  - está en angustia
  - se estremece
  lexicon: HALOT
  rationale: El verbo de חול/חיל puede indicar retorcerse, temblar o estar en angustia. Aquí, junto con «dentro de mí» y con «los terrores de la muerte», la idea es de convulsión interior intensa; «se retuerce» comunica bien esa tensión visceral en español.
- source_word: בְּקִרְבִּי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mi interior
  - en medio de mí
  lexicon: HALOT
  rationale: קֶרֶב con sufijo de primera persona alude al interior. «Dentro de mí» es natural y claro en español poético.
- source_word: אֵימוֹת
  english_pob_choice: the terrors
  chosen_spanish: los terrores
  alternatives_spanish:
  - los espantos
  - los horrores
  - los temores
  lexicon: HALOT
  rationale: El plural de אֵימָה expresa terrores o pavor intenso. «Los terrores» conserva el plural y la fuerza del sustantivo hebreo.
- source_word: מָוֶת
  english_pob_choice: of death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - mortales
  - de muerte
  lexicon: HALOT
  rationale: La relación constructa se refleja de forma directa en español como «de la muerte», manteniendo la conexión genitiva sin añadir matices no presentes.
- source_word: נָפְלוּ
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  - se han abatido
  lexicon: HALOT
  rationale: El qatal expresa una acción completa con efecto presente. «Han caído» conserva ese valor y funciona bien en el paralelismo poético.
- source_word: עָלָי
  english_pob_choice: upon me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - encima de mí
  - contra mí
  lexicon: HALOT
  rationale: עַל con sufijo de primera persona se traduce naturalmente como «sobre mí». Mantiene el registro poético y la imagen de peso que recae sobre el hablante.
translation_notes:
  revision_awareness: 'El texto inglés POB leído junto con el hebreo WLC confirma una traducción no mecánica de יָחִיל: «se retuerce» mantiene la fuerza visceral que el audit trail describió para «writhes», sin perder la alternativa legítima de «tiembla». No se observaron revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se conservó el paralelismo poético con dos miembros unidos por «y».
  - «Corazón» se mantiene como sede interior de emoción y pensamiento, acorde con el valor semántico de לֵב.
  - La nota al pie marca la alternativa semántica principal del verbo hebreo, como en el registro inglés.
