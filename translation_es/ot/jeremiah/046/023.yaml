translation:
  language: es
  text: Han talado su bosque[a], declara Yahvé, aunque no puede ser penetrado; pues son más numerosos que las langostas, y no tienen número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque no puede ser penetrado». La conjunción hebrea כִּי puede leerse de modo causal («porque») o concesivo («aunque»); el texto principal adopta la lectura concesiva por ajustarse mejor al contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּרְתוּ
  english_pob_choice: They have cut down
  chosen_spanish: Cortaron
  alternatives_spanish:
  - Han cortado
  - Han derribado
  - Cortaron de raíz
  lexicon: HALOT
  rationale: El qal perfecto plural comunica una acción ya realizada o segura; en español, el pretérito simple suena natural en este contexto profético. 'Cortaron' conserva la imagen de talar/felar el bosque sin añadir énfasis no presente en el hebreo.
- source_word: יַעְרָהּ
  english_pob_choice: her forest
  chosen_spanish: su bosque
  alternatives_spanish:
  - su bosque[?]
  - su selva
  - su arboleda
  lexicon: HALOT
  rationale: יַעַר es 'bosque'; 'su bosque' preserva la referencia posesiva al sujeto femenino personificado (Egipto) sin forzar en español el género del posesivo. 'Bosque' es más claro y fiel que alternativas más interpretativas.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - dice el Señor
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se vierte de modo sobrio como 'dice' para mantener fluidez en español, y יְהוָה se traduce como 'Yahvé' conforme al criterio del proyecto. 'Declara' o 'oráculo de' serían posibles, pero aquí 'dice Yahvé' es directo y fiel.
- source_word: כִּי לֹא יֵחָקֵר
  english_pob_choice: though it cannot be searched out
  chosen_spanish: aunque no puede ser buscado
  alternatives_spanish:
  - porque no puede ser buscado
  - aunque no puede ser explorado
  - pues no puede ser sondeado
  lexicon: HALOT
  rationale: יֵחָקֵר en nifal expresa ser investigado/explorado/buscado a fondo. El inglés POB toma כִּי aquí de forma concesiva; en español, 'aunque' mantiene esa lectura y evita un causal que rompería el sentido del verso. 'Buscado' conserva la idea de indagación penetrante.
- source_word: רַבּוּ
  english_pob_choice: they are more numerous
  chosen_spanish: son más numerosos
  alternatives_spanish:
  - se han multiplicado
  - son muchos
  - son demasiado numerosos
  lexicon: HALOT
  rationale: El perfecto qal de רבה aquí expresa abundancia comparativa. 'Son más numerosos' reproduce bien la comparación con las langostas y suena natural en español.
- source_word: מֵאַרְבֶּה
  english_pob_choice: than locusts
  chosen_spanish: que las langostas
  alternatives_spanish:
  - que los saltamontes
  - que la langosta
  - que los chapulines
  lexicon: HALOT
  rationale: אַרְבֶּה se refiere a 'langostas', imagen bíblica de multitud devastadora. En español, el plural 'las langostas' conserva el valor comparativo y el eco imagético.
- source_word: וְאֵין לָהֶם מִסְפָּר
  english_pob_choice: and they are without number
  chosen_spanish: y no tienen número
  alternatives_spanish:
  - y son innumerables
  - y no se les puede contar
  - y carecen de número
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente que no hay número para ellos. 'No tienen número' es una fórmula española breve, transparente y muy cercana al hebreo; evita la abstracción de 'innumerables' sin perder el sentido.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo contiene explícitamente el Tetragrammaton. Siguiendo la norma del proyecto, se translitera como 'Yahvé' en español, no como una sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de כִּי en la primera cláusula
  english_pob_reading: though
  chosen_spanish_reading: aunque
  alternative_spanish_readings:
  - porque
  - pues
  - si bien
  rationale: 'La lectura concesiva es la que mejor encaja con el desarrollo del verso: pese a ser un bosque impenetrable, lo cortaron. ''Aunque'' preserva esa tensión sin neutralizarla.'
  doctrine_reference: English audit trail for Jeremiah 46:23
translation_notes:
  revision_awareness: El cotejo final del audit trail inglés indica alta concordancia y sin cambios recientes; se conserva la lectura concesiva de כִּי y la transliteración de יְהוָה como Yahvé, sin introducir ajustes doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma uniforme para יְהוָה.
  - Se conserva el registro profético sobrio con 'dice' en vez de una paráfrasis más libre.
  - '''Bosque'', ''langostas'' y ''no tienen número'' siguen de cerca el campo léxico del hebreo y la solución auditada en inglés.'
