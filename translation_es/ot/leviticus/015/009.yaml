review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo dice literalmente: ''Y todo el מֶרְכָּב sobre el cual monte el que padece flujo quedará impuro''. La idea central es el objeto o montura sobre la que el hombre con flujo monta, no ''lo que monta'' como objeto directo. La nota inglesa conserva la alternativa más amplia ''thing ridden on'', pero el texto principal opta por un término más concreto (''saddle'').'
  spanish_quality_summary: 'El borrador español no suena natural ni fiel: ''todo lo que monta el manchado con flujo'' cambia la sintaxis y sugiere que él monta cosas en general; además ''manchado con flujo'' es poco idiomático y puede sonar peyorativo o confuso. ''Será inmundo'' es aceptable en registro bíblico, pero el conjunto necesita reparación para claridad y fidelidad.'
  glossary_alignment: No hay conflicto con términos de proyecto mayores. Para הַזָּב conviene 'el hombre con flujo' o 'el que padece flujo', no 'manchado con flujo'. Para יִטְמָא, 'quedará impura' o 'será inmunda' funcionan; aquí 'montura' pide femenino. La alternativa léxica debe reflejar que מֶרְכָּב puede significar más ampliamente 'aquello sobre lo que se monta'.
  issues:
  - severity: high
    issue: La relación sintáctica de אֲשֶׁר יִרְכַּב עָלָיו está mal representada.
    rationale: El hebreo describe 'la montura/silla sobre la cual monta', pero 'todo lo que monta' convierte la frase en objeto directo y pierde el sentido espacial de עָלָיו.
  - severity: high
    issue: הַמֶּרְכָּב está mal resuelto en el texto principal.
    rationale: Aunque la nota reconoce el sentido amplio, 'lo que se monta' en español significa más bien 'lo que uno monta' y no 'aquello sobre lo que uno monta'. Debe ser 'montura' o construcción equivalente.
  - severity: medium
    issue: '''el manchado con flujo'' no es una designación natural ni precisa para הַזָּב.'
    rationale: La expresión hebrea designa al varón que padece un flujo corporal causante de impureza ritual. 'Manchado' introduce una imagen ajena y poco digna.
  - severity: low
    issue: La nota al pie actual es poco natural en español.
    rationale: '''lo que se monta sobre él'' es torpe y ambigua. Debe aclarar ''aquello sobre lo que se monta''.'
  revised_spanish_text: Y toda montura sobre la cual monte el hombre con flujo será inmunda[a].
  revised_footnotes:
  - marker: a
    text: 'O: "todo aquello sobre lo que se monta". El término hebreo puede referirse más ampliamente a lo que se usa para montar, no solo a una silla de montar en sentido estricto.'
    reason: lexical_alternative
