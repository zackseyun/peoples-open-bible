translation:
  language: es
  text: Nabuzaradán, capitán de la guardia[a], Nebusazbán, oficial principal[b], Nergal-sarezer, mago principal[c], y todos los principales oficiales del rey de Babilonia mandaron decir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefe de la guardia». Más literalmente, el título también puede entenderse como «jefe de los verdugos» o similar, pero aquí se refiere al comandante de la guardia real.
    reason: lexical_alternative
  - marker: b
    text: «Oficial principal» traduce un título que también puede entenderse como «eunuco principal» o «alto oficial de la corte».
    reason: lexical_alternative
  - marker: c
    text: «Mago principal» traduce un título babilonio de corte; tradicionalmente algunas versiones lo dejan sin traducir como «Rab-mag».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent word
  chosen_spanish: enviaron palabra
  alternatives_spanish:
  - enviaron
  - mandaron decir
  - despacharon un mensaje
  lexicon: HALOT
  rationale: El hebreo usa un verbo de enviar de manera elíptica; el contexto inmediato completa la acción en el versículo siguiente. «Enviaron palabra» conserva esa elipsis sin añadir un objeto que el hebreo no expresa explícitamente, y en español suena natural y bastante literal.
- source_word: רַב טַבָּחִים
  english_pob_choice: captain of the guard
  chosen_spanish: capitán de la guardia
  alternatives_spanish:
  - jefe de los verdugos
  - jefe de los guardias
  lexicon: HALOT
  rationale: El título apunta al comandante de la guardia real, no a una función culinaria. «Capitán de la guardia» comunica el cargo de forma clara y acorde con el sentido administrativo/cortesano del título.
- source_word: רַב סָרִיס
  english_pob_choice: chief officer
  chosen_spanish: oficial principal
  alternatives_spanish:
  - eunuco principal
  - oficial de la corte principal
  - jefe de eunucos
  lexicon: HALOT
  rationale: סָרִיס puede referirse a un eunuco o, más ampliamente, a un alto funcionario de corte. «Oficial principal» evita fijar sin necesidad una lectura fisiológica y mantiene la jerarquía del título, como en la decisión inglesa de no imponer «eunuch».
- source_word: וְנֵרְגַל שַׂר אֶצֶר
  english_pob_choice: Nergal-sharezer
  chosen_spanish: Nergal-sarezer
  alternatives_spanish:
  - Nergal-sharezer
  - Nergal-sar-ezer
  lexicon: transliteración de nombre propio
  rationale: Se translitera el nombre propio. «Nergal-sarezer» refleja de forma legible en español la forma usual del nombre, sin intentar traducir sus elementos.
- source_word: רַב מָג
  english_pob_choice: chief magus
  chosen_spanish: principal mago
  alternatives_spanish:
  - jefe de los magos
  - Rab-mag
  lexicon: HALOT
  rationale: Es un título de corte babilónico. «Principal mago» conserva el rango y el color extranjero del cargo, y sigue la decisión inglesa de expresar el sentido del título en vez de dejarlo sin traducir como «Rab-mag».
- source_word: וְכֹל רַבֵּי מֶלֶךְ בָּבֶל
  english_pob_choice: and all the chief officials of the king of Babylon
  chosen_spanish: y todos los principales oficiales del rey de Babilonia
  alternatives_spanish:
  - y todos los príncipes del rey de Babilonia
  - y todos los oficiales del rey de Babilonia
  lexicon: HALOT
  rationale: רַבֵּי denota los funcionarios de mayor rango. «Principales oficiales» comunica estatus sin recurrir a «príncipes», que en español puede sonar más dinástico que administrativo.
theological_decisions:
- issue: Elipsis del verbo de envío y alcance de la acción
  english_pob_reading: '''sent word'' preserves the elliptical Hebrew and lets the next verse continue the action.'
  chosen_spanish_reading: '''enviaron palabra'' preserva la elipsis y deja que el versículo siguiente complete lo enviado.'
  alternative_spanish_readings:
  - '''enviaron'''
  - '''mandaron decir'''
  rationale: No se añade explícitamente «mensaje» porque el hebreo no lo dice de forma directa. «Palabra» funciona en español bíblico como objeto elíptico de una comunicación y mantiene abierta la continuidad narrativa con el versículo siguiente.
  doctrine_reference: Ninguna
- issue: Título רַב סָרִיס y posible carga de 'eunuco'
  english_pob_reading: '''chief officer'' avoids over-literalizing ''eunuch'' in a court context.'
  chosen_spanish_reading: '''oficial principal'' evita afirmar ''eunuco'' sin certeza contextual.'
  alternative_spanish_readings:
  - '''eunuco principal'''
  - '''jefe de eunucos'''
  rationale: En este contexto neo-babilónico, el término puede abarcar una función cortesana alta más que una descripción corporal obligatoria. La traducción escogida preserva la tensión lexical sin resolverla en una dirección más específica de la que permite el hebreo.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la decisión inglesa auditada de mantener la elipsis del verbo de envío, mientras adapta los títulos cortesanos a un español natural. No se introdujeron cambios doctrinales ni variantes textuales; solo se afinaron los equivalentes de cargo para lectura pública.
  spanish_consistency_notes:
  - Se mantuvo «Babilonia» como topónimo normalizado en español.
  - Se transliteraron los nombres propios de forma consistente.
  - Se usó «principal/principales» para reflejar רַב sin cargarlo innecesariamente con «jefe» donde el español podría sonar más rígido.
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton ni una cita de κύριος en este versículo.
