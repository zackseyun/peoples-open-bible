translation:
  language: es
  text: La perversidad está en su corazón; maquina el mal en todo tiempo; suelta contiendas.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «provoca contiendas». El hebreo dice literalmente «suelta contiendas», un modismo para causar o esparcir conflicto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּהְפֻּכ֨וֹת
  english_pob_choice: Perversity
  chosen_spanish: perversidad
  alternatives_spanish:
  - torcedura
  - depravación
  - perversas cosas
  lexicon: HALOT
  rationale: El plural abstracto expresa una disposición torcida o perversa. «Perversidad» conserva el valor moral abstracto de manera natural en español y evita concretarlo como «cosas perversas».
- source_word: בְּלִבּוֹ
  english_pob_choice: is in his heart
  chosen_spanish: está en su corazón
  alternatives_spanish:
  - está en su interior
  - permanece en su corazón
  lexicon: HALOT
  rationale: La frase hebrea funciona predicativamente con un sustantivo inicial sin verbo explícito. En español se requiere completar con «está» para una cláusula natural y fiel al sentido de disposición interior.
- source_word: חֹרֵשׁ רָע
  english_pob_choice: he devises evil
  chosen_spanish: maquina el mal
  alternatives_spanish:
  - trama el mal
  - planea el mal
  - ara el mal
  lexicon: HALOT
  rationale: חֹרֵשׁ conserva la imagen literal de «arar», pero en literatura sapiencial significa idear o tramar con intención. «Maquina» mantiene la fuerza de diseño malicioso sin depender de una metáfora agrícola opaca.
- source_word: בְּכָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - continuamente
  - a toda hora
  lexicon: HALOT
  rationale: La expresión señala acción habitual y continua. «En todo tiempo» refleja bien esa constancia y suena natural en español bíblico contemporáneo.
- source_word: מְדָנִים
  english_pob_choice: strife
  chosen_spanish: contiendas
  alternatives_spanish:
  - discordias
  - pleitos
  - riñas
  lexicon: HALOT
  rationale: El plural hebreo apunta a conflictos, disputas y querellas. «Contiendas» preserva el matiz colectivo y es un término bíblico claro en español.
- source_word: יְשַׁלֵּחַ
  english_pob_choice: he sends out
  chosen_spanish: provoca
  alternatives_spanish:
  - desata
  - envía
  - suelta
  lexicon: HALOT
  rationale: El hebreo dice literalmente «envía/suelta» contiendas, un modismo para causar o esparcir conflicto. «Provoca» comunica el efecto idiomático de forma fluida en español, sin ocultar la acción causal.
theological_decisions:
- issue: Cómo renderizar el modismo final sin domesticarlo demasiado
  english_pob_reading: '''he sends out strife'' is kept close to the Hebrew, with a note that it can mean ''he stirs up strife.'''
  chosen_spanish_reading: «provoca contiendas» en el texto principal, con nota alternativa sobre el hebreo literal «envía/suelta contiendas» como modismo de causar conflicto.
  alternative_spanish_readings:
  - «envía contiendas»
  - «desata contiendas»
  - «alborota contiendas»
  rationale: El hebreo presenta un modismo vívido. En español, «provoca contiendas» transmite el sentido causal de manera idiomática; la nota preserva la tensión entre literalidad y significado comunicativo sin borrar la imagen original.
  doctrine_reference: Sabiduría proverbial; no hay controversia doctrinal directa.
translation_notes:
  revision_awareness: 'Se mantiene alta concordancia con el pasaje fuente y con la auditoría inglesa: el clausulado tripartito se conserva, el sustantivo abstracto inicial se traduce como cualidad moral, y el cierre se ajusta al modismo hebreo con una opción idiomática en el texto y una nota que preserva la literalidad.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se prefirió «contiendas» para mantener el tono bíblico y el plural conflictivo de מְדָנִים.
  - No se añadió verbo copulativo en la primera cláusula más allá de «está», necesario en español para reflejar la construcción nominal hebrea.
