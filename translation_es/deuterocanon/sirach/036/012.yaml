translation:
  language: es
  text: '¡Destroza las cabezas de los gobernantes enemigos[a], que dicen: «No hay nadie sino nosotros»!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hay nadie además de nosotros». El griego expresa una exclusividad arrogante; algunos lectores pueden oír una pretensión de tipo cuasi divino, pero «Dios» no aparece en el texto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σύντριψον
  english_pob_choice: Crush
  chosen_spanish: ¡Destroza!
  alternatives_spanish:
  - ¡Rompe!
  - ¡Aplasta!
  lexicon: LSJ
  rationale: El imperativo aoristo de συντρίβω expresa destrucción contundente. «Destroza» comunica fuerza violenta en español natural y conserva la energía del mandato sin suavizarla.
- source_word: κεφαλὰς
  english_pob_choice: heads
  chosen_spanish: las cabezas
  alternatives_spanish:
  - las cabezas
  - las jefaturas
  lexicon: LSJ
  rationale: Se mantiene la imagen corporal concreta del griego. No se reemplaza por una abstracción, porque el texto conserva una violencia imagética deliberada.
- source_word: ἀρχόντων
  english_pob_choice: rulers
  chosen_spanish: de los gobernantes
  alternatives_spanish:
  - de los príncipes
  - de los líderes
  lexicon: LSJ
  rationale: ἄρχων denota autoridad gobernante. «Gobernantes» es claro en español moderno y conserva el matiz político de autoridad.
- source_word: ἐχθρῶν
  english_pob_choice: of enemy rulers
  chosen_spanish: enemigos
  alternatives_spanish:
  - hostiles
  - de los enemigos
  lexicon: LSJ
  rationale: El genitivo describe a los gobernantes como pertenecientes al campo enemigo. En español, «gobernantes enemigos» reproduce de forma natural la relación sin añadir nacionalidad ni intensificar el sustantivo.
- source_word: λεγόντων
  english_pob_choice: who say
  chosen_spanish: que dicen
  alternatives_spanish:
  - diciendo
  - los cuales dicen
  lexicon: LSJ
  rationale: El participio funciona de manera explicativa. «Que dicen» mantiene la relación descriptiva en una estructura fluida para el español.
- source_word: Οὐκ ἔστιν πλὴν ἡμῶν
  english_pob_choice: There is no one but us
  chosen_spanish: No hay nadie fuera de nosotros
  alternatives_spanish:
  - No hay nadie sino nosotros
  - No hay nadie además de nosotros
  lexicon: LSJ
  rationale: La frase griega expresa exclusividad arrogante. «Fuera de nosotros» conserva la idea de no existencia de otros sin introducir explícitamente una formulación teológica que el griego no dice.
theological_decisions:
- issue: Alcance del orgullo exclusivo en la última cláusula
  english_pob_reading: Render the statement as arrogant exclusivity ('There is no one but us') rather than an explicitly theological paraphrase such as 'There is no God but us' or 'There is none besides us' with divine overtones.
  chosen_spanish_reading: «No hay nadie fuera de nosotros» comunica la autosuficiencia soberbia sin convertirla en una afirmación teológica explícita que el texto no formula.
  alternative_spanish_readings:
  - No hay nadie sino nosotros
  - No hay Dios fuera de nosotros
  rationale: El griego no nombra a Dios. La traducción debe conservar la arrogancia exclusivista y la posible pretensión de autosuficiencia, pero sin añadir contenido que el texto no contiene.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción sigue la revisión que prefirió «enemy rulers» frente a «the rulers of the enemies» por ser más natural y exacta. En español, esto se refleja en «gobernantes enemigos», que preserva la misma relación semántica sin forzar una construcción posesiva poco natural.
  spanish_consistency_notes:
  - Se mantiene el tono imperativo violento del original sin atenuarlo.
  - «Gobernantes» conserva el matiz de autoridad política de ἄρχοντες.
  - La cláusula final evita introducir «Dios» porque el griego no lo menciona.
  - Se conserva la imagen de «cabezas» en plural, sin espiritualizarla ni convertirla en mera metáfora.
