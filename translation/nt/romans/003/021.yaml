theological_decisions:
- issue: Meaning of the genitive in 'δικαιοσύνη θεοῦ'
  chosen_reading: the righteousness of God
  alternative_readings:
  - righteousness from God
  - God's covenant justice/righteousness
  rationale: Paul's phrase can evoke God's own righteous character and action, and in context also what is disclosed for human salvation. The main text preserves the ambiguity rather than collapsing it into one doctrinally loaded interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
