- from: Y Nicanor salió de Jerusalén y acampó en Bet-Jorón[a], y una fuerza de Siria se le enfrentó.
  to: Y Nicanor salió de Jerusalén y acampó en Bet-Jorón[a], y una fuerza de Siria se encontró con él.
