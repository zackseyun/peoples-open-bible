    issue: El orden de 'día' y 'noche' está invertido respecto del hebreo.
    rationale: El texto fuente comienza con לְךָ יוֹם y luego añade אַף לְךָ לָיְלָה. El borrador español empieza con 'Tuya es la noche' y luego 'el día', lo que altera el paralelismo y la progresión enfática original.
  - severity: low
    issue: La nota al pie está anclada en 'noche' en vez de en 'luz'.
    rationale: La nota explica la alternativa léxica de מָאוֹר ('lumbrera' / posible referencia a la luna), por lo que debe señalarse en la palabra o frase correspondiente a 'la luz', no en 'noche'.
