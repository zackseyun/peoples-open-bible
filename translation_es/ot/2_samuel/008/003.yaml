translation:
  language: es
  text: David derrotó a Hadadezer, hijo de Rehob[a], rey de Zobá, cuando fue a restaurar su poder[b] al Río[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Hadadezer»; algunas tradiciones textuales y el pasaje paralelo en 1 Crónicas leen «Hadarezer».'
    reason: textual_variant
  - marker: b
    text: 'También: «para recuperar su control» o «para restablecer su dominio»; literalmente, «para restaurar su mano».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, probablemente el río Éufrates.
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: derrotó
  alternatives_spanish:
  - golpeó
  - hirió
  lexicon: HALOT
  rationale: En contexto militar, נכה puede expresar golpear con el resultado de la derrota. En español, «derrotó» comunica bien el desenlace bélico sin afirmar explícitamente la muerte, que el hebreo no declara.
- source_word: הֲדַדְעֶזֶר
  english_pob_choice: Hadadezer
  chosen_spanish: Hadadezer
  alternatives_spanish:
  - Hadarezer
  lexicon: Transliteración del nombre propio
  rationale: Se conserva la forma del texto base hebreo. La variante textual documentada se preserva en nota, no en el cuerpo del versículo.
- source_word: בֶּן רְחֹב
  english_pob_choice: son of Rehob
  chosen_spanish: hijo de Rehob
  alternatives_spanish:
  - descendiente de Rehob
  lexicon: Construcción patronímica
  rationale: «Hijo de» reproduce de forma directa la relación patronímica del hebreo y es natural en español bíblico contemporáneo.
- source_word: מֶלֶךְ צוֹבָה
  english_pob_choice: king of Zobah
  chosen_spanish: rey de Zobá
  alternatives_spanish:
  - rey de Zoba
  lexicon: Topónimo transliterado
  rationale: Se mantiene el nombre propio del reino en forma transliterada. Se acentúa «Zobá» para adecuarlo a la prosodia del español y facilitar la lectura.
- source_word: בְּלֶכְתּוֹ
  english_pob_choice: when he went
  chosen_spanish: cuando iba
  alternatives_spanish:
  - cuando fue
  - mientras iba
  lexicon: HALOT
  rationale: La construcción temporal se vierte de manera natural con «cuando iba», que conserva el valor circunstancial de la acción en curso.
- source_word: לְהָשִׁיב
  english_pob_choice: to restore
  chosen_spanish: restaurar
  alternatives_spanish:
  - recuperar
  - reestablecer
  lexicon: HALOT
  rationale: El hifil de שוב transmite la idea de hacer volver o restituir. «Restaurar» mantiene esa amplitud semántica sin fijar indebidamente el matiz político o militar.
- source_word: יָדוֹ
  english_pob_choice: his power
  chosen_spanish: su poder
  alternatives_spanish:
  - su control
  - su dominio
  - su mano
  lexicon: HALOT
  rationale: La metáfora hebrea de «mano» funciona idiomáticamente para poder o capacidad de actuación. «Su poder» recoge el sentido contextual en español con mayor claridad que una traducción literal.
- source_word: בִּנְהַר
  english_pob_choice: at the River
  chosen_spanish: en el Río
  alternatives_spanish:
  - junto al río
  - en el Éufrates
  lexicon: HALOT
  rationale: Se conserva la expresión más literal del texto fuente, «el Río», porque el hebreo usa el término de modo absoluto; la identificación probable con el Éufrates queda para nota.
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo WLC y el expediente auditado en inglés. No hubo revisiones aplicadas en el pass más reciente; por ello la redacción española mantiene las decisiones ya aprobadas, conservando la ambigüedad de יָדוֹ mediante una nota y la identificación probable de נְהַר como el Éufrates en nota aparte.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el Tetragrámaton aparece explícito; aquí no ocurre, por lo que no se introduce.
  - Se conserva la transliteración «Hadadezer» y el topónimo «Zobá» para mantener consistencia con el expediente y la pronunciación española.
  - «Derrotó» se usa como equivalente de combate para evitar la implicación no explicitada de muerte.
  - La metáfora de «mano» se explica en nota en lugar de forzarla en el cuerpo del texto, preservando la tensión léxica documentada.
