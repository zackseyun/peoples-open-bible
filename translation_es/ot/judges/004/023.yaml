translation:
  language: es
  text: Así, en aquel día Dios sometió a Jabín, rey de Canaán, ante los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los israelitas”. El hebreo dice literalmente “los hijos de Israel”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְנַע
  english_pob_choice: subdued
  chosen_spanish: sometió
  alternatives_spanish:
  - subyugó
  - humilló
  - redujo a sujeción
  lexicon: HALOT
  rationale: El verbo hifil de כנע expresa hacer que un enemigo quede en posición de inferioridad o sujeción. En español, 'sometió' comunica bien la derrota político-militar sin introducir la connotación interior de 'humilló'.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios de Israel
  lexicon: HALOT
  rationale: El sujeto del verbo es claramente el Dios de Israel actuando en la historia. 'Dios' preserva el referente singular y el tono bíblico directo del hebreo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - en ese día
  lexicon: HALOT
  rationale: La expresión temporal funciona como marcador narrativo. 'En aquel día' suena natural en español bíblico y conserva la deixis remota del hebreo.
- source_word: יָבִין
  english_pob_choice: Jabin
  chosen_spanish: Jabín
  alternatives_spanish:
  - Jabin
  lexicon: HALOT
  rationale: Se translitera el nombre al español con adaptación fonética habitual ('Jabín') para mayor lectura natural, manteniendo la identidad del nombre propio.
- source_word: מֶלֶךְ כְּנָעַן
  english_pob_choice: king of Canaan
  chosen_spanish: rey de Canaán
  alternatives_spanish:
  - el rey de Canaán
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma directa y natural. En español, el artículo puede omitirse en aposición nominal como en el hebreo y como en la tradición bíblica.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: '''Delante de'' expresa bien la relación espacial/jurídica de sometimiento frente a Israel sin sonar demasiado abstracta.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación literal del hebreo, en línea con la política del proyecto de mantener la expresión filial masculina cuando refleja el texto fuente.
theological_decisions:
- issue: Agencia divina en la derrota de Jabín
  english_pob_reading: God is stated as the direct subject who subdued Jabin.
  chosen_spanish_reading: Dios aparece como el sujeto directo que sometió a Jabín.
  alternative_spanish_readings:
  - Jabín fue derrotado
  - Israel sometió a Jabín
  rationale: El hebreo atribuye explícitamente la acción a Dios; la traducción debe conservar esa agencia divina y no trasladarla a una formulación impersonal o meramente humana.
  doctrine_reference: Translation philosophy §1, §3
- issue: Expresión de Israel como pueblo del pacto
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se mantiene la forma masculina plural del hebreo para no neutralizar el marcador léxico del texto fuente, aunque en español pueda existir una alternativa más idiomática.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El control de revisión indica acuerdo alto y sin cambios propuestos; por tanto, esta versión sigue de cerca el análisis auditado del inglés POB y la lectura del hebreo sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene 'Dios' como sujeto explícito, evitando sustituirlo por una formulación impersonal.
  - '''Los hijos de Israel'' conserva la expresión fuente y coincide con la política del proyecto para este tipo de constructo.'
  - '''Jabín'' se adapta al uso español, pero permanece claramente identificable con el nombre hebreo.'
  - '''Delante de'' conserva la relación de sometimiento/comparecencia que el inglés POB resolvió con ''before''.'
