  glossary_alignment: No hay términos teológicos del glosario principal en juego. Se respeta correctamente 'los hijos de Esaú' en vez de interpretar directamente 'edomitas', en línea con la decisión léxica inglesa. Los topónimos y términos militares están bien alineados con la evidencia fuente.
