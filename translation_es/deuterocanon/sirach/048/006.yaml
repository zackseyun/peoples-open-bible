translation:
  language: es
  text: que llevó a reyes a la destrucción[a], y a los nobles[b] de sus lechos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al hoyo». El hebreo שחת puede significar hoyo, ruina o destrucción; el paralelo griego favorece aquí «destrucción».
    reason: lexical_alternative
  - marker: b
    text: O «los honrados» o «los distinguidos».
    reason: lexical_alternative
  - marker: c
    text: La línea probablemente evoca los juicios de Elías sobre reyes y personas encumbradas, incluido un rey postrado en cama (compárese 2 Reyes 1).
    reason: cross_reference
lexical_decisions:
- source_word: המוריד / καταγαγὼν
  english_pob_choice: who brought down
  chosen_spanish: que derribó
  alternatives_spanish:
  - que hizo bajar
  - que abatió
  - que llevó abajo
  lexicon: HALOT; LSJ
  rationale: El participio causativo expresa hacer descender o abatir a alguien. En español, «derribó» conserva la idea de caída/abatimiento y suena natural en un contexto de juicio sobre reyes.
- source_word: מלכים
  english_pob_choice: kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - a los monarcas
  - a los gobernantes
  lexicon: HALOT
  rationale: El hebreo y el griego dicen explícitamente «reyes»; no hay motivo para generalizar.
- source_word: על שחת / εἰς ἀπώλειαν
  english_pob_choice: to destruction
  chosen_spanish: a la destrucción
  alternatives_spanish:
  - al hoyo
  - a la ruina
  lexicon: HALOT; LXX lexical parallel
  rationale: La versión griega apoya el sentido resultativo de destrucción, y en español «a la destrucción» mantiene esa fuerza sin imponer una imagen más específica que el contexto no exige.
- source_word: ונכבדים / δεδοξασμένους
  english_pob_choice: nobles / honored men
  chosen_spanish: los nobles
  alternatives_spanish:
  - los honorables
  - los honrados
  - los distinguidos
  lexicon: HALOT; LSJ
  rationale: El término puede abarcar personas de peso, honor o distinción. Dado el ajuste de la revisión inglesa, «nobles» funciona bien en español y conserva la referencia a personas de rango sin reducirla innecesariamente.
- source_word: ממטותם / ἀπὸ κλίνης αὐτῶν
  english_pob_choice: from their beds
  chosen_spanish: de sus lechos
  alternatives_spanish:
  - de sus camas
  - de sus couches
  lexicon: HALOT; LSJ
  rationale: «Lechos» reproduce el registro bíblico y mantiene la concreción de cama/camilla/couch; además deja abierta la alusión a enfermedad o reposo sin explicitarla en la traducción.
theological_decisions:
- issue: Si la línea alude de manera concreta al juicio de Elías contra reyes y figuras encumbradas, o si debe mantenerse sólo la imagen general
  english_pob_reading: Retain the concrete wording 'nobles from their beds' without making the allusion explicit in the main text.
  chosen_spanish_reading: Mantener el cuadro concreto de reyes derribados y nobles sacados de sus lechos, sin explicitar la alusión histórica en el texto principal.
  alternative_spanish_readings:
  - que derribó a reyes y dignatarios enfermos
  - que hizo caer a reyes y a los que yacían en cama
  rationale: El hebreo y el griego conservan una imagen concreta; la alusión narrativa puede orientar la lectura, pero no debe agregarse como interpretación en la traducción principal. Esto preserva la tensión interpretativa documentada por el POB inglés.
  doctrine_reference: Primacía del texto original; mantener la tensión exegética sin resolverla en el cuerpo del versículo.
translation_notes:
  revision_awareness: El POB inglés revisó su segunda cola de 'honored men' a 'nobles' para reflejar mejor נכבדים; en español se siguió esa decisión con «nobles». También se evitó ampliar el texto a 'lechos de enfermedad' para no ir más allá de lo que dicen el hebreo y el griego.
  spanish_consistency_notes:
  - Se usó «a la destrucción» para seguir el apoyo del griego εἰς ἀπώλειαν y evitar una traducción demasiado concreta como «al hoyo».
  - «Lechos» mantiene el registro bíblico y la neutralidad semántica entre cama, lecho y couch.
  - La puntuación con comas reproduce la coordinación de dos miembros poéticos del verso.
