id: 1TI.1.2
reference: 1 Timothy 1:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τιμοθέῳ γνησίῳ τέκνῳ ἐν πίστει· χάρις, ἔλεος, εἰρήνη ἀπὸ θεοῦ ⸀πατρὸς καὶ Χριστοῦ Ἰησοῦ τοῦ κυρίου ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/002.yaml
  text: 'To Timothy[a], my true child in the faith: grace, mercy[b], and peace from God the Father and Messiah Jesus our Lord.'
  footnotes:
  - marker: a
    text: Or 'my genuine child in faith.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''Christ Jesus our Lord.'''
    reason: alternative_reading
translation:
  language: ko
  text: '믿음 안에서 나의 참된 자녀[a]인 디모데에게: 하나님 아버지와 우리 주 메시아[b] 예수께로부터 은혜와 자비와 평강이 있기를 빕니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「믿음 안에서 진짜 자녀」. γνήσιος는 친자(親子)의 진정성을 가리키며, 영적 부자 관계의 진실됨을 표현한다.
    reason: lexical_alternative
  - marker: b
    text: 전통적 번역은 「그리스도」. 본 번역은 칭호의 무게를 살려 「메시아」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: γνησίῳ τέκνῳ
  english_pob_choice: true child
  chosen_korean: 참된 자녀
  alternatives_korean:
  - 진짜 자녀
  - 친자식
  lexicon: BDAG
  rationale: τέκνον은 성별을 명시하지 않으므로 「아들」 대신 「자녀」로 옮겨 본문의 폭을 보존한다. γνήσιος의 친자(親子)적 진정성을 「참된」으로 표현한다.
- source_word: ἐν πίστει
  english_pob_choice: in the faith
  chosen_korean: 믿음 안에서
  alternatives_korean:
  - 믿음으로
  - 그 믿음 안에서
  lexicon: BDAG
  rationale: 디모데의 주관적 믿음 행위보다는 공유된 그리스도교 신앙의 영역을 가리키는 어감을 살리되, 한국어로 자연스러운 「믿음 안에서」로 옮긴다.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_korean: 자비
  alternatives_korean:
  - 긍휼
  - 자애
  lexicon: BDAG
  rationale: 목회서신 특유의 삼중 인사(은혜·자비·평강) 어휘이며, 「자비」가 본문의 일관된 한국어 등가어이다. 「긍휼」은 다른 어휘(οἰκτιρμός)와 구분하기 위해 피한다.
- source_word: πατρὸς
  english_pob_choice: the Father
  chosen_korean: 아버지
  alternatives_korean:
  - 우리 아버지
  lexicon: BDAG
  rationale: θεοῦ πατρός를 「하나님 아버지」 동격으로 옮긴다.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  lexicon: BDAG
  rationale: 기독론적 칭호로 굳어진 「주(主)」를 유지한다.
