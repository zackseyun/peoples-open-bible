revisions:
- from: Porque no obedeciste la voz de Yahvé y no ejecutaste su feroz ira[a] contra Amalec, por eso Yahvé ha hecho esto para ti hoy.
  to: Porque no obedeciste la voz de Yahvé y no ejecutaste su feroz ira contra Amalec,[a] por eso Yahvé te ha hecho esto hoy.
  rationale: Se corrige «para ti» a «te ha hecho esto» para reflejar adecuadamente לְךָ en un contexto de juicio. Se conserva el resto de la formulación principal por fidelidad al audit trail, pero se mejora la nota al pie para que presente una alternativa léxica real y útil en español.
  reviewer_model: gpt-5.4
