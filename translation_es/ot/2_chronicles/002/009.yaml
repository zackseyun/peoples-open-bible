translation:
  language: es
  text: Y he aquí[a], para los leñadores, los cortadores de los árboles, he dado a tus siervos veinte mil coros[b] de trigo triturado[d], y veinte mil coros de cebada, y veinte mil batos[c] de vino, y veinte mil batos de aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo idiomático de atención; también puede traducirse "Ahora bien" o "Mira".
    reason: alternative_reading
  - marker: b
    text: Un coro es una antigua medida seca.
    reason: cultural_note
  - marker: c
    text: Un bato es una antigua medida líquida.
    reason: cultural_note
  - marker: d
    text: O posiblemente "trigo como alimento" o "trigo machacado"; la expresión hebrea es inusual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Ahora bien
  - Mira
  lexicon: HALOT
  rationale: Conserva la función discursiva de atención y transición de הִנֵּה, sin omitirla. 'Y he aquí' es natural en español bíblico leído en contexto moderno.
- source_word: לַחֹטְבִים לְכֹרְתֵי הָעֵצִים
  english_pob_choice: for the woodcutters, the cutters of the trees
  chosen_spanish: para los leñadores, los cortadores de los árboles
  alternatives_spanish:
  - para los que cortan la madera, los que cortan los árboles
  - para los taladores, los cortadores de madera
  lexicon: HALOT
  rationale: La duplicación hebrea de participios afines se conserva como dos sintagmas coordinados en aposición. 'Leñadores' comunica el oficio; 'cortadores de los árboles' mantiene la literalidad de הָעֵצִים y la redundancia enfática del hebreo.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: he dado
  alternatives_spanish:
  - doy
  - he proveído
  lexicon: HALOT
  rationale: El perfecto hebreo en un contexto de comunicación oficial expresa un acto ya comprometido/entregado; el pretérito perfecto en español refleja bien esa disposición cumplida.
- source_word: חִטִּים מַכּוֹת
  english_pob_choice: crushed wheat
  chosen_spanish: trigo triturado
  alternatives_spanish:
  - trigo aplastado
  - trigo machacado
  - trigo molido
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa más natural ('crushed wheat') y el sentido contextual de provisión alimentaria. 'Triturado' comunica el procesamiento del grano sin imponer una precisión técnica no explícita.
- source_word: לַעֲבָדֶיךָ
  english_pob_choice: to your servants
  chosen_spanish: a tus siervos
  alternatives_spanish:
  - para tus siervos
  - a tus esclavos
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con עֲבָדִים como término léxico de servicio. 'Siervos' es la opción idiomática en español para este contexto cortesano/administrativo; no se adopta 'esclavos' aquí porque el pasaje describe personal de trabajo bajo provisión real, no la fuerza semántica de servidumbre coercitiva.
- source_word: כֹּרִים
  english_pob_choice: kors
  chosen_spanish: coros
  alternatives_spanish:
  - coro
  - cors
  lexicon: HALOT
  rationale: Se translitera la medida con la forma española asentada 'coro' y su plural 'coros', preservando la unidad antigua de medida sin convertirla a equivalentes modernos especulativos.
- source_word: בַּתִּים
  english_pob_choice: baths
  chosen_spanish: batos
  alternatives_spanish:
  - baths
  - bats
  lexicon: HALOT
  rationale: Se translitera la medida líquida con una forma hispanizada comprensible. 'Batos' evita el anglicismo y conserva la referencia cultural a una medida antigua.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - mosto
  lexicon: HALOT
  rationale: Se usa el equivalente directo y estándar del hebreo יַיִן.
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: En español, en este contexto alimentario, 'aceite' comunica el referente sin añadir 'oliva' que el hebreo no explicita. 'Aceite' mantiene la generalidad del original.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'crushed wheat' sobre 'beaten wheat' por naturalidad y precisión. La frase hebrea sigue siendo inusual, por lo que se mantuvo una traducción que sugiera procesamiento del grano sin sobreinterpretarla. También se preservó la duplicación hebrea de los agentes ('leñadores, los cortadores de los árboles') y las medidas antiguas sin convertirlas a unidades modernas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando el texto lo requiera; en este versículo no aparece.
  - Se mantiene 'siervos' para עֲבָדֶיךָ por coherencia con el registro cortesano del pasaje.
  - Las unidades 'coros' y 'batos' quedan transliteradas en plural español para facilitar lectura y conservar el valor histórico de las medidas.
