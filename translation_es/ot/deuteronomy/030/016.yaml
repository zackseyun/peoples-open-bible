revisions:
- from: 'lo cual yo te estoy mandando hoy: amar a Yahvé tu Dios, andar en sus caminos y guardar sus mandamientos, sus estatutos y sus juicios, para que vivas y te multipliques, y Yahvé tu Dios te bendiga en la tierra que entras para poseer[a]'
  to: 'lo que yo te mando hoy: amar a Yahvé tu Dios, andar en sus caminos y guardar sus mandamientos, sus estatutos y sus juicios[a], para que vivas y te multipliques,[b] y Yahvé tu Dios te bendiga en la tierra en la que estás entrando para poseerla[c]'
  rationale: Se corrige la gramática española con 'amar a Yahvé', se reemplaza el inicio por una formulación más natural ('lo que yo te mando hoy'), se suaviza la cláusula final para que sea idiomática en español sin perder el sentido de entrada y posesión, y se añaden las notas léxicas/alternativas relevantes ya documentadas en el audit trail inglés.
