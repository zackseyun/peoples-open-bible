revisions:
- from: Pero Jonás se levantó para huir a Tarsis de la presencia de Yahvé[a]. Bajó a Jope y halló una nave que iba a Tarsis. Pagó su pasaje y bajó en ella para ir con ellos a Tarsis[b][c], lejos de la presencia de Yahvé.
  to: Pero Jonás se levantó para huir a Tarsis de la presencia de Yahvé[a]. Bajó a Jope y halló una nave que iba a Tarsis. Pagó su pasaje y bajó a la nave para ir con ellos a Tarsis[b][c], lejos de la presencia de Yahvé.
  rationale: Se hizo una reparación pequeña pero necesaria para mejorar la naturalidad del español y la claridad sintáctica en 'bajó en ella', conservando a la vez la repetición literaria de 'bajó' que el hebreo enfatiza. También se ajustó la nota [a] para que la explicación literal sea más natural y coherente con la decisión léxica principal sobre 'presencia'.
