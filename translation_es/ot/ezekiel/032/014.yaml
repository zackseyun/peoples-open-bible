    text: 'O: «haré que sus aguas se hundan / bajen / se aquieten». El verbo hebreo puede expresar el descenso o asentamiento del agua tras la agitación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «conduciré sus ríos como aceite», es decir, haré que se muevan suavemente como el aceite.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el título divino a «el Señor Yahvé» para mantener el orden de אֲדֹנָי יְהוִה y mejorar la naturalidad en español, sin ocultar el nombre divino. También se corrige la nota [b] para reflejar la alternativa léxica realmente documentada para אוֹלִיךְ («conducir / hacer ir») en lugar de introducir una nota no auditada sobre «ríos/corrientes».
