revisions:
- from: Yahvé oyó la voz de Israel y entregó a los cananeos[a] en manos de ellos; y ellos los dedicaron a destrucción, junto con sus ciudades. Por eso el nombre de aquel lugar fue llamado Horma.
  to: Yahvé oyó la voz de Israel y entregó a los cananeos en sus manos, y ellos los dedicaron a destrucción, junto con sus ciudades. Por eso aquel lugar fue llamado Horma[a].
  rationale: 'Se corrigen tres problemas principales: se reemplaza el calco poco idiomático ''en manos de ellos'' por ''en sus manos''; se simplifica la fórmula de nombramiento a un español natural que aún conserva la indeterminación del sujeto; y se mueve la nota al pie al topónimo ''Horma'', que es donde corresponde el juego etimológico con חרם. Se conserva ''Yahvé'' y el lenguaje de ḥerem como ''dedicaron a destrucción'' por fidelidad al expediente léxico y teológico.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:36:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite el sentido básico del hebreo: Yahvé responde al clamor de Israel, entrega a los cananeos, Israel los somete a ḥerem, y el lugar recibe el nombre Horma/Hormah. Sin embargo, hay varios puntos donde no preserva bien la formulación ni la naturalidad: ''en manos de ellos'' es un calco poco idiomático; ''ellos los dedicaron a destrucción'' suena forzado; y ''el nombre de aquel lugar fue llamado'' es español poco natural. Además, la nota al pie está anclada en ''cananeos'', pero en el inglés auditado la nota explica el juego de palabras con ''Hormah'' y חרם, por lo que debe anclarse al topónimo.'
  spanish_quality_summary: 'El español es comprensible, pero contiene calcos y giros poco naturales para una Biblia eclesial legible: ''en manos de ellos'', ''fue llamado'', y en menor medida ''dedicaron a destrucción''. También conviene ajustar la cohesión sintáctica para que la relación entre la destrucción y el nombre Horma sea clara. Una redacción más fluida y fiel sería: ''Yahvé oyó la voz de Israel y entregó a los cananeos en sus manos, y ellos los dedicaron a destrucción, junto con sus ciudades. Por eso aquel lugar fue llamado Horma[a].'''
  glossary_alignment: Se alinea bien con el glosario en 'Yahvé' para יְהוָה. El tratamiento de חרם como 'dedicar a destrucción' es aceptable y coherente con la decisión teológica documentada, aunque la frase debe pulirse para mejor español. 'Horma' como adaptación española del topónimo es defendible dentro del propio expediente, aunque la nota debe ir en el nombre del lugar, no en 'cananeos'.
  issues:
  - severity: medium
    issue: Nota al pie anclada en la palabra equivocada
    rationale: La nota explica la etimología/juego de palabras de חָרְמָה con חרם, por lo que el marcador debe aparecer en 'Horma', no en 'cananeos'.
  - severity: medium
    issue: 'Calco poco natural: ''en manos de ellos'''
    rationale: Aunque refleja la idea hebrea de entrega al poder de otro, en español natural y bíblico se dice 'en sus manos' o 'en poder de ellos'.
  - severity: medium
    issue: 'Construcción poco idiomática: ''el nombre de aquel lugar fue llamado'''
    rationale: Es una reproducción demasiado literal de una fórmula hebrea; en español digno y natural debe decirse 'aquel lugar fue llamado...' o 'se llamó...' manteniendo la indeterminación del sujeto.
  - severity: low
    issue: '''dedicaron a destrucción'' suena rígido'
    rationale: La opción es teológicamente adecuada para חרם, pero conviene integrarla en una sintaxis más natural sin perder el valor técnico.
  revised_spanish_text: Yahvé oyó la voz de Israel y entregó a los cananeos en sus manos, y ellos los dedicaron a destrucción, junto con sus ciudades. Por eso aquel lugar fue llamado Horma[a].
  revised_footnotes:
  - marker: a
    text: «Horma» suena al hebreo relacionado con חרם, “dedicar a destrucción” o “poner bajo el anatema”.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen tres problemas principales: se reemplaza el calco poco idiomático ''en manos de ellos'' por ''en sus manos''; se simplifica la fórmula de nombramiento a un español natural que aún conserva la indeterminación del sujeto; y se mueve la nota al pie al topónimo ''Horma'', que es donde corresponde el juego etimológico con חרם. Se conserva ''Yahvé'' y el lenguaje de ḥerem como ''dedicaron a destrucción'' por fidelidad al expediente léxico y teológico.'
