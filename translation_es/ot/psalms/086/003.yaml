review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura y el sentido causal del hebreo están bien conservados: súplica dirigida a Dios, seguida de la razón «porque/a ti clamo todo el día». «Señor» para אֲדֹנָי y «clamo» para אֶקְרָא son adecuados. El problema principal está en חָנֵּנִי: «Sé gracioso conmigo» no es una expresión natural ni digna en español bíblico actual y puede sugerir ‘chistoso/agradable’ en vez de favor misericordioso.'
  spanish_quality_summary: 'El borrador es mayormente claro, pero «Sé gracioso conmigo» suena poco idiomático y potencialmente equívoco en español contemporáneo. Una formulación como «Ten compasión de mí» o «Muéstrame tu favor» sería más natural. Dado que la auditoría inglesa privilegia el matiz de gracia/favor y preserva «Have mercy on me» como alternativa, la mejor reparación en español es una forma natural que mantenga el favor como texto principal: «Muéstrame tu favor».'
  glossary_alignment: No hay conflicto con los términos de proyecto salvo la necesidad de reflejar mejor el valor de חנן. «Señor» para אֲדֹנָי está alineado. No intervienen Yahvé/Mesías/u otros términos sensibles. La nota léxica debe conservar la alternativa de misericordia, pero con redacción idiomática en español.
  issues:
  - severity: high
    issue: «Sé gracioso conmigo» es antinatural y semánticamente ambigua en español.
    rationale: Aunque intenta calcar ‘be gracious’, en español «gracioso» suele significar ‘chistoso’ o ‘agradable’, no ‘lleno de gracia/favor’. Esto distorsiona la súplica de חנן y afecta la legibilidad e inteligibilidad eclesial.
  - severity: medium
    issue: La nota al pie repite «favor gracioso», expresión poco idiomática.
    rationale: La explicación léxica debe reflejar favor/gracia o misericordia en español natural. «Favor gracioso» suena calcado del inglés y debilita la claridad del fundamento léxico.
  revised_spanish_text: Muéstrame tu favor[a], Señor, porque a ti clamo todo el día.
  revised_footnotes:
  - marker: a
    text: 'O: «Ten compasión de mí». El verbo hebreo puede expresar una súplica por favor o por misericordia.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «Sé gracioso conmigo» por «Muéstrame tu favor» para expresar de manera natural y digna el sentido de חָנֵּנִי, preservando el matiz principal de gracia/favor documentado en la auditoría inglesa. Se mantiene en nota la alternativa tradicional de misericordia con español idiomático. El resto del verso no requiere cambio.
