translation:
  text: But Bacchides was on the right wing[a], and the phalanx came near from both sides, and they were sounding the trumpets[b], and those with Judas also sounded the trumpets, they too.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'in the right horn,' a military expression for the right wing or flank.
    reason: lexical_alternative
  - marker: b
    text: Or 'approached from the two sides.'
    reason: alternative_reading
lexical_decisions:
- source_word: Βακχίδης
  chosen: Bacchides
  rationale: Personal name transliterated by standard convention rather than translated, per project philosophy.
- source_word: ἐν τῷ δεξιᾷ κέρατι
  chosen: on the right wing
  alternatives:
  - in the right horn
  - on the right flank
  lexicon: LSJ
  rationale: κέρας literally means 'horn,' but in military context it refers to a wing/flank of an army formation. 'Right wing' is idiomatic modern English and fits the battle setting.
- source_word: ἤγγισεν
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: LSJ
  rationale: Aorist of ἐγγίζω denotes approaching. 'Came near' is clear modern English and preserves the movement toward engagement.
- source_word: ἡ φάλαγξ
  chosen: the phalanx
  alternatives:
  - the battle line
  - the formation
  lexicon: LSJ
  rationale: φάλαγξ is a specific military term. Retaining 'phalanx' preserves the martial imagery and technical sense better than a generalized term.
- source_word: ἐκ τῶν δύο μερῶν
  chosen: from both sides
  alternatives:
  - from the two parts
  - from the two directions
  lexicon: LSJ
  rationale: The idiom indicates movement from two sides. 'From both sides' is natural English and conveys the tactical encirclement or bilateral advance.
- source_word: ἐφώνουν ταῖς σάλπιγξιν
  chosen: they were sounding the trumpets
  alternatives:
  - they were calling with the trumpets
  - they blew the trumpets
  lexicon: LSJ
  rationale: The verb literally relates to making sound/calling, with dative of instrument. In context of battle signals, 'sounding the trumpets' best captures the action without flattening the Greek construction.
- source_word: οἱ παρὰ Ἰούδαν
  chosen: those with Judas
  alternatives:
  - Judas's men
  - those beside Judas
  lexicon: LSJ
  rationale: The phrase denotes those on Judas's side or accompanying him. 'Those with Judas' is faithful and avoids over-specifying beyond the Greek.
- source_word: ἐσάλπισαν
  chosen: sounded the trumpets
  alternatives:
  - blew the trumpets
  lexicon: LSJ
  rationale: The verb specifically means to sound a trumpet. Repeating 'sounded the trumpets' maintains lexical connection with the previous clause and the battle-signal emphasis.
- source_word: καὶ αὐτοὶ
  chosen: they too
  alternatives:
  - also
  - they themselves also
  lexicon: LSJ
  rationale: The phrase adds emphasis that Judas's side answered in kind. 'They too' preserves that responsive force succinctly.
