id: HEB.8.5
reference: Hebrews 8:5
source:
  edition: SBLGNT
  text: (οἵτινες ὑποδείγματι καὶ σκιᾷ λατρεύουσιν τῶν ἐπουρανίων, καθὼς κεχρημάτισται Μωϋσῆς μέλλων ἐπιτελεῖν τὴν σκηνήν, Ὅρα γάρ, φησίν, ποιήσεις πάντα κατὰ τὸν τύπον τὸν δειχθέντα σοι ἐν τῷ ὄρει)·
translation:
  text: who serve a copy and shadow of the heavenly things[a], just as Moses was divinely instructed when he was about to erect the tabernacle; for he says[b], “See that you make everything according to the pattern shown to you on the mountain.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was warned' for 'was divinely instructed'; the Greek verb can emphasize a divine warning or admonition.
    reason: lexical_alternative
  - marker: b
    text: Or 'construct' for 'complete' the tabernacle.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  chosen: who
  alternatives:
  - such ones as
  - who indeed
  lexicon: BDAG
  rationale: Introduces the relative clause referring back to the Levitical priests. Simple 'who' is natural English and preserves the referential force without overtranslating the qualitative nuance of ὅστις.
- source_word: ὑποδείγματι
  chosen: a copy
  alternatives:
  - an example
  - a sketch
  - a model
  lexicon: BDAG
  rationale: In this cultic context, ὑπόδειγμα refers to an earthly counterpart corresponding to a heavenly reality. 'Copy' best fits the argument of Hebrews that the earthly sanctuary reflects the heavenly one.
- source_word: σκιᾷ
  chosen: shadow
  alternatives:
  - foreshadowing
  lexicon: BDAG
  rationale: '''Shadow'' is the established and contextually apt metaphor in Hebrews for something real but insubstantial in comparison with the heavenly reality. ''Foreshadowing'' would import a more interpretive temporal nuance.'
- source_word: λατρεύουσιν
  chosen: serve
  alternatives:
  - offer worship
  - perform sacred service
  lexicon: BDAG
  rationale: The verb denotes cultic/religious service. 'Serve' is concise and natural, while the surrounding sanctuary language makes the sacred sense clear.
- source_word: τῶν ἐπουρανίων
  chosen: of the heavenly things
  alternatives:
  - of the heavenly realities
  - of the things in heaven
  lexicon: BDAG
  rationale: The genitive depends on both 'copy' and 'shadow.' 'Heavenly things' preserves the broad referent without narrowing it only to location or overinterpreting it as abstract 'realities,' though that sense is close.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Marks correspondence between the priests' service and the scriptural warning given to Moses.
- source_word: κεχρημάτισται
  chosen: was divinely instructed
  alternatives:
  - was warned
  - was given an oracle
  - was admonished
  lexicon: BDAG
  rationale: In biblical usage χρηματίζω often carries the sense of receiving a divine communication. 'Was divinely instructed' captures that God is the implied source without overstating the warning element. Because the quotation begins with 'See,' an admonitory nuance is present, but the broader idea is divine direction.
- source_word: μέλλων
  chosen: was about to
  alternatives:
  - being about to
  - when he intended to
  lexicon: BDAG
  rationale: 'Standard prospective force: Moses was on the point of undertaking the work.'
- source_word: ἐπιτελεῖν
  chosen: complete
  alternatives:
  - construct
  - finish
  - carry out
  lexicon: BDAG
  rationale: The verb can mean bring to completion or carry out. Here Moses is in the process of making the tabernacle according to the pattern; 'complete' fits the lexical force while remaining idiomatic. An alternative is preserved in a footnote because 'construct' is also plausible in context.
- source_word: σκηνήν
  chosen: the tabernacle
  alternatives:
  - the tent
  lexicon: BDAG
  rationale: In this Mosaic sanctuary context, 'tabernacle' is the clearest established English term. 'Tent' is more literal but less specific for modern readers.
- source_word: Ὅρα
  chosen: See
  alternatives:
  - Take care
  - Be sure
  lexicon: BDAG
  rationale: Imperative introducing the divine command. 'See' preserves the directness of the citation and echoes the Greek wording.
- source_word: ποιήσεις πάντα
  chosen: you will make everything
  alternatives:
  - make all things
  - you shall make everything
  lexicon: BDAG
  rationale: Future indicative in a command citation from Exodus naturally functions imperativally. 'You will make everything' preserves the form while remaining clear in English.
- source_word: κατὰ τὸν τύπον
  chosen: according to the pattern
  alternatives:
  - according to the model
  - according to the form
  lexicon: BDAG
  rationale: τύπος here denotes the archetypal design shown to Moses. 'Pattern' is the most natural and contextually precise rendering.
- source_word: τὸν δειχθέντα σοι
  chosen: shown to you
  alternatives:
  - that was shown to you
  - revealed to you
  lexicon: BDAG
  rationale: Passive participle from δείκνυμι. 'Shown to you' is straightforward and preserves the passive sense.
- source_word: ἐν τῷ ὄρει
  chosen: on the mountain
  alternatives:
  - in the mountain
  lexicon: BDAG
  rationale: Idiomatic English for the location of Moses' revelation at Sinai is 'on the mountain.'
