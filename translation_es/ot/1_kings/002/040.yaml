base_translation:
  language: en
  yaml_path: translation/ot/1_kings/002/040.yaml
  text: Then Shimei arose[a], saddled his donkey, and went to Gath, to Achish, to seek his slaves. And Shimei went and brought his slaves from Gath.
  footnotes:
