  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «ley» en minúscula porque el griego no marca mayúscula y el contexto inmediato no exige una capitalización teológica.
  - Se conserva un registro sobrio y bíblico sin recurrir a fórmulas eclesiásticas ajenas al griego.
