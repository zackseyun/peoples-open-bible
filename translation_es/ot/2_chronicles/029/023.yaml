translation:
  language: es
  text: Entonces presentaron los machos cabríos del sacrificio por el pecado[a] delante del rey y de la asamblea, y pusieron sus manos sobre ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "presentaron los machos cabríos del sacrificio por el pecado delante del rey y de la asamblea".'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice "pusieron sus manos sobre ellos"; el sujeto más natural se refiere al rey y a la asamblea, quizá mediante representantes.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגִּישׁוּ
  english_pob_choice: they brought near
  chosen_spanish: hicieron acercar
  alternatives_spanish:
  - trajeron cerca
  - presentaron
  lexicon: HALOT
  rationale: El verbo hiphil de נגשׁ expresa hacer que algo se acerque o presentarlo. En español, 'hicieron acercar' conserva la idea de movimiento hacia el lugar ritual sin perder naturalidad.
- source_word: שְׂעִירֵי הַחַטָּאת
  english_pob_choice: the goats for the sin offering
  chosen_spanish: los machos cabríos del sacrificio por el pecado
  alternatives_spanish:
  - los machos cabríos de la ofrenda por el pecado
  - los machos cabríos del pecado
  lexicon: HALOT
  rationale: שְׂעִירֵי señala machos cabríos, y הַחַטָּאת aquí designa la ofrenda expiatoria, no el pecado abstracto. 'Sacrificio por el pecado' comunica el sentido cultual de forma clara en español.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: En este contexto ceremonial, לִפְנֵי indica ubicación y presentación frente a los destinatarios. 'Delante de' es natural y mantiene el matiz visual del acto.
- source_word: הַמֶּלֶךְ וְהַקָּהָל
  english_pob_choice: the king and the assembly
  chosen_spanish: el rey y la asamblea
  alternatives_spanish:
  - el rey y la congregación
  - el rey y el pueblo reunido
  lexicon: HALOT
  rationale: קָהָל se refiere al grupo reunido públicamente; 'asamblea' preserva ese sentido sin introducir una terminología eclesial más cargada que el hebreo.
- source_word: וַיִּסְמְכ֥וּ יְדֵיהֶם עֲלֵיהֶם
  english_pob_choice: they laid their hands on them
  chosen_spanish: pusieron sus manos sobre ellos
  alternatives_spanish:
  - impusieron sus manos sobre ellos
  - apoyaron sus manos sobre ellos
  lexicon: HALOT
  rationale: סמך con las manos describe el gesto ritual de colocar las manos sobre la víctima. 'Pusieron sus manos sobre ellos' es transparente en español y evita introducir un tecnicismo interpretativo innecesario.
theological_decisions:
- issue: Sentido de חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: sacrificio por el pecado
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda expiatoria
  - sacrificio por el pecado
  rationale: El contexto habla de animales presentados y manos puestas sobre ellos, por lo que חַטָּאת debe entenderse como ofrenda ritual. 'Sacrificio por el pecado' mantiene el vínculo con el pecado sin reducirlo a una abstracción moral.
  doctrine_reference: Preservar el sentido sacrificial/cultual de חַטָּאת
- issue: Referente de 'sus manos' en el gesto ritual
  english_pob_reading: the king and the assembly (or their representatives) laid hands on the goats
  chosen_spanish_reading: ellos pusieron sus manos sobre ellos
  alternative_spanish_readings:
  - el rey y la asamblea pusieron sus manos sobre ellos
  - los sacerdotes pusieron sus manos sobre ellos
  rationale: El hebreo conecta naturalmente 'sus manos' con el rey y la asamblea, aunque el acto pueda haberse realizado por representantes. La traducción conserva la ambigüedad del original sin especificar más de lo que el texto dice.
  doctrine_reference: Preservar la tensión interpretativa del original
translation_notes:
  revision_awareness: La versión española sigue de cerca el estado final del audit trail en inglés, sin cambios de revisión aplicados, y conserva tanto la lectura cultual de חַטָּאת como la ambigüedad del sujeto en el gesto de imposición de manos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto sólo cuando aparezca el tetragrámaton; aquí no aparece.
  - '''Asamblea'' se mantiene como equivalente de קָהָל en coherencia con el archivo POB.'
  - '''Sacrificio por el pecado'' comunica el valor sacrificial de חַטָּאת sin borrar su relación con el pecado.'
  - La ambigüedad pronominal del hebreo se conserva en el texto y se explica en nota.
  - El estilo busca ser publicable y reverente sin depender de fórmulas tradicionales que no están en el original.
