translation:
  language: es
  text: Extendió sus manos contra los que estaban en paz con él[a]; profanó su alianza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «extendió sus manos contra sus amigos» o «contra sus aliados». La expresión hebrea se refiere a personas que estaban en relación pacífica con él.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «violó su alianza». El verbo hebreo significa más literalmente «profanó» o «trató como profano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - estiró
  - alargó
  - tendió
  lexicon: HALOT
  rationale: El hebreo con ‘mano/manos’ expresa un gesto hostil de extender la mano contra alguien. En español, ‘extendió sus manos’ conserva la imagen concreta y suena más natural que un calco como ‘estiró’.
- source_word: יָדָי/ו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - su mano
  - sus brazos
  lexicon: HALOT
  rationale: El texto hebreo está en plural; por eso se mantiene ‘manos’, como corrigió la revisión inglesa. El posesivo se conserva sin añadir precisión no presente en el original.
- source_word: בִּשְׁלֹמָיו
  english_pob_choice: those at peace with him
  chosen_spanish: los que estaban en paz con él
  alternatives_spanish:
  - sus amigos
  - sus aliados
  - los que eran sus aliados
  lexicon: HALOT
  rationale: שָׁלוֹם aquí describe una relación de paz o trato pacífico. ‘Los que estaban en paz con él’ preserva ese valor relacional sin estrecharlo indebidamente a ‘amigos’ o ‘aliados’.
- source_word: חִלֵּל
  english_pob_choice: profaned
  chosen_spanish: profanó
  alternatives_spanish:
  - violó
  - desecró
  - trató como común
  lexicon: HALOT
  rationale: El piel de חלל conserva una carga moral y religiosa fuerte. ‘Profanó’ es el equivalente español más directo y mantiene esa gravedad mejor que ‘violó’, que desplaza el matiz hacia lo jurídico.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su convenio
  - su pacto de paz
  lexicon: HALOT
  rationale: ‘Pacto’ comunica el contenido relacional del hebreo y funciona de manera natural en español. Se evita ‘covenant’ en anglicismo, y también ‘alianza’, que en español puede sonar más política o militar según el contexto.
theological_decisions:
- issue: Gravedad del lenguaje de pacto
  english_pob_reading: Rendered בְּרִית as 'covenant' and חִלֵּל as 'profaned' to preserve the verse's moral and relational gravity without importing a specifically divine-covenant reference.
  chosen_spanish_reading: se mantiene el registro de pacto con ‘pacto’ y el verbo ‘profanó’ para conservar la denuncia moral sin convertirla explícitamente en un pacto divino
  alternative_spanish_readings:
  - ‘violó su pacto’
  - ‘quebrantó su pacto’
  - ‘desechó su pacto’
  rationale: El contexto inmediato habla de traición entre personas, no de una referencia explícita al pacto de Yahvé. ‘Profanó su pacto’ conserva la solemnidad del hebreo y evita suavizar la acusación a un mero incumplimiento contractual.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto fuente en inglés, que corrigió ‘hand’ a ‘hands’ para reflejar el plural hebreo. En español se mantuvo el plural ‘manos’ y se preservó el paralelismo breve del verso.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de שָׁלוֹם como relación de paz, no como ‘amistad’ obligatoria.
  - ‘Profanó’ conserva la fuerza lexical del piel de חלל, coherente con la preferencia POB por no rebajar la denuncia.
  - ‘Pacto’ es la opción española más natural para בְּרִית en este contexto, sin introducir un matiz técnico adicional no requerido por el verso.
  - La puntuación con punto y coma separa las dos cláusulas como en el ritmo hebreo y en el audit trail inglés.
