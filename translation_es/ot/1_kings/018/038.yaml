translation:
  language: es
  text: Entonces cayó el fuego de Yahvé[a] y consumió el holocausto, la leña, las piedras, el polvo y lamió el agua que estaba en la zanja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cayó fuego procedente de Yahvé». El hebreo puede entenderse como enfatizando el origen divino del fuego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשׁ יְהוָה
  english_pob_choice: the fire of Yahweh / the fire of the LORD
  chosen_spanish: el fuego de Yahvé
  alternatives_spanish:
  - el fuego de Yahvé
  - fuego procedente de Yahvé
  lexicon: HALOT
  rationale: El hebreo une sustantivo y nombre divino de forma directa. En español, 'el fuego de Yahvé' preserva la asociación inmediata con el nombre del pacto y mantiene la fuerza narrativa sin volverlo una paráfrasis explicativa.
- source_word: וַתִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - descendió
  - bajó
  lexicon: HALOT
  rationale: El verbo literalmente expresa caída. 'Cayó' reproduce mejor la imagen de algo que desciende desde arriba que un verbo más interpretativo.
- source_word: וַתֹּאכַל
  english_pob_choice: consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - devoró
  - se comió
  lexicon: HALOT
  rationale: Aunque el hebreo dice 'comió', en español 'consumió' transmite con naturalidad la acción del fuego sobre la ofrenda y los objetos, sin perder el sentido de destrucción total.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: En español bíblico, 'holocausto' es el término cultual preciso para la ofrenda totalmente quemada. Se conserva por su fidelidad técnica al contexto sacrificial.
- source_word: הָעֵצִים
  english_pob_choice: the wood
  chosen_spanish: la leña
  alternatives_spanish:
  - la madera
  - la leña para el fuego
  lexicon: HALOT
  rationale: El contexto es el material preparado para arder sobre el altar; 'leña' suena natural en español y comunica mejor el uso intencional que 'madera'.
- source_word: הָאֲבָנִים
  english_pob_choice: the stones
  chosen_spanish: las piedras
  alternatives_spanish:
  - las rocas
  lexicon: HALOT
  rationale: Traducción directa y clara. Mantiene el contraste milagroso de que el fuego alcanza incluso las piedras del altar.
- source_word: הֶעָפָר
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo de tierra
  - la tierra suelta
  lexicon: HALOT
  rationale: '''עפר'' puede abarcar polvo o tierra suelta. ''Polvo'' preserva la imagen concreta y breve del texto, con buena naturalidad en español.'
- source_word: לִחֵכָה
  english_pob_choice: licked up
  chosen_spanish: lamió
  alternatives_spanish:
  - lamió hasta secar
  - llevó con la lengua
  lexicon: HALOT
  rationale: El verbo hebreo conserva una imagen vívida de 'lamer' el agua. 'Lamió' mantiene esa metáfora sin suavizarla, como hace el audit trail inglés.
- source_word: הַמַּיִם אֲשֶׁר בַּתְּעָלָה
  english_pob_choice: the water that was in the trench
  chosen_spanish: el agua que estaba en la zanja
  alternatives_spanish:
  - el agua que estaba en el foso
  - el agua de la zanja
  lexicon: HALOT
  rationale: '''תעלה'' designa una zanja o canal excavado alrededor del altar. ''Zanja'' es concreta y comprensible para lectores modernos, y mantiene el sentido físico del lugar donde estaba el agua.'
theological_decisions:
- issue: Nombre divino YHWH / יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrammatón. La política española del proyecto pide 'Yahvé' como forma principal, en vez de enmascararlo con 'SEÑOR'.
  doctrine_reference: POB Spanish terminology defaults for יהוה / YHWH
- issue: Naturaleza del fuego milagroso
  english_pob_reading: the fire of Yahweh fell and consumed...
  chosen_spanish_reading: cayó el fuego de Yahvé y consumió...
  alternative_spanish_readings:
  - descendió el fuego de Yahvé y devoró...
  - el fuego de Yahvé bajó y consumió...
  rationale: Se conserva la secuencia y la agencia divina del relato sin suavizar el cuadro milagroso. 'Cayó' y 'consumió' reflejan bien el paralelismo hebreo y el impacto del evento.
  doctrine_reference: Narrative miracle description in 1 Kings 18:38
translation_notes:
  revision_awareness: 'El audit trail inglés no requiere cambios sustanciales: mantiene la caída del fuego, su consumo total y la imagen vívida de ''licked up''. En español se ajustó la elección de sustantivos para naturalidad y precisión cultual: ''holocausto'', ''leña'', ''zanja''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al criterio del proyecto para יהוה.
  - Se evita 'SEÑOR' como máscara del nombre divino.
  - '''Holocausto'' se usa en sentido sacrificial técnico, no como referencia moderna ajena al contexto bíblico.'
  - '''Lamió'' conserva la imagen verbal fuerte del hebreo; no se neutraliza a una simple expresión de secado.'
  - '''Zanja'' traduce el espacio excavado alrededor del altar de forma clara para español actual.'
