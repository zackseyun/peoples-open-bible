    text: 'O, más literalmente: «beber vino solo»; la idea en contexto es que tanto el vino solo como el agua sola resultan menos agradables que una mezcla adecuada.'
    reason: lexical_alternative
  revision_rationale: Se ajusta «consultan» a «leen» para reflejar mejor ἐντυγχανόντων en contexto literario; se mejora la naturalidad de la comparación de bebidas; se restituye más claramente el doble matiz de ἐπιτερπῇ τὴν χάριν ἀποτελεῖ; y se cambia «el final» por «el fin» para una clausura más idiomática y fiel. La nota se alinea mejor con la alternativa literal y la explicación contextual del POB inglés.
