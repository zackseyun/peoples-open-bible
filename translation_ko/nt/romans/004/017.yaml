id: ROM.4.17
reference: Romans 4:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καθὼς γέγραπται ὅτι Πατέρα πολλῶν ἐθνῶν τέθεικά σε), κατέναντι οὗ ἐπίστευσεν θεοῦ τοῦ ζῳοποιοῦντος τοὺς νεκροὺς καὶ καλοῦντος τὰ μὴ ὄντα ὡς ὄντα·
base_translation:
  language: en
  yaml_path: translation/nt/romans/004/017.yaml
  text: as it is written[a], "I have made you the father of many nations"—in the presence of the God in whom he believed[b], who gives life to the dead and calls the things that are not as though they were.
  footnotes:
  - marker: a
    text: Or, more interpretively, "calls into existence the things that do not exist."
    reason: alternative_reading
  - marker: b
    text: '"Nations" here may also be understood as "Gentiles," but in this Genesis quotation the broader sense is more likely.'
    reason: lexical_alternative
translation:
  language: ko
  text: (기록된 바, 「내가 너를 많은 민족의 아버지로 세웠다」 하심과 같이) 그는 자기가 믿은 하나님 — 곧 죽은 자들에게 생명을 주시며, 없는 것들을 있는 것 같이 부르시는 하나님 — 앞에서 그러합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐθνῶν
  english_pob_choice: nations
  chosen_korean: 민족
  alternatives_korean:
