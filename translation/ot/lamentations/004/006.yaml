theological_decisions:
- issue: Sense of עָוֹן in the comparison with Sodom
  chosen_reading: moral iniquity/guilt rather than punitive consequence
  alternative_readings:
  - punishment for iniquity
  rationale: Some translations render the opening as 'the punishment of the iniquity' because עָוֹן can include the consequence of sin. However, the immediate comparison with 'the sin of Sodom' makes a moral comparison more natural in English. The verse still implies judgment, but the main lexical contrast is between Judah's iniquity and Sodom's sin.
- issue: Interpretation of the final clause
  chosen_reading: Sodom was overthrown suddenly without prolonged human assault
  alternative_readings:
  - no hands were wrung over her
  - no hands came upon her
  rationale: 'The Hebrew is notoriously compressed and ambiguous. The chosen rendering preserves the likely contrast: Sodom fell at once, whereas Jerusalem suffered drawn-out devastation. Because the clause is uncertain, a footnote preserves a major lexical alternative rather than overstating certainty.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
