translation:
  language: es
  text: Entonces Esdras se levantó de delante de la casa de Dios y fue a la cámara de Jehohanán[a], hijo de Eliasib. Ya allí, no comió pan ni bebió agua, porque estaba de duelo por la infidelidad[b] de los exiliados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Johanan, hijo de Eliasib».
    reason: lexical_alternative
  - marker: b
    text: «Infidelidad» también puede entenderse como «traición» o «falta de fidelidad».
    reason: lexical_alternative
  - marker: c
    text: «Los exiliados» se refiere a la comunidad que había regresado del exilio.
    reason: cultural_note
lexical_decisions:
- source_word: מִלִּפְנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de ante
  - desde la presencia de
  lexicon: HALOT
  rationale: La expresión hebrea conserva una idea espacial concreta. En español, «de delante de» mantiene esa relación sin volverse tan arcaica como una fórmula rígida, y evita interpretarla demasiado como una abstracción.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se conserva la imagen literal del hebreo, como en la POB inglesa. «Casa de Dios» es natural en español y retiene el tono reverente sin reemplazarlo por una interpretación más técnica.
- source_word: לִשְׁכַּת
  english_pob_choice: the chamber
  chosen_spanish: la cámara
  alternatives_spanish:
  - el aposento
  - la sala
  lexicon: HALOT
  rationale: El término designa un espacio arquitectónico dentro de un complejo sagrado o administrativo. «Cámara» refleja bien esa función en español bíblico y mantiene el matiz más específico que «sala» o «cuarto».
- source_word: יְהוֹחָנָן בֶּן אֶלְיָשִׁיב
  english_pob_choice: Jehohanan son of Eliashib
  chosen_spanish: Jehohanán, hijo de Eliasib
  alternatives_spanish:
  - Johanan, hijo de Eliasib
  lexicon: transliteration
  rationale: Se translitera el nombre hebreo en una forma cercana al original. «Jehohanán» reproduce mejor יְהוֹחָנָן que «Johanan», y «hijo de» sigue la relación genealógica literal.
- source_word: לֶחֶם לֹא אָכַל
  english_pob_choice: ate no bread
  chosen_spanish: no comió pan
  alternatives_spanish:
  - no comió alimento
  - no comió nada
  lexicon: HALOT
  rationale: «Pan» preserva el sustantivo concreto del hebreo, como en la POB inglesa. En español, «no comió pan» suena natural y mantiene la fórmula de ayuno junto con la siguiente cláusula.
- source_word: וּמַיִם לֹא שָׁתָה
  english_pob_choice: drank no water
  chosen_spanish: ni bebió agua
  alternatives_spanish:
  - y no bebió agua
  - ni tomó agua
  lexicon: HALOT
  rationale: Se conserva el objeto explícito «agua» y la coordinación negativa del hebreo. «Ni bebió agua» enlaza fluidamente con la cláusula anterior y expresa el ayuno completo.
- source_word: מִתְאַבֵּל
  english_pob_choice: was mourning
  chosen_spanish: estaba de duelo
  alternatives_spanish:
  - estaba lamentándose
  - estaba afligido
  lexicon: HALOT
  rationale: El verbo indica luto/duelo con manifestación visible de dolor, a menudo asociado con ayuno. «Estaba de duelo» comunica bien ese estado en español contemporáneo y conserva el peso solemne.
- source_word: מַעַל
  english_pob_choice: unfaithfulness
  chosen_spanish: infidelidad
  alternatives_spanish:
  - traición
  - deslealtad
  - falta de fidelidad
  lexicon: HALOT
  rationale: En este contexto, מעל expresa quebranto de fidelidad, con carga covenantal. «Infidelidad» mantiene esa fuerza moral y relacional en español; aunque puede sonar fuerte, corresponde al peso del término en la narrativa.
- source_word: הַגּוֹלָה
  english_pob_choice: the exiles
  chosen_spanish: los desterrados
  alternatives_spanish:
  - los exiliados
  - la comunidad del destierro
  lexicon: HALOT
  rationale: El término alude a la comunidad del exilio/restauración. «Desterrados» evita una lectura demasiado técnica y conserva que se trata de quienes retornaron de la cautividad, no solo de una condición abstracta.
theological_decisions:
- issue: Valor covenantal de מַעַל
  english_pob_reading: unfaithfulness
  chosen_spanish_reading: infidelidad
  alternative_spanish_readings:
  - traición
  - falta de fidelidad
  rationale: La escena presenta el dolor de Esdras por una ruptura de fidelidad del pueblo frente a Dios. «Infidelidad» conserva la dimensión moral y de alianza sin reducir el término a una mera falta emocional o social.
  doctrine_reference: Translation philosophy §3, §5
- issue: Cálido literalismo de בֵּית הָאֱלֹהִים
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - el templo de Dios
  rationale: Se mantiene la formulación del hebreo en vez de sustituirla por una equivalencia interpretativa. Esto preserva la textura del texto fuente y su reverencia propia.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identidad de הַגּוֹלָה
  english_pob_reading: the exiles refers to the returned exile community
  chosen_spanish_reading: los desterrados
  alternative_spanish_readings:
  - los exiliados
  - la comunidad de los desterrados
  rationale: La frase se refiere a la comunidad posexílica ya retornada. «Los desterrados» permite incluir esa referencia comunitaria sin añadir una explicación demasiado larga al cuerpo del versículo.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'Se revisó la formulación para conservar la secuencia narrativa y las imágenes concretas del hebreo: levantarse de delante de la casa de Dios, ir a una cámara específica, ayunar con pan y agua, y expresar duelo por la culpa colectiva. Se adoptaron equivalencias que evitan sobreparafrasear, pero que siguen siendo naturales en español.'
  spanish_consistency_notes:
  - Se mantuvo «casa de Dios» en vez de «templo» para respetar la expresión hebrea retenida por la POB inglesa.
  - Se usó «desterrados» para הַגּוֹלָה, con nota aclaratoria, para preservar el sentido comunitario posexílico.
  - Se prefirió «infidelidad» para מַעַל por su fuerza de ruptura de fidelidad, coherente con la lectura teológica del texto.
  - Se transliteró el nombre como «Jehohanán» para reflejar mejor la forma hebrea y mantener consistencia con la práctica de nombres propios.
