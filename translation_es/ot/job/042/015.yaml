review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido general del hebreo: negación existencial con נִמְצָא, comparación de belleza con כ, y el detalle social de que el padre dio herencia a las hijas entre sus hermanos. Sin embargo, se aparta del rastro auditado del POB en un punto significativo: בְּכָל הָאָרֶץ fue documentado y decidido como «in all the land», no «en toda la tierra» en el texto principal. Dado ese razonamiento contextual, el español principal debe alinearse con «en toda la tierra/land» mediante una opción más localizada como «en toda la tierra» solo en nota alternativa, no como lectura principal.'
  spanish_quality_summary: El español es claro y digno. No obstante, la colocación del marcador de nota sobre «Job» hace que la nota alternativa «en toda la tierra» parezca anclada al lugar equivocado; debe anclarse a la frase correspondiente. También conviene evitar el punto y coma si se puede coordinar con coma de manera más fluida, aunque esto es estilístico y menor.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. «herencia» y «entre sus hermanos» están bien. El único desajuste relevante es la decisión contextual para הָאָרֶץ: el POB auditado prefirió «land», por lo que el español debe reflejar «tierra/país/región» con alcance narrativo, no mantener «tierra» universal como texto principal contra la decisión documentada.'
  issues:
  - severity: medium
    issue: La lectura principal «en toda la tierra» no sigue la decisión documentada del POB para בְּכָל הָאָרֶץ.
    rationale: El expediente inglés justificó «in all the land» por contexto narrativo y para evitar una amplitud global excesiva. El español puede expresar eso naturalmente como «en toda la tierra» solo si se entiende localmente, pero dado que el propio borrador defiende una amplitud mayor, conviene ajustar la redacción principal a «en toda la región» o «en todo el país». «En toda la región» conserva la fuerza superlativa sin sonar moderno-político.
  - severity: medium
    issue: El marcador de nota [a] está colocado en «Job» en vez de en la frase que corresponde a la alternativa léxica.
    rationale: 'La nota dice «O: “en toda la tierra”», por lo que el anclaje debe ir junto a la expresión principal que se está alternando, no junto al nombre propio.'
  revised_spanish_text: Y no se hallaron mujeres tan hermosas como las hijas de Job en toda la región[a], y su padre les dio una herencia entre sus hermanos.
  revised_footnotes:
  - marker: a
    text: 'O: «en toda la tierra».'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta בְּכָל הָאָרֶץ a una lectura principal que sigue la decisión contextual del POB («land») sin perder naturalidad en español: «en toda la región». Se conserva «en toda la tierra» como alternativa léxica en nota, y se mueve el marcador al lugar correcto. El resto del versículo es fiel y claro.'
