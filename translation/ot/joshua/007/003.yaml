id: JOS.7.3
reference: Joshua 7:3
source:
  edition: WLC
  text: וַ/יָּשֻׁ֣בוּ אֶל יְהוֹשֻׁ֗עַ וַ/יֹּאמְר֣וּ אֵלָי/ו֮ אַל יַ֣עַל כָּל הָ/עָם֒ כְּ/אַלְפַּ֣יִם אִ֗ישׁ א֚וֹ כִּ/שְׁלֹ֣שֶׁת אֲלָפִ֣ים אִ֔ישׁ יַעֲל֖וּ וְ/יַכּ֣וּ אֶת הָ/עָ֑י אַל תְּיַגַּע שָׁ֨מָּ/ה֙ אֶת כָּל הָ/עָ֔ם כִּ֥י מְעַ֖ט הֵֽמָּה־־־־־־־־׃
translation:
  text: They returned to Joshua and said to him[a], “Do not have all the people go up. Let about two thousand men, or about three thousand men, go up and strike Ai. Do not weary all the people there[b], for they are few.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the people' may refer specifically to the fighting force here; compare 'troops' or 'army' as a contextual rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'Do not trouble all the people there.' The Hebrew verb can carry the sense of causing weariness or burden through unnecessary effort.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: They returned
  alternatives:
  - And they returned
  - They came back
  lexicon: HALOT
  rationale: Qal wayyiqtol of שוב, straightforward narrative past. 'Returned' preserves the movement back from reconnaissance to Joshua.
- source_word: וַיֹּאמְרוּ אֵלָיו
  chosen: and said to him
  alternatives:
  - and told him
  lexicon: HALOT
  rationale: Standard rendering of אמר with indirect object; 'said to him' is slightly more formal and transparent to the Hebrew wording.
- source_word: אַל יַעַל כָּל הָעָם
  chosen: Do not have all the people go up
  alternatives:
  - Let not all the people go up
  - Do not let all the troops go up
  lexicon: HALOT
  rationale: אַל + jussive expresses prohibition/advice. 'Go up' is retained because עלה is the standard military/topographical verb here and likely reflects ascent toward the target. 'People' follows הָעָם rather than narrowing to 'troops,' though the military sense is clear from context.
- source_word: כְּאַלְפַּיִם אִישׁ
  chosen: about two thousand men
  alternatives:
  - some two thousand men
  - approximately two thousand men
  lexicon: HALOT
  rationale: The prefixed כ conveys approximation here, so 'about' is preferable to a wooden 'like two thousand.' אִישׁ after the number is naturally rendered 'men.'
- source_word: אוֹ כִּשְׁלֹשֶׁת אֲלָפִים אִישׁ
  chosen: or about three thousand men
  alternatives:
  - or some three thousand men
  lexicon: HALOT
  rationale: Parallel to the previous phrase; כ again marks approximation. The disjunctive אוֹ gives an alternative estimate.
- source_word: יַעֲלוּ
  chosen: go up
  alternatives:
  - advance
  - march up
  lexicon: HALOT
  rationale: Retained consistently with the earlier עלה. In military context it can imply attack movement, but 'go up' preserves the Hebrew idiom without obscuring meaning.
- source_word: וְיַכּוּ אֶת הָעָי
  chosen: and strike Ai
  alternatives:
  - and attack Ai
  - and defeat Ai
  lexicon: HALOT
  rationale: 'נכה commonly means ''strike/smite.'' ''Strike'' is a good optimal-equivalence rendering: more literal than ''defeat'' and more natural than ''smite.'''
- source_word: אַל תְּיַגַּע שָׁמָּה אֶת כָּל הָעָם
  chosen: Do not wear out all the people there
  alternatives:
  - Do not trouble all the people there
  - Do not make all the people toil there
  lexicon: HALOT
  rationale: יגע in the Piel can mean to weary, exhaust, or cause trouble through exertion. In this military advisory context, 'wear out' captures the sense of unnecessary exertion better than the more generic 'trouble.' שָׁמָּה is rendered 'there' in natural English order.
- source_word: כִּי מְעַט הֵמָּה
  chosen: for they are few
  alternatives:
  - for they are only a few
  - for they are few in number
  lexicon: HALOT
  rationale: Refers to the inhabitants/defenders of Ai. 'They are few' is concise and faithful; English naturally supplies the implied 'in number' without needing to state it.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the army
  - the troops
  lexicon: HALOT
  rationale: Though in context it refers to Israel's fighting force, the Hebrew says 'the people.' Following the translation philosophy, the main text preserves this broader term rather than importing a narrower military gloss.
- source_word: אִישׁ
  chosen: men
  alternatives:
  - soldiers
  lexicon: HALOT
  rationale: Gender-accurate rendering is appropriate here, since the referent is the male fighting force. 'Soldiers' is interpretive and therefore left as an alternative rather than the main text.
