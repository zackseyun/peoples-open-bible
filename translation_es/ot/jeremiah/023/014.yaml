translation:
  language: es
  text: 'Y entre los profetas de Jerusalén he visto una cosa horrible: cometer adulterio y andar en mentira; han fortalecido las manos de los malhechores, para que nadie[a] se vuelva[b] de su maldad. Todos ellos son para mí como Sodoma, y sus habitantes como Gomorra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa el singular distributivo «un hombre»; en español se expresa aquí con «nadie» para comunicar de manera natural ese sentido representativo.
    reason: lexical_alternative
  - marker: b
    text: «Se vuelva» también puede traducirse «se arrepienta», ya que el verbo hebreo suele llevar el sentido de volverse del mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִנְבִיאֵי יְרוּשָׁלִַם
  english_pob_choice: And among the prophets of Jerusalem
  chosen_spanish: Y entre los profetas de Jerusalén
  alternatives_spanish:
  - Y en los profetas de Jerusalén
  - Pero entre los profetas de Jerusalén
  lexicon: HALOT
  rationale: El prefijo ב indica esfera o conjunto, y en español natural se expresa mejor con «entre». El waw inicial se vierte con «Y» para conservar el fluir discursivo sin forzar un contraste.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  lexicon: HALOT
  rationale: El perfecto hebreo permite un valor de experiencia pasada con vigencia presente; el pretérito perfecto compuesto funciona bien en español para esa evaluación profética vigente.
- source_word: שַׁעֲרוּרָה
  english_pob_choice: a horrible thing
  chosen_spanish: una cosa horrible
  alternatives_spanish:
  - una cosa espantosa
  - una cosa abominable
  lexicon: HALOT
  rationale: El sustantivo expresa algo moralmente repulsivo o espantoso. «Cosa horrible» comunica la fuerza evaluativa sin añadir una interpretación más fuerte que la evidencia textual.
- source_word: נָאוֹף
  english_pob_choice: committing adultery
  chosen_spanish: cometer adulterio
  alternatives_spanish:
  - adulterar
  - adulterio
  lexicon: HALOT
  rationale: Se conserva el matiz verbal del hebreo, como en la revisión inglesa final. En español, el infinitivo verbal evita convertirlo prematuramente en un sustantivo aislado.
- source_word: וְהָלֹךְ בַּשֶּׁקֶר
  english_pob_choice: and walking in falsehood
  chosen_spanish: y andar en mentira
  alternatives_spanish:
  - y caminar en falsedad
  - y vivir en mentira
  lexicon: HALOT
  rationale: הלך con ב expresa conducta o modo de vida. «Andar en mentira» mantiene la imagen verbal del hebreo y es idiomático en español bíblico contemporáneo.
- source_word: וְחִזְּקוּ יְדֵי מְרֵעִים
  english_pob_choice: they have strengthened the hands of evildoers
  chosen_spanish: han fortalecido las manos de los malhechores
  alternatives_spanish:
  - han animado a los malhechores
  - han dado fuerza a los malhechores
  lexicon: HALOT
  rationale: La locución hebrea «fortalecer las manos» se conserva porque es transparente y mantiene la imagen de aliento/embotamiento moral. «Malhechores» recoge el valor de מְרֵעִים sin suavizarlo.
- source_word: לְבִלְתִּי שָׁבוּ אִישׁ מֵרָעָתוֹ
  english_pob_choice: so that no man turns back from his evil
  chosen_spanish: para que nadie se vuelva de su maldad
  alternatives_spanish:
  - para que ningún hombre se vuelva de su maldad
  - para que no se arrepienta de su maldad
  lexicon: HALOT
  rationale: El hebreo usa el singular distributivo אִישׁ; en español, «nadie» comunica bien esa generalización sin forzar el masculino genérico. «Se vuelva de su maldad» conserva la imagen de girar/retornar que puede incluir arrepentimiento, pero sin explicitarlo más de lo que el verbo exige.
- source_word: הָיוּ לִי כֻלָּם כִּסְדֹם
  english_pob_choice: All of them are to me like Sodom
  chosen_spanish: Para mí todos ellos son como Sodoma
  alternatives_spanish:
  - Todos ellos son para mí como Sodoma
  - Todos ellos son como Sodoma para mí
  lexicon: HALOT
  rationale: Se mantiene el valor evaluativo de לִי con «para mí», que en español expresa la perspectiva/jucio de Yahvé de manera natural. «Sodoma» es la forma usual en español para el nombre propio.
- source_word: וְיֹשְׁבֶיהָ כַּעֲמֹרָה
  english_pob_choice: and her inhabitants like Gomorrah
  chosen_spanish: y sus habitantes como Gomorra
  alternatives_spanish:
  - y los habitantes de ella como Gomorra
  lexicon: HALOT
  rationale: El sufijo femenino remite a Jerusalén; en español, «sus habitantes» suena natural y conserva la referencia posesiva sin perder la personificación de la ciudad. «Gomorra» es la forma establecida en español.
theological_decisions:
- issue: Valor distributivo de אִישׁ y el alcance de la negación
  english_pob_reading: no man turns back from his evil
  chosen_spanish_reading: nadie se vuelve de su maldad
  alternative_spanish_readings:
  - ningún hombre se vuelve de su maldad
  - ninguna persona se vuelve de su maldad
  rationale: El hebreo usa אִישׁ en singular distributivo. En español, «nadie» transmite con claridad el alcance universal de la negación sin perder el sentido representativo. Se evita reescribir el pasaje con una formulación más interpretativa de lo que el texto obliga.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nuance de שׁוּב en contexto moral
  english_pob_reading: Turns back can also be rendered repents
  chosen_spanish_reading: se vuelva de su maldad
  alternative_spanish_readings:
  - se arrepienta de su maldad
  - regrese de su maldad
  rationale: El verbo admite un matiz de arrepentimiento, pero el giro básico es de vuelta/retorno. «Se vuelva» preserva la imagen sin imponer un término teológico más explícito que el hebreo inmediato. El posible valor de arrepentimiento queda implícito.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que corrigió la forma verbal de נָאֹף a «committing adultery» y ajustó la clausula final de «have become» a «are to me». En español se reflejan esas decisiones con infinitivos verbales y con «son como Sodoma…», manteniendo el tono evaluativo presente del oráculo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene explícitamente.
  - Se mantiene «maldad» para רָעָה por coherencia con el valor moral general del pasaje.
  - «Sodoma» y «Gomorra» siguen la ortografía usual en español bíblico.
  - Se conserva la imagen de «fortalecer las manos» por su transparencia y porque el español la entiende bien en sentido de animar o emboldenar.
