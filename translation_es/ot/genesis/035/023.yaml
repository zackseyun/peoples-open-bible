translation:
  language: es
  text: 'Los hijos de Lea: Rubén, el primogénito de Jacob[a], Simeón, Leví, Judá, Isacar y Zabulón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más formal: «el primogénito de Jacob, Rubén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los hijos varones de
  - Los descendientes de
  lexicon: HALOT
  rationale: El plural constructo introduce la lista de los varones nacidos de Lea; en español, «hijos de» es la forma más directa y natural para una enumeración masculina como esta.
- source_word: לֵאָה
  english_pob_choice: Leah
  chosen_spanish: Lea
  alternatives_spanish:
  - Leah
  lexicon: Nombre propio bíblico
  rationale: Se translitera al español bíblico estándar como «Lea», forma tradicional y ampliamente reconocible en español.
- source_word: בְּכֹר יַעֲקֹב
  english_pob_choice: Jacob’s firstborn
  chosen_spanish: el primogénito de Jacob
  alternatives_spanish:
  - el primero nacido de Jacob
  - el hijo mayor de Jacob
  lexicon: HALOT
  rationale: «Primogénito» conserva el valor lexical de בְּכֹר y su tono formal. Mantiene la relación posesiva explícita con Jacob, como en el audit trail inglés.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reubén
  lexicon: Nombre propio bíblico
  rationale: «Rubén» es la forma española más asentada en biblias y lectura eclesial; refleja el nombre propio sin forzar una transliteración menos idiomática.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: coma enumerativa sin repetir «y» en cada miembro
  alternatives_spanish:
  - y
  lexicon: Conjunción hebrea coordinante
  rationale: El hebreo encadena una lista simple. En español, repetir «y» en cada elemento sería menos natural; la puntuación conserva el ritmo enumerativo sin añadir énfasis no requerido.
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: Nombre propio bíblico
  rationale: «Simeón» preserva la forma bíblica específica del patriarca, distinta del nombre común «Simón».
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: Nombre propio bíblico
  rationale: «Leví» sigue la forma española habitual con acento gráfico y evita ambigüedad prosódica.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Juda
  lexicon: Nombre propio bíblico
  rationale: «Judá» es la forma española tradicional y clara para el nombre del patriarca.
- source_word: יִשָּׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  lexicon: Nombre propio bíblico
  rationale: «Isacar» es la grafía española bíblica más usual, manteniendo identificación inmediata del nombre.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulún
  - Zebulón
  lexicon: Nombre propio bíblico
  rationale: «Zabulón» es la forma española consagrada para este nombre; conserva la identificación bíblica y fluidez en lectura pública.
theological_decisions:
- issue: Relación sintáctica entre «el primogénito de Jacob» y «Rubén»
  english_pob_reading: Jacob’s firstborn[a] with an explanatory note that the more formal reading is 'the firstborn of Jacob, Reuben.'
  chosen_spanish_reading: el primogénito de Jacob[a], Rubén
  alternative_spanish_readings:
  - Rubén, el primogénito de Jacob
  - el primogénito de Jacob, Rubén
  rationale: 'El hebreo presenta una construcción appositiva breve. La puntuación española puede dejar la frase abierta y luego nombrar a Rubén, preservando la tensión interpretativa que el inglés señaló en la nota: o bien «el primogénito de Jacob» como título de Rubén, o bien una lectura más formalmente appositiva con el nombre propio inmediatamente después.'
  doctrine_reference: No doctrinal issue; syntactic/appositional reading only.
translation_notes:
  revision_awareness: 'El audit trail inglés revisó la formulación repetitiva con ''and'' para dejar una lista más natural, manteniendo la aposición ''Jacob’s firstborn, Reuben''. La versión española sigue esa misma decisión de naturalidad formal: usa puntuación de lista en lugar de repetir conjunciones, pero conserva la relación estrecha entre el primogénito y Rubén sin neutralizar la ambigüedad sintáctica del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Lea» y no «Leah» para coherencia con el español bíblico estándar.
  - 'Se conservaron formas españolas tradicionales de nombres propios bíblicos: Rubén, Simeón, Leví, Judá, Isacar, Zabulón.'
  - No se empleó «Señor» ni otras sustituciones teológicas ajenas al verso, porque el texto no contiene el Tetragrámaton ni títulos divinos.
  - La enumeración usa puntuación española natural, sin introducir explicaciones ajenas al texto.
