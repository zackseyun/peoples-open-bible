translation:
  language: es
  text: Y vi que la sabiduría tiene ventaja[a] sobre la necedad, como la luz tiene ventaja sobre la oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «provecho» o «ganancia»; el hebreo puede denotar excedente, ganancia o ventaja, y aquí señala la superioridad de la sabiduría sobre la necedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y percibí
  - Entonces vi
  lexicon: HALOT
  rationale: El qal perfecto de ראה introduce una observación del hablante. «Vi» conserva el sentido experiencial de la frase y suena natural en español sin perder la inmediatez del testimonio.
- source_word: אָ֔נִי
  english_pob_choice: I myself
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - en cuanto a mí
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis, pero en español «Y vi» ya permite una lectura enfática suficiente en este contexto. Se evita sobrecargar la línea con una duplicación poco natural.
- source_word: שֶׁיֵּשׁ
  english_pob_choice: that ... has
  chosen_spanish: que hay
  alternatives_spanish:
  - que existe
  - que tiene
  lexicon: HALOT
  rationale: La construcción existencial se expresa de manera natural con «hay». En español, «que hay ventaja» comunica la existencia de una superioridad sin forzar una estructura posesiva artificial.
- source_word: יִתְרוֹן
  english_pob_choice: advantage
  chosen_spanish: ventaja
  alternatives_spanish:
  - provecho
  - ganancia
  - beneficio
  lexicon: HALOT
  rationale: En Eclesiastés, יתרון puede denotar ganancia, excedente o ventaja. Aquí el contraste es cualitativo entre sabiduría y necedad, así que «ventaja» refleja bien la superioridad comparativa. Se conserva la nota léxica porque el término también puede significar «provecho» o «ganancia».
- source_word: לַחָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: HALOT
  rationale: Traducción directa y estándar de חָכְמָה. En español funciona naturalmente como el sujeto lógico de la construcción comparativa.
- source_word: מִן הַסִּכְלוּת
  english_pob_choice: over folly
  chosen_spanish: sobre la necedad
  alternatives_spanish:
  - más que la necedad
  - que la necedad
  lexicon: HALOT
  rationale: סִכְלוּת expresa necedad o insensatez. «Necedad» conserva el tono sapiencial de Eclesiastés mejor que un simple «foolishness», y «sobre» mantiene la comparación de superioridad reflejada por מִן.
- source_word: כִּיתְרוֹן
  english_pob_choice: as light has an advantage
  chosen_spanish: como la luz tiene ventaja
  alternatives_spanish:
  - así como la luz tiene ventaja
  - como la ventaja de la luz
  lexicon: HALOT
  rationale: כְּ introduce una comparación directa. Repetir «tiene ventaja» en español preserva el paralelismo del hebreo y mantiene visible el nexo entre ambas mitades del versículo.
- source_word: הָאוֹר
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: HALOT
  rationale: אוֹר se traduce de forma directa por «luz». Aquí el sentido es comparativo y no meramente simbólico.
- source_word: מִן הַחֹשֶׁךְ
  english_pob_choice: over darkness
  chosen_spanish: sobre la oscuridad
  alternatives_spanish:
  - más que la oscuridad
  - que la oscuridad
  lexicon: HALOT
  rationale: El מן comparativo se expresa con «sobre» para conservar la idea de superioridad y reproducir el mismo patrón usado en la primera cláusula.
theological_decisions:
- issue: Cómo expresar יתרון sin perder su posible matiz de excedente/provecho en Eclesiastés
  english_pob_reading: Rendered as 'advantage' rather than 'profit' in this comparative statement.
  chosen_spanish_reading: Traducido como «ventaja» en vez de «provecho» o «ganancia».
  alternative_spanish_readings:
  - provecho
  - ganancia
  - beneficio
  rationale: 'La comparación no es económica sino sapiencial: sabiduría supera a la necedad del mismo modo que la luz supera a la oscuridad. «Ventaja» comunica con claridad la superioridad comparativa y, a la vez, permite anotar el rango semántico más amplio del término hebreo.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El contexto inglés revisado simplifica la primera cláusula para una comparación más fluida: «And I saw that wisdom has an advantage over folly, as light has an advantage over darkness». La redacción española sigue esa revisión, pero conserva explícitamente el valor comparativo de יתרון y el paralelo luz/oscuridad, sin añadir énfasis innecesario.'
  spanish_consistency_notes:
  - Se usa «Y» al inicio para enlazar con el flujo narrativo del libro.
  - Se mantiene «luz/oscuridad» con léxico común y bíblico, sin sustituirlo por términos más abstractos.
  - Se evita «Cristo» u otros términos no presentes; no hay contenido cristológico en este versículo.
  - «Necedad» se prefiere a «necedad/fatuidad» por ser más natural en español y apto para el tono sapiencial.
