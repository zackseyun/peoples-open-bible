revisions:
- from: Y Mattitías[a], de entre los levitas, el primogénito de Sálum el corahita[b], fue encargado del trabajo de las tortas planas.
  to: Y Matitías, de entre los levitas, el primogénito de Salum el coreíta, fue encargado[a] del trabajo de las tortas planas[b].
  rationale: 'La revisión corrige el problema principal de fidelidad editorial: las notas ahora quedan ancladas a las expresiones que realmente explican. Además, «coreíta» mejora la naturalidad y la reconocibilidad del gentilicio en español sin alterar el sentido. El resto del texto se conserva porque representa bien el hebreo y las decisiones léxicas auditadas.'
  reviewer_model: gpt-5.4
