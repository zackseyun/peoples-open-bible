  text: עֲשֵׂ֨ה זֹ֥את אֵפ֪וֹא בְּנִ֡/י וְֽ/הִנָּצֵ֗ל כִּ֘י בָ֤אתָ בְ/כַף רֵעֶ֑/ךָ לֵ֥ךְ הִ֝תְרַפֵּ֗ס וּ/רְהַ֥ב רֵעֶֽי/ךָ׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/006/003.yaml
  text: 'Do this[a], then, my son, and deliver yourself, for you have come into the hand of your neighbor: go, humble yourself[c][b], and urge your neighbor.'
  footnotes:
  - marker: a
    text: Literally, 'into the palm of your neighbor,' that is, into your neighbor's power or control.
    reason: lexical_alternative
  - marker: b
    text: Or 'throw yourself down' / 'submit yourself' for 'humble yourself.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew reads 'your neighbors' (plural), though many understand the sense as singular, 'your neighbor' or 'your friend,' in line with the earlier phrase.
    reason: textual_variant
