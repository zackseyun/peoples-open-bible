translation:
  language: es
  text: Entonces todos los hombres de Israel se levantaron de su lugar y se dispusieron en orden de batalla en Baal-tamar, mientras los que estaban en emboscada de Israel irrumpieron desde su lugar, desde Maareh-geba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo Maareh-geba puede entenderse como nombre de lugar, como se traduce aquí. También podría leerse de manera descriptiva como «el lugar abierto de Gueba» o «la llanura de Gueba».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹל אִישׁ יִשְׂרָאֵל
  english_pob_choice: all the men of Israel
  chosen_spanish: todos los hombres de Israel
  alternatives_spanish:
  - todo hombre de Israel
  - todos los varones de Israel
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en singular con כֹל en sentido colectivo/distributivo. En este contexto militar, «hombres» transmite con naturalidad el grupo combatiente sin perder el valor colectivo del original.
- source_word: קָמוּ מִמְּקוֹמוֹ
  english_pob_choice: rose from their place
  chosen_spanish: se levantaron de su lugar
  alternatives_spanish:
  - se pusieron en pie de su lugar
  - se alzaron de su lugar
  lexicon: HALOT
  rationale: «Se levantaron» es un equivalente natural de קָמוּ y conserva la imagen de movimiento desde una posición previa. Mantengo el singular «su lugar» porque el hebreo tiene sufijo singular distributivo para un sujeto colectivo.
- source_word: וַיַּעַרְכוּ
  english_pob_choice: drew up in battle formation
  chosen_spanish: se dispusieron en orden de batalla
  alternatives_spanish:
  - se alinearon para la batalla
  - se ordenaron en formación de batalla
  lexicon: HALOT
  rationale: El verbo ערך en narrativa militar describe el ordenar tropas para combate. «Se dispusieron en orden de batalla» conserva la idea de formación militar sin sonar rígido en español.
- source_word: בְּבַעַל תָּמָר
  english_pob_choice: at Baal-tamar
  chosen_spanish: en Baal-tamar
  alternatives_spanish:
  - en Baal-Tamar
  - junto a Baal-tamar
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado, como en la decisión inglesa, porque el texto lo trata como nombre propio de lugar. «En» expresa el valor locativo del hebreo.
- source_word: וְאֹרֵב יִשְׂרָאֵל
  english_pob_choice: the men lying in ambush of Israel
  chosen_spanish: los de la emboscada de Israel
  alternatives_spanish:
  - la emboscada de Israel
  - los emboscados de Israel
  lexicon: HALOT
  rationale: El participio אֹרֵב denota a quienes están al acecho. «Los de la emboscada» mantiene la referencia al grupo sin convertirlo en una frase idiomática más interpretativa que el original.
- source_word: מֵגִיחַ
  english_pob_choice: rushed out
  chosen_spanish: salieron corriendo
  alternatives_spanish:
  - irrumpieron
  - salieron precipitadamente
  - brotaron
  lexicon: HALOT
  rationale: El hifil participial comunica salida súbita desde ocultamiento. «Salieron corriendo» preserva la rapidez y el impulso narrativo con un español claro; aunque es más expresivo que un literalismo seco, sigue dentro del campo semántico del pasaje.
- source_word: מִמְּקוֹמוֹ
  english_pob_choice: from their place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - desde su lugar
  - de ese lugar
  lexicon: HALOT
  rationale: Como antes en el versículo, el hebreo usa un sufijo singular distributivo para el colectivo. «De su lugar» refleja esa construcción en español de manera natural.
- source_word: מִמַּעֲרֵה גָבַע
  english_pob_choice: from Maareh-geba
  chosen_spanish: desde Maareh-gueba
  alternatives_spanish:
  - desde la llanura de Gueba
  - desde el claro de Gueba
  - desde el campo abierto de Gueba
  lexicon: HALOT
  rationale: Se conserva la transliteración del probable topónimo, siguiendo la opción principal del audit trail en inglés. Se ajusta «Geba» a «Gueba» para la pronunciación hispana usual del nombre bíblico.
theological_decisions:
- issue: Tratamiento del topónimo oscuro מַעֲרֵה גָבַע
  english_pob_reading: The Hebrew Maareh-geba may be understood as a place name, as translated here. It could also be read more descriptively as 'the open place of Geba' or 'the meadow of Geba.'
  chosen_spanish_reading: Maareh-gueba en la línea principal, con la posibilidad implícita de lectura descriptiva preservada en nota.
  alternative_spanish_readings:
  - la llanura de Gueba
  - el lugar abierto de Gueba
  - el prado de Gueba
  rationale: El hebreo es ambiguo entre un nombre propio y una descripción locativa. La POB inglesa eligió transliterar en el texto principal y dejar la alternativa en nota; la versión española sigue la misma prudencia para no resolver indebidamente la ambigüedad.
  doctrine_reference: Principio de transparencia textual y cautela ante ambigüedad léxica
- issue: Valor colectivo de אִישׁ con כֹל
  english_pob_reading: Although אִישׁ is singular in form, with כֹל it functions distributively/collectively.
  chosen_spanish_reading: todos los hombres de Israel
  alternative_spanish_readings:
  - todo hombre de Israel
  - todos los varones de Israel
  rationale: No se individualiza indebidamente el singular hebreo; se conserva el sentido colectivo/militar que el audit trail inglés ya identificó.
  doctrine_reference: Fidelidad semántica al valor distributivo del hebreo
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió la relación de אֹרֵב יִשְׂרָאֵל de «for Israel» a «of Israel», para reflejar que se trata de la emboscada/los emboscadores de Israel, no de una emboscada contra Israel. La redacción española adopta esa corrección con «los de la emboscada de Israel».
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Dios según los lineamientos del proyecto, aunque este versículo no los contenga.
  - «Gueba» se usa como adaptación hispana del topónimo Geba, consistente con la pronunciación bíblica habitual en español.
  - La puntuación y el ritmo narrativo siguen un español bíblico moderno, evitando calcos innecesarios.
