revisions:
- from: Yo derribaré el trono de los reinos[a], y destruiré la fuerza de los reinos de las naciones. Derribaré el carro y a su jinete, y caerán los caballos y sus jinetes[b], cada uno por la espada de su hermano.
  to: Yo volcaré el trono de los reinos[a], y destruiré la fuerza de los reinos de las naciones. Volcaré el carro con su jinete, y los caballos y sus jinetes descenderán[b], cada uno por la espada de su hermano.
  rationale: 'La revisión mantiene el buen sentido general del borrador pero ajusta tres puntos para acercarlo más al hebreo y al rastro de auditoría del POB inglés: (1) se repite «volcaré» para reflejar consistentemente וְהָפַכְתִּי en ambas apariciones y preservar la imaginería de inversión/derrocamiento; (2) se cambia «caerán» por «descenderán» para no sobreinterpretar וְיָרְדוּ; y (3) se suaviza la coordinación a «el carro con su jinete» para una lectura más natural en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:40:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo y del POB inglés: conserva los singulares representativos («el trono», «el carro»), el juicio divino en primera persona, la referencia a los «reinos de las naciones» y el giro distributivo final. Sin embargo, hay dos desajustes relevantes: «derribaré» no preserva tan bien como «volcaré»/«trastornaré» la repetición imagística de וְהָפַכְתִּי aplicada tanto al trono como al carro, y «caerán» interpreta más que el hebreo/POB «irán abajo»/«descenderán».'
  spanish_quality_summary: El español es claro, natural y digno. No obstante, «el carro y a su jinete» suena algo forzado por la preposición personal tras un objeto no humano coordinado; una formulación más fluida es «el carro con su jinete». Además, conviene alinear mejor la repetición verbal para que el paralelismo retórico sea más evidente en español.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. El uso de «naciones», «caballos», «jinetes» y la preservación de «su hermano» son adecuados. La revisión propuesta busca mayor fidelidad léxica al hebreo הפך y ירד, no un cambio teológico.
  issues:
  - severity: medium
    issue: «Derribaré» para וְהָפַכְתִּי en ambas cláusulas
    rationale: Aunque es defendible, «derribar» reduce la imagen de «volcar / trastornar / poner de cabeza» presente en הפך y funciona menos naturalmente con «carro». Una misma opción más imagística debe servir tanto para «trono» como para «carro».
  - severity: medium
    issue: «Caerán» para וְיָרְדוּ
    rationale: «Caerán» explicita derrota/muerte, mientras que el POB documenta la preferencia por preservar la imagen más literal «irán abajo / descenderán». El español puede mantener esa imagen sin volverse ininteligible.
  - severity: low
    issue: «el carro y a su jinete»
    rationale: La coordinación con «a» tras un objeto inanimado precedente suena poco elegante en español bíblico moderno. «El carro con su jinete» o «el carro y su jinete» lee mejor.
  revised_spanish_text: Yo volcaré el trono de los reinos[a], y destruiré la fuerza de los reinos de las naciones. Volcaré el carro con su jinete, y los caballos y sus jinetes descenderán[b], cada uno por la espada de su hermano.
  revised_footnotes:
  - marker: a
    text: 'O: «derrocaré el trono de los reinos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada uno por la espada de su hermano», un giro idiomático de matanza mutua o contienda interna entre los atacantes.'
    reason: cultural_note
  revision_rationale: 'La revisión mantiene el buen sentido general del borrador pero ajusta tres puntos para acercarlo más al hebreo y al rastro de auditoría del POB inglés: (1) se repite «volcaré» para reflejar consistentemente וְהָפַכְתִּי en ambas apariciones y preservar la imaginería de inversión/derrocamiento; (2) se cambia «caerán» por «descenderán» para no sobreinterpretar וְיָרְדוּ; y (3) se suaviza la coordinación a «el carro con su jinete» para una lectura más natural en español.'
