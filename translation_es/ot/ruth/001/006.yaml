translation:
  language: es
  text: Entonces ella se levantó con sus nueras y volvió de los campos de Moab, porque había oído, en el campo de Moab, que Yahvé había visitado a su pueblo para darles alimento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pan»; el hebreo leḥem suele significar pan específicamente, pero también puede referirse de manera más amplia a alimento o provisiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  english_pob_choice: Then she arose
  chosen_spanish: Entonces ella se levantó
  alternatives_spanish:
  - Entonces se alzó
  - Entonces se puso de pie
  lexicon: HALOT
  rationale: El wayyiqtol marca la secuencia narrativa; 'Entonces' conserva el avance del relato, y 'se levantó' comunica bien el movimiento inicial en español natural sin perder la dignidad del registro.
- source_word: וְכַלֹּתֶיהָ
  english_pob_choice: with her daughters-in-law
  chosen_spanish: con sus nueras
  alternatives_spanish:
  - y sus nueras
  lexicon: HALOT
  rationale: La relación aquí es de acompañamiento; en español, 'con sus nueras' expresa mejor la idea de compañía que repetir simplemente 'y'.
- source_word: וַתָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT
  rationale: שׁוב es 'volver/retornar'. 'Volvió' es natural en español y mantiene el sentido de regreso geográfico al territorio de Judá.
- source_word: מִשְּׂדֵי מוֹאָב
  english_pob_choice: from the fields of Moab
  chosen_spanish: de los campos de Moab
  alternatives_spanish:
  - de las tierras de Moab
  - de la región de Moab
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de שְׂדֵי como plural de 'campo(s)'. 'Campos de Moab' sigue de cerca el hebreo y mantiene la repetición imagística del versículo.
- source_word: שָׁמְעָה
  english_pob_choice: she had heard
  chosen_spanish: había oído
  alternatives_spanish:
  - había escuchado
  - oyó
  lexicon: HALOT
  rationale: El qatal funciona como trasfondo del motivo de la acción anterior; el pluscuamperfecto 'había oído' expresa bien esa anterioridad en español.
- source_word: בִּשְׂדֵה מוֹאָב
  english_pob_choice: in the field of Moab
  chosen_spanish: en el campo de Moab
  alternatives_spanish:
  - en los campos de Moab
  - en la tierra de Moab
  lexicon: HALOT
  rationale: Se mantiene el singular de שְׂדֵה y la repetición con el miembro anterior. 'Campo' puede sonar colectivo o regional en español, lo cual se ajusta al uso hebreo aquí.
- source_word: פָּקַד
  english_pob_choice: had visited
  chosen_spanish: había visitado
  alternatives_spanish:
  - había atendido a
  - había acudido en ayuda de
  - había tomado nota de
  lexicon: HALOT
  rationale: En este contexto, פקד denota la intervención favorable de Yahvé. 'Había visitado' conserva la ambivalencia bíblica de favor/intervención sin precisar de más.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se usa el nombre divino según la convención del proyecto para el Tetragrámaton, preservando el nombre propio en vez de sustituirlo por un título.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su nación
  lexicon: HALOT
  rationale: עַם en contextos de pacto se traduce mejor como 'pueblo', manteniendo la relación de pertenencia y alianza.
- source_word: לָתֵת לָהֶם לָחֶם
  english_pob_choice: to give them food
  chosen_spanish: para darles alimento
  alternatives_spanish:
  - para darles pan
  - para darles comida
  lexicon: HALOT
  rationale: לֶחֶם puede significar 'pan' o, por metonimia, 'alimento/provisiones'. 'Alimento' suena natural y abarca el sentido amplio de provisión; se preserva la alternativa literal en nota.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La convención española del proyecto es transliterarlo como 'Yahvé', manteniendo el nombre personal del Dios de Israel y no sustituyéndolo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y no hubo revisiones aplicadas en la última pasada; la redacción española conserva la secuencia narrativa, la repetición de 'campo(s)' y la ambigüedad lexical de לֶחֶם con una nota.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se mantuvo 'campos/campo' para reproducir la repetición de שׂדה en ambos miembros del versículo.
  - Se eligió 'alimento' como término amplio, dejando 'pan' como alternativa anotada.
  - Se evitó 'SEÑOR' para no ocultar el nombre divino revelado en el hebreo.
