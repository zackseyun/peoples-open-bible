review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y relaciones espaciales del hebreo: hicieron dos anillos de oro, los colocaron en las dos piezas de hombro del efod, abajo, en la parte frontal, en correspondencia con su lugar de unión, por encima de la banda tejida del efod. Sin embargo, el aparato de notas está desanclado y cruzado respecto del inglés auditado: la nota [a] aparece en «efod» pero explica «su unión», y la nota [b] aparece en «unión» pero repite una alternativa sobre la banda/cinto. Además, «frente a su unión» es entendible, pero «opuesto a su unión» o «a la altura de su unión» refleja con más precisión la idea de alineación espacial de לְעֻמַּת.'
  spanish_quality_summary: El texto es generalmente claro y digno. «Hombreros» funciona, aunque es algo técnico; sigue siendo legible en contexto cultual. «Abajo» y «en su parte frontal» suenan naturales. «Cinto tejido» es comprensible, pero conviene reflejar mejor la fuerza de חֵשֶׁב como banda tejida; «banda tejida» suena más preciso y neutral que «cinto». La corrección principal necesaria es rehacer las notas y sus anclajes para que el lector español no reciba información equivocada.
  glossary_alignment: No hay términos teológicos conflictivos en este versículo. «Efod» preserva correctamente el término técnico. «Anillos» para טַבְּעֹת, «hombreros» para כִתְפֹת y «unión» para מֶחְבַּרְתּוֹ están dentro de la racionalidad documentada. Ajusto «cinto tejido» a «banda tejida» para alinearlo mejor con el inglés auditado «skillfully woven band / woven waistband» sin introducir paráfrasis excesiva.
  issues:
  - severity: high
    issue: Las notas al pie están mal ancladas y no corresponden a los segmentos marcados en el texto.
    rationale: La nota [a] se coloca en «efod» pero comenta «su unión»; la nota [b] se coloca en «unión» pero da una alternativa sobre la banda/cinto. Esto incumple la disciplina requerida de anclar cada nota exactamente donde corresponde.
  - severity: medium
    issue: «Frente a su unión» es menos preciso que una formulación de oposición/correspondencia espacial.
    rationale: לְעֻמַּת marca alineación u oposición relativa. En español, «frente a» puede sonar más coloquial o menos exacto aquí; «opuesto a su unión» comunica mejor la relación espacial con el punto de unión.
  - severity: low
    issue: «Cinto tejido» puede sonar algo menos exacto que «banda tejida».
    rationale: חֵשֶׁב se refiere a la banda o pieza tejida de sujeción del efod. «Banda tejida» evita asociarlo demasiado con un cinturón común y encaja mejor con la explicación léxica auditada.
  revised_spanish_text: Hicieron dos anillos de oro y los pusieron sobre los dos hombreros del efod, abajo, en su parte frontal, opuesto a su unión[a], por encima de la banda tejida[b] del efod.
  revised_footnotes:
