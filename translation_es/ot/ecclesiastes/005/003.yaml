revisions:
- from: Cuando hagas un voto a Dios[a], no tardes en cumplirlo, porque no se complace en los necios[b]. Cumple lo que votes.
  to: Cuando hagas un voto a Dios[a], no tardes en cumplirlo, porque Dios no se complace en los necios[b]. Cumple lo que prometes en tu voto.
  rationale: Se corrige la ambigüedad moderna de «votar/votes» sustituyéndola por una formulación inequívoca de voto religioso. Se explicita «Dios» en la cláusula causal para reflejar mejor la decisión auditada en inglés y mejorar la claridad en español. También se pule la nota léxica para que suene natural y evite el falso sentido electoral.
