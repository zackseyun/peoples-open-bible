- from: ¡Escuchad,[a] cielos, y hablaré; y oiga la tierra las palabras de mi boca.
  to: Escuchen[a], cielos, y hablaré; y oiga la tierra las palabras de mi boca.
  rationale: Se reemplaza «Escuchad» por «Escuchen» para ajustarse al español neutral latinoamericano sin perder el tono solemne ni la fuerza del imperativo poético. También se actualiza la nota para mantener el mismo registro neutral. El resto del versículo puede conservarse porque transmite fielmente el hebreo y el razonamiento documentado en el POB inglés.
