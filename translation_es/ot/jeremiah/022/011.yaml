translation:
  language: es
  text: 'Porque así dice Yahvé acerca de Salum hijo de Josías, rey de Judá, quien reinó[a] en lugar de Josías su padre y salió de este lugar: no volverá allí nunca más.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que reinaba»; el hebreo tiene literalmente «el que reina», pero aquí el participio con «en lugar de» describe a Salum como el que reinó en sucesión de Josías su padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי כֹה אָמַר
  english_pob_choice: For thus says
  chosen_spanish: Porque así dice
  alternatives_spanish:
  - Porque así habla
  - Pues así dice
  lexicon: HALOT
  rationale: כִּי introduce la conexión explicativa con el discurso previo, por lo que «Porque» conserva la función de enlace. כֹה אָמַר es la fórmula profética habitual; «así dice» es la manera natural y fiel de reproducirla en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto en forma transliterada «Yahvé», conforme al criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - a
  - sobre
  lexicon: HALOT
  rationale: En este encabezado profético, אֶל introduce el tema del oráculo. «Acerca de» comunica bien ese valor de asunto u objeto del mensaje sin forzar un simple dativo de dirección.
- source_word: שַׁלֻּם
  english_pob_choice: Shallum
  chosen_spanish: Salum
  alternatives_spanish:
  - Sallum
  - Shallum
  lexicon: HALOT
  rationale: Se translitera el nombre propio a una forma española natural y reconocible. «Salum» evita una grafía demasiado anglicada y mantiene la identificación del personaje.
- source_word: בֶּן יֹאשִׁיָּהוּ
  english_pob_choice: son of Josiah
  chosen_spanish: hijo de Josías
  alternatives_spanish:
  - hijo de Josiah
  lexicon: HALOT
  rationale: La filiación se traduce de manera directa y formal. «Josías» es la forma española estable del nombre del rey.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Título real estándar y plenamente transparente en español; no requiere paráfrasis.
- source_word: הַמֹּלֵךְ תַּחַת
  english_pob_choice: who reigned in place of
  chosen_spanish: el que reinó en lugar de
  alternatives_spanish:
  - el que gobernó en lugar de
  - el que fue rey después de
  lexicon: HALOT
  rationale: El participio con תַּחַת expresa sustitución en el trono. «Reinó en lugar de» mantiene la fuerza sucesoria y evita suavizarla con «después de».
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su progenitor
  lexicon: HALOT
  rationale: Relación filial simple, mantenida sin adición interpretativa.
- source_word: אֲשֶׁר יָצָא מִן הַמָּקוֹם הַזֶּה
  english_pob_choice: who went out from this place
  chosen_spanish: el que salió de este lugar
  alternatives_spanish:
  - el que partió de este lugar
  - el que se fue de este lugar
  lexicon: HALOT
  rationale: יָצָא se conserva con «salió», una traducción cercana y natural. «De este lugar» mantiene la referencia espacial sin especificarla indebidamente.
- source_word: לֹא יָשׁוּב שָׁם עוֹד
  english_pob_choice: He shall never return there again
  chosen_spanish: no volverá allí nunca más
  alternatives_spanish:
  - no regresará allí jamás
  - no volverá allí otra vez
  lexicon: HALOT
  rationale: La negación con עוֹד expresa no-retorno permanente. «Nunca más» transmite bien esa fuerza; «allí» conserva el adverbio locativo del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la política del proyecto de usar el nombre divino en forma transliterada. «Yahvé» preserva la distinción entre el nombre propio y un título reverencial, y evita la sustitución por «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de אֶל tras la fórmula profética
  english_pob_reading: concerning
  chosen_spanish_reading: acerca de
  alternative_spanish_readings:
  - a
  - para
  rationale: Aquí אֶל no funciona como simple dirección física, sino como presentación del asunto del oráculo. «Acerca de» comunica ese valor sin perder la estructura profética del enunciado.
  doctrine_reference: Observación léxica del contexto profético en Jeremías 22:11
- issue: Fuerza de לֹא יָשׁוּב שָׁם עוֹד
  english_pob_reading: He shall never return there again
  chosen_spanish_reading: no volverá allí nunca más
  alternative_spanish_readings:
  - no regresará allí jamás
  - no volverá allí otra vez
  rationale: La combinación de negación + imperfecto + עוֹד expresa imposibilidad o permanencia de la no-retornada. «Nunca más» reproduce esa fuerza sin exagerar el registro.
  doctrine_reference: Uso aspectual y adverbial del hebreo bíblico
translation_notes:
  revision_awareness: El texto inglés auditado eliminó un segundo 'and who' por fluidez sin cambiar el contenido. En español se sigue esa misma economía sintáctica, manteniendo una sola cláusula relativa para el segundo participio hebreo y sin introducir una conjunción innecesaria.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se usa «Salum» como forma española breve y natural del nombre propio שַׁלֻּם.
  - Se conserva la distinción entre «reinar» y el simple hecho de «salir» del lugar, respetando la secuencia del hebreo.
  - «Nunca más» reproduce el valor de permanencia negativa de עוֹד en esta construcción.
