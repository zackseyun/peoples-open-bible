translation:
  language: es
  text: Y la hija de Tiro vendrá con un regalo[a]; los ricos del pueblo buscarán tu favor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una ofrenda» o «trayendo tributo»; el hebreo מִנְחָה puede referirse a un regalo, tributo u ofrenda según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tu rostro». En esta expresión hebrea, la idea es buscar el favor o la benevolencia de la persona a quien se habla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַת
  english_pob_choice: And the daughter
  chosen_spanish: Y la hija
  alternatives_spanish:
  - Y la hija de
  - También la hija de
  lexicon: HALOT
  rationale: El hebreo usa בַּת en una construcción personificada con un nombre de ciudad; en español, «hija de» conserva bien la imagen idiomática de pertenencia o representación. Se mantiene la coordinación con «Y» como continuación del verso anterior.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  - Tir
  lexicon: HALOT
  rationale: Se usa el topónimo bíblico habitual en español, «Tiro», para la ciudad fenicia. Es el equivalente estándar y claro en lectura bíblica.
- source_word: בְּמִנְחָה
  english_pob_choice: with a gift
  chosen_spanish: con un don
  alternatives_spanish:
  - con una ofrenda
  - con un regalo
  - trayendo tributo
  lexicon: HALOT
  rationale: מִנְחָה puede ser don, ofrenda o tributo. Aquí, en un contexto de homenaje cortesano, «don» conserva la amplitud semántica sin forzar un matiz exclusivamente cultual ni demasiado moderno.
- source_word: פָּנַיִךְ
  english_pob_choice: your favor
  chosen_spanish: tu favor
  alternatives_spanish:
  - tu rostro
  - tu presencia
  - tu gracia
  lexicon: HALOT
  rationale: La expresión literal es «tu rostro», pero el giro idiomático con חלה significa buscar el favor de alguien. «Tu favor» preserva el sentido del idioma hebreo en un español natural.
- source_word: יְחַלּוּ
  english_pob_choice: will seek
  chosen_spanish: buscarán
  alternatives_spanish:
  - rogarán
  - suplicarán
  - tratarán de aplacar
  lexicon: HALOT
  rationale: El piel de חלה en este contexto expresa pedir favor o procurar benevolencia. «Buscarán» funciona bien junto con «tu favor» y evita una perífrasis excesiva.
- source_word: עֲשִׁירֵי עָם
  english_pob_choice: the rich among the people
  chosen_spanish: los ricos del pueblo
  alternatives_spanish:
  - los ricos entre el pueblo
  - los poderosos del pueblo
  - los acaudalados del pueblo
  lexicon: HALOT
  rationale: La construcción en hebreo designa a los ricos de un pueblo. «Los ricos del pueblo» mantiene la concisión y la relación constructa sin añadir interpretaciones sociales que no están explícitas en el texto.
translation_notes:
  revision_awareness: 'Se siguió el sentido ya auditado en la POB inglesa: מִנְחָה como un presente/don en contexto cortesano y פָּנַיִךְ + יְחַלּוּ como un modismo para buscar favor. No se introdujeron cambios textuales relevantes respecto del análisis recibido; solo se ajustó la formulación al español natural y bíblico.'
  spanish_consistency_notes:
  - Se mantuvo «Y» inicial para reflejar la continuidad poética del hemistiquio.
  - Se prefirió «Tiro» sobre transliteración inglesa para la topografía bíblica española.
  - Se evitó «SEÑOR» o equivalentes porque el verso no contiene el tetragrámaton ni un sustantivo divino directo.
  - «Favor» conserva el valor idiomático de פָּנַיִךְ en combinación con יְחַלּוּ, sin perder la referencia literal explicada en nota.
