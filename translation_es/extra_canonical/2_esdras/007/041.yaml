    issue: La nota al pie [a] conserva una lectura previa que incluye 'lluvia' y 'rocío', elementos que pertenecen al versículo siguiente, no a 2 Esdras 7:41.
    rationale: La auditoría inglesa documenta explícitamente que esa redacción previa era un problema de división de versículos. Mantenerla como nota en español induce a error y no preserva fielmente el expediente fuente.
  - severity: low
    issue: La razón de la nota se etiqueta como 'textual_variant' cuando en realidad el expediente inglés la marca como 'previous_rendering'.
    rationale: No es una variante textual del latín fuente de este versículo, sino una traducción anterior desalineada. Conviene eliminar la nota en lugar de conservar una categoría equívoca.
