lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Entonces
  - Y luego
  lexicon: LSJ
  rationale: La partícula coordinante simplemente enlaza la acción con la anterior; en español, «Y» conserva la secuencia narrativa sin añadir matiz temporal no explícito en el griego.
- source_word: πορευθέντες
  english_pob_choice: after they went
  chosen_spanish: fueron
  alternatives_spanish:
  - habiendo ido
  - después de ir
  - cuando fueron
  lexicon: LSJ
  rationale: El participio aoristo indica una acción previa o concomitante respecto del verbo principal. En español, el verbo simple «fueron» mantiene la fluidez narrativa y evita una construcción excesivamente pesada, en línea con la revisión inglesa que coordinó la acción.
- source_word: συνεβουλεύσαντο
  english_pob_choice: they took counsel
  chosen_spanish: consultaron
  alternatives_spanish:
  - tomaron consejo
  - deliberaron
  - tuvieron consejo
  lexicon: LSJ
  rationale: El medio de συμβουλεύομαι expresa deliberación conjunta o consulta. «Consultaron» es natural en español y conserva el sentido de buscar consejo deliberadamente; «tomaron consejo» suena más arcaico.
- source_word: αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - a él
  - para él
  lexicon: LSJ
  rationale: El dativo en este contexto se entiende mejor como persona con quien se consulta. «Con él» reproduce la relación interpersonal indicada por el contexto y por la elección inglesa.
translation_notes:
  revision_awareness: La versión inglesa revisada abandonó la traducción temporal explícita «after they went» por una coordinación más natural («And they went and took counsel with him»). La propuesta española sigue esa misma solución, evitando sobrecargar el participio griego con una subordinación innecesaria.
  spanish_consistency_notes:
  - Se mantiene la narración breve y sobria del griego sin añadir sujetos o conectores interpretativos.
  - Se evita «tomaron consejo» por ser menos transparente para el lector moderno, aunque se reconoce como alternativa válida y más cercana al giro literal.
  - La nota conserva la alternativa literal del participio aoristo, como en el audit trail inglés.
