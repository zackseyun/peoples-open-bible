translation:
  language: es
  text: Y el sumo sacerdote, que es el principal entre sus hermanos, sobre cuya cabeza se ha derramado el aceite de la unción y que ha sido ordenado[a] para vestir las vestiduras, no dejará su cabeza desgreñada[b], ni rasgará sus vestidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cuya mano ha sido llenada», un modismo para ser ordenado o instalado en el servicio sacerdotal.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, no debe adoptar señales habituales de duelo, como llevar la cabeza o el cabello descuidados, ni rasgar sus vestidos.
    reason: cultural_note
lexical_decisions:
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest / the priest who is chief among his brothers
  chosen_spanish: el sacerdote principal
  alternatives_spanish:
  - el sumo sacerdote
  - el sacerdote mayor
  lexicon: HALOT
  rationale: La expresión hebrea designa el cargo superior dentro del sacerdocio. «Sacerdote principal» conserva la idea de primacía sin introducir de entrada una fórmula eclesiástica tradicional que podría ocultar la relación con el hebreo; «sumo sacerdote» sería idiomático, pero menos transparente para la auditoría.
- source_word: מֵאֶחָיו
  english_pob_choice: who is chief among his brothers
  chosen_spanish: de entre sus hermanos
  alternatives_spanish:
  - entre sus hermanos
  - sobre sus hermanos
  lexicon: HALOT
  rationale: La preposición con מן más «hermanos» aquí expresa pertenencia/comparación dentro del grupo sacerdotal. «De entre sus hermanos» conserva esa relación sin forzar una comparación explícita que el español no necesita repetir en el sintagma principal.
- source_word: יוּצַק עַל רֹאשׁוֹ שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: on whose head the anointing oil has been poured
  chosen_spanish: sobre cuya cabeza se ha derramado el aceite de la unción
  alternatives_spanish:
  - sobre cuya cabeza se ha vertido el aceite de la unción
  - sobre su cabeza ha sido derramado el aceite de la unción
  lexicon: HALOT
  rationale: «Derramado» comunica bien el pasivo del verbo y mantiene la imagen ritual concreta. «Aceite de la unción» es la forma natural en español para שֶׁמֶן הַמִּשְׁחָה.
- source_word: וּמִלֵּא אֶת יָדוֹ
  english_pob_choice: whose hand has been filled / who has been ordained
  chosen_spanish: que ha sido consagrado
  alternatives_spanish:
  - cuya mano ha sido llenada
  - que ha sido ordenado
  lexicon: HALOT
  rationale: El hebreo usa un modismo de instalación sacerdotal. En español, «ha sido consagrado» transmite la función ritual de manera clara y reverente; «cuya mano ha sido llenada» sería más literal, pero oscurecería la comprensión sin aportar suficiente ventaja para el lector general.
- source_word: לִלְבֹּשׁ אֶת הַבְּגָדִים
  english_pob_choice: to wear the garments
  chosen_spanish: para vestir las vestiduras
  alternatives_spanish:
  - para ponerse las vestiduras
  - para usar las vestiduras
  lexicon: HALOT
  rationale: «Vestir las vestiduras» conserva el enlace verbal con el texto hebreo y su tono cultual. «Vestiduras» resulta más natural y solemne en español que repetir «los vestidos».
- source_word: אֶת רֹאשׁוֹ לֹא יִפְרָע
  english_pob_choice: shall not let his head hang loose
  chosen_spanish: no dejará su cabeza desgreñada
  alternatives_spanish:
  - no dejará su cabeza suelta
  - no llevará el cabello desordenado
  lexicon: HALOT
  rationale: El verbo apunta a la desatención/descuidado del cabello o la cabeza en señal de duelo. «Desgreñada» conserva la fuerza de luto en un español comprensible; «cabeza suelta» sería más literal, pero menos claro.
- source_word: וּבְגָדָיו לֹא יִפְרֹם
  english_pob_choice: nor shall he tear his garments
  chosen_spanish: ni rasgará sus vestidos
  alternatives_spanish:
  - ni romperá sus vestidos
  - ni desgarrará sus vestidos
  lexicon: HALOT
  rationale: «Rasgar» es el equivalente natural para el gesto de duelo y mantiene el paralelo con la nota cultural del texto inglés. «Vestidos» sigue el registro tradicional del pasaje sin perder claridad.
theological_decisions:
- issue: Tratamiento del idiomismo de investidura sacerdotal מִלֵּא אֶת יָדוֹ
  english_pob_reading: Preserve the literal idiom in the main text as 'whose hand has been filled,' with the ordination sense noted in a footnote.
  chosen_spanish_reading: Integrar el sentido idiomático en «que ha sido consagrado», sin forzar la literalidad del modismo en el texto principal.
  alternative_spanish_readings:
  - cuya mano ha sido llenada
  - que ha sido ordenado
  rationale: En español, la calca literal no es transparente y puede distraer del sentido ritual. «Consagrado» comunica con fidelidad la instalación sacerdotal prevista por el hebreo y evita perder inteligibilidad en el texto principal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referencia a un cargo sacerdotal masculino y corporativo en מֵאֶחָיו
  english_pob_reading: brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - los demás sacerdotes
  rationale: El contexto es sacerdotal y masculino; mantener «hermanos» evita neutralizar la referencia del hebreo. En español, «de entre sus hermanos» conserva la relación de pertenencia y precedencia sin añadir una interpretación eclesial no explicitada.
  doctrine_reference: Translation philosophy §4
- issue: Señales de duelo prohibidas para el sacerdote principal
  english_pob_reading: must not adopt customary mourning signs such as leaving his hair/head unkempt or tearing his garments.
  chosen_spanish_reading: No debe manifestar luto ritual mediante la cabeza desgreñada ni el rasgado de los vestidos.
  alternative_spanish_readings:
  - No debe llevar el cabello desordenado ni romper sus vestidos
  - No debe hacer duelo visible con su cabeza ni con sus vestidos
  rationale: El texto regula conductas de duelo específicamente rituales. La formulación elegida mantiene esa restricción cultual sin volverla genérica o psicológica.
  doctrine_reference: Levítico 10:6; 21:10
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «the priest who is chief among his brothers» y «who has been ordained» en vez de una traducción más literal de «high priest» y del modismo «whose hand has been filled». En español se reflejó esa preferencia con «sacerdote principal» y «que ha sido consagrado», manteniendo la inteligibilidad y el valor ritual del texto. También se preservó la prohibición de duelo con una formulación natural y cultualmente precisa.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma general del proyecto; aquí no es necesario.
  - Se evitó «sumo sacerdote» en el texto principal para no imponer una fórmula tradicional donde el audit trail enfatiza la relación semántica con «chief among his brothers».
  - «Vestidos» se mantuvo en sentido cultual; no se normalizó a «ropa» para conservar el registro bíblico del pasaje.
  - Las notas se limitan a alternativas lexicales y una aclaración cultural; no introducen variantes textuales inexistentes en el hebreo base.
