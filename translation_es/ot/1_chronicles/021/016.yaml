review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro POB en la mayor parte del versículo: «alzó los ojos», «el ángel de Yahvé», «de pie entre la tierra y los cielos», «espada desenvainada», y «extendida sobre Jerusalén» reflejan bien el sentido fuente. También preserva correctamente «Yahvé» conforme a la política del proyecto. Sin embargo, la cláusula final no reproduce con precisión עַל־פְּנֵיהֶם, que es claramente plural («sobre sus rostros» / «rostro en tierra» en sentido colectivo), no singular.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, «cayeron sobre su rostro» suena forzado y poco natural en español contemporáneo, además de generar una discordancia semántica con el sujeto plural. «Cubiertos de saco» es comprensible, pero «cubiertos de tela áspera» no sería necesario; «cubiertos de saco» o «cubiertos con ropa de luto» podrían leerse mejor, aunque no es imprescindible cambiarlo. La reparación necesaria es la expresión final de postración.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; מַלְאַךְ -> «ángel» apropiadamente; שָּׁמַיִם -> «cielos» bien; no hay conflictos doctrinales serios. La única desalineación significativa está en la decisión para עַל־פְּנֵיהֶם, donde la explicación del «singular genérico» no está justificada por la fuente ni por el mejor español bíblico actual.'
  issues:
  - severity: high
    issue: «cayeron sobre su rostro» no refleja bien el plural hebreo עַל־פְּנֵיהֶם
    rationale: El hebreo indica que David y los ancianos cayeron «sobre sus rostros». En español, el singular «su rostro» con sujeto plural resulta poco natural aquí y reduce la precisión del texto fuente.
  - severity: medium
    issue: La justificación del singular genérico en la decisión léxica final no es sostenible
    rationale: No solo el hebreo es plural, sino que el español bíblico claro dispone de opciones naturales como «cayeron sobre sus rostros» o «cayeron rostro en tierra». La nota explicativa actual documenta una decisión deficiente.
  revised_spanish_text: David alzó los ojos y vio al ángel de Yahvé[a] de pie entre la tierra y los cielos, con su espada desenvainada en la mano, extendida sobre Jerusalén. Entonces David y los ancianos, cubiertos de saco, cayeron sobre sus rostros.
  revised_footnotes:
  - marker: a
    text: O «entre la tierra y el cielo». El hebreo dice «entre la tierra y los cielos».
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión final para reflejar fielmente el plural hebreo עַל־פְּנֵיהֶם y mejorar la naturalidad del español. El resto del versículo puede mantenerse, ya que transmite adecuadamente el sentido fuente y la terminología del proyecto.
