review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del arameo: secuencia narrativa («Entonces»), verbo de habla («habló»), complemento con עִם («con el rey»), vocativo regio, y la fórmula de bendición «vive para siempre». También conserva bien la nota sobre el valor optativo convencional de la expresión.'
  spanish_quality_summary: 'El español es claro y digno, pero «¡Oh rey!» suena menos natural en español bíblico actual que «¡Oh rey!»? En realidad el principal problema es el verbo en la fórmula: «vive para siempre» es comprensible, pero en español dirigido directamente a un rey suena más idiomático y elevado «¡rey, vive para siempre!» o mejor aún «¡Oh rey, vive para siempre!». Sin embargo, la colocación del vocativo dentro de la exclamación con coma mejora mucho la legibilidad. Además, el pie alternativo «Que el rey viva...» confirma que el sentido es optativo. Conviene ajustar la puntuación interna del vocativo.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas principales concuerdan con el rastro de auditoría inglés. La excepción menor es estilística: el vocativo español se beneficia de coma («¡Oh rey[a], vive para siempre!» o mejor «¡Oh rey, vive para siempre!» con la nota anclada en «rey»), manteniendo la fórmula real sin rigidez innecesaria.'
  issues:
  - severity: low
    issue: Puntuación del vocativo real
    rationale: 'En español, el vocativo debe ir separado por coma: «¡Oh rey[a], vive para siempre!». Esto mejora la naturalidad y claridad sin cambiar el sentido.'
