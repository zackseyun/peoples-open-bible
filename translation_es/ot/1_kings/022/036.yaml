translation:
  language: es
  text: 'Y pasó el grito[a] por el campamento al ponerse el sol, diciendo: «Cada hombre a su ciudad[b], y cada hombre a su tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el clamor», «el grito» o «la proclamación» pasó por el campamento. El hebreo רִנָּה suele referirse a un grito fuerte o aclamación resonante; aquí designa el anuncio que se difundió por todo el campamento.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «Cada hombre a su ciudad, y cada hombre a su tierra». Es una fórmula de licencia o dispersión después de la batalla.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: passed through
  chosen_spanish: pasó por
  alternatives_spanish:
  - se extendió por
  - recorrió
  lexicon: HALOT
  rationale: עבר aquí expresa el desplazamiento de la proclamación o grito a través del campamento. En español, «pasó por» conserva el movimiento concreto sin sobrecargar el estilo.
- source_word: הָרִנָּה
  english_pob_choice: a cry
  chosen_spanish: el grito
  alternatives_spanish:
  - la voz
  - la proclamación
  - el clamor
  lexicon: HALOT
  rationale: רִנָּה puede ser grito, clamor o proclamación. En este contexto militar de anuncio general, «grito» comunica bien el alcance sonoro y mantiene la tensión lexical sin fijarla indebidamente en una sola función.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: through the camp
  chosen_spanish: por el campamento
  alternatives_spanish:
  - en el campamento
  - a través del campamento
  lexicon: HALOT
  rationale: Con עבר, la frase no es solo locativa sino de difusión por todo el campamento. «Por el campamento» suena natural en español y conserva esa idea de propagación.
- source_word: כְּבֹא הַשֶּׁמֶשׁ
  english_pob_choice: at sunset
  chosen_spanish: al ponerse el sol
  alternatives_spanish:
  - al atardecer
  - cuando se puso el sol
  - cuando el sol se ponía
  lexicon: HALOT
  rationale: Es un hebraísmo idiomático para el momento del ocaso. «Al ponerse el sol» es idiomático, claro y suficientemente literal.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decía
  - con estas palabras
  lexicon: HALOT
  rationale: Introduce el contenido del anuncio; «diciendo» es la equivalencia directa y transparente.
- source_word: אִישׁ ... וְאִישׁ
  english_pob_choice: Each man ... and each man
  chosen_spanish: Cada hombre ... y cada hombre
  alternatives_spanish:
  - Cada uno ... y cada uno
  - Todo hombre ... y todo hombre
  lexicon: HALOT
  rationale: Se conserva la repetición distributiva de אִישׁ. Aunque podría neutralizarse, «hombre» refleja el lenguaje militar y formulaico del pasaje.
- source_word: אֶל עִירוֹ
  english_pob_choice: to his city
  chosen_spanish: a su ciudad
  alternatives_spanish:
  - a su pueblo
  - a su villa
  lexicon: HALOT
  rationale: עִיר significa normalmente «ciudad». La construcción distributiva se mantiene de forma directa y sobria.
- source_word: וְאִישׁ אֶל אַרְצוֹ
  english_pob_choice: and each man to his land
  chosen_spanish: y cada hombre a su tierra
  alternatives_spanish:
  - y cada hombre a su país
  - y cada hombre a su patria
  lexicon: HALOT
  rationale: אֶרֶץ aquí señala la tierra o territorio de origen, no necesariamente un estado-nación. «Tierra» preserva la amplitud del término y la paralela formulación con «ciudad».
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el audit trail inglés; no hubo revisiones aplicadas en el paso anterior, y la formulación española busca reproducir el valor idiomático de la escena sin perder la fuerza distributiva ni el matiz de רִנָּה.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» sin aparecer en este versículo; no hay decisiones teológicas adicionales.
  - Se eligió un registro sobrio y bíblico, evitando arcaísmos innecesarios.
  - La forma distributiva «cada hombre» conserva el paralelismo del hebreo y la referencia militar implícita.
