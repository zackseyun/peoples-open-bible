review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido general del hebreo: Abraham y Sara eran de edad avanzada, y el modismo sobre la menstruación ya no aplicaba a Sara. Sin embargo, dos elecciones atenúan o desvían innecesariamente la forma fuente/auditoría inglesa: «viejos» suena poco digno en español bíblico, y «la costumbre de las mujeres» se aparta más de lo necesario de אֹרַח («camino/manera/curso») y del POB inglés «the way of women».'
  spanish_quality_summary: La frase es comprensible, pero puede mejorarse en dignidad y naturalidad eclesial. «Eran ancianos» lee mejor que «eran viejos». «El camino de las mujeres» conserva mejor el modismo hebreo; con nota aclaratoria sigue siendo inteligible. «Avanzados en días» es auditable aunque algo rígido; aquí puede mantenerse por fidelidad al proyecto.
  glossary_alignment: No hay términos del glosario mayor en juego. La revisión propuesta mejora la alineación con la filosofía POB de conservar imaginería/idioma fuente cuando sigue siendo entendible en español, apoyándose en nota para el eufemismo menstrual.
  issues:
  - severity: medium
    issue: «viejos» resulta poco digno y menos adecuado para el registro bíblico en español.
    rationale: Aunque semánticamente posible para זְקֵנִים, en español general puede sonar brusco o despectivo. «Ancianos» conserva el sentido de edad avanzada con mejor tono eclesial y legibilidad.
  - severity: medium
    issue: «la costumbre de las mujeres» se aparta del sustantivo hebreo אֹרַח y de la auditoría POB «the way of women».
    rationale: El hebreo usa un modismo pudoroso construido sobre «camino/manera». «Costumbre» interpreta el sentido, pero reduce la transparencia léxica. Dado que el POB inglés preserva el modismo en el texto principal y lo explica en nota, el español debería hacer lo mismo.
  - severity: low
    issue: La nota al pie tiene comillas y prefijo algo torpes.
    rationale: 'Puede pulirse a un español más natural y limpio sin cambiar el contenido: «Hebreo, “el camino de las mujeres”, un modismo pudoroso…».'
  revised_spanish_text: Ahora bien, Abraham y Sara eran ancianos, avanzados en días; había cesado para Sara el camino[a] de las mujeres.
  revised_footnotes:
