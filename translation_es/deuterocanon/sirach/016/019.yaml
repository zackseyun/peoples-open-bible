revisions:
- from: Hasta los picos de los montes y los cimientos del mundo[a]—cuando él los mira, tiemblan.
  to: Hasta los picos de los montes y los cimientos del mundo[a]—cuando él los contempla, tiemblan.
  rationale: Se hizo una reparación mínima para mejorar la naturalidad y la fidelidad sintáctica del español, sustituyendo «mira» por «contempla». Así se conserva el sujeto implícito («él»), se evita una referencia pronominal áspera, y no se altera el sentido documentado por el hebreo y el paralelo griego. La nota textual se mantiene igual, con leve normalización tipográfica.
