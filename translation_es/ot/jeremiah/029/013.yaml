translation:
  language: es
  text: Ustedes me buscarán y me encontrarán[a], cuando me busquen con todo su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque me buscarán y me encontrarán, si me buscan con todo su corazón». La conjunción hebrea כי puede entenderse de varias maneras relacionadas aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִקַּשְׁתֶּם
  english_pob_choice: you will seek
  chosen_spanish: me buscarán
  alternatives_spanish:
  - me buscarán con diligencia
  - me buscarán
  lexicon: HALOT
  rationale: El piel futuro con prefijo conjuntivo expresa una acción futura de búsqueda. En español, «buscar» comunica bien la intención deliberada sin sobrecargar el texto. Mantengo el objeto directo «me» para reflejar אֹתִי.
- source_word: אֹתִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El pronombre de primera persona singular como objeto directo se expresa naturalmente con «me»; «a mí» sería más enfático y no necesario aquí.
- source_word: וּמְצָאתֶם
  english_pob_choice: and find me
  chosen_spanish: y me encontrarán
  alternatives_spanish:
  - y me hallarán
  lexicon: HALOT
  rationale: El qal perfecto con valor prospectivo continúa la promesa futura. «Encontrar» es el equivalente más natural y transparente en español; «hallar» sería válido pero menos neutro hoy.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - pues
  - si
  lexicon: HALOT
  rationale: Aquí כִּי introduce la circunstancia o condición en que ocurre el hallazgo. «Cuando» mantiene la relación lógica de manera fluida en español, como en la lectura principal del POB inglés.
- source_word: תִדְרְשֻׁנִי
  english_pob_choice: you seek me
  chosen_spanish: me busquen
  alternatives_spanish:
  - me inquieran
  - me busquen diligentemente
  lexicon: HALOT
  rationale: דרשׁ puede abarcar buscar e inquirir, pero en este contexto devocional «buscar» es la opción más clara y natural. Repite el campo semántico de búsqueda sin perder la intensidad del verbo hebreo.
- source_word: בְּכָל
  english_pob_choice: with all
  chosen_spanish: con todo
  alternatives_spanish:
  - con la totalidad de
  - de todo
  lexicon: HALOT
  rationale: La combinación preposicional expresa totalidad e integridad de orientación interior. «Con todo» reproduce de forma idiomática el alcance total del hebreo.
- source_word: לְבַבְכֶם
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su interior
  - su mente y corazón
  lexicon: HALOT
  rationale: לְבָב designa el centro interior de pensamiento, voluntad y afecto. En español bíblico contemporáneo «corazón» conserva esa amplitud. Como el pronombre es plural, «su» evita una lectura meramente individual y conserva el valor colectivo del hebreo.
theological_decisions:
- issue: Relación entre buscar y encontrar a Dios
  english_pob_reading: The verse states a genuine promise that finding follows wholehearted seeking, without specifying a broader doctrinal mechanism of grace or human ability.
  chosen_spanish_reading: 'El versículo presenta una promesa real: al buscar a Yahvé con todo el corazón, se lo encuentra, sin explicar aquí el mecanismo teológico de esa búsqueda o del hallazgo.'
  alternative_spanish_readings:
  - El texto enfatiza principalmente la responsabilidad humana.
  - El texto puede leerse dentro de una teología más amplia de la gracia que capacita la búsqueda.
  rationale: Conviene preservar la tensión teológica del hebreo y del POB inglés sin resolverla en una dirección doctrinal particular. El español debe conservar la promesa y su condición, no ampliar indebidamente el contenido.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide sustancialmente con el POB inglés revisado, manteniendo la alternancia semántica de כִּי y la duplicación de la búsqueda/finalidad sin añadir explicaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino según la terminología del proyecto.
  - Se prefirió «buscar» / «encontrar» como pares semánticos naturales y consistentes con el hebreo.
  - Se mantuvo «corazón» para לְבָב por su amplitud bíblica en español.
  - El pronombre plural implícito en hebreo se reflejó con verbos en plural y el posesivo «su» para la totalidad colectiva.
