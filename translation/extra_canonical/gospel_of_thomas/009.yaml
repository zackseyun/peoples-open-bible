  english_text: 'Jesus said, “Look: a sower went out, he filled his hand, and he threw.
    Some indeed fell on the path; the birds came and pecked them up. Others fell on
    the rock; they did not take root in the soil, and they did not set an ear up toward
    the sky. Others fell on the thorns; they choked the sprout, and a worm ate them.
    And others fell on the good soil and it gave good fruit up toward the sky: it
    yielded sixty per measure and a hundred twenty per measure.”'
  previous_translation_block:
    text: 'Jesus said, “Look: a sower went out, he filled his hand, and he threw.
      Some indeed fell on the path; the birds came and pecked them up. Others fell
      on the rock; they did not take root in the soil, and they did not set an ear
      up toward the sky. Others fell on the thorns; they choked the sprout, and a
      worm ate them. And others fell on the good soil and it gave good fruit up toward
      the sky: it yielded sixty per measure and a hundred twenty per measure.”'
    philosophy: optimal-equivalence
    footnotes:
    - marker: '1'
      text: ‘Filled his hand’ is a Coptic idiom for taking a handful of seed.
      reason: cultural_note
    - marker: '2'
      text: The verb rendered ‘pecked them up’ (ⲕⲱⲧ) literally means ‘pick up, gather’;
        with birds and seed the image is pecking up fallen grain.
      reason: lexical_alternative
    - marker: '3'
      text: ‘Set an ear up toward the sky’ preserves the concrete agrarian image (ⲧⲉⲩⲉ
        = ear/head of grain). Alternatives include ‘sprout upward’ or ‘produce a head
        of grain.’
      reason: lexical_alternative
    - marker: '4'
      text: The phrase ‘a worm ate them’ is a Thomasine detail absent from the Synoptic
        parable.
      reason: cross_reference
    - marker: '5'
      text: The Coptic text simply lists the figures ‘sixty … a hundred twenty’; ‘per
        measure’ is supplied for English clarity and is not an attempt to harmonize
        with the Synoptic ‘thirty/sixty/hundred.’
      reason: cultural_note
    - marker: '6'
      text: The noun ⲡϭⲣⲟϭ is rendered ‘sprout’; other possibilities are ‘shoot,’
        ‘crop,’ or ‘seedling.’ Context favors an early-stage plant being choked by
        thorns.
      reason: lexical_alternative
