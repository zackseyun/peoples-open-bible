translation:
  language: es
  text: No teman[a], y no tiemblen. ¿No les hice oír[b] desde hace mucho y lo declaré? Y ustedes son mis testigos. ¿Hay un Dios fuera de mí? No hay Roca[c]; no conozco ninguna otra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No teman, y no se aterroricen». El segundo verbo es raro y puede intensificar la primera prohibición.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿No les hice oír y lo declaré desde antiguo?»'
    reason: lexical_alternative
  - marker: c
    text: «Roca» es un título para Dios que enfatiza su estabilidad y confiabilidad; alternativamente, «roca».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְחֲדוּ
  english_pob_choice: fear
  chosen_spanish: temas
  alternatives_spanish:
  - tengas miedo
  - temáis
  lexicon: HALOT
  rationale: El hebreo expresa prohibición de miedo/dread. En español, «No temas» es natural, solemne y mantiene la fuerza de la prohibición sin mecanicismo.
- source_word: תִּרְהוּ
  english_pob_choice: tremble
  chosen_spanish: te turbes
  alternatives_spanish:
  - tiembles
  - te aterres
  lexicon: HALOT
  rationale: La forma es rara y probablemente intensifica la primera prohibición. «Te turbes» conserva una segunda cláusula paralela con fuerza emocional, sin sobretraducir a una reacción física que el hebreo no obliga.
- source_word: מֵאָז
  english_pob_choice: long ago
  chosen_spanish: desde hace mucho
  alternatives_spanish:
  - desde antiguo
  - desde hace tiempo
  lexicon: HALOT
  rationale: La frase indica anterioridad remota respecto al momento del habla. «Desde hace mucho» comunica bien el valor retrospectivo en español actual y mantiene el tono de apelación a revelación previa.
- source_word: הִשְׁמַעְתִּיךָ
  english_pob_choice: made you hear
  chosen_spanish: te hice oír
  alternatives_spanish:
  - te hice escuchar
  - te hice saber
  lexicon: HALOT
  rationale: El causativo de שמע debe conservarse; «te hice oír» refleja con transparencia la idea de causar la recepción del mensaje, tal como el POB inglés preserva «made you hear».
- source_word: וְהִגַּדְתִּי
  english_pob_choice: declared it
  chosen_spanish: te lo declaré
  alternatives_spanish:
  - lo declaré
  - te lo anuncié
  lexicon: HALOT
  rationale: נגד expresa declarar/proclamar. En español, el objeto pronominal retoma el contenido comunicado y enlaza con la cláusula anterior; «declaré» mantiene el tono formal y proclamativo.
- source_word: עֵדַי
  english_pob_choice: my witnesses
  chosen_spanish: mis testigos
  alternatives_spanish:
  - mis testigos legales
  - mi testimonio
  lexicon: HALOT
  rationale: El sustantivo es plural con sufijo de primera persona. «Mis testigos» conserva el sentido forense/testimonial y la relación con Dios, sin añadir tecnicismos innecesarios.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - divinidad
  lexicon: HALOT
  rationale: En la pregunta retórica sobre la unicidad divina, «Dios» con mayúscula comunica el referente único del texto y evita rebajar el sentido a una categoría genérica.
- source_word: מִבַּלְעָדַי
  english_pob_choice: besides me
  chosen_spanish: fuera de mí
  alternatives_spanish:
  - además de mí
  - aparte de mí
  lexicon: HALOT
  rationale: La expresión marca exclusión. «Fuera de mí» es fiel y idiomático en español, y conserva la fuerza de la exclusividad divina.
- source_word: צוּר
  english_pob_choice: Rock
  chosen_spanish: Roca
  alternatives_spanish:
  - roca
  lexicon: HALOT
  rationale: צוּר funciona aquí como título metafórico de Dios. Capitalizar «Roca» ayuda a percibir su valor titular, como en el POB inglés con «Rock».
- source_word: בַּל יָדָעְתִּי
  english_pob_choice: I know of none
  chosen_spanish: no conozco ninguna
  alternatives_spanish:
  - no conozco ninguna otra
  - no conozco a ninguna
  lexicon: HALOT
  rationale: La negación enfática debe expresar exclusión total. «No conozco ninguna» reproduce con naturalidad la fuerza absoluta del hebreo y permite que «Roca» siga entendida como título.
theological_decisions:
- issue: Exclusividad divina en la pregunta retórica
  english_pob_reading: Render the verse as an absolute denial of any deity besides the God of Israel.
  chosen_spanish_reading: La versión española presenta la pregunta y la negación final como una exclusión absoluta de cualquier otro dios o roca divina aparte de Yahvé.
  alternative_spanish_readings:
  - ¿Hay algún dios fuera de mí?
  - No hay roca fuera de mí; no conozco ninguna.
  rationale: El hebreo formula una pregunta retórica seguida de una negación total. La traducción mantiene la estructura y el alcance exclusivista sin añadir doctrina ajena al texto.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1, §6
- issue: Tratamiento de צוּר como título divino
  english_pob_reading: Capitalize 'Rock' as a title for God.
  chosen_spanish_reading: «Roca» se capitaliza para señalar su función titul ar/metafórica aplicada a Dios.
  alternative_spanish_readings:
  - roca
  - Roca
  rationale: En Isaías, צוּר puede funcionar como apelativo teológico para Dios. La mayúscula ayuda a distinguir el título del sustantivo común, preservando la imagen bíblica de firmeza y refugio.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se revisó el pasaje frente al audit trail inglés y el hebreo WLC. La decisión principal fue mantener el paralelismo imperativo con una segunda prohibición en español natural («ni te turbes») y conservar la exclusividad divina con una pregunta retórica y una negación final que no atenúan el hebreo. No se identificaron revisiones pendientes en el pasaje fuente.
  spanish_consistency_notes:
  - Se mantiene «Dios» con mayúscula para el referente único del texto, coherente con el tratamiento del hebreo אֱלוֹהַּ en contexto monoteísta.
  - «Roca» se capitaliza por consistencia con el uso titular detectado en el audit trail inglés.
  - La frase verbal «te hice oír» conserva el causativo hebreo sin desplazarlo a un simple «anuncié».
  - «Mis testigos» preserva el plural forense de עֵדַי y el tono legal-testimonial de Isaías.
  - Se evita «SEÑOR» para יהוה porque este verso no contiene el Tetragrámaton; la exclusividad se expresa por contexto, no por sustitución tipográfica.
