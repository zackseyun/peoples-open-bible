translation:
  language: es
  text: Cuando el rey David oyó todas estas cosas[a], se enojó mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «y el rey David oyó todas estas cosas, y ardió para él mucho», es decir: «su ira ardió mucho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/מֶּלֶךְ
  english_pob_choice: When King
  chosen_spanish: Cuando el rey
  alternatives_spanish:
  - Y el rey
  lexicon: HALOT
  rationale: El hebreo puede funcionar aquí como transición narrativa. En español, «Cuando el rey» reproduce bien el arranque temporal y mantiene naturalidad; «Y el rey» también es posible, pero suena menos fluido como inicio de la cláusula.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: Nombre propio estándar
  rationale: Se conserva el nombre propio en su forma habitual en español.
- source_word: שָׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró de
  lexicon: HALOT
  rationale: Aquí el verbo expresa recepción de información. «Oyó» mantiene el sentido básico de oír/enterarse sin introducir una paráfrasis más explícita que el hebreo no requiere.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todos estos asuntos
  - todas estas cosas
  lexicon: HALOT
  rationale: דְּבָרִים puede abarcar «cosas», «asuntos» o «palabras». Dado que el contexto inmediato relata acontecimientos, «cosas» conserva la amplitud del término y sigue de cerca la decisión inglesa sin forzar un término más técnico.
- source_word: וַיִּחַר ל֖וֹ מְאֹד
  english_pob_choice: he was very angry
  chosen_spanish: se enojó mucho
  alternatives_spanish:
  - ardió de ira
  - su ira ardió mucho
  lexicon: HALOT
  rationale: El hebreo usa la idiomática idea de «arder» de ira. En español, «se enojó mucho» comunica el sentido idiomático de forma clara y digna; las alternativas más literales conservan la imagen de ardor, pero suenan menos naturales en el texto principal.
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura aprobada en inglés y conserva la misma nota de alternativa literal, ajustada a la sintaxis y el valor idiomático del hebreo. No se requieren revisiones doctrinales ni variantes textuales adicionales para este versículo.
  spanish_consistency_notes:
  - Se mantiene «rey» para מֶלֶךְ, coherente con la referencia al monarca en narrativa histórica.
  - Se usa «oyó» en sentido de recibir noticia, acorde con la decisión inglesa «heard».
  - Se opta por «se enojó mucho» como equivalente idiomático de חרה לו מְאֹד, reservando la literalidad de «ardió» para la nota.
  - La nota al pie conserva la tensión lexical entre la traducción idiomática y la forma más literal del hebreo.
