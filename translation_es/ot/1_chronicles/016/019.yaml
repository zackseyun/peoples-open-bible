lexical_decisions:
- source_word: בִּהְיוֹתְכֶם
  english_pob_choice: when you were
  chosen_spanish: cuando ustedes eran
  alternatives_spanish:
  - cuando eran
  - al estar ustedes
  - mientras eran
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo ב introduce una cláusula temporal. «Cuando ustedes eran» conserva el valor temporal de manera natural en español y mantiene el sujeto explícito del sufijo de 2ª plural.
- source_word: מְתֵי מִסְפָּר
  english_pob_choice: few in number
  chosen_spanish: pocos en número
  alternatives_spanish:
  - de pocos números
  - un pequeño número
  - contables en número
  lexicon: HALOT
  rationale: La expresión hebrea idiomática señala una cantidad pequeña y contable. «Pocos en número» refleja bien el sentido sin sonar forzado en español.
- source_word: כִּמְעַט
  english_pob_choice: very few
  chosen_spanish: muy pocos
  alternatives_spanish:
  - poquísimos
  - casi nada
  - apenas pocos
  lexicon: HALOT
  rationale: El intensificador כִּמְעַט refuerza la pequeñez del grupo. «Muy pocos» preserva esa intensificación de forma clara y fiel.
- source_word: וְגָרִים
  english_pob_choice: and sojourners
  chosen_spanish: y forasteros
  alternatives_spanish:
  - y extranjeros
  - y residentes temporales
  - y peregrinos
  lexicon: HALOT
  rationale: El participio de גור expresa la condición de vivir como ajenos o no instalados de manera permanente. «Forasteros» comunica esa condición social de manera natural; no se eligió «peregrinos» para evitar una carga devocional no exigida por el hebreo.
- source_word: בָּהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en eso
  - allí
  - en esa tierra
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la tierra mencionada en el contexto. En español, «ella» mantiene la referencia pronominal al sustantivo implícito o previo y respeta el género del referente.
translation_notes:
  revision_awareness: El texto español sigue de cerca el trazado aprobado del inglés POB y conserva la intensificación del hebreo en כִּמְעַט mediante una nota alternativa, sin añadir matices no presentes en el original.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
  - «Forasteros» se prefirió a «extranjeros» por fluidez y para evitar una posible lectura política moderna.
  - «En ella» conserva la referencia a la tierra con el pronombre femenino, coherente con el hebreo y con el contexto inmediato.
