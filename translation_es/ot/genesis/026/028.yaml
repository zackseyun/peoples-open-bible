translation:
  language: es
  text: 'Y dijeron: «Hemos visto claramente que Yahvé ha estado contigo. Entonces dijimos: “Por favor, que haya un juramento[a] entre nosotros, entre tú y nosotros[b], y hagamos un pacto contigo”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «un juramento con maldición», porque el término hebreo puede denotar un juramento acompañado de una maldición invocada en caso de violación.
    reason: lexical_alternative
  - marker: b
    text: 'O: «entre nosotros, entre nosotros y tú».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Y les dijeron
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva se reproduce de manera natural con una coordinación simple en español. ‘Y dijeron’ conserva el avance del relato sin añadir interpretación temporal innecesaria.
- source_word: רָאוֹ רָאִינוּ
  english_pob_choice: We have clearly seen
  chosen_spanish: Hemos visto claramente
  alternatives_spanish:
  - Ciertamente hemos visto
  - Hemos visto con claridad
  - Hemos visto sin duda
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + verbo finito intensifica la afirmación. ‘Hemos visto claramente’ comunica bien la fuerza enfática en español moderno y mantiene el peso del testimonio.
- source_word: כִּי הָיָה יְהוָה עִמָּךְ
  english_pob_choice: that Yahweh has been with you
  chosen_spanish: que Yahvé ha estado contigo
  alternatives_spanish:
  - que Yahvé estaba contigo
  - que Yahvé está contigo
  lexicon: HALOT
  rationale: ‘Ha estado’ refleja el estado pasado con relevancia presente implícita en la observación de los hablantes. ‘Yahvé’ preserva el nombre divino en lugar de sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre propio divino como ‘Yahvé’, siguiendo la política del proyecto de no ocultar el Tetragrámaton tras un sustituto titular.
- source_word: וַנֹּאמֶר
  english_pob_choice: So we said
  chosen_spanish: Entonces dijimos
  alternatives_spanish:
  - Y dijimos
  - Así que dijimos
  lexicon: HALOT
  rationale: La partícula discursiva introduce la conclusión de su razonamiento. ‘Entonces’ expresa bien el paso inferencial y suena natural en español.
- source_word: תְּהִי נָא
  english_pob_choice: Please let there be
  chosen_spanish: Por favor, haya
  alternatives_spanish:
  - Por favor, que haya
  - Que haya, por favor
  lexicon: HALOT
  rationale: El jussivo con נָא pide de forma cortés. ‘Por favor, haya’ conserva el matiz de súplica sin agregar elementos ajenos.
- source_word: אָלָה
  english_pob_choice: an oath
  chosen_spanish: un juramento
  alternatives_spanish:
  - una maldición-juramento
  - un pacto jurado
  lexicon: HALOT
  rationale: En este contexto diplomático el término puede traducirse de forma directa como ‘juramento’. Se reserva la posibilidad de un matiz maledictivo en la nota, porque el hebreo puede implicar un juramento acompañado de sanción.
- source_word: בֵּינוֹתֵינוּ בֵּינֵינוּ וּבֵינֶךָ
  english_pob_choice: between us, between you and us
  chosen_spanish: entre nosotros, entre tú y nosotros
  alternatives_spanish:
  - entre nosotros y tú
  - entre ambas partes, entre tú y nosotros
  lexicon: HALOT
  rationale: Se conserva la reiteración hebrea sin aplanarla del todo. ‘Entre nosotros, entre tú y nosotros’ reproduce la estructura bilateral y la solemnidad del pedido, aunque en español la primera frase ya insinúe la segunda.
- source_word: וְנִכְרְתָה בְרִית
  english_pob_choice: and let us make a covenant
  chosen_spanish: y hagamos un pacto
  alternatives_spanish:
  - y cortemos un pacto
  - y celebremos un pacto
  lexicon: HALOT
  rationale: La expresión literal ‘cortar un pacto’ puede sonar forzada en español. ‘Hagamos un pacto’ comunica el sentido idiomático con claridad y dignidad, sin perder el carácter formal del tratado.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - con vosotros
  lexicon: HALOT
  rationale: El pronombre singular en segunda persona se expresa naturalmente como ‘contigo’. Mantiene la dirección personal del acuerdo con Isaac.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de reconocimiento gentil
  english_pob_reading: Yahweh has been with you
  chosen_spanish_reading: Yahvé ha estado contigo
  alternative_spanish_readings:
  - Yahvé estaba contigo
  - Yahvé está contigo
  rationale: El texto atribuye el éxito de Isaac a la presencia activa de Yahvé. Se preserva el nombre propio divino en español y se usa un tiempo verbal que mantiene la observación hecha por los hablantes sin reducirla a una mera descripción estática.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אָלָה como juramento con posible fuerza imprecatoria
  english_pob_reading: an oath
  chosen_spanish_reading: un juramento
  alternative_spanish_readings:
  - una maldición-juramento
  - un juramento con sanción
  rationale: La opción principal ‘juramento’ es la más clara para el lector español. Sin embargo, el hebreo admite una fuerza más fuerte, asociada a una autoimprecación o sanción por violación; por eso se documenta la alternativa sin imponerla en el texto principal.
  doctrine_reference: HALOT; preservación de tensión léxica del hebreo
- issue: Fórmula de alianza וְנִכְרְתָה בְרִית
  english_pob_reading: let us make a covenant
  chosen_spanish_reading: hagamos un pacto
  alternative_spanish_readings:
  - cortemos un pacto
  - celebremos un pacto
  rationale: La metáfora hebrea de ‘cortar’ un pacto es importante, pero en español la forma idiomática más natural y transparente es ‘hacer un pacto’. Se conserva el valor solemne y contractual del acto sin imponer un calco oscuro.
  doctrine_reference: HALOT; uso bíblico del lenguaje de pacto
translation_notes:
  revision_awareness: 'La redacción española sigue el sentido revisado más reciente del audit trail inglés: conserva la repetición formal de ‘entre… entre…’ en lugar de una paráfrasis más libre, y mantiene el énfasis de ‘we have clearly seen’ con una expresión española natural. También respeta la decisión doctrinal de rendir יְהוָה como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma estándar para יְהוָה.
  - Se usa ‘pacto’ para בְרִית, coherente con el vocabulario bíblico del proyecto.
  - Se prefiere ‘juramento’ para אָלָה en el texto principal, dejando el matiz imprecatorio en nota.
  - La repetición relacional ‘entre nosotros, entre tú y nosotros’ conserva la textura semítica del hebreo sin volverla extraña en español.
