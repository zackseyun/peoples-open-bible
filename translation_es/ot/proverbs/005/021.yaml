    changes_summary: Changed 'examines' to 'watches' to better reflect the Hebrew verb meaning of observing/keeping watch over, while preserving formal, natural English.
translation:
  language: es
  text: Porque los caminos de un hombre están delante de los ojos de Yahvé[a], y él observa todas sus sendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pondera todas sus sendas'. El verbo hebreo puede implicar medir, valorar o evaluar un curso de vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del dicho anterior de forma natural en español, conservando la relación explicativa del proverbio.
- source_word: נֹכַח עֵינֵי יְהוָה
  english_pob_choice: before the eyes of Yahweh
  chosen_spanish: delante de los ojos de Yahvé
  alternatives_spanish:
  - ante los ojos de Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Mantiene la imagen espacial-metafórica de total visibilidad, con una fórmula idiomática clara en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Sigue el término proyectual para el nombre divino, sin ocultarlo con un equivalente genérico.
- source_word: דַּרְכֵי אִישׁ
  english_pob_choice: a man's ways
  chosen_spanish: los caminos de un hombre
  alternatives_spanish:
  - los caminos del hombre
  - los caminos de una persona
  lexicon: HALOT
  rationale: Conserva el singular genérico masculino del hebreo y la imagen de 'ways' como caminos o conducta.
- source_word: וְכָל מַעְגְּלֹתָיו
  english_pob_choice: and all his paths
  chosen_spanish: todas sus sendas
  alternatives_spanish:
  - todos sus caminos
  - todas sus veredas
  lexicon: HALOT
  rationale: '''Sendas'' preserva el paralelismo poético con una leve variación léxica respecto de ''caminos'', manteniendo el sentido de trayectorias o conductas.'
- source_word: מְפַלֵּס
  english_pob_choice: he watches
  chosen_spanish: observa
  alternatives_spanish:
  - vigila
  - examina
  - pondera
  lexicon: HALOT
  rationale: Refleja la idea de observación atenta y evaluativa sin forzar un término técnico; conserva la revisión inglesa que prefirió 'watches' frente a 'examines'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto en lugar de sustituirlo por una máscara litúrgica, conforme al criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sujeto genérico masculino אִישׁ
  english_pob_reading: a man's ways
  chosen_spanish_reading: los caminos de un hombre
  alternative_spanish_readings:
  - los caminos de una persona
  - los caminos humanos
  rationale: Se preserva la forma masculina singular del hebreo con fuerza representativa, en vez de neutralizarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El audit trail inglés revisó la cláusula final de 'examines' a 'watches' para acercarse mejor al matiz de observación/atención del verbo hebreo. La versión española refleja esa revisión con 'observa', y conserva la alternativa interpretativa 'pondera' en nota para no perder la tensión lexical del original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva el paralelismo poético entre 'caminos' y 'sendas'.
  - La nota al pie está anclada en [a] junto a 'Yahvé' para reflejar la alternativa verbal del hebreo sin romper la fluidez del versículo.
  - No se usa 'SEÑOR' como sustituto del nombre divino.
  - '''Hombre'' mantiene el valor genérico representativo del hebreo.'
