  text: וַ/יְהִ֣י מִֽ/מָּחֳרָ֗ת וַ/יָּ֨שֶׂם שָׁא֣וּל אֶת הָ/עָם֮ שְׁלֹשָׁ֣ה רָאשִׁים֒ וַ/יָּבֹ֤אוּ בְ/תוֹךְ הַֽ/מַּחֲנֶה֙ בְּ/אַשְׁמֹ֣רֶת הַ/בֹּ֔קֶר וַ/יַּכּ֥וּ אֶת עַמּ֖וֹן עַד חֹ֣ם הַ/יּ֑וֹם וַ/יְהִ֤י הַ/נִּשְׁאָרִים֙ וַ/יָּפֻ֔צוּ וְ/לֹ֥א נִשְׁאֲרוּ בָ֖/ם שְׁנַ֥יִם יָֽחַד־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/011/011.yaml
  text: And it happened on the next day that Saul set the people in three groups[a], and they came into the midst of the camp during the morning watch and struck Ammon until the heat of the day. And it happened that the survivors were scattered[c][b], so that no two of them were left together.
  footnotes:
  - marker: a
    text: Hebrew 'three heads,' an idiom for three divisions or companies.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the morning watch.' This refers to the early-morning military watch period.
    reason: cultural_note
  - marker: c
    text: Or 'until the day grew hot,' likely meaning toward midday.
    reason: lexical_alternative
