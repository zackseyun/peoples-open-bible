id: 2TH.1.7
reference: 2 Thessalonians 1:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ὑμῖν τοῖς θλιβομένοις ἄνεσιν μεθ’ ἡμῶν ἐν τῇ ἀποκαλύψει τοῦ κυρίου Ἰησοῦ ἀπ’ οὐρανοῦ μετ’ ἀγγέλων δυνάμεως αὐτοῦ
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/007.yaml
  text: and to you who are being afflicted[a], relief with us at the revelation of the Lord Jesus from heaven with his mighty angels.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'with his mighty angels.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 환난을 받고 있는 여러분에게는, 그분의 능력의 천사들과 함께 주 예수께서 하늘로부터 나타나실[a] 때에 우리와 함께 쉼을 주십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「계시되실 때」, 「드러나실 때」. 헬라어 ἀποκάλυψις는 가려진 것을 드러내는 종말론적 나타남을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς θλιβομένοις
  english_pob_choice: who are being afflicted
  chosen_korean: 환난을 받고 있는
  alternatives_korean:
  - 압박당하고 있는
  - 고난당하고 있는
  lexicon: BDAG
  rationale: 현재 수동분사로서 현재 진행되는 압박을 가리킨다. 6절의 「환난」과의 어휘적 연결을 보존한다.
- source_word: ἄνεσιν
  english_pob_choice: relief
  chosen_korean: 쉼
  alternatives_korean:
  - 안식
  - 평안
  lexicon: BDAG
  rationale: ἄνεσις는 압박에서 풀려나는 해방의 의미. 「쉼」은 단순한 내적 평온이 아니라 압박의 해소를 자연스럽게 표현한다.
- source_word: ἐν τῇ ἀποκαλύψει
  english_pob_choice: at the revelation
  chosen_korean: 나타나실 때에
  alternatives_korean:
  - 계시 때에
  - 드러나실 때에
  lexicon: BDAG
  rationale: ἐν + 사건 명사의 시간적 의미를 「~하실 때에」로 자연스럽게 옮긴다. 명사 「계시」보다 동사적 표현이 한국어 흐름에 맞다.
- source_word: ἀπ’ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_korean: 하늘로부터
  alternatives_korean:
  - 하늘에서
  lexicon: BDAG
  rationale: 출발지 표현의 표준 한국어.
- source_word: μετ’ ἀγγέλων δυνάμεως αὐτοῦ
  english_pob_choice: with his mighty angels
  chosen_korean: 그분의 능력의 천사들과 함께
  alternatives_korean:
  - 그분의 능력 있는 천사들과 함께
  - 그분의 강력한 천사들과 함께
  lexicon: BDAG
  rationale: 헬라어의 속격 구조를 그대로 보존하여 영어 POB의 「the angels of his power」 직역에 가까운 「능력의 천사들」을 채택한다. 형용사적 「강한 천사들」은 의역으로 빠지므로 피한다.
- source_word: κυρίου Ἰησοῦ
  english_pob_choice: the Lord Jesus
  chosen_korean: 주 예수
  alternatives_korean:
  - 주이신 예수
  lexicon: BDAG
  rationale: κύριος는 「주」로 옮기는 표준 글로서리를 따른다.
theological_decisions:
- issue: ἀγγέλων δυνάμεως αὐτοῦ의 속격 구조 보존
  chosen_reading: 그분의 능력의 천사들
  alternative_readings:
  - 그분의 강력한 천사들
  rationale: 속격 구조를 「능력의 천사들」로 보존하여 본문의 구문적 투명성을 유지하고, 「강한 천사들」 같은 의역으로 해석을 좁히지 않는다.
  doctrine_reference: 'Translation philosophy §3, §5'
