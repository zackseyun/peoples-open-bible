revisions:
- from: 'Entonces Moisés llamó a Josué y le dijo, a la vista de todo Israel[a]: «Sé fuerte y valiente, porque tú entrarás con este pueblo en la tierra que Yahvé juró a sus padres darles[b], y tú se la darás en posesión».'
  to: 'Entonces Moisés llamó a Josué y le dijo, a la vista de todo Israel[a]: «Sé fuerte y valiente, porque tú entrarás con este pueblo en la tierra que Yahvé juró a sus padres darles[b], y tú se la darás como herencia».'
  rationale: Se mantiene el texto casi por completo, pero se reemplaza «en posesión» por «como herencia» para reflejar con mayor fidelidad el sentido de תַּנְחִילֶנָּה y la justificación léxica ya documentada en el POB inglés. No se requiere nota adicional porque el ajuste aclara el sentido en vez de introducir nueva ambigüedad.
