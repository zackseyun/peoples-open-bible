id: 2KI.5.3
reference: 2 Kings 5:3
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ אֶל גְּבִרְתָּ֔/הּ אַחֲלֵ֣י אֲדֹנִ֔/י לִ/פְנֵ֥י הַ/נָּבִ֖יא אֲשֶׁ֣ר בְּ/שֹׁמְר֑וֹן אָ֛ז יֶאֱסֹ֥ף אֹת֖/וֹ מִ/צָּרַעְתּֽ/וֹ־׃
translation:
  text: She said to her mistress[b][a], “If only my lord were before the prophet who is in Samaria! Then he would gather him in from his leprosy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “Then he would cure him of his leprosy.” The Hebrew verb is literally “gather in,” used here for recovery/removal from disease.
    reason: lexical_alternative
  - marker: b
    text: “Leprosy” renders Hebrew צָרַעַת, a traditional term that may refer more broadly to a serious skin disease.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבִרְתָּהּ
  chosen: her mistress
  alternatives:
  - her lady
  lexicon: HALOT
  rationale: The term denotes a female superior/master in a household context. 'Mistress' best conveys social rank here without implying romantic meaning in context.
- source_word: אַחֲלֵי
  chosen: If only
  alternatives:
  - Would that
  - Oh that
  lexicon: HALOT
  rationale: This particle expresses wish or longing. 'If only' is natural modern English and preserves the optative force.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: Here the Israelite girl refers respectfully to Naaman. 'My lord' preserves the deferential address and matches the possessive form; 'my master' is possible but slightly narrows the nuance to servile ownership.
- source_word: לִפְנֵי
  chosen: were before
  alternatives:
  - were in the presence of
  - stood before
  lexicon: HALOT
  rationale: The idiom means being in someone's presence. 'Were before' keeps the Hebrew imagery while remaining understandable.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; the context points to Elisha but the Hebrew uses the title, not the name.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  lexicon: HALOT
  rationale: Standard rendering of the place name.
- source_word: אָז
  chosen: Then
  alternatives:
  - surely then
  lexicon: HALOT
  rationale: Marks the consequence of the wished-for condition. 'Then' is sufficient in English.
- source_word: יֶאֱסֹף
  chosen: would gather him in
  alternatives:
  - would restore him
  - would cure him
  - would remove
  lexicon: HALOT
  rationale: The verb is literally 'gather/bring in, take away from exposure,' and in this context idiomatically refers to removing or recovering from disease. To keep the source-text texture, the main text preserves the more literal 'gather him in,' while alternatives are noted because many translations smooth it to 'cure' or 'heal'.
- source_word: מִצָּרַעְתּוֹ
  chosen: from his leprosy
  alternatives:
  - from his skin disease
  lexicon: HALOT
  rationale: Traditional rendering for צָרַעַת-language in English Bible translation. While the underlying condition may not correspond exactly to modern Hansen's disease, 'leprosy' remains the most recognizable conventional gloss; a more clinical alternative is preserved in a footnote.
