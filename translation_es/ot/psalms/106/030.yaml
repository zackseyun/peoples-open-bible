translation:
  language: es
  text: Entonces Fineés se puso de pie e intercedió[a], y la plaga fue detenida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ejecutó juicio’; alternativamente, ‘oró’. El verbo hebreo puede tener aquí fuerza judicial o intercesora.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood up
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - se levantó
  - estuvo de pie
  lexicon: HALOT
  rationale: El hebreo עמד puede significar ‘estar de pie’ o ‘alzarse/levantarse’ en secuencia narrativa. En español, ‘se puso de pie’ comunica la acción física y el giro decisivo sin sonar rígido.
- source_word: פִּינְחָס
  english_pob_choice: Phinehas
  chosen_spanish: Fineés
  alternatives_spanish:
  - Finees
  - Finés
  lexicon: Convención bíblica española
  rationale: Se usa la forma hispana tradicional del nombre propio, manteniendo identificación clara para lectores de Biblia en español.
- source_word: וַיְפַלֵּל
  english_pob_choice: interceded
  chosen_spanish: intercedió
  alternatives_spanish:
  - ejecutó juicio
  - oró
  lexicon: HALOT
  rationale: El piel de פלל admite fuerza judicial e intercesora. ‘Intercedió’ conserva la amplitud del término y concuerda con la revisión inglesa más reciente, sin reducirlo solo a oración ni cerrarlo exclusivamente como acto judicial.
- source_word: וַתֵּעָצַר
  english_pob_choice: was stopped
  chosen_spanish: fue detenida
  alternatives_spanish:
  - fue frenada
  - se detuvo
  lexicon: HALOT
  rationale: El nifal de עצר expresa que la acción queda detenida o restringida. ‘Fue detenida’ es natural en español y refleja bien el resultado pasivo.
- source_word: הַמַּגֵּפָה
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - el azote
  - la mortandad
  lexicon: HALOT
  rationale: מגפה suele referirse a una plaga o mortandad devastadora. ‘Plaga’ es la equivalencia más directa y mantiene el eco de Números 25.
theological_decisions:
- issue: Alcance de וַיְפַלֵּל respecto de la acción de Fineés
  english_pob_reading: Rendered broadly as 'interceded' in the main text
  chosen_spanish_reading: intercedió
  alternative_spanish_readings:
  - ejecutó juicio
  - oró
  rationale: El pasaje alude a Números 25, donde la acción de Fineés detiene la plaga. Como el verbo hebreo permite matiz judicial o intercesor, se conserva esa tensión con ‘intercedió’ y una nota que recoge las alternativas sin resolver el pasaje de forma unilateral.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió ‘intervened’ por ‘interceded’ para reflejar mejor el sentido de וַיְפַלֵּל sin perder naturalidad. La versión española sigue ese ajuste con ‘intercedió’.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma preferida para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - Se usa ‘plaga’ para מגפה, en línea con el contexto de Números 25 y con el sentido de un azote mortal.
  - La nota conserva la ambigüedad lexical de פלל sin imponer una sola lectura teológica.
