  lexicon: HALOT
  rationale: El cuantificador hebreo introduce el total del grupo. En español, «Todos» transmite de manera natural y directa la totalidad de los levitas enumerados.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  - los hombres levitas
  lexicon: HALOT
  rationale: «Levitas» es el equivalente bíblico preciso y ampliamente entendido en español para la designación tribal/religiosa לְוִיִּם.
- source_word: בְּעִיר
  english_pob_choice: in ... city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  - en la urbe
  lexicon: HALOT
  rationale: La preposición ב indica ubicación; «en» es la solución más natural y fiel en español.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the holy
  chosen_spanish: santa
  alternatives_spanish:
  - sagrada
  - consagrada
  lexicon: HALOT
  rationale: En la construcción «ciudad santa», «santa» preserva el valor sacral y el uso bíblico habitual mejor que una paráfrasis más técnica.
- source_word: מָאתַיִם שְׁמֹנִים וְאַרְבָּעָה
  english_pob_choice: two hundred eighty-four
  chosen_spanish: doscientos ochenta y cuatro
  alternatives_spanish:
  - '284'
  - doscientos y ochenta y cuatro
  lexicon: HALOT
  rationale: La secuencia cardinal hebrea da claramente el total. En español bíblico moderno, conviene escribir el número en palabras para mantener fluidez y estilo de publicación.
