translation:
  language: es
  text: Que el sueño sea quitado de sus sienes[a] en la noche; que caigan lejos de toda obra de sus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de sus sienes»; la imagen es la del sueño siendo quitado de los lados de su cabeza. En español también podría expresarse idiomáticamente como «de sus ojos».
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «que caigan lejos de toda obra de sus manos», con el sujeto dejado implícito en griego; también puede entenderse en sentido más dinámico como «que todo lo hecho por sus manos fracase».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀφαιρεθείη
  english_pob_choice: be taken
  chosen_spanish: sea quitado
  alternatives_spanish:
  - sea removido
  - sea tomado
  - sea apartado
  lexicon: LSJ
  rationale: El aoristo optativo expresa un deseo imprecatorio. «Sea quitado» conserva la pasiva y el tono solemne sin sobrecargar el verbo.
- source_word: ὕπνος
  english_pob_choice: sleep
  chosen_spanish: sueño
  alternatives_spanish:
  - sueño profundo
  - dormir
  lexicon: LSJ
  rationale: «Sueño» es el equivalente natural y directo en español para el estado de dormir.
- source_word: κροτάφων
  english_pob_choice: temples
  chosen_spanish: sienes
  alternatives_spanish:
  - temples
  - costados de la cabeza
  lexicon: LSJ
  rationale: El griego alude literalmente a las sienes/costados de la cabeza. En español «sienes» es la forma natural y fiel al mismo gesto corporal.
- source_word: ἐν νυκτί
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - de noche
  - por la noche
  lexicon: LSJ
  rationale: La preposición se mantiene de modo transparente; «en la noche» conserva el valor preposicional y el tono poético.
- source_word: ἀποπέσοιεν
  english_pob_choice: fall away
  chosen_spanish: se aparten
  alternatives_spanish:
  - caigan
  - se caigan
  - fallen fuera
  lexicon: LSJ
  rationale: El griego tiene un plural sin sujeto expreso y una imagen de desprendimiento. «Se aparten» preserva la pluralidad implícita y la idea de desvanecerse sin forzar una identificación del sujeto.
- source_word: ἀπὸ παντὸς ἔργου
  english_pob_choice: from every work
  chosen_spanish: de toda obra
  alternatives_spanish:
  - de todo trabajo
  - de cada obra
  lexicon: LSJ
  rationale: «Toda obra» refleja el sentido de totalidad y mantiene la construcción con ἀπό de manera natural en español.
- source_word: χειρῶν αὐτοῦ
  english_pob_choice: by his hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - por sus manos
  - hecha por sus manos
  lexicon: LSJ
  rationale: La expresión idiomática griega une la acción con las manos. «De sus manos» conserva esa relación concreta y evita aclarar demasiado el sujeto tácito.
theological_decisions:
- issue: Sujeto implícito del segundo hemistiquio
  english_pob_reading: may they fall away from every work of his hands
  chosen_spanish_reading: que ellos se aparten de toda obra de sus manos
  alternative_spanish_readings:
  - que toda obra de sus manos caiga
  - que se frustren todas sus obras
  rationale: La revisión inglesa retuvo el plural implícito de ἀποπέσοιεν. En español, «ellos» mantiene esa ambigüedad sintáctica sin convertir el verso en una paráfrasis que fije el sujeto como si fuera «obra» o «trabajo».
  doctrine_reference: Principio de transparencia sintáctica y respeto por la ambigüedad del texto fuente
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa en dos puntos clave: conserva el plural implícito de ἀποπέσοιεν y evita dinamizar el segundo miembro como si el objeto singular fuera el sujeto. Para κροτάφων, adopta una equivalencia más natural en español («sienes») sin perder la imagen corporal del original.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible.
  - No se introduce «Señor» ni otro término no presente en el verso.
  - La sintaxis conserva el paralelismo de dos peticiones.
  - No se añaden notas al pie porque no hay marcadores en el texto principal.
