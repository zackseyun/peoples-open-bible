    issue: Se traduce אֲדֹנָי como «Yahvé»
    rationale: La fuente hebrea inmediata usa אֲדֹנָי, no יהוה. La política del proyecto pide «Yahvé» para el tetragrámaton, pero aquí debe respetarse el título fuente; «el Señor» refleja mejor la evidencia original y el audit trail inglés.
  - severity: medium
    issue: «no se ha vuelto su ira» es un giro poco natural e impreciso
    rationale: לֹא שָׁב אַפּוֹ significa idiomáticamente que su ira no se ha apartado/cedido. La redacción actual suena forzada en español y no comunica con claridad el sentido del refrán isaiano.
  - severity: low
