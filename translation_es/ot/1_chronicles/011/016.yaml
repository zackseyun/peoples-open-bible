translation:
  language: es
  text: David estaba en la fortaleza[a], y la guarnición de los filisteos estaba entonces en Belén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fortín' para 'fortaleza'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְּצוּדָה
  english_pob_choice: stronghold
  chosen_spanish: fortaleza
  alternatives_spanish:
  - baluarte
  - ciudadela
  lexicon: HALOT
  rationale: מְצוּדָה designa un lugar fortificado o refugio defensivo. En español, "fortaleza" comunica bien la idea de un sitio militarmente defendido y resulta más natural que un calco rígido.
- source_word: נְצִיב
  english_pob_choice: garrison
  chosen_spanish: guarnición
  alternatives_spanish:
  - puesto militar
  - destacamento
  lexicon: HALOT
  rationale: En este contexto, junto con "de los filisteos" y la ubicación en Belén, el término señala una fuerza militar de ocupación o un puesto militar, no un oficial civil. "Guarnición" conserva ese sentido con claridad.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: Philistines
  chosen_spanish: filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Es el nombre habitual del pueblo en español bíblico y mantiene la referencia étnica e histórica de forma transparente.
- source_word: בְּבֵית לָחֶם
  english_pob_choice: in Bethlehem
  chosen_spanish: en Belén
  alternatives_spanish:
  - en la ciudad de Belén
  lexicon: HALOT
  rationale: La preposición ב marca localización; en español, "en Belén" es la forma más natural para una ciudad.
- source_word: אָז ... אָז
  english_pob_choice: then ... then
  chosen_spanish: entonces ... entonces
  alternatives_spanish:
  - en aquel tiempo ... en aquel tiempo
  - ahora ... entonces
  lexicon: HALOT
  rationale: El hebreo repite אָז en ambas cláusulas. Se conserva la repetición con "entonces" para reflejar la estructura temporal y el énfasis del original, sin sonar demasiado artificioso en español.
- source_word: וְדָוִיד
  english_pob_choice: Now David
  chosen_spanish: Ahora David
  alternatives_spanish:
  - Y David
  lexicon: HALOT
  rationale: La waw inicial se vierte como una transición narrativa suave. "Ahora" funciona en español para introducir el marco circunstancial sin perder naturalidad.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa que eliminó el primer 'then' redundante en inglés, pero aquí se conserva la repetición de אָז con 'entonces' en ambas cláusulas porque el español puede reproducirla de manera natural y esa repetición está explícita en el hebreo.
  spanish_consistency_notes:
  - Se usa "Belén" como topónimo estándar y no se añade artículo.
  - Se prefirió "filisteos" en minúscula por tratarse de un etnónimo común en español.
  - No se emplea "SEÑOR" ni terminología teológica adicional porque el verso no contiene el nombre divino ni conceptos doctrinales explícitos.
