revisions:
- from: El que refrena sus palabras tiene conocimiento[a][b], y el hombre de entendimiento es frío de espíritu.
  to: El que refrena sus palabras tiene conocimiento[b], y el hombre de entendimiento es sereno[a] de espíritu.
  rationale: Se mantiene la fidelidad al paralelismo hebreo y a la forma masculina proverbial, pero se ajusta la segunda línea para evitar que «frío de espíritu» comunique frialdad emocional en vez de compostura. La nota preserva la imagen térmica literal documentada por el POB. También se pulen la naturalidad y el formato de las notas.
