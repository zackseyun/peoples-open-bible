base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/016/011.yaml
  text: Then Samuel said to Jesse[a], “Are these all the young men?” And he said, “The youngest still remains, and behold, he is shepherding the flock.” Then Samuel said to Jesse, “Send and bring him[b], for we will not sit down until he comes here.”
  footnotes:
  - marker: a
    text: Or, “he is tending the sheep.” The Hebrew literally says “shepherding the flock.”
    reason: lexical_alternative
  - marker: b
    text: Or, “we will not sit around / take our place,” likely meaning they would not begin the meal or formal gathering until he arrived.
    reason: lexical_alternative
