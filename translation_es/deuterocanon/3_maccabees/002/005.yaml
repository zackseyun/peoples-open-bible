translation:
  language: es
  text: Tú diste a conocer tu poder contra el atrevido[a] Faraón, cuando había esclavizado a tu pueblo santo Israel, probándolo con castigos variados y muchos[b]; por medio de ellos diste a conocer tu gran poderío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «arrogante». El adjetivo griego puede llevar el sentido de audaz, insolente o atrevido.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «probándolo con castigos variados y muchos», lo cual puede sugerir una serie de actos punitivos con valor de prueba o juicio sucesivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: θρασὺν
  english_pob_choice: bold
  chosen_spanish: atrevido
  alternatives_spanish:
  - audaz
  - arrogante
  - insolente
  lexicon: LSJ
  rationale: θρασύς puede expresar una audacia con matiz negativo. En español, 'atrevido' conserva ese tono sin sobredeterminar el juicio moral más allá de lo que exige el adjetivo griego. 'Arrogante' o 'insolente' intensifican más de lo necesario.
- source_word: καταδουλωσάμενον
  english_pob_choice: had enslaved
  chosen_spanish: había esclavizado
  alternatives_spanish:
  - había sometido a esclavitud
  - había puesto en servidumbre
  lexicon: LSJ
  rationale: 'El verbo es fuerte y literal: indica reducción a esclavitud. ''Había esclavizado'' preserva esa fuerza y coincide con la preferencia del proyecto por mantener el lenguaje de esclavitud cuando el original lo hace.'
- source_word: τὸν λαόν σου τὸν ἅγιον Ἰσραήλ
  english_pob_choice: your holy people Israel
  chosen_spanish: tu pueblo santo, Israel
  alternatives_spanish:
  - tu pueblo santo Israel
  - tu pueblo consagrado, Israel
  lexicon: LSJ
  rationale: Se conserva λαός como 'pueblo' y ἅγιος como 'santo'. 'Israel' funciona como aposición explicativa. La coma ayuda a que el español fluya sin perder la estructura del griego.
- source_word: ποικίλαις καὶ πολλαῖς
  english_pob_choice: various and many
  chosen_spanish: variados y muchos
  alternatives_spanish:
  - diversos y muchos
  - múltiples y variados
  lexicon: LSJ
  rationale: Se retiene la acumulación de dos adjetivos. 'Variados y muchos' suena natural en español y mantiene la doble intensificación del griego.
- source_word: δοκιμάσας
  english_pob_choice: testing him
  chosen_spanish: probándolo
  alternatives_spanish:
  - poniéndolo a prueba
  - probando a él
  lexicon: LSJ
  rationale: El verbo puede significar probar o someter a prueba. 'Probándolo' conserva el participio y deja abierta la lectura de prueba/probación que el POB inglés también preserva.
- source_word: τιμωρίαις
  english_pob_choice: punishments
  chosen_spanish: castigos
  alternatives_spanish:
  - penas
  - penas punitivas
  - tormentos
  lexicon: LSJ
  rationale: En este contexto, τιμωρία alude a actos punitivos infligidos por Dios. 'Castigos' es claro y natural en español, sin perder el matiz de juicio.
- source_word: ἐγνώρισας
  english_pob_choice: made known
  chosen_spanish: hiciste conocer
  alternatives_spanish:
  - mostraste
  - revelaste
  - daste a conocer
  lexicon: LSJ
  rationale: '''Hiciste conocer'' reproduce la causatividad del verbo y permite mantener la repetición retórica de las dos cláusulas con ἐγνώρισας.'
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  lexicon: LSJ
  rationale: '''Poder'' es la equivalencia más natural y directa en español para la δύναμις divina exhibida en juicio.'
- source_word: ἐφʼ αἷς
  english_pob_choice: by these
  chosen_spanish: por ellos
  alternatives_spanish:
  - por estas cosas
  - mediante ellos
  lexicon: LSJ
  rationale: El antecedente más inmediato son los castigos. 'Por ellos' mantiene la referencia anafórica en español y expresa medio/causa de forma concisa.
- source_word: κράτος
  english_pob_choice: might
  chosen_spanish: poderío
  alternatives_spanish:
  - mando
  - fortaleza
  - poder
  lexicon: LSJ
  rationale: Para distinguir κράτος de δύναμις, se evita repetir 'poder'. 'Poderío' conserva una fuerza más enfática y permite respetar la distinción retórica del griego.
theological_decisions:
- issue: Doble ἐγνώρισας y referencia a Dios como sujeto de la acción
  english_pob_reading: 'Both clauses are addressed to God: first, God made known his power against Pharaoh through punishments; second, by those punishments God made known his great might.'
  chosen_spanish_reading: 'Ambas cláusulas se dirigen a Dios y mantienen la repetición: Dios hizo conocer su poder contra Faraón, y luego hizo conocer su gran poderío por medio de esos castigos.'
  alternative_spanish_readings:
  - Tú mostraste tu poder...
  - Tú diste a conocer tu poder...
  rationale: La repetición es parte del efecto retórico del verso y no debe diluirse. 'Hiciste conocer' conserva el paralelismo y evita sustituir la frase por un sinónimo que reduzca la correspondencia con el griego.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Matiz negativo de θρασὺν
  english_pob_reading: Rendered as 'bold' rather than a stronger interpretive term like 'arrogant.'
  chosen_spanish_reading: Se optó por 'atrevido', dejando que el contexto punitivo comunique el juicio negativo.
  alternative_spanish_readings:
  - arrogante
  - insolente
  rationale: El adjetivo griego admite audacia con carga negativa, pero no obliga a intensificarlo demasiado. 'Atrevido' preserva la tensión lexical sin cerrar la gama semántica.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
- issue: τιμωρίαις como castigos divinos sucesivos
  english_pob_reading: The Greek says 'testing with varied and many punishments,' a phrasing that may allude to God proving Pharaoh through successive acts of judgment.
  chosen_spanish_reading: '''Castigos variados y muchos'' deja visible la acumulación, y ''probándolo'' permite una posible lectura de prueba a través de actos sucesivos de juicio.'
  alternative_spanish_readings:
  - castigos múltiples y variados
  - penas y muchas correcciones
  rationale: No conviene suavizar el carácter judicial del pasaje. El español mantiene el sentido de castigo y, a la vez, la posible idea de prueba/probación sugerida por el griego y el audit trail inglés.
  doctrine_reference: Translation philosophy §3 (retain lexical tensions where documented)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió 'various' sobre 'varied'; en español se optó por 'variados' porque reproduce mejor el paralelo con πολλαῖς y mantiene una cadencia más natural junto a 'muchos'.
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento reverencial en segunda persona singular para Dios: ''Tú'' y ''tu''.'
  - Se conserva la distinción entre δύναμις ('poder') y κράτος ('poderío') para evitar redundancia.
  - Se preserva el lenguaje fuerte de esclavitud con 'había esclavizado', conforme al valor del verbo griego.
  - La puntuación busca reflejar el encadenamiento sintáctico del original sin volverlo demasiado pesado en español.
