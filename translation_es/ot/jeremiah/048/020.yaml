translation:
  language: es
  text: 'Moab ha sido avergonzado[a], porque está quebrantado[b]. ¡Gime y grita! Anúncienlo junto al Arnón[c]: Moab ha sido devastado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha sido deshonrado».
    reason: lexical_alternative
  - marker: b
    text: O «está deshecho» o «está destrozado».
    reason: lexical_alternative
  - marker: c
    text: O «al Arnón» o «en Arnón».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִ֥ישׁ
  english_pob_choice: is put to shame
  chosen_spanish: ha sido avergonzado
  alternatives_spanish:
  - está avergonzado
  - ha sido disgraciado
  lexicon: HALOT
  rationale: 'El hifil de בוש expresa un resultado causado: Moab ha quedado en vergüenza o deshonra. «Ha sido avergonzado» conserva ese valor resultativo en español natural, sin perder la fuerza pasiva del hebreo y manteniendo la tensión entre vergüenza y deshonra.'
- source_word: מוֹאָ֛ב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Móab
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado, como en el auditorio textual de POB.
- source_word: כִּֽי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este contexto causal, «porque» comunica con claridad la razón de la vergüenza de Moab sin forzar un giro demasiado literal.
- source_word: חַ֖תָּה
  english_pob_choice: is shattered
  chosen_spanish: está quebrantado
  alternatives_spanish:
  - está desmayado
  - está destrozado
  - está quebrado
  lexicon: HALOT
  rationale: חתת puede abarcar quebranto, dismayo o quebradura. «Está quebrantado» mantiene el campo semántico de ruina interior y colapso visible, y funciona bien en paralelo con la devastación del final del verso.
- source_word: הילילי
  english_pob_choice: Wail
  chosen_spanish: ¡Aúlla!
  alternatives_spanish:
  - ¡Lamenta!
  - ¡Gime!
  - ¡Aúlla y lamenta!
  lexicon: HALOT
  rationale: El imperativo femenino singular pide una exclamación de duelo intensa. «Aúlla» sigue de cerca la fuerza del hebreo y corresponde al lenguaje profético de lamentación; se mantiene la tensión expresiva que POB conservó con «Wail/Howl».
- source_word: ו/זעקי
  english_pob_choice: and cry out
  chosen_spanish: y grita
  alternatives_spanish:
  - y clama
  - y da un grito
  - y vocifera
  lexicon: HALOT
  rationale: זעק expresa un clamor agudo de angustia. «Grita» funciona en paralelo con «aúlla» y conserva la urgencia del llamado sin suavizarlo.
- source_word: הַגִּ֣ידוּ
  english_pob_choice: Declare it
  chosen_spanish: Anúncienlo
  alternatives_spanish:
  - Declárenlo
  - Díganlo
  - Proclámenlo
  lexicon: HALOT
  rationale: El imperativo plural exige una proclamación pública. «Anúncienlo» transmite bien el carácter de difusión notoria, mientras que «declárenlo» queda como alternativa casi equivalente.
- source_word: בְ/אַרְנ֔וֹן
  english_pob_choice: by the Arnon
  chosen_spanish: junto al Arnón
  alternatives_spanish:
  - en el Arnón
  - al Arnón
  - por el Arnón
  lexicon: HALOT
  rationale: La preposición ב admite matiz locativo o de proximidad. Dado que Arnón funciona como referencia geográfica conocida, «junto al Arnón» mantiene la flexibilidad del hebreo y la claridad en español. Se respeta la oscilación documentada entre «by/at/in».
- source_word: שֻׁדַּ֖ד
  english_pob_choice: is devastated
  chosen_spanish: ha sido devastado
  alternatives_spanish:
  - ha sido destruido
  - ha sido arrasado
  - ha sido saqueado
  lexicon: HALOT
  rationale: El pual de שׁדד indica ruina, saqueo o devastación. «Ha sido devastado» reproduce el alcance amplio elegido por POB, sin reducirlo sólo al pillaje.
theological_decisions:
- issue: Tono profético de vergüenza y juicio sobre Moab
  english_pob_reading: Moab is put to shame ... Moab is devastated
  chosen_spanish_reading: Moab ha sido avergonzado ... Moab ha sido devastado
  alternative_spanish_readings:
  - Moab está avergonzado ... Moab está devastado
  - Moab ha sido deshonrado ... Moab ha sido arrasado
  rationale: 'No hay doctrina controvertida aquí, pero sí una tensión semántica entre vergüenza, deshonra y ruina judicial. La traducción mantiene el doble golpe del verso: humillación pública y devastación material, sin diluir el juicio profético.'
  doctrine_reference: Juicio profético en el corpus de Jeremías; no aplica un pasaje doctrinal específico
