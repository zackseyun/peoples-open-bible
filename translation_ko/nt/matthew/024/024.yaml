  text: ἐγερθήσονται γὰρ ψευδόχριστοι καὶ ψευδοπροφῆται, καὶ δώσουσιν σημεῖα μεγάλα καὶ τέρατα ὥστε ⸀πλανῆσαι εἰ δυνατὸν καὶ τοὺς ἐκλεκτούς·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/024/024.yaml
  text: For false messiahs and false prophets will arise[a], and they will perform great signs and wonders so as to lead astray, if possible[c][b], even the elect.
  footnotes:
  - marker: a
    text: Or, 'false Christs.' The Greek uses the title Christos; here it is rendered 'messiahs' because the sense is titular rather than name-like.
    reason: alternative_reading
  - marker: b
    text: Or, 'deceive.' The verb can mean to cause someone to wander or go astray, hence 'lead astray.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'if it were possible.' The Greek simply says 'if possible,' leaving the theological implication unstated.
    reason: alternative_reading
translation:
  language: ko
  text: 거짓 메시아들과 거짓 예언자들이 일어나 큰 표적들과 기적들을 행하여, 할 수만 있다면 택하신 자들까지도 미혹하려 할 것입니다.
  philosophy: optimal-equivalence
