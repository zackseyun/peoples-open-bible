translation:
  language: es
  text: En ese tiempo, el mismo día en que las naciones lo habían profanado[a], ese mismo día fue rededicado con cantos y cítaras y arpas[b] y címbalos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo habían contaminado». El verbo griego puede significar hacer algo profano o impuro en un contexto sagrado.
    reason: lexical_alternative
  - marker: b
    text: El instrumento traducido «arpas» (κινύραις) puede referirse de manera más amplia a un tipo de instrumento de cuerda; la identificación exacta no es segura.
    reason: cultural_note
lexical_decisions:
- source_word: κατὰ τὸν καιρὸν
  english_pob_choice: At the time
  chosen_spanish: Al tiempo
  alternatives_spanish:
  - En aquel tiempo
  - En el tiempo
  lexicon: LSJ
  rationale: La frase es temporal e idiomática. «Al tiempo» conserva la referencia temporal sin sonar forzado, y evita añadir una precisión que el griego no explicita.
- source_word: κατὰ τὴν ἡμέραν
  english_pob_choice: on the very day
  chosen_spanish: el mismo día
  alternatives_spanish:
  - en ese mismo día
  - en el mismo día
  lexicon: LSJ
  rationale: La repetición con el relativo siguiente intensifica la coincidencia exacta entre la profanación y la restauración. «El mismo día» reproduce bien ese énfasis en español natural.
- source_word: ἐβεβήλωσαν
  english_pob_choice: had defiled
  chosen_spanish: habían profanado
  alternatives_spanish:
  - habían contaminado
  - habían mancillado
  lexicon: LSJ
  rationale: En contexto sagrado, el verbo puede significar hacer algo profano o impuro. Aquí «profanado» conserva la tensión cultual mejor que una solución más general, y en español resulta fiel y clara.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - el santuario
  - el altar
  - la casa
  lexicon: LSJ
  rationale: El griego usa solo el pronombre; el referente se recupera del contexto inmediato. «Lo» evita especificar más de lo que dice el versículo.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: LSJ
  rationale: «Las naciones» sigue de cerca el griego y evita la carga interpretativa de «gentiles» o el giro más libre «pueblos».
- source_word: ἐν ἐκείνῃ
  english_pob_choice: on that very day
  chosen_spanish: ese mismo día
  alternatives_spanish:
  - aquel mismo día
  - en aquel día
  lexicon: LSJ
  rationale: La forma repetida refuerza la correspondencia exacta. «Ese mismo día» mantiene la fuerza enfática de la construcción griega.
- source_word: ἐνεκαινίσθη
  english_pob_choice: it was rededicated
  chosen_spanish: fue rededicado
  alternatives_spanish:
  - fue dedicado de nuevo
  - fue renovado
  lexicon: LSJ
  rationale: El contexto cultual del pasaje apunta a la dedicación renovada del santuario. «Rededicado» transmite bien ese sentido histórico y litúrgico sin sobreexplicar.
- source_word: ἐν ᾠδαῖς
  english_pob_choice: with songs
  chosen_spanish: con cantos
  alternatives_spanish:
  - con himnos
  - con canciones
  lexicon: LSJ
  rationale: «Cantos» suena más natural en español litúrgico y general que «canciones», y conserva el matiz amplio del griego.
- source_word: κιθάραις
  english_pob_choice: lyres
  chosen_spanish: cítaras
  alternatives_spanish:
  - liras
  lexicon: LSJ
  rationale: «Κιθάρα» designa un instrumento de cuerda tipo lira; en español, «cítaras» mantiene una distinción formal útil frente al término siguiente.
- source_word: κινύραις
  english_pob_choice: harps
  chosen_spanish: arpas
  alternatives_spanish:
  - instrumentos de cuerda
  - liras
  lexicon: LSJ
  rationale: La identificación exacta del instrumento es incierta. «Arpas» es una solución convencional y comprensible en español, que preserva la referencia a un instrumento de cuerda distinto sin imponer una precisión inexistente.
- source_word: κυμβάλοις
  english_pob_choice: cymbals
  chosen_spanish: címbalos
  alternatives_spanish:
  - platillos
  - címbalos sonoros
  lexicon: LSJ
  rationale: Es la equivalencia directa del instrumento de percusión y resulta plenamente transparente en español.
theological_decisions:
- issue: Verbo cultual de restauración después de la profanación
  english_pob_reading: it was rededicated
  chosen_spanish_reading: fue rededicado
  alternative_spanish_readings:
  - fue dedicado de nuevo
  - fue renovado
  rationale: El capítulo narra la restauración del culto después de la deshonra del lugar santo. «Rededicado» preserva el sentido cultual e histórico del verbo sin sustituirlo por una paráfrasis doctrinalmente cargada.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tensión léxica entre profanar y defilar el espacio sagrado
  english_pob_reading: had defiled it
  chosen_spanish_reading: lo habían profanado
  alternative_spanish_readings:
  - lo habían contaminado
  - lo habían mancillado
  rationale: El griego puede abarcar la idea de hacer algo profano en un contexto sagrado. «Profanado» mantiene esa tensión y encaja mejor con el tema del templo que una opción más general.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete con el mismo énfasis temporal repetido que en el inglés auditado. Se conserva la decisión cultual de «rededicado» y la incertidumbre instrumental de κινύραις, reflejada mediante nota. No se detectan revisiones aplicadas en el paquete fuente, por lo que el español se alinea con el último pase estable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton cuando aparezca en otros contextos del proyecto; aquí no aparece ningún nombre divino.
  - Se usa «profanado» como término cultual fuerte, coherente con la terminología POB para contextos sagrados.
  - «Rededicado» se conserva para el verbo de restauración ritual, en continuidad con la decisión inglesa auditada.
  - La secuencia de instrumentos se traduce con equivalencias españolas transparentes y sin normalizar las posibles diferencias de tipo instrumental.
