translation:
  language: es
  text: Desprecio mi vida[a]; no viviré para siempre. Déjame, porque mis días son un soplo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo desprecio», «lo rechazo» o «lo detesto»; el hebreo no expresa el objeto directamente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vapor» o «aliento»; la palabra hebrea también puede subrayar lo breve e insustancial de la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָאַסְתִּי
  english_pob_choice: I despise my life
  chosen_spanish: Desprecio mi vida
  alternatives_spanish:
  - Rechazo mi vida
  - Detesto mi vida
  - Aborrezco mi vida
  lexicon: HALOT
  rationale: El verbo מָאַס expresa rechazo fuerte, desprecio o desdén. Como el hebreo no explicita el objeto, el inglés POB lo hizo explícito como 'my life' por claridad. En español, 'Desprecio mi vida' conserva la fuerza del verbo y sigue la aclaración auditada sin suavizarla con 'siervo' ni con una paráfrasis más débil.
- source_word: לֹא לְעֹלָם אֶחְיֶה
  english_pob_choice: I will not live forever
  chosen_spanish: no viviré para siempre
  alternatives_spanish:
  - no viviría para siempre
  - no viviré eternamente
  - no viviré siempre
  lexicon: HALOT
  rationale: La secuencia niega la perpetuidad de la vida de Job. 'No viviré para siempre' reproduce el sentido natural y directo del hebreo, manteniendo la afirmación de mortalidad sin volverla desiderativa.
- source_word: חֲדַל מִמֶּנִּי
  english_pob_choice: Leave me alone
  chosen_spanish: Déjame
  alternatives_spanish:
  - Cesa de mí
  - Apártate de mí
  - Deja de presionarme
  lexicon: HALOT
  rationale: חדל con מן pide cesar o desistir 'de' alguien. El inglés POB optó por un equivalente idiomático. En español, 'Déjame' comunica de forma breve y natural la petición de que cese la acción dirigida contra Job, sin añadir una interpretación demasiado específica del interlocutor.
- source_word: הֶבֶל
  english_pob_choice: a breath
  chosen_spanish: un soplo
  alternatives_spanish:
  - un aliento
  - un vapor
  - una exhalación
  lexicon: HALOT
  rationale: הבל puede significar soplo, vapor, transitoriedad o vaciedad. En este contexto de fragilidad y brevedad de la vida, 'un soplo' conserva la imagen concreta y breve del inglés POB ('a breath'), con buena naturalidad en español.
- source_word: יָמָי
  english_pob_choice: my days
  chosen_spanish: mis días
  alternatives_spanish:
  - los días de mi vida
  - mis jornadas
  lexicon: HALOT
  rationale: La referencia es simplemente a los días poseídos por Job, es decir, su vida limitada. 'Mis días' mantiene la concisión del hebreo y la imagen de duración breve.
theological_decisions:
- issue: Sentido de la frase con objeto implícito en מָאַסְתִּי
  english_pob_reading: I despise my life
  chosen_spanish_reading: Desprecio mi vida
  alternative_spanish_readings:
  - Desprecio eso
  - Lo desprecio
  - Lo rechazo
  rationale: El hebreo deja el objeto sin expresar; el audit trail inglés lo aclara como 'my life'. La versión española conserva esa aclaración explícita para evitar ambigüedad innecesaria, sin pretender que el objeto esté gramaticalmente presente en el hebreo.
  doctrine_reference: Job 7:16; cf. la nota léxica del POB inglés sobre el objeto implícito
- issue: Valor de הֶבֶל como imagen de la vida humana
  english_pob_reading: my days are a breath
  chosen_spanish_reading: mis días son un soplo
  alternative_spanish_readings:
  - mis días son vapor
  - mis días son un hálito
  - mis días son vaciedad
  rationale: La lectura mantiene la tensión entre brevedad, fragilidad e insustancialidad. 'Soplo' comunica la imagen sin cargarla de una abstracción como 'vanidad', que podría oscurecer el matiz mortal del pasaje.
  doctrine_reference: Job 7:16; cf. uso poético de הבל en Job
translation_notes:
  revision_awareness: La frase inglesa revisada especificó 'my life' en lugar de 'it' para aclarar el objeto implícito; la versión española sigue esa decisión auditada con 'mi vida'. El resto del versículo se mantiene alineado con la lectura inglesa y con el hebreo, especialmente en la metáfora final de הבל como brevedad vital.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino ni κύριος.
  - No se usa 'Cristo/Mesías' porque el pasaje no lo requiere.
  - '''Desprecio'' conserva la fuerza semántica de מאס; se evitó ''aborrezco'' por ser más afectivo que valorativo en este contexto.'
  - '''Soplo'' se eligió para הבל por su naturalidad en español y por mantener la imagen de fragilidad sin reinterpretarla doctrinalmente.'
