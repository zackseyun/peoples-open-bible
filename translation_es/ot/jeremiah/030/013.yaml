  yaml_path: translation/ot/jeremiah/030/013.yaml
  text: There is no one to plead your case for your wound[a]; there is no healing for you[b], no remedy.
  footnotes:
  - marker: a
    text: Or 'There is no one to judge your case concerning your wound.' The Hebrew legal imagery can be rendered either as advocacy ('plead your case') or adjudication ('judge your case').
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be understood more concretely as 'no bandage for you' or 'no new flesh for you,' reflecting the rare Hebrew term translated 'remedy.'
    reason: lexical_alternative
