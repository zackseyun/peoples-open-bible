revisions:
- from: O si lo hirió con su mano, en enemistad, y murió[a], el que lo hirió ciertamente debe morir; es un homicida[b]. El vengador de la sangre hará morir al homicida cuando lo encuentre.
  to: O si lo hirió con su mano, en enemistad, y murió[a], el que lo hirió ciertamente se le dará muerte; es un asesino[b]. El vengador de la sangre dará muerte al asesino cuando lo encuentre.
  rationale: Se ajusta la pena legal a una formulación pasiva más fiel al hebreo, se fortalece la categoría de homicidio intencional con «asesino», se mejora la naturalidad jurídica con «dará muerte», y se depura la nota al pie b para que ofrezca una alternativa real sin redundancia.
  reviewer_model: gpt-5.4
