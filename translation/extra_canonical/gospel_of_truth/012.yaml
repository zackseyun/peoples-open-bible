  consult_excerpt: 'This is the Word of the Gospel of the discovery of the fullness,
    which comes for those who are awaiting 35 the salvation which is coming from above.
    The hope for which they’re waiting is waiting for those whose image is light with
    no shadow in it. If at that time the fullness comes, the need of matter doesn’t
    come through the infinity of the Father, who comes to give time to the need –
    although no one can say that the incorruptible one will come like this. But the
    depth of the Father multiplied, and the thought of Error didn’t exist with him.
    It’s something that’s fallen, which is easily set upright in the discovery of
    the one who’s to come to what he’ll return, because the return is called “repentance.”

    Because of this, incorruptibility breathed out. It followed after the one who
    sinned, so that they might rest, because forgiveness is what remains for the light
    in need, the Word of fullness. For the doctor hurries to the place where there’s
    sickness, because that’s what he (or she) wants to do. The one in need, then,
    doesn’t hide it, because one (the doctor) has what they need. In this way the
    fullness, which has no need but fills the need, is what he 36 provided from himself
    to fill up what’s needed, so that they might receive grace; because when they
    were in need, they didn’t have grace. Because of this, a diminishing took place
    where there is no grace. When what was diminished was restored, what they needed
    was revealed as fullness. This is the discovery of the light of Truth which enlightened
    them, because it doesn’t change.

    Because of this, they spoke of Christ in their midst: “Seek, and those who were
    disturbed will receive a return – and he’ll anoint them with ointment.” The ointment
    is the mercy of the Father, who will have mercy on them. But those whom he anointed
    are those who have been completed, because full jars are the ones that are anointed.
    But when the anointing of one dissolves, it empties, and the cause of the need
    is the place where the ointment leaks, because a breath and its power draws it.
    But from the one who has no need, no seal is removed, nor is anything emptied,
    but what it needs is filled again by the Father, who’s complete.'
translation:
  text: 'The speech of the Good News about the finding of the Fullness is for those
    who await the salvation that comes from above[a]. While they wait for it, the
    hope belongs to those whose image is light with no shadow in it. When, then, the
    Fullness arrives, the need of hylē (matter) is not from the immeasurability of
    the Father; he comes to grant a season to the need. Yet no one is able to say
    that the Incorruptible comes in such a manner. Rather, the Depth of the Father
    grew and multiplied, and the thought of Error was not with him. Error is a fall—something
    easy to set upright by the finding of the one who will come back to that to which
    he returns, for the return is named change of mind.


    Because of this, Incorruptibility breathed forth; it pursued the one who had sinned,
    so that he might find rest. For what remains for the light in need is forgiveness—the
    Word of the Fullness. For the physician runs to the place where sickness is, because
    that is what he wills. And the one in need does not hide, for someone possesses
    what that one needs. In this way the Fullness—which has no need—provided from
    itself to fill up the need, so that they might receive grace. For when they were
    in need, grace was not with them. Because of this, a diminishing took place where
    there is no grace; and when what was diminished was restored, the need was shown
    as Fullness. This is the finding of the light of the Truth that enlightened them,
    for it is unchangeable.


    Because of this, they spoke concerning the Messiah in their midst: “Seek, and
    those who were disturbed will return, and he will anoint them with chrism.” The
    chrism is the mercy of the Father, and he will have mercy on them. Now those whom
    he anointed are the perfect—for full vessels are the ones anointed. But when the
    anointing of one dissolves, it is emptied, and the cause of the need is the place
    where the ointment leaks out, because a breath and its power draw it. Yet from
    the one who has no need no seal is loosened, and nothing is emptied; rather, what
    it needs the Father—who is complete—fills again with him. He is good; he knows
    his plantings, because it is he who planted them in his Paradise[c][b]. Now his
    Paradise is his place of rest.'
