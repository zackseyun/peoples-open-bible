translation:
  language: es
  text: 'Acerca de Moab: Así dice Yahvé de los ejércitos[a], el Dios de Israel: ¡Ay de Nebo, porque ha sido devastada! Kiriataim es avergonzada; ha sido capturada.[b] La fortaleza es avergonzada y destrozada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Contra Moab» en el encabezado.
    reason: alternative_reading
  - marker: b
    text: O «Misgab», si se toma como nombre de lugar en vez de «la fortaleza».
    reason: alternative_reading
lexical_decisions:
- source_word: לְמוֹאָב
  english_pob_choice: Concerning Moab
  chosen_spanish: Con respecto a Moab
  alternatives_spanish:
  - Contra Moab
  - Para Moab
  lexicon: HALOT
  rationale: El לְ inicial en un encabezado profético introduce el oráculo acerca de Moab. En español, «Con respecto a» conserva el valor amplio de la preposición sin forzar desde el inicio una lectura más adversativa de la que exige el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio con la forma establecida del proyecto en español, «Yahvé», en lugar de sustituirlo por un título. Esto sigue la decisión auditada del texto inglés y mantiene la transparencia del Tetragrámaton.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «De los ejércitos» reproduce de forma transparente el título constructo y es una equivalencia natural en español. Mantiene el sentido de soberanía divina sobre fuerzas celestiales y terrenales.
- source_word: הוֹי
  english_pob_choice: Woe to
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay de ti,
  - ¡Ay sobre
  lexicon: HALOT
  rationale: La interjección profética de juicio se expresa de manera natural en español con «¡Ay de!», que transmite denuncia y lamento sin suavizar la fuerza del hebreo.
- source_word: נְבוֹ
  english_pob_choice: Nebo
  chosen_spanish: Nebo
  lexicon: HALOT
  rationale: Nombre propio transliterado, como en el texto inglés, sin reinterpretarlo.
- source_word: כִּי שֻׁדָּדָה
  english_pob_choice: for it is devastated
  chosen_spanish: porque ha sido devastada
  alternatives_spanish:
  - porque está devastada
  - porque fue devastada
  - porque ha sido destruida
  lexicon: HALOT
  rationale: El pasivo de שׁדד expresa ruina violenta o devastación. «Ha sido devastada» conserva el resultado consumado del juicio sin restringirlo solo a «destruida» o a un sentido de mero saqueo.
- source_word: הֹבִישָׁה
  english_pob_choice: is put to shame
  chosen_spanish: es puesta en vergüenza
  alternatives_spanish:
  - queda avergonzada
  - ha sido avergonzada
  - es avergonzada
  lexicon: HALOT
  rationale: El causativo denota ser llevada a vergüenza o deshonra. «Es puesta en vergüenza» preserva esa pasividad y la relación con el juicio público.
- source_word: נִלְכְּדָה
  english_pob_choice: it is captured
  chosen_spanish: es capturada
  alternatives_spanish:
  - ha sido capturada
  - es tomada
  lexicon: HALOT
  rationale: El nifal de לכד en contexto militar significa ser capturada o tomada. «Es capturada» mantiene la concisión del hebreo y funciona bien en la secuencia poética.
- source_word: קִרְיָתָיִם
  english_pob_choice: Kiriathaim
  chosen_spanish: Kiriatáin
  alternatives_spanish:
  - Quiriataim
  - Kiriataim
  lexicon: HALOT
  rationale: Se translitera el topónimo en una forma española legible. «Kiriatáin» conserva el nombre propio y se adapta a la ortografía española sin intentar traducirlo.
- source_word: הַמִּשְׂגָּב
  english_pob_choice: The stronghold
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - el baluarte
  - Misgab
  lexicon: HALOT
  rationale: El artículo favorece una lectura como sustantivo común. «La fortaleza» es una equivalencia natural en español para el valor de refugio/altura segura, manteniendo la alternativa toponímica en nota.
- source_word: וָחָתָּה
  english_pob_choice: and shattered
  chosen_spanish: y quebrantada
  alternatives_spanish:
  - y derribada
  - y deshecha
  - y desmoronada
  lexicon: HALOT
  rationale: חתת puede expresar ser quebrantado, abatido o dismayed. «Quebrantada» preserva la idea de colapso o deshacimiento bajo juicio y encaja con la cadena de verbos pasivos.
theological_decisions:
- issue: Cómo rendir el encabezado profético con לְ en un oráculo de juicio
  english_pob_reading: Concerning Moab
  chosen_spanish_reading: Con respecto a Moab
  alternative_spanish_readings:
  - Contra Moab
  rationale: Aunque el contenido es claramente de juicio, el hebreo del encabezado usa לְ, que es más amplio que un equivalente estrictamente hostil. «Con respecto a» preserva la formulación del original y deja que el resto del versículo exprese el tono de condena.
  doctrine_reference: Translation philosophy §1, §5
- issue: Si הַמִּשְׂגָּב debe leerse como nombre propio o como sustantivo común
  english_pob_reading: The stronghold
  chosen_spanish_reading: la fortaleza
  alternative_spanish_readings:
  - Misgab
  - el baluarte
  rationale: El artículo definido y el uso léxico favorecen una lectura común. Se mantiene la alternativa toponímica como posibilidad auditada, pero el español base traduce el sentido más directo del hebreo.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje fuente y el texto inglés auditado sin cambios respecto a la última revisión: se mantiene la equivalencia óptima aprobada, con las dos notas alternativas ya documentadas para el encabezado y para הַמִּשְׂגָּב.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - 'Se conserva el paralelismo de verbos pasivos con expresiones españolas naturales: «ha sido devastada / es puesta en vergüenza / es capturada / es puesta en vergüenza y quebrantada».'
  - «Kiriatáin» se emplea como transliteración española estable del topónimo Kiriathaim.
  - No se introduce léxico eclesiástico tradicional que oculte el nombre divino o atenúe el juicio profético.
