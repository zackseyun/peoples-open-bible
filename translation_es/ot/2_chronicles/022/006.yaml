translation:
  language: es
  text: Así volvió a Jezreel para recuperarse[a], a causa de las heridas que le habían causado en Ramá, cuando peleó contra Hazael, rey de Aram. Y Azarías, hijo de Jehoram, rey de Judá, descendió para ver a Jehoram, hijo de Acab, en Jezreel[b], porque estaba enfermo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azarías es el nombre que aparece aquí en Crónicas; en otros lugares, el mismo rey es llamado Ahazías.
    reason: alternative_reading
  - marker: b
    text: 'O: «para visitar a Jehoram».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: So he returned
  chosen_spanish: Así volvió
  alternatives_spanish:
  - Y volvió
  - Entonces volvió
  lexicon: HALOT
  rationale: El hebreo marca secuencia narrativa; en español, "así" mantiene la conexión discursiva sin sobrecargar, y "volvió" expresa el valor básico de שוב con naturalidad.
- source_word: לְהִתְרַפֵּא
  english_pob_choice: to recover
  chosen_spanish: para recuperarse
  alternatives_spanish:
  - para sanarse
  - para ser sanado
  lexicon: HALOT
  rationale: El hitpael aquí indica convalecencia o recuperación de heridas; "recuperarse" es idiomático en español y conserva la idea de restablecimiento.
- source_word: בְיִזְרְעֶאל
  english_pob_choice: to Jezreel / in Jezreel
  chosen_spanish: a Jezreel / en Jezreel
  alternatives_spanish:
  - hasta Jezreel / en Jezreel
  - a Jezreel / dentro de Jezreel
  lexicon: HALOT
  rationale: La primera ocurrencia sigue a un verbo de movimiento, por eso se vierte con "a"; la segunda es locativa y se vierte con "en".
- source_word: כִּי הַמַּכִּים
  english_pob_choice: because of the wounds
  chosen_spanish: a causa de las heridas
  alternatives_spanish:
  - por las heridas
  - debido a las heridas
  lexicon: HALOT
  rationale: El sustantivo puede referirse a golpes o a las lesiones resultantes; en español "heridas" expresa bien el efecto corporal, y la relación causal de כִּי queda clara con "a causa de".
- source_word: אֲשֶׁר הִכֻּהוּ
  english_pob_choice: that they had inflicted on him
  chosen_spanish: que le habían causado
  alternatives_spanish:
  - que le habían dado
  - que le habían infligido
  lexicon: HALOT
  rationale: La construcción verbal señala golpes infligidos por otros; "causado" en combinación con "heridas" transmite el resultado de manera natural sin perder el agente implícito.
- source_word: בָרָמָה
  english_pob_choice: at Ramah
  chosen_spanish: en Ramá
  alternatives_spanish:
  - en Ramá la de Galaad
  - en Ramá
  lexicon: HALOT
  rationale: Nombre propio de lugar; en español los topónimos bíblicos suelen mantenerse con la forma acentuada habitual, y la preposición locativa es "en".
- source_word: בְּהִלָּחֲמוֹ
  english_pob_choice: when he fought
  chosen_spanish: cuando peleó
  alternatives_spanish:
  - mientras peleaba
  - al pelear
  lexicon: HALOT
  rationale: El infinitivo con ב expresa circunstancia temporal; "cuando peleó" es claro y fluido en narrativa histórica.
- source_word: אֶת חֲזָהאֵל מֶלֶךְ אֲרָם
  english_pob_choice: against Hazael king of Aram
  chosen_spanish: contra Hazael, rey de Aram
  alternatives_spanish:
  - con Hazael, rey de Aram
  - frente a Hazael, rey de Aram
  lexicon: HALOT
  rationale: Con לחם, el sentido es luchar contra alguien; "contra" conserva la fuerza del enfrentamiento bélico.
- source_word: וַעֲזַרְיָהוּ
  english_pob_choice: And Azariah
  chosen_spanish: Y Azarías
  alternatives_spanish:
  - Y Ahazías
  lexicon: HALOT
  rationale: Se conserva la forma hebrea del Cronista en español como "Azarías"; no se armoniza con otros pasajes, siguiendo la prioridad del texto fuente. La variante tradicional queda solo como alternativa identificatoria.
- source_word: יָרַד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue
  lexicon: HALOT
  rationale: El verbo ירד es literalmente "bajar / descender"; "descendió" preserva esa dirección y es natural en español bíblico.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para visitar
  - a ver
  lexicon: HALOT
  rationale: El verbo básico es "ver"; en contexto puede equivaler a una visita, pero el texto principal conserva el valor lexical más directo, como hace el POB inglés.
- source_word: יְהוֹרָם בֶּן אַחְאָב
  english_pob_choice: Jehoram son of Ahab
  chosen_spanish: Joram, hijo de Acab
  alternatives_spanish:
  - Jehoram, hijo de Acab
  - Joram, hijo de Ahab
  lexicon: HALOT
  rationale: En español bíblico, "Joram" es la forma más reconocible para este rey en la tradición, mientras que el hebreo admite la variante larga; la nota puede preservar la referencia cuando el lector la necesite.
- source_word: כִּי חֹלֶה הוּא
  english_pob_choice: because he was sick
  chosen_spanish: porque estaba enfermo
  alternatives_spanish:
  - porque estaba mal
  - pues estaba enfermo
  lexicon: HALOT
  rationale: El predicado nominal indica estado de enfermedad; "estaba enfermo" es la equivalencia directa y clara.
theological_decisions:
- issue: Variante onomástica del rey en Crónicas
  english_pob_reading: Retain 'Azariah' in the main text
  chosen_spanish_reading: Retener 'Azarías' en el texto principal
  alternative_spanish_readings:
  - Ahazías
  rationale: No se trata de armonizar pasajes, sino de respetar la forma escrita en este versículo del hebreo de Crónicas. La alternativa tradicional se preserva para transparencia, pero no sustituye al nombre fuente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor del verbo לִרְאוֹת en el contexto de visita
  english_pob_reading: to see / footnote 'Or to visit Jehoram.'
  chosen_spanish_reading: 'para ver / nota: o ''para visitar a Joram'''
  alternative_spanish_readings:
  - para visitar
  - a visitarlo
  rationale: El texto principal mantiene la correspondencia directa con el hebreo "ver", mientras que la lectura contextual de "visitar" se registra como alternativa porque el español la sugiere de manera natural en este escenario narrativo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo de WLC y el audit trail inglés. No se requirieron cambios de revisión posteriores; se mantuvo la lectura fuente con nombres y relaciones léxicas transparentes, evitando armonizar el nombre real con otras crónicas paralelas.
  spanish_consistency_notes:
  - Se usa "Yahvé" como norma general en el proyecto cuando aparezca el Tetragrámaton, aunque este versículo no lo contiene.
  - Se conserva la forma onomástica "Azarías" por fidelidad al hebreo de este verso, con nota explicativa por la variante tradicional "Ahazías".
  - '"Para ver" se mantiene en el texto principal por fidelidad léxica; la lectura idiomática "visitar" queda en nota.'
  - '"Aram" se conserva sin adaptar a otras denominaciones tradicionales, siguiendo la fuente hebrea.'
