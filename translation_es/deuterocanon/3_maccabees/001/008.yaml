translation:
  language: es
  text: Pero cuando los judíos le habían enviado, de parte del consejo de ancianos[a] y de los ancianos, unos hombres para saludarlo, llevarle regalos de hospitalidad[b] y alegrarse por lo que había sucedido, ocurrió que se mostró aún más dispuesto a ir a visitarlos lo antes posible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «senado»; el término griego es γερουσία, un cuerpo institucional de ancianos.
    reason: lexical_alternative
  - marker: b
    text: «Regalos de hospitalidad» traduce ξένια, obsequios asociados con recibir u honrar a un huésped.
    reason: cultural_note
lexical_decisions:
- source_word: διαπεμψαμένων
  english_pob_choice: had sent
  chosen_spanish: habían enviado
  alternatives_spanish:
  - habían despachado
  - habían mandado
  lexicon: LSJ
  rationale: El genitivo absoluto indica una acción previa de los judíos. «Habían enviado» es natural en español y conserva el sentido de remitir mensajeros sin añadir especificaciones no presentes en el griego.
- source_word: γερουσίας
  english_pob_choice: council of elders
  chosen_spanish: asamblea de los ancianos
  alternatives_spanish:
  - consejo de ancianos
  - senado
  lexicon: LSJ
  rationale: La expresión designa un cuerpo institucional de ancianos. «Asamblea de los ancianos» comunica la función colegiada con lenguaje claro en español, evitando tanto el latinismo «senado» como un transliterado innecesario.
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - viejos
  - presbíteros
  lexicon: LSJ
  rationale: Se conserva el término social/gobernante como «ancianos», que en español bíblico es comprensible y no confunde con mera edad biológica.
- source_word: τοὺς ἀσπασομένους αὐτὸν
  english_pob_choice: men to greet him
  chosen_spanish: hombres para saludarlo
  alternatives_spanish:
  - hombres para darle la bienvenida
  - hombres para presentarle sus respetos
  lexicon: LSJ
  rationale: El participio expresa propósito. «Para saludarlo» mantiene el valor básico de ἀσπάζομαι sin sobrecargar con matices ceremoniales no exigidos por el texto.
- source_word: ξένια
  english_pob_choice: gifts of hospitality
  chosen_spanish: regalos de hospitalidad
  alternatives_spanish:
  - obsequios de hospitalidad
  - regalos de huésped
  lexicon: LSJ
  rationale: Se conserva la dimensión cultural de regalos vinculados al trato hospitalario. «Regalos de hospitalidad» es más transparente para el lector español que un genérico «regalos».
- source_word: κομιοῦντας
  english_pob_choice: bring
  chosen_spanish: llevarle
  alternatives_spanish:
  - traerle
  - presentarle
  lexicon: LSJ
  rationale: En español, con destinatario humano, «llevarle» resulta idiomático y refleja el acto de transportar los obsequios hacia el rey.
- source_word: ἐπὶ τοῖς συμβεβηκόσιν
  english_pob_choice: over what had happened
  chosen_spanish: por lo que había sucedido
  alternatives_spanish:
  - ante lo ocurrido
  - a causa de lo sucedido
  lexicon: LSJ
  rationale: La preposición y el participio apuntan al trasfondo de los acontecimientos recientes. «Por lo que había sucedido» permite conectar naturalmente con la alegría mencionada sin especificar más de lo que dice el griego.
- source_word: χαρησομένους
  english_pob_choice: rejoice
  chosen_spanish: alegrarse
  alternatives_spanish:
  - regocijarse
  - gozarse
  lexicon: LSJ
  rationale: El futuro medio participial indica la intención de alegrarse. «Alegrarse» es claro y digno en español, y conserva la tonalidad positiva sin forzar un registro litúrgico.
- source_word: συνέβη
  english_pob_choice: it happened
  chosen_spanish: ocurrió que
  alternatives_spanish:
  - sucedió que
  - resultó que
  lexicon: LSJ
  rationale: Se refleja con mayor literalidad el valor impersonal de συνέβη. «Ocurrió que» es formal y directo, como pide la revisión auditada.
- source_word: μᾶλλον ... προθυμηθῆναι
  english_pob_choice: he became all the more eager
  chosen_spanish: se mostró aún más dispuesto
  alternatives_spanish:
  - se volvió aún más deseoso
  - estuvo aún más dispuesto
  lexicon: LSJ
  rationale: El comparativo intensifica la prontitud o disposición. «Se mostró aún más dispuesto» conserva el matiz volitivo y evita una lectura excesivamente psicológica de «eager».
- source_word: ὡς τάχιστα
  english_pob_choice: as quickly as possible
  chosen_spanish: lo antes posible
  alternatives_spanish:
  - tan pronto como fuera posible
  - con la mayor rapidez posible
  lexicon: LSJ
  rationale: La locución idiomática expresa urgencia. «Lo antes posible» es natural en español actual y transmite con claridad la prisa del desplazamiento.
- source_word: πρὸς αὐτοὺς παραγενέσθαι
  english_pob_choice: to come to them
  chosen_spanish: ir a ellos
  alternatives_spanish:
  - presentarse ante ellos
  - llegar donde ellos
  lexicon: LSJ
  rationale: παραγίνομαι aquí es llegar/acercarse en su presencia. «Ir a ellos» es sobrio y transparente en español, sin añadir formalidad innecesaria.
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail: conservé el valor más directo de συνέβη con «ocurrió que», y traté el par de participios con una construcción final natural en español («hombres para saludarlo, llevarle regalos... y alegrarse...»), evitando una subordinación relativa más pesada. También preservé la distinción entre γερουσία y πρεσβύτεροι mediante dos expresiones distintas en español, sin fusionarlas.'
  spanish_consistency_notes:
  - Usé «ancianos» para πρεσβύτεροι, coherente con el registro bíblico y con el valor social/colegiado del término.
  - Mantuve «hospitalidad» para ξένια siguiendo el matiz cultural del audit trail.
  - Opté por «lo antes posible» para ὡς τάχιστα por naturalidad en español, sin perder la urgencia.
  - No introduje notas al pie porque no era necesario anclar alternativas textuales en este versículo.
