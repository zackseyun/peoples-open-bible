  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה עַתָּ֗ה אָשִׁיב֙ אֶת שבית יַֽעֲקֹ֔ב וְ/רִֽחַמְתִּ֖י כָּל בֵּ֣ית יִשְׂרָאֵ֑ל וְ/קִנֵּאתִ֖י לְ/שֵׁ֥ם קָדְשִֽׁ/י־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/039/025.yaml
  text: 'Therefore thus says the Lord GOD: Now I will restore the fortunes of Jacob[a], and I will have compassion on the whole house of Israel[b], and I will be jealous for my holy name.'
  footnotes:
  - marker: a
    text: Or, 'I will bring back the captives of Jacob.' The Hebrew idiom can refer specifically to return from captivity or more broadly to restoring a people's fortunes.
    reason: alternative_reading
  - marker: b
    text: Or, 'I will be zealous for my holy name.'
    reason: lexical_alternative
