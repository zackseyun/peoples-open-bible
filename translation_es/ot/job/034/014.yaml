translation:
  language: es
  text: Si vuelve su corazón hacia sí mismo[a] y reúne para sí su espíritu y su aliento,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Si vuelve su corazón a esto y reúne para sí su espíritu y su aliento». La expresión hebrea «volver/poner el corazón» puede significar dirigir la atención o el propósito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - En caso de que
  lexicon: HALOT
  rationale: La partícula condicional introduce una proposición hipotética; «Si» es la opción española más directa y natural, sin añadir énfasis inexistente en el hebreo.
- source_word: יָשִׂים
  english_pob_choice: should set
  chosen_spanish: pone
  alternatives_spanish:
  - ponga
  - pusiera
  - dispone
  lexicon: HALOT
  rationale: El hebreo usa el verbo común para «poner/colocar»; en español, «pone» mantiene la acción básica y funciona bien en una condición general. El matiz hipotético queda cubierto por «Si».
- source_word: אֵלָיו
  english_pob_choice: on himself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - a sí mismo
  - sobre sí mismo
  - para sí mismo
  lexicon: HALOT
  rationale: El pronombre con אֶל puede ser reflexivo. En español, «en sí mismo» comunica mejor la dirección interior del «poner el corazón» sin forzar una imagen extraña. Conserva el referente reflexivo señalado en el audit trail inglés.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: Se conserva «corazón» para reflejar el antropologismo hebreo de voluntad, atención e intención, en vez de reemplazarlo por «mente» y perder la imagen original.
- source_word: רוּחוֹ
  english_pob_choice: his spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su aliento
  - su viento
  lexicon: HALOT
  rationale: Aquí רוּחַ se distingue mejor como «espíritu», especialmente al aparecer junto con נִשְׁמָה. «Aliento» puede reservarse para el segundo término, manteniendo la pareja léxica del hebreo.
- source_word: וְנִשְׁמָתוֹ
  english_pob_choice: and his breath
  chosen_spanish: y su aliento
  alternatives_spanish:
  - y su respiración
  - y su hálito
  - y su vida
  lexicon: HALOT
  rationale: נִשְׁמָה suele referir al aliento vital. «Aliento» preserva el paralelismo con רוּחַ como «espíritu» sin fusionar los dos términos, y suena natural en español bíblico contemporáneo.
- source_word: יֶאֱסֹף
  english_pob_choice: gather
  chosen_spanish: reúne
  alternatives_spanish:
  - junta
  - recoge
  - retira
  lexicon: HALOT
  rationale: El verbo אָסַף significa literalmente «juntar/reunir». «Reúne» conserva la imagen verbal de recoger algo para sí, tal como el audit trail inglés optó por «gather» para no adelantarse al matiz interpretativo de «retirar».
theological_decisions:
- issue: Referente reflexivo de los pronombres
  english_pob_reading: All third-person masculine singular pronouns refer to God.
  chosen_spanish_reading: Todos los pronombres masculinos singulares de tercera persona se entienden de Dios, y el primer אֵלָיו se vierte de forma reflexiva como «en sí mismo».
  alternative_spanish_readings:
  - «a él» sin marcar el matiz reflexivo
  - «para sí» como giro menos explícito
  rationale: El contexto de Eliú habla de la soberanía de Dios sobre la vida que da. Mantener una lectura reflexiva en español hace visible la tensión del texto sin diluirla; no se introduce una explicación doctrinal extra que el versículo no expresa.
  doctrine_reference: Soberanía divina sobre la vida y el aliento; mantener la tensión textual sin resolverla más allá del contexto inmediato.
translation_notes:
  revision_awareness: No se requieren cambios respecto del estado revisado más reciente del texto fuente en inglés; se mantiene la misma lectura general, ajustada al español con equivalencia óptima y sin resolver indebidamente la ambigüedad reflexiva.
  spanish_consistency_notes:
  - Se preserva «corazón» para לֵב/לִבּוֹ y «espíritu/aliento» para רוּחַ/נִשְׁמָה, evitando homogeneizar ambos términos.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el Tetragrámaton.
  - «Reúne» conserva la imagen de אָסַף mejor que «retira», que sería más interpretativo.
