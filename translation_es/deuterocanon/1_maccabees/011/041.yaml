translation:
  language: es
  text: Y Jonatán envió a Demetrio el rey, para pedir que expulsara de Jerusalén a los de la ciudadela[a] y a los de las fortalezas; porque estaban combatiendo contra Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «los de la Acra», la ciudadela seleúcida en Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: «Envió» es el verbo narrativo natural y fiel al sentido de ἀπέστειλεν sin introducir matices más fuertes que el griego no exige.
- source_word: πρὸς Δημήτριον τὸν βασιλέα
  english_pob_choice: to Demetrius the king
  chosen_spanish: a Demetrio el rey
  alternatives_spanish:
  - a Demetrio, el rey
  - al rey Demetrio
  lexicon: LSJ
  rationale: Conservo la aposición del título después del nombre, como en el griego y en la traducción inglesa auditada, para reflejar la forma del destinatario sin forzar una reordenación más interpretativa.
- source_word: ἵνα ἐκβάλῃ
  english_pob_choice: asking that he drive out
  chosen_spanish: para pedir que expulsara
  alternatives_spanish:
  - pidiendo que expulsara
  - para que expulsara
  lexicon: LSJ
  rationale: «Expulsara» mantiene la fuerza de ἐκβάλῃ como sacar por la fuerza o echar fuera. Añadir «para pedir que» expresa con naturalidad la función de ἵνα tras un verbo de envío, sin perder el valor de solicitud.
- source_word: τοὺς ἐκ τῆς ἄκρας
  english_pob_choice: those from the citadel
  chosen_spanish: a los de la ciudadela
  alternatives_spanish:
  - a los de la Acra
  - a los hombres de la ciudadela
  lexicon: LSJ
  rationale: «Ciudadela» comunica el valor de ἄκρα como fortaleza/citadela. Conserva la referencia histórica sin exigir transliteración en el texto principal.
- source_word: ἐξ Ἱερουσαλήμ
  english_pob_choice: out of Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - fuera de Jerusalén
  - de dentro de Jerusalén
  lexicon: LSJ
  rationale: En español, «expulsar de Jerusalén» transmite de manera idiomática el movimiento de salida implícito en ἐκ/ἐξ y encaja mejor que una repetición más pesada de «fuera de».
- source_word: τοὺς ἐν τοῖς ὀχυρώμασιν
  english_pob_choice: those in the strongholds
  chosen_spanish: a los de las fortalezas
  alternatives_spanish:
  - a los de los baluartes
  - a los de los lugares fortificados
  lexicon: LSJ
  rationale: «Fortalezas» es una traducción clara y sobria de ὀχυρώματα; mantiene el plural y el carácter militar del término.
- source_word: ἦσαν γὰρ πολεμοῦντες
  english_pob_choice: for they were fighting
  chosen_spanish: porque estaban combatiendo
  alternatives_spanish:
  - porque estaban guerreando
  - pues estaban haciendo guerra
  lexicon: LSJ
  rationale: «Estaban combatiendo» refleja el aspecto durativo del participio perifrástico y su sentido bélico, con un español natural y digno.
- source_word: τὸν Ἰσραήλ
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - frente a Israel
  - en guerra con Israel
  lexicon: LSJ
  rationale: Con πολεμέω, el acusativo indica el adversario; «contra Israel» es la forma idiomática directa en español.
theological_decisions:
- issue: Identificación histórica y política de ἄκρα
  english_pob_reading: those from the citadel, with a footnote noting the Acra, the Seleucid citadel in Jerusalem
  chosen_spanish_reading: los de la ciudadela, con nota sobre la Acra, la ciudadela seleúcida en Jerusalén
  alternative_spanish_readings:
  - la Acra
  - la fortaleza
  rationale: El texto principal usa «ciudadela» para ser legible; la nota preserva la identificación histórica específica que el audit trail inglés documenta, sin perder la referencia al enclave seleúcida.
  doctrine_reference: Historical reference / textual geography
- issue: Valor de πολεμοῦντες
  english_pob_reading: they were fighting against Israel
  chosen_spanish_reading: estaban combatiendo contra Israel
  alternative_spanish_readings:
  - estaban haciendo guerra contra Israel
  - estaban peleando contra Israel
  rationale: «Combatiendo» conserva el sentido militar continuo del participio y evita suavizar el conflicto. No introduce una interpretación teológica adicional.
  doctrine_reference: Narrative warfare terminology
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y el audit trail inglés más reciente: mantiene la aposición «Demetrio el rey», traduce ἐκβάλῃ con un verbo de expulsión, y conserva el aspecto continuo de πολεμοῦντες con una perífrasis verbal natural en español. También preserva la alternativa histórica de ἄκρα en nota, como en el registro inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - Se conserva «Israel» como nombre propio sin artículo, conforme al uso bíblico en español.
  - «Ciudadela» y no «Acra» en el texto principal evita una transliteración innecesaria, pero la nota mantiene la precisión histórica.
  - No se emplea «SEÑOR» ni terminología eclesiástica ajena al pasaje.
  - El participio perifrástico se traduce con «estaban combatiendo» para sostener el valor durativo.
