translation:
  language: es
  text: Un miktam de David. Consérvame[a], Dios, porque en ti me refugio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo miktam, encabezado poético de sentido incierto; puede designar un tipo de composición. Algunas versiones lo traducen como 'salmo' o 'cántico de oro'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכְתָּם
  english_pob_choice: miktam
  chosen_spanish: miktam
  alternatives_spanish:
  - salmo
  - cántico de oro
  lexicon: Hebrew heading term of uncertain meaning
  rationale: Se conserva el término transliterado porque la POB inglesa también lo mantiene como encabezado técnico de sentido incierto. En español, 'miktam' comunica mejor la falta de certeza léxica que una glosa interpretativa demasiado fuerte.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - a David
  lexicon: Superscription construction
  rationale: La preposición española 'de' refleja con naturalidad la relación titular de la superscripción sin añadir una función no explicitada por el hebreo.
- source_word: שָׁמְרֵנִי
  english_pob_choice: Preserve me
  chosen_spanish: Consérvame
  alternatives_spanish:
  - Guárdame
  - Protégeme
  lexicon: שׁמר
  rationale: '''Consérvame'' reproduce la idea de guardar/preservar sin forzar un matiz exclusivamente militar. Mantiene el imperativo breve y solemne del hebreo y del inglés POB.'
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mío
  - Oh Dios
  lexicon: אֵל
  rationale: Se traduce con 'Dios', que es el equivalente directo y registrado en la terminología base del proyecto para אֱלֹהִים/אֵל cuando no hay necesidad de matizar nombre propio divino.
- source_word: חָסִיתִי בָךְ
  english_pob_choice: I take refuge in you
  chosen_spanish: en ti me refugio
  alternatives_spanish:
  - me refugio en ti
  - he buscado refugio en ti
  lexicon: חסה
  rationale: '''Me refugio en ti'' expresa el sentido claro del verbo, pero el orden ''en ti me refugio'' conserva la cadencia del hebreo y la relación preposicional del acto de confiar/refugiarse. Se evita ''he buscado refugio'' porque introduce un aspecto no necesario del presente verbal hebreo.'
theological_decisions:
- issue: Tratamiento del encabezado poético con texto oracional inmediato
  english_pob_reading: A miktam of David. Preserve me, God, for I take refuge in you.
  chosen_spanish_reading: Un miktam de David. Consérvame, Dios, porque en ti me refugio.
  alternative_spanish_readings:
  - Un miktam de David. Guárdame, Dios, porque en ti me refugio.
  - Un miktam de David. Protégeme, Dios, porque en ti me refugio.
  rationale: La revisión inglesa restablece la petición del verso junto con la superscripción. El español sigue esa estructura sin separar artificialmente encabezado y oración. 'Consérvame' mantiene la petición directa de preservación sin ampliar el sentido doctrinal.
  doctrine_reference: Psalm heading superscriptions; divine preservation and refuge language
- issue: Refugio personal en Dios
  english_pob_reading: for I take refuge in you
  chosen_spanish_reading: porque en ti me refugio
  alternative_spanish_readings:
  - pues en ti me refugio
  - porque me refugio en ti
  rationale: La formulación preserva la confesión de dependencia y protección en Dios, sin añadir contenido de confianza subjetiva que no esté en el hebreo. Se mantiene el presente durativo/gnómico natural del español.
  doctrine_reference: Biblical theology of refuge in God (cf. Psalms)
translation_notes:
  revision_awareness: La versión inglesa revisada añadió el contenido del versículo después de la superscripción, pasando de un simple encabezado a 'A miktam of David. Preserve me, God, for I take refuge in you.' Esta traducción española refleja esa corrección textual y no deja fuera la oración principal.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֵל conforme al léxico base del proyecto.
  - Se conserva 'miktam' transliterado en el cuerpo y se aclara en nota porque el término es técnicamente incierto.
  - La puntuación separa la superscripción del ruego sin convertirlo en dos versículos distintos.
  - No se emplea 'SEÑOR' para el nombre divino, porque aquí el texto fuente dice אֵל, no יהוה.
