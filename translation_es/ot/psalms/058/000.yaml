translation:
  language: es
  text: 'Al director del coro: “No Destruyas”.[a] De David. Un miktam.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse como “según ‘No Destruyas’”, si la frase especifica más explícitamente la melodía o el acompañamiento musical.
    reason: alternative_reading
  - marker: b
    text: El término hebreo miktam es una etiqueta de salmo de sentido incierto; puede señalar un tipo de composición o una indicación musical.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director del coro
  - Al maestro de canto
  lexicon: HALOT
  rationale: La fórmula de encabezado apunta a la persona que dirige la ejecución musical. “Director del coro” comunica bien la función litúrgico-musical en español sin forzar una autoría ni un matiz técnico innecesario.
- source_word: אַל תַּשְׁחֵת
  english_pob_choice: “Do Not Destroy”
  chosen_spanish: “No destruyas”
  alternatives_spanish:
  - “No destruyas”
  - “No destruyas esto”
  - “No destruyas”
  lexicon: HALOT
  rationale: El hebreo admite con naturalidad la lectura de título o indicación musical. En español, mantenerlo como una frase entre comillas preserva ese valor de rótulo/canción sin convertirlo en un mandato directo dentro del salmo.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: La preposición lamed en estos encabezados es ambigua entre pertenencia, dedicación y asociación. “De David” conserva mejor esa ambigüedad que una solución más fuerte como “Por David”.
- source_word: מִכְתָּם
  english_pob_choice: A miktam
  chosen_spanish: Un miktam
  alternatives_spanish:
  - Un Miktam
  - Un poema miktam
  - Un salmo de oro
  lexicon: HALOT
  rationale: El término es oscuro y funciona como etiqueta literaria o musical. La transliteración evita una traducción especulativa y mantiene visible la incertidumbre del hebreo.
theological_decisions:
- issue: Naturaleza del encabezado del salmo
  english_pob_reading: Treat the line as canonical superscription metadata within the verse and render the musical/literary labels transparently.
  chosen_spanish_reading: Tratar la línea como metadato canónico del encabezado del salmo y traducir sus rótulos musicales/literarios con transparencia.
  alternative_spanish_readings:
  - Leer אַל תַּשְׁחֵת como imperativo directo dentro del contenido del salmo
  - 'Interpretar לְדָוִד como autoría explícita: “Escrito por David”'
  rationale: No hay una cuestión doctrinal mayor, pero sí una decisión de fidelidad al género. La versión española conserva la ambigüedad del hebreo y no exagera una autoría ni un sentido imperativo que el texto no fija con claridad.
  doctrine_reference: 'Translation philosophy: precisión textual, prudencia ante la ambigüedad, y respeto por el género de las superscripciones salmódicas.'
translation_notes:
  revision_awareness: 'La revisión más reciente no exigió cambios; se tuvo en cuenta además la corrección de ubicación de notas: la nota [a] debe ir junto a “No destruyas” y la nota [b] junto a “miktam”.'
  spanish_consistency_notes:
  - Se usa “Dios”/“Yahvé” según corresponda en otros contextos, pero aquí no aparecen.
  - Se evita “SEÑOR” porque el texto es una superscripción y el hebreo no contiene el nombre divino.
  - Se mantiene un registro bíblico digno y natural, evitando calcos como “al líder” o “no corrompas”.
