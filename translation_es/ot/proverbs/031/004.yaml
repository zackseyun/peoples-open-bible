translation:
  language: es
  text: No es para los reyes[a], Lemuel, no es para los reyes beber vino, ni para los gobernantes desear bebida fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «ni para los gobernantes: ¿dónde está la bebida fuerte?». La expresión hebrea es breve y puede describir a gobernantes que buscan bebida embriagante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / לַמְלָכִים
  english_pob_choice: It is not for kings
  chosen_spanish: No es para los reyes
  alternatives_spanish:
  - No corresponde a los reyes
  - No es propio de los reyes
  lexicon: HALOT
  rationale: La construcción hebrea expresa idoneidad o conveniencia, no solo prohibición. En español, 'No es para' comunica bien esa falta de pertinencia y conserva el paralelismo repetido.
- source_word: לְמוֹאֵל
  english_pob_choice: O Lemuel
  chosen_spanish: oh Lemuel
  alternatives_spanish:
  - Lemuel
  lexicon: HALOT
  rationale: Es un vocativo directo. 'Oh' reproduce la fuerza apelativa sin sobrerrepresentar el hebreo.
- source_word: שְׁתוֹ יָיִן
  english_pob_choice: to drink wine
  chosen_spanish: beber vino
  alternatives_spanish:
  - tomar vino
  - beber del vino
  lexicon: HALOT
  rationale: El infinitivo funciona naturalmente en español como verbo de acción dentro de la frase de conveniencia. 'Beber vino' mantiene la sencillez y el paralelismo poético.
- source_word: וּלְרוֹזְנִים
  english_pob_choice: nor for rulers
  chosen_spanish: ni para los gobernantes
  alternatives_spanish:
  - ni para los príncipes
  - ni para los dignatarios
  lexicon: HALOT
  rationale: רוֹזְנִים refiere a altos funcionarios o gobernantes. 'Gobernantes' es claro en español moderno y conserva el contraste con 'reyes'.
- source_word: שֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: licor fuerte
  alternatives_spanish:
  - bebida embriagante
  - bebida fuerte
  lexicon: HALOT
  rationale: '''Licor fuerte'' transmite la idea de bebida intoxicante distinta del vino. Se evita ''cerveza'' porque el término hebreo es más amplio.'
translation_notes:
  revision_awareness: La base inglesa revisó 'crave' por 'desire' para dar un registro más formal; en español se reflejó con 'desear', que mantiene la tensión entre la lectura idiomática y la posibilidad más literal sugerida por la nota inglesa.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo 'No es para... no es para...' como reflejo de la estructura hebrea y de la decisión inglesa.
  - '''Gobernantes'' se usa como equivalente neutral de רוֹזְנִים, sin imponer un término eclesiástico.'
  - La nota al pie queda anclada únicamente en '[a]' dentro del texto para cumplir la validación.
