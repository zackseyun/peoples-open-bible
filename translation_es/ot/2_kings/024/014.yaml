translation:
  language: es
  text: Y deportó[a] a toda Jerusalén, y a todos los oficiales, y a todos los valientes guerreros, diez mil cautivos, y a todos los artesanos y a los herreros[b]; no quedó nadie, sino los más pobres del pueblo de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Deportó» traduce el movimiento forzado al exilio. La alternativa «llevó al exilio» también sería posible, pero «deportó» conserva mejor el matiz histórico de remoción por poder imperial.
    reason: lexical_alternative
  - marker: b
    text: O «los trabajadores del metal»; el término hebreo tradicionalmente traducido «herreros» puede referirse más ampliamente a obreros especializados en metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִגְלָה
  english_pob_choice: carried away
  chosen_spanish: deportó
  alternatives_spanish:
  - llevó al exilio
  - se llevó en cautiverio
  lexicon: HALOT
  rationale: El hebreo hiphil de גלה indica hacer salir al exilio por la fuerza. En español, «deportó» comunica bien la remoción forzada y mantiene el sentido histórico sin sonar como una simple traslación física.
- source_word: כָּל יְרוּשָׁלִַם
  english_pob_choice: all Jerusalem
  chosen_spanish: toda Jerusalén
  alternatives_spanish:
  - toda la gente de Jerusalén
  - la totalidad de Jerusalén
  lexicon: HALOT
  rationale: 'La expresión es metonímica: se refiere a los habitantes y la estructura dirigente de la ciudad. «Toda Jerusalén» conserva esa forma compacta y fiel al hebreo, como en el POB inglés.'
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los gobernantes
  lexicon: HALOT
  rationale: En este contexto de deportación, שָׂרִים nombra a la élite administrativa o gobernante. «Oficiales» evita restringir indebidamente el término a príncipes dinásticos.
- source_word: גִּבּוֹרֵי הַחַיִל
  english_pob_choice: the mighty men of valor
  chosen_spanish: los valientes guerreros
  alternatives_spanish:
  - los hombres valientes de guerra
  - los guerreros poderosos
  lexicon: HALOT
  rationale: La expresión designa a combatientes capaces y valientes. En español, «valientes guerreros» mantiene el tono elevado del original y resulta natural; «hombres poderosos de valor» sonaría forzado.
- source_word: עשרה אֲלָפִים גּוֹלֶה
  english_pob_choice: ten thousand captives
  chosen_spanish: diez mil cautivos
  alternatives_spanish:
  - diez mil exiliados
  - diez mil desterrados
  lexicon: HALOT
  rationale: Aunque גּוֹלֶה puede expresar condición de exilio, aquí funciona colectivamente para los deportados. «Cautivos» comunica con fuerza la remoción forzada en un relato militar; la alternativa «exiliados» es viable pero menos inmediata.
- source_word: הֶחָרָשׁ
  english_pob_choice: the craftsmen
  chosen_spanish: los artesanos
  alternatives_spanish:
  - los obreros especializados
  - los oficios
  lexicon: HALOT
  rationale: חָרָשׁ abarca al trabajador hábil o artesano. «Artesanos» es una equivalencia natural en español y conserva la amplitud del término.
- source_word: הַמַּסְגֵּר
  english_pob_choice: the smiths
  chosen_spanish: los herreros
  alternatives_spanish:
  - los metalworkers / metalúrgicos
  - los orfebres
  lexicon: HALOT
  rationale: El término probablemente se refiere a trabajadores del metal; el POB inglés mantiene «smiths» con nota. «Herreros» es el equivalente español más directo y tradicional para esa idea, sin cerrar del todo la posibilidad de un sentido más amplio.
- source_word: לֹא נִשְׁאַר
  english_pob_choice: none remained
  chosen_spanish: no quedó nadie
  alternatives_spanish:
  - no permaneció nadie
  - nadie quedó
  lexicon: HALOT
  rationale: La construcción expresa que no quedó nadie atrás. «No quedó nadie» es la forma natural y directa en español.
- source_word: זוּלַת דַּלַּת עַם הָאָרֶץ
  english_pob_choice: except the poorest of the people of the land
  chosen_spanish: sino la gente más pobre de la tierra
  alternatives_spanish:
  - excepto los más pobres del pueblo de la tierra
  - salvo la población más pobre del país
  lexicon: HALOT
  rationale: דַּלַּת indica la porción pobre o débil de la población. «La gente más pobre de la tierra» conserva el giro hebreo «pueblo de la tierra» y expresa bien la exclusión partitiva; se evita una paráfrasis más interpretativa.
translation_notes:
  revision_awareness: Se mantuvo la lectura del POB inglés como marco de control, pero se ajustó la sintaxis al español natural. No se introdujeron cambios doctrinales ni se amplió el alcance semántico más allá de lo respaldado por el hebreo y la solución inglesa auditada.
  spanish_consistency_notes:
  - Se preservó «Yahvé» solo cuando el texto fuente lo exigiera; aquí no aparece.
  - Se evitó «Cristo» porque no hay lenguaje mesiánico en este versículo.
  - Se mantuvo la distinción entre deportación/exilio y cautiverio con una opción española idiomática.
  - Se conservó la enumeración paralela del hebreo para reflejar el ritmo del original.
