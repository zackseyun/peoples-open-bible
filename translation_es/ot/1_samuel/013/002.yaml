    text: Or 'every man to his tent.' The Hebrew uses a common idiom for dismissing people to their own dwellings.
    reason: lexical_alternative
  - marker: b
    text: Or 'and on the hill of Bethel.' The Hebrew phrase may refer either to the hill country around Bethel or to a specific elevated area near Bethel.
    reason: lexical_alternative
