translation:
  language: es
  text: y en el lugar del forúnculo hay una hinchazón blanca o una mancha brillante blanquecina y rojiza, y se mostrará[a] al sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y aparecerá ante el sacerdote'. El hebreo puede rendirse más literalmente como 'ser visto', pero aquí probablemente se refiere a ser presentado para la inspección sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - y existe
  - y se presenta
  lexicon: HALOT
  rationale: En este contexto diagnóstico, el hebreo marca la aparición de una condición en el sitio afectado. En español, 'hay' comunica de forma natural y precisa la existencia de la lesión sin introducir una lectura dinámica excesiva.
- source_word: בִּמְקוֹם
  english_pob_choice: in the place of
  chosen_spanish: en el lugar de
  alternatives_spanish:
  - en el sitio de
  - en el punto de
  lexicon: HALOT
  rationale: '''En el lugar de'' conserva la relación locativa y el contraste con la lesión previa, manteniendo la cercanía formal del hebreo.'
- source_word: הַשְּׁחִין
  english_pob_choice: the boil
  chosen_spanish: el forúnculo
  alternatives_spanish:
  - la llaga
  - el hervor
  lexicon: HALOT
  rationale: El término hebreo designa una lesión tipo absceso o forúnculo. 'Forúnculo' es clínicamente más exacto en español que un genérico como 'llaga' y evita suavizar el sentido.
- source_word: שְׂאֵת
  english_pob_choice: swelling
  chosen_spanish: hinchazón
  alternatives_spanish:
  - elevación
  - tumefacción
  lexicon: HALOT
  rationale: En Levítico 13 el término describe una lesión levantada de la piel. 'Hinchazón' transmite bien la idea de abultamiento visible y es natural en español médico general.
- source_word: בַהֶרֶת
  english_pob_choice: bright spot
  chosen_spanish: mancha brillante
  alternatives_spanish:
  - mancha luminosa
  - placa brillante
  lexicon: HALOT
  rationale: '''Bright spot'' en este capítulo nombra una marca cutánea conspicua. ''Mancha brillante'' preserva el valor visual sin recurrir a una terminología demasiado técnica o interpretativa.'
- source_word: אֲדַמְדָּמֶת
  english_pob_choice: reddish-white
  chosen_spanish: blanco rojiza
  alternatives_spanish:
  - rojiza-blanca
  - blanca y rojiza
  lexicon: HALOT
  rationale: El adjetivo indica un tono rojizo. En español, colocarlo pospuesto como 'blanco rojiza' conserva la tensión cromática del hebreo y evita cerrar demasiado la ambigüedad diagnóstica.
- source_word: וְנִרְאָה
  english_pob_choice: it shall be shown
  chosen_spanish: se mostrará
  alternatives_spanish:
  - será presentado
  - se verá
  lexicon: HALOT
  rationale: Aunque el hebreo puede traducirse literalmente 'ser visto', en este contexto legal el caso se presenta para inspección sacerdotal. 'Se mostrará' conserva la voz pasiva y la fuerza procedimental que ya documenta el POB inglés.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - ante el sacerdote
  - para el sacerdote
  lexicon: HALOT
  rationale: La preposición indica presentación dirigida al sacerdote para examen. 'Al sacerdote' es la forma española más natural y mantiene la función ritual-jurídica del pasaje.
translation_notes:
  revision_awareness: Se siguió la revisión del POB inglés que prefirió 'there is' frente a una formulación más dinámica, y se mantuvo la simple coordinación con 'y' para reflejar el hebreo וְ. También se preservó la nota de ambigüedad de וְנִרְאָה con una nota al pie anclada en el verbo.
  spanish_consistency_notes:
  - Se mantuvo el registro legal-diagnóstico propio de Levítico 13.
  - Se evitó 'SEÑOR' y otros sustitutos no pertinentes, ya que este versículo no contiene el Tetragrámaton.
  - '''Al sacerdote'' conserva la orientación ritual del hebreo sin añadir inferencias doctrinales.'
  - La combinación 'mancha brillante blanco rojiza' intenta reflejar el doble matiz cromático del hebreo sin resolverlo de modo excesivo.
