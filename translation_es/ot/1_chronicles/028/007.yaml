translation:
  language: es
  text: Y yo estableceré su reino para siempre[a], si él se mantiene firme[b] en hacer mis mandamientos y mis juicios, como en este día[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confirmaré» o «haré firme» su reino.
    reason: lexical_alternative
  - marker: b
    text: O «está fuerte», «está resuelto» o «está firme» en hacer mis mandamientos y mis juicios.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «como en este día», es decir, como ocurre ahora.'
    reason: cultural_note
lexical_decisions:
- source_word: וַהֲכִינוֹתִי
  english_pob_choice: And I will establish
  chosen_spanish: Y yo estableceré
  alternatives_spanish:
  - Y yo confirmaré
  - Y yo haré firme
  lexicon: HALOT
  rationale: El hifil de כון expresa hacer firme o establecer. En español, «estableceré» es natural, solemne y mantiene la idea de fijar con estabilidad la realeza.
- source_word: מַלְכוּתוֹ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su realeza
  - su reinado
  lexicon: HALOT
  rationale: En este contexto dinástico, «reino» comunica bien la realidad política y dinástica del término, sin estrecharlo solo a la función de reinar.
- source_word: עַד לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por la eternidad
  lexicon: HALOT
  rationale: La expresión denota permanencia indefinida. «Para siempre» es la forma española más clara y fiel al valor de perpetuidad.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - con tal que
  - en caso de que
  lexicon: HALOT
  rationale: La partícula introduce una condición directa; «si» conserva esa fuerza sin suavizarla.
- source_word: יֶחֱזַק
  english_pob_choice: he is strong
  chosen_spanish: él está firme
  alternatives_spanish:
  - él es fuerte
  - él se mantiene firme
  - él es resuelto
  lexicon: HALOT
  rationale: Aquí חזק comunica firmeza o constancia para obedecer. «Está firme» preserva la idea de estabilidad de ánimo y conducta, y evita reducirlo a mera fuerza física.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para cumplir
  - para llevar a cabo
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «hacer». «Para hacer» conserva la proximidad al original y funciona de modo natural con la expresión siguiente.
- source_word: מִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis órdenes
  - mis preceptos
  lexicon: HALOT
  rationale: «Mandamientos» conserva el tono formal y pactal del sustantivo, y en español bíblico resulta claro y reconocible.
- source_word: וּמִשְׁפָּטַי
  english_pob_choice: and my judgments
  chosen_spanish: y mis juicios
  alternatives_spanish:
  - y mis ordenanzas
  - y mis decretos
  - y mis normas
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse a juicios, decisiones legales u ordenanzas. «Juicios» mantiene la fuerza jurídica del término y su paralelismo con «mandamientos».
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as at this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como hasta el día de hoy
  - como hoy
  lexicon: HALOT
  rationale: La frase idiomática alude al estado presente. «Como en este día» conserva la literalidad idiomática y permite leer la observación temporal sin expandirla demasiado.
theological_decisions:
- issue: Condicionalidad de la promesa sobre el reino de Salomón
  english_pob_reading: 'The verse is rendered with an explicit condition: the establishment of his kingdom is stated as contingent on his continuing obedience.'
  chosen_spanish_reading: 'La promesa se presenta con condición explícita: el establecimiento de su reino depende de que él permanezca firme para obedecer.'
  alternative_spanish_readings:
  - Una formulación menos explícita que suavice la condición y la vuelva mera descripción
  - Una lectura que armonice el verso con otras promesas davídicas incondicionales
  rationale: El אִם hebreo introduce una condición real, y la traducción debe conservar esa tensión teológica. No conviene diluirla para armonizar el pasaje con otros textos, porque la labor de la traducción es preservar lo que este verso afirma.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y la revisión inglesa más reciente: conserva la condición explícita, usa un verbo español natural para וַהֲכִינוֹתִי («estableceré»), y refleja el ajuste editorial de «he is strong» con una expresión de firmeza en español («está firme»).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino explícito.
  - «Mandamientos» y «juicios» conservan el paralelismo legal del hebreo.
  - La nota [c] preserva el matiz idiomático temporal sin convertirlo en paráfrasis explicativa dentro del texto principal.
  - La redacción principal evita «Cristo», «SEÑOR» y otros sustitutos no presentes en el hebreo de este versículo.
