  text: 'καὶ ὁ ζῶν— καὶ ἐγενόμην νεκρὸς καὶ ἰδοὺ ζῶν εἰμι εἰς τοὺς αἰῶνας τῶν ⸀αἰώνων— καὶ ἔχω τὰς κλεῖς τοῦ θανάτου καὶ τοῦ ᾅδου.'
base_translation:
  language: en
  yaml_path: translation/nt/revelation/001/018.yaml
  text: 'and the Living One—I became dead[a], and behold[c][b], I am alive forever and ever—and I have the keys of death and of Hades.'
  footnotes:
  - marker: a
    text: Or, more literally, 'I was dead'; the Greek says 'I became dead,' emphasizing the transition into death.
    reason: lexical_alternative
  - marker: b
    text: Greek 'to the ages of the ages,' an idiom meaning unending duration.
    reason: lexical_alternative
  - marker: c
    text: '''Hades'' refers to the realm of the dead, not specifically to final punishment.'
    reason: alternative_reading
translation:
  language: ko
  text: '곧 살아 있는 자이다. 나는 죽었었으나 보라, 영원무궁토록 살아 있다[a]. 그리고 나는 죽음과 하데스[b]의 열쇠를 가지고 있다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어는 「세세의 세세에」라는 끝없는 지속을 가리키는 관용어를 사용한다.'
    reason: lexical_alternative
  - marker: b
    text: '「하데스」는 죽은 자들의 영역을 가리키며, 최후 형벌의 장소를 특정하는 것은 아니다.'
    reason: alternative_reading
lexical_decisions:
- source_word: ᾅδου
  english_pob_choice: Hades
  chosen_korean: 하데스
  alternatives_korean:
  - 음부
  lexicon: BDAG
  rationale: '헬라어 ᾅδης를 음역으로 보존하여 죽은 자들의 영역을 가리키는 원어를 그대로 살린다. 전통적 「음부」가 한국 독자에게 「지옥」으로 오해되는 것을 피한다.'
