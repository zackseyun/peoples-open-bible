translation:
  language: es
  text: 'Entonces Joab dijo al hombre que le había informado[a]: «Mira, tú lo viste[b]; ¿por qué, entonces, no lo heriste allí, al suelo? Y yo te habría dado diez piezas[c] de plata y un cinturón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el hombre que informaba/contaba»; el participio con artículo funciona de manera sustantivada y puede entenderse como «el que había dado el informe».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Mira, viste». El pronombre objeto se sobreentiende por el contexto; se explicita en español para evitar ambigüedad.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «diez plata»; no se especifica la unidad, así que «piezas» se añade para que el español suene natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאִישׁ הַמַּגִּיד לוֹ
  english_pob_choice: to the man who had told him
  chosen_spanish: al hombre que le había informado
  alternatives_spanish:
  - al hombre que le había contado
  - al hombre que le había dicho
  lexicon: HALOT
  rationale: El participio sustantivado con artículo presenta al hombre como el que comunica la noticia. «Informado» conserva el valor de reporte previo sin sonar tan técnico como «reportado», y «le había» mantiene la anterioridad del acto.
- source_word: וְהִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira aquí
  lexicon: HALOT
  rationale: La interjección introduce la respuesta enfática de Joab. «Mira» reproduce la fuerza deíctica con español natural y digno.
- source_word: רָאִיתָ
  english_pob_choice: you saw him
  chosen_spanish: tú lo viste
  alternatives_spanish:
  - lo viste
  - tú viste
  lexicon: HALOT
  rationale: El objeto está implícito en el contexto y puede suplirse legítimamente en español; «lo» evita ambigüedad y conserva la referencia conocida en el discurso.
- source_word: הִכִּיתוֹ
  english_pob_choice: strike him
  chosen_spanish: lo heriste
  alternatives_spanish:
  - lo golpeaste
  - lo derribaste
  lexicon: HALOT
  rationale: נכה admite «herir/golpear/derribar» según contexto. Aquí el sentido apunta a asestarle un golpe decisivo; «heriste» mantiene la fuerza verbal sin adelantar de más la interpretación de muerte, que el contexto sugiere pero el hebreo no verbaliza explícitamente.
- source_word: שָׁם אָרְצָה
  english_pob_choice: there to the ground
  chosen_spanish: allí, en tierra
  alternatives_spanish:
  - allí, a tierra
  - allí, al suelo
  - allí, en el suelo
  lexicon: HALOT
  rationale: La expresión combina lugar y dirección hacia la tierra. «Allí, en tierra» conserva ambos elementos de modo natural en español y evita calcar torpemente «a la tierra».
- source_word: וְעָלַי לָתֶת לְךָ
  english_pob_choice: And I would have given you
  chosen_spanish: Y yo te habría dado
  alternatives_spanish:
  - Y me habría tocado darte
  - Y habría sido mi deber darte
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente coloca la obligación «sobre mí»; el inglés POB optó por una formulación directa en pasado condicional. En español, «te habría dado» comunica esa consecuencia hipotética con claridad, sin perder el sentido de concesión pendiente.
- source_word: עֲשָׂרָה כֶסֶף
  english_pob_choice: ten pieces of silver
  chosen_spanish: diez piezas de plata
  alternatives_spanish:
  - diez monedas de plata
  - diez plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente «diez plata», sin especificar la unidad. «Piezas de plata» es una suplencia transparente y natural; «plata» mantiene el material y evita precisar una moneda no indicada por el texto.
- source_word: וַחֲגֹרָה אֶחָת
  english_pob_choice: one belt
  chosen_spanish: y un cinturón
  alternatives_spanish:
  - y un cinturón más
  - y una faja
  - y un cinto
  lexicon: HALOT
  rationale: חֲגֹרָה designa un cinturón/cinto/faja. «Cinturón» es el equivalente moderno más claro para lectura bíblica en español; el numeral se preserva con «un».
translation_notes:
  revision_awareness: 'Se siguió el pasaje revisado del audit trail: se evitó añadir «abajo» o «derribarlo» como intensificación interpretativa, y se mantuvo la forma directa «yo te habría dado» en lugar de una perífrasis de obligación. La traducción española refleja esa simplificación revisada y conserva el orden discursivo del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «plata» en vez de «dinero» para respetar el sustantivo concreto del hebreo.
  - Se eligió «cinturón» como equivalente idiomático de חֲגֹרָה, sin convertirlo en término eclesiástico.
  - La colocación «allí, en tierra» conserva la localización y el movimiento implícito sin sobrerinterpretar el verbo hebreo.
  - El tono es directo y dialogal, acorde con la recriminación de Joab.
