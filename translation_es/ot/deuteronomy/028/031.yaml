  yaml_path: translation/ot/deuteronomy/028/031.yaml
  text: Your ox will be slaughtered before your eyes[a], but you will not eat any of it; your donkey will be seized from before you and will not be returned to you; your flock will be given to your enemies[b], and there will be no one to save you.
