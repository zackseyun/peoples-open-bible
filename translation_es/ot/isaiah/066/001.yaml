revisions:
- from: 'Así dice Yahvé: El cielo es mi trono[a], y la tierra es el estrado de mis pies. ¿Qué clase de casa construirían para mí[b], y qué lugar sería mi lugar de descanso[c]?'
  to: 'Así dice Yahvé: El cielo es mi trono, y la tierra es el estrado para mis pies. ¿Qué clase de casa[a][b] construirían para mí, y cuál sería el lugar de mi descanso[c]?'
  rationale: Se corrigen las notas para que coincidan con el expediente inglés y con los anclajes apropiados en el texto; se elimina la redundancia de «qué lugar sería mi lugar de descanso» mediante una formulación más natural y fiel («cuál sería el lugar de mi descanso»); y se suaviza «el estrado de mis pies» a «el estrado para mis pies» para mejor español sin perder la imagen original.
  reviewer_model: gpt-5.4
