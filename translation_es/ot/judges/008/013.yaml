translation:
  language: es
  text: Entonces Gedeón hijo de Joás regresó de la batalla por la subida de Heres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «de la subida del sol». La frase hebrea es difícil, y הֶחָרֶס puede entenderse como un nombre de lugar («Heres») o como «el sol».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: Then ... returned
  chosen_spanish: Entonces ... regresó
  alternatives_spanish:
  - Y ... volvió
  - Entonces ... volvió
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; en español, «Entonces» conserva el progreso narrativo y «regresó» expresa el movimiento de vuelta de manera natural y fiel al valor básico de שוב.
- source_word: גִּדְעוֹן
  english_pob_choice: Gideon
  chosen_spanish: Gedeón
  alternatives_spanish:
  - Gideón
  lexicon: convención española bíblica
  rationale: Se usa la forma española estable y reconocible del nombre propio, sin afectar el referente.
- source_word: בֶּן יוֹאָשׁ
  english_pob_choice: son of Joash
  chosen_spanish: hijo de Joás
  alternatives_spanish:
  - el hijo de Joás
  lexicon: patronímico hebreo
  rationale: El patronímico se vierte de forma directa con «hijo de», manteniendo la relación filial sin añadir artículo innecesario.
- source_word: מִן הַמִּלְחָמָה
  english_pob_choice: from the battle
  chosen_spanish: de la batalla
  alternatives_spanish:
  - desde la batalla
  - de la guerra
  lexicon: HALOT
  rationale: En este contexto narrativo concreto, מִלְחָמָה se refiere a un combate específico; «de la batalla» conserva ese sentido más preciso que «guerra».
- source_word: מִלְמַעֲלֵה
  english_pob_choice: by the ascent of
  chosen_spanish: por la subida de
  alternatives_spanish:
  - por la ascensión de
  - desde la subida de
  - por el ascenso de
  lexicon: HALOT
  rationale: La expresión topográfica en español se expresa de forma natural con «por la subida de», que conserva la idea de un paso o pendiente sin decidir en exceso el matiz direccional.
- source_word: הֶחָרֶס
  english_pob_choice: Heres
  chosen_spanish: Heres
  alternatives_spanish:
  - el sol
  - Hares
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado en el texto principal para preservar la ambigüedad del hebreo entre un topónimo y la lectura «sol», tal como refleja el aparato auditado.
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en la última revisión; no se registran revisiones aplicadas. La propuesta española sigue esa lectura base y conserva la misma ambigüedad textual en una nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Regresó» y no «volvió» para reflejar con claridad el retorno narrativo sin sonar arcaico.
  - Se preserva la ambigüedad de הֶחָרֶס mediante nota, sin fijar interpretaciones no decididas por el aparato.
