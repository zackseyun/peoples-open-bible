translation:
  language: es
  text: y que ellos te conozcan[a], así como también nosotros te conocimos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego del primer miembro (ἐπιγνώτωσάν) puede sugerir un conocer más pleno o más decisivo que el del segundo miembro (ἔγνωμεν); el español conserva la comparación con un mismo verbo para no forzar una diferencia que el contexto no desarrolla explícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνώτωσάν
  english_pob_choice: may they know
  chosen_spanish: que ellos te conozcan
  alternatives_spanish:
  - que ellos te reconozcan
  - que ellos lleguen a conocerte
  - que ellos te conozcan plenamente
  lexicon: BDAG
  rationale: El aoristo imperativo de ἐπιγινώσκω puede sugerir un conocer más pleno o más definitivo que γινώσκω. En español, "conozcan" conserva la naturalidad y permite que la comparación con el segundo verbo mantenga la tensión sin forzar una paráfrasis demasiado explícita.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - te
  lexicon: BDAG
  rationale: Pronombre de objeto directo en segunda persona singular; "te" es la forma natural en español y mantiene el tono de oración dirigida a Dios.
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - justo como
  - tal como
  - así como
  lexicon: BDAG
  rationale: La comparación introduce el modelo o medida. "Así como" expresa bien la relación comparativa en español moderno y mantiene la claridad del paralelo.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros
  lexicon: BDAG
  rationale: El pronombre explícito se conserva para reflejar el énfasis del griego y sostener el contraste comparativo.
- source_word: ἔγνωμεν
  english_pob_choice: knew
  chosen_spanish: te conocimos
  alternatives_spanish:
  - te conocimos
  - te hemos conocido
  lexicon: BDAG
  rationale: El aoristo de γινώσκω se refleja mejor con un pasado simple en español. "Te conocimos" sigue el ajuste del audit trail inglés que corrigió "have known" a "knew" para respetar el valor aorístico.
theological_decisions:
- issue: Valor oracional del imperativo griego dirigido a Dios
  english_pob_reading: 'Rendered as a wish/prayer: ''may they know you'''
  chosen_spanish_reading: 'Subjuntivo exhortativo/oracional: ''que ellos te conozcan'''
  alternative_spanish_readings:
  - que ellos lleguen a conocerte
  - permite que ellos te conozcan
  rationale: El griego usa un imperativo de tercera persona en un contexto de súplica. En español, el subjuntivo con "que" reproduce bien el valor desiderativo/oracional sin endurecerlo como orden literal.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source sense in readable modern Spanish'
- issue: Distinción entre ἐπιγινώσκω y γινώσκω
  english_pob_reading: English does not sharply distinguish them here; both are rendered with 'know' while the comparison is preserved
  chosen_spanish_reading: Ambos verbos se trasladan con 'conocer', preservando la comparación sin sobreexplicar la diferencia
  alternative_spanish_readings:
  - que ellos te conozcan plenamente... así como también nosotros te conocimos
  - que ellos lleguen a conocerte... así como también nosotros te conocimos
  rationale: Aunque ἐπιγινώσκω puede implicar un reconocimiento más pleno, la línea no obliga a cargar la diferencia en el español. Mantener 'conocer' en ambos miembros evita añadir una tensión no explicitada por el contexto.
  doctrine_reference: 'DOCTRINE.md: never paraphrase beyond what the source warrants'
translation_notes:
  revision_awareness: 'El texto sigue el acuerdo del audit trail inglés: ἐπιγνώτωσάν se mantiene en un verbo natural de conocimiento, y ἔγνωμεν se refleja con pasado simple en español, evitando el valor de presente perfecto que se descartó en la revisión final inglesa.'
  spanish_consistency_notes:
  - Se usa 'te' para el objeto directo singular de segunda persona, manteniendo un registro reverente pero natural.
  - Se prefiere 'conocer' sobre 'saber' porque el griego expresa relación/conocimiento personal, no mera información.
  - El paralelismo se conserva con estructura breve y directa, adecuada para lectura litúrgica o devocional.
