translation:
  language: es
  text: Como paja[b] se considera la maza[a], y se ríe ante el ruido del venablo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arma de arrojar»; el hebreo תוֹתָח es raro y su sentido preciso es incierto.
    reason: lexical_alternative
  - marker: b
    text: O «como rastrojo».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּקַשׁ
  english_pob_choice: as straw
  chosen_spanish: Como paja
  alternatives_spanish:
  - Como rastrojo
  - Como tamo
  lexicon: HALOT
  rationale: קַשׁ designa material vegetal seco y ligero; «paja» comunica bien la imagen de algo frágil e insignificante en español moderno. Se conserva la comparación poética sin sobrerreformularla.
- source_word: נֶחְשְׁבוּ
  english_pob_choice: is regarded
  chosen_spanish: se le considera
  alternatives_spanish:
  - es contado
  - se lo tiene por
  lexicon: HALOT
  rationale: El pasivo de חשׁב expresa valoración o estimación. En español, «se le considera» reproduce bien la idea de juicio o cálculo aplicado al arma dentro del símil.
- source_word: תוֹתָח
  english_pob_choice: club
  chosen_spanish: el arma
  alternatives_spanish:
  - la maza
  - el garrote
  - el proyectil
  lexicon: HALOT
  rationale: El término hebreo es raro y su referente preciso es incierto. Dado el contexto bélico y la referencia paralela a כידון, se optó por un genérico suficientemente amplio en español; la nota preserva la incertidumbre léxica sin forzar una identificación precisa.
- source_word: וְיִשְׂחַק
  english_pob_choice: and he laughs
  chosen_spanish: y se ríe
  alternatives_spanish:
  - y se burla
  - y ríe
  lexicon: HALOT
  rationale: El verbo significa «reír». Como el hablante es la criatura descrita en el contexto poético, el español puede mantener la personificación con «se ríe» sin necesidad de explicitar sujeto.
- source_word: לְרַעַשׁ
  english_pob_choice: at the rattling
  chosen_spanish: ante el estruendo
  alternatives_spanish:
  - ante el ruido
  - ante el crujir
  - ante el repiqueteo
  lexicon: HALOT
  rationale: רַעַשׁ puede denotar ruido, sacudida o estrépito. En este contexto de arma y movimiento bélico, «estruendo» comunica el impacto sonoro de forma natural en español, sin estrechar demasiado el campo semántico.
- source_word: כִּידוֹן
  english_pob_choice: the javelin
  chosen_spanish: la jabalina
  alternatives_spanish:
  - la lanza
  - el venablo
  lexicon: HALOT
  rationale: כִּידוֹן suele referirse a un arma arrojadiza o lanza ligera. «Jabalina» distingue bien este matiz en español y conserva la imaginería militar del pasaje.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última revisión auditada: no se requieren cambios sustantivos respecto del sentido base. Se mantiene la incertidumbre léxica de תוֹתָח mediante una nota alternativa, y se conserva el paralelismo poético con una frase española natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» porque no corresponde al contenido del versículo.
  - Se preserva la personificación del monstruo marino con verbo pronominal en singular («se ríe»), coherente con la poesía hebrea.
  - La combinación de una designación genérica («el arma») con nota alternativa refleja la incertidumbre de תוֹתָח sin inventar precisión.
