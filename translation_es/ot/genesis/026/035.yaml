review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis básica del hebreo: sujeto femenino plural implícito, predicado nominal y el modismo מֹרַת רוּחַ. Sin embargo, «fueron una amargura de espíritu para Isaac y Rebeca» suena menos natural en español bíblico claro que una formulación con verbo de estado/causación como «fueron causa de amargura». Además, la nota a contiene comillas sobrantes y la nota b usa «vexación», término correcto pero algo menos natural que «aflicción» o «pesar» en registro eclesial amplio.'
  spanish_quality_summary: La redacción es comprensible, pero «una amargura de espíritu para…» resulta algo calcada y dura en español. Conviene conservar el modismo con nota explicativa, pero ajustar la frase principal a un español más idiomático sin perder la fuerza nominal. La puntuación de la nota a debe normalizarse.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Rebeca» es correcto. «Espíritu» preserva bien רוּחַ en este contexto, idealmente con nota cultural. No hay términos teológicos sensibles adicionales.
  issues:
  - severity: medium
    issue: 'Expresión principal algo calcada: «fueron una amargura de espíritu para Isaac y Rebeca»'
    rationale: Aunque es formalmente cercana al hebreo, en español suena rígida. «Fueron causa de amargura de espíritu para Isaac y Rebeca» conserva el sustantivo y el modismo, pero mejora la naturalidad y legibilidad.
  - severity: low
    issue: Nota a con comillas y puntuación innecesariamente torpes
    rationale: La forma actual incluye comillas externas superfluas alrededor de toda la nota. Debe normalizarse para claridad editorial.
  - severity: low
    issue: «Vexación» en nota b es menos natural para lectura eclesial amplia
    rationale: La explicación del modismo puede expresarse más claramente con «aflicción» o «pesar profundo», manteniendo el sentido del hebreo.
  revised_spanish_text: Y fueron causa de amargura de espíritu para Isaac y Rebeca[a][b][c].
  revised_footnotes:
  - marker: a
    text: 'O: «y llegaron a ser causa de amargura de espíritu para Isaac y Rebeca».'
    reason: lexical_alternative
  - marker: b
