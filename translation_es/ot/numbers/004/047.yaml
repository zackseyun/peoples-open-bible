translation:
  language: es
  text: desde los treinta años de edad y en adelante[a], hasta los cincuenta años de edad, todo el que viene para hacer la obra del servicio y el servicio de llevar cargas en la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde los treinta años de edad hacia arriba». La frase hebrea señala un límite inferior de edad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן ... וָמַעְלָה
  english_pob_choice: from thirty years old and upward
  chosen_spanish: desde los treinta años de edad y en adelante
  alternatives_spanish:
  - desde los treinta años y más
  - desde los treinta años de edad hacia arriba
  lexicon: HALOT
  rationale: La expresión hebrea marca un límite inferior de edad. «Y en adelante» conserva la idea idiomática de extensión ascendente sin sonar rígido en español.
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  english_pob_choice: up to fifty years old
  chosen_spanish: hasta los cincuenta años de edad
  alternatives_spanish:
  - hasta cumplir cincuenta años
  - hasta la edad de cincuenta años
  lexicon: HALOT
  rationale: La frase fija un límite superior inclusivo. «Hasta los cincuenta años de edad» es natural y fiel al rango delimitado por el hebreo.
- source_word: כָּל הַבָּא
  english_pob_choice: everyone who comes
  chosen_spanish: todo el que venga
  alternatives_spanish:
  - todo el que entra
  - todos los que vienen
  lexicon: HALOT
  rationale: El participio funciona sustantivamente para quienes se presentan al servicio. «Todo el que venga» conserva esa fuerza general sin añadir una interpretación más específica.
- source_word: לַעֲבֹד
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para servir
  - para realizar
  lexicon: HALOT
  rationale: «Hacer» reproduce bien el valor básico del infinitivo aquí y encaja con la repetición de términos de trabajo en la frase siguiente.
- source_word: עֲבֹדַת עֲבֹדָה
  english_pob_choice: the work of service
  chosen_spanish: la obra de servicio
  alternatives_spanish:
  - el trabajo de servicio
  - la labor de servicio
  lexicon: HALOT
  rationale: La duplicación hebrea es enfática o clasificatoria. «Obra de servicio» preserva esa estructura sin volverla extraña en español.
- source_word: וַעֲבֹדַת מַשָּׂא
  english_pob_choice: and the service of carrying
  chosen_spanish: y la obra de cargar
  alternatives_spanish:
  - y la obra de llevar cargas
  - y la labor de portar
  lexicon: HALOT
  rationale: מַשָּׂא remite a carga o porte. «Cargar» mantiene la concreción del acto sin añadir «cargas» donde el texto hebreo solo nombra la función de portar.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: «Tienda de reunión» es una equivalencia transparente y fiel al nombre del santuario. Se evita «tabernáculo» para no introducir un término tradicional no requerido por el hebreo.
translation_notes:
  revision_awareness: La versión inglesa más reciente simplificó el componente de carga a «carrying» para reflejar más de cerca el hebreo. En español se reflejó esa misma cautela con «cargar», evitando ampliar a «cargas» o «bultos». También se mantuvo la duplicación semántica de עבד mediante «obra de servicio», en línea con la nota auditada de la POB inglesa.
  spanish_consistency_notes:
  - Se usa «tienda de reunión» para el lugar sagrado, coherente con el nombre hebreo אֹהֶל מוֹעֵד.
  - Se mantiene «obra de servicio» para conservar la repetición enfática del original.
  - El rango de edad se expresa con fórmulas idiomáticas en español, pero sin perder los límites inferior y superior del hebreo.
