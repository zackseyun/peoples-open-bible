lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En esta fórmula narrativa, ענה puede expresarse como 'responder' o 'contestar'. 'Respondió' conserva el sentido dialogal de la secuencia sin añadir contenido interpretativo, y funciona con naturalidad en español.
- source_word: בִּלְדַּד
  english_pob_choice: Bildad
  chosen_spanish: Bildad
  alternatives_spanish:
  - Bildad
  lexicon: convención onomástica
  rationale: El nombre propio se translitera de forma estándar; no requiere adaptación al español.
- source_word: הַשּׁוּחִי
  english_pob_choice: the Shuhite
  chosen_spanish: el suhita
  alternatives_spanish:
  - el shuhita
  - el shuahita
  lexicon: HALOT
  rationale: El gentilicio indica procedencia o afiliación con Shuah. En español, 'suhita' reproduce el valor del etnónimo de manera más directa y evita la forma inglesa 'Shuhite'; se conserva el artículo para reflejar la identificación gentilicia del hebreo.
- source_word: וַיֹאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - diciendo
  lexicon: HALOT
  rationale: אמר en esta fórmula fija se traduce naturalmente como 'dijo'. Mantiene la estructura hebrea 'respondió y dijo' sin sobrerrepresentar el verbo.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: conectivo narrativo
  rationale: El waw inicial avanza la narración; 'Entonces' suena natural en español moderno y conserva la secuencia temporal del texto.
translation_notes:
  revision_awareness: El texto base y el control de revisión muestran alta concordancia y no reportan cambios sustantivos; por eso se mantiene una traducción sobria y directa del formulario narrativo.
  spanish_consistency_notes:
  - Se conserva la fórmula bíblica breve «respondió y dijo», idiomática en español y fiel al patrón hebreo.
  - Se evita 'SEÑOR' u otra adaptación teológica porque no aparece el nombre divino en este versículo.
  - El gentilicio se vierte de forma transparente para permitir auditar la referencia étnica/geográfica.
