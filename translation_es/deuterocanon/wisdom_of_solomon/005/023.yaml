translation:
  language: es
  text: Un espíritu de poder[a] se opondrá a ellos, y como un torbellino los aventará[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un viento de poder» o «un poderoso vendaval». El griego πνεῦμα puede significar «espíritu», «viento» o «aliento».
    reason: lexical_alternative
  - marker: b
    text: O «los aventará como paja». El verbo griego lleva la idea de aventar o cribar, como al separar el grano de la paja.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιστήσεται
  english_pob_choice: will stand against
  chosen_spanish: se pondrá contra
  alternatives_spanish:
  - se opondrá a
  - resistirá a
  lexicon: BDAG
  rationale: El griego expresa oposición activa; «se pondrá contra» conserva la imagen concreta de enfrentarse a alguien y suena natural en español bíblico sin volverlo demasiado abstracto.
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - viento
  - aliento
  - soplo
  lexicon: BDAG
  rationale: Sigo la lectura personificada preferida por el POB inglés, porque el sustantivo funciona como sujeto agente de la acción verbal. En español «espíritu» mantiene esa fuerza, mientras que «viento» o «soplo» desplazan el matiz hacia lo meteorológico.
- source_word: δυνάμεως
  english_pob_choice: of power
  chosen_spanish: de poder
  alternatives_spanish:
  - de fuerza
  - de poderío
  lexicon: BDAG
  rationale: «De poder» reproduce de forma directa el genitivo calificativo y conserva el tono abstracto del griego sin precisar innecesariamente si se trata de fuerza física o autoridad eficaz.
- source_word: λαῖλαψ
  english_pob_choice: whirlwind
  chosen_spanish: torbellino
  alternatives_spanish:
  - vendaval
  - tempestad
  lexicon: LSJ
  rationale: «Torbellino» comunica bien la violencia del término y evita una calca rígida. También deja espacio para la imagen de destrucción intensificada por el paralelo con el verbo de aventar.
- source_word: ἐκλικμήσει
  english_pob_choice: will winnow them away
  chosen_spanish: los aventará
  alternatives_spanish:
  - los aventará como paja
  - los dispersará
  lexicon: LSJ
  rationale: El verbo tiene un trasfondo de aventar/cribar, con la idea de separar y dispersar como paja. En español, «aventará» conserva la imagen agrícola implícita sin sonar forzado; el complemento ampliado no es necesario porque el contexto ya aporta la violencia del torbellino.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El pronombre directo de objeto en español es suficiente y mantiene la referencia a los impíos del contexto inmediato.
theological_decisions:
- issue: Si πνεῦμα debe leerse como agente personal o como fenómeno impersonal
  english_pob_reading: spirit
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - viento
  - soplo
  - aliento
  rationale: Conservo la lectura más agente/personal del POB inglés porque el sujeto «se pondrá contra ellos» funciona como oposición intencional. La segunda cláusula deja explícita la imagen de tormenta sin obligar a resolver la tensión entre espíritu y viento.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document ambiguity where genuine.'
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del griego de Swete 1909 y del rastro auditado en inglés. Se mantuvo la tensión entre la lectura personificada de πνεῦμα y la imagen meteorológica del torbellino, sin reducir una a la otra.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y no aplica aquí el nombre divino.
  - Se prefirió «espíritu» por la lectura agentiva documentada en el POB inglés.
  - Se usó «torbellino» para λαῖλαψ y «aventará» para ἐκλικμήσει, conservando la doble imagen de violencia y separación.
  - La puntuación con punto y coma reproduce la relación de dos miembros poéticos conectados por καί.
