    rationale: En español estándar no se contrae «a + la»; la forma correcta es «a la rueda de tortura». El error afecta la legibilidad y la calidad editorial.
  - severity: medium
    issue: Ubicación incorrecta de la nota [a]
    rationale: La nota sobre ἐπί con acusativo explica «sobre/a la rueda», no «azotes». Debe anclarse en «rueda» o en el sintagma correspondiente para mantener fidelidad al análisis lexical.
