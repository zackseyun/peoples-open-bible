  - marker: a
    text: O «los arrogantes», «los necios» o «los insolentes» para «los jactanciosos».
    reason: lexical_alternative
  - marker: b
    text: O «todos los que obran iniquidad» o «todos los hacedores de maldad».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [b] para que corresponda al sintagma adecuado y se mejora «no se mantendrán» a «no estarán de pie», que representa con mayor claridad la imagen y el sentido del hebreo sin perder naturalidad en español.
