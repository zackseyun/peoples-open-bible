translation:
  language: es
  text: Y cubrieron el altar con saco[a], y clamaron al Dios de Israel unánimemente y con insistencia, que no entregara a sus pequeños al saqueo, ni a sus mujeres como botín, ni las ciudades de su herencia a la destrucción, ni las cosas santas a profanación y oprobio[b], motivo de gozo para las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cilicio». El griego usa la imagen de una tela de duelo o penitencia; «saco» conserva con más literalidad el objeto material.
    reason: lexical_alternative
  - marker: b
    text: O «causa de regocijo para las naciones»; el sentido puede ser de júbilo hostil o triunfo de los pueblos sobre ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ θυσιαστήριον
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar de sacrificio
  lexicon: LSJ
  rationale: θυσιαστήριον designa un altar; en este contexto cultual, «el altar» es natural en español y no añade especificación innecesaria.
- source_word: σάκκῳ περιέβαλλον
  english_pob_choice: covered ... with sackcloth
  chosen_spanish: cubrieron ... con saco
  alternatives_spanish:
  - lo envolvieron con saco
  - lo cubrieron con cilicio
  lexicon: LSJ
  rationale: La imagen es de cubrir con tela áspera de duelo/penitencia. «Saco» preserva el objeto material y evita sustituirlo por un término más eclesiástico como «cilicio», que puede sonar más interpretativo.
- source_word: ἐβόησαν ... ὁμοθυμαδὸν ἐκτενῶς
  english_pob_choice: cried out ... together fervently
  chosen_spanish: clamaron ... unánimemente y con insistencia
  alternatives_spanish:
  - clamaron ... juntos y fervientemente
  - gritaron ... de común acuerdo y con intensidad
  lexicon: LSJ
  rationale: ἐβόησαν pide un verbo fuerte («clamar»). ὁμοθυμαδόν expresa unidad corporativa y ἐκτενῶς insistencia/ardor; «unánimemente y con insistencia» conserva ambos rasgos sin sonar forzado.
- source_word: τοῦ μὴ δοῦναι
  english_pob_choice: that he might not give
  chosen_spanish: para que no entregara
  alternatives_spanish:
  - para no dar
  - a fin de no entregar
  lexicon: LSJ
  rationale: El infinitivo articular con μή expresa el contenido de la súplica. «Para que no entregara» refleja bien el sentido de pedir a Dios que no los ponga en manos enemigas.
- source_word: εἰς διαρπαγὴν
  english_pob_choice: over to plunder
  chosen_spanish: para saqueo
  alternatives_spanish:
  - como presa
  - para ser saqueados
  lexicon: LSJ
  rationale: διαρπαγή tiene lenguaje de pillaje. «Para saqueo» mantiene la brevedad y el matiz bélico del griego.
- source_word: τὰ νήπια
  english_pob_choice: their little children
  chosen_spanish: sus pequeños hijos
  alternatives_spanish:
  - sus niños pequeños
  - sus infantes
  lexicon: LSJ
  rationale: νήπια puede abarcar infantes o niños muy pequeños; «pequeños hijos» conserva el tono afectivo y no estrecha demasiado el alcance.
- source_word: τὰς γυναῖκας εἰς προνομὴν
  english_pob_choice: their women to spoil
  chosen_spanish: a sus mujeres para botín
  alternatives_spanish:
  - a sus mujeres como botín
  - a sus mujeres para saqueo
  lexicon: LSJ
  rationale: προνομή remite a botín de guerra. «Botín» es el equivalente más directo y conserva la violencia implícita del texto.
- source_word: τὰς πόλεις τῆς κληρονομίας αὐτῶν
  english_pob_choice: the cities of their inheritance
  chosen_spanish: las ciudades de su herencia
  alternatives_spanish:
  - las ciudades de su heredad
  - las ciudades de su patrimonio
  lexicon: LSJ
  rationale: κληρονομία tiene fuerza de herencia recibida, con resonancia histórica y pactal. «Herencia» es claro en español y mantiene esa carga.
- source_word: εἰς ἀφανισμὸν
  english_pob_choice: to destruction
  chosen_spanish: para destrucción
  alternatives_spanish:
  - para aniquilación
  - para ruina
  lexicon: LSJ
  rationale: ἀφανισμός indica destrucción/aniquilación. «Para destrucción» conserva el paralelismo de las frases con εἰς sin intensificar más de lo necesario.
- source_word: τὰ ἅγια
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - los objetos sagrados
  - el santuario
  lexicon: LSJ
  rationale: El plural neutro apunta a realidades santas o sagradas, no necesariamente a un edificio. «Las cosas santas» respeta esa amplitud.
- source_word: εἰς βεβήλωσιν καὶ ὀνειδισμόν
  english_pob_choice: to defilement and reproach
  chosen_spanish: para profanación y oprobio
  alternatives_spanish:
  - para contaminación y afrenta
  - para sacrilegio y vergüenza
  lexicon: LSJ
  rationale: βεβήλωσις es profanación de lo santo; ὀνειδισμός es reproche/afrenta/oprobio. «Profanación y oprobio» mantiene el contraste cultual y honorífico.
- source_word: ἐπίχαρμα τοῖς ἔθνεσιν
  english_pob_choice: a cause of rejoicing for the nations
  chosen_spanish: motivo de gozo para las naciones
  alternatives_spanish:
  - causa de regocijo para las naciones
  - objeto de burla para las naciones
  lexicon: LSJ
  rationale: ἐπίχαρμα puede ser aquello que provoca gozo, incluso con matiz de triunfo hostil. «Motivo de gozo» reproduce de manera sobria la lectura del audit trail sin añadir la glosa interpretativa de burla.
theological_decisions:
- issue: Alcance de κληρονομία en un contexto nacional-covenantal
  english_pob_reading: inheritance
  chosen_spanish_reading: herencia
  alternative_spanish_readings:
  - heredad
  - patrimonio
  rationale: 'En este pasaje, κληρονομία no es solo propiedad territorial: tiene resonancia de herencia recibida como pueblo. «Herencia» conserva esa amplitud sin sobreexplicar el trasfondo.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Referencia de τὰ ἅγια
  english_pob_reading: the holy things
  chosen_spanish_reading: las cosas santas
  alternative_spanish_readings:
  - el santuario
  - las cosas sagradas
  rationale: El plural griego es amplio y no obliga a identificar un solo edificio. «Las cosas santas» evita restringir indebidamente el referente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por una revisión reciente: se prefirió una formulación más literal para ἐπίχαρμα τοῖς ἔθνεσιν («a cause of rejoicing for the nations») frente a una paráfrasis más interpretativa. La versión española sigue esa decisión con «motivo de gozo para las naciones» y conserva la posibilidad semántica alternativa en nota.'
  spanish_consistency_notes:
  - Se mantuvo «Dios de Israel» tal como el griego, sin sustituirlo por una fórmula litúrgica más amplia.
  - Se eligió un registro solemne pero claro, evitando arcaísmos innecesarios.
  - «Saco» y «botín» preservan el lenguaje de duelo y guerra del pasaje.
  - «Profanación» y «oprobio» mantienen el doble eje cultual y honorífico del cierre.
