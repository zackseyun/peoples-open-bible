translation:
  language: es
  text: y todos los vasos tomados[a] de Jerusalén han de ser enviados de vuelta, los cuales Ciro apartó cuando hizo voto de destruir Babilonia[b], y hizo voto de enviarlos allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esos que Ciro designó, cuando resolvió destruir Babilonia, y enviarlos allí». El griego es muy comprimido y algo torpe, especialmente en las cláusulas repetidas de «hacer voto/resolver».
    reason: lexical_alternative
  - marker: b
    text: Es decir, los vasos del templo tomados de Jerusalén debían ser devueltos. «Allí» probablemente se refiere a Jerusalén, aunque el griego lo expresa con mucha brevedad.
    reason: alternative_reading
lexical_decisions:
- source_word: σκεύη
  english_pob_choice: vessels
  chosen_spanish: vasos
  alternatives_spanish:
  - vasijas
  - utensilios
  lexicon: LSJ
  rationale: En contexto del templo, el campo léxico apunta a objetos rituales o de culto. «Vasos» es natural en español bíblico y conserva la idea de recipientes sagrados sin especificar de más.
- source_word: τὰ λημφθέντα
  english_pob_choice: taken
  chosen_spanish: tomados
  alternatives_spanish:
  - llevados
  - arrebatados
  lexicon: LSJ
  rationale: El participio indica objetos que habían sido tomados de Jerusalén. «Tomados» mantiene la pasiva y la sencillez del griego.
- source_word: ἐκπέμψαι
  english_pob_choice: are to be sent back
  chosen_spanish: han de ser enviados de vuelta
  alternatives_spanish:
  - deben ser devueltos
  - han de ser devueltos
  lexicon: LSJ
  rationale: El griego expresa envío hacia afuera; en contexto de restitución, el español más claro es «enviados de vuelta», sin perder la idea direccional.
- source_word: ἐχώρισεν
  english_pob_choice: set apart
  chosen_spanish: apartó
  alternatives_spanish:
  - separó
  - designó
  lexicon: LSJ
  rationale: «Apartó» conserva el acto de reservar o separar para un fin determinado. Es menos técnico que «designó», pero fiel al matiz administrativo del verbo.
- source_word: ηὔξατο
  english_pob_choice: vowed
  chosen_spanish: votó
  alternatives_spanish:
  - prometió solemnemente
  - juró
  lexicon: LSJ
  rationale: El verbo griego suele significar hacer un voto. «Votó» reproduce bien ese valor en español bíblico formal, aunque suene más arcaico que «prometió».},{
theological_decisions:
- issue: Sintaxis comprimida y relación del relativo con «vasos»
  english_pob_reading: The Greek wording is compressed and somewhat awkward; the English keeps the restored vessels as the main subject and reads the relative clause as explaining them.
  chosen_spanish_reading: Mantener «los cuales» referido a «los vasos» y conservar la secuencia de restitución como cláusula explicativa.
  alternative_spanish_readings:
  - «que Ciro apartó» sin relativo explicativo
  - reformular en una oración más libre
  rationale: La ambigüedad principal es sintáctica, no doctrinal. El español conserva la estructura compacta para no borrar la tensión del original, pero la hace legible.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: ἐκκόψαι Βαβυλῶνα
  english_pob_reading: The English POB renders this as 'destroy Babylon' while noting that the Greek is literally 'cut off.'
  chosen_spanish_reading: «destruir Babilonia»
  alternative_spanish_readings:
  - «cortar off Babilonia»
  - «cortar a Babilonia»
  rationale: En español, «destruir» comunica el valor contextual del verbo sin sonar antinatural. La alternativa literal produciría una frase poco idiomática y oscura.
  doctrine_reference: Translation philosophy §§1, 6
- issue: ἐξαποστεῖλαι ἐκεῖ
  english_pob_reading: The phrase is terse; English notes that 'there' likely refers to Jerusalem, though the Greek is compressed.
  chosen_spanish_reading: «enviarlos allí»
  alternative_spanish_readings:
  - «enviarlo allí»
  - «mandarlos allí»
  rationale: Aunque el griego es elíptico, el sentido histórico apunta al regreso de los vasos al lugar de procedencia. «Allí» mantiene la tersura del original sin resolver excesivamente la referencia.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete LXX 1909 y toma como control la solución inglesa POB: mantener la secuencia de restitución de los vasos, conservar el valor de voto de ηὔξατο y preferir «destruir Babilonia» para ἐκκόψαι. Se evitó suavizar la sintaxis hasta perder la compresión del original.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma POB cuando no aparece en este versículo.
  - Se mantuvo «Babilonia» con mayúscula por tratarse del topónimo.
  - «Vasos» se prefirió a «utensilios» por el registro cultual del pasaje.
  - La forma verbal «votó» conserva el matiz solemne del griego frente a «prometió».
