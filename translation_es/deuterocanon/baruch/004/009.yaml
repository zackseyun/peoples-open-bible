translation:
  language: es
  text: 'Porque él vio la ira que vino sobre ustedes de Dios, y dijo: «Escuchen, vecinos[a] de Sión: Dios me ha traído un gran luto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forasteros de Sión» o «residentes junto a Sión». El griego πάροικοι puede designar a quienes habitan junto a un lugar o entre sus pobladores, con el matiz de residentes no nativos.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - miró
  lexicon: BDAG
  rationale: El griego expresa una visión concreta en pasado; «vio» conserva la sencillez narrativa y la fuerza directa del verbo sin introducir matices innecesarios de comprensión abstracta.
- source_word: ἐπελθοῦσαν
  english_pob_choice: that came upon
  chosen_spanish: que vino sobre
  alternatives_spanish:
  - que cayó sobre
  - que sobrevino
  lexicon: BDAG
  rationale: La idea de una realidad que irrumpe o sobreviene se expresa de forma natural en español con «vino sobre», manteniendo el carácter de acontecimiento que alcanza a los destinatarios.
- source_word: ὀργὴν
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - indignación
  lexicon: BDAG
  rationale: «Ira» comunica mejor que «enojo» la gravedad de la respuesta judicial divina en este contexto. En español, «ira» conserva la intensidad que el inglés POB buscó con «wrath».
- source_word: παρὰ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - por parte de Dios
  lexicon: BDAG
  rationale: La construcción griega marca origen o procedencia. «De parte de Dios» expresa esa procedencia con claridad y mantiene visible la agencia divina sin sonar forzado.
- source_word: Ἀκούσατε
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Atiendan
  lexicon: BDAG
  rationale: Como imperativo de convocatoria, «Escuchen» resulta natural y solemne en español actual, equivalente al llamado profético del original.
- source_word: οἱ πάροικοι Σειών
  english_pob_choice: you neighbors of Zion
  chosen_spanish: vecinos de Sión
  alternatives_spanish:
  - forasteros de Sión
  - forasteros que habitan junto a Sión
  - residentes junto a Sión
  lexicon: BDAG
  rationale: El POB inglés eligió una solución relacional en vez de una etiqueta estrictamente literal. «Vecinos de Sión» conserva esa cercanía semántica en español y evita reducir el vocativo a una mera categoría legal. La nota preserva la alternativa más literal de «sojourners».
- source_word: ἐπήγαγέ μοι
  english_pob_choice: has brought upon me
  chosen_spanish: me ha traído
  alternatives_spanish:
  - me ha causado
  - me ha acarreado
  lexicon: BDAG
  rationale: El verbo puede expresar llevar o traer algo sobre alguien. En español, «me ha traído» mantiene la relación causal con el lamento y sigue de cerca la estructura del griego y del inglés POB sin endurecerla.
- source_word: πένθος μέγα
  english_pob_choice: great mourning
  chosen_spanish: un gran luto
  alternatives_spanish:
  - gran duelo
  - gran aflicción
  lexicon: BDAG
  rationale: «Πένθος» denota duelo o lamento por una pérdida; «luto» en español conserva esa dimensión de duelo visible y comunitario. «Gran luto» reproduce bien la intensidad del adjetivo μέγα.
theological_decisions:
- issue: La procedencia divina de la calamidad
  english_pob_reading: The verse states directly that the wrath came from God and that God brought great mourning.
  chosen_spanish_reading: El verso afirma directamente que la ira vino de parte de Dios y que Dios me ha traído un gran luto.
  alternative_spanish_readings:
  - Se podría atenuar la frase con una formulación impersonal.
  - Se podría omitir la procedencia explícita de la ira.
  rationale: Se conserva sin suavizar la atribución explícita de la calamidad a Dios, porque el griego lo dice de forma directa. La traducción no atenúa la fuerza teológica del juicio ni la relación causal establecida por el texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente; el texto inglés quedó sin cambios en la última pasada, con concordancia mayoritaria y una observación pendiente sobre la formulación de πάροικοι. La versión española sigue esa lectura principal y conserva una nota para la alternativa léxica relevante.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός en todo el versículo.
  - Se usa «Sión» con tilde conforme al uso español.
  - Se evita «SEÑOR» porque el griego aquí usa θεός, no κύριος.
  - «Ira» y «luto» sostienen un registro bíblico claro sin arcaísmos excesivos.
