translation:
  language: es
  text: y para hacer caer su descendencia[a] entre las naciones, y para dispersarlos por las tierras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus descendientes’; literalmente, ‘su simiente’.
    reason: lexical_alternative
  - marker: b
    text: O ‘y para dispersarlos por todas las tierras’ o ‘en los países’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְהַפִּיל
  english_pob_choice: and to make ... fall
  chosen_spanish: y para hacer caer
  alternatives_spanish:
  - y para derribar
  - y para hacerlos caer
  - y para abatir
  lexicon: HALOT
  rationale: El infinitivo causativo de הִפִּיל expresa ‘causar caer’. En español, ‘hacer caer’ conserva esa fuerza causativa sin añadir un matiz demasiado específico de muerte o derrota militar.
- source_word: זַרְעָם
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - sus descendientes
  - su prole
  lexicon: HALOT
  rationale: זֶרַע puede ser ‘semilla’ literalmente o ‘descendencia’. ‘Descendencia’ es claro en español y mantiene la idea genealógica sin la rigidez arcaica de ‘simiente’.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones gentiles
  lexicon: HALOT
  rationale: ‘Naciones’ reproduce el valor usual de גּוֹיִם en este contexto. ‘Entre’ comunica bien la localización dentro del grupo, equivalente funcional de ‘among’.
- source_word: וּלְזָרוֹתָם
  english_pob_choice: and to scatter them
  chosen_spanish: y para dispersarlos
  alternatives_spanish:
  - y para esparcirlos
  - y para desparramarlos
  - y para diseminarlos
  lexicon: HALOT
  rationale: זָרָה puede significar ‘esparcir’ o ‘dispersar’. ‘Dispersarlos’ encaja con el paralelo de exilio y conserva el sentido de desintegración geográfica sin sugerir un uso técnico como ‘aventar’.
- source_word: בָּאֲרָצֽוֹת
  english_pob_choice: through the lands
  chosen_spanish: por las tierras
  alternatives_spanish:
  - por los países
  - en las tierras
  - a través de las tierras
  lexicon: HALOT
  rationale: El plural de אֶרֶץ aquí señala varias regiones o territorios. ‘Por las tierras’ suena natural en español y mantiene la amplitud espacial de la dispersión.
theological_decisions:
- issue: Alcance del juicio descrito en el primer colon
  english_pob_reading: The verse speaks of covenant judgment resulting in the descendants' downfall and dispersal among foreign nations and lands.
  chosen_spanish_reading: El versículo describe un juicio de pacto que resulta en la caída y dispersión de la descendencia entre naciones y tierras extranjeras.
  alternative_spanish_readings:
  - El versículo podría entenderse como que su descendencia muere entre las naciones.
  - El versículo podría entenderse como que su descendencia es derrocada entre las naciones.
  rationale: El hebreo causativo de נפל es más amplio que ‘morir’. Dado el paralelismo con ‘dispersarlos’, ‘hacer caer’/‘caída’ preserva la tensión sin estrechar indebidamente el sentido.
  doctrine_reference: Juicio de pacto; exilio/dispersión como disciplina divina.
translation_notes:
  revision_awareness: 'Coincide con el alto acuerdo del control cruzado: no hubo cambios aplicados en la última revisión; esta redacción mantiene la lectura optimal-equivalence y conserva la amplitud semántica de נפל y זרע.'
  spanish_consistency_notes:
  - Se mantiene ‘naciones’ para גּוֹיִם, en paralelo con el uso estándar de POB.
  - Se usa ‘descendencia’ como término natural en español para זֶרַע, evitando el calco arcaizante ‘simiente’ en el texto principal.
  - ‘Dispersarlos’ preserva la imagen de dispersión geográfica vinculada al exilio, coherente con la segunda cola del verso.
