translation:
  language: es
  text: No confíes en el perdón para añadir pecado a pecado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No esperes para volverte al Señor, ni de día en día lo dejes; porque de repente saldrá la ira del Señor, y al tiempo del castigo perecerás». El hebreo conservado aquí es más breve y se centra específicamente en presumir del perdón mientras se sigue pecando.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶל
  english_pob_choice: on / for
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - para
  lexicon: HALOT
  rationale: Con בָּטַח, la preposición marca el objeto de la confianza. En español, «confiar en» expresa de manera natural esa relación de dependencia.
- source_word: סְלִיחָה
  english_pob_choice: forgiveness
  chosen_spanish: perdón
  alternatives_spanish:
  - indulto
  - absolución
  lexicon: HALOT
  rationale: El sustantivo denota remisión del pecado o de la culpa; «perdón» es el equivalente más claro y natural en español moderno.
- source_word: אַל תִּבְטָח
  english_pob_choice: Do not rely
  chosen_spanish: No confíes
  alternatives_spanish:
  - No te fíes
  - No pongas tu confianza
  lexicon: HALOT
  rationale: בָּטַח significa confiar/rely on. «No confíes» comunica bien la advertencia contra una seguridad presuntuosa en el perdón.
- source_word: לְהוֹסִיף
  english_pob_choice: to add
  chosen_spanish: para añadir
  alternatives_spanish:
  - con el fin de añadir
  - a fin de añadir
  lexicon: HALOT
  rationale: El infinitivo expresa resultado o finalidad; «para añadir» conserva esa conexión sin volver la frase pesada.
- source_word: עָוֹן
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - iniquidad
  - culpa
  lexicon: HALOT
  rationale: Aunque עָוֹן puede abarcar iniquidad o culpa, aquí la construcción idiomática apunta a acumular una falta tras otra; «pecado» es la opción más clara y fiel en español.
- source_word: עַל עָוֹן
  english_pob_choice: to sin
  chosen_spanish: pecado a pecado
  alternatives_spanish:
  - pecado sobre pecado
  - iniquidad sobre iniquidad
  lexicon: HALOT
  rationale: La repetición con עַל intensifica la idea de acumular una falta sobre otra. «Pecado a pecado» reproduce esa fuerza en español sin sonar arcaico.
theological_decisions:
- issue: Relación entre el perdón divino y la continuidad en el pecado
  english_pob_reading: The verse warns against presuming upon forgiveness as a basis for continuing in sin.
  chosen_spanish_reading: El versículo advierte contra confiarse del perdón como pretexto para seguir pecando.
  alternative_spanish_readings:
  - El versículo advierte simplemente contra exagerar la seguridad del perdón.
  - El versículo prohíbe retrasar el arrepentimiento.
  rationale: El hebreo vincula la confianza en el perdón con la acumulación de pecado. La lectura griega paralela amplía la advertencia hacia demorar la vuelta al Señor, lo cual confirma el sentido de una presunción moral y no de una negación del perdón.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa pasó de «Do not rely on forgiveness, so as to add sin to sin» a «Do not rely on forgiveness to add sin to sin», suprimiendo «so as» por naturalidad. En español se mantuvo igualmente una construcción directa («para añadir») que conserva el sentido infinitivo sin añadir explicaciones no atestiguadas.
  spanish_consistency_notes:
  - Se usa «perdón» en lugar de «indulto» o «absolución» por claridad y por coherencia con el registro sapiencial.
  - Se mantuvo un tono admonitorio breve, acorde con el hebreo compacto y con la economía del paralelo griego.
  - La nota al pie recoge la ampliación griega sin desplazar la lectura principal derivada del hebreo.
