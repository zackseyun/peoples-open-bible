  text: וּ/בַ/יּ֣וֹם הַ/שְּׁמִינִ֗י יִקַּ֤ח שְׁנֵֽי כְבָשִׂים֙ תְּמִימִ֔ים וְ/כַבְשָׂ֥ה אַחַ֛ת בַּת שְׁנָתָ֖/הּ תְּמִימָ֑ה וּ/שְׁלֹשָׁ֣ה עֶשְׂרֹנִ֗ים סֹ֤לֶת מִנְחָה֙ בְּלוּלָ֣ה בַ/שֶּׁ֔מֶן וְ/לֹ֥ג אֶחָ֖ד שָֽׁמֶן־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/014/010.yaml
  text: And on the eighth day he shall take two male lambs without blemish[a], and one ewe lamb a year old without blemish, and three-tenths of an ephah of fine flour as a grain offering mixed with oil, and one log of oil.
  footnotes:
  - marker: a
    text: A 'log' is a small liquid measure used in Israelite ritual practice.
    reason: cultural_note
