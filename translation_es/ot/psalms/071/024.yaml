translation:
  language: es
  text: También mi lengua hablará de tu rectitud[a] todo el día, porque han sido avergonzados los que buscan mi mal; han quedado deshonrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu justicia». El término hebreo puede abarcar tanto la justicia como la rectitud, y en contextos salmódicos también la vindicación salvadora de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - además
  - igual
  lexicon: HALOT
  rationale: 'Conserva el valor aditivo de continuidad: la lengua se suma a otras expresiones de alabanza. En español, «también» comunica esa adición de manera natural y sobria.'
- source_word: לְשׁוֹנִי
  english_pob_choice: My tongue
  chosen_spanish: mi lengua
  alternatives_spanish:
  - mi lengua
  - mi hablar
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal concreta del hebreo. «Mi lengua» es más directo y poético en español que abstraer a «mi hablar».
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día
  - sin cesar
  lexicon: HALOT
  rationale: Expresa duración continua de modo natural en español moderno. «Todo el día» conserva el énfasis temporal sin introducir una paráfrasis excesiva.
- source_word: תֶּהְגֶּה
  english_pob_choice: will speak of
  chosen_spanish: hablará de
  alternatives_spanish:
  - meditará en
  - proclamará
  - murmurará
  lexicon: HALOT
  rationale: Con «mi lengua» como sujeto y «tu justicia» como objeto, el verbo apunta a expresión verbal. «Hablará de» mantiene la idea de hablar sobre las acciones justas de Dios sin forzar un matiz exclusivamente meditativo.
- source_word: צִדְקָתֶךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu justicia
  - tu rectitud
  lexicon: HALOT
  rationale: La nota inglesa preserva la amplitud entre righteousness y justice. En este contexto salmódico, «justicia» comunica bien el sentido de vindicación y fidelidad salvadora de Dios; «rectitud» es posible, pero menos natural aquí.
- source_word: בֹשׁוּ
  english_pob_choice: have been put to shame
  chosen_spanish: han sido avergonzados
  alternatives_spanish:
  - han quedado avergonzados
  - se han avergonzado
  lexicon: HALOT
  rationale: Refleja el resultado de la vergüenza como estado causado, no sólo un sentimiento interno. La forma pasiva española conserva ese matiz de juicio público.
- source_word: חָפְרוּ
  english_pob_choice: disgraced
  chosen_spanish: han quedado deshonrados
  alternatives_spanish:
  - han sido deshonrados
  - han sido humillados
  - han quedado confundidos
  lexicon: HALOT
  rationale: Se distingue de «avergonzados» para no repetir el mismo término y para reflejar el segundo verbo hebreo, que añade la idea de humillación pública o deshonra.
- source_word: מְבַקְשֵׁי רָעָתִי
  english_pob_choice: those seeking my harm
  chosen_spanish: los que buscan mi mal
  alternatives_spanish:
  - los que buscan hacerme daño
  - los que buscan mi ruina
  - mis enemigos
  lexicon: HALOT
  rationale: «Los que buscan mi mal» es idiomático en español y conserva la intención hostil continua del participio hebreo. «Mi mal» mantiene la concreción del texto mejor que una abstracción como «daño».
theological_decisions:
- issue: 'צִדְקָה de Dios en un salmo: righteousness / justice'
  english_pob_reading: your righteousness
  chosen_spanish_reading: tu justicia
  alternative_spanish_readings:
  - tu justicia
  - tu rectitud
  rationale: La tradición del proyecto mantiene la amplitud semántica sin reducir el término a una sola esfera moral. En español, «justicia» funciona bien para la vindicación activa de Dios en favor del salmista, y responde al matiz jurídico-salvífico que el contexto sugiere.
  doctrine_reference: 'DOCTRINE.md Contested terms: righteousness/justice; preserve breadth where context allows'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente y el audit trail inglés, sin cambios adicionales respecto a la última revisión indicada como sin cambios. La principal decisión interpretativa se mantiene en צִדְקָתֶךָ, donde el español conserva la amplitud semántica con «justicia» y nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada del proyecto para el Tetragrámaton cuando aparezca; en este versículo no se presenta.
  - Se usa «justicia» para צִדְקָה, con nota alternativa sobre «rectitud», siguiendo la amplitud lexical documentada.
  - Se evita «SEÑOR» como sustituto de nombre divino porque no aparece en este versículo y el proyecto prefiere la forma explícita cuando corresponde.
  - La pareja «avergonzados» / «deshonrados» distingue los dos verbos hebreos בֹשׁוּ y חָפְרוּ sin perder el paralelismo poético.
  - «Los que buscan mi mal» conserva el carácter participial y hostil de מְבַקְשֵׁי רָעָתִי con un español natural y auditable.
