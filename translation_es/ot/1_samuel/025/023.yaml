review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia narrativa y la mayor parte del sentido hebreo: Abigail ve a David, se apresura, baja del animal, cae delante de David y realiza un gesto de obeisancia. También preserva correctamente la distinción teológica de שׁחה como homenaje humano, no adoración. Sin embargo, hay dos ajustes de fidelidad/estilo: «se echó delante de David» es menos preciso que «cayó delante de David» para וַתִּפֹּל, y «hasta el suelo» para אָרֶץ suena menos natural aquí que «a tierra» o «hasta tierra», especialmente dado que ya se ha dicho «con el rostro en tierra».'
  spanish_quality_summary: El español es claro y digno, pero tiene cierta rigidez y una pequeña redundancia espacial. «Descendió del asno» es aceptable, aunque «bajó del asno» sería más natural; no requiere cambio obligatorio. Sí conviene reparar «se echó delante de David», que en español puede sonar voluntativo o coloquial y no refleja tan bien el valor narrativo de «cayó». Además, «se postró hasta el suelo» es comprensible, pero menos idiomático que «se postró a tierra», fórmula bíblica-natural en español y muy adecuada al contexto.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Asno» es una excepción contextual legítima frente a opciones más coloquiales como «burro». La nota sobre שׁחה está bien orientada: gesto de homenaje ante David, no adoración.'
  issues:
  - severity: medium
    issue: «se echó delante de David» para וַתִּפֹּל
    rationale: El hebreo dice literalmente que «cayó»; «se echó» puede sonar más interpretativo o menos exacto. «Cayó delante de David» preserva mejor la acción narrativa y la sumisión implícita sin añadir matices.
  - severity: low
    issue: «se postró hasta el suelo» suena menos idiomático
    rationale: Aunque transmite el sentido general, en español bíblico-natural «se postró a tierra» expresa mejor שׁחה + אָרֶץ. Además evita la repetición torpe con «con el rostro en tierra».
  revised_spanish_text: Cuando Abigail vio a David[a], se apresuró y descendió del asno; cayó delante de David, con el rostro en tierra, y se postró a tierra.
  revised_footnotes:
