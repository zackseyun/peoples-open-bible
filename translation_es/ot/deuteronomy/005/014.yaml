    issue: «obra» para מְלָאכָה
    rationale: En español bíblico y legal contemporáneo, «No harás ningún trabajo» comunica mejor la prohibición sabática que «ninguna obra», que suena forzado y menos natural.
  - severity: medium
    issue: Notas mal ancladas/incompletas
    rationale: La nota b se ancla solo en «esclavo» aunque explica también «sierva/sierva»; la nota sobre גֵּר como residente extranjero no aparece, y la nota d corresponde solo a «dentro de tus puertas». El proyecto exige que cada nota tenga su marcador exacto en el texto donde aplica.
  - severity: medium
    issue: «extranjero» subrepresenta el matiz residente de גֵּר
    rationale: El hebreo se refiere a un no nativo residente dentro de la comunidad. «Extranjero» solo puede sonar demasiado general o transitorio; conviene compensarlo con una nota léxica anclada o usar «residente extranjero».
  - severity: low
    issue: «animales» es más amplio que בְּהֵמָה en este contexto
    rationale: La auditoría inglesa documenta «livestock». En español, «ganado» o «animales domésticos» preserva mejor el referente de posesión doméstica sin abrirse a cualquier animal.
