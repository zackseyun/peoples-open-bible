  to: Vengamos ante su rostro[a] con acción de gracias; démosle gritos de júbilo con cánticos.
  rationale: Se ajusta la primera cláusula para expresar de forma más natural la idea de presentarse ante Dios, preservando a la vez la imagen literal «rostro» con nota. Se cambia «con agradecimiento» por «con acción de gracias» por mejor idiomaticidad bíblica. Se revisa la segunda cláusula para reflejar con mayor precisión el clamor jubiloso de נָרִיעַ y la dirección «a él» de לּוֹ.
