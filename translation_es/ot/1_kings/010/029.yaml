translation:
  language: es
  text: Y un carro fue importado de Egipto por seiscientos siclos[a] de plata, y un caballo por ciento cincuenta[b]; y así los exportaban a todos los reyes de los hititas y a los reyes de Aram[c], por medio de ellos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''por seiscientos plata''; se suple ''siclos'' por claridad idiomática como unidad monetaria.'
    reason: lexical_alternative
  - marker: b
    text: O 'fue traído de Egipto ... los sacaban'. El hebreo usa verbos de movimiento que, en este contexto comercial, se refieren a importación y exportación.
    reason: lexical_alternative
  - marker: c
    text: Es decir, los reyes de los arameos; tradicionalmente, 'Siria'.
    reason: alternative_reading
  - marker: d
    text: 'Hebreo: ''por su mano'', esto es, por medio de ellos o mediante sus agentes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲלֶה / וַתֵּצֵא
  english_pob_choice: was imported
  chosen_spanish: salió
  alternatives_spanish:
  - fue importado
  - subió y salió
  - fue traído
  lexicon: HALOT
  rationale: El hebreo usa verbos de movimiento ('subir/salir') que, en este contexto comercial, describen la entrada del bien desde Egipto. En español, 'salió de Egipto' conserva el movimiento del texto fuente sin forzar una pasiva artificial; la idea de importación queda explicitada en la nota.
- source_word: מֶרְכָּבָה
  english_pob_choice: a chariot
  chosen_spanish: un carro
  alternatives_spanish:
  - un carro de guerra
  - un carruaje
  - un carro de combate
  lexicon: HALOT
  rationale: '''Carro'' es el equivalente natural en español bíblico para מֶרְכָּבָה. ''Carro de guerra'' sería más específico de lo que el hebreo expresa aquí; el contexto de comercio no exige esa precisión.'
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  lexicon: HALOT
  rationale: Preposición simple y directa que conserva el origen geográfico del bien.
- source_word: בְּשֵׁשׁ מֵאוֹת כֶּסֶף
  english_pob_choice: for six hundred shekels of silver
  chosen_spanish: por seiscientas piezas de plata
  alternatives_spanish:
  - por seiscientos siclos de plata
  - por seiscientas monedas de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'por seiscientos plata'. 'Piezas de plata' mantiene la referencia al metal como unidad monetaria sin introducir una medida no explícita en el texto. Se evita 'siclos' porque el pasaje no nombra la unidad.
- source_word: וְסוּס
  english_pob_choice: and a horse
  chosen_spanish: y un caballo
  alternatives_spanish:
  - y un corcel
  - y un caballo de guerra
  lexicon: HALOT
  rationale: '''Caballo'' reproduce el sentido básico sin añadir especificación militar que el hebreo no marca.'
- source_word: בַּחֲמִשִּׁים וּמֵאָה
  english_pob_choice: for a hundred and fifty
  chosen_spanish: por ciento cincuenta
  alternatives_spanish:
  - por cien y cincuenta
  - por ciento y cincuenta
  lexicon: HALOT
  rationale: Se adapta el orden numérico al uso natural del español, manteniendo la cifra exacta del hebreo.
- source_word: וְכֵן
  english_pob_choice: and so
  chosen_spanish: y así
  alternatives_spanish:
  - y de la misma manera
  - así también
  lexicon: HALOT
  rationale: '''Y así'' comunica continuidad y consecuencia comercial de manera natural en español.'
- source_word: לְכָל מַלְכֵי הַחִתִּים
  english_pob_choice: to all the kings of the Hittites
  chosen_spanish: a todos los reyes de los hititas
  alternatives_spanish:
  - para todos los reyes de los hititas
  lexicon: HALOT
  rationale: Se mantiene 'hititas' como designación étnico-política del hebreo. 'A' expresa el destinatario del envío/exportación.
- source_word: וּלְמַלְכֵי אֲרָם
  english_pob_choice: and to the kings of Aram
  chosen_spanish: y a los reyes de Aram
  alternatives_spanish:
  - y a los reyes de Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo 'Aram' conforme a la política del proyecto, en vez de la forma tradicional interpretativa 'Siria'.
- source_word: בְּיָדָם
  english_pob_choice: by their hand
  chosen_spanish: por medio de ellos
  alternatives_spanish:
  - por su mano
  - por su intermediación
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de agencia. En español, 'por medio de ellos' comunica de forma clara que actuaban como intermediarios, sin perder el vínculo con la imagen original; se preserva la nota explicativa como alternativa lexical.
- source_word: יֹצִיאוּ
  english_pob_choice: they exported them
  chosen_spanish: los exportaban
  alternatives_spanish:
  - los sacaban
  - los llevaban fuera
  lexicon: HALOT
  rationale: En este contexto económico, el causativo de יצא se entiende naturalmente como 'exportar'. El imperfecto español 'exportaban' refleja la acción habitual o general de la frase.
translation_notes:
  revision_awareness: Se incorporó la revisión del inglés POB que movió 'by their hand' al final de la cláusula, manteniendo el valor idiomático de agencia y el orden más natural en español. También se respetó la decisión revisada de tratar la frase como comercio de exportación/importación, no como mera descripción de movimiento.
  spanish_consistency_notes:
  - Se usa 'Aram' de manera consistente con el nombre hebreo propio y la política del proyecto.
  - Se mantiene 'hititas' en plural y 'reyes' en plural, como en el hebreo.
  - Se evita 'SEÑOR' u otra máscara para el nombre divino porque el versículo no contiene el Tetragrámaton.
  - La cifra monetaria se presenta en forma comprensible para el lector español sin imponer una unidad que el hebreo no explicita aquí.
