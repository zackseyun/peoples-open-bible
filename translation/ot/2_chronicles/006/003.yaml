id: 2CH.6.3
reference: 2 Chronicles 6:3
source:
  edition: WLC
  text: וַ/יַּסֵּ֤ב הַ/מֶּ֨לֶךְ֙ אֶת פָּנָ֔י/ו וַ/יְבָ֕רֶךְ אֵ֖ת כָּל קְהַ֣ל יִשְׂרָאֵ֑ל וְ/כָל קְהַ֥ל יִשְׂרָאֵ֖ל עוֹמֵֽד־־־׃
translation:
  text: Then the king turned around and blessed all the assembly of Israel[b][a], while all the assembly of Israel was standing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turned around' or more idiomatically 'turned himself.' The Hebrew reads literally 'turned his face.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the congregation of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסֵּב
  chosen: turned
  alternatives:
  - turned around
  - turned about
  lexicon: HALOT
  rationale: From סבב in the Hiphil/wayyiqtol, here describing a physical turning. 'Turned' is natural English and sufficiently formal; 'turned around' is possible but slightly more expansive than the Hebrew requires.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his face around
  - himself
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'turned his face.' Retaining 'his face' preserves the concrete expression of the source better than the smoother but less explicit 'turned himself.'
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - pronounced a blessing on
  lexicon: HALOT
  rationale: ברך commonly means 'bless.' Here the king addresses the gathered people with a blessing. 'Blessed' is concise and standard; the fuller paraphrase is not necessary in the main text.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  chosen: all the assembly of Israel
  alternatives:
  - all the congregation of Israel
  - the whole assembly of Israel
  lexicon: HALOT
  rationale: קהל denotes the gathered community. 'Assembly' is clear modern English and fits the public, cultic setting. 'Congregation' is possible but sounds more tradition-bound in contemporary English.
- source_word: עוֹמֵד
  chosen: was standing
  alternatives:
  - stood
  - was standing there
  lexicon: HALOT
  rationale: The participle depicts the people's ongoing posture at the time. 'Was standing' best conveys the durative sense in idiomatic English; 'stood' is possible but less explicit about the ongoing action.
- source_word: וְכָל קְהַל יִשְׂרָאֵל עוֹמֵד
  chosen: while all the assembly of Israel was standing
  alternatives:
  - and all the assembly of Israel was standing
  - as all the assembly of Israel stood
  lexicon: HALOT
  rationale: The clause is circumstantial, describing the state of the people as the king blessed them. 'While' makes that relationship clear in natural English without overstating it.
