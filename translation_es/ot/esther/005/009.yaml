review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca el rastro del English POB: la alegría inicial de Amán, la reacción ante Mardoqueo en la puerta del rey y la culminación en ira contra él. Sin embargo, hay dos ajustes menores necesarios: el nombre propio debe normalizarse en español como «Amán», no «Haman», y el imperfecto «no se levantaba ni temblaba» suena aspectualmente menos preciso que el hebreo narrativo en este contexto; conviene «no se levantó ni tembló delante de él» para una acción puntual observada por Amán.'
  spanish_quality_summary: El español es claro y digno, pero el uso repetido de «Haman» rompe la naturalidad y la ortografía bíblica usual en español. Además, la nota al pie tiene comillas y puntuación poco limpias. El resto del verso es legible y idiomático; «alegre y contento de corazón», «puerta del rey» y «se llenó de ira contra Mardoqueo» funcionan bien.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. La principal cuestión de alineación léxica es onomástica: en español bíblico debe preferirse «Amán» y «Mardoqueo». La alternativa léxica del English POB para וְלֹא זָע מִמֶּנּוּ debe conservarse en nota como «ni mostró temor delante de él» o equivalente. «Puerta del rey» es aceptable para בְּשַׁעַר הַמֶּלֶךְ.'
  issues:
  - severity: medium
    issue: 'Nombre propio sin hispanizar: «Haman»'
    rationale: En una Biblia en español, la forma normal y ampliamente reconocible es «Amán». Mantener «Haman» reduce la legibilidad y se aparta del uso bíblico estándar sin razón documentada.
  - severity: low
    issue: Aspecto verbal mejorable en «no se levantaba ni temblaba»
    rationale: El hebreo narra lo que Amán vio en ese momento concreto. En español narrativo suena más natural y preciso «no se levantó ni tembló delante de él» que el imperfecto habitual «no se levantaba ni temblaba».
  - severity: low
    issue: Redacción de la nota al pie
    rationale: La nota actual incluye comillas y puntuación innecesarias. Debe presentarse con formato limpio y español natural, manteniendo la alternativa léxica del English POB.
