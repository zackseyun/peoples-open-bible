translation:
  language: es
  text: 'Y trajeron la cabeza de Is-boset a David en Hebrón, y dijeron al rey: «Aquí está la cabeza de Is-boset, hijo de Saúl, tu enemigo, que buscaba tu vida. Yahvé ha dado hoy a mi señor el rey venganza[a] contra Saúl y contra su descendencia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo tiene נְקָמוֹת, plural con valor intensivo: «venganzas» o «actos de venganza»; en español se expresa de manera más natural como «venganza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִאוּ
  english_pob_choice: They brought
  chosen_spanish: Y trajeron
  alternatives_spanish:
  - Y llevaron
  - Trajeron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de בוא aquí expresa la acción de presentar el objeto ante David. «Trajeron» conserva el movimiento hacia el destinatario y suena natural en español; mantengo la conjunción inicial para reflejar la secuencia narrativa.
- source_word: רֹאשׁ
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - cabeza
  lexicon: HALOT
  rationale: El contexto de ejecución y presentación física exige el sentido literal de «cabeza»; no hay base para una metáfora.
- source_word: אִישׁ בֹּשֶׁת
  english_pob_choice: Ish-bosheth
  chosen_spanish: Is-boset
  alternatives_spanish:
  - Ish-boset
  - Is-bosheth
  lexicon: HALOT
  rationale: El hebreo masorético de este versículo contiene la forma con בֹּשֶׁת, por lo que la transliteración española debe seguir esa forma. «Is-boset» conserva el nombre propio con ortografía española legible.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebrón
  lexicon: HALOT
  rationale: Topónimo conocido; en español bíblico es natural «Hebrón» con acento gráfico.
- source_word: וַיֹּאמְרוּ אֶל הַמֶּלֶךְ
  english_pob_choice: and said to the king
  chosen_spanish: y dijeron al rey
  alternatives_spanish:
  - y dijeron al rey
  - y hablaron al rey
  lexicon: HALOT
  rationale: El hebreo introduce el discurso directo con plural verbal y complemento dativo. En español, «dijeron al rey» reproduce con naturalidad la escena y evita añadir un sujeto innecesario.
- source_word: הִנֵּה
  english_pob_choice: Here is
  chosen_spanish: Aquí está
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La fórmula de presentación deíctica se expresa con «Aquí está», que preserva la inmediatez sin el tono arcaizante de «He aquí».
- source_word: בֶּן שָׁאוּל
  english_pob_choice: son of Saul
  chosen_spanish: hijo de Saúl
  alternatives_spanish:
  - hijo de Saúl
  lexicon: HALOT
  rationale: Designación filiatoria directa; «hijo de Saúl» es la equivalencia clara y fiel en español.
- source_word: אֹיִבְךָ
  english_pob_choice: your enemy
  chosen_spanish: tu enemigo
  alternatives_spanish:
  - el que te es enemigo
  - tu adversario
  lexicon: HALOT
  rationale: «Enemigo» comunica el sentido léxico normal y el tono confrontativo del habla. Mantengo el posesivo de segunda persona por la terminación sufija hebrea.
- source_word: בִּקֵּשׁ אֶת נַפְשֶׁךָ
  english_pob_choice: sought your life
  chosen_spanish: buscaba tu vida
  alternatives_spanish:
  - buscó tu vida
  - quería quitarte la vida
  lexicon: HALOT
  rationale: El hebreo usa un modismo de «buscar el alma/vida» con sentido de intentar matar. «Buscaba tu vida» conserva el modismo y su fuerza sin volverlo demasiado interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado, de acuerdo con la norma del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma española estable y eclesialmente legible.
- source_word: לַאדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: a mi señor el rey
  alternatives_spanish:
  - a mi señor el rey
  - a mi amo el rey
  lexicon: HALOT
  rationale: La fórmula cortesana hebrea con sufijo de primera persona se vierte con «mi señor el rey». «Señor» conserva el tratamiento respetuoso humano; no se usa «Señor» mayúsculo porque no corresponde al Nombre divino.
- source_word: נְקָמוֹת
  english_pob_choice: vengeance
  chosen_spanish: venganzas
  alternatives_spanish:
  - venganza
  - actos de venganza
  lexicon: HALOT
  rationale: El plural hebreo es intensivo/abstracto. En español, «venganzas» preserva mejor el plural del original que una singularización lisa, y el pie de nota aclara el valor intensivo si se requiere.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - hoy
  - en este día
  lexicon: HALOT
  rationale: Equivalente idiomático natural en español, adecuado al discurso directo.
- source_word: מִשָּׁאוּל וּמִזַּרְעוֹ
  english_pob_choice: on Saul and on his offspring
  chosen_spanish: contra Saúl y contra su descendencia
  alternatives_spanish:
  - sobre Saúl y sobre su descendencia
  - contra Saúl y contra su linaje
  lexicon: HALOT
  rationale: La preposición con נְקָמוֹת expresa el blanco de la venganza, por lo que «contra» es la relación semántica más clara en español. «Descendencia» comunica היטב זֶרַע en el contexto dinástico.
theological_decisions:
- issue: Nombre divino יְהוָה en la cita de los asesinos
  english_pob_reading: Yahweh has given
  chosen_spanish_reading: Yahvé le ha dado
  alternative_spanish_readings:
  - Yahvé ha dado
  - Yahvé ha concedido
  rationale: El texto hebreo usa explícitamente el Tetragrama, y el proyecto exige renderizarlo como «Yahvé». Se mantiene la afirmación de los hablantes sin añadir una calificación interpretativa, porque la corrección narrativa viene después en el contexto inmediato.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Plural intensivo de נְקָמוֹת
  english_pob_reading: vengeance
  chosen_spanish_reading: venganzas
  alternative_spanish_readings:
  - venganza
  - actos de venganza
  rationale: El plural hebreo tiene fuerza intensiva o abstracta. Aunque «venganza» es más común, «venganzas» preserva mejor la forma plural del original y permite una nota aclaratoria sin borrar la tensión morfológica.
  doctrine_reference: HALOT / nota léxica sobre plurales intensivos
translation_notes:
  revision_awareness: Se siguió el paquete de fuente hebrea y el auditable en inglés; no se introdujeron cambios de sentido respecto del POB inglés. La única decisión sensible fue conservar el plural intensivo de נְקָמוֹת en el cuerpo español y explicarlo en nota para no borrar la tensión morfológica del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - Se prefirió «hijo de Saúl»/«descendencia» por claridad bíblica contemporánea.
  - Se mantuvo un registro formal y eclesialmente legible, evitando arcaísmos innecesarios.
  - La cita directa conserva el tono triunfal de los hablantes sin suavizarlo interpretativamente.
