translation:
  language: es
  text: 'Respondieron y dijeron al rey Nabucodonosor[a]: «¡Oh rey, vive para siempre!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Arameo: «Oh rey, vive por edades». La expresión es una aclamación cortesana estándar que significa «vive para siempre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנוֹ
  english_pob_choice: They answered
  chosen_spanish: Ellos respondieron
  alternatives_spanish:
  - Ellos contestaron
  - Ellos dieron respuesta
  lexicon: HALOT
  rationale: El verbo arameo introduce una fórmula de réplica. «Respondieron» conserva el valor narrativo convencional y suena natural en español junto con el verbo siguiente.
- source_word: וְאָמְרִין
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y hablaban
  - y decían
  lexicon: HALOT
  rationale: En esta construcción formular, el participio funciona como verbo narrativo. «Y dijeron» reproduce la fórmula «respondieron y dijeron» con fluidez idiomática.
- source_word: לִנְבוּכַדְנֶצַּר
  english_pob_choice: to King Nebuchadnezzar
  chosen_spanish: a Nabucodonosor el rey
  alternatives_spanish:
  - al rey Nabucodonosor
  - a Nabucodonosor, el rey
  lexicon: HALOT
  rationale: El destinatario es Nebucodonosor; el arameo lo presenta con título apposicional. En español, mantener el nombre seguido del título conserva la estructura y evita una inversión más interpretativa.
- source_word: מַלְכָּא (first occurrence)
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  - el soberano
  lexicon: HALOT
  rationale: La primera ocurrencia fija el título del personaje en aposición. «El rey» preserva la identificación sin forzar una reordenación que no exige el arameo.
- source_word: מַלְכָּא (second occurrence)
  english_pob_choice: O king
  chosen_spanish: ¡Oh rey!
  alternatives_spanish:
  - rey
  - ¡oh, rey!
  lexicon: HALOT
  rationale: La repetición es vocativa y formulaica. «¡Oh rey!» expresa con naturalidad el tono cortesano del saludo.
- source_word: לְעָלְמִין
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por edades
  lexicon: HALOT
  rationale: La expresión aramea literalmente alude a «por edades», pero en esta aclamación real equivale idiomáticamente a una bendición de larga vida. «Para siempre» reproduce bien el valor convencional en español.
- source_word: חֱיִי
  english_pob_choice: live
  chosen_spanish: vive
  alternatives_spanish:
  - que vivas
  - viva
  lexicon: HALOT
  rationale: El imperativo en contexto de bendición se rinde de modo directo con «vive». La forma exhortativa queda plenamente expresada por el marco vocativo y la frase siguiente.
theological_decisions:
- issue: Acclamación cortesana de larga vida
  english_pob_reading: The expression is a standard courtly acclamation meaning 'live forever.'
  chosen_spanish_reading: La expresión es una aclamación cortesana estándar que significa «vive para siempre».
  alternative_spanish_readings:
  - «vive por edades»
  - «que vivas para siempre»
  rationale: No hay una afirmación doctrinal especial, sino una fórmula de honor. Se conserva el sentido idiomático tradicional sin perder el trasfondo semítico de larga duración.
  doctrine_reference: Protocolo cortesano y lenguaje honorífico en el antiguo Cercano Oriente
translation_notes:
  revision_awareness: El texto inglés POB mantiene la fórmula narrativa «answered and said» y una nota que explica el valor idiomático de la aclamación final. La versión española sigue esa misma línea, preservando la estructura formular y trasladando la nota semítica al español sin suavizarla a una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene «Nabucodonosor» como forma estándar del nombre propio.
  - Se usa «el rey» en la aposición inicial y «¡Oh rey!» en el vocativo para reflejar las dos funciones de מַלכָּא.
  - «Para siempre» se elige por su naturalidad y porque recoge el valor idiomático de la fórmula sin añadir elementos ausentes.
