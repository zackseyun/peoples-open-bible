translation:
  language: es
  text: 'Aumenté mis obras[a]: construí casas para mí; planté viñas para mí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Engrandecí mis obras», «aumenté mis proyectos» o «aumenté mis empresas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגְדַּלְתִּי
  english_pob_choice: I made my works great
  chosen_spanish: Aumenté
  alternatives_spanish:
  - ensanché
  - engrandecí
  - hice grandes
  lexicon: HALOT
  rationale: 'El hifil de גדל tiene valor causativo: no solo "ser grande", sino hacer grande, aumentar o engrandecer. "Aumenté" conserva esa fuerza causativa en español natural y evita una perífrasis pesada.'
- source_word: מַעֲשַׂי
  english_pob_choice: my works
  chosen_spanish: mis obras
  alternatives_spanish:
  - mis trabajos
  - mis proyectos
  - mis undertakings
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede referirse a obra, hecho o trabajo realizado. En este contexto de actividad constructiva y de plantación, "obras" comunica el conjunto de empresas sin restringirlo a un solo tipo de tarea.
- source_word: בָּנִיתִי
  english_pob_choice: I built
  chosen_spanish: me edifiqué
  alternatives_spanish:
  - construí
  - edifiqué
  lexicon: HALOT
  rationale: 'El verbo básico es "construir/edificar". Se eligió la forma reflexiva porque el hebreo con לִי expresa beneficio o posesión personal: no solo construyó, sino que construyó para su propio uso.'
- source_word: לִי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - en mi beneficio
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica beneficio personal. "Para mí" es la manera más natural en español, y mantiene la idea de posesión/uso propio sin sonar forzada.
- source_word: בָּתִּים
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - viviendas
  - edificios
  lexicon: HALOT
  rationale: '"Casas" es el equivalente básico y más directo de בָּתִּים. Aunque el contexto real pueda ser regio, el hebreo no especifica "palacios", por lo que conviene no sobredeterminar.'
- source_word: נָטַעְתִּי
  english_pob_choice: I planted
  chosen_spanish: planté
  lexicon: HALOT
  rationale: Es el equivalente verbal estándar de נטע en español, con el mismo sentido agrícola.
- source_word: כְּרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñas
  alternatives_spanish:
  - viñedos
  - parras
  lexicon: HALOT
  rationale: '"Viñas" comunica bien el campo semántico de כרמים y suena natural en español bíblico moderno. "Viñedos" también es posible, pero "viñas" mantiene una brevedad más cercana al hebreo.'
translation_notes:
  revision_awareness: El texto en inglés de POB y su auditoría concuerdan estrechamente con el hebreo; no se registraron revisiones posteriores que alteren el sentido. La única tensión lexical relevante es el alcance de מַעֲשַׂי, que puede abarcar obras, proyectos o empresas; se optó por "obras" en el cuerpo principal y se conservó una alternativa en nota.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando arcaísmos innecesarios.
  - '"Para mí" y la forma reflexiva en "me edifiqué" transmiten el matiz benefactivo del hebreo sin añadir interpretación.'
  - '"Viñas" se usó como equivalente breve y transparente de "vineyards"; no se introdujo "viñedos" en el texto principal para no alejarse del paralelismo breve del verso.'
