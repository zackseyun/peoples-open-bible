  text: '그분께서 셋째 인을 떼시자, 셋째 생물이 「오라」 하고 말하는 것을 들었습니다. 또 내가 보니, 보라, 검은 말이 있었고, 그 위에 탄 자는 손에 저울을 들고 있었습니다.'
