  glossary_alignment: 'El borrador está bien alineado con la terminología del proyecto: «Yahvé» para יְהוָה, «sacerdotes», «profetas», «todo el pueblo», y «casa de Yahvé» con nota léxica sobre «templo». No hay conflicto teológico ni glosarial sustantivo.'
