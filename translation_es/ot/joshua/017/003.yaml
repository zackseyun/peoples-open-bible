revisions:
- from: 'Y a Zelofehad[a], hijo de Héfer, hijo de Galaad, hijo de Maquir, hijo de Manasés, no le habían nacido hijos varones, sino solo hijas; y estos son los nombres de sus hijas: Mahlá, Noa[b], Hoglá, Milcá y Tirzá.'
  to: 'Ahora bien, Zelofehad[a], hijo de Héfer, hijo de Galaad, hijo de Maquir, hijo de Manasés, no tenía hijos varones, sino solo hijas; y estos son los nombres de sus hijas: Mahla, Noa[b], Hogla, Milca y Tirsa.'
  rationale: La revisión mantiene todo el contenido semántico y jurídico del hebreo, pero mejora la naturalidad del español y evita añadir matices innecesarios. 'Ahora bien' comunica mejor la función discursiva de וְלִצְלָפְחָד en español corriente, mientras la nota conserva la literalidad. 'No tenía hijos varones' representa con mayor precisión לֹא הָיוּ לוֹ בָּנִים. También se normalizan los nombres propios para una lectura bíblica más natural en español amplio.
