translation:
  language: es
  text: Pues toda la casa de mi padre no eran sino hombres dignos de muerte[a] delante de mi señor el rey; sin embargo, pusiste a tu siervo entre los que comen en tu mesa. Así que, ¿qué otro derecho[b] me queda, para que siga clamando al rey?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hombres de muerte’, es decir, hombres sujetos a muerte o dignos de ejecución.
    reason: lexical_alternative
  - marker: b
    text: ‘Derecho’ traduce aquí צְדָקָה en el sentido de un reclamo o pretensión justa, no principalmente rectitud moral personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי לֹא הָיָה ... כִּי אִם
  english_pob_choice: For ... were nothing but
  chosen_spanish: Pues ... no era sino
  alternatives_spanish:
  - Ciertamente ... no era más que
  - Porque ... no era sino
  lexicon: HALOT
  rationale: La construcción hebrea expresa una limitación enfática; en español, 'no era sino' reproduce bien esa restricción sin sonar forzado. 'Pues' introduce con naturalidad la razón que sustenta la declaración de Mefiboset.
- source_word: כָּל בֵּית אָבִי
  english_pob_choice: all my father's house
  chosen_spanish: toda la casa de mi padre
  alternatives_spanish:
  - toda la familia de mi padre
  - todo el hogar de mi padre
  lexicon: HALOT
  rationale: '''Casa'' conserva la imagen semítica de linaje/hogar extendido y es fiel al hebreo; ''de mi padre'' mantiene el vínculo familiar explícito.'
- source_word: אַנְשֵׁי מָוֶת
  english_pob_choice: men deserving death
  chosen_spanish: hombres dignos de muerte
  alternatives_spanish:
  - hombres de muerte
  - hombres merecedores de muerte
  lexicon: HALOT
  rationale: El hebreo alude a personas sujetas a pena capital o que merecen ejecución. 'Dignos de muerte' preserva el sentido jurídico-moral sin volverlo literalista o ambiguo.
- source_word: לַאדֹנִי הַמֶּלֶךְ
  english_pob_choice: before my lord the king
  chosen_spanish: delante de mi señor el rey
  alternatives_spanish:
  - ante mi señor el rey
  - para mi señor el rey
  lexicon: HALOT
  rationale: '''Delante de'' comunica adecuadamente la relación de comparecencia/estatus ante el rey, que en este contexto es judicial y relacional a la vez.'
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí el hablante usa una fórmula de humildad cortesana; 'siervo' es la opción más natural en español bíblico para esa autodenominación, aunque el término pueda solaparse con 'esclavo' en otros contextos.
- source_word: בְּאֹכְלֵי שֻׁלְחָנֶךָ
  english_pob_choice: among those who eat at your table
  chosen_spanish: entre los que comen en tu mesa
  alternatives_spanish:
  - entre los comensales de tu mesa
  - con los que comen de tu mesa
  lexicon: HALOT
  rationale: La expresión hebrea señala pertenencia al grupo privilegiado de la mesa real. 'Entre los que comen en tu mesa' mantiene la imagen concreta y es clara en español.
- source_word: וּמַה יֶּשׁ לִי עוֹד צְדָקָה
  english_pob_choice: So what further right do I have
  chosen_spanish: Así que ¿qué otro derecho tengo todavía?
  alternatives_spanish:
  - ¿qué derecho me queda todavía?
  - ¿qué otra reivindicación tengo todavía?
  lexicon: HALOT
  rationale: צְדָקָה aquí no es 'justicia' en sentido moral abstracto, sino una pretensión legítima ante el rey. 'Derecho' expresa bien esa reclamación legal-relacional.
- source_word: וְלִזְעֹק עוֹד אֶל הַמֶּלֶךְ
  english_pob_choice: that I should cry out any more to the king
  chosen_spanish: para clamar aún al rey
  alternatives_spanish:
  - para gritar todavía al rey
  - para apelar aún al rey
  lexicon: HALOT
  rationale: זעק denota un clamor de petición o protesta. 'Clamar' conserva esa fuerza y funciona naturalmente en español bíblico actual.
theological_decisions:
- issue: Sentido de צְדָקָה en este contexto
  english_pob_reading: '''Right'' translates Hebrew tsedaqah here in the sense of a just claim or entitlement, not primarily personal moral righteousness.'
  chosen_spanish_reading: '''derecho'' traduce aquí צְדָקָה en el sentido de una pretensión legítima o un reclamo justo, no de rectitud moral personal.'
  alternative_spanish_readings:
  - '''justicia'' en sentido de causa justa'
  - '''rectitud'' como cualidad moral'
  rationale: 'El contexto es una apelación ante el rey: Mefiboset no habla primero de su virtud moral, sino de su base legítima para volver a pedir algo. ''Derecho'' evita confundir el término con justicia ética general.'
  doctrine_reference: Uso semántico de צְדָקָה en contexto judicial-relacional.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés; no se identificaron revisiones aplicadas en la fuente inglesa reciente, y la versión española sigue esa lectura estable sin introducir cambios no atestiguados.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando corresponda; aquí no aparece el Tetragrámaton.
  - Se eligió 'siervo' para עבד por el registro cortés del discurso ante el rey, coherente con la decisión inglesa.
  - '''Derecho'' se usa de forma consistente con el valor relacional-jurídico de צְדָקָה en este versículo.'
  - La puntuación reproduce una división natural en español del hebreo con el mismo énfasis contrastivo.
