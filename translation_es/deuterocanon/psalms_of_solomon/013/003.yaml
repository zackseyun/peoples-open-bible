translation:
  language: es
  text: Fieras salvajes[a] arremetieron contra ellos; con sus dientes desgarraron su carne, y con sus muelas trituraron sus huesos[b]; y de todas estas cosas el Señor nos rescató.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego pasa de la descripción en tercera persona («ellos/sus») a la confesión en primera persona («nos»). Se conserva ese cambio en español.
    reason: alternative_reading
  - marker: b
    text: También puede leerse «bestias malvadas», pero en español eso sugiere culpa moral; aquí se prefiere la idea de ferocidad o peligrosidad física.
    reason: lexical_alternative
lexical_decisions:
- source_word: θηρία
  english_pob_choice: beasts
  chosen_spanish: fieras salvajes
  alternatives_spanish:
  - bestias
  - animales salvajes
  lexicon: LSJ
  rationale: El griego indica animales feroces y peligrosos; «fieras salvajes» conserva la fuerza hostil de la imagen mejor que el más neutro «animales». Además, evita la lectura moral de «malvadas» o «malignas» aplicada a animales.
- source_word: ἐπέδραμοσαν
  english_pob_choice: rushed at
  chosen_spanish: arremetieron contra
  alternatives_spanish:
  - se lanzaron contra
  - atacaron
  lexicon: LSJ
  rationale: El verbo expresa un embate súbito y violento. «Arremetieron contra» mantiene tanto el movimiento como la agresión sin añadir matices innecesarios.
- source_word: ἐν τοῖς ὀδοῦσιν αὐτῶν ἔτιλλον σάρκας αὐτῶν
  english_pob_choice: with their teeth they tore their flesh
  chosen_spanish: con sus dientes desgarraban su carne
  alternatives_spanish:
  - con sus dientes arrancaban su carne
  - con sus dientes la desgarraban
  lexicon: LSJ
  rationale: «Desgarraban» traduce con naturalidad la violencia del gesto en español y corresponde al valor contextual de ἔτιλλον. «Su carne» preserva la referencia corporal literal de σάρκας.
- source_word: ἐν ταῖς μυλαῖς ἔθλων ὀστᾶ αὐτῶν
  english_pob_choice: with their molars they crushed their bones
  chosen_spanish: con sus muelas trituraban sus huesos
  alternatives_spanish:
  - con sus muelas molían sus huesos
  - con sus dientes molares aplastaban sus huesos
  lexicon: LSJ
  rationale: «Muelas» es el equivalente español más natural de μυλαῖς en este contexto, y «trituraban» transmite bien la acción de moler o machacar con violencia. Se conserva la literalidad de «sus huesos».
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - libró
  - salvó
  lexicon: LSJ
  rationale: «Rescató» es idiomático en español para una liberación desde peligro concreto y conserva el matiz de sacar a alguien de una situación amenazante.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor
  lexicon: project default
  rationale: Aunque el proyecto normalmente usa «Yahvé» para יהוה, aquí el texto griego ofrece Κύριος y el audit trail inglés mantiene «Lord». En español, «el Señor» preserva el registro bíblico convencional de la cita griega sin introducir una identificación más fuerte de la que el griego explícitamente ofrece en esta cláusula.
theological_decisions:
- issue: Cambio de tercera persona a primera persona en la clausula final
  english_pob_reading: 'The verse is translated as written, preserving the movement from third person description to first person confession: ''the Lord rescued us.'''
  chosen_spanish_reading: La traducción conserva el paso de «ellos/sus» en la imagen de ataque a «nos rescató» al final.
  alternative_spanish_readings:
  - armonizar a «los rescató» para suavizar la transición
  - repetir «nos» en toda la secuencia
  rationale: El griego termina con ἡμᾶς («nos»), y esa oscilación retórica debe permanecer visible en español. Suavizarla borraría una tensión textual documentada.
  doctrine_reference: Preservar la tensión textual sin armonizarla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa pasó por una revisión que corrigió la elección anterior «wicked beasts» a «savage beasts» para evitar una carga moral inapropiada en animales, y luego ajustó la cláusula verbal para reflejar más de cerca el griego. La presente propuesta sigue esa decisión revisada y la traslada a un español natural y auditable.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para Κύριος en consonancia con el audit trail inglés y con el registro bíblico del pasaje.
  - Se evita «bestias malvadas» para no introducir una culpabilidad moral no sustentada por el contexto.
  - «Desgarraban» y «trituraban» preservan la violencia física del hebreo/griego sin volver la frase excesivamente literaria.
  - La nota a conserva la tensión pronominal final, que es parte relevante del testimonio textual.
