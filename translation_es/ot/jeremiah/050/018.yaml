translation:
  language: es
  text: 'Por tanto, así dice Yahvé de los ejércitos[a], el Dios de Israel: He aquí, voy a castigar al rey de Babilonia y a su tierra, como castigué al rey de Asiria.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'voy a visitar / llamar a cuentas al rey de Babilonia y a su tierra ... como visité / llamé a cuentas al rey de Asiria'. El verbo hebreo פקד puede significar 'visitar', 'atender' o 'llamar a cuentas'; aquí lleva un sentido punitivo por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la conclusión inferida del contexto previo con un conector natural y solemne en español.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - de este modo dice
  lexicon: HALOT
  rationale: Mantiene la fórmula profética estándar sin recargarla; en español bíblico moderno, 'así dice' conserva el registro solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Sigue el término POB para el nombre divino, preservando el Tetragrama como nombre propio en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' es una equivalencia clara y natural en español para este título divino; conserva la amplitud de la imagen de huestes/poderes.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Traducción directa del sintagma en constructo, manteniendo la identificación pactual de Yahvé con Israel.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am about to
  chosen_spanish: He aquí, voy a
  alternatives_spanish:
  - Mira, voy a
  - He aquí, estoy por
  lexicon: HALOT
  rationale: '''He aquí'' conserva el llamado de atención; ''voy a'' comunica la inminencia divina de manera natural en español.'
- source_word: פֹקֵד
  english_pob_choice: punish
  chosen_spanish: castigar
  alternatives_spanish:
  - visitar
  - llamar a cuentas
  lexicon: HALOT
  rationale: En este contexto de juicio, 'castigar' transmite la acción punitiva que el POB documenta para פקד sin perder claridad.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: a
  alternatives_spanish:
  - contra
  - sobre
  lexicon: HALOT
  rationale: Con 'castigar' en español, la preposición natural es 'a' para el objeto directo humano y territorial; evita forzar una calca.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - al rey de Babilonia
  lexicon: HALOT
  rationale: Mantiene la referencia política con la preposición adecuada en español dentro de la construcción verbal.
- source_word: אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: '''Tierra'' reproduce el uso bíblico de אֶרֶץ con el matiz de territorio nacional o dominio, más natural que ''país'' aquí.'
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce la comparación de forma directa y fiel; en español, 'como' basta y no debilita la relación comparativa.
- source_word: פָּקַדְתִּי
  english_pob_choice: I punished
  chosen_spanish: castigué
  alternatives_spanish:
  - visité
  - llamé a cuentas
  lexicon: HALOT
  rationale: Se conserva la misma decisión semántica que para פֹקֵד, manteniendo la coherencia punitiva del versículo.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: al rey de Asiria
  alternatives_spanish:
  - al rey de Asiria
  lexicon: HALOT
  rationale: Traducción directa y paralela a 'al rey de Babilonia', preservando el contraste histórico del oráculo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se conserva el nombre propio divino según la convención del proyecto, en lugar de ocultarlo bajo un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of פקד in a judgment oracle
  english_pob_reading: punish
  chosen_spanish_reading: castigar
  alternative_spanish_readings:
  - visitar
  - llamar a cuentas
  rationale: El contexto es un anuncio de juicio contra Babilonia y un paralelo con Asiria; 'castigar' expresa la fuerza punitiva sin añadir interpretación extra.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Corregido para anclar explícitamente la nota al marcador [a] en el texto español, evitando la validación previa fallida. La redacción española conserva la comparación y el sentido punitivo del hebreo sin depender de una traducción mecánica del inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del nombre divino en todo el registro.
  - '''castigar'' se usa de manera coherente para פקד en ambos miembros del paralelismo.'
  - '''tierra'' reproduce el valor territorial de אֶרֶץ sin introducir una connotación moderna ajena.'
