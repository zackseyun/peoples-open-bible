  to: Y los hijos de Benjamín salieron al encuentro del pueblo[a], y fueron apartados de la ciudad[b]; y comenzaron a derribar a algunos del pueblo, como en otras ocasiones[c], en las calzadas, una de las cuales sube a Betel y otra a Gibeá por campo abierto[d], como a treinta hombres de Israel.
