translation:
  language: es
  text: Repartirán la tierra por sorteo, según sus clanes. Al grupo más numeroso le aumentarán su heredad, y al grupo menos numeroso le disminuirán su heredad. Donde le caiga el sorteo[a], esa será su porción. Recibirán sus heredades según las tribus de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: "Donde le salga el sorteo, allí será suyo".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְנַחַלְתֶּם
  english_pob_choice: You shall apportion
  chosen_spanish: Ustedes repartirán
  alternatives_spanish:
  - ustedes se repartirán
  - ustedes asignarán como heredad
  lexicon: HALOT
  rationale: En este contexto de distribución tribal de la tierra, el verbo apunta al acto de asignar/repartir porciones. 'Repartirán' comunica con naturalidad la acción distributiva sin perder el marco de heredad.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: '''Tierra'' es el equivalente español más natural para la porción territorial de Israel en este pasaje. ''Tierra prometida'' añade algo no dicho en el hebreo de este versículo.'
- source_word: בְּגוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suerte
  - mediante sorteo
  lexicon: HALOT
  rationale: En español, 'por sorteo' expresa con claridad el procedimiento de asignación por suerte/lotaje. Evita la posible ambigüedad de 'suerte' y mantiene el sentido ritual-legal.
- source_word: לְמִשְׁפְּחֹתֵיכֶם
  english_pob_choice: according to your clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus linajes
  lexicon: HALOT
  rationale: '''Clanes'' refleja mejor la unidad social-tribal del hebreo que ''familias'', que en español puede sonar demasiado nuclear. Se conserva el matiz de agrupación tribal.'
- source_word: לָרַב
  english_pob_choice: To the larger group
  chosen_spanish: Al grupo más numeroso
  alternatives_spanish:
  - Al más grande
  - Al mayor
  lexicon: HALOT
  rationale: La comparación es cuantitativa, no de dignidad. 'Más numeroso' hace explícito el sentido del hebreo en el contexto de distribución proporcional.
- source_word: תַּרְבּוּ אֶת נַחֲלָת/וֹ
  english_pob_choice: you shall increase its inheritance
  chosen_spanish: le aumentarán su heredad
  alternatives_spanish:
  - aumentarán su herencia
  - harán mayor su heredad
  lexicon: HALOT
  rationale: '''Heredad'' conserva el término técnico de porción territorial heredada. ''Le aumentarán'' refleja el hiphil de רבה en castellano natural y mantiene la relación con el grupo receptor.'
- source_word: וְלַמְעַט
  english_pob_choice: and to the smaller
  chosen_spanish: al menos numeroso
  alternatives_spanish:
  - al menor grupo
  - al más pequeño
  lexicon: HALOT
  rationale: Se completa el paralelismo con la cláusula anterior. 'Menos numeroso' transmite la idea de menor tamaño cuantitativo sin introducir una valoración de importancia.
- source_word: תַּמְעִיט אֶת נַחֲלָת/וֹ
  english_pob_choice: you shall reduce its inheritance
  chosen_spanish: le disminuirán su heredad
  alternatives_spanish:
  - reducirán su heredad
  - le harán menor su heredad
  lexicon: HALOT
  rationale: '''Disminuirán'' conserva el contraste verbal con ''aumentarán'' y expresa el hiphil de מעט. ''Heredad'' se mantiene por consistencia terminológica.'
- source_word: אֶל אֲשֶׁר יֵצֵא לוֹ שָׁמָּה הַגּוֹרָל
  english_pob_choice: Wherever the lot falls for anyone
  chosen_spanish: A quien le salga allí el sorteo
  alternatives_spanish:
  - Donde le salga el sorteo
  - A quien allí le toque el sorteo
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática con 'salir' del sorteo/lote. En español, 'le salga el sorteo' comunica esa decisión asignada por suerte; 'allí' reproduce la referencia locativa del texto.
- source_word: לוֹ יִהְיֶה
  english_pob_choice: that shall be his
  chosen_spanish: esa será su porción
  alternatives_spanish:
  - eso será suyo
  - le pertenecerá
  lexicon: HALOT
  rationale: '''Porción'' hace explícito el referente implícito del texto: la parte asignada por el sorteo. Aunque literalmente podría ser ''será suyo'', ''porción'' clarifica sin añadir contenido ajeno.'
- source_word: לְמַטּוֹת אֲבֹתֵיכֶם
  english_pob_choice: according to the tribes of your fathers
  chosen_spanish: según las tribus de sus padres
  alternatives_spanish:
  - según las tribus de sus antepasados
  - conforme a las tribus de sus padres
  lexicon: HALOT
  rationale: '''Tribus de sus padres'' conserva la estructura del hebreo y el vínculo ancestral/paternal. ''Según'' expresa adecuadamente la norma distributiva.'
- source_word: תִּתְנֶחָלוּ
  english_pob_choice: You shall receive your inheritances
  chosen_spanish: Ustedes recibirán sus heredades
  alternatives_spanish:
  - ustedes heredarán
  - ustedes tomarán posesión como heredad
  lexicon: HALOT
  rationale: '''Recibirán'' funciona bien en castellano para la recepción de porciones ya asignadas, y ''heredades'' mantiene la terminología del reparto territorial.'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el reparto distributivo del hebreo y el audit trail inglés: conserva el paralelismo aumentar/disminuir, el marco de heredad y la asignación por sorteo, pero adapta el orden y el léxico para que suene natural en español.'
  spanish_consistency_notes:
  - Se eligió 'heredad' de manera consistente para נַחֲלָה, en línea con el carácter técnico-territorial del pasaje.
  - Se evitó 'familias' como equivalente principal de מִשְׁפָּחוֹת para no debilitar el sentido de clanes tribales.
  - '''Por sorteo'' se prefirió a ''por suerte'' para una formulación más clara y pública en español.'
  - No se añadieron notas textuales porque el sentido del hebreo y del audit trail inglés puede expresarse sin introducir variantes relevantes en español.
