id: LUK.19.38
reference: Luke 19:38
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: λέγοντες· Εὐλογημένος ὁ ἐρχόμενος ⸀βασιλεὺς ἐν ὀνόματι κυρίου· ⸂ἐν οὐρανῷ εἰρήνη⸃ καὶ δόξα ἐν ὑψίστοις.
base_translation:
  language: en
  yaml_path: translation/nt/luke/019/038.yaml
  text: saying[b][a], “Blessed is the King who comes in the name of the Lord! Peace in heaven and glory in the highest!”
  footnotes:
  - marker: a
    text: Some translations follow the more familiar wording, 'Blessed is he who comes in the name of the Lord,' but Luke explicitly includes 'the King.'
    reason: alternative_reading
  - marker: b
    text: 'This echoes Luke 2:14 but reverses the location: there, ''peace on earth''; here, ''peace in heaven.'''
    reason: cross_reference
translation:
  language: ko
  text: 그들은 말했습니다. 「주의 이름으로 오시는 왕은 복되시도다! 하늘에는 평화요, 지극히 높은 곳에는 영광이로다!」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 여기서 κυρίου는 시 118:26 인용으로 YHWH 지칭
  chosen_reading: 주의 이름으로 오시는
  alternative_readings:
  - 야훼의 이름으로 오시는
  rationale: 마소라/LXX 시 118:26은 YHWH(κύριος)를 가리키며, 환영하는 군중의 외침은 그 본문의 인용이다. 그러나 누가의 헬라어 본문은 이미 κύριος로 매개되어 있고, 본 절에서 직접 야훼 호칭으로 옮기면 환영의 외침이 어색해진다. 한국어 「주의 이름으로」를 본문에 두되 인용의 야훼 함의는 각주의 대상이다.
  doctrine_reference: DOCTRINE.md §5 LXX citations
