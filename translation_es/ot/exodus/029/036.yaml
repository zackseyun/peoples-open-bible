  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y la línea auditada en inglés: פַר חַטָּאת como ''un toro como ofrenda por el pecado[a]'', לַיּוֹם con sentido distributivo ''cada día'', וְחִטֵּאתָ עַל־הַמִּזְבֵּחַ correctamente como purificación ritual del altar, בְּכַפֶּרְךָ עָלָיו bien entendido de forma temporal ''cuando hagas expiación por él'', y וּמָשַׁחְתָּ ... לְקַדְּשׁוֹ como unción para consagración. No introduce categorías ajenas ni pierde el sentido cultual.'
