translation:
  language: es
  text: Deben destruir por completo todos los lugares donde las naciones que ustedes están desposeyendo sirvieron a sus dioses[a] allí, en los montes altos, en las colinas y debajo de todo árbol frondoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “adoraron a sus dioses allí”. El verbo hebreo puede significar “servir” en el sentido de culto religioso.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַבֵּד תְּאַבְּדוּן
  english_pob_choice: You must surely destroy
  chosen_spanish: Debes destruir[a] por completo
  alternatives_spanish:
  - Debes destruir totalmente
  - Debes destruir sin falta
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito intensifica el mandato. En español, “debes destruir por completo” comunica bien la fuerza enfática sin caer en un giro demasiado arcaico. Se mantiene el verbo simple “destruir” para no debilitar la contundencia del hebreo.
- source_word: הַמְּקֹמוֹת
  english_pob_choice: all the places
  chosen_spanish: todos los lugares
  alternatives_spanish:
  - todos los sitios
  - cada lugar
  lexicon: HALOT
  rationale: מָקוֹם aquí apunta a ubicaciones concretas de culto. “Lugares” es natural en español y conserva el sentido local y tangible mejor que una formulación más abstracta.
- source_word: עָבְדוּ שָׁם
  english_pob_choice: served there
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron allí
  - rindieron culto allí
  lexicon: HALOT
  rationale: עבד con objeto divino puede significar servir en sentido religioso. “Sirvieron” sigue de cerca el verbo hebreo y evita sustituirlo directamente por “adoraron”, aunque el contexto cultual deja claro el sentido.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En Deuteronomio se refiere a los pueblos no israelitas del territorio. “Naciones” es la equivalencia más estándar y no introduce la carga posterior de “gentiles”.
- source_word: אֲשֶׁר אַתֶּם יֹרְשִׁים אֹתָם
  english_pob_choice: whom you are dispossessing
  chosen_spanish: que ustedes están desposeyendo
  alternatives_spanish:
  - que ustedes están expulsando
  - cuyas tierras están tomando
  lexicon: HALOT
  rationale: יָרַשׁ en contextos de conquista incluye la idea de tomar posesión mediante el despojo del anterior ocupante. “Desposeyendo” preserva esa doble fuerza mejor que un simple “tomando posesión”.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their gods
  chosen_spanish: sus dioses
  alternatives_spanish:
  - sus dioses[a]
  - sus deidades
  lexicon: HALOT
  rationale: La traducción es directa y mantiene el plural posesivo. “Dioses” evita suavizar el texto con un término más genérico como “deidades”.
- source_word: עַל הֶהָרִים הָרָמִים
  english_pob_choice: on the high mountains
  chosen_spanish: en los montes altos
  alternatives_spanish:
  - sobre los montes altos
  - en las altas montañas
  lexicon: HALOT
  rationale: La expresión describe lugares de culto elevados. “Montes altos” reproduce con claridad la combinación nominal hebrea y resulta idiomática en español bíblico contemporáneo.
- source_word: הַגְּבָעוֹת
  english_pob_choice: the hills
  chosen_spanish: las colinas
  alternatives_spanish:
  - los collados
  - las lomas
  lexicon: HALOT
  rationale: גְּבָעוֹת son colinas; “colinas” es claro y natural para el lector moderno, sin perder el contraste con “montes altos”.
- source_word: תַּחַת כָּל עֵץ רַעֲנָן
  english_pob_choice: under every green tree
  chosen_spanish: debajo de todo árbol frondoso
  alternatives_spanish:
  - bajo todo árbol verde
  - debajo de todo árbol frondoso y verde
  lexicon: HALOT
  rationale: רַעֲנָן describe un árbol vigoroso, fresco, con follaje abundante. “Frondoso” comunica mejor esa imagen en español que “verde”, que puede sonar más literal pero menos precisa.
theological_decisions:
- issue: Alcance del mandato sobre la idolatría
  english_pob_reading: The command targets the destruction of cultic places associated with the dispossessed nations' worship.
  chosen_spanish_reading: El mandato se refiere a destruir los lugares de culto ligados a la adoración de las naciones desposeídas.
  alternative_spanish_readings:
  - El mandato ordena abolir en general las prácticas idolátricas
  - El mandato se centra en eliminar la idolatría de esos pueblos
  rationale: El hebreo objeto directo es “todos los lugares”, por lo que la traducción conserva el enfoque concreto en los sitios de culto, dejando la implicación antiidolátrica como resultado del texto y no como paráfrasis principal.
  doctrine_reference: Deuteronomio 12:2; cf. la centralización del culto en Deuteronomio 12
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el auditor inglés en el sentido principal: destrucción enfática de los lugares de culto de las naciones desposeídas. No se observan revisiones posteriores que alteren la decisión léxica o teológica.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” en el proyecto, pero este versículo no lo contiene.
  - Se conserva la distinción entre “naciones” y “dioses”, sin convertir el texto en una paráfrasis general de idolatría.
  - '“Montes altos” y “colinas” reflejan la progresión espacial del hebreo: elevaciones principales y secundarias.'
  - La nota [a] se ancla en el verbo intensificado, no en una variante textual.
