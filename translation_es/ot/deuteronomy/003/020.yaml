  to: hasta que Yahvé dé descanso a sus hermanos como a ustedes[a], y ellos también tomen posesión de la tierra que Yahvé, su Dios, les da más allá del Jordán[b]. Entonces cada uno de ustedes podrá volver a su posesión[c], que yo les he dado.
  rationale: Se corrigió el error de persona en «Yahvé su Dios» para reflejar el hebreo «Yahvé vuestro Dios» mediante la forma natural española «Yahvé, su Dios». También se unificó el registro a un español neutral latinoamericano («sus/hermanos», «ustedes», «les») y se simplificó la nota c para alinearla mejor con la alternativa preservada en el POB inglés.
