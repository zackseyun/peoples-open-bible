translation:
  language: es
  text: Hierro[a] con hierro afila, y un hombre afila el rostro de su amigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hierro afila hierro, y un hombre afila a otro». El hebreo dice literalmente «afila el rostro de su amigo», un modismo que puede aludir a mejorar o aguzar a otra persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - metal
  lexicon: HALOT
  rationale: El sustantivo denota claramente hierro. Se conserva la repetición del término en ambos miembros para mantener el paralelismo breve del proverbio.
- source_word: בְּ/בַרְזֶל
  english_pob_choice: iron
  chosen_spanish: con hierro
  alternatives_spanish:
  - por hierro
  - mediante hierro
  lexicon: HALOT
  rationale: La preposición ב expresa medio o instrumento. En español, 'con hierro' comunica de forma natural la idea instrumental sin perder la reciprocidad del proverbio.
- source_word: יָחַד
  english_pob_choice: sharpens
  chosen_spanish: se afila
  alternatives_spanish:
  - afila
  - se hace más afilado
  - se afina
  lexicon: HALOT
  rationale: El hiphil aquí indica afilar o volver agudo. En la primera mitad, el giro pronominal en español resulta más natural y refleja la acción recíproca entre ambos 'hierros'.
- source_word: וְאִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y funciona de manera representativa. Se mantiene 'un hombre' para respetar la forma gramatical y la política de precisión de género.
- source_word: יַחַד
  english_pob_choice: sharpens
  chosen_spanish: afila
  alternatives_spanish:
  - hace agudo
  - afila con
  - pule
  lexicon: HALOT
  rationale: Se repite el mismo verbo en el segundo cola; en español conviene repetir 'afila' para conservar la simetría poética y la claridad.
- source_word: פְּנֵי
  english_pob_choice: the face of
  chosen_spanish: el rostro de
  alternatives_spanish:
  - la cara de
  - el semblante de
  lexicon: HALOT
  rationale: Literalmente es 'rostro/cara'. 'El rostro de' preserva la imagen concreta del hebreo, que la nota puede explicar como un modismo de mejora o afinamiento.
- source_word: רֵעֵהוּ
  english_pob_choice: his friend
  chosen_spanish: su amigo
  alternatives_spanish:
  - su compañero
  - su prójimo
  lexicon: HALOT
  rationale: El término designa un amigo o asociado cercano. 'Su amigo' es la equivalencia más natural y ajustada al contexto sapiencial.
theological_decisions:
- issue: Imagen idiomática de 'afilar el rostro'
  english_pob_reading: The Hebrew literally says 'sharpens the face of his friend,' an idiom that may refer to improving or honing another person.
  chosen_spanish_reading: El hebreo dice literalmente 'afila el rostro de su amigo', un modismo que puede referirse a mejorar, aguzar o pulir a otra persona.
  alternative_spanish_readings:
  - '''afila el semblante de su amigo'''
  - '''hace más agudo a su amigo'''
  rationale: Se conserva la metáfora concreta del 'rostro' para no borrar la tensión idiomática documentada por la POB inglesa. La nota permite al lector ver que el sentido puede ser figurado, no meramente físico.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 3
translation_notes:
  revision_awareness: El expediente inglés no muestra revisiones aplicadas y la última pasada quedó sin cambios; la traducción española sigue la misma solución óptima, preservando la repetición verbal y la nota idiomática sobre 'el rostro de su amigo'.
  spanish_consistency_notes:
  - Se mantiene 'hierro' en ambos hemistiquios para reflejar la repetición hebrea.
  - Se conserva 'un hombre' en vez de neutralizar el sujeto masculino, conforme al antecedente inglés.
  - La nota [a] explica la lectura literal sin sustituirla por una paráfrasis.
  - '''Rostro'' se usa para preservar la imagen concreta del hebreo; no se reemplaza por una interpretación más abstracta en el texto principal.'
