revisions:
- from: Reyes serán tus padres de crianza[a], y sus princesas tus nodrizas. Con el rostro hacia la tierra se inclinarán ante ti, y lamerán el polvo de tus pies. Entonces sabrás que yo soy Yahvé; no serán avergonzados los que esperan en mí[b].
  to: Reyes serán tus padres de crianza[a], y sus princesas tus nodrizas. Con el rostro en tierra se inclinarán ante ti, y lamerán el polvo de tus pies. Entonces sabrás que yo soy Yahvé; no serán avergonzados los que esperan en mí[b].
  rationale: Se corrige la nota b para que preserve la alternativa léxica real documentada en el expediente inglés (‘hope’), en lugar de repetir la lectura principal. También se suaviza ‘hacia la tierra’ a ‘en tierra’ por mayor naturalidad e idiomaticidad en español, sin cambiar el sentido de postración del hebreo.
