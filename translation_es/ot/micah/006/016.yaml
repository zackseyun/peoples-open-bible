translation:
  language: es
  text: Se guardan los estatutos de Omrí, y todas las obras[a] de la casa de Acab, y ustedes andan en sus consejos, para que yo te convierta en una desolación, y a sus habitantes en un objeto de silbidos[b], y ustedes lleven el oprobio de mi pueblo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las prácticas de la casa de Acab'.
    reason: lexical_alternative
  - marker: b
    text: O 'sus habitantes, un silbido'; es decir, algo ante lo cual la gente silba con desprecio o burla.
    reason: cultural_note
  - marker: c
    text: O 'la afrenta de mi pueblo', o 'el reproche contra mi pueblo'. La frase hebrea es compacta y puede entenderse de más de una manera.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיִשְׁתַּמֵּר
  english_pob_choice: are kept
  chosen_spanish: se guardan
  alternatives_spanish:
  - se mantienen
  - son observados
  - se observan
  lexicon: HALOT
  rationale: El hebreo nifal con valor pasivo/impersonal se expresa naturalmente en español con 'se guardan', manteniendo la idea de que los estatutos de Omrí continúan vigentes o siendo observados.
- source_word: חֻקּוֹת
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' conserva el matiz legal y normativo del hebreo, y en español resulta claro y digno para un reproche profético.'
- source_word: עָמְרִי
  english_pob_choice: Omri
  chosen_spanish: Omrí
  alternatives_spanish:
  - Omri
  lexicon: Transliteración tradicional adaptada al español
  rationale: Se mantiene el nombre propio con adaptación gráfica española ('Omrí') para lectura natural, sin perder la referencia histórica.
- source_word: מַעֲשֵׂה בֵית אַחְאָב
  english_pob_choice: the works of the house of Ahab
  chosen_spanish: las obras de la casa de Acab
  alternatives_spanish:
  - las prácticas de la casa de Acab
  - los hechos de la casa de Acab
  lexicon: HALOT
  rationale: '''מַעֲשֵׂה'' admite ''obras'', ''hechos'' o ''prácticas''; ''obras'' empareja bien con ''estatutos'' y conserva la amplitud del término sin suavizarlo.'
- source_word: וַתֵּלְכוּ
  english_pob_choice: you walk
  chosen_spanish: ustedes andan
  alternatives_spanish:
  - ustedes caminan
  - ustedes siguen
  - han andado
  lexicon: HALOT
  rationale: En el discurso profético, el plural imperfectivo expresa conducta continua. 'Andan' comunica hábito y orientación moral sin sonar excesivamente literal o arcaico.
- source_word: בְּמֹעֲצוֹתָם
  english_pob_choice: in their counsels
  chosen_spanish: en sus consejos
  alternatives_spanish:
  - según sus consejos
  - con sus consejos
  - en sus planes
  lexicon: HALOT
  rationale: '''מֹעֲצוֹת'' puede referirse a consejos, planes o políticas. ''Consejos'' preserva la metáfora de caminar y funciona bien en español bíblico contemporáneo.'
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: HALOT
  rationale: '''Para que'' expresa finalidad o resultado en español y reproduce bien la relación entre la conducta descrita y el juicio anunciado.'
- source_word: תִּתִּי
  english_pob_choice: I may make
  chosen_spanish: yo los convierta
  alternatives_spanish:
  - yo los haré
  - yo los haga
  - yo los vuelva
  lexicon: HALOT
  rationale: En esta construcción, נתן tiene sentido causativo/resultativo. 'Convertir en' evita una traducción demasiado mecánica de 'dar' y mantiene el valor de transformación en juicio.
- source_word: אֹתְךָ
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - te
  - ustedes
  lexicon: HALOT
  rationale: El singular hebreo probablemente funciona como colectivo para el pueblo o la ciudad. El español puede naturalizarlo con un objeto plural por concordancia con el contexto corporativo y con el resto del versículo.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un desierto
  - una ruina
  lexicon: HALOT
  rationale: '''Desolación'' mantiene el sustantivo abstracto y profético del hebreo, con el mismo tono de devastación anunciado en el texto fuente.'
- source_word: וְיֹשְׁבֶיהָ
  english_pob_choice: her inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitan en ella
  - los habitantes de ella
  lexicon: HALOT
  rationale: Aunque el hebreo usa sufijo femenino, en español 'sus habitantes' resulta más natural que 'sus habitantes, de ella' y preserva la referencia a la ciudad/personificación sin forzar el género.
- source_word: לִשְׁרֵקָה
  english_pob_choice: an object of hissing
  chosen_spanish: en un objeto de silbidos
  alternatives_spanish:
  - en algo para silbarse
  - en un blanco de silbidos
  - en un objeto de burla
  lexicon: HALOT
  rationale: '''Silbidos'' conserva la imagen concreta de burla pública o desdén sonoro. ''Objeto de silbidos'' sigue de cerca la fuerza del hebreo y del inglés auditado.'
- source_word: וְחֶרְפַּת עַמִּי
  english_pob_choice: the reproach of my people
  chosen_spanish: el oprobio de mi pueblo
  alternatives_spanish:
  - la vergüenza de mi pueblo
  - el reproche de mi pueblo
  - la afrenta de mi pueblo
  lexicon: HALOT
  rationale: '''חֶרְפָּה'' puede ser reproche, afrenta, vergüenza u oprobio. ''Oprobio'' conserva la carga de deshonra pública y encaja con el registro profético, sin resolver la ambigüedad relacional del hebreo.'
- source_word: תִּשָּׂאוּ
  english_pob_choice: you will bear
  chosen_spanish: lleven
  alternatives_spanish:
  - llevarán
  - soportarán
  - cargarán
  lexicon: HALOT
  rationale: '''Nasar'' con חֶרְפָּה suele significar llevar/bear reproach. El presente conjuntivo tras ''para que'' mantiene la dependencia sintáctica del hebreo y su valor de resultado/judicio.'
theological_decisions:
- issue: Referente singular/plural de 'a you' / אֹתְךָ
  english_pob_reading: The English POB keeps 'you' singular and treats it as a corporate address to the city/people.
  chosen_spanish_reading: Se hace explícita la lectura colectiva al usar 'los', sin perder que el hebreo singular puede dirigirse al pueblo como una unidad.
  alternative_spanish_readings:
  - te
  - ustedes
  rationale: El hebreo singular puede apuntar a la ciudad/persona corporativa. En español, la concordancia con 'desolación' e 'habitantes' favorece una referencia colectiva; la decisión evita una extrañeza innecesaria sin borrar el carácter corporativo del juicio.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Ambigüedad de 'el oprobio de mi pueblo'
  english_pob_reading: The English POB preserves the compact ambiguity of the Hebrew phrase without forcing one interpretation.
  chosen_spanish_reading: '''El oprobio de mi pueblo'' mantiene la ambigüedad: puede ser el oprobio que recae sobre el pueblo, el que el pueblo soporta, o el que el pueblo sufre como consecuencia del juicio.'
  alternative_spanish_readings:
  - el reproche contra mi pueblo
  - la vergüenza de mi pueblo
  - el oprobio que mi pueblo soporta
  rationale: La frase hebrea es sintética y admite más de una relación semántica. La traducción principal conserva esa tensión interpretativa en vez de aclararla en exceso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Imagen de burla en 'לִשְׁרֵקָה'
  english_pob_reading: an object of hissing
  chosen_spanish_reading: un objeto de silbidos
  alternative_spanish_readings:
  - un blanco de silbidos
  - algo para ser silbado en burla
  rationale: La imagen bíblica no es sólo 'burla' abstracta sino una reacción pública audible. 'Silbidos' preserva mejor la concreción de la deshonra que una paráfrasis más general.
  doctrine_reference: 'Translation philosophy §2: Maintain source imagery when it carries meaning.'
translation_notes:
  revision_awareness: 'Se siguió la lectura auditada del inglés POB: ''statutes'' / ''works'' / ''walk in their counsels'' / ''a desolation'' / ''an object of hissing'' / ''the reproach of my people''. No se introdujeron cambios textuales de fondo; solo se naturalizó el referente colectivo del objeto singular hebreo y se preservó la ambigüedad final en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'Acab' y 'Omrí' como nombres propios adaptados al español.
  - Se conservan términos jurídicos y proféticos ('estatutos', 'desolación', 'oprobio') para no diluir el tono del juicio.
  - '''Consejos'' traduce מֹעֲצוֹת en continuidad con la imagen de caminar en una política o plan perverso.'
