translation:
  language: es
  text: 'Y cuando retiró su mano, de pronto salió su hermano. Entonces ella dijo[a]: «¡Qué brecha te has abierto!» Así fue llamado Pérez.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¡Qué brecha te has abierto por ti mismo!». La exclamación juega con la raíz פרץ, de la cual también viene el nombre Pérez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמֵשִׁיב יָדוֹ
  english_pob_choice: as he drew back his hand
  chosen_spanish: cuando retiraba su mano
  alternatives_spanish:
  - cuando echaba atrás su mano
  - al retirar su mano
  lexicon: HALOT
  rationale: El hebreo expresa la acción de volver o retraer la mano; en español, «retiraba su mano» conserva el gesto concreto sin sonar forzado. El imperfecto da continuidad narrativa acorde con la escena.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - y he aquí
  - súbitamente
  lexicon: HALOT
  rationale: La partícula introduce sorpresa y vividez. «He aquí que» mantiene ese valor enfático en español sin perder el tono narrativo.
- source_word: יָצָא אָחִיו
  english_pob_choice: his brother came out
  chosen_spanish: salió su hermano
  alternatives_spanish:
  - su hermano salió
  - su hermano salió afuera
  lexicon: HALOT
  rationale: En contexto de parto, יָצָא es «salir». «Salió su hermano» conserva la sencillez y el orden natural del español.
- source_word: מַה פָּרַצְתָּ עָלֶיךָ פָּרֶץ
  english_pob_choice: What a breach you have made for yourself!
  chosen_spanish: ¡Qué brecha te has abierto!
  alternatives_spanish:
  - ¡Cómo te has abierto paso!
  - ¡Qué rotura has hecho para ti!
  - ¡Qué brecha has hecho para ti!
  lexicon: HALOT
  rationale: Se conserva el juego de palabras con la raíz פרץ y el nombre «Pérez». «Brecha» reproduce mejor la imagen de ruptura que una paráfrasis más fluida, y «te has abierto» transmite el hecho de abrirse paso con una fuerza idiomática natural en español.
- source_word: פָּרֶץ
  english_pob_choice: Perez
  chosen_spanish: Pérez
  alternatives_spanish:
  - Peres
  - Peretz
  lexicon: HALOT
  rationale: Como nombre propio, se usa la transliteración castellana habitual «Pérez», que mantiene la referencia tradicional y el vínculo con la raíz hebrea en la exclamación previa.
- source_word: וַיִּקְרָא שְׁמ֖וֹ פָּרֶץ
  english_pob_choice: So his name was called Perez
  chosen_spanish: Y llamó su nombre Pérez
  alternatives_spanish:
  - Y fue llamado su nombre Pérez
  - Entonces llamó su nombre Pérez
  lexicon: HALOT
  rationale: La fórmula hebrea permite una construcción impersonal; en español, «llamó su nombre» conserva el carácter bíblico y la relación directa con el nombre dado, sin imponer un sujeto explícito que el texto no añade.
translation_notes:
  revision_awareness: La versión inglesa reciente simplifica la apertura a «And as he drew back his hand, behold,» para evitar una redundancia sintáctica. En español se sigue esa fluidez narrativa, manteniendo el valor enfático de הִנֵּה con «he aquí que» y sin sobrecargar el inicio con una fórmula impersonal innecesaria.
  spanish_consistency_notes:
  - Se mantuvo «Pérez» como nombre propio estándar en español, coherente con la relación etimológica con פָּרֶץ.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el Tetragrámaton ni títulos divinos.
  - «Brecha» preserva el juego lexical con פרץ mejor que opciones más interpretativas.
  - 'La puntuación busca reflejar la secuencia narrativa hebrea: circunstancia temporal, sorpresa, diálogo y nombramiento.'
