  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: contraste con el v. 3, negativa a matar a los hijos, apelación a la Ley/libro de Moisés, uso correcto de Yahvé, y principio de responsabilidad individual. Sin embargo, en las dos cláusulas legales citadas, «no morirán por» atenúa el modismo jurídico hebreo לֹא יָמֻתוּ ... עַל, que en este contexto significa no ser ejecutados/puestos a muerte por causa de otro. El rastro de auditoría inglés explícitamente preserva esa fuerza legal en el texto principal y relega la forma más literal a nota.'
