translation:
  language: es
  text: No te abandonen[a] el amor leal y la fidelidad; átalos alrededor de tu cuello; escríbelos en la tabla de tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «misericordia y verdad». El par hebreo suele expresar lealtad de pacto y confiabilidad; aquí se ha vertido como «amor leal y fidelidad» para reflejar ese sentido en español actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: bondad leal
  alternatives_spanish:
  - amor leal
  - amor constante
  - misericordia
  lexicon: HALOT
  rationale: חֶסֶד combina lealtad de pacto, bondad activa y amor comprometido. En español, «bondad leal» conserva el componente relacional y de fidelidad sin reducirlo a «misericordia», que sería más estrecho, ni a «amor» a secas, que pierde la dimensión de lealtad.
- source_word: אֱמֶת
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - verdad
  - fiabilidad
  - verdad y fidelidad
  lexicon: HALOT
  rationale: En este par sapiencial, אֱמֶת suele expresar confiabilidad y constancia. «Fidelidad» comunica mejor esa cualidad ética y relacional que la «verdad» abstracta, aunque esa siga siendo una posibilidad léxica.
- source_word: אַל יַעַזְבֻךָ
  english_pob_choice: Let ... not forsake you
  chosen_spanish: No te abandonen
  alternatives_spanish:
  - Que no te abandonen
  - No te dejen
  - No te abandonen nunca
  lexicon: HALOT
  rationale: El hebreo usa una forma jussiva con אַל; en español, el imperativo negativo plural personifica naturalmente a las dos virtudes como sujetos que no deben abandonar al destinatario. Se mantiene el sujeto plural implícito del par anterior.
- source_word: קָשְׁרֵם
  english_pob_choice: bind them
  chosen_spanish: átalas
  alternatives_spanish:
  - átalas
  - atáralas
  - únelas
  lexicon: HALOT
  rationale: «Átalas» conserva la imagen concreta y exhortativa del verbo hebreo, mejor que una paráfrasis como «manténlas». El pronombre femenino plural concuerda con «la bondad leal y la fidelidad».
- source_word: גַּרְגְּרוֹתֶיךָ
  english_pob_choice: around your neck
  chosen_spanish: alrededor de tu cuello
  alternatives_spanish:
  - en tu cuello
  - sobre tu cuello
  - en tu garganta
  lexicon: HALOT
  rationale: Aunque el término hebreo puede referirse a la garganta/cuello, en este contexto la imagen es ornamental y mnemotécnica. «Alrededor de tu cuello» suena natural en español y conserva el cuadro figurado.
- source_word: כָּתְבֵם
  english_pob_choice: write them
  chosen_spanish: escríbelas
  alternatives_spanish:
  - grábalas
  - inscríbelas
  - escribe
  lexicon: HALOT
  rationale: «Escríbelas» es la forma más clara y directa en español para la acción de internalización. «Inscríbelas» sería más solemne, pero no añade precisión necesaria.
- source_word: לוּחַ לִבֶּךָ
  english_pob_choice: the tablet of your heart
  chosen_spanish: la tabla de tu corazón
  alternatives_spanish:
  - el tablet de tu corazón
  - la tablilla de tu corazón
  - la tabla de tu mente
  lexicon: HALOT
  rationale: «לוּחַ» remite a una tabla o superficie de escritura; «tabla» preserva la concreción sin modernizar en exceso. «Corazón» mantiene el centro interior de la persona según el uso hebreo.
theological_decisions:
- issue: Cómo rendir el par חֶסֶד וֶאֱמֶת en español sin perder su densidad de pacto
  english_pob_reading: steadfast love and faithfulness
  chosen_spanish_reading: bondad leal y fidelidad
  alternative_spanish_readings:
  - misericordia y verdad
  - amor leal y verdad
  - amor constante y fidelidad
  rationale: 'La pareja hebrea suele denotar lealtad de pacto y confiabilidad. «Bondad leal y fidelidad» intenta conservar ambos polos: benevolencia comprometida y constancia fiable. «Misericordia y verdad» es tradicional, pero puede sonar más abstracto o doctrinal y menos relacional en español actual.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés, sin cambios respecto al control más reciente; se conserva la imagen de sujeción alrededor del cuello y la metáfora de inscripción en la interioridad, con ajuste español para fluidez natural.
  spanish_consistency_notes:
  - Se mantiene la política POB de traducir el trasfondo del nombre divino solo cuando aparece; este versículo no la activa.
  - Se evita «SEÑOR» porque no hay aquí sustitución del nombre divino ni motivo para enmascarar el hebreo.
  - «Corazón» se usa en su sentido antropológico bíblico de centro interior, no como sentimentalismo moderno.
  - La nota al pie preserva la alternativa tradicional «misericordia y verdad» sin imponerla en el texto principal.
