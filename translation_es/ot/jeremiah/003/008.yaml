revisions:
- from: Y vi que, por todas estas cosas en que la Israel rebelde había cometido adulterio[a], yo la había despedido y le había dado carta de divorcio[b]. Sin embargo, su hermana Judá, la traicionera, no temió; sino que ella también fue y se prostituyó[c].
  to: Y vi que, por todas estas cosas en que Israel descarriada[a] había cometido adulterio, yo la había enviado lejos y le había dado carta de divorcio[b]. Sin embargo, su traicionera hermana Judá no temió, sino que ella también fue y se prostituyó[c].
  rationale: 'Se revisa para alinear mejor el español con el hebreo y con las decisiones auditadas del POB: «descarriada» refleja mejor מְשֻׁבָה que «rebelde»; «la había enviado lejos» evita el matiz laboral de «despedido» y encaja con la carta de divorcio; se mejora el sintagma sobre Judá y se pule la nota alternativa final para mayor naturalidad. No cambia el sentido global del borrador.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:59:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la secuencia principal del hebreo: visión profética en primera persona, causalidad acumulativa por la adulterio de Israel, envío con documento formal de divorcio, contraste con Judá y continuación de la metáfora sexual de infidelidad. Sin embargo, dos elecciones debilitan la fidelidad precisa al campo semántico y al registro jurídico-metafórico: «despedido» suena laboral y no matrimonial; y «rebelde» para מְשֻׁבָה comunica oposición más que apartamiento/retroceso, cuando el expediente inglés documenta específicamente la idea de descarriarse o apostatar. También conviene mejorar la colocación de «traicionera» para reflejar más naturalmente «Judá traicionera».'
  spanish_quality_summary: El texto es claro y legible, pero «la había despedido» resulta poco natural en un contexto de divorcio y puede malentenderse. «Sin embargo ... ; sino que» es puntuación algo pesada; una coordinación más fluida mejora la lectura. El resto del español es digno y comprensible.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. La metáfora de adulterio/prostitución se conserva correctamente. La distinción entre מְשֻׁבָה y בֹּגֵדָה debe mantenerse mejor en español con términos más ajustados: «descarriada»/«apóstata» frente a «traicionera».'
  issues:
  - severity: medium
    issue: «la había despedido» para שִׁלַּחְתִּיהָ
    rationale: En español moderno «despedir» se asocia fuertemente con empleo. En contexto matrimonial-jurídico, «la había enviado lejos» o «la había echado»/«repudiado» comunican mejor el acto vinculado a la carta de divorcio. Dado que sigue «carta de divorcio», una formulación explícitamente matrimonial evita ambigüedad.
  - severity: medium
    issue: «Israel rebelde» para מְשֻׁבָה יִשְׂרָאֵל
    rationale: El expediente inglés insiste en el matiz de apartarse, retroceder o apostatar. «Rebelde» no es imposible, pero desplaza el énfasis desde el volverse atrás hacia la insubordinación. «Israel descarriada» preserva mejor el contraste con «Judá traicionera».
  - severity: low
    issue: Orden y puntuación de «su hermana Judá, la traicionera»
    rationale: Es comprensible, pero «su traicionera hermana Judá» o «Judá, su hermana traicionera» suena más natural y refleja mejor la unidad del sintagma hebreo con el posesivo.
  - severity: low
    issue: Nota c alternativa poco idiomática
    rationale: «fue y practicó prostitución» es menos natural que una alternativa documentada como «fue y se hizo prostituta» o «fue y se prostituyó», aunque la nota puede conservar la idea de ‘jugó a la prostituta’/‘se prostituyó’.
  revised_spanish_text: Y vi que, por todas estas cosas en que Israel descarriada[a] había cometido adulterio, yo la había enviado lejos y le había dado carta de divorcio[b]. Sin embargo, su traicionera hermana Judá no temió, sino que ella también fue y se prostituyó[c].
  revised_footnotes:
