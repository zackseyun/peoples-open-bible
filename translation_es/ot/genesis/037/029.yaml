  rationale: Se elimina la nota innecesaria sobre 'volvió/regresó', se conserva la alternativa léxica importante 'cisterna' para bor, y se restaura la nota cultural del POB sobre rasgar los vestidos. También se ajusta levemente la redacción para reflejar mejor la progresión narrativa sin sobrecargar el español.
