base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/040/012.yaml
  text: Then all the Judeans returned from all the places where they had been driven[a], and they came to the land of Judah, to Gedaliah at Mizpah[c][b], and gathered a very great abundance of wine and summer fruit.
  footnotes:
  - marker: a
    text: Or 'all the Jews.' The Hebrew term can denote the people of Judah and, by extension, Jews; here 'Judeans' highlights the historical setting in the land of Judah.
    reason: lexical_alternative
  - marker: b
    text: Or 'where they had been banished' or 'where they had been scattered.'
    reason: lexical_alternative
  - marker: c
    text: '''Summer fruit'' refers to seasonal produce gathered in late summer or at harvest time.'
    reason: cultural_note
