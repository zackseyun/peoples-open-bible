id: PHP.3.2
reference: Philippians 3:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Βλέπετε τοὺς κύνας, βλέπετε τοὺς κακοὺς ἐργάτας, βλέπετε τὴν κατατομήν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/002.yaml
  text: Watch out for the dogs[a]; watch out for the evil workers[c][b]; watch out for the mutilation.
  footnotes:
  - marker: a
    text: Paul uses 'the mutilation' as a sharp contrast to 'the circumcision' in the following verse.
    reason: cross_reference
  - marker: b
    text: Or 'Beware of'; the Greek repeats the same imperative three times for emphasis.
    reason: lexical_alternative
  - marker: c
    text: Or 'the mutilators'; the Greek noun is literally 'mutilation,' a derogatory play on the word for circumcision.
    reason: lexical_alternative
translation:
  language: ko
  text: 그 개들을 조심하십시오[a]; 그 악한 일꾼들을 조심하십시오[b]; 그 살을 베어 내는 자들을 조심하십시오[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 바울은 다음 절의 「할례(περιτομή)」와 날카롭게 대조하여 「살을 베어 냄(κατατομή)」이라는 조롱조 어휘를 쓴다.
    reason: cross_reference
  - marker: b
    text: 또는 「경계하십시오」. 헬라어는 동일한 명령형 동사를 세 번 반복하여 강조한다.
    reason: lexical_alternative
  - marker: c
    text: 헬라어 κατατομή는 본래 「살을 베어 내는 일」을 가리키는 추상명사로, 「할례(περιτομή)」를 비꼬는 말장난이다. 후절의 「할례」와의 대비를 보존하기 위해 「살을 베어 내는 자들」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βλέπετε
  english_pob_choice: Watch out for
  chosen_korean: 조심하십시오
  alternatives_korean:
  - 경계하십시오
  - 주의하십시오
  lexicon: BDAG
  rationale: 현재 능동 명령형 복수가 세 번 반복되며 긴급한 경고를 전한다. 합쇼체 「조심하십시오」가 경고의 강도와 격식을 동시에 살리며, 세 번의 반복 리듬을 그대로 유지한다.
- source_word: τοὺς κύνας
  english_pob_choice: the dogs
  chosen_korean: 그 개들
  alternatives_korean:
  - 그 더러운 개들
  - 떠돌이 개들
  lexicon: BDAG
  rationale: 직설적 은유를 유지한다. 문맥상 거친 논쟁적 호칭이지만, 본문에 해석적 형용사를 더하면 과번역이 된다. 정관사 「그」로 헬라어 정관사를 살린다.
- source_word: τοὺς κακοὺς ἐργάτας
  english_pob_choice: the evil workers
  chosen_korean: 그 악한 일꾼들
  alternatives_korean:
  - 그 나쁜 일꾼들
  - 사악한 노동자들
  lexicon: BDAG
  rationale: κακούς의 도덕적 함의와 ἐργάτας의 일반적 의미를 함께 살린다. 「악한 일꾼들」은 직접적이고 자연스러우며 바울의 고발을 미화하지 않는다.
- source_word: τὴν κατατομήν
  english_pob_choice: the mutilation
  chosen_korean: 그 살을 베어 내는 자들
  alternatives_korean:
  - 그 살베기
  - 그 거짓 할례
  - 그 베어 냄
  lexicon: BDAG
  rationale: κατατομή는 추상명사 「살을 베어 냄」을 뜻하며, 다음 절의 περιτομή(할례)와 날카로운 말장난을 이룬다. 한국어 추상명사 「살베기」는 어색하므로, 행위자 표현 「살을 베어 내는 자들」로 옮겨 앞 두 명령형의 인물 지시와 평행을 이루게 한다. 전통 한국어 번역의 「몸을 상해하는 자들」도 같은 노선이다.
theological_decisions:
- issue: κατατομή의 조롱조 어휘를 약화시키지 않고 「할례」와의 대비를 살림
  chosen_reading: 그 살을 베어 내는 자들
  alternative_readings:
  - 그 거짓 할례
  - 그 베어 냄
  rationale: 바울은 일상적 「할례」 어휘를 의도적으로 피하고 폄하적 대체어를 쓴다. 한국어 본문도 그 신학적·수사적 가시를 보존하되, 어색한 추상명사 대신 행위자 형태로 옮긴다.
  doctrine_reference: 'DOCTRINE.md § Original-language primacy; preserve rhetorical force.'
