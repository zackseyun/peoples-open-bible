translation:
  language: es
  text: Pero tus siervos cruzarán[a], cada uno armado para el combate, delante de Yahvé[b] para la guerra[c], tal como dice mi señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno equipado para el servicio militar».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «delante de Yahvé», es decir, en su presencia y bajo su autoridad.'
    reason: cultural_note
  - marker: c
    text: 'O: «para la batalla» o «a la guerra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲבָדֶיךָ
  english_pob_choice: But your servants
  chosen_spanish: Pero tus siervos
  alternatives_spanish:
  - Y tus siervos
  - Tus siervos
  lexicon: HALOT
  rationale: עֶבֶד puede significar ‘siervo’ o ‘esclavo’. Aquí el contexto es un ofrecimiento deferente de lealtad y servicio militar, por lo que ‘siervos’ mantiene el registro respetuoso sin imponer la dureza de ‘esclavos’. El waw inicial se entiende como adversativo y se vierte naturalmente con ‘Pero’.
- source_word: יַעַבְרוּ
  english_pob_choice: will cross over
  chosen_spanish: cruzarán
  alternatives_spanish:
  - pasarán
  - cruzarán al otro lado
  lexicon: HALOT
  rationale: עָבַר en este contexto expresa el cruce hacia la campaña al otro lado del límite territorial. ‘Cruzarán’ conserva el movimiento y suena natural en español bíblico contemporáneo.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: cada uno
  alternatives_spanish:
  - todos
  - cada hombre
  lexicon: HALOT
  rationale: Con el participio militar singular en sentido distributivo, כָּל se entiende como ‘cada uno’. En español, ‘cada uno’ comunica mejor la idea distributiva que ‘todos’.
- source_word: חֲלוּץ
  english_pob_choice: armed
  chosen_spanish: armado
  alternatives_spanish:
  - equipado
  - preparado
  lexicon: HALOT
  rationale: En contexto militar, חֲלוּץ denota a quien va provisto para el combate. ‘Armado’ es conciso y transmite la fuerza militar del término.
- source_word: צָבָא
  english_pob_choice: for battle
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para el combate
  - para servicio militar
  - como ejército
  lexicon: HALOT
  rationale: El sustantivo puede referirse a guerra, ejército o servicio militar. En la frase fija כָּל חֲלוּץ צָבָא, la idea es que cada uno está dispuesto para la campaña militar; ‘para la guerra’ conserva la amplitud bélica del hebreo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי significa literalmente ‘delante de’ o ‘en presencia de’. Se mantiene la convención del proyecto para יְהוָה como ‘Yahvé’, sin ocultar el nombre divino.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for the war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para el combate
  - a la guerra
  lexicon: HALOT
  rationale: La preposición indica finalidad o dirección. ‘Para la guerra’ reproduce de modo natural la función del sintagma sin suavizarlo a ‘para luchar’.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: Introduce conformidad con lo dicho por Moisés. ‘Tal como’ expresa bien la correspondencia normativa del hebreo.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señorito
  - mi amo
  lexicon: HALOT
  rationale: Aquí es un tratamiento reverencial dirigido a Moisés, no un título divino. ‘Mi señor’ conserva la deferencia y es idiomático en español bíblico moderno.
- source_word: דֹּבֵר
  english_pob_choice: says
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - está diciendo
  lexicon: HALOT
  rationale: El participio en este cierre tiene valor de habla actual/referida. ‘Habla’ mantiene el matiz de discurso en curso y evita una rigidez excesiva.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme al estándar del proyecto, se conserva el nombre divino como ‘Yahvé’ y no se lo reemplaza por un título ocultante.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לִפְנֵי יְהוָה en el marco militar
  english_pob_reading: before Yahweh, indicating that their participation in the campaign is undertaken under the LORD's authority and in his presence.
  chosen_spanish_reading: delante de Yahvé, indicando que la campaña se emprende en su presencia y bajo su autoridad.
  alternative_spanish_readings:
  - ante Yahvé, con el sentido de autoridad divina
  - en presencia de Yahvé
  rationale: 'La frase no es mera localización espacial: subraya la legitimidad teológica de la acción militar. ‘Delante de Yahvé’ preserva esa tensión entre presencia y autoridad sin explicarla en exceso dentro del texto principal.'
  doctrine_reference: POB source-note practice on divine-presence language and covenant authority
translation_notes:
  revision_awareness: El borrador inglés revisado pasó de «to the war» a «for the war» para ajustar mejor לַמִּלְחָמָה; la versión española sigue esa misma lectura final con «para la guerra», manteniendo el valor de finalidad/campaña militar sin volver a una expresión más literal pero menos natural.
  spanish_consistency_notes:
  - Se mantiene la convención del proyecto de traducir יְהוָה como «Yahvé».
  - Se usa «siervos» por el matiz relacional deferente de עֲבָדֶיךָ, no «esclavos», siguiendo el contexto.
  - «Mi señor» reproduce el tratamiento respetuoso de אֲדֹנִי dirigido a Moisés, no a Dios.
  - «Guerra» se conserva para la amplitud bélica del hebreo y para no reducir el término a un simple enfrentamiento puntual.
