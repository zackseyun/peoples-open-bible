    text: Or 'be diminished' or 'be removed.' The Hebrew asks why their father's 'name' should be lost from his clan because he had no son.
    reason: lexical_alternative
  - marker: b
    text: '''Possession'' refers to a landed holding or inheritance allotment within the clan.'
    reason: cultural_note
