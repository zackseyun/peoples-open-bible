- from: No conocen[a], ni entienden, porque ha cegado[b] sus ojos para no ver, y sus corazones para no comprender.
  to: No conocen[a], ni entienden, porque les ha cerrado[c] los ojos para que no vean[b], y sus corazones para que no entiendan.
