translation:
  language: es
  text: 'Entonces entraron los dos hombres perversos[a] y se sentaron frente a él; y aquellos hombres perversos[a] dieron testimonio contra Nabot ante el pueblo, diciendo: «Nabot maldijo[b] a Dios y al rey». Entonces lo sacaron fuera de la ciudad, lo apedrearon con piedras, y murió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'hijos de Belial' / 'hombres de Belial', un modismo para hombres perversos, malvados o indignos.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, 'bendijo', usado aquí como eufemismo por 'maldijo' en una acusación de blasfemia.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי בְלִיַּעַל / אַנְשֵׁי הַבְּלִיַּעַל
  english_pob_choice: worthless men
  chosen_spanish: hijos de Belial / hombres de Belial
  alternatives_spanish:
  - hombres perversos
  - malvados
  - canallas
  lexicon: HALOT
  rationale: El hebreo usa un modismo de desprecio moral, no una filiación literal. En español, 'hijos de Belial' conserva la forma tradicional y el color semítico del texto; 'hombres de Belial' mantiene la misma expresión en la segunda ocurrencia. No se sustituye por un término más interpretativo en el cuerpo principal porque la POB inglesa preserva la tensión entre el modismo literal y su sentido.
- source_word: נֶגְדּוֹ
  english_pob_choice: opposite him
  chosen_spanish: frente a él
  alternatives_spanish:
  - enfrente de él
  - opuesto a él
  - delante de él
  lexicon: HALOT
  rationale: La expresión señala posición frente a Nabot en un contexto judicial. 'Frente a él' suena natural en español y conserva la orientación espacial sin volver la frase rígida.
- source_word: וַיְעִדֻהוּ
  english_pob_choice: testified against
  chosen_spanish: dieron testimonio contra
  alternatives_spanish:
  - testificaron contra
  - declararon contra
  - dieron testimonio en contra de
  lexicon: HALOT
  rationale: 'El verbo tiene sentido forense: no es mera denuncia, sino testimonio legal. ''Dieron testimonio contra'' mantiene ese matiz mejor que un verbo más general como ''acusaron''.'
- source_word: נֶגֶד הָעָם
  english_pob_choice: before the people
  chosen_spanish: ante el pueblo
  alternatives_spanish:
  - en presencia del pueblo
  - delante del pueblo
  - ante la asamblea
  lexicon: HALOT
  rationale: La frase marca publicidad y solemnidad del procedimiento. 'Ante el pueblo' es breve, natural y apto para un registro bíblico contemporáneo.
- source_word: בֵּרַךְ
  english_pob_choice: cursed
  chosen_spanish: blasfemó
  alternatives_spanish:
  - maldijo
  - maldijo a Dios
  - bendijo (eufemismo literal)
  lexicon: HALOT
  rationale: Aunque el hebreo usa un eufemismo literal 'bendecir', el sentido de la imputación es blasfemar contra Dios y el rey. En español, 'blasfemó' comunica la carga jurídica y religiosa de la acusación sin perder el hecho de que se trata de una fórmula eufemística, que se preserva en nota.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: En este contexto israelita y judicial el referente es singular. 'Dios' evita una lectura politeísta y coincide con la decisión auditada de la POB inglesa.
- source_word: וָמֶלֶךְ
  english_pob_choice: and the king
  chosen_spanish: y contra el rey
  alternatives_spanish:
  - y el rey
  - y al rey
  lexicon: HALOT
  rationale: 'El complemento depende del mismo verbo implícito de la acusación; en español conviene repetir la preposición para que el paralelismo quede claro: blasfemar contra Dios y contra el rey.'
- source_word: וַיֹּצִאֻהוּ מִחוּץ לָעִיר
  english_pob_choice: they brought him outside the city
  chosen_spanish: lo sacaron fuera de la ciudad
  alternatives_spanish:
  - lo llevaron fuera de la ciudad
  - lo condujeron fuera de la ciudad
  - lo hicieron salir de la ciudad
  lexicon: HALOT
  rationale: '''Sacar fuera de la ciudad'' reproduce bien la acción de remoción previa a la ejecución y es idiomático en español. Mantiene el dinamismo narrativo del hebreo sin añadir detalles.'
- source_word: וַיִּסְקְלֻהוּ בָאֲבָנִים
  english_pob_choice: stoned him with stones
  chosen_spanish: lo apedrearon con piedras
  alternatives_spanish:
  - lo lapidaron con piedras
  - lo apedrearon
  - lo mataron a pedradas
  lexicon: HALOT
  rationale: El hebreo es explícito al decir 'con piedras'; en español 'apedrear con piedras' puede sonar redundante, pero conserva la concreción física y la violencia del texto. Se prefiere 'apedrearon' por ser el verbo bíblico más claro y se mantiene 'con piedras' por fidelidad formal.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y murió así
  - y falleció
  lexicon: HALOT
  rationale: La conclusión narrativa es directa. 'Y murió' reproduce con sobriedad el cierre del relato.
theological_decisions:
- issue: Eufemismo verbal en la acusación de blasfemia (בֵּרַךְ)
  english_pob_reading: Translate according to sense as 'cursed' in the main text
  chosen_spanish_reading: Traducir por sentido en el texto principal como 'blasfemó', manteniendo la nota sobre el eufemismo literal
  alternative_spanish_readings:
  - '''maldijo'''
  - '''bendijo'' con nota explicativa'
  rationale: La POB inglesa decidió no dejar el eufemismo literal en el cuerpo principal porque distorsionaría la acusación. En español, 'blasfemó' expresa mejor el contenido religioso-forense. La nota conserva la forma literal 'bendijo' como transparencia auditiva.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referencia de Dios en la fórmula acusatoria
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  rationale: La escena es israelita y la imputación apunta al Dios de Israel. Mantener singular evita introducir una lectura que no corresponde al contexto ni al juicio narrado.
  doctrine_reference: Contexto histórico-gramatical del relato
- issue: Conservación del modismo 'Belial' en la línea principal
  english_pob_reading: worthless men
  chosen_spanish_reading: hijos de Belial / hombres de Belial
  alternative_spanish_readings:
  - hombres perversos
  - malvados
  rationale: La POB inglesa preserva el modismo y explica su sentido. En español, conservar 'Belial' permite auditar el hebreo y evita borrar la dureza expresiva del original; la explicación queda en nota.
  doctrine_reference: Transparencia léxica del modismo hebreo
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se detectaron cambios necesarios; se mantiene la alta concordancia con el paquete fuente y el audit trail inglés.'
  spanish_consistency_notes:
  - Se conserva 'Belial' como transliteración del modismo hebreo, siguiendo la transparencia del original.
  - Se usa 'Dios' en singular, coherente con el contexto israelita y con la decisión auditada en inglés.
  - Se mantiene la concreción de 'con piedras' para reflejar el hebreo explícito.
  - Se repite 'contra' en la acusación para preservar el paralelismo semántico de la fórmula forense en español.
