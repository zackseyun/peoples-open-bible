    text: O 'cansadas' o 'agotadas'; el hebreo dice literalmente 'pesadas'.
    reason: lexical_alternative
  - marker: b
    text: O 'estables' o 'constantes'; el hebreo también puede expresar 'firmeza' o 'constancia', aunque aquí se refiere a la estabilidad física de las manos de Moisés.
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y la precisión del español sin apartarse del hebreo ni de la auditoría inglesa: se cambió ''sostenían'' por ''sostuvieron'' para una secuencia narrativa más natural; se sustituyó ''uno de un lado y otro del otro'' por ''uno de este lado y otro de aquel lado'' para expresar claramente el distributivo espacial; y se afinó la nota sobre אֱמוּנָה para destacar la firmeza física sin sugerir indebidamente una lectura moral como principal.'
