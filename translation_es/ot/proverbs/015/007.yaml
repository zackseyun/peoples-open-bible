translation:
  language: es
  text: Los labios de los sabios difunden[a] conocimiento, pero el corazón de los necios no es así[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'esparcen'. El verbo hebreo sugiere la imagen de dispersar o esparcir; aquí se usa 'difunden' por naturalidad en español.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es elíptico: literalmente, ''pero el corazón de los necios, no así''. El sentido es que los necios no distribuyen conocimiento de la misma manera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי
  english_pob_choice: the lips of
  chosen_spanish: los labios de
  alternatives_spanish:
  - los labios
  lexicon: HALOT
  rationale: Conservo la imagen corporal concreta del hebreo constructo. En español, la relación posesiva se expresa naturalmente con 'los labios de', sin convertirla en 'palabras' o 'habla'.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - las personas sabias
  lexicon: HALOT
  rationale: '''Sabios'' reproduce el valor sustantivado del adjetivo hebreo y suena natural en español, manteniendo el sentido de clase representativa sin especificar género de manera innecesaria.'
- source_word: יְזָרוּ
  english_pob_choice: spread
  chosen_spanish: difunden
  alternatives_spanish:
  - esparcen
  - dispersan
  - siembran
  lexicon: HALOT
  rationale: El verbo hebreo lleva la imagen de esparcir o dispersar. 'Difunden' comunica bien la acción de comunicar o repartir conocimiento en español, sin perder del todo la metáfora de propagación. 'Esparcen' sería más literal, pero menos idiomático con 'conocimiento'.
- source_word: דָעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - entendimiento
  lexicon: HALOT
  rationale: '''Conocimiento'' es la equivalencia directa y natural en español para דָעַת en literatura sapiencial. Conserva el contraste con la necedad sin abstraerlo en exceso.'
- source_word: לֵב
  english_pob_choice: the heart of
  chosen_spanish: el corazón de
  alternatives_spanish:
  - la mente de
  - el interior de
  lexicon: HALOT
  rationale: Mantengo 'corazón' como término sapiencial central del hebreo, que abarca interioridad, pensamiento y disposición. En español es la forma más fiel y reconocible.
- source_word: כְּסִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los torpes
  lexicon: HALOT
  rationale: '''Necios'' es un equivalente bíblico natural en español y refleja la carga moral y sapiencial de כְּסִילִים mejor que un término meramente intelectual como ''torpes''.'
- source_word: לֹא כֵן
  english_pob_choice: is not so
  chosen_spanish: no es así
  alternatives_spanish:
  - no es de la misma manera
  - no procede así
  - no es lo mismo
  lexicon: HALOT
  rationale: La frase hebrea es elíptica. 'No es así' conserva la brevedad y la contraposición sin añadir una explicación interpretativa que el texto no expresa explícitamente.
theological_decisions:
- issue: 'Elipsis final: qué implica ''no es así'' en contraste con los labios de los sabios'
  english_pob_reading: The heart of fools is not so; the sense is that fools do not distribute knowledge in the same way.
  chosen_spanish_reading: El corazón de los necios no es así; es decir, no actúa como los labios de los sabios al difundir conocimiento.
  alternative_spanish_readings:
  - su corazón no comparte esa forma de obrar
  - no comunican conocimiento de esa manera
  rationale: Sigo la lectura auditada de que la cláusula es elíptica. En el texto principal conservo la brevedad hebrea, y la elección verbal 'difunden' permite entender el contraste sin forzarlo.
  doctrine_reference: Sapiential contrast between wise speech and foolish interior disposition; no doctrinal claim beyond wisdom ethics.
translation_notes:
  revision_awareness: Se conservó la lectura auditada del verbo como metáfora de dispersión y la elipsis final. No se introdujeron cambios de revisión respecto del contexto inglés provisto.
  spanish_consistency_notes:
  - Se mantuvo ‘sabios/necios’ como pares sapienciales coherentes con el registro bíblico en español.
  - Se prefirió ‘conocimiento’ frente a ‘entendimiento’ para respetar la correspondencia directa con דָעַת.
  - Se conservó ‘corazón’ como traducción estable de לֵב en literatura sapiencial.
