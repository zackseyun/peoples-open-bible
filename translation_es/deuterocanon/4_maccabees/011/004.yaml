translation:
  language: es
  text: ¡Oh, odioso y enemigo de la humanidad![a] ¿Qué hemos hecho, que nos devastas de este modo?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Enemigo de la humanidad'' expresa el alcance colectivo del vocativo μισάνθρωπε; también puede entenderse como ''misántropo'' o ''odiador de la humanidad''.'
    reason: lexical_alternative
  - marker: b
    text: '''Devastas'' traduce un verbo de destrucción violenta; también puede rendirse como ''destruyes'', ''arrasas'' o ''saqueas''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ
  english_pob_choice: O
  chosen_spanish: ¡Oh!
  alternatives_spanish:
  - O
  lexicon: LSJ
  rationale: Se conserva la exclamación vocativa directa para mantener el tono de reproche y confrontación del original.
- source_word: μισάρετε
  english_pob_choice: hateful
  chosen_spanish: aborrecedor
  alternatives_spanish:
  - odioso
  - detestable
  - abominable
  lexicon: LSJ
  rationale: El griego expresa una censura fuerte. 'Aborrecedor' mantiene la fuerza personal del vocativo sin añadir una precisión no explícita sobre el objeto odiado.
- source_word: μισάνθρωπε
  english_pob_choice: misanthropic man
  chosen_spanish: enemigo de la humanidad
  alternatives_spanish:
  - misántropo
  - hombre que aborrece a los hombres
  - odiador de la humanidad
  lexicon: LSJ
  rationale: La forma compuesta significa literalmente alguien que odia a las personas; en español, 'enemigo de la humanidad' comunica mejor el insulto vocativo y su alcance colectivo que un simple préstamo como 'misántropo'.
- source_word: τί δράσαντες
  english_pob_choice: what have we done
  chosen_spanish: ¿Qué hemos hecho?
  alternatives_spanish:
  - ¿Habiendo hecho qué?
  - ¿Qué acción hemos cometido?
  lexicon: LSJ
  rationale: La construcción participial se vuelve naturalmente interrogativa en español. '¿Qué hemos hecho?' conserva el sentido de pedir la causa o justificación del trato recibido.
- source_word: πορθεῖς
  english_pob_choice: are ravaging
  chosen_spanish: devastes
  alternatives_spanish:
  - destruyes
  - arrasas
  - saqueas
  lexicon: LSJ
  rationale: El verbo connota destrucción violenta. 'Devastas' mantiene la fuerza de ruina sin restringirla a saqueo militar ni suavizarla excesivamente.
- source_word: τὸν τρόπον
  english_pob_choice: in this way
  chosen_spanish: de este modo
  alternatives_spanish:
  - así
  - de esta manera
  lexicon: LSJ
  rationale: La expresión adverbial demostrativa se conserva con un equivalente natural en español que mantiene el matiz enfático de la acción presente.
translation_notes:
  revision_awareness: El texto griego es breve y muy agresivo; la versión española conserva la doble invectiva vocativa, la pregunta retórica y el valor violento de πορθεῖς sin atenuarlo. La auditoría inglesa optó por 'hateful' y 'misanthropic man'; aquí se evita un calco demasiado técnico y se busca una equivalencia natural en español que preserve el insulto.
  spanish_consistency_notes:
  - Se mantiene el estilo directo y reprochador con vocativos iniciales.
  - '''Humanidad'' se usa para μισάνθρωπε porque el compuesto apunta al odio hacia las personas en general, no solo a ''hombres'' en sentido masculino.'
  - '''Devastar'' conserva mejor la violencia del verbo que una opción más genérica como ''molestar'' o ''afligir''.'
