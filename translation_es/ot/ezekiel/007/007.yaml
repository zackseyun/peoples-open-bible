    rationale: La decisión inglesa auditada eligió 'joyful shouting' precisamente para hacer explícito el contraste con מְהוּמָה. 'Alboroto' no expresa júbilo y casi duplica el campo semántico de tumulto/pánico, perdiendo la oposición principal del verso.
