base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/008.yaml
  text: These things were given from the royal possessions[a], according to the promise, to the people and to the priests and Levites. And Helkias, Zechariah, and Esyelos, the overseers of the sanctuary, gave to the priests for the Passover two thousand six hundred sheep[c][b], and three hundred calves.
  footnotes:
  - marker: a
    text: The Hebrew parallel in 2 Chronicles 35:8 has the corresponding names in Hebrew form, commonly rendered 'Hilkiah ... Jehiel.' The Greek text of 1 Esdras here reads Helkias ... Esyelos.
    reason: alternative_reading
  - marker: b
    text: The Hebrew parallel specifies 'sheep, lambs, and young goats' from the king's property; the Greek here uses the broader term 'sheep.'
    reason: lexical_alternative
  - marker: c
    text: Or 'as promised.' The Greek phrase literally reads 'according to the promise.'
    reason: lexical_alternative
