  text: εἰ τὰ ἔργα μὴ ἐποίησα ἐν αὐτοῖς ἃ οὐδεὶς ἄλλος ⸀ἐποίησεν, ἁμαρτίαν οὐκ ⸀εἴχοσαν· νῦν δὲ καὶ ἑωράκασιν καὶ μεμισήκασιν καὶ ἐμὲ καὶ τὸν πατέρα μου.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/024.yaml
  text: If I had not done among them the works that no one else did[a], they would not have sin[b]; but now they have both seen and hated both me and my Father.
  footnotes:
  - marker: a
    text: Or 'they would not be guilty of sin.' The Greek more literally says 'they would not have sin.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they have both seen and hated'.
    reason: previous_rendering
translation:
  language: ko
  text: 내가 다른 누구도 행하지 않은 일들을 그들 가운데서 행하지 않았더라면, 그들에게 죄가 없었을 것입니다. 그러나 이제 그들은 나와 내 아버지를 다 보고도 미워하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그들이 죄에 대해 책임이 없었을 것이다」. 헬라어는 더 문자적으로 「그들이 죄를 가지지 않았을 것이다」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「보고도 미워하였다」.
    reason: lexical_alternative
