base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/049/002.yaml
  text: Therefore[a], behold, days are coming, declares Yahweh, when I will cause the battle cry to be heard against Rabbah of the Ammonites, and it will become a desolate mound, and its daughter towns will be set on fire. Then Israel will dispossess those who dispossessed him[c][b], says Yahweh.
  footnotes:
  - marker: a
    text: Or 'the shout of war' or 'the alarm of war.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'its daughters,' an idiom for the smaller towns or villages dependent on a main city.
    reason: cultural_note
  - marker: c
    text: 'The Hebrew uses a wordplay on the same verb: Israel will ''dispossess'' those who had ''dispossessed'' him.'
    reason: lexical_alternative
