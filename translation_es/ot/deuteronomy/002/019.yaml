translation:
  language: es
  text: Cuando te acerques frente a los hijos de Amón[a], no los hostigues[b] ni entres en contienda con ellos, porque no te daré ninguna parte de la tierra de los hijos de Amón como posesión[c], pues la he dado como posesión a los hijos de Lot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los amonitas» a lo largo del versículo.
    reason: lexical_alternative
  - marker: b
    text: O «no los ataques». El hebreo puede prohibir de forma amplia una acción hostil, no solo un asedio formal.
    reason: lexical_alternative
  - marker: c
    text: O «como heredad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרַבְתָּ
  english_pob_choice: When you come
  chosen_spanish: Cuando te acerques
  alternatives_spanish:
  - Y te acerques
  - Cuando llegues
  lexicon: HALOT
  rationale: קָרַב expresa acercarse o aproximarse. En español, «cuando te acerques» conserva la fuerza temporal y espacial sin sonar artificial.
- source_word: מוּל
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  lexicon: HALOT
  rationale: מוּל indica estar delante o en frente. «Frente a» comunica bien la relación espacial en español natural.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - los descendientes de Amón
  lexicon: HALOT
  rationale: Se conserva la forma de parentesco del hebreo. «Hijos de Amón» mantiene la transparencia del texto y la repetición del verso.
- source_word: אַל תְּצֻרֵם
  english_pob_choice: do not harass them
  chosen_spanish: no los hostigues
  alternatives_spanish:
  - no los ataques
  - no los asedies
  lexicon: HALOT
  rationale: La raíz צור aquí prohíbe una acción hostil amplia. «Hostigar» refleja esa presión o agresión general sin restringirla a un ataque formal o a un asedio.
- source_word: וְאַל תִּתְגָּר בָּם
  english_pob_choice: or provoke them
  chosen_spanish: ni te provoques contra ellos
  alternatives_spanish:
  - ni los provoques
  - ni te enfrentes a ellos
  lexicon: HALOT
  rationale: La forma hitpael de גרה sugiere incitarse o lanzarse a una hostilidad. «Ni te provoques contra ellos» preserva el matiz reflexivo y conflictivo del hebreo; «ni los provoques» suaviza ese matiz.
- source_word: מֵאֶרֶץ בְּנֵי עַמּוֹן
  english_pob_choice: any of the land of the sons of Ammon
  chosen_spanish: ninguna parte de la tierra de los hijos de Amón
  alternatives_spanish:
  - ninguna porción de la tierra de los hijos de Amón
  - nada de la tierra de los hijos de Amón
  lexicon: HALOT
  rationale: La negación con מִן tiene fuerza partitiva. «Ninguna parte» expresa con naturalidad que no se concederá ni una porción del territorio.
- source_word: יְרֻשָּׁה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como heredad
  - como herencia
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, «posesión» es claro y fiel. «Heredad» o «herencia» pueden sonar más tradicionales, pero añaden asociaciones que el contexto no exige.
- source_word: לִבְנֵי ל֖וֹט
  english_pob_choice: to the sons of Lot
  chosen_spanish: a los hijos de Lot
  alternatives_spanish:
  - a los descendientes de Lot
  - a Lot y sus hijos
  lexicon: HALOT
  rationale: Se mantiene la expresión de parentesco del hebreo, coherente con el resto del versículo y con la razón dada para la asignación territorial.
- source_word: נְתַתִּיהָ
  english_pob_choice: I have given it
  chosen_spanish: la he dado
  alternatives_spanish:
  - se la he dado
  - la di
  lexicon: HALOT
  rationale: El perfecto verbal comunica una concesión ya establecida con vigencia presente. «La he dado» lo refleja de manera directa en español.
theological_decisions:
- issue: Conservación de la designación familiar en vez de reemplazarla por un etnónimo
  english_pob_reading: the sons of Ammon / the sons of Lot
  chosen_spanish_reading: los hijos de Amón / los hijos de Lot
  alternative_spanish_readings:
  - los amonitas / los descendientes de Lot
  rationale: El texto enfatiza linaje y asignación divina de tierras mediante lenguaje familiar. Mantener «hijos de» conserva esa tensión semántica y evita borrar la forma hebrea.
  doctrine_reference: Principio POB de transparencia léxica y consistencia terminológica
- issue: Alcance de la prohibición en תִּתְגָּר
  english_pob_reading: or provoke them
  chosen_spanish_reading: ni te provoques contra ellos
  alternative_spanish_readings:
  - ni los provoques
  - ni entres en conflicto con ellos
  rationale: El hebreo puede apuntar a incitar hostilidad o entrar en contienda, no solo a una provocación verbal. La formulación elegida preserva esa ambigüedad y el tono militar del mandato sin añadir una especificación no marcada por el texto.
  doctrine_reference: Principio POB de no eliminar tensiones léxicas documentadas
- issue: Valor de יְרֻשָּׁה en contexto territorial
  english_pob_reading: as a possession
  chosen_spanish_reading: como posesión
  alternative_spanish_readings:
  - como heredad
  - como herencia
  rationale: En un contexto de asignación de territorio, «posesión» comunica bien el don concreto de una tierra. Se evita imponer de entrada un sentido heredado-familiar más estrecho que el hebreo permite.
  doctrine_reference: Principio POB de equivalencia óptima y claridad moderna
translation_notes:
  revision_awareness: La versión inglesa más reciente retiró «to war» después de «provoke them» porque el hebreo no lo expresa explícitamente; la redacción española sigue esa revisión y evita añadir una especificación no atestiguada. También conserva la opción de traducir בְּנֵי con lenguaje de parentesco, coherente con el audit trail y con la lectura teológica del pasaje.
  spanish_consistency_notes:
  - Se mantiene «hijos de» para בְּנֵי en todo el verso, siguiendo la estrategia de transparencia léxica.
  - «Yahvé» no aparece en este versículo; no se introduce terminología divina ajena al texto.
  - «posesión» traduce יְרֻשָּׁה de modo consistente con el contexto territorial.
  - La formulación «no los hostigues» intenta abarcar la amplitud hostil de תְּצֻרֵם sin convertirlo en un asedio técnico.
