id: 1TH.5.27
reference: 1 Thessalonians 5:27
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀ἐνορκίζω ὑμᾶς τὸν κύριον ἀναγνωσθῆναι τὴν ἐπιστολὴν πᾶσιν ⸀τοῖς ἀδελφοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/027.yaml
  text: I put you under oath before the Lord to have this letter read to all the brothers[a][b].
  footnotes:
  - marker: a
    text: Or 'by the Lord.' The Greek expression can mean that Paul solemnly charges them with the Lord as the invoked authority.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' likely refers to the whole congregation, including women; Greek ἀδελφοῖς is masculine plural.'
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 주[a] 앞에서 여러분에게 엄히 맹세시킵니다. 이 편지를 모든 형제[b]에게 읽어 주십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「주의 이름으로」. 헬라어 표현은 바울이 주의 권위를 불러내어 엄숙히 명함을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 「형제」는 헬라어 남성 복수형으로, 본 호칭은 여성을 포함한 회중 전체를 가리킬 가능성이 크다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνορκίζω ὑμᾶς τὸν κύριον
  english_pob_choice: I put you under oath before the Lord
  chosen_korean: 나는 주 앞에서 여러분에게 엄히 맹세시킵니다
  alternatives_korean:
  - 주의 이름으로 여러분에게 엄히 명합니다
  - 주를 두고 여러분에게 맹세시킵니다
  lexicon: BDAG
  rationale: ἐνορκίζω의 「맹세시킴·엄숙히 명함」을 「엄히 맹세시키다」로 옮긴다. 주를 권위로 불러내는 엄숙성을 살린다.
- source_word: ἀναγνωσθῆναι τὴν ἐπιστολὴν πᾶσιν τοῖς ἀδελφοῖς
  english_pob_choice: to have this letter read to all the brothers
  chosen_korean: 이 편지를 모든 형제에게 읽어 주십시오
  alternatives_korean:
  - 이 편지를 모든 형제에게 낭독되게 하십시오
  - 이 서신을 모든 형제 앞에서 읽으십시오
  lexicon: BDAG
  rationale: ἀναγινώσκω 수동의 「낭독되다」를 한국어 능동 「읽어 주십시오」로 자연스럽게 옮긴다. 회중 앞 공적 낭독의 정황.
