review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la imagen básica del hebreo: el personaje proverbial, la mano en el recipiente y la dificultad de llevarla de vuelta a la boca. Sin embargo, «le cuesta tanto» debilita el valor de נִלְאָה («está cansado / se fatiga / está demasiado cansado») y omite la idea explícita de cansancio o agotamiento irónico. Además, el inglés auditado preserva dos alternativas léxicas con notas: para טָמַן y para בַּצַּלָּחַת; el español solo conserva una.'
  spanish_quality_summary: El español es claro y natural, pero la segunda cláusula queda algo incompleta o coloquial en exceso con «le cuesta tanto», y suena menos sentenciosa que el proverbio. Una formulación como «está demasiado cansado para volverla a llevar a su boca» conserva mejor el humor hiperbólico y la sintaxis proverbial. «Plato» es legible, aunque conviene mantener la nota de alternativas («tazón», «fuente») como en el rastro auditado.
  glossary_alignment: No hay términos teológicos de proyecto en juego. «El perezoso» corresponde bien a עָצֵל como tipo proverbial. Para טָמַן, «hunde» es defendible en español, pero debe explicarse frente a la alternativa más literal «entierra» y la opción «esconde». También falta reflejar la alternativa lexical para בַּצַּלָּחַת.
  issues:
  - severity: medium
    issue: La expresión «le cuesta tanto» no refleja de forma suficiente נִלְאָה.
    rationale: El hebreo expresa cansancio o agotamiento irónico; «le cuesta tanto» comunica dificultad, pero no el matiz de estar demasiado cansado para hacerlo.
  - severity: medium
    issue: Falta la nota léxica para «plato».
    rationale: El rastro POB en inglés conservó alternativas significativas para בַּצַּלָּחַת («bowl/platter»). El español debe preservar esa información con una nota correspondiente.
  - severity: low
    issue: La primera nota justifica «hunde», pero la alternativa principal del inglés es «buries».
    rationale: No es incorrecto usar «hunde», pero la nota debe dejar claro que el hebreo puede significar «esconder» o «enterrar», y que «hunde» se eligió por naturalidad e imagen en español.
  revised_spanish_text: El perezoso hunde su mano en el plato[a][b]; está demasiado cansado para volverla a llevar a su boca.
  revised_footnotes:
  - marker: a
    text: O «esconde su mano en el plato». El verbo hebreo puede significar «esconder» o «enterrar»; se eligió «hunde» para conservar la imagen exagerada del proverbio en español.
    reason: lexical_alternative
  - marker: b
    text: O «en el tazón» o «en la fuente».
    reason: lexical_alternative
  revision_rationale: Se revisa la segunda cláusula para reflejar explícitamente el sentido de cansancio irónico de נִלְאָה y el movimiento de retorno de לַהֲשִׁיבָהּ. También se añade la nota léxica faltante para בַּצַּלָּחַת, en línea con el audit trail inglés. Se conserva «hunde» como opción española natural para la imagen hiperbólica, con nota aclaratoria.
