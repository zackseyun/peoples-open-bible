translation:
  language: es
  text: Sin embargo, lo hiciste un poco inferior a Dios[a], y lo coronaste de gloria y honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que seres celestiales»; la Septuaginta lee «que ángeles», una traducción reflejada en Hebreos 2:7.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתְּחַסְּרֵהוּ
  english_pob_choice: you made him ... lower
  chosen_spanish: lo hiciste ... menor
  alternatives_spanish:
  - lo hiciste falta
  - lo disminuiste
  lexicon: HALOT
  rationale: El Hifil de חסר con objeto personal expresa hacer que alguien esté en una condición inferior o con menos. En español, «lo hiciste menor» comunica de manera natural la idea comparativa sin forzar una traducción mecánica de «hacer faltar».
- source_word: מְּעַט
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - ligeramente
  - por un poco de tiempo
  lexicon: HALOT
  rationale: Aquí predomina el valor de grado, no de duración. «Un poco» reproduce bien la pequeña medida de inferioridad indicada por el hebreo.
- source_word: מֵאֱלֹהִים
  english_pob_choice: than God
  chosen_spanish: que Dios
  alternatives_spanish:
  - que los dioses
  - que los seres celestiales
  - que los ángeles
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de/que Dios»; en español, la comparación se expresa de forma más natural con «que Dios». Se mantiene el sentido primario del texto hebreo, sin importar en el cuerpo principal la lectura de la Septuaginta.
- source_word: וְכָבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - majestad
  lexicon: HALOT
  rationale: «Gloria» es la equivalencia más directa y elevada para כָבוֹד en este paralelismo poético.
- source_word: וְהָדָר
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - majestad
  - esplendor
  lexicon: HALOT
  rationale: «Honor» evita repetir «gloria» y conserva bien la dignidad real o distinguida que sugiere הָדָר.
- source_word: תְּעַטְּרֵהוּ
  english_pob_choice: crowned him
  chosen_spanish: lo coronaste
  alternatives_spanish:
  - lo ceñiste
  - lo adornaste
  lexicon: HALOT
  rationale: El Piel de עטר suele expresar coronar o rodear con honra. «Lo coronaste» transmite la imagen regia con precisión y funciona naturalmente con el complemento siguiente.
theological_decisions:
- issue: Lectura de אֱלֹהִים en Salmo 8:6
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - seres celestiales
  - ángeles
  rationale: Se conserva la lectura primaria del hebreo como «Dios» en el texto principal. La tradición de «ángeles» proviene de la Septuaginta y de Hebreos 2:7; esa variante se preserva en la nota, pero no se importa al cuerpo del versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Sujeto singular y referente representativo
  english_pob_reading: Retain singular 'him'
  chosen_spanish_reading: Retener el singular «lo»
  alternative_spanish_readings:
  - los
  - la humanidad
  rationale: El hebreo usa pronombres singulares, y el contexto inmediato habla del ser humano de modo representativo. Por eso se conserva el singular en español, sin volverlo abstracto o plural.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; el presente borrador mantiene esa línea, con una formulación española más natural («lo hiciste un poco menor que Dios») y conserva en nota la alternativa histórica «ángeles» sin desplazar la lectura hebrea principal.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en el cuerpo principal, conforme a la prioridad del texto hebreo.
  - Se conserva el singular pronominal («lo») para reflejar el hebreo y el carácter representativo del sujeto.
  - Se usa «gloria y honor» como pareja poética estable y transparente en español.
  - La nota a introduce la alternativa tradicional «ángeles» por su relevancia canónica en Hebreos 2:7.
