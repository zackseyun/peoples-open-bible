id: JHN.6.71
reference: John 6:71
source:
  edition: SBLGNT
  text: ἔλεγεν δὲ τὸν Ἰούδαν Σίμωνος ⸀Ἰσκαριώτου· οὗτος γὰρ ἔμελλεν ⸂παραδιδόναι αὐτόν⸃, ⸀εἷς ἐκ τῶν δώδεκα.
translation:
  text: Now he was speaking about Judas[a], the son of Simon Iscariot, for this one was about to betray him, being one of the Twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'hand him over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was speaking
  alternatives:
  - said
  - meant
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or explanatory past action in context; 'was speaking about' fits the narrator's clarification better than the simpler 'said' and avoids the more interpretive 'meant.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: δέ here marks a mild transition or continuation. 'Now' gives natural English discourse flow without overstating contrast.
- source_word: τὸν Ἰούδαν
  chosen: about Judas
  alternatives:
  - Judas
  lexicon: BDAG
  rationale: With λέγω in this explanatory construction, English idiom requires 'speaking about Judas' rather than a more wooden 'he was saying Judas.'
- source_word: Σίμωνος Ἰσκαριώτου
  chosen: the son of Simon Iscariot
  alternatives:
  - Simon Iscariot's son
  - Judas son of Simon Iscariot
  lexicon: BDAG
  rationale: 'The two genitives most naturally identify Judas by paternal relation: Judas, son of Simon Iscariot. This avoids making ''Iscariot'' modify Judas directly in a way that obscures the Greek syntax.'
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - this man
  lexicon: BDAG
  rationale: οὗτος is demonstrative and slightly emphatic. 'This one' preserves the force better than a bare 'he,' while remaining natural in English narrative explanation.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces the reason for the identification. 'For' is concise and fits explanatory narration.
- source_word: ἔμελλεν
  chosen: was about to
  alternatives:
  - was going to
  - was destined to
  - was intending to
  lexicon: BDAG
  rationale: μέλλω commonly indicates imminence or future-in-view. 'Was about to' preserves the prospective sense without importing stronger notions like destiny or intention.
- source_word: παραδιδόναι αὐτόν
  chosen: betray him
  alternatives:
  - hand him over
  lexicon: BDAG
  rationale: In Johannine passion context, παραδίδωμι with Judas conventionally refers to betrayal. 'Hand him over' is more formally literal, but 'betray' better captures the relational and narrative force in clear English.
- source_word: εἷς ἐκ τῶν δώδεκα
  chosen: being one of the Twelve
  alternatives:
  - one of the Twelve
  lexicon: BDAG
  rationale: This appositional phrase underscores the shocking identity of the betrayer. 'Being one of the Twelve' makes the relation to the preceding clause explicit in smooth English while preserving the emphasis on the apostolic group.
