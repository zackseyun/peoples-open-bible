  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé'' está correcto; no hay otros términos doctrinales sensibles. La decisión sobre la fórmula de nombrar debe ajustarse por idiomaticidad española, no por cambio de significado.'
