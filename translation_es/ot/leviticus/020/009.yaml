translation:
  language: es
  text: Porque cualquier hombre[a] que maldiga a su padre o a su madre[b] ciertamente será condenado a muerte; a su padre y a su madre ha maldecido; su sangre recaerá sobre él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente ‘un hombre, un hombre’, un modismo distributivo que significa ‘cualquier hombre’, ‘cualquiera’ o ‘quienquiera’.
    reason: lexical_alternative
  - marker: b
    text: O ‘a su padre y a su madre’; el sentido legal puede expresar que la maldición contra cualquiera de los dos incurre en la pena.
    reason: lexical_alternative
  - marker: c
    text: O ‘su culpabilidad de sangre está sobre él’. La expresión hebrea asigna al ofensor la responsabilidad por su propia muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque entonces
  lexicon: HALOT
  rationale: Introduces la cláusula legal explicativa o de fundamento. En español, «Porque» comunica mejor el valor casuístico y justificativo que abre la sanción sin forzar un condicional artificial.
- source_word: אִישׁ אִישׁ
  english_pob_choice: any man
  chosen_spanish: cualquiera
  alternatives_spanish:
  - cualquier hombre
  - quienquiera
  - cualquiera de los hombres
  lexicon: HALOT
  rationale: 'La duplicación hebrea expresa fuerza distributiva: ‘cualquiera / quien sea’. En español, «cualquiera» transmite esa amplitud sin introducir una formulación pesada; el masculino gramatical del hebreo queda implicado en la forma general de la ley, pero el castellano fluye mejor con este equivalente distributivo.'
- source_word: יְקַלֵּל
  english_pob_choice: curses
  chosen_spanish: maldiga
  alternatives_spanish:
  - maldice
  - revile
  - trate con desprecio
  lexicon: HALOT
  rationale: El piel de קלל aquí expresa lanzar una maldición, no solo insultar. «Maldiga» mantiene el valor jurídico-ritual del acto y evita suavizarlo como mera falta de respeto.
- source_word: אָבִיו וְאֶת אִמּוֹ
  english_pob_choice: his father or his mother
  chosen_spanish: a su padre o a su madre
  alternatives_spanish:
  - a su padre y a su madre
  lexicon: HALOT
  rationale: El sentido legal distributivo en la primera mención permite que la ofensa contra cualquiera de los dos incurra en la pena. En español, «o» comunica mejor esa fuerza legal, mientras que la cláusula resumida posterior conserva «y» porque retoma ambos padres como conjunto ofendido.
- source_word: מוֹת יוּמָת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente será muerto
  alternatives_spanish:
  - será puesto a muerte
  - deberá morir
  - sin falta morirá
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la pena. «Ciertamente será muerto» preserva la pasiva judicial y la fuerza enfática sin domesticarla a una perífrasis más interpretativa.
- source_word: קִלֵּל
  english_pob_choice: has cursed
  chosen_spanish: ha maldecido
  alternatives_spanish:
  - maldijo
  - ha maldecido a
  lexicon: HALOT
  rationale: El perfecto hebreo señala el acto ya cometido y jurídicamente relevante. El pretérito perfecto compuesto español refleja bien ese carácter consumado con vigencia legal presente.
- source_word: דָּמָיו בּוֹ
  english_pob_choice: his blood is on him
  chosen_spanish: su sangre sobre él
  alternatives_spanish:
  - su culpabilidad de sangre recae sobre él
  - su sangre cae sobre él
  - su sangre está sobre él
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula idiomática de responsabilidad legal por la propia muerte. «Su sangre sobre él» conserva la literalidad idiomática sin agregar doctrinas ajenas; en español suena comprensible como fórmula forense y deja visible la tensión del hebreo.
theological_decisions:
- issue: Alcance distributivo de la duplicación אִישׁ אִישׁ
  english_pob_reading: any man
  chosen_spanish_reading: cualquiera
  alternative_spanish_readings:
  - cualquier hombre
  - quienquiera
  rationale: Se mantiene la fuerza representativa y distributiva del hebreo sin convertir la ley en una generalización abstracta. La opción evita borrar el masculino léxico del original, pero en español la forma más natural para el valor distributivo es «cualquiera».
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fórmula de responsabilidad דָּמָיו בּוֹ
  english_pob_reading: his blood is on him
  chosen_spanish_reading: su sangre sobre él
  alternative_spanish_readings:
  - su sangre está sobre él
  - su culpabilidad de sangre recae sobre él
  rationale: Se conserva el giro idiomático como fórmula judicial de responsabilidad personal por la pena capital. No se introduce una noción doctrinal posterior ni se suaviza el hebreo a una paráfrasis explicativa que oculte su expresión forense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se revisó el pasaje con alta concordancia textual respecto del audit trail inglés y no se identificaron cambios sustantivos posteriores; la presente redacción sigue la lectura jurídica casuística y la fórmula idiomática de responsabilidad sin neutralizar el masculino representativo del hebreo.
  spanish_consistency_notes:
  - Se mantuvo un registro legal casuístico con «Porque» + apódosis de pena, acorde al flujo del hebreo.
  - Se usó «maldiga» para conservar el valor de maldición jurídica del piel de קלל.
  - La alternancia «o» / «y» sigue la distinción del audit trail inglés entre la ofensa distributiva y la recapitulación de ambos padres.
  - «Su sangre sobre él» preserva la expresión idiomática hebrea sin recurrir a terminología eclesiástica o doctrinal ajena al contexto legal.
