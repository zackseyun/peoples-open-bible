translation:
  language: es
  text: 'Cuando Dalila vio que él le había dicho todo su corazón, envió y llamó a los gobernantes filisteos[b], diciendo: «Suban esta vez, porque él le[a] ha dicho todo su corazón». Entonces los gobernantes filisteos subieron hasta ella y trajeron la plata[c] en sus manos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «porque él le ha dicho todo su corazón». En el discurso directo, algunos lectores esperarían «me» en lugar de «le», pero el texto hebreo recibido lee tercera persona femenina singular.'
    reason: textual_variant
  - marker: b
    text: O «los señores de los filisteos».
    reason: lexical_alternative
  - marker: c
    text: Es decir, plata como pago.
    reason: cultural_note
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: When Delilah saw
  chosen_spanish: Cuando Dalila vio
  alternatives_spanish:
  - Y Dalila vio
  - Dalila se dio cuenta de
  lexicon: HALOT
  rationale: La escena avanza con waw consecutiva; en español, «Cuando» conserva la relación temporal natural sin perder el verbo de percepción «vio».
- source_word: הִגִּיד
  english_pob_choice: had told
  chosen_spanish: había dicho
  alternatives_spanish:
  - había declarado
  - había dado a conocer
  lexicon: HALOT
  rationale: En este contexto narrativo, «decir» transmite bien el acto de comunicar algo íntimo; «había dicho» mantiene el pluscuamperfecto del inglés POB y la anterioridad del hecho.
- source_word: אֶת כָּל לִבּוֹ
  english_pob_choice: all his heart
  chosen_spanish: todo su corazón
  alternatives_spanish:
  - todo lo que tenía en su corazón
  - todo su interior
  lexicon: HALOT
  rationale: Se conserva el hebraísmo de «corazón» como centro de la voluntad y la interioridad, sin ampliar más de lo que exige el texto.
- source_word: וַתִּשְׁלַח וַתִּקְרָא
  english_pob_choice: she sent and called for
  chosen_spanish: envió y llamó
  alternatives_spanish:
  - envió y convocó
  - mandó a llamar
  lexicon: HALOT
  rationale: Los dos verbos se mantienen para reflejar la secuencia hebrea. «Llamó» reproduce la fuerza de convocar sin añadir un objeto que el hebreo no explicita.
- source_word: סַרְנֵי פְלִשְׁתִּים
  english_pob_choice: the Philistine rulers
  chosen_spanish: los gobernantes filisteos
  alternatives_spanish:
  - los señores de los filisteos
  - los jefes filisteos
  lexicon: HALOT
  rationale: «Gobernantes» comunica el rango oficial de סַרְנִים de manera transparente. Se evita «señores» como término más tradicional pero menos claro.
- source_word: עֲלוּ הַפַּעַם
  english_pob_choice: Come up this time
  chosen_spanish: Suban esta vez
  alternatives_spanish:
  - Suban ahora
  - Suban una vez más
  lexicon: HALOT
  rationale: Se conserva el movimiento ascendente de עלה y la referencia puntual de הַפַּעַם con «esta vez».
- source_word: כִּי הִגִּיד לָהּ אֶת־כָּל לִבּוֹ
  english_pob_choice: for he has told her all his heart
  chosen_spanish: porque él le ha dicho todo su corazón
  alternatives_spanish:
  - porque él me ha dicho todo su corazón
  - porque él ha revelado todo su corazón
  lexicon: HALOT
  rationale: Se preserva el testimonio del texto recibido con el pronombre femenino singular «le/ella» implícito en «le ha dicho», aunque el discurso directo pudiera sugerir otra persona. «Su corazón» mantiene la idiomática hebrea.
- source_word: וְעָלוּ אֵלֶיהָ
  english_pob_choice: Then ... came up to her
  chosen_spanish: Entonces ... subieron a ella
  alternatives_spanish:
  - Entonces ... fueron hacia ella
  - Y subieron hasta ella
  lexicon: HALOT
  rationale: «Subieron a ella» conserva la dirección espacial de עלה y refleja la secuencia narrativa.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la suma de plata
  lexicon: HALOT
  rationale: «Plata» es la traducción más literal y mantiene el sentido probable de pago en metal, como en el texto inglés auditado.
- source_word: בְּיָדָם
  english_pob_choice: in their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - con sus manos
  - llevándola en sus manos
  lexicon: HALOT
  rationale: Se preserva la imagen concreta del transporte del pago; «en sus manos» sigue de cerca el hebreo sin sobredeterminar el modo.
theological_decisions:
- issue: 'Pronombre del discurso directo: lectura recibida frente a expectativa idiomática'
  english_pob_reading: for he has told her all his heart
  chosen_spanish_reading: porque él le ha dicho todo su corazón
  alternative_spanish_readings:
  - porque él me ha dicho todo su corazón
  - porque él le había dicho todo su corazón
  rationale: 'Se conserva la tensión textual señalada por el POB: el hebreo recibido usa tercera persona femenina singular, aunque el habla directa haría esperar primera persona. El español mantiene esa rareza con «le», sin emendarla.'
  doctrine_reference: Criterio textual de fidelidad al texto recibido; no implica una cuestión doctrinal.
- issue: Sentido de 'su corazón' como hebraísmo de interioridad total
  english_pob_reading: all his heart
  chosen_spanish_reading: todo su corazón
  alternative_spanish_readings:
  - todo lo que pensaba
  - todo su interior
  rationale: Se retiene el hebraísmo para no diluir la imagen semítica de totalidad interior y de confidencia plena.
  doctrine_reference: Antropología bíblica semítica; uso idiomático del hebreo.
translation_notes:
  revision_awareness: Se ha seguido el estado más reciente del archivo fuente, que indica que no hubo revisiones aplicadas y que la traducción inglesa quedó sin cambios. La versión española preserva la misma tensión textual principal y el mismo sentido narrativo, con ajuste natural de estilo al español.
  spanish_consistency_notes:
  - Se usa «Dalila» para el nombre propio y «filisteos» en minúscula como etnónimo.
  - 'Se conserva el paralelismo verbal hebreo con dos acciones coordinadas: envió y llamó.'
  - Se mantiene «corazón» como calco idiomático controlado para preservar la carga semítica.
  - «Plata» se usa en sentido de pago monetario, no como metal genérico aislado.
