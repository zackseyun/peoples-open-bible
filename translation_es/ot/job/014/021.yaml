translation:
  language: es
  text: Sus hijos llegan a ser honrados[a], y él no lo sabe; son humillados, y él no lo percibe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sus hijos son honrados, y él no lo sabe; son humillados, y él no lo percibe»'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִכְבְּד֣וּ
  english_pob_choice: come to honor
  chosen_spanish: llegan a ser honrados
  alternatives_spanish:
  - son honrados
  - llegan a honor
  - ganan honra
  lexicon: HALOT
  rationale: El verbo כבד en qal, con sujeto plural, expresa aquí un cambio de estado hacia el honor/peso. En español, «llegan a ser honrados» conserva el valor ingesivo/resultativo sin sonar artificial.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos hombres
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos» con sufijo masculino singular. En español, «hijos» comunica el masculino plural de manera natural y amplia; «varones» sería demasiado explicativo para este contexto.
- source_word: וְלֹא יֵדָע
  english_pob_choice: and he does not know it
  chosen_spanish: y él no lo sabe
  alternatives_spanish:
  - y no lo conoce
  - y él no lo percibe
  lexicon: HALOT
  rationale: ידע significa «saber/conocer». El pronombre neutro «lo» retoma de forma natural la condición mencionada sin añadir contenido ajeno al hebreo.
- source_word: וְיִצְעֲרוּ
  english_pob_choice: they are brought low
  chosen_spanish: quedan abatidos
  alternatives_spanish:
  - son humillados
  - son rebajados
  - quedan humillados
  lexicon: HALOT
  rationale: צער aquí contrasta con el honor previo y apunta a un descenso o abatimiento. «Quedan abatidos» preserva la reversión de estado con buen español.
- source_word: וְלֹא יָבִין
  english_pob_choice: and he does not perceive it
  chosen_spanish: y él no lo percibe
  alternatives_spanish:
  - y él no lo entiende
  - y él no lo discierne
  lexicon: HALOT
  rationale: בין puede significar entender o discernir. «Percibe» reproduce la idea de no advertir la condición de sus hijos, coherente con el contexto de la muerte.
translation_notes:
  revision_awareness: La revisión inglesa eliminó una expansión explícita («about them») por innecesaria; por eso el español evita cualquier añadido equivalente y se limita a retomar el referente con «lo».
  spanish_consistency_notes:
  - Se mantiene «honrados» para el campo semántico de כבד sin imponer «gloria» o «honra» como sustantivos abstractos.
  - Se evita «conocer» en exceso cuando el contexto pide simplemente no saber/no percibir.
  - El paralelo poético se conserva con dos cláusulas breves y coordinadas, sin amplificación interpretativa.
