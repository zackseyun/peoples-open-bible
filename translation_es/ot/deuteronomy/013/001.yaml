translation:
  language: es
  text: Cada palabra[a] que yo les mando, la cumplirán cuidadosamente. No le añadirán[b] ni le quitarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toda la palabra que yo les mando». El hebreo usa un singular colectivo, literalmente «toda la palabra».'
    reason: lexical_alternative
  - marker: b
    text: En algunas versificaciones, este versículo se numera como Deuteronomio 12:32.
    reason: textual_variant
lexical_decisions:
- source_word: כָּל הַדָּבָר
  english_pob_choice: Every word
  chosen_spanish: Cada palabra
  alternatives_spanish:
  - Toda la palabra
  - Cada dicho
  - Toda la instrucción
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo (הַדָּבָר) con כָּל. En español, «cada palabra» conserva el valor distributivo de la revisión inglesa («Every word») y mantiene la referencia a una unidad verbal específica sin diluirla en «instrucción» o «cosas».
- source_word: מְצַוֶּה
  english_pob_choice: am commanding
  chosen_spanish: yo les mando
  alternatives_spanish:
  - yo les estoy mandando
  - yo les ordeno
  lexicon: HALOT
  rationale: El participio expresa una acción en curso o vigente. «Yo les mando» preserva el presente y la autoridad del hablante en un español natural y digno; «ordeno» suena más duro y no es necesario aquí.
- source_word: תִשְׁמְרוּ לַעֲשׂוֹת
  english_pob_choice: shall be careful to do
  chosen_spanish: la cuidarán para hacerla
  alternatives_spanish:
  - la guardarán para hacerla
  - se cuidarán de hacerla
  - la observarán para ponerla por obra
  lexicon: HALOT
  rationale: שׁמר + infinitivo combina guardar/observar con la idea de obediencia cuidadosa. «La cuidarán para hacerla» reproduce ese enlace entre custodiar y ejecutar, evitando una paráfrasis demasiado interpretativa. El complemento femenino singular sigue la referencia colectiva a «palabra».
- source_word: לֹא תֹסֵף עָלָיו
  english_pob_choice: shall not add to it
  chosen_spanish: No le añadirás
  alternatives_spanish:
  - No añadirás a ella
  - No le agregarás
  - No pondrás nada más
  lexicon: HALOT
  rationale: El verbo יסף con עַל expresa añadir sobre algo. «Añadir» es la correspondencia directa y jurídicamente sobria; el clítico «le» permite evitar una repetición pesada de «a ella» y mantiene la referencia a la «palabra».
- source_word: וְלֹא תִגְרַע מִמֶּנּוּ
  english_pob_choice: shall not take away from it
  chosen_spanish: ni le quitarás de ella
  alternatives_spanish:
  - ni le restarás
  - ni le quitarás nada
  - ni la disminuirás
  lexicon: HALOT
  rationale: גרע significa disminuir, reducir o quitar. «Quitar» es idiomático en español y transmite bien la prohibición legal sin volverla abstracta. «De ella» conserva la referencia femenina implícita por «palabra».
theological_decisions:
- issue: Mantenimiento del singular colectivo hebreo
  english_pob_reading: Every word ... the Hebrew has a collective singular, literally 'all the word.'
  chosen_spanish_reading: Cada palabra ...
  alternative_spanish_readings:
  - Toda la palabra
  - Cada una de las palabras
  - Toda la instrucción
  rationale: La decisión sigue la tensión documentada entre el singular hebreo y la fluidez en la lengua meta. «Cada palabra» conserva el matiz distributivo sin convertir el texto en una generalización distinta ni perder la unidad colectiva del hebreo.
  doctrine_reference: Deuteronomio 4:2; 12:32 (principio de no añadir ni quitar a la palabra mandada)
- issue: Número del versículo y formulación de la prohibición
  english_pob_reading: Translate the verse as a standalone injunction without importing material from the following verse.
  chosen_spanish_reading: Se traduce como una injunción independiente, sin armonizar la numeración ni importar contenido del versículo siguiente.
  alternative_spanish_readings:
  - Vincularlo más estrechamente con el contexto previo
  - Incorporar la tradición de numeración 12:32 en el cuerpo del texto
  rationale: El hebreo presenta una orden completa y autónoma. La redacción española debe reflejar esa autonomía textual, dejando la cuestión de la numeración para la nota y no para el cuerpo del versículo.
  doctrine_reference: Deuteronomio 13:1; 4:2
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «Every word» para naturalidad gramatical sin perder el singular colectivo hebreo. Esta versión española sigue la misma decisión interpretativa, manteniendo el valor distributivo de כָּל הַדָּבָר y conservando la estructura prohibitiva legal del versículo.
  spanish_consistency_notes:
  - Se mantiene «palabra» como equivalente de דָּבָר para preservar el singular colectivo documentado.
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita de él.
  - 'Se mantiene el registro legal y sobrio con verbos de obligación y prohibición: «mando», «cuidarán», «añadirás», «quitarás».'
  - La forma verbal pasa al plural en la primera cláusula («la cuidarán») para reflejar el sujeto colectivo implícito en español, sin alterar el mandato general del hebreo.
