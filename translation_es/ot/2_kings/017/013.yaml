    text: O «testificó contra Israel y Judá». El verbo hebreo puede implicar una advertencia solemne o un testimonio forense.
    reason: lexical_alternative
  - marker: b
    text: «Sus padres» también puede entenderse como «sus antepasados».
    reason: lexical_alternative
  - marker: c
    text: O «mediante mis siervos, los profetas».
    reason: lexical_alternative
  revision_rationale: El texto principal es fiel y legible; solo se corrige la nota [c] para que presente una alternativa española real y no repita exactamente la lectura principal.
