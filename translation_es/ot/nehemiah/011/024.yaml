revisions:
- from: Y Petaías, hijo de Meshezabel, de los hijos de Zérah, hijo de Judá, estaba[a] al lado del rey para todo asunto[b] concerniente al pueblo.
  to: Y Petaías, hijo de Meshezabel, de los hijos de Zérah, hijo de Judá, estaba[a] junto al rey para todo asunto[b] relacionado con el pueblo.
  rationale: Se hizo una revisión menor para mejorar la naturalidad y la precisión idiomática en español sin apartarse del hebreo ni del audit trail inglés. 'Junto al rey' conserva mejor el matiz de cercanía/oficio que 'al lado del rey', y 'relacionado con el pueblo' suena más natural que 'concerniente al pueblo' manteniendo la misma ambigüedad básica documentada en la nota.
