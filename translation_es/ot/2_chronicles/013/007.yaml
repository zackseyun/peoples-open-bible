    reason: lexical_alternative
  revision_rationale: Se ajusta el español para reflejar mejor el sentido idiomático del hebreo y la intención del audit trail inglés, sin perder auditabilidad. «Se agruparon en torno a él» conserva mejor la imagen de reunión alrededor de Jeroboam; «hombres indignos» comunica naturalmente el valor de רֵקִים; «de corazón débil» expresa la falta de firmeza de רַךְ לֵבָב; y se mantiene «hijos de Belial» con nota y la repetición de «fortalecerse».
