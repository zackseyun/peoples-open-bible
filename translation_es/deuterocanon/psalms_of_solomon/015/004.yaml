translation:
  language: es
  text: ¿Y qué puede hacer el hombre, sino dar gracias a tu nombre?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confesar tu nombre» o «alabar tu nombre». El verbo griego puede llevar cualquiera de estos sentidos según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué cosa
  - cuál
  lexicon: LSJ
  rationale: En la pregunta retórica, τί pregunta por la acción o capacidad restante; «qué» es la forma natural en español para mantener ese valor interrogativo sin forzar una identificación personal.
- source_word: δυνατὸς
  english_pob_choice: able to do
  chosen_spanish: puede hacer
  alternatives_spanish:
  - es capaz de hacer
  - tiene capacidad para hacer
  lexicon: LSJ
  rationale: δώνατός aquí expresa capacidad; «puede hacer» reproduce el sentido verbal implícito de manera natural en español y conserva la idea de posibilidad/aptitud.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - una persona
  lexicon: LSJ
  rationale: Se conserva el singular genérico representativo del griego con «el hombre», que en español puede funcionar de modo inclusivo en este registro bíblico y mantiene la concisión del original.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: LSJ
  rationale: En esta construcción retórica, εἰ μὴ marca una excepción; «sino» es idiomático en español y preserva la estructura de exclusión del griego.
- source_word: ἐξομολογήσασθαι
  english_pob_choice: give thanks
  chosen_spanish: dar gracias
  alternatives_spanish:
  - confesar
  - alabar
  lexicon: LSJ
  rationale: Aunque el verbo puede significar «confesar» o «alabar», en este contexto doxológico «dar gracias» comunica mejor el uso bíblico de agradecimiento dirigido a Dios y se ajusta al contexto de la frase.
- source_word: τῷ ὀνόματί σου
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - a tu nombre
  - ante tu nombre
  lexicon: LSJ
  rationale: Se mantiene la relación dativa con una preposición natural en español. «A tu nombre» conserva el giro bíblico de gratitud dirigida al nombre de Dios sin aplanarlo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior agregando el marcador [a] directamente en el texto español, vinculado a la nota léxica alternativa del verbo ἐξομολογήσασθαι.
  spanish_consistency_notes:
  - Se prefirió «dar gracias» por la lectura doxológica que el audit trail inglés documenta para ἐξομολογήσασθαι.
  - Se evitó una traducción mecánica que borrara la ambigüedad léxica; la nota conserva las alternativas documentadas.
  - El orden de la oración mantiene la pregunta retórica y la excepción final, como en el griego.
