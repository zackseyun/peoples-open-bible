translation:
  language: es
  text: Salomón contó setenta mil hombres para llevar cargas, y ochenta mil hombres cortadores de piedra en la región montañosa[a], y sobre ellos tres mil seiscientos supervisores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «canteros en la montaña». El hebreo literalmente dice «cortando en la montaña».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְפֹּר
  english_pob_choice: counted
  chosen_spanish: contó
  alternatives_spanish:
  - enumeró
  - contabilizó
  lexicon: HALOT
  rationale: El verbo ספר en esta narración indica una acción de recuento o registro. «Contó» es natural en español moderno y conserva el sentido censal del pasaje.
- source_word: אִישׁ ... סַבָּל
  english_pob_choice: men as burden-bearers
  chosen_spanish: hombres cargadores
  alternatives_spanish:
  - hombres para llevar cargas
  - portadores de carga
  lexicon: HALOT
  rationale: סַבָּל designa a quien lleva cargas. «Cargadores» mantiene la función laboral de forma clara y breve; se conserva «hombres» para reflejar אִישׁ.
- source_word: חֹצֵב בָּהָר
  english_pob_choice: stonecutters in the hill country
  chosen_spanish: cortadores de piedra en la región montañosa
  alternatives_spanish:
  - canteros en la montaña
  - talladores en la montaña
  lexicon: HALOT
  rationale: חצב significa hew/cut en contexto de trabajo de construcción. «Cortadores de piedra» expresa la labor de manera fiel e inteligible; «región montañosa» refleja בָּהָר con una forma natural en español.
- source_word: וּמְנַצְּחִים עֲלֵיהֶם
  english_pob_choice: overseers over them
  chosen_spanish: supervisores sobre ellos
  alternatives_spanish:
  - inspectores sobre ellos
  - mayordomos sobre ellos
  lexicon: HALOT
  rationale: El participio de נצח aquí es administrativo y describe a quienes dirigen el trabajo. «Supervisores» conserva ese valor; «sobre ellos» reproduce la relación de autoridad de עֲלֵיהֶם.
- source_word: שְׁלֹשֶׁת אֲלָפִים וְשֵׁשׁ מֵאוֹת
  english_pob_choice: three thousand six hundred
  chosen_spanish: tres mil seiscientos
  alternatives_spanish:
  - '3.600'
  - tres mil y seiscientos
  lexicon: HALOT
  rationale: La expresión numérica se vierte de forma idiomática y directa en español, sin añadir conjunciones que el hebreo no requiere.
- source_word: אִישׁ
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - trabajadores
  lexicon: HALOT
  rationale: Aquí el hebreo es masculino y refiere a trabajadores varones del servicio real; «hombres» conserva ese valor sin neutralización innecesaria.
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto hebreo y con la auditoría inglesa: recuento de mano de obra, dos categorías laborales y una capa jerárquica de supervisión. No se requieren revisiones textuales ni doctrinales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se conserva un estilo sobrio y publicable, evitando calcos innecesarios como «hombres de carga» o «cortadores en el monte» si oscurecen el español.
  - «Supervisores» se eligió como término funcional cercano a la POB inglesa, sin introducir vocabulario eclesiástico.
