translation:
  language: es
  text: En toda manera, bendito es nuestro Dios[a], que entregó a los que obraron impíamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''que puso en manos de los que obraron impíamente''. El griego también puede traducirse más literalmente: ''que dio a los que obraron impíamente'', dejando implícito el destinatario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo sentido
  alternatives_spanish:
  - en todo
  - de toda manera
  - en todo aspecto
  lexicon: LSJ
  rationale: La expresión intensifica a εὐλογητός de forma adverbial. En español, 'en todo sentido' comunica la totalidad de la afirmación sin sonar literal ni forzado.
- source_word: εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: bendito
  alternatives_spanish:
  - alabado
  - digno de bendición
  - bendecido
  lexicon: LSJ
  rationale: Para una fórmula litúrgica aplicada a Dios, 'bendito' conserva mejor el registro bíblico que 'alabado' y evita la ambigüedad de 'bendecido'.
- source_word: ἡμῶν ὁ θεός
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  - el Dios de nosotros
  lexicon: LSJ
  rationale: Es la equivalencia idiomática natural del posesivo griego y mantiene la relación de pacto implícita.
- source_word: ἔδωκεν
  english_pob_choice: gave up
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - entregó en manos de
  - abandonó
  lexicon: LSJ
  rationale: Con un objeto personal en contexto de juicio o derrota, el verbo expresa transferencia hostil. 'Entregó' preserva esa fuerza sin añadir un receptor explícito que el griego no menciona.
- source_word: τοὺς ἀσεβήσαντας
  english_pob_choice: those who acted wickedly
  chosen_spanish: a los que obraron impíamente
  alternatives_spanish:
  - a los que actuaron malvadamente
  - a los impíos
  - a los que cometieron impiedad
  lexicon: LSJ
  rationale: ἀσεβέω denota impiedad/rebeldía religiosa y moral. 'Obraron impíamente' retiene ese peso religioso mejor que un simple 'obraron mal'.
theological_decisions:
- issue: Sentido de ἔδωκεν con objeto hostil implícito
  english_pob_reading: God is praised for giving up the wicked.
  chosen_spanish_reading: Dios es bendecido porque entregó a los culpables/impíos al juicio o a la derrota.
  alternative_spanish_readings:
  - Dios entregó a los malvados
  - Dios los dio en manos de otro
  rationale: El contexto de acción de gracias sugiere derrota o juicio de enemigos. 'Entregó' preserva la ambigüedad del destinatario implícito sin forzarla en la línea principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada en el texto. La formulación sigue de cerca el griego y mantiene la fuerza de ἔδωκεν como acción de entrega/transferencia hostil, sin introducir un receptor explícito.
  spanish_consistency_notes:
  - Se evitó 'Señor' como sustituto de Yahvé porque el versículo usa ὁ θεός, no κύριος.
  - '''Impíamente'' conserva mejor la carga de ἀσεβήσαντας que una simple equivalencia moral general.'
  - La puntuación y el orden son naturales en español, pero conservan la estructura encomiástica del original.
