translation:
  language: es
  text: Su mano izquierda está debajo de mi cabeza[a], y su mano derecha me abraza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «su izquierda ... y su derecha»; en español se añade «mano» por claridad, a partir del sentido de las dos expresiones emparejadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂמֹאלוֹ
  english_pob_choice: his left hand
  chosen_spanish: su izquierda
  alternatives_spanish:
  - su mano izquierda
  - su lado izquierdo
  lexicon: HALOT
  rationale: El hebreo nombra literalmente la «izquierda» con sufijo posesivo, y en el paralelismo poético la mano se sobreentiende por el acto de abrazar. En español, «su izquierda» conserva esa economía y el tono poético; añadir «mano» sería una explicitación posible, pero no obligatoria.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo de
  lexicon: HALOT
  rationale: La preposición indica ubicación inferior o de soporte. «Debajo de» es natural en español moderno y mantiene la relación espacial sin endurecer el verso.
- source_word: רֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - mi cabeza
  - mi cabeza
  lexicon: HALOT
  rationale: El sustantivo se refiere de manera directa a la cabeza; en español «cabeza» es la equivalencia más natural y clara en este contexto de abrazo.
- source_word: וִימִינוֹ
  english_pob_choice: and his right hand
  chosen_spanish: su derecha
  alternatives_spanish:
  - su mano derecha
  - su lado derecho
  lexicon: HALOT
  rationale: Como con «izquierda», el hebreo dice literalmente «su derecha», y el miembro implicado se entiende por el contexto. «Su derecha» preserva la concisión poética; «mano derecha» sería una explicitación interpretativa aceptable pero no necesaria.
- source_word: תְּחַבְּקֵנִי
  english_pob_choice: embraces me
  chosen_spanish: me abraza
  alternatives_spanish:
  - me rodea con sus brazos
  - me estrecha
  lexicon: HALOT
  rationale: El verbo חבק significa «abrazar». «Me abraza» reproduce con fidelidad el presente poético del hebreo y evita añadir matices no exigidos por el texto.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo base y con la auditoría inglesa: no se detectaron revisiones aplicadas ni variantes textuales relevantes. Se conservó la simetría poética y la elipsis de «mano» para no sobreexplicar el original.'
