  glossary_alignment: 'No hay términos teológicos sensibles aquí. El único punto de alineación terminológica relevante es el nombre propio: debe seguirse «Barak», conforme al expediente inglés y a la transliteración ya establecida en este registro, salvo razón documentada para hispanizarlo, la cual no se ha dado. El resto de las decisiones léxicas («si», «conmigo», «iré», «no iré») están bien alineadas con la evidencia fuente.'
