review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: συνέβη = «sucedió», ἀντιπάλους = «los adversarios», ἐν χειρονομίαις = «en combate cuerpo a cuerpo», διαφθαρῆναι = «fueron destruidos», y συλλημφθῆναι con δοριαλώτους = «fueron capturados como prisioneros de guerra». Sin embargo, la nota al pie está anclada al sintagma equivocado: el matiz literal «capturados por la lanza» explica δοριαλώτους («prisioneros de guerra»), no el verbo «capturados».'
  spanish_quality_summary: El español es claro, natural y digno. La frase funciona bien en registro bíblico moderno. El único ajuste necesario es mover la llamada de nota para que el lector la asocie con «prisioneros de guerra» y no con «capturados», lo cual mejora precisión semántica y legibilidad.
  glossary_alignment: No hay términos del glosario teológico principal en juego. Las decisiones léxicas relevantes están alineadas con el expediente inglés. «Adversarios», «combate cuerpo a cuerpo» y «prisioneros de guerra» son adecuados en español. La excepción necesaria es de formato/anclaje de nota, no de terminología.
  issues:
  - severity: medium
    issue: La nota [a] está colocada después de «prisioneros de guerra» en el expediente inglés, pero en el borrador español queda tras toda la cláusula y puede leerse como si explicara «capturados» más que δοριαλώτους.
    rationale: El contenido de la nota («capturados por la lanza») corresponde específicamente al sustantivo/adjetivo militar δοριαλώτους, cuya equivalencia idiomática es «prisioneros de guerra». Conviene anclarla directamente a esa expresión para mantener la lógica léxica del aparato crítico.
  revised_spanish_text: Y así sucedió que los adversarios fueron destruidos en el combate cuerpo a cuerpo, y muchos también fueron capturados como prisioneros de guerra[a].
  revised_footnotes:
  - marker: a
    text: Literalmente, «capturados por la lanza», una expresión militar para decir que fueron tomados como prisioneros de guerra.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto base porque es fiel y natural; solo se precisa el anclaje de la nota para que explique correctamente «prisioneros de guerra», que es donde recae el matiz literal de δοριαλώτους.
