base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/008.yaml
  text: He brought all the priests from the cities of Judah and defiled the high places where the priests had burned incense[a], from Geba to Beer-sheba. He also tore down the high places of the gates that were at the entrance of the gate of Joshua the governor of the city[b], which were on the left of a man at the city gate.
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the shrines at the gates.' The Hebrew reads literally 'the high places of the gates.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase 'which were on a man's left at the city gate' is difficult. It likely refers to the left side as one entered the gate.
    reason: lexical_alternative
