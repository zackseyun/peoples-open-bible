    rationale: El hebreo plantea una pregunta deliberativa ('¿por qué ha de ser puesto a muerte?'). En español, 'ha de ser puesto a muerte' o 'debe ser puesto a muerte' transmite mejor la fuerza sin introducir una matización condicional innecesaria.
  revised_spanish_text: 'Jonatán respondió a Saúl, su padre, y le dijo: «¿Por qué ha de ser puesto[a] a muerte? ¿Qué ha hecho?»'
