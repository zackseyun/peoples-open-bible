review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la secuencia verbal, el referente cultual de מִשְׁכָּן como «tabernáculo», el material «madera de acacia» y la alternativa léxica para הַקְּרָשִׁים. Sin embargo, «de pie» suena antropomórfico y poco natural para piezas de madera; el participio עֹמְדִים aquí describe orientación estructural, mejor expresada en español como «erguidos» o «puestos verticalmente». Además, la secuencia «tabernáculo de madera de acacia» puede generar una ambigüedad momentánea, como si modificara a «tabernáculo» en vez de «marcos».
  spanish_quality_summary: El texto es comprensible, pero «de pie» no suena idiomático en contexto arquitectónico y la colocación de «de madera de acacia» deja una ligera ambigüedad sintáctica. Una reordenación sencilla mejora claridad y naturalidad sin apartarse del hebreo ni del rastro de auditoría inglés.
  glossary_alignment: «Tabernáculo» y «madera de acacia» están alineados con las decisiones del proyecto. «Marcos» es defendible para קְרָשִׁים, con nota alternativa «tablas». No hay cuestiones teológicas ni terminológicas mayores.
  issues:
  - severity: medium
    issue: «de pie» para עֹמְדִים
    rationale: Aunque transmite verticalidad, en español se usa principalmente para seres animados y suena extraño con elementos estructurales del tabernáculo. «Erguidos» o «puestos verticalmente» refleja mejor la función arquitectónica.
  - severity: medium
    issue: Ambigüedad potencial en «tabernáculo de madera de acacia»
    rationale: La cadena puede leerse momentáneamente como si «de madera de acacia» describiera al tabernáculo, no a los marcos. Reordenar la frase elimina esa posible confusión.
  revised_spanish_text: Y harás los marcos[a] de madera de acacia para el tabernáculo, erguidos.
  revised_footnotes:
  - marker: a
    text: O «tablas» para «marcos»; el término hebreo se refiere a los elementos estructurales de madera del tabernáculo.
    reason: lexical_alternative
  revision_rationale: Se reordenó «de madera de acacia» para que modifique claramente a «marcos» y no a «tabernáculo». Se cambió «de pie» por «erguidos» para expresar la orientación de עֹמְדִים con español más natural y adecuado al contexto constructivo. Se conserva la nota léxica sobre «marcos/tablas».
