review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Isaac habla a los visitantes, pregunta por qué han venido, y contrasta su llegada con su hostilidad previa y el hecho de haberlo alejado. También conserva adecuadamente «de entre ustedes» para מֵאִתְּכֶם. Sin embargo, «me despidieron» no representa con suficiente fidelidad וַתְּשַׁלְּחוּנִי en este contexto narrativo; en español sugiere con mucha facilidad despedir de un empleo o una salida cortés, mientras que el hebreo aquí expresa que lo hicieron irse / lo echaron de su lado.'
  spanish_quality_summary: El texto es claro y legible, pero «me despidieron de entre ustedes» suena poco natural y semánticamente desviado en español bíblico general. Una formulación como «me enviaron lejos de entre ustedes» o «me hicieron irme de entre ustedes» comunica mejor el sentido sin endurecerlo demasiado. El resto del verso suena bien y mantiene un registro digno y natural.
  glossary_alignment: No hay términos del glosario teológico principal implicados. La decisión sobre la conjunción וְ como «si» es aceptable en español para un matiz causal/circunstancial. «Isaac» es la forma onomástica normal. «Me odiaron» preserva correctamente la fuerza de שְׂנֵאתֶם.
  issues:
  - severity: medium
    issue: «me despidieron» para וַתְּשַׁלְּחוּנִי
    rationale: Aunque שׁלח puede significar despedir/enviar, en este contexto «me despidieron» en español suele asociarse a empleo o a una despedida formal y no comunica bien «sent me away». «Me enviaron lejos» preserva mejor el valor narrativo sin sobretraducir a «expulsaron».
  - severity: low
    issue: La nota al pie explica la conjunción, pero no conserva explícitamente la alternativa más literal
    rationale: El rastro de auditoría inglés preserva la opción «y ...». Conviene mencionarla también en español como alternativa formal para reflejar mejor la evidencia y la decisión traductora.
  revised_spanish_text: 'Isaac les dijo[a]: «¿Por qué han venido a mí, si me odiaron y me enviaron lejos de entre ustedes?»'
  revised_footnotes:
