translation:
  language: es
  text: Y Lisias oyó que Felipe[a], a quien el rey Antíoco había designado mientras este todavía vivía para criar a Antíoco su hijo, con el fin de que reinara,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «para que llegara a reinar» o «para que se hiciera rey». El infinitivo griego βασιλεῦσαι puede traducirse con un matiz más directo de acceso al trono, no solo como ejercicio del reinado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - se enteró
  - escuchó
  lexicon: LSJ
  rationale: El aoristo de ἀκούω introduce una noticia recibida. «Oyó» conserva la recepción de la información de manera natural en español y evita añadir matices no presentes en el griego.
- source_word: κατέστησεν
  english_pob_choice: had appointed
  chosen_spanish: había designado
  alternatives_spanish:
  - había nombrado
  - había puesto a cargo
  lexicon: LSJ
  rationale: El verbo indica una designación formal para una función. «Había designado» refleja bien la relación anterior al hecho de oír, como en el valor pluscuamperfecto del inglés POB.
- source_word: ἔτι ζῶντος αὐτοῦ
  english_pob_choice: while he was still alive
  chosen_spanish: estando él todavía vivo
  alternatives_spanish:
  - mientras aún vivía
  - cuando todavía estaba vivo
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto indica que la designación ocurrió durante la vida del rey Antíoco. «Estando él todavía vivo» preserva esa relación temporal sin sonar forzado en español.
- source_word: ἐκθρέψαι
  english_pob_choice: to bring up
  chosen_spanish: criar
  alternatives_spanish:
  - criarlo
  - educar
  - criar y formar
  lexicon: LSJ
  rationale: El infinitivo alude a criar o sacar adelante a un niño. «Criar» es una equivalencia directa y suficiente en español, sin imponer una idea más técnica de educación.
- source_word: εἰς τὸ βασιλεῦσαι αὐτόν
  english_pob_choice: so that he might reign
  chosen_spanish: con el fin de que reinara
  alternatives_spanish:
  - para que reinara
  - a fin de que reinara
  - para hacerlo rey
  lexicon: LSJ
  rationale: La construcción expresa propósito o resultado pretendido. «Con el fin de que reinara» conserva ese valor final sin añadir «rey» como complemento explícito que el griego no formula aquí.
- source_word: βασιλεύς
  english_pob_choice: King
  chosen_spanish: rey
  alternatives_spanish:
  - rey Antíoco
  - el rey Antíoco
  lexicon: LSJ
  rationale: En español, el título antes del nombre no es necesario y puede sonar menos natural. «El rey Antíoco» mantiene la función titular del sustantivo.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete 1909 y concuerda con el audit trail inglés POB sin introducir cambios de sentido. Se mantuvo la relación temporal anterior con pluscuamperfecto y la finalidad del infinitivo βασιλεῦσαι, dejando en nota la alternativa de acceso al trono que el inglés también documenta.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones reverenciales porque no aparece el nombre divino en este versículo.
  - «Reinara» conserva la finalidad del griego sin convertirla en una afirmación de entronización ya cumplida.
  - «Criar» corresponde al ámbito de ἐκθρέψαι y es suficientemente amplio para rearing/bringing up.
