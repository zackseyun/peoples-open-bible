translation:
  language: es
  text: Si unos hombres pelean entre sí[a], un hombre y su hermano[b], y la esposa de uno se acerca para rescatar a su marido de la mano del que lo golpea[c], y extiende su mano y agarra sus genitales[d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando unos hombres pelean entre sí».
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «un hombre y su hermano»; aquí «hermano» puede significar un correligionario o compatriota, no necesariamente un hermano biológico.'
    reason: cultural_note
  - marker: c
    text: O «del que lo ataca».
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «sus genitales», expresión eufemística para las partes íntimas masculinas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: El hebreo introduce un caso jurídico hipotético. En español, «Si» reproduce bien la fuerza condicional inicial sin perder la naturalidad legal del enunciado.
- source_word: יִנָּצוּ
  english_pob_choice: are fighting
  chosen_spanish: están peleando
  alternatives_spanish:
  - están luchando
  - se pelean
  lexicon: HALOT
  rationale: El verbo expresa una contienda física entre hombres. «Están peleando» comunica esa escena de manera clara y actual en español, manteniendo el valor situacional del caso legal.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - varones
  lexicon: HALOT
  rationale: El hebreo especifica varones; «hombres» conserva esa referencia de género y evita neutralizar indebidamente el texto.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - el uno con el otro
  lexicon: HALOT
  rationale: Adverbio directo y natural en español para indicar que pelean entre sí.
- source_word: אִישׁ וְאָחִיו
  english_pob_choice: a man and his brother
  chosen_spanish: un hombre y su hermano
  alternatives_spanish:
  - un hombre y su prójimo
  - un hombre y su compatriota
  lexicon: HALOT
  rationale: Se conserva la fórmula literal del hebreo. En este contexto, «hermano» puede abarcar un compatriota o correligionario; mantenerla preserva la textura social/covenantal del original.
- source_word: וְקָרְבָה
  english_pob_choice: comes near
  chosen_spanish: se acerca
  alternatives_spanish:
  - se aproxima
  lexicon: HALOT
  rationale: Verbo de movimiento simple y directo. «Se acerca» es natural y suficientemente cercano al hebreo.
- source_word: אֵשֶׁת הָאֶחָד
  english_pob_choice: the wife of one
  chosen_spanish: la esposa de uno
  alternatives_spanish:
  - la mujer de uno
  - la esposa de uno de ellos
  lexicon: HALOT
  rationale: La construcción hebrea es compacta; «la esposa de uno» sigue de cerca la forma y es inteligible en español. «Esposa» evita una posible ambigüedad de «mujer».
- source_word: לְהַצִּיל
  english_pob_choice: to rescue
  chosen_spanish: para rescatar
  alternatives_spanish:
  - para salvar
  - para librar
  lexicon: HALOT
  rationale: En este contexto físico inmediato, «rescatar» expresa bien la idea de sacar a alguien de un peligro concreto. Conserva el matiz de intervención activa.
- source_word: אֶת אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: a su marido
  alternatives_spanish:
  - a su esposo
  - a su hombre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su hombre», pero en el marco matrimonial el equivalente natural y fiel en español es «marido»; «esposo» también sería posible, pero «marido» suena más directo aquí.
- source_word: מִיַּד מַכֵּהוּ
  english_pob_choice: from the hand of the one striking him
  chosen_spanish: de la mano del que lo golpea[c]
  alternatives_spanish:
  - de la mano de su agresor
  - de la mano del que lo ataca
  lexicon: HALOT
  rationale: Se conserva la imagen concreta «de la mano de» y el participio activo. «Golpea» refleja el valor básico de מַכֶּה sin suavizarlo; la nota ofrece una alternativa interpretativa más idiomática.
- source_word: וְשָׁלְחָה יָדָהּ
  english_pob_choice: she reaches out her hand
  chosen_spanish: extiende su mano
  alternatives_spanish:
  - alarga su mano
  - la tiende
  lexicon: HALOT
  rationale: Es un hebraísmo muy común; «extiende su mano» es un equivalente natural y preciso en español, sin añadir connotaciones extra.
- source_word: וְהֶחֱזִיקָה
  english_pob_choice: seizes
  chosen_spanish: agarra
  alternatives_spanish:
  - sujeta
  - se aferra a
  lexicon: HALOT
  rationale: El verbo implica tomar con firmeza. «Agarra» es directo y transmite la acción con fuerza; «sujeta» sería menos vívido.
- source_word: בִּמְבֻשָׁיו
  english_pob_choice: his genitals
  chosen_spanish: sus genitales[d]
  alternatives_spanish:
  - sus partes íntimas
  - sus partes vergonzosas
  lexicon: HALOT
  rationale: El término hebreo es un eufemismo para los genitales masculinos. «Genitales» conserva la precisión semántica sin rebajar la claridad del pasaje; la nota registra el carácter eufemístico del original.
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue revisada y se mantuvo sin cambios; el español sigue esa lectura de alta concordancia y conserva las mismas decisiones de ambigüedad clave (condicional legal, «su hermano», la imagen concreta de «la mano» y el eufemismo corporal).
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto fuente lo exigiera; este versículo no contiene el nombre divino.
  - Se evitó «siervo»/«esclavo» porque no corresponde a este pasaje.
  - Se conservó el paralelismo sintáctico del caso legal sin forzar una paráfrasis explicativa.
  - Las notas registran la ambigüedad cultural de «hermano» y la lectura eufemística de «genitales» para mantener transparencia textual.
