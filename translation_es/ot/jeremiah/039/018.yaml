translation:
  language: es
  text: Porque ciertamente te libraré[a], y no caerás a espada. Tu vida será para ti como botín[b], porque has confiado en mí, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «te libraré con toda certeza»; el infinitivo absoluto con verbo finito intensifica la promesa.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu vida será para ti como botín», un modismo bélico que significa que escaparás con vida.'
    reason: cultural_note
lexical_decisions:
- source_word: מַלֵּט אֲמַלֶּטְךָ
  english_pob_choice: I will surely rescue you
  chosen_spanish: ciertamente te libraré
  alternatives_spanish:
  - ciertamente te rescataré
  - sin duda te salvaré
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la promesa. «Ciertamente» conserva esa fuerza enfática en español natural. «Libraré» comunica liberación/escape físico en el contexto inmediato de peligro, sin cargar innecesariamente el verbo con un matiz soteriológico más amplio.
- source_word: וּבַחֶרֶב לֹא תִפֹּל
  english_pob_choice: and you will not fall by the sword
  chosen_spanish: y no caerás a espada
  alternatives_spanish:
  - y no morirás a espada
  - y no caerás por la espada
  lexicon: HALOT
  rationale: «Caer» reproduce el verbo hebreo y conserva el modismo bélico. «A espada» es una forma breve y idiomática en español bíblico para indicar muerte o derrota por ese medio. Se evita expandir a «morirás» para no perder el paralelo lexical con el hebreo.
- source_word: וְהָיְתָה לְךָ נַפְשְׁךָ לְשָׁלָל
  english_pob_choice: Your life will be yours as plunder
  chosen_spanish: Tu vida será para ti como botín
  alternatives_spanish:
  - Tu vida será para ti como despojo
  - Tu alma será para ti como botín
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa la vida preservada en guerra, no una afirmación técnica sobre el alma. «Vida» mantiene el sentido contextual. «Como botín» conserva la metáfora militar de supervivencia con la menor pérdida de transparencia posible en español.
- source_word: נַפְשְׁךָ
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  - tu ser
  lexicon: HALOT
  rationale: En este contexto de escape y preservación física, נֶפֶשׁ se refiere a la vida. «Vida» evita importar una antropología más estrecha o devocional que el pasaje no exige.
- source_word: לְשָׁלָל
  english_pob_choice: as plunder
  chosen_spanish: como botín
  alternatives_spanish:
  - como despojo
  - como presa
  lexicon: HALOT
  rationale: «Botín» es el equivalente español más natural para la imagen de guerra y preservación de la vida como única ganancia. Se prefiere sobre «despojo» por claridad y sobre «presa» por menor precisión en este contexto.
- source_word: כִּי בָטַחְתָּ בִּי
  english_pob_choice: because you have trusted in me
  chosen_spanish: porque has confiado en mí
  alternatives_spanish:
  - porque has puesto tu confianza en mí
  - porque confiaste en mí
  lexicon: HALOT
  rationale: בָטַח expresa confianza, dependencia y seguridad depositada en alguien. «Has confiado en mí» es la opción más directa y natural en español. El perfecto conserva el estado de confianza que fundamenta la promesa.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: נְאֻם es una fórmula profética que se vierte bien como «declara». Se conserva «Yahvé» según el criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por una convención de ocultamiento.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según la convención del proyecto, se translitera con la forma «Yahvé» para preservar el nombre del pacto y evitar el reemplazo litúrgico por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נֶפֶשׁ en el modismo «tu נפש como botín»
  english_pob_reading: your life will be yours as plunder
  chosen_spanish_reading: tu vida será para ti como botín
  alternative_spanish_readings:
  - tu alma será para ti como botín
  - tu ser será para ti como botín
  rationale: El contexto es de supervivencia física en guerra, por lo que נֶפֶשׁ refiere a la vida preservada. Traducir «vida» evita una lectura doctrinal sobre el alma que el pasaje no está haciendo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El expediente inglés revisado quedó sin cambios en su última pasada (high_agreement, unchanged=true). Esta versión española sigue esa lectura estable: mantiene la intensificación del verbo de rescate, el modismo bélico de supervivencia, la referencia contextual a «vida» para נֶפֶשׁ y el nombre divino Yahvé conforme al marco doctrinal del proyecto.'
  spanish_consistency_notes:
  - Se conserva el paralelismo breve y directo del hebreo, evitando añadir explicaciones al cuerpo del versículo.
  - «Libraré» se usa con valor de liberación/rescate físico; no se sustituye por «salvaré» para no introducir una carga más amplia.
  - «Botín» mantiene la metáfora militar; se evita «despojo» por menor naturalidad en este contexto.
  - La puntuación reproduce una cadencia profética natural en español con coma antes de la fórmula de mensajero final.
