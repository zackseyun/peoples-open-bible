revisions:
- from: Y enviaré a Babilonia extraños[a], y la aventarán[b] y vaciarán su tierra, porque estuvieron contra ella por todos lados en el día de desastre[c].
  to: Y enviaré a Babilonia extranjeros[a], y la aventarán[b] y vaciarán su tierra, porque estarán contra ella por todos lados en el día de desastre[c].
  rationale: Se ajusta el verbo final al futuro para reflejar correctamente el sentido profético contextual del hebreo y se sustituye 'extraños' por 'extranjeros' para una referencia más natural y precisa a invasores de fuera. Se conservan la imagen agrícola de 'aventar' y la aclaración sobre 'día de desastre'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:01:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la mayor parte del sentido: envío futuro, destino a Babilonia, imagen de aventar, vaciar la tierra y el valor de ''día de desastre''. Sin embargo, ''estuvieron contra ella'' no refleja bien el uso profético en contexto, donde el hebreo perfecto se entiende prospectivamente junto con los futuros circundantes: el sentido es que los invasores estarán contra Babilonia desde todos lados, no que ya lo estuvieron.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'extraños' suena poco natural en este contexto militar y puede sugerir rareza más que extranjería; 'extranjeros' o 'forasteros' comunica mejor el sentido. Además, la secuencia verbal mejora si se mantiene el futuro en 'estarán contra ella'. 'Por todos lados' es comprensible, pero 'por todas partes' o 'desde todos lados' también serían opciones; no es un problema mayor.
  glossary_alignment: 'No hay términos del glosario mayor comprometidos aquí. La principal cuestión léxica es זָרִים: aunque el inglés conservó ''strangers'', en español ''extraños'' resulta menos fiel al referente de outsiders/foreigners en un oráculo de invasión. ''Extranjeros'' preserva mejor la decisión documentada y coincide con la nota existente. Se mantiene ''aventarán'' para conservar la imagen agrícola de זרה y ''desastre'' para רָעָה como calamidad, no mal moral.'
  issues:
  - severity: high
    issue: Tiempo verbal en 'estuvieron contra ella'
    rationale: הָיוּ עָלֶיהָ, aunque formalmente perfecto, en este contexto profético acompaña a futuros y expresa la certeza del asalto venidero. El pasado español introduce un cambio temporal injustificado y altera el sentido del oráculo.
  - severity: medium
    issue: '''extraños'' para זָרִים'
    rationale: En español bíblico contemporáneo 'extraños' puede entenderse como 'raros' o simplemente desconocidos. Aquí el hebreo señala personas de fuera/enemigos foráneos. 'Extranjeros' comunica mejor ese valor y armoniza con la nota lexical.
  revised_spanish_text: Y enviaré a Babilonia extranjeros[a], y la aventarán[b] y vaciarán su tierra, porque estarán contra ella por todos lados en el día de desastre[c].
  revised_footnotes:
  - marker: a
    text: O “forasteros” para זָרִים. El hebreo designa personas de fuera enviadas contra Babilonia.
    reason: lexical_alternative
  - marker: b
    text: 'El verbo aquí conserva una imagen agrícola: “aventar” el grano. También puede entenderse más ampliamente como “dispersar”.'
    reason: lexical_alternative
  - marker: c
    text: “Día de desastre” expresa el tiempo en que cae la calamidad sobre Babilonia, no un día caracterizado por maldad moral.
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo final al futuro para reflejar correctamente el sentido profético contextual del hebreo y se sustituye 'extraños' por 'extranjeros' para una referencia más natural y precisa a invasores de fuera. Se conservan la imagen agrícola de 'aventar' y la aclaración sobre 'día de desastre'.
