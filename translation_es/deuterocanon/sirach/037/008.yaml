translation:
  language: es
  text: 'Todo consejero dice[a]: «¡Mira!», pero hay un consejero que lo hace tropezar[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «¡Mira!» es difícil y puede reflejar una afirmación breve de perspicacia o dirección. El paralelo griego contiene una advertencia más amplia acerca de guardarse de un consejero, porque también aconseja para sí mismo.
    reason: alternative_reading
  - marker: b
    text: 'O: «se aprovecha de él». El hebreo literalmente dice «lo pisa» o «holla sobre él», probablemente con sentido de consejo dañino o interesado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כל יועץ
  english_pob_choice: Every counselor
  chosen_spanish: Todo consejero
  alternatives_spanish:
  - Cada consejero
  - Todo consejero
  lexicon: HALOT
  rationale: El hebreo usa un distributivo general; en español, «Todo consejero» conserva la fuerza proverbial sin sonar tan pesado como una repetición explicativa.
- source_word: אומר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  - dice
  lexicon: HALOT
  rationale: «Dice» es la forma más natural y directa para el presente gnómico del proverbio.
- source_word: חזה
  english_pob_choice: See!
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Ve!
  - ¡Mira!
  - ¡Observa!
  lexicon: HALOT
  rationale: El hebreo es breve y algo incierto; «¡Mira!» conserva el tono abrupto e imperativo sin forzar una glosa interpretativa. La nota textual deja constancia de la dificultad y del paralelo griego más amplio.
- source_word: אך
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - pero
  - sin embargo
  lexicon: HALOT
  rationale: Marca el giro adversativo de manera natural en español.
- source_word: דורך עליו
  english_pob_choice: trips him up
  chosen_spanish: lo hace tropezar
  alternatives_spanish:
  - lo pisa
  - lo pisa encima
  - se aprovecha de él
  - lo engaña
  lexicon: HALOT
  rationale: El hebreo literalmente sugiere «pisar/tropezar sobre él», pero el audit trail inglés ya privilegió el sentido idiomático de daño o perjuicio. «Lo hace tropezar» conserva la imagen y el efecto nocivo sin perder transparencia.
theological_decisions:
- issue: Relación entre el hebreo breve y el paralelo griego más explícito
  english_pob_reading: Main text follows the extant Hebrew, with the Greek used to confirm that the verse warns against self-interested counsel rather than neutral advice.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado, y la nota textual reconoce el paralelo griego como confirmación de que se trata de una advertencia contra el consejero interesado en sí mismo.
  alternative_spanish_readings:
  - 'Una versión más apoyada en el griego: «Guarda tu vida de un consejero... pues también aconseja para sí mismo»'
  rationale: Sirácides conserva aquí un hebreo conciso y ambiguo. La lectura española mantiene esa concisión y no sustituye el hebreo por una reconstrucción completa del griego, pero documenta la aclaración que aporta el paralelo griego.
  doctrine_reference: 'PHILOSOPHY.md: el hebreo de Sirácides tiene primacía cuando se conserva; preservar la ambigüedad antes que resolverla por completo'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la versión anterior «treads on him» fue revisada a «trips him up» por reflejar mejor el sentido idiomático. En español se siguió esa misma línea, evitando una literalidad áspera y conservando la imagen de perjuicio. También se respetó la decisión de no reemplazar el hebreo por una paráfrasis basada solo en el griego.'
  spanish_consistency_notes:
  - Se usa «consejero» de forma uniforme para יועץ, como en el expediente inglés.
  - Se evita «Cristo» y terminología eclesiástica ajena, pues no aplica en este versículo.
  - Se preserva la tensión textual entre el hebreo breve y el griego expandido mediante nota, no mediante reescritura del cuerpo principal.
  - La puntuación y las comillas siguen norma española; las notas están ancladas con [a] y [b] en el texto.
