    rationale: El encargo pide preservar alternativas significativas cuando el POB inglés las preservó, o cuando el español crea una nueva ambigüedad. Aquí el inglés solo nota alternativas para la frase del nombre y para אָסְפַּרְנָא; las notas sobre 'cambiar esto' y 'he promulgado un decreto' no son necesarias y cargan el texto.
  - severity: low
