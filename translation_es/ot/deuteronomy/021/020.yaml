translation:
  language: es
  text: 'Entonces dirán a los ancianos de su ciudad[a]: «Este hijo nuestro es terco y rebelde; no escucha nuestra voz; es un glotón y un borracho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no nos obedece». El hebreo dice literalmente «no escucha nuestra voz», donde «escuchar» lleva el sentido de prestar atención obediente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: Then they shall say
  chosen_spanish: Entonces dirán
  alternatives_spanish:
  - Y dirán
  - Y entonces dirán
  lexicon: BHS/WLC
  rationale: La forma narrativa legal continúa la secuencia del procedimiento. «Entonces dirán» comunica bien el valor consecutivo sin volverlo mecánico.
- source_word: זִקְנֵי עִירוֹ
  english_pob_choice: the elders of his city
  chosen_spanish: los ancianos de su ciudad
  alternatives_spanish:
  - los ancianos de su pueblo
  - los líderes de su ciudad
  lexicon: BHS/WLC
  rationale: «Ancianos» mantiene el sentido de autoridad local del término hebreo. «Ciudad» conserva la referencia administrativa del texto, y el posesivo singular sigue al hebreo.
- source_word: בְּנֵנוּ זֶה
  english_pob_choice: This son of ours
  chosen_spanish: Este hijo nuestro
  alternatives_spanish:
  - Este hijo de nosotros
  - Este hijo, nuestro
  lexicon: BHS/WLC
  rationale: El hebreo enfatiza identificación familiar. En español, «Este hijo nuestro» es natural y conserva el énfasis sin perder el vínculo posesivo.
- source_word: סוֹרֵר
  english_pob_choice: stubborn
  chosen_spanish: terco
  alternatives_spanish:
  - obstinado
  - rebelde
  lexicon: HALOT
  rationale: El término describe resistencia obstinada. «Terco» transmite bien la idea de dureza de voluntad en español actual, aunque «obstinado» también sería posible.
- source_word: וּמֹרֶה
  english_pob_choice: rebellious
  chosen_spanish: rebelde
  alternatives_spanish:
  - desafiante
  - recalcitrante
  lexicon: HALOT
  rationale: El segundo participio intensifica la acusación moral y relacional. «Rebelde» reproduce esa fuerza con claridad y sin suavizarla.
- source_word: אֵינֶנּוּ שֹׁמֵעַ בְּקֹלֵנוּ
  english_pob_choice: he does not listen to our voice
  chosen_spanish: no escucha nuestra voz
  alternatives_spanish:
  - no nos obedece
  - no hace caso de nosotros
  lexicon: HALOT
  rationale: Se mantiene el idioma hebreo de «escuchar la voz», que en contexto implica obedecer. La opción principal conserva la metáfora y la nota explica el valor idiomático.
- source_word: זוֹלֵל
  english_pob_choice: a glutton
  chosen_spanish: un glotón
  alternatives_spanish:
  - un comilón
  - uno dado a la glotonería
  lexicon: HALOT
  rationale: El contexto de vicio junto con «borracho» favorece la idea de exceso en comer o darse a la gula. «Glotón» es la equivalencia natural y directa.
- source_word: וְסֹבֵא
  english_pob_choice: a drunkard
  chosen_spanish: un borracho
  alternatives_spanish:
  - un bebedor empedernido
  - uno dado al vino
  lexicon: HALOT
  rationale: El participio describe a alguien habitual en la embriaguez. «Borracho» refleja esa acusación de forma idiomática y clara en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no modificó el texto; el cotejo marcó alta concordancia con solo observaciones menores. La propuesta española sigue de cerca el sentido hebreo y la solución lexical auditable del POB inglés, sin introducir cambios doctrinales ni interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene el registro legal narrativo con formulación sobria y directa.
  - Se conserva la metáfora hebrea de «escuchar la voz» mediante una nota, en lugar de sustituirla en el texto principal por «obedecer».
  - 'Los términos de vicio se mantienen concretos y acusatorios: «glotón» y «borracho», coherentes con el par hebreo y con el uso del POB inglés.'
  - No se usa terminología eclesial tradicional que desplace el sentido jurídico-familiar del pasaje.
