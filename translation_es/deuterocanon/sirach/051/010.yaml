translation:
  language: es
  text: 'Y te ensalzaré: Yahvé[a], tú eres mi Padre, porque tú eres el poderoso de mi salvación. No me dejes flaquear[b] en el día de la angustia, en el día de ruina y desolación.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Invocé al Señor, padre de mi señor». El hebreo dice: «Yahvé, tú eres mi Padre».'
    reason: alternative_reading
  - marker: b
    text: 'El griego dice: «no me abandones en días de aflicción»; el hebreo dice más literalmente: «no me dejes aflojar» o «no me dejes debilitarme».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲרוֹמֵם
  english_pob_choice: And I will exalt you
  chosen_spanish: Y te exaltaré
  alternatives_spanish:
  - Y te alabaré
  - Y te ensalzaré
  - Y te glorificaré
  lexicon: HALOT
  rationale: El verbo רומם expresa exaltar/ensalzar. En español, «exaltar» conserva el registro elevado sin volver la frase demasiado libre; el objeto «te» se explicita por el contexto oracional, igual que en el audit trail inglés.
- source_word: יְהֹוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto pide usar «Yahvé» para el nombre divino. En esta unidad, el hebreo es la fuente principal donde se conserva, por lo que se mantiene la forma transparente del nombre en lugar de una máscara litúrgica.
- source_word: אָבִי
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - padre mío
  - Padre mío
  lexicon: HALOT
  rationale: El hebreo dice claramente «mi Padre». En español, «mi Padre» reproduce la relación poseída con el tono reverente del apóstrofe.
- source_word: גִּבּוֹר
  english_pob_choice: the mighty one
  chosen_spanish: el poderoso
  alternatives_spanish:
  - el fuerte
  - el guerrero
  - el poderoso guerrero
  lexicon: HALOT
  rationale: El sustantivo גבור puede funcionar de manera nominal. «El poderoso» mantiene el valor de agente/potencia sin cargar innecesariamente la imagen hacia lo militar.
- source_word: יִשְׁעִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi ayuda
  lexicon: HALOT
  rationale: ישע conserva el campo semántico de salvación/liberación. «Mi salvación» es la opción más directa y teológicamente plena en español.
- source_word: אַל תַּרְפֵּנִי
  english_pob_choice: Do not let me grow weak
  chosen_spanish: No me dejes debilitar
  alternatives_spanish:
  - No me abandones
  - No me dejes caer
  - No me dejes desfallecer
  lexicon: HALOT
  rationale: El hebreo deriva de רפה, con la idea de aflojarse, debilitarse o quedar flojo; por eso la frase principal sigue la imagen de debilitamiento. Se evita armonizar con el griego en el cuerpo principal, aunque la alternativa de abandono queda reconocible en nota.
- source_word: בְּיוֹם צָרָה
  english_pob_choice: in the day of distress
  chosen_spanish: en el día de la angustia
  alternatives_spanish:
  - en el día de la aflicción
  - en el día de la tribulación
  - en el día de la aflicción
  lexicon: HALOT
  rationale: צָרָה puede expresar angustia, aflicción o angustia apremiante. «Angustia» es natural en español moderno y conserva la gravedad del término.
- source_word: שׁוֹאָה
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - devastación
  - destrucción
  - catástrofe
  lexicon: HALOT
  rationale: El sustantivo apunta a ruina o devastación. «Ruina» es breve, clara y se equilibra bien con el término siguiente.
- source_word: מְשׁוֹאָה
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - devastación
  - desastre
  - catástrofe
  lexicon: HALOT
  rationale: El segundo término intensifica la calamidad. «Desolación» preserva la duplicación semántica de desastre/ruina sin fundir ambos sustantivos en uno solo.
theological_decisions:
- issue: Divergencia entre el hebreo y el griego en la invocación a Dios
  english_pob_reading: 'The main text follows the Hebrew: ''O Yahweh, you are my Father,'' with a footnote preserving the Greek alternative.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «Yahvé, tú eres mi Padre», y la nota preserva la variante griega.'
  alternative_spanish_readings:
  - «Invoqué al Señor, padre de mi señor»
  - «Clamé al Señor, padre de mi señor»
  rationale: El proyecto da prioridad al hebreo cuando está conservado en Sirácides/Sirach. La variante griega es significativa, pero no debe absorberse silenciosamente en el cuerpo principal; por eso se conserva en nota.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original conservada y preservación de variantes sustantivas en notas'
- issue: Sentido de אַל תַּרְפֵּנִי
  english_pob_reading: Render according to Hebrew weakening/slackening imagery rather than Greek abandonment language
  chosen_spanish_reading: Se traduce según la imagen hebrea de debilitarse o aflojarse, no como abandono.
  alternative_spanish_readings:
  - No me abandones
  - No me desampares
  - No me dejes
  rationale: El hebreo y el griego divergen aquí. Para no borrar la tensión textual, el cuerpo principal refleja la imagen hebrea de flaqueza; la lectura de abandono queda como alternativa griega en nota.
  doctrine_reference: 'PHILOSOPHY.md: no armonizar sin necesidad las divergencias textuales relevantes'
translation_notes:
  revision_awareness: Se siguió la última revisión del audit trail inglés al preferir una formulación natural para תרפני en el sentido de «debilitar» en lugar de una calca como «aflojar». También se mantuvo la distinción entre la lectura hebrea principal y la alternativa griega, sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino, conforme a la política del proyecto.
  - Se conserva el paralelismo poético «en el día... en el día...» sin reordenar el verso.
  - «Salvación» se mantiene para יִשְׁעִי, en consonancia con el valor teológico del sustantivo.
  - La nota a sobre la divergencia hebreo/griego está anclada en el nombre divino y la paternidad divina, que es el punto textual más sensible.
  - La nota b preserva la alternativa «abandonar» del griego sin desplazar la imagen hebrea principal de debilitamiento.
