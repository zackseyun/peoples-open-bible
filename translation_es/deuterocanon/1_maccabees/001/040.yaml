translation:
  language: es
  text: Según su gloria[a], su deshonra fue multiplicada, y su exaltación fue convertida en luto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «De acuerdo con su gloria»; κατά con acusativo puede expresar correspondencia o proporción.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «altura»; ὕψος puede entenderse literalmente como «altura» o figuradamente como «exaltación» o «elevación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: According to
  chosen_spanish: De acuerdo con
  alternatives_spanish:
  - Según
  - En proporción a
  - Conforme a
  lexicon: LSJ
  rationale: Con acusativo, κατά expresa correspondencia o medida. «De acuerdo con» conserva esa relación sin sonar tan rígido como un calco más literal, y permite mantener la correspondencia retórica del verso.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: LSJ
  rationale: «Gloria» preserva el registro elevado y el contraste con ἀτιμασμός. En español mantiene mejor la fuerza estilística que «honor» en este paralelismo.
- source_word: ἐπληθύνθη
  english_pob_choice: was multiplied
  chosen_spanish: fue multiplicada
  alternatives_spanish:
  - aumentó
  - se multiplicó
  - creció
  lexicon: LSJ
  rationale: La pasiva aorista se refleja con «fue multiplicada», conservando la imagen de incremento intensificado que el inglés POB también retiene.
- source_word: ἀτιμασμὸς
  english_pob_choice: dishonor
  chosen_spanish: deshonra
  alternatives_spanish:
  - desgracia
  - humillación
  lexicon: LSJ
  rationale: «Deshonra» comunica bien el sentido abstracto del sustantivo y mantiene la antítesis con «gloria» sin forzar un término más interpretativo.
- source_word: ὕψος
  english_pob_choice: exaltation
  chosen_spanish: exaltación
  alternatives_spanish:
  - altura
  - lozanía
  - elevación
  lexicon: LSJ
  rationale: Aunque literalmente puede ser «altura», el contexto figurado favorece «exaltación». Esta decisión sigue la revisión inglesa que prefirió el sentido figurado para evitar ambigüedad innecesaria.
- source_word: ἐστράφη εἰς πένθος
  english_pob_choice: was turned into mourning
  chosen_spanish: fue convertida en duelo
  alternatives_spanish:
  - se volvió duelo
  - fue vuelta en luto
  - se transformó en lamento
  lexicon: LSJ
  rationale: El pasivo con εἰς indica transformación. «Fue convertida en duelo» conserva el giro de cambio y suena natural en español, mientras que «duelo» transmite mejor el estado resultante que una mera traducción mecánica.
theological_decisions:
- issue: Mantenimiento del paralelismo honor/deshonra frente a lectura de humillación
  english_pob_reading: '''glory'' / ''dishonor'' as an elevated antithetical pair; no doctrinal claim beyond poetic reversal'
  chosen_spanish_reading: «gloria» / «deshonra» como par antitético elevado, sin doctrinalizar el verso
  alternative_spanish_readings:
  - «honor» / «desgracia»
  - «esplendor» / «humillación»
  rationale: No hay carga doctrinal directa; la decisión busca preservar la simetría retórica y el contraste semántico del hebraísm o helenismo subyacente. «Deshonra» mantiene el tono abstracto y solemne del original.
  doctrine_reference: No aplica; verso poético-histórico sin formulación doctrinal explícita.
translation_notes:
  revision_awareness: 'El texto español sigue el último estado revisado del POB inglés: se privilegió «According to» sobre una paráfrasis más explícita de proporción y se eligió un sentido figurado para ὕψος. La versión española conserva esa misma línea de decisión, evitando volver a una lectura más literal de «altura» que el audit trail ya había descartado por contexto.'
  spanish_consistency_notes:
  - Se usa «gloria» para δόξα, en armonía con la terminología POB y con el contraste directo con «deshonra».
  - Se usa «deshonra» para ἀτιμασμός; aunque «desgracia» es posible, «deshonra» mantiene mejor la antítesis con «gloria».
  - Se usa «exaltación» para ὕψος, siguiendo la revisión inglesa y el sentido figurado del contexto.
  - «Duelo» se eligió para πένθος por ser un resultado natural y solemne en español; también puede entenderse como «luto», pero «duelo» preserva mejor el carácter de lamento/aflicción.
  - La puntuación conserva la estructura bipartita del griego y del inglés auditado.
