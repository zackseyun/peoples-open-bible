translation:
  language: es
  text: En la prosperidad de los justos, una ciudad se alegra[a]; y en el perecer de los malvados hay gritos de alegría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando les va bien a los justos, una ciudad se alegra». El hebreo habla literalmente del «bien» o «bienestar» de los justos.'
    reason: alternative_reading
  - marker: b
    text: 'O: «hay un clamor de gozo». El término hebreo puede designar un clamor vibrante o jubiloso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטוּב
  english_pob_choice: In the prosperity of the righteous
  chosen_spanish: En la prosperidad de los justos
  alternatives_spanish:
  - Cuando les va bien a los justos
  - En el bien de los justos
  - En el bienestar de los justos
  lexicon: HALOT
  rationale: El hebreo combina la preposición ב con טוּב para expresar circunstancia o estado favorable. «Prosperidad» comunica bien el sentido de bienestar/éxito sin volver la frase demasiado literal o extraña en español.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - las personas justas
  lexicon: HALOT
  rationale: El plural sustantivado se refiere a una categoría moral. «Los justos» es natural en español bíblico y conserva la contraposición con «los malvados».
- source_word: תַּעֲלֹץ
  english_pob_choice: rejoices
  chosen_spanish: se alegra
  alternatives_spanish:
  - exulta
  - está jubilosa
  lexicon: HALOT
  rationale: El verbo עלץ expresa alegría intensa. Para una ciudad personificada, «se alegra» comunica el sentido con claridad y sin forzar un tono demasiado enfático.
- source_word: קִרְיָה
  english_pob_choice: a city
  chosen_spanish: una ciudad
  alternatives_spanish:
  - la ciudad
  - una villa
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular sin artículo para una verdad proverbial general. «Una ciudad» respeta ese valor genérico.
- source_word: וּבַאֲבֹד
  english_pob_choice: and in the perishing of
  chosen_spanish: y en la destrucción de
  alternatives_spanish:
  - y en el perecer de
  - y cuando perecen
  lexicon: HALOT
  rationale: La construcción con el infinitivo de אבד marca el estado o situación de perecer. En español, «destrucción» transmite el resultado/estado con naturalidad; «perecer» quedaría más literal, pero menos idiomático.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: «Malvados» mantiene la oposición moral fuerte del texto y es comprensible en registro bíblico actual. «Impíos» sería tradicional, pero suena más eclesiástico y menos directo.
- source_word: רִנָּה
  english_pob_choice: there is shouting
  chosen_spanish: hay júbilo
  alternatives_spanish:
  - hay gritos de alegría
  - hay clamores de gozo
  - hay canto jubiloso
  lexicon: HALOT
  rationale: El término puede referirse a un clamor gozoso o júbilo audible. «Hay júbilo» conserva la amplitud semántica y la valoración positiva del contexto, sin imponer una sola forma de expresión.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del inglés POB, que prefirió «In the prosperity...» para reflejar בְּטוּב, mantuvo el singular «a city» y conservó el paralelismo con «in the perishing of the wicked there is shouting». La versión española imita ese paralelismo mediante «En la prosperidad... y en la destrucción... hay júbilo».
  spanish_consistency_notes:
  - Se mantuvo la contraposición justa/malvado, sin suavizar el contraste moral del proverbio.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el nombre divino.
  - «Júbilo» se usó para reflejar el clamor gozoso de רִנָּה sin reducirlo a mera «shouting» neutral.
