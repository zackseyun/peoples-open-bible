translation:
  language: es
  text: Su trueno declara acerca de él[a]; el ganado también[b], sobre lo que se alza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es difícil. Literalmente, podría leerse «su amigo» en lugar de «su trueno»; muchos entienden la línea como referencia al ruido de la tormenta.
    reason: lexical_alternative
  - marker: b
    text: 'O: «el ganado también [declara] sobre la tormenta que se alza». La frase final probablemente alude a una tormenta que se acerca, pero el hebreo dice solo «lo que se alza».'
    reason: alternative_reading
lexical_decisions:
- source_word: יַגִּיד
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - anuncia
  - proclama
  - dice
  lexicon: HALOT
  rationale: El verbo hiphil de נגד expresa comunicar o dar a conocer. «Declara» en español conserva el tono elevado del verso y sigue de cerca la opción inglesa sin sonar forzado.
- source_word: עָלָיו
  english_pob_choice: concerning him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - en cuanto a él
  - contra él
  lexicon: HALOT
  rationale: La preposición על con sufijo puede ser ambigua. «Acerca de él» mantiene el sentido neutro de referencia y evita precisar demasiado el objeto de la declaración.
- source_word: רֵעוֹ
  english_pob_choice: its thunder
  chosen_spanish: su trueno
  alternatives_spanish:
  - su ruido
  - su sonido
  - su amigo
  lexicon: HALOT
  rationale: Sigo la lectura contextual que entiende la línea del fenómeno de la tormenta. «Su trueno» comunica bien el referente meteorológico y conserva la tensión del hebreo, mientras que la alternativa literal «su amigo» queda reservada en nota.
- source_word: מִקְנֶה
  english_pob_choice: the cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - el ganado mayor
  - las reses
  - el rebaño
  lexicon: HALOT
  rationale: El sustantivo suele denotar ganado o animales domésticos. «Ganado» es natural en español y suficientemente amplio para el contexto de una tormenta que los afecta o los hace reaccionar.
- source_word: אַף
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  - aun
  lexicon: HALOT
  rationale: La partícula añade extensión o énfasis. «También» reproduce la adición sin sobrecargar el verso.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - en cuanto a
  - contra
  lexicon: HALOT
  rationale: En la segunda ocurrencia, un valor neutro como «acerca de» conserva la ambigüedad de la preposición y la estructura poética del hebreo.
- source_word: עוֹלֶה
  english_pob_choice: what is rising
  chosen_spanish: lo que se alza
  alternatives_spanish:
  - lo que asciende
  - la tormenta que se alza
  - lo que va subiendo
  lexicon: HALOT
  rationale: El participio expresa algo que asciende o se eleva, pero el objeto no se explicita. «Lo que se alza» preserva esa apertura semántica y funciona bien en español poético.
theological_decisions:
- issue: Referencia del verso a un fenómeno natural o a una persona
  english_pob_reading: The line likely refers to the storm's noise, though the Hebrew is difficult and could be read more literally as 'his friend.'
  chosen_spanish_reading: 'La traducción principal sigue la lectura meteorológica: el trueno y el ganado reaccionan ante lo que se alza.'
  alternative_spanish_readings:
  - Puede leerse más literalmente como «su amigo» en el primer hemistiquio.
  - También puede entenderse la última frase como referencia a «la tormenta que se alza».
  rationale: El contexto inmediato de Eliú en Job 36 habla de fenómenos climáticos. La lectura del trueno produce un sentido coherente, pero la dificultad del hebreo se deja visible mediante nota para no borrar la alternativa literal.
  doctrine_reference: Job 36:27-33; lectura contextual poética
- issue: Mantenimiento de la ambigüedad de la frase final
  english_pob_reading: The final phrase likely refers to an approaching storm, but the Hebrew says only 'what is rising.'
  chosen_spanish_reading: Se conserva «lo que se alza» sin identificar explícitamente la entidad.
  alternative_spanish_readings:
  - «la tormenta que se alza»
  - «la tempestad que asciende»
  rationale: La publicación debe reflejar que el hebreo no nombra explícitamente el objeto. Mantener la apertura evita imponer una especificación que el texto no da de forma directa.
  doctrine_reference: Principio de transparencia textual
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requieren cambios sustanciales. Se mantiene la solución contextual para רֵעוֹ como «trueno» y la apertura semántica de עוֹלֶה como «lo que se alza».'
  spanish_consistency_notes:
  - Se usa «Dios» y «Yahvé» según el estándar del proyecto, aunque este versículo no los contiene.
  - Se evita «SEÑOR» por coherencia con la política del proyecto sobre el nombre divino, aunque no aparece en el texto.
  - «Ganado» se elige por naturalidad y por concordar con el valor léxico animal de מִקְנֶה en el contexto.
  - La puntuación conserva la estructura paralela del hebreo con dos hemistiquios separados por punto y coma.
