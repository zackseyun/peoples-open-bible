translation:
  language: es
  text: Así, cuando entren en Babilonia[a], estarán allí por muchos años y largo tiempo, hasta siete generaciones; pero después de esto los sacaré de allí en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por siete generaciones». La frase griega dice literalmente «hasta siete generaciones», que puede expresar el período del exilio de manera redondeada o estilizada.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθόντες
  english_pob_choice: when you enter
  chosen_spanish: cuando entren
  alternatives_spanish:
  - al entrar
  - después de entrar
  lexicon: BDAG
  rationale: El participio aoristo con sentido temporal futuro se expresa con una subordinada temporal natural en español. «Cuando entren» conserva la referencia prospectiva mejor que una forma más literal como «habiendo entrado».
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca continuidad/inferencia respecto de lo anterior. «Así que» es fluido en español moderno y preserva el valor discursivo sin volverlo demasiado solemne.
- source_word: εἰς Βαβυλῶνα
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - en Babilonia
  - a Babilonia
  lexicon: BDAG
  rationale: Con el verbo de entrar, el español puede omitir la preposición explícita y mantener el nombre propio. «Babilonia» corresponde al topónimo griego en transliteración española.
- source_word: ἔσεσθε ἐκεῖ
  english_pob_choice: you will be there
  chosen_spanish: estarán allí
  alternatives_spanish:
  - estarán en ese lugar
  - allí estarán
  lexicon: BDAG
  rationale: El futuro de ser/estar con adverbio de lugar se vierte de forma directa y natural. «Estarán allí» conserva la localización sin sobrecargar la frase.
- source_word: ἔτη πλείω
  english_pob_choice: for many years
  chosen_spanish: por muchos años
  alternatives_spanish:
  - muchos años
  - durante muchos años
  lexicon: BDAG
  rationale: πλείω aquí expresa duración abundante, no comparación explícita. «Por muchos años» reproduce bien la duración prolongada en español idiomático.
- source_word: καὶ χρόνον μακρόν
  english_pob_choice: for a long time
  chosen_spanish: y por un largo tiempo
  alternatives_spanish:
  - y mucho tiempo
  - y durante largo tiempo
  lexicon: BDAG
  rationale: Se conserva el segundo miembro temporal como refuerzo retórico. «Y por un largo tiempo» mantiene la duplicación enfática del griego sin fusionarla en una sola expresión.
- source_word: ἕως γενεῶν ἑπτά
  english_pob_choice: until seven generations
  chosen_spanish: hasta siete generaciones
  alternatives_spanish:
  - por siete generaciones
  - hasta la séptima generación
  lexicon: BDAG
  rationale: «Hasta» refleja de manera directa ἕως. Se mantiene el plural de generaciones con el numeral, sin convertirlo en un singular interpretativo.
- source_word: μετὰ τοῦτο δὲ
  english_pob_choice: but after this
  chosen_spanish: pero después de esto
  alternatives_spanish:
  - y después de esto
  - luego de esto
  lexicon: BDAG
  rationale: δὲ introduce transición con leve contraste. «Pero después de esto» conserva el giro hacia la restauración sin añadir contenido que no está en el texto.
- source_word: ἐξάξω
  english_pob_choice: I will bring you out
  chosen_spanish: los sacaré
  alternatives_spanish:
  - los haré salir
  - los llevaré fuera
  lexicon: BDAG
  rationale: El verbo tiene el sentido de sacar o conducir fuera. «Los sacaré» es natural y mantiene la idea de salida sin introducir explícitamente regreso o rescate.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: BDAG
  rationale: Adverbio simple de separación; «de allí» es la forma más directa y transparente en español.
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - pacíficamente
  lexicon: BDAG
  rationale: La frase preposicional se vierte idiomáticamente como estado o modo de la salida. «En paz» preserva el matiz sin sobrerinterpretarlo.
theological_decisions:
- issue: Alcance de la promesa final de salida de Babilonia
  english_pob_reading: I will bring you out from there in peace
  chosen_spanish_reading: los sacaré de allí en paz
  alternative_spanish_readings:
  - los rescataré de allí en paz
  - los sacaré de allí de regreso en paz
  rationale: El griego ἐξάξω indica sacar o conducir fuera, pero no añade explícitamente «regreso» ni un verbo más fuerte como «rescatar». La versión española conserva esa sobriedad para no importar una nuance salvadora no expresada en el texto.
  doctrine_reference: Principio de primacía del original; mantener la tensión teológica sin resolverla por adelantado.
translation_notes:
  revision_awareness: Se siguió de cerca el último pasaje revisado del POB en inglés, manteniendo la coordinación de dos expresiones temporales («many years and a long time») y la conclusión sobria («bring you out from there in peace») sin intensificarla hacia «rescatar» o «volver».
  spanish_consistency_notes:
  - Se usa «Babilonia» como topónimo estándar en español.
  - Se mantuvo «en paz» para μετʼ εἰρήνης, en lugar de «pacíficamente», por ser más idiomático y conservar el estado de la salida.
  - 'Se preservó la duplicación temporal del griego: «por muchos años y por un largo tiempo».'
  - Se evitó «SEÑOR» u այլ masking conventions, pues no aparece el nombre divino en este versículo.
