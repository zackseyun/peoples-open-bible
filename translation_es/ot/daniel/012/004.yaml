translation:
  language: es
  text: Pero tú, Daniel, cierra las palabras y sella el libro[a] hasta el tiempo del fin. Muchos andarán de aquí para allá[b], y el conocimiento aumentará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rollo».
    reason: lexical_alternative
  - marker: b
    text: O «Muchos correrán de un lado a otro»; el hebreo también puede sugerir que muchos buscarán recorriendo algo, dando el sentido de «Muchos buscarán, y el conocimiento aumentará».
    reason: alternative_reading
lexical_decisions:
- source_word: סְתֹם
  english_pob_choice: shut up
  chosen_spanish: cierra
  alternatives_spanish:
  - encierras
  - cierra herméticamente
  - guarda bajo sello
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de cerrar o mantener inaccesible. En español, «cierra» conserva la imagen concreta sin sonar artificial; «encierras» sería demasiado fuerte y «guarda bajo sello» duplica la idea del verbo siguiente.
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las cosas dichas
  - los dichos
  - las materias
  lexicon: HALOT
  rationale: דברים puede significar «palabras» o «asuntos». Aquí el contexto inmediato de una revelación recibida favorece «las palabras», que es claro y fiel al referente verbal.
- source_word: וַחֲתֹם
  english_pob_choice: seal
  chosen_spanish: sella
  alternatives_spanish:
  - sella herméticamente
  - precinta
  - pon un sello sobre
  lexicon: HALOT
  rationale: El mandato alude al sellado de un documento. «Sella» reproduce el acto de cerrar con autoridad y preservación, sin añadir elementos no presentes en el hebreo.
- source_word: הַסֵּפֶר
  english_pob_choice: the book
  chosen_spanish: el libro
  alternatives_spanish:
  - el rollo
  - el documento
  - el escrito
  lexicon: HALOT
  rationale: ספר puede referirse a libro, rollo o documento. «El libro» sigue la decisión de la POB inglesa por ser suficientemente amplio y natural; en español, «rollo» quedaría más técnico, así que se reserva como alternativa.
- source_word: עַד עֵת קֵץ
  english_pob_choice: until the time of the end
  chosen_spanish: hasta el tiempo del fin
  alternatives_spanish:
  - hasta el tiempo del final
  - hasta el tiempo del término
  lexicon: HALOT
  rationale: La expresión marca un horizonte escatológico. «Hasta el tiempo del fin» conserva la estructura y el valor temporal sin explicitar más de lo que el hebreo dice.
- source_word: יְשֹׁטְטוּ רַבִּים
  english_pob_choice: Many will roam about
  chosen_spanish: Muchos andarán de aquí para allá
  alternatives_spanish:
  - Muchos correrán de un lado a otro
  - Muchos buscarán diligentemente
  - Muchos irán de aquí para allá
  lexicon: HALOT
  rationale: שוטט puede sugerir moverse sin rumbo, ir y venir, o buscar recorriendo. «Andarán de aquí para allá» preserva esa amplitud y deja abierta la ambigüedad interpretativa que la POB inglesa mantuvo.
- source_word: וְתִרְבֶּה הַדָּעַת
  english_pob_choice: and knowledge will increase
  chosen_spanish: y el conocimiento aumentará
  alternatives_spanish:
  - y el conocimiento se multiplicará
  - y el saber aumentará
  - y la ciencia aumentará
  lexicon: HALOT
  rationale: דעת aquí denota conocimiento. «Conocimiento» es más directo que «entendimiento» y «aumentará» refleja bien el verbo רבה en un español natural y dignificado.
theological_decisions:
- issue: Ambigüedad de יְשֹׁטְטוּ רַבִּים
  english_pob_reading: A general statement that many will move about and that knowledge will increase as the end approaches, without specifying whether this is travel, investigative searching, or growth in understanding of the prophecy.
  chosen_spanish_reading: Una afirmación general de que muchos andarán de aquí para allá y de que el conocimiento aumentará, sin especificar si se trata de desplazamiento físico, búsqueda investigativa o estudio de la profecía.
  alternative_spanish_readings:
  - Muchos correrán de un lado a otro
  - Muchos buscarán diligentemente en el libro
  rationale: El hebreo permite varias lecturas plausibles y la POB inglesa preserva esa tensión. La redacción española evita resolver la frase hacia el progreso tecnológico o hacia un estudio exclusivamente exegético.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo entre revisiones y la POB inglesa es alto, con solo observaciones menores. Se mantuvieron la ambigüedad de יְשֹׁטְטוּ רַבִּים y la equivalencia flexible de הַסֵּפֶר como «el libro», con nota alternativa para «el rollo».
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «conocimiento» para דעת, en coherencia con la decisión inglesa y evitando una paráfrasis como «entendimiento».
  - «Muchos andarán de aquí para allá» conserva una imagen amplia y no interpreta el verbo como mera lectura o búsqueda textual.
  - Las notas al pie mantienen la alternativa material de הַסֵּפֶר y la ambigüedad de יְשֹׁטְטוּ רַבִּים sin duplicar marcadores.
