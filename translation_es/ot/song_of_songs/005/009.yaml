review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general, pero no preserva con suficiente fidelidad la comparación hebrea מִן repetida (''más que/por encima de otro amado''). La frase española «¿Qué tiene... que ver con...?» cambia el significado hacia relación o pertinencia, no superioridad comparativa. Además, la nota b está mal anclada semánticamente: en el POB inglés la segunda nota corresponde al verbo «hacer jurar», no a una segunda alternativa para «amado».'
  spanish_quality_summary: El español es legible, pero «¿Qué tiene tu amado que ver con otro amado?» suena idiomático a costa de alterar el sentido. «oh la más bella...» también resulta algo forzado; el vocativo funciona mejor sin «oh» en español moderno eclesial. El resto del verso suena natural y digno.
  glossary_alignment: «tu amado» refleja bien דּוֹדֵךְ y concuerda con la decisión léxica del proyecto; «tu amante» puede mantenerse como alternativa en nota. El principal desajuste es מִדּוֹד, que debe expresarse comparativamente («más que otro amado») y no como «tener que ver con». El verbo הִשְׁבַּעְתָּנוּ debe conservar su nota alternativa sobre 'nos hiciste jurar / nos conjuraste / nos pusiste bajo juramento'.
  issues:
  - severity: high
    issue: La construcción «¿Qué tiene tu amado... que ver con otro amado?» no traduce fielmente la comparación hebrea.
    rationale: מַה ... מִדּוֹד pregunta qué hace que el amado sea 'más que' otro amado. «Tener que ver con» introduce un sentido distinto de relación o conexión y pierde la fuerza comparativa explícita del original.
  - severity: medium
    issue: La nota al pie b está asignada al término equivocado.
    rationale: Según el POB inglés, la segunda nota debe explicar הִשְׁבַּעְתָּנוּ ('nos hiciste jurar / nos conjuraste'), no volver a dar una alternativa para דּוֹד.
  - severity: low
    issue: «oh la más bella entre las mujeres» suena poco natural en español contemporáneo.
    rationale: 'El vocativo puede expresarse con una pausa appositiva más natural: «la más bella entre las mujeres» o «hermosa entre las mujeres», sin necesidad de «oh».'
  revised_spanish_text: ¿Qué tiene tu amado[a] más que otro amado, la más bella entre las mujeres? ¿Qué tiene tu amado más que otro amado, para que nos hayas hecho jurar así?[b]
