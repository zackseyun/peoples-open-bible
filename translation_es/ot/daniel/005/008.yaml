translation:
  language: es
  text: Entonces entraron todos los sabios del rey, pero no pudieron leer la escritura[a] ni dar a conocer su interpretación[b] al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Escritura» también puede entenderse como «inscripción». El término arameo puede referirse al mensaje escrito mismo.
    reason: lexical_alternative
  - marker: b
    text: O «decir al rey su significado». El término arameo para «interpretación» es recurrente en Daniel para explicar un mensaje o sueño misterioso.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - At that time
  - Luego
  lexicon: HALOT
  rationale: Marca discursiva narrativa que introduce el siguiente evento. «Entonces» conserva el avance secuencial de la escena y suena natural en español.
- source_word: עללין
  english_pob_choice: came in
  chosen_spanish: entraron
  alternatives_spanish:
  - vinieron
  - se presentaron
  lexicon: HALOT
  rationale: El verbo arameo expresa entrada a la presencia real. «Entraron» mantiene el movimiento sin forzar una paráfrasis.
- source_word: כֹּל חַכִּימֵי מַלְכָּא
  english_pob_choice: all the king’s wise men
  chosen_spanish: todos los sabios del rey
  alternatives_spanish:
  - todos los sabios del rey
  - todos los sabios reales
  lexicon: HALOT
  rationale: La cadena constructa se rinde de forma natural como posesión en español. «Sabios del rey» conserva el grupo cortesano y el matiz de oficialidad.
- source_word: וְלָא כָהֲלִין
  english_pob_choice: but they were not able
  chosen_spanish: pero no pudieron
  alternatives_spanish:
  - y no pudieron
  - pero no eran capaces
  lexicon: HALOT
  rationale: La construcción negativa expresa incapacidad real y contraste con su entrada. «No pudieron» es idiomático y conserva la fuerza modal.
- source_word: כְּתָבָא לְמִקְרֵא
  english_pob_choice: to read the writing
  chosen_spanish: leer la escritura
  alternatives_spanish:
  - leer la inscripción
  - leer el escrito
  lexicon: HALOT
  rationale: «כתבא» puede referir al mensaje escrito mismo, no solo al soporte. «Escritura» mantiene esa amplitud y evita reducirlo a «inscripción» sin necesidad.
- source_word: וּפִשְׁרָא
  english_pob_choice: its interpretation
  chosen_spanish: su interpretación
  alternatives_spanish:
  - su significado
  - la interpretación
  lexicon: HALOT
  rationale: En Daniel, פְּשַׁר es el término técnico recurrente para la interpretación de un mensaje misterioso. «Su interpretación» preserva ese vínculo terminológico.
- source_word: לְהוֹדָעָה לְמַלְכָּא
  english_pob_choice: to make its interpretation known to the king
  chosen_spanish: dar a conocer su interpretación al rey
  alternatives_spanish:
  - hacer saber su interpretación al rey
  - declarar su interpretación al rey
  lexicon: HALOT
  rationale: El causativo de ידע pide una expresión de comunicación. «Dar a conocer» conserva el sentido de informar sin sonar rígido.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto arameo y coincide sustancialmente con la solución inglesa auditada: secuencia narrativa con «Entonces», grupo cortesano con posesión natural, negativa de incapacidad, y el término técnico «interpretación» para פִּשְׁרָא. Se mantiene una única nota léxica porque el único punto con alternativa relevante es כְּתָבָא.'
  spanish_consistency_notes:
  - Se usa «rey» sin mayúscula interna, conforme al uso corriente en español bíblico cuando no hay nombre propio.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se mantiene «interpretación» como término técnico coherente con Daniel.
