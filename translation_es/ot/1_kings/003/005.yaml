- from: 'En Gabaón Yahvé se apareció a Salomón en un sueño de noche[a], y Dios dijo: «Pide lo que yo te daré».'
  to: 'En Gabaón Yahvé se apareció a Salomón en un sueño de noche[a], y Dios dijo: «Pide qué debo darte».'
  rationale: 'Se corrige la cláusula final para reflejar la pregunta indirecta hebrea después del imperativo: no «lo que yo te daré», sino «qué debo darte». Esto preserva mejor el sentido abierto e idiomático del original sin alterar la terminología del proyecto. Se mantiene la nota sobre «de noche» porque justifica una formulación algo más cercana al hebreo.'
