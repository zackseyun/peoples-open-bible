theological_decisions:
- issue: Generic masculine language in legal formulation
  chosen_reading: Retain representative masculine in 'whatever a man may utter in an oath' while using 'person' earlier for נֶפֶשׁ
  alternative_readings:
  - whatever a person may utter in an oath
  rationale: The Hebrew mixes נֶפֶשׁ ('person') with generic הָאָדָם ('the man/human'). Following the doctrine's gender-accurate policy, the representative masculine is preserved where it appears, without implying exclusion of women from the law's scope.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
