translation:
  language: es
  text: Es año de jubileo; el año cincuenta[a] será para ustedes. No sembrarán, ni segarán su brote espontáneo[b], ni vendimiarán los racimos de sus vides no podadas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el año quincuagésimo».
    reason: lexical_alternative
  - marker: b
    text: O «lo que brota por sí solo» para la idea de crecimiento no sembrado.
    reason: lexical_alternative
  - marker: c
    text: O «sus racimos de vides sin podar»; el hebreo alude al crecimiento de la vid dejado sin atender o sin podar.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹבֵל
  english_pob_choice: Jubilee
  chosen_spanish: jubileo
  alternatives_spanish:
  - Jubileo
  lexicon: HALOT
  rationale: En Levítico 25 el término designa el año sagrado institucional, no el cuerno mismo; en español, «jubileo» comunica mejor la institución y conserva el sentido técnico del pasaje.
- source_word: שְׁנַת הַחֲמִשִּׁים שָׁנָה
  english_pob_choice: the fiftieth year
  chosen_spanish: el año cincuenta
  alternatives_spanish:
  - el año quincuagésimo
  - el año de cincuenta
  lexicon: HALOT
  rationale: La frase constructa identifica el jubileo como el año cincuenta; «el año cincuenta» es la forma más natural en español sin perder la precisión del hebreo.
- source_word: תִּהְיֶה לָכֶם
  english_pob_choice: It shall be for you
  chosen_spanish: será para ustedes
  alternatives_spanish:
  - será de ustedes
  - les será
  lexicon: HALOT
  rationale: Conserva la predicación hebrea y el dativo de beneficio sin sobrecargar el español; «para ustedes» refleja bien la relación legal del año con el pueblo.
- source_word: לֹא תִזְרָעוּ
  english_pob_choice: You shall not sow
  chosen_spanish: No sembrarán
  alternatives_spanish:
  - No sembréis
  - No han de sembrar
  lexicon: HALOT
  rationale: La prohibición legal se expresa con futuro de mandato en español; «sembrarán» mantiene el verbo agrícola básico.
- source_word: לֹא תִקְצְרוּ
  english_pob_choice: you shall not reap
  chosen_spanish: ni segarán
  alternatives_spanish:
  - ni cosecharán
  - ni recogerán
  lexicon: HALOT
  rationale: «Segar» conserva la distinción con la vendimia del final del versículo y corresponde bien al acto de recoger la mies en lenguaje bíblico-legible.
- source_word: סְפִיחֶיהָ
  english_pob_choice: its volunteer growth
  chosen_spanish: su brote espontáneo
  alternatives_spanish:
  - su crecimiento espontáneo
  - lo que brota por sí solo
  - su retoño espontáneo
  lexicon: HALOT
  rationale: El término alude a lo que nace sin siembra; «brote espontáneo» preserva la idea de crecimiento no sembrado y suena natural en español contemporáneo.
- source_word: נְזִרֶיהָ
  english_pob_choice: its unpruned vines
  chosen_spanish: las vides no podadas
  alternatives_spanish:
  - las vides sin podar
  - las vides no recortadas
  - sus vides apartadas
  lexicon: HALOT
  rationale: En este contexto agrícola el sustantivo remite a vides dejadas sin podar/atender; «no podadas» expresa la tensión lexical sin introducir una lectura ajena al paralelismo del versículo.
theological_decisions:
- issue: Mantener «Yahvé» no aplica en este versículo, pero sí la estructura legal del año santo sin sustituirla por lenguaje eclesiástico.
  english_pob_reading: The passage is rendered as a legal-sabbatical instruction tied to the Jubilee institution.
  chosen_spanish_reading: El pasaje se presenta como una instrucción legal-sabatical vinculada a la institución del jubileo.
  alternative_spanish_readings:
  - Una lectura más litúrgica o devocional del jubileo.
  - Sustituir el jubileo por una idea general de fiesta sagrada.
  rationale: La fidelidad al marco del texto requiere conservar su carácter normativo y agrícola; en español, «jubileo» ya transmite la carga institucional sin convertirlo en una celebración genérica.
  doctrine_reference: Levítico 25; marco de año jubilar/sabático
- issue: Conservar la doble expresión agrícola del final sin fusionarla en una sola idea de «cosecha».
  english_pob_reading: The POB distinguishes sowing, reaping volunteer growth, and gathering grapes of unpruned vines.
  chosen_spanish_reading: Se distinguen la siembra, la siega del brote espontáneo y la vendimia de las vides no podadas.
  alternative_spanish_readings:
  - No sembrarán ni cosecharán nada.
  - No sembrarán ni recogerán su cosecha.
  rationale: El hebreo separa claramente los actos y los productos; mantener esa distinción evita borrar el paralelismo y la especificidad agrícola del mandamiento.
  doctrine_reference: Levítico 25:11; paralelismo legal-poético
translation_notes:
  revision_awareness: 'El texto en inglés pasó por ajustes para reflejar mejor el orden hebreo: primero la afirmación ''It is a Jubilee'', luego la explicación del año cincuenta y finalmente la serie de prohibiciones agrícolas. La versión española sigue esa estructura, conserva la distinción entre brote espontáneo y vides no podadas, y evita fusionar los dos verbos agrícolas en un solo término genérico.'
  spanish_consistency_notes:
  - Se mantiene 'jubileo' en minúscula por tratarse de un nombre común institucional en español, salvo que el estilo editorial prefiera mayúscula técnica.
  - Se optó por 'segarán' y 'vendimiarán' para distinguir היטב entre cereal y uva, como hace el hebreo.
  - La expresión 'para ustedes' conserva la función del dativo hebreo sin forzar posesión literal.
  - No se introdujo 'Yahvé' porque este versículo no contiene el nombre divino ni una cita directa del Tetragrámaton.
