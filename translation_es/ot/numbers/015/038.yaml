  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Los hijos de Israel» preserva adecuadamente בְּנֵי יִשְׂרָאֵל. «Borlas» para צִיצִת sigue la lógica del POB con nota alternativa. «Azul» para תְּכֵלֶת y la nota cultural están bien alineados.
