revisions:
- from: y no por causa de ellos[a], sino por causa de los pactos con sus padres[b], y por la invocación sobre ellos del nombre suyo, venerable y grandioso.
  to: y no por causa de ellos[a], sino por causa de las alianzas con sus padres, y por la invocación sobre ellos de su nombre majestuoso y magnífico[b].
  rationale: Se corrigió el anclaje de la nota cultural para que explique la cláusula que realmente comenta. También se mejoró la naturalidad del español en la frase final, se alineó mejor διαθήκας con «alianzas» en contexto bíblico y se ajustaron los adjetivos para reflejar con más fidelidad el perfil honorífico del griego y de la auditoría inglesa.
