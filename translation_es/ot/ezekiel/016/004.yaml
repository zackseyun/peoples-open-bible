    rationale: El inglés auditado revisó expresamente «to cleanse you» a «for cleansing» para evitar expansión interpretativa. En español, «para limpiar» queda más verbal y algo menos ceñido que «para tu limpieza» o «para limpieza».
  - severity: medium
    issue: Falta una nota cultural independiente sobre «frotada con sal»
    rationale: El rastro inglés conserva una nota específica sobre la práctica antigua de salar/frotar al recién nacido. El borrador español no la preserva, aunque sí conserva una nota distinta sobre «fajada».
  - severity: low
