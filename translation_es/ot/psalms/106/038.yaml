translation:
  language: es
  text: Ellos derramaron[a] sangre inocente, la sangre de sus hijos y de sus hijas, a quienes sacrificaron a los ídolos de Canaán, y la tierra fue contaminada con sangre[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘vertieron sangre inocente’.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘sangres’, forma plural que puede denotar derramamiento de sangre o culpa de sangre.
    reason: lexical_alternative
  - marker: c
    text: O ‘y la tierra fue contaminada por culpa de sangre’.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁפְּכ֨וּ
  english_pob_choice: they poured out
  chosen_spanish: derramaron
  alternatives_spanish:
  - vertieron
  - esparcieron
  lexicon: HALOT
  rationale: El hebreo שׁפך puede significar literalmente ‘verter/derramar’ y se usa con sangre para expresar matanza violenta. ‘Derramaron’ conserva esa imagen y es natural en español bíblico y contemporáneo.
- source_word: דָ֪ם נָקִ֡י
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - la sangre de los inocentes
  - sangre sin culpa
  lexicon: HALOT
  rationale: 'La expresión hebrea es una colocación moral clara: sangre derramada injustamente. ‘Sangre inocente’ mantiene la fuerza acusatoria sin explicar en exceso.'
- source_word: דַּם בְּנֵ֘י/הֶ֤ם וּֽ/בְנוֹתֵי/הֶ֗ם
  english_pob_choice: the blood of their sons and daughters
  chosen_spanish: la sangre de sus hijos y de sus hijas
  alternatives_spanish:
  - la sangre de sus hijos e hijas
  - la sangre de sus hijos y sus hijas
  lexicon: HALOT
  rationale: La repetición de ‘sangre’ especifica que se trata de la sangre derramada de sus propios descendientes. ‘Hijos e hijas’ sería más compacto, pero la forma elegida refleja mejor el paralelismo del hebreo.
- source_word: אֲשֶׁ֣ר זִ֭בְּחוּ
  english_pob_choice: whom they sacrificed
  chosen_spanish: a quienes sacrificaron
  alternatives_spanish:
  - que sacrificaron
  - a los cuales sacrificaron
  lexicon: HALOT
  rationale: El relativo se refiere a personas; por eso ‘a quienes’ es más preciso que ‘que’ en español. ‘Sacrificaron’ reproduce el valor cultual de זבח.
- source_word: לַ/עֲצַבֵּ֣י כְנָ֑עַן
  english_pob_choice: to the idols of Canaan
  chosen_spanish: a los ídolos de Canaán
  alternatives_spanish:
  - a las imágenes de Canaán
  - a los ídolos cananeos
  lexicon: HALOT
  rationale: עֲצַבִּים suele denotar ídolos/imágenes con matiz polémico. ‘Ídolos de Canaán’ sigue de cerca el hebreo y conserva el tono condenatorio.
- source_word: וַ/תֶּחֱנַ֥ף הָ֝/אָ֗רֶץ
  english_pob_choice: and the land was polluted
  chosen_spanish: y la tierra fue contaminada
  alternatives_spanish:
  - y la tierra fue profanada
  - y la tierra fue contaminada/definada
  lexicon: HALOT
  rationale: El verbo חנף expresa contaminación moral o religiosa del terreno por culpa de sangre. ‘Contaminada’ comunica bien esa impureza en español moderno, aunque ‘profanada’ también es posible.
- source_word: בַּ/דָּמִֽים
  english_pob_choice: with blood
  chosen_spanish: con sangre
  alternatives_spanish:
  - por sangre
  - con sangre derramada
  - por sangre derramada
  lexicon: HALOT
  rationale: El plural hebreo ‘sangres’ puede apuntar a derramamiento de sangre o a sangre culpable. La versión inglesa revisada prefirió ‘with blood’ para conservar la repetición; en español ‘con sangre’ mantiene esa misma resonancia sin forzar un término técnico.
theological_decisions:
- issue: Moral status of the victims in child sacrifice
  english_pob_reading: The text explicitly condemns the killings as the shedding of innocent blood.
  chosen_spanish_reading: El texto condena explícitamente las muertes como derramamiento de sangre inocente.
  alternative_spanish_readings:
  - El texto condena esas muertes como sangre inocente derramada.
  - El texto presenta a las víctimas como inocentes.
  rationale: ‘Sangre inocente’ preserva el juicio moral del salmo sin añadir explicación doctrinal ajena al versículo. La formulación mantiene la tensión ética del hebreo.
  doctrine_reference: Principio de primacía del idioma original; conservar el peso moral del texto sin paráfrasis.
- issue: Nature of the land's corruption
  english_pob_reading: The land is described as polluted with blood, expressing covenantal/moral defilement.
  chosen_spanish_reading: La tierra aparece contaminada con sangre, expresando una mancha moral y ritual.
  alternative_spanish_readings:
  - La tierra fue profanada por sangre.
  - La tierra fue contaminada por sangre culpable.
  rationale: ‘Contaminada con sangre’ sigue de cerca la revisión inglesa y deja abierta la idea de mancha ritual/moral. ‘Profanada’ es posible, pero ‘contaminada’ es más transparente para el lector español.
  doctrine_reference: Traducción fiel y legible; conservar la dimensión de impureza ligada a la violencia.
translation_notes:
  revision_awareness: La redacción sigue de cerca la línea revisada del inglés POB, especialmente el cierre ‘with blood’, pero la expresa en español de manera natural con ‘contaminada con sangre’. También conserva la repetición hebrea de ‘sangre’ y la acusación moral de ‘sangre inocente’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se usa ‘sangre inocente’ para דָם נָקִי, evitando ‘sangre de inocentes’ salvo en nota como alternativa.
  - ‘Ídolos’ se conserva como término preferente para עֲצַבִּים, en línea con el matiz peyorativo del hebreo.
  - ‘Contaminada’ traduce el efecto moral/ritual sobre la tierra sin oscurecer el vínculo con la sangre.
  - La puntuación con inciso reproduce el quiebre retórico del original y del audit trail inglés.
