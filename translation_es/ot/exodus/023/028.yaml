translation:
  language: es
  text: Y enviaré el avispón delante de ti[a], y expulsará al heveo, al cananeo y al hitita de delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente una imagen figurada de pánico, o algún otro medio de presión divina enviado delante de Israel; el hebreo normalmente significa «avispón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁלַחְתִּי
  english_pob_choice: And I will send
  chosen_spanish: Y enviaré
  alternatives_spanish:
  - Y mandaré
  - Y enviaré adelante
  lexicon: HALOT
  rationale: El verbo qal en 1.ª persona singular con valor de promesa futura se expresa naturalmente en español con futuro simple. «Enviaré» conserva la agencia divina y el valor prospectivo sin sobrecargar el texto.
- source_word: הַצִּרְעָה
  english_pob_choice: the hornet
  chosen_spanish: la avispa
  alternatives_spanish:
  - el avispón
  - la avispa grande
  - el enjambre de avispas
  lexicon: HALOT
  rationale: El término hebreo designa ordinariamente un insecto picador tipo avispa/hornet. En español, «avispa» comunica el sentido léxico básico de forma clara y natural; se deja constancia de la posible lectura figurada en una nota.
- source_word: לְפָנֶיךָ
  english_pob_choice: ahead of you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - antes de ti
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión espacial indica avance previo. «Delante de ti» conserva el valor direccional y suena más idiomático en español que una calca más rígida.
- source_word: וְגֵרְשָׁה
  english_pob_choice: and it will drive out
  chosen_spanish: y ella expulsará
  alternatives_spanish:
  - y expulsará
  - y ella echará fuera
  lexicon: HALOT
  rationale: El verbo גרשׁ expresa expulsar/ahuyentar. Se mantiene el sujeto femenino implícito en la forma verbal, concordándolo con «la avispa» para hacer visible la relación gramatical del hebreo.
- source_word: הַחִוִּי
  english_pob_choice: the Hivite
  chosen_spanish: al heveo
  alternatives_spanish:
  - al hivita
  - al heveí
  lexicon: HALOT
  rationale: Se adopta la forma etnónima tradicional usada en español bíblico académico, «heveo», por ser clara y estable. Conserva el carácter de pueblo nombrado sin transliteración innecesaria.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanite
  chosen_spanish: al cananeo
  alternatives_spanish:
  - al canaanita
  lexicon: HALOT
  rationale: «Cananeo» es la forma española asentada para el etnónimo bíblico y mantiene la referencia étnica del original.
- source_word: הַחִתִּי
  english_pob_choice: the Hittite
  chosen_spanish: al hitita
  alternatives_spanish:
  - al heteo
  lexicon: HALOT
  rationale: «Hitita» es la forma española estándar para el pueblo mencionado y evita ambigüedades con transliteraciones menos naturales.
- source_word: מִלְּפָנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - de antes de ti
  lexicon: HALOT
  rationale: La misma imagen espacial de «delante de ti» se reproduce en la cláusula final para mantener la cohesión del hebreo y la simetría retórica del verso.
theological_decisions:
- issue: Si הַצִּרְעָה debe entenderse literalmente o como imagen figurada de presión divina
  english_pob_reading: Rendered literally as 'the hornet' in the main text, with a footnote allowing a figurative image for panic or other divine pressure.
  chosen_spanish_reading: Se traduce literalmente como «la avispa» en el texto principal, con nota que abre la posibilidad de una imagen figurada o un medio providencial de presión divina.
  alternative_spanish_readings:
  - el terror
  - la angustia
  - una plaga enviada por Dios
  rationale: El sentido léxico primario apunta a un insecto. Traducirlo literalmente respeta la primacía del hebreo; la nota preserva la tensión interpretativa sin convertirla en interpretación obligatoria del cuerpo del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con la revisión más reciente: no se requieren cambios sustantivos respecto del sentido de la fuente ni del manejo de la imagen de la avispa; se mantiene la preferencia por una traducción literal en el texto principal y una nota de alternativa léxica.'
  spanish_consistency_notes:
  - Se mantiene «delante de ti» para לְפָנֶיךָ y מִלְּפָנֶיךָ a fin de conservar la repetición idiomática del hebreo.
  - Se usa «avispa» como equivalente principal de הַצִּרְעָה; si en otra sección del proyecto se opta por «hornet», convendrá unificar la equivalencia o justificar la variación por contexto.
  - 'Los etnónimos se normalizan en español bíblico: heveo, cananeo, hitita.'
  - La concordancia femenina («ella») reproduce la referencia gramatical a «la avispa» del hebreo.
