translation:
  language: es
  text: Mira hacia el oriente, Jerusalén, y ve el gozo que viene a ti de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: περίβλεψαι
  english_pob_choice: Look toward
  chosen_spanish: Mira hacia
  alternatives_spanish:
  - Mira hacia el oriente
  - Mira alrededor hacia
  lexicon: LSJ
  rationale: El imperativo pide dirigir la mirada. En español, «mira hacia» conserva la orden sin añadir matices que no están en el griego. La dirección concreta se expresa en la frase siguiente.
- source_word: πρὸς ἀνατολάς
  english_pob_choice: toward the east
  chosen_spanish: el oriente
  alternatives_spanish:
  - el este
  - las regiones del oriente
  lexicon: LSJ
  rationale: ἀνατολαί apunta primariamente a la dirección del oriente. «Oriente» es natural en español bíblico y conserva el valor direccional y poético del original.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: transliteration
  rationale: Nombre propio transliterado de forma estándar en español, conforme al uso bíblico.
- source_word: ἴδε
  english_pob_choice: see
  chosen_spanish: ve
  alternatives_spanish:
  - mira
  - contempla
  lexicon: LSJ
  rationale: El aoristo imperativo de ὁράω puede expresarse de manera natural con «ve» o «mira». «Ve» mantiene brevedad y fuerza exhortativa en español.
- source_word: εὐφροσύνην
  english_pob_choice: the joy
  chosen_spanish: el gozo
  alternatives_spanish:
  - la alegría
  - el regocijo
  lexicon: LSJ
  rationale: εὐφροσύνη denota gozo/alegría. «Gozo» funciona bien en registro bíblico y mantiene el matiz de alegría gozosa sin sonar arcaico.
- source_word: τὴν παρὰ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - que viene de Dios
  lexicon: LSJ
  rationale: La construcción con παρά y genitivo señala procedencia/origen. «De parte de Dios» explicita la procedencia personal y suena natural en español; también preserva que el don viene como envío de Dios.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - a Jerusalén
  lexicon: LSJ
  rationale: El dativo de destinatario se expresa con «a ti». Mantiene la dirección del movimiento hacia Jerusalén personificada.
- source_word: ἐρχομένην
  english_pob_choice: that is coming
  chosen_spanish: que viene
  alternatives_spanish:
  - que está llegando
  - venidero
  lexicon: LSJ
  rationale: El participio presente indica llegada en curso. «Que viene» es natural y suficientemente progresivo en español.
theological_decisions:
- issue: Personificación de Jerusalén
  english_pob_reading: Retain direct address to Jerusalem as a personified city
  chosen_spanish_reading: Conservar el trato directo a Jerusalén como ciudad personificada
  alternative_spanish_readings:
  - Jerusalén, mira...
  - Oh Jerusalén, mira...
  rationale: El griego se dirige a Jerusalén como interlocutora. Mantener el vocativo y los imperativos conserva el tono profético y poético sin diluir la personificación.
  doctrine_reference: Principio de sentido llano del texto profético; preservación de la figura retórica del original.
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantiene básicamente sin cambios: exhortación directa, dirección al oriente y origen divino del gozo. El español sigue esa misma línea sin introducir explicaciones adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece explícitamente el nombre divino; aquí no aparece.
  - Se prefiere «gozo» por su registro bíblico y porque no fuerza un matiz técnico distinto al del griego.
  - La dirección espacial se resuelve con «oriente», coherente con el valor de ἀνατολαί.
  - No se añade nota al pie porque no hay variante textual relevante ni ambigüedad que requiera marcador.
