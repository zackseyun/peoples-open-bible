translation:
  language: es
  text: Y ahora[a], nuestra carne es como la carne de nuestros hermanos, nuestros hijos como sus hijos; y, sin embargo, aquí estamos, sometiendo a nuestros hijos y a nuestras hijas a la esclavitud, y algunas de nuestras hijas ya han sido esclavizadas. Pero no está en nuestro poder ayudar[b], y nuestros campos y nuestras viñas pertenecen a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «somos de la misma carne que nuestros hermanos». El hebreo conserva la imagen concreta de la carne compartida para subrayar humanidad común y parentesco.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no hay para nuestra mano poder». La expresión hebrea comunica impotencia o falta de medios, especialmente porque sus campos y viñas están en poder de otros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּבְשַׂר אַחֵינוּ בְּשָׂרֵנוּ
  english_pob_choice: our flesh is as the flesh of our brothers
  chosen_spanish: nuestra carne es como la carne de nuestros hermanos
  alternatives_spanish:
  - somos de la misma carne que nuestros hermanos
  - nuestro cuerpo es como el cuerpo de nuestros hermanos
  lexicon: HALOT
  rationale: בָּשָׂר significa literalmente 'carne'. En este lamento social y familiar, la imagen concreta comunica humanidad compartida y parentesco. 'Nuestra carne es como la carne de nuestros hermanos' conserva la metáfora sin volverla extraña en español.
- source_word: אַחֵינוּ
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros parientes
  - nuestros correligionarios
  lexicon: HALOT
  rationale: El sustantivo es literalmente 'nuestros hermanos'. Se mantiene la forma masculina de parentesco porque el texto la usa de manera deliberada para la comunidad masculina/familiar, sin neutralizarla.
- source_word: כִּבְנֵיהֶם בָּנֵינוּ
  english_pob_choice: our children as their children
  chosen_spanish: nuestros hijos como sus hijos
  alternatives_spanish:
  - nuestros niños como sus niños
  - nuestros descendientes como sus descendientes
  lexicon: HALOT
  rationale: בנים puede significar 'hijos' o 'niños/descendencia' de modo colectivo. Dado que el versículo luego distingue explícitamente 'hijos' e 'hijas', aquí conviene conservar el contraste familiar con 'hijos'.
- source_word: כֹבְשִׁים
  english_pob_choice: subjecting ... to slavery
  chosen_spanish: sometiendo ... a esclavitud
  alternatives_spanish:
  - subyugando ... a esclavitud
  - forzando ... a esclavitud
  lexicon: HALOT
  rationale: כּבשׁ transmite la idea de someter o poner bajo dominio; en este contexto, unido a 'a esclavitud', la fuerza social es coercitiva. 'Sometiendo ... a esclavitud' refleja el paralelismo verbal del hebreo y suena natural en español.
- source_word: לַעֲבָדִים
  english_pob_choice: to slavery
  chosen_spanish: a esclavitud
  alternatives_spanish:
  - en esclavitud
  - como esclavos
  lexicon: HALOT
  rationale: La frase marca el resultado o estado de ser reducidos a עבדים. 'A esclavitud' conserva el sentido de destino/resultado y mantiene el lenguaje fuerte que el contexto exige.
- source_word: מִבְּנֹתֵינוּ נִכְבָּשׁוֹת
  english_pob_choice: some of our daughters have already been subjected
  chosen_spanish: algunas de nuestras hijas ya han sido sometidas
  alternatives_spanish:
  - algunas de nuestras hijas ya han sido esclavizadas
  - algunas de nuestras hijas ya están sometidas
  lexicon: HALOT
  rationale: El participio nifal indica un estado pasivo ya vigente. 'Han sido sometidas' conserva la pasividad y la idea de haber caído ya bajo dominio; 'esclavizadas' sería más explícito, pero el verbo del versículo ya fue expresado antes con 'esclavitud'.
- source_word: וְאֵין לְאֵל יָדֵנוּ
  english_pob_choice: it is not in our power to help
  chosen_spanish: no está en nuestro poder ayudar
  alternatives_spanish:
  - no tenemos poder para ayudar
  - no hay fuerza en nuestra mano
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente dice que 'no hay para nuestra mano poder'. 'No está en nuestro poder ayudar' reproduce el sentido de incapacidad/impotencia sin introducir una explicación ajena al texto.
- source_word: וּשְׂדֹתֵינוּ וּכְרָמֵינוּ לַאֲחֵרִים
  english_pob_choice: our fields and our vineyards belong to others
  chosen_spanish: nuestros campos y nuestras viñas pertenecen a otros
  alternatives_spanish:
  - nuestros campos y nuestras viñas están en poder de otros
  - nuestros campos y nuestras viñas son de otros
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula sin verbo que presupone posesión/paso a otros. 'Pertenecen a otros' completa la idea en español con fidelidad y sin forzar una interpretación distinta.
theological_decisions:
- issue: Fuerza de la metáfora de carne compartida
  english_pob_reading: Retain 'flesh' language to stress common humanity and kinship
  chosen_spanish_reading: Mantener 'carne' para conservar la imagen de humanidad compartida y parentesco
  alternative_spanish_readings:
  - '''somos de la misma carne'' como paráfrasis explicativa'
  - '''cuerpo'' en lugar de ''carne'''
  rationale: La metáfora no debe disolverse en una generalidad abstracta. 'Carne' preserva la imagen concreta del hebreo y deja visible la tensión retórica del reclamo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Lenguaje de esclavitud en una denuncia social
  english_pob_reading: Use 'slavery/enslaved' rather than softer 'servitude/servants'
  chosen_spanish_reading: Usar 'esclavitud/sometidos' en vez de un suavizado como 'servidumbre/servidores'
  alternative_spanish_readings:
  - '''servidumbre'''
  - '''servicio'''
  rationale: El contexto describe una opresión real y coercitiva. Suavizar el término debilitaría la denuncia y oscurecería la gravedad del pecado social expuesto por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1; Contested terms table on δοῦλος/slave-servant principle
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión POB, que ajustó el registro hacia una formulación más literal y formal: mantengo ''como/as'' para el paralelismo hebreo, conservo el verbo de sometimiento unido a ''esclavitud'', reflejo el participio pasivo con ''han sido sometidas'' y traduzco la idiomática ''no está en nuestro poder ayudar'' en línea con el audit trail final.'
  spanish_consistency_notes:
  - He mantenido 'Yahvé' fuera del versículo porque aquí no aparece el nombre divino ni un equivalente directo.
  - He preservado 'carne', 'hermanos', 'hijos' e 'hijas' para respetar el campo semántico y el contraste del hebreo.
  - '''Esclavitud'' se usa de manera fuerte y no se suaviza a ''servidumbre''.'
  - Las notas al pie están ancladas únicamente donde el español introduce una alternativa o una aclaración necesaria.
