base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/001/011.yaml
  text: Please[a], Lord, let your ear be attentive to the prayer of your servant and to the prayer of your servants who delight to fear your name, and please grant success to your servant today and give him compassion before this man[c][b]. Now I was cupbearer to the king.
  footnotes:
  - marker: a
    text: Or 'who desire to revere your name' or 'who delight to stand in awe of your name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'grant him favor before this man.' The Hebrew idiom literally speaks of being given 'for compassion/mercies.'
    reason: lexical_alternative
  - marker: c
    text: '''This man'' refers to the king, whom Nehemiah identifies in the next clause as the one he served as cupbearer.'
    reason: cross_reference
