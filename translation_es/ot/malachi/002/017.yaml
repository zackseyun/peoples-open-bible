translation:
  language: es
  text: 'Han cansado a Yahvé con sus palabras. Pero ustedes dicen: «¿Cómo[a] lo hemos cansado?». Al decir: «Todo el que hace el mal es bueno a los ojos de Yahvé, y se complace en ellos»; o: «¿Dónde está el Dios de la justicia?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿De qué manera lo hemos cansado?»
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹגַעְתֶּם / הוֹגָעְנוּ
  english_pob_choice: have wearied / have we wearied
  chosen_spanish: habéis cansado / lo hemos cansado
  alternatives_spanish:
  - habéis fatigado / lo hemos fatigado
  - habéis agotado / lo hemos agotado
  lexicon: HALOT
  rationale: El hebreo expresa causar cansancio o agotamiento. En español, «cansar» comunica de forma natural esa fuerza sin suavizarla; en la pregunta citada, el pronombre «lo» retoma a Yahvé y preserva la referencia implícita del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino en lugar de sustituirlo por un título.
- source_word: בְּדִבְרֵיכֶם
  english_pob_choice: with your words
  chosen_spanish: con vuestras palabras
  alternatives_spanish:
  - por vuestras palabras
  - con lo que decís
  lexicon: HALOT
  rationale: La preposición ב expresa medio o instrumento. En español, «con vuestras palabras» es idiomático y mantiene la idea de que el medio del cansancio fue su habla.
- source_word: בַּמָּה
  english_pob_choice: How
  chosen_spanish: ¿Cómo?
  alternatives_spanish:
  - ¿De qué manera?
  - ¿En qué sentido?
  lexicon: HALOT
  rationale: En la réplica desafiante, el sentido es interrogativo directo sobre el modo. «¿Cómo?» reproduce bien la brevedad y la carga polémica.
- source_word: בֶּאֱמָרְכֶם
  english_pob_choice: By saying
  chosen_spanish: al decir
  alternatives_spanish:
  - cuando dicen
  - por decir
  lexicon: HALOT
  rationale: El infinitivo con preposición introduce la explicación de la acusación. «Al decir» mantiene la relación causal/instrumental de manera natural en español.
- source_word: כָּל עֹשֵׂה רָע
  english_pob_choice: Everyone who does evil
  chosen_spanish: Todo el que hace el mal
  alternatives_spanish:
  - Todo malhechor
  - Toda persona que hace el mal
  lexicon: HALOT
  rationale: La construcción distributiva se expresa con claridad mediante «Todo el que…». «El mal» mantiene la generalidad del hebreo sin añadir una categoría moral ajena.
- source_word: טוֹב
  english_pob_choice: is good
  chosen_spanish: es bueno
  alternatives_spanish:
  - es bueno/está bien
  - es correcto
  lexicon: HALOT
  rationale: El adjetivo simple se traduce con la misma sencillez. «Es bueno» conserva el tono irónico de la acusación.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - a juicio de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa un modismo de evaluación. «A los ojos de» preserva la imagen original y es comprensible en español.
- source_word: וּבָהֶם הוּא חָפֵץ
  english_pob_choice: and he delights in them
  chosen_spanish: y en ellos él se complace
  alternatives_spanish:
  - y se deleita en ellos
  - y los favorece
  lexicon: HALOT
  rationale: חפץ expresa deleite o complacencia. «Se complace» conserva el matiz de aprobación sin exagerar el lenguaje.
- source_word: אֱלֹהֵי הַמִּשְׁפָּט
  english_pob_choice: the God of justice
  chosen_spanish: el Dios de la justicia
  alternatives_spanish:
  - el Dios del juicio
  - el Dios de la rectitud
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar juicio o justicia. En este contexto, «justicia» comunica mejor la queja sobre el orden moral y la aparente ausencia de intervención justa de Dios.
theological_decisions:
- issue: Lenguaje antropopático de cansar a Yahvé
  english_pob_reading: Retained the personal, anthropopathic wording 'You have wearied the LORD'
  chosen_spanish_reading: «Habéis cansado a Yahvé con vuestras palabras»
  alternative_spanish_readings:
  - «Habéis ofendido a Yahvé con vuestras palabras»
  - «Habéis pesado sobre Yahvé con vuestras palabras»
  rationale: El hebreo habla de causar cansancio; no conviene neutralizar la imagen. El español conserva la fuerza profética y la tensión antropopática sin intentar explicarla.
  doctrine_reference: Translation philosophy §3
- issue: Sentido de מִשְׁפָּט en la pregunta final
  english_pob_reading: justice
  chosen_spanish_reading: «el Dios de la justicia»
  alternative_spanish_readings:
  - «el Dios del juicio»
  - «el Dios de la sentencia»
  rationale: La queja no apunta solo a una sentencia judicial, sino a la percepción de que Dios no actúa con justicia. «Justicia» reproduce mejor esa preocupación teológica en español.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura final inglesa sin cambios de revisión relevantes; no hay revisiones aplicadas en el pasaje fuente y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al criterio del proyecto.
  - Se conserva la imagen idiomática «a los ojos de Yahvé» para בְּעֵינֵי.
  - «El Dios de la justicia» refleja el valor contextual de מִשְׁפָּט sin reemplazarlo por una formulación teológica más tradicional.
  - La cita interna se punctúa con comillas españolas y punto y coma para separar la secuencia argumentativa.
