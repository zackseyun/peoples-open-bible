translation:
  language: es
  text: 'Y les dijo[a]: «Síganme, porque Yahvé ha entregado a sus enemigos, a Moab[b], en manos de ustedes.» Entonces bajaron tras él y capturaron los vados del Jordán hacia Moab[c], y no dejaron pasar a nadie.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Persíganme».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «ha entregado a sus enemigos, Moab, en manos de ustedes»; «Moab» funciona en aposición con «sus enemigos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los lugares de paso del Jordán hacia Moab».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רִדְפוּ אַחֲרַי
  english_pob_choice: Follow after me
  chosen_spanish: Síganme
  alternatives_spanish:
  - Sigan tras de mí
  - Persigan tras de mí
  lexicon: HALOT
  rationale: El hebreo puede expresar tanto seguir como perseguir. En español, «síganme» comunica la dirección inmediata del movimiento y mantiene el impulso militar del contexto sin sonar forzado; «tras de mí» conserva mejor la imagen de persecución, pero resulta menos natural en el registro de la línea.
- source_word: נָתַן ... בְּיֶדְכֶם
  english_pob_choice: has given ... into your hand
  chosen_spanish: ha entregado en manos de ustedes
  alternatives_spanish:
  - ha dado en manos de ustedes
  - ha puesto en poder de ustedes
  lexicon: HALOT
  rationale: La expresión hebrea idiomática de entrega en poder de alguien se conserva con «ha entregado en manos de ustedes». Mantiene la imaginería bíblica de la «mano» y la certeza de una acción ya concedida por Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión del POB inglés de representar el nombre propio divino con transliteración, no con sustitución titular. «Yahvé» preserva el Tetragrámaton como nombre personal revelado, de acuerdo con la política terminológica del proyecto.
- source_word: אֹיְבֵיכֶם אֶת מוֹאָב
  english_pob_choice: your enemies, the Moabites
  chosen_spanish: a sus enemigos, a Moab
  alternatives_spanish:
  - a sus enemigos, a los moabitas
  - a Moab, sus enemigos
  lexicon: HALOT
  rationale: El hebreo presenta «vuestros enemigos» y luego nombra a Moab en aposición. En español, «a sus enemigos, a Moab» conserva la secuencia y evita añadir la etnónima interpretativa «moabitas». El nombre nacional se mantiene como colectivo, como en el audit trail inglés anterior y su revisión.
- source_word: וַיֵּרְדוּ אַחֲרָיו
  english_pob_choice: they went down after him
  chosen_spanish: bajaron tras él
  alternatives_spanish:
  - descendieron tras él
  - fueron tras él
  lexicon: HALOT
  rationale: «Bajaron» conserva el valor espacial de ירד en un contexto de descenso geográfico hacia el valle del Jordán. «Tras él» mantiene la idea de seguimiento sin volverla demasiado genérica.
- source_word: מַעְבְּרוֹת הַיַּרְדֵּן
  english_pob_choice: the fords of the Jordan
  chosen_spanish: los vados del Jordán
  alternatives_spanish:
  - los lugares de paso del Jordán
  - las pasaderas del Jordán
  lexicon: HALOT
  rationale: «Vados» es el equivalente español más natural y preciso para los puntos de cruce del río en contexto militar-geográfico. Conserva la especificidad de lugares transitables por agua poco profunda.
- source_word: לְמוֹאָב
  english_pob_choice: against Moab / leading to Moab
  chosen_spanish: hacia Moab
  alternatives_spanish:
  - contra Moab
  - para Moab
  lexicon: HALOT
  rationale: La preposición lamed aquí puede marcar dirección o relación con el territorio de Moab. «Hacia Moab» evita forzar una lectura adversativa exclusiva y conserva la ambigüedad funcional del hebreo, mientras que la nota textual explica la alternativa posible.
- source_word: וְלֹא נָתְנוּ אִישׁ לַעֲבֹר
  english_pob_choice: they did not allow anyone to cross over
  chosen_spanish: no dejaron pasar a nadie
  alternatives_spanish:
  - no permitieron que nadie pasara
  - no dieron a nadie paso
  lexicon: HALOT
  rationale: El hebreo literalmente dice que «no dieron a un hombre para pasar», un idiomático de impedir el cruce. «No dejaron pasar a nadie» reproduce con naturalidad la totalidad de la prohibición y el sentido distributivo de אִישׁ.
theological_decisions:
- issue: Uso del nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino en transliteración, siguiendo la línea doctrinal del POB y evitando la sustitución por un título. Esto preserva el valor covenantal del Tetragrámaton en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identificación de Moab como objeto colectivo/en aposición
  english_pob_reading: your enemies, the Moabites
  chosen_spanish_reading: a sus enemigos, a Moab
  alternative_spanish_readings:
  - a sus enemigos, a los moabitas
  rationale: El hebreo nombra a Moab como entidad nacional en aposición con «sus enemigos». La traducción española conserva esa estructura sin añadir un gentilicio que suavice el sustantivo propio.
  doctrine_reference: English audit trail revision_pass on Moab / collective-national sense
translation_notes:
  revision_awareness: 'La redacción española sigue el estado más reciente del audit trail inglés: (1) el nombre divino se mantiene como Yahvé; (2) Moab se conserva como nombre colectivo en aposición con «sus enemigos», en vez de expandirse a «moabitas»; (3) la frase de los vados se vierte con una dirección neutra («hacia Moab») para no fijar una relación adversativa donde el hebreo permite cierta elasticidad. Se ha procurado reflejar el hebreo directamente, no traducir mecánicamente desde el inglés.'
  spanish_consistency_notes:
  - Se conserva la transliteración «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se prefiere «vados» para מַעְבְּרוֹת, por precisión geográfica y naturalidad en español.
  - «No dejaron pasar a nadie» reproduce el valor idiomático de la negación total en וְלֹא נָתְנוּ אִישׁ לַעֲבֹר.
  - Las notas distinguen entre una alternativa lexical («Persíganme») y una variante de lectura del sintagma de Moab, sin sobreexplicar el texto.
