    text: «El río» no se identifica en el griego; en este contexto histórico probablemente se refiere al Éufrates.
    reason: cultural_note
  - marker: b
    text: O «para una alianza» / «en alianza». La frase griega εἰς συμμαχίαν indica que las fuerzas de Siria se reunieron en apoyo de Jonatán.
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota [b] para que ancle la frase de alianza que realmente explica, y se ajusta ‘lo recibieron’ a ‘salieron a recibirlo’ para reflejar mejor ἀπήντησαν αὐτῷ y mejorar la precisión narrativa en español sin apartarse del sentido del inglés auditado ni del griego.
