translation:
  language: es
  text: Y apartarán hombres de continuo[a], que pasarán por la tierra enterrando a los que pasan por ella[b], es decir, a los que quedaron sobre la superficie de la tierra, para limpiarla. Al cabo de siete meses harán una búsqueda[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombres regularmente designados»; el hebreo dice literalmente «hombres de continuidad», indicando una asignación continua.
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite el verbo «pasar» («enterrando a los que pasan por ella»). En contexto probablemente alude a los muertos dejados en el terreno, pero la formulación es difícil y puede ecoar intencionalmente a los que recorren la tierra.
    reason: lexical_alternative
  - marker: c
    text: O «harán una búsqueda minuciosa» o «investigarán».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי תָמִיד
  english_pob_choice: men continually
  chosen_spanish: hombres de continuo[a]
  alternatives_spanish:
  - hombres regularmente
  - hombres permanentemente
  - hombres de continuo
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice “hombres de continuidad/permanencia”; en español, “de continuo” comunica mejor el valor adverbial de תָמִיד como asignación continua. Se conserva la idea de una designación permanente sin volverla una paráfrasis administrativa excesiva.
- source_word: יַבְדִּילוּ
  english_pob_choice: they will set apart
  chosen_spanish: apartarán
  alternatives_spanish:
  - separarán
  - designarán
  - apartarán
  lexicon: HALOT
  rationale: El hiphil de בדל expresa separar o apartar. “Apartarán” mantiene el matiz formal de designación para una tarea, que en este contexto incluye la idea de nombrarlos para ese servicio.
- source_word: עֹבְרִים בָּאָרֶץ
  english_pob_choice: who will pass through the land
  chosen_spanish: que pasarán por la tierra
  alternatives_spanish:
  - que recorrerán la tierra
  - que irán por la tierra
  - que pasarán por el país
  lexicon: HALOT
  rationale: El participio de עבר indica movimiento a través del territorio. “Pasarán por la tierra” conserva la imagen de recorrer el país/territorio sin añadir información ajena al hebreo.
- source_word: מְקַבְּרִים
  english_pob_choice: burying
  chosen_spanish: enterrando
  alternatives_spanish:
  - sepultando
  - y enterrando
  - para enterrar
  lexicon: HALOT
  rationale: El participio expresa la acción concomitante de sepultar. “Enterrando” es natural en español y mantiene el valor verbal continuo del hebreo.
- source_word: הָעֹבְרִים
  english_pob_choice: those who passed through
  chosen_spanish: a los que pasan[b]
  alternatives_spanish:
  - a los que pasaron
  - a los transeúntes
  - a los que pasan por allí
  lexicon: HALOT
  rationale: Se preserva la repetición del verbo עבר con una forma verbal paralela al hebreo. Aunque el contexto apunta a cadáveres dejados en el terreno, la ambigüedad se mantiene en el texto principal y se aclara en nota, sin borrar la tensión léxica.
- source_word: הַנּוֹתָרִים עַל־פְּנֵי הָאָרֶץ
  english_pob_choice: those left on the surface of the land
  chosen_spanish: a los que quedaron sobre la superficie de la tierra
  alternatives_spanish:
  - a los que quedaron sobre la faz de la tierra
  - a los que permanecieron sobre el suelo
  - a los que quedaron en la superficie del país
  lexicon: HALOT
  rationale: נותרים significa “los que quedaron/restaron”. “Sobre la superficie de la tierra” reproduce la imagen de cuerpos expuestos en el suelo y evita sustituir “tierra” por una generalización doctrinal o cosmológica.
- source_word: לְטַהֲרָהּ
  english_pob_choice: to cleanse it
  chosen_spanish: para limpiarla
  alternatives_spanish:
  - para purificarla
  - para limpiarla ritualmente
  - para purificar el país
  lexicon: HALOT
  rationale: טהר aquí implica una limpieza con peso ritual y práctico por la contaminación de cadáveres. “Limpiarla” conserva ambas dimensiones sin reducir el verbo a una purificación exclusivamente ceremonial.
- source_word: מִקְצֵה שִׁבְעָה חֳדָשִׁים
  english_pob_choice: At the end of seven months
  chosen_spanish: Al cabo de siete meses
  alternatives_spanish:
  - Al final de siete meses
  - Después de siete meses
  - Al terminar siete meses
  lexicon: HALOT
  rationale: La frase marca el punto temporal al que comienza la acción siguiente. “Al cabo de siete meses” es idiomático en español y mantiene el valor de límite temporal.
- source_word: יַחְקֹרוּ
  english_pob_choice: they will make a search
  chosen_spanish: harán una búsqueda[c]
  alternatives_spanish:
  - buscarán
  - investigarán
  - harán una inspección
  lexicon: HALOT
  rationale: חקר denota buscar/indagar con diligencia. “Harán una búsqueda” conserva el carácter organizado y deliberado de la acción mejor que un simple “buscarán” en este contexto.
theological_decisions:
- issue: Naturaleza de la limpieza de la tierra
  english_pob_reading: Render in a way that preserves both ritual and practical cleansing without narrowing to a purely ceremonial or purely sanitary sense.
  chosen_spanish_reading: Limpiarla, sin especificar si la limpieza es solo ritual o solo material.
  alternative_spanish_readings:
  - purificarla
  - limpiarla ritualmente
  - hacerla limpia
  rationale: El enterramiento de cadáveres expuestos en Ezequiel tiene implicaciones de contaminación, pero el texto no obliga a escoger entre una lectura solo ceremonial o solo higiénica. “Limpiarla” deja intacta esa tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó el tiempo verbal de “passed through” a “pass through” para reflejar mejor el participio hebreo y suavizó la puntuación sin alterar la estructura aposicional. La versión española refleja ese mismo equilibrio: conserva la repetición verbal, mantiene la relación entre los participios y usa puntuación clara y formal.'
  spanish_consistency_notes:
  - Se usó “tierra” como equivalente formal de הָאָרֶץ, en lugar de “mundo” o “tierra” en sentido cosmológico, porque el contexto es territorial.
  - Se evitó “SEÑOR” y cualquier sustitución devocional, ya que el versículo no contiene el nombre divino ni un título que lo requiera.
  - Se mantuvo la repetición de “pasar” para no borrar el juego léxico del hebreo.
  - “Limpiarla” se eligió para no forzar la lectura hacia una purificación exclusivamente cultual.
  - La puntuación sigue la relación de participios y el cierre temporal del versículo, con una cadencia publicable en español bíblico moderno.
