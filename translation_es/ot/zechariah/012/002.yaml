revisions:
- from: He aquí[a], yo estoy por poner a Jerusalén una copa de aturdimiento[b] para todos los pueblos en derredor; y también contra Judá habrá sitio contra Jerusalén.
  to: He aquí[a], yo estoy a punto de hacer de Jerusalén una copa de aturdimiento[b] para todos los pueblos de alrededor; y esto también será contra Judá en el asedio contra Jerusalén[c].
  rationale: La revisión mantiene las decisiones léxicas principales de la POB inglesa, pero corrige la segunda cláusula para reflejar mejor la dificultad sintáctica del hebreo sin resolverla en exceso. También mejora la naturalidad del español con «estoy a punto de hacer de Jerusalén» y «en el asedio»; además, se añade la nota alternativa que la auditoría inglesa conservó para la cláusula difícil.
  reviewer_model: gpt-5.4
