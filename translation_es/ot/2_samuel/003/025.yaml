base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/003/025.yaml
  text: You know Abner son of Ner[a], that he came to deceive you, and to learn your going out and your coming in[b], and to learn all that you are doing.
  footnotes:
  - marker: a
    text: Or 'to entice you' / 'to persuade you.' The Hebrew verb can denote seducing, enticing, or deceiving; here the hostile context favors 'deceive you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your going out and your coming in,' an idiom for the whole range of your movements or activities.
    reason: cultural_note
