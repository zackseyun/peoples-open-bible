translation:
  language: es
  text: Igualmente, el rey también, al celebrar un banquete espléndido por estos sucesos[a], daba continuamente grandes gracias al cielo por la asombrosa liberación que habían experimentado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un banquete suntuoso»; el griego dice literalmente «un banquete pesado», una expresión idiomática para una comida festiva abundante o imponente.
    reason: lexical_alternative
  - marker: b
    text: O «la asombrosa salvación que había tenido lugar para ellos». Aquí «liberación» refleja el sentido inmediato de rescate en la narración.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσαύτως
  english_pob_choice: Likewise
  chosen_spanish: Asimismo, también
  alternatives_spanish:
  - De igual manera
  - Igualmente
  lexicon: LSJ
  rationale: Expresa la relación paralela con lo anterior de manera natural en español. La duplicación «asimismo, también» refleja el énfasis acumulativo del griego sin sonar pesada.
- source_word: συμπόσιον βαρὺ
  english_pob_choice: a splendid banquet
  chosen_spanish: un banquete espléndido
  alternatives_spanish:
  - un gran banquete
  - un banquete suntuoso
  - un banquete abundante
  lexicon: LSJ
  rationale: συμπόσιον es «banquete»; βαρύς aquí funciona idiomáticamente como algo grande, abundante o imponente, no como peso físico. «Espléndido» comunica bien el carácter festivo y elevado del contexto, en línea con la revisión inglesa.
- source_word: περὶ τούτων
  english_pob_choice: because of these things
  chosen_spanish: a causa de estas cosas
  alternatives_spanish:
  - por estas cosas
  - a propósito de estas cosas
  - a raíz de esto
  lexicon: LSJ
  rationale: En el contexto narrativo, la frase señala ocasión o motivo del banquete. «A causa de estas cosas» preserva esa relación causal mejor que una mera referencia temática.
- source_word: ἀδιαλείπτως
  english_pob_choice: continually
  chosen_spanish: no cesaba de
  alternatives_spanish:
  - continuamente
  - sin cesar
  - incesantemente
  lexicon: LSJ
  rationale: La perífrasis verbal suena natural en español y conserva la idea de acción repetida e ininterrumpida.
- source_word: εἰς οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - hacia el cielo
  - al cielo de los cielos
  - a los cielos
  lexicon: LSJ
  rationale: Se mantiene el referente literal «cielo» sin introducir explícitamente «Dios», que el griego no nombra en esta frase. En español, «dar gracias al cielo» conserva el matiz reverente y la restricción del original.
- source_word: ἀνθωμολογεῖτο
  english_pob_choice: was continually offering great thanksgiving
  chosen_spanish: dar grandes gracias
  alternatives_spanish:
  - ofrecer grandes acciones de gracias
  - dar gracias con grandeza
  - hacer grandes acciones de gracias
  lexicon: LSJ
  rationale: El verbo en contexto expresa agradecimiento solemne y reiterado, no confesión de pecado. «Dar grandes gracias» conserva el tono cultual y la intensidad del imperfecto de manera idiomática.
- source_word: μεγαλομερῶς
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - grandiosas
  - en gran manera
  - magníficas
  lexicon: LSJ
  rationale: El adverbio intensifica la acción de agradecer. «Grandes» transmite la magnitud de la gratitud con un español claro y formal, coherente con la revisión inglesa.
- source_word: παραδόξῳ
  english_pob_choice: astonishing
  chosen_spanish: asombrosa
  alternatives_spanish:
  - extraordinaria
  - maravillosa
  - inesperada
  lexicon: LSJ
  rationale: La palabra indica algo sorprendente o fuera de lo esperado; «asombrosa» refleja bien ese valor sin sobrecargar el matiz.
- source_word: γενηθείσῃ αὐτῶν σωτηρίᾳ
  english_pob_choice: their astonishing deliverance that had taken place
  chosen_spanish: la salvación ... que les había acontecido
  alternatives_spanish:
  - la liberación ... que se había producido para ellos
  - la salvación ... que había ocurrido
  - la liberación asombrosa que se había dado
  lexicon: LSJ
  rationale: σωτηρία puede ser «salvación» o «liberación/deliverance». En este contexto narrativo de rescate concreto, «salvación» mantiene el término fuerte del original y «les había acontecido» preserva el hecho ya consumado indicado por el participio.
theological_decisions:
- issue: σωτηρία en un contexto narrativo de rescate
  english_pob_reading: deliverance
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescate
  rationale: Aunque el contexto inmediato es un rescate histórico, el griego usa σωτηρία, término amplio que puede abarcar salvación y liberación. Se optó por «salvación» para no rebajar innecesariamente el alcance semántico; el contexto narrativo sigue guiando la comprensión sin forzar una lectura doctrinal adicional.
  doctrine_reference: Principio de primacía del texto fuente y preservación del rango semántico cuando el término lo permite.
- issue: εἰς οὐρανόν como metonimia reverente
  english_pob_reading: to heaven
  chosen_spanish_reading: al cielo
  alternative_spanish_readings:
  - a Dios
  - hacia el cielo
  rationale: El griego dice literalmente «al cielo» y no nombra explícitamente a Dios. Mantener «al cielo» conserva la restricción del original; la frase puede funcionar reverentemente sin convertirla en una explicitación teológica que el texto no hace.
  doctrine_reference: No introducir sujetos teológicos explícitos donde el texto usa una metonimia o referencia indirecta.
translation_notes:
  revision_awareness: 'La redacción española sigue la lectura revisada del inglés POB: βαρύ se entiende como un banquete espléndido/suntuoso y μεγαλομερῶς como una gratitud grande o intensa, no como una calificación de peso físico. Se preserva además la cautela del original en εἰς οὐρανόν, sin explicitar «Dios».'
  spanish_consistency_notes:
  - Se mantiene «cielo» para εἰς οὐρανόν en coherencia con la terminología de POB cuando el griego no nombra a Dios explícitamente.
  - «Salvación» se conserva como término amplio para σωτηρία, aunque el contexto narrativo apunta a liberación concreta.
  - El adverbio de continuidad se vierte con una perífrasis natural («no cesaba de») para evitar un calco duro.
  - Se usa un registro digno y publicable, evitando arcaísmos innecesarios y manteniendo la intensidad retórica del pasaje.
