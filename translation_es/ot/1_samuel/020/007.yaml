translation:
  language: es
  text: 'Si él dice: «Bien», le irá bien a tu siervo; pero si se enfurece mucho, sabe que el mal[a] ha sido determinado por él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mal está plenamente determinado de parte de él»; es decir, Saúl ha resuelto firmemente hacer daño.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Good
  chosen_spanish: Bien
  alternatives_spanish:
  - Bueno
  - Está bien
  lexicon: HALOT
  rationale: En este intercambio directo, טוֹב funciona como respuesta aprobatoria breve. En español, «Bien» conserva ese valor elíptico y natural en diálogo, sin forzar una paráfrasis.
- source_word: שָׁלוֹם
  english_pob_choice: it will be well with your servant
  chosen_spanish: le irá bien a tu siervo
  alternatives_spanish:
  - habrá paz para tu siervo
  - estará en paz tu siervo
  lexicon: HALOT
  rationale: שָׁלוֹם aquí expresa bienestar/seguridad para el siervo, no solo ausencia de conflicto. «Le irá bien» reproduce ese sentido de estado favorable de manera idiomática en español.
- source_word: לְעַבְדֶּךָ
  english_pob_choice: for your servant
  chosen_spanish: a tu siervo
  alternatives_spanish:
  - para tu siervo
  - para tu esclavo
  - para mí, tu siervo
  lexicon: HALOT
  rationale: Jonathan habla de sí mismo en tercera persona con deferencia. «Siervo» mantiene el tono cortesano que el POB inglés también preserva; «esclavo» sería demasiado fuerte en este contexto.
- source_word: חָרֹה יֶחֱרֶה לוֹ
  english_pob_choice: he becomes very angry
  chosen_spanish: se enciende mucho en ira
  alternatives_spanish:
  - se enfurece mucho
  - arde mucho de ira
  - queda muy enojado
  lexicon: HALOT
  rationale: La construcción enfática del hebreo expresa un encenderse intenso de la ira. «Se enciende mucho en ira» conserva la fuerza figurada del original sin perder claridad española.
- source_word: דַּע
  english_pob_choice: know
  chosen_spanish: sabe
  alternatives_spanish:
  - sabrás
  - ten por seguro
  lexicon: HALOT
  rationale: El imperativo invita a David a sacar una conclusión práctica. «Sabe» es directo y formal en español, acorde con el valor exhortativo del hebreo.
- source_word: כָלְתָה
  english_pob_choice: has been determined
  chosen_spanish: ha sido resuelta
  alternatives_spanish:
  - ha sido determinada
  - está decidida
  - se ha consumado
  lexicon: HALOT
  rationale: El verbo en este contexto apunta a una intención ya fijada o concluida respecto al mal. «Ha sido resuelta» mantiene la idea de resolución firme sin introducir una formulación más interpretativa que el texto no exige.
- source_word: הָרָעָה
  english_pob_choice: evil
  chosen_spanish: la calamidad
  alternatives_spanish:
  - el mal
  - la desgracia
  - el daño
  lexicon: HALOT
  rationale: En este contexto la referencia es al daño que Saul planea causar. «Calamidad» comunica el efecto amenazante en español y evita una abstracción moral que podría sonar menos natural en la frase final.
- source_word: מֵעִמּוֹ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - de él
  - desde él
  - a causa de él
  lexicon: HALOT
  rationale: La preposición indica origen o procedencia del mal resuelto, es decir, Saul como fuente del plan. «Por él» conserva la referencia de agente/origen en una construcción pasiva natural en español.
theological_decisions:
- issue: Valor de שָׁלוֹם en la respuesta de Jonathan
  english_pob_reading: it will be well with your servant
  chosen_spanish_reading: le irá bien a tu siervo
  alternative_spanish_readings:
  - habrá paz para tu siervo
  - estará en paz tu siervo
  rationale: La respuesta no solo contrasta con conflicto, sino que evalúa la seguridad futura de Jonathan. El español elegido comunica bienestar concreto sin reducir shalom a un simple saludo o a paz interior.
  doctrine_reference: Lexical semantics of שָׁלוֹם; narrative context of 1 Samuel 20
- issue: Sentido de הָרָעָה como plan dañino de Saúl
  english_pob_reading: evil has been determined by him
  chosen_spanish_reading: la calamidad ha sido resuelta por él
  alternative_spanish_readings:
  - el mal ha sido determinado por él
  - el daño ha sido decidido por él
  rationale: El texto habla de una intención firme de hacer daño. «Calamidad» evita endurecer innecesariamente el registro con una abstracción moral, pero mantiene el carácter grave y perjudicial del plan de Saúl.
  doctrine_reference: Contextual semantics of רע in narrative Hebrew; agency and intent
- issue: Reconocimiento del origen/agencia con מֵעִמּוֹ
  english_pob_reading: by him
  chosen_spanish_reading: por él
  alternative_spanish_readings:
  - de él
  - a causa de él
  rationale: El hebreo señala que el mal procede de la esfera de Saúl. «Por él» funciona como agente/origen en español y preserva la estructura de inferencia de Jonathan.
  doctrine_reference: Hebrew preposition מִן / מֵעִם in source context
translation_notes:
  revision_awareness: This draft follows the latest English revision that preferred the idiomatic well-being sense of שָׁלוֹם (“it will be well”) over a more literal ‘there will be peace.’ I reflected that decision in Spanish with an idiomatic welfare expression. The English footnote on the alternative reading of ‘evil is fully determined from him’ was treated as an auditable lexical alternative, but the Spanish line was kept uncluttered because the main rendering already conveys the determined, harmful intention in context.
  spanish_consistency_notes:
  - Mantengo «siervo» como término de deferencia, coherente con la elección inglesa y con el registro narrativo.
  - Evité «SEÑOR» u otras sustituciones teológicas porque este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Conservo una sintaxis clara y bíblica sin arcaísmos innecesarios, priorizando inteligibilidad pública.
  - La frase final busca reflejar intención dañina resuelta, no solo un mal abstracto.
