translation:
  language: es
  text: Entonces ustedes y todos los que habitan en todo el territorio de Israel[a], siguiendo tras ellos[b], abátanlos por sus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «todo el límite/territorio de Israel»; aquí se vierte de modo idiomático como «todo el territorio de Israel».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «persiguiéndolos»; el participio griego puede llevar el sentido de ir detrás en persecución.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπακολουθήσαντες
  english_pob_choice: following after them
  chosen_spanish: siguiendo tras ellos
  alternatives_spanish:
  - persiguiéndolos
  - siguiéndolos de cerca
  lexicon: BDAG
  rationale: El participio aoristo expresa acción concomitante o previa al mandato principal. «Siguiendo tras ellos» conserva la idea de ir detrás de manera secuencial sin fijar demasiado el matiz militar, aunque el contexto lo sugiere.
- source_word: κατοικοῦντες
  english_pob_choice: who live
  chosen_spanish: los que habitan
  alternatives_spanish:
  - los que viven
  - los que moran
  lexicon: BDAG
  rationale: El participio presente describe a los residentes del territorio. «Habitan» es natural en español bíblico contemporáneo y mantiene la idea de residencia estable.
- source_word: πᾶν ὅριον Ἰσραήλ
  english_pob_choice: the whole territory of Israel
  chosen_spanish: todo el territorio de Israel
  alternatives_spanish:
  - toda la frontera de Israel
  - toda la región de Israel
  lexicon: LEH
  rationale: ὅριον puede significar frontera, límite, región o territorio. Aquí, con κατοικοῦντες, el sentido apunta al ámbito habitado de Israel; por eso «territorio» expresa mejor la idea que una frontera literal.
- source_word: καταστρώσατε
  english_pob_choice: strike them down
  chosen_spanish: derríbenlos
  alternatives_spanish:
  - tírenselos abajo
  - mátenlos
  lexicon: LEH
  rationale: El imperativo es militar y fuerte. «Derríbenlos» reproduce la idea de abatir/derribar sin añadir una especificación más dura o más interpretativa que el griego exija.
- source_word: ἐν ταῖς ὁδοῖς αὐτῶν
  english_pob_choice: on their roads
  chosen_spanish: en sus caminos
  alternatives_spanish:
  - en sus caminos
  - sobre sus rutas
  lexicon: BDAG
  rationale: La expresión es literalmente «en sus caminos/veías». «Caminos» resulta más idiomático en español que «carreteras» o «rutas» y conserva la imagen concreta de la travesía.
translation_notes:
  revision_awareness: 'Se siguió la reordenación del audit trail inglés para una sintaxis española más natural: sujeto («ustedes y todos los que habitan...»), luego el participio circunstancial («siguiendo tras ellos») y finalmente el mandato fuerte («derríbenlos en sus caminos»).'
  spanish_consistency_notes:
  - Se mantuvo «Israel» sin artículo porque el griego usa el genitivo con ὅριον y el contexto no pide una perífrasis adicional.
  - Se evitó «SEÑOR» o terminología no presente porque este versículo no contiene el nombre divino ni cristología explícita.
  - «Derríbenlos» preserva la fuerza bélica del imperativo sin suavizarlo a un mero «vencerlos».
