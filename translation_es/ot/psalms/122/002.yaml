    rationale: El hebreo בִּשְׁעָרַיִךְ, y el rastro POB 'within your gates', apuntan a presencia dentro del ámbito de las puertas. En español bíblico legible, 'dentro de tus puertas' transmite mejor esa ubicación sin paráfrasis excesiva.
