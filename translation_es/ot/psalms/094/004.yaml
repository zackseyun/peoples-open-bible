  rationale: Se corrigió el anclaje de la nota al primer verbo, se reemplazó 'se enaltecen' por 'se jactan' para reflejar mejor el sentido de autoexaltación verbal de יִתְאַמְּרוּ, y se ajustó 'los que hacen iniquidad' a 'los que obran iniquidad' para acercarse más a la construcción hebrea y al tono poético. Se mantuvo 'Brotan' como equivalente principal de יַבִּיעוּ, dejando la alternativa más literal en nota.
