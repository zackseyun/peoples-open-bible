translation:
  language: es
  text: 'Jesús dijo: «El que ha llegado a conocer el mundo ha hallado un cadáver[a]; y el que ha hallado el cadáver[c][b], el mundo no es digno de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El primer miembro usa el artículo indefinido («un cadáver»), mientras que el segundo usa el definido («el cadáver»), probablemente retomando el mismo hallazgo. Algunas versiones españolas los nivelan; aquí se conserva la distinción del copto.
    reason: dialect_note
  - marker: b
    text: «Ha llegado a conocer» intenta reflejar el matiz perfectivo de ⲥⲟⲟⲩⲛ en la construcción relativa; «conoce» sería una alternativa más llana.
    reason: lexical_alternative
  - marker: c
    text: Compárese Hebreos 11:38 («de quienes el mundo no era digno»). La relación es solo temática; no se trata de un paralelo sinóptico.
    reason: cross_reference
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Jesús dice
  - Jesús habla
  lexicon: Crum; Lambdin (grammar)
  rationale: La fórmula narrativa introduce un dicho concluido; el pretérito «dijo» refleja mejor la perfectividad del reporte que un presente estilizado.
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: come to know
  chosen_spanish: ha llegado a conocer
  alternatives_spanish:
  - conoce
  - reconoce
  - entiende
  lexicon: Crum; Layton (grammar)
  rationale: 'Se preserva el matiz resultativo/perfectivo del relativo: no solo ‘saber’, sino haber llegado a un estado de conocimiento, sin volverlo demasiado explicativo.'
- source_word: ⲡⲕⲟⲥⲙⲟⲥ
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el cosmos
  - el orden del mundo
  lexicon: Layton (lexicon); Crum
  rationale: «Mundo» es el equivalente natural en español para este préstamo copto y evita una tecnificación innecesaria de ‘cosmos’.
- source_word: ϩⲉ
  english_pob_choice: find
  chosen_spanish: hallado
  alternatives_spanish:
  - encontrado
  - descubierto
  - topado con
  lexicon: Crum
  rationale: «Hallar» mantiene la sobriedad y la concisión del copto; con el auxiliar ‘ha’ produce una forma idiomática en español.
- source_word: ⲟⲩⲡⲧⲱⲙⲁ / ⲡⲧⲱⲙⲁ
  english_pob_choice: a corpse / the corpse
  chosen_spanish: un cadáver / el cadáver
  alternatives_spanish:
  - un cuerpo muerto / el cuerpo muerto
  - un muerto / el muerto
  lexicon: Crum
  rationale: «Cadáver» comunica de forma directa el sentido de ptōma. Se conserva la alternancia indefinido/definido («un cadáver» / «el cadáver») para respetar la referencia anafórica del copto.
- source_word: ⲙⲡϣⲁ ⲛⲛⲧⲟϥ
  english_pob_choice: is not worthy of him
  chosen_spanish: no es digno de él
  alternatives_spanish:
  - no merece a él
  - no es merecedor de él
  - no vale a su lado
  lexicon: Crum; Lambdin (grammar)
  rationale: «Digno de él» reproduce el valor idiomático de ‘ser digno de’ en español y conserva la fuerza del giro de valoración del mundo respecto de la persona mencionada.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - y además
  lexicon: Crum
  rationale: Conector simple; la traducción mínima mantiene el ritmo lacónico del dicho.
- source_word: ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥ …
  english_pob_choice: whoever has …
  chosen_spanish: El que ha …
  alternatives_spanish:
  - Quien ha …
  - Cualquiera que haya …
  lexicon: Layton (grammar); Lambdin (grammar)
  rationale: «El que» conserva la ambigüedad abarcadora del relativo indefinido sin sobrecargarlo; se combina con el perfecto español para reflejar el estado consumado.
theological_decisions:
- issue: Valoración negativa del mundo y el lenguaje de ‘dignidad’
  english_pob_reading: the world is not worthy of him
  chosen_spanish_reading: el mundo no es digno de él
  alternative_spanish_readings:
  - el mundo no lo merece
  - el mundo no es merecedor de él
  rationale: Se mantiene la formulación de valor moral/relacional de ‘worthy’ sin suavizarla en un lenguaje meramente afectivo. «Digno de él» conserva la aspereza del dicho y su contraste entre el mundo y el hallado.
  doctrine_reference: Tema sapiencial/gnóstico de inversión de valores; sin paralelo doctrinal definido en el corpus canónico.
translation_notes:
  revision_awareness: La versión más reciente del auditor inglés no introdujo cambios; este borrador sigue el acuerdo alto del control cruzado y conserva la distinción copta indefinido/definido en «cadáver».
  spanish_consistency_notes:
  - Se mantiene «mundo» para ⲡⲕⲟⲥⲙⲟⲥ, evitando «cosmos».
  - Se usa «cadáver» en ambos miembros para el mismo referente, pero con artículo indefinido/definido distinto para reflejar la anáfora.
  - «Digno de él» reproduce el valor idiomático de ⲙⲡϣⲁ ⲛⲛⲧⲟϥ sin introducir lenguaje doctrinal ajeno.
