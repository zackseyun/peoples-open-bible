    text: Or 'Tell the servant to go on ahead of us.' The Hebrew נַעַר can refer to a young man, attendant, or servant.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'stand now/as at this time'; the expression is idiomatic, meaning to stop and remain for the moment.
    reason: lexical_alternative
