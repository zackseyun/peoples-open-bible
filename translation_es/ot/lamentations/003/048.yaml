    issue: La preposición 'sobre' en 'sobre la ruina' suena poco natural en español para expresar el motivo del llanto.
    rationale: Aunque se acerca formalmente a 'over', en español bíblico y natural 'llorar por la ruina' comunica mejor el valor causal de עַל sin perder fidelidad.
  - severity: low
    issue: '''Arroyos de agua bajan de mis ojos'' es comprensible pero algo tieso e imagéticamente menos idiomático.'
    rationale: La combinación de 'arroyos' con 'bajan' desde los ojos no fluye tan bien en español como 'corrientes de agua corren de mis ojos' o 'corren de mis ojos corrientes de agua'.
  - severity: low
    issue: La nota a incluye 'la fractura', alternativa demasiado física y menos útil en español.
    rationale: El expediente inglés da 'ruin' y 'brokenness' como alternativas principales. En español, 'fractura' puede distraer y no representa la mejor opción contextual para שֶׁבֶר en Lamentaciones.
  revised_spanish_text: Corrientes de agua corren de mis ojos por la ruina de la hija de mi pueblo[a][b].
