translation:
  language: es
  text: Sé fuerte[a], y seamos fuertes por nuestro pueblo y por las ciudades de nuestro Dios, y Yahvé haga lo que es bueno a sus ojos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y seamos fuertes» o «y fortalezcámonos». El verbo hebreo es reflexivo y puede dar la idea de ser fuertes o de fortalecernos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yahvé hará lo que es bueno a sus ojos». La forma hebrea también puede leerse como futuro simple, aunque aquí se traduce como una expresión de sumisión a la voluntad de Yahvé.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֲזַק
  english_pob_choice: Be strong
  chosen_spanish: Esfuérzate
  alternatives_spanish:
  - Sé fuerte
  - Ten valor
  lexicon: HALOT
  rationale: El imperativo qal 2ms de חזק exhorta a mostrar fuerza; en español, el reflexivo 'esfuérzate' comunica bien la llamada a la fortaleza activa sin perder la fuerza exhortativa.
- source_word: וְנִתְחַזַּק
  english_pob_choice: and let us be strong
  chosen_spanish: y esforcémonos
  alternatives_spanish:
  - y seamos fuertes
  - y fortalezcámonos
  lexicon: HALOT
  rationale: El hitpael cohortativo 1cp tiene matiz reflexivo/incoativo; 'esforcémonos' conserva la idea de activar la propia fuerza y suena natural en español, sin borrar el paralelo con el imperativo anterior.
- source_word: בְּעַד
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a favor de
  - en defensa de
  lexicon: HALOT
  rationale: En este contexto militar y de protección, 'por' transmite bien la idea de actuar en beneficio o en defensa de.
- source_word: עַמֵּנוּ
  english_pob_choice: our people
  chosen_spanish: nuestro pueblo
  alternatives_spanish:
  - nuestra gente
  - nuestro ejército
  lexicon: HALOT
  rationale: עַם significa normalmente 'pueblo'; 'nuestro pueblo' preserva el alcance comunitario y evita restringirlo a 'ejército'.
- source_word: עָרֵי אֱלֹהֵינוּ
  english_pob_choice: the cities of our God
  chosen_spanish: las ciudades de nuestro Dios
  alternatives_spanish:
  - las ciudades de nuestro Dios
  - las ciudades de nuestro Dios
  lexicon: HALOT
  rationale: La cadena constructa se rinde de forma directa y clara; 'nuestro Dios' conserva la identificación teológica de esas ciudades con el Dios de Israel.
- source_word: וַיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יהוה YHWH'
  rationale: El texto hebreo contiene directamente el Tetragrámaton, así que se mantiene el nombre divino 'Yahvé' en lugar de enmascararlo como 'SEÑOR'.
- source_word: יַעֲשֶׂה הַטּוֹב בְּעֵינָיו
  english_pob_choice: may the LORD do what is good in his eyes
  chosen_spanish: haga lo que es bueno a sus ojos
  alternatives_spanish:
  - haga lo que le parezca bueno
  - haga lo que es recto a sus ojos
  lexicon: HALOT
  rationale: La frase conserva el modismo hebreo 'lo que es bueno a sus ojos' sin paraphrasearlo; el subjuntivo/jusivo español expresa bien la entrega del resultado a la voluntad divina.
theological_decisions:
- issue: Forma de renderizar el nombre divino יהוה
  english_pob_reading: Yahweh / the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Siguiendo la pauta del proyecto para יהוה, se usa 'Yahvé' como nombre propio en el texto principal, preservando la referencia al nombre de pacto revelado a Israel.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor del cierre 'what is good in his eyes'
  english_pob_reading: may the LORD do what is good in his eyes
  chosen_spanish_reading: haga lo que es bueno a sus ojos
  alternative_spanish_readings:
  - haga lo que le parezca bueno
  - haga lo que es recto a sus ojos
  rationale: El hebreo permite tanto una lectura de futuro simple como una lectura volitiva de sumisión. El español adopta aquí la forma de deseo/subjuntivo, manteniendo la idea de confiar el desenlace a la decisión de Yahvé.
  doctrine_reference: English POB footnote b; Hebrew yiqtol after exhortation
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión registrada en el audit trail inglés, que prefirió 'let us be strong' frente a 'let us show ourselves strong' por ser más directo y natural. En español, esa decisión se reflejó con 'esforcémonos', que mantiene la reflexividad y la naturalidad idiomática. También se respetó el cambio del proyecto hacia 'Yahvé' para יהוה, en lugar de 'el SEÑOR'.
  spanish_consistency_notes:
  - 'Se mantiene la repetición enfática entre el imperativo y el cohortativo con dos formas distintas pero paralelas: ''Esfuérzate'' / ''esforcémonos''.'
  - '''nuestro Dios'' conserva la relación de pertenencia y alianza sin introducir ''Señor'' como sustituto.'
  - El cierre conserva el modismo hebreo de 'a sus ojos' para no diluir la tensión entre lectura futura y lectura de sumisión.
