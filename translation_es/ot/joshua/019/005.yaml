review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva correctamente la estructura de lista toponímica del hebreo: conjunción inicial, tres nombres de lugar y puntuación final de enumeración. Sin embargo, en los topónimos compuestos hay adaptación ortográfica española no documentada en la base auditada que debilita la correspondencia con las formas transliteradas del POB en inglés. Las notas léxicas sí reflejan bien que se trata de topónimos con sentido literal posible.'
  spanish_quality_summary: 'El español es legible, pero hay detalles mejorables: ''Bet-marcabot'' y ''Hazar-susa'' son formas algo arbitrarias frente a la evidencia y a la coherencia interna; además, la nota b mezcla español e inglés con ''enclosure'', lo cual no es aceptable en el texto/meta español. Conviene mantener transliteraciones más transparentes y notas plenamente en español.'
  glossary_alignment: 'No hay términos teológicos sensibles aquí. La decisión clave del proyecto —preservar topónimos en listas geográficas y relegar glosas semánticas a notas— se cumple en principio. Se recomienda alinear mejor las transliteraciones españolas con las formas auditadas: ''Ziclag'' puede tolerarse como adaptación ortográfica española, pero ''Bet-marcabot'' y ''Hazar-susa'' deberían acercarse más a ''Bet-marcabot''/''Hazar-susá'' o conservar más claramente la forma fuente. También debe eliminarse el anglicismo ''enclosure'' de la nota.'
  issues:
  - severity: medium
    issue: 'La nota b contiene un anglicismo: ''enclosure''.'
    rationale: Las notas deben estar íntegramente en español claro y eclesialmente legible. Aquí rompe la calidad del español y es innecesario, ya que 'recinto' o 'cercado' expresa bien la idea.
  - severity: medium
    issue: '''Hazar-susa'' adapta en exceso el segundo elemento del topónimo.'
    rationale: El hebreo סוּסָה subyace a la forma auditada 'susah'. En español puede adaptarse, pero 'susa' acerca indebidamente al lexema común español y pierde transparencia respecto del nombre fuente. 'Hazar-susá' preserva mejor el topónimo y sigue siendo legible.
  - severity: low
    issue: La nota a no refleja la alternativa principal documentada por el POB en inglés para Beth-marcaboth.
    rationale: La nota inglesa para a explica 'house of chariots' sobre Beth-marcaboth. En español conviene anclar esa glosa al topónimo correspondiente, no a Ziclag, para preservar la racionalidad léxica documentada.
  - severity: medium
    issue: La distribución de las notas no sigue idealmente la auditoría inglesa.
    rationale: En la auditoría inglesa, la nota a pertenece a 'Ziklag' pero explica 'Beth-marcaboth', un desajuste heredado. En revisión española conviene corregir la colocación para que cada nota esté anclada al topónimo pertinente y no crear confusión al lector.
