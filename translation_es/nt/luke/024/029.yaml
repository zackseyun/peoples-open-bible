translation:
  language: es
  text: 'Pero ellos le insistieron mucho[a], diciendo: «Quédate con nosotros, porque se acerca el atardecer y el día ya ha declinado[b]». Y entró para quedarse con ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo apremiaron» o «lo presionaron»; tradicionalmente, «le constriñeron».
    reason: lexical_alternative
  - marker: b
    text: O «el día ya está muy avanzado».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεβιάσαντο
  english_pob_choice: urged him strongly
  chosen_spanish: le insistieron mucho
  alternatives_spanish:
  - lo apremiaron
  - lo presionaron
  - le rogaron insistentemente
  lexicon: BDAG
  rationale: El verbo medio expresa una insistencia enérgica, no necesariamente fuerza física. «Le insistieron mucho» comunica bien esa presión persuasiva en español actual y conserva el matiz de intensidad sin sonar arcaico.
- source_word: Μεῖνον
  english_pob_choice: Stay
  chosen_spanish: Quédate
  alternatives_spanish:
  - Permanece
  - Quédate a dormir
  - Permanece con
  lexicon: BDAG
  rationale: En este contexto de hospitalidad, el imperativo suena natural en español como una invitación amistosa a permanecer. «Quédate» es idiomático y fiel al tono del pasaje.
- source_word: μεθ’ ἡμῶν
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - entre nosotros
  lexicon: BDAG
  rationale: La preposición con genitivo indica acompañamiento. «Con nosotros» es la equivalencia directa y más natural.
- source_word: πρὸς ἑσπέραν ἐστὶν
  english_pob_choice: it is toward evening
  chosen_spanish: ya es hacia la tarde
  alternatives_spanish:
  - ya se acerca la tarde
  - ya es cerca de la tarde
  - se va haciendo tarde
  lexicon: BDAG
  rationale: «Πρὸς ἑσπέραν» señala aproximación temporal. «Hacia la tarde» preserva ese movimiento hacia el anochecer mejor que simplemente «ya es de noche» o «ya es tarde».
- source_word: κέκλικεν ἤδη ἡ ἡμέρα
  english_pob_choice: the day has already declined
  chosen_spanish: el día ha declinado
  alternatives_spanish:
  - el día ya está muy avanzado
  - el día ya está por terminar
  - el día ya va cayendo
  lexicon: BDAG
  rationale: El perfecto de κλίνω presenta al día como ya inclinado/declinando. «Ha declinado» mantiene la metáfora con buena claridad en español y evita una paráfrasis excesiva.
- source_word: εἰσῆλθεν
  english_pob_choice: he went in
  chosen_spanish: entró
  alternatives_spanish:
  - se metió
  - pasó adentro
  - ingresó
  lexicon: BDAG
  rationale: «Entró» es breve, narrativo y plenamente natural; en este contexto no hace falta explicitar más el movimiento.
- source_word: τοῦ μεῖναι
  english_pob_choice: to stay
  chosen_spanish: para quedarse
  alternatives_spanish:
  - para permanecer
  - a fin de quedarse
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Para quedarse» enlaza con el imperativo inicial y mantiene la coherencia semántica de la escena.
- source_word: σὺν αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: BDAG
  rationale: σύν denota asociación/acercamiento. «Con ellos» es la forma más directa y natural en español.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al mantener καὶ como coordinación simple («Y») al final de la oración y no introducir una conclusión interpretativa. También se reflejó el matiz temporal de πρὸς ἑσπέραν y κέκλικεν ἤδη ἡ ἡμέρα sin volverlos redundantes en español.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología eclesiástica no presente en el versículo.
  - Se mantuvo un registro bíblico sobrio y actual, sin calcos innecesarios.
  - «Con nosotros» y «con ellos» conservan la simetría del griego μεθ’ / σὺν.
  - La coordinación final con «Y» reproduce el καὶ del texto fuente, conforme a la revisión auditada.
