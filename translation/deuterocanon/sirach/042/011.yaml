theological_decisions:
- issue: Use of Hebrew as primary witness with Greek parallel informing difficult final clause
  chosen_reading: Translate from the Cairo Geniza Hebrew, with the Greek used to clarify the public-shame sequence and the difficult gate clause.
  alternative_readings:
  - 'Follow the Greek more fully: ''make you a joy to enemies ... and shame you before a great multitude'''
  - 'Render the final clause more literally but obscurely: ''and make you sit in the gate-crowd'''
  rationale: Per project philosophy, surviving Hebrew is primary for Sirach. Here the Hebrew is extant but the final phrase is somewhat opaque; the Greek parallel confirms a sequence of public disgrace and supports understanding the gate as a public civic setting. The English remains anchored in the Hebrew wording rather than importing the Greek's fuller expansions about enemies and many people.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek parallel as actual input'
