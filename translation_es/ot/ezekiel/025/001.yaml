lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: 'La fórmula narrativa hebrea introduce una nueva unidad profética. En español, «Y vino» conserva el avance del relato y el tono formular sin caer en un calco demasiado áspero como «y sucedió». '
- source_word: דְבַר
  english_pob_choice: the word of
  chosen_spanish: la palabra de
  alternatives_spanish:
  - el mensaje de
  lexicon: HALOT
  rationale: En las fórmulas proféticas, דָּבָר designa la palabra/mensaje divino. «La palabra de» mantiene la estructura formal y la transparencia del giro profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino según la política del proyecto. «Yahvé» comunica el Tetragrámaton sin sustituirlo por un título, y es la forma base establecida para el texto español.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición hebrea con sufijo de primera persona expresa dirección hacia el hablante. «A mí» es la equivalencia natural y fiel en español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  - con estas palabras,
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo. «Diciendo,» es la forma convencional en español y prepara la continuación inmediata del oráculo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La versión española conserva el nombre propio de Dios en lugar de una sustitución titular, siguiendo la línea doctrinal del proyecto y manteniendo la identificación del hablante divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden en la fórmula profética estándar: «vino la palabra de YHWH/Yahweh a mí, diciendo». No se requieren cambios textuales ni ajustes de sentido; la única decisión relevante para el español es la conservación del nombre divino como «Yahvé».'
  spanish_consistency_notes:
  - 'Se mantiene el orden formulario natural en español: «Y vino la palabra de Yahvé a mí, diciendo».'
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para el Tetragrámaton.
  - «Diciendo» se conserva para reflejar la introducción directa del discurso sin anticipar el contenido del versículo siguiente.
