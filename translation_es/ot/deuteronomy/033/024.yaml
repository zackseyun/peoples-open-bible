base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/033/024.yaml
  text: 'And of Asher he said: “Most blessed of sons is Asher[a]; may he be favored by his brothers[c][b], and may he dip his foot in oil.”'
  footnotes:
  - marker: a
    text: Or “Blessed above sons is Asher.” The Hebrew comparison may be read as comparative or superlative.
    reason: lexical_alternative
  - marker: b
    text: “His brothers” likely refers to the other tribes of Israel.
    reason: cultural_note
  - marker: c
    text: The image “dip his foot in oil” likely conveys abundance or prosperity, but the Hebrew is left literal.
    reason: lexical_alternative
