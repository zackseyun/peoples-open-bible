translation:
  language: es
  text: Pero el cabello de su cabeza comenzó a crecer otra vez después de haber sido rapado[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «comenzó a crecer»; el verbo hebreo no dice de manera explícita «otra vez», sino que ese matiz se infiere del contexto previo de la rapadura.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando fue rapado» o «después de que fue rapado». El hebreo permite expresar la cláusula temporal de maneras ligeramente distintas, con el referente implícito entendido por el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּחֶל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - inició
  lexicon: HALOT
  rationale: El hebreo expresa el inicio del proceso; en español, «comenzó» comunica de forma natural ese valor inceptivo sin añadir contenido extra.
- source_word: שְׂעַר רֹאשׁוֹ
  english_pob_choice: the hair of his head
  chosen_spanish: el cabello de su cabeza
  alternatives_spanish:
  - el pelo de su cabeza
  - su cabello
  lexicon: HALOT
  rationale: La cadena constructa se conserva con una expresión natural en español. «Cabello» es claro y digno; «de su cabeza» mantiene el énfasis del hebreo en el cabello del cráneo de Sansón.
- source_word: לְצַמֵּחַ
  english_pob_choice: to grow again
  chosen_spanish: a crecer otra vez
  alternatives_spanish:
  - a crecer
  - a brotar
  lexicon: HALOT
  rationale: El verbo simple צמח significa «crecer / brotar». En contexto, el español necesita explicitar la repetición con «otra vez», porque el sujeto ya había sido cortado; esto sigue la inferencia contextual documentada en la POB inglesa.
- source_word: כַּאֲשֶׁר
  english_pob_choice: after
  chosen_spanish: después de que
  alternatives_spanish:
  - cuando
  - al tiempo que
  lexicon: HALOT
  rationale: La relación temporal es la de una circunstancia posterior a la rapadura. «Después de que» es la forma más natural y precisa en español para este valor temporal.
- source_word: גֻּלָּח
  english_pob_choice: it had been shaved
  chosen_spanish: fue rapado
  alternatives_spanish:
  - había sido rapado
  - le habían rapado el cabello
  lexicon: HALOT
  rationale: El pasivo de גלח se vierte con «rapado» para conservar la acción de afeitar/cortar al ras. Elegí una construcción impersonal en español para no forzar un referente gramatical inexistente en el hebreo y mantener la referencia contextual a la acción sobre el cabello.
translation_notes:
  revision_awareness: El texto coincide con la decisión inglesa de mantener el valor inceptivo de וַיָּחֶל, explicitar en español el crecimiento renovado por el contexto narrativo, y conservar la ambigüedad temporal permitida por כַּאֲשֶׁר. No se registraron revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos según la pauta del proyecto, pero este versículo no contiene el nombre divino.
  - «Cabello» preserva la referencia específica al pelo de la cabeza; no se generaliza a «pelo» para mantener el tono más literario y la conexión narrativa con Sansón.
  - «Rapado» refleja mejor la acción pasiva de גֻּלָּח que un simple «cortado».
