    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «alabaron a Dios». El verbo hebreo dice literalmente «bendijeron».
    reason: lexical_alternative
  - marker: c
    text: Lit. «no dijeron subir contra ellos para la guerra».
    reason: lexical_alternative
  revision_rationale: Se ajustó «fue bueno» a «pareció bien» para un español más natural sin perder el modismo evaluativo hebreo. Se cambió «no dijeron que subirían» por «no hablaron de subir» para reflejar correctamente וְלֹא אָמְרוּ לַעֲלוֹת como ausencia de propuesta o discusión bélica. También se afinó la nota c para representar mejor la literalidad documentada.
