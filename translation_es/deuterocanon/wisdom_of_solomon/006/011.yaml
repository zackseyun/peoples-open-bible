translation:
  language: es
  text: Por tanto, deseen[a] mis palabras; anhélenlas, y serán instruidos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «anhelen»; el segundo imperativo griego usa un verbo más intenso que el primero.
    reason: lexical_alternative
  - marker: b
    text: O «serán enseñados» o «recibirán disciplina»; el verbo griego puede incluir tanto instrucción como disciplina formativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμήσατε
  english_pob_choice: desire
  chosen_spanish: deseen
  alternatives_spanish:
  - deseen intensamente
  - anhelen
  - pongan su deseo en
  lexicon: BDAG
  rationale: El imperativo aoristo de ἐπιθυμέω pide una exhortación positiva de deseo. «Deseen» es natural en español y conserva el impulso volitivo sin cargar con la connotación negativa de «codiciar».
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Marca una conclusión lógica respecto del contexto anterior. «Por tanto» preserva mejor la relación inferencial en español formal y claro.
- source_word: τῶν λόγων μου
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis enseñanzas
  lexicon: BDAG
  rationale: λόγος aquí remite a las expresiones e instrucción del hablante. «Palabras» es la equivalencia más directa y no interpreta más allá del griego.
- source_word: ποθήσατε
  english_pob_choice: long for
  chosen_spanish: anhelen
  alternatives_spanish:
  - sientan anhelo por
  - deseen con ansia
  - añoren
  lexicon: BDAG
  rationale: El segundo imperativo es más intenso y afectivo que el primero. «Anhelen» conserva esa mayor intensidad sin sonar excesivo o artificial en español.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: también, y
  alternatives_spanish:
  - y
  - y entonces
  lexicon: BDAG
  rationale: La coordinación une el segundo imperativo con la promesa final. Añadir «también» ayuda a reflejar que no es una mera repetición, sino una intensificación del primer mandato.
- source_word: παιδευθήσεσθε
  english_pob_choice: you will be instructed
  chosen_spanish: serán instruidos
  alternatives_spanish:
  - serán enseñados
  - recibirán disciplina
  - serán formados
  lexicon: BDAG
  rationale: El futuro pasivo de παιδεύω puede abarcar instrucción y disciplina formativa. «Serán instruidos» mantiene el sentido pedagógico que domina el contexto de sabiduría, sin borrar la amplitud semántica documentada.
theological_decisions:
- issue: Alcance semántico de παιδεύω en literatura sapiencial
  english_pob_reading: instruction is foregrounded, while discipline remains a possible extension
  chosen_spanish_reading: la instrucción es el sentido principal, con la disciplina formativa como trasfondo posible
  alternative_spanish_readings:
  - serán disciplinados
  - recibirán formación
  rationale: El versículo promete el resultado de desear las palabras de la Sabiduría. En este contexto inmediato, «serán instruidos» expresa con precisión la recepción de enseñanza, dejando intacta en la documentación la posibilidad de disciplina/ formación que el verbo también puede implicar.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión española sigue el último pase de revisión sin cambios sustanciales respecto del texto base auditado, y conserva la distinción entre el primer mandato más general y el segundo, más intenso, junto con la ambigüedad documentada de παιδεύω.
  spanish_consistency_notes:
  - Se mantiene «Yahvé»/«Mesías» como norma general del proyecto, pero este versículo no contiene esos términos.
  - 'Se evita traducir mecánicamente desde el inglés: «serán instruidos» se eligió directamente por el valor de παιδευθήσεσθε en contexto sapiencial.'
  - La coordinación «también, y» intenta reflejar la progresión retórica sin introducir una paráfrasis doctrinal.
