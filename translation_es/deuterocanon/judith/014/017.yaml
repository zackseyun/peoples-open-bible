review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa del griego: entrada en la tienda, ausencia de Judith, salida repentina y clamor al pueblo. Sin embargo, «hacia el pueblo» no reproduce bien εἰς τὸν λαόν en este contexto; la idea es salir adonde estaba la gente/asamblea, mejor «a donde estaba el pueblo» o «entre el pueblo». Además, la nota b propone alternativas menos naturales o menos precisas en español.'
  spanish_quality_summary: El español es mayormente claro y digno. «Tienda» funciona bien para σκηνήν. «Estaba alojada» es comprensible, pero «se alojaba» suena más natural para un participio activo y evita un matiz pasivo. «No la halló» y «clamando» son aceptables de registro bíblico. La frase «salió de un salto hacia el pueblo» suena algo rígida; conviene una redacción más idiomática.
  glossary_alignment: No hay términos teológicos del glosario central en juego. Las decisiones léxicas principales concuerdan con el audit trail inglés, salvo que la preposición con «el pueblo» necesita mejor ajuste contextual en español.
  issues:
  - severity: medium
    issue: «hacia el pueblo» es una representación imprecisa de εἰς τὸν λαόν
    rationale: En contexto narrativo, no se trata solo de dirección vaga ‘hacia’ sino de salir al lugar donde estaba la gente. «Hacia» puede sonar incompleto o como movimiento sin llegada.
  - severity: low
    issue: «estaba alojada» introduce un matiz más pasivo que el participio activo καταλύουσα
    rationale: Aunque comprensible, el griego describe a Judith como ‘alojándose/quedándose’. «Se alojaba» o «se hospedaba» preserva mejor la voz y fluye naturalmente en español.
  - severity: low
    issue: La nota b contiene alternativas poco idiomáticas
    rationale: «saliendo de un salto» cambia la forma verbal, y «saltó afuera» suena poco natural en español general. Conviene ofrecer alternativas más limpias como «se precipitó afuera» o «saltó hacia afuera» si se quiere conservar la viveza.
  revised_spanish_text: Y entró en la tienda donde Judith se alojaba[a], pero no la halló; y salió de un salto a donde estaba el pueblo, clamando[b].
  revised_footnotes:
  - marker: a
    text: O «se hospedaba». El participio griego καταλύουσα se refiere a quedarse o alojarse en un lugar.
    reason: lexical_alternative
  - marker: b
    text: O «se precipitó afuera» / «saltó hacia afuera». El verbo griego ἐξεπήδησεν es más vívido que un simple «salió».
    reason: lexical_alternative
  revision_rationale: Se ajusta la descripción de καταλύουσα a una forma activa más natural en español («se alojaba»), y se corrige «hacia el pueblo» para expresar mejor que salió al lugar donde estaba la gente. También se mejoran las alternativas de la nota b para que sean idiomáticas y fieles al matiz vívido del griego.
