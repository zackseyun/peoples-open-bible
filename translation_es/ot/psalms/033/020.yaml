translation:
  language: es
  text: Nuestra alma espera a Yahvé[a]; él es nuestra ayuda y nuestro escudo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Nuestra alma espera a Yahvé». «Alma» aquí expresa el yo comunitario completo, no solo una parte inmaterial del ser.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשֵׁנוּ
  english_pob_choice: Our soul
  chosen_spanish: Nuestra alma
  alternatives_spanish:
  - Nosotros
  - Nuestra vida
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o el yo completo. Aquí la forma singular con sufijo plural de 1.ª persona tiene un valor corporativo; «nuestra alma» conserva la imagen hebrea y, en español, sigue siendo comprensible para una comunidad orante.
- source_word: חִכְּתָה
  english_pob_choice: waits
  chosen_spanish: espera
  alternatives_spanish:
  - ha esperado
  - espera con expectación
  - anhela
  lexicon: HALOT
  rationale: El verbo expresa espera paciente y confiada. «Espera» comunica la acción de manera natural en español y preserva el matiz de expectación sin introducir una paráfrasis más intensa.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - para Yahvé
  - hacia Yahvé
  lexicon: HALOT
  rationale: El hebreo usa ל con el verbo de esperar, donde en español es más natural «esperar en». Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה, en lugar de enmascarar el nombre divino.
- source_word: עֶזְרֵנוּ
  english_pob_choice: our help
  chosen_spanish: nuestra ayuda
  alternatives_spanish:
  - nuestro auxilio
  - nuestro ayudador
  lexicon: HALOT
  rationale: עֵזֶר designa ayuda o auxilio. «Nuestra ayuda» conserva el sustantivo abstracto y refleja mejor la estructura predicativa del hebreo que convertirlo en una persona («ayudador»).
- source_word: וּמָגִנֵּנוּ
  english_pob_choice: and our shield
  chosen_spanish: y nuestro escudo
  alternatives_spanish:
  - y nuestro protector
  lexicon: HALOT
  rationale: מָגֵן es literalmente «escudo». Se conserva la imagen metafórica concreta, que es clara y tradicional en español bíblico, sin sustituirla por un equivalente interpretativo.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: él es
  alternatives_spanish:
  - él mismo es
  - él solo es
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis. En español se expresa de forma natural con «él es», sin añadir exclusividad que el hebreo no dice explícitamente.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo contiene el Tetragrámaton directamente. Conforme a la norma del proyecto, se traduce con «Yahvé» para preservar el nombre del pacto en vez de sustituirlo por una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide sustancialmente con la revisión inglesa más reciente, que no introdujo cambios respecto del borrador aprobado.
  spanish_consistency_notes:
  - Se mantuvo la metáfora de «alma» en singular corporativo, en paralelo al análisis inglés.
  - Se usó «Yahvé» de manera consistente con la política terminológica del proyecto.
  - «Ayuda» y «escudo» conservan los sustantivos concretos del hebreo sin reinterpretarlos como títulos personales.
