translation:
  language: es
  text: Come miel, hijo mío, porque es buena, y la miel que gotea del panal[a] es dulce a tu paladar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y el panal es dulce a tu paladar». El hebreo נֹפֶת puede referirse a miel del panal o a la miel que fluye de él; «la miel que gotea del panal» hace más clara esa imagen en español actual.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «sobre tu paladar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱכָל
  english_pob_choice: Eat
  chosen_spanish: Come
  alternatives_spanish:
  - Come
  - Come tú
  lexicon: HALOT
  rationale: El imperativo qal masculino singular pide una exhortación directa. «Come» conserva la fuerza breve e instructiva del hebreo con español natural.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo mío
  - hijo
  lexicon: HALOT
  rationale: Es un vocativo sapiencial. «Hijo mío» refleja bien el tono afectuoso e instructivo del original y suena natural en español.
- source_word: דְבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - miel
  - miel natural
  lexicon: HALOT
  rationale: El sustantivo hebreo designa la miel común; «miel» es la equivalencia directa y clara en español.
- source_word: כִּי טוֹב
  english_pob_choice: for it is good
  chosen_spanish: porque es buena
  alternatives_spanish:
  - porque es bueno
  - pues es buena
  - porque es agradable
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón de la exhortación. «Es buena» conserva el valor evaluativo de טוֹב sin reducirlo solo a placer o sabor.
- source_word: וְנֹפֶת
  english_pob_choice: the drippings of the honeycomb
  chosen_spanish: el goteo del panal
  alternatives_spanish:
  - las gotas del panal
  - la miel del panal
  - la miel que gotea del panal
  lexicon: HALOT
  rationale: נֹפֶת puede referirse a miel fluida o a miel del panal. Siguiendo el audit trail inglés, «goteo del panal» mantiene la imagen de fluidez y preserva la distinción respecto de דְבַשׁ.
- source_word: מָתוֹק
  english_pob_choice: is sweet
  chosen_spanish: es dulce
  alternatives_spanish:
  - es dulce
  - es sabroso
  - es agradable
  lexicon: HALOT
  rationale: El adjetivo expresa dulzura de sabor; «es dulce» es la correspondencia directa y más precisa.
- source_word: עַל חִכֶּךָ
  english_pob_choice: to your taste
  chosen_spanish: sobre tu paladar
  alternatives_spanish:
  - a tu paladar
  - en tu paladar
  - sobre tu gusto
  lexicon: HALOT
  rationale: חֵךְ significa literalmente «paladar». Se conserva la concreción corporal del hebreo con «sobre tu paladar», y se acompaña con nota para transparentar la metáfora espacial del texto.
translation_notes:
  revision_awareness: El inglés POB revisó su formulación de נֹפֶת desde «honey from the comb» a «the drippings of the honeycomb» para reflejar más directamente la imagen de fluidez y distinguirla de la miel común. La versión española sigue esa línea con «el goteo del panal», manteniendo la relación semántica entre miel, panal y fluidez sin sobreexplicar el término.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Hijo mío» mantiene el registro sapiencial y no introduce un tono eclesiástico ajeno al hebreo.
  - «Paladar» se usa de forma literal para חֵךְ, evitando sustituirlo por «gusto» y así preservar la imagen corporal.
  - Se evita paraphrasear «buena» como «sabrosa», porque טוֹב en este contexto es más amplio que el sabor.
