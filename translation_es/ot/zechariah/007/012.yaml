translation:
  language: es
  text: Hicieron sus corazones como piedra durísima[a], para no oír la ley[b] y las palabras que Yahvé de los Ejércitos[c] había enviado por su Espíritu por medio de los profetas anteriores. Y vino una gran ira de parte de Yahvé de los Ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שָׁמִיר designa una sustancia extremadamente dura; tradicionalmente se ha entendido como «adamante» o quizá «pedernal».
    reason: lexical_alternative
  - marker: b
    text: O «la instrucción» para «la ley».
    reason: lexical_alternative
  - marker: c
    text: 'Traducción tradicional: «Yahvé de los Ejércitos» se ha vertido también como «el SEÑOR de los Ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִבָּם
  english_pob_choice: their hearts
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  lexicon: HALOT
  rationale: 'לֵב/לֵבָב puede referirse al centro interior de la persona: voluntad, mente o disposición. En español, «su corazón» funciona de manera natural y fiel al singular colectivo hebreo con posesivo plural; «sus corazones» sonaría más segmentado de lo que el hebreo exige.'
- source_word: שָׂמוּ
  english_pob_choice: made
  chosen_spanish: pusieron
  alternatives_spanish:
  - hicieron
  - colocaron
  lexicon: HALOT
  rationale: שׂוּם con לֵב y un predicado nominal expresa el sentido idiomático de «hacer/renderizar» el corazón en cierto estado. «Pusieron» conserva la imagen verbal de colocar/establecer sin endurecerla artificialmente.
- source_word: שָׁמִיר
  english_pob_choice: diamond-hard stone
  chosen_spanish: piedra durísima
  alternatives_spanish:
  - diamante durísimo
  - pedernal
  - adamante
  lexicon: HALOT
  rationale: El término designa una sustancia muy dura, pero la identificación exacta es incierta. En español, «piedra durísima» comunica la metáfora sin forzar una identificación mineral especulativa; se preserva así la dureza extrema que el inglés explicita con una imagen interpretativa.
- source_word: מִשְּׁמוֹעַ
  english_pob_choice: so as not to hear
  chosen_spanish: para no oír
  alternatives_spanish:
  - a fin de no oír
  - con el propósito de no oír
  - para no escuchar
  lexicon: HALOT
  rationale: 'El giro con מִן + infinitivo expresa prevención/resultación: endurecieron el corazón con el fin de no escuchar. «Para no oír» transmite bien la finalidad negativa en español, sin añadir más fuerza modal de la que el contexto requiere.'
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  lexicon: HALOT
  rationale: En este contexto profético-covenantal, תּוֹרָה funciona como la instrucción autoritativa de Dios. «La ley» preserva esa fuerza normativa en español; «la instrucción» queda como alternativa léxica válida pero menos directa para el lector general.
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los mensajes
  - los dichos
  lexicon: HALOT
  rationale: דְּבָרִים se refiere a las palabras/mensajes proféticos enviados por Dios. «Las palabras» es la opción más directa y mantiene el paralelismo con «la ley».
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - el SEÑOR de los Ejércitos
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según la norma del proyecto. צְבָאוֹת se vierte por su sentido léxico como «de los Ejércitos», evitando la convención de ocultarlo bajo «SEÑOR» y conservando el título militar/cósmico en español.
- source_word: בְּרוּחוֹ
  english_pob_choice: by his Spirit
  chosen_spanish: por medio de su Espíritu
  alternatives_spanish:
  - por su Espíritu
  - por medio de su espíritu
  - mediante su Espíritu
  lexicon: HALOT
  rationale: רוח con sufijo puede referirse al Espíritu divino como agente de envío. «Por medio de su Espíritu» expresa bien la mediación/instrumentalidad y permite una lectura personal del agente sin decidir innecesariamente entre «espíritu» y «Espíritu» en abstracto.
- source_word: בְּיַד
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - mediante
  lexicon: HALOT
  rationale: La locución hebrea «por la mano de» es un hebraísmo de agencia. En español, «por medio de» comunica naturalmente la mediación profética sin sonar rígido o arcaizante.
- source_word: הַנְּבִיאִים הָרִאשֹׁנִים
  english_pob_choice: the former prophets
  chosen_spanish: los profetas primeros
  alternatives_spanish:
  - los profetas anteriores
  - los primeros profetas
  lexicon: HALOT
  rationale: הָרִאשֹׁנִים apunta a profetas anteriores en la historia de Israel, no al rótulo técnico del canon. «Profetas primeros» conserva la literalidad relativa y evita importar una etiqueta canónica ajena; en una nota se podría aclarar la alternativa «anteriores».
- source_word: וַיְהִי קֶצֶף גָּדוֹל
  english_pob_choice: So great wrath came
  chosen_spanish: Y vino una gran ira
  alternatives_spanish:
  - Y hubo gran ira
  - Así vino una gran ira
  - Y se produjo una gran ira
  lexicon: HALOT
  rationale: El hebreo presenta un resultado narrativo sobrio. «Y vino una gran ira» sigue el evento sin añadir un inferencial más fuerte que el de la forma hebrea; «de parte de» explicita la fuente que el contexto y el complemento final muestran.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - desde
  - procedente de
  lexicon: HALOT
  rationale: מֵאֵת marca origen/fuente. «De parte de» suena natural en español bíblico moderno y deja claro que la ira procede de Yahvé.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino. Siguiendo la norma del proyecto, se conserva ese nombre en español como «Yahvé» para evitar la convención de sustitución con «SEÑOR» y mantener la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de בְּרוּחוֹ
  english_pob_reading: by his Spirit
  chosen_spanish_reading: por medio de su Espíritu
  alternative_spanish_readings:
  - por medio de su espíritu
  - por su espíritu
  - por su aliento
  rationale: En el contexto profético, la frase describe el medio por el cual Yahvé envió sus palabras. «Espíritu» con mayúscula es coherente con una referencia a la agencia divina personal, sin afirmar más de lo que el versículo explicita.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3
- issue: Cómo verter צְבָאוֹת
  english_pob_reading: Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los ejércitos
  - de los Hosts
  rationale: «Ejércitos» traduce el sentido del hebreo y conserva la fuerza del título. En español de iglesia, la forma con mayúscula ayuda a reconocer el título divino y evita la pérdida de transparencia que tendría «SEÑOR».
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: Valor de תּוֹרָה en contexto profético
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la instrucción
  - la enseñanza
  rationale: Aunque תּוֹרָה puede significar «instrucción», aquí se trata de la palabra revelada y normativa de Dios recibida por los profetas. «La ley» conserva la fuerza covenantal y judicial del pasaje.
  doctrine_reference: HALOT; contexto profético de Zacarías
- issue: Posible alusión a los profetas anteriores
  english_pob_reading: the former prophets
  chosen_spanish_reading: los profetas primeros
  alternative_spanish_readings:
  - los profetas anteriores
  - los profetas de antaño
  rationale: La expresión hebrea no obliga a una etiqueta técnica del canon; alude a profetas previos. «Los profetas primeros» mantiene el vínculo temporal sin sobreinterpretar la frase.
  doctrine_reference: Contexto histórico-literario de Zacarías 7
- issue: Fuerza de קֶצֶף גָּדוֹל
  english_pob_reading: great wrath
  chosen_spanish_reading: una gran ira
  alternative_spanish_readings:
  - gran furor
  - un gran enojo
  rationale: Se conserva el sustantivo «ira» para reflejar el juicio divino del contexto. La expresión no se suaviza, porque el versículo culmina con la respuesta judicial de Yahvé a la resistencia del pueblo.
  doctrine_reference: Tema profético de juicio en Zacarías
translation_notes:
  revision_awareness: 'El audit trail inglés fue revisado para una formulación más sobria del resultado final: se reemplazó «Therefore» por «So» para no añadir una fuerza inferencial mayor que la del hebreo. En español se reflejó con «Y vino una gran ira», manteniendo el flujo narrativo sin una conclusión demasiado explícita. También se tuvo en cuenta la preferencia del proyecto por «Yahvé» en lugar de la sustitución tradicional con «SEÑOR».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto.
  - «Espíritu» va con mayúscula por el referente divino contextual.
  - La secuencia «la ley / las palabras» conserva el paralelismo del hebreo.
  - «Profetas primeros» evita convertir la frase en un tecnicismo canónico.
  - La nota sobre שָׁמִיר preserva la incertidumbre léxica sin fijar una mineralogía indebida.
