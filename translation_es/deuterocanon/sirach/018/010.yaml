    text: Or 'a pebble of sand'; the Greek word often means 'pebble,' but here likely refers to a single grain because it is paired with 'sand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the day of the age.' The Greek phrase is compact and may be rendered more literally, but here it refers to the vast span of eternity in contrast with human years.
