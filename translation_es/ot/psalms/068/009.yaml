translation:
  language: es
  text: La tierra tembló; aun los cielos destilaron delante de Dios—Sinaí mismo[a]—delante de Dios[b], el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es abrupto: «este Sinaí». Puede significar «delante de Dios en Sinaí» o enfatizar que Sinaí mismo tembló en la presencia de Dios.'
    reason: alternative_reading
  - marker: b
    text: O «gotearon» o «se derramaron»; el verbo hebreo sugiere literalmente el caer en gotas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En este contexto de teofanía cósmica, "la tierra" comunica mejor el alcance universal que "el país", y en español suena natural con el verbo siguiente.
- source_word: רָעָשָׁה
  english_pob_choice: quaked
  chosen_spanish: tembló
  alternatives_spanish:
  - se estremeció
  - se sacudió
  - trembló
  lexicon: HALOT
  rationale: '"Tembló" es una forma idiomática y vívida en español para un sacudimiento sísmico o teofánico, sin perder el sentido de agitación física.'
- source_word: אַף
  english_pob_choice: even
  chosen_spanish: sí,
  alternatives_spanish:
  - incluso
  - hasta
  - también
  lexicon: HALOT
  rationale: La partícula intensiva se vuelve en español una refuerzo enfático; "sí" mantiene el paralelismo poético y la progresión de intensificación.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: Se conserva el plural poético del hebreo con "los cielos", más fiel que el singular y más adecuado al registro elevado.
- source_word: נָטְפוּ
  english_pob_choice: dripped
  chosen_spanish: destilaron
  alternatives_spanish:
  - gotearon
  - derramaron
  - cayeron
  lexicon: HALOT
  rationale: '"Destilaron" preserva la imagen concreta de goteo o condensación, sin convertir el verbo en una lluvia más intensa de lo que el hebreo exige.'
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - frente a
  lexicon: HALOT
  rationale: '"Delante de" comunica la relación de presencia/impacto con claridad y funciona bien con la secuencia poética del verso.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: 'Aquí el referente es inequívoco: el Dios de Israel. Se usa el singular "Dios" para no oscurecer el sentido contextual del hebreo plural.'
- source_word: זֶה
  english_pob_choice: Sinai itself / this Sinai
  chosen_spanish: Sinai mismo
  alternatives_spanish:
  - este Sinaí
  - Sinaí mismo
  - Sinaí en persona
  lexicon: HALOT
  rationale: El demostrativo abrupto del hebreo queda mejor en español con una fórmula enfática breve. "Sinai mismo" conserva la fuerza de la aposición sin forzar una reconstrucción explicativa.
- source_word: סִינַי
  english_pob_choice: Sinai
  chosen_spanish: Sinai
  alternatives_spanish:
  - Sinaí
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en transliteración; en español bíblico ambos usos existen, pero "Sinai" evita una oscilación gráfica innecesaria dentro del verso.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción posesiva directa y natural en español para el título pactual que identifica de modo específico a Yahvé.
theological_decisions:
- issue: Cómo rendir la frase abrupta זֶה סִינַי
  english_pob_reading: '"Sinai itself"; preserve the abrupt demonstrative without overexplaining it.'
  chosen_spanish_reading: '"Sinai mismo"; mantiene la fuerza enfática y la sintaxis quebrada del hebreo.'
  alternative_spanish_readings:
  - '"este Sinaí"'
  - '"Sinaí mismo" con nota explicativa'
  - '"Sinai en persona"'
  rationale: El hebreo es elíptico y poético. En vez de resolver el problema interpretativo, la versión española conserva la brusquedad con una expresión breve que permite la misma tensión textual que el inglés POB documenta.
  doctrine_reference: Preservar la tensión interpretativa del texto original; primacía del hebreo sobre la normalización estilística.
- issue: La relación entre "delante de Dios" repetido dos veces y el nombre "el Dios de Israel"
  english_pob_reading: The verse repeats "before God" and then clarifies by apposition "the God of Israel."
  chosen_spanish_reading: Se repite "delante de Dios" y luego se explicita "el Dios de Israel".
  alternative_spanish_readings:
  - un solo "delante de Dios"
  - '"ante Dios" / "ante el Dios de Israel"'
  rationale: La repetición forma parte del paralelismo poético y no debe suavizarse en español. Mantenerla conserva el ritmo y la insistencia teofánica del verso.
  doctrine_reference: Poética bíblica y teofanía; mantener la repetición como recurso significativo, no como redundancia a eliminar.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió "Sinai itself" por ser más natural que "this Sinai". La redacción española sigue esa línea con "Sinai mismo", conservando la demostración enfática y la ambigüedad poética sin introducir una explicación ajena al texto.
  spanish_consistency_notes:
  - Se usa "Dios" para אֱלֹהִים según el contexto claro del Dios de Israel.
  - Se conserva el plural poético "los cielos".
  - Se mantiene el nombre propio "Sinai" de forma consistente en este verso para evitar alternancia gráfica innecesaria.
  - Se evita "SEÑOR" porque el hebreo aquí dice אֱלֹהִים, no el tetragrámaton.
  - '"delante de" se usa de forma uniforme para מִפְּנֵי en este versículo.'
