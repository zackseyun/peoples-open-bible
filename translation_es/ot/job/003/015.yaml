translation:
  language: es
  text: o con príncipes[a] que tenían oro, que llenaban de plata sus casas[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nobles» o «gobernantes» para «príncipes» (שָׂרִים).
    reason: lexical_alternative
  - marker: b
