  yaml_path: translation/deuterocanon/2_maccabees/008/010.yaml
  text: But Nikanor undertook to pay to the king the tribute owed to the Romans[a], amounting to two thousand talents[b], from the captivity of the Jews.
  footnotes:
  - marker: a
    text: Or, more literally, 'the tribute to the king, for the Romans.' The Greek is compact; the sense is that Nikanor proposed to meet the king's obligation to Rome from the Jews' capture.
    reason: alternative_reading
  - marker: b
    text: That is, by taking Jews captive and profiting from their sale or ransom.
    reason: cultural_note
