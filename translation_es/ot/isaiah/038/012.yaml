revisions:
- from: Mi morada ha sido levantada y llevada lejos de mí, como tienda de pastor[a]; he enrollado mi vida como tejedor[b], desde el telar[c] él me corta. De día hasta la noche tú me llevas a su fin.
  to: Mi morada ha sido levantada y llevada lejos de mí, como la tienda de un pastor[a]; he enrollado mi vida como un tejedor[b]; desde el telar[c] él me corta. De día hasta la noche tú me llevas al fin.
  rationale: La revisión mantiene todas las decisiones de fondo del expediente inglés, pero corrige formulaciones españolas poco naturales o imprecisas. Se añade artículo en la imagen pastoral, se aclara la comparación con el tejedor, se mantiene el cambio poético de sujeto, y se reemplaza «tú me llevas a su fin» por «tú me llevas al fin», que es fiel y natural. También se ajusta la nota c para preservar mejor la alternativa léxica documentada.
