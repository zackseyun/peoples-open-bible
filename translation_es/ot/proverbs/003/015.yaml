review_pass:
  verdict: revise
  source_alignment_summary: 'La traducción española refleja bien la estructura y el sentido básico del hebreo: la sabiduría personificada como «ella», el comparativo «más preciosa», y la comparación negativa final. También preserva correctamente la nota léxica sobre פְּנִינִים. Sin embargo, «todos tus deseos no se pueden comparar con ella» suena menos natural en español y puede sugerir deseos subjetivos más que las cosas deseables o apreciadas.'
  spanish_quality_summary: El borrador es claro y digno, pero la cláusula final necesita un ajuste menor de naturalidad y precisión semántica. En español bíblico natural, «ninguna de tus cosas deseables» sería demasiado rígido, pero «nada de lo que deseas» comunica mejor la fuerza distributiva de וְכָל ... לֹא y evita la lectura de deseos internos. El resto del verso está bien logrado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ella» preserva la personificación; «gemas» concuerda con la incertidumbre léxica mejor que «rubíes» en el texto principal, dejando la alternativa en nota. No hay términos teológicos especiales en este versículo.
  issues:
  - severity: medium
    issue: La frase «todos tus deseos no se pueden comparar con ella» es poco idiomática en español.
    rationale: Aunque sigue de cerca el inglés auditado, en español suena forzada y pesada. La negación distributiva se expresa mejor con «nada de lo que deseas puede compararse con ella».
  - severity: medium
    issue: «Tus deseos» puede inclinarse hacia deseos subjetivos en vez de cosas deseables.
    rationale: חֲפָצֶיךָ puede referirse a aquello que uno desea o aprecia. En este contexto comparativo de valor, conviene una formulación que incluya naturalmente el objeto de deseo, no solo el acto interno de desear.
  revised_spanish_text: Ella es más preciosa que las gemas[a], y nada de lo que deseas puede compararse con ella.
