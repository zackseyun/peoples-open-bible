translation:
  language: es
  text: Porque él creó todas las cosas para que existieran, y las criaturas del mundo[a] son saludables, y en ellas no hay veneno de destrucción, ni el dominio de Hades[b] sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las criaturas del mundo son benéficas» o «los orígenes del mundo son favorables». La expresión griega «las generaciones del mundo» es amplia y puede referirse a lo producido dentro de la creación.
    reason: lexical_alternative
  - marker: b
    text: O «el reino de Hades». El griego puede denotar tanto una esfera como un poder gobernante.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκτισεν
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - formó
  - hizo
  lexicon: BDAG
  rationale: κτίζω expresa creación u origen de la existencia; «creó» preserva mejor el acto divino de dar ser que opciones más genéricas como «hizo».
- source_word: εἰς τὸ εἶναι
  english_pob_choice: that they might exist
  chosen_spanish: para que existieran
  alternatives_spanish:
  - para existir
  - a fin de que existieran
  lexicon: BDAG
  rationale: La construcción expresa finalidad. «Para que existieran» conserva esa orientación al ser sin sonar artificial en español.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el conjunto de la creación
  lexicon: BDAG
  rationale: La expresión abarca la totalidad de lo creado; «todas las cosas» es claro y suficientemente amplio en español.
- source_word: σωτήριοι
  english_pob_choice: wholesome
  chosen_spanish: saludables
  alternatives_spanish:
  - benignas
  - beneficiosas
  - salvíficas
  lexicon: LSJ
  rationale: En este contexto creacional, el adjetivo apunta a lo que favorece la vida y no a una noción explícitamente soteriológica. «Saludables» mantiene esa fuerza vivificante.
- source_word: αἱ γενέσεις τοῦ κόσμου
  english_pob_choice: the creatures of the world
  chosen_spanish: las creaturas del mundo
  alternatives_spanish:
  - las generaciones del mundo
  - las producciones del mundo
  - los seres del mundo
  lexicon: LSJ
  rationale: γένεσις puede referirse a lo que ha llegado a ser, a las producciones o a los seres generados. «Creaturas del mundo» recoge mejor el sentido de seres creados en este pasaje que «generaciones», que en español suena demasiado temporal.
- source_word: φάρμακον ὀλέθρου
  english_pob_choice: poison of destruction
  chosen_spanish: veneno de destrucción
  alternatives_spanish:
  - veneno mortífero
  - fármaco de ruina
  - droga de destrucción
  lexicon: LSJ
  rationale: φάρμακον puede ser veneno o sustancia nociva en este contexto. «Veneno de destrucción» transmite con transparencia la idea de algo mortal y conserva la relación genitiva.
- source_word: ᾅδου βασίλειον
  english_pob_choice: the dominion of Hades
  chosen_spanish: el dominio de Hades
  alternatives_spanish:
  - el reino de Hades
  - el poder de Hades
  - el reino del Hades
  lexicon: BDAG
  rationale: βασίλειον puede expresar dominio, reino o poder real. «Dominio de Hades» sigue de cerca la opción inglesa y evita reducir el término a «sepulcro» o «infierno».
- source_word: ἐπὶ γῆς
  english_pob_choice: on earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en la tierra firme
  - sobre la faz de la tierra
  lexicon: BDAG
  rationale: La frase localiza la negación del poder de Hades en la esfera terrenal. «Sobre la tierra» suena natural y conserva la imagen espacial del griego.
theological_decisions:
- issue: Sentido de σωτήριοι en un contexto de creación
  english_pob_reading: life-promoting or wholesome rather than explicitly salvific
  chosen_spanish_reading: saludables, es decir, favorables a la vida
  alternative_spanish_readings:
  - salvíficas
  - salvadoras
  - benéficas
  rationale: El contraste inmediato es con el veneno y la destrucción, no con una doctrina explícita de salvación. «Saludables» conserva la orientación hacia la vida sin añadir una carga soteriológica ajena al pasaje.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it'
- issue: Cómo renderizar ᾅδης
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el sepulcro
  - la muerte
  - el inframundo
  rationale: El griego usa ᾅδης explícitamente. Mantener «Hades» preserva el término fuente y su posible valor como poder o esfera, sin colapsarlo en una equivalencia interpretativa.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés auditado en cuanto a la orientación de finalidad de εἰς τὸ εἶναι, la lectura de γενέσεις como realidades creadas dentro del mundo y la preferencia por un lenguaje más natural para σωτήριοι y ἐπὶ γῆς, pero reexpresa esos matices en español con un léxico más transparente y pubicable.
  spanish_consistency_notes:
  - Se mantiene «Hades» por coherencia con la terminología POB para ᾅδης.
  - Se evita «SEÑOR» o cualquier sustitución devocional no presente en el texto.
  - «Creaturas» se usa de forma deliberada para conservar el matiz de seres creados; si se prefiere un registro menos marcado, la alternativa sería «seres».
  - El sintagma «veneno de destrucción» conserva la fuerza genitiva sin suavizar el paralelismo con la vida preservada por la creación.
