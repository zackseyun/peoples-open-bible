translation:
  language: es
  text: 'Así dice Yahvé: El pueblo que sobrevivió a la espada halló favor en el desierto; Israel[a], cuando iba para hallar reposo para él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando él fue a dar reposo a Israel». El hebreo de la cláusula final es difícil y puede entenderse de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: se conserva el nombre propio del pacto en lugar de una máscara litúrgica. «Yahvé» es la forma estándar del proyecto en español y comunica mejor el referente del hebreo que «SEÑOR».'
- source_word: מָצָא חֵן
  english_pob_choice: found favor
  chosen_spanish: halló favor
  alternatives_spanish:
  - encontró gracia
  - halló gracia
  lexicon: HALOT
  rationale: El giro hebreo expresa recibir favor; en español, «halló favor» mantiene el valor idiomático sin imponer una lectura doctrinal posterior. «Gracia» sería posible, pero aquí «favor» refleja mejor el matiz relacional del contexto.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto inhóspito
  - en la estepa
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede abarcar «wilderness/steppe», en español bíblico «desierto» es claro y natural. No se elige «desierto» en sentido moderno de arena estéril, sino como lugar despoblado y de tránsito.
- source_word: עַם שְׂרִידֵי חָרֶב
  english_pob_choice: the people who survived the sword
  chosen_spanish: El pueblo que sobrevivió a la espada
  alternatives_spanish:
  - el pueblo, sobrevivientes de la espada
  - el pueblo escapado de la espada
  lexicon: HALOT
  rationale: La expresión es literalmente remanentes/sobrevivientes de la espada. «Sobrevivió a la espada» conserva la imagen de juicio bélico y suena natural en español, sin diluir el sustantivo colectivo עַם.
- source_word: הָלוֹךְ
  english_pob_choice: went
  chosen_spanish: al ir
  alternatives_spanish:
  - yendo
  - cuando iba
  lexicon: HALOT
  rationale: El infinitivo absoluto tiene función verbal/adverbial en una cláusula difícil. «Al ir» reproduce el movimiento de manera compacta y evita forzar una oración más interpretativa de lo que permite el hebreo.
- source_word: לְהַרְגִּיעוֹ
  english_pob_choice: to find rest for him
  chosen_spanish: a buscarle reposo
  alternatives_spanish:
  - a darle reposo
  - a traerle reposo
  lexicon: HALOT
  rationale: El hiphil de רגע puede significar causar reposo o dar reposo; con sufijo masculino singular, la frase permite varias relaciones sintácticas. «Buscarle reposo» preserva la ambigüedad del hebreo y la idea de moverse hacia el reposo, sin decidir prematuramente quién es el agente ni el beneficiario último.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio «Israel» como en el original. En español, se conserva además como sujeto/aposición dentro de la cláusula difícil, en línea con la revisión auditada del POB en inglés.
theological_decisions:
- issue: 'Cláusula final difícil: הָלוֹךְ לְהַרְגִּיעוֹ יִשְׂרָאֵל'
  english_pob_reading: 'The POB preserves the ambiguity: ''Israel, when it went to find rest for him.'' A footnote allows the alternative: ''when he went to give Israel rest.'''
  chosen_spanish_reading: «Israel, al ir a buscarle reposo» mantiene la ambigüedad principal, dejando abierta la relación exacta entre el sujeto, el movimiento y el beneficiario del reposo.
  alternative_spanish_readings:
  - «cuando fue a darle reposo a Israel»
  - «cuando Israel fue a buscar reposo»
  - «cuando él fue a dar reposo a Israel»
  rationale: El hebreo es sintácticamente difícil por el infinitivo absoluto, el hiphil con sufijo de tercera masculina singular y la colocación final de ישראל. En vez de resolver la tensión, la traducción conserva el desplazamiento hacia el reposo y evita decidir indebidamente quién es el agente implícito. Esto sigue la pauta del POB de preservar la ambigüedad donde el texto fuente la exige.
  doctrine_reference: Translation philosophy §3, 'Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del POB en inglés que colocó «Israel» en aposición al «pueblo que sobrevivió a la espada». En español se refleja esa misma relación sintáctica mediante la coma antes de «Israel», y se conserva la ambigüedad de la cláusula final en una forma breve y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustituto litúrgico porque el expediente exige transliteración del nombre divino.
  - «favor» se mantiene para מָצָא חֵן, no «gracia», porque aquí la idiomaticidad relacional pesa más que la carga teológica de «gracia».
  - «desierto» funciona como equivalente español de מִדְבָּר sin añadir matices que el texto no exige.
  - La nota al pie marca la alternativa interpretativa principal y conserva la dificultad del hebreo en la cláusula final.
