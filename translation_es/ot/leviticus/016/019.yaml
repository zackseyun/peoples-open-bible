review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia verbal y el sentido general del hebreo: rociar sangre sobre el altar con el dedo siete veces, luego limpiarlo/purificarlo y consagrarlo a causa de las impurezas rituales de los hijos de Israel. Sin embargo, omite las notas léxicas que el rastro inglés preserva para las alternativas significativas de וְטִהֲרוֹ, וְקִדְּשׁוֹ y בְּנֵי יִשְׂרָאֵל.'
  spanish_quality_summary: El español es claro y natural. "Rociará parte de la sangre" y "con su dedo siete veces" suenan bien. La frase "lo limpiará y lo consagrará de las impurezas" es comprensible, aunque en este contexto cultual "purificará" expresa mejor el valor sacerdotal de טהר en español bíblico sin volverse ininteligible. El resto mantiene un registro moderno y digno.
  glossary_alignment: No hay conflictos con la terminología del proyecto. "Los hijos de Israel" respeta la política de transparencia formal para בְּנֵי יִשְׂרָאֵל. "Consagrará" para קדש es adecuado. La principal mejora es alinear mejor טהר con el campo ritual mediante "purificará", conservando en nota la alternativa "limpiará" si se desea preservar accesibilidad.
  issues:
  - severity: medium
    issue: Faltan notas al pie para alternativas léxicas preservadas en el POB inglés.
    rationale: El expediente inglés documenta alternativas relevantes para "purify/cleanse", "sanctify/consecrate" y "sons of Israel". La revisión española debe conservar esas alternativas significativas con anclajes en el texto.
  - severity: medium
    issue: '"Lo limpiará" debilita ligeramente el matiz ritual técnico de טהר en contexto sacerdotal.'
    rationale: Aunque "limpiará" no es incorrecto, en Levítico "purificará" comunica más naturalmente en español bíblico la limpieza ritual del altar sin reducirla a limpieza ordinaria.
  revised_spanish_text: Rociará parte de la sangre sobre él con su dedo siete veces, y lo purificará[a] y lo consagrará[b] de las impurezas de los hijos[c] de Israel.
  revised_footnotes:
  - marker: a
    text: O «lo limpiará»; el verbo hebreo es un término sacerdotal común para hacer que algo quede ritualmente limpio.
    reason: lexical_alternative
  - marker: b
    text: O «lo santificará» o «lo hará santo».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «los hijos de Israel»; muchas versiones lo traducen de forma más idiomática como «los israelitas» o «el pueblo de Israel».
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y el sentido del borrador, pero se ajusta טהר a «purificará» para reflejar mejor el lenguaje ritual levítico en español y se añaden las notas léxicas exigidas por el rastro de auditoría inglés, con marcadores únicos anclados en el texto.
