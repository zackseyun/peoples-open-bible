id: ACT.13.47
reference: Acts 13:47
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὕτως γὰρ ἐντέταλται ἡμῖν ὁ κύριος· Τέθεικά σε εἰς φῶς ἐθνῶν τοῦ εἶναί σε εἰς σωτηρίαν ἕως ἐσχάτου τῆς γῆς.
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/047.yaml
  text: 'For so the Lord has commanded us: ‘I have set you as a light for the nations[b][a], so that you may be for salvation to the end of the earth.’'
  footnotes:
  - marker: a
    text: Or 'for a light to the Gentiles.' The Greek ἐθνῶν can mean 'nations' or, in many contexts, 'Gentiles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to the ends of the earth.'
    reason: lexical_alternative
translation:
  language: ko
  text: 주께서 우리에게 이렇게 명령하셨기 때문입니다. 「내가 너를 열방의 빛으로 세웠으니, 너는 땅 끝까지 구원이 되리라.」」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 이사야 49:6 인용 — κύριος 호칭 처리
  chosen_reading: 내가 너를 열방의 빛으로 세웠으니, 너는 땅 끝까지 구원이 되리라
  alternative_readings:
  - 내가 너를 이방의 빛으로 삼았으니…
  rationale: 이사야 49:6(LXX)에서 화자 κύριος는 야훼이지만 인용 구조 안에 호격은 없고 「내가」로 시작한다. 본문 내 호격이 야훼임이 명시되어 있지 않으므로 「야훼」를 본문에 삽입하지 않고 1인칭 직접 인용으로 옮겼다. ἐθνῶν은 「열방」으로 옮겨 이방인 사명의 광역성을 살린다.
  doctrine_reference: 'DOCTRINE.md: LXX-YHWH citation policy; mission to the nations'
