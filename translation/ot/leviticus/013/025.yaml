id: LEV.13.25
reference: Leviticus 13:25
source:
  edition: WLC
  text: וְ/רָאָ֣ה אֹתָ֣/הּ הַ/כֹּהֵ֡ן וְ/הִנֵּ֣ה נֶהְפַּךְ֩ שֵׂעָ֨ר לָבָ֜ן בַּ/בַּהֶ֗רֶת וּ/מַרְאֶ֨/הָ֙ עָמֹ֣ק מִן הָ/ע֔וֹר צָרַ֣עַת הִ֔וא בַּ/מִּכְוָ֖ה פָּרָ֑חָה וְ/טִמֵּ֤א אֹת/וֹ֙ הַ/כֹּהֵ֔ן נֶ֥גַע צָרַ֖עַת הִֽוא־׃
translation:
  text: And the priest shall examine it[a], and behold, the hair in the bright spot has turned white and its appearance is deeper than the skin, it is a skin disease that has broken out in the burn scar; and the priest shall pronounce him unclean. It is an infection of skin disease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tsaraʿat, a broad term for a serious skin affliction; traditionally rendered 'leprosy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאָה
  chosen: shall examine
  alternatives:
  - shall see
  - looks at
  lexicon: HALOT
  rationale: In priestly diagnostic contexts, ראה commonly carries the sense of inspection rather than mere visual perception. 'Shall examine' communicates the formal evaluative action of the priest.
- source_word: בַּהֶרֶת
  chosen: bright spot
  alternatives:
  - bright patch
  - shining spot
  lexicon: HALOT
  rationale: The term denotes a visible bright lesion on the skin. 'Bright spot' is a natural English rendering that preserves the concrete dermatological sense without importing later medical terminology.
- source_word: נֶהְפַּךְ שֵׂעָר לָבָן
  chosen: the hair ... has turned white
  alternatives:
  - white hair has appeared
  - the hair became white
  lexicon: HALOT
  rationale: The passive/reflexive verbal idea is best represented by 'has turned white,' matching the diagnostic sign described in the Hebrew.
- source_word: מַרְאֶהָ עָמֹק מִן־הָעוֹר
  chosen: its appearance is deeper than the skin
  alternatives:
  - it appears deeper than the skin
  - its sight is deeper than the skin
  lexicon: HALOT
  rationale: This is a standard diagnostic formula in Leviticus. 'Appearance' preserves מראה, while 'deeper than the skin' reflects the visible depression or depth indicated by עמק in context.
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprosy
  - defiling skin disease
  lexicon: HALOT
  rationale: The Hebrew term in Leviticus covers a broader ritual-dermatological category than modern Hansen's disease. 'Skin disease' avoids misleading medical specificity while remaining readable.
- source_word: מִכְוָה
  chosen: burn scar
  alternatives:
  - burn
  - place of the burn
  - burned area
  lexicon: HALOT
  rationale: The noun refers to the result or site of a burn. 'Burn scar' best fits the context of a lesion arising in previously burned flesh.
- source_word: פָּרָחָה
  chosen: has broken out
  alternatives:
  - has sprouted
  - has spread
  lexicon: HALOT
  rationale: In skin-disease contexts, פרח describes an eruption or outbreak. 'Has broken out' is idiomatic and contextually precise.
- source_word: טִמֵּא אֹתוֹ
  chosen: shall pronounce him unclean
  alternatives:
  - shall make him unclean
  - shall declare him unclean
  lexicon: HALOT
  rationale: The priest does not causally make the person unclean but renders an authoritative ritual verdict. 'Pronounce' captures the juridical-priestly function.
- source_word: נֶגַע צָרַעַת
  chosen: an infection of skin disease
  alternatives:
  - a diseased infection
  - an affliction of skin disease
  - a plague of skin disease
  lexicon: HALOT
  rationale: נגע is a struck mark, affliction, or infection-like lesion. 'Infection' is understandable modern English and fits the diagnostic setting, while retaining the construct relation with צָרַעַת.
