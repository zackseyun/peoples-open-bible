translation:
  language: es
  text: Ellos son vanidad[a], una obra de engaño; al tiempo de su castigo[b] perecerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vaciedad» o «inutilidad».
    reason: lexical_alternative
  - marker: b
    text: O «al tiempo de su visitación», es decir, cuando venga sobre ellos el juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶבֶל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vaciedad
  - inutilidad
  - vanidad
  lexicon: HALOT
  rationale: En este contexto profético contra los ídolos, הֶבֶל comunica insustancialidad e inutilidad; «vanidad» conserva el tono bíblico tradicional sin perder el sentido de vacío o falta de peso.
- source_word: הֵמָּה
  english_pob_choice: they are
  chosen_spanish: Ellos son
  alternatives_spanish:
  - Son
  - Ellos son
  lexicon: HALOT
  rationale: 'El pronombre independiente es enfático y funciona predicativamente con הֶבֶל. En español se expresa con sujeto explícito para conservar ese énfasis: «Ellos son…».'
- source_word: מַעֲשֵׂה
  english_pob_choice: a work
  chosen_spanish: una obra
  alternatives_spanish:
  - una obra
  - una labor
  - una producción
  lexicon: HALOT
  rationale: La construcción singular colectiva se refleja bien con «una obra», que es natural en español y mantiene la idea de algo producido o fabricado.
- source_word: תַּעְתֻּעִים
  english_pob_choice: delusion
  chosen_spanish: delirio
  alternatives_spanish:
  - delusión
  - engaño
  - delirio
  lexicon: HALOT
  rationale: El campo semántico incluye desorientación, engaño y cosa ilusoria. «Delirio» permite conservar la fuerza de algo desviado o sin verdad, aunque no agota todas las posibilidades; por eso se preserva la alternativa en nota.
- source_word: בְּעֵת
  english_pob_choice: at the time of
  chosen_spanish: al tiempo de
  alternatives_spanish:
  - en el tiempo de
  - cuando
  - al tiempo de
  lexicon: HALOT
  rationale: «Al tiempo de» reproduce la referencia temporal formal de la construcción hebrea y suena natural en registro bíblico en español.
- source_word: פְּקֻדָּתָם
  english_pob_choice: their punishment
  chosen_spanish: su castigo
  alternatives_spanish:
  - su visitación
  - su visita
  - su rendición de cuentas
  lexicon: HALOT
  rationale: En contexto judicial, פְּקֻדָּה puede significar visita de juicio o castigo. «Castigo» aclara el sentido en español moderno sin borrar la posibilidad más literal de «visitación», que se conserva como alternativa.
- source_word: יֹאבֵדוּ
  english_pob_choice: they will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - perecerán
  - serán destruidos
  lexicon: HALOT
  rationale: El qal imperfecto de אבד expresa perecer, venir a ruina o desaparecer. «Perecerán» es directo, sobrio y fiel al valor verbal.
theological_decisions:
- issue: Naturaleza de la denuncia profética contra los ídolos
  english_pob_reading: The verse describes idols as empty and doomed objects, without importing additional metaphysical claims beyond the text.
  chosen_spanish_reading: El versículo presenta a los ídolos como vacíos, producto fabricado y destinado a perecer, sin añadir afirmaciones doctrinales que el hebreo no haga explícitas.
  alternative_spanish_readings:
  - leerlos como «falsos dioses» en forma interpretativa
  - parafrasearlos como «fraudes»
  rationale: La expresión hebrea concentra la burla profética en su vaciedad, su condición de obra hecha y su destrucción final. La traducción conserva esa tensión sin ampliar el contenido más allá del texto.
  doctrine_reference: 'Translation philosophy: no importar afirmaciones doctrinales que el texto no enuncia; preservar el sentido llano del hebreo.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión auditada del inglés POB, que ajustó תַּעְתֻּעִים a «delusion» en vez de «mockery» para reflejar mejor la idea de desvío, engaño o ilusión. La versión española mantiene esa decisión semántica con «delirio» y la complementa con nota de alternativas.
  spanish_consistency_notes:
  - Se emplea «vanidad» para הֶבֶל conforme al uso profético tradicional, sin ocultar su sentido de vaciedad.
  - Se usa «castigo» para פְּקֻדָּה por claridad contextual, conservando en nota la alternativa más literal «visitación» implícita en el auditor inglés.
  - No se introduce «SEÑOR» ni lenguaje litúrgico no presente; el verso no contiene el nombre divino.
  - El estilo mantiene registro bíblico moderno y legible, evitando calcos duros pero sin expandir el sentido del hebreo.
