translation:
  language: es
  text: Y se pusieron en pie los sacerdotes y los levitas, dispuestos por divisiones[a], para las obras del Señor Dios de Israel, conforme al libro de Moisés[b], y los guardias de las puertas, en cada puerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según tribus». El griego dice literalmente «por tribus», probablemente refiriéndose a las divisiones ordenadas del servicio sacerdotal y levítico.
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo destaca que se fortalecieron las manos en la obra de la casa de Dios; aquí el griego se centra en la colocación ordenada de sacerdotes y levitas para las obras del Señor Dios de Israel.
    reason: cross_reference
lexical_decisions:
- source_word: ἔστησαν
  english_pob_choice: stood
  chosen_spanish: se pusieron en pie
  alternatives_spanish:
  - estuvieron
  - se mantuvieron en pie
  - tomaron su puesto
  lexicon: LSJ
  rationale: El griego expresa que se colocaron de pie o tomaron su lugar. En español, «se pusieron en pie» comunica con naturalidad la acción narrativa y mantiene la idea de colocación ordenada sin añadir matices ajenos.
- source_word: ἐστολισμένοι
  english_pob_choice: arrayed
  chosen_spanish: vestidos y ordenados
  alternatives_spanish:
  - adornados
  - vestidos
  - equipados
  lexicon: LSJ
  rationale: El participio sugiere estar preparados o arreglados para el servicio. «Vestidos y ordenados» conserva la idea de disposición ceremonial sin sobreespecificar vestiduras sacerdotales que el griego no menciona explícitamente.
- source_word: κατὰ φυλάς
  english_pob_choice: by divisions
  chosen_spanish: por divisiones
  alternatives_spanish:
  - según tribus
  - por cursos
  - por grupos
  lexicon: LSJ
  rationale: Literalmente significa «según tribus», pero en este contexto cultual apunta a repartos organizados para el servicio. «Por divisiones» conserva la organización interna y evita imponer «tribus» como si fuera un dato étnico primario en español.
- source_word: ἐπὶ τῶν ἔργων
  english_pob_choice: for the works
  chosen_spanish: para las obras
  alternatives_spanish:
  - sobre las obras
  - para el servicio
  - para los deberes
  lexicon: LSJ
  rationale: La construcción con ἐπί aquí marca ámbito o responsabilidad. «Para las obras» sigue de cerca el griego y deja abierta la referencia al servicio del templo, apoyada por el paralelo hebreo.
- source_word: Κυρίου θεοῦ Ἰσραήλ
  english_pob_choice: the Lord God of Israel
  chosen_spanish: el Señor Dios de Israel
  alternatives_spanish:
  - el Señor, Dios de Israel
  - el Señor Dios del Israel
  lexicon: LSJ
  rationale: Se conserva la secuencia titulativa del griego. Aunque el proyecto usa «Yahvé» para יהוה en textos hebreos, aquí la fuente primaria es κύριος en griego, por lo que corresponde «Señor» en la traducción principal.
- source_word: ἀκολούθως τῇ Μωσέως βίβλῳ
  english_pob_choice: in accordance with the book of Moses
  chosen_spanish: conforme al libro de Moisés
  alternatives_spanish:
  - de acuerdo con el libro de Moisés
  - siguiendo el libro de Moisés
  lexicon: LSJ
  rationale: La frase indica conformidad normativa con la instrucción escrita de Moisés. «Conforme a» es una equivalencia natural y precisa en español, sin perder el sentido regulativo.
- source_word: θυρωροί
  english_pob_choice: gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardapuertas
  - los guardianes de la puerta
  - los porteros del templo
  lexicon: LSJ
  rationale: «Porteros» es el término español tradicional y comprensible para quienes custodian las entradas; mantiene el sentido funcional del oficio sin sonar técnico o artificial.
- source_word: ἐφʼ ἑκάστου πυλῶνος
  english_pob_choice: at each gate
  chosen_spanish: en cada puerta
  alternatives_spanish:
  - junto a cada puerta
  - en cada portal
  - a cada entrada
  lexicon: LSJ
  rationale: El griego expresa ubicación en cada acceso. «En cada puerta» es la forma más directa y natural en español para el contexto del templo.
theological_decisions:
- issue: Cómo reflejar el título divino Κύριος en un texto griego con paralelo hebreo que remite al nombre divino
  english_pob_reading: the Lord; the Hebrew parallel emphasizes YHWH, but the main text follows the Greek κύριος
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: Como la base textual de esta entrada es el griego de 1 Esdras, se mantiene «el Señor» para κύριος. No se traslada automáticamente «Yahvé» al texto principal, aunque el paralelo hebreo apunte al nombre divino, porque eso mezclaría niveles textuales sin una señal explícita en el versículo griego.
  doctrine_reference: 'DOCTRINE.md: κύριος → Señor; יְהוָה → Yahvé en textos hebreos'
- issue: Valor de κατὰ φυλάς en un contexto de servicio sacerdotal y levítico
  english_pob_reading: by divisions; alternatively, according to tribes
  chosen_spanish_reading: por divisiones
  alternative_spanish_readings:
  - según tribus
  - por cursos
  rationale: La traducción conserva la tensión entre el valor literal de φυλαί y su función organizativa. «Por divisiones» evita reducir el término a etnia o genealogía cuando el contexto cultual señala distribución ordenada para el servicio.
  doctrine_reference: Principio POB de no borrar una tensión léxica cuando el contexto la resuelve parcialmente, pero no de forma absoluta
- issue: Relación entre el griego y el paralelo hebreo en la expresión de la obra del templo
  english_pob_reading: for the works of the Lord God of Israel; the Hebrew parallel emphasizes strengthening their hands in the work of the house of God
  chosen_spanish_reading: para las obras del Señor Dios de Israel
  alternative_spanish_readings:
  - para el servicio del Señor Dios de Israel
  - para los trabajos del Señor Dios de Israel
  rationale: Se sigue el griego, que usa «obras» y no la formulación hebrea de «fortalecer sus manos». La redacción española mantiene esa diferencia textual y no la armoniza con el paralelo masorético en el cuerpo principal.
  doctrine_reference: Principio de prioridad del testimonio fuente primario (griego) con apoyo comparativo del paralelo hebreo
translation_notes:
  revision_awareness: 'Se revisó la correspondencia con el texto griego de Swete: ἔστησαν → acción de colocarse en pie; ἐστολισμένοι → disposición/vestimenta ceremonial; κατὰ φυλάς → organización por divisiones; ἐπὶ τῶν ἔργων → ámbito de responsabilidad; Κυρίου θεοῦ Ἰσραήλ → título divino mantenido como «el Señor Dios de Israel»; ἀκολούθως τῇ Μωσέως βίβλῳ → conformidad con el libro de Moisés; θυρωροί ἐφʼ ἑκάστου πυλῶνος → porteros en cada puerta. No se aplicaron revisiones editoriales adicionales respecto al pasaje fuente.'
  spanish_consistency_notes:
  - Se usa «el Señor» para κύριος, conforme al criterio del griego fuente.
  - Se evita introducir «Yahvé» en el cuerpo principal porque el texto base aquí es griego, aunque el paralelo hebreo remita al nombre divino.
  - «Porteros» mantiene la función cultual sin regionalismos.
  - «Por divisiones» conserva la estructura organizativa sin desplazarla a una lectura exclusivamente tribal.
  - La puntuación separa adecuadamente la cláusula final para reflejar el cierre enumerativo del griego.
