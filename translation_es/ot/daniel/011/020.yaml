review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y mantiene la mayoría de las decisiones del POB, pero en el punto clave מַעֲבִיר נוֹגֵשׂ se aleja de la preferencia auditada. El inglés POB eligió ''who will send an exactor'' porque en este contexto dinástico la idea idiomática no es simplemente ''hacer pasar'' sino despachar a un funcionario recaudador a través del reino. El resto del versículo está sustancialmente alineado: ''Entonces se levantará en su lugar'', ''dentro de pocos días'', ''será quebrantado'', y ''no en ira ni en batalla'' conservan bien el sentido.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'hará pasar a un exactor por el esplendor del reino' suena algo forzado y menos natural que 'enviará'. También conviene pulir la coordinación final a 'ni en batalla', que en español fluye mejor con la negación previa. 'Será quebrantado' es aceptable, aunque 'será quebrado' sería más llano; no es necesario cambiarlo.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. La principal cuestión léxica es la fidelidad a la decisión auditada sobre מַעֲבִיר נוֹגֵשׂ: en español debe preferirse ''enviará un exactor'' o equivalente natural, con nota para ''recaudador de tributos'' / ''opresor''. ''Exactor'' es válido si se aclara en nota.'
  issues:
  - severity: medium
    issue: מַעֲבִיר נוֹגֵשׂ se tradujo 'hará pasar a un exactor'
    rationale: Aunque formalmente cercano al hebreo, el propio expediente inglés documenta que aquí la mejor equivalencia es 'send' por idiomaticidad contextual. En español 'hará pasar a un exactor' resulta rígido y puede sugerir mero tránsito, no el acto de despachar a un funcionario para exigir tributo.
  - severity: low
    issue: La nota [a] defiende una opción menos preferida que la auditada
    rationale: La nota actual privilegia 'hacer pasar' como si fuera superior, pero el POB inglés preservó 'tax collector' / 'oppressor' como alternativas a 'exactor', no una defensa de una redacción menos natural. Conviene reorientar la nota a las alternativas léxicas de נוֹגֵשׂ.
  - severity: low
    issue: Coordinación final 'aunque no en ira y no en batalla'
    rationale: Es comprensible, pero en español suena más natural 'aunque no en ira ni en batalla' o 'pero no en ira ni en batalla', manteniendo el paralelismo sin aspereza sintáctica.
  revised_spanish_text: Entonces se levantará en su lugar uno que enviará un exactor por el esplendor[a] del reino; pero dentro de pocos días será quebrantado, aunque no en ira[c] ni en batalla.
  revised_footnotes:
  - marker: a
    text: 'También: ''la gloria del reino''. El hebreo puede referirse al esplendor del reino o a su majestad de manera más general.'
    reason: lexical_alternative
  - marker: b
    text: O 'recaudador de tributos' u 'opresor' para 'exactor'. El término hebreo denota a alguien que exige tributo o pago.
    reason: lexical_alternative
  - marker: c
    text: 'También: ''pero no en ira'' o ''no por ira''. La expresión hebrea es algo comprimida.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la frase principal a la decisión léxica auditada del POB: en este contexto מַעֲבִיר נוֹגֵשׂ debe expresarse de manera natural como ''enviará un exactor'', no ''hará pasar''. Se conserva ''exactor'' en el texto y se trasladan sus alternativas a nota. También se mejora la fluidez española con ''ni en batalla''. Añadí la nota [c] al lugar correspondiente en el texto y mantuve la nota sobre ''esplendor/gloria''.'
