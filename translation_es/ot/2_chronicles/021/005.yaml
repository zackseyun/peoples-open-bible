- source_word: בְּמָלְכֹו
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando se hizo rey
  - al comenzar a reinar
  - en su reinado
  lexicon: HALOT
  rationale: La construcción preposición + infinitivo con sufijo señala el momento de acceso al trono. 'Comenzó a reinar' expresa con claridad ese inicio de reinado sin perder el sentido temporal.
- source_word: וּשְׁמוֹנֶה שָׁנִים
