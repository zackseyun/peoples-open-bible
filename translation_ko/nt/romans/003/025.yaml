id: ROM.3.25
reference: Romans 3:25
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃν προέθετο ὁ θεὸς ἱλαστήριον ⸀διὰ πίστεως ἐν τῷ αὐτοῦ αἵματι εἰς ἔνδειξιν τῆς δικαιοσύνης αὐτοῦ διὰ τὴν πάρεσιν τῶν προγεγονότων ἁμαρτημάτων
base_translation:
  language: en
  yaml_path: translation/nt/romans/003/025.yaml
  text: whom God put forward as an atoning sacrifice[a] through faith in his blood[b], to demonstrate his righteousness[c], because of the passing over of previously committed sins.
  footnotes:
  - marker: a
    text: Or "propitiation" (Reformation-era god-ward emphasis); or "mercy seat" (the OT כפרת / ἱλαστήριον in LXX Lev — the gold cover of the ark where atoning blood was sprinkled). Both are preserved per DOCTRINE.md, which mandates "atoning sacrifice" as the default rendering to preserve the term's full functional range without committing to a single interpretive strand.
    reason: lexical_alternative
  - marker: b
    text: Or "through faith, by his blood"; the phrase may also be understood as "through faith in his blood."
    reason: alternative_reading
  - marker: c
    text: Or "justice."
    reason: lexical_alternative
translation:
  language: ko
  text: 하나님께서는 그분을 속죄소[a]로, 곧 그분의 피 안에서 믿음을 통하여 세워 두셨습니다. 이는 하나님의 의를 드러내시려는 것이었으니, 그분의 인내하심 가운데 이전에 지은 죄들을 간과해 두셨기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἱλαστήριον은 (1) 「속죄소」 — 70인역 레위기 16장의 כפרת(언약궤 뚜껑, 대속죄일에 속죄의 피가 뿌려진 자리)를 가리키는 용어로, 바울이 이 표상을 끌어와 그리스도를 「속죄의 자리」로 제시한다는 읽기, (2) 「속죄제물」 — 진노를 누그러뜨리는 화목 제물로서의 그리스도라는 읽기가 모두 가능하다. 본 번역은 70인역 레위기 16장 배경의 강력함, 바울 문맥에서의 정관사가 가리키는 종말론적 「자리」, DOCTRINE.md의 원어 우선 원칙에 따라 「속죄소」를 채택하고 「속죄제물」을 본 각주에 둔다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἱλαστήριον
  english_pob_choice: atoning sacrifice
  chosen_korean: 속죄소
  alternatives_korean:
  - 속죄제물
  - 화목제물
  - 속죄의 자리
  lexicon: BDAG
  rationale: 이 단어는 70인역에서 21회 중 거의 모두가 레위기 16장의 כפרת(언약궤 뚜껑·속죄의 자리)를 가리킨다. 바울이 정관사 없이 ἱλαστήριον을 쓴 것은 종말론적 「속죄의 자리」로서의 그리스도라는 표상을 환기한다는 읽기가 강력하다. 한국어 「속죄소」(개역개정 히 9:5 등)는 이 70인역 배경을 분명히 살리는 어휘이다. 영어 POB의 「atoning sacrifice」는 두 함의를 절충한 안이나, 한국어에서는 「속죄소」가 본문의 70인역 배경을 직접 드러낼 수 있으므로 이를 본문에 두고 「속죄제물」을 각주에 둔다.
- source_word: πάρεσιν
  english_pob_choice: passing over
  chosen_korean: 간과해 두셨
  alternatives_korean:
  - 넘기심
  - 미루어 두심
  lexicon: BDAG
  rationale: 「완전 사면(ἄφεσις)」이 아닌 「임시 간과(πάρεσις)」의 함의를 보존한다 — 단어의 정확한 신학적 무게.
theological_decisions:
- issue: 3:25 ἱλαστήριον — 「속죄소」 vs 「속죄제물」/「화목제물」
  chosen_reading: 속죄소
  alternative_readings:
  - 속죄제물
  - 화목제물
  rationale: 70인역에서 ἱλαστήριον은 거의 일관되게 레위기 16장의 כפרת(언약궤 뚜껑·속죄의 자리)를 가리킨다(LXX 출 25:17 이하, 레 16장 전체, 히 9:5도 동일 함의). 바울이 로마 회중에게 그리스도를 이 자리에 위치시키는 강한 신학적 환기(「하나님이 친히 베푸신 새로운 속죄의 자리」)를 한국어 「속죄소」가 가장 분명히 살린다. 「속죄제물」(propitiation 계열)은 진노 화목 함의에 기울고, 「화목제물」은 거의 종교개혁 신학 어휘로 굳어졌다. 본 번역은 70인역 배경 — 자리(place) 우선 — 의 신학적 강도를 살리되, 제물 읽기를 각주에 명시해 두 전통을 모두 보존한다.
  doctrine_reference: DOCTRINE.md §1+§5 — original-language primacy; LXX intertextual depth; preserve full functional range; explicitly named decision per instruction
- issue: 3:25 πίστεως의 위치 — 「믿음을 통하여 그분의 피 안에서」
  chosen_reading: 그분의 피 안에서 믿음을 통하여
  alternative_readings:
  - 그분의 피를 믿음으로 말미암아
  - 피 안에 있는 믿음을 통하여
  rationale: 헬라어 διὰ πίστεως ἐν τῷ αὐτοῦ αἵματι는 「πίστις in his blood」(피를 향한 믿음)로 읽힐 수도 있고, 「피 안에서 ... 믿음을 통하여」(두 별개 수단)로 읽힐 수도 있다. 본 번역은 두 전치사를 별개로 두는 후자의 직역적 읽기를 본문에 두고 모호성을 보존한다.
  doctrine_reference: DOCTRINE.md §5 — preserve ambiguity
