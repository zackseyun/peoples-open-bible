base_translation:
  language: en
  yaml_path: translation/ot/2_kings/019/035.yaml
  text: And that night the angel of Yahweh went out and struck down one hundred eighty-five thousand in the camp of Assyria[a]. When they rose early in the morning, behold[b], all of them were dead bodies.
  footnotes:
  - marker: a
    text: Or, more literally, 'And they rose early in the morning.' The Hebrew leaves the subject indefinite.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''corpses, dead''—an emphatic expression for the slain.'
    reason: lexical_alternative
