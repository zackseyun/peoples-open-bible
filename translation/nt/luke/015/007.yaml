id: LUK.15.7
reference: Luke 15:7
source:
  edition: SBLGNT
  text: λέγω ὑμῖν ὅτι οὕτως χαρὰ ⸂ἐν τῷ οὐρανῷ ἔσται⸃ ἐπὶ ἑνὶ ἁμαρτωλῷ μετανοοῦντι ἢ ἐπὶ ἐνενήκοντα ἐννέα δικαίοις οἵτινες οὐ χρείαν ἔχουσιν μετανοίας.
translation:
  text: I tell you[b][a], in the same way there will be joy in heaven over one sinner who has a change of mind than over ninety-nine righteous people who have no need of one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thus' or 'so.' The phrase links the heavenly joy to the point of the preceding parable.
    reason: lexical_alternative
  - marker: b
    text: The text says 'righteous,' which may be read straightforwardly or with irony in context; the translation preserves the wording without resolving the interpretation.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Common idiomatic introductory formula. 'I tell you' is natural modern English while preserving the direct address and solemn assertion.
- source_word: οὕτως
  chosen: in the same way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Connects this statement to the preceding parable's point. 'In the same way' makes the comparative force clear in contemporary English.
- source_word: χαρὰ ἐν τῷ οὐρανῷ ἔσται
  chosen: there will be joy in heaven
  alternatives:
  - joy will be in heaven
  - there will be joy in heaven's presence
  lexicon: BDAG
  rationale: Reorders for natural English while preserving future sense and locative phrase. 'In heaven' is the plain sense of the Greek.
- source_word: ἐπὶ ἑνὶ ἁμαρτωλῷ
  chosen: over one sinner
  alternatives:
  - because of one sinner
  - concerning one sinner
  lexicon: BDAG
  rationale: With χαρά, ἐπί here expresses occasion or basis for rejoicing; 'over' is the most idiomatic English rendering.
- source_word: μετανοοῦντι
  chosen: who has a change of mind
  alternatives:
  - repenting
  - who is repenting
  lexicon: BDAG
  rationale: Present participle describing the sinner as one who is repenting. Relative clause is smoother in English and preserves the active sense.
- source_word: ἢ
  chosen: than
  alternatives:
  - rather than
  - or
  lexicon: BDAG
  rationale: In this comparative construction after implied comparison of greater joy, 'than' best captures the sense. A wooden 'or' would be misleading in English.
- source_word: ἐνενήκοντα ἐννέα δικαίοις
  chosen: ninety-nine righteous people
  alternatives:
  - ninety-nine righteous ones
  - ninety-nine just people
  lexicon: BDAG
  rationale: δίκαιος here refers to persons regarded as righteous. 'People' is supplied for natural English since the adjective is substantival in Greek.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - who indeed
  - such as
  lexicon: BDAG
  rationale: Introduces a descriptive relative clause. The nuance of class/character is adequately conveyed by simple 'who' in English.
- source_word: οὐ χρείαν ἔχουσιν μετανοίας
  chosen: who have no need of one
  alternatives:
  - who do not need to repent
  - who have no need to repent
  lexicon: BDAG
  rationale: Closely follows the Greek nominal expression χρείαν ἔχειν + genitive while remaining idiomatic English.
