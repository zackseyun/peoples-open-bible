review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo, la lista de instrumentos y el sentido general de celebración cultual delante de Dios. Sin embargo, la frase «se estaban celebrando» no preserva fielmente el valor de מְשַׂחֲקִים en español natural; sugiere autorreferencia reflexiva impropia y distorsiona el sentido de actividad festiva. El resto de los elementos principales —«delante de Dios», «con todo su vigor/fuerza», y los instrumentos— están sustancialmente alineados con la evidencia fuente y con el rastro de auditoría inglés.
  spanish_quality_summary: 'La legibilidad general es buena, pero «se estaban celebrando» es antinatural y poco idiomático en español bíblico actual. También conviene simplificar el imperfecto progresivo a una forma más fluida: «celebraban». «Tamboriles» es comprensible, pero «panderos» suena más natural y ampliamente entendible en español eclesial contemporáneo para תֻפִּים. «Con todo su vigor» es aceptable, aunque «con todas sus fuerzas» sería más idiomático; no es imprescindible cambiarlo. El conjunto revisado gana claridad y dignidad sin perder precisión.'
  glossary_alignment: 'No hay conflicto con las directrices mayores del glosario. «Dios» para הָאֱלֹהִים está bien. La distinción «liras / arpas» preserva las decisiones léxicas documentadas. La principal corrección es al verbo de שׂחק: en español debe expresarse como «celebraban» o similar, no reflexivamente.'
  issues:
  - severity: high
    issue: «se estaban celebrando» es una traducción defectuosa de מְשַׂחֲקִים
    rationale: El hebreo describe actividad festiva/alegre, no que David e Israel «se celebraran» a sí mismos. La forma reflexiva en español altera el sentido y resulta poco natural.
  - severity: medium
    issue: El progresivo «estaban celebrando» es menos natural que «celebraban» en esta narración
    rationale: El participio hebreo puede representarse adecuadamente con imperfecto simple en español narrativo, evitando pesadez sin pérdida semántica.
  - severity: low
    issue: «Tamboriles» es menos claro y menos común que «panderos»
    rationale: Para תֻפִּים, «panderos» comunica mejor el instrumento de percusión tipo frame drum/tambourine en un español amplio y contemporáneo.
  revised_spanish_text: Y David y todo Israel celebraban[a] delante de Dios con todas sus fuerzas, con cantos, liras, arpas, panderos, címbalos y trompetas.
  revised_footnotes:
  - marker: a
    text: O «jugaban» o «se regocijaban delante de Dios»; el verbo hebreo puede denotar una actividad festiva y gozosa.
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal para expresar fielmente el sentido festivo de מְשַׂחֲקִים en español natural, eliminando la forma reflexiva incorrecta. Se suaviza la construcción verbal al imperfecto simple narrativo y se adopta «con todas sus fuerzas» por mayor idiomaticidad para בְּכָל עֹז. También se cambia «tamboriles» por «panderos» para mejor claridad contemporánea. No se requieren cambios doctrinales ni una adjudicación especial.
