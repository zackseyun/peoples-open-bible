translation:
  language: es
  text: 'si los hombres de mi tienda[a] no han dicho: «¿Quién hay que no haya quedado saciado[b] con su carne?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hombres de mi casa», ya que «tienda» puede representar la casa o el círculo doméstico.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «con su carne». Aquí el sentido es provisión de la mesa de Job, es decir, carne o alimento suministrado por él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  english_pob_choice: if ... not
  chosen_spanish: si ... no hubiera(n)
  alternatives_spanish:
  - ciertamente
  - seguramente ... no
  lexicon: HALOT
  rationale: En el contexto del juramento de Job, la construcción condicional funciona como protesta juramentada. En español, la forma con subjuntivo pluscuamperfecto conserva ese valor hipotético-retrospectivo sin perder la estructura del hebreo.
- source_word: אָמְרוּ
  english_pob_choice: have not said
  chosen_spanish: no hubieran dicho
  alternatives_spanish:
  - no dijeron
  - no hayan dicho
  lexicon: HALOT
  rationale: El perfecto plural se entiende aquí como una afirmación retrospectiva dentro del juramento. El pluscuamperfecto de subjuntivo encaja mejor con la subordinada condicional en español.
- source_word: מְתֵי אָהֳלִי
  english_pob_choice: the men of my tent
  chosen_spanish: los hombres de mi tienda
  alternatives_spanish:
  - la gente de mi casa
  - los hombres de mi casa
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'tienda' del hebreo para transparencia, siguiendo la decisión inglesa. 'Hombres' traduce מְתֵי con fuerza literal, aunque el sentido probable apunta a la esfera doméstica.
- source_word: מִי יִתֵּן
  english_pob_choice: Who is there that
  chosen_spanish: ¿Quién no ha sido...?
  alternatives_spanish:
  - ¿Quién podría...?
  - ¿Quién habría de...?
  lexicon: HALOT
  rationale: La expresión introduce aquí una pregunta retórica exclamativa. En español, una formulación interrogativa directa resulta más natural y preserva la fuerza idiomática sin convertirla en una mera optativa.
- source_word: מִבְּשָׂרוֹ
  english_pob_choice: with his flesh
  chosen_spanish: con su carne
  alternatives_spanish:
  - de su carne
  - con su comida
  lexicon: HALOT
  rationale: Se mantiene 'carne' por cercanía léxica al hebreo, aun cuando el contexto apunta a provisión alimentaria. 'Con' expresa la relación de saciedad/provisión de forma menos pesada que un literalismo como 'de su carne'.
- source_word: לֹא נִשְׂבָּע
  english_pob_choice: has not been filled
  chosen_spanish: ha sido saciado
  alternatives_spanish:
  - ha quedado satisfecho
  - no ha comido hasta saciarse
  lexicon: HALOT
  rationale: El nifal de שׂבע expresa estar lleno o saciado. 'Saciado' comunica bien la idea de haber recibido suficiente alimento/provisión y evita la ambigüedad de un 'llenado' demasiado físico en español.
theological_decisions:
- issue: Sentido de מִבְּשָׂרוֹ en un contexto de hospitalidad y mesa
  english_pob_reading: '''from his flesh'' means provision from Job''s table, that is, meat/food supplied by him.'
  chosen_spanish_reading: '''con su carne'' mantiene la literalidad del hebreo, dejando visible que el contexto interpreta la expresión como alimento/provisión de la mesa de Job.'
  alternative_spanish_readings:
  - '''de su comida'' explicita el sentido de provisión'
  - '''con la comida de su mesa'' aclara la referencia'
  rationale: No se borra la tensión entre la literalidad 'carne' y el sentido contextual de comida/provisión. La lectura principal conserva el enlace léxico con el hebreo y la nota permite la aclaración semántica.
  doctrine_reference: Job 31:31; cf. el uso figurado de 'carne' en contexto de provisión doméstica.
translation_notes:
  revision_awareness: 'El inglés POB mantuvo la estructura de juramento con ''if ... not'', preservó ''tent'' en el texto principal y anotó que ''from his flesh'' se entiende contextual­mente como provisión de la mesa. La versión española sigue esas mismas decisiones auditablemente: conserva ''tienda'', traduce el hebreo de forma cercana con ''carne'', y usa una nota para explicitar el sentido alimentario.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por defecto en el proyecto, pero este versículo no lo contiene.
  - '''Carne'' se usa aquí por fidelidad léxica; la nota explica el sentido contextual de comida/provisión.'
  - La puntuación con dos puntos antes de la cita respeta el valor introductorio del discurso directo.
  - '''Tienda'' conserva la imagen hebrea y no se sustituye por ''casa'' en el texto principal.'
