translation:
  language: es
  text: Los manantiales del abismo y las ventanas de los cielos fueron cerrados[b][a], y la lluvia de los cielos fue contenida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «compuertas de los cielos». El hebreo, literalmente, se refiere a aberturas o ventanas en el cielo.
    reason: lexical_alternative
  - marker: b
    text: O «la lluvia de los cielos dejó de caer». El verbo hebreo puede resaltar que la lluvia fue contenida, con el resultado de que cesó.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסָּכְרוּ
  english_pob_choice: were shut
  chosen_spanish: fueron cerradas
  alternatives_spanish:
  - fueron clausuradas
  - fueron tapadas
  lexicon: HALOT
  rationale: El nifal de סכר expresa quedar cerrado o sellado. En español, «fueron cerradas» refleja bien la pasiva y funciona con ambos sujetos en plural.
- source_word: מַעְיְנֹת
  english_pob_choice: springs
  chosen_spanish: fuentes
  alternatives_spanish:
  - manantiales
  - springs
  lexicon: HALOT
  rationale: «Fuentes» comunica la idea de manantiales o surgencias de agua de forma natural en español bíblico actual, sin perder el sentido de origen del agua.
- source_word: תְּהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - la profundidad
  - el profundo
  lexicon: HALOT
  rationale: La referencia es al ámbito acuoso primordial/cósmico. «Abismo» conserva mejor la carga bíblica e intertextual que una mera «profundidad».
- source_word: אֲרֻבֹּת
  english_pob_choice: windows
  chosen_spanish: las ventanas
  alternatives_spanish:
  - las compuertas
  - las aberturas
  lexicon: HALOT
  rationale: El término literalmente alude a aberturas o ventanas. «Ventanas de los cielos» mantiene la imagen sin imponer de entrada la interpretación más fuerte de «compuertas».
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: En este contexto cosmológico, el plural «los cielos» conserva la forma y la imaginería del hebreo, más que reducirlo al singular meteorológico «el cielo».
- source_word: וַיִּכָּלֵא
  english_pob_choice: was restrained
  chosen_spanish: fue contenida
  alternatives_spanish:
  - fue retenida
  - cesó
  lexicon: HALOT
  rationale: El verbo sugiere ser retenido o contenido. «Fue contenida» preserva la idea de impedimento activo mejor que «cesó», que expresa solo el resultado.
- source_word: הַגֶּשֶׁם
  english_pob_choice: the rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - la precipitación
  - el aguacero
  lexicon: HALOT
  rationale: «Lluvia» es la equivalencia normal y clara en español, adecuada para el relato narrativo.
- source_word: מִן הַשָּׁמָיִם
  english_pob_choice: from the heavens
  chosen_spanish: de los cielos
  alternatives_spanish:
  - desde los cielos
  - del cielo
  lexicon: HALOT
  rationale: La preposición hebrea marca procedencia. «De los cielos» mantiene la repetición del texto y la misma dicción cosmológica que la primera cláusula.
theological_decisions:
- issue: Imagen cosmológica de las 'ventanas de los cielos'
  english_pob_reading: The Hebrew literally refers to openings or windows in the sky; 'windows of the heavens' is preserved, with 'floodgates' offered as an alternative.
  chosen_spanish_reading: «ventanas de los cielos» en el texto principal, con la alternativa interpretativa de «compuertas de los cielos» en nota.
  alternative_spanish_readings:
  - compuertas de los cielos
  - aberturas de los cielos
  rationale: El hebreo usa un término literal de aberturas/ventanas. En español, mantener «ventanas» conserva la metáfora cosmológica sin forzar el sentido técnico de 'compuertas', que puede anotarse como alternativa interpretativa.
  doctrine_reference: Génesis 7:11; 8:2
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente, que indica que no fue necesario cambiar la traducción inglesa de referencia. La versión española sigue esa lectura estable y conserva las alternativas lexicales documentadas sin sobreinterpretarlas.
  spanish_consistency_notes:
  - Se mantuvo la dicción cosmológica «cielos» en ambas apariciones de הַשָּׁמַיִם para reflejar la repetición hebrea.
  - «Fuentes del abismo» evita banalizar תְּהוֹם como simple profundidad física y conserva el trasfondo primordial del relato.
  - 'El orden de las dos cláusulas principales sigue de cerca el hebreo: cierre de las fuentes y de las ventanas, luego restricción de la lluvia.'
