translation:
  language: es
  text: Y serás un objeto de horror[a], un proverbio[b] y una burla entre todos los pueblos adonde Yahvé te expulsará[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espanto». El hebreo puede designar algo tan devastado o tan sobrecogedor que produce horror o asombro.
    reason: lexical_alternative
  - marker: b
    text: O «un dicho». También puede entenderse «un refrán ofensivo»; el hebreo usa dos términos relacionados pero distintos para la burla pública.
    reason: lexical_alternative
  - marker: c
    text: O «adonde Yahvé te llevará» o «adonde Yahvé te conducirá». El verbo hebreo puede significar «llevar/conducir» o «arrear/impulsar»; aquí «te expulsará» refleja mejor el sentido coercitivo del exilio en este contexto de maldición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיִיתָ
  english_pob_choice: And you shall become
  chosen_spanish: Y serás
  alternatives_spanish:
  - Y llegarás a ser
  - Y te convertirás en
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante dentro de la secuencia de maldición. En español, 'serás' comunica ese resultado con naturalidad y sin añadir una idea de proceso que el texto no exige. 'Llegarás a ser' o 'te convertirás en' serían posibles, pero más pesados aquí.
- source_word: לְשַׁמָּה
  english_pob_choice: an object of horror
  chosen_spanish: un objeto de horror
  alternatives_spanish:
  - un horror
  - una desolación
  - un espanto
  lexicon: HALOT
  rationale: La construcción con לְ pide un predicado nominal. 'Objeto de horror' conserva la idea de algo ante lo cual otros reaccionan con horror o consternación, como en la nota inglesa. 'Desolación' desplaza el sentido hacia el estado del lugar más que hacia el efecto público de la maldición.
- source_word: לְמָשָׁל
  english_pob_choice: a proverb
  chosen_spanish: un proverbio
  alternatives_spanish:
  - un dicho
  - un refrán
  - un byword
  lexicon: HALOT
  rationale: מָשָׁל nombra aquí una fórmula pública de ejemplo o advertencia. 'Proverbio' es el equivalente directo y mantiene la fuerza de la expresión sin reducirla a un simple 'dicho'.
- source_word: וְלִשְׁנִינָה
  english_pob_choice: a taunt
  chosen_spanish: una burla
  alternatives_spanish:
  - una mofa
  - un escarnio
  - una taunt
  lexicon: HALOT
  rationale: שְׁנִינָה apunta a una expresión punzante, burlona o de ridículo público. 'Burla' comunica bien la dimensión de mofa y desdén para español general; 'mofa' o 'escarnio' también serían posibles, pero 'burla' es más natural y no suaviza el término.
- source_word: בְּכֹל הָעַמִּים
  english_pob_choice: among all the peoples
  chosen_spanish: entre todos los pueblos
  alternatives_spanish:
  - entre todas las naciones
  - en medio de todos los pueblos
  lexicon: HALOT
  rationale: עַמִּים es 'pueblos' en plural. 'Entre todos los pueblos' preserva mejor el matiz étnico y relacional del hebreo que 'naciones', aunque esta última también sería comprensible.
- source_word: אֲשֶׁר יְנַהֶגְךָ
  english_pob_choice: where Yahweh will drive you
  chosen_spanish: a los que Yahvé te llevará
  alternatives_spanish:
  - a los que Yahvé te conducirá
  - donde Yahvé te llevará
  - a los que Yahvé te empujará
  lexicon: HALOT
  rationale: El verbo נָהַג puede significar conducir, llevar o empujar/arrear. El inglés POB eligió 'drive' por el contexto de juicio y exilio; en español, 'te llevará' mantiene la referencia al movimiento forzado sin sonar artificial. No se usa 'conducirá' porque en español puede sonar demasiado neutro para la carga de castigo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino como 'Yahvé', conforme a la terminología proyectiva del POB en español para el Tetragrámaton, en lugar de sustituirlo por un título. 'Yahweh' sería más cercano a la forma inglesa del audit trail, pero 'Yahvé' es la forma estable y legible en español.
theological_decisions:
- issue: La fuerza de maldición pública en los tres sustantivos finales
  english_pob_reading: an object of horror, a proverb, and a taunt among all the peoples
  chosen_spanish_reading: un objeto de horror, un proverbio y una burla entre todos los pueblos
  alternative_spanish_readings:
  - un espanto, un refrán y una mofa
  - una desolación, un dicho y un escarnio
  rationale: El versículo acumula términos de vergüenza pública y ridículo nacional. La traducción mantiene las tres expresiones distintas para no borrar la tensión lexical entre שַׁמָּה, מָשָׁל y שְׁנִינָה. 'Burla' conserva el tono de humillación social sin desdibujar el paralelo con 'proverbio'.
  doctrine_reference: Deuteronomio 28:37; nota léxica del POB sobre distinción entre términos afines de deshonra pública
- issue: El nombre divino YHWH en un contexto de juicio
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Mantener 'Yahvé' preserva la referencia al nombre del pacto y evita el ocultamiento por sustitución litúrgica. En esta línea de maldición, el nombre propio refuerza que el juicio proviene del mismo Dios que hizo el pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El paquete inglés fue revisado y quedó sin cambios en su última pasada; la presente versión sigue ese estado estable y conserva las tres expresiones de deshonra pública, la lógica de juicio/exilio del verbo final y la traducción del nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en coherencia con el estándar español del proyecto.
  - Se conserva la distinción entre 'proverbio' y 'burla' para no fundir מָשָׁל y שְׁנִינָה.
  - '''Pueblos'' se usa para עַמִּים, no ''naciones'', por fidelidad al plural hebreo y a la tradición terminológica del proyecto.'
  - La nota [a] se ancla en 'horror' porque allí recae la principal oscilación léxica del hebreo; la nota [b] se ancla en 'proverbio' y la [c] en 'burla'.
