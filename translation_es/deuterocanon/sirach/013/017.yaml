review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo principal: repite correctamente la estructura retórica de מֵאַיִן ... שָׁלוֹם con «¿Qué paz puede haber...?» y conserva «hiena ... perro» y «hombre rico ... hombre pobre». También preserva la variante griega en notas. Sin embargo, el contenido de las notas está distribuido de manera poco fiel al rastro de auditoría inglés: la primera nota presenta solo la variante griega, mientras que la segunda repite información explicativa global que en el inglés estaba reunida en una sola nota anclada al segundo hemistiquio.'
  spanish_quality_summary: 'El español es claro, natural y digno. La única mejora necesaria es editorial: reducir dos notas a una sola, como en el POB inglés, para evitar redundancia y mantener una anotación más limpia. El texto principal no necesita cambios de redacción sustanciales.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «hiena», «perro», «hombre rico» y «hombre pobre» concuerdan con las decisiones léxicas documentadas. No aparecen términos teológicos sensibles del glosario global.
  issues:
  - severity: medium
    issue: Las notas al pie están duplicadas y no siguen de cerca la estrategia de una sola nota del POB inglés.
    rationale: El rastro inglés conserva en una sola nota tanto la lectura griega («lobo ... cordero ... pecador ... piadoso») como la aclaración de que el hebreo dice «hiena ... perro» y «rico ... pobre». En español, dividir esto en dos notas añade redundancia sin necesidad y complica el aparato.
  - severity: low
    issue: La primera nota usa «Testimonio griego» en vez de una formulación más precisa como «Paralelo griego».
    rationale: No es incorrecto, pero «paralelo griego» refleja mejor la documentación fuente, que lo trata como paralelo/lectura alternativa de control, no como testimonio único determinante.
  revised_spanish_text: ¿Qué paz puede haber entre una hiena y un perro? ¿Qué paz puede haber entre un hombre rico y un hombre pobre?[a]
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «¿Qué compartirá un lobo con un cordero? Así un pecador con un hombre piadoso». El testimonio hebreo conservado aquí dice «hiena ... perro» y «hombre rico ... hombre pobre».'
    reason: alternative_reading
  revision_rationale: 'Se conserva intacto el sentido del texto principal y se corrige solo el aparato de notas para alinearlo con el POB inglés: una sola nota anclada al segundo hemistiquio, que reúna la variante griega y la aclaración de la lectura hebrea. También se ajusta «Testimonio griego» a «Paralelo griego» para mayor precisión documental.'
