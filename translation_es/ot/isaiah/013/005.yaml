translation:
  language: es
  text: Vienen de una tierra lejana, desde el extremo de los cielos[a]—Yahvé y las armas de su furor[b]—, para destruir toda la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde los confines más lejanos de los cielos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y los instrumentos de su furor».'
    reason: lexical_alternative
  - marker: c
    text: «Toda la tierra» también puede traducirse «todo el país», pero el lenguaje cósmico del verso favorece aquí el sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאִ֛ים
  english_pob_choice: They are coming
  chosen_spanish: Vienen
  alternatives_spanish:
  - Están viniendo
  - Vienen acercándose
  lexicon: HALOT
  rationale: El participio hebreo presenta una acción en curso con fuerza vívida; en español, el presente simple 'vienen' comunica bien ese movimiento profético sin sonar forzado. 'Están viniendo' sería más explícito, pero más pesado.
- source_word: מֵאֶרֶץ מֶרְחָק
  english_pob_choice: from a distant land
  chosen_spanish: de una tierra distante
  alternatives_spanish:
  - de una tierra lejana
  - de una región distante
  lexicon: HALOT
  rationale: אֶרֶץ aquí funciona naturalmente como 'tierra', no como 'tierra/territorio' en sentido estrecho, y מֶרְחָק añade lejanía. 'Distante' conserva el matiz formal y el alcance amplio del hebreo.
- source_word: מִקְצֵה הַשָּׁמָיִם
  english_pob_choice: from the end of the heavens
  chosen_spanish: desde el extremo de los cielos
  alternatives_spanish:
  - desde el fin de los cielos
  - desde los confines de los cielos
  lexicon: HALOT
  rationale: קָצֶה es 'extremo, borde, punta'. 'Cielos' mantiene el plural hebreo y su tono cósmico; 'extremo' reproduce mejor la imagen que una paráfrasis general.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: DOCTRINE.md contested terms
  rationale: Se conserva el nombre divino propio, conforme a la política del proyecto, en lugar de sustituirlo por una forma titulada como 'Señor'. 'Yahvé' es la forma usual en español para esta transliteración.
- source_word: וּכְלֵי זַעְמוֹ
  english_pob_choice: and the weapons of his wrath
  chosen_spanish: y las armas de su furor
  alternatives_spanish:
  - y los instrumentos de su furor
  - y las armas de su ira
  lexicon: HALOT
  rationale: כְּלִי puede ser utensilio, instrumento o arma; en un contexto de juicio bélico, 'armas' es natural y preciso. זַעַם expresa una indignación/enojo intenso; 'furor' mantiene la fuerza del término con registro solemne. Se evita 'ira' por sonar algo más genérico en español contemporáneo.
- source_word: לְחַבֵּל
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para arruinar
  - para devastar
  lexicon: HALOT
  rationale: El infinitivo de propósito expresa la finalidad de la marcha de estos agentes. 'Destruir' es la equivalencia más directa y clara, sin atenuar la gravedad del juicio.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra/país
  - toda la tierra entera
  lexicon: HALOT
  rationale: El hebreo admite 'tierra' o 'país', pero el contexto cósmico del verso favorece una lectura amplia. En español, 'toda la tierra' conserva esa amplitud sin forzar una formulación más abstracta como 'el mundo'.
theological_decisions:
- issue: Alcance de כָּל הָאָרֶץ
  english_pob_reading: the whole earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - todo el país
  - toda la región
  rationale: La imagen previa ('desde el extremo de los cielos') orienta el lector hacia un juicio de alcance universal. Por eso se mantiene la amplitud de 'toda la tierra' y no se reduce a un territorio local.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton y el proyecto pide preservarlo como nombre propio. Se evita la sustitución por título litúrgico para no ocultar la referencia directa al nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'indignation' a 'wrath' en la revisión, priorizando un equivalente más natural para זַעַם. La presente propuesta sigue esa decisión con 'furor', manteniendo registro solemne y fuerza semántica. También conserva la distinción entre 'earth/land' mediante una solución española que favorece el alcance cósmico del contexto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, coherente con el estándar del proyecto.
  - Se prefirió 'armas' para כְּלֵי por el contexto de juicio militar.
  - '''Tierra'' se mantiene como traducción amplia de הָאָרֶץ para no estrechar el alcance del oráculo.'
  - La puntuación con dos puntos y guiones respeta la acumulación profética del hebreo y del texto inglés auditado.
