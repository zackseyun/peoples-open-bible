translation:
  language: es
  text: Pero Yahvé tu Dios no quiso escuchar a Balaam, y Yahvé tu Dios convirtió la maldición en bendición para ti, porque Yahvé tu Dios te amó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - no consintió
  - se negó a
  lexicon: HALOT
  rationale: En español, אָבָה expresa voluntad o consentimiento. «No quiso» conserva el matiz volitivo de la negativa sin sonar forzado; evita reducirlo a mera capacidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino. La política del proyecto pide «Yahvé» para יְהוָה, preservando el nombre del pacto en vez de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - el Dios tuyo
  lexicon: HALOT
  rationale: La forma con sufijo de segunda persona singular se rinde naturalmente como «tu Dios». Mantiene la relación de pertenencia y pacto en español común.
- source_word: לִשְׁמֹעַ אֶל
  english_pob_choice: to listen to
  chosen_spanish: escuchar a
  alternatives_spanish:
  - oír a
  - prestar oído a
  - hacer caso a
  lexicon: HALOT
  rationale: El giro hebreo significa atender o escuchar a alguien. «Escuchar a» reproduce la relación verbal de modo natural en español y evita sobreinterpretar con «hacer caso».
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar al español bíblico.
- source_word: וַיַּהֲפֹךְ
  english_pob_choice: turned
  chosen_spanish: convirtió
  alternatives_spanish:
  - volvió
  - cambió
  - transformó
  lexicon: HALOT
  rationale: הפך puede expresar girar, invertir o transformar. En esta construcción con objeto doble, «convirtió ... en ...» comunica con claridad el cambio resultante y suena natural en español.
- source_word: הַקְּלָלָה
  english_pob_choice: the curse
  chosen_spanish: la maldición
  alternatives_spanish:
  - la imprecación
  lexicon: HALOT
  rationale: El sustantivo designa la maldición pronunciada o buscada contra Israel. «Maldición» es la equivalencia normal y directa en español.
- source_word: לִבְרָכָה
  english_pob_choice: into a blessing
  chosen_spanish: en bendición
  alternatives_spanish:
  - en una bendición
  - para bendición
  lexicon: HALOT
  rationale: El lamed marca el resultado de la transformación. Tras «convirtió», el español idiomático pide «en bendición»; conserva el cambio de estado sin añadir más de lo debido.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula introduce la causa de la acción divina. «Porque» expresa de forma clara y directa la relación causal.
- source_word: אֲהֵבְךָ
  english_pob_choice: loved you
  chosen_spanish: te amó
  alternatives_spanish:
  - te amaba
  - tuvo amor por ti
  lexicon: HALOT
  rationale: אָהֵב normalmente se rinde como «amar». En este contexto de pacto, «te amó» preserva la fuerza afectiva y relacional del original sin diluirla.
theological_decisions:
- issue: Uso del nombre divino en la traducción
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo contiene explícitamente el Tetragrama. Siguiendo la directriz del proyecto y el valor documental del nombre del pacto, se emplea «Yahvé» en el cuerpo del texto en lugar de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Relación entre el verbo de voluntad y la escucha
  english_pob_reading: was not willing to listen to Balaam
  chosen_spanish_reading: no quiso escuchar a Balaam
  alternative_spanish_readings:
  - no consintió en escuchar a Balaam
  - no estuvo dispuesto a escuchar a Balaam
  rationale: La combinación de אָבָה + שׁמע אל subraya una negativa volitiva respecto de la propuesta de Balaam. «No quiso escuchar» mantiene tanto la voluntad como el acto de atender al otro, sin crear una lectura doctrinal añadida.
  doctrine_reference: HALOT, אָבָה; שׁמע אֶל
- issue: Transformación de maldición en bendición
  english_pob_reading: turned the curse into a blessing
  chosen_spanish_reading: convirtió la maldición en bendición
  alternative_spanish_readings:
  - volvió la maldición en bendición
  - transformó la maldición en bendición
  rationale: El hebreo presenta un acto divino de inversión efectiva. «Convirtió ... en ...» expresa esa transformación con claridad y mantiene la agencia de Yahvé.
  doctrine_reference: HALOT, הפך
translation_notes:
  revision_awareness: Se revisó el paquete inglés y la concordancia con el hebreo. La traducción inglesa está en acuerdo alto con el hebreo y no requiere corrección textual; la principal decisión para el español fue mantener el nombre divino «Yahvé» y elegir verbos naturales que conserven la fuerza volitiva y transformadora del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se conservó «tu Dios» para אֱלֹהֶיךָ por naturalidad y fidelidad relacional.
  - «No quiso escuchar» refleja la voluntad negativa y evita una simple negación de capacidad.
  - «Convirtió ... en ...» reproduce la estructura de transformación de הפך con español idiomático.
