lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Y los descendientes de
  - Y los hijos de
  lexicon: HALOT
  rationale: En una lista genealógica, בְּנֵי funciona como fórmula fija. «Hijos de» conserva el paralelismo y la estructura hereditaria del hebreo, mientras que «descendientes de» sería más interpretativo y menos formal.
- source_word: יֶתֶר
  english_pob_choice: Jether
  chosen_spanish: Jeter
  alternatives_spanish:
  - Jeter
  - Jéter
  lexicon: HALOT
  rationale: Nombre propio transliterado según el uso hispano habitual. Se conserva la forma breve y clara «Jeter» para un lector bíblico en español.
- source_word: יְפֻנֶּה
  english_pob_choice: Jephunneh
  chosen_spanish: Jephuné
  alternatives_spanish:
  - Jephuné
  - Jefuné
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se eligió «Jephuné» para reflejar mejor el valor consonántico inicial del hebreo y mantener una forma legible en español sin añadir vocales no justificadas por el texto.
- source_word: וּפִסְפָּה
  english_pob_choice: Pispa
  chosen_spanish: Pispa
  alternatives_spanish:
  - Pispa
  - Pispá
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene «Pispa», coherente con la decisión inglesa de no forzar una transliteración más letter-for-letter en la forma principal.
- source_word: וַאְרָא
  english_pob_choice: and Ara
  chosen_spanish: Ara
  alternatives_spanish:
  - Ara
  - Ará
  lexicon: HALOT
  rationale: Nombre propio transliterado sin añadir una marca gráfica innecesaria. En una secuencia genealógica, la conjunción inicial se integra de modo natural con «Y» al inicio de la cláusula.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones sustantivas; por eso la versión española sigue de cerca la estructura genealógica sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - 'Se mantuvo el orden genealógico del hebreo: fórmula de filiación + tres nombres propios.'
  - Se evitó traducir los nombres propios y se conservaron transliteraciones breves y publicables.
  - La conjunción inicial «Y» corresponde al ו prefijado del hebreo y al estilo de lista genealógica.
