translation:
  language: es
  text: Y todos los de tu pueblo serán justos[a]; para siempre poseerán la tierra[b], el brote de su plantación[c], la obra de mis manos, para que yo sea glorificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'heredarán'. El verbo hebreo puede significar 'heredar' o 'poseer'.
    reason: lexical_alternative
  - marker: b
    text: O 'la tierra entera'. El hebreo אֶרֶץ puede significar 'tierra' o 'tierra entera/mundo'; aquí el contexto de restauración favorece 'la tierra' como referencia más específica.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''el brote de su plantación''. Algunos intérpretes o tradiciones textuales suavizan esto a ''mi plantación'' porque la frase siguiente dice ''la obra de mis manos'', pero el texto masorético preserva este cambio de persona.'
    reason: textual_variant
lexical_decisions:
- source_word: וְעַמֵּךְ
  english_pob_choice: And all your people
  chosen_spanish: Y todo tu pueblo
  alternatives_spanish:
  - Y tu pueblo
  - Y todo el pueblo que es tuyo
  lexicon: HALOT
  rationale: El hebreo con sufijo de 2ª persona femenina singular se dirige a Sion/Jerusalén. En español, 'tu pueblo' conserva la relación posesiva; se antepone 'todo' para reflejar la totalidad expresada por כֻּלָּם sin sonar forzado.
- source_word: כֻּלָּם
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todos
  - cada uno
  lexicon: HALOT
  rationale: El término expresa totalidad colectiva. 'Todo tu pueblo' suena natural en español y conserva la idea de conjunto completo.
- source_word: צַדִּיקִים
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - justos
  - rectos
  lexicon: HALOT
  rationale: Aquí el adjetivo expresa condición moral y de pacto. En español, 'justo' funciona bien en singular colectivo con 'todo tu pueblo será justo'; 'justos' sería la concordancia literal plural, pero la construcción colectiva en español favorece el singular predicativo.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La duración indefinida y permanente queda bien expresada por 'para siempre', que es natural y solemne en español.
- source_word: יִירְשׁוּ
  english_pob_choice: will possess
  chosen_spanish: poseerán
  alternatives_spanish:
  - heredarán
  - tomarán posesión de
  lexicon: HALOT
  rationale: El verbo puede significar heredar o poseer. 'Poseerán' preserva la idea de tenencia estable sin decidir de entrada entre herencia y posesión; la nota mantiene la alternativa 'heredar' por su fuerza bíblica.
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: En Isaías 60 el contexto de restauración favorece 'tierra'. En español, 'la tierra' mantiene la amplitud del hebreo אָרֶץ y permite la resonancia escatológica, mientras la nota conserva la alternativa 'tierra' frente a 'territorio' o 'país'.
- source_word: נֵצֶר
  english_pob_choice: the shoot
  chosen_spanish: el brote
  alternatives_spanish:
  - el retoño
  - el renuevo
  lexicon: HALOT
  rationale: נֵצֶר designa un retoño/brote de planta nueva. 'Brote' es claro y natural en español; 'retoño' también sería posible, pero 'brote' comunica con más inmediatez la imagen vegetal.
- source_word: מַעֲשֵׂה יָדַי
  english_pob_choice: the work of my hands
  chosen_spanish: la obra de mis manos
  alternatives_spanish:
  - el trabajo de mis manos
  - mi hechura
  lexicon: HALOT
  rationale: La fórmula bíblica se conserva mejor como 'la obra de mis manos', que mantiene la imagen concreta y la dignidad del paralelismo.
- source_word: לְהִתְפָּאֵר
  english_pob_choice: that I may be glorified
  chosen_spanish: para que yo sea glorificado
  alternatives_spanish:
  - para glorificarme
  - para mostrar mi gloria
  lexicon: HALOT
  rationale: El hitpael de פאר expresa autoexaltación/glorificación en el resultado querido por Dios. 'Para que yo sea glorificado' es la forma más transparente y reverente en español, sin perder el matiz de propósito.
theological_decisions:
- issue: Tensión de persona en 'el brote de mi plantación' / 'la obra de mis manos'
  english_pob_reading: The English audit trail notes a textual/person shift in the source and preserves the received wording rather than smoothing it.
  chosen_spanish_reading: 'Conservar la primera persona de la segunda mitad: ''el brote de mi plantación, la obra de mis manos''.'
  alternative_spanish_readings:
  - el brote de su plantación
  - el brote de mi plantación, la hechura de mis manos
  rationale: El hebreo, según la actualización revisada del expediente, presenta la primera persona en מטעי y en ידי. La traducción española debe mantener esa coherencia interna y no armonizar artificialmente con una tercera persona. La nota c preserva además la alternativa textual que el POB inglés dejó registrada en el proceso de auditoría.
  doctrine_reference: Transparencia textual y principio de forma razonable; ver la política de auditoría POB sobre variantes y decisiones textuales.
- issue: Alcance de אָרֶץ en contexto de restauración
  english_pob_reading: '''the land'' is preferred over ''the earth'' because the restoration context is specific.'
  chosen_spanish_reading: '''la tierra'' como referencia principal, con alternativa ''la tierra'' implícita frente a lecturas más generales como ''el mundo''.'
  alternative_spanish_readings:
  - el mundo
  - la tierra prometida
  rationale: Aunque אָרֶץ puede significar 'tierra' o 'tierra/país' según contexto, aquí el marco de restauración de Isaías favorece una posesión concreta y covenantal. 'La tierra' preserva esa especificidad sin sobreinterpretar.
  doctrine_reference: Isaías 60; restauración de Sion y posesión hereditaria del pueblo de Dios.
translation_notes:
  revision_awareness: El expediente inglés muestra una corrección reciente en la línea de 'my planting' para alinear la primera persona del sufijo con 'my hands'. La versión española adopta esa lectura revisada y evita la armonización a tercera persona, manteniendo además la nota textual que documenta la tensión presente en la historia de traducción.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término del proyecto cuando el nombre divino aparece explícitamente; en este versículo no aparece, por lo que no se introduce ninguna sustitución.
  - '''justo'' se emplea como predicado colectivo para sonar natural en español y conservar el sentido moral-covenantal de צַדִּיקִים.'
  - Se conserva la imagen vegetal con 'brote' para נֵצֶר, evitando una paráfrasis abstracta.
  - Se prefiere 'la obra de mis manos' por su resonancia bíblica y porque mantiene el paralelismo con 'el brote de mi plantación'.
