translation:
  language: es
  text: Pero los hombres[a][b] extendieron sus manos y trajeron a Lot a la casa con ellos, y cerraron la puerta[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estiraron sus manos».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los hombres»; el contexto más amplio los identifica como mensajeros angelicales.
    reason: alternative_reading
  - marker: c
    text: O «y ellos cerraron la puerta».
    reason: previous_rendering
lexical_decisions:
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los visitantes
  - los ángeles
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo ordinario אֲנָשִׁים, literalmente «hombres». Aunque el contexto narrativo los identifica como mensajeros angelicales, la línea principal conserva el término del texto en vez de importar la identificación interpretativa.
- source_word: וַיִּשְׁלְחוּ אֶת יָדָם
  english_pob_choice: reached out their hands
  chosen_spanish: extendieron sus manos
  alternatives_spanish:
  - estiraron sus manos
  - alzaron la mano
  lexicon: HALOT
  rationale: La expresión combina שׁלח con «mano(s)» para indicar una acción física de extender la mano. «Extendieron sus manos» es natural en español y conserva el sentido idiomático sin endurecer la frase.
- source_word: וַיָּבִיאוּ
  english_pob_choice: brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - lo metieron
  - lo introdujeron
  lexicon: HALOT
  rationale: El hiphil de בוא significa «hacer venir» o «traer». «Trajeron» sigue de cerca la acción básica del hebreo y evita añadir un matiz más interpretativo como «meteron».
- source_word: אֲלֵיהֶם הַבָּיְתָה
  english_pob_choice: into the house with them
  chosen_spanish: a la casa con ellos
  alternatives_spanish:
  - dentro de la casa con ellos
  - a su casa
  lexicon: HALOT
  rationale: El hebreo expresa movimiento hacia ellos, dentro de la casa. En español, «a la casa con ellos» conserva la relación direccional y la compañía sin forzar una perífrasis más pesada.
- source_word: הַבָּיְתָה
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  lexicon: HALOT
  rationale: בַּיִת es «casa»; la terminación direccional se expresa de forma natural con la preposición «a». No hace falta una ampliación en el texto principal.
- source_word: הַדֶּלֶת
  english_pob_choice: the door
  chosen_spanish: la puerta
  alternatives_spanish:
  - la entrada
  lexicon: HALOT
  rationale: דֶּלֶת designa la puerta común. «Puerta» es la traducción más directa y clara en español.
- source_word: סָגָרוּ
  english_pob_choice: they shut
  chosen_spanish: cerraron
  alternatives_spanish:
  - trancaron
  - aseguraron
  lexicon: HALOT
  rationale: «Cerraron» reproduce bien la acción final de forma natural en español. «Trancaron» o «aseguraron» introducirían un color más específico que el hebreo no exige.
- source_word: וַ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: HALOT
  rationale: El waw narrativo aquí continúa la escena con un matiz de contraste frente a la acción anterior de la turba. «Pero» conserva ese giro discursivo de forma natural en español.
theological_decisions:
- issue: Identificación de הָאֲנָשִׁים como mensajeros angelicales
  english_pob_reading: Retain 'the men' in the main text
  chosen_spanish_reading: Mantener «los hombres» en el texto principal
  alternative_spanish_readings:
  - los ángeles
  - los visitantes
  rationale: La narración más amplia permite identificar a estos personajes como mensajeros angelicales, pero este versículo en sí los llama «los hombres». La traducción mantiene la forma léxica del hebreo y deja la identificación implícita en el contexto.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición interpretativa)
translation_notes:
  revision_awareness: La revisión inglesa más reciente simplificó la coordinación final a «and shut the door» para reflejar mejor la secuencia rápida del hebreo. En español se optó por una coordinación igualmente ágil («y cerraron la puerta»), sin necesidad de volver a introducir el sujeto ni de expandir la clausula.
  spanish_consistency_notes:
  - Se mantuvo «los hombres» en consonancia con la primacía del léxico hebreo, sin sustituirlo por «los ángeles» en el texto principal.
  - Se eligió «cerraron» para la acción final, una forma natural y suficientemente precisa para סָגָרוּ.
  - La frase «a la casa con ellos» conserva tanto el movimiento direccional como la cercanía relacional del hebreo.
  - La puntuación con coma antes de la última coordinación ayuda a reflejar la secuencia narrativa del original sin añadir énfasis ajeno.
