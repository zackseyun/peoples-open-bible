translation:
  language: es
  text: 'Y Yahvé dijo a Abram, después de que Lot se separó de él: «Por favor, alza tus ojos y mira desde el lugar donde estás: hacia el norte y hacia el sur y hacia el oriente y hacia el occidente.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: And Yahweh / the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Eterno
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino יהוה; en el proyecto español se preserva como «Yahvé» en el texto principal, siguiendo el criterio de no ocultar el Nombre con una sustitución devocional.
- source_word: אָמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - le habló
  lexicon: HALOT
  rationale: «Dijo» es la forma narrativa directa y natural en español para אָמַר en este contexto.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar; no se actualiza a Abraham porque el verso aún usa la forma anterior.
- source_word: אַחֲרֵי הִפָּרֶד לוֹט מֵעִמּוֹ
  english_pob_choice: after Lot had separated from him
  chosen_spanish: después de que Lot se había separado de él
  alternatives_spanish:
  - después que Lot se separó de él
  - tras separarse Lot de él
  lexicon: HALOT
  rationale: La relación temporal de אַחֲרֵי exige una anterioridad clara; el nifal de פרד tiene sentido intransitivo/reflexivo, por eso «se había separado» comunica bien el hecho sin introducir un agente no presente en el hebreo.
- source_word: שָׂא נָא עֵינֶיךָ
  english_pob_choice: Please lift up your eyes
  chosen_spanish: Por favor, alza tus ojos
  alternatives_spanish:
  - Por favor, levanta tus ojos
  - Te ruego que alces tus ojos
  lexicon: HALOT
  rationale: Se mantiene el imperativo con נָא como ruego cortés. «Alza tus ojos» conserva la imagen idiomática hebrea sin sobreexplicar con «mirada».
- source_word: וּרְאֵה
  english_pob_choice: and look
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  - y contempla
  lexicon: HALOT
  rationale: «Mira» corresponde de manera natural al imperativo de ראה en una invitación a dirigir la vista sobre la tierra.
- source_word: מִן הַמָּקוֹם אֲשֶׁר אַתָּה שָׁם
  english_pob_choice: from the place where you are
  chosen_spanish: desde el lugar donde estás
  alternatives_spanish:
  - desde el lugar en que te encuentras
  - desde el sitio donde estás
  lexicon: HALOT
  rationale: En español, «donde estás» reproduce bien el valor locativo del hebreo y hace innecesario añadir «allí». «Desde» conserva el punto de vista desde el cual Abram observa.
- source_word: צָפֹנָה וָנֶגְבָּה וָקֵדְמָה וָיָמָּה
  english_pob_choice: northward and southward and eastward and westward
  chosen_spanish: al norte, al sur, al oriente y al occidente
  alternatives_spanish:
  - hacia el norte, hacia el sur, hacia el oriente y hacia el occidente
  - al norte, al sur, al este y al oeste
  lexicon: HALOT
  rationale: Las formas direccionales con sufijo -ה indican orientación hacia los puntos cardinales. «Oriente/occidente» es más idiomático y solemne en español bíblico que «este/oeste», y preserva el paralelismo direccional sin perder precisión.
theological_decisions:
- issue: Nombre divino יהוה en el texto principal
  english_pob_reading: The English audit trail noted a project default of 'the LORD' but the updated theological decision preserved 'Yahweh' in the reading context.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: Se sigue la convención española del proyecto para el Tetragrámaton, manteniendo el Nombre propio en lugar de una sustitución reverencial. Esto hace visible la lectura del hebreo y evita ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail inglés muestra alta concordancia y sin revisiones aplicadas; la presente versión española mantiene el mismo contenido semántico del hebreo, ajustando solo la formulación para la naturalidad del español y la convención del proyecto sobre יהוה.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יהוה.
  - Se conservó el nombre «Abram» y la secuencia temporal explícita «después de que Lot se había separado de él».
  - La direccionalidad se vertió con preposiciones y puntos cardinales naturales en español, sin añadir matices no presentes en el hebreo.
