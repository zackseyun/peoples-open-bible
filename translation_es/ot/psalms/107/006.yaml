translation:
  language: es
  text: Entonces clamaron a Yahvé en medio de su angustia; él los libró de sus aflicciones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «de sus angustias» o «de sus estrecheces». El plural hebreo subraya múltiples formas de presión o aflicción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעֲקוּ
  english_pob_choice: Then they cried out
  chosen_spanish: Entonces clamaron
  alternatives_spanish:
  - Y clamaron
  - Entonces gritaron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la acción; «entonces» conserva esa secuencia. «Clamaron» expresa mejor el ruego urgente implícito en צעק en contextos de aflicción que un simple «llamaron».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - ante
  lexicon: HALOT
  rationale: La preposición direccional se rinde de manera natural en español con «a» en el giro «clamar a Yahvé».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado, conforme a la convención editorial del POB en español, sin sustituirlo por un título.
- source_word: בַּצַּר לָהֶם
  english_pob_choice: in their trouble
  chosen_spanish: en su angustia
  alternatives_spanish:
  - en su trouble
  - en su tribulación
  - cuando estaban en angustia
  lexicon: HALOT
  rationale: צַר denota una situación de opresión, angustia o aflicción. «Angustia» es natural en español y comunica bien el estado de necesidad; el singular colectivo se conserva como en el inglés POB.
- source_word: מִמְּצוּקוֹתֵיהֶם
  english_pob_choice: from their distresses
  chosen_spanish: de sus aflicciones
  alternatives_spanish:
  - de sus angustias
  - de sus aprietos
  - de sus estrecheces
  lexicon: HALOT
  rationale: Se preserva el plural hebreo, que intensifica la idea de múltiples presiones o formas de opresión. «Aflicciones» es amplio y literario sin perder claridad; «aprietos» o «estrecheces» serían posibles pero menos solemnes.
- source_word: יַצִּילֵם
  english_pob_choice: he delivered them
  chosen_spanish: él los libró
  alternatives_spanish:
  - él los rescató
  - él los salvó
  lexicon: HALOT
  rationale: El causativo de נצל apunta a librar o rescatar. «Libró» conserva el registro bíblico en español y evita reducir el sentido a mera salvación espiritual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre personal de Dios en lugar de sustituirlo por un título. «Yahvé» es la forma estándar del proyecto en español y corresponde a la decisión auditada del POB en inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor del plural en מְצוּקוֹתֵיהֶם
  english_pob_reading: from their distresses
  chosen_spanish_reading: de sus aflicciones
  alternative_spanish_readings:
  - de su aflicción
  - de sus angustias
  - de sus tribulaciones
  rationale: El plural hebreo se conserva para no borrar la intensificación de formas múltiples de presión o necesidad. En español, el plural «aflicciones» comunica esa pluralidad mejor que un singular abstracto.
  doctrine_reference: Observación lexical del texto hebreo; sin cambio doctrinal
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones aplicadas y el pase más reciente indica que no hubo cambios necesarios; la versión española sigue de cerca esa lectura estable, manteniendo el paralelismo entre «angustia» y «aflicciones» sin añadir matices no respaldados por el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto en español.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - «Clamaron» y «libró» conservan un registro bíblico claro y contemporáneo.
  - Se mantiene el plural en «aflicciones» para reflejar מְצוּקוֹתֵיהֶם.
