  to: Jóvenes y ancianos yacen en el suelo en las calles[a]; mis vírgenes y mis hombres jóvenes han caído a espada. Los mataste en el día de tu ira[b]; los degollaste sin piedad.
  rationale: Se revisa 'mis jóvenes' a 'mis hombres jóvenes' para reflejar con precisión el masculino específico de וּבַחוּרַי y preservar el paralelismo con 'mis vírgenes'. También se suaviza la puntuación suprimiendo la coma tras 'suelo' para una lectura más natural en español sin cambiar el sentido.
