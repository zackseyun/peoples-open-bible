revisions:
- from: Y con ellos estaban Hemán y Jedutún y el resto de los escogidos[a], que fueron designados por nombre para dar gracias a Yahvé[b], porque para siempre es su misericordia.
  to: Y con ellos estaban Hemán y Jedutún y el resto de los escogidos, que fueron designados por nombre[a] para dar gracias a Yahvé[b], porque su misericordia es para siempre.
  rationale: Se corrige el anclaje de la nota léxica para que corresponda a la expresión hebrea sobre ser identificados por nombre, y se suaviza la cláusula final a un español más natural sin perder el contenido ni el carácter litúrgico del refrán. Se mantiene 'Yahvé' conforme al proyecto y 'misericordia' como opción eclesial aceptable para חֶסֶד en este estribillo.
