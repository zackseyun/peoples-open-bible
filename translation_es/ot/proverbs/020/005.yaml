translation:
  language: es
  text: El consejo en el corazón de un hombre es como aguas profundas[a], pero un hombre de entendimiento lo extrae.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agua profunda». El hebreo dice literalmente «aguas profundas».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם עֲמֻקִּים
  english_pob_choice: deep water
  chosen_spanish: aguas profundas
  alternatives_spanish:
  - agua profunda
  - profundas aguas
  lexicon: HALOT
  rationale: El hebreo está en plural y, aunque el inglés POB optó por un singular colectivo natural, en español «aguas profundas» conserva mejor la forma plural del מקור y mantiene la imagen proverbial del agua honda; el orden adjetival es natural en español.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - counsel
  - plan
  - propósito
  - advice
  lexicon: HALOT
  rationale: En este contexto sapiencial, עֵצָה puede referirse a una deliberación interna, a un plan o a consejo. «Consejo» es el término más transparente y reverente en español, sin reducirlo a mera opinión externa.
- source_word: בְּלֵב אִישׁ
  english_pob_choice: in a man's heart
  chosen_spanish: en el corazón de un hombre
  alternatives_spanish:
  - en el corazón de una persona
  - en el corazón del hombre
  - en el interior de un hombre
  lexicon: HALOT
  rationale: «Corazón» conserva el valor hebreo de sede de pensamiento, voluntad y reflexión. Se mantiene «un hombre» porque el hebreo usa אִישׁ; es masculino gramaticalmente y sirve como genérico en el proverbio.
- source_word: וְאִישׁ תְּבוּנָה
  english_pob_choice: but a man of understanding
  chosen_spanish: pero el hombre de entendimiento
  alternatives_spanish:
  - y el hombre de entendimiento
  - pero un hombre de entendimiento
  - pero el hombre entendido
  - y un hombre entendido
  lexicon: HALOT
  rationale: תְּבוּנָה expresa entendimiento, discernimiento o inteligencia. «Hombre de entendimiento» reproduce bien el giro sapiencial; el contraste con la primera cola justifica traducir וְ como «pero».
- source_word: יִדְלֶנָּה
  english_pob_choice: draws it out
  chosen_spanish: lo saca
  alternatives_spanish:
  - lo extrae
  - lo saca afuera
  - lo saca de allí
  - lo saca a la luz
  lexicon: HALOT
  rationale: El verbo דלה significa sacar o sacar agua de un pozo. En español, «lo saca» es conciso y natural, y conserva la idea de extraer lo oculto; el referente es el consejo/agua metafórica.
theological_decisions:
- issue: Valor genérico del masculino humano en el proverbio
  english_pob_reading: The masculine form is used generically in this proverb.
  chosen_spanish_reading: Se conserva «un hombre» / «el hombre» como genérico sapiencial, sin neutralizar el sujeto.
  alternative_spanish_readings:
  - una persona
  - alguien
  - la persona de entendimiento
  rationale: El hebreo emplea אִישׁ dos veces con valor masculino genérico. Mantener la forma masculina respeta la forma del original y la tradición sapiencial, sin añadir una exclusión doctrinal no presente en el texto.
  doctrine_reference: Uso gramatical genérico; no hay carga doctrinal específica
- issue: Metáfora de las aguas profundas como imagen del consejo interior
  english_pob_reading: Counsel in a man's heart is like deep water.
  chosen_spanish_reading: Se conserva la metáfora sin explicitarla ni convertirla en una comparación analítica.
  alternative_spanish_readings:
  - El consejo en el corazón de un hombre es como aguas profundas
  - El consejo en el corazón de un hombre se parece a aguas profundas
  rationale: El hebreo presenta una imagen directa sin verbo comparativo explícito. La formulación española debe preservar esa densidad proverbial, evitando suavizar o explicar la imagen más de lo que el texto permite.
  doctrine_reference: Sabiduría proverbial; retención de metáfora
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo WLC y el audit trail inglés con acuerdo alto y sin revisiones pendientes. La decisión principal fue conservar el plural hebreo en español («aguas profundas») en lugar del singular colectivo del inglés, para mantener con mayor fidelidad la forma y la imagen del texto fuente.
  spanish_consistency_notes:
  - Se mantuvo la equivalencia de עֵצָה como «consejo» en sentido sapiencial, no como mera «opinión».
  - Se conservó el masculino genérico de אִישׁ por fidelidad al hebreo y coherencia con el registro del libro de Proverbios.
  - «Lo saca» comunica el acto de extraer/descubrir lo oculto y evita una paráfrasis excesiva.
