revisions:
- from: Así pondré fin a tu lascivia[a], y a tu prostitución desde la tierra de Egipto; y no volverás a alzar tus ojos hacia ellos[b], y ya no recordarás más a Egipto.
  to: Así pondré fin a tu lascivia, y a tu prostitución de la tierra de Egipto; no alzarás tus ojos hacia ellos[a], y no recordarás Egipto más[b].
  rationale: 'Se ajusta la traducción para seguir más de cerca el hebreo y la auditoría inglesa: se elimina «volverás» por ser añadido interpretativo, se cambia «desde» a «de» para una remoción más natural y fiel, se simplifica la cláusula final evitando redundancia, y se reemplaza la nota [a] por la alternativa idiomática documentada. También se añade una nota breve en [b] para aclarar el orden enfático de la cláusula final, útil en español sin sobreinterpretar.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:39:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general y conserva el lenguaje sexualizado directo del hebreo. Sin embargo, presenta varios desajustes menores pero significativos con el sentido fuente y con el rastro de auditoría inglés: (1) «desde la tierra de Egipto» es menos fiel que «de la tierra de Egipto» para מֵאֶרֶץ; (2) la nota [a] no refleja la nota inglesa preservada, sino que introduce otra alternativa; (3) «no volverás a alzar» añade explícitamente ‘volver’, que no está en el hebreo; y (4) «ya no recordarás más» es redundante en español y «recordarás a Egipto» suena menos natural que «recordarás Egipto».'
  spanish_quality_summary: El español es mayormente claro y digno, pero puede mejorarse para mayor naturalidad y fidelidad. «Pondré fin a tu lascivia» funciona bien. «Desde la tierra de Egipto» suena algo forzado en este contexto de remoción; «de la tierra de Egipto» es más natural. «No volverás a alzar tus ojos» añade un matiz aspectual no expreso en el original; «no alzarás tus ojos» preserva mejor el modismo. «Ya no recordarás más a Egipto» duplica innecesariamente la negación temporal y el uso de «a» no es necesario con un topónimo objeto directo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección de «lascivia» para זִמָּה y «prostitución» para זְנוּת está alineada con la decisión teológica de no suavizar la metáfora sexual. No aparecen términos del glosario mayor como Yahvé/Mesías. La preservación del modismo «alzar los ojos» también sigue correctamente la filosofía documentada, aunque conviene quitar «volverás».
  issues:
  - severity: medium
    issue: La nota [a] no corresponde a la nota del POB inglés y desplaza una alternativa distinta.
    rationale: La auditoría inglesa conserva como nota la alternativa para el modismo «lift up your eyes to», además de registrar como nota previa «and to your prostitution». El borrador pone en [a] una paráfrasis de וְהִשְׁבַּתִּי...מִמֵּךְ («haré cesar... de ti»), que no es la nota preservada en el inglés y no añade una ambigüedad española necesaria.
  - severity: medium
    issue: «Desde la tierra de Egipto» es menos fiel y menos natural que «de la tierra de Egipto».
    rationale: מֵאֶרֶץ expresa procedencia/remoción desde el ámbito de origen. En español, con «prostitución», «de la tierra de Egipto» refleja mejor la construcción y evita el matiz locativo-extensivo de «desde».
  - severity: medium
    issue: «No volverás a alzar tus ojos» añade el matiz de repetición ‘volver’.
    rationale: El hebreo dice simplemente «no alzarás tus ojos hacia ellos». Aunque el contexto general implica cese futuro, introducir «volverás a» estrecha el sentido y añade información no explícita.
  - severity: low
    issue: «Ya no recordarás más a Egipto» suena redundante y algo poco idiomático.
    rationale: La combinación «ya no» + «más» duplica el mismo valor. Además, con «Egipto» como objeto directo de «recordar», lo más natural aquí es «recordarás Egipto» o «no te acordarás más de Egipto». La primera conserva mejor la forma fuente.
  revised_spanish_text: Así pondré fin a tu lascivia, y a tu prostitución de la tierra de Egipto; no alzarás tus ojos hacia ellos[a], y no recordarás Egipto más[b].
  revised_footnotes:
  - marker: a
    text: 'O: «no mirarás hacia ellos»; el hebreo «alzar los ojos hacia» puede implicar deseo, atención o dependencia.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «y Egipto no recordarás más».
    reason: word_order_clarity
  revision_rationale: 'Se ajusta la traducción para seguir más de cerca el hebreo y la auditoría inglesa: se elimina «volverás» por ser añadido interpretativo, se cambia «desde» a «de» para una remoción más natural y fiel, se simplifica la cláusula final evitando redundancia, y se reemplaza la nota [a] por la alternativa idiomática documentada. También se añade una nota breve en [b] para aclarar el orden enfático de la cláusula final, útil en español sin sobreinterpretar.'
