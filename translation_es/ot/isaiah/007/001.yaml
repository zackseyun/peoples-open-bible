translation:
  language: es
  text: Y aconteció en los días de Acaz, hijo de Jotam, hijo de Uzías, rey de Judá, que Rezín, rey de Aram[a], y Peka, hijo de Remalías, rey de Israel, subieron a Jerusalén para hacerle la guerra, pero no pudieron combatir contra ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Aram»; tradicionalmente «Siria».
    reason: alternative_reading
  - marker: b
    text: El verbo hebreo es singular («no pudo»), aunque los sujetos anteriores son Rezín y Peka juntos; en español se ha naturalizado como plural («no pudieron»).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa wayyiqtol se vierte con una apertura histórica natural en español; «aconteció» conserva el tono bíblico sin volverse arcaico.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - en el tiempo de
  - durante los días de
  lexicon: HALOT
  rationale: Se mantiene el giro idiomático hebreo de marco temporal con una expresión idiomática y transparente en español.
- source_word: אָחָז ... יוֹתָם ... עֻזִּיָּהוּ
  english_pob_choice: Ahaz son de Jotham, son of Uzziah
  chosen_spanish: Acaz, hijo de Jotam[a], hijo de Uzías
  alternatives_spanish:
  - Acaz hijo de Jotam, hijo de Uzías
  - Acaz, hijo de Jotam, hijo de Uzías
  lexicon: Nombres propios estándar de la tradición bíblica en español
  rationale: Se conservan los nombres propios con forma española usual; la cadena filial se mantiene formalmente, y la nota aclara que Jotam es Jotam como nombre propio, no una glosa interpretativa.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Título real y designación territorial directos, sin necesidad de expansión.
- source_word: עָלָה
  english_pob_choice: went up against / went up to
  chosen_spanish: subieron a
  alternatives_spanish:
  - fueron contra
  - marcharon contra
  lexicon: HALOT
  rationale: En este contexto militar, עלה expresa ascenso/movimiento hacia un objetivo; «subieron a» conserva el verbo original y deja que el complemento de propósito precise la intención bélica.
- source_word: רְצִין מֶלֶךְ אֲרָם
  english_pob_choice: Rezin king of Aram
  chosen_spanish: Resin, rey de Aram
  alternatives_spanish:
  - Rezín, rey de Aram
  - Resín, rey de Aram
  lexicon: HALOT
  rationale: Se prefiere «Aram» como reflejo del término hebreo, no la etiqueta tradicional «Siria», y se adopta una transcripción española habitual para el nombre.
- source_word: וּפֶקַח בֶּן רְמַלְיָהוּ מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: and Pekah son of Remaliah, king of Israel
  chosen_spanish: y Peka[b], hijo de Remalías, rey de Israel
  alternatives_spanish:
  - y Peka, hijo de Remalías, rey de Israel
  - y Pecaj, hijo de Remalías, rey de Israel
  lexicon: Nombres propios estándar de la tradición bíblica en español
  rationale: Se conserva el paralelismo con el hebreo y el título en aposición; la grafía del nombre se adapta a español bíblico común.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Topónimo tradicional en español
  rationale: La forma española asentada es plenamente transparente y adecuada en texto eclesial.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to wage war
  chosen_spanish: para hacer guerra
  alternatives_spanish:
  - para guerrear
  - para librar guerra
  lexicon: HALOT
  rationale: La construcción final expresa intención bélica; «hacer guerra» conserva la finalidad militar con naturalidad bíblica en español. Se evita suavizar demasiado el matiz agresivo del hebreo.
- source_word: עָלֶיהָ
  english_pob_choice: against it
  chosen_spanish: contra ella
  alternatives_spanish:
  - contra ella misma
  lexicon: HALOT
  rationale: Como Jerusalén es femenina en español, «ella» preserva el referente gramatical y el valor adversativo de על.
- source_word: וְלֹא יָכֹל
  english_pob_choice: but they were not able
  chosen_spanish: pero no pudieron
  alternatives_spanish:
  - pero no pudo
  - pero no eran capaces
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es singular, el sujeto compuesto inmediato en español se expresa naturalmente en plural; la nota teológica conserva la tensión textual y explica la decisión.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: combatir
  alternatives_spanish:
  - luchar
  - pelear
  lexicon: HALOT
  rationale: «Combatir» es un equivalente claro y digno para el infinitivo militar; mantiene la formalidad sin sonar redundante tras «hacer guerra».
theological_decisions:
- issue: Aram frente a Siria
  english_pob_reading: Aram
  chosen_spanish_reading: Aram
  alternative_spanish_readings:
  - Siria
  rationale: Se sigue el término del hebreo original, manteniendo la primacía del etnónimo bíblico sobre la tradición de traducción posterior. Esto evita introducir una identificación histórica no explícita en el texto hebreo.
  doctrine_reference: Translation philosophy §1
- issue: Verbo singular hebreo con sujeto compuesto
  english_pob_reading: but they were not able
  chosen_spanish_reading: pero no pudieron
  alternative_spanish_readings:
  - pero no pudo
  rationale: 'El hebreo presenta una tensión gramatical: el verbo es singular, aunque el sujeto histórico es doble. En español se opta por el plural natural del sujeto compuesto, sin negar la observación textual; la nota explica la forma hebrea.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que naturaliza la finalidad militar («to wage war») y pluraliza el verbo para el sujeto compuesto. En español se siguió la misma línea de naturalidad, pero se mantuvo la distinción entre el dato gramatical hebreo y la fluidez del receptor mediante nota para el verbo singular del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Aram» se conserva como nombre propio etnogeográfico del hebreo; no se traduce por «Siria».
  - Los nombres propios siguen formas españolas habituales de lectura bíblica.
  - La sintaxis intenta reflejar la estructura narrativa hebrea sin sonar forzada en español.
