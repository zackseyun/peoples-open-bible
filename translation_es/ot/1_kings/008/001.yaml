translation:
  language: es
  text: Entonces Salomón reunió a los ancianos de Israel, a todos los jefes de las tribus, y a los líderes de las casas paternas de los hijos de Israel, junto al rey Salomón en Jerusalén, para subir el arca del pacto de Yahvé de la ciudad de David, es decir, Sion.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca temporal discursiva que introduce la acción siguiente; 'Entonces' conserva la secuencia narrativa con naturalidad en español.
- source_word: יַקְהֵל
  english_pob_choice: assembled
  chosen_spanish: congregó
  alternatives_spanish:
  - reunió
  - convocó
  lexicon: HALOT
  rationale: El hifil de קהל expresa causar una asamblea. 'Congregó' comunica una reunión formal y colectiva sin perder el matiz de convocatoria.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los mayores de Israel
  - los ancianos israelitas
  lexicon: HALOT
  rationale: '''Ancianos'' es el equivalente socio-político natural para líderes de edad y autoridad reconocida.'
- source_word: כָּל רָאשֵׁי הַמַּטּוֹת
  english_pob_choice: all the heads of the tribes
  chosen_spanish: a todos los jefes de las tribus
  alternatives_spanish:
  - a todos los cabezas de las tribus
  - a todos los jefes tribales
  lexicon: HALOT
  rationale: '''Jefes'' mantiene el valor de רָאשֵׁי como líderes principales; ''tribus'' evita una traducción literal de ''varas''/''bastones'' y sigue el sentido contextual de מַטּוֹת.'
- source_word: נְשִׂיאֵי הָאָבוֹת
  english_pob_choice: the leaders of the fathers’ houses
  chosen_spanish: los líderes de las casas paternas
  alternatives_spanish:
  - los jefes de las casas paternas
  - los príncipes de las casas paternas
  lexicon: HALOT
  rationale: '''Casas paternas'' reproduce la estructura familiar/clánica de הָאָבוֹת; ''líderes'' conserva el valor de נְשִׂיאִים sin cargar con un término demasiado arcaico.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los hijos de Israel
  - de los hijos de Israel (es decir, el pueblo de Israel)
  lexicon: HALOT
  rationale: Se preserva la expresión filial masculina del hebreo. 'Hijos de Israel' mantiene el valor formal y corporativo del grupo sin neutralizarlo.
- source_word: אֶל הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: to King Solomon
  chosen_spanish: al rey Salomón
  alternatives_spanish:
  - ante el rey Salomón
  - hacia el rey Salomón
  lexicon: HALOT
  rationale: La preposición אֶל señala dirección/presencia. En español, 'al rey Salomón' refleja el movimiento o convocatoria hacia su presencia sin añadir interpretación.
- source_word: לְהַעֲלוֹת
  english_pob_choice: to bring up
  chosen_spanish: para hacer subir
  alternatives_spanish:
  - para subir
  - para traer arriba
  lexicon: HALOT
  rationale: עלה conserva el movimiento ascendente; 'hacer subir' respeta el valor causativo y evita perder la imagen espacial del traslado del arca a Jerusalén.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahvéh
  lexicon: HALOT
  rationale: '''Pacto'' comunica la relación de alianza implícita en בְּרִית. ''Yahvé'' sigue el estándar del proyecto para el nombre divino.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Yahweh
  lexicon: HALOT
  rationale: Se adopta la forma española establecida por el proyecto en el texto principal, manteniendo el nombre propio divino en lugar de una sustitución reverencial.
- source_word: מֵעִיר דָּוִד
  english_pob_choice: from the city of David
  chosen_spanish: desde la ciudad de David
  alternatives_spanish:
  - de la ciudad de David
  - desde la ciudad del rey David
  lexicon: HALOT
  rationale: '''Desde'' expresa origen del traslado con claridad en español y conserva el valor locativo de מִן.'
- source_word: הִיא צִיּוֹן
  english_pob_choice: that is, Zion
  chosen_spanish: que es Sion
  alternatives_spanish:
  - es decir, Sion
  - la cual es Sion
  lexicon: HALOT
  rationale: La aposición identifica la ciudad de David con Sion. 'Que es Sion' mantiene la relación explicativa con naturalidad y sin sobreexplicar.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton, y el proyecto pide evitar la sustitución por 'SEÑOR'. 'Yahvé' es la forma española normativa del proyecto para preservar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión filial nacional לִבְנֵי יִשְׂרָאֵל
  english_pob_reading: of the sons of Israel
  chosen_spanish_reading: de los hijos de Israel
  alternative_spanish_readings:
  - de los hijos de Israel
  - del pueblo de Israel
  rationale: Se conserva la forma masculina plural del hebreo, que funciona como expresión nacional/corporativa. Esto mantiene la precisión morfológica y el matiz de alianza sin neutralizarlo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: ארון ברית יהוה
  english_pob_reading: ark of the covenant of Yahweh
  chosen_spanish_reading: arca del pacto de Yahvé
  alternative_spanish_readings:
  - arca del pacto de Yahvé
  - arca del pacto de Yahveh
  rationale: '''Pacto'' refleja el valor de בְּרִית como alianza vinculante; la formulación evita reducirlo a un simple acuerdo humano y preserva la carga teológica del término.'
  doctrine_reference: 'DOCTRINE.md: covenant terminology'
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que ajustó 'before King Solomon' a 'to King Solomon' por mayor fidelidad al hebreo. La redacción española sigue esa lectura direccional sin introducir la idea de estar 'ante' el rey. También se mantuvo la equivalencia del nombre divino como forma propia del proyecto, no como título reverencial.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene 'hijos de Israel' para conservar el valor morfológico del hebreo.
  - Se eligió 'pacto' para בְּרִית en coherencia con el lenguaje de alianza del proyecto.
  - 'La sintaxis española preserva la secuencia de acumulación de grupos: ancianos, jefes de tribus, líderes de casas paternas.'
