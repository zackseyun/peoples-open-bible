translation:
  language: es
  text: Después, el pueblo partió de Hazerot y acamparon en el desierto de Parán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después de eso
  alternatives_spanish:
  - Luego
  - Después
  lexicon: HALOT
  rationale: Marca secuencia temporal posterior de modo natural en español. 'Después de eso' conserva la progresión narrativa sin sonar arcaico.
- source_word: נָסְעוּ
  english_pob_choice: set out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se puso en camino
  - levantó campamento y siguió
  lexicon: HALOT
  rationale: En relatos del desierto, נָסַע puede implicar levantar campamento y avanzar. 'Salió' transmite el movimiento narrativo de forma concisa; el contexto del campamento ya queda reforzado por el verbo siguiente.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: '''El pueblo'' es natural en español bíblico y conserva el referente colectivo de Israel sin introducir un matiz demasiado sociológico.'
- source_word: מֵחֲצֵרוֹת
  english_pob_choice: from Hazeroth
  chosen_spanish: de Jazerot
  alternatives_spanish:
  - desde Jazerot
  - de Hazerot
  lexicon: HALOT
  rationale: Se translitera el topónimo al español. 'Jazerot' sigue la adaptación castellana habitual de la aspiración inicial y mantiene reconocible el nombre propio.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: y acampó
  alternatives_spanish:
  - y acamparon
  - y levantó campamento
  lexicon: HALOT
  rationale: חנה significa acampar/establecer campamento. El singular español puede funcionar como colectivo con 'el pueblo' como sujeto; 'acampó' suena natural y fiel al sentido.
- source_word: בְּמִדְבַּר
  english_pob_choice: in the wilderness of
  chosen_spanish: en el desierto de
  alternatives_spanish:
  - en el desierto del
  - en la región desértica de
  lexicon: HALOT
  rationale: '''מִדְבָּר'' puede traducirse ''desierto'' o ''wilderness''. Aquí ''desierto'' comunica bien el lugar geográfico y mantiene la referencia al trayecto del pueblo. No se fuerza una paráfrasis.'
- source_word: פָּארָן
  english_pob_choice: Paran
  chosen_spanish: Parán
  alternatives_spanish:
  - Paran
  lexicon: HALOT
  rationale: Se adapta el topónimo al uso español con acento gráfico, manteniendo la forma reconocible del nombre propio.
translation_notes:
  revision_awareness: El texto hebreo es breve y narrativo; el inglés POB y el hebreo están en alta concordancia. No se requieren notas textuales ni variantes. La principal decisión de draft fue optar por un español fluido sin perder la secuencia verbal de salida y acampada.
  spanish_consistency_notes:
  - Se mantuvo el tono narrativo sobrio y geográfico propio de Números.
  - Los topónimos se trataron como nombres propios transliterados en español, sin traducir su significado.
  - No se introdujo vocabulario eclesiástico o doctrinal ajeno al versículo.
