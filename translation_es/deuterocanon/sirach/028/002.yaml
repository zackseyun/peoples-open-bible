translation:
  language: es
  text: Perdona a tu prójimo la ofensa, y entonces, cuando ores, tus pecados serán soltados[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «tus pecados serán soltados». «Perdonados» sería una alternativa interpretativa posible, pero «soltados» conserva la metáfora subyacente de ser desatados o liberados.'
    reason: lexical_alternative
  - marker: b
    text: El testimonio hebreo suministrado para esta zona no corresponde al sentido de Sirácides 28:2 y parece reflejar otro material; por eso se usó el paralelo griego como base principal para este versículo.
    reason: textual_variant
lexical_decisions:
- source_word: ἄφες
  english_pob_choice: Forgive
  chosen_spanish: Perdona
  alternatives_spanish:
  - deja ir
  - absuelve
  lexicon: BDAG
  rationale: ἄφες es imperativo aoristo de ἀφίημι, con el sentido de dejar ir, perdonar o remitir. En español, «perdona» comunica bien la acción interpersonal de remitir una ofensa sin volverla demasiado técnica.
- source_word: ἀδίκημα
  english_pob_choice: the wrong
  chosen_spanish: el agravio
  alternatives_spanish:
  - el mal
  - la ofensa
  - la injusticia
  lexicon: BDAG
  rationale: ἀδίκημα designa un daño o una injusticia hecha a otro. «Agravio» conserva el peso concreto de una ofensa interpersonal y suena natural en español bíblico contemporáneo.
- source_word: τῷ πλησίον σου
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a tu semejante
  lexicon: BDAG
  rationale: πλησίον en contexto ético suele equivaler a «neighbor». «Prójimo» es la manera más reconocible en español bíblico para expresar esa relación moral sin perder el alcance comunitario.
- source_word: δεηθέντος σου
  english_pob_choice: when you pray
  chosen_spanish: cuando ores
  alternatives_spanish:
  - cuando supliques
  - cuando hagas oración
  lexicon: BDAG
  rationale: El participio de deesis marca el tiempo de la súplica. «Cuando ores» preserva el sentido religioso de petición a Dios y fluye con naturalidad en español.
- source_word: αἱ ἁμαρτίαι σου λυθήσονται
  english_pob_choice: your sins will be released
  chosen_spanish: tus pecados serán soltados
  alternatives_spanish:
  - tus pecados serán liberados
  - tus pecados serán perdonados
  lexicon: BDAG
  rationale: λυθήσονται es literalmente «serán soltados/liberados». «Serán soltados» conserva la metáfora de desatar o liberar y evita reducirla de entrada a la fórmula más interpretativa «perdonados».
theological_decisions:
- issue: Selección textual principal para Sirácides 28:2
  english_pob_reading: The English audit trail ultimately follows the Greek parallel for this verse, while noting that the supplied Hebrew witness belongs to different material and does not match the verse sense.
  chosen_spanish_reading: La traducción sigue el paralelo griego como base operativa para este versículo, y deja constancia de que el hebreo suministrado no corresponde al contenido de Sirácides 28:2.
  alternative_spanish_readings:
  - Intentar verter el hebreo suministrado como si fuera Sirácides 28:2
  rationale: Para permanecer anclados en el testimonio original más coherente con la referencia del versículo, se toma el griego como fuente principal. Así se conserva la honestidad textual y la trazabilidad del razonamiento, tal como pide la política del proyecto.
  doctrine_reference: 'PHILOSOPHY.md: traducir directamente desde la mejor fuente original disponible y documentar con honestidad la incertidumbre textual.'
translation_notes:
  revision_awareness: El expediente de auditoría muestra que el hebreo provisto no coincide con Sirácides 28:2, mientras que el paralelo griego sí corresponde al versículo. Por eso la redacción española sigue el griego y no el hebreo de la zona 1, manteniendo la nota sobre la metáfora de λυθήσονται.
  spanish_consistency_notes:
  - Se usa «prójimo» para πλησίον, conforme al registro bíblico natural del español.
  - Se prefiere «pecados serán soltados» para respetar la imagen verbal de λυθήσονται; no se reemplaza por «perdonados» en el texto principal.
  - Se mantiene un español sobrio y publicable, sin depender de calcos excesivos del inglés.
