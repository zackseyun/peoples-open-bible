review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: doble introducción impersonal del reporte, partícula deíctica, posesivo, llegada de José, y el cambio deliberado de Jacob a Israel. Sin embargo, «fue notificado a Jacob» suena administrativo y menos idiomático que el valor narrativo de וַיַּגֵּד; además, «Entonces» no está en el hebreo y añade una conexión temporal/consecutiva no explícita. El resto refleja adecuadamente el sentido fuente, incluido «se fortaleció» para וַיִּתְחַזֵּק.'
  spanish_quality_summary: El texto es comprensible, pero «fue notificado a Jacob» resulta poco natural en español bíblico/narrativo. «Le avisaron a Jacob» introduciría sujeto plural; mejor una impersonal más fluida como «A Jacob se le informó». También conviene retirar «Entonces» para no añadir contenido. «Se sentó sobre la cama» es aceptable, aunque «se incorporó en la cama» sería más interpretativo; no es necesario cambiarlo.
  glossary_alignment: No hay términos del glosario mayor en disputa. Se preserva correctamente la alternancia Jacob/Israel según la decisión teológica documentada. «José» es apropiado en español. No hay conflicto con Yahvé/Mesías u otras convenciones del proyecto.
  issues:
  - severity: medium
    issue: «Fue notificado a Jacob» es poco idiomático y demasiado administrativo.
    rationale: Aunque semánticamente posible, no suena natural en narrativa bíblica española y debilita la legibilidad. El hebreo expresa un reporte impersonal; «A Jacob se le informó» conserva esa indeterminación con mejor español.
  - severity: medium
    issue: «Entonces» añade una relación discursiva no explícita en el hebreo.
    rationale: El texto hebreo coordina con vav consecutiva narrativa, pero «Entonces» puede interpretarse como explicitación temporal/enfática innecesaria. Es mejor mantener una simple coordinación con «e» o «y».
  revised_spanish_text: 'Y a Jacob se le informó[a], y se dijo: «Mira, tu hijo José ha venido a ti». E Israel se fortaleció y se sentó sobre la cama.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «Israel se fortaleció».'
    reason: lexical_alternative
  revision_rationale: Se mejoró la naturalidad narrativa del español reemplazando «fue notificado a Jacob» por «a Jacob se le informó», que preserva mejor el impersonal del hebreo sin tono administrativo. También se eliminó «Entonces» porque no corresponde a un elemento explícito del original. Se mantuvieron el cambio de nombre Jacob/Israel, «Mira» para הִנֵּה, y «se fortaleció» según la decisión lexical documentada.
