translation:
  text: And in those days a change shall come for the holy ones and the chosen ones[a][b], .
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'compassion shall be for the holy ones and the chosen ones.' The Ge'ez wording allows a slightly smoother rendering
      with 'shall be,' but the main text preserves the sense of mercy arriving or coming into effect.
    reason: lexical_alternative
  - marker: b
    text: Or 'mercy shall come to be'.
    reason: previous_rendering
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula. 'Days' preserves the repeated visionary idiom better than the smoother
    'times'.
- source_word: ሚጠት
  chosen: mercy
  alternatives:
  - compassion
  - pity
  - grace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes merciful favor or compassion. 'Mercy' best fits the judgment-and-deliverance setting of the
    Parables without importing later doctrinal nuance that 'grace' might suggest.
- source_word: ትከውን
  chosen: shall come to be
  alternatives:
  - shall be
  - will arise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the common 'to be/become.' 'Shall come to be' keeps a slight sense of emergence or arrival in context,
    though simple 'shall be' is possible.
- source_word: ለቅዱሳን
  chosen: for the holy ones
  alternatives:
  - for the saints
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Enochic usage this term can denote consecrated or holy persons. 'Holy ones' is more transparent and avoids
    importing later ecclesiastical associations of 'saints'.
- source_word: ወለኅሩያን
  chosen: and the chosen ones
  alternatives:
  - and the elect ones
  - and the selected ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key Enochic designation. 'Chosen ones' is clear modern English and preserves the local terminology
    without overloading it with later theological systems tied to 'elect'.
