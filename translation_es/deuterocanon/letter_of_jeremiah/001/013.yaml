translation:
  language: es
  text: Y sostiene un cetro como un hombre[a], un juez de un país[b], que no destruirá al que peca contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser humano». El griego ἄνθρωπος puede señalar simplemente a una persona humana; aquí la comparación enfatiza la apariencia humana.
    reason: lexical_alternative
  - marker: b
    text: O «de una región» o «de una tierra». El griego χώρας puede referirse a tierra, país o región; aquí «país» se eligió como una opción natural en español sin precisar más el alcance geográfico.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκήπτρον
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - bastón
  - bastón real
  lexicon: LSJ
  rationale: σκήπτρον designa un bastón de autoridad regia o judicial. En español, «cetro» conserva de forma natural ese valor simbólico de mando sin añadir una explicación innecesaria.
- source_word: ὡς ἄνθρωπος
  english_pob_choice: like a man
  chosen_spanish: como un hombre
  alternatives_spanish:
  - como un ser humano
  - como un hombre mortal
  lexicon: LSJ
  rationale: La comparación subraya una apariencia o postura meramente humana. «Como un hombre» sigue de cerca el griego y mantiene la concisión del paralelismo.
- source_word: κριτὴς
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - gobernante
  - magistrado
  lexicon: LSJ
  rationale: κριτής conserva un matiz jurídico; «juez» reproduce mejor esa fuerza que opciones más amplias como «gobernante».
- source_word: χώρας
  english_pob_choice: of a country
  chosen_spanish: de una nación
  alternatives_spanish:
  - de un país
  - de una región
  - de una tierra
  lexicon: LSJ
  rationale: χώρας puede significar tierra, país o región. En español, «nación» mantiene la idea de un ámbito territorial o jurisdiccional sin reducirla a una unidad política moderna demasiado específica.
- source_word: ἀνελεῖ
  english_pob_choice: will not destroy
  chosen_spanish: no destruirá
  alternatives_spanish:
  - no matará
  - no quitará de en medio
  - no eliminará
  lexicon: LSJ
  rationale: ἀναιρέω puede abarcar matar, quitar de en medio o hacer desaparecer. «No destruirá» preserva la amplitud de la impotencia descrita y evita limitar el verbo solo a matar.
- source_word: τὸν εἰς αὐτὸν ἁμαρτάνοντα
  english_pob_choice: the one who sins against him
  chosen_spanish: al que peca contra él
  alternatives_spanish:
  - al que está pecando contra él
  - al que lo ofende
  lexicon: LSJ
  rationale: El participio funciona sustantivamente. «Peca contra él» mantiene la fuerza moral/religiosa de ἁμαρτάνω y reproduce el movimiento relacional de εἰς αὐτόν.
theological_decisions:
- issue: Imaginería judicial humana aplicada al ídolo
  english_pob_reading: 'Retain the comparison straightforwardly: the idol holds a scepter like a human judge, yet cannot punish an offender.'
  chosen_spanish_reading: 'Conservar de manera directa la comparación: el ídolo sostiene un cetro como un hombre, como juez de una nación, pero no puede destruir al que peca contra él.'
  alternative_spanish_readings:
  - Entender κριτὴς χώρας de forma más libre como «gobernante de una provincia»
  - Suavizar la imagen jurídica con «autoridad» en vez de «juez»
  rationale: La frase satiriza la apariencia de autoridad del ídolo frente a su impotencia real. Mantener «juez» conserva la tensión jurídica del original y evita resolverla con una paráfrasis más general.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del idioma original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés, que prefirió «country» para χώρας por naturalidad. En español se optó por «nación» para preservar la misma amplitud territorial/jurisdiccional sin sonar forzado; se mantuvo intacta la estructura del enunciado y la fuerza de ἀνελεῖ como incapacidad de ejercer juicio.
  spanish_consistency_notes:
  - Se usó «cetro» para σκήπτρον, en línea con el simbolismo de autoridad del pasaje.
  - Se mantuvo «juez» para κριτής para no diluir la imaginería legal.
  - «Peca contra él» conserva el valor relacional de εἰς αὐτόν.
  - 'No se suavizó la crítica a los ídolos: la frase final sigue expresando impotencia para castigar al ofensor.'
