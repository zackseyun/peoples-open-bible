translation:
  language: es
  text: Y había un joven de Belén de Judá, del clan[a] de Judá; y era un levita, y estaba residiendo allí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la familia de Judá». El término hebreo puede denotar un grupo familiar o clan; aquí se usa «clan» por mayor precisión.
    reason: lexical_alternative
  - marker: b
    text: O «estaba morando allí». El verbo hebreo suele referirse a vivir en un lugar como residente temporal o forastero.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now there was
  chosen_spanish: Ahora había
  alternatives_spanish:
  - Y había
  - Entonces había
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce una nueva escena o dato narrativo. «Ahora había» suena natural en español moderno y conserva el valor introductorio sin sobretraducir la conjunción.
- source_word: נַעַר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - mozo
  - siervo
  lexicon: HALOT
  rationale: Aquí el contexto identifica al personaje por su procedencia y condición, no por una función servil. «Joven» es claro, digno y suficientemente amplio para el rango semántico de נַעַר.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  english_pob_choice: from Bethlehem in Judah
  chosen_spanish: de Belén de Judá
  alternatives_spanish:
  - de Belén en Judá
  - de Belén-Judá
  - de Belén de Judea
  lexicon: HALOT
  rationale: El hebreo designa Belén con una especificación territorial. En español, «de Belén de Judá» preserva la referencia geográfica y la aclaración distintiva, con buena fluidez natural.
- source_word: מִמִּשְׁפַּחַת יְהוּדָה
  english_pob_choice: from the clan of Judah
  chosen_spanish: de la familia de Judá
  alternatives_spanish:
  - del clan de Judá
  - de la casa de Judá
  - de la tribu de Judá
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede referirse a un grupo familiar amplio o clan. En español, «familia» es el equivalente más natural; «clan» sería más técnico y menos idiomático, aunque sigue disponible en la nota para mantener la alternativa léxica.
- source_word: לֵוִי
  english_pob_choice: a Levite
  chosen_spanish: levita
  alternatives_spanish:
  - un levita
  - de la tribu de Leví
  - levítico
  lexicon: HALOT
  rationale: El sustantivo identifica su pertenencia levítica. «Levita» reproduce el término bíblico estándar en español y conserva la tensión del versículo sin armonizarla.
- source_word: גָר שָׁם
  english_pob_choice: was sojourning there
  chosen_spanish: estaba morando allí
  alternatives_spanish:
  - estaba sojourning allí
  - residía allí
  - vivía allí como forastero
  lexicon: HALOT
  rationale: גור expresa residir/sojornar como alguien que habita en un lugar sin borrar necesariamente el matiz de permanencia provisional. «Estaba morando allí» mantiene un registro formal y deja espacio a esa ambigüedad semántica.
theological_decisions:
- issue: Tensión aparente entre «de la familia de Judá» y «él era levita»
  english_pob_reading: Retain both statements without harmonization.
  chosen_spanish_reading: Conservar ambas afirmaciones en el texto principal sin resolver la tensión.
  alternative_spanish_readings:
  - Reinterpretar «familia de Judá» como solo geográfica
  - Suavizar la frase para evitar la aparente contradicción
  rationale: El hebreo presenta ambas afirmaciones juntas. La traducción debe preservar esa tensión narrativa e identitaria, no nivelarla con una paráfrasis que elimine el dato problemático.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue el último pase revisado del inglés POB: se privilegia un equivalente formal para גָר («was sojourning there») y se conserva la tensión textual entre la procedencia tribal/familiar y la identidad levítica del personaje, sin armonización.'
  spanish_consistency_notes:
  - Se usó «Belén de Judá» para mantener la especificación geográfica de modo natural en español.
  - Se eligió «levita» como término bíblico estándar y transparente en español.
  - «Morando allí» mantiene un registro reverente y no elimina el matiz de residencia provisional asociado a גָר.
  - Se prefirió «familia» frente a «clan» en el texto principal; la nota conserva la alternativa más técnica del inglés POB.
