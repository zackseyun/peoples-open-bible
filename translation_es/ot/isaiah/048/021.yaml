revisions:
- from: No tuvieron sed cuando los condujo por los desiertos[a]; hizo fluir agua para ellos desde la roca; partió la roca[b], y las aguas brotaron.
  to: No tuvieron sed cuando los condujo por los desiertos[a]; hizo fluir agua para ellos de la roca; partió la roca[b], y brotó agua.
  rationale: 'Se hicieron ajustes menores de naturalidad y estilo sin cambiar el sentido: «de la roca» por mejor español idiomático, «brotó agua» por una formulación más natural y fiel al uso español de «agua», y una simplificación leve de la nota intertextual.'
