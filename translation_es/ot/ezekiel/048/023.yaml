translation:
  language: es
  text: 'Y para el resto de las tribus: desde el lado oriental hasta el lado occidental, Benjamín, una porción[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Benjamín, uno». Se añade «porción» en español porque el capítulo usa repetidamente «uno» de manera elíptica para una asignación tribal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: And for the rest
  chosen_spanish: Y para el resto
  alternatives_spanish:
  - Y para lo restante
  - Y en cuanto al resto
  lexicon: HALOT
  rationale: El hebreo introduce la sección final sobre las tribus restantes; «y para el resto» conserva el valor conectivo y el sentido de lo que queda por repartir sin sobreparafrasear.
- source_word: הַשְּׁבָטִים
  english_pob_choice: of the tribes
  chosen_spanish: de las tribus
  alternatives_spanish:
  - de los clanes tribales
  - de los grupos tribales
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, שֵׁבֶט se refiere naturalmente a «tribu». El plural definido señala a las tribus restantes.
- source_word: מִפְּאַת קָדִימָה
  english_pob_choice: from the eastern side
  chosen_spanish: desde el lado oriental
  alternatives_spanish:
  - desde el lado del oriente
  - desde el borde oriental
  lexicon: HALOT
  rationale: פֵּאָה indica un extremo, lado o borde. «Lado oriental» comunica con claridad la fórmula direccional del pasaje en español natural.
- source_word: עַד פְּאַת יָמָּה
  english_pob_choice: to the western side
  chosen_spanish: hasta el lado occidental
  alternatives_spanish:
  - hasta el lado del mar
  - hasta el borde occidental
  lexicon: HALOT
  rationale: יַם con terminación direccional señala el oeste, literalmente el lado del mar. «Lado occidental» preserva el valor direccional sin forzar una explicación en el texto principal.
- source_word: בִּנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamín
  lexicon: Transliteración estándar
  rationale: Nombre propio tribal; se adapta a la ortografía española usual sin alterar la identificación.
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una sola
  - un lote
  lexicon: HALOT
  rationale: El hebreo dice literalmente «uno», pero aquí funciona elípticamente como una porción territorial, como muestra el patrón repetido del capítulo. «Una porción» hace explícita la elipsis sin eliminarla.
theological_decisions:
- issue: Elipsis de אֶחָד como unidad de reparto territorial
  english_pob_reading: Benjamin, one portion.
  chosen_spanish_reading: Benjamín, una porción.
  alternative_spanish_readings:
  - Benjamín, una.
  - Benjamín, un lote.
  rationale: 'El sentido no es aritmético sino distributivo: una franja o porción de tierra asignada a Benjamín. En español, dejar solo «una» sería oscuro; «una porción» conserva la elipsis interpretada por el contexto.'
  doctrine_reference: Contexto literario de repartición en Ezequiel 48; no hay implicación doctrinal directa.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador de nota [a] exactamente en el punto correspondiente del texto principal, manteniendo la misma decisión léxica sobre la elipsis de «uno».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exige; aquí no aparece.
  - Se usa «tribus» y «porción» en sentido territorial coherente con Ezequiel 48.
  - «Lado oriental / lado occidental» preserva la fórmula direccional recurrente del capítulo.
