theological_decisions:
- issue: Reference of ‘Holy Spirit’
  chosen_reading: The phrase refers to the Holy Spirit, the divine person, not merely a spiritual atmosphere or human spirit.
  alternative_readings:
  - a holy spirit/spiritual power
  rationale: In Pauline usage, πνεῦμα ἅγιον in this construction ordinarily denotes the Holy Spirit. The surrounding contrast between mere word and effective proclamation also supports divine agency.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Sense of πληροφορίᾳ πολλῇ
  chosen_reading: Rendered as ‘with great full assurance,’ leaving the subject of the assurance somewhat open.
  alternative_readings:
  - with great conviction
  - with complete certainty
  rationale: The Greek does not explicitly specify whether the assurance is in the preachers, the hearers, or the overall manner of the gospel’s coming. The translation preserves that breadth rather than narrowing it interpretively.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of οἷοι ἐγενήθημεν
  chosen_reading: Rendered with ‘men’ to refer to Paul and his companions specifically.
  alternative_readings:
  - people
  rationale: This is not a generic masculine referring to humanity in general but to a known group of male missionaries. Gender-accurate translation therefore favors ‘men.’
  doctrine_reference: Translation philosophy §4
