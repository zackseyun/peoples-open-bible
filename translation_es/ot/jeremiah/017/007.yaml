translation:
  language: es
  text: ¡Bendito[a] es el hombre que confía en Yahvé, y cuya confianza es Yahvé!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Feliz»; el hebreo expresa más bien bendición que mero estado emocional.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Feliz
  lexicon: HALOT
  rationale: El participio/adjetivo pasivo expresa una condición de bendición; «Bendito» conserva mejor el peso teológico y pactal que «Feliz», que suena más subjetivo.
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: גֶּבֶר es masculino singular y aquí funciona de modo proverbial y representativo. En español, «el hombre» mantiene ese valor sin suavizar innecesariamente el género marcado del hebreo.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - quien
  lexicon: HALOT
  rationale: La partícula relativa introduce una cláusula definitoria; «que» es la forma más natural y fiel en español en este contexto.
- source_word: יִבְטַח
  english_pob_choice: trusts
  chosen_spanish: confía
  alternatives_spanish:
  - tiene confianza
  - se apoya
  lexicon: HALOT
  rationale: בטח denota poner confianza; «confía» reproduce bien el verbo y su fuerza de dependencia, manteniendo además la relación léxica con מִבְטַח.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: «Yahvé» en el texto principal. La preposición ב con בטח se vierte naturalmente como «en».'
- source_word: וְהָיָה
  english_pob_choice: whose ... is
  chosen_spanish: y cuya ... es
  alternatives_spanish:
  - y es
  - y será
  lexicon: HALOT
  rationale: El hebreo usa וְהָיָה para una relación resultante/estativa. En español, «y cuya confianza es...» conserva la coordinación y refleja la conexión sintáctica sin forzar un futuro innecesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se mantiene la misma forma del nombre divino que en la primera cláusula, por coherencia terminológica y fidelidad al Tetragrámaton.
- source_word: מִבְטַחוֹ
  english_pob_choice: his trust
  chosen_spanish: confianza
  alternatives_spanish:
  - seguridad
  - refugio
  - objeto de su confianza
  lexicon: HALOT
  rationale: El sustantivo derivado de בטח puede denotar aquello en lo que se confía. «Confianza» permite conservar el juego de palabras con יִבְטַח y su sentido de dependencia; «objeto de su confianza» sería más explicativo pero menos conciso.
theological_decisions:
- issue: Nombre divino יְהוָה en ambas cláusulas
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo nombra directamente el Tetragrámaton. Siguiendo el estándar del proyecto, se traduce con el nombre propio «Yahvé» y no se enmascara como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre confiar y ser confianza
  english_pob_reading: and whose trust is Yahweh
  chosen_spanish_reading: y cuya confianza es Yahvé
  alternative_spanish_readings:
  - y Yahvé es su confianza
  - y Yahvé es el objeto de su confianza
  rationale: El hebreo presenta un juego entre el verbo בטח y el sustantivo מִבְטַח. «Cuya confianza es Yahvé» preserva esa relación sin perder naturalidad en español; también deja abierta la lectura de que Yahvé es aquello en lo que se deposita la confianza.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El borrador incorpora la conjunción hebrea explícita («y») entre las dos cláusulas, como en la revisión del inglés POB, y conserva la tensión lexical entre confiar (verbo) y confianza (sustantivo). También respeta la convención del proyecto para el nombre divino, usando Yahvé en todo el versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para יְהוָה.
  - Se conserva el paralelismo breve del hebreo con una estructura española igualmente concisa.
  - La nota al pie marca la alternativa «Feliz» sin desplazar la opción principal de bendición.
  - «Confía / confianza» reproduce el juego de raíz בטח sin introducir una explicación excesiva en el texto principal.
