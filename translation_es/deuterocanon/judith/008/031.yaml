review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la mayor parte: δεήθητι περὶ ἡμῶν = «ruega por nosotros», γυνὴ εὐσεβὴς = «una mujer piadosa», ἀποστελεῖ Κύριος τὸν ὑετόν = «el Señor enviará lluvia», εἰς πλήρωσιν τῶν λάκκων ἡμῶν = «para llenar nuestras cisternas». El problema principal está en οὐκ ἐκλείψομεν ἔτι: el griego literalmente apunta a ‘no faltaremos / no se agotará / no estaremos en necesidad’, y aunque la auditoría inglesa revisó a «perish», en español «no pereceremos más» suena demasiado absoluto y desplaza el foco desde la escasez y agotamiento hacia muerte física. La nota ya preserva mejor el valor léxico del griego que el texto principal.'
  spanish_quality_summary: El español es claro y digno. «Ruega por nosotros» y «nuestras cisternas» son naturales. Sin embargo, «no pereceremos más» suena algo duro y menos idiomático en este contexto de sequía; una formulación como «ya no estaremos en necesidad» o «ya no nos faltará» comunica mejor el sentido contextual sin perder naturalidad.
  glossary_alignment: 'Buen ajuste general al glosario salvo la política del proyecto para κύριος/YHWH: aquí el texto griego tiene κύριος, y la documentación inglesa eligió «the Lord»; por tanto en español «el Señor» es apropiado en este versículo y no requiere «Yahvé». No hay otros choques significativos con terminología del proyecto.'
  issues:
  - severity: medium
    issue: «no pereceremos más» sobretraduce οὐκ ἐκλείψομεν ἔτι
    rationale: ἐκλείπω en este contexto de lluvia, cisternas y escasez se refiere más naturalmente a dejar de faltar, agotarse o estar en necesidad. «Perecer» es posible por inferencia contextual, pero en español estrecha el sentido y puede sugerir muerte física más directamente que el griego.
  - severity: low
    issue: La nota lexical y el texto principal quedan tensos entre sí
    rationale: La nota explica correctamente que el griego dice literalmente «no faltaremos más», mientras que el cuerpo dice «no pereceremos más». Conviene acercar el texto principal a la nota para coherencia auditiva y exegética.
  revised_spanish_text: Y ahora ruega por nosotros,[a] porque eres una mujer piadosa, y el Señor enviará lluvia para llenar nuestras cisternas, y ya no estaremos en necesidad.
  revised_footnotes:
  - marker: a
    text: 'O: «ya no nos faltará nada» o «ya no escasearemos». El griego dice literalmente: «no faltaremos más».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula final para reflejar mejor οὐκ ἐκλείψομεν ἔτι en español, manteniendo el marco de escasez y provisión sin reducirlo a muerte física. También se conserva la alternativa literal en nota, en coherencia con la auditoría inglesa y con el matiz léxico del griego.
