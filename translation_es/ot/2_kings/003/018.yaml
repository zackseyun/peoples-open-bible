    issue: Número incorrecto en «tu mano»
    rationale: El hebreo בְּיֶדְכֶם lleva sufijo 2mp, por lo que debe reflejarse en plural («su mano»/«sus manos» según tratamiento) y no en singular.
  - severity: medium
    issue: «Ante los ojos de» es menos natural que «a los ojos de»
    rationale: El modismo evaluativo בְּעֵינֵי se expresa de manera más idiomática en español con «a los ojos de», preservando la imagen sin rigidez innecesaria.
  - severity: medium
    issue: «Algo pequeño» es menos idiomático que «poca cosa» en este contexto
    rationale: נקל aquí expresa que algo es leve, fácil o de poca importancia. «Poca cosa» comunica mejor la valoración que «algo pequeño», que puede sonar demasiado literal o físico.
  revised_spanish_text: Y esto es poca cosa[a] a los ojos de Yahvé; también entregará a Moab en sus manos.
