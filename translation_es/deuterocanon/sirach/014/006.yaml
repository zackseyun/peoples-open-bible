revisions:
- from: Porque el que es malo para sí mismo[a], no hay ninguno más malo que él; y esta es la retribución de su maldad.
  to: El que es malo para sí mismo[a], no hay ninguno más malo que él; y esta es la retribución de su mal.
  rationale: Se eliminó «Porque» porque no corresponde al texto fuente. Se cambió «su maldad» por «su mal» para conservar mejor la repetición de רע / «mal» presente en el hebreo y en la decisión léxica del POB. Se mantuvo la nota griega porque preserva adecuadamente el matiz alternativo de mezquindad hacia uno mismo.
