    issue: διέστησεν está subrepresentado por 'los ha llevado'
    rationale: El verbo griego implica separar/dividir y, con 'de nación en nación', desplazamiento desestabilizador. 'Llevar' puede sonar neutral o incluso benévolo, perdiendo el efecto social destructivo del original.
  - severity: low
    issue: El artículo indefinido en 'Una lengua tercera' reduce la fuerza proverbial
    rationale: En español bíblico y sentencioso, 'La lengua tercera' suena más gnómico y refleja mejor la frase nominal griega sin introducir un matiz de mera instancia cualquiera.
  revised_spanish_text: La lengua tercera[a] ha sacudido a muchos y los ha lanzado de nación en nación.
