translation:
  language: es
  text: Ester no había revelado a su pueblo ni a su linaje[a], porque Mardoqueo le había mandado que no lo revelara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su parentela' o 'su ascendencia'. El hebreo puede referirse a parentesco, linaje o lugar de origen; aquí probablemente señala la descendencia familiar de Ester.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגִּידָה
  english_pob_choice: had not disclosed
  chosen_spanish: no había dado a conocer
  alternatives_spanish:
  - no había divulgado
  - no había revelado
  - no había hecho saber
  lexicon: HALOT
  rationale: El verbo hifil de נגד expresa hacer saber o declarar. En español, 'dar a conocer' conserva la idea de revelar una información oculta y suena natural en este contexto narrativo de identidad encubierta. El pluscuamperfecto mantiene el trasfondo de la acción anterior.
- source_word: עַמָּהּ
  english_pob_choice: her people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su nación
  - a su etnia
  lexicon: HALOT
  rationale: עַם suele referirse al grupo étnico o nacional de pertenencia. 'Pueblo' preserva ese alcance colectivo sin reducirlo a ciudadanía moderna.
- source_word: מוֹלַדְתָּהּ
  english_pob_choice: her kindred / her family line
  chosen_spanish: a su parentela
  alternatives_spanish:
  - a su ascendencia
  - a su linaje familiar
  - a su familia
  lexicon: HALOT
  rationale: מֹולֶדֶת puede aludir a descendencia, origen o grupo de parentesco. 'Parentela' comunica relación de sangre o parentesco y evita repetir simplemente 'pueblo'; además mantiene abierta la tensión léxica entre familia, ascendencia y origen.
- source_word: צִוָּה עָלֶיהָ
  english_pob_choice: had commanded her
  chosen_spanish: le había mandado
  alternatives_spanish:
  - le había ordenado
  - le había dado la orden
  - le había encomendado
  lexicon: HALOT
  rationale: צוה es un verbo fuerte de mandato. 'Mandado' es directo, fiel y natural en español; con el dativo 'le' conserva el sentido de orden dirigida a Ester.
- source_word: אֲשֶׁר לֹא תַגִּיד
  english_pob_choice: that she should not disclose it
  chosen_spanish: que no lo diera a conocer
  alternatives_spanish:
  - que no lo revelara
  - que no lo hiciera saber
  - que no lo divulgara
  lexicon: HALOT
  rationale: La cláusula subordinada expresa el contenido del mandato. El pronombre 'lo' retoma de forma natural 'su pueblo ni su parentela'. 'Diera a conocer' repite el campo semántico del verbo principal y mantiene cohesión léxica.
- source_word: אֶסְתֵּר
  english_pob_choice: Esther
  chosen_spanish: Ester
  alternatives_spanish:
  - Esther
  lexicon: conventional Spanish proper name usage
  rationale: En español bíblico es común 'Ester' para el nombre de la reina. Se mantiene la forma reconocible en el ámbito lector hispano sin alterar la identificación del personaje.
translation_notes:
  revision_awareness: La redacción sigue de cerca el registro del texto hebreo y la solución inglesa revisada, pero en español opta por un equivalente natural para הִגִּידָה ('dar a conocer') y por 'parentela' para mantener el campo semántico amplio de מוֹלַדְתָּהּ sin estrecharlo indebidamente. También conserva la repetición verbal entre el mandato y la acción prohibida.
  spanish_consistency_notes:
  - Se usa 'Ester' y no 'Esther' para uniformidad con el uso bíblico hispano estándar.
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino ni una cita de κύριος.
  - Se mantiene el paralelismo entre el verbo principal y el verbo del mandato mediante 'dar a conocer' / 'diera a conocer'.
