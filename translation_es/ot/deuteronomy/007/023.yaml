revisions:
- from: Pero Yahvé tu Dios los entregará delante de ti y los llenará de gran confusión[a][b], hasta que sean destruidos.
  to: Pero Yahvé tu Dios los entregará delante de ti[a] y los sumirá en gran confusión[b], hasta que sean destruidos.
  rationale: Se conserva la traducción general, pero se sustituye 'los llenará de gran confusión' por 'los sumirá en gran confusión' para representar con mayor fidelidad el verbo hebreo המם en contexto militar y mejorar la naturalidad del español sin perder la relación con la nota léxica sobre 'gran pánico' o 'gran tumulto'.
