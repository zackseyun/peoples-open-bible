    text: O «con odio» o «por hostilidad» para «en enemistad».
    reason: lexical_alternative
  - marker: b
    text: O «el pariente-vengador de la sangre».
    reason: lexical_alternative
  revision_rationale: Se ajusta la pena legal a una formulación pasiva más fiel al hebreo, se fortalece la categoría de homicidio intencional con «asesino», se mejora la naturalidad jurídica con «dará muerte», y se depura la nota al pie b para que ofrezca una alternativa real sin redundancia.
