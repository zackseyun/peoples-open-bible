translation:
  language: es
  text: Ellos apartan a los necesitados del camino[a]; juntos se esconden los pobres del país[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los apartan de la senda».
    reason: lexical_alternative
  - marker: b
    text: O «los pobres de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַטּוּ
  english_pob_choice: turn ... off
  chosen_spanish: apartan
  alternatives_spanish:
  - desvían
  - hacen apartar
  lexicon: HALOT
  rationale: El verbo hifil de נטה expresa causar que alguien se desvíe o se aparte. «Apartan» comunica bien la acción causativa sin añadir fuerza interpretativa excesiva.
- source_word: אֶבְיוֹנִים
  english_pob_choice: the needy
  chosen_spanish: los necesitados
  alternatives_spanish:
  - los pobres
  - los indigentes
  lexicon: HALOT
  rationale: אביון denota a los necesitados o pobres en sentido de vulnerabilidad social. «Necesitados» conserva esa carga y distingue un poco este término de עֲנִיֵּי al final del verso.
- source_word: מִדָּרֶךְ
  english_pob_choice: off the road
  chosen_spanish: del camino
  alternatives_spanish:
  - de la senda
  - del camino público
  lexicon: HALOT
  rationale: El hebreo puede entenderse como «de la vía/camino». «Del camino» es natural en español y preserva la imagen de ser removidos del tránsito común.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - todos a una
  lexicon: HALOT
  rationale: יַחַד señala acción colectiva; «juntos» es la forma más directa y clara en español.
- source_word: חֻבְּאוּ
  english_pob_choice: hide themselves
  chosen_spanish: se esconden
  alternatives_spanish:
  - se ocultan
  - han sido escondidos
  lexicon: HALOT
  rationale: El pual de חבא puede leerse de manera pasiva o reflexiva. «Se esconden» mantiene la idea de retirada bajo presión y suena natural en español, sin borrar la tensión entre pasivo y reflexivo.
- source_word: עֲנִיֵּי אָרֶץ
  english_pob_choice: the poor of the land
  chosen_spanish: los pobres de la tierra
  alternatives_spanish:
  - los afligidos de la tierra
  - los pobres del país
  lexicon: HALOT
  rationale: עֲנִיֵּי puede ser «pobres» o «afligidos/oprimidos». «Los pobres de la tierra» sigue de cerca la opción inglesa auditada y mantiene el sentido social del término; «tierra» preserva la imagen del ámbito comunitario.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando los marcadores [a] y [b] directamente en el texto español. La redacción mantiene la alternancia léxica auditada en el inglés POB, sin introducir paráfrasis no respaldadas.
  spanish_consistency_notes:
  - Se usó «necesitados» para אֶבְיוֹנִים y «pobres» para עֲנִיֵּי אָרֶץ para conservar la leve variación semántica del hebreo.
  - Se prefirió «camino» en lugar de «tierra» o «senda» para evitar una imagen demasiado técnica o regionalizada.
  - No se empleó «SEÑOR» ni terminología eclesiástica añadida, porque el verso no contiene el tetragrámaton ni lenguaje cristológico.
