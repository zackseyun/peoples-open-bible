lexical_decisions:
- source_word: וְ/לֹא
  english_pob_choice: And you shall not
  chosen_spanish: Y no
  alternatives_spanish:
  - 'No'
  - Ni
  lexicon: HALOT
  rationale: La conjunción וְ enlaza este mandamiento con la secuencia previa del Decálogo; en español, «Y» conserva esa coordinación. «No» expresa directamente la negación, sin añadir un auxiliar que el hebreo no requiere.
- source_word: תִּגְנֹב
  english_pob_choice: you shall ... steal
  chosen_spanish: robarás
  alternatives_spanish:
  - hurtarás
  - no hurtarás
  - no robarás
  lexicon: HALOT
  rationale: En este contexto legal, גנב funciona como prohibición general. «Robarás» conserva la fuerza verbal del mandato en español y corresponde al sentido amplio elegido por la POB inglesa. Se evita «hurtar» por ser menos natural para lectores actuales y por no aportar mayor precisión aquí.
theological_decisions:
- issue: Alcance general del mandamiento frente a posibles sentidos de ‘secuestrar/robar una persona’
  english_pob_reading: 'The command is stated generally: ''steal.'''
  chosen_spanish_reading: 'El mandamiento se formula de manera general: «robar».'
  alternative_spanish_readings:
  - «secuestrar»
  - «robar a una persona»
  rationale: La evidencia del contexto inmediato no restringe el objeto del verbo. Por eso la traducción mantiene el valor general de la prohibición y no estrecha el sentido a secuestro o rapto.
  doctrine_reference: Éxodo 20:15; Deuteronomio 5:19
translation_notes:
  revision_awareness: El contexto fuente no presenta revisiones textuales ni cambios sustantivos; la lectura coincide con la tradición masorética breve y con el seguimiento auditado de la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene el tono breve y jurídico propio del Decálogo.
  - Se evita «SEÑOR» u այլ sustituciones teológicas porque este versículo no contiene el nombre divino.
  - La nota de pie conserva la ambigüedad lexical documentada por la POB inglesa sin sobreespecificar el objeto del robo.
