review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: fórmula profética temporal, nombre divino como Yahvé, ruptura del yugo y de las ataduras, y liberación de la esclavitud extranjera. Sin embargo, hay dos desajustes menores con el expediente auditado: el marcador [a] está anclado en «en aquel día» pero su nota trata de una lectura alternativa de la cláusula final, y la nota [b] se usa para מוֹסְרוֹת aunque en el inglés auditado la nota b corresponde al título divino tradicional ''LORD of Hosts''.'
  spanish_quality_summary: El español es claro y digno, pero «de sobre tu cuello» suena algo calcado; «de tu cuello» o «de encima de tu cuello» sería más natural. También conviene hacer coincidir las notas con sus anclajes y evitar notas no respaldadas por el audit trail salvo necesidad real. La cláusula final «ya no lo someterán a esclavitud» es comprensible, pero «ya no lo harán su esclavo» o «ya no lo esclavizarán» reproduce más directamente la fuerza coercitiva y el objeto singular del hebreo.
  glossary_alignment: Se alinea bien con la pauta del proyecto en «Yahvé» para יהוה y «de los Ejércitos» para צְבָאוֹת. La fuerza de עבד se conserva en clave de esclavitud, lo cual es correcto. No hay conflicto terminológico mayor, pero sí conviene restaurar la nota lexical sobre «de los Ejércitos» como alternativa tradicional «de las huestes» para reflejar el expediente inglés.
  issues:
  - severity: medium
    issue: La nota [a] está mal anclada y explica el elemento equivocado.
    rationale: En el audit trail inglés, la nota a pertenece a la cláusula final difícil («foreigners shall no longer make him their slave»), no a «en aquel día». En español, si se conserva la nota, debe anclarse en la cláusula final.
  - severity: medium
    issue: La nota [b] no corresponde al contenido documentado en el audit trail.
    rationale: La nota b inglesa da la alternativa tradicional para el título divino («the LORD of Hosts»), no una explicación lexical de «tus ataduras». Si se mantienen notas, deben seguir la documentación existente salvo que el español requiera una aclaración nueva real.
  - severity: low
    issue: «de sobre tu cuello» suena poco natural en español.
    rationale: Aunque intenta preservar מֵעַל, en español bíblico natural «de tu cuello» o «de encima de tu cuello» comunica mejor sin perder la imagen física.
  - severity: low
    issue: La cláusula final puede expresarse con más fuerza y literalidad.
    rationale: «Lo someterán a esclavitud» es aceptable, pero «lo harán su esclavo» refleja más de cerca la decisión POB «make him their slave» y conserva mejor el pronombre singular.
  revised_spanish_text: Y sucederá en aquel día, declara Yahvé de los Ejércitos[b], que romperé su yugo de tu cuello, y arrancaré tus ataduras, y los extranjeros ya no lo harán su esclavo[a].
  revised_footnotes:
  - marker: a
    text: 'O: «los extranjeros ya no lo esclavizarán». La cláusula final hebrea está sintácticamente condensada; el sentido es que Israel/Jacob ya no estará sometido a servidumbre extranjera.'
    reason: alternative_reading
  - marker: b
    text: Tradicionalmente, «Yahvé de las huestes».
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige la correspondencia de notas con el audit trail, mejora la naturalidad de «de tu cuello», y refuerza la cláusula final con una formulación más cercana a la decisión inglesa documentada («make him their slave»). Se mantiene la terminología del proyecto: «Yahvé» y «de los Ejércitos».'
