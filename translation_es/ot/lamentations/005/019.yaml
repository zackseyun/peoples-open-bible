translation:
  language: es
  text: Pero tú[a], oh Yahvé, estás entronizado para siempre; tu trono es de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «permaneces para siempre»; el verbo hebreo literalmente significa «sentarse», pero en este contexto tiene el sentido de entronización real.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  lexicon: HALOT
  rationale: El pronombre independiente en hebreo va al inicio con valor enfático/contrastivo. En español, «Pero tú» conserva ese contraste de manera natural sin añadir una repetición pesada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrama se vierte con el nombre propio divino, no con una sustitución titulada. «Yahvé» preserva el nombre del pacto y sigue el criterio POB documentado.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por la eternidad
  lexicon: HALOT
  rationale: עוֹלָם expresa duración sin límite. «Para siempre» es la forma natural y digna en español para esta afirmación poética de permanencia.
- source_word: תֵּשֵׁב
  english_pob_choice: sit enthroned
  chosen_spanish: te sientas [a]
  alternatives_spanish:
  - estés sentado
  - reines
  - te sientes entronizado
  lexicon: HALOT
  rationale: El verbo literalmente es «sentarse», y el contexto del trono permite entender la entronización. En español, una construcción más literal mantiene esa tensión; la nota explica la lectura real de realeza sin ocultar la literalidad del hebreo.
- source_word: כִּסְאֲךָ
  english_pob_choice: your throne
  chosen_spanish: tu trono
  alternatives_spanish:
  - tu trono real
  lexicon: HALOT
  rationale: Renderización directa y estándar de כִּסֵּא con sufijo de segunda persona masculina singular. Conserva la imagen regia que gobierna la segunda cola.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación tras generación
  - para todas las generaciones
  lexicon: HALOT
  rationale: La expresión idiomática hebrea de continuidad sucesiva se expresa de modo natural con «de generación en generación», preservando el sentido durativo sin introducir un verbo inexistente en el hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  - oh el SEÑOR
  rationale: La lectura fuente usa el Nombre divino directamente. Se mantiene «Yahvé» para no sustituirlo por un título, y se añade la interjección «oh» por la sintaxis vocativa natural en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido real de תֵּשֵׁב con כִּסְאֲךָ
  english_pob_reading: sit enthroned
  chosen_spanish_reading: te sientas
  alternative_spanish_readings:
  - reinas
  - permaneces sentado en el trono
  - te sientas entronizado
  rationale: El inglés POB reconoce la tensión entre el sentido literal «sentarse» y el sentido contextual de entronización. En español se preserva el verbo básico y se deja abierta esa carga regia mediante la nota, evitando perder la imagen verbal del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy'
- issue: Estructura del segundo hemistiquio
  english_pob_reading: your throne is from generation to generation
  chosen_spanish_reading: tu trono es de generación en generación
  alternative_spanish_readings:
  - tu trono permanece de generación en generación
  - tu trono dura de generación en generación
  rationale: El hebreo no añade un verbo equivalente a «permanece/dura»; la cópula española simple refleja mejor la cláusula nominal y conserva la revisión auditada del POB inglés.
  doctrine_reference: 'Revision awareness: the Hebrew lacks a separate verb meaning ''endures'' in the second colon'
translation_notes:
  revision_awareness: 'La revisión auditada del texto inglés corrigió la segunda cola de «endures from generation to generation» a «is from generation to generation» para ajustarse mejor al hebreo, que no usa un verbo separado de «permanecer/durar». La versión española sigue esa corrección con una cópula simple: «tu trono es de generación en generación».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al criterio POB para el Nombre divino.
  - Se mantiene «de generación en generación» como equivalente idiomático de לְדֹר וָדֹר.
  - La nota textual acompaña la tensión léxica entre «sentarse» y «entronización» sin suprimir la literalidad del verbo hebreo.
  - El tono es bíblico y legible en español contemporáneo, sin calco excesivo ni sustituciones eclesiásticas no motivadas.
