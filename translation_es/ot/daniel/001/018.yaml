translation:
  language: es
  text: Y al final del tiempo señalado que el rey había dicho para traerlos[a], el jefe de los eunucos los trajo ante Nabucodonosor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el funcionario principal» / «el comandante de los oficiales de la corte». El término hebreo puede designar a un eunuco o, más ampliamente, a un funcionario real de la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְמִקְצָת הַיָּמִים
  english_pob_choice: And at the end of the days
  chosen_spanish: Y al fin de los días
  alternatives_spanish:
  - Y al final de los días
  - Y al término de los días
  - Y cuando terminaron los días
  lexicon: HALOT
  rationale: מִקְצָת + הַיָּמִים señala el término de un periodo ya fijado. «Al fin de los días» conserva la imagen temporal plural del hebreo y sigue de cerca la decisión auditada en inglés sin sonar forzado en español.
- source_word: אֲשֶׁר אָמַר הַמֶּלֶךְ
  english_pob_choice: that the king had said
  chosen_spanish: que el rey había dicho
  alternatives_spanish:
  - que el rey había ordenado
  - que el rey había mandado
  - que el rey había dispuesto
  lexicon: HALOT
  rationale: אָמַר es «decir»; el contexto muestra una instrucción previa del rey, pero el texto hebreo no usa un verbo más técnico como «mandar». El pluscuamperfecto refleja correctamente la anterioridad narrativa.
- source_word: לַהֲבִיאָם / וַיְבִיאֵם
  english_pob_choice: to bring them in / brought them
  chosen_spanish: para traerlos / los trajo
  alternatives_spanish:
  - para presentarlos / los presentó
  - para llevarlos / los llevó
  lexicon: HALOT
  rationale: El hifil de בוא expresa causar la llegada. En español, «traer» comunica bien la acción de hacer comparecer ante alguien; «presentar» sería más interpretativo y «llevar» perdería la relación con la llegada ante la presencia real.
- source_word: שַׂר הַסָּרִיסִים
  english_pob_choice: the chief of the eunuchs
  chosen_spanish: el jefe de los eunucos
  alternatives_spanish:
  - el jefe oficial
  - el comandante de los oficiales de la corte
  lexicon: HALOT
  rationale: סָרִיס puede significar «eunuco» o, en sentido más amplio, funcionario de corte. Como el audit trail inglés preserva la forma más explícita y documenta la alternativa amplia, en español se mantiene «eunucos» y se deja abierta la lectura funcional mediante nota.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» es natural en español y conserva la idea de comparecer ante una autoridad. «Ante» también sería posible, pero la forma elegida suena más idiomática en esta escena narrativa.
- source_word: נְבֻכַדְנֶצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadnezar
  lexicon: standard transliteration
  rationale: Se sigue la forma española habitual del nombre propio, ampliamente reconocible en contextos bíblicos, sin alterar el referente histórico.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta revisiones sustantivas; el pasaje se mantiene estable, con una única nota léxica sobre שַׂר הַסָּרִיסִים. La versión española sigue esa misma resolución y conserva la alternativa amplia en nota para no borrar la tensión semántica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se emplea «Nabucodonosor», la forma española estándar, para un nombre propio de uso bíblico común.
  - Se conserva «eunucos» en el texto principal por fidelidad al término hebreo explícito, con nota para la posible extensión a funcionario de corte.
  - «Delante de» traduce naturalmente la comparecencia ante una autoridad sin perder el valor relacional de לִפְנֵי.
