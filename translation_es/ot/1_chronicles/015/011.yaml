  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: David convoca a Sadoc y Abiatar como sacerdotes, y a los levitas identificados por nombre. La puntuación con dos puntos después de ''los levitas'' también sigue bien la función explicativa del inglés auditado y del hebreo.'
