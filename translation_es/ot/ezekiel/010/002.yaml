review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la secuencia y el sentido del hebreo: el hombre vestido de lino, la entrada al espacio de las ruedas, la ubicación bajo el querubín, tomar brasas de entre los querubines y arrojarlas sobre la ciudad. También preserva bien el singular «querubín» y el plural «querubines». Sin embargo, dos elecciones clave no reflejan bien el texto ni la naturalidad española: «engranaje» introduce una imagen mecánica demasiado moderna para גַּלְגַּל, y «a mis ojos» no corresponde al sentido idiomático de לְעֵינָי, que en español debe ser «ante mis ojos» o equivalente.'
  spanish_quality_summary: El español es mayormente claro, pero «entre el engranaje» suena técnico y moderno en un contexto visionario bíblico, y «Y él entró a mis ojos» es claramente antinatural. «Derrámalas» es posible, pero «espárcelas» representa mejor la idea de dispersar brasas sobre la ciudad. Una revisión breve mejora fidelidad, legibilidad y tono bíblico digno.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Vestido de lino» y «querubín/querubines» están bien. La nota alternativa sobre «entre las ruedas» es adecuada y debe conservarse, pero el texto principal debe evitar «engranaje» y preferir una formulación como «entre el conjunto de ruedas» para reflejar el valor colectivo documentado sin mecanizar la imagen.
  issues:
  - severity: medium
    issue: «entre el engranaje» para בֵּינוֹת לַגַּלְגַּל
    rationale: Aunque intenta reflejar el sentido colectivo de «wheelwork», «engranaje» evoca maquinaria dentada moderna y distorsiona la imaginería del carro/ruedas visionario. «Entre el conjunto de ruedas» o similar preserva mejor la decisión léxica documentada.
  - severity: high
    issue: «Y él entró a mis ojos» para לְעֵינָי
    rationale: La expresión es antinatural en español y no transmite correctamente el sentido idiomático de «before my eyes». Debe decir «ante mis ojos».
  - severity: low
    issue: «derrámalas» para וּזְרֹק
    rationale: No es incorrecto, pero «espárcelas» o «arrójalas» expresa mejor la acción de dispersar brasas sobre la ciudad, en línea con la decisión inglesa «scatter them».
  revised_spanish_text: 'Y le dijo al hombre vestido de lino[a]: «Entra entre el conjunto de ruedas, debajo del querubín, y llena tus manos con brasas de fuego de entre los querubines, y espárcelas sobre la ciudad». Y él entró ante mis ojos.'
  revised_footnotes:
  - marker: a
    text: O «entre las ruedas». El término hebreo puede referirse al conjunto con ruedas, más que a una sola rueda.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos problemas principales: «engranaje» se reemplaza por «conjunto de ruedas» para mantener el sentido colectivo sin introducir una imagen mecánica moderna, y «a mis ojos» se corrige a «ante mis ojos» por fidelidad idiomática al hebreo. También se ajusta «derrámalas» a «espárcelas» para reflejar mejor la acción de dispersar las brasas.'
