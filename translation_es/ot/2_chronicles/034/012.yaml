translation:
  language: es
  text: Y los hombres trabajaban fielmente en la obra, y sobre ellos habían sido puestos Jahat y Obadías, los levitas, de los hijos de Merari, y Zacarías y Mesulam, de los hijos de los coatitas, para supervisar[a]; y los levitas[b], todos los que eran hábiles con instrumentos musicales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para dirigir’; el verbo hebreo puede denotar liderazgo de supervisión.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘todos los que entendían en los instrumentos de canto’, es decir, todos los que eran hábiles con instrumentos musicales.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּאֱמוּנָה
  english_pob_choice: faithfully
  chosen_spanish: fielmente
  alternatives_spanish:
  - con fidelidad
  - de manera fiel
  lexicon: HALOT
  rationale: אֱמוּנָה funciona aquí adverbialmente con עֹשִׂים, describiendo la manera de trabajar. 'Fielmente' conserva la idea de confiabilidad e integridad, con un español natural y sobrio.
- source_word: בַּמְּלָאכָה
  english_pob_choice: in the work
  chosen_spanish: en la obra
  alternatives_spanish:
  - en el trabajo
  - en la labor
  lexicon: HALOT
  rationale: מְלָאכָה se refiere aquí a la tarea concreta de reparación del templo. 'Obra' mantiene la referencia al proyecto y suena más natural en español bíblico que un simple 'trabajo'.
- source_word: מֻפְקָדִים
  english_pob_choice: were appointed
  chosen_spanish: estaban puestos
  alternatives_spanish:
  - habían sido nombrados
  - estaban nombrados
  - fueron puestos al frente
  lexicon: HALOT
  rationale: El participio hophal de פקד indica que fueron asignados a una responsabilidad. 'Estaban puestos' conserva la pasividad y la idea de encargo sin cerrar demasiado el matiz administrativo que el contexto desarrolla.
- source_word: יַחַת
  english_pob_choice: Jahath
  chosen_spanish: Jahat
  alternatives_spanish:
  - Jahath
  lexicon: HALOT
  rationale: Nombre propio transliterado al español de forma estándar y legible.
- source_word: עֹבַדְיָהוּ
  english_pob_choice: Obadiah
  chosen_spanish: Obadías
  alternatives_spanish:
  - Obadía
  - Obadiahu
  lexicon: HALOT
  rationale: Nombre propio; 'Obadías' es la forma tradicional y reconocible en español, adecuada para un registro bíblico público.
- source_word: מִן בְּנֵי מְרָרִי
  english_pob_choice: from the sons of Merari
  chosen_spanish: de los hijos de Merari
  alternatives_spanish:
  - de los descendientes de Merari
  - de los meraritas
  lexicon: HALOT
  rationale: La construcción hebrea es genealógica y tribal. 'Hijos de Merari' conserva la estructura del texto y evita una paráfrasis etnográfica.
- source_word: וּזְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zeharías
  - Zekarías
  lexicon: HALOT
  rationale: Nombre propio con forma española establecida.
- source_word: וּמְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Mesulam
  alternatives_spanish:
  - Mesullam
  - Meshullam
  lexicon: HALOT
  rationale: Nombre propio transliterado según una forma breve y publicable en español; se mantiene la identificación del nombre sin forzar una grafía inglesa.
- source_word: מִן בְּנֵי הַקְּהָתִים
  english_pob_choice: from the sons of the Kohathites
  chosen_spanish: de los hijos de los coatitas
  alternatives_spanish:
  - de los hijos de Coat
  - de los descendientes de los coatitas
  lexicon: HALOT
  rationale: '''הקְּהָתִים'' es la designación del clan; ''coatitas'' comunica en español el nombre tribal tradicional sin perder la estructura ''hijos de'' del hebreo.'
- source_word: לְנַצֵּחַ
  english_pob_choice: to oversee
  chosen_spanish: para dirigir
  alternatives_spanish:
  - para supervisar
  - para dirigir la obra
  - para organizar
  lexicon: HALOT
  rationale: El POB inglés reconoce la alternativa supervisora del verbo. En este contexto, 'dirigir' es el equivalente español más natural y abarca tanto conducción práctica como supervisión administrativa.
- source_word: כָּל מֵבִין
  english_pob_choice: all who were skilled
  chosen_spanish: todos los que entendían
  alternatives_spanish:
  - todos los que tenían pericia
  - todos los expertos
  - todos los que eran hábiles
  lexicon: HALOT
  rationale: מֵבִין puede denotar comprensión práctica, habilidad o competencia. 'Entendían' mantiene la cercanía literal al hebreo, mientras el contexto instrumental permite que se lea como pericia sin añadir una glosa excesiva en el texto principal.
- source_word: בִּכְלֵי שִׁיר
  english_pob_choice: with musical instruments
  chosen_spanish: en los instrumentos de canto
  alternatives_spanish:
  - con instrumentos musicales
  - en instrumentos de música
  - con instrumentos de canto
  lexicon: HALOT
  rationale: כְּלֵי שִׁיר literalmente es 'instrumentos de canto'. En español, 'instrumentos de canto' preserva mejor la huella semántica del hebreo que una equivalencia más interpretativa como 'musicales', aunque en la nota se deja clara la idea de habilidad instrumental.
theological_decisions:
- issue: Relación entre 'dirigir' y la función administrativa del verbo לְנַצֵּחַ
  english_pob_reading: The Hebrew verb can denote supervisory leadership; the English POB chose 'to oversee' to preserve that administrative sense.
  chosen_spanish_reading: para dirigir
  alternative_spanish_readings:
  - para supervisar
  - para dirigir/supervisar
  rationale: En español, 'dirigir' comunica de manera natural la idea de conducción y responsabilidad sobre la tarea, sin perder el matiz de supervisión que el contexto exige. Se evita un término demasiado técnico que sonaría forzado en una lista de encargados del templo.
  doctrine_reference: None
- issue: Sentido de מֵבִין junto a instrumentos de canto
  english_pob_reading: Literally 'all understanding in instruments of song,' that is, all who were skilled with musical instruments.
  chosen_spanish_reading: todos los que entendían en los instrumentos de canto
  alternative_spanish_readings:
  - todos los hábiles en instrumentos de canto
  - todos los que tenían entendimiento en instrumentos de canto
  rationale: 'Se conserva la ambigüedad útil del hebreo: no se afirma solo conocimiento abstracto, sino competencia práctica. La frase española permite leer ''entendían'' como habilidad aplicada, mientras la nota explica la equivalencia funcional.'
  doctrine_reference: None
translation_notes:
  revision_awareness: 'Se revisó el pasaje con atención al audit trail inglés y al hebreo original. Se conservaron las dos tensiones léxicas documentadas por el POB: לְנַצֵּחַ como dirección/supervisión y מֵבִין בִּכְלֵי שִׁיר como competencia en instrumentos. No se introdujeron cambios textuales respecto del sentido base; solo se adaptó la formulación a un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé fuera del versículo porque el texto no contiene el Tetragrámaton.
  - Se conservaron los nombres propios en formas españolas habituales cuando existen (Obadías, Zacarías) y se transliteraron o adaptaron los demás para uniformidad.
  - '''Hijos de Merari'' y ''hijos de los coatitas'' preservan la estructura genealógica del hebreo sin sustituirla por etnónimos más libres.'
  - '''Instrumentos de canto'' sigue de cerca el hebreo y deja explícita la base literal que el POB inglés explicó en nota.'
