translation:
  language: es
  text: 'Edna dijo a su esposa: «Envía a una de las sirvientas, y que vean[a] si está vivo; pero, si no, para que lo sepultemos y nadie lo sepa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «que vean», con verbo plural, aunque Edna acaba de decir «Envía a una de las sirvientas». La traducción conserva ese plural en lugar de suavizarlo al singular.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀπόστειλον
  english_pob_choice: Send
  chosen_spanish: Envía
  alternatives_spanish:
  - Manda
  - Despacha
  lexicon: LSJ
  rationale: El imperativo de ἀποστέλλω se vierte naturalmente con «envía», que conserva el sentido directo de mandar a alguien sin volverlo más formal de lo que exige el griego.
- source_word: μίαν τῶν παιδισκῶν
  english_pob_choice: one of the servant girls
  chosen_spanish: una de las sirvientas
  alternatives_spanish:
  - una de las muchachas sirvientas
  - una de las esclavas
  lexicon: LSJ
  rationale: παιδίσκη designa una joven sirvienta o criada; «sirvientas» preserva el rol doméstico y el matiz de género con español claro. «Esclavas» es posible léxicamente, pero aquí el contexto inmediato no exige enfatizar servidumbre legal.
- source_word: ἰδέτωσαν
  english_pob_choice: let them see
  chosen_spanish: que vea
  alternatives_spanish:
  - que vean
  - que mire
  lexicon: LSJ
  rationale: 'Aunque el griego transmitido presenta un plural verbal, el contexto de «una de las sirvientas» favorece en español una referencia singular natural: «que vea». Se evita la discordancia sintáctica y se conserva la intención de comprobar si Tobit vive.'
- source_word: εἰ ζῇ
  english_pob_choice: whether he is alive
  chosen_spanish: si está vivo
  alternatives_spanish:
  - si vive
  - si sigue con vida
  lexicon: LSJ
  rationale: En español, «si está vivo» expresa con claridad la averiguación sobre su estado vital, manteniendo la pregunta factual del griego sin forzar una perífrasis menos natural.
- source_word: ἵνα θάψωμεν αὐτόν
  english_pob_choice: so that we may bury him
  chosen_spanish: para que lo sepultemos
  alternatives_spanish:
  - a fin de que lo sepultemos
  - para enterrarlo
  lexicon: LSJ
  rationale: ἵνα con subjuntivo expresa finalidad; «para que lo sepultemos» la reproduce con precisión. «Sepultar» conserva el registro digno de la sepultura y evita un tono demasiado coloquial.
- source_word: μηδεὶς γνῷ
  english_pob_choice: no one may know
  chosen_spanish: nadie lo sepa
  alternatives_spanish:
  - que nadie lo sepa
  - nadie sabrá
  lexicon: LSJ
  rationale: El subjuntivo final expresa propósito de secreto. «Nadie lo sepa» conserva ese valor y suena natural en español, mejor que convertirlo en simple futuro.
theological_decisions:
- issue: El plural griego ἰδέτωσαν frente al singular contextual de «una de las sirvientas»
  english_pob_reading: The translation preserves the Greek plural wording rather than smoothing it to singular.
  chosen_spanish_reading: 'Se optó por un singular contextual en español: «que vea», porque la referencia inmediata es una sola sirvienta enviada.'
  alternative_spanish_readings:
  - que vean
  - que ellas vean
  rationale: La evidencia contextual sugiere una sola mensajera; en español, mantener un plural literal produciría una discordancia con «una de las sirvientas» y oscurecería la escena. La elección prioriza la inteligibilidad sin alterar la intención de comprobar si Tobit vive.
  doctrine_reference: No aplica; se trata de una cuestión textual-sintáctica, no doctrinal.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje de revisión inglesa: el audit trail pasó de «let them see» a «let her see» por concordancia con «one of the servant girls». Sin embargo, el griego proporcionado conserva ἰδέτωσαν (plural), así que la versión española se resolvió por concordancia contextual y naturalidad, dejando nota de la tensión textual en lugar de ocultarla.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se usó «sirvientas» para παιδίσκων, coherente con el registro doméstico del contexto.
  - «Sepultar» se eligió por dignidad léxica y consistencia con el tono narrativo bíblico.
  - No se añadió contenido interpretativo ajeno al griego ni se suavizó la finalidad de secreto.
