revisions:
- from: 'Todos los esclavos[a] del rey y el pueblo de las provincias del rey saben que, para todo hombre o mujer que entre al rey en el patio interior sin ser llamado[b], hay una sola ley para él: ser muerto, salvo aquel a quien el rey extienda el cetro de oro, y vivirá. Y yo[c], no he sido llamada para entrar al rey estos treinta días.'
  to: 'Todos los servidores del rey y el pueblo de las provincias del rey saben que, para cualquier hombre o mujer que entre a ver al rey en el patio interior sin ser llamado[a], hay una sola ley para esa persona[b]: ser condenado a muerte, excepto aquel a quien el rey extienda el cetro de oro, para que viva. Pero en cuanto a mí, no he sido llamada para ir a ver al rey estos treinta días.'
  rationale: Se reemplaza «esclavos» por «servidores» para seguir la decisión contextual auditada del POB y evitar introducir una idea de esclavitud no exigida por el hebreo. Se corrigen calcos poco idiomáticos («entre al rey», «ser muerto») con formulaciones españolas naturales que preservan el sentido legal y cortesano. También se explicita mejor el contraste enfático final y se conserva en nota la alternativa idiomática documentada en el inglés para «una sola ley».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:01:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja la estructura general del hebreo y conserva bien elementos clave como «las provincias del rey», «sin ser llamado» y «estos treinta días». Sin embargo, falla en un punto léxico importante auditado por el POB: עַבְדֵי aquí no debe traducirse «esclavos», sino algo como «servidores», porque el propio rastro inglés documenta que en este contexto cortesano significa personal/servidores del rey, no esclavitud. Además, varias expresiones son poco naturales o imprecisas en español («entre al rey», «ser muerto», «Y yo» sin contraste), y el texto omite la alternativa inglesa sobre «una sola ley / un solo decreto: muerte».'
  spanish_quality_summary: 'La redacción actual es comprensible, pero contiene calcos no idiomáticos que afectan la legibilidad: «entre al rey» suena incorrecto; «ser muerto» es duro y poco natural donde «ser condenado a muerte» o «ser ejecutado» expresa mejor la pena legal; «Y yo» pierde el contraste enfático y en español pide «Pero en cuanto a mí» o «Pero yo». También conviene ajustar el orden para mayor fluidez cortesana: «entre a ver al rey en el patio interior» o «vaya al rey en el patio interior».'
  glossary_alignment: 'No hay términos teológicos sensibles aquí, pero sí una desviación relevante respecto a la decisión lexical auditada: עַבְדֵי no sigue la opción inglesa «servants» contextualizada para corte persa. La revisión propuesta alinea mejor con el rastro POB y con el estilo español digno y natural.'
  issues:
  - severity: high
    issue: «esclavos» para עַבְדֵי contradice la decisión auditada del POB
    rationale: El rastro inglés explica explícitamente que en este contexto persa significa quienes sirven al rey, no esclavos en sentido de estado jurídico. Traducir «esclavos» altera el referente y endurece indebidamente el sentido.
  - severity: high
    issue: «entre al rey» es español antinatural y semánticamente impreciso
    rationale: El hebreo describe venir al rey entrando en el patio interior. En español se requiere una construcción como «entre a ver al rey» o «vaya al rey en el patio interior» para expresar acceso/audiencia sin calco defectuoso.
  - severity: medium
    issue: «ser muerto» no comunica bien la pena legal en español moderno
    rationale: Aunque intenta reflejar la pasiva, suena tosco. «Ser condenado a muerte» o «ser ejecutado» preserva mejor la fuerza judicial de לְהָמִית.
  - severity: medium
    issue: «Y yo» no refleja bien el contraste enfático de וַאֲנִי en español
    rationale: La frase contrasta la regla general con la situación personal de Ester. «Pero en cuanto a mí» o «Pero yo» comunica mejor ese énfasis.
  - severity: low
    issue: 'Falta nota española para la alternativa de «una sola ley / un solo decreto: muerte»'
    rationale: El POB inglés preserva esa alternativa idiomática. Debe conservarse en nota porque el español también puede beneficiarse de esa aclaración.
