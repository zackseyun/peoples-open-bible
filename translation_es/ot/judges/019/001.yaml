translation:
  language: es
  text: Y aconteció en aquellos días, cuando no había rey en Israel[a], que un hombre levita habitaba en las partes remotas de la región montañosa de Efraín, y tomó para sí una mujer, una concubina[b], de Belén de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no había rey en Israel». El hebreo usa una cláusula coordinada que puede leerse como afirmación separada o como trasfondo temporal.'
    reason: alternative_reading
  - marker: b
    text: «Concubina» designa a una mujer en una unión reconocida de estatus inferior al de esposa, no simplemente a una pareja casual.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea de introducción de episodio se refleja con una forma natural y digna en español. «Aconteció» mantiene el arranque temporal sin volverlo mecánico ni arcaizante.
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - durante aquellos días
  lexicon: HALOT
  rationale: Es la equivalencia temporal idiomática más directa y mantiene el refrán narrativo de Jueces.
- source_word: וּמֶלֶךְ אֵין בְּיִשְׂרָאֵל
  english_pob_choice: when there was no king in Israel
  chosen_spanish: cuando no había rey en Israel
  alternatives_spanish:
  - y no había rey en Israel
  lexicon: HALOT
  rationale: En español, la subordinación temporal fluye mejor que la coordinación literal. Conserva el valor de trasfondo contextual sin añadir interpretación.
- source_word: אִישׁ לֵוִי
  english_pob_choice: a Levite man
  chosen_spanish: un hombre levita
  alternatives_spanish:
  - un levita
  - un hombre, levita
  lexicon: HALOT
  rationale: 'Se conservan ambos elementos del hebreo: «hombre» y «levita». «Un hombre levita» suena natural y preserva el matiz appositivo.'
- source_word: גָּר
  english_pob_choice: was dwelling
  chosen_spanish: estaba viviendo
  alternatives_spanish:
  - habitaba
  - residía
  - moraba
  lexicon: HALOT
  rationale: El verbo puede implicar residencia estable o asentamiento como forastero. «Estaba viviendo» es claro en español y no fuerza el matiz de «forastero» que el contexto no explicita aquí.
- source_word: בְּיַרְכְּתֵי
  english_pob_choice: in the remote parts of
  chosen_spanish: en las partes remotas de
  alternatives_spanish:
  - en los confines de
  - en los rincones lejanos de
  - en las extremidades de
  lexicon: HALOT
  rationale: La idea central es de lejanía/margen geográfico. «Partes remotas» reproduce bien el sentido sin introducir una metáfora demasiado libre.
- source_word: הַר אֶפְרַיִם
  english_pob_choice: the hill country of Ephraim
  chosen_spanish: la región montañosa de Efraín
  alternatives_spanish:
  - la serranía de Efraín
  - el monte de Efraín
  lexicon: HALOT
  rationale: En español, «región montañosa» comunica mejor la referencia regional que un singular literal. «Monte de Efraín» podría sonar más tradicional, pero menos claro geográficamente.
- source_word: וַיִּקַּח לֹו
  english_pob_choice: and he took for himself
  chosen_spanish: tomó para sí
  alternatives_spanish:
  - y tomó para sí
  - y se tomó
  lexicon: HALOT
  rationale: La partícula pronominal לֹו añade la idea de apropiación relacional. «Tomó para sí» preserva esa fuerza reflexiva sin sonar forzado.
- source_word: אִשָּׁה פִילֶגֶשׁ
  english_pob_choice: a woman, a concubine
  chosen_spanish: una mujer, una concubina
  alternatives_spanish:
  - una concubina
  - una mujer concubina
  lexicon: HALOT
  rationale: Se conservan los dos sustantivos del hebreo porque el texto distingue el género humano («mujer») y el estatus social («concubina»). La coma ayuda a reflejar la aposición.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  english_pob_choice: from Bethlehem in Judah
  chosen_spanish: de Belén de Judá
  alternatives_spanish:
  - de Belén en Judá
  - de Belén, en Judá
  lexicon: HALOT
  rationale: «De Belén de Judá» es la designación geográfica tradicional y clara en español, y mantiene la distinción territorial.
theological_decisions:
- issue: Refrán sobre la ausencia de rey en Israel
  english_pob_reading: when there was no king in Israel
  chosen_spanish_reading: cuando no había rey en Israel
  alternative_spanish_readings:
  - y no había rey en Israel
  rationale: Se conserva el refrán como trasfondo narrativo, sin convertirlo en una glosa interpretativa sobre la monarquía. El español permite ambas lecturas, y aquí se prefiere la subordinación temporal que mejor comunica la función contextual del hebreo.
  doctrine_reference: Preservar la tensión literaria y teológica sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés de POB: se mantiene la introducción narrativa de wayyiqtol, el refrán sobre la ausencia de rey, la apposición «hombre levita», el valor de asentamiento de גָּר, la geografía de «las partes remotas / región montañosa de Efraín» y la distinción social de פִילֶגֶשׁ. No se detectan revisiones posteriores que alteren el sentido base; la nota a sobre la cláusula de «no había rey» se conserva como alternativa válida en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aparece.
  - «Mesías/Cristo» no aplica en este versículo.
  - Se mantuvo «concubina» por fuerza léxica y cultural del término; no se suavizó a «esposa» o «compañera».
  - La puntuación separa claramente la oración principal y el encadenamiento narrativo, siguiendo el estilo bíblico en español moderno.
