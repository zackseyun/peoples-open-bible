translation:
  language: es
  text: 'Entonces Elcaná, su esposo, le dijo[a]: «Ana, ¿por qué lloras? ¿Y por qué no comes? ¿Y por qué se entristece tu corazón? ¿No soy yo mejor para ti que diez hijos varones?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿está triste tu corazón?» o «¿está afligido tu corazón?». Literalmente: «¿por qué es malo tu corazón?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... le dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia narrativa con español natural. «Le dijo» mantiene el movimiento directo del discurso.
- source_word: אֶלְקָנָה אִישָׁהּ
  english_pob_choice: Elkanah her husband
  chosen_spanish: Elcaná, su esposo
  alternatives_spanish:
  - Elcaná, su marido
  - su esposo Elcaná
  lexicon: HALOT
  rationale: Se conserva la identificación appositiva de Elcaná como esposo de ella. «Esposo» es claro y digno en español contemporáneo.
- source_word: לָמֶה
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - ¿para qué?
  - ¿a qué?
  lexicon: HALOT
  rationale: La repetición retórica exige una interrogativa causal directa; «por qué» reproduce bien la fuerza del hebreo.
- source_word: תִבְכִּי
  english_pob_choice: are you weeping
  chosen_spanish: lloras
  alternatives_spanish:
  - estás llorando
  - lloras tú
  lexicon: HALOT
  rationale: En español, el presente simple en interrogación expresa de modo natural el estado actual de aflicción sin forzar un progresivo.
- source_word: לֹא תֹאכְלִי
  english_pob_choice: do you not eat
  chosen_spanish: no comes
  alternatives_spanish:
  - no estás comiendo
  - ¿no vas a comer?
  lexicon: HALOT
  rationale: El presente negativo es la forma más natural en español para una acción presente que se rehúsa.
- source_word: יֵרַע לְבָבֵךְ
  english_pob_choice: is your heart troubled
  chosen_spanish: se entristece tu corazón
  alternatives_spanish:
  - está triste tu corazón
  - se aflige tu corazón
  - se turba tu corazón
  lexicon: HALOT
  rationale: Se conserva la imagen del «corazón» como centro interior y se expresa la carga emocional del hebreo sin traducir mecánicamente «malo».
- source_word: לְבָבֵךְ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu ánimo
  - tu interior
  lexicon: HALOT
  rationale: Se mantiene el lenguaje antropológico del texto hebreo, sin sustituirlo por una paráfrasis psicológica.
- source_word: הֲלוֹא
  english_pob_choice: Am I not
  chosen_spanish: ¿No soy yo
  alternatives_spanish:
  - ¿acaso no soy yo?
  - ¿no es así que yo soy?
  lexicon: HALOT
  rationale: La pregunta retórica espera respuesta afirmativa; la forma negativa española conserva esa fuerza.
- source_word: טוֹב לָךְ
  english_pob_choice: better to you
  chosen_spanish: mejor para ti
  alternatives_spanish:
  - mejor que para ti
  - más valioso para ti
  lexicon: HALOT
  rationale: «Mejor para ti» expresa de manera idiomática la comparación con ל y evita una construcción calcada.
- source_word: מֵעֲשָׂרָה בָּנִים
  english_pob_choice: than ten sons
  chosen_spanish: que diez hijos
  alternatives_spanish:
  - que diez hijos varones
  - que diez varones
  lexicon: HALOT
  rationale: Se preserva la idea de abundancia/comparación cuantitativa. Aunque el hebreo dice literalmente «hijos/varones», «hijos» es la opción española más natural y no borra la referencia filial masculina en este contexto.
theological_decisions:
- issue: Gender-specific noun בָּנִים
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - varones
  rationale: El hebreo es masculino plural y el POB inglés opta por «sons». En español, «hijos» comunica la relación filial de forma natural; el contexto narrativo ya presupone el valor cultural de la descendencia masculina sin necesidad de una fórmula más dura.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora está anclada explícitamente en el texto principal después de «le dijo». No se han introducido notas sin ancla. La redacción sigue de cerca el hebreo y el audit trail inglés, preservando la repetición de las preguntas y el lenguaje del corazón.'
  spanish_consistency_notes:
  - Se mantuvo «Elcaná» para el nombre propio y «tu corazón» para לבבך, siguiendo la imaginería hebrea.
  - Se evitó «SEÑOR» o lecturas teológicas ajenas al versículo; no hay referencia al nombre divino aquí.
  - La comparación final se dejó en español natural («que diez hijos») sin añadir explicaciones interpretativas al cuerpo del versículo.
