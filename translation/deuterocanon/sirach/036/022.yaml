translation:
  text: A crooked heart causes grief[b][a], and a very experienced man will repay him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twisted' or 'perverse heart.'
    reason: lexical_alternative
  - marker: b
    text: The Greek could also be understood more generally as 'a very experienced person will answer/requite him.' The exact nuance of the response is not specified.
    reason: alternative_reading
lexical_decisions:
- source_word: καρδία
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: LSJ
  rationale: Standard rendering for the seat of thought and disposition; 'heart' preserves the moral-psychological sense in biblical style.
- source_word: στρεβλή
  chosen: crooked
  alternatives:
  - twisted
  - perverse
  lexicon: LSJ
  rationale: Conveys moral distortion without over-specifying depravity. 'Crooked heart' is idiomatic and matches the metaphor of warped inner character.
- source_word: δώσει λύπην
  chosen: gives grief
  alternatives:
  - causes sorrow
  - brings pain
  lexicon: LSJ
  rationale: A straightforward rendering of the future verb plus object. 'Gives grief' is concise and preserves the concrete verbal force.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  - human being
  lexicon: LSJ
  rationale: The Greek is singular masculine and proverbial. Per project philosophy, a gender-accurate rendering is preferred in generic sayings unless context requires neutralization.
- source_word: πολύπειρος
  chosen: of much experience
  alternatives:
  - very experienced
  - seasoned
  lexicon: LSJ
  rationale: The adjective denotes one tested by much experience. The fuller phrase preserves the comparative weight better than the more colloquial 'seasoned'.
- source_word: ἀνταποδώσει
  chosen: will repay
  alternatives:
  - will answer in kind
  - will recompense
  lexicon: LSJ
  rationale: The verb commonly means to repay or return in response. 'Repay' keeps the reciprocal sense and leaves open whether the response is positive or negative, as in the Greek.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - it
  - such a one
  lexicon: LSJ
  rationale: The dative singular most naturally refers to the person characterized by the crooked heart. 'Him' preserves the singular personal reference, though the antecedent is somewhat compressed in Greek.
