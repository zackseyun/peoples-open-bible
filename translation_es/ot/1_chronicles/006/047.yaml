translation:
  language: es
  text: 'Y a los hijos de Gershom[a], según sus clanes, de la tribu de Isacar, y de la tribu de Aser, y de la tribu de Neftalí[b], y de la tribu de Manasés en Basán: trece ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo escribe aquí el nombre del clan como «Gershom»; muchas versiones tienen «Gersón» o «Gershon».
    reason: alternative_reading
  - marker: b
    text: Algunas traducciones amplían «Manasés en Basán» a «la media tribu de Manasés en Basán» para hacer explícita la referencia geográfica; «media tribu» no aparece en el hebreo de este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִבְנֵי
  english_pob_choice: And to the sons of
  chosen_spanish: Y para los hijos de
  alternatives_spanish:
  - Y a los hijos de
  - Y para los descendientes de
  lexicon: HALOT
  rationale: El hebreo introduce otra asignación dentro de la lista. «Hijos de» conserva la fórmula genealógica/tribal; «para» refleja bien el sentido distributivo de la preposición en este contexto sin volver la frase forzada en español.
- source_word: גֵרְשׁוֹם
  english_pob_choice: Gershom
  chosen_spanish: Gershom
  alternatives_spanish:
  - Gersón
  lexicon: HALOT
  rationale: Se conserva la forma consonántica hebrea del versículo. La variante tradicional española «Gersón» no sigue tan de cerca la grafía de este texto fuente.
- source_word: לְמִשְׁפְּחוֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En contexto tribal, מִשְׁפָּחָה designa agrupaciones de clan. «Clanes» transmite mejor ese valor administrativo y genealógico que el más amplio «familias».
- source_word: מִמַּטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de la vara de
  - de la rama de
  lexicon: HALOT
  rationale: En listas territoriales y tribales, מַטֶּה significa «tribu». En español, «de la tribu de» es la equivalencia idiomática natural y mantiene el patrón repetido del texto.
- source_word: יִשָׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  lexicon: HALOT
  rationale: Se adopta la transliteración española común «Isacar», más fluida y reconocible en castellano bíblico que la forma inglesa «Issachar».
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Aser
  alternatives_spanish:
  - Asher
  lexicon: HALOT
  rationale: «Aser» es la forma usual en español y preserva la identidad del nombre tribal con ortografía castellana.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: HALOT
  rationale: Se usa la forma española establecida «Neftalí», que comunica bien el nombre tribal y sigue la pronunciación habitual en castellano.
- source_word: מְנַשֶּׁה בַּבָּשָׁן
  english_pob_choice: Manasseh in Bashan
  chosen_spanish: Manasés en Basán
  alternatives_spanish:
  - la media tribu de Manasés en Basán
  - Manasés, en Basán
  lexicon: HALOT
  rationale: El hebreo dice simplemente «Manasés en Basán». Se conserva esa sobriedad sin añadir «media tribu», que sería una aclaración interpretativa no expresada aquí.
- source_word: עָרִים שְׁלֹשׁ עֶשְׂרֵה
  english_pob_choice: thirteen cities
  chosen_spanish: trece ciudades
  alternatives_spanish:
  - 13 ciudades
  lexicon: HALOT
  rationale: La frase cardinal se traduce de forma directa y natural. «Trece ciudades» mantiene el estilo bíblico en español mejor que el uso de cifras.
theological_decisions:
- issue: ¿Añadir «media tribu» a «Manasés en Basán»?
  english_pob_reading: Manasseh in Bashan; some translations expand to 'the half-tribe of Manasseh in Bashan,' but 'half-tribe' is not stated in the Hebrew of this verse.
  chosen_spanish_reading: Manasés en Basán
  alternative_spanish_readings:
  - la media tribu de Manasés en Basán
  - la mitad de la tribu de Manasés en Basán
  rationale: Se preserva la ambigüedad controlada del hebreo. Aunque el contexto histórico puede sugerir la división tribal, este versículo no la enuncia; por eso no debe introducirse en el texto principal.
  doctrine_reference: Principio de suficiencia textual y prudencia exegética; cf. uso de contexto inmediato frente a ampliación interpretativa.
translation_notes:
  revision_awareness: El borrador sigue el estado revisado más reciente del POB en inglés, con concordancia alta y sin cambios pendientes; no se detectaron revisiones aplicadas que alteren la decisión de base.
  spanish_consistency_notes:
  - Se mantuvo «de la tribu de» en toda la lista para conservar la estructura paralela del hebreo.
  - 'Se prefirieron formas españolas asentadas para los nombres tribales: Isacar, Aser, Neftalí y Manasés.'
  - La puntuación con dos puntos antes de «trece ciudades» refleja el cierre de la lista distributiva del hebreo.
  - No se usó «SEÑOR» ni terminología eclesiástica añadida, porque este versículo no contiene el nombre divino ni requiere ajustes doctrinales especiales.
