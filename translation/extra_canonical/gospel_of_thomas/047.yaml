translation:
  text: Jesus said[1], "It is impossible for a person to mount two horses and to draw
    two bows. And it is impossible for a servant to serve two masters, or he will
    honor the one and insult the other. A person does not drink old wine and immediately
    desire to drink new wine. And they do not pour new wine into old wineskins, lest
    they burst. And they do not pour old wine into a new wineskin, lest it ruin it.
    They do not sew an old patch onto a festal garment[3][2], because a tear will
    result."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:56:46Z'
  footnotes:
  - marker: '1'
    text: 'The English singular/plural distinction reflects the Coptic pronouns: ⲛⲛⲟⲩⲡⲱϩ
      (''lest they [plural] burst'') versus ⲛⲉϥⲧⲉⲕⲁϥ (''lest it [singular] ruin it'').'
    reason: textual_variant
  - marker: '2'
    text: Another Thomasine inversion. The Synoptics state that *new* wine is put
      into *new* wineskins (Matt 9:17). Thomas adds the prohibition against putting
      *old* wine into a *new* wineskin.
    reason: cross_reference
  - marker: '3'
    text: Coptic ϣⲧⲏⲛ ⲛϣⲁⲓ (literally 'garment of a festival'). This functions as
      the equivalent of the 'new garment' in the Synoptic parallels, though Thomas
      uniquely reverses the parable by having an *old* patch sewn onto the *new* (festal)
      garment.
    reason: cultural_note
lexical_decisions:
- source_word: ⲙⲛϭⲟⲙ
  chosen: impossible
  rationale: The phrase ⲙⲛϭⲟⲙ ⲛⲧⲉ- literally means 'there is no power/ability for',
    standardly translated as 'it is impossible for' or 'cannot'.
  lexicon: Crum 815b
  alternatives:
  - cannot
  - not strong enough
- source_word: ϫⲱⲗⲕ
  chosen: draw
  rationale: In the context of a bow (ⲡⲓⲧⲉ), ϫⲱⲗⲕ means to draw or stretch.
  lexicon: Crum 763a
  alternatives:
  - stretch
- source_word: ϣⲧⲏⲛ ⲛϣⲁⲓ
  chosen: festal garment
  rationale: Literally 'garment of a festival'. It functions as the equivalent of
    the 'new garment' in the Synoptic parallels, but the specific Coptic idiom should
    be preserved.
  lexicon: Crum 551a
  alternatives:
  - new garment
- source_word: ⲧⲁⲕⲟ
  chosen: ruin
  rationale: Means to destroy, ruin, or spoil. 'Ruin' works well for the destruction
    of a wineskin.
  lexicon: Crum 403b
  alternatives:
  - spoil
  - destroy
- source_word: ⲡⲱϩ
  chosen: burst
  rationale: Means to tear, rend, or burst. Used here for wineskins breaking.
  lexicon: Crum 275a
  alternatives:
  - tear
theological_decisions:
- issue: Harmonization with Synoptic parables
  chosen_reading: Preserved Thomas's inversions ('old patch onto a festal garment',
    'old wine into a new wineskin').
  rationale: Thomas deliberately alters the Synoptic parables to fit its own theological
    emphasis on the incompatibility of the old world/teaching with the new reality.
    Harmonizing these to match Matthew or Luke would erase the author's intent.
  alternatives_noted:
  - new patch onto an old garment
  - new wine into new wineskins
drafter_notes: 'This saying is a masterclass in Thomasine redaction. It combines the
  ''two masters'' saying (Matt 6:24 / Luke 16:13) with the ''old wine'' saying (Luke
  5:39) and the ''patches and wineskins'' parables (Matt 9:16-17 / Mark 2:21-22 /
  Luke 5:36-38), while introducing the unique ''two horses / two bows'' aphorism.
  Crucially, Thomas deliberately inverts the logic of the Synoptic parables: where
  the Synoptics warn against putting a *new* patch on an *old* garment, Thomas warns
  against putting an *old* patch on a *new* (festal) garment. Likewise, Thomas adds
  a unique prohibition against putting *old* wine into a *new* wineskin. The translation
  strictly preserves these inversions rather than harmonizing them to the familiar
  canonical versions.'
