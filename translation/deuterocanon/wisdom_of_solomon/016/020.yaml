translation:
  text: Instead of these things[a], you fed your people with the food of angels, and without their labor you sent them ready bread from heaven, able to satisfy every delight and suited to every taste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'angels’ food' or 'bread fit for angels.' The Greek expression does not require a more specific explanation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθʼ ὧν
  chosen: Instead of these things
  alternatives:
  - For which reason
  - In return for which
  lexicon: LSJ
  rationale: The phrase marks contrast with the preceding judgments and introduces God's different treatment of his own people. 'Instead of these things' preserves the adversative force in context better than a more causal rendering.
- source_word: ἀγγέλων τροφήν
  chosen: the food of angels
  alternatives:
  - angels' food
  - bread of angels
  lexicon: LSJ
  rationale: τροφὴ means nourishment/food. 'Food of angels' is a natural English rendering and preserves the genitival expression without over-specifying 'bread' here, since ἄρτον appears later in the verse.
- source_word: ἐψώμισας
  chosen: you fed
  alternatives:
  - you gave to eat
  - you nourished
  lexicon: LSJ
  rationale: The verb means to feed or furnish with morsels/food. 'You fed' is concise, idiomatic, and fits the direct object 'your people'.
- source_word: ἕτοιμον ἄρτον
  chosen: ready bread
  alternatives:
  - prepared bread
  - bread ready at hand
  lexicon: LSJ
  rationale: ἕτοιμον means ready/prepared. 'Ready bread' keeps the compactness of the Greek and highlights provision already made by God.
- source_word: ἀπʼ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: LSJ
  rationale: Standard spatial source expression; 'from heaven' is the most natural and transparent rendering.
- source_word: ἀκοπιάτως
  chosen: without their labor
  alternatives:
  - effortlessly
  - without toil
  lexicon: LSJ
  rationale: The adverb denotes without weariness or toil. Because the manna was provided rather than produced by the people, 'without their labor' makes explicit the implied beneficiary perspective while staying within the sense of the adverb.
- source_word: πᾶσαν ἡδονὴν ἰσχύοντα
  chosen: able to satisfy every delight
  alternatives:
  - having power for every pleasure
  - strong for every enjoyment
  - capable of every delight
  lexicon: LSJ
  rationale: ἰσχύοντα literally means being strong/able, here describing the bread's efficacy. ἡδονή is pleasure/delight. 'Able to satisfy every delight' expresses the idiomatic sense that the food met every pleasurable desire.
- source_word: πρὸς πᾶσαν ἁρμόνιον γεῦσιν
  chosen: suited to every taste
  alternatives:
  - fitted to every agreeable flavor
  - adapted to every palate
  lexicon: LSJ
  rationale: γεῦσις is taste/flavor; ἁρμόνιον carries the idea of fitting or harmonious suitability. 'Suited to every taste' is idiomatic English that preserves the sense of adaptability to each person's palate.
