translation:
  text: '1 And it happened after these things that I[a], Baruch, was standing by the side of the river.

    2 And a voice came from on high and said to me, “Stand on your feet, Baruch, and hear the word of the mighty God.

    3 Because they were shaken over what I said before him, therefore words are given to you to hear, so that you may proclaim them afterward.

    4 If the cities to which the mighty God alone gave prosperity should ever be required from you,

    5 you shall say to them, and to those like them, ‘The punishment has come.’

    6 And to those who are like them, whose evil delight was in their kingdoms,

    7 and the punishment of those who lived in luxury—these things came in the time known to the lands, to speak and to strike their souls.

    8 And if at that time they say to you, ‘You have drunk choice wine,’

    9 say to them, ‘You have also drunk blood.

    10 Therefore blood shall come, which is not to be hoped for by healing.

    11 Because of this they did not pity their own life unto death, but delivered it up,

    12 just as was pleasing to them[b][c][d][e][f], because they came to afflict the life of the lands because they were jealous.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ceriani’s primary Syriac reads “by the bank of the river,” while the Kmosko Latin control has “on Mount Zion.” The draft follows Ceriani and leaves the divergence visible.
    reason: textual_variant
    anchor_ref: '13:1'
  - marker: f
    text: The middle portion of the oracle is locally rough in the present Ceriani/OCR state. The rendering here is guided by the primary Syriac trajectory, with Kmosko used as a control witness for the clause sequence and chapter boundary.
    reason: alternative_reading
    anchor_ref: 13:3-6
  - marker: e
    text: The image of drinking strained wine and then its dregs is kept literal because the judgment metaphor is central to the oracle’s rhetoric.
    reason: cultural_note
    anchor_ref: '13:8'
  - marker: d
    text: Or 'by the bank of the river.'.
    reason: previous_rendering
  - marker: c
    text: Or 'over what you spoke in my presence, for this reason it is given to you to hear words, so that afterward you may bear witness.'.
    reason: previous_rendering
  - marker: b
    text: Or 'so that they might be corrected.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܨܝܕܐ ܕܢܗܪܐ
  chosen: the bank of the river
  alternatives:
  - the side of the river
  - Mount Zion
  lexicon: Payne Smith
  rationale: Ceriani’s primary Syriac points to a riverbank setting, while the Kmosko Latin control reflects Mount Zion. Because Ceriani remains primary, the draft keeps the river setting and notes the control divergence separately.
- source_word: ܐܬܬܙܝܥܘ
  chosen: you were shaken
  alternatives:
  - you were astonished
  - you were moved
  lexicon: Payne Smith
  rationale: The verb conveys inward disturbance. “Shaken” preserves the force without narrowing it to mere surprise.
- source_word: ܦܘܪܥܢܐ
  chosen: retribution
  alternatives:
  - recompense
  - repayment
  lexicon: Payne Smith
  rationale: In this judgment oracle the term is judicial, not merely consequential. “Retribution” preserves that moral and forensic weight.
- source_word: ܡܕܝܠܢܐ
  chosen: strained
  alternatives:
  - well-strained
  - clarified
  lexicon: Payne Smith
  rationale: The contrast with dregs calls for refined wine imagery. “Strained” is concise and keeps the reversal vivid.
- source_word: ܒܒܪܝܬܐ ܕܠܐ ܒܟܐܢܘܬܐ
  chosen: dealt with creation without righteousness
  alternatives:
  - used the creation unjustly
  - misused creation unrighteously
  lexicon: Payne Smith
  rationale: The line indicts the nations not only for violence but for morally disordered use of the created order. This rendering keeps both the creational and ethical dimensions.
- source_word: ܛܰܝܒܽܘܬܳܐ
  chosen: kindness
  alternatives:
  - goodness
  - beneficence
  lexicon: Payne Smith
  rationale: The noun points to God’s beneficent dealing. “Kindness” reads naturally while retaining covenantal generosity rather than abstract goodness alone.
