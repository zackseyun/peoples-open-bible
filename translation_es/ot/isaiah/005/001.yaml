translation:
  language: es
  text: 'Déjenme cantar[a], por favor, para mi amado un canto de mi amado acerca de su viña: mi amado tenía una viña en una colina fértil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «en un cuerno, hijo de aceite», un modismo para una colina fértil.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָשִׁירָה
  english_pob_choice: Let me sing
  chosen_spanish: Cantaré
  alternatives_spanish:
  - Déjame cantar
  - Quiero cantar
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención/invitación al canto. En español, «Cantaré» mantiene la voz primera y el tono introductorio poético sin sonar forzado; «Déjame cantar» sería más explícito pero añade una petición no requerida por el hebreo.
- source_word: נָּא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - ahora
  - te ruego
  lexicon: HALOT
  rationale: La partícula suaviza la invitación y añade ruego. «Por favor» comunica ese matiz de petición con naturalidad en español contemporáneo.
- source_word: לִידִידִי
  english_pob_choice: for my beloved
  chosen_spanish: para mi amado
  alternatives_spanish:
  - para mi amado
  - a mi amado
  - de mi amado
  lexicon: HALOT
  rationale: La ל puede marcar dirección o referencia. «Para mi amado» conserva la relación de destinatario/referencia del canto y suena natural en el verso poético.
- source_word: שִׁירַת
  english_pob_choice: a song
  chosen_spanish: un canto
  alternatives_spanish:
  - una canción
  - un cántico
  lexicon: HALOT
  rationale: «Canto» reproduce el género poético sin cargar la expresión con un registro litúrgico más específico que el hebreo no exige. «Cántico» sería más eclesiástico; «canción» puede sonar demasiado moderno o ligero.
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado
  - mi querido
  - mi amado, mi bienamado
  lexicon: HALOT
  rationale: Se mantiene el valor afectivo y poético de דּוֹדִי con «mi amado». «Mi querido» sería menos preciso y más coloquial; «bienamado» sería más marcado y menos natural.
- source_word: לְכַרְמוֹ
  english_pob_choice: concerning his vineyard
  chosen_spanish: acerca de su viña
  alternatives_spanish:
  - sobre su viña
  - respecto de su viña
  - para su viña
  lexicon: HALOT
  rationale: La ל aquí marca referencia o asunto. «Acerca de su viña» preserva el valor temático sin implicar finalidad.
- source_word: כֶּרֶם
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viña
  - viñedo
  lexicon: HALOT
  rationale: «Viña» es el equivalente bíblico y literario más natural en español. «Viñedo» puede sonar más técnico o moderno.
- source_word: הָיָה
  english_pob_choice: had
  chosen_spanish: tenía
  alternatives_spanish:
  - tenía
  - había
  lexicon: HALOT
  rationale: El hebreo usa una construcción posesiva/existencial que el inglés POB vierte de modo idiomático. En español, «tenía» transmite con claridad la posesión del sujeto sin forzar una estructura impersonal.
- source_word: בְּקֶרֶן
  english_pob_choice: on a hill
  chosen_spanish: en un monte
  alternatives_spanish:
  - en una colina
  - sobre un promontorio
  - en una altura
  lexicon: HALOT
  rationale: קֶרֶן literalmente es «cuerno», pero en topografía describe una elevación o saliente. «Monte» ofrece una imagen natural y elevada en español; «colina» sería más específica pero algo menos solemne.
- source_word: בֶּן שָׁמֶן
  english_pob_choice: fertile
  chosen_spanish: fértil
  alternatives_spanish:
  - fértil
  - muy fértil
  - rico en aceite
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático de abundancia/fertilidad con «fértil». La imagen literal «hijo de aceite» se mantiene implícitamente en la nota, como en el POB inglés.
theological_decisions:
- issue: Identidad del amado en la canción de la viña
  english_pob_reading: Retain the poetic expression 'my beloved' without identifying him in the main text.
  chosen_spanish_reading: Conservar «mi amado» sin identificarlo explícitamente en el texto principal.
  alternative_spanish_readings:
  - El amado es Yahvé
  - El amado es una figura literaria del canto
  rationale: El versículo introduce un poema y aún no explica la identidad del amado. Dado que el contexto amplio revelará la metáfora de la viña, conviene preservar la tensión literaria en vez de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica y literaria del texto.
translation_notes:
  revision_awareness: 'El inglés POB sigue una filosofía de equivalencia óptima y mantiene la tensión poética del pasaje. No hubo revisiones aplicadas en la pasada más reciente; la redacción española sigue la misma línea: conservar el paralelismo, traducir la referencia topográfica de forma natural y preservar en nota la imagen literal de «cuerno/hijo de aceite».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto en el proyecto, pero aquí el versículo no nombra el Tetragrámaton en la superficie textual.
  - Se usa «mi amado» para ambos hebreos relacionales del verso, siguiendo la decisión inglesa de preservar el tono poético sin sobreinterpretar.
  - «Viña» se prefiere a «viñedo» por consistencia bíblica y por resonancia literaria en español.
  - La nota al pie preserva la alternativa léxica fuerte de la imagen topográfica, tal como hace el POB inglés.
