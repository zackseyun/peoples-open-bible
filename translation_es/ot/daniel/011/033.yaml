translation:
  language: es
  text: Y los entendidos[a] del pueblo darán entendimiento a los muchos[b], pero tropezarán[c] por espada y por llama, por cautiverio[d] y por despojo, por días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sabios» para «los entendidos».
    reason: lexical_alternative
  - marker: b
    text: O «les darán entendimiento a muchos» o «harán entender a muchos».
    reason: lexical_alternative
  - marker: c
    text: O «caerán» para «tropezarán». La imagen hebrea puede denotar colapso, derrota o muerte en contexto de persecución.
    reason: lexical_alternative
  - marker: d
    text: O «a cautiverio» para «por cautiverio».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׂכִּילֵי
  english_pob_choice: those ... who have insight
  chosen_spanish: los entendidos
  alternatives_spanish:
  - los sabios
  - los que tienen discernimiento
  - los inteligentes
  lexicon: HALOT
  rationale: El participio hebreo comunica personas dotadas de entendimiento/discernimiento. «Los entendidos» conserva el valor participial sin volverlo técnico ni abstraerlo demasiado. «Los sabios» es posible, pero puede diluir el matiz de discernimiento activo presente en el contexto.
- source_word: עָם
  english_pob_choice: the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de Israel
  - de la nación
  - del pueblo de Israel
  lexicon: HALOT
  rationale: «Pueblo» reproduce el sustantivo común sin añadir una especificación que el hebreo aquí no explicita. El contexto ya apunta al pueblo del pacto, por lo que no conviene introducir «Israel» en el texto principal sin base adicional.
- source_word: יָבִינוּ
  english_pob_choice: will give understanding
  chosen_spanish: darán entendimiento
  alternatives_spanish:
  - instruirán
  - harán entender
  - causarán que muchos entiendan
  lexicon: HALOT
  rationale: El verbo en Hifil tiene fuerza causativa. «Darán entendimiento» preserva esa idea de impartir comprensión mejor que un simple «entenderán», y suena natural en español bíblico moderno.
- source_word: לָרַבִּים
  english_pob_choice: to the many
  chosen_spanish: a los muchos
  alternatives_spanish:
  - a muchos
  - a la multitud
  - a muchos hombres
  lexicon: HALOT
  rationale: 'La forma con ל y el sustantivo/adjetivo sustantivado conserva un valor definido: «los muchos». «A los muchos» mantiene esa fuerza y evita rebajarla a una indefinición genérica.'
- source_word: וְנִכְשְׁלוּ
  english_pob_choice: but they will stumble
  chosen_spanish: pero tropezarán
  alternatives_spanish:
  - pero caerán
  - pero serán derribados
  - pero sucumbirán
  lexicon: HALOT
  rationale: «Tropezarán» conserva la metáfora de כשל sin resolverla prematuramente en derrota total o muerte. Así se mantiene la tensión del texto, que puede abarcar tropiezo, caída o ruina bajo persecución.
- source_word: בְּחֶרֶב
  english_pob_choice: by sword
  chosen_spanish: por espada
  alternatives_spanish:
  - a espada
  - con espada
  - por la espada
  lexicon: HALOT
  rationale: La preposición ב indica medio o instrumento. «Por espada» es una forma breve y natural en español que conserva el paralelo con las demás expresiones de sufrimiento.
- source_word: וּבְלֶהָבָה
  english_pob_choice: by flame
  chosen_spanish: y por llama
  alternatives_spanish:
  - y por fuego
  - y por incendio
  - y por ardor
  lexicon: HALOT
  rationale: לֶהָבָה es «llama», más preciso que el más amplio «fuego». «Por llama» mantiene el paralelismo y la imaginería vívida del hebreo.
- source_word: בִּשְׁבִי
  english_pob_choice: by captivity
  chosen_spanish: por cautiverio
  alternatives_spanish:
  - en cautiverio
  - a cautiverio
  - por prisión
  lexicon: HALOT
  rationale: שְׁבִי denota la condición de cautividad. «Por cautiverio» conserva la serie de padecimientos con la misma construcción preposicional que las demás expresiones.
- source_word: וּבְבִזָּה
  english_pob_choice: by plunder
  chosen_spanish: y por despojo
  alternatives_spanish:
  - y por saqueo
  - y por botín
  - y por pillaje
  lexicon: HALOT
  rationale: בִּזָּה es «despojo» o «botín»; «despojo» suena natural y bíblico en español, y mantiene el sentido de pérdida por expoliación sin forzar un término demasiado moderno.
- source_word: יָמִים
  english_pob_choice: for days
  chosen_spanish: por días
  alternatives_spanish:
  - durante días
  - por algún tiempo
  - por días enteros
  lexicon: HALOT
  rationale: El plural desnudo funciona adverbialmente con idea de duración. «Por días» respeta la concisión del hebreo y evita interpretar más de lo que el texto dice.
theological_decisions:
- issue: Si interpretar נִכְשְׁלוּ como derrota total o mantener la imagen de tropiezo bajo persecución.
  english_pob_reading: but they will stumble
  chosen_spanish_reading: pero tropezarán
  alternative_spanish_readings:
  - pero caerán
  - pero serán derribados
  - pero sucumbirán
  rationale: La lista describe sufrimientos sufridos por los entendidos del pueblo. «Tropezarán» conserva la metáfora y no impone que cada caso sea muerte o destrucción total, preservando la tensión del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría muestra alta concordancia y solo observaciones menores, sin necesidad de reajustes sustanciales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió un paralelismo preposicional uniforme («por ... y por ...») para reflejar la serie hebrea de medios/padecimientos.
  - No se añadió «Israel» en el texto principal para no sobreespecificar עָם más allá de la evidencia inmediata.
