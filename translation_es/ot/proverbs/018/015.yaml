translation:
  language: es
  text: Un corazón con entendimiento[a] adquiere conocimiento, y el oído[b] de los sabios busca conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Corazón» conserva la metáfora hebrea; en este contexto sapiencial se refiere al centro de la percepción y del juicio, no solo a la emoción. También puede traducirse «un corazón discerniente».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el oído de los sabios», en singular como expresión colectiva/metafórica de receptividad a la instrucción.'
    reason: cultural_note
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: En la literatura sapiencial hebrea, לֵב designa la facultad interior de pensar, discernir y querer, no solo la emoción. «Corazón» conserva la metáfora hebrea y suena natural en español bíblico contemporáneo.
- source_word: נָבוֹן
  english_pob_choice: understanding
  chosen_spanish: entendido
  alternatives_spanish:
  - discerning
  - prudente
  lexicon: HALOT
  rationale: Como adjetivo que modifica a «corazón», נָבוֹן expresa capacidad de discernimiento. «Entendido» comunica bien esa idea en español y evita forzar un sustantivo abstracto.
- source_word: יִקְנֶה
  english_pob_choice: acquires
  chosen_spanish: adquiere
  alternatives_spanish:
  - gana
  - obtiene
  - compra
  lexicon: HALOT
  rationale: קנה puede significar comprar, adquirir o poseer. En este proverbio de búsqueda de sabiduría, «adquiere» refleja obtención intencional sin introducir un matiz comercial indebido.
- source_word: דָּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - entendimiento
  lexicon: HALOT
  rationale: דַּעַת en Proverbios suele referirse al conocimiento como comprensión aprendida. «Conocimiento» es la opción más directa y mantiene la repetición retórica en ambos hemistiquios.
- source_word: אֹזֶן
  english_pob_choice: ear
  chosen_spanish: oído
  alternatives_spanish:
  - oreja
  - escucha
  lexicon: HALOT
  rationale: El hebreo usa una imagen corporal concreta con valor metafórico de receptividad. «Oído» preserva la imagen y suena más natural que «oreja» en español formal.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - las personas sabias
  - los hombres sabios
  lexicon: HALOT
  rationale: El plural masculino es representativo/genérico en la literatura sapiencial. «Los sabios» mantiene la intención inclusiva sin perder la forma bíblica y funciona bien tras «el oído de».
- source_word: תְּבַקֶּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - procura
  - persigue
  lexicon: HALOT
  rationale: בקש en piʿel expresa búsqueda activa. «Busca» es conciso, idiomático y conserva bien el paralelismo con «adquiere».
translation_notes:
  revision_awareness: El texto español sigue de cerca la evaluación de alta concordancia del audit trail inglés y conserva el paralelismo del proverbio; la única adaptación principal es usar «oído» por naturalidad y precisión metafórica en español.
  spanish_consistency_notes:
  - Se mantiene «conocimiento» en ambos miembros para reflejar la repetición enfática del hebreo.
  - «Sabios» se usa como plural representativo, sin restringirlo a varones en sentido excluyente.
  - Se evita introducir una lectura de «mente» o «entendimiento» que diluya la metáfora del לֵב hebreo.
  - El verbo «adquiere» preserva la idea de obtener activamente sin convertir קנה en «comprar».
