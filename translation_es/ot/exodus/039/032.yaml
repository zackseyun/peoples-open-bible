revisions:
- from: Así fue terminada toda la obra[a] del tabernáculo, la tienda de reunión, y los hijos de Israel hicieron conforme a todo lo que Yahvé había mandado a Moisés; así hicieron.
  to: Así quedó terminada toda la obra del tabernáculo, la tienda de reunión, y los hijos de Israel[a] hicieron conforme a todo lo que Yahvé[b] había mandado a Moisés; así hicieron.
  rationale: Se conserva el sentido y la terminología del borrador, pero se corrige la ubicación de la nota sobre el nombre divino, se añade la alternativa documentada para 'los hijos de Israel', y se mejora ligeramente la naturalidad de la cláusula inicial con 'quedó terminada'.
