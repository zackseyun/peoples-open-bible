translation:
  language: es
  text: 'Entonces el faraón le dijo: «Pero ¿qué te falta conmigo, que estás buscando irte a tu tierra?» Y él respondió: «Nada, pero déjame ir[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dejar ir, me debes dejar ir»; construcción enfática con un infinitivo absoluto junto a un verbo finito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Porque
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce una transición adversativa en el diálogo. «Pero» conserva esa oposición natural en español sin volverla explicativa de manera artificial.
- source_word: מָה אַתָּה חָסֵר עִמִּי
  english_pob_choice: what do you lack with me
  chosen_spanish: ¿qué te falta conmigo?
  alternatives_spanish:
  - ¿qué te ha faltado conmigo?
  - ¿qué te hace falta conmigo?
  - ¿qué careces estando conmigo?
  lexicon: HALOT
  rationale: חָסֵר expresa carencia o falta. «¿Qué te falta conmigo?» mantiene la relación marcada por עִמִּי y suena natural en español, sin perder la idea de ausencia de necesidad o deficiencia.
- source_word: וְהִנְּךָ
  english_pob_choice: that now you are
  chosen_spanish: que estás
  alternatives_spanish:
  - y he aquí que estás
  - que ahora estás
  - y estás
  lexicon: HALOT
  rationale: El valor discursivo de הִנֵּה aquí sirve para introducir la constatación en la pregunta. En español, «que estás» reproduce bien la subordinación interrogativa sin añadir un matiz inexistente como «ahora».
- source_word: מְבַקֵּשׁ
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - queriendo
  - tratando de
  - solicitando
  lexicon: HALOT
  rationale: בקש puede significar buscar, desear o solicitar. «Buscando» conserva el verbo de proceso y encaja con el infinitivo de movimiento sin forzar un sentido más técnico.
- source_word: לָלֶכֶת אֶל אַרְצֶךָ
  english_pob_choice: to go to your own land
  chosen_spanish: irte a tu propia tierra
  alternatives_spanish:
  - ir a tu tierra
  - volver a tu tierra
  - marcharte a tu tierra
  lexicon: HALOT
  rationale: El hebreo dice literalmente ir a tu tierra. «Irte a tu propia tierra» refleja bien el posesivo y la dirección del verbo sin añadir explícitamente la idea de regreso, que no está en el verbo mismo.
- source_word: לֹא
  english_pob_choice: Nothing
  chosen_spanish: Nada
  alternatives_spanish:
  - 'No'
  - En nada
  - De ninguna manera
  lexicon: HALOT
  rationale: 'En la respuesta, לֹא funciona de manera elíptica: Hadad afirma que no le falta nada. «Nada» explicita la elipsis de forma idiomática y fiel.'
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - porque
  - pues
  - sino
  lexicon: HALOT
  rationale: En la réplica de Hadad, כִּי introduce el punto real de su respuesta en contraste con «Nada». «Pero» conserva ese giro adversativo.
- source_word: שַׁלֵּחַ תְּשַׁלְּחֵנִי
  english_pob_choice: please let me go
  chosen_spanish: déjame ir
  alternatives_spanish:
  - ciertamente despídeme
  - tienes que dejarme ir
  - déjame salir
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto más verbo finito intensifica la petición. «Déjame ir» transmite la solicitud de permiso/soltura en un español natural; el énfasis queda implícito por el contexto y puede explicarse en nota.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y la auditoría inglesa. Se evitó añadir «ahora» en la pregunta, porque no está en el fuente; se mantuvo la fuerza enfática del final mediante una nota lexical en lugar de una paráfrasis más fuerte en el cuerpo.
  spanish_consistency_notes:
  - Se usa «faraón» en minúscula por tratarse de un título dentro de la narración.
  - Se mantuvo «tierra» para אַרֶץ, siguiendo el sentido territorial del hebreo.
  - La nota sobre la construcción enfática se ancla en «déjame ir» para señalar la intensidad del hebreo sin sobrecargar el texto principal.
