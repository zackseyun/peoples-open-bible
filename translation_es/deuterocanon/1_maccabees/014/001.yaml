  yaml_path: translation/deuterocanon/1_maccabees/014/001.yaml
  text: And in the one hundred seventy-second year[a], King Demetrius gathered his forces and went into Media[b], to obtain help for himself so that he might make war against Tryphon.
  footnotes:
