    text: Or 'glean your vineyard'; the Hebrew verb refers to going over the vines again to take what remains after the main harvest.
    reason: lexical_alternative
  - marker: b
    text: Or 'the gleanings of your vineyard'; the Hebrew refers to grapes left behind or fallen during harvest.
    reason: lexical_alternative
  - marker: c
    text: Or 'resident foreigner.' The Hebrew 'sojourner' refers to a non-native person living among Israel.
    reason: lexical_alternative
