  text: 아내는 자기 남편이 살아 있는 동안에 매여 있습니다. 그러나 만일 남편이 죽으면, 그녀는 누구든지 원하는 자와 결혼할 자유가 있는데, 다만 주 안에서만 그렇게 해야 합니다.
  philosophy: optimal-equivalence
