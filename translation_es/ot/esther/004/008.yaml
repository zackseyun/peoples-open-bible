revisions:
- from: Él también le entregó una copia del escrito del decreto[a] que había sido promulgado en Susa para su destrucción, para mostrárselo a Ester y decírselo, y para mandarle que fuera al rey, a implorar su favor y pedir ante él por[b] su pueblo.
  to: Él también le entregó una copia del decreto escrito[a] que había sido promulgado en Susa para su destrucción, para mostrárselo a Ester y decirle, y para mandarle que se presentara ante el rey, para implorar su favor y pedir delante de él[b] en favor de su pueblo.
  rationale: 'Se ajustó la redacción para mejorar fidelidad y naturalidad: «decreto escrito» en lugar de la cadena más pesada «escrito del decreto»; «decirle» evita sobrecargar el objeto donde el hebreo no lo repite; «se presentara ante el rey» preserva mejor el matiz cortesano de comparecer ante su presencia; y «pedir delante de él en favor de su pueblo» representa con mayor naturalidad la fórmula מִלְּפָנָיו junto con el sentido intercesor de עַל עַמָּהּ. También se precisó la nota cultural.'
