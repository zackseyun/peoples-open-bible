  text: וַ/יֹּאמְר֣וּ גֶּשׁ הָ֗לְאָה וַ/יֹּֽאמְרוּ֙ הָ/אֶחָ֤ד בָּֽא לָ/גוּר֙ וַ/יִּשְׁפֹּ֣ט שָׁפ֔וֹט עַתָּ֕ה נָרַ֥ע לְ/ךָ֖ מֵ/הֶ֑ם וַ/יִּפְצְר֨וּ בָ/אִ֤ישׁ בְּ/לוֹט֙ מְאֹ֔ד וַֽ/יִּגְּשׁ֖וּ לִ/שְׁבֹּ֥ר הַ/דָּֽלֶת׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/019/009.yaml
  text: And they said[a], “Stand back!” Then they said, “This fellow came to sojourn, and now he acts as judge! Now we will treat you worse than them.” And they pressed hard against the man, against Lot[d][c][b], and came near to break down the door.
  footnotes:
  - marker: a
    text: Or “Stand back!”
    reason: lexical_alternative
  - marker: b
    text: Or “This fellow came to sojourn, and now he would play the judge!”
    reason: lexical_alternative
  - marker: c
    text: Literally, “we will do evil to you more than to them,” an idiom meaning they threatened Lot with worse harm than the visitors.
    reason: lexical_alternative
  - marker: d
    text: Or 'pressed hard against the man, against Lot, very much'.
    reason: previous_rendering
