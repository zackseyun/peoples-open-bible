    issue: וַיְהִי no queda explícitamente representado en el texto principal
    rationale: El hebreo tiene una apertura narrativa ('Y sucedió/Ahora') además de 'en aquel día'. El borrador reduce ambas piezas a 'Aquel día', lo que preserva el tiempo pero pierde el marcador discursivo señalado también en el audit trail inglés.
  - severity: low
