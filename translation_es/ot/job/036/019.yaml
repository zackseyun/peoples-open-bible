translation:
  language: es
  text: ¿Te servirá de algo tu clamor[a] cuando venga la angustia[b], o todos tus esfuerzos vigorosos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo otra interpretación del difícil hebreo: ‘¿Te servirá de algo tu riqueza, para que no estés en angustia, o todas las fuerzas de tu vigor?’'
    reason: alternative_reading
  - marker: b
    text: El hebreo de este versículo es difícil, especialmente en las expresiones tradicionalmente traducidas ‘tu clamor’ y ‘no en angustia’.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיַעֲרֹךְ
  english_pob_choice: will ... avail
  chosen_spanish: ¿Aprovechará... ?
  alternatives_spanish:
  - ¿Servirá... ?
  - ¿Será suficiente...?
  - ¿Tendrá efecto...?
  lexicon: HALOT
  rationale: En este contexto poético y difícil, ערך se entiende idiomáticamente como ‘ser de provecho / aprovechar’. En español, ‘aprovechará’ conserva la idea de eficacia o utilidad sin forzar una paráfrasis excesiva.
- source_word: שׁוּעֲךָ
  english_pob_choice: your cry
  chosen_spanish: tu clamor
  alternatives_spanish:
  - tu grito
  - tu plegaria
  - tu riqueza
  lexicon: HALOT
  rationale: La vocalización masorética favorece el sentido de ‘clamor / grito de auxilio’. ‘Clamor’ es natural en español bíblico actual y mantiene la fuerza de súplica. Se conserva la alternativa de ‘riqueza’ solo como lectura difícil alternativa, no como texto principal.
- source_word: לֹא
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - 'no'
  - si no
  - en vez de
  lexicon: HALOT
  rationale: Aunque morfológicamente es negación, el hebreo comprimido de la línea permite una lectura circunstancial unida a בצר. En español se resuelve con ‘cuando’ para expresar el giro retórico de modo fluido y fiel al sentido probable.
- source_word: בְצָר
  english_pob_choice: when distress comes
  chosen_spanish: venga la angustia
  alternatives_spanish:
  - estés en angustia
  - en la angustia
  - venga la aflicción
  lexicon: HALOT
  rationale: בצר denota angustia, aflicción o estrechez. ‘Venga la angustia’ reproduce la situación de irrupción de la calamidad y se adapta bien a la sintaxis española.
- source_word: וְכֹל
  english_pob_choice: or all
  chosen_spanish: o todos
  alternatives_spanish:
  - y todos
  - o todo
  - y aun todo
  lexicon: HALOT
  rationale: El valor conjuntivo aquí introduce una segunda posibilidad retórica. ‘O todos’ mantiene la alternativa y el contraste con ‘tu clamor’.
- source_word: מַאֲמַצֵּי כֹחַ
  english_pob_choice: the exertions of your strength
  chosen_spanish: los esfuerzos de tu fuerza
  alternatives_spanish:
  - los afanes de tu fuerza
  - todos tus fuertes esfuerzos
  - las fuerzas de tu vigor
  lexicon: HALOT
  rationale: La expresión une esfuerzo intenso y fuerza. ‘Esfuerzos de tu fuerza’ conserva ambos elementos y suena natural en español, sin disolver el paralelismo poético.
theological_decisions:
- issue: Tratamiento de un verso hebreo textualmente difícil
  english_pob_reading: The Hebrew of this verse is difficult, especially in the phrases traditionally rendered 'your cry' and 'not in distress.'
  chosen_spanish_reading: Se mantiene una traducción principal que sigue la lectura masorética, con una nota que reconoce la dificultad del hebreo.
  alternative_spanish_readings:
  - ‘tu riqueza’ en lugar de ‘tu clamor’
  - ‘en la angustia’ en lugar de ‘cuando venga la angustia’
  rationale: La dificultad textual no se suaviza ni se oculta. La redacción española conserva la lectura principal, pero permite al lector ver que existe una alternativa antigua y documentada, conforme al audit trail en inglés.
  doctrine_reference: Principios de crítica textual y transparencia traductora de la POB
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo ambos marcadores de nota exactamente en el texto español, anclados en las frases correspondientes. No se introdujeron notas sin ancla y se mantuvo la lectura principal conforme al audit trail en inglés.
  spanish_consistency_notes:
  - Se usa ‘angustia’ para בצר por claridad y registro bíblico actual.
  - Se prefirió ‘clamor’ sobre ‘grito’ por su tono más litúrgico y su adecuación al lenguaje bíblico contemporáneo.
  - Se evitó ‘Señor’ u otro sustituto reverencial porque el versículo no contiene el nombre divino.
  - Se mantuvo el paralelismo con una estructura breve y retórica propia del hebreo poético.
