translation:
  language: es
  text: Así que nos extraviamos del camino de la verdad, y la luz de la rectitud[a] no nos alumbró, y el sol no salió para nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la luz de la justicia». El griego δικαιοσύνη puede abarcar tanto el sentido moral como el judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: LSJ
  rationale: Expresa la inferencia o conclusión reflexiva del discurso sin volverlo demasiado solemne; conserva el valor de consecuencia que tiene ἄρα en este contexto.
- source_word: ἐπλανήθημεν
  english_pob_choice: we went astray
  chosen_spanish: nos extraviamos
  alternatives_spanish:
  - nos apartamos
  - anduvimos errantes
  lexicon: LSJ
  rationale: La idea central es desviarse del camino; 'nos extraviamos' mantiene la imagen de pérdida de rumbo y funciona bien con 'camino de la verdad'.
- source_word: ἀπὸ ὁδοῦ ἀληθείας
  english_pob_choice: from the way of truth
  chosen_spanish: del camino de la verdad
  alternatives_spanish:
  - de la senda de la verdad
  - del sendero de la verdad
  lexicon: LSJ
  rationale: Conserva la metáfora concreta de camino/senda y su relación genitiva de manera natural en español.
- source_word: τὸ τῆς δικαιοσύνης φῶς
  english_pob_choice: the light of righteousness
  chosen_spanish: la luz de la justicia
  alternatives_spanish:
  - la luz de la rectitud
  - la luz de la justicia recta
  lexicon: LSJ
  rationale: Aunque el inglés POB privilegia 'righteousness', en español 'justicia' puede abarcar con más naturalidad el campo moral y judicial de δικαιοσύνη; se conserva la alternativa semántica en la nota.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - righteousness
  lexicon: LSJ
  rationale: Se elige el término de uso bíblico y natural en español, sin perder la tensión entre sentido moral y jurídico que documenta el audit trail.
- source_word: οὐκ ἔλαμψεν ἡμῖν
  english_pob_choice: did not shine on us
  chosen_spanish: no nos alumbró
  alternatives_spanish:
  - no brilló sobre nosotros
  - no resplandeció para nosotros
  lexicon: LSJ
  rationale: '''Alumbrar'' comunica en español la acción de dar luz de manera más idiomática y bíblica que una traducción literal de ''brillar sobre''.'
- source_word: ὁ ἥλιος
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  lexicon: LSJ
  rationale: Equivalencia directa y transparente; no requiere paráfrasis.
- source_word: οὐκ ἀνέτειλεν ἡμῖν
  english_pob_choice: did not rise for us
  chosen_spanish: no salió para nosotros
  alternatives_spanish:
  - no se levantó para nosotros
  - no amaneció para nosotros
  lexicon: LSJ
  rationale: '''Salir'' es la forma más natural en español para el salir del sol; mantiene la relación con ''para nosotros'' y la imagen de privación de luz.'
theological_decisions:
- issue: 'δικαιοσύνη: justicia o rectitud/righteousness'
  english_pob_reading: righteousness, with a footnoted alternative justice
  chosen_spanish_reading: justicia, con nota que permite 'rectitud' como alternativa interpretativa
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: El POB inglés documenta que δικαιοσύνη admite tanto el matiz moral como el judicial. En español, 'justicia' es el término más amplio y bíblicamente reconocible, pero la nota preserva la alternativa 'rectitud' para no borrar la tensión léxica.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice'
translation_notes:
  revision_awareness: 'No se requieren revisiones adicionales: la lectura griega y el audit trail inglés están en alta concordancia, y la solución española conserva la metáfora del camino, la luz y el sol, además de la ambigüedad documentada de δικαιοσύνη.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, con vocabulario bíblico natural.
  - '''Camino de la verdad'' y ''luz'' conservan la imaginería espacial del griego.'
  - Se evita 'righteousness' en inglés y se traduce la tensión al español mediante 'justicia' con nota.
  - '''Salió para nosotros'' preserva la relación dativa y la imagen solar sin forzar un calco.'
