lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los niños de
  lexicon: HALOT
  rationale: En este registro genealógico/listado, el hebreo constructo plural de בֵּן funciona como fórmula de pertenencia familiar o clan. En español, «los hijos de» conserva la estructura genealógica de manera clara y natural; «los descendientes de» es posible, pero menos cercano a la fórmula repetida del pasaje.
- source_word: גִדֵּל
  english_pob_choice: Giddel
  chosen_spanish: Gidel
  alternatives_spanish:
  - Gídel
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta a una grafía española legible y transparente, manteniendo el valor onomástico sin traducirlo.
- source_word: גַחַר
  english_pob_choice: Gahar
  chosen_spanish: Gahar
  alternatives_spanish:
  - Gajar
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma establecida por la POB inglesa y se evita españolizarla en exceso.
- source_word: רְאָיָה
  english_pob_choice: Reaiah
  chosen_spanish: Reaía
  alternatives_spanish:
  - Raía
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español, «Reaía» mantiene con mayor fidelidad la vocalización habitual de la forma hebrea; «Raía» queda como alternativa posible, reflejada en la tradición de transliteraciones simplificadas.
translation_notes:
  revision_awareness: El texto fuente hebreo y la traducción inglesa POB están en alto acuerdo; no se detectan revisiones aplicadas ni tensiones textuales relevantes. La única variación significativa preservada es la alternativa onomástica de רְאָיָה, que en inglés se anotó como «Raiah».
  spanish_consistency_notes:
  - Se mantiene la fórmula genealógica repetida del versículo como lista de linajes, sin introducir terminología eclesiástica.
  - Los nombres propios se transliteran de forma consistente y sobria; no se añaden equivalentes interpretativos.
  - La nota textual sobre Reaía/Raía preserva la alternativa documentada por la auditoría inglesa.
