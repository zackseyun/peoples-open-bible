id: JOS.16.6
reference: Joshua 16:6
source:
  edition: WLC
  text: וְ/יָצָ֨א הַ/גְּב֜וּל הַ/יָּ֗מָּ/ה הַֽ/מִּכְמְתָת֙ מִ/צָּפ֔וֹן וְ/נָסַ֧ב הַ/גְּב֛וּל מִזְרָ֖חָ/ה תַּאֲנַ֣ת שִׁלֹ֑ה וְ/עָבַ֣ר אוֹת֔/וֹ מִ/מִּזְרַ֖ח יָנֽוֹחָ/ה׃
translation:
  text: Then the border went out westward to Michmethath on the north[a], and the border turned eastward to Taanath-shiloh, and passed it on the east to Janoah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'toward the sea,' a Hebrew idiom for 'westward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  chosen: Then ... went out
  alternatives:
  - and ... went out
  - extended
  lexicon: HALOT
  rationale: In boundary descriptions יצא commonly marks the line's onward extension. 'Went out' preserves the concrete verbal imagery; 'Then' renders the narrative waw smoothly in English.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  - the territory line
  lexicon: HALOT
  rationale: גְּבוּל here refers to the boundary line of tribal allotment, not the territory itself. 'Border' is natural modern English and fits the repeated usage in Joshua allotment texts.
- source_word: הַיָּמָּה
  chosen: westward
  alternatives:
  - toward the sea
  - seaward
  lexicon: HALOT
  rationale: Literally 'toward the sea,' a standard Hebrew directional idiom for west. 'Westward' communicates the geographic sense clearly for modern readers; the more literal alternative is worth preserving in a footnote.
- source_word: הַמִּכְמְתָת
  chosen: Michmethath
  alternatives:
  - Michmethathah
  lexicon: HALOT
  rationale: This is a place name and is therefore transliterated. 'Michmethath' follows a standard English transliteration of the Hebrew form in this verse.
- source_word: מִצָּפוֹן
  chosen: on the north
  alternatives:
  - from the north
  - northward
  lexicon: HALOT
  rationale: The phrase most naturally locates Michmethath on the northern side in relation to the border description. 'On the north' is idiomatic English for this topographical note.
- source_word: וְנָסַב
  chosen: turned
  alternatives:
  - went around
  - curved
  lexicon: HALOT
  rationale: נסב in boundary contexts describes a change in direction of the border line. 'Turned' is concise and natural.
- source_word: מִזְרָחָה
  chosen: eastward
  alternatives:
  - toward the east
  lexicon: HALOT
  rationale: Directional he indicates movement toward the east. 'Eastward' is a clear English equivalent.
- source_word: תַּאֲנַת שִׁלֹה
  chosen: Taanath-shiloh
  alternatives:
  - Taanath Shiloh
  lexicon: HALOT
  rationale: Place name transliterated. The hyphen reflects the conventional English presentation of the compound toponym.
- source_word: וְעָבַר
  chosen: passed by
  alternatives:
  - passed over
  - crossed
  lexicon: HALOT
  rationale: עבר in a border list often means the line continued past a location. 'Passed by' fits the context better than 'crossed,' which could imply traversing an obstacle.
- source_word: אֹתוֹ
  chosen: it
  alternatives:
  - him
  lexicon: HALOT
  rationale: The pronoun refers to the place just named, Taanath-shiloh, treated as a grammatical object in Hebrew. English appropriately uses 'it' for a place.
- source_word: מִמִּזְרַח
  chosen: on the east
  alternatives:
  - from the east
  - east of it
  lexicon: HALOT
  rationale: This phrase indicates the border's relation to Taanath-shiloh as it continues. 'On the east' is a straightforward rendering; 'east of it' is interpretive but similar in sense.
- source_word: יָנוֹחָה
  chosen: Janoah
  alternatives:
  - Janohah
  lexicon: HALOT
  rationale: Place name transliterated. 'Janoah' is the common English form for this locality.
