theological_decisions:
- issue: Nature of the divine encounter in וַיִּקָּר
  chosen_reading: Render as a real divine meeting without suggesting randomness
  alternative_readings:
  - Render with stronger chance nuance such as 'happened upon'
  rationale: The root can in some settings suggest happening or chance, but in this narrative context God intentionally engages Balaam. The translation preserves the encounter language while avoiding doctrinally misleading implications of divine randomness.
  doctrine_reference: Translation philosophy §1, §3
