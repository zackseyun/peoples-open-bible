    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Aquí se crea una incoherencia entre texto y nota, y se oscurece qué decisión léxica se está documentando.
  - severity: low
    issue: La formulación «después de haber golpeado» suena un poco cargada.
    rationale: No es infiel, pero «después de golpear» es más fluido en español narrativo y conserva el mismo valor temporal de μετὰ τὸ + infinitivo.
  revised_spanish_text: Y después de golpear a Egipto, Antíoco regresó en el año ciento cuarenta y tres; y subió contra Israel y Jerusalén con una gran multitud[a].
