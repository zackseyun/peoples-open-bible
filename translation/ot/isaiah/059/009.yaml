id: ISA.59.9
reference: Isaiah 59:9
source:
  edition: WLC
  text: עַל כֵּ֗ן רָחַ֤ק מִשְׁפָּט֙ מִמֶּ֔/נּוּ וְ/לֹ֥א תַשִּׂיגֵ֖/נוּ צְדָקָ֑ה נְקַוֶּ֤ה לָ/אוֹר֙ וְ/הִנֵּה חֹ֔שֶׁךְ לִ/נְגֹה֖וֹת בָּ/אֲפֵל֥וֹת נְהַלֵּֽךְ־־׃
translation:
  text: Therefore justice is far from us[a], and righteousness does not overtake us; we hope for light, but look—darkness; for brightness[c][b], but we walk in deep gloom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judgment is far from us.'
    reason: lexical_alternative
  - marker: b
    text: Or 'righteousness does not reach us.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for radiance, but we walk in thick darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this prophetic context the term refers to right order and just adjudication absent from the community, not merely a single judicial verdict. 'Justice' is the most natural modern English rendering.
- source_word: רָחַק
  chosen: is far from
  alternatives:
  - has become distant from
  - is remote from
  lexicon: HALOT
  rationale: The perfect verb expresses a present state resulting from prior action. English present 'is far from' communicates the condition clearly and idiomatically.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: Although צְדָקָה can overlap with 'justice,' here pairing 'justice' and 'righteousness' preserves the Hebrew distinction between משפט and צדקה. 'Righteousness' also matches the project's default handling of this semantic field where possible.
- source_word: תַשִּׂיגֵנוּ
  chosen: does not overtake us
  alternatives:
  - does not reach us
  - does not attain us
  lexicon: HALOT
  rationale: The Hiphil of נשׂג commonly conveys catching up with or overtaking. 'Overtake us' preserves the vivid metaphor of righteousness failing to arrive upon the people.
- source_word: נְקַוֶּה
  chosen: we hope for
  alternatives:
  - we wait for
  - we look for
  lexicon: HALOT
  rationale: The verb קוה includes both waiting and hoping. In this lament context the expectation is not merely temporal but aspirational, so 'hope for' best captures the sense.
- source_word: אוֹר
  chosen: light
  lexicon: HALOT
  rationale: Standard literal rendering; in context it carries metaphorical force of deliverance and well-being, but no paraphrase is needed.
- source_word: וְהִנֵּה
  chosen: but look
  alternatives:
  - but behold
  - and behold
  lexicon: HALOT
  rationale: This discourse particle marks a sharp, vivid contrast between expectation and reality. 'But look' is readable modern English and preserves the deictic force better than the archaic 'behold.'
- source_word: חֹשֶׁךְ
  chosen: darkness
  lexicon: HALOT
  rationale: Literal rendering fits both the imagery and the metaphorical sense of distress and moral obscurity.
- source_word: נְגֹהוֹת
  chosen: brightness
  alternatives:
  - radiance
  - bright light
  lexicon: HALOT
  rationale: The plural noun intensifies the idea of shining light. 'Brightness' is concise and natural, while preserving the contrast with gloom.
- source_word: אֲפֵלוֹת
  chosen: deep gloom
  alternatives:
  - thick darkness
  - gloom
  lexicon: HALOT
  rationale: The term denotes dense darkness rather than ordinary absence of light. 'Deep gloom' communicates both the physical and metaphorical weight in contemporary English.
- source_word: נְהַלֵּךְ
  chosen: we walk
  alternatives:
  - we go about
  lexicon: HALOT
  rationale: Literal 'walk' preserves the common Hebrew metaphor for one's lived condition or course of life.
