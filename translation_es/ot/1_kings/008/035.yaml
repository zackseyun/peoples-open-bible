base_translation:
  language: en
  yaml_path: translation/ot/1_kings/008/035.yaml
  text: When the heavens are shut up and there is no rain because they have sinned against you[a], and they pray toward this place and confess your name and turn from their sin because you answer them[b],
  footnotes:
  - marker: a
    text: Or 'praise your name' or 'confess your name'; the Hebrew verb can carry senses of thankful praise or open acknowledgment/confession depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'because you humble them.' The Hebrew verb may denote afflicting or humbling; some take it differently as 'answer them,' but the context of drought as discipline favors 'afflict/humble.'
    reason: alternative_reading
