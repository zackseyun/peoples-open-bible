translation:
  language: es
  text: en cuyas manos hay perversidad[a], y cuya mano derecha está llena de sobornos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "crimen", "depravación" o "malvado designio" para זִמָּה.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuyos
  alternatives_spanish:
  - en cuyos
  - de quienes
  lexicon: HALOT
  rationale: La partícula relativa introduce una descripción posesiva; en español, "cuyos" comunica con naturalidad esa relación sin añadir contenido ajeno.
- source_word: בִּידֵיהֶם
  english_pob_choice: in whose hands
  chosen_spanish: en cuyas manos
  alternatives_spanish:
  - en sus manos
  - a manos de ellos
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de las manos como lugar/instrumento de acción. "En cuyas manos" refleja mejor el paralelo con el original que una frase más abstracta.
- source_word: זִמָּה
  english_pob_choice: wickedness
  chosen_spanish: perversidad
  alternatives_spanish:
  - maldad
  - crimen
  - depravación
  - malicia
  lexicon: HALOT
  rationale: El término puede abarcar maldad, depravación o un designio vergonzoso. En este contexto, junto con el soborno, "perversidad" mantiene la amplitud moral del hebreo sin restringirlo a una sola clase de pecado.
- source_word: וִימִינָם
  english_pob_choice: and whose right hand
  chosen_spanish: y cuya mano derecha
  alternatives_spanish:
  - y su mano derecha
  - y cuyas manos derechas
  lexicon: HALOT
  rationale: El singular colectivo "mano derecha" sigue el hebreo y conserva el valor idiomático de la mano como instrumento de acción y poder.
- source_word: מָלְאָה
  english_pob_choice: is full of
  chosen_spanish: está llena de
  alternatives_spanish:
  - está colmada de
  - se ha llenado de
  lexicon: HALOT
  rationale: 'El presente simple en español transmite bien el valor estativo del hebreo: una condición vigente, no solo un proceso pasado.'
- source_word: שֹׁחַד
  english_pob_choice: bribes
  chosen_spanish: sobornos
  alternatives_spanish:
  - un soborno
  - cohechos
  lexicon: HALOT
  rationale: Aunque el sustantivo es singular en forma, funciona de manera genérica. "Sobornos" expresa con naturalidad la corrupción habitual denunciada aquí.
translation_notes:
  revision_awareness: 'Coincide con el texto hebreo base y con el audit trail inglés: mantiene la relación posesiva, el paralelismo de las manos y la amplitud semántica de זִמָּה sin atenuarla.'
  spanish_consistency_notes:
  - Se usó "sobornos" en plural genérico, en paralelo con el inglés POB "bribes".
  - Se evitó "Señor" o términos litúrgicos no pertinentes; el verso no contiene el nombre divino.
  - '"Perversidad" se eligió para preservar la carga moral amplia de זִמָּה en un contexto de corrupción judicial.'
