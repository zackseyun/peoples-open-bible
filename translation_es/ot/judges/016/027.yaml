    issue: Marcador de nota al pie mal ubicado
    rationale: La nota explica la frase בִּשְׂחוֹק שִׁמְשׁוֹן ('mientras actuaba'), pero el marcador [a] está colocado en 'mujeres'. Esto rompe la correspondencia exigida entre texto y nota.
  - severity: low
    issue: Redacción mejorable de la nota léxica
    rationale: La nota ofrece como alternativa 'mientras actuaba', que repite el texto principal, y 'mientras estaba de espectáculo', que no es español natural. Conviene reformularla con alternativas idiomáticas como 'viendo actuar a Sansón' o 'viendo a Sansón en espectáculo'/'en su diversión' con explicación del campo semántico.
