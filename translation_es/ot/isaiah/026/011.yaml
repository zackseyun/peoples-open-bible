revisions:
- from: Yahvé[a], tu mano está alzada, pero ellos no ven. Verán y serán avergonzados por el celo del pueblo; sí[b], el fuego consumirá a tus enemigos.
  to: Yahvé, tu mano está alzada, pero ellos no ven. Verán y serán avergonzados ante el celo por el pueblo[a]; de hecho[b], fuego consumirá a tus enemigos.
  rationale: Se movió la nota [a] a la frase pertinente, se ajustó «por el celo del pueblo» a «ante el celo por el pueblo» para preservar mejor la ambigüedad y el sentido de vergüenza frente a la acción celosa, y se reemplazó «sí» por «de hecho» para un énfasis más natural. También se quitó el artículo en «fuego» para alinearse mejor con la revisión inglesa auditada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:14:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del hebreo: Yahvé, la mano alzada, la ceguera presente, la visión futura, la vergüenza y la destrucción final por fuego. Sin embargo, no preserva correctamente el rastro auditado en dos puntos clave: (1) el marcador [a] está mal anclado en el texto español, porque la nota trata sobre «celo del pueblo», no sobre «Yahvé»; y (2) «por el celo del pueblo» estrecha y además desplaza el matiz frente al inglés auditado «at the zeal for the people», donde se quiso dejar abierta la compacidad de קִנְאַת עָם sin fijarla como genitivo subjetivo. También «sí» para אַף es posible, pero «de hecho» o «ciertamente» suena más natural y digno en este registro.'
  spanish_quality_summary: El español es claro y bastante natural, pero el aparato de notas está defectuoso por el anclaje erróneo. Además, «por el celo del pueblo» puede leerse causalmente de forma algo dura y menos fiel a la ambigüedad pretendida. Conviene ajustar a una formulación más natural y abierta en español, y mover las notas a los segmentos correctos.
  glossary_alignment: Buen uso de «Yahvé» para יהוה y de «enemigos» para צָרֶיךָ. No hay conflictos mayores con el glosario del proyecto. El principal problema no es terminológico sino de fidelidad a la ambigüedad auditada y de anclaje de notas.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «Yahvé» pero su contenido explica «celo del pueblo».
    rationale: El proyecto exige que todo marcador de nota aparezca exactamente en la palabra o frase pertinente. Aquí la nota no corresponde al nombre divino sino a קִנְאַת עָם, por lo que el aparato crítico queda objetivamente incorrecto.
  - severity: medium
    issue: «por el celo del pueblo» no refleja bien la decisión auditada de dejar abierta la frase קִנְאַת עָם.
    rationale: La auditoría inglesa revisó hacia «at the zeal for the people» para no fijar una relación sintáctica demasiado cerrada. «del pueblo» empuja al genitivo subjetivo («el celo que tiene el pueblo») y reduce la apertura contextual.
  - severity: low
    issue: «sí» para אַף es entendible, pero menos natural que un intensificador discursivo más idiomático.
    rationale: En español bíblico contemporáneo «de hecho» o «ciertamente» suele introducir mejor la intensificación sin sonar conversacional.
  revised_spanish_text: Yahvé, tu mano está alzada, pero ellos no ven. Verán y serán avergonzados ante el celo por el pueblo[a]; de hecho[b], fuego consumirá a tus enemigos.
  revised_footnotes:
  - marker: a
    text: O «el celo del pueblo». La frase hebrea es compacta y puede entenderse de más de una manera.
    reason: alternative_reading
  - marker: b
    text: O «el fuego de tus enemigos». La redacción hebrea permite otra relación sintáctica, aunque «fuego consumirá a tus enemigos» se ajusta mejor al contexto de juicio divino.
    reason: alternative_reading
  revision_rationale: Se movió la nota [a] a la frase pertinente, se ajustó «por el celo del pueblo» a «ante el celo por el pueblo» para preservar mejor la ambigüedad y el sentido de vergüenza frente a la acción celosa, y se reemplazó «sí» por «de hecho» para un énfasis más natural. También se quitó el artículo en «fuego» para alinearse mejor con la revisión inglesa auditada.
