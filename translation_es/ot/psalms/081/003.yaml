translation:
  language: es
  text: Entonad un canto[a] y haced sonar la pandereta[b], la agradable lira con el arpa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Alzad una melodía» o «Tomad un canto».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo תֹף: instrumento de percusión; tradicionalmente, «timbrel».'
    reason: cultural_note
  - marker: c
    text: La distinción exacta entre los instrumentos de cuerda hebreos traducidos «lira» (כִּנּוֹר) y «arpa» (נָבֶל) es incierta; también se han propuesto equivalentes como «arpa» y «laúd».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  english_pob_choice: Raise
  chosen_spanish: Entonad
  alternatives_spanish:
  - Elevad
  - Alzad
  - Levantaos con
  lexicon: HALOT
  rationale: El verbo hebreo es un imperativo plural con valor idiomático de iniciar o levantar un canto. En español, «entonad» comunica de manera natural el comienzo de la alabanza musical y conserva el tono exhortativo sin volverlo mecánico.
- source_word: זִמְרָה
  english_pob_choice: a song
  chosen_spanish: una canción
  alternatives_spanish:
  - una melodía
  - música
  - un salmo
  lexicon: HALOT
  rationale: El término puede abarcar canto o música de alabanza. «Canción» es amplio, claro y publicable en español; evita restringir indebidamente el sentido a «melodía» y evita sobreespecificar con «salmo».
- source_word: וּתְנוּ
  english_pob_choice: sound
  chosen_spanish: haced sonar
  alternatives_spanish:
  - tocad
  - golpead
  - dad
  lexicon: HALOT
  rationale: Literalmente es «dad», pero con תֹף el sentido es producir sonido. «Haced sonar» mantiene el valor instrumental y funciona con naturalidad en español.
- source_word: תֹף
  english_pob_choice: tambourine
  chosen_spanish: pandereta
  alternatives_spanish:
  - timbal
  - timbrel
  - tambor de mano
  lexicon: HALOT
  rationale: El hebreo designa un instrumento de percusión tipo marco o pandereta. «Pandereta» es el equivalente moderno más transparente para el lector español; «timbrel» sería más tradicional pero menos natural.
- source_word: כִּנּוֹר
  english_pob_choice: lyre
  chosen_spanish: lira
  alternatives_spanish:
  - arpa
  lexicon: HALOT
  rationale: El instrumento hebreo suele corresponder mejor a una lira que a un arpa moderna. «Lira» preserva esa distinción y evita confundirlo con el arpa de mayor tamaño.
- source_word: נָעִים
  english_pob_choice: pleasant
  chosen_spanish: agradable
  alternatives_spanish:
  - dulce
  - melodiosa
  - hermosa
  lexicon: HALOT
  rationale: El adjetivo significa agradable/delicioso. «Agradable» es directo y natural en español; puede calificar la lira sin añadir matices no exigidos por el hebreo.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - al lado de
  lexicon: HALOT
  rationale: La preposición marca acompañamiento. «Junto con» suena fluido en español y conserva la relación entre los dos instrumentos.
- source_word: נָבֶל
  english_pob_choice: harp
  chosen_spanish: arpa
  alternatives_spanish:
  - laúd
  - instrumento de cuerda
  lexicon: HALOT
  rationale: Aunque el tipo exacto de instrumento es incierto, el audit trail inglés usa «harp» como equivalente diferenciado de כִּנּוֹר. En español, «arpa» ofrece una distinción natural y reconocible frente a «lira», sin fingir certeza sobre la clasificación exacta.
translation_notes:
  revision_awareness: Se mantiene el estado de alta concordancia del expediente inglés, sin revisiones aplicadas en esta sección. La redacción española sigue el mismo sentido general y conserva la incertidumbre léxica documentada para los instrumentos musicales.
  spanish_consistency_notes:
  - Se evita traducir mecánicamente desde el inglés cuando el español permite una formulación más natural («entonad», «haced sonar»).
  - Se preserva la distinción entre כִּנּוֹר y נָבֶל con dos instrumentos diferentes en español, sin afirmar certeza sobre la identificación organológica exacta.
  - Se usa «pandereta» como equivalente moderno claro para תֹף, y la nota conserva la alternativa tradicional «timbrel».
  - La nota sobre la lira/arpa mantiene la tensión lexical documentada en el expediente, en lugar de resolverla de manera artificial.
