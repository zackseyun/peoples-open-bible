translation:
  language: es
  text: El sacerdote quemará su porción memorial de su grano machacado[a] y de su aceite, con todo su incienso; es una ofrenda hecha por fuego para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sus granos triturados» o «de su grano gruesamente molido»; el hebreo se refiere a granos quebrantados preparados para la ofrenda vegetal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִיר
  english_pob_choice: shall burn
  chosen_spanish: hará arder
  alternatives_spanish:
  - quemará
  - hará subir en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo alude a quemar la porción sobre el altar. «Hará arder» conserva la imagen ritual de combustión sin sonar forzado en español; «hará subir en humo» sería más literal, pero menos natural.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote-levita
  - el presbítero
  lexicon: HALOT
  rationale: כהן en la legislación cultual se refiere al sacerdote. «Sacerdote» es el equivalente claro y estándar en español bíblico.
- source_word: אַזְכָּרָתָהּ
  english_pob_choice: its memorial portion
  chosen_spanish: su porción memorial
  alternatives_spanish:
  - su porción de memorial
  - su porción para memoria
  lexicon: HALOT
  rationale: El término técnico designa la porción representativa que se quema como memorial ante Dios. «Porción memorial» conserva el valor cultual sin añadir una interpretación más amplia que el texto no exige.
- source_word: מִגִּרְשָׂהּ
  english_pob_choice: from its crushed grain
  chosen_spanish: de su grano machacado
  alternatives_spanish:
  - de sus grumos
  - de su grano triturado
  - de su harina gruesa
  lexicon: HALOT
  rationale: גרש se refiere a granos machacados o gruesamente molidos. «Grano machacado» es comprensible y mantiene la idea de preparación física del cereal; «harina gruesa» podría sugerir molienda más fina de la que el término implica.
- source_word: וּמִשַּׁמְנָהּ
  english_pob_choice: and from its oil
  chosen_spanish: y de su aceite
  alternatives_spanish:
  - y de algo de su aceite
  lexicon: HALOT
  rationale: La construcción indica que la porción memorial se toma también del aceite. «De su aceite» refleja bien la relación partitiva sin sobreexplicar.
- source_word: עַל כָּל לְבֹנָתָהּ
  english_pob_choice: with all its frankincense
  chosen_spanish: con todo su incienso
  alternatives_spanish:
  - junto con todo su incienso
  - sobre todo su incienso
  lexicon: HALOT
  rationale: Aquí על expresa acompañamiento. En español, «con todo su incienso» comunica con claridad que el incienso acompaña a la porción quemada.
- source_word: אִשֶּׁה
  english_pob_choice: an offering made by fire
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda hecha por fuego
  - una ofrenda de fuego
  lexicon: HALOT
  rationale: «Ofrenda encendida» conserva el valor técnico del término sacrificial y su vínculo con el fuego del altar, sin la dureza de un calco demasiado literal.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Yahvé
  lexicon: HALOT
  rationale: 'El texto hebreo nombra directamente a יהוה. Conforme a la terminología del proyecto, se traduce «Yahvé», y aquí el lamed marca dedicación: por eso «para Yahvé» es la opción más natural.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. En la línea terminológica del proyecto, se preserva el nombre propio divino en español como «Yahvé», en lugar de ocultarlo mediante un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de la porción memorial
  english_pob_reading: memorial portion
  chosen_spanish_reading: porción memorial
  alternative_spanish_readings:
  - ofrenda memorial
  - porción recordatoria
  rationale: 'El término es técnico y cultual: no es solo una memoria psicológica, sino la porción representativa que se quema ante Dios. «Porción memorial» preserva esa tensión sin expandirla innecesariamente.'
  doctrine_reference: Leviticus sacrificial terminology / HALOT on אַזכרה
translation_notes:
  revision_awareness: Se siguió el nivel de acuerdo alto del auditor inglés, sin cambios sustantivos respecto del sentido base. La principal adaptación al español fue conservar la terminología cultual técnica y el nombre divino «Yahvé», evitando una paráfrasis que diluyera el valor sacrificial del versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se prefirió «sacerdote» para כהן en contexto cultual.
  - Se conservó el término técnico «porción memorial» para אַזכרה.
  - Se usó «ofrenda encendida» para אִשֶּׁה, manteniendo el vínculo con el fuego del altar.
  - «Con todo su incienso» refleja mejor el valor de acompañamiento de על en este contexto que una lectura espacial literal.
