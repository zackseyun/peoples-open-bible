    issue: La nota [a] está anclada en 'posesiones' pero su contenido explica 'Lot, su hermano/pariente'.
    rationale: Las notas deben aparecer en la palabra o frase relevante. El anclaje actual induce a error y no cumple la disciplina de notas del proyecto.
  - severity: medium
