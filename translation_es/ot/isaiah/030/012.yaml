translation:
  language: es
  text: 'Por tanto, así dice el Santo de Israel: Porque ustedes han rechazado esta palabra[a], y han confiado en opresión y perversidad[b], y se han apoyado en ello.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'este mensaje' o 'este asunto'.
    reason: lexical_alternative
  - marker: b
    text: O 'extorsión' para 'opresión', y 'perversidad' o 'deviousidad' para 'lo torcido'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce la consecuencia del reproche anterior con un conector inferencial natural en español y conserva el valor conclusivo del hebreo.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - así ha dicho
  lexicon: HALOT
  rationale: Es la fórmula profética estándar; 'así dice' suena natural en español y mantiene el tono oracular sin suavizarlo.
- source_word: קְד֣וֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo, Dios de Israel
  lexicon: HALOT
  rationale: '''Santo de Israel'' reproduce el título isaiano reconocido y conserva su peso teológico; se evita sustituirlo por una formulación más explicativa que no está en el texto.'
- source_word: יַ֥עַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce de modo claro la causa de la sentencia; 'porque' es directo y fiel al valor causal.
- source_word: מָאַס
  english_pob_choice: have rejected
  chosen_spanish: han rechazado
  alternatives_spanish:
  - han despreciado
  - han repudiado
  lexicon: HALOT
  rationale: '''Rechazar'' expresa la fuerza de repudiar el mensaje profético sin añadir una carga emocional no requerida por el contexto.'
- source_word: בַּדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este mensaje
  - esta cosa
  - este asunto
  lexicon: HALOT
  rationale: En contexto profético דָּבָר puede ser 'palabra', 'mensaje' o 'asunto'; 'palabra' conserva la referencia a la comunicación divina inmediata y funciona bien en español.
- source_word: בְּעֹשֶׁק
  english_pob_choice: oppression
  chosen_spanish: opresión
  alternatives_spanish:
  - extorsión
  - abusos
  lexicon: HALOT
  rationale: '''Opresión'' es el equivalente más amplio y natural; mantiene el carácter injusto y coercitivo del término.'
- source_word: וְנָלוֹז
  english_pob_choice: perversity
  chosen_spanish: perversidad
  alternatives_spanish:
  - deformidad moral
  - depravación
  - deviousidad
  lexicon: HALOT
  rationale: La revisión inglesa optó por 'perversity'; en español 'perversidad' transmite bien la idea de lo torcido, desviado o moralmente corrupto sin sonar artificial.
- source_word: וַתִּשָּׁעֲנוּ עָלָיו
  english_pob_choice: have relied on it
  chosen_spanish: se han apoyado en ello
  alternatives_spanish:
  - han confiado en ello
  - se han sustentado en ello
  - han dependido de ello
  lexicon: HALOT
  rationale: El verbo conserva la metáfora de apoyarse para sostenerse; 'se han apoyado en ello' comunica esa imagen con naturalidad y deja abierto el referente singular del hebreo.
theological_decisions:
- issue: Referencia de 'esta palabra'
  english_pob_reading: the prophetic word/rebuke just delivered
  chosen_spanish_reading: la palabra profética recién pronunciada
  alternative_spanish_readings:
  - este mensaje
  - este asunto
  rationale: El contexto es una reprensión profética dirigida a Judá; 'palabra' preserva la cercanía al hebreo y mantiene la idea de una comunicación divina concreta sin especificarla más allá del texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Caracterización moral del objeto de confianza
  english_pob_reading: oppression and crookedness/perversity
  chosen_spanish_reading: opresión y perversidad
  alternative_spanish_readings:
  - opresión y perversión
  - extorsión y perversidad
  - violencia y perversidad
  rationale: Se conserva la fuerza ética del reproche sin convertirlo en una referencia histórica más precisa de lo que el hebreo exige. 'Perversidad' mantiene la nota de lo torcido o desviado.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referente singular de 'ello'
  english_pob_reading: it refers back to the composite object or the last item named
  chosen_spanish_reading: ello retoma el conjunto anterior de opresión y perversidad
  alternative_spanish_readings:
  - él
  - ellos
  - esto
  rationale: El pronombre hebreo es singular; en español 'ello' permite conservar esa referencia neutra sin forzar un antecedente masculino o plural.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'crookedness' a 'perversity' para hacer más formal e idiomática la pareja con 'oppression'. La redacción española sigue esa decisión con 'perversidad', sin perder la posibilidad semántica de lo 'torcido' implícita en el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Santo de Israel' como título isaiano establecido.
  - Se traduce el hebreo דבר en contexto profético como 'palabra', con nota de alternativas.
  - Se conserva el contraste moral con 'opresión y perversidad' y no se lo suaviza a una formulación genérica.
  - El pronombre final singular se refleja con 'ello' para evitar una discordancia interpretativa.
