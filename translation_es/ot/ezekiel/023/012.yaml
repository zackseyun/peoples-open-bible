translation:
  language: es
  text: 'Se apasionó por los hijos[a] de Asiria: gobernadores y funcionarios, vestidos con espléndido atuendo, jinetes que montaban caballos, todos ellos jóvenes deseables.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de Asiria» conserva la forma hebrea literal. También puede entenderse de manera idiomática como «asirios»; el POB inglés mantuvo la expresión filial para no perder el vínculo con el original.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָגָבָה
  english_pob_choice: lusted after
  chosen_spanish: codició
  alternatives_spanish:
  - deseó con pasión
  - tuvo deseo lujurioso por
  lexicon: HALOT
  rationale: El verbo expresa un deseo erótico fuerte en este contexto metafórico. «Codició» conserva la intensidad sin sonar tan coloquial como otras opciones y evita suavizar la carga sexual del hebreo.
- source_word: בְּנֵי אַשּׁוּר
  english_pob_choice: the sons of Assyria
  chosen_spanish: los hijos de Asiria
  alternatives_spanish:
  - los asirios
  - los hombres de Asiria
  lexicon: HALOT
  rationale: La formulación literal «hijos de Asiria» preserva la expresión hebrea que el inglés POB también conservó. En español sigue siendo comprensible y mantiene el matiz genealógico/etnónimo sin reemplazarlo por una paráfrasis más plana.
- source_word: פַּחוֹת
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - satrapas
  - gobernantes provinciales
  lexicon: HALOT
  rationale: Es un título administrativo claro y natural en español moderno. «Gobernadores» transmite la función de autoridad regional sin introducir una precisión histórica no explicitada en el texto.
- source_word: וּסְגָנִים
  english_pob_choice: officials
  chosen_spanish: funcionarios
  alternatives_spanish:
  - deputados
  - prefectos
  - autoridades
  lexicon: HALOT
  rationale: El término alude a otro cargo o rango administrativo. «Funcionarios» es suficientemente amplio para reflejar el título sin forzar una equivalencia técnica más específica que el hebreo no asegura.
- source_word: לְבֻשֵׁי מִכְלֹל
  english_pob_choice: clothed in full attire
  chosen_spanish: vestidos con atuendo completo
  alternatives_spanish:
  - vestidos con ropa espléndida
  - ataviados con traje completo
  - revestidos de gala
  lexicon: HALOT
  rationale: La frase describe vestimenta completa, elegante o llamativa. «Atuendo completo» conserva la idea de plenitud/ornato y suena natural en español, sin añadir la connotación litúrgica de «de gala».
- source_word: פָּרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - cabalgadores
  - soldados de caballería
  lexicon: HALOT
  rationale: «Jinetes» es idiomático en español y comunica la imagen de tropas montadas. Mantiene la relación con el verbo siguiente sin necesidad de una terminología militar más pesada.
- source_word: רֹכְבֵי סוּסִים
  english_pob_choice: riding horses
  chosen_spanish: montados en caballos
  alternatives_spanish:
  - cabalgando caballos
  - que cabalgaban caballos
  lexicon: HALOT
  rationale: La construcción hebrea repite y refuerza la imagen de caballería. «Montados en caballos» conserva esa redundancia enfática de manera natural en español.
- source_word: בַּחוּרֵי חֶמֶד
  english_pob_choice: desirable young men
  chosen_spanish: jóvenes deseables
  alternatives_spanish:
  - jóvenes atractivos
  - mozos de agrado
  - jóvenes de deseo
  lexicon: HALOT
  rationale: La expresión final evalúa su atractivo o deseabilidad. «Jóvenes deseables» mantiene el tono valorativo y evita suavizar la apreciación erótica del verso.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - cada uno de ellos
  - todos
  lexicon: HALOT
  rationale: Reproduce de manera directa el resumen enfático final del hebreo y del inglés POB, con una formulación natural en español.
translation_notes:
  revision_awareness: 'La versión inglesa revisó el borrador eliminando «warriors» porque no está explícito en el hebreo, y mantuvo el resto de los elementos. La propuesta española sigue esa revisión: no introduce «guerreros» ni otros equivalentes no atestiguados, y conserva la serie de títulos, vestimenta, caballería y valoración final.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - 'Se preserva la secuencia enumerativa del hebreo: deseo -> origen étnico/titular -> cargos -> vestimenta -> caballería -> juicio final.'
  - «Jinetes montados en caballos» refleja la redundancia intencional del original sin suavizarla.
  - No se sustituye «hijos de Asiria» por «asirios» en el texto principal para conservar la huella literal del hebreo y del POB inglés.
