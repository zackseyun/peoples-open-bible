revisions:
- from: Y los habitantes de Nínive creyeron a Dios[a], y proclamaron un ayuno y se vistieron de cilicio, desde el mayor hasta el menor.
  to: Y la gente de Nínive creyó a Dios[a], y proclamó un ayuno y se vistió de cilicio, desde el más importante de ellos hasta el menos importante.
  rationale: Se ajusta el sujeto a una expresión colectiva más natural ('la gente de Nínive') y se mejora el merismo final para reflejar mejor los sufijos pronominales del hebreo. También se armoniza la concordancia verbal con el sujeto singular colectivo en español. La nota léxica se mantiene con leve ajuste de concordancia.
