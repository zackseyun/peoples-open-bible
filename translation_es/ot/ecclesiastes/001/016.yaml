  to: 'Me dije en mi corazón,[a] diciendo: «He aquí, yo he llegado a ser grande y he aumentado en sabiduría más que todos los que fueron antes de mí sobre Jerusalén, y mi corazón ha visto mucha sabiduría y conocimiento».'
  rationale: 'Se ajusta el español para alinearlo mejor con el hebreo y con la auditoría POB inglesa: se conserva la metáfora del corazón; se reemplaza «me he engrandecido» por «he llegado a ser grande» para evitar un matiz reflexivo no exigido; se cambia «he añadido mucha sabiduría» por «he aumentado en sabiduría» para mayor naturalidad y fidelidad; y se restituye «sobre Jerusalén» como lectura principal, manteniendo «en Jerusalén» en la nota alternativa. También se eleva ligeramente el registro con «He aquí».'
