translation:
  language: es
  text: 'Y de la tribu de Neftalí: Cedes en Galilea con sus pastizales[a], Hamón con sus pastizales, y Quiriataim con sus pastizales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tierras comunes» para «pastizales»; el hebreo se refiere al terreno abierto que pertenecía a cada ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִמַּטֵּה
  english_pob_choice: And from the tribe of
  chosen_spanish: Y de la tribu de
  alternatives_spanish:
  - Y de la rama de
  - Y de la estirpe de
  lexicon: HALOT
  rationale: En contextos de repartición tribal, מַטֶּה designa naturalmente una tribu; en español, «tribu» comunica mejor ese ámbito que opciones más literales pero menos idiomáticas.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Nafthalí
  - Nephtalí
  lexicon: HALOT
  rationale: Nombre propio tribal; «Neftalí» es la forma española habitual y clara, sin alterar la referencia al mismo nombre hebreo.
- source_word: קֶדֶשׁ בַּגָּלִיל
  english_pob_choice: Kedesh in Galilee
  chosen_spanish: Quedes en Galilea
  alternatives_spanish:
  - Quedes de Galilea
  lexicon: HALOT
  rationale: El topónimo קֶדֶשׁ se translitera al español como «Quedes» para conservar la consonancia con el hebreo, y בַּגָּלִיל se expresa naturalmente como «en Galilea».
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras abiertas
  - sus tierras de pasto
  - sus comunes
  lexicon: HALOT
  rationale: מִגְרָשׁ señala el terreno abierto perteneciente a la ciudad. «Pastizales» mantiene la imagen de tierras abiertas/aptas para pasto y funciona con dignidad en español. La alternativa «comunes» queda implícita como trasfondo histórico, pero no se usa en el texto principal por ser menos transparente para el lector común.
- source_word: חַמּוֹן
  english_pob_choice: Hammon
  chosen_spanish: Jamón
  alternatives_spanish:
  - Hamón
  lexicon: HALOT
  rationale: Nombre propio; en español se adapta la gutural inicial con «J» para una lectura más natural. No se identifica con el sustantivo común «jamón» por el contexto de lista toponímica.
- source_word: קִרְיָתַיִם
  english_pob_choice: Kiriathaim
  chosen_spanish: Quiriataim
  alternatives_spanish:
  - Quiryataim
  - Quiriatain
  lexicon: HALOT
  rationale: Nombre propio plural; «Quiriataim» sigue de cerca la forma hebrea y evita una castellanización excesiva que oscurezca el topónimo.
translation_notes:
  revision_awareness: El contexto inglés no registra revisiones textuales ni cambios aplicados; el pasaje quedó en acuerdo alto y sin modificaciones, por lo que la versión española sigue directamente el valor léxico del hebreo y la solución auditada en inglés.
  spanish_consistency_notes:
  - Se mantiene el orden enumerativo del hebreo y del inglés auditado.
  - 'Se conserva una transliteración española consistente para los topónimos: Quedes, Jamón y Quiriataim.'
  - «Pastizales» se usa de manera uniforme para מִגְרָשֶׁיהָ en los tres casos, con nota de alternativa para reflejar la posible lectura de «tierras comunes».
  - No se introduce lenguaje eclesiástico adicional ni se suaviza el sentido geográfico del versículo.
