translation:
  text: How sweet every kind of death is for our ancestral godliness! And he spoke to the tyrant,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestral piety.' The Greek emphasizes reverent devotion inherited from the ancestors.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς
  chosen: How
  alternatives:
  - O how
  - Indeed how
  lexicon: LSJ
  rationale: Exclamatory particle introducing an emotional outcry; 'How' preserves the force naturally in English.
- source_word: ἡδὺς
  chosen: sweet
  alternatives:
  - pleasant
  - welcome
  lexicon: LSJ
  rationale: The adjective literally means 'sweet/pleasant.' 'Sweet' preserves the vivid rhetorical paradox of death being desirable in view of piety.
- source_word: πᾶς τρόπος θανάτου
  chosen: every kind of death
  alternatives:
  - every manner of death
  - any mode of death
  lexicon: LSJ
  rationale: The phrase is distributive, referring broadly to whatever form death may take. 'Every kind of death' is idiomatic and keeps the comprehensiveness.
- source_word: διὰ
  chosen: for
  alternatives:
  - because of
  - on account of
  lexicon: BDAG
  rationale: With the accusative here it expresses cause or motive. 'For' is concise and idiomatic in the exclamatory sentence, while still conveying causation.
- source_word: τὴν πάτριον ἡμῶν εὐσέβειαν
  chosen: our ancestral godliness
  alternatives:
  - our ancestral piety
  - the piety of our fathers
  lexicon: LSJ
  rationale: πάτριον denotes what is inherited from the ancestors; εὐσέβεια is reverence/piety toward God. 'Ancestral godliness' preserves both inherited tradition and religious devotion in accessible English. 'Piety' is possible but can sound more ecclesiastical or opaque to modern readers.
- source_word: ἔφη
  chosen: he spoke
  alternatives:
  - he said
  lexicon: LSJ
  rationale: A simple speech-introduction verb. 'He spoke' fits the following πρὸς phrase smoothly, though 'he said' would also be acceptable.
- source_word: πρὸς τὸν τύραννον
  chosen: to the tyrant
  alternatives:
  - to the king
  - to the despot
  lexicon: LSJ
  rationale: τύραννος in this work is a morally charged designation for the persecuting ruler, not a neutral royal title. 'Tyrant' preserves the evaluative force of the Greek.
