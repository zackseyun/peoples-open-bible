translation:
  language: es
  text: Así habitó Israel en seguridad, solo; la fuente[a] de Jacob en una tierra de grano y vino nuevo; aun sus cielos derraman rocío[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el ojo de Jacob». El hebreo puede significar «ojo» o «fuente/manantial»; aquí se sigue el sentido que mejor encaja con la imagen de abundancia agrícola.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Habitó Israel seguro, aparte».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁכֹּן
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - moró
  - residió
  lexicon: HALOT
  rationale: שכן expresa vivir o habitar de manera estable. «Habitó» conserva el registro bíblico y la idea de residencia asentada sin sonar tan arcaico como «moró».
- source_word: בֶּטַח
  english_pob_choice: in safety
  chosen_spanish: en seguridad
  alternatives_spanish:
  - con seguridad
  - seguro
  lexicon: HALOT
  rationale: בטח funciona adverbialmente y describe una condición de resguardo. «En seguridad» conserva bien la idea de estado seguro y el tono idiomático del hebreo.
- source_word: בָּדָד
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - aparte
  - aislado
  lexicon: HALOT
  rationale: בדד comunica separación o unicidad tranquila. «Solo» reproduce la brevedad del hebreo y puede leerse en sentido de seguridad apartada, no necesariamente de soledad negativa.
- source_word: עֵין יַעֲקֹב
  english_pob_choice: the fountain of Jacob
  chosen_spanish: la fuente de Jacob
  alternatives_spanish:
  - el ojo de Jacob
  - la fuente de Jacob
  lexicon: HALOT
  rationale: עין puede significar «ojo» o «fuente/manantial». El contexto de fertilidad agrícola favorece el sentido de fuente; en español «la fuente de Jacob» comunica la imagen sin oscurecerla.
- source_word: אֶל אֶרֶץ
  english_pob_choice: was in a land
  chosen_spanish: en tierra
  alternatives_spanish:
  - hacia una tierra
  - a una tierra
  lexicon: HALOT
  rationale: En esta construcción poética, el valor locativo se expresa naturalmente en español con «en tierra». Evita añadir un verbo inexistente y mantiene la concisión del verso.
- source_word: דָּגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: HALOT
  rationale: דגן es un término general de cereal o grano. «Grano» es preciso y amplio; «trigo» sería demasiado específico.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - mosto
  - vino fresco
  lexicon: HALOT
  rationale: תירוש designa el vino joven o recién producido. «Vino nuevo» conserva la imaginería agrícola y es comprensible en español bíblico contemporáneo.
- source_word: אַף
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - incluso
  - también
  lexicon: HALOT
  rationale: 'אַף introduce énfasis ascendente. «Aun» transmite bien la idea de adición climática: no solo la tierra, sino también los cielos aportan bendición.'
- source_word: שָׁמָיו
  english_pob_choice: his heavens
  chosen_spanish: sus cielos
  alternatives_spanish:
  - los cielos sobre él
  - sus cielos
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona se conserva con «sus cielos». En español resulta más natural y evita la extrañeza de «los cielos de él».
- source_word: יַעַרְפוּ
  english_pob_choice: drip down
  chosen_spanish: derraman
  alternatives_spanish:
  - destilan
  - gotean
  lexicon: HALOT
  rationale: El verbo describe un fluir o goteo poético del rocío. «Derraman» es idiomático en español para una acción abundante y continua; «destilan» sería más literal pero menos natural aquí.
- source_word: טָל
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - rocío
  - gota de rocío
  lexicon: HALOT
  rationale: טל se refiere al rocío, imagen de fertilidad y bendición. «Rocío» es el equivalente directo y más natural en español.
theological_decisions:
- issue: Sentido de עֵין יַעֲקֹב
  english_pob_reading: Rendered as 'the fountain of Jacob' rather than 'the eye of Jacob'
  chosen_spanish_reading: «la fuente de Jacob»
  alternative_spanish_readings:
  - «el ojo de Jacob»
  rationale: La imagen inmediata del verso es de abundancia agrícola y celestial, por lo que el sentido de manantial/fuente encaja mejor que el anatómico. La traducción conserva la tensión lexical sin forzar una interpretación doctrinal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de בָּדָד
  english_pob_reading: Secure separateness rather than negative isolation
  chosen_spanish_reading: «solo» en un contexto de bendición y seguridad
  alternative_spanish_readings:
  - «aparte»
  - «aislado»
  rationale: El contexto no sugiere abandono, sino una condición de paz y protección. «Solo» conserva la brevedad del hebreo y, junto con «en seguridad», evita una lectura negativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión final del inglés POB: se prefirió un registro formal y cercano al hebreo, sin añadir un verbo innecesario en la segunda cola. También se mantuvo la tensión léxica de עֵין y el matiz adverbial de בֶּטַח / בָּדָד.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la pauta general del proyecto, pero en este versículo no aparece el nombre divino explícito.
  - Se mantuvo «grano»/«vino nuevo» como pares agrícolas paralelos, en línea con la imaginería del texto.
  - «Rocío» conserva el valor poético de טל sin introducir una interpretación meteorológica más específica.
