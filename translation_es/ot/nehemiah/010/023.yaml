translation_notes:
  revision_awareness: El texto fuente solo contiene una lista de tres nombres propios y la auditoría inglesa no registra variantes, notas ni revisiones. Por tanto, la versión española mantiene únicamente transliteración de nombres, sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se conservaron solo nombres propios, sin artículos ni conectores, porque el hebreo presenta una secuencia nominal simple.
  - Se evitó «SEÑOR» u otra terminología teológica porque no aparece ningún término divino en el verso.
  - La puntuación con comas reproduce de manera natural la lista breve en español y respeta la economía del original.
