theological_decisions:
- issue: Referent of αὐτοῦ in 'from his inner being'
  chosen_reading: The pronoun refers to the believer, so the rivers flow from the one who believes.
  alternative_readings:
  - The pronoun refers to Messiah/Jesus, so the rivers flow from him
  rationale: The nearest grammatical antecedent is 'the one who believes,' and the syntax most naturally reads that the believer becomes the locus from which the living water flows. This also coheres with the following explanatory note in John 7:39 about the Spirit being received by believers. Because some interpreters connect the phrase to Messiah as the source, that alternative is preserved in a footnote rather than resolved silently.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Rendering of κοιλία
  chosen_reading: inner being
  alternative_readings:
  - belly
  - womb
  - within him
  rationale: A strictly literal rendering ('belly') is possible but can mislead modern readers into a merely anatomical sense. 'Inner being' preserves the metaphorical sense of the person's inward center while remaining readable modern English.
  doctrine_reference: Translation philosophy §§1, 6
