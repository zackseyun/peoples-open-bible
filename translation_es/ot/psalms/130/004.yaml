translation:
  language: es
  text: Pero contigo hay perdón[a], para que seas temido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seas reverenciado»; el hebreo dice «temido», a menudo con el sentido de temor reverente ante Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Pues
  - Porque
  - Ciertamente
  lexicon: HALOT
  rationale: Aquí כִּי introduce contraste con la desesperación del versículo anterior; en español, «Pero» expresa de modo natural ese giro adversativo sin perder el valor contextual de la partícula.
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ti
  - junto a ti
  - en tu presencia
  lexicon: HALOT
  rationale: La preposición עִם con sufijo de segunda persona singular se vierte con naturalidad como «contigo», manteniendo la idea de que el perdón está asociado a Dios.
- source_word: הַסְּלִיחָה
  english_pob_choice: forgiveness
  chosen_spanish: el perdón
  alternatives_spanish:
  - el perdón de los pecados
  - la absolución
  lexicon: HALOT
  rationale: סְלִיחָה nombra perdón/pardón. «El perdón» es la forma más directa y comprensible en español, preservando el peso teológico sin introducir un término más técnico que el hebreo no exige.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  - para
  lexicon: HALOT
  rationale: La construcción final expresa propósito o resultado; «para que» comunica bien la finalidad en español y conserva la relación causal-teleológica del hebreo.
- source_word: תִּוָּרֵא
  english_pob_choice: you may be feared
  chosen_spanish: seas temido
  alternatives_spanish:
  - seas reverenciado
  - seas temido con reverencia
  - seas venerado
  lexicon: HALOT
  rationale: El nifal de ירא mantiene el verbo «temer»/«ser temido». Se conserva en el texto principal para no suavizar el término bíblico, aunque en español moderno puede entenderse como temor reverente ante Dios.
theological_decisions:
- issue: Tipo de respuesta que produce el perdón divino
  english_pob_reading: Forgiveness leads to reverent fear of God, rendered literally as 'you may be feared.'
  chosen_spanish_reading: El perdón de Yahvé conduce a que él sea temido, es decir, temido con reverencia y awe.
  alternative_spanish_readings:
  - El perdón de Yahvé conduce a que él sea reverenciado.
  - El perdón de Yahvé conduce a reverencia hacia él.
  rationale: El hebreo usa explícitamente ירא, no un verbo de «honrar» o «reverenciar». Por eso el texto principal conserva «temido»; la nota explica que la fuerza bíblica es temor reverente, no terror servil. Así se preserva la tensión lexical y teológica del original.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El texto sigue el audit trail en alto acuerdo: se mantiene el contraste inicial de כִּי con «Pero», se traduce לְמַעַן con finalidad («para que») y se conserva el verbo de ירא en una forma verbal directa («seas temido»), con nota para su matiz de reverencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el contexto habla del nombre divino, pero aquí el hebreo simplemente dice «contigo»; por eso no se inserta ningún equivalente explícito en el texto principal.
  - Se evita «SEÑOR» como sustituto del nombre divino, de acuerdo con la convención del proyecto.
  - «Perdón» se mantiene como término base, sin reemplazarlo por «absolución» o «clemencia», porque la fuente no requiere tecnicismo adicional.
  - La nota a pie de página preserva la alternativa documentada entre «temido» y «reverenciado» sin resolverla en el cuerpo principal.
