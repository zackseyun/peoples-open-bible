review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: Moisés tomó el pago de redención de los que estaban en exceso respecto de los contados por sustitución levítica. Sin embargo, dos elecciones debilitan la fidelidad semántica: «de parte de» es menos directo que מֵאֵת («de / de entre / de manos de»), y «excedían a los rescatados por los levitas» suena en español como si unas personas superaran a otras, en vez de indicar un excedente numérico respecto del grupo cubierto por los levitas.'
  spanish_quality_summary: 'La frase es comprensible, pero «de parte de los que excedían a...» resulta algo rígida y poco natural. Una reformulación más idiomática y clara en español eclesial moderno es «de entre los que excedían el número de los redimidos por los levitas». Además, conviene alinear la terminología principal con el inglés auditado: «redención» en el texto y «rescate» como alternativa en nota.'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé o Mesías. Para פדיון, el proyecto inglés prefirió «redemption money» con «ransom money» como alternativa; en español conviene reflejar eso con «dinero de la redención» en el texto principal y «dinero del rescate» como alternativa. «Redimidos» también mantiene mejor la familia léxica con «redención» que «rescatados».
  issues:
  - severity: medium
    issue: «de parte de» para מֵאֵת
    rationale: El hebreo solo marca procedencia/origen («de»). «De parte de» en español añade un matiz representativo que no está exigido por la fuente y suena menos directo en narrativa.
  - severity: medium
    issue: Construcción comparativa «excedían a los rescatados»
    rationale: Aunque intenta reflejar עַל, en español puede entenderse como comparación entre personas y no como exceso numérico respecto del total cubierto por los levitas. Hace falta explicitar «el número de» o una estructura equivalente.
  - severity: low
    issue: Terminología principal «rescate» en vez de «redención»
    rationale: El inglés auditado puso «redemption money» en el texto y dejó «ransom money» como alternativa. En español, «dinero de la redención» refleja mejor esa decisión, dejando «dinero del rescate» en nota.
  - severity: low
    issue: Nota a con comillas y formulación poco pulida
    rationale: La nota comienza con una comilla sobrante y ofrece como alternativa la misma expresión ya usada en el texto. Conviene limpiar la redacción y ajustar las alternativas al texto revisado.
  revised_spanish_text: Y Moisés tomó el dinero de la redención[a] de entre los que excedían[b] el número de los redimidos por los levitas.
  revised_footnotes:
  - marker: a
    text: 'O: «el dinero del rescate». El término hebreo puede referirse al pago hecho para la redención.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, de aquellos israelitas cuyo número excedía al número representado por los levitas en el cómputo de redención.
    reason: cultural_note
  revision_rationale: 'La revisión corrige una construcción española poco natural, hace más explícita la idea de excedente numérico presente en el hebreo y alinea mejor la terminología principal con la decisión léxica auditada en inglés: «redención» en el texto, con «rescate» como alternativa de nota.'
