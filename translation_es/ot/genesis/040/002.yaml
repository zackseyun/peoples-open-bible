review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador no preserva fielmente el sujeto del hebreo: פַּרְעֹה es ''Faraón'', no ''Yahvé''. El resto de la estructura principal sí refleja adecuadamente וַיִּקְצֹף ... עַל ... עַל ... וְעַל, y ''sus dos oficiales'' encaja bien con שְׁנֵי סָרִיסָיו en este contexto. Los cargos cortesanos están bien representados, aunque pueden formularse de manera un poco más idiomática en español.'
  spanish_quality_summary: 'La lectura actual contiene un error grave de legibilidad y fidelidad textual al empezar con ''Yahvé''. Además, la nota al pie invierte la relación principal/alternativa del término סָרִיס: el texto principal usa ''oficiales'', así que la nota debe presentar ''oficiales de corte'' o ''eunucos'' como alternativa de forma coherente. ''Jefe de los coperos'' y ''jefe de los panaderos'' son comprensibles; ''copero principal'' y ''panadero principal'' suenan más naturales, pero no son obligatorios.'
  glossary_alignment: Hay un incumplimiento serio de la terminología del proyecto al introducir 'Yahvé' donde el texto fuente dice 'Faraón'. No hay asunto mesiánico ni de nombre divino real en este versículo. 'Oficiales' para סָרִיס es coherente con la justificación lexical auditada; la nota debe mantener 'eunucos' como alternativa, no desplazar la opción contextual preferida.
  issues:
  - severity: high
    issue: El sujeto del versículo está traducido como 'Yahvé' en lugar de 'Faraón'.
    rationale: El hebreo dice explícitamente פַּרְעֹה. Sustituirlo por 'Yahvé' altera el significado del versículo y crea un error textual/doctrinal evidente.
  - severity: medium
    issue: La nota al pie sobre סָרִיס no está alineada con la elección principal del texto.
    rationale: Si el texto principal dice 'sus dos oficiales', la nota debe presentar de forma coherente la alternativa 'sus dos eunucos' y/o 'sus dos oficiales de corte', no dar a entender que 'oficiales de corte' es solo una alternativa al principal cuando ya se eligió 'oficiales'.
  - severity: low
    issue: Los títulos 'jefe de los coperos' y 'jefe de los panaderos' son correctos pero algo menos idiomáticos que opciones más establecidas.
    rationale: No es un error de fidelidad; simplemente puede mejorarse la naturalidad con 'copero principal' y 'panadero principal' o 'jefe de los coperos/panaderos' de forma consistente.
  revised_spanish_text: Y Faraón se enojó contra sus dos oficiales[a], contra el jefe de los coperos y contra el jefe de los panaderos.
  revised_footnotes:
  - marker: a
    text: O “sus dos oficiales de corte”; el término hebreo también puede significar “sus dos eunucos” en algunos contextos.
    reason: lexical_alternative
  revision_rationale: La revisión corrige el error crítico del sujeto, restaurando 'Faraón' conforme al hebreo. Se conserva 'se enojó' por naturalidad narrativa y 'contra ... contra ... y contra' para reflejar la repetición de עַל en el original. También se ajusta la nota para que sea coherente con la elección principal 'oficiales' y preserve la alternativa léxica documentada 'eunucos'.
