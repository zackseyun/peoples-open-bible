translation:
  language: es
  text: Hay una palabra[a] envuelta en muerte; que no se halle en la heredad de Jacob. Porque todas estas cosas se apartarán de los piadosos, y no se revolcarán en pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vestida de muerte» o «rodeada de muerte». La imagen griega describe una clase de habla envuelta por la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέξις
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - expresión
  - voz
  - dicho
  lexicon: LSJ
  rationale: λέξις aquí designa una forma de habla o expresión verbal. «Palabra» es natural en español y conserva el foco singular del texto.
- source_word: ἀντιπεριβεβλημένη
  english_pob_choice: clothed with / wrapped in
  chosen_spanish: vestida de
  alternatives_spanish:
  - vestida con
  - envuelta en
  - cubierta de
  lexicon: LSJ
  rationale: El participio transmite la imagen de algo rodeado o revestido. «Vestida de» conserva la metáfora sin sonar forzado en español; mantiene la idea de speech envuelto por la muerte.
- source_word: θανάτῳ
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - mortandad
  - morir
  lexicon: LSJ
  rationale: El dativo expresa el campo metafórico de la muerte como lo que reviste esa palabra. «Muerte» reproduce de modo directo el sustantivo griego.
- source_word: μὴ εὑρεθήτω
  english_pob_choice: may it not be found
  chosen_spanish: que no se halle
  alternatives_spanish:
  - que no sea hallada
  - no se encuentre
  - no se halle
  lexicon: LSJ
  rationale: La forma jussiva/imperativa negativa se expresa de manera natural con «que no se halle», conservando el tono exhortativo o desiderativo.
- source_word: ἐν κληρονομίᾳ Ἰακώβ
  english_pob_choice: in the inheritance of Jacob
  chosen_spanish: en la heredad de Jacob
  alternatives_spanish:
  - en la herencia de Jacob
  - dentro de la heredad de Jacob
  lexicon: LSJ
  rationale: κληρονομία puede ser «herencia» o «heredad». «Heredad» comunica mejor el sentido comunitario y covenantal de la expresión, y mantiene el paralelismo bíblico del idioma español.
- source_word: εὐσεβῶν
  english_pob_choice: the godly
  chosen_spanish: los piadosos
  alternatives_spanish:
  - los devotos
  - los fieles
  - los temerosos de Dios
  lexicon: LSJ
  rationale: Aunque «los piadosos» puede sonar tradicional, aquí conserva de forma breve el referente de personas reverentes y fieles. Se mantiene la tensión del término sin sustituirlo por una paráfrasis más interpretativa.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - tales cosas
  - estas cosas todas
  lexicon: LSJ
  rationale: El plural demostrativo más πᾶς apunta a un conjunto de prácticas o expresiones discutidas en el contexto. «Todas estas cosas» conserva esa amplitud plural.
- source_word: ἀποστήσεται
  english_pob_choice: will depart
  chosen_spanish: se apartarán
  alternatives_spanish:
  - se irán
  - se retirarán
  - se alejarán
  lexicon: LSJ
  rationale: El futuro medio expresa retirada o separación. «Se apartarán» mantiene la idea de distancia moral y sintácticamente se ajusta al sujeto plural «todas estas cosas».
- source_word: ἐν ἁμαρτίαις
  english_pob_choice: in sins
  chosen_spanish: en pecados
  alternatives_spanish:
  - en el pecado
  - en faltas
  - en transgresiones
  lexicon: LSJ
  rationale: El plural griego se conserva con «pecados», refiriéndose a actos concretos de maldad y no sólo a una noción abstracta.
- source_word: ἐγκυλισθήσονται
  english_pob_choice: will not wallow
  chosen_spanish: no se revolcarán
  alternatives_spanish:
  - no se hundirán
  - no se enredarán
  - no se hundirán en
  lexicon: LSJ
  rationale: El verbo sugiere la imagen fuerte de revolcarse o rodar dentro de algo. «No se revolcarán» preserva la fuerza moral del cuadro mejor que una expresión más suave.
theological_decisions:
- issue: Sentido de «la heredad de Jacob»
  english_pob_reading: A covenant people designation referring to the community descended from Jacob/Israel
  chosen_spanish_reading: Designación de un pueblo de pacto, la comunidad vinculada a Jacob/Israel
  alternative_spanish_readings:
  - Referencia sólo al Israel étnico
  - Etiqueta meramente simbólica para los justos
  rationale: Se mantiene la frase sin explicitar más de lo que el texto da. «Heredad de Jacob» conserva el lenguaje de pacto y comunidad sin resolver en la traducción el alcance exacto del grupo.
  doctrine_reference: Preservar la tensión interpretativa sin imponer una definición más estrecha o más amplia que la del texto.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «clothed with death» frente a «wrapped in death» por mayor naturalidad y cercanía al participio griego. En español se reprodujo esa imagen con «vestida de muerte», manteniendo el matiz metafórico. También se conservó el plural de «estas cosas» y la fuerza de «no se revolcarán».
  spanish_consistency_notes:
  - Se usa «Jacob» y no «Israel» para respetar el vínculo directo con el texto griego.
  - Se opta por «heredad» para κληρονομία, en línea con un registro bíblico claro y comunitario.
  - Se mantiene el plural «pecados» para ἁμαρτίαις.
  - Se evita suavizar ἐγκυλισθήσονται, preservando la imagen moral de revolcarse.
  - La nota al pie marca la alternativa léxica de εὐσεβῶν sin alterar el texto principal.
