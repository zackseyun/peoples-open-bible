base_translation:
  language: en
  yaml_path: translation/ot/psalms/041/010.yaml
  text: Even my close friend[a], in whom I trusted, who ate my bread[d][c][b], has lifted up his heel against me.
  footnotes:
  - marker: a
    text: Literally, 'the man of my peace,' an idiom for one who was at peace with me, that is, a close friend or trusted ally.
    reason: lexical_alternative
  - marker: b
    text: Or 'who shared my bread.' The Hebrew literally says 'who ate my bread,' evoking table fellowship and trust.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'has made great a heel against me,' a Hebrew idiom for treacherous or hostile action.
    reason: lexical_alternative
  - marker: d
    text: Quoted in John 13:18 in connection with Judas's betrayal of Jesus.
    reason: cross_reference
