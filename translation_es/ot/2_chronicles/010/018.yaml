translation:
  language: es
  text: Entonces el rey Roboam envió a Hadoram[a], que estaba encargado del trabajo forzado[c], pero los hijos de Israel[b] lo apedrearon, y murió. Y el rey Roboam se apresuró[d] a subir al carro para huir a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Hadoram»; el pasaje paralelo de 1 Reyes 12:18 tiene «Adoram».'
    reason: alternative_reading
  - marker: b
    text: 'O: «los israelitas». El hebreo «los hijos de Israel» es una designación nacional idiomática.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «que estaba encargado del servicio laboral impuesto» o «de la leva de trabajo». El hebreo se refiere a trabajo obligatorio impuesto, no a un impuesto monetario.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «se fortaleció para subir al carro». El hebreo más literalmente dice «se fortaleció» o «se armó de valor» para subir al carro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: שלח en narrativa corresponde naturalmente a 'enviar'; 'envió' conserva la sencillez y el valor directo del verbo sin cargarlo de matiz adicional.
- source_word: הַמֶּלֶךְ רְחַבְעָם
  english_pob_choice: King Rehoboam
  chosen_spanish: el rey Roboam
  alternatives_spanish:
  - Roboam, el rey
  - el rey Rehoboam
  lexicon: HALOT
  rationale: El español fluye mejor con el título antes del nombre o con apposición simple; 'el rey Roboam' mantiene la relación del hebreo sin sonar forzado.
- source_word: הֲדֹרָם
  english_pob_choice: Hadoram
  chosen_spanish: Hadoram
  alternatives_spanish:
  - Adoram
  lexicon: HALOT
  rationale: Se conserva la forma hebrea de Crónicas como nombre principal. La variante paralela de 1 Reyes 12:18 queda implícita en la nota textual.
- source_word: אֲשֶׁר עַל הַמַּס
  english_pob_choice: who was over the forced labor
  chosen_spanish: que estaba encargado de la leva
  alternatives_spanish:
  - que estaba sobre la leva
  - que estaba encargado del trabajo forzoso
  - que estaba sobre el tributo de trabajo
  lexicon: HALOT
  rationale: מַס aquí no es solo impuesto monetario, sino servicio impuesto; 'leva' comunica el carácter de servicio obligatorio de manera breve y comprensible en español. Se evita 'siervo' o un término eclesiástico ajeno al sentido.
- source_word: וַיִּרְגְּמוּ בוֹ ... אֶבֶן
  english_pob_choice: stoned him
  chosen_spanish: lo apedrearon
  alternatives_spanish:
  - lo lapidaron
  - lo apedrearon con piedras
  lexicon: HALOT
  rationale: El hebreo expresa el acto de arrojar piedras hasta matar; 'apedrear' es el equivalente idiomático normal en español. No se añade 'con piedras' porque el español lo presupone y la economía no elimina el sentido.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula idiomática hebrea 'hijos de Israel' por fidelidad al texto; en español es comprensible y mantiene el valor étnico/nacional del grupo.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: HALOT
  rationale: Verbo narrativo directo, sin atenuación.
- source_word: הִתְאַמֵּץ
  english_pob_choice: made haste
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se esforzó
  - cobró ánimo
  - se fortaleció
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente sugiere fortalecerse o armarse de ánimo, el contexto inmediato pide una reacción urgente de escape. 'Se apresuró' refleja esa lectura contextual, en línea con la revisión inglesa reciente.
- source_word: לַעֲלוֹת בַּמֶּרְכָּבָה
  english_pob_choice: to get up into the chariot
  chosen_spanish: a subir al carro
  alternatives_spanish:
  - a montar el carro
  - a subir en el carro
  lexicon: HALOT
  rationale: '''Carro'' es natural en español bíblico para מֶרְכָּבָה y mantiene el registro. ''Subir'' conserva la idea de ascenso/embarque inherente al hebreo.'
- source_word: לָנוּס יְרוּשָׁלָם
  english_pob_choice: to flee to Jerusalem
  chosen_spanish: para huir a Jerusalén
  alternatives_spanish:
  - para escapar a Jerusalén
  lexicon: HALOT
  rationale: נוס es huir/escapar; 'huir' es la opción más directa y formal. La finalidad se expresa con 'para' para una sintaxis natural en español.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en dos puntos: omite cualquier redundancia equivalente a ''con piedras'' en el verbo de apedrear, y traduce הִתְאַמֵּץ según el sentido contextual de urgencia (''se apresuró'') más que con una calca de ''se fortaleció''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general de la serie, pero este versículo no contiene el nombre divino.
  - Se usa 'los hijos de Israel' para preservar la fórmula hebrea, coherente con el criterio de la POB para designaciones idiomáticas cuando no hay ambigüedad.
  - '''Leva'' se emplea como equivalente funcional de מַס en este contexto de trabajo impuesto; no se entiende como reclutamiento militar.'
  - '''Carro'' se escoge como término bíblico claro y de amplio registro en español, equivalente de ''chariot''.'
