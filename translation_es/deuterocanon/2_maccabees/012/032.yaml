translation:
  language: es
  text: Pero después de la llamada Pentecostés[a], salieron contra Gorgias[b], el comandante de Idumea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la fiesta llamada Pentecostés». El griego dice literalmente «la llamada Pentecostés».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «general» o «gobernador», porque el término griego puede indicar autoridad militar o civil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: LSJ
  rationale: Expresa con naturalidad la relación temporal directa del griego sin añadir matices innecesarios.
- source_word: τὴν λεγομένην πεντηκοστήν
  english_pob_choice: the so-called Pentecost
  chosen_spanish: la llamada Pentecostés
  alternatives_spanish:
  - la llamada fiesta de Pentecostés
  - la llamada quincuagésima
  lexicon: LSJ
  rationale: λεγόμενην pide conservar la idea de 'llamada'; 'Pentecostés' mantiene el nombre festivo establecido y es más natural en español que una glosa literal en el cuerpo del texto.
- source_word: ὥρμησαν
  english_pob_choice: they moved out
  chosen_spanish: salieron
  alternatives_spanish:
  - se dirigieron
  - avanzaron
  - partieron
  lexicon: LSJ
  rationale: En contexto militar, el verbo indica iniciar una acción de campaña. 'Salieron' comunica el movimiento sin exagerar la rapidez o violencia que el griego no obliga a enfatizar aquí.
- source_word: ἐπὶ Γοργίαν
  english_pob_choice: against Gorgias
  chosen_spanish: contra Gorgias
  alternatives_spanish:
  - hacia Gorgias
  lexicon: LSJ
  rationale: Con un verbo de movimiento militar, ἐπί con acusativo puede ser hostil; 'contra' conserva esa dirección bélica.
- source_word: στρατηγόν
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - general
  - gobernador
  lexicon: LSJ
  rationale: El término puede abarcar mando militar; 'comandante' refleja bien el papel en el contexto y evita la lectura más administrativa de 'gobernador'.
- source_word: Ἰδουμαίας
  english_pob_choice: Idumea
  chosen_spanish: Idumea
  alternatives_spanish:
  - Edom
  lexicon: LSJ
  rationale: Se conserva el topónimo griego tradicional como nombre geográfico propio.
translation_notes:
  revision_awareness: 'La redacción sigue el griego de Swete 1909 y toma en cuenta la auditoría inglesa: conserva la fórmula de ''la llamada Pentecostés'', mantiene el sentido militar de ὥρμησαν y traduce στρατηγόν como cargo de mando, evitando la opción más administrativa cuando el contexto bélico favorece ''comandante''.'
  spanish_consistency_notes:
  - Se usa 'Pentecostés' como nombre festivo establecido, con la glosa 'llamada' para reproducir λεγομένην.
  - Se prefiere 'comandante' para στρατηγός en este contexto militar, coherente con la revisión inglesa.
  - Se mantiene 'Idumea' como topónimo transliterado.
  - La puntuación y el registro buscan ser claros y sobrios para lectura eclesial en español.
