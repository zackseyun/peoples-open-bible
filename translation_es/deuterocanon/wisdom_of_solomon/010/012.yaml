translation:
  language: es
  text: Ella lo protegió de enemigos, y de los que acechaban lo mantuvo a salvo; y le otorgó una fuerte contienda[a], para que supiera que la piedad[b] es más poderosa que todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un combate poderoso» o «el premio en una dura contienda». El griego usa imaginería de certamen y premio al decir ἐβράβευσεν αὐτῷ.
    reason: lexical_alternative
  - marker: b
    text: O «devoción a Dios». El griego εὐσέβεια denota devoción reverente a Dios expresada en la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεφύλαξεν
  english_pob_choice: protected
  chosen_spanish: la protegió
  alternatives_spanish:
  - la guardó
  - la preservó
  lexicon: LSJ
  rationale: El verbo expresa custodia protectora frente al peligro. «La protegió» es natural en español y conserva la idea de amparo activo.
- source_word: ἐχθρῶν
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - falsos enemigos
  lexicon: LSJ
  rationale: «Enemigos» es la equivalencia directa y mantiene el sentido de personas hostiles.
- source_word: ἐνεδρευόντων
  english_pob_choice: those lying in ambush
  chosen_spanish: los que acechaban
  alternatives_spanish:
  - los que estaban en emboscada
  - los emboscados
  lexicon: LSJ
  rationale: El participio describe a quienes preparan una emboscada. «Los que acechaban» conserva la imagen concreta sin forzar un sustantivo poco natural en español.
- source_word: ἠσφαλίσατο
  english_pob_choice: kept him safe
  chosen_spanish: le dio seguridad
  alternatives_spanish:
  - lo mantuvo seguro
  - lo aseguró
  lexicon: LSJ
  rationale: El verbo medio comunica hacer seguro o resguardar. En español, la idea se integra con naturalidad en la secuencia protectora con «le dio un fuerte combate».
- source_word: ἀγῶνα ἰσχυρὸν
  english_pob_choice: a strong contest
  chosen_spanish: un fuerte combate
  alternatives_spanish:
  - un fuerte certamen
  - un combate intenso
  - una dura contienda
  lexicon: LSJ
  rationale: ἀγών puede ser contienda, lucha o combate; ἰσχυρός intensifica. «Un fuerte combate» preserva la intensidad y funciona bien en español bíblico contemporáneo.
- source_word: ἐβράβευσεν αὐτῷ
  english_pob_choice: awarded him
  chosen_spanish: le dio
  alternatives_spanish:
  - le otorgó
  - le concedió
  lexicon: LSJ
  rationale: El verbo tiene matiz de arbitrar/otorgar en un contexto de premio o contienda. Aunque «le dio» es más general, aquí se integra con el objeto «un fuerte combate», manteniendo la tensión de prueba y designación sin introducir una formulación demasiado técnica.
- source_word: ἵνα γνῷ
  english_pob_choice: so that he might know
  chosen_spanish: para que supiera
  alternatives_spanish:
  - para que conociera
  - a fin de que supiera
  lexicon: LSJ
  rationale: La cláusula final expresa propósito. «Para que supiera» es claro y conserva la finalidad pedagógica del verso.
- source_word: παντὸς δυνατωτέρα
  english_pob_choice: stronger than everything
  chosen_spanish: más poderosa que todo
  alternatives_spanish:
  - más fuerte que todo
  - más poderosa que todas las cosas
  lexicon: LSJ
  rationale: El comparativo con genitivo expresa superioridad universal. «Más poderosa que todo» comunica el alcance total sin sonar forzado.
- source_word: εὐσέβεια
  english_pob_choice: godliness
  chosen_spanish: la piedad
  alternatives_spanish:
  - la devoción a Dios
  - la reverencia
  lexicon: LSJ
  rationale: En Sabiduría, εὐσέβεια designa devoción reverente vivida ante Dios. «Piedad» es una opción tradicional y comprensible en español; se mantiene la amplitud religiosa del término.
theological_decisions:
- issue: Sujeto femenino implícito (Sabiduría personificada)
  english_pob_reading: She protected him... she awarded him...
  chosen_spanish_reading: La protegió... le dio...
  alternative_spanish_readings:
  - La Sabiduría lo protegió...
  - Ella lo protegió...
  rationale: El griego mantiene un sujeto femenino implícito por el contexto. En español, se evita repetir «Sabiduría» para no sobreespecificar lo que el verso no dice explícitamente, pero se preserva la referencia femenina con el pronombre clítico y el verbo en femenino implícito por el contexto inmediato.
  doctrine_reference: Preservar la personificación literaria del texto; no añadir más de lo que el verso expresa.
- issue: Relación entre contienda y premio en ἐβράβευσεν αὐτῷ
  english_pob_reading: she awarded him a strong contest
  chosen_spanish_reading: le dio un fuerte combate
  alternative_spanish_readings:
  - le otorgó un fuerte combate
  - le concedió la victoria en un fuerte combate
  rationale: El griego conserva imaginería de contienda/premio, y la POB inglesa evita resolverla como mera victoria. «Le dio un fuerte combate» mantiene la prueba misma como don/encargo, conservando la tensión pedagógica del texto.
  doctrine_reference: Preservar la tensión teológica del pasaje; no convertir la prueba en triunfo simplificado.
- issue: εὐσέβεια como virtud de relación con Dios
  english_pob_reading: godliness
  chosen_spanish_reading: la piedad
  alternative_spanish_readings:
  - la devoción a Dios
  - la reverencia
  rationale: «Piedad» es una forma breve y tradicional que en español puede abarcar la reverencia obediente y la vida orientada a Dios. Se evita reducir el término a simple sentimiento religioso.
  doctrine_reference: Mantener el peso ético-religioso del término en Sabiduría.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final del inglés POB que prefirió «strong contest» frente a «hard struggle» para ἀγῶνα ἰσχυρόν. La versión española adopta un equivalente formal y natural («un fuerte combate») que conserva la imaginería de contienda sin resolverla como victoria inmediata. También se respetó el eje interpretativo de la POB: sujeto femenino personificado, protección frente a enemigos y emboscadores, y el valor teológico de εὐσέβεια sin neutralizar su densidad religiosa.'
  spanish_consistency_notes:
  - Se mantiene «Sabiduría» implícita conforme al contexto, sin introducir un nombre explícito en el verso.
  - «Piedad» se usa para εὐσέβεια siguiendo un registro bíblico comprensible en español; en notas se explicita su alcance.
  - La secuencia verbal conserva el paralelismo de protección + resguardo + contienda, sin fundir las tres acciones en una sola idea.
  - No se usó «SEÑOR» ni terminología eclesiástica tradicional para YHWH, porque este verso no lo contiene.
