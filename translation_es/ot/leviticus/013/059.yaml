revisions:
- from: Esta es la ley para la erupción de lepra[a] en una prenda de lana o en una prenda de lino, o en la urdimbre o en la trama, o en cualquier objeto de cuero, para declararlo limpio o declararlo impuro.
  to: Esta es la ley para un brote de enfermedad leprosa en una prenda de lana o en una prenda de lino, o en la urdimbre o en la trama[a], o en cualquier objeto de cuero, para declararlo limpio o declararlo impuro.
  rationale: Se reemplaza «erupción de lepra» por «brote de enfermedad leprosa» para reflejar mejor נֶגַע צָרַעַת en un contexto de telas y cuero, conservando la conexión tradicional sin sonar como un diagnóstico clínico moderno. También se corrige la nota para que ofrezca una alternativa léxica genuinamente española y elimine el anglicismo heredado del inglés. El resto del versículo se mantiene por su buena fidelidad y legibilidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés en la estructura general: תּוֹרַת como «la ley para», los materiales textiles y de cuero, y el cierre jurídico-ritual «declararlo limpio/impuro». Sin embargo, «erupción de lepra» suena demasiado clínica y humana en español para un contexto de prendas y cuero, y no refleja bien el valor amplio de נֶגַע צָרַעַת. Además, la nota al pie actual está mal formulada porque introduce el anglicismo «woof» en vez de dar una alternativa española útil.'
  spanish_quality_summary: El español es claro y mayormente natural, con buen registro bíblico moderno. No obstante, «erupción de lepra» resulta poco idiomático en español aplicado a telas u objetos; «brote de enfermedad leprosa» suena más natural y evita sugerir una afección dermatológica humana específica. La nota al pie necesita corrección para que sea plenamente legible en español.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto como Yahvé/Mesías/etc. La decisión sobre צָרַעַת merece ajuste: dado que el inglés auditado usa «leprous disease» y el propio razonamiento teológico reconoce que no se trata de lepra clínica moderna, en español conviene evitar el sustantivo desnudo «lepra» en esta construcción. «Enfermedad leprosa» preserva la conexión tradicional sin sonar médicamente exacta. «Urdimbre» y «trama» están bien; la nota debe ofrecer «la trama»/«la trama transversal» o «la trama» frente a «la urdimbre», no «woof».'
  issues:
  - severity: medium
    issue: «erupción de lepra» es una combinación poco natural y potencialmente engañosa en español
    rationale: נֶגַע צָרַעַת aquí describe un caso/manifestación en prendas y cuero. En español, «lepra» sola evoca con fuerza la enfermedad humana moderna; «erupción» además refuerza una imagen dermatológica corporal. «Brote de enfermedad leprosa» conserva mejor el sentido amplio y el vínculo con el inglés auditado «outbreak of leprous disease».
  - severity: medium
    issue: La nota al pie usa el anglicismo «woof» en lugar de una alternativa española
    rationale: Las notas deben ser legibles y útiles en español. La nota actual parece calcada del inglés y no explica una alternativa española real; debe reformularse como alternativa entre «trama» y «tejido transversal» o explicar que algunos traducen «trama»/«hilos transversales».
  - severity: low
    issue: La referencia pronominal «declararlo» puede sentirse algo distante del antecedente múltiple
    rationale: No es incorrecto, porque el sufijo hebreo es singular y retoma el objeto afectado, pero conviene una formulación algo más fluida manteniendo el valor jurídico-ritual.
  revised_spanish_text: Esta es la ley para un brote de enfermedad leprosa en una prenda de lana o en una prenda de lino, o en la urdimbre o en la trama[a], o en cualquier objeto de cuero, para declararlo limpio o declararlo impuro.
  revised_footnotes:
  - marker: a
    text: O «los hilos transversales»; «trama» se refiere a los hilos que cruzan la urdimbre en el tejido.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «erupción de lepra» por «brote de enfermedad leprosa» para reflejar mejor נֶגַע צָרַעַת en un contexto de telas y cuero, conservando la conexión tradicional sin sonar como un diagnóstico clínico moderno. También se corrige la nota para que ofrezca una alternativa léxica genuinamente española y elimine el anglicismo heredado del inglés. El resto del versículo se mantiene por su buena fidelidad y legibilidad.
