base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/007/009.yaml
  text: Know[a], therefore, that Yahweh your God, he is God, the faithful God, keeping the covenant and the steadfast love for those who love him and for those who keep his commandments[d][c][b], to a thousand generations.
