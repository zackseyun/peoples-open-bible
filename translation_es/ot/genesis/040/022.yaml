    reason: lexical_alternative
  revision_rationale: Se reemplaza «hizo colgar» por «colgó» para ajustarse mejor al verbo hebreo simple תָּלָה y evitar una causatividad no expresada en la fuente. Se conserva la nota para reflejar la alternativa «ahorcó» y la posible amplitud semántica documentada en el rastro de auditoría inglés.
