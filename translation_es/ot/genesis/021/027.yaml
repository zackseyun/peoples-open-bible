revisions:
- from: Así que Abraham tomó ovejas y ganado y se las dio a Abimelec[a], y los dos hicieron un pacto.
  to: Entonces Abraham tomó ovejas y ganado y se los dio a Abimelec, y los dos hicieron una alianza[a].
  rationale: Se revisa 'pacto' a 'alianza' para reflejar mejor la decisión auditada de mantener בְּרִית como término bíblico clave equivalente a 'covenant'. También se mejora el tono narrativo con 'Entonces' y se ajusta el pronombre a 'se los dio' para concordar naturalmente con 'ovejas y ganado' como grupo mixto. La nota se simplifica y alinea mejor con el hebraísmo subyacente.
