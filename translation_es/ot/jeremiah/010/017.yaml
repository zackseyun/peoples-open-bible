translation:
  language: es
  text: Recoge tu bulto de la tierra[a], tú que habitas bajo asedio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Recoge tus bienes de la tierra». El hebreo de כִּנְעָתֵךְ también puede referirse a bienes, mercancías o un equipaje; y la destinataria puede expresarse más literalmente como «habitante» o «la que habita».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִסְפִּי
  english_pob_choice: Gather up
  chosen_spanish: Recoge
  alternatives_spanish:
  - Reúne
  - Junta
  lexicon: HALOT
  rationale: El imperativo femenino singular pide una acción inmediata de tomar y juntar pertenencias. «Recoge» suena natural en español y conserva la idea de reunir lo que debe llevarse consigo.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la tierra/país
  - del suelo
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra, país o suelo. La POB inglesa revisó de «ground» a «land» para ajustar mejor el hebreo; en español, «tierra» mantiene esa amplitud concreta sin forzar un sentido exclusivamente territorial o meramente físico.
- source_word: כִּנְעָתֵךְ
  english_pob_choice: your bundle
  chosen_spanish: tu bulto
  alternatives_spanish:
  - tu atado
  - tus bienes
  - tu carga
  lexicon: HALOT
  rationale: El sustantivo admite ideas de bienes/mercancías/bulto. «Bulto» refleja un paquete o haz de pertenencias listo para ser llevado y preserva la imagen concreta sin introducir una interpretación demasiado específica.
- source_word: יֹשַׁבְתִּי/ישבתי
  english_pob_choice: you who dwell
  chosen_spanish: tú que habitas
  alternatives_spanish:
  - tú que vives
  - oh habitante
  - la que habita
  lexicon: HALOT
  rationale: La forma hebrea apunta a una dirección vocativa hacia una destinataria femenina singular. «Tú que habitas» conserva el valor de segunda persona y la idea de residencia continua, con un registro natural en español.
- source_word: בַּמָּצוֹר
  english_pob_choice: under siege
  chosen_spanish: bajo sitio
  alternatives_spanish:
  - en sitio
  - asediada
  - en asedio
  lexicon: HALOT
  rationale: מָצוֹר expresa sitio militar o condición sitiada. «Bajo sitio» comunica la presión militar de manera breve y fiel; «asediada» sería posible, pero aquí el hebreo describe más el estado que un calificativo explícito.
translation_notes:
  revision_awareness: La versión española sigue de cerca el ajuste reciente del inglés POB que privilegia «from the land» frente a «from the ground», y mantiene el tratamiento del destinatario femenino singular como una apelación directa. Se ha evitado una traducción más libre que suavizara la imagen de preparación para el exilio o la presión del sitio.
  spanish_consistency_notes:
  - Se usa «tierra» para אֶרֶץ, en coherencia con el valor amplio del hebreo y con la revisión del inglés POB.
  - «Sitio» se conserva para מָצוֹר en lugar de «asedio» para mantener la imagen breve y sustantiva del estado de amenaza.
  - Se evita «SEÑOR» y otros términos teológicos no pertinentes en este versículo.
  - La apelación está en segunda persona singular femenina, acorde con la forma hebrea y con el audit trail inglés.
