translation:
  language: es
  text: Tus manos me moldearon y me hicieron[a], por completo, por todos lados[b]; pero me tragas por completo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'me formaron' o 'me dieron forma'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'juntamente, alrededor' o 'por completo, por todos lados', expresando que Dios formó a Job enteramente, en todo su contorno.
    reason: cultural_note
  - marker: c
    text: O 'me destruyes'; el hebreo dice literalmente 'me tragas por completo', una metáfora vívida de destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדֶיךָ
  english_pob_choice: Your hands
  chosen_spanish: Tus manos
  alternatives_spanish:
  - Tu mano
  lexicon: HALOT
  rationale: Se conserva el plural concreto de la imagen corporal divina. En español, 'Tus manos' reproduce mejor la agencia personal y artesanal que 'Tu mano'.
- source_word: עִצְּבוּנִי
  english_pob_choice: shaped me
  chosen_spanish: me moldearon
  alternatives_spanish:
  - me formaron
  - me dieron forma
  lexicon: HALOT
  rationale: El hebreo expresa una acción de modelar o dar forma de manera artesanal. 'Moldearon' mantiene la fuerza plástica de la imagen sin sonar demasiado técnico.
- source_word: וַיַּעֲשׂוּנִי
  english_pob_choice: and made me
  chosen_spanish: y me hicieron
  alternatives_spanish:
  - y me formaron
  - y me fabricaron
  lexicon: HALOT
  rationale: עשה es el verbo común 'hacer'. 'Hicieron' conserva la sencillez del paralelo con el verbo anterior y evita forzar un matiz no explícito.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: todo alrededor, por completo
  alternatives_spanish:
  - juntamente
  - en conjunto
  lexicon: HALOT
  rationale: 'Aquí יחד, junto con ''alrededor'', intensifica la totalidad de la formación. En español conviene explicitar el efecto resultante: una formación completa y envolvente.'
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - por todos lados
  - en torno
  lexicon: HALOT
  rationale: '''Todo alrededor'' conserva el sentido espacial de סָבִיב y, con יחד, comunica la cobertura total del acto creador.'
- source_word: וַתְּבַלְּעֵנִי
  english_pob_choice: yet you swallow me up
  chosen_spanish: y aun así me devoras
  alternatives_spanish:
  - y me tragas
  - y aun así me destruyes
  lexicon: HALOT
  rationale: בלע significa literalmente 'tragar/engullir', con uso metafórico para destrucción. 'Devoras' preserva la imagen vívida en español y deja abierta la tensión entre metáfora y destrucción.
theological_decisions:
- issue: Imagen antropomórfica de la creación divina
  english_pob_reading: Retain the concrete expression 'Your hands' and the paired creation verbs without softening them.
  chosen_spanish_reading: Mantener 'Tus manos' y los dos verbos de formación sin volverlos una abstracción.
  alternative_spanish_readings:
  - Me creaste
  - Formaste mi cuerpo
  rationale: La queja de Job apela a la artesanía íntima de Dios. Traducirlo de forma más genérica perdería el relieve retórico y corporal del texto hebreo.
  doctrine_reference: Principio de primacía del original; preservar la imaginería concreta y la tensión teológica.
- issue: Tensión entre el cuidado creador de Dios y su acción destructiva aparente
  english_pob_reading: Preserve the sharp contrast with 'yet you swallow me up.'
  chosen_spanish_reading: Preservar el contraste con 'y aun así me devoras'.
  alternative_spanish_readings:
  - pero me destruyes
  - y me destruyes
  rationale: El lamento yuxtapone deliberadamente formación divina y aparente destrucción. La traducción debe mantener esa tensión sin suavizarla.
  doctrine_reference: Principio de preservar la tensión teológica en lugar de resolverla interpretativamente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que prefirió una puntuación formal con punto y coma en lugar de un guion. En español se adoptó también el punto y coma para conservar el contraste final con registro sobrio y publicación-readable.
  spanish_consistency_notes:
  - Se mantuvo el plural de 'manos' por fidelidad al hebreo y a la decisión inglesa.
  - '''Moldearon'' y ''hicieron'' reproducen el doblete verbal de creación sin borrar su fuerza artesanal.'
  - La frase 'todo alrededor, por completo' integra יחד y סָבִיב sin perder la imagen espacial.
  - '''Me devoras'' conserva el verbo figurado de בלע y deja visible la tensión con la destrucción.'
  - El punto y coma marca adecuadamente el giro adversativo en un registro formal de Biblia pública.
