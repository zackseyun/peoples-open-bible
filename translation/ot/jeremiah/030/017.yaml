id: JER.30.17
reference: Jeremiah 30:17
source:
  edition: WLC
  text: כִּי֩ אַעֲלֶ֨ה אֲרֻכָ֥ה לָ֛/ךְ וּ/מִ/מַּכּוֹתַ֥יִ/ךְ אֶרְפָּאֵ֖/ךְ נְאֻם יְהוָ֑ה כִּ֤י נִדָּחָה֙ קָ֣רְאוּ לָ֔/ךְ צִיּ֣וֹן הִ֔יא דֹּרֵ֖שׁ אֵ֥ין לָֽ/הּ־׃ס
translation:
  text: 'For I will bring healing to you[a], and I will heal you from your wounds, declares Yahweh, because they have called you an outcast: ‘It is Zion[c][b]; no one cares for her.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will restore health to you.' The Hebrew idiom is literally 'I will cause healing to come up for you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because they called you “Outcast.”' The Hebrew participle can mean 'driven away' or 'cast off.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'Zion—there is no one seeking her,' that is, no one cares for or comes to her aid.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַעֲלֶה אֲרֻכָה
  chosen: I will bring healing
  alternatives:
  - I will restore health
  - I will lay healing upon you
  lexicon: HALOT
  rationale: The idiom literally reads 'I will cause healing/new flesh to come up for you.' In context it refers to restoration of health/recovery from injury. 'Bring healing' preserves the causative sense of the Hiphil while remaining natural English.
- source_word: וּמִמַּכּוֹתַיִךְ אֶרְפָּאֵךְ
  chosen: and I will heal you from your wounds
  alternatives:
  - and from your blows I will heal you
  - and I will heal your wounds
  lexicon: HALOT
  rationale: מַכָּה can mean blow, wound, or injury. Here the resultative sense 'wounds' fits the healing context best. Retaining 'heal you from your wounds' reflects the 2fs pronominal object plus the מן phrase.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Declares' is idiomatic and suitably weighty for נְאֻם.
- source_word: נִדָּחָה
  chosen: an outcast
  alternatives:
  - driven away
  - banished one
  - cast off
  lexicon: HALOT
  rationale: The passive participle denotes one who has been driven away or cast off. 'Outcast' captures the social and covenantal shame implied and works naturally after 'called you.'
- source_word: קָרְאוּ לָךְ
  chosen: they have called you
  alternatives:
  - they call you
  - they named you
  lexicon: HALOT
  rationale: The perfect likely summarizes what others have said about Zion. English present perfect conveys the established reproach with present relevance.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper name is transliterated per translation philosophy.
- source_word: הִיא דֹּרֵשׁ אֵין לָהּ
  chosen: no one seeks her
  alternatives:
  - there is no one who cares for her
  - she has no one seeking her
  lexicon: HALOT
  rationale: Though literally 'there is no seeker for her,' the sense is that no one inquires after, cares for, or comes to her aid. 'No one seeks her' is concise and preserves the metaphor of seeking/inquiring.
