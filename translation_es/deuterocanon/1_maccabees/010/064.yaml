translation:
  language: es
  text: Y sucedió que, cuando los que se encontraban con él vieron su esplendor[a], tal como había sido proclamado, y que estaba vestido de lino[b], todos huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su gloria». En este contexto, el griego probablemente se refiere a la magnificencia real visible más que a un sentido específicamente teológico.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «vestido de lino» (o «cubierto con una prenda de lino»); el término puede referirse a tela o vestidura de lino.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ὡς
  english_pob_choice: And it happened that, when
  chosen_spanish: Y sucedió que, cuando
  alternatives_spanish:
  - Y aconteció que, cuando
  - Y ocurrió que, cuando
  lexicon: LSJ
  rationale: La fórmula griega introduce el relato y marca simultáneamente el giro temporal; «Y sucedió que, cuando» conserva esa transición narrativa con español natural y digno.
- source_word: οἱ ἐντυγχάνοντες
  english_pob_choice: those who met him
  chosen_spanish: los que lo encontraban
  alternatives_spanish:
  - los que lo encontraron
  - los que se acercaban a él
  - los que lo encontraban al pasar
  lexicon: LSJ
  rationale: El participio expresa a quienes estaban en contacto o se topaban con él. «Los que lo encontraban» mantiene la idea interpersonal sin añadir un matiz más fuerte de encuentro puntual que el griego no exige.
- source_word: τὴν δόξαν αὐτοῦ
  english_pob_choice: his splendor
  chosen_spanish: su esplendor
  alternatives_spanish:
  - su gloria
  - su magnificencia
  lexicon: LSJ
  rationale: En este contexto real y público, δόξα alude al resplandor o magnificencia visible, no necesariamente a un sentido teológico. «Esplendor» reproduce bien esa fuerza y preserva el tono elevado.
- source_word: καθὼς ἐκήρυξεν
  english_pob_choice: as it had been proclaimed
  chosen_spanish: tal como había sido proclamado
  alternatives_spanish:
  - como había sido proclamado
  - según se había proclamado
  - tal como se había anunciado
  lexicon: LSJ
  rationale: El verbo κηρύσσω indica proclamación pública. La forma pasiva impersonal en español refleja mejor el griego que una construcción con sujeto explícito, y «tal como» conserva la correspondencia de modo.
- source_word: περιβεβλημένον αὐτὸν σινδόνα
  english_pob_choice: that he was clothed in linen
  chosen_spanish: que estaba vestido de lino
  alternatives_spanish:
  - que iba vestido de lino
  - que llevaba lino puesto
  - que estaba revestido de lino
  lexicon: LSJ
  rationale: περιβεβλημένον indica estar cubierto o vestido, y σινδών refiere a lino o una prenda de lino. «Vestido de lino» es claro y fiel; evita añadir «fino» u otro matiz no explicitado.
- source_word: ἔφυγον πάντες
  english_pob_choice: they all fled
  chosen_spanish: todos huyeron
  alternatives_spanish:
  - huyeron todos
  - todos escaparon
  - todos se fueron huyendo
  lexicon: LSJ
  rationale: La aorística ἔφυγον expresa fuga real e inmediata. «Todos huyeron» conserva con naturalidad la fuerza del verbo.
theological_decisions:
- issue: Sentido de δόξα en un contexto real
  english_pob_reading: his splendor; the Greek likely refers to visible royal magnificence rather than a specifically theological sense.
  chosen_spanish_reading: su esplendor; probablemente magnificencia real visible, no un sentido teológico.
  alternative_spanish_readings:
  - su gloria
  - su magnificencia
  rationale: 'Sigo la lectura auditada del POB en inglés: aquí δόξα no debe leerse primariamente como gloria divina. En español, «esplendor» ayuda a evitar una carga teológica no sustentada por el contexto.'
  doctrine_reference: Distinción semántica entre gloria visible/real y gloria divina; lectura contextual del término griego δόξα.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés POB, que sustituyó «just as it had been proclaimed» por «as it had been proclaimed» por naturalidad. En español se refleja con «tal como había sido proclamado», manteniendo la relación temporal y el carácter impersonal de la proclamación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, pero este versículo no lo contiene.
  - Se usa «esplendor» para δόξα conforme al contexto real y visual; no se impone «gloria» como equivalente fijo.
  - «Lino» conserva el valor material de σινδών sin sobrerinterpretar la prenda.
  - La estructura narrativa conserva el tono formal sin calco excesivo del inglés.
