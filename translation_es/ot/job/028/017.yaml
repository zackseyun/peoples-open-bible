translation:
  language: es
  text: El oro y el vidrio no pueden igualarla[a], ni puede cambiarse por un objeto de oro fino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cristal» para זְכוֹכִית. El hebreo probablemente designa un material transparente valioso; «vidrio» se prefiere por ser el sentido léxico más probable.
    reason: lexical_alternative
  - marker: b
    text: O «ni una vasija de oro fino puede darse a cambio de ella». El hebreo כְּלִי פָז puede expresarse más específicamente como «vasija de oro fino».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַרְכֶנָּה
  english_pob_choice: cannot equal it
  chosen_spanish: no pueden igualarla
  alternatives_spanish:
  - no pueden compararse con ella
  - no pueden valorarla
  - no pueden equipararse a ella
  lexicon: HALOT
  rationale: El verbo ערך aquí expresa comparar, estimar o poner a la misma altura. «Igualarla» conserva la idea de que ni el oro ni el vidrio alcanzan su valor, y funciona con el antecedente femenino de «sabiduría» en el contexto inmediato.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro
  lexicon: HALOT
  rationale: «Oro» es el equivalente natural y preciso para el metal precioso. No hace falta intensificarlo aquí porque la frase siguiente ya distingue el oro refinado con פָז.
- source_word: זְכוֹכִית
  english_pob_choice: glass
  chosen_spanish: vidrio
  alternatives_spanish:
  - cristal
  - vidrio
  lexicon: HALOT
  rationale: El término hebreo puede referirse a un material transparente de lujo. «Vidrio» refleja el sentido léxico más probable en español moderno; «cristal» queda como alternativa tradicional, pero es menos específica.
- source_word: תְמוּרָתָהּ
  english_pob_choice: its exchange
  chosen_spanish: su intercambio
  alternatives_spanish:
  - su precio
  - lo que se da a cambio de ella
  - su equivalente
  lexicon: HALOT
  rationale: תְּמוּרָה conserva la metáfora comercial de intercambio o sustitución. «Su intercambio» mantiene esa concreción sin añadir una paráfrasis excesiva.
- source_word: כְּלִי פָז
  english_pob_choice: an article of fine gold
  chosen_spanish: un artículo de oro fino
  alternatives_spanish:
  - un vaso de oro fino
  - un objeto de oro puro
  - una vasija de oro fino
  lexicon: HALOT
  rationale: 'כְּלִי es un término amplio: artículo, objeto, utensilio o vasija. «Artículo» preserva la amplitud del sustantivo en un español natural, y «oro fino» refleja que פָז no es simplemente oro genérico sino oro refinado.'
translation_notes:
  revision_awareness: 'Se mantuvo sin cambios la lectura base del audit trail inglés: «gold and glass cannot equal it; nor can its exchange be an article of fine gold», con adaptación española idiomática y sin introducir nuevas variantes textuales.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología cultual ajena; el versículo no contiene el tetragrámaton ni vocabulario teológico directo.
  - Se conservó el referente femenino implícito en «la» para reflejar el antecedente de sabiduría en el contexto mayor.
  - «Oro fino» se reservó para פָז, diferenciándolo de «oro» simple.
