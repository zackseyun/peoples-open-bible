  text: And he took it from their hands and fashioned it with a graving tool[a], and he made it into a cast calf. Then they said, “These are your gods, Israel[d][c][b], who brought you up from the land of Egypt.”
  footnotes:
  - marker: a
    text: Or 'with an engraving tool,' 'with a stylus,' or 'with a chisel'; the exact sense of the Hebrew term is debated.
