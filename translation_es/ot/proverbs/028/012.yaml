translation:
  language: es
  text: Cuando los justos se alegran[a], hay gran gloria; pero cuando los malvados se levantan, la gente se esconde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “cuando los justos exultan” o “cuando los justos se regocijan”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלֹץ
  english_pob_choice: When ... rejoice
  chosen_spanish: Cuando ... se alegran
  alternatives_spanish:
  - En el regocijo de ...
  - Cuando ... exultan
  lexicon: HALOT
  rationale: 'El infinitivo con preposición ב expresa valor temporal: ''cuando ocurre el regocijo''. ''Se alegran'' es natural en español y conserva el matiz de alegría pública sin endurecer el verso con un calco.'
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - personas justas
  lexicon: HALOT
  rationale: Es un plural sustantivado de persona justa. 'Los justos' es el equivalente más idiomático en el registro sapiencial español y conserva la referencia a personas, no a una cualidad abstracta.
- source_word: רַבָּה
  english_pob_choice: there is great
  chosen_spanish: hay gran
  alternatives_spanish:
  - es abundante
  - abunda
  lexicon: HALOT
  rationale: El adjetivo predicativo modifica a תִפְאָרֶת. En español, 'hay gran' reproduce de forma natural la valoración de abundancia sin perder la estructura predicativa.
- source_word: תִפְאָרֶת
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  - belleza
  lexicon: HALOT
  rationale: El sustantivo puede abarcar belleza, honor o esplendor. 'Gloria' comunica bien la elevación pública y el honor asociados al ascenso de los justos, y coincide con la elección semántica del POB inglés.
- source_word: וּבְקוּם
  english_pob_choice: but when ... rise
  chosen_spanish: pero cuando ... se levantan
  alternatives_spanish:
  - y cuando ... se alzan
  - pero al levantarse ...
  lexicon: HALOT
  rationale: La conjunción introduce contraste con el primer hemistiquio. 'Se levantan' refleja היטב el sentido social/político de קום como 'alzarse' o 'llegar al poder' en un proverbio de dominio público.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: Es el plural sustantivado de personas moralmente perversas. 'Los malvados' es claro en español contemporáneo; 'los impíos' es más tradicional, pero menos inmediato para lectores modernos.
- source_word: יְחֻפַּשׂ
  english_pob_choice: is hidden
  chosen_spanish: se esconde
  alternatives_spanish:
  - se oculta
  - es escondida
  - se hace invisible
  lexicon: HALOT
  rationale: La forma pasiva de חפשׂ se entiende aquí en contexto como reacción de retirada/ocultamiento. El español idiomático 'se esconde' expresa bien la idea de que la gente desaparece de la vista cuando los malvados llegan al poder.
- source_word: אָדָם
  english_pob_choice: people
  chosen_spanish: la gente
  alternatives_spanish:
  - una persona
  - el hombre
  - las personas
  lexicon: HALOT
  rationale: Aunque el hebreo usa אָדָם en singular genérico, la revisión inglesa ya explicitó el sentido impersonal y colectivo. 'La gente' preserva ese valor genérico y naturaliza el resultado en español sin perder la referencia a la población ordinaria.
theological_decisions:
- issue: Valor genérico de אָדָם en un proverbio sapiencial
  english_pob_reading: people hide themselves
  chosen_spanish_reading: la gente se esconde
  alternative_spanish_readings:
  - una persona se esconde
  - el hombre se esconde
  - las personas se esconden
  rationale: El hebreo usa אָדָם de manera representativa y no como individuo concreto. Dado que la revisión inglesa optó por una lectura impersonal/generica, el español mantiene ese sentido con 'la gente', evitando tanto una singularización artificial como una abstracción demasiado pesada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Relación entre justicia humana y gloria pública
  english_pob_reading: there is great glory
  chosen_spanish_reading: hay gran gloria
  alternative_spanish_readings:
  - abunda la gloria
  - hay gran esplendor
  - hay gran honor
  rationale: El proverbio contrasta el bien social que acompaña a los justos con la inseguridad que trae el dominio de los malvados. 'Gloria' conserva la amplitud del término hebreo sin convertirlo en una virtud interior o en una gloria exclusivamente religiosa.
  doctrine_reference: Wisdom literature semantic range of תפארת / HALOT
translation_notes:
  revision_awareness: La versión inglesa fue revisada en el segundo hemistiquio desde una lectura singular ('a man is hidden') hacia una colectiva/impersonal ('people hide themselves'). El español sigue esa revisión y mantiene la temporalidad contrastiva del paralelismo hebreo, con 'cuando' en ambos hemistiquios y una clausula final activa-reflexiva que expresa la retirada de la gente ante el poder de los malvados.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando aparezca el Nombre divino; este versículo no lo contiene.
  - Se eligió 'justos' y 'malvados' para un español bíblico claro y contemporáneo, evitando calcos innecesarios.
  - La puntuación refleja el paralelismo antitético del hebreo con punto y coma antes de 'pero'.
