translation:
  language: es
  text: 'Los hijos de Eleazar resultaron ser más numerosos[a], como cabezas entre los hombres, que los hijos de Itamar; y los dividieron así: para los hijos de Eleazar, dieciséis cabezas de casas paternas, y para los hijos de Itamar, según sus casas paternas[b], ocho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como cabezas de los valientes». El hebreo גְּבָרִים puede designar hombres fuertes o valientes, no sólo varones adultos.
    reason: lexical_alternative
  - marker: b
    text: «Casas paternas» designa clanes o unidades familiares ancestrales, una unidad estándar de parentesco y administración en Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּמָּצְאוּ
  english_pob_choice: were found to be
  chosen_spanish: fueron hallados
  alternatives_spanish:
  - se encontró que eran
  - resultaron ser
  lexicon: HALOT
  rationale: El nifal expresa aquí un estado comprobado o constatado; en español, «fueron hallados» comunica bien ese resultado sin añadir una glosa excesiva.
- source_word: רַבִּים
  english_pob_choice: more numerous
  chosen_spanish: más numerosos
  alternatives_spanish:
  - muchos
  - de mayor número
  lexicon: HALOT
  rationale: El contexto es comparativo frente a los hijos de Itamar, así que «más numerosos» mantiene la comparación explícita y natural en español.
- source_word: לְרָאשֵׁי הַגְּבָרִים
  english_pob_choice: as heads of the men
  chosen_spanish: como cabezas de los hombres
  alternatives_spanish:
  - como jefes de los hombres
  - como cabezas de los varones
  - como jefes de los valientes
  lexicon: HALOT
  rationale: «Cabezas» conserva el valor estructural de רֹאשׁ en listas administrativas y genealógicas; «los hombres» sigue la revisión inglesa más reciente frente a una lectura más militarizada.
- source_word: וַיַּחְלְקוּם
  english_pob_choice: they divided them thus
  chosen_spanish: los dividieron así
  alternatives_spanish:
  - los repartieron así
  - los distribuyeron así
  lexicon: HALOT
  rationale: El verbo describe la asignación de grupos; «los dividieron así» introduce con claridad la distribución numérica que sigue.
- source_word: רָאשִׁים
  english_pob_choice: heads
  chosen_spanish: cabezas
  alternatives_spanish:
  - jefes
  - líderes
  lexicon: HALOT
  rationale: Se mantiene la terminología estructural de «cabezas» para ser coherente con רָאשֵׁי y con el lenguaje administrativo de Crónicas.
- source_word: לְבֵית אָבוֹת
  english_pob_choice: of fathers’ houses
  chosen_spanish: casas paternas
  alternatives_spanish:
  - casas de padres
  - casas ancestrales
  - clanes paternos
  lexicon: HALOT
  rationale: «Casas paternas» es una equivalencia transparente y reconocible para la unidad kinship-administrativa hebrea; conserva el giro sin volverlo técnico en exceso.
- source_word: שִׁשָּׁה עָשָׂר
  english_pob_choice: sixteen
  chosen_spanish: dieciséis
  alternatives_spanish:
  - dieciséis cabezas
  lexicon: HALOT
  rationale: Número cardinal directo; en español se integra de forma natural como conteo de las cabezas de casas paternas.
- source_word: לְבֵית אֲבוֹתָם
  english_pob_choice: according to their fathers’ houses
  chosen_spanish: según sus casas paternas
  alternatives_spanish:
  - de acuerdo con sus casas paternas
  - por sus casas paternas
  lexicon: HALOT
  rationale: La preposición y sufijo señalan distribución conforme a sus propias unidades familiares; «según» preserva el matiz distributivo sin sobretraducción.
- source_word: שְׁמוֹנָה
  english_pob_choice: eight
  chosen_spanish: ocho
  alternatives_spanish:
  - ocho cabezas
  lexicon: HALOT
  rationale: Cardinal directo para el número de divisiones asignadas a los hijos de Itamar.
theological_decisions:
- issue: Traducción de גְּבָרִים en contexto genealógico-administrativo
  english_pob_reading: The Hebrew can denote strong or valiant men, not merely adult males; the latest English revision preferred 'men' over 'mighty men' or 'warriors'.
  chosen_spanish_reading: «los hombres»
  alternative_spanish_readings:
  - «los valientes»
  - «los guerreros»
  - «los hombres fuertes»
  rationale: El contexto de 1 Crónicas 24 trata de la distribución de linajes sacerdotales, no de una escena militar; por eso se evita militarizar el término y se sigue la revisión inglesa más reciente, manteniendo la amplitud semántica básica de גְּבָרִים.
  doctrine_reference: Ninguna; decisión léxica-contextual.
translation_notes:
  revision_awareness: Seguí la revisión inglesa más reciente, que cambió 'mighty men' por 'men' por mayor precisión en el contexto de casas paternas. En español, conservé el paralelismo estructural del hebreo y el orden de la distribución numérica, evitando introducir una lectura militar donde el contexto es administrativo/genealógico.
  spanish_consistency_notes:
  - He mantenido «Yahvé» como norma del proyecto sólo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - He usado «cabezas» de manera consistente para רֹאשׁ/רָאשִׁים, en lugar de reemplazarlo por 'jefes', para conservar la terminología estructural de Crónicas.
  - «Casas paternas» se emplea de forma uniforme para בֵּית אָבוֹת / לְבֵית אָבוֹת / לְבֵית אֲבוֹתָם.
  - He preservado la ambigüedad controlada de גְּבָרִים con una nota, en vez de fijarla unilateralmente como 'guerreros'.
