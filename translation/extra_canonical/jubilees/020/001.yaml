  rationale: The text specifies 'two' sons for Isaac (Esau and Jacob). This is reflected in the Ge'ez by 'ክልኤሆሙ' (the two of them) and the somewhat garbled/displaced 'ወክልኤተ፡ ደቂቀ፡' (and two sons) earlier in the provided source text. Standard critical translations (Charles, VanderKam) render this as 'his two sons'.
- timestamp: '2026-04-28T07:47:59Z'
