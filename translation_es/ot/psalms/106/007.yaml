    rationale: El hebreo usa dos frases locativas en aposición, y la revisión inglesa prefirió una construcción tipo 'at the sea—the Red Sea'. En español, 'junto al mar, el Mar Rojo' suena más appositivo que 'junto al mar, en el Mar Rojo', aunque esta última no es inaceptable.
