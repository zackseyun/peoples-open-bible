    rationale: El borrador pone en texto principal «Fiesta de los Tabernáculos», pero el audit trail prioriza una traducción literal de סֻכּוֹת. En español, «Fiesta de las Cabañas» o similar comunica mejor la imagen hebrea, dejando la forma tradicional en nota.
