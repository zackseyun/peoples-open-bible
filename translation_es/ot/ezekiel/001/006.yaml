  text: Cada uno tenía cuatro rostros[a] y cuatro alas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «y cuatro rostros para una, y cuatro alas para una para ellos», una construcción distributiva hebrea que significa que cada ser viviente tenía cuatro rostros y cuatro alas.
