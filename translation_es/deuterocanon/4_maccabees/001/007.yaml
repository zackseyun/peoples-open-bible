translation:
  language: es
  text: Así pues, desde muchos ángulos y de muchas maneras[a] podría mostrarles que la razón piadosa[b] es dueña de las pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde muchos lados y de distintos lugares»; los dos adverbios griegos subrayan múltiples líneas de argumentación.
    reason: lexical_alternative
  - marker: b
    text: O «razón devota». La expresión griega es un tema clave en 4 Macabeos y designa una razón guiada por la reverencia a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολλαχόθεν
  english_pob_choice: from many angles
  chosen_spanish: desde muchos ángulos
  alternatives_spanish:
  - desde muchos lados
  - desde muchos puntos de vista
  - desde varias perspectivas
  lexicon: LSJ
  rationale: El adverbio señala multiplicidad de vías de argumentación o enfoques; «desde muchos ángulos» reproduce bien ese valor retórico en español sin sonar rígido.
- source_word: ἀλλαχόθεν
  english_pob_choice: in many ways
  chosen_spanish: de muchas maneras
  alternatives_spanish:
  - de distintos lugares
  - de diferentes partes
  - de otras maneras
  lexicon: LSJ
  rationale: Unido a Πολλαχόθεν, intensifica la variedad de maneras o fuentes del razonamiento. «De muchas maneras» conserva esa ampliación acumulativa con naturalidad en español.
- source_word: ἔχοιμʼ ἂν
  english_pob_choice: I could
  chosen_spanish: podría
  alternatives_spanish:
  - sería capaz de
  - podría llegar a
  - tendría la posibilidad de
  lexicon: BDAG
  rationale: El optativo con ἄν expresa posibilidad; «podría» es la forma española más natural y precisa para esa fuerza modal.
- source_word: ἐπιδεῖξαι
  english_pob_choice: show
  chosen_spanish: mostrar
  alternatives_spanish:
  - demostrar
  - probar
  - exponer
  lexicon: BDAG
  rationale: El verbo significa mostrar o hacer ver. «Mostrar» mantiene el tono argumentativo sin sobrecargar con una noción más fuerte como «probar».
- source_word: αὐτοκράτωρ
  english_pob_choice: master
  chosen_spanish: dueña
  alternatives_spanish:
  - señora
  - soberana
  - la que domina
  lexicon: LSJ
  rationale: Aquí el predicado describe el poder rector de la razón sobre las pasiones. «Dueña» preserva la metáfora de dominio de forma idiomática en español y evita introducir una abstracción menos concreta que el griego.
- source_word: παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos
  - las emociones
  - los afectos
  lexicon: BDAG
  rationale: En 4 Macabeos el término se refiere a las fuerzas afectivas o pasionales que la razón gobierna. «Las pasiones» es la equivalencia estable y más precisa en este contexto.
- source_word: ὁ εὐσεβὴς λογισμός
  english_pob_choice: devout reason
  chosen_spanish: la razón piadosa
  alternatives_spanish:
  - la razón devota
  - la razón reverente
  - el razonamiento piadoso
  lexicon: BDAG
  rationale: «Razón» es el núcleo semántico de λογισμός en este contexto moral-filosófico. «Piadosa» comunica εὐσεβής sin convertir la frase en un tecnicismo eclesiástico; además conserva la tensión entre racionalidad y reverencia hacia Dios.
theological_decisions:
- issue: Cómo rendir la frase programática ὁ εὐσεβὴς λογισμός
  english_pob_reading: devout reason; pious reason as alternative note
  chosen_spanish_reading: la razón piadosa
  alternative_spanish_readings:
  - la razón devota
  - la razón reverente
  - el razonamiento piadoso
  rationale: 'La obra presenta esta expresión como eje temático: una razón orientada por la reverencia a Dios que gobierna las pasiones. «Razón piadosa» mantiene juntos el elemento racional y el religioso sin resolver la tensión con un término doctrinal posterior.'
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y moral, con español claro y contemporáneo; no sustituir el marco conceptual del texto por terminología eclesiástica tradicional sin necesidad textual.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego de Swete y concuerda con el audit trail inglés: conserva el paralelismo de los dos adverbios, la modalidad potencial de ἔχοιμʼ ἂν, el verbo demostrativo ἐπιδεῖξαι y la fórmula programática εὐσεβὴς λογισμός. No se detectan revisiones textuales adicionales en el paquete auditado.'
  spanish_consistency_notes:
  - Se mantiene «pasiones» para παθῶν, conforme al uso técnico de 4 Macabeos.
  - Se evita «Cristo» u otra terminología ajena al pasaje, ya que el texto no la contiene.
  - «Yahvé» no aplica aquí; el pasaje habla de reverencia a Dios de forma conceptual, no mediante un nombre divino explícito.
