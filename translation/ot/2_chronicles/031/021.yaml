theological_decisions:
- issue: Sense of תּוֹרָה in a reform context
  chosen_reading: Rendered as 'the law' in the main text
  alternative_readings:
  - the instruction
  rationale: In Chronicles, Hezekiah's reforms are tied to covenantal obedience and temple order rooted in the Mosaic law. 'The law' best reflects that setting, while 'instruction' remains a legitimate lexical nuance and is preserved in a footnote rather than elevated to the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
- issue: Meaning of לִדְרֹשׁ אֱלֹהִים
  chosen_reading: Rendered as 'to seek his God'
  alternative_readings:
  - to inquire of his God
  rationale: Chronicles regularly uses this expression for covenantal seeking of God, not merely asking for information. The chosen rendering preserves the theological motif of wholehearted devotion without importing later doctrinal language.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern English.'
