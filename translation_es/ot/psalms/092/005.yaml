revisions:
- from: Porque tú me has alegrado, Yahvé, con tu obra[a]; en las obras de tus manos cantaré de gozo.
  to: Porque tú me has alegrado, oh, Yahvé[a], por tu obra; ante las obras de tus manos canto de gozo[b].
  rationale: La revisión corrige el anclaje de la nota sobre «Yahvé», ajusta «por tu obra» para reflejar mejor el valor causal/instrumental del hebreo, añade una nota léxica para la alternativa de אֲרַנֵּן preservada en el audit trail, y reemplaza el futuro «cantaré» por el presente poético «canto» para una representación más natural y fiel del imperfecto en contexto. «Ante las obras de tus manos» expresa mejor la ocasión del gozo que «en las obras».
