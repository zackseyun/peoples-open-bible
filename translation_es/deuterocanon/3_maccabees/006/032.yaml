base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/006/032.yaml
  text: And when they had ended their utterly mournful song of lamentation[a], they took up the song of their fathers, praising God, the savior of Israel and worker of wonders; and having cast off every cry of grief and wailing[b], they formed dances as a sign of peaceful rejoicing.
  footnotes:
  - marker: a
    text: Or 'their ancestral song.' The adjective πάτριον denotes what belongs to the fathers or ancestral tradition.
    reason: lexical_alternative
  - marker: b
    text: Or 'they organized choruses.' The Greek χοροὺς can refer to dancing groups or choruses; the context favors festive dancing.
    reason: lexical_alternative
