translation:
  language: es
  text: Con ello hizo las bases para la entrada de la tienda de reunión[a], el altar de bronce, la rejilla de bronce para el altar[b], y todos los utensilios del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “zócalos” para la entrada de la tienda de reunión.
    reason: lexical_alternative
  - marker: b
    text: O “la rejilla de bronce” o “el enrejado de bronce” para el altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - construyó
  lexicon: HALOT
  rationale: En contexto narrativo, עשה expresa la acción general de producir o realizar los elementos del tabernáculo; 'hizo' es natural en español y conserva la sobriedad del hebreo sin cargar una especificación técnica no exigida por el texto.
- source_word: בָּהּ
  english_pob_choice: With it
  chosen_spanish: Con ello
  alternatives_spanish:
  - Con eso
  - Por medio de ello
  lexicon: HALOT
  rationale: El pronombre retoma el bronce mencionado en el versículo anterior. 'Con ello' preserva el sentido instrumental y evita una traducción demasiado literal que sonaría forzada en español.
- source_word: אַדְנֵי
  english_pob_choice: bases
  chosen_spanish: las bases
  alternatives_spanish:
  - los zócalos
  - los encajes
  lexicon: HALOT
  rationale: En el vocabulario del tabernáculo, אַדְנֵי se refiere a apoyos metálicos o bases estructurales. 'Bases' comunica bien la función en español moderno y mantiene la amplitud semántica del término.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: the entrance of the tent of meeting
  chosen_spanish: la entrada de la tienda de reunión
  alternatives_spanish:
  - la entrada del tabernáculo de reunión
  - la entrada de la tienda del encuentro
  lexicon: HALOT
  rationale: פֶּתַח es 'entrada'. Para אֹהֶל מוֹעֵד, 'tienda de reunión' sigue el sentido literal y evita sustituirlo por una fórmula eclesiástica tradicional no requerida por el hebreo.
- source_word: מִזְבַּח הַנְּחֹשֶׁת
  english_pob_choice: the bronze altar
  chosen_spanish: el altar de bronce
  alternatives_spanish:
  - el altar broncíneo
  - el altar de cobre
  lexicon: HALOT
  rationale: La construcción hebrea es posesiva/material. 'Altar de bronce' es la forma española más natural y fiel al uso del material, sin perder el valor descriptivo.
- source_word: מִכְבַּר
  english_pob_choice: grating
  chosen_spanish: la rejilla
  alternatives_spanish:
  - la parrilla
  - el enrejado
  lexicon: HALOT
  rationale: El término designa una pieza calada o enrejada asociada al altar. 'Rejilla' comunica con claridad una pieza física y conserva la imagen de una estructura abierta.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: for it
  chosen_spanish: para él
  alternatives_spanish:
  - que era para él
  - que pertenecía a él
  lexicon: HALOT
  rationale: La relación del hebreo es de pertenencia o destino funcional respecto del altar. 'Para él' refleja la concisión del original y mantiene la referencia directa al altar sin sobreexplicar.
- source_word: כָּל כְּלֵי הַמִּזְבֵּחַ
  english_pob_choice: all the utensils of the altar
  chosen_spanish: todos los utensilios del altar
  alternatives_spanish:
  - todos los instrumentos del altar
  - todos los objetos del altar
  lexicon: HALOT
  rationale: כְּלִים es un término amplio para objetos/implementos del culto. 'Utensilios' es suficientemente amplio y legítimo en español para el conjunto de piezas del altar.
theological_decisions:
- issue: Terminología para אֹהֶל מוֹעֵד
  english_pob_reading: tent of meeting
  chosen_spanish_reading: tienda de reunión
  alternative_spanish_readings:
  - tienda del encuentro
  - tabernáculo de reunión
  rationale: Se conserva la referencia literal al espacio de encuentro sin sustituirla por un rótulo eclesial posterior. 'Tienda de reunión' sigue de cerca el hebreo y es transparente para el lector español.
  doctrine_reference: Éxodo 25–40; uso cultual del santuario
- issue: Tratamiento de la pieza מִכְבַּר הַנְּחֹשֶׁת
  english_pob_reading: the bronze grating for it
  chosen_spanish_reading: la rejilla de bronce para él
  alternative_spanish_readings:
  - la rejilla de bronce para eso
  - el enrejado de bronce para él
  rationale: El hebreo vincula la rejilla al altar con una relación funcional; la traducción mantiene esa conexión sin introducir una localización más precisa de la que el versículo da. 'Para él' conserva la referencia al altar.
  doctrine_reference: Éxodo 27:4; 38:4, 30
translation_notes:
  revision_awareness: La redacción sigue la versión inglesa auditada en su lectura final, que simplificó la relación de la rejilla con el altar a “for it” para reflejar de modo más directo el hebreo. En español se conserva esa misma concisión con “para él”.
  spanish_consistency_notes:
  - Se mantiene 'bronce' de forma consistente para נְחֹשֶׁת, en línea con el criterio inglés auditado.
  - '''Tienda de reunión'' conserva el nombre cultual literal y no lo sustituye por una fórmula interpretativa.'
  - '''Utensilios'' traduce כְּלִים con amplitud suficiente para los implementos del altar sin restringir indebidamente el sentido.'
