review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del rastro POB en casi todos los elementos: derrota ante enemigo, causa por pecado contra Dios, retorno, confesión del nombre, oración y súplica en esta casa. Sin embargo, hay dos desajustes de fidelidad/claridad: (1) ''es derrotado'' con sujeto singular ''tu pueblo Israel'' suena gramaticalmente forzado en español; conviene pluralizar con ''son derrotados'' o reformular con ''tu pueblo de Israel es derrotado''. (2) ''te suplican delante de ti'' duplica innecesariamente la orientación a Dios y no preserva bien el matiz de חנן como súplica por favor/gracia; la POB inglesa documenta ''plead for favor''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'tu pueblo Israel' pide un ajuste natural a 'tu pueblo de Israel' o una concordancia plural. Además, 'te suplican delante de ti' suena redundante y algo áspero; 'imploran tu favor delante de ti' o 'te imploran delante de ti' mejora la fluidez, y la primera opción conserva mejor el matiz léxico de favor/gracia.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. No aparecen Yahvé/Mesías/etc. La decisión 'confiesan tu nombre' está bien alineada con la revisión inglesa. La nota sobre שׁוב también está bien orientada. El principal ajuste léxico necesario es reflejar mejor חנן con 'favor' o 'gracia' en el texto principal.
  issues:
  - severity: medium
    issue: Concordancia y naturalidad en 'Si tu pueblo Israel es derrotado'
    rationale: Aunque el hebreo tiene sujeto colectivo singular, en español 'tu pueblo Israel' suena poco natural. 'Tu pueblo de Israel es derrotado' o 'tu pueblo Israel son derrotados' evita aspereza. La opción más natural aquí es 'tu pueblo de Israel es derrotado'.
  - severity: medium
    issue: '''Te suplican'' no conserva plenamente el matiz de חנן'
    rationale: El verbo הִתְחַנְּנוּ expresa súplica por favor/gracia. 'Te suplican' comunica súplica, pero pierde el componente de favor documentado por la POB inglesa. 'Imploran tu favor' preserva mejor el sentido léxico.
  - severity: low
    issue: Redundancia en 'te suplican delante de ti'
    rationale: La combinación resulta pesada en español porque el pronombre 'te' y 'delante de ti' repiten la orientación al destinatario. 'Imploran tu favor delante de ti' mantiene el hebreo y suena más natural.
  revised_spanish_text: Si tu pueblo de Israel es derrotado[a] delante de un enemigo, porque ha pecado contra ti, y se vuelve[b] y confiesa tu nombre, y ora e implora tu favor[c] delante de ti en esta casa.
  revised_footnotes:
