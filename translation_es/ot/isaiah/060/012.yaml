translation:
  language: es
  text: Porque la nación y el reino que no te servirán perecerán[a], y esas naciones[b] serán asoladas por completo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘la nación y el reino...’; el versículo pasa del singular al plural por efecto retórico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘serán destruidas por completo’. El hebreo usa un infinitivo absoluto con un verbo finito de la misma raíz para intensificar la expresión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque entonces
  lexicon: HALOT
  rationale: Introduce la base explicativa del anuncio profético en español natural, conservando la fuerza causal/explanatoria del hebreo.
- source_word: הַגּוֹי
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la nación extranjera
  lexicon: HALOT
  rationale: גּוֹי se rinde bien como ‘nación’ en este contexto de juicio; mantiene el singular representativo del hebreo.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el dominio real
  - la monarquía
  lexicon: HALOT
  rationale: ‘Reino’ es la equivalencia idiomática y precisa de מַמְלָכָה en lenguaje profético.
- source_word: יַעַבְדוּךְ
  english_pob_choice: that will not serve you
  chosen_spanish: que no te servirán
  alternatives_spanish:
  - que no te obedecerán
  - que no te rendirán servicio
  lexicon: HALOT
  rationale: עבד en qal expresa servir/prestar servicio; en español ‘servir’ preserva la relación de sujeción y el valor verbal directo. Se mantiene el futuro profético de la forma yiqtol.
- source_word: יֹאבֵדוּ
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - se perderán
  - serán destruidas
  lexicon: HALOT
  rationale: אבד denota perecer/venir a ruina. ‘Perecerán’ conserva amplitud semántica sin especificar el mecanismo.
- source_word: וְהַגּוֹיִם
  english_pob_choice: those nations
  chosen_spanish: esas naciones
  alternatives_spanish:
  - y las naciones
  - y aquellas naciones
  lexicon: HALOT
  rationale: El plural retoma y amplía el singular anterior; ‘esas’ refleja el matiz demostrativo y evita una repetición plana.
- source_word: חָרֹב יֶחֱרָבוּ
  english_pob_choice: will be utterly laid waste
  chosen_spanish: serán asoladas por completo
  alternatives_spanish:
  - serán totalmente devastadas
  - serán arrasadas por completo
  - serán desoladas con desolación
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo del mismo lexema intensifica la idea de destrucción total. ‘Asoladas por completo’ comunica la intensificación de forma clara y natural en español.
theological_decisions:
- issue: Referente del pronombre/sufijo de segunda persona singular en ‘te servirán’
  english_pob_reading: Retained as ‘you’ without interpretive expansion
  chosen_spanish_reading: Se conserva ‘te’ sin explicitar Jerusalén o Sion en el texto principal
  alternative_spanish_readings:
  - servirán a Sion
  - servirán a Jerusalén
  - servirán al pueblo restaurado de Dios
  rationale: El hebreo mantiene la dirección directa a la figura femenina singular del contexto inmediato; el español preserva esa tensión sin resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica y literaria del texto profético.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: el segundo plural se expresó como demonstrativo (‘those nations’), y se mantuvo la intensificación de ‘utterly laid waste’. La versión española refleja ese matiz con ‘esas naciones’ y ‘asoladas por completo’.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - Se mantiene el futuro profético en español para ambas cláusulas.
  - Se conserva el contraste singular/plural del hebreo mediante ‘la nación y el reino’ / ‘esas naciones’.
  - Se evita ‘destruidas’ como traducción principal para no estrechar más de la cuenta el campo semántico de אבד y חרב.
