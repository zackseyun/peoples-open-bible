  - severity: low
    issue: '''Estaban guardando'' es menos idiomático que ''custodiaban'''
    rationale: Aunque fiel, la perífrasis es algo pesada. 'Custodiaban' conserva la idea de vigilancia activa de forma más natural en español bíblico moderno.
  - severity: low
