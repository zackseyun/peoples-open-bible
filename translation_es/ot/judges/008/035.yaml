review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: continuidad narrativa, el modismo עשה חסד, la expresión «casa de», la doble mención Jerubaal/Gedeón, y la correspondencia de כְּכָל con «conforme a». Sin embargo, dos elecciones no preservan fielmente el sentido más probable del original ni el audit trail inglés: «lealtad» desplaza חֶסֶד desde bondad/kindness hacia fidelidad/loyalty de forma demasiado estrecha, y «Jerubaal, de Gedeón» no refleja correctamente la aposición de dos nombres para la misma persona.'
  spanish_quality_summary: El español es generalmente claro, pero «mostraron lealtad» suena menos natural que «mostraron bondad» o «mostraron misericordia» en este contexto narrativo, y «Jerubaal, de Gedeón» resulta gramaticalmente extraño e incluso puede sugerir relación posesiva o genealógica en vez de identificación. Una reparación pequeña mejora fidelidad y legibilidad.
  glossary_alignment: 'No hay conflicto con términos teológicos de proyecto. La principal cuestión léxica es חֶסֶד: aquí conviene una opción española de benevolencia concreta hacia una casa/familia, mejor «bondad» que «lealtad». La nota sobre el doble nombre debe mantenerse, anclada en el nombre.'
  issues:
  - severity: medium
    issue: «lealtad» para חֶסֶד estrecha demasiado el sentido.
    rationale: Aunque חֶסֶד puede incluir fidelidad relacional, en este contexto humano de reciprocidad por beneficios recibidos el audit trail inglés justificó «kindness». En español, «bondad» o «misericordia» reflejan mejor la benevolencia concreta sin reducir el término a fidelidad abstracta.
  - severity: high
    issue: «Jerubaal, de Gedeón» no representa correctamente la aposición hebrea יְרֻבַּעַל גִּדְעוֹן.
    rationale: El hebreo da ambos nombres para la misma persona. «de Gedeón» introduce una relación posesiva/explicativa ausente y suena antinatural. Debe conservarse algo como «Jerubaal[a], Gedeón» o «Jerubaal, Gedeón» con nota que explique que ambos nombres se refieren al mismo personaje.
  revised_spanish_text: Y no mostraron bondad a la casa de Jerubaal[a], Gedeón, conforme a todo el bien que él había hecho por Israel.
  revised_footnotes:
  - marker: a
    text: 'El hebreo usa aquí ambos nombres para la misma persona: Jerubaal y Gedeón.'
    reason: lexical_alternative
  revision_rationale: Se cambió «lealtad» por «bondad» para reflejar mejor el valor contextual de חֶסֶד según la evidencia fuente y el audit trail inglés. Se corrigió «Jerubaal, de Gedeón» a «Jerubaal[a], Gedeón» para representar la doble denominación en aposición sin añadir una relación posesiva no presente en el hebreo. Se conservó «conforme a todo el bien» como una solución española natural y fiel.
