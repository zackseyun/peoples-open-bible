  to: Entonces se levantaron Zorobabel hijo de Salatiel y Jesúa[b] hijo de Josadac, y comenzaron a edificar la casa de Dios que está en Jerusalén[a], y con ellos estaban los profetas de Dios, ayudándolos[c].
  rationale: La revisión conserva el sentido del original y la decisión principal de mantener «la casa de Dios», pero restaura una nota léxica importante presente en la auditoría inglesa sobre la forma del nombre Jeshua/Josué. Además, ajusta algunos nombres a formas españolas más reconocibles («Salatiel», «Josadac») para mejorar la legibilidad eclesial sin cambiar el referente del texto.
