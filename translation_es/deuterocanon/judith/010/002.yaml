translation:
  language: es
  text: Y se levantó de su postración[a] y llamó a su criada Abra, y bajó a la casa donde se alojaba durante los días de sus sábados y durante sus fiestas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su caída». El griego puede significar una caída, pero aquí probablemente alude a la postura postrada de Judith en oración o duelo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «durante los días de sus sábados». El plural puede reflejar una observancia repetida, no solo un sábado singular.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνέστη
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El aoristo de ἀνίστημι señala que Judith se incorpora después de haber estado postrada. En español, «se levantó» es natural y mantiene el movimiento narrativo sin forzar un tono más solemne de lo que exige el griego.
- source_word: ἀπὸ τῆς πτώσεως
  english_pob_choice: from her prostration
  chosen_spanish: de su postración
  alternatives_spanish:
  - de su caída
  - de donde había caído
  lexicon: LSJ
  rationale: El sustantivo πτῶσις puede significar «caída», pero el contexto inmediato es de oración o duelo con el cuerpo echado al suelo. «Postración» conserva mejor la postura devocional que la simple caída accidental.
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - hizo llamar
  - convocó
  lexicon: BDAG
  rationale: El verbo expresa simplemente que la llamó. «Llamó» es la opción más directa y no añade fuerza de mando que el griego no exige.
- source_word: τὴν Ἄβραν αὐτῆς
  english_pob_choice: her maid Abra
  chosen_spanish: a su criada Abra
  alternatives_spanish:
  - a su sirvienta Abra
  - a Abra, su criada
  lexicon: BDAG
  rationale: Se conserva el nombre propio Abra y se explicita la relación de servicio con «criada», que es un equivalente natural y claro en español. «Criada» comunica función doméstica sin exagerar el matiz.
- source_word: κατέβη
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: BDAG
  rationale: El verbo es literalmente de movimiento hacia abajo. «Descendió» mantiene ese valor espacial en un español digno y legible.
- source_word: εἰς τὸν οἶκον
  english_pob_choice: into the house
  chosen_spanish: a la casa
  alternatives_spanish:
  - dentro de la casa
  - hacia la casa
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir entrada, en español «descendió a la casa» reproduce bien el movimiento sin sonar rígido. «A la casa» es más fluido que «en la casa» para un verbo de desplazamiento.
- source_word: ἐν ᾧ διέτριβεν
  english_pob_choice: in which she stayed
  chosen_spanish: en la cual se alojaba
  alternatives_spanish:
  - en la cual permanecía
  - en la cual pasaba el tiempo
  lexicon: BDAG
  rationale: διατρίβω aquí indica permanecer o residir temporalmente. «Se alojaba» capta el carácter de estancia, más que una residencia permanente, y encaja con el contexto narrativo.
- source_word: ἐν ταῖς ἡμέραις τῶν σαββάτων
  english_pob_choice: during the days of her Sabbaths
  chosen_spanish: durante los días de sus sábados
  alternatives_spanish:
  - durante los días de los sábados
  - en los días de sus sábados
  lexicon: BDAG
  rationale: Se preserva el plural del griego y la referencia a la observancia repetida, no simplemente a un sábado singular. «Sábados» conserva el eco semítico del texto mejor que normalizarlo a «sábado».
- source_word: ἐν ταῖς ἑορταῖς αὐτῆς
  english_pob_choice: during her festivals
  chosen_spanish: durante sus fiestas
  alternatives_spanish:
  - durante sus festividades
  - en sus fiestas
  lexicon: BDAG
  rationale: ἑορταί son celebraciones del calendario religioso. «Fiestas» es claro, idiomático y suficientemente amplio para abarcar el sentido festivo sin introducir una equivalencia litúrgica más técnica de la necesaria.
theological_decisions:
- issue: Sentido de πτῶσις en un contexto de oración o duelo
  english_pob_reading: from her prostration
  chosen_spanish_reading: de su postración
  alternative_spanish_readings:
  - de su caída
  rationale: La escena apunta a una postura corporal devocional, no a un tropiezo o accidente. «Postración» preserva la tensión lexical entre caída y gesto de humillación sin resolverla de modo indebido.
  doctrine_reference: Mantener la ambigüedad contextual del relato; no suavizar ni moralizar la imagen corporal del texto.
translation_notes:
  revision_awareness: Se ha seguido de cerca el texto griego de Swete y el auditable inglés POB, manteniendo la tensión lexical de πτῶσις y el plural de σαββάτων. No se introdujeron ampliaciones interpretativas ajenas al contexto ni se aplanó el lenguaje festivo del original.
  spanish_consistency_notes:
  - Se emplea «Yahvé» en este proyecto solo cuando aparezca el Nombre divino; aquí no aplica.
  - «Mesías/Cristo» no aparece en este versículo.
  - Se usó «criada» para el rol de Abra por ser una relación doméstica clara en español y coherente con el contexto narrativo.
  - Se preservó el plural «sábados» para reflejar el griego σαββάτων y evitar normalizarlo prematuramente a un solo sábado.
