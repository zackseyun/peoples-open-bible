    issue: «no nos hará mal» es demasiado amplio para οὐκ ἀδικήσει ἡμᾶς
    rationale: ἀδικέω no significa solo causar daño, sino obrar injustamente contra alguien, agraviarlo o tratarlo mal de manera injusta. «No nos hará mal» pierde parte de esa fuerza ética y legal presente en el griego y preservada en el audit trail inglés con «wrong us».
  - severity: low
    issue: La nota [a] sobre «Porque decían» es poco necesaria
    rationale: El inglés auditado no conserva esa alternativa en nota, y el aoristo narrativo se representa bien con «dijeron». No es incorrecta, pero añade complejidad sin necesidad textual fuerte.
