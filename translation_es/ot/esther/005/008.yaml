  language: en
  yaml_path: translation/ot/esther/005/008.yaml
  text: If I have found favor in the eyes of the king[a], and if it pleases the king to grant my petition and fulfill my request, let the king and Haman come to the banquet that I will prepare for them[b], and tomorrow I will do according to the king’s word.
  footnotes:
