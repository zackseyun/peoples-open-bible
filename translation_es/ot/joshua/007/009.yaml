- from: Porque los cananeos[a] y todos los habitantes de la tierra[o] oirán[b], y nos rodearán y borrarán nuestro nombre de la tierra[c]. ¿Y qué harás por tu gran nombre?
  to: Porque los cananeos[a] y todos los habitantes de la tierra oirán[b], y nos rodearán y eliminarán nuestro nombre de la tierra[c]. ¿Y qué harás por tu gran nombre?
  rationale: Se corrige un error editorial grave de marcador de nota, y se ajusta la traducción de הכרית para conservar mejor la fuerza de erradicación del hebreo y de la auditoría inglesa, sin perder naturalidad en español. Se mantienen 'tierra' y 'por tu gran nombre' porque son fieles y legibles en este contexto.
