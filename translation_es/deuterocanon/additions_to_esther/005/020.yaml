translation:
  language: es
  text: y de fortalecerlos[a], para que, en el tiempo de angustia[b], pudieran defenderse de quienes los atacaran, el decimotercer día del duodécimo mes, Adar, ese mismo día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apoyarlos» o «reforzarlos».
    reason: lexical_alternative
  - marker: b
    text: La expresión «en el tiempo de angustia» también puede entenderse de manera más general como «en un tiempo de dificultad» o «en un tiempo de aflicción».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεπισχύειν
  english_pob_choice: to strengthen
  chosen_spanish: fortalecerlos
  alternatives_spanish:
  - apoyarlos
  - reforzarlos
  lexicon: LSJ
  rationale: El infinitivo expresa dar fuerza o apoyo adicional. «Fortalecer» conserva bien el valor causativo y resulta natural en español; «apoyarlos» y «reforzarlos» son alternativas posibles, pero la primera puede sonar más general y la segunda más técnica o material.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es la forma más clara y corriente en español moderno, sin perder el sentido purposivo.
- source_word: θλίψεως
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - apuro
  lexicon: LSJ
  rationale: La expresión «en tiempo de θλίψεως» apunta a presión, calamidad o aflicción. «Angustia» comunica con peso y naturalidad esa situación de opresión; «aflicción» y «tribulación» son posibles, pero la primera puede sonar más abstracta y la segunda más marcada litúrgicamente.
- source_word: ἐπιθεμένους
  english_pob_choice: attacked
  chosen_spanish: los atacaban
  alternatives_spanish:
  - los asaltaban
  - se lanzaban contra ellos
  lexicon: BDAG
  rationale: El participio hostil de ἐπιτίθημι pide un verbo de agresión. «Atacaban» es claro y contemporáneo; «asaltaban» intensifica el matiz militar, pero puede sonar más específico de lo que exige el griego.
- source_word: ἀμύνωνται
  english_pob_choice: might defend themselves
  chosen_spanish: pudieran defenderse
  alternatives_spanish:
  - pudieran repelerlos
  - pudieran protegerse
  lexicon: LSJ
  rationale: El medio expresa acción en favor de sí mismos. «Defenderse» conserva el valor reflexivo y la idea de defensa autorizada; «repelerlos» sería más interpretativo y «protegerse» desplaza el foco hacia resguardo pasivo.
- source_word: τῇ τρισκαιδεκάτῃ τοῦ δωδεκάτου μηνὸς Ἀδὰρ
  english_pob_choice: on the thirteenth day of the twelfth month, Adar
  chosen_spanish: el día trece del duodécimo mes, Adar
  alternatives_spanish:
  - a trece del duodécimo mes, Adar
  - el trece del mes duodécimo, Adar
  lexicon: LSJ
  rationale: La fórmula de fecha se expresa con naturalidad en español y mantiene el nombre del mes transliterado. «Duodécimo mes» conserva el orden y el valor del original sin forzar un calendario explicativo que el texto no desarrolla.
- source_word: τῇ αὐτῇ ἡμέρᾳ
  english_pob_choice: on that same day
  chosen_spanish: ese mismo día
  alternatives_spanish:
  - ese mismo día exacto
  - en ese mismo día
  lexicon: BDAG
  rationale: La expresión subraya identidad con la fecha ya mencionada. «Ese mismo día» preserva el énfasis de forma natural en español.
theological_decisions:
- issue: Alcance de θλίψις / tiempo de angustia
  english_pob_reading: The phrase 'in the time of distress' may also be understood more generally as 'in a time of trouble' or 'in a time of affliction.'
  chosen_spanish_reading: «en el tiempo de angustia» mantiene el sentido principal y admite, por contexto, la idea general de prueba o aflicción.
  alternative_spanish_readings:
  - en un tiempo de trouble
  - en un tiempo de aflicción
  - en tiempo de tribulación
  rationale: No se debe aplanar la carga de presión y calamidad del término griego. «Angustia» preserva la seriedad del momento y deja abierta la gama semántica indicada por el auditorio inglés.
  doctrine_reference: Lexical ambiguity retained; no doctrinal issue, but semantic range preserved.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó confirmado como estable. La cross-check review indicó acuerdo alto con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «Adar» como transliteración del nombre del mes, conforme al original y al patrón del proyecto.
  - Se traduce el infinitivo final con una construcción natural de finalidad en español («para que»), sin perder el valor de propósito.
  - Se conserva el matiz reflexivo de ἀμύνωνται con «defenderse», evitando un giro más fuerte o más pasivo que el griego no exige.
  - Se evita el masking por «SEÑOR» o equivalentes, porque este verso no contiene el tetragrámaton ni una cita directa de κύριος.
