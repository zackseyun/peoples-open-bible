translation:
  language: es
  text: Entonces los jefes de Edom quedaron aterrados; el temblor se apoderó de los líderes[a] de Moab; todos los habitantes de Canaán se derritieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los poderosos de Moab». La expresión hebrea es literalmente «los fuertes / carneros de Moab», usada aquí para hombres prominentes o líderes.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  lexicon: HALOT
  rationale: El adverbio temporal introduce la consecuencia del acto salvador previo; «Entonces» conserva esa relación y suena natural en español bíblico contemporáneo.
- source_word: נִבְהֲלוּ
  english_pob_choice: were terrified
  chosen_spanish: fueron aterrados
  alternatives_spanish:
  - quedaron aterrados
  - fueron aterrorizados
  lexicon: HALOT
  rationale: El nifal de בהל expresa quedar sobrecogido o aterrarse. «Fueron aterrados» conserva la fuerza pasiva/intensiva de la reacción de miedo sin suavizarla.
- source_word: אַלּוּפֵי אֱד֔וֹם
  english_pob_choice: the chiefs of Edom
  chosen_spanish: los jefes de Edom
  alternatives_spanish:
  - los jefes tribales de Edom
  - los caudillos de Edom
  lexicon: HALOT
  rationale: אַלּוּף designa un jefe o caudillo. «Jefes» comunica bien la función de liderazgo sin imponer una categoría política más específica de la que permite el hebreo.
- source_word: אֵילֵ֣י מוֹאָ֔ב
  english_pob_choice: the leaders of Moab
  chosen_spanish: los líderes de Moab
  alternatives_spanish:
  - los poderosos de Moab
  - los fuertes de Moab
  lexicon: HALOT
  rationale: El hebreo literalmente alude a «los fuertes / carneros» de Moab, pero en paralelo poético se refiere a hombres prominentes. «Líderes» preserva el sentido social-político que la POB inglesa ya documenta.
- source_word: יֹאחֲזֵמוֹ רָעַד
  english_pob_choice: trembling seized
  chosen_spanish: el temblor se apoderó de
  alternatives_spanish:
  - el temblor los agarró
  - el temblor los tomó
  lexicon: HALOT
  rationale: La construcción verbal con אחז y רָעַד presenta el temblor como agente que los domina. «Se apoderó de» reproduce esa personificación y mantiene el tono vívido.
- source_word: נָמֹגוּ
  english_pob_choice: melted away
  chosen_spanish: se derritieron
  alternatives_spanish:
  - se deshicieron
  - se desmayaron
  lexicon: HALOT
  rationale: מוג describe el deshacerse o derretirse de manera figurada por miedo. «Se derritieron» preserva la metáfora física; «se deshicieron» es posible, pero menos imagético.
- source_word: כֹּל יֹשְׁבֵי כְנָעַן
  english_pob_choice: all the inhabitants of Canaan
  chosen_spanish: todos los habitantes de Canaán
  alternatives_spanish:
  - todos los que habitaban Canaán
  - todos los moradores de Canaán
  lexicon: HALOT
  rationale: La construcción participial se vierte de forma directa y natural. «Habitantes» mantiene el alcance colectivo y evita un arcaísmo innecesario.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fuente y la pauta inglesa quedaron en acuerdo alto y sin observaciones. Esta versión española sigue esa lectura estable, conservando el paralelismo poético y la metáfora de פחד/מוג sin atenuarla.'
  spanish_consistency_notes:
  - Se mantiene «Edom», «Moab» y «Canaán» como nombres propios transliterados de uso común.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - La metáfora de «derretirse» se conserva con un verbo español equivalente y no se sustituye por una paráfrasis psicológica.
  - «Jefes» y «líderes» distinguen los dos términos hebreos paralelos sin forzar una precisión política ajena al contexto.
