translation:
  language: es
  text: Por eso oré[a], y me fue dado el entendimiento; invoqué a Dios, y vino a mí un espíritu de sabiduría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «invoqué [a Dios]» o «imploré». El griego no expresa explícitamente el objeto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el espíritu de sabiduría». El griego puede entenderse de manera más general o más específica; el texto principal conserva esa ambigüedad sin convertir la expresión en un título formal.'
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: Expresa con naturalidad la relación inferencial/causal del contexto sin volver la frase rígida o arcaica.
- source_word: ηὐξάμην
  english_pob_choice: I prayed
  chosen_spanish: oré
  alternatives_spanish:
  - recé
  - hice oración
  lexicon: BDAG/LSJ
  rationale: El aoristo medio de εὔχομαι aquí indica acción de oración; 'oré' es la forma española más directa y digna.
- source_word: φρόνησις
  english_pob_choice: understanding
  chosen_spanish: la prudencia
  alternatives_spanish:
  - el entendimiento
  - la comprensión
  - el buen juicio
  lexicon: LSJ
  rationale: En español, 'prudencia' comunica bien el matiz de sabiduría práctica y discernimiento de φρόνησις. Se mantiene la distinción con σοφία sin sonar técnico o filosófico.
- source_word: ἐδόθη μοι
  english_pob_choice: was given to me
  chosen_spanish: me fue dada
  alternatives_spanish:
  - me fue concedida
  - me fue otorgada
  lexicon: BDAG/LSJ
  rationale: Conserva la pasiva de recepción y el énfasis en que la cualidad es recibida, no producida por el sujeto.
- source_word: ἐπεκαλεσάμην
  english_pob_choice: I called upon God
  chosen_spanish: invoqué a Dios
  alternatives_spanish:
  - llamé a Dios
  - clamé a Dios
  - imploré a Dios
  lexicon: LSJ
  rationale: La forma griega permite una invocación dirigida a Dios; 'invoqué a Dios' refleja bien la fuerza devocional y respeta el sentido completado por el contexto, tal como el audit trail inglés decidió explicitarlo.
- source_word: πνεῦμα σοφίας
  english_pob_choice: a spirit of wisdom
  chosen_spanish: un espíritu de sabiduría
  alternatives_spanish:
  - el espíritu de sabiduría
  - una disposición de sabiduría
  lexicon: LSJ
  rationale: 'Se conserva la ambigüedad teológica y léxica del griego: puede leerse como una realidad espiritual o como una disposición inspirada, sin convertirla innecesariamente en un título fijo.'
- source_word: ἦλθέν μοι
  english_pob_choice: came to me
  chosen_spanish: me vino
  alternatives_spanish:
  - vino a mí
  - llegó a mí
  lexicon: BDAG/LSJ
  rationale: En español, 'me vino' reproduce con naturalidad el movimiento de llegada al sujeto y evita endurecer la expresión.
theological_decisions:
- issue: Cómo traducir πνεῦμα σοφίας sin resolver la tensión entre una realidad espiritual y una cualidad interior
  english_pob_reading: a spirit of wisdom
  chosen_spanish_reading: un espíritu de sabiduría
  alternative_spanish_readings:
  - el espíritu de sabiduría
  - una disposición de sabiduría
  - espíritu sabio
  rationale: La forma anártrica del griego permite ambas lecturas. La redacción principal mantiene esa apertura, evitando tanto convertirla en un título técnico como reducirla a mera psicología.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Si ἐπεκαλεσάμην debe explicitar el objeto de la invocación
  english_pob_reading: I called upon God
  chosen_spanish_reading: invoqué a Dios
  alternative_spanish_readings:
  - clamé a Dios
  - invocaba
  - llamé
  rationale: Aunque el griego no expresa el objeto de forma explícita, el contexto favorece la referencia a Dios. Seguir la decisión inglesa ayuda a preservar la claridad devocional sin inventar un referente ajeno al pasaje.
  doctrine_reference: Lexical/contextual decision consistent with the POB audit trail.
translation_notes:
  revision_awareness: This draft follows the audited English POB revision that moved from the more general 'I called out' to the more explicit 'I called upon God.' The Spanish main text reflects that clarified invocation while keeping the Greek ambiguity in πνεῦμα σοφίας. The rendering of φρόνησις as 'prudencia' is a Spanish contextual choice to preserve the practical-wisdom nuance distinct from σοφία.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el fuente lo exige; aquí no aparece.
  - Se traduce δοῦλος como 'esclavo' por defecto, pero no aplica en este versículo.
  - '''Espíritu de sabiduría'' se mantiene sin mayúscula para no fijarlo como título técnico.'
  - La puntuación separa las dos cláusulas griegas con punto y coma, reflejando bien la estructura del verso.
