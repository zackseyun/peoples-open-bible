revisions:
- from: Él y su pueblo con él—los violentos de las naciones—serán traídos para destruir la tierra[a]. Desenvainarán sus espadas contra Egipto y llenarán la tierra de cadáveres.
  to: Él y su pueblo con él —los despiadados[a] de las naciones— serán traídos para destruir la tierra. Desenvainarán sus espadas contra Egipto y llenarán la tierra de los caídos.
  rationale: Se revisa «violentos» a «despiadados» para reflejar mejor עָרִיצֵי גוֹיִם según la auditoría inglesa («the ruthless»), se cambia «cadáveres» por «los caídos» para representar con mayor precisión y dignidad חָלָל, y se ajusta la nota para que ofrezca alternativas reales y útiles. No se requiere adjudicación adicional porque las correcciones son léxicas y estilísticas, no doctrinales ni textualmente inciertas.
