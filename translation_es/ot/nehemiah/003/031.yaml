translation:
  language: es
  text: Después de él, Malkías hijo del orfebre reparó hasta la casa de los servidores del templo[a] y de los mercaderes, frente a la Puerta de la Inspección[b], y hasta la cámara alta del ángulo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la casa de los netineos»; es un término técnico para servidores del templo.
    reason: lexical_alternative
  - marker: b
    text: O «la Puerta del Alistamiento» o «la Puerta de la Revista».
    reason: lexical_alternative
  - marker: c
    text: O «el ascenso del ángulo». La expresión hebrea puede referirse tanto a una cámara alta como a una subida en el ángulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אחרי
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Tras él
  - Después de eso
  lexicon: HALOT
  rationale: En la lista de reparaciones de Nehemías 3, la expresión marca sucesión entre secciones y personas. «Después de él» conserva la relación personal y el orden narrativo sin volverla meramente temporal.
- source_word: הֶחֱזִיק
  english_pob_choice: repaired
  chosen_spanish: reparó
  alternatives_spanish:
  - fortaleció
  - hizo reparaciones
  lexicon: HALOT
  rationale: Aunque el verbo puede significar fortalecer o sujetar, en este capítulo funciona de modo técnico para la obra de restauración del muro. «Reparó» es natural y fiel a ese uso repetido.
- source_word: מַלְכִּיָּה
  english_pob_choice: Malkijah
  chosen_spanish: Malkías
  alternatives_spanish:
  - Malquías
  - Malkías
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio en forma comprensible para el lector español. «Malkías» refleja de cerca la forma hebrea y mantiene el valor de nombre propio.
- source_word: בֶּן הַצֹּרְפִי
  english_pob_choice: son of the goldsmith
  chosen_spanish: hijo del orfebre
  alternatives_spanish:
  - hijo del platero
  - hijo del metalúrgico
  - hijo del refinador
  lexicon: HALOT
  rationale: צֹרֵף designa a un artesano de metales preciosos; en español «orfebre» comunica bien el oficio y evita una traducción demasiado general. Se mantiene el sentido ocupacional del texto.
- source_word: בֵּית הַנְּתִינִים
  english_pob_choice: the house of the temple servants
  chosen_spanish: la casa de los servidores del templo
  alternatives_spanish:
  - la casa de los netineos
  - la casa de los Nethinim
  - la casa de los siervos del templo
  lexicon: HALOT
  rationale: El término técnico נְתִינִים se interpreta aquí según su función en el templo. «Servidores del templo» conserva el sentido y evita dejar sin explicar el término técnico en el cuerpo del texto.
- source_word: וְהָרֹכְלִים
  english_pob_choice: and the merchants
  chosen_spanish: y de los mercaderes
  alternatives_spanish:
  - y de los comerciantes
  - y de los tratantes
  lexicon: HALOT
  rationale: El participio sustantivado se refiere a quienes comercian. «Mercaderes» es una solución natural y acorde con el registro bíblico, y la preposición «de» refleja la construcción hebrea coordinada.
- source_word: נֶגֶד
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  lexicon: HALOT
  rationale: La preposición indica ubicación directamente delante de un punto de referencia. «Frente a» es claro, idiomático y mantiene la relación espacial.
- source_word: שַׁעַר הַמִּפְקָד
  english_pob_choice: the Inspection Gate
  chosen_spanish: la Puerta de la Inspección
  alternatives_spanish:
  - la Puerta del Recuento
  - la Puerta del Muster
  - la Puerta de la Revista
  lexicon: HALOT
  rationale: מִפְקָד puede referirse a inspección, recuento o muster. Se conserva la opción de lectura administrativa con una forma transparente en español; «Inspección» comunica bien la función probable del lugar.
- source_word: עֲלִיַּת הַפִּנָּה
  english_pob_choice: the upper chamber of the corner
  chosen_spanish: la cámara alta de la esquina
  alternatives_spanish:
  - la cámara superior de la esquina
  - el ascenso de la esquina
  - la habitación alta de la esquina
  lexicon: HALOT
  rationale: עֲלִיָּה suele designar una estancia alta o cámara superior, aunque también puede aludir a un ascenso. «Cámara alta» preserva la lectura arquitectónica principal y deja en pie la tensión semántica.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés al reflejar con mayor claridad la construcción coordinada «y de los mercaderes» y al preferir una forma más formal para עֲלִיַּת mediante «cámara alta».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal en otros contextos del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce el verbo de acción del capítulo como «reparó», coherente con la serie de reparaciones de Nehemías 3.
  - Se evita transliterar נְתִינִים en el texto principal, siguiendo la decisión contextual del POB inglés y la inteligibilidad en español.
  - Se conserva la ambigüedad arquitectónica de עֲלִיַּת mediante la nota, sin forzar una sola lectura.
