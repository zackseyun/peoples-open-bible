lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - las familias de
  lexicon: HALOT
  rationale: En listas genealógicas y censales, el plural constructo de בֵּן suele designar una línea familiar o un grupo de pertenencia. En español, «los hijos de» conserva esa forma formal y es plenamente natural en este contexto; «descendientes de» explicita más el valor colectivo, pero suaviza la formulación heredada del registro de lista.
- source_word: אָטֵר
  english_pob_choice: Ater
  chosen_spanish: Ater
  lexicon: nombre propio
  rationale: Es un nombre propio de familia y debe transliterarse sin traducirlo.
- source_word: לִיחִזְקִיָּה
  english_pob_choice: of Hezekiah
  chosen_spanish: de Ezequías
  alternatives_spanish:
  - pertenecientes a Ezequías
  - de la casa de Ezequías
  lexicon: HALOT
  rationale: El prefijo ל marca aquí afiliación o clasificación dentro del linaje. «De Ezequías» reproduce de manera concisa esa relación, sin añadir interpretación excesiva. Se prefiere el nombre bíblico españolizado «Ezequías» por ser transparente y reconocible en español.
- source_word: תִּשְׁעִים וּשְׁמֹנָה
  english_pob_choice: ninety-eight
  chosen_spanish: noventa y ocho
  lexicon: HALOT
  rationale: El cardinal se expresa de forma idiomática en español como «noventa y ocho».
