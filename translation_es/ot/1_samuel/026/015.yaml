    reason: lexical_alternative
  revision_rationale: Se reubicaron las notas al pie para que coincidan con las frases a las que realmente pertenecen. Además, se ajustó «no has vigilado a» a «no has montado guardia sobre», que comunica mejor el sentido militar de שׁמר en este contexto y suena más natural en español bíblico moderno. Se mantuvo «señor» para אֲדֹן y la repetición retórica «al rey, tu señor».
