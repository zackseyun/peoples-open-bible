- from: 'Él les dijo[a]: «Así y así hizo Micah conmigo, me contrató y llegué a ser su sacerdote».'
  to: 'Él les dijo[a]: «Micah hizo así y así por mí, me contrató y llegué a ser su sacerdote».'
