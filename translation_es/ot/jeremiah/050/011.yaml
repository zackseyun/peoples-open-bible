translation:
  language: es
  text: Porque te alegras, porque exultas, despojadores de mi heredad[a], porque brincas como ternera que trilla y relinchas como sementales[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mi heredad» también puede traducirse «mi herencia», refiriéndose al pueblo y/o a la tierra que pertenecen a Yahvé.
    reason: lexical_alternative
  - marker: b
    text: «Sementales» explicita el matiz equino de אַבִּירִים; también puede entenderse como «caballos fuertes» o «corceles».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este versículo se repite כִּי con valor discursivo que introduce la ironía del reproche; en español, «Porque» conserva la relación marcada por el hebreo y permite el tono de reprensión que el contexto demanda, sin forzar una paráfrasis.
- source_word: תשמחי
  english_pob_choice: you rejoice
  chosen_spanish: te alegras
  alternatives_spanish:
  - te regocijas
  - te gozas
  lexicon: HALOT
  rationale: שׂמח expresa alegría o regocijo. «Te alegras» es natural en español y mantiene el matiz de júbilo del original.
- source_word: תעלזי
  english_pob_choice: you exult
  chosen_spanish: exultas
  alternatives_spanish:
  - triunfas
  - estás jubilosa
  lexicon: HALOT
  rationale: עלז intensifica la alegría con un matiz de exultación. «Exultas» conserva esa elevación y distingue el segundo verbo del primero.
- source_word: שֹׁסֵי נַחֲלָתִי
  english_pob_choice: plunderers of my inheritance
  chosen_spanish: despojadora de mi heredad
  alternatives_spanish:
  - despojadores de mi heredad
  - saqueadora de mi heredad
  lexicon: HALOT
  rationale: El participio plural שֹׁסֵי literalmente es «despojadores/plunderers». En el hebreo, las formas verbales femeninas singulares de la segunda persona encajan con la personificación de Babilonia como ciudad. En español, se ha optado por una forma singular femenina implícita («despojadora») para mantener esa personificación y la fuerza nominal del insulto. «Heredad» conserva el valor covenantal de נַחֲלָה.
- source_word: תפושי
  english_pob_choice: you frolic
  chosen_spanish: brincas
  alternatives_spanish:
  - retozas
  - saltas alegremente
  lexicon: HALOT
  rationale: פושׁ aquí sugiere movimiento vivaz, casi animal. «Brincas» comunica bien ese desplazamiento juguetón y despectivo en español.
- source_word: כְּעֶגְלָה דָשָׁה
  english_pob_choice: like a threshing heifer
  chosen_spanish: como ternera que trilla
  alternatives_spanish:
  - como novilla que trilla
  - como ternera trilladora
  lexicon: HALOT
  rationale: 'La imagen es agrícola: una hembra joven en la trilla. «Ternera» resulta idiomática y transparente en español, y «que trilla» preserva la acción del hebreo דָשָׁה sin añadir explicación.'
- source_word: ו/תצהלי
  english_pob_choice: and neigh
  chosen_spanish: y relinchas
  alternatives_spanish:
  - y alborotas
  - y resoplas
  lexicon: HALOT
  rationale: צהל, aplicado a animales, se refiere al relincho de los caballos. «Relinchas» es la equivalencia directa y natural en español.
- source_word: כָּ/אֲבִּרִים
  english_pob_choice: like stallions
  chosen_spanish: como sementales
  alternatives_spanish:
  - como caballos fuertes
  - como corceles
  lexicon: HALOT
  rationale: אַבִּיר aquí apunta a caballos fuertes o poderosos. «Sementales» vuelve explícita la imagen equina y mantiene el tono vigoroso del hebreo.
theological_decisions:
- issue: Vocativo y personificación de Babilonia en las formas verbales femeninas
  english_pob_reading: Addressed to Babylon as a personified feminine entity
  chosen_spanish_reading: Babilonia es tratada como una ciudad/persona femenina a la que se interpela directamente
  alternative_spanish_readings:
  - Dirigido a los habitantes de la ciudad en conjunto, sin enfatizar la personificación
  - Mantener solo una segunda persona plural implícita
  rationale: Las formas hebreas son femeninas singulares; la traducción española preserva la personificación con una segunda persona singular implícita y un sustantivo femenino en la primera cláusula. Esto mantiene el insulto profético y la unidad retórica del pasaje.
  doctrine_reference: Personificación profética de ciudades en el AT; coherencia gramatical del hebreo
- issue: Sentido de נַחֲלָתִי
  english_pob_reading: my inheritance / my heritage, referring to the people and/or land belonging to the LORD
  chosen_spanish_reading: mi heredad
  alternative_spanish_readings:
  - mi herencia
  - mi patrimonio
  rationale: «Heredad» puede abarcar tanto tierra como pueblo en lenguaje bíblico y conserva mejor la relación de posesión pactal que «herencia» en español contemporáneo.
  doctrine_reference: Lenguaje de pacto y posesión divina en el AT
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió «Because» sobre «Though» para ajustarse a כִּי, y «frolic» como registro más natural. El español sigue esa lectura discursiva con «Porque» y un verbo dinámico («brincas»), manteniendo el tono de burla profética y el encadenamiento de las imágenes animales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque aquí el hebreo no contiene el tetragrámaton explícito, aunque sí aparece la primera persona posesiva «mi».
  - Se preservó la personificación femenina de Babilonia con léxico y sintaxis coherentes en español.
  - Se evitó «Cristo/Mesías» y otros términos no pertinentes al versículo.
  - La imagen agrícola y la imagen equina se conservaron sin suavizarlas.
