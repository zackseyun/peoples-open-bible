translation:
  language: es
  text: las grandes pruebas[a] que tus ojos vieron, y las señales, y las maravillas, y la mano poderosa, y el brazo extendido por medio del cual Yahvé tu Dios te sacó; así hará Yahvé tu Dios a todos los pueblos[b] de los que tienes miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las grandes pruebas severas'. El hebreo puede denotar pruebas o actos de prueba.
    reason: lexical_alternative
  - marker: b
    text: O 'naciones'. 'Pueblos' es más literal al hebreo עַמִּים.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּסֹּת הַגְּדֹלֹת
  english_pob_choice: the great trials
  chosen_spanish: las grandes pruebas
  alternatives_spanish:
  - las grandes tentaciones
  - las grandes pruebas de examen
  lexicon: HALOT
  rationale: מַסּוֹת puede significar pruebas o testings severos; en este contexto de acciones poderosas ya vistas en Egipto, 'pruebas' comunica bien el sentido y evita la carga engañosa que 'tentaciones' suele tener en español.
- source_word: רָאוּ עֵינֶיךָ
  english_pob_choice: your eyes saw
  chosen_spanish: que tus ojos vieron
  alternatives_spanish:
  - que tú viste
  - que viste
  lexicon: HALOT
  rationale: Conservo la mención explícita de 'tus ojos' porque el hebreo la usa para enfatizar la experiencia ocular directa.
- source_word: הָאֹתֹת
  english_pob_choice: the signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  lexicon: HALOT
  rationale: '''Señales'' es natural en español bíblico contemporáneo y comunica el valor de אֹת como acto significativo y reconocible de Dios.'
- source_word: הַמֹּפְתִים
  english_pob_choice: the wonders
  chosen_spanish: las maravillas
  alternatives_spanish:
  - los prodigios
  - los milagros
  lexicon: HALOT
  rationale: '''Maravillas'' mantiene el paralelismo con ''señales'' y expresa el carácter asombroso de מוֹפְתִים sin imponer una especificación más interpretativa.'
- source_word: הַיָּד הַחֲזָקָה
  english_pob_choice: the mighty hand
  chosen_spanish: la mano poderosa
  alternatives_spanish:
  - la mano fuerte
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; 'mano poderosa' conserva la metáfora de acción divina eficaz y suena natural en español.
- source_word: הַזְּרֹעַ הַנְּטוּיָה
  english_pob_choice: the outstretched arm
  chosen_spanish: el brazo extendido
  alternatives_spanish:
  - el brazo alzado
  - el brazo tendido
  lexicon: HALOT
  rationale: '''Brazo extendido'' reproduce bien la imagen fija del hebreo y evita una paráfrasis demasiado libre.'
- source_word: אֲשֶׁר הוֹצִאֲךָ
  english_pob_choice: by which ... brought you out
  chosen_spanish: por medio del cual ... te sacó
  alternatives_spanish:
  - con el cual ... te sacó
  - por el cual ... te sacó
  lexicon: HALOT
  rationale: '''Sacar'' es el verbo natural en español para el éxodo, y ''por medio del cual'' conserva la relación instrumental con la mano y el brazo precedentes.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto en español, el Tetragrámaton se vierte como 'Yahvé' para preservar el nombre propio del pacto, no como sustituto reverencial.
- source_word: כֵּן יַעֲשֶׂה
  english_pob_choice: so ... will do
  chosen_spanish: así hará
  alternatives_spanish:
  - de la misma manera hará
  - así mismo hará
  lexicon: HALOT
  rationale: '''Así hará'' conserva la comparación con los actos previos de liberación y juicio sin añadir elementos que el hebreo no exige.'
- source_word: לְכָל הָעַמִּים
  english_pob_choice: to all the peoples
  chosen_spanish: con todos los pueblos
  alternatives_spanish:
  - a todos los pueblos
  - contra todos los pueblos
  - con todas las naciones
  lexicon: HALOT
  rationale: '''Pueblos'' sigue más de cerca עַמִּים que ''naciones''. Aquí elegí ''con'' porque el paralelismo con la acción divina sobre los egipcios y enemigos favorece un sentido relacional/afectado, y el español fluye mejor que una construcción literal rígida.'
- source_word: אֲשֶׁר אַתָּה יָרֵא מִפְּנֵיהֶם
  english_pob_choice: of whom you are afraid
  chosen_spanish: de los que tú tienes miedo
  alternatives_spanish:
  - de quienes temes
  - de los que temes
  - a quienes temes
  lexicon: HALOT
  rationale: El hebreo expresa temor en la presencia de ellos; 'tener miedo de' comunica esa fuerza en español moderno. Mantengo 'tú' para reproducir el énfasis directo del original.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Nombre del pacto de forma explícita; en español del proyecto se conserva como 'Yahvé' para no ocultarlo detrás de un título y para mantener la coherencia terminológica del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de לְכָל הָעַמִּים
  english_pob_reading: to all the peoples
  chosen_spanish_reading: con todos los pueblos
  alternative_spanish_readings:
  - a todos los pueblos
  - contra todos los pueblos
  - con todas las naciones
  rationale: El hebreo habla de 'pueblos' y la acción divina se entiende por el contexto como dirigida contra ellos en juicio y liberación. En español, 'con' evita forzar una preposición que suene antinatural, aunque se mantiene la idea de que Yahvé actuará sobre esos pueblos.
  doctrine_reference: Syntax and discourse of Hebrew ל + object of action in judgment contexts
translation_notes:
  revision_awareness: El inglés POB revisó la frase final de 'before whom you are afraid' a 'of whom you are afraid' para acercarse mejor al hebreo 'de delante de ellos' como una expresión de temor ante su presencia. En español, 'de los que tú tienes miedo' sigue esa misma línea y evita una construcción demasiado literal como 'ante los cuales', que sonaría menos natural.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' coherentemente con el estándar español del proyecto para יְהוָה.
  - '''Pueblos'' se conservó para reflejar el plural עַמִּים; no se sustituyó por ''naciones'' en el texto principal.'
  - '''Señales'' y ''maravillas'' siguen la pareja lexical tradicional del hebreo sin fusionarlas en una sola idea.'
  - La preposición 'con' en 'con todos los pueblos' refleja la relación de acción divina sobre ellos en un español fluido, aunque la nota conserva la alternativa más literal.
