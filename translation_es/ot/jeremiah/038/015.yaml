translation:
  language: es
  text: 'Jeremías dijo a Sedequías[a]: «Si te lo digo, ¿acaso no me darás muerte? Y si te aconsejo[b], no me escucharás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ciertamente me matarás». El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: «Escucharme» también puede implicar «hacerme caso» o «obedecerme» en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְמְיָהוּ / צִדְקִיָּהוּ
  english_pob_choice: Jeremiah / Zedekiah
  chosen_spanish: Jeremías / Sedequías
  alternatives_spanish:
  - Jeremías / Zedekías
  - Jeremías / Zedequías
  lexicon: Nombres propios bíblicos
  rationale: Se conservan los nombres propios en su forma española más establecida y reconocible. «Sedequías» es la adaptación bíblica habitual en español y mantiene la identificación del rey sin depender del inglés.
- source_word: אַגִּיד לְךָ
  english_pob_choice: I tell you
  chosen_spanish: te lo digo
  alternatives_spanish:
  - te declaro
  - te hago saber
  lexicon: HALOT נגד (Hiphil)
  rationale: El hebreo expresa ‘decir / hacer saber’. En español, «te lo digo» suena natural en un diálogo directo y conserva el valor informativo sin cargar más solemnidad de la que exige el contexto.
- source_word: הֲלוֹא
  english_pob_choice: will you not
  chosen_spanish: ¿acaso no
  alternatives_spanish:
  - ¿no es verdad que
  - ¿no
  lexicon: HALOT הלוא
  rationale: La partícula introduce una pregunta retórica con expectativa de respuesta afirmativa. «¿Acaso no» reproduce mejor esa fuerza interrogativa en español que una afirmación lisa.
- source_word: הָמֵת תְּמִיתֵנִי
  english_pob_choice: surely put me to death
  chosen_spanish: me darás muerte
  alternatives_spanish:
  - me matarás seguramente
  - ciertamente me matarás
  lexicon: HALOT מות
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. «Me darás muerte» conserva el sentido de ejecución intencional y la gravedad del hebreo, con un tono más idiomático que una traducción demasiado literal.
- source_word: אִיעָצְךָ
  english_pob_choice: I advise you
  chosen_spanish: te aconsejo
  alternatives_spanish:
  - te aconsejaré
  - te doy consejo
  lexicon: HALOT יעץ
  rationale: יעץ significa aconsejar / dar consejo. «Te aconsejo» mantiene el paralelismo con la primera cláusula y es la forma más natural para la segunda condición en español.
- source_word: לֹא תִשְׁמַע אֵלַי
  english_pob_choice: you will not listen to me
  chosen_spanish: no me escucharás
  alternatives_spanish:
  - no me oirás
  - no me obedecerás
  lexicon: HALOT שמע + אֶל
  rationale: שמע con אֶל suele significar escuchar a alguien, con posible matiz de atender u obedecer. «No me escucharás» conserva el sentido inmediato y deja intacta la leve tensión entre oír, atender y obedecer que el hebreo permite.
translation_notes:
  revision_awareness: El texto inglés ya había sido evaluado como de alta concordancia y sin cambios necesarios; la versión española sigue ese mismo trazado, adaptando los valores léxicos al español sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo de segunda persona singular, coherente con el hebreo y con el inglés auditado.
  - Se evita la sustitución por «SEÑOR» o por fórmulas litúrgicas no presentes en el versículo.
  - La intensificación hebrea de הָמֵת תְּמִיתֵנִי se conserva mediante la nota, sin sobrecargar el texto principal.
  - Se preserva el paralelismo condicional de las dos cláusulas mediante «Si... Y si...».
