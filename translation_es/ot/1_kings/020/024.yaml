translation:
  language: es
  text: 'Y haz esto: quita a los reyes, a cada uno de su puesto, y pon gobernadores[a] en lugar de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gobernadores provinciales».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת הַדָּבָר הַזֶּה
  english_pob_choice: And do this thing
  chosen_spanish: Y haz esto
  alternatives_spanish:
  - Y haz esta cosa
  - Y cumple esto
  lexicon: HALOT
  rationale: El hebreo introduce un objeto enfático con דָּבָר הַזֶּה seguido del imperativo. En español, «haz esto» comunica con naturalidad la instrucción sin añadir una palabra más pesada como «cosa», que suena menos idiomática.
- source_word: עֲשֵׂה
  english_pob_choice: do
  chosen_spanish: haz
  alternatives_spanish:
  - hazlo
  - realiza
  lexicon: HALOT
  rationale: El imperativo de עשה se rinde de forma directa con «haz». Conserva la fuerza simple del mandato y evita un matiz más interpretativo como «realiza».
- source_word: הָסֵר
  english_pob_choice: remove
  chosen_spanish: quita
  alternatives_spanish:
  - retira
  - elimina
  lexicon: HALOT
  rationale: El hiphil de סור/סיר expresa hacer quitar o apartar. «Quita» es breve y natural en español para una orden administrativa, y mantiene la idea de remoción sin cargarla de tono militar o definitivo.
- source_word: הַמְּלָכִים אִישׁ מִמְּקֹמוֹ
  english_pob_choice: the kings, each from his place
  chosen_spanish: a los reyes, a cada uno de su puesto
  alternatives_spanish:
  - a los reyes, cada uno de su lugar
  - a los reyes, cada uno de su posición
  lexicon: HALOT
  rationale: El distributivo אִישׁ con plural requiere «a cada uno». «Puesto» transmite bien מָקוֹם como sede/función asignada, no solo ubicación física, y suena más natural que repetir «lugar» después de «de su».
- source_word: וְשִׂים
  english_pob_choice: and put
  chosen_spanish: y pon
  alternatives_spanish:
  - y establece
  - y coloca
  lexicon: HALOT
  rationale: שׂים literalmente es «poner/colocar». «Pon» es el equivalente más directo y mantiene la sencillez del hebreo.
- source_word: פַּח֖וֹת
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - gobernadores provinciales
  - funcionarios
  lexicon: HALOT
  rationale: פַּחוֹת designa autoridades administrativas, frecuentemente gobernadores provinciales. «Gobernadores» refleja bien la función sin estrechar indebidamente el término a un rango militar.
- source_word: תַּחְתֵּיהֶם
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de ellos
  - bajo ellos
  lexicon: HALOT
  rationale: El idiomático hebreo indica sustitución. «En su lugar» comunica esa idea con claridad en español y preserva la relación de reemplazo que el contexto exige.
theological_decisions:
- issue: Rango administrativo de פַּחוֹת frente a posible matiz militar
  english_pob_reading: governors
  chosen_spanish_reading: gobernadores
  alternative_spanish_readings:
  - capitanes
  - oficiales
  rationale: El contexto es de reorganización del gobierno sobre los reyes derrotados, no de mera táctica militar. «Gobernadores» conserva la función administrativa sugerida por el hebreo y por la lectura inglesa, sin imponer una precisión más estrecha que el texto no exige.
  doctrine_reference: No aplica; decisión léxico-histórica
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó la frase para reflejar con más precisión el plural hebreo («the kings, each from his place»). La redacción española sigue esa precisión distributiva con «a los reyes, a cada uno de su puesto», manteniendo al mismo tiempo una construcción natural en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino cuando corresponda en este proyecto, pero este versículo no lo contiene.
  - Se mantuvo el tono imperativo breve y administrativo del hebreo.
  - «Gobernadores» se conservó por coherencia con la elección inglesa auditada y con el valor administrativo del término.
