translation:
  language: es
  text: Y sobre la compañía de la tribu de los hijos de Gad estaba Eliasaf hijo de Deuel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hueste» o «división» para צְבָא; en hebreo puede tener matiz militar, pero aquí se refiere al grupo tribal ordenado para la marcha.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: And over
  chosen_spanish: Y sobre
  alternatives_spanish:
  - y acerca de
  - y sobre el cargo de
  lexicon: HALOT
  rationale: En esta fórmula repetida de liderazgo, עַל introduce a quien está a cargo de un grupo tribal. «Sobre» conserva la relación de supervisión sin añadir una expresión más interpretativa que «encargado de».
- source_word: צְבָא
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - hueste
  - división
  - grupo ordenado
  lexicon: HALOT
  rationale: El contexto de Números 10 no es el de un ejército en combate, sino el de una unidad tribal ordenada para la marcha. «Compañía» reproduce bien la idea de un grupo organizado y mantiene la ambigüedad militar atenuada que el inglés POB también preserva con su nota.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - cetro
  - rama
  lexicon: HALOT
  rationale: Aquí מַטֶּה designa claramente la unidad tribal, no un objeto físico. «Tribu» es el sentido contextual directo y natural en español.
- source_word: בְנֵי גָד
  english_pob_choice: the sons of Gad
  chosen_spanish: de Gad
  alternatives_spanish:
  - los hijos de Gad
  - los gaditas
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «los hijos de Gad», pero en español, dentro de la frase «tribu de Gad», mantener solo «de Gad» evita redundancia y sigue la función identificadora del gentilicio tribal.
- source_word: אֶלְיָסָף
  english_pob_choice: Eliasaph
  chosen_spanish: Eliasaf
  alternatives_spanish:
  - Eliásaf
  - Elyasaf
  lexicon: Conventional transliteration
  rationale: Se translitera el nombre propio al español como «Eliasaf», una forma transparente y cercana a la pronunciación hebrea, evitando una grafía más anglicada.
- source_word: בֶּן דְּעוּאֵל
  english_pob_choice: son of Deuel
  chosen_spanish: hijo de Deuel
  alternatives_spanish:
  - hijo de Deuel
  - hijo de Deuél
  lexicon: HALOT
  rationale: La relación patronímica se conserva de manera directa con «hijo de». Se mantiene «Deuel» como transliteración del nombre propio, sin adaptar la vocalización de modo innecesario.
translation_notes:
  revision_awareness: El texto español sigue de cerca el patrón formular del hebreo y del inglés auditado, conservando la relación de supervisión con עַל, la designación tribal con מַטֵּה y la ambigüedad controlada de צְבָא documentada en la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y publicable, acorde con listas censales y de organización del campamento.
  - Se evita «SEÑOR» u otras convenciones de máscara porque el versículo no contiene el nombre divino.
  - La transliteración de nombres propios se mantiene consistente y sin acentos añadidos arbitrariamente.
