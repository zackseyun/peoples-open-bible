translation:
  language: es
  text: Hasta que lo reciba, besará su mano, y por el dinero de su prójimo bajará la voz[a]; pero en el tiempo del pago dará largas, y devolverá[b] palabras de indiferencia y culpará al momento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «humillará [su] voz», un modismo para hablar con tono rebajado y sumiso.'
    reason: lexical_alternative
  - marker: b
    text: 'Aquí el verbo se usa con ironía: en vez de devolver el dinero, devuelve solo excusas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως οὗ λάβῃ
  english_pob_choice: Until he receives it
  chosen_spanish: Hasta que lo reciba
  alternatives_spanish:
  - Hasta que lo reciba
  - Hasta que lo obtenga
  lexicon: LSJ
  rationale: El griego marca el límite temporal previo a recibir el préstamo. «Reciba» conserva el valor de recibir dinero sin añadir paráfrasis.
- source_word: καταφιλήσει χεῖρα αὐτοῦ
  english_pob_choice: he will kiss his hand
  chosen_spanish: besará su mano
  alternatives_spanish:
  - besará su mano
  - besará repetidamente su mano
  - le besará la mano
  lexicon: LSJ
  rationale: Se mantiene la imagen concreta del gesto de adulación o sumisión. «Le besará la mano» podría sonar más natural, pero el pronombre posesivo sigue más de cerca el griego.
- source_word: ἐπὶ τῶν χρημάτων τοῦ πλησίον
  english_pob_choice: for his neighbor’s money
  chosen_spanish: por el dinero de su prójimo
  alternatives_spanish:
  - por el dinero de su prójimo
  - a causa del dinero de su prójimo
  - con respecto al dinero de su prójimo
  lexicon: LSJ
  rationale: «Por» expresa bien la motivación o el motivo del comportamiento. «Prójimo» es natural en español bíblico y corresponde al vecino o cercano del contexto.
- source_word: ταπεινώσει φωνήν
  english_pob_choice: he will lower his voice
  chosen_spanish: humillará la voz
  alternatives_spanish:
  - humillará la voz
  - bajará la voz
  - hablará con voz humilde
  lexicon: LSJ
  rationale: Se conserva la metáfora literal del griego («humillar la voz»). La opción inglesa optó por una equivalencia más idiomática; en español puede mantenerse la tensión sin perder inteligibilidad.
- source_word: ἐν καιρῷ ἀποδόσεως
  english_pob_choice: at the time of repayment
  chosen_spanish: en el tiempo del pago
  alternatives_spanish:
  - en el tiempo del pago
  - cuando llegue el tiempo de pagar
  - en el momento de la restitución
  lexicon: LSJ
  rationale: «Pago» comunica claramente el ámbito financiero. «Pago» aquí funciona como sustantivo de acto de devolver una deuda, sin forzar terminología técnica.
- source_word: παρελκύσει χρόνον
  english_pob_choice: he will delay
  chosen_spanish: retrasará el tiempo
  alternatives_spanish:
  - retrasará el tiempo
  - dilatará el tiempo
  - lo hará esperar
  lexicon: LSJ
  rationale: El verbo expresa demorarse o estirar el plazo. «Retrasará el tiempo» conserva la imagen de alargar el momento, aunque suene ligeramente literal, y refleja el valor del griego con transparencia.
- source_word: ἀποδώσει λόγους ἀκηδίας
  english_pob_choice: he will repay with words of indifference
  chosen_spanish: devolverá palabras de indiferencia
  alternatives_spanish:
  - devolverá palabras de indiferencia
  - responderá con palabras negligentes
  - pagará con palabras de descuido
  lexicon: LSJ
  rationale: El griego usa «devolver/repagar» irónicamente con «palabras». «Indiferencia» traduce de modo directo la falta de cuidado, sin perder el matiz de despreocupación o negligencia.
- source_word: τὸν καιρὸν αἰτιάσεται
  english_pob_choice: blame the time
  chosen_spanish: culpará el momento
  alternatives_spanish:
  - culpará el momento
  - culpará al tiempo
  - hará culpable la ocasión
  lexicon: LSJ
  rationale: El préstamo pospuesto traslada la culpa a las circunstancias o al momento oportuno. «Momento» evita ambigüedad en español y mantiene el sentido de excusa circunstancial.
theological_decisions:
- issue: Uso de «prójimo» para πλησίον
  english_pob_reading: neighbor
  chosen_spanish_reading: prójimo
  alternative_spanish_readings:
  - vecino
  - cercano
  rationale: El contexto económico habla de alguien cercano en relación social, no necesariamente de un vecino geográfico. «Prójimo» preserva la amplitud semántica y es idiomático en texto bíblico.
  doctrine_reference: No doctrinal; decisión semántica-contextual.
- issue: Mantener la metáfora de «humillar la voz»
  english_pob_reading: he will lower his voice
  chosen_spanish_reading: humillará la voz
  alternative_spanish_readings:
  - bajará la voz
  - hablará en tono sumiso
  rationale: La POB inglesa ya anotó que el griego dice literalmente «humillar [la] voz». En español conviene conservar esa tensión para que la nota explique el modismo sin borrar la imagen del texto.
  doctrine_reference: No doctrinal; fidelidad retórica al giro proverbial.
- issue: Reproducción irónica de «devolverá» para λόγους
  english_pob_reading: he will repay with words
  chosen_spanish_reading: devolverá palabras de indiferencia
  alternative_spanish_readings:
  - pagará con palabras de indiferencia
  - responderá con palabras de indiferencia
  rationale: 'El verbo de retribución se usa irónicamente: en lugar de pagar dinero, devuelve excusas o palabras vacías. «Devolverá» mantiene ese juego verbal.'
  doctrine_reference: No doctrinal; efecto retórico del proverbio.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: simplificó la secuencia a «delay» y corrigió el pronombre posesivo al singular del griego. En español se conservó el pronombre singular implícito en «su mano» y se optó por una forma verbal que preserve la idea de demora sin introducir una expansión interpretativa innecesaria.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo el tono proverbial y financiero del pasaje, con vocabulario inteligible para lectura eclesial.
  - Se evitó sustituir la metáfora griega por una paráfrasis demasiado suave, porque la POB inglesa documenta la dureza retórica del dicho.
