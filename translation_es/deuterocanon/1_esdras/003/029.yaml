translation:
  language: es
  text: Y los que no[a] sirven en el ejército ni combaten, sino que cultivan la tierra, cuando siembran, después de cosechar llevan tributo al rey; y, obligándose unos a otros[b], llevan los impuestos al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘prestan servicio militar’. El verbo aquí conserva la idea de servicio o campaña militar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘obligándose unos a otros’. La frase probablemente describe una presión mutua para asegurar el pago de los impuestos al rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατεύονται
  english_pob_choice: serve in the army
  chosen_spanish: sirven en el ejército
  alternatives_spanish:
  - prestan servicio militar
  - van a campaña
  lexicon: LSJ
  rationale: La forma griega indica servicio o campaña militar. En español, 'sirven en el ejército' conserva el sentido de servicio militar sin introducir una especificación más fuerte que el griego.
- source_word: πολεμοῦσιν
  english_pob_choice: fight
  chosen_spanish: combaten
  alternatives_spanish:
  - hacen guerra
  - luchan
  lexicon: LSJ
  rationale: '''Combaten'' reproduce el valor bélico de manera natural y mantiene el paralelismo con ''sirven en el ejército''.'
- source_word: γεωργοῦσιν τὴν γῆν
  english_pob_choice: cultivate the land
  chosen_spanish: cultivan la tierra
  alternatives_spanish:
  - trabajan la tierra
  - labran el campo
  lexicon: LSJ
  rationale: '''Cultivan la tierra'' es una equivalencia transparente y sobria que conserva el sentido agrícola del sintagma.'
- source_word: σπείρωσιν
  english_pob_choice: they sow
  chosen_spanish: han sembrado
  alternatives_spanish:
  - siembran
  - hayan sembrado
  lexicon: LSJ
  rationale: La revisión inglesa ajustó la temporalidad a 'when they have sown'. En español, 'cuando han sembrado' refleja bien la relación temporal del subjuntivo aorístico en la cláusula.
- source_word: θερίσαντες
  english_pob_choice: after reaping
  chosen_spanish: después de cosechar
  alternatives_spanish:
  - tras cosechar
  - después de segar
  lexicon: LSJ
  rationale: '''Cosechar'' comunica el acto de recoger la mies en español actual. Aunque el verbo puede solaparse con ''reap'', aquí encaja con el marco agrícola del verso y fluye mejor que una forma más arcaica.'
- source_word: ἀναφέρουσιν
  english_pob_choice: bring
  chosen_spanish: llevan
  alternatives_spanish:
  - presentan
  - entregan
  - pagan
  lexicon: LSJ
  rationale: En contexto fiscal, el verbo significa llevar o entregar a una autoridad superior. 'Llevan' mantiene la concreción del griego; el sentido tributario queda aclarado por 'tributo' e 'impuestos'.
- source_word: τῷ βασιλεῖ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey soberano
  lexicon: LSJ
  rationale: El dativo indica destinatario. 'Al rey' es la forma directa y natural en español.
- source_word: ἀναγκάζοντες
  english_pob_choice: compelling one another
  chosen_spanish: presionándose unos a otros
  alternatives_spanish:
  - obligándose unos a otros
  - forzándose mutuamente
  lexicon: LSJ
  rationale: La partícula participial sugiere presión coercitiva entre los miembros. 'Presionándose unos a otros' expresa esa fuerza mutua sin añadir una imagen demasiado técnica o dura que el contexto no exige explícitamente.
- source_word: ἕτερος τὸν ἕτερον
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - mutuamente
  lexicon: LSJ
  rationale: Es la expresión recíproca estándar en español y conserva el sentido distributivo del griego.
- source_word: τοὺς φόρους
  english_pob_choice: the taxes
  chosen_spanish: los impuestos
  alternatives_spanish:
  - los tributos
  - las cargas
  lexicon: LSJ
  rationale: φόροι son pagos debidos a un gobernante. Dado que el primer miembro ya usa 'tributo', aquí 'impuestos' aclara la obligación fiscal explícita y reproduce la distinción observada en el audit trail inglés.
theological_decisions:
- issue: Distinción entre tribute y taxes en un contexto real-monárquico
  english_pob_reading: Differentiate the first payment as 'tribute' and the second as 'taxes'
  chosen_spanish_reading: Distinguir entre 'tributo' en la primera cláusula y 'impuestos' en la segunda
  alternative_spanish_readings:
  - usar 'tributo' en ambas cláusulas
  - usar 'impuestos' en ambas cláusulas
  rationale: 'La distinción sigue la progresión del griego: primero un verbo general de entrega al rey y luego la mención explícita de φόρους. En español, ''tributo'' y ''impuestos'' preservan esa progresión sin borrar el matiz fiscal particular de la segunda cláusula.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés: se prefirió una forma más formal para γεωργοῦσιν (''cultivan la tierra''), se reflejó mejor la relación temporal de σπείρωσιν con ''cuando han sembrado'', y se tradujo el participio ἀναγκάζοντες de manera más directa como presión mutua. También se mantuvo la distinción entre ''tributo'' y ''impuestos'' en armonía con la lectura inglesa auditada.'
  spanish_consistency_notes:
  - Se mantuvo 'rey' para βασιλεῖ, evitando perífrasis innecesarias.
  - '''Cultivan la tierra'' conserva el registro sobrio y el campo semántico agrícola del original.'
  - '''Tributo'' e ''impuestos'' se usaron de modo diferenciado para no borrar la progresión fiscal del griego.'
  - El español evita calcos como 'traen' donde 'llevan' comunica mejor el movimiento hacia la autoridad superior en este contexto.
