id: ACT.14.15
reference: Acts 14:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ λέγοντες· Ἄνδρες, τί ταῦτα ποιεῖτε; καὶ ἡμεῖς ὁμοιοπαθεῖς ἐσμεν ὑμῖν ἄνθρωποι, εὐαγγελιζόμενοι ὑμᾶς ἀπὸ τούτων τῶν ματαίων ἐπιστρέφειν ἐπὶ ⸀θεὸν ζῶντα ὃς ἐποίησεν τὸν οὐρανὸν καὶ τὴν γῆν καὶ τὴν θάλασσαν καὶ πάντα τὰ ἐν αὐτοῖς·
base_translation:
  language: en
  yaml_path: translation/nt/acts/014/015.yaml
  text: and saying[a], “Men, why are you doing these things? We also are men with the same nature as you, bringing you good news to turn from these worthless things to the living God[c][b], who made the heaven and the earth and the sea and everything in them.”
  footnotes:
  - marker: a
    text: Or 'of like nature with you'; the phrase means that Paul and Barnabas share the same human condition as their hearers.
    reason: lexical_alternative
  - marker: b
    text: '''These worthless things'' refers contextually to futile pagan worship, including idols.'
    reason: cultural_note
  - marker: c
    text: Or 'the heavens'; Greek has singular 'heaven' in a stock creation formula echoing the language of Scripture.
    reason: lexical_alternative
translation:
  language: ko
  text: 「여러분, 왜 이런 일을 하십니까? 우리도 여러분과 같은 본성을 가진 사람일 뿐입니다. 우리는 여러분에게 복음을 전하여, 이 헛된 것들에서 떠나 살아 계신 하나님께로 돌아오게 하려는 것입니다 — 하늘과 땅과 바다와 그 안에 있는 모든 것을 지으신 분이십니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁμοιοπαθεῖς
  english_pob_choice: with the same nature as you
  chosen_korean: 여러분과 같은 본성을 가진
  alternatives_korean:
  - 여러분과 같은 성정을 가진
  - 여러분과 같이 약한 사람
  lexicon: BDAG
  rationale: 「같은 정념을 겪는」을 「같은 본성」으로 옮겨, 신성을 부인하는 핵심 선언이 분명히 들리도록 한다. 「약한 사람」(개역)으로 풀면 본문의 신학적 무게가 약화된다.
- source_word: ἀπὸ τούτων τῶν ματαίων ἐπιστρέφειν ἐπὶ θεὸν ζῶντα
  english_pob_choice: to turn from these worthless things to the living God
  chosen_korean: 이 헛된 것들에서 떠나 살아 계신 하나님께로 돌아오게
  alternatives_korean:
  - 이 헛된 우상에서 살아 계신 하나님께로 돌이키게
  lexicon: BDAG
  rationale: ματαίων을 「헛된 것들」로 직역해 70인역의 「우상=헛것」 어휘 계열(렘 2:5; 8:19)을 살린다.
theological_decisions:
- issue: 이방 청중을 향한 첫 자연신학 설교
  chosen_reading: 우리도 여러분과 같은 본성을 가진 사람일 뿐입니다… 하늘과 땅과 바다와 그 안에 있는 모든 것을 지으신 분이십니다.
  alternative_readings:
  - 우리도 너희와 같은 성정을 가진 사람이라…
  rationale: 유대 회당 청중이 없는 청중을 향한 바울의 첫 설교 단편. 창조주 선언으로 신학적 토대를 놓는 이 문장의 무게를 「지으신 분이십니다」로 합쇼체 종결하여 보존한다.
  doctrine_reference: 'DOCTRINE.md: natural-theology proclamation to pagan audience'
