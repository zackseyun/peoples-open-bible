revisions:
- from: Porque, cuando la guerra y las calamidades[a] caen sobre ellos, los sacerdotes deliberan entre sí dónde esconderse con ellos.
  to: Porque cuando la guerra y las calamidades vienen sobre ellos[a], los sacerdotes deliberan entre sí dónde esconderse con ellos.
  rationale: Se ajusta «caen sobre» a «vienen sobre» para alinearlo mejor con ἐπέλθῃ ἐπʼ αὐτά y con la decisión inglesa «come upon», y se elimina la coma tras «Porque» para una sintaxis española más natural. Se conserva la nota explicativa sobre el referente pronominal.
