id: MRK.10.21
reference: Mark 10:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ἐμβλέψας αὐτῷ ἠγάπησεν αὐτὸν καὶ εἶπεν αὐτῷ· Ἕν ⸀σε ὑστερεῖ· ὕπαγε ὅσα ἔχεις πώλησον καὶ δὸς ⸀τοῖς πτωχοῖς, καὶ ἕξεις θησαυρὸν ἐν οὐρανῷ, καὶ δεῦρο ἀκολούθει ⸀μοι.
base_translation:
  language: en
  yaml_path: translation/nt/mark/010/021.yaml
  text: 'And Jesus[a], looking at him, loved him and said to him, “One thing you lack: go, sell whatever you have and give to the poor, and you will have treasure in heaven; and come, follow me.”'
  footnotes:
  - marker: a
    text: Or, 'all that you have.' The Greek expression ὅσα ἔχεις can be rendered either 'whatever you have' or 'all that you have'; the context indicates the full scope of his possessions.
    reason: lexical_alternative
translation:
  language: ko
  text: 예수께서 그를 바라보시며 그를 사랑하시고 그에게 말씀하셨습니다. 「한 가지가 부족합니다. 가서 여러분이 가진 것을 다 팔아 가난한 자들에게 주십시오. 그러면 여러분이 하늘에서 보화를 얻을 것입니다. 그리고 와서 나를 따르십시오.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 「한 가지가 부족하다」(Ἕν σε ὑστερεῖ)의 직접성 보존
  chosen_reading: 한 가지가 부족합니다
  alternative_readings:
  - 네게 부족한 것이 한 가지 있다
  - 오직 한 가지가 모자란다
  rationale: 헬라어 본문은 부족함의 무게를 짧고 직접적으로 던진다. 한국 전통 번역의 「네게 부족한 것이 한 가지 있다」는 풀어쓰기로 무게를 약화한다. 합쇼체 직접 화법으로 옮겨 본문의 충격을 보존한다.
  doctrine_reference: 'DOCTRINE.md: render the source''s strongest plain meaning'
