- from: Así que Samuel volvió detrás de Saúl[a], y Saúl se postró ante Yahvé.
  to: Así que Samuel volvió tras Saúl[a], y Saúl se postró ante Yahvé.
  rationale: 'Se hace un ajuste menor de legibilidad y fidelidad idiomática: «tras Saúl» comunica mejor el hebreo אַחֲרֵי en esta secuencia narrativa que «detrás de Saúl», sin cambiar el sentido ni la decisión exegética principal. Se conserva la nota léxica sobre «adoró».'
