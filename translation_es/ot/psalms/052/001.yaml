translation:
  language: es
  text: Para el director del coro[a][b][c]. Un Maskil de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Al director del coro».
    reason: lexical_alternative
  - marker: b
    text: Hebreo Maskil, probablemente un término musical o literario; también puede entenderse como «un salmo instructivo» o «un canto contemplativo».
