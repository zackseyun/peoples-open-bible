base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/004/032.yaml
  text: But Menelaus[a], thinking that he had found a favorable opportunity, misappropriated some of the gold vessels of the temple and gave them to Andronicus[b], and others he had sold in Tyre and the surrounding cities.
  footnotes:
  - marker: a
    text: Or 'some gold objects' or 'certain golden articles.' The Greek term refers generally to gold items from the temple.
    reason: lexical_alternative
  - marker: b
    text: Or 'he happened to have sold others to Tyre and the surrounding cities.' The Greek expression may be rendered more literally, though the sense is that other items had already been sold there.
    reason: lexical_alternative
