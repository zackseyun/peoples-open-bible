review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y conserva la imaginería sacrificial/judicial: espada, sangre, grasa, riñones, sacrificio y gran matanza. También respeta la política de usar «Yahvé». Sin embargo, los marcadores de notas están invertidos respecto a su anclaje semántico: la nota [a] en «sangre» explica la cláusula final sin verbo expreso, mientras que la nota [b] en «Bosra» explica en realidad «machos cabríos». Esto rompe la trazabilidad del aparato y debe corregirse. Además, «está engordada» suena algo torpe para una espada; «ha sido cebada» o «está cebada» expresa mejor el pasivo metafórico sin perder fuerza.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «La espada de Yahvé está llena de sangre» y «una gran matanza en la tierra de Edom» funcionan bien. La principal mejora estilística es sustituir «está engordada» por «ha sido cebada» para una imagen más idiomática en español bíblico moderno. El resto del catálogo sacrificial es legible y fiel.
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יהוה -> «Yahvé» correctamente; זֶבַח -> «sacrificio»; טֶבַח -> «matanza»; אֱדוֹם -> «Edom». «Machos cabríos» preserva bien la especificidad de עַתּוּדִים, mejor incluso que el inglés principal. No hay conflictos terminológicos mayores.'
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están anclados a frases equivocadas.
    rationale: La nota sobre la cláusula hebrea sin verbo expreso debe anclarse a «Porque Yahvé tiene un sacrificio», no a «sangre». La nota léxica sobre «machos cabríos» debe anclarse a esa expresión, no a «Bosra». Así como está, el aparato induce a error y no cumple la disciplina de anclaje.
  - severity: medium
    issue: «Está engordada» suena poco natural aplicado a una espada.
    rationale: Aunque refleja el sentido de הֻדַּשְׁנָה, en español una espada no suele describirse como «engordada». «Ha sido cebada con grasa» conserva la metáfora sacrificial y mejora la legibilidad.
  revised_spanish_text: La espada de Yahvé está llena de sangre; ha sido cebada con grasa, con la sangre de corderos y machos cabríos[a], con la grasa de los riñones de carneros. Porque Yahvé tiene un sacrificio[b] en Bosra, y una gran matanza en la tierra de Edom.
  revised_footnotes:
  - marker: a
    text: «Machos cabríos» traduce un término más específico que significa machos de cabra.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Porque para Yahvé hay un sacrificio en Bosra». La cláusula hebrea no tiene verbo expreso y puede construirse de ambas maneras.'
    reason: alternative_reading
  revision_rationale: Se corrigieron los anclajes de las notas para que coincidan con las palabras/frases relevantes en el texto, y se mejoró «está engordada» a «ha sido cebada» por mayor naturalidad y fuerza idiomática en español sin perder la metáfora sacrificial del hebreo.
