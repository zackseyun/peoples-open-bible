lexical_decisions:
- source_word: וִיחִי
  english_pob_choice: that he should ... live
  chosen_spanish: que aún viva
  alternatives_spanish:
  - y viva
  - que pueda vivir
  lexicon: HALOT
  rationale: 'El jussivo/imperfecto expresa aquí una situación deseada o pensada como resultado: una vida que continúe. En español, «que aún viva» conserva bien ese matiz modal y la continuidad del verbo sin sonar forzado.'
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - todavía siga
  lexicon: HALOT
  rationale: עוֹד refuerza la idea de continuidad. «Aún» transmite de manera natural la persistencia temporal en español.
- source_word: לָנֶצַח
  english_pob_choice: on forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  lexicon: HALOT
  rationale: La expresión indica permanencia indefinida. «Por siempre» comunica esa duración total en español de forma clara y digna.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  lexicon: HALOT
  rationale: Negación directa y estándar.
- source_word: יִרְאֶה
  english_pob_choice: see
  chosen_spanish: vea
  alternatives_spanish:
  - contemple
  - experimente
  lexicon: HALOT
  rationale: En este contexto de muerte, «ver» conserva la imagen hebrea de no llegar a experimentar o atravesar la realidad señalada. El subjuntivo encaja con la secuencia dependiente de «que».
- source_word: הַשָּׁחַת
  english_pob_choice: the Pit
  chosen_spanish: el Sepulcro
  alternatives_spanish:
  - el Pozo
  - la Fosa
  - el Sepulcro[a]
  lexicon: HALOT
  rationale: 'El término hebreo admite varias imágenes funerarias: pozo, fosa, sepulcro o corrupción. En español, «Sepulcro» comunica con claridad el ámbito de la muerte, pero mantiene un poco más de amplitud poética que una equivalencia demasiado técnica. Se conserva la tensión interpretativa con una nota sobre alternativas.'
theological_decisions:
- issue: Sentido de שחת en contexto de muerte
  english_pob_reading: the Pit
  chosen_spanish_reading: el Sepulcro
  alternative_spanish_readings:
  - la Fosa
  - la corrupción
  - el Pozo
  rationale: La POB inglesa opta por una imagen concreta pero amplia («the Pit») para no cerrar prematuramente el hebreo. En español, «el Sepulcro» funciona como imagen comprensible de la muerte y sigue permitiendo el trasfondo poético de descenso al lugar de los muertos. No se traduce como «corrupción» en el texto principal porque esa opción desplaza el foco hacia descomposición física más que hacia la escena poética de no bajar a la muerte.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Alineado con la revisión más reciente sin cambios sustanciales; se mantiene la lectura de perpetuidad y la imagen de muerte amplia para שחת, con una solución española natural y fiel al audit trail inglés.
  spanish_consistency_notes:
  - Se preserva «aún» para עוֹד y «por siempre» para לָנֶצַח, evitando suavizar la continuidad temporal.
  - Se evita sustituir la imagen funeraria por una paráfrasis doctrinal; «el Sepulcro» busca equilibrio entre claridad y amplitud poética.
  - El subjuntivo «viva/vea» refleja adecuadamente el valor modal dependiente del hebreo.
