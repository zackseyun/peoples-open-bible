translation:
  language: es
  text: Los demás hechos de Joacaz, y todo lo que hizo, y su poder[b], ¿no están escritos en el Libro de las Crónicas[a] de los reyes de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los anales de los reyes de Israel».'
    reason: alternative_reading
  - marker: b
    text: «Poder» también puede entenderse como «valentía», «fuerza» o «hazañas poderosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Los demás
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: En español, la fórmula regnal fluye mejor con «Los demás» que con un calco de «Now the rest of». Conserva el sentido de los hechos restantes del rey sin añadir información.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - cosas
  - asuntos
  lexicon: HALOT
  rationale: En esta fórmula histórica, דִּבְרֵי se refiere a los hechos o asuntos registrados del rey. «Hechos» es natural en español y mantiene el alcance amplio del término.
- source_word: יְהוֹאָחָז
  english_pob_choice: Jehoahaz
  chosen_spanish: Joacaz
  alternatives_spanish:
  - Jehoacaz
  - Joaquaz
  lexicon: convención onomástica bíblica en español
  rationale: Se adopta la forma bíblica española tradicional «Joacaz», que corresponde al nombre hebreo y es reconocible para lectores de Biblia en español.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y todo lo que realizó
  lexicon: HALOT
  rationale: Es una traducción directa y natural del relativo inclusivo, preservando el alcance total del verbo hebreo sin sobreespecificar.
- source_word: וּגְבוּרָת֑וֹ
  english_pob_choice: and his might
  chosen_spanish: y su poder
  alternatives_spanish:
  - y su valentía
  - y sus proezas
  - y su fuerza
  lexicon: HALOT
  rationale: גְּבוּרָה puede abarcar poder, valentía o hazañas poderosas. «Poder» conserva la amplitud del término en español y evita restringirlo solo a valor militar.
- source_word: הֲלוֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no están
  alternatives_spanish:
  - ¿no es así que están
  - ¿acaso no están
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica típica de los resúmenes reales. «¿No están» reproduce de forma natural ese valor interrogativo.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: «Escritos» mantiene la imagen textual del participio pasivo y encaja con la referencia archivística final.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: Aunque el hebreo usa literalmente «sobre», en español la fórmula archivística se expresa naturalmente con «en el Libro».
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: las Crónicas
  alternatives_spanish:
  - los anales
  - los acontecimientos de los días
  lexicon: HALOT
  rationale: En esta cita de fuente real, el sintagma apunta a una obra cronística o anales. «Crónicas» conserva la convención bíblica y la referencia documental.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - de parte de los reyes de Israel
  lexicon: HALOT
  rationale: El ל aquí marca relación posesiva/titular. «De los reyes de Israel» reproduce con naturalidad el encabezado del registro histórico.
theological_decisions:
- issue: Título divino no presente
  english_pob_reading: No divine-name masking issue in this verse
  chosen_spanish_reading: No aplica
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El versículo no contiene יהוה en el texto citado, así que no hay decisión de traducción del nombre divino en la redacción principal.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el contexto auditado de la POB en inglés para una traducción equivalente óptima, sin cambios de sentido respecto del texto fuente. La formulación española ajusta la sintaxis para sonar natural en registro bíblico moderno y conserva la cita documental final como fórmula histórica.
  spanish_consistency_notes:
  - Se mantuvo el nombre bíblico español «Joacaz» para coherencia con la tradición hispana.
  - Se tradujo דִּבְרֵי como «hechos» en el cuerpo y se preservó la alternativa documental «anales» en nota, coherente con el audit trail inglés.
  - Se eligió «poder» para גְּבוּרָה por su amplitud semántica; la nota conserva las alternativas documentadas en la POB inglesa.
  - La estructura retórica final se mantiene como pregunta, sin convertirla en afirmación.
  - «Libro de las Crónicas» conserva la convención titular establecida en español bíblico, aunque la nota aclara la alternativa «anales».
