  text: אַנְשֵׁ֥י רָכִ֛יל הָ֥יוּ בָ֖/ךְ לְמַ֣עַן שְׁפָךְ דָּ֑ם וְ/אֶל הֶֽ/הָרִים֙ אָ֣כְלוּ בָ֔/ךְ זִמָּ֖ה עָשׂ֥וּ בְ/תוֹכֵֽ/ךְ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/022/009.yaml
  text: Men of slander were in you in order to shed blood[a]; and on the mountains they ate[c][b]; they committed lewdness in your midst.
  footnotes:
  - marker: a
    text: Or 'men of slander,' 'talebearers,' or 'informers.' The Hebrew term can refer to trafficking in accusations or defamation.
    reason: lexical_alternative
  - marker: b
    text: That is, they participated in illicit meals at the high places, likely associated with idolatrous worship.
    reason: cultural_note
  - marker: c
    text: Or 'wickedness' or 'sexual depravity.' The Hebrew term often carries a sense of shameless moral outrage, frequently sexual.
    reason: lexical_alternative
