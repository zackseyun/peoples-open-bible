translation:
  language: es
  text: 'Entonces Yahvé dijo[a]: «Borraré al hombre, a quien he creado, de sobre la faz de la tierra; desde el hombre hasta el ganado, hasta el reptil y hasta las aves de los cielos[c], porque me pesa[b] haberlos hecho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jehová». Aquí se conserva «Yahvé» según el uso del proyecto para el nombre divino.
    reason: lexical_alternative
  - marker: b
    text: O «siento pesar de haberlos hecho». El hebreo expresa pesar o regret atribuido a Dios; esta traducción conserva esa tensión sin insinuar culpa moral en Dios.
    reason: theological_note
  - marker: c
    text: Lit. «aves de los cielos»; también puede traducirse «aves del cielo». La expresión sigue de cerca el hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el convenio del proyecto para el nombre divino, conservando la forma propia en vez de ocultarla con un equivalente funcional. 'Yahvé' es la opción estándar del POB en español para YHWH.
- source_word: אֶמְחֶה
  english_pob_choice: I will blot out
  chosen_spanish: Borraré
  alternatives_spanish:
  - Borraré por completo
  - Extirparé
  - Eliminaré
  lexicon: HALOT
  rationale: El hebreo transmite la idea de borrar o limpiar de la existencia. En español, 'borraré' comunica bien esa acción de quitar/aniquilar sin perder la imagen básica ni volverla demasiado interpretativa.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la raza humana
  - el ser humano
  lexicon: HALOT
  rationale: Se conserva el valor representativo y colectivo del singular masculino, como en el audit trail inglés. 'El hombre' también prepara la repetición de אָדָם en la frase siguiente y mantiene el juego léxico.
- source_word: אֲשֶׁר בָּרָאתִי
  english_pob_choice: whom I have created
  chosen_spanish: a quien he creado
  alternatives_spanish:
  - que he creado
  - al que he creado
  lexicon: HALOT
  rationale: '''A quien'' refleja el antecedente personal en español y conserva la cláusula relativa sin añadir paráfrasis. El presente perfecto reproduce bien la acción completa con relevancia vigente.'
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: from the face of the ground
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de sobre la faz del suelo
  - de sobre la superficie de la tierra
  lexicon: HALOT
  rationale: '''Faz'' mantiene el hebraísmo de ''face of''. ''Tierra'' es una opción natural en español para אֲדָמָה en este contexto, aunque ''suelo'' o ''tierra'' podrían capturar mejor la idea física de ground; aquí ''tierra'' suena más bíblico y legible.'
- source_word: מֵאָדָם עַד בְּהֵמָה עַד רֶמֶשׂ וְעַד עוֹף הַשָּׁמָיִם
  english_pob_choice: from man to livestock to creeping things and to the birds of the heavens
  chosen_spanish: desde el hombre hasta el ganado, hasta el reptil y hasta las aves de los cielos
  alternatives_spanish:
  - desde el hombre hasta los animales domésticos, hasta las criaturas que se arrastran y hasta las aves de los cielos
  - desde el hombre hasta el ganado, hasta las cosas que se arrastran y hasta las aves del cielo
  lexicon: HALOT
  rationale: Se conserva la enumeración escalonada. 'Ganado' corresponde bien a בְּהֵמָה en este pasaje; 'reptil' funciona aquí como una manera compacta de expresar רֶמֶשׂ, aunque 'criaturas que se arrastran' sería más explícito. 'Aves de los cielos' sigue de cerca la expresión hebrea.
- source_word: נִחַמְתִּי
  english_pob_choice: I regret
  chosen_spanish: me he arrepentido
  alternatives_spanish:
  - me arrepiento
  - siento pesar
  - me pesa
  lexicon: HALOT
  rationale: El hebreo expresa una pena o arrepentimiento figurado atribuido a Dios. En español, 'me he arrepentido' preserva esa tensión antropopática de forma clara; aun así, se documenta la alternativa de 'siento pesar' para no suavizar indebidamente el sentido.
- source_word: כִּי עֲשִׂיתִם
  english_pob_choice: that I have made them
  chosen_spanish: de haberlos hecho
  alternatives_spanish:
  - de haberles hecho
  - de haberlos creado
  lexicon: HALOT
  rationale: El sufijo plural se refiere al conjunto de seres mencionados. 'Haberlos hecho' resume fielmente la frase causal sin introducir un objeto distinto; además evita redundancia en español tras 'he creado'.
theological_decisions:
- issue: Cómo expresar el arrepentimiento/divino pesar en נִחַמְתִּי
  english_pob_reading: for I regret that I have made them
  chosen_spanish_reading: porque me he arrepentido de haberlos hecho
  alternative_spanish_readings:
  - porque siento pesar de haberlos hecho
  - porque me pesa haberlos hecho
  rationale: 'Se preserva la tensión teológica del hebreo: se atribuye a Yahvé un lenguaje de pesar o arrepentimiento en forma antropopática. No se lo suaviza a un mero cambio de decisión, para mantener la franqueza del texto fuente y la nota doctrinal del POB.'
  doctrine_reference: Translation philosophy §3
- issue: Valor colectivo de הָאָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: Aunque el término puede ser colectivo, se conserva el singular masculino representativo para reflejar el texto hebreo y su repetición con אָדָם en la cláusula siguiente. Esto mantiene la tensión entre singular y colectivo sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: 'Se siguió el último pase revisado sin cambios sustantivos (latest_revision_pass: unchanged=true). La redacción española se ajustó al audit trail inglés y al hebreo, manteniendo la enumeración, el valor de אָדָם y la tensión de נִחַמְתִּי. No se introdujeron enmiendas textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - 'Se conservó la enumeración ascendente del hebreo: hombre → ganado → reptil → aves de los cielos.'
  - «El hombre» reproduce el singular representativo de אָדָם y evita neutralizarlo en exceso.
  - «De sobre la faz de la tierra» mantiene el hebraísmo de פני האדמה con español natural.
  - La nota de arrepentimiento se ancló en el mismo punto donde el español requiere una alternativa interpretativa, sin duplicar marcadores.
