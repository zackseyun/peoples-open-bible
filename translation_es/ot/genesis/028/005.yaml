translation:
  language: es
  text: Así Isaac envió a Jacob, y él fue a Padán-aram, a Labán hijo de Betuel, el arameo[a], el hermano de Rebeca, la madre de Jacob y de Esaú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo una tradición inglesa más antigua, «el sirio». El hebreo denota más específicamente a un arameo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent Jacob away
  chosen_spanish: envió a Jacob
  alternatives_spanish:
  - envió a Jacob de lejos
  - despachó a Jacob
  - lo envió
  lexicon: HALOT
  rationale: En este contexto narrativo, שׁלח expresa enviar con salida efectiva; en español, «envió» comunica con naturalidad la acción, y el verbo de movimiento siguiente («fue») conserva la partida implícita sin añadir una paráfrasis más fuerte de lo que exige el hebreo.
- source_word: וַיֵּלֶךְ
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - y fue
  - y se fue
  - viajó
  lexicon: HALOT
  rationale: הלך es el verbo básico de ir. «Fue» mantiene la secuencia simple del hebreo y suena natural en español, sin cargar el verso con un giro más interpretativo.
- source_word: פַּדֶּנָה אֲרָם
  english_pob_choice: Paddan-aram
  chosen_spanish: Padán-aram
  alternatives_spanish:
  - Padán Aram
  - Padán-aram
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado, con adaptación gráfica al español mediante acentuación. No se traduce el nombre propio, porque el hebreo presenta un lugar designado y no una expresión descriptiva ordinaria.
- source_word: בֶּן בְּתוּאֵל
  english_pob_choice: son of Bethuel
  chosen_spanish: hijo de Betuel
  alternatives_spanish:
  - hijo de Bethuel
  - descendiente de Betuel
  lexicon: HALOT
  rationale: La construcción filial es directa y se rinde de forma estándar en español. «Hijo de Betuel» mantiene la relación genealógica sin añadir matices ajenos.
- source_word: הָאֲרַמִּי
  english_pob_choice: the Aramean
  chosen_spanish: el arameo
  alternatives_spanish:
  - el arameo
  - el sirio
  lexicon: HALOT
  rationale: אֲרַמִּי denota específicamente a un arameo. Se evita «sirio» porque es menos preciso históricamente y puede borrar la distinción étnica del hebreo.
- source_word: אֲחִי רִבְקָה
  english_pob_choice: the brother of Rebekah
  chosen_spanish: hermano de Rebeca
  alternatives_spanish:
  - el hermano de Rebeca
  - Rebeca's brother
  lexicon: HALOT
  rationale: La relación de parentesco se expresa naturalmente en español con «hermano de Rebeca». El artículo se omite por estilo sintáctico, sin perder el sentido del constructo hebreo.
- source_word: אֵם יַעֲקֹב וְעֵשָׂו
  english_pob_choice: the mother of Jacob and Esau
  chosen_spanish: madre de Jacob y de Esaú
  alternatives_spanish:
  - la madre de Jacob y Esaú
  - madre de Jacob y Esaú
  lexicon: HALOT
  rationale: Se conserva la apposición explicativa sobre Rebeca y la coordinación completa de los dos nombres. «Madre de Jacob y de Esaú» refleja fielmente la relación y evita ambigüedad.
theological_decisions:
- issue: Identidad étnica de Labán (Arameo vs. Sirio)
  english_pob_reading: The Hebrew more specifically denotes an Aramean, though older English tradition says 'the Syrian.'
  chosen_spanish_reading: el arameo
  alternative_spanish_readings:
  - el sirio
  rationale: 'Se sigue la precisión del hebreo y del audit trail inglés: אֲרַמִּי designa a un arameo. «Sirio» se reservaría solo si hubiera una justificación textual o traductológica especial, que aquí no existe.'
  doctrine_reference: Precisión histórica y etnolingüística del texto bíblico
translation_notes:
  revision_awareness: El pasaje fue revisado en el ciclo más reciente sin cambios sustantivos; la presente redacción mantiene la lectura de alta concordancia y conserva la única nota léxica relevante sobre אֲרַמִּי.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «Padán-aram» como transliteración estable del topónimo.
  - «Arameo» se conserva de forma consistente para אֲרַמִּי, evitando «sirio» salvo nota textual.
  - La coordinación final («Jacob y de Esaú») sigue el orden del hebreo y mejora la claridad en español.
