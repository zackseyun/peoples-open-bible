    text: O «se congregarán». El hebreo expresa que serán reunidos juntos.
    reason: lexical_alternative
  - marker: b
    text: O «un solo jefe» o «un solo líder». El hebreo dice literalmente «una sola cabeza».
    reason: lexical_alternative
  - marker: c
    text: «De la tierra» puede referirse a salir del exilio o a un ascenso restaurado a la tierra; el hebreo deja abierta la matización exacta.
    reason: alternative_reading
  - marker: d
    text: Jezreel es tanto un nombre de lugar como un nombre teológicamente cargado en Oseas, con ecos de dispersión y siembra.
    reason: cultural_note
  revision_rationale: Se corrige una construcción española claramente defectuosa («un solo cabeza» → «una sola cabeza»), se mejora la naturalidad sin perder la voz del hebreo («serán reunidos juntamente»), y se restaura la nota cultural sobre Jezreel que forma parte del rastro auditado del POB inglés. También se ajustan las notas para que reflejen mejor las alternativas léxicas y el anclaje exacto en el texto.
