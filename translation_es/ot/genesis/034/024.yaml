translation:
  language: es
  text: Y todos los que salían por la puerta[a] de su ciudad escucharon[b] a Hamor y a Siquem, su hijo, y todo varón, todos los que salían por la puerta de su ciudad, fue circuncidado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literal: ''todos los que salían por la puerta de su ciudad'', un modismo para los hombres del pueblo o ciudadanos que participaban en la vida pública.'
    reason: cultural_note
  - marker: b
    text: O 'hicieron caso de' Hamor y Siquem. El hebreo también puede implicar no solo oír, sino responder favorablemente a su propuesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ אֶל
  english_pob_choice: listened to
  chosen_spanish: escucharon[a]
  alternatives_spanish:
  - oyeron
  - hicieron caso a
  lexicon: HALOT
  rationale: El hebreo שׁמע אֶל suele significar 'escuchar a' o 'hacer caso a'. Aquí el contexto muestra una respuesta favorable a la propuesta de Hamor y Siquem, por lo que 'escucharon' conserva la relación verbal sin imponer del todo 'obedecieron', que sería más interpretativo.
- source_word: כָּל יֹצְאֵי שַׁעַר עִירוֹ
  english_pob_choice: all who went out of the gate of his city
  chosen_spanish: todos los que salían por la puerta de su ciudad
  alternatives_spanish:
  - todos los que salían de la puerta de su ciudad
  - los habitantes que salían por la puerta de su ciudad
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de la expresión hebrea. En español, 'salían por la puerta de su ciudad' preserva el giro idiomático y el sentido de los ciudadanos varones que participaban de la vida pública.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  - hijo suyo
  lexicon: HALOT
  rationale: Es una filiación directa y simple. En español, 'Siquem, su hijo' mantiene la relación sin recargar la frase.
- source_word: וַיִּמֹּלוּ
  english_pob_choice: was circumcised
  chosen_spanish: fueron circuncidados
  alternatives_spanish:
  - se circuncidaron
  - quedaron circuncidados
  lexicon: HALOT
  rationale: 'El verbo nifal tiene sentido pasivo/reflexivo. Dado que el sujeto inmediato es plural, el español natural y fiel es plural: ''fueron circuncidados''.'
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - cada varón
  - todos los varones
  lexicon: HALOT
  rationale: זָכָר significa 'macho/varón', y aquí la referencia es masculina y corporal. 'Todo varón' reproduce bien la precisión léxica y permite un encaje natural con el verbo plural de la oración.
- source_word: שַׁעַר עִירוֹ
  english_pob_choice: the gate of his city
  chosen_spanish: la puerta de su ciudad
  alternatives_spanish:
  - la puerta de su ciudad
  - la puerta de la ciudad de él
  lexicon: HALOT
  rationale: En español, 'puerta' comunica de manera más directa el lugar de reunión y administración que la expresión 'puerta' conserva del hebreo; no se sustituye por una paráfrasis como 'los ciudadanos' para no perder la metáfora espacial.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto hebreo y el auditorio crítico en inglés: se conserva la repetición de ''la puerta de su ciudad'', se evita suavizar el verbo de respuesta de שמע אֶל más allá de ''escucharon'', y se resuelve la concordancia del cierre con un plural natural (''fueron circuncidados'') acorde con וַיִּמֹּלוּ.'
  spanish_consistency_notes:
  - Se mantiene 'Hamor' y 'Siquem' como transliteraciones consistentes con la tradición del proyecto.
  - Se conserva 'varón' para reflejar la precisión sexual de זָכָר sin sustituirlo por 'hombre'.
  - La repetición de la frase idiomática se mantiene intencionalmente para reflejar el hebreo y su valor auditivo/retórico.
