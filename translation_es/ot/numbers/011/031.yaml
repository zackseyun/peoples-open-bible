    text: 'O: «un espíritu salió de Yahvé»; aquí el contexto favorece claramente «viento», porque es lo que trae las codornices del mar.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como a dos codos sobre la faz de la tierra». La cláusula puede describir la altura a la que estaban extendidas o volaban las codornices, más que su profundidad sobre el suelo.'
    reason: alternative_reading
  revision_rationale: La revisión corrige el anclaje de la nota [b] para que coincida con la cláusula que realmente explica, y pule levemente la naturalidad del español con «del mar», «hizo venir» y «alrededor del campamento», sin cambiar el sentido documentado por la auditoría inglesa ni las decisiones léxicas principales.
