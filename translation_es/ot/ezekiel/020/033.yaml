translation:
  language: es
  text: Como vivo[a], declara el Señor Dios, Yahvé, ciertamente con mano fuerte, con brazo extendido y con furor derramado, reinaré[b] sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tan ciertamente como vivo». La fórmula funciona como juramento solemne.
    reason: lexical_alternative
  - marker: b
    text: O «gobernaré sobre ustedes» o «seré rey sobre ustedes». El verbo hebreo tiene fuerza real.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָ֕נִי
  english_pob_choice: As I live
  chosen_spanish: Como vivo
  alternatives_spanish:
  - Tan ciertamente como vivo
  - Vivo yo
  lexicon: HALOT
  rationale: Es una fórmula de juramento profético. En español, «Como vivo» conserva la brevedad y el valor juratorio del hebreo sin añadir una paráfrasis innecesaria.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: «נְאֻם» introduce una declaración solemne; «declara» es natural y fiel. Se usa «Señor Yahvé» para reflejar el título compuesto sin ocultar el Nombre divino, conforme al criterio del proyecto.
- source_word: אִם לֹא
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - seguramente
  - de veras
  lexicon: HALOT
  rationale: En contexto de juramento, la partícula no introduce condición literal sino énfasis asseverativo. «Ciertamente» comunica bien esa fuerza en español.
- source_word: בְּיָד חֲזָקָה
  english_pob_choice: with a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con una mano fuerte
  - con mano poderosa
  lexicon: HALOT
  rationale: La imagen idiomática se conserva con una construcción natural en español y paralela al texto fuente.
- source_word: וּבִזְרֹעַ נְטוּיָה
  english_pob_choice: and an outstretched arm
  chosen_spanish: con brazo extendido
  alternatives_spanish:
  - y con un brazo extendido
  - con brazo alargado
  lexicon: HALOT
  rationale: «Brazo extendido» es la equivalencia más directa y digna para la imagen bíblica; mantiene el paralelismo con «mano fuerte».
- source_word: וּבְחֵמָה שְׁפוּכָה
  english_pob_choice: and with wrath poured out
  chosen_spanish: con furor derramado
  alternatives_spanish:
  - con ira derramada
  - con furia derramada
  lexicon: HALOT
  rationale: «חֵמָה» puede ser «ira/furor/furia». Se eligió «furor» para sostener el registro solemne del pasaje, y «derramado» preserva la imagen de algo vertido o desatado.
- source_word: אֶמְלֹךְ עֲלֵיכֶם
  english_pob_choice: I will reign over you
  chosen_spanish: reinaré sobre ustedes
  alternatives_spanish:
  - gobernaré sobre ustedes
  - seré rey sobre ustedes
  lexicon: HALOT
  rationale: Se conserva la fuerza real del verbo מלך con «reinaré», que es más preciso que «gobernaré» y más natural que una construcción perifrástica.
theological_decisions:
- issue: Representación del Nombre divino en la fórmula juratoria y el título compuesto
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: El hebreo contiene explícitamente יְהוִה. Conforme al criterio del proyecto, se preserva «Yahvé» en el texto principal. «Señor» refleja אֲדֹנָי como título reverencial, evitando una solución que oculte el Nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Fuerza de la clausula final: realeza afirmada sobre un pueblo resistente'
  english_pob_reading: I will reign over you
  chosen_spanish_reading: reinaré sobre ustedes
  alternative_spanish_readings:
  - gobernaré sobre ustedes
  - seré rey sobre ustedes
  rationale: 'El verbo hebreo expresa realeza, no solo administración. «Reinaré» conserva la dimensión teológica del pasaje: Yahvé afirma su soberanía de manera inexorable, junto con la imaginería de juicio.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se respetó el valor juratorio de חַי אָ֕נִי, el énfasis de אִם לֹא como asseveración, la imaginería exódica de mano/brazo, y la fuerza real de מלך. No se requirieron revisiones adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto para יְהוָה.
  - Se emplea «Señor» para reflejar אֲדֹנָי como título, con mayúscula reverencial.
  - Se mantiene el plural de trato «ustedes» para un español amplio y contemporáneo.
  - «Furor» se eligió por registro solemne; «ira» o «furia» quedan como alternativas documentadas.
