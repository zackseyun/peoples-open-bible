review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la súplica doble de protección, conserva «Yahvé» para יְהוָה, mantiene el singular explícito de «hombre violento» para אִישׁ חֲמָסִים, y comunica adecuadamente la intención hostil de חָשְׁבוּ לִדְחוֹת. Sin embargo, la distribución de las notas no sigue el rastro inglés: la nota [b] del inglés corresponde a la cláusula final («quienes han ideado derribar mis pasos»), no al segundo verbo «protégeme». Además, «mis pasos» es posible, pero el expediente inglés prefirió el matiz más concreto «mis pies»; en español conviene respetarlo o al menos reflejar la alternativa en nota.'
  spanish_quality_summary: El español es claro, natural y digno. «Guárdame, oh Yahvé» y «del hombre violento» suenan bien. No obstante, la nota [b] actual introduce una explicación no respaldada por el audit trail inglés y omite la alternativa textual significativa de la última cláusula. También mejora la precisión usar «mis pies», que encaja bien con «hacer tropezar» y preserva mejor la imagen concreta del hebreo.
  glossary_alignment: 'Alineado en lo principal con la terminología del proyecto: יְהוָה → «Yahvé», אִישׁ → «hombre», y un verbo fuerte de protección para נצר. «Impío» es aceptable para רָשָׁע en singular genérico. La única desalineación relevante es de aparato: la nota [b] debería documentar la alternativa de אֲשֶׁר חָשְׁבוּ לִדְחוֹת פְּעָמָי, no una mera sinonimia entre los dos verbos de protección.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada al verbo equivocado y documenta una alternativa no presente en el audit trail inglés.
    rationale: La nota inglesa [b] corresponde a la cláusula final («Or 'who have devised to overthrow my steps.'»), no a תִּנְצְרֵנִי. En español debe preservarse esa alternativa significativa en el lugar pertinente.
  - severity: low
    issue: «Mis pasos» es defendible, pero «mis pies» preserva mejor la imagen concreta favorecida por el POB inglés.
    rationale: El hebreo פְּעָמַי puede denotar pasos/ pies según contexto; dado que el POB justificó «my feet» por la fuerza físico-metafórica con דחה, conviene reflejar ese mismo énfasis en español.
  revised_spanish_text: Guárdame[a], oh Yahvé, de las manos del impío; protégeme del hombre violento, que ha planeado hacer tropezar mis pies[b].
  revised_footnotes:
  - marker: a
    text: O «de la mano del impío». El singular hebreo puede leerse de manera individual o colectiva.
    reason: lexical_alternative
  - marker: b
    text: O «que han ideado derribar mis pasos».
    reason: lexical_alternative
  revision_rationale: 'Se conserva la redacción principal con un ajuste menor: «mis pies» en lugar de «mis pasos» para alinearse mejor con la decisión léxica del POB inglés y con la imagen concreta del hebreo. Se corrige el aparato crítico trasladando la nota [b] a la cláusula final y haciendo que refleje la alternativa documentada en el audit trail inglés, en vez de una explicación nueva sobre la sinonimia de los verbos de protección.'
