translation:
  language: es
  text: Y del aceite, el sacerdote verterá sobre la palma de su propia mano izquierda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «sobre la palma del sacerdote, la izquierda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - Y desde
  - Y de una parte de
  lexicon: HALOT
  rationale: El hebreo combina la conjunción con מן, que indica procedencia. En español, "Y de" conserva la secuencia ritual y la idea de origen sin agregar matices interpretativos innecesarios.
- source_word: הַ/שֶּׁמֶן
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el óleo
  - el aceite consagratorio
  lexicon: HALOT
  rationale: '"שֶׁמֶן" en este contexto ritual es aceite; "óleo" es más eclesiástico y menos directo. No se explicita "consagratorio" en el texto, aunque el contexto lo presupone.'
- source_word: יִצֹק
  english_pob_choice: shall pour
  chosen_spanish: derramará
  alternatives_spanish:
  - verterá
  - echará
  lexicon: HALOT
  rationale: El yiqtol funciona como instrucción ritual futura. "Derramará" comunica la acción de verter líquido con naturalidad en español y mantiene el carácter procedimental.
- source_word: הַ/כֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote ministro
  - el presbítero
  lexicon: HALOT
  rationale: '"כֹּהֵן" en el sistema levítico se refiere al sacerdote cultual. "Sacerdote" es el equivalente más claro y no introduce matices denominacionales ajenos.'
- source_word: עַל
  english_pob_choice: onto
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre la
  lexicon: HALOT
  rationale: Para un líquido derramado sobre una superficie, "sobre" expresa adecuadamente la dirección del gesto ritual en español.
- source_word: כַּף
  english_pob_choice: the palm
  chosen_spanish: la palma
  alternatives_spanish:
  - el hueco
  - la mano
  lexicon: HALOT
  rationale: '"כַּף" aquí designa la palma o concavidad de la mano. "Palma" es la opción más precisa y natural.'
- source_word: הַ/כֹּהֵן הַ/שְּׂמָאלִית
  english_pob_choice: his own left hand
  chosen_spanish: de su propia mano izquierda
  alternatives_spanish:
  - de su propia palma izquierda
  - de la palma izquierda del sacerdote
  lexicon: HALOT
  rationale: El hebreo dice literalmente "la palma del sacerdote, la izquierda [una]". Siguiendo el audit trail inglés, se aclara como "su propia mano izquierda" para evitar una repetición torpe y conservar el referente al sacerdote; "mano" es más idiomática en español que repetir "palma".
translation_notes:
  revision_awareness: El inglés POB revisó la formulación desde "the priest's left hand" a "his own left hand" para reflejar con más naturalidad el referente del hebreo y evitar una repetición incómoda. La versión española sigue esa misma decisión al explicitar "su propia mano izquierda".
  spanish_consistency_notes:
  - Se mantiene "sacerdote" para כֹּהֵן en el marco levítico.
  - '"Aceite" se usa sin adjetivar, como en el texto base, porque el contexto cultual ya delimita el referente.'
  - '"Palma" se conserva en la nota literal para respetar la precisión del hebreo, mientras el texto principal prioriza fluidez española.'
