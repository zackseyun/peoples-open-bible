revisions:
- from: ¿No están ellos más allá del Jordán[a], detrás del camino de la entrada del sol[b], en la tierra de los cananeos que habitan en el Arabá, frente a Gilgal, junto a las encinas de Moré[c]?
  to: ¿No están más allá del Jordán[a], detrás del camino de la puesta del sol[b], en la tierra de los cananeos que habitan en el Arabá, frente a Gilgal, junto a los robles de Moré[c]?
  rationale: 'Se hacen ajustes menores para mejorar la naturalidad y coherencia del español sin apartarse del hebreo ni del rastro de auditoría inglés: se omite el pronombre explícito innecesario, se cambia ‘entrada del sol’ por ‘puesta del sol’ para un español más idiomático conservando la imagen, se alinea la nota b con el texto revisado, y se reemplaza ‘encinas’ por ‘robles’ como opción más clara y neutral, manteniendo la alternativa botánica en nota.'
