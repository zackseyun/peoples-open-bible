translation:
  language: es
  text: Esto será para ustedes un estatuto perpetuo[a], para hacer expiación por los hijos de Israel[b] por todos sus pecados[c], una vez al año. Y él hizo como Yahvé mandó a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «norma perpetua». «Estatuto» conserva mejor el valor jurídico-ritual de חֻקָּה.
    reason: lexical_alternative
  - marker: b
    text: O «para los israelitas» o «para el pueblo de Israel». Se mantiene «hijos de Israel» para reflejar la forma hebrea.
    reason: lexical_alternative
  - marker: c
    text: O «de todos sus pecados», resaltando el matiz de limpieza presente en la expresión hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה זֹּאת
  english_pob_choice: This shall be
  chosen_spanish: Esto será
  alternatives_spanish:
  - Y esto será
  - Y será esto
  lexicon: WLC + HALOT
  rationale: En español legal y cultual, «Esto será» conserva el tono normativo del hebreo sin volverse arcaico. El deíctico «esto» mantiene la referencia inmediata al rito ya descrito.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - para ustedes mismos
  lexicon: WLC + HALOT
  rationale: La frase aplica la orden a la comunidad destinataria. «Para ustedes» es natural en español general y conserva el valor inclusivo del plural de segunda persona sin regionalismos marcados.
- source_word: לְחֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: un estatuto perpetuo
  alternatives_spanish:
  - una norma perpetua
  - un decreto perpetuo
  - un estatuto para siempre
  lexicon: WLC + HALOT
  rationale: «חֻקָּה» es una disposición fija, normativa; «estatuto» en español bíblico contemporáneo comunica bien esa fijación jurídica. «Perpetuo» preserva la fuerza durativa de עוֹלָם mejor que una paráfrasis más libre.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer expiación ritual
  - para expiar
  - para reconciliar
  lexicon: WLC + HALOT
  rationale: El verbo hebreo en contexto sacerdotal apunta al acto ritual de expiación. «Hacer expiación» es la forma más directa y auditable en español; evita sustituir la categoría cultual por una explicación más amplia no explicitada aquí.
- source_word: עַל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: por los hijos de Israel
  alternatives_spanish:
  - por los israelitas
  - por el pueblo de Israel
  - por los hijos de Israel
  lexicon: WLC + HALOT
  rationale: Se conserva la forma masculina plural del hebreo con «hijos de Israel», siguiendo la preferencia del proyecto por reflejar el ethnónimo tal como aparece. «Por» reproduce adecuadamente el alcance beneficiario de עַל en este contexto de expiación.
- source_word: מִכָּל חַטֹּאתָם
  english_pob_choice: for all their sins
  chosen_spanish: por todos sus pecados
  alternatives_spanish:
  - a causa de todos sus pecados
  - de todos sus pecados
  - desde todos sus pecados
  lexicon: WLC + HALOT
  rationale: La revisión inglesa muestra que la preposición no debe volverse causal en exceso; en español, «por» mantiene el valor de alcance/relación del rito expiatorio. «Pecados» traduce חַטֹּאת con el término más claro y eclesialmente amplio, sin perder el referente moral concreto.
- source_word: אַחַת בַּשָּׁנָה
  english_pob_choice: once a year
  chosen_spanish: una vez al año
  alternatives_spanish:
  - una vez por año
  - una vez en el año
  lexicon: WLC + HALOT
  rationale: Es la equivalencia natural y precisa del hebreo idiomático de repetición anual. «Una vez al año» evita calco y suena idiomático en español moderno.
- source_word: וַיַּעַשׂ
  english_pob_choice: And he did
  chosen_spanish: Y él hizo
  alternatives_spanish:
  - Y lo hizo
  - Y así hizo
  - Y él obró
  lexicon: WLC + HALOT
  rationale: El hebreo deja el sujeto implícito; el contexto inmediato favorece un referente masculino singular, pero no conviene nombrarlo en el cuerpo si el versículo no lo explicita. «Él hizo» conserva esa economía narrativa.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: as Yahweh commanded Moses
  chosen_spanish: como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé mandó a Moisés
  - según Yahvé había mandado a Moisés
  lexicon: WLC + HALOT
  rationale: Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה. El pluscuamperfecto en español («había mandado») refleja bien la anterioridad de la orden respecto de la acción narrada, sin añadir contenido interpretativo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'El texto hebreo contiene explícitamente el Tetragrama. En el español POB se sigue el estándar del proyecto: «Yahvé», preservando el nombre pactual sin reemplazarlo por una máscara litúrgica.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: עַל בְּנֵי יִשְׂרָאֵל en contexto de expiación
  english_pob_reading: for the sons of Israel
  chosen_spanish_reading: por los hijos de Israel
  alternative_spanish_readings:
  - para los hijos de Israel
  - por los israelitas
  - por el pueblo de Israel
  rationale: La preposición hebrea en este rito expresa la relación beneficiaria/de cobertura del sacrificio. «Por» conserva esa función en español y evita una lectura exclusivamente causal. Se mantiene el ethnónimo masculino plural por fidelidad al formulario hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: מִכָּל חַטֹּאתָם y el alcance de la expiación
  english_pob_reading: for all their sins
  chosen_spanish_reading: por todos sus pecados
  alternative_spanish_readings:
  - de todos sus pecados
  - a causa de todos sus pecados
  - desde todos sus pecados
  rationale: La lectura inglesa revisada aparta una causalidad demasiado fuerte; en español, «por todos sus pecados» expresa el ámbito sobre el que recae la expiación sin fijar un matiz que el hebreo no exige. Se conserva la tensión entre expiación y limpieza ritual sin diluirla.
  doctrine_reference: Leviticus 16 ritual atonement context
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se evita una causalidad excesiva en la frase sobre los pecados y se usa un giro natural para la periodicidad anual. También se integra el estándar del proyecto para el Tetragrama como «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «hijos de Israel» para reflejar el plural masculino del hebreo, con alternativa idiomática en nota.
  - «Hacer expiación» se usa como término cultual técnico, no como paráfrasis devocional.
  - «Una vez al año» traduce la idiomaticidad hebrea sin calco rígido.
