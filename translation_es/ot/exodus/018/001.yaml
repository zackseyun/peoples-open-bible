revisions:
- from: Ahora Jetró[a], sacerdote de Madián, suegro de Moisés, oyó todo lo que Dios había hecho por Moisés y por Israel, su pueblo, que Yahvé había sacado a Israel de Egipto.
  to: Entonces Jetró, sacerdote de Madián, suegro de Moisés, oyó todo lo que Dios había hecho por Moisés y por Israel, su pueblo[a]; es decir, que Yahvé había sacado a Israel de Egipto.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre la frase ambigua 'su pueblo', se mejora la fluidez de la cláusula explicativa introducida por כִּי, y se sustituye 'Ahora' por 'Entonces' para una narración española más natural sin alterar el sentido. La ambigüedad teológica/léxica de עַמּוֹ se preserva en el texto principal y se explica en la nota.
