- from: 'Pero los hijos[a] se rebelaron contra mí. No anduvieron en mis estatutos, ni guardaron mis decretos para ponerlos por obra: los decretos que, si un hombre los hace, por ellos vivirá. Profanaron mis sábados. Entonces dije que derramaría mi furor sobre ellos[b], para consumir mi ira contra ellos en el desierto.'
