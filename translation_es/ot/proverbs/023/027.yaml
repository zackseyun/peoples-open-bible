translation:
  language: es
  text: Porque una prostituta es una fosa profunda[a], y una mujer extranjera es un pozo angosto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «mujer extraña»; algunos traducen de forma más interpretativa: «adúltera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la explicación o razón del proverbio anterior; «Porque» conserva la fuerza explicativa de «For» en un español natural y sobrio.
- source_word: שׁוּחָה עֲמֻקָּה
  english_pob_choice: deep pit
  chosen_spanish: pozo hondo
  alternatives_spanish:
  - pozo profundo
  - fosa honda
  - hoyo profundo
  lexicon: HALOT
  rationale: El hebreo combina la idea de una cavidad/trampa con la de profundidad. «Pozo hondo» mantiene la imagen concreta y peligrosa sin sobreinterpretarla como «trampa» en el texto principal.
- source_word: זוֹנָה
  english_pob_choice: prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  - mujer prostituta
  lexicon: HALOT
  rationale: Es el equivalente léxico directo y moderno de la figura sexualmente inmoral descrita por el término.
- source_word: וּבְאֵר
  english_pob_choice: well
  chosen_spanish: pozo
  alternatives_spanish:
  - pozo de agua
  - cisterna
  - manantial
  lexicon: HALOT
  rationale: Aunque el sentido básico puede ser «pozo»/«fuente», en español «pozo» conserva bien la imagen del lugar profundo; se evita una expansión interpretativa.
- source_word: צָרָה
  english_pob_choice: narrow
  chosen_spanish: angosto
  alternatives_spanish:
  - estrecho
  - confinado
  - apretado
  lexicon: HALOT
  rationale: Describe la constricción del pozo; «angosto» es una forma clara y natural que conserva la idea de estrechez y encierro.
- source_word: נָכְרִיָּה
  english_pob_choice: foreign woman
  chosen_spanish: mujer extranjera
  alternatives_spanish:
  - mujer extraña
  - adúltera
  lexicon: HALOT
  rationale: Sigue más de cerca el sentido básico de נָכְרִיָּה como mujer de fuera/extranjera. «Mujer extraña» es tradicional pero ambiguo en español; «adúltera» sería más interpretativo que el lexema por sí solo.
theological_decisions:
- issue: Cómo rendir נָכְרִיָּה en Proverbios sin forzar una categoría moral específica
  english_pob_reading: foreign woman
  chosen_spanish_reading: mujer extranjera
  alternative_spanish_readings:
  - mujer extraña
  - adúltera
  rationale: El término en Proverbios suele tener carga moral y sapiencial, pero su base léxica apunta a una mujer foránea o ajena. «Mujer extranjera» preserva esa tensión sin importar una definición moral más precisa de la que el hebreo exige en este versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El contexto del audit trail inglés muestra consenso alto y sin revisiones aplicadas. La versión española sigue la misma lectura principal y conserva la alternativa tradicional/interpetativa para נָכְרִיָּה en nota.
  spanish_consistency_notes:
  - Se mantuvo «Porque» para reflejar la fuerza explicativa de כִּי.
  - Se eligió «prostituta» / «mujer extranjera» como equivalentes léxicos directos, evitando «ramera» o «mujer extraña» en el texto principal por registro o ambigüedad.
  - «Pozo hondo» y «pozo angosto» conservan la imaginería de peligro y restricción sin añadir metáforas ajenas al hebreo.
