    rationale: La nota a explica «frente a Jericó», pero está colocada tras «Abarim»; las notas b y c explican «hijos de Israel» y «como posesión/heredad», pero están colocadas tras «Canaán». Esto rompe la trazabilidad exigida entre texto y nota.
  - severity: medium
