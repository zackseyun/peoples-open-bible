translation:
  language: es
  text: Por tanto, los cielos sobre ustedes han retenido el rocío[a], y la tierra ha retenido su producto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra ha retenido su rendimiento». El hebreo אֶרֶץ puede significar «tierra» o «territorio», y יְבוּל puede rendirse como «producto» o «rendimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La frase introduce una consecuencia inferida de la reprensión anterior. «Por tanto» conserva ese valor causal e inferencial con un tono digno y natural en español.
- source_word: עֲלֵיכֶם
  english_pob_choice: above you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - encima de ustedes
  - por encima de ustedes
  lexicon: HALOT
  rationale: Con «los cielos», la relación espacial es clara. «Sobre ustedes» fluye bien en español y refleja la idea de los cielos por encima del pueblo.
- source_word: כָּלְאוּ
  english_pob_choice: have withheld
  chosen_spanish: han retenido
  alternatives_spanish:
  - han contenido
  - han restringido
  - han impedido
  lexicon: HALOT
  rationale: El verbo expresa la acción de retener o detener algo que normalmente vendría. «Han retenido» comunica bien la fuerza de la imagen tanto para el rocío como para la producción agrícola.
- source_word: שָמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo suele referirse a los cielos/firmamento. «Los cielos» preserva el registro bíblico y el paralelo poético con «la tierra».
- source_word: מִטָּל
  english_pob_choice: the dew
  chosen_spanish: el rocío
  alternatives_spanish:
  - el rocío
  - la lluvia menuda
  lexicon: HALOT
  rationale: Aquí la POB en inglés entendió que el sentido es «dew». En español, «rocío» es la equivalencia natural y precisa, sin forzar una perífrasis.
- source_word: וְהָאָרֶץ
  english_pob_choice: and the earth
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y la tierra
  - y el suelo
  - y el país
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede ser «tierra» o «país/land», en el paralelo con «los cielos» la contraparte más natural en español es «la tierra».
- source_word: כָּלְאָה
  english_pob_choice: has withheld
  chosen_spanish: ha retenido
  alternatives_spanish:
  - ha contenido
  - ha impedido
  lexicon: HALOT
  rationale: Se mantiene el mismo campo semántico que para el primer verbo, pero en español «ha retenido» suena más natural con «su producto» y evita una traducción mecánica.
- source_word: יְבוּלָהּ
  english_pob_choice: its produce
  chosen_spanish: su producto
  alternatives_spanish:
  - su fruto
  - su cosecha
  - su rendimiento
  lexicon: HALOT
  rationale: יְבוּל designa el rendimiento agrícola de la tierra. «Su producto» es amplio y fiel; «fruto» o «cosecha» serían más específicos de lo que el hebreo exige.
theological_decisions:
- issue: Alcance de אֶרֶץ en el paralelismo
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra
  - el país
  - la región
  rationale: El hebreo permite «earth» o «land». Dado el paralelismo con «los cielos», la lectura cósmica funciona mejor en español; aun así, no se elimina la posibilidad territorial implícita en el contexto agrario.
  doctrine_reference: Creación y providencia divina en el orden natural
- issue: Efecto de la reprensión divina sobre la naturaleza
  english_pob_reading: have withheld the dew / has withheld its produce
  chosen_spanish_reading: han retenido el rocío / ha retenido su producto
  alternative_spanish_readings:
  - han impedido el rocío / ha impedido su producto
  - han cerrado el cielo al rocío / ha cerrado la tierra a su producto
  rationale: 'Se conserva la causalidad del juicio expresada en el texto: la falta de bendición agrícola aparece como consecuencia del desorden moral del pueblo. La traducción evita suavizar esa relación.'
  doctrine_reference: Juicio pactual y bendición agrícola
translation_notes:
  revision_awareness: 'La versión inglesa revisada no hizo cambios respecto del estado anterior (unchanged=true). Se mantiene esa estabilidad en español, conservando la misma decisión básica: la sequía y la infertilidad son descritas como retención del rocío y del producto de la tierra.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito en el contexto del libro, pero este versículo no contiene el nombre divino de forma explícita.
  - Se prefirió «los cielos» y «la tierra» para conservar el paralelismo poético y el registro bíblico.
  - «Rocío» se usa para מִטָּל porque es la equivalencia española más natural y precisa.
  - «Producto» se eligió como término amplio para יְבוּל, manteniendo abierta la referencia a cosecha, fruto o rendimiento.
