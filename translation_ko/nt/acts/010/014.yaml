  yaml_path: translation/nt/acts/010/014.yaml
  text: But Peter said, “By no means, Lord, because I have never eaten anything common and unclean.”
translation:
  language: ko
  text: 그러나 베드로가 말하였습니다. 「주여, 결코 그럴 수 없습니다. 저는 속되고 부정한 것은 단 한 번도 먹어 본 일이 없습니다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κοινὸν καὶ ἀκάθαρτον
  english_pob_choice: common and unclean
  chosen_korean: 속되고 부정한
  alternatives_korean:
  - 속되거나 부정한
  - 더럽고 부정한
  lexicon: BDAG
  rationale: 유대-이방 경계 어휘. κοινός를 「속된」으로 직역해 정결 범주의 사회적·예배적 무게를 살리고, ἀκάθαρτος는 「부정한」으로 옮긴다. 「더러운」은 위생적 함의가 과도하다.
theological_decisions:
- issue: 정결-속됨의 문화적 경계 보존
  chosen_reading: 주여, 결코 그럴 수 없습니다. 저는 속되고 부정한 것은 단 한 번도 먹어 본 일이 없습니다.
  alternative_readings:
  - 주여, 그럴 수 없습니다. 속된 것이나 부정한 것을 결코 먹은 적이 없습니다
  rationale: 베드로의 거부의 강도(Μηδαμῶς)를 「결코 그럴 수 없습니다」로 옮겨 절대 부정을 보존한다. 정결법 어휘를 누그러뜨리지 않고 직역해, 15절의 하나님의 정결 선언이 이 경계를 무너뜨리는 충격을 그대로 전달한다.
  doctrine_reference: 'DOCTRINE.md: cultural-boundary collapse — preserve the force of clean/unclean'
