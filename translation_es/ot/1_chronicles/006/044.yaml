translation:
  language: es
  text: Ashán con sus pastizales[a], y Bet-semesh con sus pastizales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos testigos paralelos y traducciones leen «Aín» en lugar de «Ashán» aquí; el Texto Masorético de Crónicas lee «Ashán».
    reason: textual_variant
lexical_decisions:
- source_word: עָשָׁן
  english_pob_choice: Ashan
  chosen_spanish: Ashán
  alternatives_spanish:
  - Aín
  lexicon: HALOT
  rationale: Es nombre propio de lugar; se translitera al español como Ashán. Aunque hay testigos paralelos que leen Aín, el texto masorético de Crónicas dice עָשָׁן, y esa forma se conserva en la traducción principal.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras comunales
  - sus alrededores
  lexicon: HALOT
  rationale: מִגְרָשׁ se refiere al terreno abierto asociado a una ciudad, especialmente el área para pastoreo. 'Pastizales' comunica bien esa idea en español sin perder la relación espacial y funcional con la ciudad.
- source_word: בֵּית שֶׁמֶשׁ
  english_pob_choice: Beth-shemesh
  chosen_spanish: Bet-semes
  alternatives_spanish:
  - Bet-sémes
  - Casa del sol
  lexicon: HALOT
  rationale: Es un topónimo propio; en español bíblico conviene transliterarlo. Se usa 'Bet-semes' para reflejar la forma hebrea y mantener consistencia con otros nombres bíblicos transliterados.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  lexicon: gramática hebrea
  rationale: La partícula repetida introduce cada elemento de la lista; en español se expresa de forma natural con la conjunción 'y', sin reproducir mecánicamente el marcador de objeto.
translation_notes:
  revision_awareness: El texto inglés POB sigue el Texto Masorético de Crónicas y conserva Ashan; la versión española mantiene esa decisión con transliteración al español y conserva la nota de variante textual, sin introducir cambios doctrinales ni de contenido.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de la lista con dos ciudades y sus tierras asociadas.
  - Se evita traducir los nombres propios como si fueran expresiones comunes.
  - La nota textual se vincula al nombre Ashán mediante el marcador [a].
