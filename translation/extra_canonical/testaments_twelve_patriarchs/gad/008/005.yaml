  from: Therefore, if anyone does evil to you, do good to him, and pray for him; and
    you will be redeemed by the Lord from every evil. For if anyone prospers, and
    if he is shameless or lawless, do not be jealous; but wait for the end from the
    Lord. For either he receives his reward in this life, or, if he is kept for punishment,
    he will be repaid in the judgment. And if a poor man prospers and is without envy,
    even if he is not rich, he is blessed beyond all men, because he has the treasure
    that does not perish. Therefore cast away hatred[c], and love one another in uprightness
    of heart.
