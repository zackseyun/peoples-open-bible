  rationale: 'Se corrigen dos problemas sustanciales de fidelidad: se elimina «nada», que añadía contenido ajeno al griego, y se quita la negación indebida antes de «guerreara», que invertía el sentido. Se mantiene el resto del texto porque representa bien el original y es plenamente legible en español.'
