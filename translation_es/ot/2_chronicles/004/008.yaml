translation:
  language: es
  text: Hizo diez mesas y las colocó en el templo, cinco a la derecha y cinco a la izquierda; además hizo cien tazones de oro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuencos de oro» o «tazones de aspersión de oro»; el término hebreo se refiere a vasos rituales usados en el servicio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻׁלְחָנוֹת
  english_pob_choice: tables
  chosen_spanish: mesas
  alternatives_spanish:
  - tablas
  - mesas de servicio
  - soportes
  lexicon: HALOT
  rationale: El sentido básico del sustantivo es 'tables/tables' en inglés; en español, 'mesas' es el equivalente natural y claro para un inventario de mobiliario del templo. 'Tablas' suena menos probable en este contexto y podría sugerir tablones o placas.
- source_word: וַיַּנַּח
  english_pob_choice: placed
  chosen_spanish: las colocó
  alternatives_spanish:
  - las puso
  - las puso en su lugar
  - las situó
  lexicon: HALOT
  rationale: '''Colocó'' conserva la acción concreta de poner algo en un lugar determinado y mantiene un registro digno y preciso.'
- source_word: בַּהֵיכָל
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el santuario
  - en el palacio
  lexicon: HALOT
  rationale: En este contexto cultual, הֵיכָל se refiere al edificio del templo/santuario. 'Templo' es la opción más clara y fiel para el lector español.
- source_word: מִיָּמִין
  english_pob_choice: on the right
  chosen_spanish: a la derecha
  alternatives_spanish:
  - a mano derecha
  - del lado derecho
  lexicon: HALOT
  rationale: La partícula indica ubicación a la derecha; en español, 'a la derecha' reproduce bien la relación espacial sin añadir una precisión direccional no explicitada en el hebreo.
- source_word: מִשְּׂמֹאול
  english_pob_choice: on the left
  chosen_spanish: a la izquierda
  alternatives_spanish:
  - a mano izquierda
  - del lado izquierdo
  lexicon: HALOT
  rationale: '''A la izquierda'' corresponde de forma directa al hebreo y mantiene el paralelismo con ''a la derecha''.'
- source_word: מִזְרְקֵי זָהָב
  english_pob_choice: bowls of gold
  chosen_spanish: tazones de oro
  alternatives_spanish:
  - cuencos de oro
  - vasijas de oro
  - copas de oro
  - tazones de aspersión de oro
  lexicon: HALOT
  rationale: El término designa recipientes rituales. 'Tazones de oro' es una forma natural y suficientemente amplia en español; se conserva la posibilidad ritual en nota porque el uso cultual del término es relevante y no debe borrarse.
- source_word: מֵאָה
  english_pob_choice: one hundred
  chosen_spanish: cien
  alternatives_spanish:
  - ciento
  lexicon: HALOT
  rationale: En español, 'cien' es la forma normal ante un sustantivo inmediatamente siguiente. Mantiene el valor cardinal exacto del hebreo.
theological_decisions:
- issue: Naturaleza de los מִזְרְקֵי זָהָב como vasos rituales
  english_pob_reading: The Hebrew term refers to ritual vessels used in temple service.
  chosen_spanish_reading: El término refiere a vasos rituales usados en el servicio del templo.
  alternative_spanish_readings:
  - recipientes litúrgicos usados en el templo
  - tazones para aspersión usados en el servicio del templo
  rationale: El POB en inglés preserva la tensión entre una traducción legible ('bowls of gold') y una glosa que recuerda la función cultual. En español, no conviene reducir el objeto a un simple recipiente doméstico; se explicita su carácter ritual sin imponer una sola subfunción si el término hebreo admite más de una dentro del servicio del templo.
  doctrine_reference: Culto del templo / vasos sagrados
- issue: Ubicación de las mesas dentro del templo
  english_pob_reading: placed them in the temple
  chosen_spanish_reading: las colocó en el templo
  alternative_spanish_readings:
  - las puso en el templo
  - las situó en el templo
  rationale: No hay carga doctrinal especial; se conserva la localización cultual exacta sin ampliarla ni reinterpretarla.
  doctrine_reference: Contexto cultual del templo
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail en inglés: mantiene la estructura de inventario, el paralelismo espacial ''a la derecha... a la izquierda'' y la distinción léxica entre mesas y los vasos de oro. Se evita introducir ''lado'' porque el POB revisado en inglés simplificó ''right side'' a ''right'' por mayor cercanía al hebreo. La nota reproduce la tensión léxica documentada para מִזְרְקֵי זָהָב.'
  spanish_consistency_notes:
  - Se usó 'mesas' para שֻׁלְחָנוֹת conforme al sentido básico y al contexto de mobiliario del templo.
  - Se prefirió 'colocó' para וַיַּנַּח por su precisión y naturalidad en español.
  - Se mantuvo 'en el templo' para בַּהֵיכָל, no 'palacio'.
  - Se tradujo 'cien' y no 'ciento' por concordancia con el sustantivo siguiente.
  - La nota de pie de página se ancla en 'tazones de oro' para conservar la alternativa ritual documentada.
