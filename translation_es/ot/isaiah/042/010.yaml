translation:
  language: es
  text: ¡Canten a Yahvé un cántico nuevo, su alabanza desde el extremo de la tierra[a], ustedes que descienden al mar, y todo lo que lo llena, las costas lejanas[b] y los que habitan en ellas!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde el extremo de la tierra»; muchas versiones lo vierten como «desde los confines de la tierra».'
    reason: lexical_alternative
  - marker: b
    text: O «las islas»; el término hebreo puede referirse ampliamente a islas o a costas lejanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: ¡Canten!
  alternatives_spanish:
  - ¡Canten en voz alta!
  - ¡Entonen!
  lexicon: HALOT
  rationale: Es el imperativo plural de cantar, una convocatoria directa a la alabanza. En español, «Canten» conserva la fuerza exhortativa natural y digna sin añadir contenido.
- source_word: לַֽיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé Dios
  - al SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo tiene el nombre divino יְהוָה; el proyecto pide reproducirlo como «Yahvé». Se mantiene el nombre propio, no una sustitución reverencial.
- source_word: שִׁיר חָדָשׁ
  english_pob_choice: a new song
  chosen_spanish: un cántico nuevo
  alternatives_spanish:
  - una canción nueva
  - un nuevo cántico
  lexicon: HALOT
  rationale: «Cántico nuevo» es una equivalencia natural y bíblicamente reconocible para la combinación hebrea, sin perder el valor de una alabanza fresca y renovada.
- source_word: תְּהִלָּתוֹ
  english_pob_choice: his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - su alabanza-canto
  - su loor
  lexicon: HALOT
  rationale: El sustantivo expresa alabanza dirigida a él o que le pertenece. «Su alabanza» conserva la brevedad del hebreo y la relación posesiva.
- source_word: מִקְצֵה הָאָרֶץ
  english_pob_choice: from the end of the earth
  chosen_spanish: desde el extremo de la tierra
  alternatives_spanish:
  - desde el fin de la tierra
  - desde los confines de la tierra
  lexicon: HALOT
  rationale: Se conserva el singular del hebreo («el extremo de la tierra»), siguiendo el valor más literal que el POB inglés ya documentó, pero en un español fluido.
- source_word: יוֹרְדֵי הַיָּם
  english_pob_choice: you who go down to the sea
  chosen_spanish: ustedes que descienden al mar
  alternatives_spanish:
  - los que van al mar
  - ustedes que bajan al mar
  lexicon: HALOT
  rationale: El participio literal es «los que van/bajan al mar». «Descienden al mar» conserva la imagen hebrea de movimiento hacia abajo y la dirección de la llamada.
- source_word: וּמְלֹאוֹ
  english_pob_choice: and all that fills it
  chosen_spanish: y todo lo que lo llena
  alternatives_spanish:
  - y su plenitud
  - y todo lo que hay en él
  lexicon: HALOT
  rationale: La expresión puede referirse a la plenitud contenida en el mar. «Todo lo que lo llena» mantiene la idea activa de aquello que colma el mar sin forzar una abstracción.
- source_word: אִיִּים
  english_pob_choice: the coastlands
  chosen_spanish: las costas
  alternatives_spanish:
  - las islas
  - las costas lejanas
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar islas o regiones marítimas distantes, en este contexto «costas» comunica bien la extensión geográfica y evita reducirlo solo a islas literales.
- source_word: וְיֹשְׁבֵיהֶם
  english_pob_choice: and those who dwell in them
  chosen_spanish: y sus habitantes
  alternatives_spanish:
  - y los que viven en ellas
  - y quienes moran en ellas
  lexicon: HALOT
  rationale: «Habitantes» es una equivalencia natural del participio sustantivado con sufijo. En español, la relación posesiva con «ellas» queda implícita por el antecedente «las costas».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: La edición inglesa del POB adopta «Yahweh» para el Tetragrámaton. En español, la forma estándar del proyecto es «Yahvé», que conserva el nombre divino sin ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El control cruzado indica alta concordancia y ningún cambio sustantivo pendiente. Se ha conservado la decisión del POB inglés sobre la estructura poética, con ajuste al mandato del proyecto en español de usar Yahvé para el nombre divino.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo del hebreo: mandato + objeto de alabanza + localización universal + expansión geográfica.'
  - «Costas» traduce el alcance contextual de אִיִּים; no se restringe a islas literales.
  - «Descienden al mar» conserva la imagen verbal del participio hebreo.
  - Se evitó «SEÑOR» porque el proyecto español requiere Yahvé para יְהוָה.
