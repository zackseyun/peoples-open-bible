translation:
  language: es
  text: Amen a Yahvé[a], todos sus fieles. Yahvé preserva a los fieles y paga plenamente[b] al que actúa con soberbia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «todos sus santos» o «todos sus piadosos»; el término hebreo señala a quienes están marcados por lealtad de pacto hacia Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O «paga en pleno» o «recompensa abundantemente».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶֽהֱב֥וּ
  english_pob_choice: Love
  chosen_spanish: Amen
  alternatives_spanish:
  - Amen
  - Amen a
  - Sigan amando
  lexicon: HALOT
  rationale: Es un imperativo plural dirigido a la comunidad. En español, «amen» comunica mejor el mandato directo y breve que «amen a» si se conserva el objeto explícito en la frase siguiente. Mantiene el tono exhortativo del salmo.
- source_word: יְהוָ֗ה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El proyecto POB usa «Yahvé» para el nombre divino. Aquí se conserva consistentemente como en el texto fuente hebreo.
- source_word: כָּל חֲסִידָיו
  english_pob_choice: all his faithful ones
  chosen_spanish: todos sus fieles
  alternatives_spanish:
  - todos sus santos
  - todos sus piadosos
  - todos los que le son leales
  lexicon: HALOT
  rationale: חֲסִידָיו expresa personas caracterizadas por fidelidad de pacto. «Fieles» reproduce bien ese valor sin cargar con asociaciones eclesiales de «santos».
- source_word: אֱמוּנִים
  english_pob_choice: the faithful
  chosen_spanish: los fieles
  alternatives_spanish:
  - los fieles y leales
  - los confiables
  - los que son fieles
  lexicon: HALOT
  rationale: Como plural sustantivado de sentido calificativo, «los fieles» es natural en español y mantiene la idea de fiabilidad/covenantalidad.
- source_word: נֹצֵר
  english_pob_choice: preserves
  chosen_spanish: preserva
  alternatives_spanish:
  - guarda
  - custodia
  - protege
  lexicon: HALOT
  rationale: El participio expresa acción continua de guardar/proteger. «Preserva» funciona bien en español bíblico moderno y refleja la continuidad del cuidado divino.
- source_word: וּמְשַׁלֵּם
  english_pob_choice: fully repays
  chosen_spanish: paga plenamente
  alternatives_spanish:
  - recompensa plenamente
  - paga en pleno
  - retribuye plenamente
  lexicon: HALOT
  rationale: El verbo en forma intensiva tiene sentido retributivo; «paga plenamente» conserva la idea de restitución completa y evita suavizar el juicio divino.
- source_word: עַל יֶתֶר
  english_pob_choice: fully
  chosen_spanish: plenamente
  alternatives_spanish:
  - en pleno
  - por completo
  - abundantemente
  lexicon: HALOT
  rationale: La expresión intensifica la retribución. «Plenamente» es la forma más clara y sobria para reflejar ese matiz adverbial.
- source_word: עֹשֵׂה גַאֲוָה
  english_pob_choice: the one who acts proudly
  chosen_spanish: al que actúa con orgullo
  alternatives_spanish:
  - al que obra con soberbia
  - al que se comporta con arrogancia
  - al que hace obras de orgullo
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «el que hace orgullo». En español, «actúa con orgullo» conserva el valor verbal y evita una traducción demasiado cruda o ambigua, aunque el campo semántico incluye soberbia/arrogancia.
theological_decisions:
- issue: Término de fidelidad de pacto para חֲסִידָיו
  english_pob_reading: all his faithful ones
  chosen_spanish_reading: todos sus fieles
  alternative_spanish_readings:
  - todos sus santos
  - todos sus piadosos
  rationale: Se preserva la tensión entre piedad y lealtad de pacto sin importar un matiz eclesiástico posterior que «santos» puede sugerir en español.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Retribución divina frente a preservación de los fieles
  english_pob_reading: Yahweh preserves the faithful and fully repays the one who acts proudly
  chosen_spanish_reading: Yahvé preserva a los fieles y paga plenamente al que actúa con orgullo
  alternative_spanish_readings:
  - Yahvé preserva a los fieles, pero retribuye plenamente al orgulloso
  - Yahvé guarda a los fieles y recompensa en pleno al soberbio
  rationale: 'La formulación mantiene el contraste teológico del hebreo: cuidado activo para los fieles y retribución real para el soberbio, sin suavizar ninguno de los dos polos.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios sustantivos; esta versión conserva el contraste entre preservación y retribución y adopta terminología española coherente con el marco POB.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - «Fieles» se mantiene para חֲסִיד / אֱמוּנִים sin recurrir a «santos» en el cuerpo del texto.
  - «Paga plenamente» preserva el matiz retributivo sin diluir el sentido de juicio.
  - La nota a pie de página [a] cubre la alternativa lexical de חֲסִידָיו y se vincula al primer uso de «fieles».
