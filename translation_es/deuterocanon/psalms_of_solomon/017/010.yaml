revisions:
- from: Según sus pecados tú les pagarás[a], oh Dios; que sean hallados según sus obras.
  to: Según sus pecados tú les retribuirás, oh Dios; que sean hallados[a] según sus obras.
  rationale: Se cambió «pagarás» por «retribuirás» para expresar con más precisión la retribución judicial de ἀποδώσεις. Se movió la nota [a] a la segunda cláusula, donde realmente corresponde al giro literal de εὑρεθείη αὐτοῖς, y se ajustó su redacción para reflejar mejor la alternativa preservada en la auditoría inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:59:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: κατά...κατά como medida proporcional («según»), ἁμαρτήματα como «pecados», ὁ θεός como vocativo, y ἔργα como «obras». Sin embargo, ἀποδώσεις en contexto judicial se expresa mejor como «retribuirás» que «pagarás», y la nota al pie está mal anclada: la variante literal corresponde a la segunda cláusula (εὑρεθείη...), no a «pagarás».'
  spanish_quality_summary: El español es claro y digno, pero «tú les pagarás» suena algo coloquial/financiero para retribución divina. «Oh Dios» es aceptable, aunque en puntuación española conviene «oh Dios» sin mayúscula inicial adicional tras coma o con minúscula interjectiva. La frase «que sean hallados según sus obras» conserva la literalidad, aunque es algo rígida; aun así es defendible por fidelidad. La corrección principal es mejorar el verbo de retribución y mover la nota al lugar correcto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «pecados» y «obras» están bien. La decisión sobre εὑρεθείη puede mantenerse como «sean hallados» por cercanía formal al texto y a la revisión inglesa auditada, con nota literal adecuadamente ubicada.
  issues:
  - severity: medium
    issue: «pagarás» debilita el matiz judicial de ἀποδώσεις
    rationale: Aunque posible, «pagar» en español suele sonar monetario o coloquial. «Retribuirás» preserva mejor la idea de dar conforme a culpa/obras en un contexto de juicio divino.
  - severity: high
    issue: La nota al pie [a] está anclada en la palabra equivocada
    rationale: La nota explica la literalidad de εὑρεθείη αὐτοῖς κατὰ τὰ ἔργα αὐτῶν, pero el marcador aparece tras «pagarás», creando una relación errónea entre nota y texto fuente.
  - severity: low
    issue: La redacción de la nota puede ajustarse para reflejar con más precisión el giro griego
    rationale: '«Que sean hallados para ellos» reproduce de forma algo confusa la construcción; «Literalmente: “que sea hallado para ellos según sus obras”» refleja mejor el singular implícito de la expresión idiomática señalada en el inglés.'
  revised_spanish_text: Según sus pecados tú les retribuirás, oh Dios; que sean hallados[a] según sus obras.
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «que sea hallado para ellos según sus obras».'
    reason: lexical_alternative
  revision_rationale: Se cambió «pagarás» por «retribuirás» para expresar con más precisión la retribución judicial de ἀποδώσεις. Se movió la nota [a] a la segunda cláusula, donde realmente corresponde al giro literal de εὑρεθείη αὐτοῖς, y se ajustó su redacción para reflejar mejor la alternativa preservada en la auditoría inglesa.
