translation:
  language: es
  text: Tú marchaste por el mar con tus caballos, por el montón[a] de muchas aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la masa agitada de muchas aguas». El término hebreo es difícil y puede designar una masa acumulada o tumultuosa de las aguas.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּרַכְתָּ
  english_pob_choice: you marched
  chosen_spanish: Tú marchaste
  alternatives_spanish:
  - Tú pisaste
  - Tú trodaste
  - Tú avanzaste
  lexicon: HALOT
  rationale: דרך expresa la idea de hollar o marchar. En este contexto poético-teofánico, «marchaste» comunica el avance decidido de Yahvé con naturalidad en español sin perder la imagen de pisar o avanzar sobre la escena.
- source_word: בַיָּם
  english_pob_choice: through the sea
  chosen_spanish: por el mar
  alternatives_spanish:
  - en el mar
  - a través del mar
  lexicon: HALOT
  rationale: La preposición ב con verbos de movimiento puede expresar tránsito. En español, «por el mar» transmite el cruce o paso a través de él con fluidez y sin sobrecargar la frase.
- source_word: סוּסֶיךָ
  english_pob_choice: with your horses
  chosen_spanish: con tus caballos
  alternatives_spanish:
  - tus caballos
  lexicon: HALOT
  rationale: El sustantivo significa «tus caballos». Como en inglés, añadir «con» hace explícito el acompañamiento del medio de avance en un español natural, sin alterar el sentido.
- source_word: חֹמֶר
  english_pob_choice: the heap
  chosen_spanish: el montón
  alternatives_spanish:
  - la masa
  - el montón agitado
  - la acumulación
  lexicon: HALOT
  rationale: חֹמֶר es un término difícil y aquí parece referirse a una masa acumulada o amontonada de agua, no a barro literal. «El montón» conserva esa noción de masa/hegemonía amontonada y deja visible la dificultad léxica.
- source_word: מַיִם רַבִּים
  english_pob_choice: mighty waters
  chosen_spanish: muchas aguas
  alternatives_spanish:
  - aguas poderosas
  - grandes aguas
  - aguas abundantes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «muchas aguas». Se conserva esa formulación para no borrar la imagen semítica, aunque en español suena menos idiomática que otras posibilidades.
theological_decisions:
- issue: Imagen del Guerrero divino en la teofanía poética
  english_pob_reading: Retain the imagery of God advancing through the sea with horses without allegorizing or softening it.
  chosen_spanish_reading: Mantener la imagen concreta de Yahvé avanzando por el mar con sus caballos, sin convertirlos en símbolos ni abstraer la escena.
  alternative_spanish_readings:
  - Interpretar los caballos como nubes o huestes angélicas
  - Suavizar la imagen a una declaración general del poder de Dios sobre el mar
  rationale: El versículo pertenece a una descripción poética de Yahvé como rey guerrero. La traducción conserva la imaginería concreta del hebreo y no resuelve la tensión teológica mediante una paráfrasis explicativa.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de 'churning' a 'heap' para reflejar más de cerca חֹמֶר ('heap/mass'). La línea española sigue esa revisión al escoger «montón», que mantiene la idea de masa amontonada sin interpretar el término como movimiento o espuma.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino según el estándar del proyecto.
  - Se preservó la repetición estructural de la preposición («por... por...») para reflejar el paralelismo del hebreo.
  - Se evitó «SEÑOR» como sustituto reverencial, ya que el proyecto pide transliteración del nombre divino.
  - «Muchas aguas» conserva la literalidad semítica, aunque la nota ofrece una alternativa más idiomática si se requiere.
