translation:
  language: es
  text: 'Y cuando oyó esta palabra[a], mientras él y los reyes bebían en las cabañas[b], dijo a sus servidores[c]: «¡Tomen posiciones!». Y ellos tomaron posiciones contra la ciudad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «este asunto» o «este mensaje».
    reason: lexical_alternative
  - marker: b
    text: O «en los refugios»; tradicionalmente, «en los pabellones».
    reason: lexical_alternative
  - marker: c
    text: El mandato hebreo es literalmente «¡Pongan!» o «¡Coloquen!», una orden militar breve que probablemente significa tomar posiciones contra la ciudad.
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este asunto
  - este mensaje
  lexicon: HALOT
  rationale: דָּבָר puede significar ‘palabra’, ‘asunto’ o ‘mensaje’. Dado el paralelismo con el audit trail inglés, ‘palabra’ mantiene la correspondencia léxica directa y suena natural en español, sin exagerar el matiz comunicativo.
- source_word: שֹׁתֶה
  english_pob_choice: were drinking
  chosen_spanish: bebían
  alternatives_spanish:
  - estaban bebiendo
  - estaba bebiendo
  lexicon: HALOT
  rationale: El participio expresa una acción en curso. En español, el imperfecto ‘bebían’ comunica bien la simultaneidad narrativa con menos pesadez que una perífrasis progresiva.
- source_word: בַּסֻּכּוֹת
  english_pob_choice: in the booths
  chosen_spanish: en las cabañas
  alternatives_spanish:
  - en las cabañas temporales
  - en los pabellones
  - en los refugios
  lexicon: HALOT
  rationale: סֻכּוֹת designa estructuras temporales, tipo chozas/cabañas. ‘Cabañas’ es claro y fiel para lectores hispanohablantes; preserva la imagen concreta sin imponer la terminología tradicional ‘pabellones’.
- source_word: שִׂימוּ
  english_pob_choice: Take your positions
  chosen_spanish: ¡Tomen sus puestos!
  alternatives_spanish:
  - ¡Pónganse en posición!
  - ¡Dispónganse!
  - ¡Prepárense para atacar!
  lexicon: HALOT
  rationale: El verbo básico es ‘poner, colocar’, pero aquí funciona como una orden militar breve. ‘Tomen sus puestos’ transmite el imperativo táctico sin añadir detalles que el hebreo no explicita.
- source_word: וַיָּשִׂימוּ עַל הָעִיר
  english_pob_choice: they took their positions against the city
  chosen_spanish: tomaron posiciones contra la ciudad
  alternatives_spanish:
  - se colocaron contra la ciudad
  - se desplegaron contra la ciudad
  - tomaron sus puestos frente a la ciudad
  lexicon: HALOT
  rationale: La frase es elíptica y militar. ‘Tomaron posiciones contra la ciudad’ conserva el tono de despliegue hostil del hebreo y del inglés POB, sin forzar una precisión técnica no presente en el texto.
translation_notes:
  revision_awareness: El borrador inglés fue revisado de “message” a “word” para una correspondencia más cercana con el hebreo הַדָּבָר הַזֶּה. La versión española sigue esa preferencia por ‘palabra’, manteniendo además el matiz alternativo en nota. También se conservó el sentido militar breve de שִׂימוּ y el valor locativo de בַּסֻּכּוֹת con una opción transparente para el español.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - ‘Señor’ no aparece porque no hay צורך de equivalencia divina aquí.
  - ‘Siervos’ refleja el paralelo funcional con el inglés ‘servants’ y evita introducir ‘esclavos’ donde el contexto es cortesano/militar.
  - La puntuación reproduce una narración fluida y la cita directa con orden breve imperativo.
