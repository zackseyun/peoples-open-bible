translation:
  language: es
  text: 'Entonces ustedes respondieron y me dijeron: «Hemos pecado contra Yahvé. Nosotros subiremos y pelearemos, conforme a todo lo que Yahvé nuestro Dios nos mandó». Entonces cada hombre se ciñó sus armas de guerra, y ustedes presumptuosamente[a] se dispusieron a subir a la región montañosa[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «subieron temerariamente» / «subieron con presunción». El verbo hebreo es raro y comunica una acción imprudente o confiada en exceso.
    reason: lexical_alternative
  - marker: b
    text: Lit. «al monte» o «a la montaña»; en este contexto probablemente se refiere más ampliamente a la región montañosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲנוּ / וַתֹּאמְרוּ
  english_pob_choice: answered and said
  chosen_spanish: respondieron y dijeron
  alternatives_spanish:
  - contestaron y dijeron
  - respondieron
  lexicon: HALOT
  rationale: ענה + אמר en este marco de discurso introduce una respuesta directa a Moisés; «respondieron y dijeron» conserva la secuencia retórica natural sin perder el valor de réplica.
- source_word: חָטָאנוּ לַיהוָה
  english_pob_choice: We have sinned against Yahweh
  chosen_spanish: Hemos pecado contra Yahvé
  alternatives_spanish:
  - Hemos pecado a Yahvé
  - Hemos cometido pecado contra Yahvé
  lexicon: HALOT
  rationale: El ל marca a Yahvé como la parte ofendida; en español, «pecado contra» expresa mejor esa relación que una construcción dativa literal. Se mantiene «Yahvé» según el criterio del nombre divino.
- source_word: נַעֲלֶה
  english_pob_choice: will go up
  chosen_spanish: subiremos
  alternatives_spanish:
  - iremos arriba
  - ascenderemos
  lexicon: HALOT
  rationale: עלה conserva la imagen espacial de subir; «subiremos» es natural en español y mantiene esa dirección sin exceso de literalismo.
- source_word: וְנִלְחַמְנוּ
  english_pob_choice: and fight
  chosen_spanish: y pelearemos
  alternatives_spanish:
  - y lucharemos
  - y haremos guerra
  lexicon: HALOT
  rationale: El verbo en este contexto militar comunica combate; «pelear» es claro y fiel, sin introducir un matiz técnico innecesario.
- source_word: כְּכֹל אֲשֶׁר צִוָּנוּ
  english_pob_choice: according to all that ... commanded us
  chosen_spanish: conforme a todo lo que ... nos mandó
  alternatives_spanish:
  - según todo lo que ... nos mandó
  - tal como ... nos mandó
  lexicon: HALOT
  rationale: La construcción expresa conformidad total con el mandato; «conforme a todo lo que» preserva la amplitud de כְּכֹל אֲשֶׁר y «mandó» corresponde al lenguaje de orden divina.
- source_word: וַתַּחְגְּרוּ
  english_pob_choice: strapped on
  chosen_spanish: se ciñó
  alternatives_spanish:
  - se ajustó
  - se sujetó
  lexicon: HALOT
  rationale: חגר alude a ceñir o ajustar el equipo al cuerpo. «Se ciñó» es una equivalencia bíblica idiomática en español que conserva la imagen de prepararse para la guerra.
- source_word: אִישׁ אֶת כְּלֵי מִלְחַמְתּוֹ
  english_pob_choice: each man his weapons of war
  chosen_spanish: cada hombre sus armas de guerra
  alternatives_spanish:
  - cada uno sus armas de guerra
  - cada hombre su equipo de guerra
  lexicon: HALOT
  rationale: El distributivo אִישׁ corresponde de modo natural a «cada hombre»; כְּלֵי מִלְחָמָה se traduce con fuerza militar como «armas de guerra» para no diluir el sentido bélico.
- source_word: וַתָּהִינוּ
  english_pob_choice: you presumptuously set out
  chosen_spanish: presumptuosamente se dispusieron
  alternatives_spanish:
  - presuntuosamente subieron
  - se atrevieron a subir
  lexicon: HALOT
  rationale: El verbo es raro y tiene carga negativa de audacia imprudente. «Presumptuosamente se dispusieron» conserva el juicio moral del contexto sin resolverlo en una sola glosa interpretativa.
- source_word: לַעֲלֹת הָהָרָה
  english_pob_choice: to go up into the hill country
  chosen_spanish: a subir al monte
  alternatives_spanish:
  - a subir a la región montañosa
  - a ascender a la serranía
  lexicon: HALOT
  rationale: Aunque la nota inglesa sugiere «hill country», el hebreo inmediato es literalmente «el monte / la montaña». En un verso breve, «al monte» mantiene la imagen y permite la nota para la posible referencia geográfica más amplia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal en español según la pauta del proyecto, evitando la sustitución por un título.
theological_decisions:
- issue: Nombre divino del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el nombre propio divino, no un título. La traducción española mantiene esa distinción con «Yahvé», en continuidad con la política del proyecto y sin ocultar el nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz moral de וַתָּהִינוּ
  english_pob_reading: presumptuously set out
  chosen_spanish_reading: presumptuosamente se dispusieron a subir
  alternative_spanish_readings:
  - se atrevieron a subir
  - subieron con presunción
  rationale: El contexto inmediato presenta una acción posterior a una prohibición/juicio divino; por eso la traducción debe conservar la censura implícita. «Presumptuosamente» reproduce ese juicio sin exagerarlo ni neutralizarlo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se ha mantenido alta concordancia con el registro auditado en inglés: el nombre divino se conserva como Yahvé, la confesión de pecado se expresa contra Yahvé, y el cierre mantiene la carga negativa de וַתָּהִינוּ. Se resolvió la tensión entre la literalidad de הָהָרָה («el monte/la montaña») y la nota inglesa sobre «hill country» mediante una forma española breve y una nota explicativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «pecado contra» para reflejar el ל de la confesión.
  - «Subir» conserva la imagen direccional de עלה en todo el verso.
  - «Armas de guerra» mantiene el registro militar de כְּלֵי מִלְחָמָה.
  - Se preserva la censura implícita de וַתָּהִינוּ con un adverbio de modo negativo.
