translation:
  language: es
  text: y el sexto[a], Ithream, de Eglá, la esposa de David. Estos le nacieron a David en Hebrón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mujer de David». La frase hebrea dice literalmente «mujer/esposa de David»; en contexto identifica a Eglá como una de las esposas de David, no necesariamente como su única esposa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשִּׁשִּׁי
  english_pob_choice: and the sixth
  chosen_spanish: y el sexto
  alternatives_spanish:
  - y el sexto hijo
  - el sexto
  lexicon: HALOT
  rationale: La forma ordinal continúa la lista de los hijos de David. En español, «y el sexto» conserva la secuencia natural sin añadir «hijo», que el contexto ya implica.
- source_word: יִתְרְעָם
  english_pob_choice: Ithream
  chosen_spanish: Itream
  alternatives_spanish:
  - Ithream
  lexicon: Convención onomástica bíblica
  rationale: Se translitera el nombre propio al español siguiendo una forma sencilla y reconocible, ajustando la grafía para la fonética española.
- source_word: לְעֶגְלָה
  english_pob_choice: by Eglah
  chosen_spanish: de Eglá
  alternatives_spanish:
  - por Eglá
  - a Eglá
  lexicon: HALOT
  rationale: En esta fórmula genealógica, la preposición indica maternidad/parentesco. En español, «de Eglá» reproduce de manera natural la relación, sin explicitar más de lo que el hebreo exige.
- source_word: אֵשֶׁת דָּוִד
  english_pob_choice: David’s wife
  chosen_spanish: la esposa de David
  alternatives_spanish:
  - la mujer de David
  - la esposa de David
  lexicon: HALOT
  rationale: El hebreo significa literalmente «mujer/esposa de David». En español, «la esposa de David» es claro y fiel al valor relacional del constructo, sin forzar exclusividad.
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas
  - Éstos
  lexicon: HALOT
  rationale: El demostrativo resume la lista precedente. Se usa el masculino plural genérico «Estos» porque introduce a los hijos mencionados.
- source_word: יֻלְּדוּ
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron
  - fueron nacidos
  lexicon: HALOT
  rationale: 'Aunque la POB inglesa usa pasivo, el español bíblico fluye mejor con una construcción personal: «le nacieron». Conserva la idea de descendencia sin sonar forzada.'
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  lexicon: HALOT
  rationale: El ל indica destinatario/parentesco en esta fórmula. En español, «a David» mantiene la dirección relacional de nacimiento.
- source_word: בְּחֶבְרוֹן
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebron
  lexicon: HALOT
  rationale: La preposición locativa se traduce de forma directa. Se mantiene la forma castellana habitual del topónimo, Hebrón.
theological_decisions:
- issue: 'Relación de Eglá con David: posesión o identificación relacional'
  english_pob_reading: '''David’s wife'' renders the Hebrew construct literally while noting it identifies Eglah as one of David’s wives, not necessarily his only wife.'
  chosen_spanish_reading: «la esposa de David» conserva la relación matrimonial sin sugerir que fuera su única esposa.
  alternative_spanish_readings:
  - la mujer de David
  - una esposa de David
  rationale: El hebreo ofrece una relación de pertenencia/matrimonio, no una afirmación sobre exclusividad. La redacción española debe mantener esa tensión y no resolverla artificialmente.
  doctrine_reference: Génesis 2:24; 2 Samuel 3:2-5
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés, con la única adaptación idiomática de yüleḏû → «le nacieron» para una lectura más natural en español. No se detectaron revisiones posteriores que alteraran el sentido base.
  spanish_consistency_notes:
  - Se mantiene el nombre propio Itream con ortografía española sencilla, y Eglá con acento para lectura natural.
  - Se conserva «Hebrón» con tilde en español estándar.
  - La nota al pie preserva la tensión lexical de אֵשֶׁת דָּוִד, evitando tanto una traducción posesiva simplificada como una lectura de exclusividad matrimonial.
