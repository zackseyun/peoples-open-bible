  to: Pero el muchacho no sabía nada[a]; solo Jonatán y David sabían el asunto.
  rationale: Se revisa para mantener el mismo verbo de conocimiento en ambas cláusulas («no sabía ... sabían»), reflejando mejor el paralelismo del hebreo y la decisión documentada en el POB inglés. También se normaliza «solo» según el uso ortográfico actual, sin afectar el sentido.
