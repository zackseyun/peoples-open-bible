  text: אִֽם יַעֲלֶ֣ה הָ/עָ֣ם הַ/זֶּ֗ה לַ/עֲשׂ֨וֹת זְבָחִ֤ים בְּ/בֵית יְהוָה֙ בִּ/יר֣וּשָׁלִַ֔ם וְ֠/שָׁב לֵ֣ב הָ/עָ֤ם הַ/זֶּה֙ אֶל אֲדֹ֣נֵי/הֶ֔ם אֶל רְחַבְעָ֖ם מֶ֣לֶךְ יְהוּדָ֑ה וַ/הֲרָגֻ֕/נִי וְ/שָׁ֖בוּ אֶל רְחַבְעָ֥ם מֶֽלֶךְ יְהוּדָֽה־׀־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/012/027.yaml
  text: If this people goes up to offer sacrifices in the house of Yahweh in Jerusalem[a], then the heart of this people will return to their lord, to Rehoboam king of Judah[c][b], and they will kill me and return to Rehoboam king of Judah.
  footnotes:
  - marker: a
    text: Or 'When this people goes up…' The Hebrew conditional particle can in some contexts approach a temporal sense, but here it is best taken as Jeroboam's feared condition.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple in Jerusalem.
    reason: cultural_note
  - marker: c
    text: Or 'to their master.' The Hebrew term can denote a lord or master; here it refers to Rehoboam, as the following apposition makes clear.
    reason: lexical_alternative
