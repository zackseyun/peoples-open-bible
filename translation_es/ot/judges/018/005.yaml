translation:
  language: es
  text: 'Y le dijeron: «Por favor, consulta a Dios, para que sepamos si prosperará el camino[a] por el que vamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si prosperará nuestro camino»; «camino» traduce más literalmente la imagen hebrea, mientras que también puede entenderse como el viaje o trayecto emprendido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ לוֹ
  english_pob_choice: And they said to him
  chosen_spanish: Y les dijeron
  alternatives_spanish:
  - Entonces le dijeron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo introduce la acción siguiente; en español, «Y» conserva la continuidad del relato sin sobreinterpretar la secuencia temporal. El plural indirecto «les» refleja que el destinatario es parte del diálogo contextual.
- source_word: שְׁאַל נָא
  english_pob_choice: Please inquire
  chosen_spanish: Por favor, consulta
  alternatives_spanish:
  - Por favor, pregunta
  - Consulta, por favor
  lexicon: HALOT
  rationale: שׁאל con נָא expresa una súplica cortés. «Consulta» mantiene mejor la idea de buscar dirección divina que el más general «pregunta», y «Por favor» transmite el matiz de cortesía.
- source_word: בֵאלֹהִים
  english_pob_choice: of God
  chosen_spanish: a Dios
  alternatives_spanish:
  - de Dios
  - mediante Dios
  lexicon: HALOT
  rationale: En este contexto, el sentido es pedir orientación divina. En español, con «consultar» resulta más natural «consultar a Dios»; conserva la referencia singular a Dios y la relación idiomática del hebreo sin forzar una construcción extraña.
- source_word: וְנֵדְעָה
  english_pob_choice: so that we may know
  chosen_spanish: para que sepamos
  alternatives_spanish:
  - y sepamos
  - a fin de que sepamos
  lexicon: HALOT
  rationale: El cohortativo expresa finalidad o resultado. «Para que sepamos» comunica esa finalidad de modo claro y natural en español.
- source_word: הֲתַצְלִיחַ
  english_pob_choice: will succeed
  chosen_spanish: prosperará
  alternatives_spanish:
  - tendrá éxito
  - saldrá bien
  lexicon: HALOT
  rationale: El verbo puede significar prosperar o tener éxito. «Prosperará» conserva mejor el matiz amplio de צלח, incluido el de éxito favorable del recorrido, y mantiene el eco bíblico sin sonar exclusivamente económico.
- source_word: דַּרְכֵּנוּ
  english_pob_choice: the journey
  chosen_spanish: el camino
  alternatives_spanish:
  - la ruta
  - la travesía
  lexicon: HALOT
  rationale: Aunque literalmente es «camino»/«vía», el hebreo puede referirse al curso emprendido. «El camino» preserva la imagen más literal que la revisión inglesa señaló como preferible frente a añadir posesivo no explícito.
- source_word: אֲשֶׁר אֲנַחְנוּ הֹלְכִים עָלֶיהָ
  english_pob_choice: on which we are going
  chosen_spanish: por el que vamos
  alternatives_spanish:
  - en el que vamos
  - sobre el que vamos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «sobre el que estamos andando/yendo». «Por el que vamos» suena natural en español y conserva la imagen del camino transitado sin endurecer la sintaxis.
theological_decisions:
- issue: Referencia de אֱלֹהִים
  english_pob_reading: God (singular)
  chosen_spanish_reading: Dios (singular)
  alternative_spanish_readings:
  - dioses
  rationale: El contexto narrativo apunta a buscar orientación del Dios de Israel por medio del sacerdote. Se mantiene el singular «Dios», siguiendo la lectura contextual del POB en inglés, no una pluralidad de deidades.
  doctrine_reference: Contexto narrativo de Jueces 18; uso lexical-contextual de אֱלֹהִים
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió «our journey» a «the journey» para no añadir posesivo explícito. La versión española sigue esa decisión con «el camino», y conserva la alternativa literal en nota. También se mantuvo el valor de petición cortés de נָא y la referencia singular a Dios.
  spanish_consistency_notes:
  - Se usa «Dios» como traducción de אֱלֹהִים en sentido singular contextual.
  - Se prefiere «camino» para דַּרְכֵּנוּ, en vez de una paráfrasis más libre.
  - Se evita «SEÑOR» porque el texto hebreo no usa יהוה aquí.
  - La puntuación de diálogo y la colocación del pronombre siguen el español moderno y el tono bíblico digno.
