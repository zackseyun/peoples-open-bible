translation:
  language: es
  text: Cumpliré[a] mis votos a Yahvé delante de todo su pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pagaré». El verbo hebreo puede entenderse como «cumplir» o «pagar» los votos; aquí se adopta «cumplir» por su naturalidad en español.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «delante de / en presencia de». La expresión indica cumplimiento público, a la vista de la comunidad adoradora.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְדָרַי
  english_pob_choice: my vows
  chosen_spanish: mis votos
  alternatives_spanish:
  - mis promesas votivas
  - los votos que hice
  lexicon: HALOT
  rationale: נֶדֶר designa un voto o promesa votiva hecha a Dios. En español, «votos» conserva bien ese valor religioso-jurídico sin agregar el matiz explicativo de «promesas votivas». El posesivo de primera persona reproduce el sufijo de 1cs.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al Señor
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente a יהוה; por la convención del proyecto, se conserva el nombre divino como «Yahvé». La preposición ל expresa destino o destinatario de la acción, por eso en español corresponde «a».
- source_word: אֲשַׁלֵּם
  english_pob_choice: I will fulfill
  chosen_spanish: cumpliré
  alternatives_spanish:
  - pagaré
  - terminaré de cumplir
  lexicon: HALOT
  rationale: El piel de שׁלם en contexto de votos puede significar «pagar» o «cumplir». En español, «cumplir» comunica de manera natural la idea de realizar un voto sin reducirlo a un pago monetario. Se mantiene el futuro simple por el valor volitivo/promisorio del hebreo.
- source_word: נֶגְדָה נָּא
  english_pob_choice: in the presence of
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: נֶגֶד indica estar delante, enfrente o en presencia de. «Delante de» es claro y fiel en español; «en presencia de» también es posible, pero suena un poco más formal. La partícula נָא no exige un equivalente explícito en español aquí.
- source_word: לְכָל עַמּוֹ
  english_pob_choice: of all his people
  chosen_spanish: de todo su pueblo
  alternatives_spanish:
  - ante todo su pueblo
  - a todo su pueblo
  lexicon: HALOT
  rationale: La construcción final desarrolla la idea de cumplimiento público ante la comunidad. «Todo su pueblo» expresa de forma natural el colectivo entero al que se alude, y el posesivo «su» remite a Yahvé, como en la lectura inglesa auditada.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se conserva el nombre del pacto en lugar de sustituirlo por una máscara litúrgica. «Yahvé» es la forma estándar del proyecto en español y mantiene la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Carácter público del cumplimiento de los votos
  english_pob_reading: in the presence of all his people
  chosen_spanish_reading: delante de todo su pueblo
  alternative_spanish_readings:
  - en presencia de todo su pueblo
  - ante todo su pueblo
  rationale: La secuencia hebrea subraya que el cumplimiento no es privado, sino visible ante la comunidad de culto. «Delante de» preserva esa dimensión pública sin añadir interpretación extra.
  doctrine_reference: SALMOS 116:18 — lectura poética y comunitaria del cumplimiento votivo
translation_notes:
  revision_awareness: 'El veredicto de revisión más reciente indicó que no eran necesarios cambios: se mantuvo la lectura del nombre divino como Yahvé y la equivalencia óptima de אֲשַׁלֵּם como «cumpliré». La cruzada de control señaló alto acuerdo entre auditorías, sin ajustes sustantivos.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma consistente para יהוה en el texto principal.
  - Se evita «SEÑOR» porque ocultaría el nombre divino que el proyecto desea transparentar.
  - «Votos» conserva el peso técnico de נדר sin convertirlo en lenguaje sacramental más tardío.
  - La sintaxis española fluye con un futuro simple y un complemento final de ámbito comunitario, en línea con el paralelismo hebreo.
