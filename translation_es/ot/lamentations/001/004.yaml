translation:
  language: es
  text: Los caminos de Sion[a] están de duelo, porque nadie viene a la fiesta señalada; todas sus puertas están desoladas, sus sacerdotes gimen, sus vírgenes se entristecen[b], y ella misma está amargada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las rutas de Sion»; el hebreo puede referirse a caminos, rutas o vías de acceso.
    reason: lexical_alternative
  - marker: b
    text: O «sus doncellas».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּרְכֵי צִיּוֹן
  english_pob_choice: The roads of Zion
  chosen_spanish: Las calles de Sion
  alternatives_spanish:
  - Los caminos de Sion
  - Las vías de Sion
  lexicon: HALOT
  rationale: דֶּרֶךְ en plural puede referirse a caminos o vías de acceso; en este lamento el sentido concreto de las rutas hacia Sion se expresa mejor en español con «calles», que suena natural y conserva la imagen de vías transitables vinculadas a la ciudad.
- source_word: אֲבֵלוֹת
  english_pob_choice: mourn
  chosen_spanish: están de duelo
  alternatives_spanish:
  - muestran duelo
  - lloran
  lexicon: HALOT
  rationale: El plural femenino describe a las vías como personificadas en estado de duelo. «Están de duelo» conserva la personificación y el tono funerario/poético sin sonar forzado.
- source_word: מִבְּלִי בָּאֵי מוֹעֵד
  english_pob_choice: because no one comes to the appointed feast
  chosen_spanish: porque no hay quienes vengan a la fiesta señalada
  alternatives_spanish:
  - porque no hay peregrinos que vengan a la fiesta
  - por falta de los que vienen al tiempo señalado
  - porque nadie viene a la fiesta señalada
  lexicon: HALOT
  rationale: מִבְּלִי expresa carencia o ausencia, y בָּאֵי son «los que vienen». En este contexto cultual, מוֹעֵד puede ser fiesta/tiempo señalado; «fiesta señalada» mantiene el alcance culto-festivo sin restringirlo demasiado ni perder la referencia a la reunión ritual.
- source_word: כָּל שְׁעָרֶיהָ
  english_pob_choice: all her gates
  chosen_spanish: todas sus puertas
  alternatives_spanish:
  - todas sus entradas
  - todas sus portadas
  lexicon: HALOT
  rationale: La expresión es directa y el sustantivo español «puertas» comunica bien las puertas de la ciudad como lugar de acceso y actividad pública.
- source_word: שׁוֹמֵמִין
  english_pob_choice: are desolate
  chosen_spanish: están desoladas
  alternatives_spanish:
  - están desiertas
  - yacen desoladas
  lexicon: HALOT
  rationale: El participio comunica devastación y vacío. «Están desoladas» conserva la fuerza del lamento y la imagen de ruina.
- source_word: כֹּהֲנֶיהָ
  english_pob_choice: her priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - sus sacerdotes del templo
  - sus ministros
  lexicon: HALOT
  rationale: Traducción directa del sustantivo con sufijo posesivo; no hay motivo para generalizar ni introducir un término menos preciso.
- source_word: נֶאֱנָחִים
  english_pob_choice: groan
  chosen_spanish: gimen
  alternatives_spanish:
  - suspiran
  - están gimiendo
  lexicon: HALOT
  rationale: El nifal participial expresa lamento audible o suspiro doloroso. «Gimen» reproduce bien la intensidad del dolor en castellano.
- source_word: בְּתוּלֹתֶיהָ
  english_pob_choice: her virgins
  chosen_spanish: sus vírgenes
  alternatives_spanish:
  - sus doncellas
  - sus muchachas
  lexicon: HALOT
  rationale: «Vírgenes» es la equivalencia más transparente del término básico בְּתוּלָה. Se mantiene el valor lexical específico; «doncellas» queda como alternativa estilística más tradicional.
- source_word: נּוּג֖וֹת
  english_pob_choice: grieve
  chosen_spanish: están afligidas
  alternatives_spanish:
  - están tristes
  - están dolidas
  lexicon: HALOT
  rationale: El verbo/participio comunica aflicción y pena. «Están afligidas» conserva el sentido de padecimiento sin forzar un matiz psicológico más estrecho.
- source_word: וְהִיא
  english_pob_choice: and she herself
  chosen_spanish: y ella misma
  alternatives_spanish:
  - y ella
  - y por su parte
  lexicon: HALOT
  rationale: El pronombre es enfático; «ella misma» preserva esa intensidad y mantiene la personificación femenina de Sion/Jerusalén.
- source_word: מַר לָהּ
  english_pob_choice: is bitter
  chosen_spanish: está amargada
  alternatives_spanish:
  - es amarga
  - está en amargura
  - siente amargura
  lexicon: HALOT
  rationale: La construcción expresa amargura y aflicción intensas. «Está amargada» comunica bien el estado resultante en español y conserva la fuerza emocional del hebreo.
theological_decisions:
- issue: Personificación femenina de Sion/Jerusalén y los sufijos de tercera persona femenina
  english_pob_reading: Render Zion/Jerusalem as a personified woman with 'her' and 'she herself.'
  chosen_spanish_reading: 'Mantener a Sion como figura femenina personificada: «sus puertas», «ella misma».'
  alternative_spanish_readings:
  - Tratar la ciudad de modo neutro con «it» implícito
  - despersonificar con formulaciones abstractas
  rationale: El hebreo usa formas femeninas de manera consistente para representar a Sion/Jerusalén. Conservar la personificación respeta la retórica del lamento y evita borrar un rasgo poético-teológico central del pasaje.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: No hay cambios sustantivos respecto del sentido auditado en el contexto inglés; se mantuvo la lectura cultual de מוֹעֵד como «fiesta señalada» y la personificación femenina de Sion/Jerusalén. La principal adaptación fue escoger equivalentes españoles naturales («están de duelo», «están desoladas», «está amargada») sin debilitar la imaginería del hebreo.
  spanish_consistency_notes:
  - Se preserva «Sion» como forma habitual y reconocible en español bíblico.
  - Se traduce el estado emocional con verbos/adjetivos de aflicción para mantener la progresión poética del verso.
  - «Fiesta señalada» conserva el campo semántico de מוֹעֵד sin ocultar su posible sentido de tiempo/convocación festiva.
  - Las notas al pie mantienen alternativas reales cuando el hebreo permite más de una opción léxica, especialmente en דֶּרֶךְ y בְּתוּלָה.
