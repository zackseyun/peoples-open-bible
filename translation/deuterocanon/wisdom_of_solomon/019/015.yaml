theological_decisions:
- issue: Nuance of ἐπισκοπή in a judgment context
  chosen_reading: there will be an inspection of them
  alternative_readings:
  - there will be a visitation upon them
  - they will be punished
  rationale: The Greek noun can carry the sense of divine visitation, often for judgment. The source text does not explicitly state punishment in this clause, though the context points that way. The chosen rendering preserves the lexical core and leaves the punitive implication to context rather than importing it directly.
