revisions:
- from: Porque ve que los sabios mueren[a]; juntamente perecen el necio y el hombre brutal[b], y dejan su riqueza[c] a otros.
  to: Porque ve que los sabios mueren[a]; juntos, el necio y el hombre bestial[b] perecen, y dejan su riqueza[c] a otros.
  rationale: 'Se revisa principalmente בַעַר: «hombre bestial» conserva mejor la idea hebrea de persona senseless/beastlike que «hombre brutal», que en español moderno suele sugerir crueldad o violencia. También se ajusta «juntamente» a «juntos» para mayor naturalidad sin cambiar el sentido de יַחַד. Se mantienen la estructura, el masculino representativo y las alternativas léxicas documentadas.'
