translation:
  language: es
  text: Y así también estos hombres, habiendo sido hechos santos por medio de Dios[a], han sido honrados no solo con este honor, sino también porque, por medio de ellos, nuestra nación no permitió que los enemigos prevalecieran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por Dios» para διὰ θεοῦ; el griego usa διά con genitivo, que puede expresar agencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁγιασθέντες
  english_pob_choice: having been made holy
  chosen_spanish: habiendo sido hechos santos
  alternatives_spanish:
  - habiendo sido santificados
  - habiendo sido consagrados
  lexicon: BDAG
  rationale: El participio aoristo pasivo de ἁγιάζω pide una pasiva que conserve el resultado permanente. «Hechos santos» comunica de modo natural la santidad conferida sin forzar un tecnicismo eclesiástico; «santificados» es viable, pero en español puede sonar más técnico o litúrgico que el contexto inmediato requiere.
- source_word: διὰ θεοῦ
  english_pob_choice: through God
  chosen_spanish: por Dios
  alternatives_spanish:
  - por medio de Dios
  - a través de Dios
  lexicon: BDAG
  rationale: διά con genitivo puede expresar agencia o medio. En español, «por Dios» conserva la relación causal/agencial de forma breve y natural; «por medio de Dios» explicita más el medio, pero suena algo más pesado.
- source_word: τετίμηνται
  english_pob_choice: have been honored
  chosen_spanish: han sido honrados
  alternatives_spanish:
  - han sido estimados
  - han recibido honor
  lexicon: BDAG
  rationale: El perfecto pasivo indica un estado resultante vigente. «Han sido honrados» mantiene ese valor y enlaza bien con τιμή/τιμάω, mientras que «han recibido honor» enfatiza más el acto que el estado.
- source_word: ταύτῃ τῇ τιμῇ
  english_pob_choice: with this honor
  chosen_spanish: con este honor
  alternatives_spanish:
  - por este honor
  - con esta distinción
  lexicon: BDAG
  rationale: El dativo funciona de manera asociativa/instrumental. «Con este honor» es la equivalencia más directa y preserva el vínculo léxico con τετίμηνται/τιμή.
- source_word: τῷ διʼ αὐτοὺς
  english_pob_choice: because through them
  chosen_spanish: porque, por medio de ellos
  alternatives_spanish:
  - porque a través de ellos
  - en razón de que por ellos
  lexicon: BDAG
  rationale: La construcción introduce una base adicional del honor. «Porque, por medio de ellos» conserva el matiz causal y la preposición διά sin convertirla en una simple explicación interpretativa.
- source_word: τὸ ἔθνος ἡμῶν
  english_pob_choice: our nation
  chosen_spanish: nuestra nación
  alternatives_spanish:
  - nuestro pueblo
  lexicon: BDAG
  rationale: ἔθνος aquí señala a la comunidad nacional judía; «nación» refleja mejor el alcance colectivo-político que «pueblo», aunque este último también sería posible.
- source_word: τοὺς πολεμίους
  english_pob_choice: the enemies
  chosen_spanish: los enemigos
  alternatives_spanish:
  - los adversarios
  - los hostiles
  lexicon: BDAG
  rationale: El artículo señala un grupo conocido por el contexto. «Los enemigos» es la forma más directa y transparente en español.
- source_word: μὴ ἐπικρατῆσαι
  english_pob_choice: did not let ... prevail
  chosen_spanish: no permitió que prevalecieran
  alternatives_spanish:
  - no dejó que dominaran
  - no consintió que se impusieran
  lexicon: BDAG
  rationale: 'El infinitivo expresa la idea de prevalecer, dominar o imponerse sobre otro. En español, la construcción negativa con «permitió que» reproduce bien el sentido resultativo: por medio de estos hombres, la nación no quedó vencida por sus enemigos.'
theological_decisions:
- issue: Sentido de ἁγιασθέντες en contexto de martirio
  english_pob_reading: The martyrs are described as having been made holy through God.
  chosen_spanish_reading: Los mártires son descritos como hechos santos por Dios.
  alternative_spanish_readings:
  - Los mártires son descritos como santificados por Dios.
  - Los mártires son descritos como consagrados por Dios.
  rationale: El contexto honra a los mártires y vincula su status con la acción divina. «Hechos santos» conserva la afirmación de santidad sin convertirla innecesariamente en un lenguaje más técnico o cultual que podría estrechar el sentido.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y no resolverla por tradición.'
- issue: Agencia de διὰ θεοῦ
  english_pob_reading: through God
  chosen_spanish_reading: por Dios / por medio de Dios
  alternative_spanish_readings:
  - por Dios
  - a través de Dios
  rationale: La preposición griega permite agencia o medio. Mantener una formulación con «por» evita sustituir la relación del texto por una expresión más directa de la que el griego exige.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: Se revisó el encaje del segmento causal final para que el español mantuviera el valor de la cláusula con τῷ διʼ αὐτοὺς y el infinitivo μὴ ἐπικρατῆσαι sin volverlo una paráfrasis excesiva. El resultado preserva la conexión entre el honor de los mártires y la preservación de la nación.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se eligió «honrados» para sostener el campo léxico de τιμή/τιμάω.
  - Se evitó «SEÑOR» u otras sustituciones devocionales no presentes en el griego.
  - La cláusula final se dejó en forma causal natural en español para reflejar la fuerza de la construcción griega sin perder claridad.
