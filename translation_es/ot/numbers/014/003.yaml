translation:
  language: es
  text: ¿Y por qué Yahvé nos está llevando a esta tierra para caer bajo la espada? Nuestras esposas y nuestros pequeños serán botín[a]. ¿No sería mejor para nosotros regresar a Egipto?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presa»; el hebreo puede denotar quedar como despojo tomado por enemigos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָה
  english_pob_choice: And why
  chosen_spanish: ¿Y por qué
  alternatives_spanish:
  - ¿Por qué
  lexicon: HALOT
  rationale: Conserva la conjunción discursiva de la queja en continuidad con la intervención anterior. En español, «¿Y por qué» reproduce mejor ese enlace que un simple «¿Por qué».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. Según la norma del proyecto, se traduce como «Yahvé» para preservar el Tetragrámaton con transparencia textual.
- source_word: מֵבִיא
  english_pob_choice: is bringing
  chosen_spanish: está llevando
  alternatives_spanish:
  - está trayendo
  - lleva
  lexicon: HALOT
  rationale: El participio transmite acción en curso o inminente. En español, «está llevando» comunica ese valor progresivo y encaja con el movimiento hacia la tierra.
- source_word: אֹתָנוּ אֶל הָאָרֶץ הַזֹּאת
  english_pob_choice: us into this land
  chosen_spanish: nos a esta tierra
  alternatives_spanish:
  - nos hacia esta tierra
  - nos dentro de esta tierra
  lexicon: HALOT
  rationale: El hebreo expresa movimiento hacia la tierra; en español, la combinación con «está llevando» hace natural omitir una preposición equivalente a «into» sin perder el sentido direccional.
- source_word: לִנְפֹּל בַּחֶרֶב
  english_pob_choice: to fall by the sword
  chosen_spanish: para caer bajo la espada
  alternatives_spanish:
  - para morir a espada
  - para caer a espada
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo de morir violentamente en combate. «Bajo la espada» mantiene la imagen sin volverlo un giro demasiado literal o antinatural en español.
- source_word: נָשֵׁינוּ
  english_pob_choice: our wives
  chosen_spanish: Nuestras mujeres
  alternatives_spanish:
  - Nuestras esposas
  lexicon: HALOT
  rationale: El contexto familiar permite «mujeres» o «esposas». Se prefiere «mujeres» para reflejar con más amplitud el término hebreo y evitar restringirlo más de lo necesario.
- source_word: וְטַפֵּנוּ
  english_pob_choice: our little ones
  chosen_spanish: nuestros pequeños
  alternatives_spanish:
  - nuestros niños
  - nuestros hijos pequeños
  lexicon: HALOT
  rationale: טַף alude especialmente a los pequeños o dependientes vulnerables. «Nuestros pequeños» conserva esa fragilidad mejor que un término más general.
- source_word: יִהְיוּ לָבַז
  english_pob_choice: will become plunder
  chosen_spanish: serán botín
  alternatives_spanish:
  - serán presa
  - quedarán como botín
  lexicon: HALOT
  rationale: לָבַז designa el botín tomado por enemigos. «Serán botín» es breve, natural y fiel al campo semántico de guerra y saqueo.
- source_word: הֲלוֹא טוֹב לָנוּ
  english_pob_choice: Would it not be better for us
  chosen_spanish: ¿No sería mejor para nosotros
  alternatives_spanish:
  - ¿No nos convendría más
  - ¿No sería bueno para nosotros
  lexicon: HALOT
  rationale: La pregunta retórica queda bien reflejada con una construcción idiomática española que mantiene la fuerza evaluativa del hebreo.
- source_word: שׁוּב מִצְרָיְמָה
  english_pob_choice: to return to Egypt
  chosen_spanish: regresar a Egipto
  alternatives_spanish:
  - volver a Egipto
  - retornar a Egipto
  lexicon: HALOT
  rationale: «Regresar» transmite la idea de volver atrás y encaja con la pregunta sobre si sería mejor abandonar el avance hacia la tierra prometida.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo contiene el nombre propio del pacto. Se evita la sustitución por un título y se usa «Yahvé», conforme a la decisión doctrinal del proyecto y a la transparencia con el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto coincide con el audit trail inglés revisado: se mantiene el nombre divino como transliteración, el participio con valor progresivo, la imagen idiomática de caer por la espada y la alternativa léxica para לָבַז reflejada en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יְהוָה, coherente con la política del proyecto.
  - «Botín» preserva el campo semántico militar de לָבַז y admite la alternativa «presa» en nota.
  - La traducción evita un calco duro de «into this land» y prioriza una sintaxis natural en español sin perder dirección ni movimiento.
  - «Nuestros pequeños» conserva la vulnerabilidad de טַף mejor que «nuestros hijos» en este contexto de miedo al despojo.
