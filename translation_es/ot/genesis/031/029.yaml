translation:
  language: es
  text: 'Está en mi poder hacerles daño[a], pero el Dios de su padre me habló anoche, diciendo: «Ten cuidado de no hablar con Jacob ni bien ni mal».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de bien a mal», un modismo que significa cualquier cosa en absoluto, sea favorable o desfavorable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶשׁ לְאֵל יָדִי
  english_pob_choice: It is in my power
  chosen_spanish: Yo tengo en mi mano poder
  alternatives_spanish:
  - Tengo poder
  - Está en mi poder
  - Mi mano tiene poder
  lexicon: HALOT
  rationale: El hebreo expresa capacidad o poder efectivo. En español, ‘tener en mi mano poder’ mantiene la imagen idiomática sin sonar demasiado literal, y comunica con claridad la posibilidad real de actuar.
- source_word: לַעֲשׂוֹת עִמָּכֶם רָע
  english_pob_choice: to do you harm
  chosen_spanish: hacerles daño
  alternatives_spanish:
  - hacerles mal
  - hacerles daño
  - hacerles lo malo
  lexicon: HALOT
  rationale: רָע aquí apunta a daño infligido a las personas, no solo a maldad abstracta. ‘Hacerles daño’ es natural en español y conserva el sentido de perjuicio intencional.
- source_word: וֵאלֹהֵי אֲבִיכֶם
  english_pob_choice: but the God of your father
  chosen_spanish: pero el Dios de su padre
  alternatives_spanish:
  - y el Dios de su padre
  - pero el Dios de vuestro padre
  lexicon: HALOT
  rationale: El conector en contexto introduce contraste frente a la afirmación anterior, por eso se vierte ‘pero’. Se usa ‘su padre’ para mantener la referencia narrativa inmediata y la forma reverente y comprensible en español.
- source_word: אֶמֶשׁ
  english_pob_choice: last night
  chosen_spanish: anoche
  alternatives_spanish:
  - la noche pasada
  - ayer en la noche
  lexicon: HALOT
  rationale: El término se refiere a la noche anterior. ‘Anoche’ es la equivalencia natural y más clara en español actual.
- source_word: הִשָּׁמֶר לְךָ
  english_pob_choice: Be careful
  chosen_spanish: Cuídate
  alternatives_spanish:
  - Ten cuidado
  - Guárdate
  - Estate atento
  lexicon: HALOT
  rationale: El imperativo niphal funciona como advertencia de precaución. ‘Cuídate’ conserva el tono exhortativo y la advertencia personal sin volverse rígido.
- source_word: מִדַּבֵּר עִם יַעֲקֹב
  english_pob_choice: not to speak to Jacob
  chosen_spanish: de hablar a Jacob
  alternatives_spanish:
  - de hablar con Jacob
  - de dirigirte a Jacob
  - de hablarle a Jacob
  lexicon: HALOT
  rationale: La construcción prohibitiva con מִן expresa restricción sobre el acto de hablar. ‘Hablar a Jacob’ mantiene el paralelismo semítico sin forzar una lectura más interpretativa; el sentido prohibitivo queda claro por ‘cuídate de’.
- source_word: מִטּוֹב עַד רָע
  english_pob_choice: either good or bad
  chosen_spanish: ni bien ni mal
  alternatives_spanish:
  - de bien a mal
  - algo bueno o malo
  - ni bueno ni malo
  lexicon: HALOT
  rationale: El hebreo es un modismo que abarca cualquier palabra, favorable o desfavorable. ‘Ni bien ni mal’ reproduce bien la polaridad idiomática en español y evita perder el alcance total del mandato.
theological_decisions:
- issue: Referencia a Dios en el discurso de Laban
  english_pob_reading: the God of your father
  chosen_spanish_reading: el Dios de su padre
  alternative_spanish_readings:
  - el Dios de vuestro padre
  - el Dios de tu padre
  rationale: Se preserva la referencia al Dios del padre de Jacob sin suavizar la afirmación del texto. La frase no se reinterpreta como fórmula litúrgica; se mantiene como referencia narrativa y relacional al Dios que interviene para frenar a Labán.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto base y el audit trail en inglés muestran alta concordancia y no requieren revisiones sustantivas. Se conservó el valor idiomático de מִטּוֹב עַד רָע mediante una nota explicativa, como en la POB inglesa, y se mantuvo el contraste discursivo de וֵאלֹהֵי con ‘pero’.
  spanish_consistency_notes:
  - Se usó ‘Dios’ para אֱלֹהִים, conforme al estándar del proyecto.
  - Se mantuvo ‘anoche’ para אֶמֶשׁ como equivalente natural y transparente.
  - La advertencia se expresó con ‘cuídate de’, preservando el tono prohibitivo sin endurecer la sintaxis.
  - La nota al pie se ancla en ‘daño’ para reflejar el alcance idiomático de ‘de bien a mal’.
