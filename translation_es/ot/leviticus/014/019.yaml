translation:
  language: es
  text: Entonces el sacerdote ofrecerá la ofrenda por el pecado[a] y hará expiación por el que está siendo purificado de su impureza; y después degollará el holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ofrenda por la purificación’. El término hebreo חַטָּאת puede designar la ofrenda usada para purificación en contextos rituales levíticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: shall offer
  chosen_spanish: hará la ofrenda
  alternatives_spanish:
  - hará
  - ofrecerá
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה no significa simplemente 'hacer', sino realizar u ofrecer el rito. 'Harà la ofrenda' conserva ese sentido cultual sin sonar forzado en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: '''Sacerdote'' es el equivalente natural y transparente en español para el funcionario cultual del texto.'
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda por la purificación
  - la ofrenda expiatoria
  lexicon: HALOT
  rationale: En Levítico, חטאת puede referirse técnicamente a la ofrenda sacrificial. Mantengo una forma comprensible y tradicional en español, pero sin fijar un término eclesiástico que borre el matiz sacrificial/ritual. La alternativa de 'ofrenda por la purificación' queda implícitamente disponible por el contexto ritual.
- source_word: וְכִפֶּר
  english_pob_choice: make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará atonamiento
  - expiará
  lexicon: HALOT
  rationale: כפר en el lenguaje sacerdotal se expresa bien con 'hacer expiación', fórmula bíblica ya establecida en español y suficientemente fiel al acto ritual sin teorizar más allá del texto.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a favor de
  - sobre
  lexicon: HALOT
  rationale: Con כפר, עַל introduce a la persona por quien se realiza la expiación. 'Por' comunica esa relación de manera idiomática y fiel.
- source_word: הַמִּטַּהֵר
  english_pob_choice: the one being cleansed
  chosen_spanish: el que está siendo purificado
  alternatives_spanish:
  - el que se está purificando
  - el purificado
  lexicon: HALOT
  rationale: El hitpael participial indica a la persona en proceso de purificación ritual. 'El que está siendo purificado' refleja ese proceso de manera clara y conserva la voz pasiva/reflexiva implícita.
- source_word: מִטֻּמְאָתוֹ
  english_pob_choice: from his uncleanness
  chosen_spanish: de su impureza
  alternatives_spanish:
  - de su inmundicia ritual
  - de su inmundicia
  lexicon: HALOT
  rationale: טֻמְאָה denota impureza ritual. 'Impureza' es más natural en español contemporáneo que 'inmundicia', y mantiene el sentido cultual. Se conserva el masculino singular de 'su' según el sufijo hebreo.
- source_word: וְאַחַר
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - y después de eso
  lexicon: HALOT
  rationale: Marca secuencia ritual. 'Y después' es breve, natural y fiel.
- source_word: יִשְׁחַט
  english_pob_choice: he shall slaughter
  chosen_spanish: degollará
  alternatives_spanish:
  - sacrificará
  - matará
  lexicon: HALOT
  rationale: El verbo describe el sacrificio por degüello de la víctima. 'Degollará' conserva la precisión ritual y evita la vaguedad de 'matará'.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - el sacrificio quemado
  - la ofrenda quemada
  lexicon: HALOT
  rationale: '''Holocausto'' es el equivalente litúrgico tradicional y preciso en español para עֹלָה, ofreciendo una correspondencia estable y reconocible en el contexto sacrificial.'
theological_decisions:
- issue: हַטָּאת como nombre sacrificial en contexto de purificación
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda por la purificación
  - ofrenda expiatoria
  rationale: El término hebreo puede designar la ofrenda sacrificial técnica en contextos de purificación. En español, 'ofrenda por el pecado' mantiene la denominación más reconocible sin negar la dimensión purificadora del rito; la alternativa contextual se conserva como posibilidad interpretativa.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Referencia masculina en el sufijo de מִטֻּמְאָתוֹ
  english_pob_reading: from his uncleanness
  chosen_spanish_reading: de su impureza
  alternative_spanish_readings:
  - de su impureza ritual
  - de su inmundicia
  rationale: El sufijo hebreo es masculino singular, y la traducción conserva esa referencia con 'su'. No se neutraliza a plural ni se vuelve impersonal.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que existe alta concordancia con el control cruzado; esta versión sigue de cerca ese estado estable, sin introducir innovaciones innecesarias.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no ocurre.
  - Se conserva 'el sacerdote' para הַכֹּהֵן y 'holocausto' para הָעֹלָה, en línea con terminología sacrificial estable en español.
  - '''Expiación'' se usa para כפר porque expresa bien el acto ritual sacerdotal y evita sobrecargar el texto con explicaciones doctrinales.'
  - El sufijo masculino singular de 'su impureza' se conserva sin neutralización.
