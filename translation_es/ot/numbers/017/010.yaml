translation:
  language: es
  text: ¡Levántense de en medio de esta congregación[a], para que yo los consuma en un momento[b]! Y cayeron rostro en tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Sepárense de entre esta asamblea».
    reason: lexical_alternative
  - marker: b
    text: O «para destruirlos en un instante».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵרֹמּוּ
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántense!
  alternatives_spanish:
  - Sepárense
  - Alcéncense
  - Salgan
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural nifal de רום con fuerza idiomática de apartarse del grupo. En español, «Levántense» conserva la imagen verbal de elevarse o ponerse en pie y funciona como mandato urgente; «Sepárense» explica mejor la intención, pero pierde la imagen del verbo.
- source_word: מִתּוֹךְ
  english_pob_choice: from the midst of
  chosen_spanish: de en medio de
  alternatives_spanish:
  - de entre
  - del centro de
  - de entre medio de
  lexicon: HALOT
  rationale: La construcción indica separación desde dentro del grupo. «De en medio de» es una expresión natural en español bíblico contemporáneo y mantiene bien el valor espacial de la frase hebrea.
- source_word: הָעֵדָה הַזֹּאת
  english_pob_choice: this congregation
  chosen_spanish: esta congregación
  alternatives_spanish:
  - esta asamblea
  - esta comunidad
  lexicon: HALOT
  rationale: עֵדָה designa al colectivo reunido de Israel. «Congregación» conserva ese sentido corporativo y sigue la decisión auditada del POB inglés; «asamblea» también sería válida, pero «congregación» resulta más estable en este contexto.
- source_word: וַאֲכַלֶּה
  english_pob_choice: so that I may consume
  chosen_spanish: para que yo los consuma
  alternatives_spanish:
  - para que yo los destruya
  - para acabar con ellos
  lexicon: HALOT
  rationale: כלה en piel puede expresar consumir, acabar con o destruir. «Consumir» preserva la fuerza devastadora y el lenguaje de juicio divino sin suavizarlo; «destruir» explicita el resultado, pero pierde algo de la imagen verbal.
- source_word: כְּרָגַע
  english_pob_choice: in a moment
  chosen_spanish: en un momento
  alternatives_spanish:
  - al instante
  - en un instante
  lexicon: HALOT
  rationale: La expresión señala brevedad extrema. «En un momento» es idiomático en español y transmite adecuadamente la inmediatez del juicio.
- source_word: וַיִּפְּלוּ
  english_pob_choice: And they fell
  chosen_spanish: Y se postraron
  alternatives_spanish:
  - Y cayeron
  - Entonces cayeron
  lexicon: HALOT
  rationale: Aunque el verbo básico es «caer», en esta construcción el gesto descrito es el de postración reverente o de súplica. «Se postraron» expresa con naturalidad el sentido gestual que el hebreo pretende comunicar en este contexto.
- source_word: עַל פְּנֵיהֶם
  english_pob_choice: on their faces
  chosen_spanish: sobre sus rostros
  alternatives_spanish:
  - con el rostro en tierra
  - boca abajo
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de postración. «Sobre sus rostros» conserva el paralelismo formal con el hebreo y la imagen corporal; «con el rostro en tierra» sería más explicativo, pero menos cercano a la forma original.
theological_decisions:
- issue: Naturaleza urgente de la orden divina ante el juicio inminente
  english_pob_reading: The command is rendered as a call to separate from the congregation before imminent divine judgment, without softening the threat.
  chosen_spanish_reading: La orden se traduce como un llamado urgente a apartarse de la congregación antes del juicio divino inminente, sin atenuar la amenaza.
  alternative_spanish_readings:
  - Quítense de en medio
  - Retírense
  rationale: El hebreo une el imperativo con la intención inmediata de Dios de consumir al pueblo. La versión española conserva esa urgencia y severidad, evitando una formulación más suave que debilitaría el peso del pasaje.
  doctrine_reference: Números 17:10; cf. Números 16:20-21
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail, que indica que no hubo revisiones aplicadas y que el pasaje quedó sin cambios adicionales tras la última pasada. Se mantuvo la alta concordancia general con solo observaciones menores.
  spanish_consistency_notes:
  - Se preservó «congregación» para עֵדָה, coherente con la decisión inglesa auditada y con el uso POB.
  - Se mantuvo «consumir» para כלה, evitando sustituirlo por un sinónimo menos enérgico.
  - Se tradujo la prostración final con un verbo gestual («se postraron») y se conservó la imagen corporal («sobre sus rostros») para reflejar tanto el hebreo como la lectura auditada.
  - El tono es solemne y directo, acorde con un discurso divino de advertencia y juicio.
