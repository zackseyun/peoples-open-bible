  to: Y David subía por la cuesta del monte de los Olivos, subiendo[a] y llorando, con la cabeza cubierta, e iba descalzo. Y todo el pueblo que estaba con él, cada uno se cubrió la cabeza[b], y subían, llorando mientras iban[c].
