translation:
  language: es
  text: 'Entonces Jefté reunió a todos los hombres de Galaad y luchó contra Efraín. Y los hombres de Galaad abatieron a Efraín, porque habían dicho: «Ustedes, galaaditas, son fugitivos[a] de Efraín, en medio de Efraín y en medio de Manasés».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fugitivos» conserva el valor despectivo del sustantivo hebreo פְּלִיטִים y la tensión del insulto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo difícil en la última acusación; alternativamente: «Ustedes son fugitivos de Efraín, oh Galaad, entre Efraín y entre Manasés».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - congregó
  - movilizó
  lexicon: HALOT
  rationale: קבץ expresa reunir o juntar. «Reunió» es natural en español y conserva la idea de convocar a los hombres de Galaad sin añadir matices militares que el verbo por sí solo no exige.
- source_word: כָּל אַנְשֵׁי גִלְעָד
  english_pob_choice: all the men of Gilead
  chosen_spanish: a todos los hombres de Galaad
  alternatives_spanish:
  - a todos los varones de Galaad
  - a todos los guerreros de Galaad
  lexicon: HALOT
  rationale: אַנְשֵׁי significa literalmente «hombres de». Se mantiene esa forma, con «de Galaad», para respetar la referencia colectiva del hebreo sin convertirla interpretativamente en «guerreros».
- source_word: וַיִּלָּחֶם אֶת אֶפְרָיִם
  english_pob_choice: fought with Ephraim
  chosen_spanish: luchó contra Efraín
  alternatives_spanish:
  - peleó con Efraín
  - hizo guerra contra Efraín
  lexicon: HALOT
  rationale: En contexto bélico, לָחַם requiere el sentido de combatir. En español, «luchó contra» comunica mejor la hostilidad que «luchó con», que podría sonar cooperativo.
- source_word: וַיַּכּוּ
  english_pob_choice: struck ... down
  chosen_spanish: derrotaron
  alternatives_spanish:
  - hirieron
  - sometieron
  - golpearon
  lexicon: HALOT
  rationale: נכה puede significar golpear, herir o derrotar. «Derrotaron» transmite el resultado militar de manera clara en español, aunque se reconoce que el verbo hebreo es más amplio; por eso se conserva la nota sobre la dificultad textual en el pasaje paralelo de la acusación.
- source_word: פְּלִיטֵי אֶפְרַיִם
  english_pob_choice: fugitives of Ephraim
  chosen_spanish: fugitivos de Efraín
  alternatives_spanish:
  - escapados de Efraín
  - sobrevivientes de Efraín
  - prófugos de Efraín
  lexicon: HALOT
  rationale: פְּלִיטִים son quienes han escapado o huido. «Fugitivos» conserva el valor léxico y el tono despectivo de la burla, tal como lo hace la versión inglesa de referencia.
- source_word: אַתֶּם גִּלְעָד
  english_pob_choice: You Gileadites
  chosen_spanish: Ustedes, galaaditas
  alternatives_spanish:
  - Ustedes son galaaditas
  - tú, Galaad
  lexicon: HALOT
  rationale: El hebreo usa el topónimo para referirse a su gente. «Galaaditas» es el equivalente idiomático en español para el colectivo, y el vocativo con coma ayuda a reproducir la fuerza del insulto directo.
- source_word: בְּתוֹךְ אֶפְרַיִם בְּתוֹךְ מְנַשֶּׁה
  english_pob_choice: in the midst of Ephraim and in the midst of Manasseh
  chosen_spanish: en medio de Efraín y en medio de Manasés
  alternatives_spanish:
  - entre Efraín y entre Manasés
  - en medio de Efraín y entre Manasés
  lexicon: HALOT
  rationale: בְּתוֹךְ significa literalmente «en medio de» o «entre». Se conserva la repetición en español porque forma parte de la frase difícil del hebreo y no debe resolverse demasiado pronto.
theological_decisions:
- issue: Frase final sintácticamente difícil e insulto preservado
  english_pob_reading: 'The speakers'' insult is rendered as direct speech: ''You Gileadites are fugitives of Ephraim, in the midst of Ephraim and in the midst of Manasseh.'''
  chosen_spanish_reading: 'Se conserva el insulto en discurso directo: «Ustedes, galaaditas, son fugitivos de Efraín, en medio de Efraín y en medio de Manasés».'
  alternative_spanish_readings:
  - «Ustedes son fugitivos de Efraín, oh Galaad, entre Efraín y entre Manasés»
  - «Galaad, ustedes son fugitivos de Efraín, en medio de Efraín y en medio de Manasés»
  rationale: El hebreo de la acusación es comprimido y difícil. La redacción elegida mantiene visible la aspereza sintáctica y el tono injurioso sin forzar el pasaje con una paráfrasis más explicativa de lo que la fuente permite.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa más reciente no introdujo cambios; el pasaje mantiene alto acuerdo con la revisión y no requiere ajustes textuales adicionales en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda; aquí no aparece el tetragrámaton.
  - «Efraín», «Galaad» y «Manasés» se mantienen como nombres propios bíblicos estándar en español.
  - Se preserva el paralelismo repetido de «en medio de» para reflejar la estructura del hebreo.
  - El verbo bélico se expresa con «luchó contra» y «derrotaron» para una lectura natural sin perder la violencia del contexto.
