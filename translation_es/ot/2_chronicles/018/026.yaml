translation:
  language: es
  text: 'y digan: “Así dice el rey: Pongan a este hombre en la cárcel, y aliméntenlo con pan de aflicción[a] y agua de aflicción, hasta que yo vuelva en paz.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “pan de angustia” y “agua de angustia”; es decir, raciones reducidas asociadas con prisión y aflicción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: and say
  chosen_spanish: y digan
  alternatives_spanish:
  - y dirán
  - entonces digan
  lexicon: HALOT
  rationale: El verbo en 2.ª persona plural funciona aquí como continuación imperativa de la orden del rey. En español, el imperativo plural 'digan' comunica mejor esa fuerza que un futuro o un pasado.
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  english_pob_choice: Thus says the king
  chosen_spanish: Así dice el rey
  alternatives_spanish:
  - Así ha dicho el rey
  - Esto dice el rey
  lexicon: HALOT
  rationale: Es la fórmula de mensajero oficial. 'Así dice el rey' mantiene el giro formular y suena natural en español bíblico contemporáneo.
- source_word: שִׂימוּ זֶה
  english_pob_choice: Put this man
  chosen_spanish: Pongan a éste
  alternatives_spanish:
  - Pongan a este hombre
  - Pongan a este sujeto
  lexicon: HALOT
  rationale: El demostrativo se refiere a Micaías de modo deíctico y despectivo. 'Éste' conserva la señalización textual sin añadir una etiqueta más fuerte de la que exige el hebreo.
- source_word: בֵּית הַכֶּלֶא
  english_pob_choice: in the prison
  chosen_spanish: en la cárcel
  alternatives_spanish:
  - en el calabozo
  - en la prisión
  lexicon: HALOT
  rationale: '''Casa de la prisión'' se expresa de forma idiomática como ''cárcel'' en español. Es claro, natural y fiel al lugar de reclusión indicado por el hebreo.'
- source_word: וְהַאֲכִלֻהוּ
  english_pob_choice: and feed him
  chosen_spanish: y aliméntenlo
  alternatives_spanish:
  - y denle de comer
  - y háganlo comer
  lexicon: HALOT
  rationale: El causativo hebreo significa hacer que coma, es decir, alimentarlo. 'Aliméntenlo' preserva la fuerza verbal y el tono de orden.
- source_word: לֶחֶם לַחַץ
  english_pob_choice: bread of affliction
  chosen_spanish: pan de aflicción
  alternatives_spanish:
  - pan de angustia
  - pan de penuria
  lexicon: HALOT
  rationale: La expresión refleja raciones asociadas con penuria o castigo. 'Pan de aflicción' sigue de cerca la formulación del texto y mantiene el paralelismo con la línea siguiente.
- source_word: וּמַיִם לַחַץ
  english_pob_choice: water of affliction
  chosen_spanish: agua de aflicción
  alternatives_spanish:
  - agua de angustia
  - agua de penuria
  lexicon: HALOT
  rationale: Se conserva el paralelo hebreo con 'pan de aflicción'. En español, la repetición ayuda a oír la restricción de raciones y el tono punitivo.
- source_word: עַד שׁוּבִי בְשָׁלוֹם
  english_pob_choice: until I return in peace
  chosen_spanish: hasta que yo vuelva en paz
  alternatives_spanish:
  - hasta que regrese en paz
  - hasta que vuelva sano y salvo
  lexicon: HALOT
  rationale: '''Volver en paz'' mantiene el valor de בְשָׁלוֹם y deja percibir la ironía narrativa: el rey presupone un regreso seguro tras la batalla.'
theological_decisions:
- issue: Valor de בְשָׁלוֹם al final de la orden
  english_pob_reading: until I return in peace
  chosen_spanish_reading: hasta que yo vuelva en paz
  alternative_spanish_readings:
  - hasta que regrese en paz
  - hasta que vuelva sano y salvo
  rationale: La expresión no introduce una doctrina, pero sí una expectativa de retorno seguro que en contexto resulta irónica. 'En paz' conserva la literalidad básica y la ambigüedad narrativa.
  doctrine_reference: Narrative irony; contextual semantics of בְשָׁלוֹם
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con la lectura auditada del POB inglés. Se conservó la fórmula del mensajero, el demostrativo deíctico y el paralelismo 'pan/agua de aflicción', sin suavizar la dureza del mandato. No se introdujeron cambios de revisión adicionales.
  spanish_consistency_notes:
  - Se usa 'cárcel' para בֵּית הַכֶּלֶא por claridad idiomática, sin perder el sentido de reclusión.
  - Se mantiene 'aflicción' en ambos sintagmas para reproducir el paralelismo del hebreo y el diseño del POB inglés.
  - '''Pongan a éste'' conserva el tono de señalamiento del original sin añadir un calificativo interpretativo.'
  - '''En paz'' se deja sin amplificación para preservar la ironía del contexto narrativo.'
