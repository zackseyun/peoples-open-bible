translation:
  language: es
  text: 'Entonces el rey respondió y dijo[a]: «Denle a ella el niño vivo, y de ningún modo lo maten; ella es su madre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «muriendo no la hagan morir», una prohibición enfática que significa «no deben matarlo en absoluto» o «de ningún modo lo maten».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: El verbo en esta fórmula narrativa introduce la respuesta del rey; «respondió» conserva el valor de contestación formal sin sonar forzado en español. Mantengo también la secuencia con «y dijo» porque el hebreo trae ambos verbos.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es el equivalente directo y natural del sustantivo con artículo definido.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  lexicon: HALOT
  rationale: Verbo estándar de introducción de discurso; «dijo» es natural y fiel al registro narrativo.
- source_word: תְּנוּ לָהּ
  english_pob_choice: Give her
  chosen_spanish: Denle a ella
  alternatives_spanish:
  - Dense a ella
  - Entréguenselo a ella
  lexicon: HALOT
  rationale: El imperativo plural de נתן con pronombre indirecto puede expresarse en español como «Denle». Añadí «a ella» para reflejar explícitamente el dativo del hebreo y evitar ambigüedad en la referencia.
- source_word: הַיָּלוּד הַחַי
  english_pob_choice: the living child
  chosen_spanish: el niño vivo
  alternatives_spanish:
  - el hijo vivo
  - el niño que vive
  - el recién nacido vivo
  lexicon: HALOT
  rationale: יַלוּד es «nacido» o «niño recién nacido/niño»; en este contexto judicial, «niño» comunica bien el referente. «Vivo» traduce el adjetivo החַי de manera directa y sobria.
- source_word: וְהָמֵת לֹא תְמִיתֻהוּ
  english_pob_choice: and by no means put him to death
  chosen_spanish: y de ningún modo lo maten
  alternatives_spanish:
  - y no lo maten
  - y ciertamente no lo maten
  - y no le den muerte
  lexicon: HALOT
  rationale: La construcción hebrea es una prohibición enfática con infinitivo absoluto + verbo finito. «De ningún modo» reproduce esa intensidad mejor que un simple «no».
- source_word: הִיא אִמּוֹ
  english_pob_choice: she is his mother
  chosen_spanish: ella es su madre
  alternatives_spanish:
  - ella es la madre de él
  - ella es su mamá
  lexicon: HALOT
  rationale: La cláusula nominal identifica a la madre verdadera. «Su madre» conserva la relación posesiva del sufijo hebreo y es natural en español.
translation_notes:
  revision_awareness: 'Concordancia alta con el texto base y el audit trail inglés: se preserva la secuencia narrativa «respondió y dijo», la identificación judicial del niño vivo y la prohibición enfática, sin añadir interpretaciones ajenas al hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «rey» en vez de un equivalente más formal o eclesiástico porque el contexto narrativo lo requiere.
  - Se tradujo la prohibición enfática con una construcción idiomática de fuerte negación para reflejar la fuerza del hebreo.
  - El posesivo «su» en «su madre» sigue el sentido del sufijo hebreo de tercera persona masculina singular.
