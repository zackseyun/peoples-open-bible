  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece el nombre divino ni términos doctrinales sensibles adicionales. La decisión metafórica sobre 'las profundidades de la tierra' está bien preservada, y la nota alternativa debe mantenerse con anclaje correcto.
