translation:
  language: es
  text: Había muchas lámparas en el aposento alto donde estábamos reunidos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antorchas». El término griego puede referirse más ampliamente a luces portátiles, pero en este contexto interior «lámparas» es más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Había
  alternatives_spanish:
  - Ahora había
  - Y había
  lexicon: BDAG
  rationale: δέ es un conector suave de avance narrativo. En español, omitir una partícula equivalente y comenzar con 'Había' produce una apertura natural de escena sin forzar contraste ni añadir un 'ahora' innecesario.
- source_word: λαμπάδες
  english_pob_choice: lamps
  chosen_spanish: lámparas
  alternatives_spanish:
  - lámparas de aceite
  - antorchas
  lexicon: BDAG
  rationale: λαμπάς puede referirse a lámpara o antorcha. Como el contexto es un aposento interior, 'lámparas' expresa mejor el objeto probable sin sugerir antorchas de exterior. 'Lámparas de aceite' sería más específico pero excede lo que el texto afirma.
- source_word: ἱκαναὶ
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - bastantes
  - numerosas
  - suficientes
  lexicon: BDAG
  rationale: ἱκανός aquí califica cantidad. 'Muchas' es el equivalente más natural y conserva la idea de abundancia; 'suficientes' introduciría la noción de suficiencia, que no es la principal en este contexto.
- source_word: ἐν τῷ ὑπερῴῳ
  english_pob_choice: in the upper room
  chosen_spanish: en el aposento alto
  alternatives_spanish:
  - en el cuarto alto
  - en la habitación de arriba
  - en el piso alto
  lexicon: BDAG
  rationale: ὑπερῷον designa un cuarto en la parte superior de una casa. 'Aposento alto' es una expresión clara y tradicional en español bíblico, y refleja bien el espacio doméstico sin caer en un calco torpe.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el que
  - en donde
  lexicon: BDAG
  rationale: El relativo local οὗ se vierte de forma natural con 'donde' en español para indicar ubicación.
- source_word: συνηγμένοι
  english_pob_choice: gathered
  chosen_spanish: reunidos
  alternatives_spanish:
  - juntados
  - asambleados
  - congregados
  lexicon: BDAG
  rationale: El participio perfecto pasivo de συνάγω describe al grupo como ya reunido. 'Reunidos' comunica bien el estado resultante y suena natural en español; 'congregados' podría sonar más eclesiástico de lo que pide el contexto.
- source_word: ἦσαν ... ἦμεν
  english_pob_choice: there were ... we were
  chosen_spanish: había ... estábamos
  alternatives_spanish:
  - eran ... éramos
  - había ... habíamos sido
  lexicon: BDAG
  rationale: Los imperfectos de εἰμί aquí presentan un trasfondo descriptivo. 'Había' introduce la existencia de las lámparas; 'estábamos' conserva la referencia al grupo presente en el lugar y evita una traducción más rígida.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y coincide con el criterio del POB inglés: elegir una expresión natural para el contexto interior y no sobrerinterpretar λαμπάδες como ''antorchas''. No hay cambios textuales respecto del expediente inglés; la única adaptación es idiomática al español.'
  spanish_consistency_notes:
  - Se mantiene 'aposento alto' como equivalente estable de ὑπερῷον.
  - Se usa 'reunidos' para conservar el estado resultante de συνηγμένοι sin añadir matices litúrgicos.
  - La nota al pie preserva la alternativa léxica documentada en inglés ('antorchas') y aclara por qué 'lámparas' sigue siendo la opción principal.
