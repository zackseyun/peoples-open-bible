id: ACT.8.32
reference: Acts 8:32
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡ δὲ περιοχὴ τῆς γραφῆς ἣν ἀνεγίνωσκεν ἦν αὕτη· Ὡς πρόβατον ἐπὶ σφαγὴν ἤχθη, καὶ ὡς ἀμνὸς ἐναντίον τοῦ ⸀κείραντος αὐτὸν ἄφωνος, οὕτως οὐκ ἀνοίγει τὸ στόμα αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/008/032.yaml
  text: 'Now the passage of Scripture that he was reading was this: “Like a sheep he was led to slaughter[a], and like a lamb before the one shearing it is silent[b], so he does not open his mouth.”'
  footnotes:
  - marker: a
    text: Or “to the slaughter.”
    reason: lexical_alternative
  - marker: b
    text: Or “before the shearer”; Greek literally “before the one shearing it.”
    reason: lexical_alternative
translation:
  language: ko
  text: 그가 읽고 있던 성경 구절은 이러하였습니다. 「양같이 도살장으로 끌려갔고, 어린양이 그 털 깎는 자 앞에서 잠잠한 것같이, 그렇게 그는 입을 열지 아니하였다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρόβατον … ἀμνὸς … κείραντος
  english_pob_choice: sheep … lamb … the one shearing it
  chosen_korean: 양 … 어린양 … 털 깎는 자
  alternatives_korean:
  - 양 … 어린 양 … 깎는 사람
  lexicon: BDAG
  rationale: 이사야 53:7(LXX) 인용 구절을 직역. 한국어 「어린양」은 그리스도론적 무게를 보존하는 정착어이며, 도살 비유의 의도가 그대로 살아난다.
theological_decisions:
- issue: 이사야 53장 인용의 톤 유지
  chosen_reading: 양같이 도살장으로 끌려갔고, 어린양이 그 털 깎는 자 앞에서 잠잠한 것같이, 그렇게 그는 입을 열지 아니하였다.
  alternative_readings:
  - 도살될 양처럼 끌려가셨고…
  rationale: LXX-이사야 53:7 인용의 평행 시 구조와 침묵의 무게(οὐκ ἀνοίγει τὸ στόμα)를 직역으로 보존. 한국어 번역 전통에서 흔히 풀어 쓰지만, 본문은 일부러 군더더기 없이 잘려 있다.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve scriptural-citation cadence'
