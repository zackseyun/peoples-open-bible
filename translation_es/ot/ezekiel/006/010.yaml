    rationale: La presencia de «Yahvé» en el texto principal ya sigue la política del proyecto; la nota no añade una alternativa léxica del pasaje. Puede omitirse para evitar sobreanotación.
  revised_spanish_text: Entonces sabrán que yo soy Yahvé; no hablé[a] en vano cuando dije que traería sobre ellos esta calamidad[b].
  revised_footnotes:
