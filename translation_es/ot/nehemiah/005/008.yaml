    reason: alternative_reading
  revision_rationale: Se eliminó la nota [a] original por ser innecesaria y no corresponder a una alternativa significativa. Se mantuvo «hemos rescatado» con su nota léxica, y se rehízo la cláusula final para que el español suene natural y conserve la fuerza retórica del hebreo y de la revisión inglesa. «De nuevo» explicita de manera mínima la consecuencia implícita en el contexto.
