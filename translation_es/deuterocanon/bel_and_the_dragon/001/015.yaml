lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: But the
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: LSJ
  rationale: δὲ introduce continuación con leve contraste o transición. En español, «Pero» conserva bien ese matiz narrativo sin volver la frase pesada.
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: LSJ
  rationale: «Sacerdotes» es el equivalente natural y preciso de ἱερεῖς en español bíblico.
- source_word: ἦλθον
  english_pob_choice: came
  chosen_spanish: venían
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: LSJ
  rationale: En este contexto narrativo breve, «venían» puede expresar la llegada nocturna con fluidez en español. También es posible «vinieron» o «llegaron», pero el griego solo indica la acción de venir/ir y no exige un matiz más puntual.
- source_word: τὴν νύκτα
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - durante la noche
  - en la noche
  lexicon: LSJ
  rationale: Es una expresión temporal idiomática; «de noche» suena natural y conserva el sentido adverbial del griego.
- source_word: κατὰ τὸ ἔθος αὐτῶν
  english_pob_choice: according to their custom
  chosen_spanish: según su costumbre
  alternatives_spanish:
  - como era su costumbre
  - de acuerdo con su costumbre
  lexicon: LSJ
  rationale: «Costumbre» reproduce ἔθος con claridad. «Según» mantiene la relación normativa o habitual sin añadir interpretación.
- source_word: αἱ γυναῖκες
  english_pob_choice: and the women
  chosen_spanish: y las mujeres
  alternatives_spanish:
  - y sus esposas
  - y las esposas
  lexicon: LSJ
  rationale: γυναῖκες puede significar «mujeres» o «esposas». Como el texto inmediato no especifica relación matrimonial, se conserva la lectura no interpretativa «mujeres».
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios y señaló acuerdo alto con el texto fuente; por eso se mantiene una traducción breve, no interpretativa, y se conserva la ambigüedad lexical de γυναῖκες.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico en español neutro y legible.
  - No se introduce «esposas» en el cuerpo principal porque el griego no lo explicita en este fragmento.
  - «De noche» evita un calco rígido de la acusativa temporal y suena idiomático en español.
  - Se conserva la transición adversativa de δέ con «Pero».
