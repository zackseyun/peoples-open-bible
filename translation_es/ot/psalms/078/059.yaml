translation:
  language: es
  text: Dios oyó y se enfureció[a], y rechazó[b] por completo a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se airó». El verbo hebreo puede expresar airarse o ser provocado a ira.
    reason: lexical_alternative
  - marker: b
    text: O «repudió» o «despreció».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - oyó de
  lexicon: HALOT
  rationale: El qal perfecto expresa aquí la acción simple de oír. En español, «oyó» reproduce con naturalidad el inicio de la reacción divina sin añadir matices que el hebreo no exige.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: La forma plural morfológica funciona con sentido singular para el Dios de Israel; «Dios» es la equivalencia directa y natural en español.
- source_word: וַיִּתְעַבָּר
  english_pob_choice: was furious
  chosen_spanish: se enfureció
  alternatives_spanish:
  - se airó
  - se llenó de ira
  - fue provocado a ira
  lexicon: HALOT
  rationale: El verbo intensifica la reacción emocional; «se enfureció» conserva la fuerza del hebreo y corresponde bien al matiz elegido en la POB inglesa, sin suavizarlo a «estaba descontento» o equivalente.
- source_word: וַיִּמְאַס
  english_pob_choice: rejected
  chosen_spanish: rechazó
  alternatives_spanish:
  - despreció
  - repudió
  - desechó
  lexicon: HALOT
  rationale: מאס expresa rechazo, repudio o desprecio. «Rechazó» mantiene el valor judicial/pactual que el contexto pide y es claro en español.
- source_word: מְאֹד
  english_pob_choice: utterly
  chosen_spanish: por completo
  alternatives_spanish:
  - totalmente
  - por entero
  - en gran manera
  lexicon: HALOT
  rationale: El adverbio intensifica el rechazo. «Por completo» comunica la totalidad del rechazo de manera idiomática y sin recargar el verso.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - contra Israel
  - en Israel
  lexicon: HALOT
  rationale: Con מאס, la preposición señala el objeto de la acción; en español se expresa naturalmente como complemento directo con «a Israel».
theological_decisions:
- issue: Lenguaje antropopático de ira divina y rechazo
  english_pob_reading: 'Retain the strong personal language: ''was furious'' and ''utterly rejected.'''
  chosen_spanish_reading: 'Mantener el lenguaje fuerte: «se enfureció» y «rechazó por completo».'
  alternative_spanish_readings:
  - se disgustó
  - mostró desagrado
  - apartó a Israel
  rationale: El hebreo usa un lenguaje de juicio pactual enérgico. La traducción debe preservar esa tensión teológica en lugar de suavizarla, sin implicar pasiones pecaminosas en Dios.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La base inglesa pasó de ‘was enraged’ a ‘was furious’ para una expresión más directa y natural del verbo; la versión española sigue esa última decisión al usar «se enfureció», manteniendo también el rechazo total de Israel.
  spanish_consistency_notes:
  - Se preserva «Dios» para אֱלֹהִים, sin máscara litúrgica, conforme al criterio del proyecto.
  - «Se enfureció» conserva la fuerza antropopática documentada en la auditoría inglesa.
  - «Rechazó por completo» refleja la intensidad de מְאֹד y evita una atenuación interpretativa.
  - 'La preposición hebrea con מאס se vuelve complemento directo natural en español: «a Israel».'
