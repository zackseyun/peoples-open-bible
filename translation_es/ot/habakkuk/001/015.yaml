- from: A todos los saca con anzuelo[a]; los arrastra con su red y los recoge con su red de arrastre[b]. Por eso se alegra y se regocija.
  to: A todos los saca con un anzuelo[a]; los arrastra con su red y los recoge con su red de arrastre[b]. Por eso se alegra y se regocija.
  rationale: Se ajusta «con anzuelo» a «con un anzuelo» para un español más natural y fiel al valor instrumental indefinido, y se corrige la nota [a] para que preserve una alternativa real documentada en la auditoría inglesa en vez de repetir la lectura principal.
