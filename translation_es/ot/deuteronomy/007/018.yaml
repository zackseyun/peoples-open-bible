translation:
  language: es
  text: No les temas; recuerda bien[a] lo que Yahvé tu Dios hizo a Faraón y a todo Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «recordar, recordarás»; una forma enfática que significa «seguramente recordarás» o «recuerda bien».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תִירָא
  english_pob_choice: You shall not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tendrás miedo
  - No debes temer
  lexicon: HALOT
  rationale: La forma prohibitiva con לֹא y el imperfecto expresa una orden negativa. En español, 'No temas' comunica con naturalidad la prohibición solemne sin perder el tono exhortativo del hebreo.
- source_word: מֵהֶם
  english_pob_choice: them
  chosen_spanish: a ellos
  alternatives_spanish:
  - de ellos
  - por ellos
  lexicon: HALOT
  rationale: Con ירא, la preposición מן marca el objeto de temor. En español, 'temer a ellos' se expresa mejor como 'a ellos', evitando una construcción forzada.
- source_word: זָכֹר תִּזְכֹּר
  english_pob_choice: you shall surely remember
  chosen_spanish: recuerda bien
  alternatives_spanish:
  - recuerda seguramente
  - recuerda sin falta
  - recuerda de veras
  lexicon: HALOT
  rationale: El infinitivo absoluto más verbo finito intensifica la orden. 'Recuerda bien' conserva el énfasis de 'recordar con firmeza' de manera natural en español; 'sin falta' también sería posible, pero suena más administrativo.
- source_word: אֵת אֲשֶׁר עָשָׂה
  english_pob_choice: what ... did
  chosen_spanish: lo que ... hizo
  alternatives_spanish:
  - aquello que ... hizo
  - lo que ... ha hecho
  lexicon: HALOT
  rationale: El hebreo refiere a la obra histórica ya realizada; el pretérito simple en español reproduce adecuadamente ese hecho consumado. 'Lo que' es la solución natural para el relativo con אֲשֶׁר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La convención del proyecto en español es 'Yahvé' para el Tetragrámaton, manteniendo el nombre divino personal y evitando la sustitución por un título. 'Yahweh' sería una transliteración más cercana al inglés, pero menos estable en español.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - tu Dios, el Dios de ti
  lexicon: HALOT
  rationale: El sufijo de segunda persona masculina singular se vierte de forma directa como 'tu Dios'. En español la relación de pacto y posesión queda clara sin añadir explicaciones.
- source_word: לְפַרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - contra Faraón
  - para Faraón
  lexicon: HALOT
  rationale: Con עשה, ל puede indicar el destinatario o afectado por la acción. En español, 'hizo a Faraón' no sería idiomático; 'hizo a Faraón' se entiende mejor como 'hizo a Faraón' dentro de la lista de juicios, aquí expresado con 'a Faraón'.
- source_word: וּלְכָל מִצְרַיִם
  english_pob_choice: and to all Egypt
  chosen_spanish: y a todo Egipto
  alternatives_spanish:
  - y a todo el país de Egipto
  - y a todos los egipcios
  lexicon: HALOT
  rationale: El hebreo nombra a Egipto como entidad colectiva/territorial. 'Todo Egipto' preserva ese sentido y evita restringirlo solo a la población individual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La lectura auditada del POB inglés preserva el nombre divino en vez de sustituirlo por un título. En español, 'Yahvé' es la forma acordada para mantener el nombre revelado a Israel con dignidad y claridad.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza enfática de זָכֹר תִּזְכֹּר
  english_pob_reading: you shall surely remember
  chosen_spanish_reading: recuerda bien
  alternative_spanish_readings:
  - recuerda sin falta
  - recuerda con certeza
  rationale: No se trata solo de 'recordar', sino de una insistencia enfática. 'Recuerda bien' comunica la obligación intensificada sin convertir el texto en una paráfrasis demasiado libre.
  doctrine_reference: 'DOCTRINE.md: Lexical intensity should be preserved when grammatically significant'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la revisión más reciente; la concordancia general fue alta y no hubo observaciones pendientes. La versión española sigue de cerca el sentido lexical y la intensidad del hebreo, ajustando solo la formulación para una publicación natural en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme a la norma del proyecto en español.
  - '''Faraón'' se conserva como nombre histórico/titular estándar en español bíblico.'
  - La intensidad verbal de זָכֹר תִּזְכֹּר queda reflejada con 'recuerda bien' y la nota a pie de página.
  - '''Egipto'' se mantiene como entidad colectiva, no como referencia exclusiva a los egipcios como personas.'
