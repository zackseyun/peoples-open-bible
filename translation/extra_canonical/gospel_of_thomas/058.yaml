translation:
  text: Jesus said[a], "Blessed is the person who has labored[f][e][d][c][b]; he has
    found life."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Makarios (ⲙⲁⲕⲁⲣⲓⲟⲥ) can nuance “happy” or “fortunate” as well as “blessed.”
    reason: lexical_alternative
  - marker: b
    text: ⲡⲣⲱⲙⲉ denotes a human being generically; “person” avoids implying male-only
      reference though “man” is a possible rendering.
    reason: lexical_alternative
  - marker: c
    text: ϩⲓⲥⲉ ranges from “labor/toil” to “suffer/be distressed”; some translate
      “Blessed is the one who has suffered.”
    reason: lexical_alternative
  - marker: d
    text: The independent pronoun ⲁⲛⲧⲟϥ is emphatic; the translation carries this
      forward as “that one has found life” rather than “he himself has found life.”
    reason: dialect_note
  - marker: e
    text: Printed form ⲁⲡⲱⲛϩ likely reflects orthographic variation; normalized Sahidic
      expects ⲉⲡⲱⲛϩ as the object of ϩⲉ.
    reason: textual_variant
  - marker: f
    text: Or 'that one has found life'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: Crum, s.v. ⲙⲁⲕⲁⲣⲓⲟⲥ; Lambdin, glossary
  rationale: Greek loanword μακάριος in Coptic typically conveys beatitude tone; “blessed”
    keeps the solemnity and Thomas’s terse style while noting possible nuances of
    happiness/fortune.
- source_word: ⲡⲣⲱⲙⲉ
  chosen: person
  alternatives:
  - man
  - human being
  lexicon: Crum, s.v. ⲣⲱⲙⲉ
  rationale: Semantic range is ‘human being’; translation as “person” avoids unnecessary
    gendering while preserving singular definiteness.
- source_word: ⲉⲧⲉⲣⲉⲁⲛⲧⲟϥ
  chosen: who
  alternatives:
  - who himself
  lexicon: Layton, Coptic Grammar (relative clause with independent pronoun)
  rationale: The independent pronoun ⲁⲛⲧⲟϥ inside the relative clause is emphatic.
    Rather than “who himself,” the emphasis is carried forward by rendering the following
    clause as “that one…” to preserve Thomas’s punchy diction.
- source_word: ϩⲓⲥⲉ
  chosen: labored
  alternatives:
  - toiled
  - suffered
  - was distressed
  lexicon: Crum, s.v. ϩⲓⲥⲉ
  rationale: Verb denotes exertion, hardship, or distress. “Labored” balances toil
    and endurance without narrowing to purely physical or purely emotional suffering.
- source_word: ϩⲉ
  chosen: has found
  alternatives:
  - has discovered
  - found
  lexicon: Crum, s.v. ϩⲉ
  rationale: Perfective with ⲁ- gives resultative sense; “has found” matches aspect
    and Thomas’s concise cadence.
- source_word: ⲉⲡⲱⲛϩ
  chosen: life
  alternatives:
  - the life
  lexicon: Crum, s.v. ⲱⲛϩ
  rationale: Coptic definite article often has generic force; English bare “life”
    conveys the idiomatic object of ϩⲉ without implying exclusivity. “The life” remains
    a possible reading but can sound overly technical here.
- source_word: ⲡⲉϫⲉ ⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - Jesus speaks
  lexicon: Lambdin, s.v. ⲡⲉϫⲉ
  rationale: Standard narrative introducer in Thomas; simple “said” preserves terse
    frame.
textual_note: 'The codex line shows compressed/orthographic variation: printed segmentation
  has ⲛ̄ⲧⲁϩϩⲓⲥⲉ (NHAM02.43 lb 8) and ⲁϥϩⲉ ⲁⲡⲱⲛϩ (lb 9), while Dilley’s normalized
  Sahidic reads ⲉⲧⲉⲣⲉⲁⲛⲧⲟϥϩⲓⲥⲉ and ⲁⲛⲧⲟϥϩⲉ ⲉⲡⲱⲛϩ. The normalized form regularizes
  the relative construction with emphatic independent pronoun ⲁⲛⲧⲟϥ and the object
  marker ⲉ- with ϩⲉ. No lacunae or conjectural restorations are present; the differences
  reflect orthography and grammatical normalization (Sahidic with Lycopolitan features).'
