translation:
  language: es
  text: 'Y dirás: «Oigan la palabra de Yahvé, reyes de Judá y habitantes de Jerusalén. Así dice Yahvé de los ejércitos, el Dios de Israel: He aquí, estoy trayendo una calamidad[a] sobre este lugar, de modo que a todo el que la oiga le zumbarán los oídos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desastre»; el hebreo puede referirse a una calamidad de juicio más que a mal moral.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «le zumbarán los oídos», un modismo para expresar sobresalto, horror o conmoción ante lo oído.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español, 'Yahvé' preserva ese nombre divino de manera transparente y se ajusta al criterio del proyecto de no ocultarlo con una sustitución.
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  lexicon: HALOT
  rationale: El imperativo plural convoca a atención pública en tono profético. 'Oigan' conserva la fuerza de llamada y suena natural en español contemporáneo.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: '''Palabra'' mantiene la fórmula profética formal y la fuerza de discurso divino; ''mensaje'' suavizaría el registro y perdería parte de la densidad bíblica.'
- source_word: מַלְכֵי יְהוּדָה
  english_pob_choice: O kings of Judah
  chosen_spanish: reyes de Judá
  alternatives_spanish:
  - oh, reyes de Judá
  - reyes de Judá, ustedes
  lexicon: HALOT
  rationale: El vocativo queda claro por el contexto en español sin necesidad de un 'oh' explícito, que sonaría más marcado o arcaizante.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: and inhabitants of Jerusalem
  chosen_spanish: y habitantes de Jerusalén
  alternatives_spanish:
  - y los que habitan en Jerusalén
  - y residentes de Jerusalén
  lexicon: HALOT
  rationale: '''Habitantes'' reproduce bien el sustantivo participial y es natural en español bíblico y moderno.'
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así ha dicho
  alternatives_spanish:
  - Así dice
  - Así ha hablado
  lexicon: HALOT
  rationale: La fórmula mensajera profética se expresa con solemnidad en español; 'ha dicho' mantiene una cadencia bíblica sin depender de un calco rígido.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: '''De los ejércitos'' sigue el valor tradicional del título צְבָאוֹת y evita sustituirlo por una paráfrasis interpretativa. ''Huestes'' sería más literario pero menos transparente para lectores amplios.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción posesiva es directa y no requiere variación; 'el Dios de Israel' preserva el identificador pactual.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Yo estoy aquí
  lexicon: HALOT
  rationale: La fórmula introduce una declaración divina solemne. 'He aquí' mantiene el tono profético y prepara la inminencia de la acción.
- source_word: מֵבִיא
  english_pob_choice: I am bringing
  chosen_spanish: estoy trayendo
  alternatives_spanish:
  - traeré
  - voy a traer
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa acción inminente y vívida; 'estoy trayendo' conserva esa inmediatez mejor que un futuro simple.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: calamidad
  alternatives_spanish:
  - desgracia
  - maldad
  - desastre
  lexicon: HALOT
  rationale: En este contexto judicial, el término apunta a un mal que cae como juicio, no a maldad moral. 'Calamidad' comunica bien la idea de desastre enviado por Dios sin moralizarlo indebidamente.
- source_word: עַל הַמָּקוֹם הַזֶּה
  english_pob_choice: on this place
  chosen_spanish: sobre este lugar
  alternatives_spanish:
  - contra este lugar
  - sobre este sitio
  lexicon: HALOT
  rationale: '''Sobre'' refleja adecuadamente la preposición עַל en un anuncio de juicio que cae desde arriba sobre el lugar; ''contra'' sería posible pero más interpretativo.'
- source_word: אֲשֶׁר כָּל שֹׁמְעָהּ תִּצַּלְנָה אָזְנָיו
  english_pob_choice: such that the ears of everyone who hears of it will tingle
  chosen_spanish: de modo que a todo el que la oiga le zumbarán los oídos
  alternatives_spanish:
  - de modo que a todo el que la oiga le sonarán los oídos
  - de modo que a quien la escuche le tintinearán los oídos
  lexicon: HALOT
  rationale: El hebreo usa un modismo de reacción física ante una noticia estremecedora. 'Zumbarán los oídos' conserva el giro idiomático con un equivalente natural en español; el pronombre femenino 'la' puede referirse al anuncio de calamidad implícito por el contexto.
theological_decisions:
- issue: Nombre divino YHWH en una cita profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del Dios de Israel en vez de un título sustituido. Esto sigue la decisión doctrinal del proyecto y preserva la transparencia del texto hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  rationale: El título se mantiene como fórmula reverente y reconocible sin reemplazarlo por una glosa explicativa que debilite su carácter técnico-bíblico.
  doctrine_reference: HALOT / uso profético tradicional del título צְבָאוֹת
- issue: רָעָה en contexto de juicio
  english_pob_reading: disaster
  chosen_spanish_reading: calamidad
  alternative_spanish_readings:
  - desgracia
  - desastre
  - mal
  rationale: Se evita 'mal' porque en español puede leerse moralmente. 'Calamidad' conserva la idea de juicio adverso enviado sobre un lugar.
  doctrine_reference: Contexto de juicio profético en Jeremías 19:3
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente en la cláusula final, expresando el modismo hebreo con una construcción natural: ''de modo que a todo el que la oiga le zumbarán los oídos''. También conserva la transparencia del nombre divino y del título ''Yahvé de los ejércitos'' conforme al criterio doctrinal del proyecto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma uniforme para יהוה, siguiendo el estándar del proyecto.
  - Se mantiene 'calamidad' para רָעָה en contexto de juicio, evitando el sentido moral abstracto de 'mal'.
  - La cláusula idiomática final se expresa con un equivalente español natural sin borrar la imagen corporal del hebreo.
  - '''Oigan'' y ''la oiga'' conservan el registro profético directo y la referencia al anuncio de calamidad implícito en el contexto.'
