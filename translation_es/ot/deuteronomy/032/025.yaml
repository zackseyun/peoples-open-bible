translation:
  language: es
  text: Fuera, la espada dejará sin hijos; y en los aposentos interiores[a], terror—tanto el joven como la virgen[b], niño de pecho junto con hombre canoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y desde las cámaras, terror»; el hebreo contrapone el peligro afuera con el terror dentro.
    reason: lexical_alternative
  - marker: b
    text: «Virgen» traduce el hebreo bethulah, término para una joven no casada, a menudo con la implicación de virginidad; «joven mujer» es una posible alternativa en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִחוּץ
  english_pob_choice: Outside
  chosen_spanish: Fuera
  alternatives_spanish:
  - Afuera
  - En el exterior
  - Fuera de casa
  lexicon: HALOT
  rationale: La preposición hebrea contrasta con la esfera interior del verso; «fuera» conserva ese contraste espacial de manera natural en español sin sobreespecificar «calle» o «aire libre».
- source_word: תְּשַׁכֶּל
  english_pob_choice: will bereave
  chosen_spanish: dejará sin hijos
  alternatives_spanish:
  - despojará de hijos
  - hará estéril
  - privará de hijos
  lexicon: HALOT
  rationale: El verbo pi‘el de שׁכל expresa la idea de causar desolación filial o dejar sin descendencia. En español, «dejará sin hijos» comunica esa fuerza de forma clara y evita un calco menos idiomático.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - espada
  - la espada
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto y personificado como agente de muerte. El artículo definido concuerda con el tono proverbial y bélico del pasaje.
- source_word: וּמֵחֲדָרִים
  english_pob_choice: and in the inner rooms
  chosen_spanish: y en los aposentos interiores
  alternatives_spanish:
  - y desde las cámaras
  - y en las habitaciones interiores
  - y dentro
  lexicon: HALOT
  rationale: «Aposentos interiores» preserva la imagen de espacios privados dentro de la casa, equivalente funcional de los «inner rooms» del inglés y de la contraposición con «fuera».
- source_word: אֵימָה
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - dread
  - horror
  lexicon: HALOT
  rationale: «Terror» conserva la intensidad sobria y poética del hebreo, y en español transmite bien la amenaza que invade el interior.
- source_word: גַּם בָּחוּר גַּם בְּתוּלָה
  english_pob_choice: both young man and virgin
  chosen_spanish: tanto joven como virgen
  alternatives_spanish:
  - tanto muchacho como virgen
  - tanto joven como joven mujer
  - tanto mozo como doncella
  lexicon: HALOT
  rationale: Se preserva la correlación inclusiva de גַּם ... גַּם con «tanto ... como ...». «Virgen» mantiene la especificidad de בְּתוּלָה, mientras «joven» recoge בָּחוּר sin añadir una categoría más amplia que el hebreo no exige.
- source_word: יוֹנֵק
  english_pob_choice: nursing child
  chosen_spanish: niño de pecho
  alternatives_spanish:
  - niño lactante
  - lactante
  - bebé de pecho
  lexicon: HALOT
  rationale: La forma participial refiere al que está mamando. «Niño de pecho» es una expresión natural en español bíblico moderno y conserva la imagen de dependencia alimentaria.
- source_word: עִם אִישׁ שֵׂיבָה
  english_pob_choice: together with gray-haired man
  chosen_spanish: junto con hombre canoso
  alternatives_spanish:
  - junto con el anciano
  - con un hombre de canas
  - junto con un hombre de cabello canoso
  lexicon: HALOT
  rationale: «Hombre canoso» reproduce la marca visible de la vejez que expresa שֵׂיבָה. «Junto con» refleja bien עִם en la enumeración poética, y evita sobredeterminar la edad con un vocablo más interpretativo como «anciano».
translation_notes:
  revision_awareness: La versión española sigue de cerca el audit trail inglés y el hebreo, manteniendo la antítesis espacial exterior/interior, la personificación de la espada y la lista inclusiva de víctimas sin suavizar el lenguaje del texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparece el nombre divino; este versículo no lo requiere.
  - Se mantuvo el paralelismo poético con puntuación breve y un guion largo para reflejar la pausa del hebreo.
  - «Virgen» se conserva por la especificidad lexical de בְּתוּלָה, con nota para la alternativa semántica más amplia.
