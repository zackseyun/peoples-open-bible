theological_decisions:
- issue: Whether to make explicit that the 'seventh year' is the sabbatical year
  chosen_reading: Left as 'the seventh year' in the main text
  alternative_readings:
  - '''the sabbatical year'''
  rationale: The Greek itself says 'the seventh year.' While the historical reference is almost certainly to the sabbatical year and explains the food shortage, the translation should not replace the source wording with an interpretive gloss in the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: How to render ἐθνῶν in this Jewish historical context
  chosen_reading: '''the nations'''
  alternative_readings:
  - '''the Gentiles'''
  - '''the foreign peoples'''
  rationale: The phrase reflects standard Jewish-Greek usage for non-Jewish peoples. 'The nations' preserves the source idiom and avoids importing later NT-specific theological associations unless context requires them.
  doctrine_reference: Translation philosophy §1, §5
