  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: envío de los funcionarios y ancianos sacerdotales a Isaías, con la descripción de duelo en cilicio. Sin embargo, la nota al pie está anclada al nombre equivocado. En el inglés POB, la nota b explica el título oficial «who was over the household», pero en el borrador español [b] aparece sobre «Amoz». Eso rompe la correspondencia con la evidencia auditada y con el referente semántico real de la nota.'
  spanish_quality_summary: El español es claro, digno y natural. «Entonces envió», «el escriba», «cubiertos de cilicio» e «Isaías hijo de Amoz, el profeta» funcionan bien. «Que estaba sobre la casa» es algo literal pero aceptable, especialmente con la nota cultural; no exige cambio textual. La corrección necesaria es reubicar el marcador de nota para evitar confusión de lectura.
  glossary_alignment: No hay conflictos con la terminología del proyecto. Los nombres propios y términos clave están dentro de un español bíblico legible. «Cilicio» para שַׂקִּים y «escriba» para הַסֹּפֵר están bien. No aparecen términos sensibles del glosario mayor como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: El marcador de la nota cultural [b] está colocado en «Amoz» en vez de en la frase «que estaba sobre la casa».
    rationale: La nota explica el título oficial אֲשֶׁר עַל הַבַּיִת, no el patronímico de Isaías. Tal como está, el lector español asociará erróneamente la explicación con «Amoz». Es un problema de fidelidad al aparato crítico y de legibilidad, aunque el texto principal sea correcto.
  revised_spanish_text: Entonces envió a Eliaquim[b], que estaba sobre la casa, y a Sebna, el escriba, y a los ancianos de los sacerdotes, cubiertos de cilicio[a], a Isaías hijo de Amoz, el profeta.
  revised_footnotes:
