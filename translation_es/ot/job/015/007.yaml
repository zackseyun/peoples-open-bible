translation:
  language: es
  text: ¿Naciste como el primer hombre[a], y fuiste dado a luz antes de las colinas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Naciste como Adán, el primer hombre?». El hebreo dice «el primer hombre» y puede aludir a Adán sin usar su nombre como nombre propio.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲ/רִאישׁוֹן
  english_pob_choice: as the first
  chosen_spanish: como el primer
  alternatives_spanish:
  - primero
  - el primero
  lexicon: HALOT
  rationale: El interrogativo הֲ pide una pregunta retórica. רִאשׁוֹן expresa prioridad temporal/orden. En español, «como el primer» mantiene el predicativo unido a אָדָם y suena más natural que una traducción rígida.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - Adán
  lexicon: HALOT
  rationale: 'Aquí la forma singular funciona de modo representativo en la pregunta retórica: «el primer hombre». «Hombre» conserva la fuerza genérica y la posibilidad de alusión a Adán sin convertirlo obligatoriamente en nombre propio.'
- source_word: תִּוָּלֵד
  english_pob_choice: were you born
  chosen_spanish: fuiste engendrado
  alternatives_spanish:
  - naciste
  - fuiste nacido
  lexicon: HALOT
  rationale: El nifal de ילד normalmente expresa nacer. En español, «fuiste engendrado» mantiene la pasiva y evita una repetición demasiado cercana de «nacido» con el segundo verbo, aunque sigue siendo una forma que apunta al origen por nacimiento.
- source_word: וְ/לִ/פְנֵי
  english_pob_choice: and ... before
  chosen_spanish: y ... antes de
  alternatives_spanish:
  - y ... delante de
  - y ... previo a
  lexicon: HALOT
  rationale: La conjunción con la preposición coordina una segunda pregunta temporal. «Antes de» reproduce con claridad la relación temporal y es natural en español.
- source_word: גְבָעוֹת
  english_pob_choice: the hills
  chosen_spanish: los collados
  alternatives_spanish:
  - los montes
  - las colinas
  lexicon: HALOT
  rationale: גְבָעוֹת son colinas o lomas; «collados» conserva el tono poético y el plural topográfico sin cargar el texto con un registro demasiado bíblico-archaico.
- source_word: חוֹלָלְתָּ
  english_pob_choice: were you brought forth
  chosen_spanish: fuiste traído a la luz
  alternatives_spanish:
  - fuiste dado a luz
  - fuiste puesto en la luz
  lexicon: HALOT
  rationale: El verbo expresa ser sacado/brotado con imaginería de parto. «Traído a la luz» mantiene la metáfora del alumbramiento y diferencia este segundo miembro de תִּוָּלֵד, que ya se había rendido con una forma de nacer/engendrarse.
theological_decisions:
- issue: ¿Debe אָדָם entenderse como el nombre propio Adán o como 'el hombre' en sentido genérico?
  english_pob_reading: generic 'man' in the phrase 'the first man' with a possible allusion to Adam
  chosen_spanish_reading: «el primer hombre» con posible alusión a Adán, sin nombrarlo explícitamente
  alternative_spanish_readings:
  - «Adán, el primer hombre»
  - «el hombre primero»
  rationale: La evidencia hebrea no obliga a un nombre propio. Mantener la expresión genérica respeta la redacción del texto y deja abierta la alusión posible a Adán sin añadirla como certeza del traductor.
  doctrine_reference: 'DOCTRINE.md: primacía del texto original sobre la tradición de traducción; tratamiento contextual de אָדָם'
translation_notes:
  revision_awareness: La revisión más reciente no propuso cambios; el cruce de control indica alta concordancia con solo observaciones menores, por lo que se mantiene la lectura principal sin modificaciones sustanciales.
  spanish_consistency_notes:
  - Se conserva Yahvé para el nombre divino cuando corresponda; este versículo no lo contiene.
  - «Hombre» se usa aquí en sentido representativo, no como afirmación de género exclusivo, siguiendo el valor del hebreo אָדָם.
  - La segunda mitad mantiene la imagen de alumbramiento con un verbo distinto del primero para reflejar la duplicación poética del hebreo.
