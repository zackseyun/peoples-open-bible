translation:
  language: es
  text: y con conocimiento se llenan los aposentos[a][b] con toda riqueza preciosa y agradable[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habitaciones» para «aposentos».
    reason: lexical_alternative
  - marker: b
    text: O «se llenarán»; el imperfecto hebreo puede leerse con sentido futuro, aunque el proverbio se traduce aquí como una verdad general en presente.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «toda riqueza, preciosa y agradable»; la traducción lo vierte de forma más fluida como «toda riqueza preciosa y agradable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְדַעַת
  english_pob_choice: and by knowledge
  chosen_spanish: y por el conocimiento
  alternatives_spanish:
  - y mediante el conocimiento
  - y con conocimiento
  lexicon: HALOT
  rationale: La preposición בְ en este contexto expresa medio/instrumento; en español, «por» comunica bien esa relación causal o instrumental en un proverbio de sabiduría. Se conserva el valor de דַּעַת como conocimiento/entendimiento, sin reducirlo a mera información.
- source_word: חֲדָרִים
  english_pob_choice: rooms
  chosen_spanish: las habitaciones
  alternatives_spanish:
  - los cuartos
  - los aposentos
  - las cámaras
  lexicon: HALOT
  rationale: El hebreo puede referirse a espacios internos de una casa. «Habitaciones» es natural en español moderno y mantiene el sentido básico; «cámaras» suena más literario/arcaico, y «aposentos» puede resultar demasiado tradicional.
- source_word: יִמָּלְאוּ
  english_pob_choice: are filled
  chosen_spanish: se llenan
  alternatives_spanish:
  - serán llenadas
  - quedan llenas
  lexicon: HALOT
  rationale: El imperfecto nifal funciona bien como presente gnómico en el proverbio. «Se llenan» conserva el carácter general y proverbial mejor que forzar un futuro.
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  - caudal
  lexicon: HALOT
  rationale: הוֹן designa riqueza, bienes o substancia valiosa. «Riqueza» es una equivalencia natural y amplia en español; evita especificar indebidamente tipo de bienes.
- source_word: יָקָר
  english_pob_choice: precious
  chosen_spanish: preciosa
  alternatives_spanish:
  - valiosa
  - costosa
  lexicon: HALOT
  rationale: El adjetivo expresa alto valor, estimación o precio. «Preciosa» conserva el matiz de valor elevado y armoniza con la siguiente cualidad.
- source_word: וְנָעִים
  english_pob_choice: pleasant
  chosen_spanish: agradable
  alternatives_spanish:
  - deliciosa
  - placentera
  - encantadora
  lexicon: HALOT
  rationale: נָעִים indica agradable, deleitoso o placentero. «Agradable» es claro y sobrio en español, y mantiene el contraste con la idea de valor precioso sin exagerar el tono.
theological_decisions:
- issue: El alcance genérico de «riqueza preciosa y agradable» frente a una posible acumulación más literal de sustantivos/adjetivos
  english_pob_reading: all precious and pleasant wealth
  chosen_spanish_reading: toda riqueza preciosa y agradable
  alternative_spanish_readings:
  - toda riqueza, preciosa y agradable
  - toda clase de riqueza preciosa y agradable
  rationale: 'El hebreo כָּל הוֹן יָקָר וְנָעִים puede leerse como una construcción global: «toda riqueza [que es] preciosa y agradable». En español conviene mantener la condensación poética sin introducir una expansión innecesaria. Se conserva la ambigüedad amable del hebreo entre cualidades del mismo sustantivo y una caracterización totalizante.'
  doctrine_reference: none
translation_notes:
  revision_awareness: La redacción española sigue de cerca la revisión más reciente del POB en inglés, que simplificó «every precious and pleasant kind of wealth» a «all precious and pleasant wealth» para reflejar con más precisión כָּל הוֹן. También conserva el valor proverbial del imperfecto como presente general, sin descartar la lectura futura indicada en el aparato.
  spanish_consistency_notes:
  - Se mantiene «conocimiento» para דַּעַת, en línea con el léxico de sabiduría del libro.
  - Se usa «riqueza» para הוֹן y no «tesoro» o «riquezas» para evitar estrechar demasiado el campo semántico.
  - La puntuación y el ritmo buscan reproducir la forma proverbial breve del hebreo sin añadir explicación interpretativa al cuerpo del versículo.
