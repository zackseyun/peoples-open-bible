revisions:
- from: Estos son los que hablaban[a] con el faraón, rey de Egipto, para sacar a los hijos de Israel[b] de Egipto—estos son Moisés y Aarón.
  to: Estos son los que hablaron[a] al faraón, rey de Egipto, para sacar a los hijos de Israel[b] de Egipto; este es Moisés y Aarón.
  rationale: 'La revisión corrige tres puntos menores pero significativos: (1) cambia «con el faraón» por «al faraón» para reflejar mejor אֶל; (2) usa «hablaron» en el texto principal, en línea con la resolución idiomática del POB para el participio, dejando la alternativa más literal en nota; y (3) ajusta el cierre a «este es Moisés y Aarón» para conservar mejor el singular resumptivo הוּא. También se simplifica la puntuación final con punto y coma, más natural en español que la raya en esta frase.'
