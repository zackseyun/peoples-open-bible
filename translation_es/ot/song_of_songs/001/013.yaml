translation:
  language: es
  text: Mi amado es para mí una bolsita de mirra[a][c]; pasa la noche entre mis pechos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un paquetito de mirra». El hebreo צְרוֹר denota un pequeño paquete o envoltorio; «bolsita» se elige aquí para comunicar mejor, en este contexto, la idea de un saquito aromático que se lleva sobre el cuerpo.
    reason: lexical_alternative
  - marker: b
    text: O «se queda» o «se aloja entre mis pechos». El verbo hebreo puede tener el matiz de pasar la noche, lo cual intensifica la imagen íntima.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice explícitamente «mis pechos»; se evita el eufemismo tradicional «mi seno».
    reason: lexical_alternative
lexical_decisions:
- source_word: צְרוֹר
  english_pob_choice: sachet
  chosen_spanish: saquito
  alternatives_spanish:
  - bolsita
  - paquete
  - atadito
  lexicon: HALOT
  rationale: El hebreo designa un pequeño envoltorio o paquete. En español, «saquito» comunica mejor que «paquete» la idea de un objeto pequeño, portátil y perfumado, manteniendo la imagen poética sin volverla técnica.
- source_word: הַמֹּר
  english_pob_choice: myrrh
  chosen_spanish: mirra
  alternatives_spanish:
  - mirra aromática
  lexicon: HALOT
  rationale: «Mirra» es la equivalencia normal y precisa para la resina aromática מור. Conserva el referente botánico y perfumado central en la metáfora.
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado mío
  - mi amante
  lexicon: HALOT
  rationale: En Cantar de los Cantares, דּוֹד expresa una relación afectiva e ինտimate poética. «Mi amado» preserva ese registro sin la explicitud de «mi amante».
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: La relación personal expresada por la preposición se vierte naturalmente en español con «para mí» dentro de la construcción «es para mí», que mantiene el valor afectivo y evaluativo del hebreo.
- source_word: בֵּין
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  lexicon: HALOT
  rationale: La preposición conserva su sentido espacial directo. «Entre» mantiene la concreción corporal de la imagen.
- source_word: שָׁדַי
  english_pob_choice: my breasts
  chosen_spanish: mis pechos
  alternatives_spanish:
  - mis senos
  - mi pecho
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente los pechos; por fidelidad al texto se evita suavizarlo con un eufemismo. «Pechos» es claro, natural y acorde con el registro poético.
- source_word: יָלִין
  english_pob_choice: he lies
  chosen_spanish: reposa
  alternatives_spanish:
  - se acuesta
  - se queda
  - pasa la noche
  lexicon: HALOT
  rationale: El verbo puede tener la idea de alojarse o pasar la noche, pero aquí funciona en una imagen metafórica de cercanía y permanencia sobre el cuerpo. «Reposa» comunica esa quietud sin imponer un matiz temporal más fuerte que el necesario.
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés POB. La revisión más reciente no introdujo cambios; se conservó la decisión léxica de mantener la imaginería corporal explícita y el matiz poético del objeto aromático.
  spanish_consistency_notes:
  - Se mantiene «Mi amado» para דּוֹדִי, coherente con el uso poético y afectivo del Cantar.
  - Se preserva la explicitud de «mis pechos» conforme al énfasis documental del POB en evitar suavizaciones no exigidas por el hebreo.
  - «Reposa» equilibra naturalidad española y la posible idea de permanencia nocturna del verbo לין sin sobreespecificarla en el texto principal.
