revisions:
- from: Y ahora no unan a sus hijas [a] con los hijos de ellos.
  to: Y ahora no den a sus hijas en matrimonio a sus hijos,[a]
  rationale: Se revisa para reflejar explícitamente el sentido matrimonial de συνοικίσητε en el texto principal, en línea con la decisión auditada en inglés. 'No den a sus hijas en matrimonio a sus hijos' es fiel al griego contextual, claro en español neutral y conserva la fuerza social-legal de la prohibición. La alternativa más literal se mantiene en nota, con anclaje correcto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:33:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El griego καὶ νῦν τὰς θυγατέρας ὑμῶν μὴ συνοικίσητε τοῖς υἱοῖς αὐτῶν significa una prohibición matrimonial concreta: ''Y ahora no den/casen a sus hijas con/a sus hijos''. El borrador capta la relación general, pero ''no unan'' debilita el valor matrimonial-social de συνοικίσητε, que en este contexto se refiere a dar en matrimonio, no solo a unir en sentido amplio.'
  spanish_quality_summary: El borrador es comprensible, pero 'no unan a sus hijas con los hijos de ellos' suena poco idiomático y algo ambiguo en español eclesial general. 'Con los hijos de ellos' también es más pesado de lo necesario. Una formulación como 'no den a sus hijas en matrimonio a sus hijos' o 'no casen a sus hijas con sus hijos' es más natural y más fiel al sentido.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. La principal cuestión léxica es συνοικίσητε, donde el proyecto inglés documenta preferencia por 'give in marriage'. En español conviene reflejar explícitamente el marco matrimonial en el texto principal, no relegarlo a la nota.
  issues:
  - severity: high
    issue: μὴ συνοικίσητε se tradujo como 'no unan'
    rationale: El verbo en este contexto con 'hijas' e 'hijos' denota dar o casar en matrimonio. 'Unan' deja el sentido matrimonial demasiado implícito y puede sonar genérico o relacional, no legal-social.
  - severity: medium
    issue: La nota literal no corrige suficientemente la ambigüedad del texto principal
    rationale: Como el sentido matrimonial es central y claro en el original y en la auditoría inglesa, debe aparecer en el cuerpo principal del español, no solo en la nota.
  - severity: low
    issue: '''con los hijos de ellos'' es poco natural'
    rationale: Aunque comprensible, en español neutro resulta más pesado que 'a sus hijos' o 'con sus hijos'. Dado el contexto, 'sus' puede referirse naturalmente al grupo mencionado.
  revised_spanish_text: Y ahora no den a sus hijas en matrimonio a sus hijos,[a]
  revised_footnotes:
  - marker: a
    text: O, más literalmente, 'no unan a sus hijas con sus hijos en matrimonio'.
    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar explícitamente el sentido matrimonial de συνοικίσητε en el texto principal, en línea con la decisión auditada en inglés. 'No den a sus hijas en matrimonio a sus hijos' es fiel al griego contextual, claro en español neutral y conserva la fuerza social-legal de la prohibición. La alternativa más literal se mantiene en nota, con anclaje correcto.
