revisions:
- from: Joab hijo de Seruyá comenzó a contar[a], pero no terminó; y a causa de esto vino ira sobre Israel[b]. Y el número no fue incluido en el registro de los anales del rey David.
  to: Joab hijo de Seruyá comenzó a contar, pero no terminó; y a causa de esto vino ira sobre Israel. Y el número no fue registrado[a] en el registro de los anales[b] del rey David.
