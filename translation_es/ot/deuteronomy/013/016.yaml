translation:
  language: es
  text: Ciertamente herirás a los habitantes de aquella ciudad con el filo de la espada, dedicándola a la destrucción[a], junto con todo lo que hay en ella y su ganado, con el filo de la espada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ponerla bajo anatema»; el verbo hebreo indica dedicar algo irrevocablemente a la destrucción.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a la boca de la espada», un modismo que significa «con el filo de la espada».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֵּה תַכֶּה
  english_pob_choice: You shall surely strike
  chosen_spanish: Ciertamente herirás
  alternatives_spanish:
  - Debes herir
  - Herirás sin falta
  - Ciertamente golpearás
  lexicon: HALOT
  rationale: La construcción hebrea con infinitivo absoluto + imperfecto intensifica el mandato. «Ciertamente herirás» conserva la fuerza enfática sin volver el español torpe; «herir» mantiene el matiz de golpe/lesión sin sustituirlo por una paráfrasis más interpretativa como «matar».
- source_word: יֹשְׁבֵי הָעִיר הַהוּא
  english_pob_choice: the inhabitants of that city
  chosen_spanish: los habitantes de aquella ciudad
  alternatives_spanish:
  - los residentes de aquella ciudad
  - los que habitan en aquella ciudad
  lexicon: HALOT
  rationale: «Habitantes» expresa bien el participio hebreo en un español natural y digno. «Aquella» refleja el deíctico del texto y evita una generalización vaga.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - por la espada
  - hasta la boca de la espada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a/por la boca de la espada», un giro idiomático de combate. Siguiendo el audit trail inglés, «con el filo de la espada» comunica la imagen concreta y es idiomático en español, sin perder la referencia al borde cortante del arma.
- source_word: הַחֲרֵם
  english_pob_choice: devoting it to destruction
  chosen_spanish: dedicándola a la destrucción
  alternatives_spanish:
  - consagrándola a la destrucción
  - poniéndola bajo anatema
  - destruyéndola por completo
  lexicon: HALOT
  rationale: חרם en este contexto no es solo destrucción militar; tiene un componente técnico de consagración para destrucción irrevocable. «Dedicándola a la destrucción» mantiene esa tensión sacral y evita la opacidad de «ponerla bajo anatema» para lectores generales.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la ciudad
  - a ella
  lexicon: HALOT
  rationale: El pronombre femenino singular se refiere a «la ciudad». En español, el clítico «la» es natural y conciso; el antecedente ya está claro por el contexto.
- source_word: וְאֶת כָּל אֲשֶׁר בָּהּ
  english_pob_choice: along with all that is in it
  chosen_spanish: junto con todo lo que hay en ella
  alternatives_spanish:
  - y todo lo que hay en ella
  - con todo lo que está en ella
  lexicon: HALOT
  rationale: La frase amplía el alcance del juicio más allá de los habitantes. «Junto con» reproduce bien el encadenamiento del hebreo y el seguimiento sintáctico del inglés POB, mientras «todo lo que hay en ella» suena natural en español.
- source_word: בְּהֶמְתָּהּ
  english_pob_choice: its livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales
  - sus bestias de carga
  lexicon: HALOT
  rationale: בְּהֵמָה puede abarcar animales domésticos o de cría. «Ganado» es una opción sobria y comprensible en español bíblico contemporáneo, aunque algo más estrecha que «animales»; aquí encaja bien con el contexto de destrucción total de la ciudad y sus bienes.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - por la espada
  - a filo de espada
  lexicon: HALOT
  rationale: Se repite la misma locución para conservar el énfasis del hebreo. «A filo de espada» también sería posible en español, pero «con el filo de la espada» mantiene continuidad con la primera ocurrencia y resulta plenamente claro.
theological_decisions:
- issue: Traducción de חרם en un contexto de juicio bélico
  english_pob_reading: devoting it to destruction
  chosen_spanish_reading: dedicándola a la destrucción
  alternative_spanish_readings:
  - consagrándola a la destrucción
  - poniéndola bajo anatema
  - destruyéndola por completo
  rationale: 'La traducción debe conservar la tensión teológica de חרם: no es mera aniquilación militar, sino una acción de juicio con carácter de dedicación irrevocable. «Dedicándola a la destrucción» preserva ese doble valor sin depender de un tecnicismo eclesiástico poco transparente.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Mantener la severidad del mandato
  english_pob_reading: Preserve the full force of the command without softening
  chosen_spanish_reading: Conservar toda la fuerza del mandato sin suavizarla
  alternative_spanish_readings:
  - usar un lenguaje más leve como 'vencer' o 'derrotar'
  - atenuar el alcance del castigo
  rationale: El hebreo presenta un juicio total y no debe mitigarse por razones de sensibilidad moderna. La versión española conserva el peso del mandato y su gravedad moral y judicial.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto inglés auditado permaneció sin cambios en la revisión más reciente; no se registraron ajustes aplicados. La versión española sigue de cerca las decisiones léxicas estables del audit trail y conserva las dos repeticiones de לְפִי חָרֶב para reflejar el énfasis del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa «Mesías/Cristo» sin pertinencia aquí.
  - Se conservó una traducción consistente de לְפִי חָרֶב como «con el filo de la espada» en ambas apariciones.
  - «Habitantes» y «ganado» se eligieron por claridad natural en español, sin borrar el alcance total del juicio.
