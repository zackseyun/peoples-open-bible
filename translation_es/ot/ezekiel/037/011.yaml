translation:
  language: es
  text: 'Entonces me dijo: «Hijo de hombre, estos huesos son toda la casa de Israel. Mira, están diciendo: “Nuestros huesos se han secado,[a] y nuestra esperanza se ha perdido; estamos separados[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nuestros huesos están secos … nuestra esperanza está perdida».'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «estamos acabados» o, más literalmente, «estamos cortados» o «cercenados».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Conserva la forma idiomática profética y el vínculo intertextual del título en Ezequiel, sin sustituirla por una paráfrasis interpretativa.
- source_word: הָעֲצָמוֹת הָאֵלֶּה
  english_pob_choice: these bones
  chosen_spanish: estos huesos
  alternatives_spanish:
  - estos huesos aquí
  lexicon: HALOT
  rationale: La frase es directa y la deixis se mantiene de manera natural en español con el demostrativo simple.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  english_pob_choice: the whole house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - toda la familia de Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión de pacto 'casa de Israel' y el alcance total de כָּל mediante 'toda'.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: En español contemporáneo 'Mira' comunica la fuerza de atención inmediata sin sonar arcaico, manteniendo el tono directo del discurso.
- source_word: אֹמְרִים
  english_pob_choice: they are saying
  chosen_spanish: están diciendo
  alternatives_spanish:
  - dicen
  lexicon: HALOT
  rationale: El progresivo refleja el valor de participio de una acción en curso o habitual, como en la solución inglesa auditada.
- source_word: יָבְשׁוּ עַצְמוֹתֵינוּ
  english_pob_choice: Our bones have dried up
  chosen_spanish: Nuestros huesos se han secado
  alternatives_spanish:
  - Nuestros huesos están secos
  - Nuestros huesos se han vuelto secos
  lexicon: HALOT
  rationale: El perfecto verbal en español expresa el estado resultante de la acción terminada y mantiene la imagen poética sin sobreexplicarla.
- source_word: וְאָבְדָה תִקְוָתֵנוּ
  english_pob_choice: and our hope has perished
  chosen_spanish: y nuestra esperanza se ha perdido
  alternatives_spanish:
  - y nuestra esperanza ha perecido
  - y nuestra esperanza está perdida
  lexicon: HALOT
  rationale: '''Perderse'' comunica bien la idea de desaparición o frustración de la esperanza en español bíblico moderno, conservando la tensión semántica de אָבַד.'
- source_word: נִגְזַרְנוּ לָנוּ
  english_pob_choice: we are cut off
  chosen_spanish: estamos cortados[b]
  alternatives_spanish:
  - somos cortados
  - estamos separados
  - estamos cercenados
  lexicon: HALOT
  rationale: Se retiene la fuerza literal de la raíz de 'cortar/separar' en una forma breve. La opción es deliberadamente áspera para no suavizar la metáfora, aunque en español también puede entenderse como separados o apartados.
theological_decisions:
- issue: Alcance corporativo de 'la casa de Israel'
  english_pob_reading: The bones symbolize the whole house of Israel collectively.
  chosen_spanish_reading: Los huesos simbolizan a toda la casa de Israel en conjunto.
  alternative_spanish_readings:
  - Los huesos simbolizan solo a una parte de Israel
  - Los huesos simbolizan principalmente a Judá en el exilio
  rationale: La propia cláusula identifica el símbolo como totalidad de Israel; la traducción no estrecha el alcance a un grupo menor.
  doctrine_reference: Ezequiel 37:11; lectura corporativa del oráculo restaurador
- issue: Fuerza de la declaración final 'we are cut off'
  english_pob_reading: “We are cut off” may also convey “we are finished” or “we are severed off.”
  chosen_spanish_reading: “Estamos cortados” conserva la imagen de separación o ruptura total.
  alternative_spanish_readings:
  - estamos acabados
  - estamos separados
  - nos han cortado
  rationale: La ambigüedad del hebreo se conserva sin resolverla por una interpretación única; en español la metáfora de cortar puede sugerir tanto exclusión como ruina final.
  doctrine_reference: HALOT; Ezequiel 37:11
translation_notes:
  revision_awareness: Se siguió la revisión auditada que prefirió un equivalente formal para הִנֵּה; en español se optó por 'Mira' por naturalidad y claridad, manteniendo el valor de llamada de atención. También se preservó la imagen verbal de 'cortar' en la cláusula final para no borrar la tensión léxica observada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'casa de Israel' en lugar de 'pueblo de Israel' para respetar la expresión del hebreo.
  - '''Hijo de hombre'' se conserva como fórmula profética estable, coherente con el uso de Ezequiel.'
  - La secuencia verbal usa perfectos compuestos para reflejar estados resultantes en ambas cláusulas paralelas.
  - Se evita introducir 'SEÑOR' o 'Cristo', ya que no aparecen en el versículo ni en la decisión auditada.
