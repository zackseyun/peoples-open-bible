base_translation:
  language: en
  yaml_path: translation/ot/leviticus/011/027.yaml
  text: And every animal that walks on its paws[a], among all the animals that walk on four feet, they are unclean to you[b]. Everyone who touches their carcass shall be unclean until the evening.
  footnotes:
