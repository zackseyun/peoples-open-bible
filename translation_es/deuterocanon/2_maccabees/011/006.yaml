translation:
  language: es
  text: Pero cuando los que estaban con Macabeo se enteraron de que él estaba sitiando las fortalezas, suplicaban al Señor, junto con las multitudes, con lamentaciones y lágrimas, que enviara un buen ángel para la salvación de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberación de Israel». El griego σωτηρία puede referirse al rescate o la liberación en una crisis concreta, además de la salvación en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετέλαβον
  english_pob_choice: learned
  chosen_spanish: se enteraron
  alternatives_spanish:
  - llegaron a saber
  - supieron
  - se dieron cuenta
  lexicon: LSJ
  rationale: El verbo marca que el grupo tomó conocimiento de la situación; «se enteraron» transmite bien ese cambio de información en español natural.
- source_word: οἱ περὶ τὸν Μακκαβαῖον
  english_pob_choice: those around Maccabeus
  chosen_spanish: los que rodeaban a Macabeo
  alternatives_spanish:
  - los que estaban con Macabeo
  - la gente de Macabeo
  - el grupo de Macabeo
  lexicon: LSJ
  rationale: La construcción idiomática apunta al grupo asociado con Macabeo. «Los que rodeaban a Macabeo» conserva esa relación sin sobreespecificarla.
- source_word: πολιορκοῦντα
  english_pob_choice: was besieging
  chosen_spanish: estaba sitiando
  alternatives_spanish:
  - asediaba
  - estaba asediando
  lexicon: LSJ
  rationale: «Sitiar» es el equivalente militar natural en español y mantiene el sentido de una acción en curso.
- source_word: τὰ ὀχυρώματα
  english_pob_choice: the strongholds
  chosen_spanish: las fortalezas
  alternatives_spanish:
  - los baluartes
  - los lugares fortificados
  - las fortalezas defensivas
  lexicon: LSJ
  rationale: Ὀχύρωμα designa un lugar fortificado. «Fortalezas» es claro y fiel en español; aquí funciona como equivalente natural de «strongholds».
- source_word: μετὰ ὀδυρμῶν καὶ δακρύων
  english_pob_choice: with lamentations and tears
  chosen_spanish: con lamentaciones y lágrimas
  alternatives_spanish:
  - con llanto y lágrimas
  - con gemidos y lágrimas
  - con lamentos y lágrimas
  lexicon: LSJ
  rationale: La frase expresa duelo intenso en la súplica. «Lamentaciones y lágrimas» conserva el tono emotivo y cultual del griego.
- source_word: ἱκέτευον
  english_pob_choice: pleaded
  chosen_spanish: suplicaban
  alternatives_spanish:
  - imploraban
  - rogaron
  - pedían encarecidamente
  lexicon: LSJ
  rationale: El verbo denota una petición urgente y reverente; «suplicaban» es preciso y solemne en español.
- source_word: σὺν τοῖς ὄχλοις
  english_pob_choice: together with the crowds
  chosen_spanish: junto con las multitudes
  alternatives_spanish:
  - junto con las masas
  - con la multitud
  - al mismo tiempo que las multitudes
  lexicon: LSJ
  rationale: «Multitudes» refleja el plural colectivo del griego y conserva el carácter público de la escena.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Soberano
  lexicon: LSJ
  rationale: En este contexto de oración judía, κύριος se refiere a Dios; «el Señor» mantiene el registro reverencial habitual del término.
- source_word: ἀγαθὸν ἄγγελον
  english_pob_choice: a good angel
  chosen_spanish: un buen ángel
  alternatives_spanish:
  - un ángel benévolo
  - un ángel favorable
  lexicon: LSJ
  rationale: La expresión es directa y no requiere expansión. «Buen ángel» reproduce con sobriedad el adjetivo ἀγαθός.
- source_word: ἀποστεῖλαι
  english_pob_choice: to send
  chosen_spanish: que enviara
  alternatives_spanish:
  - que mandara
  - que despachara
  lexicon: LSJ
  rationale: El infinitivo complementa la súplica; en español, una subordinada final con subjuntivo expresa con naturalidad la petición.
- source_word: πρὸς σωτηρίαν τῷ Ἰσραήλ
  english_pob_choice: for the salvation of Israel
  chosen_spanish: para la salvación de Israel
  alternatives_spanish:
  - para la liberación de Israel
  - para el rescate de Israel
  - para la salvación/deliverance de Israel
  lexicon: LSJ
  rationale: «σωτηρία» puede abarcar salvación o liberación concreta. Se mantiene «salvación» para conservar el rango lexical y la resonancia teológica, sin excluir el matiz de rescate en crisis.
theological_decisions:
- issue: κύριος en una oración judía dirigida a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Dios
  - el Dueño
  rationale: La oración se dirige al Dios de Israel. «El Señor» reproduce el valor reverencial de κύριος y es la forma estable en español bíblico para este uso.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: σωτηρία en contexto de crisis militar
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescato
  rationale: Aunque el contexto inmediato es militar y «liberación» es viable, se conserva «salvación» para no reducir el alcance del término griego y mantener su densidad teológica.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension where meaningful
translation_notes:
  revision_awareness: Se corrigió el anclaje de nota al colocar [a] en «Israel», de modo que toda nota tenga su marcador visible en el texto traducido.
  spanish_consistency_notes:
  - Se usa «Macabeo» para Μακκαβαῖος, coherente con la transliteración habitual en español bíblico.
  - Se conserva «el Señor» para κύριος en una oración dirigida a Dios, conforme al criterio doctrinal del proyecto.
  - Se mantiene «salvación» sin ocultar el matiz alternativo de «liberación», preservado en nota.
  - El registro es sobrio y bíblico, pero en español moderno y legible.
