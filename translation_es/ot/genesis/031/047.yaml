translation:
  language: es
  text: Labán lo llamó Jegar-sahadutha[a], pero Jacob lo llamó Galeed[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jegar-sahadutha es arameo para «montón de testigos» o «montón de testimonio».
    reason: lexical_alternative
  - marker: b
    text: Galeed es hebreo para «montón de testigos» o «montón de testimonio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  lexicon: HALOT
  rationale: En un contexto de nombrar un sitio, «llamó» reproduce de forma natural el valor de קרא con ל+objeto, y mantiene el estilo narrativo breve del hebreo y del inglés POB.
- source_word: לּוֹ
  english_pob_choice: it
  chosen_spanish: ese lugar
  alternatives_spanish:
  - esa pila de piedras
  - él
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere al montón/monumento ya establecido; en español conviene explicitar el referente como «ese lugar» para evitar la ambigüedad de «lo» o «él».
- source_word: לָבָן
  english_pob_choice: Laban
  chosen_spanish: Laban
  lexicon: nombre propio
  rationale: Se conserva la transliteración estándar del nombre propio.
- source_word: יְגַר שָׂהֲדוּתָא
  english_pob_choice: Jegar-sahadutha
  chosen_spanish: Jegar-sahaduta
  alternatives_spanish:
  - Jegar-sahadutha
  lexicon: HALOT
  rationale: Se mantiene el nombre arameo transliterado en el cuerpo del texto para conservar el acto de nombrar; se adapta mínimamente la ortografía al uso español con terminación abierta, sin alterar la identificación del término.
- source_word: וְיַעֲקֹב
  english_pob_choice: but Jacob
  chosen_spanish: pero Jacob
  alternatives_spanish:
  - y Jacob
  lexicon: HALOT
  rationale: La partícula ו aquí introduce contraste entre los dos nombres puestos al mismo lugar, por lo que «pero» comunica mejor la oposición narrativa que «y».
- source_word: קָרָא
  english_pob_choice: called
  chosen_spanish: lo llamó
  alternatives_spanish:
  - lo nombró
  lexicon: HALOT
  rationale: Se conserva la misma raíz verbal con un verbo natural en español y con el mismo referente implícito, manteniendo la repetición del acto de nombrar.
- source_word: גַּלְעֵד
  english_pob_choice: Galeed
  chosen_spanish: Galeed
  alternatives_spanish:
  - Galed
  lexicon: HALOT
  rationale: Se preserva el nombre hebreo transliterado en el texto principal, siguiendo el patrón del POB de mantener los nombres propios/etoponímicos y explicar su sentido en nota.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo: conserva la doble denominación arameo/hebreo y el contraste entre los dos actos de nombrar. Frente al inglés POB, se optó por explicitar el referente del sufijo pronominal como «ese lugar» para que el español sea claro sin perder la referencia al montón de piedras. No se introducen cambios textuales ni teológicos respecto al audit trail.'
  spanish_consistency_notes:
  - Se usa «Laban» y «Jacob» como nombres propios estables, sin alterar su forma estándar en español.
  - Se mantiene la transliteración de ambos topónimos/etnónimos en el cuerpo del versículo y su significado en notas, respetando el valor nominal del acto de nombrar.
  - La elección de «pero» para ו refleja la relación contrastiva documentada en el audit trail del POB.
  - Las notas preservan la alternativa semántica documentada por el inglés («heap of witness» / «mound of testimony») con formulación natural en español.
