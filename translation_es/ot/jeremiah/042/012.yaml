translation:
  language: es
  text: Y yo les mostraré misericordia[a], y él tendrá misericordia de ustedes y los hará volver a su propia tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y yo les daré misericordia, y él tendrá misericordia de ustedes y los hará volver a su tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶתֵּן
  english_pob_choice: And I will show / grant
  chosen_spanish: Y yo les concederé
  alternatives_spanish:
  - Y yo les daré
  - Y yo les mostraré
  lexicon: HALOT
  rationale: נתן expresa literalmente ‘dar’. En español, con el objeto abstracto implícito de רַחֲמִים, «conceder» comunica una acción soberana y natural sin perder el valor de otorgamiento prometido por Dios.
- source_word: לָ/כֶם
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: HALOT
  rationale: La preposición ל marca el beneficiario/destinatario. En español, el dativo átono «les» expresa con naturalidad ese destinatario sin añadir torpeza sintáctica.
- source_word: רַחֲמִים
  english_pob_choice: mercy / compassion
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - piedad
  lexicon: HALOT
  rationale: רַחֲמִים abarca misericordia/compasión. «Misericordia» es bíblica y clara en español, y preserva el campo semántico sin forzar una expresión más técnica.
- source_word: וְ/רִחַם
  english_pob_choice: and he will have mercy / compassion
  chosen_spanish: y él tendrá misericordia
  alternatives_spanish:
  - y él mostrará misericordia
  - y él tendrá compasión
  lexicon: HALOT
  rationale: El verbo רחם mantiene la familia léxica con רַחֲמִים. «Tener misericordia» preserva el paralelismo y el vínculo cognado en español, mientras sigue siendo idiomático.
- source_word: אֶתְ/כֶם
  english_pob_choice: on you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - sobre ustedes
  - a ustedes
  lexicon: HALOT
  rationale: En español, «tener misericordia de» es la colocación natural equivalente a la construcción hebrea con objeto directo. «De ustedes» evita una calca y mantiene el sentido relacional.
- source_word: וְ/הֵשִׁיב
  english_pob_choice: and restore
  chosen_spanish: y los hará volver
  alternatives_spanish:
  - y los restaurará
  - y los hará regresar
  lexicon: HALOT
  rationale: El Hifil de שוב puede significar ‘hacer volver’. En este contexto, con destino explícito, «los hará volver» conserva el sentido causativo y resulta muy transparente en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: אֶל marca dirección hacia un destino. «A» es la preposición española más natural para esa meta concreta.
- source_word: אַדְמַתְ/כֶם
  english_pob_choice: your own land
  chosen_spanish: su propia tierra
  alternatives_spanish:
  - su tierra
  - su país
  lexicon: HALOT
  rationale: אדמה es ‘tierra/terreno/land’. Aquí, «su propia tierra» transmite la pertenencia y el contraste de retorno sin introducir una equivalencia geopolítica más moderna que el hebreo no exige.
theological_decisions:
- issue: Cambio de sujeto entre la acción divina y la acción del rey de Babilonia
  english_pob_reading: God says 'I will show mercy' and then 'he will have mercy ... and restore,' preserving the Hebrew shift from first person singular to third masculine singular.
  chosen_spanish_reading: 'Mantener la transición: «yo les concederé misericordia» y luego «él tendrá misericordia ... y los hará volver».'
  alternative_spanish_readings:
  - «yo ... tendré misericordia ... y los haré volver»
  - unificar todo en primera persona divina
  rationale: El hebreo distingue claramente entre la promesa divina inicial y la respuesta mediada por un sujeto masculino singular en el contexto. La traducción conserva esa tensión en vez de resolverla por armonización.
  doctrine_reference: Principio de primacía del texto original; preservación de tensiones gramaticales y teológicas documentadas.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo masorético, manteniendo el cambio de sujeto (primera persona divina → tercera persona masculina singular) señalado por el audit trail en inglés. También adopta la revisión inglesa que prefirió una formulación más natural para רַחֲמִים y la refleja en español con un equivalente igualmente idiomático.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el Tetragrámaton aparezca; en este versículo el sujeto explícito es la primera persona divina, por lo que no hace falta nombrarlo.
  - Se prefiere «misericordia» para רַחֲמִים y el verbo cognado «tener misericordia» para רִחַם, conservando la relación léxica.
  - «Su propia tierra» reproduce el matiz posesivo de אַדְמַתְכֶם sin sobreespecificar el término como país o territorio político.
