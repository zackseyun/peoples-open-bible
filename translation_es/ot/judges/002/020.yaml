translation:
  language: es
  text: 'Entonces la ira[a] de Yahvé se encendió contra Israel, y dijo: “Porque esta nación ha transgredido mi pacto que ordené a sus padres, y no han escuchado mi voz[b]”,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “la ira de Yahvé ardió”. El hebreo expresa literalmente una ira que se enciende o arde.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “no han obedecido mi voz”. En hebreo, “escuchar la voz” suele implicar obedecerla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: the anger ... burned
  chosen_spanish: la ira ... se encendió
  alternatives_spanish:
  - la ira ... ardió
  - el enojo ... se encendió
  lexicon: HALOT
  rationale: El hebreo usa una imagen de enojo que se calienta o arde. En español, “se encendió” conserva bien esa metáfora sin volverse rígido o poco natural. “Ira” mantiene el tono más solemne que “enojo”.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como “Yahvé”, conforme al criterio del proyecto para יהוה, en vez de sustituirlo por un título.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - con Israel
  - sobre Israel
  lexicon: HALOT
  rationale: Con verbos de ira, el hebreo marca el objeto de esa ira; “contra Israel” expresa con claridad ese valor relacional y judicial.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce de manera directa la razón del juicio divino, con una forma natural en español.
- source_word: עָבְרוּ
  english_pob_choice: has transgressed
  chosen_spanish: ha transgredido
  alternatives_spanish:
  - ha quebrantado
  - ha violado
  - ha pasado por encima de
  lexicon: HALOT
  rationale: En contexto de pacto, עבר expresa traspasar o violar límites del pacto. “Ha transgredido” conserva esa fuerza jurídico-covenantal mejor que una paráfrasis más suave.
- source_word: הַגּוֹי הַזֶּה
  english_pob_choice: this nation
  chosen_spanish: esta nación
  alternatives_spanish:
  - este pueblo
  lexicon: HALOT
  rationale: “Nación” refleja el sustantivo גוי sin suavizarlo a “pueblo”, aunque se refiera a Israel. Mantiene la elección léxica marcada del hebreo.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: “Pacto” es una opción válida y natural en español bíblico para ברית, manteniendo el sentido relacional y jurídico. Se evita “alianza” porque puede sonar más diplomática que bíblica en este contexto.
- source_word: צִוִּיתִי אֶת אֲבוֹתָם
  english_pob_choice: that I commanded their fathers
  chosen_spanish: que mandé a sus padres
  alternatives_spanish:
  - que ordené a sus padres
  - que di por mandato a sus padres
  lexicon: HALOT
  rationale: El hebreo es compacto; en español, “mandé a sus padres” reproduce la idea de que el mandato fue dado a los antepasados. “Padres” se conserva por fidelidad a la formulación bíblica tradicional y al parentesco generacional.
- source_word: שָׁמְעוּ לְקוֹלִי
  english_pob_choice: they have not listened to my voice
  chosen_spanish: no han escuchado mi voz
  alternatives_spanish:
  - no han obedecido mi voz
  - no han prestado oído a mi voz
  lexicon: HALOT
  rationale: El idiomismo hebreo combina oír con obedecer. “No han escuchado mi voz” conserva la imagen auditiva y, en español bíblico moderno, permite inferir la desobediencia sin forzarla demasiado.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; “Yahvé” preserva el nombre del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje de pacto y juicio
  english_pob_reading: transgressed my covenant ... not listened to my voice
  chosen_spanish_reading: ha transgredido mi pacto ... no han escuchado mi voz
  alternative_spanish_readings:
  - ha quebrantado mi pacto ... no han obedecido mi voz
  - ha violado mi pacto ... no han atendido a mi voz
  rationale: La formulación conserva tanto la dimensión jurídica del pacto como la acusación de desobediencia. No se suaviza a una mera falta moral general.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: conserva el nombre divino como Yahvé, mantiene el léxico de pacto (“pacto”, “transgredido”) y la imagen de ira encendida. Se prefirió “no han escuchado mi voz” por fidelidad al idiomismo hebreo, dejando la alternativa obediencial en nota.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma estándar para יְהוָה.
  - Se usa “pacto” de manera consistente para בְּרִית.
  - Se conserva el plural “sus padres” para אֲבוֹתָם, siguiendo el registro bíblico habitual.
  - La puntuación reproduce el discurso directo con comillas españolas y puntuación final acorde al español.
