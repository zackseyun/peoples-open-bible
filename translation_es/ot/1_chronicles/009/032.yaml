translation:
  language: es
  text: Y algunos de los hijos de los coatitas, de entre sus hermanos, estaban a cargo del pan dispuesto en orden[a], para prepararlo sábado tras sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente «el pan de la proposición» o «el pan de la Presencia». El hebreo se refiere literalmente al pan colocado o dispuesto en orden.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And some of
  chosen_spanish: Y algunos de
  alternatives_spanish:
  - Y de
  - Y algunos
  lexicon: HALOT
  rationale: La partícula conjuntiva con preposición aquí introduce un subconjunto dentro del grupo anterior. «Y algunos de» expresa naturalmente el valor partititivo en español y evita una traducción demasiado literal que sonarí­a incompleta.
- source_word: בְּנֵי הַקְּהָתִי
  english_pob_choice: the sons of the Kohathites
  chosen_spanish: los hijos de los coatitas
  alternatives_spanish:
  - los hijos de los qehatitas
  - los coatitas
  lexicon: HALOT
  rationale: Se conserva la estructura filial/clánica del hebreo. «Coatitas» es la forma castellana usual del nombre del clan de Qehat/Cohat; «hijos de los coatitas» mantiene la transparencia genealógica sin perder inteligibilidad.
- source_word: מִן אֲחֵיהֶם
  english_pob_choice: from among their brothers
  chosen_spanish: de entre sus hermanos
  alternatives_spanish:
  - de sus hermanos
  - de entre sus parientes
  lexicon: HALOT
  rationale: El segundo מִן es partititivo y señala selección dentro del mismo grupo. «De entre» preserva ese valor y suena natural en español; «hermanos» retiene el lenguaje de parentesco/clan del original.
- source_word: עַל
  english_pob_choice: were in charge of
  chosen_spanish: estaban a cargo de
  alternatives_spanish:
  - estaban sobre
  - tenían responsabilidad por
  lexicon: HALOT
  rationale: En contextos administrativos, עַל indica supervisión o responsabilidad. «Estaban a cargo de» comunica bien la función asignada sin introducir una paráfrasis excesiva.
- source_word: לֶחֶם הַמַּעֲרָכֶת
  english_pob_choice: the bread of the arrangement
  chosen_spanish: el pan de la disposición
  alternatives_spanish:
  - el pan ordenado
  - el pan de la presentación
  - el pan de la fila
  lexicon: HALOT
  rationale: Se evita «pan de la proposición» o «pan de la Presencia» como formas eclesiales tradicionales no exigidas por el hebreo. «Disposición» recoge la idea de algo puesto/ordenado en arreglo y permite mantener la imagen concreta del texto; el sustantivo «pan» sigue el uso bíblico español más natural que «bread» traducido de modo técnico.
- source_word: לְהָכִין
  english_pob_choice: to prepare it
  chosen_spanish: para prepararlo
  alternatives_spanish:
  - para prepararlo
  - para disponerlo
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. El objeto tácito se sobreentiende por contexto; en español se lo explicita con el pronombre enclítico «-lo» para claridad y fluidez.
- source_word: שַׁבַּת שַׁבָּת
  english_pob_choice: Sabbath by Sabbath
  chosen_spanish: sábado tras sábado
  alternatives_spanish:
  - sábado a sábado
  - cada sábado
  lexicon: HALOT
  rationale: La repetición hebrea tiene valor distributivo e iterativo. «Sábado tras sábado» conserva esa repetición de manera idiomática y rítmica en español, más cercana al patrón formal del original que una simple equivalencia interpretativa.
theological_decisions:
- issue: Nombre del pan ritual y tradición terminológica
  english_pob_reading: the bread of the arrangement, with a footnote noting the traditional alternatives 'the showbread' or 'the bread of the Presence.'
  chosen_spanish_reading: el pan de la disposición, con nota sobre las alternativas tradicionales
  alternative_spanish_readings:
  - el pan de la proposición
  - el pan de la Presencia
  - los panes de la proposición
  rationale: El hebreo habla de pan «ordenado/arreglado». La elección principal sigue ese dato léxico y evita imponer una terminología tradicional que puede oscurecer el sentido directo del texto. La nota preserva las alternativas eclesiales conocidas sin sustituir la lectura base.
  doctrine_reference: Éxodo 25:30; Levítico 24:5-9
translation_notes:
  revision_awareness: 'La versión sigue de cerca el paquete fuente hebreo y la auditoría inglesa: mantiene el valor partititivo de וּמִן, la selección interna de מִן אֲחֵיהֶם, el sentido administrativo de עַל, la expresión concreta de לֶחֶם הַמַּעֲרָכֶת y el distributivo repetitivo de שַׁבַּת שַׁבָּת. No se incorporaron revisiones adicionales porque el veredicto de control cruzado fue de alta concordancia y no hubo cambios aplicados.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos del proyecto, pero este versículo no contiene el nombre divino.
  - «Hijos de los coatitas» conserva el lenguaje tribal/clánico del hebreo y es consistente con la terminología genealógica del POB.
  - «Pan» se mantiene como equivalente bíblico natural de לֶחֶם, sin desplazarlo por un tecnicismo litúrgico.
  - «Sábado tras sábado» conserva la iteración distributiva del hebreo en un español claro y publicable.
