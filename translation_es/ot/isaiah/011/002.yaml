translation:
  language: es
  text: 'Y reposará sobre él el Espíritu de Yahvé[a]: espíritu de sabiduría y de entendimiento[b], espíritu de consejo y de poder, espíritu de conocimiento y del temor de Yahvé[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo repite «espíritu» tres veces después de «el Espíritu de Yahvé», enfatizando las cualidades u operaciones de ese único Espíritu: sabiduría y entendimiento, consejo y poder, conocimiento y temor de Yahvé. «Yahvé» traduce el nombre divino YHWH.'
    reason: lexical_alternative
  - marker: b
    text: O «discernimiento» para «entendimiento»; el hebreo בִינָה incluye la idea de comprender con discernimiento.
    reason: lexical_alternative
  - marker: c
    text: O «reverencia por Yahvé» para «el temor de Yahvé»; la expresión hebrea incluye asombro reverente, no mero terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָחָה
  english_pob_choice: will rest
  chosen_spanish: reposará
  alternatives_spanish:
  - descansará
  - se posará
  lexicon: HALOT
  rationale: נוח en este contexto expresa la idea de asentarse o permanecer en reposo sobre alguien. «Reposará» conserva el matiz de permanencia y suena natural en español profético.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - encima de él
  lexicon: HALOT
  rationale: La preposición עַל con sufijo indica dirección o ubicación sobre la persona; «sobre él» refleja mejor el movimiento descendente y la presencia reposada del Espíritu.
- source_word: רוּחַ יְהוָה
  english_pob_choice: the Spirit of Yahweh
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el Espíritu de Yahweh
  - el Espíritu del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según la norma del proyecto. «Espíritu» va con mayúscula porque el contexto se refiere al Espíritu de Dios, no a un mero ánimo o aliento humano.
- source_word: רוּחַ חָכְמָה וּבִינָה
  english_pob_choice: a spirit of wisdom and understanding
  chosen_spanish: espíritu de sabiduría y de entendimiento
  alternatives_spanish:
  - espíritu de sabiduría y discernimiento
  - un espíritu de sabiduría y de entendimiento
  lexicon: HALOT
  rationale: La repetición de רוּחַ se conserva en español como en la estructura hebrea, sin forzarla a una pluralidad de espíritus. «Sabiduría» y «entendimiento» son equivalentes directos y dignos para חָכְמָה y בִינָה.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente más directo y reconocido en el registro sapiencial y real del pasaje.
- source_word: בִינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - comprensión
  lexicon: HALOT
  rationale: «Entendimiento» comunica bien la capacidad de comprender y distinguir, y mantiene el paralelismo con «sabiduría».
- source_word: רוּחַ עֵצָה וּגְבוּרָה
  english_pob_choice: a spirit of counsel and might
  chosen_spanish: espíritu de consejo y de poder
  alternatives_spanish:
  - espíritu de consejo y de fuerza
  - espíritu de consejo y de poderío
  lexicon: HALOT
  rationale: «Consejo» refleja el juicio sabio y gobernante de עֵצָה. Para גְבוּרָה se escogió «poder» como equivalente claro en español y suficientemente solemne; se evita suavizarlo demasiado con «fuerza» si se quiere resaltar capacidad eficaz.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - consejo sabio
  - plan
  lexicon: HALOT
  rationale: En contexto regio y mesiánico, עֵצָה alude a consejo acertado y gobierno prudente; «consejo» es la correspondencia más natural.
- source_word: גְבוּרָה
  english_pob_choice: might
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - maleza
  - valentía
  lexicon: HALOT
  rationale: גְבוּרָה puede abarcar fuerza, poder o vigor heroico. «Poder» comunica capacidad efectiva y evita una restricción innecesaria a fuerza física.
- source_word: רוּחַ דַּעַת וְיִרְאַת יְהוָה
  english_pob_choice: a spirit of knowledge and the fear of Yahweh
  chosen_spanish: espíritu de conocimiento y del temor de Yahvé
  alternatives_spanish:
  - espíritu de conocimiento y del temor de Yahvé
  - espíritu de conocimiento y reverencia por Yahvé
  lexicon: HALOT
  rationale: «Conocimiento» traduce de modo directo דַּעַת. Se conserva la fórmula bíblica «temor de Yahvé» para no debilitar la fuerza teológica de יִרְאַת יְהוָה, que incluye reverencia y sumisión de pacto.
- source_word: דַּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  lexicon: HALOT
  rationale: «Conocimiento» es una equivalencia natural y formal para דַּעַת, especialmente en un catálogo de cualidades sapienciales.
- source_word: יִרְאַת יְהוָה
  english_pob_choice: the fear of Yahweh
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - la reverencia por Yahvé
  - el respeto reverente a Yahvé
  lexicon: HALOT
  rationale: 'Se preserva la tensión bíblica de la expresión: no solo respeto, sino temor reverente y obediencia. Por eso se mantiene «temor» en lugar de reducirlo a «reverencia».'
theological_decisions:
- issue: La repetición de רוּחַ podría sugerir varios espíritus o una enumeración de rasgos del mismo Espíritu
  english_pob_reading: Descriptive appositions of the one Spirit of the LORD
  chosen_spanish_reading: Aposiciones descriptivas del único Espíritu de Yahvé
  alternative_spanish_readings:
  - Enumeración de siete dones o capacidades espirituales distintas
  - Serie poética de manifestaciones del Espíritu
  rationale: La sintaxis hebrea repite רוּחַ para describir cualidades o operaciones del mismo Espíritu, no para afirmar seres espirituales múltiples. La traducción conserva la repetición sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica sin sobreexplicar; prioridad del texto hebreo
- issue: Cómo verter יִרְאַת יְהוָה sin diluir su peso bíblico
  english_pob_reading: the fear of Yahweh
  chosen_spanish_reading: el temor de Yahvé
  alternative_spanish_readings:
  - la reverencia por Yahvé
  - el respeto reverente a Yahvé
  rationale: La fórmula bíblica es un término cargado de sentido pactual y sapiencial. «Temor de Yahvé» mantiene ese valor y evita convertirlo en una mera actitud afectiva.
  doctrine_reference: Primacía del idioma original; conservar la tensión reverente del término
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del texto fuente en inglés, que no introdujo cambios adicionales y mantuvo la lectura estable; la versión española conserva esa misma línea interpretativa y la repetición hebrea de רוּחַ sin resolverla en pluralidad de espíritus.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «Espíritu» con mayúscula para el Espíritu divino y minúscula en las repeticiones atributivas.
  - Se conserva «temor de Yahvé» como fórmula bíblica fija, no como mera 'reverencia'.
  - La puntuación con dos puntos reproduce el desdoblamiento explicativo del hebreo y del audit trail en inglés.
