translation:
  language: es
  text: para que cada hombre dejara libre a su esclavo y cada hombre a su esclava, el hebreo y la hebrea, para que quedaran libres, de modo que ninguno esclavizara a un judío, su hermano, entre ellos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a un judeano, su hermano». El término hebreo puede designar a un judío en sentido étnico-religioso o, en este marco histórico, con más precisión, a un judeano.
    reason: alternative_reading
lexical_decisions:
- source_word: לְשַׁלַּח
  english_pob_choice: should set free
  chosen_spanish: libere
  alternatives_spanish:
  - deje libre
  - ponga en libertad
  lexicon: HALOT
  rationale: En este contexto de manumisión, el verbo expresa liberar de la esclavitud, no simplemente enviar lejos. «Libere» comunica con naturalidad el valor jurídico-emancipatorio.
- source_word: עַבְדּוֹ
  english_pob_choice: his male slave
  chosen_spanish: su esclavo varón
  alternatives_spanish:
  - su siervo varón
  - su esclavo
  lexicon: HALOT
  rationale: El contexto trata de personas sujetas a servidumbre obligatoria y liberación legal; «esclavo» conserva esa fuerza. «Varón» mantiene el contraste de género con la siguiente cláusula.
- source_word: שִׁפְחָתוֹ
  english_pob_choice: his female slave
  chosen_spanish: su esclava mujer
  alternatives_spanish:
  - su criada
  - su esclava
  lexicon: HALOT
  rationale: La palabra designa una esclava o sirvienta obligada, pero aquí la fuerza legal del pasaje favorece «esclava». «Mujer» refleja el paralelismo explícito con el masculino.
- source_word: הָעִבְרִי וְהָעִבְרִיָּה
  english_pob_choice: the Hebrew man and the Hebrew woman
  chosen_spanish: el hebreo y la hebrea
  alternatives_spanish:
  - el hombre hebreo y la mujer hebrea
  - el esclavo hebreo y la esclava hebrea
  lexicon: HALOT
  rationale: El hebreo marca formas masculinas y femeninas sustantivadas. En español, «el hebreo y la hebrea» reproduce con brevedad esa distinción sin añadir una glosa interpretativa.
- source_word: חָפְשִׁים
  english_pob_choice: free
  chosen_spanish: libres
  alternatives_spanish:
  - en libertad
  - como personas libres
  lexicon: HALOT
  rationale: Es un predicado de estado. «Libres» es la forma más directa y natural para expresar el estado resultante de la liberación.
- source_word: לְבִלְתִּי עֲבָד בָּם
  english_pob_choice: so that no one should enslave among them
  chosen_spanish: de modo que ninguno esclavice
  alternatives_spanish:
  - para que nadie los esclavice
  - de manera que no se les haga esclavos
  lexicon: HALOT
  rationale: 'El verbo aquí tiene sentido causativo por el contexto: no se trata de «servir» sino de volver a someter en esclavitud. «Esclavice» preserva ese valor de manera clara.'
- source_word: בִּיהוּדִי אָחִיהוּ אִישׁ
  english_pob_choice: a Jew, his brother
  chosen_spanish: a un judío, su hermano
  alternatives_spanish:
  - a un judeano, su hermano
  - a su hermano judío
  lexicon: HALOT
  rationale: «Judío» es la forma más comprensible en español actual; «judeano» queda preservado como alternativa histórica. «Su hermano» mantiene el lenguaje de parentesco del texto.
- source_word: אִישׁ ... וְאִישׁ ... אִישׁ
  english_pob_choice: each man ... and each man ... no one
  chosen_spanish: cada hombre ... y cada hombre ... ninguno
  alternatives_spanish:
  - cada uno ... y cada uno ... nadie
  - cada persona ... y cada persona ... ninguno
  lexicon: HALOT
  rationale: La repetición distributiva de אִישׁ se conserva con «cada hombre». En la última cláusula, «ninguno» expresa con economía y claridad la negación distributiva.
theological_decisions:
- issue: Lenguaje de esclavitud en un contexto de manumisión
  english_pob_reading: Use 'slave' language rather than 'servant'
  chosen_spanish_reading: Usar «esclavo/esclava» en vez de «siervo/sierva»
  alternative_spanish_readings:
  - usar «siervo/sierva» por tono tradicional
  - usar «criado/criada»
  rationale: El pasaje regula liberación de personas en servidumbre forzada; suavizar a «siervo» diluye la fuerza legal y social del mandato. «Esclavo/esclava» conserva la tensión textual y el contenido jurídico.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; criterio POB para términos de estatus vinculado
- issue: Traducción de יהודי
  english_pob_reading: Jew in the main text
  chosen_spanish_reading: «judío» en el texto principal
  alternative_spanish_readings:
  - «judeano» en el texto principal
  - «judío» con nota histórica
  rationale: En este contexto histórico, «judeano» es preciso, pero «judío» es el equivalente natural y ampliamente comprensible en español. La equivalencia histórica queda abierta en la nota o en el trabajo textual circundante.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, mantener tensiones léxicas genuinas
- issue: Retención de las distinciones de género presentes en el hebreo
  english_pob_reading: Retain 'each man,' 'Hebrew man,' and 'Hebrew woman'
  chosen_spanish_reading: 'Conservar las formas masculinas y femeninas: «cada hombre», «el hebreo y la hebrea»'
  alternative_spanish_readings:
  - neutralizar a «cada persona»
  - reformular como «esclavo/esclava hebreo(a)»
  rationale: El hebreo distingue explícitamente género gramatical y referencial; la traducción conserva esa información para no borrar un rasgo visible del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del inglés, que reordenó la cláusula final para mayor naturalidad sin cambiar el sentido. La versión española sigue esa misma línea de fluidez: coloca el objeto indirecto al final natural de la cláusula y mantiene la relación «entre ellos» como cierre del mandato.'
  spanish_consistency_notes:
  - Se mantuvo «esclavo/esclava» para el estatus servil, en coherencia con la política POB de no suavizar términos de bondage.
  - Se preservó la distinción de género del hebreo con pares masculinos/femeninos.
  - Se eligió «judío» en el texto principal por claridad actual, dejando «judeano» en nota para la tensión histórica.
  - La estructura distributiva de los tres איש se refleja con «cada hombre ... y cada hombre ... ninguno» para evitar una neutralización excesiva.
