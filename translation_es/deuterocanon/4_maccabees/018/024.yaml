translation:
  language: es
  text: A él sea la gloria por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ᾧ
  english_pob_choice: to whom
  chosen_spanish: a él
  alternatives_spanish:
  - al cual
  - a quien
  lexicon: LSJ
  rationale: El dativo relativo introduce una ascripción doxológica; en español, 'a él' expresa con naturalidad el destinatario de la gloria sin forzar una construcción demasiado literal.
- source_word: ἡ δόξα
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - gloria
  - el honor
  lexicon: LSJ
  rationale: '''δόξα'' en contexto doxológico se traduce de forma estándar como ''gloria''. Mantiene el valor cultual y evita debilitar el término con ''honor''.'
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por las eras de las eras
  lexicon: LSJ
  rationale: La expresión griega es un semitismo de duración interminable; en español, 'por los siglos de los siglos' es la equivalencia litúrgica y semántica más fiel y natural.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - así sea
  - verdaderamente
  lexicon: LSJ
  rationale: Se conserva la transliteración litúrgica tradicional, que funciona bien en español y preserva el cierre solemne del texto.
theological_decisions:
- issue: Cláusula doxológica sin verbo explícito
  english_pob_reading: to whom be the glory
  chosen_spanish_reading: A él sea la gloria
  alternative_spanish_readings:
  - A él pertenece la gloria
  - De él es la gloria
  rationale: El griego omite verbo; en español, 'sea' reproduce la ascripción doxológica con naturalidad, sin añadir una afirmación posesiva más fuerte de la que el griego exige.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without unnecessary paraphrase.'
translation_notes:
  revision_awareness: El texto griego es breve y estable, con alta concordancia entre fuente y auditoría inglesa; no se requieren variantes textuales ni notas adicionales.
  spanish_consistency_notes:
