translation:
  language: es
  text: Reunió hombres para sí y llegó a ser jefe de una banda[a] cuando David los mató. Fueron a Damasco[b], se establecieron allí y reinaron en Damasco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «jefe de un גדוד»; también puede entenderse «comandante de una tropa». Se traduce «banda» como equivalente amplio y neutral, sin añadir una especificidad militar no explícita aquí.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo usa verbos plurales en toda la segunda mitad del versículo: «fueron ... se establecieron ... reinaron». Algunas traducciones suavizan esto a singular («él») porque el contexto se centra en Rezón.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְבֹּץ עָלָיו אֲנָשִׁים
  english_pob_choice: He gathered men to himself
  chosen_spanish: Reunió hombres para sí
  alternatives_spanish:
  - Reunió gente a su alrededor
  - Juntó hombres para sí
  lexicon: HALOT
  rationale: קבץ con עַל + sufijo pronominal expresa atraer o reunir personas en torno a alguien. «Para sí» conserva el matiz direccional del hebreo sin volver la frase pesada en español. «Hombres» mantiene el valor masculino plural del sustantivo en este contexto militar.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  lexicon: HALOT
  rationale: El hebreo usa plural masculino, y el contexto de banda armada favorece una referencia a combatientes. «Hombres» es más preciso que «personas».
- source_word: שַׂר גְּדוּד
  english_pob_choice: commander of a band
  chosen_spanish: jefe de un [a]
  alternatives_spanish:
  - comandante de una banda
  - capitán de un tropa
  lexicon: HALOT
  rationale: שַׂר designa un jefe o comandante, y גְּדוּד puede ser una unidad, tropa o banda. «Jefe de un» mantiene la amplitud semántica sin añadir la idea más específica de incursión que el texto no explicita. La nota aclara la posible equivalencia con «banda».
- source_word: בַּהֲרֹג דָּוִד אֹתָם
  english_pob_choice: when David killed them
  chosen_spanish: cuando David los mató
  alternatives_spanish:
  - al matar David a ellos
  - cuando David mató a esos hombres
  lexicon: HALOT
  rationale: La preposición ב con infinitivo puede marcar circunstancia temporal. «Cuando David los mató» es la forma más natural en español y conserva el valor temporal del hebreo.
- source_word: וַיֵּלְכוּ דַמֶּשֶׂק
  english_pob_choice: They went to Damascus
  chosen_spanish: Ellos fueron a Damasco
  alternatives_spanish:
  - Fueron a Damasco
  - Y fueron a Damasco
  lexicon: HALOT
  rationale: El verbo de movimiento se rinde de manera directa y narrativa. Se conserva el plural del hebreo y el sentido direccional hacia Damasco.
- source_word: וַיֵּשְׁבוּ בָהּ
  english_pob_choice: settled there
  chosen_spanish: se establecieron allí
  alternatives_spanish:
  - vivieron allí
  - habitaron allí
  lexicon: HALOT
  rationale: ישב en contexto de asentamiento significa habitar o establecerse. «Se establecieron allí» suena natural en español y refleja la instalación en Damasco.
- source_word: וַיִּמְלְכוּ בְּדַמָּשֶׂק
  english_pob_choice: and reigned in Damascus
  chosen_spanish: y reinaron en Damasco
  alternatives_spanish:
  - y gobernaron en Damasco
  - y fueron reyes en Damasco
  lexicon: HALOT
  rationale: מלך en qal significa reinar o ser rey. Se conserva el plural del hebreo, como hace el POB inglés, para no resolver la tensión textual mediante una singularización interpretativa.
theological_decisions:
- issue: Verbos plurales en la segunda mitad del versículo, aunque el contexto más amplio centra la figura en Rezón
  english_pob_reading: 'Retain the plural subject in translation: ''They went... settled... reigned'''
  chosen_spanish_reading: 'Mantener el sujeto plural: «Ellos fueron... se establecieron... reinaron»'
  alternative_spanish_readings:
  - 'Suavizar a singular con Rezón como sujeto implícito: «Él fue... se estableció... reinó»'
  rationale: El hebreo presenta verbos plurales consecutivos en la segunda mitad del versículo. Mantener el plural en español respeta la forma del texto y deja visible la tensión narrativa en vez de resolverla por interpretación.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor de גְּדוּד
  english_pob_reading: band
  chosen_spanish_reading: banda
  alternative_spanish_readings:
  - tropa
  - grupo armado
  rationale: El término hebreo puede referirse a una banda o tropa. «Banda» es el equivalente más neutro y cercano al ajuste revisionado del POB inglés, sin añadir una interpretación demasiado específica.
  doctrine_reference: HALOT; revisión 2026-04-23
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que suavizó «raiding band» a «band» para גְּדוּד. La versión española evita añadir el matiz de incursión y, a la vez, conserva la lectura plural de los verbos finales conforme al texto hebreo y al POB inglés.
  spanish_consistency_notes:
  - Se usó «Damasco» de forma consistente para דַּמֶּשֶׂק.
  - Se mantuvo el plural «ellos / reinaron» para reflejar el hebreo, aunque el antecedente narrativo pueda sugerir a Rezón.
  - No se introdujo «Cristo», «SEÑOR» ni equivalentes de máscara teológica, ya que el versículo no los contiene.
  - La nota al pie se ancló en «de un [a]» para señalar la ambigüedad de גְּדוּד sin sobretraducirla.
