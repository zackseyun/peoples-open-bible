translation:
  language: es
  text: Pero ellos, que buscan mi vida para destruirla[a], irán a las profundidades de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «que buscan mi vida para ruina».
    reason: alternative_reading
  - marker: b
    text: O, más literalmente, «a las partes bajas de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמָּה
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Pero ellos mismos
  lexicon: HALOT
  rationale: El hebreo presenta un pronombre enfático con valor discursivo adversativo en contraste con la confianza del verso anterior. En español, «Pero ellos» conserva ese giro y la énfasis sin sonar forzado.
- source_word: לְשׁוֹאָה
  english_pob_choice: for ruin
  chosen_spanish: para destruirla
  alternatives_spanish:
  - para ruina
  - para destrucción
  - para desolación
  lexicon: HALOT
  rationale: שׁוֹאָה expresa ruina, devastación o destrucción. En español, una construcción final con infinitivo («para destruirla») transmite de manera natural el propósito hostil implícito en la expresión, sin perder el sentido de ruina/destrucción.
- source_word: יְבַקְשׁוּ נַפְשִׁי
  english_pob_choice: who seek my life
  chosen_spanish: que buscan mi vida
  alternatives_spanish:
  - que buscan mi alma
  - que me buscan
  - que buscan mi vida para destruirla
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí significa la vida del salmista, no un «alma» abstracta. «Buscar mi vida» es un equivalente idiomático claro y bíblicamente reconocible en español para una persecución mortal.
- source_word: יָבֹאוּ
  english_pob_choice: will go
  chosen_spanish: irán
  alternatives_spanish:
  - vendrán
  - entrarán
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente «venir», en español con una meta espacial como esta se expresa mejor con «irán», manteniendo el movimiento descendente de forma natural.
- source_word: בְּתַחְתִּיּוֹת הָאָרֶץ
  english_pob_choice: into the depths of the earth
  chosen_spanish: a las profundidades de la tierra
  alternatives_spanish:
  - a las partes bajas de la tierra
  - al fondo de la tierra
  - al seol
  lexicon: HALOT
  rationale: La frase hebrea alude a los lugares más bajos/profundos de la tierra. «Profundidades de la tierra» conserva la imagen poética de descenso y evita resolverla prematuramente en un término técnico de más carga doctrinal.
theological_decisions:
- issue: Imagen de descenso a las profundidades de la tierra
  english_pob_reading: A poetic expression for death, the grave, or being brought down in judgment
  chosen_spanish_reading: Una expresión poética para la muerte, la tumba o el ser abatidos en juicio
  alternative_spanish_readings:
  - Una referencia espacial literal a las partes más bajas de la tierra
  - Una alusión al Seol o al lugar de los muertos
  rationale: El hebreo usa una imagen de descenso que puede referirse al ámbito de la muerte o a la caída en juicio. La traducción española mantiene la imagen sin cerrarla en una doctrina específica del más allá.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: 'La versión inglesa más reciente reordenó la cláusula para expresar de manera más natural el valor final de לְשׁוֹאָה sin sobreinterpretar «seek my life». Esta versión española sigue esa cautela: conserva la relación entre «buscar mi vida» y el resultado destructivo, pero lo expresa con un infinitivo natural en español («para destruirla»).'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» y no aplica aquí, pero se respeta el registro bíblico sobrio y no arcaizante.
  - Se usa «vida» para נֶפֶשׁ siguiendo el valor contextual de vida concreta, no «alma».
  - Se conserva la imagen espacial de descenso con «profundidades de la tierra», equivalente natural de la POB inglesa.
  - La partícula adversativa inicial se refleja con «Pero» para sostener el contraste discursivo del salmo.
