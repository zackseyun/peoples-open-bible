    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el sentido del POB inglés y del griego, pero mejora dos puntos clave: explicita mejor la repetición de ἐν τῇ δευτέρᾳ con «por segunda vez» y reemplaza una frase española poco idiomática por una expresión natural que sí comunica la presión continua del asedio. También usa «construyendo» para reflejar con mayor fidelidad ποιούμενος.'
