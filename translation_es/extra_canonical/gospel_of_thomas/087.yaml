base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/087.yaml
  text: Jesus said[a], “Wretched is the body that depends on a body[d][c][b], and wretched is the soul that depends on these two.”
  footnotes:
  - marker: a
    text: '“Depends on”: ⲉⲓϣⲉ (ⲁϣⲉ) with ⲛ + object can express resting on or reliance; alternatives include “rests on” or “is based on.”'
    reason: lexical_alternative
  - marker: b
    text: '“These two” (ⲛⲡⲁⲓ ⲛⲡⲥⲛⲁⲩ) points back to the pair implied in the first clause: the dependent body and the body it depends on, not to body and soul.'
    reason: cultural_note
  - marker: c
    text: Loanword ⲧⲁⲗⲁⲓⲡⲱⲣⲟⲥ/ⲟⲛ corresponds to Greek ταλαίπωρος, “wretched, miserable.”
    reason: cultural_note
  - marker: d
    text: The manuscript alternates Greek endings -ον / -ος on the adjective; this does not change meaning.
    reason: dialect_note
