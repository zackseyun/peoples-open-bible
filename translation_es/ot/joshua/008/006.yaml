translation:
  language: es
  text: 'Y saldrán tras nosotros hasta que los hayamos alejado de la ciudad[a], porque dirán[b]: «Huyen delante de nosotros, como la primera vez», y huiremos delante de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «hasta que los hayamos atraído fuera de la ciudad». El verbo hebreo significa apartar, sacar o arrastrar fuera; «alejado» preserva el sentido básico sin hacer explícita de más la táctica.
    reason: lexical_alternative
  - marker: b
    text: «Como la primera vez» alude a la retirada anterior de Israel ante Hai (véase Josué 7:4–5).
    reason: cross_reference
lexical_decisions:
- source_word: וְיָצְאוּ
  english_pob_choice: And they will come out
  chosen_spanish: Y saldrán
  alternatives_spanish:
  - Y irán saliendo
  - Y saldrán fuera
  lexicon: HALOT
  rationale: En el contexto prospectivo del discurso estratégico de Josué, el verbo se entiende como futuro. «Saldrán» conserva el movimiento desde la ciudad sin sobrecargar el español con una glosa más explícita.
- source_word: אַחֲרֵינוּ
  english_pob_choice: after us
  chosen_spanish: después de nosotros
  alternatives_spanish:
  - tras nosotros
  - detrás de nosotros
  - en persecución de nosotros
  lexicon: HALOT
  rationale: «Después de nosotros» mantiene la relación espacial y de persecución de manera natural en español; evita una expresión más interpretativa que podría sonar más dinámica que el hebreo.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el punto de que
  - hasta
  lexicon: HALOT
  rationale: El valor temporal/meta queda bien expresado con «hasta que» introduciendo la condición del plan militar.
- source_word: הַתִּיקֵנוּ
  english_pob_choice: we have drawn them away
  chosen_spanish: los hayamos alejado
  alternatives_spanish:
  - los hayamos apartado
  - los hayamos retirado
  - los hayamos arrastrado lejos
  lexicon: HALOT
  rationale: La raíz נתק en hifil indica separar, tirar o alejar. «Alejado» conserva la fuerza de desplazamiento sin añadir la imagen interpretativa de «lure» como si fuera un verbo diferente en español.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre de objeto directo en español debe concordar naturalmente con el referente masculino plural; «los» es la forma más idiomática.
- source_word: מִן הָעִיר
  english_pob_choice: from the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - desde la ciudad
  - fuera de la ciudad
  lexicon: HALOT
  rationale: En combinación con «alejar», «de la ciudad» expresa adecuadamente el punto de partida del alejamiento. La repetición de «alejado de la ciudad» en español evita redundancia innecesaria.
- source_word: כִּי יֹאמְרוּ
  english_pob_choice: for they will say
  chosen_spanish: porque dirán
  alternatives_spanish:
  - pues dirán
  - ya que dirán
  lexicon: HALOT
  rationale: «Porque» expresa la razón del plan y es la correspondencia natural del hebreo explicativo en este contexto.
- source_word: נָסִים
  english_pob_choice: They are fleeing
  chosen_spanish: Huyen
  alternatives_spanish:
  - están huyendo
  - están escapando
  lexicon: HALOT
  rationale: El participio hebreo puede reflejar acción en curso; en discurso directo español, «Huyen» mantiene la vivacidad y la brevedad militar del original.
- source_word: לְפָנֵינוּ
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - frente a nosotros
  lexicon: HALOT
  rationale: «Delante de nosotros» conserva la idea de retirada frente al enemigo y suena natural en español contemporáneo.
- source_word: כַּאֲשֶׁר בָּרִאשֹׁנָה
  english_pob_choice: as at the first
  chosen_spanish: como la primera vez
  alternatives_spanish:
  - como antes
  - como en un primer momento
  lexicon: HALOT
  rationale: La expresión remite a la retirada anterior en Josué 7. «Como la primera vez» comunica con claridad esa referencia retrospectiva, sin perder el valor comparativo del hebreo.
- source_word: וְנַסְנוּ
  english_pob_choice: and we will flee
  chosen_spanish: y huiremos
  alternatives_spanish:
  - y escaparemos
  - y correremos
  lexicon: HALOT
  rationale: «Huir» corresponde bien al registro militar y preserva el paralelismo con la fuga que los enemigos supondrán de Israel.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  lexicon: HALOT
  rationale: La expresión mantiene el mismo patrón espacial que «delante de nosotros», reforzando el paralelismo del verso.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el tramo auditado en inglés. Se conservó la estructura condicional/estratégica del discurso, la terminología espacial de «delante de», y la ambigüedad léxica de נתק sin convertirla en una paráfrasis más amplia. No se introdujeron revisiones adicionales respecto del pasaje auditado en inglés, que quedó sin cambios en la última pasada.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se mantuvo un registro bíblico moderno y claro, evitando el arcaísmo innecesario.
  - 'Se conservaron paralelismos de dirección espacial: «delante de nosotros» / «delante de ellos».'
  - «Huir» y «alejar» reflejan el registro militar del hebreo sin suavizarlo.
  - Las notas a y b están ancladas en el texto donde aparecen las expresiones con alternativa o referencia histórica.
