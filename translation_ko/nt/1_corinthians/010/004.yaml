  yaml_path: translation/nt/1_corinthians/010/004.yaml
  text: and all drank the same spiritual drink[a], for they were drinking from a spiritual rock that followed them[b], and the rock was the Messiah.
  footnotes:
  - marker: a
    text: Or 'from the spiritual rock that followed them.' The Greek participle can be rendered more simply as 'followed,' but 'was following' better reflects its ongoing aspect.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ.' Here rendered 'Messiah' because Χριστός functions as a title rather than a name-like form.
    reason: alternative_reading
