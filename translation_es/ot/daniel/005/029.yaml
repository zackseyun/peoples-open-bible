  yaml_path: translation/ot/daniel/005/029.yaml
  text: Then Belshazzar gave the command[a], and they clothed Daniel with purple, put a chain of gold around his neck[b], and proclaimed concerning him that he should be the third ruler in the kingdom.
  footnotes:
