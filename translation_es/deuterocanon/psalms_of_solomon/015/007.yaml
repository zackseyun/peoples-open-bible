translation:
  language: es
  text: cuando salga contra los pecadores de la presencia de Yahvé, para destruir todas las posesiones de los pecadores.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda sustancia de los pecadores».
