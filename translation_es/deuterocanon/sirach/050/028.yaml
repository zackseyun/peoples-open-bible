translation:
  language: es
  text: Dichoso[a] el hombre que medita en estas cosas, y el que las toma a pecho llegará a ser sabio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bienaventurado el hombre». El hebreo אַשְׁרֵי y el griego μακάριος también pueden traducirse «feliz», pero «dichoso» preserva mejor el tono sapiencial de la sentencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי / μακάριος
  english_pob_choice: Blessed is
  chosen_spanish: Dichoso
  alternatives_spanish:
  - Bienaventurado
  - Feliz
  lexicon: HALOT; LSJ
  rationale: La fórmula de bienaventuranza en Sirácida expresa una condición aprobada y favorable, no solo un estado emocional. 'Dichoso' conserva mejor ese tono sapiencial en español y evita la posible rigidez litúrgica de 'bienaventurado', mientras mantiene la cercanía semántica con μακάριος.
- source_word: אִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - uno
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino que funciona de modo genérico en contexto sapiencial. 'El hombre' respeta esa forma sin neutralizar indebidamente el sujeto.
- source_word: בְּאֵלֶּה / ἐν τούτοις
  english_pob_choice: on these things
  chosen_spanish: en estas cosas
  alternatives_spanish:
  - sobre estas cosas
  - en estas materias
  lexicon: HALOT; LSJ
  rationale: La preposición con el demostrativo señala las enseñanzas precedentes como objeto de reflexión. 'En estas cosas' sigue de cerca el hebreo y el griego, y en español puede expresar el ámbito de la meditación sin forzar una locución menos natural.
- source_word: יֶהְגֶּה
  english_pob_choice: meditates
  chosen_spanish: medita
  alternatives_spanish:
  - pondera
  - murmura
  lexicon: HALOT
  rationale: En contextos sapienciales הגה puede denotar reflexión interior y no solo murmullo audible. 'Medita' expresa bien ese pensar atento y deliberado en español actual.
- source_word: וְנוֹתֵן עַל לִבּוֹ / θεὶς αὐτὰ ἐπὶ καρδίαν αὐτοῦ
  english_pob_choice: who takes them to heart
  chosen_spanish: el que las guarda en su corazón
  alternatives_spanish:
  - el que las pone sobre su corazón
  - el que las toma a pecho
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego coinciden en la imagen de interiorizar profundamente estas enseñanzas. 'Guardar en su corazón' es una equivalencia idiomática natural en español que preserva la fuerza de la metáfora interna; 'las' retoma el plural implícito de 'estas cosas'.
- source_word: יֶחְכָּם / σοφισθήσεται
  english_pob_choice: will become wise
  chosen_spanish: llegará a ser sabio
  alternatives_spanish:
  - será hecho sabio
  - se hará sabio
  lexicon: HALOT; LSJ
  rationale: El hebreo expresa un resultado de llegar a la sabiduría; el griego admite además un matiz pasivo de ser instruido/hacer sabio. 'Llegará a ser sabio' mantiene el proceso y evita imponer un pasivo fuerte que el hebreo no exige.
theological_decisions:
- issue: 'Beatitud sapiencial: ''blessed'' frente a ''happy'''
  english_pob_reading: Blessed is the man
  chosen_spanish_reading: Dichoso el hombre
  alternative_spanish_readings:
  - Bienaventurado el hombre
  - Feliz el hombre
  rationale: La lectura principal conserva el carácter de sentencia sapiencial y la valoración positiva del estado descrito. 'Dichoso' suena natural en español y no reduce la fórmula a mera emoción subjetiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Referencia pronominal plural implícita
  english_pob_reading: who takes them to heart
  chosen_spanish_reading: el que las guarda en su corazón
  alternative_spanish_readings:
  - el que lo guarda en su corazón
  - el que las toma a pecho
  rationale: La POB inglesa explicita el plural 'them' apoyándose en el hebreo y el griego. El español conserva ese plural con 'las', para que quede claro que se trata de las enseñanzas previas y no de una idea abstracta singular.
  doctrine_reference: PHILOSOPHY.md 'Deuterocanonical / Apocrypha' and 'transparent' principles
- issue: Hebreo como testigo principal con el griego como control
  english_pob_reading: Translate from the extant Hebrew while allowing the Greek to confirm implied plural reference in the second clause
  chosen_spanish_reading: Traducir según el hebreo conservado, dejando que el griego confirme el plural implícito y el matiz de interiorización
  alternative_spanish_readings:
  - Seguir solo el hebreo de modo más literal
  - Imponer el pasivo griego en la segunda cláusula
  rationale: El hebreo conserva la base textual principal; el griego confirma que el referente es plural y que la idea es interiorizar esas enseñanzas. La redacción española mantiene ambas señales sin sobrecargar la sintaxis.
  doctrine_reference: PHILOSOPHY.md 'Deuterocanonical / Apocrypha' and 'transparent' principles
translation_notes:
  revision_awareness: La redacción inglesa revisada añadió 'he who' para clarificar el paralelismo. En español se resolvió con 'el que', que mantiene la estructura paralela natural y evita un calco innecesario.
  spanish_consistency_notes:
  - Se mantuvo el registro sapiencial y sobrio propio de Sirácida, evitando fórmulas excesivamente eclesiásticas.
  - Se preservó el plural implícito de las enseñanzas con 'las', en coherencia con el hebreo y el griego.
  - '''Corazón'' traduce καρδία / לִבּוֹ como centro interior de pensamiento y decisión, sin añadir psicologismos ajenos al texto.'
  - No se empleó 'Cristo' ni terminología cristológica, pues el pasaje no lo requiere.
  - Se evitó 'SEÑOR' porque no aparece el tetragrámaton en este verso.
