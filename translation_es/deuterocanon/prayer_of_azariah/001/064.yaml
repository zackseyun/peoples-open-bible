translation:
  language: es
  text: Bendigan al Señor[a], santos y humildes de corazón; cántenle alabanzas y exáltenlo en gran manera por los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piadosos» o «devotos»; el griego ὅσιοι también puede traducirse así.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Alaben
  - Bendigan en alabanza
  lexicon: BDAG
  rationale: El imperativo plural de εὐλογέω se usa aquí como fórmula litúrgica dirigida a la comunidad. «Bendigan» conserva el valor de hablar bien de Dios y evita reducirlo a una simple alabanza general.
- source_word: ὅσιοι
  english_pob_choice: holy
  chosen_spanish: los santos
  alternatives_spanish:
  - los piadosos
  - los devotos
  lexicon: BDAG
  rationale: ὅσιος puede rendirse como «piadoso» o «devoto», pero en este contexto doxológico «santos» comunica bien la cualidad de pertenecer a Dios y mantiene un registro litúrgico natural en español.
- source_word: ταπεινοὶ τῇ καρδίᾳ
  english_pob_choice: humble in heart
  chosen_spanish: humildes de corazón
  alternatives_spanish:
  - humildes en el corazón
  - humildes de ánimo
  lexicon: BDAG
  rationale: La frase dativa especifica la disposición interior; «humildes de corazón» reproduce de modo idiomático la cualidad interna y mantiene la imagen bíblica del corazón como sede de la voluntad y la actitud.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Maestro
  lexicon: BDAG
  rationale: En este contexto de alabanza, κύριος se traduce naturalmente «Señor», siguiendo la convención del proyecto para κύριος y el uso bíblico español más reconocible.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cántenle alabanzas
  alternatives_spanish:
  - canten himnos
  - alábenlo cantando
  lexicon: BDAG
  rationale: ὑμνεῖτε lleva un matiz de canto litúrgico; «cántenle alabanzas» conserva ese componente musical sin sonar forzado en español.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: engrándezcanlo
  alternatives_spanish:
  - exáltenlo grandemente
  - ensálcenlo sobre todo
  lexicon: BDAG
  rationale: El verbo intensifica la exaltación. «Engrándezcanlo» transmite la idea de elevarlo y magnificarlo de manera solemne, en una forma natural para el español litúrgico.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión griega indica perpetuidad. «Por los siglos» es una forma bíblica clara y reverente; mantiene el sentido de duración indefinida sin añadir la repetición enfática de «de los siglos» que el griego aquí no explicita.
theological_decisions:
- issue: Rendering of κύριος in a liturgical Greek context
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: Se mantiene la lectura devocional y bíblica de κύριος como «Señor», que es la equivalencia española estándar en este tipo de himno y no introduce una diferencia doctrinal no sustentada por el texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Scope of ὅσιοι between moral holiness and piety
  english_pob_reading: holy
  chosen_spanish_reading: santos
  alternative_spanish_readings:
  - piadosos
  - devotos
  rationale: «Santos» conserva la tensión entre consagración a Dios y piedad práctica. Aunque «piadosos» o «devotos» son posibles, «santos» funciona mejor como vocativo litúrgico y no debilita el peso religioso del término.
  doctrine_reference: BDAG ὅσιος; project default on sacred register
translation_notes:
  revision_awareness: La versión inglesa auditada no requiere revisiones textuales; se conserva el tono doxológico y la estructura imperativa del griego. La adaptación española busca naturalidad sin perder el paralelismo de bendecir, cantar y exaltar.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al criterio del proyecto.
  - Se evita «Cristo» porque el texto no contiene Χριστός ni un equivalente contextual directo.
  - «Por los siglos» conserva la idea de perpetuidad sin sobretraducir la fórmula griega.
  - El vocativo plural se expresa con «Bendigan / cántenle / engrándezcanlo» para reflejar la pluralidad del imperativo griego.
