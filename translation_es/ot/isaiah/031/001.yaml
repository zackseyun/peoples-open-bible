translation:
  language: es
  text: ¡Ay de los que descienden a Egipto en busca de ayuda, que se apoyan[a] en caballos y confían en carros porque son muchos, y en jinetes porque son muy fuertes[b], pero no miran al Santo de Israel ni buscan a Yahvé[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confían en caballos»; el hebreo presenta la imagen de apoyarse sobre algo para sostenerse.
    reason: lexical_alternative
  - marker: b
    text: O «caballería» para «jinetes».
    reason: lexical_alternative
  - marker: c
    text: Hebreo YHWH, el nombre divino, aquí traducido «Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Ay, desgracia!
  - ¡Ay, aflicción!
  lexicon: HALOT
  rationale: Como interjección profética de denuncia, «¡Ay!» conserva el tono oracular y de lamentación/jucio sin sobrecargar el registro con una explicación añadida.
- source_word: הַיֹּרְדִים
  english_pob_choice: those who go down
  chosen_spanish: los que descienden
  alternatives_spanish:
  - los que van bajando
  - los que bajan
  - los que descienden hacia
  lexicon: HALOT
  rationale: El participio sustantivado pide una expresión de clase de personas. «Descienden» reproduce el movimiento idiomático hacia Egipto y mantiene el valor general/presente del hebreo.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español bíblico y contemporáneo.
- source_word: לְעֶזְרָה
  english_pob_choice: for help
  chosen_spanish: para ayuda
  alternatives_spanish:
  - para socorro
  - en busca de ayuda
  lexicon: HALOT
  rationale: «Para ayuda» conserva la relación de propósito sin desplazar el sentido a una formulación más interpretativa. «Socorro» sería posible, pero «ayuda» es más directo y natural.
- source_word: עַל סוּסִים יִשָּׁעֵנוּ
  english_pob_choice: who rely on horses
  chosen_spanish: que se apoyan en caballos
  alternatives_spanish:
  - que confían en caballos
  - que dependen de caballos
  - que se apoyan en los caballos
  lexicon: HALOT
  rationale: El hebreo usa la imagen física de apoyarse; por eso «se apoyan» preserva mejor la metáfora que «confían» solo. En español, «caballos» mantiene el referente concreto del medio militar.
- source_word: וַיִּבְטְחוּ
  english_pob_choice: trust
  chosen_spanish: confían
  alternatives_spanish:
  - ponen su confianza
  - se fían
  lexicon: HALOT
  rationale: בטח expresa confianza/dependencia. «Confían» es el equivalente más natural y directo en esta construcción de denuncia.
- source_word: עַל רֶכֶב
  english_pob_choice: in chariots
  chosen_spanish: en carros
  alternatives_spanish:
  - en carros de guerra
  - en carrozas
  lexicon: HALOT
  rationale: «רֶכֶב» funciona aquí de modo colectivo y militar. «Carros» transmite el vehículo de guerra sin introducir una perífrasis innecesaria; «carros de guerra» sería más explícito, pero menos sobrio.
- source_word: כִּי רָב
  english_pob_choice: because they are many
  chosen_spanish: porque son muchos
  alternatives_spanish:
  - porque abundan
  - pues son numerosos
  lexicon: HALOT
  rationale: 'Se conserva la razón dada por el texto: la abundancia numérica de los carros. «Son muchos» es la formulación más natural y fiel.'
- source_word: וְעַל פָּרָשִׁים
  english_pob_choice: and in horsemen
  chosen_spanish: y en jinetes
  alternatives_spanish:
  - y en caballería
  - y en hombres a caballo
  lexicon: HALOT
  rationale: «פָּרָשִׁים» son hombres montados; «jinetes» conserva la imagen concreta y evita el término más técnico o colectivo «caballería».
- source_word: כִּי עָצְמ֣וּ מְאֹד
  english_pob_choice: because they are very strong
  chosen_spanish: porque son muy fuertes
  alternatives_spanish:
  - porque son muy poderosos
  - porque se han fortalecido mucho
  - porque son sumamente fuertes
  lexicon: HALOT
  rationale: El verbo עָצַם puede implicar fuerza/poder. «Muy fuertes» encaja con el paralelismo militar y conserva el juicio evaluativo sin forzar el matiz numérico.
- source_word: וְלֹא שָׁעוּ
  english_pob_choice: but do not look to
  chosen_spanish: pero no miran
  alternatives_spanish:
  - pero no prestan atención a
  - pero no vuelven su mirada a
  - pero no consideran
  lexicon: HALOT
  rationale: שׁעה aquí expresa dirigir la mirada/atención. «No miran» mantiene la imagen y funciona bien con el complemento siguiente.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  lexicon: HALOT
  rationale: Título isaiano fijo; «Santo» respeta la forma nominativa del hebreo y la tradición española común, sin diluir el carácter de título divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: DOCTRINE.md contested terms
  rationale: Se sigue el default del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino revelado y evita la sustitución por un título genérico.
theological_decisions:
- issue: Interjección profética de juicio
  english_pob_reading: Woe
  chosen_spanish_reading: ¡Ay!
  alternative_spanish_readings:
  - ¡Ay de!
  - ¡Ay, desgracia!
  rationale: La expresión inicia una denuncia profética. «¡Ay!» comunica el tono de juicio y lamentación sin añadir contenido no presente en el hebreo.
  doctrine_reference: Uso profético de הוֹי en los profetas
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto, de acuerdo con la política del proyecto, en lugar de ocultarlo tras un título impersonal. Esto conserva la tensión teológica entre dependencia humana y búsqueda de Yahvé.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen de apoyo frente a confianza abstracta
  english_pob_reading: rely on horses / trust in chariots / trust in horsemen
  chosen_spanish_reading: se apoyan en caballos / confían en carros / en jinetes
  alternative_spanish_readings:
  - confían en caballos
  - dependen de caballos
  rationale: El hebreo presenta tanto la imagen física de apoyarse como el acto volitivo de confiar. La traducción distingue ambos verbos para no borrar esa tensión semántica.
  doctrine_reference: Antropología bíblica del apoyo indebido en recursos humanos
- issue: Carros y jinetes como recursos militares
  english_pob_reading: chariots ... horsemen
  chosen_spanish_reading: carros ... jinetes
  alternative_spanish_readings:
  - carros de guerra ... caballería
  rationale: «Carros» y «jinetes» conservan la concreción del arsenal y de los combatientes montados sin tecnicismos que desplacen el color del texto.
  doctrine_reference: Contexto histórico-militar de Isaías 31:1
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la secuencia profética, la doble imagen de apoyo/confianza y el nombre divino como Yahvé. Se adoptó «¡Ay!» como equivalente breve de הוֹי, «se apoyan» para conservar la metáfora física de שׁען, y «jinetes» para פָּרָשִׁים, sin introducir una paráfrasis más amplia. No se detectaron cambios posteriores relevantes en la revisión inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Santo de Israel» sigue la terminología isaiana estable.
  - Se distingue entre «se apoyan» y «confían» para reflejar ambos verbos hebreos sin fusionarlos.
  - Se prefiere «caballos», «carros» y «jinetes» por concreción militar y claridad en español.
  - La puntuación reproduce el impulso retórico del oráculo con una apertura exclamativa y una cadencia de contraste final.
