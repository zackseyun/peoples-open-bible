translation:
  language: es
  text: 'Y los jueces, cada uno por su nombre, todos aquellos cuyo corazón no se desvió[a] y que no se apartaron de Dios[b]: que su recuerdo sea para bendición.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «todos los que no alzaron su corazón». El paralelo griego dice: «cuyo corazón no se descarrió», lo que probablemente aclara aquí el sentido pretendido.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «de Dios»; el paralelo griego lee «del Señor». Aquí se conserva la lectura hebrea en el texto principal.
    reason: alternative_reading
lexical_decisions:
- source_word: והשופטים
  english_pob_choice: And the judges
  chosen_spanish: Y los jueces
  alternatives_spanish:
  - Y los magistrados
  - Y los gobernantes
  lexicon: HALOT; apoyo del paralelo griego κριταί
  rationale: «Jueces» corresponde de modo directo al hebreo y al paralelo griego, y conserva el sentido histórico del pasaje sin introducir un matiz institucional ajeno.
- source_word: איש בשמו
  english_pob_choice: each by his own name
  chosen_spanish: cada uno por su nombre
  alternatives_spanish:
  - cada uno en su nombre
  - cada uno con su propio nombre
  lexicon: HALOT; paralelo griego ἕκαστος τῷ αὐτοῦ ὀνόματι
  rationale: La frase mantiene la idea de identificación individual y memoria personal. En español, «por su nombre» suena natural y fiel al giro semítico subyacente.
- source_word: כל אשר לא נשא לבו / οἱ ... ἡ καρδία οὐκ ἐξεπόρνευσεν
  english_pob_choice: all whose hearts were not led astray
  chosen_spanish: todos los de corazón[a]
  alternatives_spanish:
  - todos los que no se desviaron en el corazón
  - todos los cuyo corazón no se apartó
  lexicon: HALOT; griego ὅσων οὐκ ἐξεπόρνευσεν ἡ καρδία
  rationale: El hebreo transmitido es breve y puede sugerir literalmente «no alzó su corazón», mientras que el griego aclara una desviación del corazón. En español se conserva la tensión con una formulación abreviada y se remite la decisión semántica a la nota, evitando sobrecargar el texto principal.
- source_word: ולא נסוג מאחרי אל / οὐκ ἀπεστράφησαν ἀπὸ Κυρίου
  english_pob_choice: and who did not turn away from God
  chosen_spanish: que no se apartaron de Dios[b]
  alternatives_spanish:
  - que no se volvieron atrás de Dios
  - que no se apartaron del Señor
  lexicon: HALOT; paralelo griego Κυρίου
  rationale: El hebreo dice «de Dios», mientras que el griego lee «del Señor». Se conserva el hebreo en el texto principal, con la variante griega explicada en nota por su relevancia textual.
- source_word: יהי זכרם לברכה
  english_pob_choice: may their memory be for blessing
  chosen_spanish: que su recuerdo sea para bendición
  alternatives_spanish:
  - que su memoria sea para bendición
  - bendito sea su recuerdo
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo hebreo en una forma natural para el español y suficientemente solemne, sin sustituirlo por una paráfrasis devocional más libre.
theological_decisions:
- issue: Referencia divina en la cláusula de apartarse
  english_pob_reading: God, with a footnoted Greek alternative 'Lord'
  chosen_spanish_reading: Dios, con variante textual griega 'Señor'
  alternative_spanish_readings:
  - Señor
  rationale: El testimonio hebreo conservado lee אל, por lo que el texto principal sigue «Dios». La lectura griega Κυρίου se preserva como variante relevante, sin borrar la diferencia de testigos.
  doctrine_reference: Primacía del testimonio original; variante textual significativa
- issue: Sentido del corazón en la primera cláusula calificativa
  english_pob_reading: whose hearts were not led astray
  chosen_spanish_reading: todos los de corazón[a]
  alternative_spanish_readings:
  - todos los que no se desviaron en el corazón
  - todos los cuyo corazón no se apartó
  rationale: No se resuelve del todo la ambigüedad entre el hebreo literal («no alzó su corazón») y el griego («no se prostituyó/desvió el corazón»). La redacción española evita fijar prematuramente una única imagen y deja la explicación en la nota.
  doctrine_reference: Preservar la tensión léxica; equivalencia óptima
- issue: Forma idiomática de bendición final
  english_pob_reading: may their memory be for blessing
  chosen_spanish_reading: que su recuerdo sea para bendición
  alternative_spanish_readings:
  - que su memoria sea para bendición
  - bendito sea su recuerdo
  rationale: La fórmula hebrea es un idiomatismo de bendición memorial. «Recuerdo» resulta natural y dignificado en español, sin perder el trasfondo semítico del texto.
  doctrine_reference: Retener idiomática hebrea con español natural
translation_notes:
  revision_awareness: Se corrigió la falla anterior anclando explícitamente las notas con [a] y [b] dentro del texto español. También se mantuvo el apoyo del hebreo como testimonio principal y se dejó visible la variante griega donde afecta el nombre divino y el matiz del corazón.
  spanish_consistency_notes:
  - Se mantiene «Dios» en el texto principal para el hebreo אל, con la variante griega documentada en nota.
  - Se evita «SEÑOR» como sustituto no auditado en el texto principal.
  - Se conserva un registro solemne y publicable, con sintaxis natural para español bíblico contemporáneo.
  - La fórmula final «para bendición» mantiene el idiomatismo hebreo sin añadir interpretación devocional extra.
