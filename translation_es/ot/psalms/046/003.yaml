translation:
  language: es
  text: Por eso no temeremos aunque la tierra cambie[a], aunque los montes se deslicen[b] al corazón de los mares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aunque la tierra sea cambiada» o «cuando la tierra cambie». El verbo hebreo puede denotar cambio o alteración; en este contexto describe la desestabilización de la tierra.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «aunque los montes se tambaleen al corazón de los mares».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La expresión introduce una conclusión lógica a partir del versículo anterior. «Por eso» conserva la relación inferencial con un español natural y digno.
- source_word: לֹא נִירָא
  english_pob_choice: we will not fear
  chosen_spanish: no temeremos
  alternatives_spanish:
  - no tememos
  - no tendremos miedo
  lexicon: HALOT
  rationale: El imperfecto de 1.ª persona plural expresa confianza/decisión. «No temeremos» mantiene mejor ese matiz volitivo que un presente plano.
- source_word: בְּהָמִיר
  english_pob_choice: though ... changes
  chosen_spanish: aunque la tierra cambie
  alternatives_spanish:
  - cuando la tierra cambie
  - aunque la tierra sea alterada
  lexicon: HALOT
  rationale: El verbo puede abarcar cambio o alteración; en este contexto de conmoción cósmica, «cambie» sigue de cerca el texto y deja abierta la idea de inestabilidad sin forzar una interpretación más libre.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el país
  lexicon: HALOT
  rationale: El contexto poético es universal y cósmico, por lo que «la tierra» es más apropiado que «la tierra/país» en sentido territorial.
- source_word: וּבְמוֹט
  english_pob_choice: though ... slip
  chosen_spanish: se deslicen
  alternatives_spanish:
  - tambaleen
  - se tambaleen
  - se muevan
  lexicon: HALOT
  rationale: מוט expresa sacudida, vacilación o desplazamiento de estabilidad. «Se deslicen» comunica la imagen de pérdida de sostén y encaja con el cuadro de montes que se desploman hacia el mar.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: «Montes» es un equivalente natural y poético en español; conserva el registro bíblico sin sonar arcaico.
- source_word: בְּלֵב
  english_pob_choice: into the heart of
  chosen_spanish: hasta el corazón de
  alternatives_spanish:
  - en el corazón de
  - en medio de
  lexicon: HALOT
  rationale: La forma hebrea usa «corazón» como imagen espacial del interior o centro. «Hasta el corazón de» preserva el movimiento direccional y la fuerza figurada.
- source_word: יַמִּים
  english_pob_choice: the seas
  chosen_spanish: los mares
  alternatives_spanish:
  - los mares
  - el mar
  lexicon: HALOT
  rationale: El plural hebreo es explícito y el paralelo poético favorece el plural español. «Mares» mantiene la amplitud cósmica de la escena.
translation_notes:
  revision_awareness: Se siguió de cerca el último ajuste auditado del inglés POB, que prefirió «changes» frente a «gives way» para reflejar más directamente el verbo hebreo. En español se conservó esa cercanía con «cambie», sin perder la imagen poética de cataclismo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó «Señor» y también una paráfrasis explicativa más amplia, para conservar la brevedad y el paralelismo hebreo.
  - Se eligieron formas verbales futuras/volitivas («no temeremos») coherentes con la confianza confesional del hebreo.
