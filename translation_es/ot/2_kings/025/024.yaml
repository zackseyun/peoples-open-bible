translation:
  language: es
  text: 'Gedalías les juró a ellos y a sus hombres[a], y les dijo: «No tengan miedo de los siervos de los caldeos. Vivan en la tierra y sirvan al rey de Babilonia[b], y les irá bien».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los oficiales de los caldeos». El hebreo dice «los siervos de los caldeos», lo que puede referirse a agentes o administradores babilónicos.
    reason: lexical_alternative
  - marker: b
    text: «Caldeos» es el término hebreo; en este contexto también puede traducirse «babilonios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: les juró
  alternatives_spanish:
  - prestó juramento
  - juró solemnemente
  lexicon: HALOT
  rationale: שׁבע en este contexto expresa la acción de jurar o prestar un juramento. «Les juró» es natural en español y conserva el valor verbal directo sin añadir más de lo que el hebreo implica.
- source_word: וּלְאַנְשֵׁיהֶם
  english_pob_choice: and to their men
  chosen_spanish: y a sus hombres
  alternatives_spanish:
  - y a sus hombres de guerra
  - y a sus servidores
  - y a sus acompañantes
  lexicon: HALOT
  rationale: אַנְשֵׁי significa literalmente «hombres de». El contexto puede sugerir retenedores, escoltas o tropas, pero el POB en inglés evita precisar demasiado. «Sus hombres» mantiene esa amplitud y la relación posesiva del hebreo.
- source_word: אַל־תִּירְאוּ
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengan miedo
  alternatives_spanish:
  - No teman
  - No tengan temor
  lexicon: HALOT
  rationale: La negativa imperativa de ירא se expresa con naturalidad en español como «No tengan miedo». Conserva el tono exhortativo y el sentido de desanimar el temor.
- source_word: מֵעַבְדֵי הַכַּשְׂדִּים
  english_pob_choice: of the servants of the Chaldeans
  chosen_spanish: de los siervos de los caldeos
  alternatives_spanish:
  - de los servidores de los caldeos
  - de los funcionarios de los caldeos
  lexicon: HALOT
  rationale: עבדי significa literalmente «siervos de». El POB inglés retiene esa forma y deja abierta la posibilidad de agentes o administradores. «Siervos» preserva la fuerza léxica, mientras que «funcionarios» sería más interpretativo.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: כַּשְׂדִּים se traduce de manera literal como «caldeos». Aunque en este contexto alude al poder babilónico, se mantiene el etnónimo más cercano al hebreo, como hace el texto inglés.
- source_word: שְׁבוּ בָאָרֶץ
  english_pob_choice: Live in the land
  chosen_spanish: Quédense en la tierra
  alternatives_spanish:
  - Permanezcan en la tierra
  - Vivan en la tierra
  lexicon: HALOT
  rationale: ישב puede significar habitar, permanecer o establecerse. En este contexto, «Quédense en la tierra» transmite con claridad la idea de permanecer allí sin forzar una lectura más técnica.
- source_word: וְעִבְדוּ אֶת־מֶלֶךְ בָּבֶל
  english_pob_choice: and serve the king of Babylon
  chosen_spanish: y sirvan al rey de Babilonia
  alternatives_spanish:
  - y sirvan al rey de Babilonia como súbditos
  - y trabajen para el rey de Babilonia
  lexicon: HALOT
  rationale: עבד con objeto personal suele significar «servir». En un marco político, implica sometimiento o lealtad a la autoridad imperial. «Sirvan» conserva la ambigüedad útil entre servicio y sujeción, sin convertirlo en una paráfrasis interpretativa.
- source_word: וְיִטַב לָכֶם
  english_pob_choice: and it will go well for you
  chosen_spanish: y les irá bien
  alternatives_spanish:
  - y les irá bien a ustedes
  - y les resultará bien
  lexicon: HALOT
  rationale: יטב es una expresión impersonal de buen resultado. «Les irá bien» es idiomático en español y reproduce de manera breve la promesa de bienestar.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo de 2 Reyes 25:24 y coincide en sustancia con el borrador inglés auditado. Se mantuvo la terminología etnónima «caldeos», la ambigüedad de אַנְשֵׁי/‘sus hombres’ y el valor de servicio/sujeción de עבד sin explicitar más de lo que la evidencia permite.
  spanish_consistency_notes:
  - Se usó «Gedalías» para el nombre propio, en consonancia con la forma española habitual y la transliteración del hebreo.
  - Se evitó «SEÑOR» para el tetragrámaton porque este versículo no lo contiene.
  - Se prefirió «siervos» y no «funcionarios» en el texto principal para conservar la huella léxica del hebreo, dejando la explicación interpretativa en nota.
  - «Les irá bien» mantiene el carácter impersonal de וְיִטַב לָכֶם sin añadir sujeto explícito.
  - Se empleó puntuación de cita española con comillas angulares y se preservó el tono directo del discurso.
