translation:
  language: es
  text: Porque también Dios[a] aborrece a los malhechores, y a los malvados[b] les pagará con venganza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''Dios también aborrece a los malhechores''; griego: ''el Altísimo aborreció a los pecadores''. La nota mantiene visible la divergencia entre ambos testigos.'
    reason: textual_variant
  - marker: b
    text: El griego dice 'los impíos', donde el hebreo tiene 'los malvados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל / ὁ ὕψιστος
  english_pob_choice: God / the Most High
  chosen_spanish: Dios
  alternatives_spanish:
  - el Altísimo
  - el Dios Altísimo
  lexicon: HALOT / BDAG
  rationale: El hebreo tiene אֵל ('Dios') y el griego paralelo ὁ ὕψιστος ('el Altísimo'). En español, 'Dios' sigue directamente el hebreo y es natural; la nota documenta la variante griega sin imponer un título compuesto que no aparece en el hebreo.
- source_word: שֹׂנֵא / ἐμίσησεν
  english_pob_choice: hates
  chosen_spanish: aborrece
  alternatives_spanish:
  - odia
  - es hostil a
  lexicon: HALOT
  rationale: '''Aborrece'' comunica con fuerza la hostilidad moral del verbo sin sonar tan abrupto como ''odia'' en español culto. Mantiene la intensidad del hebreo y del griego.'
- source_word: רָעִים
  english_pob_choice: evildoers
  chosen_spanish: malhechores
  alternatives_spanish:
  - los malvados
  - los que hacen el mal
  lexicon: HALOT
  rationale: '''Malhechores'' conserva la idea activa de quienes hacen el mal, equivalente a ''evildoers'', y evita confundir este primer grupo con ''los impíos'' del segundo hemistiquio.'
- source_word: לָרְשָׁעִים / τοῖς ἀσεβέσιν
  english_pob_choice: the wicked / the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malvados e impíos
  lexicon: HALOT / BDAG
  rationale: '''Impíos'' refleja bien el griego ἀσεβέσιν (''sin reverencia, impíos'') y mantiene el contraste moral. En español bíblico es claro y no se confunde con el primer hemistiquio.'
- source_word: יָשִׁיב / ἀποδώσει
  english_pob_choice: will repay
  chosen_spanish: les devolverá
  alternatives_spanish:
  - les pagará
  - les retribuirá
  - les pagará de vuelta
  lexicon: HALOT / BDAG
  rationale: El hebreo literalmente es 'hará volver' / 'devolverá'; por eso 'les devolverá' preserva la estructura de retribución. Se añade el objeto 'venganza' para completar el sentido del giro nominal.
- source_word: נָקָם / ἐκδίκησιν
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - retribución
  - castigo vengador
  lexicon: HALOT / BDAG
  rationale: '''Venganza'' es el equivalente más directo y conserva la fuerza advertencial del sustantivo. No se suaviza a ''castigo'' para no perder el matiz retributivo.'
theological_decisions:
- issue: Divergencia textual entre hebreo y griego en el título divino
  english_pob_reading: God / the Most High
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Altísimo
  rationale: Se opta por 'Dios' porque el hebreo base lee אֵל; la lectura griega 'el Altísimo' queda preservada como alternativa documentada. Así se mantiene transparencia textual sin mezclar títulos innecesariamente en el cuerpo principal.
  doctrine_reference: Transparencia textual y prioridad de la fuente original, con documentación de variantes significativas.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail, que prefirió ''God'' para reflejar más directamente el hebreo אֵל, sin perder la variante griega ὁ ὕψιστος documentada en nota. Se evita traducir mecánicamente desde el inglés: se priorizan el hebreo y el griego paralelos y se conservan las tensiones léxicas relevantes.'
  spanish_consistency_notes:
  - Se usa 'Dios' en el cuerpo y no 'SEÑOR' porque el hebreo lee אֵל, no el tetragrámaton.
  - '''Impíos'' se reserva para ἀσεβέσιν y ''malhechores'' para רָעִים, manteniendo la distinción del paralelismo.'
  - '''Venganza'' se conserva por su fuerza retributiva; no se sustituye por un término más débil.'
