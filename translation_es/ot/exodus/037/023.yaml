translation:
  language: es
  text: Hizo sus siete lámparas, sus tenazas[a] y sus braseros[b] de oro puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'despabiladeras'; el término hebreo se refiere a un utensilio de la lámpara usado para manejar las mechas.
    reason: lexical_alternative
  - marker: b
    text: O 'recipientes para brasas'. En este contexto, el término probablemente se refiere a pequeños receptáculos o bandejas asociados con el candelabro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El verbo wayyiqtol de עשה se vierte naturalmente con pretérito simple en español. Se omite la conjunción explícita para conservar fluidez narrativa, como en la decisión inglesa auditable.
- source_word: נֵרֹתֶיהָ
  english_pob_choice: its seven lamps
  chosen_spanish: sus siete lámparas
  alternatives_spanish:
  - sus lámparas, siete
  - las siete lámparas de ella
  lexicon: HALOT
  rationale: נֵרֹת son lámparas, no candelabros. El sufijo femenino singular retoma el candelabro del contexto; en español, 'sus' expresa esa relación sin forzar una posesión literal.
- source_word: שִׁבְעָה
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete en número
  lexicon: HALOT
  rationale: Número cardinal ordinario que modifica 'lámparas'. En español se antepone de forma natural al sustantivo.
- source_word: מַלְקָחֶיהָ
  english_pob_choice: its tongs
  chosen_spanish: sus tenazas
  alternatives_spanish:
  - sus snuffers
  - sus pinzas para las mechas
  lexicon: HALOT
  rationale: La raíz designa un utensilio para manipular las lámparas; 'tenazas' es la traducción más transparente y amplia en español. 'Pinzas para las mechas' sería más explicativa pero más interpretativa.
- source_word: מַחְתֹּתֶיהָ
  english_pob_choice: its firepans
  chosen_spanish: sus incensarios
  alternatives_spanish:
  - sus braseros
  - sus recipientes de fuego
  lexicon: HALOT
  rationale: Siguiendo la decisión inglesa de 'firepans' y el contexto del mobiliario del candelabro, 'incensarios' comunica un recipiente metálico para brasas/fuego en español bíblico-readable. Se conserva cierta tensión léxica, porque el término puede referir a un pequeño recipiente o bandeja asociada con las lámparas.
- source_word: זָהָב טָהוֹר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro fino
  - de oro purísimo
  lexicon: HALOT
  rationale: La frase material se vierte con la construcción idiomática española 'de oro puro', que transmite composición y pureza con claridad y sin sobreinterpretar.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió 'trays' a 'firepans' para reflejar mejor מַחְתֹּתֶיהָ. La redacción española sigue esa revisión, pero opta por 'incensarios' por ser el equivalente bíblico más natural y comprensible en español, manteniendo en nota la amplitud semántica del término.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí porque el versículo no contiene el nombre divino.
  - 'Se preserva el paralelo coordinado de la lista: lámparas, tenazas e incensarios.'
  - Se evita 'candelero' en el texto principal porque el sustantivo hebreo del versículo se refiere a sus piezas, no al objeto completo.
