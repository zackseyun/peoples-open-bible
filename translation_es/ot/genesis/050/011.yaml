  text: וַ/יַּ֡רְא יוֹשֵׁב֩ הָ/אָ֨רֶץ הַֽ/כְּנַעֲנִ֜י אֶת הָ/אֵ֗בֶל בְּ/גֹ֨רֶן֙ הָֽאָטָ֔ד וַ/יֹּ֣אמְר֔וּ אֵֽבֶל כָּבֵ֥ד זֶ֖ה לְ/מִצְרָ֑יִם עַל כֵּ֞ן קָרָ֤א שְׁמָ/הּ֙ אָבֵ֣ל מִצְרַ֔יִם אֲשֶׁ֖ר בְּ/עֵ֥בֶר הַ/יַּרְדֵּֽן־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/050/011.yaml
  text: When the inhabitants of the land[a], the Canaanites, saw the mourning at the threshing floor of Atad, they said, “This is a grievous mourning for the Egyptians.” Therefore it was named Abel-mizraim[c][b], which is beyond the Jordan.
  footnotes:
  - marker: a
    text: Abel-mizraim sounds like 'mourning of Egypt,' reflecting the Canaanites’ description of the event.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the Jordan'; the expression is geographically perspective-dependent.
    reason: lexical_alternative
  - marker: c
    text: Or 'the inhabitants of the land, the Canaanites'.
    reason: previous_rendering
