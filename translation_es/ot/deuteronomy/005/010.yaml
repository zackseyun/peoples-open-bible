translation:
  language: es
  text: pero mostrando amor leal a miles[a], a los que me aman y guardan sus mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos y traducciones leen «mis mandamientos», lo cual encaja con el discurso en primera persona del contexto; el hebreo proporcionado aquí dice «sus mandamientos».
    reason: textual_variant
lexical_decisions:
- source_word: וְעֹשֶׂה
  english_pob_choice: but showing
  chosen_spanish: pero mostrando
  alternatives_spanish:
  - y mostrando
  - y haciendo
  lexicon: HALOT
  rationale: El participio expresa una acción continua en contraste con la frase anterior; en español, «pero mostrando» conserva el matiz adversativo del contexto y la idea de acción en curso sin volverlo más explicativo de lo que permite el hebreo.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - amor constante
  - lealtad de pacto
  - misericordia
  lexicon: HALOT
  rationale: חֶסֶד incluye lealtad de pacto, fidelidad y amor comprometido. «Amor leal» comunica bien esa carga relacional en español sin reducirlo a mera emoción ni a «misericordia» solamente.
- source_word: לַאֲלָפִים
  english_pob_choice: to thousands
  chosen_spanish: a miles
  alternatives_spanish:
  - para miles
  - a millares
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a/para miles» sin añadir «de generaciones». En español, «a miles» mantiene la forma breve del texto y evita importar una expansión que no está aquí.
- source_word: לְאֹהֲבַי
  english_pob_choice: to those who love me
  chosen_spanish: a los que me aman
  alternatives_spanish:
  - a mis amantes
  - a quienes me aman
  lexicon: HALOT
  rationale: El participio con sufijo de primera persona funciona naturalmente como relativa. «A los que me aman» es idiomático en español y preserva el sentido relacional continuo.
- source_word: וּלְשֹׁמְרֵי
  english_pob_choice: and keep
  chosen_spanish: y guardan
  alternatives_spanish:
  - y observan
  - y cumplen
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, observar o custodiar. Con «mandamientos», «guardan» expresa de modo natural la obediencia fiel sin perder el valor de vigilancia/cuidado del verbo.
- source_word: מִצְוֹתָו
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - sus mandamientos
  - mis órdenes
  lexicon: HALOT
  rationale: Aunque el paquete hebreo suministrado refleja una forma que puede leerse como «sus mandamientos», el contexto inmediato de primera persona y la revisión auditada favorecen «mis mandamientos». En español, la concordancia con la voz divina del pasaje es esencial y está respaldada por la tradición textual señalada en la auditoría.
theological_decisions:
- issue: Sufijo posesivo en «mandamientos»
  english_pob_reading: my commandments
  chosen_spanish_reading: mis mandamientos
  alternative_spanish_readings:
  - sus mandamientos
  rationale: La auditoría inglesa registró la tensión textual, pero la revisión más reciente corrigió la lectura para armonizar con la primera persona del discurso. Por eso el español adopta «mis mandamientos» sin nota de variante adicional, manteniendo la coherencia contextual del hablante divino.
  doctrine_reference: Principio de primacía del original y de la lectura contextual coherente en la edición POB.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una lectura inicial «his commandments» a la revisión final «my commandments». Para el español, se siguió la revisión más reciente y coherente con el contexto de primera persona, mientras se conservó la nota de variante textual porque el paquete hebreo suministrado todavía permite una tensión documentada en torno al sufijo posesivo.
  spanish_consistency_notes:
  - Se evitó «Señor» porque el texto no contiene יהוה en este versículo.
  - Se prefirió «amor leal» como equivalente de חֶסֶד para mantener la fuerza pactal sin cargarlo solo con «misericordia».
  - «Guardar» se usó para שׁמר por su naturalidad bíblica y su capacidad de incluir observancia fiel.
  - La nota al pie usa el marcador [a] en el término «miles[a]» para reflejar la variante textual documentada.
