translation:
  language: es
  text: Y tú les diste esta tierra[a], que juraste dar a sus padres, una tierra que mana leche y miel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a sus antepasados». El hebreo dice «a sus padres», refiriéndose a los antepasados o patriarcas de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  english_pob_choice: And you gave
  chosen_spanish: Y tú les diste
  alternatives_spanish:
  - Y les diste
  - Y tú les concediste
  lexicon: HALOT
  rationale: El verbo נתן se expresa con el pasado simple «diste», y se conserva el sujeto en segunda persona con «tú» para reflejar el адресo directo a Dios del contexto oracional. «Concediste» sería posible, pero «diste» reproduce mejor la fuerza básica del verbo y el paralelismo del texto hebreo.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra
  - este país
  lexicon: HALOT
  rationale: En contexto de promesa territorial, אֶרֶץ se vierte naturalmente como «tierra». «País» sonaría más moderno-político y menos bíblico; «esta tierra» conserva la proximidad demostrativa del hebreo.
- source_word: אֲשֶׁר נִשְׁבַּעְתָּ
  english_pob_choice: which you swore
  chosen_spanish: que juraste
  alternatives_spanish:
  - que prometiste con juramento
  - que habías jurado
  lexicon: HALOT
  rationale: נשבע expresa lenguaje de juramento; «juraste» conserva la fuerza pactual mejor que «prometiste». El relativo «que» funciona de modo natural en español y mantiene la relación con la cláusula anterior.
- source_word: לַאֲבוֹתָם
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus patriarcas
  lexicon: HALOT
  rationale: Se conserva el término familiar masculino del hebreo con «padres». «Antepasados» neutraliza el término explícito del original; «patriarcas» explica el referente, pero añade un nivel interpretativo que el versículo no formula directamente.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give them
  chosen_spanish: darles
  alternatives_spanish:
  - a darles
  - para dársela
  lexicon: HALOT
  rationale: El infinitivo con ל expresa el contenido del juramento; en español, «darles» transmite con naturalidad la misma idea sin redundancia. Se mantiene la repetición semántica de נתן por medio de «diste» / «darles».
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: tierra que fluye leche y miel
  alternatives_spanish:
  - tierra que mana leche y miel
  - una tierra que fluye leche y miel
  lexicon: HALOT
  rationale: La imagen idiomática de abundancia se conserva de forma directa. «Fluye» sigue el audit trail inglés y permite mantener la metáfora bíblica clásica sin explicarla ni suavizarla.
theological_decisions:
- issue: Tratamiento del lenguaje patriarcal en la fórmula de pacto
  english_pob_reading: their fathers
  chosen_spanish_reading: a sus padres
  alternative_spanish_readings:
  - a sus antepasados
  - a sus patriarcas
  rationale: El hebreo usa explícitamente el término masculino אבות. Por fidelidad al texto y en línea con la política de precisión de género, se conserva «padres» en lugar de neutralizar el referente. El contexto deja claro que alude a los antepasados de Israel.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over gender-neutral)'
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés, sin cambios de revisión necesarios respecto de la lectura aprobada. Se preservan el juramento pactual, el referente patriarcal y la metáfora de abundancia agrícola.
  spanish_consistency_notes:
  - Se mantiene «tierra» para אֶרֶץ en coherencia con el uso bíblico territorial.
  - Se conserva «juraste» para נשבע, evitando diluir el lenguaje de juramento en simple promesa.
  - La secuencia verbal «diste» / «darles» reproduce la repetición de נתן sin sonar forzada en español.
  - Se opta por un español moderno y reverente, evitando arcaísmos innecesarios.
