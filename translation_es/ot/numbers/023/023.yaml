    text: O «contra Jacob»; el hebreo puede entenderse de más de una manera, aunque el contexto favorece una lectura de oposición.
    reason: alternative_reading
  - marker: b
    text: 'Traducción tradicional: «¡Lo que Dios ha obrado!»'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota b para que coincida con la alternativa tradicional documentada en el expediente inglés y se reubica su anclaje en la cláusula final correspondiente. Además, se ajusta la exclamación a una formulación más idiomática en español («¡Lo que Dios ha hecho!») sin alterar el sentido exclamativo ni el contenido semántico del hebreo.
