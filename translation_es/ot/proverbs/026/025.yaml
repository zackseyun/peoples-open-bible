    issue: La nota [b] no corresponde a la nota documentada en la auditoría inglesa.
    rationale: La POB inglesa usa la nota b para explicar que ‘siete’ probablemente comunica plenitud o totalidad en estilo sapiencial, aunque se conserva el número. El borrador español reemplaza eso por alternativas para ‘no confíes en él’, alterando el rastro de auditoría.
  - severity: low
    issue: La nota [a] omite las alternativas contextuales preservadas en inglés.
    rationale: La nota inglesa ofrece ‘Cuando habla amablemente’ o ‘Cuando hace que suene amable’ además del literal. La nota española actual enfatiza solo la literalidad. No es grave, pero puede mejorarse para reflejar mejor la decisión léxica auditada.
