  rationale: El versículo no contiene el nombre divino ni una fórmula que requiera decisión doctrinal o terminológica adicional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La auditoría inglesa mantiene una única nota alternativa para וַיֵּט, con alta concordancia y sin revisiones aplicadas. La versión española conserva esa alternativa en nota, sin introducir cambios de sentido ni amplificar el texto.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con español moderno y claro.
  - «Territorio» se usa para גְּבוּל siguiendo el valor contextual de control territorial, no solo el de línea fronteriza.
  - «Se apartó de él» conserva el movimiento de alejamiento sin añadir información interpretativa.
