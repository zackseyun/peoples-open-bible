revisions:
- from: 'Y en aquel día dio una señal[a], diciendo: «Esta es la señal que Yahvé ha hablado: miren, el altar será partido[b], y la ceniza que está sobre él será derramada».'
  to: 'Y en aquel día dio una señal[a], diciendo: «Esta es la señal que Yahvé ha hablado: he aquí, el altar será desgarrado, y la ceniza[b] que está sobre él será derramada».'
  rationale: Se ajusta הִנֵּה a ‘he aquí’ para conservar mejor la fuerza deíctica y el tono profético sin añadir un imperativo plural. Se cambia ‘será partido’ por ‘será desgarrado’ para reflejar mejor נִקְרָע. Se mueve la nota cultural al sustantivo ‘ceniza’, que es el término explicado por la nota.
  reviewer_model: gpt-5.4
