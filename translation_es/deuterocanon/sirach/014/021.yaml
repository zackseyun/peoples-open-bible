translation:
  language: es
  text: El que pone su corazón en sus caminos y considera sus percepciones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y hallará entendimiento en sus cosas ocultas» o «en sus secretos». El hebreo dice «sus entendimientos/percepciones», y esa lectura se sigue en el texto principal.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַשָּׂם
  english_pob_choice: He who sets
  chosen_spanish: El que pone
  alternatives_spanish:
  - Quien pone
  - El que dirige
  lexicon: HALOT
  rationale: El participio sustantivado expresa a una persona definida por su acción. «El que pone» conserva el valor singular masculino implícito y suena natural en español bíblico contemporáneo.
- source_word: עַל דְרָכֶיהַ לִבּוֹ
  english_pob_choice: his heart on her ways
  chosen_spanish: su corazón en sus caminos
  alternatives_spanish:
  - su mente en sus caminos
  - su corazón sobre sus caminos
  lexicon: HALOT
  rationale: «Corazón» mantiene el alcance hebreo de לב como sede de intención y pensamiento. «Caminos» traduce bien דרכים; en español, «en» es la preposición más natural para este giro.
- source_word: וּבִתְבוּנֹתֶיהַ
  english_pob_choice: and considers her insights
  chosen_spanish: y considera sus entendimientos
  alternatives_spanish:
  - y medita en sus entendimientos
  - y considera sus discernimientos
  - y reflexiona sobre sus entendimientos
  lexicon: HALOT
  rationale: El hebreo apunta a תבונותיה, «sus entendimientos/insights». Conservé la raíz de «entendimiento» para no perder el matiz cognitivo; «sus» mantiene la personificación femenina de la sabiduría.
- source_word: יִתְבּוֹנָן
  english_pob_choice: considers
  chosen_spanish: considera
  alternatives_spanish:
  - medita
  - reflexiona
  - discierne
  lexicon: HALOT
  rationale: El hitpael de בון comunica atención reflexiva y comprensión. «Considera» es idiomático, breve y suficientemente contemplativo sin sobreinterpretar.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: her ways / her insights
  chosen_spanish_reading: sus caminos / sus entendimientos
  alternative_spanish_readings:
  - sus caminos / sus secretos
  - sus caminos / sus revelaciones
  rationale: Tanto el hebreo como el griego presentan la sabiduría con formas femeninas. Mantener «sus» preserva la personificación literaria y teológica; no conviene neutralizarla con un sujeto impersonal.
  doctrine_reference: Translation philosophy §§3, 4, 5
- issue: Participio sustantivado masculino singular
  english_pob_reading: He who sets
  chosen_spanish_reading: El que pone
  alternative_spanish_readings:
  - Quien pone
  - El que pone su corazón
  rationale: El hebreo usa un participio masculino singular sustantivado. «El que» refleja ese valor sin imponer una lectura exclusivamente genérica ni perder la forma singular del original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés auditado eliminó una coma innecesaria en una revisión posterior para mayor fluidez. En español no se requiere pausa interna fuerte, por lo que se mantiene una sola coordinación fluida con el mismo contenido semántico del testimonio hebreo principal y la variante griega en nota.
  spanish_consistency_notes:
  - Se conserva el pronombre posesivo femenino «sus» para reflejar la personificación de la sabiduría.
  - «Entendimientos» sigue de cerca el hebreo תבונותיה y evita sustituirlo por un término más interpretativo como «secretos» en el texto principal.
  - La nota al pie recoge la variante griega sin desplazar la lectura hebrea principal.
