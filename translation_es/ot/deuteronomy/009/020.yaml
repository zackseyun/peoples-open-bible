translation:
  language: es
  text: Yahvé se enojó mucho con Aarón[a], para destruirlo; y yo también oré por Aarón en aquel tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra Aarón»; la preposición hebrea puede verterse de ambas maneras en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto y no se sustituye por un título. «Yahvé» es el equivalente español coherente con la decisión auditada del inglés POB.
- source_word: הִתְאַנַּף
  english_pob_choice: was very angry
  chosen_spanish: se enojó mucho
  alternatives_spanish:
  - se airó mucho
  - se enfureció
  lexicon: HALOT
  rationale: El hitpael expresa enojo/enfurecimiento. «Se enojó mucho» comunica bien la fuerza del verbo y encaja de forma natural con el intensificador מְאֹד.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - sumamente
  lexicon: HALOT
  rationale: El adverbio intensifica el enojo. En español, «mucho» transmite esa intensificación de manera natural y sobria.
- source_word: לְהַשְׁמִידוֹ
  english_pob_choice: to destroy him
  chosen_spanish: para destruirlo
  alternatives_spanish:
  - para aniquilarlo
  - para borrarlo
  lexicon: HALOT
  rationale: El infinitivo hifil de שׁמד expresa destrucción. «Destruirlo» mantiene la severidad sin añadir más especificación de la que da el hebreo.
- source_word: וָאֶתְפַּלֵּל
  english_pob_choice: and I prayed
  chosen_spanish: y yo también oré
  alternatives_spanish:
  - e intercedí
  - y también rogué
  lexicon: HALOT
  rationale: El verbo puede significar «orar» y el contexto muestra intercesión. «Oré» preserva la forma verbal, mientras que «también» refleja el גַּם del hebreo.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: Añade la idea de que Moisés oró por Aarón además de otras intercesiones implícitas en el contexto inmediato. «También» es la opción más natural.
- source_word: בְּעַד
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - a favor de
  lexicon: HALOT
  rationale: En contexto de oración, la preposición expresa intercesión. En español, «por» comunica de manera directa y natural el sentido de favor/intercesión.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese mismo tiempo
  - entonces
  lexicon: HALOT
  rationale: La expresión temporal remite al episodio narrado. «En aquel tiempo» conserva el valor anafórico y el registro bíblico sin sonar arcaico en exceso.
theological_decisions:
- issue: Referencia al nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre divino personal, conforme a la política auditada del POB, para no ocultar el Tetragrama tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado en inglés: se mantiene la secuencia causal, el nombre divino como Yahvé, la intensificación del enojo, la destrucción como objetivo y la oración intercesora de Moisés por Aarón, sin añadir elementos no presentes en el hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «orar» en lugar de «interceder» para conservar el verbo del original y dejar la intercesión implícita en el contexto.
  - «En aquel tiempo» mantiene el anclaje temporal sin forzar una paráfrasis.
  - La nota textual sobre «con/contra Aarón» se conserva porque la preposición hebrea admite esa oscilación semántica.
