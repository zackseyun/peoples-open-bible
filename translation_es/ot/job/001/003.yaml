review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el inventario ganadero y conserva correctamente ''ovejas'', ''camellos'', ''yuntas de bueyes'' y ''asnas''. También mantiene el modismo ''hijos de oriente''. Sin embargo, dos puntos necesitan ajuste para alinearse mejor con el hebreo y con la auditoría inglesa: (1) מִקְנֵהוּ se expresa mejor como posesión explícita (''Sus posesiones ganaderas eran...'') que con el simple ''Tenía'', ya que el hebreo tematiza los bienes; y (2) עֲבֻדָּה רַבָּה מְאֹד no queda bien representado por ''una casa muy grande'', porque en español ''casa'' se oye primariamente como edificio y no como establecimiento doméstico, aun con nota. Conviene una formulación que exprese el conjunto doméstico/servidumbre sin reducirlo demasiado.'
  spanish_quality_summary: El español es generalmente claro, pero 'más grande que todos' suena menos idiomático para estatus o prominencia que 'más importante que todos'. Además, 'casa' introduce ambigüedad innecesaria y requiere una nota explicativa demasiado pesada. Una redacción más natural y fiel sería 'una servidumbre muy numerosa' o 'una casa servil/servidumbre muy numerosa'; entre ellas, 'servidumbre muy numerosa' es clara y digna, aunque algo más estrecha que el inglés revisado. 'Sus posesiones ganaderas eran...' mejora el arranque del versículo.
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé/Mesías. El borrador sí sigue adecuadamente las decisiones léxicas auditadas para צֹאן, גְמַלִּים, צֶמֶד בָּקָר y אֲתוֹנוֹת. La principal desviación es עֲבֻדָּה רַבָּה מְאֹד: la auditoría inglesa terminó en ''a very large household'', pero en español ''casa'' no preserva bien esa amplitud semántica. También ''más grande'' es demasiado literal para גָּדוֹל en este contexto comparativo de prestigio.'
  issues:
  - severity: medium
    issue: מִקְנֵהוּ quedó diluido en 'Tenía'
    rationale: Aunque no es incorrecto, el hebreo presenta sus bienes/ganado como sujeto temático. En español conviene explicitar 'sus posesiones ganaderas' o similar para reflejar mejor la estructura y el sentido.
  - severity: high
    issue: '''una casa muy grande'' no comunica bien עֲבֻדָּה רַבָּה מְאֹד'
    rationale: En español contemporáneo 'casa' se entiende ante todo como edificio o familia inmediata. El hebreo aquí apunta al establecimiento doméstico/servidumbre abundante. La nota no compensa del todo la lectura principal engañosa.
  - severity: medium
    issue: '''más grande que todos'' suena poco idiomático para rango social'
    rationale: גָּדוֹל en esta comparación expresa superioridad en importancia, riqueza o prominencia. 'Más importante que todos' o 'más prominente que todos' comunica mejor el sentido en español.
  revised_spanish_text: Sus posesiones ganaderas eran siete mil ovejas[a], tres mil camellos, quinientas yuntas de bueyes, quinientas asnas y una servidumbre muy numerosa; y aquel hombre era más importante que todos los hijos de oriente[b].
  revised_footnotes:
  - marker: a
    text: ‘Ovejas’ sigue la enumeración de animales; el hebreo צֹאן puede abarcar también ganado menor en general.
    reason: lexical_alternative
  - marker: b
    text: O también ‘la gente de oriente’ o ‘los orientales’.
    reason: lexical_alternative
  revision_rationale: Se reemplazó 'Tenía' por 'Sus posesiones ganaderas eran' para reflejar mejor מִקְנֵהוּ. Se cambió 'una casa muy grande' por 'una servidumbre muy numerosa' para evitar la ambigüedad de 'casa' en español y comunicar mejor el establecimiento doméstico de Job; aunque es algo más específico que el inglés 'household', es más natural y menos equívoco. Se ajustó 'más grande' a 'más importante' para expresar mejor el valor comparativo de estatus en גָּדוֹל. Se añadió la nota inglesa sobre 'hijos de oriente' como alternativa de lectura más natural.
