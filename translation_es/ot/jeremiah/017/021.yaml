base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/017/021.yaml
  text: 'Thus says Yahweh: Take care for yourselves[b][a], and do not carry a load on the Sabbath day or bring it in through the gates of Jerusalem.'
  footnotes:
  - marker: a
    text: Or 'Take care for your lives' / 'Take heed to yourselves.' The Hebrew idiom literally involves 'your souls/lives' and expresses careful self-watchfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'burden' instead of 'load.' Here the sense is likely a physical item being transported on the Sabbath.
    reason: lexical_alternative
