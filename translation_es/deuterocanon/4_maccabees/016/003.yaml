translation:
  language: es
  text: Y los leones alrededor de Daniel no eran tan feroces[a], ni el horno en llamas de Misael con su fuego más violento, como la propia naturaleza de aquella madre se inflamaba por amor a sus hijos al ver a sus siete hijos torturados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ardía con más violencia por amor a sus hijos». El verbo griego usa imaginería de fuego para el sufrimiento interior de la madre.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ περὶ Δανιὴλ λέοντες
  english_pob_choice: the lions around Daniel
  chosen_spanish: los leones alrededor de Daniel
  alternatives_spanish:
  - los leones de Daniel
  - los leones en torno a Daniel
  lexicon: LSJ
  rationale: La construcción οἱ περὶ + acusativo/nombre indica los leones vinculados con el episodio de Daniel. «Alrededor de Daniel» conserva el giro relacional sin volverse artificial en español.
- source_word: ἄγριοι
  english_pob_choice: savage
  chosen_spanish: feroces
  alternatives_spanish:
  - salvajes
  - salvajes y fieros
  - fieros
  lexicon: LSJ
  rationale: «Feroces» transmite bien la idea de brutalidad peligrosa y funciona naturalmente con leones en español. «Salvajes» puede sonar más genérico y «fieros» es posible, pero aquí queda un poco menos preciso.
- source_word: Μισαὴλ
  english_pob_choice: Mishael
  chosen_spanish: Misael
  alternatives_spanish:
  - Mishael
  lexicon: convención onomástica
  rationale: Se usa la forma española habitual del nombre bíblico, sin alterar la referencia al joven del relato.
- source_word: ἐκφλεγομένη κάμινος
  english_pob_choice: the blazing furnace
  chosen_spanish: el horno encendido
  alternatives_spanish:
  - el horno ardiente
  - el horno en llamas
  lexicon: LSJ
  rationale: La imagen participial expresa un horno en plena combustión. «Encendido» es claro y conserva la acción de arder; «ardiente» también sería posible, pero puede sonar más estático.
- source_word: λαβροτάτῳ πυρί
  english_pob_choice: with its fiercest fire
  chosen_spanish: con su fuego más violento
  alternatives_spanish:
  - con su fuego más feroz
  - con su fuego más intenso
  lexicon: LSJ
  rationale: El superlativo intensifica el fuego del horno. «Más violento» preserva la fuerza extrema del griego y mantiene el contraste retórico con los leones.
- source_word: φιλοτεκνίας
  english_pob_choice: love for her children
  chosen_spanish: amor a sus hijos
  alternatives_spanish:
  - amor maternal
  - afecto por sus hijos
  lexicon: LSJ
  rationale: El sustantivo denota amor/afecto por los hijos. «Amor a sus hijos» es directo y no añade matices no garantizados por el griego.
- source_word: πειράλειεν
  english_pob_choice: was being inflamed
  chosen_spanish: inflamada
  alternatives_spanish:
  - estaba siendo inflamada
  - ardía
  lexicon: LSJ
  rationale: El verbo conserva imaginería de fuego aplicada interiormente. En español, la pasiva perifrástica sería pesada; «inflamada» mantiene el matiz metafórico y la fuerza aspectual dentro de la frase.
- source_word: ἐκείνη φύσις
  english_pob_choice: that mother's own nature
  chosen_spanish: aquella misma naturaleza de la madre
  alternatives_spanish:
  - aquella naturaleza
  - su propia naturaleza
  lexicon: LSJ
  rationale: El demostrativo con φύσις apunta al ser/naturaleza de la madre. «Aquella misma naturaleza de la madre» deja explícito el referente sin borrar la literalidad del giro.
- source_word: ὁρῶσα
  english_pob_choice: when she saw
  chosen_spanish: cuando veía
  alternatives_spanish:
  - al ver
  - cuando vio
  lexicon: LSJ
  rationale: El participio temporal-circunstancial admite un imperfecto en español para dar continuidad a la escena. «Cuando veía» conserva la simultaneidad con la pasión interna descrita.
- source_word: βασανιζομένους
  english_pob_choice: being tortured
  chosen_spanish: siendo torturados
  alternatives_spanish:
  - siendo atormentados
  - mientras eran torturados
  lexicon: LSJ
  rationale: En este contexto martirial βασανίζω significa tortura. «Siendo torturados» es la forma más directa y fiel en español.
theological_decisions:
- issue: Metáfora del fuego para el estado interno de la madre
  english_pob_reading: Retain the fire metaphor ('was being inflamed') rather than reduce it to emotional distress alone.
  chosen_spanish_reading: Conservar la metáfora del fuego («inflamada») en vez de convertirla solo en angustia o dolor emocional.
  alternative_spanish_readings:
  - estaba muy angustiada
  - era conmovida profundamente
  - ardía de dolor
  rationale: El versículo compara explícitamente la ferocidad de los leones y el horno con la experiencia interna de la madre. Mantener el lenguaje de incendio preserva la retórica y no aplana el contraste del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó el orden de la cláusula final para una lectura más natural y mantuvo la imagen de fuego interior. La redacción española sigue esa revisión: coloca primero la comparación con leones y horno, y luego la reacción interna de la madre con metáfora de incendio, sin neutralizarla en un simple estado emocional.'
  spanish_consistency_notes:
  - Se mantiene «Misael» como forma española estable del nombre.
  - Se conservó la imaginería de fuego en «inflamada» por coherencia con el griego y con la decisión auditada en inglés.
  - «Siendo torturados» refleja el valor martirial del verbo sin introducir un matiz de mera prueba o aflicción general.
  - La estructura de comparación «ni... como...» reproduce la fuerza retórica del paralelo entre amenazas externas y dolor materno.
