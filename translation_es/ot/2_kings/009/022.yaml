base_translation:
  language: en
  yaml_path: translation/ot/2_kings/009/022.yaml
  text: And it happened[a], when Jehoram saw Jehu, that he said, “Is it peace, Jehu?” And he said, “What peace can there be[b], so long as the prostitutions of Jezebel your mother and her many sorceries continue?”
  footnotes:
  - marker: a
    text: Or 'the whorings of Jezebel your mother.' The Hebrew term can carry both literal and figurative overtones, including moral and cultic unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'What peace?' The Hebrew repeats 'peace' from Jehoram's question for rhetorical effect.
    reason: lexical_alternative
