translation:
  language: es
  text: Pero él, siendo compasivo, hizo expiación[a] por la iniquidad y no destruyó; muchas veces hizo volver su ira y no desató todo su furor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perdonó la iniquidad». El verbo hebreo es el término habitual para hacer expiación, por eso el texto principal conserva ese peso teológico.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַחוּם
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - lleno de compasión
  lexicon: HALOT
  rationale: רַחוּם describe un carácter de compasión activa y misericordiosa. «Compasivo» es natural en español moderno y conserva el valor adjetival sin volverlo perifrástico.
- source_word: יְכַפֵּר
  english_pob_choice: made atonement for
  chosen_spanish: hizo expiación por
  alternatives_spanish:
  - hizo propiciación por
  - perdonó
  lexicon: HALOT
  rationale: כפר en piel mantiene el peso cultual y teológico de la expiación. «Hizo expiación por» preserva ese peso mejor que «perdonó», que sería una simplificación, y evita imponer más de lo que el verbo dice.
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» corresponde bien a עָוֺן y conserva el tono moral/jurídico del término. También encaja naturalmente con «hizo expiación por».
- source_word: יַשְׁחִית
  english_pob_choice: destroy
  chosen_spanish: destruyó
  alternatives_spanish:
  - arruinó
  - llevó a la ruina
  lexicon: HALOT
  rationale: El hiphil de שׁחת aquí señala acción destructiva. En español, «destruyó» es claro, directo y suficientemente fuerte para reflejar el juicio destruido que se niega en el verso.
- source_word: וְהִרְבָּה
  english_pob_choice: he often
  chosen_spanish: muchas veces
  alternatives_spanish:
  - a menudo
  - repetidamente
  lexicon: HALOT
  rationale: La construcción verbal indica reiteración. «Muchas veces» transmite con naturalidad la frecuencia reiterada que la POB inglesa expresó con «he often».
- source_word: לְהָשִׁיב אַפּוֹ
  english_pob_choice: turned back his anger
  chosen_spanish: volvió atrás su ira
  alternatives_spanish:
  - contuvo su ira
  - apartó su ira
  lexicon: HALOT
  rationale: Literalmente la frase expresa el giro/retroceso de la ira. «Volvió atrás su ira» conserva la imagen de reversión sin suavizarla demasiado; «ira» mantiene el sentido idiomático de אַף.
- source_word: יָעִיר
  english_pob_choice: stir up
  chosen_spanish: despertó
  alternatives_spanish:
  - incitó
  - excitó
  lexicon: HALOT
  rationale: Con objeto como «furor», el verbo de עור funciona como «despertar/avivar». «Despertó» comunica de manera natural la idea de no avivar la ira final.
- source_word: כָּל חֲמָתוֹ
  english_pob_choice: all his wrath
  chosen_spanish: todo su furor
  alternatives_spanish:
  - toda su ira
  - su furor completo
  lexicon: HALOT
  rationale: חֲמָה puede ser «ira» o «furor». Aquí «furor» refleja mejor la intensidad del término; «todo» conserva כָּל, indicando la plenitud no despertada.
theological_decisions:
- issue: כפר with עָוֺן in a poetic historical setting
  english_pob_reading: made atonement for iniquity
  chosen_spanish_reading: hizo expiación por la iniquidad
  alternative_spanish_readings:
  - perdonó la iniquidad
  - hizo propiciación por la iniquidad
  rationale: La elección conserva la carga teológica del verbo כפר tal como la POB inglesa la preservó con «made atonement». En español, «hizo expiación por» mantiene el peso cultual sin reducir el sentido a un simple perdón. Se deja abierta la tensión entre expiación y perdón, en vez de borrar una de las dos dimensiones.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Intensidad final de חֲמָה
  english_pob_reading: all his wrath
  chosen_spanish_reading: todo su furor
  alternative_spanish_readings:
  - toda su ira
  - toda su indignación
  rationale: «Furor» expresa mejor la intensidad de חֲמָה en este contexto poético. No se elimina la idea de ira divina, sino que se conserva su fuerza máxima al final del verso.
  doctrine_reference: Poetic register and divine-attributes rendering
translation_notes:
  revision_awareness: El borrador sigue la lectura inglesa revisada en la que se prefirió «made atonement for iniquity» sobre una paráfrasis más débil. En español, se optó por «hizo expiación por la iniquidad» para conservar esa misma fuerza cultual y la estructura de reversión de ira/ furor del segundo hemistiquio.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo donde aparezca el nombre divino explícito; este versículo no lo incluye.
  - Se usó «expiación» en vez de «perdón» en el cuerpo principal para mantener la tensión léxica documentada en el hebreo y en la POB inglesa.
  - «Ira» y «furor» se distinguen para reflejar los dos sustantivos hebreos relacionados sin uniformarlos artificialmente.
  - La puntuación semicolónica reproduce la bipartición poética y facilita la lectura pública en español.
