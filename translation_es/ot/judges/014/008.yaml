translation:
  language: es
  text: Después de algunos días volvió para tomarla[a], y se apartó para ver el cadáver del león, y he aquí, un enjambre de abejas estaba en el cuerpo del león, y había miel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más explícita, «casarse con ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיָּמִים
  english_pob_choice: After some days
  chosen_spanish: Después de algunos días
  alternatives_spanish:
  - Algún tiempo después
  - Después de un tiempo
  lexicon: HALOT
  rationale: La expresión hebrea indica el paso de un tiempo no especificado. «Después de algunos días» conserva esa indefinición con una formulación natural en español.
- source_word: לְקַחְתָּהּ
  english_pob_choice: to take her
  chosen_spanish: tomarla
  alternatives_spanish:
  - casarse con ella
  - tomarla para esposa
  lexicon: HALOT
  rationale: El hebreo usa literalmente «tomar» a una mujer; el sentido marital está implícito por el contexto. Mantener «tomarla» conserva la forma del texto fuente sin perder inteligibilidad.
- source_word: וַיָּסַר
  english_pob_choice: he turned aside
  chosen_spanish: se apartó
  alternatives_spanish:
  - se desvió
  - volvió aparte
  lexicon: HALOT
  rationale: El verbo expresa apartarse del camino para mirar algo. «Se apartó» es idiomático y mantiene el movimiento narrativo.
- source_word: מַפֶּלֶת
  english_pob_choice: the carcass
  chosen_spanish: el cadáver
  alternatives_spanish:
  - la carroña
  - los restos
  lexicon: HALOT
  rationale: El término designa los restos muertos del león. «Cadáver» comunica bien el estado del animal sin el matiz más zoológico de «carroña».
- source_word: עֲדַת דְּבוֹרִים
  english_pob_choice: a swarm of bees
  chosen_spanish: una bandada de abejas
  alternatives_spanish:
  - un enjambre de abejas
  - una multitud de abejas
  lexicon: HALOT
  rationale: Aunque la correspondencia más técnica sería «enjambre», «bandada» reproduce el valor colectivo de la expresión y resulta natural en español; se conserva la imagen de una masa reunida de abejas.
- source_word: בִּגְוִיַּת
  english_pob_choice: in the body of
  chosen_spanish: en el cuerpo del
  alternatives_spanish:
  - en el cadáver del
  - en los restos del
  lexicon: HALOT
  rationale: Se evita repetir «cadáver» en ambos miembros de la frase. «Cuerpo» refleja la base semántica de גְּוִיָּה y mantiene la fluidez del español.
- source_word: וּדְבָשׁ
  english_pob_choice: and honey
  chosen_spanish: y había miel
  alternatives_spanish:
  - y miel
  - y se hallaba miel
  lexicon: HALOT
  rationale: El hebreo concluye con la simple presencia de miel. En español, «había miel» completa naturalmente la oración y sigue de cerca la fuerza existencial del original.
translation_notes:
  revision_awareness: La traducción inglesa auditada añadió «there was» antes de «honey» para completar naturalmente la última cláusula; en español se refleja con «había miel», manteniendo el mismo ajuste de fluidez sin sobreinterpretar el hebreo. También se conservó la ambigüedad de לְקַחְתָּהּ mediante una traducción literal con nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo por no aparecer en el texto.
  - Se usa «cadáver» para מַפֶּלֶת y «cuerpo» para גְוִיָּה para distinguir los dos sustantivos relacionados sin perder el paralelismo.
  - Se eligió «bandada de abejas» como equivalente colectivo natural en español, aunque «enjambre» sería la alternativa más técnica.
