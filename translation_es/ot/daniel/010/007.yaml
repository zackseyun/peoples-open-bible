base_translation:
  language: en
  yaml_path: translation/ot/daniel/010/007.yaml
  text: And I[a], Daniel, alone saw the vision, and the men who were with me did not see the vision; but a great trembling fell upon them[b], and they fled to hide themselves.
  footnotes:
  - marker: a
    text: Or 'a great terror fell upon them.' The Hebrew חֲרָדָה can denote trembling, dread, or terror.
    reason: lexical_alternative
  - marker: b
    text: Or 'they fled and hid themselves' / 'they fled into hiding.' The Hebrew infinitive בְּהֵחָבֵא expresses the purpose or manner of their flight.
    reason: lexical_alternative
