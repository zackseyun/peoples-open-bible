review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura de la superscripción y conserva la ambigüedad de לְדָוִד con «de David». También mantiene correctamente el valor musical de עַל como «según». Sin embargo, hay un problema de anclaje de notas: la nota [a] en el texto está colocada sobre «director del coro», pero su contenido explica «Gittith». Además, la transliteración «Guitit» es posible pero menos transparente respecto al hebreo/inglés auditado que «Guitit/Guitit»; el punto principal a corregir es la ubicación y organización de las notas para que correspondan al término comentado.'
  spanish_quality_summary: 'El español es claro y natural: «Para el director del coro; según el Guitit. Salmo de David.» funciona bien como superscripción bíblica moderna. La puntuación con punto y coma refleja adecuadamente la unidad del encabezado. La principal falla de calidad es editorial: las notas no están ancladas al lugar correcto y generan confusión. Conviene simplificar y reubicar las notas para legibilidad.'
  glossary_alignment: No hay conflicto con los términos teológicos del proyecto. «Salmo», «de David» y «director del coro» son adecuados. La transliteración del término incierto está justificada; se preserva la opacidad del hebreo en línea con la auditoría inglesa.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «director del coro», pero explica «Gittith».
    rationale: Las notas deben corresponder exactamente al término señalado en el texto. Aquí el lector entenderá erróneamente que la explicación cultural se refiere al director del coro y no a הַגִּתִּית.
  - severity: medium
    issue: La nota [b] duplica en gran parte la explicación de la nota [a] sobre «Guitit».
    rationale: 'La auditoría inglesa conserva dos notas distintas sobre Gittith: una cultural y otra de historial/renderización previa. En español, la segunda nota actual se convirtió en alternativa léxica redundante. Es mejor mantener una sola nota explicativa clara, salvo que se reproduzca fielmente la distinción documentada.'
  - severity: low
    issue: La transliteración «Guitit» es defendible, pero no necesariamente la única forma posible.
    rationale: No requiere adjudicación adicional; la opción es legible en español y preserva la incertidumbre del término. El problema principal no es lexical sino editorial.
  revised_spanish_text: Para el director del coro; según el Guitit[a]. Salmo de David[b].
