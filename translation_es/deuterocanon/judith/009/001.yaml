translation:
  language: es
  text: Pero Judit cayó sobre su rostro, y se puso ceniza[a] sobre la cabeza, y descubrió[b] el cilicio que llevaba puesto. Y justo en aquel momento se estaba ofreciendo en Jerusalén, en la casa de Dios, el incienso de aquella tarde, y Judit clamó con voz fuerte al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un singular con valor material o colectivo; en español, «ceniza» y «cenizas» pueden expresar este gesto de duelo.
    reason: lexical_alternative
  - marker: b
    text: El griego indica que dejó al descubierto la vestidura de cilicio, no necesariamente que se la quitó.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσεν ἐπὶ πρόσωπον
  english_pob_choice: fell on her face
  chosen_spanish: cayó sobre su rostro
  alternatives_spanish:
  - cayó rostro en tierra
  - se postró
  lexicon: LSJ
  rationale: Conserva la imagen corporal concreta del griego y el valor de humillación o súplica, sin volverlo una paráfrasis abstracta. En español, «sobre su rostro» mantiene la cercanía formal y es natural en registro bíblico.
- source_word: ἐπέθετο σποδὸν ἐπὶ τὴν κεφαλὴν αὐτῆς
  english_pob_choice: put ashes on her head
  chosen_spanish: se puso ceniza sobre la cabeza
  alternatives_spanish:
  - se colocó ceniza sobre la cabeza
  - echó ceniza sobre su cabeza
  lexicon: LSJ
  rationale: El gesto es de duelo. En español, «ceniza» funciona de manera natural como sustantivo colectivo aquí, y «sobre la cabeza» reproduce la acción ritual. No se fuerza una formulación más idiomática que borre la imagen del texto.
- source_word: ἐγύμνωσεν ὃν ἐνεδεδύκει σάκκον
  english_pob_choice: uncovered the sackcloth she had been wearing
  chosen_spanish: descubrió el cilicio que llevaba puesto
  alternatives_spanish:
  - descubrió el saco que llevaba puesto
  - dejó al descubierto el cilicio que vestía
  lexicon: LSJ
  rationale: 'Se conserva la tensión del griego: no necesariamente lo quitó, sino que lo dejó visible. «Cilicio» comunica el tejido/vestimenta penitencial en español eclesial con mayor precisión que «saco», aunque queda anotada la alternativa más literal. «Descubrió» reproduce bien ἐγύμνωσεν como ‘dejar al descubierto’.'
- source_word: ἦν ἄρτι προσφερόμενον
  english_pob_choice: was being offered at that very time
  chosen_spanish: se estaba ofreciendo en Jerusalén, en la casa de Dios, ... justo en aquel momento
  alternatives_spanish:
  - se ofrecía en Jerusalén, en la casa de Dios, precisamente entonces
  - era ofrecido justo entonces en Jerusalén, en la casa de Dios
  lexicon: LSJ
  rationale: La perífrasis progresiva española expresa la simultaneidad e inmediatez de ἄρτι. Se preserva el matiz temporal sin volverlo estático o demasiado litúrgico.
- source_word: εἰς τὸν οἶκον τοῦ θεοῦ
  english_pob_choice: in the house of God
  chosen_spanish: en la casa de Dios
  alternatives_spanish:
  - en el templo de Dios
  - en la morada de Dios
  lexicon: LSJ
  rationale: La traducción literal mantiene la dicción del griego y el referente al santuario de Jerusalén sin sustituirlo por una interpretación más técnica que el texto no exige.
- source_word: τὸ θυμίαμα τῆς ἑσπέρας
  english_pob_choice: the evening incense
  chosen_spanish: el incienso de aquella tarde
  alternatives_spanish:
  - el incienso de la tarde
  - la ofrenda de incienso de la tarde
  lexicon: LSJ
  rationale: «Incienso» refleja θυμίαμα de forma directa. «De aquella tarde» conserva el demostrativo de ἐκείνης y el vínculo con esa ocasión concreta; en español, «tarde» es más natural que «noche» para ἑσπέρα en este contexto.
- source_word: ἐβόησεν φωνῇ μεγάλῃ
  english_pob_choice: cried out with a loud voice
  chosen_spanish: clamó con fuerte voz
  alternatives_spanish:
  - gritó con voz fuerte
  - exclamó con gran voz
  lexicon: LSJ
  rationale: «Clamó» conserva la intensidad orante y suplicante de ἐβόησεν, y «con fuerte voz» reproduce la expresión enfática del griego sin sonar artificiosa en español bíblico.
- source_word: πρὸς Κύριον
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Yahvé
  - al Señor Dios
  lexicon: LSJ
  rationale: En un contexto de oración, κύριος se traduce como «Señor» en español. Aquí no hace falta explicitar Yahvé en el cuerpo del verso porque el griego usa Κύριον como título de dirección orante, no como cita nominal del tetragrámaton.
theological_decisions:
- issue: Título divino Κύριος en una oración dirigida a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Señor Dios
  rationale: El verso presenta a Judit dirigiéndose a Dios en oración. En español, «Señor» es la forma más natural y reverente para Κύριον aquí; no se introduce «Yahvé» porque el griego de esta cláusula funciona como vocativo devocional, no como transliteración del nombre divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: οἶκος τοῦ θεοῦ como espacio cultual de Jerusalén
  english_pob_reading: house of God
  chosen_spanish_reading: casa de Dios
  alternative_spanish_readings:
  - templo de Dios
  - santuario de Dios
  rationale: La frase griega es literalmente ‘casa de Dios’. Mantenerla evita una expansión interpretativa y conserva el sabor del texto, aunque el contexto deja claro que se trata del culto de Jerusalén.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: σάκκον como prenda penitencial
  english_pob_reading: sackcloth
  chosen_spanish_reading: cilicio
  alternative_spanish_readings:
  - saco
  - tela de saco
  rationale: El griego designa una prenda de duelo/penitencia. En español, «cilicio» comunica mejor esa función religiosa; «saco» sería más literal pero menos transparente para el lector moderno. Se conserva, sin embargo, la idea de una vestidura áspera y penitencial.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés y no hubo revisiones aplicadas en el paso más reciente. La redacción española conserva las mismas decisiones clave: caída postrada, ceniza ritual, exposición del cilicio, simultaneidad del incienso vespertino en Jerusalén y la oración a Dios con voz intensa.'
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» como equivalente estable de οἶκος τοῦ θεοῦ.
  - Se usa «Señor» para Κύριον en contexto de oración, consistente con la terminología del proyecto.
  - «Cilicio» se adopta por claridad eclesial, pero se documenta la alternativa más literal «saco».
  - La secuencia verbal en español reproduce la acumulación narrativa del griego sin dividirla en oraciones adicionales.
