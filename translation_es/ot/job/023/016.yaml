translation:
  language: es
  text: Pero Dios ha hecho desfallecer mi corazón[a], y el Todopoderoso me ha aterrorizado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha ablandado mi corazón». El verbo hebreo significa literalmente «hacer blando» o «hacer tierno»; aquí probablemente indica que el valor de Job se ha desvanecido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵל
  english_pob_choice: But God
  chosen_spanish: Pero Dios
  alternatives_spanish:
  - Y Dios
  - Sin embargo, Dios
  lexicon: HALOT
  rationale: El hebreo introduce a Dios con la conjunción ו; en contexto, el giro es adversativo por la relación con el motivo del temor de Job. En español, "pero" comunica bien esa transición sin perder el referente divino de אֵל como "Dios".
- source_word: הֵרַךְ
  english_pob_choice: has made ... faint
  chosen_spanish: ha ablandado
  alternatives_spanish:
  - ha suavizado
  - ha hecho desfallecer
  - ha debilitado
  lexicon: HALOT
  rationale: El verbo puede significar literalmente "hacer suave/blando". Dado que el objeto es "mi corazón", la imagen primaria es el ablandamiento interior; en español, "ha ablandado mi corazón" conserva esa metáfora y permite la nota de sentido idiomático de pérdida de ánimo/coraje.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi ánimo
  - mi valentía
  lexicon: HALOT
  rationale: לֵב designa el centro interior de la persona, incluidas voluntad y valentía. "Corazón" preserva la imagen hebrea y es natural en español; el contexto y el verbo aclaran que no se trata solo de emoción, sino del ánimo interior.
- source_word: וְשַׁדַּי
  english_pob_choice: and the Almighty
  chosen_spanish: y el Todopoderoso
  alternatives_spanish:
  - y Shaddai
  lexicon: HALOT
  rationale: שַׁדַּי es un título divino. Siguiendo la política del proyecto, se traduce su sentido como "el Todopoderoso" en vez de transliterarlo, para mantener inteligibilidad y fuerza teológica en español.
- source_word: הִבְהִילָנִי
  english_pob_choice: has terrified me
  chosen_spanish: me ha aterrorizado
  alternatives_spanish:
  - me ha atemorizado
  - me ha espantado
  - me ha llenado de temor
  lexicon: HALOT
  rationale: El hiphil de בהל expresa causar alarma o terror. "Me ha aterrorizado" transmite mejor la intensidad del texto que opciones más débiles y mantiene el paralelismo con la primera cola.
theological_decisions:
- issue: Traducción de los títulos divinos אֵל y שַׁדַּי
  english_pob_reading: God ... the Almighty
  chosen_spanish_reading: Dios ... el Todopoderoso
  alternative_spanish_readings:
  - Dios ... Shaddai
  rationale: Ambos elementos funcionan como designaciones divinas en paralelo. Traducirlos conserva el sentido sin introducir transliteración innecesaria. No hay aquí una variante doctrinalmente sensible; la decisión sigue el criterio del proyecto de traducir títulos y preservar nombres propios solo cuando corresponde.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado recientemente y quedó sin cambios; la concordancia general es alta. La versión española sigue de cerca las decisiones léxicas del POB inglés, pero adapta la metáfora de הֵרַךְ a una forma más directa en español, dejando explícita la alternativa literal en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֵל y «el Todopoderoso» para שַׁדַּי, en línea con la política del proyecto.
  - Se conservó la metáfora de «corazón» para לֵב, sin sustituirla por una explicación interpretativa en el cuerpo del texto.
  - La nota aclara la tensión entre el sentido literal «ablandar» y el sentido idiomático de perder ánimo/coraje.
  - El registro es sobrio y publicable, con puntuación y artículo definidos propios del español bíblico contemporáneo.
