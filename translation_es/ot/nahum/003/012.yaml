translation:
  language: es
  text: Todas tus fortalezas son higueras con higos tempranos[a]; si son sacudidas, caen en la boca del que come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «higos con frutos tempranos», si se toma la imagen como fruto y no como árboles; el texto principal dice «higueras» porque encaja mejor con la comparación con lugares fortificados.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְצָרַיִךְ
  english_pob_choice: your fortresses
  chosen_spanish: tus fortalezas
  alternatives_spanish:
  - tus fortalezas militares
  - tus plazas fuertes
  lexicon: HALOT
  rationale: El sustantivo se refiere a lugares fortificados. «Fortalezas» conserva la imagen concreta y la fuerza militar del contexto sin volverla demasiado técnica.
- source_word: תְּאֵנִים
  english_pob_choice: fig trees
  chosen_spanish: higueras
  alternatives_spanish:
  - árboles de higuera
  - higos
  lexicon: HALOT
  rationale: 'Sigo la lectura poética de la comparación: las fortalezas son comparadas con árboles, no con el fruto solamente. «Higueras» resulta natural en español y mantiene el paralelo con la imagen agrícola.'
- source_word: עִם בִּכּוּרִים
  english_pob_choice: with first-ripe figs
  chosen_spanish: con brevas
  alternatives_spanish:
  - con higos tempranos
  - con frutos primeros
  lexicon: HALOT
  rationale: בִּכּוּרִים designa fruto temprano, aquí con la imagen de brevas/higos tempranos. «Brevas» comunica bien la idea de fruto precoz en español y evita una lectura cultual de «primicias» que el contexto no exige.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: La partícula es condicional. «Si» preserva la estructura de la comparación y el efecto proverbial del cuadro.
- source_word: יִנּוֹעוּ
  english_pob_choice: are shaken
  chosen_spanish: son sacudidas
  alternatives_spanish:
  - son agitadas
  - se tambalean
  lexicon: HALOT
  rationale: El verbo expresa sacudir/mover violentamente. «Son sacudidas» reproduce la acción sufrida por las higueras o sus frutos con claridad idiomática.
- source_word: וְנָפְלוּ
  english_pob_choice: they fall
  chosen_spanish: caen
  alternatives_spanish:
  - y caen
  - se desploman
  lexicon: HALOT
  rationale: En la imagen gnómica, el resultado es inmediato. «Caen» basta en español y evita un exceso de futurización que no aporta al paralelo.
- source_word: עַל פִּי אוֹכֵל
  english_pob_choice: into the mouth of the eater
  chosen_spanish: en la boca del que come
  alternatives_spanish:
  - en la boca del que devora
  - en la boca del comensal
  lexicon: HALOT
  rationale: La expresión literal es «sobre la boca de un comedor». «En la boca del que come» conserva el hebraísmo de modo comprensible en español y mantiene la imagen de facilidad y vulnerabilidad.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que cambió el signo intermedio a punto y coma para una cadencia más fluida, manteniendo intacto el sentido de la comparación.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se mantiene la imaginería agrícola concreta en lugar de generalizarla a una metáfora abstracta.
  - Se conserva el paralelismo de fortaleza → higuera → sacudida → caída → boca del que come, sin suavizar la vulnerabilidad del cuadro.
