translation:
  language: es
  text: Y la luz de Israel se convertirá en fuego[a], y su Santo en llama[c][b]; arderá y consumirá sus espinos y sus zarzas en un solo día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se convertirá en fuego ... en llama»; la construcción hebrea puede verterse de manera más formal, pero aquí probablemente expresa el paso a un nuevo estado.
    reason: lexical_alternative
  - marker: b
    text: «Su Santo» probablemente es un título divino y se refiere a Yahvé, un tema frecuente en Isaías.
    reason: cross_reference
  - marker: c
    text: Los términos hebreos traducidos «espinos» y «zarzas» aluden a vegetación espinosa; el primero es relativamente raro y también puede entenderse de manera más amplia como maleza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: will become
  chosen_spanish: se convertirá
  alternatives_spanish:
  - será
  lexicon: HALOT
  rationale: El hebreo con לְ + sustantivo expresa transformación o llegada a un nuevo estado; por eso el español debe reflejar cambio, no mera existencia estática.
- source_word: אֽוֹר יִשְׂרָאֵל
  english_pob_choice: the light of Israel
  chosen_spanish: la luz de Israel
  alternatives_spanish:
  - la luz que es de Israel
  - la luz de Israel
  lexicon: HALOT
  rationale: Se conserva la metáfora y la construcción posesiva natural en español sin explicarla en el cuerpo del texto.
- source_word: לְאֵשׁ
  english_pob_choice: a fire
  chosen_spanish: fuego
  alternatives_spanish:
  - un fuego
  lexicon: HALOT
  rationale: En español, «se convertirá en fuego» suena más natural y mantiene el valor predicativo del hebreo.
- source_word: וּקְדוֹשׁוֹ
  english_pob_choice: his Holy One
  chosen_spanish: su Santo
  alternatives_spanish:
  - su Santo[a]
  - su Santo Uno
  lexicon: HALOT
  rationale: «Santo» conserva el título divino sin forzar una glosa. El posesivo se mantiene para respetar la relación del hebreo con ישראל. La mayúscula señala el valor titular/divino, no una santidad meramente descriptiva.
- source_word: לְלֶהָבָה
  english_pob_choice: a flame
  chosen_spanish: llama
  alternatives_spanish:
  - una llama
  lexicon: HALOT
  rationale: «Llama» conserva el paralelismo con «fuego» y evita redundancia excesiva en español.
- source_word: וּבָעֲרָה
  english_pob_choice: it will burn
  chosen_spanish: arderá
  alternatives_spanish:
  - y arderá
  - y flameará
  lexicon: HALOT
  rationale: El verbo expresa combustión; «arderá» es idiomático y mantiene el futuro profético.
- source_word: וְאָכְלָה
  english_pob_choice: and consume
  chosen_spanish: consumirá
  alternatives_spanish:
  - devorará
  - y consumirá
  lexicon: HALOT
  rationale: «Consumirá» reproduce bien el uso metafórico de אכל respecto del fuego y evita una literalidad excesiva de «comerá».
- source_word: שִׁיתוֹ
  english_pob_choice: his thorns
  chosen_spanish: sus espinos
  alternatives_spanish:
  - sus espinas
  - su maleza espinosa
  lexicon: HALOT
  rationale: El término es raro y el contexto de juicio por fuego apunta a vegetación espinosa; «espinos» es una opción clara y bíblicamente reconocible en español.
- source_word: וּשְׁמִירוֹ
  english_pob_choice: his briers
  chosen_spanish: sus zarzas
  alternatives_spanish:
  - sus brieres
  - sus espinos
  lexicon: HALOT
  rationale: Se conserva el paralelismo con otro término distinto de vegetación áspera; «zarzas» comunica bien la segunda imagen sin fusionarla con la primera.
- source_word: בְּיוֹם אֶחָד
  english_pob_choice: in a single day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  lexicon: HALOT
  rationale: Mantiene la idea de rapidez y plenitud del juicio, con una fórmula natural en español.
theological_decisions:
- issue: Referente de «su Santo» / «la luz de Israel»
  english_pob_reading: Retain the metaphorical/titular language without explicitly identifying the referent in the main text.
  chosen_spanish_reading: Conservar el lenguaje titular/metafórico sin identificar explícitamente al referente en el cuerpo del versículo.
  alternative_spanish_readings:
  - «Yahvé, la luz de Israel... »
  - «su Santo», entendido explícitamente como Yahvé
  rationale: El hebreo presenta títulos poéticos que en Isaías suelen evocar a Dios, pero el versículo mismo no expone la identificación de manera explicativa. El español conserva esa tensión y deja la inferencia teológica al lector y a las notas.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'Coincido con el último pase de revisión: no se requieren cambios sustantivos respecto del acuerdo alto con el texto fuente y la lectura auditada en inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo donde el texto lo requiere explícitamente; aquí el referente se deja implícito siguiendo la lectura auditada.
  - Se conservó la distinción entre dos términos distintos para vegetación espinosa, evitando fusionarlos en una sola glosa.
  - Se eligió una solución verbal natural en español («se convertirá», «arderá», «consumirá») para reflejar la progresión profética del hebreo.
  - La mayúscula en «Santo» marca el uso titular/divino y no una mera cualidad moral.
