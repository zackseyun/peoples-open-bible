lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  english_pob_choice: And for the tribe of
  chosen_spanish: Y para la tribu de
  alternatives_spanish:
  - Y para el bastón de
  - Y para la vara de
  lexicon: HALOT
  rationale: En listas administrativas tribales, מַטֶּה funciona idiomáticamente como “tribu”, no como objeto físico. En español, “para la tribu de” conserva el valor distributivo del prefijo y mantiene la claridad del contexto.
- source_word: בְנֵי אֶפְרַיִם
  english_pob_choice: the sons of Ephraim
  chosen_spanish: los hijos de Efraín
  alternatives_spanish:
  - los hijos de Ephraim
  - los efraimitas
  lexicon: HALOT
  rationale: Se conserva la construcción hebrea “hijos de”, que el inglés POB también preserva. “Efraín” adapta el nombre propio a la forma española usual y mantiene la referencia genealógica sin convertirla en una etnónimo más interpretativo.
- source_word: נָשִׂיא
  english_pob_choice: a leader
  chosen_spanish: un líder
  alternatives_spanish:
  - un jefe
  - un príncipe
  - un dirigente tribal
  lexicon: HALOT
  rationale: En este contexto administrativo, נָשִׂיא denota al representante o cabeza de la tribu. “Líder” comunica bien ese cargo sin las connotaciones monárquicas de “príncipe”.
- source_word: קְמוּאֵל
  english_pob_choice: Kemuel
  chosen_spanish: Kemuel
  alternatives_spanish:
  - Qemuel
  lexicon: standard transliteration
  rationale: Se translitera el nombre propio siguiendo la convención habitual en español bíblico, sin intentar traducirlo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  lexicon: HALOT
  rationale: La construcción patronímica estándar en español es “hijo de”, equivalente natural y suficientemente formal del hebreo.
- source_word: שִׁפְטָן
  english_pob_choice: Shiphtan
  chosen_spanish: Shiphtan
  alternatives_spanish:
  - Shiftán
  lexicon: standard transliteration
  rationale: Se conserva la transliteración del nombre propio para mantener trazabilidad con el texto fuente y el audit trail en inglés.
