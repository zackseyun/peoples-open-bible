  yaml_path: translation/ot/jeremiah/036/014.yaml
  text: Then all the officials sent Jehudi son of Nethaniah[a], son of Shelemiah, son of Cushi, to Baruch, saying, “Take in your hand the scroll from which you read in the hearing of the people, and come.” So Baruch son of Neriah took the scroll in his hand and came to them.
  footnotes:
