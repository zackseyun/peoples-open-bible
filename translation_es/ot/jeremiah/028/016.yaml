translation:
  language: es
  text: 'Por tanto[a], así dice Yahvé: Mira, yo te envío lejos de la faz de la tierra. Este año morirás, porque has hablado rebeldía contra Yahvé[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, 'de sobre la faz de la tierra'. La expresión hebrea es un modismo para ser quitado de entre los vivos.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''has hablado apostasía o desafío contra Yahvé''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: Transliteración del nombre divino
  rationale: Se conserva el nombre personal del pacto en español como 'Yahvé', conforme al criterio del proyecto y al valor del Tetragrámaton en el hebreo.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la fuerza inferencial de la sentencia de juicio con un español natural y formal.
- source_word: כֹּה אָמַר
  english_pob_choice: this is what ... says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto es lo que ... dice
  - así ha dicho
  lexicon: HALOT
  rationale: Reproduce la fórmula profética con dignidad y claridad en español, sin volverla innecesariamente arcaica.
- source_word: הִנְנִי
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: Mantiene la función deíctica e imperativa de atención; 'Mira' resulta más natural que 'He aquí' en español moderno.
- source_word: מְשַׁלֵּחֲךָ
  english_pob_choice: I am sending you away
  chosen_spanish: yo te envío lejos
  alternatives_spanish:
  - yo te despido
  - yo te arrojo lejos
  - yo te envío fuera
  lexicon: HALOT
  rationale: Conserva la imagen verbal de enviar y la dirección de expulsión/judicial remoción sin sobreinterpretar el matiz.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: away from the face of the earth
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de la faz de la tierra
  - de sobre la superficie de la tierra
  - fuera de la tierra
  lexicon: HALOT
  rationale: '''De sobre la faz de la tierra'' reproduce el idioma hebreo de manera idiomática en español y deja abierta la clarificación contextual de muerte.'
- source_word: הַשָּׁנָה
  english_pob_choice: This year
  chosen_spanish: Este año
  alternatives_spanish:
  - Durante este año
  - En este año
  lexicon: HALOT
  rationale: Equivale de forma directa al marcador temporal de inmediatez profética.
- source_word: אַתָּה מֵת
  english_pob_choice: you will die
  chosen_spanish: morirás
  alternatives_spanish:
  - vas a morir
  - estás por morir
  lexicon: HALOT
  rationale: Aunque el hebreo es una cláusula nominal, el contexto exige un futuro predictivo en español para comunicar la sentencia de manera clara.
- source_word: סָרָה
  english_pob_choice: rebellion
  chosen_spanish: rebeldía
  alternatives_spanish:
  - rebeldía abierta
  - rebeldía
  - apostasía
  lexicon: HALOT
  rationale: '''Rebeldía'' expresa la desviación culpable con suficiente fuerza; evita cargar el término con un tecnicismo eclesiástico no requerido por el hebreo.'
- source_word: דִבַּרְתָּ אֶל יְהוָה
  english_pob_choice: you have spoken rebellion against Yahweh
  chosen_spanish: has hablado rebeldía contra Yahvé
  alternatives_spanish:
  - has hablado rebeldía ante Yahvé
  - has hablado rebeldía a Yahvé
  lexicon: HALOT
  rationale: En español, 'contra' comunica mejor el valor adversativo implícito en el juicio que un literal 'a' o 'ante'.
theological_decisions:
- issue: Sentencia de expulsión interpretada por el contexto inmediato como muerte
  english_pob_reading: 'A death sentence: ''I am sending you away from the face of the earth'' followed by ''This year you will die.'''
  chosen_spanish_reading: 'Una sentencia de muerte: ''yo te envío lejos de sobre la faz de la tierra'' seguida por ''Este año morirás''.'
  alternative_spanish_readings:
  - Una remoción de la tierra
  - Un destierro
  rationale: 'La segunda cláusula interpreta la imagen idiomática de remoción como muerte, no como simple exilio. La traducción conserva ambas capas: la imagen hebrea y su aclaración contextual.'
  doctrine_reference: Jeremías 28:16; lectura contextual del paralelismo
- issue: Valor de סָרָה en una acusación profética
  english_pob_reading: you have spoken rebellion against Yahweh
  chosen_spanish_reading: has hablado rebeldía contra Yahvé
  alternative_spanish_readings:
  - has hablado apostasía contra Yahvé
  - has hablado desafío contra Yahvé
  rationale: '''Rebeldía'' mantiene el peso moral y judicial del hebreo sin convertir automáticamente el término en la categoría posterior y más técnica de ''apostasía''.'
  doctrine_reference: HALOT; Jeremías 28:16
translation_notes:
  revision_awareness: Se corrigió la anclaje de nota al incluir [a] en el texto principal; se mantuvo la equivalencia óptima con terminología coherente con el proyecto y sin suavizar la sentencia de muerte.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' para יְהוָה de forma consistente con el criterio del proyecto.
  - '''Rebeldía'' se usa para סָרָה, reservando ''apostasía'' como alternativa anotada por su posible intensificación teológica.'
  - La imagen idiomática 'de sobre la faz de la tierra' se conserva en el texto principal y se explica en nota para no perder el componente hebreo.
