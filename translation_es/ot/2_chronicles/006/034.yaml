review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: condición (''Si''), salida militar, comisión divina, oración dirigida a Dios y orientación hacia la ciudad y la casa. Sin embargo, hay dos ajustes necesarios: el marcador [a] está mal anclado en ''sale'' cuando la nota trata de la orientación ''hacia esta ciudad'', y la coordinación ''oran a ti en dirección de esta ciudad... y de la casa'' suena menos natural y ligeramente ambigua en español frente al hebreo ''hacia esta ciudad... y la casa''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero conviene mejorar la fluidez de la frase final. 'hacia esta ciudad... y la casa' es más natural y directo que 'en dirección de... y de la casa'. También es preferible simplificar 'que tú has escogido' a 'que has escogido'.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé en el texto principal; la nota cultural lo usa correctamente. 'Casa' preserva bien בית frente a la glosa interpretativa 'templo'.
  issues:
  - severity: high
    issue: El marcador de nota [a] está colocado en 'sale' en vez de en la frase de orientación hacia la ciudad.
    rationale: La nota explica la alternativa de דֶּרֶךְ הָעִיר הַזֹּאת ('hacia esta ciudad' / 'en dirección de esta ciudad'), no el verbo 'sale'. Esto incumple la disciplina de anclaje de notas.
  - severity: medium
    issue: La expresión 'oran a ti en dirección de esta ciudad ... y de la casa' resulta algo pesada y menos idiomática.
    rationale: El hebreo usa lenguaje direccional concreto. En español bíblico-natural, 'oran a ti hacia esta ciudad ... y la casa' comunica mejor la orientación sin rigidez innecesaria.
  - severity: low
    issue: Uso innecesario de 'tú' en 'que tú los envías' y 'que tú has escogido'.
    rationale: No es incorrecto, pero en español fluido no hace falta salvo énfasis contextual, que aquí no es necesario.
  revised_spanish_text: Si tu pueblo sale a la guerra contra sus enemigos, por el camino que les envíes, y oran a ti hacia[a] esta ciudad que has escogido y la casa que he edificado para tu nombre[b],
  revised_footnotes:
  - marker: a
    text: O “en dirección de esta ciudad”; el hebreo usa literalmente lenguaje de “camino/dirección” para la oración orientada hacia Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: “La casa” se refiere al templo que Salomón edificó para el nombre de Yahvé.
    reason: cultural_note
  revision_rationale: Se corrige el anclaje de la nota [a] para que corresponda a la frase direccional que comenta, y se alisa el español con 'hacia esta ciudad ... y la casa', que preserva mejor el sentido espacial del hebreo y suena más natural. También se eliminan pronombres explícitos no necesarios.
