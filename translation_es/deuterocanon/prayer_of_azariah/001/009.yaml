translation:
  language: es
  text: Y nos entregaste[a] en manos de nuestros enemigos sin ley, rebeldes[b] sumamente odiosos, y a un rey injusto y muy perverso[c] en toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos entregaste al poder de nuestros enemigos sin ley»; el griego también puede expresarse con el matiz de quedar bajo el poder de otros.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «apóstatas» en lugar de «rebeldes». La expresión completa también puede entenderse como «enemigos sin ley y sumamente odiosos».
    reason: lexical_alternative
  - marker: c
    text: 'La frase final también puede entenderse comparativamente: «un rey injusto y muy perverso, peor que cualquiera en la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέδωκας
  english_pob_choice: you gave
  chosen_spanish: nos entregaste
  alternatives_spanish:
  - nos diste
  - nos entregaste en manos de
  lexicon: BDAG
  rationale: El verbo griego expresa entregar o poner en poder de otro. «Nos entregaste» conserva la agencia divina directa del texto y suena natural en español; el complemento «en manos de» queda explícito en la frase.
- source_word: εἰς χεῖρας
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en poder de
  - en las manos de
  lexicon: BDAG
  rationale: Es un giro idiomático de entrega al poder de alguien. «En manos de» es la forma más transparente y bíblica en español, sin perder claridad.
- source_word: ἐχθρῶν
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - foces
  lexicon: BDAG
  rationale: El sentido básico es directo; «enemigos» es la equivalencia más clara y estándar.
- source_word: ἀνόμων
  english_pob_choice: lawless
  chosen_spanish: sin ley
  alternatives_spanish:
  - ilegales
  - malvados
  lexicon: BDAG
  rationale: La forma griega describe a quienes actúan contra la ley. «Sin ley» conserva el contenido léxico con mayor precisión que una generalización como «malvados».
- source_word: ἐχθίστων
  english_pob_choice: hateful
  chosen_spanish: muy odiosos
  alternatives_spanish:
  - sumamente odiosos
  - detestables
  lexicon: BDAG
  rationale: El superlativo de ἐχθρός intensifica la hostilidad/odiosidad. «Muy odiosos» comunica esa fuerza de manera natural en español, y evita perder el matiz superlativo.
- source_word: ἀποστατῶν
  english_pob_choice: rebels
  chosen_spanish: rebeldes
  alternatives_spanish:
  - apóstatas
  - renegados
  lexicon: BDAG
  rationale: El término indica quienes se sublevan o se apartan. «Rebeldes» es el equivalente general más claro; «apóstatas» sería más estrecho y religioso que lo exigido por el verso.
- source_word: βασιλεῖ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - gobernante
  lexicon: BDAG
  rationale: El sustantivo significa literalmente «rey» y debe mantenerse sin desplazamiento semántico.
- source_word: ἀδίκῳ
  english_pob_choice: unjust
  chosen_spanish: injusto
  alternatives_spanish:
  - injusto en
  - malvado
  lexicon: BDAG
  rationale: El adjetivo denota injusticia o falta de rectitud jurídica/moral. «Injusto» es preciso y comprensible.
- source_word: πονηροτάτῳ
  english_pob_choice: most wicked
  chosen_spanish: muy perverso
  alternatives_spanish:
  - sumamente perverso
  - sumamente malo
  lexicon: BDAG
  rationale: Conviene conservar la intensidad superlativa. «Muy perverso» transmite el peso moral sin caer en un giro demasiado arcaico.
- source_word: παρὰ πᾶσαν τὴν γῆν
  english_pob_choice: in all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - en toda la tierra
  - más allá de toda la tierra
  lexicon: BDAG
  rationale: La frase puede tener un matiz comparativo/intensivo. «Sobre toda la tierra» mantiene la amplitud del alcance y sugiere superioridad respecto de toda la tierra sin forzar un español antinatural.
theological_decisions:
- issue: Agencia divina en el juicio
  english_pob_reading: 'The verse is rendered with direct divine agency: ''you gave us into the hands...''.'
  chosen_spanish_reading: 'El texto conserva la agencia divina directa: «nos entregaste en manos de...».'
  alternative_spanish_readings:
  - nos permitiste caer en manos de...
  - permitiste que cayeramos en manos de...
  rationale: El griego atribuye directamente a Dios el acto de entregar. La traducción mantiene esa tensión teológica en vez de suavizarla hacia una mera अनुमति o permiso implícito.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la coordinación para reflejar que ἀνόμων y ἐχθίστων modifican conjuntamente a ἀποστατῶν. Por ello, el español integra ambos rasgos en la misma designación de los enemigos/rebeldes y conserva la estructura formal de la frase final.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por la segunda persona verbal, coherente con el griego.
  - «Sin ley» se eligió para ἀνόμων por su transparencia y por conservar la fuerza legal del término.
  - Se evitó «Cristo» y otras terminologías no pertinentes al pasaje.
  - La cláusula final conserva el posible matiz comparativo de παρὰ πᾶσαν τὴν γῆν sin decidirlo de forma exclusiva.
