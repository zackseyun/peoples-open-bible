translation:
  language: es
  text: antes de que el decreto[a] dé a luz, antes de que el día pase como tamo[b], antes de que sobre ustedes venga el ardor de la ira de Yahvé[c], antes de que sobre ustedes venga el día de la ira de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes de que el decreto entre en vigor». El hebreo dice literalmente «antes de que el decreto dé a luz», conservando la imagen de nacimiento para el surgimiento o la ejecución del decreto.
    reason: lexical_alternative
  - marker: b
    text: O «antes de que el día pase como paja». El hebreo es breve y poético; la relación exacta entre «día» y el símil puede expresarse de manera ligeramente distinta en español.
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «el ardor de la ira de Yahvé» ... «el día de la ira de Yahvé».'
    reason: cross_reference
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  lexicon: HALOT
  rationale: Repite el marcador temporal tres veces con fuerza de advertencia. «Antes de que» suena natural en español y conserva la anáfora y el sentido de urgencia.
- source_word: לֶדֶת
  english_pob_choice: gives birth
  chosen_spanish: dé a luz
  alternatives_spanish:
  - da a luz
  - engendre
  - tenga nacimiento
  lexicon: HALOT
  rationale: El hebreo usa imagen de parto para el surgimiento/ejecución del decreto. «Dé a luz» preserva la metáfora sin volverla demasiado abstracta.
- source_word: חֹק
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - estatuto
  - ordenanza
  - decisión
  lexicon: HALOT
  rationale: Aquí el sentido es una resolución fija de juicio, no una ley general. «Decreto» comunica bien el matiz jurídico-propético.
- source_word: כְּמֹץ
  english_pob_choice: like chaff
  chosen_spanish: como paja
  alternatives_spanish:
  - como tamo
  - como cáscara
  lexicon: HALOT
  rationale: El símil expresa algo liviano y fácilmente arrastrado. «Paja» es claro y natural en español bíblico, aunque «tamo» también sería posible.
- source_word: עָבַר יוֹם
  english_pob_choice: the day passes away
  chosen_spanish: el día pase
  alternatives_spanish:
  - el día pase de largo
  - el día se vaya
  lexicon: HALOT
  rationale: La construcción poética es compacta; en español, el verbo de pasar con el comparativo «como paja» conserva la rapidez y el movimiento fugaz del original.
- source_word: חֲרוֹן אַף
  english_pob_choice: burning anger
  chosen_spanish: ardor de la ira
  alternatives_spanish:
  - ira ardiente
  - ardiente ira
  - furor
  lexicon: HALOT
  rationale: El hebreo combina la imagen de calor/ardor con ira. «Ardor de la ira» mantiene la metáfora térmica y el tono intensificado mejor que una simplificación a «furor».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto en español para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en lugar de ocultarlo con un título.'
- source_word: יָבוֹא עֲלֵיכֶם
  english_pob_choice: comes upon you
  chosen_spanish: venga sobre ustedes
  alternatives_spanish:
  - caiga sobre ustedes
  - llegue sobre ustedes
  lexicon: HALOT
  rationale: La expresión hebrea de juicio conserva fuerza direccional. «Venga sobre ustedes» es natural, solemne y mantiene el movimiento del castigo hacia el destinatario.
- source_word: יוֹם אַף יְהוָה
  english_pob_choice: the day of the LORD’s anger
  chosen_spanish: el día de la ira de Yahvé
  alternatives_spanish:
  - el día del furor de Yahvé
  - el día de la ira de Yahvé
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa. Se mantiene «ira» para parallelismo con חֲרוֹן אַף y para no diluir el énfasis judicial del texto.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el nombre propio divino según el estándar del proyecto en español y se evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahweh/Yahvé'
- issue: Metáfora de parto en חֹק לֶדֶת
  english_pob_reading: before the decree gives birth
  chosen_spanish_reading: antes de que el decreto dé a luz
  alternative_spanish_readings:
  - antes de que el decreto entre en vigor
  - antes de que el decreto se ejecute
  rationale: La imagen de nacimiento está explícita en el hebreo y conviene preservarla para no aplanar la advertencia profética en lenguaje puramente legal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Expresión de ira intensificada
  english_pob_reading: burning anger
  chosen_spanish_reading: ardor de la ira
  alternative_spanish_readings:
  - ira ardiente
  - furor
  rationale: La expresión hebrea une fuego e ira; en español conviene mantener ambos componentes conceptuales en vez de reducirlos a un sinónimo general.
  doctrine_reference: HALOT; poesía profética hebrea
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail en inglés: se conservan la triple repetición de בְּטֶרֶם, la imagen de parto en חֹק לֶדֶת, el símil de dispersión en כְּמֹץ, y la formulación del juicio con el nombre divino Yahvé. No se detectaron revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española estándar del Tetragrámaton en todo el versículo.
  - Se conserva el paralelismo temporal con tres ocurrencias de «antes de que».
  - «Ira» se usa de forma consistente para אַף en el último hemistiquio y, con «ardor», para חֲרוֹן אַף en el segundo.
  - La puntuación con comas y un ritmo escalonado busca reflejar la cadencia profética del hebreo sin sobreexplicar el texto.
