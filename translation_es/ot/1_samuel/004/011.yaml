translation:
  language: es
  text: Y el arca de Dios fue capturada, y murieron los dos hijos de Elí, Ofni y Finees.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲרוֹן אֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca de Yahvé
  - el arca de Dios
  lexicon: HALOT
  rationale: La construcción hebrea señala el arca perteneciente a Dios. En español, «el arca de Dios» conserva la estructura y la solemnidad del texto, sin introducir una formulación posesiva más idiomática que borre la cadena nominal del original.
- source_word: נִלְקָח
  english_pob_choice: was captured
  chosen_spanish: fue capturada
  alternatives_spanish:
  - fue tomada
  - fue apresada
  lexicon: HALOT
  rationale: El nifal es pasivo y, en este contexto bélico, expresa captura por el enemigo. «Fue capturada» comunica de manera natural ese sentido militar sin debilitarlo a un simple «tomada».
- source_word: וּשְׁנֵי
  english_pob_choice: and the two
  chosen_spanish: y los dos
  alternatives_spanish:
  - y dos
  - y los dos hijos
  lexicon: HALOT
  rationale: El numeral con valor definido se refiere a los dos hijos conocidos de Elí. «Los dos» preserva esa especificidad contextual en español.
- source_word: בְנֵי עֵלִי
  english_pob_choice: sons of Eli
  chosen_spanish: hijos de Elí
  alternatives_spanish:
  - hijos de Eli
  - los hijos de Elí
  lexicon: HALOT
  rationale: «Hijos de Elí» reproduce la relación de pertenencia expresada por la construcción hebrea y es plenamente natural en español. Mantiene también la referencia exacta a la parentela indicada por el texto.
- source_word: מֵתוּ
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - murieron
  - fallecieron
  lexicon: HALOT
  rationale: El perfecto qal de מות informa muerte de forma directa. «Murieron» es la equivalencia más simple y fiel, sin añadir matices eufemísticos ajenos al pasaje.
- source_word: חָפְנִי וּפִינְחָס
  english_pob_choice: Hophni and Phinehas
  chosen_spanish: Ofni y Finees
  alternatives_spanish:
  - Hofni y Finees
  - Ofni y Finés
  lexicon: Standard transliteration practice for biblical names
  rationale: Los nombres propios se adaptan a la ortografía española bíblica usual. «Ofni» y «Finees» son formas legibles y reconocibles para lectores de español, manteniendo la identidad de los nombres hebreos.
theological_decisions:
- issue: Nombre divino implícito en el sintagma 'arca de Dios'
  english_pob_reading: the ark of God
  chosen_spanish_reading: el arca de Dios
  alternative_spanish_readings:
  - el arca de Yahvé
  - el arca de Dios
  rationale: Aquí el texto hebreo dice explícitamente אֱלֹהִים, no el tetragrámaton. Por eso se conserva «Dios» en la forma del sintagma, en vez de sustituirlo por Yahvé sin base textual inmediata.
  doctrine_reference: Uso reverente y fiel del nombre/título divino según el término original
translation_notes:
  revision_awareness: El pasaje inglés auditado no presenta notas ni variantes textuales, y el cotejo posterior reporta alta concordancia sin cambios. La versión española sigue de cerca esa solución, ajustando solo la sintaxis y la transliteración de nombres propios al uso natural del español.
  spanish_consistency_notes:
  - Se mantiene «Dios» porque el hebreo usa אֱלֹהִים en esta frase.
  - Se usa pretérito perfecto simple para reflejar una serie narrativa completa en pasado.
  - Los nombres propios se presentan en forma española tradicional y legible, sin añadir notas porque el texto base no documenta variantes relevantes.
