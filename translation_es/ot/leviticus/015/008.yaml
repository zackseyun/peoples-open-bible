translation:
  language: es
  text: Y si el hombre con el flujo escupe sobre una persona ritualmente pura[a], lavará sus vestidos y se bañará en agua[b], y quedará impuro hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre alguien que está ritualmente puro». El hebreo dice literalmente «sobre el puro», es decir, una persona ritualmente pura.
    reason: lexical_alternative
  - marker: b
    text: Es decir, ritualmente impuro hasta la tarde, no necesariamente moralmente contaminado.
    reason: cultural_note
lexical_decisions:
- source_word: וְכִֽי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La combinación conjuntiva-condicional introduce un caso legal dentro de la secuencia; en español, «Y si» conserva el enlace narrativo y la condición con naturalidad.
- source_word: יָרֹק
  english_pob_choice: spits on
  chosen_spanish: escupe sobre
  alternatives_spanish:
  - escupe en
  lexicon: HALOT
  rationale: El verbo significa «escupir»; en español, el complemento adecuado para marcar el objeto afectado es «sobre».
- source_word: הַזָּב
  english_pob_choice: the man with the discharge
  chosen_spanish: el hombre con el flujo
  alternatives_spanish:
  - el que tiene el flujo
  - el hombre que padece flujo
  lexicon: HALOT
  rationale: En este contexto de pureza ritual, el hebreo alude al varón que tiene una emisión corporal. «Flujo» mantiene el valor descriptivo sin añadir una explicación ajena al texto.
- source_word: בַּטָּהוֹר
  english_pob_choice: on a clean person
  chosen_spanish: sobre una persona limpia
  alternatives_spanish:
  - sobre el limpio
  - sobre alguien que está limpio
  lexicon: HALOT
  rationale: טָהוֹר designa limpieza ritual, no mera limpieza física. «Persona» se añade para hacer natural en español el sustantivo implícito del hebreo.
- source_word: וְכִבֶּס בְּגָדָיו
  english_pob_choice: he shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará sus ropas
  - lavará sus prendas
  lexicon: HALOT
  rationale: כִּבֵּס se usa de lavar ropa. «Vestidos» conserva el registro bíblico y la referencia a las prendas, sin perder claridad.
- source_word: וְרָחַץ בַּמַּיִם
  english_pob_choice: and bathe in water
  chosen_spanish: y se bañará en agua
  alternatives_spanish:
  - y se lavará en agua
  - y se bañará con agua
  lexicon: HALOT
  rationale: רָחַץ en este marco ritual se refiere al lavado corporal. «Bañarse en agua» comunica ese acto de modo claro y fiel, manteniendo la referencia al medio de purificación.
- source_word: וְטָמֵא
  english_pob_choice: and he shall be unclean
  chosen_spanish: y quedará impuro
  alternatives_spanish:
  - y será impuro
  - y será inmundo
  lexicon: HALOT
  rationale: טָמֵא expresa impureza ritual. «Quedará impuro» da bien la consecuencia legal del contacto, sin convertirla en culpa moral.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: La fórmula hebrea fija el término temporal de la impureza ritual. «Tarde» es la equivalencia más natural y breve en español; «atardecer» sería una alternativa válida pero más interpretativa en este contexto.
theological_decisions:
- issue: Pureza ritual versus moral impureza
  english_pob_reading: Rendered טָהוֹר / טָמֵא as 'clean' / 'unclean' in ritual sense
  chosen_spanish_reading: «limpia» / «impuro» en sentido ritual
  alternative_spanish_readings:
  - «pura» / «impuro»
  - «limpia» / «inmunda»
  rationale: El texto trata del estado ritual resultante del contacto, no de una valoración ética. «Impuro» evita la asociación demasiado doméstica de «sucio» y «limpia» mantiene el contraste con la persona ritualmente apta.
  doctrine_reference: Levítico 15; sistema de pureza ritual de Israel
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés; no se requiere revisión adicional. Se mantuvo la distinción ritual de טָהוֹר / טָמֵא y la temporalidad fija de «hasta la tarde».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto cuando aparezca el nombre divino; aquí no aparece.
  - Se evitó «inmundo» por su mayor carga tradicional y se prefirió «impuro» para preservar el sentido ritual sin sobrerretrato moral.
  - «Vestidos» conserva un registro bíblico sobrio y es consistente con el lenguaje legal de Levítico.
