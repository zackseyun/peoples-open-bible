translation:
  language: es
  text: los hijos de Sama[a], tres mil trescientos uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego lee «Sama» con un total de tres mil trescientos uno. El paralelo aproximado en el texto hebreo masorético de Esdras 2:29 lee «los hijos de Nebo», cincuenta y dos. Como 1 Esdras se traduce aquí desde el testimonio griego, el texto principal sigue al griego pese a la divergencia importante.
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos de
  lexicon: LSJ
  rationale: En este contexto de lista censal, υἱοὶ introduce una designación de linaje o clan; en español, «los hijos de» comunica de forma natural esa relación genealógica y mantiene el tono enumerativo.
- source_word: Σαμά
  english_pob_choice: Sama
  chosen_spanish: Sama
  alternatives_spanish:
  - Samá
  - Sama
  lexicon: LSJ
  rationale: Se sigue la transliteración del testimonio griego, que es la base primaria de 1 Esdras. Se conserva la forma «Sama» para reflejar el nombre propio tal como aparece en el texto griego.
- source_word: τρισχίλιοι τρακόσιοι εἷς
  english_pob_choice: three thousand three hundred and one
  chosen_spanish: tres mil trescientos uno
  alternatives_spanish:
  - '3.301'
  - tres mil trescientos y uno
  lexicon: LSJ
  rationale: La frase numeral griega se vierte con palabras en español para conservar el estilo formal de un registro censal y evitar la modernización por cifras, que no era la opción principal del texto base en inglés.
translation_notes:
  revision_awareness: No se registran revisiones sustanciales en el pasaje base; el texto griego de Swete permanece como ancla principal y la comparación con el paralelo masorético se conserva solo como variante textual relevante.
  spanish_consistency_notes:
  - Se mantiene «hijos de» para el patrón genealógico/censal, coherente con el estilo de listas en POB.
  - Se preserva la transliteración «Sama» por fidelidad al griego, sin armonizar con el paralelo hebreo.
  - El número se escribe con palabras, en paralelo con la elección inglesa de evitar cifras en el cuerpo principal.
