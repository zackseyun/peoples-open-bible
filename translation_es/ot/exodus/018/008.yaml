  to: Moisés contó a su suegro todo lo que Yahvé había hecho a Faraón y a Egipto por causa de Israel[a], todas las dificultades[b] que les habían sobrevenido en el camino, y cómo Yahvé los había librado.
  rationale: Se revisa únicamente הַתְּלָאָה para evitar el exceso semántico de «calamidad» y reflejar mejor el sentido de dificultades/adversidad sufridas durante el trayecto. También se afinan las notas para que las alternativas sean realmente útiles y no redundantes. El resto del texto preserva fielmente el hebreo y las decisiones del POB.
