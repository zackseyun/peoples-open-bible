translation:
  language: es
  text: Pero que la justicia corra como las aguas[a], y la rectitud como un arroyo perenne[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como agua». El hebreo usa el plural «aguas», que puede subrayar abundancia o movimiento.
    reason: lexical_alternative
  - marker: b
    text: O «como una corriente que no se seca» o «como un arroyo constante». El hebreo se refiere a un curso de agua duradero o permanente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִגַּל
  english_pob_choice: let ... roll down
  chosen_spanish: corra
  alternatives_spanish:
  - fluya
  - ruede
  - descienda
  lexicon: HALOT
  rationale: El hebreo expresa movimiento fluido y continuo en forma exhortativa/jusiva. En español, 'corra' comunica con naturalidad la imagen de agua en movimiento sin perder el impulso imperativo/optativo del contexto profético.
- source_word: כַּמַּיִם
  english_pob_choice: like waters
  chosen_spanish: como las aguas
  alternatives_spanish:
  - como el agua
  - como aguas
  lexicon: HALOT
  rationale: Se mantiene el plural hebreo 'aguas', que puede intensificar la abundancia y el movimiento. 'Como el agua' sería más idiomático, pero atenúa una decisión lexical documentada.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: HALOT
  rationale: En este contexto profético, el término apunta al orden social y legal conforme a Dios. 'Justicia' preserva ese valor ético y comunitario mejor que 'juicio', que en español suele sonar más restrictivo o forense.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  lexicon: HALOT
  rationale: Aunque 'rectitud' no reproduce de forma exacta la pareja inglesa 'righteousness', en español evita repetir 'justicia' y conserva la dimensión moral, fiel y covenantal del término. Se mantiene la distinción entre מִשְׁפָּט y צְדָקָה.
- source_word: כְּנַחַל
  english_pob_choice: like a ... stream
  chosen_spanish: como un arroyo
  alternatives_spanish:
  - como un torrente
  - como un cauce
  lexicon: HALOT
  rationale: '''Arroyo'' ofrece una imagen clara y natural en español para la corriente de מים/נחל, sin la tecnicidad de ''wadi'' ni el énfasis excesivo de ''torrente''.'
- source_word: אֵיתָן
  english_pob_choice: ever-flowing
  chosen_spanish: perenne
  alternatives_spanish:
  - constante
  - perpetuo
  - siempre caudaloso
  lexicon: HALOT
  rationale: '''Perenne'' expresa bien la idea de algo que permanece y no se seca. En combinación con ''arroyo'', comunica la continuidad del cauce que no cesa, equivalente al valor de ''ever-flowing'' / ''perennial'' del audit trail.'
theological_decisions:
- issue: Pareja ética מִשְׁפָּט / צְדָקָה
  english_pob_reading: justice ... righteousness
  chosen_spanish_reading: justicia ... rectitud
  alternative_spanish_readings:
  - juicio ... justicia
  - justicia ... justicia
  rationale: La profecía exige un orden público y moral conforme al pacto. Mantener dos términos distintos evita diluir la fuerza retórica del paralelismo y conserva la tensión entre lo legal-social ('justicia') y lo moral-covenantal ('rectitud').
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: El audit trail inglés revisó 'roll on' a 'roll down' para acercarse más al verbo hebreo. En español, 'corra' mantiene el movimiento descendente/fluido sin cargar artificialmente el verso; 'aguas' preserva el plural hebreo y 'perenne' recoge el valor de un cauce que no se seca.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por defecto en el proyecto, pero en este verso no aparece el nombre divino.
  - '''Justicia'' se reservó para מִשְׁפָּט y ''rectitud'' para צְדָקָה para mantener la distinción lexical.'
  - '''Aguas'' conserva el plural hebreo; la nota ofrece la alternativa singular natural en español.'
  - '''Arroyo perenne'' es una solución idiomática que mantiene la metáfora del flujo continuo sin introducir vocabulario técnico.'
