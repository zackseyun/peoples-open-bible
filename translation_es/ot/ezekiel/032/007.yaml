translation:
  language: es
  text: Cuando te apague[a], cubriré los cielos y oscureceré sus estrellas; cubriré el sol con una nube, y la luna no dará su luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando te extinga» o «cuando seas apagado». El hebreo presenta la imagen de ser apagado, como una luz que se apaga.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִסֵּיתִי
  english_pob_choice: I will cover
  chosen_spanish: cubriré
  alternatives_spanish:
  - velaré
  - ocultarė
  lexicon: HALOT
  rationale: כסה expresa cubrir o velar. En este contexto de oscurecimiento cósmico, 'cubriré' conserva la imagen directa y suena natural en español sin debilitar el sentido de juicio.
- source_word: בְכַבּוֹתְךָ
  english_pob_choice: when I extinguish you
  chosen_spanish: cuando te extinga
  alternatives_spanish:
  - cuando te apague
  - cuando seas extinguido
  lexicon: HALOT
  rationale: כבה comunica la imagen de apagar o extinguir una luz. 'Cuando te extinga' mantiene la metáfora de ser apagado, y en español conserva mejor la fuerza figurada que una paráfrasis más interpretativa.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos mismos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo suele equivaler a 'los cielos'. En un oráculo de juicio cósmico, 'los cielos' preserva el registro elevado y la amplitud del término.
- source_word: וְהִקְדַּרְתִּי
  english_pob_choice: and darken
  chosen_spanish: oscureceré
  alternatives_spanish:
  - ennegreceré
  - volveré oscuros
  lexicon: HALOT
  rationale: קדר en causativo significa hacer oscuro. 'Oscureceré' es la opción más natural y fiel en español, manteniendo la relación con el lenguaje de tinieblas del pasaje.
- source_word: כֹּכְבֵיהֶם
  english_pob_choice: their stars
  chosen_spanish: sus estrellas
  alternatives_spanish:
  - las estrellas de ellos
  - sus astros
  lexicon: HALOT
  rationale: El sufijo de tercera persona plural se refiere a los cielos en el paralelo poético. 'Sus estrellas' es idiomático en español y conserva la relación posesiva sin introducir ambigüedad innecesaria.
- source_word: שֶׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro rey
  lexicon: HALOT
  rationale: Equivalencia directa y transparente.
- source_word: בֶּעָנָן
  english_pob_choice: with a cloud
  chosen_spanish: con una nube
  alternatives_spanish:
  - en una nube
  - por medio de una nube
  lexicon: HALOT
  rationale: La preposición ב aquí funciona de modo instrumental/locativo; 'con una nube' reproduce el efecto de cobertura sobre el sol con español claro y natural.
- source_word: אֲכַסֶּנּוּ
  english_pob_choice: I will cover
  chosen_spanish: cubriré
  alternatives_spanish:
  - lo ocultaré
  - lo velaré
  lexicon: HALOT
  rationale: Se repite כסה; conservar 'cubriré' en ambos casos mantiene la cohesión léxica del versículo y refleja el paralelismo hebreo.
- source_word: וְיָרֵחַ
  english_pob_choice: and the moon
  chosen_spanish: y la luna
  alternatives_spanish:
  - y la luna misma
  lexicon: HALOT
  rationale: Correspondencia directa. 'Luna' es el equivalente normal en español.
- source_word: לֹא יָאִיר אוֹרוֹ
  english_pob_choice: will not give its light
  chosen_spanish: no dará su luz
  alternatives_spanish:
  - no brillará con su luz
  - no hará brillar su luz
  lexicon: HALOT
  rationale: 'El hifil de אור tiene valor causativo: ''dar luz''. ''No dará su luz'' conserva ese matiz mejor que un simple ''no brillará'', y resulta idiomático en español bíblico contemporáneo.'
theological_decisions:
- issue: Carácter del lenguaje cósmico de juicio
  english_pob_reading: Render the imagery straightforwardly as cosmic darkening in judgment without specifying whether it is literal astronomical collapse or metaphorical political downfall.
  chosen_spanish_reading: Mantener la imagen cósmica de oscurecimiento como lenguaje de juicio, sin decidir en la traducción si describe un colapso astronómico literal o una metáfora del derrumbe del poder de Faraón/Egipto.
  alternative_spanish_readings:
  - Interpretarlo de forma estrictamente literal como cataclismo cósmico
  - Entenderlo solo como metáfora política
  rationale: El hebreo usa imaginería profética establecida. La traducción debe conservar esa tensión interpretativa sin resolverla prematuramente, de modo que el lector perciba la fuerza del oráculo tal como está formulado.
  doctrine_reference: Preservar la tensión teológica e imagética del texto profético.
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del POB inglés, que prefirió 'extinguish you' para reflejar más de cerca la imagen de כבה; por eso el español usa 'te extinga' y mantiene la metáfora de apagarse/extinguirse en lugar de una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se conserva 'cubriré' para ambas ocurrencias de כסה, siguiendo la repetición léxica del hebreo.
  - '''Los cielos'' mantiene el plural hebreo שָׁמַיִם, coherente con un contexto de juicio cósmico.'
  - '''No dará su luz'' reproduce el valor causativo de אור en hifil sin forzar una paráfrasis exegética.'
  - El marcador [a] aparece en el punto exacto donde la alternativa léxica de כבה afecta el sentido principal.
