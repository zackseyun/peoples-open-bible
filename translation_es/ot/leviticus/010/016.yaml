base_translation:
  language: en
  yaml_path: translation/ot/leviticus/010/016.yaml
  text: Now Moses diligently searched for the goat of the sin offering[a], and behold, it had been burned up. So he was angry with Eleazar and with Ithamar, Aaron’s remaining sons, saying[c][b],
  footnotes:
  - marker: a
    text: Or 'searched and searched for the goat of the sin offering.' The Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'it had been completely burned.' The Hebrew indicates the goat was found in a burned state.
    reason: lexical_alternative
  - marker: c
    text: '''Aaron’s remaining sons'' refers to Eleazar and Ithamar, the sons left after the death of Nadab and Abihu (Lev 10:1–2, 12).'
    reason: cross_reference
