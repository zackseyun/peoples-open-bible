  to: 'Yahvé dijo a Moisés: «Toma a todos los líderes del pueblo y empálalos[a] para Yahvé, a plena luz del día[b], para que se aparte de Israel el ardor de la ira de Yahvé».'
  rationale: Se reemplaza «cuélgalos» por «empálalos» para reflejar mejor la decisión léxica documentada del POB para וְהוֹקַע אֹתָם y conservar la fuerza judicial-pública del hebreo. Se recoloca la nota [a] en el verbo pertinente y se pulen levemente la puntuación y la formulación de la nota para que el español sea más natural y exacto.
