translation:
  language: es
  text: Ellos levantan sus voces con tamboril y lira[a], y se alegran al sonido de la flauta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "alzan sus voces con tamboril y lira". El hebreo literalmente significa "levantar" o "alzar", y aquí probablemente alude al canto en celebración musical.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "caramillo" para "flauta". El hebreo nombra un instrumento de viento, y el equivalente antiguo exacto es incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂאוּ
  english_pob_choice: lift up their voices
  chosen_spanish: levantan su voz
  alternatives_spanish:
  - alzan su voz
  - levantan la voz
  - cantan
  lexicon: HALOT
  rationale: El verbo hebreo נָשָׂא significa literalmente 'levantar' o 'alzAR'; en este contexto poético-musical, la POB inglesa opta por una expresión que refleje el gesto de elevar la voz. 'Levantan su voz' conserva esa imagen sin sonar forzado en español.
- source_word: תֹף
  english_pob_choice: tambourine
  chosen_spanish: tamboril
  alternatives_spanish:
  - pandero
  - pandereta
  - timbrel
  lexicon: HALOT
  rationale: תֹף designa un instrumento de percusión portátil. 'Tamboril' mantiene el registro bíblico y es inteligible en español; 'pandereta' sería más moderno pero puede sugerir un instrumento más específico que el hebreo no exige.
- source_word: כִנּוֹר
  english_pob_choice: lyre
  chosen_spanish: lira
  alternatives_spanish:
  - arpa
  lexicon: HALOT
  rationale: כִּנּוֹר se refiere a un cordófono más cercano a 'lira' que a 'arpa'. 'Lira' preserva mejor la especificidad instrumental que la opción más amplia 'arpa'.
- source_word: יִשְׂמְחוּ
  english_pob_choice: rejoice
  chosen_spanish: se alegran
  alternatives_spanish:
  - se regocijan
  - se gozan
  lexicon: HALOT
  rationale: שׂמח expresa alegría o regocijo. 'Se alegran' es natural y digno en español; 'se regocijan' sería más elevado, pero menos inmediato para lectura pública.
- source_word: לְקוֹל
  english_pob_choice: at the sound of
  chosen_spanish: al sonido de
  alternatives_spanish:
  - con el sonido de
  - ante el sonido de
  lexicon: HALOT
  rationale: קוֹל significa 'sonido' o 'voz'. Con un instrumento, 'sonido' es la opción más natural; la preposición se expresa de manera idiomática como 'al'.
- source_word: עוּגָב
  english_pob_choice: flute
  chosen_spanish: flauta
  alternatives_spanish:
  - pipe
  - flautín
  lexicon: HALOT
  rationale: עוּגָב nombra un instrumento de viento; 'flauta' ofrece una equivalencia clara y accesible en español. 'Pipe' sería un calco menos natural, y 'flautín' implicaría una precisión no segura.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que prefirió reflejar con más fidelidad יִשְׂאוּ como 'lift up their voices' en lugar de 'sing to'. Por eso el español usa 'levantan su voz' y no una traducción interpretativa como 'cantan a'. También conserva la enumeración de instrumentos y el paralelismo poético de la línea.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal entre 'levantan su voz' y 'se alegran'.
  - '''Tamboril'' y ''lira'' preservan el tono poético sin caer en arcaísmo innecesario.'
  - '''Flauta'' se eligió por claridad, pero se deja constancia de la incertidumbre del instrumento hebreo.'
  - La puntuación respeta la coordinación del hebreo y la fluidez de lectura en español.
