    reason: cultural_note
  - marker: c
    text: 'Hebreo: YHWH, el nombre divino del pacto.'
    reason: theological_note
  revision_rationale: 'La revisión hace tres ajustes menores pero importantes: ancla correctamente la nota cultural en «hija de Sión», mejora הִנְנִי a «he aquí» para un tono profético más fiel y natural, y normaliza la puntuación final. No hay cambio sustantivo de significado.'
