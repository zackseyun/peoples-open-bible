revisions:
- from: Bajo la aflicción vi las tiendas de Cusan[a][b]; las cortinas de la tierra de Madián temblaban.
  to: Bajo la aflicción vi las tiendas de Cusan[a][b]; las cortinas de las tiendas de la tierra de Madián temblaban.
  rationale: Se mantiene la sintaxis y el sentido del borrador, pero se explicita que יְרִיעוֹת son cortinas de tienda para evitar una ambigüedad poco natural en español y preservar mejor el paralelismo poético con «tiendas». También se ajusta la nota léxica sobre אָוֶן para alinearla con el análisis contextual del expediente inglés.
