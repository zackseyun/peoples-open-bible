translation:
  language: es
  text: En todas tus palabras, recuerda tu fin,[a] y nunca pecarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testigo hebreo (Kahana, compuesto de manuscritos de la Geniza del Cairo) dice aproximadamente: «No apartes tu corazón de quien te ama, porque de él serás amado». Aquí el hebreo parece diferir sustancialmente de la tradición griega, por eso el texto principal sigue el griego paralelo.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּשָּׂא לֵב
  english_pob_choice: Do not lift up your heart
  chosen_spanish: No levantes tu corazón
  alternatives_spanish:
  - No alces tu corazón
  - No apartes tu corazón
  lexicon: HALOT
  rationale: La imagen hebrea es idiomática y apunta a elevar o enorgullecer el corazón respecto de alguien; «levantar tu corazón» conserva la metáfora sin volverla extraña en español.
- source_word: מֵאוֹהֵב
  english_pob_choice: from one who loves you
  chosen_spanish: de quien te ama
  alternatives_spanish:
  - de un amigo
  - de quien te ama a ti
  lexicon: HALOT
  rationale: El hebreo sugiere relación de amor, no necesariamente un término técnico de amistad. «Quien te ama» mantiene la referencia personal y evita precisar más de lo que el texto permite.
- source_word: כִּי מִמֶּנוּ תֵּאָהֵב
  english_pob_choice: for from him you will be loved
  chosen_spanish: porque de él serás amado
  alternatives_spanish:
  - pues de él recibirás amor
  - porque por él serás amado
  lexicon: HALOT
  rationale: La forma pasiva futura en hebreo se refleja mejor con «serás amado». «De él» conserva la preposición relacional del hebreo y el sentido de procedencia o fuente.
theological_decisions:
- issue: Base textual para una variante hebrea divergente
  english_pob_reading: English POB follows the Greek parallel in the main text and preserves the Hebrew alternative in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo transmitido y señala la alternativa griega en nota
  alternative_spanish_readings:
  - El texto principal sigue el griego y deja el hebreo en nota
  - Traducir solo el griego sin reflejar la variante hebrea
  rationale: En este expediente la revisión más reciente adjudica prioridad al hebreo compuesto de Kahana, y el español debe reflejar ese giro textual. La nota permite transparencia sin borrar la divergencia de testigos.
  doctrine_reference: PHILOSOPHY.md; principios de transparencia textual del proyecto
translation_notes:
  revision_awareness: La versión anterior del borrador fue rechazada porque tenía una nota sin marca en el texto. Este borrador corrige eso anclando la nota [a] directamente en «te ama[a]» y alineando el texto principal con la revisión más reciente basada en el hebreo.
  spanish_consistency_notes:
  - Se usa «corazón» para לֵב y se conserva la metáfora verbal «levantar» para reflejar el hebreo.
  - «Serás amado» mantiene el pasivo y evita introducir una acción distinta como «recibirás amor» en el texto principal.
  - La nota explica la divergencia con el griego sin mezclar ambos testigos en la línea principal.
