    text: O «Mira». «He aquí» conserva el tono profético y solemne del hebreo.
    reason: alternative_reading
  - marker: b
    text: O «de todo el país». Hebreo אֶרֶץ puede significar «tierra», «país» o «mundo», según el contexto.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [b] para reflejar la alternativa léxica real de אָרֶץ y se reemplaza «monte de incendio» por «monte quemado», que transmite mejor el sentido resultativo de שְׂרֵפָה en español natural y fiel al expediente del POB.
