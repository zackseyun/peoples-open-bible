review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la estructura y la tensión del hebreo: un joven de Belén de Judá, de la agrupación de Judá, que era levita y residía/forastereaba allí. Sin embargo, no sigue bien el rastro léxico auditado en dos puntos clave: מִמִּשְׁפַּחַת se documentó en inglés como ''clan'' por precisión, y גָר שָׁם debe mantener el matiz de residencia temporal/forastera mejor que ''morando''.'
  spanish_quality_summary: 'El español es legible, pero tiene detalles poco naturales o menos precisos: ''Ahora había'' suena algo calcado; ''de la familia de Judá'' debilita la precisión de ''clan''; ''él era levita'' pide artículo en español bíblico natural; y ''estaba morando allí'' suena rígido y no expresa bien el matiz de sojourn. Una leve revisión mejora fidelidad y fluidez.'
  glossary_alignment: No hay conflicto con términos del glosario principal. 'Levita' es correcto, pero en español debe ir como 'un levita'. La decisión importante es preferir 'clan' sobre 'familia' aquí, porque el expediente inglés lo justificó específicamente y el español lo tolera bien en registro bíblico. Para גָר, 'residía allí como forastero' sería demasiado explicitado en el texto principal; 'estaba residiendo allí' mantiene mejor el valor que 'morando'.
  issues:
  - severity: medium
    issue: '"de la familia de Judá" no refleja la precisión de מִמִּשְׁפַּחַת documentada como ''clan''.'
    rationale: El expediente inglés eligió 'clan' precisamente para evitar la vaguedad de 'family'. En español, 'clan de Judá' es claro y preserva mejor la tensión con 'era un levita'.
  - severity: medium
    issue: '"estaba morando allí" no transmite bien el matiz de גָר como residencia temporal/forastera.'
    rationale: '"Morar" suena elevado pero semánticamente difuso; puede sonar a simple habitar. El audit trail revisó el inglés a ''sojourning there'' para acercarse al hebreo. En español, ''estaba residiendo allí'' conserva mejor ese matiz sin sobreexplicar.'
  - severity: low
    issue: '"él era levita" suena menos natural que "era un levita".'
    rationale: En español, el sustantivo de clasificación normalmente lleva artículo indefinido. Además refleja mejor el inglés 'a Levite'.
  - severity: low
    issue: La nota [a] está anclada a 'Judá' geográfico, pero su contenido trata de מִמִּשְׁפַּחַת.
    rationale: La marca debe colocarse en la frase 'clan/familia', no en 'Belén de Judá', para evitar ambigüedad de referencia.
  revised_spanish_text: Y había un joven de Belén de Judá, del clan[a] de Judá; y era un levita, y estaba residiendo allí[b].
  revised_footnotes:
  - marker: a
    text: O «de la familia de Judá». El término hebreo puede denotar un grupo familiar o clan; aquí se usa «clan» por mayor precisión.
    reason: lexical_alternative
  - marker: b
    text: O «estaba morando allí». El verbo hebreo suele referirse a vivir en un lugar como residente temporal o forastero.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'familia' a 'clan' para seguir la decisión léxica auditada y preservar mejor la tensión del texto. Se cambia 'él era levita' por 'era un levita' para naturalidad y exactitud categorial en español. Se sustituye 'morando' por 'residiendo' para representar mejor גָר sin caer en una formulación demasiado técnica. También se reubica la nota [a] al término que realmente comenta.
