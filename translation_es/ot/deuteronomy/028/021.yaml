revisions:
- from: Yahvé hará que la plaga[a] se pegue a ti[b] hasta consumirte[c] de sobre la tierra que vas a entrar a poseer.
  to: Yahvé hará que la plaga[a] se adhiera a ti hasta consumirte[b] y quitarte de la tierra que vas a entrar para poseer.
  rationale: Se revisó para mejorar la naturalidad y dignidad del español sin perder el sentido del hebreo ni las decisiones del POB. «Se adhiera a ti» sustituye el coloquial «se pegue a ti». Se eliminó el calco rígido «de sobre la tierra» y se expresó el resultado con «y quitarte de la tierra», que comunica fielmente la remoción de la tierra prometida implicada por מֵעַל הָאֲדָמָה. «Que vas a entrar para poseer» evita una construcción española áspera. Se conservaron y ajustaron las notas para reflejar tanto la alternativa léxica de דבר como la ambigüedad del sujeto en כַּלֹּתוֹ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:49:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: Yahvé hace que una enfermedad de juicio se adhiera al destinatario hasta consumirlo y quitarlo de la tierra que entra a poseer. Mantiene correctamente Yahvé por יְהוָה y refleja la fuerza causativa de יַדְבֵּק. Sin embargo, varios giros suenan poco naturales o imprecisos en español: «se pegue a ti» es demasiado coloquial, «de sobre la tierra» es calco rígido, y «que vas a entrar a poseer» omite el pronombre objeto exigido por el español natural en este contexto.'
  spanish_quality_summary: La redacción actual es comprensible pero algo acartonada y por momentos poco idiomática para un español bíblico moderno y digno. «Se adhiera a ti» eleva el registro sin perder la imagen. «Te elimine de la tierra» o «te consuma de la tierra» requeriría ajuste; la solución más natural y fiel es «hasta acabar contigo, quitándote de la tierra...» o «hasta consumirte y eliminarte de la tierra...». Para conservar más de cerca el hebreo y el inglés auditado, «hasta consumirte, quitándote de la tierra» sería aceptable, pero la mejor línea continua en español es «hasta consumirte de la tierra» no suena bien. Además, «la tierra que vas a entrar a poseer» debe ser «la tierra que vas a entrar a poseerla» o mejor «la tierra que vas a entrar para poseer».
  glossary_alignment: Alineación buena en «Yahvé» y en el campo semántico de דבר como enfermedad de juicio. «Plaga» es defendible, aunque «pestilencia» también encaja. No hay conflicto con la terminología doctrinal del proyecto. El principal problema no es de glosario sino de naturalidad y de cómo representar מֵעַל הָאֲדָמָה y לְרִשְׁתָּהּ en español.
  issues:
  - severity: medium
    issue: «se pegue a ti» suena coloquial
    rationale: Aunque refleja la imagen de דבק, en una traducción bíblica digna resulta demasiado informal. «Se adhiera a ti» conserva mejor el sentido de aflicción persistente.
  - severity: medium
    issue: «de sobre la tierra» es un calco poco natural
    rationale: Representa mecánicamente מֵעַל, pero en español no es idiomático. El sentido contextual en Deuteronomio es remoción de la tierra prometida; conviene expresarlo con una formulación natural como «de la tierra» o «quitándote de la tierra».
  - severity: medium
    issue: «que vas a entrar a poseer» es sintácticamente áspero
    rationale: En español suena incompleto porque «poseer» aquí pide mejor «para poseer» o una construcción relativa más fluida. «Que vas a entrar para poseer» mantiene el sentido sin calco innecesario.
  - severity: low
    issue: La nota b ofrece «contra ti» como alternativa
    rationale: La alternativa inglesa auditada era «to you / on you / against you», pero en español con «adherirse» la opción principal natural es «a ti». «Contra ti» cambia el matiz de adhesión a hostilidad y no es la mejor nota alternativa aquí.
  revised_spanish_text: Yahvé hará que la plaga[a] se adhiera a ti hasta consumirte[b] y quitarte de la tierra que vas a entrar para poseer.
  revised_footnotes:
  - marker: a
    text: O «pestilencia»; el hebreo puede referirse a una enfermedad epidémica mortal enviada como juicio.
    reason: lexical_alternative
  - marker: b
    text: O «hasta que te haya consumido»; la cláusula puede entenderse con Yahvé como sujeto implícito, con la plaga como medio de su juicio. También puede entenderse «hasta que ella te haya consumido», refiriéndose a la plaga.
    reason: alternative_reading
  revision_rationale: Se revisó para mejorar la naturalidad y dignidad del español sin perder el sentido del hebreo ni las decisiones del POB. «Se adhiera a ti» sustituye el coloquial «se pegue a ti». Se eliminó el calco rígido «de sobre la tierra» y se expresó el resultado con «y quitarte de la tierra», que comunica fielmente la remoción de la tierra prometida implicada por מֵעַל הָאֲדָמָה. «Que vas a entrar para poseer» evita una construcción española áspera. Se conservaron y ajustaron las notas para reflejar tanto la alternativa léxica de דבר como la ambigüedad del sujeto en כַּלֹּתוֹ.
