translation:
  language: es
  text: 'Y esta será su frontera norte: desde el Mar Grande[a][b] trazarán para ustedes el monte Hor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «trazarán la frontera hasta el monte Hor». El verbo puede referirse a trazar o marcar una línea de frontera en este contexto geográfico.'
    reason: lexical_alternative
  - marker: b
    text: «El Mar Grande» se refiere al mar Mediterráneo.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/זֶה
  english_pob_choice: And this
  chosen_spanish: Y este
  alternatives_spanish:
  - Ahora este
  - Este
  lexicon: HALOT
  rationale: Conserva la secuencia legislativa del hebreo y enlaza naturalmente con la indicación anterior.
- source_word: יִהְיֶה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - ha de ser
  - estará
  lexicon: HALOT
  rationale: El futuro simple transmite bien el valor prescriptivo de la cláusula normativa en español.
- source_word: לָכֶם
  english_pob_choice: your
  chosen_spanish: vuestro
  alternatives_spanish:
  - de ustedes
  - para ustedes
  lexicon: HALOT
  rationale: En un mandato dirigido al pueblo, el posesivo español expresa de manera idiomática la pertenencia del límite.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: «Límite» comunica bien la idea territorial sin sugerir necesariamente una frontera política moderna; en este contexto cartográfico resulta natural.
- source_word: צָפוֹן
  english_pob_choice: northern
  chosen_spanish: norte
  alternatives_spanish:
  - septentrional
  - norteño
  lexicon: HALOT
  rationale: El hebreo funciona adjetivalmente; en español, «límite norte» es más natural y fiel que una forma más pesada.
- source_word: מִן הַיָּם הַגָּדֹל
  english_pob_choice: from the Great Sea
  chosen_spanish: desde el Mar Grande
  alternatives_spanish:
  - desde el gran mar
  - desde el Mar Mediterráneo
  lexicon: HALOT
  rationale: Se conserva la designación del hebreo en vez de sustituirla por el nombre moderno en el texto principal, manteniendo la transparencia con el original.
- source_word: תְּתָאוּ
  english_pob_choice: you shall mark out for yourselves
  chosen_spanish: trazaréis para vosotros
  alternatives_spanish:
  - marcaréis para vosotros
  - delimitaréis para vosotros
  - trazaréis la línea para vosotros
  lexicon: HALOT
  rationale: El verbo en contexto de linderos puede expresar trazar o marcar un contorno. «Trazaréis» preserva esa fuerza gráfica y legal sin sobredeterminar una sola imagen.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para vosotros
  alternatives_spanish:
  - para ustedes
  - por vosotros
  lexicon: HALOT
  rationale: Recupera explícitamente el matiz reflexivo/dativo que en el inglés POB se expresa con «for yourselves».
- source_word: הֹר הָהָר
  english_pob_choice: Mount Hor
  chosen_spanish: el monte Hor
  alternatives_spanish:
  - el monte de Hor
  - Hor, el monte
  lexicon: HALOT
  rationale: Se traduce con el topónimo tradicional en forma transparente al español; el hebreo presenta un nombre propio geográfico fijo.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura auditada del inglés POB y conserva la tensión léxica de תְּתָאוּ entre «trazar» y «delimitar» mediante una nota alternativa. No hay revisiones aplicadas en el expediente y el pasaje permanece estable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se usa un español bíblico moderno y sobrio, evitando el calco mecánico de estructuras inglesas.
  - Los nombres propios geográficos se conservan en forma reconocible para lectores eclesiales hispanohablantes.
