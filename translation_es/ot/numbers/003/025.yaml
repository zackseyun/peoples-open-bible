translation:
  language: es
  text: Y la responsabilidad[a] de los hijos de Gersón en la tienda de reunión era el tabernáculo, la tienda, su cubierta, y la cortina[b] de la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «encargo» o «deber» para מִשְׁמֶרֶת.
    reason: lexical_alternative
  - marker: b
    text: O «pantalla» o «colgadura» para מָסַךְ, el elemento colgante de la entrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁמֶרֶת
  english_pob_choice: duty
  chosen_spanish: responsabilidad
  alternatives_spanish:
  - deber
  - cargo
  - encargo
  lexicon: HALOT
  rationale: En este contexto levítico, el término señala aquello de lo que los hijos de Gersón eran encargados. «Responsabilidad» comunica bien la carga asignada sin volver la frase artificial; «deber» o «cargo» también serían posibles, pero «responsabilidad» conserva mejor la idea de una obligación concreta de custodia/atención.
- source_word: בְּנֵי גֵרְשׁוֹן
  english_pob_choice: the sons of Gershon
  chosen_spanish: los hijos de Gersón
  alternatives_spanish:
  - los gersonitas
  lexicon: HALOT
  rationale: Se conserva la expresión filial del hebreo, como en la audiencia fuente. «Gersonitas» sería más étnico/colectivo, pero perdería la transparencia del original.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: La preposición marca esfera/lugar de servicio. «Tabernáculo de reunión» es más natural en español bíblico que repetir «tienda» aquí, aunque el hebreo usa אֹהֶל; el sintagma funciona como designación estable del santuario de cita. Se mantiene «de reunión» para reflejar מוֹעֵד.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la habitación
  lexicon: HALOT
  rationale: Es el equivalente técnico consolidado para מִשְׁכָּן en este marco cultual. «Morada» sería más etimológica, pero menos precisa como término técnico aquí.
- source_word: וְהָאֹהֶל
  english_pob_choice: and the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - y la tienda
  - el pabellón
  lexicon: HALOT
  rationale: El hebreo coordina un segundo elemento del inventario arquitectónico. En español, la secuencia nominal fluye mejor sin repetir la conjunción antes de cada elemento, siguiendo la estructura del listado. «Tienda» reproduce אֹהֶל con sencillez y claridad.
- source_word: מִכְסֵהוּ
  english_pob_choice: its covering
  chosen_spanish: su cobertura
  alternatives_spanish:
  - su cubierta
  - su cobertura protectora
  lexicon: HALOT
  rationale: Se conserva la referencia al elemento que cubre la tienda/tabernáculo. «Cobertura» mantiene el sustantivo abstracto y evita precisar más de lo que el hebreo dice; «cubierta» también sería viable, pero aquí «cobertura» suena más apto para el inventario cultual.
- source_word: מָסַךְ
  english_pob_choice: the screen
  chosen_spanish: la cortina
  alternatives_spanish:
  - el velo
  - la pantalla
  lexicon: HALOT
  rationale: Aunque el inglés POB prefirió «screen» y aclaró que puede ser «curtain», en español «cortina» es el término más natural para el colgamiento de la entrada. No se elige «velo» porque en español suele evocar otra pieza cultual distinta; «cortina» preserva la función de cierre o separación de la entrada.
- source_word: פֶּתַח
  english_pob_choice: for the entrance
  chosen_spanish: de la entrada
  alternatives_spanish:
  - para la entrada
  - del acceso
  lexicon: HALOT
  rationale: La construcción española más fluida es «de la entrada», que expresa la relación funcional del elemento con el acceso. «Para la entrada» es posible, pero menos idiomático dentro de la lista.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: del tabernáculo de reunión
  alternatives_spanish:
  - de la tienda de reunión
  - del encuentro
  lexicon: HALOT
  rationale: Se mantiene la equivalencia consistente del nombre cultual. En el cierre del verso, «tabernáculo de reunión» evita la repetición inmediata de «tienda» y preserva el referente técnico del hebreo.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la segunda conjunción antes de «the tent» para reflejar mejor la lista hebrea; la estructura española sigue esa misma economía coordinativa. También se tuvo en cuenta la decisión inglesa de mantener un inventario de elementos sin ampliar ni reinterpretar la lista.
  spanish_consistency_notes:
  - Se mantiene «tabernáculo de reunión» de forma consistente para אֹהֶל מוֹעֵד, con variación mínima solo por fluidez sintáctica.
  - «Responsabilidad» se usa en sentido de encargo/obligación levítica, sin debilitar la fuerza de מִשְׁמֶרֶת.
  - Se conserva una lista nominal breve y paralela, sin añadir verbos ni explicaciones ajenas al hebreo.
