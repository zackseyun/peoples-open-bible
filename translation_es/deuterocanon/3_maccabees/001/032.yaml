base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/001/032.yaml
  text: But most of them[a], strengthening themselves with a noble spirit, did not depart from piety[c][b], but by exchanging their possessions for their lives they boldly sought to save themselves from the registration.
  footnotes:
  - marker: a
    text: Or 'did not abandon godliness.' The Greek εὐσέβεια can denote reverence, devotion, or piety toward God.
    reason: lexical_alternative
  - marker: b
    text: The Greek clause rendered 'boldly sought to rescue themselves from the registrations' is difficult in the transmitted text, especially the verb ἐτιμῶντο. The translation reflects the probable sense of active effort to secure release from the official enrollment.
    reason: textual_variant
  - marker: c
    text: '''Registrations'' refers to the official enrollment/listing process imposed on them, not necessarily a population census in the modern sense.'
    reason: cultural_note
