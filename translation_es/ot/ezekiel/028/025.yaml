translation:
  language: es
  text: 'Así dice el Señor Yahvé: Cuando yo reúna[a] a la casa de Israel de entre los pueblos entre los cuales fueron dispersados, y me mostraré santo entre ellos a los ojos de las naciones, entonces habitarán en su propia tierra, que di a mi siervo Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más literal: «al reunir yo» o «mientras yo reúna».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: El hebreo presenta el título compuesto אֲדֹנָי יְהוִה. En español conviene conservar ambos elementos sin ocultar el nombre divino; 'Señor Yahvé' refleja el par titular y evita la sustitución tradicional por una mayúscula reverencial que no está en el hebreo.
- source_word: בְּקַבְּצִי
  english_pob_choice: When I gather
  chosen_spanish: Cuando yo reúna
  alternatives_spanish:
  - al reunir yo
  - cuando yo junte
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo constructo y sufijo de primera persona se entiende naturalmente como 'cuando yo reúna'. Mantiene el valor temporal del hebreo sin sonar mecánica en español.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión pactual 'casa de Israel', que el original usa como fórmula corporativa y que no conviene aplanar a 'pueblo'.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los gentiles
  lexicon: HALOT
  rationale: '''Pueblos'' distingue este término de גּוֹיִם, que aparece más adelante y se traduce mejor por ''naciones''. En español ambas opciones son posibles, pero esta diferencia preserva la distinción del hebreo.'
- source_word: נָפֹצוּ בָם
  english_pob_choice: among whom they were scattered
  chosen_spanish: entre los cuales fueron dispersados
  alternatives_spanish:
  - entre quienes fueron esparcidos
  - donde fueron dispersados
  lexicon: HALOT
  rationale: El pasivo niphal de פוץ expresa dispersión. 'Entre los cuales' reproduce bien el valor relacional de בָם con los pueblos, evitando una traducción demasiado literal o confusa.
- source_word: וְנִקְדַּשְׁתִּי בָם
  english_pob_choice: I show myself holy among them
  chosen_spanish: seré santificado en ellos
  alternatives_spanish:
  - me mostraré santo entre ellos
  - seré tenido por santo en ellos
  lexicon: HALOT
  rationale: El niphal de קדשׁ aplicado a Dios puede expresar que Dios es mostrado como santo ante observadores. Se conserva la tensión teológica con una formulación más literal, y se deja abierto el matiz de manifestación pública que el contexto exige.
- source_word: לְעֵינֵי הַגּוֹיִם
  english_pob_choice: in the sight of the nations
  chosen_spanish: a los ojos de las naciones
  alternatives_spanish:
  - delante de las naciones
  - ante los ojos de las naciones
  lexicon: HALOT
  rationale: La expresión idiomática hebrea apunta a una exposición pública. 'A los ojos de las naciones' suena natural en español y conserva la fuerza visual del original.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto profético-geopolítico, 'naciones' es la opción más clara y coherente con la distinción respecto de 'los pueblos' en la primera mitad del verso.
- source_word: וְיָשְׁבוּ עַל אַדְמָתָם
  english_pob_choice: then they will dwell on their own land
  chosen_spanish: entonces habitarán en su propia tierra
  alternatives_spanish:
  - entonces vivirán en su tierra
  - entonces se establecerán en su tierra
  lexicon: HALOT
  rationale: יָשַׁב aquí denota residencia estable. 'Habitarán' es digno y preciso; 'su propia tierra' explicita el sufijo posesivo de manera natural en español.
- source_word: אַדְמָתָם
  english_pob_choice: their own land
  chosen_spanish: su propia tierra
  alternatives_spanish:
  - su tierra
  - su suelo
  lexicon: HALOT
  rationale: אֲדָמָה puede significar tierra/terreno. En un contexto de restauración, 'tierra' es la equivalencia más inteligible y fiel.
- source_word: אֲשֶׁר נָתַתִּי לְעַבְדִּי לְיַעֲקֹב
  english_pob_choice: that I gave to my servant Jacob
  chosen_spanish: que di a mi siervo Jacob
  alternatives_spanish:
  - que le di a mi siervo Jacob
  - que entregué a mi siervo Jacob
  lexicon: HALOT
  rationale: Se conserva el orden natural en español y el título pactual 'mi siervo Jacob', sin sustituirlo por formas más interpretativas.
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: El texto hebreo contiene el Tetragrámaton; el proyecto español usa 'Yahvé' como forma principal. En este compuesto se mantiene 'Señor' para אֲדֹנָי y 'Yahvé' para יְהוִה, preservando ambos elementos sin enmascarar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וְנִקְדַּשְׁתִּי בָם
  english_pob_reading: I show myself holy among them
  chosen_spanish_reading: seré santificado en ellos
  alternative_spanish_readings:
  - me mostraré santo entre ellos
  - seré tenido por santo en ellos
  rationale: El hebreo admite tanto santificación 'en/entre' ellos como la manifestación pública de la santidad divina. La redacción española conserva el giro más cercano al hebreo y no resuelve de manera excesiva la tensión entre santificación pasiva y manifestación pública.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La fuente inglesa fue revisada una vez para cambiar 'through them' por 'among them' en וְנִקְדַּשְׁתִּי בָם. La redacción española toma en cuenta esa revisión y preserva el matiz de localización/manifestación pública con 'en ellos'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del nombre divino, conforme al estándar español del proyecto.
  - Se distingue 'pueblos' de 'naciones' para reflejar la diferencia entre עַמִּים y גּוֹיִם.
  - Se conserva 'casa de Israel' y 'mi siervo Jacob' como fórmulas pactuales.
  - La cláusula final usa 'su propia tierra' para expresar el posesivo de אַדְמָתָם de forma natural en español.
