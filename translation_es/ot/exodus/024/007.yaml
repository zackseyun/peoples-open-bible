  to: 'Entonces tomó el Libro del Pacto y lo leyó a oídos del pueblo, y ellos dijeron: «Todo lo que Yahvé ha hablado haremos, y obedeceremos[a]».'
  rationale: Se corrigió la frase pública de lectura para conservar el matiz auditivo de בְּאָזְנֵי הָעָם, se movió el marcador de nota al término que realmente explica («obedeceremos»), y se ajustó la puntuación de la cita al uso español. Se mantuvo «Yahvé» y la elección principal «obedeceremos» por coherencia con el audit trail inglés revisado.
