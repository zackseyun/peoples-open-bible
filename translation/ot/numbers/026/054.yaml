id: NUM.26.54
reference: Numbers 26:54
source:
  edition: WLC
  text: לָ/רַ֗ב תַּרְבֶּה֙ נַחֲלָת֔/וֹ וְ/לַ/מְעַ֕ט תַּמְעִ֖יט נַחֲלָת֑/וֹ אִ֚ישׁ לְ/פִ֣י פְקֻדָ֔י/ו יֻתַּ֖ן נַחֲלָתֽ/וֹ׃
translation:
  text: To the larger group you shall increase its inheritance[a], and to the smaller group you shall diminish its inheritance[b]; each man's inheritance shall be given according to those numbered from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'each man' uses a masculine singular distributively; the sense is that each tribal group receives its inheritance in proportion to its census count.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to his numbered ones' / 'according to his census count.' The Hebrew phrase is concise and ties the allotment directly to the number counted.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָרַב
  chosen: to the larger group
  alternatives:
  - to the many
  - to the greater number
  - for the numerous
  lexicon: HALOT
  rationale: The adjective רַב here functions substantivally with the preposition, referring to the tribe/clan with the larger population in the census context. 'Larger group' communicates comparative size more naturally in English than the more literal 'to the many.'
- source_word: תַּרְבֶּה
  chosen: you shall increase
  alternatives:
  - you shall make great
  - you shall enlarge
  lexicon: HALOT
  rationale: Hiphil of רבה conveys causing to become many/great. In context of land allotment, 'increase' fits the proportional distribution of inheritance.
- source_word: נַחֲלָתוֹ
  chosen: its inheritance
  alternatives:
  - its allotted inheritance
  - its possession
  lexicon: HALOT
  rationale: נַחֲלָה denotes inheritance/allotted possession, especially land apportioned by divine or legal right. The 3ms suffix refers to the group represented as grammatically singular; English 'its inheritance' preserves the collective sense.
- source_word: וְלַמְעַט
  chosen: and to the smaller group
  alternatives:
  - and to the few
  - and to the lesser number
  lexicon: HALOT
  rationale: As with לָרַב, the adjective functions substantivally in census-allotment context. 'Smaller group' best conveys the comparative population sense.
- source_word: תַּמְעִיט
  chosen: you shall diminish
  alternatives:
  - you shall reduce
  - you shall make small
  lexicon: HALOT
  rationale: Hiphil of מעט means to make less/smaller. In context, it refers to assigning a smaller inheritance proportionally.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular used distributively. Per translation philosophy, gender-accurate rendering is preferred where the source uses masculine representative language. Here 'each man' preserves the form while functioning distributively over the tribal units represented by their counted members.
- source_word: לְפִי
  chosen: according to
  alternatives:
  - in proportion to
  - by the measure of
  lexicon: HALOT
  rationale: The idiom לְפִי means 'according to' or 'in proportion to.' 'According to' is clear and idiomatic, while the proportional sense is supplied by context.
- source_word: פְקֻדָיו
  chosen: those numbered from him
  alternatives:
  - his numbered ones
  - his census count
  - those enrolled for him
  lexicon: HALOT
  rationale: From פקד in the passive/participle-derived nominal sense, referring to those counted in the census. Because the suffix is singular and אִישׁ is distributive, the phrase means each one's allotment corresponds to his counted number. 'Those numbered from him' is somewhat formal but preserves the relation without overparaphrasing.
- source_word: יֻתַּן
  chosen: shall be given
  alternatives:
  - shall be assigned
  - shall be allotted
  lexicon: HALOT
  rationale: Passive of נתן, 'be given.' In land-distribution context 'assigned' or 'allotted' are possible, but 'shall be given' stays closer to the Hebrew while remaining natural.
