base_translation:
  language: en
  yaml_path: translation/ot/1_kings/019/002.yaml
  text: Then Jezebel sent a messenger to Elijah[a], saying, “So may the gods do, and more also, if by this time tomorrow I do not make your life like the life of one of them.”
  footnotes:
  - marker: a
    text: Or, 'So may God do to me, and more also.' The Hebrew אֱלֹהִים can be read as singular 'God' or plural 'gods'; here the plural sense fits Jezebel's setting and the plural verbs in the oath formula.
    reason: alternative_reading
