translation:
  language: es
  text: Pero, puesto que te complaciste en poner tu gloria entre tu pueblo Israel, santificaste este lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀλλ᾽
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: LSJ
  rationale: Conserva el valor adversativo directo del griego y suena natural en español moderno. 'Pero' mantiene la relación con lo anterior sin endurecer el tono.
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: como
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: LSJ
  rationale: Aquí introduce fundamento causal; 'como' ofrece un enlace causal fluido y natural en español, equivalente funcional de 'since' en este contexto.
- source_word: εὐδόκησας
  english_pob_choice: you were pleased
  chosen_spanish: te complaciste en
  alternatives_spanish:
  - te agradó
  - quisiste
  lexicon: LSJ
  rationale: El verbo expresa aprobación favorable o deleite. 'Te complaciste en' conserva el matiz volitivo y afectivo sin reducirlo a mera decisión.
- source_word: τὴν δόξαν σου
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu esplendor
  - tu honra
  lexicon: LSJ
  rationale: '''Gloria'' es el equivalente directo y teológicamente adecuado para δόξα en este contexto sagrado. Se mantiene la formulación tradicional y transparente.'
- source_word: ἐν τῷ λαῷ σου Ἰσραήλ
  english_pob_choice: among your people Israel
  chosen_spanish: entre tu pueblo Israel
  alternatives_spanish:
  - en tu pueblo Israel
  - en medio de tu pueblo Israel
  lexicon: LSJ
  rationale: El griego dice literalmente 'en'; en español, 'entre' comunica mejor la presencia manifiesta de la gloria divina en el pueblo sin introducir una lectura más específica que el texto no exige.
- source_word: ἡγίασας
  english_pob_choice: you sanctified
  chosen_spanish: santificaste
  alternatives_spanish:
  - consagraste
  - hiciste santo
  lexicon: LSJ
  rationale: '''Santificaste'' preserva el registro cultual y teológico de ἁγιάζω y corresponde bien al uso bíblico en español sin perder precisión.'
- source_word: τὸν τόπον τοῦτον
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  - este recinto
  lexicon: LSJ
  rationale: '''Lugar'' traduce de manera fiel τόπος sin especificar indebidamente un santuario; mantiene la amplitud semántica del griego.'
theological_decisions:
- issue: Holiness language applied to the location
  english_pob_reading: you sanctified this place
  chosen_spanish_reading: santificaste este lugar
  alternative_spanish_readings:
  - consagraste este lugar
  - hiciste santo este lugar
  rationale: El griego usa ἁγιάζω, lenguaje explícito de santificación. 'Santificaste' conserva la categoría teológica sin suavizarla ni sustituirla por un término más estrecho.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: The English audit trail and latest revision indicate high agreement and no changes were needed; the Spanish draft follows the same source-grounded decisions while adapting only for natural Spanish syntax.
  spanish_consistency_notes:
  - 'Se mantiene el orden conceptual del griego: contraste (''Pero''), fundamento causal (''como''), complacencia divina, gloria, pueblo Israel y santificación del lugar.'
  - Se evita traducir mecánicamente 'en' por 'en' donde el español requiere una relación más natural; 'entre' conserva la idea relacional sin ampliar el sentido.
  - Se conserva 'Israel' sin artículo para reflejar el nombre propio tal como aparece en el griego.
