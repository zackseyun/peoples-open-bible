base_translation:
  language: en
  yaml_path: translation/ot/genesis/031/052.yaml
  text: This heap is a witness[a], and the pillar is a witness, that I will not pass over this heap toward you[c][b], and that you will not pass over this heap and this pillar toward me for harm.
  footnotes:
  - marker: a
    text: Or 'This heap is a witness, and the pillar is witness.' The Hebrew repeats the witness idea in parallel for both boundary markers.
    reason: lexical_alternative
  - marker: b
    text: Or 'cross' instead of 'pass over'; the sense is crossing this boundary marker.
    reason: lexical_alternative
  - marker: c
    text: '''For harm'' means with harmful or hostile intent, not merely physical movement across the boundary.'
    reason: cultural_note
