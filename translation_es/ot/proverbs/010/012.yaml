translation:
  language: es
  text: El odio aviva contiendas, pero el amor cubre[a] todas las transgresiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cubre todas las transgresiones»; la imagen es la del amor que no expone ni sigue perpetuando las ofensas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂנְאָה
  english_pob_choice: Hatred
  chosen_spanish: odio
  alternatives_spanish:
  - odio
  - aborrecimiento
  lexicon: HALOT
  rationale: El sustantivo abstracto en función de sujeto pide en español una forma natural y directa. «Odio» comunica bien la fuerza relacional negativa del término y mantiene el contraste con «amor»; «aborrecimiento» sería más marcado pero menos natural en este proverbio.
- source_word: תְּעוֹרֵר
  english_pob_choice: stirs up
  chosen_spanish: provoca
  alternatives_spanish:
  - despierta
  - incita
  - agita
  lexicon: HALOT
  rationale: El verbo expresa una acción causativa de poner en marcha o alimentar el conflicto. «Provoca» es idiomático en español y conserva la idea de activar disputas sin introducir una explicación más interpretativa que el hebreo.
- source_word: מְדָנִים
  english_pob_choice: conflicts
  chosen_spanish: conflictos
  alternatives_spanish:
  - contiendas
  - pleitos
  - disputas
  lexicon: HALOT
  rationale: El plural hebreo alude a disputas o contiendas. «Conflictos» es claro y de uso amplio; «contiendas» sería más tradicional, pero menos transparente para lectores modernos.
- source_word: וְ/עַל
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y sobre
  - y acerca de
  lexicon: HALOT
  rationale: Aunque la forma subyacente es literalmente conjuntivo-preposicional, en el paralelismo antitético funciona como contraste. «Pero» expresa en español esa relación sin perder el giro del proverbio.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - cada una de
  - todo
  lexicon: HALOT
  rationale: Con un objeto plural, «todas» mantiene el alcance total del cuantificador de manera natural en español.
- source_word: פְּשָׁעִים
  english_pob_choice: transgressions
  chosen_spanish: transgresiones
  alternatives_spanish:
  - ofensas
  - rebeldías
  - faltas
  lexicon: HALOT
  rationale: פֶּשַׁע / פְּשָׁעִים suele implicar infracción u ofensa grave. «Transgresiones» conserva el peso moral del término sin reducirlo a una mera falta social.
- source_word: תְּכַסֶּה
  english_pob_choice: covers
  chosen_spanish: cubre
  alternatives_spanish:
  - oculta
  - encubre
  - perdona
  lexicon: HALOT
  rationale: Se preserva el verbo de imagen corporal/metafórica «cubrir». «Cubre» permite mantener la metáfora y evita sustituirla por una explicación teológica como «perdona», que el hebreo no dice explícitamente.
- source_word: אַהֲבָה
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  - afecto
  lexicon: HALOT
  rationale: «Amor» es el equivalente directo y mantiene el contraste sapiencial con «odio».
theological_decisions:
- issue: Sentido de «cubre todas las transgresiones»
  english_pob_reading: Love covers all transgressions, preserving the metaphor without flattening it into explicit forgiveness language.
  chosen_spanish_reading: El amor no anda aireando ni alimentando las ofensas; las cubre, conservando la metáfora de cubrir.
  alternative_spanish_readings:
  - El amor perdona todas las ofensas.
  - El amor encubre toda falta.
  rationale: El hebreo usa un verbo metafórico de cubrir, no un término técnico de perdón. La traducción conserva esa imagen y evita tanto una explicitación doctrinal excesiva como la idea ética problemática de ocultar injusticias.
  doctrine_reference: Mantener la tensión lexical y teológica del proverbio.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el acuerdo con el control cruzado fue alto; por ello se mantiene una solución sobria y directa, sin expandir el texto más allá de la evidencia hebrea y del trazo auditado en inglés.
  spanish_consistency_notes:
  - Se usa «amor» y «odio» para preservar el contraste sapiencial básico del proverbio.
  - «Transgresiones» mantiene un registro bíblico claro sin volver el verso arcaizante.
  - No se introduce «perdona» en el texto principal para no resolver la metáfora hebrea de manera interpretativa.
  - La puntuación con coma refleja el paralelismo antitético del hebreo y la coordinación adversativa natural en español.
