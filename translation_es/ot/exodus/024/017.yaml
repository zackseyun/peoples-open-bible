revisions:
- from: Y la apariencia de la gloria de Yahvé era como fuego consumidor en la cima del monte, a los ojos de los hijos de Israel[a][b].
  to: Y la apariencia de la gloria de Yahvé era como fuego consumidor en la cima del monte, ante los ojos de los hijos de Israel[a][b].
  rationale: Se hizo una reparación menor para mejorar la naturalidad de לְעֵינֵי con «ante los ojos de», sin perder el énfasis visual del hebreo. También se depuró la nota b para que contenga solo una alternativa real en español y no repita la misma formulación del texto principal.
