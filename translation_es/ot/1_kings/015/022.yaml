translation:
  language: es
  text: Entonces el rey Asa convocó[a] a todo Judá—nadie quedó exento[b]—y se llevaron las piedras de Ramá y su maderamen, con los cuales Baasa había construido[c], y el rey Asa edificó con ellos Geba de Benjamín y Mizpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo oír». El verbo hebreo literalmente significa «hizo escuchar».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no hay exento», es decir, nadie fue dispensado de la tarea.'
    reason: lexical_alternative
  - marker: c
    text: La cláusula «con los cuales Baasa había construido» modifica a las piedras y al maderamen como materiales usados en Ramá.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁמִיעַ
  english_pob_choice: summoned
  chosen_spanish: convocó
  alternatives_spanish:
  - hizo llamar
  - anunció
  - dio aviso
  lexicon: HALOT
  rationale: El hifil de שׁמע aquí expresa hacer llegar una convocatoria o llamar públicamente a Judá. 'Convocó' reproduce bien la fuerza práctica del contexto sin caer en una traducción demasiado literal como 'hizo oír'.
- source_word: אֵין נָקִי
  english_pob_choice: no one was exempt
  chosen_spanish: nadie quedó exento
  alternatives_spanish:
  - no hubo exento
  - ninguno fue libre
  - nadie fue excusado
  lexicon: HALOT
  rationale: En este contexto de movilización, נָקִי no significa inocencia moral, sino estar libre de obligación. 'Nadie quedó exento' conserva ese sentido administrativo y evita la lectura ética.
- source_word: וַיִּשְׂאוּ
  english_pob_choice: they carried away
  chosen_spanish: se llevaron
  alternatives_spanish:
  - cargaron
  - transportaron
  - retiraron
  lexicon: HALOT
  rationale: El verbo indica que tomaron los materiales de Ramá para retirarlos y reutilizarlos. 'Se llevaron' expresa bien la remoción y el traslado sin sonar forzado en español.
- source_word: אַבְנֵי הָרָמָה
  english_pob_choice: the stones of Ramah
  chosen_spanish: las piedras de Ramá
  alternatives_spanish:
  - las piedras de Ramá
  - las piedras de la Ramá
  lexicon: HALOT
  rationale: La relación de constructo se rinde naturalmente como 'de Ramá'. Se conserva el nombre propio del lugar sin añadir explicaciones innecesarias al texto principal.
- source_word: עֵצֶיהָ
  english_pob_choice: its timber
  chosen_spanish: su madera
  alternatives_spanish:
  - su madera de construcción
  - sus vigas
  - su madera de obra
  lexicon: HALOT
  rationale: El término hebreo se refiere a material de construcción de madera. 'Madera' es claro y natural en español; se evita 'madera' como mero material genérico mediante el contexto de reutilización de obras.
- source_word: אֲשֶׁר בָּנָה בַּעְשָׁא
  english_pob_choice: with which Baasha had built
  chosen_spanish: con las cuales Baasa había construido
  alternatives_spanish:
  - que Baasa había usado para construir
  - que Baasa había levantado
  - con las que Baasa había edificado
  lexicon: HALOT
  rationale: La cláusula relativa modifica los materiales y expresa su función instrumental. 'Con las cuales' evita la ambigüedad de entender que Baasa 'construyó' la madera misma.
- source_word: וַיִּבֶן בָּם
  english_pob_choice: built with them
  chosen_spanish: edificó con ellas
  alternatives_spanish:
  - construyó con ellas
  - las reutilizó para edificar
  - levantó con ellas
  lexicon: HALOT
  rationale: El sufijo pronominal remite a las piedras y la madera como materiales de reutilización. 'Edificó con ellas' conserva el valor instrumental y suena natural en español bíblico contemporáneo.
- source_word: גֶּבַע בִּנְיָמִן
  english_pob_choice: Geba of Benjamin
  chosen_spanish: Geba de Benjamín
  alternatives_spanish:
  - Geba en Benjamín
  - Gueba de Benjamín
  lexicon: HALOT
  rationale: Se mantiene el topónimo con la relación territorial explícita. 'De Benjamín' es la manera más natural y precisa de reflejar la apposición hebrea.
- source_word: הַמִּצְפָּה
  english_pob_choice: Mizpah
  chosen_spanish: Mizpa
  alternatives_spanish:
  - Mizpá
  - la Mizpa
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma más usual en español bíblico moderno. Se omite el artículo hebreo porque no suele conservarse en topónimos castellanos.
theological_decisions:
- issue: Sentido de אֵין נָקִי en un contexto de convocatoria laboral/militar
  english_pob_reading: no one was exempt
  chosen_spanish_reading: nadie quedó exento
  alternative_spanish_readings:
  - nadie fue inocente
  - no hubo limpio
  rationale: La decisión evita una lectura moral de 'limpio/inocente' y conserva el sentido contextual de no quedar libre del deber convocado por el rey. No plantea una cuestión doctrinal, sino de precisión semántica.
  doctrine_reference: No aplica; decisión lexicográfica-contextual.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso alto del audit trail en inglés (sin cambios de revisión aplicados) y conserva las decisiones léxicas clave: הִשְׁמִיעַ como convocatoria, אֵין נָקִי como exención laboral, וַיִּשְׂאוּ como traslado de materiales y el valor instrumental de בָּם.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo lo exija explícitamente; este versículo no contiene el tetragrámaton, así que no aparece.
  - Se mantuvo 'Baasa' y 'Benjamín' con transliteración española habitual.
  - '''Mizpa'' se eligió por claridad y uso bíblico en español, evitando formas más arcaicas.'
