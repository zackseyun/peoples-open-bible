revisions:
- from: 'Y los vecinos se burlaban[a], diciendo: «Ya no teme ser asesinado por este asunto; huyó, y mira, otra vez entierra a los muertos».'
  to: 'Y los vecinos se burlaban[a], diciendo: «Ya no teme ser ejecutado por este asunto; huyó, y mira, otra vez entierra a los muertos».'
  rationale: Se conserva la redacción general del borrador porque refleja fielmente el griego y la auditoría inglesa. Solo se ajusta «ser asesinado» a «ser ejecutado» para evitar una especificación no exigida por φονευθῆναι y acercarse mejor al sentido contextual de amenaza de muerte oficial.
