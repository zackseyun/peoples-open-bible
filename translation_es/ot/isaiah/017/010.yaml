  text: כִּ֤י שָׁכַ֨חַתְּ֙ אֱלֹהֵ֣י יִשְׁעֵ֔/ךְ וְ/צ֥וּר מָעֻזֵּ֖/ךְ לֹ֣א זָכָ֑רְתְּ עַל כֵּ֗ן תִּטְּעִי֙ נִטְעֵ֣י נַעֲמָנִ֔ים וּ/זְמֹ֥רַת זָ֖ר תִּזְרָעֶֽ/נּוּ־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/017/010.yaml
  text: For you have forgotten the God of your salvation[a], and have not remembered the Rock of your refuge[c][b]; therefore you plant delightful plants and set it with a foreign vine.
  footnotes:
  - marker: a
    text: Or 'choice plantings'; possibly an allusion to cultivated plants used in foreign religious practice.
    reason: lexical_alternative
  - marker: b
    text: Or 'a strange cutting' or 'an alien shoot.'
    reason: lexical_alternative
  - marker: c
    text: The agricultural imagery may imply reliance on foreign cults or alliances rather than on the LORD, but the Hebrew does not state this explicitly.
    reason: cultural_note
