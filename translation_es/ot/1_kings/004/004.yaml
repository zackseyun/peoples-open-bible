  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Sacerdotes» alinea bien con la decisión POB para כֹּהֲנִים, y la nota conserva la alternativa administrativa. Las formas de nombres hispanizadas son aceptables en español eclesial amplio.
