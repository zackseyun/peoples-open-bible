translation:
  language: es
  text: Ahora bien, cuando Sambalat, Tobías, los árabes, los amonitas y los asdoditas[a] oyeron que la reparación de los muros de Jerusalén había avanzado[b], que las brechas[c] habían comenzado a cerrarse, se irritaron muchísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los asdodios'. El hebreo usa un gentilicio derivado de Asdod.
    reason: lexical_alternative
  - marker: b
    text: O 'la restauración de los muros de Jerusalén había avanzado'. El hebreo emplea un término asociado a sanidad/restauración para describir metafóricamente la obra de reparación.
    reason: lexical_alternative
  - marker: c
    text: O 'los huecos' en lugar de 'las brechas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַאֲשֶׁר
  english_pob_choice: Now when
  chosen_spanish: Ahora bien, cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Cuando
  lexicon: HALOT
  rationale: La combinación narrativa introduce una nueva escena. 'Ahora bien, cuando' conserva el giro discursivo y suena natural en español sin caer en un calco rígido.
- source_word: שָׁמַע
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - supieron
  lexicon: HALOT
  rationale: Aquí el verbo comunica recepción de noticia. 'Oyeron' mantiene el valor directo del hebreo y funciona bien con la cadena de sujetos.
- source_word: סַנְבַלַּט וְטוֹבִיָּה
  english_pob_choice: Sanballat and Tobiah
  chosen_spanish: Sambalat y Tobías
  alternatives_spanish:
  - Sanbalat y Tobías
  lexicon: HALOT
  rationale: Se transliteran los nombres propios con una forma española de uso bíblico común; 'Sambalat' refleja la pronunciación habitual en español, y 'Tobías' es la forma asentada.
- source_word: הָעַרְבִים
  english_pob_choice: the Arabs
  chosen_spanish: los árabes
  alternatives_spanish:
  - los arabios
  lexicon: HALOT
  rationale: El término designa a los pueblos árabes en sentido étnico. 'Árabes' es el etnónimo más claro y natural en español.
- source_word: הָעַמֹּנִים
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los ammonitas
  lexicon: HALOT
  rationale: Gentilicio estándar en español para el pueblo de Amón.
- source_word: הָאַשְׁדּוֹדִים
  english_pob_choice: the Ashdodites
  chosen_spanish: los asdoditas
  alternatives_spanish:
  - los habitantes de Asdod
  lexicon: HALOT
  rationale: Se conserva el gentilicio derivado de Asdod, como en el inglés POB. Es preciso y compacto.
- source_word: עָלְתָה אֲרוּכָה
  english_pob_choice: the repair ... had gone up
  chosen_spanish: la reparación ... había subido
  alternatives_spanish:
  - la restauración ... había avanzado
  - la curación ... había subido
  lexicon: HALOT
  rationale: אֲרוּכָה puede abarcar 'curación', 'restauración' o 'reparación'. En el contexto de muros, 'reparación' evita el desvío médico, y 'había subido' conserva la imagen verbal de עלתה que el inglés POB preservó con 'had gone up'.
- source_word: לְחֹמוֹת יְרוּשָׁלִַם
  english_pob_choice: of Jerusalem’s walls
  chosen_spanish: de los muros de Jerusalén
  alternatives_spanish:
  - de las murallas de Jerusalén
  - de los muros de Jerusalén
  lexicon: HALOT
  rationale: El sustantivo hebreo se refiere a muros o murallas. 'Muros' es fiel y claro; el posesivo en español expresa la relación sin alterar el sentido.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido reportado de lo oído, así que en español corresponde 'que'.
- source_word: הֵחֵלּוּ
  english_pob_choice: had begun
  chosen_spanish: había comenzado
  alternatives_spanish:
  - habían comenzado
  - habían empezado
  lexicon: HALOT
  rationale: El español natural usa singular concordando con 'la reparación' en la primera cláusula y mantiene el valor de anterioridad del inglés POB.
- source_word: הַפְּרֻצִים
  english_pob_choice: the breaches
  chosen_spanish: las brechas
  alternatives_spanish:
  - las aberturas
  - los portillos
  lexicon: HALOT
  rationale: Se trata de roturas en el muro. 'Brechas' es el término arquitectónico más preciso y coincide con la opción del POB inglés.
- source_word: לְהִסָּתֵם
  english_pob_choice: to be closed
  chosen_spanish: a cerrarse
  alternatives_spanish:
  - a ser cerradas
  - a taparse
  lexicon: HALOT
  rationale: El infinitivo pasivo expresa el proceso de ser cerradas. 'A cerrarse' suena natural en español y conserva la idea de cierre progresivo.
- source_word: וַיִּחַר לָהֶם מְאֹד
  english_pob_choice: they became very angry
  chosen_spanish: se irritaron muchísimo
  alternatives_spanish:
  - se enojaron muchísimo
  - se enfurecieron mucho
  lexicon: HALOT
  rationale: El hebreo expresa ardor/encendimiento de ira. 'Se irritaron muchísimo' conserva la fuerza emocional sin sobrerinterpretar como furia extrema en todos los casos.
theological_decisions:
- issue: Tratamiento del nombre divino / ausencia del Tetragrámaton en este versículo
  english_pob_reading: No divine name appears in the verse.
  chosen_spanish_reading: No se introduce ninguna sustitución reverencial ni máscara en el texto.
  alternative_spanish_readings:
  - usar 'SEÑOR' por convención
  - introducir 'Yahvé' por sistema
  rationale: El versículo no contiene יהוה ni una cita directa que lo requiera. Por fidelidad al texto, no se añade ninguna referencia al nombre divino.
  doctrine_reference: Fidelidad textual al hebreo consonántico y al contexto inmediato
translation_notes:
  revision_awareness: 'La revisión en inglés no introdujo cambios sustanciales: el pasaje quedó estable con las mismas opciones léxicas y la misma lectura óptima-equivalente. La versión española refleja ese estado estable sin añadir interpretaciones nuevas.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el hebreo lo exige; aquí no aparece.
  - Se conserva 'brechas' para el campo semántico de roturas en muros, en paralelo con la opción inglesa.
  - '''Muros'' se usa de forma consistente con el contexto de reconstrucción, sin ampliar a ''murallas'' salvo como alternativa.'
  - Los nombres propios se transliteran según uso español bíblico reconocible y no se normalizan al inglés.
