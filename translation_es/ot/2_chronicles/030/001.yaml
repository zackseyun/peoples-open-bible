base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/030/001.yaml
  text: Then Hezekiah sent word to all Israel and Judah[a], and also wrote letters to Ephraim and Manasseh, to come to the house of Yahweh in Jerusalem to keep the Passover to Yahweh[c][b], the God of Israel.
  footnotes:
  - marker: a
    text: Or 'throughout all Israel and Judah'; the Hebrew preposition can suggest the message was sent broadly across the land as well as directed to the people.
    reason: lexical_alternative
  - marker: b
    text: Or 'to celebrate the Passover.' The Hebrew literally says 'to do/make Passover,' an idiom for observing the feast.
    reason: lexical_alternative
  - marker: c
    text: Or 'to keep the Passover to the LORD'.
    reason: previous_rendering
