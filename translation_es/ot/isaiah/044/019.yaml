    text: O «no lo vuelve a su corazón» o «no lo considera en su interior»; el hebreo expresa traer algo a la mente y al corazón para reflexionarlo seriamente.
    reason: lexical_alternative
  revision_rationale: Se ajusta el modismo inicial para reflejar mejor el hebreo idiomático de reflexión interior; se cambia «rosticé» por «asé» para mayor neutralidad panhispánica; y se aligera la referencia pronominal en «la mitad» / «el resto» para un español más natural sin pérdida de sentido. Se conserva «trozo de madera» como opción aceptable para la frase despectiva, aunque algo menos afilada que «bloque de madera».
