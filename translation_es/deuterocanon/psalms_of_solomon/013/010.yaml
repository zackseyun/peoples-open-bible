revisions:
- from: Pero los pecadores serán [a] llevados a la destrucción, y no se hallará ya más memoria de ellos.
  to: Pero los pecadores serán llevados[a] a la destrucción, y no se hallará más memoria de ellos.
  rationale: Se conserva la estructura y el sentido del borrador, pero se mejora la naturalidad española moviendo el marcador de nota al verbo completo y sustituyendo «ya más» por «más», que expresa de forma idiomática la negación continuada de ἔτι en esta cláusula. No se requiere una revisión mayor ni adjudicación adicional.
