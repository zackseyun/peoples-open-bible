translation:
  language: es
  text: Los odio[a] con odio completo; se han vuelto enemigos para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con odio total» o «con odio perfecto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּכְלִית
  english_pob_choice: complete
  chosen_spanish: completo
  alternatives_spanish:
  - total
  - pleno
  - perfecto
  lexicon: HALOT
  rationale: El sustantivo intensifica la noción de odio con idea de totalidad o plenitud. «Completo» conserva esa fuerza superlativa en español moderno sin caer en un calco arcaizante.
- source_word: שִׂנְאָה
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - odio total
  - aborrecimiento
  - hatred
  lexicon: HALOT
  rationale: En español, «odio» funciona con naturalidad como el sustantivo correspondiente y preserva el paralelismo con el hebreo, donde la construcción nominal intensifica la fuerza del verso.
- source_word: שְׂנֵאתִי/ם
  english_pob_choice: I hate them
  chosen_spanish: los odié
  alternatives_spanish:
  - los odio
  - los he odiado
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar una postura poética actual. En español, el pretérito «los odié» transmite el acto/posición del hablante con fuerza y evita una forma demasiado literal o pesada.
- source_word: לְאוֹיְבִים
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - como enemigos
  - por enemigos
  lexicon: HALOT
  rationale: El complemento con ל y היה expresa estado resultante o rol. «Enemigos» mantiene el resultado sin añadir elementos interpretativos innecesarios.
- source_word: הָיוּ לִי
  english_pob_choice: they have become enemies to me
  chosen_spanish: se han vuelto enemigos para mí
  alternatives_spanish:
  - han llegado a ser enemigos para mí
  - me han llegado a ser enemigos
  lexicon: HALOT
  rationale: «Se han vuelto» comunica el valor resultativo de היה + ל de manera natural en español y conserva la relación hostil hacia el hablante.
theological_decisions:
- issue: Intensidad del lenguaje de odio
  english_pob_reading: Retain the strong language of personal hatred without softening it.
  chosen_spanish_reading: Conservar el lenguaje fuerte del odio personal sin suavizarlo.
  alternative_spanish_readings:
  - Los rechacé completamente
  - Los considero enemigos
  rationale: El hebreo repite el campo léxico del odio y lo intensifica; la traducción no debe amortiguar esa dureza. En español, «los odié con odio completo» mantiene la tensión textual y la fuerza retórica del salmo.
  doctrine_reference: Principios de traducción §1, §3, §6
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés coinciden en la lectura principal; no se detectan revisiones sustantivas aplicadas en la última pasada. Se mantiene la fuerza del hebreo y la equivalencia óptima para el español.
  spanish_consistency_notes:
  - Se preservó la tensión semántica entre el sustantivo intensificador y el verbo de odio.
  - Se evitó sustituir el lenguaje de odio por una paráfrasis ética interpretativa.
  - La expresión final «para mí» reproduce la orientación relacional del original sin añadir carga explicativa.
