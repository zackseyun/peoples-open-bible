translation:
  language: es
  text: Yahvé ha establecido su trono en los cielos[a], y su reino gobierna sobre todo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «en el cielo». El hebreo está en plural: «en los cielos».'
    reason: lexical_alternative
  - marker: b
    text: O «su realeza» o «su reinado gobierna sobre todo». El hebreo puede referirse a la realeza o al reinado, además del reino.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: equivalencia doctrinal POB para el Nombre divino
  rationale: Se mantiene la transliteración del nombre divino, no la sustitución por un título. «Yahvé» es la forma española coherente con la política del proyecto y preserva el nombre personal del pacto.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: HALOT
  rationale: El hebreo usa plural ('los cielos'); por eso se conserva el plural en español. «En los cielos» suena natural y refleja mejor la forma hebrea que el singular.
- source_word: הֵכִין
  english_pob_choice: has established
  chosen_spanish: ha establecido
  alternatives_spanish:
  - ha puesto
  - ha preparado
  - ha afirmado
  lexicon: HALOT
  rationale: El verbo en hifil expresa establecer o hacer firme. «Ha establecido» comunica bien la idea de un trono firmemente asentado en contexto real.
- source_word: כִּסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - su asiento real
  - su trono
  lexicon: HALOT
  rationale: La imagen de כסא en contexto de realeza se traduce de manera directa como «trono», sin necesidad de expansión.
- source_word: וּמַלְכוּתוֹ
  english_pob_choice: and his kingdom
  chosen_spanish: y su reino
  alternatives_spanish:
  - y su realeza
  - y su dominio
  - y su reino
  lexicon: HALOT
  rationale: En español, «reino» es la opción más natural y conserva el alcance de dominio soberano. «Realeza» o «dominio» serían posibles, pero menos directos aquí.
- source_word: בַּכֹּל
  english_pob_choice: over all
  chosen_spanish: sobre todo
  alternatives_spanish:
  - sobre todas las cosas
  - sobre todo
  lexicon: HALOT
  rationale: La preposición con el alcance universal de משל expresa soberanía sobre todo cuanto existe. «Sobre todo» es breve, idiomático y fiel al sentido total.
- source_word: מָשָׁלָה
  english_pob_choice: rules
  chosen_spanish: domina
  alternatives_spanish:
  - reina
  - gobierna
  - ejerce dominio
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar gobernar o ejercer dominio. «Domina» comunica la idea de autoridad efectiva y universal sin volver la frase excesivamente explicativa. Se conserva la fuerza poética del presente gnómico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se adopta la transliteración del Nombre para evitar la sustitución tradicional por un título. Esto mantiene la referencia explícita al nombre del pacto en la línea del audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH / יְהוָה'
- issue: Valor aspectual del verbo final en poesía de soberanía
  english_pob_reading: rules
  chosen_spanish_reading: domina
  alternative_spanish_readings:
  - reina
  - gobierna
  - ha dominado
  rationale: Aunque la forma hebrea es perfectiva, en este contexto poético expresa una verdad estable y vigente. «Domina» en presente comunica esa soberanía continua sin forzar un pasado puntual.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: 'Se revisó el audit trail inglés y el estado de concordancia: no hubo cambios aplicados y el último pase quedó sin modificaciones. La versión española sigue esa lectura estable, conservando el plural de שָׁמַיִם, el nombre divino transliterado y el valor gnómico del verbo final.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se preserva el plural «cielos» para reflejar שָׁמַיִם.
  - «Reino» se usa como equivalente natural de מַלְכוּת, sin borrar la posibilidad semántica de realeza o reinado.
  - El presente «domina» comunica una soberanía continua en español, coherente con el uso gnómico del hebreo.
