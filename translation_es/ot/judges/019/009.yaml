translation:
  language: es
  text: 'Entonces el hombre se levantó para irse, él, su concubina y su criado[a]; pero su suegro, el padre de la joven, le dijo: «Mira, por favor, el día declina hacia el atardecer. Te ruego que pases la noche. Mira, el día está por terminar. Quédate aquí a pasar la noche, y que se alegre tu corazón. Mañana madrugarán para continuar su camino, y tú irás a tu tienda[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'su joven' o 'su ayudante'. El hebreo נַעַר puede referirse a un joven o a un asistente, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'y tú irás a tu tienda'. También puede entenderse idiomáticamente como 'y volverás a tu casa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el esposo
  lexicon: HALOT
  rationale: אִישׁ es el sustantivo ordinario para 'hombre'. En este contexto designa al levita/varón principal del relato; 'el hombre' conserva el tono narrativo sin imponer una relación más específica que el hebreo no explicita aquí.
- source_word: פִילַגְשׁוֹ
  english_pob_choice: his concubine
  chosen_spanish: su concubina
  alternatives_spanish:
  - su esposa secundaria
  - su mujer secundaria
  lexicon: HALOT
  rationale: El término alude a la categoría social-jurídica de 'concubina'. No conviene suavizarlo a 'esposa' porque el texto y la historia requieren esa precisión.
- source_word: וְנַעֲרוֹ
  english_pob_choice: his young man
  chosen_spanish: su joven
  alternatives_spanish:
  - su servidor
  - su criado
  - su ayudante
  lexicon: HALOT
  rationale: נַעַר puede significar joven, siervo o asistente. Dado que el inglés POB eligió una forma cercana al valor léxico y el contexto de viaje permite un acompañante, 'su joven' mantiene la ambigüedad del hebreo sin forzar una función más definida.
- source_word: חֹתְנוֹ
  english_pob_choice: his father-in-law
  chosen_spanish: su suegro
  alternatives_spanish:
  - su pariente por matrimonio
  lexicon: HALOT
  rationale: El parentesco aquí es inequívoco; el contexto inmediato confirma la relación con el padre de la joven. 'Suegro' es la equivalencia natural y exacta en español.
- source_word: אֲבִי הַנַּעֲרָה
  english_pob_choice: the young woman’s father
  chosen_spanish: el padre de la joven
  alternatives_spanish:
  - el padre de la muchacha
  lexicon: HALOT
  rationale: נַעֲרָה designa a una joven/muchacha. 'Joven' evita una carga infantil que 'muchacha' podría sugerir en algunos registros y conserva la referencia relacional del hebreo.
- source_word: הִנֵּה נָא
  english_pob_choice: Look now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira, por favor
  - Mira pues
  lexicon: HALOT
  rationale: La fórmula es un marcador discursivo de atención y cortesía. 'Mira ahora' comunica la urgencia suave y la apelación respetuosa con naturalidad en español.
- source_word: רָפָה הַיּוֹם לַעֲרֹב
  english_pob_choice: the day is waning toward evening
  chosen_spanish: el día se inclina hacia el atardecer
  alternatives_spanish:
  - el día va declinando hacia la tarde
  - el día se debilita hacia el atardecer
  lexicon: HALOT
  rationale: רפה expresa aflojarse, debilitarse, declinar. 'Se inclina hacia el atardecer' conserva la imagen de descenso y evita una paráfrasis excesivamente libre, a la vez que suena natural en español.
- source_word: לִינוּ נָא
  english_pob_choice: Please stay the night
  chosen_spanish: Te ruego que pases la noche
  alternatives_spanish:
  - Por favor, quédate la noche
  - Te pido que pernoctes
  lexicon: HALOT
  rationale: לון significa alojarse o pasar la noche. El singular reverencial en español se ajusta al discurso directo y 'pasar la noche' conserva el sentido idiomático sin sonar arcaico.
- source_word: חֲנוֹת הַיּוֹם
  english_pob_choice: the day is drawing to a close
  chosen_spanish: el día está por terminar
  alternatives_spanish:
  - el día ha acampado
  - el día se está asentando
  lexicon: HALOT
  rationale: El hebreo usa una imagen idiomática difícil de reproducir literalmente. 'Está por terminar' comunica con claridad el sentido temporal; la metáfora de 'acampado' queda reservada como nota implícita por no ser idiomática en español.
- source_word: לִין פֹּה
  english_pob_choice: Spend the night here
  chosen_spanish: Quédate aquí a pasar la noche
  alternatives_spanish:
  - Lodge aquí
  - Pernocta aquí
  lexicon: HALOT
  rationale: Repite la idea de לון. En español, 'quedarte aquí a pasar la noche' evita una repetición áspera y conserva la invitación hospitable.
- source_word: וְיִיטַב לְבָבֶךָ
  english_pob_choice: let your heart be glad
  chosen_spanish: que se alegre tu corazón
  alternatives_spanish:
  - que tu corazón esté contento
  - que tu corazón sea alegre
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para alegría interior. 'Que se alegre tu corazón' mantiene la imagen sin caer en una literalidad torpe.
- source_word: וְהִשְׁכַּמְתֶּם מָחָר
  english_pob_choice: Then tomorrow you may rise early
  chosen_spanish: mañana madrugarán
  alternatives_spanish:
  - mañana se levantarán temprano
  - al amanecer se pondrán en pie
  lexicon: HALOT
  rationale: El verbo está en segunda plural; en español conviene reflejar esa pluralidad con 'madrugarán'. Esto preserva la invitación al grupo sin forzar una perífrasis pesada.
- source_word: לְדַרְכְּכֶם
  english_pob_choice: for your journey
  chosen_spanish: para su camino
  alternatives_spanish:
  - para su viaje
  - para su ruta
  lexicon: HALOT
  rationale: דֶרֶךְ es 'camino/andar/viaje'. 'Para su camino' mantiene el color semítico y el movimiento del texto, mientras sigue siendo comprensible en español.
- source_word: וְהָלַכְתָּ לְאֹהָלֶךָ
  english_pob_choice: and go to your tent
  chosen_spanish: y tú irás a tu tienda
  alternatives_spanish:
  - y volverás a tu tienda
  - y te irás a tu tienda
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'a tu tienda'. 'Tienda' preserva la imaginería concreta del entorno antiguo. Se mantiene la segunda persona singular porque el hebreo dirige la frase directamente al destinatario principal.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB, que prefirió 'is waning toward evening' frente a 'has slackened'. Por eso la línea principal adopta una expresión natural de declinación temporal ('se inclina hacia el atardecer') y conserva el movimiento idiomático del hebreo sin depender de una calca del inglés. También se preservó la distinción entre la petición de hospedaje y la invitación final a continuar al día siguiente.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '''Concubina'' se conserva por precisión social-jurídica, no se suaviza a ''esposa''.'
  - '''Joven'' se usa de manera deliberadamente ambigua para נַעַר, en línea con el valor léxico abierto del hebreo.'
  - La imagen de 'tu tienda' se retiene para respetar el referente concreto del texto y su registro antiguo.
