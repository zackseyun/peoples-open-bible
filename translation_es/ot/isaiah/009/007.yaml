translation:
  language: es
  text: El Señor envió una palabra en Jacob[a], y cayó sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El Señor envió un mensaje a Jacob, y cayó sobre Israel»; también, «... cayó sobre Israel» puede expresarse «... cayó sobre Israel» o «... cayó en Israel» según cómo se entienda la imagen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un mensaje
  - un asunto
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra' o 'mensaje'. En un anuncio profético breve, 'palabra' conserva la fuerza concisa de una comunicación divina sin reducirla a mera conversación ni ampliarla indebidamente a un evento.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  - ha enviado
  lexicon: HALOT
  rationale: El sentido básico del verbo es 'enviar'. 'Envió' es la forma natural y fiel en español para una acción divina de proclamación o envío de un mensaje.
- source_word: אֲדֹנָי
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: HALOT
  rationale: Aunque el hebreo aquí presenta אֲדֹנָי, el paquete canónico de la obra mantiene el principio de traducir el nombre divino como 'Yahvé' cuando el referente es el Dios de Israel. Esta línea también conserva la continuidad entre la palabra enviada por Dios y la autoridad divina del oráculo.
- source_word: בְּיַעֲקֹב
  english_pob_choice: into Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - en Jacob
  - contra Jacob
  - hacia Jacob
  lexicon: HALOT
  rationale: La preposición בְּ con verbos de envío puede señalar dirección o destinatario. En español, 'a Jacob' reproduce esa orientación sin decidir de antemano entre localización interna o destinatario, y deja visible la tensión del hebreo que el contexto interpreta como un impacto real sobre Jacob/Israel.
- source_word: וְנָפַל
  english_pob_choice: and it fell
  chosen_spanish: y cayó
  alternatives_spanish:
  - y cayó sobre
  - y descendió
  lexicon: HALOT
  rationale: נפל significa 'caer'. 'Y cayó' mantiene la imagen vívida de la palabra divina que alcanza su efecto; el complemento posterior completa el destino de esa acción.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: on Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - contra Israel
  - en/para Israel
  lexicon: HALOT
  rationale: Con נפל, el español natural es 'caer sobre'. 'Sobre Israel' preserva el impacto de la metáfora y corresponde al matiz de incidencia efectiva que el inglés POB expresó con 'on Israel'.
theological_decisions:
- issue: Tratamiento del nombre/título divino en אֲדֹנָי
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: La pauta española del proyecto para el nombre divino favorece 'Yahvé'. Aunque el texto hebreo aquí usa el título אֲדֹנָי, la función referencial es la del Dios de Israel que habla con autoridad profética. Se evita la máscara 'SEÑOR' y se mantiene la nomenclatura propia del proyecto, dejando sin borrar la distinción textual entre título y nombre.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve source distinctions when relevant.'
- issue: Fuerza de la preposición בְּ con Jacob/Israel
  english_pob_reading: judgment directed against Jacob/Israel
  chosen_spanish_reading: 'destinatario o ámbito de la palabra: a Jacob ... sobre Israel'
  alternative_spanish_readings:
  - contra Jacob ... contra Israel
  - en Jacob ... en Israel
  - a Jacob ... en Israel
  rationale: 'El inglés POB revisó su primera opción más interpretativa y volvió a una formulación más cercana al hebreo: ''into Jacob''. En español, ''a Jacob'' y ''sobre Israel'' conservan el sentido de dirección e incidencia sin fijar excesivamente la relación espacial o polémica. La cláusula final ayuda a entender el efecto de juicio, pero el texto español no debe endurecer más allá de lo que el hebreo muestra explícitamente.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que pasó de 'against Jacob' a 'into Jacob' para reflejar con mayor precisión בְּיַעֲקֹב. En español se evitó sobrecargar el primer miembro con un matiz polémico explícito y se mantuvo la imagen del impacto en la segunda cláusula.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar español del proyecto para el referente divino.
  - Se mantiene 'palabra' para דָּבָר por su fuerza profética breve y porque 'mensaje' queda como alternativa en nota.
  - '''Cayó sobre Israel'' conserva la metáfora de נפל sin convertirla en interpretación explicativa.'
  - La nota alternativa ofrece la posibilidad 'mensaje' para reflejar la equivalencia léxica preservada por el inglés POB.
  - El texto evita 'SEÑOR' como máscara tipográfica, en línea con la política del proyecto.
