translation:
  language: es
  text: Te ruego, Señor, que tu oído esté atento[a] a la oración de tu siervo y a la oración de tus siervos, que se deleitan en temer tu nombre, y te ruego que concedas éxito a tu siervo hoy y que le hagas hallar compasión ante este hombre[b][c]. Ahora bien, yo era copero del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que tu oído esté escuchando», o «que tu oído preste atención».
    reason: lexical_alternative
  - marker: b
    text: O «concédele favor ante este hombre». El hebreo dice literalmente algo como «dar para compasiones/misericordias».
    reason: lexical_alternative
  - marker: c
    text: «Este hombre» alude al rey, a quien Nehemías identifica en la cláusula siguiente como aquel a quien servía de copero.
    reason: cross_reference
lexical_decisions:
- source_word: אָנָּא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Por vida
  lexicon: HALOT
  rationale: Es una partícula de súplica; 'Por favor' expresa petición urgente en español moderno sin arcaísmo excesivo.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Señor Dios
  lexicon: HALOT
  rationale: Es una dirección a Dios en oración. 'Señor' conserva la dignidad del título y evita confundirlo con el Tetragrámaton.
- source_word: תְּהִי נָא אָזְנְךָ קַשֶּׁבֶת
  english_pob_choice: let your ear be attentive
  chosen_spanish: que tu oído esté atento
  alternatives_spanish:
  - que tu oído esté escuchando
  - que tu oído preste atención
  lexicon: HALOT
  rationale: La imagen idiomática del oído atento se conserva de forma natural en español.
- source_word: תְּפִלַּת עַבְדְּךָ
  english_pob_choice: the prayer of your servant
  chosen_spanish: la oración de tu siervo
  alternatives_spanish:
  - la oración de tu esclavo
  - la oración de tu servidor
  lexicon: HALOT
  rationale: Aquí עבד funciona como auto-designación humilde ante Dios; 'siervo' mantiene esa relación sin forzar el matiz legal de esclavitud.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - los que te sirven
  lexicon: HALOT
  rationale: Se mantiene la coherencia léxica con el singular y el tono comunitario de la frase.
- source_word: הַחֲפֵצִים
  english_pob_choice: who delight
  chosen_spanish: que se deleitan
  alternatives_spanish:
  - que se complacen
  - que desean
  lexicon: HALOT
  rationale: El participio expresa placer o deleite; 'se deleitan' es idiomático y fiel.
- source_word: לְיִרְאָה אֶת שְׁמֶךָ
  english_pob_choice: to fear your name
  chosen_spanish: en temer tu nombre
  alternatives_spanish:
  - en reverenciar tu nombre
  - en estar sobrecogidos ante tu nombre
  lexicon: HALOT
  rationale: Se conserva la expresión bíblica 'temer tu nombre', manteniendo el peso reverencial del hebreo.
- source_word: וְהַצְלִיחָה נָּא
  english_pob_choice: and please grant success
  chosen_spanish: y por favor concede éxito
  alternatives_spanish:
  - y por favor haz prosperar
  - y por favor da éxito
  lexicon: HALOT
  rationale: El causativo pide que Dios otorgue un resultado favorable; 'concede éxito' es natural y formal en español.
- source_word: לְעַבְדְּךָ הַיּוֹם
  english_pob_choice: to your servant today
  chosen_spanish: a tu siervo hoy
  alternatives_spanish:
  - para tu siervo hoy
  - a tu siervo este día
  lexicon: HALOT
  rationale: El destinatario de la acción queda claro con 'a tu siervo hoy'; mantiene la inmediatez del ruego.
- source_word: וּתְנֵהוּ לְרַחֲמִים
  english_pob_choice: and give him compassion
  chosen_spanish: y dale compasión
  alternatives_spanish:
  - y concédele misericordia
  - y haz que halle compasión
  lexicon: HALOT
  rationale: La idiomática hebrea puede traducirse de modo más literal como 'dar compasión'; aquí se preserva la imagen, que en español sigue siendo comprensible.
- source_word: לִפְנֵי הָאִישׁ הַזֶּה
  english_pob_choice: before this man
  chosen_spanish: delante de este hombre
  alternatives_spanish:
  - en presencia de este hombre
  - ante este hombre
  lexicon: HALOT
  rationale: '''Delante de'' reproduce el valor relacional y el leve distanciamiento del hebreo.'
- source_word: וַאֲנִי הָיִיתִי מַשְׁקֶה לַמֶּלֶךְ
  english_pob_choice: Now I was cupbearer to the king
  chosen_spanish: Y yo era copero del rey
  alternatives_spanish:
  - Ahora bien, yo era copero del rey
  - Y era copero del rey
  lexicon: HALOT
  rationale: '''Copero'' es el equivalente tradicional y exacto de מַשְׁקֶה en este contexto cortesano; se omite ''now'' como mero marcador narrativo que en español puede quedar implícito con ''Y yo''.'
theological_decisions:
- issue: Rendición de עבד en oración dirigida a Dios
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - esclavo
  - servidor
  rationale: En este contexto devocional, 'siervo' comunica humildad y pertenencia a Dios sin introducir un énfasis jurídico que el ruego no destaca. Se evita 'esclavo' porque aquí no es el foco semántico principal.
  doctrine_reference: Translation philosophy §1; uso contextual de términos de relación de servicio
- issue: Expresión de reverencia ante el nombre divino
  english_pob_reading: fear your name
  chosen_spanish_reading: temer tu nombre
  alternative_spanish_readings:
  - reverenciar tu nombre
  - tener temor de tu nombre
  rationale: Se conserva la tensión reverencial de ירא sin suavizarla; 'temer tu nombre' mantiene el idiomatismo bíblico y la fuerza teológica.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó el ruego a 'grant success' y conservó 'give him compassion'; esta redacción española sigue ese estado revisado, manteniendo el doble ruego y la nota explicativa sobre el hebraísmo de רחמים.
  spanish_consistency_notes:
  - Se mantiene 'siervo' para עבד en contexto de oración, conforme al patrón POB.
  - Se conserva 'temer tu nombre' para reflejar la fórmula reverencial del hebreo.
  - '''Copero'' traduce מַשְׁקֶה con un término español claro y convencional.'
  - Se usa 'Y yo' para introducir el cierre narrativo sin añadir interpretación.
  - Las notas a pie distinguen la alternativa semántica de רחמים y la referencia de 'este hombre'.
