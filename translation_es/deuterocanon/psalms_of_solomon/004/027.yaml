translation:
  language: es
  text: Y Yahvé los rescatará de personas engañosas y pecadoras, y nos rescatará de toda trampa de gente sin ley.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo tropiezo sin ley» o «toda causa de tropiezo proveniente del sin ley o de los que no tienen ley».
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: BDAG
  rationale: Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el texto griego cita ὁ κύριος y el contexto del Libro de los Salmos de Salomón en la tradición POB inglesa mantiene «Lord». En español, «el Señor» preserva ese registro bíblico y evita forzar el nombre propio donde la fuente griega usa el título.
- source_word: ῥύσεται
  english_pob_choice: will rescue
  chosen_spanish: rescatará
  alternatives_spanish:
  - liberará
  - salvará
  lexicon: BDAG
  rationale: «Rescatará» comunica bien la idea de librar de peligro o amenaza y sigue de cerca la elección inglesa de «rescue» sin añadir matices soteriológicos más fuertes que los del contexto.
- source_word: ἀνθρώπων
  english_pob_choice: people
  chosen_spanish: personas
  alternatives_spanish:
  - gente
  - seres humanos
  lexicon: BDAG
  rationale: El sustantivo es genérico; «personas» refleja ese valor sin cargarlo con connotaciones de sexo o de grupo étnico.
- source_word: δολίων
  english_pob_choice: deceitful
  chosen_spanish: engañosas
  alternatives_spanish:
  - fraudulentas
  - astutas
  lexicon: BDAG
  rationale: «Engañosas» conserva la idea de dolo, engaño y falta de sinceridad en una forma natural para el español actual.
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinful
  chosen_spanish: pecadoras
  alternatives_spanish:
  - pecadoras y
  - pecadores
  lexicon: BDAG
  rationale: Sigo la revisión inglesa que trata ἁμαρτωλοί como una caracterización del grupo. En español, «pecadoras» mantiene el valor adjetival paralelo a «engañosas» y no lo aplana a un sustantivo genérico.
- source_word: σκανδάλου
  english_pob_choice: snare / stumbling block
  chosen_spanish: trampa
  alternatives_spanish:
  - tropiezo
  - lazo
  - escándalo
  lexicon: BDAG
  rationale: La revisión inglesa favorece «snare» como lectura más natural en este contexto. «Trampa» expresa bien la idea de algo que atrapa o hace caer, sin perder la imagen del término griego.
- source_word: παρανόμου
  english_pob_choice: lawless
  chosen_spanish: inicua
  alternatives_spanish:
  - sin ley
  - malvada
  - ilegal
  lexicon: BDAG
  rationale: «Inicua» traduce el carácter de παρανόμος como contrario a la justicia y a la ley divina, en un español bíblico claro. Evita la dureza artificial de «sin ley» y conserva la valoración moral del original.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que lee el segundo miembro como «every lawless snare». Por eso se evita una traducción demasiado literal de σκάνδαλον como «tropiezo» en el texto principal, aunque esa posibilidad queda implícita en la elección de «trampa» y en las decisiones léxicas.
  spanish_consistency_notes:
  - Se mantiene «Señor» en lugar de «Yahvé» porque el griego aquí usa κύριος como título divino y el audit trail inglés conserva «Lord».
  - Se evita «Cristo», «siervo» y otras fórmulas tradicionales no motivadas por este pasaje.
  - El paralelo sintáctico de dos cláusulas con «rescatará» se preserva en español.
  - «Personas engañosas y pecadoras» reproduce el valor adjetival del segundo miembro sin convertirlo en un sustantivo autónomo.
  - No se añadieron notas textuales porque el expediente no presenta variantes manuscritas, solo alternativas léxicas.
