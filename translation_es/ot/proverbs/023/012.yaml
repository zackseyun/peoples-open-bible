translation:
  language: es
  text: Aplica tu corazón a la instrucción[a], y tu oído a las palabras de conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Trae tu corazón a la disciplina, y tu oído a dichos de conocimiento.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבִיאָה
  english_pob_choice: Apply
  chosen_spanish: Aplica
  alternatives_spanish:
  - Trae
  - Dirige
  - Aplica tu atención
  lexicon: HALOT, BDB
  rationale: El hebreo es un imperativo causativo con sentido básico de “traer”. En español, “trae tu corazón a...” suena forzado; “aplica” conserva la fuerza imperativa e idiomática de orientar intencionalmente la persona interior hacia la enseñanza.
- source_word: לַמּוּסָר
  english_pob_choice: to instruction
  chosen_spanish: a la instrucción
  alternatives_spanish:
  - a la disciplina
  - a la corrección
  lexicon: HALOT, BDB
  rationale: מוּסָר puede significar disciplina, corrección o instrucción. En este paralelismo sapiencial, el matiz pedagógico es claro; “instrucción” comunica bien el sentido formativo sin perder la idea de disciplina.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT, BDB
  rationale: לֵב en hebreo abarca la persona interior, incluyendo mente y voluntad, no solo emociones. “Corazón” es la equivalencia estándar y fiel en español.
- source_word: וְאָזְנֶךָ
  english_pob_choice: and your ear
  chosen_spanish: y tu oído
  alternatives_spanish:
  - y tu oreja
  - y tus oídos
  lexicon: HALOT, BDB
  rationale: El hebreo usa singular con sufijo de segunda persona; en español, “oído” preserva mejor el paralelismo con “corazón” que el plural, y suena natural en exhortación poética.
- source_word: לְאִמְרֵי
  english_pob_choice: to words of
  chosen_spanish: a las palabras de
  alternatives_spanish:
  - a los dichos de
  - a los dichos
  lexicon: HALOT, BDB
  rationale: אִמְרֵי es el plural constructo de “palabras/dichos”. “Palabras de” es la forma más clara y natural en español moderno, manteniendo el contenido léxico.
- source_word: דָעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - entendimiento
  lexicon: HALOT, BDB
  rationale: דַּעַת significa primariamente “conocimiento”. “Conocimiento” reproduce con precisión el término, mientras que “entendimiento” sería una posible adaptación sapiencial pero menos directa.
translation_notes:
  revision_awareness: 'La versión española sigue el mismo sentido que la revisión inglesa estabilizada: mantener la exhortación sapiencial con paralelismo entre corazón y oído, y conservar la tensión léxica de מוּסָר con una nota alternativa que refleja la otra posibilidad documentada en el audit trail.'
  spanish_consistency_notes:
  - Se mantiene el tono proverbial breve y paratáctico del hebreo.
  - Se evita “SEÑOR” o terminología doctrinal ajena al versículo, ya que no aparecen en el texto fuente.
  - Se conserva el singular de “oído” para reflejar el hebreo y el paralelismo con “corazón”.
