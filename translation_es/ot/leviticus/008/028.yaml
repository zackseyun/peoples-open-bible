  language: en
  yaml_path: translation/ot/leviticus/008/028.yaml
  text: Then Moses took them from their palms and burned them on the altar[a], on top of the burnt offering. They were an ordination offering for a pleasing aroma[b], a food offering to Yahweh.
  footnotes:
