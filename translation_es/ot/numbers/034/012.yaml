    reason: cultural_note
  revision_rationale: Se eliminó la nota [a] porque introducía una alternativa no respaldada por el expediente inglés y cambiaba indebidamente el referente geográfico. Se corrigió la nota [c] para reflejar la alternativa léxica auditada («extremidades»). También se suavizó la cláusula final a un español más natural y consistente con la elección de «límite».
