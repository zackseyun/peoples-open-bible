  glossary_alignment: No hay términos del glosario mayor en juego. «Errores» y «faltas ocultas» concuerdan con las decisiones documentadas. La principal desviación es la elección de «Límpiame» para נַקֵּנִי, donde conviene una opción que conserve mejor la tensión léxica del original y del POB inglés.
