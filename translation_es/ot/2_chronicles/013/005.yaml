translation:
  language: es
  text: ¿No saben que Yahvé[a], el Dios de Israel, dio a David el reino sobre Israel para siempre, a él y a sus hijos[b], por un pacto de sal?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un pacto de sal». La expresión probablemente denota un pacto vinculante y duradero; compárese Números 18:19.
    reason: lexical_alternative
  - marker: b
    text: «Sus hijos» se refiere a la línea real o dinastía de David.
    reason: cultural_note
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Do you not
  chosen_spanish: ¿No saben que... ?
  alternatives_spanish:
  - ¿Acaso no saben que... ?
  - ¿No saben ustedes que... ?
  lexicon: HALOT
  rationale: La pregunta retórica en contexto busca una respuesta afirmativa y confronta a la audiencia. «¿No saben que...?» conserva ese tono de reprensión/exhortación en español natural sin añadir paráfrasis innecesaria.
- source_word: לָכֶם לָדַעַת
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - deben saber
  - les corresponde saber
  lexicon: HALOT
  rationale: La construcción expresa conocimiento debido o reconocido por los oyentes. «Saben» es más natural en español que una perífrasis más pesada, y mantiene el sentido retórico del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el convenio del proyecto para el Tetragrámaton, usando la forma castellana «Yahvé» en vez de una sustitución por título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel,
  - el Dios de Israel
  lexicon: HALOT
  rationale: Es la equivalencia directa y conserva la identificación pactual de Yahvé como el Dios propio de Israel.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - ha dado
  - otorgó
  lexicon: HALOT
  rationale: El pasado simple transmite la afirmación histórica de manera clara y fiel.
- source_word: מַמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reino real
  - la realeza
  lexicon: HALOT
  rationale: Aunque el audit trail en inglés discutió «kingdom/kingship», el sustantivo hebreo aquí funciona de forma directa como el dominio regio concedido a David. «El reino» es la opción española más estándar y transparente.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre el Israel
  - en Israel
  lexicon: HALOT
  rationale: «Sobre» comunica el gobierno/autoridad regia sobre el pueblo, reproduciendo la fuerza de עַל en este contexto.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: Expresa duración continua y covenantal de manera idiomática en español moderno.
- source_word: לוֹ וּלְבָנָיו
  english_pob_choice: to him and to his sons
  chosen_spanish: a él y a sus hijos
  alternatives_spanish:
  - a él y a sus descendientes
  - para él y para sus hijos
  lexicon: HALOT
  rationale: Se conserva el sentido literal de בָּנִים como «hijos», manteniendo la formulación genealógica del texto. En este contexto real implica la línea dinástica; esa implicación se explica en nota.
- source_word: בְּרִית מֶלַח
  english_pob_choice: by a covenant of salt
  chosen_spanish: mediante un pacto de sal
  alternatives_spanish:
  - por un pacto de sal
  - con un pacto de sal
  - mediante un pacto salado
  lexicon: HALOT
  rationale: Se preserva la metáfora hebrea con un calco suficientemente natural en español. «Mediante» refleja el valor instrumental/circunstancial de la frase, y «pacto de sal» conserva la expresión fija sin aplanarla interpretativamente.
theological_decisions:
- issue: Permanencia del don davídico y el valor de la expresión «pacto de sal»
  english_pob_reading: The verse states that Yahweh gave David's kingship over Israel forever, with 'covenant of salt' left as a literal expression whose likely sense is binding and enduring.
  chosen_spanish_reading: El versículo afirma que Yahvé dio a David el reino sobre Israel para siempre, y conserva la expresión «pacto de sal» como imagen pactal duradera.
  alternative_spanish_readings:
  - El versículo afirma que Yahvé dio a David el reino sobre Israel para siempre, con un pacto permanente.
  - El versículo afirma que Yahvé dio a David el reino sobre Israel para siempre, por un pacto de sal que implica permanencia.
  rationale: La combinación de לְעוֹלָם con בְּרִית מֶלַח debe mantenerse visible en la traducción porque el texto insiste en duración pactal. No se absorbe el sentido explicativo en el cuerpo principal para no borrar la tensión/imagen original; la nota puede aclarar la implicación de pacto firme y duradero.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia a «sus hijos» en contexto dinástico
  english_pob_reading: '''To his sons'' refers to David''s royal line or dynasty.'
  chosen_spanish_reading: «A sus hijos» se entiende como la línea real davídica, no solo como descendencia biológica inmediata.
  alternative_spanish_readings:
  - «A sus hijos» como sus descendientes
  - «A sus hijos» como su dinastía
  rationale: Se mantiene la forma literal del hebreo, pero se explicita en nota el alcance dinástico para evitar que el lector reduzca la frase a hijos biológicos inmediatos.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto inglés más reciente prefirió «kingdom» sobre «kingship» para מַמְלָכָה. La traducción española adopta «reino» como equivalente estándar y directo, manteniendo el sentido regia/territorial sin perder la idea de dominio concedido. También se preservó la frase literal «pacto de sal» para dejar visible la imagen hebrea, con nota aclaratoria sobre su valor de pacto duradero.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para יהוה.
  - Se mantiene «Dios de Israel» para אֱלֹהֵי יִשְׂרָאֵל.
  - «Reino» se eligió para מַמְלָכָה siguiendo la revisión más reciente del audit trail.
  - «Para siempre» traduce לְעוֹלָם con naturalidad y conserva la permanencia del don.
  - Se conserva el lenguaje literal «pacto de sal» y se explica en nota su posible valor idiomático.
  - «Sus hijos» se conserva literal y se aclara su sentido dinástico en nota.
