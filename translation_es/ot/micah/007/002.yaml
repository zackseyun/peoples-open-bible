translation:
  language: es
  text: El fiel[a] ha perecido del país, y no hay entre la humanidad uno recto. Todos ellos acechan para derramar sangre; cada uno caza a su hermano[b] con una red[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de la tierra'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'su hermano'; el término puede extenderse más allá de un hermano literal a un miembro de la comunidad.
    reason: lexical_alternative
  - marker: c
    text: O 'con una trampa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבַד
  english_pob_choice: has perished
  chosen_spanish: ha perecido
  alternatives_spanish:
  - ha desaparecido
  - se ha perdido
  lexicon: HALOT
  rationale: Perecer conserva la fuerza de pérdida total y el tono de lamentación profética mejor que fórmulas más débiles como 'ha desaparecido'.
- source_word: חָסִיד
  english_pob_choice: the faithful
  chosen_spanish: el fiel
  alternatives_spanish:
  - el piadoso
  - el leal
  lexicon: HALOT
  rationale: '''El fiel'' reproduce bien la idea de lealtad y fidelidad al pacto, con naturalidad en español y sin cargar el término con matices devocionales más estrechos de ''piadoso''.'
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra del país
  - del país
  lexicon: HALOT
  rationale: Aquí 'tierra' mantiene la imagen geográfica del hebreo. Aunque el inglés POB prefirió 'land' por el marco profético, en español 'tierra' es el equivalente más natural y no pierde el sentido contextual.
- source_word: וְיָשָׁר
  english_pob_choice: upright one
  chosen_spanish: uno recto
  alternatives_spanish:
  - un recto
  - una persona recta
  - el recto
  lexicon: HALOT
  rationale: '''Uno recto'' refleja el singular adjetival sin introducir varón como especificación innecesaria. Conserva la referencia a una persona moralmente recta, en línea con la revisión inglesa que evitó ''upright man''.'
- source_word: בָּאָדָם
  english_pob_choice: among mankind
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - entre la humanidad
  - entre la gente
  lexicon: HALOT
  rationale: '''Hombres'' puede funcionar en español como genérico humano, pero introduce cierta tensión por el masculino gramatical. Se retiene porque el hebreo usa אָדָם en sentido genérico; la nota teológica explica el valor inclusivo de la expresión.'
- source_word: לְדָמִים
  english_pob_choice: for blood
  chosen_spanish: sangre
  alternatives_spanish:
  - para sangre
  - por sangre
  - para derramar sangre
  lexicon: HALOT
  rationale: El acusativo de intención/objeto queda mejor en español con el complemento 'acechan sangre', que expresa la violencia homicida de forma breve como en el hebreo.
- source_word: יֶאֱרֹבוּ
  english_pob_choice: lie in wait
  chosen_spanish: acechan
  alternatives_spanish:
  - se ponen al acecho
  - emboscan
  lexicon: HALOT
  rationale: '''Acechar'' mantiene la imagen de vigilancia hostil y es idiomático junto con ''sangre''.'
- source_word: אָחִיהוּ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su prójimo
  - a su compañero
  lexicon: HALOT
  rationale: Se conserva 'hermano' para no atenuar el horror de la traición fraterna. En español, 'a su hermano' expresa bien la relación literal con posible extensión comunitaria.
- source_word: יָצ֥וּדוּ
  english_pob_choice: hunts
  chosen_spanish: caza
  alternatives_spanish:
  - da caza
  - persigue
  lexicon: HALOT
  rationale: '''Caza'' corresponde al campo semántico de la caza/trampa y encaja con la imagen del versículo. En español, con sujeto singular distributivo, ''cada uno caza'' suena natural.'
- source_word: חֵרֶם
  english_pob_choice: with a net
  chosen_spanish: con una red
  alternatives_spanish:
  - con un lazo
  - con una trampa
  - con una malla
  lexicon: HALOT
  rationale: '''Red'' conserva la metáfora de caza que el contexto exige. Aunque el hebreo permite ''snare/trampa'', la red es la solución más transparente y concordante con ''caza''.'
theological_decisions:
- issue: Renderizado genérico de אָדָם
  english_pob_reading: among mankind
  chosen_spanish_reading: entre los hombres
  alternative_spanish_readings:
  - entre la humanidad
  - entre la gente
  rationale: El hebreo אָדָם es genérico y no restringe a varones. En español se conserva la forma tradicional 'los hombres' como genérico humano, con la aclaración implícita de alcance universal. Esto mantiene la fluidez sin borrar el valor representativo del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
- issue: Relación entre 'hermano' y la comunidad
  english_pob_reading: his brother
  chosen_spanish_reading: su hermano
  alternative_spanish_readings:
  - su prójimo
  - su semejante
  rationale: 'Se mantiene ''hermano'' porque el hebreo literal intensifica la denuncia moral: la violencia no es solo contra extraños, sino dentro del propio vínculo fraterno. La posible extensión a un miembro de la comunidad queda implícita sin diluir la imagen.'
  doctrine_reference: English POB footnote b; contornos del uso de אָח
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que sustituyó 'upright man' por 'upright one' para evitar un marcado innecesariamente masculino. En español se reflejó ese ajuste con 'uno recto', y se preservó la estructura concisa del verso con el mismo énfasis lamentativo y acusatorio.
  spanish_consistency_notes:
  - Se mantiene 'fiel' para חָסִיד, en armonía con el valor de fidelidad del pacto.
  - 'Se conserva el paralelismo breve del hebreo: pérdida del justo, ausencia del recto, acecho universal y violencia intrafamiliar.'
  - '''Red'' se eligió para חֵרֶם siguiendo el contexto de caza; no se usa ''maldición'' o ''anátema'' porque rompería la imagen inmediata del pasaje.'
