translation:
  language: es
  text: Mostrar parcialidad al impío[a] no es bueno, ni privar al justo de justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «levantar el rostro del impío», un modismo que significa mostrar favor o parcialidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאֵת פְּנֵי
  english_pob_choice: to show partiality
  chosen_spanish: mostrar parcialidad
  alternatives_spanish:
  - levantar el rostro
  - aceptar el rostro/persona
  - mostrar favoritismo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, en contexto judicial, significa favorecer indebidamente a alguien. «Mostrar parcialidad» comunica ese sentido con naturalidad en español y conserva la fuerza ética/judicial del original.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el malhechor
  - el culpable
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. «El impío» es una opción bíblica clara en español y preserva la categoría moral sin restringirla demasiado a culpabilidad legal.
- source_word: לֹא טוֹב
  english_pob_choice: is not good
  chosen_spanish: no es bueno
  alternatives_spanish:
  - no es recto
  - no es correcto
  - no es conveniente
  lexicon: HALOT
  rationale: La evaluación hebrea es directa. «No es bueno» reproduce la valoración moral sin añadir matices ajenos al texto.
- source_word: לְהַטּוֹת
  english_pob_choice: to deprive
  chosen_spanish: privar
  alternatives_spanish:
  - desviar
  - torcer
  - hacer apartar
  lexicon: HALOT
  rationale: El verbo tiene la idea básica de apartar o desviar en un marco judicial. Dado que la revisión inglesa evitó añadir «en juicio/corte» explícitamente, «privar» expresa el efecto sobre el justo con sobriedad, aunque mantiene la tensión semántica de una decisión torcida.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el inocente
  - el inocente y justo
  lexicon: HALOT
  rationale: «El justo» conserva el uso sapiencial y jurídico del término y coincide con el paralelismo del versículo.
- source_word: בַּמִּשְׁפָּט
  english_pob_choice: of justice
  chosen_spanish: de justicia
  alternatives_spanish:
  - en juicio
  - en derecho
  - en el juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí puede referirse a justicia/juicio. La versión inglesa revisada dejó fuera «in court»; por eso «de justicia» mantiene la referencia judicial sin introducir un lugar que el hebreo no nombra explícitamente.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: coordina con «ni» y evita añadir una localización explícita como «en la corte». El español conserva esa cautela y mantiene la tensión entre juicio/justicia en מִשְׁפָּט.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «el justo / el impío» como lenguaje sapiencial breve y paralelo.
  - No se añadió «en juicio» ni «en la corte» para respetar la revisión inglesa y el hebreo, que aquí dice simplemente בַּמִּשְׁפָּט.
