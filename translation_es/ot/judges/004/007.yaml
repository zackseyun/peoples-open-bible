translation:
  language: es
  text: Y yo atraeré hacia ti a Sísara, comandante del ejército de Jabín, con sus carros y su multitud[b], al torrente de Quisón[a]; y lo entregaré en tu mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “al río Quisón” o “al wadi de Quisón”; el término hebreo puede referirse a un wadi, cauce estacional o torrente.
    reason: lexical_alternative
  - marker: b
    text: O “sus tropas” o “su ejército”. El hebreo dice literalmente “su multitud”, una expresión más amplia que no se reduce de inmediato a un término militar técnico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁכְתִּי
  english_pob_choice: I will draw
  chosen_spanish: arrastraré
  alternatives_spanish:
  - atraeré
  - llevaré
  - tiraré de
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar “tirar”, “halar” o “hacer venir” hacia un lugar. En este contexto militar, “arrastraré” conserva la idea de causar el movimiento de Sísara sin introducir connotaciones de seducción que el verbo no exige. También mantiene la fuerza dinámica del acto divino.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: hasta ti
  alternatives_spanish:
  - a ti
  - hacia ti
  lexicon: HALOT
  rationale: La preposición con sufijo de segunda persona marca dirección hacia Barac. “Hasta ti” refleja bien el movimiento hacia su posición en español y encaja con el giro de la oración.
- source_word: אֶל נַחַל קִישׁוֹן
  english_pob_choice: at the Wadi Kishon
  chosen_spanish: junto al torrente de Quisón
  alternatives_spanish:
  - al torrente de Quisón
  - al wadi de Quisón
  - al valle torrencial de Quisón
  lexicon: HALOT
  rationale: נחל puede referirse a wadi, cauce estacional o torrente. “Torrente de Quisón” comunica el sentido geográfico sin obligar al lector a conocer el término técnico “wadi”. “Junto al” reproduce de modo natural la relación locativa del inglés POB sin duplicar la preposición de movimiento.
- source_word: שַׂר צְבָא יָבִין
  english_pob_choice: the commander of Jabin’s army
  chosen_spanish: comandante del ejército de Jabín
  alternatives_spanish:
  - jefe del ejército de Jabín
  - capitán del ejército de Jabín
  - príncipe del ejército de Jabín
  lexicon: HALOT
  rationale: שַׂר צָבָא designa un jefe militar. “Comandante” es claro y solemne en español moderno, y “ejército” transmite el valor de צָבָא en este contexto. Se mantiene la relación posesiva con Jabín.
- source_word: רִכְבּוֹ
  english_pob_choice: his chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - su carro de guerra
  - su carrocería de guerra
  - su carro de combate
  lexicon: HALOT
  rationale: Aunque la palabra puede abarcar la fuerza de carros, el plural literal en español “carros” conserva la imagen concreta del texto. En este contexto bélico, el sentido es inequívocamente militar.
- source_word: הֲמוֹנוֹ
  english_pob_choice: his multitude
  chosen_spanish: su multitud
  alternatives_spanish:
  - sus tropas
  - su ejército
  - su muchedumbre
  lexicon: HALOT
  rationale: El hebreo es amplio y no equivale de manera exacta a un término técnico como “tropas”. “Multitud” preserva esa amplitud lexical, como en el audit trail inglés, aunque en el contexto se entienda un conjunto militar.
- source_word: וּנְתַתִּיהוּ
  english_pob_choice: I will give him
  chosen_spanish: lo entregaré
  alternatives_spanish:
  - lo daré
  - lo pondré
  lexicon: HALOT
  rationale: La construcción con נתן y la siguiente expresión idiomática en la versión inglesa apuntan a una entrega en poder de otro. “Entregaré” expresa con naturalidad esa transferencia de control sin perder el trasfondo idiomático hebreo.
- source_word: בְּיָדֶךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tus manos
  lexicon: HALOT
  rationale: La imagen hebrea de “mano” como poder o control debe conservarse. “En tu mano” es fiel y reconocible en español bíblico, y mantiene el carácter idiomático sin convertirlo de inmediato en una paráfrasis abstracta.
theological_decisions:
- issue: La forma verbal divina expresa acción soberana y causalidad directa.
  english_pob_reading: I will draw ... and I will give him into your hand.
  chosen_spanish_reading: Y yo arrastraré ... y lo entregaré en tu mano.
  alternative_spanish_readings:
  - Y yo atraeré ... y lo pondré en tu mano.
  - Y yo llevaré ... y lo entregaré en tu poder.
  rationale: El hebreo presenta a Yahvé como sujeto que provoca y dispone el resultado. “Arrastraré” y “entregaré” preservan la agencia divina y la fuerza de la promesa sin suavizarla en exceso. Se evita diluir el lenguaje de dominio que culmina en “en tu mano”.
  doctrine_reference: Soberanía divina; providencia en la victoria de Israel
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el paquete fuente hebreo y el audit trail inglés. Se conserva la ambigüedad lexical relevante de נחל y המון, y se mantiene la imagen idiomática de “mano” como dominio. No se introdujeron revisiones textuales ni cambios respecto del acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se usó “Yahvé” implícitamente en la voz divina sin añadirlo al texto, porque el versículo hebreo presenta habla directa; el sujeto ya está identificado por el contexto inmediato.
  - Se prefirió “Quisón” como transliteración estable en español para el topónimo Kishon.
  - Se mantuvo el paralelismo coordinado de la oración para reflejar el encadenamiento del hebreo.
  - Se evitó “SEÑOR” como sustituto del nombre divino, siguiendo el criterio del proyecto sobre Yahvé.
