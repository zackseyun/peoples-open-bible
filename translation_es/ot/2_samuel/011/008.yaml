base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/011/008.yaml
  text: Then David said to Uriah[a], “Go down to your house and wash your feet.” So Uriah went out from the king’s house[b], and a present from the king went out after him.
  footnotes:
  - marker: a
    text: Or “a portion from the king.” The Hebrew term can refer to something carried or sent, including a portion or gift.
    reason: lexical_alternative
  - marker: b
    text: “Wash your feet” is a literal expression that can also suggest refreshment or settling in at home after travel.
    reason: cultural_note
