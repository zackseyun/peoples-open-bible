base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/021.yaml
  text: But he sent messengers to him[a], saying, “What have I to do with you, king of Judah? I am not coming against you today, but against the house with which I am at war; and God has told me to hurry. Stop opposing God, who is with me, so that he does not destroy you.”
  footnotes:
