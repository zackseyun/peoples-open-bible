lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Y él
  - Ahora él
  lexicon: LSJ
  rationale: δέ introduce contraste o continuación con matiz adversativo; en español, «Pero él» conserva ese giro mejor que una simple coordinación.
- source_word: μέχρι ὀστέων
  english_pob_choice: down to his bones
  chosen_spanish: incluso hasta los huesos
  alternatives_spanish:
  - hasta los huesos
  - a los huesos
  lexicon: LSJ
  rationale: La expresión marca devastación corporal extrema. «Incluso hasta los huesos» conserva la fuerza idiomática y la intensidad del griego sin sonar rígida.
- source_word: κατακεκαυμένος
  english_pob_choice: burned
  chosen_spanish: quemado
  alternatives_spanish:
  - consumido por el fuego
  - abrasado
  lexicon: LSJ
  rationale: El participio perfecto describe un estado resultante de haber sido quemado; «quemado» es claro y fiel, y el contexto ya comunica la severidad.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - para entonces
  lexicon: LSJ
  rationale: Indica que ese estado de sufrimiento se había alcanzado antes de la acción siguiente; «ya» es el equivalente natural en español.
- source_word: μέλλων λιποθυμεῖν
  english_pob_choice: about to faint
  chosen_spanish: a punto de desmayarse
  alternatives_spanish:
  - a punto de perder el conocimiento
  - al borde de desfallecer
  lexicon: LSJ
  rationale: «Desmayarse» comunica bien la inminente falla física sin sobrecargar el texto con tecnicismo médico.
- source_word: ἀνέτεινεν τὰ ὄμματα
  english_pob_choice: lifted his eyes
  chosen_spanish: levantó los ojos
  alternatives_spanish:
  - alzó los ojos
  - miró hacia arriba
  lexicon: LSJ
  rationale: Es una equivalencia directa y solemne que preserva el gesto de oración o súplica implícito en el griego.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - a Dios
  - dirigidos a Dios
  lexicon: LSJ
  rationale: La preposición con acusativo expresa dirección; «hacia Dios» conserva mejor el movimiento del gesto que una simple fórmula fija.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último texto inglés revisado, que afinó la relación entre μέχρι ὀστέων y la intensidad de la quemadura. En español, esa precisión se reflejó con «incluso hasta los huesos», manteniendo la misma fuerza sin calco torpe.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεόν conforme al estándar del proyecto.
  - No se introdujo «Cristo/Mesías» ni otra terminología doctrinal ajena al versículo.
  - 'El orden español se ajusta para legibilidad, pero conserva todas las imágenes del griego: quemadura extrema, inminencia del desmayo, mirada elevada y discurso directo.'
