translation:
  language: es
  text: Él es Yahvé, nuestro Dios[a]; sus juicios[b] están en toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también puede representarse como «Yahweh» o «Jehová».'
    reason: alternative_reading
  - marker: b
    text: O «sus ordenanzas» o «su justicia»; el hebreo מִשְׁפָּטָיו puede denotar decisiones judiciales, decretos o justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  english_pob_choice: He is
  chosen_spanish: Él es
  alternatives_spanish:
  - Él
  lexicon: HALOT
  rationale: 'El pronombre independiente en hebreo funciona con énfasis; en español, la forma natural y clara es suplir la cópula: «Él es».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton en su forma usual del proyecto en español, «Yahvé», en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: La forma de constructo con sufijo de 1.ª persona plural se expresa de manera directa y natural como «nuestro Dios».
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - en toda la región
  lexicon: HALOT
  rationale: «En toda la tierra» conserva el alcance universal del hebreo y sigue el valor locativo de בְּ con כָּל.
- source_word: מִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus ordenanzas
  - su justicia
  - sus decretos
  lexicon: HALOT
  rationale: Se mantiene «juicios» como la opción más directa para מִשְׁפָּטָיו y se preserva la amplitud semántica del término, sin reducirlo a una sola noción.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; la línea editorial del proyecto en español lo vierte como «Yahvé» para conservar el nombre personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de מִשְׁפָּטָיו
  english_pob_reading: his judgments / his ordinances / his justice
  chosen_spanish_reading: sus juicios
  alternative_spanish_readings:
  - sus ordenanzas
  - su justicia
  rationale: El contexto universal del verso favorece una referencia a las decisiones o actos judiciales de Dios presentes en toda la tierra; «juicios» conserva la tensión semántica sin cerrarla prematuramente.
  doctrine_reference: HALOT / uso contextual de מִשְׁפָּט
translation_notes:
  revision_awareness: La redacción sigue de cerca el análisis hebreo y coincide con el juicio de alta concordancia del control cruzado; no se requieren cambios frente al borrador inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en español POB.
  - Se usa «tierra» para conservar el alcance universal de הָאָרֶץ.
  - «Juicios» preserva la ambigüedad productiva de מִשְׁפָּטָיו entre decisiones judiciales, ordenanzas y justicia.
