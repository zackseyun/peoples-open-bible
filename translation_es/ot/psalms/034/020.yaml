    text: Or 'Many are the evils/troubles of the righteous.' The Hebrew רָעוֹת can denote evils, troubles, or calamities; here it refers to the hardships that befall the righteous.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the righteous man,' a masculine singular form that can function representatively for the righteous person.
