translation:
  language: es
  text: 'Y en el día de sábado: dos corderos machos de un año, sin defecto, y dos décimas[a] de efa de flor de harina como ofrenda vegetal, mezclada con aceite, y su ofrenda de bebida[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "dos décimas"; en la legislación sacrificial, esto equivale a dos décimas de efa.'
    reason: cultural_note
  - marker: b
    text: O, "y su libación".
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם הַשַּׁבָּת
  english_pob_choice: And on the Sabbath day
  chosen_spanish: Y en el día del sábado
  alternatives_spanish:
  - Y en el sábado
  - Y en el día de reposo
  lexicon: HALOT
  rationale: Conservo la conjunción inicial y la referencia temporal. "Día del sábado" sigue de cerca la estructura hebrea sin sonar forzado en español; "sábado" mantiene la referencia cultual del día, y evito "día de reposo" porque introduce una equivalencia más interpretativa.
- source_word: שְׁנֵי כְבָשִׂים
  english_pob_choice: two male lambs
  chosen_spanish: dos corderos machos
  alternatives_spanish:
  - dos corderos
  - dos ovejas machos
  lexicon: HALOT
  rationale: כְבָשִׂים denota corderos/borregos jóvenes en contexto sacrificial. "Corderos machos" preserva el matiz de sexo que el inglés POB explícita y que el hebreo exige en forma masculina.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - año de edad
  - del primer año
  lexicon: HALOT
  rationale: La expresión hebrea indica animales de un año. "De un año" es la forma natural y clara en español, equivalente al valor idiomático que el inglés POB traduce como "a year old".
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  lexicon: HALOT
  rationale: En lenguaje sacrificial, la idea es ausencia de defecto apto para ofrecerse. "Sin defecto" es preciso y más directo en español contemporáneo que "sin blemish" calcoado o un término más devocional.
- source_word: וּשְׁנֵי עֶשְׂרֹנִים
  english_pob_choice: and two-tenths of an ephah
  chosen_spanish: y dos décimas de efa
  alternatives_spanish:
  - y dos décimas de un efa
  - y dos medidas décimas de efa
  lexicon: HALOT
  rationale: 'Sigo la lectura cultual del inglés POB: el עשרון se entiende aquí como décima parte de efa. "Dos décimas de efa" refleja la medida sin recargar la frase con explicaciones innecesarias en el texto principal.'
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: '"Flor de harina" es el equivalente español tradicional y culto para סֹלֶת, bien establecido en contexto sacrificial y más idiomático que una glosa literal.'
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda de harina
  lexicon: HALOT
  rationale: El hebreo sacerdotal מִנְחָה no es una ofrenda genérica aquí, sino la ofrenda de cereal/presente. En español bíblico, "ofrenda vegetal" preserva la categoría cultual sin reducirla a una oferta moderna; reconozco que es una terminología menos común, pero corresponde al uso técnico del POB.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: amasada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - ligada con aceite
  lexicon: HALOT
  rationale: El participio indica que la harina fue combinada con aceite. "Amasada con aceite" comunica bien la preparación de la ofrenda en español natural, sin perder la noción de mezcla del original.
- source_word: וְנִסְכּוֹ
  english_pob_choice: and its drink offering
  chosen_spanish: y su libación
  alternatives_spanish:
  - y su ofrenda líquida
  - y su ofrenda de bebida
  lexicon: HALOT
  rationale: El sustantivo נֶסֶךְ designa la libación vertida como acompañamiento sacrificial. Mantengo "libación" para conservar la precisión cultual; en español, esta forma es más técnica que "ofrenda de bebida" y sigue la alternativa reconocida en el audit trail.
theological_decisions:
- issue: Naturaleza de la ofrenda de מִנְחָה en legislación sacrificial
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - ofrenda de harina
  rationale: No neutralizo el término con un genérico como "ofrenda" porque el contexto ritual requiere una categoría específica. "Ofrenda vegetal" conserva la fuerza técnica del hebreo sacerdotal en tradición hispana, aunque reconozco que puede sonar menos corriente; por eso mantengo explicitable su sentido mediante la medida y la harina en el mismo verso.
  doctrine_reference: Levítico 2; Números 15:4-9
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto fuente y con la auditoría inglesa; no se registran revisiones aplicadas en la última pasada, por lo que el borrador español sigue de cerca la segmentación y las decisiones léxicas ya estabilizadas.
  spanish_consistency_notes:
  - Se mantiene "Y" inicial para conservar la coordinación del hebreo con el contexto anterior.
  - Se usa "Yahvé" en el proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - 'Se preserva el lenguaje cultual técnico: corderos, sin defecto, flor de harina, ofrenda vegetal y libación.'
  - Se evita "Cristo" o terminología eclesial no presente en el texto fuente.
