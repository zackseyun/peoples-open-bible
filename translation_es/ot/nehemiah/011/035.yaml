lexical_decisions:
- source_word: לֹד
  english_pob_choice: Lod
  chosen_spanish: Lod
  alternatives_spanish:
  - Lod
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera en español para conservar la referencia geográfica y la forma reconocible del topónimo.
- source_word: וְ/אוֹנ֖וֹ
  english_pob_choice: and Ono
  chosen_spanish: y Ono
  alternatives_spanish:
  - y Ono
  lexicon: HALOT
  rationale: La conjunción se expresa de forma directa con «y», y el nombre propio se translitera como topónimo.
- source_word: גֵּ֥י
  english_pob_choice: Valley of
  chosen_spanish: Valle de
  alternatives_spanish:
  - valle de
  lexicon: HALOT
  rationale: El constructo hebreo pide una relación posesiva o genitiva; en español, «Valle de» reproduce con naturalidad esa relación.
- source_word: הַחֲרָשִֽׁים
  english_pob_choice: the Craftsmen
  chosen_spanish: los Artesanos
  alternatives_spanish:
  - los artesanos
  - los herreros
  - los obreros especializados
  lexicon: HALOT
  rationale: El término puede abarcar artesanos en general y, en algunos contextos, con un matiz más específico de trabajadores de oficio. En un topónimo, «artesanos» preserva bien el sentido amplio sin forzar una especialización innecesaria.
translation_notes:
  revision_awareness: El texto inglés auditado conserva la estructura toponímica y una nota léxica sobre el alcance de הַחֲרָשִׁים. No se registran revisiones posteriores; la versión española sigue esa misma decisión, manteniendo el nombre propio y una nota alternativa para la amplitud semántica del término.
  spanish_consistency_notes:
  - Se mantiene la transliteración de los nombres propios «Lod» y «Ono» para conservar la correspondencia con el original.
  - «Valle de los Artesanos» sigue el genitivo constructo del hebreo de manera natural en español.
  - La mayúscula en «Artesanos» refleja el uso toponímico dentro del nombre del lugar, en paralelo al tratamiento de título local en inglés.
