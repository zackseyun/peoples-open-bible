translation:
  language: es
  text: Por la mañana, Jonatán salió al campo para el encuentro acordado con David[a], y un muchacho pequeño[b] estaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "a la hora señalada con David". El hebreo מוֹעֵד puede significar "tiempo señalado" o "encuentro concertado"; el contexto favorece la idea de una cita previamente acordada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "un muchacho joven" o "un joven servidor". El hebreo נַעַר puede referirse a un muchacho, joven o siervo según el contexto; aquí se privilegia el sentido de edad/tamaño porque el texto lo enfatiza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּבֹּקֶר
  english_pob_choice: In the morning
  chosen_spanish: En la mañana
  alternatives_spanish:
  - Por la mañana
  - Al amanecer
  lexicon: HALOT
  rationale: La secuencia narrativa introduce el siguiente evento con una marca temporal simple. "En la mañana" conserva el valor temporal sin añadir una paráfrasis innecesaria; es natural en español bíblico contemporáneo y mantiene la sobriedad del hebreo.
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - salió afuera
  lexicon: HALOT
  rationale: יצא expresa salir o ir hacia fuera. "Salió" transmite de manera directa la acción direccional sin redundancia en español.
- source_word: הַשָּׂדֶה
  english_pob_choice: to the field
  chosen_spanish: al campo
  alternatives_spanish:
  - al campo abierto
  - al terreno
  lexicon: HALOT
  rationale: שָׂדֶה designa un campo o espacio abierto. "Al campo" es la forma más natural y fiel en español; evita estrechar el sentido a un terreno agrícola específico.
- source_word: לְמוֹעֵד דָּוִד
  english_pob_choice: for the appointed meeting with David
  chosen_spanish: para el encuentro fijado con David
  alternatives_spanish:
  - para la cita fijada con David
  - para el momento señalado con David
  lexicon: HALOT
  rationale: מוֹעֵד puede significar tiempo señalado o encuentro concertado. Dado el contexto del rendezvous entre Jonathan y David, "encuentro fijado" conserva la idea de cita acordada sin perder la ambigüedad básica entre tiempo y reunión.
- source_word: וְנַעַר קָטֹן
  english_pob_choice: and a young boy
  chosen_spanish: y un muchacho pequeño
  alternatives_spanish:
  - y un niño pequeño
  - y un joven servidor
  lexicon: HALOT
  rationale: נַעַר puede ser muchacho, joven o siervo según el contexto, y קָטֹן marca pequeñez/juventud. Aquí la función social no está explícita, por lo que "muchacho pequeño" mantiene el matiz de edad/tamaño sin imponer "siervo".
- source_word: עִמּוֹ
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - iba con él
  - con él
  lexicon: HALOT
  rationale: El hebreo solo indica compañía. En español, el verbo copulativo completa la cláusula con naturalidad y preserva la información relacional del original.
translation_notes:
  revision_awareness: 'Coincide con el contexto crítico: el inglés POB no requiere cambios y la revisión más reciente quedó sin modificaciones. La versión española sigue esa lectura estable, conservando la ambigüedad de מוֹעֵד y נַעַר en notas donde corresponde.'
  spanish_consistency_notes:
  - Se mantiene "Jonatán" para el nombre propio en forma hispana estándar.
  - '"David" se conserva sin artículo, conforme al uso bíblico y al texto fuente.'
  - Se evita "SEÑOR" o equivalentes porque aquí no aparece el nombre divino.
  - La sintaxis busca ser pública y readable sin copiar mecánicamente el orden del inglés.
