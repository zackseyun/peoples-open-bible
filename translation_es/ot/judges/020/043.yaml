translation:
  language: es
  text: Rodearon a Benjamín[a], lo persiguieron y lo atropellaron[b] hasta frente a Guibeá, hacia el oriente[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo persiguieron desde Menujá», si מְנוּחָה se toma como nombre de lugar y no como expresión adverbial.
    reason: alternative_reading
  - marker: b
    text: O «lo hicieron avanzar»; el verbo hebreo puede expresar tanto una acción de hollar o atropellar como la de hacer avanzar por la fuerza en este contexto.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «desde el oriente del sol», es decir, «hacia el este» o «del lado oriental».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּתְּרוּ
  english_pob_choice: surrounded
  chosen_spanish: rodearon
  alternatives_spanish:
  - encerraron
  - cercaron
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de cerrar o cercar militarmente. «Rodearon» comunica bien esa idea en español y suena natural sin perder el matiz bélico.
- source_word: אֶת בִּנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - los benjaminitas
  - la tribu de Benjamín
  lexicon: HALOT
  rationale: El hebreo usa el nombre colectivo Benjamín con verbos y sufijos singulares. Mantener el nombre propio conserva la forma del texto y permite el sentido colectivo implícito.
- source_word: הִרְדִיפֻהוּ
  english_pob_choice: pursued him
  chosen_spanish: lo persiguieron
  alternatives_spanish:
  - lo corrieron
  - lo acosaron
  lexicon: HALOT
  rationale: El valor básico de רדף en contexto militar es «perseguir». El plural español refleja el sujeto colectivo del hebreo, mientras el objeto singular conserva el tratamiento colectivo de Benjamín.
- source_word: הִדְרִיכֻהוּ
  english_pob_choice: trod him down
  chosen_spanish: lo pisotearon
  alternatives_spanish:
  - lo aplastaron
  - lo hicieron marchar
  lexicon: HALOT
  rationale: La forma causativa de דרך puede expresar la idea de pisar o hacer pisar con fuerza. En el contexto de batalla, «pisotearon» conserva la violencia del acto sin introducir una paráfrasis excesiva.
- source_word: עַד נֹכַח הַגִּבְעָה
  english_pob_choice: as far as opposite Gibeah
  chosen_spanish: hasta enfrente de Guibeá
  alternatives_spanish:
  - hasta frente a Guibeá
  - hasta lo opuesto de Guibeá
  lexicon: HALOT
  rationale: נֹכַח indica estar enfrente, opuesto o delante de algo. «Enfrente de» comunica con claridad la relación espacial y mantiene la estructura del hebreo.
- source_word: מִמִּזְרַח שָׁמֶשׁ
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - al oriente
  lexicon: HALOT
  rationale: 'La expresión hebrea es literalmente idiomática: «desde el oriente del sol». La revisión inglesa ya la naturaliza como «toward the east»; en español, «hacia el oriente» conserva el sentido direccional con registro digno y bíblico.'
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó adverbios no explícitos como «relentlessly» y prefirió una formulación más formal («trod him down», «toward the east»). La presente propuesta sigue esa revisión y evita añadir intensidad no sustentada, pero mantiene abiertas las alternativas necesarias donde el hebreo es ambiguo, especialmente en מְנוּחָה y נֹכַח.
  spanish_consistency_notes:
  - Se usa «Benjamín» como nombre colectivo, en consonancia con el singular colectivo del hebreo.
  - «Guibeá» mantiene la transliteración usada habitualmente en español bíblico para la ciudad.
  - «Oriente» se emplea como equivalente natural y reverente de la indicación direccional hebrea.
  - No se introduce «SEÑOR» ni otra convención de sustitución porque este versículo no contiene el nombre divino.
