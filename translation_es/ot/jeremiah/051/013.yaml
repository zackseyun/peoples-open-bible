review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: apelación directa a Babilonia personificada, ubicación entre muchas aguas, abundancia de tesoros, llegada del fin y la idea de una medida/límite respecto de su ganancia. Sin embargo, la nota b no preserva adecuadamente la alternativa léxica documentada en la auditoría inglesa, porque repite prácticamente el texto principal y omite la literalidad notable «codo» y el matiz de «ganancia injusta».'
  spanish_quality_summary: El español es claro, natural y digno. «Tú que habitas junto a muchas aguas» y «abundante en tesoros» funcionan bien. La puntuación y la fluidez son buenas. Solo requiere ajustar la nota b para que sea más fiel al expediente léxico y más útil para el lector.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las decisiones «habitas», «junto a muchas aguas», «abundante en tesoros», «ha llegado tu fin» y «tu ganancia» son compatibles con el expediente inglés y con un español eclesial legible. No intervienen términos sensibles del glosario mayor como Yahvé, Mesías, Espíritu o esclavo.
  issues:
  - severity: medium
    issue: La nota b no conserva la alternativa literal relevante de אַמַּת
    rationale: 'La auditoría inglesa registra explícitamente la posibilidad literal «the cubit of your unjust gain». La nota española actual dice «Lit.: ‘la medida de tu ganancia’», que no añade información real frente al texto principal y pierde la opción «codo».'
  - severity: medium
    issue: La nota b omite el matiz moral alternativo de בִּצְעֵךְ
    rationale: El expediente inglés indica «unjust gain» como alternativa importante. Aunque el texto principal puede mantener «ganancia», la nota debería preservar la posibilidad de «ganancia injusta» para reflejar la evidencia léxica documentada.
  revised_spanish_text: Tú que habitas junto a muchas aguas[a], abundante en tesoros, ha llegado tu fin[b], la medida de tu ganancia.
  revised_footnotes:
  - marker: a
    text: 'O: «sobre muchas aguas».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «el codo de tu ganancia injusta», probablemente con el sentido de «la medida» o «el límite» de tu ganancia injusta.'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal, que es fiel y natural, y solo se corrige la nota b para alinearla con la auditoría inglesa: debe preservar la literalidad notable «codo» y la alternativa semántica «ganancia injusta», además de explicar el sentido probable de medida o límite.'
