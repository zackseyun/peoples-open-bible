translation:
  language: es
  text: 'Entonces el ángel de Yahvé volvió por segunda vez, lo tocó y dijo[a]: «Levántate y come, porque el camino es demasiado para tus fuerzas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió a venir
  lexicon: HALOT
  rationale: שׁוּב en este contexto narrativo expresa retorno. «Volvió» es natural en español y mantiene la idea de regreso sin añadir matices no presentes.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel del Señor
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar «mensajero» o «ángel»; en este contexto narrativo y conforme al criterio doctrinal del nombre divino, se conserva «ángel» y se traduce יְהוָה como «Yahvé».
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: HALOT
  rationale: La expresión marca repetición específica. «Por segunda vez» preserva esa precisión mejor que un simple «otra vez».
- source_word: וַיִּגַּע בּוֹ
  english_pob_choice: touched him
  chosen_spanish: lo tocó
  alternatives_spanish:
  - lo volvió a tocar
  - tocó a él
  lexicon: HALOT
  rationale: נגע con el pronombre objeto indica contacto físico directo. En español, «lo tocó» es la formulación más natural y fiel. No se añade «otra vez» porque la repetición ya quedó expresada en la cláusula anterior.
- source_word: קוּם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levántese
  - Alzate
  lexicon: HALOT
  rationale: El imperativo llama a incorporarse. «Levántate» conserva la fuerza del mandato en español moderno y sigue el tono directo del hebreo.
- source_word: אֱכֹל
  english_pob_choice: eat
  chosen_spanish: come
  alternatives_spanish:
  - alimenta-te
  - ingiere
  lexicon: HALOT
  rationale: El imperativo simple de comer se traduce de forma directa y común con «come».
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato. «Porque» comunica la relación causal de manera clara en español.
- source_word: רַב מִמְּךָ הַדָּרֶךְ
  english_pob_choice: the journey is too much for you
  chosen_spanish: el camino es demasiado para ti
  alternatives_spanish:
  - el viaje es demasiado para ti
  - el camino es demasiado grande para ti
  - el camino te queda demasiado
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente que «el camino» es grande/mucho «de ti»; en contexto, implica que supera la capacidad de Elías. «Demasiado para ti» conserva la idea de exceso/carga sin reducirla solo a distancia, y «camino» sigue de cerca הַדָּרֶךְ.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: La fuente hebrea usa el Tetragrámaton directamente. Conforme a la norma del proyecto, se conserva el nombre propio divino en español como «Yahvé» en vez de ocultarlo con un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español en la palabra «dijo[a]». La redacción mantiene la equivalencia óptima con el hebreo y con el criterio auditado del POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como traducción del nombre divino, conforme a la guía del proyecto.
  - Se eligió «camino» para reflejar הַדָּרֶךְ, aunque en contexto la frase alude a la carga o exceso de la jornada.
  - Se evitó repetir «otra vez» en el verbo «tocó» porque la repetición ya está expresada por «por segunda vez».
  - La puntuación y las mayúsculas siguen el uso del español contemporáneo con registro bíblico digno.
