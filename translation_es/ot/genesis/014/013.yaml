  glossary_alignment: 'La terminología clave está bien alineada: «Abram», «el hebreo», «el amorreo» y «aliados» son apropiados. «Fugitivo» es aceptable para הַפָּלִיט. No hay conflictos con las directrices mayores del proyecto. La excepción necesaria es restaurar la nota de alternativa para «hermano» y reasignar correctamente la nota botánica a «robles».'
