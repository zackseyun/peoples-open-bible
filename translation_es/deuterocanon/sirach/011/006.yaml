translation:
  language: es
  text: Muchos que eran oprimidos se sentaron en un trono[a][b], y uno inesperado se puso un turbante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «una persona inesperada recibió gran honor». El hebreo dice literalmente que «no subió al corazón» y luego que «se puso un turbante», usando una imagen concreta para la exaltación repentina.'
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego difiere en la redacción, leyendo en cambio que muchos gobernantes fueron deshonrados gravemente y que hombres ilustres fueron entregados en manos de otros. Ambas formas expresan una inversión de estatus.
    reason: alternative_reading
lexical_decisions:
- source_word: רַבִּים / πολλοὶ
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Muchas personas
  - Numerosos
  lexicon: HALOT
  rationale: El término es cuantitativo y directo; «Muchos» conserva la brevedad y el paralelo natural con el arranque de la sentencia sapiencial.
- source_word: נִדְכָּאִים / δυνάσται ἠτιμάσθησαν σφόδρα
  english_pob_choice: who were oppressed
  chosen_spanish: que eran oprimidos
  alternatives_spanish:
  - humillados
  - abatidos
  - aplastados
  lexicon: HALOT
  rationale: El hebreo habla de personas oprimidas o quebrantadas; en español, «oprimidos» mantiene el sentido pasivo y social sin volverlo demasiado interpretativo.
- source_word: יָשְׁבוּ עַל כִּסֵּא
  english_pob_choice: sat on a throne
  chosen_spanish: se sentaron en un trono
  alternatives_spanish:
  - tomaron un trono
  - se sentaron en un trono real
  - se sentaron en un trono
  lexicon: HALOT
  rationale: La imagen concreta del hebreo se conserva. «Trono» comunica mejor la elevación de rango que «silla» o «asiento».
- source_word: וּבַל עָלוּ עַל לֵב
  english_pob_choice: and one not thought of
  chosen_spanish: y uno no pensado
  alternatives_spanish:
  - y uno no considerado
  - y uno que no vino a la mente
  - y uno inesperado
  lexicon: HALOT
  rationale: La frase hebrea expresa algo que no subió al corazón o a la mente; «no pensado» mantiene esa sorpresa sin añadir demasiado.
- source_word: עָטוּ צְנִיף
  english_pob_choice: put on a turban
  chosen_spanish: se puso una tiara
  alternatives_spanish:
  - se puso un turbante
  - se ciñó una diadema
  - se puso un tocado
  lexicon: HALOT
  rationale: El objeto es un adorno de dignidad o cargo. «Tiara» funciona en español como equivalente de un tocado distinguido y evita una imagen demasiado moderna de «turbante» si se quisiera marcar la elevación honorífica; aun así, «turbante» queda como alternativa más literal.
theological_decisions:
- issue: Prioridad del hebreo con apoyo del paralelo griego en una sentencia de inversión social
  english_pob_reading: The Hebrew is primary; the Greek parallel confirms the theme of reversal in status.
  chosen_spanish_reading: 'Se traduce principalmente el hebreo, dejando que el paralelo griego solo confirme la inversión de condición: los oprimidos son exaltados.'
  alternative_spanish_readings:
  - 'Seguir más de cerca el griego: «muchos gobernantes fueron grandemente deshonrados, y hombres ilustres fueron entregados en manos de otros»'
  - 'Hacer la idea más abstracta: «muchos humillados alcanzaron honor»'
  rationale: El hebreo está avalado con alta confianza y ofrece la imagen más concreta del versículo. El griego sostiene el mismo tema sapiencial de reversión, pero no debe desplazar el testimonio hebreo aquí.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando Sirácides se conserva; usar el paralelo griego como apoyo real sin sustituir la prioridad hebrea.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar nada; por eso se mantiene la lectura hebrea principal, con el paralelo griego consignado en nota como apoyo de la misma temática.
  spanish_consistency_notes:
  - Se conserva el tono sapiencial breve y sentencioso.
  - «Oprimidos» y «trono» mantienen la reversión social del hebreo.
  - La imagen concreta de un tocado de dignidad se preserva en lugar de abstraerla por completo.
  - La nota del griego explicita la divergencia textual sin desplazar el texto base.
