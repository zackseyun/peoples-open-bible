id: 2KI.13.19
reference: 2 Kings 13:19
source:
  edition: WLC
  text: וַ/יִּקְצֹ֨ף עָלָ֜י/ו אִ֣ישׁ הָ/אֱלֹהִ֗ים וַ/יֹּ֨אמֶר֙ לְ/הַכּ֨וֹת חָמֵ֤שׁ אוֹ שֵׁשׁ֙ פְּעָמִ֔ים אָ֛ז הִכִּ֥יתָ אֶת אֲרָ֖ם עַד כַּלֵּ֑ה וְ/עַתָּ֕ה שָׁלֹ֥שׁ פְּעָמִ֖ים תַּכֶּ֥ה אֶת אֲרָֽם־־־־׃ס
translation:
  text: Then the man of God was angry with him and said[a], “You should have struck the ground five or six times; then you would have struck Aram until it was finished[b]. But now you will strike Aram only three times.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply 'to strike'; 'the ground' is supplied from the immediately preceding action in verse 18.
    reason: cross_reference
  - marker: b
    text: Or 'until you had made an end of Aram' / 'until complete destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְצֹף
  chosen: was angry
  alternatives:
  - was enraged
  - became angry
  lexicon: HALOT
  rationale: קצף denotes anger/wrath. 'Was angry' is natural modern English and fits the narrative rebuke without overstating the intensity.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is the standard Hebrew expression and should be preserved rather than interpreted more loosely as 'prophet,' though that is the role in context.
- source_word: לְהַכּוֹת
  chosen: have struck the ground
  alternatives:
  - have struck
  - have beaten
  lexicon: HALOT
  rationale: The infinitive 'to strike' refers back to the symbolic action of striking the ground in the immediate context (v. 18). Supplying 'the ground' in English makes the rebuke intelligible and reflects the implied object from context rather than adding new meaning.
- source_word: חָמֵשׁ אוֹ שֵׁשׁ פְּעָמִים
  chosen: five or six times
  lexicon: HALOT
  rationale: A straightforward numerical expression; retained literally.
- source_word: אָז
  chosen: then
  alternatives:
  - in that case
  lexicon: HALOT
  rationale: Marks the consequence of the hypothetical action. 'Then' is concise and idiomatic.
- source_word: הִכִּיתָ אֶת אֲרָם
  chosen: you would have struck Aram
  alternatives:
  - you would have defeated Aram
  - you would have beaten Aram
  lexicon: HALOT
  rationale: The same verb נכה is used for the symbolic striking and the military result. 'Struck Aram' preserves the verbal link better than the more interpretive 'defeated,' while still making sense in English.
- source_word: עַד כַּלֵּה
  chosen: until it was finished
  alternatives:
  - until complete destruction
  - until you had made an end of it
  - until annihilation
  lexicon: HALOT
  rationale: כלה here expresses bringing Aram to an end in military terms. 'Until it was finished' preserves the idiomatic force in readable English without over-specifying annihilation beyond the Hebrew. The pronoun 'it' refers to Aram as a national entity.
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: In context this introduces the disappointing actual outcome in contrast to the unrealized possibility; 'But now' brings out that contrast clearly.
- source_word: שָׁלֹשׁ פְּעָמִים תַּכֶּה אֶת אֲרָם
  chosen: you will strike Aram only three times
  alternatives:
  - you shall strike Aram three times
  - three times you will strike Aram
  lexicon: HALOT
  rationale: Imperfect here is predictive. Adding 'only' is warranted by the contrast with the prior five or six times and the rebuke's force, making explicit the limitation implied in context.
