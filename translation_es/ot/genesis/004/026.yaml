translation:
  language: es
  text: Y a Set también le nació un hijo, y le puso por nombre Enós. Entonces comenzaron a invocar[a] el nombre de Yahvé.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Entonces se comenzó a invocar el nombre de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Una interpretación minoritaria entiende el verbo como «fue profanado», dando algo como: «Entonces comenzaron a profanar el nombre de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/לְ/שֵׁת
  english_pob_choice: And to Seth
  chosen_spanish: Y a Set
  alternatives_spanish:
  - Y para Set
  - Y para Set también
  lexicon: HALOT
  rationale: El hebreo introduce a Set como beneficiario de la noticia con una preposición que en español se expresa naturalmente con 'a'. Se conserva la estructura aditiva con 'también'.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: Marca adición respecto de la línea genealógica anterior; 'también' transmite esa suma sin sobrecargar el registro.
- source_word: יֻלַּד בֵּן
  english_pob_choice: a son was born
  chosen_spanish: le nació un hijo
  alternatives_spanish:
  - nació un hijo
  - tuvo un hijo
  lexicon: HALOT
  rationale: La pasiva hebrea de ילד con 'hijo' admite en español una construcción natural de nacimiento. 'Le nació un hijo' preserva el matiz pasivo y evita una paráfrasis demasiado libre.
- source_word: וַיִּקְרָא אֶת־שְׁמוֹ אֱנוֹשׁ
  english_pob_choice: and he called his name Enosh
  chosen_spanish: le puso por nombre Enós
  alternatives_spanish:
  - y llamó su nombre Enós
  - y lo nombró Enós
  lexicon: HALOT
  rationale: En español, 'poner por nombre' comunica mejor el giro idiomático hebreo que una calca rígida. Se mantiene el sentido de nombrar al hijo, con el nombre propio transliterado según uso español.
- source_word: אֱנוֹשׁ
  english_pob_choice: Enosh
  chosen_spanish: Enós
  alternatives_spanish:
  - Enosh
  lexicon: HALOT
  rationale: Se conserva el nombre propio, adaptado a la grafía usual en español bíblico para facilitar lectura sin perder la transliteración.
- source_word: אָז
  english_pob_choice: At that time
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese tiempo
  - En aquel tiempo
  lexicon: HALOT
  rationale: '''Entonces'' funciona como marcador temporal directo y fluido en español. Aunque ''en aquel tiempo'' explicita el valor temporal, ''entonces'' mantiene concisión y la relación cronológica del hebreo.'
- source_word: הוּחַל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - se inició
  - fue comenzado
  - empezó
  lexicon: HALOT
  rationale: 'Se sigue la lectura inceptiva mayoritaria del Hophal de חלל: ''comenzó''. ''Se inició'' es posible, pero ''comenzó'' resulta más natural en español y mantiene la ambigüedad histórica sin forzarla.'
- source_word: לִ/קְרֹא בְּ/שֵׁם
  english_pob_choice: to call on the name
  chosen_spanish: a invocar el nombre
  alternatives_spanish:
  - a llamar el nombre
  - a llamar por el nombre
  - a invocar sobre el nombre
  lexicon: HALOT
  rationale: En contextos de Génesis, קרא בשם puede denotar invocación religiosa. 'Invocar el nombre' conserva esa fuerza cultual sin depender de la paráfrasis inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la terminología base del proyecto en español: el Tetragrama se rinde como ''Yahvé'', preservando el nombre divino y evitando la sustitución por un título.'
theological_decisions:
- issue: Sentido de הוּחַל לִקְרֹא בְּשֵׁם יְהוָה
  english_pob_reading: At that time people began to call on the name of Yahweh
  chosen_spanish_reading: Entonces comenzó a invocarse el nombre de Yahvé
  alternative_spanish_readings:
  - Entonces se comenzó a invocar el nombre de Yahvé
  - Entonces comenzaron a invocar el nombre de Yahvé
  - Entonces empezó a profanarse el nombre de Yahvé
  rationale: La POB inglesa sigue la lectura inceptiva tradicional y la conserva sin adoptar la lectura minoritaria de 'profanar'. En español, la forma impersonal/reflexiva 'comenzó a invocarse' expresa con claridad que el énfasis recae en el inicio de la invocación al nombre divino.
  doctrine_reference: Translation philosophy §3; Contested terms table for יְהוָה
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la decisión editorial del proyecto de no ocultar el nombre divino con una sustitución litúrgica. 'Yahvé' es la forma establecida para el español en este trabajo, coherente con la transparencia del texto.
  doctrine_reference: Translation philosophy §3; Contested terms table for יְהוָה
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; la presente propuesta sigue la lectura mayoritaria inceptiva de הוּחַל, conserva la nota de la lectura minoritaria 'profanar' y adapta el nombre divino al estándar español del proyecto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se usa 'Enós' como forma española del nombre propio Enosh.
  - Se evita 'SEÑOR' para no sustituir el nombre divino por un título.
  - La frase verbal 'comenzó a invocarse' conserva la lectura impersonal que mejor refleja la inceptividad del hebreo.
