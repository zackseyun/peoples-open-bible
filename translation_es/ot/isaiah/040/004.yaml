translation:
  language: es
  text: Todo valle será elevado, y todo monte y colina serán rebajados; lo torcido[a] se volverá llano, y las crestas[b] se convertirán en llanura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el terreno desigual»; el hebreo puede designar lo torcido, irregular o desigual.
    reason: lexical_alternative
  - marker: b
    text: O «los lugares escarpados»; el sustantivo hebreo es raro y puede referirse de modo más general a terreno áspero o cresteado.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּיא
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - barranco
  - hondonada
  lexicon: HALOT
  rationale: גֶּיא designa un valle o cauce/depresión semejante; 'valle' es la equivalencia natural en español y mantiene el paralelismo topográfico con monte y collado.
- source_word: יִנָּשֵׂא
  english_pob_choice: will be lifted up
  chosen_spanish: será elevado
  alternatives_spanish:
  - será levantado
  - será alzado
  lexicon: HALOT
  rationale: El nifal comunica una elevación pasiva del terreno. 'Será elevado' conserva la imagen sin sonar forzado en español.
- source_word: הַר
  english_pob_choice: mountain
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  lexicon: HALOT
  rationale: Aunque 'montaña' es posible, 'monte' funciona bien en la pareja poética con 'collado' y evita una formulación demasiado moderna o pesada.
- source_word: גִבְעָה
  english_pob_choice: hill
  chosen_spanish: collado
  alternatives_spanish:
  - colina
  - cerro
  lexicon: HALOT
  rationale: גִבְעָה es una elevación menor que הַר. 'Collado' reproduce bien esa diferencia dentro de una dicción bíblica clara en español.
- source_word: יִשְׁפָּלוּ
  english_pob_choice: will be made low
  chosen_spanish: será rebajado
  alternatives_spanish:
  - será abajado
  - será humillado
  lexicon: HALOT
  rationale: El verbo expresa quedar bajo o abatido. 'Será rebajado' comunica la acción sobre el relieve físico y evita introducir una carga moral que el hebreo no exige aquí.
- source_word: הֶעָקֹב
  english_pob_choice: the uneven ground
  chosen_spanish: lo escabroso
  alternatives_spanish:
  - el terreno torcido
  - lo accidentado
  lexicon: HALOT
  rationale: El término puede indicar lo torcido, irregular o desigual. En este contexto vial/topográfico, 'lo escabroso' preserva la idea de terreno difícil e irregular sin sonar demasiado abstracto.
- source_word: לְמִישׁוֹר
  english_pob_choice: level
  chosen_spanish: llano
  alternatives_spanish:
  - nivelado
  - plano
  lexicon: HALOT
  rationale: מִישׁוֹר es terreno llano o plano. 'Llano' encaja bien como resultado del contraste con lo escabroso y mantiene la concisión poética.
- source_word: הָרְכָסִים
  english_pob_choice: the ridges
  chosen_spanish: las alturas
  alternatives_spanish:
  - las crestas
  - los riscos
  lexicon: HALOT
  rationale: El sustantivo es raro y puede referirse a terreno áspero o cresteado. 'Las alturas' recoge el sentido general sin forzar un tecnicismo opaco, y permite un paralelo natural con 'llanura'.
- source_word: לְבִקְעָה
  english_pob_choice: a plain
  chosen_spanish: llanura
  alternatives_spanish:
  - valle ancho
  - planicie
  lexicon: HALOT
  rationale: בִקְעָה denota un valle amplio o una llanura. 'Llanura' comunica bien el estado final de aplanamiento y evita repetir 'valle'.
theological_decisions:
- issue: Imaginería física frente a lectura metafórica
  english_pob_reading: Render as physical/topographical transformation without importing later theological interpretation into the main text.
  chosen_spanish_reading: Conservar una transformación del paisaje como imagen física, sin insertar en la línea principal una explicación moral o escatológica.
  alternative_spanish_readings:
  - Humillación de los soberbios y exaltación de los humildes
  - Preparación escatológica para la venida de Yahvé
  rationale: El hebreo presenta primero una imagen concreta de preparación del camino. La traducción debe mantener esa concreción y dejar que la interpretación surja del contexto más amplio, no del giro escogido en la línea principal.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético recibido y concuerda con el consenso alto del repaso en inglés; no se reflejan revisiones textuales adicionales en este versículo.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino conforme a las pautas del proyecto, aunque este versículo no lo contiene explícitamente.
  - 'Se evita traducir mecánicamente desde el inglés: ''será elevado'' y ''será rebajado'' siguen el movimiento pasivo del hebreo, mientras que ''lo escabroso'' y ''llanura'' responden al campo topográfico del original.'
  - Se conserva un registro bíblico claro y moderno, con términos comprensibles en la mayor parte del ámbito hispanohablante.
