- from: Y Judá e Israel habitaron en seguridad[a], cada hombre debajo de su vid y debajo de su higuera, desde Dan hasta Beer-sheba[b], todos los días de Salomón.
  to: Y Judá e Israel vivieron seguros[a], cada hombre debajo de su vid y debajo de su higuera, desde Dan hasta Beer-sheba[b], todos los días de Salomón.
