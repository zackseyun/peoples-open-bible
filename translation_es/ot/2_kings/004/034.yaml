translation:
  language: es
  text: Entonces subió y se acostó sobre el niño, y puso su boca sobre su boca, sus ojos sobre sus ojos y sus palmas sobre sus palmas; se extendió[a] sobre él, y la carne del niño se calentó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se inclinó sobre él». El verbo hebreo es raro y puede describir inclinarse o extenderse sobre el niño.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: Then he went up
  chosen_spanish: Entonces subió
  alternatives_spanish:
  - Entonces fue hacia arriba
  - Entonces subió a la habitación
  lexicon: HALOT
  rationale: עלה significa literalmente 'subir/ascender'. En español, 'subió' conserva el sentido verbal directo; 'a la habitación' queda implícito por el contexto narrativo, como en el texto inglés auditado.
- source_word: וַיִּשְׁכַּב עַל הַיֶּלֶד
  english_pob_choice: lay on the boy
  chosen_spanish: se acostó sobre el niño
  alternatives_spanish:
  - se echó sobre el niño
  - se acostó encima del niño
  lexicon: HALOT
  rationale: שׁכב expresa 'acostarse/recostarse'. 'Se acostó sobre' mantiene la acción física con naturalidad en español y evita un calco áspero.
- source_word: וַיָּשֶׂם פִּיו עַל פִּיו
  english_pob_choice: put his mouth on his mouth
  chosen_spanish: puso su boca sobre su boca
  alternatives_spanish:
  - colocó su boca sobre su boca
  - puso su boca encima de la boca del niño
  lexicon: HALOT
  rationale: שׂים se traduce de forma directa como 'poner'. 'Boca sobre su boca' conserva la simetría corporal del hebreo y el paralelo del texto fuente.
- source_word: וְעֵינָיו עַל עֵינָיו
  english_pob_choice: his eyes on his eyes
  chosen_spanish: sus ojos sobre sus ojos
  alternatives_spanish:
  - sus ojos encima de sus ojos
  - los ojos de él sobre los del niño
  lexicon: HALOT
  rationale: La construcción elíptica continúa la serie de correspondencias corporales. Mantener 'sus ojos sobre sus ojos' reproduce la estructura y la precisión del original.
- source_word: וְכַפָּיו עַל כַּפָּיו
  english_pob_choice: his palms on his palms
  chosen_spanish: sus palmas sobre sus palmas
  alternatives_spanish:
  - sus manos sobre sus manos
  - las palmas de él sobre las del niño
  lexicon: HALOT
  rationale: כַּף designa con más precisión la palma/hueco de la mano. 'Palmas' conserva esa concreción mejor que el más general 'manos'.
- source_word: וַיִּגְהַר עָלָיו
  english_pob_choice: he stretched himself over him
  chosen_spanish: se extendió sobre él
  alternatives_spanish:
  - se inclinó sobre él
  - se arqueó sobre él
  - se dobló sobre él
  lexicon: HALOT
  rationale: El verbo raro גהר puede describir inclinarse o extenderse sobre alguien. 'Se extendió sobre él' preserva la idea física amplia del acto y corresponde al equivalente inglés auditado.
- source_word: וַיָּחָם בְּשַׂר הַיָּלֶד
  english_pob_choice: the boy’s flesh became warm
  chosen_spanish: la carne del niño se calentó
  alternatives_spanish:
  - el cuerpo del niño se calentó
  - la carne del niño se volvió tibia
  lexicon: HALOT
  rationale: בָּשָׂר es literalmente 'carne', y el inglés POB conserva esa concreción. 'Se calentó' refleja חם de manera simple y fiel; 'carne' preserva el lenguaje corporal directo del hebreo.
- source_word: הַיֶּלֶד / הַיָּלֶד
  english_pob_choice: the boy
  chosen_spanish: el niño
  alternatives_spanish:
  - el muchacho
  - el pequeño
  lexicon: HALOT
  rationale: יֶלֶד puede significar 'niño' o 'muchacho'. Aquí 'niño' es natural en español y encaja con el contexto narrativo del hijo restaurado.
theological_decisions:
- issue: Naturaleza de la acción de Eliseo sobre el niño muerto
  english_pob_reading: Render the physical actions concretely without importing later medical or sacramental concepts.
  chosen_spanish_reading: Presentar los gestos físicos de manera concreta, sin introducir explicaciones médicas, sacramentales ni figurativas ajenas al relato.
  alternative_spanish_readings:
  - Describirlo como reanimación boca a boca
  - Suavizar el lenguaje corporal para evitar una lectura demasiado concreta
  rationale: El hebreo describe una secuencia corporal detallada como parte del relato de restauración del niño. La traducción debe conservar esa concreción sin añadir una explicación del mecanismo que el texto no da.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'La auditoría inglesa indica alta concordancia, sin revisiones aplicadas en el paso más reciente. La versión española sigue esa estabilidad: conserva la secuencia física concreta y la alternativa léxica para el verbo raro גהר.'
  spanish_consistency_notes:
  - Se mantuvo 'niño' para הַיֶּלֶד, coherente con la lectura inglesa 'boy' y natural en español.
  - Se conservó 'carne' para בָּשָׂר por su fuerza concreta; no se sustituyó por 'cuerpo' para no diluir el paralelismo con el texto fuente.
  - Se usó 'palmas' para כַפָּיו, en consonancia con la precisión léxica del audit trail.
  - La nota al pie marca la alternativa del verbo raro sin alterar el sentido principal del versículo.
