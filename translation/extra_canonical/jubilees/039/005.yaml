  category: grammar
  from: that there is no man who commits fornication
  to: that no man should commit fornication
  rationale: The Ge'ez construction `ከመ፡ አልቦ፡ ... ዘይዜሙ፡` (literally 'that there is no one... who fornicates') functions here as a prohibition. Rendering it as a descriptive statement ('there is no man who commits fornication') obscures the prescriptive meaning of Abraham's transmitted instruction.
