translation:
  language: es
  text: Y allí traerán sus holocaustos[a], sus sacrificios, sus diezmos, la contribución de su mano, sus ofrendas votivas[b], sus ofrendas voluntarias, y los primogénitos de su ganado mayor y de su ganado menor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ofrendas quemadas».
    reason: lexical_alternative
  - marker: b
    text: O simplemente «sus votos»; en este contexto, el sentido probablemente es el de las ofrendas asociadas con los votos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲבֵאתֶם
  english_pob_choice: you shall bring
  chosen_spanish: traerán
  alternatives_spanish:
  - llevarán
  - presentarán
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto legal prescribe que el pueblo lleve los dones al lugar señalado. «Traerán» conserva esa fuerza directiva sin sonar demasiado técnico o arcaizante en español.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - a ese lugar
  - ahí
  lexicon: HALOT
  rationale: La indicación deíctica remite al lugar de adoración ya identificado. «Allí» es natural en español y mantiene la referencia espacial.
- source_word: עֹלֹתֵיכֶם
  english_pob_choice: your burnt offerings
  chosen_spanish: sus holocaustos
  alternatives_spanish:
  - sus ofrendas quemadas
  - sus ofrendas totalmente consumidas
  lexicon: HALOT
  rationale: «עוֹלָה» designa la ofrenda totalmente consumida por fuego. En español bíblico, «holocausto» es el equivalente cultual estable y conserva mejor el sentido técnico que una paráfrasis descriptiva.
- source_word: זִבְחֵיכֶם
  english_pob_choice: your sacrifices
  chosen_spanish: sus sacrificios
  alternatives_spanish:
  - sus víctimas
  - sus ofrendas sacrificadas
  lexicon: HALOT
  rationale: «זֶבַח» es un término amplio para sacrificio animal. «Sacrificios» en español comunica esa categoría general sin estrechar indebidamente el término.
- source_word: מַעְשְׂרֹתֵיכֶם
  english_pob_choice: your tithes
  chosen_spanish: sus diezmos
  alternatives_spanish:
  - sus décimas
  - sus porciones décimas
  lexicon: HALOT
  rationale: El sustantivo indica la décima parte consagrada. «Diezmos» es la forma tradicional y clara en español, adecuada para el contexto cultual.
- source_word: תְּרוּמַת יֶדְכֶם
  english_pob_choice: the contribution of your hand
  chosen_spanish: la contribución de su mano
  alternatives_spanish:
  - la ofrenda de su mano
  - la contribución hecha con su mano
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea que incluye explícitamente «mano», porque el énfasis es en lo que cada uno presenta personalmente. «Contribución de su mano» mantiene el eco literal sin perder legibilidad.
- source_word: נִדְרֵיכֶם
  english_pob_choice: your vow offerings
  chosen_spanish: sus ofrendas votivas
  alternatives_spanish:
  - sus votos
  - sus ofrendas prometidas
  lexicon: HALOT
  rationale: En esta lista sacrificial, el término no se limita al voto verbal sino a la ofrenda asociada al voto cumplido. «Ofrendas votivas» expresa ese sentido cultual de manera precisa y sobria.
- source_word: נִדְבֹתֵיכֶם
  english_pob_choice: your freewill offerings
  chosen_spanish: sus ofrendas voluntarias
  alternatives_spanish:
  - sus ofrendas libremente dadas
  - sus ofrendas de libre voluntad
  lexicon: HALOT
  rationale: El hebreo alude a dones ofrecidos espontáneamente, no por obligación ni por voto. «Ofrendas voluntarias» distingue bien esa matización en español.
- source_word: בְכֹרֹת בְּקַרְכֶם וְצֹאנְכֶם
  english_pob_choice: the firstborn of your herd and of your flock
  chosen_spanish: los primogénitos de su ganado mayor y de su ganado menor
  alternatives_spanish:
  - los primogénitos de su hato y de su rebaño
  - los primogénitos de sus reses y de sus ovejas y cabras
  lexicon: HALOT
  rationale: La pareja hebrea distingue el ganado grande y el pequeño. «Ganado mayor» y «ganado menor» conserva esa distinción de manera clara y natural en español, manteniendo el valor cultual de los primogénitos dedicados a Dios.
theological_decisions:
- issue: Alcance de תְּרוּמַת יֶדְכֶם
  english_pob_reading: the contribution of your hand / the contribution from your hand
  chosen_spanish_reading: la contribución de su mano
  alternative_spanish_readings:
  - la ofrenda de su mano
  - la contribución hecha con su mano
  rationale: Se conserva la tensión entre una contribución general y la imagen corporal concreta de la «mano», porque el hebreo no la explicita fuera de la fórmula. La traducción evita borrar ese énfasis personal y manual del acto de ofrecer.
  doctrine_reference: Deuteronomio 12:6; uso cultual de תְּרוּמָה
- issue: Naturaleza de נִדְרֵיכֶם en una lista sacrificial
  english_pob_reading: your vow offerings
  chosen_spanish_reading: sus ofrendas votivas
  alternative_spanish_readings:
  - sus votos
  - sus ofrendas prometidas
  rationale: El contexto enumera objetos llevados al santuario, por lo que «votos» a secas sería demasiado abstracto. «Ofrendas votivas» mantiene la referencia al voto y a la ofrenda cumplida sin imponer una reinterpretación.
  doctrine_reference: Deuteronomio 12:6; relación entre voto y ofrenda
- issue: Traducción de עֹלָה
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - ofrendas totalmente consumidas
  rationale: Aunque «holocausto» puede ser menos transparente para lectores modernos, es el término bíblico tradicional que mejor corresponde al sacrificio totalmente quemado. Se conserva el valor técnico del culto israelita sin sustituirlo por una paráfrasis.
  doctrine_reference: Levítico 1; Deuteronomio 12:6
translation_notes:
  revision_awareness: El texto sigue la lectura estable del auditor inglés sin cambios de revisión aplicados; se conservan las equivalencias cultuales y la nota sobre la imagen de «mano» y el sentido de las ofrendas votivas.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en todo el proyecto, aunque este versículo no lo contiene.
  - Se mantiene un registro bíblico culto pero contemporáneo, evitando calcos innecesarios.
  - «Holocaustos» se reserva para עֹלָה en sentido técnico sacrificial; no se usa como término general.
  - «Ofrendas voluntarias» distingue correctamente נִדְבֹתֵיכֶם de las ofrendas votivas.
  - La coordinación final conserva la polisíndeton del hebreo con una lista completa de dones.
