translation:
  language: es
  text: 'Maldito[a] es el hombre que hace una imagen tallada o una imagen fundida[b]—una abominación para Yahvé, obra de las manos de un artesano—y la pone en secreto. Y todo el pueblo responderá y dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el hombre»; la forma masculina singular funciona aquí como fórmula legal representativa.'
    reason: lexical_alternative
  - marker: b
    text: O «una imagen de fundición». El término hebreo se refiere a una imagen hecha por fundición, a menudo en metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Cursed
  - ¡Maldito sea!
  lexicon: HALOT
  rationale: אָרוּר introduce una fórmula de maldición/catálogo legal. En español, «maldito» conserva la fuerza de la sentencia sin sonar tan arcaico como «cursed» en inglés bíblico.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - quien
  lexicon: HALOT
  rationale: El hebreo usa singular masculino con valor representativo en una fórmula legal. «El hombre» mantiene esa forma sin neutralizarla; no se suaviza a «quien» en el texto principal.
- source_word: יַעֲשֶׂה
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - fabrica
  - construye
  lexicon: HALOT
  rationale: En contexto idolátrico, עשה puede ser «hacer» en sentido amplio. «Hace» es natural en español y suficientemente concreto para la producción del ídolo.
- source_word: פֶסֶל
  english_pob_choice: a carved image
  chosen_spanish: un ídolo tallado
  alternatives_spanish:
  - una imagen tallada
  - un ídolo esculpido
  lexicon: HALOT
  rationale: פֶסֶל denota una imagen hecha por talla/esculpido. «Ídolo tallado» comunica bien la forma material y el valor religioso negativo que el contexto ya impone.
- source_word: מַסֵּכָה
  english_pob_choice: a cast image
  chosen_spanish: un ídolo fundido
  alternatives_spanish:
  - una imagen fundida
  - un ídolo vaciado
  lexicon: HALOT
  rationale: מַסֵּכָה se refiere a una imagen hecha por fundición. «Ídolo fundido» es claro en español y evita añadir «metal», que el hebreo no especifica explícitamente aquí.
- source_word: תּוֹעֲבַת יְהוָה
  english_pob_choice: an abomination to Yahweh
  chosen_spanish: una abominación para Yahvé
  alternatives_spanish:
  - una abominación de Yahvé
  - algo abominable para Yahvé
  lexicon: HALOT
  rationale: La construcción hebrea expresa lo que resulta detestable para Yahvé. «Para Yahvé» conserva la relación de disgusto/covenantal sin introducir una formulación posesiva más interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el Tetragrámaton: «Yahvé». Mantiene el nombre personal divino en lugar de sustituirlo por un título.'
- source_word: מַעֲשֵׂה יְדֵי חָרָשׁ
  english_pob_choice: the work of the hands of a craftsman
  chosen_spanish: obra de manos de artesano
  alternatives_spanish:
  - trabajo de manos de un artesano
  - hechura de un artesano
  lexicon: HALOT
  rationale: La frase destaca la manufactura humana del ídolo. «Obra de manos de artesano» es fiel, compacta y estilísticamente digna en español bíblico moderno.
- source_word: וְשָׂם
  english_pob_choice: and sets it up
  chosen_spanish: y lo pone
  alternatives_spanish:
  - y lo coloca
  - y lo instala
  lexicon: HALOT
  rationale: El verbo simple «poner» comunica la acción de establecer la imagen. En español, «lo pone en secreto» reproduce bien el carácter de ocultamiento sin sobreinterpretar una instalación formal.
- source_word: בַּסָּתֶר
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - a escondidas
  - ocultamente
  lexicon: HALOT
  rationale: La idea central es ocultamiento. «En secreto» es la forma más natural y directa en español para el sustantivo hebreo con la preposición.
- source_word: וְעָנוּ כָל הָעָם
  english_pob_choice: And all the people shall answer
  chosen_spanish: Y todo el pueblo responderá
  alternatives_spanish:
  - Y todo el pueblo contestará
  - Y todo el pueblo dirá
  lexicon: HALOT
  rationale: En un marco litúrgico-legal, «responderá» conserva la respuesta coral formal. «Todo el pueblo» refleja con fluidez la colectividad del hebreo.
- source_word: וְאָמְרוּ אָמֵן
  english_pob_choice: and say, “Amen.”
  chosen_spanish: 'y dirá: «Amén»'
  alternatives_spanish:
  - 'y dirá: «Así sea»'
  - 'y dirá: «Verdaderamente»'
  lexicon: HALOT
  rationale: «Amén» debe conservarse como respuesta litúrgica establecida. Se mantiene la fórmula breve de asentimiento sin reemplazarla por una paráfrasis.
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del proyecto, se preserva el nombre divino en español como «Yahvé», no como sustituto titulado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Fórmula jurídica con masculino singular genérico
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - quien
  - la persona
  rationale: El hebreo presenta una forma masculina singular que funciona como fórmula representativa en la maldición legal. Se conserva esa estructura en español en lugar de neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Lenguaje de idolatría y juicio
  english_pob_reading: a carved image or a cast image
  chosen_spanish_reading: un ídolo tallado o un ídolo fundido
  alternative_spanish_readings:
  - una imagen tallada o una imagen fundida
  - un ídolo esculpido o un ídolo vaciado
  rationale: El hebreo nombra dos tipos concretos de imágenes prohibidas. «Tallado» y «fundido» preservan la distinción material y evitan una generalización doctrinalmente más débil.
  doctrine_reference: HALOT entries for פֶסֶל and מַסֵּכָה
translation_notes:
  revision_awareness: El texto base inglés fue revisado de «cast metal image» a «cast image» para ajustarse más de cerca al hebreo, que no explicita «metal». La versión española sigue esa decisión con «ídolo fundido» y evita añadir material no presente en el fuente. También se preserva la lectura del Nombre divino como Yahvé, conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, en consonancia con el proyecto.
  - Se conserva «Amén» como fórmula litúrgica establecida.
  - «Ídolo tallado / ídolo fundido» refleja la distinción hebrea entre פֶסֶל y מַסֵּכָה sin añadir «metal» explícitamente.
  - La nota al pie se usa solo para la tensión del masculino genérico; el resto del versículo se deja en el cuerpo principal para legibilidad pública.
