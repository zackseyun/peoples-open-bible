  yaml_path: translation/ot/jeremiah/005/009.yaml
  text: Shall I not punish for these things? declares Yahweh[a]. And on a nation such as this[b], shall I not avenge myself?
  footnotes:
  - marker: a
    text: Or, 'And if on a nation such as this, shall my soul not take vengeance?' The Hebrew conjunction can be rendered more literally as 'and if,' though here it introduces a second rhetorical question.
    reason: lexical_alternative
  - marker: b
    text: '''My soul'' is a Hebrew way of referring to the LORD himself in vivid, personal terms.'
    reason: cultural_note
