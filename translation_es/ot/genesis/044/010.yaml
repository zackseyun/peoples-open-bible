  glossary_alignment: 'Buena alineación general con la terminología del proyecto: עָבֶד -> «esclavo» está correctamente conservado con nota alternativa «siervo»; no hay términos divinos o mesiánicos relevantes aquí. «Inocentes» preserva bien נְקִיִּם en sentido forense.'
