review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente el sentido general del hebreo: explicación causal, lugar del exilio, muerte allí y privación definitiva de volver a ver la tierra. Sin embargo, «adonde» introduce un matiz direccional no presente en בִּמְקוֹם אֲשֶׁר, que es locativo («en el lugar donde»). Además, «los hayan desterrado» usa subjuntivo compuesto, menos natural aquí que un pretérito perfecto/indefinido con valor narrativo estable en español bíblico moderno.'
  spanish_quality_summary: 'La redacción es clara y digna, pero puede mejorar en naturalidad y precisión con «en el lugar donde lo han desterrado» o «donde lo desterraron». También conviene pulir la nota al pie: «lo hayan llevado en exilio» no es español natural; «lo hayan llevado al exilio» o «lo hayan llevado al destierro» sí lo son.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Desterrado» refleja bien הִגְלוּ אֹתוֹ en este contexto real/político, aunque «exiliado» también sería posible. «Tierra» para הָאָרֶץ es adecuado y fiel al contexto.
  issues:
  - severity: medium
    issue: «adonde» en vez de «donde»
    rationale: El hebreo בִּמְקוֹם אֲשֶׁר es locativo, no direccional. «Adonde» en español normalmente implica movimiento hacia un lugar, lo que añade un matiz no explicitado por la fuente.
  - severity: medium
    issue: Tiempo verbal «hayan desterrado»
    rationale: Aunque comprensible, el subjuntivo compuesto suena menos directo y menos natural en una afirmación profética de hecho. «Lo han desterrado» o «lo desterraron» expresa mejor el hebreo con sujeto indefinido.
  - severity: low
    issue: 'Nota al pie con formulación poco natural: «lo hayan llevado en exilio»'
    rationale: En español idiomático se diría «al exilio» o «al destierro». La nota debe conservar la alternativa lexical sin sonar antinatural.
  revised_spanish_text: Porque en el lugar donde lo han desterrado[a], allí morirá, y no volverá a ver esta tierra.
  revised_footnotes:
  - marker: a
    text: 'O: «lo han llevado al destierro» / «lo han llevado al exilio». El verbo hebreo especifica hacer que alguien vaya al exilio.'
    reason: lexical_alternative
  revision_rationale: La revisión corrige el matiz locativo de בִּמְקוֹם אֲשֶׁר con «donde», mejora la naturalidad verbal con «lo han desterrado» y ajusta la nota al pie a un español idiomático, manteniendo el sentido causativo de גלה y la fuerza final de exilio permanente.
