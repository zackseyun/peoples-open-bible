translation:
  language: es
  text: 'Entonces el rey de Israel dijo a Eliseo cuando los vio: «¿Los heriré[a]? ¿Los heriré[b], padre mío?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Los heriré? ¿Los heriré?» El hebreo repite el verbo para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: «Padre mío» es una forma de trato respetuosa hacia Eliseo, no una afirmación de parentesco biológico.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: WLC/HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Entonces» conserva la secuencia de la escena con español natural y digno.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el monarca de Israel
  lexicon: WLC/HALOT
  rationale: La cadena constructa es directa y el contexto la define; «rey» es la forma natural y fiel en español.
- source_word: אֶל אֱלִישָׁע
  english_pob_choice: to Elisha
  chosen_spanish: a Eliseo
  alternatives_spanish:
  - hacia Eliseo
  lexicon: WLC/HALOT
  rationale: La preposición אֶל marca dirección del discurso; en español, «a» reproduce ese valor sin añadir contenido no presente.
- source_word: כִּרְאֹתוֹ אֹתָם
  english_pob_choice: when he saw them
  chosen_spanish: cuando los vio
  alternatives_spanish:
  - así que los vio
  - al verlos
  lexicon: WLC/HALOT
  rationale: La cláusula temporal con infinitivo constructo se expresa de modo idiomático como «cuando los vio»; el sujeto de «vio» queda referido al rey por el contexto narrativo.
- source_word: הַאַכֶּה אַכֶּה
  english_pob_choice: Shall I strike them down? Shall I strike them down?
  chosen_spanish: ¿Los heriré? ¿Los heriré?
  alternatives_spanish:
  - ¿Los mataré? ¿Los mataré?
  - ¿Los atacaré? ¿Los atacaré?
  lexicon: WLC/HALOT
  rationale: La duplicación del verbo intensifica la pregunta. «Herir» conserva el campo léxico de golpear/dañar sin sobredeterminar más de lo que exige el hebreo; el contexto militar deja abierta la implicación letal sin forzarla en la traducción principal.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: padre mío
  alternatives_spanish:
  - mi padre
  - señor mío
  lexicon: WLC/HALOT
  rationale: Se preserva el valor honorífico literal del hebreo como forma de trato respetuosa hacia Eliseo, sin sustituirlo por una equivalencia interpretativa más libre.
theological_decisions:
- issue: Tratamiento honorífico hacia Eliseo
  english_pob_reading: Render אָבִי literally as 'my father' while understanding it as respectful address to a prophetic superior.
  chosen_spanish_reading: Traducirlo literalmente como «padre mío», entendiendo que es un tratamiento respetuoso hacia Eliseo.
  alternative_spanish_readings:
  - «mi señor»
  - «maestro mío»
  rationale: El hebreo usa lenguaje familiar literal; mantenerlo evita aplanar el matiz relacional y conserva la tensión entre la forma y la función del saludo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Sin revisiones aplicadas; el texto final sigue de cerca el hebreo y concuerda con el audit trail inglés en todos los puntos relevantes.
  spanish_consistency_notes:
  - Se mantuvo el orden narrativo con «Entonces» para reproducir la progresión del waw consecutivo.
  - Se conservó la repetición verbal del hebreo mediante preguntas duplicadas en español.
  - Se preservó el tratamiento honorífico literal «padre mío» para no perder el matiz de respeto hacia Eliseo.
  - No se añadió «profeta» porque no está en el hebreo de este versículo.
