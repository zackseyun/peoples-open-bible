translation:
  language: es
  text: Si ustedes temen a Yahvé y le sirven, y escuchan su voz[a], y no se rebelan contra el mandato de Yahvé, entonces tanto ustedes como el rey que reina sobre ustedes seguirán a Yahvé su Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Escuchar su voz" también puede entenderse como "obedecer su voz", porque la expresión hebrea suele incluir la idea de oír con obediencia.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, "y serán, tanto ustedes como el rey ... tras Yahvé su Dios". El sentido es que tanto el pueblo como su rey continuarán en lealtad a Yahvé, o lo seguirán.
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce una condición real, como en el hebreo. "Si" preserva el valor condicional del protasis sin añadir matiz temporal no explícito.
- source_word: תִּירְאוּ
  english_pob_choice: you fear
  chosen_spanish: temen
  alternatives_spanish:
  - reverencian
  - tienen temor de
  lexicon: HALOT
  rationale: El hebreo expresa temor reverente hacia Dios. En español, "temen" conserva la fuerza covenantal y teológica; "reverencian" suaviza demasiado el término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado, no una sustitución por título. "Yahvé" es la forma española estable del Tetragrámaton en este proyecto.
- source_word: וַעֲבַדְתֶּם אֹתוֹ
  english_pob_choice: and serve him
  chosen_spanish: y le sirven
  alternatives_spanish:
  - y le sirven como esclavos
  - y le adoran
  lexicon: HALOT
  rationale: עבד aquí incluye servicio leal al pacto. En español, "servir" comunica bien esa obligación sin forzar "adorar" ni cargar el término con esclavitud donde el contexto no lo exige.
- source_word: וּשְׁמַעְתֶּם בְּקֹלוֹ
  english_pob_choice: and listen to his voice
  chosen_spanish: y escuchan su voz
  alternatives_spanish:
  - y obedecen su voz
  - y atienden a su voz
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de oír la voz divina. "Escuchar" puede incluir obediencia en español, y deja abierta la tensión semántica que el hebreo también permite.
- source_word: וְלֹא תַמְרוּ
  english_pob_choice: and do not rebel
  chosen_spanish: y no se rebelan
  alternatives_spanish:
  - y no desobedecen
  - y no son rebeldes
  lexicon: HALOT
  rationale: מָרָה denota rebeldía, no mera falta administrativa de cumplimiento. "No se rebelan" preserva esa dureza del verbo.
- source_word: אֶת פִּי יְהוָה
  english_pob_choice: against the command of Yahweh
  chosen_spanish: contra el mandato de Yahvé
  alternatives_spanish:
  - contra la boca de Yahvé
  - contra la palabra de Yahvé
  lexicon: HALOT
  rationale: La expresión literal "la boca de Yahvé" es un hebraísmo que en español sonaría enigmático. "Mandato" refleja el contenido dicho/ordenado, como en la decisión inglesa auditada.
- source_word: וִהְיִתֶם
  english_pob_choice: then ... will
  chosen_spanish: entonces ... seguirán
  alternatives_spanish:
  - y serán
  - y estarán
  lexicon: HALOT
  rationale: El hebreo introduce el resultado de la condición. En español, "entonces ... seguirán" expresa el estado resultante con naturalidad y conserva la idea de continuidad.
- source_word: גַּם אַתֶּם וְגַם הַמֶּלֶךְ
  english_pob_choice: both you and the king
  chosen_spanish: tanto ustedes como el rey
  alternatives_spanish:
  - ustedes y también el rey
  - 'ambos: ustedes y el rey'
  lexicon: HALOT
  rationale: La correlación גַּם...וְגַם se reproduce de forma idiomática con "tanto... como...". Se mantiene la inclusión conjunta del pueblo y del rey.
- source_word: אֲשֶׁר מָלַךְ עֲלֵיכֶם
  english_pob_choice: who reigns over you
  chosen_spanish: que reina sobre ustedes
  alternatives_spanish:
  - que ha reinado sobre ustedes
  - que gobierna sobre ustedes
  lexicon: HALOT
  rationale: Aunque el perfecto hebreo puede verse como presente de estado, el español fluye mejor con "reina". Se conserva el referente al monarca vigente.
- source_word: אַחַר יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: will follow Yahweh your God
  chosen_spanish: seguirán a Yahvé su Dios
  alternatives_spanish:
  - irán tras Yahvé su Dios
  - estarán después de Yahvé su Dios
  lexicon: HALOT
  rationale: אַחַר seguido de una persona expresa seguimiento/lealtad. "Seguirán a Yahvé su Dios" mantiene la lectura positiva adoptada en el POB inglés y evita la literalidad extraña de "después de".
theological_decisions:
- issue: Cómo rendir el Tetragrámaton en una frase de exhortación/pacto
  english_pob_reading: The divine name is rendered 'Yahweh' rather than 'the LORD'.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto usa directamente el nombre del pacto. En español, "Yahvé" preserva esa identidad personal sin ocultarla tras un título genérico.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension and the revealed divine name.'
- issue: Sentido final de אַחַר יְהוָה אֱלֹהֵיכֶם
  english_pob_reading: The people and the king will follow Yahweh their God.
  chosen_spanish_reading: seguirán a Yahvé su Dios
  alternative_spanish_readings:
  - estarán tras Yahvé su Dios
  - caminarán después de Yahvé su Dios
  rationale: El hebreo es idiomático y puede leerse como lealtad/seguimiento. La versión elegida hace explícito ese sentido sin introducir una idea extra no sustentada por el texto.
  doctrine_reference: 'Translation philosophy #3: preserve the sense of allegiance without over-resolving the syntax.'
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión sin cambios sustantivos; la redacción española conserva la decisión auditable del POB inglés: nombre divino explícito, traducción idiomática de "oír la voz" y resolución positiva de la cláusula final como seguimiento/lealtad.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יְהוָה.
  - '"Mandato" se emplea para אֶת פִּי יְהוָה por claridad idiomática, manteniendo la tensión con el hebraísmo literal.'
  - '"Escuchar" conserva la ambigüedad obediencial señalada en la nota.'
  - '"Seguirán a" traduce אַחַר de modo natural y coherente con la lectura auditada.'
