review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: Roboam envía a Adoram, identificado como encargado del trabajo forzado; todo Israel lo mata por lapidación; luego Roboam huye a Jerusalén en su carro. Sin embargo, hay un desajuste gramatical importante: el sujeto plural hebreo וַיִּרְגְּמוּ (''apedrearon'') se tradujo como singular ''lo apedreó''. También la nota b contiene una forma española incorrecta (''apedreólo'').'
  spanish_quality_summary: 'El texto es generalmente claro y legible, pero ''que estaba sobre el trabajo forzado'' suena calcado y poco natural en español; ''que estaba a cargo del trabajo forzado'' o ''encargado del trabajo forzado'' comunica mejor la función administrativa. La colocación de notas también conviene ajustarse: la nota b debe anclarse en la frase de apedreamiento, no en ''murió'', porque comenta esa expresión. La nota c debe anclarse en ''se apresuró'' o en la acción de subir al carro, no al final de la oración.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Trabajo forzado' representa bien הַמַּס. 'Adoram' con nota sobre 'Adoniram' está bien. 'Carro' es aceptable para מֶרְכָּבָה en este contexto narrativo.
  issues:
  - severity: high
    issue: Discordancia de número en el verbo principal
    rationale: El hebreo וַיִּרְגְּמוּ tiene sujeto plural ('todo Israel' como colectivo plural semántico), pero el borrador dice 'todo Israel lo apedreó' en singular. En español, con 'todo Israel' puede mantenerse verbo singular por concordancia formal, pero aquí la propia formulación del POB y la nota léxica piden reflejar la acción colectiva; 'todo Israel lo apedreó' no es imposible, pero la decisión léxica dice 'lo apedreó con piedras' mientras el sujeto colectivo favorece mejor 'todos los de Israel lo apedrearon' o mantener 'todo Israel lo apedreó' si se acepta concordancia colectiva. Dado el conjunto, la reparación más fiel y natural es pluralizar el grupo explícitamente.
  - severity: medium
    issue: Expresión calcada 'que estaba sobre el trabajo forzado'
    rationale: Aunque comprensible, 'estar sobre' como cargo administrativo suena poco idiomático en español. 'que estaba a cargo del trabajo forzado' preserva el sentido de supervisión de אֲשֶׁר עַל הַמַּס con mejor naturalidad.
  - severity: medium
    issue: Anclaje y redacción defectuosos de la nota b
    rationale: La nota b comenta la expresión 'lo apedrearon con piedras', pero está colocada tras 'murió'. Además, 'apedreólo' no es español moderno aceptable; debe decir 'lo apedrearon' o, si se mantuviera singular, 'lo apedreó'.
  - severity: low
    issue: Anclaje mejorable de la nota c
    rationale: La nota explica הִתְאַמֵּץ / la urgencia de subir al carro; conviene anclarla en 'se apresuró' para claridad.
  revised_spanish_text: Entonces el rey Roboam envió a Adoram[a], que estaba a cargo del trabajo forzado, y todo Israel lo apedreó con piedras[b], y murió. Y el rey Roboam se apresuró[c] a subir al carro para huir a Jerusalén.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «Adoram»; algunos pasajes relacionados usan la forma «Adoniram».'
    reason: alternative_reading
  - marker: b
    text: 'O simplemente: «lo apedreó»; el hebreo dice explícitamente: «lo apedreó con piedras».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «se dio prisa». El hebreo dice más literalmente: «se fortaleció para subir al carro».'
    reason: lexical_alternative
  revision_rationale: Se corrige la frase administrativa calcada por una formulación natural en español ('a cargo de'). Se reubica la nota b al lugar donde comenta la expresión hebrea explícita sobre la lapidación y se arregla su redacción. Se reancla la nota c a 'se apresuró'. El resto del contenido se mantiene porque refleja bien el sentido del hebreo y la auditoría inglesa.
