translation:
  language: es
  text: Su sonido va como una serpiente[a], porque van con un ejército[b] y vienen contra ella[c] con hachas, como leñadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Su voz va como una serpiente"; el sustantivo hebreo puede significar "voz", "sonido" o "ruido".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "van con fuerza"; el hebreo חַיִל puede denotar fuerza militar, fuerza o un ejército.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente, "vienen a ella"; en contexto, el sentido es hostil: "vienen contra ella".'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹלָהּ
  english_pob_choice: her sound
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  - su ruido
  lexicon: HALOT
  rationale: קוֹל puede significar 'voz', 'sonido' o 'ruido'. En este símil la imagen es auditiva y poética; 'voz' es natural en español y mantiene la posibilidad de una resonancia personificada sin imponer que se trate de habla articulada.
- source_word: כַּנָּחָשׁ
  english_pob_choice: like a serpent
  chosen_spanish: como de serpiente
  alternatives_spanish:
  - como una serpiente
  - cual serpiente
  lexicon: HALOT
  rationale: נָחָשׁ puede ser 'serpiente' o 'culebra'. 'Serpiente' conserva el tono elevado del profeta y funciona bien en español; 'como de serpiente' reproduce el valor comparativo del hebreo sin endurecer la sintaxis.
- source_word: יֵלֵךְ
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - camina
  - se desliza
  lexicon: HALOT
  rationale: הלך significa 'ir/andar'. 'Va' es el equivalente más directo y no añade una imagen no garantizada por el hebreo.
- source_word: בְחַיִל
  english_pob_choice: with an army
  chosen_spanish: con fuerza
  alternatives_spanish:
  - con un ejército
  - en tropa
  lexicon: HALOT
  rationale: חַיִל puede denotar fuerza, poder o ejército. Dado el paralelismo con hachas y leñadores, aquí el valor de 'en fuerza'/'con fuerza' comunica bien el empuje colectivo sin obligar a traducir siempre 'ejército'; se conserva la tensión lexical del término.
- source_word: יֵלֵכוּ
  english_pob_choice: they go
  chosen_spanish: van
  alternatives_spanish:
  - marchan
  - avanzan
  lexicon: HALOT
  rationale: הלך en plural repite la idea de 'ir'. 'Van' mantiene la cercanía léxica que el POB inglés revisado prefirió, sin cargarlo con un matiz militar más fuerte que el del hebreo.
- source_word: וּבְקַרְדֻּמּוֹת
  english_pob_choice: with axes
  chosen_spanish: con hachas
  alternatives_spanish:
  - con azuelas
  - con destrales
  lexicon: HALOT
  rationale: קַרְדֹּם designa un hacha o instrumento de corte. 'Hachas' es la opción clara y estándar en español.
- source_word: בָּאוּ לָהּ
  english_pob_choice: come against her
  chosen_spanish: vienen contra ella
  alternatives_spanish:
  - vienen hacia ella
  - llegan a ella
  lexicon: HALOT
  rationale: בוא con ל puede ser 'venir a/hacia'. En contexto hostil, el sentido adversativo está dado por la escena; 'vienen contra ella' lo expresa de forma natural sin alterar el valor básico de movimiento del verbo.
- source_word: כְּחֹטְבֵי עֵצִים
  english_pob_choice: like woodcutters
  chosen_spanish: como leñadores
  alternatives_spanish:
  - como cortadores de madera
  - como hacheros
  lexicon: HALOT
  rationale: La expresión significa literalmente 'como cortadores de madera/árboles'. 'Leñadores' es el equivalente idiomático más claro y conserva la imagen de trabajo de corte repetitivo.
theological_decisions:
- issue: ¿Renderizar בְחַיִל como 'con fuerza' o como 'con un ejército'?
  english_pob_reading: 'The English POB preserves the lexical ambiguity with a footnote: חַיִל can denote military force, strength, or an army.'
  chosen_spanish_reading: '''Con fuerza'' en el texto principal, dejando abierta la posibilidad de lectura militar o de poder colectivo.'
  alternative_spanish_readings:
  - con un ejército
  - en tropa
  - con poder
  rationale: En español, 'con fuerza' preserva la amplitud semántica de חַיִל sin cerrar indebidamente la imagen. La propia escena ya evoca agresores armados con hachas; por eso el texto no necesita fijar 'ejército' en la línea principal.
  doctrine_reference: HALOT; uso contextual de חַיִל en poesía profética
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió 'they go' en lugar de 'they march' para acercarse más a יֵלֵכוּ; por eso el español usa 'van'. También se mantuvo la ambigüedad de חַיִל en vez de fijar de modo absoluto 'ejército'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exige; este versículo no contiene el tetragrámaton.
  - '''Hachas'' mantiene el plural instrumental de קַרְדֻּמּוֹת sin añadir singular.'
  - '''Leñadores'' comunica el símil final con naturalidad en español y no introduce un oficio distinto.'
