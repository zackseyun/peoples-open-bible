translation:
  language: es
  text: Y los hijos de Rubén y los hijos de Gad llamaron al altar Testigo[a], porque es testigo entre nosotros de que Yahvé es Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más amplia: «llamaron al altar “Un Testigo Entre Nosotros de que Yahvé es Dios”», tomando la cláusula explicativa como parte del nombre y no como la razón de ese nombre.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  english_pob_choice: called
  chosen_spanish: llamaron
  alternatives_spanish:
  - nombraron
  - dieron nombre a
  lexicon: HALOT
  rationale: El verbo קרא con objeto y complemento de nombre expresa aquí el acto de poner nombre; en español, «llamaron» conserva esa función nominativa de modo natural.
- source_word: בְּנֵי רְאוּבֵן וּבְנֵי גָד
  english_pob_choice: the sons of Reuben and the sons of Gad
  chosen_spanish: los hijos de Rubén y los hijos de Gad
  alternatives_spanish:
  - los rubenitas y los gaditas
  lexicon: HALOT
  rationale: Se conserva la construcción hebrea de filiación tribal para mantener la transparencia formal y la conexión narrativa con los descendientes de ambas tribus.
- source_word: לַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: al altar
  alternatives_spanish:
  - al sacrificatorio
  lexicon: HALOT
  rationale: מִזְבֵּחַ se traduce con el término usual y claro «altar»; aquí es el objeto que recibe el nombre.
- source_word: עֵד
  english_pob_choice: Witness
  chosen_spanish: Testigo
  alternatives_spanish:
  - Testimonio
  - Testigo[a]
  lexicon: HALOT
  rationale: En español, mayúscula inicial marca que funciona como nombre propio o título del altar. «Testigo» preserva el valor semántico directo de עֵד mejor que una paráfrasis más amplia.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: El primer כִּי introduce la explicación causal del nombre; «porque» expresa con naturalidad esa relación en español.
- source_word: בֵּינֹתֵינוּ
  english_pob_choice: between us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en medio de nosotros
  lexicon: HALOT
  rationale: La locución preposicional se vierte de manera idiomática con «entre nosotros», que conserva la relación recíproca entre las tribus.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el Tetragrámaton, manteniendo el nombre divino en lugar de sustituirlo por un título.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: אֱלֹהִים se traduce de forma directa por «Dios»; el predicado nominal en español queda más natural sin artículo.
theological_decisions:
- issue: 'Alcance del nombre del altar: nombre breve o nombre extendido'
  english_pob_reading: Render only the attested name 'Witness' in the main text, with a note allowing the expanded name as an alternative reading.
  chosen_spanish_reading: Dar en el texto principal solo el nombre atestiguado «Testigo» y reservar la expansión explicativa en nota.
  alternative_spanish_readings:
  - «Un Testigo Entre Nosotros de que Yahvé es Dios» como nombre completo del altar
  - «Ed» como transliteración tradicional
  rationale: El hebreo preservado en el texto da con claridad el nombre breve y luego la cláusula explicativa. Para no importar más de lo atestiguado, la traducción principal mantiene el nombre corto y la nota preserva la lectura ampliada posible.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor confesional de la cláusula final
  english_pob_reading: that Yahweh is God
  chosen_spanish_reading: de que Yahvé es Dios
  alternative_spanish_readings:
  - que Yahvé es el Dios
  - porque Yahvé es Dios
  rationale: La subordinada final expresa el contenido del testimonio del altar. «De que» en español mantiene con precisión ese contenido sin convertirlo innecesariamente en una nueva afirmación narrativa.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail en inglés, manteniendo la tensión documentada entre un nombre breve del altar y una posible lectura ampliada. No se adoptó la forma tradicional «SEÑOR» para el nombre divino; se preservó Yahvé conforme al estándar del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme a la terminología base del proyecto.
  - Se conserva la construcción tribal «los hijos de...» por transparencia formal.
  - «Testigo» funciona como nombre del altar y se señala con mayúscula en español para reflejar la función onomástica.
  - La cláusula final se traduce con subordinación explícita («de que») para preservar su valor de contenido confesional.
