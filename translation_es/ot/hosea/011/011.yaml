translation:
  language: es
  text: Vendrán temblando como un ave de Egipto[a], y como una paloma de la tierra de Asiria; y los haré habitar en sus casas, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Temblarán como un ave de Egipto ... y como una paloma de la tierra de Asiria». El verbo hebreo puede subrayar el temblor mismo, aunque en contexto probablemente incluye también la idea de venir temblando.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶחֶרְדוּ
  english_pob_choice: will come trembling
  chosen_spanish: Temblarán
  alternatives_spanish:
  - Vendrán temblando
  - Temblarán al venir
  - Vendrán con temor
  lexicon: HALOT
  rationale: חרד puede expresar temblor, estremecimiento o movimiento ansioso. En este contexto de imagen aviaria y de salida desde Egipto/Asiria, el hebreo puede incluir el temblor mismo y el movimiento de acercamiento; por eso se conserva el verbo simple 'temblarán', dejando la nota del matiz de venida implícita.
- source_word: כְצִפּוֹר
  english_pob_choice: like a bird
  chosen_spanish: como un ave
  alternatives_spanish:
  - como un pájaro
  - como un ave pequeña
  - como un ave del campo
  lexicon: HALOT
  rationale: צִפּוֹר es un término general para un ave pequeña, no una especie precisa. 'Ave' mantiene esa generalidad y suena natural en español bíblico sin sobreespecificar.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: desde Egipto
  alternatives_spanish:
  - de Egipto
  - de la tierra de Egipto
  lexicon: HALOT
  rationale: La preposición de origen se expresa naturalmente con 'desde' en español, y el nombre geográfico se mantiene sin cambio.
- source_word: וּכְיוֹנָה
  english_pob_choice: and like a dove
  chosen_spanish: y como una paloma
  alternatives_spanish:
  - y como una tórtola
  - y como una palomita
  lexicon: HALOT
  rationale: יוֹנָה suele referirse a una paloma. 'Paloma' conserva la imagen tradicional y precisa, mejor que 'pigeon' o un diminutivo no requerido.
- source_word: מֵאֶרֶץ אַשּׁוּר
  english_pob_choice: from the land of Assyria
  chosen_spanish: desde la tierra de Asiria
  alternatives_spanish:
  - desde Asiria
  - de la tierra de Asiria
  lexicon: HALOT
  rationale: El constructo dice literalmente 'de la tierra de Asiria'. 'Desde la tierra de Asiria' preserva el origen y el matiz territorial del hebreo con fluidez en español.
- source_word: וְהוֹשַׁבְתִּים
  english_pob_choice: and I will settle them
  chosen_spanish: y los estableceré
  alternatives_spanish:
  - y los haré habitar
  - y los haré morar
  - y los asentaré
  lexicon: HALOT
  rationale: 'El hifil de ישב es causativo: ''hacer habitar/establecer''. ''Estableceré'' comunica el acto de reubicar y fijar con naturalidad, sin perder la fuerza causativa.'
- source_word: עַל בָּתֵּיהֶם
  english_pob_choice: in their homes
  chosen_spanish: en sus casas
  alternatives_spanish:
  - en sus hogares
  - sobre sus casas
  - en sus moradas
  lexicon: HALOT
  rationale: Aunque עַל es literalmente 'sobre', con ישב funciona de modo idiomático para el habitar/restablecerse. 'En sus casas' refleja el sentido de reinstalación residencial y evita una literalidad extraña en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé', conforme al criterio del proyecto para יְהוָה. 'Declara' reproduce la fórmula profética נְאֻם con tono solemne y natural en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el Señor
  - dice Yahvé
  rationale: El hebreo usa directamente el tetragrámaton, y el proyecto pide verterlo como 'Yahvé' en el texto principal. Se evita la máscara tradicional 'SEÑOR' para hacer auditable la presencia del nombre pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nuance of movement plus fear in יֶחֶרְדוּ
  english_pob_reading: will come trembling
  chosen_spanish_reading: Temblarán
  alternative_spanish_readings:
  - Vendrán temblando
  - Temblarán al venir
  - Vendrán con temor
  rationale: La lectura inglesa ya reconoce la tensión entre temblor y venida. En español se mantiene esa tensión con un verbo de temblor sin añadir explícitamente 'vendrán', para no forzar un elemento no expresado de modo inequívoco por el verbo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve what the source text warrants'
- issue: Restoration imagery in the final clause
  english_pob_reading: I will settle them in their homes
  chosen_spanish_reading: los estableceré en sus casas
  alternative_spanish_readings:
  - los haré habitar en sus casas
  - los devolveré a sus casas
  - los asentaré en sus casas
  rationale: El texto presenta restauración y reasentamiento seguro. 'Estableceré' conserva la causatividad del hifil sin añadir un 'volver' que el verbo no dice expresamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve what the source text warrants'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios y el cotejo cruzado fue de alta concordancia. Esta redacción sigue esa línea, manteniendo el equilibrio entre temblor y movimiento, el paralelismo aviario y el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió 'ave'/'paloma' por generalidad y naturalidad, sin especificar una especie no indicada.
  - '''Desde'' reproduce el origen geográfico con fluidez, y ''en sus casas'' expresa el reasentamiento idiomático del final.'
  - Se mantuvo la tensión semántica de יֶחֶרְדוּ sin convertirla en una paráfrasis más explícita que el hebreo.
