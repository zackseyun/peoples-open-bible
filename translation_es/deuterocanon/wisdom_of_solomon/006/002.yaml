lexical_decisions:
- source_word: ἐνωτίσασθε
  english_pob_choice: Listen
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Presten atención
  - Oigan
  lexicon: LSJ
  rationale: El imperativo aoristo medio de ἐνωτίζομαι es una llamada a oír con atención. «Escuchen» conserva el tono directo y exhortativo en español moderno, equivalente al «Listen» de la POB inglesa.
- source_word: οἱ κρατοῦντες
  english_pob_choice: you who rule
  chosen_spanish: ustedes que gobiernan
  alternatives_spanish:
  - ustedes que tienen poder sobre
  - ustedes que dominan
  lexicon: LSJ
  rationale: κρατέω puede significar ejercer poder, prevalecer o gobernar. En este contexto de dirigentes, «gobiernan» refleja autoridad política sin cargar innecesariamente el sentido hacia opresión.
- source_word: πλήθους
  english_pob_choice: multitudes
  chosen_spanish: multitudes
  alternatives_spanish:
  - una multitud
  - muchas personas
  - muchedumbre
  lexicon: LSJ
  rationale: πλῆθος denota gran número o multitud. «Multitudes» conserva el valor colectivo y el plural natural en español, siguiendo la elección inglesa.
- source_word: γεγαυρωμένοι
  english_pob_choice: boast
  chosen_spanish: se enorgullecen
  alternatives_spanish:
  - se jactan
  - exultan orgullosamente
  - son arrogantes
  lexicon: LSJ
  rationale: El participio perfecto de γαυρόω expresa orgullo, altivez o jactancia. «Se enorgullecen» comunica la actitud de vanagloria de manera clara en español, manteniendo el matiz de la reprensión.
- source_word: ἐπὶ ὄχλοις ἐθνῶν
  english_pob_choice: over crowds of nations
  chosen_spanish: sobre muchedumbres de naciones
  alternatives_spanish:
  - por las muchedumbres de naciones
  - sobre masas de pueblos
  - a causa de muchedumbres de naciones
  lexicon: LSJ
  rationale: ὄχλοις significa muchedumbres o turbas, y ἐθνῶν especifica a los pueblos/naciones de esas muchedumbres. «Sobre muchedumbres de naciones» mantiene la imagen de superioridad o triunfo de los gobernantes sobre grandes poblaciones.
theological_decisions:
- issue: Tono de amonestación a gobernantes humanos
  english_pob_reading: Listen, you who rule over multitudes and boast over crowds of nations.
  chosen_spanish_reading: Escuchen, ustedes que gobiernan multitudes y se enorgullecen sobre muchedumbres de naciones.
  alternative_spanish_readings:
  - Escuchen, ustedes que tienen poder sobre multitudes y se jactan sobre muchedumbres de naciones.
  - Presten atención, ustedes que dominan multitudes y se enorgullecen sobre muchedumbres de naciones.
  rationale: El verso es una reprensión sapiencial dirigida a autoridades humanas. La redacción española conserva esa invocación sin suavizar el reproche ni convertirlo en un lenguaje litúrgico ajeno al contexto.
  doctrine_reference: Sabiduría bíblica; admonición a la soberbia humana y al ejercicio del poder
translation_notes:
  revision_awareness: La versión inglesa POB ya había resuelto el imperativo como «Listen» y la cláusula participial como «you who rule over multitudes and boast over crowds of nations», con nota alternativa para «Give ear… hold power over… exult because of…». La traducción española sigue esa línea sin introducir nuevas tensiones textuales, y refleja la misma ambigüedad relativa de ἐπὶ como base del orgullo o relación de dominio.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o lenguaje teológico no presente en el griego.
  - «Gobiernan» mantiene el referente humano de οἱ κρατοῦντες, sin añadir connotación de tiranía que el contexto inmediato no obliga.
  - «Muchedumbres de naciones» conserva la fuerza colectiva de πλῆθος y ὄχλοις, aunque suena más natural que una traducción demasiado literal.
  - La nota alternativa recoge la posibilidad semántica de ἐπί y de κρατέω, como la POB inglesa preserva en su pie de página.
