    text: El verbo hebreo puede significar «silbar» o, en traducciones inglesas antiguas, «sisear»; es decir, emitir un sonido agudo de convocatoria.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo singular: «viene». El singular probablemente representa de modo colectivo a la fuerza invasora.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta únicamente la expresión de וְשָׁרַק לּוֹ para lograr un español más natural y explícito en su función convocante: «silbará para convocarlas». Esto preserva el sentido del hebreo y del inglés auditado sin el giro algo forzado «les silbará». Se mantiene el singular final «viene» para conservar la imagen colectiva singular del hebreo. También se pule la nota [a] con un orden de alternativas más natural en español.'
