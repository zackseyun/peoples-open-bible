translation:
  language: es
  text: 'Ahora una mujer de entre las mujeres de los hijos de los profetas clamó a Eliseo, diciendo: «Tu siervo, mi esposo, ha muerto, y tú sabes que tu siervo temía a Yahvé. Y el acreedor ha venido para llevarse a mis dos hijos[a] como esclavos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis dos niños». El hebreo dice «mis dos niños», que por el contexto puede entenderse más específicamente como «mis dos hijos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִשָּׁה אַחַת
  english_pob_choice: a certain woman
  chosen_spanish: Ahora una mujer
  alternatives_spanish:
  - Y una mujer
  - Una cierta mujer
  lexicon: HALOT
  rationale: En español, «Ahora» reproduce bien el valor narrativo de transición del waw inicial y mantiene naturalidad. «Una mujer» conserva la indefinición de אַחַת sin sobredeterminarla; «una cierta mujer» sería más literal, pero suena menos fluido en español bíblico contemporáneo.
- source_word: מִנְּשֵׁי בְנֵי הַנְּבִיאִים
  english_pob_choice: from the wives of the sons of the prophets
  chosen_spanish: de entre las esposas de los hijos de los profetas
  alternatives_spanish:
  - de las esposas de los hijos de los profetas
  - de entre las mujeres del grupo profético
  lexicon: HALOT
  rationale: Se conserva la designación social hebrea «hijos de los profetas» sin sustituirla por una explicación interpretativa. «Esposas» traduce נְשֵׁי con precisión y mantiene la relación grupal antes de la mención de la muerte del esposo.
- source_word: צָעֲקָה
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - clamó con angustia
  lexicon: HALOT
  rationale: «Clamó» transmite urgencia y aflicción sin sonar demasiado coloquial. Evita suavizar el verbo y mantiene la fuerza retórica del pedido.
- source_word: עַבְדְּךָ אִישִׁי
  english_pob_choice: Your servant, my husband
  chosen_spanish: Tu esclavo, mi esposo
  alternatives_spanish:
  - Tu siervo, mi esposo
  - Mi esposo, tu esclavo
  lexicon: HALOT
  rationale: Se mantiene «esclavo» para עבד, siguiendo la preferencia POB por la fuerza lexical del término cuando el contexto de subordinación es relevante. «Esposo» conserva la relación con la hablante. El orden refleja la secuencia hebrea y la aposición natural en español.
- source_word: מֵת
  english_pob_choice: has died
  chosen_spanish: ha muerto
  alternatives_spanish:
  - está muerto
  - murió
  lexicon: HALOT
  rationale: «Ha muerto» expresa mejor que el hecho ya consumado tiene consecuencias presentes para la viuda, con un tiempo verbal natural en español.
- source_word: יָדַעְתָּ
  english_pob_choice: you know
  chosen_spanish: tú sabes
  alternatives_spanish:
  - sabes
  - tú conoces
  lexicon: HALOT
  rationale: Se conserva la apelación directa y enfática del discurso; el pronombre puede expresarse para mayor claridad en español.
- source_word: הָיָה יָרֵא אֶת יְהוָה
  english_pob_choice: feared Yahweh
  chosen_spanish: temía a Yahvé
  alternatives_spanish:
  - temía a Yahvé
  - reverenciaba a Yahvé
  - era temeroso de Yahvé
  lexicon: HALOT
  rationale: «Temía a Yahvé» conserva el modismo bíblico de ירא y la referencia directa al nombre divino según la terminología del proyecto. «Reverenciaba» sería más interpretativo; «temeroso de» suena menos natural en español actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: «Yahvé», no la sustitución por un título. Esto preserva el nombre propio divino en la línea de la auditoría inglesa.'
- source_word: הַנֹּשֶׁה
  english_pob_choice: the creditor
  chosen_spanish: el acreedor
  alternatives_spanish:
  - el prestamista
  - el usurero
  lexicon: HALOT
  rationale: «Acreedor» es el término legal-económico más directo y neutral en español. No añade connotaciones no atestiguadas como las de «usurero».
- source_word: בָּא לָקַחַת
  english_pob_choice: has come to take
  chosen_spanish: ha venido para llevarse
  alternatives_spanish:
  - ha venido a tomar
  - vino a llevarse
  lexicon: HALOT
  rationale: «Ha venido para llevarse» expresa tanto la llegada consumada como la intención de apropiación. «Llevarse» es más idiomático que un «tomar» literal en este contexto.
- source_word: שְׁנֵי יְלָדַי
  english_pob_choice: my two children
  chosen_spanish: a mis dos hijos[a]
  alternatives_spanish:
  - a mis dos niños
  - a mis dos hijos
  lexicon: HALOT
  rationale: «Hijos» es una opción contextual válida en español porque la referencia inmediata alude a los descendientes de la mujer y el sustantivo puede especificarse por el contexto. Se conserva la ambigüedad textual mediante nota, ya que el hebreo dice literalmente «mis dos hijos/niños».
- source_word: לַעֲבָדִים
  english_pob_choice: as slaves
  chosen_spanish: para esclavos
  alternatives_spanish:
  - como esclavos
  - como siervos
  lexicon: HALOT
  rationale: «Para esclavos» comunica la finalidad de convertirlos en propiedad-servicio por deuda. Se evita «siervos» porque suaviza indebidamente la severidad social del término.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de manera directa. Conforme al criterio del proyecto y a la auditoría inglesa, se mantiene el nombre propio divino en español como «Yahvé», preservando la referencia personal y pactal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Léxico de servidumbre en el remate del versículo
  english_pob_reading: as slaves
  chosen_spanish_reading: para esclavos
  alternative_spanish_readings:
  - como esclavos
  - para siervos
  rationale: El contexto es deuda y apropiación coercitiva, no servicio voluntario. «Esclavos» conserva la dureza social del hebreo y coincide con la preferencia documentada de no suavizar δοῦλος/terminología análoga cuando la realidad es central.
  doctrine_reference: POB lexical policy on bonded status terminology
translation_notes:
  revision_awareness: 'La auditoría inglesa revisó primero una traducción más literal («one woman») y luego la ajustó a «a certain woman» por naturalidad. En español se optó por «una mujer» con valor narrativo equivalente, manteniendo el carácter indefinido. También se preservó la fuerza de «slaves» mediante «esclavos», y el nombre divino se trasladó a la forma española ya fijada por el proyecto: «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en toda la línea, sin sustituirlo por «SEÑOR».
  - Se conserva «esclavo/esclavos» donde la carga social del término es relevante.
  - La frase «hijos de los profetas» se deja sin explicación intratextual para respetar la designación del texto fuente.
  - El tono general es bíblico pero natural en español contemporáneo, sin arcaísmos innecesarios.
