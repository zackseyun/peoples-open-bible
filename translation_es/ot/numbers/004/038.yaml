translation:
  language: es
  text: 'Y los censados de los hijos de Gersón, por sus clanes y por las casas de sus padres:'
  philosophy: formal
lexical_decisions:
- source_word: וּפְקוּדֵי
  english_pob_choice: those numbered
  chosen_spanish: los contados
  alternatives_spanish:
  - los enumerados
  - los censados
  - los inscritos
  lexicon: HALOT
  rationale: El hebreo se refiere a las personas registradas en el censo, no a un conteo abstracto. 'Los contados' conserva esa idea de personas incluidas en el registro sin añadir un sustantivo no explícito como 'hombres'.
- source_word: בְּנֵ֣י גֵרְשֹׁן
  english_pob_choice: of the sons of Gershon
  chosen_spanish: de entre los hijos de Gersón
  alternatives_spanish:
  - de los hijos de Gersón
  - de los gersonitas
  lexicon: HALOT
  rationale: Se preserva la expresión genealógica hebrea 'hijos de Gersón'. 'De entre' ayuda a que 'los contados' funcione con naturalidad en español y mantiene el sentido de pertenencia al grupo descendiente.
- source_word: לְמִשְׁפְּחוֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En contextos censales, מִשְׁפָּחָה designa subdivisiones tribales o de linaje. 'Clanes' es más preciso que 'familias' y conserva el valor administrativo del término.
- source_word: וּלְבֵית אֲבֹתָם
  english_pob_choice: and by their fathers' houses
  chosen_spanish: y por la casa de sus padres
  alternatives_spanish:
  - y por sus casas paternas
  - y por sus casas de padres
  lexicon: HALOT
  rationale: '''Casa de sus padres'' reproduce el modismo hebreo בית אבות con suficiente claridad en español. Se evita un giro demasiado técnico o forzado, pero sin perder la estructura de parentesco.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió 'those numbered' en vez de añadir 'men'. Por eso la versión española evita cualquier equivalente explícito de género no presente en el hebreo y conserva el tono censal/formal del pasaje.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y administrativo, acorde con la lista censal de Números 4.
  - No se usó 'SEÑOR' ni otros equivalentes teológicos porque el versículo no contiene el tetragrámaton ni vocabulario doctrinal explícito.
  - '''Gersón'' se conserva como forma española estable del nombre propio hebreo.'
