review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura hebrea, conserva la repetición «tus hermanos, tus hermanos», mantiene visible la difícil expresión de גְאֻלָּה con «tu redención», usa correctamente «Yahvé» para יְהוָה, y preserva la pasiva de «nos ha sido dada». Sin embargo, la sintaxis española en «a quienes los habitantes de Jerusalén les dijeron» queda incompleta/áspera frente al relativo hebreo con valor explicativo; conviene explicitar «estos son aquellos a quienes…» o equivalente. Además, la nota [b] está anclada a «Yahvé», pero su contenido corresponde a לְמוֹרָשָׁה («como herencia»), no al nombre divino.
  spanish_quality_summary: 'El español es en general digno y comprensible, pero presenta dos problemas de legibilidad: 1) «a quienes… les dijeron» tras dos puntos no enlaza con suficiente naturalidad al antecedente; 2) el anclaje de la nota [b] es erróneo. «Aparteos de Yahvé» es fiel pero algo rígido; «Aléjense de Yahvé» suena más natural en español neutro sin perder la fuerza imperativa. «En posesión» funciona, pero «como posesión» se alinea mejor con el audit trail inglés y con el valor predicativo de לְמוֹרָשָׁה.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» para יהוה, «casa de Israel» preservada, y mantenimiento deliberado de «redención» en la frase difícil אַנְשֵׁי גְאֻלָּתֶךָ. No hay conflictos doctrinales mayores; la corrección principal es de sintaxis y de colocación de nota.'
  issues:
  - severity: high
    issue: La nota [b] está colocada sobre «Yahvé», pero su contenido explica «como herencia».
    rationale: Esto crea una correspondencia falsa entre marcador y término fuente. Según las instrucciones, el marcador debe aparecer exactamente en la palabra o frase pertinente.
  - severity: medium
    issue: 'La construcción «toda ella: a quienes los habitantes de Jerusalén les dijeron» es gramaticalmente áspera e incompleta en español.'
    rationale: 'El hebreo relativo אֲשֶׁר con לָהֶם se entiende mejor en español con una explicitación del referente: «estos son aquellos a quienes…». Así se preserva el sentido sin paraprasear indebidamente.'
  - severity: low
    issue: «Aparteos de Yahvé» suena más arcaizante/forzado que una opción más natural en español neutro.
    rationale: «Aléjense de Yahvé» mantiene el imperativo y la idea de distancia, pero mejora la legibilidad para el registro meta sin sacrificar fidelidad.
  revised_spanish_text: '«Hijo de hombre[a], tus hermanos, tus hermanos, los hombres de tu redención, y toda la casa de Israel, toda ella: estos son aquellos a quienes los habitantes de Jerusalén les dijeron: “Aléjense de Yahvé; esta tierra nos ha sido dada como posesión[b]”».'
  revised_footnotes:
