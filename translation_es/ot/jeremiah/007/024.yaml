translation:
  language: es
  text: Pero no escucharon[a], ni inclinaron su oído, sino que anduvieron en sus propios consejos, en la terquedad de su mal corazón[c][b], y fueron hacia atrás y no hacia delante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no oyeron»; en contexto, el sentido es la negativa a escuchar con atención que llevaría a hacer caso.
    reason: lexical_alternative
  - marker: b
    text: O «según sus propios planes» o «designios».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «en la terquedad de su mal corazón»; «corazón» expresa aquí la voluntad y el pensamiento internos, no solo la emoción.'
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמְעוּ
  english_pob_choice: did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no oyeron
  - no prestaron atención
  - no obedecieron
  lexicon: HALOT
  rationale: שׁמע puede abarcar oír, escuchar y obedecer. Aquí, junto con la imagen de inclinar el oído, la idea principal es la negativa a atender con obediencia implícita; «no escucharon» conserva esa fuerza sin sobreespecificar.
- source_word: הִטּוּ אֶת אָזְנָם
  english_pob_choice: did not incline their ear
  chosen_spanish: ni inclinaron su oído
  alternatives_spanish:
  - ni volvieron su oído
  - ni prestaron atención
  lexicon: HALOT
  rationale: Es un hebraísmo de atención receptiva. «Inclinar el oído» mantiene la metáfora y es natural en español bíblico contemporáneo.
- source_word: וַיֵּלְכוּ
  english_pob_choice: they walked
  chosen_spanish: anduvieron
  alternatives_spanish:
  - caminaron
  - fueron
  - vivieron
  lexicon: HALOT
  rationale: הלך con ב expresa conducta o forma de proceder. «Anduvieron» conserva bien la metáfora de conducta moral en español.
- source_word: בְּמֹעֵצוֹת
  english_pob_choice: in their own counsels
  chosen_spanish: en sus propios consejos
  alternatives_spanish:
  - conforme a sus propios planes
  - en sus propios designios
  - en sus propias maquinaciones
  lexicon: HALOT
  rationale: מוֹעֵצוֹת apunta a consejos o planes deliberados. «Consejos» respeta el plural y el matiz de deliberación; «propios» reproduce el sentido posesivo del contexto.
- source_word: בִּשְׁרִר֖וּת
  english_pob_choice: in the stubbornness
  chosen_spanish: en la terquedad
  alternatives_spanish:
  - en la obstinación
  - en la dureza
  - en la porfía
  lexicon: HALOT
  rationale: שְׁרִרוּת en Jeremías denota autoafirmación terca y resistente. «Terquedad» es claro y actual, sin perder la idea de resistencia voluntaria.
- source_word: לִבָּם הָרָע
  english_pob_choice: of their evil heart
  chosen_spanish: de su corazón malo
  alternatives_spanish:
  - de su corazón perverso
  - de su mal corazón
  - de su mente mala
  lexicon: HALOT
  rationale: לֵב incluye el centro de voluntad y pensamiento, no solo emoción. «Corazón» preserva el término bíblico; «malo» sigue de cerca el adjetivo y evita suavizar el juicio moral.
- source_word: וַיִּהְי֥וּ לְאָח֖וֹר וְלֹ֥א לְפָנִים
  english_pob_choice: they went backward and not forward
  chosen_spanish: y fueron hacia atrás y no hacia delante
  alternatives_spanish:
  - y se volvieron atrás y no adelante
  - y retrocedieron y no avanzaron
  - y quedaron hacia atrás y no hacia delante
  lexicon: HALOT
  rationale: El contraste direccional expresa retroceso frente a progreso. «Fueron hacia atrás y no hacia delante» es claro, reproduce la antítesis y evita agregar movimiento interpretativo no explicitado.
theological_decisions:
- issue: Moral evaluation of the inner self as evil and stubborn
  english_pob_reading: Retain the moral description as stated without expanding it into a broader doctrinal claim about total depravity or covenant status.
  chosen_spanish_reading: 'Conservar la descripción moral como está: «la terquedad de su corazón malo», sin ampliarla a formulaciones doctrinales ajenas al versículo.'
  alternative_spanish_readings:
  - su naturaleza pecaminosa
  - la maldad total de su corazón
  - su corazón completamente corrupto
  rationale: El hebreo afirma un corazón malo y terco, pero no desarrolla una tesis doctrinal más amplia. La traducción debe mantener la tensión y no resolverla con categorías posteriores no explícitas en el texto.
  doctrine_reference: Preservar la tensión teológica; no importar formulaciones doctrinales que el versículo no enuncia.
translation_notes:
  revision_awareness: La versión inglesa revisada reforzó la conexión de «walked» con la secuencia previa mediante «but». En español se reflejó con «sino que anduvieron», manteniendo el enlace adversativo y el flujo del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se evitó «obedecieron» como traducción principal de שׁמע para no adelantar una equivalencia más fuerte que la requerida por el paralelo con «inclinaron su oído».
  - «Corazón» se mantuvo por la amplitud semántica hebrea de לֵב, con nota explicativa para evitar lectura meramente emocional.
  - Se preservó la antítesis direccional «hacia atrás / hacia delante» por ser transparente en español y fiel al hebreo.
