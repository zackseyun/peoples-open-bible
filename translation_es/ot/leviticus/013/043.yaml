translation:
  language: es
  text: y el sacerdote lo examina, y he aquí, la hinchazón de la afección es rojiza-blanca sobre su cabeza calva[a] o sobre su frente calva, como la apariencia de una enfermedad de la piel[b] en la carne,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los dos términos para la calvicie probablemente distinguen la parte trasera de la cabeza y la parte frontal; se han vertido como «cabeza calva» y «frente calva» para conservar el contraste.
    reason: cultural_note
  - marker: b
    text: Hebreo צָרַעַת se ha traducido tradicionalmente «lepra», pero en Levítico designa de manera más amplia un conjunto de afecciones graves de la piel, no la lepra de Hansen en sentido médico moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: and ... examines
  chosen_spanish: lo examina
  alternatives_spanish:
  - lo mira
  - lo inspecciona
  lexicon: HALOT
  rationale: En el contexto diagnóstico levítico, ראה no es mera visión sino examen ritual/forense; por eso «examina» comunica mejor la acción procedimental que un simple «ve».
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: «Sacerdote» es el equivalente natural y claro en español para el funcionario levítico; mantiene la referencia institucional sin introducir perífrasis innecesaria.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica de sorpresa/descubrimiento que marca el hallazgo del sacerdote.
- source_word: שְׂאֵת
  english_pob_choice: swelling
  chosen_spanish: tumefacción
  alternatives_spanish:
  - hinchazón
  - prominencia
  - elevación
  lexicon: HALOT
  rationale: En Levítico 13 el término designa una lesión elevada. «Tumefacción» suena más técnico y preciso que «hinchazón», y preserva el carácter de lesión levantada.
- source_word: הַנֶּגַע
  english_pob_choice: the disease
  chosen_spanish: la afección
  alternatives_spanish:
  - la lesión
  - el mal
  - la enfermedad
  lexicon: HALOT
  rationale: «Afección» evita restringir el término a una enfermedad específica y puede abarcar la condición diagnóstica amplia del pasaje, como hace el hebreo נגע.
- source_word: לְבָנָה אֲדַמְדֶּמֶת
  english_pob_choice: reddish-white
  chosen_spanish: rojiza-blanca
  alternatives_spanish:
  - blanca rojiza
  - blanco-rojiza
  - rojiblanca
  lexicon: HALOT
  rationale: La secuencia adjetival refleja un color mixto. «Rojiza-blanca» sigue de cerca el patrón semítico sin perder inteligibilidad; mantiene la tensión cromática del original.
- source_word: בְּקָרַחְתּוֹ
  english_pob_choice: on his bald head
  chosen_spanish: sobre su cabeza calva
  alternatives_spanish:
  - sobre su calva
  - en su calva
  lexicon: HALOT
  rationale: «Cabeza calva» expresa bien la parte posterior/desnuda de la cabeza en un español natural, y permite luego contrastarla con la frente.
- source_word: בְגַבַּחְתּוֹ
  english_pob_choice: on his bald forehead
  chosen_spanish: sobre su frente calva
  alternatives_spanish:
  - sobre su calva frontal
  - en su frente calva
  lexicon: HALOT
  rationale: «Frente calva» conserva el contraste entre dos tipos de calvicie de la línea hebrea y resulta comprensible para lectores modernos.
- source_word: כְּמַרְאֵה
  english_pob_choice: like the appearance of
  chosen_spanish: como la apariencia de
  alternatives_spanish:
  - como aspecto de
  - según la apariencia de
  lexicon: HALOT
  rationale: Mantiene la comparación diagnóstica explícita sin simplificarla demasiado.
- source_word: צָרַעַת
  english_pob_choice: a skin disease
  chosen_spanish: una afección de piel por la lepra
  alternatives_spanish:
  - una afección cutánea
  - una enfermedad de la piel
  lexicon: HALOT
  rationale: El POB inglés evita «leprosy» como diagnóstico moderno y aclara el alcance amplio de צָרַעַת. En español, una perífrasis explicativa preserva esa cautela; «por la lepra» aquí funciona como referencia tradicional, no como diagnóstico médico moderno.
- source_word: עוֹר בָּשָׂר
  english_pob_choice: on the flesh
  chosen_spanish: de la carne
  alternatives_spanish:
  - de la piel
  - en la carne
  lexicon: HALOT
  rationale: «Carne» conserva el término corporal del hebreo y evita borrar el matiz de superficie corporal que se suma a «piel» en la perífrasis previa.
theological_decisions:
- issue: Interpretación de צָרַעַת
  english_pob_reading: '''skin disease'' rather than traditional ''leprosy'''
  chosen_spanish_reading: «afección de piel» con nota sobre la lepra tradicional
  alternative_spanish_readings:
  - «lepra»
  - «enfermedad cutánea»
  - «afección cutánea»
  rationale: El hebreo bíblico צָרַעַת abarca un conjunto más amplio que la lepra moderna. La redacción principal evita identificarla de manera clínica estrecha, pero la nota reconoce la traducción tradicional por su peso histórico.
  doctrine_reference: Levítico 13; comparación léxica HALOT sobre צָרַעַת
- issue: Naturaleza de la inspección sacerdotal
  english_pob_reading: the priest examines him
  chosen_spanish_reading: el sacerdote lo examina
  alternative_spanish_readings:
  - el sacerdote lo ve
  - el sacerdote lo inspecciona
  rationale: 'En el marco ritual levítico, la acción es más que mirar: implica discernimiento oficial. «Examina» conserva ese valor sin añadir contenidos no presentes en el texto.'
  doctrine_reference: Levítico 13:3, 13:6, 13:8 como contexto de procedimiento sacerdotal
translation_notes:
  revision_awareness: Seguí la última revisión del POB inglés al reflejar la preferencia por un orden cromático equivalente a «reddish-white» y mantener la distinción entre las dos formas de calvicie. Donde el inglés usa una solución explicativa para צָרַעַת, el español también adopta una perífrasis cautelosa y añade nota para preservar la tensión léxica tradicional.
  spanish_consistency_notes:
  - Mantuve «Yahvé» como norma general del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Usé «el sacerdote» y no «el cura» o una forma eclesiástica, por corresponder al contexto levítico.
  - Evité «señor» y «leproso» porque no corresponden al contenido léxico del versículo.
  - Conservé una sintaxis de publicación que sigue de cerca el hebreo sin sonar mecánica en español.
