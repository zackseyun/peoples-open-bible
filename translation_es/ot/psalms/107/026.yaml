    issue: Anclaje incorrecto de la nota al pie
    rationale: La nota explica נֶפֶשׁ y בְּרָעָה, pero el marcador [a] está puesto en «profundidades», que corresponde a תְהוֹמוֹת. Debe anclarse en «alma» o en el segmento final pertinente.
  - severity: medium
    issue: «Se elevaban» introduce un matiz reflexivo menos natural
    rationale: יַעֲלוּ/יֵרְדוּ expresan simplemente subir/bajar. «Se elevaban» puede sonar más interpretativo y menos vívido que el paralelismo simple del hebreo.
  - severity: low
