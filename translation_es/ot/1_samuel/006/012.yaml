translation:
  language: es
  text: Y las vacas siguieron recto por el camino a Bet-semes[a], por una sola calzada; seguían avanzando, mugiendo[b] mientras iban, y no se desviaron ni a la derecha ni a la izquierda. Y los señores[c] de los filisteos iban detrás de ellas hasta el límite de Bet-semes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘por una sola calzada’. El hebreo subraya que las vacas mantuvieron una ruta única y fija.
    reason: lexical_alternative
  - marker: b
    text: ‘Mugiendo’ se refiere al sonido vocal del ganado; la redacción sugiere que continuaban haciéndolo mientras avanzaban.
    reason: cultural_note
  - marker: c
    text: O ‘los gobernantes de los filisteos’. El término denota a los reconocidos señores urbanos filisteos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִשַּׁרְנָה
  english_pob_choice: went straight on
  chosen_spanish: fueron derechas
  alternatives_spanish:
  - fueron en línea recta
  - siguieron derechas
  - fueron directamente
  lexicon: HALOT
  rationale: El verbo ישר aquí expresa avanzar en línea recta, sin apartarse del curso. ‘Fueron derechas’ conserva la imagen direccional con un español natural y sobrio.
- source_word: הַפָּרוֹת
  english_pob_choice: the cows
  chosen_spanish: las vacas
  alternatives_spanish:
  - las reses
  - las novillas
  lexicon: HALOT
  rationale: El contexto inmediato habla de animales de tiro usados para el carro; ‘vacas’ es la forma más natural y precisa en español, sin introducir la idea de animales jóvenes que ‘novillas’ podría sugerir.
- source_word: בַּדֶּרֶךְ עַל דֶּרֶךְ בֵּית שֶׁמֶשׁ
  english_pob_choice: on the road to Beth-shemesh
  chosen_spanish: por el camino a Bet-semes
  alternatives_spanish:
  - por el camino hacia Bet-semes
  - sobre el camino a Bet-semes
  lexicon: HALOT
  rationale: La repetición de דרך intensifica la idea de ruta fija; en español, ‘por el camino a’ transmite bien el destino y el avance continuo sin forzar una repetición literal poco natural.
- source_word: בִּמְסִלָּה אַחַת
  english_pob_choice: along one highway
  chosen_spanish: por una sola calzada
  alternatives_spanish:
  - por un solo camino
  - por una sola carretera
  lexicon: HALOT
  rationale: מְסִלָּה puede referirse a una vía elevada o calzada. ‘Calzada’ preserva el matiz de vía definida y única; ‘carretera’ sería más moderno y menos neutro.
- source_word: הָלְכוּ הָלוֹךְ
  english_pob_choice: they went on
  chosen_spanish: iban andando
  alternatives_spanish:
  - seguían andando
  - iban yendo
  - proseguían
  lexicon: HALOT
  rationale: La construcción intensiva indica avance continuo. ‘Iban andando’ reproduce el carácter durativo en español sin sobrertraducir la repetición verbal.
- source_word: וְגָעוֹ
  english_pob_choice: lowing as they went
  chosen_spanish: mugiendo mientras iban
  alternatives_spanish:
  - mugiendo
  - y mugiendo mientras iban
  lexicon: HALOT
  rationale: El verbo describe el sonido del ganado. ‘Mugiendo’ es el equivalente natural en español; ‘mientras iban’ hace explícita la relación adverbial de la acción con el movimiento.
- source_word: וְלֹא סָרוּ יָמִין וּשְׂמֹאול
  english_pob_choice: and did not turn aside to the right or to the left
  chosen_spanish: y no se desviaron ni a la derecha ni a la izquierda
  alternatives_spanish:
  - y no torcieron ni a la derecha ni a la izquierda
  - y no apartaron ni a diestra ni a siniestra
  lexicon: HALOT
  rationale: Es un modismo hebreo de fidelidad al rumbo. ‘No se desviaron’ conserva bien el valor de סור y sugiere con claridad que no abandonaron la trayectoria.
- source_word: וְסַרְנֵי פְלִשְׁתִּים
  english_pob_choice: the lords of the Philistines
  chosen_spanish: los príncipes de los filisteos
  alternatives_spanish:
  - los señores de los filisteos
  - los gobernantes de los filisteos
  - los lords de los filisteos
  lexicon: HALOT
  rationale: סַרְנֵי es un título político para los jefes filisteos. ‘Príncipes’ refleja un rango de autoridad reconocido en un registro digno y bíblicamente familiar en español, sin depender de ‘señores’ que puede sonar demasiado genérico.
- source_word: הֹלְכִים אַחֲרֵיהֶם
  english_pob_choice: were walking behind them
  chosen_spanish: iban detrás de ellas
  alternatives_spanish:
  - seguían detrás de ellas
  - caminaban detrás de ellas
  lexicon: HALOT
  rationale: El participio indica acción acompañante y continua. ‘Iban detrás de ellas’ mantiene la sencillez narrativa y la idea de seguimiento físico.
- source_word: עַד גְּבוּל בֵּית שָׁמֶשׁ
  english_pob_choice: as far as the border of Beth-shemesh
  chosen_spanish: hasta el borde de Bet-semes
  alternatives_spanish:
  - hasta el límite de Bet-semes
  - hasta la frontera de Bet-semes
  - hasta el territorio de Bet-semes
  lexicon: HALOT
  rationale: גְּבוּל puede ser borde, límite o frontera. ‘Borde’ funciona bien en español para señalar el punto hasta donde llegaron, y conserva la concreción espacial del texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del POB inglés, que prefirió ‘to Beth-shemesh’ por destino más que mera dirección. También conserva el énfasis del hebreo en una ruta única y en el avance continuo de las vacas, sin suavizar la tensión narrativa del seguimiento de los príncipes filisteos.
  spanish_consistency_notes:
  - Se usa ‘Bet-semes’ como forma castellana del topónimo en todo el versículo.
  - Se mantiene ‘vacas’ para el animal, coherente con el contexto inmediato y con el registro del pasaje.
  - 'Se conserva la progresión espacial del hebreo: camino, calzada única, no desvío, seguimiento hasta el borde.'
