review_pass:
  verdict: revise
  source_alignment_summary: 'El expediente fuente es internamente conflictivo: el hebreo dado está marcado como major_mismatch y el propio rastro léxico-teológico del POB establece que Sirácida 34:11 debe traducirse desde el griego paralelo (''He visto muchas cosas en mi andar...''). El borrador español, en cambio, sigue una revisión aplicada que sustituyó indebidamente ese contenido por la línea hebrea desplazada sobre dar al pobre y prestar a Yahvé. Por tanto, no preserva el sentido fuente auditado del versículo.'
  spanish_quality_summary: El español del borrador es claro y natural en sí mismo, pero traduce el versículo equivocado. Además, las notas y decisiones léxicas justifican una base textual contraria al expediente auditado. La reparación necesaria es cambiar el texto principal para reflejar el griego y ajustar la nota textual; también conviene mantener una nota léxica para la ambigüedad de ἀποπλάνησις.
  glossary_alignment: 'Aunque ''Yahvé'' respeta la preferencia del proyecto, aquí no debe aparecer porque el versículo auditado desde el griego no contiene el nombre divino. No hay otros términos-glosario centrales en juego. La revisión debe alinearse con las decisiones inglesas: πολλὰ ἑόρακα -> ''He visto muchas cosas''; ἐν τῇ ἀποπλανήσει μου -> ''en mi andar'' o equivalente con nota; πλείονα τῶν λόγων μου -> ''más de lo que dicen mis palabras''; σύνεσίς μου -> ''mi entendimiento''.'
  issues:
  - severity: high
    issue: Base textual equivocada en el texto principal
    rationale: El borrador español traduce la línea hebrea desplazada, pese a que el expediente canónico y las decisiones teológicas del POB indican seguir el griego paralelo para Sir 34:11 debido al major_mismatch del hebreo conservado.
  - severity: high
    issue: Notas textuales desalineadas con el audit trail
    rationale: La nota [a] del borrador afirma o sugiere que la revisión correcta sigue la lectura hebrea sobre dar a los pobres, lo cual contradice la nota inglesa que explícitamente dice que se sigue el testigo griego para este versículo.
  - severity: medium
    issue: Se perdió la alternativa léxica relevante de ἀποπλάνησις
    rationale: El inglés documenta alternativas como 'error', 'viajes' o 'desvío/andar errante'. El español debería reflejar esa ambigüedad con una nota léxica apropiada.
  - severity: medium
    issue: La cláusula final del griego requiere reformulación idiomática en español
    rationale: Una traducción demasiado literal de 'more than my words' puede sonar torpe. Conviene expresar que el entendimiento supera lo que las palabras alcanzan a decir, sin alejarse del texto.
  revised_spanish_text: He visto muchas cosas en mi andar[a], y mi entendimiento es más de lo que dicen mis palabras.
  revised_footnotes:
  - marker: a
    text: La línea hebrea conservada en el Cairo Geniza para esta referencia no corresponde al sentido de este versículo y parece reflejar material desplazado; por eso, aquí la traducción sigue el testigo griego de Sirácida 34:11. La expresión griega también puede entenderse como 'en mi error', 'en mis viajes' o 'en mi extravío'.
    reason: textual_variant_and_lexical_alternative
  revision_rationale: Se reemplazó el texto por una traducción fiel al testigo base auditado del POB, que para este versículo es el griego paralelo, no la línea hebrea desplazada. 'He visto muchas cosas' sigue πολλὰ ἑόρακα. 'En mi andar' conserva el sentido experiencial de ἀποπλάνησις sin sobremoralizarlo, y la nota preserva las alternativas documentadas. 'Mi entendimiento es más de lo que dicen mis palabras' transmite la comparación comprimida del griego de forma natural en español y mantiene la idea de que su comprensión excede su expresión verbal.
