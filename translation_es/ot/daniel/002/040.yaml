base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/040.yaml
  text: And the fourth kingdom will be strong like iron[a], because iron crushes and shatters everything; and like iron that breaks all these things[b], it will crush and shatter.
  footnotes:
