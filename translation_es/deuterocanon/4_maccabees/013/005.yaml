revisions:
- from: ¿Cómo, pues, no ha de reconocerse en estos hombres la maestría sobre el sufrimiento que procede de la bienaventuranza[a], si no se dejaron desviar ni por los dolores del fuego?
  to: ¿Cómo, pues, no ha de reconocerse en estos hombres el dominio sobre el sufrimiento que procede de la bendición[a], si no se dejaron desviar ni por los dolores del fuego?
  rationale: Se reemplaza «maestría» por «dominio» para un español más natural y filosóficamente adecuado a παθοκρατία, y «bienaventuranza» por «bendición» para evitar una asociación demasiado estrecha en español y mantener mejor la amplitud semántica documentada en el expediente inglés. Se conserva la nota para preservar la alternativa más formal con «pasiones» y «piedad».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:23:16Z'
