review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: fórmula profética, referencia temporal, surgimiento interno de pensamientos y planeación de mal. Sin embargo, dos elecciones principales no preservan bien el sentido ni la naturalidad: «cosas subirán a tu corazón» suena poco idiomático en español y no comunica bien el modismo hebreo; y «plan malo» debilita la fuerza moral de מַחֲשֶׁבֶת רָעָה, que aquí corresponde mejor a «plan malvado» o «plan perverso». También conviene ajustar la nota de marcador [a], ya que está anclada a «En aquel día» pero explica «en tu corazón».'
  spanish_quality_summary: El español es generalmente claro, pero «cosas subirán a tu corazón» es torpe y poco natural para un lector bíblico hispano. «Vendrán a tu corazón» o mejor «surgirán en tu corazón» comunica el modismo con dignidad y legibilidad. «El Señor Yahvé» es aceptable y fiel a la pauta del proyecto. «Trazarás» funciona, aunque «tramarás» o «idearás» serían algo más hostiles; no es imprescindible cambiarlo. La puntuación y el registro son adecuados.
  glossary_alignment: 'Buen alineamiento con la política del proyecto en «Yahvé». No hay términos de glosario mayores aparte del nombre divino. La decisión sobre «corazón» preserva correctamente la antropología hebrea, pero debe expresarse con una preposición idiomática en español: «en tu corazón», no «a tu corazón».'
  issues:
  - severity: high
    issue: «cosas subirán a tu corazón» es una traducción demasiado calcada y poco idiomática.
    rationale: יַעֲלוּ דְבָרִים עַל לְבָבֶךָ describe pensamientos/asuntos que surgen internamente. En español bíblico natural, «surgirán en tu corazón» preserva mejor el modismo que «subirán a tu corazón».
  - severity: medium
    issue: El marcador [a] está colocado en «En aquel día» pero su nota explica «en tu corazón».
    rationale: Los marcadores deben anclarse al término o frase pertinente. La nota cultural sobre la antropología hebrea debe ir en «corazón», no en la expresión temporal.
  - severity: medium
    issue: «un plan malo» atenúa la cualidad moral de מַחֲשֶׁבֶת רָעָה.
    rationale: En este contexto hostil y deliberado, «malvado» o «perverso» expresa mejor la fuerza ética de רָעָה que el más débil «malo».
  revised_spanish_text: 'Así dice el Señor Yahvé: En aquel día, cosas[a] surgirán en tu corazón[b], y trazarás un plan malvado.'
