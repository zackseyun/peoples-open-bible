revisions:
- from: Y los esparcí con un viento tempestuoso entre todas las naciones que no habían conocido[a], y la tierra quedó desolada detrás de ellos, sin que nadie pasara ni regresara[b]; así hicieron de la tierra deleitosa una desolación.
  to: Y los esparcí con un viento tempestuoso entre todas las naciones que no habían conocido[a], y la tierra quedó desolada detrás de ellos, sin que nadie pasara ni regresara; así hicieron de la tierra deleitosa[b] una desolación.
  rationale: 'El texto solo necesita una reparación menor: mover la nota [b] para que ancle la expresión אֶרֶץ חֶמְדָּה, conforme al hebreo y al POB inglés. El resto del borrador puede mantenerse.'
