translation:
  language: es
  text: Prepara tu equipaje para el exilio[b], oh hija que habitas en Egipto, porque Nof[a] será una desolación, quedará devastada[c], sin habitante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nof es el nombre hebreo de la ciudad egipcia conocida más tarde como Menfis.
    reason: cross_reference
  - marker: b
    text: O ‘artículos para el exilio’ o ‘enseres para la deportación’; la imagen hebrea es la de preparar pertenencias para una deportación.
    reason: lexical_alternative
  - marker: c
    text: O ‘quemada’, si se toma el verbo con una imagen más fuerte de fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי גוֹלָה
  english_pob_choice: baggage for exile
  chosen_spanish: el equipaje para el exilio
  alternatives_spanish:
  - los artículos del exilio
  - los enseres para la deportación
  - los utensilios del cautiverio
  lexicon: HALOT
  rationale: El hebreo une la idea de ‘objetos/vajilla/utensilios’ con ‘exilio’, formando una expresión idiomática sobre lo que se prepara para ser llevado lejos. ‘Equipaje para el exilio’ conserva la imagen concreta y suena natural en español sin perder el matiz de deportación forzada.
- source_word: עֲשִׂי לָךְ
  english_pob_choice: Prepare your
  chosen_spanish: Prepárate
  alternatives_spanish:
  - Haz para ti
  - Alístate
  - Prepara para ti
  lexicon: HALOT
  rationale: El imperativo con pronombre reflexivo pide que la destinataria se ponga lista para la acción anunciada. ‘Prepárate’ comunica mejor en español la fuerza idiomática que una traducción literal como ‘hazte’ o ‘haz para ti’.
- source_word: יוֹשֶׁבֶת בַּת מִצְרַיִם
  english_pob_choice: O daughter dwelling in Egypt
  chosen_spanish: oh hija que habitas en Egipto
  alternatives_spanish:
  - oh hija de Egipto que habitas allí
  - oh habitante, hija de Egipto
  - oh hija de Egipto, habitante de allí
  lexicon: HALOT
  rationale: Se mantiene la personificación femenina de Egipto y el valor participial de ‘habitando’. ‘Que habitas en Egipto’ es claro en español y preserva el tono profético de dirección a una figura personificada.
- source_word: נֹף
  english_pob_choice: Noph
  chosen_spanish: Nof
  alternatives_spanish:
  - Memfis
  lexicon: HALOT
  rationale: Se translitera el nombre hebreo de la ciudad, como en el POB en inglés. ‘Nof’ deja visible el nombre bíblico y evita sustituirlo en el texto principal por la identificación histórica.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - una ruina
  - un espanto
  - un lugar desolado
  lexicon: HALOT
  rationale: ‘Desolación’ recoge el sentido central de devastación del sustantivo y funciona bien en el contexto de juicio. Mantiene la fuerza del hebreo sin añadir interpretación excesiva.
- source_word: וְנִצְּתָה
  english_pob_choice: laid waste
  chosen_spanish: quedará devastada
  alternatives_spanish:
  - será asolada
  - será arrasada
  - será consumida
  lexicon: HALOT
  rationale: El verbo admite la idea de quedar arruinada o devastada, con posible trasfondo de incendio. ‘Quedará devastada’ expresa el resultado sin forzar específicamente la imagen de fuego, tal como hace la decisión inglesa.
- source_word: מֵאֵין יוֹשֵׁב
  english_pob_choice: without inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin nadie que habite allí
  - sin moradores
  - deshabitada
  lexicon: HALOT
  rationale: La locución hebrea afirma la ausencia total de residentes. ‘Sin habitante’ es breve, solemne y muy cercano a la estructura original, preservando la dureza del oráculo.
translation_notes:
  revision_awareness: Se siguió el texto hebreo de WLC y el audit trail inglés sin cambios de revisión pendientes; la redacción española conserva la personificación de Egipto, el topónimo Nof y la ambigüedad léxica del verbo final entre devastación general e imagen de incendio.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo exige; en este versículo no aparece.
  - ‘Exilio’ se emplea como término de destino forzado, coherente con el collocation כְּלֵי גוֹלָה.
  - Se conserva la forma breve ‘sin habitante’ para reproducir la clausura enfática del hebreo.
