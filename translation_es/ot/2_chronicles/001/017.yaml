    issue: «piezas de plata» para בְּשֵׁשׁ מֵאוֹת כֶּסֶף
    rationale: Aunque comunica valor monetario, es menos preciso y más interpretativo que «siclos de plata». El expediente inglés documenta la aclaración de la unidad estándar implícita; en español bíblico legible, «siclos de plata» preserva mejor el sentido comercial y evita sugerir monedas acuñadas.
  - severity: medium
    issue: Falta una nota sobre los verbos literales de movimiento detrás de «importaron»
    rationale: El inglés preserva explícitamente la alternativa literal «brought up and brought out». Dado que «importaron» es una interpretación contextual fuerte, conviene conservar esa información en nota también en español.
  - severity: low
    issue: Falta nota sobre «Aram» frente a la forma tradicional «Siria»
    rationale: El expediente inglés incluye esta alternativa. Mantenerla en español ayuda a los lectores acostumbrados a la nomenclatura tradicional y preserva el razonamiento de transliteración del proyecto.
  - severity: low
