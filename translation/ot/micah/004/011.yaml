theological_decisions:
- issue: Whether to make explicit the feminine referent of the singular verbs
  chosen_reading: Use 'her' in the quoted speech, referring to Zion/Jerusalem
  alternative_readings:
  - Use 'you' throughout for direct address consistency
  rationale: The verse addresses the city as 'you' in the narration, but the nations' quoted speech uses feminine singular verbs that naturally refer to Zion/Jerusalem as 'her.' Preserving this shift reflects the Hebrew rather than smoothing it away.
  doctrine_reference: Translation philosophy §1, §3
