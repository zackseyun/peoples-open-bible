translation:
  language: es
  text: Hoy será exaltado[a], y ciertamente no será hallado, porque ha vuelto a su polvo, y sus planes[b] han perecido.
  philosophy: formal
  footnotes:
  - marker: a
    text: O «será levantado». El griego ἐπαρθήσεται puede referirse a una elevación literal o a ser elevado en rango o prominencia.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «pensamientos» o «razonamientos».
    reason: lexical_alternative
lexical_decisions:
- source_word: σήμερον
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  - Ahora
  lexicon: LSJ
  rationale: Adverbio temporal de inmediatez. «Hoy» reproduce con naturalidad el valor puntual y proverbial del griego sin añadir matiz interpretativo.
- source_word: ἐπαρθήσεται
  english_pob_choice: will be exalted
  chosen_spanish: será exaltado
  alternatives_spanish:
  - será levantado
  - será enaltecido
  lexicon: LSJ
  rationale: El pasivo futuro de ἐπαίρω puede significar literalmente «ser levantado» o, en este contexto de la suerte del rico/altivo, «ser exaltado». «Será exaltado» conserva la posible elevación de estatus que la revisión inglesa prefirió, sin borrar la metáfora de altura.
- source_word: οὐ μὴ εὑρεθῇ
  english_pob_choice: he will surely not be found
  chosen_spanish: ciertamente no será hallado
  alternatives_spanish:
  - no será hallado en absoluto
  - de ningún modo será hallado
  lexicon: BDAG
  rationale: La combinación οὐ μή con subjuntivo aoristo expresa negación enfática. «Ciertamente no será hallado» comunica esa fuerza de manera natural en español.
- source_word: ἐπέστρεψεν
  english_pob_choice: has returned
  chosen_spanish: ha vuelto
  alternatives_spanish:
  - volvió
  - ha retornado
  lexicon: LSJ
  rationale: El aoristo presenta la acción como concluida; el pretérito perfecto español funciona bien tras «porque» para expresar un hecho consumado con resultado presente.
- source_word: εἰς τὸν χοῦν αὐτοῦ
  english_pob_choice: to his dust
  chosen_spanish: a su polvo
  alternatives_spanish:
  - al polvo que le corresponde
  - a la tierra
  lexicon: LSJ
  rationale: «Χοῦς» alude al polvo o tierra suelta, en eco antropológico de mortalidad. «A su polvo» mantiene la imagen breve y solemne, más cercana al idioma bíblico que «a la tierra».
- source_word: διαλογισμὸς
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - pensamientos
  - razonamientos
  - proyectos
  lexicon: BDAG
  rationale: El término puede abarcar pensamiento, razonamiento, intención o plan. Dado el contexto sentencioso de muerte y fin de la actividad humana, «planes» refleja bien la idea de designios que desaparecen, alineándose con la decisión inglesa revisada.
- source_word: ἀπώλετο
  english_pob_choice: have perished
  chosen_spanish: han perecido
  alternatives_spanish:
  - han desaparecido
  - se han perdido
  lexicon: LSJ
  rationale: El aoristo de ἀπόλλυμι expresa ruina o desaparición definitiva. «Han perecido» conserva el carácter tajante y final del griego.
theological_decisions:
- issue: Alcance de διαλογισμός en la muerte
  english_pob_reading: Rendered as 'thought'/'plans' rather than a theological term such as 'soul'.
  chosen_spanish_reading: «Planes» en lugar de un término como «alma» o una formulación doctrinalmente cargada.
  alternative_spanish_readings:
  - pensamientos
  - razonamientos
  - alma
  rationale: El griego habla del cese de la actividad mental o de los designios del hombre, no de una tesis explícita sobre el alma. La traducción evita importar una doctrina que el texto no formula, preservando la tensión antropológica del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla; no introducir afirmaciones doctrinales ajenas al texto.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió «exalted» y «plans» frente a «lifted up» y «thought». La versión española refleja esa misma dirección, manteniendo la elevación de estatus en ἐπαρθήσεται y la amplitud semántica de διαλογισμός como planes/pensamientos, sin cerrar indebidamente la tensión antropológica del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda en otros pasajes, pero aquí no aparece el nombre divino.
  - Se mantiene «polvo» para χοῦς para conservar el eco de mortalidad.
  - «Planes» se eligió por coherencia con la revisión inglesa y por ser un equivalente natural en español contemporáneo.
  - Se conserva un registro bíblico sobrio, sin arcaísmos innecesarios.
