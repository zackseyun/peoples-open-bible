translation:
  language: es
  text: Y Ishbi-benob[a], que era de entre los descendientes de Rapha[b], cuya lanza pesaba trescientos siclos de bronce, y que estaba ceñido con una espada nueva[c], dijo que iba a derribar a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma hebrea del nombre es incierta; 'Ishbi-benob' sigue la comprensión tradicional. Otras posibilidades son 'Jesbi-benob' o una división distinta de las consonantes.
    reason: textual_variant
  - marker: b
    text: 'También puede entenderse: ''entre los nacidos de Rapha''; la frase probablemente alude al linaje de los refaítas o gigantes.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''nuevo''; el sustantivo está implícito. Tradicionalmente se entiende ''espada''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וישבו בְּנֹב
  english_pob_choice: And Ishbi-benob
  chosen_spanish: Y Ishbi-benob
  alternatives_spanish:
  - Y Jesbi-benob
  - Y Yishbo en Nob
  lexicon: HALOT
  rationale: El texto consonántico es incierto; sigo la lectura tradicional del nombre propio, que encaja con la secuencia narrativa. Mantengo la transliteración del nombre para conservar la incertidumbre textual documentada.
- source_word: אֲשֶׁר בִּילִידֵי הָרָפָה
  english_pob_choice: who was among the descendants of Rapha
  chosen_spanish: que estaba entre los descendientes de Rapha
  alternatives_spanish:
  - que estaba entre los nacidos de Rapha
  - que estaba entre los descendientes del gigante
  lexicon: HALOT
  rationale: ִילִידֵי expresa pertenencia genealógica o de linaje. 'Descendientes de Rapha' preserva el valor de línea/familia y deja visible el nombre propio, en vez de sustituirlo por 'gigante', como hace el sentido general pero no la forma del texto.
- source_word: וּמִשְׁקַל קֵינוֹ
  english_pob_choice: whose spear weighed
  chosen_spanish: cuya lanza pesaba
  alternatives_spanish:
  - y cuyo peso de lanza era
  - y cuyo arma pesaba
  lexicon: HALOT
  rationale: El sustantivo קֵין se entiende aquí como arma de asta, tradicionalmente 'lanza'. La estructura relativa en español reproduce con naturalidad el hebreo idiomático 'el peso de su lanza' sin perder el contenido militar.
- source_word: שְׁלֹשׁ מֵאוֹת מִשְׁקַל נְחֹשֶׁת
  english_pob_choice: three hundred shekels of bronze
  chosen_spanish: trescientos siclos de bronce
  alternatives_spanish:
  - trescientos siclos en peso de bronce
  - trescientos siclos de cobre
  lexicon: HALOT
  rationale: Conservo 'siclos' para no modernizar la medida y 'bronce' por ser la equivalencia más probable en contexto bélico; 'cobre' queda como alternativa más amplia, pero menos precisa en español bíblico contemporáneo.
- source_word: וְהוּא חָגוּר חֲדָשָׁה
  english_pob_choice: and who was girded with a new sword
  chosen_spanish: y que estaba ceñido con una espada nueva
  alternatives_spanish:
  - y que estaba ceñido con algo nuevo
  - y que llevaba armadura nueva
  lexicon: HALOT
  rationale: El adjetivo femenino singular sugiere un sustantivo omitido; el contexto de combate hace más probable 'espada'. 'Ceñido' conserva el valor verbal de חָגוּר y evita explicitar más de lo que el texto permite.
- source_word: וַיֹּאמֶר לְהַכּוֹת אֶת דָּוִד
  english_pob_choice: said that he would strike down David
  chosen_spanish: dijo que iba a matar a David
  alternatives_spanish:
  - dijo que iba a herir a David
  - intentó matar a David
  - dijo que iba a derribar a David
  lexicon: HALOT
  rationale: El hebreo expresa intención/resolución mediante el infinitivo 'para golpear'. En español, 'iba a matar' comunica bien la intención homicida del contexto sin añadir una tonalidad más técnica que el original no exige.
translation_notes:
  revision_awareness: 'El borrador coincide con la última pasada revisada del texto fuente: no se documentaron cambios posteriores relevantes y el estado de acuerdo es alto. Se mantiene la solución tradicional para el nombre, la lectura genealógica de Rapha, la medida en siclos y la elipsis de ''espada'' en ''nueva''.'
  spanish_consistency_notes:
  - Uso 'Yahvé' como forma habitual en el proyecto cuando aparezca el nombre divino; en este versículo no aplica.
  - Mantengo 'siclos' sin conversión a unidades modernas para transparencia textual.
  - Conservo 'Rapha' como nombre propio para no borrar la tensión entre linaje y asociación con los gigantes.
