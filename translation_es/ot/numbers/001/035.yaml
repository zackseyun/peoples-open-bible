review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo expresa la fórmula censal estándar: «sus contados / los contados de ellos, de la tribu de Manasés: treinta y dos mil doscientos». El borrador conserva bien el número y el nombre propio, pero «clan» no refleja con suficiente precisión לְמַטֵּה, que en este contexto recurrente debe ser «tribu». Además, «los contados» es comprensible, pero suena poco natural en español; «los hombres contados» preserva mejor el referente masculino implícito en el contexto censal, en línea con el inglés auditado.'
  spanish_quality_summary: El borrador es legible, pero «Los contados del clan de Manasés» suena algo forzado y menos idiomático que una fórmula censal española más natural. «Los hombres contados de la tribu de Manasés» suena claro, digno y fiel al patrón del pasaje.
  glossary_alignment: No hay términos teológicos sensibles aquí. El punto principal de alineación léxica es mantener לְמַטֵּה como «tribu», no «clan», porque el proyecto busca fidelidad contextual y «tribu» es la equivalencia bíblica y eclesial normal en este marco censal.
  issues:
  - severity: medium
    issue: «clan» para לְמַטֵּה
    rationale: מַטֶּה en esta fórmula de Números se refiere a la tribu como unidad tribal de Israel. «Clan» reduce o desplaza el referente sociopolítico habitual y se aparta innecesariamente de la terminología bíblica española estable.
  - severity: low
    issue: «los contados» suena poco natural
    rationale: Aunque semánticamente posible, en español queda rígido y elíptico. «Los hombres contados» hace explícito el referente humano implícito en el contexto del censo sin añadir sentido ajeno al original.
  revised_spanish_text: Los hombres contados de la tribu de Manasés fueron treinta y dos mil doscientos.
  revision_rationale: Se reemplaza «clan» por «tribu» para reflejar con mayor precisión לְמַטֵּה en la fórmula censal de Números, y se ajusta «los contados» a «los hombres contados» para mejorar la naturalidad del español y mantener el referente explícito del censo.
