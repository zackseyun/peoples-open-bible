translation:
  language: es
  text: Pero desde allí buscarán a Yahvé su Dios, y lo encontrarán[a], si lo buscan con todo su corazón y con toda su alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «y encontrarán». El hebreo no repite el objeto pronominal en esta cláusula; el español lo explicita para mayor claridad.'
    reason: lexical_alternative
  - marker: b
    text: «Alma» puede reflejarse también como «vida» o «ser»; נֶפֶשׁ suele referirse a la persona viviente entera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִקַּשְׁתֶּם
  english_pob_choice: But ... you will seek
  chosen_spanish: Pero ... buscarán
  alternatives_spanish:
  - Y buscarán
  - Entonces buscarán
  lexicon: HALOT
  rationale: El verbo en este contexto continúa la advertencia con fuerza prospectiva. «Buscarán» conserva el valor de búsqueda diligente; «Pero» reproduce bien el giro contrastivo del contexto inmediato.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - desde ese lugar
  - de allí
  lexicon: HALOT
  rationale: La preposición indica origen o punto de partida. «Desde allí» es natural en español y conserva el valor locativo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La norma del proyecto para יְהוָה es «Yahvé». En español se usa esta forma para mantener el nombre divino explícito, en lugar de ocultarlo con una sustitución como «SEÑOR».
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: El sufijo hebreo es singular de segunda persona, pero el español de este versículo se dirige naturalmente al pueblo en plural. «Su Dios» conserva la referencia relacional sin forzar una concordancia pronominal poco natural en español.
- source_word: וּמָצָאתָ
  english_pob_choice: and you will find him
  chosen_spanish: y lo encontrarán
  alternatives_spanish:
  - y encontrarán
  - y lo hallarán
  lexicon: HALOT
  rationale: El hebreo omite el objeto explícito en esta cláusula, pero el contexto lo recupera. «Lo encontrarán» mantiene esa referencia implícita y el resultado de la búsqueda; «encontrarán» sin objeto sería posible, pero menos claro.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: Aquí introduce la condición de la búsqueda eficaz. «Si» expresa con precisión esa relación condicional en español.
- source_word: תִדְרְשֶׁנּוּ
  english_pob_choice: you seek him
  chosen_spanish: lo buscan
  alternatives_spanish:
  - lo buscarán
  - lo procuran
  lexicon: HALOT
  rationale: En contextos de relación con Dios, דָּרַשׁ expresa buscar con empeño y propósito religioso. «Lo buscan» conserva esa fuerza sin volverlo técnico; el objeto implícito se hace explícito en español.
- source_word: בְּכָל לְבָבְךָ
  english_pob_choice: with all your heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo el corazón
  - con todo el corazón de ustedes
  lexicon: HALOT
  rationale: «Corazón» es la equivalencia idiomática estable para לֵבָב en español bíblico y contemporáneo. El posesivo se armoniza con el sujeto plural implícito en el verbo.
- source_word: וּבְכָל נַפְשֶׁךָ
  english_pob_choice: and with all your soul
  chosen_spanish: y con toda su alma
  alternatives_spanish:
  - y con toda su vida
  - y con todo su ser
  lexicon: HALOT
  rationale: נֶפֶשׁ en esta fórmula deuteronómica apunta a la persona entera y a su vida interior. «Alma» conserva la resonancia tradicional y la conexión con el paralelo «corazón»; las alternativas reflejan el rango semántico sin borrar la tensión léxica.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La política terminológica del proyecto exige preservar el nombre pactual divino en español. Usar «Yahvé» evita la sustitución tradicional y mantiene visible el dato del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance antropológico de נֶפֶשׁ en la fórmula devocional
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser
  rationale: En la pareja «corazón / alma» se conserva la fórmula de devoción total sin reducir נֶפֶשׁ a un solo matiz psicológico. «Alma» es la opción más natural y litúrgicamente reconocible en español, a la vez que respeta la amplitud del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El texto inglés auditado presenta una nota sobre la omisión del objeto en la segunda cláusula y otra sobre el rango semántico de נֶפֶשׁ. La versión española conserva ambas tensiones: explicita el objeto en «lo encontrarán» y mantiene «alma» con nota alternativa. No se observan revisiones aplicadas en el último pase.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la política del proyecto para יְהוָה.
  - Se conserva la estructura condicional con «si» para כִּי.
  - Se refleja el paralelo bíblico «corazón / alma» con lenguaje natural en español.
  - El plural verbal español armoniza con el destinatario colectivo implícito en el contexto deuteronómico.
