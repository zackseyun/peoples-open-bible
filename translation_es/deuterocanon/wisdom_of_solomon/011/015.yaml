translation:
  language: es
  text: Pero en pago por los pensamientos insensatos[a] de su maldad, por los cuales, habiendo sido extraviados, adoraban reptiles irracionales y animales viles, tú les enviaste una multitud de criaturas irracionales para castigo[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pensamientos insensatos»; para λογισμῶν también cabe «razonamientos necios».
    reason: lexical_alternative
  - marker: b
    text: El griego repite la idea de «sin razón» tanto en los «reptiles irracionales» como en las «criaturas irracionales», creando un eco retórico.
    reason: lexical_alternative
  - marker: c
    text: O «para retribución» o «para venganza» en lugar de «para castigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντὶ
  english_pob_choice: in return for
  chosen_spanish: en retorno por
  alternatives_spanish:
  - a cambio de
  - en lugar de
  lexicon: LSJ
  rationale: ἀντί aquí expresa correspondencia retributiva, no mera sustitución. «En retorno por» conserva la idea de retribución y suena natural en español.
- source_word: λογισμῶν ἀσυνέτων
  english_pob_choice: foolish thoughts
  chosen_spanish: pensamientos insensatos
  alternatives_spanish:
  - razonamientos necios
  - pensamientos sin juicio
  lexicon: BDAG/LSJ
  rationale: λογισμοί puede ser pensamientos, razonamientos o cálculos; con ἀσυνέτων la crítica es de pensamiento defectuoso. «Pensamientos insensatos» mantiene el valor cognitivo y el reproche moral.
- source_word: ἀδικίας αὐτῶν
  english_pob_choice: their unrighteousness
  chosen_spanish: su injusticia
  alternatives_spanish:
  - su maldad
  - su injusticia e injusticia moral
  lexicon: BDAG/LSJ
  rationale: ἀδικία puede significar injusticia, maldad o wrongdoing. Aquí el contexto de idolatría y juicio permite «injusticia», aunque el sentido moral general también queda presente.
- source_word: ἐν οἷς
  english_pob_choice: by which
  chosen_spanish: por los cuales
  alternatives_spanish:
  - en los cuales
  - mediante los cuales
  lexicon: LSJ
  rationale: 'La relativa es instrumental: esos pensamientos fueron el medio por el cual fueron extraviados. «Por los cuales» comunica mejor esa función en español.'
- source_word: πλανηθέντες
  english_pob_choice: having been led astray
  chosen_spanish: habiendo sido extraviados
  alternatives_spanish:
  - habiéndose desviado
  - siendo engañados
  lexicon: BDAG/LSJ
  rationale: El participio pasivo señala que cayeron en error. «Habiendo sido extraviados» conserva el pasivo y el sentido de desvío moral/religioso.
- source_word: ἐθρήσκευον
  english_pob_choice: they worshiped
  chosen_spanish: adoraban
  alternatives_spanish:
  - daban culto a
  - practicaban culto a
  lexicon: BDAG/LSJ
  rationale: En contexto idólatra, el verbo apunta a culto religioso. «Adoraban» es claro y idiomático en español, sin perder la fuerza religiosa.
- source_word: ἄλογα ἑρπετὰ
  english_pob_choice: irrational creeping things
  chosen_spanish: reptiles irracionales
  alternatives_spanish:
  - seres rastreros irracionales
  - reptiles sin razón
  lexicon: LSJ
  rationale: Se conserva el juego retórico de ἄλογα/ἀλόγων con «irracionales». «Reptiles» traduce ἑρπετά y mantiene la imagen de seres que se arrastran.
- source_word: κνώδαλα εὐτελῆ
  english_pob_choice: worthless animals
  chosen_spanish: animales viles
  alternatives_spanish:
  - animales despreciables
  - bestias viles
  lexicon: LSJ
  rationale: κνώδαλα es «animales/bestias» con tono despectivo; εὐτελῆ añade poco valor, bajeza o mezquindad. «Viles» preserva el matiz peyorativo sin sonar forzado.
- source_word: ἐπαπέστειλας
  english_pob_choice: you sent upon them
  chosen_spanish: les enviaste
  alternatives_spanish:
  - enviaste contra ellos
  - enviaste sobre ellos
  lexicon: LSJ
  rationale: El compuesto puede expresar envío contra/al encuentro de alguien en juicio. En español, el dativo «les enviaste» es natural y el contexto ya indica la finalidad punitiva.
- source_word: πλῆθος ἀλόγων ζῴων
  english_pob_choice: a multitude of irrational creatures
  chosen_spanish: una multitud de criaturas irracionales
  alternatives_spanish:
  - una multitud de animales irracionales
  - un gran número de seres irracionales
  lexicon: LSJ
  rationale: πλῆθος es «multitud»; ζῷα son animales/seres vivos, y el adjetivo ἀλόγων repite la ironía de «irracionales». «Criaturas irracionales» conserva la reiteración sin forzar «animales» dos veces.
- source_word: εἰς ἐκδίκησιν
  english_pob_choice: for punishment
  chosen_spanish: para castigo
  alternatives_spanish:
  - para retribución
  - para venganza
  lexicon: BDAG/LSJ
  rationale: ἐκδίκησις puede ser venganza, retribución o castigo. En este contexto judicial, «para castigo» comunica el resultado sin cargar la frase con connotaciones personales de venganza.
theological_decisions:
- issue: Matiz moral-teológico de ἀδικία
  english_pob_reading: their unrighteousness
  chosen_spanish_reading: su injusticia
  alternative_spanish_readings:
  - su maldad
  - su injusticia moral
  rationale: La frase vincula razonamiento desviado, idolatría y juicio divino. «Injusticia» mantiene el peso moral sin reducir el término a injusticia social בלבד.
  doctrine_reference: 'DOCTRINE.md: mantener el peso teológico de la terminología moral cuando el contexto lo exige'
- issue: Repetición de ἄλογος para crear ironía
  english_pob_reading: irrational ... irrational
  chosen_spanish_reading: irracionales ... irracionales
  alternative_spanish_readings:
  - sin razón ... sin razón
  - irracionales ... sin razón
  rationale: 'El griego repite el mismo campo léxico para subrayar la ironía: adoraron seres irracionales y recibieron criaturas irracionales. Conviene preservar esa repetición en español.'
  doctrine_reference: 'DOCTRINE.md: consistencia de términos clave y preservación de ecos retóricos documentados'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se prefirió un español natural para λογισμῶν, se mantuvo la correspondencia retórica de ἄλογος/ἀλόγων, y se evitó una duplicación pesada en la frase final optando por «criaturas irracionales» mientras se conserva el sentido punitivo de εἰς ἐκδίκησιν.'
  spanish_consistency_notes:
  - Se preserva «irracionales» para reflejar el juego retórico con ἄλογα/ἀλόγων.
  - Se usó «Yahvé» no porque aparezca aquí el nombre divino, sino por la norma general del proyecto; en este versículo solo aparece la segunda persona implícita de la acción divina.
  - Se mantuvo un registro bíblico moderno y digno, evitando calcos rígidos donde el español exige una sintaxis más natural.
