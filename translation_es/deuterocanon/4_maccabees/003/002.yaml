revisions:
- from: Por ejemplo[a], la razón no puede cortar ninguno de tus deseos, pero la razón puede hacer posible no ser esclavizado por el deseo.
  to: Por ejemplo[a], la razón no puede cortar de raíz alguno de tus deseos, pero la razón puede hacer posible que uno no sea esclavo del deseo.
  rationale: Se hizo una reparación menor para mejorar la naturalidad del español manteniendo el sentido del griego y del audit trail inglés. «Cortar de raíz» conserva la imagen vívida de ἐκκόψαι mejor que «cortar ninguno», y «que uno no sea esclavo del deseo» expresa la metáfora de δουλωθῆναι de manera más idiomática que «ser esclavizado por el deseo». La nota al pie también se ajustó para evitar el calco poco natural «proveer que».
