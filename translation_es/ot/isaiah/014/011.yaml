  text: הוּרַ֥ד שְׁא֛וֹל גְּאוֹנֶ֖/ךָ הֶמְיַ֣ת נְבָלֶ֑י/ךָ תַּחְתֶּ֨י/ךָ֙ יֻצַּ֣ע רִמָּ֔ה וּ/מְכַסֶּ֖י/ךָ תּוֹלֵעָֽה׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/014/011.yaml
  text: Your pomp has been brought down to Sheol[a], the sound of your harps; maggots are spread out beneath you[c][b], and worms are your covering.
  footnotes:
  - marker: a
    text: Or 'your majesty' or 'your pomp' for 'your pride.' The Hebrew term can denote exalted splendor as well as arrogant pride.
    reason: lexical_alternative
  - marker: b
    text: Sheol is the realm of the dead; alternatively, 'the grave' or 'the realm of the dead.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lyres' or more generally 'stringed instruments.'
    reason: lexical_alternative
