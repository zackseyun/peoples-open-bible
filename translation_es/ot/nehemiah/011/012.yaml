translation:
  language: es
  text: Y sus hermanos[a], los que hacían el trabajo para la casa, eran ochocientos veintidós; y Adaías hijo de Jeroham, hijo de Pelalía, hijo de Amzi, hijo de Zacarías, hijo de Pasjur, hijo de Malquías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los que trabajaban para el templo”. El hebreo dice literalmente “los que hacían el trabajo para la casa”, y “la casa” se entiende contextualmente como el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  english_pob_choice: And their brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y sus compañeros
  lexicon: HALOT
  rationale: Se conserva el término de parentesco del hebreo, como en la POB inglesa. En este contexto sacerdotal puede implicar miembros del mismo grupo, pero el texto dice literalmente “sus hermanos”, y el español lo refleja sin introducir una identificación interpretativa.
- source_word: עֹשֵׂי הַמְּלָאכָה
  english_pob_choice: doers of the work
  chosen_spanish: los que hacían la obra
  alternatives_spanish:
  - los trabajadores
  - los hacedores de la obra
  lexicon: HALOT
  rationale: En español, “los que hacían la obra” preserva el valor participial y suena natural. Mantiene la conexión con la forma hebrea sin volverla una paráfrasis libre.
- source_word: לַבַּיִת
  english_pob_choice: for the house
  chosen_spanish: para la casa
  alternatives_spanish:
  - para el templo
  - de la casa
  lexicon: HALOT
  rationale: Se mantiene “casa” como en la POB inglesa, porque el hebreo dice literalmente “casa”. El contexto permite entender que se trata del templo, pero el texto no lo explicita aquí.
- source_word: שְׁמֹנֶה מֵאוֹת עֶשְׂרִים וּשְׁנָיִם
  english_pob_choice: eight hundred twenty-two
  chosen_spanish: ochocientos veintidós
  alternatives_spanish:
  - ochocientos y veintidós
  lexicon: HALOT
  rationale: Es el cardinal directo y se expresa con la forma normal del español moderno. No se añade “y”, siguiendo el uso estándar en conteos.
- source_word: וַעֲדָיָה
  english_pob_choice: and Adaiah
  chosen_spanish: y Adaías
  alternatives_spanish:
  - y Adaía
  lexicon: HALOT
  rationale: El nombre se translitera según el uso bíblico en español. Se conserva la coordinación simple con “y”.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La fórmula genealógica se traduce de manera directa y convencional. “Hijo de” reproduce la secuencia del hebreo mejor que una generalización a “descendiente de”.
- source_word: יְרֹחָם / פְּלַלְיָה / אַמְצִי / זְכַרְיָה / פַּשְׁחוּר / מַלְכִּיָּה
  english_pob_choice: Jeroham / Pelaliah / Amzi / Zechariah / Pashhur / Malchijah
  chosen_spanish: Jeroham / Pelalía / Amzi / Zacarías / Pasjur / Malquías
  alternatives_spanish:
  - Jeroham / Pelalía / Amzi / Zacarías / Pashur / Malquías
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. “Zacarías” y “Malquías” siguen la forma española habitual; “Pasjur” conserva más de cerca el hebreo פַּשְׁחוּר que la forma inglesa con h.
theological_decisions:
- issue: Referencia de 'la casa'
  english_pob_reading: The Hebrew reads literally 'doers of the work for the house,' with 'the house' referring contextually to the temple.
  chosen_spanish_reading: “la casa” se conserva literalmente, entendida por el contexto como el templo.
  alternative_spanish_readings:
  - “el templo” en el texto principal
  - “la casa de Dios”
  rationale: 'La POB inglesa deja la referencia implícita y documenta la equivalencia contextual. El español mantiene esa misma tensión: literalidad en el cuerpo del texto y comprensión cultual sin explicitar una expansión no presente en el hebreo.'
  doctrine_reference: Nehemías 11:12; uso contextual de בַּיִת en el libro de Nehemías
- issue: Lista genealógica y relación de parentesco
  english_pob_reading: And their brothers
  chosen_spanish_reading: Y sus hermanos
  alternative_spanish_readings:
  - Y sus parientes
  - Y sus compañeros
  rationale: No se resuelve la relación social con una etiqueta más interpretativa. La forma literal preserva la ambigüedad útil del hebreo y evita sustituir el término de parentesco por una categoría institucional no explícita.
  doctrine_reference: Nehemías 11:12; contexto sacerdotal/levítico sin expansión explícita
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador [a] aparece en el texto principal exactamente donde se ancla la nota. La redacción conserva la literalidad de “la casa” y documenta la opción alternativa “templo” sin imponerla en el cuerpo del versículo.'
  spanish_consistency_notes:
  - Se mantuvo la secuencia genealógica con “hijo de” en toda la lista para consistencia.
  - Se usó “Pasjur” para acercarse al hebreo, mientras que otros nombres siguen formas españolas habituales cuando son idiomáticas.
  - La puntuación con punto y coma reproduce la división natural entre el censo numérico y la genealogía final.
