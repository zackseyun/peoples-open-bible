translation:
  language: es
  text: Esta fue la herencia de la tribu de los hijos de Aser según sus clanes—estas ciudades y sus asentamientos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta es la herencia ...». El demostrativo hebreo con cláusula nominal puede verterse en presente de manera más formal, pero el pretérito encaja bien con el resumen narrativo del contexto.'
    reason: alternative_reading
  - marker: b
    text: 'O: «sus aldeas» para «sus asentamientos». El hebreo se refiere a lugares rurales dependientes vinculados con las ciudades enumeradas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Esta es
  lexicon: HALOT
  rationale: El demostrativo femenino singular retoma la porción ya descrita. En español, el pretérito 'fue' funciona bien en el resumen narrativo; 'es' también sería posible como formulación más formal y atemporal.
- source_word: נַחֲלַת
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - porción heredada
  - posesión
  lexicon: HALOT
  rationale: En el contexto de la repartición territorial de Josué, נַחֲלָה expresa una porción recibida por herencia. 'Herencia' conserva mejor esa carga que un término más plano como 'asignación'.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - cetro
  lexicon: HALOT
  rationale: Aquí designa la unidad tribal estándar, no el objeto literal 'vara'.
- source_word: בְנֵי אָשֵׁר
  english_pob_choice: the sons of Asher
  chosen_spanish: los hijos de Asher
  alternatives_spanish:
  - los descendientes de Asher
  - el pueblo de Asher
  lexicon: HALOT
  rationale: Se conserva la expresión filial del hebreo para la identidad tribal. 'Hijos de Asher' es natural en español bíblico y mantiene la textura del original.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en este marco de reparto tribal se refiere a subdivisiones internas del grupo. 'Clanes' refleja bien ese valor distributivo y evita reducirlo a un simple parentesco doméstico.
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - estas poblaciones
  - estos pueblos
  lexicon: HALOT
  rationale: עָרִים suele referirse a centros urbanos o poblados fortificados. 'Ciudades' es el equivalente bíblico más directo y reconoce el uso estándar del término.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: and their settlements
  chosen_spanish: y sus asentamientos
  alternatives_spanish:
  - y sus aldeas
  - y sus villas
  - y sus pueblos dependientes
  lexicon: HALOT
  rationale: חָצֵר puede denotar asentamientos rurales dependientes asociados a la ciudad principal. 'Asentamientos' es suficientemente amplio para no estrechar indebidamente el sentido a 'aldeas'.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo de Josué 19:31 y la auditoría inglesa POB. Se conserva la fórmula de herencia tribal, el dativo distributivo 'según sus clanes' y el par 'ciudades/asentamientos'. La única variación estilística relevante es el uso de 'fue' en lugar de 'es', dejando señalada en nota la alternativa formal en presente.
  spanish_consistency_notes:
  - Se mantuvo 'herencia' para נַחֲלָה en coherencia con el lenguaje de reparto territorial de Josué.
  - Se conservó 'tribu' y 'hijos de Asher' para respetar la fórmula genealógico-tribal del hebreo.
  - '''Clanes'' se usa como equivalente de מִשְׁפְּחֹתָם en este contexto de distribución territorial.'
  - '''Asentamientos'' queda como término amplio para חַצְרֵיהֶן, sin imponer ''aldeas'' como única posibilidad.'
