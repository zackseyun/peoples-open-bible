translation:
  language: es
  text: Y el pueblo salió, trajo e hizo para sí cabañas[a], cada uno sobre su azotea, y en sus patios, y en los patios de la casa de Dios, y en la plaza[b] de la Puerta del Agua, y en la plaza[b] de la Puerta de Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enramadas»; el término hebreo סֻכּוֹת puede referirse a estructuras temporales. Se conserva aquí «cabañas» para mantener la conexión con la Fiesta de las Cabañas.
    reason: lexical_alternative
  - marker: b
    text: El hebreo רְחוֹב se refiere a un espacio público abierto o plaza cerca de una puerta; tradicionalmente, «lugar espacioso».
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: went out
  chosen_spanish: salió / y salió
  alternatives_spanish:
  - fueron afuera
  - salieron
  lexicon: HALOT
  rationale: El hebreo narra con wayyiqtol la acción de salir del pueblo; en español, «salió» mantiene la secuencia narrativa natural. Se conserva el sujeto colectivo «el pueblo» para reflejar הָעָם como comunidad.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo del pacto
  lexicon: HALOT
  rationale: «El pueblo» reproduce el colectivo de manera sobria y bíblica, sin perder la referencia comunitaria del contexto de la fiesta.
- source_word: וַיָּבִיאוּ
  english_pob_choice: brought them
  chosen_spanish: trajeron
  alternatives_spanish:
  - los trajeron
  - llevaron
  lexicon: HALOT
  rationale: El objeto es implícito en el versículo anterior; en español, puede omitirse sin perder claridad. «Trajeron» conserva el sentido de בוא en hiphil sin añadir material innecesario.
- source_word: וַיַּעֲשׂוּ לָהֶם סֻכּוֹת
  english_pob_choice: made booths for themselves
  chosen_spanish: se hicieron cabañas
  alternatives_spanish:
  - se hicieron enramadas
  - se hicieron refugios temporales
  lexicon: HALOT
  rationale: סֻכּוֹת remite a las estructuras festivas de la Fiesta de las Cabañas/Enramadas. «Cabañas» es un equivalente español natural y suficientemente tradicional; se evita «refugios» por ser demasiado genérico. Se mantiene el valor reflexivo de לָהֶם con «se hicieron».
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: En la construcción distributiva, אִישׁ expresa repetición individual. «Cada uno» preserva ese valor sin forzar un masculino genérico redundante.
- source_word: עַל גַּגּוֹ
  english_pob_choice: on his roof
  chosen_spanish: sobre su azotea
  alternatives_spanish:
  - sobre su techo
  - sobre su terrado
  lexicon: HALOT
  rationale: גָּג es un techo plano o azotea; «azotea» comunica mejor la imagen doméstica hebrea que «techo» en español corriente. El posesivo singular concuerda con el distributivo anterior.
- source_word: וּבְחַצְרֹתֵיהֶם
  english_pob_choice: in their courtyards
  chosen_spanish: en sus patios
  alternatives_spanish:
  - en sus courtyards
  - en sus atrios
  lexicon: HALOT
  rationale: חָצֵר puede referir un patio/corral/courtyard. «Patios» es natural en español y conserva el espacio doméstico o comunitario sin sobrecargar con tecnicismo.
- source_word: וּבְחַצְרוֹת בֵּית הָאֱלֹהִים
  english_pob_choice: in the courtyards of the house of God
  chosen_spanish: en los patios de la casa de Dios
  alternatives_spanish:
  - en los atrios de la casa de Dios
  - en los patios del templo
  lexicon: HALOT
  rationale: Se mantiene la expresión transparente «casa de Dios» para בֵּית הָאֱלֹהִים, como en la auditoría inglesa. «Patios» puede sonar más natural que «atríos» en español moderno, sin perder la referencia al recinto sagrado.
- source_word: וּבִרְחוֹב
  english_pob_choice: in the square
  chosen_spanish: en la plaza
  alternatives_spanish:
  - en el espacio abierto
  - en la explanada
  lexicon: HALOT
  rationale: רְחוֹב denota un espacio público abierto junto a una puerta; «plaza» es la equivalencia española más clara y idiomática.
- source_word: שַׁעַר הַמַּיִם
  english_pob_choice: the Water Gate
  chosen_spanish: la Puerta del Agua
  alternatives_spanish:
  - la Puerta de las Aguas
  - la puerta del agua
  lexicon: HALOT
  rationale: Se conserva el nombre propio del lugar como topónimo. «Puerta del Agua» sigue de cerca el hebreo y suena natural en español bíblico.
- source_word: שַׁעַר אֶפְרָיִם
  english_pob_choice: the Gate of Ephraim
  chosen_spanish: la Puerta de Efraín
  alternatives_spanish:
  - la puerta de Efraín
  - la Puerta de Efraim
  lexicon: HALOT
  rationale: Se mantiene el nombre tradicional de la tribu/región en forma transparente y reconocible en español.
theological_decisions:
- issue: Terminología de סֻכּוֹת en el marco festivo
  english_pob_reading: '''booths'' is retained to preserve the connection with the Feast of Booths.'
  chosen_spanish_reading: «cabañas» con nota para la conexión festiva
  alternative_spanish_readings:
  - enramadas
  - sucot
  rationale: El término debe conservar la relación con la fiesta sin imponer una transliteración innecesaria en el texto principal. «Cabañas» es comprensible y bíblicamente apto; la nota aclara que puede entenderse también como estructuras temporales asociadas con la fiesta.
  doctrine_reference: Levítico 23:42-43; Nehemías 8:14-18
- issue: Referencia a la casa de Dios como espacio de celebración
  english_pob_reading: the courtyards of the house of God
  chosen_spanish_reading: los patios de la casa de Dios
  alternative_spanish_readings:
  - los atrios de la casa de Dios
  - los patios del templo
  rationale: 'No hay cambio doctrinal, pero sí una decisión de registro: «casa de Dios» mantiene la transparencia del hebreo y la apertura del texto a lectores de distintas tradiciones.'
  doctrine_reference: Nehemías 8:16; 1 Crónicas 29:1
- issue: Topónimos de puertas en Jerusalén
  english_pob_reading: the Water Gate / the Gate of Ephraim
  chosen_spanish_reading: la Puerta del Agua / la Puerta de Efraín
  alternative_spanish_readings:
  - la puerta del agua / la puerta de Efraín
  - la Puerta de las Aguas / la Puerta de Efraim
  rationale: Se conservan como nombres propios de lugares, sin espiritualizarlos ni traducirlos de modo interpretativo. La capitalización en español distingue los topónimos del uso común.
  doctrine_reference: Nehemías 8:1, 3, 16
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en su revisión más reciente; la traducción española sigue esa lectura estable y no introduce variantes textuales ni relecturas adicionales.
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» como equivalente directo de בֵּית הָאֱלֹהִים, en coherencia con el estilo POB.
  - Se prefirió «Puerta» con mayúscula en los topónimos para distinguir nombres propios de usos comunes.
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton; el término divino explícito es אֱלֹהִים, traducido como «Dios».
  - «Cabañas» preserva la conexión con la fiesta sin abandonar la naturalidad del español; la nota a pie recoge la alternativa léxica del inglés POB.
