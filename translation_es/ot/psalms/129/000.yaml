review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: encabezado + declaración de aflicción desde la juventud + llamado a que Israel lo diga. También preserva correctamente la ambigüedad de רַבַּת mediante nota. Sin embargo, en español bíblico natural la colocación del inciso final suena más idiomática como «diga ahora Israel» que «que ahora diga Israel», y el encabezado «Cántico de ascenso»/«de las subidas» merece mejor naturalidad sin perder auditabilidad.'
  spanish_quality_summary: El texto es fiel y legible, pero requiere un ajuste menor de estilo y naturalidad. «Grandemente» es comprensible, aunque algo pesado; «mucho» sería más natural, pero el borrador puede mantenerse si se desea cercanía formal. El cambio principal recomendado es mejorar la fluidez del llamado congregacional y suavizar el encabezado a una forma más idiomática en español eclesial general.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La nota léxica sobre רַבַּת está bien alineada con el audit trail inglés. Se conserva la alternativa «Muchas veces».
  issues:
  - severity: medium
    issue: «Cántico de las subidas» es fiel pero algo rígido en español.
    rationale: Aunque auditably cercano al hebreo, suena menos natural en español bíblico corriente que «Cántico de ascenso». Dado que el proyecto permite evitar calcos de madera, conviene una formulación más idiomática sin imponer una interpretación fuerte como «peregrinación».
  - severity: low
    issue: «que ahora diga Israel» suena menos natural que «diga ahora Israel».
    rationale: Ambas opciones expresan bien el yusivo, pero la inversión verbal sin «que» fluye mejor en español litúrgico y poético y conserva plenamente el sentido de יֹאמַר נָא יִשְׂרָאֵל.
