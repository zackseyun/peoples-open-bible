translation:
  language: es
  text: Y de entre los jefes[a] de las familias, cuando llegaron al templo de Dios en Jerusalén, prometieron[b] levantar la casa[c] en su sitio, según su capacidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líderes». El griego puede referirse a los que ocupaban puestos de dirección entre las familias.
    reason: lexical_alternative
  - marker: b
    text: O «hicieron voto de levantar la casa en su lugar». El verbo griego puede sugerir un voto solemne, pero aquí también puede expresar un compromiso formal de emprender la obra.
    reason: lexical_alternative
  - marker: c
    text: Es decir, el templo. Se conserva «casa» para mantener el modo de hablar bíblico.
    reason: cross_reference
lexical_decisions:
- source_word: ἡγουμένων
  english_pob_choice: heads
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - líderes
  lexicon: LSJ
  rationale: El contexto de patritas/familias pide un término que exprese posición de dirección dentro de los linajes. «Jefes» es natural en español bíblico contemporáneo y conserva la idea de cabeza representativa sin sonar demasiado abstracto.
- source_word: πατριὰς
  english_pob_choice: families
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  - casas paternas
  - linajes
  lexicon: LSJ
  rationale: El término señala grupos de parentesco y descendencia. «Familias» es la opción más clara y legible en español, y mantiene la relación con «jefes» sin forzar un tecnicismo.
- source_word: παραγίνεσθαι
  english_pob_choice: arrived
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - se presentaron
  lexicon: BDAG
  rationale: Aquí el verbo marca su llegada al ámbito del templo. «Llegaron» transmite el movimiento de forma natural y directa.
- source_word: ἱερὸν τοῦ θεοῦ
  english_pob_choice: the temple of God
  chosen_spanish: el templo de Dios
  alternatives_spanish:
  - el santuario de Dios
  - la casa de Dios
  lexicon: LSJ
  rationale: ἱερόν se refiere al complejo del templo; «templo de Dios» es la traducción más clara y estándar en español, y evita ambigüedad innecesaria.
- source_word: εὔξαντο
  english_pob_choice: pledged
  chosen_spanish: prometieron
  alternatives_spanish:
  - prometieron solemnemente
  - votaron
  - se comprometieron
  lexicon: LSJ
  rationale: El griego puede sugerir un voto, pero con el infinitivo siguiente el sentido principal es de compromiso formal con la tarea. «Prometieron» mantiene la seriedad sin decidir de antemano por un tecnicismo cultual que el contexto no obliga.
- source_word: ἐγεῖραι
  english_pob_choice: to raise up
  chosen_spanish: levantar
  alternatives_spanish:
  - reconstruir
  - erigir
  lexicon: BDAG
  rationale: Literalmente significa «levantar»; en el contexto del templo, el resultado es la restauración del edificio. «Levantar» preserva la imagen verbal del griego y sigue siendo comprensible en español.
- source_word: οἶκον
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: LSJ
  rationale: Se mantiene «casa» para conservar el idioma bíblico de la «casa» de Dios. El contexto ya la identifica como el templo, por lo que no hace falta sustituirla en el texto principal.
- source_word: ἐπὶ τοῦ τόπου αὐτοῦ
  english_pob_choice: on its site
  chosen_spanish: en su lugar
  alternatives_spanish:
  - sobre su sitio
  - en el sitio que le correspondía
  lexicon: LSJ
  rationale: La frase indica restauración en el emplazamiento debido. «En su lugar» es natural en español y conserva la idea de restitución al sitio original.
- source_word: κατὰ τὴν αὐτῶν δύναμιν
  english_pob_choice: according to their ability
  chosen_spanish: según su capacidad
  alternatives_spanish:
  - según sus medios
  - conforme a lo que podían
  lexicon: BDAG
  rationale: La expresión apunta a la medida de lo que podían aportar o hacer. «Capacidad» es amplia y fiel, y permite abarcar recursos y fuerza práctica.
theological_decisions:
- issue: Si εὔξαντο debe leerse como voto religioso formal o como compromiso solemne
  english_pob_reading: pledged
  chosen_spanish_reading: prometieron
  alternative_spanish_readings:
  - votaron
  - se comprometieron
  - prometieron solemnemente
  rationale: La construcción con el infinitivo puede llevar un matiz de voto, pero el contexto inmediato enfatiza la intención de emprender la restauración. «Prometieron» conserva la seriedad del acto sin cerrar la tensión interpretativa del griego.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones lexicográficas y no resolverlas de forma excesiva'
- issue: Cómo reflejar οἶκον sin perder la referencia al templo
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - la casa del Señor
  rationale: Mantener «casa» conserva la metáfora bíblica y respeta la elección auditada del texto inglés. El contexto inmediato ya especifica que se trata del templo de Dios.
  doctrine_reference: 'DOCTRINE.md: conservar el lenguaje bíblico cuando el contexto lo aclara'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el griego y la auditoría inglesa; la única tensión relevante es εὔξαντο, que puede sonar como «voto» o como «promesa/compromiso». También οἶκον conserva el idiomático «casa» para no perder la metáfora del templo.
  spanish_consistency_notes:
  - Se mantuvo «templo de Dios» para ἱερὸν τοῦ θεοῦ, sin sustituirlo por perífrasis más interpretativas.
  - Se preservó «casa» para οἶκον, siguiendo la decisión inglesa y aclarando en nota su referencia al templo.
  - «Prometieron» refleja el compromiso del grupo sin forzar un vocabulario litúrgico específico.
  - '«Según su capacidad» mantiene amplitud semántica para δύναμις: recursos, medios y fuerza práctica.'
