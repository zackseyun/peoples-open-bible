translation:
  language: es
  text: Ahora, pues[a], hagan buenas sus sendas y sus obras, y escuchen la voz de Yahvé su Dios[b], y Yahvé desistirá[c] del desastre que ha hablado contra ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «enmenden sus sendas y sus obras». El hebreo dice literalmente «hagan buenas sus sendas y sus obras».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «obedezcan la voz de Yahvé su Dios». El hebreo «escuchar la voz» suele implicar obediencia.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Yahvé desistirá del desastre»; también puede traducirse «Yahvé se arrepentirá del mal» más literalmente, o «Yahvé desistirá con respecto al desastre». Aquí «desastre» expresa el sentido de juicio o calamidad, no maldad moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  - De modo que ahora
  lexicon: HALOT
  rationale: La partícula marca transición exhortativa urgente. «Así que ahora» conserva ese impulso discursivo en español natural, sin volverlo demasiado solemne o arcaico.
- source_word: הֵיטִיבוּ
  english_pob_choice: make ... good
  chosen_spanish: hagan buenas
  alternatives_spanish:
  - mejoren
  - corrijan
  - hagan bien
  lexicon: HALOT
  rationale: El hiphil imperativo expresa causar que algo sea bueno. «Hagan buenas» mantiene la fuerza causativa y permite concordar con el objeto doble «sus sendas y sus obras».
- source_word: דַרְכֵיכֶם
  english_pob_choice: your ways
  chosen_spanish: sus sendas
  alternatives_spanish:
  - sus caminos
  - su conducta
  lexicon: HALOT
  rationale: «Sendas/caminos» preserva la metáfora ética hebrea. Se eligió «sendas» para sonar más literario y menos técnico que «conducta».
- source_word: וּמַעַלְלֵיכֶם
  english_pob_choice: your deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  - sus prácticas
  lexicon: HALOT
  rationale: El término alude a actos o hechos. «Obras» empareja bien con «sendas» y conserva el matiz moral sin ampliar indebidamente el alcance.
- source_word: וְשִׁמְעוּ בְּקוֹל
  english_pob_choice: listen to the voice
  chosen_spanish: escuchen la voz
  alternatives_spanish:
  - obedezcan la voz
  - oir la voz
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «oír/escuchar la voz», que en contexto implica obediencia. Así se respeta la textura del hebreo sin explicar de más dentro del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el término del proyecto para el nombre divino, evitando el ocultamiento convencional detrás de «SEÑOR».
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - tu Dios
  lexicon: HALOT
  rationale: El posesivo de segunda persona plural se expresa en registro neutral latinoamericano con «su Dios», que resulta natural en lectura pública.
- source_word: וְיִנָּחֵם
  english_pob_choice: will relent
  chosen_spanish: se arrepentirá
  alternatives_spanish:
  - se retractará
  - se deshará
  - cambiará de parecer
  lexicon: HALOT
  rationale: 'Aquí se preserva la tensión teológica del hebreo: el verbo puede expresar arrepentirse/ceder/relentir respecto del juicio anunciado. «Se arrepentirá» refleja la tradición semántica bíblica, aunque en español moderno requiere nota para evitar una lectura antropomórfica simplista.'
- source_word: אֶל הָרָעָה
  english_pob_choice: concerning the disaster
  chosen_spanish: del mal
  alternatives_spanish:
  - de la calamidad
  - del desastre
  - acerca de la desgracia
  lexicon: HALOT
  rationale: Se opta por una formulación breve y fiel al valor de רָעָה en contexto de juicio. «Mal» mantiene la ambigüedad del hebreo y permite la lectura de calamidad/jucio sin forzar una glosa interpretativa única.
- source_word: דִּבֶּר עֲלֵיכֶם
  english_pob_choice: has spoken against you
  chosen_spanish: ha hablado contra ustedes
  alternatives_spanish:
  - ha declarado contra ustedes
  - ha dicho contra ustedes
  lexicon: HALOT
  rationale: «Ha hablado contra ustedes» sigue de cerca el hebreo y conserva el carácter de sentencia pronunciada.
theological_decisions:
- issue: El verbo divino de relenting/repentance
  english_pob_reading: the LORD will relent concerning the disaster
  chosen_spanish_reading: Yahvé se arrepentirá del mal
  alternative_spanish_readings:
  - Yahvé se retractará del mal
  - Yahvé cambiará de parecer respecto del mal
  - Yahvé se compadecerá del mal
  rationale: La traducción preserva la tensión bíblica entre el anuncio del juicio y la posibilidad real de que Yahvé lo retire ante el cambio humano. En español, «se arrepentirá» mantiene la correspondencia histórica de la tradición de traducción, mientras que la nota ayuda a evitar que se entienda como pecado o error moral en Dios.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente; YHWH se traduce Yahvé.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, conservando la exhortación urgente, la metáfora ética de «sendas/obras», el idiomatismo de «escuchar la voz» y la tensión teológica del verbo נחם aplicado a Yahvé. No se registraron revisiones previas en el paquete fuente, y el estado de concordancia es alto con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino.
  - Se usa plural de cortesía/lectura pública latinoamericana con «ustedes».
  - Se conserva la ambigüedad de רָעָה mediante «mal» en el cuerpo y se explicita la alternativa en nota.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
