revisions:
- from: 'Entonces la reina Ester respondió y dijo[a]: «Si he hallado favor en tus ojos, oh rey, y si le parece bien al rey, que mi vida me sea dada[b] en mi petición, y mi pueblo en mi solicitud».'
  to: 'Entonces la reina Ester respondió y dijo: «Si he hallado favor en tus ojos, oh rey, y si le parece bien al rey, que mi vida me sea dada[a] en mi petición, y mi pueblo en mi ruego».'
  rationale: 'Se elimina la nota incorrecta sobre «respondió y dijo», se conserva la fórmula narrativa en el texto principal sin nota, y se traslada la nota léxica al lugar documentado por el POB inglés: la pasiva «que mi vida me sea dada». También se cambia «solicitud» por «ruego» para mantener la variación léxica hebrea con mejor naturalidad y tono en español.'
