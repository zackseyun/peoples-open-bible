translation:
  language: es
  text: 'Así dice Yahvé: He aquí, las aguas suben desde el norte, y llegarán a ser un torrente desbordado; inundarán la tierra y su plenitud[a], la ciudad y los que habitan en ella. Entonces los hombres[c] clamarán[b], y todo habitante de la tierra se lamentará.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la tierra y todo lo que la llena'.
    reason: lexical_alternative
  - marker: b
    text: La imagen es la de aguas de inundación procedentes del norte, probablemente símbolo de una fuerza invasora que viene de esa dirección.
    reason: cultural_note
  - marker: c
    text: Hebreo 'hombre' / 'humanidad', usado aquí colectivamente para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, conservando el nombre del pacto en español sin enmascararlo como un título genérico.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Observa
  lexicon: HALOT
  rationale: Mantiene el valor deíctico y solemne del anuncio profético con una fórmula natural y reverente en español.
- source_word: מַיִם עֹלִים מִצָּפוֹן
  english_pob_choice: waters are rising from the north
  chosen_spanish: aguas suben desde el norte
  alternatives_spanish:
  - las aguas están subiendo desde el norte
  - aguas vienen subiendo desde el norte
  lexicon: HALOT
  rationale: Se conserva el plural hebreo 'aguas' y la imagen de ascenso/inicio de una crecida. 'Desde el norte' preserva la dirección del símbolo sin explicitar en el texto la interpretación militar.
- source_word: וְהָיוּ לְנַחַל שׁוֹטֵף
  english_pob_choice: they will become an overflowing torrent
  chosen_spanish: llegarán a ser un torrente desbordado
  alternatives_spanish:
  - se convertirán en un torrente que desborda
  - serán un torrente torrencial
  lexicon: HALOT
  rationale: '''Torrente desbordado'' comunica el carácter destructivo y fluido de נחל שׁוטֵף, manteniendo la metáfora hídrica con un español claro y digno.'
- source_word: וְיִשְׁטְפוּ
  english_pob_choice: they will overflow
  chosen_spanish: inundarán
  alternatives_spanish:
  - desbordarán
  - arrasarán
  lexicon: HALOT
  rationale: Se elige un verbo que preserve el movimiento de inundación y el vínculo con el campo semántico del desbordamiento; 'inundarán' es claro y fuerte en español.
- source_word: אֶרֶץ וּמְלוֹאָהּ
  english_pob_choice: the land and its fullness
  chosen_spanish: la tierra y su plenitud
  alternatives_spanish:
  - la tierra y todo lo que la llena
  - la tierra y cuanto contiene
  lexicon: HALOT
  rationale: '''Plenitud'' preserva la condensación semántica de מְלוֹא y permite mantener la amplitud poética del hebreo sin expandir demasiado el texto principal.'
- source_word: עִיר וְיֹשְׁבֵי בָהּ
  english_pob_choice: the city and those who dwell in it
  chosen_spanish: la ciudad y los que habitan en ella
  alternatives_spanish:
  - la ciudad y sus habitantes
  lexicon: HALOT
  rationale: Se conserva la pareja hebrea ciudad/habitantes con una formulación natural en español, sin perder el paralelismo del original.
- source_word: הָאָדָם
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - la humanidad
  - la gente
  - los mortales
  lexicon: HALOT
  rationale: Se refleja el colectivo hebreo masculino genérico con 'los hombres', tal como la POB inglesa ajustó la versión final para conservar la referencia humana colectiva.
- source_word: וְהֵילִל כֹּל יוֹשֵׁב הָאָרֶץ
  english_pob_choice: every inhabitant of the land will wail
  chosen_spanish: todo habitante de la tierra se lamentará
  alternatives_spanish:
  - todo morador de la tierra gemirá
  - cada habitante de la tierra hará duelo
  lexicon: HALOT
  rationale: '''Lamentará'' comunica היטב el valor de הֵילִל en contexto de juicio. ''Tierra'' se conserva como equivalente amplio del hebreo aquí, sin imponer una lectura estrictamente local si el contexto puede abarcar más.'
theological_decisions:
- issue: Conservación del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La decisión sigue el principio del proyecto de no ocultar el nombre del pacto detrás de un título. En español, 'Yahvé' mantiene la transparencia auditiva y la continuidad con el texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
- issue: Metáfora de inundación con posible trasfondo bélico desde el norte
  english_pob_reading: Preserved as flood imagery in the main text without explicit interpretive expansion
  chosen_spanish_reading: Preservada como imagen de aguas que suben e inundan
  alternative_spanish_readings:
  - Explicitar que alude a un ejército invasor del norte
  rationale: Se mantiene la imagen profética del agua como está en el hebreo y en la POB inglesa. La posible referencia histórica/militar permanece en nota conceptual, no en el cuerpo del versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Colectivo humano en הָאָדָם
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - la humanidad
  - la gente
  rationale: '''Los hombres'' reproduce el masculino genérico del hebreo sin diluir el matiz colectivo. En este contexto de lamento universal, conserva la fuerza representativa del término.'
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם adam'
translation_notes:
  revision_awareness: La redacción sigue el tramo revisado de la POB inglesa, que consolidó la forma colectiva humana ('men') en lugar de una abstracción más amplia. También conserva la decisión estable de mantener la imagen de inundación sin explicitar en el cuerpo del texto la identidad del agente simbólico.
  spanish_consistency_notes:
  - '''Yahvé'' se usa consistentemente para יְהוָה según el estándar del proyecto.'
  - Se conservó 'aguas' en plural para reflejar el hebreo y la imaginería profética.
  - '''La tierra'' / ''la plenitud'' mantiene la estructura compacta de אֶרֶץ וּמְלוֹאָהּ.'
  - '''Los hombres'' refleja el colectivo humano masculino genérico, en paralelo con la revisión inglesa final.'
  - El registro busca ser bíblico y digno sin depender de fórmulas arcaicas que oscurezcan el sentido.
