  text: עָנֵ֣ה וְ/אָמַ֗ר לְ/אַרְיוֹךְ֙ שַׁלִּיטָ֣/א דִֽי מַלְכָּ֔/א עַל מָ֥ה דָתָ֛/א מְהַחְצְפָ֖ה מִן קֳדָ֣ם מַלְכָּ֑/א אֱדַ֣יִן מִלְּתָ֔/א הוֹדַ֥ע אַרְי֖וֹךְ לְ/דָנִיֵּֽאל־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/015.yaml
  text: He answered and said to Arioch[a], the king’s commander[b], “Why is the decree so harsh from before the king?” Then Arioch made the matter known to Daniel.
  footnotes:
  - marker: a
    text: Or “so harsh,” “so severe,” or “so hasty” for “so urgent.” The Aramaic term conveys pressing severity; the context favors the sense of haste in carrying out the king’s decree.
    reason: lexical_alternative
  - marker: b
    text: Literally “from before the king,” an Aramaic idiom meaning that the decree came from the king’s presence or authority.
    reason: cultural_note
