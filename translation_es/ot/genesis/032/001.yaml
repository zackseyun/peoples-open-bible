translation:
  language: es
  text: Labán se levantó muy de mañana, besó a sus hijos[a] y a sus hijas, y los bendijo. Luego Labán se fue y volvió a su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus hijos y sus hijas»; probablemente se refiere a los descendientes de Labán, es decir, a sus nietos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó[a] de mañana
  alternatives_spanish:
  - se levantó temprano
  - se levantó de madrugada
  lexicon: HALOT
  rationale: El verbo en hifil expresa levantarse temprano o comenzar temprano. En español, «se levantó de mañana» conserva el valor temporal y sigue siendo natural y digno. Se evita un giro demasiado rígido y se mantiene la secuencia narrativa del hebreo.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: de mañana
  alternatives_spanish:
  - por la mañana
  - en la mañana
  lexicon: HALOT
  rationale: La frase acompaña al verbo de levantarse temprano y en español suena mejor como complemento temporal integrado. «De mañana» comunica el énfasis matutino sin duplicar de forma pesada la idea ya contenida en el verbo.
- source_word: וַיְנַשֵּׁק
  english_pob_choice: kissed
  chosen_spanish: besó
  alternatives_spanish:
  - dio un beso a
  lexicon: HALOT
  rationale: El verbo denota un beso de despedida o familiar. «Besó» es directo, fiel y natural en español.
- source_word: לְבָנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hijos», el contexto sugiere descendientes, no necesariamente hijos inmediatos. En español, «sus hijos» preserva la forma léxica y permite la misma tensión interpretativa que el texto fuente; la nota explica la posibilidad de nietos/descendientes.
- source_word: וְלִבְנוֹתָיו
  english_pob_choice: his daughters
  chosen_spanish: y a sus hijas
  alternatives_spanish:
  - y a sus descendientes femeninas
  - y a sus nietas
  lexicon: HALOT
  rationale: Se mantiene la expresión femenina explícita del hebreo. Como con «sus hijos», la forma conserva el lenguaje original y deja abierta la referencia a descendientes.
- source_word: וַיְבָרֶךְ אֶתְהֶם
  english_pob_choice: and blessed them
  chosen_spanish: y los bendijo
  alternatives_spanish:
  - y les dio su bendición
  - y los despidió con una bendición
  lexicon: HALOT
  rationale: ברך significa «bendecir». En este contexto de despedida puede implicar una bendición final, pero la traducción principal debe conservar el contenido lexical sin explicarlo en exceso.
- source_word: וַיֵּלֶךְ
  english_pob_choice: departed
  chosen_spanish: Luego Labán se fue
  alternatives_spanish:
  - Entonces Labán partió
  - Después se fue
  lexicon: HALOT
  rationale: En español, «se fue» comunica de manera natural la partida. Se usa «Luego» para reflejar la secuencia narrativa sin sobrecargar con una repetición de verbos de movimiento.
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: y volvió
  alternatives_spanish:
  - y regresó
  - y retornó
  lexicon: HALOT
  rationale: שׁוב se traduce de forma natural como «volver» en español. Es la opción más idiomática y mantiene la progresión con el verbo anterior.
- source_word: לִמְקֹמוֹ
  english_pob_choice: to his place
  chosen_spanish: a su lugar
  alternatives_spanish:
  - a su sitio
  - a donde estaba
  lexicon: HALOT
  rationale: מקום literalmente significa «lugar». «A su lugar» mantiene la generalidad del hebreo y evita añadir una localización más específica que no está en el texto.
theological_decisions:
- issue: Kinship terms and likely referents
  english_pob_reading: his sons and his daughters; these likely refer to Laban's descendants, that is, his grandchildren
  chosen_spanish_reading: a sus hijos y a sus hijas
  alternative_spanish_readings:
  - a sus hijos
  - a sus nietos y nietas
  - a sus descendientes
  rationale: El hebreo usa términos de parentesco explícitos en masculino y femenino. La lectura española conserva esa forma en el texto principal y deja la aclaración interpretativa en nota, sin neutralizar ni reinterpretar el original dentro del versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Se siguió el auditor inglés sin cambios sustanciales: no hubo revisiones aplicadas en la fuente de referencia y la concordancia de revisión fue alta. La redacción española conserva las decisiones léxicas y la nota interpretativa sobre los términos de parentesco.'
  spanish_consistency_notes:
  - Se usa «Labán» como nombre propio bíblico estándar en español.
  - Se prefiere «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - «Volvió a su lugar» mantiene la ambigüedad hebrea de מקום sin especificar más de lo que el texto dice.
  - La nota al pie se ancla en «de mañana» para señalizar la información interpretativa sobre los hijos e hijas.
