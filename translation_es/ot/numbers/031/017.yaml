translation:
  language: es
  text: Y ahora[a], maten a todo varón entre los pequeños, y maten a toda mujer que haya conocido a un hombre al acostarse con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «que haya conocido a un hombre por acostamiento de varón»; un hebraísmo para relaciones sexuales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Ahora
  - Y ahora
  lexicon: HALOT
  rationale: La combinación introduce la transición inmediata hacia la orden siguiente. «Así que ahora» conserva el valor discursivo de וְ + עַתָּה sin sonar demasiado literal o forzado en español.
- source_word: הִרְגוּ / הֲרֹגוּ
  english_pob_choice: kill
  chosen_spanish: maten
  alternatives_spanish:
  - maten
  - den muerte a
  - maten de muerte
  lexicon: HALOT
  rationale: El imperativo hebreo es directo y fuerte. «Maten» comunica con claridad la fuerza de la orden, mientras que opciones como «den muerte a» o giros más formales son menos naturales en español contemporáneo.
- source_word: כָל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo macho
  - todo hombre
  lexicon: HALOT
  rationale: זָכָר designa «varón/macho» y no específicamente «hombre» en sentido adulto. «Todo varón» mantiene el rasgo sexual del término sin introducir una edad que el sustantivo por sí solo no exige.
- source_word: בַּטָּף
  english_pob_choice: among the little ones
  chosen_spanish: entre los pequeños
  alternatives_spanish:
  - entre los niños pequeños
  - entre los dependientes
  lexicon: HALOT
  rationale: טַף se refiere a niños pequeños o dependientes. «Entre los pequeños» reproduce de manera natural la relación espacial/relacional de la preposición y evita estrechar indebidamente el alcance del término.
- source_word: אִשָּׁה
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - hembra
  - esposa
  lexicon: HALOT
  rationale: Aquí el sustantivo es genérico e indefinido; «mujer» es la equivalencia natural en español y no presupone la condición de esposa.
- source_word: יֹדַעַת אִישׁ
  english_pob_choice: who has known a man
  chosen_spanish: que haya conocido varón
  alternatives_spanish:
  - que haya tenido relaciones con un hombre
  - que haya conocido a un hombre
  lexicon: HALOT
  rationale: El verbo ידע con sentido sexual es un hebraísmo reconocido. «Haya conocido varón» conserva el valor idiomático sin explicitar más de lo que el texto dice.
- source_word: לְמִשְׁכַּב זָכָר
  english_pob_choice: by lying with him
  chosen_spanish: al acostarse con él
  alternatives_spanish:
  - en el lecho de un varón
  - mediante el acto de acostarse con un varón
  lexicon: HALOT
  rationale: La frase especifica el sentido sexual de «conocer». «Al acostarse con él» comunica la acción de manera comprensible en español y preserva el carácter idiomático sin volverla técnica ni eufemística.
theological_decisions:
- issue: Cómo rendir una orden de guerra moralmente קשה sin suavizarla ni añadir explicación interpretativa
  english_pob_reading: Translate the command directly and literally enough to preserve the severity of the text
  chosen_spanish_reading: Traducir la orden de manera directa, manteniendo su severidad, sin atenuarla ni comentar el trasfondo histórico en el versículo mismo
  alternative_spanish_readings:
  - Usar fórmulas más suaves como «den muerte a» en lugar de «maten»
  - Parafrasear para explicar la situación histórica dentro del texto principal
  rationale: El texto presenta una orden directa; la traducción debe dejar visible esa dureza sin introducir comentario teológico o moral que no esté en el hebreo. Esto sigue la prioridad del idioma original y evita paraphrase beyond what the source warrants.
  doctrine_reference: 'Translation philosophy: original-language primacy; no suavizar ni expandir beyond source evidence.'
translation_notes:
  revision_awareness: 'El audit trail inglés revisó la última frase desde una versión más literal («by lying with a male») a una más natural («by lying with him») sin perder el sentido idiomático. La versión española sigue esa revisión: mantiene la referencia sexual explícita y usa una formulación natural («al acostarse con él»).'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantuvo «varón» para preservar el rasgo lexical de זָכָר.
  - «Conocer» se conserva como hebraísmo transparente, y la nota aclara el sentido sexual idiomático.
  - La puntuación y el tono son adecuados para publicación bíblica en español moderno, sin registro arcaizante.
