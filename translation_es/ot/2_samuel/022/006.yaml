    issue: Uso de «Sheol» en vez de «Seol»
    rationale: Aunque el inglés POB retiene 'Sheol', en español bíblico y académico la transliteración normal y legible es «Seol». Mantener la grafía inglesa introduce una forma menos natural para lectores hispanos sin aportar mayor fidelidad al hebreo.
  - severity: medium
    issue: «me confrontaron» suena calcado y poco idiomático
    rationale: Para קִדְּמֻנִי, el expediente inglés explica 'met me / came before me' y elige 'confronted me' como inglés natural. En español, «confrontar» aquí suena forzado; «me salieron al encuentro» expresa mejor el encuentro hostil y conserva la alternativa ya documentada en la nota.
