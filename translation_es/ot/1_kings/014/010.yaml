translation:
  language: es
  text: Por tanto,[a] he aquí, estoy trayendo desastre sobre la casa de Jeroboam, y cortaré de Jeroboam todo varón,[b] esclavo y libre[c] en Israel; y quemaré por completo la casa de Jeroboam, como se quema el estiércol hasta que desaparezca por completo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «Por eso» o «Por lo tanto».
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «el que orina contra una pared», un modismo crudo para un varón.
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea probablemente funciona como un merismo que incluye a todos sin excepción; también puede entenderse como «siervo y libre».
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - mal
  - ruina
  lexicon: HALOT
  rationale: En un oráculo de juicio, רָעָה se refiere a una calamidad enviada sobre la casa de Jeroboam, no a maldad moral. «Desastre» es natural en español y conserva el peso del juicio divino.
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - eliminaré
  - destruiré
  - extirparé
  lexicon: HALOT
  rationale: El verbo כרת en contextos de juicio conserva la idea de cortar o extirpar. «Cortaré» mantiene el valor idiomático y la imagen de eliminación de una línea familiar.
- source_word: מַשְׁתִּין בְּקִיר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo hombre
  - cada macho
  - todo el que orina contra una pared
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo crudo para referirse a varones. «Todo varón» comunica el referente de forma clara y digna; la literalidad grosera queda implícita en la nota, sin perder auditabilidad.
- source_word: עָצוּר וְעָזוּב
  english_pob_choice: bond and free
  chosen_spanish: esclavo y libre
  alternatives_spanish:
  - atado y suelto
  - encerrado y abandonado
  - siervo y libre
  lexicon: HALOT
  rationale: 'La pareja funciona como merismo de totalidad: todos sin excepción. «Esclavo y libre» preserva mejor el alcance total y la tensión léxica que una traducción suavizada.'
- source_word: וּבִעַרְתִּי אַחֲרֵי בֵית יָרָבְעָם
  english_pob_choice: I will burn away after the house of Jeroboam
  chosen_spanish: barreré detrás de la casa de Jeroboam
  alternatives_spanish:
  - quemaré tras la casa de Jeroboam
  - purgaré de la casa de Jeroboam
  - consumiré detrás de la casa de Jeroboam
  lexicon: HALOT
  rationale: בער aquí queda interpretado por la comparación final con el estiércol y la eliminación total. En español, «barreré detrás de» preserva la imagen de limpieza/eliminación progresiva, sin forzar un calco de «quemar» que suena menos natural en este contexto.
- source_word: הַגָּלָל
  english_pob_choice: dung
  chosen_spanish: estiércol
  alternatives_spanish:
  - excremento
  - basura
  - inmundicia
  lexicon: HALOT
  rationale: El término es deliberadamente despectivo y gráfico. «Estiércol» conserva la fuerza de la comparación y resulta inteligible y reverente en español bíblico moderno.
- source_word: עַד תֻּמּוֹ
  english_pob_choice: until it is all gone
  chosen_spanish: hasta que desaparezca por completo
  alternatives_spanish:
  - hasta su fin
  - hasta consumirse
  - hasta terminarse
  lexicon: HALOT
  rationale: La frase expresa remoción total. «Hasta que desaparezca por completo» transmite la consumación absoluta del símil sin sonar rígidamente literal.
theological_decisions:
- issue: Conservar la dureza del juicio divino sin suavizar el lenguaje
  english_pob_reading: The verse is translated with direct, forceful language of divine judgment ('bringing disaster,' 'cut off,' 'burn away,' 'dung')
  chosen_spanish_reading: El versículo se vierte con lenguaje directo y severo de juicio divino («desastre», «cortaré», «barreré», «estiércol»).
  alternative_spanish_readings:
  - Usar términos atenuados como «problema», «quitaré» o «limpiaré».
  rationale: El hebreo es intencionalmente severo y despectivo. La equivalencia óptima exige conservar la gravedad del oráculo y no amortiguarla para comodidad estilística.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa que cambió el final de «sweep away» a «burn away» para reflejar mejor וּבִעַרְתִּי / יְבַעֵר. En español, se evitó un calco rígido de «quemar» y se optó por una imagen verbal más natural («barreré detrás de») que conserva la idea de eliminación total y permite mantener el símil final con el estiércol.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparece; en este versículo no se requiere.
  - «Jeroboam» se mantiene como nombre propio establecido.
  - «Esclavo y libre» preserva el merismo hebreo y evita sustituirlo por un lenguaje más eclesiástico que debilite la fuerza textual.
  - La puntuación separa las cláusulas de juicio para reflejar la acumulación retórica del hebreo.
