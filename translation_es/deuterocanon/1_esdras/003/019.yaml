    rationale: μεταστρέφει ... εἰς sugiere volver, dirigir o cambiar hacia un estado, no tanto convertir el pensamiento mismo en un banquete. En español, «vuelve toda mente al banquete y a la alegría» preserva mejor la relación semántica.
  revised_spanish_text: y vuelve toda mente al banquete y a la alegría[a], y no recuerda ninguna tristeza ni deuda[b].
