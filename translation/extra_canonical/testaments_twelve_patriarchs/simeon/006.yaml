theological_decisions:
- issue: 'Verse 5 textual form: sign/Shem/Seth and the manifestation formula'
  chosen_reading: Translate the main Greek line as 'Then a great sign will be glorified for Israel, because the Lord God, appearing on the earth, will come and save Adam in him,' while noting major variants.
  alternative_readings:
  - '''Then Shem will be glorified...'''
  - '''Then Seth will be glorified...'''
  - '''the Lord God, great one of Israel, will appear on earth [as a man]'''
  rationale: The witness list in the source shows substantial variation. The normalized base text begins with σημεῖον, so the main translation follows that reading. Because the verse likely reflects secondary expansion and/or Christianized transmission, the alternatives are preserved in notes rather than harmonized.
  doctrine_reference: Preserve theological tension rather than resolve it; translate what is in the Greek witness honestly and use notes for alternatives.
- issue: Bracketed incarnational phrases in verses 5 and 7
  chosen_reading: Omit the bracketed expansions from the main text and preserve them in footnotes as textual variants.
  alternative_readings:
  - '''[as a man]'' in verse 5'
  - '''[for God, having taken a body and eaten with men, saved men]'' in verse 7'
  rationale: The source marks these phrases as bracketed and textually suspect. Given the book-context warning about later Christian interpolation, transparency requires noting them without silently incorporating them into the running text.
  doctrine_reference: Be transparent around likely Christian interpolation or textual expansion.
- issue: Meaning of 'Adam' in verse 5
  chosen_reading: Retain 'Adam' in the main text.
  alternative_readings:
  - '''humankind'''
  - '''man'''
  rationale: Although Adam may function representatively for humanity, the Greek names Adam explicitly. Retaining the proper name avoids interpretive overreach; a footnote can mention the broader possible sense.
  doctrine_reference: Original-language primacy over translation tradition; preserve ambiguity where genuine.
