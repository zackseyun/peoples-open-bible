translation:
  language: es
  text: Porque el embrujo de la maldad oscurece lo bueno[a][b], y el vagar del deseo corrompe una mente inocente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «envidia de la maldad» o «el mal de ojo de la maldad»; el griego βασκανία puede denotar una envidia maligna o una influencia dañina.
    reason: lexical_alternative
  - marker: b
    text: O «lo bello» o «las cosas nobles»; el griego τὰ καλά puede incluir tanto bondad moral como belleza estética.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασκανία
  english_pob_choice: bewitchment
  chosen_spanish: embrujo
  alternatives_spanish:
  - envidia
  - mal de ojo
  - hechizo
  lexicon: LSJ
  rationale: El griego puede expresar una influencia dañina asociada con la envidia o con el mal de ojo. «Embrujo» conserva en español la idea de una fuerza corruptora y fascinante, sin reducir el término a una emoción interna como «envidia».
- source_word: φαυλότητος
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la bajeza
  - la depravación
  - la vileza
  lexicon: LSJ
  rationale: El genitivo califica a βασκανία como una influencia perteneciente al mal moral. «Maldad» comunica de forma natural esa corrupción ética en español.
- source_word: ἀμαυροῖ
  english_pob_choice: darkens
  chosen_spanish: oscurece
  alternatives_spanish:
  - apaga
  - enturbia
  - ensombrece
  lexicon: LSJ
  rationale: El verbo expresa literalmente el oscurecimiento o debilitamiento de la luz/percepción. «Oscurece» reproduce bien esa imagen y funciona con el contraste del versículo.
- source_word: τὰ καλά
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - lo bello
  - las cosas buenas
  - lo noble
  lexicon: LSJ
  rationale: El griego puede abarcar lo moralmente bueno y también lo bello o noble. «Lo bueno» mantiene esa amplitud ética sin excluir el matiz estético implícito.
- source_word: ῥεμβασμός
  english_pob_choice: wandering
  chosen_spanish: el vagar
  alternatives_spanish:
  - la vagancia
  - el deambular
  - la dispersión
  lexicon: LSJ
  rationale: El sustantivo sugiere un deambular sin rumbo o una distracción errante. «El vagar» conserva la metáfora del movimiento mental o moral inestable.
- source_word: ἐπιθυμίας
  english_pob_choice: desire
  chosen_spanish: del deseo
  alternatives_spanish:
  - de la codicia
  - de la concupiscencia
  - de la pasión
  lexicon: LSJ
  rationale: El término puede ser neutral o negativo según el contexto; aquí es claramente dañino. «Deseo» sigue siendo lo bastante amplio para reflejar el griego, y el contexto le da su sentido negativo.
- source_word: μεταλλεύει
  english_pob_choice: corrupts
  chosen_spanish: corrompe
  alternatives_spanish:
  - cambia
  - pervierte
  - deforma
  lexicon: LSJ
  rationale: El verbo señala un cambio hacia peor, no un mero cambio. «Corrompe» expresa con claridad el daño moral hecho al entendimiento.
- source_word: νοῦν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - razón
  - pensamiento
  lexicon: LSJ
  rationale: νοῦς designa la facultad de comprender y discernir moralmente. «Mente» es el equivalente más natural y amplio en español.
- source_word: ἄκακον
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - sin malicia
  - ingenua
  - inofensiva
  lexicon: LSJ
  rationale: El adjetivo indica ausencia de malicia o engaño. «Inocente» es claro, idiomático y adecuado para la advertencia del versículo.
theological_decisions:
- issue: Fuerza moral y perceptiva de τὰ καλά
  english_pob_reading: Rendered broadly as 'what is good' rather than specifically 'beautiful things.'
  chosen_spanish_reading: Se traduce como «lo bueno» y no como una referencia exclusiva a «lo bello».
  alternative_spanish_readings:
  - lo bello
  - las cosas buenas
  - lo noble
  rationale: El versículo trata de cómo el mal oscurece la percepción moral. Una traducción amplia preserva el alcance ético del texto y no elimina el posible matiz de belleza o nobleza.
  doctrine_reference: Translation philosophy §1, §6
- issue: Alcance de βασκανία
  english_pob_reading: Rendered as 'bewitchment' to preserve the sense of malign moral influence.
  chosen_spanish_reading: Se rinde como «embrujo» para conservar la idea de una influencia moral dañina.
  alternative_spanish_readings:
  - envidia
  - mal de ojo
  rationale: El contexto no sugiere solo un sentimiento interno, sino una fuerza corruptora que distorsiona la percepción. «Embrujo» preserva mejor ese valor figurado y personificado.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el estado final indica concordancia alta y sin modificaciones adicionales. Se mantuvo esa lectura, ajustando solo el español para una formulación publicable y fiel al griego.'
  spanish_consistency_notes:
  - Se preservó la distinción entre el poder corruptor de βασκανία y el efecto resultante de ἀμαυροῖ en un verbo español de oscurecimiento.
  - «lo bueno» mantiene la amplitud semántica de τὰ καλά sin cerrar el texto a un solo matiz.
  - «mente inocente» refleja el valor de ἄκακον como ausencia de malicia, no solo ingenuidad.
  - Se evitó un calco rígido de la sintaxis griega para lograr un español natural sin perder las imágenes de oscuridad y vagar.
