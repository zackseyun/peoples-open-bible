translation:
  language: es
  text: En el vigésimo año de Jeroboam, rey de Israel, Asa comenzó a reinar sobre Judá[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Asa comenzó a reinar como rey de Judá».'
    reason: lexical_alternative
  - marker: b
