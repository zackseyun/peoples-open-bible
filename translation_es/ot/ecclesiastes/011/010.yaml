translation:
  language: es
  text: Por eso, aparta la irritación[a] de tu corazón, y aleja[b] el mal de tu carne, porque la juventud y la aurora de la vida[c] son vapor[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vexación», «enojo» o «tristeza» para כַּעַס.
    reason: lexical_alternative
  - marker: b
    text: O «mal», «daño», «dolor» o «maldad» para רָעָה.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «la aurora de la vida»; el término raro también puede entenderse como «la flor de la juventud» o «la juventud de cabello negro».'
    reason: lexical_alternative
  - marker: d
    text: O «vanidad» o «aliento» para «vapor»; Eclesiastés usa esta palabra para lo pasajero e insustancial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָסֵר
  english_pob_choice: remove
  chosen_spanish: aparta
  alternatives_spanish:
  - quita
  - remueve
  - aleja
  lexicon: HALOT
  rationale: El imperativo hiphil pide una acción deliberada de quitar o apartar. «Aparta» suena natural en español y conserva la fuerza exhortativa sin perder el matiz de separación activa.
- source_word: כַּעַס
  english_pob_choice: vexation
  chosen_spanish: irritación
  alternatives_spanish:
  - vexación
  - enojo
  - tristeza
  lexicon: HALOT
  rationale: El término puede abarcar irritación interna, enojo o aflicción. Como va «de tu corazón», «irritación» comunica bien el desasosiego interior sin reducirlo solo a ira externa.
- source_word: מִלִּבֶּךָ
  english_pob_choice: from your heart
  chosen_spanish: de tu corazón
  alternatives_spanish:
  - de tu mente
  lexicon: HALOT
  rationale: לֵב designa el centro interior de la persona, con pensamiento y afecto. «Corazón» es la equivalencia clara y estándar en español.
- source_word: וְהַעֲבֵר
  english_pob_choice: put away
  chosen_spanish: aleja
  alternatives_spanish:
  - aparta
  - quita
  - haz pasar
  lexicon: HALOT
  rationale: El hiphil de עבר implica hacer que algo se vaya o pase lejos. «Aleja» mantiene la idea de expulsar o retirar de manera idiomática en español.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - mal
  - daño
  - dolor
  - maldad
  lexicon: HALOT
  rationale: Aunque puede referirse a daño o aflicción, la formulación bíblica permite también el sentido moral general. «El mal» conserva esa amplitud y refleja mejor el registro del hebreo que una restricción excesivamente física.
- source_word: מִבְּשָׂרֶךָ
  english_pob_choice: from your flesh
  chosen_spanish: de tu carne
  alternatives_spanish:
  - de tu cuerpo
  lexicon: HALOT
  rationale: בָּשָׂר se traduce literalmente como «carne». En español bíblico, «carne» preserva la imagen concreta y la tensión del texto sin reinterpretarla como mera corporeidad abstracta.
- source_word: הַיַּלְדוּת
  english_pob_choice: youth
  chosen_spanish: la juventud
  alternatives_spanish:
  - la niñez
  - la mocedad
  lexicon: HALOT
  rationale: El sustantivo designa la etapa de ser joven. «Juventud» es la forma más natural y amplia en español.
- source_word: וְהַשַּׁחֲרוּת
  english_pob_choice: the dawn of life
  chosen_spanish: la aurora de la vida
  alternatives_spanish:
  - el alba de la vida
  - el primor de la juventud
  - la flor de la juventud
  lexicon: HALOT
  rationale: La expresión rara sugiere un comienzo temprano, como el amanecer. «Aurora de la vida» conserva la imagen y deja abierta la ambigüedad del término hebreo, tal como el audit trail inglés evita fijar en exceso el sentido.
- source_word: הָבֶל
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vanidad
  - aliento
  - brevedad
  lexicon: HALOT
  rationale: En Eclesiastés, הבל funciona como metáfora de lo transitorio e insustancial. «Vapor» mantiene esa concreción imagética y evita cargar el término con un sentido meramente moralista.
theological_decisions:
- issue: Valor de הבל en Eclesiastés
  english_pob_reading: vapor
  chosen_spanish_reading: vapor
  alternative_spanish_readings:
  - vanidad
  - aliento
  - fugacidad
  rationale: Se preserva la metáfora concreta de lo efímero e intangible, en línea con la filosofía de equivalencia óptima y con el testimonio del hebreo. Esto evita resolver demasiado pronto la tensión temática de Eclesiastés.
  doctrine_reference: Principio de primacía de la fuente original y preservación de tensiones literarias y teológicas del texto.
translation_notes:
  revision_awareness: El auditrace inglés fue revisado desde «harm» a «evil» para רָעָה; la versión española refleja esa actualización con «el mal», manteniendo a la vez la amplitud semántica que permite el hebreo. También se conservó la imagen concreta de הבל como «vapor» frente a alternativas tradicionales más interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Carne» se usa literalmente para בָּשָׂר, sin desplazar el sentido a «cuerpo».
  - «Juventud» y «aurora de la vida» conservan la doble imaginería temporal del hebreo sin añadir explicación exegética al texto principal.
  - La puntuación y el orden siguen un español natural de estilo bíblico, sin perder la estructura imperativa y causal del hebreo.
