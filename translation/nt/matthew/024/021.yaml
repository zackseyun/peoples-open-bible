id: MAT.24.21
reference: Matthew 24:21
source:
  edition: SBLGNT
  text: ἔσται γὰρ τότε θλῖψις μεγάλη οἵα οὐ γέγονεν ἀπ’ ἀρχῆς κόσμου ἕως τοῦ νῦν οὐδ’ οὐ μὴ γένηται.
translation:
  text: For then there will be great tribulation[a], such as has not happened from the beginning of the world until now, and never will happen again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great distress' or 'great affliction.' The Greek word can denote severe trouble, pressure, or oppression.
    reason: lexical_alternative
lexical_decisions:
- source_word: θλῖψις μεγάλη
  chosen: great tribulation
  alternatives:
  - great distress
  - great affliction
  lexicon: BDAG
  rationale: θλῖψις denotes severe trouble, oppression, or distress. 'Tribulation' preserves the weight and traditional eschatological resonance of the term while remaining intelligible in modern English; 'great' straightforwardly renders μεγάλη.
- source_word: οἵα
  chosen: such as
  alternatives:
  - the kind that
  - such a one as
  lexicon: BDAG
  rationale: The relative qualitative pronoun introduces a comparison of unprecedented severity. 'Such as' is idiomatic English that preserves the comparative force.
- source_word: γέγονεν
  chosen: has not happened
  alternatives:
  - has not been
  - has not occurred
  lexicon: BDAG
  rationale: Perfect of γίνομαι here refers to an event coming to pass up to the present point. 'Has not happened' is natural English and fits the eventive sense better than the more wooden 'has not been.'
- source_word: ἀπ’ ἀρχῆς κόσμου
  chosen: from the beginning of the world
  alternatives:
  - from the beginning of the creation
  - since the world's beginning
  lexicon: BDAG
  rationale: κόσμος commonly means 'world' here, and the phrase is an idiomatic temporal expression. 'Beginning of the world' is clear and faithful, though 'creation' is a possible contextual expansion not explicit in the Greek.
- source_word: ἕως τοῦ νῦν
  chosen: until now
  alternatives:
  - until the present time
  lexicon: BDAG
  rationale: A standard temporal phrase; 'until now' is concise and natural.
- source_word: οὐδ’ οὐ μὴ γένηται
  chosen: and never will happen again
  alternatives:
  - nor will it ever happen
  - and it certainly will not happen
  lexicon: BDAG
  rationale: The combination οὐ μή with the aorist subjunctive is an emphatic future negation. 'Never will happen again' captures both the strong denial and the implied comparison with what has just been described.
- source_word: γὰρ τότε
  chosen: For then
  alternatives:
  - Because then
  - At that time
  lexicon: BDAG
  rationale: γάρ gives explanatory force linking this verse to the preceding warning, and τότε marks the time. 'For then' preserves both compactly.
- source_word: ἔσται
  chosen: there will be
  alternatives:
  - it will be
  lexicon: BDAG
  rationale: With θλῖψις as the subject, English idiom prefers existential 'there will be' rather than the less natural 'it will be'.
