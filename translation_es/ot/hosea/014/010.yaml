translation:
  language: es
  text: ¿Quién es sabio? Que entienda estas cosas. ¿Quién es entendido? Que las conozca. Porque los caminos de Yahvé son rectos[a], y los justos caminan en ellos, pero los transgresores[b] tropiezan en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «derechos» para «rectos».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «rebeldes» para «transgresores».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי חָכָם
  english_pob_choice: Who is wise?
  chosen_spanish: ¿Quién es sabio?
  alternatives_spanish:
  - ¿Quién es un sabio?
  - ¿Quién tiene sabiduría?
  lexicon: HALOT
  rationale: Conservo la pregunta retórica y el valor adjetival de חָכָם; en español, ‘¿Quién es sabio?’ suena natural y fiel, sin convertirla en una afirmación o en una perífrasis más interpretativa.
- source_word: וְיָבֵן אֵלֶּה
  english_pob_choice: Let him understand these things
  chosen_spanish: Que entienda estas cosas
  alternatives_spanish:
  - Que comprenda estas cosas
  - Y que entienda esto
  lexicon: HALOT
  rationale: El imperfecto exhortativo se vierte de forma natural con ‘Que…’ en español. ‘Estas cosas’ conserva el referente amplio al mensaje previo, como en el contexto inglés; ‘comprenda’ sería válido pero menos directo para el paralelo sapiencial.
- source_word: נָבוֹן
  english_pob_choice: discerning
  chosen_spanish: prudente
  alternatives_spanish:
  - entendido
  - discreto
  - discerniente
  lexicon: HALOT
  rationale: ‘Prudente’ comunica bien la capacidad de discernimiento en español y evita la repetición con ‘entienda’. Aunque ‘entendido’ es posible, suena menos preciso aquí; ‘prudente’ mantiene la cualidad de percepción reflexiva.
- source_word: וְיֵדָעֵם
  english_pob_choice: Let him know them
  chosen_spanish: Que las conozca
  alternatives_spanish:
  - Que las sepa
  - Que las reconozca
  lexicon: HALOT
  rationale: El sufijo plural remite a los elementos precedentes. ‘Conozca’ funciona mejor en español que un simple ‘sepa’, porque mantiene el alcance relacional y práctico de ידע; ‘las’ preserva el plural referido por el hebreo.
- source_word: יְשָׁרִים
  english_pob_choice: straight
  chosen_spanish: rectos
  alternatives_spanish:
  - derechos
  - llanos
  - upright
  lexicon: HALOT
  rationale: En español, ‘rectos’ suena más natural que un calco de ‘straight’ y conserva tanto la idea moral como la imagen de dirección correcta. ‘Derechos’ también es posible, pero aquí ‘rectos’ resulta más solemne y bíblico sin perder claridad.
- source_word: דַּרְכֵי יְהוָה
  english_pob_choice: the ways of Yahweh
  chosen_spanish: los caminos de Yahvé
  alternatives_spanish:
  - las sendas de Yahvé
  - los caminos del SEÑOR
  lexicon: HALOT
  rationale: ‘Caminos’ mantiene la metáfora de conducta y dirección. Se usa ‘Yahvé’ según el criterio del proyecto para יְהוָה, en lugar de sustituir el nombre por una forma tradicional de título.
- source_word: וְצַדִּקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: HALOT
  rationale: ‘Los justos’ es la forma más estable y transparente en español para el sustantivo adjetival. Aunque ‘los rectos’ podría reflejar mejor el paralelismo con ‘rectos’, aquí ‘justos’ mantiene el léxico bíblico habitual sin perder el sentido forense y moral.
- source_word: יֵלְכוּ בָם
  english_pob_choice: walk in them
  chosen_spanish: caminarán en ellos
  alternatives_spanish:
  - andarán en ellos
  - vivirán según ellos
  lexicon: HALOT
  rationale: ‘Caminarán’ conserva la imagen de conducta habitual y evita una abstracción excesiva. ‘En ellos’ reproduce el hebreo y deja claro que los caminos son el ámbito en que se mueve la conducta recta.
- source_word: וּפֹשְׁעִים
  english_pob_choice: transgressors
  chosen_spanish: los transgresores
  alternatives_spanish:
  - los rebeldes
  - los prevaricadores
  - los que se rebelan
  lexicon: HALOT
  rationale: ‘Transgresores’ refleja la infracción voluntaria de פשׁע y mantiene el tono covenantal. ‘Rebeldes’ es una alternativa válida, pero el proyecto inglés eligió ‘transgressors’ para conservar la fuerza jurídica y ética.
- source_word: יִכָּשְׁלוּ בָם
  english_pob_choice: stumble in them
  chosen_spanish: tropezarán en ellos
  alternatives_spanish:
  - se volverán a tropezar con ellos
  - caerán en ellos
  lexicon: HALOT
  rationale: ‘Tropezarán’ reproduce bien כשל y conserva el contraste con ‘caminarán’. ‘En ellos’ mantiene la misma referencia a los caminos de Yahvé, mostrando que lo que guía a unos causa caída a otros.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo contiene explícitamente el Tetragrámaton. Conforme al criterio del proyecto en español, se usa ‘Yahvé’, que preserva el nombre propio del pacto en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Generic masculine rhetorical form in the opening questions
  english_pob_reading: Who is wise? Let him understand... Who is discerning? Let him know...
  chosen_spanish_reading: ¿Quién es sabio? Que entienda... ¿Quién es prudente? Que las conozca...
  alternative_spanish_readings:
  - ¿Quién es sabio? Que esa persona entienda...
  - Quien sea sabio, que entienda...
  rationale: Se conserva la forma interrogativa-retórica y el singular genérico del hebreo sin forzar una reescritura inclusiva que diluya el paralelismo. En español, ‘Que…’ expresa naturalmente la exhortación implícita.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Moral description of יְשָׁרִים דַּרְכֵי יְהוָה
  english_pob_reading: the ways of Yahweh are straight
  chosen_spanish_reading: rectos son los caminos de Yahvé
  alternative_spanish_readings:
  - los caminos de Yahvé son rectos
  - los caminos de Yahvé son derechos
  rationale: Se conserva la imagen de camino y la valoración moral, con una inversión natural en español que da énfasis a ‘rectos’. ‘Derechos’ sería posible, pero ‘rectos’ es más idiomático y mantiene la resonancia ética del texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: moral/path imagery'
translation_notes:
  revision_awareness: 'El texto sigue de cerca la última revisión inglesa, que no introdujo cambios sustantivos. Se mantiene el mismo reparto semántico: pregunta sapiencial doble, paralelismo con ‘conocer/entender’, metáfora de camino, y contraste entre justos y transgresores. La única adaptación relevante es la terminología española del nombre divino (‘Yahvé’) conforme al estándar del proyecto.'
  spanish_consistency_notes:
  - Se preservó la repetición de ‘ellos’ para mantener el vínculo con ‘estas cosas’ y con ‘los caminos’.
  - Se evitó ‘SEÑOR’ para יְהוָה conforme al criterio del proyecto; se usó ‘Yahvé’.
  - ‘Justos’ y ‘transgresores’ mantienen el contraste moral/legal del hebreo sin suavizarlo.
  - La estructura interrogativa + exhortación se mantuvo para reflejar el tono sapiencial del verso.
