    issue: הָרָעָב fue traducido como 'el hambre'
    rationale: En este contexto profético רָעָב denota hambruna/famine, no sólo la sensación de hambre. 'La hambruna' preserva mejor el juicio histórico y se alinea con la decisión inglesa documentada.
  - severity: high
    issue: יִדְבַּק אַחֲרֵיכֶם fue traducido como 'se les pegará atrás'
    rationale: La frase no es idiomática en español neutral y debilita la imagen de persecución ineludible. Debe reemplazarse por una formulación natural como 'los seguirá de cerca', conservando en nota el literal 'se pegará detrás de ustedes'.
  - severity: low
    issue: La nota a sobre דֹּאֲגִים podría formularse con más precisión
    rationale: '''Se preocupan por'' es correcta, pero ''les preocupa'' o ''están ansiosos por'' suena más natural. No es un problema grave porque la nota ya comunica la alternativa léxica.'
