translation:
  language: es
  text: Todo el día codicia con avidez[a], pero el justo da y no escatima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La construcción hebrea usa un verbo con un sustantivo cognado para intensificar la acción; por eso se traduce de forma adverbial («con avidez») en lugar de repetir literalmente «codicia codicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַיּוֹם
  english_pob_choice: All day long
  chosen_spanish: Todo el día
  alternatives_spanish:
  - A lo largo de todo el día
  - Todo el tiempo
  lexicon: HALOT
  rationale: Expresa la locución temporal idiomática sin volverla rígida ni arcaica, y conserva el sentido durativo del hebreo.
- source_word: הִתְאַוָּה תַאֲוָה
  english_pob_choice: he craves greedily
  chosen_spanish: codicia con avidez
  alternatives_spanish:
  - anhela con avidez
  - codicia, codicia
  - sigue codiciando
  lexicon: HALOT
  rationale: El hebreo usa verbo + sustantivo cognado para intensificación. En español, «codicia con avidez» comunica esa intensidad de modo natural y mantiene la fuerza volitiva/ansiosa sin suavizarla demasiado.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el hombre justo
  lexicon: HALOT
  rationale: «Justo» conserva el valor sustantivado y proverbial del hebreo en español bíblico actual. Se evita añadir «hombre» porque no está explícito en el texto fuente.
- source_word: יִתֵּן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - da generosamente
  - sigue dando
  lexicon: HALOT
  rationale: El imperfecto expresa acción habitual/proverbial. «Da» es breve, natural y suficientemente literal para el paralelismo antitético.
- source_word: לֹא יַחְשֹׂךְ
  english_pob_choice: does not hold back
  chosen_spanish: no escatima
  alternatives_spanish:
  - no retiene
  - no se contiene
  - no se abstiene de dar
  lexicon: HALOT
  rationale: El verbo significa retener o guardar para sí. «No escatima» es un equivalente idiomático claro en español para la idea de no reservar ni limitar lo que se da.
theological_decisions:
- issue: Singular representativo de «el justo»
  english_pob_reading: the righteous as a masculine singular representative proverbially describing a righteous person generally
  chosen_spanish_reading: el justo funciona como singular representativo y proverbial
  alternative_spanish_readings:
  - los justos
  - una persona justa
  - el hombre justo
  rationale: El hebreo usa un adjetivo masculino singular sustantivado. En español, «el justo» conserva la forma proverbial y la referencia general sin forzar una pluralización ni introducir un sustantivo no explícito.
  doctrine_reference: Gramática del hebreo bíblico; uso proverbial del singular representativo
translation_notes:
  revision_awareness: La versión inglesa revisada abandonó la repetición literal «craves craving» por una solución adverbial más natural («craves greedily») y eliminó «man» por no estar explícito. La presente versión española sigue esa línea, pero conserva la intensidad del hebreo mediante una expresión idiomática natural y mantiene «el justo» como singular representativo sin añadir «hombre».
  spanish_consistency_notes:
  - Se mantiene «justo» para צַדִּיק, coherente con el valor sustantivado del término y con el registro proverbial.
  - Se evita «escatima» como simple sinónimo ornamental; se usa porque refleja el sentido de no retener o reservar.
  - «Con avidez» funciona como equivalente funcional de la intensificación hebrea y evita perder el valor enfático del verbo + cognado.
