translation:
  language: es
  text: 'Cuestiona a un amigo[a]: quizá no lo dijo; y si lo dijo, para que no lo repita.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «reprende a un amigo». El imperativo griego puede tener sentido investigativo («cuestiona/examina») o correctivo («reprende»). La cláusula siguiente favorece primero verificar el asunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγξον
  english_pob_choice: Reprove
  chosen_spanish: Corrige
  alternatives_spanish:
  - Reprende
  - Corrige con franqueza
  - Reprocha
  lexicon: LSJ
  rationale: El imperativo puede abarcar la idea de rebatir, poner a prueba o reprender. Dado que el contexto inmediato busca verificar el dicho antes de condenar, «corrige» conserva la fuerza correctiva sin sonar excesivamente judicial, y funciona bien en español bíblico actual.
- source_word: τὸν φίλον
  english_pob_choice: a friend
  chosen_spanish: a un amigo
  alternatives_spanish:
  - a un amigo tuyo
  - al amigo
  lexicon: LSJ
  rationale: El artículo griego tiene valor proverbial/general. «A un amigo» es natural en español y mantiene el sentido de relación cercana sin introducir una posesión no expresada.
- source_word: μή ποτε
  english_pob_choice: lest perhaps
  chosen_spanish: no sea que quizá
  alternatives_spanish:
  - quizá
  - no vaya a ser que
  lexicon: LSJ
  rationale: 'La partícula expresa una posibilidad cautelar: puede que la acusación no sea cierta. «No sea que quizá» conserva el matiz de advertencia y la incertidumbre del original mejor que una simple «quizá».'
- source_word: οὐκ εἶπεν
  english_pob_choice: he did not say it
  chosen_spanish: no lo haya dicho
  alternatives_spanish:
  - no lo dijo
  - no lo hubiera dicho
  lexicon: LSJ
  rationale: En español, el subjuntivo encaja mejor dentro de la cautela introducida por μή ποτε. «No lo haya dicho» expresa con claridad la posibilidad de que el reporte sea falso, sin añadir contenido ajeno.
- source_word: εἰ εἴρηκεν
  english_pob_choice: if he did say it
  chosen_spanish: si sí lo dijo
  alternatives_spanish:
  - si lo dijo
  - si lo ha dicho
  lexicon: LSJ
  rationale: Se mantiene la contraposición del griego entre no haberlo dicho / haberlo dicho. «Si sí lo dijo» refleja esa confirmación condicional de forma idiomática en español y evita ambigüedad sobre el contenido implícito.
- source_word: ἵνα μὴ δευτερώσῃ
  english_pob_choice: so that he may not repeat it
  chosen_spanish: para que no lo repita
  alternatives_spanish:
  - para que no lo diga otra vez
  - para que no lo haga de nuevo
  lexicon: LSJ
  rationale: δευτερόω aquí se refiere a repetir lo dicho. «Para que no lo repita» es la forma más natural y fiel en español, conservando el valor final del propósito sin sobretraducir.
translation_notes:
  revision_awareness: El borrador sigue el ajuste más reciente del audit trail, que prefirió una lectura correctiva de Ἔλεγξον sobre la meramente interrogativa, y conserva el giro cautelar de μή ποτε y el propósito final de ἵνα μὴ δευτερώσῃ en un español fluido y reverente al original.
  spanish_consistency_notes:
  - Se usa «amigo» en sentido genérico proverbial, no como vocativo afectivo ampliado.
  - Se preserva la tensión entre verificar y reprender mediante la nota de pie, en vez de resolverla por completo en el texto principal.
  - «No sea que quizá» procura mantener el doble matiz de cautela e incertidumbre del griego.
  - No se introduce terminología eclesiástica técnica que el verso no exige.
