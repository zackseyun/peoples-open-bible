  text: Ἤδη κεκορεσμένοι ἐστέ, ἤδη ἐπλουτήσατε, χωρὶς ἡμῶν ἐβασιλεύσατε· καὶ ὄφελόν γε ἐβασιλεύσατε, ἵνα καὶ ἡμεῖς ὑμῖν συμβασιλεύσωμεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/008.yaml
  text: Already you have had your fill[a]; already you have become rich; apart from us you have become kings. And I wish indeed that you had become kings[c][b], so that we also might reign with you.
  footnotes:
  - marker: a
    text: 'Or ''without us.'''
    reason: lexical_alternative
  - marker: b
    text: 'Paul speaks ironically: the Corinthians act as though they are already fully satisfied, rich, and reigning.'
    reason: cultural_note
  - marker: c
    text: 'Or ''Would that indeed you had reigned,'' preserving the wish more formally.'
    reason: lexical_alternative
translation:
  language: ko
  text: '여러분은 이미 배부르고, 이미 부유해졌으며, 우리 없이 왕이 되었습니다! 정말이지 여러분이 왕이 되었더라면 좋겠습니다. 그러면 우리도 여러분과 함께 다스릴 수 있을 것입니다.'
  philosophy: optimal-equivalence
