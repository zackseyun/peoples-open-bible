revisions:
- from: Por causa de esto[a], ¿no temblará la tierra y se lamentará todo el que habita en ella? Toda ella subirá como el Nilo[b]; será arrastrada y se hundirá como el Nilo de Egipto.
  to: Por causa de esto[a], ¿no temblará la tierra y se lamentará todo el que habita en ella? Toda ella subirá como el Nilo[b]; será impulsada y descenderá como el Nilo de Egipto.
  rationale: Se propone una revisión menor, no por un fallo grave del texto principal, sino para corregir una nota léxica claramente defectuosa y para afinar dos verbos del símil del Nilo hacia un español más natural y más cercano al razonamiento documentado por el POB inglés.
