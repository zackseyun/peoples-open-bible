    issue: Error sintáctico en 'Y yo te bendeciré a los que te bendigan'
    rationale: La colocación de 'te' hace que la oración sea agramatical y altera la relación verbal-objeto. El hebreo significa 'Y bendeciré a los que te bendigan', no 'te bendeciré a los que...'.
  - severity: medium
    issue: Falta la nota sobre la ambigüedad de וְנִבְרְכוּ בְךָ
    rationale: El audit trail inglés conserva explícitamente la alternativa 'se bendecirán por ti / por medio de ti serán bendecidas'. Omitirla reduce una tensión interpretativa que el proyecto decidió preservar.
