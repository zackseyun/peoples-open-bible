translation:
  language: es
  text: 'Y el pueblo me dijo[a]: «¿No nos dirás qué significan estas cosas para nosotros, puesto que las estás haciendo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «¿qué son estas cosas para nosotros, que tú estás haciendo [las]?» El hebreo pregunta por la significación de las acciones simbólicas de Ezequiel para el pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la secuencia narrativa; en español, «Y ... dijo» conserva la continuidad del relato sin sonar forzado.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El dativo directo en discurso reportado se expresa naturalmente con «me»; el matiz de dirección queda claro por el verbo de habla.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  lexicon: HALOT
  rationale: «El pueblo» reproduce bien el colectivo definido del hebreo y suena más bíblico y preciso que «la gente» en este contexto.
- source_word: הֲלֹא
  english_pob_choice: Will ... not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  lexicon: HALOT
  rationale: La partícula interrogativa con negación pide una pregunta de expectativa; en español, «¿No nos dirás...?» conserva ese valor retórico de manera natural.
- source_word: תַגִּיד
  english_pob_choice: tell
  chosen_spanish: dirás
  alternatives_spanish:
  - harás saber
  - nos dirás
  lexicon: HALOT
  rationale: En español, dentro de una pregunta directa, «decir»/«dirás» resulta más idiomático que «contar» o «declarar»; se mantiene el sentido de comunicar o explicar.
- source_word: מָה אֵלֶּה לָּנוּ
  english_pob_choice: what these things mean for us
  chosen_spanish: qué significan estas cosas para nosotros
  alternatives_spanish:
  - qué son estas cosas para nosotros
  - qué nos conciernen estas cosas
  lexicon: HALOT
  rationale: El hebreo es elíptico, literalmente «qué [son] estas cosas para nosotros». En contexto, la pregunta busca el sentido de las acciones simbólicas de Ezequiel; «qué significan» expresa bien esa fuerza sin perder la cercanía al original.
- source_word: כִּי
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - ya que
  - porque
  lexicon: HALOT
  rationale: Aquí כִּי introduce una explicación causal relacionada con las acciones de Ezequiel. «Puesto que» refleja esa causalidad de forma clara y digna en español.
- source_word: אַתָּה עֹשֶׂה
  english_pob_choice: you are doing them
  chosen_spanish: las estás haciendo
  alternatives_spanish:
  - las haces
  - estás haciendo esas cosas
  lexicon: HALOT
  rationale: El participio expresa acción en curso. En español conviene explicitar el objeto con «las» por el antecedente inmediato «estas cosas», evitando una frase opaca.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, que cambió la relación de כִּי de «that» a «since» para reflejar mejor su valor causal. En español se adoptó igualmente una causalidad explícita con «puesto que», manteniendo la lectura contextual sin perder la literalidad subyacente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto solo cuando corresponda; este versículo no contiene el Tetragrámaton.
  - Se evitó «señal» o «figuras» porque el contexto inmediato de las acciones proféticas queda mejor con «cosas» y su explicación en la nota.
  - Se conservó el registro bíblico claro y contemporáneo, sin recurrir a formas arcaizantes innecesarias.
