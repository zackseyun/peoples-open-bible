    text: Hebrew 'tongue of the Salt Sea,' a geographic expression for a tongue-shaped bay or inlet.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Dead Sea'; the Hebrew text reads 'the Salt Sea.'
    reason: alternative_reading
