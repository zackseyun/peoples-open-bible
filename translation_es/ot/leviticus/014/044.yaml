review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la sintaxis procedimental («Entonces el sacerdote vendrá y examinará») y la idea de propagación en la casa. Sin embargo, se aparta de la evidencia fuente y del rastro de auditoría inglés en dos puntos importantes: (1) צָרַעַת מַמְאֶרֶת fue revisado en inglés a «destructive mildew», pero el español lo convirtió en «una enfermedad de la casa que corroe», que se aleja innecesariamente de la referencia a una afección tipo moho/mildiu en una casa; (2) el pie [b] está anclado a «enfermedad de la casa», pero la nota explica alternativas para מַמְאֶרֶת, no para toda la frase. Además, «la llaga» para הַנֶּגַע suena más natural en piel que en una casa; «la mancha» o «la infección» funciona mejor en este contexto estructural.'
  spanish_quality_summary: 'El español es legible y digno, pero «es una enfermedad de la casa que corroe» resulta algo forzado y menos claro que una formulación más directa como «es un mildiu destructivo en la casa». «Mildiu» puede sonar técnico, pero refleja mejor el referente doméstico que «enfermedad». Para neutralidad e inteligibilidad eclesial amplia, «moho destructivo» sería más natural que «mildiu», aunque el rastro inglés usa «mildew». También conviene alinear la nota [a]: si el texto dice «examinará», la alternativa natural es «inspeccionará»; eso está bien. El cierre «es impura» es correcto por concordancia con «casa».'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. En terminología levítica, «impura» preserva bien טָמֵא. El principal desajuste está en צָרַעַת: el proyecto inglés terminó en «mildew» para este contexto de casa, mientras que el español volvió a una expresión más abstracta («enfermedad de la casa»), perdiendo precisión contextual. También הַנֶּגַע se expresa mejor como «mancha» o «infección» que «llaga» en una vivienda.'
  issues:
  - severity: high
    issue: «enfermedad de la casa» no refleja adecuadamente la revisión auditada a «destructive mildew»
    rationale: La decisión inglesa revisada especifica una afección de casa tipo moho/mildiu; el español abstractiza demasiado y pierde la referencia material del texto.
  - severity: medium
