lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις αἷς
  english_pob_choice: in the days when
  chosen_spanish: en los días en que
  alternatives_spanish:
  - durante los días en que
  - en el tiempo en que
  lexicon: LSJ
  rationale: Es una expresión temporal idiomática; «en los días en que» conserva bien la estructura griega y suena natural en español bíblico moderno.
- source_word: ἦν
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - era
  - se hallaban
  lexicon: LSJ
  rationale: Aunque el verbo griego está en singular, gobierna un sujeto compuesto; en español se expresa naturalmente en plural con «estaban».
- source_word: Γαλαάδ
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: LSJ
  rationale: Se usa la transliteración castellana habitual del topónimo bíblico.
- source_word: Γαλιλαίᾳ
  english_pob_choice: Galilee
  chosen_spanish: Galilea
  alternatives_spanish:
  - Galilea
  lexicon: LSJ
  rationale: Se conserva el nombre geográfico tradicional en español.
- source_word: κατὰ πρόσωπον Πτολεμαΐδος
  english_pob_choice: opposite Ptolemais
  chosen_spanish: frente a Ptolemaida
  alternatives_spanish:
  - opuesto a Ptolemaida
  - mirando hacia Ptolemaida
  - en frente de Ptolemaida
  lexicon: LSJ
  rationale: La frase griega es una expresión espacial; «frente a» transmite la relación geográfica sin añadir más precisión de la que da el texto.
- source_word: Πτολεμαΐδος
  english_pob_choice: Ptolemais
  chosen_spanish: Ptolemaida
  alternatives_spanish:
  - Ptolemais
  lexicon: LSJ
  rationale: Se emplea la forma castellana del nombre de la ciudad, coherente con el uso bíblico en español.
