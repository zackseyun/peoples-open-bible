translation:
  language: es
  text: 'Porque el rey de Babilonia está de pie en la madre del camino[a], a la cabeza de los dos caminos, para practicar adivinación: agita las flechas, consulta los terafines[b], examina el hígado[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «la madre del camino», un modismo para el punto de bifurcación o la encrucijada.
    reason: lexical_alternative
  - marker: b
    text: O «consulta a los dioses domésticos»; «terafines» se refiere a imágenes cultuales usadas para adivinación.
    reason: cultural_note
  - marker: c
    text: Esto es, practica adivinación examinando el hígado.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce una explicación causal o justificativa del cuadro profético; «porque» preserva bien esa relación en español.
- source_word: עָמַד
  english_pob_choice: stands
  chosen_spanish: se ha detenido
  alternatives_spanish:
  - está de pie
  - está parado
  lexicon: HALOT
  rationale: El verbo en contexto describe la posición del rey en el cruce de caminos; en español, «se ha detenido» comunica con naturalidad la escena fija sin perder la idea de estar situado allí.
- source_word: אֵם הַדֶּרֶךְ
  english_pob_choice: the mother of the road
  chosen_spanish: la madre del camino
  alternatives_spanish:
  - el cruce del camino
  - la encrucijada
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «madre» porque el hebreo usa una expresión idiomática; no se sustituye en el texto principal por «encrucijada» para no borrar la huella léxica.
- source_word: בְּרֹאשׁ שְׁנֵי הַדְּרָכִים
  english_pob_choice: at the head of the two roads
  chosen_spanish: al inicio de los dos caminos
  alternatives_spanish:
  - a la cabeza de los dos caminos
  - en la cabeza de los dos caminos
  lexicon: HALOT
  rationale: «Inicio» comunica con claridad la localización espacial y mantiene la imagen de בראשׁ sin sonar forzado en español.
- source_word: לִקְסָם קָסֶם
  english_pob_choice: to practice divination
  chosen_spanish: para practicar adivinación
  alternatives_spanish:
  - para adivinar
  - para hacer adivinación
  lexicon: HALOT
  rationale: «Adivinación» transmite el campo semántico técnico del hebreo; «practicar» conserva el carácter deliberado de la acción.
- source_word: קִלְקַל בַּחִצִּים
  english_pob_choice: he shakes the arrows
  chosen_spanish: agita las flechas
  alternatives_spanish:
  - sacude las flechas
  - lanza las flechas
  lexicon: HALOT
  rationale: «Agita» es suficientemente literal y natural para una práctica ritual de sorteo/augurio con flechas.
- source_word: שָׁאַל בַּתְּרָפִים
  english_pob_choice: he consults the teraphim
  chosen_spanish: consulta los terafines
  alternatives_spanish:
  - consulta a los terafines
  - inquiera a los terafines
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado «terafines» para no reemplazarlo por una glosa explicativa en el texto principal; el verbo «consulta» encaja con el contexto de consulta oracular.
- source_word: רָאָה בַּכָּבֵד
  english_pob_choice: he examines the liver
  chosen_spanish: examina el hígado
  alternatives_spanish:
  - mira el hígado
  - inspecciona el hígado
  lexicon: HALOT
  rationale: «Examina» expresa con claridad la hepatoscopia, práctica adivinatoria aludida por el hebreo, y mantiene la concreción del sustantivo.
theological_decisions:
- issue: Conservar explícitas las prácticas paganas de adivinación sin suavizarlas
  english_pob_reading: 'Explicitly names the divinatory acts: arrows, teraphim, liver examination.'
  chosen_spanish_reading: 'Nombra explícitamente los actos de adivinación: flechas, terafines y examen del hígado.'
  alternative_spanish_readings:
  - Resume todo como «busca presagios»
  - Generaliza como «consulta signos»
  rationale: El texto hebreo enumera prácticas concretas. Mantenerlas en español conserva el filo profético y el trasfondo histórico sin introducir una paráfrasis que diluya el detalle.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del texto inglés: se prefirió la literalidad de «mother of the road» frente a una equivalencia más idiomática, y se mantuvo la enumeración concreta de los ritos adivinatorios. El español refleja esa misma tensión entre literalidad e inteligibilidad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normal para el nombre divino, aunque este versículo no lo contiene.
  - Se conserva «terafines» como transliteración técnica coherente con la decisión inglesa de retener «teraphim».
  - «Adivinación» y «examina el hígado» preservan el carácter técnico del pasaje sin añadir explicaciones al cuerpo principal del versículo.
