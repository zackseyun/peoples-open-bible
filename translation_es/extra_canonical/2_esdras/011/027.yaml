lexical_decisions:
- source_word: uelocius quam prior non conparuit
  english_pob_choice: the second did not appear, but disappeared more quickly than the former
  chosen_spanish: la segunda no apareció, sino que desapareció más rápidamente que la primera
  alternatives_spanish:
  - la segunda no se mostró, sino que desapareció más rápidamente que la primera
  - la segunda no apareció, sino que se desvaneció más pronto que la primera
  lexicon: Latin uelocius / non conparuit
  rationale: El latín combina la ausencia de aparición con una desaparición más rápida. En español, «no apareció» conserva el valor de non conparuit y «desapareció más rápidamente» refleja uelocius quam prior sin endurecer el estilo.
- source_word: Et uidi et ecce duae quae
  english_pob_choice: And I saw, and behold, two that
  chosen_spanish: Y vi, y he aquí dos que
  alternatives_spanish:
  - Y vi, y he aquí dos que quedaban
  - Y vi, y he aquí dos
  lexicon: Latin Et uidi et ecce duae quae
  rationale: La cláusula se deja abierta porque el fragmento latino citado en el paquete fuente termina en «duae quae». No se completa el sintagma más allá de lo que el texto aportado garantiza.
theological_decisions:
- issue: Manejo del nombre divino y títulos cristológicos
  english_pob_reading: No aparece en este versículo
  chosen_spanish_reading: No aplica en este versículo
  rationale: El verso no contiene formas de יהוה, κύριος, Χριστός, Mesías ni Jesús; por tanto no se introduce terminología teológica ajena al texto.
