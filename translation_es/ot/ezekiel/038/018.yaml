translation:
  language: es
  text: Y sucederá en aquel día[a], en el día en que Gog venga contra la tierra de Israel, declara el Señor Yahvé, que mi furor se levantará en mis narices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en mis narices», donde «narices» funciona idiomáticamente para la ira; la imagen corporal se conserva aquí para no perder la fuerza del hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: Se conserva la fórmula profética futura con un verbo natural en español. «Sucederá» comunica el valor de anuncio sin sonar arcaico.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La expresión profética fija se vierte con el deíctico tradicional «aquel», que mantiene la referencia escatológica y suena natural en registro bíblico.
- source_word: בְּיוֹם בּוֹא גוֹג
  english_pob_choice: on the day when Gog comes
  chosen_spanish: en el día en que Gog venga
  alternatives_spanish:
  - el día en que Gog venga
  - cuando Gog venga
  lexicon: HALOT
  rationale: El infinitivo constructo con בְּ se expresa mejor como cláusula temporal. Se eligió «venga» para reflejar el evento venidero en estilo profético.
- source_word: עַל אַדְמַת יִשְׂרָאֵל
  english_pob_choice: against the land of Israel
  chosen_spanish: contra la tierra de Israel
  alternatives_spanish:
  - sobre la tierra de Israel
  - hacia la tierra de Israel
  lexicon: HALOT
  rationale: עַל en contexto hostil pide «contra». «Tierra» conserva el alcance territorial de אַדְמָה y funciona de modo natural en español bíblico.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - dice el Señor Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene la fórmula oracular con «declara». Para יהוה se sigue la terminología POB: «Yahvé» en vez de la sustitución reverencial «SEÑOR», y «Señor» traduce אֲדֹנָי.'
- source_word: תַּעֲלֶה
  english_pob_choice: will rise up
  chosen_spanish: se levantará
  alternatives_spanish:
  - subirá
  - se alzará
  lexicon: HALOT
  rationale: עלה aquí es metafórico e intensivo; «se levantará» conserva la imagen de ascenso interno sin forzar una calca poco natural.
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi furor
  alternatives_spanish:
  - mi ira
  - mi enojo
  lexicon: HALOT
  rationale: חֵמָה expresa ira ardiente o furor. «Furor» mantiene la intensidad judicial del término y evita suavizarlo.
- source_word: בְּאַפִּי
  english_pob_choice: in my nostrils
  chosen_spanish: en mi nariz
  alternatives_spanish:
  - en mis narices
  - en mi ira
  lexicon: HALOT
  rationale: Se conserva la imagen corporal literal del hebreo אַף, que en español puede decirse con «nariz» para no ocultar la metáfora. La lectura idiomática de ira queda implícita por el paralelismo con חֲמָתִי.
theological_decisions:
- issue: Rendering the divine name יְהוָה in the title אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Jehová
  rationale: 'Se sigue la política del proyecto: יהוה se translitera como «Yahvé». Al aparecer con אֲדֹנָי, se traduce el título como «Señor» para preservar el contraste entre el título y el nombre divino.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Concrete idiom of divine anger with nose/nostrils
  english_pob_reading: my wrath will rise up in my nostrils
  chosen_spanish_reading: mi furor se levantará en mi nariz
  alternative_spanish_readings:
  - mi ira se levantará en mis narices
  - mi furor subirá en mi ira
  rationale: 'Se mantiene la tensión entre la emoción y la imagen física del texto hebreo: no se reduce a un mero «enojo», sino que conserva «nariz» como soporte corporal de la metáfora.'
  doctrine_reference: Hebrew idiom אַף as nose/nostril and anger; see source note in English POB audit trail
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «in my anger» a «in my nostrils» para reflejar más literalmente אַף. La redacción española sigue esa revisión, manteniendo la imagen corporal con «en mi nariz» y evitando la neutralización idiomática.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con la política terminológica del proyecto para יהוה.
  - Se eligió «Señor» para אֲדֹנָי en la fórmula oracular, sin convertirlo en una sustitución reverencial total del nombre divino.
  - «Tierra de Israel» conserva el valor territorial de אַדְמָה.
  - «Furor» y la imagen de la nariz mantienen la tensión semántica entre ira y corporeidad del original.
