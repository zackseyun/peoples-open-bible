translation:
  language: es
  text: 'Así dice el rey: No permitan que Ezequías los engañe[a], porque no podrá librarlos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los desvíe’. El verbo hebreo puede significar también ‘desviar’ o ‘hacer errar’.
    reason: lexical_alternative
  - marker: b
    text: O ‘rescatarlos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה / Thus
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Esto dice
  lexicon: HALOT
  rationale: ‘Así’ conserva el tono formular y solemne de una proclamación real, sin volver la frase pesada en español.
- source_word: אָמַר הַמֶּלֶךְ / says the king
  english_pob_choice: says the king
  chosen_spanish: dice el rey
  alternatives_spanish:
  - dijo el rey
  - el rey dice
  lexicon: HALOT
  rationale: En español, el presente en fórmulas de anuncio directo suena natural y mantiene el valor proclamativo del hebreo; ‘el rey’ queda sin expandirse para respetar el texto.
- source_word: אַל / Do not
  english_pob_choice: Do not
  chosen_spanish: No permitan
  alternatives_spanish:
  - No dejen
  - No dejes
  lexicon: HALOT
  rationale: El mandato está dirigido en plural a los oyentes; ‘No permitan’ expresa bien el prohibitivo y su alcance colectivo.
- source_word: יַשִּׁא / let ... deceive
  english_pob_choice: let Hezekiah deceive you
  chosen_spanish: los engañe
  alternatives_spanish:
  - los desvíe
  - los haga errar
  lexicon: HALOT
  rationale: ‘Engañe’ es el equivalente más directo y natural para el sentido causativo de la raíz; mantiene la advertencia sin suavizar la fuerza del verbo.
- source_word: חִזְקִיָּהוּ / Hezekiah
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma castellana usual, adecuada para lectura eclesial y fiel al referente histórico.
- source_word: לֹא יוּכַל / he will not be able
  english_pob_choice: he will not be able
  chosen_spanish: no podrá
  alternatives_spanish:
  - no puede
  - no será capaz de
  lexicon: HALOT
  rationale: ‘No podrá’ conserva la idea de incapacidad futura y la relación con el motivo explicativo introducido por ‘porque’.
- source_word: לְהַצִּיל / to deliver
  english_pob_choice: to deliver
  chosen_spanish: librarlos
  alternatives_spanish:
  - rescatarlos
  - salvarlos
  lexicon: HALOT
  rationale: ‘Librar’ comunica bien la liberación de una amenaza militar; en plural con pronombre enclítico refleja adecuadamente el objeto directo del texto.
- source_word: אֶתְכֶם / you
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - los
  lexicon: HALOT
  rationale: El destinatario plural masculino se expresa de forma natural en español como ‘los’, manteniendo el referente colectivo.
theological_decisions:
- issue: Referente de ‘el rey’
  english_pob_reading: the phrase is rendered generically as 'the king' in the speech formula, referring contextually to the Assyrian king rather than specifying his name in translation
  chosen_spanish_reading: ‘el rey’ se conserva sin nombrarlo, como fórmula de habla que remite contextualmenta al rey asirio
  alternative_spanish_readings:
  - ‘Senaquerib’
  - ‘el gran rey’
  rationale: El hebreo dice simplemente ‘el rey’; nombrarlo introduciría información que no está en esta cláusula. Mantener la forma genérica respeta el alcance inmediato del texto y deja que el contexto narrativo identifique al hablante.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de יַשִּׁא / engaño frente a desvío
  english_pob_reading: Or 'mislead you.' The Hebrew verb can mean to lead astray or deceive.
  chosen_spanish_reading: ‘engañe’ connota el sentido principal, dejando abierta la posibilidad de ‘desviar’ sin imponerlo en el texto principal
  alternative_spanish_readings:
  - los desvíe
  - los haga errar
  rationale: El verbo hebreo puede abarcar engañar y extraviar. En español, ‘engañe’ comunica con precisión la advertencia de Rabsaqué; otras opciones se reservan como alternativas porque en español pueden sonar más interpretativas.
  doctrine_reference: Lexical note for נשׁא in causative usage
- issue: Valor de לְהַצִּיל / librar
  english_pob_reading: Or 'rescue you.'
  chosen_spanish_reading: ‘librarlos’ expresa la liberación de peligro con tono bíblico claro y actual
  alternative_spanish_readings:
  - rescatarlos
  - salvarlos
  rationale: El campo semántico incluye rescatar/liberar de peligro. ‘Librar’ funciona bien en un contexto militar y evita una sobrecarga teológica que ‘salvar’ podría sugerir en otros contextos.
  doctrine_reference: Lexical note for הציל
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requerían cambios sustantivos; se preservó la fórmula proclamativa, el referente genérico de ‘el rey’ y el matiz lexical de ‘engañe/librarlos’.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita ‘SEÑOR’ o ‘el gran rey’ porque no aparecen en el hebreo de esta cláusula.
  - ‘Engañe’ y ‘librarlos’ conservan el tono y la fuerza semántica del texto sin caer en arcaísmos excesivos.
