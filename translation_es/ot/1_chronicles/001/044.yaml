translation:
  language: es
  text: Bela murió, y Jobab hijo de Zera de Bosra[a] reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Bosra». El prefijo hebreo puede indicar origen o asociación con la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  - falleció
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción sucesiva; en español, «murió» comunica de forma natural el hecho de la muerte sin añadir más explicación. Se omite el «y» inicial por fluidez narrativa, como en el inglés POB.
- source_word: בָּלַע
  english_pob_choice: Bela
  chosen_spanish: Bela
  alternatives_spanish:
  - Baalá
  lexicon: Nombre propio hebreo
  rationale: Es un nombre personal propio; se conserva la transliteración usada por la tradición de la POB en inglés para mantener correspondencia auditable con el hebreo.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: מלך en esta fórmula sucesoria expresa la toma del trono y su ejercicio. «Reinó» es la forma breve y estándar en español para este patrón real.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La preposición תחת con sufijo pronominal en contextos de sucesión indica reemplazo. «En su lugar» conserva esa relación de sustitución de manera natural en español.
- source_word: יוֹבָב
  english_pob_choice: Jobab
  chosen_spanish: Jobab
  alternatives_spanish:
  - Yobab
  lexicon: Nombre propio hebreo
  rationale: Nombre propio transliterado de manera consistente con la tradición editorial de la POB en inglés.
- source_word: בֶּן זֶרַח
  english_pob_choice: son of Zerah
  chosen_spanish: hijo de Zera
  alternatives_spanish:
  - hijo de Zérah
  - descendiente de Zera
  lexicon: Patronímico hebreo
  rationale: La construcción בן + nombre se rinde de forma directa como «hijo de». Se prefiere «Zera» para una transliteración sobria y legible en español.
- source_word: מִבָּצְרָה
  english_pob_choice: from Bozrah
  chosen_spanish: de Bosra
  alternatives_spanish:
  - de Bozra
  - procedente de Bosra
  lexicon: HALOT
  rationale: El prefijo מִן suele marcar origen o asociación. En español, «de Bosra» es la forma más natural y puede reflejar tanto procedencia como vinculación con la ciudad, manteniendo la misma ambigüedad controlada del inglés POB.
theological_decisions:
- issue: Valor de la preposición מִן en el topónimo final
  english_pob_reading: Or 'of Bozrah.' The Hebrew preposition can mark origin or association with the city.
  chosen_spanish_reading: «de Bosra» mantiene la ambigüedad entre procedencia y asociación con la ciudad.
  alternative_spanish_readings:
  - «desde Bosra»
  - «de Bozra»
  rationale: No hay necesidad de cerrar la relación semántica a una sola opción. Como en el inglés POB, se conserva la tensión entre origen local y pertenencia/relación con la ciudad.
  doctrine_reference: Principios de traducción lexical y semántica; preservación de ambigüedad controlada donde el hebreo no especifica más.
translation_notes:
  revision_awareness: El texto base y la auditoría inglesa muestran alta concordancia y no presentan revisiones aplicadas. La versión española sigue de cerca el sentido del hebreo y conserva la ambigüedad del topónimo final documentada en la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene un estilo breve y genealógico, acorde con el registro de sucesión del versículo.
  - Se conserva «Bosra» como forma castellana legible del topónimo, mientras la nota explica la alternativa de relación/origen.
  - No se añade material interpretativo ajeno al texto hebreo.
