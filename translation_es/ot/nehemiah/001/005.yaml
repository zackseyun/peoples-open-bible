translation:
  language: es
  text: 'Y dije[a]: «Por favor, Yahvé, Dios del cielo, el gran y temible Dios[b], que guarda el pacto y el amor fiel[c] para los que lo aman y guardan sus mandamientos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Entonces dije».
    reason: alternative_reading
  - marker: b
    text: O «el gran Dios que inspira reverente temor».
    reason: lexical_alternative
  - marker: c
    text: O «el pacto y la fidelidad amorosa» o «el pacto y la misericordia». El hebreo también puede expresar la idea de amor leal de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Así que dije
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce la oración de Nehemías; «Y dije» conserva la secuencia sin añadir matiz interpretativo.
- source_word: אָֽנָּא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Ah
  lexicon: HALOT
  rationale: Es una partícula de súplica en contexto de oración. «Por favor» transmite bien el ruego en español actual sin sonar arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma transliterada según el criterio del proyecto. «Yahvé» evita la sustitución por un título y mantiene la referencia al nombre del pacto.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  english_pob_choice: God of heaven
  chosen_spanish: Dios del cielo
  alternatives_spanish:
  - Dios de los cielos
  lexicon: HALOT
  rationale: La construcción hebrea se expresa de manera natural en español con singular idiomático «del cielo», sin perder el sentido de soberanía celestial.
- source_word: הָאֵל הַגָּדוֹל
  english_pob_choice: the great God
  chosen_spanish: el gran Dios
  alternatives_spanish:
  - el Dios grande
  - el Dios poderoso
  lexicon: HALOT
  rationale: «Gran» reproduce directamente el adjetivo hebreo. Se evita añadir una noción de poder que no está explícita en el término.
- source_word: וְהַנּוֹרָא
  english_pob_choice: awesome
  chosen_spanish: asombroso
  alternatives_spanish:
  - temible
  - sobrecogedor
  - terrible
  lexicon: HALOT
  rationale: El participio/adjetivo hebreo expresa reverente temor. «Asombroso» comunica en español moderno esa mezcla de admiración y temor, sin cargarlo con «terrible».
- source_word: שֹׁמֵר הַבְּרִית
  english_pob_choice: who keeps the covenant
  chosen_spanish: que guarda el pacto
  alternatives_spanish:
  - que conserva el pacto
  - que mantiene la alianza
  lexicon: HALOT
  rationale: «Guarda» reproduce el valor de שׁמר y «pacto» mantiene el término bíblico tradicional para בְּרִית en este contexto covenantal.
- source_word: וָחֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: la misericordia
  alternatives_spanish:
  - el amor constante
  - la fidelidad amorosa
  - la bondad leal
  lexicon: HALOT
  rationale: חֶסֶד en este marco de pacto admite varias equivalencias. Se elige «misericordia» por ser clara y litúrgicamente comprensible en español, aunque no agota el matiz de lealtad del término.
- source_word: לְאֹהֲבָיו
  english_pob_choice: for those who love him
  chosen_spanish: para los que lo aman
  alternatives_spanish:
  - a los que lo aman
  - para quienes lo aman
  lexicon: HALOT
  rationale: La preposición marca a los beneficiarios de la fidelidad divina. «Para los que lo aman» mantiene la relación personal y el paralelismo con la frase siguiente.
- source_word: וּלְשֹׁמְרֵי מִצְוֺתָיו
  english_pob_choice: and keep his commandments
  chosen_spanish: y guardan sus mandamientos
  alternatives_spanish:
  - y observan sus mandamientos
  - y cumplen sus mandamientos
  lexicon: HALOT
  rationale: Se conserva el paralelo verbal con שׁמר mediante «guardan». «Mandamientos» es la equivalencia natural de מִצְוֹת en contexto de pacto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo presenta el Tetragrama directamente. Se mantiene el nombre propio divino en español con la forma establecida por el proyecto, en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: חֶסֶד en contexto de pacto
  english_pob_reading: steadfast love
  chosen_spanish_reading: la misericordia
  alternative_spanish_readings:
  - el amor constante
  - la fidelidad amorosa
  - la bondad leal
  rationale: La combinación de pacto y חֶסֶד señala la fidelidad benevolente de Dios hacia los suyos. «Misericordia» es comprensible y reverente en español, aunque otras opciones captan mejor la dimensión de lealtad del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: הַנּוֹרָא como atributo divino
  english_pob_reading: awesome / awe-inspiring
  chosen_spanish_reading: asombroso
  alternative_spanish_readings:
  - temible
  - sobrecogedor
  rationale: El hebreo describe a Dios como digno de reverente temor. «Asombroso» conserva esa tensión entre admiración y temor sin introducir una dureza innecesaria.
  doctrine_reference: HALOT; DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el auditorio de revisión inglés: el texto inglés final eligió «awesome» por encima de «awe-inspiring» para mayor directo formal, y la nota sobre חֶסֶד mantuvo la alternativa «covenant faithfulness / lovingkindness». En español se preserva esa tensión semántica, optando por una traducción plenamente legible y dejando constancia de alternativas más cercanas al matiz del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Pacto» y «mandamientos» siguen la terminología bíblica habitual del corpus POB en español.
  - «Guardan» preserva el valor de שׁמר en paralelo con «guardas»/«keep» del original.
  - La elección de «misericordia» se marca como una opción contextual dentro del campo semántico de חֶסֶד, no como equivalencia exhaustiva.
