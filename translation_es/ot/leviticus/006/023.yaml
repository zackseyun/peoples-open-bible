  to: Pero cualquier[a] ofrenda por el pecado de cuya sangre se lleva una parte a la tienda de reunión para hacer expiación en el lugar santo no se comerá; será quemada con fuego.
  rationale: 'Se ajusta la redacción para reflejar con más fidelidad y naturalidad el hebreo y el audit trail inglés: ‘cualquier’ expresa bien el alcance legal de כָל en este contexto; ‘de cuya sangre se lleva una parte’ conserva claramente el sentido partitivo de מִן; y ‘tienda de reunión’ corresponde más directamente a אֹהֶל מוֹעֵד que ‘tabernáculo de reunión’. Se conserva la nota léxica sobre חַטָּאת.'
