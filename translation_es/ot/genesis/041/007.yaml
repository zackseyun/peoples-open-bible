translation:
  language: es
  text: Y las espigas delgadas se tragaron las siete espigas sanas[a] y llenas. Entonces Faraón despertó, y he aquí, era un sueño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las siete espigas robustas y llenas». El adjetivo traducido «sanas» también puede expresar una condición bien desarrollada o vigorosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּבְלַעְנָה
  english_pob_choice: swallowed up
  chosen_spanish: se tragaron
  alternatives_spanish:
  - tragaron
  - devoraron
  lexicon: HALOT
  rationale: בלע expresa la imagen vívida de tragar o engullir. En español, «se tragaron» comunica bien el impacto onírico y mantiene la fuerza del verbo sin añadir la violencia de «devoraron».
- source_word: הַשִּׁבֳּלִים
  english_pob_choice: ears
  chosen_spanish: espigas
  alternatives_spanish:
  - espigas de grano
  - cabezuelas de grano
  lexicon: HALOT
  rationale: El término hebreo aquí nombra la cabeza/espiga de grano, no el tallo completo. «Espigas» es natural y fiel en español bíblico contemporáneo.
- source_word: הַדַּקּוֹת
  english_pob_choice: thin
  chosen_spanish: delgadas
  alternatives_spanish:
  - finas
  - flacas
  lexicon: HALOT
  rationale: דַּק significa delgado/fino. «Delgadas» conserva la imagen visual de fragilidad sin introducir una connotación excesivamente coloquial como «flacas».
- source_word: שֶׁבַע
  english_pob_choice: seven
  chosen_spanish: siete
  lexicon: HALOT
  rationale: Cardinal directo y sin tensión de traducción.
- source_word: הַבְּרִיאוֹת
  english_pob_choice: healthy
  chosen_spanish: sanas
  alternatives_spanish:
  - robustas
  - lozanas
  lexicon: HALOT
  rationale: El adjetivo apunta a una condición buena, fuerte o sana. «Sanas» transmite esa cualidad de manera clara para una espiga, y evita trasladar un matiz animal de «gordas» o demasiado evaluativo de «plumudas».
- source_word: וְהַמְּלֵאוֹת
  english_pob_choice: and full
  chosen_spanish: y llenas
  alternatives_spanish:
  - y bien llenas
  - y repletas
  lexicon: HALOT
  rationale: מלא significa lleno. «Y llenas» es la correspondencia más directa y natural en español; mantiene el paralelismo con el hebreo sin sobreinterpretar.
- source_word: וַיִּיקַץ
  english_pob_choice: awoke
  chosen_spanish: despertó
  alternatives_spanish:
  - se despertó
  lexicon: HALOT
  rationale: Verbo narrativo estándar para el despertar de un sueño. «Despertó» suena más sobrio y literario en este contexto.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y resultó que
  - y mira
  lexicon: HALOT
  rationale: הִנֵּה marca una revelación repentina. «He aquí» conserva el valor discursivo y solemne que la POB inglesa preservó con «behold».
- source_word: חֲלוֹם
  english_pob_choice: it was a dream
  chosen_spanish: era un sueño
  alternatives_spanish:
  - resultó ser un sueño
  - era sueño
  lexicon: HALOT
  rationale: El hebreo es elíptico; en español se necesita la cópula para una frase completa. «Era un sueño» reproduce la constatación abrupta de Faraón de forma natural.
translation_notes:
  revision_awareness: La revisión auditada indica alta concordancia con el texto fuente y no requiere cambios sustantivos; la presente versión mantiene esa lectura, ajustando el español para fluidez natural sin perder la imagen onírica ni las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantiene la imaginería concreta de espigas/tragarse para no suavizar el carácter extraño del sueño.
  - «He aquí» se usa como marcador discursivo solemne, en paralelo funcional con el inglés POB «behold».
