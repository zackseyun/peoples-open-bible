translation:
  language: es
  text: ¿cuando ellos se agazapan en sus guaridas y se sientan en la maleza[a] al acecho?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el escondite» o «en el refugio» para «en la maleza». El hebreo סֻכָּה aquí designa un lugar de cobertura para emboscada, no una cabaña festiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - pues
  - porque
  - que
  lexicon: HALOT
  rationale: En esta pregunta retórica, כִּי marca la circunstancia temporal; «cuando» reproduce mejor ese valor que una causalidad o explicación en español.
- source_word: יָשֹׁחוּ
  english_pob_choice: they crouch
  chosen_spanish: se agazapan
  alternatives_spanish:
  - se inclinan
  - se encorvan
  - se agachan
  lexicon: HALOT
  rationale: El contexto de caza favorece una postura baja y sigilosa. «Agazaparse» comunica bien esa acción animal sin perder la idea de rebajarse.
- source_word: בַמְּעוֹנֹות
  english_pob_choice: in their dens
  chosen_spanish: en sus cuevas
  alternatives_spanish:
  - en sus guaridas
  - en sus madrigueras
  - en sus moradas
  lexicon: HALOT
  rationale: מְעוֹנוֹת designa lugares de habitación o refugio de animales; «cuevas» es una opción natural en español para ese hábitat, dentro del cuadro de leones y presa. Conserva el plural y el posesivo implícito.
- source_word: יֵשְׁבוּ
  english_pob_choice: sit
  chosen_spanish: se sientan
  alternatives_spanish:
  - permanecen
  - se quedan
  - se aposentan
  lexicon: HALOT
  rationale: Aquí ישׁב mantiene el valor básico de sentarse, en paralelo con el verbo anterior. El español «se sientan» conserva esa correspondencia sin forzar un idiomatismo excesivo.
- source_word: בַסֻּכָּה
  english_pob_choice: in the thicket
  chosen_spanish: en la maleza
  alternatives_spanish:
  - en el matorral
  - en la espesura
  - en el escondite
  lexicon: HALOT
  rationale: Siguiendo la nota del inglés POB, סֻכָּה aquí no es una choza festiva sino un lugar de cobertura apto para emboscada. «Maleza» transmite un ocultamiento vegetal natural en español.
- source_word: לְמוֹ אָרֶב
  english_pob_choice: for an ambush
  chosen_spanish: para una emboscada
  alternatives_spanish:
  - para acechar
  - en acecho
  - para el acecho
  lexicon: HALOT
  rationale: 'La frase expresa propósito: situarse con vistas al ataque oculto. «Para una emboscada» mantiene el sustantivo de acción y preserva la tensión de preparación para cazar.'
theological_decisions:
- issue: Sentido zoológico de סֻכָּה frente a la acepción de «cabaña/booth»
  english_pob_reading: The Hebrew סֻכָּה here refers to a place of cover suitable for ambush, not a constructed booth in the festival sense.
  chosen_spanish_reading: El hebreo סֻכָּה aquí designa un lugar de cobertura natural apto para la emboscada, no una cabaña construida en sentido festivo.
  alternative_spanish_readings:
  - cabaña
  - choza
  - booth/tienda
  rationale: La lectura debe evitar una asociación litúrgica o festiva que el contexto de Job 38:39–40 no respalda. En español, «maleza» comunica mejor el refugio natural y mantiene la imagen de caza.
  doctrine_reference: Job 38:39–40; nota léxica sobre סֻכָּה
- issue: Paralelismo entre dos acciones de ocultamiento/espera
  english_pob_reading: crouch ... and sit ... for an ambush
  chosen_spanish_reading: se agazapan ... y se sientan ... para una emboscada
  alternative_spanish_readings:
  - se encogen ... y se quedan ... en acecho
  - se agachan ... y permanecen ...
  rationale: El hebreo mantiene dos verbos distintos; conviene preservarlos en español para no borrar el paralelismo poético ni la progresión de la acción de caza.
  doctrine_reference: Poética hebrea; paralelismo sinonímico/semántico
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de «lie in wait» a «sit ... for an ambush» para reflejar con más exactitud los dos verbos hebreos. La redacción española sigue esa revisión preservando ambos movimientos: agazaparse y sentarse, con el complemento final de emboscada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se evitó «Cristo» y terminología eclesiástica no presente en el texto.
  - «Emboscada» mantiene el valor de acecho/ataque oculto y evita suavizar el lenguaje de caza.
  - Se conservó el paralelismo verbal hebreo en español para no borrar una tensión léxica documentada.
