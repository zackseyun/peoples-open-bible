  yaml_path: translation/deuterocanon/wisdom_of_solomon/019/003.yaml
  text: For while they still had their mourning in their hands and were still lamenting at the graves of the dead[a], they conceived another plan of folly, and those whom they had cast out with entreaties[c][b], these they pursued as fugitives.
