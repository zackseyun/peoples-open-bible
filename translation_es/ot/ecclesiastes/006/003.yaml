  to: Si un hombre engendra cien hijos y vive muchos años, aunque sean muchos los días de sus años, y su alma[a] no se sacia de lo bueno, y ni siquiera tiene sepultura, digo[b] que el niño nacido muerto[c] está mejor que él.
  rationale: Se corrige el anclaje de notas para que coincida con las palabras pertinentes del texto. Se reemplaza «el abortivo» por «el niño nacido muerto» para seguir la decisión principal documentada en la POB inglesa y mejorar la claridad y naturalidad del español. Se ajusta «es mejor que él» a «está mejor que él» para reflejar mejor la comparación de condición existencial implícita en el hebreo y explicitada por el inglés «better off».
