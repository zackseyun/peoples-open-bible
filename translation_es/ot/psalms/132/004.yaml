translation:
  language: es
  text: No daré sueño a mis ojos[a], ni sueño ligero a mis párpados—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Si doy sueño a mis ojos, sueño ligero a mis párpados», una fórmula de juramento con el sentido implícito de «no daré...».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: not rendered independently; expressed as an oath-like negation with 'will not'
  chosen_spanish: 'No'
  alternatives_spanish:
  - Si
  - Ciertamente
  lexicon: HALOT
  rationale: En esta fórmula juramentada, אִם introduce una elipsis de carácter enfático. En español, «No daré...» comunica de manera natural la fuerza resolutiva y negativa del hebreo sin forzar una condicional incompleta.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: daré
  alternatives_spanish:
  - dar
  - concederé
  lexicon: HALOT
  rationale: נתן conserva aquí el sentido básico de «dar». Con la negación implícita de la fórmula, «no daré» reproduce bien la imagen hebrea de otorgar sueño a los ojos.
- source_word: שְׁנַת
  english_pob_choice: sleep
  chosen_spanish: sueño
  alternatives_spanish:
  - dormir
  - sueño reparador
  lexicon: HALOT
  rationale: El sustantivo designa «sueño». «Sueño» es la equivalencia natural en español y mantiene la metáfora de dar sueño a los ojos.
- source_word: לְעֵינַי
  english_pob_choice: to my eyes
  chosen_spanish: a mis ojos
  alternatives_spanish:
  - para mis ojos
  - a mis ojos
  lexicon: HALOT
  rationale: La preposición ל funciona aquí como objeto indirecto con נתן. «A mis ojos» conserva la construcción y la imagen corporal del hebreo.
- source_word: לְעַפְעַפַּי
  english_pob_choice: to my eyelids
  chosen_spanish: a mis párpados
  alternatives_spanish:
  - para mis párpados
  - a mis párpados
  lexicon: HALOT
  rationale: עפעף se refiere a los párpados. «Párpados» mantiene el paralelismo con «ojos» y evita perder la concreción corporal del texto.
- source_word: תְּנוּמָה
  english_pob_choice: slumber
  chosen_spanish: adormecimiento
  alternatives_spanish:
  - sueño
  - somnolencia
  - adormecimiento
  lexicon: HALOT
  rationale: Se distingue de שְׁנַת («sueño») mediante una segunda palabra española que conserve la variación poética. «Adormecimiento» refleja bien un estado de somnolencia ligera y no repite exactamente el primer sustantivo.
translation_notes:
  revision_awareness: 'Coincide con el trazado auditado: se mantiene la fuerza juramentada de אִם como negación resolutiva, y se conserva el paralelismo entre «ojos» y «párpados» con dos sustantivos españoles diferenciados para שְׁנַת y תְּנוּמָה.'
  spanish_consistency_notes:
  - Se prefirió «sueño» para שְׁנַת y «adormecimiento» para תְּנוּמָה para preservar la distinción poética.
  - Se evitó «SEÑOR» o terminología ajena porque no aparece el nombre divino en este versículo.
  - La puntuación con raya final sigue el encuadre poético del verso en español.
  - La nota [a] se ancla en la cláusula completa para preservar la alternativa literal del hebreo.
