translation:
  language: es
  text: «Yahvé es mi porción», dice mi alma[a]; «por eso esperaré en él[b]».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi parte» o «mi herencia».
    reason: lexical_alternative
  - marker: b
    text: O «esperaré por él» o «esperaré con expectativa por él».
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶלְקִי
  english_pob_choice: my portion
  chosen_spanish: mi porción
  alternatives_spanish:
  - mi parte
  - mi herencia
  lexicon: HALOT
  rationale: חֵלֶק puede significar porción, parte o herencia asignada. «Mi porción» conserva el valor devocional y pactal del hebreo sin forzar un matiz legal más específico que el del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino. En español, la convención del proyecto es transliterarlo como «Yahvé», preservando el nombre del pacto y evitando la sustitución por un título.
- source_word: אָמְרָה
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfectiva, en el encuadre de discurso directo hebreo puede funcionar con valor presentativo. «Dice» comunica con naturalidad la confesión vigente del versículo.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mi ser interior
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa la interioridad personal del hablante. «Mi alma» preserva el registro poético y teológico sin desdibujar la referencia al sujeto que habla.
- source_word: עַל־כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: La expresión marca consecuencia. «Por eso» es una equivalencia natural en español y mantiene la relación lógica entre la confesión y la respuesta.
- source_word: אוֹחִיל
  english_pob_choice: I will hope
  chosen_spanish: esperaré
  alternatives_spanish:
  - tendré esperanza
  - esperaré con confianza
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar esperar con esperanza. En español, «esperaré» conserva tanto la idea de espera como la de confianza, que el contexto completa.
- source_word: לוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por él
  - para él
  lexicon: HALOT
  rationale: Con el verbo de esperar/aguardar, la preposición puede expresarse idiomáticamente como «en él» para comunicar confianza dirigida a Yahvé, tal como en la versión inglesa auditada.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo emplea el Tetragrámaton. Siguiendo la directriz del proyecto, se conserva el nombre propio divino en forma transliterada, no una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La versión anterior fue corregida para anclar todas las notas a marcas visibles en el texto: [a] acompaña la primera cláusula y [b] la segunda. Se mantuvo la lectura fuente-centrada de la confidencia poética y la decisión terminológica sobre Yahvé.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el Tetragrámaton, conforme a la terminología del proyecto.
  - «Mi alma» conserva el registro poético de נַפְשִׁי sin convertirlo en paráfrasis antropológica.
  - «Esperaré en él» expresa la confianza del hebreo y permite la alternativa de espera/aguardo en la nota.
  - Se usó puntuación española con comillas angulares para el discurso directo.
  - Las dos notas están ancladas exactamente en el texto con [a] y [b].
