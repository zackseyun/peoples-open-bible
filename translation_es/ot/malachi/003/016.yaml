translation:
  language: es
  text: Entonces los que temían a Yahvé hablaron unos con otros[a], y Yahvé prestó atención y oyó; y fue escrito ante él un libro de recuerdo para los que temen a Yahvé y para los que estiman[b] su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «un hombre con su compañero». El hebreo usa un modismo recíproco que significa que hablaron unos con otros.
    reason: lexical_alternative
  - marker: b
    text: O «piensan en su nombre» / «consideran su nombre».
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  lexicon: HALOT
  rationale: El adverbio temporal introduce la respuesta de los fieles al contexto previo. «Entonces» es la opción más natural y formal en español, y conserva la secuencia narrativa.
- source_word: נִדְבְּרוּ
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - hablaron entre sí
  - conversaron
  lexicon: HALOT
  rationale: El nifal plural aquí tiene sentido recíproco. «Hablaron unos con otros» expresa bien la reciprocidad idiomática sin perder naturalidad en español.
- source_word: יִרְאֵי יְהוָה
  english_pob_choice: those who feared Yahweh
  chosen_spanish: los que temían a Yahvé
  alternatives_spanish:
  - los que reverenciaban a Yahvé
  - los temerosos de Yahvé
  lexicon: HALOT
  rationale: 'Conviene mantener «temían» para conservar la fuerza bíblica de ירא: temor reverente y lealtad de pacto, no solo respeto suave.'
- source_word: אִישׁ אֶת רֵעֵהוּ
  english_pob_choice: with one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - cada uno con su prójimo
  - un hombre con su compañero
  lexicon: HALOT
  rationale: El hebreo es idiomático y distributivo. «Unos con otros» reproduce el sentido recíproco en español sin calco incómodo.
- source_word: וַיַּקְשֵׁב
  english_pob_choice: paid attention
  chosen_spanish: prestó atención
  alternatives_spanish:
  - escuchó atentamente
  - dio oído
  lexicon: HALOT
  rationale: La forma expresa escucha atenta, más intensa que solo oír. «Prestó atención» distingue bien esta idea de la siguiente acción.
- source_word: וַיִּשְׁמָע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - oyó sus palabras
  lexicon: HALOT
  rationale: Después de «prestó atención», el verbo simple comunica el par hebreo de atención + audición. «Oyó» es directo y fiel.
- source_word: וַיִּכָּתֵב
  english_pob_choice: was written
  chosen_spanish: fue escrito
  alternatives_spanish:
  - quedó escrito
  - se escribió
  lexicon: HALOT
  rationale: La pasiva del nifal se refleja naturalmente con «fue escrito», que preserva el hecho de que el registro llegó a existir.
- source_word: סֵפֶר זִכָּרוֹן
  english_pob_choice: a book of remembrance
  chosen_spanish: un libro de memoria
  alternatives_spanish:
  - un libro de recordación
  - un memorial
  lexicon: HALOT
  rationale: «Libro de memoria» sigue de cerca el hebreo y mantiene el valor memorial/recordatorio del sustantivo sin convertirlo en una mera lista.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La expresión espacial-relacional en español suena natural como «delante de él», manteniendo la imagen de un registro presentado ante Dios.
- source_word: לְיִרְאֵי יְהוָה
  english_pob_choice: for those who fear Yahweh
  chosen_spanish: para los que temen a Yahvé
  alternatives_spanish:
  - acerca de los que temen a Yahvé
  - en favor de los que temen a Yahvé
  lexicon: HALOT
  rationale: El ל marca relación/beneficio respecto del grupo inscrito. «Para los que temen a Yahvé» conserva esa referencia de modo claro y publicable.
- source_word: וּלְחֹשְׁבֵי שְׁמוֹ
  english_pob_choice: and who esteem his name
  chosen_spanish: y para los que estiman su nombre
  alternatives_spanish:
  - y para los que piensan en su nombre
  - y para los que consideran su nombre
  lexicon: HALOT
  rationale: חשׁב con «nombre» implica valorarlo, atenderlo con estima o consideración reverente. «Estiman su nombre» conserva esa fuerza mejor que una traducción meramente cognitiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar POB en español para el Tetragrámaton: «Yahvé», conservando el nombre propio divino en lugar de una sustitución titulada.'
theological_decisions:
- issue: Temor de Yahvé
  english_pob_reading: those who feared Yahweh / those who fear Yahweh
  chosen_spanish_reading: los que temían a Yahvé / los que temen a Yahvé
  alternative_spanish_readings:
  - los que reverenciaban a Yahvé
  - los reverentes de Yahvé
  rationale: Se preserva el campo semántico de ירא con su peso bíblico de reverencia, obediencia y lealtad de pacto. «Temer» evita suavizar indebidamente la categoría teológica.
  doctrine_reference: Translation philosophy §1, §6
- issue: La expresión sobre el nombre de Dios
  english_pob_reading: who esteem his name
  chosen_spanish_reading: los que estiman su nombre
  alternative_spanish_readings:
  - los que piensan en su nombre
  - los que consideran su nombre
  rationale: La frase no describe simple recuerdo mental, sino valoración reverente del nombre divino. «Estiman» comunica mejor la carga devocional y relacional del hebreo.
  doctrine_reference: Translation philosophy §1, §6
- issue: El Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política terminológica del proyecto pide conservar el nombre divino revelado, no ocultarlo tras un título. «Yahvé» es la forma establecida en la serie española de POB.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: 'El contexto inglés POB no requirió revisiones sustantivas; la versión española sigue de cerca el texto hebreo y conserva las mismas decisiones auditadas: reciprocidad idiomática, doble verbo de escucha y la alternativa sobre la estima del nombre.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto en español.
  - Se conserva la distinción entre «prestó atención» y «oyó» para reflejar la doble acción hebrea.
  - «Libro de memoria» reproduce la imagen memorial del hebreo sin añadir interpretaciones.
  - La frase final mantiene la ambigüedad reverente de חשב con «nombre», sin reducirla a una mera actividad mental.
