translation:
  language: es
  text: Él corta el espíritu de los príncipes[a]; él es temido por los reyes de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reprime el espíritu de los príncipes»; רוּחַ también puede significar «aliento», «coraje» o «ánimo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «es impresionante para los reyes de la tierra»; es decir, inspira temor reverente.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִבְצֹר
  english_pob_choice: cuts off
  chosen_spanish: corta
  alternatives_spanish:
  - corta de raíz
  - restriñe
  - suprime
  lexicon: HALOT
  rationale: El hebreo expresa una acción decisiva sobre el רוח de los jefes; en español, «corta» comunica con naturalidad la fuerza de una intervención divina que desbarata o abate su ánimo, sin convertir el verso en una paráfrasis más amplia que el original.
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - viento
  - coraje
  - ánimo
  lexicon: HALOT
  rationale: Aquí רוּחַ tiene complemento humano («de los príncipes») y conserva su amplitud semántica. «Espíritu» mantiene la posibilidad de ánimo, valor o disposición interior sin estrechar indebidamente el término.
- source_word: נְגִידִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - gobernantes
  - líderes
  - nobles
  lexicon: HALOT
  rationale: «Príncipes» preserva el registro elevado del paralelismo poético con «reyes de la tierra» y corresponde al campo semántico de נָגִיד como jefe o gobernante distinguido.
- source_word: נוֹרָא
  english_pob_choice: is feared
  chosen_spanish: es temido
  alternatives_spanish:
  - es temible
  - es impresionante
  - inspira temor
  lexicon: HALOT
  rationale: El adjetivo/participio נוֹרָא expresa que Yahvé produce temor reverente. «Es temido» reproduce de forma directa el valor relacional del hebreo en este contexto, sin suavizarlo a «impresionante».
- source_word: לְמַלְכֵי אָרֶץ
  english_pob_choice: by the kings of the earth
  chosen_spanish: por los reyes de la tierra
  alternatives_spanish:
  - ante los reyes de la tierra
  - para los reyes de la tierra
  - entre los reyes de la tierra
  lexicon: HALOT
  rationale: 'La preposición ל con נוֹרָא se entiende relacionalmente: Yahvé es temido en relación con esos reyes. En español, «por los reyes de la tierra» hace explícito el sujeto humano que experimenta ese temor, sin alterar la relación del hebreo.'
theological_decisions:
- issue: Alcance de la acción divina sobre el רוּחַ de los gobernantes
  english_pob_reading: The verse depicts God as decisively humbling the inner spirit or pride of earthly rulers.
  chosen_spanish_reading: El versículo presenta a Dios como quien abate de manera decisiva el espíritu interior de los gobernantes de la tierra.
  alternative_spanish_readings:
  - quita la vida/aliento a los gobernantes
  - simplemente restringe su valor o ánimo
  rationale: El hebreo permite matices como aliento, coraje o disposición interior, y בצר puede sugerir cortar o disminuir. La formulación española conserva esa amplitud y evita precisar indebidamente muerte o mera emoción.
  doctrine_reference: Humillación soberana de los poderosos ante la majestad de Yahvé (cf. el tema bíblico de Dios que derriba a los soberbios).
- issue: Sentido de נוֹרָא aplicado a Yahvé
  english_pob_reading: Or 'he is awesome to the kings of the earth.'
  chosen_spanish_reading: «es temido» expresa que Yahvé inspira temor reverente a los reyes de la tierra.
  alternative_spanish_readings:
  - es impresionante
  - es temible
  - es un terror para los reyes de la tierra
  rationale: En español moderno, «impresionante» puede sonar débil; «es temido» conserva mejor la fuerza reverencial y el paralelismo con el inglés auditado, sin adoptar un giro más interpretativo que el hebreo exige.
  doctrine_reference: La majestad de Dios que suscita temor reverente en los gobernantes humanos.
translation_notes:
  revision_awareness: El inglés POB mantiene el sentido de una acción divina decisiva sobre el espíritu de los príncipes y una lectura relacional de נוֹרָא; la presente versión española sigue esa línea sin introducir cambios textuales ni ampliar el verso más allá de lo auditado. No se reportan revisiones aplicadas en el expediente fuente.
  spanish_consistency_notes:
  - Se conservó el paralelismo breve de dos miembros con punto y coma, acorde con la poesía hebrea.
  - Se usó «Yahvé» implícito en el sujeto pronominal «Él», manteniendo la coherencia con el sistema POB para el nombre divino sin sobrecargar el verso.
  - «Príncipes» y «reyes de la tierra» forman un escalonamiento de dignatarios coherente con el hebreo y con el audit trail inglés.
