review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: Aarón y sus hijos terminan de cubrir lo sagrado, luego los hijos de Coat vienen a cargar, no deben tocar lo santo, y se define su carga en la tienda de reunión. También preserva adecuadamente la nota de alternativa para הַקֹּדֶשׁ y la consecuencia de muerte. Sin embargo, hay un desajuste interno importante: el texto español dice «Estas son la carga», mientras la decisión léxica propone «Esta es la carga» y el hebreo אֵלֶּה מַשָּׂא se vierte mejor en español idiomático como singular demostrativo con predicado singular. Además, «para que no mueran» es entendible, pero «no sea que mueran» o «para que no mueran» debe evaluarse por naturalidad de advertencia; no requiere adjudicación mayor.'
  spanish_quality_summary: El español es claro y generalmente natural. «Utensilios del santuario», «se ponga en marcha» y «tienda de reunión» funcionan bien. La principal falla es gramatical/estilística en «Estas son la carga», que suena incorrecto en español. También conviene mejorar ligeramente la fuerza de advertencia con «no sea que mueran», más cercano al tono solemne y al inglés POB «lest they die», sin perder naturalidad.
  glossary_alignment: No hay términos del glosario mayor en conflicto. Se conserva «los hijos de Coat» conforme a la preferencia literal documentada. «Tienda de reunión» es coherente con אֹהֶל מוֹעֵד. «Las cosas santas» es aceptable para הַקֹּדֶשׁ en la cláusula de prohibición, aunque «las cosas sagradas» sería otra opción; no es necesario cambiarlo. No hay ocurrencias de Yahvé/Mesías/Cristo u otros términos sensibles del glosario del proyecto.
  issues:
  - severity: high
    issue: Discordancia en «Estas son la carga»
    rationale: El hebreo puede representarse formalmente con «Estas son...», pero en español con predicado singular «la carga» resulta torpe e incorrecto. La propia documentación léxica del borrador ya reconoce «Esta es la carga».
  - severity: medium
    issue: «para que no mueran» suaviza ligeramente el matiz admonitorio
    rationale: Aunque comunica bien la consecuencia, «no sea que mueran» refleja mejor el tono de advertencia solemne de וָמֵתוּ tal como lo entiende el POB inglés con «lest they die».
