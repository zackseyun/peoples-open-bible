translation:
  language: es
  text: Pero ellos, nuestros padres, actuaron con presunción y endurecieron su cerviz[a][b], y no escucharon[c] tus mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «actuaron arrogantemente» o «fueron presuntuosos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: «endurecieron su cerviz»; es decir, se volvieron tercos o rebeldes.'
    reason: cultural_note
  - marker: c
    text: O «no obedecieron» o «no hicieron caso a».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵם
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Sin embargo, ellos
  lexicon: HALOT
  rationale: El contraste adversativo del contexto se expresa de manera natural con «Pero». Se conserva el pronombre independiente «ellos» para reflejar el énfasis del hebreo.
- source_word: וַאֲבֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: HALOT
  rationale: «Padres» reproduce el término de parentesco y la solidaridad corporativa del texto. «Antepasados» es posible, pero suaviza el vínculo histórico que el lamento confiesa.
- source_word: הֵזִידוּ
  english_pob_choice: acted presumptuously
  chosen_spanish: actuaron con presunción
  alternatives_spanish:
  - actuaron arrogantemente
  - fueron presuntuosos
  - se insolentaron
  lexicon: HALOT
  rationale: La raíz expresa actuar con soberbia/presunción o insolencia. «Actuaron con presunción» conserva el juicio moral sin perder la fuerza verbal del hebreo ni caer en una paráfrasis más interpretativa.
- source_word: וַיַּקְשׁוּ אֶת עָרְפָּם
  english_pob_choice: stiffened their neck
  chosen_spanish: endurecieron su cerviz
  alternatives_spanish:
  - endurecieron su cuello
  - se pusieron tercos
  lexicon: HALOT
  rationale: La metáfora hebrea describe obstinación rebelde. «Endurecieron su cerviz» mantiene la imagen tradicional y la correspondencia lexical; «cuello» sería más claro, pero menos preciso para la fórmula idiomática.
- source_word: וְלֹא שָׁמְעוּ אֶל
  english_pob_choice: did not listen to
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no hicieron caso a
  - no obedecieron
  lexicon: HALOT
  rationale: «Escuchar» conserva el sentido básico de שׁמע con אֶל y deja que el contexto determine la desobediencia. «Obedecer» explicita el resultado, pero es más interpretativo que el hebreo inmediato.
- source_word: מִצְוֺתֶיךָ
  english_pob_choice: your commandments
  chosen_spanish: tus mandamientos
  alternatives_spanish:
  - tus órdenes
  - tus preceptos
  lexicon: HALOT
  rationale: «Mandamientos» conserva el registro legal-covenantal del término y su inteligibilidad eclesial en español. «Preceptos» es viable, pero menos directo.
theological_decisions:
- issue: Metáfora hebrea de la cerviz endurecida como imagen de rebeldía
  english_pob_reading: stiffened their neck
  chosen_spanish_reading: endurecieron su cerviz
  alternative_spanish_readings:
  - endurecieron su cuello
  - se rebelaron obstinadamente
  rationale: Se mantiene la imagen corporal porque el inglés POB también la preserva y el hebreo la usa como idiomatismo de resistencia culpable. En español, «cerviz» comunica con precisión bíblica y conserva la tensión figurativa.
  doctrine_reference: Poética bíblica e idiomatismo semítico; fidelidad formal con claridad receptiva
- issue: Identificación corporativa del pueblo con las generaciones anteriores
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: La oración confiesa la culpa de la comunidad en continuidad con la historia de Israel. Mantener «nuestros padres» refleja esa solidaridad histórica y el tono confesional del pasaje.
  doctrine_reference: Solidaridad pactual e histórica del pueblo; continuidad generacional en la confesión
- issue: Relación entre oír y obedecer en וְלֹא שָׁמְעוּ אֶל
  english_pob_reading: did not listen to
  chosen_spanish_reading: no escucharon
  alternative_spanish_readings:
  - no obedecieron
  - no hicieron caso a
  rationale: El hebreo dice literalmente «no escucharon», y esa formulación conserva la base semántica sin borrar la conexión natural con la desobediencia. La culpa queda implicada por el objeto, «tus mandamientos».
  doctrine_reference: Lexicografía verbal hebrea; obediencia como respuesta a la palabra divina
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo WLC y con la lectura inglesa auditada, sin revisiones aplicadas en el registro fuente. La versión española conserva la misma estructura y las mismas tensiones léxicas principales: presunción, metáfora de la cerviz y escuchar/obedecer.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece.
  - Se usa «mandamientos» para מִצְוֺתֶיךָ, en línea con el registro legal-covenantal.
  - Se conserva la metáfora semítica de la cerviz, sin reemplazarla por una glosa interpretativa en el texto principal.
  - «Nuestros padres» reproduce la solidaridad corporativa del hebreo y de la auditoría inglesa.
