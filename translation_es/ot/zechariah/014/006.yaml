lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y será
  lexicon: HALOT
  rationale: La fórmula profética expresa un acontecimiento futuro. «Sucederá» es natural en español y conserva el valor prospectivo sin volverlo demasiado coloquial.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: «En aquel día» es la manera más natural y fiel de mantener el marcador escatológico del hebreo.
- source_word: לֹא יִהְיֶה אוֹר
  english_pob_choice: there will be no light
  chosen_spanish: no habrá luz
  alternatives_spanish:
  - no existirá luz
  - no habrá resplandor
  lexicon: HALOT
  rationale: Reproduce una cláusula existencial negada de forma clara y directa en español, sin añadir una interpretación específica del tipo de luz.
- source_word: יְקָרוֹת
  english_pob_choice: the glorious ones
  chosen_spanish: los gloriosos
  alternatives_spanish:
  - los espléndidos
  - los preciosos
  lexicon: HALOT
  rationale: El término es difícil y puede aludir a seres/luminarias descritos por su brillantez o dignidad. «Gloriosos» mantiene el campo semántico de lo valioso/brillante sin forzar una identificación más precisa que el hebreo no asegura.
- source_word: יקפאון
  english_pob_choice: will congeal
  chosen_spanish: se congelarán
  alternatives_spanish:
  - se solidificarán
  - se helarán
  lexicon: HALOT
  rationale: El verbo sugiere endurecimiento por frío o cuajado/congelación. «Se congelarán» comunica esa imagen concreta en español y preserva la dificultad del texto.
theological_decisions:
- issue: Interpretación de la cláusula final difícil יְקָרוֹת יקפאון
  english_pob_reading: The glorious ones will congeal.
  chosen_spanish_reading: los gloriosos se congelarán
  alternative_spanish_readings:
  - no habrá ni frío ni escarcha
  - las luminarias se congelarán
  - los seres gloriosos quedarán helados
  rationale: Se mantiene una traducción cercana al texto masorético, dejando visible la ambigüedad en lugar de resolverla mediante una reconstrucción más lisa. La nota preserva la alternativa tradicional basada en otras versiones antiguas.
  doctrine_reference: §1, §3, §5 de la filosofía de traducción; preservación de la tensión léxica en pasajes oscuros
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «the splendid ones» a «the glorious ones» para reflejar con más naturalidad יְקָרוֹת; la versión española sigue esa última decisión con «los gloriosos». También se conserva «congelarán» para reflejar יקפאון y no suavizar la imagen del MT.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija expresamente; aquí no aparece el nombre divino.
  - Se evitó «SEÑOR» y también una paráfrasis interpretativa de la cláusula final, por fidelidad a la dificultad del hebreo.
  - La nota a pie de página se ancla en «luz» porque la alternativa tradicional afecta principalmente a la lectura de la primera y segunda cláusulas como conjunto.
