    issue: «Sí, hasta» añade un matiz no exigido por גַּם
    rationale: גַּם introduce adición/enfasis; «hasta» o «incluso» bastan. El «Sí» inicial agrega un tono confirmativo no presente en el hebreo ni en la POB inglesa.
  - severity: medium
    issue: «Te has acostado» debilita la metáfora poética de שָׁכַבְתָּ
    rationale: Aunque literalmente posible, en español moderno suele asociarse a acostarse en la cama. «Has yacido» conserva mejor el lenguaje elevado y la alusión a muerte/abatimiento sin resolverla interpretativamente.
  - severity: low
    issue: Puntuación mejorable en la cita
    rationale: En español es más natural cerrar la oración citada con punto antes de la comilla de cierre en este contexto.
