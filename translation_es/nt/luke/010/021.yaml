translation:
  language: es
  text: 'En aquella misma hora se alegró en el Espíritu Santo y dijo[a]: «Te alabo, Padre, Señor del cielo y de la tierra, porque escondiste estas cosas de los sabios y entendidos, y las revelaste a los niños pequeños[b]. Sí, Padre[c], porque esto fue agradable ante tus ojos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Te doy gracias». El verbo griego puede expresar gratitud además de alabanza en la oración.
    reason: lexical_alternative
  - marker: b
    text: O «infantes». La expresión probablemente es metafórica para quienes son humildes o socialmente insignificantes, más que para niños literalmente muy pequeños.
    reason: lexical_alternative
  - marker: c
    text: O «porque así fue tu buena voluntad» o «porque esto fue tu buen placer».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐν αὐτῇ τῇ ὥρᾳ
  english_pob_choice: In that same hour
  chosen_spanish: En aquella misma hora
  alternatives_spanish:
  - A esa misma hora
  - En esa misma hora
  lexicon: BDAG
  rationale: Mantiene el énfasis demostrativo y temporal del griego sin sonar forzado en español. «Aquella» conserva la distancia contextual del relato mejor que una simple «esa».
- source_word: ἠγαλλιάσατο
  english_pob_choice: he rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - exultó
  lexicon: BDAG
  rationale: El verbo expresa una alegría intensa. «Se alegró» es natural y digno en español; «se regocijó» también es posible, pero suena más elevado y menos inmediato.
- source_word: τῷ πνεύματι τῷ ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo
  - en espíritu
  lexicon: BDAG
  rationale: La construcción con artículo + sustantivo + adjetivo apunta al Espíritu Santo personal, no solo al espíritu humano de Jesús. «En el Espíritu Santo» conserva la esfera o ámbito del dativo y la referencia pneumatológica.
- source_word: Ἐξομολογοῦμαί σοι
  english_pob_choice: I praise you
  chosen_spanish: Te alabo
  alternatives_spanish:
  - Te doy gracias
  - Te confieso
  lexicon: BDAG
  rationale: En este contexto de oración y alabanza al Padre, el verbo incluye alabanza y acción de gracias. «Te alabo» refleja bien el tono doxológico sin reducirlo solo a gratitud.
- source_word: πάτερ κύριε τοῦ οὐρανοῦ καὶ τῆς γῆς
  english_pob_choice: Father, Lord of heaven and earth
  chosen_spanish: Padre, Señor del cielo y de la tierra
  alternatives_spanish:
  - Padre, Dueño del cielo y de la tierra
  - Padre, Soberano del cielo y de la tierra
  lexicon: BDAG
  rationale: «Señor» conserva la decisión auditable del POB para κύριος y el registro de soberanía divina. Se mantiene la aposición vocativa sin suavizarla.
- source_word: ἀπέκρυψας
  english_pob_choice: you hid
  chosen_spanish: escondiste
  alternatives_spanish:
  - ocultaste
  - disimulaste
  lexicon: BDAG
  rationale: «Escondiste» es la forma más natural en español para el ocultamiento deliberado de Dios, y mantiene el sentido directo del aoristo.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas
  lexicon: BDAG
  rationale: En español, «estas cosas» explicita el objeto de manera clara y no sobreinterpreta el demostrativo.
- source_word: σοφῶν καὶ συνετῶν
  english_pob_choice: the wise and understanding
  chosen_spanish: a los sabios y entendidos
  alternatives_spanish:
  - a los sabios y prudentes
  - a los sabios y perspicaces
  lexicon: BDAG
  rationale: «Entendidos» reproduce bien συνετῶν como personas con discernimiento/comprensión, sin desplazarlo hacia una categoría académica o meramente intelectual.
- source_word: ἀπεκάλυψας
  english_pob_choice: revealed
  chosen_spanish: las revelaste
  alternatives_spanish:
  - las diste a conocer
  - las descubriste
  lexicon: BDAG
  rationale: Conserva el contraste con «escondiste» y mantiene el peso teológico de la revelación divina.
- source_word: νηπίοις
  english_pob_choice: little children
  chosen_spanish: a los pequeñuelos
  alternatives_spanish:
  - a los niños pequeños
  - a los infantes
  lexicon: BDAG
  rationale: El término es literalmente «infantes», pero aquí funciona de manera metafórica para quienes son humildes o dependientes. «Pequeñuelos» preserva la imagen y deja abierta esa resonancia metafórica.
- source_word: ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Verdaderamente
  - Así es
  lexicon: BDAG
  rationale: Equivale de forma directa a la partícula afirmativa y funciona con naturalidad en diálogo directo.
- source_word: οὕτως εὐδοκία ἐγένετο ἔμπροσθέν σου
  english_pob_choice: because this was well-pleasing in your sight
  chosen_spanish: porque así fue agradable delante de ti
  alternatives_spanish:
  - porque tal fue tu buena voluntad
  - porque así fue tu buen propósito
  lexicon: BDAG
  rationale: La frase expresa complacencia/divino agrado y la locución ἔμπροσθέν σου apunta a la idea de «delante de ti» / «a tus ojos». Se conserva la tensión entre aprobación y buen placer sin reducirla a una sola paráfrasis.
theological_decisions:
- issue: Referente de πνεύματι ἁγίῳ
  english_pob_reading: A reference to the Holy Spirit, rendered with capitalization
  chosen_spanish_reading: Referencia al Espíritu Santo, con mayúsculas
  alternative_spanish_readings:
  - referencia al espíritu humano de Jesús
  - en espíritu
  rationale: La construcción griega con artículo y adjetivo sustantivado favorece el referente personal del Espíritu Santo. La capitalización en español comunica ese referente sin añadir doctrina ajena al texto.
  doctrine_reference: 'Credo Niceno (381): confesión del Espíritu Santo'
- issue: Sentido de εὐδοκία ἐγένετο ἔμπροσθέν σου
  english_pob_reading: because this was well-pleasing in your sight
  chosen_spanish_reading: porque así fue agradable delante de ti
  alternative_spanish_readings:
  - porque tal fue tu buena voluntad
  - porque así fue tu buen placer
  rationale: El griego permite la idea de agrado divino, voluntad favorable o beneplácito. Se preserva esa amplitud sin escoger una sola paráfrasis interpretativa como si agotara el sentido.
  doctrine_reference: Distinción lexical entre beneplácito divino y mera aprobación humana
translation_notes:
  revision_awareness: La revisión inglesa más reciente afinó ἔμπροσθέν σου hacia «in your sight» en vez de «before you». La versión española adopta «delante de ti» para conservar la proximidad semántica y la naturalidad idiomática. También se mantiene el valor del pasaje como alabanza dirigida al Padre y la referencia explícita al Espíritu Santo, siguiendo la lectura auditada del POB.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el nombre divino; aquí el texto no lo requiere.
  - Se traduce κύριος como «Señor» según la decisión documentada del POB para este término.
  - Se mantiene «Espíritu Santo» con mayúscula por el referente personal identificado en el análisis.
  - 'Se prefiere un registro bíblico claro y moderno: «te alabo», «escondiste», «revelaste», sin arcaísmos innecesarios.'
  - Se conserva la tensión entre agrado, beneplácito y voluntad favorable en la cláusula final mediante texto principal y nota alternativa.
