    text: O, «a residir temporalmente». El verbo transmite la idea de vivir por un tiempo en condición de forastero o dependiente.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota literal innecesaria en «le dijo», se mejora la expresión geográfica a «de Belén, en Judá» para mayor claridad y mejor alineación con la auditoría inglesa, y se conserva la buena decisión léxica «vivir como forastero» con su nota explicativa.
