translation:
  language: es
  text: 'Entonces le dijeron: «Por favor, di “Shibólet[a]”». Pero él dijo: «Sibólet», porque no podía decirlo así. Entonces lo apresaron y lo degollaron en los vados del Jordán. En aquel tiempo cayeron cuarenta y dos mil de Efraín.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Shibólet» y «Sibólet» se mantienen como transliteraciones porque aquí son palabras de prueba; su sentido léxico probable es «espiga de grano» o «arroyo/torrente», pero el relato enfatiza la pronunciación.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמָר נָא
  english_pob_choice: Please say
  chosen_spanish: Por favor, di
  alternatives_spanish:
  - Di, por favor
  - Por favor, pronuncia
  lexicon: HALOT
  rationale: El imperativo con נָא expresa ruego cortés. «Por favor, di» conserva esa solicitud de manera natural en español y evita sobrecargar el verso con tecnicismo innecesario.
- source_word: שִׁבֹּלֶת
  english_pob_choice: Shibboleth
  chosen_spanish: Shibólet
  alternatives_spanish:
  - Shibbólet
  - espiga de grano
  - arroyo
  - torrente
  lexicon: HALOT
  rationale: Aquí funciona como palabra-prueba de pronunciación, no por su sentido léxico. La transliteración preserva el contraste narrativo; se mantiene una forma adaptada al español para lectura pública.
- source_word: סִבֹּלֶת
  english_pob_choice: Sibboleth
  chosen_spanish: Sibólet
  alternatives_spanish:
  - Sibbólet
  lexicon: HALOT
  rationale: La variación inicial es el punto decisivo del relato. La transliteración española conserva la oposición entre el sonido buscado y el pronunciado.
- source_word: וְלֹא יָכִין לְדַבֵּר כֵּן
  english_pob_choice: because he could not say it that way
  chosen_spanish: porque no podía decirlo así
  alternatives_spanish:
  - porque no podía pronunciarlo así
  - porque no podía hablar así
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y apunta a incapacidad de articular la forma requerida. «Decirlo así» sigue de cerca el audit trail inglés y es natural en español; «pronunciarlo así» es una alternativa válida pero más interpretativa.
- source_word: וַיֹּאחֲזוּ אֹתוֹ
  english_pob_choice: they seized him
  chosen_spanish: lo apresaron
  alternatives_spanish:
  - lo sujetaron
  - lo agarraron
  - lo capturaron
  lexicon: HALOT
  rationale: אחז es «tomar/agarrar/sujetar». En este contexto judicial-violento, «lo apresaron» comunica captura y detención con dignidad literaria. Se deja implícita la fuerza del verbo sin volverlo coloquial.
- source_word: וַיִּשְׁחָטוּהוּ
  english_pob_choice: slaughtered him
  chosen_spanish: lo degollaron
  alternatives_spanish:
  - lo mataron
  - lo sacrificaron
  - lo sacrificaron/degollaron
  lexicon: HALOT
  rationale: שׁחט es un verbo fuerte, asociado a matanza/degüello. «Lo degollaron» transmite la brutalidad del acto con fuerza equivalente a «slaughtered him» y evita suavizar el término.
- source_word: אֶל מַעְבְּרוֹת הַיַּרְדֵּן
  english_pob_choice: at the fords of the Jordan
  chosen_spanish: junto a los vados del Jordán
  alternatives_spanish:
  - en los vados del Jordán
  - a los vados del Jordán
  - en los pasos del Jordán
  lexicon: HALOT
  rationale: מַעְבְּרוֹת son lugares de cruce, especialmente vados. «Vados» es el equivalente español más preciso e idiomático; «junto a» refleja el matiz local sin forzar un valor estrictamente locativo si el texto se lee como escena junto a la zona de cruce.
- source_word: וַיִּפֹּל ... מֵאֶפְרַיִם
  english_pob_choice: forty-two thousand from Ephraim fell
  chosen_spanish: cayeron cuarenta y dos mil de Efraín
  alternatives_spanish:
  - murieron cuarenta y dos mil de Efraín
  - cayeron cuarenta y dos mil efraimitas
  lexicon: HALOT
  rationale: נפל en contexto bélico expresa caer/morir. «Cayeron» conserva la fórmula bíblica y la gravedad del conteo; «de Efraín» mantiene la referencia grupal sin agregar una etiqueta étnica no explicitada por el hebreo.
- source_word: אַרְבָּעִים וּשְׁנַיִם אָלֶף
  english_pob_choice: forty-two thousand
  chosen_spanish: cuarenta y dos mil
  alternatives_spanish:
  - 42 mil
  lexicon: HALOT
  rationale: Número cardinal directo, mantenido sin alteración.
theological_decisions:
- issue: Tratamiento del nombre divino
  english_pob_reading: No aparece el Tetragrámaton en este versículo.
  chosen_spanish_reading: No se introduce ningún equivalente divino.
  alternative_spanish_readings:
  - No aplica
  rationale: El versículo no contiene יהוה ni un sustituto griego relevante; por tanto, no hay decisión teológica de nomenclatura divina en el texto español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El audit trail inglés revisó la cláusula final de «could not pronounce it that way» a «could not say it that way» para acercarse más al hebreo. La versión española sigue esa línea con «no podía decirlo así», evitando añadir interpretación psicológica o fonética más allá del texto.
  spanish_consistency_notes:
  - Se usa transliteración adaptada al español para Shibólet/Sibólet, coherente con su función de prueba de pronunciación.
  - Se conserva el verbo fuerte de matanza con «degollaron», en paralelo con el inglés «slaughtered him».
  - «Vados» reproduce con precisión el valor de מַעְבְּרוֹת como lugares de cruce del Jordán.
  - La cifra se mantiene literal y sin normalización adicional.
  - No se emplea «SEÑOR» ni otra convención para el nombre divino porque el versículo no lo contiene.
