translation:
  language: es
  text: Bendito[a] el que viene en el nombre de Yahvé[b][c]; les bendecimos desde la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bendito sea el que viene». El participio hebreo es masculino singular y también puede traducirse de manera más formal como «el que viene».
    reason: lexical_alternative
  - marker: b
    text: «En el nombre de» también puede significar «con la autoridad de» o «como representante de».
    reason: lexical_alternative
  - marker: c
    text: Este versículo se cita más tarde en el Nuevo Testamento en relación con la entrada de Jesús en Jerusalén (por ejemplo, Mt 21:9; Mr 11:9; Lc 19:38; Jn 12:13), pero el wording del salmo mismo se deja sin traducir importando esa aplicación posterior.
    reason: cross_reference
lexical_decisions:
- source_word: בָּר֣וּךְ
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Sea bendito
  - Bendecido
  lexicon: HALOT
  rationale: El participio pasivo funciona aquí como fórmula de bienaventuranza o bendición declarativa. «Bendito» conserva la naturalidad y la fuerza formularia sin convertirlo en una paráfrasis exhortativa.
- source_word: הַבָּא
  english_pob_choice: the one who comes
  chosen_spanish: el que viene
  alternatives_spanish:
  - el que viene
  - el que está viniendo
  - el que llega
  lexicon: HALOT
  rationale: El participio sustantivado masculino singular se expresa bien en español con una relativa simple. «El que viene» mantiene el valor participial y suena natural en español bíblico moderno.
- source_word: בְּשֵׁם
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - con la autoridad de
  - en representación de
  lexicon: HALOT
  rationale: La frase preposicional conserva el sentido básico de venir bajo el nombre/invocación de Yahvé. «En el nombre de» es la forma más transparente y respetuosa del alcance semántico del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la directriz terminológica del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino sin sustituirlo por un título.
- source_word: בֵּרַכְנוּ/כֶם
  english_pob_choice: we bless you
  chosen_spanish: te bendecimos
  alternatives_spanish:
  - os bendecimos
  - los bendecimos
  - les bendecimos
  lexicon: HALOT
  rationale: El verbo perfecto 1cp con sufijo 2mp se entiende litúrgicamente como una bendición declarativa. En español, el destinatario plural puede resolverse con un singular reverencial en la segunda persona de tradición bíblica; sin embargo, para una versión neutra se mantiene el plural implícito mediante «te/les» según el marco editorial. Aquí se opta por una fórmula breve y litúrgica, con la referencia al grupo preservada en el contexto del versículo.
- source_word: מִבֵּ֥ית
  english_pob_choice: from the house of
  chosen_spanish: desde la casa de
  alternatives_spanish:
  - desde el templo de
  - de la casa de
  lexicon: HALOT
  rationale: La preposición מִ con בית admite procedencia local. «Desde la casa de» conserva la imagen concreta sin forzar una interpretación arquitectónica más específica que el hebreo.
theological_decisions:
- issue: Tratamiento del Tetragrámaton en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. La traducción mantiene el nombre divino en lugar de sustituirlo por un título, en coherencia con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Posible lectura mesiánica de «el que viene»
  english_pob_reading: Retain the phrase as a general liturgical blessing in the main text without making an explicit messianic interpretation
  chosen_spanish_reading: Mantener la frase como bendición litúrgica general, sin introducir explícitamente la aplicación mesiánica en el cuerpo del versículo
  alternative_spanish_readings:
  - Lectura mesiánica explícita
  - Identificación directa con Jesús en la traducción
  rationale: El hebreo del salmo bendice al que llega en el nombre de Yahvé dentro de su propio contexto. Aunque el versículo es aplicado después en el Nuevo Testamento, la traducción no debe importar esa interpretación al texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje no requirió revisiones posteriores en el audit trail; se mantiene la lectura estable y de alta concordancia. La versión española sigue de cerca el hebreo, preserva el nombre divino y evita importar la aplicación neotestamentaria al texto base.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se preserva «en el nombre de» como equivalente principal de בְּשֵׁם.
  - 'La frase final mantiene la imagen concreta de procedencia: «desde la casa de».'
  - Se evita una formulación mecanicista; el español fluye de modo litúrgico y publicable.
