base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/041/005.yaml
  text: Then eighty men came from Shechem[a], from Shiloh, and from Samaria, with their beards shaved, their clothes torn, and gashing themselves[c][b], with grain offerings and frankincense in their hands to bring to the house of Yahweh.
  footnotes:
  - marker: a
    text: Or 'cutting themselves.' The Hebrew refers to making cuts on oneself as a mourning practice.
    reason: lexical_alternative
  - marker: b
    text: Or 'offering.' The Hebrew minḥah often denotes a grain offering in cultic contexts.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the house of the LORD'; this may refer to the sanctuary site rather than an intact temple building.
    reason: cultural_note
