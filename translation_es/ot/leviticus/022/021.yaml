translation:
  language: es
  text: Y si un hombre presenta a Yahvé un sacrificio de ofrendas de paz[a], para cumplir un voto[b] o como ofrenda voluntaria, del ganado o del rebaño, será sin defecto, para ser aceptado; no habrá en él ningún defecto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ofrendas de paz»; algunas traducciones lo vierten de modo más interpretativo como «ofrendas de comunión».'
    reason: lexical_alternative
  - marker: b
    text: O, «para realizar un voto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: And if a man
  chosen_spanish: Y si un hombre
  alternatives_spanish:
  - Y cuando un hombre
  - Y si una persona
  lexicon: WLC morphology; HALOT para אִישׁ
  rationale: El hebreo usa אִישׁ en singular masculino en una formulación legal representativa. En español, 'un hombre' conserva ese rasgo sin neutralizarlo indebidamente. כִּי con el imperfecto introduce una cláusula condicional, por eso 'si'.
- source_word: יַקְרִיב
  english_pob_choice: presents
  chosen_spanish: presenta
  alternatives_spanish:
  - ofrece
  - trae
  lexicon: HALOT
  rationale: En contexto sacrificial, el hifil de קרב significa presentar/ofrecer una ofrenda. 'Presenta' suena natural en español moderno y mantiene el sentido cultual.
- source_word: זֶבַח שְׁלָמִים
  english_pob_choice: a sacrifice of peace offerings
  chosen_spanish: un sacrificio de ofrendas de paz
  alternatives_spanish:
  - un sacrificio de ofrendas de comunión
  - una ofrenda de paz
  lexicon: HALOT
  rationale: Se conserva la estructura 'sacrificio de ...' y el valor lexical de שְׁלָמִים como ofrendas de paz. 'De paz' sigue el término POB y evita una paráfrasis más interpretativa como 'comunión'.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al Señor
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se translitera el nombre divino como 'Yahvé', conforme al estándar del proyecto, en lugar de ocultarlo con 'SEÑOR' o sustituirlo por un título genérico.
- source_word: לְפַלֵּא נֶדֶר
  english_pob_choice: to fulfill a vow
  chosen_spanish: para cumplir un voto
  alternatives_spanish:
  - para realizar un voto
  - para efectuar un voto
  lexicon: HALOT
  rationale: El giro verbal expresa la ejecución de un voto ya hecho. 'Cumplir un voto' es idiomático en español y preserva la fuerza legal del hebreo sin volverlo más abstracto.
- source_word: אוֹ לִנְדָבָה
  english_pob_choice: or as a freewill offering
  chosen_spanish: o como ofrenda voluntaria
  alternatives_spanish:
  - o como ofrenda libre
  - o como ofrenda espontánea
  lexicon: HALOT
  rationale: נְדָבָה denota una ofrenda voluntaria/no obligada. 'Ofrenda voluntaria' comunica bien la categoría y es clara para lector bíblico en español.
- source_word: בַּבָּקָר
  english_pob_choice: from the herd
  chosen_spanish: de la vacada
  alternatives_spanish:
  - del ganado vacuno
  - de la manada
  lexicon: HALOT
  rationale: בָּקָר refiere al ganado mayor o vacuno. 'Vacada' es breve y precisa en español, y mantiene la distinción frente al rebaño.
- source_word: בַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de las ovejas y cabras
  - del ganado menor
  lexicon: HALOT
  rationale: צֹאן designa el ganado menor en conjunto. 'Rebaño' es la correspondencia natural y concisa en español.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tara
  lexicon: HALOT
  rationale: En legislación sacrificial, תָּמִים refiere a un animal físicamente íntegro. 'Sin defecto' expresa con claridad la condición requerida y evita una lectura meramente moral.
- source_word: לְרָצוֹן
  english_pob_choice: to be accepted
  chosen_spanish: para ser aceptado
  alternatives_spanish:
  - para agradar
  - para ser recibido
  lexicon: HALOT
  rationale: El término señala aceptabilidad ante Dios. 'Para ser aceptado' conserva el sentido relacional y cultual del texto.
- source_word: כָּל מוּם לֹא יִהְיֶה בּוֹ
  english_pob_choice: there shall be no defect in it
  chosen_spanish: no habrá en él ninguna falla
  alternatives_spanish:
  - no tendrá ningún defecto
  - no habrá en él ninguna mancha
  lexicon: HALOT
  rationale: מוּם es una imperfección o defecto descalificante. 'Falla' funciona como equivalente comprensible en español; se mantiene la idea legal de ausencia total de defecto en el animal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Siguiendo la política del proyecto, se preserva el nombre divino como 'Yahvé' en el texto principal, evitando la máscara litúrgica 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: שְׁלָמִים como categoría de sacrificio
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - sacrificios de paz
  rationale: La categoría hebrea mantiene el matiz tradicional de 'paz' ligado a שׁלם. 'Ofrendas de paz' preserva la terminología POB y evita una interpretación más desarrollada que el hebreo no exige aquí.
  doctrine_reference: N/A — decisión lexical/cultual
- issue: אִישׁ en formulación legal
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El hebreo conserva la forma masculina singular en un caso legal representativo. No se neutraliza a 'persona' para mantener la correspondencia morfológica y estilística.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Revisión final: no se detectaron cambios necesarios respecto del análisis auditado; la redacción española conserva el valor condicional, el nombre divino y la terminología sacrificial sin suavizar las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con la política del proyecto para יְהוָה.
  - '''Ofrendas de paz'' conserva la terminología sacrificial del hebreo y del POB inglés.'
  - '''Sin defecto'' y ''ninguna falla'' distinguen la condición positiva y la ausencia de defecto descalificante.'
  - '''Un hombre'' respeta el sujeto legal masculino singular sin convertirlo en genérico neutral.'
