translation:
  language: es
  text: Porque Yahvé es nuestro juez; Yahvé es nuestro legislador[a]; Yahvé es nuestro rey[b]; él nos salvará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Legislador» intenta reproducir el valor del hebreo מְחֹקְקֵנוּ, que puede abarcar la idea de quien dicta estatutos o establece la norma; en algunos contextos también puede acercarse a «gobernante».
    reason: lexical_alternative
  - marker: b
    text: El nombre divino YHWH se ha transliterado como «Yahvé» en lugar de sustituirse por «el SEÑOR», para conservar el nombre propio revelado en el texto hebreo.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce aquí la base o explicación de la afirmación anterior. «Porque» conserva esa relación causal/explicativa de manera natural en español sin añadir un matiz más fuerte de consecuencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: transliterar el nombre divino como «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.'
- source_word: שֹׁפְטֵנוּ
  english_pob_choice: our judge
  chosen_spanish: nuestro juez
  alternatives_spanish:
  - el que nos juzga
  - nuestro gobernante
  lexicon: HALOT
  rationale: El participio sustantivado funciona como título judicial. «Juez» es la forma más directa y natural en español, y mantiene el paralelismo con los otros títulos del verso.
- source_word: מְחֹקְקֵנוּ
  english_pob_choice: our lawgiver
  chosen_spanish: nuestro legislador
  alternatives_spanish:
  - nuestro dador de ley
  - nuestro gobernador
  - nuestro juez
  lexicon: HALOT
  rationale: Aunque la POB inglesa eligió «lawgiver», en español «legislador» comunica mejor la función de establecer preceptos/estatutos sin sonar artificial. Conserva el sentido jurídico-gubernamental del término y la tensión entre autoridad legal y regia.
- source_word: מַלְכֵּנוּ
  english_pob_choice: our king
  chosen_spanish: nuestro rey
  alternatives_spanish:
  - nuestro soberano
  - nuestro gobernante
  lexicon: HALOT
  rationale: Título real directo y equivalente. «Rey» mantiene la imaginería monárquica del texto y su simetría con los otros dos títulos.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre enfatiza la culminación de la serie de títulos. En español, «él» reproduce esa explicitación sin sobrecargar el cierre.
- source_word: יוֹשִׁיעֵנוּ
  english_pob_choice: will save us
  chosen_spanish: nos salvará
  alternatives_spanish:
  - nos librará
  - es quien nos salvará
  lexicon: HALOT
  rationale: El verbo hiphil de ישׁע expresa acción salvífica futura. «Nos salvará» es la equivalencia más directa y conserva el peso teológico de salvación, mientras «librará» sería más restringido al ámbito de liberación.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH en un verso de títulos teocráticos
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión mantiene el nombre personal de Dios de forma consistente con la política del proyecto y evita ocultarlo tras una sustitución litúrgica. Aquí el nombre aparece tres veces y refuerza la estructura enfática del verso; traducirlo como título debilitaría esa repetición.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de מְחֹקְקֵנוּ dentro de la tríada juez/legislador/rey
  english_pob_reading: our lawgiver
  chosen_spanish_reading: nuestro legislador
  alternative_spanish_readings:
  - nuestro lawgiver
  - nuestro dador de ley
  - nuestro gobernante
  rationale: «Legislador» preserva la función de dar estatutos y ordenar la vida del pueblo, manteniendo la tríada política-jurídica del verso. «Gobernante» sería más general y diluiría el valor legal del término; «lawgiver» no es idiomático en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El control de revisión más reciente indicó que no hubo cambios necesarios; esta propuesta mantiene el sentido y la estructura del texto fuente, ajustando solo la formulación española para naturalidad y consistencia terminológica.
  spanish_consistency_notes:
  - 'Se mantiene la tríada retórica del hebreo: juez / legislador / rey.'
  - 'Se conserva el futuro de salvación con un verbo directo: «nos salvará».'
  - El nombre divino aparece repetido tres veces para reflejar la insistencia del original.
  - La puntuación con punto y coma reproduce la cadencia enumerativa del verso y facilita la lectura pública.
