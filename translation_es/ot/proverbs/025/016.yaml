translation:
  language: es
  text: Si encuentras miel[a], come solo lo suficiente para ti, no sea que te sacies de ella y la vomites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «come tanto como sea suficiente para ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - panal
  - miel de abeja
  lexicon: HALOT
  rationale: El hebreo designa de manera directa la miel; «miel» conserva la imagen concreta sin añadir metáfora que el texto no explicita.
- source_word: מָצָאתָ
  english_pob_choice: you find
  chosen_spanish: encuentras
  alternatives_spanish:
  - has encontrado
  - hallas
  lexicon: HALOT
  rationale: 'Aunque la forma es perfecta, en el contexto proverbial condicional el presente español expresa mejor el caso general: «Si encuentras…».'
- source_word: אֱכֹל
  english_pob_choice: eat
  chosen_spanish: come
  alternatives_spanish:
  - cómetela
  - come de ella
  lexicon: HALOT
  rationale: El imperativo 2ms se mantiene con el verbo simple; el objeto queda implícito, como en el hebreo, y luego se precisa con «de ella» solo donde ayuda a la naturalidad.
- source_word: דַּיֶּךָ
  english_pob_choice: only enough for you
  chosen_spanish: solo lo suficiente para ti
  alternatives_spanish:
  - solo tu suficiencia
  - lo que te basta
  - cuanto te basta
  lexicon: HALOT
  rationale: «דַּיֶּךָ» expresa suficiencia limitada, no mera cantidad. La opción elegida conserva el matiz admonitorio y suena natural en español contemporáneo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o de lo contrario
  lexicon: HALOT
  rationale: «No sea que» reproduce bien la advertencia preventiva del hebreo y funciona con registro bíblico claro en español.
- source_word: תִּשְׂבָּעֶנּוּ
  english_pob_choice: you become full of it
  chosen_spanish: te sacies de ella
  alternatives_spanish:
  - te llenes de ella
  - quedes hastiado de ella
  lexicon: HALOT
  rationale: El verbo שבע conserva la idea de saciedad física; «te sacies de ella» mantiene la imagen de haber comido en exceso sin suavizarla.
- source_word: וַהֲקֵאתוֹ
  english_pob_choice: and vomit it
  chosen_spanish: la vomites
  alternatives_spanish:
  - la devuelvas
  - la eches
  lexicon: HALOT
  rationale: El verbo קיא significa vomitar; se preserva sin eufemismo para respetar la fuerza gráfica y corporal de la advertencia.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: mantiene la estructura condicional, el matiz de suficiencia limitada y el verbo fuerte «vomitar», sin introducir aclaraciones interpretativas adicionales.'
  spanish_consistency_notes:
  - Se usa «miel» para דְּבַשׁ conforme al valor léxico directo.
  - «No sea que» conserva el valor preventivo de פֶּן.
  - La construcción «te sacies de ella» refleja el objeto implícito del hebreo y mantiene la referencia a la miel.
  - El marcador de nota [a] acompaña la alternativa léxica sobre la cantidad suficiente.
