    rationale: El inglés preserva una nota explicativa sobre el tipo no especificado de bebida. En español conviene mantener esa aclaración junto con la opción principal más natural.
  revised_spanish_text: Y su libación será de un cuarto de hin por cada cordero[a]. En el lugar santo derramarás una libación de bebida fuerte[b] para Yahvé.
