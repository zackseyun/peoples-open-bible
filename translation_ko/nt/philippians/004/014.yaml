id: PHP.4.14
reference: Philippians 4:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πλὴν καλῶς ἐποιήσατε συγκοινωνήσαντές μου τῇ θλίψει.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/014.yaml
  text: Nevertheless, you did well by sharing in my affliction.
translation:
  language: ko
  text: 그렇기는 하나, 여러분이 나의 환난에 함께 동참한 것은[a] 잘하신 일입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 συγκοινωνέω는 단지 「돕다」가 아니라 「함께 나누어 짊어지다」를 뜻한다. 빌립보 성도의 물질적 후원이 바울의 환난을 그들 자신의 환난으로 만든 결속의 행위였음을 보여 준다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: Nevertheless
  chosen_korean: 그렇기는 하나
  alternatives_korean:
  - 그러나
  - 그렇지만
  lexicon: BDAG
  rationale: 11–13절의 「궁핍·자족」 단언 뒤에 오는 부드러운 전환. 「그렇기는 하나」가 앞 단언을 부정하지 않으면서 칭찬으로 넘어가는 결을 자연스럽게 살린다.
- source_word: καλῶς ἐποιήσατε
  english_pob_choice: you did well
  chosen_korean: 잘하신 일입니다
  alternatives_korean:
  - 잘하셨습니다
  - 옳게 행하셨습니다
  lexicon: BDAG
  rationale: 한국어로 자연스러운 합쇼체 칭찬어. 「잘하신 일입니다」가 행위의 도덕적 평가를 분명히 한다.
- source_word: συγκοινωνήσαντές
  english_pob_choice: by sharing in
  chosen_korean: 함께 동참한
  alternatives_korean:
  - 함께 나눈
  - 함께 짊어진
  - 동참한
  lexicon: BDAG
  rationale: συγ-(함께) + κοινωνέω(나누다·교제하다) 합성동사. 「함께 동참한」이 양쪽 의미를 함께 담는다. 단순 「도왔다」는 결속의 무게를 약화시킨다.
- source_word: μου τῇ θλίψει
  english_pob_choice: in my affliction
  chosen_korean: 나의 환난에
  alternatives_korean:
  - 나의 고난에
  - 나의 어려움에
  lexicon: BDAG
  rationale: θλῖψις의 압박·고난의 무게를 「환난」이 한국 교회 정형어로 자연스럽게 담는다. 소유격 μου는 「나의」로 명시한다.
