  yaml_path: translation/ot/1_samuel/007/009.yaml
  text: So Samuel took one nursing lamb and offered it as a whole burnt offering to Yahweh. And Samuel cried out to Yahweh on behalf of Israel[a], and Yahweh answered him.
  footnotes:
