  language: en
  yaml_path: translation/ot/daniel/007/007.yaml
  text: After this I kept looking in the visions of the night[a], and behold, a fourth beast, terrifying and dreadful and exceedingly strong. It had large iron teeth; it devoured and crushed, and it trampled the remainder with its feet. It was different from all the beasts that were before it[b], and it had ten horns.
  footnotes:
