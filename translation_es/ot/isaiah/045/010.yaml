translation:
  language: es
  text: '¡Ay del que dice a un padre: «¿Qué estás engendrando?[a]» o a una mujer: «¿Qué estás dando a luz?[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Qué estás procreando?». El verbo hebreo se refiere específicamente al acto de engendrar de un padre.
    reason: lexical_alternative
  - marker: b
    text: O «¿Qué estás trayendo al mundo?». El hebreo evoca el trabajo de parto y el alumbramiento de una mujer.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay del
  lexicon: HALOT
  rationale: El hebreo es una interjección profética de denuncia o lamentación. En español, «¡Ay de» conserva mejor esa fuerza oracular que una simple exclamación neutra; se ajusta además al giro natural de amenaza o reprensión.
- source_word: אֹמֵר
  english_pob_choice: one who says
  chosen_spanish: el que dice
  alternatives_spanish:
  - quien dice
  - uno que dice
  lexicon: HALOT
  rationale: El participio funciona sustantivamente. «El que dice» reproduce bien la fuerza genérica y mantiene una formulación clara y bíblica en español.
- source_word: לְאָב
  english_pob_choice: to a father
  chosen_spanish: a un padre
  alternatives_spanish:
  - a un padre suyo
  - a su padre
  lexicon: HALOT
  rationale: No hay sufijo posesivo en hebreo. «A un padre» conserva la precisión textual y evita introducir una relación posesiva que el versículo no expresa.
- source_word: מַה תּוֹלִיד
  english_pob_choice: What are you fathering?
  chosen_spanish: ¿Qué estás engendrando?
  alternatives_spanish:
  - ¿Qué estás padreando?
  - ¿Qué vas a engendrar?
  lexicon: HALOT
  rationale: El causativo de ילד apunta al acto de engendrar/fathering. «Engendrar» es el equivalente español más exacto y digno para preservar el matiz paterno sin forzar una paráfrasis.
- source_word: וּלְאִשָּׁה
  english_pob_choice: or to a woman
  chosen_spanish: o a una mujer
  alternatives_spanish:
  - y a una mujer
  - o a la mujer
  lexicon: HALOT
  rationale: La conjunción coordina el segundo miembro del paralelismo; en español, «o» refleja mejor la estructura de dirección paralela. «A una mujer» mantiene el artículo indefinido acorde con la ausencia de sufijo posesivo.
- source_word: תְּחִילִין
  english_pob_choice: What are you giving birth to?
  chosen_spanish: ¿Qué estás dando a luz?
  alternatives_spanish:
  - ¿Qué estás pariendo?
  - ¿Qué estás trayendo a luz?
  lexicon: HALOT
  rationale: La forma hebrea evoca el trabajo de parto y el dar a luz. «Dar a luz» es una expresión natural, formal y fiel al evento del nacimiento; evita el calco áspero y conserva el sentido de alumbramiento.
theological_decisions:
- issue: Imagen parental como reprensión indirecta al cuestionamiento del Creador
  english_pob_reading: Maintain the literal father/woman imagery as an analogy of improper questioning of one's maker, without making the implied referent explicit in the verse.
  chosen_spanish_reading: Mantener la imagen de padre y mujer como analogía de una pregunta impropia y temeraria, sin explicitar dentro del versículo el referente mayor al que apunta el contexto.
  alternative_spanish_readings:
  - Hacer explícito que se trata de cuestionar a Dios
  - Sustituir padre/mujer por padre/madre para aclarar la analogía
  rationale: El hebreo presenta una analogía concreta y el contexto posterior identifica al contendiente con su Hacedor. El español debe conservar esa metáfora sin sobre-explicarla en el texto principal, para no debilitar la fuerza retórica del reproche.
  doctrine_reference: Isaías 45:9-11; cf. Romanos 9:20-21
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que prefirió una formulación cercana a «dar a luz» en lugar de una expresión centrada en el trabajo de parto, pero en español se conserva «dar a luz» para reflejar mejor el verbo hebreo sin perder naturalidad. También se mantuvo el paralelismo de dirección («a un padre... o a una mujer...»), de acuerdo con el texto hebreo y el audit trail inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma predeterminada para el nombre divino en español, aunque este versículo no lo menciona directamente.
  - Se evitó introducir «madre» porque el hebreo dice literalmente «mujer»; la referencia materna queda implícita por el contexto del alumbramiento.
  - Se mantuvo un registro formal y bíblico, con puntuación española y paralelismo claro.
