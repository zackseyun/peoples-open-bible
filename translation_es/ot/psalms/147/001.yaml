  glossary_alignment: 'Alineación buena con la terminología del proyecto: יָהּ se conserva como «Yah», no se sustituye por «SEÑOR», y «Dios» para אֱלֹהֵינוּ es correcto. No hay conflictos con las pautas doctrinales o léxicas principales.'
