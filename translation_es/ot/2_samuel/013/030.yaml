revisions:
- from: 'Mientras ellos iban por el camino[a], llegó a David el informe, diciendo: «Absalón ha derribado a todos los hijos del rey, y no quedó de ellos ni uno».'
  to: 'Mientras ellos iban por el camino[a], llegó a David el reporte, diciendo: «Absalón ha matado a todos los hijos del rey, y no ha quedado de ellos ni uno».'
  rationale: Se ajusta «ha derribado» a «ha matado» porque en español el contexto exige expresar claramente el carácter letal de הִכָּה. Se cambia «el informe» por «el reporte» para sonar más natural en narrativa bíblica y seguir preservando, con la nota, el matiz de noticia aún no verificada. También se armoniza el cierre del discurso reportado con «no ha quedado» para una secuencia verbal más natural en español contemporáneo, sin alterar el sentido.
