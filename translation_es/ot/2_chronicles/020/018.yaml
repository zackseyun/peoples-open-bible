translation:
  language: es
  text: Entonces Josafat se inclinó con el rostro en tierra, y todo Judá y los habitantes de Jerusalén cayeron delante de Yahvé[a] para adorar a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cayeron delante de Yahvé para postrarse ante Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקֹּד
  english_pob_choice: bowed
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se arrodilló
  - se inclinó profundamente
  - se postró
  lexicon: HALOT
  rationale: קָדַד expresa inclinarse en reverencia. «Se inclinó» comunica bien el gesto sin introducir la idea específica de arrodillarse, que el hebreo no exige.
- source_word: אַפַּיִם אָרְצָה
  english_pob_choice: with his face to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con el rostro contra el suelo
  - hasta tocar la tierra con el rostro
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y describe una postración completa. «Con el rostro en tierra» transmite esa imagen de manera natural en español y conserva la fuerza corporal del hebreo.
- source_word: וְכָל יְהוּדָה
  english_pob_choice: all Judah
  chosen_spanish: todo Judá
  alternatives_spanish:
  - todo el pueblo de Judá
  - todos los de Judá
  lexicon: HALOT
  rationale: El nombre propio funciona aquí de modo colectivo. «Todo Judá» mantiene la concisión y el valor metonímico del texto.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los que moraban en Jerusalén
  - los residentes de Jerusalén
  lexicon: HALOT
  rationale: El participio designa a quienes viven allí. «Los habitantes de Jerusalén» es claro, natural y fiel al sentido colectivo.
- source_word: נָפְלוּ לִפְנֵי יְהוָה
  english_pob_choice: fell down before Yahweh
  chosen_spanish: cayeron delante de Yahvé
  alternatives_spanish:
  - se postraron delante de Yahvé
  - cayeron ante Yahvé
  lexicon: HALOT
  rationale: נפל puede indicar caer físicamente y, en contexto de culto, postración. «Cayeron delante de Yahvé» conserva el verbo concreto y deja que el propósito siguiente explique la adoración; «delante de» refleja bien לִפְנֵי.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme al criterio del proyecto, preservando el nombre personal del Dios de Israel en vez de sustituirlo por un título.
- source_word: לְהִשְׁתַּחֲוֺת
  english_pob_choice: to worship
  chosen_spanish: para adorar
  alternatives_spanish:
  - para postrarse
  - para inclinarse en adoración
  lexicon: HALOT
  rationale: El hitpael de שׁחה puede expresar inclinarse en adoración. Como el gesto físico ya se describió, «para adorar» comunica aquí mejor la finalidad cultual sin redundancia.
- source_word: לַ/יהוָה
  english_pob_choice: the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé mismo
  - ante Yahvé
  lexicon: HALOT
  rationale: La repetición final del nombre divino se conserva en español. «A Yahvé» reproduce el complemento de propósito del hebreo dentro de la construcción «para adorar a Yahvé».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino en transliteración española establecida por el proyecto. Esto evita el sustituto litúrgico «el SEÑOR» y conserva la referencia al nombre pactal de Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre la caída física y la adoración
  english_pob_reading: fell down before Yahweh to worship Yahweh
  chosen_spanish_reading: cayeron delante de Yahvé para adorar a Yahvé
  alternative_spanish_readings:
  - se postraron delante de Yahvé para adorarlo
  - cayeron ante Yahvé para rendirle culto
  rationale: El hebreo distingue el acto corporal de caer delante de Yahvé del infinitivo de adoración. La traducción conserva ambos elementos para no borrar esa tensión entre postración física y adoración cultual.
  doctrine_reference: Isaías 45:23; Juan 4:24 (adoración con gesto corporal y acto interior)
translation_notes:
  revision_awareness: 'El contexto auditado confirma alta concordancia entre la traducción inglesa y el hebreo: no se requieren cambios de sentido mayores. Se mantiene la doble referencia a Yahvé y la distinción entre el gesto de postración y la finalidad de adoración.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto, porque el texto resalta el nombre divino dos veces.
  - «Cayeron» y «para adorar» preservan la estructura verbal doble del hebreo sin fusionarla en una sola idea.
  - El español usa «delante de» para לִפְנֵי, en paralelo natural con el sentido de presencia reverente.
