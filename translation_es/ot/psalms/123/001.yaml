translation:
  language: es
  text: Cántico de las subidas[a]. A ti levanto mis ojos, oh tú que estás entronizado[b] en los cielos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de ascensiones»; el hebreo puede entenderse como título tradicional de la colección, sin precisar si alude a peregrinaciones, gradas o elevación litúrgica.
    reason: lexical_alternative
  - marker: b
    text: O «que te sientas en los cielos»; el verbo hebreo literalmente significa «sentarse/habitar», pero aquí probablemente lleva matiz regio, de ahí «entronizado».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «en los cielos»; algunas versiones simplifican a «en el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: Song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Canción
  - Salmo
  lexicon: HALOT
  rationale: En el encabezado poético, שִׁיר designa un canto o cántico; «Cántico» conserva el género litúrgico y suena más natural en español bíblico que «Canción». «Salmo» sería más interpretativo para el título específico, pero el hebreo dice literalmente «canto».
- source_word: הַמַּעֲלוֹת
  english_pob_choice: of Ascents
  chosen_spanish: de Ascensos
  alternatives_spanish:
  - de subidas
  - de gradas
  lexicon: HALOT
  rationale: La colección está titulada con el sustantivo de «subida/ascenso». «Ascensos» mantiene la imagen del hebreo sin resolverla artificialmente como peregrinación o escalones.
- source_word: אֵלֶיךָ
  english_pob_choice: To you
  chosen_spanish: A ti
  alternatives_spanish:
  - Para ti
  - Hacia ti
  lexicon: HALOT
  rationale: La preposición אֶל expresa dirección en un acto de oración; «A ti» es la equivalencia natural en español y conserva el movimiento de la súplica.
- source_word: נָשָׂאתִי
  english_pob_choice: I lift up
  chosen_spanish: levanto
  alternatives_spanish:
  - he levantado
  - alzo
  lexicon: HALOT
  rationale: El perfecto hebreo funciona aquí con valor verbal vivo en la poesía; «levanto» comunica mejor el acto actual de oración que un pasado literal en español. «Alzo» es posible, pero menos usual en este registro.
- source_word: אֶת עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi mirada
  - mis ojos alzados
  lexicon: HALOT
  rationale: 'Se conserva la concreción idiomática del hebreo: no se sustituye por «mirada» porque el texto dice literalmente «ojos» y esa imagen es parte del poema.'
- source_word: הַיֹּשְׁבִי
  english_pob_choice: who are enthroned
  chosen_spanish: que estás entronizado
  alternatives_spanish:
  - que te sientas
  - que habitas
  lexicon: HALOT
  rationale: El verbo ישׁב literalmente significa sentarse/estar sentado o habitar, pero el contexto de Dios en los cielos permite el matiz real-regio que la POB inglesa explicitó con «enthroned». «Estás entronizado» preserva esa tensión sin borrar el trasfondo de «sentarse/habitar».
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: HALOT
  rationale: Se mantiene el plural hebreo «los cielos», más cercano a la forma fuente y al registro elevado del salmo. «En el cielo» sería más idiomático, pero atenúa la forma plural del original.
theological_decisions:
- issue: Cómo traducir el адресatario divino en la cláusula final sin perder el matiz regio ni borrar la cercanía de la imagen verbal
  english_pob_reading: O you who are enthroned in the heavens
  chosen_spanish_reading: oh tú que estás entronizado en los cielos
  alternative_spanish_readings:
  - tú que te sientas en los cielos
  - tú que habitas en los cielos
  rationale: El hebreo no usa el nombre divino aquí; la traducción conserva el vocativo directo y, siguiendo el audit trail inglés, hace explícito el matiz de realeza con «entronizado». No se resuelve la tensión entre «sentarse/habitar» y «reinar» eliminando una de las dos, sino que se deja visible en la elección española.
  doctrine_reference: Mantener la tensión léxica y reverente del texto sin agregar formulaciones dogmáticas externas.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con la lectura final inglesa sin cambios sustantivos; se preservan las decisiones de la POB sobre el título, el gesto de oración y el matiz regio del destinatario celestial.
  spanish_consistency_notes:
  - Se prefirió «Cántico» para שִׁיר por coherencia con el encabezado poético y por evitar una lectura demasiado genérica.
  - Se mantuvo «los cielos» para respetar el plural hebreo.
  - «Entronizado» se eligió como solución española para hacer audible el matiz de realeza que la POB inglesa documenta en «enthroned».
