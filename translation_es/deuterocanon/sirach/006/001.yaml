translation:
  language: es
  text: Un nombre malo hereda vergüenza y oprobio[a][b]; así es el pecador de doble lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La evidencia hebrea conservada es más breve y dice aproximadamente: ''Un nombre malo [hereda/trae] vergüenza y oprobio; así es un hombre malo, poseedor de dos [cosas]''. El griego añade la advertencia inicial: ''No te hagas enemigo en lugar de amigo'', e interpreta la expresión final como ''de doble lengua''.'
    reason: textual_variant
  - marker: b
    text: O 'de lengua doble'. La expresión hebrea es oscura, pero el griego hace explícito ese sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁם רַע / ὄνομα πονηρόν
  english_pob_choice: an evil name
  chosen_spanish: un nombre malo
  alternatives_spanish:
  - un nombre perverso
  - una mala reputación
  lexicon: HALOT; BDAG
  rationale: Se conserva la imagen literal de 'nombre' para no convertir de inmediato el dicho en una paráfrasis de reputación; 'malo' reproduce con naturalidad el valor moral de רַע / πονηρόν en español.
- source_word: וְקָלוֹן / αἰσχύνη
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - afrenta
  lexicon: HALOT; BDAG
  rationale: El término apunta a vergüenza pública o deshonra. 'Vergüenza' es directo y claro; se mantiene como el primer elemento del par, con 'oprobio' para distinguir el segundo.
- source_word: חֶרְפָּה / ὄνειδος
  english_pob_choice: disgrace
  chosen_spanish: oprobio
  alternatives_spanish:
  - desgracia
  - reproche
  lexicon: HALOT; BDAG
  rationale: '''Oprobio'' expresa bien la carga social de reproche/vergüenza pública y distingue este segundo término del primero sin perder el matiz de afrenta.'
- source_word: תּוֹרִישׁ / κληρονομήσει
  english_pob_choice: will inherit
  chosen_spanish: hereda
  alternatives_spanish:
  - heredará
  - recibe
  lexicon: HALOT; BDAG
  rationale: La metáfora hereditaria se conserva. En español, el presente proverbial 'hereda' suena natural y transmite una verdad general, como en el ajuste revisado del POB inglés.
- source_word: ὁ ἁμαρτωλός
  english_pob_choice: a sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - un pecador
  - el hombre pecador
  lexicon: BDAG
  rationale: El griego usa el sustantivo definido; en español 'el pecador' mantiene la referencia genérica y proverbial sin introducir una cualificación adicional que no esté en el texto.
- source_word: ὁ δίγλωσσος / בַּעַל שְׁתָּיִם
  english_pob_choice: of double tongue
  chosen_spanish: de doble lengua
  alternatives_spanish:
  - doble lengua
  - doble hablador
  lexicon: HALOT; BDAG
  rationale: Se preserva la imagen idiomática y la tensión entre el hebreo oscuro y la aclaración griega. 'De doble lengua' mantiene la metáfora y resulta entendible en español.
theological_decisions:
- issue: Tratamiento del contraste hebreo-griego en una sección con desajuste mayor
  english_pob_reading: A composite translation that includes the clear Greek admonition and the shared warning about evil reputation, while preserving the Hebrew-Greek difference in a footnote.
  chosen_spanish_reading: Una traducción compuesta que sigue el núcleo compartido y deja constancia de la diferencia textual en nota.
  alternative_spanish_readings:
  - 'Traducir solo el hebreo: ''Un nombre malo hereda vergüenza y oprobio; así es un hombre malo, dueño de dos [cosas].'''
  - 'Traducir solo el griego: ''En lo grande y en lo pequeño no ignores, y en lugar de amigo no te hagas enemigo...'''
  rationale: La fuente hebrea conservada es más breve y ambigua, mientras que el griego ofrece la formulación proverbial clara sobre el nombre malo, la vergüenza y el oprobio. La versión española sigue ese núcleo verificable y documenta la divergencia textual sin resolverla artificialmente.
  doctrine_reference: 'PHILOSOPHY.md: usar el testimonio griego paralelo como entrada real de traducción cuando el hebreo es escaso o divergente; DOCTRINE.md: conservar la tensión textual en vez de ocultarla.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando ambas notas con sus marcas exactas en el texto español. La redacción también evita añadir cláusulas no sustentadas por el testimonio hebreo conservado, mientras preserva la aclaración griega sobre la lengua doble.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto solo cuando aparezca el Nombre divino; este versículo no lo contiene.
  - '''Pecador'' se eligió para reflejar el griego ὁ ἁμαρτωλός, mientras que ''de doble lengua'' conserva la metáfora idiomática y la nota ofrece la alternativa ''de doble lengua'' como aclaración.'
  - Se mantuvo un español neutro y eclesial, evitando calcos innecesarios, pero conservando el paralelismo proverbial del texto fuente.
