    issue: «al camino de Sinaí y Cades-barnea» suena poco natural en español
    rationale: Aunque reproduce de cerca la construcción griega, en español resulta rígida y algo opaca. La idea es ponerlos en la ruta o camino asociado con esos lugares; «por la ruta de…» o «por el camino de…» comunica mejor el sentido.
  - severity: low
