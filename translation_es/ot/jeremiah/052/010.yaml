translation:
  language: es
  text: Entonces el rey de Babilonia degolló a los hijos de Sedequías delante de sus ojos, y también degolló a todos los oficiales[a] de Judá en Ribla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todos los príncipes de Judá'. El hebreo שָׂרֵי puede denotar gobernantes de alto rango, oficiales o príncipes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחַט / שָׁחַט
  english_pob_choice: slaughtered
  chosen_spanish: mató
  alternatives_spanish:
  - degolló
  - sacrificó
  - sacrificó por degüello
  lexicon: HALOT
  rationale: En español, 'slaughtered' puede sonar demasiado animalizante o técnico; para un registro bíblico natural y digno, 'mató' comunica la ejecución violenta sin forzar un calco. 'Degolló' preservaría más el matiz literal de שׁחט, pero en español suena más restringido y menos natural para personas.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  - el rey de los babilonios
  lexicon: HALOT
  rationale: Es una relación constructa simple. 'El rey de Babilonia' es la forma clara, estándar y fiel en español.
- source_word: בְּנֵי צִדְקִיָּהוּ
  english_pob_choice: the sons of Zedekiah
  chosen_spanish: los hijos de Sedequías
  alternatives_spanish:
  - los hijos de Zedecías
  - los hijos de Zedequías
  lexicon: HALOT
  rationale: '''בְּנֵי'' es literalmente ''hijos'' y el POB inglés también lo mantiene. ''Sedequías'' es la forma española usual del nombre.'
- source_word: לְעֵינָיו
  english_pob_choice: before his eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - en su presencia
  - a la vista de él
  lexicon: HALOT
  rationale: 'La expresión española ''delante de sus ojos'' reproduce la fuerza idiomática del hebreo: Zedequías vio la ejecución. ''Ante sus ojos'' también sería posible, pero ''delante de sus ojos'' suena más natural y vívido en español contemporáneo.'
- source_word: וְגַם
  english_pob_choice: and he also
  chosen_spanish: y también
  alternatives_spanish:
  - y además
  - además
  lexicon: HALOT
  rationale: El hebreo añade continuidad y énfasis. En español, 'y también' conserva ese valor aditivo de modo sencillo y fiel; no hace falta repetir el sujeto si la coordinación ya es clara.
- source_word: כָּל שָׂרֵי יְהוּדָה
  english_pob_choice: all the officials of Judah
  chosen_spanish: todos los oficiales de Judá
  alternatives_spanish:
  - todos los príncipes de Judá
  - todos los gobernantes de Judá
  - todos los jefes de Judá
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar gobernantes, oficiales o príncipes. Siguiendo la decisión inglesa, 'oficiales' comunica bien a los altos funcionarios sin imponer la idea hereditaria que 'príncipes' puede sugerir en español.
- source_word: בְּרִבְלָה
  english_pob_choice: at Riblah
  chosen_spanish: en Ribla
  alternatives_spanish:
  - en Riblah
  - a Ribla
  lexicon: HALOT
  rationale: Ribla es un topónimo. 'En Ribla' es la preposición locativa más natural en español; se mantiene la identificación del lugar sin añadir información.
theological_decisions:
- issue: Alcance de שָׂרֵי יְהוּדָה
  english_pob_reading: all the officials of Judah
  chosen_spanish_reading: todos los oficiales de Judá
  alternative_spanish_readings:
  - todos los príncipes de Judá
  - todos los líderes de Judá
  rationale: El término hebreo puede referirse a distintas categorías de élite dirigente. Se conserva la opción más sobria y amplia ('oficiales') para no cerrar el rango semántico más de lo que permite el texto.
  doctrine_reference: Jer 52:10; lexical semantics of שַׂר / שָׂרִים
translation_notes:
  revision_awareness: El paso de la auditoría inglesa muestra alta concordancia y no introduce revisiones. Esta versión española sigue la misma lectura, manteniendo la repetición verbal y la ambigüedad controlada de שָׂרֵי sin ampliar el sentido. No se documentan cambios textuales ni decisiones de revisión adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - '''Sedequías'' sigue la forma española estable para el nombre propio.'
  - Se preserva la repetición verbal con 'mató ... y también mató' para reflejar la reiteración hebrea de שׁחט.
  - El topónimo se normaliza como 'Ribla' en español, sin alterar el referente geográfico.
  - El registro es sobrio y narrativo, apto para lectura pública y consistente con el estilo POB.
