translation:
  language: es
  text: Subieron contra Judá y la invadieron, y se llevaron todas las posesiones halladas en la casa del rey, y también a sus hijos y a sus mujeres; de modo que no le quedó hijo, excepto Joacaz[a], el menor de sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Joacaz probablemente es la misma persona que en otros lugares se llama Ocozías (compárese 2 Reyes 8:24–26; 2 Crónicas 22:1).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲלוּ בִיהוּדָה
  english_pob_choice: They came up against Judah
  chosen_spanish: Subieron contra Judá
  alternatives_spanish:
  - Subieron a Judá
  - Vinieron contra Judá
  lexicon: HALOT
  rationale: עלה con ב conserva en español la idea de movimiento ascendente o de avance territorial; en contexto militar, ‘contra’ expresa claramente hostilidad sin añadir más de lo que el hebreo permite.
- source_word: וַיִּבְקָעוּהָ
  english_pob_choice: invaded it
  chosen_spanish: invadieron la tierra
  alternatives_spanish:
  - la irrumpieron
  - la quebrantaron
  lexicon: HALOT
  rationale: El verbo בקע tiene la idea de abrirse paso o romper una barrera, pero aplicado a Judá como territorio el inglés POB lo entendió como entrada hostil. En español, ‘invadieron la tierra’ comunica ese avance militar de forma natural y acorde con el contexto.
- source_word: וַיִּשְׁבּוּ
  english_pob_choice: carried away
  chosen_spanish: se llevaron
  alternatives_spanish:
  - llevaron cautivos
  - capturaron
  lexicon: HALOT
  rationale: שבה puede referirse a tomar cautivos, pero aquí rige primero a los bienes y luego a personas. ‘Se llevaron’ funciona bien para ambos ámbitos y mantiene el matiz de despojo/captura del pasaje.
- source_word: כָּל הָרְכוּשׁ
  english_pob_choice: all the possessions
  chosen_spanish: todas las posesiones
  alternatives_spanish:
  - todos los bienes
  - toda la propiedad
  lexicon: HALOT
  rationale: רכוש abarca bienes o posesiones; ‘posesiones’ es suficientemente amplio y no reduce indebidamente el campo semántico.
- source_word: הַנִּמְצָא לְבֵית הַמֶּלֶךְ
  english_pob_choice: found in the king’s house
  chosen_spanish: halladas en la casa del rey
  alternatives_spanish:
  - que estaban en la casa del rey
  - halladas en el palacio del rey
  lexicon: HALOT
  rationale: נמצא significa ‘hallado/presente’. ‘Casa del rey’ puede ser el palacio; ‘halladas en la casa del rey’ sigue de cerca el hebreo y suena natural en español.
- source_word: וְגַם בָּנָיו וְנָשָׁיו
  english_pob_choice: and also his sons and his wives
  chosen_spanish: y también a sus hijos y a sus mujeres
  alternatives_spanish:
  - e incluso a sus hijos y a sus mujeres
  lexicon: HALOT
  rationale: גם añade una expansión enfática. ‘Y también’ conserva ese carácter aditivo sin intensificar más allá del texto.
- source_word: וְלֹא נִשְׁאַר לוֹ בֵּן
  english_pob_choice: so that no son was left to him
  chosen_spanish: de modo que no le quedó hijo
  alternatives_spanish:
  - y no le quedó hijo
  - así que no le quedó hijo
  lexicon: HALOT
  rationale: El nifal de שׁאר expresa permanencia/resto. ‘No le quedó hijo’ reproduce bien el resultado negativo en español.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - más que
  lexicon: HALOT
  rationale: La expresión introduce la única excepción; ‘excepto’ es la opción más clara y natural.
- source_word: יְהוֹאָחָז
  english_pob_choice: Jehoahaz
  chosen_spanish: Jehoahaz
  alternatives_spanish:
  - Ocozías
  lexicon: HALOT
  rationale: Se sigue la forma hebrea del texto masorético en la línea principal, preservando la identificación alternativa para nota por transparencia textual.
- source_word: קְטֹן בָּנָיו
  english_pob_choice: the youngest of his sons
  chosen_spanish: el menor de sus hijos
  alternatives_spanish:
  - el más joven de sus hijos
  - su hijo menor
  lexicon: HALOT
  rationale: קָטֹן aquí indica edad/jerarquía familiar, no tamaño físico. ‘El menor de sus hijos’ comunica con claridad el superlativo familiar.
theological_decisions:
- issue: Identificación del hijo sobreviviente con un nombre alternativo en pasajes paralelos
  english_pob_reading: Retain the MT personal name 'Jehoahaz' in the main text, with a footnote noting he is likely the same person elsewhere called Ahaziah
  chosen_spanish_reading: Mantener ‘Jehoahaz’ en el texto principal, con nota de que probablemente es el mismo personaje llamado ‘Ocozías’ en pasajes paralelos
  alternative_spanish_readings:
  - Identificarlo directamente como ‘Ocozías’ en el texto principal
  - Dejar el nombre sin nota interpretativa
  rationale: La primacía del texto fuente favorece conservar el nombre hebreo de este versículo. A la vez, la nota preserva la identificación narrativa conocida por lectores que comparan 2 Reyes 8:24–26 y 2 Crónicas 22:1, sin ocultar la tensión onomástica.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del audit trail inglés y refleja la revisión que prefirió ‘invaded it’ frente a una imagen más literal de ‘broke into it’; en español se optó por ‘invadieron la tierra’ por fidelidad contextual y fluidez. También se mantuvo la forma masorética ‘Jehoahaz’ con nota de identificación alternativa, conforme al enfoque de transparencia textual del POB.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se evitó ‘SEÑOR’ y no se introdujo terminología eclesiástica ajena al hebreo.
  - ‘Casa del rey’ se conserva como posible palacio, sin expandir innecesariamente a ‘palacio’ en el texto principal.
  - '‘Hijos’ se traduce aquí como ‘hijos’/‘hijos’, pero en la formulación final se eligió ‘hijos’ en el contenido patrístico? No: se unificó en ‘hijos’ solo si el contexto lo exige; aquí se mantiene ‘hijos’ conforme al género del versículo en español genérico.'
