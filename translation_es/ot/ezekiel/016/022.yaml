translation:
  language: es
  text: Y en todas tus abominaciones y tus prostituciones[a], no te acordaste de los días de tu juventud, cuando estabas desnuda y descubierta[b], revolcándote[c] en tu sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tus actos de prostitución'; el hebreo usa el lenguaje de prostitución para la infidelidad pactal e idólatra de Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: O 'desnuda y expuesta'.
    reason: lexical_alternative
  - marker: c
    text: O 'retorciéndote en tu sangre' o 'removiéndote en tu sangre'; el verbo hebreo describe una condición indefensa, agitada y cubierta de sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבֹתַיִךְ
  english_pob_choice: your abominations
  chosen_spanish: tus abominaciones
  alternatives_spanish:
  - tus actos detestables
  lexicon: HALOT
  rationale: אַבּוֹמִינָC formula retains the prophetic force of תּוֹעֵבָה as algo abominable o detestable. 'Abominaciones' es un equivalente claro y natural en español bíblico contemporáneo sin suavizar la acusación.
- source_word: תַזְנֻתַיִךְ
  english_pob_choice: your prostitutions
  chosen_spanish: tus prostituciones
  alternatives_spanish:
  - tus actos de prostitución
  - tus fornicaciones
  lexicon: HALOT
  rationale: Conserva la metáfora sexual concreta y el plural del hebreo. 'Prostituciones' mantiene mejor que 'infidelidades' la carga imagética de la denuncia profética y su sentido de infidelidad pactal e idolátrica.
- source_word: לֹא זכרתי
  english_pob_choice: you did not remember
  chosen_spanish: no te acordaste
  alternatives_spanish:
  - no recuerdas
  - no te acordaste de
  lexicon: HALOT
  rationale: El sentido directo del perfecto con negación es que Jerusalén no recordó su condición anterior. 'No te acordaste' suena natural en español y conserva la imputación personal.
- source_word: יְמֵי נְעוּרָיִךְ
  english_pob_choice: the days of your youth
  chosen_spanish: los días de tu juventud
  alternatives_spanish:
  - tus días de juventud
  lexicon: HALOT
  rationale: Equivalente cercano y idiomático del sintagma constructo. Mantiene la referencia temporal a la condición inicial y vulnerable de Jerusalén.
- source_word: עֵרֹם וְעֶרְיָה
  english_pob_choice: naked and bare
  chosen_spanish: desnuda y descubierta
  alternatives_spanish:
  - desnuda y expuesta
  - desnuda y al descubierto
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica la vulnerabilidad. 'Desnuda y descubierta' refleja esa duplicación con un par natural en español; 'descubierta' comunica exposición sin perder la repetición enfática.
- source_word: מִתְבּוֹסֶסֶת בְּדָמֵךְ
  english_pob_choice: wallowing in your blood
  chosen_spanish: revolcándote en tu sangre
  alternatives_spanish:
  - retorciéndote en tu sangre
  - removiéndote en tu sangre
  lexicon: HALOT
  rationale: El hitpolel expresa una condición agitada, humillante y de total indefensión, como en Ez 16:6. 'Revolcándote en tu sangre' conserva la imagen corporal fuerte y el matiz de miseria extrema que el inglés POB deja en 'wallowing'.
- source_word: וְאֵת כָּל ... וְ...
  english_pob_choice: And in all your abominations and your prostitutions
  chosen_spanish: Y en todas tus abominaciones y tus prostituciones
  alternatives_spanish:
  - Y con todas tus abominaciones y tus prostituciones
  - Y entre todas tus abominaciones y tus prostituciones
  lexicon: HALOT
  rationale: La partícula con אֵת más el contexto adverbial exige una relación circunstancial amplia. 'En todas' reproduce bien el valor de 'amid/in the course of' sin cargar el verso con una paráfrasis excesiva.
theological_decisions:
- issue: Metáfora sexual profética para la infidelidad pactal
  english_pob_reading: Retain the concrete metaphor 'prostitutions' rather than replacing it with an abstract theological term like 'unfaithfulness.'
  chosen_spanish_reading: Mantener 'prostituciones' y no sustituirlo por 'infidelidad' o 'idolatría'.
  alternative_spanish_readings:
  - tu infidelidad
  - tu idolatría
  rationale: Ezequiel usa deliberadamente una imagen sexual escandalosa para denunciar la ruptura del pacto. Traducirla con un abstracto diluiría la fuerza retórica y trasladaría demasiada interpretación fuera del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con la lectura del POB en inglés: mantiene la fuerza de la denuncia profética, conserva la metáfora sexual concreta y refleja la doble imagen de desnudez/exposición y la acción corporal de מִתְבּוֹסֶסֶת. No se requirieron revisiones adicionales según el audit trail más reciente.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Prostituciones'' se usa como término técnico coherente con la decisión POB de mantener la metáfora concreta.'
  - '''Desnuda y descubierta'' evita suavizar la duplicación hebrea y mantiene paralelismo.'
  - '''Revolcándote en tu sangre'' armoniza con el eco de Ezequiel 16:6 y con la imagen de extrema vulnerabilidad.'
