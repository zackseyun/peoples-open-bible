translation:
  language: es
  text: ¡Mira[a], el guardián de Israel no dormita ni duerme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí, el guardián de Israel no dormita ni duerme».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira!
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: El hebreo introduce una llamada enfática a prestar atención. «¡Mira!» conserva esa fuerza deíctica de manera natural en español moderno; «He aquí» sería más tradicional, pero más arcaizante.
- source_word: לֹא יָנוּם
  english_pob_choice: neither slumbers
  chosen_spanish: no dormita
  alternatives_spanish:
  - no cabecea
  - no se adormece
  - no duerme
  lexicon: HALOT
  rationale: Yָנוּם expresa una somnolencia ligera o cabeceo, distinta del verbo posterior para dormir. «Dormita» mantiene esa distinción mejor que «duerme».
- source_word: וְלֹא יִישָׁן
  english_pob_choice: nor sleeps
  chosen_spanish: ni duerme
  alternatives_spanish:
  - ni se duerme
  - ni concilia el sueño
  lexicon: HALOT
  rationale: יִישָׁן es el verbo ordinario de dormir. «Ni duerme» preserva el paralelo con la primera negación y la diferencia léxica con «dormita».
- source_word: שׁוֹמֵר
  english_pob_choice: the keeper
  chosen_spanish: el guardián
  alternatives_spanish:
  - el que guarda
  - el vigilante
  - el guardador
  lexicon: HALOT
  rationale: El participio funciona sustantivamente. «Guardián» comunica bien la idea de cuidado vigilante en español, aunque «el que guarda» sería más literal; se opta por una forma nominal natural y solemne.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Nombre propio mantenido sin cambio.
theological_decisions:
- issue: Vigilancia divina expresada antropomórficamente
  english_pob_reading: The verse states metaphorically that Israel's divine keeper is never inattentive or inactive.
  chosen_spanish_reading: El verso expresa en forma metafórica que el guardián de Israel nunca está distraído ni inactivo.
  alternative_spanish_readings:
  - Una afirmación estrictamente literal de que Dios no puede dormir
  rationale: Se conserva la imagen poética sin resolverla filosóficamente. En español, «no dormita ni duerme» mantiene la fuerza antropomórfica y la tensión teológica del texto.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: The English POB currently reads 'Look[a], the keeper of Israel neither slumbers nor sleeps.' with footnote a offering 'Behold' and a future-like alternative; the Spanish draft follows the same sense and preserves the slumber/sleep distinction with a natural Spanish parallel.
  spanish_consistency_notes:
  - Se mantiene «Israel» como nombre propio.
  - Se evita «SEÑOR» porque el hebreo aquí no contiene el tetragrámaton.
  - «Dormita» distingue la somnolencia ligera de «duerme», reflejando la pareja verbal hebrea.
  - La puntuación exclamativa en «¡Mira!» reproduce el valor exhortativo del deíctico hebreo.
