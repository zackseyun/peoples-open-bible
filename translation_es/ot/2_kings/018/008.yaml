translation:
  language: es
  text: Él derrotó a los filisteos hasta Gaza y su territorio[a], desde la torre de vigías hasta la ciudad fortificada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y sus fronteras». El hebreo puede referirse tanto a líneas limítrofes como al territorio perteneciente a Gaza.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde la torre de vigías hasta la ciudad fortificada», una manera de decir desde el puesto más pequeño hasta el asentamiento defensivo más grande.'
    reason: cultural_note
lexical_decisions:
- source_word: הוּא
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Él mismo
  - Y él
  lexicon: HALOT
  rationale: Se conserva el pronombre explícito del hebreo para mantener la claridad narrativa y el relieve enfático, sin añadir información.
- source_word: הִכָּה
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derrotó
  - hirió de muerte
  lexicon: HALOT
  rationale: En español, 'hirió' mantiene la imagen verbal de un golpe/ataque militar sin reducirlo a una simple derrota interpretativa; además puede abarcar el uso bélico del verbo hebreo.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Es la designación étnica estándar y directa en español bíblico.
- source_word: עַד עַזָּה
  english_pob_choice: as far as Gaza
  chosen_spanish: hasta Gaza
  alternatives_spanish:
  - así como Gaza
  - hasta llegar a Gaza
  lexicon: HALOT
  rationale: '''Hasta'' expresa con naturalidad el alcance territorial indicado por עַד sin forzar una interpretación adicional.'
- source_word: וְאֶת גְּבוּלֶיהָ
  english_pob_choice: and its territory
  chosen_spanish: y su territorio
  alternatives_spanish:
  - y sus fronteras
  - y sus límites
  - y su región
  lexicon: HALOT
  rationale: '''Territorio'' preserva la amplitud posible de גְּבוּל en este contexto: no solo una línea fronteriza, sino la zona perteneciente a Gaza. La nota recoge la alternativa de ''fronteras''.'
- source_word: מִמִּגְדַּל נוֹצְרִים
  english_pob_choice: from watchtower
  chosen_spanish: desde la torre de vigías
  alternatives_spanish:
  - desde la atalaya
  - desde la torre de guardia
  - desde la torre de los vigilantes
  lexicon: HALOT
  rationale: La construcción idiomática se vierte de forma transparente en español como 'torre de vigías', conservando la imagen de un puesto de observación. 'Vigías' refleja el participio sustantivado נוֹצְרִים con naturalidad.
- source_word: עַד עִיר מִבְצָר
  english_pob_choice: to fortified city
  chosen_spanish: hasta la ciudad fortificada
  alternatives_spanish:
  - hasta una ciudad fortificada
  - hasta la ciudad amurallada
  - hasta la ciudad-fortaleza
  lexicon: HALOT
  rationale: '''Ciudad fortificada'' es la equivalencia más directa y reconocible para עִיר מִבְצָר, preservando el contraste con el puesto menor anterior.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con la solución de la POB en el alcance territorial y en el sentido idiomático de la expresión final; no se introdujeron revisiones posteriores en el pasaje auditado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió 'filisteos' en minúscula por ser etnónimo común en español.
  - '''Torre de vigías'' conserva el paralelismo idiomático del hebreo con un español natural y registrable.'
