  revision_rationale: Se corrige פָחַת de «cueva» a «foso» para alinearlo con el hebreo y con el audit trail inglés, preservando la imagen de peligro/trampa. Se mantiene «boca» por fidelidad poética a פִּי y se reubica la nota al pie en el término correcto. El resto del versículo puede conservarse porque refleja bien la sintaxis imperativa y el tono profético.
