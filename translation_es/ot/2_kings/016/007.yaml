translation:
  language: es
  text: 'Entonces Ajaz envió mensajeros a Tiglat-pileser, rey de Asiria[a], diciendo: «Yo soy tu siervo y tu hijo. Sube y sálvame de la mano del rey de Aram y de la mano del rey de Israel[c][b], que se están levantando contra mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu vasallo y tu hijo'; el hebreo usa lenguaje diplomático de sumisión literalmente, 'tu siervo y tu hijo'.
    reason: lexical_alternative
  - marker: b
    text: '''Aram'' se traduce tradicionalmente como ''Siria''.'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: ''de la mano de'', un modismo que significa ''del poder de''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo pide un pasado simple natural en español; 'envió' conserva el acto de remisión sin forzar un matiz militar que el hebreo no añade explícitamente.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: En este contexto político son emisarios humanos. 'Mensajeros' es transparente y no introduce el tecnicismo diplomático de 'embajadores'.
- source_word: תִּגְלַת פְּלֶסֶר
  english_pob_choice: Tiglath-pileser
  chosen_spanish: Tiglat-pileser
  alternatives_spanish:
  - Tiglat-Pileser
  - Tiglat-piléser
  lexicon: Uso histórico-transliteración estándar
  rationale: Se adopta la forma castellana usual del nombre asirio, manteniendo la referencia histórica reconocible sin latinizarla artificialmente.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - rey de Asiria
  lexicon: HALOT
  rationale: La construcción de título y reino se vierte de modo directo y claro; 'Asiria' es la forma usual en español para el reino.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu vasallo
  lexicon: HALOT
  rationale: El término básico es 'esclavo'; el contexto diplomático suaviza la dureza, pero el español mantiene la fuerza del auto-humillarse. Se evita 'siervo' por tender a domesticar el valor léxico del hebreo.
- source_word: וּבִנְךָ
  english_pob_choice: and your son
  chosen_spanish: y tu hijo
  alternatives_spanish:
  - y tu hijo
  lexicon: HALOT
  rationale: Se conserva la metáfora política de subordinación con el término de parentesco 'hijo', tal como en el hebreo y en la tradición textual auditada.
- source_word: עֲלֵה
  english_pob_choice: Come up
  chosen_spanish: Sube
  alternatives_spanish:
  - Ven
  - Marcha
  lexicon: HALOT
  rationale: '''Sube'' reproduce el imperativo idiomático de עלה y conserva la imaginería espacial sin explicitar más de lo que el texto dice.'
- source_word: וְהוֹשִׁיעֵנִי
  english_pob_choice: save me
  chosen_spanish: sálvame
  alternatives_spanish:
  - líbrame
  - rescátame
  lexicon: HALOT
  rationale: La forma hiphil de ישׁע se traduce de manera directa con 'sálvame', manteniendo continuidad léxica con el campo semántico bíblico de la salvación, aunque aquí sea una petición político-militar.
- source_word: מִכַּף
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la mano
  lexicon: HALOT
  rationale: Se conserva el idiomático 'mano' para transparencia frente al hebreo, tal como hace la traducción inglesa auditada.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se mantiene el topónimo original 'Aram' para respetar la primacía del fuente hebrea y evitar la equivalencia tradicional 'Siria', que puede ser histórica pero menos precisa aquí.
- source_word: הַקּוֹמִים עָלַי
  english_pob_choice: who are rising up against me
  chosen_spanish: que se están levantando contra mí
  alternatives_spanish:
  - que se han levantado contra mí
  - que me atacan
  lexicon: HALOT
  rationale: El participio expresa acción hostil en curso; 'se están levantando' preserva el aspecto y la imagen verbal de manera natural en español.
theological_decisions:
- issue: Lenguaje de sumisión política expresado con 'esclavo' e 'hijo'
  english_pob_reading: Rendered literally as 'your servant and your son'
  chosen_spanish_reading: '''tu esclavo y tu hijo'''
  alternative_spanish_readings:
  - '''tu vasallo y tu hijo'''
  - '''tu siervo y tu hijo'''
  rationale: La frase hebrea usa lenguaje diplomático de sometimiento, pero el texto mismo emplea 'esclavo/siervo' y 'hijo'. Se preserva la tensión entre literalidad y sentido político sin sustituirla por un tecnicismo interpretativo en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Valor de 'salva/sálvame' en una petición de auxilio militar
  english_pob_reading: Retained 'save me' rather than narrowing to 'rescue me' in the main text
  chosen_spanish_reading: '''sálvame'''
  alternative_spanish_readings:
  - '''líbrame'''
  - '''rescátame'''
  rationale: En español, 'sálvame' conserva la conexión bíblica amplia del verbo sin borrar que aquí la petición es político-militar. El contexto delimita el sentido inmediato sin necesidad de cambiar el campo léxico.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: no se requirieron cambios tras la última pasada editorial, y el cotejo indicó alto acuerdo (1.0).'
  spanish_consistency_notes:
  - Se mantiene 'Aram' en el texto principal y se anota la alternativa tradicional 'Siria' en nota.
  - Se preserva la distinción entre 'esclavo' y 'hijo' como lenguaje de sumisión diplomática, sin convertirlo en 'vasallo' en el cuerpo principal.
  - Se conserva la imaginería hebrea de 'mano' y el imperativo espacial 'sube' para transparencia al original.
  - La puntuación y las comillas siguen normas españolas, con un estilo publicable y legible para lectura eclesial.
