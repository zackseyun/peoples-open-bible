review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: asignación a los hijos de Merari restantes, desde la tribu de Zabulón, con dos ciudades y sus terrenos anexos. También conserva correctamente la variante textual en nota para רִמּוֹנוֹ. Sin embargo, el marcador de nota [a] está mal anclado en «quedaron» cuando la nota trata del topónimo «Rimono», no del participio הַנּוֹתָרִים.'
  spanish_quality_summary: El español es claro y legible, pero requiere una corrección importante de anclaje de nota. Además, «dehesas» suena regional y algo específico para el ámbito ibérico; en un español neutro eclesial más amplio, «pastizales» o «tierras de pastoreo» comunica mejor la idea de מִגְרָשֶׁיהָ sin localismo. «A los hijos de Merari que quedaron» es natural.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Los nombres propios están bien conservados. «Zabulón» es aceptable en español bíblico. La principal desviación de estilo del proyecto es léxica/registeral: «dehesas» no es la mejor opción para un español neutral latinoamericano cuando el inglés POB documenta «pasturelands».'
  issues:
  - severity: high
    issue: Marcador de nota mal colocado
    rationale: La nota [a] explica la variante textual de רִמּוֹנוֹ / Dimna, pero en el borrador está anclada a «quedaron». El anclaje debe aparecer en «Rimono[a]».
  - severity: medium
    issue: «dehesas» no es la mejor equivalencia panhispánica para מִגְרָשֶׁיהָ
    rationale: Aunque puede solapar semánticamente con terreno de pastoreo, «dehesa» es regional y culturalmente cargado. «Pastizales» o «tierras de pastoreo» refleja mejor el término levítico en español neutral.
  revised_spanish_text: 'A los hijos de Merari que quedaron, de la tribu de Zabulón: Rimono[a] y sus pastizales, Tabor y sus pastizales.'
  revised_footnotes:
  - marker: a
    text: El hebreo dice «Rimono»; el paralelo en Josué 21:35 tiene «Dimna».
    reason: textual_variant
  revision_rationale: Se corrige el anclaje de la nota textual para que corresponda al topónimo en cuestión y se sustituye «dehesas» por «pastizales» para lograr un español más neutral y más alineado con el sentido de «pasturelands» en este contexto levítico.
