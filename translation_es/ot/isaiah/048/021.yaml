translation:
  language: es
  text: No tuvieron sed cuando los condujo por los desiertos[a]; hizo fluir agua para ellos de la roca; partió la roca[b], y brotó agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los desiertos» o «por los lugares secos».
    reason: lexical_alternative
  - marker: b
    text: El versículo remite a la provisión de agua de la roca en el desierto (por ejemplo, Éxodo 17:6; Números 20:11).
    reason: cross_reference
lexical_decisions:
- source_word: צָמְאוּ
  english_pob_choice: did not thirst
  chosen_spanish: no tuvieron sed
  alternatives_spanish:
  - no sintieron sed
  - no estaban sedientos
  lexicon: HALOT
  rationale: El verbo hebreo expresa experimentar sed; en español, «no tuvieron sed» conserva el hecho verbal de la experiencia mejor que una adjetivación estática.
- source_word: בָּחֳרָבוֹת
  english_pob_choice: through the deserts
  chosen_spanish: por los desiertos
  alternatives_spanish:
  - en los desiertos
  - por los lugares secos
  lexicon: HALOT
  rationale: El plural señala regiones áridas y desoladas. «Desiertos» mantiene la referencia a zonas secas y «por» refleja el movimiento guiado del contexto.
- source_word: הוֹלִיכָם
  english_pob_choice: he led them
  chosen_spanish: los condujo
  alternatives_spanish:
  - los guió
  - los hizo ir
  lexicon: HALOT
  rationale: El hifil de הלך tiene valor causativo de llevar/dirigir. «Los condujo» es natural en español y conserva esa idea de dirección.
- source_word: הִזִּיל
  english_pob_choice: he made water flow
  chosen_spanish: hizo fluir agua
  alternatives_spanish:
  - hizo correr agua
  - derramó agua
  lexicon: HALOT
  rationale: 'El hifil de נזל es causativo: hacer fluir. «Hizo fluir agua» expresa con claridad la acción causativa sin perder la imagen del agua que corre.'
- source_word: מִצּוּר
  english_pob_choice: from the rock
  chosen_spanish: desde la roca
  alternatives_spanish:
  - de la roca
  - desde una roca
  lexicon: HALOT
  rationale: La referencia apunta a la roca como fuente del agua. «Desde la roca» conserva el origen del flujo y funciona bien con el verbo de movimiento del agua.
- source_word: וַיִּבְקַע צוּר
  english_pob_choice: he split the rock
  chosen_spanish: partió la roca
  alternatives_spanish:
  - hended la roca
  - quebró la roca
  lexicon: HALOT
  rationale: בקע significa partir/rajar/abrir por división. «Partió la roca» es fiel, claro y evita un calco poco natural como «hendió».
- source_word: וַיָּזֻבוּ מָיִם
  english_pob_choice: water gushed out
  chosen_spanish: las aguas brotaron
  alternatives_spanish:
  - el agua brotó
  - las aguas fluyeron
  lexicon: HALOT
  rationale: El verbo expresa salir o fluir con abundancia. «Brotaron» comunica bien el surgimiento súbito y abundante; el plural «las aguas» reproduce el hebreo y suena natural en un registro bíblico.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: he = the LORD, continuing the divine subject from context
  chosen_spanish_reading: él = Yahvé, continuando el sujeto divino del contexto
  alternative_spanish_readings:
  - sujeto implícito genérico
  - Dios como sujeto explícito
  rationale: El hebreo usa formas verbales sin sujeto nominal explícito, pero el antecedente en el contexto es Yahvé. En español se conserva el sujeto implícito mediante la flexión verbal, sin añadirlo al texto principal.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: Eco intertextual del milagro del agua en la roca
  english_pob_reading: Preserved as historical-poetic allusion without expanding the text
  chosen_spanish_reading: Preservado como alusión histórico-poética sin ampliación interpretativa
  alternative_spanish_readings:
  - explicar tipológicamente la roca
  - mencionar explícitamente Éxodo 17:6 y Números 20:11 en el cuerpo
  rationale: La traducción mantiene la imagen del agua de la roca sin insertar interpretaciones posteriores en el texto principal. La alusión bíblica queda disponible para notas, no para sobrecargar el versículo.
  doctrine_reference: Translation philosophy §1 and §3
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que prefirió una forma más directa para el plural hebreo בָּחֳרָבוֹת. En español, «por los desiertos» conserva esa decisión y mantiene el registro formal y legible del pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» en coherencia con el estándar del proyecto para el nombre divino, aunque aquí no se explicita en el texto principal por tratarse de un sujeto verbal implícito.
  - Se conservó el plural «las aguas» para reflejar el hebreo מָיִם y su estilo poético.
  - No se introdujo «Mesías», «Cristo» ni terminología doctrinal ajena al versículo.
