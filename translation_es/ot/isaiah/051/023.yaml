  rationale: Se corrige «eso» a «lo» para una referencia pronominal más natural y fiel en español; se reubica la nota [c] al lugar que realmente explica («te»), y se afina «la tierra» a «el suelo» para reflejar mejor la imagen de humillación y pisoteo. Se conserva el resto por ser sustancialmente fiel al hebreo y al rastro de auditoría inglés.
