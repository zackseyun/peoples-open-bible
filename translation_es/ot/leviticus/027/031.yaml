translation:
  language: es
  text: Pero si un hombre redime alguna parte de su diezmo[a], le añadirá un quinto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «si redimiendo redime», una construcción enfática.'
