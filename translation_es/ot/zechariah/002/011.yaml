translation:
  language: es
  text: ¡Arriba, Sion[a]! Escapa, tú que habitas en la Hija de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Ho, Sion!»; o «¡Arriba, Sion! ¡Huye, tú que habitas en la hija de Babilonia!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ה֥וֹי
  english_pob_choice: Up!
  chosen_spanish: ¡Arriba!
  alternatives_spanish:
  - ¡Ho!
  - ¡Eh!
  - ¡Ay!
  lexicon: HALOT
  rationale: La interjección funciona aquí como un llamado urgente a la acción, no como lamento. «¡Arriba!» transmite en español una exhortación inmediata y natural; «¡Ho!» sería más tradicional pero menos natural, y «¡Ay!» sugeriría dolor o duelo.
- source_word: צִיּ֖וֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico en transliteración. «Sion» es la forma más establecida en español bíblico y mantiene la referencia al pueblo/lugar personificado.
- source_word: הִמָּלְטִ֑י
  english_pob_choice: Escape
  chosen_spanish: Escapa
  alternatives_spanish:
  - Huye
  - Libérate
  lexicon: HALOT
  rationale: El imperativo nifal femenino singular de מלט pide una salida urgente y segura. «Escapa» reproduce bien el valor imperativo sin añadir demasiado contenido; «huye» es posible, pero resalta más la carrera que la salvación de salir de allí.
- source_word: יוֹשֶׁ֖בֶת
  english_pob_choice: you who dwell
  chosen_spanish: tú que habitas
  alternatives_spanish:
  - tú que moras
  - habitante
  lexicon: HALOT
  rationale: El participio femenino singular se usa vocativamente para identificar a la destinataria. «Tú que habitas» conserva la fuerza participial y suena natural en español.
- source_word: בַּת בָּבֶל
  english_pob_choice: Daughter Babylon
  chosen_spanish: la Hija Babilonia
  alternatives_spanish:
  - la hija de Babilonia
  - Hija de Babilonia
  lexicon: HALOT
  rationale: Se conserva la personificación profética del sintagma constructo. «La Hija Babilonia» refleja la estructura idiomática sin convertirla en una paráfrasis explicativa; la alternativa con «de» es más explícita pero menos cercana a la forma poética del hebreo.
theological_decisions:
- issue: Persona y referente de la exhortación femenina
  english_pob_reading: The verse addresses Zion/Jerusalem personified as a woman, calling the exiles associated with her to escape from Babylon.
  chosen_spanish_reading: El verso interpela a Sion personificada como mujer y llama a quienes están ligados a ella a salir de Babilonia.
  alternative_spanish_readings:
  - Interpela a una mujer individual en Babilonia de modo simbólico
  - Sion misma es presentada como habitando en Babilonia
  rationale: Las formas femeninas y la estructura vocativa encajan con la personificación profética de Sion. La traducción mantiene esa imagen sin resolverla en una explicación más estrecha de lo que el hebreo exige.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica y figurativa del texto, traduciendo lo que el hebreo dice de manera directa.'
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente: no se documentaron revisiones posteriores ni cambios necesarios; se mantiene la lectura de alto acuerdo con el auditor.'
  spanish_consistency_notes:
  - Se usa «Sion» en lugar de «Zion» por consistencia con el uso bíblico español común y porque la transliteración no altera el referente.
  - Se conserva «Babilonia» sin suavizarla ni sustituirla por un equivalente interpretativo, manteniendo la personificación del hebreo.
  - «Escapa» y «tú que habitas» siguen la fuerza verbal del imperativo y del participio sin volver el verso demasiado literal ni demasiado libre.
