translation:
  language: es
  text: Porque ciertamente moriremos y somos como agua derramada sobre la tierra, que no puede recogerse de nuevo. Sin embargo, Dios no quita la vida[a], sino que concibe planes para que el desterrado[b] no permanezca desterrado de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios no muestra parcialidad a una persona»; el hebreo de esta cláusula es difícil y algunos la entienden de otro modo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «para que el desterrado no sea echado lejos de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del argumento de la mujer; 'porque' preserva la conexión lógica de causa sin sonar arcaico.
- source_word: מ֣וֹת נָמ֔וּת
  english_pob_choice: we must surely die
  chosen_spanish: ciertamente moriremos
  alternatives_spanish:
  - habremos de morir
  - moriremos sin falta
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + imperfecto expresa certeza e inevitabilidad; 'ciertamente moriremos' comunica ese énfasis en español con naturalidad.
- source_word: וְכַמַּיִם הַנִּגָּרִים אַרְצָה
  english_pob_choice: and are like water poured out on the ground
  chosen_spanish: y somos como aguas derramadas sobre la tierra
  alternatives_spanish:
  - y somos como agua vertida en el suelo
  - y como aguas derramadas sobre el suelo
  lexicon: HALOT
  rationale: La imagen subraya lo irreparable de la muerte; 'aguas derramadas sobre la tierra' conserva el cuadro hebreo con una expresión idiomática clara en español.
- source_word: אֲשֶׁר לֹא יֵאָסֵפוּ
  english_pob_choice: which cannot be gathered up again
  chosen_spanish: que no se recogen otra vez
  alternatives_spanish:
  - que no pueden ser recogidas
  - que no se pueden reunir de nuevo
  lexicon: HALOT
  rationale: El nifal señala imposibilidad de recuperación; 'no se recogen otra vez' reproduce el sentido con fluidez y mantiene la imagen de las aguas dispersas.
- source_word: וְלֹא יִשָּׂא אֱלֹהִים נֶפֶשׁ
  english_pob_choice: Yet God does not take away life
  chosen_spanish: Sin embargo, Dios no quita la vida
  alternatives_spanish:
  - Sin embargo, Dios no toma la vida
  - Y Dios no quita la vida
  lexicon: HALOT
  rationale: Se conserva la dificultad del giro hebreo, pero en español 'quitar la vida' expresa de forma natural la idea de Dios no arrebatar la vida; 'Sin embargo' marca el contraste con la mortalidad anterior.
- source_word: וְחָשַׁב מַחֲשָׁבוֹת
  english_pob_choice: but devises plans
  chosen_spanish: sino que concibe planes
  alternatives_spanish:
  - pero planea
  - sino que traza planes
  lexicon: HALOT
  rationale: El binomio verbal expresa intención deliberada; 'concibe planes' conserva el carácter pensado y resuelve con naturalidad el paralelismo.
- source_word: לְבִלְתִּי יִדַּח
  english_pob_choice: so that ... will not remain banished
  chosen_spanish: para que ... no quede desterrado
  alternatives_spanish:
  - a fin de que ... no siga expulsado
  - para que ... no sea echado lejos
  lexicon: HALOT
  rationale: '''נדח'' en este contexto denota ser apartado o desterrado; ''quede desterrado'' mantiene la condición de alejamiento y la posibilidad de reversión.'
- source_word: מִמֶּנּוּ נִדָּח
  english_pob_choice: the banished one ... from him
  chosen_spanish: el desterrado ... de él
  alternatives_spanish:
  - el expulsado ... de él
  - el apartado ... de él
  lexicon: HALOT
  rationale: La forma singular comprimida pide un sustantivo definido; 'el desterrado' refleja el estado de alejamiento y permite conservar la referencia relacional 'de él'.
theological_decisions:
- issue: Interpretación de וְלֹא יִשָּׂא אֱלֹהִים נֶפֶשׁ
  english_pob_reading: God does not take away life
  chosen_spanish_reading: Dios no quita la vida
  alternative_spanish_readings:
  - Dios no muestra parcialidad a una persona
  - Dios no quita el alma
  rationale: La secuencia inmediata habla de muerte irreversible y de la acción divina que evita la exclusión permanente; por eso se mantiene la lectura de que Dios no arrebata la vida. Se preserva la tensión semántica sin resolverla en favor de la lectura de parcialidad, que aquí es posible pero menos probable en el flujo contextual.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it without documentation.'
translation_notes:
  revision_awareness: 'Se aplicó la revisión más reciente del POB inglés: se mantiene la construcción directa equivalente a ''God does not take away life'' y se refleja la forma singular definida ''the banished one'' con ''el desterrado''. Las notas preservan la alternativa documentada para la cláusula hebrea difícil.'
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים de forma consistente con el contexto inmediato.
  - Se eligió 'desterrado' para נִדָּח/יִדַּח por su fuerza de alejamiento y su naturalidad en español bíblico moderno.
  - '''Sin embargo'' reproduce el contraste lógico de וְלֹא frente a la muerte inevitable.'
  - Las notas de pie de página están ancladas exactamente en el texto con [a] y [b].
