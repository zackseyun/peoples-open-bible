review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: reversión divina del necesitado desde la aflicción y multiplicación/prosperidad de sus familias como un rebaño. Sin embargo, hay un problema de fidelidad en la nota al pie: repite como alternativa «pone en alto», que ya es la lectura principal, en vez de ofrecer la alternativa documentada «sets families like a flock» / «establece familias como un rebaño» o una variante equivalente. Además, en español «hace a sus familias como un rebaño» suena algo forzado; una formulación más natural puede conservar el mismo sentido.'
  spanish_quality_summary: El español es claro y digno, pero «hace a sus familias como un rebaño» resulta poco idiomático. «Hace que sus familias sean como un rebaño» es más natural y mantiene la causalidad del verbo hebreo. «Pone en alto» es aceptable, aunque algo literal; no requiere cambio si se mantiene la nota adecuada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Necesitado», «aflicción» y «rebaño» concuerdan bien con las decisiones léxicas auditadas. La suplencia de «sus» para מִשְׁפָּחוֹת es defendible y está bien motivada.
  issues:
  - severity: medium
    issue: Nota al pie mal formulada respecto a las alternativas documentadas
    rationale: La nota dice «O ‘pone en alto’», que no aporta una alternativa real a la lectura principal. El rastro inglés documenta como alternativas tanto «levanta al pobre desde la miseria» como una posibilidad de segmentación/sentido vinculada a la cláusula final («sets families like a flock»). La nota española debe reflejar alternativas significativas, no repetir la principal.
  - severity: low
    issue: La expresión «hace a sus familias como un rebaño» suena poco natural en español
    rationale: Aunque comprensible, la construcción con «hacer a X como Y» es menos idiomática aquí. «Hace que sus familias sean como un rebaño» comunica con mayor claridad el resultado causado por Dios y preserva el sentido del hebreo y del POB inglés.
  revised_spanish_text: Pero él pone en alto[a] al necesitado, lejos de la aflicción, y hace que sus familias sean como un rebaño.
  revised_footnotes:
  - marker: a
    text: O «levanta al pobre de la miseria»; o posiblemente, con matiz alterno en la cláusula final, «establece a las familias como un rebaño».
    reason: lexical_alternative
  revision_rationale: 'Se conserva la decisión principal «pone en alto» por su fidelidad al valor de שׂגב, pero se corrige la nota para que refleje alternativas reales del expediente inglés. También se mejora la naturalidad del español en la cláusula final sin cambiar el sentido: Dios hace que las familias del necesitado lleguen a ser como un rebaño, imagen de multiplicación y cuidado.'
