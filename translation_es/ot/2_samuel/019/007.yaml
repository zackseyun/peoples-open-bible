  to: amar a los que te odian y odiar a los que te aman. Porque has dejado claro hoy[a] que comandantes y siervos no significan nada para ti; porque sé hoy que, si Absalón estuviera vivo y todos nosotros estuviéramos muertos hoy[b], entonces eso sería correcto ante tus ojos.
