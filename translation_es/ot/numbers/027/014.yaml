translation:
  language: es
  text: porque ustedes se rebelaron contra mi mandato en el desierto de Zin, en la contienda de la congregación, al no tratarme como santo[a] en las aguas delante de sus ojos. Estas son las aguas de Meribat-Cades[b] en el desierto de Zin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al no santificarme» / «al mostrarme como santo delante de sus ojos». El infinitivo hebreo es positivo en forma, pero el contexto indica que Moisés y Aarón no hicieron esto.
    reason: lexical_alternative
  - marker: b
    text: «Meribat-Cades» también puede traducirse «Meribá de Cades» o, más literalmente, «la contienda de Cades».
    reason: alternative_reading
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - como
  - cuando
  lexicon: HALOT
  rationale: En este contexto la partícula introduce la razón de la exclusión de Moisés y Aarón; «porque» comunica con naturalidad la relación causal sin perder el sentido del hebreo.
- source_word: מְרִיתֶם
  english_pob_choice: you rebelled
  chosen_spanish: ustedes se rebelaron
  alternatives_spanish:
  - ustedes desobedecieron
  - ustedes se mostraron rebeldes
  lexicon: HALOT
  rationale: El verbo מרה expresa rebelión o desafío contra la autoridad. «Se rebelaron» conserva esa fuerza verbal y resulta claro en español.
- source_word: פִּי
  english_pob_choice: my command
  chosen_spanish: mi mandato
  alternatives_spanish:
  - mi palabra
  - mi boca
  lexicon: HALOT
  rationale: Aunque literalmente dice «mi boca», el modismo refiere a lo que sale de la boca de Dios, es decir, su orden. «Mandato» expresa bien esa idea en español sin volverlo mecánico.
- source_word: בְּמִדְבַּר צִן
  english_pob_choice: in the wilderness of Zin
  chosen_spanish: en el desierto de Zin
  alternatives_spanish:
  - en el desierto de Sin
  - en la estepa de Zin
  lexicon: HALOT
  rationale: «Desierto» es un equivalente natural y bíblico para מִדְבָּר. Se mantiene Zin como nombre propio transliterado.
- source_word: בִּמְרִיבַת הָעֵדָה
  english_pob_choice: in the strife of the congregation
  chosen_spanish: en la contienda de la congregación
  alternatives_spanish:
  - en la riña de la congregación
  - en la contienda del pueblo
  lexicon: HALOT
  rationale: «Contienda» conserva el valor de disputa o litigio del sustantivo מְרִיבָה, y «congregación» mantiene el matiz comunitario de עֵדָה.
- source_word: לְהַקְדִּישֵׁנִי
  english_pob_choice: by not treating me as holy
  chosen_spanish: al no mostrarme como santo
  alternatives_spanish:
  - al no santificarme
  - al no tratarme como santo
  - al no reconocer mi santidad
  lexicon: HALOT
  rationale: El infinitivo hifil es positivo en forma («santificarme»), pero el contexto exige la idea de no hacerlo. En español, «mostrarme como santo» transmite bien la idea de reconocer o manifestar la santidad de Dios ante el pueblo.
- source_word: בַמַּיִם
  english_pob_choice: at the waters
  chosen_spanish: en las aguas
  alternatives_spanish:
  - junto a las aguas
  - ante las aguas
  lexicon: HALOT
  rationale: El plural hebreo apunta al episodio asociado con el agua; «en las aguas» es natural y conserva la referencia locativa del relato.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ellos
  - ante sus ojos
  lexicon: HALOT
  rationale: La expresión idiomática subraya visibilidad pública. «Delante de sus ojos» conserva esa imagen con buena fluidez en español.
- source_word: הֵם
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Esas son
  - Son estas
  lexicon: HALOT
  rationale: La partícula introduce una nota identificadora sobre el lugar. «Estas son» reproduce adecuadamente el valor deíctico.
- source_word: מֵי מְרִיבַת קָדֵשׁ
  english_pob_choice: the waters of Meribath-kadesh
  chosen_spanish: las aguas de Meribat-Cades
  alternatives_spanish:
  - las aguas de Meribá de Cades
  - las aguas de la contienda de Cades
  lexicon: HALOT
  rationale: Se conserva el nombre propio compuesto con transliteración moderada al español. «Meribat-Cades» refleja la forma del topónimo sin forzar una traducción explicativa dentro del texto principal.
- source_word: קָדֵשׁ
  english_pob_choice: Kadesh
  chosen_spanish: Cades
  alternatives_spanish:
  - Cadesh
  - Kades
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional del topónimo bíblico, Cades, por claridad y lectura natural en español.
theological_decisions:
- issue: Cómo expresar לְהַקְדִּישֵׁנִי en contexto
  english_pob_reading: by not treating me as holy
  chosen_spanish_reading: al no mostrarme como santo
  alternative_spanish_readings:
  - al no santificarme
  - al no reconocer mi santidad
  - al no tratarme como santo
  rationale: La forma hebrea es positiva, pero el contexto de reprensión muestra que Moisés y Aarón fallaron en hacerlo. La redacción española explicita esa negación implícita sin añadir contenido doctrinal extra.
  doctrine_reference: Translation philosophy §1, §3
- issue: Traducción del nombre compuesto מֵי מְרִיבַת קָדֵשׁ
  english_pob_reading: the waters of Meribath-kadesh
  chosen_spanish_reading: las aguas de Meribat-Cades
  alternative_spanish_readings:
  - las aguas de Meribá de Cades
  - las aguas de la contienda de Cades
  rationale: El texto parece identificar un lugar tradicional. Mantener el topónimo compuesto evita perder la referencia geográfica fijada por el relato y deja abierta la relación semántica de la raíz «contienda» en notas.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se ha seguido el contexto auditado del POB en inglés, incluyendo la decisión de hacer explícita la negación implícita en לְהַקְדִּישֵׁנִי y de preservar el nombre compuesto del lugar con una transliteración española legible. No se requirieron revisiones adicionales según el informe más reciente, que marcó alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «desierto» para מִדְבָּר y «congregación» para עֵדָה para conservar el registro bíblico sin arcaísmos innecesarios.
  - «Meribat-Cades» se capitaliza como topónimo compuesto y se deja la relación con מְרִיבַת para nota, evitando una paráfrasis dentro del cuerpo del texto.
