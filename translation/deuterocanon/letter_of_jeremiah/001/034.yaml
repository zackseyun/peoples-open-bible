theological_decisions:
- issue: Nature of idol impotence in relation to vows
  chosen_reading: The verse states that idols neither bestow material benefit nor hold worshipers accountable for unfulfilled vows.
  alternative_readings:
  - The mention of bronze could be taken specifically as money rather than metal.
  - The final clause could be rendered more interpretively as 'they will not demand it.'
  rationale: The broader context mocks idols as powerless objects. The translation preserves that theological point without adding claims beyond the Greek. More interpretive renderings were avoided in the main text but preserved as alternatives in the lexical notes.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
