translation:
  language: es
  text: solo si escuchas atentamente la voz de Yahvé tu Dios[a][b], teniendo cuidado de cumplir todo este mandamiento que hoy te mando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea intensifica el verbo «escuchar»; en este contexto de pacto también puede implicar obedecer. Por eso el texto principal mantiene «escuchas atentamente» en lugar de reducirlo simplemente a «obedeces».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo este mandamiento», en singular; el singular puede referirse colectivamente al mandamiento como un todo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק אִם
  english_pob_choice: if only
  chosen_spanish: si solo
  alternatives_spanish:
  - solo si
  - si únicamente
  - con tal de que
  lexicon: HALOT
  rationale: La combinación introduce una condición enfática y restrictiva. En español, «si solo» conserva esa fuerza sin sonar tan forzado como una traducción más literal de la construcción inglesa.
- source_word: שָׁמֹועַ תִּשְׁמַע
  english_pob_choice: you carefully listen
  chosen_spanish: escuchas atentamente
  alternatives_spanish:
  - oyes obedientemente
  - escuchas con diligencia
  - prestas oído con cuidado
  lexicon: HALOT
  rationale: La intensificación del infinitivo absoluto más verbo finito se refleja con un adverbio de intensidad. «Escuchar» preserva la imagen auditiva ligada a la voz, y «atentamente» comunica la obediencia implícita sin borrar el verbo original.
- source_word: בְּקוֹל
  english_pob_choice: to the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  - la orden
  - la voz de
  lexicon: HALOT
  rationale: Se mantiene la imagen del hebreo y del POB inglés. En español, la construcción natural es «escuchar la voz de», que conserva el paralelo con el texto fuente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Conforme a la terminología del proyecto, el Tetragrámaton se vierte como «Yahvé», manteniendo el nombre propio divino en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios propio
  lexicon: HALOT
  rationale: Traducción directa y transparente de la construcción posesiva del hebreo.
- source_word: לִשְׁמֹר
  english_pob_choice: being careful
  chosen_spanish: teniendo cuidado de observar
  alternatives_spanish:
  - guardando
  - cuidando de cumplir
  - velando por observar
  lexicon: HALOT
  rationale: שׁמר en contextos legales puede significar guardar/observar cuidadosamente. «Teniendo cuidado de observar» conserva la idea de vigilancia obediente y evita una repetición torpe con el infinitivo siguiente.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: observar
  alternatives_spanish:
  - hacer
  - cumplir
  - llevar a cabo
  lexicon: HALOT
  rationale: El POB inglés revisó este segmento hacia «observe» para reflejar la pareja verbal hebrea. En español, «observar» funciona bien como equivalente formal de «keep/observe» y mantiene el registro legal-covenantal.
- source_word: כָּל הַמִּצְוָה הַזֹּאת
  english_pob_choice: all this commandment
  chosen_spanish: todo este mandamiento
  alternatives_spanish:
  - esta orden completa
  - toda esta ley
  - todos estos mandamientos
  lexicon: HALOT
  rationale: Se preserva el singular hebreo de מִצְוָה y el alcance colectivo de כָּל. «Mandamiento» es más fiel al singular que pluralizarlo en español.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ
  english_pob_choice: that I am commanding you
  chosen_spanish: que hoy te estoy mandando
  alternatives_spanish:
  - que yo te mando
  - que te estoy ordenando hoy
  - que te ordeno hoy
  lexicon: HALOT
  rationale: El participio expresa una acción en curso o inmediata. «Te estoy mandando» refleja esa progresividad; «hoy» conserva el énfasis temporal de הַיּוֹם.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - ahora
  lexicon: HALOT
  rationale: Adverbio temporal directo que subraya el momento del pacto en el discurso de Moisés.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Para el POB español, «Yahvé» preserva el nombre del pacto y evita ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: contested terms — YHWH → Yahvé'
- issue: The sense of שׁמע in covenant context
  english_pob_reading: listen
  chosen_spanish_reading: escuchar atentamente
  alternative_spanish_readings:
  - obedecer
  - hacer caso
  - oír
  rationale: El hebreo dice literalmente «escuchando escuchar» la voz de Yahvé. La obediencia está incluida por el contexto y por «tener cuidado de observar», pero no se debe borrar la imagen auditiva del verbo.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve lexical tensions'
- issue: The paired legal infinitives לִשְׁמֹר לַעֲשׂוֹת
  english_pob_reading: being careful to observe
  chosen_spanish_reading: teniendo cuidado de observar
  alternative_spanish_readings:
  - cuidando de hacer
  - guardando para cumplir
  - observando para hacer
  rationale: La secuencia hebrea contiene una idea de guardar/observar con el fin de hacer. La forma elegida en español conserva ambas capas sin forzar una repetición poco natural.
  doctrine_reference: 'DOCTRINE.md: consistency of covenant/legal idiom'
translation_notes:
  revision_awareness: El texto inglés base pasó por una revisión que ajustó «do» a «observe» para reflejar mejor la pareja verbal hebrea. La versión española incorpora esa corrección con «observar» y mantiene la intensidad condicional con «si solo».
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se mantiene «mandamiento» en singular para reflejar כָּל הַמִּצְוָה הַזֹּאת.
  - Se preserva la imagen de «escuchar la voz» para no borrar la tensión entre oír y obedecer.
  - «Observar» se usa como verbo legal-covenantal, no como simple mirar.
