  yaml_path: translation/deuterocanon/tobit/011/001.yaml
  text: After these things[a], Tobiah also went on his way, blessing God because he had made his journey successful, and he kept blessing Raguel and Edna his wife[b]. And he went on until they came near to Nineveh.
  footnotes:
