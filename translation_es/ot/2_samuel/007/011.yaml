review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: mantiene el punto de partida temporal, la institución de jueces sobre Israel, el descanso dado por Dios frente a los enemigos, el uso de Yahvé para יְהוָה y la ambigüedad de «casa». Sin embargo, «Yahvé te declara» suena incompleto y menos natural para וְהִגִּיד לְךָ יְהוָה, que aquí expresa un anuncio solemne; «Yahvé te declara» en español normalmente exige un complemento directo distinto. «Yahvé te anuncia» o «Yahvé te declara» con «esto» serían más idiomáticos. También conviene mejorar «reposo de todos tus enemigos» a «descanso de todos tus enemigos», que es más natural en español actual sin perder el sentido.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero presenta dos tropiezos de naturalidad: «Yahvé te declara que...» no es una construcción española bien formada en este contexto, y «te he dado reposo de todos tus enemigos» suena algo rígido. El resto del texto es legible y fiel. La puntuación con frases cortas sigue el rastro auditado en inglés y puede conservarse.'
  glossary_alignment: 'Alineación fuerte con el glosario del proyecto: יְהוָה se traduce correctamente como «Yahvé»; בַּיִת se mantiene como «casa», preservando la tensión templo/dinastía; «jueces» y «sobre mi pueblo Israel» están bien. La nota léxica sobre «casa» está bien planteada y debe conservarse.'
  issues:
  - severity: medium
    issue: Construcción poco idiomática en «Yahvé te declara que...»
    rationale: 'El hebreo הִגִּיד significa ‘declarar/anunciar/decir’, pero en español «declarar» transitivo con pronombre indirecto suena incompleto aquí. «Yahvé te anuncia que...» o «Yahvé te declara esto: ...» expresa mejor el anuncio solemne.'
  - severity: low
    issue: «Reposo de todos tus enemigos» suena rígido
    rationale: Aunque es comprensible, en español bíblico contemporáneo «descanso de todos tus enemigos» o «te he dado descanso frente a todos tus enemigos» resulta más natural. «Descanso de» sigue siendo suficientemente literal respecto de מִן.
