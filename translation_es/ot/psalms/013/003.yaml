translation:
  language: es
  text: ¿Hasta cuándo habré de deliberar en mi alma[a], con tristeza en mi corazón todo el día? ¿Hasta cuándo mi enemigo será exaltado sobre mí[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Hasta cuándo habré de poner planes dentro de mí, con tristeza en mi corazón todo el día?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Hasta cuándo mi enemigo triunfará sobre mí?» El hebreo dice más literalmente «será exaltado sobre mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אָ֨נָה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Por cuánto tiempo?
  - ¿Hasta cuándo será?
  lexicon: HALOT
  rationale: Expresa de manera natural en español la fórmula poética de lamento temporal y conserva el tono repetido de súplica.
- source_word: אָשִׁ֪ית
  english_pob_choice: must I take
  chosen_spanish: habré de tomar
  alternatives_spanish:
  - debo poner
  - tendré que poner
  lexicon: HALOT
  rationale: אָמִׁית literalmente es 'poner/establecer'; 'habré de tomar' comunica en español la carga continua de la pregunta retórica sin volverla rígidamente literal.
- source_word: עֵצ֡וֹת
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - planes
  - consejos
  lexicon: HALOT
  rationale: El sustantivo admite la idea de planes o consejo; 'consejo' mantiene la deliberación interna en un registro natural para el poema.
- source_word: בְּנַפְשִׁי
  english_pob_choice: in my soul
  chosen_spanish: en mi alma
  alternatives_spanish:
  - dentro de mí
  - en mí
  lexicon: HALOT
  rationale: נֶפֶשׁ se conserva mejor como 'alma' en este contexto poético, manteniendo el término antropológico y el paralelismo con 'corazón'.
- source_word: יָגוֹן
  english_pob_choice: sorrow
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - aflicción
  - pena
  lexicon: HALOT
  rationale: '''Tristeza'' expresa de forma clara y digna el campo semántico de aflicción/sorrow en español sin intensificar indebidamente el término.'
- source_word: בִּלְבָבִי
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - en mi mente
  - en mi interior
  lexicon: HALOT
  rationale: לֵבָב se traduce de forma estándar como 'corazón', preservando la imagen hebrea de sede de pensamiento y voluntad.
- source_word: יוֹמָם
  english_pob_choice: all day
  chosen_spanish: todo el día
  alternatives_spanish:
  - de día
  - día tras día
  lexicon: HALOT
  rationale: Recoge la idea adverbial de duración continua durante el día y suena natural en español.
- source_word: יָרוּם
  english_pob_choice: be exalted
  chosen_spanish: se exaltará
  alternatives_spanish:
  - se alzará
  - triunfará
  lexicon: HALOT
  rationale: '''Exaltarse'' reproduce el verbo de elevación, conservando la imagen vertical que el texto hebreo deja explícita.'
- source_word: אֹיְבִי
  english_pob_choice: my enemy
  chosen_spanish: mi enemigo
  alternatives_spanish:
  - mi adversario
  - mi enemigo mortal
  lexicon: HALOT
  rationale: Traducción directa y clara del sustantivo con sufijo de primera persona.
- source_word: עָלָי
  english_pob_choice: over me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - contra mí
  - por encima de mí
  lexicon: HALOT
  rationale: '''Sobre mí'' preserva la metáfora espacial de superioridad del verbo y evita debilitarla con una lectura más interpretativa.'
translation_notes:
  revision_awareness: 'Se corrigió la anclaje de nota: ambos marcadores aparecen explícitamente en el texto español. No hay cambios de sentido respecto del audit trail inglés; se mantiene la tensión léxica entre ''tomar consejo'' y ''poner/establecer planes'', y entre ''exaltado'' y ''triunfar''.'
  spanish_consistency_notes:
  - Se preservó 'alma' para נֶפֶשׁ y 'corazón' para לֵבָב, manteniendo la distinción antropológica del hebreo.
  - Se evitó 'SEÑOR' o 'Cristo' porque no aparecen en el versículo.
  - La pregunta temporal se mantuvo como lamento poético repetido con '¿Hasta cuándo?'.
