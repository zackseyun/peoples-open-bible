    issue: La frase final usa 'en sus artimañas' en vez de un complemento causal/instrumental.
    rationale: El hebreo בְּלִקְחֹתֶיהָ y la decisión inglesa 'by her enticements' apuntan mejor a 'por sus…' que a 'en sus…'. 'En sus artimañas' puede sonar locativo o de esfera, menos fiel a la relación de medio o causa.
  - severity: medium
    issue: '''Artimañas'' como texto principal desplaza el matiz seductor hacia uno principalmente engañoso.'
    rationale: La auditoría inglesa eligió 'enticements' precisamente para encajar el contexto de seducción sexual, aunque reconociendo la dificultad del hebreo. En español, 'seducciones' preserva mejor ese centro semántico, dejando 'artimañas/engaños' como alternativas de nota.
