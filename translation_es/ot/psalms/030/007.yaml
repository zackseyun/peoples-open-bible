  rationale: Se revisa únicamente el verbo principal de la cita para lograr un español más natural y fiel al modismo hebreo de estabilidad/inestabilidad. «Conmovido» conserva la imagen tradicional e idiomática mejor que «sacudido», sin alterar el sentido auditado por el POB. También se ajusta la nota literal para mantener coherencia con el texto revisado.
