    rationale: La nota sobre el inicio fragmentario del testimonio debe anclarse en 'a la ciudad', mientras que la nota léxica sobre 'came to/toward them' debe anclarse en la frase de movimiento hacia ellos. Tal como está, las notas no corresponden al lugar relevante del texto.
  - severity: medium
    issue: '''Se pasaron a ellos'' puede sobreinterpretar πρὸς αὐτοὺς προσῆλθαν.'
    rationale: El inglés auditado evita 'joined them' en el texto principal para no resolver del todo la implicación de adhesión. En español, 'se pasaron a ellos' sugiere más claramente cambio de bando. Un principal más literal con nota preserva mejor la tensión narrativo-lexical.
  - severity: low
    issue: La puntuación antes de la última cláusula puede simplificarse.
    rationale: Con la coordinación normal en español, una coma tras la segunda cláusula basta mejor que el punto y coma, aunque el punto y coma no es incorrecto.
