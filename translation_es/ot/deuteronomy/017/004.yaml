review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y la auditoría inglesa: conserva la pasiva inicial, la secuencia oír/investigar, la fórmula judicial de confirmación y el peso de «abominación». Sin embargo, hay dos puntos que requieren ajuste para fidelidad idiomática y claridad judicial en español: «oyes de ello» suena poco natural, y «ha sido hecha» es demasiado calcado frente al contexto de una ofensa cometida. También la nota alternativa «el asunto es verdad y está establecido» es gramaticalmente deficiente en español.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero contiene calcos poco naturales. «Se te informa» funciona, aunque «se te reporta» o «se te informa» ambos son válidos; no exige cambio. Sí conviene mejorar «oyes de ello» a «oyes de eso» o mejor «llegas a oírlo»/«oyes de ello»; la opción más natural y sobria aquí es «oyes de eso». Además, «esta abominación ha sido hecha» debe cambiarse a «esta abominación ha sido cometida» para sonar natural en contexto legal-moral sin perder la voz pasiva.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Abominación» alinea bien con תּוֹעֵבָה. No aparecen términos del glosario principal como Yahvé/Mesías. La fórmula judicial debe mantenerse doble; «verdad y cierto» conviene pulirse a «verdad y certeza» o mejor «verdad y es cierto». La solución más natural y fiel es «es verdad y cierto que», aunque algo rígida; una mejora más idiomática es «es verdad y es cierto que», pero repite innecesariamente. Se conserva la estructura auditada con mínima intervención.
  issues:
  - severity: medium
    issue: «oyes de ello» es poco natural en español actual
    rationale: Aunque refleja el inglés «hear of it», en español bíblico legible suena forzado. «Oyes de eso» expresa el mismo sentido implícito sin alterar el contenido.
  - severity: medium
    issue: «ha sido hecha» es un calco duro para una ofensa moral/judicial
    rationale: El hebreo pasivo נֶעֶשְׂתָה afirma que el acto fue realizado; en español, con «abominación», la colocación natural es «ha sido cometida». Esto preserva la pasiva y mejora la legibilidad.
  - severity: low
    issue: La nota «el asunto es verdad y está establecido» no es buen español
    rationale: En español no se dice naturalmente «el asunto es verdad». La alternativa debe formularse como «el asunto es verdadero y está establecido» o similar para ser útil al lector.
  revised_spanish_text: y se te informa[a], y oyes de eso, y lo investigas a fondo, y he aquí, es verdad y cierto que esta abominación ha sido cometida en Israel,
  revised_footnotes:
  - marker: a
    text: 'O: «el asunto es verdadero y está establecido».'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad del español sin apartarse del hebreo ni de la auditoría inglesa: «oyes de eso» en lugar de «oyes de ello», «ha sido cometida» en lugar de «ha sido hecha», y corrección gramatical de la nota alternativa. No se requiere adjudicación adicional.'
