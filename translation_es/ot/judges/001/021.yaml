translation:
  language: es
  text: Pero los hijos de Benjamín no expulsaron a los jebuseos que habitaban en Jerusalén[a], de modo que los jebuseos han habitado con los hijos de Benjamín en Jerusalén hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente 'el jebuseo ... habitó con los hijos de Benjamín'; el singular funciona como colectivo para el pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: los jebuseos
  alternatives_spanish:
  - el jebuseo
  lexicon: HALOT
  rationale: El hebreo usa una forma singular colectiva. En español, como en el inglés POB, el colectivo étnico se expresa naturalmente en plural para referirse al pueblo entero, no a un individuo.
- source_word: יֹשֵׁב יְרֽוּשָׁלִַם
  english_pob_choice: who were living in Jerusalem
  chosen_spanish: que habitaban en Jerusalén
  alternatives_spanish:
  - que vivían en Jerusalén
  - que moraban en Jerusalén
  lexicon: HALOT
  rationale: El participio indica residencia continua. 'Habitaban' conserva ese sentido durativo con un registro digno y natural en español.
- source_word: הוֹרִ֖ישׁוּ
  english_pob_choice: did not drive out
  chosen_spanish: no expulsaron
  alternatives_spanish:
  - no desposeyeron
  - no echaron fuera
  lexicon: HALOT
  rationale: En contexto de conquista, el verbo refiere a remover a un pueblo de la tierra. 'Expulsaron' comunica con claridad esa fuerza sin alejarse del valor contextual.
- source_word: בְּנֵ֣י בִנְיָמִ֑ן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - el pueblo de Benjamín
  lexicon: HALOT
  rationale: Se preserva la construcción hebrea genealógico-tribal, transparente y fiel al original. 'Hijos de Benjamín' mantiene el paralelismo del texto fuente.
- source_word: וַיֵּ֨שֶׁב
  english_pob_choice: have lived
  chosen_spanish: han habitado
  alternatives_spanish:
  - han vivido
  - han morado
  lexicon: HALOT
  rationale: Con 'hasta el día de hoy', el hebreo expresa una situación que continúa hasta el presente narrativo. El perfecto español 'han habitado' refleja esa continuidad.
- source_word: אֶת בְּנֵ֤י בִנְיָמִן֙
  english_pob_choice: with the sons of Benjamin
  chosen_spanish: con los hijos de Benjamín
  alternatives_spanish:
  - entre los hijos de Benjamín
  - junto a los hijos de Benjamín
  lexicon: HALOT
  rationale: Aquí את tiene sentido de compañía, no de objeto directo. 'Con' es la manera más clara y exacta de expresar co-residencia en español.
- source_word: עַד הַיּ֥וֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta este día
  lexicon: HALOT
  rationale: Es la fórmula idiomática estándar en español para señalar continuidad hasta el momento narrativo.
- source_word: וְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  lexicon: HALOT
  rationale: La conjunción tiene matiz adversativo en este contexto de relatos de conquista incompleta. 'Pero' hace visible ese contraste mejor que un simple 'Y'.
translation_notes:
  revision_awareness: 'Se mantuvo el sentido del audit trail en inglés: colectivo étnico singular en hebreo expresado en plural natural en español; participio durativo; perfecto español para continuidad con ''hasta el día de hoy''. No se registraron revisiones posteriores que alteraran la lectura base.'
  spanish_consistency_notes:
  - Se preserva 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa 'hijos de Benjamín' por consistencia con la construcción hebrea y con el patrón tribal del libro.
  - Se evita 'SEÑOR' y otras sustituciones no presentes en el texto fuente.
  - La nota al pie acompaña el plural español para conservar la tensión entre forma singular hebrea y referente colectivo.
