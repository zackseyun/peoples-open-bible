  to: Y enviaré contra ustedes hambruna y bestias feroces[a], y te dejarán en duelo[b]; y peste y derramamiento de sangre[c] pasarán por en medio de ti, y traeré espada sobre ti. Yo, Yahvé[d], he hablado.
