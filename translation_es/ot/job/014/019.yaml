translation:
  language: es
  text: El agua desgasta las piedras; sus torrentes[a] arrastran el suelo de la tierra; así destruyes la esperanza del hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo traducido aquí como 'torrentes' es raro e incierto; también puede significar 'sus derramamientos', 'sus lavados' o quizá algo como 'lo que brota de ella'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָנִים
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - rocas
  lexicon: HALOT
  rationale: פּiedras comunica bien la imagen poética de desgaste por el agua y evita una dureza excesiva que tendría 'rocas' en este contexto.
- source_word: שָׁחֲקוּ
  english_pob_choice: wears away
  chosen_spanish: desgasta
  alternatives_spanish:
  - erosiona
  - muele
  lexicon: HALOT
  rationale: El verbo expresa desgaste por abrasión; 'desgasta' conserva esa acción continua y suena natural en español.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: el agua
  alternatives_spanish:
  - las aguas
  lexicon: HALOT
  rationale: El hebreo usa plural formal, pero en español la singular colectiva 'el agua' expresa mejor la verdad general sobre la erosión.
- source_word: תִּשְׁטֹף
  english_pob_choice: wash away
  chosen_spanish: lavan
  alternatives_spanish:
  - arrastran
  - lavan away
  lexicon: HALOT
  rationale: El sentido es de acción de lavado/inundación. 'Lavan' preserva la imagen de arrastre por agua y se integra con el paralelismo poético.
- source_word: סְפִיחֶיהָ
  english_pob_choice: its torrents
  chosen_spanish: sus torrentes
  alternatives_spanish:
  - sus derramamientos
  - sus escurrimientos
  - lo que brota de ella
  lexicon: HALOT
  rationale: Es una forma rara y dudosa; en este contexto de שטף y erosión, 'torrentes' reproduce la fuerza del flujo que arrastra tierra. Mantiene la incertidumbre léxica sin resolverla de manera artificiosa.
- source_word: עֲפַר אָרֶץ
  english_pob_choice: the soil of the earth
  chosen_spanish: la tierra del suelo
  alternatives_spanish:
  - el polvo de la tierra
  - el polvo del suelo
  lexicon: HALOT
  rationale: Literalmente es 'polvo de tierra/land'. En español, 'la tierra del suelo' conserva la idea de material suelto arrastrado por el agua, aunque deja eco de la repetición del original.
- source_word: וְתִקְוַת אֱנוֹשׁ
  english_pob_choice: the hope of man
  chosen_spanish: la esperanza del hombre
  alternatives_spanish:
  - la esperanza de un ser humano
  - la esperanza de la humanidad
  - la esperanza del mortal
  lexicon: HALOT
  rationale: '''Hombre'' mantiene el singular representativo de אֱנוֹשׁ y su tono de fragilidad humana, sin neutralizar el matiz antropológico del hebreo.'
- source_word: הֶאֱבַדְתָּ
  english_pob_choice: you destroy
  chosen_spanish: destruyes
  alternatives_spanish:
  - haces perecer
  - aniquilas
  lexicon: HALOT
  rationale: El hiphil de אבד significa causar perecer/destruir. 'Destruyes' es directo y conserva la segunda persona dirigida a Dios.
theological_decisions:
- issue: Dirección de la segunda persona al final del versículo
  english_pob_reading: so you destroy the hope of man
  chosen_spanish_reading: así destruyes la esperanza del hombre
  alternative_spanish_readings:
  - y destruyes la esperanza del hombre
  - por eso destruyes la esperanza del hombre
  rationale: La forma verbal de segunda persona hace patente que Job se dirige a Dios. 'Así' recoge la comparación implícita entre la erosión natural y la desaparición de la esperanza humana, sin añadir explicación doctrinal.
  doctrine_reference: Preservar la tensión teológica del lamento de Job; equivalencia óptima.
- issue: Valor de אֱנוֹשׁ como humano frágil
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el mortal
  - la humanidad
  - el ser humano
  rationale: '''El hombre'' conserva el singular representativo y el matiz de fragilidad del término hebreo, en línea con la política de precisión de género cuando el original es masculino singular.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral).
translation_notes:
  revision_awareness: 'El texto sigue el dictamen de alta concordancia del control cruzado: no se introdujeron revisiones respecto del último pase, y se mantuvo la ambigüedad léxica de סְפִיחֶיהָ mediante nota.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito en el discurso directo de segunda persona sin explicitarlo, como en el hebreo y en la auditoría inglesa.
  - Se evita 'SEÑOR' porque el versículo no contiene el Tetragrámaton; la segunda persona responde al habla poética a Dios.
  - '''Piedras''/''desgasta''/''destruyes'' conservan el paralelismo y el tono sapiencial sin arcaísmo innecesario.'
  - La nota de pie de página se ancla solo en 'torrentes', donde está la incertidumbre léxica principal.
