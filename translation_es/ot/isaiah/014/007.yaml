  rationale: Se corrige 'prorrumpe' a 'prorrumpen' para reflejar fielmente el plural hebreo פָּצְחוּ. Se mantiene el resto del verso porque transmite bien el estado resultante de descanso y quietud. La nota alternativa se ajusta del mismo modo para conservar la concordancia y la fidelidad al original.
