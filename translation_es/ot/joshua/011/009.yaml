review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Josué actúa conforme a lo que Yahvé le había dicho, deshabilita los caballos y destruye los carros. También preserva correctamente el nombre divino como «Yahvé». Sin embargo, «quemó sus carros en el fuego» suena menos natural en español que una formulación que conserve explícitamente el medio («con fuego»), y la nota al pie actual no presenta una alternativa real, sino repite la misma lectura.'
  spanish_quality_summary: La redacción es en general clara y digna. «Desjarretó» es preciso y adecuado para el registro bíblico. «Hizo con ellos» es aceptable, aunque algo tieso; no requiere cambio forzoso porque refleja bien el hebreo. El principal ajuste de legibilidad está en «en el fuego», que en español bíblico-natural se expresa mejor como «con fuego».
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; עִקֵּר → «desjarretó» mantiene la fuerza léxica mejor que opciones más suaves; מַרְכְּבֹת → «carros» es defendible en contexto militar. Se debe corregir la nota para que preserve la alternativa documentada del inglés («inutilizó/dejó lisiados») en vez de duplicar la traducción principal.'
  issues:
  - severity: medium
    issue: «quemó sus carros en el fuego» es poco natural en español
    rationale: 'El hebreo בָּאֵשׁ expresa explícitamente el medio. «Con fuego» conserva ese detalle de forma más idiomática que «en el fuego». '
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real
    rationale: 'La nota dice «O: “desjarretó sus caballos”», que repite la traducción principal. El rastro inglés preserva una alternativa léxica equivalente a «inutilizó/dejó lisiados sus caballos», con aclaración de que el hebreo se refiere más específicamente a desjarretar.'
  revised_spanish_text: 'Y Josué hizo con ellos tal como Yahvé le había dicho: desjarretó[a] sus caballos y quemó sus carros con fuego.'
  revised_footnotes:
  - marker: a
    text: 'O: «inutilizó sus caballos»; el hebreo más específicamente se refiere a desjarretarlos.'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene la fidelidad general del borrador, pero se corrigen dos puntos menores: una formulación más natural y fiel para בָּאֵשׁ («con fuego») y una nota al pie que sí preserve la alternativa léxica documentada sin duplicar la traducción principal.'
