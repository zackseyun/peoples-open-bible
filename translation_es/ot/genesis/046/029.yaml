base_translation:
  language: en
  yaml_path: translation/ot/genesis/046/029.yaml
  text: Then Joseph harnessed his chariot and went up to meet Israel his father in Goshen[a]. He appeared before him, fell on his neck[b], and wept on his neck for a long time.
  footnotes:
  - marker: a
    text: Or 'he appeared to him' / 'he showed himself to him.' The Hebrew verb can be rendered more formally, but here it likely means Joseph presented himself before his father at the reunion.
    reason: lexical_alternative
  - marker: b
    text: Literally 'wept on his neck עוד'; the final word can be rendered 'still' or 'yet,' but in context it conveys prolonged weeping.
    reason: lexical_alternative
