base_translation:
  language: en
  yaml_path: translation/ot/2_kings/010/013.yaml
  text: Jehu found the brothers of Ahaziah king of Judah and said[a], “Who are you?” They said, “We are the brothers of Ahaziah[c][b], and we have come down to ask about the welfare of the sons of the king and the sons of the queen mother.”
  footnotes:
  - marker: a
    text: Hebrew 'brothers of Ahaziah.' In royal narrative this can denote close relatives or kinsmen, not only literal brothers.
    reason: lexical_alternative
  - marker: b
    text: Or 'to see if all was well with the sons of the king and the sons of the queen mother.'
    reason: lexical_alternative
  - marker: c
    text: '''Queen mother'' renders Hebrew gebirah, a royal court title for the king''s mother.'
    reason: cultural_note
