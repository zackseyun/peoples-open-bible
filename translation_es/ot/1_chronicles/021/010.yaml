revisions:
- from: 'Ve y habla a David[a], diciendo: «Así dice Yahvé: Yo estoy poniendo tres cosas delante de ti. Elige una de ellas para ti, y yo te la haré».'
  to: 'Ve y habla a David[a], diciendo: «Así dice Yahvé: Yo pongo tres cosas delante de ti. Elige una de ellas para ti, y la haré venir sobre ti».'
  rationale: Se conserva casi todo el borrador porque es fiel al hebreo y al rastro de auditoría inglés. Se ajusta «estoy poniendo» a «pongo» para mayor naturalidad en español profético, sin pérdida de sentido. El cambio principal es «y la haré venir sobre ti», que comunica con claridad que la opción escogida será ejecutada contra David, evitando la formulación poco idiomática «te la haré». La nota se mantiene con leve pulido estilístico.
