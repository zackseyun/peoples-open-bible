translation:
  language: es
  text: 'Jacob dijo: «No, por favor. Si he hallado favor en tus ojos, entonces toma mi regalo[a] de mi mano, porque por eso he visto tu rostro como se ve el rostro de Dios[b], y me has aceptado favorablemente[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi presente». El hebreo מִנְחָה puede significar regalo, tributo u ofrenda; aquí se refiere al obsequio conciliatorio de Jacob para Esaú.'
    reason: lexical_alternative
  - marker: b
    text: 'O posiblemente: «como ver el rostro de un dios»; en este contexto, «Dios» encaja mejor con la experiencia previa de Jacob en Peniel.'
    reason: alternative_reading
  - marker: c
    text: 'O: «te has complacido conmigo»; «me has aceptado». El hebreo transmite una recepción o aceptación favorable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - benevolencia
  lexicon: HALOT
  rationale: En la expresión fija “hallar favor en tus ojos”, “favor” conserva el sentido interpersonal de aceptación sin importar innecesariamente la carga teológica de “gracia”. En español, “gracia” aquí podría sonar más doctrinal que contextual.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your eyes
  chosen_spanish: en tus ojos
  alternatives_spanish:
  - a tu vista
  - en tu opinión
  lexicon: HALOT
  rationale: La metáfora hebrea usa “ojos”; “en tus ojos” mantiene la imagen del original y su valor relacional, con una formulación natural en español.
- source_word: מִנְחָתִי
  english_pob_choice: my gift
  chosen_spanish: mi presente
  alternatives_spanish:
  - mi regalo
  - mi ofrenda
  lexicon: HALOT
  rationale: Aquí se trata del obsequio conciliatorio de Jacob a Esaú. “Presente” comunica bien esa idea y evita sugerir una ofrenda cultual, que no es el punto del pasaje.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mí
  - de mis manos
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del acto de entrega. “De mi mano” suena natural en español y refleja la presentación personal del regalo.
- source_word: עַל־כֵּן
  english_pob_choice: because / for therefore
  chosen_spanish: porque por eso
  alternatives_spanish:
  - pues por eso
  - ya que por eso
  lexicon: HALOT
  rationale: La secuencia hebrea introduce la razón de la petición. “Porque por eso” reproduce la relación lógica explícita del texto, aunque en español suene algo enfático; se conserva así la fuerza causal del auditable original.
- source_word: רָאִיתִי פָנֶיךָ
  english_pob_choice: I have seen your face / seeing your face
  chosen_spanish: he visto tu rostro
  alternatives_spanish:
  - he visto tu cara
  - he visto tu semblante
  lexicon: HALOT
  rationale: “Rostro” es un equivalente digno y bíblicamente natural para פָנִים. Mantiene la concreción de la expresión hebrea y encaja con la comparación que sigue.
- source_word: כִּרְאֹת פְּנֵי אֱלֹהִים
  english_pob_choice: as one sees the face of God
  chosen_spanish: como se ve el rostro de Dios
  alternatives_spanish:
  - como ver el rostro de Dios
  - como se ve el rostro de un dios
  lexicon: HALOT
  rationale: Se conserva la comparación directa con “Dios”, siguiendo el juicio contextual de la POB inglesa y la resonancia de Peniel. El giro impersonal “como se ve” refleja bien el valor comparativo del infinitivo hebreo.
- source_word: וַתִּרְצֵנִי
  english_pob_choice: you have been pleased with me
  chosen_spanish: has quedado complacido conmigo
  alternatives_spanish:
  - me has aceptado
  - te has complacido en mí
  lexicon: HALOT
  rationale: El verbo transmite aceptación favorable o complacencia. “Has quedado complacido conmigo” procura reproducir ese matiz sin reducirlo a una simple aceptación, y mantiene la tensión semántica documentada en la POB inglesa.
theological_decisions:
- issue: Referencia de אֱלֹהִים en la comparación
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  - seres divinos
  rationale: El contexto narrativo inmediato favorece a Dios como referente singular, especialmente por la experiencia anterior de Jacob en Peniel. Se preserva así la fuerza teológica del contraste sin suavizarlo hacia una lectura genérica.
  doctrine_reference: Primacía del sentido contextual original; preservar la tensión teológica del relato de Génesis 32–33.
- issue: Valor de וַתִּרְצֵנִי
  english_pob_reading: you have been pleased with me
  chosen_spanish_reading: has quedado complacido conmigo
  alternative_spanish_readings:
  - me has aceptado favorablemente
  - te has mostrado complacido conmigo
  rationale: La forma verbal puede expresar aceptación favorable, complacencia o recibimiento propicio. “Has quedado complacido conmigo” conserva esa amplitud y evita cerrarla demasiado pronto en una sola paráfrasis.
  doctrine_reference: Mantener la ambigüedad lexical documentada sin resolverla interpretativamente.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión más literal del audit trail inglés: conserva la secuencia causal fuerte de כִּי עַל כֵּן, mantiene la comparación con “el rostro de Dios” y refleja el matiz de aceptación favorable en la cláusula final. Se evitó una traducción más suave del tipo “porque ver tu rostro es como ver el rostro de Dios”, para no perder la estructura comparativa explícita del hebreo.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como convención del proyecto cuando aparezca el tetragrámaton; aquí no aparece.
  - Se usa “Dios” para אֱלֹהִים según el contexto narrativo inmediato.
  - Se prefirió “presente” para מִנְחָה en este contexto no cultual.
  - Se emplea “rostro” de manera consistente para פָנִים en esta unidad.
  - La puntuación busca reproducir la pausa y el énfasis del hebreo sin volver arcaico el español.
