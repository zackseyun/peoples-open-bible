translation:
  language: es
  text: En las calles los carros van desatados[a]; por las plazas traquetean[b]. Su aspecto es como antorchas; como relámpagos corren de acá para allá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «van furiosos» para «van desatados»; el verbo hebreo puede sugerir un movimiento frenético o enloquecido.
    reason: lexical_alternative
  - marker: b
    text: O «resuenan con estrépito» para «traquetean»; el verbo hebreo raro es probablemente onomatopéyico y destaca el ruido del movimiento sacudido.
    reason: lexical_alternative
  - marker: c
    text: O «se lanzan de un lado a otro» para «corren de acá para allá»; el hebreo enfatiza el movimiento rápido de un lado a otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּצוֹת
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en los espacios abiertos
  - en las vías públicas
  lexicon: HALOT
  rationale: חוּצוֹת designa calles o espacios públicos dentro de la ciudad. «Calles» es la equivalencia natural y clara en español, y mantiene el marco urbano del paralelismo con «plazas».
- source_word: יִתְהוֹלְל֣וּ
  english_pob_choice: race wildly
  chosen_spanish: van desatados
  alternatives_spanish:
  - van furiosos
  - corren frenéticamente
  - rugen
  lexicon: HALOT
  rationale: El verbo expresa movimiento frenético, desbocado o casi enloquecido. «Van desatados» conserva esa fuerza y evita reducirlo a un simple «corren».
- source_word: הָרֶכֶב
  english_pob_choice: the chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - los carros de guerra
  - la carrocería
  lexicon: HALOT
  rationale: Aunque el hebreo puede ser colectivo, en español «carros» comunica de modo natural el conjunto de carros de guerra. Se evita «carros de guerra» porque el contexto ya los identifica y el verso necesita fluidez poética.
- source_word: יִֽשְׁתַּקְשְׁק֖וּן
  english_pob_choice: they rattle
  chosen_spanish: resuenan con estrépito
  alternatives_spanish:
  - cloquean
  - traquetean
  - chocan ruidosamente
  lexicon: HALOT
  rationale: El verbo raro es onomatopéyico y sugiere traqueteo/choque sonoro además de movimiento. «Resuenan con estrépito» preserva el componente acústico sin perder la idea de sacudidas.
- source_word: בָּרְחֹבוֹת
  english_pob_choice: through the squares
  chosen_spanish: por las plazas
  alternatives_spanish:
  - en las plazas amplias
  - por los espacios abiertos
  lexicon: HALOT
  rationale: רחבות apunta a espacios públicos amplios o plazas. «Por las plazas» es idiomático en español y refleja el desplazamiento dentro del espacio urbano.
- source_word: מַרְאֵיהֶן
  english_pob_choice: their appearance
  chosen_spanish: su aspecto
  alternatives_spanish:
  - su apariencia
  - su mirada
  lexicon: HALOT
  rationale: El sustantivo se refiere a la apariencia visible. «Su aspecto» es una formulación natural en español y funciona bien antes de la comparación con antorchas.
- source_word: כַּלַּפִּידִם
  english_pob_choice: like torches
  chosen_spanish: como antorchas
  alternatives_spanish:
  - como teas
  - como antorchas encendidas
  lexicon: HALOT
  rationale: לַפִּידִם son antorchas o teas encendidas. «Antorchas» es la equivalencia más directa y comprensible; el matiz de fuego queda implícito por el contexto.
- source_word: כַּבְּרָקִים
  english_pob_choice: like lightning
  chosen_spanish: como relámpagos
  alternatives_spanish:
  - como rayos
  - como fulgores
  lexicon: HALOT
  rationale: ברקים alude a relámpagos o destellos de rayo. «Relámpagos» conserva la imagen visual y la intensidad del símil.
- source_word: יְרוֹצֵֽצוּ
  english_pob_choice: they dart about
  chosen_spanish: corren de acá para allá
  alternatives_spanish:
  - van y vienen rápidamente
  - se lanzan de un lado a otro
  - danzan
  lexicon: HALOT
  rationale: El verbo expresa movimiento rápido de un lado a otro. «Corren de acá para allá» reproduce la alternancia y el impulso del hebreo sin perder claridad.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el aparato auditado en inglés, sin introducir revisiones posteriores; el sentido general y las opciones léxicas coinciden con la evaluación de alta concordancia y sin cambios aplicados.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda en este proyecto; este versículo no contiene el nombre divino.
  - Se prefirió un registro poético claro, manteniendo el paralelismo y la imaginería bélica del hebreo.
  - «Carros» se adoptó como equivalente natural del colectivo hebreo רֶכֶב en este contexto.
  - No se introdujeron términos eclesiásticos tradicionales que atenúen la fuerza del texto.
