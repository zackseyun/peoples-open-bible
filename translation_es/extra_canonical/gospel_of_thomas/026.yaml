base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/026.yaml
  text: Jesus said, “The splinter that is in your brother’s eye, you see it; but the beam that is in your own eye, you do not see it. When you take the beam out of your own eye, then you will see clearly to take the splinter out of your brother’s eye.”
  footnotes:
  - marker: a
    text: “See clearly” renders the idiom ⲛⲁⲩ ⲉⲃⲟⲗ, literally “see out.”
    reason: dialect_note
  - marker: b
    text: The verb ⲛⲟⲩϫⲉ can mean “cast out/expel”; here “take out/remove” fits the eye-removal context.
    reason: lexical_alternative
  - marker: c
    text: “Splinter” could also be translated “speck.”
    reason: lexical_alternative
  - marker: d
    text: “Beam” could be rendered “log,” but ⲥⲟⲓ specifically denotes a structural beam.
    reason: lexical_alternative
  - marker: e
    text: “Brother” translates ⲥⲟⲛ; in context it can be understood inclusively as a fellow disciple.
    reason: cultural_note
  - marker: f
    text: POxy 1 preserves “…and then you will see in order to cast out the splinter which is in the eye of your brother,” aligning with the Coptic’s final clause.
    reason: cross_reference
  - marker: g
    text: Cf. Matthew 7:3–5; Luke 6:41–42 for canonical parallels.
    reason: cross_reference
  - marker: h
    text: Or 'The splinter that is in your brother’s eye—you see; but the beam that is in your own eye—you do not see.'.
    reason: previous_rendering
