translation:
  language: es
  text: Si se trata de fuerza, he aquí, él es poderoso; y si se trata de justicia[b], ¿quién lo citará?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿quién puede citarme?» o «¿quién me señalará una audiencia?». El verbo hebreo es difícil, y algunos entienden que el objeto es «me» en lugar de «lo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «juicio» o «caso legal». El término hebreo puede abarcar justicia, juicio o causa judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si se trata de
  - En caso de
  - Si es asunto de
  lexicon: HALOT
  rationale: La partícula condicional introduce dos casos hipotéticos. En español, «Si» conserva la estructura breve y enfática del hebreo sin añadir explicación innecesaria.
- source_word: לְכֹחַ
  english_pob_choice: it is a matter of strength
  chosen_spanish: se trata de fuerza
  alternatives_spanish:
  - es asunto de fuerza
  - en cuanto a fuerza
  - si es cuestión de fuerza
  lexicon: HALOT
  rationale: El ל con כֹחַ aquí marca el ámbito o materia en discusión. «Se trata de» comunica naturalmente ese valor forense o temático en español, preservando la idea de «con respecto a la fuerza».
- source_word: אַמִּיץ
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - mighty
  - todopoderoso
  lexicon: HALOT
  rationale: El adjetivo expresa una fuerza imponente. «Poderoso» mantiene el tono elevado y evita repetir «fuerza» de manera mecánica; «fuerte» sonaría menos solemne en este contexto.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - en verdad
  - vean
  lexicon: HALOT
  rationale: «He aquí» conserva el valor de llamada de atención y la solemnidad retórica de la partícula hebrea, con un equivalente bíblico claro en español.
- source_word: לְמִשְׁפָּט
  english_pob_choice: of justice
  chosen_spanish: de justicia
  alternatives_spanish:
  - de juicio
  - de un caso legal
  - de litigio
  lexicon: HALOT
  rationale: «Justicia» refleja la opción de POB y mantiene el matiz legal sin forzar una perífrasis excesiva. En español también puede aludir a juicio o causa judicial, lo cual queda sugerido por el verbo final.
- source_word: יוֹעִידֵנִי
  english_pob_choice: can summon him
  chosen_spanish: lo citará
  alternatives_spanish:
  - lo convocará
  - me citará
  - lo llamará a juicio
  lexicon: HALOT
  rationale: En contexto jurídico, el Hifil de יעד puede significar citar o convocar a comparecer. «Citarlo» capta la acción de llevarlo a audiencia/corte. Dado el texto consonántico difícil, se preserva la lectura contextual preferida por POB sin imponer una solución demasiado explicativa en el texto principal.
theological_decisions:
- issue: Imaginería judicial aplicada a Dios
  english_pob_reading: Render the verse with courtroom language ('justice,' 'summon him') without softening Job's claim.
  chosen_spanish_reading: Traducir con lenguaje de citación o comparecencia judicial («se trata de justicia», «lo citará») sin diluir la fuerza del reclamo de Job.
  alternative_spanish_readings:
  - «si se trata de juicio, ¿quién lo llevará a audiencia?»
  - «si es asunto de litigio, ¿quién lo convocará?»
  rationale: El contexto de Job 9 presenta la imposibilidad de entablar un caso contra Dios. La traducción debe conservar esa tensión jurídica y no suavizarla en una afirmación general sobre justicia divina.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto hebreo es breve pero sintácticamente difícil, especialmente en יוֹעִידֵנִי. La redacción española sigue la lectura contextual preferida por la POB y mantiene abierta la alternativa reconocida en la nota, sin resolver artificialmente la ambigüedad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - «Justicia» se usa con matiz forense, coherente con el contexto de litigio de Job 9.
  - «Citará» conserva el valor jurídico de comparecencia y evita una paráfrasis más amplia.
  - «He aquí» preserva el golpe retórico de הִנֵּה con estilo bíblico natural en español.
