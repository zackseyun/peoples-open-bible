base_translation:
  language: en
  yaml_path: translation/ot/1_kings/022/034.yaml
  text: But a man drew his bow at random and struck the king of Israel between the joints of the armor and the breastplate[a]. So he said to his charioteer, “Turn your hand and take me out of the camp[d][c][b], for I am wounded.”
  footnotes:
  - marker: a
    text: Or “in his innocence,” “without aiming,” or “at random” for the Hebrew לְתֻמּוֹ; here it likely means the archer shot without a specific target in mind.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “between the debaqim and the shiryan,” likely referring to a gap between pieces of armor; the exact technical terms are uncertain.
    reason: cultural_note
  - marker: c
    text: Hebrew “Turn your hand,” an idiom for maneuvering the chariot.
    reason: lexical_alternative
  - marker: d
    text: The Hebrew verb can mean “be sick” or “be wounded”; in this context it refers to being wounded.
    reason: lexical_alternative
