review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca la fórmula censal hebrea y preserva bien la secuencia estructural: hijos de Manasés, generaciones, clanes, casas paternas, número de nombres, umbral de veinte años y referencia masculina para servicio militar. También conserva adecuadamente la nota alternativa de כֹּל יֹצֵא צָבָא. Sin embargo, la expresión de edad «desde los veinte años de edad y más» suena poco natural e imprecisa en español; el hebreo indica claramente ‘de veinte años para arriba’.'
  spanish_quality_summary: 'En general es claro y digno, pero hay dos puntos de estilo/mejor ajuste: «por las casas de sus padres» se puede mejorar a «por sus casas paternas» para reflejar mejor לְבֵית אֲבֹתָם en español natural; y «desde los veinte años de edad y más» debe ajustarse a una fórmula idiomática. «Todo varón que sale para el servicio militar» es comprensible, aunque «sale al servicio militar» o «sale a servir en el ejército» serían más naturales; con todo, la redacción actual es aceptable si se conserva la cercanía al hebreo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Manasés», «hijos», «clanes», «varón» y «servicio militar» concuerdan con las decisiones auditadas. La revisión propuesta solo mejora naturalidad y precisión sintáctica sin alterar la base léxica.
  issues:
  - severity: medium
    issue: La frase «desde los veinte años de edad y más» es poco idiomática en español.
    rationale: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה expresa el umbral de edad ‘de veinte años para arriba’. En español bíblico legible, «de veinte años arriba» o «de veinte años en adelante» transmite mejor el sentido.
  - severity: low
    issue: «Por las casas de sus padres» suena algo forzado.
    rationale: Aunque es fiel, «por sus casas paternas» refleja mejor לְבֵית אֲבֹתָם en español natural y mantiene el matiz sociogenealógico del hebreo.
  revised_spanish_text: 'De los hijos de Manasés, por sus generaciones, por sus clanes, por sus casas paternas, por el número de nombres, de veinte años en adelante, todo varón que sale[a] para el servicio militar:'
  revised_footnotes:
  - marker: a
    text: O «todo varón que sale a la guerra». La expresión hebrea se refiere a los aptos para el servicio militar.
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene íntegro el sentido del hebreo y de la auditoría inglesa, pero mejora dos puntos de español: una formulación más natural para la edad mínima y una expresión más idiomática para «fathers’ houses». No se requiere adjudicación adicional.'
