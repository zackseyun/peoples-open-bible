base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/003/002.yaml
  text: For Yahweh honored the father above the children[b][a], and he established the mother's authority over her children.
  footnotes:
  - marker: a
    text: Or 'confirmed the mother's right over her children.' Hebrew mishpat can mean 'judgment,' 'justice,' or a legal 'right/claim'; here it likely refers to the mother's rightful authority within the family.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel reads 'sons' in the second line, while the extant Hebrew has 'her children.' The translation follows the Hebrew as the primary witness here.
    reason: textual_variant
