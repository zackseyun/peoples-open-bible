translation:
  language: es
  text: Pues el mandato del rey estaba sobre ellos, y una provisión fija[a] para los cantores, asunto de cada día en su día[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo traducido «provisión fija» también puede indicar un arreglo firme o una obligación establecida.
    reason: lexical_alternative
  - marker: b
    text: O «el requerimiento diario», es decir, lo necesario para cada día.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la frase anterior; en español, «porque» conserva bien la relación causal/expositiva sin volver la línea rígida.
- source_word: מִצְוַת הַמֶּלֶךְ
  english_pob_choice: the king’s command
  chosen_spanish: el mandato del rey
  alternatives_spanish:
  - la orden del rey
  - el mandamiento del rey
  lexicon: HALOT
  rationale: מִצְוָה aquí denota una directiva con autoridad. «Mandato» preserva esa fuerza administrativa y suena natural en español.
- source_word: עֲלֵיהֶם
  english_pob_choice: was upon them
  chosen_spanish: estaba sobre ellos
  alternatives_spanish:
  - pesaba sobre ellos
  - estaba encima de ellos
  lexicon: HALOT
  rationale: La expresión mantiene la imagen hebrea de algo que recae sobre ellos como obligación o autoridad; «estaba sobre ellos» es la opción más transparente.
- source_word: וַאֲמָנָה
  english_pob_choice: a fixed provision
  chosen_spanish: una provisión fija
  alternatives_spanish:
  - un arreglo firme
  - una obligación establecida
  - una asignación fija
  lexicon: HALOT
  rationale: En este contexto administrativo, el término apunta a una disposición establecida. «Provisión fija» sigue de cerca la solución inglesa de POB y conserva la idea de asignación permanente.
- source_word: עַל הַמְשֹׁרְרִים
  english_pob_choice: for the singers
  chosen_spanish: para los cantores
  alternatives_spanish:
  - sobre los cantores
  - acerca de los cantores
  lexicon: HALOT
  rationale: Aunque el hebreo usa עַל, el sentido contextual es de beneficio o asignación destinada a ellos. «Cantores» es el equivalente bíblico natural en español para este oficio.
- source_word: דְּבַר י֥וֹם בְּיוֹמֽוֹ
  english_pob_choice: each day’s matter on its day
  chosen_spanish: asunto de cada día en su día
  alternatives_spanish:
  - el requerimiento diario, día por día
  - la necesidad de cada día en su día
  - la provisión diaria, cada día
  lexicon: HALOT
  rationale: El hebreo es idiomático y administrativo. La versión conserva la estructura repetitiva y el énfasis día-a-día sin ocultar el paralelismo original.
translation_notes:
  revision_awareness: El texto inglés de POB se mantuvo sin cambios en la revisión más reciente; la redacción española sigue esa lectura y conserva la misma tensión semántica entre una disposición administrativa fija y una provisión diaria.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Cantores» traduce el oficio de הַמְשֹׁרְרִים de manera bíblica y comprensible en español.
  - Se preservó la imagen hebrea de obligación/autoridad que «recae sobre ellos» mediante «estaba sobre ellos».
