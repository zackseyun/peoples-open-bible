translation:
  language: es
  text: 'Entonces se levantaron y cruzaron por número: doce para Benjamín[b] y para Is-boset[c], hijo de Saúl, y doce de los esclavos de David[d].[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pasaron» o «fueron al otro lado». El verbo hebreo puede señalar movimiento a través de un lugar designado o hacia él.
    reason: lexical_alternative
  - marker: b
    text: O «de Benjamín». La preposición hebrea puede indicar origen o afiliación; aquí probablemente señala que representaban a Benjamín y a Is-boset.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «Ish-bosheth»; en otra tradición textual relacionada aparece la forma «Eshbaal».
    reason: alternative_reading
  - marker: d
    text: O «de los siervos de David» o, más interpretativamente, «de los hombres de David».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: they arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: HALOT
  rationale: El hebreo narra una acción sucesiva de levantarse para continuar la escena. «Se levantaron» es natural en español y conserva el movimiento narrativo sin añadir matices innecesarios.
- source_word: וַיַּעַבְרוּ
  english_pob_choice: crossed over
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - cruzaron al otro lado
  lexicon: HALOT
  rationale: El verbo עבר admite la idea de pasar o cruzar. Aquí «cruzaron» conserva la imagen de desplazamiento y deja abierta la dirección exacta sin sobreinterpretar.
- source_word: בְמִסְפָּר
  english_pob_choice: by number
  chosen_spanish: por número
  alternatives_spanish:
  - en número
  - según el número
  lexicon: HALOT
  rationale: La locución hebrea indica una distribución contada y equilibrada. «Por número» reproduce la forma breve del original y mantiene la idea de proporción numérica.
- source_word: לְבִנְיָמִן
  english_pob_choice: for Benjamin
  chosen_spanish: para Benjamín
  alternatives_spanish:
  - de Benjamín
  - en favor de Benjamín
  lexicon: HALOT
  rationale: La preposición ל aquí señala afiliación o bando, no solo origen. «Para Benjamín» comunica pertenencia al grupo de Benjamín en el reparto.
- source_word: וּלְאִישׁ בֹּשֶׁת
  english_pob_choice: and for Ish-bosheth
  chosen_spanish: y para Is-boset
  alternatives_spanish:
  - y para Eshbaal
  lexicon: HALOT
  rationale: Se conserva la forma masorética «Ish-boset», adaptada al español como nombre propio. Mantenerla respeta el testimonio textual del pasaje y la decisión auditada de la POB.
- source_word: בֶּן שָׁאוּל
  english_pob_choice: the son of Saul
  chosen_spanish: hijo de Saúl
  alternatives_spanish:
  - el hijo de Saúl
  lexicon: HALOT
  rationale: La construcción filial es directa y se expresa con naturalidad en español con «hijo de Saúl».
- source_word: מֵעַבְדֵי דָוִד
  english_pob_choice: from the servants of David
  chosen_spanish: de los esclavos de David
  alternatives_spanish:
  - de los siervos de David
  - de los hombres de David
  lexicon: HALOT
  rationale: La POB inglesa eligió «servants» para עבדים, pero el proyecto suele preservar la fuerza lexical de δοῦλος/עבד como «esclavo» cuando el contexto lo permite. Aquí «esclavos» mantiene la relación de pertenencia/servicio y evita suavizar el término a «siervos» sin una razón textual suficiente.
theological_decisions:
- issue: Identidad textual de Is-boset frente a Eshbaal
  english_pob_reading: Hebrew 'Ish-bosheth'; elsewhere the related form 'Eshbaal' appears in the Old Testament tradition.
  chosen_spanish_reading: Is-boset
  alternative_spanish_readings:
  - Eshbaal
  rationale: Se sigue la forma masorética de este versículo, como hace la POB inglesa, y se deja constancia de la forma alternativa tradicional para no borrar la tensión textual.
  doctrine_reference: Crítica textual del texto hebreo y tradición onomástica de Samuel
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente, que no introdujo cambios respecto al texto inglés auditado. La propuesta española sigue de cerca ese estado estable y conserva las notas de alternativa necesarias para el verbo עבר, la preposición ל, el nombre propio de Is-boset y la expresión final sobre los עבדים de David.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «Is-boset» en vez de una traducción eufónica libre para respetar la forma masorética del pasaje.
  - «Esclavos» se usa de manera deliberada para reflejar la fuerza lexical de עבדים, en coherencia con la terminología proyectual.
  - La puntuación con dos puntos tras «por número» sigue la división sintáctica del original y ayuda a leer la simetría de los dos grupos.
