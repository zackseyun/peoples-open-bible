base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/009.yaml
  text: And Iechonias and Samaias and Nathanael the brother[a], and Sabias and Ochielos and Joram, commanders of thousands, gave to the Levites for the Passover one thousand sheep and seven hundred calves.
  footnotes:
  - marker: a
    text: The Hebrew parallel in 2 Chronicles 35:9 names different officials and gives different numbers (2,600 Passover animals and 300 cattle). Because 1 Esdras is translated here from its Greek text, the Greek names and numbers are retained in the main text.
    reason: textual_variant
