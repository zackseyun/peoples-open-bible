base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/024/011.yaml
  text: Look[a], this day your own eyes have seen that Yahweh gave you today into my hand in the cave, and I said to kill you, but I spared you. I said, ‘I will not stretch out my hand against my lord[b], for he is Yahweh’s anointed.’
  footnotes:
  - marker: a
    text: Or, 'and he said to kill you,' 'and it was said to kill you,' or 'and one said that I should kill you.' The Hebrew has an unspecified singular verb.
    reason: alternative_reading
  - marker: b
    text: Or, 'but I had pity on you.' The Hebrew verb can express sparing out of compassion.
    reason: lexical_alternative
