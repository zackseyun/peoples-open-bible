revisions:
- from: Entonces alzaron su voz y lloraron otra vez. Orfa besó a su suegra[a], pero Rut se quedó pegada a ella.
  to: Entonces alzaron sus voces y lloraron otra vez. Orfa besó a su suegra, pero[a] Rut se aferró a ella.
  rationale: Se revisa principalmente דָּבְקָה בָּהּ como «se aferró a ella» para mantener la fuerza relacional del hebreo en un español más natural y digno. También se mejora el modismo inicial a «alzaron sus voces» y se recoloca la nota al pie sobre «pero/y» en el punto exacto de la decisión traductora.
