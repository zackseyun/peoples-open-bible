  text: וְ/הַ/לְוִיִּ֞ם יַחֲנ֤וּ סָבִיב֙ לְ/מִשְׁכַּ֣ן הָ/עֵדֻ֔ת וְ/לֹֽא יִהְיֶ֣ה קֶ֔צֶף עַל עֲדַ֖ת בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/שָׁמְרוּ֙ הַ/לְוִיִּ֔ם אֶת מִשְׁמֶ֖רֶת מִשְׁכַּ֥ן הָ/עֵדֽוּת־־־׃
