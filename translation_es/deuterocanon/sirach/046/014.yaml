    rationale: «Según el mandamiento de Yahvé» es comprensible, pero «Por mandato de Yahvé» suena más natural y digno en español bíblico contemporáneo, preservando bien el valor instrumental/normativo de במצות.
  revised_spanish_text: Por mandato de Yahvé, mandó a la asamblea[a], y el Dios de Jacob lo visitó[b].
