translation:
  language: es
  text: Y dejó de lado las disposiciones reales establecidas para los judíos por medio de Juan[a], el padre de Eupólemo —el que había hecho la embajada a los romanos acerca de amistad y alianza—, y, mientras abolía las instituciones legítimas[b], introducía costumbres ilegales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las medidas reales benévolas» o «los decretos reales favorables» para los judíos.
    reason: lexical_alternative
  - marker: b
    text: O «las instituciones legítimas» o «el orden cívico legítimo». El término griego puede referirse ampliamente a la constitución cívica o al orden público de una comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ κείμενα
  english_pob_choice: the ... laid down / the provisions laid down
  chosen_spanish: las disposiciones ... establecidas
  alternatives_spanish:
  - los decretos ... establecidos
  - las provisiones ... en vigor
  - los arreglos ... fijados
  lexicon: LSJ
  rationale: El participio de κεῖμαι aquí alude a medidas ya establecidas o vigentes. «Disposiciones establecidas» conserva el valor jurídico-formal sin sonar demasiado técnico en español.
- source_word: φιλάνθρωπα βασιλικὰ
  english_pob_choice: royal provisions
  chosen_spanish: disposiciones reales
  alternatives_spanish:
  - medidas reales benévolas
  - decretos reales humanos
  - provisiones reales favorables
  lexicon: LSJ
  rationale: La expresión describe medidas favorables del rey hacia los judíos. «Disposiciones reales» mantiene βασιλικά explícito; el matiz benévolo de φιλάνθρωπα queda implícito por el contexto sin sobrecargar la frase.
- source_word: παρώσας
  english_pob_choice: set aside
  chosen_spanish: desechó
  alternatives_spanish:
  - dejó de lado
  - anuló
  - rechazó
  lexicon: LSJ
  rationale: El participio indica que se apartaron o desestimaron las disposiciones previas. «Desechó» es natural en español y refleja la idea de ponerlas a un lado sin afirmar más de lo que el griego exige.
- source_word: πρεσβείαν
  english_pob_choice: the embassy
  chosen_spanish: la embajada
  alternatives_spanish:
  - la misión
  - la delegación
  lexicon: LSJ
  rationale: El término se refiere a una misión diplomática oficial. «Embajada» preserva el registro político-diplomático del pasaje.
- source_word: φιλίας καὶ συμμαχίας
  english_pob_choice: friendship and alliance
  chosen_spanish: amistad y alianza
  alternatives_spanish:
  - amistad y tratado
  - amistad y confederación
  - afecto y alianza
  lexicon: LSJ
  rationale: Son términos diplomáticos estándar. «Amistad y alianza» es claro en español y conserva el sentido bilateral formal.
- source_word: νομίμους ... πολιτίας
  english_pob_choice: lawful institutions
  chosen_spanish: las instituciones legítimas
  alternatives_spanish:
  - el orden cívico legítimo
  - las instituciones legales
  - la constitución legítima
  lexicon: LSJ
  rationale: πολιτεία puede abarcar orden cívico, constitución o instituciones. «Instituciones legítimas» mantiene amplitud semántica y evita especificar indebidamente una forma de gobierno concreta.
- source_word: καταλύων
  english_pob_choice: abolishing
  chosen_spanish: abolía
  alternatives_spanish:
  - derrocando
  - desmantelando
  - suprimiendo
  lexicon: LSJ
  rationale: El participio expresa una acción de deshacer o derribar estructuras existentes. «Abolía» encaja bien en el contexto jurídico-político y mantiene el paralelismo con la introducción de nuevas costumbres.
- source_word: παρανόμους ἔθισμους
  english_pob_choice: unlawful customs
  chosen_spanish: costumbres ilegítimas
  alternatives_spanish:
  - costumbres sin ley
  - prácticas ilegales
  - usos contrarios a la ley
  lexicon: LSJ
  rationale: La frase contrasta con el orden legítimo anterior y alude a usos contrarios a la ley judía. «Ilegítimas» conserva el matiz legal y de orden establecido, con una formulación natural en español.
- source_word: ἐκαίνιζεν
  english_pob_choice: introduced
  chosen_spanish: introducía
  alternatives_spanish:
  - instituía de nuevo
  - establecía
  - traía
  lexicon: LSJ
  rationale: El imperfecto indica que iba incorporando o instituyendo esas prácticas. «Introducía» refleja bien la acción en curso y el sentido de novedad del verbo.
theological_decisions:
- issue: Sentido de πολιτεία en contexto legal-político judío
  english_pob_reading: lawful institutions
  chosen_spanish_reading: las instituciones legítimas
  alternative_spanish_readings:
  - el orden cívico legítimo
  - la constitución legítima
  - las instituciones legales
  rationale: El contexto trata de la supresión del orden público judío establecido y su reemplazo por prácticas helenizantes. «Instituciones legítimas» comunica bien la dimensión institucional sin forzar un tecnicismo moderno ni restringir demasiado el alcance del griego.
  doctrine_reference: Translation philosophy §1, §5
- issue: Matiz de φιλάνθρωπα βασιλικὰ
  english_pob_reading: royal provisions
  chosen_spanish_reading: disposiciones reales
  alternative_spanish_readings:
  - medidas reales benévolas
  - decretos reales favorables
  rationale: La frase alude a concesiones o disposiciones favorables obtenidas para los judíos. «Disposiciones reales» mantiene neutralidad y fidelidad, dejando que el matiz benévolo lo aporte el contexto inmediato.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y toma en cuenta el audit trail inglés. Se incorporó la corrección revisada para βασιλικά y πολιτείας con un español más neutral: «disposiciones reales» y «instituciones legítimas». También se mantuvieron el orden temporal y la oposición entre el desmantelamiento del orden legítimo y la introducción de costumbres ilegítimas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «judíos», «romanos», «amistad y alianza» y «embajada» por consistencia con el registro histórico-diplomático del pasaje.
  - «Ilegítimas» se eligió para conservar el contraste legal con «legítimas» y evitar simplificar a una mera desaprobación moral.
