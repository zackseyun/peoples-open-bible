translation:
  language: es
  text: Pero si haces un voto a Yahvé tu Dios, no tardarás en cumplirlo, porque Yahvé tu Dios ciertamente lo requerirá de ti, y habrá pecado en ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serás culpable de pecado». El hebreo dice literalmente: «habrá pecado en ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Si
  - Cuando
  lexicon: HALOT
  rationale: En este contexto legal-condicional, כִּי introduce una cláusula que contrapone la posibilidad de hacer voto con la obligación de cumplirlo; «Pero si» preserva el matiz condicional y la leve transición del contexto anterior.
- source_word: תִדֹּר נֶדֶר
  english_pob_choice: you make a vow
  chosen_spanish: haces un voto
  alternatives_spanish:
  - votas un voto
  - haces un voto solemne
  lexicon: HALOT
  rationale: El hebreo usa el verbo con objeto cognado; en español, «hacer un voto» es natural y fiel, sin calcar la redundancia del original.
- source_word: לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: a Yahvé tu Dios
  alternatives_spanish:
  - a Yahvé, tu Dios
  - a Yahvé, tu Dios
  lexicon: HALOT
  rationale: Se conserva «Yahvé» como decisión doctrinal del proyecto para יהוה. La preposición marca el destinatario del voto; «tu Dios» mantiene la relación de pacto.
- source_word: לֹא תְאַחֵר
  english_pob_choice: you shall not delay
  chosen_spanish: no tardarás
  alternatives_spanish:
  - no demorarás
  - no retrasarás
  lexicon: HALOT
  rationale: El verbo אחר expresa demora. «No tardarás» es una solución natural en español legal-bíblico y conserva el sentido de no posponer el cumplimiento.
- source_word: לְשַׁלְּמוֹ
  english_pob_choice: in paying it
  chosen_spanish: en cumplirlo
  alternatives_spanish:
  - en pagarlo
  - en realizarlo
  lexicon: HALOT
  rationale: En contexto de votos, שלם puede significar cumplir o saldar la obligación. «Cumplirlo» es más amplio y evita limitar el voto a una mera transacción monetaria o material.
- source_word: דָּרֹשׁ יִדְרְשֶׁנּוּ
  english_pob_choice: will surely require it
  chosen_spanish: ciertamente lo requerirá
  alternatives_spanish:
  - lo requerirá con certeza
  - sin falta lo requerirá
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la acción; «ciertamente» conserva la fuerza enfática sin sonar artificial en español.
- source_word: מֵעִמָּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu parte
  - de contigo
  lexicon: HALOT
  rationale: La frase indica procedencia respecto de la persona que hizo el voto. «De ti» es la equivalencia idiomática más clara y directa.
- source_word: וְהָיָה בְךָ חֵטְא
  english_pob_choice: and it will be sin in you
  chosen_spanish: y habrá pecado en ti
  alternatives_spanish:
  - y serás culpable de pecado
  - y te contará como pecado
  lexicon: HALOT
  rationale: Se mantiene la forma compacta y algo idiomática del hebreo. «Habrá pecado en ti» deja abierta la tensión entre la culpa contraída y la formulación literal del texto.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto español adopta «Yahvé» para יהוה conforme al principio editorial de no ocultar el nombre divino. Esto sigue la lectura del audit trail inglés, pero ajustada a la convención española del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'Final clause: sin or guilt'
  english_pob_reading: and it will be sin in you / Or, 'you will be guilty of sin.'
  chosen_spanish_reading: y habrá pecado en ti
  alternative_spanish_readings:
  - y serás culpable de pecado
  - y recaerá sobre ti la culpa del pecado
  rationale: La nota inglesa preserva la tensión entre la formulación literal y la implicación jurídica de culpa. En español, «habrá pecado en ti» mantiene la literalidad; la alternativa de culpa puede anotarse sin borrar el giro hebreo.
  doctrine_reference: Lexical/idiomatic note on Hebrew idiom
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se conservó la estructura condicional, el énfasis intensivo de «ciertamente», y la clausula final con su tensión entre literalidad e implicación de culpa. No se detectaron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Se prefirió «voto» y «cumplirlo» para evitar una restricción material indebida de לְשַׁלְּמוֹ.
  - Se mantuvo un registro compacto y bíblico, evitando arcaísmos innecesarios como «dilatarás» o «pagarás» donde el español natural requería otra opción.
