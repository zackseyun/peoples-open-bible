  yaml_path: translation/ot/habakkuk/001/011.yaml
  text: Then he sweeps by like the wind and passes on—he becomes guilty[b][a]; this strength of his is his god.
  footnotes:
  - marker: a
    text: Or, 'he becomes guilty, attributing this strength to his god,' or 'his strength belongs to his god.' The Hebrew final clause is terse and can be understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'wind' can also mean 'spirit'; here the context favors the image of swift, forceful movement like the wind.
    reason: lexical_alternative
