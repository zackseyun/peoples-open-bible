  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido del hebreo y sigue correctamente la trayectoria auditada en inglés: mantiene la fórmula vocativa de Ezequiel, el valor adversativo de אֶל como «contra», la fuerza progresiva/característica del participio, el modismo de profetizar desde el propio corazón y «Yahvé» para יהוה. No obstante, la nota [a] no aporta una alternativa real y resulta impropia, porque repite exactamente la misma expresión del texto en vez de reflejar la alternativa documentada o explicar sin presentarla como variante.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Hijo de hombre» es aceptable en este proyecto por continuidad literaria, y el resto del verso fluye bien. Hay un pequeño detalle de estilo: la nota [a] debe repararse para no confundir al lector con una falsa alternativa. El uso de «desde su propio corazón» y «Oigan la palabra de Yahvé» es legible y fiel.'
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יהוה -> «Yahvé»; דְּבַר יְהוָה -> «la palabra de Yahvé»; el modismo de לֵב se conserva como «corazón»; no hay conflictos con Mesías/Cristo ni otros términos sensibles. La única desalineación práctica es la formulación de la nota [a], no el texto principal.'
  issues:
  - severity: medium
    issue: La nota [a] presenta como alternativa una lectura idéntica al texto principal.
    rationale: Dice «O, más literalmente, “Hijo de hombre”», pero el texto principal ya dice «Hijo de hombre». Eso no preserva adecuadamente la justificación lexical del inglés ni ayuda al lector. Debe convertirse en una nota explicativa real o eliminarse.
  - severity: low
    issue: La razón de la nota [a] está etiquetada como alternativa cuando en realidad es explicación de fórmula fija.
    rationale: La documentación inglesa no exige una nota aquí; si se conserva, debe explicar la función de la expresión, no fingir una variante inexistente.
  revised_spanish_text: 'Hijo de hombre[a], profetiza contra los profetas de Israel, los que están profetizando, y diles a los que profetizan desde[b] su propio corazón: «Oigan la palabra de Yahvé».'
  revised_footnotes:
  - marker: a
    text: Fórmula fija de dirección divina a Ezequiel; también podría traducirse «mortal» o «ser humano», pero aquí se conserva el modismo para mantener la continuidad literaria del libro.
    reason: lexical_explanation
  - marker: b
    text: Lit., «de su propio corazón». El hebreo usa un modismo que indica que hablan desde sí mismos, no desde Yahvé.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Solo se corrige la nota [a] para que deje de ofrecer una falsa alternativa idéntica al texto y explique de manera fiel la decisión lexical documentada.
