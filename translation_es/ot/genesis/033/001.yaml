revisions:
- from: Entonces Jacob alzó sus ojos y miró[a], y he aquí, Esaú venía con él, y cuatrocientos hombres. Así dividió a los niños entre Lea, Raquel y las dos siervas[b].
  to: Entonces Jacob alzó sus ojos y miró[a], y he aquí[b], Esaú venía, y con él cuatrocientos hombres. Así dividió a los niños entre Lea, Raquel y las dos siervas[c].
  rationale: Se corrige la cláusula central para expresar con naturalidad y fidelidad que Esaú venía acompañado por cuatrocientos hombres. Se ajusta la nota [a] para que sea una verdadera alternativa al giro principal, y se añade la nota sobre «he aquí» para reflejar la decisión discursiva documentada en el POB inglés. El resto del texto puede mantenerse.
