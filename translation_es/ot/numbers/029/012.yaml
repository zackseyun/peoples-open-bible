translation:
  language: es
  text: Y el día quince del séptimo mes tendrán una santa convocación. No harán ningún trabajo ordinario, y celebrarán una fiesta para Yahvé durante siete días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבַחֲמִשָּׁה עָשָׂר יוֹם
  english_pob_choice: And on the fifteenth day
  chosen_spanish: Y el día quince
  alternatives_spanish:
  - Y al quince
  - Y en el día quince
  lexicon: HALOT
  rationale: El hebreo marca una fecha calendárica fija; en español, «el día quince» expresa con naturalidad la misma referencia sin añadir elementos ajenos al texto.
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: of the seventh month
  chosen_spanish: del séptimo mes
  alternatives_spanish:
  - en el séptimo mes
  - del mes séptimo
  lexicon: HALOT
  rationale: La fórmula indica el mes al que pertenece el día. «Del séptimo mes» conserva el valor calendárico de la construcción hebrea y suena natural en español.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una santa convocación
  alternatives_spanish:
  - una convocatoria santa
  - una asamblea santa
  lexicon: HALOT
  rationale: «Convocación» reproduce bien la idea de una reunión convocada oficialmente para culto; «santa» mantiene el carácter consagrado del término sin suavizarlo a una simple reunión.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  english_pob_choice: ordinary work
  chosen_spanish: ningún trabajo ordinario
  alternatives_spanish:
  - ningún trabajo común
  - ninguna labor ordinaria
  - ningún trabajo laboral
  lexicon: HALOT
  rationale: La expresión hebrea no prohíbe toda actividad sin matiz, sino el trabajo habitual de ocupación. «Trabajo ordinario» preserva esa restricción y evita una lectura excesivamente absoluta.
- source_word: וְחַגֹּתֶם חַג
  english_pob_choice: you shall keep a feast
  chosen_spanish: celebrarán fiesta
  alternatives_spanish:
  - observarán una fiesta
  - harán fiesta
  lexicon: HALOT
  rationale: El verbo intensifica la idea de observancia festiva. «Celebrarán fiesta» transmite ese carácter ritual y festivo sin perder la fuerza del hebreo cognado.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - en honor de Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva «Yahvé» como forma principal en español, conforme a la pauta del proyecto para יהוה. La preposición «para» refleja la orientación de la fiesta hacia Yahvé y funciona de modo natural en español litúrgico.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - siete días
  - por siete días
  lexicon: HALOT
  rationale: 'El sentido es durativo: la fiesta se extiende a lo largo de siete días. «Durante siete días» expresa ese valor con claridad en español.'
theological_decisions:
- issue: Forma del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La norma del proyecto pide representarlo en español como «Yahvé», no con un sustituto litúrgico. Se evita así ocultar el nombre propio del pacto y se mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El inglés auditado confirma una lectura estable sin notas ni revisiones textuales pendientes. La principal diferencia de esta entrega es la adaptación al estándar español del proyecto: uso de «Yahvé» para יהוה y de una formulación natural para la expresión calendárica y la prohibición de trabajo ordinario.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico-dignificado, con sintaxis clara y sin calcos innecesarios.
  - «Santa convocación» conserva el tecnicismo cultual del hebreo.
  - «Trabajo ordinario» evita diluir el contraste entre labor cotidiana y observancia sagrada.
  - «Yahvé» se usa de forma consistente con la terminología del proyecto para el Nombre divino.
