    rationale: El hebreo expresa miedo o temor/dread; «aterrado» sugiere terror fuerte. El expediente inglés prefirió «I am afraid» con «I dread» como alternativa, por lo que conviene una opción española menos extrema.
  - severity: medium
    issue: La nota al pie usa una alternativa en inglés y no preserva las alternativas clave de עַצְּבֹתַי/תְנַקֵּנִי
    rationale: Las notas deben servir al lector español y reflejar alternativas significativas preservadas por el POB. La nota actual sobre «dread» no está en español y omite las alternativas documentadas para «mis dolores» y «no me absolverás».
