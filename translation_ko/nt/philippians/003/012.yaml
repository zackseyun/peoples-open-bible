id: PHP.3.12
reference: Philippians 3:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὐχ ὅτι ἤδη ἔλαβον ἢ ἤδη τετελείωμαι, διώκω δὲ εἰ καὶ καταλάβω, ἐφ’ ᾧ καὶ κατελήμφθην ὑπὸ ⸀Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/012.yaml
  text: Not that I have already received it or have already been perfected[c][b][a], but I press on to see if I may also take hold of that for which I too was taken hold of by Christ.
  footnotes:
  - marker: a
    text: Or 'obtained'; the Greek leaves the object implicit from the surrounding context.
    reason: lexical_alternative
  - marker: b
    text: Or 'have already become perfect' or 'have already been made complete.'
    reason: lexical_alternative
  - marker: c
    text: Greek Christos; alternatively 'Messiah.'
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 이미 그것을 얻었다거나[a] 이미 온전해졌다는[b] 말이 아닙니다. 다만, 내가 메시아 예수께[c] 붙잡힌 바 그것을 나 또한 붙잡으려고 좇아갑니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「받았다」. 헬라어는 목적어를 명시하지 않으며, 문맥에서 보충된다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「이미 완전해졌다」 또는 「이미 완성되었다」. 헬라어 완료 수동형은 정착된 상태를 가리키며, 그 자체로 후대의 무죄 완전 교리를 함의하지는 않는다.
    reason: lexical_alternative
  - marker: c
    text: 본 번역의 일관 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다. 또는 「그리스도께」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβον
  english_pob_choice: have already received it
  chosen_korean: 이미 그것을 얻었다
  alternatives_korean:
  - 이미 받았다
  - 이미 손에 넣었다
  lexicon: BDAG
  rationale: λαμβάνω가 앞 문맥의 목표를 가리키므로 「그것을」을 보충한다. 14절의 「상」을 미리 가리키는 흐름과도 잘 맞는 「얻었다」를 택한다.
- source_word: τετελείωμαι
  english_pob_choice: have already been perfected
  chosen_korean: 이미 온전해졌다
  alternatives_korean:
  - 이미 완전해졌다
  - 이미 완성되었다
  lexicon: BDAG
  rationale: 완료 수동형. 한국어 「온전해지다」는 본문이 명시하는 「완성된 상태」를 자연스럽게 표현하고, 「완전」이 함의하는 절대적 무죄 의미를 과도하게 도입하지 않는다.
- source_word: διώκω
  english_pob_choice: I press on
  chosen_korean: 좇아갑니다
  alternatives_korean:
  - 달려갑니다
  - 힘써 좇아갑니다
  lexicon: BDAG
  rationale: 본 장의 경주 비유에 어울리는 「좇아가다」를 택한다. 14절과 일관된 어휘를 유지한다. 한국 성서 전통과도 일치.
- source_word: καταλάβω
  english_pob_choice: I may also take hold of
  chosen_korean: 나 또한 붙잡으려고
  alternatives_korean:
  - 잡으려고
  - 얻으려고
  lexicon: BDAG
  rationale: 「붙잡다」가 절 후반의 κατελήμφθην(붙잡힌 바)과의 어휘 유희를 살리는 핵심이다.
- source_word: ἐφ’ ᾧ
  english_pob_choice: that for which
  chosen_korean: ~한 바 그것을
  alternatives_korean:
  - ~한 바로 그 일을
  - ~한 그 까닭에
  lexicon: BDAG
  rationale: 본 문맥의 ἐφ’ ᾧ는 목적·목표(메시아가 바울을 붙잡은 그 목적)를 가리킨다. 「~한 바 그것을」로 그 의미를 자연스럽게 살린다.
- source_word: κατελήμφθην
  english_pob_choice: was taken hold of
  chosen_korean: 붙잡힌 바
  alternatives_korean:
  - 사로잡힌 바
  - 잡힌 바
  lexicon: BDAG
  rationale: 수동 아오리스트. καταλάβω와의 어휘 유희(붙잡으려고 ~ 붙잡힌)를 보존한다.
- source_word: Χριστοῦ
  english_pob_choice: Christ
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도
  - 메시아
  lexicon: BDAG
  rationale: 영어 POB는 본 절에서 이름형 「Christ」를 택했으나, 본 한국어 번역은 일관성과 칭호성 보존을 위해 「메시아」를 유지한다. 「예수」 보충은 본문 화자(바울)와의 관계를 분명히 하기 위함이다.
theological_decisions:
- issue: τετελείωμαι가 무죄 완전을 함의하는가
  chosen_reading: 이미 온전해졌다
  alternative_readings:
  - 이미 완전해졌다
  - 이미 완성되었다
  rationale: 헬라어는 바울이 도달된 상태에 이르지 못했음을 부인할 뿐, 후대의 도그마적 범주를 명시하지 않는다. 본 번역은 수동·결과적 함의를 살리되, 본문 자체가 진술하는 이상의 신학적 주장을 도입하지 않는다.
  doctrine_reference: 'Preserve theological tension rather than resolve it.'
- issue: 본 절 Χριστοῦ의 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 번역의 일관 원칙에 따라 칭호 Χριστός는 「메시아」. 영어 POB가 본 절에서 「Christ」를 택한 것은 한국 번역에는 자동으로 적용되지 않는다.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like).'
