translation:
  language: es
  text: Y estas son las generaciones de Esaú[a], el padre de Edom, en la serranía de Seír.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el monte Seír» o «en las montañas de Seír».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: La conjunción וְ conserva la conexión narrativa con el contexto anterior, y אֵלֶּה se expresa naturalmente como «estos son» en una fórmula genealógica de apertura.
- source_word: תֹּלְדוֹת
  english_pob_choice: the generations
  chosen_spanish: los descendientes
  alternatives_spanish:
  - las generaciones
  - la familia
  - la descendencia
  lexicon: HALOT
  rationale: En español, «las generaciones» suena más abstracto y menos genealógico; «los descendientes» comunica mejor el sentido de una sección que introduce la línea familiar de Esaú, sin perder la función estructural del término.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: convención onomástica bíblica
  rationale: Se usa la forma española establecida del nombre propio bíblico.
- source_word: אֲבִי
  english_pob_choice: the father of
  chosen_spanish: el padre de
  alternatives_spanish:
  - antepasado de
  lexicon: HALOT
  rationale: El hebreo constructo presenta progenitura directa; «el padre de» sigue de cerca la relación expresada por el original y coincide con la decisión inglesa de evitar una paráfrasis más amplia.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  lexicon: convención onomástica bíblica
  rationale: Nombre propio geográfico/étnico conservado sin traducción.
- source_word: בְּ/הַר
  english_pob_choice: in the hill country of
  chosen_spanish: en la serranía de
  alternatives_spanish:
  - en la región montañosa de
  - en el monte de
  lexicon: HALOT
  rationale: Aunque הַר puede ser «monte», en expresiones geográficas apunta a una zona montañosa. «Serranía» comunica ese valor regional en español sin reducirlo a un pico único ni sonar forzado.
- source_word: שֵׂעִיר
  english_pob_choice: Seir
  chosen_spanish: Seír
  alternatives_spanish:
  - Seir
  lexicon: convención onomástica bíblica
  rationale: Se usa la forma española tradicional del topónimo bíblico.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto aprobado mantiene la fórmula genealógica y la opción geográfica de 'hill country of'. La versión española sigue esa línea, adaptando la frase a un español natural sin perder la distinción entre un monte singular y una región montañosa.
  spanish_consistency_notes:
  - Se conserva el patrón genealógico inicial con «Y estos son…», equivalente funcional de la fórmula hebrea.
  - «Descendientes» se eligió como equivalente idiomático de תּוֹלְדוֹת en una cabecera genealógica, aunque «generaciones» permanece como alternativa documentada.
  - El topónimo Seír se escribe con tilde según ortografía española, mientras que Edom se conserva sin adaptación adicional.
  - La nota al pie mantiene la alternativa espacial documentada por la POB inglesa para el término geográfico.
