translation:
  language: es
  text: Cuando el rey David llegó a Bahurim[a], he aquí que salió de allí un hombre del clan de la casa de Saúl, cuyo nombre era Simeí hijo de Gera; seguía saliendo, mientras maldecía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «salía una y otra vez y maldecía». El hebreo intensifica el verbo «salir» mediante participio + infinitivo absoluto, lo que probablemente expresa una acción repetida o sostenida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: When ... came
  chosen_spanish: Cuando ... llegó
  alternatives_spanish:
  - Y ... llegó
  - Entonces ... llegó
  lexicon: HALOT
  rationale: La partícula narrativa con verbo de movimiento introduce la escena de manera temporal; «Cuando» reproduce bien ese enlace en español sin perder el avance narrativo.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - David, el rey
  - el rey, David
  lexicon: HALOT
  rationale: La aposición título-nombre se expresa de forma natural en español con «el rey David», preservando tanto el cargo como el nombre propio.
- source_word: עַד בַּחוּרִים
  english_pob_choice: to Bahurim
  chosen_spanish: a Bahurim
  alternatives_spanish:
  - hasta Bahurim
  - hacia Bahurim
  lexicon: HALOT
  rationale: La preposición marca llegada a un lugar; «a» es la solución más natural y suficiente en español en este contexto.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: Conviene conservar la fuerza deíctica y de sorpresa del hebreo con una fórmula solemne, sin volverla excesivamente arcaica.
- source_word: מִשָּׁם אִישׁ יוֹצֵא
  english_pob_choice: a man came out from there
  chosen_spanish: salió de allí un hombre
  alternatives_spanish:
  - un hombre salía de allí
  - de allí salió un hombre
  lexicon: HALOT
  rationale: El participio narra una acción en desarrollo o de escena; en español, el pretérito simple con orden invertido fluye mejor y mantiene la imagen visual.
- source_word: מִמִּשְׁפַּחַת בֵּית שָׁאוּל
  english_pob_choice: from the clan of the house of Saul
  chosen_spanish: de la familia de la casa de Saúl
  alternatives_spanish:
  - del clan de la casa de Saúl
  - de la estirpe de la casa de Saúl
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede indicar grupo de parentesco amplio; «familia» es inteligible, y «casa de Saúl» conserva el valor dinástico de בֵּית.
- source_word: וּשְׁמוֹ שִׁמְעִי בֶן גֵּרָא
  english_pob_choice: whose name was Shimei son of Gera
  chosen_spanish: cuyo nombre era Simeí hijo de Gera
  alternatives_spanish:
  - y su nombre era Simeí hijo de Gera
  - llamado Simeí hijo de Gera
  lexicon: HALOT
  rationale: La cláusula relativa reproduce con claridad la fórmula identificadora; «hijo de» mantiene la filiación directa del hebreo.
- source_word: יֹצֵא יָצוֹא
  english_pob_choice: he came out continually
  chosen_spanish: salía continuamente
  alternatives_spanish:
  - salía una y otra vez
  - seguía saliendo
  lexicon: HALOT
  rationale: La combinación participio + infinitivo absoluto intensifica o repite la acción; «salía continuamente» conserva esa persistencia sin sonar mecánico.
- source_word: וּמְקַלֵּל
  english_pob_choice: cursing as he came
  chosen_spanish: maldiciendo mientras salía
  alternatives_spanish:
  - y maldecía mientras salía
  - maldiciendo al salir
  lexicon: HALOT
  rationale: El participio expresa una acción concomitante; «maldiciendo mientras salía» hace explícita la simultaneidad y mantiene el tono descriptivo.
translation_notes:
  revision_awareness: No se registran revisiones posteriores en el expediente inglés; se ha seguido la lectura estable del texto fuente con la misma resolución del matiz intensivo de יֹצֵא יָצֹוא.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Simeí» sigue la forma española usual para שִׁמְעִי y evita la transliteración más cruda.
  - La nota al pie preserva la tensión aspectual del hebreo sin convertirla en paráfrasis interpretativa.
  - Se mantiene la referencia a «la casa de Saúl» como expresión dinástica, coherente con el expediente inglés.
