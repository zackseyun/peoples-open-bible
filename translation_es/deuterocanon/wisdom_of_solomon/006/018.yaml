translation:
  language: es
  text: y el cuidado de la instrucción es amor[a], y el amor es la observancia de sus leyes, y la atención a sus leyes es la seguridad de la incorruptibilidad[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disciplina» o «formación» para παιδεία, destacando la educación moral formativa.
    reason: lexical_alternative
  - marker: b
    text: O «inmortalidad» para ἀφθαρσία. El griego habla más literalmente de libertad respecto a la corrupción o decadencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: φροντίς
  english_pob_choice: concern
  chosen_spanish: cuidado
  alternatives_spanish:
  - preocupación
  - solicitud
  - atención
  lexicon: LSJ
  rationale: φροντίς expresa cuidado, preocupación o atención atenta. «Cuidado» conserva el valor abstracto del sustantivo y suena natural en español dentro de una cadena definicional.
- source_word: παιδείας
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - educación
  - formación
  lexicon: LSJ
  rationale: En un contexto sapiencial, παιδεία puede abarcar instrucción formativa o disciplina. «Instrucción» es claro y amplio, y permite conservar la dimensión moral-formativa sin estrechar demasiado el término.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: ἀγάπη se traduce normalmente como «amor». Mantiene la repetición intencional del verso y evita sustituirla por un término eclesial más interpretativo.
- source_word: τήρησις
  english_pob_choice: keeping
  chosen_spanish: observancia
  alternatives_spanish:
  - guardia
  - cumplimiento
  - custodia
  lexicon: LSJ
  rationale: τήρησις puede significar guardar u observar. «Observancia» conserva el sentido de cumplimiento fiel de leyes y funciona bien con el registro sapiencial-jurídico del texto.
- source_word: νόμων
  english_pob_choice: laws
  chosen_spanish: leyes
  alternatives_spanish:
  - mandamientos
  - estatutos
  lexicon: LSJ
  rationale: νόμος en plural aquí se expresa con naturalidad como «leyes», que sigue más de cerca el griego y el tono jurídico del pasaje.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: sus
  alternatives_spanish:
  - de ella
  - suyas
  lexicon: LSJ
  rationale: El pronombre remite a la Sabiduría personificada en femenino. «Sus» permite conservar esa referencia sin necesidad de sobreexplicarla en el cuerpo del texto.
- source_word: προσοχή
  english_pob_choice: attention
  chosen_spanish: atención
  alternatives_spanish:
  - atención cuidadosa
  - celo
  - aplicación
  lexicon: LSJ
  rationale: προσοχή designa atención, cuidado o vigilancia mental. «Atención» es la opción más directa y natural en español.
- source_word: βεβαίωσις
  english_pob_choice: assurance
  chosen_spanish: garantía
  alternatives_spanish:
  - confirmación
  - aseguramiento
  - establecimiento
  lexicon: LSJ
  rationale: βεβαίωσις puede indicar confirmación o hacer firme algo. «Garantía» comunica bien el resultado de algo hecho seguro, sin exagerar el alcance del término.
- source_word: ἀφθαρσίας
  english_pob_choice: incorruptibility
  chosen_spanish: incorruptibilidad
  alternatives_spanish:
  - inmortalidad
  - imperdurabilidad
  - incorrupción
  lexicon: LSJ
  rationale: ἀφθαρσία significa literalmente ausencia de corrupción o decadencia. «Incorruptibilidad» preserva esa fuerza conceptual y evita imponer como principal una lectura más teológica de «inmortalidad».
theological_decisions:
- issue: La personificación de la Sabiduría en el pronombre posesivo
  english_pob_reading: Render the pronoun as 'her,' referring to personified Wisdom.
  chosen_spanish_reading: Mantener la referencia femenina implícita con «sus», entendiendo que alude a la Sabiduría personificada.
  alternative_spanish_readings:
  - sus leyes = de ella
  - sus leyes = de la instrucción
  rationale: El griego usa un posesivo femenino que enlaza con la personificación de la Sabiduría en el contexto inmediato. En español, «sus» conserva esa referencia de modo natural y fiel.
  doctrine_reference: Translation philosophy §1, §6
- issue: Alcance de ἀφθαρσία
  english_pob_reading: Translate as 'incorruptibility' in the main text.
  chosen_spanish_reading: Traducir como «incorruptibilidad» y no como «inmortalidad» en el texto principal.
  alternative_spanish_readings:
  - inmortalidad
  - imperdurabilidad
  rationale: El griego enfatiza la ausencia de corrupción o decadencia. «Incorruptibilidad» preserva ese matiz sin adelantar una conclusión doctrinal más estrecha que la que el texto formula.
  doctrine_reference: Translation philosophy §1, §3
