translation:
  language: es
  text: 'Midió el lado oriental con la caña de medir: quinientas cañas, según la caña de medir[a], por todo alrededor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cinco codos, cañas». En contexto, esto suele entenderse como «quinientas cañas», en armonía con las medidas de los versículos 16–19. Algunos manuscritos y versiones antiguas lo expresan de manera más explícita.'
