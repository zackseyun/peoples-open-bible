  text: II. 2. Ὅτε *δὲ ἦλθον εἰς Αἴγυπτον ἐγνώρισέν³ με ὁ ἀδελφός μου†, λέγει⁴ μοι· ὅτι ἔφυραν⁹ τὸν χιτῶνά σου αἵματι¹⁰ εἶπον¹¹. Ἐπίγνωθι¹² εἰ¹³ ὃ¹⁴ χιτὼν οὗτος. 3. Καὶ λέγει μοι· Ναί, ἀδελφέ¹⁶. καὶ ὅτε¹⁷ ἐξέδυσάν με τὸν χιτῶνά μου δέδωκάν με τοῖς Ἰσμαηλίταις· καὶ δέδωκάν μοι περίζωμα, καὶ φραγγελλώσαντες εἰπόν μοι τρέχειν. 4. Εἰς δὲ ἐξ αὐτῶν ῥάβδῳ μαστίζων με, ὑπήντησεν αὐτῷ λέων καὶ ἀνεῖλεν αὐτόν. 5. Καὶ οὕτως οἱ μέτοχοι αὐτοῦ φοβηθέντες ἐν †ἀνέσει με κατέσχεν†. 6. Καὶ οὐκ ἐψεύσαντο αὐτοὶ ταῦτα λέγοντες· ἤθελεν γὰρ κρύπτειν ἀπʼ ἐμοῦ *τὰ ἔργα τῶν ἀδελφῶν ἡμῶν³¹, καὶ ἐκάλεσε πρὸς αὐτὸν τοὺς ἀδελφοὺς αὐτοῦ³² καὶ λέγει³³· 7. Μὴ λέγετε τῷ πατρί μου³⁴ ἃ ἐποιήσατέ μοι, ἀλλʼ οὕτως λέξατε καθὼς ἐξηγησάμην³⁵ τῷ Βενιαμίν. 8. Καὶ αἱ ἔννοιαι *γένωνται ἐν ὑμῖν³⁶ τοιαῦται³⁷ καὶ μὴ ἔλθωσιν οἱ λόγοι οὗτοι εἰς καρδίαν τοῦ πατρός μου.
