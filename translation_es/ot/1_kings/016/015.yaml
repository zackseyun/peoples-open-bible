translation:
  language: es
  text: En el año veintisiete de Asa, rey de Judá, Zimri reinó siete días en Tirsa, mientras el pueblo estaba acampado contra[a] Gibetón, que pertenecía a los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en Gibetón"; en este contexto militar, "contra Gibetón" probablemente expresa que el pueblo estaba acampado en oposición a la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת עֶשְׂרִים וָשֶׁבַע שָׁנָה
  english_pob_choice: In the twenty-seventh year
  chosen_spanish: En el año veintisiete
  alternatives_spanish:
  - Durante el año veintisiete
  - En el vigésimo séptimo año
  lexicon: HALOT
  rationale: La fórmula de sincronismo regnal en español fluye de modo natural como 'En el año veintisiete'; conserva el valor cronológico sin añadir matices no presentes en el hebreo.
- source_word: לְ/אָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: of Asa king of Judah
  chosen_spanish: de Asa, rey de Judá
  alternatives_spanish:
  - de Asa, el rey de Judá
  - de Asa, rey de Judá
  lexicon: HALOT
  rationale: Mantiene la aposición del título real y la referencia histórica sin sobrecargar la frase. La coma ayuda a reflejar la estructura hebrea.
- source_word: מָלַךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - fue rey
  lexicon: HALOT
  rationale: Aunque el hebreo puede admitir un matiz ingresivo, aquí el contexto inmediato ya expresa la duración; 'reinó' es la forma más directa y natural en español para el periodo de siete días.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - por siete días
  - durante siete días
  lexicon: HALOT
  rationale: En español, el verbo 'reinó' no exige una preposición para expresar duración; por eso se deja la duración en forma simple.
- source_word: בְּ/תִרְצָה
  english_pob_choice: in Tirzah
  chosen_spanish: en Tirsa
  alternatives_spanish:
  - en Tirzá
  lexicon: HALOT
  rationale: Se usa la forma castellana habitual del topónimo bíblico 'Tirsa', manteniendo la identificación geográfica.
- source_word: וְ/הָ/עָם חֹנִים
  english_pob_choice: while the people were camped
  chosen_spanish: mientras el pueblo estaba acampado
  alternatives_spanish:
  - y el pueblo estaba acampado
  - mientras el pueblo acampaba
  lexicon: HALOT
  rationale: El participio hebreo describe una acción/estado en curso; 'estaba acampado' conserva ese aspecto y suena natural en español.
- source_word: עַֽל גִּבְּת֖וֹן
  english_pob_choice: against Gibbethon
  chosen_spanish: contra Gibetón
  alternatives_spanish:
  - en Gibetón
  - junto a Gibetón
  lexicon: HALOT
  rationale: En contexto militar, עַל con una ciudad enemiga indica oposición/hostilidad. 'Contra' reproduce mejor ese valor que un simple local 'en'.
- source_word: אֲשֶׁ֥ר לַ/פְּלִשְׁתִּֽים
  english_pob_choice: which belonged to the Philistines
  chosen_spanish: que pertenecía a los filisteos
  alternatives_spanish:
  - que era de los filisteos
  - que estaba en poder de los filisteos
  lexicon: HALOT
  rationale: La relación expresada por לַ- se traduce de forma clara y sobria con posesión/adscripción. 'Pertenecía' no añade más control militar del que exige el texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y toma como guía la decisión revisada del POB inglés de expresar מָלַךְ con un verbo de reinado directo. Se adoptó un equivalente español igualmente directo ('reinó'), evitando una paráfrasis ingresiva que no mejora la claridad en esta frase con duración explícita.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' por norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usó 'filisteos' en minúscula según la convención española para etnónimos.
  - Se eligió 'Tirsa' como forma española del topónimo, coherente con el uso bíblico habitual y legible para audiencia eclesial amplia.
  - No se añadieron notas al pie porque el hebreo y el audit trail inglés no requieren una alternativa textual obligatoria en esta versión española.
