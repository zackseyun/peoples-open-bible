base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/014/010.yaml
  text: 'Thus says Yahweh concerning this people: Thus they have loved to wander[a]; they have not restrained their feet. Therefore Yahweh does not accept them[c][b]. Now he will remember their iniquity and punish their sins.'
  footnotes:
  - marker: a
    text: Or, more literally, 'they loved to wander' or 'they loved to roam.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the LORD is not pleased with them.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'he will remember their iniquity and visit their sins upon them,' a Hebrew idiom for calling sin to account in judgment.
    reason: alternative_reading
