  rationale: Se corrige el anclaje de la nota para que recaiga sobre el nombre geográfico alternativo que realmente explica, y se ajusta «Mar de la Sal» a «Mar Salado» por mayor naturalidad en español sin perder la fidelidad al hebreo.
