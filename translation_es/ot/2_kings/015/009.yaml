translation:
  language: es
  text: Hizo lo malo ante Yahvé[a], tal como habían hecho sus padres. No se apartó de los pecados de Jeroboam hijo de Nebat, con los que hizo pecar a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los ojos de Yahvé». El hebreo mantiene la imagen de evaluación visual divina.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Y realizó
  lexicon: HALOT
  rationale: En este contexto narrativo, עשה se expresa de forma natural en español con un pasado simple. 'Hizo' conserva la acción y encaja con la fórmula profética/deuteronomista sin añadir matices no presentes.
- source_word: הָרַע בְּעֵינֵי יְהוָה
  english_pob_choice: what was evil in the sight of Yahweh
  chosen_spanish: lo malo ante los ojos de Yahvé
  alternatives_spanish:
  - lo malo a los ojos de Yahvé
  - lo que era malo ante los ojos de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y evaluativa. En español, 'lo malo' mantiene el sustantivo abstracto y 'ante los ojos de Yahvé' conserva la imagen de evaluación divina sin volverla demasiado literal o extraña.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. En español, 'Yahvé' preserva el nombre propio divino y evita la sustitución por un título.
- source_word: כַּאֲשֶׁר עָשׂוּ אֲבֹתָיו
  english_pob_choice: just as his fathers had done
  chosen_spanish: tal como habían hecho sus padres
  alternatives_spanish:
  - como habían hecho sus padres
  - así como lo habían hecho sus padres
  lexicon: HALOT
  rationale: '''Tal como'' reproduce bien el valor comparativo de כַּאֲשֶׁר. ''Sus padres'' conserva el término genealógico/real y resulta natural en español, manteniendo el vínculo con la línea precedente.'
- source_word: לֹא סָר
  english_pob_choice: He did not turn away
  chosen_spanish: No se apartó
  alternatives_spanish:
  - No se desvió
  - No volvió atrás
  lexicon: HALOT
  rationale: סור expresa apartarse o desviarse de un camino. 'No se apartó' es idiomático en español y conserva la negativa de perseverar en esa conducta.
- source_word: מֵחַטֹּאות
  english_pob_choice: from the sins
  chosen_spanish: de los pecados
  alternatives_spanish:
  - de las culpas
  - de los pecados cometidos
  lexicon: HALOT
  rationale: El plural hebreo se preserva con 'los pecados'. 'Pecados' en español comunica adecuadamente la serie de actos concretos asociados al culto/obrar de Jeroboam.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nebat
  alternatives_spanish:
  - Jeroboam, hijo de Nebat
  - Jeroboam el hijo de Nebat
  lexicon: HALOT
  rationale: '''Hijo de'' es la forma natural y fiel para el patronímico. Se conserva el nombre propio sin adaptación tradicionalizante.'
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: with which he caused Israel to sin
  chosen_spanish: con los que hizo pecar a Israel
  alternatives_spanish:
  - por los cuales hizo pecar a Israel
  - con lo que hizo pecar a Israel
  - quien hizo pecar a Israel
  lexicon: HALOT
  rationale: La cláusula relativa en hebreo puede relacionarse con los pecados de Jeroboam como medio por el cual hizo pecar a Israel. 'Con los que' mantiene esa relación instrumental y el plural del antecedente, sin borrar la ambigüedad documentada entre los pecados y la persona de Jeroboam.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino conforme al criterio del proyecto, en vez de sustituirlo por un título. Esto mantiene la referencia personal del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Ambigüedad del relativo final: Jeroboam o sus pecados'
  english_pob_reading: with which he caused Israel to sin
  chosen_spanish_reading: con los que hizo pecar a Israel
  alternative_spanish_readings:
  - quien hizo pecar a Israel
  - con lo que hizo pecar a Israel
  rationale: La traducción principal conserva la cercanía sintáctica entre 'los pecados' y el acto de hacer pecar a Israel, sin resolver de manera prematura si el relativo recae sobre Jeroboam o sobre sus pecados. Así se preserva la tensión observada en la fuente y en el audit trail inglés.
  doctrine_reference: Principio POB de preservar tensiones textuales cuando el original permite más de una referencia válida
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al reflejar la relación instrumental con 'con los que', equivalente funcional de la solución final en inglés ('with which'). También se preservó la observación auditada de que el relativo puede aludir tanto a los pecados de Jeroboam como, estrechamente, a Jeroboam mismo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' según el estándar del proyecto para יְהוָה.
  - Se mantuvo el patronímico con 'hijo de' por claridad y fidelidad.
  - Se eligió 'pecados' en plural para respetar מֵחַטֹּאות y la formulación deuteronomista.
  - La cláusula final conserva la ambigüedad relativa sin forzar una lectura exclusivamente personal o exclusivamente instrumental.
