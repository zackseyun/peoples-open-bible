translation:
  language: es
  text: 'Y dijo el rey a sus servidores[a]: «Retírenme de la batalla, porque estoy muy débil». E inmediatamente sus servidores lo apartaron de la línea de batalla,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asistentes». El griego παῖδες puede significar «servidores», «asistentes» o «jóvenes»; el paralelo hebreo lee «sus siervos».
    reason: lexical_alternative
lexical_decisions:
- source_word: παῖς / παισίν / παιδες
  english_pob_choice: servants
  chosen_spanish: servidores
  alternatives_spanish:
  - siervos
  - criados
  - atendientes
  lexicon: LSJ
  rationale: En este contexto real de corte y guerra, παῖδες designa a los ayudantes o retenedores personales del rey, no a niños. "Servidores" conserva la relación de servicio sin caer en un término demasiado doméstico o infantil. El paralelo hebreo aporta "sus siervos" como apoyo contextual.
- source_word: Ἀποστήσατέ με
  english_pob_choice: Take me away
  chosen_spanish: Apartadme
  alternatives_spanish:
  - Llevadme lejos
  - Retiradme
  - Sacadme
  lexicon: LSJ
  rationale: El imperativo pide alejar físicamente al rey del peligro. "Apartadme" expresa con naturalidad esa remoción y mantiene el valor causativo del verbo griego, como también sugiere el paralelo hebreo.
- source_word: ἀπὸ τῆς μάχης
  english_pob_choice: from the battle
  chosen_spanish: de la batalla
  alternatives_spanish:
  - del combate
  - de la lucha
  - del enfrentamiento
  lexicon: LSJ
  rationale: μάχη es la batalla o combate en curso. "De la batalla" preserva la referencia directa al conflicto armado sin añadir matices que el griego no exige.
- source_word: ἠσθένησα
  english_pob_choice: I am very weak
  chosen_spanish: estoy muy débil
  alternatives_spanish:
  - me he debilitado mucho
  - estoy muy enfermo
  - estoy muy abatido
  lexicon: LSJ
  rationale: El verbo expresa debilidad o enfermedad; no obliga a especificar herida. "Estoy muy débil" reproduce la condición inmediata y coincide con el sentido del paralelo hebreo de gran enfermedad/debilidad.
- source_word: λίαν
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en gran manera
  - excesivamente
  lexicon: LSJ
  rationale: λίαν intensifica la afirmación. "Muy" es la opción más natural en español contemporáneo y no exagera el grado.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: e inmediatamente
  alternatives_spanish:
  - enseguida
  - al instante
  - de inmediato
  lexicon: LSJ
  rationale: La partícula marca prontitud. "E inmediatamente" conserva el enlace narrativo y la rapidez de la acción.
- source_word: παράταξις
  english_pob_choice: battle line
  chosen_spanish: línea de batalla
  alternatives_spanish:
  - formación de batalla
  - línea de combate
  - batalla
  lexicon: LSJ
  rationale: παράταξις se refiere a la disposición militar ordenada. "Línea de batalla" mantiene el matiz de formación bélica y evita repetir simplemente "batalla".
translation_notes:
  revision_awareness: El texto griego es el ancla primaria; el paralelo hebreo funciona solo como comprobación contextual de nombre propio y fraseología. La redacción española sigue de cerca la acción imperativa, la causa de la debilidad y la retirada inmediata de la línea de batalla, sin añadir elementos no presentes en el original.
  spanish_consistency_notes:
  - Se eligió «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «servidores» para παῖδες por el contexto cortesano-militar y por el apoyo del paralelo hebreo; se conserva la alternativa en nota.
  - «Línea de batalla» evita perder el matiz militar específico de παράταξις.
  - 'Se mantiene el orden narrativo del griego: habla del rey, petición de retirada, motivo de debilidad, y ejecución inmediata.'
