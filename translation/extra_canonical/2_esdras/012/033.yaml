translation:
  text: And it will be[a], when he has reproved them, then he will destroy them[b]. For the remnant
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'will set their contempt before them' is textually difficult in Latin. The sense appears to be that their scornful deeds will be exposed publicly before them rather than hidden.
    reason: textual_variant
    anchor_ref: '12:33'
  - marker: b
    text: Or 'this is the Anointed One, whom the Most High has kept for the end, against them and against their impieties. He will rebuke them for their injustices and will set their contempt before them.'.
    reason: previous_rendering
