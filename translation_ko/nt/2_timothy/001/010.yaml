id: 2TI.1.10
reference: 2 Timothy 1:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: φανερωθεῖσαν δὲ νῦν διὰ τῆς ἐπιφανείας τοῦ σωτῆρος ἡμῶν ⸂Ἰησοῦ Χριστοῦ⸃, καταργήσαντος μὲν τὸν θάνατον φωτίσαντος δὲ ζωὴν καὶ ἀφθαρσίαν διὰ τοῦ εὐαγγελίου,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/010.yaml
  text: but has now been revealed through the appearing of our Savior Jesus Messiah, who indeed abolished death and brought life and incorruptibility to light through the gospel,
translation:
  language: ko
  text: 그 은혜가 이제는 우리 구주 예수 메시아의 나타나심을 통하여 드러났습니다. 그분께서는 죽음을 폐하시고, 복음을 통하여 생명과 썩지 아니함[a]을 환히 비추어 주셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「불멸」. 헬라어 ἀφθαρσία는 부패하지 않음·소멸하지 않음을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιφανείας
  english_pob_choice: appearing
  chosen_korean: 나타나심
  alternatives_korean:
  - 출현
  - 임하심
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 ἐπιφάνεια는 「나타나심」으로 통일한다. 본 절에서는 그리스도의 첫 강림을 가리킨다.
- source_word: σωτῆρος ἡμῶν
  english_pob_choice: our Savior
  chosen_korean: 우리 구주
  alternatives_korean:
  - 우리의 구원자
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 σωτήρ는 「구주」로 옮긴다. 한국 성서 전통에서 확립된 칭호이다.
- source_word: καταργήσαντος τὸν θάνατον
  english_pob_choice: abolished death
  chosen_korean: 죽음을 폐하시고
  alternatives_korean:
  - 죽음을 무효화하시고
  - 죽음의 권세를 깨뜨리시고
  lexicon: BDAG
  rationale: καταργέω는 「효력을 없앰·무력화함」을 뜻한다. 「폐하다」는 한국어로 강하고 명료하며, 죽음을 무력화하신 그리스도의 행위를 잘 드러낸다.
- source_word: φωτίσαντος ζωὴν καὶ ἀφθαρσίαν
  english_pob_choice: brought life and incorruptibility to light
  chosen_korean: 생명과 썩지 아니함을 환히 비추어 주셨습니다
  alternatives_korean:
  - 생명과 불멸을 빛 가운데 드러내셨습니다
  - 생명과 불멸을 밝히 보여 주셨습니다
  lexicon: BDAG
  rationale: φωτίζω는 「빛을 비추다·환히 드러내다」를 뜻한다. 「환히 비추어 주다」가 그 시각적·계시적 의미를 자연스럽게 담는다.
- source_word: ἀφθαρσίαν
  english_pob_choice: incorruptibility
  chosen_korean: 썩지 아니함
  alternatives_korean:
  - 불멸
  - 불후
  lexicon: BDAG
  rationale: ἀφθαρσία의 본뜻인 「부패하지 않음」을 직역에 가깝게 살린다. 「불멸」도 가능하나 「썩지 아니함」이 본문의 부활 신학을 더 분명히 드러낸다.
