translation:
  language: es
  text: La lengua del lactante se pega al paladar[a] por la sed; los niños piden pan[b], pero no hay quien se lo parta para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al techo de su boca».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no hay para ellos quien parta». La idea es que nadie les parte ni les distribuye el pan.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּבַק
  english_pob_choice: sticks
  chosen_spanish: se pega
  alternatives_spanish:
  - se adhiere
  - se queda pegada
  - se pega fuertemente
  lexicon: HALOT
  rationale: דָּבַק expresa adherencia o pegadura intensa. En español, «se pega» reproduce con naturalidad la imagen corporal y la dureza del cuadro sin introducir un matiz más técnico que el hebreo no exige.
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la lengua
  lexicon: HALOT
  rationale: El sustantivo es literal y concreto; «la lengua» es la equivalencia natural en español.
- source_word: יוֹנֵק
  english_pob_choice: nursing infant
  chosen_spanish: niño de pecho
  alternatives_spanish:
  - niño lactante
  - bebé que mama
  - infante lactante
  lexicon: HALOT
  rationale: El término alude a un bebé que todavía mama. «Niño de pecho» es una forma clara y bíblica en español que conserva la vulnerabilidad de la imagen sin sonar técnica o excesivamente médica.
- source_word: אֶל חכּוֹ
  english_pob_choice: to the roof of his mouth / palate
  chosen_spanish: al paladar
  alternatives_spanish:
  - al techo de su boca
  - a su paladar
  lexicon: HALOT
  rationale: חֵךְ puede referirse al paladar o al techo de la boca. «Paladar» es breve, natural y fiel; mantiene la tensión lexical que en inglés quedó entre «roof of his mouth» y la nota «palate».
- source_word: בַּצָּמָא
  english_pob_choice: because of thirst
  chosen_spanish: por la sed
  alternatives_spanish:
  - a causa de la sed
  - debido a la sed
  lexicon: HALOT
  rationale: La preposición expresa causa o circunstancia. «Por la sed» es idiomática en español y conserva el sentido causal directo del hebreo.
- source_word: עוֹלָלִים
  english_pob_choice: children
  chosen_spanish: los niños
  alternatives_spanish:
  - los pequeños
  - los niños pequeños
  lexicon: HALOT
  rationale: El término designa niños pequeños. «Los niños» es suficiente en contexto y mantiene la concisión poética; la escena ya comunica su extrema fragilidad.
- source_word: שָׁאֲלוּ
  english_pob_choice: ask for
  chosen_spanish: piden
  alternatives_spanish:
  - piden de comer
  - suplican
  lexicon: HALOT
  rationale: El verbo básico es «pedir/solicitar». En el contexto de hambre extrema, «piden» reproduce la simplicidad del hebreo y evita sobredeterminarlo como si el texto enfatizara necesariamente la súplica formal.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - pan
  - alimento
  lexicon: HALOT
  rationale: «Pan» conserva la concreción del sustantivo y la fuerza de la imagen. Generalizarlo a «alimento» debilitaría el contraste del verso.
- source_word: פֹּרֵשׂ
  english_pob_choice: breaks it / distributes it
  chosen_spanish: se lo parta
  alternatives_spanish:
  - lo parta
  - se lo reparta
  - lo distribuya
  lexicon: HALOT
  rationale: 'El participio apunta al acto de partir o distribuir el pan. «Se lo parta» refleja el uso normal del pan en español y conserva la elipsis del hebreo: no hay quien lo parta para ellos.'
- source_word: אֵין לָהֶם
  english_pob_choice: no one ... for them
  chosen_spanish: no hay quien
  alternatives_spanish:
  - no hay nadie que
  - no tienen quien
  lexicon: HALOT
  rationale: El hebreo expresa ausencia de quien realice la acción. «No hay quien» es la forma española más natural para conservar tanto la ausencia como la falta de ayuda implícita en el original.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético y coincide con el juicio de alta concordancia del audit trail en inglés. Se mantuvieron las dos tensiones léxicas principales: חֵךְ como «paladar»/«techo de la boca» y פֹּרֵשׂ como partir o distribuir el pan. No se introdujeron cambios doctrinales ni se suavizó la crudeza del cuadro de hambre.'
  spanish_consistency_notes:
  - 'Se mantuvo el lenguaje concreto del cuerpo y de la comida: «lengua», «niño de pecho», «paladar», «pan».'
  - La construcción «no hay quien» conserva el valor impersonal del hebreo y suena natural en español bíblico contemporáneo.
  - Se evitó «Cristo», «SEÑOR» y otros términos no presentes en el versículo.
  - La nota de pie marcada con [a] preserva la alternativa lexical documentada; la marcada con [b] explicita la elipsis del participio hebreo en una forma comprensible para el lector español.
