translation:
  language: es
  text: 'Maldito sea el que[a] se acueste con cualquier animal. Y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quien se acueste con cualquier animal». El hebreo emplea una forma masculina singular.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Maldicho
  - Atemorizado por maldición
  lexicon: HALOT
  rationale: אָרוּר introduce una fórmula legal de maldición; en español, «maldito» conserva el tono declarativo y solemne mejor que una paráfrasis explicativa.
- source_word: שֹׁכֵב
  english_pob_choice: lies
  chosen_spanish: se acueste
  alternatives_spanish:
  - yace
  - tenga relaciones sexuales
  lexicon: HALOT
  rationale: El participio hebreo funciona como eufemismo sexual. «Se acueste con» preserva el registro eufemístico y la naturalidad del español sin explicitar más de lo que el hebreo dice.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: La preposición corresponde directamente al giro idiomático «acostarse con» y mantiene la relación verbal del hebreo.
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: cualquier
  alternatives_spanish:
  - todo
  - cada
  lexicon: HALOT
  rationale: En esta prohibición legal, «cualquier» transmite bien el valor distributivo de כָּל con sustantivo singular, como en el inglés auditado.
- source_word: בְּהֵמָה
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  lexicon: HALOT
  rationale: בְּהֵמָה abarca aquí la categoría general de animal; «animal» es claro y no reduce indebidamente el alcance a ganado.
- source_word: וְאָמַר
  english_pob_choice: And ... shall say
  chosen_spanish: Y ... dirá
  alternatives_spanish:
  - Entonces ... dirá
  - Y ... responderá
  lexicon: HALOT
  rationale: El waw + qatal continúa la secuencia litúrgica/jurídica. «Y ... dirá» conserva la cadencia formal del rito sin introducir una interpretación adicional.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo de Israel
  - la gente
  lexicon: HALOT
  rationale: El hebreo dice simplemente «todo el pueblo»; no se añade «de Israel» porque no está expresado en el texto base.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  lexicon: HALOT
  rationale: «Amén» preserva la fórmula litúrgica reconocible y evita sustituirla por una paráfrasis menos directa.
theological_decisions:
- issue: Sujeto masculino singular en la fórmula de maldición
  english_pob_reading: he who lies
  chosen_spanish_reading: el que se acueste
  alternative_spanish_readings:
  - quien se acueste
  - el hombre que se acueste
  rationale: El hebreo usa un participio masculino singular, pero el español puede reflejarlo con «el que» sin añadir «hombre». Así se conserva la referencia gramatical y la fluidez pública del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4 (Gender-accurate over gender-neutral)
- issue: Eufemismo sexual en contexto legal
  english_pob_reading: lies with
  chosen_spanish_reading: se acueste con
  alternative_spanish_readings:
  - yace con
  - tenga relaciones con
  rationale: La expresión española mantiene el eufemismo del original; evita una explicitud mayor que el hebreo y evita también una solución demasiado técnica o clínica.
  doctrine_reference: HALOT; legal-covenantal curse formula
- issue: Respuesta litúrgica de la asamblea
  english_pob_reading: And all the people shall say, ‘Amen.’
  chosen_spanish_reading: 'Y todo el pueblo dirá: «Amén».'
  alternative_spanish_readings:
  - 'Y todo el pueblo responderá: «Amén».'
  rationale: La respuesta comunitaria se conserva como acto ritual declarativo. «Dirá» sigue de cerca la estructura del hebreo y el audit trail inglés.
  doctrine_reference: Deuteronomio 27:15-26, ceremonial response formula
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés auditado, que prefirió «he who lies» frente a «the man who lies» para evitar añadir «man»; por eso el español usa «el que» sin introducir «hombre», conservando la referencia masculina implícita del participio hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Amén» se conserva sin glosa por ser fórmula litúrgica estable.
  - La voz verbal «se acueste con» refleja el eufemismo legal del hebreo y armoniza con el tono de maldición ceremonial.
