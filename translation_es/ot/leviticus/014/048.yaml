translation:
  language: es
  text: Pero si el sacerdote entra y ve, y he aquí que la enfermedad no se ha extendido en la casa después de que la casa fue enlucida, entonces el sacerdote declarará limpia la casa[a], porque la enfermedad ha sanado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «purificará la casa». El verbo hebreo puede denotar limpieza ritual o, en este contexto, un pronunciamiento sacerdotal de limpieza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: Introduces una condición en continuidad con el caso previo; «Pero si» conserva el valor de contraste implícito y suena natural en español legal-procedimental.
- source_word: בֹּא יָבֹא
  english_pob_choice: comes in
  chosen_spanish: entra
  alternatives_spanish:
  - viene a entrar
  - ingresa
  lexicon: HALOT
  rationale: La intensificación del infinitivo absoluto con imperfecto se expresa de forma natural con «entra»; mantiene la acción de acceso para inspección sin sobrerrepresentar la intensidad formal.
- source_word: וְרָאָה
  english_pob_choice: looks
  chosen_spanish: ve
  alternatives_spanish:
  - examina
  - observa
  lexicon: HALOT
  rationale: En el contexto del sacerdote inspeccionando la casa, «ve» es fiel al verbo hebreo y suficientemente claro; «examina» interpreta más de lo que exige el hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: Conserva el marcador discursivo de descubrimiento e impacto del resultado de la inspección, sin caer en un arcaísmo innecesario.
- source_word: לֹא פָשָׂה
  english_pob_choice: has not spread
  chosen_spanish: no se ha extendido
  alternatives_spanish:
  - no se ha propagado
  - no ha avanzado
  lexicon: HALOT
  rationale: פשה en este contexto de casa/aflicción indica propagación; «no se ha extendido» es claro y mantiene el sentido procedimental.
- source_word: הַנֶּגַע
  english_pob_choice: the disease
  chosen_spanish: la enfermedad
  alternatives_spanish:
  - la aflicción
  - la plaga
  - la mancha
  lexicon: HALOT
  rationale: En Levítico 13–14, נגע refiere la condición aflictiva de la casa. «Enfermedad» sigue la decisión inglesa de evitar «plaga» como término tradicional potencialmente engañoso; «aflicción» y «mancha» son posibles, pero menos directas en español.
- source_word: בַּבַּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - dentro de la casa
  - sobre la casa
  lexicon: HALOT
  rationale: La preposición expresa ubicación interna y el español natural exige «en la casa».
- source_word: אַחֲרֵי הִטֹּחַ אֶת־הַבָּיִת
  english_pob_choice: after the house was plastered
  chosen_spanish: después de haber sido enlucida
  alternatives_spanish:
  - después de enlucir la casa
  - después de haber sido revocada
  lexicon: HALOT
  rationale: טוח remite a enlucir/revestir con yeso; «enlucida» comunica el sentido constructivo de manera más idiomática que un calco. Se eligió la forma impersonal pasiva para evitar introducir un agente no expresado.
- source_word: וְטִהַר הַכֹּהֵן אֶת־הַבַּיִת
  english_pob_choice: then the priest shall pronounce the house clean
  chosen_spanish: entonces el sacerdote declarará limpia la casa
  alternatives_spanish:
  - entonces el sacerdote purificará la casa
  - entonces el sacerdote limpiará la casa
  lexicon: HALOT
  rationale: טהר en este marco ritual puede ser declarativo; «declarará limpia» preserva la función sacerdotal de pronunciamiento sin sugerir una limpieza material literal.
- source_word: כִּי נִרְפָּא הַנָּגַע
  english_pob_choice: because the disease is healed
  chosen_spanish: porque la enfermedad ha sanado
  alternatives_spanish:
  - porque la enfermedad está curada
  - porque la aflicción ha sido sanada
  lexicon: HALOT
  rationale: נרפא conserva la metáfora de sanidad. «Ha sanado» suena natural en español y mantiene el estado resultante; «está curada» es viable pero menos ajustado al aspecto perfecto.
theological_decisions:
- issue: 'טִהַר en contexto ritual: limpieza física o pronunciamiento cultual'
  english_pob_reading: The priest pronounces the house clean
  chosen_spanish_reading: el sacerdote declarará limpia la casa
  alternative_spanish_readings:
  - el sacerdote limpiará la casa
  - el sacerdote purificará la casa
  rationale: En el sistema de pureza levítico, el sacerdote no necesariamente efectúa una limpieza material en este versículo, sino que emite una determinación ritual. «Declarará limpia» evita confundir el acto jurídico-cultual con una acción manual.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el audit trail; el borrador sigue el estado más reciente, con alta concordancia entre la revisión y el control cruzado. Se mantuvo la decisión inglesa de no usar «plaga» para נגע y de traducir טהר en sentido ritual-declarativo.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Enfermedad» se usó de forma consistente para נגע, conforme al criterio auditado de evitar «plaga» como término tradicional potencialmente ambiguo.
  - «Declarará limpia» mantiene el valor técnico de טהר en un marco sacerdotal, evitando una lectura de limpieza material no indicada por el texto.
  - «Enlucida» representa el procedimiento de טוח de manera idiomática en español y coherente con el contexto constructivo.
