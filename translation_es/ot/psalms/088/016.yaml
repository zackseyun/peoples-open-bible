translation:
  language: es
  text: Estoy afligido y próximo a la muerte desde mi juventud; llevo[a] tus terrores; estoy abrumado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He llevado tus terrores; estoy desconcertado/confundido». El verbo final es difícil y puede expresar estar abrumado, desorientado o deshecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנִי
  english_pob_choice: afflicted
  chosen_spanish: afligido
  alternatives_spanish:
  - pobre
  - humilde
  - desdichado
  lexicon: HALOT
  rationale: En un contexto de lamento, el adjetivo describe sufrimiento y miseria, no pobreza económica. «Afligido» conserva el valor de padecimiento sin cargar el texto con una lectura social ajena al poema.
- source_word: וְגֹוֵעַ
  english_pob_choice: near death
  chosen_spanish: estoy próximo a la muerte
  alternatives_spanish:
  - estoy muriendo
  - me estoy apagando
  - estoy al borde de la muerte
  lexicon: HALOT
  rationale: El participio expresa una condición continua de estar pereciendo. «Próximo a la muerte» mantiene ese estado y suena natural en español contemporáneo, sin volverlo más dramático de lo que el hebreo exige.
- source_word: מִנֹּעַר
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde mi niñez
  - desde joven
  lexicon: HALOT
  rationale: El hebreo indica duración desde una etapa temprana de la vida. En español, «desde mi juventud» refleja bien esa continuidad y evita añadir una pose possessiva innecesaria en la línea poética.
- source_word: נָשָׂאתִי
  english_pob_choice: I bear
  chosen_spanish: llevo
  alternatives_spanish:
  - he llevado
  - soporto
  - aguanto
  lexicon: HALOT
  rationale: נָשָׂא puede significar cargar o llevar sobre uno mismo. Aquí la imagen de portar «tus terrores» se expresa con «llevo», que conserva el peso activo del verbo y la secuencia poética del lamento.
- source_word: אֵמֶיךָ
  english_pob_choice: your terrors
  chosen_spanish: tus terrores
  alternatives_spanish:
  - tus horrores
  - tus cosas terribles
  lexicon: HALOT
  rationale: El plural designa cosas que infunden temor. «Terrores» es la equivalencia más directa y mantiene la referencia en segunda persona, sin suavizar la agencia divina que el texto deja en tensión.
- source_word: אָפוּנָה
  english_pob_choice: I am overwhelmed
  chosen_spanish: estoy abrumado
  alternatives_spanish:
  - estoy desconcertado
  - estoy confuso
  - estoy deshecho
  lexicon: HALOT
  rationale: La forma final es difícil y puede sugerir estar abrumado, confundido o arruinado. «Abrumado» preserva la amplitud semántica sin fijar indebidamente una sola matización.
theological_decisions:
- issue: Los «terrores» atribuidos a Dios
  english_pob_reading: The phrase addresses God directly and attributes the terrors to his dealings with the psalmist, without softening the divine agency.
  chosen_spanish_reading: 'La línea mantiene la segunda persona: «tus terrores», atribuyéndolos directamente a la acción o trato de Dios con el salmista.'
  alternative_spanish_readings:
  - los terrores que siento en tu presencia
  - los terrores permitidos por ti
  rationale: El hebreo con sufijo de segunda persona naturalmente apunta a terrores pertenecientes a Dios o procedentes de su trato. La traducción no atenúa esa tensión teológica del lamento.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue el alto grado de acuerdo del control cruzado y no incorpora cambios de revisión; se conserva la tensión léxica del final difícil y la atribución directa de los terrores a Dios.
  spanish_consistency_notes:
  - Se usa «Dios» solo en la nota teológica; el verso mismo mantiene la segunda persona directa del hebreo.
  - «Afligido» y «abrumado» siguen el registro de lamento y evitan un giro excesivamente interpretativo.
  - La nota al pie conserva la alternativa semántica del verbo final, como en el audit trail inglés, sin cerrar la ambigüedad.
