translation:
  language: es
  text: Aunque se multipliquen[a], no te deleites en ellos, si el temor de Yahvé no está con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te alegres por ellos». El hebreo es algo menos transparente aquí, pero el paralelo griego respalda la idea de regocijarse o deleitarse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם אִם / ἐὰν
  english_pob_choice: Even if
  chosen_spanish: Aun si
  alternatives_spanish:
  - Incluso si
  - Aunque
  lexicon: HALOT
  rationale: La construcción expresa una condición concesiva; «Aun si» comunica bien esa fuerza en español y mantiene la apertura hipotética del hebreo y del griego.
- source_word: פָּרוּ / πληθύνωσιν
  english_pob_choice: they become many
  chosen_spanish: se multiplican
  alternatives_spanish:
  - llegan a ser muchos
  - aumentan
  lexicon: HALOT
  rationale: El verbo apunta a aumento numérico. «Se multiplican» conserva la idea de hacerse numerosos sin añadir matices biológicos innecesarios y suena natural en español.
- source_word: אַל תָּבֻעַ בָּם / μὴ εὐφραίνου ἐπʼ αὐτοῖς
  english_pob_choice: do not delight in them
  chosen_spanish: no te deleites en ellos
  alternatives_spanish:
  - no te alegres por ellos
  - no te regocijes en ellos
  lexicon: HALOT; BDAG
  rationale: La lectura griega apoya el sentido de alegrarse o deleitarse. «No te deleites en ellos» preserva la valoración afectiva negativa/positiva sin volverla demasiado libre.
- source_word: אִם אֵין אִתָּם / εἰ μὴ ἔστιν ... μετʼ αὐτῶν
  english_pob_choice: if ... is not with them
  chosen_spanish: si no está con ellos
  alternatives_spanish:
  - a menos que esté con ellos
  - si no lo tienen con ellos
  lexicon: HALOT; BDAG
  rationale: Tanto el hebreo como el griego expresan presencia o acompañamiento. «Está con ellos» conserva esa relación sin reducirla a posesión.
- source_word: יִרְאַת יְהֹוָה / φόβος Κυρίου
  english_pob_choice: the fear of Yahweh
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor del Señor
  - la reverencia por Yahvé
  lexicon: HALOT; BDAG
  rationale: Se mantiene la fórmula sapiencial tradicional con el nombre divino conforme al estándar del proyecto. «Temor» conserva la carga bíblica de piedad, no solo respeto.
- source_word: יְהֹוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: renderizarlo como «Yahvé» en el texto principal español, no como máscara reverencial.'
theological_decisions:
- issue: La fórmula sapiencial «el temor de Yahvé»
  english_pob_reading: the fear of Yahweh
  chosen_spanish_reading: el temor de Yahvé
  alternative_spanish_readings:
  - la reverencia por Yahvé
  - el temor del Señor
  rationale: La sentencia contrasta el mero aumento numérico con la ausencia de piedad de pacto. Conservar la fórmula evita diluir su densidad teológica y sapiencial.
  doctrine_reference: 'DOCTRINE.md: YHWH naming convention; wisdom theology usage of fear of the LORD'
- issue: Presencia divina/comunitaria expresada con «con ellos»
  english_pob_reading: if ... is not with them
  chosen_spanish_reading: si no está con ellos
  alternative_spanish_readings:
  - si no acompaña a ellos
  - si no se halla entre ellos
  rationale: El hebreo y el griego hablan de acompañamiento/presencia, no solo de posesión abstracta. La redacción española mantiene esa relación sin sobreinterpretarla.
  doctrine_reference: HALOT; BDAG on preposition/construction semantics
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del control cruzado y no introduce cambios respecto del texto fuente auditado. Se mantiene la solución ya revisada para la cláusula concesiva, el verbo de aumento y la fórmula sapiencial.
  spanish_consistency_notes:
  - Se preserva «Yahvé» conforme a la convención del proyecto para יהוה.
  - Se usa «temor» en sentido sapiencial bíblico, no como miedo meramente psicológico.
  - Se evita «Señor» como máscara del nombre divino en el texto principal.
  - La nota textual/lexical se ancla en «deleites» por corresponder al lugar de la alternativa semántica.
