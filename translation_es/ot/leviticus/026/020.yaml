translation:
  language: es
  text: Y vuestra fuerza se gastará en vano[a], y vuestra tierra no dará su producto, y los árboles de la tierra no darán su fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «vuestra fuerza se agotará para el vacío» y «el árbol de la tierra no dará su fruto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתַם
  english_pob_choice: will be spent
  chosen_spanish: se gastará
  alternatives_spanish:
  - se agotará
  - se consumirá
  - llegará a su fin
  lexicon: HALOT
  rationale: El verbo expresa que la fuerza queda usada hasta quedar sin efecto. «Se gastará» conserva la imagen de desgaste por uso y suena natural en español contemporáneo.
- source_word: לָרִיק
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - para nada
  - sin resultado
  - para emptiness
  lexicon: HALOT
  rationale: La expresión señala futilidad o inutilidad. «En vano» es el equivalente idiomático más natural y mantiene el sentido de esfuerzo infructuoso.
- source_word: כֹּחֲכֶם
  english_pob_choice: your strength
  chosen_spanish: vuestra fuerza
  alternatives_spanish:
  - vuestro poder
  - vigor
  lexicon: HALOT
  rationale: כח denota fuerza o poder. «Fuerza» comunica bien el sentido de energía laboral agotada en el contexto agrícola.
- source_word: תִתֵּן
  english_pob_choice: will yield
  chosen_spanish: dará
  alternatives_spanish:
  - producirá
  - rendirá
  - dará su cosecha
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «dar», el español puede conservar el verbo simple sin perder el sentido agrícola. «Dará» permite mantener la repetición del texto hebreo entre tierra y árbol.
- source_word: אַרְצְכֶם
  english_pob_choice: your land
  chosen_spanish: vuestra tierra
  alternatives_spanish:
  - vuestro país
  - vuestra tierra cultivada
  lexicon: HALOT
  rationale: Aquí ארץ se refiere a la tierra poseída y cultivada por el pueblo. «Vuestra tierra» es preciso y natural.
- source_word: יְבוּלָהּ
  english_pob_choice: its produce
  chosen_spanish: su fruto
  alternatives_spanish:
  - su produce
  - su cosecha
  - su rendimiento
  lexicon: HALOT
  rationale: יבול puede designar el producto agrícola de la tierra. «Su fruto» es una forma breve y bíblica en español que funciona bien con el paralelismo del versículo.
- source_word: וְעֵץ הָאָרֶץ
  english_pob_choice: the trees of the land
  chosen_spanish: los árboles de la tierra
  alternatives_spanish:
  - el árbol de la tierra
  - los árboles del país
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo está en singular colectivo, el español requiere plural para el sentido general. «Los árboles de la tierra» conserva el alcance colectivo y la estructura del hebreo.
- source_word: פִּרְיוֹ
  english_pob_choice: their fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su fruto de ellos
  - su producción
  lexicon: HALOT
  rationale: El sufijo hebreo es singular y concuerda con el sustantivo colectivo, por eso «su fruto» respeta mejor la forma del original que un plural explícito en español.
theological_decisions:
- issue: Paralelismo de juicio agrícola sin suavizar la dureza del texto
  english_pob_reading: 'The verse states a covenant curse: labor, land, and trees all fail to produce.'
  chosen_spanish_reading: 'El versículo presenta una maldición del pacto: el trabajo se frustra y la tierra no produce.'
  alternative_spanish_readings:
  - El versículo describe solo una mala temporada agrícola.
  - El versículo habla de una pérdida económica general sin matiz pactual.
  rationale: La lectura debe preservar el tono de juicio pactual del contexto levítico. «Maldición del pacto» y la triple negativa mantienen la fuerza del original sin atenuarla.
  doctrine_reference: Levítico 26; Deuteronomio 28
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión más reciente del texto inglés, que no requirió cambios, y conserva su decisión principal: una equivalencia óptima con paralelismo agrícola claro y sin suavizar el juicio del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando el Tetragrámaton aparece explícitamente; este versículo no lo contiene.
  - Se usa «fruto» para יבול y פְּרִי por coherencia interna con la imaginería agrícola del pasaje.
  - Se conserva la repetición de «dar» en dos cláusulas para reflejar el paralelismo hebreo.
  - «Vuestra»/«su» se ajustan a la concordancia española, sin introducir ambigüedad teológica.
