revisions:
- from: Y ahora den gracias a Dios[a], porque voy a subir al que me envió; y escriban todo lo que ha sido llevado a término en un libro.
  to: Y ahora den gracias a Dios[a], porque subo hacia el que me envió; y escriban todo lo que ha sido cumplido en un libro.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y la fidelidad idiomática del español: «subo hacia el que me envió» representa mejor ἀναβαίνω πρὸς que «voy a subir al que me envió», evitando un giro coloquial y manteniendo la imagen de ascenso. También se cambió «ha sido llevado a término» por «ha sido cumplido», que sigue reflejando la idea de hechos completados/acabados de συντελεσθέντα pero con mejor legibilidad en español bíblico moderno.'
  reviewer_model: gpt-5.4
