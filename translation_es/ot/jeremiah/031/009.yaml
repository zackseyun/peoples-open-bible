translation:
  language: es
  text: Con llanto vendrán, y con súplicas de misericordia[a] los conduciré; los guiaré a arroyos de agua, por un camino recto, en el que no tropezarán, porque he llegado a ser padre de Israel[b], y Efraín es mi primogénito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con súplicas». El término hebreo puede traducirse también «súplicas» o «ruegos de misericordia».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque soy padre de Israel». El perfecto hebreo puede entenderse como énfasis en una relación pactual presente.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּבְכִי
  english_pob_choice: with weeping
  chosen_spanish: con llanto
  alternatives_spanish:
  - con lágrimas
  - llorando
  lexicon: HALOT
  rationale: El prefijo ב expresa acompañamiento o modo. «Con llanto» conserva la imagen concreta sin decidir si el llanto es penitencial, de dolor o de alegría.
- source_word: יָבֹאוּ
  english_pob_choice: they will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán a mí
  - llegarán
  lexicon: HALOT
  rationale: El sentido básico es de venir/ir hacia el hablante. «Vendrán» es natural en español y mantiene el futuro simple del verbo.
- source_word: וּבְתַחֲנוּנִים
  english_pob_choice: and with pleas for mercy
  chosen_spanish: y con súplicas de misericordia
  alternatives_spanish:
  - y con súplicas
  - y con ruegos de misericordia
  lexicon: HALOT
  rationale: תחנונים puede ser «súplicas» o «plegarias/súplica de favor». «Súplicas de misericordia» preserva la relación de dependencia y el matiz de pedir favor, sin cerrar la ambigüedad semántica.
- source_word: אֹבִילֵם
  english_pob_choice: I will lead them
  chosen_spanish: los conduciré
  alternatives_spanish:
  - los guiaré
  - los llevaré
  lexicon: HALOT
  rationale: El hiphil de יבל implica conducir/guía. «Conduciré» refleja bien la acción divina de encaminar al pueblo.
- source_word: אֹלִיכֵם
  english_pob_choice: I will guide them
  chosen_spanish: los guiaré
  alternatives_spanish:
  - los llevaré
  - los haré andar
  lexicon: HALOT
  rationale: El hiphil de הלך añade la idea de hacer caminar/dirigir. «Guiaré» evita una repetición mecánica con «conduciré» y conserva la fuerza de dirección.
- source_word: נַחֲלֵי מַיִם
  english_pob_choice: streams of water
  chosen_spanish: arroyos de agua
  alternatives_spanish:
  - corrientes de agua
  - canales de agua
  lexicon: HALOT
  rationale: La expresión constructa evoca cauces o corrientes con agua. «Arroyos de agua» es idiomático y mantiene la imagen vivificante.
- source_word: בְּדֶרֶךְ יָשָׁר
  english_pob_choice: on a straight path
  chosen_spanish: por un camino recto
  alternatives_spanish:
  - sobre un camino recto
  - en un camino recto
  lexicon: HALOT
  rationale: La frase describe una vía directa, llana y segura. «Por un camino recto» suena natural en español y conserva la metáfora de tránsito protegido.
- source_word: לֹא יִכָּשְׁלוּ בָּהּ
  english_pob_choice: on which they will not stumble
  chosen_spanish: en el que no tropezarán
  alternatives_spanish:
  - sobre el que no tropezarán
  - en donde no caerán
  lexicon: HALOT
  rationale: El nifal de כשל significa tropezar o resbalar. «Tropezarán» es la equivalencia más directa y natural; «en el que» enlaza con el sustantivo «camino».
- source_word: כִּי הָיִיתִי לְיִשְׂרָאֵל לְאָב
  english_pob_choice: for I have become a father to Israel
  chosen_spanish: porque me he vuelto padre de Israel
  alternatives_spanish:
  - porque soy padre de Israel
  - porque he sido padre de Israel
  lexicon: HALOT
  rationale: El perfecto puede expresar un estado presente derivado de una acción/relación establecida. «Me he vuelto padre de Israel» conserva el valor verbal sin reducirlo a una mera cópula estática.
- source_word: וְאֶפְרַיִם בְּכֹרִי הוּא
  english_pob_choice: and Ephraim is my firstborn
  chosen_spanish: y Efraín es mi primogénito
  alternatives_spanish:
  - y Efraín es mi hijo primogénito
  - y Efraín, él es mi primogénito
  lexicon: HALOT
  rationale: בכור designa al primogénito con estatus e implicaciones de herencia. «Primogénito» es la forma más directa y bíblicamente reconocible en español.
theological_decisions:
- issue: Naturaleza del llanto y de las súplicas
  english_pob_reading: The verse is rendered without specifying whether the tears are penitential, sorrowful, or joyful.
  chosen_spanish_reading: 'El español mantiene el mismo no-especificado: «con llanto» y «con súplicas de misericordia».'
  alternative_spanish_readings:
  - con llanto penitencial
  - con llanto de alegría
  rationale: El hebreo no define la causa del llanto ni el tono espiritual de las súplicas. La traducción conserva esa tensión en vez de resolverla doctrinalmente.
  doctrine_reference: Principio POΒ de preservar la tensión teológica y no añadir determinaciones que el texto no da.
- issue: Fuerza de הָיִיתִי en la afirmación de paternidad
  english_pob_reading: Rendered as 'I have become a father to Israel' rather than a simple present.
  chosen_spanish_reading: «me he vuelto padre de Israel»
  alternative_spanish_readings:
  - «soy padre de Israel»
  - «he sido padre de Israel»
  rationale: El perfecto hebreo puede leerse como estado presente fundamentado en una relación establecida. «Me he vuelto» conserva la forma verbal y la dimensión pactual sin negar la continuidad de la relación divina con Israel.
  doctrine_reference: Jeremías 31:9; uso aspectual del perfecto hebreo en discurso profético.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó la relación preposicional para sonar más natural con «path»; por eso en español se prefirió «por un camino recto, en el que no tropezarán», manteniendo la naturalidad sintáctica sin perder el enlace con la vía segura. También se respetó la decisión auditada de no precisar si el llanto es penitencial, de dolor o de gozo.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente en este versículo, sino porque el proyecto español POB lo reserva como forma estándar para el nombre divino cuando el contexto lo exija; aquí el versículo habla en primera persona y no requiere una inserción nominal.
  - Se eligió «primogénito» para בכור porque conserva el valor de estatus e herencia del término.
  - «Súplicas de misericordia» mantiene la tensión entre súplica y favor, siguiendo el tratamiento auditado de תחנונים.
  - Se evitaron fórmulas eclesiásticas tradicionales donde podían ocultar la imagen concreta del hebreo, como sustituir el movimiento por expresiones más abstractas.
