translation:
  language: es
  text: 'Y dijo Attarates a Esdras, el principal sacerdote y lector[a], y a los levitas que enseñaban a la multitud[b], a todos ellos:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Attarates» probablemente corresponde en el paralelo hebreo a la figura llamada «Nehemías, el tirsata» (es decir, el gobernador).
    reason: alternative_reading
  - marker: b
    text: Griego «lector»; el paralelo hebreo tiene «el sacerdote, el escriba», de modo que las tradiciones difieren ligeramente en la designación de Esdras aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ εἶπεν
  english_pob_choice: And ... said
  chosen_spanish: Y habló
  alternatives_spanish:
  - Y dijo
  - Entonces habló
  lexicon: BDAG
  rationale: La conjunción narrativa griega se conserva con «Y», y el verbo de habla se vierte con un español natural. «Habló» mantiene el registro solemne sin añadir contenido distinto al acto de decir.
- source_word: Ἀτταρατὴ
  english_pob_choice: Attarates
  chosen_spanish: Attarates
  alternatives_spanish:
  - Atatarates
  - Atarates
  lexicon: LSJ
  rationale: El texto griego presenta una forma transliterada del nombre/título, así que se mantiene en la forma auditada del POB inglés. No se reemplaza por la identificación del paralelo hebreo en el texto principal.
- source_word: Ἔσρᾳ
  english_pob_choice: Ezra
  chosen_spanish: Esdras
  alternatives_spanish:
  - Ezra
  lexicon: LSJ
  rationale: En español bíblico es plenamente transparente y leído «Esdras». Es la transliteración tradicional del nombre propio en español y corresponde directamente al griego.
- source_word: τῷ ἀρχιερεῖ
  english_pob_choice: the chief priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  - el gran sacerdote
  lexicon: LSJ
  rationale: ἀρχιερεύς suele equivaler a «sumo sacerdote». Aunque el inglés POB optó por «chief priest» por transparencia formal, en español «sumo sacerdote» es la manera natural y fiel de expresar ese cargo sin perder el valor institucional del término.
- source_word: καὶ ἀναγνώστῃ
  english_pob_choice: and reader
  chosen_spanish: y lector
  alternatives_spanish:
  - y lector público
  - y escriba
  lexicon: LSJ
  rationale: Se traduce de forma directa el sentido de ἀναγνώστης como «lector», conservando la diferencia con el paralelo hebreo, que usa «escriba». No se mezcla esa variante en el cuerpo del texto.
- source_word: τοῖς Λευείταις
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - a los levitas
  lexicon: LSJ
  rationale: Correspondencia directa y estándar del grupo étnico-levítico en español bíblico.
- source_word: τοῖς διδάσκουσι
  english_pob_choice: who were teaching
  chosen_spanish: que enseñaban
  alternatives_spanish:
  - que estaban enseñando
  - que instruían
  lexicon: LSJ
  rationale: El participio presente se vierte con valor descriptivo habitual. «Enseñaban» es natural en español y conserva la acción en curso.
- source_word: τὸ πλῆθος
  english_pob_choice: the multitude
  chosen_spanish: a la multitud
  alternatives_spanish:
  - al gentío
  - al pueblo
  lexicon: LSJ
  rationale: «Multitud» refleja bien πλῆθος y mantiene el matiz de grupo numeroso. Se usa con la preposición correspondiente al régimen de «enseñar a».
- source_word: ἐπὶ πάντας
  english_pob_choice: to all of them
  chosen_spanish: a todos ellos
  alternatives_spanish:
  - a todos
  - sobre todos
  lexicon: LSJ
  rationale: La frase es sintácticamente compacta y algo irregular; en español se expresa de manera clara como destinatario final del discurso, coherente con el paralelo hebreo y con la lectura auditada del POB inglés.
theological_decisions:
- issue: Identificación de Attarates frente al paralelo hebreo
  english_pob_reading: Keep the Greek form 'Attarates' in the main text, with the MT identification ('Nehemiah the governor/Tirshatha') noted in a footnote.
  chosen_spanish_reading: Conservar «Attarates» en el texto principal, con la identificación del paralelo hebreo en nota.
  alternative_spanish_readings:
  - Poner «Nehemías, el gobernador» en el texto principal
  - Poner «el tirsata» en el texto principal
  rationale: La primacía aquí es del testimonio griego de 1 Esdras. El paralelo hebreo es una ayuda real para la auditoría, pero no debe sustituir la forma griega en el texto base. La nota preserva la tensión documental sin borrarla.
  doctrine_reference: Principio de primacía de la fuente original; uso auditado del paralelo textual.
- issue: Designación de ἀρχιερεύς
  english_pob_reading: the chief priest
  chosen_spanish_reading: el sumo sacerdote
  alternative_spanish_readings:
  - el jefe de los sacerdotes
  - el gran sacerdote
  rationale: En español, «sumo sacerdote» es el equivalente claro y canónico del cargo. No altera la referencia institucional y evita una fórmula menos natural que podría oscurecer el rango sacerdotal.
  doctrine_reference: Equivalencia funcional controlada; terminología bíblica española consolidada.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no hubo cambios adicionales necesarios. La redacción española se ajusta al testimonio griego primario y conserva en nota la tensión con el paralelo hebreo, tal como refleja el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Esdras» y no «Ezra» para coherencia con español bíblico.
  - Se usa «sumo sacerdote» como término estable para ἀρχιερεύς en español, aunque el inglés auditado prefirió una formulación más transparente.
  - Se conserva «Attarates» sin harmonizarlo con el paralelo hebreo en el texto principal.
  - «Lector» se mantiene para ἀναγνώστης y se deja la variante hebrea en nota.
  - La puntuación final con dos puntos prepara la cita directa que continúa en el versículo siguiente.
