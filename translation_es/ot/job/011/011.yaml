- from: Porque él conoce a los hombres de falsedad; cuando ve la iniquidad[a], ¿no la toma en cuenta?
  to: Porque él conoce a los hombres falsos; cuando ve la maldad[a], ¿no se fija en ella?
  rationale: 'Se ajusta el español para mayor naturalidad y precisión semántica: «hombres falsos» en lugar de un genitivo calcado, «maldad» como equivalente más claro de אָוֶן en español neutral, y «¿no se fija en ella?» para reflejar mejor el sentido de notar/observar atentamente en יִתְבּוֹנָן. Se conserva la lectura retórica y la nota sobre la alternativa negativa simple.'
