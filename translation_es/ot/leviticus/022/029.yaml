review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura casuística de וְכִי con «Y cuando», conserva correctamente «Yahvé» para יהוה, y transmite adecuadamente זֶבַח תּוֹדָה como sacrificio de acción de gracias. Sin embargo, la cláusula final לִרְצֹנְכֶם תִּזְבָּחוּ no está bien preservada en «para que sea aceptado por ustedes», porque en español eso sugiere que ustedes son quienes aceptan el sacrificio, cuando el sentido es su aceptabilidad en favor de los oferentes delante de Dios. Además, el inglés auditado volvió deliberadamente a la forma más directa «for your acceptance», por lo que el español debería acercarse a esa concisión formal sin introducir el agente erróneo.
  spanish_quality_summary: El español es claro y digno, pero la frase final actual resulta semánticamente ambigua y teológicamente desorientadora. «Para su aceptación» o «para que les sea aceptado» suena más natural y fiel en español bíblico. También conviene ajustar la nota léxica para evitar repetir exactamente la expresión principal como alternativa.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: «Yahvé» está correcto; «sacrificio de acción de gracias» es una opción válida para זבח תודה. No hay conflictos con otras entradas del glosario. La principal desviación está en רָצוֹן: debe reflejar «aceptación/aceptabilidad» para los oferentes, no aceptación por parte de ellos.'
  issues:
  - severity: high
    issue: La cláusula «para que sea aceptado por ustedes» invierte o confunde la relación de aceptación.
    rationale: En español, «aceptado por ustedes» normalmente significa que ustedes son el agente que acepta. El hebreo לִרְצֹנְכֶם en contexto sacrificial apunta a la aceptabilidad del sacrificio en favor de los oferentes delante de Dios.
  - severity: medium
    issue: El borrador no sigue de cerca la revisión auditada del inglés hacia una formulación más directa.
    rationale: La auditoría inglesa cambió de una expansión explicativa a «for your acceptance». El español puede reflejar mejor ese movimiento con «para su aceptación» en vez de mantener una paráfrasis.
  - severity: low
    issue: La nota al pie repite la traducción principal como una de las alternativas.
    rationale: Si la nota ofrece alternativas léxicas, no conviene listar exactamente «un sacrificio de acción de gracias» cuando esa ya es la forma del texto principal.
  revised_spanish_text: Y cuando ofrezcan un sacrificio de acción de gracias a Yahvé[a], lo ofrecerán para su aceptación.
  revised_footnotes:
  - marker: a
    text: 'O: «un sacrificio de gratitud» o «un sacrificio de agradecimiento».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa solo la cláusula final para corregir una ambigüedad importante: «para su aceptación» preserva mejor el sentido sacrificial de לִרְצֹנְכֶם y sigue más de cerca la decisión auditada en inglés, sin sugerir incorrectamente que los oferentes son quienes aceptan la ofrenda. También se limpia la nota léxica para que ofrezca alternativas reales y no repita la lectura principal.'
