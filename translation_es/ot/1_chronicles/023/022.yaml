  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado y explica otra expresión
    rationale: 'La nota dice «más literalmente: “tomaron a las hijas por mujeres”», pero el marcador [a] aparece tras «hijos». Según las reglas del proyecto, el marcador debe anclarse en la palabra o frase pertinente del texto.'
  - severity: medium
    issue: «las tomaron por mujeres» es menos natural en español actual
    rationale: Aunque es léxicamente defendible, suena más rígido que «se casaron con ellas». Dado que el inglés POB usa una formulación natural en el texto principal y reserva la literal para nota, el español debería reflejar ese mismo equilibrio.
  revised_spanish_text: Eleazar murió y no tuvo hijos varones, sino solo hijas; y los hijos de Quis, sus hermanos[a], se casaron con ellas[b].
