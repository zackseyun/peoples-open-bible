translation:
  language: es
  text: Así que, si te parece bien torturar a los que no comen comida impura[a], tortúranos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego, literalmente: «a los que no han comido contaminación/profanación»; en el contexto, se refiere a los que han rechazado comida impura o contaminante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστʼ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: LSJ
  rationale: Expresa la conclusión inferida con naturalidad en español y conserva el valor lógico del griego.
- source_word: εἰ σοὶ δοκεῖ
  english_pob_choice: if it seems good to you
  chosen_spanish: si te parece bien
  alternatives_spanish:
  - si te parece bueno
  - si crees que conviene
  lexicon: LSJ
  rationale: δοκεῖ con dativo indica una valoración personal de conveniencia; «te parece bien» reproduce ese matiz sin sonar forzado.
- source_word: βασανίζειν
  english_pob_choice: to torture
  chosen_spanish: torturar
  alternatives_spanish:
  - atormentar
  lexicon: LSJ
  rationale: En este contexto martirial el verbo apunta a tormento físico/judicial; «torturar» es el equivalente más directo y fuerte.
- source_word: μὴ μεμοφαγοῦντας
  english_pob_choice: those who do not eat defiling food
  chosen_spanish: a los que no comen alimento profanado
  alternatives_spanish:
  - a los que no comen comida contaminada
  - a los que no han comido alimento profanado
  lexicon: LSJ
  rationale: El participio perfecto con negación expresa abstención de comer lo profanado; en español conviene mantener el presente negativo como en la revisión inglesa, y «alimento profanado» conserva la idea de impureza/contaminación ritual sin añadir una paráfrasis excesiva.
- source_word: βασάνιζε
  english_pob_choice: torture us
  chosen_spanish: tortúranos
  alternatives_spanish:
  - tortúranos a nosotros
  - tortura a nosotros
  lexicon: LSJ
  rationale: El imperativo repite el verbo para énfasis retórico; en español el objeto pronominal enclítico hace explícito el «nos» implícito en el griego y suena natural.
theological_decisions:
- issue: Cómo reflejar la abstención de comida impura sin suavizar el lenguaje martirial
  english_pob_reading: those who do not eat defiling food
  chosen_spanish_reading: los que no comen alimento profanado
  alternative_spanish_readings:
  - los que no comen comida contaminada
  - los que no han comido alimento profanado
  rationale: El contexto trata de rechazo de comida ritual o religiosamente impura. «Alimento profanado» mantiene la tensión lexical de la impureza sin convertirla en una explicación interpretativa más amplia de la necesaria.
  doctrine_reference: Translation philosophy §1, §6
- issue: Si expresar explícitamente el objeto del imperativo final
  english_pob_reading: torture us
  chosen_spanish_reading: tortúranos
  alternative_spanish_readings:
  - tortura
  - tortúranos a nosotros
  rationale: El sentido retórico depende de que el hablante se incluya en la amenaza desafiante. El clítico enclítico en español comunica el objeto implícito con claridad y concisión.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «those who have not eaten defiling food» a «those who do not eat defiling food» para ajustar el participio presente; la redacción española sigue ese mismo valor aspectual con una negación presente («no comen»).
  spanish_consistency_notes:
  - Se conserva «torturar» para βασανίζειν por la fuerza martirial del pasaje.
  - Se evita «Señor» o equivalentes aquí porque no aparece el nombre divino ni una cita de κύριος.
  - «Alimento profanado» mantiene la noción de impureza ritual sin introducir terminología eclesiástica posterior.
