translation:
  language: es
  text: La palabra que vino a Jeremías de Yahvé en el décimo año de Sedequías rey de Judá, que era el decimoctavo año de Nabucodonosor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - El asunto
  lexicon: HALOT
  rationale: En fórmulas proféticas, דָּבָר introduce una comunicación divina. «La palabra» conserva esa fórmula con naturalidad en español y evita una paráfrasis más interpretativa.
- source_word: אֲשֶׁר הָיָה אֶל
  english_pob_choice: that came to
  chosen_spanish: que vino a
  alternatives_spanish:
  - que fue a
  - que ocurrió a
  lexicon: HALOT
  rationale: La construcción hebrea expresa el arribo de una palabra profética a Jeremías. «Que vino a» transmite bien la idea y suena natural en español bíblico contemporáneo.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - desde Yahvé
  - procedente de Yahvé
  lexicon: HALOT
  rationale: El texto hebreo nombra explícitamente a YHWH. Conforme al criterio del proyecto, se traduce por «Yahvé» y no por un sustituto reverencial.
- source_word: בְּשַׁנַת הָעֲשִׂרִית
  english_pob_choice: in the tenth year
  chosen_spanish: en el décimo año
  alternatives_spanish:
  - en el año décimo
  - durante el décimo año
  lexicon: HALOT
  rationale: Es una fórmula cronológica regia estándar. «En el décimo año» conserva el valor temporal sin rigidez innecesaria.
- source_word: לְצִדְקִיָּהוּ
  english_pob_choice: of Zedekiah
  chosen_spanish: de Sedequías
  alternatives_spanish:
  - de Sedecías
  - perteneciente a Sedequías
  lexicon: HALOT
  rationale: Se transcribe el nombre propio con una forma bíblica reconocible en español. «De Sedequías» corresponde al vínculo regnal indicado por la preposición.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: La apposición real se mantiene directa. «Rey de Judá» reproduce el título sin añadir elementos ajenos al hebreo.
- source_word: הִיא
  english_pob_choice: which was
  chosen_spanish: que fue
  alternatives_spanish:
  - la cual fue
  - es decir, fue
  lexicon: HALOT
  rationale: El pronombre femenino retoma «año» y enlaza la doble datación. «Que fue» conserva la equivalencia explicativa entre ambos cómputos.
- source_word: הַשָּׁנָה שְׁמֹנֶה עֶשְׂרֵה שָׁנָה
  english_pob_choice: the eighteenth year
  chosen_spanish: el año dieciocho
  alternatives_spanish:
  - el decimoctavo año
  - año dieciocho
  lexicon: HALOT
  rationale: El hebreo repite «año» de forma formularia. En español, «el año dieciocho» comunica con claridad la fecha regnal sin perder el sentido.
- source_word: לִנְבוּכַדְרֶאצַּר
  english_pob_choice: of Nebuchadnezzar
  chosen_spanish: de Nabucodonosor
  alternatives_spanish:
  - de Nebucadnezar
  - para Nabucodonosor
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y ampliamente reconocible del nombre propio. La preposición refleja la referencia al año de su reinado.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo contiene el Tetragrámaton. De acuerdo con la terminología del proyecto, se conserva el nombre divino en forma transparente como «Yahvé», en vez de ocultarlo con un sustituto reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Double regnal dating formula
  english_pob_reading: in the tenth year ... which was the eighteenth year of Nebuchadnezzar
  chosen_spanish_reading: en el décimo año ... que fue el año dieciocho de Nabucodonosor
  alternative_spanish_readings:
  - en el décimo año ... es decir, el año dieciocho de Nabucodonosor
  - en el décimo año ... el decimoctavo año de Nabucodonosor
  rationale: 'El hebreo une dos sistemas de datación: el año de Sedequías y la equivalencia con el año de Nabucodonosor. Se conserva esa correlación sin armonizarla ni simplificarla demasiado.'
  doctrine_reference: Jeremiah historical superscription conventions
translation_notes:
  revision_awareness: El texto base en inglés no fue corregido en esta pasarela; la versión española sigue el packet hebreo y la auditoría inglesa, manteniendo la fórmula profética, el dativo de origen divino y la datación regnal doble sin cambios interpretativos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יהוה.
  - Se usa «Nabucodonosor» como nombre propio español tradicional y transparente.
  - «Palabra» conserva la fórmula profética habitual y la relación auditada con דָּבָר.
  - La datación se ha conservado en forma completa para no perder la equivalencia entre los dos cómputos regios.
