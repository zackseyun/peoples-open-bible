review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura genealógica del hebreo: ''los hijos de Uzzi ... los hijos de Izrajías ... cinco, todos ellos ...''. También preserva adecuadamente el sentido de רָאשִׁים como líderes/cabezas en contexto genealógico mediante ''jefes''. Sin embargo, hay un problema de alineación formal importante con la evidencia y con la propia decisión léxica: el texto español ancla la nota [a] en ''Isshías'', pero la nota explica la expresión final ''cinco ... jefes/cabezas'', no el nombre propio. La nota debe ir anclada en la frase de רָאשִׁים, no en el nombre.'
  spanish_quality_summary: El español es claro y eclesialmente legible. 'Y los hijos de...' suena natural en genealogía. Los nombres 'Miguel', 'Obadías' y 'Joel' funcionan bien; 'Izrajías' e 'Isshías' son transliteraciones aceptables dentro del criterio del proyecto. La única reparación necesaria es reubicar la nota para que el lector no interprete erróneamente que comenta el nombre propio.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece el nombre divino ni vocabulario teológicamente sensible. La decisión 'jefes' para רָאשִׁים concuerda con la justificación auditada, mientras la nota conserva la alternativa más literal 'cabezas' y la contextual 'jefes de familia'.
  issues:
  - severity: medium
    issue: Marcador de nota al pie mal ubicado
    rationale: La nota [a] comenta el sintagma hebreo 'cinco cabezas, todos ellos' (חֲמִשָּׁה רָאשִׁים כֻּלָּם), pero en el borrador está pegada a 'Isshías'. Esto rompe la correspondencia entre texto y nota exigida por el proyecto y puede inducir al lector a pensar que la nota trata sobre el nombre propio.
  revised_spanish_text: 'Y los hijos de Uzzi: Izrajías. Y los hijos de Izrajías: Miguel, Obadías, Joel e Isshías—cinco, todos ellos jefes[a].'
  revised_footnotes:
  - marker: a
    text: O 'cinco jefes' o 'cinco jefes de familia'. El hebreo dice literalmente 'cinco cabezas, todos ellos'.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto base porque representa fielmente el sentido del hebreo y la racionalidad léxica de la POB. Solo se corrige la colocación del marcador de nota para que quede anclado a 'jefes', que es el elemento realmente comentado por la nota.
