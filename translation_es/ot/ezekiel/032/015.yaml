review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura temporal del hebreo, conserva la doble idea de desolación, transmite el vaciamiento de la tierra y mantiene correctamente el nombre divino «Yahvé». Sin embargo, «cuando hiera» no expresa con suficiente claridad la fuerza letal/judicial de בְּהַכּוֹתִי en este contexto, donde el inglés auditado escogió «strike down».
  spanish_quality_summary: El español es claro y digno. La frase principal fluye bien y la nota léxica está bien anclada. No obstante, «hiera» suena algo débil o ambiguo en español contemporáneo; «abata» o «derribe» comunica mejor el sentido de juicio mortal sin caer en arcaísmo. El resto del verso es natural y fiel.
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; no hay conflictos con otras entradas del glosario. La reiteración «desolación / desolada» sigue la revisión inglesa documentada y preserva la consistencia léxica.'
  issues:
  - severity: medium
    issue: «cuando hiera» debilita la fuerza de juicio de בְּהַכּוֹתִי
    rationale: En este contexto de destrucción nacional y muerte de habitantes, el verbo no es solo «herir» en sentido de lesionar, sino golpear de manera destructiva. El rastro auditado inglés optó por «strike down» para explicitar esa fuerza. En español, «cuando abata a todos los que habitan en ella» mantiene mejor el valor contextual.
  revised_spanish_text: Cuando yo haga de la tierra de Egipto una desolación[a], y la tierra quede desolada, vaciada de todo lo que la llena, cuando abata a todos los que habitan en ella, entonces sabrán que yo soy Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «y la tierra quede arrasada, vaciada de todo lo que la llena».'
    reason: lexical_alternative
  revision_rationale: 'Se conserva todo el borrador salvo un ajuste puntual: «hiera» se cambia por «abata» para reflejar mejor la fuerza destructiva de בְּהַכּוֹתִי en este contexto de juicio. No se requieren cambios en la nota ni en la traducción de «Yahvé».'
