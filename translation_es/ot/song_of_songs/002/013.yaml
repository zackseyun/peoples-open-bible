base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/002/013.yaml
  text: The fig tree has ripened its early figs[a], and the vines in blossom give off fragrance. Arise, my love, my beautiful one[c][b], and come away.
  footnotes:
  - marker: a
    text: Or 'the fig tree has formed its green figs.' The Hebrew verb and noun can emphasize the fruit's early developmental stage rather than full ripeness.
    reason: lexical_alternative
  - marker: b
    text: Or 'the vines in blossom are fragrant' or 'the vines with tender grapes give fragrance.'
    reason: lexical_alternative
  - marker: c
    text: 'Literally, ''and go for yourself''; here the sense is an invitation to depart with the speaker: ''come away.'''
    reason: lexical_alternative
