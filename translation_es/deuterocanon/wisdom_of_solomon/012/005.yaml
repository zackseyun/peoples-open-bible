    reason: cultural_note
lexical_decisions:
- source_word: τέκνων
  english_pob_choice: of children
  chosen_spanish: de niños
  alternatives_spanish:
  - de hijos
  - de criaturas
  lexicon: LSJ
  rationale: El genitivo plural τέκνων se refiere de forma natural a 'niños' en este contexto de denuncia. 'Niños' conserva la fuerza acusatoria y es más idiomático en español que 'hijos'.
- source_word: φονέας
  english_pob_choice: murderers
  chosen_spanish: asesinos
  alternatives_spanish:
  - homicidas
  - matadores
  lexicon: LSJ
  rationale: El sustantivo implica matar de forma moralmente culpable; 'asesinos' transmite mejor ese peso que un término más neutral como 'matadores'.
- source_word: ἀνελεήμονας
  english_pob_choice: merciless
  chosen_spanish: implacables
  alternatives_spanish:
  - sin misericordia
  - despiadados
  lexicon: LSJ
  rationale: El adjetivo intensifica la brutalidad. 'Implacables' suena natural en español y conserva la dureza del original sin suavizarla.
- source_word: σπλαγχνοφάγων
  english_pob_choice: of human flesh
  chosen_spanish: de devoradores de entrañas
  alternatives_spanish:
  - de comedores de vísceras
  - de caníbales
  lexicon: LSJ
  rationale: El compuesto alude literalmente a comer las partes internas/viscerales. En español, 'devoradores de entrañas' preserva la imagen violenta y la tensión lexical que el POB inglés mantuvo en nota.
- source_word: ἀνθρώπινων σαρκῶν
  english_pob_choice: human flesh
  chosen_spanish: carne y sangre humanas
  alternatives_spanish:
  - carne humana
  - de cuerpos humanos
  lexicon: LSJ
  rationale: El griego combina con el sustantivo de comida ritual. En español, la coordinación 'carne y sangre humanas' mantiene la crudeza y la relación con el banquete; se evita una paráfrasis que diluya el horror.
- source_word: δοῖναν
  english_pob_choice: a feast
  chosen_spanish: un banquete
  alternatives_spanish:
  - una comida
  - un festín
  lexicon: LSJ
  rationale: '''Banquete'' refleja el carácter ritualizado y solemne del sustantivo mejor que ''comida'', y es natural en español contemporáneo culto.'
- source_word: αἵματος
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: LSJ
  rationale: Traducción literal y directa; no hay motivo para suavizar ni expandir el término.
- source_word: ἐκ μέσου
  english_pob_choice: from the midst of
  chosen_spanish: desde en medio de
  alternatives_spanish:
  - de entre
  - desde el centro de
  lexicon: LSJ
  rationale: La expresión se mantiene cercana al griego para conservar la localización interna del grupo ritual; 'desde en medio de' es algo más literal que 'de entre'.
- source_word: μύστας
  english_pob_choice: the initiates
  chosen_spanish: iniciados
  alternatives_spanish:
  - los iniciados
  - místicos iniciados
  lexicon: LSJ
  rationale: μύστας designa personas admitidas a ritos secretos. 'Iniciados' conserva la función cultual sin introducir un término ajeno al español bíblico.
- source_word: θιάσου
  english_pob_choice: their revel band
  chosen_spanish: una banda de jolgorio
  alternatives_spanish:
  - un coro ritual
  - una cofradía ritual
  lexicon: LSJ
  rationale: θίασος apunta a una compañía ritual asociada con celebración extática. 'Banda de jolgorio' intenta transmitir el matiz festivo-religioso con español natural; se evita 'cofradía' por su carga eclesial cristiana.
theological_decisions:
- issue: Cómo conservar el matiz cultual de μύστας θιάσου sin volver opaco el español
  english_pob_reading: initiates from the midst of a revel band
  chosen_spanish_reading: iniciados desde en medio de una banda de jolgorio
  alternative_spanish_readings:
  - iniciados de una compañía ritual
  - iniciados desde el seno de un grupo ritual
  rationale: El contexto no describe mera sociabilidad, sino una práctica ritual pervertida. La traducción mantiene la idea de iniciación y grupo cultual, aunque con vocabulario español más legible que una transliteración.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Si σπλαγχνοφάγων debe verterse con un equivalente anatómicamente literal o con una formulación más idiomática
  english_pob_reading: a feast of human flesh and blood of entrail-eaters
  chosen_spanish_reading: un banquete de carne y sangre humanas de devoradores de entrañas
  alternative_spanish_readings:
  - un banquete de entrañas y sangre humanas
  - un banquete de carne humana y sangre
  rationale: La imagen es deliberadamente gráfica. Se conserva el horror explícito y la tensión entre el banquete y el comer vísceras, sin aplanar la sintaxis original.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'He tenido en cuenta el pasaje adjudicado y la revisión más reciente: el inglés POB corrigió la omisión de σπλαγχνοφάγων y ajustó la sintaxis de μύστας/ἐκ μέσου. La versión española refleja esas correcciones, conserva el tono acusatorio y evita borrar la dimensión ritual del texto.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Iniciados'' se usa en sentido cultual, no eclesiástico.'
  - Se ha preferido una formulación española natural que aún permite auditar la cercanía al griego.
  - La nota a preserva la alternativa semántica principal para σπλαγχνοφάγων, siguiendo el expediente inglés.
