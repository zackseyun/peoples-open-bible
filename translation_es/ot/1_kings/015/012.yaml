  text: וַ/יַּעֲבֵ֥ר הַ/קְּדֵשִׁ֖ים מִן הָ/אָ֑רֶץ וַ/יָּ֨סַר֙ אֶת כָּל הַ/גִּלֻּלִ֔ים אֲשֶׁ֥ר עָשׂ֖וּ אֲבֹתָֽי/ו־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/015/012.yaml
  text: He removed the male cult prostitutes from the land[d][c][b][a], and he took away all the idols that his fathers had made.
  footnotes:
  - marker: a
    text: Or 'drove out.' The verb can denote causing someone to pass from a place, hence removing or expelling them.
    reason: lexical_alternative
  - marker: b
    text: Hebrew קְדֵשִׁים, males associated with illicit cultic sexual practice. Traditional English versions often have 'sodomites,' but that is not the most precise lexical rendering here.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term for 'idols' is contemptuous and may carry the sense of 'detestable idols' or even 'dung-idols.'
    reason: lexical_alternative
  - marker: d
    text: Or 'his ancestors' / 'his forefathers.' Hebrew 'his fathers' is an idiom for earlier generations.
    reason: lexical_alternative
