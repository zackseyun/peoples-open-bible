revisions:
- from: Incluso en el camino[a], cuando el necio anda, le falta el corazón de juicio, y dice a todos que es un necio.
  to: Aun en el camino, cuando el necio anda, su corazón carece de juicio, y dice a todos que es un necio[a].
  rationale: 'Se corrigió la cláusula central para reflejar fielmente לִבּוֹ חָסֵר en español natural: no “le falta el corazón de juicio”, sino que su corazón carece de juicio. También se movió la nota al pie a la cláusula final, donde realmente está la ambigüedad interpretativa. Se mantuvo «necio» por su fuerza sapiencial y la lectura principal de autodelación seguida por la POB inglesa.'
