translation:
  language: es
  text: Sus hijos varones iban y hacían un festín[a], cada uno en su propia casa en su día, y enviaban e invitaban a sus tres hermanas a comer y a beber con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «en su cumpleaños». El hebreo dice literalmente «en su día», lo que puede referirse al turno asignado de cada hijo o a su cumpleaños.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָלְכוּ
  english_pob_choice: would go
  chosen_spanish: iban
  alternatives_spanish:
  - fueron
  - solían ir
  lexicon: HALOT
  rationale: El verbo perfecto narrativo expresa acción habitual o repetida en contexto. En español, «iban» comunica mejor la práctica recurrente que un pretérito simple.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus varones
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en español «hijos» es el término natural y no añade una distinción innecesaria; el contexto ya contrasta con «sus tres hermanas».
- source_word: וְעָשׂוּ מִשְׁתֶּה
  english_pob_choice: hold a feast
  chosen_spanish: hacían un banquete
  alternatives_spanish:
  - celebraban una fiesta
  - hacían una fiesta
  lexicon: HALOT
  rationale: El hebreo significa literalmente «hacían un banquete/fiesta». «Hacían un banquete» conserva la fuerza idiomática y la referencia a una comida festiva sin volverlo demasiado formal.
- source_word: בֵּית אִישׁ
  english_pob_choice: each in his own house
  chosen_spanish: cada uno en su propia casa
  alternatives_spanish:
  - en casa de cada uno
  - cada uno en su casa
  lexicon: HALOT
  rationale: La construcción distributiva se expresa con naturalidad en español como «cada uno en su propia casa», preservando el sentido de turno o reparto entre los hermanos.
- source_word: יוֹמוֹ
  english_pob_choice: on his day
  chosen_spanish: en su día
  alternatives_spanish:
  - el día que le correspondía
  - en su fecha
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su día». La versión principal mantiene esa literalidad, dejando abierta la ambigüedad entre día señalado y cumpleaños, como en el texto fuente.
- source_word: וְשָׁלְחוּ וְקָרְאוּ
  english_pob_choice: they would send and invite
  chosen_spanish: enviaban e invitaban
  alternatives_spanish:
  - mandaban a llamar e invitaban
  - enviaban y llamaban
  lexicon: HALOT
  rationale: 'Los dos verbos forman una secuencia: despachar y convocar. «Enviaban e invitaban» reproduce el par verbal de modo idiomático en español.'
- source_word: לִשְׁלֹשֶׁת אֲחִיתֵיהֶם
  english_pob_choice: their three sisters
  chosen_spanish: a sus tres hermanas
  alternatives_spanish:
  - a las tres hermanas de ellos
  lexicon: HALOT
  rationale: El hebreo especifica tanto posesión como número. «Sus tres hermanas» es la forma más clara y natural para reflejar ambas marcas.
- source_word: לֶאֱכֹל וְלִשְׁתּוֹת
  english_pob_choice: to eat and drink
  chosen_spanish: a comer y a beber
  alternatives_spanish:
  - para comer y beber
  lexicon: HALOT
  rationale: La pareja de infinitivos expresa la participación en el banquete. Mantener la repetición de «a» refleja la estructura verbal del hebreo y suena natural en español.
- source_word: עִמָּהֶם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: La preposición indica compañía compartiendo la comida y bebida. «Con ellos» es directo y fiel.
theological_decisions:
- issue: 'Sentido de יוֹמוֹ: posible turno asignado o cumpleaños'
  english_pob_reading: The Hebrew literally reads 'on his day,' which may refer either to each son’s appointed turn or to his birthday.
  chosen_spanish_reading: «en su día» mantiene la ambigüedad del hebreo entre un día señalado y un cumpleaños.
  alternative_spanish_readings:
  - «el día de su cumpleaños»
  - «el día que le correspondía»
  rationale: No hay base suficiente para fijar una sola interpretación en el texto principal. La traducción conserva la ambigüedad documentada por el auditor inglés y evita introducir una precisión no explícita.
  doctrine_reference: No aplica; cuestión de sentido lexical y contextual.
translation_notes:
  revision_awareness: 'La redacción sigue el alto grado de acuerdo del repaso final inglés y conserva la revisión que clarificó la distribución: «cada uno en su propia casa». También mantiene la nota de ambigüedad sobre «en su día», sin optar por un sentido no demostrado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando no aparece en este versículo.
  - Se mantiene el paralelismo verbal del hebreo con una secuencia simple y natural en español.
  - «Banquete» refleja mejor el hebreo מִשְׁתֶּה que «fiesta» en este contexto, sin sobrecargar el tono.
  - La ambigüedad de יוֹמוֹ se conserva tanto en el texto como en la nota, siguiendo el audit trail inglés.
