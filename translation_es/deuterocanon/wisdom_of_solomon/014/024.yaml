translation:
  language: es
  text: Ya no guardan puras ni las vidas ni los matrimonios; antes, uno mata a otro con traición[a], o, cometiendo adulterio[b], causa dolor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno destruye a otro con emboscada»; el griego sugiere ataque oculto o acecho.
    reason: lexical_alternative
  - marker: b
    text: O «corrompiendo el matrimonio causa dolor»; el verbo griego puede significar corromper o violar la fidelidad matrimonial.
    reason: lexical_alternative
lexical_decisions:
- source_word: βίους
  english_pob_choice: lives
  chosen_spanish: las vidas
  alternatives_spanish:
  - los modos de vida
  - las maneras de vivir
  - los hogares
  lexicon: LSJ
  rationale: βίος puede significar vida, manera de vivir o sustento. En este contexto moral, junto con γάμους y con καθαρούς, «las vidas» conserva la amplitud ética sin estrechar el sentido a economía o rito.
- source_word: γάμους
  english_pob_choice: marriages
  chosen_spanish: los matrimonios
  alternatives_spanish:
  - las bodas
  - los lechos matrimoniales
  lexicon: LSJ
  rationale: γάμος puede referirse al matrimonio o a la boda. Aquí el plural y el verbo φυλάσσουσιν favorecen la idea de mantener íntegra la institución matrimonial; «los matrimonios» es claro y natural en español.
- source_word: καθαρούς
  english_pob_choice: pure
  chosen_spanish: puras
  alternatives_spanish:
  - limpias
  - sin mancha
  - castas
  lexicon: LSJ
  rationale: El adjetivo expresa pureza o limpieza moral. «Puras» funciona bien con ambos sustantivos y evita una carga demasiado ritual o arcaica.
- source_word: φυλάσσουσιν
  english_pob_choice: keep
  chosen_spanish: guardan
  alternatives_spanish:
  - conservan
  - mantienen
  - observan
  lexicon: LSJ
  rationale: El verbo significa guardar, preservar o mantener. «Guardan» comunica bien la idea de conservar una pureza moral establecida.
- source_word: λοχῶν
  english_pob_choice: by treachery
  chosen_spanish: con traición
  alternatives_spanish:
  - con emboscada
  - con asechanza
  - a escondidas
  lexicon: LSJ
  rationale: El campo semántico de λοχῶν apunta a acecho, emboscada o ataque oculto. En español, «con traición» comunica el carácter encubierto e injusto del asesinato en un registro más idiomático.
- source_word: ἀναιρεῖ
  english_pob_choice: kills
  chosen_spanish: mata
  alternatives_spanish:
  - asesina
  - elimina
  - da muerte
  lexicon: LSJ
  rationale: El verbo suele significar matar o quitar de en medio. «Mata» es directo y no añade matices legales que el griego no exige.
- source_word: νοθεύων
  english_pob_choice: by adultery
  chosen_spanish: adulterando
  alternatives_spanish:
  - cometiendo adulterio
  - corrompiendo
  - violando el matrimonio
  lexicon: LSJ
  rationale: νοθεύω puede implicar adulterar, corromper o violar la fidelidad matrimonial. Como el versículo ya menciona matrimonios, el participio «adulterando» conserva la relación con la infidelidad sexual sin perder la fuerza verbal del original.
- source_word: ὀδυνᾷ
  english_pob_choice: causes grief
  chosen_spanish: causa dolor
  alternatives_spanish:
  - causa pena
  - aflige
  - atormenta
  lexicon: LSJ
  rationale: El verbo significa causar dolor o sufrimiento. «Causa dolor» es una equivalencia clara y amplia, adecuada al daño relacional que describe el pasaje.
theological_decisions:
- issue: Alcance de «βίους ... γάμους καθαρούς»
  english_pob_reading: The verse condemns failure to preserve both personal/social life and marital unions in purity.
  chosen_spanish_reading: El versículo condena no conservar puras tanto las vidas como los matrimonios.
  alternative_spanish_readings:
  - El versículo se refiere más estrechamente a modos de vida lícitos y matrimonios legítimos.
  - El versículo alude a mantener ritualmente limpios la vida y el matrimonio.
  rationale: El contexto es una lista de corrupción moral derivada de la idolatría, no un rito ceremonial. Por eso, «vidas» y «matrimonios» se mantienen en clave ética amplia, sin ritualizar el lenguaje ni reducir βίους a lo económico.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; mantener el sentido fuente sin importar una lectura doctrinal ajena al texto.'
translation_notes:
  revision_awareness: No se requieren cambios adicionales según el último pase de revisión; el borrador sigue el estado de alta concordancia y conserva las dos ambigüedades léxicas principales señaladas en el audit trail inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al proyecto; este versículo no contiene el nombre divino.
  - Se prefirió «matrimonios» frente a «bodas» para reflejar el plural y la idea de preservar la institución, no el evento.
  - Se conservó la tensión de λοχῶν con una nota alternativa, sin suavizarla a una simple «violencia».
  - Se mantuvo el paralelismo entre pureza moral y daño interpersonal, acorde con el griego y el audit trail inglés.
