theological_decisions:
- issue: Nature of Pashhur's offense in prophetic speech
  chosen_reading: rendered as 'you prophesied falsely'
  alternative_readings:
  - you prophesied lies
  rationale: The text condemns false prophecy without requiring a judgment about Pashhur's subjective intent beyond the falsity of the message. 'Prophesied falsely' preserves that charge without importing additional doctrinal claims about motive.
  doctrine_reference: Preserve theological tension rather than resolve it.
