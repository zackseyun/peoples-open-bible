    text: 'Hebreo: «todos los beritas». Algunas traducciones leen «todos los bichritas», relacionándolo con Seba hijo de Bicri por el contexto; el texto masorético favorece más directamente «beritas».'
    reason: alternative_reading
  - marker: b
    text: 'O: «y ellos también vinieron tras él». El hebreo permite una traducción más literal de la expresión idiomática, aunque «lo siguieron» comunica mejor el sentido en español.'
    reason: lexical_alternative
