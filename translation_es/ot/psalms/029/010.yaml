translation:
  language: es
  text: Yahvé se sentó entronizado sobre el diluvio[a]; Yahvé está entronizado como rey para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «el Diluvio», con alusión específica al diluvio de Noé.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: nombre divino Tetragrámaton / tradición POB
  rationale: Se sigue el default del proyecto para YHWH. "Yahvé" preserva el nombre divino en vez de ocultarlo con un sustituto y es natural en español bíblico contemporáneo.
- source_word: לַמַּבּוּל
  english_pob_choice: over the flood
  chosen_spanish: sobre el diluvio
  alternatives_spanish:
  - sobre el flood
  - ante el diluvio
  - sobre las aguas del diluvio
  lexicon: HALOT מַבּוּל
  rationale: '"מַבּוּל" puede ser el diluvio en sentido general o aludir al Diluvio de Noé. "Sobre el diluvio" conserva la fuerza del sustantivo y permite ambas resonancias sin resolver la tensión.'
- source_word: יָשָׁב
  english_pob_choice: sat enthroned
  chosen_spanish: se sentó entronizado
  alternatives_spanish:
  - se sentó
  - estuvo entronizado
  - reinó sentado
  lexicon: HALOT יָשַׁב
  rationale: En contexto real, el verbo lleva sentido de entronización. "Se sentó entronizado" mantiene la imagen verbal y expresa la idea de realeza sin perder el verbo base.
- source_word: וַיֵּשֶׁב
  english_pob_choice: sits enthroned
  chosen_spanish: se sienta entronizado
  alternatives_spanish:
  - se sentó entronizado
  - está entronizado
  - queda entronizado
  lexicon: HALOT יָשַׁב
  rationale: La forma consecutiva puede expresar continuidad o estado resultante. El presente español comunica mejor la vigencia del reinado paralelo a "para siempre".
- source_word: מֶלֶךְ
  english_pob_choice: as King
  chosen_spanish: como Rey
  alternatives_spanish:
  - como rey
  - entronizado como Rey
  - en calidad de Rey
  lexicon: HALOT מֶלֶךְ
  rationale: Tras el verbo de sentarse, el sustantivo funciona predicativamente. "Como Rey" es claro y fiel al valor de realeza explícita.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT עוֹלָם
  rationale: Es la manera más natural y fiel en español para duración indefinida o interminable.
theological_decisions:
- issue: Si מַבּוּל se debe identificar explícitamente con el Diluvio de Noé
  english_pob_reading: Rendered generically as 'the flood' in the main text, without specifying Noah.
  chosen_spanish_reading: Se traduce de forma genérica como "el diluvio", sin aclarar en el texto que sea el de Noé.
  alternative_spanish_readings:
  - el Diluvio (es decir, el de Noé)
  - el diluvio de Noé
  rationale: El hebreo permite una lectura alusiva al Diluvio primigenio, pero el versículo no lo especifica y el contexto inmediato es una teofanía de tormenta. Se preserva la ambigüedad teológica y literaria.
  doctrine_reference: Preservar la tensión interpretativa en vez de resolverla
translation_notes:
  revision_awareness: 'Concordante con la auditoría inglesa: no se hicieron revisiones posteriores; el pasaje mantiene la lectura de realeza entronizada y la ambigüedad de מַבּוּל.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" conforme al estándar del proyecto para el Tetragrámaton.
  - Se usó "diluvio" en minúscula en el cuerpo del texto para la lectura genérica, reservando la mayúscula solo en la nota como alternativa interpretativa.
  - '"Entronizado" se conserva dos veces para reflejar el paralelismo verbal y la idea de reinado permanente.'
