translation:
  language: es
  text: Escuchen[a], porque hablaré cosas nobles[b], y la apertura de mis labios hablará cosas rectas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Escuchen» traduce el imperativo plural de שׁמע de manera natural; «Oigan» también sería posible, pero aquí la idea principal es prestar atención con disposición a recibir instrucción.
    reason: lexical_alternative
  - marker: b
    text: «Cosas nobles» refleja el sentido de נְגִידִים como habla de alto valor o dignidad; también puede entenderse como «cosas excelentes». El hebreo apunta a algo principesco o noble, no a nobles como personas.
    reason: lexical_alternative
  - marker: c
    text: O «lo que es recto». El hebreo מֵישָׁרִים denota rectitud o derechura, especialmente en sentido moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Listen
  chosen_spanish: ¡Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen ustedes
  lexicon: HALOT
  rationale: El imperativo plural pide atención activa. «Escuchen» es natural en español moderno y conserva mejor la exhortación directa que un calco más rígido.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Aquí introduce la razón de la exhortación: deben escuchar porque sigue un discurso. «Porque» expresa con claridad esa relación explicativa en español.'
- source_word: נְגִידִים
  english_pob_choice: noble things
  chosen_spanish: cosas nobles
  alternatives_spanish:
  - cosas excelentes
  - cosas principescas
  lexicon: HALOT
  rationale: En este contexto poético no se trata de «príncipes» como personas, sino de habla de alto valor o dignidad. «Cosas nobles» conserva la asociación con lo principesco sin volverla literal.
- source_word: אֲדַבֵּר
  english_pob_choice: I will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - voy a hablar
  lexicon: HALOT
  rationale: El imperfecto expresa aquí discurso inminente o característico. «Hablaré» es idiomático en español y mantiene el valor futuro/contextual.
- source_word: וּמִפְתַּח שְׂפָתַי
  english_pob_choice: the opening of my lips
  chosen_spanish: la apertura de mis labios
  alternatives_spanish:
  - la apertura de mis labios
  - lo que sale de mis labios
  lexicon: HALOT
  rationale: Se conserva la imagen poética literal de la «apertura» de los labios, que sostiene el paralelismo del versículo y la concreción del hebreo.
- source_word: מֵישָׁרִים
  english_pob_choice: upright things
  chosen_spanish: cosas rectas
  alternatives_spanish:
  - cosas justas
  - cosas rectas/upright
  lexicon: HALOT
  rationale: El término denota rectitud/linealidad moral. «Cosas rectas» es una forma natural en español y preserva el plural nominal del hebreo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada nota de pie tenga un ancla exacta en el texto; no se incluyeron marcadores sin correspondencia.
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y poético propio de Proverbios.
  - Se conservó la imagen concreta de «la apertura de mis labios» para respetar el paralelismo hebreo.
  - No se sustituyó el lenguaje por fórmulas eclesiásticas tradicionales ajenas al hebreo.
  - Se eligió «rectas» para mantener la idea moral de uprightness sin forzar una paráfrasis.
