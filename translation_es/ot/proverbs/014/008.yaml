translation:
  language: es
  text: La sabiduría del prudente[a] es entender su camino, pero la necedad de los necios es engaño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''La sabiduría del sagaz es discernir su camino.'''
    reason: alternative_reading
  - marker: b
    text: '''Engaño'' puede referirse tanto a conducta engañosa como a autoengaño, rasgo definitorio de la necedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכְמַת
  english_pob_choice: wisdom of
  chosen_spanish: la sabiduría de
  alternatives_spanish:
  - sabiduría
  - la sabiduría
  lexicon: HALOT
  rationale: El hebreo está en construcción, con una relación genitiva entre 'sabiduría' y 'prudente'. En español, 'la sabiduría del prudente' o 'la sabiduría de' expresan naturalmente esa relación; opto por una formulación fluida y fiel al genitivo implícito.
- source_word: עָרוּם
  english_pob_choice: the prudent
  chosen_spanish: el prudente
  alternatives_spanish:
  - el sensato
  - el sagaz
  - el astuto
  lexicon: HALOT
  rationale: En Proverbios, עָרוּם suele tener un sentido positivo de prudencia o discernimiento hábil. 'Prudente' conserva ese valor favorable y evita el matiz negativo de 'astuto' o 'cauto' en exceso.
- source_word: הָבִין
  english_pob_choice: is to understand
  chosen_spanish: es entender
  alternatives_spanish:
  - es discernir
  - entiende
  - consiste en entender
  lexicon: HALOT
  rationale: La forma funciona de modo predicativo, definiendo en qué consiste la sabiduría del prudente. 'Es entender' mantiene ese valor definitorio sin volver la línea demasiado explicativa.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su ruta
  - su manera de vivir
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino, modo de vida o conducta. 'Su camino' es idiomático en español bíblico actual y conserva el sentido de trayectoria moral o vital. El sufijo singular se refleja como 'su'.
- source_word: וְאִוֶּלֶת
  english_pob_choice: but the folly
  chosen_spanish: pero la necedad
  alternatives_spanish:
  - y la necedad
  - pero la insensatez
  - y la insensatez
  lexicon: HALOT
  rationale: El hebreo es adversativo en este paralelismo antitético. 'Necedad' comunica bien el registro sapiencial de אִוֶּלֶת y evita sonar demasiado abstracto para la contraposición con el prudente.
- source_word: כְּסִילִים
  english_pob_choice: of fools
  chosen_spanish: de los necios
  alternatives_spanish:
  - de los insensatos
  - de los torpes
  lexicon: HALOT
  rationale: כְּסִילִים es el término sapiencial usual para 'fools'. 'Necios' mantiene la fuerza proverbial y la concreción personal del contraste; 'insensatos' sería posible, pero 'necios' suena más tradicional y directo aquí.
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - astucia engañosa
  lexicon: HALOT
  rationale: מִרְמָה puede abarcar engaño, fraude o conducta engañosa. 'Engaño' es breve y natural en español; además permite mantener abierta la tensión señalada por el POB inglés entre engaño externo y autoengaño.
theological_decisions:
- issue: Sentido positivo de עָרוּם
  english_pob_reading: Positive 'prudent' rather than negative 'crafty'
  chosen_spanish_reading: '''prudente'' en sentido favorable, no ''astuto'' en sentido moralmente sospechoso'
  alternative_spanish_readings:
  - astuto
  - cauto
  - sagaz
  rationale: El paralelismo con la sabiduría y la necedad muestra que el término se usa elogiosamente. Traducirlo con un valor negativo distorsionaría la polaridad ética del proverbio.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
- issue: Sufijo masculino singular en דַּרְכּוֹ
  english_pob_reading: Rendered as 'his way'
  chosen_spanish_reading: '''su camino'''
  alternative_spanish_readings:
  - su propia senda
  - su camino de vida
  - su manera de vivir
  rationale: El hebreo usa un sufijo masculino singular genérico. En español, 'su camino' conserva el referente singular sin imponer una neutralización innecesaria; es la forma más natural y fiel al hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en lectura y no presentan revisiones aplicadas; se preserva la antítesis proverbial y la ambigüedad semántica de מִרְמָה sin ampliarla indebidamente.
  spanish_consistency_notes:
  - Se mantiene 'prudente' para עָרוּם en sentido positivo, coherente con la política terminológica del proyecto.
  - Se traduce דֶּרֶךְ como 'camino' para conservar el valor sapiencial de trayectoria vital.
  - '''Necedad''/''necios'' preserva el contraste proverbial con ''sabiduría''/''prudente'' sin introducir vocabulario eclesiástico tradicional no solicitado.'
