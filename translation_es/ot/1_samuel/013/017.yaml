  to: Y salieron los saqueadores[a] del campamento de los filisteos en tres compañías[b]. Una compañía se dirigió hacia el camino a Ofra, hacia la tierra de Shual.
  rationale: Se ajusta la expresión de dirección para reflejar mejor el hebreo y la decisión auditada en inglés («the road to Ophrah»), reemplazando «por el camino de Ofra» por una formulación más natural y precisa en español. También se reubica la nota [b] para anclarla directamente a «tres compañías», que es donde se refleja el modismo hebreo.
