lexical_decisions:
- source_word: עֶזְרֵנוּ
  english_pob_choice: Our help
  chosen_spanish: Nuestra ayuda
  alternatives_spanish:
  - Nuestro auxilio
  - Nuestra asistencia
  lexicon: HALOT
  rationale: El sustantivo con sufijo de 1.ª persona plural expresa ayuda/auxilio, no una persona ayudante. «Nuestra ayuda» conserva el valor predicativo natural en español.
- source_word: בְּשֵׁם
  english_pob_choice: is in the name of
  chosen_spanish: está en el nombre de
  alternatives_spanish:
  - está por el nombre de
  - está en nombre de
  lexicon: HALOT
  rationale: La preposición con שֵׁם comunica base, esfera o apelación. «Está en el nombre de» reproduce la fuerza relacional sin convertirla en paráfrasis amplia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio POB para el Nombre divino: transliteración del Tetragrámaton. En español, «Yahvé» es la forma principal adoptada en el proyecto, en lugar de la sustitución por un título.'
- source_word: עֹשֵׂה
  english_pob_choice: maker of
  chosen_spanish: hacedor de
  alternatives_spanish:
  - creador de
  - el que hace
  - haciendo
  lexicon: HALOT
  rationale: El participio qal funciona de manera atributiva con el Nombre divino. «Hacedor de» conserva el matiz participial y evita cargarlo innecesariamente como un título técnico o un pasado narrativo.
- source_word: שָׁמַיִם וָאָרֶץ
  english_pob_choice: heaven and earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - cielos y tierra
  - el universo
  lexicon: HALOT
  rationale: La expresión es un merismo para la totalidad de la creación. En español, «los cielos y la tierra» mantiene mejor el paralelismo y la forma tradicional sin diluir el plural hebreo de שָׁמַיִם.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva el nombre propio revelado a Israel mediante transliteración, no una sustitución titulizante. Esto sigue la línea doctrinal del POB y la terminología base del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Valor de עֹשֵׂה como participio atributivo
  english_pob_reading: maker of heaven and earth
  chosen_spanish_reading: hacedor de los cielos y de la tierra
  alternative_spanish_readings:
  - creador de los cielos y de la tierra
  - el que hizo los cielos y la tierra
  rationale: El participio presenta a Yahvé por su acción característica, no sólo como una acción pasada. «Hacedor» preserva esa cualidad descriptiva y evita volverlo una mera cláusula verbal.
  doctrine_reference: HALOT; English POB revision on participial force
translation_notes:
  revision_awareness: El análisis inglés mantiene la lectura del Nombre divino como Yahweh y el participio עֹשֵׂה como rasgo atributivo. Se incorporó la revisión que evita sobrecargar el participio como título explícito en inglés; en español se optó por «hacedor» para preservar la fuerza descriptiva sin añadir más explicaciones que el hebreo no exige.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar español del proyecto y no «SEÑOR», para no ocultar el Nombre divino.
  - Se prefirió «los cielos» para conservar el plural hebreo de שָׁמַיִם y el paralelismo poético.
  - «Hacedor» mantiene el valor participial y resulta natural en registro bíblico moderno.
  - La puntuación con coma refleja la aposición descriptiva del participio respecto del Nombre divino.
