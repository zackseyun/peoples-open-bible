translation:
  language: es
  text: Una sola ley será para el nativo y para el extranjero residente que vive en medio de ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una sola instrucción será para el nativo y para el extranjero residente que vive en medio de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרָה
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  lexicon: HALOT
  rationale: En este contexto legal sobre la observancia de la Pascua, תּוֹרָה se refiere a una norma obligatoria, no a enseñanza general. «Ley» conserva ese valor jurídico y es natural en español bíblico contemporáneo.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una sola
  alternatives_spanish:
  - una
  - la misma
  lexicon: HALOT
  rationale: אַחַת subraya unicidad y unidad de la norma. «Una sola» comunica con claridad que se trata de una norma única para ambos grupos.
- source_word: יִהְיֶה
  english_pob_choice: shall be for
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  - estará
  lexicon: HALOT
  rationale: Aunque literalmente es «será», en español jurídico «habrá» expresa con naturalidad la existencia/disposición de una sola ley aplicable. Mantiene el sentido sin forzar una construcción menos idiomática.
- source_word: אֶזְרָח
  english_pob_choice: the native
  chosen_spanish: el nativo
  alternatives_spanish:
  - el nativo nacido aquí
  - el ciudadano
  lexicon: HALOT
  rationale: אֶזְרָח designa al miembro nativo de la comunidad. «Nativo» es breve y fiel; «ciudadano» introduciría una categoría política posterior.
- source_word: גֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el extranjero residente
  alternatives_spanish:
  - el forastero residente
  - el peregrino
  lexicon: HALOT
  rationale: גֵּר no es simplemente un extraño ocasional, sino un no nativo que vive dentro de la comunidad. «Extranjero residente» preserva ese matiz de residencia y evita ambigüedad.
- source_word: הַגָּר
  english_pob_choice: who sojourns
  chosen_spanish: que reside
  alternatives_spanish:
  - que habita
  - que mora
  lexicon: HALOT
  rationale: El participio repite y especifica la condición de גֵּר. «Que reside» aclara la permanencia dentro del pueblo sin perder el enlace semántico con la raíz de sojornar/residir.
- source_word: בְּתוֹכְכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  lexicon: HALOT
  rationale: «Entre ustedes» es el equivalente natural en español moderno para el ámbito comunitario de residencia. Conserva la idea de convivencia dentro del pueblo.
theological_decisions:
- issue: Unidad normativa para nativo y extranjero residente
  english_pob_reading: One law shall be for the native and for the sojourner who sojourns among you.
  chosen_spanish_reading: Una sola ley habrá para el nativo y para el extranjero residente que reside entre ustedes.
  alternative_spanish_readings:
  - Una ley será para el nativo y para el extranjero residente que reside entre ustedes.
  - Una sola ley será para el nativo y para el extranjero residente que reside entre ustedes.
  rationale: El hebreo presenta una norma única que rige por igual a ambos grupos; la traducción debe conservar esa igualdad legal sin suavizarla. «Una sola ley» mantiene la unidad normativa y evita diluir el énfasis.
  doctrine_reference: Torá/ley común para nativo y ger en el marco del pacto; cf. la regulación pascual en Éxodo 12.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «shall apply to» a «shall be for» para acercarse más al hebreo. En español, «habrá» conserva la formulación simple y legal de la idea de una sola norma, sin perder el matiz de pertenencia/distribución expresado por לָ/אֶזְרָח וְלַ/גֵּר.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el versículo no contiene el nombre divino explícito.
  - Se evita «SEÑOR» porque aquí no hay sustitución del nombre divino en el texto base.
  - «Extranjero residente» preserva la diferencia de גֵּר frente a un simple forastero ocasional.
  - «Nativo» se usa para אֶזְרָח, en línea con la decisión inglesa, sin introducir «nacido aquí» salvo como alternativa.
  - La nota a pie conserva la alternativa lexical principal «instrucción», porque תּוֹרָה puede abarcar instrucción además de ley, aunque aquí el contexto favorece «ley».
