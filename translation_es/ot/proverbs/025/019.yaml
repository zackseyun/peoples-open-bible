review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: la confianza en alguien desleal en tiempo de aflicción se compara con dos miembros corporales defectuosos. Sin embargo, dos elecciones debilitan la fidelidad idiomática al cuadro fuente: ''en día de angustia'' suena forzado en español, y ''pie resbaladizo'' tiende a describir un pie que hace resbalar a otros o una cualidad adjetival menos natural que la idea hebrea de un pie que resbala o vacila.'
  spanish_quality_summary: El texto es comprensible, pero necesita una reparación menor para sonar natural y proverbial en español. 'En el día de angustia' o 'en tiempo de angustia' es más idiomático que 'en día de angustia'. Además, 'pie que resbala' comunica mejor la imagen concreta que 'pie resbaladizo'. También conviene pulir la nota a para eliminar comillas y paréntesis innecesarios.
  glossary_alignment: No hay términos de glosario mayor en juego. 'Confianza', 'hombre traicionero' y 'angustia' son defendibles; se conserva adecuadamente el masculino singular representativo de בוגד. La revisión propuesta mantiene la decisión de 'hombre traicionero' y mejora solo la naturalidad e imagen metafórica.
  issues:
  - severity: medium
    issue: 'Construcción temporal poco natural: ''en día de angustia'''
    rationale: Aunque calca de cerca el hebreo, en español general y bíblico moderno suena incompleto. 'en el día de angustia' preserva la referencia temporal y mejora la fluidez proverbial.
  - severity: medium
    issue: 'Imagen menos fiel/idiomática: ''pie resbaladizo'''
    rationale: '''Resbaladizo'' suele describir una superficie o algo que provoca resbalón. El hebreo apunta más naturalmente a un pie que resbala, vacila o está inestable. ''pie que resbala'' preserva mejor la imagen concreta sin sobreinterpretar.'
  - severity: low
    issue: Redacción de la nota a algo torpe
    rationale: 'La formulación actual con comillas externas y paréntesis en ''fiar(se)'' es menos limpia. Puede expresarse como ''O: «confianza en una persona infiel»'' o similar, alineado con el sustantivo del texto principal.'
  revised_spanish_text: La confianza en un hombre traicionero en el día de angustia es como diente malo[a] y pie que resbala[b].
  revised_footnotes:
  - marker: a
    text: 'O: «confianza en una persona infiel».'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «pie inestable» o «pie tambaleante».
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene el sentido y las decisiones léxicas principales del borrador, pero corrige dos puntos para un español más natural y una imagen más fiel al hebreo: se cambia ''en día de angustia'' por ''en el día de angustia'' y ''pie resbaladizo'' por ''pie que resbala''. También se armoniza la nota alternativa con la estructura nominal del verso.'
