id: 1CO.14.3
reference: 1 Corinthians 14:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ προφητεύων ἀνθρώποις λαλεῖ οἰκοδομὴν καὶ παράκλησιν καὶ παραμυθίαν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/003.yaml
  text: But the one who prophesies speaks to people for edification and encouragement and consolation[a][b][c].
  footnotes:
  - marker: a
    text: Or 'for building up' instead of 'for edification.'
    reason: lexical_alternative
  - marker: b
    text: '''Encouragement'' translates παράκλησις; it can also mean ''exhortation'' or, in some contexts, ''comfort.'''
    reason: lexical_alternative
  - marker: c
    text: '''Consolation'' translates παραμυθία; alternatively, ''comfort.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 예언하는 사람은 사람에게 말하여 세움과 권면과 위로를 줍니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἰκοδομὴν
  english_pob_choice: edification
  chosen_korean: 세움
  alternatives_korean:
  - 덕을 세움
  - 건축
  lexicon: BDAG
  rationale: οἰκοδομή의 「세움」(building up) 함의를 직접 살린다. 「덕」을 보충 어휘로 끌어들이지 않는다.
- source_word: παράκλησιν
  english_pob_choice: encouragement
  chosen_korean: 권면
  alternatives_korean:
  - 격려
  - 위로
  lexicon: BDAG
  rationale: παράκλησις는 권면·격려·위로를 포괄하나 본 절은 παραμυθία(위로)와 짝지어지므로 「권면」으로 분리한다.
- source_word: παραμυθίαν
  english_pob_choice: consolation
  chosen_korean: 위로
  alternatives_korean:
  - 다독임
  lexicon: BDAG
  rationale: παραμυθία의 대표 등가는 「위로」이며, 본 절의 짝 구조를 살려 권면과 구별한다.
