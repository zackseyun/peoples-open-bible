translation:
  language: es
  text: Cuando Abner volvió a Hebrón, Joab lo llevó aparte en medio de la puerta para hablar con él en privado, y allí lo hirió en el vientre[a], y murió, por la sangre de Asael, su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en la quinta costilla», una traducción tradicional de un modismo que se refiere al abdomen o vientre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT
  rationale: שׁוּב expresa volver/retornar. "Volvió" es natural en español y conserva el movimiento de regreso de Abner a Hebrón.
- source_word: וַיַּטֵּהוּ
  english_pob_choice: took him aside
  chosen_spanish: lo llevó aparte
  alternatives_spanish:
  - lo apartó
  - lo condujo aparte
  lexicon: HALOT
  rationale: La forma hiphil de נטה aquí indica desviar o apartar a alguien de su trayecto. "Lo llevó aparte" comunica bien la acción y la intención de Joab sin sonar forzado.
- source_word: אֶל תּוֹךְ הַשַּׁעַר
  english_pob_choice: into the middle of the gate
  chosen_spanish: al centro de la puerta
  alternatives_spanish:
  - al medio de la puerta
  - al interior de la puerta
  lexicon: HALOT
  rationale: תוך indica el centro o interior. En español, "puerta" puede funcionar para el recinto/portón de una ciudad; "al centro de la puerta" preserva la imagen espacial del hebreo con claridad.
- source_word: לְדַבֵּר אִתּוֹ בַּשֶּׁלִי
  english_pob_choice: to speak with him privately
  chosen_spanish: para hablar con él en privado
  alternatives_spanish:
  - para hablar con él en silencio
  - para hablar con él con calma
  lexicon: HALOT
  rationale: בַּשֶּׁלִי es difícil y probablemente alude a calma, tranquilidad o privacidad. Dado el contexto narrativo, "en privado" expresa la función del giro sin exceder la evidencia.
- source_word: וַיַּכֵּהוּ שָׁם הַחֹמֶשׁ
  english_pob_choice: there he struck him in the stomach
  chosen_spanish: allí lo hirió en el vientre
  alternatives_spanish:
  - allí lo hirió en el abdomen
  - allí lo hirió en el estómago
  - allí lo hirió en el quinto costado
  lexicon: HALOT
  rationale: חֹמֶשׁ en estos relatos de muerte suele referir el área del vientre/abdomen. "Vientre" conserva la fuerza idiomática y evita imponer una lectura anatómica demasiado moderna; "estómago" o "abdomen" son alternativas posibles, y "quinto costado" queda como equivalente tradicional menos claro en español actual.
- source_word: וַיָּמָת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - de modo que murió
  - así que murió
  lexicon: HALOT
  rationale: La waw consecutiva simplemente avanza la narración. "Y murió" es la manera más directa y fiel en español.
- source_word: בְּדַם עֲשָׂה אֵל אָחִיו
  english_pob_choice: for the blood of Asahel his brother
  chosen_spanish: por la sangre de Asael, su hermano
  alternatives_spanish:
  - a causa de la sangre de Asael, su hermano
  - en venganza por la sangre de Asael, su hermano
  lexicon: HALOT
  rationale: La preposición ב expresa motivo o causa. "Por la sangre" conserva la concisión hebrea y sugiere la lógica de represalia sin añadir más de lo que el texto dice.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés, pero adapta las imágenes a un español natural y publicable. Se preserva la ambigüedad de חֹמֶשׁ como término corporal tradicional/idiomático mediante "vientre" en el texto principal sin forzar una nota, porque el español actual no necesita reproducir literalmente "quinto costado" para captar el sentido narrativo.
  spanish_consistency_notes:
  - Se usa "Yahvé" como norma del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se prefiere "volver"/"volvió" para שׁוּב en narrativa.
  - '"Vientre" mantiene una equivalencia idiomática más sobria que "estómago" y evita un calco mecánico.'
  - '"Por la sangre de Asael" conserva el matiz causal/reatributivo sin expandir a una glosa interpretativa.'
