  timestamp: '2026-05-07T23:41:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta el sentido general del proverbio y conserva la imagen de las manos, pero no preserva bien dos rasgos importantes del griego y del rastro POB en inglés: 1) la distinción entre τέκνα (''hijos/children'') y υἱῶν (''hijos varones/sons''), y 2) la construcción española necesita ajuste sintáctico para sonar natural y completa. Además, ''te pidan'' suaviza algo el forcejeo de δεηθῆναί, aunque la nota lo compensa parcialmente.'
  spanish_quality_summary: La frase actual 'que tú mirar' es gramaticalmente deficiente; en español natural debe ser 'a que tú mires' o reestructurarse con infinitivo paralelo. También conviene evitar repetir 'hijos' idénticamente en ambos miembros porque el griego sí marca contraste léxico; en español puede reflejarse como 'hijos' / 'hijos varones' sin excesiva torpeza. La redacción revisada suena más clara y fiel.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Sí importa la política de precisión léxica y de género del proyecto: τέκνα debe mantenerse más amplio que υἱῶν, por lo que ''hijos'' frente a ''hijos varones'' es una solución española adecuada aquí. La imagen concreta ''las manos'' debe conservarse, y se conserva.'
  issues:
  - severity: high
    issue: 'Construcción española no natural: ''que tú mirar'''
    rationale: Tras 'mejor es que...', el segundo miembro requiere una forma finita ('a que tú mires') o una reestructuración completa. Tal como está, la oración suena incorrecta e impropia para texto bíblico publicado.
  - severity: medium
    issue: No se preserva la distinción entre τέκνα y υἱῶν
    rationale: El audit trail en inglés subraya que el contraste 'children' / 'sons' es significativo y debe conservarse. Repetir 'hijos' en ambos lugares borra una diferencia léxica del original.
  - severity: medium
    issue: δεηθῆναί queda algo atenuado con 'te pidan'
    rationale: El verbo griego expresa petición apremiante o súplica. 'Pidan' es posible, pero una forma como 'te supliquen' refleja mejor la fuerza, mientras la nota puede mantener la alternativa más general.
  revised_spanish_text: Porque es mejor que tus hijos te supliquen[a] que tú mires a las manos de tus hijos varones[b].
  revised_footnotes:
  - marker: a
    text: O «te pidan»; el verbo griego puede denotar pedir con insistencia o suplicar, no necesariamente mendigar en sentido literal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «mires a las manos de tus hijos varones», una imagen de depender de ellos para sustento o ayuda.
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis española, se fortalece δεηθῆναί con «te supliquen» manteniendo la alternativa menos intensa en nota, y se restituye la distinción entre τέκνα y υἱῶν mediante «hijos» frente a «hijos varones». Se conserva la imagen concreta de «las manos», tal como pide el rastro léxico del POB.
