translation:
  language: es
  text: Has hecho todas estas cosas con tu mano[a]; has hecho cosas buenas para Israel, y Dios se agradó de ellas[b]. Que seas bendecida por el Señor Todopoderoso para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por tu mano». La expresión griega puede leerse con esa imagen instrumental; en español, «con tu mano» suena más natural en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Dios estuvo complacido con ellas». Esto puede referirse a las cosas buenas hechas o, menos probablemente, al pueblo de Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐποίησας
  english_pob_choice: you have done
  chosen_spanish: has hecho
  alternatives_spanish:
  - hiciste
  - has realizado
  lexicon: BDAG
  rationale: El aoristo comunica una acción completa; en español, el perfecto compuesto suena natural en una alabanza retrospectiva y mantiene la relevancia presente del acto.
- source_word: πάντα ταῦτα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas obras
  lexicon: BDAG
  rationale: Conserva el plural y la referencia global a los actos mencionados sin volverlo más interpretativo.
- source_word: ἐν χειρί σου
  english_pob_choice: by your hand
  chosen_spanish: por tu mano
  alternatives_spanish:
  - con tu mano
  - mediante tu mano
  lexicon: BDAG
  rationale: La preposición instrumental puede expresarse naturalmente en español con 'por', manteniendo la imagen de agencia sin sonar rígido.
- source_word: τὰ ἀγαθὰ
  english_pob_choice: good things
  chosen_spanish: cosas buenas
  alternatives_spanish:
  - bienes
  - beneficios
  lexicon: BDAG
  rationale: La expresión griega es plural y general; 'cosas buenas' refleja la forma sin especificar demasiado el contenido.
- source_word: μετὰ Ἰσραήλ
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - con Israel
  - en favor de Israel
  lexicon: BDAG
  rationale: Aunque μετά puede ser 'con', aquí el contexto favorece un sentido benefactivo. 'Para Israel' conserva esa función de beneficio de forma natural en español.
- source_word: εὐδόκησεν ἐπʼ αὐτοῖς ὁ θεός
  english_pob_choice: God has been pleased with them
  chosen_spanish: Dios se agradó de ellas
  alternatives_spanish:
  - Dios estaba complacido con ellas
  - Dios aprobó esas cosas
  lexicon: BDAG
  rationale: El verbo expresa complacencia/aprobación divina. 'Se agradó de ellas' mantiene el verbo de agrado y puede referirse a las 'cosas buenas' mencionadas inmediatamente antes, tal como la nota inglesa permite.
- source_word: εὐλογημένη γίνου
  english_pob_choice: May you be blessed
  chosen_spanish: Que seas bendecida
  alternatives_spanish:
  - Sé bendecida
  - Bendita seas
  lexicon: BDAG
  rationale: La fórmula es benedictoria y optativa; 'Que seas bendecida' comunica bien el valor de deseo/oración en español moderno y evita que suene meramente imperativa.
- source_word: παρὰ τῷ παντοκράτορι κυρίῳ
  english_pob_choice: by the Almighty Lord
  chosen_spanish: por el Señor Todopoderoso
  alternatives_spanish:
  - por el Señor Omnipotente
  - del Señor Todopoderoso
  lexicon: BDAG
  rationale: Se conserva κύριος como 'Señor' en una fórmula divina estable, y παντοκράτωρ como 'Todopoderoso', la opción más clara y reverente en español.
- source_word: εἰς τὸν αἰῶνα χρόνον
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - eternamente
  lexicon: BDAG
  rationale: Es la equivalencia española más idiomática para una duración sin fin y mantiene la fuerza benedictoria del cierre.
theological_decisions:
- issue: Tratamiento de κύριος en la bendición final
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: El contexto doxológico pide un título divino; 'Señor' preserva la lectura teológica habitual del griego sin perder naturalidad en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Referente de ἐπʼ αὐτοῖς
  english_pob_reading: with them, referring either to the good things done or, less likely, to the people of Israel
  chosen_spanish_reading: de ellas, refiriéndose a las cosas buenas
  alternative_spanish_readings:
  - de ellos, refiriéndose a Israel
  - con ellas
  rationale: La cercanía sintáctica favorece que el pronombre remita a 'las cosas buenas'. La traducción española mantiene esa ambigüedad controlada con una referencia femenina plural concordante con 'cosas'.
  doctrine_reference: Nota crítica del English POB sobre el alcance del pronombre
- issue: Valor de la fórmula εὐλογημένη γίνου
  english_pob_reading: May you be blessed
  chosen_spanish_reading: Que seas bendecida
  alternative_spanish_readings:
  - Sea bendecida
  - Bendita seas
  rationale: La forma funciona como bendición pronunciada, no como simple mandato. El español opta por una construcción desiderativa que conserva el tono performativo de la fórmula.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern Spanish, preserve source sense'
translation_notes:
  revision_awareness: Se revisó el paralelo inglés y su nota textual. El griego de base favorece una traducción que preserve la secuencia de acciones, el matiz benefactivo de μετά + Israel, la complacencia divina expresada por εὐδόκησεν ἐπʼ αὐτοῖς, y la bendición final con κύριος/παντοκράτωρ. No se requirieron correcciones respecto del audit trail inglés, pero se ajustó la sintaxis al español natural.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en la fórmula final, en armonía con el uso doxológico del término.
  - Se conserva el matiz benefactivo de μετὰ Ἰσραήλ como 'para Israel', siguiendo el valor contextual y no la mera preposición literal.
  - '''Cosas buenas'' evita convertir τὰ ἀγαθὰ en un solo beneficio abstracto y mantiene el plural del griego.'
  - La bendición final se formula como deseo benedictorio en español, paralelo al valor optativo del griego.
