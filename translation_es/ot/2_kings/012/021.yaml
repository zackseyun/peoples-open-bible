translation:
  language: es
  text: Y sus siervos se levantaron y tramaron una conspiración, y golpearon a Joás en Bet-milo, en la bajada a Sila[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el descenso hacia Sila» o «por la bajada a Sila». El hebreo describe el lugar más literalmente como la vía o pendiente descendente hacia Sila.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  - sus asistentes
  lexicon: HALOT
  rationale: עֶבֶד puede significar 'siervo' o 'esclavo'; en un contexto de corte real, aquí se trata de los subordinados del rey. 'Siervos' conserva la relación de dependencia sin forzar el sentido a 'oficiales', que sería más interpretativo. Se evita 'esclavos' porque en español puede sonar demasiado socialmente marcado para este contexto y no es la opción del audit trail inglés.
- source_word: וַיִּקְשְׁרוּ קָשֶׁר
  english_pob_choice: conspired a conspiracy
  chosen_spanish: tramaron una conspiración
  alternatives_spanish:
  - conspiraron una conspiración
  - maquinaron una conspiración
  - urdieron una conspiración
  lexicon: HALOT
  rationale: El hebreo usa verbo + sustantivo cognado para expresar conspiración. En español, un calco como 'conspiraron una conspiración' suena antinatural; 'tramaron una conspiración' preserva el contenido de complot/traición y mantiene la fuerza del doblete sin perder naturalidad. 'Maquinaron' y 'urdieron' son posibles, pero 'tramaron' es más sobrio y bíblicamente legible.
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: golpearon
  alternatives_spanish:
  - hirieron
  - mataron
  - aplastaron
  lexicon: HALOT
  rationale: 'נכה es amplio: ''golpear, herir, abatir''. El texto hebreo dice literalmente que lo golpearon; aunque el desenlace es mortal, el verbo no especifica ''matar''. ''Golpearon'' conserva esa amplitud. ''Hirieron'' o ''mataron'' interpretan más de lo que el verbo por sí solo exige.'
- source_word: בֵּית מִלֹּא
  english_pob_choice: Beth-millo
  chosen_spanish: Bet-milo
  alternatives_spanish:
  - Bet-Millo
  - la casa de Milo
  lexicon: HALOT
  rationale: Se translitera como topónimo. En español bíblico moderno, 'Bet-milo' conserva el nombre propio y evita traducirlo como una construcción común ('casa de Milo'), que podría ocultar que es un lugar establecido. Se usa 'Bet' con grafía castellana habitual para nombres hebreos.
- source_word: הַיּוֹרֵד סִלָּא
  english_pob_choice: on the descent to Silla
  chosen_spanish: en la bajada a Sila
  alternatives_spanish:
  - en el descenso a Sila
  - por la bajada hacia Sila
  - en el camino que baja a Sila
  lexicon: HALOT
  rationale: La frase describe topográficamente un descenso/pendiente. 'Bajada' comunica con naturalidad la idea de un tramo descendente y respeta el matiz espacial del participio hebreo. 'Descenso' es más formal; 'camino que baja' agrega más de lo que el hebreo dice. 'Sila' conserva el topónimo transliterado.
- source_word: סִלָּא
  english_pob_choice: Silla
  chosen_spanish: Sila
  alternatives_spanish:
  - Silla
  lexicon: HALOT
  rationale: Se translitera el nombre propio de manera simple y consistente en español. 'Sila' evita una posible confusión con el sustantivo español 'silla' y representa mejor la forma consonántica hebrea sin añadir una vocalización extraña al lector hispano.
translation_notes:
  revision_awareness: El inglés auditable fue revisado de 'formed a conspiracy' a 'conspired a conspiracy' para reflejar mejor el verbo con objeto cognado; el español mantiene ese valor con 'tramaron una conspiración'. También se conservó la idea topográfica de 'descent to Silla' sin sobreespecificarla.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se transliteran los topónimos hebreos como Bet-milo y Sila para conservar el carácter de nombres propios.
  - Se preserva el matiz de acción violenta sin convertir explícitamente el verbo en 'mataron', porque el hebreo usa 'golpear'.
