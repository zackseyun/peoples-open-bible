revisions:
- from: La tierra y todos los que habitan en ella se derriten[a]; yo mismo he afirmado sus columnas[b]. Selah[c]
  to: La tierra y todos los que habitan en ella se desmoronan[a]; yo mismo he afirmado sus pilares[b]. Selah[c]
