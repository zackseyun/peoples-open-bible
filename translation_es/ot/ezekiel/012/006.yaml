translation:
  language: es
  text: Ante sus ojos lo llevarás sobre el hombro; en la oscuridad[a] lo sacarás. Cubrirás tu rostro para que no veas la tierra, porque te he puesto como señal[b] para la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el crepúsculo». El término hebreo puede denotar oscuridad o luz tenue; aquí probablemente se refiere a moverse bajo cobertura de oscuridad.
    reason: lexical_alternative
  - marker: b
    text: O «un portento». El término puede referirse a una señal simbólica que también lleva un matiz de presagio.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵינֵיהֶם
  english_pob_choice: Before their eyes
  chosen_spanish: Ante sus ojos
  alternatives_spanish:
  - En su presencia
  - Delante de ellos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y marca una acción realizada públicamente, visible para los observadores. «Ante sus ojos» conserva la vividez del gesto en español y refleja bien el valor escénico de la señal.
- source_word: עַל כָּתֵף תִּשָּׂא
  english_pob_choice: you shall carry it on your shoulder
  chosen_spanish: lo llevarás sobre el hombro
  alternatives_spanish:
  - lo cargarás sobre el hombro
  - lo alzarás sobre el hombro
  lexicon: HALOT
  rationale: El verbo נשׂא con כָּתֵף expresa cargar/bear una cosa sobre el hombro. «Llevarás sobre el hombro» es natural en español y mantiene la fuerza física del acto simbólico.
- source_word: בָּעֲלָטָה
  english_pob_choice: in the dark
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - al anochecer
  - en secreto
  lexicon: HALOT
  rationale: La raíz alude a oscuridad o penumbra. «En la oscuridad» es fiel y claro; no fuerza específicamente «crepúsculo» cuando el valor léxico básico permite oscuridad real.
- source_word: תוֹצִיא
  english_pob_choice: you shall bring it out
  chosen_spanish: lo sacarás
  alternatives_spanish:
  - lo traerás afuera
  - lo llevarás afuera
  lexicon: HALOT
  rationale: El causativo de יצא pide una acción de sacar/traer afuera. «Lo sacarás» es el equivalente español más directo y adecuado al movimiento descrito.
- source_word: פָּנֶיךָ תְכַסֶּה
  english_pob_choice: You shall cover your face
  chosen_spanish: Cubrirás tu rostro
  alternatives_spanish:
  - Cubrirás tu cara
  - Velarás tu rostro
  lexicon: HALOT
  rationale: «Rostro» conserva un tono más digno y bíblico en español que «cara», sin perder literalidad. El hebreo habla de cubrir el rostro, no necesariamente de un velo específico.
- source_word: וְלֹא תִרְאֶה אֶת הָאָרֶץ
  english_pob_choice: so that you do not see the land
  chosen_spanish: para que no veas la tierra
  alternatives_spanish:
  - y no verás la tierra
  - de modo que no veas la tierra
  lexicon: HALOT
  rationale: Aunque la partícula coordina, la relación funcional es de resultado/finalidad con el cubrirse el rostro. «Para que no veas» comunica esa relación en español de forma clara sin añadir contenido interpretativo.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra del país
  - el país
  lexicon: HALOT
  rationale: En español bíblico, «la tierra» puede reflejar tanto la tierra física como la tierra natal. Aquí mantiene la ambigüedad del hebreo y permite la referencia contextual a la tierra de Judá/Israel sin explicitarla en el texto principal.
- source_word: מוֹפֵת
  english_pob_choice: a sign
  chosen_spanish: señal
  alternatives_spanish:
  - portento
  - señal portentosa
  - maravilla
  lexicon: HALOT
  rationale: El término puede significar señal o portento. Dado el contexto de acto simbólico, «señal» comunica mejor la función profética visible; «portento» se reserva como alternativa por el matiz de presagio que puede traer la palabra.
- source_word: נְתַתִּיךָ
  english_pob_choice: I have made you
  chosen_spanish: te he puesto
  alternatives_spanish:
  - te he hecho
  - te he establecido
  lexicon: HALOT
  rationale: La forma hebrea literalmente dice «te he dado», pero con predicado nominal y en este contexto la idea es de designación/establecimiento. «Te he puesto como señal» reproduce bien ese sentido en español sin sonar forzado.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: for the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - para la casa de Israel
  - para la familia de Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula profética «casa de Israel», con la preposición «para» que expresa destinatario o propósito del signo. Es una expresión estable y reconocible en español bíblico.
theological_decisions:
- issue: Naturaleza de la señal profética
  english_pob_reading: I have made you a sign for the house of Israel
  chosen_spanish_reading: te he puesto como señal para la casa de Israel
  alternative_spanish_readings:
  - te he hecho una señal para la casa de Israel
  - te he puesto como portento para la casa de Israel
  rationale: El hebreo presenta a Ezequiel como una señal encarnada mediante un acto visible. «Señal» mantiene la función profética sin cargar innecesariamente el término con un tono más ominoso que el del texto.
  doctrine_reference: Profecía como acto simbólico visible; mantener la función del signo sin sobreinterpretar.
- issue: Referencia de 'la tierra'
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra de Israel
  - la tierra de Judá
  - el país
  rationale: El hebreo dice simplemente «la tierra». La traducción conserva esa amplitud y no introduce explícitamente una especificación geográfica que el texto no añade en esta cláusula.
  doctrine_reference: Primacía del texto fuente; preservar la ambigüedad cuando el original la deja abierta.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura auditada en inglés y no requiere cambios respecto del último pase revisado, que fue marcado como sin modificaciones necesarias.
  spanish_consistency_notes:
  - Se mantiene «casa de Israel» como fórmula fija profética, coherente con el resto del corpus.
  - Se usa «señal» para מוֹפֵת en el cuerpo principal, preservando la opción de «portento» en nota sin desplazar el sentido funcional del signo.
  - «La tierra» conserva la ambigüedad del hebreo y evita una expansión interpretativa en el texto principal.
  - Se emplea «rostro» por dignidad y claridad, sin añadir el detalle de un velo específico que el hebreo no nombra.
