translation:
  language: es
  text: 'Entonces les dije: «¿Qué es el lugar alto[a] al que van?». Así fue llamado Bamá[a] hasta el día de hoy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo juega con la palabra bāmāh: primero significa «lugar alto» y luego aparece como nombre propio, «Bamá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  english_pob_choice: What is this
  chosen_spanish: ¿Qué es ese
  alternatives_spanish:
  - ¿Qué es
  - ¿Cuál es
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta incisiva sobre el lugar. En español, «¿Qué es ese…?» conserva el tono de señalamiento sin añadir más explicación de la que permite el texto. Se evita volverla más interpretativa de lo necesario.
- source_word: הַבָּמָה / בָּמָה
  english_pob_choice: high place / Bamah
  chosen_spanish: lugar alto / Bamá
  alternatives_spanish:
  - altura cultual / Bamá
  - alto lugar / Bamá
  lexicon: HALOT
  rationale: La primera ocurrencia nombra un sitio de culto, por lo que «lugar alto» transmite el valor léxico y cultual en español natural. La segunda se translitera como nombre propio «Bamá» para preservar el juego de palabras entre sustantivo común y topónimo.
- source_word: אֲשֶׁר אַתֶּם הַבָּאִים שָׁם
  english_pob_choice: where you are going
  chosen_spanish: al que van
  alternatives_spanish:
  - a donde van
  - hacia donde van
  lexicon: HALOT
  rationale: El participio describe un ir habitual o reiterado hacia ese sitio. «Al que van» suena idiomático en español y conserva el sentido direccional del hebreo sin sobrerrepresentar el aspecto.
- source_word: וַיִּקָּרֵא שְׁמָהּ
  english_pob_choice: So its name was called
  chosen_spanish: Así se le puso por nombre
  alternatives_spanish:
  - y fue llamado
  - por eso se llamó
  lexicon: HALOT
  rationale: La fórmula pasiva de nombramiento se expresa de manera natural con «se le puso por nombre», que mantiene el valor resultativo/narrativo del hebreo. «Así» refleja la relación con la pregunta anterior.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - todavía hoy
  lexicon: HALOT
  rationale: Es la equivalencia idiomática estándar en español para el hebreo hasta el presente del narrador. Conserva la referencia temporal continua sin alterar el registro bíblico.
theological_decisions:
- issue: Conservar el juego cultual/onomástico en un término asociado con idolatría
  english_pob_reading: high place / Bamah
  chosen_spanish_reading: lugar alto / Bamá
  alternative_spanish_readings:
  - lugar de culto elevado / Bamá
  - altura sagrada / Bamá
  rationale: La frase hebrea contiene un juego entre el sustantivo común y el nombre propio. Mantener «lugar alto» y transliterar «Bamá» preserva la tensión lexical y la crítica profética al culto ilícito sin sustituirla por un término explicativo que diluya el pun.
  doctrine_reference: Ezequiel 20:29; cf. 1 Reyes 3:2; 12:31
translation_notes:
  revision_awareness: 'La redacción sigue la revisión final del inglés POB: mantiene la pregunta con valor direccional («al que van») y el pasado narrativo («se le puso por nombre» / «was called»), en vez de una formulación presente. También conserva el juego de palabras entre el sustantivo común y el nombre propio, como indicó el aparato inglés.'
  spanish_consistency_notes:
  - Se usa «Bamá» como transliteración consistente del topónimo, en lugar de «Bamah», para ajustarlo a la ortografía española y mantener la relación sonora con el sustantivo común.
  - Se evita «SEÑOR» u otro término no pertinente; el versículo no contiene el nombre divino.
  - «Lugar alto» se mantiene para el término cultual, sin suavizarlo a «colina» o «altura», porque el contexto profético apunta a un sitio de culto ilícito.
