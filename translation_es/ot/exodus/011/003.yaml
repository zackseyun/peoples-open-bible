translation:
  language: es
  text: Yahvé hizo que el pueblo hallara favor[a] ante los egipcios. Además, el hombre Moisés[b] era muy grande en la tierra de Egipto[d][c], ante los ojos de los siervos de Faraón y ante los ojos del pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los ojos de los egipcios».
    reason: lexical_alternative
  - marker: b
    text: O «el hombre, Moisés», conservando el énfasis hebreo.
    reason: lexical_alternative
  - marker: c
    text: O «los oficiales de Faraón»; el hebreo dice literalmente «los siervos de Faraón».
    reason: lexical_alternative
  - marker: d
    text: El último «el pueblo» probablemente se refiere a la población más amplia de Egipto, en contraste con los siervos de Faraón.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el valor del Nombre divino como transliteración del Tetragrama, conforme al criterio del proyecto. «Yahvé» conserva el nombre personal revelado, mientras que «el SEÑOR» lo sustituiría y «Jehová» no corresponde al estándar adoptado aquí.
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - había dado
  - concedió
  lexicon: HALOT
  rationale: El perfecto narrativo hebreo se expresa de manera natural con un pasado simple en español. «Dio» mantiene la relación verbal directa sin sobreinterpretar; «concedió» sería posible, pero introduce un matiz más interpretativo.
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - aceptación
  lexicon: HALOT
  rationale: En esta construcción social, חֵן indica benevolencia o buena disposición. «Favor» es la equivalencia española más precisa y evita cargar el término con un sentido más teológico que el contexto no exige.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el pueblo». «El pueblo» conserva esa formulación y deja implícito, como en el texto, que se trata del pueblo de Israel sin añadir una identificación no explícita.
- source_word: בְּעֵינֵי מִצְרַיִם
  english_pob_choice: in the sight of the Egyptians
  chosen_spanish: ante los ojos de los egipcios
  alternatives_spanish:
  - a los ojos de los egipcios
  - en la estimación de los egipcios
  lexicon: HALOT
  rationale: La locución idiomática hebrea se vierte de forma transparente con «ante los ojos de», que es natural en español bíblico y mantiene la imagen relacional de la expresión. «En la estimación de» explicaría el sentido, pero alejaría más la metáfora original.
- source_word: גַּם
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - También
  - Y
  lexicon: HALOT
  rationale: Aquí גַּם añade otra afirmación y marca transición discursiva. «Además» reproduce esa función aditiva con un registro claro y digno en español.
- source_word: הָאִישׁ מֹשֶׁה
  english_pob_choice: the man Moses
  chosen_spanish: el hombre Moisés
  alternatives_spanish:
  - Moisés, el hombre
  - el varón Moisés
  lexicon: HALOT
  rationale: Se conserva la expresión marcada del hebreo, con su énfasis en la humanidad/identificación de Moisés. «El hombre Moisés» reproduce la forma directa sin suavizarla; la alternativa «Moisés, el hombre» sería más explicativa que literal.
- source_word: גָּדוֹל מְאֹד
  english_pob_choice: very great
  chosen_spanish: muy grande
  alternatives_spanish:
  - muy importante
  - muy estimado
  lexicon: HALOT
  rationale: «Muy grande» mantiene la amplitud semántica de גדול מאוד, sin reducirla a prestigio, importancia o estima solamente. En español, esta opción conserva la fuerza del original y sugiere prominencia general.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - por toda la tierra de Egipto
  lexicon: HALOT
  rationale: Se preserva la formulación completa del hebreo. «Tierra de Egipto» refleja el sustantivo ארץ y evita aplanarlo a un simple «Egipto».
- source_word: בְּעֵינֵי עַבְדֵי פַרְעֹה
  english_pob_choice: in the sight of Pharaoh’s servants
  chosen_spanish: ante los ojos de los siervos de Faraón
  alternatives_spanish:
  - ante los ojos de los servidores de Faraón
  - ante los ojos de los oficiales de Faraón
  lexicon: HALOT
  rationale: עבדי פרעה significa literalmente «los siervos de Faraón». «Siervos» conserva la correspondencia léxica directa; «oficiales» explicitaría una posible función cortesana, pero no es la forma más literal.
- source_word: וּבְעֵינֵי הָעָם
  english_pob_choice: and in the sight of the people
  chosen_spanish: y ante los ojos del pueblo
  alternatives_spanish:
  - y ante los ojos de la gente
  - y a la vista del pueblo
  lexicon: HALOT
  rationale: Se mantiene la repetición del modismo y el término literal הָעָם. «Del pueblo» respeta la ambigüedad del hebreo, que no especifica aquí «egipcios» ni «la población común».
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se adopta la transliteración del Nombre divino conforme al estándar del proyecto y al criterio de transparencia textual. No se sustituye por un título ni se enmascara el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de הָעָם al final del versículo
  english_pob_reading: the people likely refers to the broader populace in Egypt, in contrast to Pharaoh’s servants.
  chosen_spanish_reading: el pueblo
  alternative_spanish_readings:
  - el pueblo egipcio
  - la gente
  rationale: Se conserva la literalidad del hebreo y su posible contraste contextual con los siervos de Faraón. La identificación precisa con la población egipcia queda como inferencia contextual, no como glosa en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Source transparency and contextual inference'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el paquete fuente hebreo y concuerda con el audit trail inglés: mantiene el Nombre divino como Yahvé, conserva la metáfora idiomática «ante los ojos de», refleja el énfasis de הָאִישׁ מֹשֶׁה y preserva la ambigüedad de הָעָם final. No se identifican revisiones aplicadas en el registro fuente, y el acuerdo del control cruzado fue alto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para יְהוָה.
  - Se usa «ante los ojos de» de manera consistente para בְּעֵינֵי.
  - «Siervos de Faraón» conserva la literalidad de עבדי פרעה.
  - «El pueblo» se deja sin especificar para respetar la ambigüedad del hebreo.
  - La puntuación y el orden de cláusulas siguen el paralelismo del original sin añadir contenido interpretativo.
