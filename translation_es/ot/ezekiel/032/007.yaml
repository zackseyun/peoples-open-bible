  text: וְ/כִסֵּיתִ֤י בְ/כַבּֽוֹתְ/ךָ֙ שָׁמַ֔יִם וְ/הִקְדַּרְתִּ֖י אֶת כֹּֽכְבֵי/הֶ֑ם שֶׁ֚מֶשׁ בֶּ/עָנָ֣ן אֲכַסֶּ֔/נּוּ וְ/יָרֵ֖חַ לֹא יָאִ֥יר אוֹרֽ/וֹ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/032/007.yaml
  text: When I extinguish you[a], I will cover the heavens and darken their stars; I will cover the sun with a cloud, and the moon will not give its light.
