translation:
  language: es
  text: Por eso, los judíos de las aldeas[a], que habitan en los poblados sin murallas, hacen del día catorce del mes de Adar un día de alegría, banquete y día festivo, y de envío de porciones[b], cada hombre a su prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los judíos en las ciudades sin murallas, que habitan en asentamientos abiertos».

      '
    reason: lexical_alternative
  - marker: b
    text: «Envío de porciones» probablemente se refiere al envío de raciones de comida o regalos para el banquete.
    reason: cultural_note
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la relación inferencial/resultativa del hebreo sin volver la frase artificial en español.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: HALOT
  rationale: En Ester designa al pueblo judío dentro del imperio persa; 'judíos' es el equivalente claro y contextual en español.
- source_word: הפרוזים
  english_pob_choice: of the villages
  chosen_spanish: de las aldeas
  alternatives_spanish:
  - de los lugares sin murallas
  - de las poblaciones abiertas
  lexicon: HALOT
  rationale: '''פרזים'' alude a asentamientos no fortificados; ''aldeas'' comunica bien la idea social-geográfica en español sin sonar técnico.'
- source_word: הַיֹּשְׁבִים בְּעָרֵי הַפְּרָזוֹת
  english_pob_choice: who live in the rural towns
  chosen_spanish: que habitan en las ciudades sin murallas
  alternatives_spanish:
  - que viven en las ciudades abiertas
  - que viven en los poblados sin murallas
  lexicon: HALOT
  rationale: Conserva la explicación appositiva y el contraste con ciudades fortificadas. 'Sin murallas' explicita el rasgo lexical central del pasaje.
- source_word: עֹשִׂים אֵת יוֹם אַרְבָּעָה עָשָׂר
  english_pob_choice: make the fourteenth day
  chosen_spanish: hacen del día catorce
  alternatives_spanish:
  - observan el día catorce
  - celebran el día catorce
  lexicon: HALOT
  rationale: '''Hacen de'' sigue de cerca la construcción hebrea con יום + עשה y preserva el valor de instituir/convertir el día en jornada festiva.'
- source_word: לְחֹדֶשׁ אֲדָר
  english_pob_choice: of the month of Adar
  chosen_spanish: del mes de Adar
  alternatives_spanish:
  - en el mes de Adar
  lexicon: HALOT
  rationale: Formula dativa normal en español, fiel a la relación genitiva del hebreo.
- source_word: שִׂמְחָה
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: '''Alegría'' comunica el tono festivo con naturalidad; evita un español demasiado arcaico sin perder el matiz celebrativo.'
- source_word: וּמִשְׁתֶּה
  english_pob_choice: feasting
  chosen_spanish: banquete
  alternatives_spanish:
  - festín
  - comilona
  lexicon: HALOT
  rationale: El sustantivo refiere a una comida festiva; 'banquete' es el equivalente sobrio y digno en español.
- source_word: וְיוֹם טוֹב
  english_pob_choice: a holiday
  chosen_spanish: día festivo
  alternatives_spanish:
  - fiesta
  - día de fiesta
  lexicon: HALOT
  rationale: '''Día festivo'' conserva el valor de día señalado para celebración sin introducir una equivalencia cultural más específica de la que el hebreo exige.'
- source_word: וּמִשְׁלוֹחַ מָנוֹת
  english_pob_choice: of sending portions
  chosen_spanish: y de envío de porciones
  alternatives_spanish:
  - y de enviar porciones
  - y de mandar porciones
  lexicon: HALOT
  rationale: Mantiene la estructura nominal del hebreo. 'Porciones' reproduce el término básico sin especificar más allá de lo que el texto dice.
- source_word: אִישׁ לְרֵעֵהוּ
  english_pob_choice: each man to his neighbor
  chosen_spanish: cada uno a su prójimo
  alternatives_spanish:
  - cada hombre a su vecino
  - uno a otro
  lexicon: HALOT
  rationale: Preserva el distributivo singular con una forma natural en español. 'Prójimo' funciona bien para רֵעַ en un marco comunitario, sin reducirlo a mera proximidad espacial.
theological_decisions:
- issue: Expresión distributiva masculina אִישׁ לְרֵעֵהוּ
  english_pob_reading: each man to his neighbor
  chosen_spanish_reading: cada uno a su prójimo
  alternative_spanish_readings:
  - cada hombre a su vecino
  - uno a otro
  rationale: El hebreo usa un singular masculino distributivo. En español, 'cada uno' preserva la distribución sin marcar solo varones en la referencia global, mientras sigue siendo fiel a la forma idiomática del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto hebreo y el audit trail inglés; no se documentan revisiones sustantivas recientes. Se mantuvo el contraste entre asentamientos sin murallas y la acción festiva, con una formulación española natural y auditable.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece.
  - '''Adar'' se conserva como nombre propio transliterado estándar.'
  - Se mantuvo un registro neutral y digno, apto para lectura eclesial general.
  - '''Prójimo'' se eligió por claridad semántica en el cierre distributivo.'
