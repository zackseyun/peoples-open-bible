base_translation:
  language: en
  yaml_path: translation/ot/isaiah/021/014.yaml
  text: Bring water to meet the thirsty[a]; O inhabitants of the land of Tema[b], meet the fugitive with bread.
  footnotes:
  - marker: a
    text: Or 'meet the fugitive with bread for him.' The Hebrew phrase may mean either accompanying the meeting with his bread/provisions or supplying bread to him.
    reason: lexical_alternative
  - marker: b
    text: Tema was an Arabian oasis/region associated with caravan routes.
    reason: cultural_note
