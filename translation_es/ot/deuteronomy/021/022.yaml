translation:
  language: es
  text: Y si en un hombre hay un pecado digno de muerte[a], y se le da muerte, y lo cuelgas en un árbol[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «merecedor de muerte» o «bajo sentencia de muerte». La frase hebrea dice literalmente «un pecado/juicio de muerte».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en una estaca». El hebreo dice literalmente «en un árbol».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Y cuando
  lexicon: HALOT
  rationale: La combinación condicional conserva la apertura casuística del hebreo; en español, «Y si» reproduce bien el enlace discursivo sin rigidizar la temporalidad.
- source_word: יִהְיֶה
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - llega a haber
  - se encuentra
  lexicon: HALOT
  rationale: El verbo expresa existencia o estado, no solo futuro; «hay» comunica con naturalidad la construcción legal hebrea de existencia de un caso.
- source_word: בְ/אִישׁ
  english_pob_choice: in a man
  chosen_spanish: en un hombre
  alternatives_spanish:
  - en alguien
  - en una persona
  lexicon: HALOT
  rationale: Se preserva el sujeto masculino singular del texto fuente y la preposición idiomática «en», manteniendo la literalidad necesaria del caso legal.
- source_word: חֵטְא
  english_pob_choice: a sin
  chosen_spanish: un pecado
  alternatives_spanish:
  - una ofensa
  - un delito
  lexicon: HALOT
  rationale: «Pecado» conserva mejor la carga moral-legal del hebreo que una simple categoría civil como «delito».
- source_word: מִשְׁפַּט מָוֶת
  english_pob_choice: deserving death
  chosen_spanish: digno de muerte
  alternatives_spanish:
  - merecedor de muerte
  - bajo sentencia de muerte
  - que merece morir
  lexicon: HALOT
  rationale: La expresión hebrea literalmente apunta a un «juicio de muerte»; en español, «digno de muerte» mantiene la valoración capital sin convertirla en un tecnicismo procesal más específico de lo que el texto exige.
- source_word: וְ/הוּמָת
  english_pob_choice: and he is put to death
  chosen_spanish: y es muerto
  alternatives_spanish:
  - y es ejecutado
  - y lo matan
  lexicon: HALOT
  rationale: Se conserva la pasiva del hebreo. «Es muerto» suena sobrio y legal; aunque menos idiomático que «es ejecutado», evita introducir una precisión interpretativa ajena al verbo.
- source_word: וְ/תָלִיתָ
  english_pob_choice: and you hang
  chosen_spanish: y tú lo cuelgas
  alternatives_spanish:
  - y lo cuelgas
  - y lo suspendes
  lexicon: HALOT
  rationale: El verbo תלה significa colgar/suspender. «Lo cuelgas» mantiene el acto verbal de forma directa y equivalente en español.
- source_word: אֹת֖/וֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El pronombre de objeto directo se vierte con el clítico español «lo», que es la forma más natural y clara en este contexto.
- source_word: עַל עֵץ
  english_pob_choice: on a tree
  chosen_spanish: en un árbol
  alternatives_spanish:
  - sobre un árbol
  - en un madero
  - sobre un madero
  lexicon: HALOT
  rationale: Se conserva el sustantivo básico «árbol», como hace la lectura inglesa auditada, evitando estrecharlo prematuramente a «madero» o «estaca» sin un apoyo contextual más fuerte.
theological_decisions:
- issue: Sujeto legal masculino singular
  english_pob_reading: a man
  chosen_spanish_reading: en un hombre
  alternative_spanish_readings:
  - en alguien
  - en una persona
  rationale: El hebreo usa אישׁ en singular masculino dentro de una fórmula legal; se mantiene esa referencia sin neutralizarla, siguiendo la política de precisión gramatical del proyecto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Causalidad legal de la pena capital
  english_pob_reading: deserving death
  chosen_spanish_reading: digno de muerte
  alternative_spanish_readings:
  - merecedor de muerte
  - bajo sentencia de muerte
  - condenado a muerte
  rationale: La frase hebrea admite el matiz de «sentencia/juicio de muerte», pero el POB inglés optó por una equivalencia semántica breve. En español, «digno de muerte» conserva ese valor sin imponer un proceso judicial más explícito.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: 'Objeto de la ejecución: עַל עֵץ'
  english_pob_reading: on a tree
  chosen_spanish_reading: en un árbol
  alternative_spanish_readings:
  - sobre un árbol
  - en un madero
  - sobre un madero
  - en una estaca
  rationale: Se mantiene la literalidad de «árbol» para preservar el eco intertextual del hebreo y no cerrar la interpretación del instrumento de ejecución más allá de lo que el texto dice.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El análisis de revisión indica alta concordancia con el testimonio fuente y sin cambios necesarios; esta versión española sigue la misma lectura básica y mantiene las alternativas léxicas documentadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva la distinción entre el valor moral de חֵטְא («pecado») y la formula legal capital מִשְׁפַּט מָוֶת.
  - «Árbol» se usa de manera literal; no se sustituye por «madero» o «estaca» en el texto principal.
  - La pasiva «es muerto» refleja de cerca el hebreo, aunque suene más sobria que una reformulación idiomática como «es ejecutado».
