- source_word: መልአክ
  chosen: angel
  alternatives:
  - prince
  - messenger
  lexicon: Leslau
  rationale: The Ge'ez 'mal'ak' means 'angel' or 'messenger'. While previous translations
    often render this as 'prince Mastema', 'angel' is the direct and standard translation
    of the term in this context.
- source_word: ተዐግሠ
  chosen: restrained
  alternatives:
  - shut off
  - held back
  lexicon: Leslau
  rationale: The verb 'tagassa' in the passive/reflexive means 'to be restrained'
    or 'to be withheld', fitting the context of Mastema being prevented from pursuing
    Israel.
