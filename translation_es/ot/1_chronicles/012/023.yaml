translation:
  language: es
  text: Porque día tras día venían a David para ayudarlo, hasta que hubo un gran campamento, como el campamento de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como el campamento de Dios», «como un campamento divino» o «como un campamento celestial». El hebreo mantiene la expresión breve y evocadora.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en verdad
  - Ya que
  lexicon: HALOT
  rationale: Introduce una explicación conectada con el contexto narrativo; en español, 'porque' expresa bien la relación explicativa sin forzar un valor causal más fuerte que el del hebreo en este versículo.
- source_word: לְעֶת יוֹם בְּיוֹם
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - de día en día
  - día por día
  - de un día a otro
  lexicon: HALOT
  rationale: El giro hebreo indica repetición continua; 'día tras día' es natural en español y conserva el sentido iterativo.
- source_word: יָבֹאוּ
  english_pob_choice: came
  chosen_spanish: venían
  alternatives_spanish:
  - vinieron
  - seguían viniendo
  - iban
  lexicon: HALOT
  rationale: El imperfecto narra acción repetida en el pasado; 'venían' conserva esa continuidad mejor que un pretérito puntual.
- source_word: עַל דָּוִיד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - sobre David
  - contra David
  lexicon: HALOT
  rationale: Con un verbo de movimiento y el complemento final 'para ayudarlo', la preposición es direccional, no hostil.
- source_word: לְעָזְרוֹ
  english_pob_choice: to help him
  chosen_spanish: para ayudarlo
  alternatives_spanish:
  - para socorrerlo
  - para asistirlo
  - para darle ayuda
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa propósito; 'para ayudarlo' es la forma más directa y fiel en español.
- source_word: עַד
  english_pob_choice: until there was
  chosen_spanish: hasta que hubo
  alternatives_spanish:
  - hasta
  - hasta llegar a haber
  lexicon: HALOT
  rationale: La partícula marca el alcance del proceso hasta su resultado; 'hasta que hubo' completa naturalmente la oración en español y refleja el efecto acumulativo.
- source_word: לְמַחֲנֶה גָדֹול
  english_pob_choice: a great camp
  chosen_spanish: un campamento grande
  alternatives_spanish:
  - un gran campamento
  - un ejército acampado
  - un campamento numeroso
  lexicon: HALOT
  rationale: מַחֲנֶה puede significar campamento o campamento militar; 'campamento' preserva la imagen concreta, y 'grande' refleja גָדֹול sin sobrerinterpretar.
- source_word: כְּמַחֲנֵה אֱלֹהִים
  english_pob_choice: like the camp of God
  chosen_spanish: como el campamento de Dios
  alternatives_spanish:
  - como el campamento de Yahvé
  - como un campamento divino
  - como el campamento celestial
  lexicon: HALOT
  rationale: Se conserva la estructura comparativa y el genitivo hebreo. 'De Dios' mantiene la fuerza y la ambigüedad evocativa del hebreo sin reducirla a un adjetivo.
theological_decisions:
- issue: Sentido de אֱלֹהִים en la comparación final
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - divino
  - celestial
  - de Dios
  rationale: La traducción con 'Dios' preserva el valor del genitivo hebreo y deja abierta la resonancia de una multitud inmensa o impresionante, sin resolverla prematuramente.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La revisión más reciente del POB en inglés corrigió 'men came' por 'they came' porque el hebreo no añade un sustantivo explícito; por eso el español también evita introducir 'hombres' y mantiene un sujeto implícito en la forma verbal.
  spanish_consistency_notes:
  - He mantenido 'Dios' en la comparación final para preservar el paralelismo con el audit trail inglés y la ambigüedad evocativa del hebreo.
  - Usé 'campamento' para מַחֲנֶה por ser más natural en español que 'campo' o 'cuartel' y por conservar la imagen militar/congregada del contexto.
  - La forma verbal plural e implícita de 'venían' evita añadir un sujeto inexistente en el hebreo, en línea con la revisión inglesa.
