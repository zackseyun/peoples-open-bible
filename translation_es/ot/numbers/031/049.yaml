review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador refleja bien el hebreo y la auditoría inglesa: «han hecho un recuento», «los hombres de guerra», «bajo nuestro mando» y «no falta ni un solo hombre» corresponden adecuadamente a los modismos y al sentido del texto. Sin embargo, עֲבָדֶיךָ aquí fue documentado en la POB inglesa como tratamiento deferencial de oficiales a Moisés, no como estatus servil literal; por eso «tus esclavos» no preserva fielmente la decisión contextual del proyecto.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Tus esclavos» suena demasiado literal y semánticamente desviado en este contexto cortesano-militar. Además, la nota [a] está anclada en «esclavos», pero su contenido explica otro modismo distinto («han levantado la cabeza»), de modo que el anclaje de nota es incorrecto. La nota [b] es comprensible, aunque «carga» no es una alternativa natural aquí; «responsabilidad» o «custodia» funciona mejor.
  glossary_alignment: 'No hay conflicto con términos teológicos mayores. La cuestión principal es la política contextual para עבד: aunque el proyecto normalmente favorece «esclavo» cuando el inglés elige «slave», aquí la auditoría inglesa documentó explícitamente la excepción contextual «your servants». En español corresponde «tus siervos» o «tus servidores»; «tus siervos» encaja mejor con el registro bíblico y la deferencia al dirigirse a Moisés.'
  issues:
  - severity: high
    issue: «Tus esclavos» para עֲבָדֶיךָ
    rationale: La auditoría inglesa justifica «your servants» por tratarse de un tratamiento deferencial de oficiales ante Moisés, no de una afirmación de esclavitud literal. «Esclavos» altera el sentido pragmático y endurece indebidamente el texto.
  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado
    rationale: El marcador [a] aparece sobre «esclavos», pero la nota explica el modismo «han levantado la cabeza», es decir, נָשְׂאוּ אֶת רֹאשׁ. Debe anclarse en la frase de recuento, no en «siervos/esclavos».
  - severity: medium
    issue: 'Alternativa poco natural en nota [b]: «nuestra carga»'
    rationale: «Que están en nuestra carga» no es español natural en este contexto. La propia auditoría inglesa ofrece «in our charge», que en español se expresa mejor como «a nuestro cargo» o «bajo nuestra responsabilidad».
