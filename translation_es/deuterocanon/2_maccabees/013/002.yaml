    issue: La nota [a] está anclada en «Lisias» pero explica «once miríadas».
    rationale: Las notas deben aparecer en la palabra o frase relevante del texto. El anclaje actual induce a error y viola la disciplina de marcadores.
  - severity: medium
    issue: La nota [b] combina alternativas para dos expresiones griegas bajo un anclaje insuficientemente preciso.
    rationale: «El regente» corresponde a τὸν ἐπίτροπον, mientras que «el encargado/supervisor de los asuntos» corresponde a καὶ ἐπὶ τῶν πραγμάτων. Conviene anclar la nota en la frase completa de cargos para que la alternativa sea exacta.
  - severity: low
    issue: «Carros guadañeros» suena menos natural que «carros con guadañas».
    rationale: Aunque semánticamente defendible, la opción revisada comunica mejor δρεπανηφόρα a lectores hispanos generales sin perder precisión.
  - severity: low
    issue: Coma innecesaria antes de la conjunción final en la enumeración.
    rationale: En español estándar no se requiere coma antes de «y» en esta lista.
