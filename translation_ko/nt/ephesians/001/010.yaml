id: EPH.1.10
reference: Ephesians 1:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς οἰκονομίαν τοῦ πληρώματος τῶν καιρῶν, ἀνακεφαλαιώσασθαι τὰ πάντα ἐν τῷ Χριστῷ, τὰ ἐπὶ τοῖς οὐρανοῖς καὶ τὰ ἐπὶ τῆς γῆς· ἐν αὐτῷ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/001/010.yaml
  text: for the administration of the fullness of the times, to sum up all things in the Messiah—the things in the heavens and the things on the earth—in him,
translation:
  language: ko
  text: 곧 때가 차매 그분의 경륜[a]에 따라, 하늘에 있는 것과 땅에 있는 것, 모든 것을 메시아 안에서 머리 되시는 분 안에서 통일되게[b] 하려 하심이니, 곧 그분 안에서—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: οἰκονομία는 가정·집안의 경영을 어원으로 하며 「경륜」(하나님의 구원 운영) 또는 「관리」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: ἀνακεφαλαιόομαι는 「머리(κεφαλή) 아래로 모두 모아 통일하다」를 의미한다. 본 번역은 글로서리 정책에 따라 「머리 되시는 분 안에서 통일되다」로 풀어 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκονομίαν τοῦ πληρώματος τῶν καιρῶν
  english_pob_choice: the administration of the fullness of the times
  chosen_korean: 때가 차매 그분의 경륜
  alternatives_korean:
  - 시기들의 충만함을 위한 경륜
  - 때가 충만할 때의 경영
  lexicon: BDAG
  rationale: 직역은 무거우므로 한국 교회 전통의 「때가 차매」(가 5:4 등)와 「경륜」을 결합해 흐름을 살린다.
- source_word: ἀνακεφαλαιώσασθαι τὰ πάντα ἐν τῷ Χριστῷ
  english_pob_choice: to sum up all things in the Messiah
  chosen_korean: 만물을 메시아 안에서 머리 되시는 분 안에서 통일되게
  alternatives_korean:
  - 만물을 메시아 안에서 한 머리 아래 모이게
  - 만물을 메시아 안에서 한데 모으게
  lexicon: BDAG
  rationale: 글로서리 정책에 따라 「머리 되시는 분 안에서 통일되다」로 풀어 옮기되, 한국어 가독성을 위해 본 절은 「만물을 메시아 안에서 머리 되시는 분 안에서 통일되게」로 다듬는다.
