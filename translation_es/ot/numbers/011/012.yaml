    text: Or 'as a nurse carries the suckling.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew has singular 'him' and 'his fathers,' treating 'people' as a collective singular; English could also render 'them' and 'their fathers.'
    reason: alternative_reading
