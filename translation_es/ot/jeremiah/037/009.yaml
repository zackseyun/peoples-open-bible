base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/037/009.yaml
  text: 'Thus says Yahweh: Do not deceive yourselves[a], saying[c][b], ‘The Chaldeans will surely go away from us,’ for they will not go away.'
  footnotes:
  - marker: a
    text: Or, 'Do not delude yourselves.' The Hebrew idiom literally involves 'your souls,' but here it warns against self-deception or false confidence.
    reason: lexical_alternative
  - marker: b
    text: Or, 'The Chaldeans will certainly depart from us.' The Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: c
    text: '''Chaldeans'' refers to the Babylonian forces.'
    reason: cultural_note
