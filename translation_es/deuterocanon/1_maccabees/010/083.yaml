translation:
  language: es
  text: Y la caballería fue dispersada en la llanura, y huyeron a Azoto, y entraron en Bet-dagón[a], el templo de su ídolo, para salvarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «entraron en Bet-dagón, su ídolo». La aposición griega es muy condensada; el sentido es que entraron en el santuario asociado con su ídolo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ ἵππος
  english_pob_choice: the cavalry
  chosen_spanish: la caballería
  alternatives_spanish:
  - los hombres de a caballo
  - la caballería montada
  lexicon: LSJ
  rationale: Aunque la forma griega es singular, en contexto militar funciona colectivamente para tropa montada. ‘Caballería’ conserva ese sentido colectivo en español y evita el falso singular ‘caballo’.
- source_word: ἐσκορπίσθη
  english_pob_choice: was scattered
  chosen_spanish: fue dispersada
  alternatives_spanish:
  - fue desbandada
  - fue esparcida
  lexicon: LSJ
  rationale: El pasivo indica que la fuerza montada quedó deshecha y repartida en el campo. ‘Fue dispersada’ es natural en español y mantiene el valor pasivo.
- source_word: ἐν τῷ πεδίῳ
  english_pob_choice: in the plain
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en el llano
  - en el campo
  lexicon: LSJ
  rationale: πέδιον denota una zona abierta y nivelada. ‘Llanura’ comunica mejor el escenario militar que ‘campo’, que en español puede sonar más genérico.
- source_word: ἔφυγον εἰς Ἄζωτον
  english_pob_choice: they fled to Azotus
  chosen_spanish: huyeron a Azoto
  alternatives_spanish:
  - huyeron hacia Azoto
  - huyeron a Ashdod
  lexicon: LSJ
  rationale: Se conserva la forma griega del topónimo, como en el texto fuente, en vez de sustituirla por la forma hebrea. ‘Huyeron a’ expresa con claridad el movimiento de escape.
- source_word: Βηθδαγὼν
  english_pob_choice: Beth-dagon
  chosen_spanish: Bet-dagón
  alternatives_spanish:
  - Beth-dagón
  - casa de Dagón
  lexicon: LSJ
  rationale: Como nombre propio, se translitera al español con ortografía naturalizada. El guion ayuda a ver el compuesto semítico sin convertirlo en paráfrasis.
- source_word: τὸ εἴδωλον αὐτῶν
  english_pob_choice: their idol temple
  chosen_spanish: su ídolo
  alternatives_spanish:
  - el templo de su ídolo
  - su santuario idolátrico
  lexicon: LSJ
  rationale: 'La apposición griega es comprimida: literalmente dice ‘su ídolo’, mientras el contexto muestra que se trata del lugar cultual asociado a ese ídolo. En el texto principal se deja la frase breve y se explica la implicación cultual en la nota.'
- source_word: τοῦ σωθῆναι
  english_pob_choice: to save themselves
  chosen_spanish: para salvarse
  alternatives_spanish:
  - para ser salvados
  - para ponerse a salvo
  lexicon: LSJ
  rationale: El infinitivo articular expresa finalidad. ‘Para salvarse’ transmite con naturalidad la intención práctica y reflexiva del movimiento.
theological_decisions:
- issue: Valor peyorativo de εἴδωλον en contexto cultual
  english_pob_reading: their idol temple
  chosen_spanish_reading: su ídolo
  alternative_spanish_readings:
  - su santuario idolátrico
  - el templo de su ídolo
  - su ídolo, es decir, el lugar de su culto
  rationale: El griego no usa un término neutral para la divinidad, sino εἴδωλον, con carga polémica. El español principal conserva esa descalificación en ‘ídolo’; la nota aclara que la escena implica el recinto asociado al culto.
  doctrine_reference: Principio de primacía del texto original y preservación de la carga léxica del término griego.
translation_notes:
  revision_awareness: Se revisó la propuesta inglesa de ‘idol temple’ y se optó por una solución más cercana al griego en el cuerpo del texto, dejando la explicitación cultual en nota para no sobreinterpretar la aposición comprimida. También se mantuvo el topónimo griego Azoto, coherente con la fuente inmediata.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por defecto en esta serie cuando aparezca el nombre divino; aquí no aplica.
  - Se prefirió ‘caballería’ como sustantivo colectivo militar, coherente con la fuerza montada del contexto.
  - Se mantuvo la forma de topónimo griego ‘Azoto’ y la transliteración ‘Bet-dagón’ para conservar el color textual del testimonio helenístico.
