translation:
  language: es
  text: Moisés escribió este cántico ese día y lo enseñó a los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o 'los hijos de Israel'. El hebreo dice 'los hijos de Israel', una designación pactual estándar para el pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - lo anotó
  - lo escribió
  lexicon: HALOT כתב
  rationale: El verbo narrativo פשוט כתב en qal wayyiqtol pide en español un verbo básico y natural. 'Escribió' reproduce con claridad la acción de poner por escrito sin añadir matices ajenos; 'anotó' sería demasiado débil o coloquial.
- source_word: הַשִּׁירָה הַזֹּאת
  english_pob_choice: this song
  chosen_spanish: este cántico
  alternatives_spanish:
  - esta canción
  - este poema
  lexicon: HALOT שִׁירָה
  rationale: En contexto legal-covenantal, שִׁירָה puede referirse a una composición solemne. 'Cántico' suena más digno y bíblico en español que 'canción', y conserva el carácter literario de la pieza; 'poema' sería menos directo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese mismo día
  - en ese día
  lexicon: HALOT יום
  rationale: '''En aquel día'' mantiene la referencia temporal deíctica del hebreo y es idiomático en español bíblico contemporáneo. ''Ese mismo día'' aclara, pero añade una especificación no explícita.'
- source_word: וַיְלַמְּדָהּ
  english_pob_choice: taught it
  chosen_spanish: lo enseñó
  alternatives_spanish:
  - se lo enseñó
  - la enseñó
  lexicon: HALOT למד (pi'el)
  rationale: El sufijo femenino singular retoma 'la canción/cántico'. En español, el pronombre objeto directo masculino 'lo' se usa de manera gramatical para 'cántico'/'cántico' en uso genérico textual; 'la' chocaría con la forma elegida en la oración castellana, y 'se lo enseñó' introduce un dativo no marcado por el hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT בן
  rationale: Se conserva la expresión filial y corporativa del hebreo sin neutralizarla a 'pueblo'. 'Hijos de Israel' es una fórmula reconocible en español bíblico y corresponde bien al valor covenantal señalado por el POB en inglés. 'Israelitas' sería más interpretativo y borra la forma del original.
theological_decisions:
- issue: Expresión corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Israel
  rationale: La lectura del POB preserva la forma masculina plural del hebreo por fidelidad lexical y por la política de precisión de género. En español, 'los hijos de Israel' mantiene esa forma y sigue siendo comprensible como designación del pueblo del pacto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Naturaleza del discurso 'this song' en contexto de alianza
  english_pob_reading: this song
  chosen_spanish_reading: este cántico
  alternative_spanish_readings:
  - esta canción
  - este poema
  rationale: El contexto de Deuteronomio presenta una composición formal destinada a memorizarse y transmitirse, no una 'canción' en sentido moderno trivial. 'Cántico' respeta el registro solemne y litúrgico sin perder la referencia a una composición cantada.
  doctrine_reference: Uso contextual de שִׁירָה en Deuteronomio 31
- issue: Pronombre objeto para el cántico en 'taught it'
  english_pob_reading: taught it
  chosen_spanish_reading: lo enseñó
  alternative_spanish_readings:
  - la enseñó
  - se lo enseñó
  rationale: El hebreo retoma la composición como objeto directo. En español, al elegir 'cántico' como sustantivo masculino, 'lo' ofrece concordancia natural en la cadena de referencia; no hace falta explicitar destinatario porque el complemento 'a los hijos de Israel' ya lo expresa.
  doctrine_reference: Gramática del referente y cohesión textual
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: no se observan revisiones posteriores ni cambios textuales. Se ha conservado la secuencia narrativa simple, la designación corporal ''hijos de Israel'' y el carácter solemne de שִׁירָה mediante ''cántico''.'
  spanish_consistency_notes:
  - Se mantuvo 'Moisés' como nombre propio estándar.
  - Se prefirió 'cántico' frente a 'canción' para conservar registro bíblico elevado.
  - La nota al pie se ancla en 'hijos de Israel' para reflejar la alternativa lexical documentada en el POB inglés.
  - El tiempo verbal pasado perfecto simple ('escribió', 'enseñó') refleja la cadena narrativa wayyiqtol del hebreo.
