revisions:
- from: ¡Líbrame, por favor, de la mano de mi hermano, de la mano de Esaú, porque le tengo miedo; no sea que venga y me hiera, madre con hijos[a].
  to: Líbrame, por favor, de la mano de mi hermano, de la mano de Esaú, porque le tengo miedo; no sea que venga y me hiera, madre con hijos[a].
  rationale: Se elimina la exclamación para evitar una puntuación defectuosa y una intensidad añadida no exigida por el hebreo; se conserva la estructura y el sentido del original. Se mantiene «madre con hijos» como la mejor solución española breve y fiel para el modismo אֵם עַל בָּנִים, con una nota que preserva la alternativa y aclara el hebraísmo.
  reviewer_model: gpt-5.4
