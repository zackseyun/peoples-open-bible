  yaml_path: translation/ot/deuteronomy/020/002.yaml
  text: And when you draw near to the battle[a], the priest shall come forward and speak to the people[b],
  footnotes:
  - marker: a
    text: Or 'to the war.' The Hebrew מִלְחָמָה can denote war generally or a specific battle; here the immediate approach to combat favors 'battle.'
    reason: lexical_alternative
  - marker: b
    text: '''The people'' here refers to the assembled Israelite force, but the Hebrew retains the broader term ''people'' rather than a narrower military label such as ''troops.'''
    reason: cultural_note
