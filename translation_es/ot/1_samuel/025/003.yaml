translation:
  language: es
  text: El nombre de aquel hombre era Nabal[a], y el nombre de su esposa era Abigail. La mujer era inteligente y de hermosa apariencia, pero el hombre era áspero y malo en sus tratos; era calebita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo probablemente significa «calebita», es decir, miembro del clan de Caleb; la forma escrita es inusual, y algunos señalan la posibilidad de leerla de otro modo.
    reason: textual_variant
lexical_decisions:
- source_word: נָבָל
  english_pob_choice: Nabal
  chosen_spanish: Nabal
  alternatives_spanish:
  - Nabal
  lexicon: HALOT
  rationale: Es nombre propio; se conserva la transliteración estándar, como en el texto inglés auditado.
- source_word: אֲבִגָיִל
  english_pob_choice: Abigail
  chosen_spanish: Abigail
  alternatives_spanish:
  - Abigail
  lexicon: HALOT
  rationale: Es nombre propio; se conserva la transliteración estándar.
- source_word: טוֹבַת שֶׂכֶל
  english_pob_choice: intelligent
  chosen_spanish: inteligente
  alternatives_spanish:
  - de buen entendimiento
  - discreta
  - discernidora
  lexicon: HALOT
  rationale: La frase literalmente expresa buena comprensión o buen sentido. «Inteligente» comunica de forma natural en español contemporáneo la idea de discernimiento mental positiva sin perder la fuerza laudatoria.
- source_word: וִיפַת תֹּאַר
  english_pob_choice: beautiful in appearance
  chosen_spanish: hermosa en su apariencia
  alternatives_spanish:
  - hermosa
  - de hermosa figura
  lexicon: HALOT
  rationale: La construcción apunta a belleza física o de forma visible. «Hermosa en su apariencia» conserva el matiz concreto y sigue de cerca la estructura del hebreo sin sonar excesivamente rígido.
- source_word: קָשֶׁה
  english_pob_choice: harsh
  chosen_spanish: duro
  alternatives_spanish:
  - áspero
  - severo
  - rudo
  lexicon: HALOT
  rationale: En este contexto describe un carácter difícil o áspero. «Duro» es natural en español y mantiene la idea interpersonal del término, aunque «áspero» o «severo» también son posibles.
- source_word: רַע מַעֲלָלִים
  english_pob_choice: evil in his dealings
  chosen_spanish: malo en sus acciones
  alternatives_spanish:
  - malo en sus obras
  - malvado en su conducta
  - malo en sus tratos
  lexicon: HALOT
  rationale: מַעֲלָלִים se refiere a obras, acciones o conducta. «Malo en sus acciones» conserva el valor moral y el campo semántico de conducta/obrar, sin forzar una paráfrasis amplia.
- source_word: כְּלָבִי / כָּלֵב
  english_pob_choice: a Calebite
  chosen_spanish: de la casa de Caleb
  alternatives_spanish:
  - calebita
  - de Caleb
  lexicon: HALOT
  rationale: El texto inglés preserva la lectura tradicional y nota la forma escrita inusual. En español, «de la casa de Caleb» explicita el sentido genealógico/clánico de manera auditable y evita un término etnónimo menos transparente, mientras mantiene la referencia a Caleb.
theological_decisions:
- issue: Lectura de וְהוּא כְּלָבוֹ / forma textual final
  english_pob_reading: he was a Calebite
  chosen_spanish_reading: él era de la casa de Caleb
  alternative_spanish_readings:
  - él era un calebita
  - podría leerse de otro modo según la forma escrita
  rationale: Este es un asunto textual y léxico, no doctrinal. La lectura tradicional entiende una referencia gentilicia o clánica a Caleb. La redacción española conserva ese sentido y, al mismo tiempo, evita resolver silenciosamente la rareza gráfica del hebreo.
  doctrine_reference: 'Translation philosophy #3 (preserve genuine ambiguity where relevant)'
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantiene sin cambios en esta revisión; la decisión clave sigue siendo la misma: traducir el último miembro como referencia clánica a Caleb y preservar la nota sobre la forma escrita inusual.'
  spanish_consistency_notes:
  - Se conserva la transliteración de nombres propios para Nabal y Abigail.
  - «Inteligente» y «hermosa en su apariencia» siguen el equilibrio entre precisión y naturalidad del texto auditado.
  - «Duro» y «malo en sus acciones» mantienen el juicio moral y conductual del hebreo.
  - La nota al pie mantiene la incertidumbre textual sobre el final del versículo sin eliminarla.
