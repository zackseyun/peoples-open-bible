  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y la línea del POB inglés en casi todo el versículo: la implicación activa en el mal, la ironía de «para hacerlo bien», la tríada príncipe/juez/grande, y la imagen final de corrupción coordinada. Sin embargo, en «y el juez juzga por soborno» el texto principal toma una de las expansiones posibles de una cláusula hebrea deliberadamente elíptica (וְהַשֹּׁפֵט בַּשִּׁלּוּם), mientras que el POB inglés preserva mejor esa tersura con «the judge is for a bribe» y relega las expansiones a nota. Conviene acercar el español principal a esa elipsis sin volverlo ininteligible.'
