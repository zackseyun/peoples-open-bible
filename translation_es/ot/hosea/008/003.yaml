translation:
  language: es
  text: Israel ha rechazado el bien[a]; un enemigo lo perseguirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Israel ha desechado el bien». El hebreo también puede entenderse de manera más literal como «el bien» en vez de «lo bueno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנַח
  english_pob_choice: has rejected
  chosen_spanish: ha rechazado
  alternatives_spanish:
  - ha desechado
  - ha arrojado de sí
  - ha abandonado
  lexicon: HALOT
  rationale: El verbo expresa rechazo deliberado o repudio; «ha rechazado» conserva esa fuerza en español moderno sin suavizarla demasiado.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: nombre propio
  rationale: Es el nombre propio del sujeto personificado; mantenerlo sin expansión respeta la forma breve del hebreo.
- source_word: טוֹב
  english_pob_choice: the good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bien moral
  - la bondad
  lexicon: HALOT
  rationale: Aquí el adjetivo funciona sustantivado. «El bien» reproduce mejor esa sustantivación que una paráfrasis más larga, y conserva la amplitud moral y religiosa del término.
- source_word: אוֹיֵב
  english_pob_choice: an enemy
  chosen_spanish: un enemigo
  alternatives_spanish:
  - el enemigo
  - un adversario
  - un rival hostil
  lexicon: HALOT
  rationale: El singular es genérico y no identifica a un enemigo específico; «un enemigo» refleja bien esa ausencia de artículo y el carácter amenazante.
- source_word: יִרְדְּפוֹ
  english_pob_choice: will pursue him
  chosen_spanish: lo perseguirá
  alternatives_spanish:
  - le perseguirá
  - lo seguirá persiguiendo
  - lo acosará
  lexicon: HALOT
  rationale: El imperfecto expresa consecuencia futura; el sufijo singular masculino se mantiene con «lo», preservando la personificación de Israel como sujeto singular.
theological_decisions:
- issue: Número y referencia del sufijo pronominal en יִרְדְּפוֹ
  english_pob_reading: 'Rendered singular: ''will pursue him,'' treating Israel as a personified singular nation.'
  chosen_spanish_reading: 'Se mantiene el singular: «lo perseguirá», entendiendo a Israel como nación personificada.'
  alternative_spanish_readings:
  - los perseguirá
  - lo perseguirán
  rationale: El hebreo usa sufijo singular masculino, y la personificación de Israel como entidad singular debe conservarse. En español, «lo» preserva esa gramática sin convertir el texto en plural.
  doctrine_reference: Consistencia con la lectura gramatical del hebreo y con la política de preservar referencias singulares personificadas cuando el original las usa.
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «the good» frente a «what is good» para rendir טוֹב de forma más directa; por eso se mantuvo en español una sustantivación breve y formal («el bien»), en vez de expandir a una perífrasis.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o una sustitución litúrgica no pertinente; el verso no contiene el tetragrámaton.
  - Se preservó el singular pronominal de Israel para reflejar la personificación del hebreo.
  - «El bien» sigue la decisión auditada de tratar טוֹב como sustantivo, no como adjetivo atributivo.
