base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/035/015.yaml
  text: 'As you rejoiced over the inheritance of the house of Israel because it was desolate[a], so I will do to you: desolate you will be, Mount Seir, and all Edom, all of it[b]. Then they will know that I am Yahweh.'
  footnotes:
