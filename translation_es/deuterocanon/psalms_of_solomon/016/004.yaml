translation:
  language: es
  text: Me aguijoneó[a] como un aguijón para caballo, para despertarlo[b]; mi Salvador y mi auxiliador[c] me salvó en todo tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me pinchó» o «me espoleó».
    reason: lexical_alternative
  - marker: b
    text: O «para vigilancia» o «para estar despierto»; el griego puede entenderse como un llamado al estado de vigilia o al despertar.
    reason: alternative_reading
  - marker: c
    text: O «sostenedor»; el término griego indica a quien toma a otro para apoyarlo o socorrerlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνυξέν
  english_pob_choice: pricked
  chosen_spanish: me pinchó
  alternatives_spanish:
  - me punzó
  - me aguijoneó
  - me picó
  lexicon: LSJ
  rationale: El verbo expresa un toque agudo o punzante que despierta o impulsa; «pinchó» conserva la imagen física sin volverla más violenta de lo que pide el griego.
- source_word: κέντρον
  english_pob_choice: goad
  chosen_spanish: aguijón
  alternatives_spanish:
  - espuelas
  - acicate
  - pica
  lexicon: LSJ
  rationale: Con la imagen de un caballo, «aguijón» comunica el instrumento punzante que estimula o dirige, manteniendo el valor metafórico de impulso.
- source_word: ἐγρήγορσιν
  english_pob_choice: wakefulness
  chosen_spanish: despertarlo
  alternatives_spanish:
  - vigilancia
  - alerta
  - desvelo
  lexicon: LSJ
  rationale: El sustantivo apunta al estado de estar despierto o ser despertado. En español, el infinitivo con valor final («para despertarlo») preserva la fuerza verbal y resulta natural.
- source_word: σωτήρ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  - redentor
  lexicon: LSJ
  rationale: «Salvador» reproduce directamente el valor titular y devocional del término, tal como en el POB inglés.
- source_word: ἀντιλήμπτωρ
  english_pob_choice: helper
  chosen_spanish: ayudador
  alternatives_spanish:
  - auxiliador
  - sostén
  - apoyo
  lexicon: LSJ
  rationale: El término designa a quien toma a otro para sostenerlo o socorrerlo. «Ayudador» es claro y conserva la idea de auxilio activo sin añadir matices no atestiguados.
- source_word: ἐν παντὶ καιρῷ
  english_pob_choice: at every time
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - en todo momento
  - siempre
  - en cada ocasión
  lexicon: LSJ
  rationale: «En todo tiempo» es la equivalencia española más cercana y idiomática para una ayuda continua en cualquier circunstancia.
theological_decisions:
- issue: Valor de σωτήρ en un contexto confesional
  english_pob_reading: Savior
  chosen_spanish_reading: Salvador
  alternative_spanish_readings:
  - libertador
  - redentor
  rationale: Se conserva el sentido titular y confesional sin ampliar la doctrina más allá del texto. «Salvador» es la forma española natural para la decisión del POB inglés.
  doctrine_reference: Translate by source sense with readable modern Spanish.
- issue: Tratamiento de ἀντιλήμπτωρ como apoyo personal o mera ayuda abstracta
  english_pob_reading: helper
  chosen_spanish_reading: ayudador
  alternative_spanish_readings:
  - apoyo
  - auxiliador
  - sostenedor
  rationale: El griego describe a quien socorre o sostiene activamente; «ayudador» mantiene la referencia personal y evita diluir la imagen en un sustantivo demasiado abstracto.
  doctrine_reference: Preserve the personal, active sense of divine aid.
translation_notes:
  revision_awareness: El texto inglés pasó por una revisión que intentó hacer más explícita la relación del segundo miembro con el despertar y corrigió la frase temporal final a 'at all times'. En español se mantuvo la fuerza final de 'en todo tiempo' y se evitó una paráfrasis que introdujera una metáfora confusa; se conservó el paralelismo entre la acción punzante inicial y el auxilio continuo final.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y contemporáneo.
  - «Salvador» se usa en sentido titular, coherente con el POB inglés y la terminología del proyecto.
  - «Ayudador» preserva el matiz personal de ἀντιλήμπτωρ sin reemplazarlo por un término eclesiástico más tradicional que no es exigido por el texto.
  - No se ha trasladado el pronombre implícito/ambigua del griego de forma artificial; la cláusula final queda clara y natural en español.
