  source_alignment_summary: 'El borrador sigue bien la estructura del griego: ἀλήθεια … παρὰ θεοῦ σωτῆρος αὐτῶν se refleja como procedencia desde Dios su Salvador, y la segunda cláusula conserva la imagen concreta de αὐλίζεται con una negación de hospedaje. También mantiene el singular de δικαίου en la segunda cláusula. Sin embargo, «de los justos» pluraliza τῶν δικαίων, mientras que la segunda mitad habla de «un hombre justo» en singular; esto produce una asimetría innecesaria en español. Además, el posesivo αὐτῶν se refiere naturalmente a «los justos», por lo que conviene una formulación singular genérica más fluida en toda la línea.'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y coherente. «La verdad de los justos» junto con «la casa de un hombre justo» mezcla plural y singular sin necesidad. «Su Salvador» con mayúscula es aceptable en registro bíblico, pero en esta construcción genérica puede ir mejor en minúscula. «No se aloja» es una buena elección para αὐλίζεται.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» y «Salvador» están bien. «Verdad» respeta la revisión inglesa final para ἀλήθεια, y la nota con «fidelidad / integridad» preserva el matiz ético documentado.
  issues:
  - severity: medium
    issue: Incoherencia de número entre «de los justos» y «de un hombre justo»
    rationale: El griego usa plural en τῶν δικαίων pero singular en δικαίου; el inglés POB resolvió esto con singular genérico en la segunda cláusula. En español, mantener plural en la primera y singular en la segunda suena menos cohesivo. «Del justo» y «de un justo» conservan bien el sentido ético y la lectura proverbial.
  - severity: low
    issue: «Su Salvador» puede resultar algo enfático en mayúscula dentro de una construcción genérica
    rationale: No es incorrecto, pero «su salvador» encaja mejor en una afirmación sapiencial general sobre el justo, sin convertirlo necesariamente en título propio en esta línea.
  revised_spanish_text: La verdad[a] del justo es de Dios, su salvador; el pecado sobre pecado no se aloja en la casa de un hombre justo.
