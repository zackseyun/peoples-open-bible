    issue: Puntuación poco natural alrededor de la fórmula profética
    rationale: «Por tanto, aún contenderé con ustedes[a] —declara Yahvé—, y...» suena trabado en español por la combinación de coma, rayas y nueva coma. La fórmula parentética fluye mejor como «—declara Yahvé—» sin esa coma posterior o con reordenación leve.
  - severity: low
    issue: Ligera ambigüedad referencial en «los hijos de sus hijos» tras «ustedes»
    rationale: En español, alternar «ustedes» con «sus» puede leerse con menor inmediatez que «los hijos de ustedes»; sin embargo, la expresión literal es defendible por solemnidad y cercanía al hebreo.
  - severity: low
    issue: La nota alternativa puede expresarse de forma más completa y natural
    rationale: 'Dado que la alternativa afecta ambos complementos de ריב, conviene mantener la simetría explícita: «contenderé contra ustedes ... y contra los hijos de sus hijos».'
