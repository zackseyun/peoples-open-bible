translation:
  language: es
  text: entonces tu corazón se enaltece[a], y te olvidas de Yahvé tu Dios, que te sacó de la tierra de Egipto, de la casa de esclavos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se engríe» o «se eleva». El hebreo expresa literalmente que el corazón «se alza», con un matiz de orgullo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָם
  english_pob_choice: is lifted up
  chosen_spanish: se enaltece
  alternatives_spanish:
  - se eleva
  - se engríe
  - se vuelve orgulloso
  lexicon: HALOT
  rationale: El hebreo expresa la elevación del corazón en sentido figurado, con matiz de arrogancia. «Se enaltece» conserva la metáfora y comunica bien el tono admonitorio sin perder naturalidad en español.
- source_word: לְבָבֶךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu mente
  - tu ser interior
  lexicon: HALOT
  rationale: Como en el uso bíblico habitual, «corazón» expresa el centro de la voluntad y la disposición interior. Es la equivalencia más transparente y fiel aquí.
- source_word: וְשָׁכַחְתָּ
  english_pob_choice: you forget
  chosen_spanish: te olvidas
  alternatives_spanish:
  - olvidas
  - habrás olvidado
  - olvidarás
  lexicon: HALOT
  rationale: En esta advertencia condicional, el español presente reflexivo funciona de manera natural y reproduce bien la secuencia de consecuencias del contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se mantiene la convención del proyecto para el Tetragrámaton: «Yahvé», como transliteración del nombre divino y no como sustituto titulado.'
- source_word: הַמּוֹצִיאֲךָ
  english_pob_choice: who brought you out
  chosen_spanish: que te sacó
  alternatives_spanish:
  - que te hizo salir
  - que te sacó fuera
  lexicon: HALOT
  rationale: El participio sustantivado identifica a Yahvé por su acto redentor. «Que te sacó» es natural en español y preserva el motivo del éxodo sin sobreexplicar.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: La forma más directa y fiel al hebreo es «de la tierra de Egipto», manteniendo el paralelismo formal del texto.
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: out of the house of slavery
  chosen_spanish: de la casa de esclavos
  alternatives_spanish:
  - de la casa de esclavitud
  - de la casa de servidumbre
  - de la casa de cautiverio
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa de esclavos», plural concreto, y la POB inglesa también conserva ese matiz. En español, «casa de esclavos» preserva la fuerza lexical y la realidad social del texto mejor que una abstracción como «esclavitud».
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El versículo contiene יהוה de forma explícita; se conserva el nombre propio divino en español según la convención del proyecto, para no sustituirlo por un título y mantener la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de bondad/redención del éxodo frente a la casa de esclavos
  english_pob_reading: out of the house of slavery
  chosen_spanish_reading: de la casa de esclavos
  alternative_spanish_readings:
  - de la casa de esclavitud
  - de la casa de servidumbre
  rationale: El hebreo עֲבָדִים es un sustantivo plural concreto («esclavos»), no un abstracto. La traducción elegida evita suavizar el trasfondo del éxodo y conserva la tensión lexical del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy for bonded-status language
translation_notes:
  revision_awareness: El contexto inglés revisado ajustó la segunda mitad a la forma más idiomática «out of the house of slavery», pero el hebreo sigue diciendo literalmente «from the house of slaves». Por eso el español conserva el plural concreto «esclavos» para no perder ese dato léxico, aunque en estilo siga siendo natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, conforme al estándar del proyecto.
  - Se eligió «casa de esclavos» para reflejar el plural hebreo עֲבָדִים y no abstraerlo a «esclavitud».
  - «Se enaltece tu corazón» conserva la metáfora ascensional del hebreo y del inglés auditado.
  - No se introdujo puntuación explicativa adicional que altere el paralelo sintáctico del versículo.
