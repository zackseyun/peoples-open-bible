revisions:
- from: Lo pondrás delante de Eleazar el sacerdote y delante de toda la congregación, y lo comisionarás[a] a su vista.
  to: Lo pondrás delante de Eleazar el sacerdote y delante de toda la congregación, y le encargarás[a] su comisión ante sus ojos.
  rationale: Se reemplaza 'comisionar' por una formulación más natural en español eclesial que aún conserva la idea de investidura pública; se mejora la expresión de visibilidad pública con 'ante sus ojos'; y se corrige la nota para evitar la ambigüedad de 'mandarlo'.
