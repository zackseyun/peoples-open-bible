translation:
  language: es
  text: Y añadió honor a Aarón[a], y le dio su herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego continúa: «repartió entre ellos las primicias de los primogénitos; preparó pan en abundancia para los principales». El testimonio hebreo aquí es más breve que el griego.'
    reason: textual_variant
lexical_decisions:
- source_word: ויוסף
  english_pob_choice: and he added
  chosen_spanish: y añadió
  alternatives_spanish:
  - y aumentó
  - y le concedió además
  lexicon: HALOT
  rationale: El hebreo יסף en hiphil expresa la idea de añadir o incrementar. «Añadió» conserva la imagen verbal y el paralelismo con el griego προσέθηκεν.
- source_word: לאהרן
  english_pob_choice: to Aaron
  chosen_spanish: a Aarón
  alternatives_spanish:
  - para Aarón
  lexicon: nombre propio estándar
  rationale: Se conserva el nombre propio en forma usual en español bíblico, sin transliteración extraña.
- source_word: כבודו
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - gloria
  - honor
  lexicon: HALOT
  rationale: כבוד puede ser «honor» o «gloria». Aquí, por el contexto del sacerdocio de Aarón y el paralelo griego δόξαν, «honra» comunica dignidad y elevación sin perder el matiz de status.
- source_word: ויתן לו
  english_pob_choice: and gave him
  chosen_spanish: y le dio
  alternatives_spanish:
  - y le concedió
  - y le otorgó
  lexicon: HALOT
  rationale: דָּתַן/נתן se traduce de manera directa y sobria. «Le dio» mantiene claridad y fidelidad al hebreo.
- source_word: נחלתו
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su porción
  - su posesión asignada
  lexicon: HALOT
  rationale: נחלה designa una herencia o posesión asignada. «Herencia» conserva la resonancia bíblica y el sentido de una porción dada por Dios, no necesariamente terreno.
- source_word: κληρονομίαν
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - porción
  - posesión
  lexicon: BDAG
  rationale: El griego confirma el sentido de herencia/porción. «Herencia» es la correspondencia natural en español y preserva la fuerza covenantal del término.
theological_decisions:
- issue: Naturaleza de la 'herencia' de Aarón
  english_pob_reading: his inheritance
  chosen_spanish_reading: su herencia
  alternative_spanish_readings:
  - su porción asignada
  - su asignación sacerdotal
  rationale: El texto alude a la porción otorgada divinamente a Aarón en su función sacerdotal. «Herencia» mantiene el eco bíblico sin restringirlo indebidamente a propiedad territorial.
  doctrine_reference: Sacerdocio aarónico y porción cultual asignada por Dios
translation_notes:
  revision_awareness: El texto hebreo disponible es más breve que el paralelo griego; por eso la línea principal sigue el hebreo transmitido, y la nota señala explícitamente la expansión griega sin incorporarla al versículo base.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefiere «Aarón» como forma estándar en español bíblico.
  - Se mantiene «herencia» para preservar el vínculo entre el hebreo נחלה y el griego κληρονομία, aunque el referente inmediato sea una porción sacerdotal.
