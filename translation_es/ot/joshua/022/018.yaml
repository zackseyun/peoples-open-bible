translation:
  language: es
  text: Y ustedes se están apartando hoy de seguir a Yahvé[a]; y si hoy se rebelan contra Yahvé, mañana él se enojará con toda la congregación de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se vuelven atrás hoy de seguir a Yahvé’. Literalmente, ‘de detrás de Yahvé’, un modismo hebreo que significa dejar de seguirlo con lealtad.
    reason: lexical_alternative
  - marker: b
    text: El hebreo simplemente dice ‘él se enojará’; por el contexto, el sujeto implícito es Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּשֻׁבוּ
  english_pob_choice: are turning away
  chosen_spanish: se están apartando
  alternatives_spanish:
  - se vuelven atrás
  - se apartan
  - están volviendo atrás
  lexicon: HALOT
  rationale: שוב aquí, junto con מֵאַחֲרֵי, no expresa un simple “volver” sino una desviación de lealtad. ‘Se están apartando’ mantiene el sentido de alejamiento y la fuerza progresiva del presente continuo del inglés POB.
- source_word: מֵאַחֲרֵי יְהוָה
  english_pob_choice: from following Yahweh
  chosen_spanish: de seguir a Yahvé
  alternatives_spanish:
  - de ir detrás de Yahvé
  - de seguir tras Yahvé
  - de seguir al Yahvé
  lexicon: HALOT
  rationale: 'El hebreo usa un modismo literal: ‘de detrás de Yahvé’, con el sentido de dejar de seguirlo. En español, ‘de seguir a Yahvé’ conserva la idea relacional y evita una construcción forzada.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, en lugar de sustituirlo por un título genérico.
- source_word: תִּמְרְדוּ
  english_pob_choice: you rebel
  chosen_spanish: se rebelan
  alternatives_spanish:
  - se rebelan contra
  - se alzan en rebelión
  - actúan con rebeldía
  lexicon: HALOT
  rationale: מרד comunica rebelión de pacto y desafío a la autoridad legítima. ‘Se rebelan’ es fuerte, natural y fiel; el complemento ‘contra Yahvé’ aclara el blanco de la rebeldía.
- source_word: בַּיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - frente a Yahvé
  - en Yahvé
  - con Yahvé
  lexicon: HALOT
  rationale: Con מרד, la preposición tiene valor adversativo. ‘Contra Yahvé’ reproduce correctamente la relación de oposición.
- source_word: וּמָחָר
  english_pob_choice: tomorrow
  chosen_spanish: mañana
  alternatives_spanish:
  - y mañana
  - al día siguiente
  lexicon: HALOT
  rationale: Adverbio temporal directo. ‘Mañana’ mantiene la inmediatez de la advertencia.
- source_word: יִקְצֹף
  english_pob_choice: he will be angry
  chosen_spanish: él se enojará
  alternatives_spanish:
  - él estará airado
  - él se enfurecerá
  - la ira vendrá
  lexicon: HALOT
  rationale: קצף expresa enojo/ira; en español, ‘se enojará’ comunica bien el juicio divino sin intensificar innecesariamente el matiz. Se conserva el sujeto implícito como pronombre explícito por claridad.
- source_word: כָּל עֲדַת יִשְׂרָאֵל
  english_pob_choice: the whole congregation of Israel
  chosen_spanish: toda la congregación de Israel
  alternatives_spanish:
  - toda la asamblea de Israel
  - toda la comunidad de Israel
  - el conjunto de Israel
  lexicon: HALOT
  rationale: עֵדָה designa la asamblea/cuerpo pactal reunido. ‘Congregación’ preserva mejor esa carga corporativa y cultual que ‘comunidad’.
theological_decisions:
- issue: Sujeto implícito de יִקְצֹף
  english_pob_reading: 'the LORD is the implied subject: ''he will be angry'''
  chosen_spanish_reading: Dios/Yahvé es el sujeto implícito y se explicita con ‘él’
  alternative_spanish_readings:
  - ‘se encenderá su ira’ sin sujeto explícito
  - ‘vendrá ira’
  rationale: El contexto inmediato identifica a Yahvé como el ofendido por la deslealtad. En español, explicitar ‘él’ evita ambigüedad y mantiene la lectura de que es Yahvé quien se enoja con toda Israel.
  doctrine_reference: Covenant accountability / solidaridad del pacto
- issue: Rebeldía como ruptura de lealtad de pacto
  english_pob_reading: you rebel today against Yahweh
  chosen_spanish_reading: si hoy se rebelan contra Yahvé
  alternative_spanish_readings:
  - si hoy se levantan contra Yahvé
  - si hoy actúan en rebeldía contra Yahvé
  rationale: ‘Rebelarse contra’ conserva el valor de desafío covenantal del hebreo מרד, sin diluirlo en una mera actitud interior. La formulación mantiene la gravedad legal y relacional del pasaje.
  doctrine_reference: Lealtad de pacto / autoridad divina
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audio de la POB en inglés: mantiene el progresivo ‘se están apartando’, conserva el modismo de seguimiento detrás de Yahvé con una solución española natural, y explicita el sujeto implícito del verbo final para evitar ambigüedad. No se detectaron revisiones posteriores que alteren el sentido base del versículo.'
  spanish_consistency_notes:
  - ‘Yahvé’ se usa de forma consistente para יהוה.
  - Se mantiene ‘congregación’ para עֲדָה por su sentido corporativo pactal.
  - El verbo ‘rebelarse’ se usa con valor de oposición a la autoridad divina, no como simple desobediencia genérica.
  - El tono es sobrio y bíblico, sin calco excesivo del inglés.
