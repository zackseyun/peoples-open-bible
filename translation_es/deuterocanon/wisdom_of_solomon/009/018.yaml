translation:
  language: es
  text: Y así fueron enderezados los senderos de los que viven en la tierra, y los hombres[a] fueron instruidos en las cosas que te agradan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «personas» / «seres humanos»; el griego usa «hombres» en sentido genérico para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: διωρθώθησαν
  english_pob_choice: were set straight
  chosen_spanish: fueron enderezados
  alternatives_spanish:
  - fueron puestos rectos
  - fueron corregidos
  - fueron enderezados en rectitud
  lexicon: LSJ
  rationale: El verbo pasivo expresa rectificación/enderezamiento. «Fueron enderezados» conserva la imagen espacial de los caminos sin volverla demasiado abstracta.
- source_word: αἱ τρίβοι
  english_pob_choice: paths
  chosen_spanish: los senderos
  alternatives_spanish:
  - los caminos
  - las sendas
  - las veredas
  lexicon: LSJ
  rationale: «Senderos» mantiene la metáfora concreta de trayectos transitados y suena natural en español bíblico moderno, sin perder el matiz de ruta moral.
- source_word: τῶν ἐπὶ γῆς
  english_pob_choice: of those on earth
  chosen_spanish: de los que están en la tierra
  alternatives_spanish:
  - de los que viven en la tierra
  - de los hombres sobre la tierra
  - de los terrestres
  lexicon: LSJ
  rationale: La frase funciona sustantivamente y se refiere a quienes viven sobre la tierra. «Los que están en la tierra» sigue de cerca el griego y deja claro el referente humano.
- source_word: τὰ ἀρεστά σου
  english_pob_choice: the things pleasing to you
  chosen_spanish: las cosas que te agradan
  alternatives_spanish:
  - lo que te agrada
  - las cosas agradables para ti
  - las cosas aceptables para ti
  lexicon: LSJ
  rationale: 'El plural neutro sustantivado se rinde mejor con un plural: «las cosas que te agradan». Así se conserva el alcance múltiple del original y la dirección hacia Dios mediante el «te».'
- source_word: ἐδιδάχθησαν
  english_pob_choice: were taught
  chosen_spanish: fueron enseñados
  alternatives_spanish:
  - aprendieron
  - fueron instruidos
  - recibieron enseñanza
  lexicon: LSJ
  rationale: El pasivo indica que recibieron instrucción. «Fueron enseñados» es directo y mantiene la pasividad del griego.
- source_word: ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  - la humanidad
  lexicon: LSJ
  rationale: Se conserva el valor genérico masculino del griego, como en la POB inglesa, sin convertirlo en un plural neutro que borre la forma original. En español bíblico, «los hombres» puede abarcar humanidad en general.
theological_decisions:
- issue: Fuerza genérica de ἄνθρωποι
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - los seres humanos
  rationale: El griego usa un masculino plural con sentido representativo/genericamente humano. Se mantiene la forma masculina en el texto principal por fidelidad al original y al criterio de la POB, dejando la genericidad implícita.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre ‘cosas agradables’ y voluntad divina
  english_pob_reading: the things pleasing to you
  chosen_spanish_reading: las cosas que te agradan
  alternative_spanish_readings:
  - lo que te agrada
  - las cosas aceptables para ti
  rationale: La frase no necesita una ampliación doctrinal; el griego expresa aquello que es agradable a Dios. «Te agradan» conserva la relación personal y la evaluación divina sin introducir una categoría distinta.
  doctrine_reference: Wisdom of Solomon 9:18 context
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 tal como aparece en la capa de traducción normalizada. No se requirieron correcciones textuales respecto del pasaje auditado en la POB inglesa; se preservó la metáfora de caminos enderezados y la pasividad de ‘fueron enseñados’.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, evitando calcos rígidos.
  - Se conservó el masculino genérico de ἄνθρωποι con nota explicativa, en paralelo con la decisión inglesa.
  - La secuencia verbal pasiva («fueron enderezados», «fueron enseñados») refleja el griego y la POB inglesa.
  - No se introdujo terminología eclesiástica no presente en el original.
