  yaml_path: translation/ot/deuteronomy/005/024.yaml
  text: And you said[a], ‘Look, Yahweh our God has shown us his glory and his greatness, and we have heard his voice from the midst of the fire. This day we have seen that God speaks with man, and he lives.’
  footnotes:
