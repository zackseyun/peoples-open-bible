review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva en general el sentido del hebreo y sigue bien la auditoría inglesa: menciona el arca de Dios, la caída hacia atrás, la rotura mortal del cuello/nuca, la explicación por edad y peso, y el resumen de sus cuarenta años juzgando a Israel. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y claridad: (1) ''del asiento, al lado de la puerta'' puede leerse como si ''al lado de la puerta'' modificara solo ''asiento'' o como una secuencia algo trabada; conviene reflejar mejor la relación ''desde el asiento, junto/al lado de la puerta''. (2) Dado que la auditoría inglesa preservó nota sobre el modismo hebreo בְּעַד יַד הַשַּׁעַר y sobre el valor literal de ''heavy'', el español debe conservar esas alternativas mediante notas, ya que ambas son significativas y siguen siendo pertinentes en español.'
  spanish_quality_summary: El texto es comprensible y de registro adecuado, pero 'cayó hacia atrás del asiento' suena menos natural que 'cayó hacia atrás desde el asiento' o 'se fue hacia atrás del asiento'. 'Pesado' funciona léxicamente, aunque en español puede percibirse más marcado o ambiguo; por eso conviene sostenerlo con nota aclaratoria, no reemplazarlo por una paráfrasis interpretativa. 'Nuca' es defendible, pero 'cuello' suena algo más amplio y natural para lectores generales en una narración de caída fatal.
  glossary_alignment: 'La terminología principal está alineada: אֱלֹהִים -> ''Dios''; no hay términos del glosario mayor en conflicto. Se mantiene ''arca de Dios'' correctamente. No hay problema teológico detectable.'
  issues:
  - severity: medium
    issue: Falta de notas para dos decisiones léxicas significativas preservadas en la auditoría inglesa
    rationale: El inglés POB retuvo notas sobre el modismo 'at/by the hand of the gate' y sobre el sentido literal de 'heavy'. El español no debe perder ese rastro exegético cuando sigue siendo relevante y no crea ambigüedad innecesaria.
  - severity: medium
    issue: Redacción algo rígida en 'cayó hacia atrás del asiento, al lado de la puerta'
    rationale: La secuencia puede sonar poco idiomática y dejar menos clara la relación locativa. 'desde el asiento, junto a la puerta' expresa mejor la caída desde el asiento ubicado junto al portón/puerta.
  - severity: low
    issue: '''Nuca'' es posible, pero ''cuello'' resulta más natural y abarcador en español general'
    rationale: El hebreo se refiere al cuello/nuca. 'Cuello' comunica el resultado mortal con mayor naturalidad para un público amplio sin perder precisión suficiente.
