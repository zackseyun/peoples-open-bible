base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/029/005.yaml
  text: I will cast you into the wilderness[a], you and all the fish of your streams. You will fall on the open field; you will not be gathered or collected[c][b]. I have given you as food to the beasts of the earth and to the birds of the heavens.
  footnotes:
  - marker: a
    text: Or 'the fish of your Nile channels'; the Hebrew term for 'streams' is often used for the Nile and its waterways in Egyptian contexts.
    reason: cultural_note
  - marker: b
    text: Or 'you will not be gathered or gathered together'; the Hebrew uses two near-synonymous verbs to intensify that no one will recover or bury the body.
    reason: lexical_alternative
  - marker: c
    text: The final clause is literally 'I have given you for food,' a prophetic perfect expressing the certainty of the coming judgment.
    reason: lexical_alternative
