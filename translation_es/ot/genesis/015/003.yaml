revisions:
- from: 'Entonces Abram dijo: “Mira, no me has dado descendencia, y he aquí que un hijo de mi casa[a] será mi heredero[b].”'
  to: 'Entonces Abram dijo: «He aquí, no me has dado descendencia,[a] y he aquí que un hijo de mi casa[b] me heredará[c].»'
  rationale: Se reemplaza «Mira» por «He aquí» para conservar el paralelismo enfático del hebreo y el tono digno del proyecto. Se ajusta «será mi heredero» a «me heredará» para reflejar más de cerca יוֹרֵשׁ אֹתִי, mientras la nota preserva la alternativa más idiomática en español. También se corrige la nota defectuosa y se añade una nota para «descendencia» en correspondencia con la nota del POB inglés sobre זרע.
