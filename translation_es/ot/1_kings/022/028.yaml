translation:
  language: es
  text: 'Y Micaías dijo[a]: «Si de veras vuelves en paz, Yahvé no ha hablado por medio de mí». Y dijo: «¡Oigan[b], todos los pueblos!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé no ha hablado por mí».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «todos los pueblos», usando la forma plural para una convocatoria pública amplia, no dirigida a un solo grupo.
    reason: cultural_note
lexical_decisions:
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaía
  - Miqueas
  lexicon: Nombre propio bíblico
  rationale: El nombre propio se translitera al español de forma reconocible. «Micaías» preserva la forma usual en español y evita confundirlo con «Miqueas», que corresponde a otro profeta.
- source_word: אִם שׁוֹב תָּשׁוּב
  english_pob_choice: If you indeed return
  chosen_spanish: Si de veras vuelves
  alternatives_spanish:
  - Si seguramente vuelves
  - Si vuelves en verdad
  - Si llegas a volver
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto más imperfecto expresa énfasis condicional. «De veras» comunica ese énfasis sin volver la frase pesada en español.
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - sano y salvo
  - sin daño
  - con seguridad
  lexicon: HALOT
  rationale: El hebreo aquí tiene el sentido de retorno ileso o sin peligro. «En paz» conserva el giro idiomático bíblico y sigue siendo natural en español; las alternativas explicitan más el matiz de seguridad física.
- source_word: לֹא דִבֶּר יְהוָה בִּי
  english_pob_choice: Yahweh has not spoken by me
  chosen_spanish: Yahvé no ha hablado por medio de mí
  alternatives_spanish:
  - Yahvé no ha hablado por mí
  - Yahvé no me ha hablado
  - Yahvé no ha hablado a través de mí
  lexicon: HALOT
  rationale: La preposición hebrea indica el medio instrumental profético. «Por medio de mí» mantiene esa fuerza sin perder inteligibilidad. Se conserva «Yahvé» según la norma doctrinal del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: DOCTRINE.md Contested terms
  rationale: Se sigue el criterio del proyecto para el Nombre divino en la forma principal española, evitando la convención de ocultarlo con «SEÑOR».
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: ¡Oigan!
  alternatives_spanish:
  - Escuchen
  - Oigan
  lexicon: HALOT
  rationale: El imperativo es una convocación pública y profética. «Oigan» comunica la llamada a prestar atención con fuerza oral y solemne en español. Se usa el vocativo plural para reflejar el hebreo.
- source_word: עַמִּים כֻּלָּם
  english_pob_choice: all you peoples
  chosen_spanish: pueblos todos
  alternatives_spanish:
  - todos los pueblos
  - ¡oh pueblos, todos!
  - pueblos, todos
  lexicon: HALOT
  rationale: El plural עַמִּים debe mantenerse como «pueblos», no como un singular genérico. «Pueblos todos» reproduce la fuerza colectiva y el orden enfático del hebreo en un español natural.
theological_decisions:
- issue: Nombre divino יְהוָה en boca profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. El proyecto exige preservarlo como «Yahvé», sin la máscara tradicional «SEÑOR», para mantener la trazabilidad al original y la claridad teológica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Continuidad del hablante en la segunda cláusula con וַיֹּאמֶר
  english_pob_reading: 'Continue with Micaiah as the speaker: “And he said, ‘Hear, all you peoples!’”'
  chosen_spanish_reading: Se mantiene a Micaías como hablante de la exclamación final.
  alternative_spanish_readings:
  - Tratar la segunda cláusula como una voz editorial
  - Atribuirla a un narrador distinto
  rationale: La lectura más directa conserva el mismo sujeto narrativo y evita una reasignación conjetural. Esto respeta la sintaxis masorética y el tono de proclamación profética.
  doctrine_reference: Principio POB de mantener la lectura más directa del texto fuente cuando no haya motivo textual fuerte para alterarla
translation_notes:
  revision_awareness: 'La versión española sigue el estado revisado más reciente del contexto inglés: no se registraron cambios en la última pasada, y la lectura aceptada se conserva sin modificaciones sustantivas. Se mantuvieron el Nombre divino, el énfasis condicional y la vocación plural del cierre.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma uniforme del Tetragrama en el texto principal.
  - «Micaías» sigue la transliteración española común del nombre bíblico.
  - «por medio de mí» mantiene la imagen profética instrumental sin sobreexplicar.
  - El cierre plural «pueblos todos» refleja la vocación colectiva del hebreo y armoniza con el mandato imperativo.
