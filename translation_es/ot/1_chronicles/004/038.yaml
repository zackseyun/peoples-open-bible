translation:
  language: es
  text: Estos[a], los que fueron mencionados por sus nombres, eran líderes en sus clanes[b], y sus casas paternas crecieron en gran manera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estos que vinieron, inscritos por nombre». El participio hebreo literalmente significa «los que vienen», pero aquí probablemente designa a los que quedaron registrados en la genealogía.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «sus casas paternas aumentaron hasta la abundancia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estos hombres
  - Estos mismos
  lexicon: HALOT
  rationale: El demostrativo introduce el grupo ya identificado por la genealogía anterior. «Estos» es natural en español y conserva la referencia anafórica sin añadir información que no está en el hebreo.
- source_word: הַבָּאִים
  english_pob_choice: who were mentioned
  chosen_spanish: los que fueron mencionados
  alternatives_spanish:
  - los que venían
  - los que llegaron
  - los que fueron inscritos
  lexicon: HALOT
  rationale: Aunque el participio de בוא literalmente es «venir», en este contexto genealógico funciona con el sentido de los que aparecen en el registro/lista. «Fueron mencionados» comunica la función textual sin forzar una traducción mecánica de «venir».
- source_word: בְּשֵׁמוֹת
  english_pob_choice: by name
  chosen_spanish: por nombre
  alternatives_spanish:
  - nominalmente
  - por sus nombres
  - individualmente por nombre
  lexicon: HALOT
  rationale: La expresión idiomática señala identificación individual en la lista. En español, «por nombre» suena natural y mantiene la idea de registro nominal.
- source_word: נְשִׂיאִים
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - jefes
  - príncipes
  - caudillos
  lexicon: HALOT
  rationale: El término designa cabezas o dirigentes de grupos de parentesco. «Líderes» conserva el valor funcional del cargo sin introducir una carga monárquica o cultural indebida.
- source_word: בְּמִשְׁפְּחוֹתָם
  english_pob_choice: in their clans
  chosen_spanish: en sus clanes
  alternatives_spanish:
  - en sus familias
  - entre sus familias
  - en sus linajes
  lexicon: HALOT
  rationale: En contextos genealógicos, מִשְׁפָּחָה suele ser una unidad de parentesco mayor que la familia nuclear. «Clanes» preserva ese nivel social mejor que «familias».
- source_word: וּבֵית אֲבוֹתֵיהֶם
  english_pob_choice: their ancestral houses
  chosen_spanish: la casa de sus padres
  alternatives_spanish:
  - sus casas paternas
  - sus casas ancestrales
  - la casa de sus antepasados
  lexicon: HALOT
  rationale: La expresión hebrea alude a la unidad patrilineal. En español, «la casa de sus padres» mantiene la imagen de linaje familiar y evita una construcción demasiado literal o poco idiomática.
- source_word: פָּרְצוּ
  english_pob_choice: increased
  chosen_spanish: se extendió
  alternatives_spanish:
  - creció
  - se multiplicó
  - irrumpió
  lexicon: HALOT
  rationale: El verbo sugiere literalmente «romperse/irrumpir», pero aquí describe expansión numérica o de prosperidad. «Se extendió» capta la idea de desbordamiento o expansión del linaje sin perder su dinamismo.
- source_word: לָרֹב
  english_pob_choice: greatly
  chosen_spanish: en gran manera
  alternatives_spanish:
  - abundantemente
  - muchísimo
  - en abundancia
  lexicon: HALOT
  rationale: La locución intensifica la expansión indicando abundancia. «En gran manera» es una forma bíblica clara y fiel que conserva la fuerza cuantitativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el patrón del POB inglés, pero ajusta la sintaxis al español para que suene natural. Se conserva la tensión lexical del participio הַבָּאִים mediante una nota alternativa, y se mantiene el valor expansivo de פָּרְצוּ/לָרֹב con una expresión española idiomática.
  spanish_consistency_notes:
  - Se traduce יהוה como «Yahvé» cuando aparezca; aquí no aplica.
  - Se conserva «clanes» para מִשְׁפָּחוֹת en contexto genealógico, conforme al criterio del proyecto.
  - «Casa de sus padres» mantiene la noción de unidad patrilineal sin imponer una terminología eclesiástica o tradicional no sustentada por el hebreo.
