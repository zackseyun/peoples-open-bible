translation:
  language: es
  text: Abre su boca con sabiduría, y la instrucción de bondad[a][b] está sobre su lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la ley de bondad está sobre su lengua'. El hebreo תּוֹרָה puede significar 'ley', pero aquí probablemente se refiere más ampliamente a instrucción o enseñanza.
    reason: lexical_alternative
  - marker: b
    text: O 'amor leal', 'misericordia' o 'fidelidad amorosa' para חֶסֶד, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּיהָ
  english_pob_choice: her mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - su habla
  lexicon: HALOT
  rationale: Conservo la imagen corporal concreta del hebreo. En español, 'su boca' comunica de manera natural la acción proverbial de hablar, sin volverlo una paráfrasis.
- source_word: פָּתְחָה
  english_pob_choice: opens
  chosen_spanish: abre
  alternatives_spanish:
  - ha abierto
  - habla
  lexicon: HALOT
  rationale: El perfecto hebreo en contexto sapiencial expresa acción característica; el presente gnómico 'abre' mantiene ese valor proverbial y conserva el verbo de apertura.
- source_word: בְחָכְמָה
  english_pob_choice: with wisdom
  chosen_spanish: con sabiduría
  alternatives_spanish:
  - en sabiduría
  - sabia/sabiamente
  lexicon: HALOT
  rationale: La preposición ב se refleja con 'con' para conservar el matiz instrumental/asociativo. 'Con sabiduría' suena natural en español y evita convertir el adverbio en una abstracción distinta.
- source_word: וְתוֹרַת
  english_pob_choice: the instruction of
  chosen_spanish: la instrucción de
  alternatives_spanish:
  - la ley de
  - la enseñanza de
  lexicon: HALOT
  rationale: Siguiendo el criterio del POB inglés, תּוֹרָה aquí se entiende como instrucción/enseñanza, no como 'ley' en sentido legal. 'Instrucción de' preserva la cadena de constructo.
- source_word: חֶסֶד
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amor leal
  - misericordia
  - fidelidad amorosa
  lexicon: HALOT
  rationale: En español 'bondad' funciona como equivalente sobrio y comprensible para el contexto interpersonal de sabiduría. Mantiene el tono de benevolencia práctica sin cargar demasiado el sentido pactual.
- source_word: תּוֹרַת חֶסֶד
  english_pob_choice: the instruction of kindness
  chosen_spanish: la instrucción de bondad
  alternatives_spanish:
  - la enseñanza de bondad
  - la ley de bondad
  lexicon: HALOT
  rationale: Conservo explícitos ambos sustantivos, como hace el POB, para no borrar la relación entre תּוֹרָה y חֶסֶד. 'Instrucción de bondad' es claro y suficientemente literal para el registro poético.
- source_word: עַל לְשׁוֹנָהּ
  english_pob_choice: is on her tongue
  chosen_spanish: está sobre su lengua
  alternatives_spanish:
  - está en su lengua
  - está en su habla
  lexicon: HALOT
  rationale: '''Sobre su lengua'' reproduce mejor la imagen hebrea y la expresión idiomática de algo siempre listo para hablar. En español es entendible y mantiene la concreción del texto.'
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y mantiene el paralelo poético entre apertura de la boca, sabiduría y la imagen de la lengua. Se conserva la tensión lexical de תּוֹרָה y חֶסֶד mediante notas alternativas, sin resolverlas de forma interpretativa en el cuerpo principal.
  spanish_consistency_notes:
  - Usé 'sabiduría' para בְחָכְמָה y no 'sabiamente' para conservar la preposición y el paralelismo nominal.
  - Mantuve 'instrucción de' como reflejo del constructo de תּוֹרַת, siguiendo la decisión auditada de no imponer el sentido legal de 'ley'.
  - '''Bondad'' traduce חֶסֶד en el texto principal por claridad natural en español; las alternativas conservan el rango semántico documentado.'
  - '''Lengua'' conserva el paralelismo corporal del hebreo y la imagen idiomática de la palabra lista en la boca.'
