translation:
  language: es
  text: 'Y ella dijo: «¡Los filisteos están sobre ti, Sansón!». Y él despertó de su sueño y dijo: «Saldré como en otras ocasiones y me sacudiré[a]». Pero él no sabía que Yahvé se había apartado de él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «y me sacudiré para librarme», con la idea probable de sacudirse para soltarse o liberarse, como en ocasiones anteriores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּלִשְׁתִּים עָלֶיךָ
  english_pob_choice: The Philistines are upon you
  chosen_spanish: ¡Los filisteos sobre ti, Sansón!
  alternatives_spanish:
  - ¡Los filisteos están sobre ti, Sansón!
  - ¡Los filisteos te atacan, Sansón!
  lexicon: HALOT
  rationale: La construcción hostil con עַל conserva en español la imagen breve e intensa del anuncio. Omitir un verbo copulativo mantiene el golpe directo del original; el contexto ya hace clara la amenaza. Se evita ampliar a 'atacan' para no suavizar ni interpretar de más.
- source_word: וַיִּקַץ מִשְּׁנָתוֹ
  english_pob_choice: he awoke from his sleep
  chosen_spanish: despertó de su sueño
  alternatives_spanish:
  - se despertó de su sueño
  - despertó de su dormir
  lexicon: HALOT
  rationale: '''Despertó'' comunica bien יקץ en español moderno y mantiene el tono narrativo. ''De su sueño'' sigue de cerca מִשְּׁנָתוֹ sin volver la frase pesada o artificial.'
- source_word: אֵצֵא
  english_pob_choice: I will go out
  chosen_spanish: Saldré
  alternatives_spanish:
  - Iré a salir
  - saldré afuera
  lexicon: HALOT
  rationale: El verbo יצא se traduce de forma directa con 'saldré'. No se especifica el objetivo de la salida más allá del contexto inmediato, por lo que se evita añadir 'a pelear' o similar.
- source_word: כְּפַעַם בְּפַעַם
  english_pob_choice: as at other times
  chosen_spanish: como en otras ocasiones
  alternatives_spanish:
  - como otras veces
  - como antes
  lexicon: HALOT
  rationale: La expresión idiomática refiere a repetición previa; 'como en otras ocasiones' suena natural en español y conserva la idea de costumbre repetida. Evita un calco extraño y mantiene la noción de recurrencia asumida por Sansón.
- source_word: וְאִנָּעֵר
  english_pob_choice: and shake myself free
  chosen_spanish: me sacudiré[b]
  alternatives_spanish:
  - me sacudiré para librarme
  - me sacudiré y me soltaré
  lexicon: HALOT
  rationale: El verbo reflexivo puede entenderse literalmente como sacudirse; en contexto, el sentido es deshacerse del efecto o del agarre como en ocasiones anteriores. Se mantiene la literalidad básica y se deja constancia de la posible implicación de liberarse en nota, en línea con el audit trail inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino propio según la convención del proyecto: ''Yahvé'' para יְהוָה. Esto evita la sustitución por un título y mantiene la forma directa auditada por el original hebreo.'
- source_word: סָר מֵעָלָיו
  english_pob_choice: had departed from him
  chosen_spanish: se había apartado de él
  alternatives_spanish:
  - lo había dejado
  - se había retirado de él
  lexicon: HALOT
  rationale: סור con מן/מעל expresa retirada o apartamiento. 'Se había apartado de él' conserva la sobriedad y la carga teológica sin explicar el mecanismo de esa retirada ni resolver su alcance.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura auditable del POB inglés traslada el Tetragrama como nombre propio, no como título. 'Yahvé' mantiene esa decisión y preserva la distinción teológica entre el nombre revelado y una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Naturaleza del apartamiento divino en 'Yahweh had departed from him'
  english_pob_reading: Retain the text's statement of the LORD's departure without explaining its mechanism
  chosen_spanish_reading: se había apartado de él
  alternative_spanish_readings:
  - Yahvé lo había dejado
  - la presencia capacitadora de Yahvé se había apartado de él
  rationale: El hebreo afirma el apartamiento divino, pero no especifica si se trata de presencia capacitadora, favor, ayuda o algún otro matiz. La traducción conserva esa tensión sin cerrarla con una explicación teológica no explicitada por el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente del pasaje indicó que no se requirieron cambios respecto del borrador anterior; la presente redacción sigue de cerca el texto hebreo y el audit trail inglés, preservando la misma interpretación general y la tensión teológica sobre el apartamiento de Yahvé.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, en conformidad con la terminología del proyecto.
  - '''Filisteos'' conserva el etnónimo estándar en español; no se añade verbalización interpretativa que no esté en el hebreo.'
  - '''Despertó'' / ''se había apartado'' mantienen el tono narrativo sobrio del relato.'
  - La nota de alternativa se limita al valor de וְאִנָּעֵר y no introduce un sentido doctrinal distinto al del texto.
