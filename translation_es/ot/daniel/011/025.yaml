review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: movilización del rey del norte contra el rey del Sur, respuesta militar del rey del Sur, fracaso del primero por intrigas contra él. Sin embargo, hay dos desajustes principales con la evidencia y el rastro POB: (1) la nota [a] quedó anclada en «gran ejército», pero el contenido de esa nota corresponde a alternativas de חַיִל, no a la nota inglesa en esa posición; y (2) las notas inglesas están efectivamente invertidas respecto del texto, por lo que en español conviene reparar la ubicación y el contenido de notas para reflejar las alternativas relevantes del hebreo en los lugares correctos. Además, «se empeñará en la guerra» es menos natural y menos preciso que «entrará en batalla» o «se lanzará a la batalla» para יִתְגָּרֶה לַמִּלְחָמָה.'
  spanish_quality_summary: El español es en general claro y digno, pero «despertará su poder y su corazón» suena algo rígido; «avivará» o «movilizará» serían más idiomáticos, aunque no imprescindibles. «Se empeñará en la guerra» resulta menos natural en español bíblico contemporáneo. «Pero no permanecerá» es comprensible, pero en este contexto militar «no prevalecerá» o «no podrá sostenerse» comunica mejor el sentido idiomático sin perder fidelidad; aun así, puede mantenerse una formulación cercana al hebreo con nota. La cláusula final mejora con «tramarán intrigas contra él» o «maquinarán contra él» frente a «contra él tramarán planes», que suena algo forzada.
  glossary_alignment: No hay términos de glosario teológico mayores en este versículo. «Rey del Sur» está bien. No hay conflictos con Yahvé/Mesías/etc. La decisión de conservar «corazón» por לְבָבוֹ concuerda con la filosofía POB.
  issues:
  - severity: medium
    issue: La nota [a] está asociada a «gran ejército», pero su contenido no corresponde a la alternativa principal documentada para esa ubicación en el audit trail.
    rationale: La evidencia inglesa muestra una nota de alternativa para «he will not stand», no para «with a great army». Aunque el audit trail tiene un desajuste de rotulación, el revisor español debe producir un sistema de notas coherente y correctamente anclado en el texto español.
  - severity: medium
    issue: La nota [b] actual cubre solo «no permanecerá», pero falta una nota para la expresión cognada final «pensarán pensamientos / tramarán planes».
    rationale: El POB inglés preserva la alternativa literal para la construcción cognada final. En español conviene reflejarla con una nota anclada en la cláusula de intriga, no perderla.
  - severity: low
    issue: «Se empeñará en la guerra» es una opción menos natural para יִתְגָּרֶה לַמִּלְחָמָה.
    rationale: La forma hebrea expresa entrar en conflicto o lanzarse a la batalla. «Entrará en batalla» suena más natural y preciso en español neutral.
  - severity: low
    issue: «Contra él tramarán planes» tiene orden y collocación algo torpes.
    rationale: «Tramarán intrigas contra él» o «maquinarán contra él» suena más idiomático y mantiene la hostilidad estratégica implícita en la construcción hebrea.
