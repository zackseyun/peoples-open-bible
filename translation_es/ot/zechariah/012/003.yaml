revisions:
- from: 'Y sucederá en aquel día: haré de Jerusalén una piedra pesada[a] para todos los pueblos. Todos los que la carguen[b] se lastimarán gravemente, y todas las naciones de la tierra se juntarán contra ella[c].'
  to: En aquel día haré de Jerusalén una piedra pesada[a] para todos los pueblos. Todos los que la carguen[b] se lastimarán gravemente[c], y todas las naciones de la tierra se reunirán contra ella[d].
  rationale: 'La revisión mantiene el sentido del borrador pero corrige tres puntos: hace más idiomático el arranque profético en español, añade la nota necesaria para la intensificación hebrea de la lesión, y corrige la nota final para que refleje la alternativa real documentada (''del país'' en vez de repetir ''de la tierra''). También ajusta «se juntarán» a «se reunirán» por mejor naturalidad y registro.'
  reviewer_model: gpt-5.4
