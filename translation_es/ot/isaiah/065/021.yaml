translation:
  language: es
  text: Construirán casas y vivirán en ellas[a]; plantarán viñedos y comerán su fruto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más formalmente, «habitarán en ellas».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «su fruto», referido a los viñedos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנוּ
  english_pob_choice: they will build
  chosen_spanish: Construirán
  alternatives_spanish:
  - Edificarán
  - Van a construir
  lexicon: HALOT
  rationale: El hebreo perfecto con waw consecutiva funciona proféticamente con sentido futuro; en español, el futuro simple comunica bien la promesa. «Construirán» conserva el sentido concreto de בנה sin volverlo demasiado técnico.
- source_word: בָתִּים
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - viviendas
  - hogares
  lexicon: HALOT
  rationale: «Casas» es el equivalente más directo y concreto de בָתִּים. «Viviendas» es más formal, y «hogares» añade una connotación afectiva no explícita en el hebreo.
- source_word: וְיָשָׁבוּ
  english_pob_choice: live in them / inhabit them
  chosen_spanish: habitarán en ellas
  alternatives_spanish:
  - vivirán en ellas
  - morarán en ellas
  lexicon: HALOT
  rationale: La nota inglesa preserva la alternativa más formal «inhabit them». En español, «habitarán en ellas» mantiene esa formalidad y el valor de ישב sin perder naturalidad. «Vivirán en ellas» es más corriente, pero menos marcado.
- source_word: וְנָטְעוּ
  english_pob_choice: they will plant
  chosen_spanish: plantarán
  alternatives_spanish:
  - sembrarán
  - van a plantar
  lexicon: HALOT
  rationale: נטע significa plantar. «Plantarán» conserva el futuro profético y el acto concreto de establecer viñas.
- source_word: כְרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñas
  alternatives_spanish:
  - viñedos
  - viñas de uva
  lexicon: HALOT
  rationale: Aunque «viñedos» es correcto, «viñas» suele sonar más bíblico y mantiene la imagen agrícola. En este contexto, el sentido colectivo de כרמים queda suficientemente claro por el paralelismo con «su fruto».
- source_word: וְאָכְלוּ
  english_pob_choice: eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comerán de
  - disfrutarán
  lexicon: HALOT
  rationale: אכל es «comer». «Comerán» conserva la concreción del texto y evita suavizarlo con «disfrutarán», que sería interpretativo.
- source_word: פִּרְיָם
  english_pob_choice: their fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - el fruto de ellas
  - su produce
  lexicon: HALOT
  rationale: La nota inglesa aclara que el posesivo se refiere a las viñas. En español, «su fruto» conserva la referencia posesiva y suena natural; el antecedente se entiende por contexto. «El fruto de ellas» sería más explícito, pero menos fluido.
theological_decisions:
- issue: Tiempo verbal profético
  english_pob_reading: Render the Hebrew perfects as future promises
  chosen_spanish_reading: Usar futuro simple para expresar promesa profética
  alternative_spanish_readings:
  - mantener pasado simple
  - usar presente profético
  rationale: El hebreo presenta la acción como una promesa de restauración futura. El futuro simple en español comunica mejor esa esperanza sin borrar el valor profético del original.
  doctrine_reference: Principio de primacía del texto original y equivalencia óptima; contexto de restauración futura en Isaías 65
- issue: Referencia del posesivo en «su fruto»
  english_pob_reading: Hebrew 'their fruit,' referring to the vineyards.
  chosen_spanish_reading: Conservar «su fruto» con antecedente contextual en las viñas
  alternative_spanish_readings:
  - «el fruto de ellas»
  - «su produce»
  rationale: La posesión en hebreo apunta a los viñedos/viñas. En español, el antecedente queda claro por el paralelismo inmediato; añadir una glosa dentro del texto rompería el ritmo y sería más explicativo que el original.
  doctrine_reference: Respeto a la ambigüedad controlada del hebreo y a la economía poética del paralelismo
translation_notes:
  revision_awareness: Sin cambios respecto al pasaje base auditado en inglés; se mantiene la misma lectura de futuro profético y la misma aclaración léxica sobre «su fruto», adaptadas con equivalencia natural al español.
  spanish_consistency_notes:
  - 'Se preservó el paralelismo de dos miembros: construir/habitar y plantar/comer.'
  - Se evitó «SEÑOR» u otra sustitución teológica porque este versículo no contiene el Tetragrámaton.
  - Se eligió «habitar» para reflejar la nota inglesa sobre la alternativa más formal, sin perder comprensibilidad en español.
  - Se mantuvo la referencia posesiva de «su fruto» sin expandirla dentro del cuerpo principal para conservar la concisión poética.
