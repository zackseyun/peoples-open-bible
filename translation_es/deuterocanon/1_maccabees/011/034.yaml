translation:
  language: es
  text: Por tanto, hemos confirmado para ellos los límites de Judea y los tres distritos[a] —Afairema, Lod y Ramataim—, que fueron añadidos a Judea desde Samaria, y todo lo que está unido a ellos[b], para todos los que ofrecen sacrificios en Jerusalén, en lugar de los tributos reales que el rey solía recibir de ellos cada año, del producto de la tierra y de los árboles frutales[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego νομοὺς se refiere literalmente a distritos administrativos; en estudios más antiguos a veces se deja como «nomos».
    reason: lexical_alternative
  - marker: b
    text: La expresión griega es amplia y puede abarcar dependencias, aldeas, tierras u otros anexos asociados a los tres distritos.
    reason: lexical_alternative
  - marker: c
    text: 'O: «de los frutos de los árboles». El griego puede referirse de manera amplia al producto de los árboles, incluyendo fruta o nueces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστήκαμεν
  english_pob_choice: we have confirmed
  chosen_spanish: hemos confirmado
  alternatives_spanish:
  - hemos establecido
  - hemos fijado
  - hemos instituido
  lexicon: LSJ
  rationale: El perfecto de ἵστημι aquí expresa la puesta en vigor o confirmación de un arreglo administrativo. «Hemos confirmado» conserva ese sentido jurídico/decreto mejor que un verbo más físico como «poner» o más genérico como «establecer».
- source_word: τὰ ὅρια
  english_pob_choice: the borders
  chosen_spanish: los límites
  alternatives_spanish:
  - las fronteras
  - los linderos
  lexicon: LSJ
  rationale: En contexto político-administrativo, ὅρια puede referirse a fronteras o límites. «Límites» es natural en español y suficientemente amplio para el reajuste territorial.
- source_word: τοὺς τρεῖς νομοὺς
  english_pob_choice: the three districts
  chosen_spanish: los tres distritos
  alternatives_spanish:
  - los tres nomos
  - las tres regiones administrativas
  lexicon: LSJ
  rationale: Νομός en uso helenístico designa una división administrativa. «Distritos» comunica ese valor con claridad en español; «nomos» sería demasiado técnico para el texto principal.
- source_word: Ἀφαίρεμα καὶ Λυδδὰ καὶ Ραμαθείμ
  english_pob_choice: Aphairema and Lydda and Ramathaim
  chosen_spanish: Afaira, Lod y Ramataim
  alternatives_spanish:
  - Afairema, Lida y Ramataim
  - Afaira, Lydda y Ramataim
  lexicon: policy transliteration
  rationale: Son nombres propios geográficos; se transliteran según la política del proyecto. Se ajusta la forma española para una lectura más natural y consistente con usos hispanos habituales cuando existen.
- source_word: προσετέθησαν τῇ Ἰουδαίᾳ ἀπὸ τῆς Σαμαρίτιδος
  english_pob_choice: which were added to Judea from Samaria
  chosen_spanish: que fueron añadidos a Judea desde Samaria
  alternatives_spanish:
  - que fueron anexados a Judea desde Samaria
  - que se incorporaron a Judea desde Samaria
  lexicon: LSJ
  rationale: El pasivo indica transferencia o adición administrativa. «Fueron añadidos» preserva el mecanismo sin sobreinterpretar una anexión política más fuerte.
- source_word: πάντα τὰ συγκυροῦντα αὐτοῖς
  english_pob_choice: all that adjoins them
  chosen_spanish: todo lo que les corresponde
  alternatives_spanish:
  - todo lo que les adhiere
  - todo lo que está unido a ellos
  - todo lo que les pertenece
  lexicon: LSJ
  rationale: La expresión griega es amplia y puede incluir dependencias, tierras o anexos asociados. «Les corresponde» mantiene la amplitud sin fijar indebidamente una sola clase de dependencia; la nota aclara la alternativa geográfica de «adjudicado/adyacente».
- source_word: πᾶσιν τοῖς θυσιάζουσιν εἰς Ἰερουσαλήμ
  english_pob_choice: for all who offer sacrifice in Jerusalem
  chosen_spanish: para todos los que ofrecen sacrificios en Jerusalén
  alternatives_spanish:
  - para todos los que sacrifican en Jerusalén
  - para todos los adoradores en Jerusalén
  lexicon: LSJ
  rationale: θυσιάζω significa ofrecer sacrificio, no meramente adorar. Se mantiene el valor sacrificial explícito y la preposición de beneficiarios del decreto.
- source_word: ἀντὶ τῶν βασιλικῶν
  english_pob_choice: instead of the royal taxes
  chosen_spanish: en lugar de los tributos reales
  alternatives_spanish:
  - en vez de los impuestos reales
  - en lugar de los derechos reales
  lexicon: LSJ
  rationale: τὰ βασιλικά se refiere a ingresos o derechos reales. «Tributos reales» es idiomático y conserva el contexto fiscal.
- source_word: ὧν ἐλάμβανεν ὁ βασιλεὺς παρʼ αὐτῶν τὸ πρότερον
  english_pob_choice: that the king formerly received from them
  chosen_spanish: que el rey solía recibir de ellos
  alternatives_spanish:
  - que el rey recibía antes de ellos
  - que el rey había recibido de ellos anteriormente
  lexicon: LSJ
  rationale: El imperfecto con τὸ πρότερον expresa cobro habitual previo. «Solía recibir» transmite bien la costumbre pasada sin alargar la frase.
- source_word: κατʼ ἐνιαυτόν
  english_pob_choice: each year
  chosen_spanish: cada año
  alternatives_spanish:
  - anualmente
  - año tras año
  lexicon: LSJ
  rationale: Expresión distributiva temporal estándar; «cada año» es natural y exacta.
- source_word: τῶν γενημάτων τῆς γῆς
  english_pob_choice: the produce of the land
  chosen_spanish: del producto de la tierra
  alternatives_spanish:
  - de la producción de la tierra
  - de las cosechas de la tierra
  lexicon: LSJ
  rationale: Γενήματα denota producto o rendimiento. «Producto de la tierra» es amplio y fiel, sin restringirlo solo a cereales o cosechas.
- source_word: τῶν ἀκροδρύων
  english_pob_choice: the fruit trees
  chosen_spanish: de los árboles frutales
  alternatives_spanish:
  - de los frutos de los árboles
  - de la fruta de los árboles
  lexicon: LSJ
  rationale: 'Ἀκρόδρυα puede referirse al producto de los árboles, incluyendo frutos o nueces. «Árboles frutales» funciona bien en español como referencia al origen del rendimiento. '
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del inglés evitando una separación excesiva en la lista geográfica, sustituyendo la idea anterior de «pertenece con ellos» por una formulación más amplia y natural en español, y manteniendo el cierre fiscal con un equivalente idiomático. También se corrigió la representación de los elementos con anclaje para que cada nota aparezca exactamente en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva el valor administrativo de νομός con «distritos», coherente con el audit trail inglés.
  - Se usa un estilo sobrio y legible para español bíblico moderno, sin calco mecánico del inglés.
  - Los nombres propios se transliteran de forma consistente y no se intentan traducir.
