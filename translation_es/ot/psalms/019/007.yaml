translation:
  language: es
  text: Su salida es desde un extremo de los cielos[a], y su recorrido hasta sus extremos[b], y nada queda oculto de su calor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su surgir». El hebreo también puede significar «su salida» o «su emerger»; el término puede referirse a la aparición del sol o a su punto de salida.
    reason: lexical_alternative
  - marker: b
    text: O «su curso». El hebreo resalta el trayecto completo del sol por el cielo.
    reason: lexical_alternative
  - marker: c
    text: Lit. «de su calor». El hebreo dice «su» con referencia al sol; en español se mantiene una forma natural sin forzar una personificación mayor.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְצֵה הַשָּׁמַיִם
  english_pob_choice: from one end of the heavens
  chosen_spanish: desde un extremo de los cielos
  alternatives_spanish:
  - desde el extremo de los cielos
  - desde un extremo del cielo
  lexicon: HALOT
  rationale: קָצֶה expresa un extremo o borde; el preverbio מִ marca origen. «Desde un extremo» conserva el valor espacial y poético. «Cielos» mantiene el plural hebreo שָׁמַיִם y el registro elevado del verso.
- source_word: מוֹצָאוֹ
  english_pob_choice: its rising
  chosen_spanish: su salida
  alternatives_spanish:
  - su salida a la luz
  - su salida, su aparición
  - su levantarse
  lexicon: HALOT
  rationale: מוֹצָא puede significar salida, salida a la luz o surgimiento. En este contexto solar, «su salida» comunica bien el movimiento del sol sin sobretraducirlo. Se evita «rising» literal por naturalidad del español, pero se conserva la imagen de salida o surgimiento.
- source_word: וּתְקוּפָתוֹ
  english_pob_choice: and its circuit
  chosen_spanish: su recorrido
  alternatives_spanish:
  - su curso
  - su circuito
  - su giro
  lexicon: HALOT
  rationale: תְּקוּפָה puede denotar circuito, curso o vuelta. «Recorrido» transmite el avance del sol por el cielo con claridad idiomática. Se mantiene la idea de movimiento circular o completo sin imponer un término técnico demasiado rígido.
- source_word: עַל קְצוֹתָם
  english_pob_choice: to their ends
  chosen_spanish: hasta sus extremos
  alternatives_spanish:
  - hasta los extremos de ellos
  - sobre sus extremos
  lexicon: HALOT
  rationale: El complemento con עַל aquí expresa alcance/extensión del recorrido. «Hasta sus extremos» reproduce la dirección y el límite final del trayecto, manteniendo la referencia al plural «cielos».
- source_word: וְאֵין נִסְתָּר
  english_pob_choice: and nothing is hidden
  chosen_spanish: y nada está escondido
  alternatives_spanish:
  - y nada queda oculto
  - y no hay cosa escondida
  lexicon: HALOT
  rationale: אֵין + participio pasivo expresa inexistencia de algo oculto. «Nada está escondido» es natural en español y conserva el alcance universal del enunciado.
- source_word: מֵחַמָּתוֹ
  english_pob_choice: from its heat
  chosen_spanish: de su calor
  alternatives_spanish:
  - de su ardor
  - de su calor intenso
  - de su calentura
  lexicon: HALOT
  rationale: חַמָּה aquí se refiere al calor del sol. «Calor» es la opción más clara y digna en español. Se prefiere «de su calor» para mantener el referente solar sin masculinizarlo en la redacción principal.
theological_decisions:
- issue: Personificación del sol y uso del pronombre en español
  english_pob_reading: Use neuter English pronouns ('its') while preserving the poetic description of the sun's movement.
  chosen_spanish_reading: 'Conservar el referente implícito del sol con posesivos neutros en español: «su salida», «su recorrido», «su calor».'
  alternative_spanish_readings:
  - usar «su» con una nota explícita de que el referente es el sol
  - usar «de él» o «su» masculinos para reflejar el género gramatical hebreo
  rationale: El hebreo usa sufijos masculinos por el género gramatical de «sol», pero el español normalmente nombra al sol de forma neutra en posesivos contextuales. Mantener «su» evita introducir una personificación extraña o forzada y preserva el tono poético sin alterar la referencia a la creación.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Coincide con el pasaje fuente sin revisiones aplicadas en el expediente más reciente; la formulación española sigue la lectura estable del audit trail inglés y no introduce cambios textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «cielos» en plural para reflejar שָׁמַיִם.
  - Se evitó «SEÑOR» o terminología cultual ajena porque el verso describe al sol, no un nombre divino.
  - «Calor» se prefirió sobre «ardor» o «calentura» por registro literario y claridad.
  - 'La sintaxis conserva paralelismo poético: salida / recorrido / nada escondido.'
