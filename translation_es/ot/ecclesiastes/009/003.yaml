  yaml_path: translation/ot/ecclesiastes/009/003.yaml
  text: 'This is the evil in all that is done under the sun: that one fate comes to all[a]. Also, the heart of the sons of man is full of evil, and madness is in their hearts during their lives—and afterward[c][b], they go to the dead.'
  footnotes:
  - marker: a
    text: Or 'the heart of humankind' / 'the human heart.' The Hebrew phrase 'the sons of man' uses masculine representative language for humanity in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'that the same event happens to all.' The Hebrew מִקְרֶה can mean what befalls a person, an event, or a common fate.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew is abrupt: literally, ''and after it, to the dead.'' This likely means that after life, people go to the dead.'
    reason: lexical_alternative
