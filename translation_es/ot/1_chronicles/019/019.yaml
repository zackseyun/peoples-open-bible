translation:
  language: es
  text: Cuando los siervos de Hadadézer vieron que habían sido derrotados delante de Israel, hicieron la paz con David y lo sirvieron. Y Aram ya no quiso ayudar a los hijos de Amón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los amonitas' para 'los hijos de Amón'. La expresión hebrea es literalmente 'hijos de Amón' y funciona como designación étnica.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - sirvientes
  - esclavos
  - vasallos
  lexicon: HALOT
  rationale: En este contexto real y político, el término designa a los subordinados o funcionarios de Hadadézer. 'Siervos' conserva la subordinación sin imponer la idea de esclavitud física, que sería más fuerte de lo que exige el pasaje.
- source_word: נִגְּפוּ
  english_pob_choice: had been defeated
  chosen_spanish: habían sido derrotados
  alternatives_spanish:
  - habían sido vencidos
  - habían sido abatidos
  - habían sido derrotados en batalla
  lexicon: HALOT
  rationale: El nifal expresa una derrota militar sufrida por ellos. 'Habían sido derrotados' es natural en español y conserva el sentido bélico sin añadir matices no explicitados por el hebreo.
- source_word: לִפְנֵי יִשְׂרָאֵל
  english_pob_choice: before Israel
  chosen_spanish: delante de Israel
  alternatives_spanish:
  - ante Israel
  - frente a Israel
  - a manos de Israel
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'delante de la cara de Israel'. 'Delante de Israel' preserva la imagen espacial del original en un español claro. Se evita reemplazarla por una construcción más interpretativa como 'a manos de Israel'.
- source_word: וַיַּשְׁלִימוּ עִם דָּוִיד
  english_pob_choice: made peace with David
  chosen_spanish: hicieron paz con David
  alternatives_spanish:
  - hicieron la paz con David
  - se reconciliaron con David
  - llegaron a un acuerdo con David
  lexicon: HALOT
  rationale: El hifil de שלם con עִם comunica concluir paz o arreglar relaciones. 'Hicieron paz con David' sigue de cerca la fórmula hebrea y evita cargar el verso con un matiz diplomático más amplio de lo que el texto dice.
- source_word: וַיַּעַבְדֻהוּ
  english_pob_choice: served him
  chosen_spanish: lo sirvieron
  alternatives_spanish:
  - se sometieron a él
  - se hicieron sus siervos
  - le prestaron servicio
  lexicon: HALOT
  rationale: Aquí עבד expresa sujeción política posterior a la paz. 'Lo sirvieron' conserva la relación de subordinación y mantiene la misma raíz semántica que el sustantivo anterior.
- source_word: אָבָה
  english_pob_choice: was willing
  chosen_spanish: quiso
  alternatives_spanish:
  - estuvo dispuesto
  - estuvo ya dispuesto
  - se negó a
  lexicon: HALOT
  rationale: Con la negación y עוֹד, el sentido es que Aram dejó de estar dispuesto a prestar ayuda. En español, 'ya no quiso' reproduce bien la falta de voluntad sin perder naturalidad.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  - los arameos
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo, conforme a la línea editorial de transliterar במקום de sustituir por etiquetas geopolíticas tradicionales. 'Aram' mantiene la forma del texto fuente y su valor histórico-literario.
- source_word: לְהוֹשִׁיעַ
  english_pob_choice: to help
  chosen_spanish: ayudar
  alternatives_spanish:
  - socorrer
  - salvar
  - dar ayuda a
  lexicon: HALOT
  rationale: En este contexto militar, el verbo apunta a acudir en auxilio de los ammonitas, no a una salvación en sentido teológico. 'Ayudar' transmite bien ese apoyo bélico/político sin sobredeterminar el verbo.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los ammonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Se mantiene la expresión literal del hebreo, que funciona como designación étnica. 'Hijos' respeta la forma fuente y evita neutralizar sin necesidad un giro que el texto conserva de manera estable.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - nunca más
  - todavía no
  lexicon: HALOT
  rationale: Con negación, עוֹד expresa 'ya no' / 'no más' en valor durativo. 'Ya no' es la forma más natural en español y mantiene el sentido temporal de cese.
theological_decisions:
- issue: Designación étnica literal 'hijos de Amón' frente al etnónimo idiomático
  english_pob_reading: The main text keeps 'the sons of Ammon'; a footnote notes that 'the Ammonites' is a legitimate lexical equivalent.
  chosen_spanish_reading: El texto principal mantiene 'los hijos de Amón'; la nota aclara que puede entenderse como 'los ammonitas'.
  alternative_spanish_readings:
  - los ammonitas
  - el pueblo de Amón
  rationale: 'No hay una tensión doctrinal, pero sí una decisión lexical relevante: el hebreo usa una expresión filial que funciona como etnónimo. Mantenerla en el texto principal preserva la forma fuente; la nota ofrece el equivalente idiomático para lectura natural.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el estado más reciente del POB en inglés, que no registra revisiones aplicadas y fue verificado con acuerdo alto. La fraseología española se ajustó directamente al hebreo y al análisis léxico auditado, sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se conserva 'Aram' como nombre propio transliterado, coherente con el tratamiento POB del hebreo.
  - Se usa 'hijos de Amón' en el texto principal por fidelidad formal, con nota para la alternativa idiomática 'ammonitas'.
  - '''Hicieron paz con David'' reproduce la fórmula del hebreo y evita una paráfrasis diplomática más amplia.'
  - '''Lo sirvieron'' mantiene la relación de sujeción política expresada por el verbo עבד.'
