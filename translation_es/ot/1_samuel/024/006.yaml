  revision_rationale: Se cambió «esquina» por «borde» para una expresión más natural en español para una prenda, manteniendo el sentido de כָּנָף y dejando las otras posibilidades en nota. También se ajustó «por haber cortado» a «porque había cortado» para reflejar más directamente la causalidad de עַל אֲשֶׁר y el anterior perfecto del inglés auditado. La nota a se afinó para reflejar mejor «troubled conscience».
