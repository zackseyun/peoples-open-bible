    reason: lexical_alternative
  - marker: b
    text: O “sostenga un huso”; algunos entienden la frase como “se apoye en un bastón”.
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota [a] para anclarla correctamente en ‘leproso’. Además, se ajustó ‘y nunca sea cortado de la casa de Joab’ a ‘y que nunca falte de la casa de Joab’ para lograr un español más natural, manteniendo el sentido imprecatorio de que tales aflicciones nunca cesen en la casa de Joab. Se conservaron las decisiones léxicas principales y las notas alternativas pertinentes.
