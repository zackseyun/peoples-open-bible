  - Se evita “Cristo”/“Mesías” porque el versículo no contiene ese léxico.
  - “Varones” y “hombres” se distinguen de forma deliberada para reflejar ἀρρένων/ἀνδρῶν.
  - “Fortaleza” y “perseverancia” preservan el campo semántico de καρτερία/ὑπομονή sin suavizarlo.
