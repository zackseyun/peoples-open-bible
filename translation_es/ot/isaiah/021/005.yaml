revisions:
- from: Ponen la mesa[a], extienden las alfombras, comen, beben. ¡Levántense, príncipes[b]; unjan el escudo!
  to: Ponen la mesa[a], extienden las alfombras, comen, beben. Levántense, príncipes[b]; aceiten el escudo.
