translation:
  language: es
  text: Cuando llegó al cerro[a], tomó los regalos de sus manos[b] y los depositó en la casa[c]. Luego despidió a los hombres, y se fueron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'el montículo' o 'el cerro fortificado'; el hebreo dice 'el Ofel'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: ''de su mano''; aquí tiene sentido idiomático de recepción directa, expresado naturalmente en español como ''de sus manos''.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''los guardó'' o ''los puso a resguardo en la casa''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹפֶל
  english_pob_choice: the hill
  chosen_spanish: el cerro
  alternatives_spanish:
  - el montículo
  - la colina
  - el Opel
  lexicon: HALOT
  rationale: 'עֹפֶל puede referirse a una elevación, montículo o cerro fortificado. En español, ''cerro'' comunica de forma natural una elevación topográfica sin introducir un nombre propio que el hebreo aquí no exige. ''El Ophel'' se evita por la misma razón que en el audit trail inglés: el contexto narrativo favorece un sentido topográfico.'
- source_word: מִיָּדָם
  english_pob_choice: from their hand
  chosen_spanish: de sus manos
  alternatives_spanish:
  - de ellos
  - de su mano
  lexicon: HALOT
  rationale: El hebreo usa 'mano' en singular con sufijo plural, un giro idiomático que expresa recepción directa. En español, 'de sus manos' conserva la imagen concreta y refleja mejor el plural indicado por la revisión inglesa, además de sonar natural.
- source_word: וַיִּפְקֹד
  english_pob_choice: deposited
  chosen_spanish: los depositó
  alternatives_spanish:
  - los guardó
  - los puso a resguardo
  - los almacenó
  lexicon: HALOT
  rationale: פקד tiene un campo semántico amplio; en este contexto, la acción es poner en custodia dentro de la casa lo recibido. 'Depositar' mantiene la idea de colocar algo en resguardo sin sobrecargar el verso con una paráfrasis explicativa.
- source_word: בַּבָּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en la vivienda
  - dentro de la casa
  lexicon: HALOT
  rationale: בית aquí es el lugar físico donde se colocaron los bienes. 'En la casa' es la traducción directa y clara en español.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los hombres de la comitiva
  - los siervos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'los hombres'. Aunque el contexto sugiere acompañantes de Naamán, el texto no usa un término más específico para 'siervos', por lo que se conserva la forma léxica.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se incorporó la revisión que aclara el plural de 'sus manos' en vez de un singular literal. También se conservó la tensión léxica de פקד con una opción contextual ('depositó') y se mantuvo la referencia topográfica de הָעֹפֶל sin convertirla en nombre propio.
  spanish_consistency_notes:
  - Se usa 'cerro' para un relieve topográfico claro y actual, evitando una transliteración innecesaria.
  - Se mantiene 'casa' como lugar físico, no como 'hogar' o 'familia', porque el contexto es locativo.
  - '''Hombres'' conserva el valor léxico del hebreo sin añadir una precisión no expresada explícitamente.'
  - La puntuación separa acciones sucesivas con ritmo narrativo breve, acorde al hebreo waw-consecutivo.
