id: ROM.5.14
reference: Romans 5:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ ἐβασίλευσεν ὁ θάνατος ἀπὸ Ἀδὰμ μέχρι Μωϋσέως καὶ ἐπὶ τοὺς μὴ ἁμαρτήσαντας ἐπὶ τῷ ὁμοιώματι τῆς παραβάσεως Ἀδάμ, ὅς ἐστιν τύπος τοῦ μέλλοντος.
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/014.yaml
  text: Yet death reigned from Adam until Moses[a], even over those who did not sin in the likeness of Adam’s transgression[b], who is a type of the coming one.
  footnotes:
  - marker: a
    text: Or 'pattern' or 'foreshadowing' for 'type.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one to come.' The referent in context is Christ.
    reason: alternative_reading
translation:
  language: ko
  text: 그러나 아담으로부터 모세까지, 아담의 범죄의 모양과 같이 죄짓지 아니한 사람들에게까지도 죽음이 왕 노릇 하였습니다. 아담은 오실 분의 모형입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐβασίλευσεν
  english_pob_choice: reigned
  chosen_korean: 왕 노릇 하였습니다
  alternatives_korean:
  - 통치하였습니다
  - 다스렸습니다
  lexicon: BDAG
  rationale: 죽음을 군왕으로 의인화한 바울의 수사를 보존.
- source_word: Ἀδάμ
  english_pob_choice: Adam
  chosen_korean: 아담
  lexicon: BDAG
  rationale: 고유명 표준.
- source_word: Μωϋσέως
  english_pob_choice: Moses
  chosen_korean: 모세
  lexicon: BDAG
  rationale: 표준.
- source_word: παραβάσεως
  english_pob_choice: transgression
  chosen_korean: 범죄
  alternatives_korean:
  - 위반
  lexicon: BDAG
  rationale: 명령의 경계를 넘는 행위. 「범죄」가 자연스러움.
- source_word: τύπος
  english_pob_choice: type
  chosen_korean: 모형
  alternatives_korean:
  - 예표
  - 원형
  lexicon: BDAG
  rationale: 유형론적 의미를 보존하는 「모형」.
- source_word: τοῦ μέλλοντος
  english_pob_choice: the coming one
  chosen_korean: 오실 분
  lexicon: BDAG
  rationale: 미래의 대표적 인물(메시아)을 가리킴.
theological_decisions:
- issue: τοῦ μέλλοντος의 지시 대상
  chosen_reading: 본문에 「메시아」 첨가 없이 「오실 분」으로 유지
  alternative_readings:
  - 「오실 메시아」로 명시
  rationale: 바울이 의도한 유형론을 보존하되 본문에 「메시아」를 추가하지 않음으로써 본문의 함축을 유지.
  doctrine_reference: 'DOCTRINE.md: Do not import doctrinal claims the text does not make'
