review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura acusatoria del hebreo: הָאִישׁ como referencia a Saúl, כִּלָּנוּ como «nos consumió», דִּמָּה לָנוּ con sentido hostil, y la cláusula final sobre su intento de eliminar a los gabaonitas de la tierra de Israel. Sin embargo, los marcadores de notas están cruzados respecto de su contenido, y hay pequeños problemas formales que afectan fidelidad documental y legibilidad.'
  spanish_quality_summary: El español es generalmente claro y digno. «maquinó contra nosotros» y «fuéramos destruidos» funcionan bien. No obstante, la nota a dice «devisó», forma incorrecta en español; además, el texto ancla [a] al rey cuando la nota trata de «maquinó contra nosotros», y [b] se ancla a «contra nosotros» cuando la nota trata de la cláusula final. También conviene suavizar «impidiéndosenos» con una redacción más natural.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas: «nos consumió», «maquinó contra nosotros», «fuéramos destruidos», «territorio de Israel». La única excepción es corregir el alternante «devisó» a «ideó» o «tramó».'
  issues:
  - severity: medium
    issue: Los marcadores de notas al pie están invertidos respecto del contenido de las notas.
    rationale: En el texto, [a] aparece tras «rey», pero la nota a explica una alternativa para דִּמָּה לָנוּ («maquinó contra nosotros»). La nota b explica מֵהִתְיַצֵּב, por lo que debe anclarse en la cláusula final, no en «contra nosotros». Esto rompe la trazabilidad del audit trail.
  - severity: medium
    issue: La nota usa «devisó», que no es forma estándar adecuada en español.
    rationale: El inglés usa «devised» como alternativa, pero en español «devisó» no es natural ni recomendable en una Biblia de lectura amplia. «Ideó» o «tramó» preservan el sentido.
  - severity: low
    issue: «impidiéndosenos permanecer» es comprensible pero algo forzado.
    rationale: Una formulación como «para que fuéramos destruidos y no pudiéramos permanecer» expresa mejor la relación de propósito/resultado y la idea de exclusión del territorio sin perder el sentido del hebreo.
  - severity: low
    issue: 'El campo de decisión léxica para מֵהִתְיַצֵּב contiene una forma errónea: «impidiéndoseos permanecer».'
    rationale: Es inconsistente con el texto y con la primera persona plural del pasaje; debe ser «impidiéndosenos» o una reformulación equivalente.
  revised_spanish_text: 'Ellos dijeron al rey: «El hombre que nos consumió, y que maquinó contra nosotros[a], de modo que fuéramos destruidos y no pudiéramos permanecer[b] en todo el territorio de Israel—»'
  revised_footnotes:
