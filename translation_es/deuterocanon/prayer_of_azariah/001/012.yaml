translation:
  language: es
  text: Y no retires tu misericordia de nosotros[a], por amor de Abraham, tu amado, y de Isaac, tu siervo[b], y de Israel, tu santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no apartes tu misericordia de nosotros».'
    reason: lexical_alternative
  - marker: b
    text: «Israel» aquí se refiere al patriarca Jacob bajo su nombre de pacto.
    reason: cross_reference
lexical_decisions:
- source_word: ἀποστήσῃς
  english_pob_choice: withdraw
  chosen_spanish: apartes
  alternatives_spanish:
  - retires
  - quites
  - alejes
  lexicon: BDAG
  rationale: El griego expresa la idea de apartar o retirar algo ya concedido. En español, «no apartes… de nosotros» conserva bien la relación personal y la petición negativa sin sonar forzado.
- source_word: τὸ ἔλεός σου
  english_pob_choice: mercy
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu gracia
  - tu compasión
  lexicon: LEH
  rationale: «Misericordia» es la equivalencia más directa y natural en español para ἔλεος en este contexto de súplica.
- source_word: διὰ
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - por causa de
  - a causa de
  - por el bien de
  lexicon: BDAG
  rationale: Aquí διὰ con acusativo introduce el fundamento de la súplica. «Por amor de» comunica en español la apelación intercesora y reverente sin añadir explicación doctrinal.
- source_word: ἠγαπημένον
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - amado por ti
  - querido
  lexicon: BDAG
  rationale: El participio pasivo indica que Abraham es amado por Dios. En español, «tu amado» es conciso y respeta el tono honorífico.
- source_word: δοῦλόν
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - esclavo
  - servidor
  lexicon: BDAG
  rationale: Aunque δοῦλος puede traducirse «esclavo», aquí el uso es honorífico dentro de la invocación patriarcal. «Siervo» preserva la relación de pertenencia y servicio a Dios en un registro natural para el español bíblico.
- source_word: ἅγιόν
  english_pob_choice: holy one
  chosen_spanish: santo
  alternatives_spanish:
  - el santo
  - consagrado
  lexicon: BDAG
  rationale: El griego funciona aquí como adjetivo sustantivado referido a Israel/Jacob. «Tu santo» mantiene la forma breve del original y su sentido de alguien apartado para Dios.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: LEH
  rationale: Se conserva el nombre de pacto tal como aparece en el griego. En español, «Israel» evita armonizar el texto y respeta la forma elegida en la fuente.
theological_decisions:
- issue: δοῦλος aplicado a Isaac en un contexto patriarcal de honor
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - esclavo
  rationale: El contexto es una invocación reverente de los patriarcas como fundamentos de la súplica. «Siervo» evita sobrecargar el término con el matiz social más duro de «esclavo» y mantiene la función honorífica del título.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent)'
- issue: El valor de διὰ en una oración de intercesión
  english_pob_reading: for the sake of Abraham... and Isaac... and Israel
  chosen_spanish_reading: por amor de Abraham... y de Isaac... y de Israel
  alternative_spanish_readings:
  - porque de Abraham...
  - a causa de Abraham...
  rationale: La petición apela a la relación de Dios con los patriarcas como base para pedir misericordia. «Por amor de» conserva la fuerza intercesora sin convertir la frase en una causalidad meramente explicativa.
  doctrine_reference: DOCTRINE.md §1, §3
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete 1909 y concuerda con el auditorial inglés de la POB. Se mantiene la estructura de súplica negativa, el encadenamiento de los tres patriarcas y la elección contextual de «siervo» para δοῦλος, sin introducir armonizaciones con otras tradiciones textuales.
  spanish_consistency_notes:
  - Se prefirió «misericordia» por ser el equivalente español más directo de ἔλεος en una oración.
  - Se conservó «Israel» y no «Jacob» en el texto principal para respetar el nombre de pacto del griego.
  - «Tu santo» reproduce el valor sustantivado de ἅγιος sin recurrir a un giro más interpretativo.
