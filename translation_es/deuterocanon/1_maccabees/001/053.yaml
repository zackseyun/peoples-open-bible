review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: acción sobre Israel corporativo, ocultamiento, y refugios disponibles para ellos. Sin embargo, «en ocultamiento» no representa de manera natural en español el sentido idiomático de ἐν κρυφίοις, que aquí expresa que los hicieron esconderse / los empujaron a esconderse. También conviene ajustar el verbo principal para reflejar mejor la fuerza contextual que el rastro POB inglés ya entendió como más que un simple «poner».'
  spanish_quality_summary: La frase actual suena poco natural por «en ocultamiento», un giro demasiado calcado y raro en español eclesial general. «Obligaron a Israel a esconderse» comunica con claridad y dignidad el sentido. «En todo refugio que tenían» es aceptable, pero fluye mejor como «en cuanto refugio tenían» o «en todos los refugios que tenían»; dado el singular distributivo griego, «en cuanto refugio tenían» preserva bien la idea sin pesadez.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Israel» está bien preservado como colectivo. La revisión afecta solo naturalidad y precisión léxica de ἔθεντο y ἐν κρυφίοις.
  issues:
  - severity: medium
    issue: «en ocultamiento» es antinatural en español
    rationale: Aunque intenta reflejar la compacidad del griego, no es una expresión normal ni clara en español moderno; ἐν κρυφίοις se entiende mejor como «a esconderse», «en lugares ocultos» o «a ocultarse».
  - severity: medium
    issue: «pusieron» queda demasiado débil en este contexto
    rationale: El griego de por sí puede ser «pusieron», pero el contexto y la auditoría inglesa justifican una formulación más dinámica. En español, «obligaron ... a esconderse» o «empujaron ... a esconderse» expresa mejor el efecto causado sin sobreinterpretar.
  - severity: low
    issue: La nota al pie puede mantenerse, pero debe armonizarse con el texto principal revisado
    rationale: Si el texto principal deja de usar una formulación formalizada, la nota debe seguir presentando la alternativa más literal de modo natural en español.
  revised_spanish_text: Y obligaron a Israel a esconderse[a], en cuanto refugio tenían.
