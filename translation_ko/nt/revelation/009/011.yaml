  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸂ἔχουσιν ἐπ’ αὐτῶν βασιλέα τὸν⸃ ἄγγελον τῆς ἀβύσσου· ὄνομα αὐτῷ Ἑβραϊστὶ Ἀβαδδών ⸂καὶ ἐν⸃ τῇ Ἑλληνικῇ ὄνομα ἔχει Ἀπολλύων.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/009/011.yaml
  text: 'They have over them as king the angel of the abyss[a]. His name in Hebrew is Abaddon[c][b], and in Greek he has the name Apollyon.'
  footnotes:
  - marker: a
    text: Abaddon is a Hebrew name associated with destruction.
    reason: lexical_alternative
  - marker: b
    text: Apollyon is a Greek name meaning 'Destroyer.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the bottomless pit' for 'the abyss.'
    reason: alternative_reading
translation:
  language: ko
  text: '그것들은 자기들 위에 왕을 가지고 있었으니, 곧 무저갱의 천사입니다. 그의 이름은 히브리어로 아바돈[a]이며, 헬라어로는 아폴리온[b]이라는 이름을 가지고 있습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「아바돈」은 히브리어로 「파멸」을 가리키는 이름이다.'
    reason: lexical_alternative
  - marker: b
    text: '「아폴리온」은 헬라어로 「파괴자」를 뜻하는 이름이다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀβαδδών / Ἀπολλύων
  english_pob_choice: Abaddon / Apollyon
  chosen_korean: 아바돈 / 아폴리온
  alternatives_korean:
  - 압바돈 / 아폴류온
  lexicon: BDAG
  rationale: 히브리어/헬라어 본문의 이중 이름을 음역으로 보존하고, 각주에서 의미(파멸/파괴자)를 명시한다.
theological_decisions:
- issue: '9:11의 이중 이름 (히브리어 Ἀβαδδών / 헬라어 Ἀπολλύων) 음역 보존'
  chosen_reading: '「히브리어로 아바돈, 헬라어로 아폴리온」'
  alternative_readings:
  - '「파멸자」로 의역'
  rationale: 본문 자체가 두 언어의 이름을 명시적으로 병치하여 파멸의 본질을 두 언어 권역의 독자에게 동시에 가리킨다. 한국어 번역도 이름은 음역으로 보존하고 각주에 의미(파멸/파괴자)를 둔다.
  doctrine_reference: 'DOCTRINE.md: 고유명사 음역 원칙'
