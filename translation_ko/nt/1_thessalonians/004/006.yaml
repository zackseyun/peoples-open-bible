id: 1TH.4.6
reference: 1 Thessalonians 4:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ μὴ ὑπερβαίνειν καὶ πλεονεκτεῖν ἐν τῷ πράγματι τὸν ἀδελφὸν αὐτοῦ, διότι ἔκδικος ⸀κύριος περὶ πάντων τούτων, καθὼς καὶ προείπαμεν ὑμῖν καὶ διεμαρτυράμεθα.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/006.yaml
  text: that no one should overstep and exploit his brother in this matter[a], because the Lord is an avenger concerning all these things[b], just as we also told you beforehand and solemnly warned you.
  footnotes:
  - marker: a
    text: Or 'defraud his brother in the matter.' The Greek can denote taking advantage of someone, and some understand the phrase more narrowly as fraud; in context, the warning most likely concerns sexual wrongdoing.
    reason: lexical_alternative
  - marker: b
    text: '''His brother'' translates a masculine singular Greek expression. The wording likely focuses on a fellow believer, though the ethical warning may apply more broadly within the community.'
    reason: lexical_alternative
translation:
  language: ko
  text: 또 이 일에서[a] 누구도 자기 형제[b]의 경계를 넘어 그를 이용하지 말아야 합니다. 우리가 이미 여러분에게 말하고 엄히 경고한 대로, 주께서 이 모든 일을 보응하시는 분이시기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「이 문제에서 자기 형제를 속이지 말아야」. 헬라어는 누군가를 이용·착취함을 가리키며, 일부는 본 구절을 더 좁게 「사기」로 해석한다. 본 문맥에서는 성적 부도덕에 대한 경고가 우선적이다.
    reason: lexical_alternative
  - marker: b
    text: 「자기 형제」는 헬라어 남성 단수 표현. 신앙 공동체의 동료를 우선적으로 가리키나, 윤리적 경고는 더 넓게 적용될 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπερβαίνειν καὶ πλεονεκτεῖν
  english_pob_choice: overstep and exploit
  chosen_korean: 경계를 넘어 그를 이용하지
  alternatives_korean:
  - 도를 넘어 그를 착취하지
  - 침범하여 사기 치지
  lexicon: BDAG
  rationale: ὑπερβαίνω의 「경계를 넘음」과 πλεονεκτέω의 「탐욕적 이용·착취」를 함께 옮긴다.
- source_word: ἐν τῷ πράγματι
  english_pob_choice: in this matter
  chosen_korean: 이 일에서
  alternatives_korean:
  - 이 문제에서
  - 이 사안에서
  lexicon: BDAG
  rationale: 앞 절들의 성적 부도덕 정황을 받는 「이 일」.
- source_word: ἔκδικος κύριος
  english_pob_choice: the Lord is an avenger
  chosen_korean: 주께서 ... 보응하시는 분
  alternatives_korean:
  - 주께서 ... 갚으시는 분
  - 주께서 ... 복수하시는 이
  lexicon: BDAG
  rationale: ἔκδικος의 「공의로 갚으심」 의미를 「보응」으로 옮긴다. 「복수」는 한국어에서 사적 감정의 어감이 있어 부적합하다.
- source_word: προείπαμεν ... καὶ διεμαρτυράμεθα
  english_pob_choice: told you beforehand and solemnly warned
  chosen_korean: 이미 ... 말하고 엄히 경고한
  alternatives_korean:
  - 미리 일러두고 엄숙히 경고한
  - 앞서 말하고 단단히 일러둔
  lexicon: BDAG
  rationale: 두 동사를 「말함·경고함」으로 구분하며, διαμαρτύρομαι의 엄숙한 증언적 무게를 「엄히 경고」로 살린다.
