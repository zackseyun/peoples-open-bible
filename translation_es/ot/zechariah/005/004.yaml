translation:
  language: es
  text: Lo he enviado[a] —declara Yahvé de los ejércitos—, y entrará en la casa del ladrón y en la casa del que jura falsamente por mi nombre; y permanecerá dentro de su casa y la consumirá[b], tanto su madera como sus piedras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Lo he hecho salir». El verbo hebreo puede traducirse más literalmente así, pero en este contexto expresa el envío del castigo para ejecutar su obra.
    reason: lexical_alternative
  - marker: b
    text: O «y se alojará» o «y pasará la noche». El verbo hebreo sugiere permanecer en la casa, no solo entrar en ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצֵאתִיהָ
  english_pob_choice: I have sent it out
  chosen_spanish: Lo he enviado
  alternatives_spanish:
  - Lo he hecho salir
  - Lo he sacado
  lexicon: HALOT
  rationale: El hebreo es una forma causativa de יצא con sufijo femenino que retoma el rollo/castigo implícito. En español, «enviado» comunica mejor la idea de despachar una acción judicial al mundo que una versión más mecánica como «he hecho salir», y conserva la agencia divina.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of hosts
  chosen_spanish: —declara Yahvé de los ejércitos—
  alternatives_spanish:
  - —oráculo de Yahvé de los ejércitos—
  - —dice Yahvé de los ejércitos—
  lexicon: HALOT
  rationale: Se conserva la fórmula profética y el nombre divino Yahvé, conforme al criterio del proyecto. «De los ejércitos» mantiene צבאות sin reinterpretarlo como «armies» o «huestes» de modo innecesariamente tradicional.
- source_word: וּבָאָה
  english_pob_choice: and it will enter
  chosen_spanish: y entrará
  alternatives_spanish:
  - y vendrá
  - y se meterá
  lexicon: HALOT
  rationale: Con אֶל + casa, el verbo de venir funciona con valor de ingreso. «Entrará» es la equivalencia española más clara y natural, sin perder el sentido direccional.
- source_word: בֵּית הַגַּנָּב
  english_pob_choice: the house of the thief
  chosen_spanish: la casa del ladrón
  alternatives_spanish:
  - la casa del ratero
  - la casa del robador
  lexicon: HALOT
  rationale: גנב es «thief» en sentido directo. «Ladrón» es la forma más natural y fiel en español, sin debilitar el alcance legal del término.
- source_word: הַנִּשְׁבָּע בִּשְׁמִי לַשָּׁקֶר
  english_pob_choice: the one who swears falsely by my name
  chosen_spanish: el que jura falsamente por mi nombre
  alternatives_spanish:
  - el que perjura por mi nombre
  - el que jura por mi nombre para mentira
  lexicon: HALOT
  rationale: La construcción describe a una persona que invoca el nombre divino con falsedad. «Jura falsamente» mantiene la forma verbal y la gravedad del perjurio; «perjura» es posible, pero algo más marcado y menos transparente para una primera lectura.
- source_word: וְלָנֶה
  english_pob_choice: and it will remain
  chosen_spanish: y permanecerá
  alternatives_spanish:
  - y morará
  - y se alojará
  lexicon: HALOT
  rationale: Aunque el verbo puede sugerir «pasar la noche», aquí la idea contextual es permanencia hasta completar la destrucción. «Permanecerá» preserva esa duración sin reducirla a una sola noche.
- source_word: בְּתוֹךְ בֵּיתוֹ
  english_pob_choice: within his house
  chosen_spanish: dentro de su casa
  alternatives_spanish:
  - en medio de su casa
  - dentro de la casa de él
  lexicon: HALOT
  rationale: «Dentro de su casa» traduce de manera natural בְּתוֹךְ y conserva la localización interna sin añadir matices.
- source_word: וְכִלַּתּוּ
  english_pob_choice: and consume it
  chosen_spanish: y la consumirá
  alternatives_spanish:
  - y la destruirá por completo
  - y la acabará
  lexicon: HALOT
  rationale: כלה en Piel expresa llevar algo a su fin, consumirlo o destruirlo. «La consumirá» sigue de cerca la imagen del juicio activo que devora la casa.
- source_word: עֵצָיו
  english_pob_choice: its timber
  chosen_spanish: con su madera
  alternatives_spanish:
  - con sus maderos
  - con su entramado de madera
  lexicon: HALOT
  rationale: El contexto es constructivo; en español, «madera» comunica el material sin sobre-especificar. Se mantiene la idea de totalidad estructural junto con las piedras.
- source_word: אֲבָנָיו
  english_pob_choice: its stones
  chosen_spanish: y con sus piedras
  alternatives_spanish:
  - y con su cantería
  - y con sus bloques
  lexicon: HALOT
  rationale: La referencia es concreta y material. «Piedras» es la equivalencia más directa y mantiene la imagen de demolición completa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: Se sigue el estándar del proyecto de escribir el Tetragrámaton como Yahvé, en lugar de ocultarlo con una convención litúrgica. Esto preserva el nombre de pacto en el texto español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Finalidad punitiva del sujeto implícito (el rollo/castigo)
  english_pob_reading: it will remain within his house and consume it
  chosen_spanish_reading: permanecerá dentro de su casa y la consumirá
  alternative_spanish_readings:
  - se alojará dentro de su casa y la destruirá
  - quedará en su casa y la acabará
  rationale: El hebreo presenta una acción continua y devastadora. «Permanecerá» y «la consumirá» conservan tanto la permanencia como el efecto destructivo sin suavizar la imagen.
  doctrine_reference: Zacarías 5:4; imagen del juicio divino sobre el robo y el perjurio
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa, que prefirió «within his house» por un registro más formal, y mantiene la estructura final sin cambios sustanciales: envío del castigo, entrada en la casa, permanencia interna y consumo total de la estructura.'
  spanish_consistency_notes:
  - Se usa Yahvé para יְהוָה, conforme al estándar del proyecto.
  - 'Se conserva la progresión verbal: enviado/entrará/permanecerá/consumirá, reflejando la secuencia del hebreo.'
  - «Casa» se mantiene de forma literal para בֵּית, incluyendo la repetición enfática del paralelismo.
  - «Madera» y «piedras» preservan la imagen material de destrucción total.
