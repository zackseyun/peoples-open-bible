translation:
  language: es
  text: Pero los hombres en emboscada[a] se levantaron de sus lugares y entablaron batalla; y todos los que estaban con Jonatán huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “las emboscadas se levantaron”; el griego se refiere al grupo oculto de combatientes, no solo a la táctica.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἔνεδρα
  english_pob_choice: the ambushes
  chosen_spanish: las emboscadas
  alternatives_spanish:
  - los emboscados
  - los hombres en emboscada
  - la emboscada
  lexicon: LSJ
  rationale: El griego plural neutro puede designar la emboscada como acción o a los combatientes ocultos. Siguiendo el audit trail inglés, se conserva el plural concreto en español con 'las emboscadas', que mantiene la fuerza formal y permite entender el sujeto como el grupo oculto que actúa.
- source_word: ἐξανέστησαν
  english_pob_choice: rose up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - salieron
  - se alzaron
  - surgieron
  lexicon: LSJ
  rationale: El verbo expresa el surgimiento desde ocultamiento. 'Se levantaron' es una equivalencia natural en español que conserva la imagen de salir de la ocultación sin añadir matices no atestiguados.
- source_word: ἐκ τῶν τόπων ἑαυτῶν
  english_pob_choice: from their places
  chosen_spanish: de sus lugares
  alternatives_spanish:
  - de sus posiciones
  - desde sus puestos
  lexicon: LSJ
  rationale: τόποι significa 'lugares' o 'posiciones'. 'De sus lugares' sigue de cerca el griego y funciona bien en español sin cargarlo con un tecnicismo militar innecesario.
- source_word: συνῆψαν πόλεμον
  english_pob_choice: joined battle
  chosen_spanish: entablaron batalla
  alternatives_spanish:
  - entraron en combate
  - comenzaron a combatir
  - se unieron para la guerra
  lexicon: LSJ
  rationale: La expresión literalmente es 'unieron/entablaron guerra'. 'Entablaron batalla' reproduce el inicio del enfrentamiento con un giro natural en español y mantiene el valor idiomático militar.
- source_word: οἱ παρὰ Ἰωνάθαν
  english_pob_choice: those with Jonathan
  chosen_spanish: los que estaban con Jonatán
  alternatives_spanish:
  - los de Jonatán
  - los acompañantes de Jonatán
  - los que iban con Jonatán
  lexicon: LSJ
  rationale: παρά con persona indica compañía o adhesión. 'Los que estaban con Jonatán' expresa esa relación sin convertirla en una posesión más fuerte de lo que el griego requiere.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: LSJ
  rationale: Se mantiene el valor enfático del indefinido plural con 'todos', que es la correspondencia directa y natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete 1909 y toma como guía el audit trail inglés, especialmente la decisión de mantener ἔνεδρα como sujeto plural concreto. Se preserva la secuencia de acciones: salida desde ocultamiento, entablar batalla y huida total de los que acompañaban a Jonatán.'
  spanish_consistency_notes:
  - Se usa 'Jonatán' para Ἰωνάθαν, conforme al uso bíblico español estándar.
  - Se mantiene la puntuación con punto y coma para reflejar la estructura breve y encadenada del griego.
  - La nota al pie marca la tensión entre traducción literal y referencia a los combatientes ocultos, siguiendo el aviso del registro inglés.
