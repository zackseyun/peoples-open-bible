translation:
  language: es
  text: Y fue rey en Jesurún[a][b], cuando se reunieron los jefes del pueblo[c], las tribus de Israel unidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé fue rey en Jesurún»; otros entienden: «y él [Moisés] fue rey en Jesurún». El hebreo no identifica explícitamente al sujeto.'
    reason: alternative_reading
  - marker: b
    text: «Jesurún» es un nombre poético para Israel.
    reason: cultural_note
  - marker: c
    text: 'O: «cuando se reunieron los jefes del pueblo, las tribus de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And he was
  chosen_spanish: Y fue
  alternatives_spanish:
  - Y era
  - Y llegó a ser
  lexicon: HALOT
  rationale: El verbo היה en forma narrativa puede expresar estado o entrada en una condición. En este contexto, con el predicado ‘rey’, ‘fue’ mantiene la ambigüedad del hebreo sin forzar una idea de coronación o de cambio de estado que el texto no explicita.
- source_word: בִישֻׁרוּן
  english_pob_choice: in Jeshurun
  chosen_spanish: en Jesurún
  alternatives_spanish:
  - entre Jesurún
  - en Yeshurún
  lexicon: HALOT
  rationale: Se conserva el nombre poético propio del hebreo para Israel. ‘En’ refleja de manera directa el valor locativo de ב, sin convertir la expresión en una paráfrasis interpretativa.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - soberano
  lexicon: HALOT
  rationale: ‘Rey’ es la equivalencia natural y directa del sustantivo. Se evita un término más solemne o interpretativo que alteraría el tono breve del verso.
- source_word: בְּהִתְאַסֵּף
  english_pob_choice: when ... gathered
  chosen_spanish: cuando se reunieron
  alternatives_spanish:
  - al reunirse
  - en la reunión de
  lexicon: HALOT
  rationale: El infinitivo constructo con ב introduce una circunstancia temporal. ‘Cuando se reunieron’ conserva esa relación temporal de modo claro y natural en español.
- source_word: רָאשֵׁי עָם
  english_pob_choice: the heads of the people
  chosen_spanish: los jefes del pueblo
  alternatives_spanish:
  - los cabezas del pueblo
  - los líderes del pueblo
  lexicon: HALOT
  rationale: La imagen literal de ‘cabezas’ en español suena poco idiomática; ‘jefes’ conserva el sentido de dirección y autoridad que el hebreo comunica en esta expresión idiomática.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - juntos
  - a una
  lexicon: HALOT
  rationale: El adverbio expresa unión o simultaneidad. ‘Juntamente’ mantiene el matiz corporativo y enlaza de forma más compacta con el cierre del verso.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: the tribes of Israel as one
  chosen_spanish: las tribus de Israel
  alternatives_spanish:
  - las tribus de Israel como una sola
  - las tribus de Israel juntas
  lexicon: HALOT
  rationale: El hebreo ya deja implícita la unidad en יַחַד; en español se puede expresar con ‘juntamente’ sin añadir una glosa demasiado explicativa al sintagma nominal. Se conserva la referencia tribal y la unidad colectiva del acto.
theological_decisions:
- issue: Sujeto implícito de ‘fue rey’
  english_pob_reading: The main text leaves the subject as 'he' without identifying him explicitly.
  chosen_spanish_reading: El texto español conserva el sujeto implícito mediante la forma verbal y no lo identifica en el cuerpo principal.
  alternative_spanish_readings:
  - Yahvé fue rey en Jesurún
  - Moisés fue rey en Jesurún
  rationale: El hebreo no nombra de forma explícita al sujeto, y la tradición interpretativa discute si se refiere a Yahvé o a Moisés. La traducción mantiene esa tensión textual y no la resuelve dentro del texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Unidad de Israel en la reunión
  english_pob_reading: The gathering is rendered to emphasize unified assembly without over-specifying political structure.
  chosen_spanish_reading: La reunión se expresa como una convocatoria unificada de los jefes y tribus, sin convertirla en una escena institucional más definida de lo que dice el hebreo.
  alternative_spanish_readings:
  - una entronización formal
  - una asamblea del pacto
  rationale: El verso presenta la reunión de los jefes del pueblo y de las tribus de Israel en unidad, pero no desarrolla el marco político o litúrgico. La redacción respeta ese alcance limitado.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió ‘was’ frente a ‘became’ para וַיְהִי. Por eso se eligió ‘fue’ en español en vez de una forma que sugiera cambio de estado. También se respetó la nota de ambigüedad sobre el sujeto y la glosa cultural de Jesurún.
  spanish_consistency_notes:
  - Se usa ‘Jesurún’ como transliteración coherente del nombre poético.
  - Se evita ‘SEÑOR’ para no ocultar la posible referencia a Yahvé; la nota explica la alternativa interpretativa.
  - ‘Jefes del pueblo’ preserva el valor idiomático de ‘heads’ sin perder claridad en español.
  - ‘Juntamente’ comunica la unión del acto colectivo sin sobrecargar el verso con una paráfrasis interpretativa.
