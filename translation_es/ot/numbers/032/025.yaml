translation:
  language: es
  text: 'Entonces los hijos de Gad y los hijos de Rubén dijeron a Moisés: «Tus siervos[a] harán tal como mi señor manda».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tus esclavos». El hebreo puede denotar esclavos o siervos; aquí probablemente funciona como una auto-designación respetuosa ante Moisés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Luego ... dijeron
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva pide una progresión temporal clara; «Entonces» conserva el avance del relato en español sin volverlo mecánico.
- source_word: בְּנֵי גָד וּבְנֵי רְאוּבֵן
  english_pob_choice: the sons of Gad and the sons of Reuben
  chosen_spanish: los hijos de Gad y los hijos de Rubén
  alternatives_spanish:
  - los gaditas y los rubenitas
  - los descendientes de Gad y los descendientes de Rubén
  lexicon: HALOT
  rationale: Se mantiene la construcción hebrea explícita y la designación tribal/familiar, como en el texto fuente y en la POB inglesa.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - hacia Moisés
  lexicon: HALOT
  rationale: Es la equivalencia normal de destino de habla con un verbo de decir; en español «a Moisés» es natural y fiel.
- source_word: עֲבָדֶיךָ
  english_pob_choice: Your servants
  chosen_spanish: Tus esclavos
  alternatives_spanish:
  - Tus siervos
  - Tus servidores
  lexicon: HALOT
  rationale: La POB inglesa documenta la tensión servidumbre/esclavitud y conserva «slaves» como alternativa lexical, aunque interpreta aquí un uso deferente. En español, «esclavos» mantiene esa fuerza léxica; se ancla con nota para reflejar que también puede entenderse como fórmula respetuosa de sumisión ante Moisés.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: exactamente como
  alternatives_spanish:
  - tal como
  - como
  lexicon: HALOT
  rationale: «Exactamente como» preserva la correspondencia fuerte entre mandato y obediencia, y evita una ambigüedad más débil que solo «como».
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor y amo
  - señor mío
  lexicon: HALOT
  rationale: «Mi señor» reproduce el registro deferente dirigido a Moisés sin introducir lenguaje eclesiástico o monárquico ajeno al contexto. «Amo» sería más fuerte, pero menos natural aquí.
- source_word: מְצַוֶּה
  english_pob_choice: commands
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - está mandando
  lexicon: HALOT
  rationale: El participio con fuerza presente en contexto puede expresarse de forma natural con «manda», preservando la obediencia inmediata y la autoridad del mandato.
theological_decisions:
- issue: Tratamiento de עֲבָדֶיךָ como servidumbre deferencial o esclavitud literal
  english_pob_reading: Your servants; lexical note allows ‘your slaves’ as an alternative, but the verse likely uses a respectful self-designation before Moses.
  chosen_spanish_reading: Tus esclavos
  alternative_spanish_readings:
  - Tus siervos
  - Tus servidores
  rationale: La POB inglesa deja abierta la tensión lexical y menciona la posibilidad de ‘slaves’. Para no borrar esa tensión, el texto principal conserva «esclavos»; la nota reconoce que en el discurso funciona como fórmula de sumisión respetuosa ante Moisés, no necesariamente como afirmación jurídica de esclavitud.
  doctrine_reference: 'DOCTRINE.md: Contested terms table on servant/slave principle applied analogically to Hebrew עבד'
- issue: Título respetuoso אֲדֹנִי aplicado a Moisés
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - señor mío
  - mi amo
  rationale: Debe mantenerse el matiz de deferencia humana sin confundirlo con lenguaje divino. «Mi señor» conserva el tono de respeto reconocido en la POB inglesa y evita la máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: respectful address terms; distinction between human honorifics and divine nomenclature'
translation_notes:
  revision_awareness: 'La POB inglesa pasó por una revisión menor: se retiró el ‘saying’ redundante para mayor naturalidad, pero el sentido completo del dicho se preservó. En español se evitó una repetición equivalente y se mantuvo la progresión narrativa, la fórmula de habla y la relación de obediencia con un registro publicable.'
  spanish_consistency_notes:
  - Se usa «hijos de Gad» y «hijos de Rubén» para seguir la estructura hebrea y la POB inglesa, no los etnónimos abreviados.
  - Se traduce יהוה no presente aquí; no aplica máscara de ‘SEÑOR’.
  - Se mantiene «Moisés» y el título deferente «mi señor» sin capitalización especial en el interior de la cita.
  - La puntuación con dos puntos antes de la cita directa respeta el flujo natural del español y preserva la introducción de habla hebrea.
