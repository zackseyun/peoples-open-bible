translation:
  language: es
  text: Pero si se desvían sin intención y no hacen todos estos mandamientos que Yahvé le habló a Moisés,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si yerran» o «si pecan sin intención». El verbo hebreo expresa desviarse o errar, y en este contexto se refiere al incumplimiento involuntario de los mandamientos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  - Y si ocurre que
  lexicon: HALOT
  rationale: La partícula introduce un caso condicional dentro de una instrucción legal. «Pero si» conserva la transición del contexto previo y suena natural en español bíblico moderno.
- source_word: תִשְׁגּוּ
  english_pob_choice: you unintentionally go astray
  chosen_spanish: se desvían sin intención
  alternatives_spanish:
  - yerran sin intención
  - se extravían sin querer
  - cometen un error sin intención
  lexicon: HALOT
  rationale: שׁגה conserva la imagen de apartarse o errar; en contexto legal-priestly expresa una falla involuntaria. «Se desvían sin intención» mantiene la metáfora y la nota de inadvertencia sin sobrecargar con lenguaje técnico ajeno al texto.
- source_word: וְלֹא תַעֲשׂוּ
  english_pob_choice: and do not do
  chosen_spanish: y no hacen
  alternatives_spanish:
  - y no cumplen
  - y no realizan
  - y no observan
  lexicon: HALOT
  rationale: עָשָׂה es amplio («hacer»). En este contexto, «no hacen» sigue de cerca el hebreo y evita una paráfrasis más interpretativa como «cumplir» u «observar».
- source_word: אֵת כָּל הַמִּצְוֺת הָאֵלֶּה
  english_pob_choice: all these commandments
  chosen_spanish: todos estos mandamientos
  alternatives_spanish:
  - todas estas órdenes
  - todos estos preceptos
  - todos estos mandatos
  lexicon: HALOT
  rationale: מִצְוֺת se traduce naturalmente como «mandamientos» en un marco de pacto y ley. «Todos estos» reproduce la fuerza totalizadora de כָּל הָאֵלֶּה.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה אֶל מֹשֶׁה
  english_pob_choice: that Yahweh has spoken to Moses
  chosen_spanish: que Yahvé ha hablado a Moisés
  alternatives_spanish:
  - que Yahvé habló a Moisés
  - que Yahvé le ha hablado a Moisés
  - que Yahvé dijo a Moisés
  lexicon: HALOT
  rationale: El perfecto puede reflejarse con presente perfecto en español para expresar una palabra divina ya pronunciada pero vigente en el marco legal. Se conserva el nombre divino «Yahvé» según la norma del proyecto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. En español, el estándar del proyecto es «Yahvé», para preservar el nombre propio del Dios del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de תִשְׁגּוּ en contexto legal
  english_pob_reading: unintentional go astray / sin unintentionally
  chosen_spanish_reading: se desvían sin intención
  alternative_spanish_readings:
  - yerran sin intención
  - pecan sin intención
  - se extravían sin querer
  rationale: La frase debe conservar la tensión entre error involuntario y transgresión real. «Se desvían sin intención» mantiene el sentido de desviarse/errar sin convertirlo en una interpretación doctrinal más estrecha que la que exige el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «carry out» a «do» para acercarse más al verbo hebreo עשה. La redacción española sigue esa decisión con «no hacen», evitando una paráfrasis explicativa. También se conservó la tensión legal de שׁגה como error involuntario, sin resolverla en una sola glosa doctrinal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene el paralelismo legal del hebreo con una sola oración condicional.
  - «Mandamientos» preserva el registro covenantal y jurídico del término מִצְוֺת.
  - La nota a pie de página ofrece alternativas de traducción sin duplicar el sentido principal del texto.
