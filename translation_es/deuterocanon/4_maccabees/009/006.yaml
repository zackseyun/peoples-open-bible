  yaml_path: translation/deuterocanon/4_maccabees/009/006.yaml
  text: But if the elders of the Hebrews died after enduring tortures because of godliness[a], how much more rightly should we, the young men, die, having disregarded the tortures of your compulsion[b], which the aged instructor also conquered.
  footnotes:
  - marker: a
    text: Or 'for piety.' The Greek εὐσέβεια can denote reverent devotion to God expressed in faithful conduct.
    reason: lexical_alternative
  - marker: b
    text: Or 'the tortures of your coercions/constraints.' The Greek phrase τῶν σῶν ἀναγκῶν is somewhat compressed and refers to the ruler's coercive pressures or forced demands.
    reason: lexical_alternative
