review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la anatomía sacrificial del hebreo: «los dos riñones», «la grasa», «los lomos» y «el apéndice sobre el hígado» reflejan adecuadamente שְׁתֵּי הַכְּלָיֹת, הַחֵלֶב, הַכְּסָלִים y הַיֹּתֶרֶת עַל הַכָּבֵד. También conserva correctamente el sentido procedimental final de עַל הַכְּלָיֹת יְסִירֶנָּה como retiro del apéndice con los riñones. Sin embargo, la secuencia «la grasa que está sobre ellos, sobre los lomos» pierde la segunda cláusula relativa explícita del hebreo («que está sobre ellos, la cual está sobre los lomos») y queda algo abrupta en español.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la coordinación repetida con «y» más la apposición «sobre los lomos» suena trabada. Conviene explicitar la segunda relación con «la cual está sobre los lomos» o equivalente. Además, en este contexto ritual «quitará» funciona, pero «la quitará» mejora la concordancia con el objeto singular gramatical inmediato («el apéndice») que retoma יְסִירֶנָּה.
  glossary_alignment: 'La terminología concuerda con las decisiones del POB: «riñones», «grasa», «lomos», «apéndice», «hígado». La nota alternativa para «lóbulo» está bien conservada. No hay conflictos con la terminología teológica global del proyecto.'
  issues:
  - severity: medium
    issue: La cláusula «sobre los lomos» está demasiado comprimida y no refleja con suficiente claridad el segundo אֲשֶׁר del hebreo.
    rationale: El texto fuente dice literalmente «la grasa que está sobre ellos, que está sobre los lomos». En español actual, dejar solo «sobre los lomos» después de «sobre ellos» puede sonar elíptico y menos preciso de lo deseable.
  - severity: low
    issue: «quitará» puede mejorar a «la quitará» en la cláusula final.
    rationale: Aunque «quitará» no es incorrecto, el hebreo lleva sufijo pronominal singular femenino y en español la referencia inmediata es «el apéndice», por lo que «la quitará junto con los riñones» suena más completo y natural.
  revised_spanish_text: y los dos riñones, y la grasa que está sobre ellos, la cual está sobre los lomos, y el apéndice sobre el hígado[a], la quitará junto con los riñones.
  revised_footnotes:
