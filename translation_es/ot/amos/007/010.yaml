review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Amasías, sacerdote de Betel, envía un mensaje a Jeroboam; acusa a Amós de una conspiración contra el rey dentro de la casa de Israel; y afirma que la tierra no puede soportar todas sus palabras. Sin embargo, la frase «se ha conspirado» no corresponde al uso español natural ni mejora la fidelidad al hebreo קָשַׁר. El hebreo simplemente acusa: «ha conspirado contra ti» o «ha tramado contra ti».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Amós se ha conspirado» es gramaticalmente anómalo y poco legible. Además, la nota b duplica innecesariamente la lectura correcta que debería estar en el texto principal. El resto del verso suena bien; «envió mensaje» y «en medio de la casa de Israel» son aceptables, aunque «envió a decir» sería también natural. «La tierra» es defendible, pero en este contexto político puede seguirse el POB con nota sobre «contener/endurar» en לְהָכִיל más que crear una nota sobre בְּקֶרֶב solamente.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los nombres propios y expresiones clave están bien: «Betel», «Jeroboam», «Israel», «casa de Israel». La principal desalineación es léxica y estilística en קָשַׁר: debe ser «ha conspirado» o «ha tramado», no la forma reflexiva «se ha conspirado».'
  issues:
  - severity: high
    issue: «Amós se ha conspirado» es incorrecto o muy antinatural en español.
    rationale: קָשַׁר עָלֶיךָ significa «ha conspirado contra ti» / «ha tramado contra ti». La forma reflexiva no es idiomática y distorsiona la legibilidad sin aportar el matiz teológico buscado.
  - severity: medium
    issue: La nota b está mal planteada y duplica la mejor lectura para el texto principal.
    rationale: Si el texto principal dice «ha conspirado», la alternativa puede ser «ha tramado». Mantener una nota que corrige un texto principal defectuoso no sigue bien el patrón del audit trail.
  - severity: medium
    issue: Falta la nota del POB sobre לְהָכִיל («contener/endure») y en cambio se conserva una nota menos necesaria.
    rationale: El inglés documenta una alternativa significativa para «to bear». En español, «soportar» admite bien una nota con «contener» o «tolerar/endurar». Esa decisión lexical es más relevante que usar una nota separada para corregir «ha conspirado».
