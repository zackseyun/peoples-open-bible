  text: Ἄκουε νῦν περὶ τῶν λίθων τῶν ὑπαγόντων εἰς τὴν οἰκοδομήν. οἱ μὲν οὖν λίθοι οἱ τετράγωνοι καὶ λευκοὶ καὶ συμφωνοῦντες ταῖς ἁρμογαῖς αὐτῶν, οὗτοί εἰσιν οἱ ἀπόστολοι καὶ ἐπίσκοποι καὶ διδάσκαλοι καὶ διάκονοι οἱ πορευθέντες κατὰ τὴν σεμνότητα τοῦ Θεοῦ καὶ ἐπισκοπήσαντες καὶ διδάξαντες καὶ διακονήσαντες ἁγνῶς καὶ σεμνῶς τοῖς ἐκλεκτοῖς τοῦ Θεοῦ, οἱ μὲν κεκοιμημένοι, οἱ δὲ ἔτι ὄντες· καὶ πάντοτε ἑαυτοῖς συμφωνήσαντες καὶ ἐν ἑαυτοῖς εἰρήνην ἔσχον καὶ ἀλλήλων ἤκουον· διὰ τοῦτο ἐν τῇ οἰκοδομῇ τοῦ πύργου συμφωνοῦσιν αἱ ἁρμογαὶ αὐτῶν. 2. Οἱ δὲ ἐκ τοῦ βυθοῦ ἑλκόμενοι καὶ ἐπιτιθέμενοι εἰς τὴν οἰκοδομὴν καὶ συμφωνοῦντες ταῖς ἁρμογαῖς αὐτῶν μετὰ τῶν ἑτέρων λίθων τῶν ἤδη ᾠκοδομημένων τίνες εἰσίν; Οὗτοί εἰσιν οἱ παθόντες ἕνεκεν τοῦ ὀνόματος τοῦ Κυρίου. 3. Τοὺς δὲ ἑτέρους λίθους τοὺς φερομένους ἀπὸ τῆς ξηρᾶς θέλω γνῶναι τίνες εἰσίν, κυρία. ἔφη· Τοὺς μὲν εἰς τὴν οἰκοδομὴν ὑπάγοντας καὶ μὴ λατομουμένους, τούτους ὁ Κύριος ἐδοκίμασεν, ὅτι ἐπορεύθησαν ἐν τῇ εὐθύτητι τοῦ Κυρίου καὶ κατωρθώσαντο τὰς ἐντολὰς αὐτοῦ. 4. Οἱ δὲ ἀγόμενοι καὶ τιθέμενοι εἰς τὴν οἰκοδομὴν τίνες εἰσίν; Νέοι εἰσὶν ἐν τῇ πίστει καὶ πιστοί. νουθετοῦνται δὲ ὑπὸ τῶν ἀγγέλων εἰς τὸ ἀγαθοποιεῖν, διότι εὑρέθη ἐν αὐτοῖς πονηρία. 5. Οὓς δὲ ἀπέβαλλον καὶ ἔριττον, τίνες εἰσίν; Οὗτοί εἰσιν ἡμαρτηκότες καὶ θέλοντες μετανοῆσαι· διὰ τοῦτο μακρὰν οὐκ ἀπερίφησαν ἔξω τοῦ πύργου, ὅτι εὔχρηστοι ἔσονται εἰς τὴν οἰκοδομήν, ἐὰν μετανοήσωσιν. οἱ οὖν μέλλοντες μετανοεῖν, ἐὰν μετανοήσωσιν, ἰσχυροὶ ἔσονται ἐν τῇ πίστει, ἐὰν νῦν μετανοήσωσιν ἐν ᾧ οἰκοδομεῖται ὁ πύργος. ἐὰν δὲ τελεσθῇ ἡ οἰκοδομή, οὐκέτι ἔχουσιν τόπον, ἀλλʼ ἔσονται ἔκβολοι. μόνον δὲ τοῦτο ἔχουσιν, παρὰ τῷ πύργῳ κεῖσθαι.
