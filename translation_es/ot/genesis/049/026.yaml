revisions:
- from: Las bendiciones de tu padre han prevalecido por encima de las bendiciones de mis padres[a], hasta el límite de los antiguos collados. Que estén sobre la cabeza de José[b], y sobre la coronilla del que está apartado de sus hermanos.
  to: Las bendiciones de tu padre han sobrepasado las bendiciones de mis padres, hasta los límites de los antiguos collados[a]. Que estén sobre la cabeza de José[b], y sobre la coronilla del que fue apartado de entre sus hermanos.
  rationale: Se corrige el anclaje de la nota [a] para que coincida con la frase que realmente explica. Se mejora la naturalidad de גָּבְרוּ עַל con «han sobrepasado». Se afina נְזִיר אֶחָיו a «del que fue apartado de entre sus hermanos», que suena más idiomático y preserva la tensión léxica y teológica documentada por el POB. El resto del contenido se mantiene sustancialmente igual.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:24:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: conserva el plural de «bendiciones», la lectura «tu padre», el sentido comparativo de גָּבְרוּ עַל, la dificultad de תַּאֲוַת גִּבְעֹת עוֹלָם con una solución espacial, el valor volitivo de תִּהְיֶיןָ y la interpretación principal de נְזִיר אֶחָיו como alguien distinguido/apartado de sus hermanos. También preserva correctamente las dos notas de alternativa del POB inglés.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos puntos mejorables para naturalidad y fidelidad estilística: «han prevalecido por encima de» suena algo forzado en español bíblico actual frente a «han sobrepasado», y la nota [a] no corresponde al lugar donde está anclada en el texto; el marcador está en «mis padres[a]», pero la nota trata de «antiguos collados». Además, «del que está apartado» puede afinarse a «del que fue apartado», que en contexto de José suena más idiomático y refleja mejor su condición distintiva sin sugerir solo separación espacial presente.'
  glossary_alignment: No hay conflictos con los términos base del proyecto. No aparece Yahvé, Mesías/Cristo ni otros términos controlados. La decisión sobre נְזִיר se mantiene dentro de la racionalidad documentada del POB.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «mis padres[a]», pero su contenido explica una alternativa para «antiguos collados».
    rationale: Las notas deben aparecer exactamente en el punto del texto al que explican. Tal como está, el lector entenderá erróneamente que la alternativa afecta «mis padres».
  - severity: low
    issue: «Han prevalecido por encima de» es comprensible pero poco natural en este contexto comparativo.
    rationale: En español, «han sobrepasado» o «son mayores que» comunica mejor el sentido de exceder/superar de גבר + עַל, evitando una construcción pesada.
  - severity: low
    issue: «Del que está apartado de sus hermanos» puede sonar algo estático o espacial.
    rationale: «Del que fue apartado de entre sus hermanos» conserva la tensión de נְזִיר con mejor español y con una resonancia más natural al caso de José, sin imponer «príncipe» ni «nazareo».
  revised_spanish_text: Las bendiciones de tu padre han sobrepasado las bendiciones de mis padres, hasta los límites de los antiguos collados[a]. Que estén sobre la cabeza de José[b], y sobre la coronilla del que fue apartado de entre sus hermanos.
  revised_footnotes:
  - marker: a
    text: 'O: «los collados eternos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el príncipe entre sus hermanos»; hebreo: «el consagrado/apartado de entre sus hermanos».'
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota [a] para que coincida con la frase que realmente explica. Se mejora la naturalidad de גָּבְרוּ עַל con «han sobrepasado». Se afina נְזִיר אֶחָיו a «del que fue apartado de entre sus hermanos», que suena más idiomático y preserva la tensión léxica y teológica documentada por el POB. El resto del contenido se mantiene sustancialmente igual.
