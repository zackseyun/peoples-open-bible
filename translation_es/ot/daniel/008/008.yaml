review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: el macho cabrío se engrandece mucho, al llegar a su fuerza se quiebra el gran cuerno, y surgen cuatro en su lugar hacia los cuatro vientos del cielo. Sin embargo, hay dos problemas de alineación textual: (1) la nota [b] está anclada en ‘cielo’ pero explica תַּחְתֶּיהָ (‘en su lugar’), por lo que el anclaje es incorrecto; (2) ‘macho cabrío de las cabras’ es innecesariamente literal y poco natural en español para צְפִיר הָעִזִּים, donde basta ‘macho cabrío’.'
  spanish_quality_summary: El texto es mayormente legible, pero ‘macho cabrío de las cabras’ suena torpe y redundante. ‘Cuando tuvo fuerza’ es comprensible, aunque ‘cuando era fuerte’ o ‘cuando estaba en su fuerza’ suena más natural; no obstante, no exige cambio si se busca mínima intervención. El mayor defecto formal es la colocación de la nota [b] en la frase equivocada.
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto. Se preservan bien ‘cuerno’ y ‘vientos del cielo’ como imaginería apocalíptica. ‘Notables’ es aceptable para חָזוּת con nota aclaratoria. La revisión propuesta mantiene esa línea y mejora la naturalidad de צְפִיר הָעִזִּים con ‘macho cabrío’.
  issues:
  - severity: medium
    issue: 'Expresión española poco natural: ‘el macho cabrío de las cabras’'
    rationale: Aunque intenta reflejar el genitivo hebreo, en español resulta redundante y poco idiomático. ‘El macho cabrío’ preserva mejor la especificidad zoológica sin sonar forzado.
  - severity: high
    issue: La nota [b] está anclada en el lugar equivocado
    rationale: La nota explica תַּחְתֶּיהָ, es decir, ‘en su lugar / bajo ella’, pero en el borrador aparece anclada en ‘cielo’. Esto desajusta la evidencia fuente y la disciplina de notas requerida.
  revised_spanish_text: Y el macho cabrío creció hasta volverse muy grande; y cuando tuvo fuerza, el gran cuerno fue quebrado, y en su lugar[b] subieron cuatro cuernos notables[a] hacia los cuatro vientos del cielo.
  revised_footnotes:
  - marker: a
    text: O ‘cuatro notables’; el término hebreo describe algo visible o prominente, y el español aquí suministra ‘cuernos’ por el contexto.
    reason: lexical_alternative
  - marker: b
    text: Lit. ‘bajo ella’; aquí el sentido es ‘en su lugar’ o ‘en vez de ella’.
    reason: lexical_alternative
  revision_rationale: Se corrige la naturalidad de צְפִיר הָעִזִּים con ‘macho cabrío’ y se reubica la nota [b] sobre ‘en su lugar’, donde realmente corresponde según תַּחְתֶּיהָ. El resto del verso puede mantenerse porque representa fielmente la sintaxis y la imaginería del hebreo.
