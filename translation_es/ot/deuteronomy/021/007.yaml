translation:
  language: es
  text: 'Entonces responderán y dirán: «Nuestras manos no derramaron esta sangre[a], y nuestros ojos no la vieron[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «esta sangre». La frase es un modismo jurídico que niega responsabilidad por el homicidio.'
    reason: lexical_alternative
  - marker: b
    text: O «no fueron testigos de ello». El hebreo «nuestros ojos no vieron» usa lenguaje corporal concreto para negar conocimiento ocular directo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָנוּ
  english_pob_choice: Then they shall answer
  chosen_spanish: Entonces responderán
  alternatives_spanish:
  - Y responderán
  - Responderán
  lexicon: HALOT
  rationale: ענה en esta fórmula legal y declarativa expresa una respuesta pública; «responderán» conserva ese valor formal. «Entonces» refleja la secuencia del waw en el procedimiento narrativo-jurídico sin volver el español pesado.
- source_word: וְאָמְרוּ
  english_pob_choice: and say
  chosen_spanish: y dirán
  alternatives_spanish:
  - y dirán así
  - y declararán
  lexicon: HALOT
  rationale: אמר es el verbo usual «decir». En español, «dirán» mantiene la naturalidad y el tono solemne de una declaración ritual/legal.
- source_word: יָדֵינוּ
  english_pob_choice: Our hands
  chosen_spanish: Nuestras manos
  alternatives_spanish:
  - Nuestras manos mismas
  - Nuestras propias manos
  lexicon: HALOT
  rationale: Se conserva el lenguaje corporal concreto, que en este contexto señala responsabilidad directa por la muerte.
- source_word: שָׁפְכָה
  english_pob_choice: did not shed
  chosen_spanish: no derramaron
  alternatives_spanish:
  - no han derramado
  - no vertieron
  lexicon: HALOT
  rationale: Con דם, שפך es el idiomático «derramar sangre». «No derramaron» preserva la fuerza legal del hebreo sin perder naturalidad en español.
- source_word: אֶת־הַדָּם הַזֶּה
  english_pob_choice: this blood
  chosen_spanish: esta sangre
  alternatives_spanish:
  - esta sangre derramada
  - la sangre de este hombre
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «este sangre», en español el sustantivo natural es «sangre». Se mantiene el demostrativo para conservar el giro legal concreto y la tensión idiomática del original.
- source_word: וְעֵינֵינוּ
  english_pob_choice: and our eyes
  chosen_spanish: y nuestros ojos
  alternatives_spanish:
  - y nuestros ojos mismos
  lexicon: HALOT
  rationale: Se conserva el lenguaje corporal literal, que en hebreo funciona como metonimia de conocimiento ocular directo.
- source_word: לֹא רָאוּ
  english_pob_choice: did not see it
  chosen_spanish: no la vieron
  alternatives_spanish:
  - no vieron esto
  - no fueron testigos de ella
  lexicon: HALOT
  rationale: ראה significa «ver». En español, el pronombre femenino «la» remite naturalmente a «sangre», manteniendo la concreción del hebreo. «Ser testigos» sería interpretativo y se deja como alternativa.
translation_notes:
  revision_awareness: La fuente hebrea y el audit trail inglés muestran un enunciado legal fórmulico sin cambios textuales relevantes; se preserva la doble expresión verbal y la idiomaticidad de שפך דם, con ajuste mínimo de concordancia natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar del proyecto cuando no aparece aquí ningún tetragrámaton explícito.
  - Se conserva el registro jurídico-formal sin introducir léxico eclesiástico ajeno al hebreo.
  - «Sangre» se retiene para mantener el idiomático hebreo de derramamiento de sangre y la responsabilidad legal implícita.
