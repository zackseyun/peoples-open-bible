  text: עַל שֶׁ֥בֶר בַּת עַמִּ֖/י הָשְׁבָּ֑רְתִּי קָדַ֕רְתִּי שַׁמָּ֖ה הֶחֱזִקָֽתְ/נִי־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/008/021.yaml
  text: For the brokenness of the daughter of my people I am broken[a]; I mourn[c][b]; horror has seized me.
  footnotes:
  - marker: a
    text: Or 'Because of the fracture of the daughter of my people, I am shattered.' The Hebrew uses the same root for 'brokenness' and 'I am broken,' creating a deliberate wordplay.
    reason: lexical_alternative
  - marker: b
    text: '''The daughter of my people'' is a prophetic personification of the people of Judah/Israel, preserved here rather than paraphrased away.'
    reason: cultural_note
  - marker: c
    text: Or 'I am darkened' / 'I go about in mourning.' The Hebrew verb carries imagery of darkness associated with grief.
    reason: lexical_alternative
