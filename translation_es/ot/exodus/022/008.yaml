base_translation:
  language: en
  yaml_path: translation/ot/exodus/022/008.yaml
  text: For every case of wrongdoing involving an ox[a], a donkey, a sheep, a garment, or any lost thing about which someone says, ‘This is it,’ the case of both parties shall come before God[b]. The one whom God declares guilty shall pay double to his neighbor.
  footnotes:
  - marker: a
    text: Or “before the judges” / “before the court”; Hebrew אֱלֹהִים can refer to God directly or to human judges acting under divine authority in legal settings.
    reason: alternative_reading
  - marker: b
    text: Hebrew שֶׂה is a broader term for small livestock and can refer to a sheep or a goat.
    reason: lexical_alternative
