review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia y el sentido básico del hebreo: la audiencia oye la voz desde la oscuridad, el monte arde, y los representantes del pueblo se acercan a Moisés. También preserva correctamente la alternativa léxica de קוֹל con nota. Sin embargo, varias elecciones españolas no son fieles al valor pronominal de 2ª persona plural («oyeron / sus») y una frase espacial suena poco natural.'
  spanish_quality_summary: 'La legibilidad necesita reparación menor pero clara. «Desde en medio de» es torpe en este contexto; «de en medio de» o «desde el interior de» sería mejor. «Todos los cabezas de sus tribus» es gramaticalmente deficiente y poco natural en español; la metáfora hebrea puede preservarse con «los jefes de sus tribus» o, si se quisiera mayor literalidad, «las cabezas de sus tribus», pero aquí conviene claridad. También debe mantenerse la 2ª persona coherente con el resto del versículo: «oyeron / se acercaron» debe ser «oyeron ustedes» solo si se expresa, pero en la traducción bíblica normal basta «oyeron»; aun así, el posesivo debe ser «sus» solo si el tratamiento es de ustedes en toda la unidad. Dado que el español ya usa verbo en 3ª plural, conviene evitar mezcla y usar formas más naturales y consistentes en el texto final.'
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. La decisión «voz» para קוֹל está alineada con la POB y bien justificada. «Ancianos» para זִקְנֵיכֶם también está bien. La principal corrección es estilística y gramatical, no terminológica.
  issues:
  - severity: medium
    issue: «desde en medio de[a] la oscuridad» suena poco idiomático
    rationale: Aunque intenta reflejar מִתּוֹךְ, en español bíblico natural «de en medio de la oscuridad» preserva mejor la imagen sin torpeza.
  - severity: high
    issue: «todos los cabezas de sus tribus» es una construcción española deficiente
    rationale: «Cabezas» como plural sustantivado con artículo masculino aquí resulta antinatural y distrae. La metáfora hebrea no debe mantenerse si rompe la claridad; «jefes de sus tribus» comunica con fidelidad el referente.
  - severity: medium
    issue: Inconsistencia de tratamiento pronominal en la línea auditada
    rationale: El hebreo y el inglés se dirigen a «ustedes/vosotros». En español, la forma verbal puede quedar en 3ª plural por estilo narrativo, pero el resto debe mantenerse consistentemente. La revisión propuesta preserva una lectura natural sin introducir marcadores innecesarios.
  - severity: low
    issue: «ardía en fuego» es comprensible pero menos natural que «ardía con fuego» o «estaba ardiendo en fuego»
    rationale: La frase no es incorrecta, pero «ardía con fuego» suena algo más natural en español. Aun así, «ardía en fuego» puede mantenerse por cercanía formal si se desea.
  revised_spanish_text: Y cuando oyeron la voz de en medio de[a] la oscuridad, mientras el monte ardía en fuego, se acercaron a mí—todos los jefes de sus tribus y sus ancianos—
  revised_footnotes:
  - marker: a
    text: O «el sonido»; el hebreo qol puede referirse tanto a voz como a sonido, pero aquí «voz» encaja mejor con el contexto de Dios hablando desde la oscuridad.
    reason: lexical_alternative
  revision_rationale: Se corrige la frase espacial para un español más natural y fiel a מִתּוֹךְ, y se reemplaza «cabezas» por «jefes» porque la metáfora literal aquí produce una construcción deficiente en español. Se conserva la nota léxica sobre «voz/sonido» y el resto de la estructura narrativa del original.
