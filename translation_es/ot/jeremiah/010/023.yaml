translation:
  language: es
  text: Yo sé[a], Yahvé, que el camino del hombre no es suyo; no le corresponde al que anda dirigir[b] sus pasos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «el camino del hombre no está en él mismo».'
    reason: lexical_alternative
  - marker: b
    text: O «establecer sus pasos».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: Yo sé
  alternatives_spanish:
  - Yo he conocido
  - Yo conocí
  lexicon: HALOT
  rationale: El perfecto qal en primera persona expresa una convicción asentada o reconocida; en español, el presente «sé» comunica mejor el valor gnómico y confesional que un pretérito.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, de acuerdo con la terminología POB en español, evitando la sustitución por un título.
- source_word: לָאָדָם דַּרְכּוֹ
  english_pob_choice: a man's way is not his own
  chosen_spanish: el camino del hombre no es suyo
  alternatives_spanish:
  - el camino del hombre no le pertenece
  - el camino de un hombre no es suyo
  - el camino humano no es suyo
  lexicon: HALOT
  rationale: 'La construcción hebrea es elíptica: literalmente niega que el camino pertenezca al האדם. «No es suyo» conserva la idea de pertenencia/autodeterminación sin forzar una paráfrasis excesiva.'
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - forma de andar
  - curso
  - sendero
  lexicon: HALOT
  rationale: «Camino» es el equivalente natural y reverente para דרך en este contexto de curso de vida; mantiene la imagen bíblica sin calco duro.
- source_word: לְאִישׁ הֹלֵךְ
  english_pob_choice: for a man who walks
  chosen_spanish: al que anda
  alternatives_spanish:
  - al hombre que camina
  - al que va andando
  - al hombre en su andar
  lexicon: HALOT
  rationale: El participio describe a la persona en su marcha o trayecto de vida. «Al que anda» resulta natural en español y conserva la idea de alguien en movimiento, sin añadir matices ajenos.
- source_word: וְהָכִין
  english_pob_choice: to direct
  chosen_spanish: dirigir
  alternatives_spanish:
  - establecer
  - afirmar
  - enderezar
  lexicon: HALOT
  rationale: El hifil de כון aquí se entiende, con el objeto «sus pasos», como ordenar o dirigir la marcha. «Dirigir» comunica bien esa función en español y mantiene el paralelo con la versión inglesa.
- source_word: צַעֲדֽוֹ
  english_pob_choice: his steps
  chosen_spanish: sus pasos
  alternatives_spanish:
  - sus pisadas
  - su paso
  - sus huellas
  lexicon: HALOT
  rationale: «Pasos» es la forma idiomática para expresar el avance o curso de vida; pluraliza de modo natural el hebreo en español.
theological_decisions:
- issue: Autonomía humana frente a soberanía divina
  english_pob_reading: The verse states that human beings do not possess ultimate authority to determine or direct their own life-course.
  chosen_spanish_reading: El versículo afirma que el ser humano no posee la autoridad última para trazar o dirigir por sí mismo su camino vital.
  alternative_spanish_readings:
  - El versículo subraya la limitación humana sin resolver toda cuestión determinista.
  - El versículo es ante todo una confesión de dependencia en el contexto.
  rationale: La formulación española conserva la negación de posesión/autogobierno del camino, pero no añade un sistema doctrinal más fuerte que el que el hebreo exige. Mantiene la tensión teológica entre limitación humana y gobierno divino.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y sin cambios necesarios; esta propuesta sigue esa línea, ajustando solo la expresión española para naturalidad y fidelidad al hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé como nombre divino en lugar de «SEÑOR», conforme a la política POB en español.
  - Se conserva «camino» para דרך y «pasos» para צעד, preservando la imagen bíblica del curso de vida.
  - «No es suyo» intenta reflejar la relación de pertenencia implícita en la elipsis hebrea sin sobreexplicar.
  - La nota a pie a remite a una lectura más formal del hebreo; la nota b mantiene la alternativa de «establecer» como matiz de כון.
