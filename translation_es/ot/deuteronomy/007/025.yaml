revisions:
- from: Sus imágenes talladas, las imágenes de sus dioses, las quemarás en el fuego[a]. No codiciarás la plata ni el oro que está sobre ellas, ni lo tomarás para ti, para que no quedes atrapado por ello[b], porque es una abominación para Yahvé tu Dios.
  to: Las imágenes talladas de sus dioses las quemarás en el fuego. No codiciarás la plata ni el oro que está sobre ellas[a], ni lo tomarás para ti, no sea que quedes atrapado por ello[b], porque es una abominación para Yahvé tu Dios.
  rationale: Se corrige la construcción inicial para reflejar fielmente el estado constructo hebreo sin duplicación interpretativa. Se reemplaza la nota [a] por la alternativa léxica realmente documentada en el POB inglés sobre la coordinación de 'plata y oro'. Se ajusta la cláusula con פֶּן a una advertencia más natural en español ('no sea que') y se mantiene la ambigüedad deliberada del referente final con 'ello'.
  reviewer_model: gpt-5.4
