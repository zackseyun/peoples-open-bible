  text: וַ/יְהִ֣י הַ/גּוֹרָ֗ל לְ/מַטֵּ֛ה בְּנֵ֥י יְהוּדָ֖ה לְ/מִשְׁפְּחֹתָ֑/ם אֶל גְּב֨וּל אֱד֧וֹם מִדְבַּר צִ֛ן נֶ֖גְבָּ/ה מִ/קְצֵ֥ה תֵימָֽן־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/015/001.yaml
  text: And the lot for the tribe of the sons of Judah[a], according to their clans, was to the border of Edom, to the wilderness of Zin, southward[c][b], at the farthest south.
  footnotes:
  - marker: a
    text: Or 'And it was the lot for the tribe of the sons of Judah, according to their clans, to the border of Edom...'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Judah'; this refers to the tribal descendants of Judah.
    reason: cultural_note
  - marker: c
    text: Or 'at the southernmost end.' The Hebrew may also be understood more literally as 'from the extremity of Teman/south.'
    reason: alternative_reading
