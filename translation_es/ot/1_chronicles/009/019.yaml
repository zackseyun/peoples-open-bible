  rationale: Se corrige el gentilicio a 'coreítas' para coherencia onomástica y mejor español, y se ajusta la nota sobre YHWH para que describa correctamente la decisión de traducción. El resto del versículo es fiel al hebreo y al razonamiento auditado del POB.
