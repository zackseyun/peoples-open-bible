translation:
  language: es
  text: Pero un hombre injusto, habiéndose apartado[a] de ella, pereció en su ira fratricida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiéndose alejado de ella». La referencia es a la Sabiduría personificada en el contexto inmediato.
    reason: lexical_alternative
  - marker: b
    text: Lit. «en sus pasiones/iras matadoras de hermano». El verso probablemente alude a Caín, aunque no se lo nombra aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποστὰς
  english_pob_choice: having departed
  chosen_spanish: habiéndose apartado
  alternatives_spanish:
  - habiéndose alejado
  - después de apartarse
  - habiendo apostatado
  lexicon: BDAG
  rationale: El participio aoristo expresa separación de la Sabiduría personificada. «Habiéndose apartado» conserva la acción de retirarse sin cargar el texto con «apostatado», que sería más interpretativo y teológicamente más fuerte de lo que exige el griego.
- source_word: ἀπ' αὐτῆς
  english_pob_choice: from her
  chosen_spanish: de ella
  alternatives_spanish:
  - alejándose de ella
  - de esa Sabiduría
  lexicon: BDAG
  rationale: El pronombre femenino remite a la Sabiduría personificada. «De ella» preserva esa referencia literaria en español sin explicitarla en el cuerpo del versículo.
- source_word: ἄδικος
  english_pob_choice: an unrighteous man
  chosen_spanish: un hombre injusto
  alternatives_spanish:
  - un hombre impío
  - un hombre malvado
  - un injusto
  lexicon: BDAG
  rationale: Ἄδικος denota a alguien caracterizado por injusticia o falta de rectitud. «Injusto» mantiene la fuerza moral del término y su relación con la rectitud del contexto, mientras que «impío» o «malvado» amplían indebidamente el matiz.
- source_word: ἐν ὀργῇ αὐτοῦ
  english_pob_choice: in his brother-murdering anger
  chosen_spanish: en su ira homicida
  alternatives_spanish:
  - en su enojo
  - en su furia
  - por su ira
  lexicon: BDAG
  rationale: Ὀργή es «ira/enojo/indignación»; en este contexto violento, «ira» resulta más natural y directo en español que «enojo». Se mantiene el valor intensivo y peligroso del estado afectivo sin sobretraducirlo como «furia».
- source_word: ἀδελφοκτόνοις
  english_pob_choice: brother-murdering
  chosen_spanish: homicida de hermano
  alternatives_spanish:
  - fratricida
  - matador de su hermano
  - asesino de su hermano
  lexicon: LSJ
  rationale: El compuesto significa literalmente «matador de hermano(s)». «Homicida de hermano» conserva el enlace semántico con el asesinato fraterno y evita introducir una formulación más tradicional pero menos literal como «fratricida».
- source_word: θυμοῖς
  english_pob_choice: rage / passions
  chosen_spanish: ira
  alternatives_spanish:
  - pasiones
  - arrebatos
  - furias
  lexicon: BDAG
  rationale: Aunque θυμοῖς es plural, en combinación con ἀδελφοκτόνοις expresa un conjunto de impulsos violentos. En español, «ira» comunica de forma compacta esa pluralidad/intensidad; el plural no se fuerza en el texto para no sonar artificial.
- source_word: συναπώλετο
  english_pob_choice: perished
  chosen_spanish: pereció
  alternatives_spanish:
  - fue destruido
  - cayó en ruina
  - se perdió por completo
  lexicon: BDAG
  rationale: El compuesto intensifica la idea de ruina o destrucción total. «Pereció» es idiomático, solemne y suficiente para reflejar el resultado catastrófico del verbo sin añadir reflexividad que el griego no exige.
theological_decisions:
- issue: Identificación del hombre injusto con Caín
  english_pob_reading: Translate generically as 'an unrighteous man' while allowing the contextual allusion to Cain to remain implicit.
  chosen_spanish_reading: Traducir genéricamente «un hombre injusto» y dejar implícita la alusión a Caín.
  alternative_spanish_readings:
  - poner «Caín» en el texto principal
  - usar «el injusto» como figura específica
  rationale: El griego no nombra a Caín en este versículo. Mantener la referencia genérica evita importar una identificación explícita que el texto no formula, aunque el contexto sugiera fuertemente al primer homicida.
  doctrine_reference: 'Principio de primacía del original: no añadir identificación histórica o doctrinal que no esté expresada en la fuente.'
- issue: Personificación de la Sabiduría
  english_pob_reading: Retain feminine reference with 'her.'
  chosen_spanish_reading: Conservar la referencia femenina con «ella».
  alternative_spanish_readings:
  - reemplazarla por «la sabiduría» en el texto principal
  - neutralizar el pronombre
  rationale: La forma griega usa un pronombre femenino que retoma a la Sabiduría personificada. «Ella» conserva ese rasgo literario y teológico sin sobreexplicarlo.
  doctrine_reference: Principio de preservación de la forma literaria del original cuando no contradice el español natural.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó ὀργή de «rage» a «anger», pero el sentido de violencia permanece. En español se optó por «ira», que es más directo y natural que «enojo» en este contexto, sin perder la carga intensa del término ni el enlace con el homicidio fraterno.
  spanish_consistency_notes:
  - Se mantuvo «Sabiduría» implícita en el pronombre femenino «ella», como en el original.
  - Se evitó «SEÑOR» u այլ ocultación no pertinente, ya que el versículo no contiene el nombre divino.
  - Se prefirió «hombre injusto» para conservar el valor moral de ἄδικος sin volverlo paráfrasis.
  - Se usó «pereció» para reflejar el verbo compuesto de ruina total sin añadir explicaciones en el cuerpo del texto.
  - La nota sobre el posible eco de Caín queda en la nota, no en el texto principal, para respetar la prudencia del audit trail.
