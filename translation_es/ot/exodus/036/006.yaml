revisions:
- from: 'Entonces Moisés mandó[a], y se proclamó[b] por todo el campamento, diciendo: «Ningún hombre ni mujer haga ya más trabajo para la ofrenda del santuario». Y el pueblo quedó restringido de traer más.'
  to: 'Entonces Moisés mandó[a], y se proclamó por todo el campamento, diciendo: «Ni hombre ni mujer hagan ya más trabajo para la ofrenda del santuario[b]». Y al pueblo se le impidió seguir trayendo más.'
  rationale: 'Se corrigieron dos puntos principales: la prohibición se reformuló en plural natural («Ni hombre ni mujer hagan…») para reflejar mejor el hebreo, y la cláusula final se volvió idiomática («al pueblo se le impidió seguir trayendo más») para expresar adecuadamente el nifal pasivo de כלא. Además, se preservó en nota la alternativa léxica de לִתְרוּמַת הַקֹּדֶשׁ, que estaba ausente del borrador, y se retuvo en otra nota el modismo hebreo de «hacer pasar una voz».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: mandato de Moisés, proclamación en el campamento, prohibición de seguir trabajando para la contribución sagrada, y contención del pueblo para no seguir trayendo. Sin embargo, varias elecciones españolas no preservan con suficiente fidelidad la sintaxis y el sentido: «Ningún hombre ni mujer haga» desajusta el plural hebreo y suena gramaticalmente forzado; «trabajo» sería más natural en plural o con giro impersonal; y «quedó restringido de traer más» no es español idiomático para el nifal de כלא con מן + infinitivo.'
  spanish_quality_summary: La redacción es comprensible, pero hay tropiezos importantes de naturalidad y gramática. «Se proclamó por todo el campamento» funciona, aunque «hicieron proclamar» no es necesario; «Ningún hombre ni mujer haga» resulta poco natural; y «quedó restringido de traer más» suena calcado y poco legible. Conviene una reparación menor para que el texto sea claro, digno y fiel.
  glossary_alignment: No hay conflictos con términos de proyecto como Yahvé/Mesías. «Ofrenda del santuario» es aceptable para לִתְרוּמַת הַקֹּדֶשׁ, aunque el rastro inglés preserva una alternativa importante («contribución del santuario» / «ofrenda para el santuario») que conviene mantener en nota en lugar de anclar la única nota al verbo anterior.
  issues:
  - severity: medium
    issue: «Ningún hombre ni mujer haga ya más trabajo»
    rationale: El hebreo tiene verbo plural con pareja inclusiva «hombre y mujer». En español esta formulación con singular suena defectuosa. «Ni hombre ni mujer hagan ya más trabajo» o «que ningún hombre ni ninguna mujer haga…» preserva mejor el sentido prohibitivo.
  - severity: high
    issue: «El pueblo quedó restringido de traer más»
    rationale: Aunque intenta preservar la pasividad de וַיִּכָּלֵא, «restringido de» no es construcción idiomática en español. «Se le impidió al pueblo seguir trayendo» o «el pueblo fue detenido de seguir trayendo» comunica mejor la prevención pasiva marcada por מן + infinitivo.
  - severity: low
    issue: Distribución de notas al pie incompleta respecto al rastro inglés
    rationale: La nota inglesa b trata «contribution of the sanctuary». En el borrador la nota b se asigna al modismo de proclamación y se pierde la alternativa léxica de לִתְרוּמַת הַקֹּדֶשׁ. Debe preservarse también esa alternativa en español.
  revised_spanish_text: 'Entonces Moisés mandó[a], y se proclamó por todo el campamento, diciendo: «Ni hombre ni mujer hagan ya más trabajo para la ofrenda del santuario[b]». Y al pueblo se le impidió seguir trayendo más.'
  revised_footnotes:
