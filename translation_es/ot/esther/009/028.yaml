translation:
  language: es
  text: Y estos días son recordados y observados en toda generación[a], cada familia, cada provincia y cada ciudad; y estos días de Purim no desaparecerán de entre los judíos[b], y su memoria no cesará entre sus descendientes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «son recordados y guardados». El verbo hebreo traducido «observados» significa literalmente «hechos/hechas» y alude a la práctica efectiva de la festividad.
    reason: lexical_alternative
  - marker: b
    text: O «de generación en generación, familia por familia, provincia por provincia y ciudad por ciudad». El hebreo usa sustantivos singulares repetidos con fuerza distributiva.
    reason: lexical_alternative
  - marker: c
    text: O «su memoria no cesará de su descendencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: נִזְכָּרִים
  english_pob_choice: are remembered
  chosen_spanish: son recordados
  alternatives_spanish:
  - son conmemorados
  - son traídos a la memoria
  lexicon: HALOT
  rationale: El niphal de זכר aquí expresa que los días quedan presentes en la memoria comunitaria. «Son recordados» mantiene ese valor pasivo sin añadir una interpretación litúrgica excesiva.
- source_word: וְנַעֲשִׂים
  english_pob_choice: and observed
  chosen_spanish: y observados
  alternatives_spanish:
  - y guardados
  - y celebrados
  - y hechos
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «hechos/hechas», pero en contexto de fiesta se refiere a su práctica efectiva. «Observados» conserva la idea de cumplimiento ritual y social, como en la auditoría inglesa.
- source_word: בְּכָל דּוֹר וָדוֹר
  english_pob_choice: in every generation
  chosen_spanish: en toda generación
  alternatives_spanish:
  - de generación en generación
  - en cada generación
  lexicon: HALOT
  rationale: La repetición distributiva se expresa con naturalidad en español como «toda generación». Mantiene la fuerza de continuidad generacional sin volverlo pesado.
- source_word: מִשְׁפָּחָה וּמִשְׁפָּחָה
  english_pob_choice: every family
  chosen_spanish: familia
  alternatives_spanish:
  - cada familia
  - familia por familia
  lexicon: HALOT
  rationale: En español, la cadena distributiva queda suficientemente marcada por la secuencia paralela del versículo. «Cada» puede añadirse, pero aquí no es necesario para la claridad.
- source_word: מְדִינָה וּמְדִינָה
  english_pob_choice: every province
  chosen_spanish: provincia
  alternatives_spanish:
  - cada provincia
  - distrito
  lexicon: HALOT
  rationale: En Ester, מְדִינָה designa una provincia administrativa del imperio persa. «Provincia» es la correspondencia más fiel y comprensible.
- source_word: וְעִיר וָעִיר
  english_pob_choice: and every city
  chosen_spanish: y ciudad
  alternatives_spanish:
  - y cada ciudad
  - ciudad por ciudad
  lexicon: HALOT
  rationale: La repetición distributiva está ya sugerida por la enumeración anterior; en español puede mantenerse una forma breve y fluida sin perder el sentido.
- source_word: יְמֵי הַפּוּרִים
  english_pob_choice: days of Purim
  chosen_spanish: estos días de Purim
  alternatives_spanish:
  - los días de Purim
  - los días del Purim
  lexicon: HALOT
  rationale: Se conserva el nombre festivo transliterado «Purim» como en el texto fuente. «Estos días de Purim» refleja el demostrativo hebreo y enlaza con el comienzo del versículo.
- source_word: לֹא יַעַבְרוּ מִתּוֹךְ הַיְּהוּדִים
  english_pob_choice: shall not pass away from among the Jews
  chosen_spanish: no pasarán de en medio de los judíos
  alternatives_spanish:
  - no desaparecerán de entre los judíos
  - no se apartarán de entre los judíos
  lexicon: HALOT
  rationale: עבר con מן/מתוך expresa pasar fuera, desaparecer o dejar de estar entre un grupo. «No pasarán de en medio de los judíos» conserva la imagen verbal y la solemnidad del original.
- source_word: וְזִכְרָם
  english_pob_choice: and their remembrance
  chosen_spanish: y su recuerdo
  alternatives_spanish:
  - y su memoria
  - y el recuerdo de ellos
  lexicon: HALOT
  rationale: El sufijo remite a los días/fiestas como antecedente. «Su recuerdo» es natural en español y mantiene la referencia con la mínima explicitación necesaria.
- source_word: לֹא יָסוּף מִזַּרְעָם
  english_pob_choice: shall not cease from their offspring
  chosen_spanish: no cesará de entre su descendencia
  alternatives_spanish:
  - no cesará de su descendencia
  - no desaparecerá de su linaje
  lexicon: HALOT
  rationale: יסוף significa cesar o llegar a su fin; זרע aquí apunta a la posteridad. «Descendencia» es la equivalencia española más clara y fiel, sin reducirlo a una sola generación.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés de la POB. Se mantuvo la misma arquitectura sintáctica y el mismo conjunto de alternativas relevantes: recuerdo/observancia, distributivos repetidos, permanencia de Purim entre los judíos y continuidad del recuerdo en la descendencia. No se detectaron revisiones posteriores que exigieran ajustar la decisión base.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en este proyecto cuando aparece el tetragrámaton; aquí no aplica.
  - «Judíos» conserva el etnónimo del original sin sustituciones litúrgicas.
  - Se mantuvo «Purim» como nombre fijo de la festividad, sin traducirlo.
  - La secuencia distributiva se hizo natural en español, pero sin perder la fuerza repetitiva del hebreo.
