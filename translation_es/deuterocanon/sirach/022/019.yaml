translation:
  language: es
  text: El que pincha un ojo hace brotar lágrimas[a]; y el que pincha un corazón revela sensibilidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «causa lágrimas»; el griego habla literalmente de hacer bajar o descender lágrimas.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «revela percepción» o «hace conocer sensibilidad»; el sustantivo griego puede referirse a percepción, sensación o sensibilidad interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ νύσσων
  english_pob_choice: one who pricks
  chosen_spanish: el que pica
  alternatives_spanish:
  - el que pincha
  - el que hiere con un punta
  - el que perfora
  lexicon: LSJ
  rationale: νύσσω denota pinchar o picar con algo puntiagudo. En español, «pica» conserva la imagen concreta y funciona con naturalidad en ambos miembros del proverbio sin intensificar indebidamente la acción.
- source_word: ὀφθαλμόν
  english_pob_choice: an eye
  chosen_spanish: un ojo
  alternatives_spanish:
  - el ojo
  lexicon: LSJ
  rationale: El singular sin artículo definido en griego se entiende de modo genérico. «Un ojo» expresa bien la verdad proverbial sin forzar una referencia específica.
- source_word: κατάξει δάκρυα
  english_pob_choice: brings forth tears
  chosen_spanish: hace brotar lágrimas
  alternatives_spanish:
  - trae lágrimas
  - causa lágrimas
  - derrama lágrimas
  lexicon: LSJ
  rationale: El verbo sugiere literalmente hacer descender o producir. «Hace brotar» conserva la imagen vívida de lágrimas que surgen, y refleja bien la revisión inglesa hacia una expresión más natural y precisa.
- source_word: καρδίαν
  english_pob_choice: a heart
  chosen_spanish: un corazón
  alternatives_spanish:
  - el corazón
  lexicon: LSJ
  rationale: Como en «ojo», el singular funciona de manera proverbial y genérica. «Corazón» mantiene el sentido del centro interior de la persona, no del órgano físico solamente.
- source_word: ἐκφαίνει
  english_pob_choice: reveals
  chosen_spanish: revela
  alternatives_spanish:
  - muestra
  - pone de manifiesto
  - saca a la luz
  lexicon: LSJ
  rationale: El verbo significa sacar a la luz o hacer evidente. «Revela» es claro y fiel al sentido de manifestar lo interior.
- source_word: αἴσθησιν
  english_pob_choice: feeling
  chosen_spanish: sentimiento
  alternatives_spanish:
  - percepción
  - sensación
  - sensibilidad
  lexicon: LSJ
  rationale: En este contexto, junto a «corazón», el sustantivo apunta a respuesta interior sentida. «Sentimiento» comunica mejor ese valor afectivo en español que una opción más cognitiva como «percepción».
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que cambió «will bring down tears» por «brings forth tears», prefiriendo en español una construcción dinámica y natural («hace brotar lágrimas») que conserva la imagen productiva del verbo griego κατάξει. El resto del versículo se mantuvo estrechamente alineado con el audit trail.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial de ambas cláusulas con la misma estructura verbal.
  - Se eligieron vocablos corrientes y dignos en español, sin sustituir el valor concreto de νύσσω por un término más abstracto.
  - Los dos sustantivos singulares («ojo», «corazón») se conservaron en sentido genérico, como en el griego y en la POB inglesa.
