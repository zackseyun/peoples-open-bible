translation:
  language: es
  text: para entrar en las cavernas de las rocas y en las hendiduras de los peñascos[a], ante el terror de Yahvé y ante el esplendor de su majestad, cuando él se levante[b] para aterrorizar la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «huecos de las rocas y fisuras de los peñascos».
    reason: lexical_alternative
  - marker: b
    text: O «cuando él se levante para hacer temblar la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָבוֹא
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ir a
  - meterse
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad de refugiarse en esos lugares; «entrar» comunica bien el movimiento hacia el escondite sin sonar mecánico en español.
- source_word: בְּנִקְרוֹת
  english_pob_choice: caverns
  chosen_spanish: cavernas
  alternatives_spanish:
  - huecos
  - huecos de roca
  - cuevas
  lexicon: HALOT
  rationale: El término apunta a cavidades naturales en la roca. «Cavernas» conserva la idea de huecos rocosos aptos para ocultarse y es más claro que «huecos».
- source_word: הַצֻּרִים
  english_pob_choice: the rocks
  chosen_spanish: las rocas
  alternatives_spanish:
  - los riscos
  - los peñascos
  lexicon: HALOT
  rationale: צור designa roca o masa rocosa; «rocas» es la equivalencia más directa y mantiene el paralelismo con la segunda mitad del verso.
- source_word: וּבִסְעִפֵי
  english_pob_choice: clefts
  chosen_spanish: hendiduras
  alternatives_spanish:
  - grietas
  - fisuras
  - cortes
  lexicon: HALOT
  rationale: En este contexto geológico, el plural indica aberturas o divisiones en la roca. «Hendiduras» es natural en español y preserva la imagen de refugios fracturados.
- source_word: הַסְּלָעִים
  english_pob_choice: the crags
  chosen_spanish: los peñascos
  alternatives_spanish:
  - los riscos
  - las rocas
  lexicon: HALOT
  rationale: סלע suele referirse a una roca abrupta o peñasco; «peñascos» distingue este segundo miembro del primero sin perder el sentido de roca escarpada.
- source_word: מִפְּנֵי
  english_pob_choice: from before
  chosen_spanish: por
  alternatives_spanish:
  - ante
  - de delante de
  - a causa de
  lexicon: HALOT
  rationale: La expresión hebrea literaliza la huida desde la presencia de Yahvé, pero en español «por temor de» expresa con naturalidad la causa del ocultamiento sin añadir contenido ajeno.
- source_word: פַּחַד
  english_pob_choice: terror
  chosen_spanish: temor
  alternatives_spanish:
  - terror
  - dread
  lexicon: HALOT
  rationale: Aunque el inglés opta por «terror», en español «temor de Yahvé» conserva la fuerza reverencial y bíblica de la expresión sin sonar excesivamente redundante con «aterrorizar» al final del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma POB en español, siguiendo la decisión doctrinal de no sustituir el Tetragrámaton por un título velado.
- source_word: הֲדַר
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - majestad
  - gloria
  lexicon: HALOT
  rationale: «Esplendor» reproduce bien la idea de magnificencia visible y deja a «majestad» para גְּאוֹנֹו, preservando la distinción semántica del hebreo.
- source_word: גְּאוֹנוֹ
  english_pob_choice: his majesty
  chosen_spanish: su majestad
  alternatives_spanish:
  - su grandeza
  - su exaltación
  lexicon: HALOT
  rationale: En referencia a Yahvé, el sustantivo expresa elevación y dignidad regias; «majestad» es la forma más idiomática y reverente en español.
- source_word: בְּקוּמוֹ
  english_pob_choice: when he rises
  chosen_spanish: cuando él se levante
  alternatives_spanish:
  - al levantarse
  - cuando se alce
  lexicon: HALOT
  rationale: El infinitivo con preposición funciona temporalmente; «cuando él se levante» fluye en español y conserva el valor de acción futura/decisiva.
- source_word: לַעֲרֹץ
  english_pob_choice: to terrify
  chosen_spanish: aterrorizar
  alternatives_spanish:
  - hacer temblar
  - causar terror
  lexicon: HALOT
  rationale: El verbo expresa producir pavor en sentido activo. «Aterrorizar» mantiene la intensidad del hebreo y la continuidad con el «temor» inicial.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En este contexto profético y cósmico, «la tierra» resulta natural en español y conserva la amplitud del juicio sin forzar una reinterpretación técnica.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa; la política del proyecto pide transliterarlo como nombre propio, no ocultarlo bajo un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La expresión de temor ante Yahvé
  english_pob_reading: from before the terror of Yahweh
  chosen_spanish_reading: por temor de Yahvé
  alternative_spanish_readings:
  - ante el terror de Yahvé
  - a causa del terror de Yahvé
  rationale: El hebreo combina presencia y causa; en español, «por temor de» conserva el motivo de la huida y evita una construcción demasiado rígida, sin eliminar la tensión entre temor reverente y terror judicial.
  doctrine_reference: Isaías 2:21; cf. uso bíblico de פחד como temor/terror en contexto teofánico
- issue: Sentido de הָאָרֶץ
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - el país
  rationale: El contexto de Isaías 2 es de humillación universal ante la exaltación de Yahvé, por lo que «la tierra» mantiene el alcance amplio del hebreo.
  doctrine_reference: Contexto canónico de Isaías 2
translation_notes:
  revision_awareness: 'Coincido con la revisión más reciente: no se requieren cambios respecto al sentido de la fuente. La traducción inglesa auditada mantiene bien el paralelismo de refugio rocoso y la teofanía de Yahvé; el español sigue esa lectura con equivalencias naturales y sin suavizar el juicio.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma uniforme para יְהוָה.
  - Se usa «tierra» para הָאָרֶץ en sentido amplio, coherente con el alcance profético del versículo.
  - Se distingue «esplendor» y «majestad» para reflejar הֲדַר y גְּאוֹנוֹ sin fusionarlos.
  - Se mantiene el tono de juicio divino con «aterrorizar», paralelo al inglés POB «to terrify».
