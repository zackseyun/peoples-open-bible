review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido básico del hebreo y sigue la decisión del POB de conservar la tercera persona en עַבְדּוֹ mediante una nota. También mantiene adecuadamente el modismo «en mi mano». Sin embargo, añade matiz no presente en el original con «a este su siervo», y «Porque ¿qué he hecho…?» suena menos natural para la función discursiva de כִּי que un enlace como «Pues» o «Porque, ¿qué…?».
  spanish_quality_summary: El texto es comprensible, pero «persigue mi señor a este su siervo así» resulta algo forzado en español. «A su siervo» basta para conservar la tercera persona sin la adición enfática «este». También conviene suavizar la puntuación para una lectura más natural y digna en español eclesial contemporáneo.
  glossary_alignment: No hay términos del glosario mayor en juego salvo el trato honorífico «mi señor», bien resuelto. «Siervo» es apropiado aquí por su valor deferencial, y «maldad»/«mal» deben reflejar רָעָה. Se recomienda «mal» por mayor naturalidad con «hay en mi mano», sin debilitar indebidamente el sentido, especialmente con la nota idiomática preservada.
  issues:
  - severity: medium
    issue: «a este su siervo» añade énfasis deíctico no expresado en el hebreo
    rationale: עַבְדּוֹ significa literalmente «su siervo»; el añadido «este» no está respaldado por el texto fuente ni por el POB inglés.
  - severity: medium
    issue: La secuencia «Porque ¿qué he hecho…?» es poco natural en español
    rationale: כִּי introduce explicación o fundamento. En español, «Pues ¿qué he hecho…?» o «Porque, ¿qué he hecho…?» suena más idiomático; la primera opción es más fluida.
  - severity: low
    issue: «maldad hay en mi mano» suena más rígido que «mal hay en mi mano»
    rationale: Ambas pueden representar רָעָה, pero «qué mal hay en mi mano» suena más natural en español y sigue siendo lo bastante fuerte, especialmente con la nota que aclara el modismo.
  revised_spanish_text: 'Y él dijo[a]: «¿Por qué persigue mi señor así a su siervo? Pues ¿qué he hecho, y qué mal hay en mi mano?[b]»'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «su siervo». Algunas traducciones suavizan la dirección directa y leen «tu siervo», pero el Texto Masorético tiene la forma en tercera persona.'
    reason: alternative_reading
  - marker: b
    text: «En mi mano» es un modismo hebreo para culpabilidad, intención o poder para hacer daño.
    reason: cultural_note
  revision_rationale: La revisión elimina la adición no atestiguada «este», mejora la fluidez española con el orden «así a su siervo» y usa «Pues» para reflejar mejor la función explicativa de כִּי en una pregunta retórica. Se conserva la decisión textual importante de mantener «su siervo» y la metáfora «en mi mano» con su nota.
