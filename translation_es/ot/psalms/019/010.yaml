    reason: lexical_alternative
  - marker: c
    text: O 'las ordenanzas de Yahvé'.
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: ''justos juntamente''; es decir, completamente justos en conjunto.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la redacción para acercarla más al paralelismo hebreo y evitar interpretación excesiva. 'Permanece para siempre' expresa de forma directa עוֹמֶדֶת לָעַד, y 'son enteramente justos' conserva mejor la fuerza colectiva e intensiva de צָדְקוּ יַחְדָּו que 'todos ellos son absolutamente justos'. También se limpió la nota explicativa final.
