translation:
  language: es
  text: Así que, el día de la batalla[a], no se halló espada ni lanza en la mano de ninguno de la tropa que estaba con Saúl y Jonatán; pero Saúl y su hijo Jonatán sí las tenían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «y el día de la batalla no se halló espada ni lanza en la mano de todo el pueblo». La expresión hebrea se ha vertido aquí de manera idiomática para mostrar que ninguno de los soldados tenía tales armas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: So it was
  chosen_spanish: Así que
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma verbal narrativa introduce el resultado de lo anterior; «Así que» conserva la conexión narrativa y suena natural en español sin perder el enlace causal/temporal.
- source_word: בְּיוֹם מִלְחֶמֶת
  english_pob_choice: on the day of battle
  chosen_spanish: el día de batalla
  alternatives_spanish:
  - en el día de batalla
  - cuando llegó la batalla
  lexicon: HALOT
  rationale: Mantiene el valor temporal concreto del hebreo. En español, «el día de batalla» es claro y digno; el artículo definido es suficiente en este contexto narrativo.
- source_word: לֹא נִמְצָא
  english_pob_choice: was found
  chosen_spanish: no se halló
  alternatives_spanish:
  - no fue hallada
  - no se encontró
  lexicon: HALOT
  rationale: El nifal pasivo/impersonal de מצא se expresa bien con «se halló» en singular impersonal, preservando la ausencia de armas sin añadir matiz interpretativo.
- source_word: חֶרֶב וַחֲנִית
  english_pob_choice: a sword or spear
  chosen_spanish: espada ni lanza
  alternatives_spanish:
  - espada o lanza
  - una espada y una lanza
  lexicon: HALOT
  rationale: Tras la negación, el español idiomático prefiere «ni» para el par distribuido. «Lanza» conserva el arma del paralelo hebreo y evita una calca áspera de «y».
- source_word: בְּיַד
  english_pob_choice: in the hand of
  chosen_spanish: en la mano de
  alternatives_spanish:
  - en poder de
  - con
  lexicon: HALOT
  rationale: Se conserva la idiomaticidad hebrea de posesión/control sin sobretraducirla. «En la mano de» es transparente y fiel.
- source_word: כָּל הָעָם
  english_pob_choice: any of the people
  chosen_spanish: ninguno del pueblo
  alternatives_spanish:
  - ninguno de los hombres
  - ninguno de la gente
  lexicon: HALOT
  rationale: Bajo negación, el sentido distributivo del hebreo exige expresar la universalidad negativa. «Ninguno del pueblo» comunica que no había armas entre ellos.
- source_word: אֲשֶׁר אֶת שָׁאוּל וְאֶת יוֹנָתָן
  english_pob_choice: who were with Saul and Jonathan
  chosen_spanish: que estaba con Saúl y Jonatán
  alternatives_spanish:
  - que acompañaba a Saúl y a Jonatán
  - que estaba junto a Saúl y Jonatán
  lexicon: HALOT
  rationale: La construcción elíptica se entiende naturalmente como compañía/adscripción. En español, «estaba con» reproduce el sentido sin forzar una traducción demasiado literal de la partícula אֶת.
- source_word: וַתִּמָּצֵא
  english_pob_choice: but ... had them
  chosen_spanish: pero Saúl y su hijo Jonatán sí las tenían
  alternatives_spanish:
  - y se hallaron para Saúl y para Jonatán su hijo
  - pero fueron halladas para Saúl y su hijo Jonatán
  lexicon: HALOT
  rationale: La forma femenina singular resume el par de armas implícito. El español debe explicitar el referente plural con «las» para evitar oscuridad; «sí las tenían» expresa posesión sin perder el contraste con la carencia anterior.
- source_word: לְשָׁאוּל וּלְיוֹנָתָן בְּנוֹ
  english_pob_choice: Saul and his son Jonathan
  chosen_spanish: Saúl y su hijo Jonatán
  alternatives_spanish:
  - Saúl y Jonatán su hijo
  - Saúl y Jonatán, su hijo
  lexicon: HALOT
  rationale: Se respeta la relación filial del hebreo y se ordena en español para claridad natural. «Su hijo» evita ambigüedad y mantiene la identificación de Jonatán.
translation_notes:
  revision_awareness: 'Coincide con la revisión auditada del texto inglés: no se requieren cambios sustantivos respecto del sentido original. La principal decisión de estilo es mantener la negación distributiva en español con «ni... ni» y explicitar el referente implícito de «las» en la segunda cláusula.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Jonatán» como forma castellana estándar del nombre propio.
  - Se conserva el paralelismo entre carencia general y posesión limitada sin suavizarlo teológicamente ni históricamente.
  - La nota al pie reproduce la alternativa más formal documentada en el audit trail, adaptada a la sintaxis española.
