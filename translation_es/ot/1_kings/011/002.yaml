review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general la estructura del hebreo: «de las naciones», «Yahvé», «los hijos de Israel», el motivo de que desvíen el corazón tras sus dioses, y la idea final de apego amoroso de Salomón. Sin embargo, hay dos desajustes importantes con el sentido y la forma fuente: 1) «No entrarán…» cambia indebidamente la cita directa de segunda persona plural («no entrarán ustedes / no irán ustedes») a tercera persona plural; 2) «ellas» en ambos miembros introduce una especificación femenina que el hebreo no expresa en esta cláusula, mientras el inglés auditado preserva la formulación más general con nota aclaratoria. Además, «se unió» debilita el valor de דבק frente a «se apegó / se aferró».'
  spanish_quality_summary: 'El español es legible, pero «No entrarán en ellas» suena extraño y además es gramaticalmente incongruente con el sujeto fuente. Para mantener fidelidad y buena legibilidad, conviene usar una formulación más natural y formalmente cercana: «No irán a ellas, ni ellas vendrán a ustedes», con nota que explicite la idea contextual de matrimonio. El cierre «A estas se apegó Salomón con amor» suena más fiel y natural que «se unió».'
  glossary_alignment: Alinea bien «Yahvé» y «los hijos de Israel». No hay conflicto con la terminología principal del proyecto. La principal excepción problemática es introducir «ellas» como lectura principal donde el audit trail prefirió conservar la generalidad del hebreo y relegar «intermarry / casarse» a nota. También conviene acercar דבק a «se apegó» para preservar la fuerza léxica documentada.
  issues:
  - severity: high
    issue: Cambio de persona verbal en la prohibición
    rationale: 'El hebreo לֹא תָבֹאוּ es 2mp: «ustedes no entrarán/irán», pero el borrador dice «No entrarán», que en español se entiende como 3.ª persona plural. Eso altera la cita divina.'
  - severity: high
    issue: Sobre-especificación de género/referente con «ellas» en la cita principal
    rationale: El texto fuente habla de «las naciones» y luego usa pronombres plurales; el audit trail inglés conservó la formulación general en el texto principal y dejó «intermarry» para nota. «Ellas» como lectura principal reduce indebidamente la amplitud formal del hebreo.
  - severity: medium
    issue: «Entrar en ellas / entrar en ustedes» suena poco natural en español
    rationale: Aunque intenta reflejar literalmente el hebreo, en español resulta torpe y puede sonar sexualizado o confuso. «Irán a ellas / vendrán a ustedes» mantiene mejor la dignidad y la inteligibilidad sin perder la generalidad.
  - severity: medium
    issue: «Se unió» debilita el valor de דבק
    rationale: דבק expresa apego fuerte, adhesión, aferrarse. «Se unió» es demasiado plano; «se apegó» preserva mejor la intensidad y coincide con la decisión léxica documentada de ‘clung’.
