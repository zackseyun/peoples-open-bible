revisions:
- from: Entonces los cascos de los caballos retumbaron[a] por el galopar, el galopar de sus corceles poderosos.
  to: Entonces los cascos de los caballos golpearon con estruendo por el galopar, el galopar de sus corceles poderosos[a].
  rationale: Se ajusta el verbo para reflejar mejor el sentido de golpe fuerte y sonoro de הָלְמוּ, y se traslada la nota al término final para preservar la ambigüedad documentada de אַבִּירָיו entre caballos y guerreros, en línea con el expediente fuente y la filosofía de traducción.
