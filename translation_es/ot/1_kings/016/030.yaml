    rationale: 'El texto dice «a los ojos de Yahvé» y la nota repite «Hebreo: “a los ojos de Yahvé”». Si se conserva una nota, debe señalar una alternativa significativa como «delante de Yahvé» o «en la opinión de Yahvé»; de otro modo, es mejor omitirla.'
  revised_spanish_text: Acab hijo de Omrí hizo lo malo a los ojos de Yahvé, más que todos los que lo precedieron.[a]
