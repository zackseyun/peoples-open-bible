translation:
  language: es
  text: Pero el faraón endureció su corazón[a] también esta vez, y no dejó ir al pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ‘hizo pesado su corazón’. El modismo expresa obstinación o insensibilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְבֵּד
  english_pob_choice: hardened
  chosen_spanish: endureció
  alternatives_spanish:
  - hizo pesado
  - se mostró obstinado
  lexicon: HALOT
  rationale: El hebreo literalmente alude a ‘hacer pesado’ el corazón, pero en esta construcción idiomática expresa obstinación o insensibilidad. En español, ‘endureció su corazón’ comunica con claridad ese sentido narrativo sin perder la fuerza moral del verbo.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: ‘Corazón’ conserva el antropologismo hebreo como centro de voluntad y disposición. No hace falta una paráfrasis más abstracta.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - aun
  - además
  lexicon: HALOT
  rationale: '‘También’ transmite la idea de reiteración: lo hizo de nuevo en esta ocasión.'
- source_word: בַּפַּעַם הַזֹּאת
  english_pob_choice: this time
  chosen_spanish: esta vez
  alternatives_spanish:
  - en esta ocasión
  lexicon: HALOT
  rationale: Es una equivalencia idiomática natural en español para la referencia a la ocasión presente.
- source_word: שִׁלַּח
  english_pob_choice: let ... go
  chosen_spanish: dejó ir
  alternatives_spanish:
  - soltó
  - despidió
  lexicon: HALOT
  rationale: En el contexto del éxodo, la fórmula expresa liberar al pueblo para salir. ‘Dejó ir al pueblo’ es natural y preserva la noción de permiso/release sin volverla mecánica.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  lexicon: HALOT
  rationale: ‘El pueblo’ mantiene el referente colectivo e identificado con Israel, como en el inglés POB.
- source_word: וַ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  lexicon: HALOT
  rationale: El hebreo enlaza narrativamente, pero en español ‘Pero’ comunica mejor el contraste discursivo con la acción previa.
theological_decisions:
- issue: Agencia humana en el endurecimiento del corazón de Faraón
  english_pob_reading: Pharaoh himself hardened his heart
  chosen_spanish_reading: El faraón endureció su corazón
  alternative_spanish_readings:
  - El corazón del faraón se endureció
  - El faraón hizo pesado su corazón
  rationale: La forma hebrea presenta a Faraón como sujeto agente, y la traducción española conserva esa agencia. No se suaviza a un mero estado pasivo, para mantener la tensión narrativa del Éxodo, donde el endurecimiento se atribuye a veces a Faraón y a veces a Dios.
  doctrine_reference: Conservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del audit trail inglés y mantiene la misma lectura discursiva y teológica: contraste con ‘Pero’, reiteración con ‘también esta vez’ y agencia de Faraón en el endurecimiento de su corazón.'
  spanish_consistency_notes:
  - Se prefiere ‘el faraón’ en minúscula por estilo español corriente, salvo cuando una serie editorial requiera mayúscula.
  - ‘Dejó ir al pueblo’ conserva la fuerza del hebreo שׁלח mejor que ‘liberó’, sin convertir la frase en interpretación expansiva.
  - La nota a pie de página se ancla en ‘endureció su corazón’ para preservar la tensión entre sentido literal y sentido idiomático.
