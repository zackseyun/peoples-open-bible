translation:
  language: es
  text: Enseñarán tus juicios a Jacob y tu ley a Israel[a][b]; pondrán incienso delante de ti y holocaustos sobre tu altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "tu instrucción" para תּוֹרָה.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "en tu nariz" o "a tu nariz"; expresión antropomórfica para incienso presentado ante Dios.
    reason: cultural_note
lexical_decisions:
- source_word: יוֹרוּ
  english_pob_choice: they will teach
  chosen_spanish: Enseñarán
  alternatives_spanish:
  - Instruirán
  - "Dar\0e1n ense\0f1anza"
  lexicon: HALOT
  rationale: "El hifil de ירה en contextos legales y sacerdotales expresa ense\0f1ar/instruir. \"Enseñarán\" es natural en espa\0f1ol y conserva el valor did\0e1ctico del verbo."
- source_word: מִשְׁפָּטֶיךָ
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tus ordenanzas
  - tus decisiones judiciales
  lexicon: HALOT
  rationale: "מִשְׁפָּט puede ser juicios, ordenanzas o decisiones legales. \"Juicios\" mantiene el campo jur\0eddico y la relaci\0f3n con la ense\0f1anza de la ley sin sobreexplicar."
- source_word: לְיַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  lexicon: HALOT
  rationale: "La preposici\0f3n ל introduce el destinatario directo; \"a Jacob\" preserva el paralelismo po\0e9tico con \"a Israel\"."
- source_word: וְתוֹרָתְךָ
  english_pob_choice: and your law
  chosen_spanish: y tu ley
  alternatives_spanish:
  - "y tu instrucci\0f3n"
  lexicon: HALOT
  rationale: "תּוֹרָה puede significar instrucci\0f3n, pero aqu\0ed el paralelismo legal con \"juicios\" favorece \"ley\" como el equivalente m\0e1s directo y reconocible."
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - para Israel
  lexicon: HALOT
  rationale: Se conserva el destinatario directo con la misma estructura que en el hemistiquio anterior.
- source_word: יָשִׂימוּ
  english_pob_choice: they will place
  chosen_spanish: pondrán
  alternatives_spanish:
  - "colocar\0e1n"
  - "presentar\0e1n"
  lexicon: HALOT
  rationale: "שׂים es \"poner/colocar\". \"Pondr\0e1n\" es claro y natural en el contexto sacrificial."
- source_word: קְטוֹרָה
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - "incienso arom\0e1tico"
  - ofrenda de incienso
  lexicon: HALOT
  rationale: "El sustantivo denota incienso; el contexto ritual ya aclara su funci\0f3n, por lo que \"incienso\" basta en el texto principal."
- source_word: בְּאַפֶּךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu nariz / en tu rostro
  lexicon: HALOT
  rationale: "La expresi\0f3n es literalmente antropom\0f3rfica (\"en/at tu nariz\"). En espa\0f1ol, \"delante de ti\" comunica la ofrenda presentada ante Dios sin perder la referencia cultual."
- source_word: וְכָלִיל
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos completos
  alternatives_spanish:
  - ofrendas totalmente quemadas
  - holocaustos enteros
  lexicon: HALOT
  rationale: "כָלִיל indica una ofrenda enteramente consumida. \"Holocaustos completos\" conserva la idea de totalidad sacrificial y el plural del contexto ingl\0e9s revisado."
- source_word: עַל מִזְבְּחֶךָ
  english_pob_choice: on your altar
  chosen_spanish: sobre tu altar
  alternatives_spanish:
  - en tu altar
  - encima de tu altar
  lexicon: HALOT
  rationale: "La preposici\0f3n עַל se rinde de forma directa y natural con \"sobre\" en el contexto del sacrificio."
theological_decisions:
- issue: Sentido de תּוֹרָה en un contexto levítico-covenantal
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  rationale: El verso describe la función sacerdotal/levítica de enseñar los mandatos del pacto. "Ley" preserva el peso jurídico-covenantal y coincide con el paralelismo con "juicios"; "instrucción" queda como alternativa léxica real.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tratamiento de בְּאַפֶּךָ como antropomorfismo ritual
  english_pob_reading: before you
  chosen_spanish_reading: delante de ti
  alternative_spanish_readings:
  - ante ti
  - en tu nariz
  rationale: "Una versión literal de \"nariz/ventana nasal\" resultar\0eda opaca en espa\0f1ol. \"Delante de ti\" transmite el acto de presentar incienso ante Dios sin borrar la imagen antropom\0f3rfica subyacente."
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del POB inglés: se mantiene el paralelo entre "incense" y "whole burnt offerings" en plural/collectivo, evitando singularizar la ofrenda quemada. También se conserva el valor legal de תּוֹרָה como "ley", con la alternativa "instrucción" en nota.'
  spanish_consistency_notes:
  - Se usa "Yahvé" en el proyecto cuando aparece el nombre divino explícito; aquí el texto no lo contiene.
  - Se mantiene "ley" para תּוֹרָה por el paralelismo con "juicios"; la alternativa "instrucción" se documenta en nota.
  - '"Delante de ti" es la solución española más natural para el hebraísmo antropomórfico בְּאַפֶּךָ sin introducir una paráfrasis doctrinal.'
