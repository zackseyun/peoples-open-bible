review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: cierre deliberado del oído, clamor del pobre, reciprocidad (''también él''), y resultado pasivo no especificado. Sin embargo, ''no será escuchado'' desplaza el sentido de וְלֹא יֵעָנֶה (''no será respondido'') desde respuesta hacia mera audición, y reduce la precisión del paralelismo con la decisión léxica inglesa auditada.'
  spanish_quality_summary: El español es claro, natural y digno. 'Cierra su oído al clamor del pobre' y 'clamará' funcionan bien. La única reparación necesaria es reemplazar 'no será escuchado' por una forma que conserve mejor el pasivo de 'ser respondido' sin fijar el agente. 'No recibirá respuesta' es natural y fiel.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. El tratamiento de דָּל como ''el pobre'' con nota alternativa está bien documentado. El masculino genérico y la ambigüedad del agente también están bien preservados. La única desalineación relevante es léxica: ענה nifal debe reflejar ''ser respondido'' más que ''ser escuchado''.'
  issues:
  - severity: medium
    issue: '`יֵעָנֶה` fue traducido como ''será escuchado'' en lugar de una forma de ''ser respondido'''
    rationale: 'El hebreo nifal de ענה aquí significa ''ser respondido/recibir respuesta''. ''Ser escuchado'' introduce otra idea: oír o prestar atención. Aunque relacionada, no es la misma, y debilita la precisión semántica y el audit trail inglés (''not be answered'').'
  revised_spanish_text: El que cierra su oído al clamor del pobre,[a] también él clamará y no recibirá respuesta.
  revised_footnotes:
  - marker: a
    text: O «el débil» o «el necesitado». El hebreo דָּל puede designar a una persona pobre, débil o socialmente vulnerable.
    reason: lexical_alternative
