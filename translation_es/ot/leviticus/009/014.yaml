review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: lavar las partes internas y las patas, y quemarlas en el altar sobre el holocausto. Sin embargo, dos elecciones reducen la precisión del source packet y del audit trail: הַכְּרָעָיִם se documentó como ''lower legs'', y ''patas'' pierde esa especificidad; además, la nota [a] está anclada a ''patas'' pero explica alternativas para הַקֶּרֶב, así que el anclaje de nota no corresponde al término correcto.'
  spanish_quality_summary: El texto es claro y natural, pero puede mejorarse para mayor precisión cultual y anatómica. 'Lavó las entrañas y las patas inferiores' suena más fiel y suficientemente natural en español bíblico moderno que 'intestinos y las patas'. También conviene mover la nota al término interno correspondiente. El resto de la sintaxis es fluida y digna.
  glossary_alignment: No hay conflictos con la terminología de proyecto. 'Holocausto' para עֹלָה y 'altar' para מִזְבֵּחַ están bien. 'Los quemó' es aceptable por la revisión inglesa, aunque el matiz sacrificial de קטר queda sostenido por el contexto. La principal desalineación léxica está en הַכְּרָעָיִם, donde conviene reflejar 'patas inferiores' o 'piernas inferiores' en vez de solo 'patas'.
  issues:
  - severity: medium
    issue: הַכְּרָעָיִם se tradujo como 'las patas'
    rationale: El audit trail inglés justificó específicamente 'the lower legs'. 'Las patas' es comprensible, pero pierde la precisión anatómica de la parte inferior de las patas.
  - severity: medium
    issue: La nota [a] está anclada al término equivocado
    rationale: La nota ofrece alternativas para הַקֶּרֶב ('vísceras/entrañas'), pero en el texto aparece junto a 'patas'. Esto rompe la correspondencia exigida entre anclaje y contenido de la nota.
  - severity: low
    issue: '''Los intestinos'' puede sonar más estrecho que el hebreo cultual'
    rationale: Aunque posible, קֶרֶב en este contexto suele abarcar las partes internas del animal más ampliamente. 'Entrañas' o 'vísceras' representa mejor el campo semántico sin sonar excesivamente técnico.
  revised_spanish_text: Lavó las entrañas[a] y las patas inferiores, y las quemó sobre el altar, encima del holocausto.
  revised_footnotes:
  - marker: a
    text: O “las vísceras”.
    reason: lexical_alternative
  revision_rationale: Se ajusta הַקֶּרֶב a 'entrañas' para reflejar mejor las partes internas en contexto sacrificial, se corrige הַכְּרָעָיִם a 'patas inferiores' para preservar la especificidad de 'lower legs', y se mueve la nota al término pertinente para que el anclaje coincida con la alternativa léxica documentada.
