translation:
  language: es
  text: 'Esto es lo que le dirás: «Esto dice Yahvé: “He aquí[a], lo que he edificado lo derribo, y lo que he plantado lo arranco; es decir, toda la tierra[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». El hebreo הִנֵּה es una partícula de llamada de atención; aquí se traduce «He aquí» para conservar mejor el tono solemne del oráculo.
    reason: lexical_alternative
  - marker: b
    text: O «todo el mundo». Hebreo אֶרֶץ puede significar «tierra, país» o «mundo/tierra»; aquí se prefiere «tierra» en el sentido de la tierra o país bajo juicio en el contexto inmediato de Jeremías.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה תֹּאמַר אֵלָיו
  english_pob_choice: This is what you shall say to him
  chosen_spanish: Esto es lo que le dirás
  alternatives_spanish:
  - Así le dirás
  - Le dirás esto
  lexicon: HALOT
  rationale: 'כֹּה introduce la fórmula profética equivalente a “esto es lo que”. El imperfecto תֹּאמַר en instrucción profética se entiende naturalmente como mandato de futuro en español: “dirás”. אֵלָיו pide el complemento indirecto “le”. La forma breve mantiene el tono solemne sin sonar arcaica.'
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: This is what Yahweh says
  chosen_spanish: Esto dice Yahvé
  alternatives_spanish:
  - Así dice Yahvé
  - Esto es lo que dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se naturaliza en español como “Esto dice”, preservando el valor declarativo y actual del perfecto hebreo. יְהוָה se rinde como “Yahvé” según el criterio confesional del proyecto, no como sustituto reverencial.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: הִנֵּה llama la atención con fuerza enfática. “Mira” comunica esa alerta en español moderno; “He aquí” sería más tradicional, pero menos natural para una lectura pública contemporánea.
- source_word: אֲשֶׁר בָּנִיתִי אֲנִי הֹרֵס
  english_pob_choice: what I have built I am tearing down
  chosen_spanish: lo que yo he edificado, yo lo derribo
  alternatives_spanish:
  - lo que yo he construido, yo lo deshago
  - lo que yo he edificado, yo lo destruyo
  lexicon: HALOT
  rationale: בָּנָה conserva la imagen de construir; “edificar” mantiene un registro digno y bíblico sin perder claridad. הֹרֵס expresa la acción presente de derribar/demoler; “derribo” conserva el paralelismo con lo construido y evita intensificar innecesariamente a “destruyo”.
- source_word: וְאֵת אֲשֶׁר נָטַעְתִּי אֲנִי נֹתֵשׁ
  english_pob_choice: and what I have planted I am uprooting
  chosen_spanish: y lo que yo he plantado, yo lo arranco
  alternatives_spanish:
  - y lo que yo he plantado, yo lo arranco de raíz
  - y lo que yo he plantado, yo lo desarraigo
  lexicon: HALOT
  rationale: נָטַע mantiene la metáfora agrícola con “plantar”. נֹתֵשׁ suele significar arrancar o arrancar de raíz; “arranco” conserva la fuerza verbal y el paralelismo con “derribo”. “Desarraigo” sería interpretativo y menos directo.
- source_word: וְאֶת כָּל הָאָרֶץ הִיא
  english_pob_choice: —that is, the whole land
  chosen_spanish: es decir, toda la tierra
  alternatives_spanish:
  - es decir, toda la tierra
  - o sea, toda la tierra
  - es decir, toda la tierra del país
  lexicon: HALOT
  rationale: El hebreo final es elíptico y funciona como explicación de alcance. “Es decir” reproduce la relación appositiva sin sobrecargar. Para הָאָרֶץ se eligió “tierra” porque en español permite el doble alcance de “land/earth” y mantiene la ambigüedad contextual; aquí no se resuelve de forma dogmática dentro del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene directamente el Nombre divino. Conforme al criterio del proyecto, se translitera como “Yahvé” para no sustituirlo por un título. “SEÑOR” ocultaría el nombre propio, y “Jehová” no corresponde al estándar adoptado aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the whole land
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - toda la tierra
  - todo el país
  - toda la tierra/país
  rationale: Aunque אֶרֶץ puede significar “tierra” o “país/territorio”, el contexto de Jeremías favorece un juicio sobre la esfera concreta afectada. “Tierra” en español conserva la ambigüedad y permite al lector percibir que puede tratarse del territorio sin imponer una precisión no explícita en el hebreo.
  doctrine_reference: Contexto inmediato de juicio profético en Jeremías
translation_notes:
  revision_awareness: La redacción sigue el ajuste auditado del inglés POB en la clausula final, donde la relación explicativa se volvió más fluida con puntuación comas/aposición sin cambiar el sentido. En español se reflejó esa misma función con “es decir” para hacer explícita la elipsis hebrea sin añadir contenido.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma uniforme del Tetragrámaton.
  - Se conserva el paralelismo verbal construir/edificar — derribar — plantar — arrancar para reflejar la estructura hebrea.
  - Se prefirió un registro profético claro y digno, evitando calcos rígidos como “he aquí” en favor de una recepción oral más natural.
