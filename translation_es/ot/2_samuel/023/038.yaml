  - el jitrí
  lexicon: HALOT
  rationale: Gentilicio con artículo; en español conviene reproducir la función appositiva con artículo («el») y adaptar el gentilicio a una forma legible («itrita») que refleja la transliteración convencional del término hebreo.
- source_word: גָּרֵב
