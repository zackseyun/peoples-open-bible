  to: 'Por tanto, profetiza y di[a]: «Así dice el Señor Dios Yahvé: Porque, sí, porque los han dejado desolados y han arremetido contra ustedes desde todos lados, de modo que llegaron a ser posesión para el remanente de las naciones, y llegaron a los labios de la gente y a la difamación del pueblo[b]».'
  rationale: Se ajustó la fórmula divina a «el Señor Dios Yahvé» para representar mejor אֲדֹנָי יְהוִה dentro de la política del proyecto de conservar «Yahvé». Se reparó la nota [a] para que sus alternativas sean español natural y fiel al expediente léxico. También se hizo más idiomática la expresión sobre el habla pública, preservando la literalidad en la nota [b].
