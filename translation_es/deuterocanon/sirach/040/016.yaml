translation:
  language: es
  text: Como maleza en una plantación junto al arroyo[a][b], antes de toda lluvia se secan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maleza» traduce de manera aproximada un hebreo raro e incierto; no pretende fijar una identificación botánica precisa, sino conservar la imagen de vegetación frágil y fácil de arrancar.
    reason: lexical_alternative
  - marker: b
    text: El testimonio más antiguo de Masada parece conservar aquí una lectura sustancialmente distinta de la del hebreo de la Guenizá de El Cairo usado como texto base; por eso la traducción principal sigue el hebreo base, aunque reconoce la incertidumbre textual.
    reason: textual_variant
lexical_decisions:
- source_word: כקרדמות
  english_pob_choice: like brushwood
  chosen_spanish: como maleza
  alternatives_spanish:
  - como matorral
  - como ramas secas
  - como broza
  lexicon: HALOT
  rationale: El hebreo es raro e incierto; la POB inglesa evita una identificación botánica precisa y conserva la fragilidad de vegetación baja y prescindible. «Maleza» mantiene esa idea en español sin fingir mayor precisión que la del texto.
- source_word: על מטעי נחל
  english_pob_choice: on a streamside planting
  chosen_spanish: junto a una plantación de la ribera
  alternatives_spanish:
  - sobre una plantación del arroyo
  - en una plantación junto al torrente
  - a la orilla de una plantación
  lexicon: HALOT
  rationale: מטעי conserva la imagen de plantación o sembrado; נחל evoca cauce, arroyo o ribera de río estacional. «Junto a una plantación de la ribera» mantiene la imagen agrícola y la cercanía al agua en un español natural.
- source_word: מפני כל מטר
  english_pob_choice: before every rain
  chosen_spanish: antes de toda lluvia
  alternatives_spanish:
  - antes de cada lluvia
  - en la presencia de toda lluvia
  - frente a toda lluvia
  lexicon: HALOT
  rationale: La POB toma מפני como «before» en este contexto. «Antes de toda lluvia» reproduce esa relación temporal y el efecto de fragilidad ante cada aguacero.
- source_word: נדעכו
  english_pob_choice: are dried up
  chosen_spanish: se secan
  alternatives_spanish:
  - se agostan
  - se marchitan
  - se desecan
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «are dried up» para reflejar más directamente el verbo y evitar un pasivo pesado. «Se secan» conserva esa sencillez y la imagen vegetal sin intensificarla innecesariamente.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa («are dried up») y evita una pasiva pesada en español; también conserva la incertidumbre léxica del hebreo raro sin convertirla en una identificación botánica más exacta de la que el expediente permite.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera del versículo porque no aparece en el texto fuente.
  - Se evitó «Cristo» y terminología eclesial ajena al pasaje.
  - «Lluvia» y «ribera» se eligieron por claridad en español, manteniendo el campo semántico de נחל y מטר sin sobreinterpretar.
