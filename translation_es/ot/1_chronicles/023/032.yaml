  to: Y debían encargarse de la custodia de la tienda de reunión, de la custodia del lugar santo[a] y de la custodia de los hijos de Aarón, sus hermanos, para el servicio de la casa de Yahvé.
  rationale: Se corrigió el anclaje de la nota para que corresponda a 'lugar santo', que es donde el inglés POB documenta la alternativa léxica. También se ajustó 'tabernáculo de reunión' a 'tienda de reunión' para reflejar mejor el hebreo אֹהֶל מוֹעֵד y la rationale auditada. Finalmente, se aligeró la apertura de la oración con 'debían encargarse de' para un español más natural, manteniendo el sentido de responsabilidad asignada y la repetición formal de 'custodia'.
