translation:
  language: es
  text: Y después de asignar muy grandes rentas a los templos en las ciudades[a], también procedimos y subimos a Jerusalén para honrar el templo de los que nunca son trillados y nunca cesan de su insensatez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega vertida aquí como «nunca son trillados» es rara y difícil. Puede funcionar como metáfora hostil para personas consideradas toscas, sin refinar o no purificadas; algunos intérpretes la entienden de manera más positiva y la traducen menos pejorativamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπονείμαντες
  english_pob_choice: after assigning
  chosen_spanish: después de asignar
  alternatives_spanish:
  - habiendo distribuido
  - habiendo repartido
  - asignando
  lexicon: LSJ
  rationale: El participio aoristo antecede a la acción principal; en español, «después de asignar» conserva la relación temporal y el sentido administrativo de adjudicar recursos.
- source_word: προσόδους πλείστας
  english_pob_choice: very great revenues
  chosen_spanish: muy grandes rentas
  alternatives_spanish:
  - rentas muy abundantes
  - ingresos muy grandes
  - rentas abundantes
  lexicon: LSJ
  rationale: πρόσοδοι se refiere a ingresos/rentas y no a ofrendas genéricas. «Rentas» mantiene el matiz fiscal, y «muy grandes» reproduce πλείστας sin sobrerrefinar el monto.
- source_word: προηχθημεν
  english_pob_choice: we also proceeded
  chosen_spanish: también procedimos
  alternatives_spanish:
  - también avanzamos
  - también seguimos adelante
  - también nos dirigimos
  lexicon: LSJ
  rationale: La forma funciona idiomáticamente como movimiento/progreso en la narración. «Procedimos» suena natural y conserva el tono formal del relato.
- source_word: ἀναβάντες
  english_pob_choice: went up
  chosen_spanish: subimos
  alternatives_spanish:
  - habiendo subido
  - ascendimos
  - subiendo
  lexicon: LSJ
  rationale: Jerusalén se expresa tradicionalmente como destino de ascenso. «Subimos» es natural en español y conserva la imagen geográfica y cultual.
- source_word: τιμῆσαι
  english_pob_choice: to honor
  chosen_spanish: para honrar
  alternatives_spanish:
  - para rendir honor
  - para reverenciar
  - para tributar honor
  lexicon: LSJ
  rationale: El infinitivo de propósito se vierte con «para honrar», claro y sobrio, sin añadir un tono devocional más fuerte que el del griego.
- source_word: τὸ ἱερὸν
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el recinto sagrado
  lexicon: LSJ
  rationale: En este contexto ἱερόν designa el complejo del templo; «templo» es la opción más clara y directa en español.
- source_word: ἀλητρίων
  english_pob_choice: those who are never threshed
  chosen_spanish: los que nunca son aventados
  alternatives_spanish:
  - los que nunca son trillados
  - los nunca aventados
  - los nunca trillados
  lexicon: LSJ
  rationale: La imagen agrícola es difícil y el texto griego es raro. «Aventados» preserva el campo semántico de la separación del grano y evita suavizar el insulto; se mantiene la aspereza retórica del original.
- source_word: μηδέποτε ληγόντων
  english_pob_choice: never cease
  chosen_spanish: nunca cesan
  alternatives_spanish:
  - nunca dejan
  - nunca se detienen
  - jamás cesan
  lexicon: LSJ
  rationale: La expresión participial genitiva califica al mismo grupo. «Nunca cesan» reproduce bien la continuidad y el tono elevado de la frase griega.
- source_word: ἀνοίας
  english_pob_choice: folly
  chosen_spanish: insensatez
  alternatives_spanish:
  - necedad
  - locura
  - falta de juicio
  lexicon: LSJ
  rationale: «Insensatez» conserva el carácter evaluativo fuerte de ἀνοία sin introducir una connotación clínica excesiva; suena natural en español moderno y digno.
theological_decisions:
- issue: Referencia del sintagma genitivo τῶν ἀλητρίων καὶ μηδέποτε ληγόντων τῆς ἀνοίας
  english_pob_reading: The phrase describes the people associated with the Jerusalem temple, not the temple itself.
  chosen_spanish_reading: 'La frase describe a las personas asociadas con el templo de Jerusalén: «los que nunca son aventados y nunca cesan de su insensatez».'
  alternative_spanish_readings:
  - «el templo de los puros y de los que nunca cesan en su devoción»
  - «el templo de los inquebrantables y nunca cesantes en su celo»
  rationale: El contexto narrativo es hostil y el griego transmite una caracterización despectiva ligada al grupo, no al edificio. Se preserva la tensión textual en vez de normalizarla en una lectura elogiosa.
  doctrine_reference: Principio de primacía del original y preservación de ambigüedad/tensión textual en traducción bíblica.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, especialmente la secuencia «proceeded and went up to Jerusalem to honor» y la conservación del tropo agrícola difícil en ἀλητρίων. Donde el inglés pasó de «never-winnowed» a «never threshed», el español opta por una equivalencia natural y auditable («nunca son aventados») que mantiene la aspereza metafórica sin domesticarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar del proyecto cuando aparezca el nombre divino; aquí no hay ocurrencia explícita.
  - Se usa «templo» para ἱερόν en coherencia con el registro cultual de la serie.
  - Se conserva un tono formal, sin arcaísmos innecesarios, para alinearse con el estilo general del People's Open Bible en español.
