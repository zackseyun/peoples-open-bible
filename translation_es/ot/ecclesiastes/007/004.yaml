translation:
  language: es
  text: El corazón de los sabios está en la casa del luto, pero el corazón de los necios está en la casa del regocijo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alegría» o «gozo» para el término traducido aquí como «regocijo». El hebreo puede denotar júbilo en un sentido más amplio, pero aquí probablemente alude a una alegría festiva en contraste con el luto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: '"Corazón" es el equivalente natural en español para el centro interior de pensamiento, voluntad y afecto. En este proverbio conserva la idea de orientación interna, no solo emoción.'
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los sabios varones
  - las personas sabias
  - los prudentes
  lexicon: HALOT
  rationale: El plural sustantivado pide una forma breve y proverbial. "Los sabios" mantiene el paralelismo con "los necios" y no añade un matiz masculino que el hebreo no exige.
- source_word: בֵּית
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - lugar
  lexicon: HALOT
  rationale: '"Casa" reproduce de manera directa la imagen hebrea de "casa de luto" / "casa de alegría". "Hogar" suavizaría la imagen y "lugar" la volvería demasiado interpretativa.'
- source_word: אֵבֶל
  english_pob_choice: mourning
  chosen_spanish: luto
  alternatives_spanish:
  - duelo
  - dolor
  - tristeza
  lexicon: HALOT
  rationale: '"Luto" expresa bien el contexto de duelo por muerte y conserva el contraste formal con la segunda mitad del versículo. Es una opción idiomática y bíblica en español.'
- source_word: וְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: Aunque la partícula es literalmente coordinante, aquí la relación es claramente contrastiva; "pero" expresa mejor la antítesis sapiencial en español.
- source_word: כְּסִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los fatuos
  - los tontos
  lexicon: HALOT
  rationale: '"Necios" es el término sapiencial más natural en español para este campo semántico y conserva la categoría moral e intelectual del hebreo sin sonar coloquial.'
- source_word: שִׂמְחָה
  english_pob_choice: mirth
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  - fiesta
  lexicon: HALOT
  rationale: El inglés POB opta por "mirth" para resaltar la alegría festiva en contraste con el luto. En español, "alegría" comunica esa idea de modo claro y digno; "gozo" podría sonar más devocional y "fiesta" introduciría un matiz no necesario.
translation_notes:
  revision_awareness: El texto base y la nota en inglés se mantienen estables; no se registraron revisiones aplicadas. La presente versión conserva el paralelismo antitético del hebreo y traslada la alternativa léxica de שִׂמְחָה con una nota española equivalente.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo proverbial con una estructura breve y simétrica: «El corazón de los sabios... pero el corazón de los necios...»'
  - Se prefirió «luto» frente a «duelo» por ser más idiomático en la construcción fija «casa del luto» y por reflejar mejor la observación léxica de contraste festivo/sobrio.
  - No se usó «SEÑOR» ni terminología cristológica, pues el versículo no los contiene.
  - La nota al pie mantiene la alternativa semántica de שִׂמְחָה sin sobrecargar el cuerpo principal del versículo.
