translation:
  language: es
  text: 'Pero Abram dijo[a]: «Señor Yahvé, ¿qué me darás, si yo sigo sin hijos, y el hijo de posesión de mi casa es Eliezer de Damasco?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el hijo de mesheq de mi casa», expresión inusual; puede significar «el mayordomo de mi casa» o «el poseedor/heredero de mi casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración, y aquí introduce una respuesta de Abram que contrasta con la promesa previa. En español, «Pero» conserva ese giro discursivo con naturalidad.
- source_word: אֲדֹנָי יֱהוִה
  english_pob_choice: Lord Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor Yahvé
  - Señor Dios
  lexicon: HALOT
  rationale: La forma hebrea combina un título reverente con el nombre divino. En español, el proyecto usa «Yahvé» para יֱהוִה; aquí el vocativo queda suficientemente marcado por el contexto directo del discurso, y «Yahvé» preserva el nombre del pacto sin duplicar títulos.
- source_word: מַה תִּתֶּן לִי
  english_pob_choice: what will you give me
  chosen_spanish: ¿qué me darás?
  alternatives_spanish:
  - ¿qué puedes darme?
  - ¿qué me estás dando?
  lexicon: HALOT
  rationale: El imperfecto expresa futuro en contexto. «¿Qué me darás?» es una equivalencia natural y fiel, sin perder el carácter de pregunta sobre una dádiva aún no recibida.
- source_word: וְאָנֹכִי
  english_pob_choice: since I
  chosen_spanish: si yo sigo
  alternatives_spanish:
  - y yo
  - mientras yo
  lexicon: HALOT
  rationale: La partícula introduce la circunstancia que fundamenta la pregunta. «Si yo sigo» transmite esa condición de manera más idiomática en español que un simple «y yo».
- source_word: הוֹלֵךְ עֲרִירִי
  english_pob_choice: am going childless
  chosen_spanish: sigo sin hijos
  alternatives_spanish:
  - voy sin hijos
  - estoy yendo sin hijos
  - voy quedando sin hijos
  lexicon: HALOT
  rationale: La imagen hebrea de un ir caminando hacia el final de la vida sin descendencia se vuelve en español con una formulación clara y sobria. «Sigo sin hijos» conserva la situación de ausencia de descendencia sin forzar un calco extraño.
- source_word: בֶן מֶשֶׁק בֵּיתִי
  english_pob_choice: the son of possession of my house
  chosen_spanish: el hijo de posesión de mi casa
  alternatives_spanish:
  - el heredero de mi casa
  - el mayordomo de mi casa
  - el poseedor de mi casa
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y el audit trail inglés decidió no suavizarla del todo. En español se mantiene la rareza con una traducción cercana al hebreo para no borrar la tensión léxica; se aclara su sentido probable en la nota.
- source_word: דַּמֶּשֶׂק אֱלִיעֶזֶר
  english_pob_choice: Eliezer of Damascus
  chosen_spanish: Eliezer de Damasco
  alternatives_spanish:
  - Eliezer, de Damasco
  - el damasceno Eliezer
  lexicon: HALOT
  rationale: La construcción se entiende naturalmente como identificación geográfica. «De Damasco» conserva el orden y la función del complemento con claridad en español.
theological_decisions:
- issue: Representación del nombre divino יֱהוִה en el vocativo directo
  english_pob_reading: Lord Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor Yahvé
  - Señor Dios
  rationale: El proyecto español usa «Yahvé» para el nombre divino, según la política terminológica dada. Aunque el hebreo tiene un título más el nombre, en vocativo directo el nombre propio transmite con precisión la referencia al Dios del pacto sin recurrir a un sustituto como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Mantenimiento de la expresión hebrea difícil בֶּן מֶשֶׁק בֵּיתִי
  english_pob_reading: the son of possession of my house
  chosen_spanish_reading: el hijo de posesión de mi casa
  alternative_spanish_readings:
  - el heredero de mi casa
  - el mayordomo de mi casa
  rationale: La POB inglesa revisada prefirió una forma más pegada al hebreo para no resolver demasiado pronto la ambigüedad. El español conserva esa tensión y evita reemplazarla por una interpretación cerrada en el texto principal.
  doctrine_reference: POB lexical policy on auditable ambiguity preservation
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que cambió «Lord GOD» por «Lord Yahweh» y reemplazó una interpretación más interpretativa de la frase difícil por una forma más cercana al hebreo. En español se reflejó esa decisión manteniendo el nombre divino «Yahvé» y conservando la extrañeza de «el hijo de posesión de mi casa», con nota explicativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יֱהוִה conforme al estándar del proyecto en español.
  - Se evitó «SEÑOR» para no ocultar el nombre divino en este verso.
  - «Damasco» se usó como gentilicio geográfico estándar y no como adjetivo litúrgico.
  - La nota a pie de página preserva la ambigüedad léxica sin resolverla prematuramente.
