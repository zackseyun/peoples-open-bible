review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo y el rastro POB en la secuencia narrativa, la repetición de 'desnudez de su padre', y la idea de caminar/orientarse hacia atrás para no verlo. Sin embargo, 'sobre ambos hombros' suena incompleto en español porque omite el posesivo implícito ('de ellos') y puede sugerir un referente externo; además, la segunda cláusula queda más natural y fiel con 'vueltos hacia atrás' que con 'estaban hacia atrás', que suena algo rígido.
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor de naturalidad idiomática. 'La prenda' y la nota 'el manto' funcionan bien. 'Sus rostros estaban hacia atrás' es comprensible, aunque menos natural que 'sus rostros estaban vueltos hacia atrás'.
  glossary_alignment: No hay conflicto con la terminología del proyecto. Nombres propios bien en español. 'Desnudez' preserva correctamente עֶרְוַת. No hay términos teológicos sensibles fuera de las pautas.
  issues:
  - severity: medium
    issue: Expresión 'sobre ambos hombros'
    rationale: Aunque refleja el hebreo de forma bastante literal, en español natural conviene explicitar el referente con 'sobre los hombros de ambos' o 'sobre ambos hombros de ellos' para evitar una formulación algo truncada.
  - severity: low
    issue: Frase 'Sus rostros estaban hacia atrás'
    rationale: Es entendible, pero menos idiomática que 'sus rostros estaban vueltos hacia atrás', que además refleja mejor la elipsis hebrea suplida para claridad, en línea con el POB inglés 'were turned backward'.
  revised_spanish_text: Entonces Sem y Jafet tomaron la prenda[a] y la pusieron sobre los hombros de ambos, y caminaron hacia atrás y cubrieron la desnudez de su padre. Sus rostros estaban vueltos hacia atrás, de modo que no vieron la desnudez de su padre.
  revised_footnotes:
  - marker: a
    text: O ‘el manto’. El término hebreo se refiere a una prenda exterior usada aquí para cubrir a Noé.
    reason: lexical_alternative
  revision_rationale: 'Ajuste menor para mejorar la naturalidad y precisión del español sin cambiar el sentido: ''sobre los hombros de ambos'' expresa mejor el hebreo idiomático, y ''estaban vueltos hacia atrás'' comunica con más claridad la orientación de sus rostros. Se conserva la nota léxica sobre שׂמלה.'
