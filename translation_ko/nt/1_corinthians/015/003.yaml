id: 1CO.15.3
reference: 1 Corinthians 15:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παρέδωκα γὰρ ὑμῖν ἐν πρώτοις, ὃ καὶ παρέλαβον, ὅτι Χριστὸς ἀπέθανεν ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν κατὰ τὰς γραφάς,
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/003.yaml
  text: 'For I delivered to you as of first importance what I also received: that Messiah died for our sins according to the Scriptures[b][a],'
  footnotes:
  - marker: a
    text: Or 'Christ died for our sins.' The Greek title Χριστός can be rendered 'Messiah' when its titular sense is prominent.
    reason: alternative_reading
  - marker: b
    text: Or 'in accordance with the Scriptures.'
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 받은 것을 가장 중요한 것으로 여러분에게 전했으니, 곧 메시아께서 성경대로 우리 죄를 위하여 죽으시고,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Χριστὸς
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 칭호로 기능하는 Χριστός는 글로사리에 따라 「메시아」로 옮긴다.
- source_word: ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν
  english_pob_choice: for our sins
  chosen_korean: 우리 죄를 위하여
  alternatives_korean:
  - 우리 죄를 대신하여
  lexicon: BDAG
  rationale: 헬라어 ὑπέρ의 대속·대표적 함의를 한국어 「위하여」로 일관되게 옮긴다.
- source_word: κατὰ τὰς γραφάς
  english_pob_choice: according to the Scriptures
  chosen_korean: 성경대로
  alternatives_korean:
  - 성경에 따라
  lexicon: BDAG
  rationale: 정형구의 간결성을 살린다.
theological_decisions:
- issue: 초대교회 신앙 정형구(고전 15:3-5)의 보존
  chosen_reading: 메시아께서 성경대로 우리 죄를 위하여 죽으시고
  alternative_readings:
  - 그리스도께서 성경대로 우리 죄를 위하여 죽으시고
  rationale: 본 절은 바울이 「받아 전한」 초대교회의 가장 이른 신앙 정형구이며, Χριστός의 칭호성, ὑπέρ의 대속성, κατὰ τὰς γραφάς의 성경 부합성이 모두 무게를 갖는다. 글로사리·DOCTRINE.md에 따라 「메시아」로 칭호를 살리고, 「우리 죄를 위하여 죽으시고」로 대속의 의미를 분명히 한다.
  doctrine_reference: 'DOCTRINE.md: Χριστός as title; preserve the credal form'
