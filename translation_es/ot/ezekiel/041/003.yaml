translation:
  language: es
  text: 'Entonces entró en el interior y midió las jambas[a] de la entrada: dos codos; la entrada: seis codos; y el ancho de la entrada[b]: siete codos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "las pilastras de la entrada"; el hebreo arquitectónico puede referirse a los elementos verticales laterales del acceso.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "el ancho de la entrada, siete codos". La referencia arquitectónica puede ser difícil; algunos entienden una anchura estructural relacionada más que solo la abertura visible.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: Then he went inside
  chosen_spanish: Entonces entró en el interior
  alternatives_spanish:
  - Entonces fue hacia adentro
  - Luego ingresó
  lexicon: HALOT
  rationale: El hebreo marca avance narrativo con un movimiento hacia el interior. "Entró en el interior" conserva ese avance y suena natural en español, sin añadir un objeto o destino no presente en el hebreo.
- source_word: לִפְנִימָה
  english_pob_choice: inside
  chosen_spanish: en el interior
  alternatives_spanish:
  - adentro
  - hacia adentro
  lexicon: HALOT
  rationale: El adverbio señala interioridad; "en el interior" es claro y digno en español bíblico contemporáneo, y evita sobreinterpretar con "cuarto interior" o equivalente.
- source_word: וַיָּמָד
  english_pob_choice: measured
  chosen_spanish: midió
  alternatives_spanish:
  - tomó la medida de
  - mide
  lexicon: HALOT
  rationale: Es la acción directa de medir en la visión del templo. "Midió" es la correspondencia más natural y precisa.
- source_word: אֵיל הַפֶּתַח
  english_pob_choice: the jambs of the entrance
  chosen_spanish: los postes de la entrada
  alternatives_spanish:
  - los jambas de la entrada
  - los pilares de la entrada
  - los montantes de la entrada
  lexicon: HALOT
  rationale: En español, "jambas" es técnico pero menos transparente; "postes de la entrada" comunica el elemento arquitectónico vertical medido y mantiene la amplitud lexical documentada por la POB inglesa (jambs/pilasters).
- source_word: שְׁתַּיִם אַמּוֹת
  english_pob_choice: two cubits
  chosen_spanish: dos codos
  alternatives_spanish:
  - dos medidas de codo
  lexicon: HALOT
  rationale: Correspondencia directa y convencional de la unidad de medida.
- source_word: וְהַפֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - la abertura
  - la puerta
  lexicon: HALOT
  rationale: Aquí el hebreo puede referirse a la abertura/entrada como entidad arquitectónica. "La entrada" permite mantener la distinción con los "postes" previos sin forzar una aclaración interpretativa adicional.
- source_word: שֵׁשׁ אַמּוֹת
  english_pob_choice: six cubits
  chosen_spanish: seis codos
  alternatives_spanish:
  - seis medidas de codo
  lexicon: HALOT
  rationale: Correspondencia directa de la medida.
- source_word: וְרֹחַב הַפֶּתַח
  english_pob_choice: the width of the entrance
  chosen_spanish: el ancho de la entrada
  alternatives_spanish:
  - la anchura de la entrada
  - el ancho de la abertura
  lexicon: HALOT
  rationale: '"Ancho" es el término natural en español para esta dimensión. Conserva el valor espacial del hebreo sin resolver la dificultad arquitectónica más allá de lo que el texto permite.'
- source_word: שֶׁבַע אַמּוֹת
  english_pob_choice: seven cubits
  chosen_spanish: siete codos
  alternatives_spanish:
  - siete medidas de codo
  lexicon: HALOT
  rationale: Correspondencia directa de la medida.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el trazado de la POB inglesa. La revisión inglesa reciente eliminó un énfasis añadido después de "the entrance"; por eso el español mantiene una forma sobria y directa sin refuerzos como "misma" o "ella". Se preserva la tensión arquitectónica del pasaje mediante una nota, en lugar de resolverla interpretativamente en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usó "codos" para mantener la unidad de medida estándar y coherente con la POB.
  - '"Entrada" se mantiene para פתח en todo el versículo, diferenciándola de los elementos laterales medidos.'
  - No se introdujo "SEÑOR" ni terminología teológica ajena, porque este versículo es puramente arquitectónico.
  - El registro es formal pero fluido, apto para lectura pública y auditable frente al hebreo.
