  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Γενεὰ πονηρὰ καὶ μοιχαλὶς σημεῖον ἐπιζητεῖ, καὶ σημεῖον οὐ δοθήσεται αὐτῇ εἰ μὴ τὸ σημεῖον ⸀Ἰωνᾶ. καὶ καταλιπὼν αὐτοὺς ἀπῆλθεν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/004.yaml
  text: 'An evil and adulterous generation seeks a sign[a], and no sign will be given to it except the sign of Jonah. And leaving them[b], he went away.'
translation:
  language: ko
  text: '「악하고 음란한 세대가 표적을 구하지만, 요나의 표적 외에는 어떤 표적도 그들에게 주어지지 않을 것이다.」 그리고 그가 그들을 두고 떠나가셨습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「언약에 신실하지 못한 세대」. 헬라어는 「음란한」으로, 언약 부정에 관한 예언서의 비유적 언어를 반향할 가능성이 높다.
    reason: lexical_alternative
  - marker: b
    text: 「요나의 표적」은 마태 12:39~40에서 요나의 사흘 낮 사흘 밤으로 설명되며, 인자에게 적용되는 패턴이다.
    reason: cultural_note
lexical_decisions:
- source_word: μοιχαλὶς
  english_pob_choice: adulterous
  chosen_korean: 음란한
  alternatives_korean:
  - 언약에 신실하지 못한
  lexicon: BDAG
  rationale: 예언서의 「영적 음행」 비유를 반향한다. 한국어 「음란한」이 정착어이며 비유적 무게를 보존한다.
- source_word: Ἰωνᾶ
  english_pob_choice: Jonah
  chosen_korean: 요나
  lexicon: BDAG
  rationale: 한국 성경 정착어.
