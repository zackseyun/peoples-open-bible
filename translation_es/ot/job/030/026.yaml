translation:
  language: es
  text: Porque yo esperaba lo bueno[a], pero vino el mal; aguardaba la luz, pero vino la oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calamidad» / «desastre» para רָע; en este contexto, el hebreo probablemente se refiere a adversidad más que a mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto introduce la explicación o fundamento del lamento de Job. «Porque» conserva la fuerza causal/explanatoria de forma natural en español.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo favorable
  - el bienestar
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. «Lo bueno» mantiene la amplitud semántica sin restringirlo indebidamente a prosperidad material.
- source_word: קִוִּיתִי
  english_pob_choice: I hoped
  chosen_spanish: yo esperaba
  alternatives_spanish:
  - yo esperé
  - yo anhelaba
  - yo tenía esperanza
  lexicon: HALOT
  rationale: El verbo expresa expectativa confiada. «Yo esperaba» reproduce bien la idea de aguardar con esperanza y evita una formulación demasiado abstracta.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - me sobrevino
  - acaeció
  lexicon: HALOT
  rationale: «Vino» conserva la repetición y el golpe breve del hebreo, además de funcionar naturalmente con «el mal» y «la oscuridad».
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la calamidad
  - el desastre
  - la desgracia
  lexicon: HALOT
  rationale: Aunque en Job suele aludir a adversidad o calamidad más que a mal moral, «el mal» preserva la correspondencia léxica directa y la antítesis con «lo bueno».
- source_word: אֲיַחֲלָה
  english_pob_choice: I waited
  chosen_spanish: aguardaba
  alternatives_spanish:
  - esperaba
  - anhelaba
  - estaba esperando
  lexicon: HALOT
  rationale: Este verbo puede solaparse con una espera esperanzada. «Aguardaba» mantiene la noción de espera prolongada sin repetir exactamente «esperaba».
- source_word: לְאוֹר
  english_pob_choice: for light
  chosen_spanish: la luz
  alternatives_spanish:
  - luminosidad
  - claridad
  - resplandor
  lexicon: HALOT
  rationale: La preposición con el sustantivo señala el objeto esperado; en español, el objeto directo natural es «la luz». Se conserva el contraste literal y metafórico.
- source_word: אֹפֶל
  english_pob_choice: darkness
  chosen_spanish: la oscuridad
  alternatives_spanish:
  - la tiniebla
  - la sombra
  - la penumbra
  lexicon: HALOT
  rationale: «Oscuridad» comunica con claridad la oposición directa a «luz» y resulta idiomática en español contemporáneo sin perder fuerza poética.
translation_notes:
  revision_awareness: 'El texto fuente coincide con la tradición masorética y el audit trail inglés muestra un pasaje sin revisiones posteriores: la traducción española sigue esa misma lectura estable, conservando la repetición paralela de «vino» y la antítesis «lo bueno / el mal».'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y poético acorde con Job.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el nombre divino.
  - Se preserva la tensión léxica de רָע con una nota alternativa, en línea con el POB inglés.
  - La estructura paralela se conserva con dos hemistiquios claros en español.
