translation:
  language: es
  text: ¿Qué provecho tiene el trabajador de aquello en que se afana?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Qué ganancia tiene el trabajador de aquello en que trabaja?»
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cuál
  - ¿Qué cosa
  lexicon: HALOT
  rationale: La interrogación hebrea breve y retórica se expresa naturalmente en español con «¿Qué?», manteniendo la concisión y la fuerza del planteamiento.
- source_word: יִתְרוֹן
  english_pob_choice: profit
  chosen_spanish: provecho
  alternatives_spanish:
  - ganancia
  - beneficio
  - profit
  lexicon: HALOT
  rationale: En Eclesiastés el sustantivo apunta a la utilidad o ventaja resultante. «Provecho» comunica bien la idea de ganancia real obtenida de una actividad, sin forzar un sentido meramente monetario como podría hacerlo «ganancia» en este contexto.
- source_word: הָעֹשֶׂה
  english_pob_choice: the worker
  chosen_spanish: el que trabaja
  alternatives_spanish:
  - el trabajador
  - el que hace
  lexicon: HALOT
  rationale: El participio hebreo literalmente es «el que hace», pero el contexto inmediato es el trabajo y el afán. «El que trabaja» conserva la función sustantiva del participio y suena natural en español.
- source_word: בַּאֲשֶׁר
  english_pob_choice: from that in which
  chosen_spanish: de aquello en que
  alternatives_spanish:
  - de lo que
  - en lo que
  - de aquello en lo cual
  lexicon: HALOT
  rationale: 'La relación idiomática entre בַּאֲשֶׁר y יִתְרוֹן se entiende mejor como procedencia o resultado: el provecho «de aquello en que» uno se afana. Esta formulación evita sobrerreformular y preserva la referencia al ámbito de la labor.'
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: se
  alternatives_spanish:
  - él
  - uno
  lexicon: HALOT
  rationale: El pronombre hebreo retoma al sujeto masculino singular de forma enfática. En español, una construcción pronominal impersonal con «se» permite mantener la generalidad representativa sin un «él» que resulte redundante en esta frase.
- source_word: עָמֵל
  english_pob_choice: labors
  chosen_spanish: se afana
  alternatives_spanish:
  - trabaja
  - se fatiga
  - labora
  lexicon: HALOT
  rationale: El verbo/adjetivo hebreo expresa labor penosa, esfuerzo y afán. «Se afana» conserva mejor el matiz de esfuerzo fatigoso que un simple «trabaja».
theological_decisions:
- issue: Sujeto masculino singular representativo
  english_pob_reading: he
  chosen_spanish_reading: el que trabaja / se afana
  alternative_spanish_readings:
  - él trabaja
  - una persona trabaja
  - ellos trabajan
  rationale: El hebreo usa formas masculinas singulares genéricas. En español, una construcción nominal con artículo definido evita neutralizar de más el rasgo gramatical y mantiene el carácter proverbial sin introducir un pronombre explícito innecesario.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado sin cambios; la versión española sigue de cerca el valor semántico del hebreo y del inglés POB, manteniendo la pregunta retórica y la relación de procedencia entre la labor y el provecho.
  spanish_consistency_notes:
  - Se usó «provecho» para יִתְרוֹן, coherente con el campo semántico de ventaja/beneficio en Eclesiastés.
  - Se prefirió «se afana» para עָמֵל por su matiz de esfuerzo fatigoso.
  - La formulación evita «SEÑOR» o equivalentes porque no hay tetragrámaton ni κύριος en este versículo.
