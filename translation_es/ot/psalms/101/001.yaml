base_translation:
  language: en
  yaml_path: translation/ot/psalms/101/001.yaml
  text: Of David[a]. A psalm. I will sing of steadfast love and justice; to you, O Yahweh[b], I will sing praise.
  footnotes:
  - marker: a
    text: Or 'mercy and judgment.' The Hebrew terms can also be rendered more narrowly as 'mercy' and 'judgment,' but 'steadfast love and justice' better reflects the broader covenantal and ethical sense here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Of David' in the superscription; this may indicate authorship, dedication, or association.
    reason: alternative_reading
