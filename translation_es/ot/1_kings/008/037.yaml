review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura de lista de calamidades y mantiene la imagen literal de «la tierra de sus puertas» con nota explicativa, en línea con el rastro auditado. Sin embargo, varias elecciones no preservan con suficiente fidelidad las decisiones léxicas del hebreo y del POB inglés: רָעָב en este contexto es mejor «hambruna» que «hambre»; חָסִיל no debe verterse «saltamontes» en el texto principal cuando el POB fijó «caterpillar» con nota de incertidumbre; y כִּי יָצַר לוֹ אֹיְבוֹ pide claramente el matiz de asedio («lo sitia»), no solo «lo aprieta».'
  spanish_quality_summary: El español es legible, pero algunas opciones suenan menos precisas o menos naturales para una Biblia eclesial amplia. «Tizón» y «añublo» son aceptables en registro bíblico, aunque «añublo» puede ser algo menos transparente; aun así, no exige corrección. «Lo aprieta» resulta demasiado coloquial e insuficientemente militar en contexto. La nota [a] no corresponde al mismo tipo de alternativa que el inglés y debe rehacerse para la incertidumbre sobre חָסִיל, no sobre רָעָב.
  glossary_alignment: 'No hay conflicto con términos teológicos globales. Las principales divergencias son léxicas: el borrador se aparta innecesariamente del POB auditado en «hambre» por «famine», en «saltamontes» por חָסִיל, y en «lo aprieta» por «besieges». Conviene alinear mejor el texto y las notas con las decisiones documentadas.'
