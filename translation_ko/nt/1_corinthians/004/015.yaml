id: 1CO.4.15
reference: '1 Corinthians 4:15'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐὰν γὰρ μυρίους παιδαγωγοὺς ἔχητε ἐν Χριστῷ, ἀλλ’ οὐ πολλοὺς πατέρας, ἐν γὰρ Χριστῷ Ἰησοῦ διὰ τοῦ εὐαγγελίου ἐγὼ ὑμᾶς ἐγέννησα.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/015.yaml
  text: For even if you have countless guardians in Messiah[a], yet not many fathers; for in Messiah Jesus, through the gospel[d][c][b], I became your father.
  footnotes:
  - marker: a
    text: 'Or ''ten thousand''; Greek μυρίους often functions idiomatically for a very large number.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''tutors'' or ''guides''; the Greek refers to a guardian or supervisor of a child rather than primarily a classroom teacher.'
    reason: cultural_note
  - marker: c
    text: 'Greek ''I begot you'' or ''I fathered you''; the expression is metaphorical, referring to Paul''s role in bringing them to faith through the gospel.'
    reason: lexical_alternative
  - marker: d
    text: 'Or ''in Christ'' and ''in Christ Jesus''; the title Χριστός is translated here as ''Messiah.'''
    reason: alternative_reading
translation:
  language: ko
  text: 여러분이 메시아 안에서 수많은 양육자를 가졌더라도 아버지가 많지는 않습니다. 이는 내가 메시아 예수 안에서 복음으로 말미암아 여러분의 아버지가 되었기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μυρίους παιδαγωγοὺς
  english_pob_choice: countless guardians
  chosen_korean: 수많은 양육자
  alternatives_korean:
  - 수많은 가정교사
  lexicon: BDAG
  rationale: 'παιδαγωγός는 자녀를 학교로 데려가는 노예 양육자. 「양육자」가 가장 자연스러움(갈 3:24와 일관).'
- source_word: ἐγὼ ὑμᾶς ἐγέννησα
  english_pob_choice: I became your father
  chosen_korean: 여러분의 아버지가 되었기
  alternatives_korean:
  - 여러분을 낳았기
  lexicon: BDAG
  rationale: γεννάω의 「낳다」를 본문 흐름(부성 비유)에 맞춰 「아버지가 되다」로 옮긴다. 문자적 「낳다」도 가능하며 각주로 표시 가능.
