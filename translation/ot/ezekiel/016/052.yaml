theological_decisions:
- issue: Comparative righteousness language applied to Sodom/Samaria and Jerusalem
  chosen_reading: Render the verse as relative/comparative vindication, not absolute moral righteousness.
  alternative_readings:
  - Render as absolute righteousness of the sisters
  - Render as formal legal acquittal only
  rationale: In Ezekiel 16 the point is that Jerusalem's greater abominations make her sisters seem righteous by comparison. The Hebrew צדק can denote being in the right or appearing righteous relative to another. The translation preserves the shocking rhetoric without implying that the sisters were truly sinless or covenantally righteous in an absolute sense.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
