base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/030/018.yaml
  text: For a great many of the people[a], many from Ephraim and Manasseh, Issachar and Zebulun, had not purified themselves, yet they ate the Passover otherwise than as it is written. But Hezekiah prayed for them, saying, “May Yahweh, who is good[b], make atonement for them—”
  footnotes:
