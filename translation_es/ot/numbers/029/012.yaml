review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura básica del hebreo: fecha calendárica, convocación santa, prohibición de trabajo ordinario y observancia festiva para Yahvé por siete días. Sin embargo, «celebrarán fiesta» suena incompleto en español y no refleja tan bien la construcción cognada וְחַגֹּתֶם חַג, que apunta a observar/celebrar una fiesta. También «Y el día quince» es entendible, pero «Y el día quince del mes séptimo»/«Y el día quince del séptimo mes» es algo menos natural que «Y el día quince del séptimo mes»; esto no es grave.'
  spanish_quality_summary: La redacción es clara y mayormente digna. «Habrá para ustedes» es aceptable pero más natural bíblicamente en español es «tendrán». «Celebrarán fiesta» resulta poco idiomático en español general y eclesial; «celebrarán una fiesta» o «guardarán una fiesta» mejora la legibilidad y precisión. El resto fluye bien.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יהוה -> «Yahvé» correctamente; מִקְרָא קֹדֶשׁ -> «santa convocación» es apropiado; כָּל מְלֶאכֶת עֲבֹדָה -> «trabajo ordinario» preserva el matiz. La principal mejora es ajustar וְחַגֹּתֶם חַג a una formulación española más natural y completa.'
  issues:
  - severity: medium
    issue: «celebrarán fiesta» es poco idiomático e incompleto
    rationale: Aunque comunica la idea general, en español normal la expresión suele requerir artículo o una formulación como «celebrarán una fiesta» o «guardarán una fiesta». La construcción hebrea cognada pide una observancia festiva explícita.
  - severity: low
    issue: «habrá para ustedes» es menos natural que «tendrán»
    rationale: יִהְיֶה לָכֶם significa literalmente «será para ustedes», pero en español «tendrán» comunica el mismo sentido con mejor fluidez, en línea con la decisión inglesa «you shall have».
  revised_spanish_text: Y el día quince del séptimo mes tendrán una santa convocación. No harán ningún trabajo ordinario, y celebrarán una fiesta para Yahvé durante siete días.
  revision_rationale: 'Se ajusta la frase verbal a un español más natural y fiel: «tendrán» refleja mejor יִהְיֶה לָכֶם, y «celebrarán una fiesta» expresa con claridad la construcción cognada וְחַגֹּתֶם חַג sin sonar truncada. No se requieren notas adicionales porque no surge una ambigüedad nueva en español.'
