translation:
  language: es
  text: 'Para el director de música[a]. De David[b]. Dice el necio en su corazón: «No hay Dios». Están corrompidos[c]; cometen actos abominables. No hay quien haga el bien.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «para el director de música» o «para el maestro del coro».
    reason: lexical_alternative
  - marker: b
    text: «De David» también puede significar «por David» o «para David» en el encabezamiento del salmo.
    reason: lexical_alternative
  - marker: c
    text: El hebreo cambia del singular («el necio») al plural («están corrompidos»), pasando de un individuo representativo a la clase que representa.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director de música
  alternatives_spanish:
  - Para el director del coro
  - Para el maestro de música
  lexicon: HALOT
  rationale: El término de la superscripción indica al responsable de la dirección musical. «Director de música» comunica la función con naturalidad en español y evita un calco rígido.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: La preposición ל en los encabezamientos de los salmos admite asociación, autoría o dedicación. «De David» conserva esa ambigüedad mejor que fijarla solo como autoría.
- source_word: נָבָל
  english_pob_choice: the fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el insensato moral
  lexicon: HALOT
  rationale: נבל no es solo falta de inteligencia, sino perversidad moral y espiritual. «Necio» mantiene la categoría bíblica y resulta más natural que un calco áspero.
- source_word: בְּלִבּוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de sí
  - en su interior
  lexicon: HALOT
  rationale: «Corazón» refleja la antropología hebrea del centro de pensamiento, voluntad e ինտención. Es literal y claro en español.
- source_word: אֵין אֱלֹהִים
  english_pob_choice: There is no God
  chosen_spanish: No hay Dios
  alternatives_spanish:
  - Dios no existe
  - No hay un dios
  lexicon: HALOT
  rationale: La frase expresa una negación existencial directa. «No hay Dios» preserva la concisión del hebreo y el sentido monoteísta del contexto.
- source_word: הִשְׁחִיתוּ
  english_pob_choice: They are corrupt
  chosen_spanish: Se corrompen
  alternatives_spanish:
  - Están corrompidos
  - Se han corrompido
  lexicon: HALOT
  rationale: El verbo expresa ruina o corrupción moral. En español, el presente reflexivo mantiene la fuerza descriptiva y puede abarcar el estado resultante sin sobreespecificar tiempo.
- source_word: הִתְעִיבוּ
  english_pob_choice: they do abominable deeds
  chosen_spanish: hacen obras abominables
  alternatives_spanish:
  - cometen actos abominables
  - hacen cosas abominables
  lexicon: HALOT
  rationale: El verbo señala conducta detestable; la combinación con «obras» comunica bien el valor moral de la acción y conserva la relación con el sustantivo siguiente.
- source_word: עֲלִילָה
  english_pob_choice: deeds
  chosen_spanish: obras
  alternatives_spanish:
  - actos
  - acciones
  lexicon: HALOT
  rationale: El sustantivo denota conducta o acciones. «Obras» se enlaza naturalmente con «abominables» y mantiene el matiz de obras hechas.
- source_word: אֵין עֹשֵׂה טוֹב
  english_pob_choice: There is no one who does good
  chosen_spanish: No hay quien haga el bien
  alternatives_spanish:
  - No hay quien obre bien
  - No existe nadie que haga el bien
  lexicon: HALOT
  rationale: La cláusula afirma ausencia universal de hacer el bien. «No hay quien haga el bien» es fiel, natural y no fuerza un giro explicativo adicional.
theological_decisions:
- issue: Alcance de la negación en אֵין אֱלֹהִים
  english_pob_reading: 'Existential denial: ''There is no God.'''
  chosen_spanish_reading: 'Negación existencial directa: «No hay Dios».'
  alternative_spanish_readings:
  - 'Lectura pragmática: «Dios no importa»'
  - 'Paráfrasis interpretativa: «No hay juicio de Dios»'
  rationale: El hebreo expresa de forma más directa la ausencia o inexistencia de Dios; la traducción debe conservar esa formulación explícita en lugar de sustituirla por una implicación interpretativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cambio de singular a plural en נָבָל / הִשְׁחִיתוּ
  english_pob_reading: 'Representative singular followed by generalized plural: ''The fool ... They are corrupt.'''
  chosen_spanish_reading: 'Singular representativo seguido de plural generalizado: «el necio ... Se corrompen».'
  alternative_spanish_readings:
  - 'Suavizar a singular continuo: «El necio ... se corrompe»'
  - 'Pluralizar el inicio: «Los necios dicen...»'
  rationale: El hebreo pasa del singular representativo al plural descriptivo. Conservar ese cambio evita borrar una tensión textual importante y refleja mejor la estructura original.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text sense and tension'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador mantiene el acuerdo alto del control cruzado y conserva las decisiones léxicas y teológicas ya auditadas.
  spanish_consistency_notes:
  - Se mantiene «Dios» con mayúscula para reflejar el contexto monoteísta.
  - Se conserva el juego singular/plural del hebreo sin homogeneizarlo.
  - El encabezamiento se traduce de manera funcional, no litúrgica, para mantener la transparencia del término hebreo.
  - Se evita introducir «Cristo», «SEÑOR» o equivalentes no sustentados por este versículo.
