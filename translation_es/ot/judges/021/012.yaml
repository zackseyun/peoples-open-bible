    text: 'O, de manera más idiomática: «que no habían tenido relaciones sexuales con un hombre». El hebreo dice literalmente: «que no habían conocido a un hombre por haberse acostado con varón».'
    reason: lexical_alternative
  revision_rationale: Se conserva el modismo bíblico 'conocer' y la aclaración explícita del hebreo, pero se ajusta la sintaxis para un español más natural y digno. También se limpia la nota al pie sin cambiar su función ni su contenido esencial.
