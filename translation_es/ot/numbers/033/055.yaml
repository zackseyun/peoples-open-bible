  to: Pero si no expulsan[a] a los habitantes de la tierra de delante de ustedes, entonces los que de entre ellos dejen quedar serán púas[b] en sus ojos y espinas[c] en sus costados, y los hostigarán[d] sobre la tierra en la que ustedes habitan.
  rationale: Se ajusta la sintaxis para un español más natural y fiel al causativo hebreo ('dejen quedar'), se restablece mejor la distinción entre las dos metáforas punzantes del texto fuente ('púas' / 'espinas'), y se añaden las notas léxicas significativas que el audit trail inglés preservó para las imágenes y el verbo final. Se mantiene 'sobre la tierra' para reflejar el matiz de עַל, tal como decidió el POB inglés.
