translation:
  text: Let us die as brothers[a], brothers, for the sake of the law; let us imitate the three young men in Syria[b], who despised the furnace of equal torment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the three Jewish youths known from Daniel 3. The Greek here says 'in Syria,' which reflects the wording of this text rather than the more familiar 'Babylon' from Daniel.
    reason: cross_reference
  - marker: b
    text: The adjective behind 'equal in fierceness to theirs' is rare and difficult; it may mean that the furnace was comparable to the one faced by the three youths.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφικῶς
  chosen: as brothers
  alternatives:
  - brotherly
  - in a brotherly way
  lexicon: LSJ
  rationale: Adverb from ἀδελφικός; in context it modifies the manner of dying. 'As brothers' is idiomatic English and preserves the familial solidarity emphasized by the repeated ἀδελφοί.
- source_word: ἀποθάνωμεν
  chosen: Let us die
  alternatives:
  - may we die
  lexicon: BDAG
  rationale: Aorist subjunctive used hortatively; 'Let us die' best captures the exhortational force.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - siblings
  - brothers and sisters
  lexicon: BDAG
  rationale: The address is to literal male siblings in the narrative, so the gender-accurate rendering is 'brothers' per project philosophy.
- source_word: περὶ τοῦ νόμου
  chosen: for the sake of the law
  alternatives:
  - for the law
  - on behalf of the law
  lexicon: BDAG
  rationale: περί with genitive here expresses cause or concern. 'For the sake of the law' communicates dying in defense of fidelity to the Mosaic law.
- source_word: μιμησώμεθα
  chosen: Let us imitate
  alternatives:
  - let us follow the example of
  lexicon: BDAG
  rationale: Direct and natural rendering of the hortatory subjunctive; preserves the explicit call to imitation.
- source_word: τοὺς τρεῖς τοὺς ἐπὶ τῆς Συρίας νεανίσκους
  chosen: the three young men in Syria
  alternatives:
  - the three youths in Syria
  - the three young men of Syria
  lexicon: BDAG
  rationale: Refers to the three Jewish youths of Daniel 3 in the Syrian/Seleucid region as framed in this Greek text. 'Young men' is clear modern English for νεανίσκους.
- source_word: ἰσοπαίδος
  chosen: equal in fierceness to theirs
  alternatives:
  - like that of the youths
  - matching the youths
  - of equal-child kind
  lexicon: LSJ
  rationale: The adjective is rare and difficult. In this context, linked with καμίνου and recalling the three youths, it conveys equivalence/comparability with their ordeal rather than introducing a new image. The rendering is interpretive but aims to preserve the comparison without overclaiming a technical sense.
- source_word: καμίνου
  chosen: furnace
  alternatives:
  - oven
  lexicon: BDAG
  rationale: Standard rendering in contexts of fiery persecution and the Daniel 3 allusion.
- source_word: κατεφρόνησαν
  chosen: despised
  alternatives:
  - scorned
  - treated with contempt
  lexicon: BDAG
  rationale: The verb means to look down on or disdain. 'Despised' preserves the rhetorical force of courageous contempt for suffering.
