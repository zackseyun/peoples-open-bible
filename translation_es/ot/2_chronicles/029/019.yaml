    text: O 'utensilios' u 'objetos'. El hebreo כֵּלִים es un término amplio; 'vasos' se usa aquí por su adecuación al contexto del templo.
    reason: lexical_alternative
  - marker: b
    text: O 'en su traición' o 'en su falta de fidelidad'. El hebreo resalta la quiebra de fidelidad de Acaz.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'utensilios' a 'vasos' por mejor registro cultual en español bíblico, 'había descartado' a 'había dejado de lado' para acercarse al matiz de הִזְנִיחַ, y 'por su infidelidad' a 'en su infidelidad' para reflejar con más precisión בְּמַעֲלוֹ y la auditoría inglesa.
