  yaml_path: translation/ot/jeremiah/041/007.yaml
  text: And when they came into the midst of the city[a], Ishmael son of Nethaniah slaughtered them and threw them into the midst of the cistern, he and the men who were with him.
  footnotes:
  - marker: a
    text: Or 'into the pit.' The Hebrew bor can mean either 'pit' or 'cistern'; 'cistern' fits the immediate context best.
    reason: lexical_alternative
