base_translation:
  language: en
  yaml_path: translation/ot/ezra/003/012.yaml
  text: But many of the priests and the Levites and the heads of the fathers’ houses[a], the old men who had seen the first house, were weeping with a loud voice when the foundation of this house was laid before their eyes[c][b], while many were raising their voice with a shout of joy.
  footnotes:
  - marker: a
    text: Or 'the former house' for 'the first house.' The Hebrew literally says 'the first house,' referring to the earlier temple.
    reason: lexical_alternative
  - marker: b
    text: Or 'when the foundation of this house was laid.'
    reason: lexical_alternative
  - marker: c
    text: '''Heads of fathers’ houses'' refers to leaders of ancestral family groups or clans.'
    reason: cultural_note
