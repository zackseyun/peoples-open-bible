translation:
  language: es
  text: 'Entonces Yahvé habló a Moisés, diciendo: «Yo soy Yahvé. Habla al faraón, rey de Egipto, todo lo que yo te hablo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que yo te estoy hablando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Y ... hablaba
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva avanza la acción; «Entonces» comunica esa progresión de manera natural en español sin perder el valor verbal de דּבר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliteración del nombre divino. «Yahvé» es la forma hispana estable y readable para este nombre propio, evitando la sustitución por un título.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: El infinitivo introduce discurso directo; «diciendo» es el equivalente conciso y natural en español.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: Yo soy Yahvé
  alternatives_spanish:
  - Yo soy el SEÑOR
  - Yo soy Yahvé, yo
  lexicon: HALOT
  rationale: La cláusula nominal se expresa naturalmente con verbo copulativo en español. Se conserva la autoidentificación solemne de Yahvé con su nombre propio, sin convertirlo en un título.
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Hablen
  lexicon: HALOT
  rationale: El imperativo singular de דבר se traduce con «Habla», manteniendo el mandato directo y la conexión léxica con el verbo repetido en el versículo.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: al faraón, rey de Egipto
  alternatives_spanish:
  - al faraón, el rey de Egipto
  - al faraón, rey egipcio
  lexicon: HALOT
  rationale: Se conserva la aposición hebrea de forma idiomática en español con coma, reflejando tanto el nombre propio como el título real.
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todas las cosas que
  lexicon: HALOT
  rationale: La combinación intensiva marca el contenido total del mensaje; «todo lo que» es una equivalencia natural y precisa en español.
- source_word: אֲנִי דֹּבֵר אֵלֶיךָ
  english_pob_choice: I speak to you
  chosen_spanish: yo te hablo
  alternatives_spanish:
  - yo te estoy hablando
  - yo hablo contigo
  lexicon: HALOT
  rationale: El participio puede tener valor progresivo o habitual; aquí se vierte con presente simple para mantener naturalidad y la repetición del verbo hablar. En la nota se preserva la alternativa progresiva porque el hebreo admite esa lectura.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto contiene directamente el nombre del pacto. En español, «Yahvé» preserva el nombre propio revelado sin sustituirlo por un título genérico. Es la forma que mejor funciona para lectura pública y consistencia doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo y con la solución auditada en inglés. Se ha conservado la repetición del verbo «hablar»/«decir» para reflejar el enlace léxico de דבר. La única variación relevante respecto del inglés auditado es la traducción hispana de יְהוָה como «Yahvé», siguiendo la terminología del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Moisés» y «faraón» como nombres/títulos reconocibles en español bíblico.
  - Se evita «SEÑOR» para no ocultar el nombre divino revelado.
  - La nota reproduce la alternativa aspectual del participio hebreo sin sobreinterpretarla.
