  to: Los que le ministran, ministran al Santo[a], y Dios ama a los que aman su morada.
  rationale: Se corrige la sintaxis para un español más natural («le ministran») y se elimina el futuro («ministrarán») para mantener la equivalencia con el expediente POB y evitar un matiz no exigido por la fuente. Se conserva intacta la decisión textual principal sobre «Dios» y «su morada», así como la nota de variante griega.
