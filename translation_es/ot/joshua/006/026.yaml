  to: 'En aquel tiempo Josué los hizo jurar[a], diciendo: «Maldito delante de Yahvé el hombre que se levante y reconstruya esta ciudad, Jericó.[b] A costa de su primogénito pondrá sus cimientos[c], y a costa de su menor colocará sus puertas».'
  rationale: Se corrige el causativo con objeto expreso («los hizo jurar»), se mejora la naturalidad y precisión de יְיַסְּדֶנָּה con «pondrá sus cimientos», y se usa la expresión más idiomática «a costa de» para el sentido de pérdida/forfeit sin alterar la ambigüedad del hebreo. Las notas se simplifican y sus anclajes quedan claros y únicos.
