  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: fórmula de lamento «¿Hasta cuándo?», nombre divino «Yahvé», ira continua «para siempre» y la imagen de arder «como fuego». Sin embargo, no sigue del todo la decisión léxica auditada del POB para קִנְאָה, donde el inglés eligió «jealousy» por su fuerza de pacto y dejó «zeal» como alternativa en nota. El español principal con «celo» desplaza esa decisión y suaviza la tensión semántica en vez de preservarla.'
  spanish_quality_summary: 'El español es claro y natural. «¿Te enojarás para siempre?» y «¿Arderá ... como fuego?» son legibles y dignos. La única reparación necesaria es léxica y de nota al pie: conviene usar «celos» en el texto principal y dejar «celo» como alternativa, para alinearse con la evidencia y la rationale documentada. También debe corregirse la nota, que actualmente presenta como alternativa toda la cláusula en vez del término relevante.'
  glossary_alignment: '«Yahvé» está bien alineado con la política del proyecto para יְהוָה. No hay otros términos del glosario mayor en juego. La divergencia relevante está en קִנְאָה: el POB auditado privilegia «jealousy», por lo que en español corresponde normalmente «celos» aquí, con «celo» en nota como alternativa contextual.'
  issues:
  - severity: medium
    issue: El texto principal usa «tu celo» para קִנְאָתֶךָ en lugar de reflejar la elección auditada «your jealousy».
    rationale: La documentación inglesa justifica «jealousy» por el sentido pactual y la cercanía con la ira divina; pasar a «celo» en el texto principal reduce esa fuerza teológica y léxica sin una razón contextual suficiente para apartarse.
  - severity: medium
    issue: La nota al pie está mal enfocada y anclada.
    rationale: La nota inglesa preserva una alternativa léxica para קִנְאָה («zeal»), no una alternativa de toda la cláusula. En español, la nota debe ir anclada a «celos» y decir que el hebreo también puede significar «celo».
  - severity: low
    issue: La rationale española menciona alternativas inadecuadas como «tu celosía» y «tu envidia».
    rationale: Esas alternativas no son opciones viables para este contexto bíblico y muestran ruido léxico, aunque esto no afecta directamente el texto principal si se corrige la traducción.
