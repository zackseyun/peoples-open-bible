translation:
  language: es
  text: Dios, cuando saliste delante de tu pueblo, cuando marchaste por el desierto[a]—Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el desierto» o «en la región desolada». El término hebreo designa una zona de desolación o yermo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - ¡Dios!
  - Oh Dios
  lexicon: HALOT
  rationale: El hebreo abre directamente con el nombre común para Dios, sin partícula vocativa explícita; por eso en español se mantiene la forma simple «Dios», que conserva el arranque directo del salmo sin añadir un «oh» no exigido por el texto.
- source_word: בְּצֵאתְךָ
  english_pob_choice: when you went out
  chosen_spanish: cuando saliste
  alternatives_spanish:
  - en tu salida
  - al salir tú
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo es temporal en este contexto. «Cuando saliste» preserva el valor eventivo y es natural en español, sin volverla un giro demasiado literal.
- source_word: לִפְנֵי עַמֶּךָ
  english_pob_choice: before your people
  chosen_spanish: delante de tu pueblo
  alternatives_spanish:
  - ante tu pueblo
  - en frente de tu pueblo
  lexicon: HALOT
  rationale: «Delante de» comunica bien la imagen de liderazgo y marcha delante del pueblo. «Ante» sería posible, pero puede sonar más formal o estático; aquí la escena es dinámica.
- source_word: בְּצַעְדְּךָ
  english_pob_choice: when you marched
  chosen_spanish: cuando marchaste
  alternatives_spanish:
  - cuando diste pasos
  - en tu marcha
  lexicon: HALOT
  rationale: El verbo צעד expresa paso decidido o marcha. «Marchaste» reproduce mejor el movimiento intencional del paralelismo y encaja con el contexto del éxodo.
- source_word: בִישִׁימוֹן
  english_pob_choice: through the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - por el desierto árido
  - por la región desolada
  lexicon: HALOT
  rationale: ישימון designa una región desolada y desértica. En español, «desierto» comunica de forma clara y bíblicamente natural esa extensión árida; en nota se conserva la amplitud semántica de la palabra hebrea.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva la transliteración porque su función exacta sigue siendo incierta; traducirla de manera definida iría más allá de la evidencia del texto.
theological_decisions:
- issue: Dirección del discurso en el salmo
  english_pob_reading: The verse is rendered as a direct address to God recalling his leading of his people in the wilderness.
  chosen_spanish_reading: El versículo se traduce como una invocación directa a Dios que recuerda su marcha delante del pueblo en el desierto.
  alternative_spanish_readings:
  - 'Una lectura meramente descriptiva: «Dios salió delante de tu pueblo...»'
  rationale: El hebreo funciona naturalmente como خطاب directo en el marco del salmo. Mantener la dirección alocutiva respeta la forma poética y el sentido histórico-teológico sin añadir explicaciones doctrinales.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'El audit trail inglés no requiere cambios mayores: mantiene el paralelismo temporal, la imagen de liderazgo delante del pueblo y la referencia al yeshimón/ wilderness. Se ha ajustado el español para sonar natural y conservar la fuerza poética sin perder precisión semántica.'
  spanish_consistency_notes:
  - Se mantiene «Dios» al inicio como vocativo implícito, coherente con el POB inglés.
  - «Desierto» se usa como equivalencia principal de ישימון, con nota para su matiz de región desolada.
  - Se conserva «Selah» sin traducir, siguiendo la cautela del texto base.
