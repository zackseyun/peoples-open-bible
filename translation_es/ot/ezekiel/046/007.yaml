translation:
  language: es
  text: Y ofrecerá como ofrenda vegetal un efa para el toro y un efa para el carnero, y para los corderos conforme a lo que su mano alcance[a]; y un hin de aceite con cada efa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "conforme a sus medios". El hebreo dice literalmente: "según lo que alcance su mano" y alude a la capacidad de aportar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיפָה
  english_pob_choice: an ephah
  chosen_spanish: un efa
  alternatives_spanish:
  - una medida de grano
  - un bushel
  lexicon: HALOT
  rationale: Conservo el término técnico antiguo de medida, como hace la POB en inglés con 'ephah', porque el contexto es cultual y la unidad específica importa más que una equivalencia moderna aproximada.
- source_word: פַּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el buey
  - un toro
  lexicon: HALOT
  rationale: El hebreo con artículo apunta al animal sacrificial determinado de la regulación; 'toro' comunica el referente con naturalidad en español sin perder la especificidad animal.
- source_word: אַיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho de oveja
  - un carnero
  lexicon: HALOT
  rationale: '''Carnero'' es el equivalente natural y preciso en español para el animal sacrificial señalado por el artículo en el hebreo.'
- source_word: יַעֲשֶׂה מִנְחָה
  english_pob_choice: he shall provide as a grain offering
  chosen_spanish: ofrecerá como ofrenda vegetal
  alternatives_spanish:
  - hará una ofrenda vegetal
  - preparará una ofrenda vegetal
  lexicon: HALOT
  rationale: En contexto sacrificial, מִנְחָה designa una ofrenda vegetal o de grano; 'ofrenda vegetal' mantiene la categoría cultual sin sonar tan estrechamente agrícola como 'de grano'. 'Ofrecerá' expresa en español la función ritual de יַעֲשֶׂה mejor que un literal 'hará'.
- source_word: כְּבָשִׂים
  english_pob_choice: the lambs
  chosen_spanish: los corderos
  alternatives_spanish:
  - los corderitos
  - los corderos machos
  lexicon: HALOT
  rationale: '''Corderos'' es el equivalente estándar y natural; no añado ''machos'' porque ni el hebreo ni la decisión inglesa lo exigen aquí.'
- source_word: כַּאֲשֶׁר תַּשִּׂיג יָדוֹ
  english_pob_choice: whatever his hand can afford
  chosen_spanish: conforme a lo que su mano alcance
  alternatives_spanish:
  - según lo que pueda dar
  - según sus medios
  lexicon: HALOT
  rationale: Mantengo la imagen concreta de 'mano' presente en el hebreo y en la nota inglesa, pero la formulo en español de manera natural. La frase puede implicar recursos o capacidad de proveer sin explicitarlo en exceso en el texto principal.
- source_word: הִין לָאֵיפָה
  english_pob_choice: a hin of oil with each ephah
  chosen_spanish: un hin de aceite con cada efa
  alternatives_spanish:
  - un hin de aceite por cada efa
  - un hin de aceite para cada efa
  lexicon: HALOT
  rationale: '''Con cada efa'' sigue de cerca la revisión inglesa y refleja el valor distributivo de la construcción hebrea, sin sobreexplicar la proporción en el cuerpo del versículo.'
theological_decisions:
- issue: Cómo traducir מִנְחָה en contexto de sacrificio
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de grano
  - oblación
  rationale: En español, 'ofrenda vegetal' evita la ambigüedad de 'grano' cuando el texto regula una ofrenda ritual específica; también conserva el carácter no-íctico/vegetal de la ofrenda sin cambiar la referencia cultual.
  doctrine_reference: Levítico 2; Ezequiel 45:24; 46:5-7
- issue: Si la medida de aceite debe explicitarse como proporción distributiva
  english_pob_reading: a hin of oil with each ephah
  chosen_spanish_reading: un hin de aceite con cada efa
  alternative_spanish_readings:
  - un hin de aceite por cada efa
  - un hin de aceite para cada efa
  rationale: La formulación mantiene la relación medida-a-medida sin introducir una paráfrasis interpretativa. 'Con cada efa' reproduce de forma natural el matiz distributivo del hebreo y la revisión inglesa.
  doctrine_reference: Ezequiel 46:7; comparación con el patrón de ofrendas en la Torá
translation_notes:
  revision_awareness: La POB inglesa revisó la relación del aceite de 'to each ephah' a 'with each ephah' para sonar más natural y estar más cerca de la construcción hebrea. La versión española sigue esa revisión con 'con cada efa', manteniendo el mismo valor distributivo. También se preservó el sentido de la nota sobre el modismo de la mano en una nota española equivalente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiriera; este versículo no contiene el nombre divino explícito.
  - Se mantuvo 'un efa' como medida técnica en lugar de convertirla a una unidad moderna.
  - Se eligió 'ofrenda vegetal' como equivalente cultual consistente para מִנְחָה en este contexto.
  - Se evitó 'siervo' o lenguaje interpretativo ajeno al hebreo; el texto conserva la estructura normativa del mandato.
