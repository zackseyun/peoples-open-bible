translation:
  language: es
  text: La fuerza del Rey ama la justicia[a]; tú has establecido la rectitud[b]; has hecho justicia y rectitud en Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «El Rey poderoso ama la justicia». El hebreo inicial es comprimido y puede construirse de más de una manera.'
    reason: alternative_reading
  - marker: b
    text: «Rectitud» también puede traducirse «equidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עֹז
  english_pob_choice: the strength
  chosen_spanish: la fuerza
  alternatives_spanish:
  - la fuerza
  - el poder
  - la fortaleza
  lexicon: HALOT
  rationale: עֹז denota fuerza, poder o vigor. En español, «la fuerza» conserva la imagen más transparente del hebreo y permite mantener la estructura comprimida del inicio del versículo.
- source_word: מֶלֶךְ
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - el Rey
  - el rey
  lexicon: HALOT
  rationale: El hebreo presenta un título regio en contexto de خطاب directo a Dios. «Rey» con mayúscula comunica respeto y referencia teológica sin sustituir el término por una formulación más interpretativa.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - la justicia
  - el juicio
  - el derecho
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט expresa el orden justo y la rectitud judicial. «Justicia» es la opción más natural y fiel en español, y conserva la repetición del término en el versículo.
- source_word: כּוֹנַ֣נְתָּ
  english_pob_choice: have established
  chosen_spanish: has establecido
  alternatives_spanish:
  - has establecido
  - has afirmado
  - has fijado
  lexicon: HALOT
  rationale: El verbo comunica una acción completada con efecto perdurable. «Has establecido» refleja bien esa idea de consolidar o dejar firme.
- source_word: מֵישָׁרִ֑ים
  english_pob_choice: uprightness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la rectitud
  - la equidad
  - lo recto
  lexicon: HALOT
  rationale: El término apunta a lo recto, justo o equitativo. En español, «rectitud» preserva el valor moral y judicial, y permite una nota alternativa si se desea matizar como «equidad».
- source_word: וּ֝/צְדָקָ֗ה
  english_pob_choice: and righteousness
  chosen_spanish: y justicia
  alternatives_spanish:
  - y justicia
  - y rectitud
  - y justicia y rectitud
  lexicon: HALOT
  rationale: צְדָקָה puede ser «justicia» o «rectitud». Dado que el versículo ya usa «justicia» para מִשְׁפָּט, traducir también צְדָקָה como «justicia» mantiene el paralelismo hebreo, aunque en español crea una repetición fuerte; se conserva por fidelidad al texto y se deja abierta la alternativa semántica de «rectitud».
- source_word: בְּ/יַעֲקֹב
  english_pob_choice: in Jacob
  chosen_spanish: en Jacob
  alternatives_spanish:
  - en Jacob
  - entre Jacob
  - en Israel
  lexicon: HALOT
  rationale: Se conserva «Jacob» como nombre del pacto y la referencia poética del hebreo. La preposición «en» sigue de cerca la construcción מקורית y evita interpretar el nombre como «Israel» sin apoyo textual directo.
- source_word: עָשִׂיתָ
  english_pob_choice: have done
  chosen_spanish: has hecho
  alternatives_spanish:
  - has hecho
  - has obrado
  - has realizado
  lexicon: HALOT
  rationale: עָשָׂה es amplio; «has hecho» es la forma más directa en español y deja que los objetos del verbo concreten la acción.
theological_decisions:
- issue: Cómo reflejar la apertura hebrea comprimida וְעֹז מֶלֶךְ מִשְׁפָּט אָהֵב
  english_pob_reading: The strength of the King loves justice; an idiomatic alternative is 'The mighty King loves justice.'
  chosen_spanish_reading: La fuerza del Rey ama la justicia
  alternative_spanish_readings:
  - El Rey poderoso ama la justicia
  - La fuerza del Rey ama la justicia
  - El Rey, en su fuerza, ama la justicia
  rationale: El hebreo es sintácticamente condensado y admite más de una constricción. Se conserva la estructura más cercana al hebreo con «la fuerza del Rey», aunque en español suene menos idiomática que una paráfrasis como «el Rey poderoso». La decisión mantiene visible la tensión del original y no borra la ambigüedad documentada.
  doctrine_reference: Principio POB de primacía del original y preservación de ambigüedad donde el hebreo es comprimido.
- issue: Cómo verter el segundo miembro repetitivo מִשְׁפָּט וּצְדָקָה
  english_pob_reading: you have done justice and righteousness in Jacob
  chosen_spanish_reading: has hecho justicia y justicia en Jacob
  alternative_spanish_readings:
  - has hecho justicia y rectitud en Jacob
  - has obrado justicia y rectitud en Jacob
  - has hecho derecho y justicia en Jacob
  rationale: El hebreo empareja מִשְׁפָּט y צְדָקָה, y el audit trail inglés los distingue como 'justice and righteousness'. En español, 'justicia y justicia' preserva la repetición léxica y el paralelismo, pero también deja ver la tensión entre equivalencia semántica y repetición formal. La alternativa 'justicia y rectitud' es válida, pero suaviza la reiteración del hebreo.
  doctrine_reference: Lectura lexical del paralelismo hebreo y preferencia por no borrar repeticiones significativas.
translation_notes:
  revision_awareness: La revisión inglesa reciente retiró el conector inicial 'And' por naturalidad sin alterar el contenido. En español no se añadió una conjunción inicial, y se mantuvo la estructura condensada del primer miembro para reflejar el hebreo y la lectura auditada. También se retuvo la repetición de 'justicia' en el cierre para no nivelar el paralelismo del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente es יהוה; aquí no aplica.
  - Se mantiene «Rey» con mayúscula por referencia reverencial a Dios.
  - Se conserva la repetición de «justicia» al final para reflejar el paralelismo formal del hebreo.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al texto.
  - La frase final puede leerse con una leve tensión semántica en español; se preserva deliberadamente por fidelidad al hebreo.
