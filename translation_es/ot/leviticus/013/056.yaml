revisions:
- from: Pero si el sacerdote lo examina[a], y he aquí que la mancha se ha desvanecido después de ser lavada, entonces la desgarrará fuera de la prenda, o fuera del cuero, o fuera de la urdimbre, o fuera de la trama.
  to: Pero si el sacerdote lo examina, y he aquí que la mancha se ha desvanecido después de ser lavado, entonces la arrancará de la prenda, o del cuero, o de la urdimbre, o de la trama[a].
  rationale: Se ajusta la referencia del pasivo para reflejar mejor el hebreo, se reemplaza una construcción española torpe por otra natural que conserva la idea de extraer la zona afectada, y se alinea la nota al pie con la alternativa léxica documentada para el término textil final. No se requiere adjudicación adicional.
