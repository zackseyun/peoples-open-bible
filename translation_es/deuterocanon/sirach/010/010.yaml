review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo principal y la decisión del POB de mantener el sentido amplio de יִפּוֹל como «caerá» en vez de especificar muerte. También transmite de forma natural la imagen de יַצְהִיב como palidez visible. Sin embargo, las notas a pie están invertidas respecto del rastro auditado en inglés: la nota anclada en «pálido» debería explicar la imagen cromática hebrea, y la anclada en «hoy» debería preservar la alternativa griega sobre el final del rey.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial contemporáneo: «Una enfermedad leve hace que el médico se ponga pálido; un rey hoy, y mañana caerá». Puede mejorarse ligeramente la distribución de notas para ajustarla al audit trail sin tocar casi nada del estilo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Médico» para רוֹפֵא, «rey» para מֶלֶךְ, «enfermedad leve» para שֶׁמֶץ מַחֲלָה y «caerá» para יִפּוֹל están bien elegidos. La decisión de no explicitar muerte en el texto principal coincide con la rationale documentada; la especificación griega debe quedar solo en nota.
  issues:
  - severity: medium
    issue: Las notas a pie a y b no siguen la correspondencia del audit trail inglés.
    rationale: En el English POB, la nota [a] acompaña «turn pale» y explica la tradición griega alternativa sobre el final del rey, mientras que la nota [b] acompaña «today» y explica la imagen hebrea de cambio de color. En español se han puesto contenidos correctos pero anclados al lugar opuesto, lo que rompe la trazabilidad documental.
  - severity: low
    issue: La nota sobre «pálido» introduce «desconcertado o burlado» como explicación del griego.
    rationale: Aunque σκώπτει puede motivar esa observación, el audit trail inglés para este versículo no desarrolla esa interpretación; solo conserva la alternativa griega para el final del rey. Conviene ceñirse más estrechamente a la documentación aprobada.
  revised_spanish_text: Una enfermedad leve hace que el médico se ponga pálido[a]; un rey hoy[b], y mañana caerá.
  revised_footnotes:
  - marker: a
    text: 'El paralelo griego dice: «y un rey hoy, y mañana llegará a su fin», interpretando el hebreo «caerá» de manera más específica como muerte.'
    reason: alternative_reading
  - marker: b
    text: El hebreo dice literalmente «se pone amarillo» o presenta un cambio de color visible, usando una imagen corporal para el efecto de la enfermedad.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel, natural y bien alineado con el hebreo y con la decisión exegética del POB. Solo se corrigen y simplifican las notas para que coincidan con los anclajes y el contenido documentados en el audit trail inglés.
