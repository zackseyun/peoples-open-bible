    rationale: Aunque posible en ciertos contextos, «prudentes» enfatiza cautela práctica. Aquí el hebreo apunta a entendimiento/discernimiento. «Entendidos» comunica mejor la inteligencia perceptiva indicada por la nota inglesa.
  - severity: low
