review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: odio de la vida, causa introducida por כִּי, la obra hecha bajo el sol, y la conclusión de הֶבֶל + רְעוּת רוּחַ. Sin embargo, presenta dos desajustes importantes con el expediente POB: (1) la nota [a] está anclada a «vida», pero corresponde a הֶבֶל/vapor al final del versículo; (2) la nota [b] se ancla a «gravosa», pero su contenido corresponde a la frase final רְעוּת רוּחַ. Además, «Y aborrecí» es fiel pero menos natural discursivamente que «Así que aborrecí» o «Entonces aborrecí» para el vav consecutivo según la decisión inglesa.'
  spanish_quality_summary: El español es mayormente claro y digno. «La vida», «la obra que se hace bajo el sol» y «todo es vapor» funcionan bien. «Me fue gravosa» es comprensible, aunque algo rígido; puede mantenerse en registro literario. La mayor necesidad de reparación es la colocación de las notas. También conviene mejorar el arranque discursivo con «Así que» para reflejar mejor la progresión sin sonar tan calcado como «Y».
  glossary_alignment: No hay términos del glosario mayor en juego. La elección «vapor» para הֶבֶל sigue correctamente la política documentada. «Bajo el sol» es apropiado. «Persecución del viento» transmite la imagen, aunque el expediente inglés final prefirió un equivalente más cercano a «striving after wind»; en español «afán tras el viento» o «esforzarse tras el viento» sonarían menos naturales. «Persecución del viento» es aceptable, pero las notas deben corregirse.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras equivocadas
    rationale: La nota [a] explica «hebel» ('vapor/vanidad/aliento'), pero en el borrador está puesta sobre «vida». La nota [b] da la alternativa «una persecución del viento», pero está puesta sobre «gravosa» en vez de la frase final correspondiente a רְעוּת רוּחַ. Esto distorsiona la evidencia léxica documentada.
  - severity: medium
    issue: La conjunción inicial «Y» suena demasiado aditiva
    rationale: El expediente inglés justificó «So» por progresión discursiva, no mera suma. En español bíblico legible, «Así que» comunica mejor esa relación que «Y», sin sobreinterpretar.
  revised_spanish_text: Así que aborrecí la vida, porque me fue gravosa la obra que se hace bajo el sol; porque todo es vapor[a] y una persecución del viento[b].
  revised_footnotes:
  - marker: a
    text: O 'vanidad' o 'aliento'; el hebreo hebel evoca algo fugaz, insustancial o escurridizo.
    reason: lexical_alternative
  - marker: b
    text: O 'un afán tras el viento'.
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron los anclajes de las notas para que correspondan a los términos fuente adecuados: [a] a «vapor» (הֶבֶל) y [b] a la frase final (רְעוּת רוּחַ). También se ajustó la conjunción inicial a «Así que» para reflejar mejor la progresión discursiva del hebreo y la decisión POB. Se mantuvo «me fue gravosa» y «persecución del viento» como opciones aceptables en español formal.'
