translation:
  language: es
  text: Y los vasos sagrados[a] de la casa del Señor, tanto los de oro como los de plata, que Nabucodonosor sacó de la casa que estaba en Jerusalén y llevó a Babilonia, han de ser devueltos a la casa que está en Jerusalén, donde estaban puestos[b], para que sean colocados allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sagrados”. La expresión griega se refiere a objetos del templo consagrados al uso santo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “casa del Señor”, es decir, el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὰ σκεύη
  english_pob_choice: holy vessels
  chosen_spanish: vasos sagrados
  alternatives_spanish:
  - vasos santos
  - utensilios sagrados
  lexicon: LSJ
  rationale: σκεύη designa recipientes, utensilios o vasos; con ἱερὰ apunta a objetos consagrados al uso cultual. En español, “vasos sagrados” conserva la concreción material y la dignidad cultual sin forzar un tecnicismo ajeno al contexto.
- source_word: οἴκου Κυρίου
  english_pob_choice: house of the Lord
  chosen_spanish: casa del Señor
  alternatives_spanish:
  - templo del Señor
  - casa de Yahvé
  lexicon: LSJ
  rationale: οἶκος significa literalmente “casa”, y el contexto indica el templo. “Casa del Señor” sigue de cerca la formulación griega y mantiene el registro bíblico; “Señor” aquí reproduce Κυρίου conforme al contexto griego del texto base.
- source_word: τά τε χρυσᾶ καὶ ἀργυρᾶ
  english_pob_choice: both the gold and the silver ones
  chosen_spanish: tanto los de oro como los de plata
  alternatives_spanish:
  - los de oro y plata
  - los objetos de oro y de plata
  lexicon: LSJ
  rationale: Los adjetivos están sustantivados y retoman los vasos. En español, “los de oro” y “los de plata” reproduce la referencia anafórica con naturalidad y evita repetir “vasos” innecesariamente.
- source_word: ἐξήνεγκεν
  english_pob_choice: carried out
  chosen_spanish: sacó
  alternatives_spanish:
  - sacó fuera
  - llevó fuera
  lexicon: LSJ
  rationale: El verbo subraya la acción de extraer del templo. “Sacó” es la manera más natural en español de expresar esa salida desde el interior, preservando la dirección marcada por ἐκ.
- source_word: ἀπήνεγκεν εἰς Βαβυλῶνα
  english_pob_choice: took to Babylon
  chosen_spanish: llevó a Babilonia
  alternatives_spanish:
  - transportó a Babilonia
  - se los llevó a Babilonia
  lexicon: LSJ
  rationale: “Llevó a Babilonia” comunica el traslado completo con sobriedad y fidelidad. “Se los llevó” podría sonar más idiomático, pero introduce un matiz reflexivo no necesario aquí.
- source_word: ἀποκατασταθῆναι
  english_pob_choice: are to be restored
  chosen_spanish: han de ser devueltos
  alternatives_spanish:
  - deben ser restaurados
  - han de ser restaurados
  lexicon: LSJ
  rationale: El infinitivo expresa finalidad/resultado del decreto. “Han de ser devueltos” conserva la idea de restitución al lugar propio sin desplazar el sentido hacia una restauración más abstracta de estado o función.
- source_word: οὗ ἦν κείμενα
  english_pob_choice: where they were placed
  chosen_spanish: donde estaban puestos
  alternatives_spanish:
  - donde estaban colocados
  - donde yacían
  lexicon: LSJ
  rationale: κείμενα indica estar puesto o colocado. “Estaban puestos” mantiene la imagen espacial y es más literal que “colocados”; “yacían” sería posible, pero menos natural para vasos del templo.
- source_word: ὅπως τεθῇ ἐκεῖ
  english_pob_choice: so that they may be set there
  chosen_spanish: para que sean colocados allí
  alternatives_spanish:
  - a fin de que sean puestos allí
  - para que estén allí colocados
  lexicon: LSJ
  rationale: La cláusula final expresa la intención de volver a situarlos en el templo. “Sean colocados allí” preserva el propósito sin necesidad de una perífrasis más pesada.
- source_word: Ναβουχοδονοσόρ
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nebucodonosor
  lexicon: LSJ
  rationale: La transliteración tradicional en español bíblico es “Nabucodonosor”, plenamente reconocible y fiel al referente histórico del texto.
theological_decisions:
- issue: Renderización de Κυρίου en un contexto de templo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Señor Dios
  rationale: El texto griego dice Κυρίου, no el tetragrámaton directamente. Por eso, en la línea principal se conserva “Señor” como equivalente de κύριος, manteniendo la primacía de la fuente griega y el registro bíblico, sin introducir una identificación explícita con Yahvé que el griego aquí no formula de modo directo.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord)'
- issue: Restitución de los vasos al lugar sagrado
  english_pob_reading: are to be restored ... so that they may be set there
  chosen_spanish_reading: han de ser devueltos ... para que sean colocados allí
  alternative_spanish_readings:
  - deben ser restaurados ... para que sean puestos allí
  - han de ser restituidos ... para que sean puestos allí
  rationale: La secuencia griega presenta una restauración concreta al sitio legítimo de los objetos del templo. “Devueltos” mantiene el acto de retorno material; “colocados allí” conserva el propósito de reposición sin sobreactuar un sentido teológico adicional.
  doctrine_reference: No doctrinal dispute; consistency with cultic-temple context in source Greek
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al preferir una expresión directa y natural para el imperfecto griego en οὗ ἦν κείμενα, evitando un pluscuamperfecto innecesario. También se respetó la decisión de mantener la referencia cultual de οἶκος Κυρίου como “casa del Señor”, y se tradujeron los verbos de traslado y restitución con un español sobrio y publication-readable.
  spanish_consistency_notes:
  - Se mantiene “Señor” para Κυρίου, coherente con el audit trail griego y sin introducir máscara tipográfica.
  - “Vasos sagrados” conserva la concreción material y la función cultual; no se substituye por “utensilios” para no perder la referencia a objetos del templo.
  - “Han de ser devueltos” expresa el carácter decretivo/prospectivo del infinitivo aoristo pasivo sin sobreinterpretarlo.
  - 'La secuencia final conserva la repetición de ubicación/restauración propia del griego: “casa que está en Jerusalén ... colocados allí”.'
