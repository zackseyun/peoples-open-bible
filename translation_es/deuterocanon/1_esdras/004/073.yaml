translation:
  language: es
  text: y para la construcción del templo[a], que cada año se dieran veinte talentos hasta que fuera construido[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santuario». El griego usa ἱερόν, término estándar para el templo.
    reason: lexical_alternative
  - marker: b
    text: Un talento era una gran unidad de peso y, en este contexto, una medida monetaria.
    reason: cultural_note
lexical_decisions:
- source_word: οἰκοδομή
  english_pob_choice: building
  chosen_spanish: construcción
  alternatives_spanish:
  - edificación
  - obra
  lexicon: LSJ
  rationale: En este contexto administrativo y de financiamiento, οἰκοδομή apunta al proceso o tarea de construir. «Construcción» conserva ese matiz y suena natural en español; «edificación» sería posible, pero menos directo aquí.
- source_word: ἱερόν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - recinto sagrado
  lexicon: LSJ
  rationale: El audit trail inglés entiende ἱερόν como el templo en sentido estándar. «Templo» es la equivalencia más clara y natural en español; «santuario» podría sugerir un matiz más cultual o espacial que el contexto no requiere.
- source_word: δοθῆναι
  english_pob_choice: be given
  chosen_spanish: se dieran
  alternatives_spanish:
  - fueran dados
  - se otorgaran
  - se proporcionaran
  lexicon: LSJ
  rationale: El infinitivo pasivo aoristo en lenguaje de decreto se expresa bien en español con una pasiva refleja impersonal. «Se dieran» mantiene el valor de asignación de fondos sin forzar un sujeto explícito.
- source_word: κατ’ ἐνιαυτόν
  english_pob_choice: each year
  chosen_spanish: cada año
  alternatives_spanish:
  - anualmente
  - año tras año
  lexicon: LSJ
  rationale: La frase distributiva indica periodicidad anual. «Cada año» es la forma más natural y directa en español contemporáneo, equivalente a «each year».
- source_word: τάλαντα εἴκοσι
  english_pob_choice: twenty talents
  chosen_spanish: veinte talentos
  alternatives_spanish:
  - veinte talentos monetarios
  - veinte unidades de talento
  lexicon: LSJ
  rationale: «Talentos» conserva la unidad antigua y el paralelismo con el inglés POB. En el español bíblico, el término sigue siendo reconocible; una glosa dentro del texto haría la lectura más pesada.
- source_word: μέχρι τοῦ οἰκοδομηθῆναι
  english_pob_choice: until it is built
  chosen_spanish: hasta que estuviera construido
  alternatives_spanish:
  - hasta que se construyera
  - hasta ser construido
  - hasta que estuviese edificado
  lexicon: LSJ
  rationale: La construcción con μέχρι + infinitivo articular expresa duración hasta la terminación. En español, «hasta que estuviera construido» refleja bien ese límite temporal y retoma naturalmente el referente del templo.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la última revisión; la redacción española sigue esa lectura de alta concordancia y conserva el sentido administrativo y temporal del texto griego.
  spanish_consistency_notes:
  - Se mantiene «templo» para ἱερόν, en coherencia con el POB inglés.
  - Se conserva «talentos» como unidad antigua sin explicación intratextual, dejando la nota cultural para la aclaración.
  - La pasiva refleja «se dieran» evita introducir un agente no expresado en el griego.
  - El cierre temporal «hasta que estuviera construido» preserva el valor de finalización del infinitivo articular.
