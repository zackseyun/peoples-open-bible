translation:
  language: es
  text: 'diciendo[a]: «Maestro, Moisés nos escribió que, si el hermano de alguien muere teniendo esposa, y este no tiene hijos, su hermano debe tomar a la mujer y levantar descendencia[b] para su hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dejando una esposa»; el griego dice literalmente «muere teniendo esposa».
    reason: lexical_alternative
  - marker: b
    text: «Levantar descendencia» refleja el modismo legal de Deuteronomio 25:5 para proporcionar descendientes en nombre del hermano fallecido; literalmente, «levantar simiente».
    reason: cross_reference
lexical_decisions:
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Vocativo directo a Jesús. En español, «Maestro» comunica con naturalidad el trato respetuoso y docente; «Teacher» no debe calcarse. «Rabí» no aparece en el griego y sería menos neutro para este contexto.
- source_word: Μωϋσῆς ἔγραψεν ἡμῖν
  english_pob_choice: Moses wrote for us
  chosen_spanish: Moisés nos escribió
  alternatives_spanish:
  - Moisés escribió para nosotros
  - Moisés nos dejó escrito
  lexicon: BDAG
  rationale: El dativo ἡμῖν expresa referencia o beneficio al citar la ley dada a Israel. «Nos escribió» conserva la relación con el grupo receptor sin forzar una fórmula más interpretativa.
- source_word: ἐάν τινος ἀδελφὸς ἀποθάνῃ
  english_pob_choice: if someone's brother dies
  chosen_spanish: si el hermano de alguien muere
  alternatives_spanish:
  - si el hermano de una persona muere
  - si el hermano de alguno muere
  lexicon: BDAG
  rationale: τινος es indefinido y genérico. La construcción española mantiene ese valor sin introducir un masculino genérico innecesariamente marcado.
- source_word: ἔχων γυναῖκα
  english_pob_choice: having a wife
  chosen_spanish: teniendo esposa
  alternatives_spanish:
  - casado
  - con esposa
  lexicon: BDAG
  rationale: El participio expresa de modo directo que al morir está en condición de «tener esposa». «Teniendo esposa» sigue de cerca el griego y evita interpretar prematuramente como «casado» o como «dejando esposa».
- source_word: οὗτος ἄτεκνος ᾖ
  english_pob_choice: and he is childless
  chosen_spanish: y este queda sin hijos
  alternatives_spanish:
  - y es sin hijos
  - y este está sin hijos
  lexicon: BDAG
  rationale: ἄτεκνος significa literalmente sin hijos. «Queda sin hijos» suena natural en español y preserva la referencia al varón recién mencionado; «sin hijos» evita especificar más de lo necesario sobre la descendencia.
- source_word: ἵνα λάβῃ ὁ ἀδελφὸς αὐτοῦ τὴν γυναῖκα
  english_pob_choice: his brother should take the wife
  chosen_spanish: su hermano debe tomar a la mujer
  alternatives_spanish:
  - su hermano debe tomar la esposa
  - su hermano debe casarse con la mujer
  lexicon: BDAG
  rationale: λάβῃ aquí denota tomarla en matrimonio conforme al contexto legal. «Tomar a la mujer» conserva esa formulación legal-bíblica sin expandirla a una paráfrasis; «esposa» sería posible, pero el griego mantiene γυνή con artículo definido.
- source_word: ἐξαναστήσῃ σπέρμα
  english_pob_choice: raise up offspring
  chosen_spanish: levantar descendencia
  alternatives_spanish:
  - levantar simiente
  - producir descendencia
  - dar descendencia
  lexicon: BDAG
  rationale: σπέρμα tiene fuerza idiomática y legal en Deuteronomio 25:5. «Levantar descendencia» reproduce la imagen de la obligación de suscitar linaje para el hermano muerto sin usar un término más técnico o menos claro como «simiente».
- source_word: τῷ ἀδελφῷ αὐτοῦ
  english_pob_choice: for his brother
  chosen_spanish: para su hermano
  alternatives_spanish:
  - en favor de su hermano
  - por su hermano
  lexicon: BDAG
  rationale: 'El dativo marca beneficio y referencia: la descendencia se cuenta en relación con el hermano muerto. «Para su hermano» es breve, fiel y comprensible en español.'
theological_decisions:
- issue: Cómo reflejar la ley del levirato sin añadir explicación doctrinal al cuerpo del versículo
  english_pob_reading: 'Use straightforward legal phrasing: ''his brother should take the wife and raise up offspring for his brother'''
  chosen_spanish_reading: 'Usar una formulación legal directa: «su hermano debe tomar a la mujer y levantar descendencia para su hermano»'
  alternative_spanish_readings:
  - su hermano debería casarse con la viuda y darle descendencia a su hermano
  - su hermano tomaría a la mujer y suscitaría descendencia para su hermano
  rationale: El dicho cita una norma mosaica, no una exposición teológica. Mantener el lenguaje legal directo preserva el género del texto y evita explicar dentro del versículo lo que el lector puede reconocer por el contexto o notas.
  doctrine_reference: 'Principio de equivalencia óptima: conservar el sentido jurídico y la formulación bíblica sin sobreexplicar.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y la solución auditada en inglés POB, sin cambios sustantivos respecto del criterio revisado más reciente; se conserva la lectura legal del levirato y la equivalencia de σπέρμα con un modismo español claro.
  spanish_consistency_notes:
  - Se usa «Maestro» para Διδάσκαλε como vocativo natural en español.
  - Se mantiene «Moisés» como sujeto de la cita legal con dativo de referencia expresado por «nos».
  - Se conserva «mujer» en la clausula legal porque el griego usa γυνή; la nota aclara la alternativa interpretativa «esposa»/«dejando una esposa».
  - Se traduce ἄτεκνος por «sin hijos», no por una paráfrasis más amplia, para mantener la precisión léxica.
  - Se elige «levantar descendencia» para σπέρμα siguiendo el eco de Deuteronomio 25:5, en paralelo con la nota de modismo legal.
  - Se evita «Cristo», «SEÑOR» u otras sustituciones no presentes en este versículo.
