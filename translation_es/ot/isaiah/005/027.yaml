translation:
  language: es
  text: Ninguno entre ellos está cansado[a], y ninguno tropieza; ninguno se adormece ni duerme; el cinturón en su cintura no se afloja[b], y la correa de sus sandalias no se rompe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en él/ello»; el hebreo usa un pronombre singular con referente colectivo, aludiendo al ejército invasor como un todo.
    reason: lexical_alternative
  - marker: b
    text: 'O: «el cinturón de sus lomos no se abre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָיֵף
  english_pob_choice: weary
  chosen_spanish: está cansado
  alternatives_spanish:
  - está fatigado
  - está agotado
  lexicon: HALOT
  rationale: En este contexto militar, el hebreo expresa agotamiento físico. «Cansado» es claro y natural en español; «fatigado» y «agotado» son posibles, pero «cansado» conserva mejor la lectura directa y la fluidez poética.
- source_word: כּוֹשֵׁל
  english_pob_choice: stumbles
  chosen_spanish: tropieza
  alternatives_spanish:
  - vacila
  - tambalea
  lexicon: HALOT
  rationale: El participio describe a alguien que no pierde el paso ni cae en falta. «Tropieza» comunica bien el movimiento fallido en español y preserva el paralelismo con «cansado».
- source_word: בּוֹ
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en él
  - en ello
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el referente es colectivo en contexto. «Entre ellos» expresa en español esa referencia distributiva sin perder la tensión morfológica del singular.
- source_word: יָנוּם
  english_pob_choice: slumbers
  chosen_spanish: se adormece
  alternatives_spanish:
  - cabecea
  - se duerme
  lexicon: HALOT
  rationale: Se busca distinguir este verbo del siguiente «duerme». «Se adormece» conserva el matiz de somnolencia previa al sueño y mantiene la pareja poética hebrea.
- source_word: יִישָׁן
  english_pob_choice: sleeps
  chosen_spanish: duerme
  alternatives_spanish:
  - se queda dormido
  - descansa
  lexicon: HALOT
  rationale: Verbo común de dormir, en paralelo con el anterior. «Duerme» es la equivalencia más directa y mantiene el contraste con «se adormece».
- source_word: נִפְתַּח
  english_pob_choice: is not loosened
  chosen_spanish: no se afloja
  alternatives_spanish:
  - no se abre
  - no se desata
  lexicon: HALOT
  rationale: En el contexto de un cinturón, el sentido práctico no es meramente «abrirse», sino aflojarse o soltarse. «No se afloja» es idiomático y conserva la imagen funcional.
- source_word: אֵזוֹר
  english_pob_choice: belt
  chosen_spanish: cinturón
  alternatives_spanish:
  - cinto
  - faja
  lexicon: HALOT
  rationale: El término designa la prenda ceñida a la cintura. «Cinturón» es claro para el lector moderno; «cinto» y «faja» son posibles, pero menos neutros o menos transparentes.
- source_word: חֲלָצָיו
  english_pob_choice: at his waist
  chosen_spanish: en su cintura
  alternatives_spanish:
  - en sus lomos
  - en sus caderas
  lexicon: HALOT
  rationale: El hebreo alude a la región de los lomos/cintura. «En su cintura» transmite la localización corporal en un español natural, sin volver al giro arcaico «lomos».
- source_word: נִתַּק
  english_pob_choice: is not broken
  chosen_spanish: no se rompe
  alternatives_spanish:
  - no se quiebra
  - no se corta
  lexicon: HALOT
  rationale: Para la correa de una sandalia, el verbo sugiere ruptura o desprendimiento. «No se rompe» es la forma más natural y comprensible en español.
- source_word: שְׂרוֹךְ
  english_pob_choice: strap
  chosen_spanish: correa
  alternatives_spanish:
  - tira
  - atarra
  lexicon: HALOT
  rationale: En el contexto del calzado, «correa» expresa mejor el elemento de sujeción que «tira», y resulta más claro y digno para el registro bíblico.
- source_word: נְעָלָיו
  english_pob_choice: his sandals
  chosen_spanish: sus sandalias
  alternatives_spanish:
  - sus zapatos
  lexicon: HALOT
  rationale: El referente histórico es un tipo de calzado antiguo; «sandalias» conserva esa concreción mejor que «zapatos».
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente; no se registraron modificaciones aplicadas. La presente redacción española sigue de cerca la lectura hebrea y conserva el paralelismo poético, incluyendo la referencia colectiva expresada por el singular hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece en el pasaje.
  - 'Se conserva la distinción entre los dos verbos de sueño: «se adormece» / «duerme».'
  - Se eligió «cinturón» y «correa» por claridad moderna, sin perder la imagen del atuendo antiguo.
  - La nota [a] preserva la tensión del singular hebreo con referente colectivo.
