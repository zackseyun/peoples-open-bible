translation:
  language: es
  text: Así dejó allí a Asaf y a sus hermanos delante del arca del pacto de Yahvé, para ministrar delante del arca continuamente, conforme a la necesidad de cada día[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'como cada día lo requería'; hebreo, literalmente, 'según la palabra de un día en su día'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזָב
  english_pob_choice: he left
  chosen_spanish: dejó
  alternatives_spanish:
  - lo dejó
  - designó
  - estableció
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'dejar' o 'abandonar'; en este contexto administrativo-cultual, 'dejó' comunica con naturalidad que David los dejó allí para servicio continuo, sin convertir el verbo en una interpretación más fuerte como 'designó'.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio locativo se traduce de forma directa y natural en español con 'allí'.
- source_word: לִפְנֵי אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: before the ark of the covenant of Yahweh
  chosen_spanish: delante del arca del pacto de Yahvé
  alternatives_spanish:
  - en presencia del arca del pacto de Yahvé
  - ante el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: '''לִפְנֵי'' en contexto cultual admite ''delante de'' o ''ante''. Se conserva la cadena constructa completa y ''Yahvé'' sigue el principio del proyecto para יְהוָה.'
- source_word: לְאָסָף וּלְאֶחָיו
  english_pob_choice: Asaph and his brothers
  chosen_spanish: a Asaf y a sus hermanos
  alternatives_spanish:
  - a Asaf y a sus hermanos de clan
  - a Asaf y a sus compañeros
  lexicon: HALOT
  rationale: '''אֶחָיו'' significa literalmente ''sus hermanos''. Se mantiene ''hermanos'' para preservar el vínculo textual y la amplitud posible de parientes/compañeros levitas, sin reducirlo a una identificación técnica no explicitada.'
- source_word: לְשָׁרֵת
  english_pob_choice: to minister
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para ejercer su ministerio
  lexicon: HALOT
  rationale: En contexto litúrgico, 'ministrar' reproduce mejor la función sagrada que el más general 'servir', y mantiene la tensión entre servicio y culto.
- source_word: לִפְנֵי הָאָרוֹן
  english_pob_choice: before the ark
  chosen_spanish: delante del arca
  alternatives_spanish:
  - en presencia del arca
  - ante el arca
  lexicon: HALOT
  rationale: Se conserva la repetición de 'delante de' para reflejar la estructura del hebreo y el carácter cultual del servicio.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - de continuo
  lexicon: HALOT
  rationale: '''Continuamente'' expresa la continuidad/regularidad del servicio con un registro natural en español.'
- source_word: לִדְבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: according to each day's requirement
  chosen_spanish: conforme a la necesidad de cada día
  alternatives_spanish:
  - según la obligación de cada día
  - como cada día lo requiriera
  - según lo que cada día pedía
  lexicon: HALOT
  rationale: El giro hebreo es idiomático y alude a la provisión o tarea propia de cada día. 'Necesidad' mantiene la idea de requerimiento sin volver la frase demasiado rígida o artificial en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, evitando la máscara tradicional 'SEÑOR' y usando la forma española establecida 'Yahvé'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra alta concordancia y sin revisiones aplicadas; no hay indicios de cambios textuales o interpretativos adicionales respecto de la línea aprobada. La frase final mantiene el valor idiomático del hebreo sin expandirlo más allá de lo que el auditor inglés ya documentó.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva la repetición de 'delante del arca' para reflejar el paralelismo del hebreo.
  - '''Ministrar'' se usa con sentido cultual, no como simple asistencia.'
  - La nota de pie de página conserva la alternativa idiomática ya documentada por el POB en inglés.
