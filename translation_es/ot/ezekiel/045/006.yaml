translation:
  language: es
  text: Y como propiedad de la ciudad, darán una extensión de cinco mil de ancho y veinticinco mil de largo, junto a[a] la contribución santa; pertenecerá a toda la casa de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al lado de la contribución santa» o «en paralelo con la contribución santa». La expresión hebrea puede denotar alineación espacial además de correspondencia en la medida.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «casa de Israel», una expresión colectiva para el pueblo de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: אֲחֻזַּת הָעִיר
  english_pob_choice: the city's property
  chosen_spanish: la posesión de la ciudad
  alternatives_spanish:
  - la propiedad de la ciudad
  - la posesión urbana
  - la tenencia de la ciudad
  lexicon: HALOT
  rationale: אֲחֻזָּה nombra una posesión o tenencia heredada/territorial. «Posesión» conserva el valor de propiedad asignada sin sonar tan técnico como «tenencia», y encaja bien en el contexto de distribución de tierras.
- source_word: תִּתְּנוּ
  english_pob_choice: you shall give
  chosen_spanish: darán
  alternatives_spanish:
  - darán ustedes
  - asignarán
  - entregarán
  lexicon: HALOT
  rationale: El verbo básico נתן es «dar». En español, la forma impersonal con sujeto implícito puede funcionar en este contexto legal; «darán» mantiene la fuerza directiva del hebreo sin sobrecargar la frase con un pronombre explícito.
- source_word: חֲמֵשֶׁת אֲלָפִים רֹחַב
  english_pob_choice: five thousand wide
  chosen_spanish: cinco mil de ancho
  alternatives_spanish:
  - un ancho de cinco mil
  - cinco mil cubitos de ancho
  - cinco mil de anchura
  lexicon: HALOT
  rationale: 'El hebreo presenta la medida de forma abreviada: número + «ancho». «Cinco mil de ancho» reproduce esa concisión en un español natural; no se añade «codos» porque el texto hebreo de este versículo no lo explicita.'
- source_word: וְאֹרֶךְ חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  english_pob_choice: twenty-five thousand long
  chosen_spanish: de veinticinco mil de largo
  alternatives_spanish:
  - con una longitud de veinticinco mil
  - veinticinco mil en longitud
  - veinticinco mil de extensión
  lexicon: HALOT
  rationale: Se conserva el paralelismo dimensional del hebreo, donde «largo» funciona como sustantivo de medida. «De veinticinco mil de largo» suena natural y mantiene la estructura resumida del original.
- source_word: לְעֻמַּת
  english_pob_choice: alongside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - paralelo a
  - en correspondencia con
  lexicon: HALOT
  rationale: לְעֻמַּת puede indicar alineación espacial o correspondencia. Dado el ajuste del pasaje y la revisión inglesa, «junto a» conserva la relación espacial sin perder la posibilidad de alineación medible.
- source_word: תְּרוּמַת הַקֹּדֶשׁ
  english_pob_choice: the holy contribution
  chosen_spanish: la contribución santa
  alternatives_spanish:
  - la contribución sagrada
  - la ofrenda santa
  - la porción santa
  lexicon: HALOT
  rationale: תְּרוּמָה es una contribución apartada, y en Ezequiel 45 designa una porción consagrada de tierra. «Contribución santa» preserva la terminología cultual de la obra sin reducirla a «ofrenda» (más sacrificial) ni a «porción» (más genérica).
- source_word: לְכָל בֵּית יִשְׂרָאֵל
  english_pob_choice: to the whole house of Israel
  chosen_spanish: a toda la casa de Israel
  alternatives_spanish:
  - para toda la casa de Israel
  - de toda la casa de Israel
  - para todo el pueblo de Israel
  lexicon: HALOT
  rationale: «Casa de Israel» es la fórmula colectiva hebrea estándar. Se conserva literalmente por su valor histórico-teológico, y «toda» refleja כָל sin sustituir la expresión por «pueblo», que sería interpretativa.
- source_word: יִהְיֶה
  english_pob_choice: it shall belong
  chosen_spanish: pertenecerá
  alternatives_spanish:
  - será
  - estará
  - quedará
  lexicon: HALOT
  rationale: Aunque היה significa «ser», en este contexto distributivo la idea es posesiva/territorial. «Pertenecerá» comunica con claridad que el terreno queda destinado a Israel, siguiendo la decisión inglesa de explicitar el sentido de pertenencia.
theological_decisions:
- issue: Naturaleza de la medida territorial como asignación sagrada y no mera topografía
  english_pob_reading: the city's property ... alongside the holy contribution; it shall belong to the whole house of Israel
  chosen_spanish_reading: la posesión de la ciudad ... junto a la contribución santa; pertenecerá a toda la casa de Israel
  alternative_spanish_readings:
  - la propiedad de la ciudad ... en paralelo con la contribución santa
  - la posesión de la ciudad ... correspondiente a la contribución santa
  rationale: El versículo presenta una distribución de tierra vinculada a una porción consagrada. Mantener «posesión» y «contribución santa» preserva la dimensión jurídica y cultual del reparto, sin diluirla en lenguaje meramente geográfico.
  doctrine_reference: Ezequiel 45:1-6; distribución sagrada de la tierra y apartamiento para Yahvé
- issue: Uso de «casa de Israel» como colectivo pactual
  english_pob_reading: the whole house of Israel
  chosen_spanish_reading: toda la casa de Israel
  alternative_spanish_readings:
  - todo el pueblo de Israel
  - todo Israel
  rationale: La fórmula «casa de Israel» es una expresión bíblica fija y no conviene sustituirla por una paraphrasis más moderna. «Toda» conserva la universalidad dentro del colectivo pactal.
  doctrine_reference: Uso bíblico de בֵּית יִשְׂרָאֵל en los profetas
- issue: Relación entre el terreno de la ciudad y la porción santa
  english_pob_reading: alongside the holy contribution
  chosen_spanish_reading: junto a la contribución santa
  alternative_spanish_readings:
  - al lado de la contribución santa
  - paralela a la contribución santa
  - en correspondencia con la contribución santa
  rationale: La revisión inglesa prefirió una lectura espacial de לְעֻמַּת. En español, «junto a» mantiene abierta la relación de alineación/vecindad sin fijar demasiado una sola matización.
  doctrine_reference: Ezequiel 45:6; relación medida entre lotes consagrados
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que reordenó la apertura para reflejar mejor la construcción hebrea («as the city's property, you shall give») y precisó לְעֻמַּת como una relación espacial («alongside»). En español se optó por conservar esa lectura relacional con «junto a» y por expresar la posesión con «la posesión de la ciudad» seguido de la directiva «darán», sin introducir el término «codos» que el hebreo de este versículo no explicita. También se mantuvo la cláusula final de pertenencia, traduciendo היה de forma posesiva con «pertenecerá».
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología estándar del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se mantuvo «casa de Israel» por consistencia con el lenguaje profético y del pacto.
  - Se evitó «SEÑOR» como sustituto editorial, conforme a las normas del proyecto.
