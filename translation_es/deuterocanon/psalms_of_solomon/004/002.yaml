translation:
  language: es
  text: Excesivo en palabras, excesivo en ostentación[a] por encima de todos[b], el que es duro en palabras[c] para condenar a los pecadores en el juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «exhibición», «distinción» o «apariencia ostentosa» para el difícil término griego σημειώσει.
    reason: lexical_alternative
  - marker: b
    text: O «sobre todos los demás».
    reason: lexical_alternative
  - marker: c
    text: O «duro en el hablar».
    reason: lexical_alternative
lexical_decisions:
- source_word: περισσὸς
  english_pob_choice: excessive
  chosen_spanish: excesivo
  alternatives_spanish:
  - abundante
  - desmedido
  - más allá de medida
  lexicon: LSJ
  rationale: El sentido aquí es de exceso reprobable, no de mera abundancia. «Excesivo» conserva la crítica moral y funciona naturalmente en español.
- source_word: ἐν λόγοις
  english_pob_choice: words
  chosen_spanish: en palabras
  alternatives_spanish:
  - en palabras
  - en discurso
  - en habla
  lexicon: LSJ
  rationale: La frase describe el modo de hablar. «En palabras» mantiene la cercanía al griego y evita suavizar el paralelo con la segunda ocurrencia.
- source_word: σημειώσει
  english_pob_choice: display
  chosen_spanish: en exhibición
  alternatives_spanish:
  - en display
  - en distinción
  - en ostentación
  - en exterioridad
  lexicon: LSJ
  rationale: El término apunta a una marcada visibilidad o autoexhibición. «Exhibición» comunica la idea de mostrarse conspicuamente, sin reducirla a un solo matiz más estrecho.
- source_word: ὑπὲρ πάντας
  english_pob_choice: above all others
  chosen_spanish: sobre todos
  alternatives_spanish:
  - por encima de todos
  - más que todos
  - sobre todos los demás
  lexicon: LSJ
  rationale: La comparación intensiva se conserva con una frase natural en español. «Sobre todos» mantiene el valor de superioridad/exceso.
- source_word: σκληρός
  english_pob_choice: harsh
  chosen_spanish: duro
  alternatives_spanish:
  - severo
  - áspero
  - duro
  lexicon: LSJ
  rationale: En «duro en palabras» se conserva el matiz de severidad o aspereza del habla. En español suena más natural que una repetición de «áspero» o una paráfrasis más interpretativa.
- source_word: κατακρῖναι
  english_pob_choice: to condemn
  chosen_spanish: condenar
  alternatives_spanish:
  - juzgar en contra
  - declarar culpable
  lexicon: LSJ
  rationale: El infinitivo expresa finalidad o tendencia judicial. «Condenar» reproduce con claridad la fuerza forense del verbo.
- source_word: ἐν κρίσει
  english_pob_choice: in judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en juicio
  - en la sentencia
  - ante el juicio
  lexicon: LSJ
  rationale: «En el juicio» conserva el marco judicial de la frase y resulta más natural en español que un calco rígido.
translation_notes:
  revision_awareness: La revisión inglesa más reciente volvió a «words» para λόγοις, prefirió «display» para σημειώσει y suavizó la cláusula final sin perder el participio sustantivado del griego. La versión española refleja esos ajustes con «palabras», «exhibición» y «el que es duro en palabras», manteniendo el paralelismo descriptivo.
  spanish_consistency_notes:
  - Se usa un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se preserva la tensión de σημειώσει con un término abierto («exhibición») y notas alternativas, en lugar de resolverla dogmáticamente.
  - Se mantiene el valor judicial de κρίσει con «juicio».
  - La forma «el que es duro» intenta respetar el artículo griego ὁ con fuerza sustantiva sin romper el flujo enumerativo.
