revisions:
- from: Y sucedió que, cuando Sedequías, rey de Judá, y todos los hombres de guerra[a] los vieron, huyeron y salieron de noche de la ciudad por el camino del jardín del rey, por la puerta entre los dos muros[b]; y él salió por el camino de la Arabá.
  to: Y cuando Sedequías, rey de Judá, y todos los hombres de guerra los vieron, huyeron y salieron de noche de la ciudad por el camino del jardín del rey, por la puerta entre las dos murallas; y él[a] salió por el camino de la Arabá[b].
  rationale: Se eliminó la nota errónea sobre «hombres de guerra», se restauró la nota importante del rastro inglés sobre el singular final, se mantuvo «la Arabá» con su alternativa léxica, y se mejoró la naturalidad del español con «Y cuando» y «dos murallas».
