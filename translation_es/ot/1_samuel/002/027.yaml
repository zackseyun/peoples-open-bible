translation:
  language: es
  text: 'Y vino un hombre de Dios a Elí, y le dijo: «Así dice Yahvé: ¿De veras me revelé a la casa de tu padre, cuando estaban en Egipto, en la casa de Faraón?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿De veras me aparecí a la casa de tu padre, cuando estaban en Egipto, bajo la casa de Faraón?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֱלֹהִים
  english_pob_choice: a man of God
  chosen_spanish: un hombre de Dios
  alternatives_spanish:
  - un profeta
  - un mensajero de Dios
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y funciona como designación reconocible de un mensajero profético. ‘Un hombre de Dios’ conserva el giro del original y su color narrativo mejor que reducirlo a ‘profeta’.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva con una equivalencia natural en español. Se mantiene ‘Yahvé’ conforme a la terminología del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se traslada directamente el nombre divino revelado en el texto hebreo, siguiendo el criterio del proyecto de no sustituirlo por un título.
- source_word: הֲנִגְלֹה נִגְלֵיתִי
  english_pob_choice: Did I indeed reveal myself
  chosen_spanish: ¿Me revelé acaso de verdad
  alternatives_spanish:
  - ¿Me manifesté realmente
  - ¿Me aparecí de veras
  lexicon: HALOT
  rationale: La construcción intensiva con infinitivo absoluto y verbo finito pide un refuerzo en español. ‘Revelé’ conserva el campo semántico de גלה y ‘acaso de verdad’ transmite la pregunta retórica enfática sin sonar rígido.
- source_word: בֵּית אָבִיךָ
  english_pob_choice: your father's house
  chosen_spanish: la casa de tu padre
  alternatives_spanish:
  - tu casa paterna
  - la casa de tus padres
  lexicon: HALOT
  rationale: En español bíblico, ‘la casa de tu padre’ comunica bien la unidad familiar/linajuda del hebreo y evita perder el sentido corporativo de linaje.
- source_word: בִּהְיוֹתָם בְּמִצְרַיִם
  english_pob_choice: when they were in Egypt
  chosen_spanish: cuando estaban en Egipto
  alternatives_spanish:
  - mientras estaban en Egipto
  lexicon: HALOT
  rationale: La forma temporal se expresa de manera clara y natural con ‘cuando estaban en Egipto’.
- source_word: לְבֵית פַּרְעֹה
  english_pob_choice: in Pharaoh's house
  chosen_spanish: en la casa de Faraón
  alternatives_spanish:
  - bajo la casa de Faraón
  - en la casa de Pharaoh
  lexicon: HALOT
  rationale: La preposición hebrea aquí se entiende en relación con el ámbito de Faraón. ‘En la casa de Faraón’ sigue de cerca el audit trail inglés y es idiomática en español.
theological_decisions:
- issue: Referencia de ‘la casa de tu padre’
  english_pob_reading: Eli's ancestral priestly house within Israel, likely the line of Aaron
  chosen_spanish_reading: La casa ancestral y sacerdotal de Elí, entendida de manera corporativa
  alternative_spanish_readings:
  - una referencia solo al padre inmediato de Elí
  - una referencia estrictamente genealógica sin alcance corporativo
  rationale: El contexto posterior trata del linaje sacerdotal y del juicio sobre la casa de Elí. La traducción mantiene la amplitud de la expresión sin imponer una precisión genealógica no explicitada en el versículo.
  doctrine_reference: 1 Samuel 2:27–36
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail, que prefirió ‘in Pharaoh's house’ frente a una paráfrasis más interpretativa. Por eso se traduce ‘en la casa de Faraón’ y no ‘bajo la casa de Faraón’ ni ‘perteneciendo a la casa de Faraón’.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ para יְהוָה, coherente con el estándar del proyecto.
  - Se usa ‘hombre de Dios’ como calco idiomático reconocido, no ‘profeta’, para no borrar la formulación del hebreo.
  - La nota [a] queda anclada en ‘le dijo[a]’ y ofrece una alternativa verbal sin cambiar el sentido base.
  - ‘Casa de tu padre’ mantiene el valor colectivo/linajudo de בֵּית אָבִיךָ.
  - ‘Casa de Faraón’ reproduce la relación espacial/ambiental del hebreo de modo comprensible en español.
