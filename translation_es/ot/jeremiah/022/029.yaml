translation:
  language: es
  text: Tierra[a], tierra, tierra, oye la palabra de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tierra, tierra, tierra»; el hebreo אֶרֶץ puede significar «tierra» o «país».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ / אָרֶץ
  english_pob_choice: Land
  chosen_spanish: Tierra
  alternatives_spanish:
  - País
  - Territorio
  lexicon: HALOT
  rationale: El hebreo אֶרֶץ puede significar 'tierra' o 'país/territorio'. En esta invocación triple, 'Tierra' conserva la fuerza vocativa y la ambigüedad deliberada del original, sin restringirla innecesariamente a una zona política ni desplazarla hacia 'mundo'.
- source_word: שִׁמְעִי
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oiga
  lexicon: HALOT
  rationale: Es un imperativo femenino singular de שׁמע. 'Oye' reproduce de forma directa el mandato profético y mantiene el tono breve y solemne del hebreo; 'escucha' sería igualmente posible, pero algo más explícito en español.
- source_word: דְּבַר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - declaración
  lexicon: HALOT
  rationale: La construcción 'palabra de Yahvé' es la fórmula profética normal y la más fiel al valor sustantivo del hebreo. 'Mensaje' sería más explicativo, pero menos ceñido al léxico del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé', siguiendo la decisión doctrinal del proyecto para יְהוָה. En español, 'Yahvé' transmite el nombre propio del pacto sin sustituirlo por un título.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El verso usa el Tetragrámaton directamente. Para el español del POB, se mantiene el nombre personal de Dios como 'Yahvé', no una sustitución litúrgica, preservando la identificación del nombre del pacto en el texto profético.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran alta concordancia y ninguna revisión pendiente; se ha mantenido la triple invocación y la traducción del nombre divino sin cambios de sentido.
  spanish_consistency_notes:
  - Se mantuvo la repetición triple para reflejar el énfasis retórico del hebreo.
  - '''Yahvé'' se usa de manera consistente para יְהוָה.'
  - '''Tierra'' conserva la ambigüedad semántica de אֶרֶץ sin añadir interpretaciones cosmológicas o políticas.'
