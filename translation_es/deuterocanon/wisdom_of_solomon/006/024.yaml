translation:
  language: es
  text: Una multitud de los sabios es la salvación[a] del mundo, y un rey prudente es la estabilidad de un pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberación» o «preservación» para σωτηρία.
    reason: lexical_alternative
  - marker: b
    text: O «del pueblo», «de la población» o «del cuerpo cívico». El griego δήμου puede significar «pueblo», «populacho/población» o «cuerpo de ciudadanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: πλῆθος
  english_pob_choice: a multitude
  chosen_spanish: una multitud
  alternatives_spanish:
  - una gran cantidad
  - abundancia
  lexicon: LSJ
  rationale: πλῆθος expresa una gran cantidad o multitud. «Una multitud» conserva el valor nominal y el tono proverbial sin volver la frase demasiado interpretativa.
- source_word: σοφῶν
  english_pob_choice: of the wise
  chosen_spanish: de los sabios
  alternatives_spanish:
  - de personas sabias
  - de los prudentes
  lexicon: LSJ
  rationale: El genitivo plural se refiere a personas sabias en general. «Sabios» es más natural y breve en español, y mantiene el registro elevado del enunciado.
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - preservación
  - bienestar
  lexicon: LSJ
  rationale: σωτηρία puede significar salvación, liberación o preservación. Aquí se conserva «salvación» para mantener el peso léxico del término, mientras el contexto sapiencial y político orienta su alcance comunitario.
- source_word: κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - para el mundo
  - del orden humano
  lexicon: LSJ
  rationale: κόσμος se entiende aquí como el mundo en sentido amplio. El genitivo se vierte de manera directa como «del mundo».
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - gobernante
  lexicon: LSJ
  rationale: βασιλεύς designa específicamente un rey, no solo un gobernante genérico; por eso se conserva «rey».
- source_word: φρόνιμος
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - sabio
  - sensato
  - discreto
  lexicon: LSJ
  rationale: φρόνιμος apunta a juicio práctico y sensatez en el gobierno. «Prudente» distingue bien esta cualidad de σοφός en la primera cláusula.
- source_word: εὐσταθία
  english_pob_choice: stability
  chosen_spanish: estabilidad
  alternatives_spanish:
  - firmeza
  - seguridad
  - constancia
  lexicon: LSJ
  rationale: εὐσταθία denota firmeza o estabilidad. En contexto político, «estabilidad» comunica mejor la solidez civil bajo buen gobierno.
- source_word: δήμου
  english_pob_choice: of a people
  chosen_spanish: de un pueblo
  alternatives_spanish:
  - del pueblo
  - de la gente
  - de la población
  lexicon: LSJ
  rationale: δῆμος puede significar pueblo, populacho o cuerpo cívico. «De un pueblo» mantiene el tono general y proverbial, sin fijar innecesariamente una referencia definida.
theological_decisions:
- issue: Alcance de σωτηρία en contexto sapiencial-político
  english_pob_reading: Rendered as 'salvation' rather than reducing it to merely civic welfare.
  chosen_spanish_reading: Se traduce como «salvación» y no se rebaja a «bienestar» o «prosperidad» solamente.
  alternative_spanish_readings:
  - liberación
  - preservación
  - bienestar
  rationale: Aunque el verso es proverbial y político, σωτηρία conserva una carga más fuerte que un simple bienestar cívico. «Salvación» preserva ese peso léxico, mientras el contexto de «mundo» y «pueblo» orienta al lector hacia una aplicación comunitaria y terrenal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: No hubo cambios recientes en la revisión final; el texto griego y la lectura inglesa aprobada muestran alto acuerdo y no requieren reajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se conserva la distinción léxica entre σοφῶν («sabios») y φρόνιμος («prudente»).
  - «Pueblo» se usa para δῆμος en una forma más natural para el español, manteniendo el matiz colectivo general sin cargarlo de tecnicismo político.
