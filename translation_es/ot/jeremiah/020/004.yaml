base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/020/004.yaml
  text: 'For thus says Yahweh: Behold[a], I am making you a terror to yourself and to all your loved ones, and they will fall by the sword of their enemies while your eyes look on. And I will give all Judah into the hand of the king of Babylon[c][b], and he will carry them away to Babylon and strike them with the sword.'
  footnotes:
  - marker: a
    text: Hebrew magor, 'terror' or 'dread'; this echoes the name given to Pashhur in the surrounding context, often rendered 'Terror on Every Side.'
    reason: cross_reference
  - marker: b
    text: Or 'your friends' for 'your loved ones.' The Hebrew refers to those who love you and may include close companions or allies.
    reason: lexical_alternative
  - marker: c
    text: Or 'he will exile them to Babylon.'
    reason: lexical_alternative
