  language: en
  yaml_path: translation/ot/judges/006/008.yaml
  text: 'Then Yahweh sent a man[a], a prophet, to the sons of Israel, and he said to them, “Thus says Yahweh, the God of Israel: I brought you up from Egypt[b], and I brought you out from the house of slavery.”'
