base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/026/015.yaml
  text: In Jerusalem he made devices[a], invented by skillful men, to be on the towers and on the corners, to shoot arrows and large stones. And his fame spread far abroad[c][b], for he was marvelously helped until he became strong.
  footnotes:
  - marker: a
    text: Or 'engines' or 'contrivances'—that is, military devices designed for use on the towers and corners of the fortifications.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his name went out far.'
    reason: lexical_alternative
  - marker: c
    text: The text does not explicitly name the one who helped him, though the context suggests divine help.
    reason: alternative_reading
