translation:
  language: es
  text: Pero si se come algo de la carne de su ofrenda de paz[a] al tercer día, no será aceptado; no le será acreditado al que lo ofrece. Será una cosa abominable[b], y la persona que coma de esa carne cargará con su culpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ofrenda de paz» también puede traducirse como «ofrenda de comunión» o «ofrenda de bienestar».
    reason: lexical_alternative
  - marker: b
    text: פִּגּוּל es un término técnico sacrificial para algo declarado inaceptable y detestable en sentido cultual.
    reason: source_note
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La conjunción introduce una condición con matiz de contraste respecto a la instrucción previa; en español, «Pero si» reproduce mejor ese giro que un simple «si».
- source_word: הֵאָכֹל יֵאָכֵל
  english_pob_choice: is eaten
  chosen_spanish: se come
  alternatives_spanish:
  - es comido
  - si llega a comerse
  lexicon: HALOT
  rationale: La construcción hebrea intensifica la acción verbal; en español, una pasiva refleja natural («se come») comunica bien el hecho sin forzar una duplicación artificiosa.
- source_word: מִבְּשַׂר
  english_pob_choice: any of the flesh
  chosen_spanish: carne
  alternatives_spanish:
  - parte de la carne
  - alguna de la carne
  lexicon: HALOT
  rationale: El partitivo ya está implícito en el contexto del sacrificio; «carne» es la forma más natural y fiel al campo semántico de בשר en contexto sacrificial.
- source_word: זֶבַח שְׁלָמָיו
  english_pob_choice: his peace offering
  chosen_spanish: sus ofrendas de paz
  alternatives_spanish:
  - su ofrenda de paz
  - sus ofrendas de comunión
  - sus ofrendas de bienestar
  lexicon: HALOT
  rationale: Se conserva «ofrendas de paz» por continuidad con la terminología tradicional del proyecto y porque refleja adecuadamente el sustantivo sacrificial; el plural posesivo sigue el valor genérico del hebreo y evita una reescritura interpretativa.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: en el tercer día
  alternatives_spanish:
  - al tercer día
  - el tercer día
  lexicon: HALOT
  rationale: La frase temporal es directa; «en el tercer día» mantiene de manera sobria la referencia temporal del hebreo.
- source_word: לֹא יֵרָצֶה
  english_pob_choice: it will not be accepted
  chosen_spanish: no será aceptado
  alternatives_spanish:
  - no será favorable
  - no encontrará aceptación
  lexicon: HALOT
  rationale: En contexto sacrificial, רצה en nifal expresa aceptación cultual; «será aceptado» es la equivalencia española más clara y precisa.
- source_word: הַמַּקְרִיב אֹתוֹ
  english_pob_choice: the one who offers it
  chosen_spanish: al que lo ofrece
  alternatives_spanish:
  - al oferente
  - al que lo presenta
  lexicon: HALOT
  rationale: La construcción participial se vierte con naturalidad como «al que lo ofrece», preservando la referencia al oferente sin introducir tecnicismos innecesarios.
- source_word: לֹא יֵחָשֵׁב לֹו
  english_pob_choice: it will not be credited to
  chosen_spanish: no le será acreditado
  alternatives_spanish:
  - no le será contado
  - no le será considerado
  lexicon: HALOT
  rationale: חשב con ל conserva la imagen de cómputo/atribución; «acreditado» transmite bien la idea de imputación o contabilización cultual sin perder claridad en español.
- source_word: פִּגּוּל
  english_pob_choice: an abhorrent thing
  chosen_spanish: una cosa abominable
  alternatives_spanish:
  - un repugnante sacrificio
  - una cosa impura
  - algo abominable
  lexicon: HALOT
  rationale: פִּגּוּל es un término técnico de impureza/sacrificio no aceptable; «cosa abominable» mantiene el fuerte juicio evaluativo sin sustituirlo por una glosa demasiado técnica o demasiado débil.
- source_word: וְהַנֶּפֶשׁ
  english_pob_choice: and the person
  chosen_spanish: y la persona
  alternatives_spanish:
  - y el alma
  - y el ser humano
  lexicon: HALOT
  rationale: נפש aquí designa a la persona concreta, no al alma como entidad separada; «persona» es la equivalencia más clara y fiel en español.
- source_word: הָאֹכֶלֶת מִמֶּנּוּ
  english_pob_choice: who eats from it
  chosen_spanish: que coma de ella
  alternatives_spanish:
  - que come de ella
  - que la coma
  lexicon: HALOT
  rationale: El participio femenino se refiere al sustantivo colectivo/femenino en hebreo; «que coma de ella» conserva la relación partitiva y hace inteligible la referencia al sacrificio en español.
- source_word: עֲוֺנָהּ תִּשָּׂא
  english_pob_choice: will bear his guilt
  chosen_spanish: cargará con su culpa
  alternatives_spanish:
  - llevará su culpa
  - soportará su culpa
  - cargará con su iniquidad
  lexicon: HALOT
  rationale: La idiomática hebrea «llevar la culpa»/«soportar la culpa» se expresa con naturalidad en español como «cargará con su culpa», preservando la idea de responsabilidad penal o cultual.
theological_decisions:
- issue: Nombre del sacrificio זֶבַח שְׁלָמִים
  english_pob_reading: his peace offering
  chosen_spanish_reading: sus ofrendas de paz
  alternative_spanish_readings:
  - su ofrenda de paz
  - sus ofrendas de comunión
  - sus ofrendas de bienestar
  rationale: Se mantiene la familia terminológica tradicional del proyecto con «ofrendas de paz», porque es breve y reconocible, y porque el contexto trata de una categoría sacrificial específica. Las variantes «comunión» y «bienestar» explicitan dimensiones interpretativas posibles, pero no se imponen en el texto principal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de פִּגּוּל
  english_pob_reading: an abhorrent thing
  chosen_spanish_reading: una cosa abominable
  alternative_spanish_readings:
  - algo abominable
  - una cosa impura
  - un sacrificio repugnante
  rationale: El término es técnico y denota algo ritual y cultualmente inaceptable. «Cosa abominable» conserva el peso valorativo fuerte del hebreo sin inventar una explicación que borre su cualidad especializada.
  doctrine_reference: Translation philosophy §1, §5
- issue: Responsabilidad de la persona que come
  english_pob_reading: the person who eats from it will bear his guilt
  chosen_spanish_reading: la persona que coma de ella cargará con su culpa
  alternative_spanish_readings:
  - la persona que coma de ello cargará con su culpa
  - el que coma de ello cargará con su culpa
  - la persona que lo coma llevará su culpa
  rationale: Se conserva la responsabilidad individual y la carga de culpa expresada por נשא עון. En español, «cargará con su culpa» mantiene el sentido de asumir la consecuencia culpable sin suavizarlo.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje hebreo y el audit trail inglés, conservando la condicional adversativa, la pasiva intensiva, el lenguaje de aceptación cultual y la imputación de culpa. Se adoptó una expresión española natural («se come», «cargará con su culpa») sin perder la densidad técnica del original. También se mantuvo la opción terminológica del proyecto «ofrendas de paz», con nota alternativa para sus equivalentes interpretativos.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto general cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se preserva «ofrendas de paz» por coherencia con la terminología del sacrificio זֶבַח שְׁלָמִים en el material auditado.
  - «Culpa» se emplea para עוון en coherencia con el valor de responsabilidad y pena implícita en el hebreo.
  - La referencia femenina de la forma verbal se mantiene por concordancia con «la persona», evitando una neutralización que ocultaría la morfología del hebreo.
