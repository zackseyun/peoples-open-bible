revisions:
- from: ¿Por qué fue arrastrado tu poderoso[a]? No se mantuvo en pie, porque Yahvé lo derribó.
  to: ¿Por qué fue arrastrado tu poderoso[a]? No se mantuvo en pie, porque Yahvé lo rechazó.
  rationale: Se mantiene casi todo el borrador porque representa bien el hebreo y la decisión documentada del POB. Solo se corrige 'lo derribó' a 'lo rechazó' para reflejar mejor el valor de הֲדָפוֹ como empuje/repulsión/expulsión en contexto de derrota, sin sobreespecificar una caída física.
