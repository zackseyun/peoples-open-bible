translation:
  language: es
  text: Así que, mientras Joab vigilaba la ciudad, colocó a Urías en el lugar donde sabía que estaban los hombres poderosos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “guerreros fuertes”. La frase hebrea אַנְשֵׁי חַיִל puede referirse aquí a hombres de combate capaces o formidables.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁמֹר
  english_pob_choice: was watching
  chosen_spanish: vigilaba
  alternatives_spanish:
  - estaba vigilando
  - estaba observando
  - guardaba vigilancia sobre
  lexicon: HALOT
  rationale: El infinitivo constructo con בְּ introduce una cláusula temporal. En este contexto militar, "vigilaba" comunica una observación activa y continua del sitio durante el asedio sin volverse demasiado literal o torpe en español.
- source_word: אֶל הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - contra la ciudad
  - hacia la ciudad
  lexicon: HALOT
  rationale: Con שׁמר aquí, la preposición no obliga a traducir con valor direccional; el foco está en la ciudad como objeto de la vigilancia. "La ciudad" es la forma más natural y fiel en español.
- source_word: וַיִּתֵּן אֶת־אֻרִיָּה
  english_pob_choice: he stationed Uriah
  chosen_spanish: puso a Urías
  alternatives_spanish:
  - estacionó a Urías
  - colocó a Urías
  - asignó a Urías
  lexicon: HALOT
  rationale: נָתַן literalmente es "dar/poner"; en un contexto de despliegue militar, "puso a Urías" conserva el movimiento deliberado de colocarlo en una posición táctica sin sonar demasiado técnico ni introducir una lectura más específica que el hebreo.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - la posición
  lexicon: HALOT
  rationale: מָקוֹם se traduce de manera directa como "lugar". La connotación táctica queda apoyada por el verbo anterior, no por una ampliación léxica innecesaria.
- source_word: יָדַע
  english_pob_choice: he knew
  chosen_spanish: sabía
  alternatives_spanish:
  - había sabido
  - conocía
  lexicon: HALOT
  rationale: יַדַע expresa conocimiento simple y continuo en la narración. "Sabía" reproduce bien esa referencia previa de conocimiento y suena natural en español.
- source_word: אַנְשֵׁי חַיִל
  english_pob_choice: the mighty men
  chosen_spanish: los hombres valientes[a]
  alternatives_spanish:
  - los hombres poderosos[a]
  - los guerreros fuertes[a]
  - los hombres de guerra[b]
  lexicon: HALOT
  rationale: La expresión puede referirse a hombres de guerra capaces, fuertes o valientes. En español, "hombres valientes" conserva el sentido de combatientes formidables sin imponer una terminología técnica asociada a una unidad concreta. Se mantiene la tensión léxica porque el inglés POB nota que el hebreo admite varias opciones semánticas.
- source_word: שָׁם
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - se hallaban
  - estaban allí
  lexicon: HALOT
  rationale: El adverbio indica localización. En español, el verbo copulativo con valor locativo ya expresa adecuadamente la presencia en ese sitio; no hace falta repetir "allí".
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó "valiant men" por "mighty men" para estandarizar אַנְשֵׁי חַיִל. En español se evitó fijar una etiqueta técnica más estrecha y se optó por "hombres valientes", manteniendo abierta la amplitud semántica observada en el hebreo y reflejada en la nota inglesa.
  spanish_consistency_notes:
  - Se usó "Urías" como forma castellana estándar del nombre propio.
  - Se evitó "SEÑOR" o terminología teológica no presente en el versículo.
  - El orden temporal "Así que, mientras..." conserva la progresión narrativa del וַיְהִי sin calco pesado.
  - La nota al pie se ancló solo en la frase con ambigüedad léxica real.
