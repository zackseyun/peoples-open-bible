revisions:
- from: Un corazón firmemente establecido sobre un entendimiento inteligente[a] es como una decoración de estuco sobre una pared pulida.
  to: Un corazón firmemente establecido sobre una comprensión inteligente[a] es como un acabado sobre un muro pulido.
