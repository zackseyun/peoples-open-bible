translation:
  language: es
  text: el camino del águila[c] en el cielo, el camino de la serpiente sobre una roca, el camino del navío en el corazón del mar[b], y el camino del hombre con una joven[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el camino de un hombre con una virgen». El hebreo עלמה significa más ampliamente «joven mujer» y no exige por sí mismo el sentido más específico de «virgen».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en el corazón del mar», un modismo para decir «en medio del mar».'
    reason: cultural_note
  - marker: c
    text: El término hebreo traducido aquí «águila» también puede referirse, de manera más amplia, a un ave rapaz grande.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - sendero
  - modo
  lexicon: HALOT
  rationale: Se repite cuatro veces como el sustantivo organizador del proverbio. «Camino» es natural en español y suficientemente amplio para abarcar recorrido, manera o curso sin precisar de más.
- source_word: הַנֶּשֶׁר
  english_pob_choice: eagle
  chosen_spanish: águila
  alternatives_spanish:
  - buitre
  - ave rapaz grande
  lexicon: HALOT
  rationale: «Águila» conserva la imagen tradicional y resulta idiomática en español. Aunque el hebreo puede abarcar un ave rapaz grande en sentido más amplio, aquí la forma más clara y estable es «águila».
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in the sky
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  lexicon: HALOT
  rationale: El contexto es el ámbito visible donde vuela el ave, no un uso teológico de «cielos». «En el cielo» comunica mejor ese sentido concreto en español.
- source_word: נָחָשׁ
  english_pob_choice: snake
  chosen_spanish: serpiente
  alternatives_spanish:
  - culebra
  lexicon: HALOT
  rationale: Aquí «serpiente» es clara y natural en español, y mantiene el paralelismo proverbial. «Culebra» sería más coloquial y menos neutral.
- source_word: עֲלֵי צּוּר
  english_pob_choice: on a rock
  chosen_spanish: sobre una roca
  alternatives_spanish:
  - en una roca
  - por una roca
  lexicon: HALOT
  rationale: La imagen describe el desplazamiento de la serpiente sobre terreno rocoso. «Sobre una roca» es idiomático y visual.
- source_word: אֳנִיָּה
  english_pob_choice: ship
  chosen_spanish: navío
  alternatives_spanish:
  - barco
  - embarcación
  lexicon: HALOT
  rationale: Se trata de una nave de mar; «navío» conserva dignidad y el tamaño sugerido por la imagen. «Barco» sería posible, pero algo más genérico.
- source_word: בְלֶב יָם
  english_pob_choice: in the heart of the sea
  chosen_spanish: en el corazón del mar
  alternatives_spanish:
  - en medio del mar
  - en alta mar
  lexicon: HALOT
  rationale: Se preserva la fuerza idiomática literal de «corazón» para no aplanar la expresión hebrea. En español sigue siendo comprensible y mantiene la vividez del proverbio.
- source_word: גֶּבֶר
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - hombre adulto
  lexicon: HALOT
  rationale: El término designa a un varón adulto. «Hombre» es la forma más natural en español y conserva la referencia masculina específica.
- source_word: בְּעַלְמָה
  english_pob_choice: with a young woman
  chosen_spanish: con una joven
  alternatives_spanish:
  - con una muchacha
  - con una doncella
  - con una virgen
  lexicon: HALOT
  rationale: עלמה señala una mujer joven en edad de casarse, sin exigir el matiz más específico de «virgen». «Joven» refleja esa amplitud semántica sin añadir precisión que el hebreo no obliga.
theological_decisions:
- issue: Sentido de la última línea ודרך גבר בעלמה
  english_pob_reading: the way of a man with a young woman
  chosen_spanish_reading: el camino del hombre con una joven
  alternative_spanish_readings:
  - el camino del hombre en una doncella
  - el camino del hombre con una virgen
  rationale: El proverbio enumera caminos difíciles de seguir o rastrear. El hebreo con בְּ se entiende mejor relacionalmente como «con», aludiendo al modo enigmático en que se da la atracción o el trato entre varón y mujer joven, sin forzar un sentido sexual explícito que el texto no exige.
  doctrine_reference: Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso crítico es alto y coincide con la lectura auditada, por lo que se mantiene la misma solución semántica y retórica en español.
  spanish_consistency_notes:
  - Se mantuvo la repetición de «camino» para reproducir el paralelismo del hebreo.
  - Se preservó «corazón del mar» en el cuerpo y se explicó como modismo en nota.
  - Se eligió «águila» como equivalente estándar, dejando constancia de la amplitud posible del hebreo.
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - «Joven» se usó para עלמה por ser más amplio que «virgen» y fiel al rango semántico documentado.
