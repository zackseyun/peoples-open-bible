translation:
  language: es
  text: En aquel día habrá cinco ciudades en la tierra de Egipto que hablan la lengua de Canaán y juran a Yahvé de los Ejércitos. Una será llamada la Ciudad de Destrucción[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, posiblemente, 'la Ciudad del Sol', reflejando una antigua lectura alternativa del último miembro.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La fórmula profética fija se conserva con el demostrativo 'aquel', que suena natural en español bíblico y mantiene el tono escatológico del hebreo.
- source_word: יִהְיוּ
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - existirán
  - serán
  lexicon: HALOT
  rationale: El hebreo tiene uso existencial; 'habrá' expresa de modo natural la existencia de las cinco ciudades.
- source_word: חָמֵשׁ עָרִים
  english_pob_choice: five cities
  chosen_spanish: cinco ciudades
  alternatives_spanish:
  - cinco villas
  - cinco urbes
  lexicon: HALOT
  rationale: Traducción directa y transparente del número y del sustantivo, sin añadir matiz no presente en el hebreo.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en el país de Egipto
  lexicon: HALOT
  rationale: Se conserva 'tierra' para reflejar אֶרֶץ y mantener la textura formal del verso, como en el audit trail inglés.
- source_word: מְדַבְּרוֹת שְׂפַת כְּנַעַן
  english_pob_choice: speaking the language of Canaan
  chosen_spanish: que hablarán la lengua de Canaán
  alternatives_spanish:
  - hablando la lengua de Canaán
  - que hablarán el idioma de Canaán
  lexicon: HALOT
  rationale: '''שָׂפָה'' se entiende idiomáticamente como ''lengua/idioma''; se prefirió ''lengua de Canaán'' para conservar el giro hebreo y evitar una paráfrasis más interpretativa.'
- source_word: וְנִשְׁבָּעוֹת לַיהוָה צְבָאוֹת
  english_pob_choice: and swearing to Yahweh of Armies
  chosen_spanish: y jurarán a Yahvé de los Ejércitos
  alternatives_spanish:
  - y jurarán a Yahvé de Armadas
  - y se juramentarán ante Yahvé de los Ejércitos
  - y jurarán por Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: El imperfecto plural se vierte como futuro. 'Jurar a' conserva la relación del hebreo con ל, indicando juramento dirigido a la deidad. 'Yahvé' sigue el criterio POB; 'de los Ejércitos' traduce צְבָאוֹת con claridad en español.
- source_word: עִיר הַהֶרֶס
  english_pob_choice: the City of Destruction
  chosen_spanish: la Ciudad de Destrucción
  alternatives_spanish:
  - la Ciudad de Ruina
  - la Ciudad de Demolición
  lexicon: HALOT
  rationale: Se sigue el MT con הֶרֶס como 'destrucción'. 'Destrucción' mantiene la ambigüedad de nombre propio/título sin suavizarla.
- source_word: יֵאָמֵר לְאֶחָת
  english_pob_choice: One will be called
  chosen_spanish: Una será llamada
  alternatives_spanish:
  - Se dirá de una
  - Una será nombrada
  lexicon: HALOT
  rationale: La pasiva impersonal en español se expresa de forma natural con 'ser llamada'. 'Una' corresponde al singular femenino implícito por 'ciudades'.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: 'Se adopta el criterio del proyecto para el Tetragrámaton: ''Yahvé''. Se evita la sustitución por ''SEÑOR'' para no ocultar el nombre revelado y preservar la transparencia textual.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Traducción de צְבָאוֹת en el título divino
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los Ejércitos
  - de los Ejércitos celestiales
  - de los Hosts
  rationale: Se traduce el título para mantener la transparencia semántica. 'Ejércitos' comunica mejor el plural militar del término hebreo que una transliteración o el tradicionalismo de 'Hosts'.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
- issue: Lectura contestada de עִיר הַהֶרֶס
  english_pob_reading: the City of Destruction
  chosen_spanish_reading: la Ciudad de Destrucción
  alternative_spanish_readings:
  - la Ciudad del Sol
  - la Ciudad de Ruina
  rationale: La lectura principal sigue el consonántico masorético, que apoya 'destrucción'. Se conserva la tensión textual sin resolverla silenciosamente; la alternativa antigua queda registrada en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail inglés que prefirió una formulación más cercana para el juramento ('jurar a') y simplificó la referencia a 'One' en lugar de 'One of them'. La redacción española sigue esa misma dirección de mayor literalidad sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como equivalente del Tetragrámaton, conforme al estándar del proyecto.
  - '''de los Ejércitos'' traduce צְבָאוֹת de manera transparente y coherente con el audit trail inglés.'
  - '''lengua de Canaán'' conserva el giro hebreo sin convertirlo en explicación interpretativa.'
  - La nota de pie de página marca la variante textual sin alterar el texto principal.
