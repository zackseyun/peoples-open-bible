translation:
  language: es
  text: David se levantó y fue[a], con todo el pueblo que estaba con él, desde Baalé-judá para traer de allí el arca de Dios, que es llamada por el Nombre, el nombre de Yahvé de los Ejércitos[c][b], que está entronizado sobre los querubines[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde Baalá de Judá». La forma hebrea es inusual y puede reflejar un lugar asociado con Quiryat-yearim.'
    reason: alternative_reading
  - marker: b
    text: 'O: «sobre la cual es llamado el nombre de Yahvé de los Ejércitos». La fórmula hebrea de nombramiento está condensada y puede traducirse de manera más literal así.'
    reason: lexical_alternative
  - marker: c
    text: 'Traducción tradicional: «Yahvé de los ejércitos»; compárese también la forma tradicional con enmascaramiento del nombre divino: «el SEÑOR de los ejércitos».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «que mora entre los querubines».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: El wayyiqtol de קום marca el inicio de la acción; en español, «se levantó» conserva el avance narrativo con naturalidad y sin sobrerreformular.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - partió
  - se fue
  lexicon: HALOT
  rationale: הלך en narración simple suele equivaler a «ir». En español, «fue» mantiene la secuencia breve y directa de los dos verbos hebreos.
- source_word: וְכָל־הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: with all the people who were with him
  chosen_spanish: con todo el pueblo que estaba con él
  alternatives_spanish:
  - y todo el pueblo que estaba con él
  - con toda la gente que iba con él
  lexicon: HALOT
  rationale: La relación acompañante queda más clara en español con «con». «Pueblo» preserva el valor colectivo de עָם sin volverlo demasiado coloquial.
- source_word: מִבַּעֲלֵי יְהוּדָה
  english_pob_choice: from Baale-judah
  chosen_spanish: desde Baalé-judá
  alternatives_spanish:
  - desde Baalá de Judá
  - desde los dueños de Judá
  lexicon: HALOT
  rationale: Se conserva el valor de nombre propio, como en la decisión inglesa. La forma con guion y plural aparente sigue el hebreo peculiar sin resolverlo artificialmente en una glosa interpretativa.
- source_word: לְהַעֲלוֹת מִשָּׁם
  english_pob_choice: to bring up from there
  chosen_spanish: para subir de allí
  alternatives_spanish:
  - para traer de allí
  - para hacer subir de allí
  lexicon: HALOT
  rationale: עלה en hifil, en el contexto del traslado del arca, se expresa con naturalidad como «subir». «Para subir de allí» mantiene la dirección cultual/geográfica sin forzar una perífrasis pesada.
- source_word: אֵת אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del Dios
  - el arca del verdadero Dios
  lexicon: HALOT
  rationale: Es la designación narrativa estándar del arca. «Arca de Dios» es fiel y idiomática en español.
- source_word: אֲשֶׁר נִקְרָא שֵׁם
  english_pob_choice: which is called by the Name
  chosen_spanish: sobre la cual es invocado el Nombre
  alternatives_spanish:
  - que es llamada por el Nombre
  - que lleva el Nombre
  lexicon: HALOT
  rationale: La fórmula hebrea es comprimida. En español, la pasiva impersonal «es invocado el Nombre» conserva el carácter solemne del nombre divino y evita perder el sentido relacional/covenantal.
- source_word: שֵׁם יְהוָה צְבָאֹות
  english_pob_choice: the name of Yahweh of Armies
  chosen_spanish: el nombre de Yahvé de los Ejércitos
  alternatives_spanish:
  - el nombre de Yahvé de los ejércitos
  - el nombre de Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» según el estándar del proyecto. «Ejércitos» traduce צְבָאוֹת de manera transparente y reconocible para lectores hispanos, sin depender de «SEÑOR» como máscara.
- source_word: יֹשֵׁב הַכְּרֻבִים
  english_pob_choice: who is enthroned above the cherubim
  chosen_spanish: que está entronizado sobre los querubines
  alternatives_spanish:
  - que mora entre los querubines
  - que habita sobre los querubines
  lexicon: HALOT
  rationale: En el contexto del arca, ישב con los querubines expresa entronización. «Entronizado sobre los querubines» conserva la lectura regia sin introducir «mora» como si fuera mera residencia.
- source_word: עָלָיו
  english_pob_choice: above the cherubim
  chosen_spanish: sobre los querubines
  alternatives_spanish:
  - sobre él
  - encima de él
  lexicon: HALOT
  rationale: El pronombre final remite a la imagen del trono/arca; en español se integra de forma natural con la frase anterior para evitar una clausura torpe o ambigua.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'El texto hebreo usa directamente el Tetragrámaton. Conforme a la política del proyecto, se conserva el nombre divino en forma auditable y legible para español: «Yahvé».'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los ejércitos
  - de los ejércitos celestiales
  - de los hosts
  rationale: Se traduce el título en vez de transliterarlo o reemplazarlo por un tradicionalismo eclesial opaco. «Ejércitos» comunica mejor el sentido honorífico-militar del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
- issue: Handling the compressed naming formula for the ark
  english_pob_reading: which is called by the Name, the name of Yahweh of Armies, who is enthroned above the cherubim
  chosen_spanish_reading: 'sobre la cual es invocado el Nombre: el nombre de Yahvé de los Ejércitos, que está entronizado sobre los querubines'
  alternative_spanish_readings:
  - que lleva el Nombre, el nombre de Yahvé de los Ejércitos, que está entronizado sobre los querubines
  - sobre la cual se invoca el Nombre, el nombre de Yahvé de los Ejércitos, que está entronizado sobre los querubines
  rationale: La sintaxis hebrea es densa y puede leerse de varias maneras. La solución elegida preserva la fórmula solemne de nombramiento del arca sin borrar la tensión gramatical ni reducirla a una explicación interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que eliminó el guion tras «Name» para una puntuación más natural. En español se resolvió con dos puntos para mantener la solemnidad y la relación explicativa entre «el Nombre» y la fórmula del nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» para el Tetragrámaton, conforme al estándar del proyecto.
  - «Ejércitos» traduce צְבָאוֹת de manera transparente y no se sustituye por «hosts».
  - 'La fórmula del arca se conserva con un giro formal pero natural en español: «sobre la cual es invocado el Nombre».'
  - «Entronizado sobre los querubines» sigue la lectura regia del hebreo y evita rebajarla a simple residencia.
