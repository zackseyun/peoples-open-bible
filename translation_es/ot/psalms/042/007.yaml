translation:
  language: es
  text: Dios mío, mi alma se abate dentro de mí; por eso me acuerdo[a] de ti desde la tierra del Jordán y de los Hermones[b], desde el monte Mizar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me acordaré de ti». El verbo hebreo puede expresar una resolución presente o una acción futura.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Hermones» es plural; puede aludir a la cordillera de Hermón o a sus cumbres.'
    reason: lexical_alternative
  - marker: c
    text: «Mizar» puede ser un nombre de lugar; también puede entenderse como «monte pequeño» o «cerro pequeño».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  english_pob_choice: My God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - ¡Dios mío!
  - Oh Dios mío
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona singular expresa posesión afectiva y apelación directa. En español, «Dios mío» es la manera natural y reverente de conservar ese valor sin volver la frase rígidamente literal.
- source_word: עָלַי + נַפְשִׁי
  english_pob_choice: my soul is cast down within me
  chosen_spanish: mi alma se abate dentro de mí
  alternatives_spanish:
  - mi alma está abatida dentro de mí
  - mi alma cae dentro de mí
  lexicon: HALOT
  rationale: La combinación idiomática con נפשׁ y el verbo de abatimiento pide una imagen interna y poética. «Se abate dentro de mí» mantiene el movimiento de descenso y el alcance interior del hebreo, con español natural.
- source_word: תִשְׁתּוֹחָח
  english_pob_choice: is cast down
  chosen_spanish: se abate
  alternatives_spanish:
  - está abatida
  - se inclina
  - se hunde
  lexicon: HALOT
  rationale: El verbo describe estar doblegado o rebajado. «Se abate» conserva la imagen de humillación/descenso y funciona bien en registro bíblico actual.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: La partícula introduce consecuencia. «Por eso» comunica con claridad la relación lógica sin endurecer el ritmo poético.
- source_word: אֶזְכָּרְךָ
  english_pob_choice: I remember you
  chosen_spanish: me acuerdo de ti
  alternatives_spanish:
  - te recuerdo
  - me acordaré de ti
  lexicon: HALOT
  rationale: El imperfecto hebreo puede tener valor presente de acción habitual/actual o matiz de resolución. En español, «me acuerdo de ti» preserva el sentido actual y devocional; la lectura futura queda implícitamente posible en el contexto poético.
- source_word: מֵאֶרֶץ יַרְדֵּן
  english_pob_choice: from the land of the Jordan
  chosen_spanish: desde la tierra del Jordán
  alternatives_spanish:
  - desde la región del Jordán
  - desde la tierra del Jordán
  lexicon: HALOT
  rationale: «מֵאֶרֶץ» admite un ámbito territorial más que el río mismo. «Tierra» mantiene la geografía amplia del hebreo y suena natural en español bíblico.
- source_word: וְחֶרְמוֹנִים
  english_pob_choice: and the Hermons
  chosen_spanish: y de los hermones
  alternatives_spanish:
  - y de Hermón
  - y de los montes de Hermón
  lexicon: HALOT
  rationale: El plural hebreo es significativo y debe quedar visible. «Los hermones» conserva la pluralidad del original; la minúscula evita imponer de entrada un nombre geográfico singular no atestiguado por la forma hebrea.
- source_word: מֵהַר מִצְעָר
  english_pob_choice: from Mount Mizar
  chosen_spanish: desde el monte Mizar
  alternatives_spanish:
  - desde el monte pequeño
  - desde el cerro Mizar
  lexicon: HALOT
  rationale: El texto permite entenderlo como topónimo. «Monte Mizar» es la solución menos interpretativa en el texto principal; las posibles lecturas semánticas quedan como alternativas.
theological_decisions:
- issue: Forma de dirigirse a Dios al inicio del lamento
  english_pob_reading: My God
  chosen_spanish_reading: Dios mío
  alternative_spanish_readings:
  - ¡Dios mío!
  - Oh Dios mío
  rationale: 'No hay tensión doctrinal, pero sí de tono: el hebreo es una apelación directa en contexto de lamentación. «Dios mío» conserva cercanía, dolor y reverencia sin añadir una exclamación obligatoria.'
  doctrine_reference: Salmos de lamentación; oración directa a Dios
- issue: Valor del verbo imperfecto en אֶזְכָּרְךָ
  english_pob_reading: I remember you / I will remember you
  chosen_spanish_reading: me acuerdo de ti
  alternative_spanish_readings:
  - me acordaré de ti
  - te recuerdo
  rationale: La forma hebrea admite presente o futuro según el contexto. La redacción española principal adopta el valor actual porque encaja con el fluir del versículo; la posibilidad futura queda preservada como alternativa sin borrar la ambigüedad.
  doctrine_reference: Aspecto verbal hebreo; poesía sapiencial y salmódica
- issue: Pluralidad de חֶרְמוֹנִים
  english_pob_reading: the Hermons
  chosen_spanish_reading: los hermones
  alternative_spanish_readings:
  - Hermón
  - los montes de Hermón
  rationale: El plural debe mantenerse porque tiene valor exegético. Traducirlo singularizaría indebidamente el término y ocultaría la posible referencia a una cadena o a varios picos de Hermón.
  doctrine_reference: Geografía bíblica; precisión textual
- issue: Naturaleza de מִצְעָר
  english_pob_reading: Mount Mizar
  chosen_spanish_reading: monte Mizar
  alternative_spanish_readings:
  - monte pequeño
  - cerro Mizar
  rationale: Como la evidencia permite un topónimo y, secundariamente, una lectura descriptiva, el texto principal opta por el nombre propio para no añadir interpretación. La alternativa semántica se deja abierta en nota.
  doctrine_reference: Toponimia bíblica y ambigüedad lexical
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la revisión inglesa más reciente al conservar la pluralidad de חֶרְמוֹנִים. También respeta la estructura paralela del hebreo: apelación a Dios, abatimiento interior, recuerdo desde dos ámbitos geográficos. Se evita convertir el segundo miembro en una paráfrasis expansiva y se mantiene la ambigüedad verbal de אֶזְכָּרְךָ mediante una redacción natural en español.'
  spanish_consistency_notes:
  - Se usa «Dios mío» para אֱלֹהַי, conforme al valor de posesivo y apelación directa.
  - Se mantiene «Jordán» como nombre propio geográfico con artículo implícito en la construcción española.
  - «los hermones» conserva la pluralidad hebrea documentada en el audit trail.
  - «monte Mizar» preserva el posible topónimo sin imponer una glosa interpretativa en el texto principal.
  - El estilo general es bíblico contemporáneo, no arcaizante, y procura conservar la poesía del lamento.
