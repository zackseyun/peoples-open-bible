review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien el sentido básico del hebreo: un profeta singular e indefinido, surgido desde dentro de Israel, comparable a Moisés, levantado por Yahvé, y al cual el pueblo debe escuchar. Sin embargo, el anclaje de las notas está invertido respecto de su contenido: la nota sobre la alternativa de מִקִּרְבְּךָ/מֵאַחֶיךָ está colocada en ''profeta'', mientras que la nota mesiánica está colocada en ''de en medio de ti''. Además, ''escucharéis'' es defendible, pero en español actual neutral suena más arcaizante que el resto del versículo; una forma obligativa moderna refleja mejor la fuerza de תִּשְׁמָעוּן y la elección inglesa ''you must listen''.'
  spanish_quality_summary: El texto es legible y digno, pero mezcla registro moderno con un futuro exhortativo más tradicional ('escucharéis'). 'De en medio de ti' y 'de entre tus hermanos' son aceptables y naturales en contexto bíblico. La mayor reparación necesaria es la correspondencia correcta entre marcadores y notas, y conviene modernizar levemente la cláusula final para mayor claridad e idiomaticidad.
  glossary_alignment: 'Alinea correctamente con los términos del proyecto en puntos clave: יהוה -> ''Yahvé'', נָבִיא -> ''un profeta'', מֵאַחֶיךָ -> ''tus hermanos'' con aclaración, y evita introducir ''Mesías'' en el texto principal. No hay conflicto doctrinal serio; solo hace falta corregir el uso y ubicación de notas y ajustar la fuerza de שׁמע a un español más claro.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en lugares incorrectos.
    rationale: La nota [a] explica la expresión 'de tu medio/de entre tus compatriotas', pero está anclada en 'un profeta'. La nota [b] trata la aplicación mesiánica de 'un profeta como yo', pero está anclada en 'de en medio de ti'. Esto desorienta al lector y no cumple la disciplina de notas del proyecto.
  - severity: medium
    issue: '''Escucharéis'' suena más arcaico que el resto del español del versículo.'
    rationale: Aunque puede funcionar como futuro exhortativo bíblico, el proyecto pide español moderno pero digno. 'Deben escucharlo' o 'deben escucharlo a él' comunica mejor la fuerza mandatoria de תִּשְׁמָעוּן y refleja mejor 'you must listen'.
  - severity: low
    issue: La nota léxica puede vincularse más claramente a 'de en medio de ti, de entre tus hermanos'.
    rationale: El contenido de la nota ya es bueno; solo necesita colocarse donde el lector perciba con precisión cuál frase está siendo explicada.
  revised_spanish_text: Yahvé tu Dios te levantará un profeta como yo[b], de en medio de ti[a], de entre tus hermanos[a]; a él deben escucharlo.
  revised_footnotes:
  - marker: a
    text: O 'de tu medio, de entre tus compatriotas'. El hebreo 'de entre tus hermanos' usa un término de parentesco masculino que aquí se refiere a los miembros de Israel en general.
    reason: lexical_alternative
  - marker: b
    text: Este versículo se aplica más tarde al Mesías en el Nuevo Testamento; sin embargo, el hebreo aquí dice simplemente 'un profeta como yo'.
    reason: cross_reference
  revision_rationale: Se corrigen los marcadores de notas para que coincidan con el contenido que explican y se actualiza la cláusula final a un español más claro y contemporáneo, manteniendo el sentido mandatorio del hebreo sin sobreinterpretarlo como 'obedecer'.
