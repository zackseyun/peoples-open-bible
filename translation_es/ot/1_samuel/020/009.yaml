translation:
  language: es
  text: 'Jonatán dijo: «¡Lejos de mí![a] Si yo supiera con certeza que mi padre había determinado traer mal sobre ti, ¿no te lo diría?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lejos de mí» reproduce una exclamación idiomática; el hebreo literal puede sonar como «lejos de ti», pero el contexto y la revisión auditada muestran que la frase expresa el rechazo de Jonatán, no una dirección espacial.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה לָּךְ
  english_pob_choice: Far be it from me!
  chosen_spanish: ¡Lejos de mí!
  alternatives_spanish:
  - ¡Ni pensarlo!
  - ¡Eso sería impensable para mí!
  - ¡Lejos de ti!
  lexicon: HALOT
  rationale: La locución expresa rechazo enfático e indignación; en español, «¡Lejos de mí!» comunica con naturalidad el desmarque personal de Jonatán. Se evita «de ti» porque el hebreo aquí, como aclara la revisión inglesa, debe entenderse como una exclamación idiomática referida al hablante en este contexto.
- source_word: כִּי אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Pero si
  - Pues si
  - Si de verdad
  lexicon: HALOT
  rationale: La secuencia introduce una condición real; «Si» conserva el valor condicional sin añadir contraste que el hebreo no exige aquí.
- source_word: יָדֹעַ אֵדַע
  english_pob_choice: I knew for certain
  chosen_spanish: yo supiera con certeza
  alternatives_spanish:
  - yo supiera ciertamente
  - yo lo supiera sin duda
  - yo supiera bien
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica el verbo finito. En español, «supiera con certeza» reproduce esa fuerza enfática de manera natural y mantiene el matiz hipotético del condicional.
- source_word: כָלְתָה הָרָעָה
  english_pob_choice: my father had determined to bring evil upon you
  chosen_spanish: mi padre había determinado traer mal sobre ti
  alternatives_spanish:
  - mi padre había consumado el mal
  - mi padre había fijado el daño
  - mi padre había resuelto el mal
  lexicon: HALOT
  rationale: La expresión hebrea puede apuntar a un mal ya asentado o plenamente decidido. En español, «había determinado traer mal sobre ti» sigue la decisión editorial inglesa y preserva la idea de intención establecida sin suavizarla a un simple inconveniente.
- source_word: מֵעִם אָבִי
  english_pob_choice: by my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - de parte de mi padre
  - por parte de mi padre
  - procedente de mi padre
  lexicon: HALOT
  rationale: El complemento hebreo señala origen o procedencia; en español, la construcción verbal ya incorpora el agente («mi padre había determinado»), evitando una repetición forzada y conservando el sentido de iniciativa paterna.
- source_word: לָבוֹא עָלֶיךָ
  english_pob_choice: to come upon you
  chosen_spanish: traer mal sobre ti
  alternatives_spanish:
  - venir contra ti
  - caer sobre ti
  - atacarte
  lexicon: HALOT
  rationale: La frase hebrea expresa amenaza o daño que se dirige hacia David. «Traer mal sobre ti» retiene el contenido de hostilidad y funciona bien en español bíblico contemporáneo.
- source_word: וְלֹא אֹתָהּ אַגִּיד לָךְ
  english_pob_choice: would I not tell you?
  chosen_spanish: ¿no te lo diría?
  alternatives_spanish:
  - ¿no te lo comunicaría?
  - ¿no te lo diría a ti?
  - ¿no te lo haría saber?
  lexicon: HALOT
  rationale: El hebreo formula una pregunta retórica con respuesta afirmativa implícita. «¿No te lo diría?» es la opción más natural y conserva el objeto implícito («lo») del pronombre femenino hebreo.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el rastro auditado en inglés. En particular, se adoptó la corrección revisada para לָּךְ en esta locución idiomática, entendida como exclamación personal de rechazo; también se mantuvo la idea de una determinación ya asentada en el mal, sin forzar una traducción más débil. La formulación española busca ser fiel al hebreo y a la decisión final inglesa, no al primer borrador.
  spanish_consistency_notes:
  - Se usa «Jonatán» como forma estándar del nombre.
  - Se traduce הָרָעָה como «mal» en esta amenaza concreta, sin introducir una abstracción innecesaria.
  - Se preserva el tono interrogativo-retórico final con «¿no te lo diría?» para reflejar la expectativa afirmativa del hebreo.
  - La puntuación reproduce el contraste entre la exclamación inicial y la cláusula condicional.
  - No se introduce terminología doctrinal, ya que el versículo es narrativo y no contiene afirmaciones teológicas directas.
