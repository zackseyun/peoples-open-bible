- from: Y toda la multitud se sentó junta en el atrio abierto del templo[a], temblando a causa de la tormenta presente[b].
  to: Y toda la asamblea se sentó en el atrio abierto del templo[a], temblando a causa del temporal que los azotaba[b].
  rationale: 'Se ajusta el español para mayor naturalidad y fidelidad funcional: «toda la asamblea» refleja mejor el contexto formal de πᾶν τὸ πλῆθος; «se sentó» conserva la imagen concreta de συνεκάθισαν sin la aspereza de «junta»; y «el temporal que los azotaba» expresa de forma idiomática la fuerza de τὸν ἐνεστῶτα χειμῶνα, evitando el calco rígido «tormenta presente». Se mantienen las alternativas léxicas de las notas y se aclara que el área pertenece al recinto del templo.'
