- from: Y he aquí[a], he puesto cuerdas sobre ti, y no te volverás[b] de tu costado al otro hasta que hayas cumplido los días de tu sitio[c].
  to: Y he aquí[a], he puesto cuerdas sobre ti, y no te darás vuelta de tu costado al otro[b] hasta que hayas cumplido los días de tu asedio.
  rationale: Se ajusta «no te volverás» a «no te darás vuelta» para expresar con claridad el movimiento corporal implicado por el hebreo y el contexto. Se cambia «tu sitio» por «tu asedio» para mayor transparencia en español neutral contemporáneo, manteniendo el posesivo del original. Se simplifican las notas para conservar las alternativas léxicas relevantes sin justificar en nota una elección menos clara que ya no se usa.
