translation:
  language: es
  text: 'Yahvé de los Ejércitos ha jurado[a], diciendo: Ciertamente, así como yo lo he planeado, así ha sucedido; y así como yo he determinado[d][c][b], así quedará firme.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “el SEÑOR de los ejércitos”.
    reason: lexical_alternative
  - marker: b
    text: 'La fórmula hebrea literalmente dice “si no”, pero aquí funciona como una afirmación enfática de juramento: “ciertamente” o “en verdad”.'
    reason: lexical_alternative
  - marker: c
    text: O, “he pensado” o “he tenido en mente”.
    reason: lexical_alternative
  - marker: d
    text: O, “he aconsejado” o “he resuelto”; también, “quedará establecido”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del tetragrámaton, en línea con la convención del proyecto de usar ‘Yahvé’ en español, en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los hosts
  - de las huestes
  lexicon: HALOT
  rationale: El sustantivo remite a fuerzas armadas/celestiales; ‘Ejércitos’ comunica con claridad el sentido marcial del título en español moderno y mantiene la imagen.
- source_word: נִשְׁבַּע
  english_pob_choice: has sworn
  chosen_spanish: ha jurado
  alternatives_spanish:
  - juró
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un juramento ya pronunciado con relevancia presente; ‘ha jurado’ suena natural en español y conserva el valor de acción completada.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Es la introducción estándar del discurso directo; ‘diciendo’ sigue de cerca la función sintáctica del infinitivo sin sobreinterpretar.
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - De veras
  lexicon: HALOT
  rationale: En fórmula de juramento, la secuencia funciona idiomáticamente como afirmación enfática, no como condicional literal. ‘Ciertamente’ comunica bien esa fuerza en español.
- source_word: דִּמִּיתִי
  english_pob_choice: have planned
  chosen_spanish: he planeado
  alternatives_spanish:
  - he pensado
  - he intentado
  - he ideado
  lexicon: HALOT
  rationale: El verbo puede abarcar pensar, idear o planear; en paralelo con el propósito divino del verso, ‘he planeado’ reproduce la intención deliberada sin volverla meramente mental.
- source_word: הָיָתָה
  english_pob_choice: it has come to pass
  chosen_spanish: ha sucedido
  alternatives_spanish:
  - ha acontecido
  - se ha cumplido
  lexicon: HALOT
  rationale: El verbo femenino singular apunta al hecho/evento implícito. ‘Ha sucedido’ es idiomático y eventivo en español, equivalente al sentido de cumplimiento de lo planeado.
- source_word: יָעַצְתִּי
  english_pob_choice: have purposed
  chosen_spanish: he determinado
  alternatives_spanish:
  - he resuelto
  - he aconsejado
  - he dispuesto
  lexicon: HALOT
  rationale: El verbo puede implicar consejo, propósito o resolución. ‘He determinado’ conserva la fuerza deliberativa y encaja bien con el paralelismo del verso.
- source_word: תָקוּם
  english_pob_choice: it will stand
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se mantendrá
  - quedará firme
  - se levantará
  lexicon: HALOT
  rationale: Aquí la idea es la firme realización/estabilidad de lo decretado. ‘Permanecerá’ transmite continuidad y firmeza en español, aunque la imagen literal de ‘estar en pie’ queda como alternativa.
- source_word: הִיא
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - eso
  - ello
  lexicon: HALOT
  rationale: El pronombre femenino hebreo remite al decreto/materia implícita; en español, el objeto neutro ‘lo’ funciona de modo natural en la cláusula precedente ‘lo he planeado’.
theological_decisions:
- issue: Renderizado del título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - el SEÑOR de los ejércitos
  rationale: Se mantiene el nombre personal divino ‘Yahvé’ y se traduce צְבָאוֹת con un término transparente en español. ‘Ejércitos’ conserva el matiz de soberanía militar sin recurrir a la sustitución tradicional del nombre.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé; original-language primacy'
- issue: Fuerza de la fórmula de juramento אִם לֹא
  english_pob_reading: Surely
  chosen_spanish_reading: Ciertamente
  alternative_spanish_readings:
  - Sin duda
  - En verdad
  rationale: En contexto de juramento, la expresión no debe leerse como condicional literal. ‘Ciertamente’ preserva la afirmación enfática y evita perder la solemnidad del hebreo.
  doctrine_reference: 'DOCTRINE.md: lexical force in oath idioms; avoid flattening Hebrew idiom'
- issue: Paralelismo entre דִּמִּיתִי / יָעַצְתִּי
  english_pob_reading: have planned / have purposed
  chosen_spanish_reading: he planeado / he determinado
  alternative_spanish_readings:
  - he pensado / he resuelto
  - he ideado / he dispuesto
  rationale: 'El versículo pone en paralelo dos verbos de intención divina. ‘He planeado’ y ‘he determinado’ distinguen matices: el primero enfatiza el diseño, el segundo la resolución firme, sin borrar la tensión semántica.'
  doctrine_reference: 'DOCTRINE.md: preserve lexical/theological tensions; original-language primacy'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y su última revisión sin cambios. La opción española sigue la misma filosofía de equivalencia óptima: conserva el nombre divino, traduce צְבָאוֹת con un término transparente, respeta la fórmula de juramento idiomática y mantiene el paralelismo semántico de los verbos de intención/divino decreto. No se aplicaron revisiones textuales al contenido base porque el expediente inglés indica estabilidad del versículo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evita ‘SEÑOR’ como sustituto del nombre divino, salvo como alternativa documentada en nota.
  - ‘Ejércitos’ se emplea para צְבָאוֹת, preservando el matiz militar del título.
  - ‘Ciertamente’ traduce la fuerza enfática de אִם לֹא sin volverla condicional literal.
  - ‘He planeado’ / ‘he determinado’ mantiene la distinción entre los dos verbos hebreos de intención.
  - ‘Permanecerá’ refleja la firmeza de תָקוּם en el contexto de decreto cumplido, aunque la imagen literal de ‘estar en pie’ queda reconocida en la nota de alternativa.
