  text: נִקְהֲל֨וּ הַ/יְּהוּדִ֜ים בְּ/עָרֵי/הֶ֗ם בְּ/כָל מְדִינוֹת֙ הַ/מֶּ֣לֶךְ אֳחַשְׁוֵר֔וֹשׁ לִ/שְׁלֹ֣חַ יָ֔ד בִּ/מְבַקְשֵׁ֖י רָֽעָתָ֑/ם וְ/אִישׁ֙ לֹא עָמַ֣ד לִ/פְנֵי/הֶ֔ם כִּֽי נָפַ֥ל פַּחְדָּ֖/ם עַל כָּל הָ/עַמִּֽים־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/esther/009/002.yaml
  text: The Jews assembled in their cities throughout all the provinces of King Ahasuerus to lay hands on those seeking their harm[a], and no one could stand before them[c][b], because the fear of them had fallen on all the peoples.
  footnotes:
  - marker: a
    text: Or 'to attack those seeking their harm'; the Hebrew idiom is literally 'to send/stretch out a hand against.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and no one could withstand them.'
    reason: lexical_alternative
  - marker: c
    text: '''Peoples'' likely refers to the various ethnic groups or populations within the empire, not merely a single nation.'
    reason: cultural_note
