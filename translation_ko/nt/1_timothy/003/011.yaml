id: 1TI.3.11
reference: 1 Timothy 3:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: γυναῖκας ὡσαύτως σεμνάς, μὴ διαβόλους, νηφαλίους, πιστὰς ἐν πᾶσιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/011.yaml
  text: Women likewise must be dignified[a], not slanderers, sober-minded, faithful in all things.
  footnotes:
  - marker: a
    text: Or "Wives likewise must be dignified..." The Greek γυναῖκας can mean either "women" or "wives" in this context; the text does not explicitly say "their wives."
    reason: alternative_reading
translation:
  language: ko
  text: 여자들[a]도 이와 같이 단정해야 하며, 비방하지 않고, 절제하며, 모든 일에 신실해야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「아내들도 이와 같이 단정해야 하며…」. 헬라어 γυναῖκας는 본 문맥에서 「여자」 또는 「아내」 두 의미가 가능하며, 본문은 「그들의 아내들」이라고 명시하지 않는다.
    reason: alternative_reading
lexical_decisions:
- source_word: γυναῖκας
  english_pob_choice: Women
  chosen_korean: 여자들
  alternatives_korean:
  - 아내들
  - 여자 집사들
  lexicon: BDAG
  rationale: 「여자」 또는 「아내」 두 의미가 모두 가능. 본문에 「그들의」가 없으므로 일반적 「여자」를 본문에 두고, 「아내」 해석은 각주로 보존.
- source_word: σεμνάς
  english_pob_choice: dignified
  chosen_korean: 단정해야 하며
  alternatives_korean:
  - 정숙해야 하며
  - 위엄 있어야 하며
  lexicon: BDAG
  rationale: 8절과 일관.
- source_word: μὴ διαβόλους
  english_pob_choice: not slanderers
  chosen_korean: 비방하지 않고
  alternatives_korean:
  - 험담하지 않고
  - 모함하지 않고
  lexicon: BDAG
  rationale: διάβολος의 일반적 의미 「비방자」(6, 7절의 「마귀」와 같은 어휘이나 본 절은 일반적 의미).
- source_word: νηφαλίους
  english_pob_choice: sober-minded
  chosen_korean: 절제하며
  alternatives_korean:
  - 깨어 있으며
  - 신중하며
  lexicon: BDAG
  rationale: 2절과 일관.
- source_word: πιστὰς ἐν πᾶσιν
  english_pob_choice: faithful in all things
  chosen_korean: 모든 일에 신실해야 합니다
  alternatives_korean:
  - 모든 일에 충성스러워야 합니다
  - 모든 일에 믿을 만해야 합니다
  lexicon: BDAG
  rationale: πιστός의 「신실함·믿음직스러움」을 「신실」로 옮긴다.
