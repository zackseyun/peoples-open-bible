translation:
  language: es
  text: ¿Quién es esta que sube del desierto, apoyada en su amado? Bajo el manzano[a] te desperté[b]; allí tu madre estuvo de parto contigo[c]; allí la que te dio a luz estuvo de parto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, 'bajo el albaricoquero'; la especie exacta denotada por la palabra hebrea es incierta, aunque 'manzano' es la traducción tradicional.
    reason: lexical_alternative
  - marker: b
    text: O 'te desperté con pasión' o 'te provoqué'; el hebreo puede llevar un matiz más fuerte que un simple despertar en este contexto de poesía amorosa.
    reason: alternative_reading
  - marker: c
    text: Es probable que la voz hablante cambie a mitad del verso, de una observación descriptiva a un discurso directo, y el hebreo no identifica con claridad al hablante exacto.
    reason: alternative_reading
lexical_decisions:
- source_word: עֹלָה
  english_pob_choice: coming up
  chosen_spanish: sube
  alternatives_spanish:
  - viene subiendo
  - asciende
  lexicon: HALOT
  rationale: El participio expresa movimiento ascendente; 'sube' conserva la imagen con naturalidad en español y sin rigidez.
- source_word: הַמִּדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - la estepa
  - la región desértica
  lexicon: HALOT
  rationale: En español bíblico, 'desierto' comunica bien el campo abierto e inhóspito del hebreo, aunque 'wilderness' en inglés abarque más que un desierto arenoso.
- source_word: מִתְרַפֶּקֶת עַל
  english_pob_choice: leaning on
  chosen_spanish: recostada sobre
  alternatives_spanish:
  - apoyada en
  - aferrada a
  lexicon: HALOT
  rationale: La forma reflexiva sugiere apoyo físico cercano; 'recostada sobre' da una imagen fluida y afectuosa, equivalente al valor relacional del inglés POB.
- source_word: דּוֹדָהּ
  english_pob_choice: her beloved
  chosen_spanish: su amado
  alternatives_spanish:
  - su amado esposo
  - su amante
  lexicon: HALOT
  rationale: '''Amado'' mantiene el tono literario y afectivo del Cantar sin introducir una especificación que el hebreo no obliga a hacer.'
- source_word: תַּפּוּחַ
  english_pob_choice: apple tree
  chosen_spanish: manzano
  alternatives_spanish:
  - árbol de manzanas
  - albaricoquero
  lexicon: HALOT
  rationale: '''Manzano'' es la forma natural en español para el árbol frutal tradicional; la incertidumbre botánica queda para la nota, sin sobrecargar el texto principal.'
- source_word: עוֹרַרְתִּיךָ
  english_pob_choice: I awakened you
  chosen_spanish: te desperté
  alternatives_spanish:
  - te desperté de nuevo
  - te aroused
  lexicon: HALOT
  rationale: '''Desperté'' conserva el sentido básico de עור. En español, ''te desperté'' es claro y no añade más erotización de la que el hebreo permite con seguridad.'
- source_word: חִבְּלַתְךָ
  english_pob_choice: was in labor with you
  chosen_spanish: estuvo de parto contigo
  alternatives_spanish:
  - estuvo con dolores de parto por ti
  - estuvo en trabajo de parto contigo
  lexicon: HALOT
  rationale: La raíz remite a dolores de parto; 'estar de parto' es una expresión idiomática y digna en español, y 'contigo' refleja el sufijo pronominal sin volver la frase pesada.
- source_word: יְלָדַתְךָ
  english_pob_choice: bore you
  chosen_spanish: te dio a luz
  alternatives_spanish:
  - te parió
  - te engendró
  lexicon: HALOT
  rationale: '''Dar a luz'' es la forma más clara y formal en español para יָלַד en contexto de nacimiento, evitando ambigüedad con ''engendrar''.'
- source_word: שָׁמָּה
  english_pob_choice: there ... there
  chosen_spanish: allí ... allí
  alternatives_spanish:
  - ahí ... ahí
  lexicon: HALOT
  rationale: Se conserva la repetición del adverbio para reproducir el paralelismo hebreo y el énfasis poético.
theological_decisions:
- issue: Cambio de voz y de destinatario en la segunda mitad del verso
  english_pob_reading: 'The translation preserves a descriptive opening followed by direct address: ''I awakened you; there your mother was in labor with you; there she who bore you was in labor.'''
  chosen_spanish_reading: 'La traducción mantiene la transición poética desde la pregunta descriptiva hasta la alocución directa: ''te desperté... tu madre... te dio a luz''.'
  alternative_spanish_readings:
  - Tomar todo el verso como una sola voz narrativa sin cambio de destinatario
  - Suavizar el cambio a tercera persona en toda la línea
  rationale: El hebreo introduce un cambio real de perspectiva; la versión española lo conserva en vez de resolverlo, porque ese vaivén forma parte de la textura literaria del pasaje.
  doctrine_reference: 'Poética bíblica: preservar ambigüedad y cambio de voz sin forzar armonización.'
translation_notes:
  revision_awareness: La edición inglesa más reciente ajustó 'gave birth to you' a 'bore you' para reflejar con mayor literalidad el hebreo, manteniendo 'was in labor'. En español se siguió esa misma línea de formalidad y paralelismo, pero con un giro idiomático natural ('te dio a luz' / 'estuvo de parto').
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o terminología de sustitución porque no aparece el Tetragrámaton en este verso.
  - '''Amado'' conserva el término relacional del Cantar y evita modernizarlo a un registro coloquial.'
  - 'La secuencia verbal reproduce el paralelismo hebreo: pregunta inicial, apretamiento afectivo, luego memoria del parto con repetición de ''allí''.'
  - La nota sobre el árbol conserva la incertidumbre botánica sin debilitar la lectura tradicional.
