translation:
  language: es
  text: Entonces le dio por mujer[a] a Bilha, su sierva, y Jacob se llegó a ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su sirvienta». El hebreo se refiere a una mujer sirviente de estatus subordinado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֶּן
  english_pob_choice: So she gave
  chosen_spanish: Así que ella le dio
  alternatives_spanish:
  - Entonces ella le dio
  - Y ella le dio
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Así que» conserva la secuencia y suena natural en español formal sin perder el valor narrativo del verbo נתן («dar»).
- source_word: לּוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: En español, el objeto indirecto se expresa de forma natural con el dativo «le», que representa bien el hebreo preposicional sin añadir peso innecesario.
- source_word: בִּלְהָה
  english_pob_choice: Bilhah
  chosen_spanish: Bilha
  alternatives_spanish:
  - Bilhá
  lexicon: transliteration
  rationale: Se translitera el nombre propio con forma castellana sobria y reconocible. Se mantiene la identidad del personaje sin introducir adaptación interpretativa.
- source_word: שִׁפְחָתָהּ
  english_pob_choice: her servant
  chosen_spanish: su sierva
  alternatives_spanish:
  - su sirvienta
  - su esclava
  - su criada
  lexicon: HALOT
  rationale: שִׁפְחָה designa a una servidora femenina de estatus subordinado. «Sierva» conserva ese rango social con dignidad y sin la dureza de «esclava», mientras que «sirvienta/criada» puede sonar más doméstico que jurídico-social.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - para esposa
  - para que fuera esposa
  lexicon: HALOT
  rationale: La construcción expresa una relación marital/concubinal. «Como esposa» refleja esa función relacional de manera clara y fiel, sin sobreexplicar ni modernizar en exceso.
- source_word: וַיָּבֹא אֵלֶיהָ
  english_pob_choice: went in to her
  chosen_spanish: se llegó a ella
  alternatives_spanish:
  - entró a ella
  - tuvo relaciones con ella
  lexicon: HALOT
  rationale: Es una fórmula hebrea eufemística para la unión sexual. «Se llegó a ella» preserva el idiomatismo con suficiente claridad en español; evita la explicitud de «tuvo relaciones con ella» y mantiene el tono sobrio del texto.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaacob
  lexicon: transliteration
  rationale: Nombre propio establecido por convención bíblica en español.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «female servant» a «servant» para mayor naturalidad. La versión española sigue esa simplificación semántica con «sierva», manteniendo el matiz de estatus subordinado del hebreo שִׁפְחָה sin forzar una duplicación innecesaria.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se usa «sierva» y no «esclava» porque el contexto narrativo pide un término social subordinado, pero no exige la dureza léxica de δοῦλος/עֶבֶד; la nota conserva la alternativa.
  - «Se llegó a ella» preserva el eufemismo sexual hebreo y evita el registro demasiado moderno de una paráfrasis explícita.
