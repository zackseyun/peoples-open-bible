- from: 'Porque ¿quién dirá: “¿Qué has hecho?” O ¿quién se opondrá a tu juicio? ¿Y quién te acusará[a] respecto de las naciones que perecieron[b], que tú hiciste? ¿O quién se presentará ante ti como vengador contra hombres injustos?'
  to: 'Porque ¿quién dirá: «¿Qué has hecho?» o ¿quién se opondrá a tu juicio? ¿Y quién te acusará con respecto a las naciones que tú destruiste? ¿O quién se presentará ante ti[a] como vengador contra hombres injustos?'
  rationale: 'Se corrige la cláusula central para reflejar el sentido contextual y la decisión lexical documentada por la POB inglesa: no una literalidad opaca («que perecieron, que tú hiciste»), sino «las naciones que tú destruiste». Se elimina la nota b porque ya no hace falta preservar una tensión literal que en español produce confusión y no mejora la fidelidad. Se mueve la nota a al sintagma correcto («se presentará ante ti») y se ajusta la puntuación/capitalización para un español más natural.'
