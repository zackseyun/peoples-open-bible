lexical_decisions:
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - mientras
  lexicon: HALOT
  rationale: La preposición temporal introduce el límite de la situación del hablante desde el versículo anterior; en español, «hasta que» comunica con naturalidad ese cierre esperado.
- source_word: יַשְׁקִיף
  english_pob_choice: looks down
  chosen_spanish: mire
  alternatives_spanish:
  - mire hacia abajo
  - observe desde arriba
  - se asome
  lexicon: HALOT
  rationale: El hebreo expresa la imagen vertical de mirar desde lo alto; en español, «mire desde el cielo» conserva esa dirección sin forzar un calco pesado.
- source_word: וְיֵרֶא
  english_pob_choice: and sees
  chosen_spanish: y vea
  alternatives_spanish:
  - y vea con atención
  - y observe
  lexicon: HALOT
  rationale: 'El verbo ראה se mantiene como un acto distinto de יַשְׁקִיף, conservando el paralelismo poético de dos verbos coordinados: mirar y ver.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton con la forma española establecida en el proyecto, «Yahvé», en lugar de una sustitución por título.
- source_word: מִשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - desde el cielo arriba
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, el uso idiomático en contexto divino se expresa naturalmente en español como «desde el cielo», manteniendo la verticalidad y la escena celestial.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa יְהוָה de forma directa; la política del proyecto pide transliterar el nombre en español. «Yahvé» transmite el nombre personal del pacto sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָH YHWH → Yahvé'
- issue: Pareado verbal «looks down and sees»
  english_pob_reading: looks down and sees
  chosen_spanish_reading: mire ... y vea
  alternative_spanish_readings:
  - observe ... y vea
  - se asome ... y vea
  rationale: La expresión hebrea presenta dos verbos coordinados que intensifican la observación divina. En español se conserva la doble acción sin fusionarlas en un solo verbo.
  doctrine_reference: POB audit trail on paired expression emphasizing attentive observation
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: no hay revisiones aplicadas y el revisor externo marcó acuerdo alto. La redacción española sigue esa lectura sin introducir explicaciones adicionales fuera de lo evidenciado por el hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto.
  - «Cielo» se usa en singular por idiomática española, aunque el hebreo esté en plural.
  - La nota al pie conserva el valor del pareado verbal sin diluirlo en una sola acción.
