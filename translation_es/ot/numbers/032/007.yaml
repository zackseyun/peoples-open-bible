revisions:
- from: ¿Y por qué desaniman el corazón de los hijos de Israel para que no pasen a la tierra que Yahvé les ha dado?[a][b]
  to: ¿Y por qué desaniman los corazones de los hijos de Israel para que no crucen[a] a la tierra que Yahvé les ha dado?[b]
  rationale: Se revisa «el corazón» a «los corazones» para reflejar la decisión auditada del POB y sonar natural en español. Se ajusta el verbo de cruce a «crucen» para expresar mejor el motivo contextual de עבר en entrada a la tierra. Se simplifican y corrigen las notas al pie, preservando la alternativa literal/idiomática y la variante para «hijos de Israel».
