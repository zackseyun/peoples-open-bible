base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/015/002.yaml
  text: 'And this is the matter of the release: every creditor shall release what his hand has lent to his neighbor[a]. He shall not press his neighbor or his brother[b], because a release to Yahweh has been proclaimed.'
  footnotes:
  - marker: a
    text: Or 'remission' or 'cancellation' for 'release' (Hebrew shemittah), the formal dropping of debt claims in the sabbatical year.
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' here refers to a fellow member of the covenant community; some translations render more interpretively as ''fellow Israelite'' or similar.'
    reason: lexical_alternative
