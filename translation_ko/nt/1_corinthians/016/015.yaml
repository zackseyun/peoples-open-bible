source:
  edition: SBLGNT
  text: Παρακαλῶ δὲ ὑμᾶς, ἀδελφοί· οἴδατε τὴν οἰκίαν Στεφανᾶ, ὅτι ἐστὶν ἀπαρχὴ τῆς Ἀχαΐας καὶ εἰς διακονίαν τοῖς ἁγίοις ἔταξαν ἑαυτούς·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/016/015.yaml
  text: 'Now I urge you[a], brothers: you know the household of Stephanas, that they are the firstfruits of Achaia[b], and they devoted themselves to the service of the saints.'
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers,' a common form of address that can include the whole congregation.
    reason: lexical_alternative
  - marker: b
    text: '''Firstfruits'' likely means the earliest believers in Achaia, while also preserving the metaphor of an initial portion set apart to God.'
    reason: lexical_alternative
translation:
  language: ko
  text: 형제 여러분, 내가 여러분에게 부탁합니다. 여러분은 스데바나의 집안을 알고 있습니다. 그들은 아가야의 첫 열매이며, 자신들을 성도들을 섬기는 일에 헌신했습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「첫 열매」는 본 문맥에서 아가야 지역의 가장 이른 신자들을 가리키며, 동시에 「하나님께 따로 구별된 첫 부분」이라는 비유적 함의를 보존한다.
    reason: lexical_alternative
