translation:
  language: ko
  text: '영원무궁토록 살아 계신 분, 곧 하늘과 그 안의 것들, 땅과 그 위의 것들, 바다와 그 안의 것들을 창조하신 분을 두고 맹세하기를, 「더 이상 지체가 없으리라[a]」 하였습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 직역하여 「때가 더 이상 없으리라」. 여기서 χρόνος는 문맥상 「지체」로 이해되며, 하나님의 최종 행하심 이전의 기다림이 끝났음을 가리킨다.'
    reason: alternative_reading
