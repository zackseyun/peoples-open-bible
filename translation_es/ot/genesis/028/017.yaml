    text: Or, “How fearful is this place!” The Hebrew term can express fear, dread, or reverent awe.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “the gate of the heavens.” English commonly uses “heaven” here for the divine realm.'
    reason: lexical_alternative
