translation:
  language: es
  text: 'Entonces Saúl mandó a sus siervos[a]: «Hablen a David en privado, diciendo: “Mira, el rey se deleita en ti, y todos sus siervos te aman. Así que ahora hazte yerno del rey[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «secretamente» o «calladamente» para «en privado».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «emparéntate por matrimonio con el rey» o «aliate por matrimonio con el rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden
  lexicon: HALOT
  rationale: צוה expresa una orden directa; en español, «mandó» conserva bien la fuerza imperativa y suena natural en un contexto de corte real.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  - sus servidores de la corte
  lexicon: HALOT
  rationale: עבד puede referirse a sirvientes o funcionarios de la corte según el contexto. «Siervos» mantiene la conexión léxica con el hebreo y es transparente en este escenario real.
- source_word: דַּבְּרוּ
  english_pob_choice: Speak
  chosen_spanish: Hablen
  alternatives_spanish:
  - Digan
  - Háblenle
  lexicon: HALOT
  rationale: El imperativo plural pide transmitir un mensaje. «Hablen» conserva el carácter de instrucción verbal y encaja con el discurso indirecto que sigue.
- source_word: בַּלָּט
  english_pob_choice: privately
  chosen_spanish: en privado
  alternatives_spanish:
  - en secreto
  - calladamente
  - discretamente
  lexicon: HALOT
  rationale: בלט denota ocultamiento o discreción. «En privado» comunica bien el valor pragmático sin volverlo más fuerte que el hebreo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - He aquí
  - Miren esto
  lexicon: HALOT
  rationale: הנה funciona como marcador discursivo de atención. «Mira» es la forma más natural en español para introducir la razón o noticia que sigue.
- source_word: חָפֵץ בְּךָ
  english_pob_choice: delights in you
  chosen_spanish: se deleita en ti
  alternatives_spanish:
  - tiene agrado en ti
  - se complace en ti
  - te aprecia
  lexicon: HALOT
  rationale: חפץ con ב expresa complacencia o deleite. «Se deleita en ti» mantiene el matiz afectivo sin sugerir necesariamente deseo romántico o posesivo.
- source_word: אֲהֵבוּךָ
  english_pob_choice: love you
  chosen_spanish: te aman
  alternatives_spanish:
  - te quieren
  - te aprecian
  - te tienen afecto
  lexicon: HALOT
  rationale: אהב normalmente significa «amar». En este contexto de corte puede abarcar afecto o favor, pero «te aman» conserva la fuerza lexical sin debilitarla a un mero aprecio.
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  - Por tanto, ahora
  lexicon: HALOT
  rationale: La partícula marca una transición inferencial hacia la exhortación. «Así que ahora» reproduce bien la conexión lógica y el tono de exhortación.
- source_word: הִתְחַתֵּן
  english_pob_choice: become the king’s son-in-law
  chosen_spanish: hazte yerno del rey
  alternatives_spanish:
  - cásate con la familia del rey
  - entra en parentesco con el rey
  - alianza por matrimonio con el rey
  lexicon: HALOT
  rationale: El hitpael de חתן expresa entrar en relación matrimonial. En español, «hazte yerno del rey» comunica con precisión la relación requerida y evita una paráfrasis más larga.
- source_word: בַּמֶּלֶךְ
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - con el rey
  - en relación con el rey
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «con el rey», el sentido es el parentesco matrimonial con la casa real. «Del rey» es la forma natural en español para «yerno del rey».
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el testigo hebreo y con la traducción auditada en inglés; no se requieren revisiones sustantivas. Se conserva la fuerza cortesana del mandato y la relación matrimonial implícita en הִתְחַתֵּן.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece ningún término mesiánico en este texto.
  - «Siervos» traduce עֲבָדָיו siguiendo la decisión POB de conservar la fuerza de עבד en contexto real.
  - La fórmula «hazte yerno del rey» refleja la equivalencia óptima adoptada en inglés para הִתְחַתֵּן בַּמֶּלֶךְ.
