  text: וְ/אִם נְקֵבָ֣ה תֵלֵ֔ד וְ/טָמְאָ֥ה שְׁבֻעַ֖יִם כְּ/נִדָּתָ֑/הּ וְ/שִׁשִּׁ֥ים יוֹם֙ וְ/שֵׁ֣שֶׁת יָמִ֔ים תֵּשֵׁ֖ב עַל דְּמֵ֥י טָהֳרָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/012/005.yaml
  text: But if she gives birth to a female child[a], then she shall be unclean for two weeks, as in her menstruation[b]; and for sixty-six days she shall remain in the blood of purification.
  footnotes:
  - marker: a
    text: Or, more explicitly, 'as during her menstrual impurity.' The Hebrew compares her post-childbirth uncleanness to the state associated with menstruation.
    reason: lexical_alternative
  - marker: b
    text: '''The blood of purification'' refers to the prescribed period of post-birth purification, not to moral guilt.'
    reason: cultural_note
