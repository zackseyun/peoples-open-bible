translation:
  language: es
  text: Y presentó el holocausto[a] y lo ofreció conforme a la ordenanza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Holocausto» traduce el término sacrificial clásico; el hebreo también puede entenderse como «ofrenda totalmente quemada».
    reason: lexical_alternative
  - marker: b
    text: 'O: «según lo prescrito»; el hebreo subraya el carácter normativo del rito.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: presented
  chosen_spanish: presentó
  alternatives_spanish:
  - trajo
  - ofreció
  lexicon: HALOT
  rationale: El verbo hiphil de קרב expresa ‘hacer acercar’ o ‘presentar’ en contexto sacrificial. «Presentó» conserva el sentido ritual sin duplicarlo innecesariamente con el segundo verbo.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda de ascensión
  lexicon: HALOT
  rationale: En español bíblico y litúrgico, «holocausto» es el término tradicional para la ofrenda completamente quemada. Aunque «ofrenda quemada» es más transparente, «holocausto» mantiene la referencia sacrificial estable en Levítico.
- source_word: וַיַּעֲשֶׂהָ
  english_pob_choice: offered it
  chosen_spanish: lo ofreció
  alternatives_spanish:
  - lo hizo
  - lo ejecutó
  - lo preparó
  lexicon: HALOT
  rationale: En este contexto cultual, עשה no significa simplemente ‘hacer’, sino llevar a cabo el rito. «Lo ofreció» refleja bien la realización sacrificial, aunque el hebreo sea más amplio.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al ordenanza
  alternatives_spanish:
  - según el estatuto
  - según lo prescrito
  - conforme al rito
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí tiene fuerza jurídico-procedimental. «Conforme al ordenanza» busca preservar esa idea de norma prescrita; la formulación es algo más literal que la opción idiomática «según lo prescrito».
translation_notes:
  revision_awareness: 'El texto hebreo es breve y coincide sustancialmente con el audit trail inglés. La principal decisión española es mantener terminología sacrificial tradicional donde no traiciona el sentido: «holocausto» para עֹלָה y una construcción normativa para כַּמִּשְׁפָּט. La elección «lo ofreció» sigue la revisión inglesa que prefirió una expresión cultual más precisa que un mero «lo hizo».'
  spanish_consistency_notes:
  - Se mantuvo el sujeto implícito como en el hebreo y en la traducción inglesa auditada.
  - 'Se preservó el paralelismo verbal de dos acciones sucesivas: presentar/ofrecer.'
  - Se evitó «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
