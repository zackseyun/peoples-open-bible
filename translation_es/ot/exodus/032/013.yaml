revisions:
- from: 'Acuérdate de Abraham, Isaac e Israel[a], tus siervos, a quienes juraste por ti mismo y les dijiste: «Multiplicaré tu descendencia como las estrellas de los cielos, y toda esta tierra que dije que daría a tu descendencia, y la heredarán para siempre».'
  to: 'Acuérdate de Abraham, Isaac e Israel[a], tus siervos, a quienes juraste por ti mismo y les dijiste: «Multiplicaré su descendencia como las estrellas de los cielos, y toda esta tierra que dije que daría a su descendencia, y la heredarán para siempre».'
  rationale: Se corrigió «tu descendencia» a «su descendencia» en ambas ocurrencias para reflejar fielmente el sufijo plural hebreo dirigido a los tres patriarcas colectivamente, sin perder naturalidad en español. Se mantuvo el resto del texto porque preserva bien el sentido fuente, la decisión teológica sobre «Israel» y la legibilidad bíblica en español.
