review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: personas despojadas pasan la noche sin ropa suficiente y sin protección frente al frío. Sin embargo, dos elecciones españolas debilitan la fidelidad semántica y la naturalidad: «Pasaron» introduce un pasado puntual no exigido por יָלִינוּ en este contexto gnómico/poético, y «cobertura» suena técnica y poco idiomática para כְּסוּת.'
  spanish_quality_summary: «Desnudos» y «sin» funcionan bien. «Sin vestido» es comprensible, pero «sin ropa» o «sin vestido alguno» sería más natural; aun así, lo más urgente es corregir «Pasaron» y «cobertura». La frase revisada suena más bíblica y natural en español eclesial contemporáneo.
  glossary_alignment: 'No hay términos teológicos de glosario mayor en este versículo. La revisión mantiene equivalencia óptima y mejora la representación de לין y כְּסוּת: «pasan la noche» para el valor verbal y «cobertura» -> «abrigo» como protección contra el frío, sin sobreinterpretar en exceso.'
  issues:
  - severity: medium
    issue: «Pasaron la noche» usa pretérito indefinido
    rationale: El hebreo יָלִינוּ expresa ‘pasan la noche / pernoctan / se alojan’. En el contexto sapiencial-poético de Job 24, el presente descriptivo en español refleja mejor la observación general que un pasado narrativo.
  - severity: medium
    issue: «cobertura» es poco idiomático para כְּסוּת
    rationale: Aunque etimológicamente posible, en español moderno «cobertura» suena técnica o abstracta. Aquí se requiere una protección material frente al frío; «abrigo» o «cobertura» no son equivalentes de naturalidad similar. «Abrigo» comunica mejor la función protectora preservada también en la auditoría inglesa.
  - severity: low
    issue: La nota al pie puede naturalizarse mejor en español
    rationale: 'Conviene mantener la alternativa inglesa documentada, pero con puntuación y formulación más natural: «O: “Se alojan…” / “en el frío”». Además, debe concordar con el tiempo verbal del texto principal revisado.'
  revised_spanish_text: Pasan la noche desnudos[a], sin ropa, y no tienen abrigo contra el frío.
