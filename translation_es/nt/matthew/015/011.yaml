translation:
  language: es
  text: No es lo que entra en la boca lo que contamina al hombre[a][b], sino lo que sale de la boca; esto contamina al hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hace impuro'. El verbo griego puede expresar volver a alguien impuro o contaminarlo en sentido de pureza.
    reason: lexical_alternative
  - marker: b
    text: «El hombre» aquí tiene fuerza representativa y se refiere en forma genérica a un ser humano.
    reason: cultural_note
lexical_decisions:
- source_word: κοινοῖ
  english_pob_choice: defiles
  chosen_spanish: contamina
  alternatives_spanish:
  - hace impuro
  - mancha ritualmente
  - vuelve inmundo
  lexicon: BDAG
  rationale: En este contexto de pureza, κοινόω no describe suciedad física sino el efecto de volver a una persona impura o profanada. 'Contamina' comunica bien ese alcance en español bíblico contemporáneo sin reducirlo a higiene ni obligar a un tecnicismo largo.
- source_word: τὸ εἰσερχόμενον εἰς τὸ στόμα
  english_pob_choice: what enters into the mouth
  chosen_spanish: lo que entra en la boca
  alternatives_spanish:
  - lo que entra en la boca
  - la cosa que entra en la boca
  - lo que se introduce en la boca
  lexicon: BDAG
  rationale: El participio articular funciona como sustantivo. En español, 'lo que entra' es natural y mantiene el sentido concreto de εἰς τὸ στόμα sin sonar forzado.
- source_word: τὸ ἐκπορευόμενον ἐκ τοῦ στόματος
  english_pob_choice: what comes out of the mouth
  chosen_spanish: lo que sale de la boca
  alternatives_spanish:
  - lo que sale de la boca
  - lo que procede de la boca
  - la cosa que sale de la boca
  lexicon: BDAG
  rationale: Ἐκπορεύομαι aquí se expresa con sencillez como 'sale de'. 'Procede' sería más formal, pero en español sonaría más abstracto de lo que requiere la imagen.
- source_word: ἄνθρωπον
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: BDAG
  rationale: Se conserva el masculino singular representativo del griego. En español, 'el hombre' puede funcionar de manera genérica en este dicho, y mantiene la correspondencia formal que el proyecto documenta.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - eso
  - aquello
  lexicon: BDAG
  rationale: El demostrativo subraya la segunda cláusula; 'esto' preserva ese énfasis en español y mantiene la referencia inmediata a lo que sale de la boca.
- source_word: οὐ ... ἀλλὰ
  english_pob_choice: It is not ... but ...
  chosen_spanish: No ... sino ...
  alternatives_spanish:
  - No es ... sino ...
  - No ... pero ...
  lexicon: BDAG
  rationale: La correlación negativa-contrastiva se expresa con la forma natural 'No ... sino ...', que reproduce claramente la oposición del griego.
theological_decisions:
- issue: Lenguaje de pureza en κοινόω
  english_pob_reading: Render with 'defiles' to preserve both ritual and moral impurity resonance without narrowing the saying to ceremonial uncleanness alone.
  chosen_spanish_reading: Traducir con 'contamina' para conservar la idea de impureza/pureza sin limitarla a suciedad física.
  alternative_spanish_readings:
  - hace impuro
  - vuelve inmundo
  - mancha
  rationale: El dicho de Jesús trata de lo que vuelve impuro a la persona ante Dios. 'Contamina' permite oír esa carga ritual y moral en español, sin perder naturalidad.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Masculino singular genérico en ἄνθρωπον
  english_pob_reading: Retain 'the man' in the main text, with inclusive force noted in a footnote.
  chosen_spanish_reading: Mantener 'el hombre' en el texto principal, con nota sobre su valor representativo.
  alternative_spanish_readings:
  - la persona
  - el ser humano
  rationale: El griego usa masculino singular con fuerza genérica. En español, conservar 'el hombre' respeta esa forma y evita diluir la elección léxica del texto fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente griego y con la traducción inglesa auditada; no se registran revisiones aplicadas en el material de control más reciente, y la concordancia de revisión indica acuerdo alto sin cambios necesarios.
  spanish_consistency_notes:
  - 'Se mantuvo la estructura antitética breve del original: negación + contraste + repetición enfática.'
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes porque no aparecen en este versículo.
  - '''Contamina'' se eligió como equivalente español capaz de abarcar la impureza ritual y moral documentada por la auditoría inglesa.'
  - La referencia genérica masculina se preserva en el texto principal y se aclara en nota para transparencia.
  - La puntuación con punto y coma ayuda a reflejar la cesura entre las dos mitades del dicho sin alterar el sentido.
