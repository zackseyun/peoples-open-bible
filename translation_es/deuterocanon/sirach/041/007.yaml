translation:
  language: es
  text: Los hijos de un padre malvado son malditos[a], porque por él son una deshonra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: "Los hijos de un padre impío son reprochados, porque por causa de él serán deshonrados". El hebreo sugiere con más fuerza la idea de maldición, mientras que el griego enfatiza el reproche.'
    reason: alternative_reading
lexical_decisions:
- source_word: אב רשע
  english_pob_choice: a wicked father
  chosen_spanish: un padre malvado
  alternatives_spanish:
  - un padre impío
  - un padre perverso
  - un padre inicuo
  lexicon: HALOT
  rationale: El hebreo es singular y paternal; "padre" conserva esa especificidad. "Malvado" comunica bien רשע en español moderno sin cargar demasiado hacia el registro eclesiástico de "impío", aunque esa sigue siendo una alternativa viable.
- source_word: יקוב
  english_pob_choice: are cursed
  chosen_spanish: son una vergüenza
  alternatives_spanish:
  - son maldecidos
  - están bajo maldición
  - son malditos
  lexicon: HALOT
  rationale: El hebreo admite un matiz difícil de castigo o maldición, pero el contexto del paralelismo y la tradición textual apuntan también a la idea de deshonra pública. En español, una formulación literal de "maldecidos" sonaría forzada aquí; se prefirió una expresión que preserve el efecto resultante y la tensión con el griego, sin borrar la posible lectura de maldición en la nota.
- source_word: ילד
  english_pob_choice: children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - la descendencia
  - los hijos e hijas
  lexicon: HALOT
  rationale: El sustantivo funciona en sentido colectivo. "Hijos" es la opción natural en español para este tipo de sentencia sapiencial y mantiene la referencia familiar concreta del hebreo.
- source_word: כי בגללו
  english_pob_choice: for because of him
  chosen_spanish: porque por causa de él
  alternatives_spanish:
  - porque a causa de él
  - pues por él
  - porque debido a él
  lexicon: HALOT
  rationale: La cláusula causal subraya que la condición de los hijos se debe al padre. Se mantuvo la relación causal directa con una construcción clara y natural en español.
- source_word: לחרפה
  english_pob_choice: for disgrace
  chosen_spanish: quedan en deshonra
  alternatives_spanish:
  - son para vergüenza
  - quedan en vergüenza
  - son un oprobio
  lexicon: HALOT
  rationale: חרפה tiene el campo semántico de vergüenza, deshonra y oprobio. "Deshonra" expresa bien el resultado social; la forma verbal "quedan en" evita una literalidad extraña y preserva el sentido de estado resultante.
theological_decisions:
- issue: Conservar el peso del hebreo frente al matiz social del griego paralelo
  english_pob_reading: The children of a wicked father are cursed, for because of him they are a disgrace.
  chosen_spanish_reading: Los hijos de un padre malvado son una vergüenza, porque por causa de él quedan en deshonra.
  alternative_spanish_readings:
  - Los hijos de un padre impío son maldecidos, porque por causa de él quedan en deshonra.
  - Los hijos de un padre malvado son reprochados, porque por causa de él quedan en deshonra.
  rationale: 'El hebreo conservado en Sirácides es la base principal, pero el paralelismo griego aporta la idea de reproche/deshonra pública. En vez de armonizarlo todo en una sola lectura, el español mantiene la tensión: no fuerza "maldecidos" en el cuerpo principal, pero sí preserva el resultado social negativo con "deshonra". Así queda abierto el testimonio de ambas tradiciones sin sobretraducir.'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; DOCTRINE.md: preservar tensiones textuales y teológicas relevantes'
translation_notes:
  revision_awareness: La redacción española sigue el hebreo conservado como testigo principal, pero reconoce el paralelo griego y la dificultad de יקוב. Se evitó una calca de "son malditos" porque en español sonaría demasiado tajante o poco natural en este contexto sapiencial; al mismo tiempo, "son una vergüenza" y "quedan en deshonra" preservan el resultado de oprobio que ambos testigos comparten en distinto grado.
  spanish_consistency_notes:
  - Se usó "padre" en singular para reflejar el hebreo, no un genérico pluralizado.
  - '"Deshonra" se eligió para mantener el campo de חרפה sin recurrir a un término eclesiástico arcaizante.'
  - La nota al pie conserva la tensión entre maldición y reproche sin resolverla artificialmente.
  - Se evitó "SEÑOR" u otra sustitución porque el versículo no contiene el nombre divino.
