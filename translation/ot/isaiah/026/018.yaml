id: ISA.26.18
reference: Isaiah 26:18
source:
  edition: WLC
  text: הָרִ֣ינוּ חַ֔לְנוּ כְּמ֖וֹ יָלַ֣דְנוּ ר֑וּחַ יְשׁוּעֹת֙ בַּל נַ֣עֲשֶׂה אֶ֔רֶץ וּ/בַֽל יִפְּל֖וּ יֹשְׁבֵ֥י תֵבֵֽל־־׃
translation:
  text: We were pregnant[a], we writhed in labor; as it were, we gave birth to wind. We accomplished no deliverance in the earth[c][b], and the inhabitants of the world were not born.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we conceived.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'we gave birth to breath' or 'we gave birth to spirit'; the Hebrew word can mean 'wind,' 'breath,' or 'spirit.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'the inhabitants of the world have not come to birth' / 'have not been born.' The verb usually means 'fall,' but some understand it here in keeping with the childbirth imagery.
    reason: alternative_reading
lexical_decisions:
- source_word: הָרִינוּ
  chosen: we were pregnant
  alternatives:
  - we conceived
  lexicon: HALOT
  rationale: Qal perfect 1cp of הרה denotes becoming pregnant/conceiving. 'We were pregnant' fits the sequence with labor and birth imagery in natural English while preserving the metaphor.
- source_word: חַ֔לְנוּ
  chosen: we writhed in labor
  alternatives:
  - we were in labor
  - we travailed
  lexicon: HALOT
  rationale: From חול/חיל in childbirth contexts, the sense is labor pains or writhing. 'Writhed in labor' preserves the intensity without archaic diction.
- source_word: כְּמוֹ
  chosen: as it were
  alternatives:
  - as if
  - like
  lexicon: HALOT
  rationale: Introduces a comparison or qualification. 'As it were' reflects the figurative, almost ironic force before 'we gave birth to wind.'
- source_word: יָלַדְנוּ
  chosen: we gave birth
  alternatives:
  - we bore
  - we delivered
  lexicon: HALOT
  rationale: Standard childbirth verb ילד. 'Gave birth' is the clearest contemporary rendering.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - breath
  - spirit
  lexicon: HALOT
  rationale: In this context of futile childbirth imagery, 'wind' best conveys emptiness/vanity of the result. 'Spirit' would over-theologize the line and is less likely in parallel with failed deliverance.
- source_word: יְשׁוּעֹת
  chosen: deliverance
  alternatives:
  - salvation
  - victories
  lexicon: HALOT
  rationale: Plural noun from ישׁע can denote acts of deliverance/victories. Here the corporate lament concerns failure to bring about saving intervention in the land. Singular collective 'deliverance' reads naturally in English while preserving the sense.
- source_word: בַּל
  chosen: no / not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Poetic negation. Rendered idiomatically with English negation in each clause.
- source_word: נַעֲשֶׂה אֶרֶץ
  chosen: we have accomplished no deliverance in the earth
  alternatives:
  - we have not wrought deliverance for the land
  - we have not brought salvation to the earth
  lexicon: HALOT
  rationale: עשה with abstract object can mean accomplish/bring about. אֶרֶץ may mean land or earth; here 'earth' fits the following תבל ('world') and preserves the broader scope of the parallelism.
- source_word: יִפְּלוּ
  chosen: have not fallen
  alternatives:
  - have not come to birth
  - have not been born
  lexicon: HALOT
  rationale: The normal sense of נפל is 'fall.' In context some take it idiomatically of being born, but the more straightforward lexical sense is retained in the main text. The alternative is preserved in a footnote because the imagery of childbirth in the verse makes that interpretation plausible.
- source_word: יֹשְׁבֵי תֵבֵל
  chosen: the inhabitants of the world
  alternatives:
  - those who dwell in the world
  lexicon: HALOT
  rationale: A standard expression for the world's inhabitants. 'World' for תבל distinguishes it slightly from אֶרֶץ while preserving poetic parallelism.
