base_translation:
  language: en
  yaml_path: translation/ot/2_kings/018/017.yaml
  text: Then the king of Assyria sent the Tartan[a], the Rab-saris, and the Rab-shakeh from Lachish to King Hezekiah at Jerusalem with a great army. They went up and came to Jerusalem; they went up and came and stood by the conduit of the upper pool[c][b], which is on the highway of the washer’s field.
  footnotes:
  - marker: a
    text: The titles 'Tartan,' 'Rab-saris,' and 'Rab-shakeh' are likely Assyrian official titles rather than personal names; possible functional renderings include 'commander-in-chief,' 'chief official/eunuch,' and 'chief cupbearer' or another high officer.
    reason: cultural_note
  - marker: b
    text: Or 'with a great army' / 'with a large military force.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'the fuller’s field.'
    reason: lexical_alternative
