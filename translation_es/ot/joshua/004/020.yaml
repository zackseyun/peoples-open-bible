revisions:
- from: Y Josué erigió estas doce piedras en Gilgal, las cuales habían tomado del Jordán.
  to: Y Josué levantó estas doce piedras en Gilgal, que habían tomado del Jordán.
  rationale: Se ajusta הֵקִים a «levantó», que refleja mejor la acción de poner en pie las piedras memoriales sin el matiz excesivamente monumental de «erigió». También se simplifica «las cuales» a «que» para un español más natural y ampliamente legible, manteniendo intacto el sentido del hebreo y del POB inglés.
