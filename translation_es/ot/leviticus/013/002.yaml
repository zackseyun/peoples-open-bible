base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/002.yaml
  text: When a man has on the skin of his body a swelling[a], or a scab, or a bright spot, and it becomes on the skin of his body an infection of leprosy, then he shall be brought to Aaron the priest, or to one of his sons the priests.
  footnotes:
  - marker: a
    text: Traditionally, 'an infection of leprosy' or 'a leprous disease.' The Hebrew צָרָעַת refers more broadly to a category of skin affliction and should not be equated automatically with modern Hansen's disease.
    reason: alternative_reading
