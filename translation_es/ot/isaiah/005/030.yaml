translation:
  language: es
  text: Y rugirá sobre él en aquel día como el rugido del mar[a]; y si uno mira a la tierra[b], he aquí, oscuridad y angustia[c], y la luz se oscurece en sus nubes[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «contra él» o «sobre eso»; el sufijo hebreo es masculino singular y el referente puede entenderse como una persona, un pueblo personificado, la tierra o un blanco de juicio, según el contexto inmediato.
    reason: alternative_reading
  - marker: b
    text: 'También: «al país» o «a la tierra». El hebreo אֶרֶץ puede significar «tierra», «país» o «suelo» según el contexto.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «aflicción» o «aprieto». צַר transmite la idea de opresión, estrechez o calamidad.'
    reason: lexical_alternative
  - marker: d
    text: 'También: «en sus densas nubes» o «en sus nubarrones». La frase final es difícil y puede referirse a las nubes oscuras que ocultan la luz.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיִנְהֹם
  english_pob_choice: he will roar
  chosen_spanish: rugirá
  alternatives_spanish:
  - rugirá
  - bramará
  - gruñirá
  lexicon: HALOT
  rationale: El verbo נהם expresa un sonido fuerte y amenazante, de rugido o bramido. «Rugirá» conserva el valor auditivo y el tono de juicio sin sonar forzado en español.
- source_word: עָלָיו
  english_pob_choice: over it
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - sobre ello
  - contra ello
  lexicon: HALOT
  rationale: El hebreo על con sufijo 3ms puede leerse como «sobre/contra él/ello». Dado el contexto de amenaza judicial y el uso posible de un referente personificado, «contra él» preserva la dirección hostil del rugido sin fijar indebidamente un referente neutro.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Es el idiomatismo temporal profético estándar. «En aquel día» es natural en español bíblico y mantiene la referencia deíctica.
- source_word: כְּנַהֲמַת יָם
  english_pob_choice: like the roaring of the sea
  chosen_spanish: como ruge el mar
  alternatives_spanish:
  - como el rugir del mar
  - como el bramido del mar
  lexicon: HALOT
  rationale: La comparación describe el sonido del mar. «Como ruge el mar» reproduce la imagen auditiva con fluidez; aunque no calca el sustantivo abstracto, sí conserva el paralelismo y el efecto poético.
- source_word: וְנִבַּט לָאָרֶץ
  english_pob_choice: and if one looks to the land
  chosen_spanish: y si uno mira a la tierra
  alternatives_spanish:
  - y si se mira a la tierra
  - y si uno mira al país
  - y si se mira al país
  lexicon: HALOT
  rationale: La forma impersonal puede entenderse como observación general. «Si uno mira» comunica bien la idea de contemplar la escena devastada. «Tierra» mantiene el posible alcance de אֶרֶץ sin forzar «país».
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza deíctica y la sorpresa profética de וְהִנֵּה en un registro bíblico claro.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - noche
  lexicon: HALOT
  rationale: «Oscuridad» es una traducción directa y natural del sustantivo para darkness. Se evita «tinieblas» por sonar más tradicional de lo necesario aquí.
- source_word: צַר
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - aprieto
  - distress
  lexicon: HALOT
  rationale: La idea central es constricción, opresión o calamidad. «Angustia» expresa bien esa presión sufriente en español y mantiene la cercanía semántica con el campo de «distress/trouble».
- source_word: וָאוֹר חָשַׁךְ
  english_pob_choice: and the light is darkened
  chosen_spanish: y la luz se oscurece
  alternatives_spanish:
  - y la luz se ha oscurecido
  - y la luz queda oscurecida
  lexicon: HALOT
  rationale: El hebreo expresa el oscurecimiento de la luz. «Se oscurece» comunica el resultado de manera natural y poética; el inglés POB eligió una pasiva/resultativa, pero en español la forma media funciona bien sin perder el sentido.
- source_word: בַּעֲרִיפֶיהָ
  english_pob_choice: in its clouds
  chosen_spanish: en sus nubes
  alternatives_spanish:
  - en sus nubarrones
  - en sus densas nubes
  lexicon: HALOT
  rationale: El término apunta a masas de nubes, probablemente densas o de tormenta. «En sus nubes» sigue de cerca la lectura del POB y preserva la ambigüedad poética sin añadir especificación excesiva.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «by its clouds» a «in its clouds» para reflejar más directamente la preposición hebrea y mantener el sentido formal. La redacción española sigue esa decisión con «en sus nubes», conservando la ambigüedad del final difícil y el tono poético del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto hebreo lo exige explícitamente; aquí no aparece.
  - Se traduce נהם con un verbo de sonido fuerte («rugirá») para conservar la imagen auditiva de juicio.
  - Se usa «tierra» para אֶרֶץ, dejando abierta la posibilidad de «país» en nota.
  - Se conserva la secuencia poética de oscuridad + angustia + oscurecimiento de la luz.
  - La fórmula deíctica «he aquí» respeta el giro profético del hebreo.
  - El cierre «en sus nubes» preserva la dificultad textual sin resolverla de manera interpretativa excesiva.
