translation:
  language: es
  text: El que arruina a su padre y ahuyenta a su madre es un hijo que causa vergüenza y reproche[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que despoja a su padre y hace huir a su madre es un hijo que avergüenza y causa oprobio»'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשַׁדֶּד
  english_pob_choice: devastates
  chosen_spanish: arruina
  alternatives_spanish:
  - devasta
  - despoja
  - arrasa
  lexicon: HALOT
  rationale: El participio de שׁדד expresa despojo/ruina violenta. En español, «arruina» comunica destrucción grave del padre sin restringirlo solo a robo material, y suena natural en un proverbio.
- source_word: אָב
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre
  - a su padre
  lexicon: HALOT
  rationale: El contexto relacional permite el posesivo implícito en español. «Su padre» mantiene la referencia personal y la fluidez proverbial.
- source_word: יַבְרִיחַ
  english_pob_choice: drives away
  chosen_spanish: ahuyenta
  alternatives_spanish:
  - expulsa
  - hace huir
  - echa
  lexicon: HALOT
  rationale: 'El hifil de ברח es causativo: hace huir o aleja. «Ahuyenta» preserva ese valor causativo y es idiomático en español.'
- source_word: אֵם
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre
  - a su madre
  lexicon: HALOT
  rationale: Como con «su padre», el posesivo se sobreentiende y se expresa naturalmente en español para conservar el paralelismo.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - hijo
  - tal hijo
  lexicon: HALOT
  rationale: El sustantivo funciona predicativamente, describiendo al sujeto de manera proverbial. «Un hijo» conserva ese valor clasificatorio.
- source_word: מֵבִישׁ
  english_pob_choice: who brings shame
  chosen_spanish: que avergüenza
  alternatives_spanish:
  - que causa vergüenza
  - que trae vergüenza
  - vergonzoso
  lexicon: HALOT
  rationale: El hifil de בוש expresa causar vergüenza. «Que avergüenza» mantiene la fuerza activa y causativa de manera concisa.
- source_word: וּמַחְפִּיר
  english_pob_choice: and reproach
  chosen_spanish: y acarrea oprobio
  alternatives_spanish:
  - y reproche
  - y humillación
  - y deshonra
  lexicon: HALOT
  rationale: La forma paralela intensifica el segundo término de la vergüenza. «Oprobio» refleja bien el matiz de reproche/deshonra, y «acarrea» conserva el sentido activo de producirlo.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «disgrace» a «reproach» para reflejar mejor el término final hebreo y mantener un registro formal. La versión española conserva esa tensión con «oprobio» y ofrece en nota la alternativa «reproche», además de mantener la opción verbal «acarrea» para reflejar la causalidad del último participio.
  spanish_consistency_notes:
  - Se mantiene «hijo» y no una paráfrasis más amplia, porque el hebreo usa בֵּן de modo proverbial/predicativo.
  - Se eligió «ahuyenta» en vez de «expulsa» para preservar la idea causativa de hacer huir, sin perder naturalidad.
  - «Oprobio» recoge mejor la pareja semántica con «vergüenza» que una simple repetición de «deshonra».
  - 'La nota conserva la alternativa léxica principal del POB inglés: «despoja» / «hace huir» / «causa vergüenza y reproche».'
