translation:
  language: es
  text: 'Y le dijo a su hija: «Honra a tus suegros; ahora ellos son tus padres. ¡Ojalá pueda oír un buen informe acerca de ti!». Y la besó. Y Edna dijo a Tobías: «Hermano amado, que el Señor del cielo te restaure, y que me conceda ver hijos tuyos y de Sara, mi hija, para que me alegre delante del Señor. Y mira, te encomiendo a mi hija como un depósito[a]; no la entristezcas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «te encomiendo a mi hija en confianza». El griego dice literalmente: «te encomiendo a mi hija como un depósito», usando la imagen de algo confiado al cuidado de otro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίμα
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Respeta
  - Ten en honor
  lexicon: LSJ
  rationale: τιμάω expresa dar honor o trato debido; «honra» conserva mejor el peso moral y relacional que un simple «respeta».
- source_word: τοὺς πενθερούς σου
  english_pob_choice: your parents-in-law
  chosen_spanish: tus suegros
  alternatives_spanish:
  - tus parientes políticos
  - tu suegro y tu suegra
  lexicon: LSJ
  rationale: El plural refiere colectivamente a los padres del cónyuge; «suegros» es natural en español y conserva la referencia precisa.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: padres
  alternatives_spanish:
  - progenitores
  - padre y madre
  lexicon: LSJ
  rationale: El plural griego es colectivo y significa simplemente «padres»; en español es la opción más directa y clara.
- source_word: ἀκούσαιμί σου ἀκοὴν καλήν
  english_pob_choice: May I hear a good report of you
  chosen_spanish: ¡Ojalá pueda oír una buena noticia de ti!
  alternatives_spanish:
  - ¡Ojalá oiga buenas noticias acerca de ti!
  - ¡Ojalá reciba un buen informe sobre ti!
  lexicon: LSJ
  rationale: La expresión idiomática pide oír bien de alguien; «buena noticia de ti» comunica de modo natural ese deseo de buen testimonio/reputación sin perder la fuerza del giro.
- source_word: ἀδελφὲ ἀγαπητέ
  english_pob_choice: Beloved brother
  chosen_spanish: Hermano amado
  alternatives_spanish:
  - Querido hermano
  - Hermano querido
  lexicon: LSJ
  rationale: Mantiene el tono afectuoso del vocativo y preserva el paralelismo de los dos términos griegos sin sonar artificial.
- source_word: ἀποκαταστήσει σε
  english_pob_choice: restore you
  chosen_spanish: te restaure
  alternatives_spanish:
  - te haga volver sano y salvo
  - te restablezca
  lexicon: LSJ
  rationale: El verbo puede abarcar restaurar y también hacer regresar con bienestar; «te restaure» sigue de cerca el griego y deja abierta esa amplitud.
- source_word: ὁ κύριος τοῦ οὐρανοῦ
  english_pob_choice: the Lord of heaven
  chosen_spanish: el Señor del cielo
  alternatives_spanish:
  - el Señor celestial
  - el Dueño del cielo
  lexicon: LSJ
  rationale: Se conserva el título reverente y, por política del proyecto, κύριος se vierte como «Señor».
- source_word: δῴη μοι ἰδεῖν σου παιδία ἐκ Σάρρας τῆς θυγατρός μου
  english_pob_choice: may he grant me to see children by you and by Sarah my daughter
  chosen_spanish: que me conceda ver hijos tuyos y de Sara, mi hija
  alternatives_spanish:
  - que me conceda ver tus hijos de Sara, mi hija
  - que me conceda ver descendencia tuya y de Sara, mi hija
  lexicon: LSJ
  rationale: El griego expresa la descendencia surgida de esa unión; «hijos tuyos y de Sara» mantiene la bilateralidad y suena natural en español.
- source_word: ἵνα εὐφρανθῶ ἐνώπιον τοῦ κυρίου
  english_pob_choice: so that I may rejoice before the Lord
  chosen_spanish: para que me alegre delante del Señor
  alternatives_spanish:
  - para que me regocije ante el Señor
  - para que me goce en la presencia del Señor
  lexicon: LSJ
  rationale: εὐφραίνω aquí tiene el sentido de alegrarse o regocijarse; «me alegre» es claro y respetuoso en español, y «delante del Señor» conserva la orientación cultual.
- source_word: παρατίθεμαί σοι
  english_pob_choice: I entrust my daughter to you
  chosen_spanish: te encomiendo a mi hija
  alternatives_spanish:
  - te confío a mi hija
  - pongo a mi hija en tu custodia
  lexicon: LSJ
  rationale: El verbo medio expresa poner algo bajo la guarda de otro; «encomiendo» comunica bien esa entrega personal y formal.
- source_word: ἐν παρακαταθήκῃ
  english_pob_choice: as a trust
  chosen_spanish: como un depósito[a]
  alternatives_spanish:
  - como una encomienda
  - en depósito
  lexicon: LSJ
  rationale: La imagen jurídica es de algo confiado en custodia; «depósito» conserva la literalidad del término griego y la tensión legal de la frase.
- source_word: μὴ λυπήσῃς αὐτήν
  english_pob_choice: do not grieve her
  chosen_spanish: no la causes tristeza
  alternatives_spanish:
  - no la entristezcas
  - no la afligas
  lexicon: LSJ
  rationale: λυπέω puede significar causar dolor o tristeza; «no la causes tristeza» mantiene el valor causativo y suena natural en español.
theological_decisions:
- issue: Renderización de κύριος en el título divino
  english_pob_reading: the Lord of heaven
  chosen_spanish_reading: el Señor del cielo
  alternative_spanish_readings:
  - el SEÑOR del cielo
  - el Dueño del cielo
  rationale: 'Se sigue la norma del proyecto para κύριος: «Señor». El título es claramente divino y la formulación conserva reverencia y consistencia terminológica.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión inglés: se prefirió una forma más literal y formal para παρακαταθήκῃ, se mantuvo el valor abierto de ἀποκαταστήσει como restauración, y se evitó una paráfrasis excesiva en la cláusula sobre los hijos y la alegría delante del Señor.'
  spanish_consistency_notes:
  - Se conservó «Señor» para κύριος, en línea con la terminología del proyecto.
  - «Suegros» y «padres» reproducen adecuadamente los colectivos griegos sin forzar una desdoblación innecesaria.
  - El vocativo y las fórmulas de bendición mantienen un registro bíblico digno, pero en español natural.
  - La nota al pie se ancla en «depósito» porque allí está la principal tensión lexical del griego.
