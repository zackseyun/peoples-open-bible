  text: For your obedience has reached everyone. Therefore I rejoice over you, but I want you to be wise in what is good, and innocent in what is evil.
translation:
  language: ko
  text: 여러분의 순종이 모든 사람에게 알려졌기 때문입니다. 그러므로 나는 여러분에 관해 기뻐합니다. 다만 여러분이 선한 것에 대해서는 지혜롭고, 악한 것에 대해서는 순결하기를 원합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡ ὑμῶν ὑπακοὴ εἰς πάντας ἀφίκετο
  english_pob_choice: your obedience has reached everyone
  chosen_korean: 여러분의 순종이 모든 사람에게 알려지다
  alternatives_korean:
  - 여러분의 순종이 모든 이에게 이르다
  lexicon: BDAG
  rationale: ἀφικνέομαι의 「이르다·도달하다」를 한국어 자연스러움을 위해 「알려지다」로.
- source_word: ἐφ’ ὑμῖν χαίρω
  english_pob_choice: I rejoice over you
  chosen_korean: 여러분에 관해 기뻐하다
  lexicon: BDAG
  rationale: ἐπί + 여격의 근거.
- source_word: σοφοὺς εἰς τὸ ἀγαθόν
  english_pob_choice: wise in what is good
  chosen_korean: 선한 것에 대해서는 지혜롭다
  lexicon: BDAG
  rationale: 직역. εἰς의 영역.
- source_word: ἀκεραίους εἰς τὸ κακόν
  english_pob_choice: innocent in what is evil
  chosen_korean: 악한 것에 대해서는 순결하다
  alternatives_korean:
  - 악에 대해 섞임이 없다
  - 악에 대해 순수하다
  lexicon: BDAG
  rationale: ἀκέραιος는 「섞이지 않은·순수한」. 「순결하다」가 자연스럽다.
