translation:
  language: es
  text: 'Los que acampan junto a este[a]: la tribu de Asher, y el líder de los hijos de Asher, Pagiel hijo de Ocrán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su lado». La preposición hebrea puede denotar ubicación adyacente en la disposición del campamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹנִים
  english_pob_choice: Those camping
  chosen_spanish: Los que acampan
  alternatives_spanish:
  - Los acampados
  - Los que están acampados
  lexicon: HALOT
  rationale: El participio de חנה expresa a los que están en posición de campamento. En español, «Los que acampan» conserva el valor participial y suena natural y legible.
- source_word: עָלָיו
  english_pob_choice: next to it
  chosen_spanish: junto a él
  alternatives_spanish:
  - al lado de él
  - junto a ella
  - al lado de ello
  lexicon: HALOT
  rationale: En el contexto del orden del campamento, עַל con sufijo pronominal indica proximidad o ubicación adyacente. «Junto a él» reproduce esa relación espacial sin imponer un matiz de superioridad física como «sobre».
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - cetro
  lexicon: HALOT
  rationale: En contextos de censo y disposición campamental, מַטֶּה designa la división tribal. «Tribu» es el equivalente establecido y exacto en español.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - príncipe
  lexicon: HALOT
  rationale: Aquí נָשִׂיא nombra al cabeza reconocido del grupo tribal. «Jefe» comunica la función de cabeza o representante sin introducir la connotación monárquica que puede tener «príncipe».
- source_word: לִבְנֵי אָשֵׁר
  english_pob_choice: of the sons of Asher
  chosen_spanish: de los hijos de Asher
  alternatives_spanish:
  - de los descendientes de Asher
  - para los hijos de Asher
  - del pueblo de Asher
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo «hijos de Asher» porque el texto nombra la unidad tribal/clánica. «De los hijos de Asher» sigue de cerca la estructura del original y mantiene la referencia genealógica.
- source_word: פַּגְעִיאֵל
  english_pob_choice: Pagiel
  chosen_spanish: Pagiel
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de manera estándar.
- source_word: בֶּן עָכְרָן
  english_pob_choice: son of Ocran
  chosen_spanish: hijo de Ocrán
  alternatives_spanish:
  - hijo de Ocran
  lexicon: Construcción patronímica estándar
  rationale: La construcción בן se vierte naturalmente como «hijo de». Se mantiene el nombre propio con acento gráfico para la pronunciación española.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría en inglés presentan alto acuerdo; no hay revisiones aplicadas en la base de trabajo. Se respetó la decisión inglesa de tomar עַל con valor locativo de proximidad y de traducir מַטֵּה como «tribu».
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico, pero con sintaxis española natural.
  - Se conserva la referencia tribal «hijos de Asher» como calco transparente del hebreo, coherente con el patrón del libro de Números.
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - No se introdujeron términos doctrinales ajenos al versículo.
