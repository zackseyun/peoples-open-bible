translation:
  language: es
  text: Ella está lejos de los burladores[a], y los hombres de falsedad no se acordarán de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Está lejos del orgullo, y los hombres mentirosos no se acordarán ciertamente de ella». El hebreo dice «burladores» donde el griego tiene «orgullo», probablemente por una Vorlage distinta o por una traducción interpretativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: רְחוֹקָה / μακρὰν ἐστιν
  english_pob_choice: far from
  chosen_spanish: está lejos de
  alternatives_spanish:
  - está distante de
  - está apartada de
  lexicon: HALOT; Swete LXX 1909
  rationale: La idea central es de separación o distancia. «Está lejos de» es natural en español y conserva la metáfora de alejamiento presente en el hebreo y el griego.
- source_word: הִיא
  english_pob_choice: she
  chosen_spanish: Ella
  alternatives_spanish:
  - Eso
  - Está
  lexicon: HALOT
  rationale: El contexto personifica a la Sabiduría como mujer, por lo que «Ella» preserva ese rasgo literario y teológico mejor que una forma impersonal.
- source_word: מִלֵּצִים
  english_pob_choice: scoffers
  chosen_spanish: de los burladores
  alternatives_spanish:
  - de los escarnecedores
  - de los mofadores
  lexicon: HALOT
  rationale: «לֵץ» designa al burlador o escarnecedor arrogante. «Burladores» comunica bien el tono despectivo y es claro para lectores modernos; se prefiere sobre un calco más rígido.
- source_word: וְאַנְשֵׁי כָזָב
  english_pob_choice: men of falsehood
  chosen_spanish: los hombres de mentira
  alternatives_spanish:
  - los hombres falsos
  - los mentirosos
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «hombres de mentira/engaño». «Los hombres de mentira» mantiene visible la idiomática del original y refleja el paralelismo con el griego «hombres mentirosos».
- source_word: לֹא יִזְכְּרוּהָ / οὐ μὴ μνησθήσονται αὐτῆς
  english_pob_choice: will not remember her
  chosen_spanish: no se acordarán de ella
  alternatives_spanish:
  - no la recordarán
  - no la tendrán presente
  lexicon: HALOT; BDAG (μνησθήσονται)
  rationale: El verbo de memoria/rememoración se expresa de forma natural con «acordarse de» en español. Así se conserva el sentido de memoria o reconocimiento, no simplemente de mención verbal.
theological_decisions:
- issue: Personificación femenina de la Sabiduría
  english_pob_reading: The verse continues the personified Wisdom theme, so the pronoun is rendered 'she/her.'
  chosen_spanish_reading: El versículo continúa la personificación de la Sabiduría, por eso se traduce con «Ella» y «de ella».
  alternative_spanish_readings:
  - una lectura impersonal con «eso» o sin pronombre
  - una traducción neutralizada de la Sabiduría
  rationale: La forma femenina no es accidental; forma parte de la textura literaria de Sirácides. Mantener el femenino ayuda a conservar la personificación sin añadir interpretación ajena al texto.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Tensión textual entre hebreo y griego en el sujeto descalificado
  english_pob_reading: Hebrew reads 'scoffers' where the Greek has 'pride,' likely reflecting a different Vorlage or interpretive rendering.
  chosen_spanish_reading: Se conserva «burladores» en el texto principal, siguiendo el hebreo, y se reconoce la variante griega en nota.
  alternative_spanish_readings:
  - «orgullo» siguiendo el griego
  - «arrogancia» como síntesis interpretativa
  rationale: El testimonio hebreo está claramente atestiguado y es el que el POB inglés sigue en el cuerpo del texto. La referencia griega se preserva como variante relevante para no borrar la tensión documental.
  doctrine_reference: Principios POB sobre transparencia textual y prioridad del testimonio base con variantes auditables
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo de Kahana como base principal, con el paralelo griego de Swete registrado en la nota para la divergencia entre «burladores» y «orgullo». No se requieren revisiones adicionales respecto del pasaje auditado.
  spanish_consistency_notes:
  - Se mantiene «Sabiduría» implícita por el contexto, sin introducirla en el versículo para no sobreespecificar.
  - Se usa «Ella» para conservar la personificación femenina del hebreo.
  - «Hombres» se conserva como masculino plural por fidelidad al sustantivo hebreo אַנְשֵׁי y al paralelo griego ἄνδρες.
  - La nota al pie usa una formulación breve pero suficiente para documentar la variante griega sin desplazar el texto base hebreo.
