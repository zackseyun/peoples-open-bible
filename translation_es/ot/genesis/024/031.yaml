review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: invitación a entrar, vocativo de bendición con el nombre divino, pregunta por permanecer afuera, y preparación de la casa y espacio para los camellos. Sin embargo, «¿Por qué te quedas fuera?» atenúa el matiz de עמד ‘estar de pie/parado’ y del inglés auditado «stand outside».'
  spanish_quality_summary: El español es claro y natural, con buen registro narrativo y uso correcto de «Yahvé». No obstante, «te quedas fuera» desplaza el enfoque de postura/presencia a permanencia voluntaria; «estás ahí afuera» sería más coloquial, pero «estás/parado afuera» o «estás fuera» no refleja tan bien el verbo. Una reparación mínima y más fiel es «¿Por qué estás de pie afuera?» o «¿Por qué sigues de pie afuera?». También conviene evitar añadir «ya», que no está exigido por el hebreo.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה → «Yahvé»; no hay conflictos con otros términos doctrinales. La nota léxica para «bendito de Yahvé» preserva adecuadamente las alternativas documentadas.'
  issues:
  - severity: medium
    issue: «te quedas fuera» para לָמָּה תַעֲמֹד בַּחוּץ
    rationale: עמד + בחוץ significa más directamente «estar de pie afuera / permanecer afuera», no tanto «quedarse fuera» con matiz de decisión o permanencia. La revisión debe acercarse más al sentido postural/presencial del hebreo y del inglés auditado.
  - severity: low
    issue: Adición de «ya» en «Yo ya he preparado»
    rationale: El hebreo expresa la acción completada por contexto y forma verbal, pero «ya» añade un matiz aspectual no necesario. Puede omitirse para mayor sobriedad y cercanía al original.
  revised_spanish_text: 'Y le dijo[a]: «Entra, bendito de Yahvé. ¿Por qué estás de pie afuera? Yo he preparado la casa y un lugar para los camellos».'
  revised_footnotes:
  - marker: a
    text: O «bendito por Yahvé» o «oh bendito de Yahvé».
    reason: lexical_alternative
  revision_rationale: Se conserva todo lo acertado del borrador, pero se corrige «te quedas fuera» a «estás de pie afuera» para reflejar mejor עמד y el audit trail inglés «stand outside». También se elimina «ya» por no estar exigido por el hebreo. No se requiere adjudicación adicional.
