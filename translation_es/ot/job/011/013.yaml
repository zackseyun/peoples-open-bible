  to: Si preparas tu corazón y extiendes tus manos a él,[a]
  rationale: Se hace una reparación mínima para alinear mejor אֵלָיו con «a él», que en español conserva con más precisión la dirección personal del hebreo y del audit trail inglés. Se mantiene el resto del borrador, incluida la nota sobre el singular hebreo de «mano/palma», porque refleja bien la evidencia fuente y su racional léxico.
