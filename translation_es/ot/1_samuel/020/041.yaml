revisions:
- from: Cuando llegó el muchacho[a], David se levantó de junto al lado sur y cayó rostro en tierra; y se inclinó tres veces. Entonces se besaron el uno al otro y lloraron el uno con el otro[b], hasta que David lloró más.
  to: Cuando llegó el muchacho[a], David se levantó de junto al sur y cayó con el rostro en tierra, y se inclinó tres veces. Entonces se besaron el uno al otro y lloraron juntos[b], hasta que David lloró más.
  rationale: Se ajustó la frase locativa difícil para un español más natural sin ocultar la incertidumbre del hebreo, trasladando la complejidad principal a la nota. Se reemplazó el recíproco torpe «lloraron el uno con el otro» por «lloraron juntos», que comunica claramente la acción mutua en español. También se suavizó «cayó rostro en tierra» a «cayó con el rostro en tierra» para mayor claridad y legibilidad moderna.
