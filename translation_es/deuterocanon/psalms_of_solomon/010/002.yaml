translation:
  language: es
  text: El que prepara su espalda para los azotes[a][b] será limpiado[c], porque el Señor es bueno con los que soportan la disciplina[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Azotes» conserva la repetición de μάστιξ con el verso anterior.
    reason: lexical_consistency
  - marker: b
    text: 'Otra posibilidad: «para los flagelos» o «para los golpes de castigo».'
    reason: lexical_alternative
  - marker: c
    text: O «será purificado».
    reason: lexical_alternative
  - marker: d
    text: O «la corrección» o «el castigo correctivo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἑτοιμάζων
  english_pob_choice: The one who prepares
  chosen_spanish: El que prepara
  alternatives_spanish:
  - el que se prepara
  - quien prepara
  - el que se dispone
  lexicon: BDAG
  rationale: El participio articular griego funciona de manera genérica. «El que prepara» conserva esa fuerza sin volverlo demasiado libre en español.
- source_word: νῶτον
  english_pob_choice: his back
  chosen_spanish: su espalda
  alternatives_spanish:
  - su dorso
  - la espalda de él
  lexicon: LSJ
  rationale: «Espalda» es el equivalente natural y claro en español para νῶτον. Se evita una construcción posesiva explícita redundante en español.
- source_word: εἰς μάστιγας
  english_pob_choice: for scourges
  chosen_spanish: para los azotes
  alternatives_spanish:
  - para los escarnios
  - para los flagelos
  - para los azotes de castigo
  lexicon: LSJ
  rationale: Se mantiene la imagen de castigo físico y la conexión léxica con μάστιξ/«azotes», siguiendo la revisión que favorece la consistencia con 10:1.
- source_word: καθαρισθήσεται
  english_pob_choice: will be cleansed
  chosen_spanish: será purificado
  alternatives_spanish:
  - será limpiado
  - será очищado
  - será hecho limpio
  lexicon: BDAG
  rationale: «Purificado» conserva el sentido de limpieza moral/correctiva y deja abierta la tensión entre purificación y limpieza, tal como lo hace el inglés auditable.
- source_word: χρηστὸς
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - benigno
  - amable
  - bondadoso
  lexicon: BDAG
  rationale: «Bueno» es la forma más directa y natural en un predicado sobre el carácter del Señor, sin cargarlo innecesariamente con matices afectivos.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Soberano
  lexicon: BDAG
  rationale: Se conserva el equivalente tradicional y funcional de κύριος en español bíblico, necesario aquí para el reconocimiento inmediato del título divino.
- source_word: τοῖς ὑπομένουσιν
  english_pob_choice: to those who endure
  chosen_spanish: para con los que soportan
  alternatives_spanish:
  - para con los que perseveran
  - para con los que resisten
  - para con los que permanecen firmes
  lexicon: BDAG
  rationale: «Soportan» reproduce la idea de aguantar bajo presión o corrección. La locución «para con» refleja naturalmente el dativo de beneficio/relación.
- source_word: παιδείαν
  english_pob_choice: discipline
  chosen_spanish: la disciplina
  alternatives_spanish:
  - la corrección
  - el castigo correctivo
  - la instrucción
  lexicon: BDAG
  rationale: «Disciplina» expresa el sentido de formación correctiva más que mera instrucción. En español mantiene la tensión entre corrección y entrenamiento moral.
theological_decisions:
- issue: Resultado moral de la corrección aceptada
  english_pob_reading: The verse speaks of moral or corrective cleansing resulting from willingly accepted discipline.
  chosen_spanish_reading: El versículo presenta una purificación que resulta de aceptar y soportar la disciplina.
  alternative_spanish_readings:
  - El versículo puede leerse como purificación ritual.
  - El versículo puede leerse como vindicación por el sufrimiento.
  rationale: «Será purificado» y «los que soportan la disciplina» preservan la idea de una limpieza moral/correctiva sin cerrar la imagen a un uso ritual o forense más estrecho.
  doctrine_reference: Santificación / corrección divina
- issue: Relación entre azotes y disciplina
  english_pob_reading: Lexical continuity with the previous verse and the corrective force of μάστιξ/παιδεία.
  chosen_spanish_reading: Se mantiene la continuidad entre «azotes» y «disciplina» como lenguaje de corrección divina.
  alternative_spanish_readings:
  - Se podría suavizar con «castigos» o «reprensión».
  - Se podría interpretar solo como metáfora de sufrimiento.
  rationale: La continuidad léxica ayuda a no perder la conexión temática con el verso anterior y respeta la carga correctiva del pasaje.
  doctrine_reference: Disciplina divina / corrección
- issue: Title for κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el texto griego usa κύριος sin una cita explícita del Tetragrámaton en el pasaje inmediato. «Señor» preserva el registro del texto griego y la formulación tradicional del título divino.
  doctrine_reference: Cristología / lenguaje reverencial
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió la traducción de μάστιγας desde «whips» a «scourges» para preservar la continuidad léxica con 10:1. En español, se reflejó esa decisión con «azotes» y se mantuvo la relación con «disciplina» para no perder el enlace temático de corrección divina.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al patrón del proyecto para el griego.
  - Se eligió «azotes» para μάστιγας por consistencia léxica con el verso anterior y por naturalidad en español.
  - «Purificado» mantiene abierta la tensión entre limpieza moral y purificación ritual, como en el inglés auditado.
  - Se conservó un registro bíblico sobrio y publicable, sin calco excesivamente literal.
