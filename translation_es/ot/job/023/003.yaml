translation:
  language: es
  text: ¡Oh[a], si yo supiera dónde hallarlo, y pudiera llegar hasta su morada!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su lugar». El término hebreo puede denotar un lugar fijo o establecido; «morada» resalta el sentido del lugar donde puede ser hallado.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתֵּן
  english_pob_choice: Oh, that
  chosen_spanish: ¡Oh, quién me diera…!
  alternatives_spanish:
  - ¡Oh, si…!
  - ¡Quién pudiera…!
  lexicon: HALOT
  rationale: La construcción hebrea es optativa y expresa deseo intenso, no una pregunta literal. En español, «¡Oh, quién me diera…!» conserva bien ese tono de anhelo y oración implícita sin volverlo mecánico.
- source_word: יָדַעְתִּי
  english_pob_choice: I knew
  chosen_spanish: saber
  alternatives_spanish:
  - que yo supiera
  - que yo conociera
  lexicon: HALOT
  rationale: 'En esta cláusula de deseo, el valor es el estado buscado: saber dónde está. «Saber» mantiene la naturalidad española y evita forzar una forma verbal que suene menos idiomática en esta construcción optativa.'
- source_word: וְאֶמְצָאֵהוּ
  english_pob_choice: that I might find him
  chosen_spanish: lo encontraría
  alternatives_spanish:
  - que lo encontrara
  - que pudiera hallarlo
  lexicon: HALOT
  rationale: El verbo con prefijo continúa el mismo deseo. «Lo encontraría» dentro de la exclamación expresa la aspiración de hallarlo; el objeto pronominal masculino singular se mantiene por el referente implícito a Dios en el contexto.
- source_word: אָבוֹא
  english_pob_choice: that I might come
  chosen_spanish: poder llegar
  alternatives_spanish:
  - venir
  - llegar
  lexicon: HALOT
  rationale: El hebreo conserva el movimiento hacia un destino. En español, «poder llegar» reproduce con claridad la idea de acceso a ese lugar, sin perder la dirección del verbo de movimiento.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Aquí עַד marca alcance/destino. «Hasta» preserva mejor la idea de llegar al límite o punto señalado que un simple «a».
- source_word: תְּכוּנָתוֹ
  english_pob_choice: his dwelling place
  chosen_spanish: su lugar de morada
  alternatives_spanish:
  - su lugar
  - su morada
  - su lugar establecido
  lexicon: HALOT
  rationale: El sustantivo puede denotar un lugar fijado o establecido. «Lugar de morada» hace visible la dimensión locativa sin imponer una lectura más específica como «trono» o «asiento»; conserva también la alternativa semántica reconocida en la nota inglesa.
theological_decisions:
- issue: Referente implícito del masculino singular
  english_pob_reading: God is the implied referent throughout.
  chosen_spanish_reading: El referente implícito es Dios, por lo que se mantiene el pronombre objeto masculino singular «lo/su» en el contexto.
  alternative_spanish_readings:
  - neutralizar el referente con «allí» o una perífrasis impersonal
  - nombrar explícitamente a Dios
  rationale: El contexto inmediato de Job muestra que el anhelo es presentarse ante Dios. Mantener los pronombres masculinos singulares respeta la deixis del hebreo sin añadir el nombre donde el verso no lo expresa.
  doctrine_reference: Job 23:3; contexto inmediato de Job 23:1-7
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios; la presente redacción española sigue ese mismo estado estable, manteniendo la fuerza optativa del hebreo y la alternativa semántica del sustantivo final sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se preservó el registro optativo-exclamativo de מִי יִתֵּן con una fórmula natural en español.
  - Se eligió «lugar de morada» para reflejar el valor locativo de תְּכוּנָתוֹ sin ocultar la nota alternativa «su lugar».
  - Los pronombres de tercera persona singular se conservaron en minúscula por referirse a Dios en contexto, sin añadir una referencia explícita ausente del verso.
