base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/011/025.yaml
  text: As for the villages in their fields[a], some of the sons of Judah lived in Kiriath-arba and its villages, and in Dibon and its villages[c][b], and in Jekabzeel and its settlements.
  footnotes:
  - marker: a
    text: Kiriath-arba is the older name for Hebron; compare Joshua 14:15.
    reason: cross_reference
  - marker: b
    text: Hebrew 'its daughters,' an idiom for a town's dependent or surrounding villages.
    reason: lexical_alternative
  - marker: c
    text: Jekabzeel is also rendered 'Kabzeel' in some related traditions and passages.
    reason: alternative_reading
