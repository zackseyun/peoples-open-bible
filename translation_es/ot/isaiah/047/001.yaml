revisions:
- from: Desciende y siéntate en el polvo[a], virgen hija de Babilonia; siéntate en la tierra[b], sin trono, hija de los caldeos[c]. Porque ya no te llamarán tierna y delicada.
  to: Desciende y siéntate en el polvo[a], virgen hija de Babilonia[b]; siéntate en el suelo, sin trono[c], hija de los caldeos. Porque ya no te llamarán tierna y delicada[d].
  rationale: La revisión conserva el sentido del hebreo y del POB inglés, pero mejora la naturalidad del español con 'en el suelo', restaura una alternativa importante para 'sin trono', mueve la nota cultural al punto donde comienza la personificación y añade la alternativa léxica para 'tierna y delicada' documentada en el rastro inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:22:22Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura imperativa, la personificación femenina de Babilonia, la pérdida de estatus real ('sin trono') y el cierre impersonal 'te llamarán'. Sin embargo, omite una alternativa importante preservada en el rastro inglés para אֵין כִּסֵּא ('no hay trono' / 'sin trono') y reubica la nota cultural de forma incompleta al no anclar también 'virgen hija de Babilonia', donde la personificación comienza. Además, 'en la tierra' suena menos natural que 'en el suelo' para el lugar inmediato donde sentarse, aunque no es una desviación grave.
  spanish_quality_summary: El español es claro, digno y ampliamente legible. 'Desciende', 'siéntate' y 'sin trono' funcionan bien. La principal mejora estilística es cambiar 'en la tierra' por 'en el suelo', que en este contexto concreto de humillación física suena más natural en español moderno y evita una lectura cosmológica de 'tierra'. También conviene ordenar las notas para que correspondan mejor a los puntos significativos del texto fuente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La personificación femenina se conserva adecuadamente con 'virgen hija de Babilonia' y 'hija de los caldeos'. No aparecen términos sensibles del glosario principal (Yahvé, Mesías, etc.).
  issues:
  - severity: medium
    issue: '''en la tierra'' es menos idiomático que ''en el suelo'' para לָאָרֶץ en este contexto'
    rationale: Con 'siéntate', el hebreo señala el lugar físico rebajado donde debe sentarse. 'En el suelo' comunica mejor la escena de humillación en español natural, mientras que 'en la tierra' puede sonar más amplio o abstracto.
  - severity: medium
    issue: Falta la alternativa de nota para אֵין כִּסֵּא
    rationale: 'El rastro POB preserva explícitamente la ambigüedad/adaptación ''without a throne'' / ''there is no throne'' / ''with no throne''. En español conviene conservar al menos ''O: «no hay trono»'', ya que es una alternativa significativa del hebreo nominal.'
  - severity: low
    issue: La nota cultural está anclada solo en 'hija de los caldeos' y no donde inicia la personificación
    rationale: La personificación afecta tanto 'virgen hija de Babilonia' como 'hija de los caldeos'. Anclar la nota en la primera expresión hace más evidente al lector el recurso poético principal.
  revised_spanish_text: Desciende y siéntate en el polvo[a], virgen hija de Babilonia[b]; siéntate en el suelo, sin trono[c], hija de los caldeos. Porque ya no te llamarán tierna y delicada[d].
  revised_footnotes:
