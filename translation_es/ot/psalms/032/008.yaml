translation:
  language: es
  text: Te instruiré y te enseñaré en el camino por donde debes ir[a][b]; te aconsejaré con mis ojos puestos en ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hablante puede entenderse como Yahvé o como el salmista; el hebreo del versículo no lo identifica explícitamente.
    reason: alternative_reading
  - marker: b
    text: 'O: «en el camino por donde irás», o «en este camino por donde irás». El hebreo permite un matiz más literal de futuro, pero el contexto favorece un sentido de instrucción sobre la senda correcta.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «mi ojo sobre ti». La expresión puede comunicar guía vigilante y cuidado atento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׂכִּילְךָ
  english_pob_choice: I will instruct you
  chosen_spanish: Te instruiré
  alternatives_spanish:
  - Te daré entendimiento
  - Te haré entender
  lexicon: HALOT
  rationale: El verbo causativo de שכל expresa hacer que el destinatario tenga entendimiento o discernimiento. «Instruir» conserva el matiz pedagógico y la relación con el verbo siguiente sin sonar forzado en español.
- source_word: וְאוֹרְךָ
  english_pob_choice: and teach you
  chosen_spanish: y te enseñaré
  alternatives_spanish:
  - y te dirigiré
  - y te mostraré
  lexicon: HALOT
  rationale: El hifil de ירה puede significar enseñar o dirigir. En este contexto de sabiduría y guía, «enseñar» mantiene la idea formativa; la dirección queda expresada por la frase siguiente.
- source_word: בדרך זו תלך
  english_pob_choice: in the way you should go
  chosen_spanish: en el camino por donde debes ir
  alternatives_spanish:
  - en el camino por donde irás
  - en este camino por donde irás
  lexicon: HALOT
  rationale: La expresión hebrea permite un sentido más literal de futuro, pero el contexto de instrucción favorece una lectura de orientación normativa. «Por donde debes ir» preserva esa fuerza sin convertirlo en una paráfrasis amplia.
- source_word: איעצה
  english_pob_choice: I will counsel
  chosen_spanish: te aconsejaré
  alternatives_spanish:
  - te daré consejo
  - te asesoraré
  lexicon: HALOT
  rationale: יעץ expresa dar consejo o aconsejar. «Aconsejar» es natural en español y conserva el tono de guía prudente del texto.
- source_word: עליך עיני
  english_pob_choice: with my eye upon you
  chosen_spanish: con mi ojo sobre ti
  alternatives_spanish:
  - con mi mirada sobre ti
  - teniendo mi ojo sobre ti
  lexicon: HALOT
  rationale: La imagen es literalmente «mi ojo sobre ti». Se conserva la metáfora concreta para no diluir el matiz de vigilancia atenta y cuidado personal.
theological_decisions:
- issue: Identidad del hablante en el versículo
  english_pob_reading: Render the verse straightforwardly in the first person without specifying whether the speaker is the psalmist or the LORD.
  chosen_spanish_reading: Se mantiene la primera persona sin identificar expresamente al hablante.
  alternative_spanish_readings:
  - Lo dirá Yahvé
  - Lo dice David
  rationale: El hebreo del versículo presenta promesas en primera persona pero no identifica de manera explícita al hablante dentro del propio verso. La traducción conserva esa apertura interpretativa en lugar de resolverla en el texto principal.
  doctrine_reference: Preservar la tensión interpretativa del texto fuente.
translation_notes:
  revision_awareness: 'Se siguió el último pase revisado, que indicó ''unchanged: true'' y ''No changes needed''. La redacción española mantiene la equivalencia óptima del audit trail inglés, preserva la ambigüedad del hablante y conserva la metáfora concreta de «mi ojo sobre ti».'
  spanish_consistency_notes:
  - Se usó «Yahvé» en la nota teológica, conforme a la terminología del proyecto, aunque el texto principal no nombra al hablante.
  - Se prefirió «te instruiré / te enseñaré» para reflejar el paralelismo pedagógico del hebreo.
  - Se mantuvo «camino» y «debes ir» para expresar la orientación normativa sin perder la base literal del original.
  - Se conservó la imagen corporal «ojo» en vez de una abstracción como «mirada» en el texto principal.
