translation:
  language: es
  text: De David[a]. Te daré gracias con todo mi corazón; delante de los dioses te cantaré alabanzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de los seres celestiales» o «delante de los ángeles». La palabra hebrea puede referirse a dioses, a Dios o a seres celestiales según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David.
  chosen_spanish: De David.
  alternatives_spanish:
  - Salmo de David.
  - Para David.
  lexicon: לְ + nombre propio
  rationale: La preposición לְ en encabezamientos poéticos puede marcar pertenencia, dedicación o autoría. Como el inglés POB conserva un encabezamiento breve y neutral, «De David» transmite bien la atribución sin añadir una glosa interpretativa innecesaria.
- source_word: אוֹדְךָ
  english_pob_choice: I will give thanks to you
  chosen_spanish: Te daré gracias
  alternatives_spanish:
  - Te agradezco
  - Te alabaré
  lexicon: ידה
  rationale: El verbo expresa agradecimiento confesional y alabanza. «Dar gracias» es la opción española más natural y fiel al valor verbal aquí, manteniendo la segunda persona directa del hebreo.
- source_word: בְכָל לִבִּי
  english_pob_choice: with all my heart
  chosen_spanish: con todo mi corazón
  alternatives_spanish:
  - de todo corazón
  - con todo mi ser
  lexicon: לב
  rationale: El hebreo usa el corazón como centro interior de la persona. «Con todo mi corazón» conserva la imagen y es idiomático en español bíblico actual.
- source_word: אֱלֹהִים
  english_pob_choice: the gods
  chosen_spanish: los dioses
  alternatives_spanish:
  - los seres celestiales
  - los seres divinos
  lexicon: אלהים
  rationale: El contexto inmediato permite la lectura de seres divinos/heavenly beings, y el English POB preserva la ambigüedad con una nota. En el texto principal, «los dioses» reproduce la forma plural del término y deja visible la tensión lexical sin resolverla prematuramente.
- source_word: אֲזַמְּרֶךָּ
  english_pob_choice: I will sing praises to you
  chosen_spanish: cantaré alabanzas a ti
  alternatives_spanish:
  - te cantaré alabanzas
  - te entonaré salmos
  lexicon: זמר
  rationale: El verbo refiere a cantar alabanzas con posible asociación musical. «Cantaré alabanzas a ti» mantiene el sentido y evita una construcción demasiado rígida; la preposición final conserva la dirección de la alabanza aunque suene menos idiomática que una reformulación más libre.
theological_decisions:
- issue: 'Sentido de אֱלֹהִים en el verso: ¿Dios, dioses o seres celestiales?'
  english_pob_reading: before the gods
  chosen_spanish_reading: delante de los dioses
  alternative_spanish_readings:
  - delante de los seres celestiales
  - en presencia de los ángeles
  rationale: El inglés POB mantiene la posibilidad de una referencia a seres divinos/angelicales mediante una nota. En español, «los dioses» conserva la ambigüedad textual del hebreo sin sustituirla por una interpretación devocional más específica.
  doctrine_reference: Psalmic divine-council language; compare Ps 82:1; Ps 89:5-7
- issue: Superscripción y contenido del verso
  english_pob_reading: Of David. I will give thanks to you with all my heart; before the gods I will sing praises to you.
  chosen_spanish_reading: De David. Te daré gracias con todo mi corazón; delante de los dioses cantaré alabanzas a ti.
  alternative_spanish_readings:
  - Salmo de David. Te daré gracias con todo mi corazón; delante de los dioses cantaré alabanzas a ti.
  rationale: La revisión inglesa completó el versículo tras el encabezamiento, por lo que el español debe reflejar tanto la superscripción como el cuerpo del verso. Se conserva la separación entre encabezamiento y texto poético.
  doctrine_reference: Psalm superscriptions in Hebrew canon; editorial completion per source packet
translation_notes:
  revision_awareness: La fuente inglesa revisada completó el versículo, que en el paquete fuente aparecía solo como superscripción más texto omitido. Esta versión española sigue la revisión más reciente e incluye el contenido completo del verso, no solo el encabezamiento.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero no aparece aquí porque el texto hebreo usa אֱלֹהִים, no el Tetragrámaton.
  - Se conserva la distinción entre el encabezamiento «De David» y el contenido poético del verso para reflejar la estructura del hebreo y del audit trail inglés.
  - Se eligió un español sobrio y públicamente legible, evitando reemplazar la ambigüedad de אֱלֹהִים por una interpretación dogmática en el texto principal.
