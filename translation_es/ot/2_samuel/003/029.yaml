translation:
  language: es
  text: Caiga sobre la cabeza de Joab y sobre toda la casa de su padre; y que nunca falte de la casa de Joab quien tenga una secreción, o sea leproso[a], o se apoye en un bastón[b], o caiga a espada, o carezca de pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en un sentido más amplio, “tenga una enfermedad cutánea impura”. El término hebreo tradicionalmente traducido “leproso” puede abarcar varios padecimientos serios de la piel.
    reason: lexical_alternative
  - marker: b
    text: O “sostenga un huso”; algunos entienden la frase como “se apoye en un bastón”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָחֻלוּ
  english_pob_choice: May it fall
  chosen_spanish: Caiga
  alternatives_spanish:
  - Que caiga
  - Caigan
  lexicon: HALOT
  rationale: En el contexto imprecatorio, el verbo expresa que la culpa/juicio recaiga sobre Joab y su casa. El singular verbal en español mantiene la fuerza idiomática de ‘caer sobre’ sin forzar una pluralidad ajena al sentido.
- source_word: עַל רֹאשׁ
  english_pob_choice: on the head of
  chosen_spanish: sobre la cabeza de
  alternatives_spanish:
  - sobre el cabeza de
  - encima de la cabeza de
  lexicon: HALOT
  rationale: Conserva el hebraísmo de responsabilidad o retribución que ‘cabeza’ comunica en español bíblico y moderno.
- source_word: בֵּית אָבִיו
  english_pob_choice: his father’s house
  chosen_spanish: la casa de su padre
  alternatives_spanish:
  - su casa paterna
  - su linaje paterno
  lexicon: HALOT
  rationale: ‘Casa’ preserva el alcance familiar y dinástico del hebreo sin reducirlo solo a vivienda o solo a genealogía.
- source_word: אַל יִכָּרֵת מִבֵּית יוֹאָב
  english_pob_choice: may there never be cut off from the house of Joab
  chosen_spanish: nunca sea cortado de la casa de Joab
  alternatives_spanish:
  - nunca falte en la casa de Joab
  - nunca sea removido de la casa de Joab
  lexicon: HALOT
  rationale: ‘Ser cortado’ reproduce la fórmula verbal de exclusión o desaparición de una línea familiar; ‘nunca’ da cuenta del valor negativo y durativo del hebreo.
- source_word: זָב
  english_pob_choice: one who has a discharge
  chosen_spanish: quien tenga una secreción
  alternatives_spanish:
  - quien padezca una descarga
  - quien tenga un flujo
  lexicon: HALOT
  rationale: ‘Secreción’ comunica el sentido físico sin introducir tecnicismos obsoletos; conserva la referencia a una impureza corporal persistente.
- source_word: מְצֹרָע
  english_pob_choice: is leprous
  chosen_spanish: sea leproso
  alternatives_spanish:
  - tenga lepra
  - padezca una enfermedad de la piel impura
  lexicon: HALOT
  rationale: Se mantiene el término tradicional y reconocible en español, que corresponde al POB inglés, sin ocultar en el texto principal la amplitud posible del hebreo.
- source_word: מַחֲזִיק בַּפֶּלֶךְ
  english_pob_choice: holds a staff
  chosen_spanish: se apoye en un bastón
  alternatives_spanish:
  - sostenga un bastón
  - tome un bastón
  - agarre un huso
  lexicon: HALOT
  rationale: La revisión inglesa optó por ‘staff’ para reflejar mejor la frase; en español, ‘apoyarse en un bastón’ recoge esa imagen de apoyo/incapacidad de forma natural. Se preserva la alternativa concreta de ‘huso’ en nota por la tradición textual y la ambigüedad del término.
- source_word: נֹפֵל בַּחֶרֶב
  english_pob_choice: falls by the sword
  chosen_spanish: caiga a espada
  alternatives_spanish:
  - caiga por la espada
  - perezca a espada
  - muera a espada
  lexicon: HALOT
  rationale: ‘Caer a espada’ conserva el giro semítico y el tono solemne de la lista de maldiciones, alineado con la fuerza del original.
- source_word: חֲסַר לָחֶם
  english_pob_choice: lacks bread
  chosen_spanish: carezca de pan
  alternatives_spanish:
  - falte de pan
  - no tenga pan
  - carezca de alimento
  lexicon: HALOT
  rationale: ‘Pan’ mantiene la metonimia hebrea de sustento básico. ‘Carezca de’ suena más formal y preserva el paralelo con los demás miembros de la serie.
theological_decisions:
- issue: Naturaleza de la declaración de David
  english_pob_reading: An imprecatory wish/curse directed against Joab's house
  chosen_spanish_reading: Una imprecación o maldición dirigida contra la casa de Joab
  alternative_spanish_readings:
  - Una predicción de lo que sucederá a la casa de Joab
  - Una simple declaración judicial
  rationale: La serie de formas volitivas del hebreo, reflejada por ‘caiga’ y ‘nunca sea cortado’, pide en español una lectura de imprecación, no una narración neutra del futuro. Eso conserva la intención judicial y maldicienta del pasaje.
  doctrine_reference: Salmo 69; Romanos 12:19 (marco de juicio y retribución, no de exhortación ética al lector)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que ajustó la frase final de un ‘spindle’ a ‘staff’ por considerarse una mejor representación del hebreo פֶּלֶךְ en contexto. Aun así, el testimonio auditado conserva la alternativa de ‘huso’ como lectura posible, por lo que el español principal adopta ‘bastón’ y la nota registra la variante.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - ‘Casa de Joab’ conserva la estructura familiar/dinástica del hebreo.
  - 'La lista final se traduce con paralelismo verbal uniforme: caiga / sea cortado / tenga / sea / se apoye / caiga / carezca.'
  - No se suaviza la imprecación para evitar perder la tensión jurídica y maldicienta del texto.
