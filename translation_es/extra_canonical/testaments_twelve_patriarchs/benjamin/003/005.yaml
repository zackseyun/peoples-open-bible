base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/003/005.yaml
  text: And he cannot be mastered by the plots of men or by beasts, being helped by the Lord through the love that he has toward his neighbor.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:10Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer alignment to the Greek: added the repeated ''by'' for symmetry, rendered the participle more literally as ''being helped by the Lord,'' and retained the formal phrasing without paraphrase.'
translation:
  language: es
  text: Y no puede ser sometido por las intrigas de hombres ni por fieras, siendo ayudado por el Señor mediante el amor que tiene hacia su prójimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιβουλή
  english_pob_choice: plots
  chosen_spanish: intrigas
  alternatives_spanish:
  - maquinaciones
  - asechanzas
  - tramas
  lexicon: BDAG
  rationale: '''Intrigas'' encaja con la intención humana hostil.'
- source_word: θηρίων
  english_pob_choice: beasts
  chosen_spanish: fieras
  alternatives_spanish:
  - bestias
  - animales salvajes
  lexicon: LSJ
  rationale: θηρίον denota animal salvaje peligroso; 'fieras' es preciso y digno.
- source_word: κυριευθῆναι
  english_pob_choice: be mastered
  chosen_spanish: ser sometido
  alternatives_spanish:
  - ser dominado
  - ser sojuzgado
  lexicon: BDAG
  rationale: Variación estilística respecto al verbo de v. 3 manteniendo el campo semántico de dominación.
- source_word: βοηθούμενος ... ὑπὸ τῆς ἀγάπης
  english_pob_choice: being helped by the Lord through the love
  chosen_spanish: siendo ayudado por el Señor mediante el amor
  alternatives_spanish:
  - socorrido por el Señor
  - auxiliado mediante el amor
  lexicon: BDAG
  rationale: Sigue la revisión POB que rindió el participio más literalmente como 'being helped by the Lord'. La versión española conserva el participio y el agente.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - el cercano
  lexicon: BDAG
  rationale: Término ético establecido.
translation_notes:
  revision_awareness: El POB inglés fue revisado de 'since the Lord helps him' a 'being helped by the Lord' para alinear con el participio griego. La versión española sigue 'siendo ayudado por el Señor'.
  spanish_consistency_notes:
  - πλησίον → 'prójimo'
  - ἀγάπη → 'amor'
  - Κύριος → 'Señor'
