translation:
  language: es
  text: 'Entonces Zorobabel, Jesúa[a] y los jefes de las casas paternas de Israel les dijeron: «No les corresponde a ustedes construir la casa[b] para Yahvé nuestro Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ἰησοῦς aquí se refiere al sumo sacerdote postexílico, normalmente llamado Jesúa; alternativamente, «Josué».
    reason: lexical_alternative
  - marker: b
    text: O «el templo»; literalmente, «la casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijeron
  alternatives_spanish:
  - les hablaron
  - les dijeron a ellos
  lexicon: BDAG
  rationale: La forma narrativa griega se expresa con naturalidad en español con «les dijeron». Mantiene la simplicidad del enunciado sin añadir matices no presentes en el texto.
- source_word: Ζοροβαβὲλ
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubabel
  lexicon: transliteración tradicional / forma directa del griego
  rationale: El griego presenta Ζοροβαβέλ; en español, «Zorobabel» reproduce de manera directa la forma griega y es inteligible en el ámbito bíblico.
- source_word: Ἰησοῦς
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Josué
  - Jesús
  lexicon: uso onomástico bíblico contextual
  rationale: En este contexto postexílico el referente es el sumo sacerdote Jeshua/Josué, no Jesús de Nazaret. «Jesúa» sigue de cerca la forma usada para el personaje en la tradición bíblica y evita la confusión con «Jesús».
- source_word: οἱ ἡγούμενοι
  english_pob_choice: the heads
  chosen_spanish: los jefes
  alternatives_spanish:
  - los líderes
  - los cabezas
  lexicon: BDAG
  rationale: «Los jefes» comunica bien el valor de autoridad y dirección del participio nominal, en un español natural y bíblico.
- source_word: τῶν πατριῶν
  english_pob_choice: of the fathers’ houses
  chosen_spanish: de las casas paternas
  alternatives_spanish:
  - de los clanes paternos
  - de las casas de los padres
  lexicon: LSJ
  rationale: La expresión alude a unidades familiares/clánicas. «Casas paternas» conserva la estructura social del original y resulta más precisa que «familias».
- source_word: Οὐχ ὑμῖν
  english_pob_choice: It is not for you
  chosen_spanish: No les corresponde a ustedes
  alternatives_spanish:
  - No es para ustedes
  - Ustedes no tienen parte
  lexicon: BDAG
  rationale: El griego es elíptico. En español, «No les corresponde a ustedes» expresa con claridad la exclusión implícita sin expandirla indebidamente.
- source_word: τοῦ οἰκοδομῆσαι
  english_pob_choice: to build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - reconstruir
  lexicon: BDAG
  rationale: «Construir» es una equivalencia natural y clara para el infinitivo, adecuada al registro moderno y digno. «Reconstruir» sería posible por el contexto, pero no está explícito en esta cláusula.
- source_word: τὸν οἶκον
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la morada
  lexicon: BDAG
  rationale: Se conserva «la casa» para seguir de cerca el lexema del griego. En este contexto remite al templo, pero el término literal preserva la imagen bíblica.
- source_word: Κυρίῳ θεῷ ἡμῶν
  english_pob_choice: for the Lord our God
  chosen_spanish: para Yahvé nuestro Dios
  alternatives_spanish:
  - para el Señor nuestro Dios
  - para Yahvé, nuestro Dios
  lexicon: BDAG
  rationale: Aunque el griego dice Κυρίῳ, el trasfondo paralelo hebreo apunta a YHWH. Conforme a la política del proyecto, se vierte con «Yahvé» para hacer transparente el nombre divino, manteniendo «nuestro Dios» como en el original.
theological_decisions:
- issue: Tratamiento de κύριος en una cláusula que corresponde al Tetragrámaton en el paralelo hebreo
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El texto griego conserva Κυρίῳ, pero el paralelo hebreo identificado en el expediente remite a YHWH. Según la política del proyecto, el texto español no lo enmascara con «Señor», sino que explicita el nombre divino como «Yahvé».
  doctrine_reference: 'DOCTRINE.md: יהוה / YHWH → Yahvé; κύριος como traducción contextual del nombre divino cuando el paralelo lo exige'
- issue: Identificación de Ἰησοῦς en el contexto postexílico
  english_pob_reading: Jeshua / Joshua
  chosen_spanish_reading: Jesúa
  alternative_spanish_readings:
  - Josué
  - Jesús
  rationale: La referencia histórica es al sumo sacerdote postexílico, no al personaje del NT. «Jesúa» mantiene la identificación contextual y evita la ambigüedad de «Jesús»; «Josué» también es posible, pero «Jesúa» sigue mejor el uso bíblico para este personaje.
  doctrine_reference: 'DOCTRINE.md: nombres propios bíblicos según referente histórico y contexto literario'
translation_notes:
  revision_awareness: El borrador sigue el sentido del griego de Swete (1909) y está alineado con la lectura ya aprobada del POB en inglés. Se mantiene la estructura narrativa, la exclusión implícita de los destinatarios y la literalidad controlada de τὸν οἶκον. La principal decisión revisada para español es explicitar «Yahvé» por el trasfondo hebreo del paralelo, en coherencia con la política terminológica del proyecto.
  spanish_consistency_notes:
  - 'Se conserva el orden natural del español sin perder la secuencia del griego: sujeto compuesto, verbo de habla, cita directa.'
  - «Casa» se mantiene de forma literal; la nota ofrece «templo» como alternativa contextual sin sustituir el texto principal.
  - La designación de Jesúa evita confusión con Jesús de Nazaret y con la forma más general «Josué».
  - «Yahvé nuestro Dios» armoniza con la política del proyecto y con el paralelo hebreo, sin alterar el referente teológico del texto.
