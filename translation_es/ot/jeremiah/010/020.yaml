revisions:
- from: Mi tienda[a] está destruida, y todas mis cuerdas[b] están arrancadas. Mis hijos[c] se han ido de mí, y ya no existen[d]. No hay nadie que vuelva a extender mi tienda ni a levantar mis cortinas.
  to: Mi tienda[a] está destruida, y todas mis cuerdas[b] están arrancadas. Mis hijos[c] se han ido de mí, y ya no están. No hay nadie que vuelva a extender mi tienda ni a levantar mis cortinas[d].
  rationale: Se corrige «ya no existen» a «ya no están» para reflejar mejor la ausencia lamentada sin introducir una idea de inexistencia absoluta. Se repara la nota léxica de «cuerdas» con una alternativa real («cordeles»). También se mueve el marcador [d] a la cláusula final, que es donde pertenece la variante auditada en inglés. El resto del verso puede mantenerse.
  reviewer_model: gpt-5.4
