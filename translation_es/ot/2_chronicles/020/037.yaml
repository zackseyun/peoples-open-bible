base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/020/037.yaml
  text: Then Eliezer son of Dodavahu[a], from Mareshah, prophesied against Jehoshaphat, saying, “Because you joined yourself with Ahaziah[b], Yahweh has broken your works.” So the ships were wrecked and were not able to go to Tarshish.
  footnotes:
  - marker: a
    text: Or “the LORD has shattered your undertaking.” The Hebrew says “your works,” referring here to Jehoshaphat’s shipbuilding enterprise.
    reason: lexical_alternative
  - marker: b
    text: Or “could not go” or “were prevented from going” to Tarshish.
    reason: lexical_alternative
