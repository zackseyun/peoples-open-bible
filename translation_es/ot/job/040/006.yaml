translation:
  language: es
  text: 'Entonces Yahvé respondió a Job desde la tormenta[a] y dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el torbellino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: Then ... answered
  chosen_spanish: Entonces ... respondió
  alternatives_spanish:
  - Y respondió
  - Y contestó
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» mantiene esa secuencia de forma natural en español. «Respondió» conserva el sentido de ענה en este contexto como respuesta a Job, sin forzar un matiz distinto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del tetragrámaton en español como «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: אֶת אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: a Job
  alternatives_spanish:
  - Job
  lexicon: HALOT
  rationale: En español, con «responder» resulta natural explicitar el complemento con «a». El hebreo marca a Job como el destinatario de la respuesta.
- source_word: מִן סְעָרָה
  english_pob_choice: out of the storm
  chosen_spanish: desde la tormenta
  alternatives_spanish:
  - desde el torbellino
  - desde el remolino
  - desde la tempestad
  lexicon: HALOT
  rationale: סְעָרָה puede referirse a tormenta, tempestad o torbellino. «Tormenta» es la opción más clara y amplia en español; se deja constancia de la alternativa tradicional en la nota.
- source_word: וַיֹּאמַר
  english_pob_choice: 'and said:'
  chosen_spanish: 'y dijo:'
  alternatives_spanish:
  - 'y habló:'
  lexicon: HALOT
  rationale: La fórmula narrativa introduce discurso directo; «y dijo:» es la equivalencia más natural y fiel en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el tetragrámaton. En coherencia con la política del proyecto, se mantiene el nombre propio divino transliterado como «Yahvé», preservando la referencia al nombre del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor semántico de סְעָרָה en la escena teofánica
  english_pob_reading: out of the storm / Or 'out of the whirlwind.'
  chosen_spanish_reading: desde la tormenta[a]
  alternative_spanish_readings:
  - desde el torbellino
  - desde el remolino
  - desde la tempestad
  rationale: El contexto admite un fenómeno meteorológico intenso y también la opción más específica «torbellino». Se privilegia «tormenta» por claridad, y la nota preserva la alternativa léxica documentada por la tradición de traducción.
  doctrine_reference: Lexical note on poetic/theophanic imagery; no doctrinal dispute
translation_notes:
  revision_awareness: El borrador sigue el estado revisado más reciente del texto fuente (sin cambios pendientes), y conserva la decisión auditada de traducir el nombre divino como «Yahvé» y el sintagma מִן־סְעָרָה con una opción amplia y natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה.
  - Se usa «respondió» en voz narrativa para reproducir el valor de waw consecutivo con naturalidad en español.
  - La nota conserva la alternativa «torbellino» para reflejar la tensión léxica del hebreo.
  - El complemento directo personal se vierte como «a Job» por norma idiomática del español.
