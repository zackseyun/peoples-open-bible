translation:
  language: es
  text: Y entraré en juicio con él mediante pestilencia y derramamiento de sangre; y haré llover sobre él, sobre sus tropas[c], y sobre los muchos pueblos que están con él, lluvia torrencial[a], piedras de granizo, fuego y azufre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lluvia desbordante».
    reason: lexical_alternative
  - marker: b
    text: 'Expresión tradicional en inglés: «fire and brimstone»; hebreo: «fuego y azufre».'
    reason: lexical_alternative
  - marker: c
    text: O «sus bandas» o «sus ejércitos»; el término hebreo se refiere a las fuerzas que lo acompañan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁפַּטְתִּי
  english_pob_choice: I will enter into judgment
  chosen_spanish: entraré en juicio
  alternatives_spanish:
  - haré juicio
  - litigaré en juicio
  lexicon: HALOT
  rationale: El nifal de שׁפט con אִתּוֹ expresa una acción judicial contra alguien. En español, «entrar en juicio» conserva el matiz forense mejor que un simple «juzgar», y suena natural y solemne.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - contra él
  lexicon: HALOT
  rationale: El hebreo dice literalmente «con él». Se mantiene la preposición, porque en español «entrar en juicio con él» ya comunica la fuerza adversativa sin desplazar el texto.
- source_word: בְּדֶבֶר
  english_pob_choice: by pestilence
  chosen_spanish: mediante pestilencia
  alternatives_spanish:
  - con peste
  - por pestilencia
  lexicon: HALOT
  rationale: דֶּבֶר suele designar una plaga/pestilencia de juicio divino. «Pestilencia» preserva el tono profético y la relación instrumental del hebreo.
- source_word: וּבְדָם
  english_pob_choice: and bloodshed
  chosen_spanish: y sangre
  alternatives_spanish:
  - y derramamiento de sangre
  - y sangre derramada
  lexicon: HALOT
  rationale: Aquí דָּם funciona metonímicamente para muerte violenta o derramamiento de sangre. Se conserva «sangre» para mantener la concisión y la carga imagística; el contexto ya orienta a violencia judicial.
- source_word: וְגֶשֶׁם שׁוֹטֵף
  english_pob_choice: torrential rain
  chosen_spanish: lluvia torrencial
  alternatives_spanish:
  - lluvia impetuosa
  - aguacero torrencial
  lexicon: HALOT
  rationale: La combinación sustantivo + participio expresa una lluvia desbordante. «Lluvia torrencial» comunica bien la intensidad sin añadir interpretaciones ajenas al hebreo.
- source_word: וְאַבְנֵי אֶלְגָּבִישׁ
  english_pob_choice: hailstones
  chosen_spanish: piedras de granizo
  alternatives_spanish:
  - granizo
  - piedras de hielo
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «piedras de granizo». En español, esta forma preserva tanto la imagen de piedra como el sentido meteorológico de granizo.
- source_word: אֵשׁ וְגָפְרִית
  english_pob_choice: fire and sulfur
  chosen_spanish: fuego y azufre
  alternatives_spanish:
  - fuego y azufre ardiente
  - fuego y azufre sulfuroso
  lexicon: HALOT
  rationale: Se mantiene la equivalencia directa y transparente de גָפְרִית como «azufre». No se usa la fórmula tradicional «fuego y azufre» solo como modismo fijo, sino porque refleja con fidelidad el hebreo.
- source_word: אַמְטִיר
  english_pob_choice: I will rain down
  chosen_spanish: derramaré
  alternatives_spanish:
  - haré llover
  - haré caer
  lexicon: HALOT
  rationale: El hitpael/hiphil de מטר expresa causar lluvia o descargar sobre alguien. Dado que en español la serie continúa con elementos concretos, «derramaré» funciona como verbo abarcador para introducir la lluvia, el granizo, el fuego y el azufre sin forzar una sola imagen meteorológica.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - contra él
  lexicon: HALOT
  rationale: «Sobre él» reproduce la dirección descendente de la acción divina y mantiene el paralelismo de la lista.
- source_word: אֲגַפָּיו
  english_pob_choice: his troops
  chosen_spanish: sus tropas
  alternatives_spanish:
  - sus bandos
  - sus alas
  lexicon: HALOT
  rationale: En contexto militar, אֲגַפִּים designa fuerzas acompañantes, flancos o divisiones. «Sus tropas» es la opción española más clara y se ajusta al sentido contextual que el audit trail inglés documenta.
- source_word: עַמִּים רַבִּים
  english_pob_choice: the many peoples
  chosen_spanish: los muchos pueblos
  alternatives_spanish:
  - muchos pueblos
  - las muchas naciones
  lexicon: HALOT
  rationale: עַמִּים significa «pueblos»; no se fuerza «naciones» porque el hebreo no lo exige. El artículo se mantiene por la referencia a un grupo definido asociado con él.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: who are with him
  chosen_spanish: que están con él
  alternatives_spanish:
  - que van con él
  - que lo acompañan
  lexicon: HALOT
  rationale: Una relativa personal en español resulta natural para este referente colectivo humano y conserva el vínculo de acompañamiento sin sobreespecificarlo.
theological_decisions:
- issue: Naturaleza concreta del juicio y de las imágenes de catástrofe
  english_pob_reading: Render the list as concrete acts of divine judgment without softening into merely symbolic disaster language.
  chosen_spanish_reading: Presentar la lista como actos concretos del juicio divino, sin diluirla en lenguaje meramente simbólico o general.
  alternative_spanish_readings:
  - Tratar la serie solo como metáfora de desastre
  - Suavizar la lista para hacerla más interpretativa
  rationale: El hebreo formula un oráculo judicial directo con imágenes de juicio y teofanía. La traducción conserva esa concreción y deja la interpretación amplia para la exégesis, no para el texto base.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica sin resolverla artificialmente.'
translation_notes:
  revision_awareness: El contexto inglés revisó «flooding rain» a «torrential rain» por mayor naturalidad sin cambiar el sentido. En español se adoptó directamente «lluvia torrencial», manteniendo la intensidad y la imagen de lluvia abundante, y se preservó la lectura concreta de la lista de juicios.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el tetragrámaton.
  - «Pestilencia» y no «plaga» para conservar el registro judicial-profético del hebreo.
  - «Pueblos» se mantiene para עַמִּים, sin reemplazarlo por «naciones» por defecto.
  - «Azufre» se elige como equivalente directo de גָפְרִית, en lugar de la fórmula tradicional «brimstone».
