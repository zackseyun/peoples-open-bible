translation:
  language: es
  text: Solo el oro, la plata, el bronce[a], el hierro, el estaño y el plomo—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cobre' para 'bronce'. El término hebreo puede referirse de manera amplia a un metal a base de cobre.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solo que
  - Pero solo
  lexicon: HALOT
  rationale: אַךְ aquí introduce una restricción o excepción respecto de lo anterior; en español, 'Solo' comunica de forma natural esa limitación sin añadir contraste fuerte.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - el dorado
  lexicon: HALOT
  rationale: זָהָב denota el metal oro. Se conserva el sustantivo metálico directo en español, que es idiomático y fiel al listado de metales.
- source_word: הַכָּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata metálica
  lexicon: HALOT
  rationale: כֶּסֶף aquí se refiere al metal, no al dinero, dentro de una enumeración de metales; 'la plata' es la forma natural y precisa en español.
- source_word: הַנְּחֹשֶׁת
  english_pob_choice: the bronze
  chosen_spanish: el bronce
  alternatives_spanish:
  - el cobre
  lexicon: HALOT
  rationale: נְחֹשֶׁת puede abarcar cobre o bronce. Siguiendo la decisión auditada del inglés POB, 'bronce' es la opción más idiomática en esta lista, sin negar la amplitud léxica del término.
- source_word: הַבַּרְזֶל
  english_pob_choice: the iron
  chosen_spanish: el hierro
  alternatives_spanish:
  - acero
  lexicon: HALOT
  rationale: בַּרְזֶל corresponde al metal hierro; 'hierro' es la traducción estándar y fiel.
- source_word: הַבְּדִיל
  english_pob_choice: the tin
  chosen_spanish: el estaño
  alternatives_spanish:
  - una aleación
  lexicon: HALOT
  rationale: בְּדִיל suele designar estaño en listas de metales; 'estaño' mantiene la precisión del inventario mineral.
- source_word: הָעֹפָרֶת
  english_pob_choice: the lead
  chosen_spanish: el plomo
  alternatives_spanish:
  - el peso
  lexicon: HALOT
  rationale: עֹפָרֶת significa plomo en este contexto de metales; 'plomo' preserva el sentido material de la lista.
- source_word: אֵת repeated before each noun
  english_pob_choice: not separately translated
  chosen_spanish: no se traduce aparte
  alternatives_spanish:
  - se refleja solo en la coordinación de la lista
  lexicon: Hebrew grammar
  rationale: El marcador de objeto directo repetido en hebreo estructura la enumeración, pero no tiene equivalente directo en español; se refleja con la serie coordinada y la puntuación.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa, que eliminó una conjunción redundante para hacer la lista más natural sin alterar su contenido. En español se mantuvo la misma economía sintáctica: una sola enumeración coordinada, sin repetir conectores innecesarios.'
  spanish_consistency_notes:
  - Se usó 'Solo' para אַךְ, manteniendo el valor restrictivo señalado por el audit trail inglés.
  - Se preservó el orden de la lista de metales tal como aparece en el hebreo y en el texto inglés auditado.
  - Se optó por terminología metálica común y precisa en español; 'bronce' lleva nota porque el hebreo admite también 'cobre'.
  - No se añadió interpretación litúrgica ni teológica ajena al versículo; es un inventario de metales sujetos a lo dicho en el contexto inmediato.
