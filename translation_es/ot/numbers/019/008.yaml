translation:
  language: es
  text: Y el que la quema lavará sus vestidos en agua y bañará su cuerpo en agua[a], y estará impuro hasta el atardecer[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con agua' en ambos casos de 'en agua'. El hebreo dice literalmente 'en el agua'.
    reason: lexical_alternative
  - marker: b
    text: Aquí 'impuro' se refiere a impureza ritual, no necesariamente a culpa moral.
    reason: theological_note
lexical_decisions:
- source_word: הַשֹּׂרֵף
  english_pob_choice: the one who burns
  chosen_spanish: el que la quema
  alternatives_spanish:
  - el que la incendia
  - el que la quema a ella
  - quien la quema
  lexicon: HALOT
  rationale: El participio con artículo funciona como un sustantivo designando al responsable de la acción. En español, 'el que la quema' conserva esa función referencial y mantiene la naturalidad legal del enunciado.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - ello
  - la víctima
  - la
  lexicon: HALOT
  rationale: El objeto femenino singular se refiere a la becerra roja. En español, el pronombre átono 'la' preserva el referente femenino mejor que un neutro artificioso.
- source_word: יְכַבֵּס
  english_pob_choice: shall wash
  chosen_spanish: lavará
  alternatives_spanish:
  - deberá lavar
  - ha de lavar
  lexicon: HALOT
  rationale: 'El imperfecto con valor prescriptivo se expresa de forma natural con futuro de mandato en español bíblico contemporáneo: ''lavará''.'
- source_word: בְּגָדָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  - sus vestiduras
  lexicon: HALOT
  rationale: '''Vestidos'' es una opción digna y bíblica en español, cercana al campo semántico de ''garments'' sin sonar tan arcaica como ''vestiduras''.'
- source_word: בַּמַּיִם
  english_pob_choice: in water
  chosen_spanish: en agua
  alternatives_spanish:
  - con agua
  - en el agua
  lexicon: HALOT
  rationale: Se conserva la literalidad de la preposición hebrea sin imponer una equivalencia más interpretativa. 'En agua' refleja mejor la construcción del original y mantiene la repetición ritual del verso.
- source_word: וְרָחַץ
  english_pob_choice: and bathe
  chosen_spanish: y lavará
  alternatives_spanish:
  - y se lavará
  - y bañará
  - y se bañará
  lexicon: HALOT
  rationale: En este contexto legal, 'lavará su cuerpo' comunica el acto ritual sin sonar excesivamente coloquial. 'Bañará' podría sugerir un baño completo más libre; 'lavará' deja intacta la relación con el paralelo del lavado de las vestiduras.
- source_word: בְּשָׂרוֹ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su carne
  - su cuerpo físico
  lexicon: HALOT
  rationale: Aunque literalmente es 'carne', en este contexto ritual el referente es la persona corporalmente. 'Su cuerpo' evita una calca que en español podría sonar dura o confusa, sin borrar la imagen corporal del hebreo.
- source_word: וְטָמֵא
  english_pob_choice: and he shall be unclean
  chosen_spanish: y estará impuro
  alternatives_spanish:
  - y será impuro
  - y quedará impuro
  - y será ritualmente impuro
  lexicon: HALOT
  rationale: '''Impuro'' comunica el estado ritual. ''Estará'' preserva el valor de estado resultante; no se añade ''ritualmente'' en el texto principal para no cargarlo innecesariamente cuando el contexto ya lo determina.'
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  - hasta el anochecer
  lexicon: HALOT
  rationale: '''Tarde'' puede expresar la franja final del día en español bíblico y evita una interpretación demasiado específica como ''atardecer'' o ''anochecer''. El término sigue siendo funcional dentro del marco ritual del pasaje.'
theological_decisions:
- issue: Impureza ritual versus culpa moral
  english_pob_reading: unclean here refers to ritual impurity, not necessarily moral guilt.
  chosen_spanish_reading: impuro en sentido ritual, no necesariamente culpable moralmente
  alternative_spanish_readings:
  - impuro
  - ritualmente impuro
  - inmundo
  rationale: En español, 'impuro' podría leerse moralmente si se aísla del contexto. La traducción principal mantiene el término conciso, y la nota aclara que aquí se trata de impureza ritual, no de culpa ética.
  doctrine_reference: 'Levítico/Números: categorías de pureza ritual en la Torá'
translation_notes:
  revision_awareness: El texto español sigue de cerca la última revisión inglesa, que eliminó el artículo antes de 'water' para sonar más natural y ajustarse mejor al hebreo. Por ello se mantuvo 'en agua' en ambas ocurrencias, sin añadir 'el' ni sustituir la estructura por una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene Yahvé como convención general del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se conserva la distinción entre lavado de vestiduras y lavado del cuerpo.
  - Se evita 'inmundo' por su tono más tradicional y menos preciso para la categoría ritual aquí.
  - La traducción adopta un registro bíblico moderno y sobrio, coherente con legislación sacerdotal.
