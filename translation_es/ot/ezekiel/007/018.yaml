translation:
  language: es
  text: Se vestirán de cilicio, y el temblor[a] los cubrirá; vergüenza habrá en todo rostro, y calvicie[b] en todas sus cabezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terror» o «espanto». El hebreo פַּלָּצוּת expresa un temor que se manifiesta como estremecimiento.
    reason: lexical_alternative
  - marker: b
    text: «Calvicie» aquí significa duelo y humillación en el contexto del juicio.
    reason: cultural_note
lexical_decisions:
- source_word: וְחָגְרוּ שַׂקִּים
  english_pob_choice: They will put on sackcloth
  chosen_spanish: Se vestirán de cilicio
  alternatives_spanish:
  - se pondrán cilicio
  - se ceñirán de cilicio
  - se vestirán de saco
  lexicon: HALOT
  rationale: חגר expresa la acción de ceñirse o ponerse una prenda; con שַׂקִּים, el sentido es vestirse de luto. "Cilicio" es el equivalente tradicional y claro en español bíblico para la prenda de duelo, y mantiene la fuerza cultural del hebreo sin sonar mecánico.
- source_word: שַׂקִּים
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - tela áspera
  - saco de luto
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, el español natural usa un singular colectivo para esta prenda. "Cilicio" comunica la vestidura de duelo reconocible en el contexto profético; se evita "saco" por ambigüedad moderna.
- source_word: וְכִסְּתָה אוֹתָם פַּלָּצוּת
  english_pob_choice: trembling will cover them
  chosen_spanish: el temblor los cubrirá
  alternatives_spanish:
  - el terror los cubrirá
  - el espanto los cubrirá
  - un estremecimiento los cubrirá
  lexicon: HALOT
  rationale: פַּלָּצוּת denota temor estremecido, terror o horror con componente corporal. "Temblor" sigue la revisión inglesa que prefirió el matiz de estremecimiento/dread y conserva la imagen de algo que los cubre.
- source_word: וְאֶל כָּל פָּנִים בּוּשָׁה
  english_pob_choice: shame will be on every face
  chosen_spanish: vergüenza habrá en todo rostro
  alternatives_spanish:
  - habrá vergüenza en cada rostro
  - sobre todo rostro habrá vergüenza
  - la vergüenza estará en todo semblante
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática con "rostros" para expresar deshonra visible. "Vergüenza" reproduce היטב el valor emocional y social del término, y "todo rostro" conserva la imagen colectiva y semítica.
- source_word: וּבְכָל רָאשֵׁיהֶם קָרְחָה
  english_pob_choice: baldness on all their heads
  chosen_spanish: calvicie en todas sus cabezas
  alternatives_spanish:
  - baldura en todas sus cabezas
  - cabezas rapadas
  - calvicie sobre todas sus cabezas
  lexicon: HALOT
  rationale: קָרְחָה designa calvicie como señal de duelo o humillación. "Calvicie" mantiene el sustantivo nominal del hebreo y el paralelismo con "vergüenza", evitando convertirlo en una paráfrasis verbal.
theological_decisions:
- issue: 'Marca cultural de duelo: cilicio y calvicie'
  english_pob_reading: Sackcloth and baldness are signs of mourning and humiliation in judgment.
  chosen_spanish_reading: El cilicio y la calvicie se entienden como señales visibles de duelo y humillación bajo el juicio.
  alternative_spanish_readings:
  - El cilicio y la calvicie son solo descripciones literales.
  - Estas imágenes no tienen valor cultural particular.
  rationale: La escena profética usa prendas y gestos de luto para comunicar la devastación del juicio. La traducción conserva la literalidad y la carga cultural sin espiritualizar ni suavizar la imagen.
  doctrine_reference: Contexto profético de juicio; duelo en lamentación bíblica (cf. usos de signos externos de luto en el AT).
- issue: Valor semántico de פַּלָּצוּת
  english_pob_reading: trembling will cover them
  chosen_spanish_reading: el temblor los cubrirá
  alternative_spanish_readings:
  - el horror los cubrirá
  - el terror los cubrirá
  rationale: La revisión inglesa corrigió 'horror' a 'trembling' para reflejar mejor el estremecimiento temeroso implícito en פַּלָּצוּת. En español, 'temblor' conserva esa tensión entre miedo intenso y reacción física.
  doctrine_reference: Lenguaje profético de terror/jucio; descripción de respuesta humana bajo la ira divina.
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió ''horror'' por ''trembling'' para פַּלָּצוּת; la redacción española sigue esa revisión y conserva la imagen física de estremecimiento. También mantiene el paralelismo nominal del hebreo: vestidura de duelo, temor que cubre, vergüenza en el rostro y calvicie en la cabeza.'
  spanish_consistency_notes:
  - Se mantiene 'cilicio' para שַׂקִּים conforme al registro bíblico en español y para evitar ambigüedad moderna.
  - Se conserva 'vergüenza' para בּוּשָׁה por su valor emocional y público, paralelo a 'rostro'.
  - '''Calvicie'' reproduce el sustantivo hebreo קָרְחָה sin convertirlo en verbo, preservando la tersura del hebreo.'
  - No se usa 'SEÑOR' ni terminología de sustitución aquí, porque el versículo no contiene el tetragrámaton.
