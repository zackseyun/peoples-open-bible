  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección 'casa' para οἰκία coincide con la decisión documentada en inglés. Conviene ajustar la nota para reflejar la alternativa auditada ('household') de forma más precisa en español como 'hogar' o 'casa' en sentido doméstico, sin ampliar a 'familia'.
