revisions:
- from: 'Entonces Moisés se puso[a] a la puerta del campamento y dijo: «¿Quién está por Yahvé? Que venga a mí». Y se reunieron con él todos los hijos de Leví[b].'
  to: 'Entonces Moisés se puso de pie a la puerta del campamento y dijo: «¿Quién está por Yahvé? Que venga a mí[a]». Y todos los hijos de Leví[b] se reunieron junto a él.'
  rationale: Se corrige el anclaje de la nota para que recaiga sobre la expansión implícita que realmente explica; se ajusta «se puso» a «se puso de pie» para mayor naturalidad y precisión; y se reemplaza «con él» por «junto a él» para conservar mejor el movimiento hacia Moisés expresado por אֵלָיו sin volver el español torpe.
