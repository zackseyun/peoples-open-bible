translation:
  language: es
  text: Sin duda te desgastarás[a], tanto tú como este pueblo que está contigo, porque el asunto es demasiado pesado para ti. No podrás hacerlo solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te agotarás». El hebreo usa un infinitivo absoluto seguido de un imperfecto del mismo verbo para dar énfasis: literalmente, «desgastándote, te desgastarás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבֹל תִּבֹּל
  english_pob_choice: you will surely wear yourself out
  chosen_spanish: te desgastarás
  alternatives_spanish:
  - te agotarás
  - te consumirás
  - te debilitarás
  lexicon: HALOT
  rationale: La duplicación hebrea expresa intensidad y seguridad. En español, la forma simple futura con valor enfático comunica bien la certeza sin sonar artificiosa. «Desgastarte» conserva la idea de agotamiento por sobrecarga, que encaja con el contexto administrativo.
- source_word: גַּם אַתָּה גַּם הָעָם הַזֶּה
  english_pob_choice: both you and this people
  chosen_spanish: tanto tú como este pueblo
  alternatives_spanish:
  - así tú como este pueblo
  - tú y también este pueblo
  - tanto tú como esta gente
  lexicon: HALOT
  rationale: El paralelismo con גַּם ... גַּם marca inclusión de ambos sujetos. «Tanto... como...» reproduce esa correlación de modo natural en español. «Este pueblo» refleja el singular colectivo del hebreo y el demostrativo cercano.
- source_word: אֲשֶׁר עִמָּךְ
  english_pob_choice: who are with you
  chosen_spanish: que está contigo
  alternatives_spanish:
  - que están contigo
  - que va contigo
  - que se encuentra contigo
  lexicon: HALOT
  rationale: Aunque el inglés POB usa plural por idiomática, el hebreo trata a עָם como colectivo singular. Por eso «está» conserva la concordancia con «pueblo» sin perder el sentido colectivo de compañía.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la razón de la advertencia. «Porque» es la equivalencia directa y clara en español contemporáneo.
- source_word: כָבֵד מִמְּךָ הַדָּבָר
  english_pob_choice: the matter is too heavy for you
  chosen_spanish: el asunto es demasiado pesado para ti
  alternatives_spanish:
  - la cuestión es demasiado pesada para ti
  - la carga es demasiado grande para ti
  - el asunto te queda demasiado pesado
  lexicon: HALOT
  rationale: «Pesado» preserva la metáfora hebrea de carga. «Asunto» traduce דָּבָר de manera amplia sin especificar indebidamente el tipo de labor, y funciona bien en el contexto judicial/administrativo.
- source_word: לֹא תוּכַל
  english_pob_choice: you are not able
  chosen_spanish: no podrás
  alternatives_spanish:
  - no eres capaz de
  - no puedes
  - no te será posible
  lexicon: HALOT
  rationale: La idea es de incapacidad real para llevar a cabo la tarea. El futuro «no podrás» suena natural en la advertencia y mantiene la fuerza de la negación.
- source_word: עֲשֹׂהוּ
  english_pob_choice: to do it
  chosen_spanish: hacerlo
  alternatives_spanish:
  - llevarlo a cabo
  - resolverlo
  - realizarlo
  lexicon: HALOT
  rationale: עָשָׂה es amplio y básico; «hacerlo» conserva esa amplitud sin interpretar de más. En español, el enclítico evita una estructura pesada.
- source_word: לְבַדֶּךָ
  english_pob_choice: by yourself
  chosen_spanish: tú solo
  alternatives_spanish:
  - por tu cuenta
  - solo
  - sin ayuda
  lexicon: HALOT
  rationale: La expresión hebrea señala que la tarea no puede cumplirse sin apoyo. «Tú solo» es idiomático y claro en español; en este contexto transmite la soledad operativa, no una mera cualidad de aislamiento.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el audit trail inglés. Se mantiene la intensificación verbal del hebreo mediante una futura enfática en español, y se conserva el valor colectivo de עָם sin convertirlo en plural directo. No se introdujeron cambios revisionarios ni variantes textuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Pueblo» se conserva en singular colectivo para reflejar el hebreo.
  - La metáfora de peso se mantiene con «pesado» para preservar la imagen original.
  - Se evita «por ti mismo» para no sonar demasiado reflexivo; «tú solo» conserva la idea de falta de ayuda en un consejo práctico.
