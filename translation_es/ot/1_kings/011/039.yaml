    rationale: 'Si el texto dice «no para siempre», la nota no debe decir «O, más idiomáticamente: “no para siempre”». Lo útil aquí es conservar la alternativa/literal hebrea, por ejemplo «Literalmente: “no todos los días”», o indicar «O: “no por todos los días”» si se desea.'
  revised_spanish_text: Y afligiré la descendencia de David por causa de esto, pero no para siempre.[a]
