    rationale: La nota b da alternativas léxicas para תְּמוּנָתֶךָ («tu semejanza»), por lo que debe ir anclada allí, no en el verbo temporal precedente.
  revised_spanish_text: En cuanto a mí, en justicia contemplaré tu rostro; cuando despierte[a], quedaré saciado con tu semejanza[b].
