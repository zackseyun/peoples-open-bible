translation:
  language: es
  text: el capitán de cincuenta, y el hombre de rango, y el consejero, y el sabio artesano, y el diestro en encantamientos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diestro en conjuros». La expresión hebrea se refiere literalmente a alguien entendido o experto en susurros o encantaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂר חֲמִשִּׁים
  english_pob_choice: the captain of fifty
  chosen_spanish: el capitán de cincuenta
  alternatives_spanish:
  - el comandante de cincuenta
  - el oficial de cincuenta
  lexicon: HALOT
  rationale: שַׂר designa a un jefe, oficial o gobernante; con חֲמִשִּׁים apunta a una función sobre cincuenta hombres. «Capitán de cincuenta» conserva la construcción numérica y suena natural en español sin perder el sentido militar/administrativo.
- source_word: נְשׂוּא פָנִים
  english_pob_choice: the man of rank
  chosen_spanish: el hombre de rango
  alternatives_spanish:
  - el hombre honrado
  - el dignatario
  - el hombre de honor
  lexicon: HALOT
  rationale: La expresión literalmente sugiere alguien «levantado de rostro», un modismo de honor o estatus elevado. «Hombre de rango» comunica con claridad la posición social y mantiene la referencia personal mejor que un giro demasiado abstracto.
- source_word: יוֹעֵץ
  english_pob_choice: the counselor
  chosen_spanish: el consejero
  alternatives_spanish:
  - el asesor
  lexicon: HALOT
  rationale: El participio nombra a quien da consejo. «Consejero» es la equivalencia más directa y natural en una lista de cargos o figuras sociales.
- source_word: חֲכַם חֲרָשִׁים
  english_pob_choice: the wise craftsman
  chosen_spanish: el sabio artesano
  alternatives_spanish:
  - el artesano experto
  - el sabio entre artesanos
  lexicon: HALOT
  rationale: חכם expresa sabiduría o habilidad; חרשים se refiere a artesanos o trabajadores técnicos. En este contexto la idea es pericia artesanal más que sabiduría abstracta, por eso «sabio artesano» preserva ambos elementos del hebreo.
- source_word: נְבוֹן לָחַשׁ
  english_pob_choice: the skillful enchanter
  chosen_spanish: el hábil encantador
  alternatives_spanish:
  - el encantador experto
  - el diestro en conjuros
  - el habilidoso charmedor
  lexicon: HALOT
  rationale: נבון implica discernimiento o destreza, y לחש puede referirse a susurro, conjuro o encantamiento. «Hábil encantador» mantiene el sentido de práctica ritual o mágica que el texto sugiere, sin suavizarlo ni resolver la tensión semántica.
theological_decisions:
- issue: Mención de práctica mágica o encantatoria
  english_pob_reading: the skillful enchanter
  chosen_spanish_reading: el hábil encantador
  alternative_spanish_readings:
  - el diestro en conjuros
  - el encantador experto
  rationale: El hebreo probablemente alude a alguien experto en conjuros o encantamientos susurrados. La traducción conserva ese sentido llano sin convertirlo en mera persuasión retórica ni atenuarlo por tradición interpretativa.
  doctrine_reference: Principio de primacía del texto original y de preservación de tensiones léxicas sin armonizarlas artificialmente.
translation_notes:
  revision_awareness: Se siguió el último ajuste del audit trail que prefirió una forma más natural y formal para el último miembro de la lista, evitando una traducción que sonara demasiado técnica o forzada en español.
  spanish_consistency_notes:
  - Se mantuvo «cincuenta» de manera literal para reflejar la construcción hebrea.
  - Se conservó la serie nominal con artículos definidos para reflejar la enumeración de figuras.
  - No se introdujo terminología eclesiástica tradicional donde el hebreo describe cargos o habilidades sociales.
  - Se evitó «Cristo», «Señor» o equivalentes no presentes en el pasaje.
