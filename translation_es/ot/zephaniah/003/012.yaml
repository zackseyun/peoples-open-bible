translation:
  language: es
  text: Pero yo dejaré en medio de ti[a] un pueblo humilde y pobre[b], y ellos se refugiarán en el nombre de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de ti» o «en tu medio». La expresión hebrea sitúa al remanente en medio de la ciudad o del pueblo dirigido en femenino singular.
    reason: alternative_reading
  - marker: b
    text: O «afligido y pobre» o «un pueblo pobre y necesitado». Los términos hebreos pueden enfatizar aflicción y pobreza social, además de humildad y condición baja.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁאַרְתִּי
  english_pob_choice: But I will leave
  chosen_spanish: Pero yo dejaré
  alternatives_spanish:
  - Y dejaré
  - Y yo haré quedar
  lexicon: HALOT
  rationale: El verbo hiphil expresa causar que quede/remanezca. «Dejaré» es natural en español y conserva la acción divina; «pero» refleja el contraste discursivo del contexto, aunque la waw hebrea sea simplemente coordinativa.
- source_word: בְקִרְבֵּךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu medio
  - dentro de ti
  - en medio de ustedes
  lexicon: HALOT
  rationale: La expresión sitúa al remanente entre el pueblo/ciudad dirigida en femenino singular. «En medio de ti» es fiel y idiomático; mantiene el valor colectivo sin sonar rígido.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - una nación
  lexicon: HALOT
  rationale: Aquí designa un colectivo perteneciente a Yahvé; «pueblo» comunica mejor que «nación» la pertenencia comunitaria y el matiz bíblico.
- source_word: עָנִי
  english_pob_choice: humble
  chosen_spanish: humilde
  alternatives_spanish:
  - afligido
  - pobre
  lexicon: HALOT
  rationale: El término puede abarcar aflicción y pobreza, pero en este contexto profético también describe una disposición de dependencia. «Humilde» preserva esa doble carga sin reducirla solo a economía.
- source_word: וָדָל
  english_pob_choice: and lowly
  chosen_spanish: abatido
  alternatives_spanish:
  - bajo
  - pobre
  - humilde
  lexicon: HALOT
  rationale: דַּל puede significar pobre, débil o bajo. Unido a עָנִי, «abatido» mantiene la idea de bajeza/condición humilde; junto con «humilde» evita una redundancia plana y conserva el paralelismo.
- source_word: וְחָסוּ
  english_pob_choice: and they will take refuge
  chosen_spanish: y ellos se refugiarán
  alternatives_spanish:
  - y buscarán refugio
  - y confiarán
  - y hallarán refugio
  lexicon: HALOT
  rationale: חסה conserva la imagen de buscar protección. «Refugiarse» en español transmite mejor esa metáfora que un simple «confiar».
- source_word: בְּשֵׁם
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por el nombre de
  - invocando el nombre de
  lexicon: HALOT
  rationale: «En el nombre de» es la equivalencia estándar y expresa dependencia de la autoridad y carácter revelado de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Carga semántica de עָנִי וָדָל en el remanente
  english_pob_reading: Rendered as 'humble and lowly'
  chosen_spanish_reading: «humilde y abatido»
  alternative_spanish_readings:
  - «pobre y necesitado»
  - «afligido y pobre»
  - «humilde y bajo»
  rationale: El verso no describe solo pobreza material, sino un remanente marcado por dependencia de Yahvé; la cláusula siguiente sobre refugiarse en su nombre confirma esa lectura. «Humilde y abatido» preserva la tensión entre condición social baja y postura espiritual.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se conserva el nombre propio divino, sin sustituirlo por un título, siguiendo la política del proyecto para YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto coincide con el último pase de revisión: sin cambios requeridos; el veredicto de control cruzado fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «se refugiarán» para conservar la metáfora de חסה.
  - «Pueblo» se reserva para עַם por su matiz comunitario/covenantal.
  - La pareja «humilde y abatido» intenta reflejar el doble valor semántico sin borrar la tensión social-espiritual del hebreo.
