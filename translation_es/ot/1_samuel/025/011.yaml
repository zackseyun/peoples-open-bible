- from: ¿Debo tomar mi pan, mi agua y mi carne[a], que he sacrificado para mis esquiladores, y dárselo a hombres que no conozco, de dónde son?
  to: ¿Debo tomar mi pan[a], mi agua y la carne que he preparado para mis esquiladores, y dárselo a hombres que no conozco, de dónde son ellos?
  rationale: Se reubica la nota [a] en «pan», que es el término explicado; se reemplaza «he sacrificado» por «he preparado» para evitar una lectura cultual impropia y mantener el sentido de carne destinada a la comida; y se ajusta levemente la clausura final para que el español suene más natural sin perder el matiz de procedencia/origen.
