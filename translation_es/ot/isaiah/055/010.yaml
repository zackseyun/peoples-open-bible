translation:
  language: es
  text: Porque, así como la lluvia y la nieve descienden de los cielos[a] y no vuelven allá sin haber regado la tierra, y hacerla producir fruto y brotar, y dar semilla al sembrador y pan al que come,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘del cielo’. El hebreo שָׁמַיִם es formalmente plural y puede significar ‘cielo’, ‘cielos’ o ‘firmamento’, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי כַּאֲשֶׁר
  english_pob_choice: For just as
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - Porque, como
  - Pues, así como
  lexicon: HALOT
  rationale: Conserva el valor explicativo de כִּי y el comparativo de כַּאֲשֶׁר con un español natural al abrir una comparación que anticipa v. 11.
- source_word: יֵרֵד
  english_pob_choice: come down
  chosen_spanish: descienden
  alternatives_spanish:
  - bajan
  - caen
  lexicon: HALOT
  rationale: ‘Descender’ preserva bien la dirección del verbo hebreo con lluvia y nieve y suena más digno que una traducción demasiado coloquial.
- source_word: הַגֶּשֶׁם
  english_pob_choice: the rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - el aguacero
  - la precipitación
  lexicon: HALOT
  rationale: Es el equivalente estándar y claro de גֶּשֶׁם en este contexto agrícola.
- source_word: וְהַשֶּׁלֶג
  english_pob_choice: and the snow
  chosen_spanish: y la nieve
  alternatives_spanish:
  - y el granizo
  lexicon: HALOT
  rationale: Traducción directa y precisa de שֶׁלֶג.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos celestiales
  lexicon: HALOT
  rationale: שָׁמַיִם es formalmente plural; ‘de los cielos’ mantiene ese matiz mejor que el singular ‘del cielo’ y conserva un registro elevado sin ocultar la pluralidad hebrea.
- source_word: וְשָׁמָּה לֹא יָשׁוּב
  english_pob_choice: and do not return there
  chosen_spanish: y no vuelven allá
  alternatives_spanish:
  - y no regresan allí
  - y no retornan allá
  lexicon: HALOT
  rationale: ‘Allá’ rinde bien שָׁמָּה y evita una repetición pesada; el plural español concuerda naturalmente con ‘la lluvia y la nieve’.
- source_word: כִּי אִם
  english_pob_choice: unless
  chosen_spanish: sin haber
  alternatives_spanish:
  - a menos que
  - salvo que
  lexicon: HALOT
  rationale: En esta construcción la idea es de excepción hasta completar un efecto; ‘sin haber’ expresa con economía el valor de excepción y la anterioridad lógica en español.
- source_word: הִרְוָה אֶת הָאָרֶץ
  english_pob_choice: they have watered the earth
  chosen_spanish: haber regado la tierra
  alternatives_spanish:
  - haber empapado la tierra
  - haber saturado la tierra
  lexicon: HALOT
  rationale: רוה en hifil comunica ‘regar/saturar’; ‘regar’ es natural en español y, en esta imagen poética, comunica bien el efecto benéfico del agua sobre la tierra.
- source_word: וְהוֹלִידָהּ
  english_pob_choice: made it bear fruit
  chosen_spanish: hecho que produzca fruto
  alternatives_spanish:
  - hecho que la haga dar fruto
  - hecho que fructifique
  lexicon: HALOT
  rationale: El verbo causativo de ילד apunta a hacer que la tierra produzca; ‘produzca fruto’ conserva el sentido sin forzar una expresión demasiado literal en español.
- source_word: וְהִצְמִיחָהּ
  english_pob_choice: made it sprout
  chosen_spanish: hecho que brote
  alternatives_spanish:
  - hecho que germine
  - hecho que crezca
  lexicon: HALOT
  rationale: צמח en hifil es ‘hacer brotar/crecer’; ‘brote’ mantiene la imagen vegetal y la distinción respecto del verbo anterior.
- source_word: וְנָתַן זֶרַע לַזֹּרֵעַ
  english_pob_choice: and have given seed to the sower
  chosen_spanish: y dado semilla al sembrador
  alternatives_spanish:
  - y dado semilla al que siembra
  - y dado semilla para el sembrador
  lexicon: HALOT
  rationale: Se conserva la concreción agrícola y el paralelismo del texto; ‘semilla’ es el equivalente natural de זֶרַע y ‘sembrador’ de לַזֹּרֵעַ.
- source_word: וְלֶחֶם לָאֹכֵל
  english_pob_choice: and bread to the eater
  chosen_spanish: y pan al que come
  alternatives_spanish:
  - y pan al comensal
  - y alimento al que come
  lexicon: HALOT
  rationale: לֶחֶם es ‘pan’ aquí en paralelo con ‘semilla’; ‘al que come’ preserva la concreción y la simetría del hebreo sin ampliar a un término más general.
translation_notes:
  revision_awareness: La redacción española sigue la revisión reciente del inglés POB que precisó ‘made it bear fruit’; por eso se expresó con ‘hecho que produzca fruto’ en vez de una fórmula más vaga. También se mantuvo la tensión léxica entre שָׁמַיִם como plural formal y la naturalidad del español mediante ‘los cielos’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió un registro poético-digno, sin arcaísmos innecesarios.
  - 'Se preservó la concreción agrícola del hebreo: lluvia, nieve, tierra, fruto, brotar, semilla y pan.'
  - ‘Hecho que…’ refleja la cadena verbal causativa del hebreo sin sobrecargar el español con participios rígidos.
