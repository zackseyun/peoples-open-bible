translation:
  language: es
  text: Por amor de tu nombre[a], Yahvé, perdona mi iniquidad[b], porque es grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Por amor de tu nombre, Yahvé»; es una apelación al carácter y al honor pactal de Dios, no solo a su nombre pronunciado.'
    reason: cultural_note
  - marker: b
    text: O «mi culpa» o «mi pecado»; el hebreo עָוֹן puede denotar iniquidad, culpa o la carga/consecuencia de la culpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: For the sake of
  chosen_spanish: Por amor de
  alternatives_spanish:
  - Por causa de
  - Por el bien de
  - Por motivo de
  lexicon: HALOT
  rationale: La preposición introduce la base o motivo de la petición. «Por amor de» conserva el valor apelativo y devocional de la expresión, y suena natural en español sin perder la idea de fundamento en el honor del nombre divino.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu reputación
  - tu nombre
  lexicon: HALOT
  rationale: Se mantiene la expresión concreta «tu nombre», como en el texto hebreo. En español puede implicar reputación o carácter, pero la formulación literal es la más fiel y permite conservar la amplitud semántica.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el Señor
  lexicon: HALOT
  rationale: El nombre propio divino se rinde como «Yahvé» según el criterio del proyecto, preservando el Tetragrámaton en vez de sustituirlo por un título.
- source_word: וְסָלַחְתָּ
  english_pob_choice: forgive
  chosen_spanish: perdona
  alternatives_spanish:
  - y perdona
  - perdón
  - absuelve
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfectiva con waw en contexto de súplica, el español idiomático exige una petición directa. «Perdona» comunica con claridad el ruego sin forzar una calca verbal.
- source_word: לַעֲוֺנִי
  english_pob_choice: my iniquity
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - mi culpa
  - mi pecado
  - mi falta
  lexicon: HALOT
  rationale: «Iniquidad» conserva el peso moral del hebreo עָוֹן y sigue la decisión auditada del POB en inglés. «Culpa» o «pecado» son posibles, pero estrechan o desplazan el matiz de la palabra hebrea.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: 'Aquí introduce la razón de la petición: se pide perdón porque la iniquidad es grande. «Porque» expresa con naturalidad la relación causal en español.'
- source_word: רַב
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - muy grande
  - mucho
  - abundante
  lexicon: HALOT
  rationale: Con עָוֹן singular, el valor es de magnitud, no de cantidad. «Grande» reproduce bien esa idea de gravedad o intensidad.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - lo es
  - es ello
  - es
  lexicon: HALOT
  rationale: 'El pronombre retoma «mi iniquidad» y en español queda naturalmente implícito: «es grande». No hace falta explicitar «ello».'
theological_decisions:
- issue: Nombre divino יהוה en la invocación
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton, por lo que se conserva el nombre propio divino en español. Se evita el reemplazo tradicional por un título para mantener la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de עָוֹן
  english_pob_reading: iniquity
  chosen_spanish_reading: iniquidad
  alternative_spanish_readings:
  - culpa
  - pecado
  rationale: «Iniquidad» preserva la gravedad moral del término sin reducirlo solo al sentimiento de culpa ni ampliar su alcance a un «pecado» genérico. Mantiene la tensión semántica documentada en el POB inglés.
  doctrine_reference: HALOT; audit trail de PSA.25.11
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el último pase indicó que no hacía falta cambiar nada y el control cruzado reportó alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé» conforme al criterio del proyecto.
  - Se preservó «iniquidad» para עָוֹן, en continuidad con el audit trail inglés.
  - La puntuación reproduce una lectura oracional natural en español sin alterar la relación causal del versículo.
