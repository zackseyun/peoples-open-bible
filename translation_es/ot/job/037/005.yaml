translation:
  language: es
  text: Dios truena maravillosamente con su voz[a]; hace grandes cosas que no conocemos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios truena maravillas con su voz»; el hebreo puede entenderse más literalmente como «maravillas», pero aquí probablemente funciona de modo adverbial: «maravillosamente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «grandes cosas más allá de nuestro conocimiento» o «grandes cosas que no podemos comprender».'
    reason: alternative_reading
lexical_decisions:
- source_word: יַרְעֵם
  english_pob_choice: thunders
  chosen_spanish: truena
  alternatives_spanish:
  - retumba
  - hace tronar
  - truena con fuerza
  lexicon: HALOT
  rationale: El hiphil de רעם expresa producir trueno o tronar. En español, «truena» conserva el efecto sonoro y la imagen meteorológica de modo natural y directo.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino general. «Dios» es la equivalencia más clara e idiomática en español, sin añadir un matiz que el hebreo no exige.
- source_word: בְּקוֹלוֹ
  english_pob_choice: with his voice
  chosen_spanish: con su voz
  alternatives_spanish:
  - por su voz
  - mediante su voz
  lexicon: HALOT
  rationale: La preposición ב con קול puede ser instrumental. «Con su voz» suena natural en español y preserva la idea de que la voz es el medio o acompañamiento del trueno.
- source_word: נִפְלָאוֹת
  english_pob_choice: wondrously
  chosen_spanish: maravillosamente
  alternatives_spanish:
  - de manera maravillosa
  - de forma portentosa
  - con maravillas
  lexicon: HALOT
  rationale: Aunque formalmente es plural sustantivo/adjetival («cosas maravillosas», «maravillas»), en la cláusula modifica al verbo. «Maravillosamente» sigue la lectura adverbial adoptada por el POB inglés y evita forzar una estructura poco natural en español.
- source_word: עֹשֶׂה
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - realiza
  - efectúa
  lexicon: HALOT
  rationale: עָשָׂה es amplio y aquí introduce la afirmación general sobre la acción divina. «Hace» mantiene la sencillez del hebreo y enlaza bien con el objeto siguiente.
- source_word: גְדֹלוֹת
  english_pob_choice: great things
  chosen_spanish: grandes cosas
  alternatives_spanish:
  - grandes obras
  - grandes hechos
  lexicon: HALOT
  rationale: El plural femenino se usa sustantivamente con עשה. «Grandes cosas» reproduce la amplitud semántica sin estrecharlo solo a «obras» o «hechos».
- source_word: וְלֹא נֵדָע
  english_pob_choice: that we do not know
  chosen_spanish: que no conocemos
  alternatives_spanish:
  - que no sabemos
  - que no podemos comprender
  lexicon: HALOT
  rationale: La forma verbal dice literalmente «y no conocemos». En español, «que no conocemos» refleja el valor léxico de ידע sin intensificarlo a «no podemos comprender», que sería más fuerte que el texto.
theological_decisions:
- issue: Alcance de la ignorancia humana ante las obras de Dios
  english_pob_reading: The verse states that God's great works are unknown to us, without expanding this into a stronger claim about total incomprehensibility.
  chosen_spanish_reading: El versículo afirma que las grandes cosas que Dios hace no las conocemos, sin convertirlo en una afirmación más fuerte sobre una incomprensibilidad total.
  alternative_spanish_readings:
  - Dios hace grandes cosas más allá de nuestro entendimiento
  - Dios hace grandes cosas que no podemos comprender
  rationale: El hebreo usa el verbo «conocer»; por eso la traducción debe conservar la limitación humana sin elevarla a una tesis filosófica más amplia. La redacción mantiene la tensión entre la grandeza divina y el límite humano.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el pasaje de revisión más reciente (gpt-5.4, 2026-04-23): no se requieren cambios; se mantiene el mismo sentido auditado y la misma resolución de la ambigüedad de נִפְלָאוֹת y נֵדָע.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל, no una expansión devocional.
  - Se conserva el paralelo entre el adverbio de modo y el objeto de la acción divina.
  - «Conocemos» refleja el valor de ידע sin sobretraducirlo como «comprendemos».
  - La puntuación preserva la división de dos miembros poéticos del verso.
