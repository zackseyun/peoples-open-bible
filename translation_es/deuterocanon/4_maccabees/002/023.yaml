translation:
  language: es
  text: Y le dio una ley[a], conforme a la cual, al conducirse como ciudadano, reinaría sobre un reino[b] dueño de sí mismo, justo, bueno y valiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mediante la cual', preservando el vínculo instrumental y normativo de la construcción relativa griega.
    reason: lexical_alternative
  - marker: b
    text: '''Un reino'' también podría traducirse ''un reinado'' o ''un dominio''; el término griego puede denotar tanto el ámbito gobernado como la realeza o el ejercicio del gobierno real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτῳ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: LSJ
  rationale: El dativo personal con ἔδωκεν se expresa naturalmente en español con complemento indirecto ('le'). Mantiene la referencia personal sin forzar redundancia.
- source_word: νόμον
  english_pob_choice: a law
  chosen_spanish: una ley
  alternatives_spanish:
  - ley
  lexicon: LSJ
  rationale: El sustantivo anartro se vierte de forma natural como 'una ley'. Conserva la idea de norma o código dado al gobernante.
- source_word: καθʼ ὃν
  english_pob_choice: according to which
  chosen_spanish: conforme a la cual
  alternatives_spanish:
  - según la cual
  - por la cual
  lexicon: LSJ
  rationale: La construcción relativa exige una relación formal entre la ley y el modo de reinar. 'Conforme a la cual' conserva bien esa dependencia normativa en español.
- source_word: πολιτευόμενος
  english_pob_choice: by conducting himself as a citizen
  chosen_spanish: al conducirse como ciudadano
  alternatives_spanish:
  - viviendo como ciudadano
  - desempeñando su vida cívica
  - rigiendo su vida pública
  lexicon: LSJ
  rationale: El participio de πολιτεύομαι tiene fuerza cívico-política. 'Al conducirse como ciudadano' preserva el matiz de vida cívica sin reducirlo a mera administración política.
- source_word: βασιλεύσειε
  english_pob_choice: he would rule
  chosen_spanish: reinaría
  alternatives_spanish:
  - gobernaría
  - regiría
  lexicon: LSJ
  rationale: El optativo expresa resultado potencial en discurso retrospectivo. 'Reinaría' es natural en español y conserva el sentido real de βασιλεύειν.
- source_word: βασιλείαν
  english_pob_choice: a kingdom
  chosen_spanish: un reino
  alternatives_spanish:
  - un reinado
  - una realeza
  - un dominio
  lexicon: LSJ
  rationale: Aquí la enumeración de cualidades describe la esfera gobernada; 'reino' es la equivalencia más clara y publicable en español. 'Reinado' sería más abstracto y menos transparente.
- source_word: σώφρονά
  english_pob_choice: self-controlled
  chosen_spanish: sobrio
  alternatives_spanish:
  - templado
  - prudente
  - sensato
  lexicon: LSJ
  rationale: σώφρων abarca moderación, cordura y dominio de sí. 'Sobrio' funciona bien en español bíblico contemporáneo para esa moderación ética, aunque no agota el matiz.
- source_word: δικαίαν
  english_pob_choice: just
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: LSJ
  rationale: En este contexto cívico-político, 'justo' comunica mejor la cualidad pública del reino que 'recto'. Conserva la fuerza legal y ética del término.
- source_word: ἀγαθήν
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - benévolo
  - noble
  - beneficioso
  lexicon: LSJ
  rationale: El adjetivo es amplio; 'bueno' es la opción más directa y menos interpretativa.
- source_word: ἀνδρείαν
  english_pob_choice: courageous
  chosen_spanish: valiente
  alternatives_spanish:
  - courageoso
  - bravo
  - viril
  lexicon: LSJ
  rationale: El término puede implicar valentía masculina clásica, pero en español contemporáneo 'valiente' preserva la virtud de fortaleza/coraje sin introducir sobretonos innecesarios.
theological_decisions:
- issue: Alcance cívico de πολιτευόμενος aplicado a un rey
  english_pob_reading: Retain the civic nuance ('conducting himself as a citizen') rather than flattening it to simple royal rule.
  chosen_spanish_reading: Conservar el matiz cívico ('al conducirse como ciudadano') en vez de reducirlo a mera actividad real.
  alternative_spanish_readings:
  - gobernándose a sí mismo
  - viviendo conforme a la ley
  - administrando el estado
  rationale: La frase subraya que el rey está sujeto a un orden cívico-moral. La traducción elegida mantiene esa tensión política sin añadir doctrina externa.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Traducción de δικαίαν en una lista de virtudes políticas
  english_pob_reading: just
  chosen_spanish_reading: justo
  alternative_spanish_readings:
  - recto
  - righteous
  rationale: El contexto es el carácter de un reino y su ejercicio de gobierno; 'justo' preserva el sentido público/jurídico de la cualidad. No se propone una lectura devocional en este punto.
  doctrine_reference: Translation philosophy §5; Contested terms table (δικαιοσύνη)
translation_notes:
  revision_awareness: El pasaje presenta una combinación de mandato legal y virtud política. La revisión inglesa más reciente no requirió cambios; la versión española conserva el mismo equilibrio entre literalidad y fluidez, y mantiene el matiz cívico de πολιτευόμενος y la ambigüedad gobernante/reino de βασιλείαν sin sobreinterpretar.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece.
  - '''Reino'' se prefiere a ''reinado'' porque el contexto describe el ámbito gobernado, no la duración del gobierno.'
  - '''Sobrio'' traduce la moderación ética de σώφρων sin convertir el término en mera abstinencia física.'
  - Se evita 'Cristo', 'Señor' u otra terminología no presente en el texto fuente.
  - La puntuación reproduce la estructura de una sola cláusula principal con participio modal y lista adjetival final.
