translation:
  language: es
  text: Y Josías dio al pueblo, a los que estaban presentes[a], treinta mil corderos y cabritos[b], y tres mil becerros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «al pueblo, a los que fueron hallados allí»; aquí se refiere a los que estaban presentes o reunidos.
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo incluido en los datos no coincide de cerca con este versículo griego; por eso la traducción sigue el griego como texto primario.
    reason: textual_variant
lexical_decisions:
- source_word: ἐδωρήσατο
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - presentó
  - donó
  - otorgó como regalo
  lexicon: LSJ
  rationale: El aoristo medio de δωρέομαι expresa un dar como don. «Dio» es natural en español y mantiene la idea de una entrega efectiva sin añadir solemnidad innecesaria.
- source_word: τῷ λαῷ
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - para el pueblo
  - al pueblo reunido
  lexicon: LSJ
  rationale: El dativo marca destinatario; «al pueblo» conserva esa relación directa y suena natural en español bíblico moderno.
- source_word: τοῖς εὑρεθέντι
  english_pob_choice: who were present
  chosen_spanish: que estaba presente
  alternatives_spanish:
  - que fueron hallados
  - que estaban reunidos
  - que se encontraban allí
  lexicon: LSJ
  rationale: La expresión literalmente significa «los que fueron hallados», pero en contexto apunta a los asistentes/presentes. En español, «que estaba presente» comunica el sentido idiomático sin forzar el griego.
- source_word: ἀρνῶν
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - ovejas
  - corderos pequeños
  lexicon: LSJ
  rationale: ἀρνός designa un cordero; «corderos» es el equivalente directo y común en español para un contexto sacrificial.
- source_word: ἐρίφων
  english_pob_choice: young goats
  chosen_spanish: cabritos
  alternatives_spanish:
  - cabritos jóvenes
  - chivitos
  - cabrillos
  lexicon: LSJ
  rationale: ἔριφος es un cabrito o cría de cabra. «Cabritos» es la forma más natural y fiel en español, aunque la idea de juventud ya está implícita.
- source_word: τριακοντα χιλιάδας
  english_pob_choice: thirty thousand
  chosen_spanish: treinta mil
  alternatives_spanish:
  - treinta millares
  lexicon: LSJ
  rationale: Correspondencia numérica directa.
- source_word: μόσχους
  english_pob_choice: calves
  chosen_spanish: becerros
  alternatives_spanish:
  - terneros
  - novillos
  lexicon: LSJ
  rationale: μόσχος puede referir a un bovino joven. «Becerros» conserva esa referencia juvenil y es natural en español bíblico; evita precisar sexo como haría «novillos».
- source_word: τρισχιλίους
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  alternatives_spanish:
  - tres millares
  lexicon: LSJ
  rationale: Correspondencia numérica directa.
theological_decisions:
- issue: Relación entre el texto griego de 1 Esdras y el paralelo hebreo/MT proporcionado
  english_pob_reading: The translation therefore follows the Greek text as primary; the Hebrew parallel is only a sanity check.
  chosen_spanish_reading: La traducción sigue el griego como testimonio principal; el paralelo hebreo funciona solo como contraste de control.
  alternative_spanish_readings:
  - Una armonización con 2 Crónicas 35:7
  - Una traducción guiada por el paralelo hebreo
  rationale: El paquete fuente indica una discrepancia importante entre el griego de 1 Esdras y el paralelo hebreo. Por fidelidad al testimonio primario, el texto español mantiene la dádiva de animales a la gente y no incorpora la secuencia distinta del paralelo.
  doctrine_reference: 'PHILOSOPHY.md: 1 Esdras usa Swete LXX como fuente primaria; los paralelos WLC son de apoyo, no normativos cuando divergen.'
translation_notes:
  revision_awareness: El borrador sigue la última pasada de revisión sin cambios sustantivos; se mantiene la lectura griega primaria y la distinción textual frente al paralelo hebreo.
  spanish_consistency_notes:
  - Se usó «Y» inicial para reflejar el arranque narrativo del griego.
  - «Cabritos» y «becerros» mantienen un registro bíblico claro y moderno sin arcaizar en exceso.
  - No se introdujo «Cristo», «SEÑOR» ni otra terminología no sustentada por este versículo.
