translation:
  language: es
  text: Porque nuestra vida es el paso de una sombra[a], y no hay vuelta atrás de nuestro fin, porque ha sido sellado, y nadie vuelve atrás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no hay retorno de nuestra muerte». El griego usa términos que pueden expresarse de manera más explícita respecto de la muerte, pero el texto principal conserva la formulación más amplia «fin».
    reason: lexical_alternative
  - marker: b
    text: O «nadie se vuelve atrás».
    reason: lexical_alternative
lexical_decisions:
- source_word: σκιᾶς
  english_pob_choice: shadow
  chosen_spanish: sombra
  alternatives_spanish:
  - sombra proyectada
  - sombra fugitiva
  lexicon: LSJ
  rationale: σκιᾶς presenta la imagen de fugacidad; «sombra» conserva de manera natural en español la metáfora de algo breve y evanescente.
- source_word: πάροδος
  english_pob_choice: the passing
  chosen_spanish: el pasar
  alternatives_spanish:
  - el paso
  - el pasar de
  - la pasajera condición
  lexicon: LSJ
  rationale: πάροδος expresa tránsito o paso; «el pasar» suena natural en español y mantiene la idea de transitoriedad sin perder la metáfora.
- source_word: βίος
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - modo de vida
  - existencia
  lexicon: LSJ
  rationale: Aquí βίος designa la vida humana en general, no el sustento; «vida» es la correspondencia directa y clara.
- source_word: ἀναποδισμός
  english_pob_choice: turning back
  chosen_spanish: vuelta atrás
  alternatives_spanish:
  - retorno
  - retroceso
  lexicon: LSJ
  rationale: El sustantivo raro ἀναποδισμός comunica la idea de regresar o volver; «vuelta atrás» conserva esa fuerza sin cargar el texto con categorías doctrinales ajenas.
- source_word: τελευτή
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - muerte
  - término
  lexicon: LSJ
  rationale: τελευτή puede significar fin o muerte; «fin» preserva el alcance amplio que el inglés mantiene con «end», y el contexto ya sugiere la muerte.
- source_word: κατεσφραγίσθη
  english_pob_choice: has been sealed
  chosen_spanish: ha sido sellado
  alternatives_spanish:
  - fue sellado
  - ha quedado sellado
  lexicon: LSJ
  rationale: El pasivo de σφραγίζω significa literalmente «sellar»; «ha sido sellado» conserva el estado resultante y la idea de irrevocabilidad.
- source_word: ἀναστρέφει
  english_pob_choice: turns back
  chosen_spanish: se vuelve atrás
  alternatives_spanish:
  - regresa
  - vuelve atrás
  lexicon: LSJ
  rationale: El verbo expresa volver o regresar; «se vuelve atrás» sigue de cerca el paralelo con «vuelta atrás» y evita suavizar el énfasis final.
theological_decisions:
- issue: Si τελευτή debe explicitarse como «muerte» o mantenerse más amplio
  english_pob_reading: end
  chosen_spanish_reading: fin
  alternative_spanish_readings:
  - muerte
  rationale: El griego puede referirse a la muerte, pero la frase destaca la irreversibilidad del destino humano; «fin» conserva esa amplitud y deja que el contexto lleve el peso mortal.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cómo traducir la afirmación final sin añadir una formulación doctrinal ajena
  english_pob_reading: no one turns back
  chosen_spanish_reading: nadie se vuelve atrás
  alternative_spanish_readings:
  - nadie regresa
  - nadie vuelve atrás
  rationale: La cláusula griega afirma la imposibilidad de retorno de forma sobria. «Nadie se vuelve atrás» reproduce esa sobriedad y mantiene la relación semántica con la cláusula anterior.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del inglés POB, que pasó de «no one returns» a «no one turns back» para ajustarse mejor a ἀναστρέφει y al paralelismo con ἀναποδισμός. En español, esa coherencia se conservó mediante «no hay vuelta atrás» / «nadie se vuelve atrás».
  spanish_consistency_notes:
  - Se mantuvo el núcleo metafórico de «sombra» para σκιᾶς, sin sustituirlo por una glosa explicativa.
  - «Fin» se eligió para τελευτή por su amplitud, en línea con el inglés POB y sin forzar «muerte» en el texto principal.
  - 'La repetición de la idea de retorno se resolvió con dos formas emparentadas pero no idénticas: «no hay vuelta atrás» y «nadie se vuelve atrás», para reflejar el paralelismo del griego.'
  - Se evitó «Señor» u otra terminología no pertinente; el verso no contiene léxico divino directo.
  - El tono es digno y publicable, con sintaxis natural en español latinoamericano.
