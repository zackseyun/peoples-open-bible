  yaml_path: translation/nt/revelation/021/005.yaml
  text: And the one seated on the throne said[a], “Behold, I am making all things new.” And he said, “Write[b], because these words are trustworthy and true.”
  footnotes:
  - marker: a
    text: Or “I make everything new.” The Greek can be rendered with either 'all things' or 'everything'; 'all things' was chosen to preserve the broad, formal scope of the expression.
    reason: lexical_alternative
  - marker: b
    text: Or “these words are faithful and true.” 'Trustworthy' was chosen because it is more idiomatic in English when describing words, while preserving the sense of πιστοί.
    reason: lexical_alternative
