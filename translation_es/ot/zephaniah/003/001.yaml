  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y sigue de cerca la auditoría inglesa: הוֹי como denuncia profética («¡Ay de...!»), מֹרְאָה como «rebelde», וְנִגְאָלָה en sentido contextual de impureza moral, הָעִיר como «ciudad», y הַיּוֹנָה con la lectura contextual de opresión más nota alternativa sobre «la paloma».'
  spanish_quality_summary: 'La frase principal es natural y clara en español eclesial moderno. Sin embargo, hay problemas de calidad léxica y ortográfica en las notas y decisiones: «polluida» y «defileda» no son formas válidas en español. Además, la nota alternativa debería usar un equivalente español natural como «y contaminada» o mejor «y mancillada»/«y corrompida» según matiz; para preservar la distinción del inglés entre texto principal y alternativa, «contaminada» en el texto con nota «o “y mancillada”» funciona bien.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección «la opresora» es adecuada para הַיּוֹנָה según la racionalidad documentada, con nota sobre «la paloma».
  issues:
  - severity: medium
    issue: La nota al pie a usa «polluida», forma no estándar en español.
    rationale: Aunque busca reflejar el inglés «polluted», en español bíblico legible debe evitarse un préstamo deformado; «mancillada» o «corrompida» son alternativas naturales.
  - severity: medium
    issue: 'En las decisiones léxicas aparecen formas inválidas: «defileda» y «polluida».'
    rationale: Esto afecta la calidad editorial y puede contaminar revisiones posteriores, aunque no impide entender el texto principal.
  - severity: low
    issue: La nota a no refleja con suficiente naturalidad la alternativa documentada en inglés.
    rationale: La auditoría inglesa distingue «defiled» del alternativo «polluted»; en español conviene preservar una distinción comprensible, no una transliteración defectuosa.
  revised_spanish_text: ¡Ay de la ciudad rebelde y contaminada[a], la opresora[b]!
  revised_footnotes:
  - marker: a
    text: O «y mancillada».
    reason: lexical_alternative
  - marker: b
    text: Hebreo הַיּוֹנָה puede leerse más literalmente como «la paloma», pero en contexto suele entenderse como una descripción figurada de la ciudad como opresora.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, pero se corrigen las notas para eliminar formas españolas incorrectas y preservar mejor la alternativa léxica documentada por la POB inglesa.
