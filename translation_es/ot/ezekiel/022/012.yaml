  text: שֹׁ֥חַד לָֽקְחוּ בָ֖/ךְ לְמַ֣עַן שְׁפָךְ דָּ֑ם נֶ֧שֶׁךְ וְ/תַרְבִּ֣ית לָקַ֗חַתְּ וַ/תְּבַצְּעִ֤י רֵעַ֨יִ/ךְ֙ בַּ/עֹ֔שֶׁק וְ/אֹתִ֣/י שָׁכַ֔חַתְּ נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/022/012.yaml
  text: In you they have taken bribes to shed blood; you have taken interest and profit[a], and you have extorted your neighbors by oppression, and you have forgotten me, declares the Lord GOD.
