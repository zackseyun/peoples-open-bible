  yaml_path: translation/ot/psalms/027/008.yaml
  text: On your behalf my heart says[a], “Seek my face.” Your face, Yahweh[c][b], I seek.
  footnotes:
  - marker: a
    text: The Hebrew opening is difficult and may also be understood, 'To you my heart says,' or, with a slight shift in construal, 'My heart says of you, “Seek his face.”'
    reason: alternative_reading
  - marker: b
    text: Or 'Your presence, LORD, I seek.' Hebrew 'face' often carries the sense of personal presence.
    reason: lexical_alternative
  - marker: c
    text: Or 'I will seek.' The Hebrew verb can express present resolve or future intention.
    reason: lexical_alternative
