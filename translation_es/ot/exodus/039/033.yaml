translation:
  language: es
  text: 'Entonces llevaron el tabernáculo a Moisés: la tienda y todos sus enseres; sus broches, sus marcos[a], sus barras, sus pilares y sus bases[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tablas». El hebreo se refiere a las piezas estructurales verticales del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O «zócalos». El hebreo puede referirse a las piezas de base o encaje en las que se ajustaban los elementos estructurales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיאוּ
  english_pob_choice: Then they brought
  chosen_spanish: Entonces llevaron
  alternatives_spanish:
  - Y llevaron
  - Luego llevaron
  lexicon: HALOT
  rationale: El wayyiqtol marca secuencia narrativa. «Entonces» conserva la progresión; «llevaron» comunica el movimiento de acercar el objeto a Moisés con naturalidad en español.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario portátil
  lexicon: HALOT
  rationale: En este contexto cultual, «tabernáculo» es el equivalente estable y fiel al referente técnico de la morada sagrada.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - ante Moisés
  lexicon: HALOT
  rationale: אֶל indica dirección hacia una persona; «a Moisés» es la forma más directa y natural en español.
- source_word: הָאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - la tienda de reunión
  - la tienda
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «the tent», en español «tienda» es la opción natural y fiel para אֹהֶל en este pasaje, sin añadir una identificación que el hebreo aquí no explicita.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its furnishings
  chosen_spanish: todos sus muebles
  alternatives_spanish:
  - todos sus utensilios
  - todo su equipo
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para los elementos del conjunto. «Muebles» funciona aquí como término global en español para los componentes del tabernáculo, aunque de modo más general que «utensilios».
- source_word: קְרָסָיו
  english_pob_choice: its clasps
  chosen_spanish: sus [a]clavijas
  alternatives_spanish:
  - sus broches
  - sus ganchos
  lexicon: HALOT
  rationale: El audit trail inglés opta por «clasps», y el hebreo designa piezas de unión. En español se eligió «clavijas» por su función de fijación, pero se reconoce que el término puede expresar también una pieza de sujeción más amplia; por eso se marca la alternativa mediante nota.
- source_word: קְרָשָׁיו
  english_pob_choice: its frames
  chosen_spanish: sus marcos
  alternatives_spanish:
  - sus tablas
  - sus paneles
  lexicon: HALOT
  rationale: El inglés POB defendió «frames» frente a «boards» por la función estructural. «Marcos» comunica esa función en español sin fijar indebidamente la forma material.
- source_word: בְּרִיחָיו
  english_pob_choice: its bars
  chosen_spanish: sus barras
  alternatives_spanish:
  - sus travesaños
  - sus varas
  lexicon: HALOT
  rationale: בְּרִיחַ se refiere a los elementos largos que mantienen unidas las piezas. «Barras» es la correspondencia más clara y directa.
- source_word: עַמֻּדָיו
  english_pob_choice: its pillars
  chosen_spanish: sus pilares[b]
  alternatives_spanish:
  - sus columnas
  - sus postes
  lexicon: HALOT
  rationale: Se conserva «pilares» por cercanía al inglés POB y porque el término puede abarcar soportes verticales. La nota admite la alternativa funcional «postes» o «columnas» en caso de lectura más técnica.
- source_word: אֲדָנָיו
  english_pob_choice: its bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus zócalos
  - sus encajes
  lexicon: HALOT
  rationale: אֲדָנִים son las piezas de apoyo en las que se asentaban los elementos verticales. «Bases» es claro y fiel, y sigue de cerca la opción del inglés POB.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] está anclado en «clavijas» y [b] en «pilares».'
  spanish_consistency_notes:
  - 'Se mantuvo el orden enumerativo del hebreo: tabernáculo, tienda, muebles, piezas de unión, marcos, barras, pilares y bases.'
  - Se evitó traducir mecanicamente el inglés cuando el español requería una solución más natural, especialmente en הָאֹהֶל y כֵּלִים.
  - La terminología estructural se mantuvo estable y técnica para reflejar el conjunto cultual del pasaje.
