base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/013/003.yaml
  text: Jonathan struck down the Philistine garrison that was at Geba[a], and the Philistines heard of it. Then Saul blew the ram's horn throughout all the land, saying[b], “Let the Hebrews hear!”
  footnotes:
  - marker: a
    text: Or 'the Philistine prefect/governor'; the Hebrew term can denote either an official or a stationed military post. In this context, 'garrison' best fits the battle setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'blew the trumpet'; Hebrew shofar refers specifically to a horn, traditionally a ram's horn.
    reason: cultural_note
