  to: '¿No es esta la palabra que te hablamos en Egipto[a], diciendo: «Déjanos[b], y sirvamos a los egipcios»? Porque mejor es para nosotros servir a los egipcios que morir en el desierto.'
  rationale: Se corrigió el objeto indirecto a singular («te hablamos») para reflejar fielmente אֵלֶיךָ y se armonizó el imperativo citado a singular («Déjanos») por dirigirse a Moisés. También se depuró la nota del modismo hebreo para mayor claridad en español, manteniendo el resto del borrador que ya refleja bien el sentido del original y del expediente POB.
