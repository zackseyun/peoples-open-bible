translation:
  language: es
  text: Entonces el pueblo envió a Silo, y llevaron de allí el arca del pacto de Yahvé de los ejércitos[a], que está entronizado sobre los querubines. Y los dos hijos de Elí, Jofní y Finees[b], estaban allí con el arca del pacto de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Yahvé de las huestes”.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “que está entronizado entre los querubines” o “que está entronizado sobre los querubines”.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח הָעָם
  english_pob_choice: So the people sent to Shiloh
  chosen_spanish: Así, el pueblo envió a Shiló
  alternatives_spanish:
  - Entonces el pueblo envió a Shiló
  - Así, el pueblo mandó a Shiló
  lexicon: HALOT
  rationale: El hebreo presenta sujeto colectivo singular (“el pueblo”) con verbo singular, que en español puede conservarse naturalmente como colectivo singular. “Envió” sigue de cerca el acto de despachar hacia Shiló sin añadir un objeto no explícito.
- source_word: שִׁלֹה
  english_pob_choice: Shiloh
  chosen_spanish: Shiló
  alternatives_spanish:
  - Silo
  - Siló
  lexicon: Topónimo bíblico estándar
  rationale: Se translitera el nombre propio con forma hispana bíblica ampliamente inteligible. “Shiló” preserva la forma del hebreo sin forzar una grafía ajena al español.
- source_word: וַיִּשְׂאוּ מִשָּׁם
  english_pob_choice: and they carried from there
  chosen_spanish: y trajeron de allí
  alternatives_spanish:
  - y llevaron de allí
  - y tomaron de allí
  lexicon: HALOT
  rationale: “Trajeron” expresa con naturalidad el movimiento de traslado del arca desde ese lugar. Aunque “cargar” es literal, en español aquí suena más marcado y menos idiomático.
- source_word: אֲרוֹן בְּרִית
  english_pob_choice: the ark of the covenant
  chosen_spanish: el arca del pacto
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca de la alianza
  lexicon: HALOT
  rationale: “Pacto” conserva la relación covenantal sin sustituirla por una formulación eclesiástica. Se mantiene “arca” como término técnico bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se usa la forma española de la transliteración del nombre divino, conforme al criterio del proyecto, en lugar del sustituto tradicional “SEÑOR”. En un sintagma genitivo, “de Yahvé” resulta idiomático y fiel.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: Aunque el inglés POB usa “hosts”, en español “ejércitos” comunica mejor la fuerza semántica del título divino sin perder el sentido colectivo militar/celestial.
- source_word: יֹשֵׁב הַכְּרֻבִים
  english_pob_choice: who is enthroned above the cherubim
  chosen_spanish: que está entronizado sobre los querubines
  alternatives_spanish:
  - que está entronizado entre los querubines
  - que habita entre los querubines
  lexicon: HALOT
  rationale: Se conserva el valor de entronización del participio y la imagen espacial “sobre”, evitando especificar “entre” donde el hebreo permite la tensión interpretativa. “Entronizado” es más natural en español que un calco de “sentado”.
- source_word: וְשָׁם
  english_pob_choice: And ... were there
  chosen_spanish: Y ... estaban allí
  alternatives_spanish:
  - Y allí estaban
  - Y ... se hallaban allí
  lexicon: HALOT
  rationale: La partícula narrativa introduce la presencia local de los personajes; “estaban allí” reproduce bien el sentido de localización y escena.
- source_word: שְׁנֵי בְנֵי עֵלִי
  english_pob_choice: the two sons of Eli
  chosen_spanish: los dos hijos de Elí
  alternatives_spanish:
  - los dos hijos de Eli
  - los dos hijos de Elí
  lexicon: HALOT
  rationale: Se mantiene el orden y la relación de filiación de forma directa y transparente. “Elí” es la forma española usual del nombre.
- source_word: עִם אֲרוֹן בְּרִית הָאֱלֹהִים
  english_pob_choice: with the ark of the covenant of God
  chosen_spanish: con el arca del pacto de Dios
  alternatives_spanish:
  - junto al arca del pacto de Dios
  - con el arca del pacto divino
  lexicon: HALOT
  rationale: “Con” refleja la preposición עִם sin forzar un matiz espacial más específico. “De Dios” traduce fielmente אֱלֹהִים en este contexto singular.
- source_word: חָפְנִי וּפִינְחָס
  english_pob_choice: Hophni and Phinehas
  chosen_spanish: Jofní y Finees
  alternatives_spanish:
  - Hofní y Finees
  - Jofní y Fines
  lexicon: Transliteración estándar bíblica en español
  rationale: Se usa la forma hispana convencional de los nombres propios para una lectura eclesial natural. La transliteración no debe ocultar la identidad de los personajes.
theological_decisions:
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  rationale: El texto hebreo nombra directamente al Dios de Israel con el Tetragrama y el título צְבָאוֹת. “De los ejércitos” preserva el valor de poder/autoridad del título y evita la sustitución tradicional por “SEÑOR”.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula cultual יֹשֵׁב הַכְּרֻבִים
  english_pob_reading: who is enthroned above the cherubim
  chosen_spanish_reading: que está entronizado sobre los querubines
  alternative_spanish_readings:
  - que está entronizado entre los querubines
  - que habita sobre los querubines
  rationale: La construcción expresa la presencia real de Yahvé asociada con el arca. “Entro-nizado” comunica la realeza divina; “sobre” mantiene abierta la precisión espacial sin fijarla indebidamente.
  doctrine_reference: 'DOCTRINE.md: Rendering divine enthronement formulas'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el texto fuente y con la última revisión: no se requieren cambios textuales adicionales. Se mantiene la decisión del POB inglés de preservar el nombre divino y la fórmula de entronización, adaptándolas a un español bíblico natural.'
  spanish_consistency_notes:
  - Se preserva la distinción entre “pacto” y “alianza” para mantener continuidad terminológica con el proyecto.
  - Se traduce el Tetragrama como “Yahvé” en el cuerpo del texto, conforme al estándar del POB español.
  - Se mantiene la tensión interpretativa de יֹשֵׁב הַכְּרֻבִים sin resolverla de forma excesiva.
  - Los nombres propios se hispanizan para lectura pública, sin perder su identificación bíblica.
