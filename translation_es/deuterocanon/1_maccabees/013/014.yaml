translation:
  language: es
  text: Y Trifón supo que Simón había surgido en lugar de Jonatán, su hermano[a], y que iba a entrar en guerra contra él; y le envió embajadores, diciendo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «había tomado el lugar de Jonatán» o «había surgido en lugar de Jonatán». El griego ἀνέστη con ἀντί puede indicar sucesión, no solo levantarse físicamente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para entrar en batalla con él» o «para hacerle guerra». La expresión griega συνάπτειν αὐτῷ εἰς πόλεμον es un modismo de conflicto armado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: learned
  chosen_spanish: supo
  alternatives_spanish:
  - llegó a saber
  - se enteró
  lexicon: BDAG
  rationale: El aoristo de γινώσκω aquí expresa un hecho de toma de conocimiento; «supo» comunica ese ingreso a la información de forma natural y breve en español.
- source_word: ἀνέστη
  english_pob_choice: had arisen
  chosen_spanish: se había levantado
  alternatives_spanish:
  - había surgido
  - había tomado su lugar
  lexicon: BDAG
  rationale: Con ἀνέστη el griego conserva la imagen de levantarse/erigirse, y en contexto político puede sugerir sucesión. «Se había levantado» mantiene la imagen sin fijar demasiado la interpretación sucesoria.
- source_word: ἀντὶ Ἰωνάθου
  english_pob_choice: in place of Jonathan
  chosen_spanish: en lugar de Jonatán
  alternatives_spanish:
  - en vez de Jonatán
  - como sucesor de Jonatán
  lexicon: BDAG
  rationale: ἀντί expresa reemplazo o sustitución; «en lugar de» es idiomático y fiel, sin añadir explícitamente la glosa sucesoria que el griego solo sugiere por contexto.
- source_word: συνάπτειν αὐτῷ ... εἰς πόλεμον
  english_pob_choice: to engage in war against him
  chosen_spanish: entrar en guerra contra él
  alternatives_spanish:
  - entablar batalla con él
  - hacerle guerra
  lexicon: LSJ
  rationale: La expresión idiomática apunta a conflicto armado con él; «entrar en guerra contra él» reproduce el sentido bélico de manera natural y transparente en español.
- source_word: μέλλει
  english_pob_choice: was about to
  chosen_spanish: estaba por
  alternatives_spanish:
  - iba a
  - estaba a punto de
  lexicon: BDAG
  rationale: μέλλω indica inminencia o intención futura; «estaba por» conserva bien esa proximidad temporal sin sobredeterminar el matiz.
- source_word: ἀπέστειλεν ... πρέσβεις
  english_pob_choice: sent envoys
  chosen_spanish: le envió embajadores
  alternatives_spanish:
  - le envió enviados
  - le mandó mensajeros
  lexicon: BDAG
  rationale: πρέσβεις son representantes diplomáticos; «embajadores» preserva el tono formal y político del término mejor que «mensajeros».
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: BDAG
  rationale: El participio introduce el discurso que sigue; «diciendo» deja abierta la continuación y refleja la estructura del griego.
translation_notes:
  revision_awareness: El texto griego y el control inglés concuerdan de forma alta. Se mantuvo la sucesión implícita en ἀνέστη + ἀντί sin volverla más explícita de lo que permite el griego, y se tradujo la frase bélica con un giro español natural que conserva el matiz idiomático.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «Jonatán» y no «Jonathan» para adecuación al español bíblico.
  - «Embajadores» se eligió por el matiz diplomático de πρέσβεις; en notas se preservan alternativas más generales.
  - No hay decisiones teológicas controvertidas en este versículo; el principal punto es léxico-sintáctico.
