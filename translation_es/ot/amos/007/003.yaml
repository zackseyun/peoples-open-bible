translation:
  language: es
  text: 'Yahvé desistió[a] de esto: «No sucederá», dijo Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cambió de parecer» o «se compadeció». El verbo hebreo puede expresar desistimiento, pesar o un cambio en la acción prevista, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִחַם
  english_pob_choice: relented
  chosen_spanish: se arrepintió
  alternatives_spanish:
  - se retractó
  - cedió
  - cambió de parecer
  lexicon: HALOT
  rationale: En español, 'se arrepintió' reproduce bien el campo semántico de נחם en un contexto de retiro de juicio anunciado, aunque conserva cierta tensión antropopática. 'Se retractó' y 'cedió' expresan la acción, pero son menos naturales aquí; 'cambió de parecer' explicita más la idea cognitiva que la respuesta de acción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar ''Yahvé'' como nombre propio divino, no como sustitución litúrgica. ''SEÑOR'' oculta el nombre; ''Jehová'' no es la forma preferida del proyecto.'
- source_word: עַל זֹאת
  english_pob_choice: concerning this
  chosen_spanish: de esto
  alternatives_spanish:
  - con respecto a esto
  - acerca de esto
  - sobre esto
  lexicon: HALOT
  rationale: La construcción hebrea remite a la visión/jucio inmediatamente anterior. 'De esto' es breve y natural en español, y conserva la referencia sin añadir matiz interpretativo excesivo. Las alternativas son correctas pero más pesadas.
- source_word: לֹא תִהְיֶה
  english_pob_choice: It will not happen
  chosen_spanish: No sucederá
  alternatives_spanish:
  - No ocurrirá
  - No tendrá lugar
  - No llegará a pasar
  lexicon: HALOT
  rationale: La negación predice que el evento anunciado no acontecerá. 'No sucederá' es idiomático y directo; mantiene el carácter futuro e impersonal del hebreo. 'No ocurrirá' es equivalente, pero ligeramente más técnico; 'No tendrá lugar' suena más formal.
- source_word: אָמַר יְהוָה
  english_pob_choice: said Yahweh
  chosen_spanish: dijo Yahvé
  alternatives_spanish:
  - declaró Yahvé
  - dijo el Yahvé
  lexicon: HALOT
  rationale: El hebreo introduce la cita con un simple qatal de אמר. 'Dijo Yahvé' refleja esa forma de modo llano y fiel; 'declaró' añade solemnidad no exigida por el texto. 'Dijo el Yahvé' no es idiomático en español.
theological_decisions:
- issue: Lenguaje antropopático en נִחַם יְהוָה
  english_pob_reading: Render the verb as 'relented' and preserve the text's portrayal of God withdrawing announced judgment in response to intercession.
  chosen_spanish_reading: 'Traducir el verbo con una forma que mantenga la retirada del juicio anunciado sin borrar la tensión antropopática: ''se arrepintió''.'
  alternative_spanish_readings:
  - se retractó
  - cambió de parecer
  - se compadeció
  rationale: '''Se arrepintió'' es la forma más común para נחם en español, pero en un contexto divino no debe leerse como confesión de culpa humana. Se conserva así la tensión del texto: Yahvé revoca el castigo anunciado. ''Se compadeció'' desplaza el foco al motivo más que al cambio de acción.'
  doctrine_reference: 'DOCTRINE.md: Términos en disputa — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje mantiene el mismo sentido que el borrador inglés auditado, sin cambios revisionales en el paquete fuente. La única decisión sensible es la de נחם, donde se preserva la tensión entre el lenguaje humano aplicado a Dios y la retirada efectiva del juicio anunciado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para el Tetragrámaton, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como sustitución tipográfica para no ocultar el nombre divino.
  - '''No sucederá'' conserva la brevedad y el alcance futurivo del hebreo.'
  - La nota textual/lexical en la a admite las alternativas documentadas sin borrar la opción principal del texto.
