translation:
  language: es
  text: Él es veloz sobre la superficie de las aguas[a]; la porción de ellos en la tierra está maldita[b]; no se vuelve hacia el camino de las viñas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Él es ligero sobre la faz de las aguas’; el hebreo es difícil, y algunos entienden la apertura como una descripción de fugacidad más que de velocidad.
    reason: lexical_alternative
  - marker: b
    text: El hebreo es difícil; algunos leen ‘su porción en la tierra está maldita’ en vez de ‘la porción de ellos en la tierra está maldita’.
    reason: textual_variant
  - marker: c
    text: O ‘no se vuelve hacia la senda de las viñas’, posiblemente con el sentido de que ya no regresa a tierra cultivada o a lugares de prosperidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַֽל
  english_pob_choice: swift
  chosen_spanish: ágil
  alternatives_spanish:
  - ligero
  - rápido
  - veloz
  lexicon: HALOT
  rationale: El hebreo puede significar literalmente ‘ligero’, pero en este contexto de movimiento sobre el agua expresa vivacidad o rapidez. ‘Ágil’ conserva la idea de movimiento rápido sin forzar demasiado una imagen moderna.
- source_word: עַל פְּנֵי מַיִם
  english_pob_choice: on the surface of the waters
  chosen_spanish: sobre la superficie de las aguas
  alternatives_spanish:
  - sobre la faz de las aguas
  - sobre las aguas
  lexicon: HALOT
  rationale: La expresión reproduce de cerca el modismo hebreo. ‘Superficie’ comunica de forma natural el valor de פְּנֵי (‘rostro/faz’) y mantiene la imagen acuática.
- source_word: תְּקֻלַּ֣ל
  english_pob_choice: is cursed
  chosen_spanish: está maldita
  alternatives_spanish:
  - será maldita
  - es maldita
  - está maldecida
  lexicon: HALOT
  rationale: 'El Pual de קלל lleva naturalmente un valor pasivo: una maldición recae sobre la porción. ‘Está maldita’ suena más natural en español que ‘es maldita’ y conserva el pasivo resultante.'
- source_word: חֶלְקָתָם
  english_pob_choice: their portion
  chosen_spanish: su porción
  alternatives_spanish:
  - su heredad
  - su parte
  - su lote
  lexicon: HALOT
  rationale: Aunque el audit trail inglés opta por ‘their portion’ siguiendo el sufijo plural, en español ‘su porción’ evita una redundancia torpe y puede abarcar la misma referencia colectiva sin decidir de manera excesiva entre singular y plural.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: ‘Tierra’ mantiene el valor espacial y patrimonial del término, y funciona mejor que ‘país’ para esta imagen poética de posesión o heredad.
- source_word: לֹא יִפְנֶה
  english_pob_choice: he does not turn toward
  chosen_spanish: no se vuelve hacia
  alternatives_spanish:
  - no se dirige hacia
  - no vuelve hacia
  - no mira hacia
  lexicon: HALOT
  rationale: פנה expresa girar o volverse. ‘No se vuelve hacia’ conserva el verbo de movimiento y evita introducir un sentido de retorno más interpretativo que el hebreo no exige.
- source_word: דֶּרֶךְ כְּרָמִים
  english_pob_choice: the way of the vineyards
  chosen_spanish: el camino de las viñas
  alternatives_spanish:
  - la senda de las viñas
  - el camino de los viñedos
  - la ruta de las viñas
  lexicon: HALOT
  rationale: ‘Viñas’ mantiene la imagen agrícola concreta del hebreo כְּרָמִים y sugiere tanto el lugar cultivado como la prosperidad asociada. ‘Camino’ conserva la metáfora de un trayecto o acceso.
translation_notes:
  revision_awareness: Se mantuvo el estado de alta concordancia del pass más reciente sin aplicar revisiones adicionales; la redacción española busca preservar la imagen poética y las tensiones textuales documentadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se conservó ‘Yahvé’ solo cuando aparezca el Nombre divino; en este versículo no aplica.
  - Se evitó ‘Señor’ como sustituto automático del Nombre divino, conforme a la norma del proyecto.
  - ‘Viñas’ se prefirió a ‘viñedos’ para mantener la concreción del constructo hebreo כְּרָמִים.
  - Se usó un español neutral y publicable, con orden sintáctico natural pero cercano a la estructura del hebreo.
