translation:
  language: es
  text: Lo esencial para la vida humana es el agua, el fuego, el hierro y la sal; la harina de trigo[a], la leche y la miel; la sangre de la uva[b], el aceite y la ropa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de esta expresión es difícil en la tradición de Cairó; el paralelo griego apoya el sentido de harina fina de trigo.
    reason: textual_variant
  - marker: b
    text: El hebreo dice literalmente «la sangre de la uva»; puede referirse en sentido amplio a una bebida de uva, incluso vino, pero la traducción conserva la imagen del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ראש / ἀρχὴ
  english_pob_choice: the essentials
  chosen_spanish: las cosas esenciales
  alternatives_spanish:
  - las cosas principales
  - lo fundamental
  - los elementos esenciales
  lexicon: HALOT; LXX ἀρχή
  rationale: En este contexto, el término no señala un inicio temporal sino lo primordial o necesario para la vida. 'Las cosas esenciales' comunica bien esa fuerza en español y conserva el valor general del listado.
- source_word: לחיי אדם
  english_pob_choice: for human life
  chosen_spanish: para la vida humana
  alternatives_spanish:
  - para la vida del hombre
  - para la vida de las personas
  lexicon: HALOT
  rationale: 'El sentido es genérico: lo necesario para que la humanidad viva. ''Vida humana'' reproduce esa amplitud sin volver masculino el hebreo אדם.'
- source_word: מים / ὕδωρ
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua potable
  - el agua
  lexicon: HALOT
  rationale: Sustantivo concreto y directo; en español singular sin artículo funciona de manera natural en una lista general.
- source_word: אש / πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - lumbre
  - incendio
  lexicon: HALOT
  rationale: Renderización literal y transparente del elemento básico de la lista.
- source_word: ברזל / σίδηρος
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - metal
  lexicon: HALOT
  rationale: Se mantiene el material específico, no una generalización como 'metal', porque el hebreo y el griego nombran hierro de forma expresa.
- source_word: מלח / ἅλα
  english_pob_choice: salt
  chosen_spanish: sal
  alternatives_spanish:
  - sal común
  lexicon: HALOT
  rationale: Término básico y literal, equivalente en español a la necesidad alimentaria del listado.
- source_word: חלב חטה / σεμίδαλις πυροῦ
  english_pob_choice: wheat flour
  chosen_spanish: la harina de trigo
  alternatives_spanish:
  - la harina fina de trigo
  - la sémola de trigo
  lexicon: HALOT; Greek parallel
  rationale: El hebreo transmitido es difícil, pero el griego apoya con claridad la idea de un producto fino de trigo. 'Harina de trigo' es natural en español y conserva la referencia alimentaria sin sobreespecificar.
- source_word: חלב / γάλα
  english_pob_choice: milk
  chosen_spanish: la leche
  alternatives_spanish:
  - leche
  - la leche fresca
  lexicon: HALOT
  rationale: En este inventario de alimentos, el término se entiende de forma concreta como leche; el paralelo griego confirma esa lectura.
- source_word: דבש / μέλι
  english_pob_choice: honey
  chosen_spanish: la miel
  alternatives_spanish:
  - miel
  lexicon: HALOT
  rationale: Equivalente directo y estándar; coincide sin dificultad con el griego.
- source_word: דם עינב / αἷμα σταφυλῆς
  english_pob_choice: the blood of the grape
  chosen_spanish: la sangre de la uva
  alternatives_spanish:
  - el sangre de la uva
  - el jugo de la uva
  - el vino
  lexicon: HALOT; Greek parallel
  rationale: Se preserva la imagen vívida del original, en lugar de resolverla como 'vino', porque el hebreo y el griego expresan deliberadamente 'sangre de la uva'.
- source_word: יצהר / ἔλαιον
  english_pob_choice: oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - aceite de oliva
  - aceite
  lexicon: HALOT
  rationale: '''Aceite'' es natural en español y suficiente para el término del original; no se añade ''de oliva'' porque la fuente no lo explicita, aunque sea probable.'
- source_word: בגד / ἱμάτιον
  english_pob_choice: clothing
  chosen_spanish: la ropa
  alternatives_spanish:
  - la vestimenta
  - el vestido
  - el atuendo
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo; en español 'ropa' suena más natural y abarca la idea de vestimenta general mejor que un singular más técnico.
theological_decisions:
- issue: Generic human reference in אדם
  english_pob_reading: human life
  chosen_spanish_reading: vida humana
  alternative_spanish_readings:
  - vida del hombre
  - vida de la humanidad
  rationale: El texto habla de necesidades universales, no de varones en particular. 'Vida humana' mantiene la referencia inclusiva y evita una masculinización innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4, אָדָם entry
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo base con apoyo del paralelo griego para la secuencia de alimentos; no hubo revisiones posteriores que alteraran la lectura establecida por el contexto auditado. La traducción conserva la imagen poética de 'sangre de la uva' y resuelve la frase difícil de חלב חטה con una equivalencia española natural.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se prefirieron sustantivos concretos y una lista clara para reproducir el carácter enumerativo del hebreo y del griego.
  - Se evitó 'Cristo' o terminología eclesiástica ajena al texto.
  - '''Vida humana'' funciona como equivalente inclusivo de אדם sin perder la referencia genérica.'
