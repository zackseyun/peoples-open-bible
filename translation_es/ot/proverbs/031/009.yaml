revisions:
- from: Abre tu boca[a], juzga con justicia, y defiende la causa del pobre y del necesitado.
  to: Abre tu boca[a], juzga con justicia y aboga por la causa del pobre y del necesitado.
  rationale: Se mantiene la imagen hebrea 'Abre tu boca' y el marco judicial de 'juzga con justicia', pero se cambia 'defiende la causa' por 'aboga por la causa' para reflejar mejor el valor forense de וְדִין y alinearse con la revisión auditada del inglés POB ('plead the cause'). También se corrige la puntuación al español estándar y se ajusta la nota alternativa para concordar con la decisión léxica principal.
