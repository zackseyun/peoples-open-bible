translation:
  language: es
  text: Así que Jonás se levantó y fue a Nínive, conforme a la palabra de Yahvé. Ahora bien, Nínive era una ciudad sumamente grande delante de Dios[a], de camino de tres días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una ciudad sumamente grande'; el hebreo dice literalmente 'una ciudad grande para/delante de Dios', un modismo que puede expresar grandeza superlativa.
    reason: alternative_reading
  - marker: b
    text: O 'de tres días de jornada'. La expresión puede describir el tiempo necesario para atravesar la ciudad o para realizar una visita en ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: HALOT
  rationale: El hebreo marca la reacción narrativa de Jonás. En español, 'se levantó' conserva el movimiento inicial sin sonar forzado, y mantiene el tono narrativo sobrio del original.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - partió
  - se fue
  lexicon: HALOT
  rationale: הלך expresa el desplazamiento simple. 'Fue' es directo y natural en español, y preserva la secuencia narrativa sin añadir matices no presentes.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: La construcción indica conformidad con el mandato divino. 'Conforme a' es una equivalencia formal y clara. Se conserva 'Yahvé' por la decisión terminológica del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se translitera el nombre divino como 'Yahvé' para mantener visible el tetragrámaton, en lugar de sustituirlo por un título.
- source_word: עִיר גְּדוֹלָה
  english_pob_choice: an exceedingly great city
  chosen_spanish: una ciudad sumamente grande
  alternatives_spanish:
  - una ciudad muy grande
  - una ciudad extraordinariamente grande
  lexicon: HALOT
  rationale: גדולה significa 'grande' y, junto con la siguiente expresión, recibe fuerza intensificadora. 'Sumamente grande' refleja bien esa intensificación sin perder naturalidad.
- source_word: לֵאלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - para Dios
  - sumamente
  lexicon: HALOT
  rationale: El hebreo presenta literalmente 'a/para Dios', una construcción idiomática difícil. 'Delante de Dios' mantiene la referencia explícita a Dios y deja abierta la posible fuerza superlativa sin resolverla por completo.
- source_word: מַהֲלַךְ שְׁלֹשֶׁת יָמִים
  english_pob_choice: a journey of three days
  chosen_spanish: de tres días de camino
  alternatives_spanish:
  - un recorrido de tres días
  - una jornada de tres días
  lexicon: HALOT
  rationale: מהלך puede indicar trayecto o extensión recorrida. 'De tres días de camino' es una forma idiomática en español que conserva la medida sin precisar indebidamente si alude a recorrido, visita o tiempo de tránsito.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio de Dios en español, coherente con la política del proyecto y con el valor del texto hebreo, en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de לֵאלֹהִים en 'עיר גדולה לאלהים'
  english_pob_reading: 'retain explicit God-language with idiomatic superlative force: ''an exceedingly great city before God'''
  chosen_spanish_reading: 'mantener el lenguaje explícito de Dios con fuerza idiomática: ''una ciudad sumamente grande delante de Dios'''
  alternative_spanish_readings:
  - '''una ciudad extraordinariamente grande'' sin mención explícita de Dios'
  - '''una ciudad grande para Dios'''
  rationale: El hebreo menciona explícitamente a Dios; por eso la traducción principal no elimina esa referencia. A la vez, 'sumamente grande' comunica la posible fuerza superlativa que la tradición exegética reconoce en la expresión.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'very great city' a 'exceedingly great city' para reflejar mejor la intensificación del hebreo. En español, 'sumamente grande' sigue esa revisión y conserva la mención explícita a Dios mediante 'delante de Dios'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme a la terminología del proyecto.
  - '''Jonás'' se usa como forma española estándar del nombre propio, sin afectar el análisis léxico.'
  - '''Delante de Dios'' conserva la ambigüedad idiomática de לֵאלֹהִים sin reducirla solo a un adverbio.'
  - '''De tres días de camino'' evita especificar más de lo que el hebreo permite sobre la medida del recorrido.'
