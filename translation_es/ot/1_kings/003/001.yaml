base_translation:
  language: en
  yaml_path: translation/ot/1_kings/003/001.yaml
  text: Solomon formed a marriage alliance with Pharaoh king of Egypt[a], and he took Pharaoh’s daughter and brought her into the city of David until he had finished building his own house, and the house of Yahweh[b], and the wall around Jerusalem.
  footnotes:
  - marker: a
    text: Or, 'became related by marriage to Pharaoh.' The Hebrew verb can emphasize entering a marriage relationship, here likely with political alliance overtones.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the temple of the LORD' for 'the house of the LORD.'
    reason: lexical_alternative
