translation:
  language: es
  text: Me deleito en hacer tu voluntad, mi Dios, y tu ley[a] está en mi interior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "tu instrucción". El hebreo torá puede denotar la enseñanza de Dios en un sentido más amplio, no solo mandatos legales.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - cumplir
  - realizar
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa el contenido de la acción deseada. En español, "hacer" es la forma más directa y natural para expresar esa obediencia activa sin añadir matices no presentes en el hebreo.
- source_word: רְצוֹנְךָ
  english_pob_choice: your will
  chosen_spanish: tu voluntad
  alternatives_spanish:
  - tu deseo
  - tu agrado
  lexicon: HALOT
  rationale: רָצוֹן puede ser voluntad, favor o deseo. En esta construcción, la equivalencia más clara y fiel en español es "tu voluntad", porque mantiene el sentido volitivo que requiere el verbo "hacer".
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  lexicon: HALOT
  rationale: El sufijo de primera persona singular hace explícito el address personal. "Mi Dios" es la correspondencia directa y natural en español.
- source_word: חָפָצְתִּי
  english_pob_choice: I delight
  chosen_spanish: me deleito
  alternatives_spanish:
  - me complazco
  - he deseado
  lexicon: HALOT
  rationale: חפץ expresa deleite, deseo o placer. El español "me deleito" comunica bien una disposición gozosa y voluntaria; además evita una lectura demasiado fría o meramente intelectual.
- source_word: וְתוֹרָתְךָ
  english_pob_choice: and your law
  chosen_spanish: y tu instrucción
  alternatives_spanish:
  - y tu ley
  lexicon: HALOT
  rationale: Tōrāh puede significar "ley" o "instrucción". Aquí se preserva la amplitud semántica con "instrucción", porque la nota inglesa ya documenta que el término no se restringe a estatutos legales; en español, esta opción comunica bien la enseñanza divina internalizada.
- source_word: בְּתוֹךְ
  english_pob_choice: within
  chosen_spanish: dentro de
  alternatives_spanish:
  - en medio de
  - en el interior de
  lexicon: HALOT
  rationale: La expresión indica ubicación interna. "Dentro de" es claro y sobrio en español moderno, y conserva la imagen de interioridad.
- source_word: מֵעָי
  english_pob_choice: my inner being
  chosen_spanish: mi ser interior
  alternatives_spanish:
  - mis entrañas
  - mi interior
  lexicon: HALOT
  rationale: מֵעֶה alude literalmente a las partes internas y, por extensión, a la sede de los afectos y la interioridad profunda. "Mi ser interior" preserva la fuerza antropológica sin recurrir a una imagen corporal que en español contemporáneo podría sonar demasiado dura o ambigua.
theological_decisions:
- issue: Cómo traducir תּוֹרָה en un contexto devocional e interiorizado
  english_pob_reading: law
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - ley
  rationale: La decisión prioriza el rango semántico más amplio de תּוֹרָה, tal como señala la nota inglesa. "Instrucción" mantiene la idea de enseñanza divina que habita interiormente; "ley" se conserva como alternativa válida, pero podría estrechar indebidamente el sentido aquí.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave) y §6 (claridad moderna)
- issue: Expresar la interioridad de מֵעָי sin perder su fuerza semítica
  english_pob_reading: my inner being
  chosen_spanish_reading: mi ser interior
  alternative_spanish_readings:
  - mis entrañas
  - mi interior
  rationale: La antropología bíblica usa un lenguaje visceral para hablar del centro personal. En español, "ser interior" comunica esa realidad profunda de forma digna y comprensible, sin desdibujar la interioridad corporal-metafórica del hebreo.
  doctrine_reference: Principios POB de transparencia lexical y claridad idiomática
translation_notes:
  revision_awareness: El texto inglés más reciente no presenta cambios respecto del estado anterior y mantiene alta concordancia; por eso la versión española sigue de cerca su solución léxica central, ajustando solo el término de תּוֹרָה para hacer visible su amplitud semántica en español.
  spanish_consistency_notes:
  - 'Se mantuvo la primera persona singular y el paralelismo del hebreo: deleite en hacer la voluntad divina, seguido de la interiorización de la torá.'
  - Se evitó traducir "YHWH" porque el verso hebreo aquí usa אֱלֹהַי ('mi Dios'), no el tetragrámaton.
  - Se usó un registro moderno y reverente, sin recurrir a fórmulas litúrgicas fijas que pudieran ocultar el matiz lexical.
  - La nota al pie se ancla en "instrucción" para preservar la alternativa semántica documentada.
