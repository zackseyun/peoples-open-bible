base_translation:
  language: en
  yaml_path: translation/ot/leviticus/001/005.yaml
  text: And he shall slaughter the bull before Yahweh[a], and Aaron’s sons, the priests, shall present the blood and sprinkle the blood on the altar all around[b], which is at the entrance of the tent of meeting.
  footnotes:
  - marker: a
    text: Or 'dash the blood' or, more traditionally, 'sprinkle the blood.' The Hebrew verb denotes throwing/tossing the blood in ritual application.
    reason: lexical_alternative
  - marker: b
    text: Literally 'son of the herd,' an idiom for a bovine animal; here rendered 'young bull.'
    reason: lexical_alternative
