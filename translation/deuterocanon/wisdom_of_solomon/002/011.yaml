translation:
  text: But let our strength be the law of justice[a], for what is weak is shown to be useless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the law of justice.' Greek δικαιοσύνη can denote both righteousness and justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστω
  chosen: let ... be
  alternatives:
  - may ... be
  - shall ... be
  lexicon: LSJ
  rationale: Third-person imperative of εἰμί; English idiom is best conveyed with 'let ... be' in this hortatory context.
- source_word: ἰσχὺς
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: LSJ
  rationale: ἰσχύς denotes strength or force. 'Strength' is the most natural broad rendering here, preserving the sense of power without over-specifying political or military force.
- source_word: νόμος
  chosen: law
  alternatives:
  - rule
  - standard
  lexicon: LSJ
  rationale: νόμος commonly means 'law' or governing norm. Here the wicked propose that their strength should function as the governing principle; 'law' preserves the sharpness of the claim.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: Following the project's default for δικαιοσύνη, 'righteousness' is used in the main text. In this context 'justice' is also plausible because the phrase concerns social norm and right order, so the alternative is preserved in a footnote.
- source_word: ἀσθενές
  chosen: what is weak
  alternatives:
  - the weak thing
  - what is feeble
  lexicon: LSJ
  rationale: The neuter singular adjective is used substantivally. 'What is weak' gives idiomatic English while preserving the generalized principle rather than narrowing it to a person.
- source_word: ἄχρηστον
  chosen: useless
  alternatives:
  - worthless
  - unserviceable
  lexicon: LSJ
  rationale: ἄχρηστος means not useful or of no use. 'Useless' is clear modern English and fits the cynical logic of the speakers.
- source_word: ἐλέγχεται
  chosen: is proved
  alternatives:
  - is shown
  - is exposed
  - is convicted
  lexicon: LSJ
  rationale: ἐλέγχω can mean expose, refute, or prove. Here the sense is that weakness is demonstrated to be useless by the speakers' principle. 'Is proved' best fits the predicate construction in English without importing a judicial nuance too strongly.
