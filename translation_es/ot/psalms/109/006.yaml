revisions:
- from: Pon un hombre malvado sobre él[a], y que un acusador[b] se ponga a su diestra.
  to: Designa a un hombre malvado sobre él, y que un acusador[a] esté a su diestra.
  rationale: Se ajusta «Pon» a «Designa» para reflejar mejor הַפְקֵד y el sentido de nombramiento sobre alguien. Se elimina la nota sobre «contra él» por ser innecesaria en español y no estar preservada en la auditoría inglesa. Se conserva la nota sobre «Satanás» porque documenta una alternativa interpretativa real y tradicional sin imponerla en el texto principal. También se simplifica ligeramente el segundo miembro con «esté a su diestra», que mantiene bien el valor yusivo y el idiomatismo bíblico.
