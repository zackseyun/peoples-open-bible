translation:
  language: es
  text: Así que quítenle el talento y dénselo al que tiene los diez talentos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tómenlo». El imperativo griego puede traducirse como tomar o quitar; aquí se eligió una formulación más natural en español.
    reason: lexical_alternative
  - marker: b
    text: Un «talento» era una gran unidad de peso y, por extensión, de valor o dinero.
    reason: cultural_note
lexical_decisions:
- source_word: ἄρατε
  english_pob_choice: take
  chosen_spanish: quítenle
  alternatives_spanish:
  - tómenle
  - retírenle
  - quítenlo
  lexicon: BDAG
  rationale: El imperativo plural de αἴρω aquí pide una acción de retiro o remoción. En español, «quitarle» expresa con naturalidad la idea de quitar algo a alguien y conserva la fuerza imperativa sin sonar forzado. Prefiero «quítenle» frente a «tómenlo» porque en contexto el movimiento es desde una persona, no solo la toma del objeto.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - por eso
  - entonces
  lexicon: BDAG
  rationale: La partícula introduce la conclusión de la sentencia anterior. «Así que» mantiene el valor inferencial en un español corriente y solemne, sin endurecer demasiado el registro.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: le
  alternatives_spanish:
  - de él
  - de parte de él
  - a él
  lexicon: BDAG
  rationale: La preposición ἀπό con genitivo marca separación. En español, el dativo pronominal «le» integrado con «quitar» comunica de manera idiomática la idea de retirar algo de una persona. Como el verbo ya implica la separación, no hace falta repetir «de él» en el texto principal.
- source_word: τὸ τάλαντον
  english_pob_choice: the talent
  chosen_spanish: el talento
  alternatives_spanish:
  - la suma
  - el dinero
  lexicon: BDAG
  rationale: Conservo el término histórico «talento» porque el contexto parabólico lo presenta como una unidad de valor entregada y quitada, no como capacidad personal. En español bíblico, «talento» es reconocible y mantiene la correspondencia con el griego.
- source_word: δότε
  english_pob_choice: give
  chosen_spanish: dénselo
  alternatives_spanish:
  - denlo
  - entréguenlo
  - pásenlo
  lexicon: BDAG
  rationale: El imperativo de δίδωμι se expresa bien con «dar». Aquí, por la referencia a un objeto concreto ya conocido, «dénselo» mantiene la fuerza de entrega y el enlace con la persona destinataria.
- source_word: τῷ ἔχοντι
  english_pob_choice: to the one who has
  chosen_spanish: al que tiene
  alternatives_spanish:
  - al que posee
  - al que lo tiene
  - a quien tiene
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente. «Al que tiene» es natural en español y preserva la referencia sin añadir matices de posesión más fuertes que los del griego.
- source_word: τὰ δέκα τάλαντα
  english_pob_choice: the ten talents
  chosen_spanish: los diez talentos
  alternatives_spanish:
  - diez talentos
  - los diez talentos ya mencionados
  lexicon: BDAG
  rationale: El artículo griego apunta al conjunto específico ya mencionado. En español, «los diez talentos» refleja esa especificidad y deja claro que se trata del monto ya asignado en la parábola.
theological_decisions:
- issue: Sentido de τάλαντον en la parábola
  english_pob_reading: Rendered as the historical monetary term 'talent' rather than interpreting it as innate ability.
  chosen_spanish_reading: Se traduce como «talento» en sentido monetario/histórico, no como capacidad personal.
  alternative_spanish_readings:
  - habilidad
  - don
  - capacidad
  rationale: El contexto inmediato trata de una suma entregada, retirada y reasignada; por tanto, el valor es económico o de peso, no psicológico o vocacional. Mantener «talento» conserva la imagen histórica y evita importar el sentido moderno de «talento» como aptitud natural.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión disponible muestra acuerdo alto y no introdujo cambios; se mantiene la lectura monetaria de τάλαντον y la conclusión inferencial de οὖν, con una formulación española más idiomática para el imperativo de αἴρω y el dativo de destino.
  spanish_consistency_notes:
  - Se conserva «talento» en sentido histórico para evitar el falso amigo de «talento» = capacidad.
  - Se usa «Así que» para οὖν como conector conclusivo de registro bíblico contemporáneo.
  - El objeto indirecto en «dénselo» refleja el destinatario de δότε y evita redundancia.
  - No se introduce terminología eclesiástica tradicional no requerida por el griego.
