lexical_decisions:
- source_word: וּ/בֶ֨לַע֙
  english_pob_choice: and Bela
  chosen_spanish: y Bela
  alternatives_spanish:
  - Bela
  lexicon: HALOT
  rationale: Conserva la continuidad coordinada de la lista genealógica con una conjunción explícita; el nombre propio se translitera como en la tradición onomástica bíblica.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una genealogía, el hebreo בן expresa descendencia lineal; en español, «hijo de» mantiene la forma genealógica directa sin debilitar la relación.
- source_word: עָזָז
  english_pob_choice: Azaz
  chosen_spanish: Azaz
  lexicon: HALOT
  rationale: Nombre propio transliterado.
- source_word: שֶׁמַע
  english_pob_choice: Shema
  chosen_spanish: Shema
  lexicon: HALOT
  rationale: Nombre propio transliterado.
- source_word: יוֹאֵל
  english_pob_choice: Joel
  chosen_spanish: Joel
  lexicon: HALOT
  rationale: Nombre propio transliterado por convención establecida.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - este
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente resalta y retoma al sujeto; en español, «él» conserva ese énfasis sin añadir interpretación.
- source_word: יוֹשֵׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - moró
  - estaba viviendo
  lexicon: HALOT
  rationale: El participio qal de ישׁב denota residir/establecerse. «Habitó» preserva el valor de residencia y sigue siendo natural en español bíblico contemporáneo.
- source_word: בַּ/עֲרֹעֵר
  english_pob_choice: in Aroer
  chosen_spanish: en Aroer
  alternatives_spanish:
  - en Aroer
  lexicon: HALOT
  rationale: La preposición locativa exige una traducción directa; «en» es la opción natural para residencia en una localidad.
- source_word: וְ/עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - y hasta
  lexicon: HALOT
  rationale: La expresión marca el límite geográfico de la extensión territorial; «hasta» comunica la frontera de forma clara y concisa en español.
- source_word: נְבוֹ
  english_pob_choice: Nebo
  chosen_spanish: Nebo
  lexicon: HALOT
  rationale: Nombre de lugar transliterado.
- source_word: וּ/בַ֥עַל מְעֽוֹן
  english_pob_choice: and Baal-meon
  chosen_spanish: y Baal-meón
  alternatives_spanish:
  - Baal-meón
  lexicon: HALOT
  rationale: Se trata de un topónimo compuesto; se conserva la coordinación y se translitera con guion para reflejar la forma establecida del nombre.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada; el texto ahora no contiene marcas de nota, de modo que no queda ningún pie sin correspondencia en la traducción.
  spanish_consistency_notes:
  - Se mantuvo el estilo genealógico conciso del hebreo.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el hebreo.
  - Se prefirió «habitó» para conservar el matiz de residencia del participio hebreo sin arcaísmo excesivo.
  - Los nombres propios se transliteran de manera consistente en español.
  - El topónimo compuesto se normalizó como «Baal-meón» para la lectura en español.
