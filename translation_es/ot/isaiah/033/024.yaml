- from: 'Y ningún habitante dirá[a]: «Estoy enfermo»; el pueblo que habita allí tiene su iniquidad llevada away.'
  to: 'Y ningún habitante dirá[a]: «Estoy enfermo»; el pueblo que habita allí es perdonado de su iniquidad.'
