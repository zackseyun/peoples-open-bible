  text: וְ/הִקְרַבְתֶּ֨ם אִשֶּׁ֤ה עֹלָה֙ לַֽ/יהוָ֔ה פָּרִ֧ים בְּנֵי בָקָ֛ר שְׁנַ֖יִם וְ/אַ֣יִל אֶחָ֑ד וְ/שִׁבְעָ֤ה כְבָשִׂים֙ בְּנֵ֣י שָׁנָ֔ה תְּמִימִ֖ם יִהְי֥וּ לָ/כֶֽם־׃
