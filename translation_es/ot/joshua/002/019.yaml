base_translation:
  language: en
  yaml_path: translation/ot/joshua/002/019.yaml
  text: And it shall be that anyone who goes out from the doors of your house to the outside—his blood shall be on his own head[a], and we shall be innocent[b]. But everyone who is with you in the house—his blood shall be on our heads if a hand is laid on him.
  footnotes:
