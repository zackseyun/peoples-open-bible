translation:
  language: es
  text: No a nosotros, Yahvé, no a nosotros, sino a tu nombre da gloria, a causa de tu amor firme, a causa de tu fidelidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a causa de tu amor firme, a causa de tu verdad».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo contiene el Nombre propio divino. En el proyecto, la forma preferida en español es «Yahvé», que preserva el nombre del pacto sin ocultarlo con un título genérico.
- source_word: לֹא לָנוּ ... לֹא לָנוּ
  english_pob_choice: Not to us ... not to us
  chosen_spanish: No a nosotros ... no a nosotros
  alternatives_spanish:
  - No para nosotros ... no para nosotros
  - No nos corresponde ... no nos corresponde
  lexicon: HALOT
  rationale: La construcción con ל indica exclusión enfática. «No a nosotros» conserva la repetición poética y la negación de que la gloria pertenezca a los hablantes.
- source_word: תֵּן כָּבוֹד
  english_pob_choice: give glory
  chosen_spanish: da gloria
  alternatives_spanish:
  - concede gloria
  - atribuye gloria
  lexicon: HALOT
  rationale: «Da gloria» reproduce con naturalidad el imperativo hebreo. «Atribuye gloria» sería más interpretativa; «concede gloria» suena menos directo en este contexto.
- source_word: לְשִׁמְךָ
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - para tu nombre
  - a tu reputación
  lexicon: HALOT
  rationale: El hebreo mantiene la imagen concreta de «nombre». En español, «a tu nombre» respeta la sintaxis del ruego y evita desglosar prematuramente el sentido de reputación o carácter.
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - por amor de
  lexicon: HALOT
  rationale: En los dos miembros finales, עַל introduce la base o motivo de la petición. «A causa de» expresa bien ese valor causal sin perder la relación con los sustantivos que siguen.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor firme
  alternatives_spanish:
  - tu amor constante
  - tu misericordia leal
  - tu amor fiel
  lexicon: HALOT
  rationale: חסד designa amor leal, de pacto, no solo afecto general. «Amor firme» comunica la constancia comprometida que la POB inglesa expresó con «steadfast love», y evita términos demasiado tradicionales o abstractos.
- source_word: אֲמִתֶּךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu verdad
  - tu veracidad
  - tu confiabilidad
  lexicon: HALOT
  rationale: En paralelo con חסד, אמת aquí apunta a la confiabilidad activa de Dios. «Fidelidad» es la forma más natural en español para este matiz relacional y covenantal.
theological_decisions:
- issue: Cómo tratar el Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura auditada del POB inglés preserva el Nombre propio en lugar de enmascararlo como título. En español, «Yahvé» mantiene esa decisión y es la forma establecida del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de אֲמִתֶּךָ junto a חַסְדְּךָ
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - verdad
  - veracidad
  rationale: La pareja חסד / אמת suele expresar amor leal y confiabilidad del pacto. «Fidelidad» conserva ese valor teológico sin neutralizar la posible resonancia de «verdad», que queda implícita en la semántica y el paralelismo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la revisión más reciente: no hay cambios aplicados y el consenso de auditoría es alto. Se mantuvo la decisión de traducir יהוה como nombre propio en español y de preservar el paralelismo causal de los dos miembros finales.'
  spanish_consistency_notes:
  - Se conserva la repetición enfática «No a nosotros ... no a nosotros».
  - «Yahvé» se usa como forma principal del Nombre divino, coherente con el proyecto.
  - «Amor firme» y «fidelidad» mantienen el paralelismo חסד / אמת sin imponer una sola glosa teológica.
  - La nota al pie ofrece la alternativa textual/lexical «verdad» sin desplazar la lectura principal.
