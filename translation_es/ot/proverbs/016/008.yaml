review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura comparativa del proverbio y el sentido general: es mejor tener poco con rectitud que mucha ganancia sin justicia. Sin embargo, no preserva adecuadamente la distinción léxica documentada entre צְדָקָה y מִשְׁפָּט. El hebreo y la auditoría inglesa piden términos distintos, con צדקה como rectitud/righteousness y משפט como justicia. El borrador usa «con justicia» para צדקה y «sin derecho» para משפט, lo que desplaza los matices: «sin derecho» suena en español a falta de título legal o autorización, más que a ausencia de justicia.'
  spanish_quality_summary: '«Mejor es poco ... que ...» es natural y digno. «Grandes ingresos» es comprensible, aunque «grandes ganancias» o «abundantes ingresos» también podrían funcionar. El principal problema de legibilidad/precisión es «sin derecho», que resulta menos idiomático y menos fiel al sentido ético-social de מִשְׁפָּט. Además, la nota al pie está mal anclada: el marcador aparece en «justicia», pero la nota trata de תְּבוּאוֹת.'
  glossary_alignment: Se debe respetar la decisión teológica/lexical de distinguir צְדָקָה y מִשְׁפָּט. En español, «rectitud» para בִּצְדָקָה y «justicia» para מִשְׁפָּט preservan claramente esa distinción. «Ingresos» es aceptable para תְּבוּאוֹת, pero la nota de alternativas debe anclarse en «ingresos», no en «justicia».
  issues:
  - severity: high
    issue: La distinción entre צְדָקָה y מִשְׁפָּט no se preserva fielmente.
    rationale: La auditoría inglesa exige distinguir 'righteousness' y 'justice'. «Con justicia» para צדקה y «sin derecho» para משפט no reflejan bien esa distinción; «sin derecho» introduce otro campo semántico.
  - severity: medium
    issue: El marcador de nota al pie está anclado a la palabra equivocada.
    rationale: La nota explica תְּבוּאוֹת («ingresos/cosechas/rendimientos»), pero el marcador [a] está puesto tras «justicia».
  - severity: low
    issue: «Sin derecho» suena menos natural y potencialmente ambiguo en español bíblico general.
    rationale: Puede entenderse como 'sin tener derecho/título' más que como 'sin justicia', debilitando el contraste sapiencial.
  revised_spanish_text: Mejor es poco con rectitud que grandes ingresos[a] sin justicia.
  revised_footnotes:
  - marker: a
    text: O «cosechas», «rendimientos» o «ganancias». El término hebreo puede referirse al producto agrícola o, más ampliamente, a retornos materiales.
    reason: lexical_alternative
  revision_rationale: Se cambia «con justicia» por «con rectitud» para reflejar mejor צְדָקָה y distinguirlo de מִשְׁפָּט, que se mantiene como «justicia». Se reemplaza «sin derecho» por «sin justicia» por fidelidad semántica y mejor español. Se mueve la nota al pie a «ingresos», que es el término al que realmente comenta.
