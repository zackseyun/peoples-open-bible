translation:
  text: |-
    And again, at another time, she said to me, “If you do not want to commit adultery, I will kill my husband with poison and take you as my husband.”
    
    2 So when I heard this, I tore my garments and said to her, “Woman, be ashamed before God, and do not do this lawless and evil deed, lest you be destroyed. For know this also: I will report your scheme to everyone.”
    
    3 Then she, being afraid, begged me not to report this scheme.
    
    4 And she went away, trying to win me over with gifts and every kind of pleasure.
