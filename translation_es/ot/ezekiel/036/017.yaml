revisions:
- from: Hijo de hombre[a], la casa de Israel, cuando habitaba en su propia tierra, la profanó con su camino y con sus obras; su camino delante de mí fue como la impureza de la mujer en su menstruación.
  to: Hijo de hombre[a], cuando la casa de Israel habitaba en su propia tierra, la contaminaron con su camino y con sus obras; su camino delante de mí era como la impureza de una mujer menstruante.
  rationale: Se corrige la concordancia verbal y se sustituye «profanó» por «contaminaron» para reflejar mejor טמא como impureza ritual-moral. También se suaviza la sintaxis inicial con «cuando la casa de Israel habitaba...», manteniendo «casa de Israel» y la imagen explícita de impureza menstrual. Se conserva una formulación clara y eclesialmente legible sin apartarse del audit trail.
