translation:
  language: es
  text: Los fuertes de corazón fueron despojados; durmieron su sueño[a], y ninguno de los hombres valientes pudo hallar sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ninguno de los hombres valientes pudo usar sus manos»; es decir, quedaron sin poder actuar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁתּוֹלְלוּ
  english_pob_choice: were plundered
  chosen_spanish: fueron despojados
  alternatives_spanish:
  - fueron saqueados
  - quedaron despojados
  - fueron despojados de sus bienes
  lexicon: HALOT
  rationale: El verbo hebreo, en su forma reflexiva/pasiva, expresa que los poderosos quedaron privados de sus bienes o recursos. En español, «despojados» conserva esa pérdida violenta sin sonar demasiado interpretativo.
- source_word: אַבִּירֵי לֵב
  english_pob_choice: the stouthearted
  chosen_spanish: los de corazón fuerte
  alternatives_spanish:
  - los valientes de corazón
  - los fuertes de corazón
  - los de ánimo firme
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «poderosos de corazón». «Los de corazón fuerte» mantiene la imagen interior de fuerza y evita una simplificación excesiva.
- source_word: נָמוּ שְׁנָתָם
  english_pob_choice: they slept their sleep
  chosen_spanish: dormían su sueño
  alternatives_spanish:
  - durmieron su sueño
  - se quedaron dormidos
  - dormían profundamente
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y poética. «Dormían su sueño» conserva la repetición cognada y deja abierta la fuerza del cuadro, sin forzar una interpretación adicional.
- source_word: אַנְשֵׁי חַיִל
  english_pob_choice: men of valor
  chosen_spanish: los hombres valientes
  alternatives_spanish:
  - los hombres de valor
  - los guerreros
  - los valientes
  lexicon: HALOT
  rationale: La frase es una expresión militar estándar. «Hombres valientes» es natural en español y conserva la referencia a combatientes fuertes o capaces.
- source_word: יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus manos
  - el uso de sus manos
  - su fuerza de obrar
  lexicon: HALOT
  rationale: La imagen literal de las «manos» se mantiene en el texto para transparencia. El sentido idiomático de incapacidad queda explicado en la nota.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante de WLC y la solución auditada del POB en inglés. La principal decisión fue conservar la imagen hebrea de «hallar sus manos» en el cuerpo del texto y explicarla como incapacidad para actuar en la nota, sin borrar la tensión entre literalidad e idiomatismo.
  spanish_consistency_notes:
  - Se usó «despojados» para mantener la fuerza pasiva/resultado del verbo hebreo.
  - Se evitó «señor» o vocabulario eclesiástico no presente en el hebreo.
  - Se conservó la imagen poética de «su sueño» como reflejo directo del hebreo.
  - Se prefirió «hombres valientes» en vez de «guerreros» para respetar la amplitud del hebreo.
  - La nota aclara la lectura idiomática de «hallar sus manos» sin reemplazarla en el texto principal.
