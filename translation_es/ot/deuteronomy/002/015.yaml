translation:
  language: es
  text: Además[a], la mano de Yahvé estaba contra ellos, para llenarlos de confusión[b] de en medio del campamento hasta que fueron consumidos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y además» o «Más aún»; el hebreo añade énfasis además de continuidad.
    reason: lexical_alternative
  - marker: b
    text: O «confundirlos», «trastornarlos» o «ponerlos en desorden»; el verbo hebreo puede denotar pánico o confusión como acto de juicio divino.
    reason: lexical_alternative
  - marker: c
    text: O «hasta que llegaron a su fin» o «hasta que perecieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - Y además
  - Asimismo
  - Más aún
  lexicon: HALOT
  rationale: El hebreo aporta continuación y énfasis; «Además» reproduce bien la conexión aditiva en español sin sonar rígido.
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - la mano de Yahvé
  - la mano de Yahveh
  lexicon: HALOT
  rationale: 'Conservo el modismo hebreo para la acción/poder divino y aplico el término base del proyecto para יְהוָה: «Yahvé».'
- source_word: בָם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - en su contra
  - contra los mismos
  lexicon: HALOT
  rationale: Con «la mano de Yahvé» la preposición expresa acción hostil dirigida a ellos; «contra ellos» es la forma natural en español.
- source_word: לְהֻמָּם
  english_pob_choice: to throw them into confusion
  chosen_spanish: para llenarlos de confusión
  alternatives_spanish:
  - para confundirlos
  - para ponerlos en confusión
  - para trastornarlos
  lexicon: HALOT
  rationale: El verbo puede denotar causar pánico, desconcierto o desorden. «Llenarlos de confusión» mantiene el efecto de juicio sin convertirlo prematuramente en destrucción física.
- source_word: מִקֶּרֶב הַמַּחֲנֶה
  english_pob_choice: from the midst of the camp
  chosen_spanish: desde en medio del campamento
  alternatives_spanish:
  - desde el centro del campamento
  - de en medio del campamento
  - desde el medio del campamento
  lexicon: HALOT
  rationale: «Desde en medio del campamento» conserva la imagen concreta de remoción desde el interior de la comunidad. Aunque algo marcado, refleja de cerca la expresión hebrea.
- source_word: עַד תֻמָּם
  english_pob_choice: until they were finished off
  chosen_spanish: hasta que fueron consumidos
  alternatives_spanish:
  - hasta que llegaron a su fin
  - hasta que perecieron
  - hasta su consumación
  lexicon: HALOT
  rationale: El resultado final del juicio puede expresarse como terminación/completamiento. «Consumidos» es una opción española bíblica y clara; mantiene la idea de finalización sin forzar un matiz no presente.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: Sigo el criterio del proyecto de no ocultar el Tetragrámaton bajo «SEÑOR». En español bíblico, «Yahvé» es la forma pública y readable que preserva el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del juicio expresado por לְהֻמָּם y la cláusula final
  english_pob_reading: to throw them into confusion ... until they were finished off
  chosen_spanish_reading: para llenarlos de confusión ... hasta que fueron consumidos
  alternative_spanish_readings:
  - para confundirlos ... hasta que perecieron
  - para ponerlos en desorden ... hasta que llegaron a su fin
  rationale: La lectura inglesa mantiene la tensión entre el acto inmediato de confusión y el desenlace de eliminación. En español, «consumidos» deja abierta esa tensión entre desorden judicial y consumación final, sin colapsar ambos elementos.
  doctrine_reference: Lexical note on המם / resultative completion
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene conforme al último pase auditado, con la misma lectura general del juicio divino y del nombre de Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, conforme al estándar del proyecto.
  - Se conserva el modismo «la mano de Yahvé» para reflejar el hebreo sin explicitarlo como simple metáfora.
  - «Consumidos» se usa para sostener la tensión entre confusión y término final, evitando una paráfrasis más interpretativa.
  - La frase «desde en medio del campamento» sigue de cerca la estructura hebrea y puede leerse de forma natural en un registro bíblico moderno.
