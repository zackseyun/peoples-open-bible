translation:
  language: es
  text: Después de haber también inscrito estas cosas en una estela[a], y de haber establecido un lugar de oración en el sitio del banquete, partieron ilesos, libres y rebosantes de alegría, siendo llevados a salvo por tierra, mar y ríos, por mandato del rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consagrándolas en una estela»; el participio griego también puede expresar la idea de dedicar o establecer públicamente una inscripción con carácter conmemorativo.
    reason: lexical_alternative
  - marker: b
    text: O «siendo preservados a salvo a través de tierra, mar y ríos». El participio griego subraya la preservación segura durante el viaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνιερώσαντες
  english_pob_choice: inscribing
  chosen_spanish: consagrado
  alternatives_spanish:
  - inscrito
  - dedicado
  - erigido públicamente
  lexicon: LSJ
  rationale: En este contexto con ἐν στήλῃ, el griego admite la idea de hacer una dedicación pública o de dejar una inscripción con valor memorial. En español, «consagrado» conserva el matiz de poner algo en uso público/sagrado sin forzar una mecánica de escritura explícita que el griego no exige de manera única.
- source_word: στήλῃ
  english_pob_choice: pillar
  chosen_spanish: columna
  alternatives_spanish:
  - pilar
  - estela
  - monumento
  lexicon: LSJ
  rationale: El término designa un soporte/monumento erigido para exhibición pública. «Columna» funciona con naturalidad en español y conserva la imagen de un marcador visible; «estela» sería más técnico.
- source_word: κατὰ τὸν τῆς συμποσίας τόπον
  english_pob_choice: at the site of the banquet
  chosen_spanish: en el sitio del banquete
  alternatives_spanish:
  - en el lugar del banquete
  - junto al lugar del banquete
  lexicon: LSJ
  rationale: La frase sitúa el lugar relacionado con el banquete. «Sitio» comunica bien la localización y mantiene el carácter narrativo concreto del griego.
- source_word: προσευχῆς
  english_pob_choice: of prayer
  chosen_spanish: de oración
  alternatives_spanish:
  - para oración
  lexicon: LSJ
  rationale: El genitivo con τόπον caracteriza el lugar como espacio de oración. «Lugar de oración» es la forma más natural y fiel en español.
- source_word: καθιδρύσαντες
  english_pob_choice: establishing
  chosen_spanish: establecido
  alternatives_spanish:
  - fundado
  - erigido
  - instaurado
  lexicon: LSJ
  rationale: El verbo expresa fijar o instalar algo de modo duradero. «Establecido» mantiene el sentido institucional y memorial, sin sugerir una acción meramente provisional.
- source_word: ἀνέλυσαν
  english_pob_choice: departed
  chosen_spanish: partieron
  alternatives_spanish:
  - salieron
  - se marcharon
  - volvieron
  lexicon: LSJ
  rationale: El verbo significa desatarse, partir o levantarse para irse. «Partieron» es natural en español y no añade la interpretación específica de «volvieron».
- source_word: ἀσινεῖς
  english_pob_choice: unharmed
  chosen_spanish: ilesos
  alternatives_spanish:
  - sin daño
  - sanos y salvos
  - sin heridas
  lexicon: LSJ
  rationale: El adjetivo indica ausencia de daño corporal o perjuicio. «Ilesos» es conciso y digno; «sanos y salvos» sería más interpretativo.
- source_word: ἐλεύθεροι
  english_pob_choice: free
  chosen_spanish: libres
  alternatives_spanish:
  - en libertad
  - libertados
  lexicon: LSJ
  rationale: La palabra expresa libertad/liberación. «Libres» reproduce el valor directo del adjetivo sin expandirlo.
- source_word: ὑπέρχαρεις
  english_pob_choice: overflowing with joy
  chosen_spanish: rebosantes de alegría
  alternatives_spanish:
  - sumamente alegres
  - desbordantes de gozo
  lexicon: LSJ
  rationale: El compuesto intensifica de manera marcada la alegría. «Rebosantes de alegría» conserva la fuerza enfática y suena natural en español bíblico contemporáneo.
- source_word: ἀνασωζόμενοι
  english_pob_choice: being brought safely back
  chosen_spanish: siendo resguardados con seguridad
  alternatives_spanish:
  - siendo preservados con seguridad
  - siendo llevados a salvo
  - siendo salvados a través
  lexicon: LSJ
  rationale: El participio apunta a una preservación segura durante el trayecto. «Resguardados con seguridad» refleja la idea de protección continua sin forzar un regreso explícito que el griego no nombra de manera obligatoria.
- source_word: διὰ τε γῆς καὶ θαλάσσης καὶ ποταμῶν
  english_pob_choice: by land and sea and river
  chosen_spanish: por tierra, mar y ríos
  alternatives_spanish:
  - a través de tierra, mar y ríos
  - por tierra y mar y ríos
  lexicon: LSJ
  rationale: La enumeración de rutas es tripartita y el plural ποταμῶν exige «ríos». «Por tierra, mar y ríos» es idiomático en español y conserva la secuencia de medios de viaje.
- source_word: τῇ τοῦ βασιλέως ἐπιταγῇ
  english_pob_choice: by the king’s command
  chosen_spanish: por la orden del rey
  alternatives_spanish:
  - por el mandato del rey
  - según la orden del rey
  - bajo la orden del rey
  lexicon: LSJ
  rationale: ἐπιταγή es una orden autoritativa. «Por la orden del rey» mantiene el sentido directo y la referencia a la autoridad real como medio del resguardo.
theological_decisions:
- issue: Valor memorial del acto en la columna
  english_pob_reading: They inscribed/dedicated the matter on a pillar as a public memorial action.
  chosen_spanish_reading: Consagraron estas cosas en una columna como acto público y memorial.
  alternative_spanish_readings:
  - Las inscribieron en una columna.
  - Las dedicaron en una columna.
  rationale: El griego permite tanto la idea de inscribir como la de dedicar públicamente. La formulación española conserva esa tensión sin cerrarla a una sola técnica de escritura, y mantiene el carácter conmemorativo del pasaje.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación entre preservación y autoridad del rey
  english_pob_reading: They were safely brought back by land and sea and rivers, by the king’s command, without explicitly naming God in the clause.
  chosen_spanish_reading: Fueron resguardados con seguridad por tierra, mar y ríos, por la orden del rey, sin introducir un sujeto divino explícito en esta cláusula.
  alternative_spanish_readings:
  - Fueron preservados con seguridad.
  - Regresaron a salvo por tierra, mar y ríos.
  rationale: 'El texto griego pone el acento en la preservación durante el trayecto y atribuye el medio inmediato a la orden real. La traducción conserva esa tensión: no borra el trasfondo providencial del relato, pero tampoco lo inserta de forma explícita en esta cláusula.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail que corrigió el plural de ποταμῶν a «rivers». La versión española refleja ese plural con «ríos» y mantiene el resto de las decisiones del contexto inglés auditable.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando corresponda; este versículo no contiene el nombre divino explícito.
  - Se evita traducir δοῦλος/siervo porque no aparece en este versículo.
  - «Mesías/Cristo» no interviene aquí.
  - La puntuación y el orden de las enumeraciones siguen un español publicable sin perder la estructura del griego.
