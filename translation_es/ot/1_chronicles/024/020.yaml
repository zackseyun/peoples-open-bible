review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura elíptica del hebreo y conserva la lógica de lista administrativa: «y/para los hijos de», «los restantes», «para los hijos de Amram», «para los hijos de Shubael». También preserva adecuadamente la nota cultural sobre la elipsis de los nombres representativos y la alternativa léxica para הַנּוֹתָרִים.'
  spanish_quality_summary: La redacción es mayormente clara y fiel, pero «los hijos de Leví que quedaban» suena menos natural y puede sugerir que algunos hijos estaban ausentes físicamente, en lugar de «los restantes hijos de Leví» como grupo residual dentro de la lista. Además, conviene hispanizar de forma consistente el nombre שׁוּבָאֵל como «Subael», ya que el borrador mezcla una transliteración inglesa («Shubael») con una forma española («Jehdeía»).
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Los nombres propios deben sonar naturales en español bíblico; por consistencia estilística conviene preferir «Subael» frente a «Shubael». La nota alternativa [b] ya respalda «los restantes hijos de Leví», que además mejora la lectura principal.
  issues:
  - severity: medium
    issue: «los hijos de Leví que quedaban» es poco idiomático en español
    rationale: Aunque comunica la idea básica de הַנּוֹתָרִים, en español de registro bíblico/neutral suena más natural y preciso «los restantes hijos de Leví» o «los hijos restantes de Leví». Evita una lectura demasiado verbal o circunstancial de «quedaban».
  - severity: medium
    issue: Transliteración inconsistente de שׁוּבָאֵל como «Shubael»
    rationale: El texto español usa una transliteración cercana al inglés para este nombre, mientras que otros nombres sí están adaptados al español. «Subael» es más legible y coherente con una meta de español eclesial general.
  revised_spanish_text: 'Y para los restantes hijos de Leví[b]: para los hijos de Amram[a], Subael; para los hijos de Subael, Jehdeía.'
