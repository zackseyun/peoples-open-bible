translation:
  language: es
  text: Que gocen de salud[a]. En el año ciento cuarenta y ocho, el quince de Xántico[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ὑγιαίνετε significa literalmente «estén sanos» o «estén bien»; aquí funciona como despedida convencional de carta.
    reason: lexical_alternative
  - marker: b
    text: Xántico era un nombre de mes macedonio usado en fórmulas de datación helenísticas.
    reason: cultural_note
lexical_decisions:
- source_word: ὑγιαίνετε
  english_pob_choice: Farewell
  chosen_spanish: ¡Salud!
  alternatives_spanish:
  - ¡Adiós!
  - ¡Que estén bien!
  lexicon: LSJ
  rationale: El griego ὑγιαίνετε funciona aquí como fórmula de despedida epistolar, literalmente 'estén sanos / estén bien'. En español, '¡Salud!' conserva la fuerza breve y formularia del cierre, sin convertirlo en una explicación más larga ni perder el matiz de bienestar.
- source_word: ἔτους
  english_pob_choice: year
  chosen_spanish: año
  alternatives_spanish:
  - del año
  lexicon: LSJ
  rationale: En la fórmula de datación, ἔτους introduce el año de la referencia cronológica; 'año' transmite ese valor de manera directa y natural en español.
- source_word: ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  english_pob_choice: one hundred forty-eighth
  chosen_spanish: ciento cuarenta y ocho
  alternatives_spanish:
  - ciento cuadragésimo octavo
  lexicon: LSJ
  rationale: La secuencia ordinal griega indica el número del año. En español, la forma ordinal completa suena más pesada; 'año ciento cuarenta y ocho' comunica con claridad la datación y preserva el sentido cronológico sin forzar una formulación artificial.
- source_word: Ξανθικοῦ
  english_pob_choice: Xanthicus
  chosen_spanish: Xántico
  alternatives_spanish:
  - Xánticos
  - Xanthicus
  lexicon: LSJ
  rationale: Es un nombre propio de mes macedonio usado en cronologías helenísticas. En español se translitera como 'Xántico' para mantener el carácter calendárico y la referencia histórica del término.
- source_word: πεντεκαιδεκάτῃ
  english_pob_choice: fifteenth day
  chosen_spanish: el quince
  alternatives_spanish:
  - el día quince
  - el quince día
  lexicon: LSJ
  rationale: La forma dativa en fórmula de fecha expresa el día del mes. En español, 'el quince' es una datación natural y concisa; el contexto ya deja claro que se trata del día del mes.
translation_notes:
  revision_awareness: El texto griego es breve y estable; el audit trail inglés coincide en que ὑγιαίνετε es una fórmula de despedida y que Xanthicus es un mes macedonio. La principal decisión española fue optar por una despedida breve y natural ('¡Salud!') y por una datación transparente ('año ciento cuarenta y ocho, el quince de Xántico'), sin añadir elementos que el griego no expresa.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible en español contemporáneo.
  - Se preserva la brevedad formularia del original sin expandir la fecha con palabras innecesarias.
  - Se translitera el nombre del mes de manera coherente con usos académicos y eclesiales en español.
