translation:
  language: es
  text: 'Vuélvanse, hijas mías; vayan, porque ya soy demasiado vieja para tener marido. Aun si dijera[a]: «Tengo esperanza»—aun si tuviera marido esta noche y también diera a luz hijos—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo presenta una cadena hipotética: «Porque si dijera: “Tengo esperanza”, aun si tuviera marido esta noche y también diera a luz hijos—»'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁבְנָה
  english_pob_choice: Turn back
  chosen_spanish: Vuélvanse
  alternatives_spanish:
  - Regresen
  - Vuelvan atrás
  lexicon: HALOT
  rationale: Imperativo femenino plural de שוב. «Vuélvanse» conserva la idea direccional de apartarse y regresar, y funciona naturalmente en español para el habla directa de Noemí a sus nueras.
- source_word: בְנֹתַי
  english_pob_choice: my daughters
  chosen_spanish: hijas mías
  alternatives_spanish:
  - mis hijas
  - hijitas mías
  lexicon: HALOT
  rationale: El término familiar expresa afecto y cercanía. «Hijas mías» mantiene el tono solemne y relacional, con inversión frecuente en español para el habla afectiva.
- source_word: לֵכְנָה
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - anden
  - sigan
  lexicon: HALOT
  rationale: Segundo imperativo femenino plural. «Vayan» es natural y directo; evita repetir la misma forma que el verbo anterior sin perder el mandato de continuar por su propio camino.
- source_word: זָקַנְתִּי
  english_pob_choice: I am too old
  chosen_spanish: ya soy demasiado vieja
  alternatives_spanish:
  - estoy muy vieja
  - ya he envejecido demasiado
  lexicon: HALOT
  rationale: El perfecto describe un estado presente resultante de haber envejecido. «Ya soy demasiado vieja» comunica la situación actual y la imposibilidad práctica de volver a casarse.
- source_word: מִהְיוֹת לְאִישׁ
  english_pob_choice: to have a husband
  chosen_spanish: para tener marido
  alternatives_spanish:
  - para casarme
  - para estar con un marido
  lexicon: HALOT
  rationale: El hebreo literalmente expresa la relación de estar/ser para un hombre o marido. «Para tener marido» refleja la decisión inglesa revisada por el equipo POB, conserva el sentido relacional y suena natural en español.
- source_word: כִּי אָמַרְתִּי
  english_pob_choice: Even if I should say
  chosen_spanish: Aunque dijera
  alternatives_spanish:
  - Si dijera
  - Aun si dijera
  lexicon: HALOT
  rationale: Aquí כי introduce un escenario hipotético. «Aunque dijera» expresa adecuadamente la condición imaginaria y mantiene el encadenamiento de hipótesis de Noemí.
- source_word: יֶשׁ לִי תִקְוָה
  english_pob_choice: I have hope
  chosen_spanish: Tengo esperanza
  alternatives_spanish:
  - Hay esperanza para mí
  - Aún tengo esperanza
  lexicon: HALOT
  rationale: La construcción existencial puede sonar en español como posesión idiomática. «Tengo esperanza» sigue la revisión inglesa más cercana al hebreo y no añade el adverbio «aún», que no está explícito.
- source_word: הָיִיתִי הַלַּיְלָה לְאִישׁ
  english_pob_choice: even if I should have a husband tonight
  chosen_spanish: aunque tuviera marido esta noche
  alternatives_spanish:
  - aunque consiguiera marido esta noche
  - aunque me uniera a un marido esta noche
  lexicon: HALOT
  rationale: La frase imagina una posibilidad inmediata e improbable. «Aunque tuviera marido esta noche» conserva el tiempo marcado por «esta noche» y evita introducir un rito matrimonial no explicitado.
- source_word: יָלַדְתִּי בָנִים
  english_pob_choice: and also bear sons
  chosen_spanish: y también diera a luz hijos
  alternatives_spanish:
  - y también pariera hijos
  - y también tuviera hijos
  lexicon: HALOT
  rationale: ילד con בנים refiere alumbramiento de hijos varones. «Diera a luz hijos» conserva el acto de dar a luz; se mantiene «hijos» porque el hebreo dice literalmente «hijos» y el contexto hace depender el argumento de descendencia masculina.
theological_decisions:
- issue: Preservación del lenguaje masculino específico en el argumento de la descendencia
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - varones
  - hijos varones
  - niños
  rationale: El hebreo usa בָנִים, y la línea argumental depende de la posibilidad de descendencia masculina dentro del contexto levirático. En español, «hijos» conserva el término explícito sin ampliar indebidamente a «niños»; el sentido de varones queda apoyado por el contexto, no por una neutralización innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4
- issue: Conservación de la cadena hipotética de Noemí
  english_pob_reading: a hypothetical chain of increasingly unlikely conditions
  chosen_spanish_reading: Aunque dijera… aunque tuviera marido esta noche y también diera a luz hijos
  alternative_spanish_readings:
  - Si dijera… si tuviera marido esta noche y también diera a luz hijos
  - Aun si dijera… aun si tuviera marido esta noche y también diera a luz hijos
  rationale: La fuerza del hebreo está en una serie de condiciones hipotéticas que se acumulan retóricamente. «Aunque… aunque…» reproduce bien esa escalera de imposibilidades sin convertirla en mera causalidad.
  doctrine_reference: RUTH 1:12 source syntax and English POB audit trail
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del texto auditado: se prefirió la forma breve del imperativo («go» → «vayan»), el valor más natural de מִהְיוֹת לְאִישׁ («to have a husband» → «para tener marido»), la expresión simple de la esperanza («I have hope» → «Tengo esperanza») y la coherencia condicional de la secuencia hipotética. También se evitó un calco rígido del inglés donde el español pedía un giro más idiomático.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó la relación familiar afectiva en «hijas mías» en vez de un término más coloquial como «chicas».
  - Se eligió «marido» por ser más natural en español para el contexto matrimonial inmediato; «hombre» quedaría demasiado amplio aquí.
  - Se evitó cambiar «hijos» por una forma genérica, para no borrar la referencia explícita a descendencia masculina en el razonamiento de Noemí.
