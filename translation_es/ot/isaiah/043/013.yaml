translation:
  language: es
  text: Ciertamente[a], desde aquel día en adelante yo soy el mismo, y no hay quien libre de mi mano; yo actúo[b], ¿y quién puede volverlo atrás?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''desde hoy en adelante'', ''desde tiempos antiguos'' o, de manera más interpretativa, ''desde la eternidad''. La frase hebrea es concisa y puede entenderse en más de un sentido temporal.'
    reason: alternative_reading
  - marker: b
    text: 'O: ''¿y quién puede revertirlo?''. El hebreo dice literalmente ''¿y quién puede volverlo atrás?'', en referencia a la acción de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Indeed
  chosen_spanish: Sí
  alternatives_spanish:
  - También
  - Ciertamente
  - De hecho
  lexicon: HALOT
  rationale: Aquí la partícula introduce una afirmación enfática. En español, 'Sí' comunica con naturalidad la fuerza asentativa de גַּם sin añadir contenido ajeno.
- source_word: מִיּוֹם
  english_pob_choice: from that day on
  chosen_spanish: desde aquel día
  alternatives_spanish:
  - desde ese día en adelante
  - desde hoy
  - desde entonces
  lexicon: HALOT
  rationale: La expresión es breve y temporalmente abierta. 'Desde aquel día' conserva la referencia a un punto de partida y permite en español el sentido continuativo de 'on' sin resolver indebidamente el alcance temporal.
- source_word: אֲנִי הוּא
  english_pob_choice: I am he
  chosen_spanish: yo soy él
  alternatives_spanish:
  - yo soy el que soy
  - yo soy
  - yo soy aquel
  lexicon: HALOT
  rationale: '''Yo soy él'' preserva la fórmula hebrea de autoidentificación y su peso teológico, evitando ampliar el texto hacia una formulación más interpretativa como ''el que soy''.'
- source_word: וְאֵין
  english_pob_choice: and there is none
  chosen_spanish: y no hay
  alternatives_spanish:
  - y no existe nadie
  - y no hay quien
  lexicon: HALOT
  rationale: La negación existencial se expresa de manera concisa en español. 'Y no hay' funciona bien con la cláusula relativa siguiente y mantiene el estilo elevado.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi mano
  - fuera de mi mano
  lexicon: HALOT
  rationale: El idiomatismo hebreo conserva la imagen de poder y control. 'De mi mano' es la forma natural en español y mantiene la metáfora.
- source_word: מַצִּיל
  english_pob_choice: who can deliver
  chosen_spanish: quien libere
  alternatives_spanish:
  - quien rescate
  - quien salve
  - un libertador
  lexicon: HALOT
  rationale: El participio tiene sentido de rescatar/liberar. 'Libere' expresa la fuerza verbal de acción efectiva y deja visible la relación con la imagen de la mano, aunque el español requiere una subordinada relativa implícita por el contexto.
- source_word: אֶפְעַל
  english_pob_choice: I act
  chosen_spanish: yo actúo
  alternatives_spanish:
  - yo obro
  - yo hago
  - yo obro con poder
  lexicon: HALOT
  rationale: פעל es amplio ('hacer/obrar/actuar'). 'Yo actúo' comunica con claridad la acción decisiva de Dios y evita sobreespecificar el tipo de obra.
- source_word: יְשִׁיבֶנָּה
  english_pob_choice: turn it back
  chosen_spanish: volverlo atrás
  alternatives_spanish:
  - revertirlo
  - hacerlo volver
  - deshacerlo
  lexicon: HALOT
  rationale: El hiphil de שוב indica hacer regresar o revertir una acción. 'Volverlo atrás' reproduce la imagen concreta del texto hebreo y la opción inglesa, manteniendo la fuerza retórica de la pregunta.
theological_decisions:
- issue: Alcance temporal de מִיּוֹם
  english_pob_reading: from that day on
  chosen_spanish_reading: desde aquel día
  alternative_spanish_readings:
  - desde hoy
  - desde la antigüedad
  - desde la eternidad
  rationale: La frase hebrea es breve y admite varias lecturas temporales. Se prefiere una formulación abierta que no fuerce una afirmación metafísica explícita más allá del pasaje mismo, conservando la tensión interpretativa documentada por la POB inglesa.
  doctrine_reference: Preservar la tensión textual; no resolverla por traducción.
- issue: Fórmula de autoidentificación אֲנִי הוּא
  english_pob_reading: I am he
  chosen_spanish_reading: yo soy él
  alternative_spanish_readings:
  - yo soy el que soy
  - yo soy
  - yo soy aquel
  rationale: La expresión mantiene una carga teológica importante en Isaías. 'Yo soy él' respeta la forma del hebreo y evita importar una formulación doctrinal posterior que el versículo no expresa de manera explícita.
  doctrine_reference: Primacía del original; conservar la resonancia teológica sin exageración interpretativa.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca anclado explícitamente en el texto español: [a] junto a la cláusula temporal y [b] junto a ''actúo''. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando el nombre divino aparece explícitamente; aquí el versículo usa la primera persona divina sin el tetragrámaton, por lo que no corresponde introducirlo.
  - Se evitó 'SEÑOR' y se preservó la autoidentificación directa del hablante.
  - Se conservó la metáfora de la mano y la pregunta retórica final, ambas importantes para la fuerza del hebreo.
  - El tono es solemne pero natural en español latinoamericano de uso eclesial.
