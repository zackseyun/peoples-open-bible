review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del rastro POB: los humildes vuelven a alegrarse en Yahvé y los pobres exultan en el Santo de Israel. Conserva correctamente Yahvé para יהוה y el título fijo «el Santo de Israel». Sin embargo, «los pobres de entre los hombres» no representa de la manera más natural y clara en español el genérico אָדָם; suena masculino y algo acartonado, mientras que el contexto es claramente humano-genérico.'
  spanish_quality_summary: El texto es legible y digno, pero puede mejorarse en naturalidad y claridad. «Volverán a regocijarse» y «se gozarán» son aceptables, aunque la combinación resulta algo pesada. El principal problema de legibilidad es «de entre los hombres», que suena bíblico-calco y puede leerse como varones. «Entre la humanidad» o «entre los seres humanos» comunica mejor el sentido genérico sin perder solemnidad.
  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: יהוה -> «Yahvé» correcto; בִּקְדוֹשׁ יִשְׂרָאֵל -> «en el Santo de Israel» correcto; עֲנָוִים -> «los humildes» correcto. La excepción necesaria es אָדָם: el borrador usa «los hombres», pero por la propia nota y la decisión doctrinal debe reflejarse con un término humano genérico más claro en español.'
  issues:
  - severity: medium
    issue: «los pobres de entre los hombres» para וְאֶבְיוֹנֵי אָדָם
    rationale: Aunque intenta preservar el valor genérico de אָדָם, en español contemporáneo «los hombres» puede sonar masculino-específico. La frase también resulta poco natural. «los pobres entre la humanidad» refleja mejor el genérico humano y armoniza con la nota existente.
  - severity: low
    issue: Ligera pesadez estilística entre «regocijarse» y «se gozarán»
    rationale: No es infiel, pero la combinación de dos giros cercanos puede sentirse poco fluida. Aun así, no requiere una reescritura mayor; el ajuste principal es el sintagma con אָדָם.
  revised_spanish_text: Los humildes volverán a regocijarse en Yahvé[a], y los pobres entre la humanidad[b] se gozarán en el Santo de Israel.
  revised_footnotes:
  - marker: a
    text: 'O: «volverán a tener gozo» o «volverán a alegrarse». El hebreo puede entenderse literalmente como «añadir/incrementar», y el sustantivo puede reflejarse como «gozo» o «alegría».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los pobres entre los seres humanos» o «los pobres de la humanidad». אָדָם aquí es genérico, referido a la humanidad en general.'
    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la expresión de אָדָם para evitar una lectura masculina-específica y un calco poco natural. «Los pobres entre la humanidad» preserva el sentido genérico humano documentado en el audit trail y mejora la claridad del español sin alterar el contenido. Se mantienen «Yahvé» y «el Santo de Israel» conforme a la terminología del proyecto.
