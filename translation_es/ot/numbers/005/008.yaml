revisions:
- from: Pero si el hombre no tiene pariente redentor[a] a quien se le pueda devolver la restitución por la culpa, la restitución por la culpa que se devuelve a Yahvé pertenece al sacerdote[b], además del carnero de expiación, por medio del cual se hace expiación por él.
  to: Pero si el hombre no tiene pariente redentor[a] a quien devolver la restitución por la culpa, la restitución por la culpa que se devuelve a Yahvé pertenece al sacerdote[b], además del carnero de expiación, por medio del cual se hace expiación por él.
  rationale: Se hizo una reparación menor para eliminar el matiz de posibilidad introducido por 'se le pueda devolver' y ajustarlo al sentido legal directo del hebreo. También se afinó la alternativa de la nota a para reflejar mejor 'next of kin'.
