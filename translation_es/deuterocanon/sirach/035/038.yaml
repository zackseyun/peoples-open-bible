translation:
  language: es
  text: Asígnale trabajo como le conviene; y si no obedece[a], haz pesadas sus cadenas. Pero no seas excesivo con carne alguna, y no hagas nada sin juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «con cualquiera» / «hacia cualquier persona». El griego dice literalmente: «con toda carne».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἔργα κατάστησον
  english_pob_choice: Assign him work
  chosen_spanish: Asígnale trabajo
  alternatives_spanish:
  - Ponlo a trabajar
  - Encárgale tareas
  lexicon: LSJ
  rationale: κατάστησον con εἰς + acusativo expresa poner o asignar a alguien a una función o tarea. «Asígnale trabajo» conserva la fuerza directiva y suena natural en español.
- source_word: καθὼς πρέπει αὐτῷ
  english_pob_choice: as is fitting for him
  chosen_spanish: como conviene para él
  alternatives_spanish:
  - como le corresponde
  - como es apropiado para él
  lexicon: LSJ
  rationale: πρέπει comunica lo que es conveniente o debido. «Conviene» mantiene la idea de adecuación sin sobrecargar el estilo.
- source_word: πειθαρχῇ
  english_pob_choice: obey
  chosen_spanish: obedece
  alternatives_spanish:
  - se somete
  - acata
  lexicon: LSJ
  rationale: πειθαρχέω aquí exige la idea simple de obedecer. Se evita añadir «disciplina» en el cuerpo del texto porque el griego no la explicita, según la revisión auditada.
- source_word: βάρυνον τὰς πέδας αὐτοῦ
  english_pob_choice: make his fetters heavy
  chosen_spanish: haz pesadas sus cadenas
  alternatives_spanish:
  - haz más pesadas sus ataduras
  - cárgale las cadenas
  lexicon: LSJ
  rationale: πέδαι son grilletes/cadenas de sujeción; «cadenas» es una equivalencia clara y bíblicamente inteligible en español, y «pesadas» refleja βάρυνον con fidelidad.
- source_word: μὴ περισσεύσῃς
  english_pob_choice: do not be excessive
  chosen_spanish: no seas excesivo
  alternatives_spanish:
  - no te excedas
  - no sobrepases la medida
  lexicon: LSJ
  rationale: περισσεύω aquí expresa excederse o ir más allá de la medida justa. «No seas excesivo» conserva la advertencia moral con naturalidad.
- source_word: ἐν πάσῃ σαρκί
  english_pob_choice: with any flesh
  chosen_spanish: con ninguna carne
  alternatives_spanish:
  - con cualquier carne
  - con cualquier persona
  - con nadie
  lexicon: LSJ
  rationale: Se mantiene «carne» para respetar el valor literal de σάρξ, como en el POB inglés. En español suena duro pero auditable; la frase apunta a trato con seres humanos en general, sin borrar la tensión léxica.
- source_word: ἄνευ κρίσεως
  english_pob_choice: without judgment
  chosen_spanish: sin juicio
  alternatives_spanish:
  - sin discernimiento
  - sin decisión justa
  lexicon: LSJ
  rationale: κρίσις puede abarcar juicio, decisión o discernimiento. «Sin juicio» es breve y preserva la amplitud semántica sin forzar una explicación interpretativa.
- source_word: μὴ ποιήσῃς μηδέν
  english_pob_choice: do nothing
  chosen_spanish: no hagas nada
  alternatives_spanish:
  - no hagas absolutamente nada
  lexicon: LSJ
  rationale: La doble negación imperativa se vuelve en español de forma idiomática como «no hagas nada», sin perder el carácter prohibitivo.
theological_decisions:
- issue: Renderizado de σάρξ en un contexto sapiencial disciplinario
  english_pob_reading: with any flesh
  chosen_spanish_reading: con ninguna carne
  alternative_spanish_readings:
  - con cualquier persona
  - con cualquier ser humano
  - con nadie
  rationale: Se conserva el término concreto «carne» para no neutralizar el forcejeo léxico del texto. Aunque el sentido probable es humano/general, la literalidad ayuda a mantener el registro del original y la decisión del POB inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, σάρξ'
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que corrigió la cláusula de πειθαρχῇ para no añadir «disciplina» en el texto principal. También conserva la advertencia contra excederse con σάρξ, como en el POB inglés, sin suavizarla a un equivalente más abstracto.
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Yahvé» no aparece en este versículo.
  - Se conservó la fuerza concreta de «carne» para σάρξ, con nota de alternativa porque el contexto apunta a personas en general.
  - «Juicio» se eligió para κρίσις por su amplitud semántica y su naturalidad en español.
  - La puntuación en dos miembros con punto y coma sigue la estructura imperativa del griego.
