  vs. simple past “I cast”; (2) idiomatic force of ⲉⲓⲥϩⲏⲏⲧⲉ as “look” vs. “behold/understand”;
  (3) semantic choice for ϩⲁⲣⲉϩ (“guard” vs. “watch over”); and (4) vividness of ϫⲉⲣⲟ
  as “blaze” vs. “burn.” The dialectal pronoun ⲉⲛⲧⲟϥ is noted and reflected in translation
  as “it.”'
