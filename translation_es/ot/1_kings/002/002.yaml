translation:
  language: es
  text: Yo voy por el camino de toda la tierra. Sé fuerte[a], y sé un hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muéstrate como un hombre» o «sé varonil». La expresión hebrea une la idea de ser un hombre con actuar con valentía y responsabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente de primera persona se expresa con claridad natural en español con «Yo». Mantiene el sujeto explícito como en el hebreo y no requiere énfasis adicional en el texto principal.
- source_word: הֹלֵךְ
  english_pob_choice: am going
  chosen_spanish: me voy
  alternatives_spanish:
  - estoy yendo
  - voy
  lexicon: HALOT
  rationale: El participio con pronombre expresa un desplazamiento ya en curso o inminente hacia la muerte. «Me voy» reproduce bien la fuerza idiomática de «ir por el camino de…» en español, sin volverlo más abstracto de lo necesario.
- source_word: בְּדֶרֶךְ
  english_pob_choice: the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - por la senda
  lexicon: HALOT
  rationale: «Camino» conserva el valor idiomático de דרך como metáfora de la muerte. «Por el camino» suena natural en español y mantiene la imagen de tránsito.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: of all the earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - de todo el mundo
  - de toda la tierra habitada
  lexicon: HALOT
  rationale: La expresión se traduce de manera cercana al hebreo, manteniendo la formulación idiomática. «Tierra» conserva el alcance general y la resonancia bíblica sin desplazar el sentido a un universalismo interpretativo excesivo.
- source_word: וְחָזַקְתָּ
  english_pob_choice: So be strong
  chosen_spanish: Esfuérzate
  alternatives_spanish:
  - Y sé fuerte
  - Por tanto, esfuérzate
  lexicon: HALOT
  rationale: El valor exhortativo se expresa con un imperativo natural en español. «Esfuérzate» transmite tanto fortaleza como determinación responsable, manteniendo la fuerza práctica del mandato.
- source_word: וְהָיִיתָ
  english_pob_choice: and be
  chosen_spanish: y sé
  alternatives_spanish:
  - y muéstrate
  - y llega a ser
  lexicon: HALOT
  rationale: En esta construcción, el verbo introduce el estado esperado. «Sé» es la forma más directa y idiomática en español para el complemento predicativo siguiente.
- source_word: לְאִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - varonil
  - un hombre maduro
  lexicon: HALOT
  rationale: Se conserva el sustantivo masculino explícito para mantener la correspondencia formal y la carga exhortativa del hebreo. No se neutraliza el género ni se reemplaza por una paráfrasis psicológica.
theological_decisions:
- issue: Exhortación masculina y responsabilidad madura
  english_pob_reading: be a man
  chosen_spanish_reading: sé un hombre
  alternative_spanish_readings:
  - sé varonil
  - muéstrate como un hombre
  rationale: El hebreo usa un sustantivo masculino en una exhortación dirigida a Salomón. «Sé un hombre» conserva el género gramatical y la fuerza moral de la frase, sin convertirla en un estereotipo moderno ni diluirla en lenguaje neutro.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4 (precisión de género sobre neutralización)
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con la versión inglesa POB; no se documentaron revisiones textuales relevantes. La principal decisión de español fue mantener la imaginería idiomática de «el camino de toda la tierra» y expresar la exhortación final con un imperativo natural en español sin perder el matiz masculino del hebreo.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo breve de tres miembros del hebreo en español: declaración de muerte inminente, exhortación a fortalecerse y exhortación a ser hombre.'
  - «Tierra» se usa para reflejar la literalidad de הָאָרֶץ y el giro idiomático, en vez de sustituirlo por «mundo».
  - La nota de pie recoge la alternativa lexical y la tensión semántica entre «ser hombre» y la idea de valentía/responsabilidad.
