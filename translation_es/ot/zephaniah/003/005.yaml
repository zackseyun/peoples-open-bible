translation:
  language: es
  text: Yahvé es justo en medio de ella; no hace injusticia. Mañana tras mañana trae su justicia[a] a la luz; no falta. Pero el injusto no conoce vergüenza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘trae su juicio a la luz’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo la norma del proyecto para evitar la sustitución por un título. 'Yahvé' es la forma española estable y legible para el nombre revelado.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo en sentido moral
  lexicon: HALOT
  rationale: Aquí funciona como predicado del carácter de Yahvé. En español, 'justo' comunica con naturalidad la rectitud moral y el sentido forense del contexto; 'recto' sería posible pero menos directo.
- source_word: בְּקִרְבָּהּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su interior
  - en medio de ella
  lexicon: HALOT
  rationale: La forma femenina del sufijo se conserva con 'ella', refiriéndose a la ciudad personificada. 'En medio de ella' es una expresión natural en español y mantiene la imagen locativa del hebreo.
- source_word: לֹא יַעֲשֶׂה עַוְלָה
  english_pob_choice: he does no injustice
  chosen_spanish: no hace injusticia
  alternatives_spanish:
  - no hace ningún mal
  - no comete injusticia
  lexicon: HALOT
  rationale: La frase verbal expresa negación absoluta de actuar injustamente. 'No hace injusticia' reproduce con claridad la fuerza ética/judicial de עַוְלָה sin suavizarla.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: Morning by morning
  chosen_spanish: Mañana tras mañana
  alternatives_spanish:
  - Cada mañana
  - Mañana por mañana
  lexicon: HALOT
  rationale: La repetición hebrea marca acción continua y distributiva. 'Mañana tras mañana' conserva esa reiteración en un español idiomático y solemne.
- source_word: מִשְׁפָּטוֹ
  english_pob_choice: his justice
  chosen_spanish: su justicia
  alternatives_spanish:
  - su juicio
  - su sentencia
  lexicon: HALOT
  rationale: En este contexto el término apunta al ejercicio justo y manifestado de la acción divina. 'Su justicia' conserva la conexión temática con 'justo' e 'injusticia'; 'juicio' queda como alternativa semántica válida.
- source_word: יִתֵּן לָאוֹר
  english_pob_choice: he brings his justice to light
  chosen_spanish: trae... a la luz
  alternatives_spanish:
  - da... a la luz
  - lo pone en claro
  lexicon: HALOT
  rationale: La idiomática hebrea literalmente significa 'dar a la luz'. En español, 'traer a la luz' transmite bien la idea de manifestar públicamente sin perder la imagen.
- source_word: לֹא נֶעְדָּר
  english_pob_choice: it does not fail
  chosen_spanish: no falta
  alternatives_spanish:
  - no falla
  - no se ausenta
  lexicon: HALOT
  rationale: El verbo expresa ausencia o carencia; en este contexto, que la justicia diaria de Yahvé no deja de aparecer. 'No falta' es breve, natural y fiel al valor básico del hebreo.
- source_word: עַוָּל
  english_pob_choice: the unjust
  chosen_spanish: el injusto
  alternatives_spanish:
  - el malvado
  - el que actúa injustamente
  lexicon: HALOT
  rationale: Como sustantivo/adjetivo sustantivado, designa al que es injusto. 'El injusto' mantiene el paralelismo con 'justo/injusticia' del versículo.
- source_word: בֹּשֶׁת
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - bochorno
  - deshonra
  lexicon: HALOT
  rationale: La expresión hebrea indica la ausencia de pudor o vergüenza moral. 'Vergüenza' es la forma más clara y bíblicamente reconocible en español contemporáneo.
theological_decisions:
- issue: Uso del nombre divino en lugar de una sustitución titulativa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la política del proyecto de traducir el Tetragrámaton como nombre propio. Esto conserva la referencia personal del texto hebreo y evita el ocultamiento del nombre divino bajo un título.
  doctrine_reference: Translation philosophy §2 (divine name transparency)
- issue: Referencia del sufijo femenino en בְּקִרְבָּהּ
  english_pob_reading: in her midst
  chosen_spanish_reading: en medio de ella
  alternative_spanish_readings:
  - en medio de él
  - en su midst
  rationale: El sufijo femenino se conserva en español con 'ella', respetando la personificación de Jerusalén/Sion. Esto evita neutralizar el rasgo gramatical del hebreo.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Valor de מִשְׁפָּטוֹ en el contexto
  english_pob_reading: his justice
  chosen_spanish_reading: su justicia
  alternative_spanish_readings:
  - su juicio
  - su sentencia
  rationale: Aunque 'juicio' es posible, el contexto subraya la cualidad y manifestación de la justicia divina frente a la injusticia. 'Justicia' conserva mejor la red temática del versículo.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no propuso cambios sustantivos; se mantuvo la línea de traducción ya validada, con ajuste estilístico mínimo para el español.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' de forma consistente con la política del proyecto para יְהוָה.
  - Se mantuvo el par léxico 'justo/injusticia/justicia' para reflejar el contraste del hebreo.
  - La repetición distributiva se vertió como 'Mañana tras mañana' para preservar el ritmo semítico sin forzar calco.
  - La nota [a] acompaña la única alternativa relevante documentada en el audit trail inglés.
