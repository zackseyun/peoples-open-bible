translation:
  language: es
  text: Pero su padre y su madre no sabían que esto venía de Yahvé, porque él buscaba una ocasión[a] de los filisteos[b]. En aquel tiempo, los filisteos gobernaban sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un pretexto» o «una oportunidad». El hebreo תֹאֲנָה admite varias matizaciones para una apertura u ocasión de actuar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «contra los filisteos». También puede entenderse: «porque él buscaba una ocasión contra los filisteos», con «él» entendido como Yahvé; el hebreo lo permite, aunque el contexto probablemente apunta a Sansón.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵיְהוָה
  english_pob_choice: from the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del SEÑOR
  - de parte de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino según el criterio del proyecto, sin sustituirlo por una máscara reverencial. «De Yahvé» reproduce con naturalidad el valor de procedencia que el hebreo marca con מִן/מֵ y mantiene la referencia teológica explícita.
- source_word: הִיא
  english_pob_choice: it was
  chosen_spanish: esto
  alternatives_spanish:
  - ello
  - la cosa
  lexicon: HALOT
  rationale: El hebreo usa un pronombre femenino que remite a la situación o asunto discutido. En español, «esto» funciona de manera impersonal y evita forzar un referente gramatical femenino que el lector podría malentender.
- source_word: תֹאֲנָה
  english_pob_choice: an occasion
  chosen_spanish: una ocasión
  alternatives_spanish:
  - un pretexto
  - una oportunidad
  - una excusa
  lexicon: HALOT
  rationale: '«Ocasión» conserva la ambigüedad del sustantivo hebreo: un punto de apoyo o abertura para actuar. «Pretexto» sería posible, pero añade una connotación de engaño que el término hebreo no exige por sí solo.'
- source_word: מְבַקֵּשׁ
  english_pob_choice: he was seeking
  chosen_spanish: buscaba
  alternatives_spanish:
  - estaba buscando
  - buscaba con insistencia
  lexicon: HALOT
  rationale: El participio expresa acción en curso; «buscaba» mantiene esa idea en español sin sonar pesado. En contexto narrativo resulta más fluido que una perífrasis más explícita, aunque ambas son posibles.
- source_word: מִפְּלִשְׁתִּים
  english_pob_choice: from the Philistines
  chosen_spanish: contra los filisteos
  alternatives_spanish:
  - de los filisteos
  - a costa de los filisteos
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es «de», el sustantivo «ocasión» en este contexto apunta a una acción hostil dirigida a los filisteos. «Contra» expresa mejor la fuerza narrativa y la intención conflictiva sin borrar la base literal.
- source_word: וּבָעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - Y en aquel tiempo
  - Entonces
  lexicon: HALOT
  rationale: Es una transición temporal natural en español y mantiene el valor narrativo de marcador de época sin rigidez innecesaria.
- source_word: מֹשְׁלִים
  english_pob_choice: were ruling over
  chosen_spanish: dominaban sobre
  alternatives_spanish:
  - gobernaban sobre
  - estaban gobernando sobre
  lexicon: HALOT
  rationale: El participio indica una dominación vigente. «Dominaban sobre» expresa con claridad el control político del momento y evita la redundancia algo pesada de «gobernaban sobre».
- source_word: וְאָבִיו וְאִמּוֹ
  english_pob_choice: his father and mother
  chosen_spanish: su padre y su madre
  alternatives_spanish:
  - su padre y madre
  - el padre y la madre de él
  lexicon: HALOT
  rationale: La coordinación posesiva se traduce de forma idiomática y transparente. El posesivo único en español no pierde información relevante.
- source_word: לֹא יָדְעוּ
  english_pob_choice: did not know
  chosen_spanish: no sabían
  alternatives_spanish:
  - no conocían
  - no se daban cuenta
  lexicon: HALOT
  rationale: El verbo ידע aquí expresa desconocimiento de un hecho. «No sabían» es más natural en español narrativo que «no conocían» y mantiene el sentido factual.
theological_decisions:
- issue: La procedencia divina del episodio y la agencia humana de Sansón
  english_pob_reading: The verse states that this matter was from the LORD while also describing Samson as seeking an occasion from/against the Philistines.
  chosen_spanish_reading: El versículo afirma que esto venía de Yahvé y, al mismo tiempo, que él buscaba una ocasión contra los filisteos.
  alternative_spanish_readings:
  - Esto era de Yahvé, porque él buscaba una ocasión de los filisteos.
  - Esto venía de Yahvé, pues él buscaba una oportunidad contra los filisteos.
  rationale: Se preservan ambas líneas del texto sin resolver la tensión teológica de modo sistemático. El español mantiene la afirmación divina y la acción intencional del sujeto humano, dejando abierto el peso exacto de la causalidad tal como lo hace el hebreo.
  doctrine_reference: Translation philosophy §3
- issue: Referencia del sujeto de «él buscaba»
  english_pob_reading: ‘He’ refers to Samson.
  chosen_spanish_reading: Se entiende que «él» se refiere a Sansón.
  alternative_spanish_readings:
  - Se entiende que «él» se refiere a Yahvé.
  - El sujeto puede leerse como el Señor.
  rationale: Aunque el antecedente inmediato puede generar ambigüedad, el desarrollo narrativo favorece a Sansón como quien busca una ocasión. La redacción española conserva esa posibilidad sin eliminar la lectura alternativa documentada.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La edición inglesa más reciente ajustó la relación de מִפְּלִשְׁתִּים para reflejar con mayor cercanía el hebreo. En español se decidió mantener el sentido contextual con «contra los filisteos», porque la construcción con «buscar una ocasión» en esta narración apunta a una acción hostil y esa solución conserva mejor la inteligibilidad natural sin perder la tensión documentada. También se preservó la ambigüedad sobre el sujeto de «buscaba», que el audit trail reconoce como relevante.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto para יְהוָה.
  - Se evitó «SEÑOR» como sustituto reverencial.
  - «Filisteos» va en minúscula según uso español usual para etnónimos.
  - La puntuación sigue el ritmo narrativo del hebreo y del POB inglés.
  - Se mantuvo la ambigüedad teológica donde el texto la deja abierta.
