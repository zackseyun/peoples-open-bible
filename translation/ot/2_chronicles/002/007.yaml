id: 2CH.2.7
reference: 2 Chronicles 2:7
source:
  edition: WLC
  text: וּֽ/שְׁלַֽח לִ/י֩ עֲצֵ֨י אֲרָזִ֜ים בְּרוֹשִׁ֣ים וְ/אַלְגּוּמִּים֮ מֵֽ/הַ/לְּבָנוֹן֒ כִּ֚י אֲנִ֣י יָדַ֔עְתִּי אֲשֶׁ֤ר עֲבָדֶ֨י/ךָ֙ יֽוֹדְעִ֔ים לִ/כְר֖וֹת עֲצֵ֣י לְבָנ֑וֹן וְ/הִנֵּ֥ה עֲבָדַ֖/י עִם עֲבָדֶֽי/ךָ־־׃
translation:
  text: Now send me cedar[a], cypress, and algum timber from Lebanon, for I know that your servants know how to cut timber in Lebanon. And behold[b], my servants will be with your servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'juniper' or 'fir' for 'cypress' (Hebrew beroshim); the exact species is uncertain.
    reason: lexical_alternative
  - marker: b
    text: '''Algum'' may also be rendered ''almug''; some identify it with sandalwood, but the species is uncertain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁלַח
  chosen: Now send me
  alternatives:
  - So send me
  - And send me
  lexicon: HALOT
  rationale: Imperative of שׁלח with prefixed conjunction. English 'Now' captures the discourse progression naturally without over-literal repetition of 'and'.
- source_word: עֲצֵי אֲרָזִים
  chosen: cedar ... timber
  alternatives:
  - cedar wood
  - cedar trees
  lexicon: HALOT
  rationale: Construct phrase literally 'woods/timber of cedars.' In context of building materials, 'cedar' as a timber species is the most natural English rendering.
- source_word: בְּרוֹשִׁים
  chosen: cypress
  alternatives:
  - juniper
  - fir
  lexicon: HALOT
  rationale: The precise species is debated; 'cypress' is a common modern rendering for בְּרוֹשׁ and fits the context of valuable Lebanese timber. Alternative identifications are preserved in a footnote.
- source_word: אַלְגּוּמִּים
  chosen: algum
  alternatives:
  - almug
  - sandalwood
  lexicon: HALOT
  rationale: The species identification is uncertain. 'Algum' preserves the Hebrew term transparently in English rather than forcing a speculative botanical equivalent. 'Almug' reflects a variant traditional form and 'sandalwood' a proposed identification; these are footnoted.
- source_word: מֵהַלְּבָנוֹן
  chosen: from Lebanon
  alternatives:
  - from the Lebanon
  lexicon: HALOT
  rationale: English idiom prefers 'from Lebanon' for the geographic region, though the Hebrew includes the article.
- source_word: כִּי אֲנִי יָדַעְתִּי
  chosen: for I know
  alternatives:
  - because I know
  - for I have known
  lexicon: HALOT
  rationale: The perfect expresses present knowledge in context; simple present English is most natural.
- source_word: אֲשֶׁר עֲבָדֶיךָ יֹדְעִים
  chosen: that your servants know how
  alternatives:
  - that your servants are skilled
  - that your servants know
  lexicon: HALOT
  rationale: The clause introduces the content of Solomon's knowledge; 'know how' makes explicit the infinitive complement in idiomatic English.
- source_word: לִכְרוֹת
  chosen: to cut
  alternatives:
  - to fell
  - to hew
  lexicon: HALOT
  rationale: Basic sense is cutting/felling trees. 'Cut' is clear modern English; 'fell' is more technical.
- source_word: עֲצֵי לְבָנוֹן
  chosen: timber in Lebanon
  alternatives:
  - the trees of Lebanon
  - Lebanon timber
  lexicon: HALOT
  rationale: In this construction the focus is on wood resources from Lebanon rather than standing trees as such; 'timber in Lebanon' reads naturally in context.
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the following arrangement. 'And look' preserves the force in readable modern English.
- source_word: עֲבָדַי עִם עֲבָדֶיךָ
  chosen: my servants will be with your servants
  alternatives:
  - my servants are with your servants
  - my servants shall be with your servants
  lexicon: HALOT
  rationale: 'Though no explicit finite verb appears, English requires one. Future ''will be'' fits the request context: Solomon is proposing the arrangement to accompany the timber work.'
