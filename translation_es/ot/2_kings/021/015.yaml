translation:
  language: es
  text: porque han hecho lo malo[a] ante mis ojos, y me han estado provocando desde el día en que sus padres salieron de Egipto hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus antepasados». El hebreo dice literalmente «sus padres», un término masculino de parentesco usado para generaciones previas.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa del juicio anunciado en el contexto inmediato. «Porque» es la conexión causal más natural y clara en español moderno.
- source_word: עָשׂוּ אֶת הָרַע
  english_pob_choice: they have done what is evil
  chosen_spanish: han hecho lo malo
  alternatives_spanish:
  - han hecho el mal
  - han hecho lo que es malo
  - han obrado mal
  lexicon: HALOT
  rationale: La construcción hebrea expresa la acción de hacer el mal de manera idiomática. «Lo malo» mantiene la categoría ética sin forzar una paráfrasis excesiva; «el mal» también sería posible, pero «lo malo» conserva bien el valor de evaluación moral.
- source_word: בְּעֵינַי
  english_pob_choice: in my eyes
  chosen_spanish: ante mis ojos
  alternatives_spanish:
  - en mis ojos
  - a mis ojos
  - delante de mí
  lexicon: HALOT
  rationale: La imagen evaluativa se conserva, pero en español «ante mis ojos» suena más natural y mantiene la metáfora de juicio/divina valoración.
- source_word: וַיִּהְיוּ מַכְעִסִים אֹתִי
  english_pob_choice: and have been provoking me
  chosen_spanish: y me han estado provocando
  alternatives_spanish:
  - y me han estado irritando
  - y me provocaban
  - y han seguido provocándome
  lexicon: HALOT
  rationale: La combinación verbal hebrea expresa acción continuada o habitual. «Han estado provocando» refleja mejor esa duración que un simple pasado puntual.
- source_word: מַכְעִסִים
  english_pob_choice: provoking
  chosen_spanish: provocando
  alternatives_spanish:
  - irritando
  - enfureciendo
  - provocando a ira
  lexicon: HALOT
  rationale: «Provocar» es idiomático en español y reproduce el valor causativo del participio sin añadir una explicación interpretativa innecesaria.
- source_word: מִן הַיּוֹם אֲשֶׁר
  english_pob_choice: from the day
  chosen_spanish: desde el día en que
  alternatives_spanish:
  - desde el día que
  - desde el tiempo en que
  - desde cuando
  lexicon: HALOT
  rationale: La fórmula temporal introduce el punto de inicio de una continuidad. «Desde el día en que» es natural y precisa en español.
- source_word: יָצְאוּ אֲבוֹתָם מִמִּצְרַיִם
  english_pob_choice: their fathers came out of Egypt
  chosen_spanish: sus padres salieron de Egipto
  alternatives_spanish:
  - sus antepasados salieron de Egipto
  - sus padres vinieron de Egipto
  - sus padres fueron sacados de Egipto
  lexicon: HALOT
  rationale: «Salieron de Egipto» sigue de cerca el verbo de éxodo. «Sus padres» conserva el término masculino del hebreo y el paralelismo histórico; «antepasados» explicita el referente, pero suaviza la forma del original.
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus progenitores
  lexicon: HALOT
  rationale: El hebreo usa un término masculino de parentesco para generaciones previas. En español, «padres» puede funcionar como plural genealógico; se mantiene la referencia histórica sin resolverla mediante una neutralización que el texto no exige.
- source_word: וְעַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  - aún hasta hoy
  lexicon: HALOT
  rationale: «Hasta este día» conserva la fuerza de continuidad temporal y es una fórmula bíblica natural y comprensible en español.
theological_decisions:
- issue: Continuidad histórica y corporativa del pecado de Israel
  english_pob_reading: Retain the text's corporate-historical framing without softening it to merely individual wrongdoing.
  chosen_spanish_reading: 'Mantener el marco histórico-corporativo: la rebelión se presenta como una continuidad desde la generación del éxodo hasta el presente del relato.'
  alternative_spanish_readings:
  - Limitarlo a la culpa de los reyes recientes
  - Entenderlo solo como una hipérbole retórica sin continuidad histórica
  rationale: El hebreo vincula explícitamente la provocación con la salida de Egipto y con «sus padres», por lo que la traducción no debe diluir esa línea de continuidad. La formulación española conserva esa tensión teológica e histórica sin explicarla de más.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Alcance de אֲבוֹתָם
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - sus progenitores
  rationale: El hebreo emplea una forma masculina que designa generaciones anteriores. «Sus padres» respeta la forma y la relación genealógica; «antepasados» aclara el sentido, pero pierde el sabor literal del término y su huella retórica.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto fue confirmado como estable. La versión española sigue ese estado estable y reproduce las decisiones léxicas clave del audit trail, especialmente la continuidad causal, el aspecto durativo de «provocando», y la alternativa genealógica de אֲבוֹתָם sin borrarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando aparezca el nombre divino; en este versículo no aparece.
  - «Sus padres» reproduce el valor genealógico masculino del hebreo y evita neutralizar el término sin necesidad.
  - «Hasta este día» conserva la fórmula temporal bíblica con un español natural y publicable.
  - La nota al pie marca la alternativa «antepasados» para reflejar la tensión léxica documentada sin alterar el texto principal.
