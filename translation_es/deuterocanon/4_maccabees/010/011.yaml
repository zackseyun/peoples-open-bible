translation:
  language: es
  text: Pero a causa de tu impiedad y culpa de sangre[a], soportarás tormentos sin fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «homicidio contaminante». El término griego incluye tanto la idea de derramamiento de sangre como la contaminación que produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσέβειαν
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - maldad
  - irreverencia
  - impiedad hacia Dios
  lexicon: BDAG
  rationale: ἀσέβεια expresa falta de reverencia o de piedad hacia Dios. «Impiedad» conserva el sentido religioso y moral con una palabra natural y reconocible en español bíblico contemporáneo.
- source_word: μιαιφονίαν
  english_pob_choice: blood-guilt
  chosen_spanish: sangre culpable
  alternatives_spanish:
  - culpa de sangre
  - homicidio contaminante
  - sangre manchada
  lexicon: LSJ
  rationale: 'El compuesto reúne la idea de derramamiento de sangre y de mancha moral/ritual. «Sangre culpable» procura mantener ambas dimensiones: la culpa por sangre derramada y la carga de impureza, sin reducir el término a simple homicidio.'
- source_word: ἀκαταλύτους
  english_pob_choice: unending
  chosen_spanish: sin fin
  alternatives_spanish:
  - sin término
  - incesantes
  - interminables
  lexicon: LSJ
  rationale: El adjetivo indica lo que no se disuelve ni llega a su fin. «Sin fin» es una forma idiomática breve que preserva la duración ilimitada del castigo.
- source_word: καρτερήσεις
  english_pob_choice: you will endure
  chosen_spanish: soportarás
  alternatives_spanish:
  - sufrirás
  - aguantarás
  - permanecerás bajo
  lexicon: BDAG
  rationale: καρτερέω implica resistir o mantenerse firme bajo una carga. «Soportarás» transmite el futuro de la acción y el peso del sufrimiento sin añadir matices ajenos.
- source_word: βασάνους
  english_pob_choice: torments
  chosen_spanish: tormentos
  alternatives_spanish:
  - torturas
  - castigos
  - penas
  lexicon: BDAG
  rationale: En este contexto βάσανοι designa sufrimientos punitivos severos. «Tormentos» conserva el carácter judicial y la intensidad del término sin restringirlo solo a tortura física.
theological_decisions:
- issue: La acusación combina ofensa contra Dios y contaminación moral por sangre derramada
  english_pob_reading: Render ἀσέβειαν as 'ungodliness' and μιαιφονίαν with explicit defilement language ('blood-guilt')
  chosen_spanish_reading: Traducir ἀσέβειαν como «impiedad» y μιαιφονίαν como «sangre culpable», manteniendo tanto la culpa moral como la carga de sangre derramada
  alternative_spanish_readings:
  - «impiedad y homicidio»
  - «impiedad y culpa de sangre»
  - «impiedad y sangre manchada»
  rationale: El verso no denuncia solo violencia criminal, sino una violencia que lleva culpa delante de Dios. La formulación elegida conserva la ofensa vertical de la impiedad y la dimensión de culpa/contaminación asociada a la sangre.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El auditorio en inglés revisó μιαιφονίαν desde una solución más explícitamente defilement-oriented ('blood-pollution') a una forma más natural y precisa ('blood-guilt'). Esta versión española sigue esa revisión, pero opta por una formulación equivalente que conserve tanto la culpa como la asociación con sangre derramada, evitando una traducción excesivamente técnica o una reducción a simple homicidio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado cuando aparece el nombre divino; en este verso no aparece.
  - Se evita «Señor» o calcos eclesiásticos innecesarios, porque el verso es una acusación moral y judicial directa.
  - «Tormentos» se usa de manera consistente para βάσανοι en contexto punitivo.
  - La frase «sangre culpable» se deja abierta para preservar la tensión entre culpa legal y contaminación moral.
