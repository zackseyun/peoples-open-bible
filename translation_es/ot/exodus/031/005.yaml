  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas: «piedra», «madera» y «toda clase de trabajo» concuerdan con el expediente inglés. La nota sobre «piedra» como término general también está bien preservada.'
