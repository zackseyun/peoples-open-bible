revisions:
- from: 'Estos son los contados[a], a quienes contaron Moisés y Aarón, y los líderes de Israel: doce hombres[b], cada uno por la casa de sus padres—estuvieron con ellos.'
  to: Estos son los que fueron contados[a], a quienes contaron Moisés y Aarón, y los líderes de Israel —doce hombres[b], cada uno por la casa de sus padres— estaban con ellos.
  rationale: Se reemplazó «los contados» por «los que fueron contados» para lograr español natural sin perder la fuerza personal del participio pasivo. Se cambió «estuvieron con ellos» por «estaban con ellos» para reflejar mejor el valor copulativo/final de הָיוּ en la oración. También se aligeró la puntuación para una lectura más clara y digna.
