revisions:
- from: Y los extenderán[a] delante del sol, de la luna y de todo el ejército de los cielos; a quienes amaron, a quienes sirvieron, tras quienes anduvieron, a quienes buscaron y ante quienes se postraron. No serán recogidos, ni sepultados; serán estiércol sobre la superficie de la tierra[b].
  to: Y los extenderán[a] delante del sol, de la luna y de todo el ejército de los cielos, los cuales amaron, a los cuales sirvieron, tras los cuales anduvieron, a los cuales buscaron[b] y ante los cuales se postraron. No serán recogidos ni sepultados; serán estiércol sobre la superficie de la tierra[c].
  rationale: La revisión corrige la personalización impropia de los astros reemplazando 'quienes' por construcciones con 'los cuales', que siguen siendo formales y legibles en español bíblico moderno. También conserva con mayor fidelidad el paralelismo de la cadena verbal y añade la alternativa léxica de דרש documentada en el expediente inglés. El resto del texto se mantiene porque refleja bien el sentido hebreo y la fuerza retórica del versículo.
