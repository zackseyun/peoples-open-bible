translation:
  language: es
  text: Si se levanta entre ustedes un profeta o un soñador de sueños, y te da una señal o un prodigio[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una señal o un portento».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Supuesto que
  lexicon: HALOT
  rationale: En este contexto legal-condicional, כִּי introduce un caso hipotético. «Si» expresa con naturalidad esa apertura de condición en español sin perder el valor jurídico del enunciado.
- source_word: יָקוּם
  english_pob_choice: arises
  chosen_spanish: se levanta
  alternatives_spanish:
  - aparece
  - surge
  lexicon: HALOT
  rationale: El verbo קום puede expresar emerger o presentarse. «Se levanta» conserva la imagen verbal de surgimiento y es fiel al registro más formal del hebreo.
- source_word: בְּקִרְבְּךָ
  english_pob_choice: among you
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - entre ustedes
  - dentro de ti
  lexicon: HALOT
  rationale: La expresión apunta al ámbito comunitario de Israel. «En medio de ti» reproduce bien esa localización colectiva y evita una lectura individualista de «dentro de ti».
- source_word: נָבִיא
  english_pob_choice: prophet
  chosen_spanish: profeta
  lexicon: HALOT
  rationale: «Profeta» es el equivalente directo y reconocido para נָבִיא; no hay razón contextual para variar el término.
- source_word: חֹלֵם חֲלוֹם
  english_pob_choice: a dreamer of dreams
  chosen_spanish: un soñador de sueños
  alternatives_spanish:
  - uno que sueña sueños
  - un soñador
  lexicon: HALOT
  rationale: La construcción participio + sustantivo cognado es un giro hebreo idiomático. «Soñador de sueños» conserva la forma y el contraste con «profeta» sin explicarlo de más.
- source_word: וְנָתַן אֵלֶיךָ
  english_pob_choice: and gives you
  chosen_spanish: y te da
  alternatives_spanish:
  - y te presenta
  - y pone ante ti
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, en esta secuencia condicional funciona con sentido prospectivo. «Te da» es natural en español y sigue de cerca el valor del hebreo.
- source_word: אוֹת
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - un signo
  - una marca
  lexicon: HALOT
  rationale: «Señal» es un equivalente claro para אוֹת y funciona bien en español bíblico contemporáneo. Mantiene el sentido evidencial sin cargarlo de interpretación.
- source_word: מוֹפֵת
  english_pob_choice: a wonder
  chosen_spanish: un prodigio
  alternatives_spanish:
  - una maravilla
  - un portento
  lexicon: HALOT
  rationale: מוֹפֵת suele designar algo asombroso o portentoso. «Prodigio» conserva el paralelismo con «señal» y refleja el carácter extraordinario del término.
theological_decisions:
- issue: Naturaleza de la señal/prodigio del falso profeta o soñador
  english_pob_reading: Render אוֹת ... מוֹפֵת straightforwardly as 'a sign or a wonder' without deciding in translation whether the phenomenon is genuinely miraculous, deceptive, or merely claimed.
  chosen_spanish_reading: Traducirlo de manera directa como «una señal o un prodigio» sin decidir en la traducción si el hecho es verdaderamente milagroso, engañoso o solo reclamado.
  alternative_spanish_readings:
  - una señal o un portento
  - una señal milagrosa o prodigio
  rationale: El versículo solo afirma que el profeta o soñador da una señal o prodigio; no explica todavía su fuente ni su carácter. Mantener el sentido léxico básico evita resolver una tensión teológica que el texto inmediato deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: no se registran cambios aplicados y el cotejo indica alto acuerdo, por lo que no hubo necesidad de ajustar la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Profeta» y «soñador de sueños» conservan el contraste formal del hebreo.
  - «Señal» y «prodigio» reproducen la pareja semántica sin forzar la interpretación del fenómeno.
