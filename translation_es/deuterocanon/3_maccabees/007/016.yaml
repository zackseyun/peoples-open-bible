  text: But those who had held fast to God even to death[a], having obtained complete deliverance, departed from the city, strewn with all kinds of very fragrant flowers, with rejoicing and shouting, giving thanks with praises and full songs of hymns to God, the holy Savior of Israel[b], the God of their fathers.
  footnotes:
