translation:
  language: es
  text: Si se encuentra un hombre asesinado[a] en la tierra que Yahvé tu Dios te da para poseerla, tendido en el campo abierto, y no se sabe quién lo hirió,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una persona asesinada». El hebreo es gramaticalmente masculino singular («un hombre asesinado»), aunque el principio legal se refiere en general a un homicidio no identificado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce una disposición legal condicional. En español jurídico-bíblico, «Si» comunica con claridad el caso hipotético sin perder el valor casuístico del hebreo.
- source_word: יִמָּצֵא
  english_pob_choice: is found
  chosen_spanish: se encuentra
  alternatives_spanish:
  - es hallado
  - se halla
  lexicon: HALOT
  rationale: El nifal de מצא expresa aquí aparición pasiva/impersonal. «Se encuentra» es natural en español y mantiene el sentido de hallazgo sin volverlo artificioso.
- source_word: חָלָל
  english_pob_choice: a slain man
  chosen_spanish: un muerto[a]
  alternatives_spanish:
  - un hombre muerto
  - una persona muerta
  - un caído
  lexicon: HALOT
  rationale: El término denota a alguien muerto violentamente. En español, «muerto» conserva la realidad de la muerte y deja abierta la nota para la tensión entre el masculino gramatical y el posible sentido general del caso legal.
- source_word: בָּאֲדָמָה
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra/territorio
  lexicon: HALOT
  rationale: Aquí אֲדָמָה apunta al territorio heredado, no a simple suelo. «Tierra» preserva el lenguaje de herencia y posesión del contexto pactal.
- source_word: אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לְךָ לְרִשְׁתָּהּ
  english_pob_choice: that Yahweh your God is giving you to possess
  chosen_spanish: que Yahvé tu Dios te da para que la poses
  alternatives_spanish:
  - que Yahvé tu Dios te da para poseerla
  - que Yahvé tu Dios te está dando para que la heredes
  lexicon: HALOT
  rationale: «Te da» reproduce el participio presente con valor durativo; «para que la poses» expresa naturalmente לְרִשְׁתָּהּ. Se mantiene «Yahvé» conforme al criterio del nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el equivalente español establecido para el Tetragrámaton en el proyecto. «Yahvé» es la forma de lectura pública más natural en español y preserva el nombre propio del pacto.
- source_word: נֹפֵל
  english_pob_choice: lying
  chosen_spanish: caído
  alternatives_spanish:
  - tendido
  - yaciendo
  - cayendo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «cayendo/caído», en español «caído» comunica el estado del cadáver sin introducir un movimiento en curso. Es fiel y legible en contexto legal.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the open field
  chosen_spanish: en el campo abierto
  alternatives_spanish:
  - en el campo
  - al aire libre
  lexicon: HALOT
  rationale: «Campo abierto» recoge el contraste con un lugar habitado o cubierto. Es la forma más natural para reflejar la escena rural pública indicada por el hebreo.
- source_word: לֹא נוֹדַע
  english_pob_choice: it is not known
  chosen_spanish: no se sabe
  alternatives_spanish:
  - no se conoce
  - permanece desconocido
  lexicon: HALOT
  rationale: La construcción impersonal se vierte de manera directa. «No se sabe» es idiomático en español y conserva el valor de ignorancia pública/objetiva.
- source_word: מִי הִכָּהוּ
  english_pob_choice: who struck him
  chosen_spanish: quién lo hirió
  alternatives_spanish:
  - quién lo golpeó
  - quién lo mató
  - quién lo atacó
  lexicon: HALOT
  rationale: נכה puede significar golpear/herir. Dado que חָלָל ya implica muerte violenta, «hirió» evita redundancia con la idea de matar y mantiene la distinción léxica del hebreo. «Lo» reproduce el objeto masculino singular del texto.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton. La forma española del proyecto es «Yahvé», que preserva el nombre personal del Dios del pacto y evita el ocultamiento por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor legal de חָלָל en una norma casuística
  english_pob_reading: a slain man
  chosen_spanish_reading: un muerto
  alternative_spanish_readings:
  - un hombre muerto
  - una persona muerta
  rationale: El hebreo es masculino singular, pero el caso legal trata de un homicidio no identificado en términos generales. «Un muerto» mantiene la fuerza del hallazgo de una víctima sin forzar un género explícito en el texto principal; la nota preserva la tensión gramatical.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado en la idea principal: hallazgo de una víctima en la tierra dada por Yahvé, en campo abierto, con autor desconocido. Se adopta una solución española más natural para el valor legal de la cláusula, manteniendo el nombre divino, el carácter territorial de אֲדָמָה y la distinción entre el cadáver hallado y el acto de herir. No se requieren cambios textuales respecto al sentido base del audit trail, solo ajustes de formulación para lectura pública en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - «Tierra» se usa en sentido de territorio heredado, no como suelo físico.
  - «No se sabe quién lo hirió» preserva la impersonalidad del hebreo y la diferencia entre matar y herir.
  - La nota a explica la tensión entre el masculino gramatical y el alcance general de la ley.
