translation:
  language: es
  text: Su toro primogénito tiene majestad, y sus cuernos son como los cuernos de un toro salvaje[a]; con ellos acorneará a los pueblos juntos hasta los confines de la tierra. Estas son las miríadas de Efraín[b], y estos, los millares de Manasés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los cuernos de un buey salvaje’. El hebreo רְאֵם probablemente se refiere a un bovino salvaje poderoso; la traducción tradicional ‘unicornio’ no refleja bien el juicio léxico actual.
    reason: lexical_alternative
  - marker: b
    text: O ‘diez millares de Efraín’. El hebreo רִבְבֹות denota números muy grandes y aquí se contrasta con ‘millares de Manasés’.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹור
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primero en nacer
  - primero nacido
  lexicon: HALOT
  rationale: ‘Primogénito’ es el equivalente natural y fiel en español para el sustantivo de primogenitura; conserva el valor de prioridad de nacimiento y el tono bíblico sin caer en calco áspero.
- source_word: שׁוֹרוֹ
  english_pob_choice: his bull
  chosen_spanish: su toro
  alternatives_spanish:
  - su buey
  - su res macho
  lexicon: HALOT
  rationale: ‘Toro’ mantiene la imagen masculina y fuerte del hebreo y encaja bien con la metáfora de los cuernos; ‘buey’ puede sonar más genérico o castrado en español.
- source_word: הָדָר לוֹ
  english_pob_choice: has majesty
  chosen_spanish: tiene majestad
  alternatives_spanish:
  - es majestuoso
  - tiene esplendor
  lexicon: HALOT
  rationale: La expresión hebrea es nominal; ‘tiene majestad’ conserva esa fuerza sustantiva y suena natural en español, sin perder la resonancia de honor/splendor.
- source_word: קַרְנֵי רְאֵם
  english_pob_choice: the horns of a wild ox
  chosen_spanish: los cuernos de un buey salvaje
  alternatives_spanish:
  - los cuernos de un toro salvaje
  - los cuernos de un uro
  - los cuernos de un unicornio
  lexicon: HALOT
  rationale: ‘Buey salvaje’ comunica la fuerza del רְאֵם sin adoptar la tradicional pero engañosa ‘unicornio’; mantiene la decisión lexical del POB inglés sobre un bovino salvaje poderoso.
- source_word: קַרְנָיו
  english_pob_choice: his horns
  chosen_spanish: sus cuernos
  alternatives_spanish:
  - sus astas
  lexicon: HALOT
  rationale: ‘Cuernos’ es la correspondencia directa y evita una imagen demasiado zoológica o técnica; además conserva la repetición enfática del hebreo.
- source_word: יְנַגַּח
  english_pob_choice: he will gore
  chosen_spanish: corneará
  alternatives_spanish:
  - acorneará
  - embestirá con sus cuernos
  lexicon: HALOT
  rationale: El verbo expresa el golpe de un animal cornudo; ‘corneará’ preserva la concreción de la acción y resulta claro en español bíblico contemporáneo.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: ‘Pueblos’ reproduce bien el plural colectivo y evita restringir el sentido a unidades políticas modernas que ‘naciones’ puede sugerir.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - todos a la vez
  lexicon: HALOT
  rationale: ‘Juntos’ transmite la acción colectiva/simultánea con naturalidad en español y corresponde al énfasis adverbial del hebreo.
- source_word: אַפְסֵי אָרֶץ
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los extremos de la tierra
  alternatives_spanish:
  - hasta los confines de la tierra
  - hasta los bordes de la tierra
  lexicon: HALOT
  rationale: ‘Extremos’ conserva el sentido de límite/lejanía del hebreo y mantiene el tono poético; ‘confines’ también sería posible, pero ‘extremos’ refleja bien la formulación elegida en el POB inglés.
- source_word: רִבְבֹות
  english_pob_choice: myriads
  chosen_spanish: millares
  alternatives_spanish:
  - miríadas
  - diez millares
  lexicon: HALOT
  rationale: Aunque ‘miríadas’ es más etimológicamente cercano, ‘millares’ comunica el contraste numérico con ‘millares de Manasés’ de forma más natural en español y evita una solemnidad innecesaria.
- source_word: אַלְפֵי
  english_pob_choice: thousands
  chosen_spanish: millares
  alternatives_spanish:
  - miles
  - grupos de
  lexicon: HALOT
  rationale: El paralelo con רִבְבֹות pide un término numérico; ‘millares’ mantiene la pareja poética con ‘millares’ y evita la posible ambigüedad de ‘clanes’.
- source_word: אֶפְרַיִם / מְנַשֶּׁה
  english_pob_choice: Ephraim / Manasseh
  chosen_spanish: Efraín / Manasés
  lexicon: HALOT
  rationale: Se conservan los nombres tribales en transliteración estándar española para respetar su función propia como designaciones de tribus.
theological_decisions:
- issue: Imagen bovina y referente de la bendición
  english_pob_reading: The verse uses bovine imagery metaphorically for Joseph's strength, culminating in the military fruitfulness of Ephraim and Manasseh.
  chosen_spanish_reading: El verso conserva la imagen bovina como metáfora de fuerza para José, y culmina en la multiplicación/belicosidad de Efraín y Manasés.
  alternative_spanish_readings:
  - Tomarlo de manera más específica como una descripción directa de Efraín.
  - Suavizar la imagen para que no parezca una violencia demasiado literal.
  rationale: La traducción mantiene la metáfora sin explicarla de más ni resolverla en el texto principal; así se preserva la tensión observada en el original y en el POB inglés entre el retrato animal y la identificación final con las tribus.
  doctrine_reference: Preservar la tensión literaria y teológica del texto sin sobreinterpretación.
translation_notes:
  revision_awareness: Se siguió de cerca el último pase revisado del POB en inglés, que quedó sin cambios, y no se introdujeron ajustes doctrinales nuevos; la principal adaptación fue llevar al español la misma solución léxica para רְאֵם, רִבְבֹות y el paralelismo final, respetando la nota de alternativa donde el español abre una ambigüedad equivalente.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’/‘Mesías’ según los defaults del proyecto cuando no aplicaban aquí; este versículo no contiene el nombre divino ni lenguaje mesiánico directo.
  - Se preservó el paralelismo numérico del cierre con una misma base léxica (‘millares’) para no perder el contraste retórico entre Efraín y Manasés.
  - ‘Corneará’ conserva el sentido corporal del verbo hebreo y evita una generalización como ‘atacará’, que debilitaría la imagen.
  - La traducción principal evita ‘unicornio’ por la razón lexical ya documentada en el audit trail inglés.
