base_translation:
  language: en
  yaml_path: translation/ot/numbers/022/005.yaml
  text: So he sent messengers to Balaam son of Beor at Pethor[a], which is by the River, in the land of the sons of his people, to call him, saying, “Look, a people has come out of Egypt. Look, it has covered the face of the land[c][b], and it is dwelling opposite me.”
  footnotes:
  - marker: a
    text: Hebrew 'the River'; likely the Euphrates.
    reason: cross_reference
  - marker: b
    text: Or 'in the land of his people.' The Hebrew phrase 'the land of the sons of his people' is difficult, and the pronoun 'his' may be understood in different ways.
    reason: alternative_reading
  - marker: c
    text: Literally 'has covered the face of the land'; compare the more literal but less clear 'eye of the land.'
    reason: lexical_alternative
