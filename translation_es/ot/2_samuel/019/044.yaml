base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/019/044.yaml
  text: Then the man of Israel answered the man of Judah and said[a], “I have ten shares in the king, and in David also I have more than you[d][c][b]. Why then did you treat me lightly? Was not my word first in bringing back my king?” But the word of the men of Judah was harsher than the word of the men of Israel.
  footnotes:
  - marker: a
    text: Hebrew literally, “ten hands to me in the king,” an idiom meaning ten shares or portions—likely referring to the ten northern tribes’ claim over against Judah.
    reason: cultural_note
  - marker: b
    text: Or, “in David also I have a greater claim than you.” The Hebrew is elliptical but expresses comparative claim or stake.
    reason: lexical_alternative
  - marker: c
    text: Or, “Was not my proposal first to bring back my king?”
    reason: alternative_reading
  - marker: d
    text: Or, “the words of the men of Judah were stronger/fiercer than the words of the men of Israel.”
    reason: lexical_alternative
