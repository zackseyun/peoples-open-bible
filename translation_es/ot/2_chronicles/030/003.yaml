base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/030/003.yaml
  text: For they could not do it at that time[a], because the priests had not consecrated themselves sufficiently[b], and the people had not gathered to Jerusalem.
  footnotes:
  - marker: a
    text: Or 'to Jerusalem.' The Hebrew preposition is literally 'to,' but in English 'gather in Jerusalem' more naturally expresses the assembly's location.
    reason: lexical_alternative
  - marker: b
    text: Or 'had not consecrated themselves enough' / 'not enough had consecrated themselves.' The Hebrew expression is compact and may refer either to adequate consecration or to an insufficient number of consecrated priests.
    reason: lexical_alternative
