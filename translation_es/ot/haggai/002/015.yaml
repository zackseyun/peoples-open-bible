  - marker: a
    text: 'O, de manera más literal, «pongan su corazón en esto». También puede traducirse de manera más interpretativa: «consideren desde hoy en adelante».'
    reason: lexical_alternative
  revision_rationale: Se revisa para mejorar la naturalidad del español sin perder el sentido del hebreo. «Presten atención a esto» comunica mejor la exhortación idiomática de שִׂימוּ נָא לְבַבְכֶם, mientras la nota conserva la imagen literal «pongan su corazón». Se mantiene «Yahvé» según la terminología del proyecto y la estructura general del versículo, con un ajuste menor para claridad temporal.
