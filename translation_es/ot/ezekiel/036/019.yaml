translation:
  language: es
  text: Así los esparcí entre las naciones, y fueron dispersados por las tierras[a]; los juzgué conforme a sus caminos y conforme a sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron esparcidos por los países».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָפִיץ
  english_pob_choice: I scattered
  chosen_spanish: los esparcí
  alternatives_spanish:
  - los dispersé
  - los esparcí y dispersé
  lexicon: HALOT
  rationale: El hiphil de פוץ expresa causar dispersión. En español, «esparcí» comunica bien la acción activa de Yahvé y suena natural; evita repetir innecesariamente «dispersé» en la misma línea mientras conserva la agencia divina.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: HALOT
  rationale: גּוֹיִם se refiere aquí a naciones extranjeras en contexto de exilio. «Naciones» es la opción más precisa y menos cargada que «gentiles»; «entre» funciona de manera idiomática en español para la dispersión entre varios grupos/territorios.
- source_word: וַיִּזָּרוּ
  english_pob_choice: they were dispersed
  chosen_spanish: fueron dispersados
  alternatives_spanish:
  - fueron esparcidos
  - quedaron dispersos
  lexicon: HALOT
  rationale: El nifal mantiene la idea de dispersión sufrida como resultado de la acción previa. «Fueron dispersados» conserva el matiz pasivo y evita una repetición exacta de «esparcí», aunque sigue reflejando la misma red semántica.
- source_word: בָּאֲרָצוֹת
  english_pob_choice: through the lands
  chosen_spanish: por las tierras
  alternatives_spanish:
  - por los países
  - en las tierras
  lexicon: HALOT
  rationale: אֲרָצוֹת pluraliza «tierra/territorio» y aquí indica extensión por diversos territorios. «Tierras» mantiene la amplitud del hebreo sin imponer una equivalencia moderna demasiado estrecha como «países».
- source_word: כְּדַרְכָּם
  english_pob_choice: according to their ways
  chosen_spanish: conforme a sus caminos
  alternatives_spanish:
  - según sus caminos
  - de acuerdo con su conducta
  lexicon: HALOT
  rationale: «Caminos» preserva la metáfora bíblica del modo de vida o conducta moral. «Conforme a» conserva el valor normativo/judicial de la frase y su registro bíblico sin caer en arcaísmo excesivo.
- source_word: וְכַעֲלִילוֹתָם
  english_pob_choice: and according to their deeds
  chosen_spanish: y conforme a sus obras
  alternatives_spanish:
  - y según sus hechos
  - y conforme a sus acciones
  lexicon: HALOT
  rationale: עֲלִילוֹת apunta a hechos/acciones con peso moral. «Obras» es una opción digna y comprensible en español bíblico; mantiene la relación con juicio sin reducir el término a meras «acciones» neutras.
- source_word: שְׁפַטְתִּים
  english_pob_choice: I judged them
  chosen_spanish: los juzgué
  alternatives_spanish:
  - los sentencié
  - los puse bajo juicio
  lexicon: HALOT
  rationale: שׁפט conserva su sentido judicial básico. «Juzgué» refleja la formulación directa del hebreo y deja abierta la relación entre juicio y castigo sin introducir una lectura más específica que el texto no exige.
theological_decisions:
- issue: El exilio como acto judicial divino
  english_pob_reading: The verse presents exile as God's judicial act in response to Israel's conduct.
  chosen_spanish_reading: El versículo presenta la dispersión y el exilio como un acto judicial de Yahvé en respuesta a la conducta de Israel.
  alternative_spanish_readings:
  - El versículo solo describe el resultado de la dispersión sin enfatizar la agencia divina.
  - La frase puede leerse principalmente como una descripción histórica del exilio.
  rationale: El hebreo usa verbos en primera persona para atribuir a Yahvé tanto la dispersión como el juicio. La traducción mantiene esa agencia y la relación con la conducta del pueblo, sin añadir detalles doctrinales externos ni suavizar la responsabilidad divina indicada por el texto.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica del texto; no resolver ni rebajar la atribución divina del juicio.'
translation_notes:
  revision_awareness: Coincide con el último pase revisado como sin cambios; no se detectan necesidades de ajuste respecto del contexto auditado en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como sujeto implícito de la primera persona verbal, conforme al criterio del proyecto para el Tetragrámaton cuando está presente en el trasfondo del hebreo.
  - Se evita «SEÑOR» como máscara y se conserva la dualidad semántica entre el acto activo de dispersar y el resultado pasivo de ser dispersados.
  - «Caminos» y «obras» preservan el paralelismo moral/judicial del hebreo sin volverlo más explicativo de lo que permite el texto.
