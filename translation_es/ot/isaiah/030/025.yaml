  text: וְ/הָיָ֣ה עַל כָּל הַ֣ר גָּבֹ֗הַ וְ/עַל֙ כָּל גִּבְעָ֣ה נִשָּׂאָ֔ה פְּלָגִ֖ים יִבְלֵי מָ֑יִם בְּ/יוֹם֙ הֶ֣רֶג רָ֔ב בִּ/נְפֹ֖ל מִגְדָּלִֽים׀־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/030/025.yaml
  text: And on every high mountain and on every lofty hill there will be streams[a], channels of water, on the day of great slaughter, when the towers fall.
