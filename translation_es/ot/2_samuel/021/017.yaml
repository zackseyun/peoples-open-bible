translation:
  language: es
  text: 'Pero Abisay, hijo de Seruiá, acudió en su ayuda[a], golpeó al filisteo y lo mató. Entonces los hombres de David le juraron, diciendo: «No volverás a salir con nosotros a la guerra, no sea que apagues la lámpara de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la luz de Israel». El hebreo dice «lámpara», una metáfora del papel vital de David en la vida y estabilidad de la nación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזָר לוֹ
  english_pob_choice: came to his aid
  chosen_spanish: fue en su ayuda
  alternatives_spanish:
  - lo ayudó
  - acudió en su ayuda
  - lo socorrió
  lexicon: HALOT
  rationale: El verbo עזר expresa ayuda o auxilio. «Fue en su ayuda» conserva el sentido de intervención concreta en combate y suena natural en español sin perder la relación directa con el hebreo.
- source_word: אֲבִישַׁי בֶּן צְרוּיָה
  english_pob_choice: Abishai son of Zeruiah
  chosen_spanish: Abisay, hijo de Seruiá
  alternatives_spanish:
  - Abisai, hijo de Zeruiá
  - Abishai, hijo de Seruiá
  lexicon: convención onomástica bíblica
  rationale: Se translitera el nombre propio y se vierte בן como relación filial. «Seruiá» mantiene una forma castellana ampliamente reconocible y evita una calca mecánica del inglés.
- source_word: וַיַּךְ אֶת הַפְּלִשְׁתִּי
  english_pob_choice: struck the Philistine
  chosen_spanish: golpeó al filisteo
  alternatives_spanish:
  - hirió al filisteo
  - atacó al filisteo
  - hirió de golpe al filisteo
  lexicon: HALOT
  rationale: נכה significa golpear, herir o derribar. Como el siguiente verbo ya expresa la muerte, «golpeó» evita redundancia y conserva el movimiento narrativo.
- source_word: וַיְמִיתֵהוּ
  english_pob_choice: and killed him
  chosen_spanish: lo mató
  alternatives_spanish:
  - y lo hizo morir
  - y lo puso a muerte
  lexicon: HALOT
  rationale: מות en causativo aquí indica provocar la muerte. «Lo mató» es la forma más natural y precisa en español contemporáneo.
- source_word: אָז נִשְׁבְּעוּ אַנְשֵׁי דָוִד לוֹ
  english_pob_choice: Then David’s men swore to him
  chosen_spanish: Entonces los hombres de David le juraron
  alternatives_spanish:
  - Entonces los hombres de David hicieron un juramento a él
  - Luego los hombres de David le prometieron bajo juramento
  lexicon: HALOT
  rationale: נשבע alude a tomar juramento. «Le juraron» conserva la fórmula breve y solemne del hebreo, y «los hombres de David» refleja bien el constructo.
- source_word: לֹא תֵצֵא עוֹד אִתָּנוּ לַמִּלְחָמָה
  english_pob_choice: You must not go out with us to battle any longer
  chosen_spanish: No volverás a salir con nosotros a la guerra
  alternatives_spanish:
  - No saldrás más con nosotros a la guerra
  - No saldrás de nuevo con nosotros para la batalla
  lexicon: HALOT
  rationale: El imperfecto tras el juramento transmite una prohibición solemne. «No volverás a salir» comunica bien la fuerza volitiva; «a la guerra» preserva el término amplio de מִלְחָמָה.
- source_word: וְלֹא תְכַבֶּה
  english_pob_choice: lest you extinguish
  chosen_spanish: no sea que apagues
  alternatives_spanish:
  - y no apagues
  - para que no apagues
  lexicon: HALOT
  rationale: Aunque la forma hebrea coordina con וְלֹא, el sentido es de prevención del resultado temido. «No sea que» reproduce adecuadamente esa relación en español.
- source_word: נֵר יִשְׂרָאֵל
  english_pob_choice: the lamp of Israel
  chosen_spanish: la lámpara de Israel
  alternatives_spanish:
  - la luz de Israel
  - el candelero de Israel
  lexicon: HALOT
  rationale: נֵר es literalmente una lámpara o lámpara de aceite. Se conserva la metáfora concreta; «lámpara» es más fiel al objeto que «luz», que ya interpreta el símbolo.
theological_decisions:
- issue: Metáfora real de David como sostén vital de Israel
  english_pob_reading: Retain the metaphor 'the lamp of Israel' in the main text
  chosen_spanish_reading: Conservar la metáfora «la lámpara de Israel» en el texto principal
  alternative_spanish_readings:
  - la luz de Israel
  - la esperanza de Israel
  rationale: El hebreo usa una imagen concreta y no una explicación abstracta. Mantener «lámpara» preserva la fuerza literaria y teológica de David como sostén de la nación sin sobreinterpretar el símbolo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el criterio óptimo-equivalente ya validado en la POB inglesa; se mantiene la metáfora central y se conserva el giro de prohibición solemne con una formulación española natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término base del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Lámpara» se mantiene en el texto principal para preservar el valor metafórico de נֵר, siguiendo la decisión auditada en inglés.
  - Se evita traducir mecánicamente «strike down» con una redundancia que el hebreo no exige, porque la muerte ya queda expresada por el segundo verbo.
