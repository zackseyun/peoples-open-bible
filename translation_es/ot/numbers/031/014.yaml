translation:
  language: es
  text: Moisés se enojó[a] con los oficiales del ejército, los jefes de los millares y los jefes de centenas, que venían del servicio de la guerra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se enfureció». El hebreo expresa ira/enojo; el grado exacto queda abierto al contexto.
    reason: lexical_alternative
  - marker: b
    text: O «del servicio militar de la guerra». La expresión hebrea combina la idea de host/servicio militar con guerra; no se reduce limpiamente a una sola frase en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְצֹף
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se encendió de ira
  - se enfureció
  - estaba enojado
  lexicon: HALOT
  rationale: קצף expresa ira o enojo. En español, «se enojó» comunica con naturalidad la reacción de Moisés sin intensificarla indebidamente.
- source_word: פְּקוּדֵי הֶחָיִל
  english_pob_choice: the officers of the army
  chosen_spanish: los encargados del ejército
  alternatives_spanish:
  - los oficiales del ejército
  - los nombrados del ejército
  - los supervisores del ejército
  lexicon: HALOT
  rationale: פְּקוּדֵי, de פקד, señala a personas asignadas o puestas a cargo. «Encargados del ejército» conserva esa idea administrativa y militar sin forzar un tecnicismo moderno.
- source_word: שָׂרֵי הָאֲלָפִים
  english_pob_choice: the commanders of thousands
  chosen_spanish: los jefes de los millares
  alternatives_spanish:
  - los comandantes de millares
  - los capitanes de millares
  - los jefes de mil
  lexicon: HALOT
  rationale: שָׂרִים son jefes o príncipes/líderes. «Jefes de los millares» mantiene la estructura hebrea y el orden militar de unidades numéricas.
- source_word: וְשָׂרֵי הַמֵּאוֹת
  english_pob_choice: and the commanders of hundreds
  chosen_spanish: los jefes de los cientos
  alternatives_spanish:
  - los comandantes de cientos
  - los capitanes de cientos
  - los jefes de centenares
  lexicon: HALOT
  rationale: Se mantiene el paralelo con la frase anterior y la organización militar por unidades. «Cientos» refleja el paralelismo hebreo de manera clara y directa.
- source_word: הַבָּאִים
  english_pob_choice: who were coming
  chosen_spanish: que venían
  alternatives_spanish:
  - que estaban viniendo
  - que llegaban
  - que regresaban
  lexicon: HALOT
  rationale: El participio describe a los que iban llegando; «que venían» conserva la idea de movimiento continuo y evita añadir la noción de regreso, que no está expresada explícitamente.
- source_word: מִצְּבָא הַמִּלְחָמָה
  english_pob_choice: from the service of the war
  chosen_spanish: del servicio de la guerra
  alternatives_spanish:
  - de la campaña de guerra
  - del servicio militar de guerra
  - de la milicia de guerra
  lexicon: HALOT
  rationale: צָבָא puede referir a servicio militar, host o campaña. La opción «servicio de la guerra» conserva la combinación semántica de servicio/milicia y guerra que el audit trail inglés quiso resguardar. Se evita simplificarlo solo a una «campaña» para no perder la tensión léxica.
theological_decisions:
- issue: La ira de Moisés frente a la conducta militar implicada en el contexto inmediato
  english_pob_reading: And Moses was angry...
  chosen_spanish_reading: Moisés se enojó...
  alternative_spanish_readings:
  - Moisés se enfureció
  - Moisés se indignó
  rationale: El versículo presenta una reacción emocional real de Moisés sin desarrollar una valoración doctrinal adicional. «Se enojó» conserva la fuerza del texto sin exagerar el grado de ira.
  doctrine_reference: Números 31:14 en su contexto narrativo inmediato
- issue: La frase mixta de servicio militar y guerra en צְבָא הַמִּלְחָמָה
  english_pob_reading: service of the war
  chosen_spanish_reading: servicio de la guerra
  alternative_spanish_readings:
  - servicio militar de guerra
  - campaña de guerra
  - milicia de guerra
  rationale: El hebreo combina ideas de host/servicio militar y guerra. La traducción elegida mantiene esa combinación sin resolverla por completo hacia un solo matiz, preservando la tensión léxica documentada en el POB inglés.
  doctrine_reference: Observación lexical sobre צָבָא y הַמִּלְחָמָה
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y toma como guía la decisión revisada del POB inglés de conservar la idea de «service of the war» en vez de interpretarla como «battle campaign». Se mantiene el paralelismo de cargos militares y se evita introducir la noción de regreso, ya que el participio hebreo solo dice que venían/llegaban.
  spanish_consistency_notes:
  - Se usa «Moisés» como nombre propio estándar.
  - Se conserva la estructura militar jerárquica del hebreo con «jefes de los millares» y «jefes de los cientos».
  - «Servicio de la guerra» intenta reflejar la tensión semántica del original sin normalizarla demasiado.
  - No se sustituye el lenguaje por formulaciones eclesiásticas ajenas al contexto militar del versículo.
