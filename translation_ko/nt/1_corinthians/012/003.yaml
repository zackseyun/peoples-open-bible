  text: διὸ γνωρίζω ὑμῖν ὅτι οὐδεὶς ἐν πνεύματι θεοῦ λαλῶν λέγει· Ἀνάθεμα ⸀Ἰησοῦς, καὶ οὐδεὶς δύναται εἰπεῖν· ⸂Κύριος Ἰησοῦς⸃ εἰ μὴ ἐν πνεύματι ἁγίῳ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/012/003.yaml
  text: Therefore I make known to you that no one speaking by the Spirit of God says[a], “Jesus is accursed,” and no one is able to say[b], “Jesus is Lord,” except by the Holy Spirit.
  footnotes:
  - marker: a
    text: Or, “Jesus be accursed,” reflecting the force of the Greek exclamation Ἀνάθεμα Ἰησοῦς.
    reason: lexical_alternative
  - marker: b
    text: 'Greek, “Lord Jesus”; in context the sense is confessional: “Jesus is Lord.”'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 나는 여러분에게 알립니다. 하나님의 영으로 말하는 자는 누구도 「예수께 저주가 있을지어다」라고 말하지 않으며, 누구도 성령으로 말미암지 않고서는 「예수는 주이시다」라고 말할 수 없습니다.
  philosophy: optimal-equivalence
