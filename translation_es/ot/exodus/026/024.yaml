base_translation:
  language: en
  yaml_path: translation/ot/exodus/026/024.yaml
  text: They shall be paired at the bottom[a], and together they shall be complete at its top, to the first ring. So it shall be for both of them[c][b]; they shall be for the two corners.
  footnotes:
  - marker: a
    text: Or 'twinned' or 'matching' at the bottom; the Hebrew describes the two boards as forming a matched pair.
    reason: lexical_alternative
  - marker: b
    text: Or 'whole' or 'perfectly fitted' at its top; the Hebrew term emphasizes structural completeness here, not moral perfection.
    reason: lexical_alternative
  - marker: c
    text: Or 'to the single ring'; the phrase may refer to the ring that joins the paired boards at the top.
    reason: lexical_alternative
