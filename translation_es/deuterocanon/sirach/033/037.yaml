    issue: «mediante prueba» es poco natural para ἐν πειρασμῷ
    rationale: Aunque semánticamente cercano, en español suena forzado y puede entenderse como una sola ‘prueba’ abstracta. El contexto sapiencial pide la idea de poner a prueba la confiabilidad del amigo.
  - severity: low
    issue: «no confíes en él con rapidez» es menos idiomático
    rationale: La construcción es comprensible, pero «demasiado pronto» o «rápidamente» suenan más naturales en español bíblico moderno. La advertencia es contra la confianza prematura, no solo contra la rapidez como modo.
  - severity: low
