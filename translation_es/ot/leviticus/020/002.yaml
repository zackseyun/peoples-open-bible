    reason: lexical_alternative
  - marker: b
    text: «Descendencia» traduce una palabra hebrea que literalmente significa «semilla», aquí en el sentido de hijos o descendientes.
    reason: lexical_alternative
  - marker: c
    text: Moloc puede referirse a una deidad asociada tradicionalmente con el sacrificio de niños; algunos intérpretes entienden en cambio que el término designa un tipo de ofrenda.
    reason: alternative_reading
  revision_rationale: Ajusté el texto para reflejar mejor el sentido judicial pasivo de מוֹת יוּמָת y la acción comunitaria plural de יִרְגְּמֻהוּ. También mejoré la naturalidad de «forastero que reside» a «extranjero residente», dejando la transparencia más literal en nota. Mantuve «los hijos de Israel», «descendencia», «Moloc» y «con piedras» por fidelidad al hebreo y al rastro léxico del POB.
