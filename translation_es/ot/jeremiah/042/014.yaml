  text: לֵ/אמֹ֗ר לֹ֚א כִּ֣י אֶ֤רֶץ מִצְרַ֨יִם֙ נָב֔וֹא אֲשֶׁ֤ר לֹֽא נִרְאֶה֙ מִלְחָמָ֔ה וְ/ק֥וֹל שׁוֹפָ֖ר לֹ֣א נִשְׁמָ֑ע וְ/לַ/לֶּ֥חֶם לֹֽא נִרְעָ֖ב וְ/שָׁ֥ם נֵשֵֽׁב־־׃
