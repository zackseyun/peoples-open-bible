review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: acción de colocar, ubicación sobre el efod, función conmemorativa, referencia a los hijos de Israel y cláusula final de conformidad con el mandato de Yahvé a Moisés. También mantiene correctamente ‘Yahvé’. Sin embargo, ‘hombrales’ no corresponde bien a כִּתְפֹת הָאֵפֹד; en español suena impropio o confuso para una vestidura. Además, la colocación de las notas sobre ‘memorial’ y ‘hijos de Israel’ conviene ajustarla para anclar cada nota a su expresión correspondiente.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero ‘hombrales del efod’ resulta poco natural y técnicamente inadecuado. ‘Hombreras del efod’ comunica mejor las piezas de hombro de la prenda sacerdotal en español eclesial legible. También mejora la legibilidad reubicar los marcadores de nota junto a las palabras pertinentes.
  glossary_alignment: Hay buena alineación con la terminología del proyecto en ‘Yahvé’ y ‘hijos de Israel’. ‘Piedras de memorial’ es aceptable, con alternativa en nota. La principal desalineación está en la elección de ‘hombrales’, que no representa bien el campo semántico de כִּתְפֹת en este contexto de vestimenta ritual.
  issues:
  - severity: high
    issue: ‘hombrales del efod’ para כִּתְפֹת הָאֵפֹד
    rationale: ‘Hombral’ en español se asocia al umbral o a un elemento arquitectónico, no a una pieza de hombro de una vestidura. El hebreo se refiere a las partes/hombreras del efod. ‘Hombreras del efod’ o ‘piezas de hombro del efod’ es mucho más fiel y natural.
  - severity: low
    issue: Ubicación de marcadores de nota
    rationale: La nota sobre la alternativa léxica de אַבְנֵי זִכָּרוֹן debe anclarse a ‘memorial’, y la nota sobre ‘hijos de Israel’ debe anclarse a esa expresión, no apilarse ambas tras ‘memorial’.
  revised_spanish_text: Y puso las piedras sobre las hombreras del efod, como piedras de memorial[a] para los hijos de Israel[b], tal como Yahvé había mandado a Moisés.
