translation:
  language: es
  text: Nada queda sino agacharse entre los cautivos[a] o caer entre los caídos. Por todo esto su ira no se ha apartado, y su mano sigue extendida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «agacharse bajo los cautivos, y caer bajo los caídos». El hebreo es muy comprimido, y se debate la relación exacta entre los verbos y las preposiciones.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּלְתִּי
  english_pob_choice: Nothing remains but
  chosen_spanish: Nada queda sino
  alternatives_spanish:
  - No queda sino
  - Nada queda más que
  - Solo queda
  lexicon: HALOT
  rationale: El hebreo abre con una cláusula muy comprimida que expresa el único resultado que queda. En español, «Nada queda sino» conserva esa fuerza de inevitabilidad sin volverla más explicativa de lo que permite el texto.
- source_word: כָרַע
  english_pob_choice: to crouch
  chosen_spanish: encorvarse
  alternatives_spanish:
  - inclinarse
  - agacharse
  - arrodillarse
  lexicon: HALOT
  rationale: El verbo indica doblarse o bajar el cuerpo. Aquí, con תַּחַת אַסִּיר, el sentido no es culto sino humillación forzada; «encorvarse» transmite bien esa postura de abatimiento sin volverla litúrgica.
- source_word: תַּחַת
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - bajo
  - debajo de
  - en medio de
  lexicon: HALOT
  rationale: Aunque literalmente es «bajo/debajo de», en este contexto de juicio funciona idiomáticamente como pertenecer al grupo de los cautivos o muertos. «Entre» refleja mejor esa relación en español.
- source_word: אַסִּיר
  english_pob_choice: the prisoners
  chosen_spanish: los cautivos
  alternatives_spanish:
  - los prisioneros
  - los presos
  - los encerrados
  lexicon: HALOT
  rationale: El término puede referirse a prisioneros o cautivos. «Cautivos» conserva el matiz de personas llevadas y sometidas por la guerra, que encaja bien con el paralelo de los muertos.
- source_word: הֲרוּגִים
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los asesinados
  - los heridos de muerte
  - los caídos
  lexicon: HALOT
  rationale: El participio pasivo se refiere a los que han sido muertos violentamente. «Los muertos» es más natural en español, aunque algo más amplio; se mantiene la imagen bélica por el paralelo con «cautivos» y el contexto de juicio.
- source_word: יִפֹּלוּ
  english_pob_choice: to fall
  chosen_spanish: caer
  alternatives_spanish:
  - caerán
  - se desplomarán
  lexicon: HALOT
  rationale: En la frase paralela, el infinitivo español «caer» da fluidez y reproduce la secuencia comprimida del hebreo, como en la lectura auditada del inglés POB.
- source_word: בְּכָל זֹאת
  english_pob_choice: For all this
  chosen_spanish: Por todo esto
  alternatives_spanish:
  - A pesar de todo esto
  - Con todo esto
  - En todo esto
  lexicon: HALOT
  rationale: «Por todo esto» conserva el valor recapitulativo del refrán isaiano y suena natural en español, sin perder la transición a la conclusión sobre la ira de Yahvé.
- source_word: לֹא שָׁב אַפּוֹ
  english_pob_choice: his anger has not turned away
  chosen_spanish: su ira no se ha apartado
  alternatives_spanish:
  - su ira no ha vuelto atrás
  - su enojo no se ha apartado
  - su furor no ha cedido
  lexicon: HALOT
  rationale: אַף se traduce mejor aquí por «ira» o «furor»; elegimos «ira» por su registro sobrio y bíblico. «Se ha apartado» conserva el valor de שׁוּב como apartarse o retirarse, manteniendo la imagen de una ira que no cede.
- source_word: יָדוֹ נְטוּיָה
  english_pob_choice: his hand is still stretched out
  chosen_spanish: todavía su mano está extendida
  alternatives_spanish:
  - su mano sigue extendida
  - su mano permanece extendida
  - todavía su mano está alzada
  lexicon: HALOT
  rationale: Se preserva la metáfora antropomórfica sin suavizarla. «Está extendida» mantiene la imagen de acción continua y evita reemplazarla por una abstracción como «su juicio continúa».
theological_decisions:
- issue: Imagen antropomórfica de juicio divino
  english_pob_reading: Retain the anthropomorphic expressions 'his anger' and 'his hand is still stretched out' without softening them.
  chosen_spanish_reading: Conservar «su ira» y «todavía su mano está extendida» sin convertirlas en una abstracción.
  alternative_spanish_readings:
  - su juicio no se ha agotado
  - todavía su castigo continúa
  rationale: El hebreo presenta la persistencia del juicio de Dios mediante imágenes corporales. La traducción debe preservar esa tensión literaria y teológica en lugar de resolverla en lenguaje abstracto.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: No se aplicaron revisiones recientes; el pasaje permanece estable en la última pasada, con acuerdo alto y solo observaciones menores. La decisión española sigue de cerca la lectura auditada del inglés POB, pero ajusta léxico y fluidez al español sin perder la ambigüedad estructural del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; aquí el versículo usa el pronombre y no nombra al sujeto.
  - Se conserva el paralelismo de juicio con una formulación breve y repetitiva, acorde con Isaías.
  - «Ira» se usa como equivalente de אַף por claridad y registro; «furor» quedaría como alternativa válida pero más marcada.
  - La nota [a] recoge la ambigüedad sintáctica señalada en el audit trail inglés, evitando fijar una sola reconstrucción.
