    rationale: ישית לַעֲרָפֶל expresa que Dios pondrá/convertirá la luz en lobreguez o densas tinieblas. 'Volver en' es forzado aquí; 'la convertirá en tinieblas' o 'la volverá tinieblas' comunica mejor el sentido.
  - severity: low
    issue: La nota al pie usa 'la volverá en sombra de muerte', que repite la misma construcción poco idiomática.
    rationale: Si se revisa el verbo principal, la alternativa tradicional también debe ajustarse para que el español sea natural y coherente con el anclaje del texto.
