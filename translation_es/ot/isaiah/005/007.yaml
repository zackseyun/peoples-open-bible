base_translation:
  language: en
  yaml_path: translation/ot/isaiah/005/007.yaml
  text: For the vineyard of Yahweh of Armies is the house of Israel[a], and the men of Judah are the planting of his delight. He looked for justice, but behold, bloodshed; for righteousness, but behold[c][b], an outcry.
  footnotes:
  - marker: a
    text: 'Hebrew plays on similar sounds: ''justice'' (mishpat) / ''bloodshed'' (mispach), and ''righteousness'' (tsedaqah) / ''outcry'' (tse''aqah). The wordplay sharpens the contrast between what the LORD sought and what he found.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the man of Judah,' with a collective sense; Hebrew singular אִישׁ can represent the group.
    reason: alternative_reading
  - marker: c
    text: '''LORD of Armies'' is traditionally rendered ''LORD of Hosts.'''
    reason: lexical_alternative
