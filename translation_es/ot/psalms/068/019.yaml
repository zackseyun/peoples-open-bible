  text: עָ֘לִ֤יתָ לַ/מָּר֨וֹם שָׁ֘בִ֤יתָ שֶּׁ֗בִי לָקַ֣חְתָּ מַ֭תָּנוֹת בָּ/אָדָ֑ם וְ/אַ֥ף ס֝וֹרְרִ֗ים לִ/שְׁכֹּ֤ן יָ֬הּ אֱלֹהִֽים׀׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/068/019.yaml
  text: You ascended on high[a]; you led captivity captive; you received gifts among men, even among the rebellious[b], so that Yah God might dwell there.
  footnotes:
  - marker: a
    text: Or 'from men'; the Hebrew preposition in 'gifts among men' can also be understood as indicating source, yielding 'you received gifts from men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that the LORD God might dwell among them' or 'as a dwelling for Yah God'; the Hebrew final clause is compact and may be construed in more than one way.
    reason: alternative_reading
