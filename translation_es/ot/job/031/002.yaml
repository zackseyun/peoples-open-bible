translation:
  language: es
  text: ¿Y cuál es la porción que viene de Dios[a] desde lo alto, y la herencia del Todopoderoso desde las alturas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de Dios desde lo alto ... desde las alturas». Las expresiones hebreas también pueden entenderse de manera más adverbial, enfatizando el origen celestial de la porción y de la herencia que vienen de Dios y del Todopoderoso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֶה
  english_pob_choice: And what is
  chosen_spanish: ¿Y cuál es
  alternatives_spanish:
  - ¿Y qué es
  - ¿Qué es
  lexicon: HALOT
  rationale: La forma interrogativa con la conjunción conserva el impulso retórico del hebreo. En español, «¿Y cuál es» suena natural y mantiene la pregunta completa sin añadir explicación ajena al texto.
- source_word: חֵלֶק
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - reparto
  - porción asignada
  lexicon: HALOT
  rationale: «Porción» preserva la idea de una parte asignada o destinada, en paralelo con «herencia» en el segundo hemistiquio.
- source_word: אֱלֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  - el Dios
  lexicon: HALOT
  rationale: El término poético singular se traduce con el equivalente normal «Dios». No se añade un título interpretativo como «Todopoderoso» en este sustantivo, porque ese matiz pertenece al segundo hemistiquio.
- source_word: מִמָּעַל
  english_pob_choice: from God above
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde arriba
  - de lo alto
  lexicon: HALOT
  rationale: La expresión indica procedencia desde arriba. En español, «desde lo alto» conserva el valor adverbial y evita convertir la frase en un añadido explicativo sobre Dios que no está en el hebreo.
- source_word: וְנַחֲלַת
  english_pob_choice: and the inheritance
  chosen_spanish: y la herencia
  alternatives_spanish:
  - y la posesión
  - y el patrimonio
  lexicon: HALOT
  rationale: «Herencia» reproduce bien la noción de una posesión asignada por derecho o reparto, y mantiene el paralelismo con «porción».
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  - el Omnipotente
  lexicon: HALOT
  rationale: Siguiendo la práctica del proyecto, el título se traduce para el lector hispanohablante. «Todopoderoso» es la equivalencia natural y tradicional sin perder el sentido del título divino.
- source_word: מִמְּרֹמִים
  english_pob_choice: from on high
  chosen_spanish: desde las alturas
  alternatives_spanish:
  - de las alturas
  - desde lo alto
  lexicon: HALOT
  rationale: El plural poético «alturas» refleja el lugar elevado indicado por el hebreo. «Desde las alturas» conserva el paralelismo y la repetición de la preposición de procedencia.
theological_decisions:
- issue: Dos designaciones divinas poéticas en paralelo
  english_pob_reading: Translate אֱלוֹהַּ as 'God' and שַׁדַּי as 'the Almighty'
  chosen_spanish_reading: Traducir אֱלֹהַּ como «Dios» y שַׁדַּי como «el Todopoderoso»
  alternative_spanish_readings:
  - Dios ... Shaddai
  - el Dios ... el Todopoderoso
  rationale: El verso usa dos títulos divinos poéticos en paralelo. Traducir ambos comunica el sentido al lector moderno y evita transliterar un título que en español tiene equivalente claro y establecido.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; transliterate names)'
translation_notes:
  revision_awareness: La redacción sigue el ajuste reciente del audit trail inglés que conserva la preposición de procedencia en ambos miembros («from ... from on high»). Por eso la versión española mantiene «desde ... desde ...» para reflejar la simetría del hebreo y no suavizarla en una sola expresión idiomática.
  spanish_consistency_notes:
  - Se traduce el nombre divino poético אֱלֹהַּ como «Dios» y el título שַׁדַּי como «el Todopoderoso», en consonancia con la terminología base del proyecto.
  - Se conserva el paralelismo entre חֵלֶק y נַחֲלָה con «porción» / «herencia» para reflejar una asignación o posesión dada.
  - La preposición de procedencia se mantiene dos veces («desde ... desde ...») para respetar la estructura del hebreo y la revisión auditada del inglés.
