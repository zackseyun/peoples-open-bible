translation:
  language: es
  text: ¿A dónde puedo ir[a] de tu Espíritu? ¿O a dónde puedo huir de tu presencia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo rúaj también puede significar «viento» o «aliento»; aquí el contexto favorece «Espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָ֭נָ֥ה
  english_pob_choice: Where
  chosen_spanish: ¿A dónde... ?
  alternatives_spanish:
  - ¿Dónde... ?
  - ¿Hacia dónde... ?
  lexicon: HALOT
  rationale: La partícula interrogativa pide destino o dirección. En español, «¿a dónde?» expresa con naturalidad movimiento hacia un lugar, mejor que un simple «¿dónde?» en este contexto poético.
- source_word: אֵלֵ֣ךְ
  english_pob_choice: can I go
  chosen_spanish: podría ir
  alternatives_spanish:
  - podré ir
  - debería ir
  lexicon: HALOT
  rationale: El imperfecto 1cs en esta pregunta retórica comunica posibilidad tentativa más que futuro simple. «Podría ir» conserva ese matiz sin volver la frase rígida.
- source_word: מֵ/רוּחֶ֑/ךָ
  english_pob_choice: from your Spirit
  chosen_spanish: lejos de tu Espíritu
  alternatives_spanish:
  - de tu Espíritu
  - de tu viento
  - de tu aliento
  lexicon: HALOT
  rationale: רוּחַ admite «viento», «aliento» o «espíritu». Aquí el paralelismo con «tu presencia» favorece un referente personal divino; en español, «Espíritu» mantiene ese peso teológico. Añadir «lejos de» ayuda a expresar la idea de separación de manera natural en español sin perder el valor de la preposición de origen.
- source_word: וְ֝/אָ֗נָה
  english_pob_choice: Or where
  chosen_spanish: ¿Y a dónde... ?
  alternatives_spanish:
  - ¿O a dónde... ?
  - ¿Y dónde... ?
  lexicon: HALOT
  rationale: La conjunción con el interrogativo repetido introduce el paralelismo segundo. En español, «¿Y a dónde... ?» conserva la relación poética con la primera pregunta; «¿O a dónde... ?» también es posible, pero aquí «Y» sigue la forma coordinante sin perder naturalidad.
- source_word: מִ/פָּנֶ֥י/ךָ
  english_pob_choice: from your presence
  chosen_spanish: de tu presencia
  alternatives_spanish:
  - de delante de ti
  - de tu rostro
  lexicon: HALOT
  rationale: פָּנִים literalmente es «rostro/cara», pero en este giro denota presencia personal. «De tu presencia» expresa con claridad el sentido idiomático en español.
- source_word: אֶבְרָֽח
  english_pob_choice: can I flee
  chosen_spanish: huiría
  alternatives_spanish:
  - podría huir
  - escaparía
  lexicon: HALOT
  rationale: El verbo ברח significa «huir». En la segunda mitad del paralelismo, «huiría» mantiene el valor verbal y el tono retórico de imposibilidad implícita. Se evita «escapar» por ser más interpretativo.
theological_decisions:
- issue: Sentido de רוּחַ en un contexto de omnipresencia divina
  english_pob_reading: your Spirit
  chosen_spanish_reading: tu Espíritu
  alternative_spanish_readings:
  - tu viento
  - tu aliento
  rationale: El Salmo 139 subraya que nadie puede sustraerse a la presencia de Dios. El paralelismo entre «tu Espíritu» y «tu presencia» favorece una referencia personal y teológica, no meteorológica ni meramente fisiológica. Mantener «Espíritu» preserva ese peso sin sobreexplicar.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Valor de la segunda pregunta en el paralelismo poético
  english_pob_reading: Or where can I flee from your presence?
  chosen_spanish_reading: ¿Y a dónde huiría de tu presencia?
  alternative_spanish_readings:
  - ¿O a dónde huiría de tu presencia?
  - ¿Y a dónde podría huir de tu presencia?
  rationale: La poesía hebrea repite la pregunta con variación para intensificar la imposibilidad de escapar. En español, la forma elegida mantiene el paralelismo y el sentido retórico sin introducir una explicación ajena al texto.
  doctrine_reference: Psalm 139; Translation philosophy §2
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la última revisión disponible: no hay cambios de contenido ni necesidad de corregir decisiones previas. La versión española conserva el paralelismo, la interrogación retórica y la lectura teológica de רוּחַ como referencia al Espíritu de Dios.'
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por referirse al Espíritu de Dios, en coherencia con el contexto y con la lectura auditada.
  - «Presencia» traduce פָּנִים en su valor idiomático, evitando el literalismo «rostro» que sonaría menos natural en español.
  - La primera mitad usa «podría ir» para reflejar posibilidad retórica; la segunda mantiene «huiría» para no hacer ambas cláusulas idénticas y conservar el paralelismo poético.
