translation:
  language: es
  text: Entonces, a una mitad de la tribu de Manasés Moisés había dado tierra en Basán, pero a la otra mitad Josué dio tierra con sus hermanos[a] más allá del Jordán, hacia el occidente. Y cuando Josué los despidió para que regresaran a sus tiendas, los bendijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con sus hermanos». Se refiere a sus compañeros israelitas de las otras tribus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחֲצִי שֵׁבֶט הַמְנַשֶּׁה
  english_pob_choice: to the one half-tribe of Manasseh
  chosen_spanish: a la media tribu de Manasés
  alternatives_spanish:
  - a la mitad de la tribu de Manasés
  - a la media tribu de Manasés
  lexicon: HALOT
  rationale: La expresión hebrea designa una de las dos divisiones de la tribu; en español, «media tribu» comunica con naturalidad esa partición sin añadir más de lo que el texto dice.
- source_word: נָתַן מֹשֶׁה
  english_pob_choice: Moses had given
  chosen_spanish: Moisés había dado
  alternatives_spanish:
  - Moisés dio
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja la prioridad temporal de la concesión de Moisés respecto de la de Josué en el contexto narrativo.
- source_word: בַּבָּשָׁן
  english_pob_choice: in Bashan
  chosen_spanish: en Basán
  alternatives_spanish:
  - en el Basán
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico propio con la forma usual en español bíblico; no requiere artículo.
- source_word: וּלְחֶצְיוֹ
  english_pob_choice: to the other half
  chosen_spanish: a la otra mitad
  alternatives_spanish:
  - a su otra mitad
  - a la otra parte
  lexicon: HALOT
  rationale: El sufijo posesivo remite a la tribu de Manasés; «la otra mitad» mantiene el contraste explícito con «media tribu» y suena natural en español.
- source_word: נָתַן יְהוֹשֻׁעַ
  english_pob_choice: Joshua gave land
  chosen_spanish: Josué dio tierra
  alternatives_spanish:
  - Josué dio
  - Josué les dio tierra
  lexicon: HALOT
  rationale: Aunque «tierra» no aparece de modo explícito en la forma verbal, el contexto de reparto de heredad lo exige y el POB inglés también lo hizo explícito para claridad.
- source_word: עִם אֲחֵיהֶם
  english_pob_choice: with their brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - con sus parientes
  - con sus hermanos e Israel
  lexicon: HALOT
  rationale: Se preserva el término de parentesco literal. En este contexto se refiere a los otros israelitas, pero en el texto principal conviene no neutralizar la formulación.
- source_word: מֵעֵבֶר הַיַּרְדֵּן יָמָּה
  english_pob_choice: beyond the Jordan westward
  chosen_spanish: más allá del Jordán, hacia el occidente
  alternatives_spanish:
  - al otro lado del Jordán, hacia el occidente
  - al occidente del Jordán
  lexicon: HALOT
  rationale: La construcción hebrea indica el lado occidental del Jordán mediante una referencia direccional; «hacia el occidente» conserva el matiz literal y evita reemplazarlo por una formulación más interpretativa.
- source_word: וְגַם כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y además cuando
  - Y también cuando
  lexicon: HALOT
  rationale: La combinación introduce una acción narrativa adicional; en español, «Y cuando» reproduce de manera natural la fuerza temporal sin sobrecargar la conexión.
- source_word: שִׁלְּחָם
  english_pob_choice: sent them away
  chosen_spanish: los despidió
  alternatives_spanish:
  - los envió
  - los mandó irse
  lexicon: HALOT
  rationale: El verbo puede implicar despedir o enviar con licencia de partir; «despidió» recoge bien ese sentido de separación al terminar la distribución.
- source_word: אֶל אָהֳלֵיהֶם
  english_pob_choice: to their tents
  chosen_spanish: a sus tiendas
  alternatives_spanish:
  - a sus campamentos
  - a sus hogares
  lexicon: HALOT
  rationale: «Tiendas» preserva la imagen concreta del hebreo y conviene al marco histórico; no se sustituye por una metáfora moderna más interpretativa.
- source_word: וַיְבָרֲכֵם
  english_pob_choice: he blessed them
  chosen_spanish: los bendijo
  alternatives_spanish:
  - pronunció una bendición sobre ellos
  lexicon: HALOT
  rationale: Es el equivalente directo y estándar de ברך en este contexto narrativo; no hace falta expandirlo.
theological_decisions:
- issue: Valor temporal del reparto entre Moisés y Josué
  english_pob_reading: Moses had given... but Joshua gave...
  chosen_spanish_reading: Moisés había dado... pero Josué dio...
  alternative_spanish_readings:
  - Moisés dio... pero Josué dio...
  rationale: 'El pluscuamperfecto en la primera cláusula ayuda a preservar la secuencia histórica: primero la asignación de Moisés, luego la de Josué. No introduce doctrina, solo claridad narrativa.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que ajustó la frase geográfica de 'on the west side of the Jordan' a 'beyond the Jordan westward' para reflejar más de cerca el hebreo. La versión española sigue esa misma dirección semántica con «más allá del Jordán, hacia el occidente», manteniendo la referencia occidental sin convertirla en una explicación excesiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no ocurre.
  - «Manasés» y «Josué» se mantienen como formas bíblicas estándar en español.
  - Se conserva la imagen concreta de «tiendas» para no diluir el entorno narrativo.
  - El pie de nota marca la única aclaración lexical necesaria sobre «sus hermanos» y su referencia a las otras tribus.
