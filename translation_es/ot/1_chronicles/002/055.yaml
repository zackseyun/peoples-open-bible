translation:
  language: es
  text: 'Y las familias de los escribas que vivían en Jabez: los tiratitas, los simeatitas y los sucatitas. Estos son los queneos que vinieron de Hamat, el padre[a] de la casa de Recab.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el antepasado/fundador de la casa de Recab». El hebreo «padre» suele denotar un progenitor o fundador en contextos genealógicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִשְׁפְּחוֹת
  english_pob_choice: and the families of
  chosen_spanish: y las familias de
  alternatives_spanish:
  - y familias de
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת refiere a grupos familiares o clanes; en español, «las familias de» conserva el sentido genealógico y la coordinación del hebreo con un sintagma natural.
- source_word: סֹפְרִים
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los secretarios
  - los letrados
  lexicon: HALOT
  rationale: סֹפְרִים denota escribas o escribientes vinculados con escritura y registro; «escribas» es el equivalente más directo y transparente.
- source_word: ישבו יַעְבֵּץ
  english_pob_choice: who lived at Jabez
  chosen_spanish: que vivían en Jabez
  alternatives_spanish:
  - que habitaban en Jabez
  - que moraban en Jabez
  lexicon: HALOT
  rationale: El verbo en plural indica residencia continuada; «vivían en» transmite con claridad el valor locativo sin forzar un matiz migratorio.
- source_word: תִּרְעָתִים
  english_pob_choice: the Tirathites
  chosen_spanish: los tiratitas
  alternatives_spanish:
  - los tirátitas
  lexicon: HALOT
  rationale: Es un nombre gentilicio o de grupo; se translitera al español como etnónimo para conservar su carácter propio.
- source_word: שִׁמְעָתִים
  english_pob_choice: the Shimeathites
  chosen_spanish: los simeatitas
  alternatives_spanish:
  - los shimeatitas
  lexicon: HALOT
  rationale: También es un nombre de clan; «simeatitas» adapta la forma al español manteniendo la identificación grupal.
- source_word: שׂוּכָתִים
  english_pob_choice: the Sucathites
  chosen_spanish: los sucatitas
  alternatives_spanish:
  - los sukatitas
  lexicon: HALOT
  rationale: Otro etnónimo; la transliteración española preserva el paralelismo con los otros nombres de grupo.
- source_word: הֵמָּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos eran
  - Ellos son
  lexicon: HALOT
  rationale: La partícula pronominal funciona identificativamente; «Estos son» encaja bien con la enumeración y la explicación siguiente.
- source_word: הַ/קִּינִים
  english_pob_choice: the Kenites
  chosen_spanish: los queneos
  alternatives_spanish:
  - los ceneos
  lexicon: HALOT
  rationale: Se elige la forma castellana tradicional «queneos» para el etnónimo קִינִים, manteniendo identidad histórica y legibilidad.
- source_word: הַ/בָּאִים מֵ/חַמַּת
  english_pob_choice: who came from Hammath
  chosen_spanish: que vinieron de Hamat
  alternatives_spanish:
  - que procedían de Hamat
  - que llegaron de Hamat
  lexicon: HALOT
  rationale: El participio con מִן expresa procedencia; «vinieron de» conserva el movimiento/origen sin imponer una precisión extra no explícita.
- source_word: אֲבִי בֵית רֵכָב
  english_pob_choice: the father of the house of Rechab
  chosen_spanish: el padre de la casa de Recab
  alternatives_spanish:
  - el antepasado de la casa de Recab
  - el fundador de la casa de Recab
  lexicon: HALOT
  rationale: אָב puede indicar progenitor o fundador en contextos genealógicos; se mantiene el hebraísmo «padre de la casa de» y «casa» como linaje/clan.
theological_decisions:
- issue: Sentido genealógico de «padre» en אַבִי
  english_pob_reading: The father of the house of Rechab, with a note allowing ancestor/founder.
  chosen_spanish_reading: el padre de la casa de Recab, con la misma posibilidad implícita de progenitor o fundador
  alternative_spanish_readings:
  - el antepasado de la casa de Recab
  - el fundador de la casa de Recab
  rationale: El hebreo usa un idiomá genealógico que puede significar progenitor o fundador. La traducción principal conserva el giro literal, y las alternativas explicitan la tensión semántica sin resolverla de forma indebida.
  doctrine_reference: Uso genealógico de אָב en genealogías bíblicas; cf. 1 Crónicas 4:12; 2 Reyes 10:15
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra acuerdo alto y sin cambios recientes; no se requirieron revisiones textuales adicionales, solo adaptación española fiel al hebreo y a la decisión inglesa sobre אַבִי.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto, pero este versículo no contiene el nombre divino.
  - Se usa «escribas» para סֹפְרִים, manteniendo el valor profesional estándar.
  - Los etnónimos se transliteran con morfología natural del español para conservar la serie paralela del verso.
  - «Casa de Recab» se usa como linaje/clan, no como edificio físico.
