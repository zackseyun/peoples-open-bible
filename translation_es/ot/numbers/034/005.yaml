translation:
  language: es
  text: Entonces el límite girará desde Azmón hasta el torrente de Egipto[a], y su extremo[b] estará en el mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «wadi de Egipto». El hebreo נחל suele referirse a un cauce estacional o wadi; «torrente de Egipto» se mantiene en el texto principal por claridad y continuidad.
    reason: lexical_alternative
  - marker: b
    text: O «sus extremos». El hebreo emplea una forma plural («sus salidas/extremos») para el punto terminal del límite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַב
  english_pob_choice: Then ... shall turn
  chosen_spanish: Entonces ... se desviará
  alternatives_spanish:
  - y ... rodeará
  - entonces ... dará vuelta
  lexicon: HALOT
  rationale: En un contexto de descripción fronteriza, נסב expresa un cambio de dirección del límite. «Se desviará» transmite ese movimiento de forma natural en español y conserva el valor direccional sin volverlo demasiado mecánico.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: En una delimitación territorial, גְּבוּל puede traducirse por «límite» o «frontera». «Límite» suena más preciso y sobrio para una descripción geográfica formal.
- source_word: מֵעַצְמוֹן
  english_pob_choice: from Azmon
  chosen_spanish: desde Azmón
  alternatives_spanish:
  - de Azmón
  lexicon: Transliteración propia
  rationale: Es un nombre propio de lugar. Se translitera como «Azmón» siguiendo la política del proyecto y adaptándolo a la ortografía española.
- source_word: נַחְלָה מִצְרַיִם
  english_pob_choice: to the Brook of Egypt
  chosen_spanish: hacia el torrente de Egipto
  alternatives_spanish:
  - hacia el wadi de Egipto
  - hacia el arroyo de Egipto
  - hacia el torrente/arroyo de Egipto
  lexicon: HALOT
  rationale: נחל suele designar un cauce estacional, wadi o torrente, no necesariamente un río permanente. «Torrente de Egipto» evita la posible confusión con el Nilo y preserva el sentido topográfico del hebreo; la alternativa «wadi» queda implícita como equivalencia semántica, pero «torrente» es más natural en español bíblico contemporáneo.
- source_word: וְהָיוּ
  english_pob_choice: and ... shall be
  chosen_spanish: y ... estará
  alternatives_spanish:
  - y ... serán
  - y ... quedará
  lexicon: HALOT
  rationale: El verbo copulativo introduce el punto final del límite. En español, «estará» mantiene la referencia a la ubicación terminal y suena más natural que una repetición literal de «será».
- source_word: תוֹצְאֹתָיו
  english_pob_choice: its end
  chosen_spanish: su salida
  alternatives_spanish:
  - sus extremos
  - su terminación
  - su salida(s)
  lexicon: HALOT
  rationale: El hebreo plural de forma תוצאות puede referirse a los extremos, salidas o terminaciones de un límite. «Su salida» conserva el valor espacial de «salida/llegada al extremo» y permite una nota para la alternativa plural que el hebreo sugiere.
- source_word: הַיָּמָּה
  english_pob_choice: at the sea
  chosen_spanish: hacia el mar
  alternatives_spanish:
  - al mar
  - junto al mar
  lexicon: HALOT
  rationale: En lenguaje de frontera, הַיָּמָּה indica dirección o término hacia el mar. «Hacia el mar» reproduce mejor esa orientación que una simple ubicación estática.
theological_decisions:
- issue: Alcance geográfico del término נחל en la frontera de Israel
  english_pob_reading: to the Brook of Egypt, with a note that the Hebrew may mean 'Wadi of Egypt.'
  chosen_spanish_reading: torrente de Egipto, con nota sobre la posibilidad de «wadi de Egipto»
  alternative_spanish_readings:
  - arroyo de Egipto
  - wadi de Egipto
  - río de Egipto
  rationale: La decisión evita el posible malentendido de «río» como un cauce principal y mantiene la tensión lexical documentada por la POB entre la forma tradicional y el sentido topográfico más preciso.
  doctrine_reference: Geografía bíblica y traducción lexical; no implica una doctrina controvertida.
- issue: Valor plural de תוצאות aplicado a una sola frontera
  english_pob_reading: its extremities shall be at the sea
  chosen_spanish_reading: su salida estará hacia el mar, con nota sobre «sus extremos»
  alternative_spanish_readings:
  - sus extremos estarán hacia el mar
  - su terminación estará hacia el mar
  rationale: El hebreo usa una forma plural para el punto terminal del límite. La redacción principal en singular es idiomática en español, pero la nota preserva la tensión plural documentada por el texto fuente.
  doctrine_reference: Precisión semántica del texto hebreo; no afecta una doctrina.
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado revisado más reciente sin introducir cambios sustanciales respecto del acuerdo alto del control cruzado. Se ajustó la formulación española para hacer explícita la dirección del límite y conservar la alternativa lexical de נחל y el plural de תוצאות en notas breves.
  spanish_consistency_notes:
  - Se mantuvo la transliteración del topónimo Azmón.
  - Se prefirió «Yahvé» solo cuando el hebreo lo exija; este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el texto fuente.
  - Se conservó el tono de descripción territorial formal, propio de listas fronterizas bíblicas.
