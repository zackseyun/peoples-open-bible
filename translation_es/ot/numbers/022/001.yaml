review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea y las decisiones del POB: «partieron», «los hijos de Israel», «acamparon» y «las llanuras de Moab» representan fielmente וַיִּסְעוּ, בְּנֵי יִשְׂרָאֵל, וַיַּחֲנוּ y בְּעַרְבוֹת מוֹאָב. También conserva correctamente la nota sobre la relatividad geográfica de מֵעֵבֶר לַיַּרְדֵּן. Sin embargo, la combinación «al otro lado del Jordán, frente a Jericó» sobretraduce la relación final respecto de יְרֵחוֹ y se aparta de la decisión auditada del POB, que prefirió una referencia más simple tipo «at Jericho» como hito geográfico.'
  spanish_quality_summary: 'El español es claro y digno. La única reparación necesaria es estilístico-semántica: «frente a Jericó» suena más específico y visual que el hebreo exige, mientras que «a la altura de Jericó» o «junto a Jericó» expresa mejor el uso de Jericó como punto de referencia sin forzar una oposición exacta. Además, conviene reubicar las notas para que el anclaje corresponda más precisamente a los elementos comentados.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé/Mesías ni otros términos sensibles. «Los hijos de Israel» respeta la preferencia del POB frente a «los israelitas».
  issues:
  - severity: medium
    issue: «frente a Jericó» añade una precisión espacial más fuerte que la necesaria
    rationale: El hebreo simplemente añade «Jericó» como hito geográfico. Aunque «frente a» es posible, sugiere una oposición exacta o visual. La auditoría inglesa favoreció una formulación menos cargada; en español conviene una opción más neutra como «a la altura de Jericó».
  - severity: low
    issue: Los marcadores de notas están agrupados tras «Moab» en vez de anclarse a los segmentos pertinentes
    rationale: La nota sobre «los hijos de Israel» debería anclarse a esa frase, la de «más allá/al otro lado del Jordán» al segmento del Jordán, y la cultural sobre Jericó al hito geográfico. Esto mejora la legibilidad y la correspondencia entre texto y nota.
  revised_spanish_text: Entonces los hijos[a] de Israel partieron y acamparon en las llanuras de Moab, al otro lado del Jordán[b], a la altura de Jericó[c].
  revised_footnotes:
