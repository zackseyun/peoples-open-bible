  rationale: The Syriac verb here (ms'b) is a Pael participle, which is transitive
    ('to make old' or 'to age [someone]'). The draft renders it intransitively ('grow
    old') and adds 'for', missing the theological point that the world to come preserves
    its inhabitants from aging.
