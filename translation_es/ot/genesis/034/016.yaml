translation:
  language: es
  text: entonces daremos nuestras hijas a ustedes, y tomaremos sus hijas para nosotros, y viviremos con ustedes y llegaremos a ser[a] un solo pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y seremos un solo pueblo». El hebreo dice literalmente «y seremos para un solo pueblo», lo que puede expresarse en español como un resultado («llegaremos a ser un solo pueblo») o de manera más formal («seremos un solo pueblo»).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַנּוּ
  english_pob_choice: then we will give
  chosen_spanish: entonces daremos
  alternatives_spanish:
  - y daremos
  - entonces les daremos
  lexicon: HALOT
  rationale: El perfecto con waw en este contexto de negociación expresa resultado/futuro; en español, «entonces» más futuro simple comunica bien la consecuencia sin perder la relación condicional.
- source_word: בְּנֹתֵינוּ
  english_pob_choice: our daughters
  chosen_spanish: nuestras hijas
  alternatives_spanish:
  - nuestras дочas
  lexicon: HALOT
  rationale: El parentesco literal se conserva con «hijas», que es natural y fiel al hebreo.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - a vosotros
  lexicon: HALOT
  rationale: Como objeto indirecto de «dar», «a ustedes» es el equivalente más claro y natural en español latinoamericano.
- source_word: בְּנֹתֵיכֶם
  english_pob_choice: your daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - vuestras hijas
  lexicon: HALOT
  rationale: Se mantiene el término familiar literal. En español neutral, el posesivo de tercera persona plural evita marcar una distinción de trato no presente en el hebreo.
- source_word: נִקַּח
  english_pob_choice: we will take
  chosen_spanish: tomaremos
  alternatives_spanish:
  - tomaremos en matrimonio
  lexicon: HALOT
  rationale: El verbo básico es «tomar»; el sentido matrimonial queda claro por el contexto de intercambio de hijas, sin necesidad de añadir una paráfrasis.
- source_word: לָנוּ
  english_pob_choice: for ourselves
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para nuestro uso
  - para nosotros mismos
  lexicon: HALOT
  rationale: «Para nosotros» reproduce la fuerza dativa de la construcción hebrea de manera natural en español.
- source_word: וְיָשַׁבְנוּ
  english_pob_choice: we will live
  chosen_spanish: viviremos
  alternatives_spanish:
  - habitaremos
  - nos asentaremos
  lexicon: HALOT
  rationale: ישב puede ser «habitar/vivir/asentarse»; aquí «viviremos» suena natural en una propuesta de convivencia social y preserva el sentido de residencia.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - junto a ustedes
  lexicon: HALOT
  rationale: La preposición comitativa se traduce directamente con «con ustedes».
- source_word: וְהָיִינוּ
  english_pob_choice: and become
  chosen_spanish: y seremos
  alternatives_spanish:
  - y llegaremos a ser
  lexicon: HALOT
  rationale: El hebreo literalmente dice «y seremos»; en español, «seremos» conserva la forma sin forzar una inferencia de proceso que el texto expresa con la cláusula completa.
- source_word: לְעַם אֶחָד
  english_pob_choice: one people
  chosen_spanish: un solo pueblo
  alternatives_spanish:
  - un pueblo
  - un mismo pueblo
  lexicon: HALOT
  rationale: «Pueblo» comunica mejor que «nación» la unidad étnico-social del hebreo עם. «Un solo» refuerza el numeral sin agregar interpretación ajena.
theological_decisions:
- issue: 'Resultado de la cláusula final: «seremos un solo pueblo» frente a «seremos para un pueblo uno / seremos un pueblo»'
  english_pob_reading: The Hebrew is literally 'and we will be for one people,' which can be rendered either as a resulting state ('become one people') or more formally ('be one people').
  chosen_spanish_reading: y seremos un solo pueblo
  alternative_spanish_readings:
  - y llegaremos a ser un solo pueblo
  - y seremos para un solo pueblo
  rationale: La construcción hebrea admite un resultado; el español idiomático y fiel puede expresarlo con un estado futuro simple. «Un solo pueblo» mantiene la unidad sin suavizarla.
  doctrine_reference: None
- issue: Negociación matrimonial implícita en «tomaremos sus hijas»
  english_pob_reading: we will take your daughters for ourselves
  chosen_spanish_reading: tomaremos sus hijas para nosotros
  alternative_spanish_readings:
  - las tomaremos por esposas
  rationale: Se conserva el lenguaje verbal del hebreo y del POB inglés, evitando explicitar «esposas» donde el texto aún mantiene la formulación negociadora y directa.
  doctrine_reference: None
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto español, junto a «ustedes», como exige el esquema de notas. La redacción principal permanece alineada con el audit trail inglés y con el hebreo.
  spanish_consistency_notes:
  - Se mantiene «hijas» para בְּנֹתֵינוּ / בְּנֹתֵיכֶם, sin generalizar a «muchachas» o «mujeres».
  - 'Se mantiene el paralelismo verbal de la propuesta: dar / tomar / vivir / ser.'
  - «Pueblo» se usa para עַם, no «nación», para conservar la categoría social-ethnic del hebreo.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al pasaje.
