revisions:
- from: Hace arder el produce de los montes con sequía[a][b], y el pastizal de las plantas con llama.
  to: Abrasa el fruto de los montes con sequía[a][b], y el pasto de las plantas con llama.
  rationale: La revisión elimina calcos poco naturales ('produce'), reduce la sobreinterpretación de combustión literal ('hace arder' > 'abrasa'), y mejora la fluidez de la segunda línea ('pastizal de las plantas' > 'pasto de las plantas') sin apartarse del hebreo base ni de las decisiones auditadas en inglés. Las notas se conservan con redacción española más natural.
