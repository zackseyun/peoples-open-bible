translation:
  language: es
  text: ¡Levántate[a] y ve a Nínive, la gran ciudad, y proclámale la proclamación que yo te digo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «clama contra ella». En Jonás 1:2 el hebreo usa la idea de «contra», pero aquí dice «a ella»; por eso el texto principal conserva la formulación de este versículo.
    reason: alternative_reading
lexical_decisions:
- source_word: ק֛וּם
  english_pob_choice: Arise
  chosen_spanish: ¡Levántate
  alternatives_spanish:
  - ¡Levántate!
  - ¡Alzate
  - ¡Ponte en pie
  lexicon: HALOT
  rationale: El imperativo pide acción inmediata y solemne. «Levántate» conserva mejor esa fuerza que un simple «vete» o un coloquial «levántate» sin matiz, y es natural en español bíblico moderno.
- source_word: לֵ֥ךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - vete
  - sal
  lexicon: HALOT
  rationale: הלך en imperativo aquí es el verbo normal de movimiento. «Ve» sigue de cerca el mandato y mantiene el tono directo del hebreo.
- source_word: נִֽינְוֵ֖ה
  english_pob_choice: Nineveh
  chosen_spanish: Nínive
  alternatives_spanish:
  - Ninive
  lexicon: transliteration
  rationale: Nombre propio transliterado con la forma usual en español culto y bíblico.
- source_word: הָעִ֣יר הַגְּדוֹלָ֑ה
  english_pob_choice: the great city
  chosen_spanish: la gran ciudad
  alternatives_spanish:
  - la ciudad grande
  - la ciudad importante
  lexicon: HALOT
  rationale: גדול puede indicar tamaño o grandeza. «Gran ciudad» conserva la ambigüedad útil del hebreo y la resonancia literaria de Jonás.
- source_word: וּקְרָ֤א אֵלֶ֨י/הָ֙
  english_pob_choice: and proclaim to it
  chosen_spanish: y proclama a ella
  alternatives_spanish:
  - y proclama contra ella
  - y clama a ella
  - y anuncia a ella
  lexicon: HALOT
  rationale: El hebreo usa אֶל, «a/para», no «contra». «Proclama a ella» evita importar la idea de hostilidad que sí aparece en Jonás 1:2 y preserva el giro textual de este versículo.
- source_word: אֶת הַקְּרִיאָ֔ה
  english_pob_choice: the proclamation
  chosen_spanish: la proclamación
  alternatives_spanish:
  - el mensaje
  - el pregón
  - el anuncio
  lexicon: HALOT
  rationale: El sustantivo derivado de קרא mantiene el juego verbal con el mandato de proclamar. «Proclamación» conserva ese vínculo formal y el carácter público del encargo.
- source_word: אָנֹכִ֖י דֹּבֵ֥ר אֵלֶֽי/ךָ
  english_pob_choice: that I speak to you
  chosen_spanish: que yo te hablo
  alternatives_spanish:
  - que yo te digo
  - que yo te estoy hablando
  - que yo hablo contigo
  lexicon: HALOT
  rationale: דבר con אל significa «hablar a». «Yo te hablo» reproduce mejor la relación directa y presente del hebreo que una expresión más interpretativa como «te digo». Se mantiene el valor imperfectivo sin forzarlo.
theological_decisions:
- issue: 'Cambio de preposición en la comisión: de «contra» a «a/para»'
  english_pob_reading: The Hebrew says 'to it,' so the main text preserves the wording of this verse rather than reading 'against it' from Jonah 1:2.
  chosen_spanish_reading: El texto principal dice «a ella», no «contra ella».
  alternative_spanish_readings:
  - proclama contra ella
  - clama contra ella
  rationale: El hebreo de 3:2 usa אֶל, mientras que 1:2 usa una preposición distinta. La traducción conserva esa tensión textual y no resuelve prematuramente el sentido del mensaje como juicio, aunque pueda implicarlo en el contexto amplio.
  doctrine_reference: Preservar la tensión textual sin armonizarla artificialmente.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés al preferir un verbo de habla directo y formal («hablo») en lugar de una paráfrasis más libre. También mantiene el cambio crucial de la preposición en la comisión, reflejando el hebreo de este versículo sin importar la redacción de Jonás 1:2.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; aquí no aparece.
  - «Mesías/Cristo» no aplica en este versículo.
  - 'Se mantiene el tono imperativo solemne con dos mandatos coordinados: «Levántate» y «ve».'
  - La nota de pie de página se ancla en «Levántate[a]» para señalar la alternativa interpretativa asociada al verbo de comisión.
