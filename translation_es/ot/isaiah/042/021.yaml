translation:
  language: es
  text: Yahvé se complació, por causa de su rectitud[a], en engrandecer la ley[b] y hacerla gloriosa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su justicia».'
    reason: alternative_reading
  - marker: b
    text: Hebreo torá; también puede traducirse «instrucción» o «enseñanza».
    reason: lexical_alternative
  - marker: c
    text: 'Más formalmente: «engrandecer la ley y hacerla gloriosa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del Tetragrámaton con la transliteración recomendada para el proyecto, en vez de sustituirlo por un título como «el SEÑOR».
- source_word: חָפֵץ
  english_pob_choice: was pleased
  chosen_spanish: se agradó
  alternatives_spanish:
  - se complació
  - quiso
  - se deleitó
  lexicon: HALOT
  rationale: El verbo expresa una disposición favorable o volitiva de Yahvé; «se agradó» comunica bien esa idea en español bíblico sin volverlo excesivamente afectivo ni meramente causal.
- source_word: לְמַעַן
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - a causa de
  - por causa de
  - por el bien de
  lexicon: HALOT
  rationale: La construcción introduce el motivo o fundamento de la acción divina. «Por amor de» preserva en español ese valor de motivo/causa final sin cerrarlo solo a propósito o a causalidad estricta.
- source_word: צִדְק֑/וֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia/righteousness
  lexicon: HALOT
  rationale: Aquí se mantiene la tensión semántica documentada entre justicia y rectitud/righteousness. «Su justicia» es natural en español y conserva la posibilidad jurídica y moral del término hebreo.
- source_word: יַגְדִּ֥יל
  english_pob_choice: to make great
  chosen_spanish: engrandecer
  alternatives_spanish:
  - hacer grande
  - magnificar
  - exaltar
  lexicon: HALOT
  rationale: 'El causativo de גדל se vierte con un infinitivo natural en español que conserva la fuerza causativa: «engrandecer».'
- source_word: תּוֹרָ֖ה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: En este contexto profético, la referencia tiene peso pactual y normativo; «la ley» preserva esa fuerza reconocible en español.
- source_word: וְיַאְדִּֽיר
  english_pob_choice: and glorious
  chosen_spanish: hacerla gloriosa
  alternatives_spanish:
  - y glorificarla
  - y hacerla majestuosa
  - y hacerla gloriosa y magnífica
  lexicon: HALOT
  rationale: 'El causativo de אדר se expresa de modo explícito para evitar ambigüedad en español: «hacerla gloriosa». Se conserva el objeto pronominal implícito en el hebreo en una forma clara y fiel.'
theological_decisions:
- issue: Relación entre צִדְקוֹ y el motivo de la acción de Yahvé
  english_pob_reading: his righteousness
  chosen_spanish_reading: por amor de su justicia
  alternative_spanish_readings:
  - por amor de su rectitud
  - por causa de su justicia
  rationale: 'La frase mantiene la base teológica del versículo: Yahvé engrandece la ley y la hace gloriosa en consonancia con su propia justicia/rectitud. No se resuelve la tensión entre justicia moral y justicia pactual; se conserva en español con una formulación amplia.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios relevantes posteriores; la versión revisada más reciente indica que no hubo modificaciones necesarias. La redacción española mantiene la misma estructura semántica y las mismas decisiones clave: nombre divino, matiz de חָפֵץ, valor de לְמַעַן, tensión de צִדְקוֹ, y el paralelismo causativo de יַגְדִּיל / וְיַאְדִּיר.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la norma del proyecto para el Tetragrámaton.
  - «Ley» conserva la fuerza jurídica/covenantal de תּוֹרָה en este contexto.
  - Se prefirió una construcción verbal española natural («hacerla gloriosa») para reflejar el segundo causativo sin perder el objeto.
  - No se introdujo «Cristo», «Señor» ni una paráfrasis doctrinal ajena al hebreo.
