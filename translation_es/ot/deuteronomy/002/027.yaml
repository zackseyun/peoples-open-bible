translation:
  language: es
  text: Déjame pasar por tu tierra; iré[a] solamente por el camino. No me apartaré a la derecha ni a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «por el camino, por el camino»; la repetición es enfática y significa que Israel permanecería estrictamente en la ruta.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעְבְּרָה
  english_pob_choice: Let me pass through
  chosen_spanish: Déjame pasar
  alternatives_spanish:
  - Permíteme pasar
  - Deja que pase
  lexicon: HALOT
  rationale: El cohortativo en este contexto diplomático expresa petición/resolución, no simple futuro. «Déjame pasar» conserva el tono de ruego directo y natural en español.
- source_word: בְאַרְצֶךָ
  english_pob_choice: through your land
  chosen_spanish: por tu tierra
  alternatives_spanish:
  - a través de tu tierra
  - en tu tierra
  lexicon: HALOT
  rationale: Con עבר, la preposición con «tierra» indica tránsito por territorio. «Por tu tierra» suena natural en español y mantiene la idea de paso sin sugerir permanencia.
- source_word: בַּדֶּרֶךְ בַּדֶּרֶךְ
  english_pob_choice: only by the road
  chosen_spanish: solamente por el camino
  alternatives_spanish:
  - por el camino, por el camino
  - solo por el camino
  - únicamente por el camino
  lexicon: HALOT
  rationale: La repetición hebrea es enfática. En español se expresa mejor con un adverbio restrictivo que preserve la idea de ruta estricta sin sonar forzado.
- source_word: אֵלֵךְ
  english_pob_choice: I will go
  chosen_spanish: iré
  alternatives_spanish:
  - seguiré
  - procederé
  lexicon: HALOT
  rationale: הלך aquí es el verbo común de ir/proceder. «Iré» es la equivalencia directa y más clara en español moderno.
- source_word: לֹא אָסוּר
  english_pob_choice: I will not turn aside
  chosen_spanish: No me apartaré
  alternatives_spanish:
  - No me desviaré
  - No me desviará
  lexicon: HALOT
  rationale: סור describe apartarse del camino. «No me apartaré» conserva la imagen de desviarse de la ruta y funciona bien con la frase direccional siguiente.
- source_word: יָמִין וּשְׂמֹאול
  english_pob_choice: to the right or to the left
  chosen_spanish: a la derecha ni a la izquierda
  alternatives_spanish:
  - a derecha ni a izquierda
  - a la derecha o a la izquierda
  lexicon: HALOT
  rationale: La expresión fija indica no desviarse en ninguna dirección. En español, la coordinación negativa «ni... ni...» refleja mejor la exclusión total que «o... o...».
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios (high agreement). Esta versión sigue de cerca el hebreo y conserva la fuerza enfática de la repetición, expresándola de manera natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa «camino» para דרך en coherencia con el contexto de tránsito, y no «calle» ni «ruta» salvo que el contexto lo exija.
  - Se conserva la negación direccional completa con «ni... ni...» para reflejar el hebreo sin suavizar la exclusión.
