translation:
  language: es
  text: Ahora los adversarios de Judá y Benjamín oyeron que los hijos del destierro[a] estaban edificando un templo para Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos del destierro»; es decir, la comunidad de quienes habían sido llevados al exilio y habían regresado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - supieron
  lexicon: HALOT
  rationale: El verbo narrativo en perfectivo expresa un hecho pasado simple; en español, «oyeron» conserva la percepción auditiva directa y el valor narrativo sin añadir interpretación.
- source_word: צָרֵי
  english_pob_choice: adversaries
  chosen_spanish: adversarios
  alternatives_spanish:
  - enemigos
  - opositores
  lexicon: HALOT
  rationale: El hebreo denota partes hostiles o contrarias. «Adversarios» preserva la oposición sin intensificar innecesariamente a hostilidad militar.
- source_word: יְהוּדָה וּבִנְיָמִן
  english_pob_choice: Judah and Benjamin
  chosen_spanish: Judá y de Benjamín
  alternatives_spanish:
  - Judá y Benjamín
  lexicon: HALOT
  rationale: Son nombres territoriales/tribales propios y se mantienen como nombres. La repetición de «de» sigue el giro natural español en una serie coordinada.
- source_word: בְנֵי הַגּוֹלָה
  english_pob_choice: the sons of the exile
  chosen_spanish: los hijos del destierro
  alternatives_spanish:
  - los hijos de la cautividad
  - los exiliados
  - los hijos del exilio
  lexicon: HALOT
  rationale: La expresión hebrea se conserva de manera visible mediante una traducción literal y comprensible. «Destierro» comunica el estado de deportación/exilio sin borrar el sustantivo colectivo בני.
- source_word: בּוֹנִים
  english_pob_choice: were building
  chosen_spanish: estaban edificando
  alternatives_spanish:
  - estaban construyendo
  - edificaban
  lexicon: HALOT
  rationale: El participio en contexto narrativo indica acción en curso. «Estaban edificando» mantiene ese aspecto progresivo y es natural en español bíblico contemporáneo.
- source_word: הֵיכָל
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - palacio
  - santuario
  lexicon: HALOT
  rationale: Aunque el término puede significar «palacio», aquí el complemento «para Yahvé, el Dios de Israel» fija claramente el sentido cultual de «templo».
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: HALOT
  rationale: 'La serie terminológica del proyecto exige «Yahvé» para el Tetragrámaton. Con הֵיכָל, la preposición ל se entiende de modo natural como finalidad: un templo «para» Yahvé.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa identifica a Yahvé como el Dios propio de Israel. «El Dios de Israel» es la forma española directa, precisa y de amplia inteligibilidad.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo la política del proyecto, se lo vierte como «Yahvé» en el texto principal para mantener visible el nombre de pacto y evitar el mascaramiento litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Relación entre «templo» y «el Dios de Israel»
  english_pob_reading: a temple for Yahweh, the God of Israel
  chosen_spanish_reading: un templo para Yahvé, el Dios de Israel
  alternative_spanish_readings:
  - un templo para el Señor, Dios de Israel
  - un templo de Yahvé, el Dios de Israel
  rationale: La frase hebrea presenta el objeto como un templo construido en honor/dedicación a Yahvé. «Para Yahvé» respeta la orientación final sin convertirla en una posesión distinta o en una formulación más interpretativa.
  doctrine_reference: POB lexical policy on ל with cultic objects
translation_notes:
  revision_awareness: El cotejo del inglés POB y la revisión más reciente muestran alta concordancia y sin cambios sustantivos; por eso la presente versión sigue la misma lectura léxica y teológica, ajustando solo la formulación natural del español y manteniendo visible la tensión expresiva de «hijos del destierro».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה, conforme a la política del proyecto.
  - «Hijos del destierro» conserva la estructura hebrea בני + הגולה sin sustituirla por una glosa interpretativa más amplia en el texto principal.
  - «Estaban edificando» reproduce el aspecto progresivo del participio hebreo en narración pasada.
  - «Templo» se conserva por el contexto cultual explícito; no se usa «palacio» por requerir una lectura menos probable en este versículo.
