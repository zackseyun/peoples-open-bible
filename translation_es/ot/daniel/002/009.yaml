  text: דִּ֣י הֵן חֶלְמָ/א֩ לָ֨א תְהֽוֹדְעֻנַּ֜/נִי חֲדָה הִ֣יא דָֽתְ/כ֗וֹן וּ/מִלָּ֨ה כִדְבָ֤ה וּ/שְׁחִיתָה֙ הזמנתון לְ/מֵאמַ֣ר קָֽדָמַ֔/י עַ֛ד דִּ֥י עִדָּנָ֖/א יִשְׁתַּנֵּ֑א לָהֵ֗ן חֶלְמָ/א֙ אֱמַ֣רוּ לִ֔/י וְֽ/אִנְדַּ֕ע דִּ֥י פִשְׁרֵ֖/הּ תְּהַחֲוֻנַּֽ/נִי־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/009.yaml
  text: But if you do not make the dream known to me[a], there is only one decree for you, for you have agreed to speak lying and corrupt words before me until the time changes. Therefore tell me the dream[c][b], and I will know that you can make its interpretation known to me.
  footnotes:
  - marker: a
    text: Or 'there is one sentence for you' or 'there is one law for you.' The Aramaic דָּת can denote a decree, law, or judicial sentence in royal-court context.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have prepared' or 'you have arranged' to speak false and corrupt words before me. The verb suggests deliberate preparation; 'agreed' brings out the collective sense in context.
    reason: lexical_alternative
  - marker: c
    text: Or 'until the times change.' The singular 'time' is retained in the main text as the closer rendering of the Aramaic form.
    reason: lexical_alternative
