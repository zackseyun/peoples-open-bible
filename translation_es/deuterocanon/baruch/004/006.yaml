review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: venta a las naciones, no con fin de destrucción, sino por haber provocado a Dios, resultando en ser entregados a adversarios. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y naturalidad: 1) la nota [a] es redundante e inútil porque repite exactamente el texto principal; 2) ''provocaron a Dios a ira'' es un calco poco natural en español eclesial moderno. ''Provocaron a Dios a ira'' puede entenderse, pero ''provocaron la ira de Dios'' o ''provocaron a Dios a ira'' frente al griego παροργίσαι τὸν θεόν se resuelve mejor con una formulación idiomática que conserve la intensidad causal.'
  spanish_quality_summary: El texto es generalmente claro, pero 'provocaron a Dios a ira' suena forzado y poco idiomático. 'No para destrucción' y 'fueron entregados a sus adversarios' funcionan bien. La presencia de una nota alternativa que no ofrece alternativa real perjudica la calidad editorial.
  glossary_alignment: 'No hay conflicto con la glosa del proyecto: θεόν -> ''Dios'' está correcto; ἔθνη -> ''naciones'' está bien; ὑπεναντίοις -> ''adversarios'' preserva bien el matiz. No intervienen términos sensibles como Yahvé, Mesías o δοῦλος. La revisión propuesta mantiene la decisión léxica principal y mejora la expresión española.'
  issues:
  - severity: medium
    issue: La expresión 'provocaron a Dios a ira' es un calco poco natural en español.
    rationale: Aunque intenta reflejar παροργίσαι, en español natural y digno se expresa mejor como 'provocaron la ira de Dios' o 'hicieron enojar a Dios'. La primera conserva mejor la fuerza y el registro.
  - severity: low
    issue: La nota [a] no aporta información útil.
    rationale: 'Dice ''O: “fueron vendidos”'', que repite exactamente la redacción principal. Esto incumple la lógica de notas léxicas significativas y debe eliminarse.'
  revised_spanish_text: Ustedes fueron vendidos a las naciones, no para destrucción; sino porque provocaron la ira de Dios, fueron entregados a sus adversarios.
  revision_rationale: Se elimina la nota redundante y se sustituye el calco 'provocaron a Dios a ira' por 'provocaron la ira de Dios', que preserva el sentido causal e intensivo del griego con español natural y digno. El resto del verso puede mantenerse sin cambios sustanciales.
