review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y la línea del POB en los puntos principales: «alma», sujeto divino implícito con «Yahvé», y la idea de ser sacado con prisa de una esfera de corrupción moral. También conserva correctamente el final suspendido del versículo. Sin embargo, dos decisiones españolas necesitan ajuste para fidelidad y naturalidad: «lo apresuró a salir» suena menos idiomático y puede sugerir que el justo colaboró activamente en salir, mientras que el griego enfatiza más bien que Dios lo sacó/apartó apresuradamente; y «ni poniendo tal cosa en su pensamiento» es demasiado calcado y menos claro que una expresión idiomática española equivalente al sentido de considerar seriamente.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero presenta dos giros algo rígidos. «La gente» es aceptable como colectivo, aunque pierde el matiz plural de λαοὶ; aun así, en español suena natural. El problema principal de legibilidad es «ni poniendo tal cosa en su pensamiento», que resulta poco idiomático en español bíblico actual. Una redacción como «ni tomando tal cosa en serio» o «ni considerando tal cosa» mejora mucho la lectura. También conviene cambiar «lo apresuró a salir de» por «lo sacó apresuradamente de» para una sintaxis más natural y una correspondencia más directa con la acción divina.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: Κυρίῳ -> «Yahvé» está justificado conforme a la política del proyecto; ψυχή -> «alma» está bien; πονηρία -> «maldad» con nota alternativa a «mal» está bien. No hay conflictos mayores de glosario. El ajuste propuesto no altera la teología ni la terminología central, solo mejora la representación verbal e idiomática.'
  issues:
  - severity: medium
    issue: «lo apresuró a salir de» no representa de la mejor manera ἔσπευσεν en español natural
    rationale: Aunque intenta conservar la idea de prisa, en español puede sonar como si Dios lo urgiera a salir por sí mismo. El contexto y la decisión inglesa favorecen una acción divina de apartarlo rápidamente. «Lo sacó apresuradamente de» o similar preserva mejor el sentido.
  - severity: medium
    issue: «ni poniendo tal cosa en su pensamiento» es un calco poco idiomático
    rationale: El griego μηδὲ θέντες ἐπὶ διανοίᾳ expresa considerar seriamente o tomar algo a pecho/mente. La frase actual suena forzada en español y dificulta la lectura. Una formulación como «ni considerando tal cosa» comunica mejor el sentido sin sobreinterpretar.
  - severity: low
    issue: «la gente» reduce el plural λαοὶ a un colectivo singular
    rationale: No es incorrecto en español, y la revisión inglesa ya aceptó «the people» por naturalidad. Se puede mantener por fluidez, aunque «la gente» es algo más coloquial que «el pueblo» o «las gentes». No requiere cambio obligatorio.
