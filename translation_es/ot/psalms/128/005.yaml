review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis benedictiva del hebreo: יְבָרֶכְךָ se vierte correctamente como deseo (''Que ... te bendiga''), יְהוָה como ''Yahvé'', מִצִּיּוֹן como procedencia, וּרְאֵה con valor volitivo, y כֹּל יְמֵי חַיֶּיךָ de forma natural. Sin embargo, el texto principal se aparta innecesariamente de la decisión auditada del POB para בְּטוּב (''the prosperity'') al escoger ''el bien'', opción posible pero menos idiomática aquí y menos alineada con el razonamiento documentado, que privilegia el bienestar visible/comunal de Jerusalén.'
  spanish_quality_summary: 'El español es claro y digno, pero dos detalles requieren ajuste: (1) ''el bien de Jerusalén'' suena menos natural que ''la prosperidad de Jerusalén'' o ''el bienestar de Jerusalén'' en este contexto; (2) la nota [a] no añade una alternativa real útil, porque ''desde Sion'' y ''de Sion'' no justifican una nota léxica en español para este versículo. Conviene simplificar las notas y dejar una sola nota para las alternativas de טוּב.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: YHWH → ''Yahvé'', Zion → ''Sion'', Jerusalem → ''Jerusalén''. No hay términos doctrinales conflictivos adicionales. La única desalineación relevante es que el inglés auditado eligió ''prosperity'' como sentido principal de בְּטוּב, mientras que el español puso ''el bien'' como texto principal; la mejor alineación sería ''la prosperidad'' con nota que preserve ''el bienestar'', ''la bondad'' o ''el bien/la bondad''.'
  issues:
  - severity: medium
    issue: בְּטוּב se tradujo en el texto principal como 'el bien'
    rationale: Aunque semánticamente posible, 'el bien de Jerusalén' es menos idiomático en español y se aleja de la decisión principal documentada en el POB inglés, que favorece 'prosperity' por el matiz de bienestar visible/comunal en contexto de bendición.
  - severity: low
    issue: La nota [a] sobre 'desde Sion' / 'de Sion' es innecesaria
    rationale: No preserva una alternativa significativa del inglés ni resuelve una ambigüedad nueva en español. La diferencia es mínima y no requiere nota en este versículo.
  - severity: low
    issue: La nota [b] puede afinarse para corresponder mejor al nuevo texto principal
    rationale: Si el texto principal usa 'la prosperidad', la nota debe presentar las otras posibilidades léxicas relevantes ('el bienestar', 'la bondad'/'el bien') como alternativas.
  revised_spanish_text: Que Yahvé te bendiga desde Sion, y que veas la prosperidad[a] de Jerusalén todos los días de tu vida.
  revised_footnotes:
  - marker: a
    text: 'O: «el bienestar», «la bondad» o «el bien» de Jerusalén.'
    reason: lexical_alternative
  revision_rationale: Se cambia 'el bien' por 'la prosperidad' para alinearse con la decisión léxica principal auditada del POB y mejorar la naturalidad contextual en español. Se elimina la nota sobre 'desde Sion' por ser innecesaria, y se conserva en nota la amplitud semántica de טוּב.
