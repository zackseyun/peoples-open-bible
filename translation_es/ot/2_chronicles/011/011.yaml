translation:
  language: es
  text: Fortaleció los lugares fortificados[a] y puso en ellos comandantes[b], junto con reservas[c] de alimentos, aceite y vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fortalezas» o «plazas fuertes» para «lugares fortificados».
    reason: lexical_alternative
  - marker: b
    text: O «líderes», «gobernantes» u «oficiales» para «comandantes».
    reason: lexical_alternative
  - marker: c
    text: El hebreo puede referirse tanto a «almacenes» como a provisiones guardadas; aquí el sentido es de abastecimientos reservados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  english_pob_choice: He strengthened
  chosen_spanish: Fortaleció
  alternatives_spanish:
  - Refirmó
  - Fortificó
  lexicon: HALOT
  rationale: חזק en esta forma expresa hacer algo fuerte o más seguro. «Fortaleció» comunica la acción de manera natural en español y evita repetir innecesariamente la imagen de fortificación ya presente en el sustantivo.
- source_word: הַמְּצֻרוֹת
  english_pob_choice: the fortified places
  chosen_spanish: las plazas fortificadas
  alternatives_spanish:
  - las fortalezas
  - los lugares fortificados
  - las fortalezas amuralladas
  lexicon: HALOT
  rationale: El sustantivo designa sitios fortificados o plazas fuertes. «Plazas fortificadas» mantiene la referencia a centros defensivos y es suficientemente amplio sin sobreespecificar el grado exacto de fortaleza.
- source_word: וַיִּתֵּן בָּהֶם
  english_pob_choice: and put ... in them
  chosen_spanish: puso en ellas
  alternatives_spanish:
  - colocó en ellas
  - estableció en ellas
  - designó en ellas
  lexicon: HALOT
  rationale: נתן con ב marca colocar o asignar dentro de esos lugares. «Puso en ellas» es natural en español y conserva el sentido locativo del hebreo.
- source_word: נְגִידִים
  english_pob_choice: commanders
  chosen_spanish: comandantes
  alternatives_spanish:
  - líderes
  - gobernantes
  - oficiales
  lexicon: HALOT
  rationale: En este contexto militar-administrativo, נָגִיד apunta a autoridades designadas para dirigir las plazas. «Comandantes» expresa bien esa función sin cargarla de matices regios.
- source_word: וְאֹצְרוֹת
  english_pob_choice: stores of
  chosen_spanish: depósitos
  alternatives_spanish:
  - almacenes
  - reservas
  - depósitos de
  lexicon: HALOT
  rationale: אֹצָרוֹת puede referirse a depósitos, almacenes o provisiones almacenadas. Dado que siguen alimentos, aceite y vino, «depósitos» transmite la idea de reservas guardadas sin forzar el matiz de tesoro.
- source_word: מַאֲכָל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimentos
  - provisiones
  lexicon: HALOT
  rationale: Es un término general para alimento o provisión. «Comida» es claro y natural en español; el contexto ya indica que se trata de abastecimientos.
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - aceite vegetal
  lexicon: HALOT
  rationale: En este contexto de provisiones, el referente normal es aceite comestible, especialmente de oliva. «Aceite» es fiel y suficientemente preciso sin añadir especificación no explicitada por el texto.
- source_word: יָיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino tinto
  - bebida fermentada
  lexicon: HALOT
  rationale: יָיִן se traduce de forma estándar como «vino». No hay motivo contextual para ampliar o rebajar el término a una categoría más genérica.
translation_notes:
  revision_awareness: El inglés POB mantiene una equivalencia óptima con notas léxicas para מְצֻרוֹת y אֹצְרוֹת; la versión española conserva esas alternativas y ajusta la sintaxis para que suene natural sin perder el detalle administrativo-militar del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable en este versículo.
  - Se usó vocabulario administrativo-militar coherente con נְגִידִים como «comandantes».
  - «Depósitos» se eligió por la ambigüedad de אֹצְרוֹת, pero la nota preserva la posibilidad de «almacenes» o «provisiones».
  - Se evitó «SEÑOR» o paráfrasis teológicas porque el versículo es descriptivo y no contiene el nombre divino.
