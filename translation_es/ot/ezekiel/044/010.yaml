translation:
  language: es
  text: Pero los levitas que se alejaron de mí cuando Israel se extravió, los que se extraviaron de mí detrás de sus ídolos, llevarán su iniquidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevarán su culpa». El modismo hebreo incluye tanto la culpabilidad como la consecuencia que de ella se sigue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Excepto que
  lexicon: HALOT
  rationale: En este contexto introduce una excepción contrastiva respecto de la restricción anterior. «Pero» comunica bien el giro sin forzar una estructura más literal que suene poco natural en español.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los sacerdotes levíticos
  - los levíticos
  lexicon: HALOT
  rationale: El hebreo nombra a los levitas, no a los sacerdotes en general. «Los levitas» mantiene la distinción contextual del pasaje.
- source_word: רָחֲקוּ מֵעָלַי
  english_pob_choice: went far from me
  chosen_spanish: se alejaron de mí
  alternatives_spanish:
  - se apartaron de mí
  - se hicieron distantes de mí
  lexicon: HALOT
  rationale: El verbo expresa distancia o alejamiento. «Se alejaron de mí» conserva el valor relacional y la idea de separación.
- source_word: בִּתְעוֹת יִשְׂרָאֵל
  english_pob_choice: when Israel went astray
  chosen_spanish: cuando Israel se extravió
  alternatives_spanish:
  - en el extravío de Israel
  - cuando Israel anduvo extraviado
  lexicon: HALOT
  rationale: La construcción con ב marca circunstancia/tiempo. «Cuando Israel se extravió» es natural en español y conserva el matiz moral y histórico del pasaje.
- source_word: תָּעוּ
  english_pob_choice: went astray
  chosen_spanish: se extraviaron
  alternatives_spanish:
  - anduvieron errantes
  - se desviaron
  lexicon: HALOT
  rationale: Se repite el mismo campo léxico de extravío. «Se extraviaron» mantiene la repetición y el sentido de desviación religiosa.
- source_word: אַחֲרֵי גִּלּוּלֵיהֶם
  english_pob_choice: after their idols
  chosen_spanish: detrás de sus ídolos
  alternatives_spanish:
  - siguiendo a sus ídolos
  - tras sus ídolos
  lexicon: HALOT
  rationale: אַחֲרֵי puede indicar seguimiento. «Detrás de sus ídolos» conserva la imagen hebrea; «siguiendo» sería una alternativa más interpretativa.
- source_word: גִּלּוּלֵיהֶם
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - ídolos abominables
  - dioses falsos
  lexicon: HALOT
  rationale: Aunque el término es despectivo en Ezequiel, «ídolos» es la equivalencia clara y sobria que evita sobreexplicar la carga peyorativa.
- source_word: וְנָשְׂאוּ עֲוֺנָם
  english_pob_choice: shall bear their iniquity
  chosen_spanish: llevarán su iniquidad
  alternatives_spanish:
  - llevarán su culpa
  - cargarán con su iniquidad
  lexicon: HALOT
  rationale: El idiomático נָשָׂא עָוֺן puede expresar culpa e implicaciones penales. «Llevarán su iniquidad» sigue de cerca el registro formal del texto fuente y preserva esa tensión semántica.
theological_decisions:
- issue: El modismo judicial וְנָשְׂאוּ עֲוֺנָם
  english_pob_reading: shall bear their iniquity
  chosen_spanish_reading: llevarán su iniquidad
  alternative_spanish_readings:
  - llevarán su culpa
  - cargarán con su iniquidad
  rationale: En este contexto disciplinario, el hebreo incluye tanto culpabilidad como la consecuencia que la sigue. «Llevarán su iniquidad» mantiene el registro formal y no reduce el modismo a una sola dimensión. La nota de alternativa queda reflejada en la decisión léxica.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: He seguido la revisión más reciente del auditable English POB, que revirtió «punishment» a «iniquity» para reflejar más directamente עָוֺן y conservar el registro formal. La versión española adopta ese mismo giro con «llevarán su iniquidad», manteniendo la relación entre culpa y consecuencia sin introducir una paráfrasis más explicativa.
  spanish_consistency_notes:
  - He mantenido «levitas» en lugar de una expansión a «sacerdotes levíticos», porque el contexto distingue a los levitas de los sacerdotes zadokitas.
  - 'He traducido el juego verbal del hebreo con una repetición cercana: «se extravió» / «se extraviaron», para conservar el eco semántico.'
  - He preferido «ídolos» como equivalente sobrio de גִּלּוּלִים, sin intentar reproducir el matiz despectivo con una glosa dentro del texto principal.
  - «Llevarán su iniquidad» conserva la tensión idiomática entre culpa y carga judicial que la revisión inglesa quiso preservar.
