translation:
  language: es
  text: También[a], no des tu corazón a toda palabra que se diga, no sea que oigas a tu siervo[b] maldiciéndote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tomes a pecho todo lo que se diga». El hebreo dice literalmente: «no des tu corazón a toda palabra que ellos hablen».'
    reason: lexical_alternative
  - marker: b
    text: «Tu siervo» también puede traducirse «tu esclavo»; el hebreo עֶבֶד puede referirse a cualquiera de los dos, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Igualmente
  lexicon: HALOT
  rationale: La partícula añade una observación más al consejo anterior. «También» conserva el valor aditivo de forma natural en español sin sobredimensionarlo.
- source_word: לְכָל הַדְּבָרִים אֲשֶׁר יְדַבֵּרוּ
  english_pob_choice: to every word that is spoken
  chosen_spanish: en toda palabra que se diga
  alternatives_spanish:
  - en todas las palabras que se digan
  - en todo lo que se diga
  lexicon: HALOT
  rationale: דְּבָרִים puede referirse a «palabras» o «cosas/matters»; aquí el contexto del oír favorece el habla. «Que se diga» refleja bien el indefinido impersonal del hebreo y evita forzar un sujeto explícito.
- source_word: אַל תִּתֵּן לִבֶּךָ
  english_pob_choice: do not give your heart
  chosen_spanish: no pongas tu corazón
  alternatives_spanish:
  - no entregues tu corazón
  - no tomes a pecho
  lexicon: HALOT
  rationale: La imagen hebrea literalmente es «no des tu corazón». En español, «poner el corazón» comunica la atención interior o la concentración que el hebreo expresa, manteniendo la metáfora sin sonar artificial.
- source_word: אֲשֶׁר לֹא תִשְׁמַע
  english_pob_choice: lest you hear
  chosen_spanish: para que no oigas
  alternatives_spanish:
  - no sea que oigas
  - lest you hear
  lexicon: HALOT
  rationale: La cláusula expresa resultado no deseado. «Para que no oigas» comunica con claridad ese valor preventivo en español bíblico contemporáneo.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: El término עֶבֶד puede abarcar «siervo/servidor» o «esclavo» según contexto. Aquí el paralelo con el insulto oído del subordinado doméstico permite conservar la fuerza léxica de «esclavo», coherente con la elección POB cuando el valor de dependencia es relevante.
- source_word: מְקַלְלֶךָ
  english_pob_choice: cursing you
  chosen_spanish: maldiciéndote
  alternatives_spanish:
  - maldiciéndote
  - maldiciéndote con insultos
  - blasfemándote
  lexicon: HALOT
  rationale: De קלל en el sentido de «maldecir/tratar con desprecio». «Maldiciéndote» es directo y reproduce el acto ofensivo sin suavizarlo.
theological_decisions:
- issue: Valor de עֶבֶד (estatus doméstico y fuerza social)
  english_pob_reading: '''Your servant'' may also be rendered ''your slave''; the Hebrew עֶבֶד can refer to either, depending on context.'
  chosen_spanish_reading: «Tu esclavo»
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: No hay un motivo textual para neutralizar la palabra; la dureza social del término forma parte del efecto del versículo. En este contexto sapiencial, conservar «esclavo» mantiene la amplitud semántica del hebreo y la tensión documentada por la POB.
  doctrine_reference: Lexical semantics of עֶבֶד / household-subordinate terminology
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una paráfrasis con sujeto explícito («people speak») por una forma más indefinida («that is spoken»). La redacción española sigue esa preferencia mediante «que se diga», preservando el carácter impersonal del hebreo y evitando añadir un sujeto no explícito.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en otros versículos; aquí no ocurre.
  - Se preserva el tono sapiencial sobrio y no se sustituye el léxico duro por formulaciones eclesiásticas suavizadas.
  - «Corazón» se conserva como centro de atención/voluntad, coherente con el idiomatismo bíblico hebreo.
