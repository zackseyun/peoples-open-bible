translation:
  language: es
  text: Yo los salvaré de todas sus inmundicias[a], y llamaré al grano[b] y lo multiplicaré, y no traeré hambre sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de todas sus impurezas» o «de todas sus contaminaciones». El hebreo usa lenguaje de impureza que puede incluir tanto la inmundicia ritual como la moral.
    reason: lexical_alternative
  - marker: b
    text: O «convocaré al grano». El hebreo presenta a Dios como quien llama al grano, subrayando su mandato soberano sobre la abundancia agrícola.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹשַׁעְתִּי
  english_pob_choice: I will save
  chosen_spanish: yo los salvaré
  alternatives_spanish:
  - yo los libraré
  - yo los rescataré
  lexicon: HALOT
  rationale: El verbo hiphil de ישׁע expresa la acción salvadora de Yahvé. «Salvaré» conserva el peso teológico y la naturalidad en español mejor que restringirlo a «librar» o «rescatar», aunque esas opciones siguen siendo posibles según el matiz.
- source_word: מִכֹּל טֻמְאֹתֵיכֶם
  english_pob_choice: from all your uncleannesses
  chosen_spanish: de todas sus inmundicias
  alternatives_spanish:
  - de todas sus impurezas
  - de todas sus contaminaciones
  lexicon: HALOT
  rationale: «Inmundicias» mantiene el campo de impureza ritual y moral sin resolverlo interpretativamente. Conserva mejor la pluralidad y la fuerza de טֻמְאָה que una paráfrasis como «pecados».
- source_word: וְקָרָאתִי אֶל הַדָּגָן
  english_pob_choice: I will call for the grain
  chosen_spanish: llamaré al grano
  alternatives_spanish:
  - convocaré al grano
  - llamaré por el grano
  lexicon: HALOT
  rationale: La construcción hebrea implica llamar/convocar para producir abundancia. «Llamaré al grano» reproduce la imagen de manera directa y natural en español, sin perder la idea de mandato soberano sobre la provisión.
- source_word: הַדָּגָן
  english_pob_choice: the grain
  chosen_spanish: el grano
  alternatives_spanish:
  - el cereal
  - la cosecha de grano
  lexicon: HALOT
  rationale: «Grano» es la equivalencia más exacta y amplia para דגן, evitando el arcaísmo engañoso de «trigo» o el uso regional de «maíz/corn».
- source_word: וְהִרְבֵּיתִי אֹתוֹ
  english_pob_choice: and multiply it
  chosen_spanish: y lo multiplicaré
  alternatives_spanish:
  - y lo haré abundar
  - y lo aumentaré
  lexicon: HALOT
  rationale: El hiphil de רבה se refleja con «multiplicaré», que conserva cercanía formal con el hebreo y el paralelismo del versículo.
- source_word: וְלֹא אֶתֵּן עֲלֵיכֶם רָעָב
  english_pob_choice: and I will not bring famine upon you
  chosen_spanish: y no pondré hambre sobre ustedes
  alternatives_spanish:
  - y no traeré hambre sobre ustedes
  - y no enviaré hambre sobre ustedes
  lexicon: HALOT
  rationale: La expresión hebrea ‘poner sobre’ comunica imposición de hambre. «Pondré hambre sobre ustedes» refleja esa construcción idiomática en español y conserva la agencia divina sin suavizarla.
theological_decisions:
- issue: Naturaleza de la salvación prometida
  english_pob_reading: Temporal-covenantal deliverance from impurity and its consequences, expressed in language that also carries broader theological resonance.
  chosen_spanish_reading: Liberación pactual de la condición de impureza y de sus consecuencias, con resonancia salvífica más amplia.
  alternative_spanish_readings:
  - salvación espiritual del pecado
  - purificación ritual sin alcance pactual amplio
  rationale: En Ezequiel 36 el anuncio incluye purificación, restauración del pueblo y bendición agrícola. «Salvaré» permite esa amplitud sin reducir el pasaje a categorías doctrinales posteriores ni limitarlo a un rito externo.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Lenguaje de impureza
  english_pob_reading: Retain impurity language ('uncleannesses') rather than interpretively resolving it into only moral or only ceremonial categories.
  chosen_spanish_reading: Mantener el lenguaje de impureza con «inmundicias», sin reducirlo solo a pecado moral o a impureza ceremonial.
  alternative_spanish_readings:
  - pecados
  - impurezas
  - contaminaciones
  rationale: El término hebreo abarca impureza cultual y moral en Ezequiel. «Inmundicias» preserva esa tensión y evita una aclaración interpretativa prematura que estreche el alcance del texto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios; la traducción española sigue esa lectura estable, manteniendo el paralelismo del versículo y la tensión léxica de טֻמְאָה y קרא אֶל.
  spanish_consistency_notes:
  - Se usó el tratamiento de primera persona singular para Yahvé, coherente con el hebreo verbal.
  - Se mantuvo «grano» para דגן, evitando regionalismos y el arcaísmo de «maíz/corn».
  - «Inmundicias» preserva el plural y la amplitud semántica de טֻמְאוֹתֵיכֶם.
  - Se conservó la imagen de «llamar» al grano, no una paráfrasis agrícola más explícita.
  - «Pondré hambre sobre ustedes» refleja la preposición hebrea עַל con la agencia divina del texto.
