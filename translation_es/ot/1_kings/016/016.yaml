  rationale: Se ajustó «derribado» a «abatido» para una equivalencia más natural y fiel al valor contextual de נכה, se restauró la nota explicativa correspondiente, y se reordenó la cláusula de entronización para que el español suene natural sin perder el sentido de «hacer rey ... sobre Israel».
