revisions:
- from: Yahvé ha cumplido su palabra que habló[a], y yo me he levantado en lugar de David mi padre y me siento sobre el trono de Israel, como habló Yahvé, y he edificado la casa para el nombre de Yahvé[b], el Dios de Israel.
  to: Yahvé ha cumplido su palabra que pronunció[a], y yo me he levantado en lugar de David mi padre y estoy sentado en el trono de Israel, como habló Yahvé, y he edificado la casa para el nombre de Yahvé[b], el Dios de Israel.
  rationale: 'La revisión mantiene intactas las decisiones léxicas y teológicas del audit trail, pero corrige dos puntos de estilo y claridad en español: se reemplaza ''que habló'' por ''que pronunció'' para evitar una construcción torpe, y se cambia ''me siento sobre el trono'' por ''estoy sentado en el trono'' para expresar con más naturalidad el estado real resultante de la sucesión. También se pule la nota a para un español más idiomático.'
