translation:
  language: es
  text: 'Y le ordené a Josué en aquel tiempo, diciendo: «Tus ojos han visto todo lo que Yahvé tu Dios hizo a estos dos reyes; así hará Yahvé a todos los reinos por los que vas pasando[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «por los que estás pasando allí». El hebreo conserva un matiz espacial con שָׁמָּה; la redacción española opta por una forma más natural sin perder el movimiento del pasaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת יְהוֹשׁוּעַ צִוֵּיתִי
  english_pob_choice: And I commanded Joshua
  chosen_spanish: Y le mandé a Josué
  alternatives_spanish:
  - Y le ordené a Josué
  - Y le encomendé a Josué
  lexicon: HALOT
  rationale: צוה expresa una acción de mandar/ordenar con autoridad. «Mandé» conserva ese valor directo y suena natural en español sin debilitar la fuerza del acto de Moisés.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - en aquella ocasión
  lexicon: HALOT
  rationale: Es una fórmula temporal idiomática y fiel. «En aquel tiempo» mantiene el tono narrativo sin sonar forzado.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: Se conserva la introducción discursiva del hebreo de manera natural en español.
- source_word: עֵינֶיךָ הָרֹאֹת
  english_pob_choice: Your eyes have seen
  chosen_spanish: Tus ojos han visto
  alternatives_spanish:
  - tú has visto
  - has visto con tus propios ojos
  lexicon: HALOT
  rationale: 'La construcción hebrea es enfática: «tus ojos» subraya el testimonio directo. «Han visto» preserva esa vividez mejor que una formulación más plana.'
- source_word: אֵת כָּל אֲשֶׁר עָשָׂה
  english_pob_choice: all that ... did
  chosen_spanish: todo lo que ... hizo
  alternatives_spanish:
  - todo cuanto ... hizo
  - todo lo que ... ha hecho
  lexicon: HALOT
  rationale: La cláusula totalizadora se expresa de forma clara y cercana al hebreo, sin añadir matices no presentes.
- source_word: יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - Yahvé, tu Dios
  - el Dios de ustedes
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» para el nombre divino según la pauta del proyecto. Aunque el hebreo trae sufijo plural en «vuestro Dios», el contexto inmediato se dirige a Josué en singular, por lo que en español se refleja naturalmente como «tu Dios».
- source_word: לִשְׁנֵי הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: to these two kings
  chosen_spanish: a estos dos reyes
  alternatives_spanish:
  - contra estos dos reyes
  - para estos dos reyes
  lexicon: HALOT
  rationale: El hebreo usa ל con valor objetual/relacional en este contexto. «A estos dos reyes» reproduce el hecho de que Yahvé actuó respecto de ellos sin sobrecargar el sentido con una preposición interpretativa.
- source_word: כֵּן יַעֲשֶׂה יְהוָה
  english_pob_choice: so Yahweh will do
  chosen_spanish: así hará Yahvé
  alternatives_spanish:
  - de igual manera hará Yahvé
  - por tanto hará Yahvé
  lexicon: HALOT
  rationale: '«Así» conserva la correspondencia patrón-cumplimiento: lo ocurrido con los dos reyes sirve de modelo para lo que vendrá.'
- source_word: לְכָל הַמַּמְלָכוֹת
  english_pob_choice: to all the kingdoms
  chosen_spanish: a todos los reinos
  alternatives_spanish:
  - contra todos los reinos
  - para todos los reinos
  lexicon: HALOT
  rationale: Se mantiene el referente de destino/objeto de la acción en un español fluido; el matiz hostil queda dado por el contexto.
- source_word: אֲשֶׁר אַתָּה עֹבֵר שָׁמָּה
  english_pob_choice: through which you are passing
  chosen_spanish: por los que tú vas pasando
  alternatives_spanish:
  - por los que tú pasas
  - por los que vas cruzando
  lexicon: HALOT
  rationale: עובר + שמה expresa desplazamiento a través de un espacio. «Vas pasando» mantiene el valor progresivo y el carácter procesual que el inglés POB destacó con «are passing».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: no se sustituye por una máscara como «SEÑOR». «Yahvé» preserva la identidad del nombre del pacto en español.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Second-person form in אֱלֹהֵיכֶם within direct speech to Joshua
  english_pob_reading: your God
  chosen_spanish_reading: tu Dios
  alternative_spanish_readings:
  - vuestro Dios
  - su Dios
  rationale: Aunque el hebreo lleva sufijo plural, el discurso está dirigido a Josué en singular. En español, «tu Dios» refleja mejor la focalización inmediata sin perder el sentido corporativo implícito.
  doctrine_reference: Contextual singular/plural agreement in direct address
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y también la revisión inglesa más reciente, que prefirió una formulación más natural en la última cláusula («through which you are passing»). La decisión española refleja ese mismo ajuste de fluidez sin alejarse del valor semántico de עֹבֵר שָׁמָּה.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme a la terminología base del proyecto.
  - Se conserva el paralelismo narrativo y exhortativo de la frase hebrea sin añadir explicaciones interpretativas.
  - Se evita «SEÑOR» y «Cristo», que no corresponden a este versículo.
  - La nota al pie está anclada correctamente en «pasando» para reflejar la alternativa literal del cierre hebreo.
