  text: הִנֵּ֤ה כַ/נֶּ֨שֶׁר֙ יַעֲלֶ֣ה וְ/יִדְאֶ֔ה וְ/יִפְרֹ֥שׂ כְּנָפָ֖י/ו עַל בָּצְרָ֑ה וְֽ֠/הָיָה לֵ֞ב גִּבּוֹרֵ֤י אֱדוֹם֙ בַּ/יּ֣וֹם הַ/ה֔וּא כְּ/לֵ֖ב אִשָּׁ֥ה מְצֵרָֽה־׃ס
