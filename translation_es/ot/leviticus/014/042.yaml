translation:
  language: es
  text: Entonces tomarán otras piedras y las traerán en lugar de las piedras,[a] y tomará otro mortero[b] y revocará la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «debajo de las piedras»; aquí es un modismo que significa «en lugar de las piedras» o «para reemplazar las piedras».
    reason: lexical_alternative
  - marker: b
    text: O «otro barro», o más literalmente, «otra tierra/polvo». El hebreo alude al material usado para volver a recubrir la casa después de reemplazar las piedras infectadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקְחוּ
  english_pob_choice: Then they shall take
  chosen_spanish: Entonces tomarán
  alternatives_spanish:
  - Y tomarán
  - Luego tomarán
  lexicon: HALOT
  rationale: La forma verbal en secuencia legal/ritual se vierte naturalmente con un futuro exhortativo en español; «Entonces» conserva la fuerza consecutiva del waw en contexto.
- source_word: אֲבָנִים אֲחֵרוֹת
  english_pob_choice: other stones
  chosen_spanish: otras piedras
  alternatives_spanish:
  - piedras diferentes
  - otras piedras de reemplazo
  lexicon: HALOT
  rationale: «Otras piedras» preserva el valor de sustitución sin añadir interpretación extra.
- source_word: וְהֵבִיאוּ אֶל תַּחַת הָאֲבָנִים
  english_pob_choice: and bring them in place of the stones
  chosen_spanish: y las pondrán en lugar de las piedras
  alternatives_spanish:
  - y las traerán en lugar de las piedras
  - y las colocarán para reemplazar las piedras
  lexicon: HALOT
  rationale: תַּחַת aquí expresa reemplazo; en español «en lugar de» comunica mejor la idea idiomática que «debajo de».
- source_word: וְעָפָר אַחֵר
  english_pob_choice: other mortar
  chosen_spanish: otro barro
  alternatives_spanish:
  - otro mortero
  - otra tierra
  lexicon: HALOT
  rationale: El contexto es de material para revestir/reparar la casa. «Barro» mantiene el sentido de material terroso y evita imponer una terminología constructiva más técnica de la necesaria; también deja abierta la tensión entre «barro», «mortero» y «tierra» que la evidencia hebrea permite.
- source_word: יִקַּח
  english_pob_choice: he shall take
  chosen_spanish: tomará
  alternatives_spanish:
  - tomará él
  - deberá tomar
  lexicon: HALOT
  rationale: El verbo está en tercera masculina singular; en español puede mantenerse sin pronombre explícito para conservar la impersonalidad procedimental del mandato.
- source_word: וְטָח אֶת הַבָּיִת
  english_pob_choice: and plaster the house
  chosen_spanish: y revocará la casa
  alternatives_spanish:
  - y enlucirá la casa
  - y cubrirá la casa
  lexicon: HALOT
  rationale: טוח se refiere a recubrir una superficie con una capa de material; «revocar» es un equivalente español preciso y dignificado para este trabajo de recubrimiento de una pared o casa.
theological_decisions:
- issue: 'Material de reparación: transparencia frente a tecnicismo'
  english_pob_reading: other mortar ... plaster the house
  chosen_spanish_reading: otro barro ... revocará la casa
  alternative_spanish_readings:
  - otro mortero ... enlucirá la casa
  - otra tierra ... cubrirá la casa
  rationale: 'No hay una carga doctrinal directa, pero sí una decisión de sentido: el hebreo nombra el material terroso empleado para volver a recubrir la casa. Mantener «barro» conserva la cercanía al término fuente y evita fijar indebidamente una solución técnica única.'
  doctrine_reference: Ninguna; decisión léxica-contextual.
translation_notes:
  revision_awareness: 'La traducción sigue el ajuste revisado del POB inglés: «other mortar» se entendió como material terroso para recubrir, no como el revestimiento terminado. Se preservó además la alternancia plural/singular del hebreo: primero «tomarán» y luego «tomará».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - Se evitó «SEÑOR» y también «piedras»/«barro» en lenguaje arcaizante; el estilo busca ser moderno y culto.
  - Se conservó la diferencia entre el plural de acción inicial y el singular de la segunda cláusula, como en el hebreo.
  - «Revocar» se eligió por valor de recubrimiento; no se entendió como «revocar» en sentido jurídico.
