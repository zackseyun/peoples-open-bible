translation:
  language: es
  text: Y sobre la compañía de la tribu de los hijos de Isacar estaba Netanel hijo de Zuar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Compañía» traduce el hebreo צְבָא en el sentido de un cuerpo tribal ordenado para la marcha; también podría expresarse como «hueste» o «división».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And over
  chosen_spanish: Y sobre
  alternatives_spanish:
  - Sobre
  - Y encima de
  lexicon: HALOT
  rationale: La preposición hebrea עַל conserva aquí el sentido de autoridad/encargo sobre un grupo. «Y sobre» mantiene la coordinación con el contexto inmediato y el valor direccional de supervisión sin forzar una paráfrasis.
- source_word: צְבָא
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - hueste
  - división
  - ejército
  lexicon: HALOT
  rationale: En Números 10 el término designa un grupo tribal ordenado para la marcha, no necesariamente un ejército en sentido bélico. «Compañía» es natural en español y refleja bien una unidad organizada; se evita «ejército» por ser demasiado militar, y «hueste» por sonar más arcaico.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - cetro
  - vara
  lexicon: HALOT
  rationale: Aquí מַטֵּה nombra claramente una unidad tribal. «Tribu» es el sentido contextual preciso y evita la lectura literal de «vara».
- source_word: בְּנֵי יִשָׂשכָר
  english_pob_choice: the sons of Issachar
  chosen_spanish: los hijos de Isacar
  alternatives_spanish:
  - los descendientes de Isacar
  - el pueblo de Isacar
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijos de Isacar». Se conserva esa forma por fidelidad al formulario tribal y porque funciona con naturalidad en español bíblico contemporáneo.
- source_word: נְתַנְאֵל
  english_pob_choice: Nethanel
  chosen_spanish: Natanel
  alternatives_spanish:
  - Netanel
  - Natanael
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio de manera audible y reconocible en español. «Natanel» reproduce el hebreo con claridad; se evita «Natanael» porque puede sugerir una adaptación ya fijada por otro nombre bíblico en español.
- source_word: בֶּן צוּעָר
  english_pob_choice: the son of Zuar
  chosen_spanish: hijo de Zuar
  alternatives_spanish:
  - el hijo de Zuar
  - descendiente de Zuar
  lexicon: HALOT
  rationale: La construcción filial identifica a Natanel. En español bíblico, «hijo de» es la forma más directa y fiel; el artículo se omite para mantener la concisión del hebreo y la fluidez de la línea.
translation_notes:
  revision_awareness: El texto inglés POB conserva una lectura coordinada («And over») y explica que צְבָא puede entenderse como «company», «host» o «division». La versión española sigue esa decisión, manteniendo el valor de organización tribal sin militarizar el término. No se registran revisiones posteriores que alteren el sentido.
  spanish_consistency_notes:
  - Se mantiene «Y sobre» para reflejar la continuidad sintáctica del listado anterior.
  - Se usa «Isacar» como forma española estándar del nombre tribal.
  - «Natanel» se translitera de manera consistente y se conserva la filiación directa «hijo de Zuar».
