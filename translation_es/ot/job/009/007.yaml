translation:
  language: es
  text: el que dice al sol[b], «No salgas»[a], y sella las estrellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede entenderse como un mandato dirigido al sol («No salgas») o, más literalmente, como una descripción del resultado de la palabra divina («y no sale»).
    reason: lexical_alternative
  - marker: b
    text: חֶרֶס aquí probablemente significa «sol» en sentido poético; en otros contextos puede referirse a «barro» o «tiesto».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמֵר
  english_pob_choice: who says
  chosen_spanish: el que dice
  alternatives_spanish:
  - quien dice
  - el que está diciendo
  lexicon: HALOT
  rationale: El participio hebreo funciona de manera relativa y describe continuamente a Dios en el contexto. «El que dice» conserva esa función descriptiva sin volverlo rígidamente literal ni perder naturalidad en español.
- source_word: לַחֶרֶס
  english_pob_choice: to the sun
  chosen_spanish: al sol
  alternatives_spanish:
  - al astro solar
  - al disco solar
  lexicon: HALOT
  rationale: En este contexto poético, por la mención de «salir/levantarse» y de las estrellas, חֶרֶס se entiende como «sol». «Al sol» es la forma más clara y fiel en español; se evita «cerámica/barro» porque no encaja con el contexto.
- source_word: וְלֹא יִזְרָח
  english_pob_choice: ‘Do not rise,’
  chosen_spanish: «No salgas»
  alternatives_spanish:
  - «No amanezcas»
  - «No te levantes»
  - «Y no sale»
  lexicon: HALOT
  rationale: 'El imperfecto puede leerse como mandato dirigido al sol o como resultado de la palabra divina. En español, la orden directa comunica mejor la personificación poética: «No salgas». Se conserva la tensión interpretativa en la nota.'
- source_word: וּבְעַד
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y sobre
  - y alrededor de
  - y respecto a
  lexicon: HALOT
  rationale: Con יַחְתֹּם («sella»), la preposición forma una construcción idiomática que expresa cierre o bloqueo. En español, «y sella» reproduce el efecto sin una calca incómoda.
- source_word: כּוֹכָבִים
  english_pob_choice: the stars
  chosen_spanish: las estrellas
  alternatives_spanish:
  - estrellas
  lexicon: HALOT
  rationale: El sustantivo plural se traduce de manera directa. El artículo definido expresa naturalmente el valor colectivo en español en esta afirmación cósmica.
- source_word: יַחְתֹּם
  english_pob_choice: seals up
  chosen_spanish: sella
  alternatives_spanish:
  - sella por completo
  - cierra
  - encierran
  lexicon: HALOT
  rationale: חתם significa «sellar». «Sella» mantiene el verbo base y la imagen de cerrar u ocultar las estrellas; «sella por completo» sería más interpretativo de lo necesario.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del testigo inglés (sin cambios aplicados; traducción estable). No se detectaron revisiones textuales que requirieran ajustar el sentido base; solo se trasladaron al español las dos ambigüedades léxicas señaladas por el aparato inglés.
  spanish_consistency_notes:
  - Se emplea «Yahvé» únicamente cuando el hebreo subyacente es el nombre divino; aquí no aparece, por lo que no corresponde usarlo.
  - «Sol» y «estrellas» conservan el registro poético-cósmico del versículo sin introducir terminología litúrgica.
  - Se mantuvo una orden directa en la cita para respetar la vivacidad personificadora del hebreo, aun reconociendo la alternativa resultativa en la nota.
