id: 1CO.6.4
reference: '1 Corinthians 6:4'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: βιωτικὰ μὲν οὖν κριτήρια ἐὰν ἔχητε, τοὺς ἐξουθενημένους ἐν τῇ ἐκκλησίᾳ, τούτους καθίζετε;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/006/004.yaml
  text: So if you have courts for matters of this life[c][b][a], do you appoint as judges those who are of no standing in the church?
  footnotes:
  - marker: a
    text: 'Or, ''matters of everyday life''; the Greek refers to ordinary earthly or civil affairs.'
    reason: lexical_alternative
  - marker: b
    text: 'Or, ''those who are despised in the church.'' The Greek expression may refer ironically either to people regarded as insignificant within the church or to those with no standing from the church''s perspective.'
    reason: alternative_reading
  - marker: c
    text: 'Some understand this clause as a sarcastic imperative: ''appoint those of no standing in the church as judges.'''
    reason: alternative_reading
translation:
  language: ko
  text: 그렇다면 여러분이 이생의 일에 대한 법정 사건들을 가지고 있을 때에, 교회 안에서 무시되는 자들을 그 재판관으로 앉히려는 것입니까?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κριτήρια
  english_pob_choice: courts
  chosen_korean: 법정 사건들
  alternatives_korean:
  - 재판들
  lexicon: BDAG
  rationale: 문맥상 「재판할 사건들」.
- source_word: τοὺς ἐξουθενημένους ἐν τῇ ἐκκλησίᾳ
  english_pob_choice: those who are of no standing in the church
  chosen_korean: 교회 안에서 무시되는 자들
  alternatives_korean:
  - 교회 안에서 인정받지 못하는 자들
  lexicon: BDAG
  rationale: '1:28의 ἐξουθενημένα와 어휘 호응. 본 절에서는 회중 안의 지위 낮은 자가 아니라 「교회 밖 불신 재판관」을 가리키는 책망적 반어로 읽는 학설이 우세. 그러나 본문 형태는 평서문/의문문 양가이므로 EN POB와 같이 의문문으로 옮긴다.'
