    issue: «en su propia obra» es poco natural en este contexto
    rationale: Aunque «obra» puede traducir ἔργον, en Sirácida 38 el contexto es de oficios y artesanos; en español eclesial general «trabajo» u «oficio» comunica mejor el sentido práctico sin pérdida de fidelidad.
  - severity: low
    issue: «se vuelve hábil» suena algo procesual donde el griego puede expresar pericia característica
    rationale: No es incorrecto, pero «se hace hábil» o «es hábil» fluye mejor en español. Dado el audit trail inglés («becomes skillful»), «se hace hábil» mantiene la misma orientación sin rigidez.
