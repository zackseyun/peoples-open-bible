translation:
  language: es
  text: 'Entonces Yahvé se le apareció y le dijo[a]: «No desciendas a Egipto. Habita en la tierra que yo te diré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quédate en la tierra que yo te diré», preservando más literalmente la redacción hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se le apareció
  alternatives_spanish:
  - se mostró
  - se dejó ver
  - se manifestó
  lexicon: HALOT
  rationale: El nifal de ראה expresa una aparición o manifestación visible; «se le apareció» conserva ese valor y suena natural en español, sin añadir una explicación sobre el modo de la manifestación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre propio divino en la forma española establecida del proyecto, en vez de sustituirlo por un título. «Yahvé» preserva la referencia personal del Tetragrámaton.
- source_word: אַל תֵּרֵד
  english_pob_choice: Do not go down
  chosen_spanish: No desciendas
  alternatives_spanish:
  - No bajes
  - No vayas a Egipto
  lexicon: HALOT
  rationale: El imperativo negativo conserva la prohibición. «Desciendas» refleja el hebreo literal de ‘bajar’ y, en este contexto, mantiene la imagen idiomática del movimiento hacia Egipto.
- source_word: מִצְרָיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - Egipto
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia Egipto. En español, la preposición «a» expresa de forma natural esa dirección sin perder el sentido.
- source_word: שְׁכֹן
  english_pob_choice: Dwell
  chosen_spanish: Habita
  alternatives_spanish:
  - Vive
  - Reside
  - Quédate
  lexicon: HALOT
  rationale: El imperativo de שכן pide residir o morar en un lugar. «Habita» conserva la fuerza y la dignidad del mandato, y evita la banalidad de «quédate».
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra/territorio
  lexicon: HALOT
  rationale: En este contexto אֶרֶץ se refiere a la tierra prometida o a una región concreta, no a la tierra en sentido cosmológico. «La tierra» es la equivalencia bíblica más natural en español.
- source_word: אֲשֶׁר אֹמַר אֵלֶיךָ
  english_pob_choice: that I will tell you
  chosen_spanish: que yo te diré
  alternatives_spanish:
  - que yo te dirija
  - que yo te hablaré
  lexicon: HALOT
  rationale: Aunque el hebreo usa un imperfecto de ‘decir’, aquí apunta a instrucción futura. «Que yo te diré» conserva la promesa de comunicación venidera sin forzar una paráfrasis.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto presenta el Tetragrámaton de manera explícita. La tradición editorial del proyecto exige transliterar el nombre divino como «Yahvé» para no ocultarlo detrás de un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor direccional de מִצְרָיְמָה
  english_pob_reading: to Egypt
  chosen_spanish_reading: a Egipto
  alternative_spanish_readings:
  - hacia Egipto
  - para Egipto
  rationale: 'No hay una diferencia doctrinal, pero sí una decisión de lectura: el hebreo marca dirección, no simple localización. «A Egipto» conserva ese matiz con naturalidad.'
  doctrine_reference: HALOT / uso direccional del sufijo -ָה
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura ya validada del inglés POB y conserva sus decisiones principales: aparición divina, prohibición de descender a Egipto, mandato de habitar en la tierra y referencia explícita a Yahvé. No se detectaron revisiones posteriores aplicables en el paquete recibido.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» para יְהוָה, conforme a la línea del proyecto.
  - «Habita» conserva mejor el registro bíblico que «vive» o «quédate».
  - La nota al pie mantiene la alternativa literal reconocida por el inglés POB sin duplicar el sentido principal del texto.
