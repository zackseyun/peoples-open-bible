translation:
  language: es
  text: Su cadáver no permanecerá toda la noche sobre el árbol[a], sino que ciertamente lo enterrarás ese mismo día, porque el colgado está bajo maldición de Dios; y no contaminarás tu tierra, que Yahvé tu Dios te da como herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque el colgado es maldito por Dios»; alternativamente, «porque colgarlo es un ultraje contra Dios». La frase hebrea es breve y puede entenderse de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: תָלִין
  english_pob_choice: shall not remain all night
  chosen_spanish: no permanecerá toda la noche
  alternatives_spanish:
  - no pasará la noche
  - no quedará durante la noche
  lexicon: HALOT
  rationale: El verbo comunica la idea de pernoctar o quedar durante la noche; en español, "permanecer toda la noche" preserva bien la fuerza temporal y suena natural en un registro legal.
- source_word: נִבְלָתוֹ
  english_pob_choice: his corpse
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su cuerpo
  - su cuerpo muerto
  lexicon: HALOT
  rationale: נְבֵלָה designa el cuerpo muerto, no solo una referencia genérica al cuerpo. "Cadáver" mantiene ese valor preciso y el tono jurídico del pasaje.
- source_word: עַל הָעֵץ
  english_pob_choice: on the tree
  chosen_spanish: sobre el árbol
  alternatives_spanish:
  - en el árbol
  - sobre la madera
  lexicon: HALOT
  rationale: Aunque el contexto puede implicar una ejecución pública en un madero, el hebreo dice literalmente "árbol". Se conserva el sustantivo directo sin suavizarlo a "madero".
- source_word: קָבוֹר תִּקְבְּרֶנּוּ
  english_pob_choice: you shall surely bury him
  chosen_spanish: ciertamente lo enterrarás
  alternatives_spanish:
  - lo enterrarás sin falta
  - seguramente lo enterrarás
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto más imperfecto intensifica el mandato. "Ciertamente" conserva esa énfasis sin añadir interpretación.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that same day
  chosen_spanish: ese mismo día
  alternatives_spanish:
  - en ese día
  - aquel mismo día
  lexicon: HALOT
  rationale: La expresión temporal exige entierro antes de que termine el día; "ese mismo día" refleja bien la urgencia idiomática.
- source_word: קִלְלַת אֱלֹהִים
  english_pob_choice: he who is hanged is accursed of God
  chosen_spanish: el colgado es maldito de Dios
  alternatives_spanish:
  - el colgado es maldecido por Dios
  - el que cuelga es una maldición de Dios
  - el colgado es bajo la maldición de Dios
  lexicon: HALOT
  rationale: La frase hebrea es concisa y admite más de una relación semántica. "Maldito de Dios" mantiene la lectura principal de la POB inglesa y conserva la tensión sin resolverla con demasiada precisión.
- source_word: תָּלוּי
  english_pob_choice: a hanged man / he who is hanged
  chosen_spanish: el colgado
  alternatives_spanish:
  - el que es colgado
  - el ahorcado
  lexicon: HALOT
  rationale: El participio pasivo se traduce de forma nominal para evitar añadir un género específico innecesario en español y conservar la brevedad del hebreo.
- source_word: תְטַמֵּא
  english_pob_choice: defile
  chosen_spanish: contaminarás
  alternatives_spanish:
  - mancharás
  - profanarás
  - harás impura
  lexicon: HALOT
  rationale: En el contexto de tierra e impureza ritual, "contaminar" comunica bien la idea de profanar o volver impura la tierra, con buena inteligibilidad moderna.
- source_word: אַדְמָתְךָ
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu suelo
  - tu suelo territorial
  - tu país
  lexicon: HALOT
  rationale: אֲדָמָה puede ser suelo, tierra o terreno. Aquí el contexto de herencia pactal favorece "tierra".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, de acuerdo con la política del proyecto, en lugar de sustituirlo por un título.
- source_word: נַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión heredada
  - como posesión
  lexicon: HALOT
  rationale: נַחֲלָה denota posesión heredada en contexto de pacto. "Como herencia" mantiene el sentido jurídico y relacional del don de la tierra.
theological_decisions:
- issue: Sentido de קִלְלַת אֱלֹהִים תָּלוּי
  english_pob_reading: he who is hanged is accursed of God
  chosen_spanish_reading: el colgado es maldito de Dios
  alternative_spanish_readings:
  - el colgado es maldecido por Dios
  - colgarlo es un ultraje contra Dios
  - el colgado está bajo la maldición de Dios
  rationale: La construcción hebrea es breve y ambigua. Se preserva la lectura principal del POB inglés, que entiende al colgado como portador de maldición divina, sin cerrar del todo las demás posibilidades interpretativas. Esto respeta la tensión textual y explica la urgencia de sepultura inmediata.
  doctrine_reference: Deuteronomio 21:23; mantener la ambigüedad lexical sin borrar la carga teológica del pasaje
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió una formulación más cercana al hebreo para קִלְלַת אֱלֹהִים y mantuvo el registro formal de la prohibición y el entierro inmediato. Se conservó el nombre divino Yahvé conforme a la terminología del proyecto.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יהוה y "Dios" para אֱלֹהִים.
  - '"Cadáver" conserva la precisión léxica de נִבְלָה.'
  - '"Colgado" evita introducir una interpretación adicional sobre el método exacto de ejecución.'
  - La nota al pie preserva la ambigüedad del hebreo sin imponer una sola solución.
