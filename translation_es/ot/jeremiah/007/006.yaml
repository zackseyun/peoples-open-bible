translation:
  language: es
  text: No opriman al extranjero[a], al huérfano[b] ni a la viuda; no derramen sangre inocente en este lugar; y no anden tras otros dioses[c] para su propio daño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el forastero» o «el residente extranjero» para גֵּר.
    reason: lexical_alternative
  - marker: b
    text: O «el huérfano de padre» para יָתוֹם.
    reason: lexical_alternative
  - marker: c
    text: O «no sigan a otros dioses». El hebreo dice literalmente «no anden tras otros dioses».
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵּר
  english_pob_choice: the foreigner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el residente extranjero
  - el sojourner
  lexicon: HALOT
  rationale: גֵּר designa a una persona no nativa que vive entre el pueblo y ocupa una posición social vulnerable. En español, «extranjero» comunica con claridad esa condición social básica sin introducir tecnicismos innecesarios. «Residente extranjero» suena más técnico y «sojourner» no es natural en español.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el padreless
  - el huérfano de padre
  lexicon: HALOT
  rationale: La POB inglesa conserva la categoría social literal «fatherless». En español, «huérfano» es el equivalente natural y bíblicamente inteligible; «huérfano de padre» sería más explícito pero más pesado. La pérdida del matiz literal «sin padre» se compensa en la nota.
- source_word: וְאַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - la mujer viuda
  lexicon: HALOT
  rationale: Es la equivalencia directa y estable para la categoría social vulnerable nombrada en el hebreo.
- source_word: תַעֲשֹׁקוּ
  english_pob_choice: oppress
  chosen_spanish: opriman
  alternatives_spanish:
  - exploten
  - perjudiquen
  - hagan violencia a
  lexicon: HALOT
  rationale: עָשַׁק expresa oprimir/explotar al vulnerable. «Oprimir» conserva la fuerza ética y jurídica del verbo mejor que una opción más genérica como «perjudicar».
- source_word: דָם נָקִי
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - la sangre del inocente
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo forense para homicidio injusto. «Sangre inocente» preserva el valor idiomático y la concisión; «la sangre del inocente» es válida pero menos directa.
- source_word: תִּשְׁפְּכ֖וּ
  english_pob_choice: shed
  chosen_spanish: derramen
  alternatives_spanish:
  - viertan
  lexicon: HALOT
  rationale: Con «sangre», el español bíblico y natural usa «derramar» más que «verter». Mantiene el modismo de homicidio injusto sin calco mecánico.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - aquí
  - en este sitio
  lexicon: HALOT
  rationale: «En este lugar» reproduce la deixis del sermón del templo con claridad. «Aquí» sería más breve pero menos explícito.
- source_word: וְאַחֲרֵי ... לֹא תֵלְכ֖וּ
  english_pob_choice: do not go after
  chosen_spanish: no anden tras
  alternatives_spanish:
  - no sigan a
  - no vayan tras
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático de ir/andar tras para expresar lealtad o seguimiento. «No anden tras» conserva la metáfora de persecución/adhesión con un español natural y reverberante.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  lexicon: HALOT
  rationale: «Otros dioses» es la correspondencia más directa y evita añadir matices étnicos o culturales no explícitos en el hebreo. «Dioses ajenos» podría funcionar, pero desplaza el énfasis.
- source_word: לְרַע לָכֶם
  english_pob_choice: to your own harm
  chosen_spanish: para su propio mal
  alternatives_spanish:
  - para su propio daño
  - para su mal
  - para su ruina
  lexicon: HALOT
  rationale: La frase expresa consecuencia negativa para los oyentes. «Para su propio mal» refleja bien el sentido resultativo y se adapta al plural de la exhortación; «para su propia ruina» sería más interpretativo.
theological_decisions:
- issue: 'Categorías sociales vulnerables: גֵּר / יָתוֹם / אַלְמָנָה'
  english_pob_reading: the foreigner, the fatherless, and the widow
  chosen_spanish_reading: el extranjero, el huérfano y la viuda
  alternative_spanish_readings:
  - el forastero, el huérfano y la viuda
  - el residente extranjero, el huérfano y la viuda
  rationale: Se preserva la tríada social del texto sin convertirla en una paráfrasis general de «los vulnerables». «Extranjero» comunica la condición protegida de quien vive entre Israel; «huérfano» es la forma española natural para la categoría paterna subyacente.
  doctrine_reference: Consistencia de términos sociales del AT; traducción óptima sin diluir la ética del pacto.
- issue: Imagen forense de derramar sangre inocente
  english_pob_reading: do not shed innocent blood
  chosen_spanish_reading: no derramen sangre inocente
  alternative_spanish_readings:
  - no derramen la sangre del inocente
  - no maten al inocente
  rationale: El hebreo formula una prohibición de homicidio injusto. «Derramar sangre inocente» mantiene el modismo bíblico y la gravedad legal; «matar al inocente» aclara el sentido pero abandona la imagen textual.
  doctrine_reference: Lenguaje forense bíblico; respeto por el modismo hebreo.
- issue: Idolatría como seguimiento/lealtad
  english_pob_reading: do not go after other gods
  chosen_spanish_reading: no anden tras otros dioses
  alternative_spanish_readings:
  - no sigan a otros dioses
  - no vayan tras otros dioses
  rationale: 'La expresión hebrea es direccional e idiomática: caminar/ir tras implica adhesión, búsqueda y lealtad. «Andar tras» conserva esa metáfora sin perder inteligibilidad.'
  doctrine_reference: Fidelidad exclusiva a Yahvé; mantenimiento del valor metafórico del hebreo.
translation_notes:
  revision_awareness: 'La versión sigue el sentido del hebreo con la auditoría inglesa como guía, pero ajusta el español donde la equivalencia directa exige una forma más natural: «derramen sangre» en lugar de un calco de «shed blood», y «huérfano» como equivalente idiomático de יָתוֹם. No se detectaron revisiones textuales relevantes en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no nombra explícitamente el Tetragrámaton.
  - Se preserva el tono de mandamiento negativo en segunda persona plural formal («no opriman», «no derramen», «no anden»).
  - «Otros dioses» se conserva sin añadir calificativos como «ajenos» para no ampliar el texto.
  - La nota sobre גֵּר y la de אַחֲרֵי ... לֹא תֵלְכ֖וּ reflejan alternativas de traducción útiles para el lector hispanohablante sin reescribir el versículo.
