translation:
  language: es
  text: Hijo de Adán[a], dirige tu rostro contra Faraón, rey de Egipto, y profetiza contra él y contra todo Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mortal, dirige tu rostro contra Faraón, rey de Egipto...». La expresión hebrea בֶּן אָדָם es un apelativo recurrente para Ezequiel y también puede traducirse «mortal» o «ser humano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Mortal
  - Humano
  - Ser humano
  lexicon: HALOT
  rationale: Conserva el giro profético fijo de Ezequiel y la forma masculina singular del hebreo. En español, 'Hijo de hombre' es una calca idiomática reconocible y más fiel al título recurrente que alternativas más interpretativas como 'mortal'.
- source_word: שִׂים פָּנֶיךָ
  english_pob_choice: set your face
  chosen_spanish: pon tu rostro
  alternatives_spanish:
  - dirige tu rostro
  - fija tu rostro
  - vuélvete con el rostro
  lexicon: HALOT
  rationale: La imagen hebrea de orientar el rostro con determinación se puede expresar naturalmente en español con 'pon tu rostro'. Mantiene el carácter deliberado del mandato sin perder la fuerza idiomática.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - sobre
  - contra de
  lexicon: HALOT
  rationale: En este contexto de juicio, el valor adversativo de עַל queda bien expresado con 'contra'. Evita suavizar la hostilidad implícita en el encargo profético.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: En español, el título regia se expresa de forma natural como 'el faraón'. Se mantiene el nombre/título tradicional sin añadir una interpretación distinta.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: king of Egypt
  chosen_spanish: rey de Egipto
  alternatives_spanish:
  - el rey de Egipto
  lexicon: HALOT
  rationale: La construcción appositiva hebrea se reproduce de modo claro y sobrio con 'rey de Egipto'. El artículo no es necesario en español para reflejar la concisión del original.
- source_word: וְהִנָּבֵא
  english_pob_choice: and prophesy
  chosen_spanish: y profetiza
  alternatives_spanish:
  - y profetiza contra
  - y habla proféticamente
  lexicon: HALOT
  rationale: El imperativo profético se traduce con el verbo estándar 'profetiza', que conserva la fuerza formal del mandato sin parafrasearlo.
- source_word: עָלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - acerca de él
  - sobre él
  lexicon: HALOT
  rationale: En este contexto judicial, la preposición es adversativa. 'Contra él' reproduce el valor polémico del hebreo y coincide con la lectura auditada del inglés POB.
- source_word: מִצְרַיִם כֻּלָּהּ
  english_pob_choice: all Egypt
  chosen_spanish: todo Egipto
  alternatives_spanish:
  - Egipto entero
  - la totalidad de Egipto
  lexicon: HALOT
  rationale: La expresión totalizadora se vierte con naturalidad como 'todo Egipto', manteniendo el alcance inclusivo del hebreo sin sonar artificial.
translation_notes:
  revision_awareness: El texto sigue el sentido y la estructura del hebreo masorético, en concordancia alta con la auditoría inglesa; no se registran revisiones textuales aplicadas ni cambios de última pasada.
  spanish_consistency_notes:
  - Se usa 'faraón' en minúscula por tratarse de un título común en español dentro de la frase.
  - Se mantiene 'Hijo de hombre' como fórmula profética tradicional y transparente, con nota alternativa para la ambigüedad lexical.
  - La preposición 'contra' se repite donde el hebreo tiene עַל con valor adversativo, preservando la dureza del oráculo.
