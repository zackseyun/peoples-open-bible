translation:
  language: es
  text: Habitarán en la tierra que di a sus padres[a]; ustedes serán mi pueblo, y yo seré su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antepasados» para «padres». El hebreo dice literalmente «padres», eco de las promesas del pacto a los antepasados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִישַׁבְתֶּם
  english_pob_choice: you will dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - vivirán
  - se establecerán
  lexicon: HALOT
  rationale: ישׁב expresa morar o residir de manera estable. «Habitarán» conserva la idea de residencia en un lugar sin cargar el matiz de instalación activa que tendría «se establecerán».
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en el territorio
  lexicon: HALOT
  rationale: En contexto de pacto y promesa, אֶרֶץ se traduce mejor por «tierra»; mantiene el eco bíblico del don prometido y la referencia geográfica del texto.
- source_word: אֲשֶׁר נָתַתִּי
  english_pob_choice: that I gave
  chosen_spanish: que di
  alternatives_spanish:
  - que he dado
  - que entregué
  lexicon: HALOT
  rationale: El verbo en hebreo presenta la acción como dada y completa. «Di» es la forma natural en español y preserva la sencillez del relativo.
- source_word: לַאֲבֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres patriarcas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a vuestros padres». Aquí se mantiene la referencia ancestral del pacto; en español, «padres» comunica mejor la fórmula heredada y el enlace con la promesa patriarcal.
- source_word: וִהְיִיתֶם לִי לְעָם
  english_pob_choice: you will be my people
  chosen_spanish: ustedes serán mi pueblo
  alternatives_spanish:
  - serán un pueblo para mí
  - ustedes llegarán a ser mi pueblo
  lexicon: HALOT
  rationale: La fórmula de pacto se expresa de modo idiomático en español con «mi pueblo», sin perder la relación de pertenencia implícita en לִי לְעָם.
- source_word: וְאָנֹכִי אֶהְיֶה לָכֶם לֵאלֹהִים
  english_pob_choice: and I will be your God
  chosen_spanish: y yo seré su Dios
  alternatives_spanish:
  - y yo seré Dios para ustedes
  - y yo mismo seré su Dios
  lexicon: HALOT
  rationale: Es la fórmula clásica de pacto. «Seré su Dios» reproduce con naturalidad la relación expresada por לָכֶם לֵאלֹהִים, manteniendo la solemnidad del enunciado.
theological_decisions:
- issue: Fórmula de pacto ('ustedes serán mi pueblo, y yo seré su Dios')
  english_pob_reading: Render the paired clauses idiomatically as 'you will be my people, and I will be your God.'
  chosen_spanish_reading: «ustedes serán mi pueblo, y yo seré su Dios»
  alternative_spanish_readings:
  - «serán un pueblo para mí, y yo seré Dios para ustedes»
  rationale: El hebreo usa una fórmula pactal establecida. La versión idiomática en español conserva el peso teológico y la resonancia canónica sin oscurecer el sentido relacional del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Término ancestral masculino ('fathers')
  english_pob_reading: Retain 'fathers' in the main text
  chosen_spanish_reading: «padres»
  alternative_spanish_readings:
  - «antepasados»
  rationale: El hebreo es literalmente «padres», y el contexto alude a las promesas ancestrales. En español, «padres» mantiene esa huella intertextual mejor que una neutralización total.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto coincide con el sentido y la estructura del original hebreo, y refleja la decisión inglesa de mantener la fórmula de pacto y la referencia ancestral sin añadir explicaciones al cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene «tierra» para אֶרֶץ por coherencia con el lenguaje de promesa del Pentateuco y los profetas.
  - «Padres» conserva la referencia ancestral literal; la nota ofrece «antepasados» como alternativa contextual.
  - La fórmula pactal se traduce de forma idiomática y solemne, evitando una paráfrasis más libre.
