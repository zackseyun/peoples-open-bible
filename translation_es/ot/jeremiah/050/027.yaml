    rationale: La oración termina sin cierre adecuado tras ‘castigo.’ El texto, tal como está, no es publicable y requiere reparación mínima obligatoria.
  - severity: low
    issue: Ubicación y puntuación de ‘¡Ay de ellos[a]!’
    rationale: 'Aunque no altera el sentido, en español resulta más natural cerrar la exclamación antes de continuar con la cláusula causal: ‘¡Ay de ellos[a]! porque...’ o mejor ‘¡Ay de ellos[a], porque...!’; la primera opción evita una exclamación demasiado larga. Se adopta una puntuación fluida y clara.'
  revised_spanish_text: ¡Maten todos sus toros; que bajen a la matanza! ¡Ay de ellos[a], porque ha llegado su día, el tiempo de su castigo!
