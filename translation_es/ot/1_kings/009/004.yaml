translation:
  language: es
  text: Y en cuanto a ti[a], si andas delante de mí, como anduvo David, tu padre, con integridad de corazón y con rectitud, haciendo conforme a todo lo que te he mandado, y si guardas mis estatutos y mis juicios[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con intachabilidad de corazón». El hebreo subraya plenitud o integridad, no necesariamente ausencia absoluta de pecado.
    reason: lexical_alternative
  - marker: b
    text: O «mis estatutos y mis ordenanzas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: And as for you
  chosen_spanish: Y en cuanto a ti
  alternatives_spanish:
  - Y tú
  - Ahora bien, tú
  lexicon: HALOT
  rationale: El hebreo marca un giro de dirección y énfasis en el discurso. «En cuanto a ti» conserva ese contraste de forma natural en español, sin volver mecánica la coordinación inicial.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - en caso de que
  lexicon: HALOT
  rationale: Introduce una condición directa; «si» es la opción más clara y fiel en español.
- source_word: תֵּלֵךְ לְפָנַי
  english_pob_choice: you walk before me
  chosen_spanish: andas delante de mí
  alternatives_spanish:
  - caminas delante de mí
  - andas en mi presencia
  lexicon: HALOT
  rationale: «Andar delante de» conserva el modismo pactual del hebreo y su imagen de conducta continua ante Dios. Se evita una paráfrasis más abstracta para no perder la metáfora bíblica.
- source_word: כַּאֲשֶׁר הָלַךְ דָּוִד אָבִיךָ
  english_pob_choice: as David your father walked
  chosen_spanish: como anduvo David, tu padre
  alternatives_spanish:
  - como caminó David, tu padre
  - tal como anduvo David, tu padre
  lexicon: HALOT
  rationale: Se mantiene el paralelismo verbal con el verbo previo mediante «anduvo». La estructura refleja la comparación de conducta sin añadir matices no presentes en el hebreo.
- source_word: בְּתָם לֵבָב
  english_pob_choice: with integrity of heart
  chosen_spanish: con integridad de corazón
  alternatives_spanish:
  - con blamelessness of heart
  - con corazón íntegro
  lexicon: HALOT
  rationale: «תָם» expresa integridad, plenitud o sinceridad, no necesariamente impecabilidad absoluta. «Integridad de corazón» comunica bien esa cualidad moral sin resolver la tensión teológica a favor de la perfección sin pecado.
- source_word: וּבְיֹשֶׁר
  english_pob_choice: and with uprightness
  chosen_spanish: y con rectitud
  alternatives_spanish:
  - y con honestidad
  - y con justicia recta
  lexicon: HALOT
  rationale: «Yושר» apunta a lo recto, lo derecho en la conducta. «Rectitud» es un equivalente sobrio y preciso en español; se evita duplicar innecesariamente «integridad».
- source_word: לַעֲשׂוֹת כְּכֹל אֲשֶׁר צִוִּיתִיךָ
  english_pob_choice: doing according to all that I have commanded you
  chosen_spanish: haciendo conforme a todo lo que te he mandado
  alternatives_spanish:
  - para hacer conforme a todo lo que te he mandado
  - haciendo todo lo que te he mandado
  lexicon: HALOT
  rationale: «Conforme a todo lo que» preserva la fuerza comprehensiva de כְכֹל. El participio en español mantiene la relación de modo/acción ligada al andar.
- source_word: חֻקַּי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis leyes estatuidas
  lexicon: HALOT
  rationale: En contexto pactual/legal, «estatutos» es la forma tradicional y precisa para חֻקִּים, manteniendo la distinción con el término siguiente.
- source_word: וּמִשְׁפָּטַי
  english_pob_choice: and my judgments
  chosen_spanish: y mis juicios
  alternatives_spanish:
  - y mis ordenanzas
  - y mis preceptos
  lexicon: HALOT
  rationale: «מִשְׁפָּטִים» conserva un matiz de decisiones/mandatos judiciales; «juicios» mantiene la correspondencia léxica y la distinción frente a «estatutos». En nota se puede explicar la alternativa «ordenanzas».
- source_word: תִּשְׁמֹר
  english_pob_choice: you keep
  chosen_spanish: guardas
  alternatives_spanish:
  - cumples
  - observas
  lexicon: HALOT
  rationale: En lenguaje de pacto, שׁמר es «guardar/observar». «Guardas» transmite tanto cuidado como fidelidad obediente, con buen registro bíblico en español.
theological_decisions:
- issue: Valoración de David como modelo sin implicar impecabilidad
  english_pob_reading: Render David as walking 'with integrity of heart and with uprightness' without implying sinless perfection.
  chosen_spanish_reading: «con integridad de corazón y con rectitud» presenta a David como modelo de fidelidad pactual sin sugerir que fue moralmente perfecto en todo sentido.
  alternative_spanish_readings:
  - «con corazón intachable»
  - «con blamelessness de corazón»
  rationale: 'El hebreo alaba la integridad y rectitud de David en este contexto; no exige una afirmación doctrinal de impecabilidad. La redacción española conserva esa tensión: elogio real, pero no absolución de toda falla.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con el último estado de revisión: no se detectan cambios necesarios respecto del consenso del texto fuente y del rastreo auditado en inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton explícito.
  - Se mantiene la distinción entre «estatutos» y «juicios» para reflejar la pareja hebrea חֻקַּי / מִשְׁפָּטַי.
  - «Andar delante de mí» conserva el modismo de conducta pactual sin exceso de paráfrasis.
  - La puntuación reproduce una sola oración larga, como en el hebreo y en la tradición textual del versículo.
