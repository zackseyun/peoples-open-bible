  text: Y Salomón reinó en Jerusalén sobre todo Israel cuarenta años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo narrativo de realeza en hebreo pide en español un verbo natural que exprese el ejercicio del reinado; «reinó» conserva la idea de estado real pasado sin introducir matices de usurpación ni de mera posesión del cargo.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: Nombre propio estándar
  rationale: Se usa la forma española tradicional y transparente del nombre propio bíblico.
- source_word: בִירוּשָׁלַםִ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa ב se vierte de manera directa y natural como «en»; «Jerusalén» es el topónimo español estándar.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - sobre el conjunto de Israel
  - sobre todos los israelitas
  lexicon: HALOT
  rationale: Con מלך, עַל expresa dominio o realeza «sobre» un pueblo. «Todo Israel» mantiene el sentido corporativo del hebreo y evita reducirlo a una simple suma de individuos.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  lexicon: HALOT
  rationale: Se conserva el valor numérico directo y la duración idiomática en español.
