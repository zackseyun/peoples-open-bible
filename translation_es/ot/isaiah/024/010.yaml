review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: una ciudad arruinada y casas cerradas que impiden la entrada. También preserva la alternativa léxica de תֹהוּ y la nota literal sobre מִבּוֹא. Sin embargo, «está derribada» suena algo menos preciso para נִשְׁבְּרָה que una formulación como «ha sido destruida» o «está destruida», y la puntuación española mejora sin coma antes de la cláusula final.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. Aun así, «está derribada» puede sonar más propio de un muro o edificio individual que de una ciudad entera; «está destruida» suena más natural y fiel en contexto urbano. La coma antes de «para que nadie entre» no es necesaria.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Caos» para תֹהוּ sigue la decisión auditada. No aparecen términos teológicos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: «está derribada» para נִשְׁבְּרָה
    rationale: Aunque comunica ruina, para una ciudad completa suena algo menos natural que «está destruida» o «ha sido destruida». El hebreo pasivo/resultativo admite una formulación española más idiomática en contexto urbano.
  - severity: low
    issue: Coma antes de «para que nadie entre»
    rationale: En español fluye mejor sin coma, ya que la cláusula final/resultativa va unida estrechamente al predicado anterior.
  - severity: low
    issue: Nota b con «de entrar»
    rationale: 'La nota literal actual intenta reflejar el hebreo, pero «cerrada de entrar» suena poco natural incluso como literal. Conviene una literalidad más transparente: «cerrada para entrar» o explicar directamente «cerrada al entrar / desde entrar» con aclaración.'
  revised_spanish_text: La ciudad del caos[a] está destruida; cada casa está cerrada[b] para que nadie entre.
