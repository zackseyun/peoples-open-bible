review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente el sentido básico del hebreo: no hay pan común/disponible, sí hay pan santo, y el acceso queda condicionado a la abstinencia sexual de los acompañantes. También preserva bien la alternativa de מֵאִשָּׁה mediante nota. Sin embargo, ‘a la mano’ omite el posesivo implícito de ‘bajo mi mano/en mi poder’ y suena algo menos natural en este registro que ‘a mano’ o ‘a mi disposición’.'
  spanish_quality_summary: La redacción es clara y bastante natural, pero ‘pan común a la mano’ suena algo rígido en español eclesial general. Además, ‘de las mujeres’ es comprensible, aunque ‘de mujer’ suena más idiomático en este contexto de abstinencia sexual y encaja mejor con la nota ‘de una mujer’. El resto del verso funciona bien y mantiene dignidad y claridad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Pan santo’ es aceptable para לֶחֶם קֹדֶשׁ, aunque ‘santo’ aquí tiene matiz cultual. La elección ‘los jóvenes’ para הַנְּעָרִים es adecuada. La nota léxica está bien justificada.
  issues:
  - severity: medium
    issue: ‘a la mano’ suena menos natural en esta construcción
    rationale: Para אֶל תַּחַת יָדִי la idea es disponibilidad/en posesión. En español bíblico legible, ‘a mano’ o ‘a mi disposición’ fluye mejor que ‘a la mano’ tras ‘No hay pan común…’.
  - severity: low
    issue: ‘de las mujeres’ es algo pesado idiomáticamente
    rationale: Aunque transmite el valor colectivo, en español la expresión de abstinencia sexual suele sonar más natural como ‘guardado de mujer’, con la nota preservando la alternativa singular explícita y la explicación ritual.
  revised_spanish_text: 'El sacerdote respondió a David y dijo[a]: «No hay pan común a mano, pero sí hay pan santo, si los jóvenes se han guardado de mujer».'
  revised_footnotes:
  - marker: a
    text: O «de una mujer», es decir, absteniéndose de relaciones sexuales para la pureza ritual.
    reason: lexical_alternative
  revision_rationale: Se ajusta el modismo de disponibilidad a un español más natural (‘a mano’) y se afina la expresión de abstinencia a ‘de mujer’, que conserva mejor el hebreo singular con sentido colectivo y suena más idiomática en español, mientras la nota mantiene explícitamente la alternativa ‘de una mujer’ y su explicación ritual.
