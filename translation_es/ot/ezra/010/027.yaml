lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y de la familia de
  lexicon: HALOT
  rationale: En este contexto genealógico y de lista, ‘hijos de’ reproduce de forma directa la construcción hebrea בְּנֵי y mantiene el valor de pertenencia a un linaje o grupo familiar. ‘Y’ conserva la función conjuntiva de וּ/־.
- source_word: זַתּוּא
  english_pob_choice: Zattu
  chosen_spanish: Zatu
  alternatives_spanish:
  - Zattu
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta mínimamente a la ortografía española para evitar una terminación innecesariamente anglicada, sin perder la identificación del nombre.
- source_word: אֶלְיוֹעֵנַי
  english_pob_choice: Elioenai
  chosen_spanish: Elioenai
  alternatives_spanish:
  - Elyoenai
  lexicon: HALOT
  rationale: Nombre propio; se conserva la forma bíblica ampliamente reconocible en español, cercana a la convención inglesa pero natural en registros bíblicos hispanos.
- source_word: אֶלְיָשִׁיב
  english_pob_choice: Eliashib
  chosen_spanish: Eliasib
  alternatives_spanish:
  - Eliashib
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español bíblico es más natural suprimir la h muda gráfica de la forma inglesa, manteniendo la identificación del nombre.
- source_word: מַתַּנְיָה
  english_pob_choice: Mattaniah
  chosen_spanish: Matanías
  alternatives_spanish:
  - Mataniah
  lexicon: HALOT
  rationale: Nombre propio con elemento teofórico. La forma con -ías refleja mejor la convención española bíblica y el valor del elemento -yāh sin forzar una grafía inglesa.
- source_word: וִֽ/ירֵמ֔וֹת
  english_pob_choice: Jeremoth
  chosen_spanish: Jeremot
  alternatives_spanish:
  - Jerimot
  - Jeremoth
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso español bíblico sobrio. Se evita la terminación inglesa -th, que no corresponde a la pronunciación ni a la ortografía española.
- source_word: וְ/זָבָד
  english_pob_choice: Zabad
  chosen_spanish: Zabad
  lexicon: HALOT
  rationale: Nombre propio mantenido sin cambios, pues ya es compatible con la ortografía española y no presenta dificultad de adaptación.
- source_word: וַ/עֲזִיזָא
  english_pob_choice: Aziza
  chosen_spanish: Aziza
  alternatives_spanish:
  - Azizá
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente. Se conserva la forma breve y clara, apropiada para una lista de nombres.
translation_notes:
  revision_awareness: El texto fuente hebreo y el audit trail inglés coinciden plenamente en la estructura de lista genealógica y en la ausencia de variantes textuales o notas doctrinales; por eso no se introducen notas ni divergencias interpretativas adicionales.
  spanish_consistency_notes:
  - Se mantiene un estilo sobrio de lista nominal, sin añadir artículos ni explicaciones que no estén en el hebreo.
  - Se conserva la coordinación simple con ‘y’ al inicio, correspondiente al waw hebreo.
  - Los nombres se ajustan a formas españolas bíblicas cuando existe una convención clara y no afectan la identificación del referente.
