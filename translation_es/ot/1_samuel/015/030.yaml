translation:
  language: es
  text: 'Y él dijo[a]: «He pecado. Ahora, por favor, hónrame delante de los ancianos de mi pueblo y delante de Israel, y vuelve conmigo, para que yo me postre a Yahvé, tu Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y me postraré a Yahvé, tu Dios». El hebreo puede entenderse como una continuación simple («y me postraré») o como expresión de finalidad tras la petición anterior («para que yo me postre»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - He pecado contra Dios
  - Pecó
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una confesión inmediata y consumada; en español, «He pecado» transmite bien esa actualidad confesional sin añadir más de lo que el texto dice.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - En este momento
  lexicon: HALOT
  rationale: Adverbio temporal que introduce la petición inmediata después de la confesión. «Ahora» es natural y fiel.
- source_word: כַּבְּדֵנִי נָא
  english_pob_choice: please honor me
  chosen_spanish: por favor, hónrame
  alternatives_spanish:
  - te ruego que me honres
  - por favor, muéstrame honor
  lexicon: HALOT
  rationale: El piel de כבד con sufijo pide reconocimiento público de honor, no «glorificación» en sentido teológico. «Hónrame» conserva esa fuerza social y pública; «por favor» comunica נָא.
- source_word: נֶגֶד
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: Marca visibilidad pública. «Delante de» suena natural en español y mantiene la escena pública requerida por el contexto.
- source_word: זִקְנֵי עַמִּי
  english_pob_choice: the elders of my people
  chosen_spanish: los ancianos de mi pueblo
  alternatives_spanish:
  - los mayores de mi pueblo
  - los ancianos de mi gente
  lexicon: HALOT
  rationale: La construcción en cadena se vierte de manera directa y clara. «Ancianos» es el término natural para el cuerpo de liderazgo; «mi pueblo» conserva el posesivo de Saúl.
- source_word: וְנֶגֶד יִשְׂרָאֵל
  english_pob_choice: and before Israel
  chosen_spanish: y delante de Israel
  alternatives_spanish:
  - y ante Israel
  - y en presencia de Israel
  lexicon: HALOT
  rationale: Se mantiene el paralelo con la frase anterior y el carácter público de la petición. El hebreo no añade «todo», así que no se lo incorpora.
- source_word: וְשׁוּב עִמִּי
  english_pob_choice: and return with me
  chosen_spanish: y vuelve conmigo
  alternatives_spanish:
  - y regresa conmigo
  - y ven de vuelta conmigo
  lexicon: HALOT
  rationale: שׁוּב en este contexto narrativo pide acompañamiento de regreso. «Vuelve conmigo» es idiomático y fiel.
- source_word: וְהִשְׁתַּחֲוֵיתִי
  english_pob_choice: so that I may bow down
  chosen_spanish: para que yo me postre
  alternatives_spanish:
  - y me postraré
  - para que yo adore
  lexicon: HALOT
  rationale: La forma puede leerse como continuación simple o como propósito. En español se preserva la ambigüedad funcional con una cláusula final («para que yo me postre»), reteniendo el gesto físico de reverencia sin forzar «adorar».
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la directriz del proyecto para el nombre divino: «Yahvé» en el texto principal. Dado el verbo de postración, «ante Yahvé» comunica bien el acto dirigido a él, sin ocultar el nombre.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - el Dios tuyo
  - tu Dios, el Dios de ti
  lexicon: HALOT
  rationale: 'El sufijo de segunda persona singular se conserva literalmente. «Tu Dios» mantiene la tensión narrativa: Saúl se refiere a Yahvé como el Dios de Samuel, no lo apropia como suyo.'
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La política del proyecto pide «Yahvé» en español, manteniendo el nombre del pacto y evitando el reemplazo por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Saúl dice אֱלֹהֶיךָ ('tu Dios')
  english_pob_reading: your God
  chosen_spanish_reading: tu Dios
  alternative_spanish_readings:
  - nuestro Dios
  - Dios
  rationale: 'Se conserva el sufijo de segunda persona singular. Esto preserva la tensión narrativa y teológica: Saúl pide acompañamiento para un acto público y habla de Yahvé como el Dios de Samuel.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (preserve theological tension rather than resolve it)'
- issue: Función de וְהִשְׁתַּחֲוֵיתִי
  english_pob_reading: so that I may bow down / and I will bow down
  chosen_spanish_reading: para que yo me postre
  alternative_spanish_readings:
  - y me postraré
  - para que yo adore
  rationale: El hebreo admite tanto secuencia simple como finalidad. En español, la frase final con «para que» permite reflejar esa alternativa sin decidir indebidamente entre continuidad y propósito.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (preserve documented lexical tension)'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: el hebreo se entiende de forma directa y no requiere cambios respecto al acuerdo alto de la auditoría inglesa. Se preservan la confesión breve, el pedido de honor público, la referencia a Israel y la tensión de ''tu Dios'' y de la cláusula final de postración.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el texto principal.
  - Se conserva el tratamiento formal y narrativo con verbos de petición y postración en un español natural.
  - No se añade «todo» antes de Israel, ya que el hebreo no lo explicita.
  - La nota al pie se ancla en la cláusula final para reflejar la alternativa reconocida por la auditoría inglesa.
