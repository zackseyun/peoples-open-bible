revisions:
- from: ¡Mira![a] Como un león sube desde el matorral del Jordán contra un pastizal seguro; porque, en un instante, haré que ellos huyan[b] de él, y pondré sobre él a quien sea escogido. Porque ¿quién es como yo? ¿Y quién me podrá citar[c]? ¿Qué pastor podrá mantenerse en pie delante de mí?
  to: ¡Mira![a] Como un león sube desde el matorral del Jordán contra un pastizal seguro; porque, en un instante, haré que ellos corran[b] de allí, y pondré sobre ese lugar a quien sea escogido. Porque ¿quién es como yo? ¿Y quién me podrá citar[c]? ¿Qué pastor podrá mantenerse en pie delante de mí?
  rationale: Se ajusta la nota [b] para que refleje correctamente la alternativa documentada en la auditoría inglesa, y se mejora la referencia al lugar con 'de allí' y 'sobre ese lugar', evitando pronombres masculinos menos claros. Se conserva 'citar' por su capacidad de mantener la ambigüedad semántica de יעד, apoyada por la nota.
  reviewer_model: gpt-5.4
