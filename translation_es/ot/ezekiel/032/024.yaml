translation:
  language: es
  text: Allí está Elam y toda su multitud, alrededor de su sepultura; todos ellos, muertos a espada, los que cayeron a espada, que descendieron incircuncisos a la tierra de abajo[a], los que infundieron su terror en la tierra de los vivos; y llevaron su vergüenza con los que descienden al foso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la tierra más baja» o «al inframundo». El hebreo literalmente habla de «la tierra de las partes inferiores», una imagen del reino de los muertos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elamita
  lexicon: HALOT
  rationale: Es nombre propio y se translitera de forma directa en español como en el inglés POB.
- source_word: וְכָל הֲמוֹנָהּ
  english_pob_choice: and all her multitude
  chosen_spanish: y toda su multitud
  alternatives_spanish:
  - y toda su muchedumbre
  - y todo su gentío
  lexicon: HALOT
  rationale: ‘Multitud’ conserva el sentido de masa numerosa asociada a Elam sin cargar innecesariamente con matiz bélico que no exige el hebreo aquí.
- source_word: סְבִיבוֹת קְבֻרָתָהּ
  english_pob_choice: all around her grave
  chosen_spanish: todo alrededor de su sepultura
  alternatives_spanish:
  - alrededor de su tumba
  - en torno a su sepultura
  lexicon: HALOT
  rationale: ‘Sepultura’ mantiene el registro sobrio y funerario; ‘grave’ en inglés se traduce mejor así que con un simple ‘tumba’.
- source_word: כֻּלָּם חֲלָלִים
  english_pob_choice: all of them slain
  chosen_spanish: todos ellos, muertos
  alternatives_spanish:
  - todos ellos, muertos en combate
  - todos ellos, heridos de muerte
  lexicon: HALOT
  rationale: Aunque ‘slain’ apunta a muerte violenta, el español ‘muertos’ aquí, unido al contexto inmediato de espada, suena natural; se mantiene la fuerza bélica en la frase siguiente.
- source_word: הַנֹּפְלִים בַּחֶרֶב
  english_pob_choice: fallen by the sword
  chosen_spanish: caídos a espada
  alternatives_spanish:
  - caídos por la espada
  - muertos a espada
  lexicon: HALOT
  rationale: ‘Caídos a espada’ es una formulación bíblica sobria y fiel al hebreo participial, con la imagen de muerte por arma de guerra.
- source_word: יָרְדוּ עֲרֵלִים
  english_pob_choice: went down uncircumcised
  chosen_spanish: descendieron incircuncisos
  alternatives_spanish:
  - bajaron incircuncisos
  - descendieron sin circuncidar
  lexicon: HALOT
  rationale: Se conserva ‘incircuncisos’ de manera literal porque funciona en Ezequiel como marca de vergüenza y condición pactual, no como simple descripción física.
- source_word: אֶל אֶרֶץ תַּחְתִּיּוֹת
  english_pob_choice: to the land below
  chosen_spanish: a la tierra de los lugares bajos
  alternatives_spanish:
  - a la tierra de abajo
  - al mundo subterráneo
  lexicon: HALOT
  rationale: ‘Tierra de los lugares bajos’ reproduce de forma auditable la imagen espacial del hebreo (‘tierra de inferioridades / de abajo’) sin resolverla de antemano como término técnico del más allá.
- source_word: נָתְנוּ חִתִּיתָם
  english_pob_choice: spread their terror
  chosen_spanish: habían infundido su terror
  alternatives_spanish:
  - habían extendido su terror
  - habían causado terror
  lexicon: HALOT
  rationale: El hebreo expresa el efecto producido sobre otros; ‘infundir terror’ preserva bien la causalidad y el tono profético.
- source_word: בְּאֶרֶץ חַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivientes
  alternatives_spanish:
  - en la tierra de los vivos
  - en el país de los vivientes
  lexicon: HALOT
  rationale: ‘Vivientes’ conserva el registro bíblico y la correspondencia con el inglés POB, sin perder inteligibilidad.
- source_word: וַיִּשְׂאוּ כְלִמָּתָם
  english_pob_choice: and they bore their shame
  chosen_spanish: y llevaron su vergüenza
  alternatives_spanish:
  - y cargaron con su vergüenza
  - y soportaron su deshonra
  lexicon: HALOT
  rationale: ‘Llevaron su vergüenza’ mantiene la metáfora de portar una carga de humillación; ‘vergüenza’ traduce bien כְלִמָּה en este contexto.
- source_word: אֶת יֹרְדֵי בוֹר
  english_pob_choice: with those who go down to the pit
  chosen_spanish: con los que descienden al foso
  alternatives_spanish:
  - con los que bajan al foso
  - con los que descienden al pozo
  lexicon: HALOT
  rationale: ‘Foso’ es la opción más idiomática en español para בוֹר en este contexto funerario/sepulcral, y conserva la imagen de descenso al reino de los muertos.
theological_decisions:
- issue: עֲרֵלִים como marca de juicio y vergüenza pactual
  english_pob_reading: uncircumcised
  chosen_spanish_reading: incircuncisos
  alternative_spanish_readings:
  - sin circuncidir
  - no circuncidados
  rationale: 'Se conserva el término literal porque el pasaje no usa una perífrasis neutra: la palabra señala vergüenza, exclusión y juicio en la retórica de Ezequiel. Traducirlo suavemente borraría esa tensión.'
  doctrine_reference: Mantener la carga pactual y de vergüenza del texto profético sin atenuarla.
- issue: אֶרֶץ תַּחְתִּיּוֹת como imagen del ámbito de los muertos
  english_pob_reading: the land below
  chosen_spanish_reading: la tierra de los lugares bajos
  alternative_spanish_readings:
  - la tierra de abajo
  - el mundo subterráneo
  - el inframundo
  rationale: La expresión hebrea es espacial e imagística; no obliga a un término doctrinal técnico. ‘Lugares bajos’ conserva la orientación vertical del original y evita imponer una sistematización del más allá.
  doctrine_reference: Preservar la metáfora bíblica sin sobreinterpretarla doctrinalmente.
translation_notes:
  revision_awareness: Se siguió el perfil de la POB en inglés sin copiar mecánicamente su sintaxis, manteniendo las decisiones auditadas sobre ‘uncircumcised’, ‘land below’, ‘spread their terror’ y ‘bore their shame’. La versión española conserva la imaginería funeraria y el tono profético, con una sola nota alternativa para el término colectivo.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando corresponde; este versículo no lo contiene.
  - Se mantuvo ‘incircuncisos’ para reflejar la fuerza covenantal de עֲרֵלִים.
  - Se prefirió ‘foso’ para בוֹר por coherencia con el registro sepulcral del pasaje.
  - ‘Tierra de los lugares bajos’ evita convertir la imagen en una glosa doctrinal cerrada.
