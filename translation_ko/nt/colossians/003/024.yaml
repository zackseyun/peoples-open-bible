  text: εἰδότες ὅτι ἀπὸ κυρίου ⸀ἀπολήμψεσθε τὴν ἀνταπόδοσιν τῆς κληρονομίας· ⸀τῷ κυρίῳ Χριστῷ δουλεύετε·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/024.yaml
  text: knowing that from the Lord you will receive the reward of the inheritance. Serve the Lord Messiah.
translation:
  language: ko
  text: 여러분은 주께로부터 기업의 상[a]을 받게 될 것을 압니다. 주 메시아를 섬기십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「기업이라는 보상」, 「유업의 상급」. 헬라어 ἀνταπόδοσις는 보답·갚음의 어감을 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_korean: 압니다
  alternatives_korean:
  - 알고 있으며
  - 아는 까닭에
  lexicon: BDAG
  rationale: 분사를 합쇼체 종결로 자연스럽게 풀어 옮긴다.
- source_word: ἀπὸ κυρίου ἀπολήμψεσθε
  english_pob_choice: from the Lord you will receive
  chosen_korean: 주께로부터 ... 받게 될 것
  alternatives_korean:
  - 주에게서 ... 받을 것
  lexicon: BDAG
  rationale: 미래 수동의 「받게 됨」.
- source_word: τὴν ἀνταπόδοσιν τῆς κληρονομίας
  english_pob_choice: the reward of the inheritance
  chosen_korean: 기업의 상
  alternatives_korean:
  - 기업의 보답
  - 상속의 상급
  lexicon: BDAG
  rationale: 「기업」(κληρονομία)과 「상」(ἀνταπόδοσις)의 결합을 한국 교회의 정립된 표현으로 옮긴다.
- source_word: τῷ κυρίῳ Χριστῷ δουλεύετε
  english_pob_choice: Serve the Lord Messiah
  chosen_korean: 주 메시아를 섬기십시오
  alternatives_korean:
  - 주이신 메시아를 섬기라
  - 주 그리스도를 섬기라
  lexicon: BDAG
  rationale: 영어 POB는 명령형으로 옮긴다. 본 번역도 「섬기십시오」로 일관. Χριστός는 칭호 「메시아」.
theological_decisions:
- issue: δουλεύετε(직설법/명령형)
  chosen_reading: 명령형 「섬기십시오」
  alternative_readings:
  - 직설법 「섬기고 있습니다」
  rationale: 형태론적으로 직설법이지만, 영어 POB가 권면 문맥에 맞춰 명령형으로 옮긴 결정을 따른다. 한국어 사용 문맥상 더 자연스럽다.
  doctrine_reference: 'DOCTRINE.md: Readable modern'
