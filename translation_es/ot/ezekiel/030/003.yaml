revisions:
- from: Porque el día está cerca[a], sí, el día de Yahvé está cerca; será un día de nubes[c][b], un tiempo de naciones.
  to: Pues el día está cerca[a], sí, el día de Yahvé está cerca; será un día de nubes[c][b], un tiempo de naciones.
  rationale: Se reemplaza «Porque» por «Pues» para reflejar mejor el valor conectivo-explicativo de כִּי según el POB auditado, sin añadir causalidad fuerte. También se pule la nota [b] para un español más natural, manteniendo intacta la decisión exegética y la ambigüedad deliberada del hebreo.
