translation:
  language: es
  text: como un vaso de oro grabado[b] y antimonio[a], fijado con piedras preciosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo וְאַנְטִיל es incierto. Puede referirse al antimonio o a algún tipo de incrustación u ornamento. El testimonio griego lee de manera más amplia: «adornado con toda piedra preciosa».'
    reason: lexical_alternative
  - marker: b
    text: 'El testimonio griego amplía la imagen: «como un vaso de oro, martillado y adornado con toda piedra preciosa». Esto respalda el sentido general de ornamentación elaborada en el hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּכְלִי
  english_pob_choice: like a vessel
  chosen_spanish: como un vaso
  alternatives_spanish:
  - como un recipiente
  - como un objeto
  lexicon: HALOT
  rationale: El prefijo comparativo כ exige un valor de comparación; כְּלִי suele designar un recipiente o pieza trabajada. «Vaso» conserva la imagen de un objeto ceremonial o artístico mejor que una opción demasiado general.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - de oro
  - dorado
  lexicon: HALOT
  rationale: Término material directo; en español, «de oro» funciona de manera natural dentro de la imagen metálica y preserva la referencia al material.
- source_word: מְפֻתָּח
  english_pob_choice: engraved
  chosen_spanish: grabado
  alternatives_spanish:
  - esculpido
  - trabajado
  - cincelado
  lexicon: HALOT
  rationale: El participio pasivo sugiere trabajo ornamental sobre metal. «Grabado» comunica bien la elaboración decorativa y mantiene la fuerza artesanal del original.
- source_word: וְאַנְטִיל
  english_pob_choice: and antimony
  chosen_spanish: y antimonio
  alternatives_spanish:
  - y un adorno incrustado
  - y una especie de engaste
  - y ornamento
  lexicon: HALOT
  rationale: El término hebreo es incierto. Se mantiene «antimonio» siguiendo la lectura probable del audit trail, pero se conserva la ambigüedad porque el paralelo griego generaliza hacia ornamentación con piedras preciosas.
- source_word: הַנֶּאֱחָז
  english_pob_choice: fastened
  chosen_spanish: fijado
  alternatives_spanish:
  - montado
  - sujeto
  - afirmado
  lexicon: HALOT
  rationale: El participio niphal expresa algo colocado o asegurado en su sitio. «Fijado» es natural en español para un objeto decorado con incrustaciones o engastes.
- source_word: עַל אַבְנֵי חֵפֶץ
  english_pob_choice: onto precious stones
  chosen_spanish: sobre piedras preciosas
  alternatives_spanish:
  - sobre gemas preciosas
  - sobre piedras valiosas
  - con piedras preciosas
  lexicon: HALOT
  rationale: אַבְנֵי = «piedras» y חֵפֶץ apunta a valor/deseabilidad. El griego paralelo confirma la idea de «piedras preciosas», por lo que esa formulación ofrece la mejor equivalencia natural en español.
translation_notes:
  revision_awareness: El hebreo base es breve y algo incierto en וְאַנְטִיל; el paralelo griego confirma la imagen general de un objeto de oro finamente trabajado y engastado con piedras preciosas. La redacción española mantiene el anclaje al hebreo, pero deja visible la expansión interpretativa del testimonio griego mediante nota.
  spanish_consistency_notes:
  - Se prefirió «oro»/«de oro» y no «dorado», para conservar el material real del objeto.
  - «Grabado» mantiene el matiz artesanal sin sobrecargar el verso con un tecnicismo.
  - «Fijado sobre piedras preciosas» evita interpretar de más la técnica exacta del engaste.
  - Se conservó la incertidumbre léxica de וְאַנְטִיל en nota, sin resolverla artificialmente.
  - El orden español sigue la compacta imaginería poética del original sin añadir elementos no atestiguados.
