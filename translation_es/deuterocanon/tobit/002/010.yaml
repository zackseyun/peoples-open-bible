  text: And I did not know that sparrows were in the wall[a]; and while my eyes were open, the sparrows dropped warm dung into my eyes, and white films formed on my eyes. Then I went to physicians, but they did not help me[b]. But Achiacharus supported me until I went to Elymais.
  footnotes:
