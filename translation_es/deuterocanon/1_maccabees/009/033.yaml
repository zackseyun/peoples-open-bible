    issue: La nota [a] está mal enfocada y no corresponde al punto de alternativa relevante del audit trail inglés.
    rationale: La nota inglesa marcada a explica ἔγνω (‘found out’ / ‘came to know’), no «su hermano». La nota española [a] introduce una observación menor y poco útil sobre «Simón su hermano», mientras la variación significativa ya está cubierta en [b].
  - severity: low
    issue: Inicio con «Y Jonathan» suena poco natural en español bíblico actual.
    rationale: Aunque καὶ puede traducirse con «y», en español narrativo el arranque de versículo suele fluir mejor sin esa conjunción inicial cuando no aporta contraste. Además, «Jonatán» es la grafía española más natural.
  revised_spanish_text: Jonatán y Simón su hermano, y todos los que estaban con él, se enteraron de ello[a], y huyeron al desierto de Tecoa, y acamparon junto al agua de la cisterna de Asfar.
