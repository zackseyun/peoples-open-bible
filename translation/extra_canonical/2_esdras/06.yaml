translation:
  text: '1 And he said to me[a], “At the beginning of the earthly world, before the exits of the age stood fast, and before the gatherings of the winds blew,

    2 and before the voices of the thunders sounded, and before the flashes of the lightnings shone, and before the foundations of paradise were made firm,

    3 and before the beautiful flowers were seen, and before the powers of movement were established, and before the innumerable armies of angels were gathered,

    4 and before the heights of the air were lifted up, and before the measures of the firmaments were named, and before the footstool of Zion was weighed,

    5 and before the present years were searched out, and before the devices of those who now sin were estranged, and those who have stored up faith were sealed—

    6 then I considered these things, and they were made through me and not through another, just as the end also will be through me and not through another.”

    7 Then I answered and said, “What will be the dividing of the times? Or when will be the end of the first and the beginning of what follows?”

    8 And he said to me, “From Abraham to Abraham, because from him Jacob and Esau were born; for Jacob’s hand held Esau’s heel from the beginning.

    9 For Esau is the end of this age, and Jacob is the beginning of the one that follows.

    10 “Do not ask anything further, Ezra.”

    11 Then I answered and said, “O Lord who rules, if I have found favor before your eyes,

    12 show your servant the end of your signs, of which you showed me part in the past night.”

    13 And he answered and said to me[b], “Stand upon your feet, and you will hear a voice full of sound.

    14 And if the place where you are standing is violently shaken,

    15 do not be terrified when it speaks, because the word concerns the end, and the foundations of the earth will understand it.

    16 For because the speech concerns them, they will tremble and be shaken, for they know that their end must be changed.”

    17 And it happened, when I heard, that I stood upon my feet and listened, and behold, a voice was speaking, and its sound was like the sound of many waters.

    18 And it said, “Behold, days are coming, and it will be that when I begin to draw near to visit those who dwell on the earth,

    19 and when I begin to require an account from those who have unjustly harmed others by their injustice, and when the humiliation of Zion has been completed,

    20 and when the age that is beginning to pass away is sealed over, then I will show these signs: books will be opened before the face of the firmament, and all will see together.

    21 And year-old infants will speak with their voices, and pregnant women will give birth to premature children of three and four months, and they will live and leap about.

    22 And suddenly places sown will appear unsown, and full storehouses will suddenly be found empty.

    23 And the trumpet will sound with a blast, and when all hear it, they will suddenly be terrified.

    24 And it will be in that time: friends will make war on friends like enemies, and the earth will be terrified with those who dwell in it, and the channels of the springs will stand still so as not to run for three hours.

    25 And it will be that everyone who is left from all these things that I have foretold to you, he will be saved and will see my salvation and the end of my age.

    26 And the men who have been taken up, who have not tasted death from their birth, will be seen, and the heart of the inhabitants will be changed and turned into another mind.

    27 For evil will be blotted out, and deceit will be quenched. Faith will flourish, corruption will be overcome,

    28 and the truth, which has been without fruit for so long a time, will be revealed.”

    29 And it happened, while he was speaking to me, behold, the place on which I was standing was gradually shaken.

    30 And he said to me, “I have come to show you these things, and in the coming night.

    31 Therefore, if you pray again and fast again for seven days, I will again tell you greater things than these by day.

    32 For your voice has surely been heard before the Most High; for the Mighty One has seen your uprightness and has taken note of the purity that you have had from your youth.

    33 Therefore he sent me to show you all these things and to say to you, ‘Take courage and do not fear,

    34 and do not hurry to think vain thoughts about the former times, so that you may not hasten away from the last times.’”

    35 And it happened after this that I wept again, and likewise I fasted seven days, so that I might complete the three weeks that had been appointed to me.

    36 And it happened on the eighth night that my heart was troubled again within me, and I began to speak before the Most High.

    37 For my spirit was greatly inflamed, and my soul was distressed.

    38 And I said, “O Lord, at the beginning of creation you spoke on the first day, saying, ‘Let heaven and earth be made,’ and your word accomplished the work.

    39 And at that time the spirit was hovering, and darkness and silence were being carried around; the sound of a human voice was not yet there from you.

    40 Then you commanded that some light should be brought forth from your treasuries, so that your works might then appear.

    41 And on the second day again you created the spirit of the firmament, and commanded it to divide and make a division between the waters, so that one part might withdraw upward and the other part remain below.

    42 And on the third day you commanded the waters to be gathered in the seventh part of the earth, but six parts you dried up and preserved, so that from these there might be before you things sown and cultivated, serving you.

    43 For your word went forth, and the work was immediately done.

    44 For at once there came forth fruit in immeasurable abundance, and desire for tastes of many kinds, and flowers of inimitable color, and scents of unsearchable fragrance. These things were made on the third day.

    45 On the fourth day you commanded the brightness of the sun to be made, the light of the moon, and the arrangement of the stars,

    46 and you commanded them to serve the man who was to be formed.

    47 On the fifth day you said to the seventh part, where the waters had been gathered, that it should bring forth living creatures, birds, and fish;

    48 and so it happened. The mute water, which had no life, produced living things as it had been commanded, so that from this the nations might tell of your wonders.

    49 Then you preserved two living creatures: the name of the one you called Behemoth, and the name of the second you called Leviathan.

    50 And you separated them from each other, for the seventh part where the water had been gathered could not hold them both.

    51 And you gave Behemoth one part, the part that had been dried on the third day, to dwell in it, where there are a thousand mountains;

    52 but Leviathan you gave the moist seventh part, and you have kept them to be food for whom you wish and when you wish.

    53 And on the sixth day you commanded the earth to create before you cattle and beasts and creeping things;

    54 and over these, Adam, whom you appointed ruler over all the works that you made. From him we all have come, and the people whom you have chosen.

    55 All these things I have spoken before you, Lord, because you said that for our sake you created the firstborn world.

    56 But the rest of the nations, which have come from Adam, you said are nothing, and that they are like spittle; and you compared their abundance to a drop from a vessel.

    57 And now, Lord, behold, these nations, which have been reckoned as nothing, rule over us and devour us.

    58 But we, your people, whom you have called your firstborn, your only one, your zealous one, your beloved, have been given into their hands.

    59 And if the world was created for our sake[c][d][e][f], why do we not possess our world as an inheritance? How long will this be?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'From Abraham to Abraham' is obscure in the Latin witness. The following Jacob/Esau explanation appears to interpret it rather than remove the difficulty.
    reason: textual_variant
    anchor_ref: '6:8'
  - marker: b
    text: The verb rendered 'leap about' comes from a difficult Latin form; the sense is that these prematurely born children nevertheless live and move actively.
    reason: lexical_alternative
    anchor_ref: '6:21'
  - marker: f
    text: Or 'the men who have been received' or 'gathered in.' The Latin does not specify the manner of their preservation from death.
    reason: alternative_reading
    anchor_ref: '6:26'
  - marker: e
    text: The warning is textually difficult. The sense is a prohibition against impatient, empty speculation about earlier times that would distort Ezra's relation to the last times.
    reason: textual_variant
    anchor_ref: '6:34'
  - marker: d
    text: Behemoth and Leviathan are primeval creatures known from Jewish scriptural and post-scriptural tradition; here they function as preserved creatures within Ezra's retelling of creation.
    reason: cross_reference
    anchor_ref: '6:49'
  - marker: c
    text: The title rendered 'your zealous one' translates a difficult Latin term. The line piles up covenantal honor-titles for Israel rather than offering a smooth paraphrase.
    reason: lexical_alternative
    anchor_ref: '6:58'
lexical_decisions:
- source_word: saeculum
  chosen: age
  alternatives:
  - world
  lexicon: Lewis & Short
  rationale: In this apocalyptic context saeculum marks a temporal order or era rather than the physical cosmos; 'age' preserves the eschatological contrast between the present order and the one to come.
- source_word: exitus saeculi
  chosen: the exits of the age
  alternatives:
  - the ends of the age
  - the outcomes of the age
  lexicon: Lewis & Short
  rationale: The Latin is unusual and plural. I preserved the strangeness with 'exits' rather than smoothing to a conventional phrase, since the visionary register tolerates marked diction.
- source_word: conuentiones uentorum
  chosen: the gatherings of the winds
  alternatives:
  - the assemblies of the winds
  - the convergences of the winds
  lexicon: Lewis & Short
  rationale: The noun suggests coming together or meeting. 'Gatherings' keeps the concrete imagery without overinterpreting meteorology.
- source_word: nitores coruscuum
  chosen: the flashes of the lightnings
  alternatives:
  - the gleams of the lightnings
  - the brightnesses of the flashes
  lexicon: Lewis & Short
  rationale: The doubled luminosity terms are rendered idiomatically but still vividly; 'flashes of the lightnings' preserves the heightened cadence.
- source_word: fundamenta paradisi
  chosen: the foundations of paradise
  alternatives:
  - the bases of paradise
  lexicon: Lewis & Short
  rationale: A formal rendering suits the cosmic catalog and preserves the startling image of paradise as architecturally founded.
- source_word: uirtutes
  chosen: powers
  alternatives:
  - forces
  - virtues
  lexicon: Lewis & Short
  rationale: In cosmological context the term points to operative powers or forces, not moral virtues.
- source_word: scabellum Sion
  chosen: the footstool of Zion
  alternatives:
  - Zion's footstool
  lexicon: Lewis & Short
  rationale: Retains the cultic and royal resonance of 'footstool' while leaving the exact referent open, as the Latin does.
- source_word: fidem thesaurizauerunt
  chosen: have stored up faith
  alternatives:
  - have treasured faith
  - have laid up faithfulness
  lexicon: Lewis & Short
  rationale: The treasury metaphor is explicit in thesaurizaverunt. 'Stored up faith' keeps the image and aligns with the chapter's later concern for those marked out by fidelity.
- source_word: separatio temporum
  chosen: the dividing of the times
  alternatives:
  - the separation of the times
  lexicon: Lewis & Short
  rationale: A fairly formal rendering preserves Ezra's technical eschatological question.
- source_word: ab Abraham usque ad Abraham
  chosen: From Abraham to Abraham
  alternatives: []
  lexicon: Lewis & Short
  rationale: The phrase is cryptic in Latin and should remain so in the main text rather than being paraphrased away. The following Jacob/Esau explanation partially interprets it.
- source_word: dominator domine
  chosen: O Lord who rules
  alternatives:
  - O sovereign Lord
  - O ruling Lord
  lexicon: Lewis & Short
  rationale: The doubled title is emphatic. 'Lord who rules' preserves the force without importing later liturgical phrasing.
- source_word: uocem plenissimam sonus
  chosen: a voice full of sound
  alternatives:
  - a voice full of resonance
  - a most full-sounding voice
  lexicon: Lewis & Short
  rationale: The Latin is awkward; I kept the fullness motif and auditory emphasis rather than smoothing too much.
- source_word: visitare habitantes in terra
  chosen: visit those who dwell on the earth
  alternatives:
  - visit the inhabitants of the earth
  lexicon: Lewis & Short
  rationale: '''Visit'' in biblical diction can imply intervention for judgment; retaining it preserves that ambiguity and gravity.'
- source_word: inquirere ab eis
  chosen: require an account from them
  alternatives:
  - inquire of them
  - investigate them
  lexicon: Lewis & Short
  rationale: In context of judgment, the phrase means more than asking questions; it implies reckoning.
- source_word: humilitas Sion
  chosen: the humiliation of Zion
  alternatives:
  - the humiliation endured by Zion
  - the low estate of Zion
  lexicon: Lewis & Short
  rationale: This keeps Zion's abasement explicit and avoids softening the lament theme.
- source_word: supersignabitur saeculum
  chosen: the age ... is sealed over
  alternatives:
  - is sealed up
  - is marked out
  lexicon: Lewis & Short
  rationale: The compound suggests sealing over or setting a seal upon. The image fits apocalyptic closure.
- source_word: anniculi infantes
  chosen: year-old infants
  alternatives:
  - infants a year old
  lexicon: Lewis & Short
  rationale: A literal rendering preserves the prodigy-like sign.
- source_word: sciritabuntur
  chosen: leap about
  alternatives:
  - skip about
  - be lively
  lexicon: Lewis & Short
  rationale: The rare/uncertain verb appears to denote active movement; 'leap about' conveys the marvel without overclaiming precision.
- source_word: prumptuaria
  chosen: storehouses
  alternatives:
  - granaries
  - storerooms
  lexicon: Lewis & Short
  rationale: A general term is preferable because the context is sudden reversal of provision, not only grain storage.
- source_word: debellabunt amici amicos
  chosen: friends will make war on friends
  alternatives:
  - friends will fight friends
  lexicon: Lewis & Short
  rationale: The stronger military nuance of debellare suits the chapter's escalating social collapse.
- source_word: uenae fontium
  chosen: the channels of the springs
  alternatives:
  - the veins of the springs
  lexicon: Lewis & Short
  rationale: The literal 'veins' is possible, but 'channels' communicates the watercourses while preserving the bodily metaphor only lightly.
- source_word: salutare meum
  chosen: my salvation
  alternatives:
  - my saving act
  lexicon: Lewis & Short
  rationale: The phrase is concise and theologically weighty; 'my salvation' preserves both result and divine action.
- source_word: qui recepti sunt homines
  chosen: the men who have been taken up
  alternatives:
  - the men who have been received
  - the men who have been gathered in
  lexicon: Lewis & Short
  rationale: The passive likely refers to persons specially preserved or assumed. 'Taken up' keeps the elevated, apocalyptic sense without overdefining the mechanism.
- source_word: cor inhabitantium
  chosen: the heart of the inhabitants
  alternatives: []
  lexicon: Lewis & Short
  rationale: I preserved 'heart' rather than reducing to 'mind' so the anthropology remains visible; the next clause then adds 'another mind/sense' as in the Latin.
- source_word: sensus alium
  chosen: another mind
  alternatives:
  - another understanding
  - another disposition
  lexicon: Lewis & Short
  rationale: The phrase indicates an altered inner orientation. 'Another mind' is concise and keeps the transformation stark.
- source_word: delebitur malum
  chosen: evil will be blotted out
  alternatives:
  - evil will be erased
  lexicon: Lewis & Short
  rationale: '''Blotted out'' preserves the strong removal imagery and resonates with judgment language.'
- source_word: extinguetur dolus
  chosen: deceit will be quenched
  alternatives:
  - deceit will be extinguished
  lexicon: Lewis & Short
  rationale: I kept the fire-extinguishing metaphor with 'quenched' for rhetorical variety and force.
- source_word: ostendebitur ueritas
  chosen: the truth ... will be revealed
  alternatives:
  - will be shown
  lexicon: Lewis & Short
  rationale: '''Revealed'' fits apocalyptic disclosure and the long-hidden status of truth.'
- source_word: Fortis
  chosen: the Mighty One
  alternatives:
  - the Strong One
  lexicon: Lewis & Short
  rationale: Used as a divine title distinct from 'the Most High'; 'Mighty One' is idiomatic and weighty.
- source_word: directionem tuam
  chosen: your uprightness
  alternatives:
  - your right course
  - your straightness
  lexicon: Lewis & Short
  rationale: The term likely points to Ezra's moral rectitude or straight course of life, not mere guidance received.
- source_word: pudicitiam
  chosen: the purity
  alternatives:
  - the chastity
  - the modesty
  lexicon: Lewis & Short
  rationale: The Latin can denote chastity, but in this broader commendation of Ezra's life 'purity' is less misleading while retaining moral seriousness.
- source_word: non properes a novissimis temporibus
  chosen: you may not hasten away from the last times
  alternatives:
  - you may not be hurried from the last times
  - you may not rush ahead concerning the last times
  lexicon: Lewis & Short
  rationale: The Latin is difficult. I retained the warning against impatient speculation in a way that reflects the preposition and the chapter's concern with premature eschatological fixation.
- source_word: spiritus uolans
