translation:
  language: es
  text: Tus lunas nuevas y tus fiestas señaladas[a] mi alma aborrece; se han vuelto una carga para mí; estoy cansado de soportarlas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus tiempos señalados» o «tus festividades».
    reason: lexical_alternative
lexical_decisions:
- source_word: חָדְשֵׁיכֶם
  english_pob_choice: your new moons
  chosen_spanish: tus lunas nuevas
  alternatives_spanish:
  - tus nuevas lunas
  - tus festividades de luna nueva
  lexicon: HALOT
  rationale: חֹדֶשׁ literalmente alude a la luna nueva y, por extensión, a la observancia mensual asociada. «Lunas nuevas» conserva el hebraísmo cultual sin diluirlo en una explicación más interpretativa.
- source_word: וּמוֹעֲדֵיכֶם
  english_pob_choice: your appointed feasts
  chosen_spanish: tus fiestas señaladas
  alternatives_spanish:
  - tus tiempos señalados
  - tus fiestas establecidas
  - tus convocaciones
  lexicon: HALOT
  rationale: מוֹעֵד puede ser «tiempo señalado» o «encuentro», pero aquí designa observancias religiosas fijadas. «Fiestas señaladas» mantiene la idea de una celebración determinada por cita o designio, y suena natural en español bíblico actual.
- source_word: שָׂנְאָה נַפְשִׁי
  english_pob_choice: my soul hates
  chosen_spanish: aborrece mi alma
  alternatives_spanish:
  - mi alma odia
  - mi ser aborrece
  - yo aborrezco
  lexicon: HALOT
  rationale: 'El hebreo pone נֶפֶשׁ como sujeto: literalmente, «mi alma aborrece». Mantener «mi alma» conserva el énfasis personal e idiomático del original, en lugar de reducirlo a un simple «yo aborrezco».'
- source_word: הָיוּ עָלַי לָטֹרַח
  english_pob_choice: they have become a burden to me
  chosen_spanish: se han vuelto una carga para mí
  alternatives_spanish:
  - me han sido una carga
  - han llegado a serme una carga
  - se han convertido en un peso para mí
  lexicon: HALOT
  rationale: 'La construcción expresa un estado resultante: las observancias han pasado a ser una carga. «Se han vuelto una carga para mí» refleja bien ese matiz con naturalidad en español.'
- source_word: טֹרַח
  english_pob_choice: burden
  chosen_spanish: carga
  alternatives_spanish:
  - peso
  - molestia
  - trabajo penoso
  lexicon: HALOT
  rationale: טֹרַח puede significar carga, molestia o fatiga. «Carga» conserva la metáfora de algo que se lleva encima y enlaza bien con la idea de soportar.
- source_word: נִלְאֵיתִי
  english_pob_choice: I am weary
  chosen_spanish: estoy cansado
  alternatives_spanish:
  - estoy fatigado
  - me he cansado
  - estoy exhausto
  lexicon: HALOT
  rationale: El verbo expresa cansancio o agotamiento. «Estoy cansado» es claro y digno en español, y transmite la fuerza del reproche profético.
- source_word: נְשֹׂא
  english_pob_choice: of bearing them
  chosen_spanish: de soportarlas
  alternatives_spanish:
  - de llevarlas
  - de cargarlas
  - de sobrellevarlas
  lexicon: HALOT
  rationale: De נָשָׂא, «llevar/cargar/soportar». En este contexto español, «soportarlas» comunica la idea de cargar con algo gravoso, sin perder el vínculo semántico con el peso que representan las fiestas rechazadas.
theological_decisions:
- issue: Rechazo divino de observancias hipócritas sin negar su origen divino
  english_pob_reading: The verse expresses God's rejection of corrupted covenant observances, not a denial that the appointed feasts were originally instituted by him.
  chosen_spanish_reading: El versículo expresa el rechazo de Dios a observancias del pacto corrompidas, no una negación de que esas fiestas hubieran sido instituidas originalmente por él.
  alternative_spanish_readings:
  - Dios rechaza las fiestas mismas
  - Dios aborrece por completo las instituciones festivas
  rationale: El posesivo «tus» y el contexto profético indican prácticas alienadas y vaciadas de fidelidad, no una contradicción con la institución divina original. La redacción española preserva esa tensión sin suavizarla ni absolutizar el rechazo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con el último paso de revisión: no hubo cambios necesarios y la correspondencia con el texto fuente sigue siendo alta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - «Fiestas señaladas» conserva el valor cultual de מוֹעֵד sin convertirlo en una paráfrasis amplia.
  - «Mi alma» se retiene para reflejar el sujeto hebreo נַפְשִׁי y no nivelar la expresión a un simple «yo».
  - La alternancia entre «carga» y «soportarlas» preserva la imagen de peso y cansancio del cierre del verso.
