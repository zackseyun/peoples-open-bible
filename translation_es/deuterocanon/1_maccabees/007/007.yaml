translation:
  language: es
  text: Ahora, pues, envía a un hombre en quien confías, y que vaya y vea toda la destrucción que nos ha hecho a nosotros y a la tierra del rey, y que los castigue, a ellos y a todos los que los ayudan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπόστειλον
  english_pob_choice: send
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - despacha
  lexicon: LSJ
  rationale: El imperativo griego pide una acción directa. «Envía» conserva la orden con naturalidad en español y evita añadir matices administrativos que no están en el texto.
- source_word: ἄνδρα ᾧ πιστεύεις
  english_pob_choice: a man whom you trust
  chosen_spanish: a un hombre en quien tú confíes
  alternatives_spanish:
  - a un hombre en quien tengas confianza
  - a un hombre de confianza
  lexicon: LSJ
  rationale: La cláusula relativa expresa la confianza del destinatario en ese hombre. «En quien tú confíes» refleja mejor la relación personal del griego que una simple descripción general de confiabilidad.
- source_word: πορευθεὶς ἰδέτω
  english_pob_choice: let him go and see
  chosen_spanish: que vaya y vea
  alternatives_spanish:
  - que, yendo, vea
  - que vaya a ver
  lexicon: LSJ
  rationale: La secuencia participio + imperativo se vierte de modo coordinado en español. «Que vaya y vea» conserva el movimiento y la inspección sin introducir una formalidad ajena al giro griego.
- source_word: τὴν ἐξολέθρευσιν ἅπασαν
  english_pob_choice: all the destruction
  chosen_spanish: toda la destrucción
  alternatives_spanish:
  - toda la devastación
  - la destrucción completa
  lexicon: LSJ
  rationale: ἐξολέθρευσις significa destrucción o devastación, y ἅπασαν intensifica la totalidad. «Toda la destrucción» reproduce esa fuerza totalizante de manera clara y directa.
- source_word: ἣν ἐποίησεν
  english_pob_choice: that he has done
  chosen_spanish: que ha causado
  alternatives_spanish:
  - que hizo
  - que ha hecho
  lexicon: LSJ
  rationale: Aunque el inglés POB usa «has done», en español «ha causado» comunica mejor el daño producido por la destrucción sin perder la relación con el verbo griego ποιέω, que aquí describe la acción devastadora.
- source_word: τῇ χώρᾳ τοῦ βασιλέως
  english_pob_choice: the king’s land
  chosen_spanish: a la tierra del rey
  alternatives_spanish:
  - al territorio del rey
  - a la tierra real
  lexicon: LSJ
  rationale: χώρα puede ser tierra, región o territorio. «Tierra del rey» conserva el valor amplio y directo del griego sin imponer una noción moderna de Estado o país.
- source_word: κολάσατο
  english_pob_choice: let him punish
  chosen_spanish: que los castigue
  alternatives_spanish:
  - que los punza
  - que les dé castigo
  lexicon: LSJ
  rationale: El imperativo medio aoristo pide una acción punitiva. «Castigue» es el equivalente natural en español y mantiene el sentido judicial/punitivo sin intensificarlo a venganza.
- source_word: τοὺς ἐπιβοηθοῦντας αὐτοῖς
  english_pob_choice: those who are helping them
  chosen_spanish: a todos los que los ayudan
  alternatives_spanish:
  - a los que les ayudan
  - a los que acuden en su ayuda
  lexicon: LSJ
  rationale: El participio indica personas que prestan ayuda. «Los ayudan» mantiene la fuerza verbal y la amplitud del griego sin restringir el tipo de ayuda.
theological_decisions:
- issue: Implicación del juicio/punición solicitados por el hablante
  english_pob_reading: let him punish them and all who are helping them
  chosen_spanish_reading: que los castigue a ellos y a todos los que los ayudan
  alternative_spanish_readings:
  - que se vengue de ellos y de todos los que los ayudan
  - que los reprenda a ellos y a los que los ayudan
  rationale: El texto pide castigo, no mera reprensión. Se evita «vengue» porque el griego κολάσατο es más neutral y punitivo que retributivo en sentido fuerte. La traducción mantiene la dureza del pedido sin añadir una carga doctrinal no explicitada.
  doctrine_reference: Lectura lexical del griego en contexto narrativo; no hay formulación doctrinal específica.
translation_notes:
  revision_awareness: El audio textual en inglés muestra alta concordancia con el griego y no reporta notas o revisiones sustantivas; por ello, la versión española sigue de cerca la sintaxis y el tono del original sin introducir variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Se conserva el registro narrativo sobrio y formal propio de 1 Macabeos.
  - Se prefiere «tierra del rey» para χώρα, en línea con el valor territorial amplio del griego.
  - No se usa «Cristo», «SEÑOR» ni otras sustituciones teológicas no pertinentes a este versículo.
