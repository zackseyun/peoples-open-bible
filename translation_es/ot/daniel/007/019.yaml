revisions:
- from: Entonces quise conocer[a] la verdad acerca de la cuarta bestia, que era diferente de todas ellas, sumamente aterradora, con dientes de hierro y garras de bronce, que devoraba, trituraba y pisoteaba lo que quedaba con sus pies.
  to: Entonces quise conocer[a] la verdad acerca de la cuarta bestia, que era diferente de todas ellas, sumamente aterradora, con dientes de hierro y garras de bronce, que devoraba, trituraba y pisoteaba el resto con sus pies.
  rationale: Se revisa «lo que quedaba» a «el resto» para alinearse con la decisión léxica auditada sobre וּשְׁאָרָא y reflejar el sustantivo de manera más directa y natural. También se completa la nota alternativa para conservar plenamente la opción documentada en el rastro inglés.
