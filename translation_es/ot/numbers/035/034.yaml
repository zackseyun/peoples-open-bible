revisions:
- from: No contaminarán la tierra en la que habitan[a], en medio de la cual yo habito, porque yo, Yahvé, habito en medio de los hijos de Israel.
  to: No contaminarás la tierra en la que habitas, en medio de la cual yo habito, porque yo, Yahvé, habito en medio de los hijos de Israel[a].
  rationale: Se corrige la forma verbal a singular para reflejar fielmente תְטַמֵּא (2ms) y se reubica/reformula la nota al pie para que corresponda a בני ישראל, siguiendo el rastro de auditoría inglés y manteniendo la literalidad principal con una alternativa idiomática en nota. No se requiere adjudicación adicional, porque la corrección es directa y no doctrinalmente disputada.
