translation:
  language: es
  text: Pero toma la hiel[a] del pez en tu mano. Y siguieron adelante[b], y el perro iba detrás de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bilis»; χολή puede denotar hiel o bilis. Se conserva «hiel» como renderización principal.
    reason: lexical_alternative
  - marker: b
    text: La tradición semítica paralela para esta escena es más amplia y desarrolla el episodio de la aplicación de la hiel a los ojos del padre; aquí se sigue el texto griego breve para el cuerpo principal.
    reason: alternative_reading
lexical_decisions:
- source_word: λάβε
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - toma para ti
  - recibe
  - agarra
  lexicon: BDAG
  rationale: Es un imperativo directo y práctico; «toma» conserva la fuerza de la orden sin sobretraducirla.
- source_word: παρὰ χεῖρα
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - a mano
  - junto a la mano
  - tenla en la mano
  lexicon: LSJ
  rationale: La locución indica tener o llevar algo físicamente en la mano; «en tu mano» expresa mejor ese sentido inmediato en español.
- source_word: χολὴν τοῦ ἰχθύος
  english_pob_choice: the fish’s gall
  chosen_spanish: la hiel del pez
  alternatives_spanish:
  - la bilis del pez
  - la hiel del pescado
  - la bilis del pescado
  lexicon: LSJ
  rationale: χoλή puede significar «hiel» o «bilis»; se opta por «hiel» como término breve y tradicional, manteniendo la alternativa «bilis» como nota por la ambigüedad léxica.
- source_word: ἐπορεύθησαν
  english_pob_choice: they went on
  chosen_spanish: siguieron adelante
  alternatives_spanish:
  - fueron
  - continuaron
  - siguieron caminando
  lexicon: BDAG
  rationale: El verbo narra avance continuo en la ruta; «siguieron adelante» conserva el matiz de continuación sin añadir detalles ajenos.
- source_word: συνῆλθεν
  english_pob_choice: followed
  chosen_spanish: siguió
  alternatives_spanish:
  - fue con ellos
  - acompañó
  - vino con ellos
  lexicon: BDAG
  rationale: Con ὀπίσωθεν αὐτῶν, el verbo describe al perro yendo tras ellos; «siguió» es natural en español y preserva la relación espacial.
- source_word: ὁ κύων
  english_pob_choice: the dog
  chosen_spanish: el perro
  alternatives_spanish:
  - el can
  - el perro ya conocido
  lexicon: BDAG
  rationale: Sustantivo simple y definido por el contexto narrativo; «el perro» es claro y fiel.
- source_word: ὀπίσωθεν αὐτῶν
  english_pob_choice: behind them
  chosen_spanish: detrás de ellos
  alternatives_spanish:
  - tras ellos
  - a sus espaldas
  lexicon: LSJ
  rationale: Expresa la posición espacial del perro sin introducir una construcción demasiado literal o arcaica.
theological_decisions:
- issue: 'Doble tradición textual: griego breve frente a la tradición semítica más amplia'
  english_pob_reading: The parallel Semitic-form tradition for this scene is much fuller and focuses on Tobiah applying the fish’s gall to his father’s eyes; the shorter Greek wording here is followed for the main text.
  chosen_spanish_reading: Se sigue el griego breve en el texto principal, sin incorporar aquí la escena ampliada de la tradición semítica.
  alternative_spanish_readings:
  - La tradición semítica paralela es más extensa y menciona la aplicación de la hiel a los ojos del padre.
  - Tobit/Tobías aplica la hiel del pez a los ojos de su padre.
  rationale: El versículo griego de Swete sólo ordena tomar la hiel y continúa con el viaje; para no mezclar tradiciones ni expandir el texto más allá del testimonio base, se mantiene la forma breve y se deja constancia de la variante amplia en nota.
  doctrine_reference: Crítica textual / tradición manuscrita de Tobit
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de «came along behind them» a «followed behind them» para reflejar con más precisión συνῆλθεν ὀπίσωθεν αὐτῶν. En español se optó por «el perro los siguió detrás de ellos», conservando la relación espacial y el movimiento de seguimiento sin sobrecargar el sintagma.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general sólo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se usa «hiel» como término principal, pero se documenta «bilis» por la ambigüedad de χολή.
  - Se evita armonizar con la versión semítica ampliada dentro del texto principal para respetar el griego base.
