base_translation:
  language: en
  yaml_path: translation/ot/2_kings/005/012.yaml
  text: Are not Abanah and Pharpar[a], the rivers of Damascus[b], better than all the waters of Israel? Could I not wash in them and be clean?” So he turned and went away in a rage.
  footnotes:
