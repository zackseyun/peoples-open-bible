revisions:
- from: Abraham seguramente llegará a ser una nación[a] grande y poderosa, y todas las naciones de la tierra serán bendecidas en él.
  to: Abraham ciertamente llegará a ser una nación grande y poderosa, y todas las naciones de la tierra serán bendecidas en él[a].
  rationale: Se corrige el anclaje de la nota para que corresponda a la cláusula hebrea debatida (וְנִבְרְכוּ בּוֹ) y se ajusta «seguramente» a «ciertamente» para reflejar mejor la fuerza enfática del hebreo sin perder naturalidad en español.
