translation:
  language: es
  text: Y los santos[a] de Dios eran como corderos en inocencia en medio de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los devotos de Dios' o 'los piadosos de Dios'.
    reason: lexical_alternative
  - marker: b
    text: O 'entre ellos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσιοι
  english_pob_choice: holy ones
  chosen_spanish: devotos
  alternatives_spanish:
  - piadosos
  - fieles
  - santos
  lexicon: BDAG
  rationale: En este contexto, ὅσιοι no apunta primero a una categoría eclesiástica, sino a personas marcadas por piedad y lealtad reverente a Dios. 'Devotos' comunica esa cualidad sin cargar el término con el peso técnico de 'santos'.
- source_word: ἀρνία
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderitos
  - ovejas
  lexicon: LSJ
  rationale: El griego nombra corderos, no ovejas en general. 'Corderos' conserva la imagen de vulnerabilidad e inocencia con naturalidad en español.
- source_word: ἀκακίᾳ
  english_pob_choice: in innocence
  chosen_spanish: en inocencia
  alternatives_spanish:
  - inocentes
  - sin malicia
  - en guilelessness
  lexicon: BDAG
  rationale: La forma nominal expresa el estado o cualidad de inocencia/guilelessness. 'En inocencia' conserva la construcción de estado y evita convertir prematuramente el sustantivo en adjetivo.
- source_word: ἐν μέσῳ αὐτῶν
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - entre ellos
  - en su medio
  lexicon: BDAG
  rationale: La frase es espacial y directa. 'En medio de ellos' es idiomático en español y preserva la imagen relacional del griego.
translation_notes:
  revision_awareness: El texto griego es una cláusula nominal sin verbo explícito; la auditoría inglesa introdujo 'were' por el marco narrativo previo. En español se mantuvo el imperfecto 'eran' para reflejar ese encuadre temporal sin añadir más contenido del que permite el griego.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y accesible, sin recurrir a 'SEÑOR' para el nombre divino porque aquí no aparece el tetragrama.
  - '''Devotos'' se eligió como opción intermedia entre ''piadosos'' y ''fieles'' para conservar el matiz religioso del término χωρίς introducir un tecnicismo confesional fuerte.'
  - '''En inocencia'' conserva la estructura del sustantivo griego y coincide con la decisión auditada en inglés, evitando una paráfrasis como ''inocentes'' que desplazaría el énfasis.'
