  rationale: Se cambia 'los hijos' por 'los niños' para reflejar mejor la decisión documentada del POB de entender בָּנִים en sentido genérico de descendencia vulnerable, no específicamente 'sons'. Se reubica y reescribe la nota relevante para preservar esa información. Se mantiene 'fruto del vientre' en el texto principal, conforme al hebreo y al expediente inglés, sin nota porque la nota indispensable en este versículo es la de בָּנִים. También se pule la nota de 'arcos' para mayor naturalidad en español.
