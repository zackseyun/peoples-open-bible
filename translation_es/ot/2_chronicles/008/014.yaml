    issue: Falta la nota correspondiente al hebraísmo לִדְבַר יוֹם בְּיוֹמוֹ
    rationale: El expediente inglés conserva una nota lexical alternativa para esta expresión (‘according to the matter of a day on its day’). El español debe preservar esa información en una nota anclada al segmento pertinente.
  - severity: medium
    issue: La nota [b] actual sobre ‘ministrar’ no corresponde a una alternativa significativa preservada por el POB
    rationale: La nota repite básicamente la elección española en vez de documentar una alternativa lexical o una ambigüedad relevante. Conviene reemplazarla por la nota del hebraísmo diario.
  - severity: low
    issue: ‘Puso’ es menos preciso que ‘designó’ para וַיַּעֲמֵד
    rationale: Aunque no es incorrecto, ‘designó’ refleja mejor el valor administrativo de nombrar/establecer personas en funciones, en línea con ‘he appointed’ del POB inglés.
