translation:
  language: es
  text: Entonces Ibzán murió y fue sepultado en Belén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: Then ... died
  chosen_spanish: Entonces ... murió
  alternatives_spanish:
  - Y ... murió
  - '... murió'
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. «Entonces» reproduce en español esa progresión narrativa natural sin forzar una repetición mecánica de «y». «Murió» conserva el valor verbal simple del hebreo.
- source_word: אִבְצָן
  english_pob_choice: Ibzan
  chosen_spanish: Ibzán
  alternatives_spanish:
  - Ibzan
  lexicon: Convención de transliteración bíblica
  rationale: Se conserva el nombre propio como transliteración; «Ibzán» adapta la acentuación al español para facilitar la lectura pública sin alterar la identidad del nombre.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue enterrado allí
  lexicon: HALOT
  rationale: 'La forma nifal tiene sentido pasivo: «fue sepultado» expresa con dignidad el hecho de la sepultura y mantiene el valor pasivo del hebreo. «Enterrado» también es posible, pero «sepultado» es más solemne y biblicamente idiomático en español.'
- source_word: בְּבֵית לָחֶם
  english_pob_choice: in Bethlehem
  chosen_spanish: en Belén
  alternatives_spanish:
  - en Bethlehem
  - en Belén de Judá
  lexicon: HALOT
  rationale: La preposición ב indica ubicación, bien expresada por «en». Para el nombre del lugar, «Belén» es la forma española establecida y clara para lectores bíblicos. No se añade «de Judá» porque el hebreo no lo especifica aquí.
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo notas ni variantes textuales; la revisión más reciente no registró cambios. La versión española sigue de cerca el flujo narrativo y mantiene sin añadidos el contenido breve del versículo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio.
  - No se introducen glosas interpretativas fuera del contenido mínimo del hebreo.
  - La toponimia usa una forma española reconocida («Belén») en lugar de una transliteración innecesaria.
