translation:
  language: es
  text: 'Y a Eber le nacieron dos hijos: el nombre del uno fue Peleg[a], porque en sus días la tierra se dividió, y el nombre de su hermano fue Joktán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el territorio fue dividido'. El hebreo puede referirse tanto a toda la tierra como a una tierra o territorio; el texto no especifica la naturaleza de la división.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְעֵבֶר
  english_pob_choice: And to Eber
  chosen_spanish: Y a Eber
  alternatives_spanish:
  - Ahora bien, a Eber
  - Y para Eber
  lexicon: HALOT
  rationale: La preposición con la conjunción se naturaliza en español como 'Y a Eber', manteniendo el flujo genealógico y la construcción indirecta sin añadir contenido interpretativo.
- source_word: יֻלַּד
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron
  - fueron nacidos
  lexicon: HALOT
  rationale: El pasivo hebreo de ילד se expresa de modo natural en español con una construcción de nacimiento que conserva el enfoque en Eber sin volverlo sujeto agente.
- source_word: שְׁנֵי בָנִים
  english_pob_choice: two sons
  chosen_spanish: dos hijos
  alternatives_spanish:
  - dos hijos varones
  - dos hijos
  lexicon: HALOT
  rationale: '''Hijos'' comunica bien בנים en una genealogía española y evita una repetición poco natural; ''varones'' sería más explícito pero no necesario aquí.'
- source_word: שֵׁם הָאֶחָד
  english_pob_choice: the name of the one
  chosen_spanish: el nombre del uno
  alternatives_spanish:
  - el nombre del primero
  - uno se llamaba
  lexicon: HALOT
  rationale: Conserva la estructura hebrea sin convertir 'uno' en 'primero', que sería interpretativo; suena algo más literal que una formulación plenamente idiomática, pero sigue siendo natural en español.
- source_word: פֶּלֶג
  english_pob_choice: Peleg
  chosen_spanish: Peleg
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme al uso estándar.
- source_word: כִּי בְיָמָיו
  english_pob_choice: because in his days
  chosen_spanish: porque en sus días
  alternatives_spanish:
  - pues en sus días
  - ya que en sus días
  lexicon: HALOT
  rationale: '''Porque'' reproduce la relación causal del texto y conecta el nombre con la explicación etiológica de forma clara en español.'
- source_word: נִפְלְגָה הָאָרֶץ
  english_pob_choice: the earth was divided
  chosen_spanish: la tierra fue dividida
  alternatives_spanish:
  - la tierra se dividió
  - el país fue dividido
  lexicon: HALOT
  rationale: '''Tierra'' mantiene la amplitud semántica de הארץ y evita restringir el sentido a un territorio local; la pasiva conserva la indeterminación del agente y la tensión lexical documentada.'
- source_word: וְשֵׁם אָחִיו
  english_pob_choice: and his brother’s name
  chosen_spanish: y el nombre de su hermano
  alternatives_spanish:
  - y su hermano se llamaba
  - y el nombre de su hermano
  lexicon: HALOT
  rationale: Se mantiene el giro posesivo del hebreo, con orden natural en español y sin alterar la relación fraterna explícita.
- source_word: יָקְטָן
  english_pob_choice: Joktan
  chosen_spanish: Joktán
  alternatives_spanish:
  - Joktan
  lexicon: HALOT
  rationale: Se translitera el nombre propio al español con acento gráfico para acomodarlo a la prosodia española y hacerlo publicable, preservando el referente nominal.
theological_decisions:
- issue: Alcance de la división en 'la tierra fue dividida'
  english_pob_reading: Retain the broad wording 'the earth was divided' without specifying the nature of the division.
  chosen_spanish_reading: '''la tierra fue dividida'' sin precisar si se trata de toda la tierra, de una región o de una división de pueblos/lenguas'
  alternative_spanish_readings:
  - la tierra fue dividida
  - la tierra fue repartida
  - el país fue dividido
  rationale: El hebreo permite tanto 'tierra' como 'territorio', y no especifica la naturaleza de la división. La redacción española conserva esa amplitud para no resolver la tensión interpretativa que el texto deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios; se mantiene la decisión de conservar el alcance amplio de 'la tierra' sin especificar la clase de división. No se detectaron revisiones aplicadas al versículo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto cuando corresponda, pero este versículo no lo contiene.
  - Se mantiene 'Peleg' y 'Joktán' como nombres propios transliterados; 'Joktán' se adapta al uso español con acento gráfico.
  - Se preserva la pasiva de nacimiento y la relación causal etiológica sin añadir explicaciones no presentes en el hebreo.
