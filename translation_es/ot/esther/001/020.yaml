revisions:
- from: Y cuando se oiga el decreto del rey, que él emite en todo su reino —porque es muy grande—, todas las mujeres darán honor[a] a sus maridos[b], desde la grande hasta la pequeña.
  to: Y cuando se oiga el decreto del rey que emita en todo su reino —porque es muy grande—, todas las mujeres darán honor[a] a sus maridos[b], del más grande al más pequeño.
  rationale: Se corrige el modismo final para reflejar fielmente el hebreo como una escala social general («del más grande al más pequeño») y no como una referencia femenina concordada con «mujeres». También se aligera «que él emite» a «que emita» para mejorar la naturalidad del español sin perder el sentido de pronunciamiento oficial.
  reviewer_model: gpt-5.4
