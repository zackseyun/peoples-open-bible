translation:
  language: es
  text: Entonces pusieron el arca de Yahvé sobre el carro, junto con la caja y los ratones de oro y las imágenes de sus tumores[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus hinchazones»; posiblemente «sus hemorroides».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂמוּ
  english_pob_choice: Then they put
  chosen_spanish: Entonces pusieron
  alternatives_spanish:
  - y pusieron
  - así que pusieron
  - entonces la colocaron
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, "entonces" conserva la secuencia narrativa y "pusieron" es natural y fiel al valor de colocar el objeto sin forzar un calco.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahveh
  - el arca de Yavé
  lexicon: HALOT
  rationale: En este proyecto, יְהוָה se traduce como "Yahvé". "Arca" conserva el término cultual establecido para אֲרוֹן y evita un rodeo explicativo que el texto no da.
- source_word: אֶל הָעֲגָלָה
  english_pob_choice: on the cart
  chosen_spanish: sobre el carro
  alternatives_spanish:
  - en el carro
  - encima del carro
  - sobre la carreta
  lexicon: HALOT
  rationale: Para un vehículo, "sobre" expresa bien la colocación física y suena más natural que un literalismo con "en" o "hacia". "Carro" mantiene un registro bíblico claro sin arcaizar demasiado.
- source_word: הָאַרְגַּז
  english_pob_choice: the box
  chosen_spanish: la caja
  alternatives_spanish:
  - la caja pequeña
  - el cofre
  - el arcón
  lexicon: HALOT
  rationale: El término designa un recipiente distinto del arca; "caja" es claro y no sugiere necesariamente un objeto litúrgico mayor como "arca" o "cofre".
- source_word: עַכְבְּרֵי הַזָּהָב
  english_pob_choice: the gold mice
  chosen_spanish: los ratones de oro
  alternatives_spanish:
  - los ratones dorados
  - los ratones de oro fino
  lexicon: HALOT
  rationale: El hebreo dice literalmente "ratones de oro"; se conserva la materialidad con "de oro". "Ratones" es el equivalente más directo y evita suavizar la imagen.
- source_word: צַלְמֵי
  english_pob_choice: the images of
  chosen_spanish: las imágenes de
  alternatives_spanish:
  - las figuras de
  - las representaciones de
  - los ídolos de
  lexicon: HALOT
  rationale: '"Imágenes" reproduce con precisión צֶלֶם en el sentido de representaciones confeccionadas. No se fuerza "ídolos" porque el texto no usa un término idolátrico explícito aquí.'
- source_word: טְחֹרֵיהֶם
  english_pob_choice: their tumors
  chosen_spanish: sus tumores
  alternatives_spanish:
  - sus hinchazones
  - sus hemorroides
  lexicon: HALOT
  rationale: '"Tumores" mantiene la amplitud semántica elegida por la POB en inglés y evita especificar más de lo que el término permite. Otras opciones son posibles, pero más restrictivas o menos neutras.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se preserva el nombre propio divino en lugar de sustituirlo por un título. "Yahvé" es la forma estándar del proyecto en español y corresponde directamente al Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo base y con la decisión inglesa auditada; no se documentan revisiones textuales ni cambios de última pasada que requieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de manera consistente con la política del proyecto para יְהוָה.
  - '"Arca" se reserva para אֲרוֹן y "caja" para הָאַרְגַּז, preservando la distinción de objetos.'
  - '"Tumores" se usa con el mismo alcance semántico amplio que en la POB inglesa, sin especificar clínicamente el término.'
  - El registro es reverente y actual, evitando arcaísmos innecesarios sin perder el tono bíblico.
