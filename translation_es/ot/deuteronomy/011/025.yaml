review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica bien el sentido general del versículo: imposibilidad de resistencia, Yahvé como agente, imposición de temor sobre el territorio que Israel pisará, y cierre comparativo ''tal como les habló''. Sin embargo, se aparta del expediente auditado en un punto relevante: עַל־פְּנֵי כָל־הָאָרֶץ fue documentado como ''all the land'' por el contexto territorial, mientras que el español principal dice ''toda la tierra'', dejando en nota la limitación contextual. Además, ''ponerse delante de ustedes'' suena menos idiomático en español bíblico que ''hacerles frente'' o ''mantenerse en pie ante ustedes'', aunque el sentido está claro.'
  spanish_quality_summary: El español es generalmente claro, pero tiene algunas asperezas. 'Nadie podrá ponerse delante de ustedes' suena algo mecánico; 'hacerles frente' sería más natural en el texto principal, con la imagen literal preservada en nota. 'el miedo y el temor de ustedes' es comprensible pero algo pesado; 'el miedo y el temor que ustedes inspiran' sería más natural, aunque una solución más conservadora es mantener 'de ustedes'. El principal problema de legibilidad/fidelidad es 'toda la tierra', que en español tiende más a lectura global de lo que el contexto permite.
  glossary_alignment: 'Se alinea correctamente con la política del proyecto al usar ''Yahvé''. No hay conflicto con otros términos doctrinales principales. La divergencia está en la decisión léxica de הָאָרֶץ: el borrador no sigue suficientemente la preferencia auditada por ''land'' contextual, y conviene ajustar a ''toda la tierra/territorio'' en sentido territorial; ''toda la tierra'' en español suena demasiado amplio. También puede mejorarse la expresión del modismo יִתְיַצֵּב ... בִּפְנֵיכֶם para un español más natural.'
  issues:
  - severity: medium
    issue: '''toda la tierra'' en el texto principal no refleja bien la decisión contextual de ''land'' = territorio'
    rationale: El expediente inglés justifica 'land' por la cláusula relativa 'que ustedes pisan'. En español, 'toda la tierra' se oye más global que territorial. Debe ajustarse el texto principal, no solo la nota.
  - severity: medium
    issue: '''ponerse delante de ustedes'' es una formulación poco natural para el modismo hebreo'
    rationale: Aunque preserva parcialmente la imagen, en español suena rígido. 'hacerles frente' comunica mejor la idea de resistir/oponerse; la nota puede conservar la literalidad 'estar en pie ante ustedes'.
  - severity: low
    issue: La nota a usa comillas y puntuación torpes
    rationale: Empieza con una comilla sobrante y la redacción puede limpiarse para mayor legibilidad editorial.
  revised_spanish_text: Nadie podrá hacerles frente[a]. Yahvé su Dios pondrá el miedo y el temor de ustedes sobre toda la tierra[b] que pisen, tal como les habló.
  revised_footnotes:
  - marker: a
    text: 'O: “Ningún hombre podrá mantenerse en pie ante ustedes”. El modismo hebreo ‘estar en pie ante’ puede significar resistir u oponerse con éxito.'
    reason: lexical_alternative
  - marker: b
    text: Lit. “sobre la faz de toda la tierra”. Aquí ‘tierra’ se refiere al territorio que Israel pisará, no necesariamente al mundo entero.
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto principal para reflejar mejor el sentido contextual de הָאָרֶץ como territorio y para mejorar la naturalidad española del modismo de oposición. Se conservan en notas tanto la imagen literal hebrea como la aclaración contextual auditada.
