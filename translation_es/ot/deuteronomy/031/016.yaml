review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: Yahvé, el anuncio de la muerte de Moisés, el levantamiento del pueblo, la metáfora sexual para la idolatría y la ruptura del pacto. Sin embargo, hay pérdidas importantes: ''acostarte con tus padres'' en español suena sexual y no preserva bien el modismo funerario; ''al que va entrando'' omite el elemento ''en medio de'' / ''into whose midst''; y mantener singulares en ''me dejará... con él'' produce una lectura española innecesariamente rígida frente al criterio documentado en el POB inglés, que prefirió pluralizar por claridad.'
  spanish_quality_summary: El texto es generalmente digno y legible, pero varios giros suenan poco naturales o inducen una interpretación equivocada. 'Acostarte con tus padres' es especialmente problemático en español moderno. 'Dioses ajenos del país al que va entrando' resulta algo forzado y no comunica bien el sentido espacial del hebreo. La revisión propuesta mejora naturalidad y claridad sin perder fuerza retórica.
  glossary_alignment: Se alinea bien con 'Yahvé' para יְהוָה y mantiene con acierto la metáfora fuerte de וְזָנָה. 'Pacto' es aceptable para בְּרִיתִי. No obstante, el manejo del singular colectivo contradice el razonamiento auditado en inglés, que lo suaviza por claridad; en español conviene seguir ese criterio en el cuerpo del texto y explicar el hebreo en nota.
  issues:
  - severity: high
    issue: '''acostarte con tus padres'' es infeliz para שֹׁכֵב עִם אֲבֹתֶיךָ'
    rationale: Aunque intenta conservar el modismo, en español moderno 'acostarse con' suele tener sentido sexual. Eso distorsiona gravemente el sentido funerario del hebreo. 'Vas a reunirte con tus padres' o 'estás por descansar con tus padres' evita esa ambigüedad.
  - severity: medium
    issue: La frase 'al que va entrando' omite el matiz de 'en medio de / into whose midst'
    rationale: אֲשֶׁר הוּא בָא שָׁמָּה בְּקִרְבּוֹ no solo indica entrada al territorio sino ingreso en su medio/entorno. La redacción actual reduce el contenido y suena torpe.
  - severity: medium
    issue: El singular colectivo en 'me dejará... con él' dificulta la lectura española sin necesidad
    rationale: El propio expediente inglés documenta que las formas singulares hebreas funcionan como colectivo y que conviene usar plural para claridad. En español mantener el singular aquí no añade fidelidad suficiente para compensar la opacidad.
  - severity: low
    issue: '''país'' para הָאָרֶץ es posible, pero ''tierra'' encaja mejor con el registro bíblico deuteronómico'
    rationale: No es error, pero 'tierra' conserva mejor el tono y la asociación teológica/geográfica del libro sin sonar arcaico.
