translation:
  language: es
  text: y hagan su voluntad[a], y sepárense de las naciones de esta tierra y de los extranjeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo de Esdras 10 es más específico acerca de mujeres o esposas extranjeras; aquí 1 Esdras usa una formulación más amplia: «los extranjeros».'
    reason: alternative_reading
lexical_decisions:
- source_word: ποιήσατε
  english_pob_choice: do
  chosen_spanish: hagan
  alternatives_spanish:
  - haced
  - cumplan
  lexicon: BDAG
  rationale: El imperativo aoristo exhorta a ejecutar la acción; en español, "hagan" comunica de manera natural la orden dirigida a varios sin perder la fuerza directa del mandato.
- source_word: τὸ θέλημα αὐτοῦ
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - lo que él quiere
  - su deseo
  lexicon: BDAG
  rationale: '"Su voluntad" es la forma más idiomática y fiel para θέλημα en un contexto de obediencia a Dios, y conserva la transparencia teológica del término.'
- source_word: χωρίσθητε
  english_pob_choice: separate yourselves
  chosen_spanish: sepárense
  alternatives_spanish:
  - se aparten
  - aléjense
  lexicon: BDAG
  rationale: El verbo medio/pasivo en contexto funciona como mandato reflexivo; "sepárense" reproduce bien la exhortación deliberada a tomar distancia.
- source_word: ἀπὸ τῶν ἐθνῶν
  english_pob_choice: from the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos
  lexicon: BDAG
  rationale: '"Naciones" mantiene el valor amplio del griego sin introducir el tecnicismo eclesiástico "gentiles", que sería menos inmediato en español.'
- source_word: τῆς γῆς
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - del territorio
  lexicon: BDAG
  rationale: Aunque el contexto histórico apunta a la tierra/territorio local, "de la tierra" conserva el giro bíblico del griego con naturalidad en español.
- source_word: ἀλλογενῶν
  english_pob_choice: foreigners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - los de otra nación
  - las extranjeras
  lexicon: LSJ
  rationale: El término griego es amplio y no especifica mujeres; "los extranjeros" preserva ese alcance genérico, en línea con la decisión inglesa de no estrechar el sentido a "foreign women".
theological_decisions:
- issue: Relación con el paralelo hebreo de Esdras 10, que menciona de modo más específico a mujeres/esposas extranjeras
  english_pob_reading: Translate the Greek's broader command ... rather than narrowing the verse to women.
  chosen_spanish_reading: 'Traducir el mandato amplio del griego: separarse de las naciones de la tierra y de los extranjeros, sin añadir "mujeres".'
  alternative_spanish_readings:
  - sepárense ... de las mujeres extranjeras
  - sepárense ... de las esposas extranjeras
  rationale: Como 1 Esdras se traduce aquí desde el griego de Swete como testigo primario, no debe importarse una precisión que el griego no expresa. La nota puede registrar que el paralelo hebreo de Esdras 10 es más específico.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition; PHILOSOPHY.md on 1 Esdras using Swete LXX with WLC MT parallels as cross-reference.
translation_notes:
  revision_awareness: El pasaje coincide con el contexto de revisión reciente sin cambios sustantivos; se mantuvo la lectura griega primaria y el contraste con el paralelo hebreo se dejó en nota, sin estrechar indebidamente el alcance del término ἀλλογενῶν.
  spanish_consistency_notes:
  - Se prefirió "Yahvé" solo cuando el texto lo requiera; aquí no aparece el nombre divino explícito, por lo que se mantiene "su" de forma contextual.
  - Se conservó un registro bíblico sobrio y claro, evitando calcos rígidos como "haced" salvo donde el español actual lo soporta bien.
  - '"Extranjeros" se eligió como equivalente amplio y neutral para ἀλλογενῶν, manteniendo la tensión documentada con el paralelo hebreo sin resolverla por paráfrasis.'
