  text: 'εὐθέως οὖν ἀπέστησαν ἀπ’ αὐτοῦ οἱ μέλλοντες αὐτὸν ἀνετάζειν· καὶ ὁ χιλίαρχος δὲ ἐφοβήθη ἐπιγνοὺς ὅτι Ῥωμαῖός ἐστιν καὶ ὅτι ⸂αὐτὸν ἦν⸃ δεδεκώς.'
base_translation:
  language: en
  yaml_path: translation/nt/acts/022/029.yaml
  text: Therefore those who were about to examine him withdrew from him at once[b][a], and the tribune also became afraid when he realized that he was a Roman citizen and that he had bound him.
  footnotes:
  - marker: a
    text: "Or, more specifically in context, 'those who were about to examine him by scourging.' The Greek verb can refer to official examination, and the previous verse clarifies the means."
    reason: lexical_alternative
  - marker: b
    text: "Or 'the commander'; Greek 'tribune' refers to a Roman military officer commanding about a thousand soldiers in title, though actual numbers varied."
    reason: cultural_note
translation:
  language: ko
  text: 그러자 그를 신문[a]하려던 자들이 즉시 그에게서 물러갔고, 천부장도[b] 그가 로마 시민임을 알고는 그를 결박했다는 것 때문에 두려워했습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 문맥상 더 구체적으로는 「채찍질로 신문하려던 자들」. 24절의 신문 방식이 이를 분명히 한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「지휘관」. 헬라어는 약 1,000명을 지휘하는 로마군 장교를 가리킨다.
    reason: cultural_note
