    text: 'El griego paralelo dice más ampliamente: “heredará seres que se arrastran y bestias, gusanos”, y difiere de la lista hebrea de criaturas.'
    reason: alternative_reading
  revision_rationale: 'Se ajusta la frase inicial a un español más natural (''A la muerte de un hombre''), se conserva el masculino singular representativo, se mantiene la pareja de criaturas de descomposición, y se corrigen dos puntos léxicos clave: כִּנִּים se vierte como ''mosquitos'' con nota de incertidumbre, y רֶמֶשׂ como ''seres que se arrastran'' para no restringirlo a ''reptiles''. Las notas se reordenan para reflejar exactamente las prioridades del audit trail inglés: incertidumbre léxica hebrea y variante griega.'
