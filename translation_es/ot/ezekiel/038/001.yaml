lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - aconteció
  lexicon: HALOT
  rationale: En la fórmula profética וַיְהִי דְבַר־יְהוָה אֵלַי, el sentido idiomático es que la palabra divina 'vino' al profeta. 'Vino' reproduce naturalmente ese valor sin perder la idea de movimiento hacia el hablante.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En este marco profético, דבר denota la palabra o mensaje de Dios. 'La palabra' conserva el giro bíblico y la conexión con la comunicación divina directa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrama se rinde aquí como 'Yahvé', conforme al estándar español del proyecto para preservar el nombre propio divino y no sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica dirección hacia el profeta. 'A mí' es la forma natural y clara en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y me dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce la cita que sigue. 'Diciendo' reproduce la función formulística de manera directa en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo usa directamente el Nombre divino. La pauta del proyecto en español es 'Yahvé', que conserva el nombre personal de Dios sin la convención de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
