    text: El hebreo usa el nombre divino YHWH; aquí se traduce «Yahvé».
    reason: theological_note
  revision_rationale: 'Se proponen ajustes menores, no doctrinales: «del país» mejora la naturalidad de כָל עַם הָאָרֶץ en español, y «nombró supervisores» refleja con mayor precisión la designación administrativa implícita en וַיָּשֶׂם ... פְּקֻדּוֹת. Se conserva «casa» para el paralelismo literario y «Yahvé» según la política del proyecto.'
