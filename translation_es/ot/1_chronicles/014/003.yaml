review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: David tomó más mujeres en Jerusalén y luego engendró más descendencia. Sin embargo, no preserva suficientemente la decisión léxica auditada para נָשִׁים, donde el contexto narrativo exige ''esposas'' y el English POB eligió explícitamente ''wives'', con ''women'' solo como alternativa de nota. También conviene reflejar la nota alternativa en español en torno a ''tomó''.'
  spanish_quality_summary: El español es claro y natural, pero 'tomó más mujeres' suena ambiguo en español moderno, pudiendo sugerir simplemente compañía femenina más que matrimonio/poligamia. 'Tomó más esposas' conserva mejor el sentido contextual y sigue siendo legible. 'Engendró más hijos e hijas' está bien y mantiene la especificidad del hebreo.
  glossary_alignment: 'No hay términos del glosario principal comprometidos aquí. La cuestión central es la consistencia con la decisión léxica documentada: נָשִׁים debe representarse como ''esposas'' en el texto principal, no ''mujeres'', dejando ''se casó con más mujeres'' como alternativa de nota si se desea suavizar el literalismo de לקח.'
  issues:
  - severity: medium
    issue: '''mujeres'' en lugar de ''esposas'' para נָשִׁים'
    rationale: Aunque נָשִׁים puede significar 'mujeres', en este contexto de David tomando adicionales en Jerusalén el sentido relacional es 'wives'. El English POB documenta esa elección principal y reserva 'women' como alternativa. En español, 'mujeres' introduce ambigüedad innecesaria.
  - severity: low
    issue: La nota al pie literaliza 'tomó más mujeres' en vez de corresponder al texto principal revisado
    rationale: Si el texto principal corrige a 'tomó más esposas', la nota debe conservar la alternativa interpretativa ('se casó con más mujeres') y explicar la literalidad hebrea de forma coherente con el anclaje.
  revised_spanish_text: Y David tomó[a] más esposas en Jerusalén, y David engendró más hijos e hijas.
  revised_footnotes:
  - marker: a
    text: O 'se casó con más mujeres'; el hebreo literalmente dice 'tomó más esposas'.
    reason: lexical_alternative
  revision_rationale: Se revisa 'mujeres' a 'esposas' para preservar el sentido contextual de נָשִׁים y alinearse con la decisión léxica auditada del English POB ('wives'). Se mantiene 'tomó' por fidelidad a לקח, con nota alternativa que ofrece una formulación más interpretativa y natural. No se requieren cambios en 'engendró más hijos e hijas'.
