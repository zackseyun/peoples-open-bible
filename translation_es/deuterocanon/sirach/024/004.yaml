translation:
  language: es
  text: Yo hice mi morada en las alturas[a], y mi trono estaba en un pilar de nube;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el pilar de nube». El griego dice literalmente «en un pilar de nube», pero la frase probablemente evoca el conocido pilar de nube asociado con la presencia y guía de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεσκήνωσα
  english_pob_choice: I made my dwelling
  chosen_spanish: hice mi morada
  alternatives_spanish:
  - habité
  - levanté mi morada
  - acampé
  lexicon: BDAG
  rationale: El verbo griego expresa establecerse o habitar con un matiz de morar como en tienda. «Hice mi morada» conserva la acción en primera persona y comunica residencia estable en un español natural, sin perder del todo el eco de asentarse o tabernaculizar.
- source_word: ἐν ὑψηλοῖς
  english_pob_choice: in the heights
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en lugares altos
  - en lo alto
  - en las alturas celestiales
  lexicon: LSJ
  rationale: El plural sustantivado apunta a alturas elevadas o celestes. «En las alturas» es idiomático en español y mantiene el valor local/plural sin interpretar en exceso.
- source_word: θρόνος
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  - sede
  lexicon: LSJ
  rationale: El término presenta imaginería real y exaltada explícita; «trono» es la correspondencia directa y conserva la fuerza teológica del texto.
- source_word: στύλῳ νεφέλης
  english_pob_choice: a pillar of cloud
  chosen_spanish: una columna de nube
  alternatives_spanish:
  - un pilar de nube
  - la columna de nube
  - una columna de nube
  lexicon: LSJ
  rationale: El griego carece de artículo, y el sustantivo στύλος admite «columna» con buena naturalidad en español. «Columna de nube» preserva la forma y el posible eco del relato del desierto sin añadir explicación interpretativa al cuerpo del texto.
theological_decisions:
- issue: Alusión a la teofanía del desierto en la imagen de la nube
  english_pob_reading: Retain the phrase straightforwardly as 'a pillar of cloud' without expanding the allusion.
  chosen_spanish_reading: Mantener «una columna de nube» sin ampliar la alusión en el texto principal.
  alternative_spanish_readings:
  - la columna de nube
  - columna de nube con nota explicativa
  rationale: El versículo probablemente evoca la tradición de la columna de nube asociada con la presencia y guía de Dios, pero el griego presenta la imagen de forma directa. La traducción principal conserva la tensión intertextual en vez de resolverla o explicarla dentro del versículo.
  doctrine_reference: Preservar la tensión teológica e intertextual en lugar de resolverla.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran acuerdo alto y no requieren revisión sustantiva; se conserva la imaginería original sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se prefirió «columna de nube» por ser más natural en español bíblico contemporáneo que «pilar de nube», sin perder el sentido literal del griego.
  - Se evitó «tabernaculé» por sonar arcaizante en español y no aportar claridad adicional respecto de κατεσκήνωσα.
