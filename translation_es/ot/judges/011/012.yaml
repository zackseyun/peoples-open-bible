  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia narrativa, el contexto diplomático de מַלְאָכִים como «mensajeros», el sentido hostil de «has venido contra mí», y «en mi tierra» por בְּאַרְצִי. También preserva la nota alternativa del hebraísmo מַה לִּי וָלָךְ.
  spanish_quality_summary: 'El español es claro y natural, pero la frase principal invierte el orden relacional del hebreo y del POB inglés: «entre tú y yo» en vez de «entre mí y ti». No cambia drásticamente el sentido, pero sí conviene conservar el punto de vista del hablante y la cercanía al giro fuente. Una leve mejora estilística es preferir «amonitas» sin artículo definido étnico innecesario tras «rey de».'
  glossary_alignment: No hay términos del glosario mayor en juego salvo nombres propios y etnónimo; «Jefté» y «amonitas» están bien. No hay conflicto teológico ni terminológico de proyecto.
  issues:
  - severity: medium
    issue: Orden de personas en el hebraísmo «מַה לִּי וָלָךְ»
    rationale: 'El texto fuente y el POB inglés mantienen primero la perspectiva del hablante: «between me and you». En español, «¿Qué hay entre mí y ti?» o «¿Qué hay entre nosotros?» preserva mejor esa estructura. «¿Qué hay entre tú y yo?» es comprensible, pero desplaza el foco.'
  - severity: low
    issue: «de los amonitas» puede simplificarse a «de amonitas»?
    rationale: No es un error; «rey de los amonitas» es normal y plenamente aceptable en español bíblico. No requiere cambio obligatorio. La revisión se centra en el hebraísmo principal.
  revised_spanish_text: 'Entonces Jefté envió mensajeros al rey de los amonitas[a], diciendo: «¿Qué hay entre mí y ti, que has venido contra mí para luchar en mi tierra?»'
