    issue: La frase 'Está entronizado sobre los querubines' no refleja plenamente יֹשֵׁב.
    rationale: El participio יֹשֵׁב aporta la imagen de sentarse/estar sentado en función entronizadora. Aunque 'entronizado' capta el sentido idiomático, omite un matiz significativo que el POB inglés auditado decidió recuperar con 'sits enthroned upon'.
  - severity: low
    issue: La nota b no coincide de forma óptima con la mejor redacción española posible.
    rationale: Si el texto principal se corrige para incluir el matiz de 'sentado', la nota debe actualizarse para mantener correspondencia exacta entre ancla y alternativas léxicas.
  revised_spanish_text: Yahvé reina[a]; que los pueblos tiemblen. Se sienta entronizado sobre los querubines[b]; que la tierra se estremezca.
  revised_footnotes:
  - marker: a
    text: 'O: “los pueblos tiemblan ... la tierra se estremece”. Los imperfectos hebreos también pueden leerse en forma indicativa, no solo como respuestas volitivas/jusivas.'
    reason: alternative_reading
  - marker: b
    text: “Se sienta entronizado sobre los querubines” también puede traducirse “entronizado entre los querubines” o “está entronizado sobre los querubines”. La expresión hebrea es un título real-templo para Yahvé.
    reason: lexical_alternative
  revision_rationale: Se revisa el segundo colon para reflejar mejor el participio hebreo יֹשֵׁב y alinearlo con la decisión auditada del POB inglés ('sits enthroned upon'). La nueva redacción mantiene español natural y registro bíblico claro. También se ajusta la nota b para que corresponda exactamente a la formulación revisada.
