translation:
  language: es
  text: Ahora los ojos de Israel estaban debilitados por la vejez[a]; no podía ver. Entonces los acercó hacia sí[b], y los besó y los abrazó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''los ojos de Israel estaban pesados por la vejez''. Es un modismo que significa que su vista se había debilitado.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo deja implícito el sujeto de 'los acercó'. El contexto inmediato puede entenderse de más de una manera; esta redacción conserva esa indeterminación sin forzar una identificación en español.
    reason: source_ambiguity
lexical_decisions:
- source_word: עֵינֵי יִשְׂרָאֵל
  english_pob_choice: Israel’s eyes
  chosen_spanish: los ojos de Israel
  alternatives_spanish:
  - los ojos de Jacob
  - los ojos de Israel (como poseedor)
  lexicon: HALOT
  rationale: Conservo el nombre 'Israel' porque el hebreo lo usa explícitamente; la construcción posesiva es natural en español y refleja el genitivo hebreo sin sustituirlo por 'Jacob'.
- source_word: כָּבְדוּ
  english_pob_choice: were dim
  chosen_spanish: estaban pesados
  alternatives_spanish:
  - estaban debilitados
  - se habían vuelto pesados
  lexicon: HALOT
  rationale: El verbo significa literalmente 'ser pesados'. Mantengo la imagen corporal del hebreo para no borrar la metáfora, y la explico en nota como idiomática para la vista.
- source_word: מִזֹּקֶן
  english_pob_choice: with age
  chosen_spanish: por la edad
  alternatives_spanish:
  - a causa de la edad
  - por causa de la vejez
  lexicon: HALOT
  rationale: La preposición expresa causa o fuente; 'por la edad' comunica esa relación de manera natural en español y evita una paráfrasis excesiva.
- source_word: לֹא יוּכַל לִרְאוֹת
  english_pob_choice: he could not see
  chosen_spanish: ya no podía ver
  alternatives_spanish:
  - no podía ver
  - no era capaz de ver
  lexicon: HALOT
  rationale: '''Ya no podía ver'' conserva la incapacidad del hebreo con fluidez narrativa; el ''ya'' está implícito por el contexto de la vejez y la progresión del relato.'
- source_word: וַיַּגֵּשׁ אֹתָם אֵלָיו
  english_pob_choice: So he brought them near to him
  chosen_spanish: Entonces él los acercó a él
  alternatives_spanish:
  - Entonces los acercó a sí
  - Entonces los hizo acercarse a él
  lexicon: HALOT
  rationale: Mantengo la acción de 'acercar' propia del hiphil de נגשׁ. El sujeto queda implícito en el hebreo; en español lo conservo como 'él' para reflejar esa ambigüedad contextual sin atribuirlo erróneamente a José o a Israel en el texto principal.
- source_word: וַיִּשַּׁק לָהֶם
  english_pob_choice: and he kissed them
  chosen_spanish: y los besó
  alternatives_spanish:
  - y les besó
  - y besó a ambos
  lexicon: HALOT
  rationale: El objeto plural se expresa con el clítico 'los', que es natural y preciso en español; no necesito especificar distribuciones adicionales que el hebreo no exige.
- source_word: וַיְחַבֵּק לָהֶם
  english_pob_choice: and embraced them
  chosen_spanish: y los abrazó
  alternatives_spanish:
  - y los estrechó en un abrazo
  - y los abrazó afectuosamente
  lexicon: HALOT
  rationale: '''Abrazó'' es un equivalente directo y digno; ''abrazar'' conserva el gesto afectivo sin introducir un registro más interpretativo que el del hebreo.'
theological_decisions:
- issue: Identidad del sujeto de וַיַּגֵּשׁ
  english_pob_reading: So he brought them near to him
  chosen_spanish_reading: Entonces él los acercó a él
  alternative_spanish_readings:
  - Entonces José los acercó a él
  - Entonces Israel los acercó a él
  rationale: El hebreo deja el sujeto elíptico; el audit trail inglés pasó por una corrección y una reversion, mostrando que el contexto inmediato permite la continuidad ambigua. En español mantengo la ambigüedad con 'él' en el texto principal para no resolverla sin necesidad a partir del versículo aislado.
  doctrine_reference: Narrativa hebrea; continuidad contextual del sujeto implícito
translation_notes:
  revision_awareness: 'El auditoria inglesa muestra una oscilación importante sobre el sujeto de ''brought them near'': primero se corrigió a ''Joseph'', luego se revirtió a ''he'' para ajustarse al hebreo, cuyo sujeto es elíptico y se entiende por contexto. Este borrador sigue la última revisión y mantiene la ambigüedad del hebreo en español, sin introducir explícitamente ''José'' en el texto principal.'
  spanish_consistency_notes:
  - Uso 'Israel' como nombre del sujeto, no 'Jacob', porque el hebreo lo nombra así en este versículo.
  - Conservo la metáfora de 'pesados' para עֵינֵי ... כָּבְדוּ y la explico en nota para no perder la imagen hebrea.
  - Empleo 'acercó' para וַיַּגֵּשׁ y 'abrazó' para וַיְחַבֵּק, ambos con registro digno y narrativo.
  - Mantengo el objeto plural con clíticos plurales ('los') para reflejar אֹתָם / לָהֶם sin sobreespecificar la distribución.
