translation:
  language: es
  text: 'Entonces el rey Sedequías envió y tomó a Jeremías el profeta ante sí[a], a la tercera entrada[b] que está en la casa de Yahvé; y el rey dijo a Jeremías: «Estoy preguntándote algo[c]; no me ocultes nada[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a su presencia”; el hebreo expresa movimiento hacia la persona del rey.
    reason: lexical_alternative
  - marker: b
    text: O “el tercer acceso”.
    reason: lexical_alternative
  - marker: c
    text: O “te hago una pregunta”.
    reason: lexical_alternative
  - marker: d
    text: O “no me ocultes una cosa”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción inicial de enviar; 'envió' conserva el orden narrativo y la fuerza básica sin sobreinterpretar.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - hizo traer
  - trajo
  lexicon: HALOT
  rationale: '''Tomó'' sigue de cerca el verbo hebreo y mantiene la secuencia verbal; el contexto deja ver que Jeremías fue llevado ante el rey.'
- source_word: אֵלָיו
  english_pob_choice: to himself
  chosen_spanish: para sí
  alternatives_spanish:
  - a él
  - hacia sí
  lexicon: HALOT
  rationale: La preposición con sufijo personal señala dirección hacia la persona del rey; 'para sí' comunica esa relación personal de modo natural en español.
- source_word: מָבוֹא הַשְּׁלִישִׁי
  english_pob_choice: the third entrance
  chosen_spanish: la tercera entrada
  alternatives_spanish:
  - el tercer acceso
  - la tercera entrada de acceso
  lexicon: HALOT
  rationale: מָבוֹא denota una entrada o acceso; 'entrada' es la equivalencia española más clara y conserva el carácter arquitectónico del lugar.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa de Yahveh
  lexicon: HALOT
  rationale: Se mantiene la expresión literal 'casa de Yahvé' para preservar la transparencia formal del hebreo; 'templo' sería un equivalente contextual válido pero menos directo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se traduce el nombre divino con la forma establecida en español del proyecto, 'Yahvé', en lugar de sustituirlo por un título como 'Señor'.
- source_word: שֹׁאֵל אֲנִי אֹתְךָ דָּבָר
  english_pob_choice: I am asking you something
  chosen_spanish: estoy preguntándote algo
  alternatives_spanish:
  - te hago una pregunta
  - voy a preguntarte algo
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente; 'estoy preguntándote algo' conserva ese matiz y reproduce el carácter directo del rey.
- source_word: אַל תְּכַחֵד מִמֶּנִּי דָּבָר
  english_pob_choice: do not hide anything from me
  chosen_spanish: no me ocultes nada
  alternatives_spanish:
  - no me escondas nada
  - no me ocultes cosa alguna
  lexicon: HALOT
  rationale: כחד significa ocultar o encubrir; 'no me ocultes nada' preserva el valor totalizador de דָּבָר sin sonar rígido en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo contiene el Tetragrámaton, por lo que el español debe preservar el nombre propio divino en lugar de sustituirlo por una apelación tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación de acceso personal en אֵלָיו
  english_pob_reading: to himself
  chosen_spanish_reading: para sí
  alternative_spanish_readings:
  - a él
  - hacia sí
  rationale: La forma hebrea subraya que Jeremías es llevado ante la presencia personal del rey; 'para sí' conserva esa referencia sin añadir contenido no explicitado.
  doctrine_reference: Lexical transparency principle in the POB translation philosophy
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el expediente inglés más reciente; no se requieren cambios de revisión. Se ha conservado la decisión auditada de traducir יְהוָה como Yahvé/Yahweh según la convención española del proyecto, y se ha mantenido la literalidad controlada de 'tomó', 'tercera entrada' y la cláusula negativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma española del nombre divino, consistente con el proyecto.
  - '''Casa de Yahvé'' conserva la transparencia de בית יהוה sin sustituir por ''templo'' en el texto principal.'
  - '''No me ocultes nada'' reproduce el totalizador de דָּבָר en la negación.'
  - El orden narrativo con dos verbos ('envió y tomó') sigue el hebreo y el trazado del POB inglés.
