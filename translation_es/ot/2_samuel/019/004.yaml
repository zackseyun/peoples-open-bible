translation:
  language: es
  text: Entonces el pueblo entró a escondidas[a] en la ciudad aquel día, como se escabulle la gente avergonzada cuando huye en la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'entró furtivamente' / 'se introdujo sigilosamente'; el hebreo enfatiza movimiento furtivo, no robo literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְגַּנֵּב
  english_pob_choice: stole into / slipped into
  chosen_spanish: se metió furtivamente
  alternatives_spanish:
  - se introdujo furtivamente
  - se deslizó furtivamente
  - entró a escondidas
  lexicon: HALOT
  rationale: El hitpael de גנב comunica movimiento sigiloso, no robo literal. En español, 'se metió furtivamente' conserva la idea de entrar de manera discreta y natural, sin perder el matiz de sigilo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los hombres
  - las tropas
  lexicon: HALOT
  rationale: Aunque el contexto es militar, el hebreo dice literalmente 'el pueblo'. 'El pueblo' mantiene esa amplitud y sigue siendo comprensible en el contexto de los guerreros que regresan.
- source_word: לָבוֹא הָעִיר
  english_pob_choice: into the city / to enter the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - a la ciudad
  - para entrar en la ciudad
  - hasta la ciudad
  lexicon: HALOT
  rationale: Después de un verbo de movimiento sigiloso, 'en la ciudad' funciona de forma natural en español y refleja la meta del movimiento implícita en el infinitivo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce una comparación directa. 'Como' es la equivalencia más natural y fiel en español.
- source_word: יִתְגַּנֵּב
  english_pob_choice: steal away / slip away
  chosen_spanish: se meten furtivamente
  alternatives_spanish:
  - se escapan a escondidas
  - se deslizan furtivamente
  - se retiran a escondidas
  lexicon: HALOT
  rationale: La repetición del verbo pide conservar la misma idea básica en la comparación. 'Se meten furtivamente' mantiene el paralelismo con el primer miembro y preserva el valor semántico de movimiento sigiloso.
- source_word: הַנִּכְלָמִים
  english_pob_choice: who are ashamed
  chosen_spanish: los que están avergonzados
  alternatives_spanish:
  - los avergonzados
  - los humillados
  - los que han quedado avergonzados
  lexicon: HALOT
  rationale: El participio niphal expresa estado de vergüenza o humillación. 'Los que están avergonzados' hace explícito el estado, de modo natural en español, sin endurecerlo como un mero rótulo.
- source_word: בְּנוּסָם
  english_pob_choice: when they flee
  chosen_spanish: cuando huyen
  alternatives_spanish:
  - al huir
  - cuando escapaban
  - al escaparse
  lexicon: HALOT
  rationale: La construcción con preposición e infinitivo expresa circunstancia temporal. 'Cuando huyen' comunica bien la situación general del símil en español.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - en guerra
  - en el combate
  lexicon: HALOT
  rationale: '''En la batalla'' es una forma natural y precisa en español para el marco militar de la comparación.'
translation_notes:
  revision_awareness: 'Se ajustó el marcador de nota al texto español para corregir la validación previa: ahora [a] aparece exactamente junto a la expresión que requiere aclaración lexical. La redacción sigue de cerca el paralelismo del hebreo y la decisión revisada del POB inglés de mantener el mismo campo semántico de movimiento furtivo en ambos miembros.'
  spanish_consistency_notes:
  - Se mantuvo 'furtivamente' en ambos miembros del símil para reflejar la repetición del verbo hebreo.
  - Se eligió 'el pueblo' para conservar el término amplio del hebreo, aunque el contexto sea militar.
  - La comparación queda fluida en español sin añadir elementos no sugeridos por el texto fuente.
  - La nota [a] está anclada al verbo principal para explicar la posible lectura alternativa de 'robó' o 'robo' que el hebreo no exige.
