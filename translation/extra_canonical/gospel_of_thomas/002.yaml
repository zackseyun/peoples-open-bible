translation:
  text: Jesus said[a], "Let the one who seeks not stop seeking until he finds; and
    when he finds, he will be disturbed; and when he is disturbed, he will marvel[e][d][c][b];
    and he will reign over the All."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek fragment (POxy 654) has ‘he will be astounded … and having reigned,
      he will rest,’ whereas the Coptic reads ‘he will be disturbed; … he will marvel’
      and ends without ‘rest.’
    reason: textual_variant
  - marker: b
    text: ϣⲧⲟⲣⲧⲣ can also be rendered ‘be troubled’ or ‘be alarmed’; here kept distinct
      from the next verb ‘marvel/be amazed’ (ⲣϣⲡⲏⲣⲉ).
    reason: lexical_alternative
  - marker: c
    text: ‘the All’ is a Thomasine idiom for the totality of things/the cosmos, not
      merely ‘many things.’
    reason: cultural_note
  - marker: d
    text: Or 'Do not let the one who seeks stop seeking'.
    reason: previous_rendering
  - marker: e
    text: Or 'when he has been disturbed'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙⲡⲣⲧⲣⲉ…ⲗⲟ
  chosen: do not let … stop/cease
  alternatives:
  - do not allow … grow weary
  lexicon: Layton (Grammar) for ⲙⲡⲣⲧⲣⲉ jussive; Crum s.v. ⲗⲟ for cease
  rationale: ⲙⲡⲣⲧⲣⲉ marks a negative jussive ‘do not let’; ⲗⲟ in this context means
    ‘cease/stop’ rather than ‘grow weary,’ fitting the sequence of continued seeking.
- source_word: ⲡⲉⲧⲉⲣⲉϣⲓⲛⲉ
  chosen: the one who seeks
  alternatives:
  - the seeker
  - the one who is seeking
  lexicon: Layton (Grammar) on the ⲡⲉⲧⲉⲣⲉ- participial relative
  rationale: Articular participle functioning substantively; concise ‘the one who
    seeks’ preserves Thomasine terseness.
- source_word: ⲉⲣⲉ ⲛⲧⲟϥ ϣⲓⲛⲉ
  chosen: keep seeking
  alternatives:
  - be seeking
  - to seek
  lexicon: Layton (Grammar) on ⲉⲣⲉ + infinitive purpose/result
  rationale: Here expresses continued activity; ‘keep seeking’ communicates ongoing
    aspect without paraphrase.
- source_word: ϣⲁⲛⲧⲉ ⲛⲧⲟϥ ϭⲓⲛⲉ
  chosen: until he finds
  alternatives:
  - until such time as he finds
  lexicon: Lambdin (Intro to Sahidic) on ϣⲁⲛⲧⲉ temporal ‘until’
  rationale: Standard temporal clause with ‘until’ suits the construction.
- source_word: ϩⲟⲧⲁⲛ ⲉⲣϣⲁⲛ_ⲛⲧⲟϥ ϭⲓⲛⲉ
  chosen: and when he finds
  alternatives:
  - and whenever he should find
  - and once he has found
  lexicon: Layton (Grammar) on ϩⲟⲧⲁⲛ + prospective ⲉⲣϣⲁⲛ
  rationale: Temporal clause indicating the eventual event; English ‘when’ is idiomatic
    and sufficiently precise.
- source_word: ϣⲧⲟⲣⲧⲣ
  chosen: be disturbed
  alternatives:
  - be troubled
  - be alarmed
  lexicon: Crum s.v. ϣⲧⲟⲣⲧⲣ ‘be disturbed, troubled’
  rationale: Semantic field is disturbance/unsettling; distinguishes this step from
    the next verb ‘marvel/ be amazed.’
- source_word: ⲣϣⲡⲏⲣⲉ
  chosen: marvel
  alternatives:
  - be amazed
  - be astonished
  lexicon: Crum s.v. ⲣϣⲡⲏⲣⲉ ‘be astonished, wonder’
  rationale: ‘Marvel’ is concise and keeps the riddle-like escalation; ‘be amazed’
    is a near-synonym.
- source_word: ⲣ̄ⲣ̄ⲣ̄ⲟ
  chosen: reign
  alternatives:
  - be king
  - rule
  lexicon: Crum s.v. ⲣⲣⲟ ‘to be king, reign’
  rationale: ‘Reign’ best captures verbal sense; not merely ‘rule’ but taking kingship
    over something.
- source_word: ⲉϫⲛ ⲡⲧⲏⲣϥ
  chosen: over the All
  alternatives:
  - over the whole
  - over everything
  lexicon: Crum s.v. ⲧⲏⲣⲉ ‘all’ (as collective ‘the All’)
  rationale: Thomas uses ‘the All’ as a technical cosmological totality; capitalizing
    ‘All’ signals the idiom.
textual_note: The Coptic text is continuous in NHC II, 32 for this saying with no
  marked lacunae in Dilley’s edition. Orthography shows the typical periphrastic future
  with ⲛⲁ + r- (e.g., ⲛⲧⲟϥⲛⲁ r-ϣⲡⲏⲣⲉ, ⲛⲧⲟϥⲛⲁ r-rro). The verb ⲣ̄ⲣ̄ⲣ̄ⲟ is written with
  geminated ⲣ’s (ⲣ̄ⲣ̄ⲣ̄ⲟ), an orthographic emphasis for the verb ‘reign/be king’ rather
  than a different lexeme. The temporal construction ⲩⲟⲧⲁⲛ/ϩⲟⲧⲁⲛ + ⲉⲣϣⲁⲛ_ … marks
  an eventual time (‘when it comes to pass that …’), a nuance reflected simply as
  ‘when’ in English. Dialectally, the saying is Sahidic with expected Lycopolitan-flavored
  periphrastic forms; no dialectal features here alter meaning. Notably, the Coptic
  witness ends with ‘he will reign over the All’ and does not include a subsequent
  ‘he will rest’ clause.
