- from: 'Y de ellos se tomará una maldición para todos los desterrados de Judá que están en Babilonia[a], diciendo: «Que Yahvé te haga como Sedequías y como Acab, a quienes el rey de Babilonia quemó en el fuego».'
  to: 'Y de ellos se tomará una maldición entre todos los exiliados de Judá que están en Babilonia[a], diciendo: «Que Yahvé te haga como Sedequías y como Acab, a quienes el rey de Babilonia asó en el fuego».'
  rationale: Se ajusta la referencia comunitaria de לְכָל גָּלוּת a «entre todos los exiliados» para reflejar mejor el uso de la maldición como fórmula adoptada dentro del exilio; se reemplaza «desterrados» por «exiliados» por mayor precisión contextual; y se corrige la nota al pie para que preserve una alternativa real y use español natural. Se adopta «asó» en el texto principal para reflejar la decisión lexical auditada de mantener la viveza de קָלָם, dejando «los quemó en el fuego» como alternativa en nota.
