lexical_decisions:
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - si es que
  lexicon: HALOT
  rationale: La cláusula condicional hebrea se conserva con 'si', que mantiene el tono de juramento/autoacusación sin añadir énfasis interpretativo.
- source_word: כִּסִּיתִי
  english_pob_choice: I have covered
  chosen_spanish: yo hubiera cubierto
  alternatives_spanish:
  - yo cubrí
  - yo habría cubierto
  - yo hubiera ocultado
  lexicon: HALOT
  rationale: En español, el pluscuamperfecto de subjuntivo reproduce bien la condición irreal o hipotética dentro de la acusación retórica de Job, conservando la metáfora de 'cubrir'.
- source_word: כְאָדָם
  english_pob_choice: like Adam
  chosen_spanish: como Adam
  alternatives_spanish:
  - como un hombre
  - como la humanidad
  - como Adán
  lexicon: HALOT
  rationale: El audit trail revisado favorece el nombre propio 'Adam' para reflejar la lectura probable y la posible alusión. Se evita forzar 'un hombre' cuando el texto y la revisión documentan la opción onomástica.
- source_word: פְּשָׁעַי
  english_pob_choice: my transgressions
  chosen_spanish: mis rebeliones
  alternatives_spanish:
  - mis transgresiones
  - mis ofensas
  - mis pecados
  lexicon: HALOT
  rationale: '''Pesha'' carga una fuerza de deslealtad o rebelión, y ''rebeliones'' preserva mejor esa tensión que un término más general como ''pecados''; ''transgresiones'' queda como alternativa válida pero algo menos enérgica.'
- source_word: לִטְמוֹן
  english_pob_choice: by hiding
  chosen_spanish: escondiendo
  alternatives_spanish:
  - ocultando
  - para esconder
  - al esconder
  lexicon: HALOT
  rationale: El infinitivo constructo expresa medio o modo; 'escondiendo' funciona de manera natural en español y conserva la relación con el acto de cubrir/ocultar.
- source_word: בְּחֻבִּי
  english_pob_choice: in my bosom
  chosen_spanish: en mi seno
  alternatives_spanish:
  - en mi pecho
  - en mi regazo
  - dentro de mí
  lexicon: HALOT
  rationale: '''Seno'' preserva la imagen concreta del lugar interior y oculto que el hebreo sugiere, con una dignidad más natural en español bíblico contemporáneo que ''bosom'' traducido literalmente.'
- source_word: עֲוֺנִי
  english_pob_choice: my iniquity
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - mi culpa
  - mi maldad
  - mi pecado
  lexicon: HALOT
  rationale: Se mantiene 'iniquidad' para conservar el peso moral y la diferencia semántica con 'rebeliones' en la primera cola del verso.
theological_decisions:
- issue: Lectura de כְאָדָם como nombre propio o sustantivo común
  english_pob_reading: The English POB main text was revised to 'like Adam' while preserving the alternative common-noun reading in a footnote.
  chosen_spanish_reading: como Adam
  alternative_spanish_readings:
  - como un hombre
  - como la humanidad
  - como Adán
  rationale: La revisión más reciente inclina la lectura hacia el nombre propio y la versión española sigue esa decisión para no borrar la posible alusión a Adam. Se conserva una nota para la lectura alternativa del sustantivo común, porque el hebreo admite ambas posibilidades.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy #3 y #4'
- issue: Valor moral de פֶּשַׁע en contexto de autojustificación negada
  english_pob_reading: my transgressions
  chosen_spanish_reading: mis rebeliones
  alternative_spanish_readings:
  - mis transgresiones
  - mis ofensas
  - mis pecados
  rationale: En el contexto de Job 31, el término señala más que una falta genérica; 'rebeliones' comunica el sentido de ruptura leal/moral que el hebreo puede tener, sin convertirlo en una categoría distinta.
  doctrine_reference: HALOT s.v. פֶּשַׁע; uso contextual en Job 31
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'like a man' a 'like Adam' en la revisión más reciente; la redacción española sigue esa actualización y conserva la alternativa del sustantivo común en nota. También se ajustó 'bosom' a una equivalencia española natural ('seno') sin perder la imagen concreta del lugar oculto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este verso no lo contiene.
  - '''Adam'' se conserva como nombre propio en la línea principal para reflejar la decisión revisada del POB inglés.'
  - '''Rebeliones'' e ''iniquidad'' distinguen las dos palabras hebreas de manera consistente: פֶּשַׁע y עָוֹן.'
  - La sintaxis condicional e hipotética busca sonar bíblica pero natural en español contemporáneo, evitando un calco demasiado duro del hebreo.
