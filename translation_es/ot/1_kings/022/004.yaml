translation:
  language: es
  text: 'Y él dijo a Josafat[a]: «¿Irás conmigo a la guerra en Ramot de Galaad?». Y Josafat dijo al rey de Israel: «Yo como tú; mi pueblo como tu pueblo, mis caballos como tus caballos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi pueblo es como tu pueblo, y mis caballos como tus caballos». El hebreo es una expresión breve, sin verbo, de solidaridad y alianza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/תֵלֵךְ
  english_pob_choice: Will you go
  chosen_spanish: ¿Irás
  alternatives_spanish:
  - ¿Quieres ir
  - ¿Irás tú
  lexicon: HALOT
  rationale: La forma interrogativa con imperfecto 2ms pide una pregunta directa en español. «Irás» conserva el valor de movimiento sin añadir matices ajenos.
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  - junto a mí
  lexicon: HALOT
  rationale: Equivale de modo natural al sufijo de primera persona singular con sentido de acompañamiento.
- source_word: לַ/מִּלְחָמָה
  english_pob_choice: to battle
  chosen_spanish: a la guerra
  alternatives_spanish:
  - a la batalla
  - para la guerra
  lexicon: HALOT
  rationale: En español, con el verbo de movimiento la expresión más natural y fiel es «a la guerra». Mantiene el sentido militar sin forzar un calco.
- source_word: רָמֹ֣ת גִּלְעָ֑ד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot de Galaad
  alternatives_spanish:
  - Ramot-galaad
  - Ramot de Gilead
  lexicon: HALOT
  rationale: Se translitera el topónimo de forma reconocible para lectores en español. «De Galaad» preserva la composición del nombre sin adaptar innecesariamente el elemento propio.
- source_word: מֶ֣לֶךְ יִשְׂרָאֵ֔ל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el rey de Israel
  - Israel, su rey
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera formal y transparente, manteniendo el referente definido del contexto.
- source_word: כָּמ֧וֹ/נִי כָמ֛וֹ/ךָ
  english_pob_choice: I am as you are
  chosen_spanish: Como yo, como tú
  alternatives_spanish:
  - Yo como tú
  - Yo soy como tú
  lexicon: HALOT
  rationale: El hebreo es una expresión elíptica y simétrica. En español, la formulación nominal breve conserva mejor la solidaridad y el paralelismo que una expansión verbal innecesaria.
- source_word: כְּ/עַמִּ֥/י כְ/עַמֶּ֖/ךָ
  english_pob_choice: my people as your people
  chosen_spanish: mi pueblo como tu pueblo
  alternatives_spanish:
  - mi pueblo es como tu pueblo
  - mi gente como tu gente
  lexicon: HALOT
  rationale: «Pueblo» corresponde bien a עַם y mantiene la referencia colectiva y política del pacto/alineación entre reyes.
- source_word: כְּ/סוּסַ֥/י כְּ/סוּסֶֽי/ךָ
  english_pob_choice: my horses as your horses
  chosen_spanish: mis caballos como tus caballos
  alternatives_spanish:
  - mis caballos son como tus caballos
  - mi caballería como tu caballería
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «caballos», como en el hebreo, en vez de interpretar como «caballería». Eso preserva la imaginería de recursos militares compartidos.
theological_decisions:
- issue: Expresión de solidaridad y alianza en una estructura verbalmente elíptica
  english_pob_reading: The Hebrew is a terse verbless expression of solidarity and alliance.
  chosen_spanish_reading: Como yo, como tú; mi pueblo como tu pueblo, mis caballos como tus caballos
  alternative_spanish_readings:
  - Yo soy como tú; mi pueblo es como tu pueblo, mis caballos son como tus caballos
  - Yo, como tú; mi pueblo como el tuyo, mis caballos como los tuyos
  rationale: La frase española conserva la brevedad y el paralelismo del hebreo sin convertirlo en una explicación. Así se mantiene el tono de pacto y cooperación militar implícito en el contexto narrativo.
  doctrine_reference: Ninguna doctrina específica; decisión de tono y estructura retórica del texto.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español donde corresponde.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando corresponda; aquí no aparece el nombre divino.
  - «Israel» y «Galaad» se dejan como topónimos tradicionales inteligibles en español.
  - Se preserva la concisión del hebreo mediante una estructura breve y paralela, evitando añadir verbos copulativos salvo en la nota alternativa.
