translation:
  language: es
  text: 'Porque hay esperanza para un árbol: si es cortado, volverá a brotar[a], y su renuevo[b] no cesará.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volverá a renovarse». El verbo hebreo puede expresar renovación; en este contexto arbóreo, se traduce concretamente como nuevo brote.
    reason: lexical_alternative
  - marker: b
    text: O «su brote tierno» o «su brote».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce una explicación causal o inferencial de la afirmación anterior. «Porque» conserva bien la relación explicativa y suena natural en español bíblico actual.
- source_word: יֵשׁ
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  - hay de
  lexicon: HALOT
  rationale: La construcción existencial hebrea se expresa de forma directa con «hay», que mantiene la sencillez proverbial del texto.
- source_word: לָעֵץ
  english_pob_choice: for a tree
  chosen_spanish: para un árbol
  alternatives_spanish:
  - para el árbol
  - para un árbol cualquiera
  lexicon: HALOT
  rationale: El sustantivo es singular genérico; «un árbol» preserva el valor proverbial y evita volverlo un referente específico.
- source_word: תִּקְוָה
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  - posibilidad
  lexicon: HALOT
  rationale: «Esperanza» comunica de manera natural la posibilidad de vida renovada después de ser cortado, sin perder el sentido básico del término.
- source_word: אִם יִכָּרֵת
  english_pob_choice: if it is cut down
  chosen_spanish: si es cortado
  alternatives_spanish:
  - aunque sea cortado
  - cuando es cortado
  lexicon: HALOT
  rationale: Se mantiene la forma condicional del hebreo. «Es cortado» conserva el valor pasivo sin añadir más interpretación de la necesaria.
- source_word: וְעוֹד יַחֲלִיף
  english_pob_choice: it will sprout again
  chosen_spanish: volverá a brotar
  alternatives_spanish:
  - brotará de nuevo
  - se renovará
  lexicon: HALOT
  rationale: El verbo en contexto es botánico y expresa crecimiento renovado; «volverá a brotar» transmite la imagen con naturalidad y preserva la idea de reaparición de vida.
- source_word: וְיֹנַקְתּוֹ
  english_pob_choice: its shoot
  chosen_spanish: su renuevo
  alternatives_spanish:
  - su brote
  - su vástago
  - su retoño
  lexicon: HALOT
  rationale: El sustantivo designa el brote tierno que nace de nuevo. «Renuevo» recoge bien la imagen vegetal y la continuidad de la vida que emerge del tronco.
- source_word: לֹא תֶחְדָּל
  english_pob_choice: will not cease
  chosen_spanish: no dejará de surgir
  alternatives_spanish:
  - no cesará
  - no dejará de brotar
  lexicon: HALOT
  rationale: La frase expresa continuidad de crecimiento. «No dejará de surgir» conserva el aspecto durativo y el paralelismo con la imagen del brote, evitando una literalidad áspera en español.
translation_notes:
  revision_awareness: 'Se siguió de cerca el paquete fuente hebreo y la auditoría inglesa: se mantuvo la relación causal de כִּי, el condicional de אִם, y la imagen botánica de יַחֲלִיף / יֹנַקְתּוֹ. La formulación española se ajustó para sonar natural sin perder el paralelismo poético ni introducir interpretaciones no sustentadas. No hubo revisiones previas aplicadas.'
  spanish_consistency_notes:
  - Se usó «árbol» en singular genérico para reflejar el sentido proverbial.
  - Se prefirió «brotar» y «renuevo» para conservar la metáfora vegetal del texto.
  - El verso se mantuvo breve y con cadencia poética, acorde al hebreo.
  - Se evitaron términos eclesiásticos o doctrinales ajenos al pasaje.
