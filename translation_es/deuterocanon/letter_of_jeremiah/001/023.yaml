    text: O «corrosión»; ἰόν puede referirse a la capa que empaña o corroe el metal.
    reason: lexical_alternative
  revision_rationale: Se revisa «tizne» a «empañamiento» para reflejar con mayor precisión ἰόν en contexto de oro metalizado, en línea con la auditoría inglesa que prefirió «tarnish». Se cambia «se adornan» a «son adornados» para evitar una lectura reflexiva impropia y reflejar mejor que las imágenes reciben el adorno. Se normaliza además la colocación del marcador de nota.
