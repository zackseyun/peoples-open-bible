translation:
  language: es
  text: y Hilen con sus pastizales[a], Debir con sus pastizales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma 'Hilen' sigue el hebreo de Crónicas; el paralelo en Josué 21:15 tiene 'Holón'.
    reason: alternative_reading
lexical_decisions:
- source_word: חִילֵז
  english_pob_choice: Hilen
  chosen_spanish: Hilen
  alternatives_spanish:
  - Hilez
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera la forma de Crónicas de manera directa. Se conserva la forma que refleja la vocalización hebrea del pasaje, en lugar de sustituirla por la forma paralela de Josué.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras comunes
  - sus tierras circundantes
  lexicon: HALOT
  rationale: El término designa el terreno abierto asociado a la ciudad levítica. En español, 'pastizales' comunica de forma natural la función del área como espacio abierto/ganadero, sin perder la idea de extensión anexada a la ciudad.
- source_word: דְּבִיר
  english_pob_choice: Debir
  chosen_spanish: Debir
  lexicon: HALOT
  rationale: Nombre propio de lugar; se mantiene la transliteración estándar en español.
- source_word: וְ/אֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - con
  lexicon: HALOT
  rationale: En una lista de asentamientos, la secuencia con וְ + אֶת se vierte naturalmente con 'y' en español para coordinar los elementos sin forzar el marcador de objeto directo.
- source_word: אֶת
  english_pob_choice: —
  chosen_spanish: —
  lexicon: HALOT
  rationale: El marcador de objeto directo no tiene equivalente léxico directo en español; su función sintáctica queda absorbida por la estructura coordinada de la lista.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en su última revisión; se conservó la decisión principal de transliterar el topónimo de Crónicas y de verter מִגְרָשֶׁיהָ con un término español natural que conserve la idea de terreno abierto asociado a la ciudad.
  spanish_consistency_notes:
  - Se mantuvo el estilo de lista breve y paratáctica propio del hebreo.
  - '''sus pastizales'' se usa aquí en plural para reflejar el plural hebreo del sustantivo.'
  - Se conserva la transliteración de los nombres propios sin adaptar al uso litúrgico tradicional.
