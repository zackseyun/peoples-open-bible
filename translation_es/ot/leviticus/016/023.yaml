translation:
  language: es
  text: Entonces Aarón entrará en la tienda de reunión y se quitará las vestiduras de lino que se puso cuando entró en el lugar santo[a], y las dejará allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santuario»; algunos entienden de manera más específica «el Lugar Santísimo» a partir del contexto más amplio del Día de la Expiación.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: Then ... shall come
  chosen_spanish: Entonces ... entrará
  alternatives_spanish:
  - Y ... vendrá
  - Entonces ... irá
  lexicon: HALOT
  rationale: El hebreo וּבָא en una instrucción ritual expresa secuencia futura; en español, «entonces» + futuro mantiene ese valor procedimental con naturalidad. «Entrará» conserva el movimiento de בוא sin volverlo más técnico de lo necesario.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: «אֹהֶל מוֹעֵד» designa la estructura cultual. «Tienda de reunión» refleja el sustantivo + genitivo de forma directa y mantiene transparencia léxica sin imponer una terminología eclesiástica ajena al hebreo.
- source_word: וּפָשַׁט
  english_pob_choice: take off
  chosen_spanish: se quitará
  alternatives_spanish:
  - se despojará de
  - se sacará
  lexicon: HALOT
  rationale: פּשט aplicado a vestiduras se vierte bien con «quitarse» en español moderno. Evita la dureza de «despojarse» y expresa con claridad la acción ritual de quitarse la ropa.
- source_word: בִּגְדֵי הַבָּד
  english_pob_choice: the linen garments
  chosen_spanish: las vestiduras de lino
  alternatives_spanish:
  - las prendas de lino
  - las ropas de lino
  lexicon: HALOT
  rationale: בִּגְדֵי conserva el campo de «vestiduras/ropa»; «vestiduras» es suficientemente digno para el registro litúrgico. «De lino» preserva la especificación material importante para el rito.
- source_word: אֲשֶׁר לָבַשׁ
  english_pob_choice: that he put on
  chosen_spanish: que se puso
  alternatives_spanish:
  - que llevaba puestas
  - que había puesto sobre sí
  lexicon: HALOT
  rationale: לָבַשׁ se refiere a ponerse una prenda. «Que se puso» sigue de cerca la acción verbal y suena natural en español, sin introducir una lectura aspectual más fuerte de la que exige el hebreo.
- source_word: בְּבֹאוֹ
  english_pob_choice: when he went
  chosen_spanish: cuando entró
  alternatives_spanish:
  - al entrar
  - cuando fue
  lexicon: HALOT
  rationale: El infinitivo constructo con preposición marca circunstancia temporal. «Cuando entró» conserva la idea de acceso al recinto y armoniza con «lugar santo» en la cláusula siguiente.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the holy place
  chosen_spanish: el lugar santo
  alternatives_spanish:
  - el santuario
  - el lugar sagrado
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el santo/lugar santo», sin desarrollar aquí la expresión más específica para el Lugar Santísimo. «Lugar santo» mantiene la ambigüedad documentada por el auditable trail y evita interpretar de más en el texto principal.
- source_word: וְהִנִּיחָם שָׁם
  english_pob_choice: and he shall leave them there
  chosen_spanish: y las dejará allí
  alternatives_spanish:
  - y las pondrá allí
  - y las depositará allí
  lexicon: HALOT
  rationale: הִנִּיחַ con objeto pronominal expresa colocar/dejar. «Dejarlas allí» es la equivalencia más natural y refleja la instrucción sin sobreespecificar el gesto.
theological_decisions:
- issue: Referencia de הַקֹּדֶשׁ
  english_pob_reading: Render generically as 'the holy place' rather than interpretively as 'the Most Holy Place.'
  chosen_spanish_reading: Traducir de manera genérica como «el lugar santo», no como «el Lugar Santísimo».
  alternative_spanish_readings:
  - el santuario
  - el Lugar Santísimo
  rationale: El hebreo de este versículo usa solamente הַקֹּדֶשׁ. Aunque el contexto del Día de la Expiación puede llevar a pensar en el recinto más interno, el texto de la línea no lo nombra así; por eso la traducción principal conserva la formulación más abierta y no adelanta una precisión arquitectónica no explicitada en la frase.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés quedó en acuerdo alto con el control cruzado, así que el borrador español sigue de cerca las decisiones auditadas sin añadir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Tienda de reunión» conserva la terminología cultual estándar del proyecto sin sustituirla por una paráfrasis.
  - «Vestiduras de lino» respeta el valor ritual y material de בִּגְדֵי הַבָּד.
  - Se preserva la ambigüedad de הַקֹּדֶשׁ mediante la nota, en consonancia con el tratamiento auditado en inglés.
