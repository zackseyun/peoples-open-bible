  to: Meonotai fue padre de Ofrá, y Seraías fue padre de Joab, padre de Ge-harasim[a][b], porque ellos eran artesanos.
  rationale: Se restituye la decisión léxica documentada de mantener גֵּיא חֲרָשִׁים como topónimo en el texto principal y trasladar su significado a una nota. También se corrigen los anclajes y el contenido de las notas para que coincidan con el rastro auditado. Se mantiene «fue padre de» por ser aceptable en español y suficientemente fiel al enfoque del POB, aunque «engendró» también sería viable.
