review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: causal inicial («Porque»), expulsión de naciones, ampliación territorial, protección de la tierra durante las peregrinaciones, y el nombre divino «Yahvé». Sin embargo, no sigue de manera suficientemente fiel dos decisiones auditadas de la POB inglesa: (1) לֵרָאוֹת אֶת־פְּנֵי se tradujo en inglés por su sentido idiomático principal («appear before»), no por la literalidad en el texto principal; y (2) אִישׁ fue retenido como masculino representativo («no man»), con nota explicativa, mientras que el español lo neutraliza como «nadie» sin nota equivalente. Además, la nota [a] está mal anclada: comenta «ver el rostro de Yahvé tu Dios», pero aparece en «tu tierra».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene varios puntos mejorables. «Tu límite» suena menos natural que «tu frontera» en un contexto territorial. «Para ver el rostro de Yahvé» es comprensible, pero menos natural y menos fiel a la decisión semántica principal del proyecto para este modismo cultual. La distribución de notas también es confusa: [a] no está en el lugar correspondiente, y falta una nota para el valor representativo de «ningún hombre» si se conserva la forma más alineada con el audit trail.'
  glossary_alignment: Alinea bien «Yahvé», «tu Dios», «codiciará» y «tu tierra». No hay conflicto con la terminología doctrinal principal. Pero para mayor coherencia con el audit trail y la política de género preciso, conviene usar «ningún hombre» para אִישׁ con nota aclaratoria, y en el texto principal traducir el modismo לֵרָאוֹת אֶת־פְּנֵי como «presentarte ante» o equivalente, dejando la literalidad hebrea en nota.
  issues:
  - severity: high
    issue: El modismo לֵרָאוֹת אֶת־פְּנֵי está vertido literalmente en el texto principal («para ver el rostro») en vez de por su sentido idiomático principal.
    rationale: El audit trail inglés escogió explícitamente «to appear before» como traducción principal, con la literalidad en nota. En español, mantener la literalidad en el cuerpo del texto altera la decisión semántica principal y produce una expresión menos natural en este contexto cultual.
  - severity: high
    issue: La nota [a] está anclada en «tu tierra[a]», pero su contenido explica «ver el rostro de Yahvé tu Dios».
    rationale: Esto incumple la disciplina requerida de anclar cada nota exactamente en la palabra o frase relevante del texto español.
  - severity: medium
    issue: אִישׁ se neutraliza como «nadie» sin reflejar la decisión auditada de conservar el masculino representativo.
    rationale: La POB inglesa retuvo «no man» por política de género preciso y añadió nota cultural. En español, «ningún hombre» con nota explica mejor la forma fuente y la decisión editorial.
  - severity: low
    issue: «Tu límite» suena menos idiomático que «tu frontera» para גְּבוּל en este contexto.
    rationale: «Límite» no es incorrecto, pero «frontera» o «territorio» resultan más naturales para una promesa de expansión territorial. «Ensancharé tu frontera» conserva bien la imagen concreta.
  revised_spanish_text: Porque yo expulsaré naciones de delante de ti y ensancharé tu frontera, y ningún hombre[a] codiciará tu tierra cuando subas para presentarte ante[b] Yahvé tu Dios tres veces en el año[c].
  revised_footnotes:
