revisions:
- from: Porque aquellos hombres eran dignos de ser privados de la luz e internados en la oscuridad[a], ellos que habían mantenido encerrados a tus hijos, por quienes iba a ser dada al siglo la luz imperecedera de la ley.
  to: Porque aquellos hombres eran dignos de ser privados de la luz y encarcelados en la oscuridad, los que habían mantenido encerrados a tus hijos, por quienes iba a ser dada al siglo[a] la luz imperecedera de la ley.
  rationale: Se reemplaza «internados» por «encarcelados» para reflejar la fuerza carcelaria de φυλακισθῆναι; se mejora la fluidez con «los que»; y se mueve la nota al sintagma «al siglo», que es el elemento realmente explicado por la nota del inglés POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:13:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: juicio retributivo, privación de luz, encierro, referencia personal a «tus hijos», y la futura donación de «la luz imperecedera de la ley». También preserva correctamente la ambigüedad de τῷ αἰῶνι mediante nota. Sin embargo, «internados en la oscuridad[a]» no refleja con suficiente fuerza carcelaria φυλακισθῆναι σκότει, y la nota [a] está anclada en «oscuridad» cuando en realidad explica «al siglo».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos puntos mejorables: «internados» suena médico/institucional y debilita la imagen de encarcelamiento; y «ellos que» resulta menos natural que «los que». El resto es legible y fiel. «Al siglo» es formal y algo extraño en español moderno, pero aquí es defendible por fidelidad y queda aclarado con la nota.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Tus hijos» es aceptable en español como equivalente colectivo de «your sons», aunque pierde la explicitud masculina del griego; no alcanza para rechazo. «La luz imperecedera de la ley» y «al siglo» siguen bien las decisiones auditadas.
  issues:
  - severity: medium
    issue: «internados en la oscuridad» debilita φυλακισθῆναι σκότει
    rationale: El verbo griego tiene fuerza carcelaria clara («ser encarcelados / aprisionados»). «Internados» en español suele evocar hospitalización o institucionalización, no prisión retributiva.
  - severity: medium
    issue: La nota [a] está colocada en el lugar equivocado
    rationale: La nota explica τῷ αἰῶνι («al siglo»), no «oscuridad». El marcador debe ir junto a «al siglo» para respetar la relación texto-nota.
  - severity: low
    issue: «ellos que habían mantenido...» suena menos natural
    rationale: En español bíblico fluido, «los que habían mantenido...» o «ellos, que habían...» lee mejor sin alterar el sentido.
  revised_spanish_text: Porque aquellos hombres eran dignos de ser privados de la luz y encarcelados en la oscuridad, los que habían mantenido encerrados a tus hijos, por quienes iba a ser dada al siglo[a] la luz imperecedera de la ley.
  revised_footnotes:
  - marker: a
    text: O «al mundo» o «para siempre». El griego dice «al siglo» (singular), que puede tener fuerza cósmica o temporal.
    reason: alternative_reading
  revision_rationale: Se reemplaza «internados» por «encarcelados» para reflejar la fuerza carcelaria de φυλακισθῆναι; se mejora la fluidez con «los que»; y se mueve la nota al sintagma «al siglo», que es el elemento realmente explicado por la nota del inglés POB.
