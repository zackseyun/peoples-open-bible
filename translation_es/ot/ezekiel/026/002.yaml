translation:
  language: es
  text: 'Hijo de hombre[a], por cuanto Tiro dijo acerca de Jerusalén: «¡Ja! La puerta de los pueblos está rota; se ha vuelto hacia mí. Quedaré llena[b], ahora que ella ha quedado en ruinas»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el ser humano», «el mortal». La fórmula hebrea es el vocativo habitual dirigido a Ezequiel.
    reason: lexical_alternative
  - marker: b
    text: Es decir, Tiro espera beneficiarse por la caída de Jerusalén, sea por comercio, tráfico o acceso redirigido hacia ella.
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva el vocativo idiomático del hebreo y mantiene la fórmula profética recurrente en Ezequiel. ‘Hijo de hombre’ es la forma más reconocible y fiel; las alternativas interpretan demasiado el matiz.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: por cuanto
  alternatives_spanish:
  - porque
  - puesto que
  lexicon: HALOT
  rationale: La conjunción compuesta introduce la razón del oráculo. ‘Por cuanto’ comunica bien la causalidad en español bíblico sin sonar arcaico en exceso.
- source_word: צֹּר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  - la ciudad de Tiro
  lexicon: HALOT
  rationale: Se usa el nombre usual de la ciudad en español bíblico. No hay razón para transliterar en esta versículo.
- source_word: עַל יְרוּשָׁלִַם
  english_pob_choice: concerning Jerusalem
  chosen_spanish: acerca de Jerusalén
  alternatives_spanish:
  - contra Jerusalén
  - sobre Jerusalén
  lexicon: HALOT
  rationale: El hebreo עַל con verbo de hablar puede ser ‘acerca de’ o ‘contra’. Aquí la hostilidad aparece en el contenido mismo, así que ‘acerca de’ conserva la relación de habla sin forzar una preposición más polémica que el hebreo inmediato.
- source_word: הֶאָח
  english_pob_choice: Aha!
  chosen_spanish: ¡Ja!
  alternatives_spanish:
  - ¡Aha!
  - ¡Ea!
  lexicon: HALOT
  rationale: Es una interjección de burla y regocijo malévolo. ‘¡Ja!’ expresa de forma natural en español ese tono de gloating.
- source_word: נִשְׁבְּרָה
  english_pob_choice: is broken
  chosen_spanish: está rota
  alternatives_spanish:
  - ha sido rota
  - está quebrada
  lexicon: HALOT
  rationale: El nifal es pasivo/resultativo. ‘Está rota’ suena natural en español y conserva el estado derivado del derribo de la ciudad.
- source_word: דַּלְת֥וֹת הָעַמִּים
  english_pob_choice: the gateway of the peoples
  chosen_spanish: la puerta de los pueblos
  alternatives_spanish:
  - las puertas de los pueblos
  - la puerta de las naciones
  lexicon: HALOT
  rationale: Aunque el plural hebreo es literal ‘puertas’, la imagen funciona como un conjunto/entrada urbana. Se prefirió ‘puerta’ en singular para reflejar el valor colectivo y funcional del giro, dejando la metáfora abierta sin sobrerresolverla.
- source_word: נָסֵבָּה אֵלַי
  english_pob_choice: it has turned to me
  chosen_spanish: se ha vuelto hacia mí
  alternatives_spanish:
  - se ha dirigido a mí
  - ha girado hacia mí
  lexicon: HALOT
  rationale: El verbo expresa volverse o girar en dirección a alguien. En español, ‘se ha vuelto hacia mí’ conserva bien la imagen y el desplazamiento de la ventaja hacia Tiro.
- source_word: אִמָּלְאָה
  english_pob_choice: I will be filled
  chosen_spanish: Seré llenada
  alternatives_spanish:
  - Me llenaré
  - Seré llena
  lexicon: HALOT
  rationale: La primera persona expresa la expectativa de Tiro de quedar colmada. ‘Seré llenada’ mantiene el pasivo implícito y el valor metafórico de abundancia; se prefiere la forma femenina acorde con la ciudad personificada.
- source_word: הָחֳרָבָה
  english_pob_choice: she is laid waste
  chosen_spanish: ha quedado en ruinas
  alternatives_spanish:
  - está devastada
  - ha sido asolada
  lexicon: HALOT
  rationale: La forma femenina singular refiere a Jerusalén. ‘Ha quedado en ruinas’ transmite el resultado de la devastación de manera natural en español y conserva el aspecto resultativo del hebreo.
theological_decisions:
- issue: La imagen compacta de דַּלְת֥וֹת הָעַמִּים
  english_pob_reading: the gateway of the peoples
  chosen_spanish_reading: la puerta de los pueblos
  alternative_spanish_readings:
  - las puertas de los pueblos
  - la puerta de las naciones
  rationale: 'No es una cuestión doctrinal sino imaginal: el hebreo describe Jerusalén como un punto de acceso para muchos pueblos. ‘La puerta de los pueblos’ mantiene la metáfora sin convertirla en una explicación interpretativa excesiva.'
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave y excepciones documentadas)
- issue: El valor de la frase final ‘I will be filled’
  english_pob_reading: I will be filled
  chosen_spanish_reading: Seré llenada
  alternative_spanish_readings:
  - Me llenaré
  - Seré llena
  rationale: La frase sugiere que Tiro espera beneficiarse del colapso de Jerusalén. En español conviene preservar esa expectativa con una voz pasiva que no añada de más la idea comercial, aunque la nota inglesa lo explique.
  doctrine_reference: Translation philosophy §5 (mantener la imagen verbal sin sobrerinterpretarla)
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonántico-vocalizado de WLC y se corroboró la lectura con el audit trail inglés. No se introdujeron cambios de revisión; se conservó la tensión lexicográfica en דַּלְת֥וֹת הָעַמִּים como imagen compacta de entrada/puerta urbana, y se mantuvo el matiz resultativo de נִשְׁבְּרָה / הָחֳרָבָה.
  spanish_consistency_notes:
  - Se mantuvo ‘Tiro’ y ‘Jerusalén’ con la toponimia española usual.
  - ‘Hijo de hombre’ preserva el vocativo profético recurrente en Ezequiel.
  - Se evitó ‘SEÑOR’ u otras sustituciones porque no aparecen en este versículo.
  - La metáfora de plenitud se conservó sin explicitar en el texto principal el mecanismo económico, que queda para la nota.
  - Se usó ‘pueblos’ para seguir el valor colectivo de הָעַמִּים, sin imponer ‘naciones’ como única opción.
