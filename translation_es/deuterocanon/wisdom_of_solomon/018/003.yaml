translation:
  language: es
  text: En vez de estas cosas[a], proporcionaste una columna de fuego ardiente, como guía para un viaje desconocido y como un sol inofensivo para su honorable estancia en tierra extranjera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para su noble estancia en tierra extranjera». El griego φιλοτίμου ξενιτείας es difícil y puede enfatizar la dignidad de la vida de Israel fuera de su tierra más que un exilio en sentido estrictamente negativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθʼ ὧν
  english_pob_choice: Instead of these things
  chosen_spanish: En vez de estas cosas
  alternatives_spanish:
  - A cambio de estas cosas
  - En lugar de estas cosas
  lexicon: LSJ
  rationale: La construcción introduce contraste y recompensa. «En vez de» conserva bien ese valor adversativo/recompensatorio en español sin añadir matices no evidentes en el griego.
- source_word: πυριφλεγῆ στῦλον
  english_pob_choice: a pillar of blazing fire
  chosen_spanish: una columna de fuego ardiente
  alternatives_spanish:
  - una columna ígnea
  - una columna de fuego que ardía
  lexicon: LSJ
  rationale: «Columna» reproduce στῦλον y «de fuego ardiente» mantiene la imagen intensa del compuesto πυριφλεγῆ sin suavizarla en una simple referencia a fuego.
- source_word: ὁδηγὸν
  english_pob_choice: as a guide
  chosen_spanish: como guía
  alternatives_spanish:
  - como conductor
  - como quien guía
  lexicon: LSJ
  rationale: En aposición a «columna», el término expresa función. «Guía» es natural en español y conserva la idea de conducción en un viaje.
- source_word: ἀγνώστου ὁδοιπορίας
  english_pob_choice: for an unknown journey
  chosen_spanish: para un camino desconocido
  alternatives_spanish:
  - para una travesía desconocida
  - para un viaje por lugares desconocidos
  lexicon: LSJ
  rationale: La construcción genitiva describe una travesía no conocida. «Camino desconocido» comunica la idea con claridad y mantiene el valor de itinerario.
- source_word: ἥλιον
  english_pob_choice: sun
  chosen_spanish: sol
  alternatives_spanish:
  - luz
  - resplandor
  lexicon: LSJ
  rationale: El texto dice explícitamente «sol», no solo luz; mantenerlo preserva la metáfora concreta y el contraste con la guía nocturna.
- source_word: ἀβλαβῆ
  english_pob_choice: harmless
  chosen_spanish: inofensivo
  alternatives_spanish:
  - sin daño
  - seguro
  lexicon: LSJ
  rationale: El adjetivo expresa ausencia de daño. «Inofensivo» es un equivalente claro y moderno en español, compatible con el contraste implícito con el juicio sobre Egipto.
- source_word: φιλοτίμου ξενιτείας
  english_pob_choice: their honorable exile
  chosen_spanish: su honorable destierro
  alternatives_spanish:
  - su noble sojourn
  - su noble estancia en tierra extranjera
  - su exilio noble
  lexicon: LSJ
  rationale: «Ξενιτεία» puede ser residencia en tierra extraña o destierro; en este contexto histórico-salvífico, «destierro» transmite mejor la condición de desplazamiento. «Honorable» conserva el matiz positivo de φιλοτίμου sin convertirlo en una lectura meramente emocional.
- source_word: παρέσχες
  english_pob_choice: you provided
  chosen_spanish: diste
  alternatives_spanish:
  - proporcionaste
  - concediste
  lexicon: LSJ
  rationale: El aoristo de παρέχω indica brindar o suministrar. «Diste» es breve y reverente en dirección a Dios; mantiene la acción divina de provisión.
theological_decisions:
- issue: Imagen concreta de la guía divina en el éxodo
  english_pob_reading: Retain the concrete imagery of the pillar and sun rather than flattening into abstract 'light' language.
  chosen_spanish_reading: Mantener la columna de fuego y el sol, no reducirlo a «luz» genérica.
  alternative_spanish_readings:
  - Nos diste luz para guiarlos
  - Nos diste una guía luminosa
  rationale: La referencia retoma la tradición del desierto y su densidad intertextual. Conservar la imagen concreta preserva la textura teológica del pasaje.
  doctrine_reference: Translation philosophy §§1, 6
- issue: ξενιτεία como desplazamiento positivo
  english_pob_reading: Translate with 'exile' while preserving its positive modifier.
  chosen_spanish_reading: Traducir con «destierro» y mantener el calificativo «honorable».
  alternative_spanish_readings:
  - sojorno
  - estancia en tierra extranjera
  rationale: El término puede ser más amplio que exilio, pero el contexto de historia de salvación favorece una noción de destierro o extranjería; el adjetivo evita que el lector lo lea solo como castigo.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La versión española sigue la lectura revisada del audit trail inglés: «a pillar of blazing fire» y «their honorable exile». Se ha preferido una formulación natural en español («columna de fuego ardiente», «su honorable destierro») sin perder la concreción de la imagen ni el matiz positivo de ξενιτεία. La nota conserva la alternativa interpretativa documentada en el POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general solo cuando aparece el nombre divino; aquí el versículo no lo contiene explícitamente.
  - Se mantiene «columna» para στῦλον, en coherencia con la imaginería bíblica del desierto.
  - «Sol» se conserva por fidelidad al sustantivo griego; no se reduce a «luz».
  - «Destierro» se eligió por su fuerza contextual, con «honorable» para retener el valor positivo de φιλοτίμου.
  - La nota al pie marca la ambigüedad lexical sin exagerarla ni convertirla en paráfrasis.
