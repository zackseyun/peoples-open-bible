translation:
  language: es
  text: Porque no pueden ni maldecir a los reyes ni bendecirlos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «ciertamente no maldecirán a los reyes, ni bendecirán [a ellos]», con negación enfática; el sentido en contexto es que no tienen capacidad para hacer ninguna de las dos cosas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὔτε γὰρ
  english_pob_choice: For ... neither
  chosen_spanish: Porque ... ni siquiera
  alternatives_spanish:
  - Porque ... ni
  - Pues ... ni
  lexicon: LSJ
  rationale: γάρ da una relación explicativa con lo anterior; en español, «Porque» conserva bien ese enlace. Para la primera mitad de la construcción οὔτε... οὔτε..., «ni siquiera» comunica con naturalidad la fuerza enfática de la negación sin volver el español artificial.
- source_word: βασιλεῦσιν
  english_pob_choice: kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - los reyes
  - para los reyes
  lexicon: LSJ
  rationale: El dativo plural de βασιλεύς se entiende aquí como el objeto respecto del cual se ejerce maldición o bendición. En español, con estos verbos, la formulación más natural es «a los reyes» / «a los reyes ... bendecirlos», manteniendo el referente directo sin forzar la sintaxis.
- source_word: οὐ μὴ καταράσωνται
  english_pob_choice: can ... curse
  chosen_spanish: no pueden maldecir
  alternatives_spanish:
  - ciertamente no maldecirán
  - de ningún modo maldecirán
  lexicon: LSJ
  rationale: La combinación οὐ μή con subjuntivo aoristo expresa negación enfática de posibilidad/realización. Siguiendo el valor que el POB inglés captó como incapacidad, «no pueden» expresa bien la imposibilidad en español y evita una traducción meramente futura.
- source_word: οὔτε μὴ εὐλογήσωσι
  english_pob_choice: nor bless them
  chosen_spanish: ni bendecirlos
  alternatives_spanish:
  - ni pueden bendecirlos
  - ni los bendecirán
  lexicon: LSJ
  rationale: La segunda mitad mantiene el paralelismo con la primera. Como el objeto está elidido en griego pero es claramente «a los reyes», en español se recupera con el pronombre enclítico «-los» para una frase fluida y completa.
theological_decisions:
- issue: Fuerza teológica de la negación enfática aplicada a la impotencia de los ídolos
  english_pob_reading: Render the clause as inability ('can neither ... nor ...')
  chosen_spanish_reading: 'Renderla como incapacidad: «no pueden ... ni ...»'
  alternative_spanish_readings:
  - «ciertamente no maldecirán ni bendecirán»
  - «de ningún modo maldecirán ni bendecirán»
  rationale: El contexto polémico presenta a los ídolos como impotentes. En español, «no pueden» comunica esa incapacidad de manera clara y fiel al valor de οὐ μή, sin añadir futuro simple donde el énfasis principal es la imposibilidad.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense in readable modern Spanish.'
translation_notes:
  revision_awareness: El texto griego y el expediente inglés coinciden de forma alta y no registran revisiones aplicadas; la redacción española sigue esa lectura estable, conservando la negación enfática y la referencia explícita a los reyes.
  spanish_consistency_notes:
  - Se usa «Dios» y «Yahvé» según la pauta general del proyecto; este versículo no los contiene.
  - Se mantiene «maldecir» / «bendecir» como pares verbales directos, sin recurrir a formulaciones eclesiásticas más tradicionales que no añaden precisión aquí.
  - La nota al pie preserva la alternativa semántica entre negación futura e incapacidad, siguiendo el valor auditado del οὐ μή griego.
