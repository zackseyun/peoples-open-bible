    reason: lexical_alternative
  - marker: b
    text: El hebreo dice 'se paró/estuvo' en singular; el sujeto puede entenderse como la estructura compuesta del carro-trono, no solo los querubines.
    reason: alternative_reading
  revision_rationale: Se conserva el sentido del borrador, pero se ajusta para reflejar mejor el expediente fuente y la auditabilidad del POB. 'Se pararon' representa mejor וַיַּעֲמֹד que 'se detuvieron', y la nota [b] preserva la observación importante de que el hebreo está en singular. Se añade una nota [a] para la alternativa espacial de לְעֻמָּתָם, presente en el inglés auditado. Se elimina 'desde arriba' por redundante e innecesariamente pesado en español. Las notas se reducen a las decisiones verdaderamente significativas.
