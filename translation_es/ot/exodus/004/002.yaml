review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: Yahvé como יְהוָה, doble ''dijo'', y la respuesta nominal breve. Sin embargo, la pregunta española ''¿Qué tienes en la mano?'' cambia levemente el foco de identificación del hebreo מ/זה בְ/יָדֶךָ (''¿Qué es eso en tu mano?'' / ''¿Qué es eso que tienes en la mano?'') hacia posesión. Además, la nota textual está mal anclada: el mismo contenido léxico aparece duplicado en [a] y [b], mientras que en el rastro inglés la nota corresponde al sustantivo מַטֶּה, no a ''le dijo''.'
  spanish_quality_summary: 'El español es claro y natural, pero puede ser más fiel y limpio: ''¿Qué es eso en tu mano?'' suena digno y cercano al hebreo sin caer en calco duro. ''Bastón'' es comprensible, pero en este contexto narrativo de Moisés ''vara'' alinea mejor con el rango semántico tradicional y con la nota alternativa inglesa ''rod''; aun así, ''bastón'' podría defenderse. También debe corregirse la colocación y duplicación de notas al pie.'
  glossary_alignment: 'Alineación buena en el nombre divino: יְהוָה → ''Yahvé'' conforme al proyecto. No hay otros términos doctrinales sensibles. Para מַטֶּה, ''vara'' encaja mejor con el audit trail (''staff'' con alternativa ''rod'') y con el uso bíblico en español; se puede conservar una nota con la alternativa ''bastón'' o ''palo''.'
  issues:
  - severity: medium
    issue: La pregunta '¿Qué tienes en la mano?' no refleja con precisión el identificador '¿qué es eso...?' del hebreo.
    rationale: מ/זה con בְּיָדֶךָ pregunta por la identidad del objeto señalado, no primariamente por lo que Moisés posee. '¿Qué es eso en tu mano?' preserva mejor la forma y el sentido.
  - severity: high
    issue: Las notas al pie están duplicadas y una está anclada al lugar equivocado.
    rationale: El borrador pone una nota [a] tras 'le dijo' con contenido sobre מַטֶּה, y repite la misma nota en [b] tras 'Un bastón'. Según el rastro inglés, la nota léxica debe ir solo sobre el término correspondiente a מַטֶּה.
  - severity: medium
    issue: '''Bastón'' es posible, pero ''vara'' sería una mejor elección principal en este contexto bíblico.'
    rationale: מַטֶּה en Éxodo 4 se refiere al implemento de Moisés que luego se convierte en señal milagrosa. En español bíblico general, 'vara' comunica mejor ese objeto que 'bastón', que suena más cotidiano y moderno.
  revised_spanish_text: 'Y Yahvé le dijo: «¿Qué es eso en tu mano?» Y él dijo: «Una vara»[a].'
  revised_footnotes:
  - marker: a
    text: O «Un bastón». El hebreo מַטֶּה puede referirse, según el contexto, a una vara, un bastón o un palo.
    reason: lexical_alternative
