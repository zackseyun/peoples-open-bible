translation:
  language: es
  text: Mío es el consejo y la sabiduría sólida[a]; yo soy entendimiento; mío es la fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mío es el consejo y la sabiduría eficaz; yo soy discernimiento; mío es la fuerza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - consejo prudente
  - asesoría
  - plan
  lexicon: HALOT
  rationale: En Proverbios, עֵצָה expresa consejo sabio o guía prudente; «consejo» conserva bien ese valor elevado y personificado en español sin sonar artificial.
- source_word: תוּשִׁיָּה
  english_pob_choice: sound wisdom
  chosen_spanish: prudente sabiduría
  alternatives_spanish:
  - sabiduría sólida
  - sabiduría efectiva
  - sabiduría sana
  lexicon: HALOT
  rationale: La POB inglesa opta por una expresión que comunica solidez y eficacia. En español, «prudente sabiduría» mantiene la idea de sabiduría práctica y firme, y suena natural en el paralelismo poético.
- source_word: אֲנִי בִינָה
  english_pob_choice: I am understanding
  chosen_spanish: yo soy entendimiento
  alternatives_spanish:
  - yo soy inteligencia
  - yo soy discernimiento
  lexicon: HALOT
  rationale: La cláusula nominal identifica a la Sabiduría con בִינָה. «Entendimiento» comunica mejor en español la identidad predicativa y evita que suene demasiado abstracto o técnico.
- source_word: גְבוּרָה
  english_pob_choice: strength
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - fortaleza
  - mientras
  lexicon: HALOT
  rationale: Aunque גְבוּרָה puede ser fuerza o poder, aquí el paralelismo de atributos permite «poder» como equivalente amplio y digno en español. «Fuerza» también sería posible, pero «poder» equilibra mejor el registro poético.
- source_word: לִי ... לִי
  english_pob_choice: are mine ... is mine
  chosen_spanish: mío es ... mío es
  alternatives_spanish:
  - pertenecen a mí
  - yo tengo ... yo tengo
  lexicon: HALOT
  rationale: La repetición enfática de לִי queda bien reflejada con la construcción enfática «mío es», que preserva la posesión poética mejor que una formulación más plana.
theological_decisions:
- issue: Personificación de la Sabiduría
  english_pob_reading: Retain first-person self-description of Wisdom without importing later christological identification into the translation.
  chosen_spanish_reading: Mantener la auto-presentación en primera persona de la Sabiduría sin introducir una identificación cristológica en el texto.
  alternative_spanish_readings:
  - Interpretarlo como una afirmación cristológica directa en la traducción
  - sustituir la voz personificada por una formulación impersonal
  rationale: El hebreo presenta a la Sabiduría personificada hablando en primera persona. La traducción debe conservar esa figura literaria y dejar abierta la tensión interpretativa, en lugar de resolverla desde fuera del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El texto sigue de cerca el estado revisado más reciente del POB en inglés, sin cambios pendientes reportados; se mantiene la lectura poética y la personificación de la Sabiduría.
  spanish_consistency_notes:
  - Se conserva el paralelismo nominal del hebreo con dos miembros de posesión y una cláusula de identidad.
  - Se mantiene «yo soy» para reflejar la identificación predicativa de בִינָה.
  - El marcador de nota [a] aparece en el punto donde el inglés POB también preservó una alternativa léxica importante.
