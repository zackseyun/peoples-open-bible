translation:
  language: es
  text: 'Y por su bienaventuranza[a] lograron derribar su tiranía. Sin embargo, reflexionemos: si algunos entre ellos hubieran sido pusilánimes y faltos de hombría[b], ¿de qué palabras se habrían servido? ¿No habrían sido estas?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por su nobleza» o quizá «por la excelencia por la cual fueron bendecidos». El término griego es raro y puede denotar una cualidad encomiable más que una bendición pronunciada; también puede entenderse como «bienaventuranza».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego con matiz de género: literalmente «sin hombría» o «no varoniles», usado aquí en la retórica de virtudes del libro. También puede entenderse como «sin valor» o «cobardes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τῆς εὐλογιστίας
  english_pob_choice: through their blessedness
  chosen_spanish: por su [a]
  alternatives_spanish:
  - por su bienaventuranza
  - por su nobleza
  - por la excelencia por la cual fueron bendecidos
  lexicon: LSJ
  rationale: El término griego es raro y puede referirse a una cualidad encomiable más que a una “bendición” pronunciada. En español, una solución breve y auditable como “por su [a]” permite conservar la ambigüedad deliberada, mientras la nota explica las opciones semánticas principales sin añadir un sustantivo interpretativo no seguro en el texto.
- source_word: τὴν τυραννίδα αὐτοῦ κατέλυσαν
  english_pob_choice: they brought down his tyranny
  chosen_spanish: lograron derribar su tiranía
  alternatives_spanish:
  - derrocaron su tiranía
  - destruyeron su tiranía
  - derribaron su tiranía
  lexicon: LSJ
  rationale: καταλύω se usa aquí figuradamente para el ruino o derrocamiento de un poder opresivo. “Lograron derribar” conserva la acción victoriosa y suena natural en español, sin debilitar la fuerza política del griego.
- source_word: καίτοι λογισώμεθα
  english_pob_choice: Yet let us consider this
  chosen_spanish: Sin embargo, reflexionemos
  alternatives_spanish:
  - Y, sin embargo, consideremos esto
  - No obstante, razonemos
  - Con todo, pensemos
  lexicon: LSJ
  rationale: La frase introduce un razonamiento hipotético y retórico. “Reflexionemos” comunica bien el subjuntivo exhortativo en español y mantiene el tono argumentativo del pasaje.
- source_word: δειλόψυχοί
  english_pob_choice: fainthearted
  chosen_spanish: pusilánimes
  alternatives_spanish:
  - cobardes
  - de ánimo débil
  - temerosos
  lexicon: LSJ
  rationale: El compuesto designa a quienes carecen de valentía interior. “Pusilánimes” es una equivalencia precisa, digna y comprensible en registro bíblico-literario.
- source_word: ἄνανδροι
  english_pob_choice: unmanly
  chosen_spanish: '[b]'
  alternatives_spanish:
  - sin valor
  - cobardes
  - afeminados
  lexicon: LSJ
  rationale: El griego es un término marcadamente generizado dentro de la retórica de virtudes del libro. En español conviene conservar esa tensión sin imponer un insulto moderno no necesario en el texto principal; por eso se deja la forma con nota para explicar la carga de género y las alternativas posibles.
- source_word: λόγοις
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - razones
  - discursos
  - argumentos
  lexicon: LSJ
  rationale: En la pregunta retórica, λόγοι apunta a lo que habrían dicho. “Palabras” es amplio y natural, y deja abierta la fuerza discursiva del contexto.
- source_word: οὐχὶ τούτοις;
  english_pob_choice: Would it not have been these?
  chosen_spanish: ¿No habrían sido estas?
  alternatives_spanish:
  - ¿No habrían sido con estas palabras?
  - ¿No las habrían usado?
  - ¿No habrían sido tales palabras?
  lexicon: LSJ
  rationale: La construcción mira hacia adelante a la formulación que sigue. La pregunta en español conserva la expectativa retórica y la deixis anticipatoria.
theological_decisions:
- issue: Lenguaje de virtud con matiz de bendición en εὐλογιστία
  english_pob_reading: through their blessedness
  chosen_spanish_reading: por su [a]
  alternative_spanish_readings:
  - por su bienaventuranza
  - por su nobleza
  - por la excelencia por la cual fueron bendecidos
  rationale: 'El texto no obliga a una sola lectura: puede aludir a una cualidad elogiable, a la bienaventuranza o a la excelencia moral. La versión española evita cerrar prematuramente el sentido y deja la decisión abierta en la nota, conforme al rastro auditado del inglés POB.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Término genderado ἄνανδροι
  english_pob_reading: unmanly
  chosen_spanish_reading: '[b]'
  alternative_spanish_readings:
  - sin valor
  - cobardes
  - afeminados
  rationale: El griego usa un término de género dentro de la retórica de virtud del libro. El español principal no debe borrar esa tensión; la nota explica la carga semántica y ofrece alternativas sin neutralizar indebidamente el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La versión inglesa revisada volvió de una paráfrasis más interpretativa (“blessed courage”) a una forma más cercana al griego (“blessedness”). La redacción española sigue esa revisión evitando añadir “coraje” o una noción equivalente no expresada de manera explícita en εὐλογιστία; asimismo, conserva el matiz de género en ἄνανδροι sin diluirlo.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general cuando aparezca el nombre divino, aunque no figura en este versículo.
  - Se usa español moderno y digno, evitando calcos ingleses innecesarios.
  - Se conserva la fuerza retórica de las preguntas con una sintaxis natural en español.
  - La nota [b] preserva la tensión de género del original en lugar de reemplazarla por un simple sinónimo de cobardía.
