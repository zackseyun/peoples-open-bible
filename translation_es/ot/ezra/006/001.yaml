translation:
  language: es
  text: Entonces el rey Darío emitió un decreto[a], y buscaron en la casa de los archivos[b], donde estaban guardados los tesoros[c], allí en Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Darío el rey dio un decreto, y se hizo una búsqueda en la casa de los archivos». El arameo más literalmente dice «puso/estableció un decreto» y usa un verbo en tercera persona plural («buscaron»), que puede funcionar de manera impersonal.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «casa de los libros/documentos», es decir, un repositorio oficial de registros.
    reason: lexical_alternative
  - marker: c
    text: «Tesoros» también puede entenderse más ampliamente como bienes valiosos o depósitos guardados en ese complejo de archivos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  lexicon: HALOT
  rationale: Marca de secuencia narrativa; «Entonces» conserva el avance del relato con naturalidad en español.
- source_word: דָּרְיָוֶשׁ מַלְכָּא
  english_pob_choice: King Darius
  chosen_spanish: el rey Darío
  alternatives_spanish:
  - Darío el rey
  lexicon: HALOT
  rationale: Se conserva el nombre propio y se traduce el título de modo idiomático en español, sin perder la referencia regia.
- source_word: שָׂם טְעֵם
  english_pob_choice: issued a decree
  chosen_spanish: promulgó un decreto
  alternatives_spanish:
  - emitió un decreto
  - dio una orden
  lexicon: HALOT
  rationale: La expresión aramea es literalmente «puso/estableció un decreto». «Promulgó» comunica la acción administrativa real con suficiente fidelidad y dignidad en español.
- source_word: וּבַקַּרוּ
  english_pob_choice: they searched
  chosen_spanish: buscaron
  alternatives_spanish:
  - examinaron
  - hicieron una búsqueda
  lexicon: HALOT
  rationale: El verbo plural activo pide un sujeto explícito en español; «buscaron» mantiene el carácter de indagación en los archivos sin forzar una pasiva impersonal.
- source_word: בְּבֵית סִפְרַיָּא
  english_pob_choice: in the house of the archives
  chosen_spanish: en la casa de los archivos
  alternatives_spanish:
  - en la casa de los documentos
  - en el archivo
  lexicon: HALOT
  rationale: Se preserva la imagen concreta de «casa» y se traduce el término administrativo como «archivos», siguiendo el valor de repositorio oficial de documentos.
- source_word: דִּי
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - que
  - en la cual
  lexicon: HALOT
  rationale: La relativa tiene valor locativo; «donde» reproduce bien la relación espacial con naturalidad en español.
- source_word: גִנְזַיָּא
  english_pob_choice: the treasures
  chosen_spanish: los tesoros
  alternatives_spanish:
  - los bienes almacenados
  - los depósitos valiosos
  lexicon: HALOT
  rationale: El sustantivo remite a cosas guardadas/atesoradas; «tesoros» es la equivalencia directa más clara. En contexto puede abarcar objetos valiosos almacenados.
- source_word: מְהַחֲתִין
  english_pob_choice: were stored
  chosen_spanish: estaban guardados
  alternatives_spanish:
  - estaban almacenados
  - eran depositados
  lexicon: HALOT
  rationale: El participio expresa estado resultante de custodia. «Estaban guardados» suena natural y conserva la idea de depósito permanente.
- source_word: תַּמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo explícito; se mantiene en español para reflejar el énfasis del texto fuente.
- source_word: בְּבָבֶל
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en Babel
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español; «Babilonia» es la forma más reconocible y fiel al uso bíblico.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto arameo y el audit trail en inglés: se conserva la secuencia narrativa, el verbo plural activo de «buscaron», la localización en la casa de los archivos y el matiz locativo final «allí en Babilonia», sin adoptar una pasiva impersonal que el original no exige.'
  spanish_consistency_notes:
  - Se usa «Babilonia» de forma consistente para בבל.
  - Se prefirió «archivos» para el repositorio oficial, coherente con el contexto administrativo.
  - Se mantuvo «tesoros» como equivalente principal de גִנְזַיָּא, sin reducirlo a una noción meramente monetaria.
