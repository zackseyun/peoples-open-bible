  text: μέλλοντος δὲ τοῦ Παύλου ἀνοίγειν τὸ στόμα εἶπεν ὁ Γαλλίων πρὸς τοὺς Ἰουδαίους· Εἰ ⸀μὲν ἦν ἀδίκημά τι ἢ ῥᾳδιούργημα πονηρόν, ὦ Ἰουδαῖοι, κατὰ λόγον ἂν ἀνεσχόμην ὑμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/acts/018/014.yaml
  text: But as Paul was about to open his mouth[a], Gallio said to the Jews, “If it were some wrongdoing or a serious crime, O Jews[c][b], I would reasonably put up with you.
  footnotes:
  - marker: a
    text: Or “as Paul was about to speak.” The Greek literally says “to open the mouth,” an idiom for beginning to speak.
    reason: lexical_alternative
  - marker: b
    text: Or “a wicked crime” or “a malicious offense.” The Greek phrase combines a term for criminal misconduct with an adjective meaning “evil” or “wicked.”
    reason: lexical_alternative
  - marker: c
    text: Or “I would reasonably bear with you.” The expression means Gallio would have good reason to tolerate hearing their complaint if it concerned an actual civil wrong or crime.
    reason: lexical_alternative
translation:
  language: ko
  text: 바울이 입을 열려고 할 때에 갈리오가 유대인들에게 말하였습니다. 「유대인들이여, 만일 어떤 부정한 행위나 악한 범죄였더라면, 내가 마땅히 여러분의 말을 들어주었을 것입니다.
  philosophy: optimal-equivalence
