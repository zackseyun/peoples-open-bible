translation:
  language: es
  text: Porque no pondrá su esperanza en caballo, jinete y arco, ni multiplicará para sí oro ni plata para la guerra[b], ni juntará esperanzas de muchos[a] para el día de batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «ni juntará esperanzas con muchos para el día de la guerra»; el griego probablemente alude a confiar en grandes números o en una gran fuerza.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «oro y plata».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπιεῖ
  english_pob_choice: will not put his hope
  chosen_spanish: no pondrá su esperanza
  alternatives_spanish:
  - no esperará
  - no confiará
  lexicon: BDAG
  rationale: El verbo griego conserva la idea de esperanza, pero en este contexto militar implica apoyarse en algo como base de seguridad. «Pondrá su esperanza» mantiene el vínculo léxico con la esperanza y suena natural en español.
- source_word: ἵππον
  english_pob_choice: horse
  chosen_spanish: caballo
  alternatives_spanish:
  - caballo de guerra
  lexicon: LSJ
  rationale: El griego dice simplemente «caballo». El contexto bélico ya está dado por la lista de recursos militares, así que no hace falta añadir «de guerra».
- source_word: ἀναβάτην
  english_pob_choice: rider
  chosen_spanish: jinete
  alternatives_spanish:
  - montador
  - cabalgador
  lexicon: LSJ
  rationale: «Jinete» es la forma más natural y transparente en español para ἀναβάτης en este contexto, y conserva la pareja concreta caballo/jinete.
- source_word: τόξον
  english_pob_choice: bow
  chosen_spanish: arco
  alternatives_spanish:
  - arma
  - arco de batalla
  lexicon: LSJ
  rationale: El sustantivo designa específicamente un arco. Mantener el término concreto preserva la imaginería militar del texto.
- source_word: πληθυνεῖ αὐτῷ
  english_pob_choice: will multiply for himself
  chosen_spanish: multiplicará para sí
  alternatives_spanish:
  - aumentará para sí
  - hará abundar para sí
  lexicon: BDAG
  rationale: El verbo expresa aumentar o hacer mucho, y el dativo αὐτῷ funciona como beneficio o provecho personal. «Para sí» comunica bien esa acumulación personal.
- source_word: χρυσίον οὐδὲ ἀργύριον
  english_pob_choice: gold or silver
  chosen_spanish: oro ni plata
  alternatives_spanish:
  - oro o plata
  - oro y plata
  lexicon: LSJ
  rationale: El griego usa la disyunción negativa οὐδὲ entre los dos metales. En español, «ni... ni...» refleja mejor esa negación disyuntiva que «y» o una simple enumeración.
- source_word: πολλοῖς
  english_pob_choice: from great numbers
  chosen_spanish: de entre muchos
  alternatives_spanish:
  - de muchos
  - con muchos
  lexicon: LSJ
  rationale: La construcción es comprimida y apunta a la idea de obtener apoyo o seguridad a partir de una gran cantidad de personas. «De entre muchos» mantiene esa relación sin especificar más de lo que el griego dice.
- source_word: συνάξει ἐλπίδας
  english_pob_choice: will gather hopes
  chosen_spanish: juntará esperanzas
  alternatives_spanish:
  - reunirá esperanzas
  - acumulará esperanzas
  lexicon: BDAG
  rationale: Aunque «juntar esperanzas» puede sonar menos idiomático que otras opciones, sigue de cerca la imagen del griego y preserva la pluralidad de ἐλπίδας que el audit trail inglés retuvo al final.
- source_word: ἡμέραν πολέμου
  english_pob_choice: the day of battle
  chosen_spanish: el día de batalla
  alternatives_spanish:
  - el día de la guerra
  - el día del combate
  lexicon: LSJ
  rationale: «Día de batalla» es una forma natural en español y mantiene la concreción bélica de la expresión.
translation_notes:
  revision_awareness: La versión española sigue la revisión final del inglés auditado, especialmente la lectura de πολλοῖς ... ἐλπίδας como plural «esperanzas» y la disyunción de χρυσίον οὐδὲ ἀργύριον. Se evita introducir una glosa interpretativa como «confianza» para no borrar la tensión léxica entre esperanza y dependencia militar.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - Se mantiene un registro formal y bíblico sin recurrir a formulaciones eclesiásticas que el griego no exige.
  - 'Se preserva la imagen militar concreta: caballo, jinete, arco, oro, plata, guerra/batalla.'
  - La elección «esperanzas» conserva la pluralidad del audit trail inglés y la ambigüedad de apoyar la seguridad en muchas personas o fuerzas.
