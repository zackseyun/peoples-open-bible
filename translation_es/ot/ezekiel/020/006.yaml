translation:
  language: es
  text: En aquel día levanté mi mano hacia ellos[a], para sacarlos de la tierra de Egipto a una tierra que había buscado para ellos[b], que fluye con leche y miel; es la gloria[c] de todas las tierras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levanté mi mano hacia ellos», es decir, «les juré».
    reason: lexical_alternative
  - marker: b
    text: O «que había escogido para ellos»; el hebreo dice literalmente «buscado/explorado».
    reason: lexical_alternative
  - marker: c
    text: O «el esplendor» o «la hermosura de todas las tierras».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשָׂאתִי יָדִי
  english_pob_choice: I raised my hand
  chosen_spanish: levanté mi mano
  alternatives_spanish:
  - alzé mi mano
  - levanté la mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, en contexto de promesa solemne/juramento, conservar la imagen corporal ayuda a reflejar el texto fuente. «Levanté mi mano» mantiene la transparencia del hebreo mejor que un equivalente totalmente interpretativo como «juré».
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  lexicon: HALOT
  rationale: La preposición hebrea dirige el gesto a la audiencia del juramento. En español, «a ellos» suena natural con «levanté mi mano» y conserva la dirección personal del acto.
- source_word: לְהוֹצִיאָם
  english_pob_choice: to bring them out
  chosen_spanish: para sacarlos
  alternatives_spanish:
  - para sacarlos fuera
  - para traerlos fuera
  lexicon: HALOT
  rationale: El hiphil de יצא expresa causar la salida. «Sacar» es el verbo español más natural para el motivo del éxodo y evita rigidez innecesaria.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» reproduce de modo claro el sintagma geográfico sin necesidad de amplificación.
- source_word: אֶל אֶרֶץ
  english_pob_choice: into a land
  chosen_spanish: a una tierra
  alternatives_spanish:
  - hacia una tierra
  - en una tierra
  lexicon: HALOT
  rationale: En español, «a una tierra» comunica bien el movimiento hacia el destino. «A» es suficiente sin forzar un calco con «en» o «hacia».
- source_word: אֲשֶׁר תַּרְתִּי לָהֶם
  english_pob_choice: that I had searched out for them
  chosen_spanish: que había buscado para ellos
  alternatives_spanish:
  - que había buscado para ellos
  - que había explorado para ellos
  - que había escogido para ellos
  lexicon: HALOT
  rationale: תור puede implicar buscar/explorar/inspeccionar. En español, «buscado» conserva la intención de identificar la tierra para ellos sin introducir un matiz militar fuerte como «explorado» ni volver demasiado abstracta la idea con «escogido».
- source_word: זָבַת חָלָב וּדְבַשׁ
  english_pob_choice: flowing with milk and honey
  chosen_spanish: que fluye leche y miel
  alternatives_spanish:
  - que mana leche y miel
  - que fluye con leche y miel
  lexicon: HALOT
  rationale: La imagen hebrea es de abundancia fértil. «Que fluye leche y miel» preserva la fórmula tradicional y la metáfora verbal; se omite «con» para no endurecer el hebreo idiomático.
- source_word: צְבִי
  english_pob_choice: the glory
  chosen_spanish: el esplendor
  alternatives_spanish:
  - la gloria
  - la hermosura
  - la belleza
  lexicon: HALOT
  rationale: צְבִי puede denotar belleza, esplendor o gloria. «Esplendor» comunica dignidad y preeminencia en español sin cargar la palabra con un matiz exclusivamente doxológico.
- source_word: הִיא לְכָל הָאֲרָצוֹת
  english_pob_choice: it is the glory of all lands
  chosen_spanish: es el esplendor de todas las tierras
  alternatives_spanish:
  - es la gloria de todas las tierras
  - es la hermosura de todas las tierras
  lexicon: HALOT
  rationale: La frase presenta la tierra como preeminente entre las tierras. «Es el esplendor de todas las tierras» conserva la valoración elevada y el paralelismo del hebreo.
theological_decisions:
- issue: Idioma de juramento implícito en «levanté mi mano»
  english_pob_reading: I raised my hand
  chosen_spanish_reading: levanté mi mano
  alternative_spanish_readings:
  - juré
  - levanté la mano
  rationale: El hebreo conserva la imagen concreta del gesto de juramento/compromiso. Mantenerla en español preserva la tensión entre el acto físico y su sentido solemne, sin resolverla prematuramente en una paráfrasis.
  doctrine_reference: Translation philosophy §1, §3
- issue: Antropomorfismo en תַּרְתִּי
  english_pob_reading: that I had searched out for them
  chosen_spanish_reading: que había buscado para ellos
  alternative_spanish_readings:
  - que había escogido para ellos
  - que había explorado para ellos
  rationale: Se conserva el lenguaje relacional y antropomórfico del profeta. «Buscado» refleja la diligencia expresada por el verbo sin convertirlo en una explicación teológica abstracta.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto fuente hebreo y el trazado auditado en inglés, conservando la imagen del juramento, la búsqueda/exploración de la tierra y la descripción final de preeminencia. Se incorporó un orden natural en español con puntuación clara, análogo a la revisión inglesa que añadió coma después de «to them».
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto principal cuando el hebreo explícitamente contiene el nombre divino; aquí no aparece, así que no se inserta ningún equivalente.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Tierra» se conserva de manera consistente para אֶרֶץ en este contexto territorial.
  - Las notas preservan alternativas relevantes donde el hebreo admite más de una lectura sin resolverla unilateralmente.
