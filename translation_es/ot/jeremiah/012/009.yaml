review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en gran medida el sentido del hebreo y sigue bien la pista del POB inglés: mantiene «mi heredad», conserva la rareza retórica de «para mí», incluye la alternativa léxica «hiena» en nota y traduce correctamente la convocatoria a las bestias del campo. Sin embargo, en la segunda pregunta «¿El ave de presa está contra ella, en derredor?» no preserva bien la decisión auditada de entender el singular colectivamente y resulta menos natural y menos fiel al matiz de hostilidad envolvente de הַעַיִט סָבִיב עָלֶיהָ.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «¿El ave de presa está contra ella, en derredor?» suena rígido y poco idiomático. «En derredor» además tiene sabor arcaizante innecesario. Conviene pluralizar colectivamente en español para claridad natural: «¿Están contra ella, por todos lados, las aves de presa?» o equivalente. El resto del versículo lee bien.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Heredad» es defendible por registro bíblico; «ave de presa» y «bestias del campo» concuerdan con la justificación léxica. La nota léxica [a] está bien alineada. Hace falta añadir una nota [b] para preservar la alternativa/documentación inglesa sobre el singular colectivo de עַיִט en la segunda cláusula.
  issues:
  - severity: medium
    issue: 'La segunda cláusula usa singular no natural: «¿El ave de presa está contra ella, en derredor?»'
    rationale: El POB inglés revisado decidió reflejar el singular hebreo como colectivo mediante plural en inglés («Are the birds of prey against her all around?»). En español, mantener el singular aquí produce una frase dura y menos clara que no comunica bien el cerco hostil.
  - severity: medium
    issue: Falta la nota equivalente a la nota inglesa b sobre el valor literal/singular colectivo de עַיִט
    rationale: La auditoría inglesa conservó esta alternativa significativa. Dado que la revisión española adoptará plural colectivo por naturalidad, la nota es importante para informar que el hebreo literal usa singular.
  - severity: low
    issue: «En derredor» suena innecesariamente arcaico
    rationale: El encargo pide español moderno pero digno. «Por todos lados» o «alrededor» comunica mejor sin perder registro.
