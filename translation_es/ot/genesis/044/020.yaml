translation:
  language: es
  text: 'Y dijimos a mi señor[a]: «Tenemos un padre anciano, y un hijo joven nacido en su vejez. Su hermano ha muerto, así que él es el único[b] que le queda a su madre, y su padre lo ama.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi amo».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «él solo queda de su madre»; es decir, es el único hijo que le queda a su madre.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - señor
  lexicon: HALOT
  rationale: En este contexto narrativo de respeto ante una autoridad, «mi señor» conserva la relación jerárquica y el tono de deferencia mejor que «señor» a secas. «Mi amo» sería demasiado fuerte en español y menos natural aquí.
- source_word: זָקֵן
  english_pob_choice: elderly
  chosen_spanish: anciano
  alternatives_spanish:
  - viejo
  - de edad avanzada
  lexicon: HALOT
  rationale: El hebreo describe la avanzada edad del padre. «Anciano» es natural y digno en español, y evita la aspereza de «viejo» sin perder el rasgo de vejez.
- source_word: יֶלֶד זְקֻנִים קָטָן
  english_pob_choice: a young son born in his old age
  chosen_spanish: un hijo joven nacido en su vejez
  alternatives_spanish:
  - un hijo de su vejez
  - un hijo pequeño nacido en su vejez
  - un niño nacido en su vejez
  lexicon: HALOT
  rationale: La frase hebrea combina la idea idiomática de un hijo nacido cuando el padre era anciano con la precisión de que es «joven/pequeño». «Hijo joven nacido en su vejez» retiene ambos elementos sin añadir interpretación innecesaria.
- source_word: קָטָן
  english_pob_choice: young
  chosen_spanish: joven
  alternatives_spanish:
  - pequeño
  - menor
  - el más joven
  lexicon: HALOT
  rationale: Aquí el adjetivo funciona principalmente para indicar edad relativa, no tamaño físico. «Joven» es claro y fiel al sentido contextual.
- source_word: וְאָחִיו מֵת
  english_pob_choice: His brother is dead
  chosen_spanish: Su hermano ha muerto
  alternatives_spanish:
  - Su hermano está muerto
  - Su hermano murió
  lexicon: HALOT
  rationale: 'El hebreo presenta un estado resultado: el hermano ya no vive. El pretérito perfecto compuesto en español expresa bien esa condición vigente en el relato.'
- source_word: וַיִּוָּתֵר
  english_pob_choice: is left
  chosen_spanish: queda
  alternatives_spanish:
  - permanece
  - ha quedado
  - fue dejado
  lexicon: HALOT
  rationale: El verbo expresa que él es el único restante. «Queda» es natural en español y preserva la idea de supervivencia/resto sin sobrecargar la frase.
- source_word: לְבַדּוֹ
  english_pob_choice: he alone
  chosen_spanish: él solo
  alternatives_spanish:
  - solo él
  - él únicamente
  - él por sí solo
  lexicon: HALOT
  rationale: La construcción enfatiza exclusividad. «Él solo» suena más directo en español y mantiene el foco en la singularidad de Benjamin.
- source_word: לְאִמּוֹ
  english_pob_choice: of his mother
  chosen_spanish: de su madre
  alternatives_spanish:
  - para su madre
  - con respecto a su madre
  lexicon: HALOT
  rationale: 'La lamed relacional transmite que es el único hijo que le queda a su madre. «De su madre» permite entender en español el sentido partitivo: el único que queda respecto de ella.'
- source_word: אָבִיו אֲהֵבוֹ
  english_pob_choice: his father loves him
  chosen_spanish: su padre lo ama
  alternatives_spanish:
  - su padre lo quiere mucho
  - su padre lo ha amado
  lexicon: HALOT
  rationale: «Ama» reproduce de forma directa el verbo אהב y conserva la fuerza afectiva del pasaje. «Quiere mucho» suavizaría demasiado el enunciado.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail en inglés. Se incorporó la revisión que aclara el valor relacional de לְאִמּוֹ como «de su madre»/«queda de su madre» y se mantuvo la precisión de la última revisión inglesa al expresar a Benjamin como «un hijo joven nacido en su vejez».
  spanish_consistency_notes:
  - Se usa «mi señor» para אֲדֹנִי, conforme al respeto jerárquico del contexto de José.
  - «Anciano» traduce זָקֵן con un registro digno y contemporáneo.
  - Se preserva la tensión de לְאִמּוֹ mediante una nota, evitando convertirla en una simple localización espacial.
  - No se introduce «Cristo», «Señor» como sustituto reverencial ni otras fórmulas eclesiásticas ajenas al texto.
  - «Ama» mantiene la fuerza verbal de אהב sin intensificarla innecesariamente.
