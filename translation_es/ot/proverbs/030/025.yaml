    issue: «un pueblo no fuerte» es un calco poco idiomático en español
    rationale: Aunque reproduce de cerca la estructura hebrea y el inglés «not strong», en español suena rígido y menos natural que «un pueblo sin fuerza», que sigue evitando la sobreinterpretación de «débil» y conserva la idea de carencia de fuerza.
  revised_spanish_text: Las hormigas son un pueblo sin fuerza, y preparan en el verano su alimento.[a]
