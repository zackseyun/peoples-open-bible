translation:
  language: es
  text: No recuerden[a] las cosas pasadas, ni consideren las cosas de antaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No recuerden las cosas primeras, ni ponderen las cosas antiguas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּזְכְּרוּ
  english_pob_choice: Do not remember
  chosen_spanish: No recuerden
  alternatives_spanish:
  - No recuerden ustedes
  - No hagan memoria de
  lexicon: HALOT
  rationale: La partícula prohibitiva אַל con el imperfecto comunica una prohibición directa. «No recuerden» conserva la fuerza imperativa natural en español y mantiene el valor de זכר como recordar/traer a la memoria sin sobreexplicación.
- source_word: רִאשֹׁנוֹת
  english_pob_choice: the former things
  chosen_spanish: las cosas pasadas
  alternatives_spanish:
  - las cosas anteriores
  - las cosas primeras
  - los hechos antiguos
  lexicon: HALOT
  rationale: El hebreo plural sustantivado apunta a cosas anteriores o previas. «Las cosas pasadas» es una forma idiomática y clara en español que preserva el contraste con la novedad del contexto inmediato, sin forzar una expresión demasiado literal.
- source_word: וְ/קַדְמֹנִיּוֹת
  english_pob_choice: the things of old
  chosen_spanish: las cosas de antaño
  alternatives_spanish:
  - las cosas antiguas
  - las cosas de antes
  - las cosas de tiempos antiguos
  lexicon: HALOT
  rationale: קַדְמֹנִיּוֹת añade la idea de antigüedad o anterioridad remota. «De antaño» mantiene el paralelismo poético con «pasadas» y comunica bien la distancia temporal.
- source_word: תִּתְבֹּנָנוּ
  english_pob_choice: consider
  chosen_spanish: consideren
  alternatives_spanish:
  - ponderen
  - observen atentamente
  - fijen su atención en
  lexicon: HALOT
  rationale: El verbo de בין en el matiz reflexivo/intensivo implica considerar atentamente o reflexionar sobre algo. «Consideren» reproduce esa atención mental de manera concisa y natural en español.
translation_notes:
  revision_awareness: 'El pasaje coincide altamente con el texto hebreo y con el audit trail inglés: se mantienen las dos prohibiciones paralelas y el contraste semántico entre lo «pasado» y lo «de antaño». No se requiere una revisión textual ni una nota doctrinal adicional.'
  spanish_consistency_notes:
  - Se usa «No recuerden» para mantener la prohibición directa del hebreo.
  - Se preserva el paralelismo poético con dos sintagmas nominales breves y diferenciados.
  - «Las cosas de antaño» evita una calca rígida y sigue siendo transparente para lectura pública.
