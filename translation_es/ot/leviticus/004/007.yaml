review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la sintaxis y el sentido del hebreo: mantiene la partitividad de מִן הַדָּם, conserva «cuernos», ubica correctamente el altar del incienso en la tienda de reunión, usa «Yahvé» para יְהוָה, y vierte adecuadamente la acción de derramar la sangre restante implícita sin añadirla al texto. Sin embargo, hay dos puntos mejorables frente al expediente: (1) la nota [a] quedó asociada a «incienso aromático», pero en el POB inglés la nota a documenta la literalidad de «toda la sangre del toro/becerro», no una alternativa para el altar; y (2) la nota [b] en el inglés corresponde a una alternativa para «altar of fragrant incense», no para «altar del holocausto». Además, «becerro» para פָּר suena menos preciso en un contexto sacrificial adulto; «toro» o «novillo» preservan mejor el referente.'
  spanish_quality_summary: El español es claro, digno y muy legible. «Delante de Yahvé» y «tienda de reunión» funcionan bien. Aun así, «el cual» repetido dos veces suena algo más rígido de lo necesario; «que» mejora la fluidez sin perder precisión. «Al pie del altar» es natural, pero «en la base del altar» refleja más directamente יְסוֹד y armoniza con el inglés auditado. El ajuste principal es reubicar las notas y mejorar «becerro» a «toro».
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> «Yahvé» correcto; אֹהֶל מוֹעֵד -> «tienda de reunión» correcto; מִזְבַּח הָעֹלָה -> «altar del holocausto» aceptable como equivalente tradicional documentado. La desviación importante está en la gestión de las notas léxicas: la alternativa «altar del incienso» debe anclarse al sintagma del incienso, y la nota sobre la literalidad de «toda la sangre del toro» debe anclarse allí, no al incienso.'
  issues:
  - severity: high
    issue: Las notas al pie están intercambiadas respecto del expediente inglés.
    rationale: La nota [a] del POB inglés explica la literalidad de «all the blood of the bull», mientras que la [b] ofrece la alternativa «the incense altar». En el borrador español, [a] se aplica al incienso y [b] al holocausto, alterando la trazabilidad auditada.
  - severity: medium
    issue: «Becerro» para פָּר es menos preciso en este contexto sacrificial.
    rationale: פָּר suele referirse a un toro/novillo, no a un ternero joven. «Toro» es más directo y ampliamente comprensible en español bíblico general.
  - severity: low
    issue: «El cual» repetido suena algo rígido.
    rationale: «Que» mantiene la referencia clara en ambos casos y mejora la naturalidad del español.
  - severity: low
    issue: «Al pie del altar» es idiomático, pero «en la base del altar» refleja mejor יְסוֹד y el expediente inglés.
    rationale: No es un error, pero una formulación más cercana al valor léxico de יְסוֹד fortalece la precisión ritual.
