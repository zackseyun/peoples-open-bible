    rationale: La nota [a] debería decir 'O "tendieron trampas"' o similar, no presentar como alternativa principal algo casi idéntico al texto; y la puntuación/comillas del YAML actual suenan mecánicas. También conviene mantener la correspondencia exacta entre texto y notas.
