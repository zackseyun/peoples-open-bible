translation:
  language: es
  text: Y ahora los sabios, los encantadores, han sido traídos delante de mí para leer este escrito[a] y darme a conocer su interpretación[b], pero no pudieron dar a conocer la interpretación del mensaje.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta inscripción».
    reason: lexical_alternative
  - marker: b
    text: O «la interpretación del asunto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְעַן
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y bien ahora
  lexicon: HALOT
  rationale: El marcador discursivo arameo introduce la situación presente; en español, «Y ahora» conserva tanto el enlace con el contexto previo como el sentido temporal inmediato.
- source_word: הֻעַלּוּ קָדָמַי
  english_pob_choice: have been brought before me
  chosen_spanish: han sido traídos delante de mí
  alternatives_spanish:
  - fueron traídos delante de mí
  - han sido llevados ante mí
  lexicon: HALOT
  rationale: La forma pasiva/causativa indica que fueron hechos comparecer ante el rey. «Han sido traídos» refleja el resultado presente del acto en el contexto; «delante de mí» mantiene la presencia personal del hablante.
- source_word: חַכִּימַיָּא
  english_pob_choice: the wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - los sabios consejeros
  lexicon: HALOT
  rationale: En Daniel es un título de la corte para los especialistas instruidos. «Sabios» es natural en español y suficientemente técnico sin añadir matiz no presente en el texto.
- source_word: אָשְׁפַיָּא
  english_pob_choice: the enchanters
  chosen_spanish: los encantadores
  alternatives_spanish:
  - los hechiceros
  - los magos
  lexicon: HALOT
  rationale: Se trata de una clase de especialistas ocultistas babilonios. «Encantadores» conserva el sentido de prácticas mágicas/divinatorias sin convertirlos en «astrólogos», que sería demasiado específico para este versículo.
- source_word: כְתָבָה דְנָה
  english_pob_choice: this writing
  chosen_spanish: esta escritura
  alternatives_spanish:
  - esta inscripción
  - este escrito
  lexicon: HALOT
  rationale: El referente es lo escrito en la pared. «Escritura» es directo y abarca tanto el acto de escribir como el texto resultante; se conserva la posibilidad de la alternativa «inscripción» en nota.
- source_word: יִקְרוֹן
  english_pob_choice: read
  chosen_spanish: leer
  alternatives_spanish:
  - proclamar
  - recitar
  lexicon: HALOT
  rationale: En el contexto, el rey espera que identifiquen y lean en voz alta el texto visible. «Leer» es la opción más clara y fiel para el español.
- source_word: וּפִשְׁרֵהּ לְהוֹדָעוּתַנִי
  english_pob_choice: and make its interpretation known to me
  chosen_spanish: y darme a conocer su interpretación
  alternatives_spanish:
  - y hacerme conocer su interpretación
  - y explicarme su interpretación
  lexicon: HALOT
  rationale: El causativo de ידע expresa «hacer saber»; en español, «darme a conocer» mantiene ese valor sin perder naturalidad. «Su interpretación» preserva la referencia al escrito.
- source_word: וְלָא כָהֲלִין
  english_pob_choice: but they were not able
  chosen_spanish: pero no pudieron
  alternatives_spanish:
  - pero no eran capaces
  - pero no pudieron hacerlo
  lexicon: HALOT
  rationale: Expresa incapacidad efectiva. «No pudieron» es breve y natural, y en contexto retiene el contraste con la expectativa del rey.
- source_word: פְּשַׁר מִלְּתָא
  english_pob_choice: the interpretation of the message
  chosen_spanish: la interpretación del mensaje
  alternatives_spanish:
  - la interpretación del asunto
  - el significado de la palabra
  lexicon: HALOT
  rationale: מִלְּתָא puede significar palabra, asunto o mensaje. Aquí se refiere al contenido escrito, por lo que «mensaje» comunica bien el sentido sin fijarlo innecesariamente a una sola acepción.
- source_word: לְהַחֲוָיָה
  english_pob_choice: to make known / to show
  chosen_spanish: dar a conocer
  alternatives_spanish:
  - mostrar
  - declarar
  lexicon: HALOT
  rationale: El verbo arameo mantiene la idea de hacer saber o manifestar. «Dar a conocer» es una equivalencia natural en español y conserva la cercanía semántica con el primer «darme a conocer» del versículo.
translation_notes:
  revision_awareness: El inglés POB fue revisado para cerrar la última cláusula con «make known» en lugar de «show», por coherencia con el verbo arameo. La versión española sigue esa decisión con «dar a conocer» en ambas apariciones relevantes, manteniendo la repetición estilística del original.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre las dos ocurrencias de la idea de «hacer saber/dar a conocer».
  - Se eligió «escritura» en el texto principal y se dejó «inscripción» como alternativa en nota, conforme al margen semántico del arameo.
  - No se introdujo terminología eclesiástica tradicional ajena al registro cortesano del pasaje.
