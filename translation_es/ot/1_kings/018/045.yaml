revisions:
- from: Y ocurrió que, mientras tanto[a], los cielos se oscurecieron con nubes y viento, y hubo una gran lluvia[b][c]. Entonces Acab se subió a su carro y fue a Jezreel.
  to: Y al poco rato[a], el cielo[b] se oscureció con nubes y viento, y hubo una fuerte lluvia[c]. Entonces Acab se subió a su carro y fue a Jezreel.
  rationale: Se ajusta el modismo temporal para reflejar mejor un breve lapso, se cambia 'los cielos' por 'el cielo' por naturalidad contextual en español, y se sustituye 'gran lluvia' por 'fuerte lluvia' en el texto principal, preservando las alternativas literales en notas.
  reviewer_model: gpt-5.4
