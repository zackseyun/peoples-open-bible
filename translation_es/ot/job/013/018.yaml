translation:
  language: es
  text: Mira[a] ahora, he preparado mi caso; sé que seré vindicado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». הִנֵּה introduce atención enfática.
    reason: lexical_alternative
  - marker: b
    text: O «seré justificado». El hebreo es forense y puede significar ser mostrado como estando en lo correcto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Observa
  - Mira, pues
  lexicon: HALOT
  rationale: La partícula introduce atención enfática. «Mira» conserva el impulso deíctico en español con un tono natural y digno, equivalente funcional a «See».
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ahora
  - pues
  - te ruego
  lexicon: HALOT
  rationale: Aquí נָא añade inmediatez/enfasis, no cortesía. «Ahora» reproduce bien ese matiz discursivo en la secuencia «Mira ahora».
- source_word: עָרַכְתִּי
  english_pob_choice: I have prepared
  chosen_spanish: he preparado
  alternatives_spanish:
  - he preparado
  - he dispuesto
  - he ordenado
  lexicon: HALOT
  rationale: En contexto forense, el verbo expresa haber puesto en orden o presentado el argumento. «He preparado» mantiene la idea de haber dispuesto el caso de manera clara y natural en español.
- source_word: מִשְׁפָּט
  english_pob_choice: my case
  chosen_spanish: mi caso
  alternatives_spanish:
  - mi caso
  - mi causa
  - mi litigio
  - mi juicio
  lexicon: HALOT
  rationale: 'El contexto es judicial: Job presenta su causa ante Dios. «Mi caso» reproduce la fuerza legal de forma idiomática en español, como el inglés auditado.'
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - sé
  - he sabido
  - estoy seguro
  lexicon: HALOT
  rationale: El perfecto expresa certeza asentada. «Sé» comunica mejor la convicción presente de Job en español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: Introduce el contenido de lo que Job sabe; «que» es la subordinación más natural en español.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo
  lexicon: HALOT
  rationale: El pronombre explícito subraya el sujeto. En español, «yo» puede omitirse, pero aquí se conserva para reflejar el énfasis del hebreo.
- source_word: אֶצְדָּק
  english_pob_choice: will be vindicated
  chosen_spanish: seré vindicado
  alternatives_spanish:
  - seré vindicado
  - seré justificado
  - saldré en la razón
  - seré declarado justo
  lexicon: HALOT
  rationale: 'צדק aquí es forense: ser mostrado en lo correcto. «Seré vindicado» comunica ese resultado legal en español sin cargar el texto con connotaciones doctrinales posteriores que podría sugerir «justificado».'
theological_decisions:
- issue: Sentido forense de צדק en Job 13:18
  english_pob_reading: Job expresa confianza en que será vindicado en su disputa legal, no una afirmación doctrinal paulina sobre la justificación.
  chosen_spanish_reading: Job declara que saldrá vindicado en su causa judicial.
  alternative_spanish_readings:
  - Job declara que será justificado.
  - Job afirma que será declarado justo.
  rationale: El contexto inmediato es un litigio ante Dios. «Vindicado» preserva la imagen de tribunal y evita importar un marco doctrinal ajeno al pasaje, aunque «justificado» siga siendo una alternativa posible a nivel léxico.
  doctrine_reference: Principio de sentido llano y forense; no anacronizar la doctrina de la justificación en un texto sapiencia/poético.
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y quedó sin cambios; la versión española sigue esa lectura de alta concordancia, conservando la distinción forense de צדק y la función enfática de הִנֵּה/נָא.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se usa «vindicado» para צדק en su sentido judicial, coherente con la línea POB de evitar importaciones doctrinales innecesarias.
  - La puntuación conserva la cadencia breve del hebreo y el énfasis discursivo del original.
