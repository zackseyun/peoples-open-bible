    text: 'Hebreo: ''YHWH''; tradicionalmente se vertía ''el SEÑOR''.'
    reason: alternative_reading
  revision_rationale: Se corrigió la concordancia al plural para reflejar fielmente las formas hebreas de segunda persona plural, manteniendo el vocativo singular 'Israel' como colectivo. Se reparó la nota [a] para que ofrezca una alternativa real, y se añadió en [b] la alternativa léxica documentada para 'estatutos' y 'juicios'. Se mantuvo 'Yahvé' conforme a la política del proyecto.
