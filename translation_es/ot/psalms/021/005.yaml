translation:
  language: es
  text: 'Pidió vida de ti[a]; tú se la diste: largos días[b], por siempre y para siempre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «larga vida»; literalmente, «largura de días».
    reason: lexical_alternative
  - marker: b
    text: La expresión «por siempre y para siempre» puede leerse como hipérbole real de una vida y un reinado duraderos, o como lenguaje que encuentra su cumplimiento más pleno en el Mesías.
    reason: alternative_reading
lexical_decisions:
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - larga vida
  - vidas
  lexicon: HALOT
  rationale: 'El hebreo plural funciona aquí como sustantivo abstracto singular: no se trata de «vidas», sino de la vida pedida. En español, «vida» conserva mejor esa fuerza que una paráfrasis como «larga vida», que ya incorpora la idea de duración que el verso desarrolla después.'
- source_word: שָׁאַל
  english_pob_choice: asked
  chosen_spanish: pidió
  alternatives_spanish:
  - preguntó
  - solicitó
  - pidió de
  lexicon: HALOT
  rationale: El verbo expresa pedir o solicitar. «Pidió» es natural en español y comunica bien la acción sin añadir una idea de pregunta que no está en el hebreo.
- source_word: מִמְּךָ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de parte de ti
  - de ti mismo
  lexicon: HALOT
  rationale: 'La preposición indica procedencia o fuente: la vida fue pedida a Yahvé. En español, «de ti» es la manera más directa y fiel de conservar esa relación de origen.'
- source_word: נָתַתָּה לוֹ
  english_pob_choice: you gave it to him
  chosen_spanish: tú se la diste
  alternatives_spanish:
  - tú la diste a él
  - tú le diste vida
  lexicon: HALOT
  rationale: 'El objeto implícito es «vida», retomado de la primera cola; por eso «se la diste» mantiene la referencia y evita repetir innecesariamente el sustantivo. El dativo indirecto se expresa con claridad en español, y el imperativo no está en juego: es pasado narrativo.'
- source_word: אֹרֶךְ יָמִים
  english_pob_choice: length of days
  chosen_spanish: largura de días
  alternatives_spanish:
  - longitud de días
  - largura de vida
  - largos días
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «longitud/largura de días». Se conserva la imagen poética y la estructura del hebreo en vez de colapsarla de inmediato en «larga vida», aunque esa sea la idea idiomática subyacente.
- source_word: עוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: para siempre y para siempre
  alternatives_spanish:
  - eternamente
  - por los siglos de los siglos
  lexicon: HALOT
  rationale: La duplicación intensifica la duración. «Para siempre y para siempre» mantiene ese refuerzo casi idéntico al hebreo y deja abierta la tensión interpretativa entre lenguaje real/hiperbólico y cumplimiento más pleno.
theological_decisions:
- issue: Alcance de la duración prometida al rey en un salmo real
  english_pob_reading: Render the duration straightforwardly as 'forever and ever' without reducing it to mere hyperbole or explicitly interpreting it messianically in the main text.
  chosen_spanish_reading: Traducir la duración de modo directo como «para siempre y para siempre», sin reducirla en el cuerpo del texto a mera hipérbole ni explicitar una lectura mesiánica.
  alternative_spanish_readings:
  - tomarlo solo como hipérbole cortesana para un reinado muy largo
  - interpretarlo directamente como una referencia al Mesías
  rationale: El hebreo presenta una duración sin límite explícito. La traducción debe preservar esa tensión, no resolverla. Por eso el texto español mantiene la formulación fuerte, mientras que la interpretación sobre si es exageración real o cumplimiento mesiánico queda para la exégesis.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente y el audit trail inglés sin cambios de revisión pendientes; conserva la tensión interpretativa del hebreo en la duración final y la imagen poética de «largura de días».
  spanish_consistency_notes:
  - Se usa «vida» para חַיִּים como sustantivo abstracto, no «vidas».
  - Se mantiene «Yahvé» como forma editorial del nombre divino en esta serie, aun cuando aquí el verso dice «de ti».
  - La duplicación final se conserva de manera visible para reflejar עוֹלָם וָעֶד.
  - «Se la diste» recupera el objeto implícito «vida» y evita una frase más pesada como «tú le diste vida».
