translation:
  language: es
  text: Y al cuarto día se pesaron la plata, el oro y los utensilios[a] en la casa de nuestro Dios, a cargo[b] de Meremot hijo de Urías el sacerdote, y con él estaba Eleazar hijo de Fineas, y con ellos estaban Jozabad hijo de Jesúa y Noadías hijo de Binuy, los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, objetos o artículos del templo.
    reason: cultural_note
  - marker: b
    text: 'O: «en manos de Meremot hijo de Urías el sacerdote». El hebreo dice literalmente «en la mano de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַיּוֹם הָרְבִיעִי
  english_pob_choice: And on the fourth day
  chosen_spanish: Y en el cuarto día
  alternatives_spanish:
  - Y el cuarto día
  - Ahora bien, al cuarto día
  lexicon: HALOT
  rationale: La frase temporal se mantiene como continuación narrativa simple. En español, 'en el cuarto día' conserva la secuencia sin añadir matices que el hebreo no exige.
- source_word: נִשְׁקַל
  english_pob_choice: were weighed out
  chosen_spanish: se pesaron
  alternatives_spanish:
  - fueron pesados
  - se pesó
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción pasiva de pesar los objetos. En español, 'se pesaron' comunica de manera natural el acto administrativo sin forzar una perífrasis menos usual; el complemento 'la plata, el oro y los utensilios' permite el plural.
- source_word: הַכֶּסֶף וְהַזָּהָב וְהַכֵּלִים
  english_pob_choice: the silver and the gold and the vessels
  chosen_spanish: la plata, el oro y los utensilios
  alternatives_spanish:
  - la plata, el oro y los vasos
  - la plata, el oro y los artículos
  lexicon: HALOT
  rationale: '''Utensilios'' conserva el sentido concreto de כֵּלִים en contexto de inventario del templo. ''Vasos'' es posible, pero más estrecho y menos general; ''artículos'' es demasiado vago.'
- source_word: בְּבֵית אֱלֹהֵינוּ
  english_pob_choice: in the house of our God
  chosen_spanish: en la casa de nuestro Dios
  alternatives_spanish:
  - en el templo de nuestro Dios
  - en la casa de Dios
  lexicon: HALOT
  rationale: Se preserva la expresión hebrea 'casa de nuestro Dios', que es más directa y más cercana al tono de pertenencia del texto que 'templo', sin perder inteligibilidad.
- source_word: עַל יַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - a cargo de
  - bajo la custodia de
  - por mano de
  lexicon: HALOT
  rationale: La locución hebrea marca entrega/puesta en custodia. 'En manos de' reproduce la imagen idiomática con naturalidad en español y evita la rigidez de un calco literal.
- source_word: מְרֵמוֹת בֶּן אֽוּרִיָּה הַכֹּהֵן
  english_pob_choice: Meremoth son of Uriah the priest
  chosen_spanish: Meremot hijo de Urías el sacerdote
  alternatives_spanish:
  - Meremot, hijo de Urías el sacerdote
  - Meremot hijo de Urías, el sacerdote
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma coherente. 'El sacerdote' funciona como aposición del nombre de Urías, como en el hebreo.
- source_word: וְעִמּוֹ
  english_pob_choice: and with him was
  chosen_spanish: con él estaba
  alternatives_spanish:
  - y con él estaba
  - y estaba con él
  lexicon: HALOT
  rationale: La construcción española más fluida para el hebreo es 'con él estaba', que conserva la idea de acompañamiento sin sobrecargar con una réplica sintáctica del original.
- source_word: אֶלְעָזָר בֶּן פִּינְחָס
  english_pob_choice: Eleazar son of Phinehas
  chosen_spanish: Eleazar hijo de Fineas
  alternatives_spanish:
  - Eleazar, hijo de Fineas
  - Eleazar hijo de Pinjás
  lexicon: HALOT
  rationale: Se sigue la transliteración usada de forma consistente para los nombres bíblicos. 'Fineas' es la forma más reconocible en español bíblico, y mantiene la continuidad onomástica.
- source_word: וְעִמָּהֶם
  english_pob_choice: and with them were
  chosen_spanish: y con ellos estaban
  alternatives_spanish:
  - y con ellos estaba
  - con ellos también estaban
  lexicon: HALOT
  rationale: El plural se expresa de manera natural en español. 'Con ellos estaban' conserva el movimiento de acompañamiento del hebreo.
- source_word: יוֹזָבָד בֶּן יֵשׁוּעַ וְנֹעַדְיָה בֶן בִּנּוּי הַלְוִיִּם
  english_pob_choice: Jozabad son of Jeshua and Noadiah son of Binnui, the Levites
  chosen_spanish: Jozabad hijo de Jesúa y Noadías hijo de Binuy, los levitas
  alternatives_spanish:
  - Jozabad hijo de Jesúa y Noadías hijo de Binuy, que eran levitas
  - Jozabad hijo de Jesúa y Noadías hijo de Binuy, los levitas
  lexicon: HALOT
  rationale: El sustantivo final identifica a ambos varones como levitas; se conserva como aposición concisa. 'Jesúa' sigue la forma española habitual del nombre; 'Binuy' respeta la transliteración del hebreo.
theological_decisions:
- issue: La expresión idiomática de entrega 'en manos de' versus una lectura funcional de custodia
  english_pob_reading: into the hand of Meremoth ...
  chosen_spanish_reading: en manos de Meremot ...
  alternative_spanish_readings:
  - a cargo de Meremot
  - bajo la custodia de Meremot
  rationale: No hay tensión doctrinal, pero sí una decisión de estilo y fidelidad. Se conserva la imagen bíblica de entrega confiada sin convertirla en una paráfrasis administrativa. La frase sigue siendo clara para el lector español.
  doctrine_reference: N/A
- issue: El sustantivo final 'los levitas' como identificación colectiva
  english_pob_reading: the Levites
  chosen_spanish_reading: los levitas
  alternative_spanish_readings:
  - que eran levitas
  - los servidores levíticos
  rationale: El hebreo culmina la lista con una identificación grupal. Se mantiene la forma directa 'los levitas' para no diluir el cierre del versículo ni introducir una explicación que el texto no requiere.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El contexto inglés revisado cambió 'were weighed' a 'were weighed out' para reflejar mejor la entrega formal de los bienes. En español se optó por 'se pesaron' con 'en manos de' para mantener esa idea de transferencia custodiada de forma natural y fiel al hebreo, sin añadir una perífrasis pesada.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios en forma bíblica reconocible y consistente.
  - Se conserva 'casa de nuestro Dios' por su valor covenental y por ajuste al hebreo.
  - '''Levitas'' se deja como identificación final colectiva, equivalente al hebreo sin glosa adicional.'
  - La nota al pie se ancla solo en la locución idiomática 'en manos de', que concentra la alternativa lexical principal.
