translation:
  language: es
  text: Tú amas todas las palabras de destrucción[a], oh lengua engañosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Tú has amado todas las palabras de destrucción, oh lengua engañosa» o «Tú has amado todas las palabras de destrucción, oh lengua de engaño».'
