translation:
  language: es
  text: 'Inclinen su oído y vengan a mí; oigan, y vivirá su alma; y haré con ustedes una alianza eterna: el amor fiel de pacto[a] prometido a David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las misericordias seguras de David» o «el amor constante prometido a David». El hebreo חַסְדֵי puede expresar misericordia, bondad o amor de pacto; aquí se refiere más probablemente a las promesas pactales fiables dadas por Dios a David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטּוּ
  english_pob_choice: Incline
  chosen_spanish: Inclinad
  alternatives_spanish:
  - Inclinad vuestro oído
  - Doblad el oído
  - Prestad atención
  lexicon: HALOT
  rationale: El imperativo de נטה con 'oído' es un modismo de atención receptiva. 'Inclinad' conserva la metáfora y el tono solemne, en paralelo con la solución inglesa.
- source_word: אָזְנְכֶם
  english_pob_choice: your ear
  chosen_spanish: vuestro oído
  alternatives_spanish:
  - vuestros oídos
  - vuestro oído
  lexicon: HALOT
  rationale: Hebreo usa un sustantivo singular colectivo con sufijo plural. En español, 'vuestro oído' mantiene el modismo sin volverlo demasiado literal ni perder la imagen.
- source_word: וּלְכוּ אֵלַי
  english_pob_choice: come to me
  chosen_spanish: venid a mí
  alternatives_spanish:
  - id a mí
  - acercaos a mí
  lexicon: HALOT
  rationale: Con אֶל, el verbo de movimiento en contexto de invitación se entiende desde la perspectiva del hablante como 'venir'. 'Venid a mí' es natural y fiel.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oíd
  alternatives_spanish:
  - escuchad
  - oíd
  lexicon: HALOT
  rationale: '''Oír'' conserva mejor el valor receptivo y de respuesta obediente de שמע que ''escuchar'' en este contexto exhortativo. Se mantiene la brevedad imperativa.'
- source_word: וּתְחִי נַפְשְׁכֶם
  english_pob_choice: and your soul shall live
  chosen_spanish: y vivirá vuestra alma
  alternatives_spanish:
  - y vivirá vuestra vida
  - para que viva vuestra alma
  lexicon: HALOT
  rationale: Se sigue de cerca la secuencia hebrea y el valor resultativo sin añadir una perífrasis final que no está explícita. 'Alma' preserva נפש en registro elevado.
- source_word: נַפְשְׁכֶם
  english_pob_choice: your soul
  chosen_spanish: vuestra alma
  alternatives_spanish:
  - vuestra vida
  - vosotros mismos
  lexicon: HALOT
  rationale: נפש puede ser vida, ser o alma. Aquí 'alma' conserva el término del original y el tono bíblico; el contexto comunica la vida de la persona entera.
- source_word: וְאֶכְרְתָה לָכֶם בְּרִית
  english_pob_choice: I will make with you a covenant
  chosen_spanish: haré con vosotros un pacto
  alternatives_spanish:
  - cortaré con vosotros un pacto
  - estableceré con vosotros un pacto
  lexicon: HALOT
  rationale: כרת ברית es el modismo 'hacer/cortar pacto'. 'Haré con vosotros un pacto' suena natural en español y conserva la fuerza pactal.
- source_word: בְּרִית עוֹלָם
  english_pob_choice: an everlasting covenant
  chosen_spanish: un pacto eterno
  alternatives_spanish:
  - un pacto perpetuo
  - un pacto para siempre
  lexicon: HALOT
  rationale: עוֹלָם en contexto pactal se traduce bien por 'eterno' en español moderno, equivalente claro de 'everlasting'.
- source_word: חַסְדֵי דָוִד
  english_pob_choice: the faithful covenant love promised to David
  chosen_spanish: las misericordias fieles prometidas a David
  alternatives_spanish:
  - las misericordias seguras de David
  - el amor fiel de pacto prometido a David
  - la fidelidad amorosa prometida a David
  lexicon: HALOT
  rationale: חסד admite varias soluciones; el audit trail inglés mantiene la tensión entre misericordia, amor de pacto y promesa. 'Misericordias fieles' conserva la tradición semántica sin reducir el término a solo 'amor', y 'prometidas a David' refleja mejor el sentido de beneficio asegurado a David.
- source_word: הַנֶּאֱמָנִים
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - seguros
  - fiables
  - firmes
  lexicon: HALOT
  rationale: El participio/adjetivo de אמן expresa fiabilidad y firmeza. 'Fieles' es la opción más natural y reverente en español bíblico contemporáneo.
theological_decisions:
- issue: Sentido de חַסְדֵי דָוִד en relación con el pacto davídico
  english_pob_reading: The phrase refers to God's reliable covenantal promises/love granted to David, now extended to the hearers in the everlasting covenant.
  chosen_spanish_reading: La frase remite a las promesas y misericordias pactales seguras dadas por Dios a David, ahora presentadas como base del pacto eterno ofrecido a los oyentes.
  alternative_spanish_readings:
  - las obras de fidelidad de David
  - las misericordias de David como actos de David
  rationale: El hablante es Dios, quien promete un pacto eterno. En este contexto, la expresión apunta más plausiblemente a las bendiciones/pactos confiables vinculados a David que a acciones piadosas de David. La traducción conserva esa tensión sin cerrarla excesivamente.
  doctrine_reference: Primacía del hebreo y mantenimiento de la conexión con el pacto davídico sin forzar una lectura doctrinal posterior.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del registro inglés al preferir una secuencia directa: ''y vivirá vuestra alma'' en lugar de una formulación finalizada por ''para que''. También refleja la corrección de ''prometidas a David'' frente a ''mostradas a David'', porque el matiz auditado del hebreo y del POB es de promesa/seguridad covenantal más que de mera manifestación.'
  spanish_consistency_notes:
  - Se mantiene 'pacto' para בְּרִית, siguiendo el uso POB y evitando sustituirlo por 'alianza'.
  - Se evita 'SEÑOR' y se conserva el nombre divino solo donde el texto no lo exige; este versículo no contiene el Tetragrámaton.
  - '''Alma'' traduce נֶפֶשׁ con conservación de registro bíblico y sin diluir la referencia personal.'
  - La nota de pie marcada [a] se ancla en 'oíd' porque el español crea una posible alternativa semántica ('escuchad') que conviene documentar.
