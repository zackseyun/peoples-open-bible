translation:
  language: es
  text: Entonces salió de Betel hacia Luz[a], y pasó al límite de los arquitas en Atarot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Arquitas» traduce el gentilicio הָאַרְכִּי; «architas» es una transliteración alternativa del mismo gentilicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: Then it went out
  chosen_spanish: Entonces salía
  alternatives_spanish:
  - Y salía
  - Entonces iba saliendo
  lexicon: HALOT
  rationale: En una descripción de lindes, el verbo expresa el avance de la frontera desde el punto anterior; en español, el imperfecto narrativo con «entonces» comunica continuidad geográfica sin sonar rígido. Mantiene el sujeto implícito de la línea fronteriza, como en la decisión inglesa de suplir «it».
- source_word: מִבֵּית אֵל
  english_pob_choice: from Bethel
  chosen_spanish: de Betel
  alternatives_spanish:
  - desde Betel
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma bíblica usual en español. «De Betel» reproduce bien la procedencia del límite.
- source_word: לוּזָה
  english_pob_choice: to Luz
  chosen_spanish: hacia Luz
  alternatives_spanish:
  - a Luz
  - hasta Luz
  lexicon: HALOT
  rationale: La he direccional marca movimiento hacia un punto, no necesariamente llegada consumada; por eso «hacia» preserva mejor la dirección del límite que un simple «a».
- source_word: וְעָבַר
  english_pob_choice: and passed on
  chosen_spanish: y pasaba
  alternatives_spanish:
  - y pasaba adelante
  - y cruzaba
  lexicon: HALOT
  rationale: En un itinerario fronterizo, עבר describe la continuación de la línea. «Pasaba» evita la posible impresión de un cruce físico puntual que podría sugerir «cruzaba».
- source_word: אֶל גְּבוּל
  english_pob_choice: to the border of
  chosen_spanish: al territorio de
  alternatives_spanish:
  - al borde de
  - a la frontera de
  lexicon: HALOT
  rationale: Aunque גְּבוּל puede ser «borde» o «frontera», en español «territorio de» comunica con naturalidad la zona perteneciente a un pueblo/clan sin perder la idea de límite geográfico. La elección sigue la función administrativa del pasaje.
- source_word: הָאַרְכִּי
  english_pob_choice: the Arkites
  chosen_spanish: los arquitas
  alternatives_spanish:
  - los architas
  - el arquita
  lexicon: HALOT
  rationale: Se mantiene el etnónimo en plural, como colectivo gentilicio. «Arquitas» conserva la transliteración al español y evita la forma más helenizada «architas», que podría oscurecer el vínculo con el hebreo.
- source_word: עֲטָרוֹת
  english_pob_choice: Ataroth
  chosen_spanish: Atarot
  alternatives_spanish:
  - Ataroth
  lexicon: HALOT
  rationale: Se conserva el topónimo propio en transliteración bíblica estándar al español, «Atarot», que es más natural para lectores de español que la forma inglesa.
translation_notes:
  revision_awareness: El texto inglés reciente no requirió cambios según el registro de revisión; la versión española sigue esa misma lectura, manteniendo el valor direccional de לוּזָה y el etnónimo gentilicio de הָאַרְכִּי.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o fórmulas litúrgicas porque este versículo es una descripción topográfica sin referencias divinas.
  - «Betel» y «Atarot» se uniforman con la práctica bíblica en español, mientras «Luz» se deja como topónimo distinto.
  - El sujeto implícito del movimiento se conserva en español mediante verbos inacusativos/narrativos, en línea con el contexto de límites tribales.
