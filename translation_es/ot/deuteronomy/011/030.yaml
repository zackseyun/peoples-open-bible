translation:
  language: es
  text: ¿No están más allá del Jordán[a], detrás del camino de la puesta del sol[b], en la tierra de los cananeos que habitan en el Arabá, frente a Gilgal, junto a los robles de Moré[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “al otro lado del Jordán”. La expresión hebrea es un modismo geográfico cuyo sentido exacto depende del punto de vista.
    reason: lexical_alternative
  - marker: b
    text: Lit., “detrás del camino de la puesta del sol”; es decir, hacia el occidente.
    reason: lexical_alternative
  - marker: c
    text: O “los terebintos de Moré”. El término hebreo puede referirse a grandes árboles de más de un tipo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Are they not
  chosen_spanish: ¿No están ellos…?
  alternatives_spanish:
  - ¿Acaso no están ellos…?
  - ¿No están?
  lexicon: HALOT
  rationale: La pregunta retórica espera afirmación. En español, “¿No están ellos…?” conserva el valor interrogativo y la referencia plural del pronombre הֵמָּה.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - éstos
  - aquellos
  lexicon: HALOT
  rationale: El pronombre apunta a los dos montes mencionados en el contexto inmediato. “Ellos” mantiene la referencia plural sin añadir énfasis interpretativo.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: más allá del Jordán
  alternatives_spanish:
  - al otro lado del Jordán
  - al otro lado del Jordán
  lexicon: HALOT
  rationale: Es un giro geográfico idiomático. “Más allá del Jordán” conserva el valor espacial sin fijar de antemano el punto de vista.
- source_word: אַחֲרֵי דֶּרֶךְ מְבוֹא הַשֶּׁמֶשׁ
  english_pob_choice: behind the way of the setting sun
  chosen_spanish: detrás del camino de la entrada del sol
  alternatives_spanish:
  - tras el camino de la puesta del sol
  - detrás del camino del ocaso
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de “la entrada del sol” sin convertirla de inmediato en una dirección cardinal. “Detrás del camino” refleja אַחֲרֵי y “camino” refleja דֶּרֶךְ.
- source_word: בְּאֶרֶץ הַכְּנַעֲנִי
  english_pob_choice: in the land of the Canaanites
  chosen_spanish: en la tierra de los cananeos
  alternatives_spanish:
  - en la tierra del cananeo
  lexicon: HALOT
  rationale: Aunque el hebreo usa un etnónimo singular colectivo, el plural “cananeos” es la forma natural en español cuando se refiere al grupo humano.
- source_word: הַיֹּשֵׁב בָּעֲרָבָה
  english_pob_choice: who dwell in the Arabah
  chosen_spanish: que habitan en el Arabá
  alternatives_spanish:
  - que viven en el Arabá
  - que moran en el Arabá
  lexicon: HALOT
  rationale: El participio colectivo se vierte naturalmente con plural en español. “Arabá” se conserva como nombre geográfico propio, en lugar de generalizarse como “llanura”.
- source_word: מוּל
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  lexicon: HALOT
  rationale: “Frente a” comunica la correspondencia espacial de forma clara y natural en español, sin perder la relación de ubicación.
- source_word: הַגִּלְגָּל
  english_pob_choice: Gilgal
  chosen_spanish: Gilgal
  alternatives_spanish:
  - el Gilgal
  lexicon: HALOT
  rationale: Se translitera el topónimo como nombre propio conocido en la tradición bíblica.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - cerca de
  - al lado de
  lexicon: HALOT
  rationale: “Junto a” expresa proximidad de modo claro y sobrio, equivalente a la relación locativa del hebreo.
- source_word: אֵלוֹנֵי מֹרֶה
  english_pob_choice: the oaks of Moreh
  chosen_spanish: las encinas de Moré
  alternatives_spanish:
  - los robles de Moré
  - los terebintos de Moré
  lexicon: HALOT
  rationale: El hebreo אֵלוֹן puede referirse a árbol grande, especialmente roble o terebinto. “Encinas” es una opción castellana bíblica y digna; se preserva la alternativa botánica en nota porque el término admite más de una identificación.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del audit trail inglés, que revisó la frase direccional de “west of the road of the setting sun” a “behind the way of the setting sun” para evitar sobreinterpretar el hebreo como una dirección cardinal fija. Por eso el español conserva la imagen locativa sin convertirla en “occidente” en el texto principal, dejando esa explicación en nota.
  spanish_consistency_notes:
  - Se mantiene “Jordán” como topónimo bíblico estándar.
  - Se conserva “Arabá” como nombre geográfico propio.
  - Se usa “cananeos” en plural para concordar naturalmente con el grupo humano.
  - Se evita “SEÑOR” u otras sustituciones no presentes en este versículo.
  - La nota sobre los árboles mantiene abierta la alternativa botánica sin borrar la ambigüedad hebrea.
