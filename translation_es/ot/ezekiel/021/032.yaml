translation:
  language: es
  text: Ruina, ruina, ruina[a]. La haré. Esto tampoco será, hasta que venga aquel a quien le corresponde[b], y se la daré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Derrocamiento, derrocamiento, derrocamiento». El hebreo repite un sustantivo tres veces para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuyo derecho es»; también puede entenderse «a quien pertenece el juicio» o «a quien legítimamente le corresponde». Muchos intérpretes ven aquí una alusión a Génesis 49:10 y, por tanto, una referencia mesiánica.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַוָּה עַוָּה עַוָּה
  english_pob_choice: A ruin, a ruin, a ruin
  chosen_spanish: ¡Ruina, ruina, ruina!
  alternatives_spanish:
  - ¡Derrocamiento, derrocamiento, derrocamiento!
  - ¡Arrasamiento, arrasamiento, arrasamiento!
  - Ruina, ruina, ruina
  lexicon: HALOT
  rationale: El hebreo repite tres veces un sustantivo/exclamación para intensificar la sentencia. «Ruina» conserva el valor nominal y la fuerza retórica sin convertirlo en una paráfrasis más amplia.
- source_word: אֲשִׂימֶנָּה
  english_pob_choice: I will make it
  chosen_spanish: Yo la pondré
  alternatives_spanish:
  - La haré
  - La estableceré
  - La convertiré en ruina
  lexicon: HALOT
  rationale: El verbo שׂים tiene el sentido básico de poner/colocar/hacer. En español, «la pondré» reproduce de manera breve la acción divina de ejecutar la sentencia sobre el estado anunciado, sin añadir más contenido del que el hebreo exige.
- source_word: גַּם זֹאת
  english_pob_choice: This also
  chosen_spanish: Esto tampoco
  alternatives_spanish:
  - Esto también
  - También esto
  - Aun esto
  lexicon: HALOT
  rationale: 'El contexto es de negación y suspensión: la frase siguiente dice que no existirá hasta que llegue el legítimo heredero. Por eso «esto tampoco» comunica mejor la acumulación negativa sin perder el valor aditivo de גַּם.'
- source_word: לֹא הָיָה
  english_pob_choice: shall not be
  chosen_spanish: no será
  alternatives_spanish:
  - no existirá
  - no permanecerá
  - no habrá
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, el discurso profético mira al futuro. «No será» mantiene la proyección futura y resulta natural en español.
- source_word: עַד בֹּא
  english_pob_choice: until he comes
  chosen_spanish: hasta que venga
  alternatives_spanish:
  - hasta la venida de
  - hasta que llegue
  - hasta que aparezca
  lexicon: HALOT
  rationale: La cláusula temporal pide una construcción fluida en español. «Hasta que venga» conserva el valor de espera y llegada sin sobreespecificar el modo de venida.
- source_word: אֲשֶׁר ל֥/וֹ הַ/מִּשְׁפָּ֖ט
  english_pob_choice: whose right it is
  chosen_spanish: a quien le corresponde
  alternatives_spanish:
  - cuya es la justicia
  - a quien pertenece el derecho
  - de quien es el juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar juicio, justicia o derecho legal. En este contexto de sucesión/regencia, «a quien le corresponde» expresa la idea de pertenencia legítima sin decidir prematuramente entre «juicio», «justicia» o «derecho».
- source_word: וּנְתַתִּיו
  english_pob_choice: and I will give it to him
  chosen_spanish: y se la daré
  alternatives_spanish:
  - y se lo daré
  - y la entregaré a él
  - y se la entregaré
  lexicon: HALOT
  rationale: El objeto implícito en hebreo es femenino, referido a la realidad de la soberanía/insignia/orden real mencionado en el contexto. «Se la daré» conserva la referencia femenina y la transferencia divina del poder con naturalidad en español.
theological_decisions:
- issue: Referente final de «a quien le corresponde / cuyo derecho es»
  english_pob_reading: Preserve the text's open-ended rightful-heir language without explicitly identifying the referent in the main text.
  chosen_spanish_reading: 'Mantener una formulación abierta: «a quien le corresponde».'
  alternative_spanish_readings:
  - «al Mesías»
  - «al heredero davídico»
  - «al que tiene el derecho»
  rationale: El hebreo no nombra explícitamente al personaje. La tradición interpreta con frecuencia la frase en sentido mesiánico y puede aludir a Génesis 49:10, pero el texto mismo conserva una ambigüedad significativa. La redacción española preserva esa tensión sin resolverla en el cuerpo principal.
  doctrine_reference: Preservar la tensión teológica del texto sin añadir una identificación doctrinal en la traducción principal.
translation_notes:
  revision_awareness: 'La redacción sigue el cierre revisado de la nota inglesa: «I will make it» en vez de una expansión tipo «I will make it so», manteniendo el valor verbal simple de אֲשִׂימֶנָּה. También conserva la tensión interpretativa del final sin resolverla explícitamente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma de referencia divina general según la norma del proyecto, pero en este versículo Dios habla en primera persona y no aparece el tetragrámaton explícito en el texto hebreo.
  - Se conservó el pronombre femenino en «se la daré» para reflejar el antecedente implícito femenino del hebreo.
  - «Ruina» se eligió como equivalente principal por su fuerza nominal y su capacidad de reproducir la triple repetición retórica.
