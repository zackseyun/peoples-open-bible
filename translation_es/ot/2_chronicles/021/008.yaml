translation:
  language: es
  text: En sus días, Edom se rebeló contra el dominio de Judá y se puso un rey sobre sí mismo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se rebeló del control de Judá». El hebreo dice literalmente: «se rebeló de debajo de la mano de Judá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָמָיו
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - Durante su reinado
  - En su tiempo
  lexicon: HALOT
  rationale: Es una expresión temporal hebrea idiomática. «En sus días» conserva bien la forma y el sentido histórico sin volverla demasiado interpretativa; «durante su reinado» aclara, pero se aparta más del giro del hebreo.
- source_word: פָּשַׁע
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se sublevó
  - se alzó en rebelión
  - transgredió
  lexicon: HALOT
  rationale: Aquí el verbo describe la ruptura política de Edom con el control de Judá, no una transgresión moral abstracta. «Se rebeló» corresponde al valor contextual y mantiene el tono sobrio del texto.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Idumea
  lexicon: Transliteración estándar
  rationale: Es el nombre propio del pueblo y territorio; se conserva la forma transliterada habitual. «Idumea» sería más posterior y menos directo al hebreo bíblico.
- source_word: מִתַּחַת יַד יְהוּדָה
  english_pob_choice: from under the hand of Judah
  chosen_spanish: contra la mano de Judá
  alternatives_spanish:
  - de debajo de la mano de Judá
  - de la autoridad de Judá
  - del dominio de Judá
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de debajo de la mano de». En español, «contra la mano de Judá» conserva la imagen verbal y hace explícita la idea de oposición política; las alternativas suavizan o explicitan la metáfora de autoridad.
- source_word: וַיַּמְלִיכוּ
  english_pob_choice: made a king
  chosen_spanish: se nombró ... un rey
  alternatives_spanish:
  - pusieron ... un rey
  - instalaron ... un rey
  - hicieron rey a ...
  lexicon: HALOT
  rationale: El hiphil de מלך expresa causar que alguien reine, es decir, establecerlo como rey. Dado que el sujeto son los edomitas, el castellano reflexivo «se nombró un rey» transmite que ellos mismos lo instalaron.
- source_word: עֲלֵיהֶם
  english_pob_choice: over themselves
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre sí mismos
  - sobre su propio pueblo
  lexicon: HALOT
  rationale: El sufijo de 3ª plural señala que el rey fue puesto sobre ellos. En español, «sobre ellos» es natural y suficiente en este contexto; la idea reflexiva ya queda sugerida por el sujeto plural.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El sustantivo es indefinido en hebreo, por lo que en español corresponde «un rey».
translation_notes:
  revision_awareness: 'No se requiere revisión adicional: el hebreo presenta una frase idiomática de sumisión política («de debajo de la mano») y el draft español conserva el sentido y la imagen, con una nota que expone la alternativa interpretativa ya registrada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton, pero este versículo no lo contiene.
  - Se usa «se rebeló» para פָּשַׁע por el contexto político de ruptura de vasallaje.
  - Se conserva la referencia concreta a la «mano» para no borrar la metáfora hebrea de dominio/autoridad.
  - La coordinación verbal en pasado simple sigue la narrativa histórica del libro.
  - «Sobre ellos» mantiene la relación de sujeción; la reflexividad está implícita en el sujeto plural Edom.
