review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura del informe, la pertenencia de Ahitofel al grupo de conspiradores con Absalón, y la oración dirigida a Yahvé. Sin embargo, la cláusula final no suena plenamente natural en español: «vuelve necio el consejo» es comprensible, pero torpe, y no refleja tan bien como podría la idea de convertir el consejo en necedad/insensatez. También «se informó a David» es menos idiomático que una fórmula narrativa más directa e impersonal.'
  spanish_quality_summary: El texto es generalmente claro y fiel, pero requiere un pequeño ajuste de naturalidad y dignidad estilística. «Le avisaron a David» fluye mejor en narrativa bíblica que «se informó a David», y «convierte en necedad el consejo de Ahitofel» expresa mejor el sentido hebreo y la decisión léxica auditada que «vuelve necio el consejo de Ahitofel».
  glossary_alignment: 'Se mantiene correctamente «Yahvé» para יְהוָה. «Consejo» para עֲצַת y «conspiradores» para בַּקֹּשְׁרִים están bien alineados. La principal mejora necesaria es en סַכֶּל: conviene una formulación española que preserve la idea de hacer del consejo una necedad, no solo describirlo con un adjetivo poco natural.'
  issues:
  - severity: medium
    issue: «se informó a David» suena administrativo más que narrativo-bíblico
    rationale: Aunque es fiel al impersonal del hebreo, en español bíblico natural resulta más idiomático «le avisaron a David» o «le informaron a David». La fórmula actual suena demasiado institucional.
  - severity: medium
    issue: «vuelve necio el consejo de Ahitofel» es poco natural en español
    rationale: Preserva parcialmente la semántica, pero la combinación verbo + adjetivo aplicada a «consejo» suena forzada. «Convierte en necedad el consejo de Ahitofel» o similar representa mejor el hebreo y la nota léxica.
  - severity: low
    issue: La nota al pie usa «sea hecho necio», también algo rígido
    rationale: Puede mejorarse levemente a «sea convertido en necedad» para corresponderse con la revisión principal y sonar mejor en español, manteniendo la alternativa «frustra».
  revised_spanish_text: 'Y le avisaron a David, diciendo: «Ahitofel está entre los conspiradores con Absalón». Y David dijo: «Oh Yahvé, por favor convierte en necedad[a] el consejo de Ahitofel».'
  revised_footnotes:
