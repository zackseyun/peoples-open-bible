review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del hebreo: todos estos pertenecen a los hijos/descendientes de Jediael, se los enumera en relación con las cabezas de las casas paternas, son hombres de valor militar, y suman 17.200 disponibles para servicio bélico. Sin embargo, dos puntos requieren ajuste para mayor fidelidad: «según las cabezas» suena poco natural en español y no expresa bien la idea de clasificación genealógica; y «los que salían para la guerra» omite el elemento explícito de צָבָא («ejército/servicio militar»), que sí está preservado en la nota y en el rastro inglés.'
  spanish_quality_summary: El español es en general claro y digno, pero «según las cabezas de las casas paternas» es torpe y poco idiomático; «cabezas» como sustantivo personal en este contexto resulta demasiado literal. También conviene integrar mejor la última frase para que suene natural en español bíblico moderno. El resto del verso funciona bien.
  glossary_alignment: No hay términos teológicos mayores en disputa. «hijos de Jediael» concuerda con la decisión POB, con nota alternativa adecuada para «descendientes». «casas paternas» preserva bien el trasfondo social bíblico. «poderosos guerreros» es aceptable para גִּבּוֹרֵי חֲיָלִים, aunque la nota conserva la alternativa más literal. El principal desajuste léxico está en יֹצְאֵי צָבָא, donde debe mantenerse explícitamente la referencia al ejército o servicio militar.
  issues:
  - severity: medium
    issue: «según las cabezas de las casas paternas» es una formulación poco natural
    rationale: Aunque refleja léxicamente לְרָאשֵׁי, en español «cabezas» como jefes de familia/clan suena forzado. «conforme a los jefes de las casas paternas» comunica mejor la clasificación genealógica sin perder el contenido.
  - severity: medium
    issue: «los que salían para la guerra» no conserva explícitamente «ejército» en יֹצְאֵי צָבָא
    rationale: El hebreo dice literalmente algo como «los que salían al ejército para la guerra». La versión actual reduce el modismo a «salían para la guerra», lo cual debilita la referencia a disponibilidad militar organizada. Debe recuperarse «al ejército» o una formulación equivalente.
