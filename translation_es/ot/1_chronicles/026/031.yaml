translation:
  language: es
  text: Para los hebronitas[a], Jerías fue el jefe[b] de los hebronitas, según sus generaciones por casas paternas[c]. En el cuadragésimo año del reinado de David fueron buscados, y entre ellos se hallaron hombres de valor en Jazer de Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Acerca de los hebronitas». La partícula inicial puede funcionar como encabezamiento tópico del clan, no sólo como destinatario literal.'
    reason: lexical_alternative
  - marker: b
    text: «Jefe» traduce aquí el valor administrativo de רֹאשׁ; también puede leerse «cabeza» o «líder».
    reason: lexical_alternative
  - marker: c
    text: «Casas paternas» es un término de clan que se refiere a agrupaciones domésticas ancestrales, no sólo a familias nucleares.
    reason: cultural_note
lexical_decisions:
- source_word: לַחֶבְרוֹנִי
  english_pob_choice: For the Hebronites
  chosen_spanish: Para los hebronitas
  alternatives_spanish:
  - Acerca de los hebronitas
  - De los hebronitas
  lexicon: HALOT
  rationale: La ל inicial introduce un encabezamiento tópico/clánico; en español, «Para los hebronitas» conserva esa función discursiva sin volverlo mecánico. Se mantiene el nombre del grupo como etnónimo/clan levítico.
- source_word: יְרִיָּה
  english_pob_choice: Jeriah
  chosen_spanish: Jerías
  alternatives_spanish:
  - Jereías
  - Jerías
  lexicon: HALOT
  rationale: Se translitera el nombre propio con forma española natural y readable. «Jerías» conserva la referencia consonántica y evita una forma excesivamente anglicada.
- source_word: הָרֹאשׁ
  english_pob_choice: was the chief
  chosen_spanish: fue el jefe
  alternatives_spanish:
  - fue la cabeza
  - fue el líder
  lexicon: HALOT
  rationale: En contexto administrativo y genealógico, רֹאשׁ designa al principal del grupo. «Jefe» es el equivalente español más claro y digno; «cabeza» sería más literal pero menos natural.
- source_word: לְתֹלְדֹתָיו לְאָבוֹת
  english_pob_choice: according to his generations by fathers’ houses
  chosen_spanish: según sus generaciones por casas paternas
  alternatives_spanish:
  - según sus genealogías por casas de padres
  - por sus generaciones, por casas paternas
  lexicon: HALOT
  rationale: Se conserva la doble estructura de תולדות + אבות. «Generaciones» mantiene el linaje; «casas paternas» preserva el término técnico de agrupación clanica. El posesivo «sus» refleja el sufijo del hebreo y la referencia a la línea/clan representado por Jerías.
- source_word: בִּשְׁנַת הָאַרְבָּעִים לְמַלְכוּת דָּוִיד
  english_pob_choice: In the fortieth year of David’s reign
  chosen_spanish: En el cuadragésimo año del reinado de David
  alternatives_spanish:
  - En el año cuarenta del reinado de David
  - En el cuadragésimo año de la realeza de David
  lexicon: HALOT
  rationale: Se sigue la fórmula cronológica regnal de manera directa. «Reinado» es el equivalente español más natural para מלכות en este contexto.
- source_word: נִדְרָשׁוּ
  english_pob_choice: they were sought out
  chosen_spanish: fueron buscados
  alternatives_spanish:
  - fueron buscados e investigados
  - fueron indagados
  lexicon: HALOT
  rationale: El nifal de דרש aquí expresa una búsqueda/investigación formal. «Fueron buscados» conserva la pasiva y es suficientemente amplio para incluir la revisión genealógica o administrativa implícita.
- source_word: וַיִּמָּצֵא בָהֶם
  english_pob_choice: and among them ... were found
  chosen_spanish: y entre ellos se hallaron
  alternatives_spanish:
  - y entre ellos fueron encontrados
  - y se encontró entre ellos
  lexicon: HALOT
  rationale: El giro idiomático se vierte con pasiva impersonal natural en español. «Se hallaron» mantiene el hallazgo dentro del grupo, como en el hebreo y en la lectura auditada del inglés.
- source_word: גִּבּוֹרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres poderosos
  - guerreros valientes
  - hombres de valor
  lexicon: HALOT
  rationale: En este contexto administrativo el sintagma puede indicar hombres distinguidos por capacidad o valor. «Hombres valientes» conserva la fuerza del hebreo sin imponer necesariamente un matiz militar más estrecho que el requerido por el contexto.
- source_word: בְּיַעְזֵיר גִּלְעָד
  english_pob_choice: at Jazer of Gilead
  chosen_spanish: en Jazer de Galaad
  alternatives_spanish:
  - en Jazer de Gilead
  - en Jazer, de Galaad
  lexicon: HALOT
  rationale: Se usa la forma española tradicional «Galaad» y la preposición locativa «en» para la localización del hallazgo. «Jazer» preserva el topónimo estándar.
theological_decisions:
- issue: Valor del encabezamiento clánico introducido por לַחֶבְרוֹנִי
  english_pob_reading: For the Hebronites
  chosen_spanish_reading: Para los hebronitas
  alternative_spanish_readings:
  - Acerca de los hebronitas
  - De los hebronitas
  rationale: No hay una cuestión doctrinal, sino de función discursiva. La preposición inicial marca una sección/clan; «Para» reproduce el valor tópico que la POB inglesa quiso conservar.
  doctrine_reference: No aplica; decisión discursiva/genealógica.
- issue: Sentido de גִּבּוֹרֵי חַיִל
  english_pob_reading: mighty men of valor
  chosen_spanish_reading: hombres valientes
  alternative_spanish_readings:
  - mighty warriors
  - capaces hombres
  - hombres de valor
  rationale: La POB deja abierta la tensión entre capacidad y valentía. En español se evita cerrar el sentido exclusivamente a lo militar, pero se conserva la dignidad y el relieve del calificativo.
  doctrine_reference: No aplica; matiz léxico del retrato de los varones encontrados.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «searched out» por «sought out» para mayor naturalidad. En español se optó por «fueron buscados», que preserva la pasiva del hebreo y la amplitud semántica del verbo sin sonar forzado. También se mantuvo la estructura paralela del miembro final y la localización geográfica, ajustando sólo la formulación al español.
  spanish_consistency_notes:
  - Se usó «hebronitas» en minúscula por tratarse de un gentilicio/clan, salvo inicio de oración.
  - Se eligió «casas paternas» para mantener el término técnico de organización familiar-clánica.
  - Se evitó «SEÑOR» porque el verso no contiene el Tetragrámaton.
  - «Galaad» sigue la convención española habitual para el topónimo bíblico.
