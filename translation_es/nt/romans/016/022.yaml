translation:
  language: es
  text: Yo[a], Tercio, que escribí la carta, los saludo en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probable: "Yo, Tercio, que escribí la carta en el Señor, los saludo". La frase griega "en el Señor" también podría entenderse con "escribí", aunque modifica más naturalmente el saludo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάζομαι
  english_pob_choice: greet
  chosen_spanish: los saludo
  alternatives_spanish:
  - les saludo
  - os saludo
  lexicon: BDAG
  rationale: En español, el verbo natural y digno en un cierre epistolar es 'saludar'. 'Los saludo' conserva el valor de saludo personal sin añadir afecto no explicitado por el griego.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - les
  - os
  lexicon: BDAG
  rationale: El griego marca segunda persona plural; en español latinoamericano, 'los' es una forma clara y amplia de destinatarios plurales. Se evita 'ustedes' aquí para mantener la economía del saludo integrado al verbo.
- source_word: ἐγὼ Τέρτιος
  english_pob_choice: I, Tertius
  chosen_spanish: Yo, Tercio
  alternatives_spanish:
  - Yo—Tercio
  - Yo mismo, Tercio
  lexicon: BDAG
  rationale: El pronombre explícito más el nombre propio subrayan la autodeclaración del escribiente. 'Yo, Tercio' preserva esa identificación de modo idiomático en español.
- source_word: ὁ γράψας
  english_pob_choice: who wrote
  chosen_spanish: que escribí
  alternatives_spanish:
  - el que escribió
  - quien escribió
  lexicon: BDAG
  rationale: El participio aoristo articular identifica a Tercio como quien escribió materialmente la carta. En español, la relativa con primera persona singular funciona de manera natural porque el hablante ya se ha identificado como 'Yo, Tercio'.
- source_word: τὴν ἐπιστολήν
  english_pob_choice: the letter
  chosen_spanish: la carta
  alternatives_spanish:
  - la epístola
  - esta carta
  lexicon: BDAG
  rationale: '''Carta'' es el equivalente más natural y claro para ἐπιστολή en español moderno. ''Epístola'' suena más técnico o eclesiástico, y ''esta carta'' añade una demostración que el griego no requiere.'
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - como uno en el Señor
  - en unión con el Señor
  lexicon: BDAG
  rationale: Se mantiene la fórmula paulina tradicional y transparente 'en el Señor'. 'Señor' corresponde a κύριος en este contexto cristológico.
theological_decisions:
- issue: Alcance de 'en el Señor'
  english_pob_reading: 'Retained as a relational/sphere expression modifying the greeting: Tertius greets the recipients in the Lord.'
  chosen_spanish_reading: 'Se conserva como expresión de esfera o relación que modifica el saludo: Tercio los saluda en el Señor.'
  alternative_spanish_readings:
  - Yo, Tercio, que escribí la carta en el Señor, los saludo.
  - Yo, Tercio, que escribí la carta, los saludo como hermano en el Señor.
  rationale: La frase se entiende más naturalmente con el saludo, no con 'escribí'. La traducción conserva la ambigüedad mínima del original mediante una formulación directa, sin explicitar más de lo que el texto dice.
  doctrine_reference: 'Translation philosophy §3; Contested terms: κύριος → Señor'
- issue: Identidad del hablante y función del participio
  english_pob_reading: '''I, Tertius, who wrote the letter'' identifies the amanuensis plainly.'
  chosen_spanish_reading: '''Yo, Tercio, que escribí la carta'' identifica de forma directa al escribiente.'
  alternative_spanish_readings:
  - '''Yo, Tercio, el que escribió la carta'''
  - '''Yo, Tercio, quien escribió la carta'''
  rationale: 'La construcción española mantiene el sentido del participio articular: Tercio es el que materialmente escribió la carta. No se introduce una distinción doctrinal o histórica adicional que el versículo no expone.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el estado de alta concordancia del auditor inglés: no se requieren revisiones textuales. La versión española sigue la misma decisión interpretativa principal, manteniendo la ambigüedad leve de ἐν κυρίῳ y la identificación explícita de Tercio como escribiente.'
  spanish_consistency_notes:
  - Se preserva el cierre epistolar breve y personal del griego.
  - '''Señor'' se usa para κύριος conforme al criterio confesional del proyecto.'
  - Se evita 'epístola' en el texto principal por claridad contemporánea, sin perder el valor formal de la carta.
  - La marca de nota al pie [a] aparece en el punto exacto donde se abre la ambigüedad sintáctica.
