translation:
  language: es
  text: Él levantó las columnas delante de la nave[a], una a la derecha y otra a la izquierda; y llamó a la de la derecha Jaquín, y a la de la izquierda Boaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la sala principal del templo». Hebreo heikhal; aquí se refiere al salón principal del edificio del templo, no necesariamente a todo el recinto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  english_pob_choice: He set up
  chosen_spanish: Él levantó
  alternatives_spanish:
  - Él colocó
  - Él erigió
  - Él estableció
  lexicon: HALOT
  rationale: El verbo הִקִים aquí expresa causar que los pilares quedaran en pie en su lugar. «Levantó» conserva la acción física sin sonar mecánico y funciona bien en español bíblico contemporáneo.
- source_word: הָעַמּוּדִים
  english_pob_choice: the pillars
  chosen_spanish: las columnas
  alternatives_spanish:
  - los pilares
  - las columnas del templo
  lexicon: HALOT
  rationale: עַמּוּדִים puede referirse a pilares o columnas estructurales. En español, «columnas» es claro y natural en un contexto arquitectónico; «pilares» también sería posible, pero «columnas» evita una repetición fuerte con usos más teológicos de «pilar» en español.
- source_word: עַל־פְּנֵי הַהֵיכָל
  english_pob_choice: in front of the nave
  chosen_spanish: delante del pórtico[b]
  alternatives_spanish:
  - en frente del santuario
  - delante del templo-hall
  lexicon: HALOT
  rationale: הֵיכָל en este contexto designa la sala principal del edificio, no necesariamente todo el complejo. «Pórtico» comunica la idea de la parte frontal/antigua sala de entrada en español bíblico, aunque es un equivalente aproximado; por eso se documenta la alternativa de sentido en nota.
- source_word: אֶחָד מִיָּמִין וְאֶחָד מֵהַשְּׂמֹאול
  english_pob_choice: one on the right and one on the left
  chosen_spanish: una a la derecha y otra a la izquierda
  alternatives_spanish:
  - una del lado derecho y otra del lado izquierdo
  - una a la diestra y otra a la siniestra
  lexicon: HALOT
  rationale: El hebreo usa lenguaje direccional simple. «A la derecha / a la izquierda» preserva la orientación sin introducir direcciones cardinales que el texto no explicita.
- source_word: וַיִּקְרָא שֵׁם
  english_pob_choice: he called the name of
  chosen_spanish: llamó a
  alternatives_spanish:
  - nombró a
  - puso por nombre a
  lexicon: HALOT
  rationale: El hebreo tiene la fórmula idiomática «llamar el nombre de». En español, «llamó a» mantiene la estructura nominal y resulta más natural que una traducción demasiado literal.
- source_word: הַיְמִינִי
  english_pob_choice: the one on the right
  chosen_spanish: la de la derecha
  alternatives_spanish:
  - la derecha
  - la del lado derecho
  lexicon: HALOT
  rationale: El adjetivo señala el lado derecho. La forma femenina concuerda con «columna» y conserva la referencia contextual al primer pilar.
- source_word: יָכִין
  english_pob_choice: Jachin
  chosen_spanish: Jaquín
  alternatives_spanish:
  - Jachín
  - Yaquín
  lexicon: HALOT
  rationale: Es un nombre propio. «Jaquín» sigue la forma tradicional española usada en biblias en castellano y mantiene la identidad del nombre sin reinterpretarlo.
- source_word: הַשְּׂמָאלִי
  english_pob_choice: the one on the left
  chosen_spanish: la de la izquierda
  alternatives_spanish:
  - la izquierda
  - la del lado izquierdo
  lexicon: HALOT
  rationale: Como en la frase anterior, el hebreo marca el lado. Se conserva la simetría con «la de la derecha» y la concordancia con el sustantivo implícito «columna».
- source_word: בֹּעַז
  english_pob_choice: Boaz
  chosen_spanish: Boaz
  alternatives_spanish:
  - Booz
  lexicon: HALOT
  rationale: Es un nombre propio. Se conserva la transliteración usual «Boaz»; «Booz» sería una forma más tradicional en español, pero menos transparente para lectores modernos.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo masorético y el sentido auditado de la POB en inglés. Se conservó la estructura paralela de las dos columnas y sus nombres propios, y se mantuvo la distinción espacial «derecha / izquierda» sin convertirla en direcciones cardinales. No se incorporan revisiones textuales porque el expediente indica acuerdo alto y sin cambios.
  spanish_consistency_notes:
  - Se prefirió «columna(s)» para עַמּוּדִים por claridad arquitectónica en español.
  - Se mantuvo «Jaquín» y «Boaz» como nombres propios, sin glosas en el texto principal.
  - Se evitó «SEÑOR» o equivalentes teológicos porque el versículo no contiene el tetragrámaton.
  - La nota sobre heikhal preserva la tensión semántica entre «pórtico/sala principal» sin imponer una sola solución terminológica.
