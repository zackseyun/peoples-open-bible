translation:
  language: es
  text: 'Y ella dijo[a]: «Mira, tu cuñada ha vuelto a su pueblo y a sus dioses[b]. Vuelve tras tu cuñada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha regresado». El verbo hebreo שוב se repite en este versículo para la acción de Orfa y para el mandato de Noemí a Rut.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «a sus dioses»; algunos traducen «a su dios», pero el plural probablemente se refiere a las deidades de Moab.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y ella dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce la intervención de Noemí. «Y ella dijo» conserva el flujo narrativo sin añadir una relación temporal más fuerte que la del hebreo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre la situación. «Mira» comunica ese señalamiento en español actual sin recurrir a un arcaísmo.
- source_word: שָׁבָה
  english_pob_choice: has gone back
  chosen_spanish: ha vuelto
  alternatives_spanish:
  - ha regresado
  - ha ido de vuelta
  - ha tornado
  lexicon: HALOT
  rationale: El perfecto qal de שוב indica una acción ya completada. «Ha vuelto» reproduce bien el valor de retorno y mantiene la repetición léxica de שוב en el versículo.
- source_word: יְבִמְתֵּךְ
  english_pob_choice: your sister-in-law
  chosen_spanish: tu cuñada
  alternatives_spanish:
  - la mujer de tu cuñado
  - tu concuña
  lexicon: HALOT
  rationale: El término designa la relación de afinidad femenina del contexto. «Cuñada» es la equivalencia idiomática clara en español y conserva la referencia familiar requerida por la escena.
- source_word: אֶל עַמָּהּ
  english_pob_choice: to her people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su nación
  lexicon: HALOT
  rationale: עַם aquí apunta al grupo étnico/comunitario de Orfa. «Pueblo» mantiene ese sentido colectivo y suena natural en español bíblico contemporáneo.
- source_word: וְאֶל אֱלֹהֶיהָ
  english_pob_choice: and to her gods
  chosen_spanish: y a sus dioses
  alternatives_spanish:
  - y a su dios
  lexicon: HALOT
  rationale: La forma plural con sufijo femenino favorece el sentido de deidades moabitas. En español, el plural «dioses» preserva esa tensión y evita singularizar indebidamente el término.
- source_word: שׁוּבִי
  english_pob_choice: Go back
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuélvete
  lexicon: HALOT
  rationale: El imperativo de שוב dirige a Rut. «Vuelve» es natural en habla directa y hace eco de «ha vuelto» en la misma línea.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - después de
  - siguiendo a
  lexicon: HALOT
  rationale: La preposición expresa seguimiento/detrás de alguien. «Tras» conserva esa imagen de ir detrás de Orfa con un registro sobrio y fluido.
- source_word: יְבִמְתֵּךְ
  english_pob_choice: your sister-in-law
  chosen_spanish: tu cuñada
  alternatives_spanish:
  - la mujer de tu cuñado
  - tu concuña
  lexicon: HALOT
  rationale: La repetición del sustantivo en la cláusula final pide consistencia. Se mantiene «tu cuñada» para preservar la cohesión léxica del versículo.
theological_decisions:
- issue: Plural de אֱלֹהִים aplicado al culto moabita
  english_pob_reading: her gods
  chosen_spanish_reading: sus dioses
  alternative_spanish_readings:
  - su dios
  rationale: Aunque el sustantivo puede ser singular en algunos contextos, aquí Noemí contrasta el retorno de Orfa a su pueblo con su pertenencia religiosa moabita. El plural español «dioses» conserva la referencia a deidades múltiples y evita una lectura monoteísta importada.
  doctrine_reference: Principio de primacía del texto fuente y conservación del sentido contextual inmediato.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el último pase de revisión indicó que el texto permanecía sin cambios y hubo alto acuerdo entre revisores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - «Cuñada» se usa de forma uniforme para יְבִמְתֵּךְ en ambas ocurrencias.
  - «Pueblo» conserva el valor colectivo de עַם sin reducirlo a familia inmediata.
  - Se preserva el plural «dioses» por la fuerza del hebreo y por coherencia con la nota textual.
