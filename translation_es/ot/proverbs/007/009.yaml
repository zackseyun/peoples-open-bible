translation:
  language: es
  text: al anochecer, al atardecer del día, en la negrura[a] de la noche y oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la noche cerrada»; literalmente, «en la pupila de la noche», un hebraísmo que señala la parte más oscura de la noche.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶשֶׁף
  english_pob_choice: twilight
  chosen_spanish: anochecer
  alternatives_spanish:
  - crepúsculo
  - al caer la tarde
  lexicon: HALOT
  rationale: נֶשֶׁף señala el tiempo de luz tenue al final del día; en este contexto, junto con otras expresiones de oscuridad, el sentido apunta al paso hacia la noche. 'Anochecer' comunica bien ese momento transicional en español y conserva la dirección temporal.
- source_word: עֶרֶב יוֹם
  english_pob_choice: the evening of the day
  chosen_spanish: el atardecer del día
  alternatives_spanish:
  - la tarde del día
  - la noche del día
  lexicon: HALOT
  rationale: La secuencia hebrea acumula expresiones temporales. 'El atardecer del día' mantiene la construcción doble sin reducirla a un solo término y resulta natural en español, preservando el énfasis progresivo del original.
- source_word: אִישׁוֹן לַיְלָה
  english_pob_choice: the black of night
  chosen_spanish: la negrura de la noche
  alternatives_spanish:
  - el pupil[o] de la noche
  - la oscuridad profunda de la noche
  - la medianoche
  lexicon: HALOT
  rationale: אִישׁוֹן es literalmente 'pupila' o, por extensión idiomática, la parte más oscura. En español, 'la negrura de la noche' reproduce el valor idiomático y evita una literalidad opaca como 'la pupila de la noche'.
- source_word: וַאֲפֵלָה
  english_pob_choice: and darkness
  chosen_spanish: y en la oscuridad
  alternatives_spanish:
  - y oscuridad
  - y tinieblas
  - y en la penumbra
  lexicon: HALOT
  rationale: אֲפֵלָה designa oscuridad/tinieblas espesas. 'Y en la oscuridad' mantiene el paralelismo y el avance acumulativo hacia la noche cerrada, con un español claro y digno.
- source_word: בְּ ... בְּ ... בְּ
  english_pob_choice: at ... in ... in ...
  chosen_spanish: al ... al ... en ...
  alternatives_spanish:
  - en ... en ... en ...
  - a ... a ... a ...
  lexicon: Hebrew grammar
  rationale: Las preposiciones repetidas marcan sucesivas ubicaciones temporales. En español conviene variar mínimamente entre 'al' y 'en' para sonar natural sin perder la progresión escalonada del hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el pasaje hebreo y el auditorio inglés: conserva la progresión temporal acumulativa y traduce el modismo אִישׁוֹן לַיְלָה por una equivalencia idiomática en español, no por una transliteración literal.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' en conformidad con el estándar POB cuando aparezca el nombre divino; en este versículo no aplica.
  - Se mantuvo una cadencia escalonada de tiempos del día para reflejar la estructura hebrea repetida con בְּ.
  - La nota al pie preserva la alternativa literal del hebraísmo sin forzarla en el cuerpo del texto.
