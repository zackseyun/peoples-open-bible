translation:
  language: es
  text: Yahvé se complace en los que le temen, en los que esperan[a] su amor leal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que esperan en su amor leal». El verbo hebreo puede implicar tanto esperar como esperar con confianza.'
    reason: lexical_alternative
  - marker: b
    text: «Amor leal» traduce el hebreo hesed, término asociado al amor fiel y de pacto de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוֹצֶה
  english_pob_choice: delights in
  chosen_spanish: se complace en
  alternatives_spanish:
  - se deleita en
  - tiene placer en
  - se agrada de
  lexicon: HALOT
  rationale: El participio expresa agrado favorable, no simple voluntad. «Se complace en» comunica bien ese deleite relacional en español sin endurecer el matiz.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme a la terminología POB en español y sin sustituirlo por un título.
- source_word: יְרֵאָיו
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que lo reverencian
  - los que le veneran
  lexicon: HALOT
  rationale: El hebreo mantiene el temor reverente del pacto. «Le temen» conserva la fuerza bíblica sin suavizarla a mera deferencia.
- source_word: הַמְיַחֲלִים
  english_pob_choice: those who hope for
  chosen_spanish: los que esperan
  alternatives_spanish:
  - los que esperan en
  - los que aguardan
  lexicon: HALOT
  rationale: El verbo puede abarcar esperar y esperar con esperanza. «Los que esperan» mantiene esa amplitud; el complemento posterior aclara el objeto de la esperanza.
- source_word: לְחַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su misericordia
  - su amor constante
  - su bondad fiel
  lexicon: HALOT
  rationale: חסד es un término de amor de pacto, no solo misericordia. «Amor leal» preserva la fidelidad relacional y el peso covenantal del término en un español natural.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa יְהוָה directamente; se mantiene el nombre propio divino para no ocultar el dato del texto fuente ni sustituirlo por una designación genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Temor reverente como rasgo del pueblo de Dios
  english_pob_reading: those who fear him
  chosen_spanish_reading: los que le temen
  alternative_spanish_readings:
  - los que le reverencian
  rationale: Se conserva la tensión teológica del temor del pacto. «Le temen» evita diluir el concepto en una mera actitud de respeto.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: חסד como amor leal de pacto
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - misericordia
  - amor constante
  - bondad fiel
  rationale: El término חסד combina lealtad, bondad y compromiso de pacto. «Amor leal» comunica esa densidad sin reducirlo a un solo aspecto.
  doctrine_reference: 'DOCTRINE.md: lexical-theological term handling for חסד'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «hope for» frente a «wait for» para מיחלים. En español, «esperan» conserva la amplitud semántica de esperar/aguardar con esperanza sin sobrecargar la frase, y el complemento «su amor leal» mantiene el objeto esperado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino principal, coherente con el estándar del proyecto en español.
  - Se evita «Cristo» o cualquier terminología cristológica ajena al verso.
  - «Le temen» preserva el registro reverente y bíblico; no se suaviza a «respetan».
  - «Amor leal» se usa para חסד en esta línea poética; no se sustituye por «misericordia» porque sería demasiado estrecho.
