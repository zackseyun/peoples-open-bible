translation:
  language: es
  text: Y recordaré mi pacto, que está entre mí y ustedes y todo ser vivo[a] de toda carne[b]; y las aguas nunca más volverán a convertirse en un diluvio para destruir toda carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''todo ser viviente''; hebreo: ''todo ser viviente de toda carne''.'
    reason: lexical_alternative
  - marker: b
    text: O 'entre toda carne'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתִּי
  english_pob_choice: and I will remember
  chosen_spanish: y recordaré
  alternatives_spanish:
  - y me acordaré
  - y tendré presente
  lexicon: HALOT
  rationale: Se conserva el valor futuro-volitivo en la voz divina y el término técnico 'recordar', que en contexto de pacto no se suaviza a una paráfrasis explicativa.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: '''Pacto'' transmite bien el sentido jurídico-relacional de בְּרִית y es claro en español bíblico contemporáneo. ''Alianza'' es posible, pero puede sonar más interpretativa en este contexto.'
- source_word: נֶפֶשׁ חַיָּה
  english_pob_choice: every living creature
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - todo ser vivo
  - toda criatura viviente
  lexicon: HALOT
  rationale: En este pasaje נֶפֶשׁ חַיָּה designa vida animada no humana y humana en conjunto; 'ser viviente' evita reducirlo solo a animales y conserva amplitud semántica.
- source_word: בְּכָל בָּשָׂר
  english_pob_choice: among all flesh
  chosen_spanish: de toda carne
  alternatives_spanish:
  - entre toda carne
  - en toda carne
  lexicon: HALOT
  rationale: El בְ aquí funciona de modo inclusivo/especificativo con כָּל־בָּשָׂר. 'De toda carne' resulta natural en español y mantiene la amplitud corporal/creada del hebreo sin restringirlo a seres humanos.
- source_word: הַמַּיִם לְמַבּוּל
  english_pob_choice: the waters will never again become a flood
  chosen_spanish: las aguas nunca más volverán a ser diluvio
  alternatives_spanish:
  - las aguas nunca más volverán a convertirse en diluvio
  - las aguas nunca más serán para diluvio
  lexicon: HALOT
  rationale: Se conserva la relación entre 'aguas' y 'diluvio' expresando la función/resulto del sustantivo con לְמַבּוּל. 'Ser diluvio' es menos literal que 'convertirse en', pero más fluido y fiel al efecto idiomático del hebreo.
- source_word: לְשַׁחֵת
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para arrasar
  - para exterminar
  lexicon: HALOT
  rationale: El infinitivo expresa propósito y 'destruir' corresponde al sentido básico de שׁחת en este marco narrativo. Mantiene el peso del juicio sin intensificarlo más allá del texto.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - todo ser humano
  - todo ser viviente
  lexicon: HALOT
  rationale: Se preserva la fórmula hebrea tradicional con el mismo alcance amplio e inclusivo para criaturas encarnadas, evitando reducirla a humanos.
theological_decisions:
- issue: Lenguaje antropopatético de la memoria divina
  english_pob_reading: Retain 'I will remember' without paraphrasing
  chosen_spanish_reading: Mantener 'recordaré' sin explicarlo como 'tendré presente' o 'actuaré en consecuencia'
  alternative_spanish_readings:
  - me acordaré
  - tendré presente
  - actuaré sobre mi pacto
  rationale: El hebreo dice explícitamente 'recordaré'. Conservarlo preserva la tensión teológica del lenguaje de pacto, sin resolverla mediante una paráfrasis que atenúe el antropomorfismo/antropopatismo.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La base inglesa tuvo una oscilación editorial entre 'of all flesh' y 'among all flesh'; el contexto auditado y la revisión más reciente apoyan la idea inclusiva/especificativa del hebreo בְכָל בָּשָׂר. La traducción española mantiene esa amplitud con 'de toda carne' y conserva el paralelismo del verso.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera explícitamente; en este versículo no aparece el tetragrámaton.
  - '''Pacto'' se usa de manera consistente para בְּרִית.'
  - '''Carne'' conserva el valor bíblico amplio de בָּשָׂר y no se reemplaza por ''humanidad'' porque el contexto incluye a los seres vivientes no humanos.'
  - '''Diluvio'' traduce מַבּוּל en coherencia con el uso bíblico tradicional y el valor de juicio catastrófico del término.'
  - La puntuación sigue el paralelismo del hebreo con una sola oración compuesta, adecuada para lectura pública.
