- from: También[a], todos sus días come en tinieblas[b], con mucha vejación y enfermedad y enojo.
  to: También, todos sus días come en tinieblas[a], con mucha frustración[b] y enfermedad y enojo.
  rationale: Se elimina la nota en «También», ya que el inglés no preserva allí una alternativa necesaria para el español. Se mantiene «en tinieblas» con su nota explicativa. Se corrige «vejación» a «frustración», que comunica mejor la agitación interior del hebreo y evita un falso amigo en español. La nota correspondiente se reescribe para conservar la elasticidad semántica documentada en la auditoría inglesa.
