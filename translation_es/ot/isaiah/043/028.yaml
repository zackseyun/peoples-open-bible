- from: Así profané a los príncipes del santuario[a], y entregué a Jacob al exterminio, y a Israel al reviling.
  to: Así profané a los príncipes del santuario, y entregué a Jacob al exterminio[a], y a Israel al oprobio.
  rationale: Se corrigió el anglicismo «reviling» por «oprobio», que comunica de forma natural el sentido de escarnio público e injuria. Se movió la nota [a] al término correspondiente a חֵרֶם y se ajustó su redacción para reflejar mejor la justificación léxica auditada. El resto del versículo se mantiene porque representa bien el hebreo y la línea traductológica del POB.
