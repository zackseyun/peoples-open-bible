translation:
  language: es
  text: Porque aun los animales irracionales tienen hacia su propia descendencia un afecto solidario y un afecto natural semejantes a los de los seres humanos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los animales no racionales». El griego contrapone criaturas privadas de capacidad racional con los seres humanos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hacia las cosas nacidas de ellos», es decir, su propia descendencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου γε καὶ
  english_pob_choice: For even
  chosen_spanish: Porque aun
  alternatives_spanish:
  - pues aun
  - ya que incluso
  - porque incluso
  lexicon: LSJ
  rationale: El griego introduce una razón/enfasis más que un valor locativo. «Porque aun» reproduce bien la fuerza inferencial y enfática sin sonar forzado en español.
- source_word: τὰ ἄλογα ζῷα
  english_pob_choice: the irrational animals
  chosen_spanish: los animales irracionales
  alternatives_spanish:
  - los animales no racionales
  - los animales sin razón
  - las bestias
  lexicon: LSJ
  rationale: «Irracionales» conserva el contraste filosófico del griego ἄλογα frente a los humanos con capacidad racional, y corresponde al matiz elegido en el POB inglés.
- source_word: ὁμοίαν
  english_pob_choice: like that of
  chosen_spanish: semejantes a
  alternatives_spanish:
  - como las de
  - similares a
  - parecidas a
  lexicon: LSJ
  rationale: La comparación se expresa con naturalidad en español mediante «semejantes a», evitando una construcción demasiado literal que resultaría pesada.
- source_word: συνπίθειαν
  english_pob_choice: sympathy
  chosen_spanish: una simpatía
  alternatives_spanish:
  - un sentimiento compartido
  - una compasión
  - un afecto entrañable
  lexicon: LSJ
  rationale: El término apunta a un sentir de afinidad o solidaridad afectiva; «simpatía» es la equivalencia más directa y mantiene la distinción con στοργή.
- source_word: στοργὴν
  english_pob_choice: affection
  chosen_spanish: un afecto
  alternatives_spanish:
  - un cariño
  - un amor natural
  - una ternura
  lexicon: LSJ
  rationale: «Afecto» funciona bien para στοργή y deja visible el matiz de vínculo natural/familiar sin introducir una paráfrasis excesiva.
- source_word: τὴν πρὸς τὰ ἐξ αὐτῶν γεννώμενα
  english_pob_choice: toward the offspring born from them
  chosen_spanish: hacia los que nacen de ellos
  alternatives_spanish:
  - hacia su propia prole
  - hacia sus crías
  - hacia sus descendientes nacidos de ellos
  lexicon: LSJ
  rationale: La frase griega describe la relación con la propia descendencia. «Los que nacen de ellos» conserva la literalidad suficiente y suena natural en español; «hacia» refleja la preposición relacional πρὸς.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: human beings
  chosen_spanish: los seres humanos
  alternatives_spanish:
  - los hombres
  - la humanidad
  - las personas
  lexicon: LSJ
  rationale: «Seres humanos» evita un masculino genérico innecesario y mantiene el sentido universal comparativo del dativo plural griego.
translation_notes:
  revision_awareness: El texto coincide con el sentido y la decisión exegética del inglés POB, que ya había resuelto ὅπου γε καὶ como valor inferencial enfático («For even») y ἄλογα ζῷα como contraste de irracionalidad frente a los humanos. No se detectan revisiones aplicadas en el audit trail más reciente; por ello la versión española sigue de cerca la lectura aprobada sin introducir nuevas tensiones.
  spanish_consistency_notes:
  - Conservo la distinción entre «simpatía» y «afecto», siguiendo la separación semántica del par συνπίθεια / στοργή en el audit trail inglés.
  - Mantengo «animales irracionales» como término técnico, no como juicio moral, para reflejar el contraste intelectual del griego.
  - La frase relativa «los que nacen de ellos» preserva el referente de la descendencia sin sobreinterpretarlo como «crías» en contextos donde un término más general es preferible.
