translation:
  language: es
  text: El decimocuarto fue Matatías[a], sus hijos varones y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «Para el decimocuarto, Matatías». En el contexto de esta lista, el número se refiere al decimocuarto lote o división.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/אַרְבָּעָה עָשָׂר
  english_pob_choice: The fourteenth
  chosen_spanish: El decimocuarto
  alternatives_spanish:
  - Para el decimocuarto
  - El decimocuarto lote
  - La decimocuarta suerte
  lexicon: HALOT
  rationale: En esta lista de turnos musicales, la expresión ordinal funciona como encabezado del número de la suerte o división. En español, 'El decimocuarto' conserva la estructura breve y enumerativa del hebreo sin introducir una palabra no expresada en el versículo.
- source_word: מַתִּתְיָהוּ
  english_pob_choice: Mattithiah
  chosen_spanish: Matatías
  alternatives_spanish:
  - Matitías
  - Mattitías
  lexicon: HALOT
  rationale: Se translitera el nombre propio con una forma española readable y estable. 'Matatías' evita una grafía excesivamente anglicada y mantiene la identificación del personaje.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus niños
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus hijos' y el contexto genealógico permite reflejarlo de modo natural en español. 'Hijos' conserva el vínculo filial sin añadir precisión no expresada.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: '''Hermanos'' corresponde de manera directa a אֶחָיו y mantiene el paralelismo con ''sus hijos''. No se amplía a ''parientes'' porque sería más amplio que el hebreo.'
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  - en total, doce
  lexicon: HALOT
  rationale: El hebreo cierra la lista con el total. En español, 'doce' al final de la frase reproduce la concisión del original sin sobreexplicación.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y el archivo auditado en inglés, conservando la estructura enumerativa y la nota sobre el sentido contextual del número ordinal. No se observaron revisiones posteriores que requirieran ajustes.
  spanish_consistency_notes:
  - Se mantiene 'Matatías' como forma española del nombre propio, consistente con uso bíblico en español y con la transliteración del inglés POB.
  - Se preserva el orden sintáctico breve del hebreo, con el total 'doce' al final como cierre apposicional.
  - No se introduce 'lote' en el texto principal porque, aunque el contexto lo presupone, el versículo no lo expresa de forma explícita.
