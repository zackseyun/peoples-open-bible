  yaml_path: translation/ot/numbers/022/036.yaml
  text: When Balak heard that Balaam had come[a], he went out to meet him at the city of Moab, which is on the border of the Arnon[b], at the edge of the border.
  footnotes:
  - marker: a
    text: Or 'to a city of Moab.' The Hebrew phrase may refer either to a specific known city in Moab or more generally to a city belonging to Moab.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the end of the territory.' The Hebrew word for 'border' can also mean 'territory' in some contexts.
    reason: lexical_alternative
