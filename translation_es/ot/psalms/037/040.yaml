translation:
  language: es
  text: Yahvé los ayuda y los libra[a]; los libra de los impíos y los salva, porque en él se refugian[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los rescata' en ambos usos de 'los libra'; el hebreo repite el mismo verbo de rescate para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: O 'confían en él'; el hebreo habla más literalmente de refugiarse en él.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino. El POB inglés opta por la transliteración 'Yahweh'; en español, 'Yahvé' es la forma natural y ya difundida para ese mismo nombre, evitando la sustitución por un título.
- source_word: וַיַּעְזְרֵם
  english_pob_choice: helps them
  chosen_spanish: los ayuda
  alternatives_spanish:
  - los auxilia
  - los socorre
  - acude en su ayuda
  lexicon: HALOT
  rationale: עזר expresa ayuda/asistencia activa. 'Los ayuda' es claro, idiomático y conserva el sentido de acción benévola de Yahvé sin intensificar innecesariamente el matiz.
- source_word: וַיְפַלְּטֵם / יְפַלְּטֵם
  english_pob_choice: delivers them; he delivers them
  chosen_spanish: los libra; los libra
  alternatives_spanish:
  - los rescata; los rescata
  - los salva; los salva
  - los hace escapar; los hace escapar
  lexicon: HALOT
  rationale: El hebreo repite פלט para énfasis. 'Libra' comunica rescate/liberación con buen peso poético en español y permite retener la repetición sin suavizarla. La duplicación se conserva explícitamente.
- source_word: מֵרְשָׁעִים
  english_pob_choice: from the wicked
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los malvados
  - de los malhechores
  - de los injustos
  lexicon: HALOT
  rationale: רשעים designa a los impíos/culpables moralmente. 'Impíos' es una opción bíblica y precisa en español, adecuada para un registro reverente y más cercana al valor moral-teológico del término.
- source_word: וְיוֹשִׁיעֵם
  english_pob_choice: and saves them
  chosen_spanish: los salva
  alternatives_spanish:
  - los rescata
  - los libera
  - les da salvación
  lexicon: HALOT
  rationale: ישׁע abarca salvar/rescatar. 'Los salva' mantiene la amplitud teológica del verbo y funciona bien en paralelo con 'los libra'.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la razón de la acción divina. 'Porque' es el conector causal más claro y natural en español contemporáneo.
- source_word: חָסוּ בֽוֹ
  english_pob_choice: they take refuge in him
  chosen_spanish: en él se refugian
  alternatives_spanish:
  - confían en él
  - buscan refugio en él
  - se acogen a él
  lexicon: HALOT
  rationale: חסה expresa literalmente buscar refugio/sombra protectora. 'En él se refugian' conserva la metáfora de protección mejor que 'confían', aunque esta última siga siendo una alternativa interpretativa.
theological_decisions:
- issue: Cómo rendir el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto en lugar de una sustitución por título. En español, 'Yahvé' es la forma estándar de transliteración reverente y legible para este proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Conservación de la repetición del verbo de rescate
  english_pob_reading: 'Retain the repetition: ''delivers them; he delivers them'''
  chosen_spanish_reading: 'Retener la repetición: ''los libra; los libra'''
  alternative_spanish_readings:
  - reducir a una sola idea como 'los ayuda y los libra'
  - fusionar el paralelo en 'los rescata y los salva'
  rationale: El hebreo repite פלט de manera enfática. La duplicación en español preserva el relieve poético y evita borrar una intensificación explícita del texto fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
- issue: Valor de חָסוּ בוֹ
  english_pob_reading: they take refuge in him
  chosen_spanish_reading: en él se refugian
  alternative_spanish_readings:
  - confían en él
  - se amparan en él
  rationale: La imagen primaria es de refugio/protección, no solo de fe abstracta. 'Se refugian' conserva mejor la metáfora y deja abierta la dimensión de confianza sin reducirla a ella.
  doctrine_reference: DOCTRINE.md lexical transparency
translation_notes:
  revision_awareness: 'El pasaje fue revisado en el último pase y quedó sin cambios, con acuerdo alto entre revisores. La versión española refleja esa estabilidad: conserva la repetición enfática de פלט, mantiene el nombre divino como Yahvé y sigue la lectura causal y metafórica de חָסוּ בוֹ sin suavizarla.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton, coherente con el estándar del proyecto.
  - Se conserva la duplicación de 'los libra' para reflejar la repetición hebrea de פלט.
  - '''Impíos'' se usa para רשעים, en línea con el registro bíblico y con la fuerza moral del término.'
  - '''Se refugian'' preserva la imagen concreta de חסה y evita reducirla a una mera confianza interior.'
  - La puntuación y el orden buscan un castellano natural sin perder el paralelismo poético del hebreo.
