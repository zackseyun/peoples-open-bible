    text: 'O: «contra el sur»; el hebreo נֶגֶב puede designar tanto la región meridional en general como la zona específica del Néguev.'
    reason: lexical_alternative
  revision_rationale: Se simplifica el arranque narrativo para un español más natural sin perder la función temporal del hebreo; se ajusta la puntuación para mantener la cadena de acciones; se reemplaza «incendiado» por «quemado» para reflejar más directamente el verbo hebreo; y se corrige la nota al pie para que preserve la alternativa léxica real de נֶגֶב documentada en la auditoría inglesa.
