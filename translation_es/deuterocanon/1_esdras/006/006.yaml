translation:
  language: es
  text: y no fueron impedidos de construir hasta que se enviara noticia a Darío acerca de ellos y se diera una respuesta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se devolviera una respuesta». El verbo griego puede denotar ser dirigido a alguien o recibir una contestación oficial; el contexto favorece una respuesta administrativa después del informe a Darío.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐκωλύθησαν
  english_pob_choice: they were not hindered
  chosen_spanish: no fueron estorbados
  alternatives_spanish:
  - no fueron impedidos
  - no fueron detenidos
  lexicon: BDAG
  rationale: El pasivo de κωλύω expresa ser impedido o trabado. «Estorbados» conserva ese matiz pasivo en un español natural y evita un calco demasiado técnico.
- source_word: τῆς οἰκοδομῆς
  english_pob_choice: from building
  chosen_spanish: en la construcción
  alternatives_spanish:
  - de la construcción
  - de la obra de construcción
  lexicon: BDAG
  rationale: El genitivo dependiente de κωλύω indica la actividad de la que no fueron impedidos. En español, «en la construcción» comunica mejor la obra en curso sin perder el sentido verbal.
- source_word: μέχρις οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: BDAG
  rationale: Equivalente temporal directo y idiomático en español; conserva la idea de límite temporal.
- source_word: ὑποσημανθῆναι
  english_pob_choice: word ... should be sent
  chosen_spanish: se enviara noticia
  alternatives_spanish:
  - se presentara un informe
  - se diera aviso
  lexicon: LSJ
  rationale: El verbo puede significar comunicar o informar oficialmente. «Se enviara noticia» mantiene el carácter de comunicación formal sin forzar un tecnicismo excesivo.
- source_word: Δαρείῳ
  english_pob_choice: to Darius
  chosen_spanish: a Darío
  alternatives_spanish:
  - ante Darío
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar al español.
- source_word: περὶ αὐτῶν
  english_pob_choice: about them
  chosen_spanish: acerca de ellos
  alternatives_spanish:
  - sobre ellos
  - en cuanto a ellos
  lexicon: BDAG
  rationale: La frase preposicional refiere a los constructores o al asunto en discusión. «Acerca de ellos» es claro y fiel.
- source_word: προσφωνηθῆναι
  english_pob_choice: a reply should be returned
  chosen_spanish: se recibiera una respuesta
  alternatives_spanish:
  - se diera una respuesta
  - se les respondiera
  lexicon: LSJ
  rationale: En este contexto administrativo, el infinitivo pasivo apunta a la recepción de una contestación oficial. «Se recibiera una respuesta» preserva el flujo de reporte y contestación, mientras que la alternativa más literal queda recogida en la nota.
translation_notes:
  revision_awareness: 'Se siguió el texto griego de Swete como ancla principal y se mantuvo la decisión inglesa de entender los dos infinitivos finales como comunicación oficial en cadena: primero se informa a Darío y luego se recibe/da una respuesta. No se aplicaron revisiones posteriores; el pasaje quedó estable en el control más reciente.'
  spanish_consistency_notes:
  - Se usó «Darío» de forma consistente para Δαρείος.
  - Se prefirió «noticia/respuesta» en sentido administrativo, en continuidad con el audit trail inglés.
  - Se evitó «SEÑOR» porque no aparece aquí el nombre divino ni una cita de κύριος.
  - La construcción impersonal con «se» conserva el pasivo griego sin sobrecargar la sintaxis española.
