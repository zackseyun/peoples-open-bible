revisions:
- from: Porque la nube de Yahvé estaba sobre el tabernáculo de día[a], y fuego estaba en él de noche[b], a la vista de toda la casa de Israel, durante todos sus viajes.
  to: Porque la nube de Yahvé estaba sobre el tabernáculo de día, y en él había fuego de noche, a la vista[a] de toda la casa de Israel, durante todas sus jornadas[b].
  rationale: Se corrigió el anclaje de la nota [a] para que corresponda a לְעֵינֵי, en línea con la auditoría inglesa y la fuente hebrea. También se suavizó la sintaxis de «fuego estaba en él» a «en él había fuego», que suena más natural en español sin perder la ambigüedad y localización de בּוֹ. Finalmente, se ajustó «viajes» a «jornadas» para reflejar mejor מַסְעֵיהֶם en el contexto de las marchas de Israel.
