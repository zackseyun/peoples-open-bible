- from: Un testigo falso que exhala mentiras[a], y uno que [b]envía discordia entre hermanos.
  to: Un testigo falso que exhala mentiras[a], y el que envía discordia entre hermanos[b].
  rationale: Se conserva el sentido fuente y las decisiones léxicas principales, pero se mejora la naturalidad proverbial con «el que», se corrige el anclaje de notas y se sustituye la nota menos necesaria sobre «envía» por la nota cultural documentada en el audit trail para «entre hermanos».
