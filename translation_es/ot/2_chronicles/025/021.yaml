translation:
  language: es
  text: Entonces Joás, rey de Israel, subió, y él y Amasías, rey de Judá, se enfrentaron[a] en Bet-semes, que pertenecía a Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se vieron cara a cara». El modismo hebreo dice literalmente «vieron rostros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia allí
  lexicon: HALOT
  rationale: עלה en narrativa puede significar simplemente ‘subió’ o ‘fue hacia arriba’. En este contexto de encuentro bélico, ‘subió’ conserva la direccionalidad hebrea sin añadir una especificación militar que el texto no expresa de forma explícita.
- source_word: וַיִּתְרָאוּ פָנִים
  english_pob_choice: faced one another
  chosen_spanish: se enfrentaron
  alternatives_spanish:
  - se vieron cara a cara
  - se encontraron frente a frente
  lexicon: HALOT
  rationale: La expresión hebrea literalmente involucra ‘ver rostros’; en este contexto narrativo y de combate, ‘se enfrentaron’ comunica de manera natural la confrontación mutua. Mantiene la fuerza relacional y hostil sin volverla más interpretativa de lo necesario.
- source_word: הוּא וַאֲמַצְיָהוּ
  english_pob_choice: he and Amaziah
  chosen_spanish: él y Amasías
  alternatives_spanish:
  - Joás y Amasías
  lexicon: HALOT
  rationale: Se conserva el pronombre explícito ‘él’ para reflejar el énfasis hebreo de הוּא. Como Joás acaba de ser mencionado, el referente es claro en español y no requiere repetir el nombre.
- source_word: בְּבֵית שֶׁמֶשׁ
  english_pob_choice: at Beth-shemesh
  chosen_spanish: en Bet-semes
  alternatives_spanish:
  - en Bet-Semes
  - junto a Bet-semes
  lexicon: HALOT
  rationale: En español, la preposición ‘en’ es la más natural para ubicar el encuentro en un lugar. El topónimo se translitera como ‘Bet-semes’ conforme al criterio del proyecto para nombres propios.
- source_word: אֲשֶׁר לִיהוּדָה
  english_pob_choice: which belongs to Judah
  chosen_spanish: que pertenecía a Judá
  alternatives_spanish:
  - que era de Judá
  - que estaba bajo Judá
  lexicon: HALOT
  rationale: La frase expresa pertenencia territorial. ‘Pertenecía a Judá’ reproduce mejor la fuerza posesiva de ל que una mera ubicación geográfica, y coincide con la lectura auditada de la POB inglesa.
- source_word: מֶלֶךְ יִשְׂרָאֵל / מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Israel / king of Judah
  chosen_spanish: rey de Israel / rey de Judá
  alternatives_spanish:
  - rey de Israel / rey de Judá
  lexicon: HALOT
  rationale: Los títulos reales se traducen de forma directa y consistente. ‘Rey de Israel’ y ‘rey de Judá’ son transparentes y no requieren paráfrasis.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés y no se registraron revisiones aplicadas en el expediente fuente; la redacción española mantiene ese mismo sentido general con ajustes naturales de idiomaticidad.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ según el estándar del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene ‘Judá’ e ‘Israel’ como nombres geopolíticos consistentes con el resto del corpus.
  - Se prefiere ‘Bet-semes’ como transliteración breve y estable del topónimo.
  - Se conserva el pronombre explícito ‘él’ para reflejar el hebreo y la lectura auditada de la POB inglesa.
