translation:
  language: es
  text: Mira[a], Dios es poderoso y no desprecia; es poderoso en fuerza de corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'He aquí' o 'Mira, pues'. La partícula hebrea introduce una afirmación enfática.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''fuerza de corazón''; también puede entenderse como fuerza de mente, entendimiento o firmeza de propósito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática. 'Mira' conserva el valor discursivo y suena natural en español poético; 'He aquí' sería más tradicional, pero algo más marcado y arcaizante.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  - el Poderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como el término poético común para Dios. 'Dios' es la equivalencia más directa y no añade una expansión que el hebreo no exige.
- source_word: כַּבִּיר
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - mighty
  - grande
  lexicon: HALOT
  rationale: El adjetivo expresa grandeza y potencia. 'Poderoso' comunica bien la fuerza del término en español y mantiene la repetición del versículo sin sonar forzado.
- source_word: וְלֹא יִמְאַס
  english_pob_choice: and does not despise
  chosen_spanish: y no desprecia
  alternatives_spanish:
  - y no rechaza
  - y no desestima
  lexicon: HALOT
  rationale: מאס puede significar rechazar, despreciar o desdeñar. 'Desprecia' conserva la fuerza relacional del verbo sin introducir un objeto inexistente en el hebreo. El español puede omitir el objeto explícito, igual que el texto fuente.
- source_word: כֹּחַ לֵב
  english_pob_choice: strength of heart
  chosen_spanish: fuerza de corazón
  alternatives_spanish:
  - fuerza de mente
  - firmeza de propósito
  - fortaleza de corazón
  lexicon: HALOT
  rationale: 'La expresión es literal y algo idiomática. ''Fuerza de corazón'' conserva la metáfora del hebreo y deja abierta la posible gama de sentido: entendimiento, resolución o firmeza interior.'
theological_decisions:
- issue: Objeto implícito de 'no desprecia'
  english_pob_reading: does not despise
  chosen_spanish_reading: no desprecia
  alternative_spanish_readings:
  - no desprecia a nadie
  - no rechaza
  rationale: El hebreo no explicita objeto. Siguiendo la revisión inglesa, se evita suplirlo en la línea principal para no cerrar indebidamente el sentido; el español permite la misma omisión natural.
  doctrine_reference: Translation philosophy §3, §6
- issue: Sentido de 'strength of heart'
  english_pob_reading: he is mighty in strength of heart
  chosen_spanish_reading: es poderoso en fuerza de corazón
  alternative_spanish_readings:
  - es poderoso en entendimiento
  - es poderoso en firmeza de propósito
  rationale: Se conserva la imagen del 'corazón' para no borrar la tensión léxica del hebreo. La frase queda transparente y deja abiertas las interpretaciones posibles sin imponer una sola glosa.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó un objeto explícito añadido a 'does not despise' por no estar en el hebreo. La redacción española sigue esa revisión y evita suplir un objeto no expresado, manteniendo al mismo tiempo la fuerza poética y la ambigüedad productiva del original.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֵל, conforme al estándar del proyecto para términos divinos.
  - Se mantiene 'corazón' en la frase final para respetar la metáfora hebrea y evitar una paráfrasis interpretativa excesiva.
  - '''Poderoso'' se usa de forma consistente para כַּבִּיר en ambas ocurrencias del versículo.'
