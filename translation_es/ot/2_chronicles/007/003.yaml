  language: en
  yaml_path: translation/ot/2_chronicles/007/003.yaml
  text: 'And all the sons of Israel[a], seeing the fire come down and the glory of Yahweh upon the house, bowed down with their faces to the ground on the pavement, and they worshiped and gave thanks to Yahweh: “For he is good[c][b], for his steadfast love endures forever.”'
  footnotes:
  - marker: a
    text: Or 'all the Israelites.' The Hebrew is literally 'all the sons of Israel,' a standard collective expression for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: '''The house'' refers to the temple.'
    reason: cultural_note
  - marker: c
    text: Or 'his mercy endures forever' or 'his covenant faithfulness endures forever.' The Hebrew חֶסֶד includes the sense of loyal, covenantal love.
    reason: lexical_alternative
