translation:
  language: es
  text: Mi corazón está firme, oh Dios; cantaré y haré música, aun con mi gloria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi ser entero»; el hebreo dice literalmente «mi gloria», una expresión poética que puede referirse al yo interior del hablante o incluso a la lengua como instrumento de alabanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָכוֹן
  english_pob_choice: steadfast
  chosen_spanish: está firme
  alternatives_spanish:
  - está firme y estable
  - está estable
  - permanece firme
  lexicon: HALOT
  rationale: El adjetivo expresa estar establecido, firme o fijo. En español, "está firme" comunica bien la estabilidad y la resolución interna sin sonar forzado.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi corazón interior
  - mi ser
  - mi alma
  lexicon: HALOT
  rationale: 'En hebreo, "corazón" designa el centro interior de la persona: voluntad, afectos y pensamiento. "Mi corazón" es natural en español y conserva esa amplitud sin explicarla de más.'
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh Dios mío
  lexicon: HALOT
  rationale: Aquí el sustantivo funciona como vocativo. En español, "oh Dios" refleja la dirección de la súplica o alabanza con un tono natural y reverente.
- source_word: אָשִׁירָה
  english_pob_choice: I will sing
  chosen_spanish: cantaré
  alternatives_spanish:
  - voy a cantar
  - cantaré yo
  - permíteme cantar
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención resuelta. "Cantaré" comunica bien esa determinación en español moderno sin perder el valor volitivo.
- source_word: וַאֲזַמְּרָה
  english_pob_choice: and make music
  chosen_spanish: y entonaré salmos
  alternatives_spanish:
  - y haré música
  - y cantaré alabanzas
  - y haré melodía
  lexicon: HALOT
  rationale: זמר en pi'el suele referirse a cantar salmos o hacer música de alabanza, con posible matiz instrumental. "Entonaré salmos" conserva el paralelismo poético y el carácter de alabanza.
- source_word: אַף
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - incluso
  - también
  - sí, aun
  lexicon: HALOT
  rationale: El partícula intensifica o amplía la frase final. "Aun" introduce esa fuerza enfática de manera natural en español.
- source_word: כְּבוֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi ser entero
  - mi alma
  - mi lengua
  lexicon: HALOT
  rationale: Se conserva la metáfora literal "mi gloria" para no resolver prematuramente la imagen poética. En hebreo puede aludir al ser interior honorable o, por extensión, al órgano de la alabanza.
theological_decisions:
- issue: Sentido de כְּבוֹדִי en lenguaje poético de alabanza
  english_pob_reading: my glory
  chosen_spanish_reading: mi gloria
  alternative_spanish_readings:
  - mi ser entero
  - mi alma
  - mi lengua
  rationale: El hebreo es metafórico y admite varias lecturas. La versión principal mantiene la expresión literal para preservar la ambigüedad poética, y no sustituye la imagen por una interpretación única en el texto principal.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de evaluación fue de alta concordancia, por lo que se mantiene la lectura literal-poética de כְּבוֹדִי y la estructura de paralelismo del versículo.
  spanish_consistency_notes:
  - Se usa «Dios» en vocativo sin máscara reverencial, conforme a la directriz para אֱלֹהִים.
  - Se preserva el paralelismo entre "cantaré" y "entonaré salmos" para reflejar אָשִׁירָה / וַאֲזַמְּרָה.
  - Se mantiene la metáfora «mi gloria» en el texto principal y se explica la ambigüedad en nota.
  - «Aun» reproduce el valor intensificador de אַף sin añadir interpretación doctrinal.
