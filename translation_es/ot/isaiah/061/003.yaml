  language: en
  yaml_path: translation/ot/isaiah/061/003.yaml
  text: to appoint for the mourners of Zion[a], to give them a headdress instead of ashes, oil of gladness instead of mourning, a garment of praise instead of a faint spirit; and they will be called oaks of righteousness, the planting of Yahweh[d][c][b], that he may display his glory.
  footnotes:
  - marker: a
    text: Or 'beauty' instead of 'ashes'; the Hebrew פְּאֵר can denote adornment or a festive headdress. The concrete image likely refers to headwear replacing the ashes of mourning.
    reason: lexical_alternative
  - marker: b
    text: Or 'terebinths of righteousness.' The Hebrew tree term may refer more specifically to terebinths; 'oaks' is used here as a familiar English equivalent for the poetic image.
    reason: lexical_alternative
  - marker: c
    text: Or 'oaks of justice.' The Hebrew צֶדֶק can denote both righteousness and justice depending on context.
    reason: alternative_reading
  - marker: d
    text: Or 'that he may be glorified.' The final Hebrew verb can be understood as expressing the LORD's glorification through this planting.
    reason: alternative_reading
