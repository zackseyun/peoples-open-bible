  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el audit trail inglés: mantiene la súplica directa a Dios, el estado de desprecio, la reversión retributiva del oprobio y la entrega de los enemigos como botín en tierra de cautiverio. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad idiomática al sentido y a la documentación: (1) el texto principal usa «Vuelve ... sobre», pero el verbo español más natural para la reversión de un oprobio en este contexto es «Haz volver» o «Devuelve»; y (2) «sobre su propia cabeza» pierde el plural explícito de רֹאשָׁם y del inglés «their own heads».'
  spanish_quality_summary: 'La redacción es clara y digna, y en general suena natural en español eclesial moderno. No obstante, «Vuelve su oprobio sobre su propia cabeza» suena algo forzado en español, y el singular «cabeza» debilita una imagen retributiva muy estable que en español se expresa mejor en plural: «sobre sus propias cabezas».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «oprobio», «botín» y «cautiverio» son adecuados. No intervienen aquí términos sensibles como Yahvé/Mesías/esclavo. La decisión de conservar la imprecación directa coincide con la rationale teológica documentada.
  issues:
