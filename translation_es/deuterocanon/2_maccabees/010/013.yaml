translation:
  language: es
  text: Pero, como no era insensato, sino que iba considerando dentro de sí la derrota que le había sobrevenido, y había comprendido que los hebreos eran invencibles, porque el Dios poderoso estaba combatiendo junto a ellos, envió por delante.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἀνόους δὲ ὑπάρχων
  english_pob_choice: But since he was not foolish
  chosen_spanish: Pero, como no era insensato
  alternatives_spanish:
  - Pero, como no era necio
  - Pero, como no carecía de entendimiento
  lexicon: LSJ
  rationale: ἀνόους expresa falta de sentido o entendimiento; «insensato» comunica bien esa negación sin volver la frase rígida en español y conserva la fuerza del litotes.
- source_word: πρὸς ἑαυτὸν ἀντιβάλλων
  english_pob_choice: was considering within himself
  chosen_spanish: iba considerando dentro de sí
  alternatives_spanish:
  - se iba preguntando para sus adentros
  - iba reflexionando consigo mismo
  lexicon: LSJ
  rationale: La expresión describe una reflexión interna y deliberada. «Dentro de sí» mantiene el valor reflexivo; «iba considerando» suena natural y continuo en español narrativo.
- source_word: τὸ γεγονὸς περὶ αὐτὸν ἐλάττωμα
  english_pob_choice: the defeat that had happened to him
  chosen_spanish: la derrota que le había ocurrido
  alternatives_spanish:
  - la pérdida que le había sobrevenido
  - el revés que le había acontecido
  lexicon: LSJ
  rationale: ἐλάττωμα puede señalar desventaja, pérdida o derrota; en este contexto militar, «derrota» refleja mejor el sentido que la versión inglesa revisada y mantiene la concreción del evento.
- source_word: συννοήσας
  english_pob_choice: had realized
  chosen_spanish: había comprendido
  alternatives_spanish:
  - había reparado
  - había entendido
  lexicon: LSJ
  rationale: El participio aoristo marca una comprensión ya alcanzada. «Había comprendido» conserva ese valor completivo con tono claro y sobrio.
- source_word: ἀνικήτους εἶναι τοὺς Ἑβραίους
  english_pob_choice: that the Hebrews were unconquerable
  chosen_spanish: que los Hebreos eran invencibles
  alternatives_spanish:
  - que los Hebreos eran inconquistables
  - que los Hebreos no podían ser vencidos
  lexicon: LSJ
  rationale: El griego usa Ἑβραίους, y la POB inglesa preserva «Hebrews» por transparencia; en español, «Hebreos» conserva ese mismo dato léxico. «Invencibles» comunica bien ἀνίκητους en un registro natural.
- source_word: τοῦ δυναμένου θεοῦ
  english_pob_choice: the mighty God
  chosen_spanish: el Dios poderoso
  alternatives_spanish:
  - el Dios capaz
  - el Dios todopoderoso
  lexicon: LSJ
  rationale: La expresión participial subraya la capacidad/poder de Dios. «Dios poderoso» es fiel, directo y evita sobrecargar el pasaje con una equivalencia más doctrinal que léxica.
- source_word: συμμαχοῦντος αὐτοῖς
  english_pob_choice: was fighting alongside them
  chosen_spanish: estaba combatiendo junto a ellos
  alternatives_spanish:
  - estaba luchando a su lado
  - era su aliado en combate
  lexicon: LSJ
  rationale: συμμαχέω tiene sentido militar de luchar como aliado. «Combatiendo junto a ellos» preserva la imagen bélica y la relación de alianza sin suavizarla.
- source_word: προαποστείλας
  english_pob_choice: he sent ahead
  chosen_spanish: envió por delante
  alternatives_spanish:
  - lo envió antes
  - despachó previamente
  lexicon: LSJ
  rationale: El participio indica un envío anticipado respecto de la acción siguiente. «Envió por delante» es idiomático en español y retiene el matiz de precedencia temporal.
theological_decisions:
- issue: Renderización de Ἑβραίους
  english_pob_reading: Hebrews
  chosen_spanish_reading: Hebreos
  alternative_spanish_readings:
  - judíos
  rationale: El griego dice Ἑβραίους, y la POB inglesa preserva ese término en vez de armonizarlo. «Hebreos» mantiene la primacía de la forma fuente y evita sustituirla por un etnónimo más interpretativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Ayuda divina en combate
  english_pob_reading: because the mighty God was fighting alongside them
  chosen_spanish_reading: porque el Dios poderoso estaba combatiendo junto a ellos
  alternative_spanish_readings:
  - porque Dios era su aliado
  - porque el Dios poderoso los ayudaba
  rationale: El texto atribuye su invencibilidad a la intervención activa de Dios en la guerra. La traducción conserva ese apoyo bélico explícito sin reducirlo a una ayuda genérica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se prefirió una formulación que refleje mejor ἀντιβάλλων πρὸς ἑαυτόν como reflexión interna continua y ἐλάττωμα como derrota/revés militar concreto. No se añadieron notas al pie porque en español no surgió una ambigüedad textual que exigiera anclaje adicional.'
  spanish_consistency_notes:
  - Se mantuvo «Hebreos» para reflejar el griego Ἑβραίους, en consonancia con la política de transparencia del POB.
  - Se usó «Dios poderoso» para transmitir τοῦ δυναμένου θεοῦ sin convertirlo en una paráfrasis doctrinal.
  - Se evitó «SEÑOR» y otras sustituciones convencionales no presentes en el griego.
  - El tono general es formal y publicable, con sintaxis natural en español y sin calcos excesivos.
