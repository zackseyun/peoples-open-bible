id: PHP.1.24
reference: Philippians 1:24
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ δὲ ἐπιμένειν ⸀ἐν τῇ σαρκὶ ἀναγκαιότερον δι’ ὑμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/024.yaml
  text: But to remain in the flesh is more necessary for your sake.
translation:
  language: ko
  text: 그러나 육신 가운데 머무는 것[a]이 여러분을 위하여 더 필요한 일입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「몸 안에서 계속 살아가는 것」. 22절과 동일하게 σάρξ는 육체적 지상 생애를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ἐπιμένειν
  english_pob_choice: to remain
  chosen_korean: 머무는 것
  alternatives_korean:
  - 계속 머무는 것
  - 남는 것
  lexicon: BDAG
  rationale: ἐπιμένω는 「계속 머무름」을 의미하며, 「머무는 것」이 한국어로 자연스럽게 이 함의를 담는다.
- source_word: δὲ
  english_pob_choice: But
  chosen_korean: 그러나
  alternatives_korean:
  - 한편
  - 그런데
  lexicon: BDAG
  rationale: 23절의 떠남에 대한 갈망과 대조되는 흐름을 「그러나」가 분명히 표시한다.
- source_word: ἐν τῇ σαρκὶ
  english_pob_choice: in the flesh
  chosen_korean: 육신 가운데
  alternatives_korean:
  - 몸 안에서
  - 이 생애 가운데
  lexicon: BDAG
  rationale: 22절과 일관되게 「육신 가운데」로 옮긴다. 본 문맥에서는 도덕적 「죄성」이 아닌 육체적 지상 생애의 함의이다.
- source_word: ἀναγκαιότερον
  english_pob_choice: more necessary
  chosen_korean: 더 필요한 일
  alternatives_korean:
  - 더 필수적
  - 더 긴요한 일
  lexicon: BDAG
  rationale: 비교급의 의미를 「더 필요한 일」로 자연스럽게 살린다.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_korean: 여러분을 위하여
  alternatives_korean:
  - 여러분 때문에
  - 여러분을 위해서
  lexicon: BDAG
  rationale: δι' ὑμᾶς는 목적·유익을 표현한다. 「여러분을 위하여」가 목회적 문맥에 자연스럽다.
theological_decisions:
- issue: σάρξ의 의미 — 본 절에서
  chosen_reading: 육체적 지상 생애 (육신 가운데)
  alternative_readings:
  - 도덕적 죄성
  - 이 세상에 머무름의 풀어쓰기
  rationale: 본 절은 메시아와 함께 있기 위해 떠남과 빌립보 성도를 위한 지속적 봉사 사이의 대조이다. 도덕적 해석은 본문 맥락에 맞지 않는다.
  doctrine_reference: 'Contested terms: σάρξ = 육신 (literal) / 죄성 (metaphorical)'
