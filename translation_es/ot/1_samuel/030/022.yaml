base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/030/022.yaml
  text: Then every wicked and worthless man from among the men who had gone with David answered and said[a], “Because they did not go with me, we will not give them any of the spoil that we recovered[c][b], except that each man may take his wife and his children and lead them away and go.”
  footnotes:
  - marker: a
    text: Or 'plunder' for 'spoil.'
    reason: lexical_alternative
  - marker: b
    text: '''Worthless'' translates beliyyaal here as a descriptive term; alternatively, ''lawless.'''
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'with me'; the speakers are a group, but the quotation preserves the singular form in the source text.
    reason: textual_variant
