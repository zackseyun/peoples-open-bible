  glossary_alignment: Alineación parcial. 'rostro' para πρόσωπον y 'gracia' para χαρίτων están bien alineados con la auditoría. Pero 'Señor' no sigue el valor por defecto del proyecto para el nombre divino en el texto principal, que pide 'Yahvé'. No hay razón contextual documentada para mantener 'Señor' aquí.
