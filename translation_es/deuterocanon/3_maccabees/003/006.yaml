- from: Así que los extranjeros no tomaron en cuenta en absoluto[a] la beneficencia[b] por la cual la nación era celebrada en todas partes;
  to: Así que los extranjeros no tomaron en cuenta[a] en absoluto la beneficencia[b] por la que la nación era conocida en todas partes;
  rationale: Se ajusta θρυλουμένην a una expresión más fiel y natural en español ('era conocida en todas partes') en vez de 'era celebrada', que sobreinterpreta el matiz. También se reubica la nota principal al verbo 'tomaron en cuenta' para reflejar correctamente la decisión léxica documentada en el POB inglés sobre διηριθμήσαντο. Se conserva 'beneficencia' como opción posible, pero con apoyo de nota por su menor naturalidad contextual.
