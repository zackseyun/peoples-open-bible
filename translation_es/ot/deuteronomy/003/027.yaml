translation:
  language: es
  text: Sube a la cumbre de Pisgá, y alza tus ojos hacia el occidente[a], hacia el norte, hacia el sur y hacia el oriente, y mira con tus propios ojos;[b] porque no pasarás este Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «hacia el mar», una manera convencional de decir «hacia el occidente».
    reason: cultural_note
  - marker: b
    text: O «este río Jordán». El hebreo dice simplemente «este Jordán».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Asciende
  lexicon: HALOT
  rationale: El imperativo de עלה expresa movimiento ascendente. «Sube» es natural en español y conserva la dirección física sin volverse solemne o rígido.
- source_word: רֹאשׁ הַפִּסְגָּה
  english_pob_choice: the top of Pisgah
  chosen_spanish: la cumbre de Pisgá
  alternatives_spanish:
  - la cima de Pisgá
  - la cumbre del Pisgá
  lexicon: HALOT
  rationale: רֹאשׁ funciona como «cumbre/cima» en este contexto geográfico. «Pisgá» mantiene el topónimo y evita una calca innecesaria de «cabeza».
- source_word: וְשָׂא עֵינֶיךָ
  english_pob_choice: lift up your eyes
  chosen_spanish: alza tus ojos
  alternatives_spanish:
  - levanta tus ojos
  - alza la vista
  lexicon: HALOT
  rationale: Se conserva el mandato idiomático de dirigir la mirada. «Alza tus ojos» refleja bien el hebreo y su tono literario; en español, «alza la vista» sería más libre y pierde la repetición de «ojos».
- source_word: יָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - hacia el oeste
  - occidentalmente
  - hacia el mar
  lexicon: HALOT
  rationale: La forma direccional basada en ים alude convencionalmente al oeste desde la perspectiva territorial hebrea. «Hacia el occidente» es claro, digno y mantiene el valor direccional sin explicar de más en el texto principal.
- source_word: וְצָפֹנָה
  english_pob_choice: northward
  chosen_spanish: el norte
  alternatives_spanish:
  - hacia el norte
  - norte
  lexicon: HALOT
  rationale: La serie de direcciones se vuelve más natural en español con sustantivos coordinados. El sentido direccional se mantiene por el verbo de movimiento y el contexto.
- source_word: וְתֵימָנָה
  english_pob_choice: southward
  chosen_spanish: el sur
  alternatives_spanish:
  - hacia el sur
  - sur
  lexicon: HALOT
  rationale: Igual que en la dirección anterior, «el sur» comunica con claridad el rumbo sin forzar una repetición artificial de adverbios.
- source_word: וּמִזְרָחָה
  english_pob_choice: eastward
  chosen_spanish: el oriente
  alternatives_spanish:
  - hacia el oriente
  - el este
  lexicon: HALOT
  rationale: «Oriente» es un término bíblico y literario natural en español. Mantiene la serie direccional y evita la monotonía de repetir «hacia» en cada miembro.
- source_word: וּרְאֵה בְעֵינֶיךָ
  english_pob_choice: and see with your eyes
  chosen_spanish: y mira con tus propios ojos
  alternatives_spanish:
  - y ve con tus ojos
  - y contempla con tus ojos
  lexicon: HALOT
  rationale: La repetición hebrea de «ojos» es enfática. «Con tus propios ojos» preserva la idea de observación personal y suena idiomático en español; también evita una redundancia torpe sin borrar la intensificación.
- source_word: כִּי לֹא תַעֲבֹר
  english_pob_choice: for you shall not cross
  chosen_spanish: porque no pasarás
  alternatives_spanish:
  - pues no cruzarás
  - porque no cruzarás
  lexicon: HALOT
  rationale: כִּי introduce la razón de la exhortación. «Porque» conserva el enlace causal; «pasarás» reproduce el valor de עבר en relación con el Jordán, sin necesidad de añadir «al otro lado».
- source_word: אֶת הַיַּרְדֵּן הַזֶּה
  english_pob_choice: this Jordan
  chosen_spanish: este Jordán
  alternatives_spanish:
  - este río Jordán
  - el Jordán
  lexicon: HALOT
  rationale: Se conserva el demostrativo «este», que es importante en el hebreo. «Jordán» se usa sin «río» porque el texto hebreo no lo expresa explícitamente; en español es suficientemente claro.
translation_notes:
  revision_awareness: 'El audito inglés mantiene un enfoque de equivalencia óptima con dos notas: una cultural para יָמָּה («toward the sea», es decir, occidente) y otra léxica para אֶת הַיַּרְדֵּן הַזֶּה («this Jordan» / «this Jordan River»). La versión española conserva ambas tensiones sin ampliarlas: opta por «hacia el occidente» en el texto y explica en nota la imagen literal hebrea; mantiene «este Jordán» sin añadir «río» en el cuerpo, dejando la alternativa explícita en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «Jordán» se conserva como topónimo bíblico masculino en español.
  - La serie de direcciones se adapta a una sintaxis española natural, sin perder el paralelismo hebreo.
  - No se introduce «Cristo», «Señor» ni terminología eclesiástica ajena al versículo.
