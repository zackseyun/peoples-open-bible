translation:
  language: es
  text: No derramarán vino en ofrenda a Yahvé, ni sus sacrificios le agradarán. Serán para ellos como pan de duelo[a]; todos los que lo coman se volverán impuros. Porque su pan será solo para ellos[b]; no entrará en la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como pan de dolientes». La expresión probablemente alude a alimento asociado con el duelo y, por eso, ritualmente impuro.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para su apetito» o «para ellos». La frase hebrea indica que el pan queda para su propio uso, no apto para llevarlo a la casa de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִסְּכוּ
  english_pob_choice: will not pour out wine offerings
  chosen_spanish: derramarán vino en ofrenda
  alternatives_spanish:
  - no derramarán vino
  - no harán libación de vino
  lexicon: HALOT
  rationale: En contexto sacrificial, נסך se refiere a una libación. En español, 'derramar vino en ofrenda' conserva el acto cultual sin sonar demasiado técnico, y mantiene la relación inmediata con יַיִן.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: La preposición marca destinatario de la ofrenda; se usa 'a Yahvé' para reflejar de forma natural el destinatario del rito y seguir el criterio del proyecto para el Nombre divino.
- source_word: יֶעֶרְבוּ
  english_pob_choice: will not please him
  chosen_spanish: le agradarán
  alternatives_spanish:
  - serán aceptables para él
  - le serán gratos
  lexicon: HALOT
  rationale: ערב en este contexto expresa que el sacrificio no resulta aceptable/agradable para Dios. 'Le agradarán' en negativo comunica bien la falta de aceptación cultual en español.
- source_word: זִבְחֵיהֶם
  english_pob_choice: their sacrifices
  chosen_spanish: sus sacrificios
  alternatives_spanish:
  - sus ofrendas sacrificiales
  - sus víctimas
  lexicon: HALOT
  rationale: '''Sacrificios'' es el equivalente directo y claro para זבח en este pasaje ritual.'
- source_word: כְּלֶחֶם אוֹנִים
  english_pob_choice: like mourners’ bread
  chosen_spanish: como pan de duelo
  alternatives_spanish:
  - como pan de los dolientes
  - como pan de luto
  lexicon: HALOT
  rationale: La expresión alude al pan asociado con duelo y su impureza ritual. 'Pan de duelo' preserva el sentido idiomático y la asociación cultual sin forzar una construcción posesiva poco natural en español.
- source_word: אוֹנִים
  english_pob_choice: mourners’
  chosen_spanish: de duelo
  alternatives_spanish:
  - de luto
  - de los dolientes
  lexicon: HALOT
  rationale: אונים apunta a personas en duelo. 'De duelo' es breve, natural y conserva la referencia al estado de luto que genera impureza ritual.
- source_word: יִטַמָּאוּ
  english_pob_choice: will become unclean
  chosen_spanish: se volverán impuros
  alternatives_spanish:
  - quedarán impuros
  - serán contaminados ritualmente
  lexicon: HALOT
  rationale: טמא en este contexto es impureza ritual, no simple suciedad moral. 'Se volverán impuros' mantiene el valor cultual y es idiomático en español.
- source_word: לַחְמָם
  english_pob_choice: their bread
  chosen_spanish: su pan
  alternatives_spanish:
  - su alimento
  - su comida
  lexicon: HALOT
  rationale: לֶחֶם se conserva como 'pan' para mantener la imagen concreta del hebreo, aunque en español pueda abarcar alimento en general.
- source_word: לְנַפְשָׁם
  english_pob_choice: for themselves alone
  chosen_spanish: solo para ellos
  alternatives_spanish:
  - para su propio uso
  - para su apetito
  lexicon: HALOT
  rationale: 'נפש puede significar vida, yo mismo o apetito. Aquí el punto es exclusividad: el alimento queda para su uso propio y no para el culto. ''Solo para ellos'' expresa esa restricción de manera clara.'
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé
  lexicon: HALOT
  rationale: '''Casa de Yahvé'' conserva la expresión bíblica literal y evita sustituirla por un término interpretativo como ''templo'' cuando el hebreo dice literalmente casa.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se sigue la norma del proyecto de transliterarlo como 'Yahvé' en el texto principal, preservando el nombre del pacto en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Impureza de 'pan de duelo'
  english_pob_reading: ritual/cultic uncleanness associated with mourning and death
  chosen_spanish_reading: impureza ritual asociada con duelo y muerte
  alternative_spanish_readings:
  - impureza moral
  - simple contaminación
  rationale: El contexto habla de aceptación sacrificial y entrada a la casa de Yahvé, por lo que la impureza es cultual. 'Se volverán impuros' y la nota explicativa preservan esa tensión sin moralizarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'Se revisó el flujo del verso para conservar la progresión cultual del hebreo: libación negada, sacrificios no aceptos, comparación con pan de duelo, impureza de quienes comen, y exclusión final de la casa de Yahvé. La redacción española sigue de cerca la sintaxis sin calcarla de manera áspera.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה según el criterio del proyecto.
  - '''Impuro/impuros'' se usa en sentido ritual, no moral.'
  - '''Pan'' conserva la imagen concreta de לֶחֶם; no se sustituye por ''alimento'' salvo en la nota alternativa.'
  - La relación entre 'solo para ellos' y la exclusión del culto queda explícita para reflejar לְנַפְשָׁם y la cláusula final.
