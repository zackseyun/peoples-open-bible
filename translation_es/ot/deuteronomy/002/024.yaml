translation:
  language: es
  text: ¡Levántense[a], emprendan marcha y crucen el valle del Arnón. Mira, he entregado en tu mano a Sijón, rey de Hesbón, el amorreo, y su tierra. Comienza[b] a tomar posesión de ella, y entra en batalla[c] contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el wadi del Arnón» o «el arroyo del Arnón»; נחל puede referirse a un wadi, cauce o valle.
    reason: lexical_alternative
  - marker: b
    text: O «Empieza a poseerla». El verbo también puede llevar la idea de desposeer, pero aquí el objeto inmediato es la tierra de Sijón.
    reason: lexical_alternative
  - marker: c
    text: O «contiende con él en guerra» o «provócale guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וּמוּ
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántense
  alternatives_spanish:
  - Levántense
  - Pónganse en pie
  lexicon: HALOT
  rationale: El imperativo plural de קום pide ponerse en movimiento con tono enérgico. «Levántense» conserva la fuerza exhortativa sin sonar excesivamente arcaico.
- source_word: סְּע֗וּ
  english_pob_choice: set out
  chosen_spanish: emprendan marcha
  alternatives_spanish:
  - salgan
  - pónganse en camino
  - partan
  lexicon: HALOT
  rationale: נסע en contexto de viaje expresa partir o ponerse en camino. «Emprendan marcha» mantiene el matiz de movimiento ordenado y suena natural en español bíblico moderno.
- source_word: וְ/עִבְרוּ֮
  english_pob_choice: and cross over
  chosen_spanish: y crucen
  alternatives_spanish:
  - y pasen
  - y crucen al otro lado
  lexicon: HALOT
  rationale: עבר con objeto geográfico significa atravesar o cruzar. «Crucen» comunica el paso de una frontera o cauce sin recargar la frase.
- source_word: נַ֣חַל אַרְנֹן
  english_pob_choice: the Arnon Valley
  chosen_spanish: el valle del Arnón
  alternatives_spanish:
  - el wadi del Arnón
  - el torrente del Arnón
  - el cauce del Arnón
  lexicon: HALOT
  rationale: נחל puede ser valle, wadi o cauce. Aquí «valle» sigue la decisión inglesa de comunicar claramente el rasgo geográfico para lectores modernos, sin borrar la amplitud semántica del hebreo.
- source_word: רְאֵ֣ה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Mira, pues
  lexicon: HALOT
  rationale: El imperativo singular introduce una declaración divina solemne. «Mira» es breve, natural y mantiene el énfasis de atención.
- source_word: נָתַ֣תִּי בְ֠/יָדְ/ךָ
  english_pob_choice: I have given into your hand
  chosen_spanish: he entregado en tu mano
  alternatives_spanish:
  - he dado en tu mano
  - he puesto en tu mano
  - te he entregado
  lexicon: HALOT
  rationale: La expresión idiomática comunica entrega de poder o control. «He entregado en tu mano» conserva la imagen hebrea y el matiz de cesión efectiva de dominio.
- source_word: סִיחֹ֨ן מֶֽלֶךְ חֶשְׁבּ֧וֹן הָֽ/אֱמֹרִ֛י
  english_pob_choice: Sihon king of Heshbon, the Amorite
  chosen_spanish: Sijón, rey de Hesbón, el amorreo
  alternatives_spanish:
  - Sijón, rey de Hesbón, amorreo
  - Sijón, el amorreo, rey de Hesbón
  lexicon: HALOT
  rationale: 'Se sigue la aposición del hebreo: el nombre propio, luego el cargo, luego la identificación étnica. «El amorreo» refleja el sustantivo gentilicio sin convertirlo en adjetivo suelto.'
- source_word: וְ/אֶת אַרְצ֖/וֹ
  english_pob_choice: and his land
  chosen_spanish: y su tierra
  alternatives_spanish:
  - y su territorio
  - y su país
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa el dominio del rey. «Tierra» es la equivalencia bíblica más directa y mantiene la referencia territorial.
- source_word: הָחֵ֣ל
  english_pob_choice: Begin
  chosen_spanish: Comienza
  alternatives_spanish:
  - Empieza
  - Inicia
  - Comienza a
  lexicon: HALOT
  rationale: El hifil idiomático pide comenzar la acción siguiente. «Comienza» reproduce la instrucción inmediata y natural en español.
- source_word: רָ֑שׁ
  english_pob_choice: to take possession of it
  chosen_spanish: a tomar posesión de ella
  alternatives_spanish:
  - a poseerla
  - a ocuparla
  - a desposeerlo
  lexicon: HALOT
  rationale: En este contexto el objeto inmediato es la tierra, por lo que «tomar posesión de ella» expresa la idea de entrar en control del territorio. Se evita fijar «desposeer» como principal porque el hebreo aquí enfatiza la tierra más que la acción sobre la persona.
- source_word: וְ/הִתְגָּ֥ר בּ֖/וֹ מִלְחָמָֽה
  english_pob_choice: and engage him in battle
  chosen_spanish: y entabla batalla con él
  alternatives_spanish:
  - y lucha contra él
  - y provócale guerra
  - y contiende con él en guerra
  lexicon: HALOT
  rationale: El hitpael de גרה con מלחמה implica entrar en hostilidad o guerra. «Entabla batalla con él» es idiomático en español y conserva el sentido bélico sin reducirlo a mera provocación.
theological_decisions:
- issue: Tensión entre el don divino y la acción humana en la conquista
  english_pob_reading: Render both God's completed grant ('I have given') and Israel's commanded action ('Begin to take possession... engage him in battle') without softening either.
  chosen_spanish_reading: Se mantienen tanto la entrega ya realizada por Dios («he entregado») como la orden dada a Israel de actuar («Comienza a tomar posesión... y entabla batalla»).
  alternative_spanish_readings:
  - «Voy a entregarte» para volverlo promesa futura
  - «Comienza a desposeerlo» para enfatizar la derrota del enemigo
  - suavizar el imperativo bélico
  rationale: El hebreo yuxtapone soberanía divina y obediencia humana. La traducción conserva la perfección verbal de la entrega y los imperativos de acción, sin resolver la tensión en una sola dirección.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El ajuste de revisión en el original inglés favorece el orden appositivo «Sihon king of Heshbon, the Amorite». En español se reflejó como «Sijón, rey de Hesbón, el amorreo», manteniendo el mismo encadenamiento nominativo y étnico. También se preservó la decisión revisada de unir al sujeto con su tierra, sin introducir una inversión que borrara la aposición.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; en este versículo no ocurre.
  - Se mantiene «amorreo» como gentilicio bíblico consistente con la terminología POB.
  - «Tomar posesión» conserva la decisión léxica de no forzar «desposeer» como lectura principal.
  - La puntuación refleja el ritmo de tres imperativos iniciales y dos cláusulas posteriores de mandato y resultado.
