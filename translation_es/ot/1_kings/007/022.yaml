translation:
  language: es
  text: Y en la parte superior de los pilares había una obra en forma de lirio[a], y la obra de los pilares quedó terminada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «ornamento con forma de lirio» o «diseño de lirio».
    reason: lexical_alternative
  - marker: b
    text: O «la hechura de los pilares fue completada».
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  english_pob_choice: top
  chosen_spanish: parte superior
  alternatives_spanish:
  - cima
  - parte de arriba
  - remate
  lexicon: HALOT
  rationale: En contexto arquitectónico, רֹאשׁ señala la parte superior del elemento. ‘Parte superior’ comunica con claridad el sentido sin introducir el tecnicismo ‘capitel’, que no está en el hebreo de esta frase.
- source_word: הָעַמּוּדִים
  english_pob_choice: the pillars
  chosen_spanish: los pilares
  alternatives_spanish:
  - las columnas
  lexicon: HALOT
  rationale: עַמּוּדִים designa elementos estructurales verticales. ‘Pilares’ mantiene el valor usual en español bíblico y encaja con el contexto del templo.
- source_word: מַעֲשֵׂה
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - obra
  - obra de
  - trabajo ornamental
  lexicon: HALOT
  rationale: מַעֲשֵׂה puede significar obra, trabajo o manufactura. Aquí introduce el motivo decorativo; ‘trabajo de lirio’ conserva la concisión del hebreo y refleja la expresión compuesta del texto.
- source_word: שׁוֹשָׁן
  english_pob_choice: lily
  chosen_spanish: lirio
  alternatives_spanish:
  - loto
  - flor de lirio
  - ornamento de lirio
  lexicon: HALOT
  rationale: שׁוֹשָׁן normalmente corresponde a ‘lirio’. En un contexto de ornamento templario, el sustantivo español ‘lirio’ mantiene la equivalencia léxica y deja visible la imagen floral.
- source_word: וַתִּתֹּם
  english_pob_choice: was finished
  chosen_spanish: quedó terminada
  alternatives_spanish:
  - fue terminada
  - se terminó
  - estuvo terminada
  lexicon: HALOT
  rationale: El verbo indica conclusión. ‘Quedó terminada’ suena natural en español y conserva el matiz de resultado alcanzado sin añadir agentes no expresados.
- source_word: מְלֶאכֶת
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la manufactura
  - la hechura
  lexicon: HALOT
  rationale: מְלֶאכֶת puede referirse a obra, trabajo o manufactura. ‘La obra de los pilares’ es idiomático en español y conserva la amplitud del término hebreo para la fabricación y el adorno.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y la solución inglesa POB, manteniendo la doble idea de ornamentación floral y conclusión de la obra. La versión española adapta ‘work’ y ‘was finished’ a un español natural sin perder la estructura del original.
  spanish_consistency_notes:
  - Se prefirió ‘Y’ inicial para reflejar la coordinación narrativa del hebreo.
  - ‘Pilares’ se mantuvo de forma consistente para עַמּוּדִים, en línea con el uso bíblico común.
  - Se conservó la tensión entre ‘trabajo/obra’ y el sentido ornamental de מַעֲשֵׂה mediante una nota de alternativa.
  - No se introdujo ‘capitel’, porque el hebreo habla de la parte superior, no de un término técnico explícito.
