revisions:
- from: Pero David había subido el arca de Dios desde Quiriat-jearim al lugar que David le había preparado[a], porque le había levantado una tienda en Jerusalén.
  to: Pero David había llevado el arca de Dios desde Quiriat-jearim al lugar que David le había preparado[a], porque había armado una tienda para ella en Jerusalén.
  rationale: Se ajusta el verbo principal a una formulación española más idiomática y fiel al sentido narrativo («había llevado»), se mejora la expresión del modismo «pitch a tent» con «había armado una tienda para ella», y se corrige la nota para reflejar con mayor precisión la alternativa lexical documentada en la auditoría inglesa. No se requiere adjudicación adicional.
