  language: en
  yaml_path: translation/ot/2_chronicles/024/025.yaml
  text: When they departed from him—for they left him with many diseases—his servants conspired against him because of the blood of the sons of Jehoiada the priest[a], and they killed him on his bed, and he died. They buried him in the city of David, but they did not bury him in the tombs of the kings.
  footnotes:
  - marker: a
    text: 'Hebrew: ''the blood of the sons of Jehoiada the priest.'' In context this may refer specifically to ''the son of Jehoiada,'' that is, Zechariah (24:20–22).'
    reason: alternative_reading
