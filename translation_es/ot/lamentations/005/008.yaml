translation:
  language: es
  text: Esclavos[a] gobiernan sobre nosotros; no hay quien nos rescate de sus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos». El hebreo עֲבָדִים puede significar «siervos» o «esclavos»; aquí se elige «esclavos» para conservar el peso de la humillación social en el lamento.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de sus manos», un modismo para estar bajo su poder o control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדִים
  english_pob_choice: Slaves
  chosen_spanish: Esclavos
  alternatives_spanish:
  - siervos
  lexicon: HALOT
  rationale: El hebreo עֶבֶד/עֲבָדִים puede abarcar ‘siervo’ o ‘esclavo’, pero el contexto del lamento subraya la humillación social y el vuelco de poder. ‘Esclavos’ conserva mejor esa fuerza que ‘siervos’ en español.
- source_word: מָשְׁלוּ בָנוּ
  english_pob_choice: rule over us
  chosen_spanish: dominan sobre nosotros
  alternatives_spanish:
  - gobiernan sobre nosotros
  - tienen dominio sobre nosotros
  lexicon: HALOT
  rationale: מָשַׁל con ב expresa ejercer autoridad o dominio sobre alguien. ‘Dominan sobre nosotros’ comunica la opresión de forma natural en español y mantiene el sentido relacional del verbo.
- source_word: פֹּרֵק
  english_pob_choice: to rescue
  chosen_spanish: rescata
  alternatives_spanish:
  - libera
  - saca de
  - redime
  lexicon: HALOT
  rationale: El participio funciona sustantivamente como ‘uno que rescata/libera’. ‘Rescata’ es idiomático en español y conserva la idea de sacar a alguien del control ajeno sin añadir matices no presentes en el texto.
- source_word: אֵין
  english_pob_choice: there is no one
  chosen_spanish: no hay quien
  alternatives_spanish:
  - no existe nadie que
  - no hay nadie que
  lexicon: HALOT
  rationale: La construcción existencial se rinde de manera natural con ‘no hay quien’, que en español expresa con claridad la ausencia de un rescatador.
- source_word: מִיָּדָם
  english_pob_choice: from their hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de su control
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de ‘mano’, que en español puede entenderse como poder o dominio. ‘De su mano’ mantiene la metáfora auditivamente cercana al hebreo.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el texto fuente y el testimonio inglés coinciden estrechamente en sentido y en las principales decisiones léxicas.
  spanish_consistency_notes:
  - Se mantuvo la imagen concreta de ‘mano’ en lugar de sustituirla por una abstracción como ‘poder’, para conservar el paralelismo con el hebreo.
  - Se evitó ‘siervos’ en el cuerpo del texto porque suaviza la dureza social que el contexto lamenta.
  - ‘Rescata’ se prefirió a ‘libera’ o ‘redime’ por claridad moderna y fidelidad al valor contextual del participio.
