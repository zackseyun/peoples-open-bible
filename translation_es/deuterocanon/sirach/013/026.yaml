  source_alignment_summary: 'El borrador español sigue fielmente el hebreo primario: לֵב אֱנוֹשׁ יְשַׁנֵּא פָנָיו, אִם לְטוֹב וְאִם לְרָע. «El corazón de una persona cambia su rostro» preserva bien la relación entre la disposición interior y la expresión exterior, y «ya sea para bien o para mal» transmite adecuadamente la antítesis final. La nota textual también refleja correctamente que el griego paralelo difiere de manera notable y que el texto principal debe seguir al hebreo.'
