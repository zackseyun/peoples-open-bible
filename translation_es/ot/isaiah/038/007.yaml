translation:
  language: es
  text: 'Y esta será para ti la señal de parte de Yahvé: que Yahvé hará este asunto[a] que ha hablado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta cosa» o «esta palabra»; el hebreo davar puede referirse a una cosa, asunto o palabra dicha.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֶה
  english_pob_choice: And this
  chosen_spanish: Y esta
  alternatives_spanish:
  - Y esto
  - Y esta será
  lexicon: HALOT
  rationale: La conjunción más demostrativo introduce la afirmación de la señal; en español, «Y esta» mantiene la continuidad discursiva con naturalidad y respeta el deíctico femenino de «señal».
- source_word: לְּ/ךָ
  english_pob_choice: to you
  chosen_spanish: para ti
  alternatives_spanish:
  - a ti
  - para usted
  lexicon: HALOT
  rationale: El sufijo de segunda masculina singular indica destinatario directo. «Para ti» expresa bien el beneficio/relación de la señal en un registro natural y reverente.
- source_word: הָ/אוֹת
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - el signo
  - la prueba
  lexicon: HALOT
  rationale: El artículo hace definido el sustantivo. En español bíblico actual, «señal» es claro y fiel para una confirmación dada por Dios.
- source_word: מֵ/אֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - por parte de Yahvé
  lexicon: HALOT
  rationale: La preposición marca procedencia/origen. «De parte de Yahvé» comunica mejor en español la idea de que la señal viene de su iniciativa y autoridad; se conserva el nombre divino según la norma del proyecto.
- source_word: אֲשֶׁר יַעֲשֶׂה יְהוָה
  english_pob_choice: that Yahweh will do
  chosen_spanish: que Yahvé hará
  alternatives_spanish:
  - el cual Yahvé hará
  - que Yahvé va a hacer
  lexicon: HALOT
  rationale: La relativa explica el contenido de la señal. «Que Yahvé hará» reproduce de forma natural la cláusula y mantiene el futuro profético sin añadir matices no presentes.
- source_word: יַעֲשֶׂה
  english_pob_choice: will do
  chosen_spanish: hará
  alternatives_spanish:
  - hará acontecer
  - realizará
  lexicon: HALOT
  rationale: עשה es amplio; en esta construcción, «hará» es la forma española más directa y sobria para el acto que Dios efectuará.
- source_word: אֶת הַ/דָּבָר הַ/זֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - esta palabra
  - esto
  lexicon: HALOT
  rationale: דבר puede significar cosa, asunto o palabra. Aquí el contexto apunta a un evento/promesa específica que Dios ejecutará; «esta cosa» conserva la amplitud semántica sin reducirla solo a «palabra».
- source_word: אֲשֶׁר דִּבֵּר
  english_pob_choice: that he has spoken
  chosen_spanish: que ha hablado
  alternatives_spanish:
  - que habló
  - que dijo
  lexicon: HALOT
  rationale: El verbo דִּבֵּר remite al hablar previo de Yahvé. «Ha hablado» mantiene la referencia a una declaración ya emitida con relevancia vigente, sin interpretar más allá del lexema.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en vez de reemplazarlo por una mayúscula litúrgica. Esto conserva el nombre propio revelado en el texto hebreo.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura aprobada en el audit trail inglés: mantiene la cláusula explicativa de la señal, conserva la amplitud de דבר con una nota, y adopta Yahvé conforme a la directriz doctrinal del proyecto. No se detectan revisiones posteriores que obliguen a alterar la formulación base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en todo el versículo para consistencia con la política del proyecto.
  - «Señal» traduce el sustantivo definido de forma uniforme y natural para lectores hispanohablantes.
  - La nota al pie preserva la tensión lexical de דבר sin fijar indebidamente el sentido en solo una opción.
