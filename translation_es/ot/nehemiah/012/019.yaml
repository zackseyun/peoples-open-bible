- source_word: לִֽ/ידַֽעְיָ֖ה
  english_pob_choice: for Jedaiah
  chosen_spanish: para Jedaía
  alternatives_spanish:
  - para Jedaiah
  - perteneciente a Jedaía
  lexicon: HALOT
  rationale: La preposición לְ expresa pertenencia o adscripción dentro de la lista. «Para» mantiene esa relación de manera concisa en español. Se usa la forma castellana del nombre bíblico, Jedaía, por claridad y lectura eclesial.
- source_word: עֻזִּֽי
  english_pob_choice: Uzzi
  chosen_spanish: Uzzi
