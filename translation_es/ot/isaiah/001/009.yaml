translation:
  language: es
  text: Si Yahvé de los ejércitos no nos hubiera dejado un[a] remanente muy pequeño, habríamos quedado como Sodoma; habríamos sido semejantes a Gomorra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si el Señor de los ejércitos no hubiera preservado para nosotros a unos pocos sobrevivientes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּלֵי
  english_pob_choice: If ... had not
  chosen_spanish: Si ... no hubiera
  alternatives_spanish:
  - A menos que ...
  - De no haber ...
  lexicon: HALOT
  rationale: Expresa en español la condición contrafactual del hebreo sin introducir matices que no están en el texto. 'Si ... no hubiera' comunica claramente la situación irreal pasada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, siguiendo la terminología POB para יהוה y evitando la sustitución por un título genérico.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los ejércitos
  lexicon: HALOT
  rationale: '''Ejércitos'' mantiene la amplitud del título hebreo y es natural en español; evita estrechar indebidamente el alcance a un solo referente militar.'
- source_word: הוֹתִיר
  english_pob_choice: had not left
  chosen_spanish: no nos hubiera dejado
  alternatives_spanish:
  - no nos hubiera preservado
  - no nos hubiera hecho quedar
  lexicon: HALOT
  rationale: '''Dejar'' reproduce bien la idea de ''dejar en reserva / dejar restante'' en un contexto de remanente. La alternativa ''preservado'' es válida, pero ''dejar'' sigue mejor el paralelismo del verso.'
- source_word: שָׂרִיד
  english_pob_choice: remnant
  chosen_spanish: remanente
  alternatives_spanish:
  - resto
  - sobrevivientes
  - supervivientes
  lexicon: HALOT
  rationale: '''Remanente'' es el equivalente español más natural para el motivo profético del remanente y conserva la fuerza teológica-literaria del término sin convertirlo en una mera descripción numérica.'
- source_word: כִּמְעָט
  english_pob_choice: a very small
  chosen_spanish: muy pequeño
  alternatives_spanish:
  - poquísimo
  - muy poco
  lexicon: HALOT
  rationale: La idea de pequeñez cuantitativa se expresa con naturalidad en español con 'muy pequeño', concordando con 'remanente'.
- source_word: כִּסְדֹם
  english_pob_choice: like Sodom
  chosen_spanish: como Sodoma
  alternatives_spanish:
  - igual que Sodoma
  - a la manera de Sodoma
  lexicon: HALOT
  rationale: La comparación simple con כ se refleja de forma directa y natural.
- source_word: הָיִינוּ
  english_pob_choice: we would have become
  chosen_spanish: habríamos quedado
  alternatives_spanish:
  - habríamos sido
  - habríamos llegado a ser
  lexicon: HALOT
  rationale: '''Habríamos quedado'' expresa el estado resultante de la comparación contrafactual en español con fluidez, sin perder el sentido de cambio implícito.'
- source_word: לַעֲמֹרָה
  english_pob_choice: Gomorrah
  chosen_spanish: Gomorra
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre propio.
- source_word: דָּמִינוּ
  english_pob_choice: we would have resembled
  chosen_spanish: habríamos sido semejantes
  alternatives_spanish:
  - habríamos parecido
  - habríamos sido como
  lexicon: HALOT
  rationale: '''Semejantes'' conserva explícitamente el verbo de similitud sin duplicar exactamente ''como'', manteniendo el paralelismo del hebreo y una dicción natural en español.'
theological_decisions:
- issue: Nombre divino יהוה en un oráculo de juicio con apelación al pacto
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los ejércitos
  - Yahvé de las huestes
  rationale: 'Se mantiene el nombre propio divino según el estándar POB y se traduce צְבָאוֹת con una expresión transparente. Esto preserva el peso del sujeto que salva el remanente: no una categoría abstracta, sino Yahvé mismo.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el control inglés más reciente: no se requieren revisiones adicionales según el pass auditado; la solución española mantiene la condicional contrafactual, el nombre divino Yahvé y el motivo del remanente sin suavizarlos.'
  spanish_consistency_notes:
  - Se prefirió «remanente» sobre «resto» o «sobrevivientes» por coherencia con el lenguaje profético del POB.
  - Se evitó «SEÑOR» para יהוה conforme al criterio documental del proyecto.
  - 'La doble idea final se conservó con dos verbos de estado/parecido: «habríamos quedado» y «habríamos sido semejantes», reflejando הָיִינוּ / דָּמִינוּ sin fusionarlos.'
