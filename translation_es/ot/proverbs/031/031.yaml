  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: imperativo plural + dativo femenino, luego una segunda exhortación volitiva con la personificación de las obras. Sin embargo, ''de fruto de sus manos'' omite el artículo y suena incompleto en español; además, ''en las puertas'' preserva la imagen literal pero en español necesita la nota cultural ya presente en el rastro inglés para evitar una lectura demasiado física o ambigua.'
  spanish_quality_summary: 'La línea es bastante fiel, pero requiere un ajuste menor de naturalidad y gramática: ''Denle del fruto de sus manos'' es idiomático y claro. También conviene añadir notas para reflejar las dos notas del POB inglés: la alternativa ''sus obras''/''sus hechos'' y el sentido cultural de ''las puertas'' como puertas de la ciudad.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Obras' para מַעֲשֶׂיהָ está bien; 'manos' preserva la metáfora concreta de יָדֶיהָ; no hay términos teológicos especiales en disputa. La única corrección necesaria es estilística-lexical en 'de fruto' -> 'del fruto', y la incorporación de las notas auditadas.
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: ''de fruto de sus manos'''
    rationale: Para מִפְּרִי יָדֶיהָ, el español natural requiere 'del fruto de sus manos' o 'del fruto de su trabajo'. La forma actual suena gramaticalmente deficiente y no representa bien la decisión inglesa auditada 'of the fruit'.
  - severity: low
    issue: Faltan notas heredadas del POB inglés
    rationale: El expediente inglés conserva una nota cultural sobre 'las puertas/gates' y una alternativa léxica sobre 'obras/deeds'. Dado que ambas siguen siendo relevantes en español, deben preservarse con marcadores únicos en el texto.
  revised_spanish_text: Denle del fruto de sus manos,[a] y que sus obras[b] la alaben en las puertas.[c]
