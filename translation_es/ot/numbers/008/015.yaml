review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la secuencia temporal, el servicio de los levitas y la purificación ritual. Sin embargo, no preserva plenamente la fuerza del hebreo וְהֵנַפְתָּ אֹתָם תְּנוּפָה, que explícitamente mantiene la imagen cultual de 'mecer/presentar en ofrenda mecida' a ellos mismos. 'Los presentarás como ofrenda mecida' suaviza demasiado el verbo ritual señalado por la auditoría inglesa, y la nota [a] en español no corresponde a la nota cultural inglesa, que explica la acción de 'wave offering', no 'vendrán'.
  spanish_quality_summary: 'El español es claro y natural, pero hay dos mejoras necesarias: 1) ''en la Tienda de Reunión'' puede ajustarse a ''en la tienda de reunión'' por capitalización española ordinaria; 2) la distribución de notas debe alinearse mejor con los puntos realmente ambiguos o culturalmente relevantes. La frase revisada sigue siendo plenamente legible en español eclesial general.'
  glossary_alignment: No hay conflicto con términos troncales del glosario. 'Levitas', 'purificarás' y 'tienda de reunión' son adecuados. El punto clave es conservar la terminología ritual explícita para תְּנוּפָה; por eso conviene 'los mecerás como ofrenda mecida' con nota aclaratoria, en lugar de solo 'los presentarás'.
  issues:
  - severity: medium
    issue: El verbo ritual de נוף queda atenuado en 'los presentarás'.
    rationale: 'La auditoría inglesa decidió mantener el sentido literal y llamativo: ''wave them as a wave offering''. El español puede sonar inusual, pero debe conservar el rito explícito en vez de reducirlo a una presentación genérica.'
  - severity: medium
    issue: La nota cultural está anclada en 'vendrán' en vez de en la expresión de la ofrenda mecida.
    rationale: La nota inglesa b explica que se trata de presentarlos ceremonialmente ante Yahvé como ofrenda mecida. En español, esa explicación debe acompañar la frase ritual, no el verbo de llegada.
  - severity: low
    issue: Capitalización innecesaria en 'Tienda de Reunión'.
    rationale: 'En español bíblico moderno, salvo política editorial contraria, el nombre común descriptivo suele ir en minúscula: ''tienda de reunión''.'
  revised_spanish_text: Y después de eso, los levitas vendrán para servir en la tienda de reunión, y los purificarás[a] y los mecerás[b] como ofrenda mecida.
  revised_footnotes:
