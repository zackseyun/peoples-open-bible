translation:
  language: es
  text: Y el pueblo se regocijaba en Jerusalén delante del santuario[a] durante tres meses, y Judit permaneció con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de las cosas santas» o «en presencia de los seres santos»; la frase griega dice literalmente «delante de los santos [cosas/seres]».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λαός
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  - el pueblo reunido
  lexicon: BDAG
  rationale: «El pueblo» es la forma natural para un colectivo definido y conserva el valor comunitario del griego sin añadir matices políticos o sociológicos que el contexto no exige.
- source_word: εὐφραινόμενος
  english_pob_choice: were rejoicing
  chosen_spanish: estaba regocijándose
  alternatives_spanish:
  - estaba celebrando
  - estaba alegrándose
  - se regocijaba
  lexicon: BDAG
  rationale: El participio durativo pide una acción en curso. «Estaba regocijándose» mantiene el aspecto progresivo y el tono festivo más solemne que «estaba celebrando»; en español suena algo más marcado, pero refleja bien el registro del contexto.
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: NA/LSJ
  rationale: La preposición y el topónimo se rinden de manera directa y natural en español.
- source_word: κατὰ πρόσωπον τῶν ἁγίων
  english_pob_choice: before the sanctuary
  chosen_spanish: delante del santuario
  alternatives_spanish:
  - delante de las cosas santas
  - en presencia de los santos
  - delante del lugar santo
  lexicon: LSJ
  rationale: Siguiendo el audit trail inglés, «santuario» comunica el probable referente cultual en Jerusalén y conserva la fuerza espacial de «delante de». Se evita «santos» porque en español sugiere personas canonizadas o creyentes, no el ámbito sagrado del templo.
- source_word: ἐπὶ μῆνας τρεῖς
  english_pob_choice: for three months
  chosen_spanish: durante tres meses
  alternatives_spanish:
  - por tres meses
  - a lo largo de tres meses
  lexicon: BDAG
  rationale: «Durante tres meses» expresa con naturalidad la duración temporal del evento y preserva el valor adverbial de la construcción griega.
- source_word: κατέμεινεν
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - siguió con ellos
  - continuó con ellos
  lexicon: LSJ
  rationale: «Permaneció» reproduce con sobriedad la idea de quedarse con el grupo después de la celebración, sin añadir una connotación demasiado coloquial.
theological_decisions:
- issue: Referente de τῶν ἁγίων en un contexto de Jerusalén
  english_pob_reading: sanctuary / sacred precinct
  chosen_spanish_reading: santuario
  alternative_spanish_readings:
  - las cosas santas
  - los santos
  - el lugar santo
  rationale: La estructura con «delante de» y el marco de Jerusalén favorecen un referente cultual. «Santuario» es el equivalente español más claro para ese sentido probable, sin forzar una lectura eclesial posterior ni borrar la ambigüedad subyacente del griego.
  doctrine_reference: Principio de primacía del idioma original y preservación de ambigüedades significativas en notas.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una decisión interpretativa fuerte para τῶν ἁγίων («before the sanctuary») con nota de alternativas. La versión española sigue esa decisión, pero usa «delante del santuario», que es la formulación más natural y fiel para el marco cultual de Jerusalén. No se detectaron revisiones posteriores que obliguen a modificar el sentido.
  spanish_consistency_notes:
  - Se mantiene «Judit» para el nombre propio en coherencia con el uso bíblico español.
  - «Santuario» preserva el registro cultual y evita sustituir el término por una paráfrasis devocional.
  - Se conserva el aspecto progresivo con «estaba regocijándose», acorde con el participio griego.
  - La nota al pie recoge la ambigüedad léxica de τῶν ἁγίων sin resolverla de forma excesiva en el cuerpo del texto.
