translation:
  language: es
  text: Y sucedió el octavo día que Moisés llamó a Aarón, a sus hijos y a los ancianos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «convocó» para «llamó»; el verbo hebreo puede llevar cualquiera de los dos matices según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce un nuevo momento en la historia. «Y sucedió» conserva esa transición con un español natural y sobrio, sin caer en un giro arcaico.
- source_word: בַּיּוֹם הַשְּׁמִינִי
  english_pob_choice: on the eighth day
  chosen_spanish: en el día octavo
  alternatives_spanish:
  - el octavo día
  - en el octavo día
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en el día octavo». «En el día octavo» mantiene la forma temporal del texto fuente con claridad en español. «El octavo día» también sería posible, pero aquí se preserva mejor la estructura hebrea.
- source_word: קָרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - s llamó
  lexicon: HALOT
  rationale: «Llamó» es la equivalencia directa y más neutra. «Convocó» puede sugerir una reunión más formal o administrativa, pero el hebreo no obliga a esa intensificación. En español, «llamar» también puede abarcar la idea de convocar en este contexto.
- source_word: לְאַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma española habitual y reverente.
- source_word: וּלְבָנָיו
  english_pob_choice: and his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos y descendientes
  lexicon: HALOT
  rationale: El sustantivo בנים puede significar «hijos»; el contexto sacerdotal deja claro que se trata de los descendientes varones de Aarón. En español, «hijos» es más natural que «hijos varones» y no pierde el referente masculino implícito en la línea sacerdotal.
- source_word: וּלְזִקְנֵי יִשְׂרָאֵל
  english_pob_choice: and the elders of Israel
  chosen_spanish: y a los ancianos de Israel
  alternatives_spanish:
  - y a los mayores de Israel
  - y a los líderes de Israel
  lexicon: HALOT
  rationale: «Ancianos» reproduce el término social e institucional del hebreo para los representantes reconocidos de la comunidad. «Líderes» sería explicativo, pero menos preciso; «mayores» suena más etario que representativo.
translation_notes:
  revision_awareness: 'El texto inglés auditado conserva una equivalencia óptima sencilla: transición narrativa con וַיְהִי, el sintagma temporal literal «on the eighth day», y el verbo קָרָא como «called» con alternativa a «summoned». No se reportan revisiones posteriores ni cambios pendientes; el borrador español sigue esa misma lectura sin añadir información ausente del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Y sucedió» para la apertura narrativa, en coherencia con el valor de וַיְהִי.
  - Se conserva la secuencia de destinatarios con «a Aarón, a sus hijos y a los ancianos de Israel» para reflejar el hebreo sin expandirla.
  - Se usa «Aarón» y «Moisés» con formas españolas estándar de nombres bíblicos.
  - La nota sobre «llamó»/«convocó» preserva la tensión lexical documentada por el POB inglés sin imponer una sola lectura.
  - No se introduce terminología litúrgica posterior como «SEÑOR» o «Cristo», pues el versículo no contiene esos términos.
