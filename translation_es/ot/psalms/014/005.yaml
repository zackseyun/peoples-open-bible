review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: «Allí» para שָׁם, una expresión intensificada de temor para פָּחֲדוּ פָחַד, y la relación causal con כִּי. También mantiene correctamente la lectura auditada de בְּדוֹר como presencia/solidaridad divina con la generación de los justos. Sin embargo, la nota alternativa [b] no preserva con precisión la alternativa inglesa, porque «entre la generación» suena poco natural y no corresponde bien a «among the generation / among the righteous generation».'
  spanish_quality_summary: El español principal es claro, digno y legible. «Tuvieron gran temor» funciona, aunque «se llenaron de gran temor» sería más idiomático; no obstante, no exige cambio. El problema principal está en la nota [b], cuya redacción es torpe en español e introduce una alternativa menos natural que la documentada. Conviene ajustar esa nota para que suene natural y siga mejor la justificación lexical.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios» y «justos» son adecuados. No aparece ningún término sensible del glosario que requiera corrección.
  issues:
  - severity: medium
    issue: La nota [b] usa «entre la generación de los justos»
    rationale: Aunque intenta reflejar la alternativa inglesa, en español «entre la generación» resulta poco idiomático. Una alternativa más fiel y natural es «Dios está entre los justos» o «Dios está en medio de la generación de los justos», según el grado de literalidad deseado. Dado que es nota explicativa, debe evitar una formulación extraña.
  revised_spanish_text: Allí tuvieron gran temor[a], porque Dios está con la generación de los justos[b].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «temieron un temor», una expresión enfática que significa que fueron sobrecogidos por gran terror.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede traducirse: «Dios está entre los justos».'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque es fiel y natural en español. Solo se corrige la nota alternativa [b] para que exprese de forma idiomática la posibilidad semántica de בְּ sin la formulación torpe «entre la generación».
