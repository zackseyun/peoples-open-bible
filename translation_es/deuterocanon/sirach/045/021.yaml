    rationale: El hebreo dice explícitamente לחם, y el POB inglés decidió hacerlo visible en la traducción principal ('the choicest holy bread'). 'La porción más escogida de las cosas santas' traslada parte del sentido, pero no preserva ese elemento léxico clave.
  - severity: medium
    issue: '''Ofrendas encendidas'' es poco idiomático y puede sonar opaco.'
    rationale: Para אשי יהוה, la nota reconoce la alternativa 'ofrendas por fuego'. En español corriente eclesial, 'ofrendas de alimento' comunica bien la función cultual, mientras que 'ofrendas encendidas' no es una expresión asentada ni especialmente clara.
  - severity: low
