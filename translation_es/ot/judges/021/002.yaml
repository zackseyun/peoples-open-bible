translation:
  language: es
  text: Entonces el pueblo vino a Betel y se sentaron allí hasta la tarde, delante de Dios, y alzaron su voz y lloraron con gran llanto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lloraron un gran llanto»; el hebreo usa una expresión cognada para intensificar el duelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: El verbo expresa llegada narrativa a un lugar; «vino» conserva bien el movimiento de arribo en un español natural y no añade el matiz de entrada física que «llegó» también podría sugerir, aunque ambas son posibles.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: En este contexto se trata del colectivo de Israel reunido, no de un grupo indefinido; «el pueblo» mantiene el valor corporativo sin volverlo militar ni demasiado coloquial.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - la casa de Dios
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio de lugar, por lo que se translitera como «Betel» y no se traduce como sustantivo común.
- source_word: וַיֵּשְׁבוּ שָׁם
  english_pob_choice: sat there
  chosen_spanish: se quedó allí
  alternatives_spanish:
  - se sentó allí
  - permaneció allí
  lexicon: HALOT
  rationale: El hebreo puede implicar sentarse o permanecer; en español, «se quedó allí» transmite de forma natural la permanencia concreta en ese lugar, sin forzar una imagen corporal de sentarse que podría sonar menos idiomática en este contexto.
- source_word: עַד הָעֶרֶב
  english_pob_choice: until evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el anochecer
  - hasta la noche
  lexicon: HALOT
  rationale: «La tarde» conserva el valor temporal básico de עֶרֶב y suena natural en español. «Hasta el anochecer» sería más interpretativo; «hasta la noche» desplaza el punto temporal.
- source_word: לִפְנֵי הָאֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  lexicon: HALOT
  rationale: El texto hebreo dice אֱלֹהִים, no YHWH; por eso se mantiene «Dios». «Delante de» refleja bien la fórmula espacial-presencial לִפְנֵי sin elevarla a un registro más jurídico que el del hebreo.
- source_word: וַיִּשְׂאוּ קוֹלָם
  english_pob_choice: raised their voices
  chosen_spanish: alzaron su voz
  alternatives_spanish:
  - levantaron la voz
  - alzaron sus voces
  lexicon: HALOT
  rationale: La expresión idiomática se conserva en español como un acto audible de clamor. «Alzaron su voz» sigue de cerca la imagen hebrea; el singular colectivo de «su voz» funciona naturalmente con un sujeto plural.
- source_word: וַיִּבְכּוּ בְּכִי גָדוֹל
  english_pob_choice: wept with great weeping
  chosen_spanish: lloraron con gran llanto
  alternatives_spanish:
  - lloraron con un gran llanto
  - lloraron amargamente
  - hicieron un gran llanto
  lexicon: HALOT
  rationale: El hebreo usa una construcción de intensificación con la misma raíz; «gran llanto» preserva esa fuerza sin normalizarla demasiado. «Lloraron con gran llanto» mantiene el carácter cognado y evita traducirlo sólo como una emoción interpretativa como «amargamente».
theological_decisions:
- issue: Uso de אֱלֹהִים en un contexto de culto y duelo
  english_pob_reading: before God
  chosen_spanish_reading: delante de Dios
  alternative_spanish_readings:
  - ante el SEÑOR
  - delante del Señor
  rationale: Se conserva «Dios» porque la fuente hebrea emplea אֱלֹהִים y no el nombre YHWH. Aunque el contexto es cultual, no se debe armonizar con «SEÑOR» o «Señor»; la decisión mantiene la distinción textual documentada por la POB inglesa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tabla de términos controvertidos para יְהוָה
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto con la revisión inglesa más reciente y no requiere ajustes textuales; la redacción española sigue la decisión auditada de mantener el nombre de lugar, el valor de אֱלֹהִים como «Dios» y la intensificación cognada de «bĕkhî gādôl».
  spanish_consistency_notes:
  - Se mantiene la distinción entre «Dios» y cualquier lectura con «SEÑOR», en línea con el hebreo.
  - Se usa «Betel» como topónimo fijo y no una paráfrasis como «casa de Dios».
  - «Gran llanto» conserva la intensificación del sustantivo cognado sin volverla una explicación libre.
  - El registro es bíblico-formal pero en español natural y publicable.
