    reason: lexical_alternative
  revision_rationale: 'Se hicieron dos ajustes menores para alinearse mejor con el hebreo y el audit trail inglés: (1) «Así dice el rey» restaura la fórmula mensajera estándar; (2) «llevó la respuesta de vuelta al rey» expresa mejor el sentido idiomático de regresar con un informe. Se conserva «Yahvé» y la alternativa léxica sobre «tienda/tabernáculo».'
