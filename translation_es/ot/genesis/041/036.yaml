translation:
  language: es
  text: Y ese alimento será una reserva[a] para la tierra, para los siete años de hambre que habrá en la tierra de Egipto, para que la tierra no perezca[b] por el hambre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «para almacenamiento» o «depósito» para לְפִקָּדוֹן.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sea cortada»; el sentido aquí es que la tierra no sea arruinada o destruida por el hambre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - habrá de ser
  - estará
  lexicon: HALOT
  rationale: El hebreo introduce un resultado futuro e intencional; en español, «será» comunica de forma natural ese valor profético/instructivo sin sobrecargar la frase.
- source_word: הָאֹכֶל
  english_pob_choice: that food
  chosen_spanish: ese alimento
  alternatives_spanish:
  - ese alimento
  - ese grano
  - el alimento
  lexicon: HALOT
  rationale: אֹכֶל es más amplio que «grano»; «ese alimento» mantiene la referencia al sustento reunido antes y preserva el alcance léxico del hebreo.
- source_word: לְפִקָּדוֹן
  english_pob_choice: a reserve
  chosen_spanish: provisión
  alternatives_spanish:
  - reserva
  - depósito
  - almacén
  lexicon: HALOT
  rationale: El término denota algo guardado para uso futuro. «Provisión» comunica bien la idea funcional en español, aunque «reserva» sigue siendo una alternativa válida; se evita un tecnicismo que suene poco natural en lectura pública.
- source_word: לָאָרֶץ
  english_pob_choice: for the land
  chosen_spanish: para la tierra
  alternatives_spanish:
  - para la tierra
  - para el país
  - para la región
  lexicon: HALOT
  rationale: «Tierra» conserva el término hebreo אֶרֶץ y el motivo repetido del versículo, en lugar de reducirlo a una explicación geográfica más libre.
- source_word: לְשֶׁבַע שְׁנֵי הָרָעָב
  english_pob_choice: for the seven years of famine
  chosen_spanish: para los siete años de hambre
  alternatives_spanish:
  - para los siete años de hambre
  - para los siete años de la hambruna
  - para los siete años del hambre
  lexicon: HALOT
  rationale: Se traduce el sintagma constructo de forma directa y natural. «Hambre» refleja el sustantivo hebreo en contexto, y «años» mantiene la estructura de duración.
- source_word: אֲשֶׁר תִּהְיֶיןָ
  english_pob_choice: that will be
  chosen_spanish: que habrá
  alternatives_spanish:
  - que serán
  - que existirán
  - que vendrán
  lexicon: HALOT
  rationale: El relativo apunta a un acontecimiento futuro. «Habrá» suena más idiomático en español que una repetición pesada de «serán» y preserva el carácter prospectivo.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  - en Egipto
  lexicon: HALOT
  rationale: Se mantiene la formulación plena «tierra de Egipto» para respetar el paralelismo con «la tierra» y el estilo del hebreo.
- source_word: וְלֹא תִכָּרֵת הָאָרֶץ
  english_pob_choice: so that the land may not perish
  chosen_spanish: para que la tierra no perezca
  alternatives_spanish:
  - para que la tierra no sea destruida
  - para que la tierra no sea cortada
  lexicon: HALOT
  rationale: El nifal de כרת conserva la imagen de «ser cortada», pero en este contexto el resultado es la ruina/perdición de la tierra. «Perezca» da un español natural sin borrar la tensión léxica; la nota explica la literalidad subyacente.
- source_word: בָּרָעָב
  english_pob_choice: through the famine
  chosen_spanish: por el hambre
  alternatives_spanish:
  - por el hambre
  - a causa del hambre
  - por la hambruna
  lexicon: HALOT
  rationale: La preposición expresa causa o medio. «Por el hambre» es conciso y fiel; «hambre» mantiene la correspondencia con רָעָב sin introducir un término más interpretativo.
translation_notes:
  revision_awareness: El texto español sigue la última revisión del inglés al traducir de manera más directa la relación final («para que... no perezca») y evita la idea de «against» que fue descartada en el audit trail. También conserva la tensión de כרת con una nota literal, aunque el cuerpo principal adopta una equivalencia natural en español.
  spanish_consistency_notes:
  - Se mantiene «tierra» para אֶרֶץ en ambas ocurrencias, en consonancia con el motivo repetido del versículo.
  - «Hambre» se usa para רָעָב siguiendo el valor contextual del sustantivo; no se reemplaza por «hambruna» en el texto principal para evitar un registro demasiado explicativo.
  - «Y ese alimento» conserva la referencia anafórica al grano/alimento reunido previamente sin añadir palabras ajenas al hebreo.
  - La puntuación refleja una sola oración final con propósito, como en el hebreo.
  - Se evita «SEÑOR» o terminología sustitutiva porque no aparece el Tetragrámaton en este versículo.
