translation:
  language: es
  text: 'Entonces dijimos: «Si en el porvenir nos dicen a nosotros o a nuestras generaciones, entonces diremos: “Miren el modelo[a] del altar de Yahvé, que nuestros padres hicieron, no para holocausto ni para sacrificio, sino como testigo entre nosotros y ustedes”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «figura», «representación» o «copia» del altar de Yahvé. El término hebreo indica una forma o diseño, lo que sugiere que este altar era una réplica que servía como testimonio y no como el altar sacrificial autorizado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֹּאמֶר
  english_pob_choice: So we said
  chosen_spanish: Y dijimos
  alternatives_spanish:
  - Entonces dijimos
  - Así dijimos
  lexicon: HALOT
  rationale: La forma con waw consecutiva continúa la narración; en español, «Y dijimos» reproduce el avance secuencial con naturalidad. «Entonces» sería posible, pero aquí el enlace simple conserva mejor el flujo del relato.
- source_word: וְהָיָה כִּי
  english_pob_choice: If ... should
  chosen_spanish: Si
  alternatives_spanish:
  - Y acontecerá que si
  - Y será que si
  lexicon: HALOT
  rationale: La construcción introduce una contingencia futura. En español, «Si» expresa con claridad el valor condicional sin cargar el texto de una fórmula menos natural.
- source_word: יֹאמְרוּ אֵלֵינוּ וְאֶל דֹּרֹתֵינוּ מָחָר
  english_pob_choice: they should say to us or to our generations in time to come
  chosen_spanish: mañana nos dicen, o a nuestras generaciones después de nosotros
  alternatives_spanish:
  - nos dicen o a nuestras generaciones en el porvenir
  - nos digan a nosotros y a nuestras generaciones futuras
  lexicon: HALOT
  rationale: מָחָר tiene aquí sentido idiomático de futuro, no literalmente «mañana». «Después de nosotros» hace visible el valor generacional de דֹּרֹתֵינוּ sin perder la relación con el tiempo venidero.
- source_word: וְאָמַרְנוּ
  english_pob_choice: then we will say
  chosen_spanish: entonces diremos
  alternatives_spanish:
  - y diremos
  - y responderemos
  lexicon: HALOT
  rationale: La apódosis del escenario condicional se expresa naturalmente con «entonces diremos», que conserva la secuencia lógica del original.
- source_word: רְאוּ
  english_pob_choice: Look at
  chosen_spanish: Mirad
  alternatives_spanish:
  - Ved
  - Miren
  lexicon: HALOT
  rationale: El imperativo plural de atención se traduce con «Mirad», que es claro y sobrio en español bíblico contemporáneo. Se evita «behold» por arcaico y «Miren» por perder el matiz de discurso bíblico plural directo.
- source_word: תַּבְנִית
  english_pob_choice: pattern
  chosen_spanish: figura
  alternatives_spanish:
  - modelo
  - patrón
  - representación
  lexicon: HALOT
  rationale: תַּבְנִית denota forma, diseño o réplica. «Figura» comunica bien la idea de una construcción representativa sin fijar de antemano una sola interpretación técnica; en esta sección la POB inglesa subraya el valor testimonial de una copia o representación, y «figura» preserva esa amplitud en español.
- source_word: מִזְבַּח יְהוָה
  english_pob_choice: the altar of Yahweh
  chosen_spanish: el altar de Yahvé
  alternatives_spanish:
  - el altar de Yahveh
  - el altar de Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para יְהוָה: «Yahvé» en el texto principal. La construcción posesiva «de Yahvé» es natural en español y mantiene el nombre divino sin sustitución por título.'
- source_word: אֲשֶׁר עָשׂוּ אֲבוֹתֵינוּ
  english_pob_choice: which our fathers made
  chosen_spanish: que nuestros padres hicieron
  alternatives_spanish:
  - que nuestros antepasados hicieron
  - que hicieron nuestros padres
  lexicon: HALOT
  rationale: El hebreo dice literalmente «nuestros padres». Se conserva esa referencia masculina y familiar, evitando neutralizarla a «antepasados» sin necesidad textual.
- source_word: לֹא לְעוֹלָה וְלֹא לְזֶבַח
  english_pob_choice: not for burnt offering or for sacrifice
  chosen_spanish: no para holocausto ni para sacrificio
  alternatives_spanish:
  - no para ofrenda quemada ni para sacrificio
  - no para holocausto o para sacrificio
  lexicon: HALOT
  rationale: «עוֹלָה» corresponde al holocausto, y «זֶבַח» aquí se entiende de manera amplia como sacrificio. Se conserva la doble negación con «ni ... ni ...» por su fuerza paralela en español.
- source_word: כִּי עֵד הוּא
  english_pob_choice: but as a witness
  chosen_spanish: sino como testigo
  alternatives_spanish:
  - pero como testigo
  - más bien como testigo
  lexicon: HALOT
  rationale: La cláusula explica la finalidad verdadera del altar en contraste con usos sacrificiales previos. «Sino como testigo» reproduce bien el giro contrastivo implícito y evita una lectura meramente copulativa.
- source_word: בֵּינֵינוּ וּבֵינֵיכֶם
  english_pob_choice: between us and you
  chosen_spanish: entre nosotros y vosotros
  alternatives_spanish:
  - entre nosotros y ustedes
  - entre nosotros y ustedes todos
  lexicon: HALOT
  rationale: Se conserva el plural directo del hebreo con «vosotros» para reflejar con precisión la relación entre los dos grupos. En un registro bíblico digno, esta forma es plenamente inteligible y mantiene la reciprocidad del original.
theological_decisions:
- issue: Renderización de יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme a la política del proyecto, el nombre divino se translitera como «Yahvé» en el texto principal, preservando el nombre de pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido del altar como señal y no como altar sacrificial
  english_pob_reading: a witness between us and you
  chosen_spanish_reading: como testigo entre nosotros y vosotros
  alternative_spanish_readings:
  - como testimonio entre nosotros y vosotros
  - como evidencia entre nosotros y vosotros
  rationale: El contexto niega el uso cultual del altar y afirma su función memorial/testimonial. «Testigo» mantiene la personificación funcional del hebreo עֵד y encaja con el contraste del pasaje; «testimonio» sería también viable, pero menos cercano a la construcción nominal del original.
  doctrine_reference: Joshua 22 context of altar as memorial sign, not unauthorized worship
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del audit trail inglés: mantiene el valor final de «as a witness» mediante «como testigo», y conserva la doble negación sacrificial con una forma natural en español. También ajusta מָחָר como futuro idiomático («mañana») pero lo aclara contextualmente con «después de nosotros» para evitar una lectura literal inadecuada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de manera consistente con la política del proyecto.
  - Se conserva «holocausto» para לְעוֹלָה, y «sacrificio» para זֶבַח, sin fusionarlos.
  - Se mantiene el plural reverente y directo «vosotros» para reflejar el hebreo plural en la dirección del discurso.
  - «Figura» en el texto principal y la nota «figura/modelo/representación» preservan la tensión lexical documentada en תַּבְנִית.
