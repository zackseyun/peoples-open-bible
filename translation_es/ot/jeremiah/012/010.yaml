translation:
  language: es
  text: Muchos pastores[a] han arruinado mi viña; han hollado mi porción[b]; han convertido mi porción agradable en un desierto desolado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Muchos gobernantes' o 'Muchos líderes'; el hebreo dice literalmente 'pastores', metáfora común en la literatura profética para quienes gobiernan o dirigen al pueblo.
    reason: lexical_alternative
  - marker: b
    text: O 'han convertido mi porción preciada en un desierto desolado'.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעִים רַבִּים
  english_pob_choice: Many shepherds
  chosen_spanish: Muchos pastores
  alternatives_spanish:
  - Muchos líderes
  - Muchos gobernantes
  lexicon: HALOT
  rationale: רֹעִים significa literalmente “pastores”. En el lenguaje profético puede funcionar como metáfora de quienes gobiernan u orientan al pueblo; por eso se conserva la imagen en el texto principal. “Pastores” es idiomático en español bíblico y mantiene la metáfora sin explicitarla en exceso.
- source_word: שִׁחֲתוּ
  english_pob_choice: have ruined
  chosen_spanish: han arruinado
  alternatives_spanish:
  - han destruido
  - han corrompido
  lexicon: HALOT
  rationale: El verbo expresa deterioro grave, ruina o devastación. “Han arruinado” refleja bien esa fuerza en español y encaja con la imagen agrícola de la viña sin exagerar hacia aniquilación total.
- source_word: כַרְמִי
  english_pob_choice: my vineyard
  chosen_spanish: mi viña
  alternatives_spanish:
  - mi viñedo
  - mi viña
  lexicon: HALOT
  rationale: כֶּרֶם/כַרְם se traduce naturalmente como “viña” en español bíblico. Mantiene la imagen profética y la relación posesiva de primera persona.
- source_word: בֹּסְסוּ
  english_pob_choice: have trampled
  chosen_spanish: han hollado
  alternatives_spanish:
  - han pisoteado
  - han triturado bajo sus pies
  lexicon: HALOT
  rationale: El verbo describe pisar o aplastar con los pies. “Han hollado” conserva el matiz de tratar con desprecio y deteriorar por el paso, y suena solemne en registro bíblico; “pisoteado” sería una alternativa más directa y moderna.
- source_word: חֶלְקָתִי
  english_pob_choice: my portion
  chosen_spanish: mi porción
  alternatives_spanish:
  - mi parcela
  - mi heredad
  lexicon: HALOT
  rationale: חֶלְקָה puede referirse a una parcela, un lote o una porción. “Mi porción” preserva el alcance semántico amplio y no fuerza una especificación territorial innecesaria.
- source_word: נָתְנוּ
  english_pob_choice: they have made
  chosen_spanish: han convertido
  alternatives_spanish:
  - han hecho
  - han vuelto
  lexicon: HALOT
  rationale: En construcción resultativa con לְ, el verbo comunica el cambio de estado del objeto. “Han convertido” expresa de forma natural la transformación del lugar en desolación.
- source_word: חֶלְקַת חֶמְדָּתִי
  english_pob_choice: my pleasant portion
  chosen_spanish: la porción en que me deleito
  alternatives_spanish:
  - mi porción agradable
  - mi porción preciosa
  - la porción amada por mí
  lexicon: HALOT
  rationale: חֶמְדָּה expresa lo deseable, precioso o deleitoso. “La porción en que me deleito” conserva la cualidad afectiva sin sonar forzado en español, y mantiene la tensión entre pertenencia y valor emocional del lugar.
- source_word: לְמִדְבַּר שְׁמָמָה
  english_pob_choice: a desolate wilderness
  chosen_spanish: en un desolado desierto
  alternatives_spanish:
  - en un desierto de desolación
  - en un yermo desolado
  - en un desierto devastado
  lexicon: HALOT
  rationale: מִדְבָּר es “desierto” o “estepa” y שְׁמָמָה añade la idea de desolación, ruina o vacío. “Desolado desierto” comunica el resultado devastador con fluidez en español, aunque “yermo desolado” sería una opción más literaria.
theological_decisions:
- issue: Si explicitar en el texto principal que 'pastores' significa líderes o gobernantes
  english_pob_reading: Retain the metaphor 'shepherds'
  chosen_spanish_reading: Conservar la metáfora 'pastores'
  alternative_spanish_readings:
  - líderes
  - gobernantes
  - pastores
  rationale: El hebreo usa la metáfora de manera directa. Mantenerla evita resolver interpretativamente el símbolo y preserva la tensión profética entre imagen pastoral y función de gobierno.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Si traducir la imagen de viña y porción como metáfora literal o como explicación del pueblo/tierra
  english_pob_reading: Keep 'vineyard' and 'portion' as literal-metaphorical imagery
  chosen_spanish_reading: Conservar 'viña' y 'porción' como imágenes literales-metafóricas
  alternative_spanish_readings:
  - mi tierra
  - mi heredad
  - mi pueblo
  rationale: El verso acumula imágenes de posesión y devastación. Traducirlas directamente preserva el valor literario y teológico sin aplanarlas en una glosa explicativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que prefirió 'pleasant portion' sobre 'delightful portion' por naturalidad y adecuación formal. En español, se optó por 'la porción en que me deleito' para preservar el valor afectivo de חֶמְדָּתִי sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo 'pastores' como metáfora principal, coherente con el tratamiento POB del hebreo רֹעִים.
  - Se conservó la tríada imagística 'viña / porción / desolado desierto' para no eliminar la tensión literaria del versículo.
  - '''Hollado'' se eligió para reflejar el acto de pisar con fuerza y evitar un tono excesivamente coloquial.'
  - Se evitó 'SEÑOR' porque este versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
