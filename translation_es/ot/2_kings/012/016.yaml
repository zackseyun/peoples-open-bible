translation:
  language: es
  text: Pero no les pedían cuentas[a] a los hombres en cuyas manos[b] entregaban el dinero para darlo a los que hacían la obra, porque actuaban con fidelidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «no les exigían rendición de cuentas».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en sus manos»; expresión idiomática para poner algo bajo el encargo o la custodia de alguien.'
    reason: cultural_note
  - marker: c
    text: 'También puede traducirse: «honradamente» o «con integridad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַשְּׁבוּ
  english_pob_choice: did not reckon with
  chosen_spanish: no se les pedía cuenta
  alternatives_spanish:
  - no se contabilizaba con ellos
  - no se les exigía rendición de cuentas
  - no se hacía cargo con ellos
  lexicon: HALOT
  rationale: El piel de חשׁב aquí tiene el sentido de ajustar o pedir cuentas. En español, «pedir cuenta» expresa bien la idea de exigir un informe o liquidación, sin perder la referencia administrativa del contexto.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los responsables
  lexicon: HALOT
  rationale: אֲנָשִׁים es el plural masculino literal; mantener «los hombres» conserva la referencia específica del texto y evita neutralizar un rasgo gramatical no problemático aquí.
- source_word: עַל יָדָם
  english_pob_choice: into whose hand
  chosen_spanish: a quienes se entregaba el dinero
  alternatives_spanish:
  - en cuya mano se ponía el dinero
  - a quienes se confiaba el dinero
  - bajo cuya responsabilidad quedaba el dinero
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para confiar algo a cargo de alguien. En español, «se entregaba el dinero» comunica naturalmente esa idea sin perder el matiz de encargo o custodia; la nota conserva la imagen literal de «mano».
- source_word: הַכֶּסֶף
  english_pob_choice: the money
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - los fondos
  lexicon: HALOT
  rationale: כֶּסֶף puede ser «plata» o «dinero». En este contexto de fondos para la obra del templo, «dinero» es el equivalente funcional más claro en español contemporáneo.
- source_word: לְעֹשֵׂי הַמְּלָאכָה
  english_pob_choice: to those doing the work
  chosen_spanish: para dárselo a los que hacían la obra
  alternatives_spanish:
  - para entregarlo a los obreros
  - para dárselo a los trabajadores
  - para entregarlo a los que realizaban la obra
  lexicon: HALOT
  rationale: El participio expresa a quienes estaban realizando la labor. «Los que hacían la obra» refleja bien la construcción hebrea y evita restringir innecesariamente el sentido a un término técnico moderno.
- source_word: בֶאֱמֻנָה
  english_pob_choice: faithfully
  chosen_spanish: con fidelidad
  alternatives_spanish:
  - honradamente
  - con integridad
  - fielmente
  lexicon: HALOT
  rationale: אֱמוּנָה abarca fidelidad, confiabilidad e integridad. «Con fidelidad» preserva mejor ese campo semántico que «honradamente», sin reducirlo solo a honestidad financiera.
- source_word: הֵם עֹשִׂים
  english_pob_choice: they acted
  chosen_spanish: actuaban
  alternatives_spanish:
  - obran
  - hacían
  - procedían
  lexicon: HALOT
  rationale: El hebreo presenta una acción habitual o caracterizadora. «Actuaban» en español suena natural y mantiene el aspecto de conducta constante, no solo un acto puntual.
theological_decisions:
- issue: Sentido de אֱמֻנָה en un contexto administrativo-moral
  english_pob_reading: faithfully; also honestly or with integrity
  chosen_spanish_reading: con fidelidad
  alternative_spanish_readings:
  - honradamente
  - con integridad
  - fielmente
  rationale: No se debe estrechar אֱמֻנָה solo a honestidad económica. «Con fidelidad» conserva la dimensión de confiabilidad y rectitud en el desempeño del encargo, que es la fuerza principal del contexto.
  doctrine_reference: Ética bíblica de la fidelidad en el servicio; cf. 1 Corintios 4:2
- issue: Imagen idiomática de ‘en la mano’ para custodia y responsabilidad
  english_pob_reading: into whose hand
  chosen_spanish_reading: a quienes se entregaba el dinero
  alternative_spanish_readings:
  - en cuya mano se entregaba el dinero
  - a cuya custodia se entregaba el dinero
  rationale: El texto hebreo usa una imagen corporal para responsabilidad delegada. La traducción principal la vuelve natural en español, pero la nota mantiene la metáfora para no perder la transparencia del original.
  doctrine_reference: Principios de administración fiel y mayordomía; cf. Lucas 16:10
- issue: Rendición de cuentas implícita en יְחַשְּׁבוּ
  english_pob_reading: did not reckon with / did not require an accounting from
  chosen_spanish_reading: no se les pedía cuenta
  alternative_spanish_readings:
  - no se les exigía rendición de cuentas
  - no se contabilizaba con ellos
  rationale: El verbo puede implicar no llevar cuenta o no exigir liquidación. «No se les pedía cuenta» conserva esa tensión sin forzar una sola interpretación técnica.
  doctrine_reference: Transparencia en la administración de recursos; cf. 2 Corintios 8:20-21
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hubo cambios necesarios y el cotejo cruzado mostró solo observaciones menores. Esta redacción mantiene el sentido del hebreo y del borrador inglés auditado, ajustando la fluidez al español sin perder la imagen de custodia ni la fuerza ética de אֱמֻנָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se usa «el dinero» como equivalente funcional de כֶּסֶף en un contexto de fondos para la obra.
  - Se conserva «obra» para מְלָאכָה, siguiendo la amplitud semántica de labor/trabajo sin imponer un tecnicismo.
  - La construcción pasiva impersonal («se les pedía») ayuda a reflejar el hebreo sin añadir agentes no presentes en el texto.
