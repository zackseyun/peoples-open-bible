translation:
  language: es
  text: Sea cambiado[a] su corazón para que deje de ser de hombre, y le sea dado corazón de bestia, y pasen sobre él siete tiempos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «períodos» o «estaciones»; el término arameo designa tiempos señalados o períodos, y aquí no se especifica la duración exacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְבֵהּ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: לְבַב/לִבְבָא en arameo suele referirse al centro interior de la persona, con matiz de pensamiento y disposición. «Corazón» conserva la metáfora concreta y sigue mejor el uso bíblico que «mente», que sería más interpretativo.
- source_word: מִן אנוש/א
  english_pob_choice: from that of a man
  chosen_spanish: de hombre
  alternatives_spanish:
  - de un humano
  - de la humanidad
  lexicon: HALOT
  rationale: אֱנוֹשׁ designa a un ser humano. En español, «de hombre» mantiene la referencia humana y suena natural en una construcción posesiva implícita, sin forzar una expansión interpretativa.
- source_word: יְשַׁנּ֔וֹן
  english_pob_choice: be changed
  chosen_spanish: sea cambiado
  alternatives_spanish:
  - sea alterado
  - sea transformado
  lexicon: HALOT
  rationale: El verbo expresa cambio. «Sea cambiado» conserva la pasiva/impersonalidad del arameo y evita definir de más si el cambio es físico, mental o ambas cosas.
- source_word: וּ/לְבַ֥ב חֵיוָ֖ה
  english_pob_choice: and the heart of a beast
  chosen_spanish: el corazón de bestia
  alternatives_spanish:
  - el corazón de un animal
  - un corazón de bestia
  lexicon: HALOT
  rationale: חֵיוָה aquí contrasta con «hombre» y funciona como «bestia». «Corazón de bestia» preserva la fuerza del contraste y el registro bíblico sin volverlo innecesariamente técnico.
- source_word: יִתְיְהִ֣ב לֵ֑/הּ
  english_pob_choice: be given to him
  chosen_spanish: sea dado a él
  alternatives_spanish:
  - le sea dado
  - sea concedido a él
  lexicon: HALOT
  rationale: El verbo significa «dar» en pasiva. «Sea dado a él» reproduce bien la relación gramatical y mantiene la literalidad del don/otorgamiento sin añadir matices no presentes.
- source_word: שִׁבְעָ֥ה עִדָּנִ֖ין
  english_pob_choice: seven times
  chosen_spanish: siete tiempos
  alternatives_spanish:
  - siete períodos
  - siete estaciones
  lexicon: HALOT
  rationale: עִדָּן en Daniel denota un período o tiempo señalado. «Tiempos» es la opción más estable y menos específica, y deja abierta la duración exacta como en el original.
- source_word: יַחְלְפ֥וּן עֲלֽוֹ/הִי
  english_pob_choice: pass over him
  chosen_spanish: pasen sobre él
  alternatives_spanish:
  - pasen por encima de él
  - lo cubran
  lexicon: HALOT
  rationale: El giro idiomático comunica el transcurso de un lapso en relación con él. «Pasen sobre él» preserva esa imagen y mantiene la ambigüedad temporal del hebreo/arameo.
theological_decisions:
- issue: Naturaleza del juicio descrito en el versículo
  english_pob_reading: The verse describes Nebuchadnezzar's human disposition being replaced with that of a beast, without specifying in this verse whether this is literal transformation or a divinely imposed beast-like mental state.
  chosen_spanish_reading: El versículo describe que el corazón humano es sustituido por el de una bestia, sin resolver si el cambio es literal o si se trata de una condición semejante a una bestialización mental impuesta por Dios.
  alternative_spanish_readings:
  - transformación literal
  - descripción figurada de locura o desvarío
  rationale: El arameo habla del corazón de un hombre que es cambiado y del corazón de una bestia que le es dado. La traducción conserva esa imaginería y no cierra el sentido interpretativo, preservando la tensión del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; se mantiene la lectura acordada y la equivalencia óptima de la versión inglesa auditada.
  spanish_consistency_notes:
  - Se conserva «Dios»/«Yahvé» en otros contextos según norma del proyecto; aquí no aparece el Tetragrámaton.
  - Se mantiene «corazón» para לִבְבֵהּ, en continuidad con la metáfora bíblica y la decisión inglesa auditada.
  - Se usa «bestia» para חֵיוָה por el contraste deliberado con «hombre», en vez de suavizarlo con «animal».
  - La nota al pie marca la ambigüedad de עִדָּנִין sin sobreespecificar la duración.
