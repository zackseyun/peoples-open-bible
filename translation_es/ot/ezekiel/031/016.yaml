    text: Or 'to the grave' or 'to the underworld' for 'to Sheol.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were consoled' or 'took comfort.' The sense may be that the other fallen powers found grim consolation when this great tree also descended.
    reason: lexical_alternative
  - marker: c
    text: Literally 'the lower earth.'
    reason: lexical_alternative
