translation:
  language: es
  text: Harás varas de madera de acacia y las recubrirás de oro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Harás y
  - Y harás
  - Debes hacer
  lexicon: HALOT
  rationale: La forma verbal hebrea funciona como mandato/instrucción en una secuencia de construcción. En español, 'Harás' conserva esa fuerza directiva de manera natural y digna.
- source_word: בַדֵּי
  english_pob_choice: poles
  chosen_spanish: varas
  alternatives_spanish:
  - barras
  - poles
  - estacas
  lexicon: HALOT
  rationale: En este contexto, el término se refiere a los elementos para transportar el arca. 'Varas' es un equivalente claro y bíblicamente apropiado en español; evita el anglicismo y mantiene la idea de piezas largas de madera.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  - de madera de mezquite
  lexicon: HALOT
  rationale: La cadena constructa nombra la madera de acacia. 'De madera de acacia' expresa el material con claridad en español y evita transliterar 'shittim', que sería menos transparente para el lector.
- source_word: וְצִפִּיתָ
  english_pob_choice: and overlay
  chosen_spanish: las recubrirás
  alternatives_spanish:
  - las cubrirás
  - las cubrirás con una capa de oro
  - las revestirás
  lexicon: HALOT
  rationale: El verbo indica aplicar una capa o recubrimiento sobre la madera. 'Recubrir' comunica bien la acción técnica de cubrir con oro sin perder el sentido artesanal del original.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - los
  - ellas
  - las mismas
  lexicon: HALOT
  rationale: El pronombre retoma a 'varas', sustantivo femenino plural en español. El referente gramatical exige 'las' para una referencia natural y clara.
- source_word: זָהָב
  english_pob_choice: with gold
  chosen_spanish: de oro
  alternatives_spanish:
  - con oro
  - en oro
  - con oro puro
  lexicon: HALOT
  rationale: En español, tras 'recubrir' es más natural expresar el material como 'de oro'. Conserva la idea del recubrimiento de oro sin introducir una preposición menos idiomática.
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el texto hebreo de WLC y el sentido técnico confirmado por la auditoría inglesa: fabricar dos varas/polos de madera de acacia y recubrirlos con oro. No se registran revisiones posteriores que afecten esta línea.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y sobrio.
  - Se evita 'SEÑOR' y otras sustituciones no pertinentes, pues no aparecen en este versículo.
  - '''Varas'' se usa como equivalente funcional de ''poles'' en este contexto artesanal y de transporte.'
  - La concordancia pronominal en 'las recubrirás' responde al referente plural femenino 'varas'.
