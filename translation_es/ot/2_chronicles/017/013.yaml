translation:
  language: es
  text: Y tenía muchos bienes[a] en las ciudades de Judá, y hombres de guerra, hombres valientes, en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mucha propiedad' o 'abundantes suministros'; el hebreo מְלָאכָה puede referirse en algunos contextos a algo más amplio que solo trabajo o labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְלָאכָה
  english_pob_choice: much property
  chosen_spanish: riqueza
  alternatives_spanish:
  - propiedad
  - bienes
  - recursos
  - trabajo
  lexicon: HALOT
  rationale: El hebreo מְלָאכָה puede abarcar trabajo, ocupación, servicio o bienes/recursos según el contexto. La auditoría inglesa finalmente optó por 'property' y señaló el posible alcance de 'supplies'. En español, 'riqueza' comunica el resultado material o la abundancia poseída sin reducir indebidamente el campo semántico a 'trabajo' ni forzar un tecnicismo poco natural en la frase.
- source_word: רַבָּה
  english_pob_choice: much
  chosen_spanish: mucha
  alternatives_spanish:
  - gran
  - abundante
  - numerosa
  lexicon: HALOT
  rationale: El adjetivo expresa cantidad. 'Mucha' reproduce de manera natural la idea de abundancia en español y encaja con el sustantivo elegido.
- source_word: הָיָה לוֹ
  english_pob_choice: he had
  chosen_spanish: tenía
  alternatives_spanish:
  - había para él
  - le pertenecía
  - poseía
  lexicon: HALOT
  rationale: La construcción hebrea es existencial ('había para él'), pero en español 'tenía' expresa con naturalidad la posesión o disponibilidad sin perder el sentido básico del texto.
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - por las ciudades de Judá
  - a lo largo de las ciudades de Judá
  lexicon: HALOT
  rationale: La preposición marca ubicación. 'En las ciudades de Judá' es la opción más directa y fiel, sin ampliar el alcance interpretativamente.
- source_word: אַנְשֵׁי מִלְחָמָה
  english_pob_choice: men of war
  chosen_spanish: hombres de guerra
  alternatives_spanish:
  - guerreros
  - soldados
  - hombres de combate
  lexicon: HALOT
  rationale: Es una expresión militar fija. 'Hombres de guerra' mantiene de cerca la forma y el tono del hebreo, y preserva el paralelismo con la siguiente frase.
- source_word: גִּבּוֹרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: valientes hombres de valor
  alternatives_spanish:
  - poderosos hombres de valor
  - hombres valerosos
  - guerreros valientes
  lexicon: HALOT
  rationale: La frase hebrea es una fórmula militar de prestigio y valentía. 'Valientes hombres de valor' conserva la doble caracterización; aunque resulta algo enfática, refleja el paralelismo retórico del original sin borrar su fuerza idiomática.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Equivalencia locativa directa del topónimo.
translation_notes:
  revision_awareness: La base inglesa pasó de 'much work' a 'much property' tras revisión, para reflejar mejor el sentido contextual de מְלָאכָה. La versión española sigue esa revisión y conserva la tensión lexical, evitando traducirlo de forma demasiado estrecha como 'trabajo'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en otros contextos cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - '''Hombres de guerra'' y ''valientes hombres de valor'' reflejan el paralelismo militar del hebreo sin sustituirlo por un término más moderno que diluya la fórmula.'
  - La puntuación sigue el español estándar y respeta la cadencia del hebreo con una coma antes del último complemento.
