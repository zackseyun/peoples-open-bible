  text: Jesus said to him[a], “You have said so. But I tell you[c][b], from now on you will see the Son of Man seated at the right hand of Power and coming on the clouds of heaven.”
  footnotes:
  - marker: a
    text: Or “You said it.” The Greek wording is an idiomatic affirmative reply.
    reason: lexical_alternative
  - marker: b
    text: “Power” is a reverential way of referring to God.
    reason: cultural_note
  - marker: c
    text: An allusion to Daniel 7:13 and Psalm 110:1.
    reason: cross_reference
