translation:
  language: es
  text: 'Entonces Semaías el profeta vino a Roboam y a los oficiales de Judá, que se habían reunido en Jerusalén por causa de Sisac[a], y les dijo: «Así dice Yahvé: Ustedes me han abandonado, así que yo también los he abandonado en manos de Sisac».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de delante de Sisac», es decir, por causa de Sisac o por temor a Sisac.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמַעְיָה
  english_pob_choice: Then Shemaiah
  chosen_spanish: Entonces Semaías
  alternatives_spanish:
  - Y Semaías
  - Ahora Semaías
  lexicon: HALOT
  rationale: La conjunción inicial marca avance narrativo; «Entonces» suena natural en español y conserva la secuencia del relato. El nombre propio se translitera como Semaías.
- source_word: הַ/נָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: Se conserva el artículo definido y el título profético estándar sin añadir matices ajenos al hebreo.
- source_word: בָּא אֶל
  english_pob_choice: came to
  chosen_spanish: vino a
  alternatives_spanish:
  - fue a
  - llegó a
  lexicon: HALOT
  rationale: El verbo de llegada se expresa de modo natural con «vino a», que mantiene el movimiento hacia Roboam y los jefes.
- source_word: וְ/שָׂרֵי יְהוּדָה
  english_pob_choice: and the officials of Judah
  chosen_spanish: y a los oficiales de Judá
  alternatives_spanish:
  - y a los príncipes de Judá
  - y a los líderes de Judá
  lexicon: HALOT
  rationale: שָׂרִים designa gobernantes/funcionarios/mandos. «Oficiales» encaja con el contexto político y evita el tono arcaico de «príncipes».
- source_word: אֲשֶׁר נֶאֶסְפוּ
  english_pob_choice: who had gathered
  chosen_spanish: que se habían reunido
  alternatives_spanish:
  - que se habían congregado
  - que estaban reunidos
  lexicon: HALOT
  rationale: El nifal comunica que estaban reunidos allí; «se habían reunido» transmite bien el resultado de esa acción en español.
- source_word: אֶל יְרוּשָׁלַםִ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es «a», en español el estado resultante se expresa naturalmente con «en Jerusalén».
- source_word: מִ/פְּנֵי שִׁישָׁק
  english_pob_choice: because of Shishak
  chosen_spanish: por causa de Sisac
  alternatives_spanish:
  - por temor de Sisac
  - a causa de Sisac
  - delante de Sisac
  lexicon: HALOT
  rationale: La frase hebrea literalmente sugiere «de delante de» Sisac. Aquí el contexto favorece la idea de haberse reunido por la amenaza que él representaba; «por causa de» conserva esa causalidad sin volverla mecánica.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética directa. «Yahvé» se usa para el nombre divino, conforme al criterio del proyecto.
- source_word: עֲזַבְתֶּם אֹתִי
  english_pob_choice: You have forsaken me
  chosen_spanish: ustedes me han abandonado
  alternatives_spanish:
  - ustedes me han dejado
  - ustedes me han desamparado
  lexicon: HALOT
  rationale: עָזַב puede significar abandonar o dejar; aquí la carga relacional/covenantal se entiende mejor con «abandonado», que es natural y fiel en español.
- source_word: וְ/אַף אֲנִי
  english_pob_choice: so I also
  chosen_spanish: así que yo también
  alternatives_spanish:
  - y yo también
  - por eso yo también
  lexicon: HALOT
  rationale: La construcción expresa correspondencia retributiva. «Así que yo también» comunica bien la respuesta divina en forma simétrica.
- source_word: עָזַבְתִּי אֶתְכֶם
  english_pob_choice: have forsaken you
  chosen_spanish: los he dejado
  alternatives_spanish:
  - los he abandonado
  - los he desamparado
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el verbo anterior, pero en español se evita repetir «abandonado» de manera pesada en la misma cláusula. La idea de desamparo queda en el contexto inmediato.
- source_word: בְּ/יַד שִׁישָׁק
  english_pob_choice: into the hand of Shishak
  chosen_spanish: en mano de Sisac
  alternatives_spanish:
  - en la mano de Sisac
  - bajo el poder de Sisac
  - entregado a Sisac
  lexicon: HALOT
  rationale: La locución hebrea expresa quedar bajo el poder de otro. «En mano de» conserva la imagen bíblica; en español se omite el artículo para sonar más idiomático y sobrio.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme a la terminología base del proyecto, se traduce con el nombre propio «Yahvé» y no con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación de juicio en la cláusula final
  english_pob_reading: have forsaken you into the hand of Shishak
  chosen_spanish_reading: los he dejado en mano de Sisac
  alternative_spanish_readings:
  - los he abandonado en mano de Sisac
  - los he entregado en mano de Sisac
  - los he puesto en poder de Sisac
  rationale: El hebreo conserva la idiomática «en la mano de». En español, «los he dejado en mano de Sisac» mantiene esa metáfora de sometimiento sin introducir un verbo de entrega que el texto no requiere explícitamente.
  doctrine_reference: Hebraísmo de juicio y sujeción
- issue: Tono del verbo עָזַב en ambos miembros
  english_pob_reading: forsaken / forsaken
  chosen_spanish_reading: abandonado / dejado
  alternative_spanish_readings:
  - abandonado / abandonado
  - dejado / dejado
  - desamparado / desamparado
  rationale: El hebreo repite el mismo verbo para lograr simetría retórica. En español, la primera ocurrencia se vierte como «abandonado» por su fuerza relacional; la segunda como «dejado» para mantener naturalidad sin perder la correspondencia de juicio.
  doctrine_reference: Covenant-fidelity language in prophetic judgment
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente indicado como sin cambios; el borrador español refleja el mismo sentido del texto y conserva la nota sobre מִפְּנֵי שִׁישָׁק como alternativa lexical.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «Sisac» para שִׁישָׁק, consistente con la transliteración española del nombre propio.
  - 'Se conserva el paralelismo semántico de עָזַב con dos soluciones próximas: «abandonado» y «dejado».'
  - La nota al pie marca la ambigüedad de מִפְּנֵי sin sobrecargar el texto principal.
