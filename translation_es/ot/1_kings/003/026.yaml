base_translation:
  language: en
  yaml_path: translation/ot/1_kings/003/026.yaml
  text: Then the woman whose son was alive said to the king[a], because her compassion was stirred for her son, and she said, "Please, my lord, give her the living child, and do not put him to death." But the other said, "It shall be neither mine nor yours[b]; cut him in two."
  footnotes:
  - marker: a
    text: 'Hebrew: ''for her compassion was stirred for her son,'' an idiom expressing intense maternal pity.'
    reason: cultural_note
  - marker: b
    text: 'Or ''do not kill him''; the Hebrew form is emphatic: ''do not, indeed do not, put him to death.'''
    reason: lexical_alternative
