revisions:
- from: Yo mismo he mandado a mis consagrados; también he convocado a mis guerreros para mi ira[a], a mis orgullosamente exultantes.
  to: Yo mismo he mandado a mis consagrados; también he convocado a mis guerreros para mi ira[a], mis exultantes orgullosos.
  rationale: Se conserva toda la estructura y el sentido del hebreo y del POB en inglés, pero se corrige la única falla importante de español natural. «Mis exultantes orgullosos» mantiene la compresión descriptiva de עַלִּיזֵי גַּאֲוָתִי mejor que «mis orgullosamente exultantes», evita un calco torpe y sigue permitiendo que la nota recoja las alternativas «mi majestad / mi triunfo». No se requiere adjudicación adicional porque es una mejora estilístico-lexical menor dentro de una dificultad ya documentada.
