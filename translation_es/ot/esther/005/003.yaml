  text: Then the king said to her[a], “What is it[c][b], Queen Esther? And what is your request? Up to half the kingdom—it will be given to you.”
  footnotes:
  - marker: a
    text: Or, 'What troubles you, Queen Esther?' The Hebrew idiom literally reads, 'What is to you?'
    reason: lexical_alternative
  - marker: b
    text: Or, 'petition' instead of 'request.'
    reason: lexical_alternative
  - marker: c
    text: A conventional royal expression of generous promise, not necessarily a literal offer to divide the kingdom.
    reason: cultural_note
