lexical_decisions:
- source_word: יָקְטָן
  english_pob_choice: Joktan
  chosen_spanish: Joktán
  alternatives_spanish:
  - Yoqtán
  lexicon: HALOT
  rationale: Nombre propio; se translitera, preservando la forma bíblica establecida. Mantengo la acentuación española para facilitar la lectura sin alterar la identificación del nombre.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  - hizo nacer
  lexicon: HALOT
  rationale: En contexto genealógico, el verbo expresa paternidad generativa. 'Engendró' conserva la fuerza genealógica y es natural en español bíblico contemporáneo, sin perder el sentido de filiación masculina que el POB inglés quiso mantener con 'fathered'.
- source_word: אֶת
  english_pob_choice: '[not separately translated; marks direct object]'
  chosen_spanish: '[no se traduce de manera independiente; se integra en la sintaxis española]'
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Marcador de objeto directo sin equivalente autónomo en español; se refleja mediante la estructura normal de la oración.
- source_word: אַלְמוֹדָד
  english_pob_choice: Almodad
  chosen_spanish: Almodad
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa, manteniendo la forma reconocible del original y del audit trail inglés.
- source_word: שָׁלֶף
  english_pob_choice: Sheleph
  chosen_spanish: Shelef
  alternatives_spanish:
  - Sheléf
  lexicon: HALOT
  rationale: Nombre propio; en español conviene conservar la transliteración semita sin adaptarlo a una forma tradicional inexistente. 'Shelef' refleja el valor consonántico y evita una hispanización arbitraria.
- source_word: חֲצַרְמָוֶת
  english_pob_choice: Hazarmaveth
  chosen_spanish: Hazarmavet
  alternatives_spanish:
  - Hazarmaveth
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español, la terminación se ajusta levemente a la fonotáctica sin añadir contenido; se conserva la identidad del nombre hebreo.
- source_word: יָרַח
  english_pob_choice: Jerah
  chosen_spanish: Yéraj
  alternatives_spanish:
  - Jéraj
  - Jerah
  lexicon: HALOT
  rationale: Nombre propio; se prioriza una transliteración cercana al hebreo con 'Y' para yod y 'j' para el fricativo final, evitando una forma demasiado anglicizada.
theological_decisions:
- issue: Verbo genealógico de paternidad
  english_pob_reading: fathered
  chosen_spanish_reading: engendró
  alternative_spanish_readings:
  - fue padre de
  - procreó
  rationale: No hay una cuestión doctrinal especial, pero sí una elección lexical con peso genealógico. 'Engendró' preserva la relación paterna causal del hebreo en una fórmula breve y tradicionalmente inteligible en genealogías bíblicas.
  doctrine_reference: Ninguna; decisión lexical genealógica
- issue: Tratamiento de nombres propios semíticos
  english_pob_reading: standard English biblical forms
  chosen_spanish_reading: transliteración conservadora en español
  alternative_spanish_readings:
  - adaptación tradicional castellana
  - transcripción fonética más libre
  rationale: La tradición POB favorece la transparencia y la trazabilidad al texto fuente. Por eso se conserva la identidad hebrea de los nombres y se evita sustituirlos por equivalentes eclesiásticos o normalizaciones no justificadas por el origen.
  doctrine_reference: Ninguna; criterio de transparencia textual
translation_notes:
  revision_awareness: El testimonio inglés auditado no requirió cambios en la revisión más reciente; se mantuvo el sentido genealógico de יָלַד y la transliteración de los nombres propios. La versión española sigue esa decisión, adaptándola a la sintaxis y ortografía naturales del español sin añadir matices no presentes en el fuente.
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico claro y moderno, evitando el calco innecesario.
  - Los nombres propios se conservan como transliteraciones consistentes, sin sustituirlos por formas litúrgicas tradicionales si no están respaldadas por el audit trail.
  - La nota textual de 'engendró' conserva la alternativa genealógica relevante del inglés POB.
  - Se usa acentuación española en Joktán y Yéraj para facilitar lectura, sin alterar la identificación del nombre.
