translation:
  language: es
  text: Lo sepultaron en su tumba, que había excavado para sí en la Ciudad de David; y lo pusieron en el lecho[a], que estaba lleno de especias y de diversos ungüentos mezclados, preparados con arte de perfumista; e hicieron por él una quema muy grande[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cama» o «diván»; la palabra hebrea se refiere a un lugar para recostarse y aquí probablemente designa un lecho funerario o una parihuela funeraria.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea «hicieron por él una gran quema» probablemente se refiere a una quema honorífica de especias o aromáticos en el funeral, no necesariamente a la cremación del cuerpo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: They buried him
  chosen_spanish: Lo sepultaron
  alternatives_spanish:
  - Lo enterraron
  - Lo sepultaron
  lexicon: HALOT
  rationale: El verbo de sepultura se rinde de forma natural en pasado plural. "Sepultar" conserva el acto funerario formal y es plenamente idiomático en español.
- source_word: בְקִבְרֹתָיו
  english_pob_choice: in his tomb
  chosen_spanish: en su tumba
  alternatives_spanish:
  - en su sepulcro
  - en su tumba
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir un complejo funerario, el contexto y la revisión inglesa favorecen el singular contextual. "Tumba" es claro y fiel sin sobreinterpretar el plural morfológico.
- source_word: אֲשֶׁר כָּרָה לוֹ
  english_pob_choice: which he had cut out for himself
  chosen_spanish: que él se había hecho cavar
  alternatives_spanish:
  - que él mismo había excavado
  - que él había labrado para sí
  lexicon: HALOT
  rationale: כָּרָה puede significar excavar/cortar en roca. En español, "se había hecho cavar" comunica bien el trabajo realizado para sí mismo y preserva la idea de preparación del sepulcro.
- source_word: בְּעִיר דָּוִיד
  english_pob_choice: in the City of David
  chosen_spanish: en la Ciudad de David
  alternatives_spanish:
  - en la Ciudad de David
  lexicon: HALOT
  rationale: Nombre propio establecido y transparente.
- source_word: וַיַּשְׁכִּיבֻהוּ
  english_pob_choice: and laid him
  chosen_spanish: lo pusieron
  alternatives_spanish:
  - lo acostaron
  - lo pusieron
  lexicon: HALOT
  rationale: El verbo causativo admite en español una formulación natural de colocación del cuerpo. "Lo pusieron" evita forzar un calco y mantiene la secuencia narrativa.
- source_word: בַּמִּשְׁכָּב
  english_pob_choice: on the bier
  chosen_spanish: en el lecho[a]
  alternatives_spanish:
  - en el lecho
  - en la camilla funeraria
  lexicon: HALOT
  rationale: El término hebreo designa un lugar de reposo o lecho; en este contexto funerario puede referirse a una parihuela o lecho mortuorio. Se opta por "lecho" en el texto y se aclara la alternativa contextual en nota.
- source_word: אֲשֶׁר מִלֵּא
  english_pob_choice: that had been filled
  chosen_spanish: que estaba lleno
  alternatives_spanish:
  - que había sido llenado
  - que estaba lleno
  lexicon: HALOT
  rationale: La pasiva/resultativa hebrea se expresa naturalmente en español con "estaba lleno", preservando el estado del lecho preparado.
- source_word: בְּשָׂמִים
  english_pob_choice: with spices
  chosen_spanish: de especias aromáticas
  alternatives_spanish:
  - con especias
  - con aromas
  lexicon: HALOT
  rationale: '"Especias aromáticas" comunica el valor funerario/perfumado sin restringir indebidamente el término.'
- source_word: וּזְנִים
  english_pob_choice: and various blended ointments
  chosen_spanish: y de ungüentos mezclados
  alternatives_spanish:
  - y de mezclas aromáticas
  - y de ungüentos compuestos
  lexicon: HALOT
  rationale: El término es raro y probablemente designa aromas/compuestos. "Ungüentos mezclados" conserva la idea de composición aromática sin añadir precisión no segura.
- source_word: מְרֻקָּחִים
  english_pob_choice: blended
  chosen_spanish: mezclados
  alternatives_spanish:
  - compuestos
  - mezclados
  - perfumados
  lexicon: HALOT
  rationale: Participio pasivo de רקח, relacionado con mezclar/compounding perfumes. "Mezclados" es claro y suficientemente cercano; la técnica queda reforzada por la frase siguiente.
- source_word: בְּמִרְקַחַת מַעֲשֶׂה
  english_pob_choice: prepared by a perfumer’s craft
  chosen_spanish: preparados con arte de perfumista
  alternatives_spanish:
  - preparados por el arte del perfumista
  - preparados con la artesanía de un perfumista
  lexicon: HALOT
  rationale: La frase apunta a una preparación técnica/artesanal. "Arte de perfumista" preserva el oficio especializado y resulta natural en español.
- source_word: וַיִּשְׂרְפוּ לוֹ שְׂרֵפָה גְדוֹלָה
  english_pob_choice: and they made a very great burning for him
  chosen_spanish: e hicieron por él una muy grande quema
  alternatives_spanish:
  - e hicieron por él una gran quema
  - y hicieron por él un gran incendio
  lexicon: HALOT
  rationale: Se mantiene el sustantivo hebreo de "quema" para no imponer cremación. "Muy grande" reproduce el intensificador sin convertirlo en interpretación funeraria específica.
- source_word: עַד לִמְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en extremo
  lexicon: HALOT
  rationale: Intensificador normal de grado; en español, "muy" es natural y fiel.
theological_decisions:
- issue: Sentido de la "quema" funeraria
  english_pob_reading: A ceremonial burning in Asa's honor, not a statement that his body was cremated.
  chosen_spanish_reading: Una quema ceremonial en honor de Asa, no una afirmación de que su cuerpo fuera cremado.
  alternative_spanish_readings:
  - Cremación del cadáver
  - Una hoguera funeraria sin más especificación
  rationale: El verso primero dice que fue sepultado y luego menciona la quema. En coherencia con el audit trail inglés y con el uso bíblico del motivo, la traducción conserva la ambigüedad literal de "quema" sin convertirla en cremación.
  doctrine_reference: Historia funeraria bíblica; lectura contextual del hebreo bíblico
- issue: Valor contextual de בַּמִּשְׁכָּב
  english_pob_reading: Likely a funerary bier rather than a bed or couch.
  chosen_spanish_reading: Lecho funerario o lecho de reposo, con posible sentido de parihuela mortuoria.
  alternative_spanish_readings:
  - cama
  - couch/sofá
  rationale: El contexto de sepultura exige evitar una lectura doméstica. El texto principal usa "lecho" por fidelidad al hebreo, mientras la nota aclara la posibilidad funeraria.
  doctrine_reference: Contexto narrativo y semántica del hebreo bíblico
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió el singular «tomb» frente a «tombs». En español se siguió esa decisión con «su tumba», manteniendo también la lectura contextual del objeto funerario y la traducción conservadora de la "burning" como quema ceremonial.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantuvo un registro sobrio y bíblico, evitando traducir «quema» como «cremación» para no resolver la tensión interpretativa del texto.
  - Se conservó la ambigüedad de מִשְׁכָּב con «lecho», apoyada por nota, para no borrar la posibilidad de bier funerario.
  - Se eligió «especias aromáticas» y «ungüentos mezclados» para reflejar el campo semántico perfumado del hebreo sin forzar un tecnicismo innecesario.
