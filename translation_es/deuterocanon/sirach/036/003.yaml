revisions:
- from: El hombre entendido confiará en la ley[a], y la ley será confiable para él como una consulta de los justos.
  to: El hombre entendido confiará en la ley[a], y la ley le es digna de confianza como una pregunta de los justos.
  rationale: 'Se ajusta la segunda mitad para un español más natural y digno: «le es digna de confianza» comunica mejor πιστός que «será confiable para él». Se cambia «consulta» por «pregunta» para evitar un matiz moderno-administrativo y preservar mejor la ambigüedad de ἐρώτημα, que la nota sigue explicitando con la alternativa «respuesta». No se requiere adjudicación adicional, porque la revisión es menor y está bien respaldada por el expediente inglés y el griego.'
