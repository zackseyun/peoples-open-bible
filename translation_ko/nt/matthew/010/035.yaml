  yaml_path: translation/nt/matthew/010/035.yaml
  text: 'For I came to set a man against his father[a], and a daughter against her mother, and a daughter-in-law against her mother-in-law[b],'
  footnotes:
  - marker: a
    text: Or 'to divide'; the Greek infinitive can be rendered more literally that way, but here the following repeated 'against' phrases make the sense of relational opposition explicit.
    reason: lexical_alternative
  - marker: b
    text: Greek νύμφη can mean 'bride' in some contexts; here it means 'daughter-in-law' because it is paired with 'mother-in-law.'
    reason: lexical_alternative
translation:
