  text: And he went out into all the borders of Judea and the surrounding region[a], and he took vengeance on the men and on those who had deserted[c][b], and they were prevented from going into the country.
  footnotes:
  - marker: a
    text: Or 'the surrounding areas.' The Greek adverb κυκλόθεν broadens the scope beyond Judea's borders proper.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who had defected' or 'the deserters.' The Greek refers to people who had gone over to the other side.
    reason: lexical_alternative
  - marker: c
    text: Or 'from entering the region/land.' The Greek χώρα can mean 'country,' 'land,' or 'region.'
    reason: lexical_alternative
