id: HERM.V.3.xii
reference: Shepherd of Hermas — Vision 3, section xii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Τῇ δὲ δευτέρᾳ ὁράσει εἶδες αὐτὴν ἑστηκυῖαν καὶ τὴν ὄψιν νεωτέραν ἔχουσαν καὶ
    ἱλαρωτέραν παρὰ τὸ πρότερον, τὴν δὲ σάρκα καὶ τὰς τρίχας πρεσβυτέρας. ἄκουε, φησίν,
    καὶ ταύτην τὴν παραβολήν. 2. ὅταν πρεσβύτερός τις, ἤδη ἀφηλπικὼς ἑαυτὸν διὰ τὴν
    ἀσθένειαν αὐτοῦ καὶ τὴν πτωχότητα, οὐδὲν ἕτερον προσδέχεται εἰ μὴ τὴν ἐσχάτην
    ἡμέραν τῆς ζωῆς αὐτοῦ· εἶτα ἐξαίφνης κατελείφθη αὐτῷ κληρονομία, ἀκούσας δὲ ἐξηγέρθη
    καὶ περιχαρὴς γενόμενος ἐνεδύσατο τὴν ἰσχύν, καὶ οὐκέτι ἀνάκειται, ἀλλὰ ἕστηκεν,
    καὶ ἀνανεοῦται αὐτοῦ τὸ πνεῦμα τὸ ἤδη ἐφθαρμένον ἀπὸ τῶν προτέρων αὐτοῦ πράξεων,
    καὶ οὐκέτι κάθηται, ἀλλὰ ἀνδρίζεται· οὕτως καὶ ὑμεῖς, ἀκούσαντες τὴν ἀποκάλυψιν
    ἣν ὑμῖν ὁ Κύριος ἀπεκάλυψεν. 3. ὅτι ἐσπλαγχνίσθη ἐφ’ ὑμᾶς, καὶ ἀνενεώσατο τὰ πνεύματα
    ὑμῶν, καὶ ἀπέθεσθε τὰς μαλακίας ὑμῶν, καὶ προσῆλθεν ὑμῖν ἰσχυρότης καὶ ἐδυναμώθητε
    ἐν τῇ πίστει, καὶ ἰδὼν ὁ Κύριος τὴν ἰσχυροποίησιν ὑμῶν ἐχάρη· καὶ διὰ τοῦτο ἐδήλωσεν
    ὑμῖν τὴν οἰκοδομὴν τοῦ πύργου, καὶ ἕτερα δηλώσει, ἐὰν ἐξ ὅλης καρδίας εἰρηνεύετε
    ἐν ἑαυτοῖς.
  language: Greek
  pages:
  - 329
  unit_id: V.3.xii
  label: Vision 3, section xii
  sequence: 20
translation:
  text: 'But in the second vision you saw her standing, with a countenance[a] younger
    and more cheerful than before, though her flesh and her hair were older. “Listen,”
    she says, “to this parable also.


    “When an old man, having already given up hope for himself because of his weakness
    and his poverty, expects nothing else but the last day of his life; then, all
    at once, an inheritance is left to him. On hearing of it he rises up, and,
    becoming overjoyed, he puts on strength; he no longer lies down, but stands; his
    spirit—already corrupted by his former deeds—is renewed; and he no longer sits,
    but takes courage[b]. So also you, when you heard the revelation that the Lord
    revealed to you.


    “For he had compassion on you and renewed your spirits, and you put away your
    softness[c]; strength came to you and you were strengthened in faith[d]; and when
    the Lord saw your strengthening, he rejoiced. For this reason he made known to
    you the building of the tower[f], and he will make other things known, if, with
    a whole heart, you are at peace among yourselves[e].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Countenance” translates ὄψις, which can mean face or appearance; the point
      is her visibly younger, more cheerful look.
    reason: lexical_alternative
  - marker: b
    text: “Takes courage” renders ἀνδρίζεται, literally “acts like a man,” an idiom
      for showing courage.
    reason: lexical_alternative
  - marker: c
    text: '“Softness” (μαλακία) in ancient moral language denotes laxity or lack of
      resolve, not a gendered slur in this context. Alternatives: “weakness,” “cowardice.”'
    reason: cultural_note
  - marker: d
    text: “In faith” could also be read “in the faith”; the Greek uses the article
      with an abstract noun.
    reason: lexical_alternative
  - marker: e
    text: “Be at peace among yourselves” renders εἰρηνεύετε ἐν ἑαυτοῖς, an idiom for
      mutual peace within the community.
    reason: cultural_note
  - marker: f
    text: The “building of the tower” refers back to the tower imagery earlier in
      this vision, where the tower symbolizes the community being built.
    reason: cross_reference
lexical_decisions:
- source_word: ὄψιν
  chosen: countenance
  alternatives:
  - appearance
  - face
  lexicon: LSJ
  entry: s.v. ὄψις
  rationale: Conveys both facial look and demeanor; enables the contrast with “flesh”
    and “hair.”
- source_word: ἱλαρωτέραν
  chosen: more cheerful
  alternatives:
  - more gracious
  - brighter
  lexicon: BDAG
  entry: s.v. ἱλαρός
  rationale: Denotes glad, cheerful disposition; “cheerful” fits the moral tone of
    renewed hope.
- source_word: σάρκα
  chosen: flesh
  alternatives:
  - body
  lexicon: BDAG
  entry: s.v. σάρξ
  rationale: Here literal bodily flesh is in view; preserving “flesh” maintains the
    concrete imagery.
- source_word: τρίχας
  chosen: hair
  lexicon: BDAG
  entry: s.v. θρίξ
  rationale: Literal reference to the woman’s hair in the vision.
- source_word: παραβολήν
  chosen: parable
  alternatives:
  - figure
  - similitude
  lexicon: BDAG
  entry: s.v. παραβολή
  rationale: Hermas uses short illustrative comparisons; “parable” is established
    and accurate.
- source_word: πρεσβύτερός τις
  chosen: an old man
  alternatives:
  - an elder
  lexicon: BDAG
  entry: s.v. πρεσβύτερος 1
  rationale: Context is age in a parable, not church office; “old man” avoids ecclesiastical
    sense.
- source_word: ἀφηλπικὼς ἑαυτόν
  chosen: having already given up hope for himself
  alternatives:
  - having despaired of himself
  - having lost hope
  lexicon: BDAG
  entry: s.v. ἀφελπίζω
  rationale: Expresses total loss of hope; participial nuance kept in English.
- source_word: ἀσθένειαν
  chosen: weakness
  alternatives:
  - infirmity
  - illness
  lexicon: BDAG
  entry: s.v. ἀσθένεια
  rationale: General lack of strength suits the parable’s physical and moral tone.
- source_word: πτωχότητα
  chosen: poverty
  alternatives:
  - destitution
  - poverty of means
  lexicon: BDAG
  entry: s.v. πτωχότης
  rationale: Material poverty is the point of contrast with the sudden inheritance.
- source_word: ἐσχάτην ἡμέραν
  chosen: the last day
  alternatives:
  - the final day
  lexicon: BDAG
  entry: s.v. ἔσχατος
  rationale: Idiomatic expression for the end of life; “last day of his life” clarifies
    scope.
- source_word: κατελείφθη ... κληρονομία
  chosen: an inheritance is left to him
  alternatives:
  - an inheritance is bequeathed to him
  - he is left an inheritance
  lexicon: BDAG
  entry: s.v. καταλείπω; s.v. κληρονομία
  rationale: Legal-bequest sense is primary; passive renders the aorist passive nuance.
- source_word: ἐξηγέρθη
  chosen: he rises up
  alternatives:
  - he is roused
  - he got up
  lexicon: BDAG
  entry: s.v. ἐξεγείρω
  rationale: Vivid, active rendering fits the awakening of hope.
- source_word: περιχαρής
  chosen: overjoyed
  alternatives:
  - very glad
  - exceedingly joyful
  lexicon: BDAG
  entry: s.v. περιχαρής
  rationale: Intensifies joy upon hearing of the inheritance.
- source_word: ἐνεδύσατο τὴν ἰσχύν
  chosen: he puts on strength
  alternatives:
  - he clothed himself with strength
  - he took on strength
  lexicon: BDAG
  entry: s.v. ἐνδύω; s.v. ἰσχύς
  rationale: Preserves the clothing metaphor, common in biblical-Greek idiom.
- source_word: ἀνάκειται
  chosen: lies down
  alternatives:
  - reclines
  lexicon: BDAG
  entry: s.v. ἀνάκειμαι
  rationale: In contrast with “stands”; “lies down” communicates inactivity.
- source_word: ἕστηκεν
  chosen: stands
  alternatives:
  - stands firm
  lexicon: BDAG
  entry: s.v. ἵστημι
  rationale: Simple physical stance, marking renewed vigor.
- source_word: ἀνανεοῦται
  chosen: is renewed
  alternatives:
  - is made new again
  - is refreshed
  lexicon: BDAG
  entry: s.v. ἀνανεόω
  rationale: Captures restoration after decay.
- source_word: τὸ πνεῦμα
  chosen: the spirit
  alternatives:
  - the inner self
  - the mind
  lexicon: BDAG
  entry: s.v. πνεῦμα 4
  rationale: Human spirit (not the Holy Spirit) suits plural in v.3 and individual
    context.
- source_word: ἐφθαρμένον
  chosen: corrupted
  alternatives:
  - decayed
  - worn down
  lexicon: BDAG
  entry: s.v. φθείρω
  rationale: Moral-spiritual deterioration from former deeds is in view.
- source_word: πράξεις
  chosen: deeds
  alternatives:
  - actions
  - doings
  lexicon: BDAG
  entry: s.v. πρᾶξις
  rationale: Standard moral term matching Hermas’s usage.
- source_word: κάθηται
  chosen: sits
  alternatives:
  - is seated
  lexicon: BDAG
  entry: s.v. κάθημαι
  rationale: Continues the posture contrast (lie/stand/sit).
- source_word: ἀνδρίζεται
  chosen: takes courage
  alternatives:
  - acts manfully
  - becomes manly
  lexicon: BDAG
  entry: s.v. ἀνδρίζομαι
  rationale: Idiomatic sense is moral courage; we avoid gendered phrasing while noting
    literal sense.
- source_word: ἀποκάλυψιν
  chosen: revelation
  alternatives:
  - unveiling
  lexicon: BDAG
  entry: s.v. ἀποκάλυψις
  rationale: Established term for divine disclosure.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  entry: s.v. κύριος 2
  rationale: Divine referent; matches Cartha policy to render as “Lord.”
- source_word: ἐσπλαγχνίσθη
  chosen: had compassion
  alternatives:
  - took pity
  lexicon: BDAG
  entry: s.v. σπλαγχνίζομαι
  rationale: Denotes deep mercy; either alternative is accurate; “had compassion”
    is chosen for dignity.
- source_word: ἀνενεώσατο
  chosen: renewed
  alternatives:
  - made new again
  - restored
  lexicon: BDAG
  entry: s.v. ἀνανεόω
  rationale: Divine subject renews the people’s spirits.
- source_word: ἀπέθεσθε
  chosen: put away
  alternatives:
  - laid aside
  - cast off
  lexicon: BDAG
  entry: s.v. ἀποτίθημι 2
  rationale: Common moral metaphor for renouncing a vice or disposition.
- source_word: μαλακίας
  chosen: softness
  alternatives:
  - weakness
  - cowardice
  lexicon: LSJ
  entry: s.v. μαλακία
  rationale: Hermas’s moral “softness” (lack of resolve); we keep the vivid metaphor
    and explain in a note.
- source_word: ἰσχυρότης
  chosen: strength
  alternatives:
  - power
  - vigor
  lexicon: LSJ
  entry: s.v. ἰσχυρότης
  rationale: Abstract noun; personified arrival of strength fits the rhetoric.
- source_word: ἐδυναμώθητε
  chosen: were strengthened
  alternatives:
  - grew strong
  - were made strong
  lexicon: BDAG
  entry: s.v. δυναμόω
  rationale: Passive/middle nuance preserved; divine agency implied by context.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - the faith
  lexicon: BDAG
  entry: s.v. πίστις 1
  rationale: Here the interior disposition of trust is prominent; article with abstract
    is customary.
- source_word: ἰσχυροποίησιν
  chosen: strengthening
  alternatives:
  - being made strong
  - fortifying
  lexicon: LSJ
  entry: s.v. ἰσχυροποίησις
  rationale: Nominal form keeps the parallel with “strength.”
- source_word: ἐχάρη
  chosen: rejoiced
  alternatives:
  - was glad
  lexicon: BDAG
  entry: s.v. χαίρω
  rationale: Simple, fitting divine joy at their strengthening.
- source_word: ἐδήλωσεν
  chosen: made known
  alternatives:
  - revealed
  - showed
  lexicon: BDAG
  entry: s.v. δηλόω
  rationale: Different verb from ἀποκαλύπτω; “made known” preserves lexical distinction.
- source_word: οἰκοδομή
  chosen: building
  alternatives:
  - construction
  - edification
  lexicon: BDAG
  entry: s.v. οἰκοδομή 1
  rationale: Concrete act of building the tower is intended, not metaphorical “edification”
    in English here.
- source_word: πύργου
  chosen: tower
  lexicon: BDAG
  entry: s.v. πύργος
  rationale: Fixed image in Hermas for the church; we retain the concrete noun.
- source_word: δηλώσει
  chosen: he will make known
  alternatives:
  - he will show
  lexicon: BDAG
  entry: s.v. δηλόω
  rationale: Keeps verbal parallel with ἐδήλωσεν in previous clause.
- source_word: εἰρηνεύετε ἐν ἑαυτοῖς
  chosen: be at peace among yourselves
  alternatives:
  - live in peace with one another
  - be at peace within yourselves
  lexicon: BDAG
  entry: s.v. εἰρηνεύω
  rationale: Idiomatic plural reflexive points to mutual peace within the community.
- source_word: ἐξ ὅλης καρδίας
  chosen: with a whole heart
  alternatives:
  - from your whole heart
  - wholeheartedly
  lexicon: BDAG
  entry: s.v. καρδία
  rationale: Hebraic idiom preserved; “with a whole heart” keeps solemn register.
