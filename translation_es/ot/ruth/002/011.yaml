revisions:
- from: 'Entonces Booz respondió y le dijo: «Me han informado[a] plenamente de todo lo que has hecho por tu suegra, después de la muerte de tu esposo, y de cómo dejaste a tu padre y a tu madre, y la tierra de tu nacimiento, y fuiste a un pueblo[b] que no conocías antes».'
  to: 'Entonces Booz respondió y le dijo: «Se me ha informado[a] plenamente de todo lo que has hecho por tu suegra, después de la muerte de tu esposo, y de cómo dejaste a tu padre y a tu madre, y la tierra de tu nacimiento, y te fuiste a vivir entre un pueblo[b] que no conocías antes».'
  rationale: 'Se ajusta la frase principal para un español más natural y fiel: «Se me ha informado plenamente» preserva mejor la voz pasiva intensificada del hebreo, y «te fuiste a vivir entre un pueblo» comunica con claridad que Rut pasó a integrarse entre un grupo humano, no que simplemente fue a una localidad. Las notas se conservan, pero la [a] se afina para reflejar mejor el valor del infinitivo absoluto con verbo finito.'
