translation:
  language: es
  text: Pues estos dos años ha habido hambre en medio de la tierra[a], y aún quedan cinco años en los que no habrá ni arar ni cosecha[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la tierra»; el hebreo dice literalmente «en medio de la tierra».
    reason: lexical_alternative
  - marker: b
    text: O «ni labranza ni siega»; el hebreo se refiere a las labores de arar y cosechar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de José sobre la situación presente; en español, «Porque» conserva la conexión causal/discursiva sin sonar forzado.
- source_word: זֶה שְׁנָתַיִם
  english_pob_choice: these two years
  chosen_spanish: estos dos años
  alternatives_spanish:
  - durante estos dos años
  - hace dos años
  lexicon: HALOT
  rationale: El deíctico con el dual se expresa de forma natural como «estos dos años», manteniendo la referencia al período ya transcurrido.
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: ha habido hambre
  alternatives_spanish:
  - la hambre
  - ha habido la hambruna
  lexicon: HALOT
  rationale: «Hambre» comunica el desastre alimentario en español bíblico moderno; se opta por una construcción verbal natural que preserve la idea de una condición que ha estado presente. «Hambruna» es posible, pero suena más técnica.
- source_word: בְּקֶרֶב הָאָרֶץ
  english_pob_choice: in the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en la tierra
  - por toda la tierra
  lexicon: HALOT
  rationale: Se conserva la imagen de «en medio de» frente a una atenuación a «en la tierra». «Tierra» respeta el valor local del hebreo en este contexto.
- source_word: וְעוֹד חָמֵשׁ שָׁנִים
  english_pob_choice: and there are still five years
  chosen_spanish: y aún quedan cinco años
  alternatives_spanish:
  - y todavía hay cinco años
  - y restan cinco años
  lexicon: HALOT
  rationale: «Aún quedan» reproduce la idea de tiempo restante con naturalidad y mantiene el sentido prospectivo.
- source_word: אֲשֶׁר אֵין
  english_pob_choice: in which there will be neither
  chosen_spanish: en los que no habrá
  alternatives_spanish:
  - durante los cuales no habrá
  - en que no habrá
  lexicon: HALOT
  rationale: La cláusula relativa se vuelve futura desde la perspectiva del hablante; «en los que no habrá» es la forma más clara y fiel en español.
- source_word: חָרִישׁ
  english_pob_choice: plowing
  chosen_spanish: arado
  alternatives_spanish:
  - arado ni siega
  - labranza
  lexicon: HALOT
  rationale: El sustantivo puede referirse al acto de arar o al trabajo de arado; «arado» conserva la concreción agrícola y evita una paráfrasis amplia. Se mantiene la pareja agrícola tradicional en español con «siega» para reflejar el paralelismo del verso.
- source_word: וְקָצִיר
  english_pob_choice: harvest
  chosen_spanish: siega
  alternatives_spanish:
  - cosecha
  - recolección
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «harvest», el hebreo puede abarcar la acción de segar/recolectar; «siega» preserva mejor el paralelismo con «arado» y la fuerza agrícola del original.
translation_notes:
  revision_awareness: 'El borrador sigue la lectura estable del inglés POB y su nota alternativa sobre בְּקֶרֶב הָאָרֶץ, pero ajusta el segundo par agrícola al hebreo y al español: se preserva el paralelismo semántico y se evita depender del inglés donde el original admite una matización.'
  spanish_consistency_notes:
  - Se usó «tierra» para הָאָרֶץ por coherencia con el contexto local y la nota de alternativa del POB en inglés.
  - Se eligió «arado/siega» para reflejar la pareja agrícola del hebreo de manera idiomática en español; la nota mantiene la alternativa «cosecha» para el lector que prefiera una equivalencia más amplia.
  - No se introdujo «Mesías», «Yahvé» ni otros términos de terminología fija porque este versículo no los contiene.
