translation:
  language: es
  text: Pero si ustedes se niegan y se rebelan[a], serán devorados por la espada; porque la boca de Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «serán comidos por la espada». La expresión establece un contraste deliberado con el versículo anterior, donde los obedientes «comerán el bien de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: HALOT
  rationale: El hebreo introduce una condición con contraste respecto del versículo anterior. En español, «Pero si» conserva bien la oposición adversativa y la fuerza condicional sin sonar arcaico.
- source_word: תְּמָאֲנ֖וּ
  english_pob_choice: you refuse
  chosen_spanish: rehusáis
  alternatives_spanish:
  - os negáis
  - rechazáis
  lexicon: HALOT
  rationale: מאן expresa negativa o rechazo a someterse. «Rehusáis» comunica la negativa voluntaria de forma clara y algo más sobria que «os negáis»; mantiene el matiz de negativa deliberada.
- source_word: וּ/מְרִיתֶ֑ם
  english_pob_choice: and rebel
  chosen_spanish: y os rebeláis
  alternatives_spanish:
  - y sois rebeldes
  - y resistís
  lexicon: HALOT
  rationale: מרה denota rebelión o desafiar autoridad. «Os rebeláis» preserva el sentido activo de ruptura del pacto que el inglés POB quiso mantener con «rebel».
- source_word: חֶ֣רֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  - la guerra
  lexicon: HALOT
  rationale: En este contexto profético, חֶרֶב funciona como imagen metonímica de juicio violento. «La espada» es la equivalencia española natural y conserva la imaginería bíblica.
- source_word: תְּאֻכְּל֔וּ
  english_pob_choice: you will be devoured
  chosen_spanish: seréis consumidos
  alternatives_spanish:
  - seréis devorados
  - seréis comidos
  lexicon: HALOT
  rationale: El pasivo de אכל forma un contraste intencional con el v. 19, donde el obediente «come» el bien de la tierra. «Seréis consumidos» transmite destrucción por la espada con naturalidad en español y mantiene la inversión retórica.
- source_word: כִּ֛י
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base o ratificación solemne de la advertencia. «Porque» es claro y adecuado al tono profético.
- source_word: פִּ֥י יְהוָ֖ה
  english_pob_choice: the mouth of Yahweh
  chosen_spanish: la boca de Yahvé
  alternatives_spanish:
  - la boca de Yahvé mismo
  - la boca de Yahvé
  lexicon: HALOT
  rationale: Se conserva el giro antropomórfico «la boca de Yahvé» para no suavizar la imagen del habla divina. Se sigue el estándar del proyecto para יְהוָה como «Yahvé».
- source_word: דִּבֵּֽר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  - ha dicho
  lexicon: HALOT
  rationale: El perfecto afirma la certeza de la declaración. «Ha hablado» reproduce bien la fórmula profética y mantiene el peso solemne del verbo.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme al estándar del proyecto, se traduce con el nombre divino en forma audible «Yahvé» y no con una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión retórica entre comer y ser comidos
  english_pob_reading: you will be devoured by the sword
  chosen_spanish_reading: seréis consumidos por la espada
  alternative_spanish_readings:
  - seréis devorados por la espada
  - la espada os devorará
  rationale: 'El hebreo mantiene un contraste deliberado con el versículo previo: los obedientes ''comerán'' el bien de la tierra, pero los rebeldes serán ''comidos'' por la espada. «Seréis consumidos» preserva la idea de ser el objeto del juicio sin perder la fuerza de inversión.'
  doctrine_reference: POB audit trail, Isaiah 1:19–20
translation_notes:
  revision_awareness: La versión inglesa auditada quedó en estado de alta concordancia y sin revisiones aplicadas. Esta propuesta española sigue esa lectura y solo ajusta la formulación para la naturalidad y la transparencia del español, conservando el paralelismo y la advertencia judicial del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la imagen de «la espada» como metonimia de juicio, no como simple arma literal.
  - «Seréis consumidos» intenta preservar el matiz pasivo del hebreo y la inversión con el versículo 19.
  - El tono es solemne y bíblico, pero en español moderno, sin calcos innecesarios.
