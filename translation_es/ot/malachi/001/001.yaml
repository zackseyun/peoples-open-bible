review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del encabezamiento hebreo, incluyendo «palabra de Yahvé», «a Israel» y la mediación del profeta. Sin embargo, se aparta del rastro auditado en dos puntos significativos: usa «carga» donde el English POB revisado adoptó «oracle/oráculo» como texto principal, y omite las dos notas preservadas en el audit trail para מַשָּׂא y מַלְאָכִי. Además, «Malquías» no corresponde a la transliteración esperable de מַלְאָכִי ni al nombre habitual del libro/profeta en español; «Malaquías» es la forma fiel e inteligible.'
  spanish_quality_summary: El español es comprensible, pero presenta un detalle tipográfico incorrecto en «La[ a]». «La carga de la palabra...» suena menos natural y menos alineado con el encabezamiento profético establecido que «Oráculo de la palabra...». «Por medio de» es legible, aunque «por medio de Malaquías» pierde la textura del idiomatismo hebreo; aun así, sigue siendo español natural. La revisión propuesta mejora fidelidad, naturalidad y pulcritud editorial.
  glossary_alignment: '«Yahvé» está correctamente alineado con la política del proyecto para יהוה. No hay términos mesiánicos ni otros glosarios sensibles en este versículo. La principal desalineación terminológica está en מַשָּׂא: el proyecto auditó «oracle» como elección principal, por lo que en español debe reflejarse normalmente como «oráculo», dejando «carga» como alternativa en nota. También debe preservarse la nota sobre la posible lectura «mi mensajero» para מַלְאָכִי.'
  issues:
  - severity: high
    issue: La elección principal «carga» para מַשָּׂא no sigue la revisión final del English POB, que adoptó «oracle».
    rationale: El audit trail documenta un cambio deliberado de «burden» a «oracle» como texto principal. En español, «oráculo» es la correspondencia más directa y natural de esa decisión, mientras «carga» debe quedar como alternativa en nota si se desea preservar la tensión léxica.
  - severity: high
    issue: Faltan las notas requeridas sobre מַשָּׂא y מַלְאָכִי.
    rationale: 'El English POB preserva dos alternativas significativas: «oracle»/«burden» para מַשָּׂא y «my messenger» para מַלְאָכִי. La política del encargo pide conservar esas alternativas en notas cuando el audit trail las conserva.'
  - severity: medium
    issue: «Malquías» es una forma inadecuada del nombre.
    rationale: La forma reconocida y eclesialmente legible en español es «Malaquías», que además refleja mejor la transliteración tradicional del libro/profeta.
  - severity: low
    issue: 'Hay un error de formato en el anclaje de nota: «La[ a]».'
    rationale: Los marcadores deben aparecer exactamente como `[a]` sin espacios internos y anclados a la palabra o frase correspondiente.
  revised_spanish_text: Oráculo[a] de la palabra de Yahvé a Israel por medio de Malaquías.[b]
  revised_footnotes:
