id: JHN.16.19
reference: John 16:19
source:
  edition: SBLGNT
  text: ⸀ἔγνω Ἰησοῦς ὅτι ἤθελον αὐτὸν ἐρωτᾶν, καὶ εἶπεν αὐτοῖς· Περὶ τούτου ζητεῖτε μετ’ ἀλλήλων ὅτι εἶπον· Μικρὸν καὶ οὐ θεωρεῖτέ με, καὶ πάλιν μικρὸν καὶ ὄψεσθέ με;
translation:
  text: Jesus knew that they wanted to ask him[a], and he said to them, “Are you discussing this with one another, that I said, ‘A little while, and you no longer see me, and again a little while[c][b], and you will see me’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “about this.”
    reason: lexical_alternative
  - marker: b
    text: 'The Greek uses two different verbs for seeing here: first “behold/observe” (θεωρέω), then “see” (ὁράω). English smooths both as “see” to preserve the sense and parallelism.'
    reason: lexical_alternative
  - marker: c
    text: Or “because I said.” The Greek conjunction can introduce either the content under discussion or the reason for it.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγνω
  chosen: knew
  alternatives:
  - perceived
  - recognized
  lexicon: BDAG
  rationale: Aorist of γινώσκω here denotes Jesus' awareness of the disciples' intention. 'Knew' is the most natural and direct English equivalent in context.
- source_word: ἤθελον
  chosen: wanted
  alternatives:
  - wished
  - were desiring
  lexicon: BDAG
  rationale: Imperfect of θέλω expresses ongoing intention. 'Wanted' gives idiomatic modern English without over-translating the aspect.
- source_word: ἐρωτᾶν
  chosen: to ask
  alternatives:
  - to question
  - to inquire of
  lexicon: BDAG
  rationale: In Johannine usage ἐρωτάω commonly means 'ask' in interpersonal speech. 'Question' sounds more adversarial than the context suggests.
- source_word: Περὶ τούτου
  chosen: this
  alternatives:
  - about this
  - concerning this
  lexicon: BDAG
  rationale: The phrase introduces the topic under discussion. In English, 'Are you discussing this...?' naturally incorporates the sense of περί without awkwardness.
- source_word: ζητεῖτε
  chosen: are you discussing
  alternatives:
  - are you seeking
  - are you inquiring
  - are you debating
  lexicon: BDAG
  rationale: Although ζητέω often means 'seek,' with μετ’ ἀλλήλων and the following content clause it refers to their trying to sort out the meaning among themselves. 'Discussing' best captures the contextual sense in readable English.
- source_word: μετ’ ἀλλήλων
  chosen: with one another
  alternatives:
  - among yourselves
  lexicon: BDAG
  rationale: Standard reciprocal expression; 'with one another' is clear and natural.
- source_word: ὅτι εἶπον
  chosen: that I said
  alternatives:
  - because I said
  lexicon: BDAG
  rationale: Here ὅτι introduces the content under discussion rather than the cause alone. 'That I said' fits the direct quotation that follows and preserves the disciples' focus on Jesus' statement.
- source_word: Μικρὸν
  chosen: A little while
  alternatives:
  - a little
  - a short time
  lexicon: BDAG
  rationale: The neuter adjective is idiomatic for a short interval of time. 'A little while' is standard, clear English and preserves the temporal force.
- source_word: θεωρεῖτέ
  chosen: see
  alternatives:
  - behold
  - observe
  lexicon: BDAG
  rationale: θεωρέω can imply beholding or observing, but in this context a simple 'see' is the most natural English rendering and pairs well with the later ὄψεσθέ.
- source_word: οὐ θεωρεῖτέ με
  chosen: you no longer see me
  alternatives:
  - you do not see me
  - you will not see me
  lexicon: BDAG
  rationale: Given the temporal frame created by 'a little while,' English idiom is best served by 'you no longer see me,' expressing the impending cessation of sight rather than a timeless present.
- source_word: πάλιν
  chosen: again
  alternatives:
  - then again
  lexicon: BDAG
  rationale: Simple adverb marking the next stage in sequence; 'again' is sufficient.
- source_word: ὄψεσθέ
  chosen: you will see
  alternatives:
  - you will behold
  lexicon: BDAG
  rationale: Future middle of ὁράω is naturally rendered 'you will see.' Keeping 'see' here also preserves the parallelism with the previous clause in accessible English.
