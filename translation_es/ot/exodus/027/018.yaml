translation:
  language: es
  text: La longitud del atrio será de cien codos, y su anchura de cincuenta codos[a], y su altura de cinco codos, de lino finamente torcido, con sus bases de bronce[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cincuenta por cincuenta». Algunas traducciones conservan esa formulación literal; aquí se expresa como «cincuenta codos» para mayor claridad en español.'
    reason: alternative_reading
  - marker: b
    text: 'O: «sus zócalos de bronce».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - extensión
  - largo
  lexicon: HALOT
  rationale: En un contexto de medidas arquitectónicas, 'longitud' comunica con naturalidad la dimensión lineal y mantiene el paralelismo con la 'anchura' y la 'altura'.
- source_word: הֶחָצֵר
  english_pob_choice: the court
  chosen_spanish: el atrio
  alternatives_spanish:
  - el patio
  - la corte
  lexicon: HALOT
  rationale: '''Atrio'' es un equivalente bíblico claro para el recinto del tabernáculo y resulta más natural en español que ''patio''; ''corte'' sería engañoso.'
- source_word: מֵאָה בָאַמָּה
  english_pob_choice: a hundred cubits
  chosen_spanish: cien codos
  alternatives_spanish:
  - cien codos exactos
  - ciento de codos
  lexicon: HALOT
  rationale: Se conserva la unidad antigua 'codos' para reflejar la medida del hebreo sin modernizarla.
- source_word: וְרֹחַב
  english_pob_choice: and the width
  chosen_spanish: y su anchura
  alternatives_spanish:
  - y la anchura
  - y el ancho
  lexicon: HALOT
  rationale: El posesivo explícito ayuda a que el español fluya en una cadena de dimensiones y mantiene la relación con 'el atrio'.
- source_word: חֲמִשִּׁים בַּחֲמִשִּׁים
  english_pob_choice: fifty cubits
  chosen_spanish: de cincuenta codos
  alternatives_spanish:
  - cincuenta por cincuenta
  - cincuenta codos
  lexicon: HALOT
  rationale: El inglés POB preservó el dato dimensional explícito y luego lo suavizó por claridad; en español, la lectura natural y fiel es 'de cincuenta codos', sin necesidad de reproducir el hebraísmo 'cincuenta por cincuenta'.
- source_word: וְקֹמָה
  english_pob_choice: and the height
  chosen_spanish: y su altura
  alternatives_spanish:
  - y la altura
  - y su elevación
  lexicon: HALOT
  rationale: '''Altura'' es la equivalencia más directa para la dimensión vertical del atrio.'
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: of finely twisted linen
  chosen_spanish: de lino finamente torcido
  alternatives_spanish:
  - de lino fino torcido
  - de lino finamente retorcido
  lexicon: HALOT
  rationale: '''Lino finamente torcido'' conserva tanto el material como la idea de tejido/hilado retorcido. ''Torcido'' mantiene el paralelismo con el valor artesanal del hebreo, aunque en español moderno suene menos idiomático que ''retorcido''.'
- source_word: וְאַדְנֵיהֶם
  english_pob_choice: with their bases
  chosen_spanish: con sus bases
  alternatives_spanish:
  - con sus zócalos
  - con sus zoclos
  - con sus encajes
  lexicon: HALOT
  rationale: '''Bases'' reproduce la opción del POB inglés y es suficientemente clara para el soporte de los postes; ''zócalos'' o ''encajes'' sonarían más técnicos o menos transparentes.'
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - metal de bronce
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, 'bronce' sigue la decisión estándar del POB inglés y es la forma española más reconocible en listas de materiales sagrados.
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión del inglés POB que aclaró la medida con 'cubits' y evitó la expresión poco natural 'fifty by fifty'; por eso el español adopta directamente 'de cincuenta codos' como solución natural y transparente, sin perder la correspondencia métrica del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'atrio' para el recinto del tabernáculo, coherente con el registro bíblico en español.
  - '''Codos'' conserva la unidad antigua de medida en vez de convertirla a unidades modernas.'
  - '''Bronce'' y ''bases'' siguen la terminología técnica del conjunto del tabernáculo y son consistentes con un estilo de traducción bíblica auditable.'
