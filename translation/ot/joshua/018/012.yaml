id: JOS.18.12
reference: Joshua 18:12
source:
  edition: WLC
  text: וַ/יְהִ֨י לָ/הֶ֧ם הַ/גְּב֛וּל לִ/פְאַ֥ת צָפ֖וֹנָ/ה מִן הַ/יַּרְדֵּ֑ן וְ/עָלָ֣ה הַ/גְּבוּל֩ אֶל כֶּ֨תֶף יְרִיח֜וֹ מִ/צָּפ֗וֹן וְ/עָלָ֤ה בָ/הָר֙ יָ֔מָּ/ה ו/היה תֹּֽצְאֹתָ֔י/ו מִדְבַּ֖רָ/ה בֵּ֥ית אָֽוֶן־־׃
translation:
  text: Their border on the north side was from the Jordan[a], and the border went up to the northern slope of Jericho, then went up into the hill country westward[b], and its end was at the wilderness of Beth-aven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'shoulder of Jericho,' a geographical expression meaning its side or slope.
    reason: lexical_alternative
  - marker: b
    text: Or 'its extremities' or 'its outgoings'; the Hebrew uses a plural topographical term for the border's endpoint(s).
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְאַת צָפוֹנָה
  chosen: on the north side
  alternatives:
  - at the northern edge
  - toward the north side
  lexicon: HALOT
  rationale: פאה denotes side, edge, or region. In a boundary description, 'on the north side' is natural English and preserves the directional function without over-literal awkwardness.
- source_word: הַגְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory line
  lexicon: HALOT
  rationale: In allotment and territorial texts, גְּבוּל refers to the boundary line or border. 'Border' is concise and idiomatic here.
- source_word: מִן הַיַּרְדֵּן
  chosen: from the Jordan
  alternatives:
  - from the Jordan River
  lexicon: HALOT
  rationale: The proper name commonly stands alone in English as 'the Jordan'; 'River' is implicit and unnecessary unless clarity demands it.
- source_word: וְעָלָה
  chosen: went up
  alternatives:
  - ascended
  - ran up
  lexicon: HALOT
  rationale: עלה is the standard verb in topographical boundary descriptions. 'Went up' preserves the spatial imagery better than the more abstract 'ran' while remaining readable.
- source_word: אֶל כֶּתֶף יְרִיחוֹ
  chosen: to the northern slope of Jericho
  alternatives:
  - to the shoulder of Jericho on the north
  - to the side of Jericho on the north
  lexicon: HALOT
  rationale: כֶּתֶף literally means 'shoulder,' but in geographical usage it refers to a slope or side. 'Slope' communicates the terrain sense in clear English.
- source_word: מִצָּפוֹן
  chosen: northern
  alternatives:
  - from the north
  - on the north
  lexicon: HALOT
  rationale: Attached to the Jericho phrase, this specifies which slope/side is meant. Rendering adjectivally as 'northern' produces smoother English while preserving the sense.
- source_word: בָהָר יָמָּה
  chosen: through the hill country westward
  alternatives:
  - into the hill country toward the west
  - in the hill country westward
  lexicon: HALOT
  rationale: הָר here is best understood collectively/topographically as hill country rather than a single mountain. יָמָּה is a directional adverb meaning westward. 'Through the hill country westward' fits the movement of the border line.
- source_word: תֹּצְאֹתָיו
  chosen: its end
  alternatives:
  - its extremities
  - its outgoings
  - its termination
  lexicon: HALOT
  rationale: In boundary formulas, תוצאות refers to the endpoint or outer limit of the border. Singular English 'its end' is idiomatic though the Hebrew form is plural in a technical/topographical sense.
- source_word: מִדְבַּרָה בֵּית אָוֶן
  chosen: at the wilderness of Beth-aven
  alternatives:
  - toward the wilderness of Beth-aven
  - in the wilderness of Beth-aven
  lexicon: HALOT
  rationale: The phrase names the terminal location of the border. 'At the wilderness of Beth-aven' best matches the endpoint sense after 'its end was.' Beth-aven is transliterated as a place name per translation philosophy.
