theological_decisions:
- issue: Identification of 'the righteous man'
  chosen_reading: The phrase is rendered generically as 'the righteous man' without naming Abraham in the main text.
  alternative_readings:
  - Abraham
  rationale: The immediate literary context points to Abraham, especially the reference to compassion for his child, but the Greek text itself uses the descriptive title rather than the proper name. To avoid importing more than the text states, the translation preserves the designation while allowing the contextual identification to remain implicit.
  doctrine_reference: Original-language primacy over translation tradition; preserve what the source text explicitly says.
- issue: Sense of the final clause regarding Abraham's son
  chosen_reading: The clause is rendered as Wisdom keeping him strong against his compassion for his child.
  alternative_readings:
  - kept him steadfast despite his tender feelings for his son
  - preserved him strong in the matter of his child
  rationale: The wording evokes the Akedah-like test without explicitly mentioning sacrifice. The translation preserves the emotional tension of paternal compassion and divine testing without over-specifying details absent from the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
