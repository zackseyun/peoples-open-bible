revisions:
- from: Pero mandó a las nubes de arriba[a][b], y abrió las puertas del cielo.
  to: Pero mandó a las nubes de arriba[a], y abrió las puertas[b] del cielo.
  rationale: La traducción principal es buena, pero las notas deben alinearse mejor con la evidencia léxica y con el español natural. Se corrige la alternativa de שׁחקים para incluir «de arriba» y se reemplaza «compuertas» por una alternativa más cercana a דַלְתֵי. También se reancla la nota sobre «puertas» al término correspondiente en el texto.
