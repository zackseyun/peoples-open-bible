translation:
  language: es
  text: Escucha el consejo y acepta la disciplina, para que llegues a ser sabio al final[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu futuro» o «en tu desenlace». El hebreo אַחֲרִית puede referirse al fin, resultado o futuro de una persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha atentamente
  lexicon: HALOT
  rationale: El imperativo de שׁמע en contexto sapiencial pide atención obediente, no solo audición. «Escucha» comunica bien ese matiz sin sonar arcaico.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - counsel
  - asesoramiento
  - guía
  lexicon: HALOT
  rationale: En español bíblico actual, «consejo» transmite el peso de la sabiduría práctica de עֵצָה de manera natural y fiel.
- source_word: וְקַבֵּל
  english_pob_choice: accept
  chosen_spanish: acepta
  alternatives_spanish:
  - recibe
  - acoge
  lexicon: HALOT
  rationale: קבל aquí expresa recepción voluntaria de la instrucción. «Acepta» reproduce bien esa disposición activa y suena natural en español.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: la disciplina
  alternatives_spanish:
  - la corrección
  - la instrucción
  - la reprensión
  lexicon: HALOT
  rationale: מוּסָר en Proverbios suele incluir corrección formativa, no mera información. «Disciplina» conserva ese campo semántico fuerte, como en la elección inglesa.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: La partícula de propósito se expresa con naturalidad en español mediante «para que».
- source_word: תֶּחְכַּם
  english_pob_choice: you may become wise
  chosen_spanish: te hagas sabio
  alternatives_spanish:
  - llegues a ser sabio
  - te vuelvas sabio
  - seas sabio
  lexicon: HALOT
  rationale: El imperfecto de חכם aquí puede indicar llegar a la sabiduría como resultado. «Te hagas sabio» preserva ese matiz procesual mejor que un simple «seas sabio».
- source_word: בְּאַחֲרִיתֶךָ
  english_pob_choice: in the end
  chosen_spanish: en el fin
  alternatives_spanish:
  - al final
  - en tu futuro
  - en tu desenlace
  lexicon: HALOT
  rationale: אַחֲרִית puede significar fin, resultado o futuro. Dado el ajuste reciente del inglés hacia «in the end», «en el fin» refleja de forma directa y sobria el alcance temporal/resultado del término, aunque en español también podría entenderse como «al final».
translation_notes:
  revision_awareness: El inglés auditado revisó «in your latter days» a «in the end» para reflejar más directamente בְּאַחֲרִיתֶךָ. La versión española sigue esa revisión con una forma breve y pública, manteniendo el sentido de desenlace/final sin añadir explicaciones interpretativas no presentes en el hebreo.
  spanish_consistency_notes:
  - 'Se mantuvo el tratamiento imperativo singular implícito en el hebreo: «Escucha... acepta... te hagas».'
  - Se conservó el paralelismo sapiencial breve y directo del hebreo, sin expandir la frase final más allá de lo warranted por el texto.
  - Se eligió «consejo» y «disciplina» para reflejar el registro sapiencial de Proverbios y evitar suavizar el tenor formativo del verso.
