translation:
  language: es
  text: Jeshua engendró a Joiakim[a], y Joiakim engendró a Eliashib[b], y Eliashib engendró a Joiada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa una fórmula genealógica idiomática, literalmente: «Jeshua hizo nacer a Joiakim...». «Engendró» comunica esa relación genealógica en español de manera natural.'
    reason: lexical_alternative
  - marker: b
    text: Joiakim también puede escribirse «Jehoiakim», y Joiada también puede escribirse «Jehoiada» en la tradición bíblica. Aquí se mantienen «Joiakim» y «Joiada» para seguir de cerca las formas hebreas presentes y la opción auditada.
    reason: alternative_reading
lexical_decisions:
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jeshua
  alternatives_spanish:
  - Josué
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma transliterada, como en el audit trail inglés. 'Josué' sería el equivalente tradicional, pero en un contexto genealógico postexílico 'Jeshua' evita confundirlo con Josué hijo de Nun y refleja mejor la forma usada en la base inglesa.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - causó el nacimiento de
  lexicon: HALOT
  rationale: El hiphil de ילד en esta fórmula genealógica expresa paternidad causal. En español, 'engendró' comunica bien la relación genealógica y mantiene la fuerza idiomática sin volverlo explicativo de más. 'Fue padre de' es posible, pero menos compacto; 'causó el nacimiento de' sería demasiado literal y torpe.
- source_word: יוֹיָקִים
  english_pob_choice: Joiakim
  chosen_spanish: Joiakim
  alternatives_spanish:
  - Jehoiakim
  lexicon: HALOT
  rationale: Se mantiene la transliteración que el POB inglés eligió para seguir de cerca la forma hebrea presente aquí. 'Jehoiakim' es una variante tradicional, pero podría mezclarlo con otras formas onomásticas; 'Joiakim' conserva mejor la correspondencia directa.
- source_word: אֶלְיָשִׁיב
  english_pob_choice: Eliashib
  chosen_spanish: Eliasib
  alternatives_spanish:
  - Eliashib
  lexicon: HALOT
  rationale: Se adapta la transliteración al patrón fonético y ortográfico del español, simplificando la secuencia inglesa 'sh' a 's' para lectura natural en español. La forma sigue siendo claramente identificable con el nombre hebreo.
- source_word: יוֹיָדָע
  english_pob_choice: Joiada
  chosen_spanish: Joiada
  alternatives_spanish:
  - Jehoiada
  lexicon: HALOT
  rationale: Se conserva la transliteración breve del POB inglés. 'Jehoiada' es una forma tradicional en español, pero 'Joiada' mantiene la consistencia con 'Joiakim' y se ajusta al principio del record de seguir la forma hebrea presente.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido y la estructura del audit trail inglés: una cadena genealógica simple con tres generaciones. No se registran revisiones posteriores ni conflictos textuales relevantes; el pasaje presenta alta concordancia entre fuente hebrea y versión inglesa auditada.'
  spanish_consistency_notes:
  - Se evitó 'Cristo', 'SEÑOR' o vocabulario interpretativo no presente en el verso.
  - Se conservó el orden paratáctico de la serie genealógica.
  - Se adaptó 'Eliashib' a 'Eliasib' por naturalidad ortográfica en español, sin alterar la identificación del nombre.
