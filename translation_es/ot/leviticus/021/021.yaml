translation:
  language: es
  text: Ningún hombre de la descendencia de Aarón el sacerdote que tenga un defecto se acercará para ofrecer las ofrendas de alimento de Yahvé[a]. Un defecto hay en él[b]; no se acercará para ofrecer el pan de su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «las ofrendas por fuego de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: '«Pan de su Dios» es un modismo sacerdotal para la comida presentada a Dios en el sacrificio; también: «el alimento de su Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אִישׁ
  english_pob_choice: No man
  chosen_spanish: Ningún hombre
  alternatives_spanish:
  - Todo hombre
  - Nadie
  lexicon: HALOT
  rationale: La construcción legal expresa una prohibición universal. En español, 'Ningún hombre' conserva el valor masculino singular del sujeto y suena natural en un mandato cultual/jurídico.
- source_word: מוּם
  english_pob_choice: defect
  chosen_spanish: defecto
  alternatives_spanish:
  - mancha
  - imperfección física
  - defecto corporal
  lexicon: HALOT
  rationale: En este contexto sacerdotal, מוּם designa una condición corporal descalificante. 'Defecto' comunica bien la idea legal sin depender de un término cultual más antiguo como 'mancha'.
- source_word: מִזֶּרַע אַהֲרֹן
  english_pob_choice: from the offspring of Aaron
  chosen_spanish: de la descendencia de Aarón
  alternatives_spanish:
  - de los descendientes de Aarón
  - de la simiente de Aarón
  lexicon: HALOT
  rationale: '''Descendencia'' preserva el sentido genealógico de זֶרַע de manera natural en español y evita un registro demasiado literal o arcaico.'
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el presbítero
  lexicon: HALOT
  rationale: El término hebreo es el oficio sacerdotal de Aarón; 'sacerdote' es la equivalencia directa y clara en español.
- source_word: יִגַּשׁ
  english_pob_choice: shall come near
  chosen_spanish: se acercará
  alternatives_spanish:
  - se aproximará
  - se presentará
  lexicon: HALOT
  rationale: En contextos cultuales, נגשׁ conserva la idea de acercarse para servicio o acceso ritual. 'Se acercará' mantiene la repetición del verso y la forma legal.
- source_word: לְהַקְרִיב
  english_pob_choice: to offer
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para presentar
  - para traer
  lexicon: HALOT
  rationale: En sacrificios, הקריב significa presentar u ofrecer una ofrenda. 'Ofrecer' es la equivalencia española más transparente y litúrgicamente comprensible.
- source_word: אִשֵּׁי יְהוָה
  english_pob_choice: the food offerings of Yahweh
  chosen_spanish: las ofrendas encendidas de Yahvé
  alternatives_spanish:
  - las ofrendas por fuego de Yahvé
  - las ofrendas quemadas de Yahvé
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió 'food offerings' para resaltar la dimensión de comida sacrificada, el hebreo אִשֵּׁי es el término técnico asociado al fuego. En español, 'ofrendas encendidas' conserva esa fuerza lexical y evita perder el vínculo con el fuego ritual; la nota aclara la alternativa semántica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: ''Yahvé'', con valor auditable y sin enmascararlo como ''SEÑOR''.'
- source_word: לֶחֶם אֱלֹהָיו
  english_pob_choice: the bread of his God
  chosen_spanish: el pan de su Dios
  alternatives_spanish:
  - el alimento de su Dios
  - la comida de su Dios
  lexicon: HALOT
  rationale: '''Pan'' conserva el sentido literal de לֶחֶם y mantiene el idiomático sacerdotal. En español, esta literalidad también deja abierta la explicación de que se trata del alimento presentado a Dios.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'El texto hebreo usa directamente el Tetragrámaton. Para esta traducción española se sigue el estándar del proyecto: ''Yahvé'', preservando el nombre de pacto en vez de sustituirlo por una convención litúrgica de ocultamiento.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: אִשֵּׁי יְהוָה
  english_pob_reading: the food offerings of Yahweh
  chosen_spanish_reading: las ofrendas encendidas de Yahvé
  alternative_spanish_readings:
  - las ofrendas por fuego de Yahvé
  - las ofrendas de alimento de Yahvé
  rationale: La expresión hebrea es técnica y admite un matiz semántico entre el fuego ritual y la ofrenda como alimento para Dios. El español elegido preserva el componente de fuego sin borrar la función sacrificial; la nota hace visible la alternativa 'alimento/ofrendas de alimento' cuando sea útil para el lector.
  doctrine_reference: Levitical sacrificial terminology / cultic semantics
- issue: לֶחֶם אֱלֹהָיו
  english_pob_reading: the bread of his God
  chosen_spanish_reading: el pan de su Dios
  alternative_spanish_readings:
  - el alimento de su Dios
  rationale: Se mantiene la literalidad de 'pan' para no diluir el idiomatismo sacerdotal. En contexto levítico, 'pan' funciona metonímicamente para la porción sacrificada presentada a Dios; la nota permite la lectura ampliada sin abandonar el término base.
  doctrine_reference: Priestly idiom in Leviticus
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios (estado de alta concordancia). Se conservan las decisiones principales del audit trail inglés: מוּם como impedimento corporal/legal, יִגַּשׁ como ''se acercará'', לְהַקְרִיב como ''ofrecer'', y el paralelismo entre אִשֵּׁי יְהוָה y לֶחֶם אֱלֹהָיו. Para el español se ajustó la primera mitad para que suene idiomática sin perder el tono jurídico-sacro, y se prefirió ''ofrendas encendidas'' para mantener visible el elemento de fuego que el hebreo expresa con más fuerza que el inglés auditado.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la política del proyecto.
  - Se usa 'sacerdote' para הַכֹּהֵן y 'descendencia' para מִזֶּרַע.
  - Se conserva el paralelismo de 'se acercará' en ambos casos de יִגַּשׁ.
  - '''Pan de su Dios'' se conserva literal por su valor idiomático levítico; la nota aclara el sentido.'
  - El texto evita 'SEÑOR' como máscara del Nombre divino.
