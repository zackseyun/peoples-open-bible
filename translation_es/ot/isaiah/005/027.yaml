base_translation:
  language: en
  yaml_path: translation/ot/isaiah/005/027.yaml
  text: None among them is weary[a], and none stumbles; none slumbers or sleeps; the belt at his waist is not loosened[b], and the strap of his sandals is not broken.
  footnotes:
