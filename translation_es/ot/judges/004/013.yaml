translation:
  language: es
  text: Entonces Sísara reunió todos sus carros, novecientos carros de hierro, y a todo el pueblo que estaba con él, desde Haróset-hagoyim hasta el torrente Quisón.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיַּזְעֵק
  english_pob_choice: called together
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - llamó juntos
  lexicon: HALOT
  rationale: El verbo causativo aquí expresa la acción de hacer venir o juntar fuerzas en contexto militar. «Reunió» comunica con naturalidad ese llamado a concentrarse, manteniendo la fuerza de convocatoria sin volverlo demasiado explicativo.
- source_word: רִכְבּוֹ
  english_pob_choice: his chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - su fuerza de carros
  - su carro de guerra
  lexicon: HALOT
  rationale: En este pasaje el sustantivo se refiere al conjunto de carros de guerra de Sísara. «Carros» es claro en español y conserva el referente concreto sin añadir una paráfrasis militar más amplia.
- source_word: תְּשַׁע מֵאוֹת רֶכֶב בַּרְזֶל
  english_pob_choice: nine hundred iron chariots
  chosen_spanish: novecientos carros de hierro
  alternatives_spanish:
  - novecientos carros de hierro
  - novecientos carros hechos de hierro
  lexicon: HALOT
  rationale: La frase numérica se traduce de forma directa. «Carros de hierro» sigue la forma concisa del hebreo y la decisión inglesa, sin introducir detalles no expresados sobre su fabricación o equipamiento.
- source_word: כָּל הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: all the people who were with him
  chosen_spanish: a todo el pueblo que estaba con él
  alternatives_spanish:
  - a toda la gente que estaba con él
  - a todas las tropas que estaban con él
  lexicon: HALOT
  rationale: «Pueblo» reproduce de cerca עָם y mantiene el sentido colectivo. Aunque el contexto es militar, el hebreo dice literalmente «pueblo», y el verbo subordinado conserva la relación de compañía sin forzar una lectura técnica.
- source_word: מֵחֲרֹשֶׁת הַגּוֹיִם
  english_pob_choice: from Harosheth-haggoyim
  chosen_spanish: desde Haroset-hagoyim
  alternatives_spanish:
  - desde Haroset de las naciones
  lexicon: HALOT
  rationale: Se preserva el nombre propio del lugar por transliteración, siguiendo la práctica del proyecto para topónimos. Se usa «desde» para reflejar la procedencia indicada por la preposición מִן.
- source_word: נַחַל קִישׁוֹן
  english_pob_choice: the Wadi Kishon
  chosen_spanish: el valle de Quisón
  alternatives_spanish:
  - el wadí Quisón
  - el torrente de Quisón
  - el río Quisón
  lexicon: HALOT
  rationale: נחל puede denotar un wadi, cauce estacional o valle de torrente. En español, «valle de Quisón» ofrece una opción natural y comprensible; se preserva la posibilidad de otras equivalencias geográficas en la nota textual.
translation_notes:
  revision_awareness: El auditor inglés mantuvo la idea de 'called together' frente a 'summoned' para acercarse más al verbo del hebreo y conservar el contexto militar. También preservó la ambigüedad geográfica de נחל mediante nota, porque la expresión puede equivaler a wadí, río estacional o valle de torrente; en español se optó por una forma legible, 'valle de Quisón', sin perder la posibilidad alternativa en nota.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el Tetragrámaton cuando aparezca; aquí no aparece.
  - Se conserva «Mesías/Cristo» según el contexto, pero este versículo no lo requiere.
  - Se usa transliteración estable para el topónimo Haroset-hagoyim, con ortografía coherente en todo el registro.
  - «Quisón» se mantiene como forma española del nombre propio, y se evita oscurecer el lugar con una descripción demasiado interpretativa.
