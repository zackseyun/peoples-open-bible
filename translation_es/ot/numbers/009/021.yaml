  text: וְ/יֵ֞שׁ אֲשֶׁר יִהְיֶ֤ה הֶֽ/עָנָן֙ מֵ/עֶ֣רֶב עַד בֹּ֔קֶר וְ/נַעֲלָ֧ה הֶֽ/עָנָ֛ן בַּ/בֹּ֖קֶר וְ/נָסָ֑עוּ א֚וֹ יוֹמָ֣ם וָ/לַ֔יְלָה וְ/נַעֲלָ֥ה הֶ/עָנָ֖ן וְ/נָסָֽעוּ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/009/021.yaml
  text: And sometimes the cloud would be from evening until morning; when the cloud was taken up in the morning[a], they would set out. Or if it was by day and by night, when the cloud was taken up, they would set out.
  footnotes:
  - marker: a
    text: Or, 'when the cloud rose.' The Hebrew verb can be rendered more literally this way, but 'was taken up' better reflects the cloud's lifting as the signal for Israel to depart in this context.
    reason: lexical_alternative
