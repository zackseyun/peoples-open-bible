translation:
  language: es
  text: El hombre que carece de entendimiento[a] estrecha la mano[b], haciéndose fiador[c] delante de su prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un hombre falto de corazón»; aquí «corazón» expresa entendimiento o juicio.'
    reason: lexical_alternative
  - marker: b
    text: La expresión alude a un gesto acostumbrado para contraer un compromiso o garantía financiera.
    reason: cultural_note
  - marker: c
    text: O «constituyéndose en fiador» / «prestando garantía».
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: A man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Una persona
  - Un hombre
  lexicon: HALOT
  rationale: La sentencia sapiencial presenta a un individuo representativo. En español, «el hombre» conserva el valor genérico masculino del hebreo y la forma proverbial del enunciado.
- source_word: חֲסַר לֵב
  english_pob_choice: lacking sense
  chosen_spanish: que carece de entendimiento
  alternatives_spanish:
  - sin corazón
  - falto de entendimiento
  - insensato
  lexicon: HALOT
  rationale: Hebreo literalmente «falto de corazón», donde «corazón» implica entendimiento/jucio. En español, «carece de entendimiento» transmite la fuerza idiomática sin sonar artificial; mantiene la tensión entre literalidad y sentido sapiencial.
- source_word: תּוֹקֵעַ כָּף
  english_pob_choice: strikes hands
  chosen_spanish: da la mano
  alternatives_spanish:
  - golpea la palma
  - estrecha la mano
  - choca la mano
  lexicon: HALOT
  rationale: La imagen es la de un gesto manual asociado a un compromiso legal o financiero. «Da la mano» conserva la idea del gesto de pacto/garantía de manera natural en español, y queda aclarada por la frase siguiente.
- source_word: עֹרֵב עֲרֻבָּה
  english_pob_choice: becoming surety
  chosen_spanish: saliendo fiador
  alternatives_spanish:
  - siendo fiador
  - prestando garantía
  - constituyéndose en garante
  lexicon: HALOT
  rationale: La pareja verbal-sustantiva apunta a la fianza o garantía legal. «Saliendo fiador» expresa con claridad el acto de asumir responsabilidad por otro; «fiador» es más idiomático que una calca y preserva el sentido jurídico.
- source_word: לִפְנֵי רֵעֵהוּ
  english_pob_choice: before his neighbor
  chosen_spanish: delante de su prójimo
  alternatives_spanish:
  - en presencia de su prójimo
  - ante su prójimo
  - frente a su prójimo
  lexicon: HALOT
  rationale: La preposición indica presencia delante de otro, sin precisar si es beneficiario, acreedor o testigo. «Delante de» o «ante» preservan esa ambigüedad; «prójimo» traduce bien רֵעֵהוּ en registro bíblico comprensible.
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés, que pasó de una paráfrasis más suave a «strikes hands» y de «pledging security» a «becoming surety». En español se optó por un equivalente idiomático que conserve el gesto contractual («da la mano») y la obligación legal («saliendo fiador»), sin perder la literalidad subyacente ni la ambigüedad prudencial del hebreo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otros términos de sustitución no presentes en este proverbio.
  - «Prójimo» se usó como equivalente natural de רֵעַ en un dicho sapiencial.
  - La frase verbal mantiene el paralelismo entre el gesto manual y la fianza legal.
  - Se preservó un tono proverbial claro, sin arcaísmo excesivo.
