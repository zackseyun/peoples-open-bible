lexical_decisions:
- source_word: ἐπιποθῶν σε ἰδεῖν
  english_pob_choice: longing to see you
  chosen_korean: 그대를 보기를 간절히 사모합니다
  alternatives_korean:
  - 그대를 보기를 간절히 그리워합니다
  - 그대 보기를 사모합니다
  lexicon: BDAG
  rationale: ἐπιποθέω의 강한 정서적 갈망을 한국어 「간절히 사모하다」로 살린다. 분사 구문을 본문 흐름에 맞게 종결문으로 풀어낸다.
- source_word: μεμνημένος σου τῶν δακρύων
  english_pob_choice: remembering your tears
  chosen_korean: 그대의 눈물을 기억하며
  alternatives_korean:
  - 그대의 눈물을 떠올리며
  - 그대가 흘리던 눈물을 기억하며
  lexicon: BDAG
  rationale: 완료 분사 μεμνημένος는 과거의 헤어짐 장면이 지금도 마음에 남아 있음을 함의한다. 「기억하며」가 그 지속적 의식을 자연스럽게 담는다.
- source_word: ἵνα χαρᾶς πληρωθῶ
  english_pob_choice: so that I may be filled with joy
  chosen_korean: 내가 기쁨으로 가득 차게 되기를 바랍니다
  alternatives_korean:
  - 내가 기쁨으로 충만하게 되기를 바랍니다
  - 기쁨이 충만하기를 바랍니다
  lexicon: BDAG
  rationale: ἵνα + 가정법의 목적·소망 의미를 한국어 「~기를 바랍니다」로 자연스럽게 옮긴다. 「가득 차다」는 πληρόω의 충만 이미지를 일상어로 살린다.
