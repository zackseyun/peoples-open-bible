translation:
  language: es
  text: Y llegué a ser como un hombre que no oye, y en cuya boca no hay reproches[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «reprensiones», «correcciones» o «argumentos». El término hebreo puede referirse a correcciones verbales o a respuestas de refutación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֱהִי
  english_pob_choice: And I became
  chosen_spanish: Y llegué a ser
  alternatives_spanish:
  - Y fui
  - Y era
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de היה puede avanzar la escena con un cambio de estado; «llegué a ser» comunica ese desarrollo mejor que un simple «era».
- source_word: כְּאִישׁ
  english_pob_choice: like a man
  chosen_spanish: como un hombre
  alternatives_spanish:
  - como una persona
  - como alguien
  lexicon: HALOT
  rationale: אִישׁ es masculino singular; «hombre» conserva el valor léxico y la comparación representativa del original.
- source_word: אֲשֶׁר לֹא שֹׁמֵעַ
  english_pob_choice: who does not hear
  chosen_spanish: que no oye
  alternatives_spanish:
  - que no escucha
  - que no puede oír
  lexicon: HALOT
  rationale: שׁמע aquí se rinde de forma directa como oír/escuchar. «Oye» mantiene la correspondencia más natural con el contraste de la segunda cola, sin añadir incapacidad no explicitada.
- source_word: וְאֵין
  english_pob_choice: and ... there are no
  chosen_spanish: y ... no hay
  alternatives_spanish:
  - y ... no existe
  - y ... carece de
  lexicon: HALOT
  rationale: אֵין introduce una negación existencial; en español, «no hay» reproduce bien la fuerza idiomática de la cláusula sin forzar la sintaxis.
- source_word: בְּפִיו
  english_pob_choice: in whose mouth
  chosen_spanish: en cuya boca
  alternatives_spanish:
  - en su boca
  - de su boca
  lexicon: HALOT
  rationale: La construcción relativa se conserva con «en cuya boca», manteniendo la imagen corporal y la referencia al hombre de la primera cola.
- source_word: תּוֹכָחוֹת
  english_pob_choice: reproofs
  chosen_spanish: reprensiones
  alternatives_spanish:
  - reproches
  - correcciones
  - argumentos
  lexicon: HALOT
  rationale: תּוֹכָחוֹת puede abarcar reprensión/corrección verbal; «reprensiones» es el término español más cercano al tono formal y al matiz de corrección o refutación verbal del contexto.
translation_notes:
  revision_awareness: La redacción española sigue la revisión final inglesa, que prefirió «reproofs» sobre «rebuttals» para reflejar mejor תּוֹכָחוֹת con un registro más formal y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se preservó el paralelismo de dos miembros: comparación con un hombre que no oye y ausencia de respuestas verbales en la boca.'
  - «Reprensiones» conserva la tensión semántica entre corrección, reprensión y respuesta verbal, sin reducir el término a una sola acepción.
