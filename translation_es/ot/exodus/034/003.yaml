translation:
  language: es
  text: Y nadie subirá contigo[a], y nadie[b] será visto[c] en ninguna parte del monte; ni el rebaño ni el ganado pastarán delante de aquel monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ascenderá contigo». El verbo hebreo puede expresar simplemente subir o ascender; aquí conserva el movimiento hacia la montaña.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «ningún hombre». El término es masculino en la forma, pero funciona aquí de manera genérica para cualquier persona.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «aparecerá». El verbo hebreo en esta forma puede significar «ser visto» o «aparecer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - ninguna persona
  lexicon: HALOT
  rationale: En este contexto de prohibición general, אִישׁ funciona con valor genérico para cualquier ser humano. En español, "nadie" evita una formulación marcadamente masculina en el texto principal sin perder el alcance universal de la prohibición; la tensión de género del hebreo queda explicada en la nota.
- source_word: יַעֲלֶה עִמָּךְ
  english_pob_choice: shall go up with you
  chosen_spanish: subirá contigo
  alternatives_spanish:
  - ascenderá contigo
  - irá contigo
  lexicon: HALOT
  rationale: עלה expresa ascenso literal al monte. "Subirá contigo" conserva el movimiento ascendente y suena natural en español bíblico contemporáneo.
- source_word: וְגַם / אַל
  english_pob_choice: and let no man be seen
  chosen_spanish: y nadie[b] será visto
  alternatives_spanish:
  - y nadie se verá
  - y nadie aparecerá
  lexicon: HALOT
  rationale: 'El nifal de ראה en esta prohibición tiene sentido pasivo/reflexivo: no estar visible. "Será visto" mantiene la pasividad del hebreo y deja abierta la alternativa semántica señalada en la nota.'
- source_word: בְּכָל הָהָר
  english_pob_choice: anywhere on the mountain
  chosen_spanish: en todo el monte
  alternatives_spanish:
  - por todo el monte
  - en cualquier parte del monte
  lexicon: HALOT
  rationale: La expresión hebrea tiene fuerza distributiva sobre toda el área montañosa. "En todo el monte" es breve, natural y suficientemente completo en español; la idea de extensión total queda preservada sin recargar la frase.
- source_word: הַצֹּאן וְהַבָּקָר
  english_pob_choice: the flock and the herd
  chosen_spanish: el rebaño y el ganado
  alternatives_spanish:
  - las ovejas y el ganado vacuno
  - el ganado menor y el mayor
  lexicon: HALOT
  rationale: La pareja hebrea es un merismo para el ganado pequeño y grande. "Rebaño y ganado" conserva la distinción y es idiomático en español general. Evita especificar "ovejas" o "vacuno" de modo demasiado estrecho.
- source_word: אַל יִרְעוּ
  english_pob_choice: must not graze
  chosen_spanish: pasten
  alternatives_spanish:
  - no deben pastar
  - no deben pacer
  lexicon: HALOT
  rationale: רעה aplicado a animales significa pastar/pacer. "Pasten" es natural, claro y mantiene el mandato negativo sin sonoridad arcaica.
- source_word: אֶל מוּל
  english_pob_choice: in front of
  chosen_spanish: delante de
  alternatives_spanish:
  - frente a
  - en frente de
  lexicon: HALOT
  rationale: La combinación espacial indica posición opuesta o delante de. "Delante de" transmite bien la relación espacial en español bíblico sin sonar mecánico.
- source_word: הָהָר הַהוּא
  english_pob_choice: that mountain
  chosen_spanish: aquel monte
  alternatives_spanish:
  - ese monte
  - ese monte allí
  lexicon: HALOT
  rationale: El demostrativo señala un monte específico ya mencionado. "Aquel monte" es un equivalente solemne y preciso en español; además mantiene la referencia de distancia/particularidad.
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de una redacción más adverbial a una prohibitiva más precisa: "and let no man be seen". En español se reflejó esa prohibición con "nadie será visto", manteniendo la fuerza pasiva/reflexiva del nifal y la amplia cobertura del sintagma "en todo el monte". También se respetó la tensión léxica entre el genérico masculino hebreo y una traducción española natural, trasladando la explicación de género a la nota.'
  spanish_consistency_notes:
  - Se usó "monte" en lugar de "montaña" para conservar el tono bíblico y porque el hebreo הָהָר puede referirse al monte Sinaí/Horeb en un registro narrativo-sacral.
  - Se evitó "SEÑOR" u otras sustituciones no presentes en el texto porque aquí no aparece el nombre divino ni un equivalente contextual directo.
  - Se mantuvo una distinción entre la prohibición humana y la de los animales, reflejando la estructura paralela del hebreo.
