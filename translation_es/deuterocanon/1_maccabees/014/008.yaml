translation:
  language: es
  text: Y ellos cultivaban su tierra en paz, y la tierra daba sus productos, y los árboles de los campos[a] su fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las llanuras». El griego πεδίων puede significar «campos» o, de modo más general, «llanuras / campo abierto».
    reason: lexical_alternative
lexical_decisions:
- source_word: γεωργοῦντες
  english_pob_choice: cultivating
  chosen_spanish: cultivaban
  alternatives_spanish:
  - trabajaban
  - cultivaban la tierra
  lexicon: LSJ
  rationale: El participio describe una acción agrícola continua. «Cultivaban» conserva el aspecto durativo y el sentido agrícola sin sonar forzado en español.
- source_word: γῆν
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - terreno
  - suelo
  - país
  lexicon: LSJ
  rationale: Aquí se trata del ámbito agrícola de ellos; «tierra» es natural en español y mantiene la referencia al territorio cultivado.
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  - en seguridad
  lexicon: LSJ
  rationale: La frase expresa la condición en que trabajaban la tierra. «En paz» reproduce de cerca la construcción y puede incluir tranquilidad y seguridad.
- source_word: ἐδίδου
  english_pob_choice: was yielding
  chosen_spanish: daba
  alternatives_spanish:
  - estaba dando
  - rendía
  - producía
  lexicon: LSJ
  rationale: El imperfecto señala acción repetida o continua. «Daba» es breve y natural en español, y conserva la idea de producción regular de la tierra.
- source_word: τὰ γενήματα
  english_pob_choice: produce
  chosen_spanish: su fruto
  alternatives_spanish:
  - su producción
  - sus productos
  - su cosecha
  lexicon: LSJ
  rationale: Aunque el término es amplio, en este contexto agrícola español «su fruto» comunica bien el rendimiento de la tierra sin perder la generalidad del original.
- source_word: τὰ ξύλα
  english_pob_choice: trees
  chosen_spanish: los árboles
  alternatives_spanish:
  - los árboles frutales
  - la arboleda
  - la madera
  lexicon: LSJ
  rationale: Aunque literalmente μπορεί referirse a «madera» o «árboles», el contexto con «su fruto» muestra que se trata de árboles vivos que dan fruto, no de madera.
- source_word: πεδίων
  english_pob_choice: of the fields
  chosen_spanish: de los campos
  alternatives_spanish:
  - de las llanuras
  - del campo
  - de los parajes
  lexicon: LSJ
  rationale: «Campos» refleja bien πεδίων en español y coincide con la revisión inglesa más directa. Mantiene el matiz de terrenos abiertos sin sonar técnico.
- source_word: καρπὸν
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruto
  - cosecha
  - produce
  lexicon: LSJ
  rationale: Con árboles como sujeto, «fruto» es la opción más directa y natural en español.
translation_notes:
  revision_awareness: El texto inglés más reciente optó por «fields» para πεδίων, sustituyendo la anterior preferencia por «plains». La versión española sigue esa revisión con «campos», manteniendo la relación entre la tierra cultivada y los árboles que dan fruto.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras equivalencias de máscara, porque el versículo no contiene el nombre divino.
  - «Tierra» y «campos» distinguen bien el terreno cultivado general y el espacio abierto de los árboles.
  - 'Se conservó el paralelismo del griego: trabajo agrícola, productividad de la tierra y fruto de los árboles.'
