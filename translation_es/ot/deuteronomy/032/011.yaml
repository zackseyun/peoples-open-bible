translation:
  language: es
  text: Como el águila[a] que alborota su nido, que se cierne[b] sobre sus polluelos, así extiende sus alas, lo toma y lo lleva sobre sus plumas remeras[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como un buitre', ya que el hebreo נֶשֶׁר puede referirse a un ave grande carroñera o a una rapaz semejante al águila.
    reason: lexical_alternative
  - marker: b
    text: O 'aletea sobre sus polluelos' o 'incuba sobre sus polluelos'.
    reason: lexical_alternative
  - marker: c
    text: '''Plumas remeras'' corresponde a un matiz más específico que ''alas''; el hebreo אֶבְרָה puede referirse a las plumas fuertes del ala, es decir, a las plumas de vuelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּנֶשֶׁר
  english_pob_choice: like an eagle
  chosen_spanish: como el águila
  alternatives_spanish:
  - como un buitre
  lexicon: HALOT
  rationale: El hebreo נֶשֶׁר puede designar un ave grande de rapiña; el POB inglés preserva 'eagle' como la imagen más natural y estable en este contexto de protección vigorosa. En español, 'águila' mantiene esa imagen sin forzar una equivalencia zoológica cerrada.
- source_word: יָעִיר
  english_pob_choice: stirs up
  chosen_spanish: despierta
  alternatives_spanish:
  - aviva
  - espabila
  - sacude
  lexicon: HALOT
  rationale: La forma causativa expresa 'hacer despertar' o 'despertar' el nido. 'Despierta' comunica bien la acción sobre el nido y evita una paráfrasis excesiva; conserva la fuerza dinámica del verbo.
- source_word: קִנּוֹ
  english_pob_choice: its nest
  chosen_spanish: su nido
  alternatives_spanish:
  - su panal
  lexicon: HALOT
  rationale: El sustantivo קֵן es literalmente 'nido'. En español, 'su nido' es la equivalencia directa y natural para el ave del símil.
- source_word: עַל גּוֹזָלָיו יְרַחֵף
  english_pob_choice: that hovers over its young
  chosen_spanish: se cierne sobre sus polluelos
  alternatives_spanish:
  - aletea sobre sus polluelos
  - flota sobre sus polluelos
  - se abate sobre sus polluelos
  lexicon: HALOT
  rationale: רָחַף expresa un movimiento de aleteo/cernirse con cuidado protector. 'Se cierne' conserva ese matiz mejor que un verbo más genérico. 'Polluelos' rinde bien גּוֹזָלִים en un registro bíblico claro y natural.
- source_word: יִפְרֹשׂ כְּנָפָיו
  english_pob_choice: he spreads out his wings
  chosen_spanish: así extiende sus alas
  alternatives_spanish:
  - abre sus alas
  - despliega sus alas
  lexicon: HALOT
  rationale: פָּרַשׂ significa extender o desplegar. 'Extiende sus alas' es claro y fiel; el pronombre implícito queda sin forzar en español porque el referente poético ya está en la imagen del águila y la secuencia del símil.
- source_word: יִקָּחֵהוּ
  english_pob_choice: takes him
  chosen_spanish: los toma
  alternatives_spanish:
  - lo toma
  - los lleva
  - lo recibe
  lexicon: HALOT
  rationale: El sufijo hebreo es singular masculino, pero el contexto puede proyectar la imagen al conjunto representado. En español, 'los' conecta mejor con 'sus polluelos' y con el movimiento plural del cuadro sin negar la singularidad representativa del verso. Se evita así una ambigüedad incómoda en español moderno.
- source_word: יִשָּׂאֵהוּ
  english_pob_choice: carries him
  chosen_spanish: los lleva
  alternatives_spanish:
  - lo lleva
  - los carga
  - lo carga
  lexicon: HALOT
  rationale: נָשָׂא aquí es llevar/cargar físicamente. 'Los lleva' mantiene la progresión natural en español junto con 'los toma' y funciona bien con la imagen de protección.
- source_word: עַל אֶבְרָתוֹ
  english_pob_choice: on his pinions
  chosen_spanish: sobre sus plumas
  alternatives_spanish:
  - sobre sus alas
  - sobre sus plumeros
  - sobre sus rémiges
  lexicon: HALOT
  rationale: אֶבְרָה designa la pluma fuerte del ala, con cierta especificidad respecto de כָּנָף. 'Plumas' conserva esa diferencia mejor que repetir 'alas' y sigue siendo comprensible para lectores actuales. 'Sobre sus plumas' mantiene el color poético del hebreo.
theological_decisions:
- issue: Pronombre y referencialidad del símil
  english_pob_reading: Retain the shift to 'he/his' in the latter half of the verse
  chosen_spanish_reading: Mantener el símil en tercera persona con un referente implícito coherente, sin introducir una explicación explícita en el texto
  alternative_spanish_readings:
  - usar 'él/sus' de forma explícita en toda la línea
  - mantener 'it/sus' con lenguaje impersonal
  rationale: El hebreo presenta una imagen de ave con formas masculinas y el contexto del cántico apunta a Yahvé como quien cuida a Israel. En español, la formulación opta por una continuidad poética natural sin exagerar la personificación ni cambiar el sentido teológico del cuadro.
  doctrine_reference: Translation philosophy §3, §4
- issue: Referencia implícita de pluralidad en 'sus polluelos' frente a objetos singulares hebreos
  english_pob_reading: The singular object suffix likely individualizes the young one or, in the simile's application, Israel
  chosen_spanish_reading: La traducción puede reflejar el plural natural de la imagen ('sus polluelos', 'los toma', 'los lleva') sin perder la aplicación colectiva al pueblo
  alternative_spanish_readings:
  - '''lo toma y lo lleva'''
  - '''lo toma y lo transporta'''
  rationale: El hebreo usa sufijos singulares, pero el sustantivo 'gôzalav' es colectivo en sentido imagético. El español necesita una solución fluida; el plural resulta natural si se entiende el cuadro como una escena de cría que representa el cuidado de Yahvé por su pueblo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente, que no introdujo cambios, y el informe de concordancia moderada con observaciones menores. La propuesta española busca resolver la principal tensión de número y referencialidad en el símil sin apartarse del hebreo ni del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la terminología del proyecto, aunque el versículo no nombra explícitamente el tetragrámaton.
  - '''Águila'' conserva la imagen tradicional del símil y no sustituye el campo semántico por una ave más genérica.'
  - Se usa 'polluelos' para גּוֹזָלִים por claridad natural en español bíblico contemporáneo.
  - Se evita 'SEÑOR' y se preserva la transparencia del símil animal sin convertirlo en paráfrasis doctrinal.
