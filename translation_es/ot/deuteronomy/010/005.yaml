translation:
  language: es
  text: Entonces me volví[a] y descendí del monte, y puse las tablas en el arca que había hecho; y allí están, tal como Yahvé me mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y ellos estaban allí»; la redacción también puede implicar que siguieron allí hasta el momento en que se habla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵפֶן
  english_pob_choice: Then I turned
  chosen_spanish: Entonces me volví
  alternatives_spanish:
  - Y me volví
  - Entonces giré
  lexicon: HALOT
  rationale: פנה expresa volverse/dirigirse de nuevo; en español, «me volví» comunica la acción narrativa con naturalidad y conserva el sentido de cambio de dirección sin añadir matices inexistentes.
- source_word: וָאֵרֵד מִן הָהָר
  english_pob_choice: came down from the mountain
  chosen_spanish: descendí del monte
  alternatives_spanish:
  - bajé del monte
  - descendí de la montaña
  lexicon: HALOT
  rationale: ירד significa bajar/descender; «descendí» mantiene el movimiento y el registro sobrio. «Monte» reproduce bien el referente bíblico y evita una imagen más genérica si el contexto litúrgico apunta a Sinaí/Horeb.
- source_word: וָאָשִׂם
  english_pob_choice: I put
  chosen_spanish: puse
  alternatives_spanish:
  - coloqué
  - deposité
  lexicon: HALOT
  rationale: שׂים es un verbo general de poner/colocar. «Puse» es la opción más natural y fiel en español; «coloqué» puede sonar más técnico, y «deposité» añade un matiz demasiado interpretativo.
- source_word: הַלֻּחֹת
  english_pob_choice: the tablets
  chosen_spanish: las tablas
  alternatives_spanish:
  - las tablas de piedra
  - las tablas del pacto
  lexicon: HALOT
  rationale: לֻחוֹת se refiere a las tablas del pacto; en español bíblico «tablas» comunica la forma tradicional del objeto. No se añadió «de piedra» porque el contexto inmediato ya identifica las tablas sin expandir el hebreo de esta cláusula.
- source_word: בָּאָרוֹן
  english_pob_choice: in the ark
  chosen_spanish: en el arca
  alternatives_spanish:
  - dentro del arca
  - en el cofre
  lexicon: HALOT
  rationale: אָרוֹן aquí es el arca del pacto. «Arca» conserva el término establecido en español bíblico; «cofre» sería más genérico y perdería la resonancia cultual del contexto.
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: that I had made
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que hice
  - que yo había hecho
  lexicon: HALOT
  rationale: La relativa describe el arca; el pluscuamperfecto español «había hecho» refleja correctamente la anterioridad respecto de poner las tablas dentro, sin forzar una reinterpretación del perfecto hebreo.
- source_word: וַיִּהְיוּ שָׁם
  english_pob_choice: and they are there
  chosen_spanish: y allí están
  alternatives_spanish:
  - y estaban allí
  - y permanecen allí
  lexicon: HALOT
  rationale: היה con שם puede expresar permanencia desde el punto de vista del hablante. «Allí están» conserva el valor de presencia continua y reproduce bien la ambigüedad entre estado presente y permanencia hasta el momento del discurso.
- source_word: כַּאֲשֶׁר צִוַּנִי יְהוָה
  english_pob_choice: just as Yahweh commanded me
  chosen_spanish: tal como Yahvé me mandó
  alternatives_spanish:
  - como Yahvé me mandó
  - tal como Yahvé me ordenó
  lexicon: HALOT
  rationale: 'כַּאֲשֶׁר marca correspondencia exacta: «tal como». צוה se puede rendir con «mandó» u «ordenó»; «mandó» es idiomático y fiel. יְהוָה se traduce «Yahvé» conforme al estándar del proyecto.'
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama, por lo que la forma española del nombre divino debe ser una transliteración reverente. «Yahvé» sigue la convención establecida del proyecto para el nombre revelado a Israel, sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish project default → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el recorrido auditado de la POB en inglés. Se preservó la ambigüedad de וַיִּהְיוּ שָׁם mediante una nota, y se mantuvo la secuencia narrativa con equivalentes españoles naturales sin introducir contenido no sustentado por el fuente.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al estándar español del proyecto.
  - Se eligió «arca» para אָרוֹן por consistencia con el léxico bíblico en español.
  - Se mantuvo «tablas» para לֻחוֹת sin añadir «de piedra», ya que el contexto inmediato basta.
  - La nota al pie se ancló solo en la frase «allí están», donde recae la ambigüedad del hebreo.
