translation:
  language: es
  text: Porque tu morada es el cielo de los cielos[a], inaccesible para los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cielo de los cielos» o «el más alto cielo». El griego conserva una expresión semítica para el cielo más elevado, la morada trascendente de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοικητήριόν
  english_pob_choice: dwelling place
  chosen_spanish: morada
  alternatives_spanish:
  - habitación
  - lugar de morada
  - vivienda
  lexicon: LSJ
  rationale: El sustantivo designa el lugar donde alguien habita. «Morada» suena natural y digno en español bíblico, y conserva el sentido concreto de lugar de residencia sin volverse abstracto.
- source_word: οὐρανὸς τοῦ οὐρανοῦ
  english_pob_choice: the heaven of heaven
  chosen_spanish: el cielo de los cielos
  alternatives_spanish:
  - el cielo del cielo
  - el cielo de los cielos
  - el más alto cielo
  lexicon: LSJ
  rationale: La expresión reproduce un superlativo semítico. «El cielo de los cielos» mantiene el giro idiomático y su resonancia bíblica; «el más alto cielo» explicaría el sentido, pero suavizaría la forma del original.
- source_word: ἀνέφικτος
  english_pob_choice: inaccessible
  chosen_spanish: inaccesible
  alternatives_spanish:
  - inalcanzable
  - inaccesible para
  - fuera del alcance
  lexicon: LSJ
  rationale: El adjetivo significa que no se puede alcanzar o acceder. «Inaccesible» es preciso, formal y fiel al matiz de imposibilidad de acceso que refleja el texto griego.
- source_word: ἀνθρώποις
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los seres humanos
  - las personas
  - la humanidad
  lexicon: LSJ
  rationale: El plural masculino griego funciona con valor genérico. «Los hombres» conserva la forma de fuente y el registro elevado; en español puede leerse de modo representativo, sin excluir el sentido general de humanidad.
theological_decisions:
- issue: Superlativo semítico en οὐρανὸς τοῦ οὐρανοῦ
  english_pob_reading: the heaven of heaven / highest heaven
  chosen_spanish_reading: el cielo de los cielos
  alternative_spanish_readings:
  - el cielo del cielo
  - el más alto cielo
  rationale: Se preserva la imagen de un ámbito celestial supremo, asociado con la morada trascendente de Dios, sin convertir el giro en una explicación interpretativa excesiva.
  doctrine_reference: DOCTRINE.md §§1, 3, 6
- issue: Fuerza genérica de ἀνθρώποις
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - los seres humanos
  rationale: El griego usa masculino plural con valor representativo. Se mantiene una forma cercana a la fuente y coherente con el registro bíblico, reconociendo su referencia general a la humanidad.
  doctrine_reference: DOCTRINE.md §4
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego directamente y toma como guía el audit trail inglés: se conserva la expresión semítica superlativa con una nota alternativa, y se traduce ἀνέφικτος con un término formal equivalente a la revisión inglesa final (''inaccessible'').'
  spanish_consistency_notes:
  - Se usó «morada» para κατοικητήριόν por su naturalidad y su tono bíblico, evitando un calco rígido de «habitación».
  - Se prefirió «cielo de los cielos» porque el español lo admite con claridad y conserva el paralelismo de la construcción griega.
  - «Inaccesible» mantiene la precisión semántica del adjetivo sin añadir matices no presentes en el original.
  - «Los hombres» conserva el valor genérico del plural masculino griego y el registro solemne del pasaje.
