translation:
  language: es
  text: Todas las naciones son como nada delante de él[a]; son consideradas por él como menos que nada y vacío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «son contadas por él como menos que nada y caos/vacío». El hebreo תֹהוּ también puede llevar el sentido de «desolación» o «caos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todo el conjunto de
  - Cada una de
  lexicon: HALOT
  rationale: El cuantificador introduce la totalidad colectiva; en español, "Todas" conserva esa amplitud y suena natural con "las naciones".
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las naciones gentiles
  lexicon: HALOT
  rationale: El hebreo designa a los pueblos/naciones en conjunto. "Las naciones" mantiene el valor amplio sin añadir una etiqueta étnica más específica que la del texto.
- source_word: כְּאַיִן
  english_pob_choice: as nothing
  chosen_spanish: como nada
  alternatives_spanish:
  - como no ser
  - como inexistencia
  lexicon: HALOT
  rationale: 'La partícula comparativa pide una equivalencia similiar: "como nada" es la forma más natural en español y conserva la fuerza de nulidad del hebreo.'
- source_word: נֶגְדּוֹ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - en comparación con él
  lexicon: HALOT
  rationale: נגד con sufijo puede expresar estar delante o en relación con alguien. "Delante de él" preserva la imagen espacial y el valor evaluativo en el contexto de la comparación divina.
- source_word: מֵאֶפֶס
  english_pob_choice: less than nothing
  chosen_spanish: menos que nada
  alternatives_spanish:
  - menos que cero
  - por debajo de nada
  lexicon: HALOT
  rationale: El hebreo intensifica la nulidad; "menos que nada" reproduce esa escalada retórica en un español claro y fiel, sin volverla explicativa en exceso.
- source_word: וָתֹהוּ
  english_pob_choice: and emptiness
  chosen_spanish: y vacuidad
  alternatives_spanish:
  - y vacío
  - y caos
  lexicon: HALOT
  rationale: תֹהוּ puede significar vaciedad, desolación o caos. Aquí el paralelismo con אפס favorece la idea de pura insustancialidad; "vacuidad" comunica bien ese sentido en español.
- source_word: נֶחְשְׁבוּ
  english_pob_choice: are regarded
  chosen_spanish: él las considera
  alternatives_spanish:
  - son consideradas
  - él las cuenta
  lexicon: HALOT
  rationale: El nifal de חשב expresa ser tenido/considerado. En español, la forma activa con sujeto implícito en Dios transmite con naturalidad la perspectiva evaluativa del texto.
- source_word: לוֹ
  english_pob_choice: by him
  chosen_spanish: de él
  alternatives_spanish:
  - a su juicio
  - en su estimación
  lexicon: HALOT
  rationale: La preposición con sufijo marca el referente desde cuyo punto de vista ocurre la valoración. En una construcción española más idiomática, se integra en "delante de él" y en el sujeto expreso de la segunda cláusula.
theological_decisions:
- issue: Intensificación de la nulidad en la segunda cola
  english_pob_reading: 'Render the paired expressions מֵאֶפֶס וָתֹהוּ as an intensified statement: ''less than nothing and emptiness.'''
  chosen_spanish_reading: 'Renderizar la pareja como una declaración intensificada: "menos que nada y vacuidad".'
  alternative_spanish_readings:
  - '"menos que nada y vacío"'
  - '"menos que nada y caos"'
  - '"menos que nada y vanidad"'
  rationale: El hebreo acumula términos de nulidad para magnificar la incomparable grandeza de Dios frente a las naciones. "Vacuidad" conserva ese efecto sin imponer una lectura cosmológica más amplia de la que el versículo exige.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene sin cambios en la última revisión; el español aquí sigue esa misma lectura de alta concordancia, conservando la intensificación retórica y la equivalencia funcional de los términos de nulidad.
  spanish_consistency_notes:
  - Se mantiene «naciones» para גּוֹיִם como en la POB inglesa.
  - Se evita «SEÑOR» para no ocultar la referencia divina implícita; el pronombre «él» conserva la comparación con Dios en contexto.
  - «Como nada» / «menos que nada» reproduce la escalada semántica del hebreo sin suavizarla.
