    reason: cultural_note
  - marker: c
    text: O «su término estaba en En-rogel»; el hebreo usa literalmente una forma plural («sus salidas» o «sus puntos de salida») para la terminación del límite.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [a] para que refleje la alternativa real documentada en la auditoría inglesa sobre Gilgal, no una lectura errónea del Valle de Acor. Se ajustan topónimos a formas más fieles y reconocibles ('Acor', 'Adummim'), se conserva 'wadi' con nota cultural, y se mejora la frase final para mantener el plural hebreo de תֹצְאֹתָיו con mejor español.
