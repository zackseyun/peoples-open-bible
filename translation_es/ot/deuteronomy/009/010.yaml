translation:
  language: es
  text: Yahvé me dio las dos tablas de piedra, escritas con el dedo de Dios[a], y sobre ellas estaban todas las palabras que Yahvé les había hablado a ustedes[b] en el monte, de en medio del fuego, el día de la asamblea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por el dedo de Dios'.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'había hablado con ustedes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Uso establecido del nombre divino en el proyecto
  rationale: Se conserva el nombre propio del pacto y la decisión terminológica del proyecto para el Tetragrámaton, evitando la sustitución por un título enmascarador.
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - dio a
  - entregó a
  lexicon: HALOT
  rationale: El verbo נתן aquí es un dar directo y natural; 'dio' comunica con claridad la acción sin añadir matices no presentes en el hebreo.
- source_word: שְׁנֵי לוּחֹת הָאֲבָנִים
  english_pob_choice: the two stone tablets
  chosen_spanish: las dos tablas de piedra
  alternatives_spanish:
  - las dos tablas de piedra
  - las dos tablas de las piedras
  - las dos losas de piedra
  lexicon: HALOT
  rationale: '''Tablas de piedra'' reproduce bien el sustantivo לוחות con el genitivo material; ''tablas'' suena más natural en español que ''tabletas'' en este contexto bíblico.'
- source_word: כְּתֻבִים
  english_pob_choice: written
  chosen_spanish: escritas
  alternatives_spanish:
  - inscritas
  - escritas
  lexicon: HALOT
  rationale: El participio pasivo concuerda con 'tablas' en femenino plural; 'escritas' mantiene la relación textual sin forzar un término más técnico que el hebreo no exige.
- source_word: בְּאֶצְבַּע אֱלֹהִים
  english_pob_choice: with the finger of God
  chosen_spanish: con el dedo de Dios
  alternatives_spanish:
  - por el dedo de Dios
  - con el dedo de Dios
  lexicon: HALOT
  rationale: Se preserva la imagen antropomórfica y su fuerza concreta. 'Con' refleja bien el valor instrumental del hebreo y coincide con la lectura auditada en inglés.
- source_word: וַעֲלֵיהֶם
  english_pob_choice: and on them were
  chosen_spanish: y sobre ellas estaban
  alternatives_spanish:
  - y sobre ellas había
  - y en ellas estaban
  lexicon: HALOT
  rationale: El hebreo enlaza la ubicación del contenido sobre las tablas; en español, 'sobre ellas estaban' expresa de forma natural que el contenido estaba grabado o puesto en ellas.
- source_word: כְּכָל הַדְּבָרִים
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todas las cosas
  - todo lo que
  lexicon: HALOT
  rationale: '''Palabras'' respeta el sustantivo דְּבָרִים como contenido verbal específico, mejor que una generalización a ''cosas''.'
- source_word: אֲשֶׁר דִּבֶּר יְהוָה עִמָּכֶם
  english_pob_choice: that Yahweh had spoken to you
  chosen_spanish: que Yahvé había hablado con ustedes
  alternatives_spanish:
  - que Yahvé les había hablado
  - que Yahvé había hablado a ustedes
  lexicon: HALOT
  rationale: Se mantiene el valor relacional de עִם con 'con', tal como el audit trail en inglés preserva el matiz dialogal, aunque el español más corriente tendería a 'a' o 'les'.
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - en la montaña
  - sobre el monte
  lexicon: HALOT
  rationale: '''Monte'' es el término bíblico más natural en español para este contexto de revelación; evita una resonancia geográfica moderna de ''montaña''.'
- source_word: מִתּוֹךְ הָאֵשׁ
  english_pob_choice: from the midst of the fire
  chosen_spanish: de en medio del fuego
  alternatives_spanish:
  - desde en medio del fuego
  - desde el medio del fuego
  - de entre el fuego
  lexicon: HALOT
  rationale: '''De en medio del fuego'' conserva la imagen solemne y el centro locativo del hebreo sin perder claridad en español.'
- source_word: בְּיוֹם הַקָּהָל
  english_pob_choice: on the day of the assembly
  chosen_spanish: el día de la asamblea
  alternatives_spanish:
  - el día de la congregación
  - el día de la reunión
  lexicon: HALOT
  rationale: '''Asamblea'' traduce bien קהל con su sentido formal y colectivo. Se omite la preposición inicial porque en español la construcción temporal se expresa naturalmente como ''el día de...''.'
theological_decisions:
- issue: Nombre divino YHWH en texto bíblico
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en lugar de sustituirlo por un título. Esto sigue la política del proyecto y preserva la referencia pactual explícita del hebreo.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: Imagen antropomórfica del dedo de Dios
  english_pob_reading: with the finger of God
  chosen_spanish_reading: con el dedo de Dios
  alternative_spanish_readings:
  - por el dedo de Dios
  - por la acción de Dios
  rationale: La expresión se mantiene literal para no diluir la figura antropomórfica ni resolverla interpretativamente. El texto presenta una acción divina concreta y sorprendente que conviene conservar.
  doctrine_reference: Translation philosophy §§1, 3
- issue: עִמָּכֶם como relación comunicativa
  english_pob_reading: spoken to you
  chosen_spanish_reading: había hablado con ustedes
  alternative_spanish_readings:
  - había hablado a ustedes
  - les había hablado
  rationale: Aunque el español corriente suele preferir 'a', aquí se conserva 'con' para no borrar el matiz dialogal del hebreo y la decisión auditada en el texto inglés, incluso si resulta menos habitual.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción sigue el pasaje base hebreo y el audit trail inglés revisado, en particular la preferencia final por 'spoken to you'. Se ha mantenido la imagen concreta de 'finger of God' y el nombre divino como Yahvé, ajustando el español para naturalidad sin perder tensión léxica.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה.
  - Se prefirió 'tablas de piedra' por naturalidad bíblica en español; la nota conserva la alternativa más literal.
  - Se mantuvo 'con ustedes' para reflejar עִמָּכֶם y la lectura auditada en inglés, evitando suavizarla a 'a ustedes' en el cuerpo principal.
  - '''Monte'' se eligió por registro bíblico y coherencia con el contexto del Sinaí/Horeb.'
  - Se conservaron las dos notas alternativas donde el español admite una variante legítima sin cambiar el sentido.
