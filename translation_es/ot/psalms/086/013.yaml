  text: כִּֽי חַ֭סְדְּ/ךָ גָּד֣וֹל עָלָ֑/י וְ/הִצַּ֥לְתָּ נַ֝פְשִׁ֗/י מִ/שְּׁא֥וֹל תַּחְתִּיָּֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/086/013.yaml
  text: For your steadfast love toward me is great[a], and you have delivered my soul from the lowest Sheol.
  footnotes:
