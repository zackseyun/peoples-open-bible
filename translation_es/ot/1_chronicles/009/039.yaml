translation:
  language: es
  text: Ner engendró a Quis, y Quis engendró a Saúl, y Saúl engendró a Jonatán, a Malqui-súa, a Abinadab y a Eshbaal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Eshbaal es llamado Is-bóset en 2 Samuel 2:8 y pasajes relacionados.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En una genealogía, el hifil de ילד expresa paternidad generativa. En español, 'engendró' conserva esa fuerza y suena natural en el registro genealógico, sin el tono marcadamente moderno de 'fue padre de' ni el matiz más interpretativo de otras opciones.
- source_word: נֵר
  english_pob_choice: Ner
  chosen_spanish: Ner
  alternatives_spanish:
  - Néir
  lexicon: propio
  rationale: Nombre propio; se translitera de manera estándar al español como 'Ner'.
- source_word: קִישׁ
  english_pob_choice: Kish
  chosen_spanish: Quis
  alternatives_spanish:
  - Kish
  lexicon: propio
  rationale: Se mantiene el nombre propio con una transliteración española tradicional y legible. 'Quis' refleja mejor la pronunciación adaptada al español que la grafía inglesa.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: propio
  rationale: Nombre propio bíblico con forma española establecida y acento gráfico por normas del español.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jehonatán
  lexicon: propio
  rationale: Se usa la forma española habitual y reconocible del nombre, con acento gráfico conforme al español.
- source_word: מַלְכִּי שׁוּעַ
  english_pob_choice: Malchi-shua
  chosen_spanish: Malqui-súa
  alternatives_spanish:
  - Malqui-shúa
  - Malki-súa
  lexicon: propio
  rationale: El hebreo presenta dos elementos que funcionan como un solo nombre. Se conserva la segmentación con guion para reflejar el compuesto, y se adapta la vocalización a una forma española clara y pronunciable.
- source_word: אֲבִינָדָב
  english_pob_choice: Abinadab
  chosen_spanish: Abinadab
  alternatives_spanish:
  - Abinadab
  lexicon: propio
  rationale: Nombre propio; la forma española coincide con la forma internacional más extendida.
- source_word: אֶשְׁבָּעַל
  english_pob_choice: Eshbaal
  chosen_spanish: Eshbaal
  alternatives_spanish:
  - Is-boset
  - Ish-boset
  lexicon: propio
  rationale: La lectura hebrea de Crónicas tiene אֶשְׁבָּעַל; por fidelidad al texto fuente se conserva esa forma, en lugar de armonizarla con la variante de Samuel.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: conjunción
  rationale: La coordinación simple reproduce la secuencia genealógica. Se usa 'y' como forma normal; 'e' no es necesaria aquí por fonética.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce aparte]'
  alternatives_spanish:
  - marcador de objeto directo sin equivalente español
  lexicon: HALOT
  rationale: El marcador de objeto directo no tiene equivalente léxico en español. Su función queda reflejada en la sintaxis de la oración.
theological_decisions:
- issue: Nombre variante de Eshbaal frente a Ish-bosheth / Is-boset
  english_pob_reading: The Chronicler's Hebrew text reads Eshbaal, with a footnote noting the Samuel parallel Ish-bosheth.
  chosen_spanish_reading: Se conserva Eshbaal en el texto principal y se anota la variante conocida en Samuel.
  alternative_spanish_readings:
  - Is-boset
  - Ish-boset
  rationale: No se debe armonizar Crónicas con Samuel cuando el hebreo masorético de Crónicas lee otro nombre. La nota preserva la tensión textual y ayuda al lector a reconocer la identidad del personaje sin borrar la forma del texto base.
  doctrine_reference: Fidelidad textual y crítica comparada del texto bíblico
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo de 1 Crónicas 9:39 y conserva la decisión auditada del POB inglés de no armonizar אֶשְׁבָּעַל con la variante de Samuel. Se ajustaron los nombres a formas españolas publicables y se mantuvo la estructura genealógica simple.
  spanish_consistency_notes:
  - Se usó 'engendró' de manera consistente para el hebreo הוֹלִיד en toda la cadena genealógica.
  - Los nombres propios se conservaron sin traducción semántica; solo se adaptó su forma al uso español cuando corresponde.
  - La nota al pie marca la única variante textual relevante en esta unidad y corresponde al nombre final del versículo.
