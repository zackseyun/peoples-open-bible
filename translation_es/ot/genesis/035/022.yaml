base_translation:
  language: en
  yaml_path: translation/ot/genesis/035/022.yaml
  text: And it happened[a], while Israel was dwelling in that land, that Reuben went and lay with Bilhah, his father's concubine, and Israel heard of it[b]. Now the sons of Jacob were twelve.
  footnotes:
  - marker: a
    text: 'Hebrew: ''and Israel heard.'' The object is unstated but clearly refers to Reuben''s act; English commonly supplies ''of it'' for clarity.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'And the sons of Jacob were twelve.' The clause likely serves as a transition to the list of sons in the following verses.
    reason: alternative_reading
