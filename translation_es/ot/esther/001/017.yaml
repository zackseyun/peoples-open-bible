translation:
  language: es
  text: 'Porque el asunto de la reina[a] llegará a todas las mujeres, haciendo que desprecien a sus maridos a sus ojos, al decir: «El rey Asuero mandó que la reina Vasti fuera traída ante él[b], pero ella no vino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la conducta de la reina», «el informe de la reina» o «la palabra de la reina». El hebreo דָּבָר puede significar «palabra», «asunto», «hecho» o «informe».
    reason: lexical_alternative
  - marker: b
    text: O «mandó traer a la reina Vasti ante él». El hebreo dice más literalmente «dijo traer» o «dijo que la trajeran».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵצֵא דְבַר הַמַּלְכָּה
  english_pob_choice: the queen’s conduct will go out
  chosen_spanish: se divulgue la palabra de la reina
  alternatives_spanish:
  - se extienda el asunto de la reina
  - se difunda el informe de la reina
  lexicon: HALOT
  rationale: דָּבָר admite ‘palabra’, ‘asunto’, ‘hecho’ o ‘informe’. En español, ‘palabra’ conserva bien esa amplitud sin fijar indebidamente si se trata del hecho, la noticia o el dicho. ‘Se divulgue’ refleja el sentido de difusión pública de יֵצֵא.
- source_word: עַל כָּל הַנָּשִׁים
  english_pob_choice: to all women
  chosen_spanish: entre todas las mujeres
  alternatives_spanish:
  - a todas las mujeres
  - sobre todas las mujeres
  lexicon: HALOT
  rationale: עַל con verbos de difusión puede indicar alcance sobre un grupo. ‘Entre todas las mujeres’ comunica con naturalidad el ámbito de propagación en español sin perder el valor distributivo.
- source_word: לְהַבְזוֹת
  english_pob_choice: causing them to despise
  chosen_spanish: ellas despreciarán
  alternatives_spanish:
  - harán que sus maridos sean despreciados
  - las llevarán a despreciar
  lexicon: HALOT
  rationale: 'El infinitivo expresa efecto o resultado. En español, el resultado se comunica con mayor naturalidad en forma verbal: ‘despreciarán’. Se mantiene el valor de ביזה como ‘despreciar’.'
- source_word: בַּעְלֵיהֶן
  english_pob_choice: their husbands
  chosen_spanish: a sus maridos
  alternatives_spanish:
  - a sus esposos
  lexicon: HALOT
  rationale: En este contexto relacional, בַּעַל significa claramente ‘marido’. ‘Maridos’ conserva el paralelismo social del pasaje y evita una lectura más amplia como ‘señores’ o ‘dueños’.
- source_word: בְּעֵינֵיהֶן
  english_pob_choice: in their eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - a su parecer
  - en su estimación
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y evalúa la percepción. ‘Ante sus ojos’ conserva la imagen y es natural en español bíblico contemporáneo.
- source_word: בְּאָמְרָם
  english_pob_choice: when they say
  chosen_spanish: al decir
  alternatives_spanish:
  - cuando digan
  - diciendo
  lexicon: HALOT
  rationale: La forma con ב introduce la circunstancia en que ocurre el efecto. ‘Al decir’ mantiene la relación temporal/ocasional de manera fluida y compacta.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: King Ahasuerus
  chosen_spanish: El rey Asuero
  alternatives_spanish:
  - El rey Ahasuero
  - El rey Jerjes
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional del nombre propio en una forma comprensible en español. ‘El rey Asuero’ sigue la secuencia hebrea título + nombre.
- source_word: אָמַר לְהָבִיא
  english_pob_choice: commanded that ... be brought
  chosen_spanish: mandó traer
  alternatives_spanish:
  - ordenó que trajeran
  - dijo que trajeran
  lexicon: HALOT
  rationale: Aunque el hebreo usa literalmente ‘dijo que trajeran’, el contexto cortesano exige el valor de mandato. ‘Mandó traer’ conserva esa fuerza sin abandonar la base verbal del original.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: HALOT
  rationale: ‘Delante de él’ es una solución natural y fiel a לְפָנָיו, conservando la escena de comparecencia ante el rey.
- source_word: וְלֹא בָאָה
  english_pob_choice: but she did not come
  chosen_spanish: y ella no vino
  alternatives_spanish:
  - pero no vino
  - y no vino
  lexicon: HALOT
  rationale: El hebreo usa una simple coordinación; el contexto aporta contraste. ‘Y ella no vino’ mantiene la sobriedad del original, sin añadir más contraste del que el hebreo explícitamente marca.
theological_decisions:
- issue: Valor del término דָּבָר aplicado a la reina
  english_pob_reading: the queen’s conduct will go out / the queen’s report will spread / the queen’s word will go out
  chosen_spanish_reading: la palabra de la reina se divulgue
  alternative_spanish_readings:
  - el asunto de la reina se extienda
  - el informe de la reina se difunda
  rationale: El hebreo deja abierta la referencia entre ‘palabra’, ‘asunto’ e ‘informe’. En español, ‘palabra’ preserva esa tensión semántica sin decidir demasiado pronto si se enfatiza la conducta, la noticia o el dicho.
  doctrine_reference: Principio de respeto al rango semántico del texto fuente; no se fuerza una interpretación más precisa que la que el hebreo ofrece.
- issue: Fuerza de אָמַר לְהָבִיא en contexto real
  english_pob_reading: said to bring / commanded that ... be brought
  chosen_spanish_reading: mandó traer
  alternative_spanish_readings:
  - dijo que trajeran
  - ordenó que la trajeran
  rationale: Aunque el hebreo literal usa ‘dijo’, el contexto del rey da el valor de mandato. ‘Mandó traer’ refleja la fuerza pragmática sin perder la ligazón con la construcción verbal original.
  doctrine_reference: Pragmática bíblica y equivalencia funcional controlada por el contexto.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que prefirió ‘conduct’ frente a ‘matter’ y ‘commanded that ... be brought’ frente a ‘said to bring’. En español, se optó por una solución que conserva la amplitud de דָּבָר sin perder la dimensión de ejemplo público, y por una expresión de mandato que refleja la fuerza contextual del verbo hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Asuero’ se conserva como transliteración estándar en español.
  - ‘Maridos’ traduce בַּעְלֵיהֶן en su sentido matrimonial, no como ‘dueños’.
  - ‘Delante de él’ respeta el valor espacial/cortesano de לְפָנָיו.
  - La puntuación busca reflejar el flujo narrativo del hebreo con una sola cláusula principal y una cita indirecta final.
