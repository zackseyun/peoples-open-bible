translation:
  language: es
  text: 'Entonces Josué dijo a los sacerdotes: «Tomen el arca del pacto[a] y pasen delante del pueblo». Y ellos tomaron el arca del pacto y fueron delante del pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pacto» traduce el hebreo בְּרִית; puede entenderse también como «alianza». Se mantiene «pacto» por su transparencia y por la terminología bíblica estable del pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo pide una transición temporal natural en español. «Entonces» conserva la secuencia sin sonar forzado, de modo parecido al «Then» del POB inglés.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jehosué
  lexicon: Nombre propio bíblico estándar
  rationale: 'El nombre propio se translitera al español en su forma habitual y reconocible: «Josué».'
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes cultuales
  lexicon: HALOT
  rationale: El término hebreo designa a los officiantes sacerdotales de Israel; «sacerdotes» es la equivalencia natural y precisa en español.
- source_word: שְׂאוּ
  english_pob_choice: Take up
  chosen_spanish: Tomen
  alternatives_spanish:
  - Levanten
  - Lleven
  lexicon: HALOT
  rationale: En este contexto, נָשָׂא indica tomar en las manos y cargar un objeto sagrado. «Tomen» permite expresar la acción inmediata de asumir el arca sin perder el sentido de portar.
- source_word: אֲרוֹן הַבְּרִית
  english_pob_choice: the ark of the covenant
  chosen_spanish: el arca del pacto
  alternatives_spanish:
  - el arca de la alianza
  - el arca del convenio
  lexicon: HALOT
  rationale: «Arca del pacto» reproduce de manera transparente la construcción hebrea y coincide con el lenguaje bíblico de pacto. Se evita reemplazarlo por un término eclesiástico ajeno al audit trail.
- source_word: וְעִבְרוּ
  english_pob_choice: cross over
  chosen_spanish: pasen
  alternatives_spanish:
  - crucen
  - pasen al otro lado
  lexicon: HALOT
  rationale: En español, «pasar» puede comunicar el cruce físico sin sonar excesivamente técnico. El contexto del Jordán ya implica el atravesar; por eso «pasen» conserva naturalidad y fidelidad.
- source_word: לִפְנֵי הָעָם
  english_pob_choice: before the people
  chosen_spanish: delante del pueblo
  alternatives_spanish:
  - ante el pueblo
  - en frente del pueblo
  lexicon: HALOT
  rationale: La preposición hebrea indica posición frontal. «Delante del pueblo» es idiomático y claro en español, manteniendo la relación espacial sin carga interpretativa adicional.
- source_word: וַיִּשְׂאוּ
  english_pob_choice: they took up
  chosen_spanish: tomaron
  alternatives_spanish:
  - levantaron
  - llevaron
  lexicon: HALOT
  rationale: Se conserva la misma idea verbal que en el mandato. «Tomaron» refleja la obediencia al tomar el arca para portarla, sin forzar una duplicación mecánica de «llevar».
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - caminaron
  - se fueron
  lexicon: HALOT
  rationale: «Fueron» es el equivalente narrativo simple de הלך y suena natural en español, evitando una especificación innecesaria de modo.
theological_decisions:
- issue: Terminología del objeto sagrado central
  english_pob_reading: the ark of the covenant
  chosen_spanish_reading: el arca del pacto
  alternative_spanish_readings:
  - el arca de la alianza
  - el arca del convenio
  rationale: La elección mantiene el referente cultual y pactal sin domesticarlo a una frase más eclesiástica. «Pacto» conserva la fuerza bíblica del término y evita confundir el objeto con otras nociones de alianza no documentadas aquí.
  doctrine_reference: Éxodo 25:10-22; Josué 3:3-6
- issue: Dirección procesional delante del pueblo
  english_pob_reading: before the people
  chosen_spanish_reading: delante del pueblo
  alternative_spanish_readings:
  - ante el pueblo
  - a la cabeza del pueblo
  rationale: El texto describe posición espacial, no autoridad explícita. «Delante» preserva esa relación sin añadir jerarquía o interpretación litúrgica.
  doctrine_reference: Josué 3:6; Números 10:33-36
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios relevantes: el inglés opta por «Then ... said», «take up», «ark of the covenant», «cross over», «before the people», y mantiene consistencia verbal entre mandato y cumplimiento. El español reproduce esas decisiones con naturalidad idiomática y sin borrar la tensión lexical entre tomar, portar y cruzar.'
  spanish_consistency_notes:
  - Se mantiene «Josué» para el nombre propio, conforme al uso bíblico en español.
  - Se usa «pacto» de manera consistente para בְּרִית dentro de esta unidad.
  - La repetición verbal entre mandato y cumplimiento se conserva parcialmente con «Tomen» / «tomaron», sin introducir un verbo distinto que atenúe la correspondencia.
  - «Delante del pueblo» traduce de forma estable לִפְנֵי הָעָם en ambas cláusulas.
