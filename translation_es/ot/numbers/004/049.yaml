revisions:
- from: A la orden de Yahvé fueron designados por mano de Moisés[a], cada hombre para su servicio y para su carga; así fueron alistados[c][b], como Yahvé había mandado a Moisés.
  to: Por mandato de Yahvé fueron designados por mano de Moisés[a], cada hombre para su servicio y para su carga; así fueron registrados[c][b], como Yahvé había mandado a Moisés.
  rationale: Se sustituyó «A la orden de Yahvé» por «Por mandato de Yahvé» para reflejar con mayor precisión el sentido de עַל־פִּי יְהוָה en español natural. Se cambió «alistados» por «registrados» para evitar un matiz excesivamente militar y ajustarse mejor al campo semántico de פקד en Números 4. También se reordenaron y precisaron las notas para que los marcadores correspondan exactamente al texto revisado y para aclarar mejor las alternativas léxicas preservadas por el expediente inglés.
