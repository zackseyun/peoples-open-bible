revisions:
- from: Y yo pagaré a Babilonia y a todos los habitantes de Caldea por toda su maldad[a] que hicieron en Sion delante de sus ojos, dice Yahvé.
  to: Y les pagaré a Babilonia y a todos los habitantes de Caldea por toda su maldad[a] que hicieron en Sion ante sus ojos, declara Yahvé.
  rationale: Se cambió «yo pagaré a Babilonia» por «les pagaré a Babilonia» para expresar con claridad la retribución judicial de שִׁלַּמְתִּי y evitar la lectura de pago benefactivo. Se ajustó «delante de sus ojos» a «ante sus ojos» para mantener la referencia directa al auditorio de 2ª persona plural sin ambigüedad. Se prefirió «declara Yahvé» por mayor correspondencia con נְאֻם יְהוָה y con la práctica del POB. La nota léxica se conserva, con anclaje correcto en el texto.
