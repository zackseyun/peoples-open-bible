revisions:
- from: Se ha acordado de su amor leal[a] y de su fidelidad para la casa de Israel; todos los confines de la tierra han visto la salvación de nuestro Dios.
  to: Se ha acordado de su amor leal y de su fidelidad a la casa de Israel; todos los confines de la tierra han visto la salvación[a] de nuestro Dios.
  rationale: Se ajusta «para» a «a» para reflejar mejor לְבֵית y el rastro auditado en inglés. Se traslada al español la nota léxica documentada para יְשׁוּעַת, preservando la amplitud semántica entre «salvación» y «liberación» con posible matiz victorioso. Se elimina la nota sobre «amor leal» para no desplazar la alternativa que el POB inglés sí consideró importante preservar en este versículo.
