id: REV.5.1
reference: 'Revelation 5:1'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ εἶδον ἐπὶ τὴν δεξιὰν τοῦ καθημένου ἐπὶ τοῦ θρόνου βιβλίον γεγραμμένον ἔσωθεν καὶ ⸀ὄπισθεν, κατεσφραγισμένον σφραγῖσιν ἑπτά.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/005/001.yaml
  text: 'And I saw in the right hand of the one seated on the throne a scroll written within and on the back[b][a], sealed with seven seals.'
  footnotes:
  - marker: a
    text: Or 'a book.' The Greek word βιβλίον in this context likely refers to a scroll rather than a codex-style book.
    reason: lexical_alternative
  - marker: b
    text: Literally 'written within and on the back.' Some translations render the second phrase more generally as 'on the outside.'
    reason: lexical_alternative
translation:
  language: ko
  text: '또 내가 보니, 보좌에 앉으신 분의 오른손에 두루마리[a]가 있는데, 안팎으로 기록되어[b] 일곱 인으로 봉인되어 있었습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「책」. 헬라어 βιβλίον은 이 문맥에서 코덱스가 아닌 두루마리를 가리킨다.'
    reason: lexical_alternative
  - marker: b
    text: '직역하면 「안과 뒷면에 기록되어」. 어떤 번역은 둘째 어구를 더 일반적으로 「바깥쪽에」로 옮긴다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βιβλίον (in sealed-scroll context)
  english_pob_choice: scroll
  chosen_korean: 두루마리
  alternatives_korean:
  - 책
  lexicon: BDAG
  rationale: '5-10장의 봉인된 βιβλίον은 두루마리 형태가 명백하므로 「두루마리」로 옮긴다. 1:11의 일반적 「책」과 구별한다.'
- source_word: σφραγῖσιν ἑπτά
  english_pob_choice: seven seals
  chosen_korean: 일곱 인
  alternatives_korean:
  - 일곱 봉인
  lexicon: BDAG
  rationale: '한국 교회 전통의 「인」을 유지하되, 「떼다」와 짝지어 일관되게 사용한다.'
