translation:
  language: es
  text: Y pondrá su mano sobre la cabeza de la ofrenda por el pecado[a] y la sacrificará como ofrenda por el pecado, en el lugar donde se sacrifica el holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación» para ambas ocurrencias de «ofrenda por el pecado»; el término hebreo puede designar la ofrenda que trata el pecado y la impureza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  english_pob_choice: and he shall lay
  chosen_spanish: y pondrá
  alternatives_spanish:
  - y apoyará
  - y impondrá
  lexicon: HALOT
  rationale: En contexto sacrificial, סמך describe el acto de colocar o presionar la mano sobre la víctima. «Pondrá» es natural en español y conserva la acción ritual sin cargarla con una interpretación adicional.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - sus manos
  lexicon: HALOT
  rationale: El hebreo está en singular con sufijo de tercera persona masculina singular; por eso se mantiene «su mano» y no se armoniza al plural.
- source_word: עַל רֹאשׁ
  english_pob_choice: on the head
  chosen_spanish: sobre la cabeza
  alternatives_spanish:
  - en la cabeza
  - encima de la cabeza
  lexicon: HALOT
  rationale: «Sobre la cabeza» reproduce con claridad la relación espacial de עַל רֹאשׁ y suena natural en español.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda de purificación
  - la ofrenda por el pecado
  lexicon: HALOT
  rationale: He optado por «ofrenda por el pecado» para conservar la referencia sacrificial habitual en castellano bíblico, pero evitando que «pecado» suene meramente abstracto. La alternativa «ofrenda de purificación» refleja una tensión léxica real del hebreo, ya que חטאת puede abarcar también la purificación ritual.
- source_word: וְשָׁחַט
  english_pob_choice: and slaughter
  chosen_spanish: y la degollará
  alternatives_spanish:
  - y la sacrificará
  - y la matará
  lexicon: HALOT
  rationale: שׁחט es el verbo técnico para el degüello sacrificial. «Degollar» preserva mejor su fuerza concreta y cultual que el más general «matar».
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la ofrenda
  - la víctima
  lexicon: HALOT
  rationale: El pronombre femenino singular se refiere a la ofrenda/víctima; en español, el clítico «la» evita redundancia y mantiene la referencia inmediata.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para purificación
  lexicon: HALOT
  rationale: El ל indica finalidad o designación. «Para ofrenda por el pecado» conserva el valor funcional del rito sin convertir la frase en una simple ecuación nominal.
- source_word: בִּמְקוֹם
  english_pob_choice: in the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en el sitio
  - en el lugar donde
  lexicon: HALOT
  rationale: «En el lugar» es una equivalencia directa y clara para la localización ritual establecida por el texto.
- source_word: אֲשֶׁר יִשְׁחַט
  english_pob_choice: where ... is slaughtered
  chosen_spanish: donde se degüella
  alternatives_spanish:
  - donde se sacrifica
  - donde degüellan
  lexicon: HALOT
  rationale: La construcción relativa se vierte en impersonal reflexivo para expresar una práctica normativa. «Se degüella» mantiene el sentido técnico y evita introducir un sujeto no expresado.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda ascendente
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» es la designación tradicional del עֹלָה. Aquí se conserva por su precisión cultual y porque el contexto ritual ya lo fija como término técnico.
theological_decisions:
- issue: Cómo renderizar חטאת en el lenguaje sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  rationale: La POB inglesa preserva «sin offering» y anota la alternativa «purification offering». En español, «ofrenda por el pecado» mantiene la lectura sacrificial reconocible, mientras la nota preserva la tensión semántica del hebreo entre pecado e impureza ritual.
  doctrine_reference: Translation philosophy §5; documentar variaciones léxicas significativas.
translation_notes:
  revision_awareness: No se requirieron revisiones respecto del último pase inglés; la correspondencia semántica y la solución terminológica se mantienen estables, con adaptación natural al español.
  spanish_consistency_notes:
  - 'Se mantiene el singular de la mano: «su mano».'
  - «Degollará» conserva el verbo técnico sacrificial para שׁחט.
  - «Holocausto» se usa como término cultual establecido para עֹלָה.
  - La nota lexical conserva la tensión entre «pecado» e «impureza ritual» sin resolverla artificialmente.
