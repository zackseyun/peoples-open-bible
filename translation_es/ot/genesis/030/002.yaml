  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: la ira de Jacob contra Raquel, la pregunta retórica sobre ocupar el lugar de Dios, y la atribución explícita a Dios de haber negado la fertilidad. Sin embargo, hay dos desajustes menores con el rastro de auditoría: la nota [b] está anclada a «Dios» pero su contenido explica «el fruto del vientre», y «ha retenido de ti» suena menos natural en español para מָנַע מִמֵּךְ que una formulación como «te ha negado».'
  spanish_quality_summary: El texto es claro y digno, pero requiere un pequeño ajuste de naturalidad y de anclaje de nota. «¿Acaso yo estoy en lugar de Dios?» es comprensible, aunque «¿Estoy yo en lugar de Dios?» suena más idiomático. «Que ha retenido de ti el fruto del vientre» es gramaticalmente posible, pero menos natural que «que te ha negado el fruto del vientre».
  glossary_alignment: 'La terminología está bien alineada: אֱלֹהִים se traduce correctamente como «Dios»; no hay términos del glosario mayor en conflicto. Se preserva adecuadamente «fruto del vientre» como idiomático bíblico, con nota aclaratoria. No hay problema teológico: se mantiene la agencia divina en la esterilidad según el hebreo y el POB inglés.'
  issues:
