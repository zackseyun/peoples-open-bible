base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/005/013.yaml
  text: So my anger will be spent[a], and I will cause my wrath to rest on them, and I will be comforted. Then they will know that I, Yahweh, have spoken in my jealousy[b], when I spend my wrath against them.
  footnotes:
  - marker: a
    text: Or 'I will be appeased' for 'I will be comforted'; the Hebrew verb can carry the sense of being consoled or finding relief after judgment is completed.
    reason: lexical_alternative
  - marker: b
    text: Or 'in my zeal' for 'in my jealousy.' The Hebrew term can denote either jealousy or zeal; here 'jealousy' preserves the covenantal relational force.
    reason: lexical_alternative
