translation:
  language: es
  text: La balanza y las pesas justas pertenecen a Yahvé; todas las pesas[a] de la bolsa son obra suya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «todas las piedras de la bolsa». En contexto, se refiere a pesas de piedra usadas para medir.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּלֶס
  english_pob_choice: balance
  chosen_spanish: balanza
  alternatives_spanish:
  - balance
  - instrumento de pesar
  lexicon: HALOT
  rationale: El término hebreo designa un instrumento de pesaje. En español, «balanza» es el equivalente natural y mantiene bien el paralelismo con «balanzas» en la segunda mitad del verso.
- source_word: וּמֹאזְנֵי
  english_pob_choice: and scales
  chosen_spanish: y unas balanzas
  alternatives_spanish:
  - y balances
  - y escalas
  lexicon: HALOT
  rationale: El plural constructo remite a balanzas o platillos de pesaje. «Balanzas» conserva la imagen comercial y la correspondencia poética con פֶּלֶס.
- source_word: מִשְׁפָּט
  english_pob_choice: just
  chosen_spanish: de justicia
  alternatives_spanish:
  - justas
  - de rectitud
  - de juicio
  lexicon: HALOT
  rationale: Aquí el sustantivo califica los instrumentos de pesar con la idea de conformidad con la justicia. En español, «de justicia» expresa bien ese valor normativo sin reducirlo a una mera cualidad mecánica.
- source_word: לַיהוָה
  english_pob_choice: belong to Yahweh
  chosen_spanish: pertenecen a Yahvé
  alternatives_spanish:
  - son de Yahvé
  - le pertenecen a Yahvé
  lexicon: HALOT
  rationale: La preposición ל indica pertenencia o relación de posesión. Se conserva el nombre divino «Yahvé» según la política del proyecto, en lugar de enmascararlo con «SEÑOR».
- source_word: מַעֲשֵׂהוּ
  english_pob_choice: are his work
  chosen_spanish: son obra suya
  alternatives_spanish:
  - son su obra
  - son su trabajo
  - son hechura suya
  lexicon: HALOT
  rationale: El sustantivo con sufijo puede expresar obra, hecho o producción. «Obra suya» es natural en español y conserva la amplitud del hebreo sin estrecharlo demasiado.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todos los
  lexicon: HALOT
  rationale: Cantidad universal directa; «todos» funciona de manera idiomática con el sustantivo plural «pesos».
- source_word: אַבְנֵי
  english_pob_choice: weights
  chosen_spanish: pesos
  alternatives_spanish:
  - piedras
  - pesas
  lexicon: HALOT
  rationale: Literalmente son «piedras», pero en contexto comercial se trata de pesas usadas para medir. «Pesos» comunica el referente funcional en español y evita una literalidad confusa.
- source_word: כִיס
  english_pob_choice: bag
  chosen_spanish: bolsa
  alternatives_spanish:
  - bolsita
  - saco
  - bolsa de tela
  lexicon: HALOT
  rationale: El contenedor de las pesas del comerciante se expresa de forma natural con «bolsa» en español. Es claro y suficientemente neutro para el contexto.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvéh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a los lineamientos del proyecto, se mantiene «Yahvé» como forma principal en español para conservar la referencia al nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido del proverbio sobre balanzas y pesas
  english_pob_reading: The verse affirms that honest standards of measurement are under the LORD's authority and ordering.
  chosen_spanish_reading: El versículo afirma que las medidas honestas y justas están bajo la autoridad y el orden de Yahvé.
  alternative_spanish_readings:
  - Dios creó físicamente las pesas.
  - Dios aprueba cualquier estándar comercial existente sin matiz moral.
  rationale: La presencia de מִשְׁפָּט junto a los instrumentos de pesaje apunta a un juicio moral sobre la equidad en el comercio. «Obra suya» se entiende como fundamento de ese orden justo, sin ampliar indebidamente el alcance del proverbio.
  doctrine_reference: Sabiduría bíblica sobre justicia en el comercio; cf. Levítico 19:35-36; Proverbios 11:1
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no requirió revisiones recientes: la lectura y la decisión léxica se mantuvieron estables. La versión española sigue la misma interpretación de fondo, conservando la imagen comercial y la afirmación teológica sobre Yahvé sin añadir contenido ajeno al verso.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יהוה.
  - Se usa «balanza/balanzas» para preservar el paralelismo y evitar calcos opacos.
  - «Pesos» interpreta funcionalmente אַבְנֵי en contexto comercial, mientras la nota conserva el sentido literal de «piedras».
  - «Obra suya» refleja la amplitud semántica de מַעֲשֵׂהוּ sin exagerar la afirmación del proverbio.
