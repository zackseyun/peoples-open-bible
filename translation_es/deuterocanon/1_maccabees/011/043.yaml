  rationale: Se ajusta una frase levemente forzada en español («junto conmigo») a una formulación más natural y ampliamente legible («a mi lado») sin alterar el sentido militar explícito ni la decisión léxica documentada. Se conserva la nota alternativa y el resto del versículo, que está bien alineado con el griego y con la auditoría inglesa.
