translation:
  language: es
  text: Quedan empapados por las lluvias de la montaña[a]; sin refugio[b], se abrazan a la roca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quedan mojados por el torrente de la montaña» o «por la lluvia tempestuosa de las montañas».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «se abrazan a la roca»; es decir, se aferran a ella buscando refugio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזֶּרֶם
  english_pob_choice: by the ... rains
  chosen_spanish: por las lluvias de la montaña
  alternatives_spanish:
  - por el torrente
  - por el aguacero
  - por la lluvia tempestuosa
  lexicon: HALOT
  rationale: זֶרֶם puede designar un flujo impetuoso o una lluvia torrencial. En este contexto, con montes y exposición, "lluvias de la montaña" conserva la imagen meteorológica sin perder la fuerza de un temporal.
- source_word: הָרִים
  english_pob_choice: mountain
  chosen_spanish: la montaña
  alternatives_spanish:
  - los montes
  - las montañas
  lexicon: HALOT
  rationale: 'El hebreo está en plural, pero en español la expresión natural y colectiva es singular genérico: "la montaña". Mantiene la idea de lluvia procedente del ambiente montañoso.'
- source_word: יִרְטָבוּ
  english_pob_choice: they are drenched
  chosen_spanish: son empapados
  alternatives_spanish:
  - se mojan
  - quedan empapados
  - están mojados
  lexicon: HALOT
  rationale: El verbo indica quedar mojado o empapado; "son empapados" reproduce la pasividad y la intensidad de la exposición a la lluvia.
- source_word: וּבְלִי
  english_pob_choice: lacking
  chosen_spanish: sin
  alternatives_spanish:
  - careciendo de
  - faltos de
  - por falta de
  lexicon: HALOT
  rationale: La construcción expresa carencia o ausencia. "Sin" es la forma española más directa y natural aquí.
- source_word: מַחְסֶה
  english_pob_choice: shelter
  chosen_spanish: refugio
  alternatives_spanish:
  - amparo
  - cobijo
  - shelter
  lexicon: HALOT
  rationale: En el contexto físico de una tormenta, "refugio" comunica bien la idea de protección contra la intemperie y conserva el matiz de amparo buscado por el texto.
- source_word: חִבְּקוּ
  english_pob_choice: they embrace
  chosen_spanish: se abrazan a
  alternatives_spanish:
  - se aferran a
  - se pegan a
  - abrazan
  lexicon: HALOT
  rationale: El hebreo literalmente dice "abrazar". En español, "se abrazan a" conserva la imagen corporal y sugiere el gesto de buscar protección junto a la roca.
- source_word: צוּר
  english_pob_choice: the rock
  chosen_spanish: la roca
  alternatives_spanish:
  - el peñasco
  - la peña
  - la piedra
  lexicon: HALOT
  rationale: צוּר denota roca o peñasco firme. "La roca" es claro, digno y fiel al sustantivo concreto del contexto.
translation_notes:
  revision_awareness: 'El texto en inglés fue marcado como sin cambios tras la última revisión; el presente borrador sigue esa lectura de alta concordancia y conserva las dos alternativas léxicas principales del audit trail: zérem como lluvia/torrente de montaña y חִבְּקוּ como abrazarse a la roca para resguardo.'
  spanish_consistency_notes:
  - Se mantuvo «roca» para צוּר por consistencia con un referente físico concreto y porque encaja con la imagen de buscar cobijo.
  - Se usó voz pasiva «son empapados» para reflejar la afección sufrida, en paralelo con el inglés «They are drenched».
  - «Sin refugio» conserva la carencia expresada por וּבְלִי מַחְסֶה sin introducir un sentido más abstracto de amparo espiritual.
