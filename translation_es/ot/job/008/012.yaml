translation:
  language: es
  text: Mientras todavía está en su brote[a], sin ser cortado[b], se seca antes que cualquier otra hierba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su verdor» o «en su yema». El término hebreo se refiere al crecimiento fresco de la planta.
    reason: lexical_alternative
  - marker: b
    text: O «arrancado».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹדֶנּוּ
  english_pob_choice: While it is still
  chosen_spanish: Mientras todavía está
  alternatives_spanish:
  - Aún está
  - Todavía está
  lexicon: HALOT
  rationale: El adverbio con sufijo de 3ms expresa continuidad temporal. «Mientras todavía está» conserva la relación temporal introducida por el hebreo y suena natural en español.
- source_word: בְאִבּוֹ
  english_pob_choice: in its shoot
  chosen_spanish: en su brote
  alternatives_spanish:
  - en su verdor
  - en su yema
  lexicon: HALOT
  rationale: El término hebreo designa crecimiento fresco, retoño o brote. «Brote» mantiene la imagen botánica concreta sin volverla excesivamente interpretativa.
- source_word: לֹא יִקָּטֵף
  english_pob_choice: not cut down
  chosen_spanish: no cortado
  alternatives_spanish:
  - no arrancado
  - no segado
  lexicon: HALOT
  rationale: El verbo en contexto vegetal comunica ser cortado o arrancado. En español, «no cortado» refleja la voz pasiva implícita y conserva la imagen de una planta que aún no ha sido removida.
- source_word: וְלִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes que
  alternatives_spanish:
  - y antes de
  - sooner than
  lexicon: HALOT
  rationale: La secuencia marca comparación temporal. «Antes que» expresa con naturalidad la relación comparativa sin añadir un matiz innecesario de coordinación.
- source_word: כָל חָצִיר
  english_pob_choice: any other grass
  chosen_spanish: cualquier otro pasto
  alternatives_spanish:
  - toda la hierba
  - cualquier hierba
  lexicon: HALOT
  rationale: En el contexto, la comparación es con la vegetación común de menor dependencia del agua. «Pasto» comunica bien la idea en español; «cualquier otro» hace explícita la comparación implícita del hebreo y del inglés POB.
- source_word: יִיבָשׁ
  english_pob_choice: it dries up
  chosen_spanish: se seca
  alternatives_spanish:
  - se marchita
  - se deseca
  lexicon: HALOT
  rationale: El verbo significa secarse o marchitarse. «Se seca» es la opción más directa y natural para el paralelismo vegetal del versículo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés; no se introdujeron cambios sustantivos respecto de la última revisión, y se mantuvo la comparación botánica y temporal del versículo.
  spanish_consistency_notes:
  - Se conservó un registro neutral y bíblico, evitando un calco rígido donde el español requiere una construcción más natural.
  - Se mantuvo la imagen vegetal concreta de «brote» y «se seca», coherente con el contexto inmediato del libro de Job.
  - Las notas recogen alternativas léxicas reales del hebreo sin diluir la metáfora.
