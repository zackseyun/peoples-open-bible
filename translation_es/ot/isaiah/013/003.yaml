translation:
  language: es
  text: Yo mismo he mandado a mis consagrados; también he convocado a mis guerreros para mi ira[a], mis exultantes orgullosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que se regocijan en mi majestad» o «los que exultan en mi triunfo».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - Yo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático; «yo mismo» conserva mejor ese énfasis que un simple «yo».
- source_word: צִוֵּיתִי
  english_pob_choice: have commanded
  chosen_spanish: he mandado
  alternatives_spanish:
  - he ordenado
  - he dado mandato
  lexicon: HALOT
  rationale: El perfecto profético en español se expresa de modo natural con pretérito perfecto; «mandado» mantiene el valor de dar una orden o comisión.
- source_word: לִמְקֻדָּשַׁי
  english_pob_choice: my consecrated ones
  chosen_spanish: mis consagrados
  alternatives_spanish:
  - mis santificados
  - los que he apartado para mí
  lexicon: HALOT
  rationale: «Consagrados» conserva la idea de ser apartados para un propósito divino sin imponer una lectura moral o angelical que el contexto inmediato no exige.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: «También» reproduce con naturalidad la adición coordinada de una segunda acción divina.
- source_word: קָרָאתִי
  english_pob_choice: have summoned
  chosen_spanish: he convocado
  alternatives_spanish:
  - he llamado
  - he reunido
  lexicon: HALOT
  rationale: En contexto militar/judicial, «convocado» expresa mejor la reunión formal de fuerzas que un simple «llamado».
- source_word: גִּבּוֹרַי
  english_pob_choice: my warriors
  chosen_spanish: mis guerreros
  alternatives_spanish:
  - mis valientes
  - mis poderosos
  lexicon: HALOT
  rationale: «Guerreros» comunica el campo bélico del pasaje y evita la ambigüedad de «poderosos» o «valientes».
- source_word: לְאַפִּי
  english_pob_choice: for my anger
  chosen_spanish: para mi ira
  alternatives_spanish:
  - para mi furor
  - para mi enojo
  lexicon: HALOT
  rationale: El hebreo idiomático usa «nariz» para ira; «ira» es la equivalencia española más clara y sobria para el propósito de juicio.
- source_word: עַלִּיזֵי
  english_pob_choice: exulting ones
  chosen_spanish: orgullosamente exultantes
  alternatives_spanish:
  - exultantes
  - regocijados
  lexicon: HALOT
  rationale: La forma nominal/adjetival es difícil; se conserva la elevación retórica con una expresión adverbial que intenta reflejar el matiz de júbilo intenso.
- source_word: גַּאֲוָתִי
  english_pob_choice: my proudly exulting ones
  chosen_spanish: orgullosamente exultantes
  alternatives_spanish:
  - los que se regocijan en mi majestad
  - los que exultan en mi triunfo
  - mi majestad
  lexicon: HALOT
  rationale: El hebreo admite una relación compleja entre exultación y גָּאוֹן; se mantiene en el texto principal una formulación cercana al sentido compuesto, y se preserva la lectura alternativa tradicional en nota.
theological_decisions:
- issue: 'Sentido de לִמְקֻדָּשַׁי: santidad moral o consagración funcional para juicio'
  english_pob_reading: agents consecrated/set apart by God for the purpose of executing judgment
  chosen_spanish_reading: personas apartadas y consagradas por Dios para ejecutar juicio
  alternative_spanish_readings:
  - santos en sentido moral
  - seres celestiales consagrados
  rationale: El contexto inmediato es la convocatoria de instrumentos para el juicio sobre Babilonia; por eso «consagrados» se entiende funcionalmente, no como declaración de impecabilidad moral.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar la frase comprimida עַלִּיזֵי גַּאֲוָתִי
  english_pob_reading: a description of the summoned warriors as 'my proudly exulting ones'
  chosen_spanish_reading: una descripción de los guerreros como ‘mis orgullosamente exultantes’
  alternative_spanish_readings:
  - los que se regocijan en mi majestad
  - los que exultan en mi triunfo
  rationale: El hebreo es denso y admite más de una relación sintáctica; el texto principal conserva la tensión y la nota ofrece la alternativa interpretativa que mejor recoge la posible lectura de ‘majestad’ o ‘triunfo’.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto y la presente redacción sigue la lectura principal con la alternativa semántica preservada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el Tetragrámaton esté en el corpus; aquí el versículo no lo contiene.
  - Se usa «consagrados» para לִמְקֻדָּשַׁי en coherencia con la decisión POB de evitar una lectura moralizada automática.
  - Se prefiere «ira» para לְאַפִּי por naturalidad y transparencia semántica en español.
  - La nota al pie conserva la ambigüedad léxica de גַּאֲוָתִי sin resolverla en exceso en el texto principal.
