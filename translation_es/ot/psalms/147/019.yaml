translation:
  language: es
  text: Él declara su palabra a Jacob[a], sus estatutos y sus juicios a Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «da a conocer su palabra a Jacob».
    reason: lexical_alternative
  - marker: b
    text: «Juicios» también puede verterse «ordenanzas» o «reglas» en este contexto legal y pactual.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַגִּיד
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - da a conocer
  - proclama
  - anuncia
  lexicon: HALOT
  rationale: El participio hifil de נגד expresa hacer saber o declarar. «Declara» conserva el registro formal y público del verbo, de manera natural en español bíblico contemporáneo.
- source_word: דברו
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mensaje
  - su asunto
  lexicon: HALOT
  rationale: דבר puede significar «palabra» o «asunto». En este paralelismo con «estatutos» y «juicios», «su palabra» preserva el alcance amplio y pactual sin restringirlo a un solo tipo de mandato.
- source_word: ליעקב
  english_pob_choice: to Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - a Yaacob
  lexicon: HALOT
  rationale: El ל marca el destinatario. Se conserva «Jacob» como nombre bíblico estándar y como designación corporativa del pueblo del pacto en paralelo con Israel.
- source_word: חקיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: חֹק / חֻקִּים designa disposiciones prescritas o estatutos. «Estatutos» es el equivalente jurídico-covenantal más natural y reconocido en español.
- source_word: ומשפטיו
  english_pob_choice: and his judgments
  chosen_spanish: y sus juicios
  alternatives_spanish:
  - y sus reglas
  - y sus ordenanzas
  - y su justicia
  lexicon: HALOT
  rationale: מִשְׁפָּטִים en contexto legal y pactual puede referirse a juicios o decisiones legales. «Juicios» mantiene la relación léxica con משפט y el paralelismo formal con «estatutos».
- source_word: לישראל
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a Yisrael
  lexicon: HALOT
  rationale: Se conserva «Israel» como nombre propio estándar y como segunda designación pactual del mismo pueblo, en paralelo poético con Jacob.
theological_decisions:
- issue: Sentido corporativo de Jacob e Israel
  english_pob_reading: Render both names straightforwardly as 'Jacob' and 'Israel' without explicating 'the people of' in the main text.
  chosen_spanish_reading: Traducir «Jacob» e «Israel» directamente, sin expandir a «pueblo de» en el texto principal.
  alternative_spanish_readings:
  - a la casa de Jacob ... a Israel
  - a los descendientes de Jacob ... a Israel
  rationale: La poesía hebrea usa los nombres del pacto de forma directa. Mantenerlos respeta el paralelismo literario y evita una paráfrasis interpretativa que exceda el hebreo.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names; avoid paraphrase beyond the source text.'
translation_notes:
  revision_awareness: La revisión inglesa reciente no introdujo cambios; el texto base quedó aprobado sin modificaciones, por lo que se preserva el paralelismo y la terminología jurídica del original con ajuste natural al español.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantuvo la pareja pactual «Jacob/Israel» sin explicaciones añadidas en la línea principal.
  - «Juicios» conserva la fuerza legal del hebreo משפט, evitando suavizarlo a una palabra más genérica.
