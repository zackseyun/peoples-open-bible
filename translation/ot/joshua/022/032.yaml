id: JOS.22.32
reference: Joshua 22:32
source:
  edition: WLC
  text: וַ/יָּ֣שָׁב פִּֽינְחָ֣ס בֶּן אֶלְעָזָ֣ר הַ/כֹּהֵ֣ן וְ/הַ/נְּשִׂיאִ֡ים מֵ/אֵ֣ת בְּנֵֽי רְאוּבֵן֩ וּ/מֵ/אֵ֨ת בְּנֵי גָ֜ד מֵ/אֶ֧רֶץ הַ/גִּלְעָ֛ד אֶל אֶ֥רֶץ כְּנַ֖עַן אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/יָּשִׁ֥בוּ אוֹתָ֖/ם דָּבָֽר־׀־־־־׃
translation:
  text: Then Phinehas son of Eleazar the priest[a], and the leaders, returned from the sons of Reuben and from the sons of Gad, from the land of Gilead to the land of Canaan, to the sons of Israel[b], and brought back word to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and reported the matter to them.' The Hebrew דָּבָר can mean 'word,' 'matter,' or 'report' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the sons of Israel'; that is, to the Israelites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - came back
  lexicon: HALOT
  rationale: The verb שוב in the wayyiqtol form narrates a completed return. 'Returned' is natural modern English and preserves the directional sense without over-specifying viewpoint.
- source_word: פִּינְחָס בֶּן אֶלְעָזָר הַכֹּהֵן
  chosen: Phinehas son of Eleazar the priest
  alternatives:
  - Phinehas, the son of Eleazar the priest
  rationale: Personal names are transliterated. The appositional phrase is kept straightforwardly in English, preserving the identification of Phinehas by lineage and office.
- source_word: וְהַנְּשִׂיאִים
  chosen: and the leaders
  alternatives:
  - and the chiefs
  - and the princes
  - and the rulers
  lexicon: HALOT
  rationale: נְשִׂיאִים denotes tribal leaders or chiefs. 'Leaders' is the clearest contemporary rendering and fits the narrative context without implying monarchy.
- source_word: מֵאֵת בְּנֵי רְאוּבֵן וּמֵאֵת בְּנֵי גָד
  chosen: from the Reubenites and the Gadites
  alternatives:
  - from the sons of Reuben and from the sons of Gad
  - from the people of Reuben and the people of Gad
  lexicon: HALOT
  rationale: בְּנֵי plus tribal name often functions idiomatically for the tribal group. 'Reubenites and the Gadites' is concise and natural, while preserving the referent.
- source_word: מֵאֶרֶץ הַגִּלְעָד
  chosen: from the land of Gilead
  alternatives:
  - from the territory of Gilead
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' here in a geographic sense. 'Land of Gilead' is the standard and sufficiently precise rendering.
- source_word: אֶל אֶרֶץ כְּנַעַן
  chosen: to the land of Canaan
  alternatives:
  - to Canaan
  lexicon: HALOT
  rationale: The repeated אֶרֶץ is retained as 'land' for formal correspondence and to preserve the geographic contrast with Gilead.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the Israelites
  - to the people of Israel
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons of Israel.' In this context it refers to the covenant people as a whole. The more literal rendering is retained to reflect the source wording, even though 'Israelites' would also be idiomatic.
- source_word: וַיָּשִׁבוּ אוֹתָם דָּבָר
  chosen: and brought back word to them
  alternatives:
  - and reported the matter to them
  - and brought them word
  - and answered them with a report
  lexicon: HALOT
  rationale: The idiom literally involves 'bringing back' a 'word/matter' to them. 'Brought back word to them' preserves the return motif from שוב while remaining readable. 'Word' here means report/message rather than a single utterance.
