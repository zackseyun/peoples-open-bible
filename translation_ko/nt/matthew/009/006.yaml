source:
  edition: SBLGNT
  text: ἵνα δὲ εἰδῆτε ὅτι ἐξουσίαν ἔχει ὁ υἱὸς τοῦ ἀνθρώπου ἐπὶ τῆς γῆς ἀφιέναι ἁμαρτίας— τότε λέγει τῷ παραλυτικῷ· ⸀Ἐγερθεὶς ἆρόν σου τὴν κλίνην καὶ ὕπαγε εἰς τὸν οἶκόν σου.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/009/006.yaml
  text: 'But so that you may know that the Son of Man has authority on earth to forgive sins”—then he says to the paralytic[a], “Get up, pick up your bed[b], and go to your house.”'
  footnotes:
  - marker: a
    text: Or “the Human One” for “the Son of Man.” The traditional rendering is retained because it preserves Jesus’ title and its likely Daniel 7 resonance.
    reason: lexical_alternative
  - marker: b
    text: Or “mat” for “bed.” Greek κλίνη can refer to a bed, couch, or sleeping pallet.
    reason: lexical_alternative
translation:
  language: ko
  text: '그러나 인자가 땅에서 죄들을 용서하는 권세를 가지고 있음을 너희가 알게 하려는 것이다.」 그러고 나서 그 중풍병자에게 말씀하셨습니다. 「일어나 네 침상을 들고 네 집으로 가라.」'
  philosophy: optimal-equivalence
