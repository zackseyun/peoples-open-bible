revisions:
- from: 'Entonces se tendió sobre el niño tres veces[a], y clamó a Yahvé y dijo: «Yahvé, mi Dios, te ruego que el alma[a] de este niño vuelva a su interior».'
  to: 'Entonces se tendió sobre el niño tres veces, y clamó a Yahvé y dijo: «Yahvé, mi Dios, te ruego que la vida[a] de este niño vuelva a él»'
  rationale: 'La revisión alinea el español con la evidencia fuente y la decisión auditada del POB: נֶפֶשׁ se traduce contextualmente como «vida» en el texto principal, mientras «alma» queda preservado como alternativa léxica en nota. También se elimina el uso inválido del mismo marcador en dos lugares y se mejora la naturalidad de «עַל קִרְבּוֹ» con «a él» en el texto, dejando la literalidad en la nota.'
