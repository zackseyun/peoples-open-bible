- from: Porque he aquí[a] Yahvé manda, y la casa grande será hecha pedazos, y la casa pequeña en fragmentos.
  to: Porque he aquí[a] que Yahvé manda, y la casa grande será hecha fragmentos, y la casa pequeña, pedazos.
  rationale: 'Se revisa para: 1) conservar mejor la distinción léxica documentada entre רְסִיסִים («fragmentos») y בְּקִעִים («pedazos», con alternativa «fisuras»); 2) producir un español más natural y equilibrado en las dos colas; 3) mantener la decisión del proyecto de usar «Yahvé» y la pasiva/resultado sin sobreespecificar el agente inmediato. «Será hecha fragmentos» es una compresión permitida del resultado destructivo; si se prefiriera una formulación aún más idiomática, «será reducida a fragmentos» también funcionaría, pero aquí se evita añadir demasiado material no presente en el original.'
