  text: וַ/יְהִ֣י לְ/עֻזִּיָּ֡הוּ חַיִל֩ עֹשֵׂ֨ה מִלְחָמָ֜ה יוֹצְאֵ֧י צָבָ֣א לִ/גְד֗וּד בְּ/מִסְפַּר֙ פְּקֻדָּתָ֔/ם בְּ/יַד֙ יעואל הַ/סּוֹפֵ֔ר וּ/מַעֲשֵׂיָ֖הוּ הַ/שּׁוֹטֵ֑ר עַ֚ל יַד חֲנַנְיָ֔הוּ מִ/שָּׂרֵ֖י הַ/מֶּֽלֶךְ־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/026/011.yaml
  text: And Uzziah had an army fit for war[a], going out to battle by divisions, according to the number of their enrollment, under the direction of Jeiel the scribe and Maaseiah the officer, under the authority of Hananiah[b], one of the king’s commanders.
  footnotes:
  - marker: a
    text: Or 'according to the number of their muster.' The Hebrew term refers to an official counting or enrollment of troops.
    reason: lexical_alternative
  - marker: b
    text: Jeiel is spelled 'יעואל' in the Hebrew text here; the name is sometimes represented as 'Jiel' or 'Jeuel' in English traditions.
    reason: lexical_alternative
