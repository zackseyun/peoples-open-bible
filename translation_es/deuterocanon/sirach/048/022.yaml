revisions:
- from: Porque Ezequías hizo lo bueno[a], y se fortaleció en los caminos de David, según le mandó Isaías el profeta, el que fue alabado entre los profetas[b].
  to: Pues Ezequías hizo lo bueno[a], y fue fuerte en los caminos de David, según le mandó Isaías el profeta, el que fue alabado entre los profetas[b].
  rationale: Se ajustó el conector inicial a «Pues» para reflejar mejor el valor explicativo de כי en español natural, y se cambió «se fortaleció» por «fue fuerte» para alinearse con la decisión léxica documentada («was strong») sin añadir un matiz reflexivo no explícito. Se conservaron las notas textuales, con el motivo de la nota [a] ajustado a «alternative_reading» para coincidir con la auditoría inglesa.
