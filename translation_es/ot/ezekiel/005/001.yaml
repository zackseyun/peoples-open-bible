base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/005/001.yaml
  text: And you[a], son of man, take for yourself a sharp sword; take it as a barber’s razor, and pass it over your head and over your beard[b]. Then take for yourself scales for weighing and divide them.
  footnotes:
