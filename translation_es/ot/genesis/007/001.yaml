translation:
  language: es
  text: 'Entonces Yahvé dijo a Noé: «Entra en el arca, tú y toda tu casa, porque te he visto justo[a] delante de mí en esta generación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Justo» traduce צַדִּיק en sentido moral y relacional; también puede entenderse como «recto».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino propio y no un título. En español, 'Yahvé' conserva el nombre personal revelado, siguiendo el criterio del POB y evitando la sustitución litúrgica 'SEÑOR'.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. 'Entonces' comunica mejor en español el valor secuencial sin sonar forzado.
- source_word: בֹּא
  english_pob_choice: Enter
  chosen_spanish: Entra
  alternatives_spanish:
  - Ven
  - Pasa
  lexicon: HALOT
  rationale: El imperativo se dirige a la acción de ingresar al arca. 'Entra' es natural en español y conserva el sentido directo del hebreo.
- source_word: בֵּיתְךָ
  english_pob_choice: your household
  chosen_spanish: toda tu casa
  alternatives_spanish:
  - tu familia
  - tu hogar
  lexicon: HALOT
  rationale: El hebreo 'casa' puede referirse a la unidad doméstica completa. 'Toda tu casa' mantiene esa amplitud y evita reducirlo solo al edificio o solo al vínculo sanguíneo.
- source_word: הַתֵּבָה
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - la caja
  - el arca de Noé
  lexicon: HALOT
  rationale: '''Arca'' es la equivalencia bíblica estable para תֵּבָה en este contexto. Se evita ''caja'' por ser demasiado literal y poco idiomática.'
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato. 'Porque' expresa con claridad la relación causal.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: te he visto
  alternatives_spanish:
  - te he observado
  - te he considerado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una evaluación ya realizada con efecto vigente. 'Te he visto' conserva esa fuerza sin añadir interpretación; el objeto directo se mantiene en la forma pronominal natural del español.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo delante de Dios
  lexicon: HALOT
  rationale: '''צַדִּיק'' admite ''justo'' o ''recto''. Aquí ''justo'' comunica bien la categoría moral/relacional en español bíblico y evita la carga doctrinal estrecha de una paráfrasis.'
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: La expresión idiomática señala evaluación en la presencia de Dios. 'Delante de mí' es natural y conserva el paralelismo con el hebreo.
- source_word: בַּדּוֹר הַזֶּה
  english_pob_choice: in this generation
  chosen_spanish: en esta generación
  alternatives_spanish:
  - en esta época
  - entre esta generación
  lexicon: HALOT
  rationale: '''דור'' se refiere a la generación contemporánea de Noé. ''En esta generación'' reproduce con precisión la referencia temporal y social.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino como nombre y no como título, conforme al criterio del POB y al texto hebreo directo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Afirmación de la justicia de Noé
  english_pob_reading: that you are righteous before me
  chosen_spanish_reading: te he visto justo delante de mí
  alternative_spanish_readings:
  - te he visto como justo delante de mí
  - te he considerado justo delante de mí
  rationale: La frase mantiene la afirmación divina sin expandirla doctrinalmente. 'Justo' conserva la evaluación moral del texto, y 'delante de mí' mantiene el ámbito relacional de esa evaluación.
  doctrine_reference: DOCTRINE.md Affirmations / Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético y el audit trail inglés: mantiene la secuencia narrativa, el nombre divino, el valor causal de כִּי y la evaluación divina de Noé sin ampliar el contenido. No se introdujeron cambios por revisión reciente; el estado de concordancia del inglés fue alto y sin cambios necesarios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, evitando «SEÑOR» como sustitución.
  - Se traduce בֵּיתְךָ como «toda tu casa» para mantener el sentido colectivo de la unidad doméstica.
  - «Arca» se conserva como término bíblico establecido para תֵּבָה.
  - «Justo» se usa con valor bíblico equivalente a צַדִּיק; la nota preserva la alternativa «recto».
