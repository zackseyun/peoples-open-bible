translation:
  language: es
  text: Porque naves de Quitim[a] vendrán contra él, y será abatido. Entonces volverá y se enfurecerá contra el pacto santo, y actuará[b]. Volverá y prestará atención a los que abandonan el pacto santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'naves desde Quitim'; Quitim puede referirse a Chipre o, en sentido más amplio, a potencias marítimas occidentales.
    reason: lexical_alternative
  - marker: b
    text: O 'mostrará consideración por' a los que abandonan el pacto santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִיִּים כִּתִּים
  english_pob_choice: ships of Kittim
  chosen_spanish: naves de Quitim
  alternatives_spanish:
  - barcos de Quitim
  - naves de Kittim
  - naves de Chipre
  lexicon: HALOT
  rationale: El hebreo combina צִיִּים, que aquí alude a naves o fuerzas marítimas, con כִּתִּים, nombre geográfico/tradicional que puede referirse a Quitim/Kittim y por extensión a potencias marítimas occidentales. 'Naves de Quitim' conserva la expresión tradicional y su valor geográfico sin forzar una paráfrasis.
- source_word: וְנִכְאָה
  english_pob_choice: he will be disheartened
  chosen_spanish: será abatido
  alternatives_spanish:
  - será desalentado
  - será humillado
  - será quebrantado
  lexicon: HALOT
  rationale: El verbo expresa quedar debilitado, intimidado o humillado por la oposición. 'Será abatido' funciona bien en español y mantiene la idea de ser golpeado moral o estratégicamente sin sobredeterminar destrucción física.
- source_word: וְשָׁב
  english_pob_choice: he will turn back
  chosen_spanish: volverá
  alternatives_spanish:
  - dará media vuelta
  - regresará
  lexicon: HALOT
  rationale: Aquí שׁוּב marca un cambio de rumbo tras el revés. 'Volverá' es natural en español y preserva la secuencia narrativa.
- source_word: וְזָעַם
  english_pob_choice: and rage against
  chosen_spanish: y se enfurecerá contra
  alternatives_spanish:
  - y se airará contra
  - y mostrará indignación contra
  lexicon: HALOT
  rationale: El verbo comunica enojo expresado contra un objeto. 'Se enfurecerá contra' transmite bien la fuerza hostil del movimiento sin sonar excesivamente literario.
- source_word: בְּרִית קֹדֶשׁ / בְּרִית קוֹדֶשׁ
  english_pob_choice: the holy covenant
  chosen_spanish: el pacto santo
  alternatives_spanish:
  - el pacto sagrado
  - el pacto santo de Dios
  lexicon: HALOT
  rationale: '''Pacto santo'' reproduce la relación genitiva adjetival del hebreo de manera directa. En español ''pacto santo'' es claro y evita estrechar indebidamente el referente más allá de lo que el texto dice.'
- source_word: וְעָשָׂה
  english_pob_choice: and he will act
  chosen_spanish: y actuará
  alternatives_spanish:
  - y hará
  - y tomará acción
  - y obrará
  lexicon: HALOT
  rationale: El verbo es amplio ('hacer/actuar'). 'Actuará' conserva la tersura del hebreo y evita añadir un objeto no explicitado.
- source_word: וְיָבֵן
  english_pob_choice: and pay attention to
  chosen_spanish: prestará atención a
  alternatives_spanish:
  - tomará en cuenta a
  - se fijará en
  - mostrará consideración por
  lexicon: HALOT
  rationale: La raíz בין aquí expresa consideración o atención dirigida hacia un grupo. 'Prestará atención a' refleja bien ese matiz sin cerrarlo a una sola interpretación psicológica o política.
- source_word: עֹזְבֵי
  english_pob_choice: those who forsake
  chosen_spanish: los que abandonan
  alternatives_spanish:
  - los que dejan
  - los que desertan de
  - los apóstatas que abandonan
  lexicon: HALOT
  rationale: El participio designa a quienes dejan el pacto. 'Los que abandonan' es fiel y natural; se evita imponer el tecnicismo 'apóstatas' en el texto principal.
theological_decisions:
- issue: Referencia de 'el pacto santo'
  english_pob_reading: Retain the phrase as 'the holy covenant' without specifying beyond the text.
  chosen_spanish_reading: Mantener 'el pacto santo' sin precisar más el referente.
  alternative_spanish_readings:
  - el pacto judío
  - el pacto de Dios con Israel
  - el pacto sagrado
  rationale: El versículo vincula el pacto con lo santo, pero no explicita todo su alcance en esta línea. La traducción debe conservar esa tensión y no resolverla con una precisión doctrinal que el hebreo no exige.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó marcado como sin cambios, con alta concordancia entre revisores y solo observaciones menores. Se mantuvo la lectura inglesa auditada de ''ships of Kittim'', ''disheartened'', ''turn back'', ''rage against'', ''the holy covenant'', ''act'', ''pay attention to'' y ''those who forsake''.'
  spanish_consistency_notes:
  - Se conservó 'Quitim' como transliteración coherente con la tradición de Kittim/Chittim en español bíblico, en lugar de reemplazarlo por una glosa interpretativa en el texto principal.
  - '''Pacto santo'' se eligió para mantener la relación adjetival simple del hebreo y la terminología del proyecto, evitando ''sagrado'' o ampliaciones explicativas en el cuerpo del versículo.'
  - '''Abandonan'' mantiene el valor relacional del participio sin cargar el texto con un término técnico posterior como ''apóstatas''.'
  - Se prefirió 'naves' por su amplitud y naturalidad en español bíblico contemporáneo, sin cerrar la imagen únicamente a embarcaciones comerciales o militares.
