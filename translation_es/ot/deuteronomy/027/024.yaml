translation:
  language: es
  text: 'Maldito el que hiere[a] a su prójimo en secreto. Y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'golpea' o 'mata'; el verbo hebreo puede abarcar desde herir hasta violencia letal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Cursed
  - Maldicho
  lexicon: HALOT
  rationale: En una fórmula de maldición del pacto, 'maldito' comunica de forma natural y solemne el estado pronunciado sobre la persona. 'Cursed' sería un calco innecesario; 'maldicho' es menos idiomático en español bíblico actual.
- source_word: מַכֵּה
  english_pob_choice: strikes down
  chosen_spanish: golpea
  alternatives_spanish:
  - hiere
  - agrede
  - mata
  lexicon: HALOT
  rationale: El verbo נכה abarca desde golpear hasta causar daño grave o mortal. En español, 'golpea' conserva la amplitud semántica sin afirmar muerte explícita. No se restringe a 'mata', porque el hebreo no lo exige en este versículo.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su semejante
  - a su compañero
  lexicon: HALOT
  rationale: '''Prójimo'' es una equivalencia bíblica natural para רֵעַ en este tipo de exhortación comunitaria. Mantiene la relación interpersonal del término sin introducir una cercanía meramente geográfica como ''vecino''.'
- source_word: בַּסָּתֶר
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: HALOT
  rationale: La frase indica ocultamiento de la acción. 'En secreto' conserva el sustantivo implícito del hebreo y suena sobrio y claro en español litúrgico.
- source_word: וְאָמַר
  english_pob_choice: And ... shall say
  chosen_spanish: dirá
  alternatives_spanish:
  - dirá entonces
  - responderá
  - y dirá
  lexicon: HALOT
  rationale: En la secuencia ritual, el valor es procedimental/futuro. 'Dirá' en español transmite la respuesta congregacional sin cargar la frase con un 'shall' artificial; el 'Y' inicial del hebreo queda implícito en la coordinación de la oración.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo de Israel
  - toda la gente
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'todo el pueblo'. 'Pueblo' preserva el alcance corporativo y el tono de asamblea, sin añadir 'de Israel', que aquí no está explícito.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: HALOT
  rationale: Se conserva la forma litúrgica tradicional 'Amén' porque funciona como respuesta ritual establecida y reproduce la fuerza de asentimiento del hebreo.
theological_decisions:
- issue: Intensidad de מַכֵּה en contexto de maldición
  english_pob_reading: Rendered as 'strikes down' to preserve gravity without forcing explicit homicide.
  chosen_spanish_reading: '''golpea'' conserva la gravedad sin convertir el verbo en ''mata''.'
  alternative_spanish_readings:
  - hiere
  - mata
  - agrede
  rationale: El hebreo puede cubrir un espectro amplio de violencia. En español, 'golpea' es suficientemente abierto para no sobretraducir, y el contexto de maldición y ocultamiento ya comunica la seriedad del acto.
  doctrine_reference: Principio de primacía del texto original; no ampliar ni estrechar indebidamente el alcance léxico.
- issue: Respuesta litúrgica de la congregación
  english_pob_reading: And all the people shall say, “Amen.”
  chosen_spanish_reading: 'Y todo el pueblo dirá: «Amén».'
  alternative_spanish_readings:
  - 'Y todo el pueblo responderá: «Amén».'
  - 'Y todo el pueblo dirá: «Así sea».'
  - 'Y toda la gente dirá: «Amén».'
  rationale: El hebreo presenta una fórmula ceremonial de respuesta. 'Dirá' mantiene la estructura litúrgica sin añadir una interpretación explicativa. 'Amén' se conserva por su uso confesional y ritual ampliamente reconocido.
  doctrine_reference: Lectura litúrgica y comunitaria del texto; mantener la respuesta pactal establecida.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada en el texto. La redacción conserva el sentido del hebreo y la cadencia litúrgica del contexto sin depender de marcadores sueltos.
  spanish_consistency_notes:
  - Se mantiene 'Amén' con tilde como forma litúrgica estándar en español.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una sustitución del nombre divino.
  - '''Prójimo'' se usa como equivalente bíblico natural de רֵעַ en contexto comunitario.'
  - 'La sintaxis sigue el orden ceremonial del hebreo: maldición, descripción del acto, respuesta del pueblo.'
