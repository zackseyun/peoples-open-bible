translation:
  language: es
  text: Y aconteció al día siguiente que el pueblo salió al campo[a], y se le informó a Abimelec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «y dijeron a Abimelec», con un sujeto plural indefinido. El español «se le informó a Abimelec» conserva ese sentido de manera más natural, sin especificar quién lo hizo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma wayyiqtol de היה introduce el siguiente episodio narrativo. «Aconteció» conserva el marcador narrativo hebreo con un registro natural en español bíblico contemporáneo, sin caer en un calco duro.
- source_word: מִמָּחֳרָת
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - en el día siguiente
  lexicon: HALOT
  rationale: La expresión denota el día posterior. «Al día siguiente» es idiomático en español y mantiene con claridad el valor temporal.
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - fue
  lexicon: HALOT
  rationale: יצא expresa movimiento de salida. En este contexto narrativo, «salió» es la equivalencia natural y suficiente.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los habitantes
  lexicon: HALOT
  rationale: El sustantivo colectivo עָם se refiere al conjunto de la población. «El pueblo» conserva el sentido colectivo mejor que una referencia estrictamente masculina.
- source_word: הַשָּׂדֶה
  english_pob_choice: into the field
  chosen_spanish: al campo
  alternatives_spanish:
  - al campo abierto
  - al terreno
  lexicon: HALOT
  rationale: שׂדה puede designar el campo abierto o la zona rural fuera de la ciudad. En español, «al campo» comunica de forma natural ese espacio abierto; con «salió» no hace falta explicitar la preposición direccional más allá de lo idiomático.
- source_word: וַיַּגִּדוּ
  english_pob_choice: it was reported
  chosen_spanish: se lo comunicaron
  alternatives_spanish:
  - se lo dijeron
  - le informaron
  lexicon: HALOT
  rationale: 'El hebreo usa una pluralidad indefinida de sujeto: literalmente, «y le contaron / dijeron a Abimelec». El español puede conservar el sujeto plural implícito con una construcción impersonal-reflexiva natural, evitando un pasivo poco fluido y sin perder la observación del audit trail sobre la indefinición del agente.'
- source_word: לַאֲבִימֶלֶךְ
  english_pob_choice: to Abimelek
  chosen_spanish: a Abimelec
  alternatives_spanish:
  - a Abimelek
  lexicon: HALOT
  rationale: Se mantiene la transliteración habitual en español bíblico «Abimelec», acorde con el nombre propio en el contexto.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; el acuerdo de la revisión posterior es alto. La versión española sigue de cerca la lectura hebrea y la decisión inglesa de preservar el sujeto indefinido de וַיַּגִּדוּ, pero lo expresa con una construcción española más natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene el nombre propio «Abimelec» en transliteración española estable.
  - «El pueblo» se usa como colectivo general, en coherencia con el hebreo עָם.
