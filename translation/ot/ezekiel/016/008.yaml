theological_decisions:
- issue: Marriage-covenant imagery and sexual language
  chosen_reading: Retain the marital/covenantal metaphor with modest but explicit language ('time for love,' 'covered your nakedness,' 'entered into a covenant').
  alternative_readings:
  - Euphemize the verse to minimize erotic overtones
  - Make the sexual dimension more explicit with terms like 'lovemaking'
  rationale: The verse uses marriage imagery to describe the LORD's covenant with Jerusalem. The translation should neither flatten the metaphor into mere affection nor intensify it beyond the Hebrew. The chosen wording preserves the theological symbolism of covenant, protection, and belonging.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - the Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
