  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: trajeron la contribución, el diezmo y las cosas santas/consagradas; lo hicieron con fidelidad; y Conanías el levita estaba en autoridad, con su hermano Simei como segundo. Sin embargo, hay dos ajustes importantes para alinearse mejor con el sentido y el rastro inglés: el nombre שִׁמְעִי debe ser ‘Simei’, no ‘Simi’; y en español ‘sobre ellos’ suena ambiguo para bienes/administración, por lo que conviene explicitar la función supervisora con ‘a cargo de ellos’.'
  spanish_quality_summary: El español es en general claro y digno, pero ‘era el principal sobre ellos’ suena algo calcado y menos natural que ‘estaba a cargo de ellos’ o ‘era el encargado principal de ellos’. También conviene evitar el punto y coma antes de ‘y’ en este versículo narrativo. ‘Las cosas santas’ es aceptable, aunque en español bíblico ‘las cosas consagradas’ también sería muy natural; puede mantenerse la línea principal y conservar la alternativa en nota.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. ‘Contribución’, ‘diezmo’, ‘levita’ y ‘fielmente’ están bien encaminados. El principal desajuste es onomástico: שִׁמְעִי corresponde mejor a ‘Simei’.'
  issues:
