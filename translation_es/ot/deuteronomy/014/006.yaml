review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: permiso alimentario para cualquier animal con pezuña partida, totalmente dividida en dos, y que rumia. Sin embargo, pierde algo de precisión en «dividida en dos partes», porque el hebreo especifica dos pezuñas/mitades de pezuña, no solo «partes» genéricas. También el permiso suena mejor en segunda persona plural directa que en «Podrán».'
  spanish_quality_summary: 'El español es mayormente claro y natural, pero necesita ajustes menores. «Podrán comer» es entendible, aunque «Podrán comer de» no corresponde; mejor «Ustedes pueden comer» o simplemente «Pueden comer». La nota al pie actual contiene varios problemas gramaticales y léxicos: «toda animal» debe ser «todo animal»; «hace subir el rumiar» es español poco natural; y «esa podrán comer» es incorrecto. La frase principal puede ganar precisión con «dividida en dos pezuñas».'
  glossary_alignment: No hay términos teológicos especiales en este versículo. «Animal», «pezuña partida» y «rumie» están alineados con las decisiones del POB. Conviene ajustar la alternativa formal para reflejar mejor el hebreo sin calcos defectuosos.
  issues:
  - severity: medium
    issue: «dividida en dos partes» es demasiado genérico
    rationale: El hebreo וְשֹׁסַעַת שֶׁסַע שְׁתֵּי פְרָסוֹת enfatiza la división en dos pezuñas/mitades de pezuña; «partes» debilita la imagen concreta.
  - severity: medium
    issue: La nota al pie alternativa tiene errores gramaticales y estilísticos
    rationale: «toda animal», «hace subir el rumiar» y «esa podrán comer» no son español correcto ni reflejan bien la alternativa más formal documentada por el POB inglés.
  - severity: low
    issue: «Podrán comer» es menos directo de lo ideal
    rationale: Aunque expresa permiso, en español bíblico claro «Pueden comer» suena más natural y directo para el imperfecto permisivo.
  revised_spanish_text: Pueden comer cualquier animal que tenga la pezuña partida[a], dividida en dos pezuñas, y que rumie entre los animales.
  revised_footnotes:
