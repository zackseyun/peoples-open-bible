translation:
  language: es
  text: Los hijos de Maquir, hijo de Manasés, fueron a Galaad y la capturaron, y desposeyeron[a] a los amorreos[b] que estaban en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene un verbo singular, «y desposeyó», después de verbos plurales anteriores. Puede tratarse de un sujeto colectivo —la línea de Maquir— o de un cambio textual o estilístico; por eso algunas versiones suavizan con «desposeyeron».
    reason: textual_variant
  - marker: b
    text: El hebreo usa un etnónimo singular, «el amorreo», con sentido colectivo para referirse a los habitantes amorreos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - fueron hacia
  - marcharon
  lexicon: HALOT
  rationale: הלך en esta narración expresa movimiento simple. «Fueron» es natural en español y conserva el sentido sin añadir una orientación militar o ascendente que el texto no exige.
- source_word: בְּנֵי מָכִיר בֶּן מְנַשֶּׁה
  english_pob_choice: The sons of Machir son of Manasseh
  chosen_spanish: Los hijos de Maquir, hijo de Manasés
  alternatives_spanish:
  - Los descendientes de Maquir, hijo de Manasés
  - La casa de Maquir, hijo de Manasés
  lexicon: HALOT
  rationale: בני mantiene la expresión de filiación del hebreo. «Hijos» preserva la forma del original mejor que «descendientes», aunque la referencia sea clánica.
- source_word: גִּלְעָדָה
  english_pob_choice: to Gilead
  chosen_spanish: a Galaad
  alternatives_spanish:
  - hacia Galaad
  lexicon: HALOT
  rationale: La he direccional marca movimiento hacia el lugar. En español, «a Galaad» comunica bien esa dirección de forma idiomática.
- source_word: וַיִּלְכְּדֻהָ
  english_pob_choice: captured it
  chosen_spanish: la capturaron
  alternatives_spanish:
  - la tomaron
  - la asaltaron y tomaron
  lexicon: HALOT
  rationale: לכד se usa para tomar una ciudad o territorio por la fuerza. «La capturaron» conserva el valor militar y territorial de manera directa.
- source_word: וַיּוֹרֶשׁ
  english_pob_choice: dispossessed
  chosen_spanish: desposeyeron
  alternatives_spanish:
  - desalojaron
  - expulsaron
  lexicon: HALOT
  rationale: ירש en hifil tiene fuerza de quitar posesión o desalojar a otros de un territorio. «Desposeyeron» conserva ese matiz legal-territorial mejor que «expulsaron».
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: a los amorreos
  alternatives_spanish:
  - al amorreo
  lexicon: HALOT
  rationale: Aunque el hebreo es singular en forma, funciona de manera colectiva. El plural español «amorreos» expresa con más claridad el grupo poblacional en contexto.
- source_word: אֲשֶׁר בָּהּ
  english_pob_choice: who were in it
  chosen_spanish: que estaban en ella
  alternatives_spanish:
  - que vivían en ella
  - que había en ella
  lexicon: HALOT
  rationale: La relativa se refiere a los habitantes dentro de Galaad. «Estaban en ella» preserva la referencia espacial sin sobreespecificar el tipo de presencia.
theological_decisions:
- issue: Sujeto singular de וַיּוֹרֶשׁ frente a verbos plurales anteriores
  english_pob_reading: 'The English POB smooths to plural agreement: ''and dispossessed the Amorites who were in it,'' while noting the Hebrew singular verb may be collective or stylistic.'
  chosen_spanish_reading: y desposeyeron a los amorreos que estaban en ella
  alternative_spanish_readings:
  - y desposeyó a los amorreos que estaban en ella
  - y desposeyeron a los amorreos que estaban en ella
  rationale: El hebreo presenta un verbo singular tras sujetos plurales. En español, mantener un singular aislado sonaría torpe y oscurecería la referencia colectiva. La forma plural preserva la fluidez y sigue la opción de la POB inglesa, sin perder el valor colectivo implícito.
  doctrine_reference: cuestión gramatical/textual; no doctrinal
- issue: Ethnónimo singular hebreo הָאֱמֹרִי con sentido colectivo
  english_pob_reading: Hebrew 'the Amorite' uses a singular ethnonym collectively, referring to the Amorite inhabitants.
  chosen_spanish_reading: los amorreos
  alternative_spanish_readings:
  - el amorreo
  rationale: En español, el singular «el amorreo» puede sonar menos natural en este contexto narrativo. El plural conserva el sentido colectivo y corresponde al uso del grupo étnico como población residente.
  doctrine_reference: cuestión lexical; no doctrinal
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente de la POB inglesa: mantiene el sujeto plural implícito en los verbos anteriores y omite el «he» añadido en una versión previa. También conserva la observación sobre el verbo singular hebreo como posible rasgo colectivo o estilístico.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo presente explícitamente el nombre divino; este versículo no lo requiere.
  - «Maquir», «Manasés» y «Galaad» siguen la forma española habitual y consistente con el registro bíblico.
  - Se mantuvo «desposeyeron» para conservar la fuerza territorial del hifil de ירש, en línea con la terminología POB.
  - La nota sobre «amorreos» resuelve la tensión entre la forma singular hebrea y el referente colectivo en español.
  - La puntuación separa claramente la acción de capturar y la de desposeer, respetando la secuencia narrativa del hebreo.
