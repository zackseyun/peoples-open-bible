translation:
  language: es
  text: y el último hombre la odia[a], y le escribe un certificado de divorcio[b], y se lo pone en la mano, y la despide de su casa, o si el último hombre muere, que la tomó por esposa[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «comienza a odiarla». El perfecto hebreo puede leerse como una secuencia legal simple, pero la idea es que el último hombre desarrolla hostilidad hacia ella y procede al divorcio.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «un libro/documento de separación». Es un aviso escrito formal que disuelve el matrimonio.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «que la tomó para sí por esposa», es decir, «que se casó con ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׂנֵאָהּ
  english_pob_choice: hates her
  chosen_spanish: la aborrece
  alternatives_spanish:
  - la odia
  - comienza a aborrecerla
  lexicon: HALOT
  rationale: El verbo שׂנא expresa hostilidad real; en español, 'aborrecer' mantiene la fuerza léxica sin sonar tan abrupto como 'odiar'. Conserva además el matiz legal de una actitud hostil que lleva al divorcio.
- source_word: הָאִישׁ הָאַחֲרוֹן
  english_pob_choice: the latter man
  chosen_spanish: el último hombre
  alternatives_spanish:
  - el hombre posterior
  - el segundo hombre
  lexicon: HALOT
  rationale: אַחֲרוֹן significa 'último/latter'. 'El último hombre' refleja de manera directa el contraste legal con el primer marido y evita introducir 'esposo' donde el hebreo usa 'hombre'.
- source_word: וְכָתַב לָהּ סֵפֶר כְּרִיתֻת
  english_pob_choice: writes her a certificate of divorce
  chosen_spanish: le escribe un certificado de divorcio
  alternatives_spanish:
  - le escribe un documento de repudio
  - le escribe un acta de divorcio
  lexicon: HALOT
  rationale: סֵפֶר כְּרִיתֻת es un documento formal de disolución matrimonial. 'Certificado de divorcio' comunica con claridad el sentido jurídico en español moderno, manteniendo el valor técnico del texto.
- source_word: וְנָתַן בְּיָדָהּ
  english_pob_choice: puts it into her hand
  chosen_spanish: se lo pone en la mano
  alternatives_spanish:
  - se lo entrega en la mano
  - lo pone en su mano
  lexicon: HALOT
  rationale: La idiomática hebrea describe una entrega material y procedimental. 'Se lo pone en la mano' preserva la imagen concreta y el acto legal de entrega.
- source_word: וְשִׁלְּחָהּ מִבֵּיתוֹ
  english_pob_choice: sends her out of his house
  chosen_spanish: la despide de su casa
  alternatives_spanish:
  - la envía fuera de su casa
  - la manda fuera de su casa
  lexicon: HALOT
  rationale: En contexto de divorcio, שׁלח implica despedir/enviar fuera. 'La despide de su casa' suena natural en español y conserva la salida jurídica del hogar sin perder la idea de expulsión legal.
- source_word: אֲשֶׁר לְקָחָהּ ל֖וֹ לְאִשָּׁה
  english_pob_choice: who took her as his wife
  chosen_spanish: que la había tomado como su esposa
  alternatives_spanish:
  - que la tomó como su esposa
  - que la había tomado por esposa
  lexicon: HALOT
  rationale: לקח + ל + אשה es la locución estándar para contraer matrimonio. 'Había tomado' expresa mejor la secuencia narrativa del caso legal; 'como su esposa' conserva el sentido sin forzar un verbo más interpretativo como 'casarse'.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el criterio de la POB en inglés para mantener el orden casuístico, la hostilidad del verbo שׂנא, el carácter técnico de סֵפֶר כְּרִיתֻת y la idiomaticidad matrimonial de לקח + ל + אשה. También toma en cuenta la revisión inglesa que simplificó la última cláusula a 'as his wife'; en español se preserva la naturalidad con 'como su esposa' sin perder la base hebrea.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma base del proyecto cuando el Tetragrama aparezca; aquí no aplica.
  - Se evita 'repudia' como reemplazo automático de 'divorcio' porque el hebreo ofrece un término documental específico.
  - Se conserva la cláusula final como relativo explicativo sin introducir doctrina adicional.
  - La puntuación con raya final reproduce el corte incompleto del versículo en el hebreo fuente.
