translation:
  language: es
  text: Por tanto, recibirán la corona real de esplendor y la diadema de belleza de la mano de Yahvé[a], porque con su diestra los cubrirá, y con su brazo los defenderá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'el reino de esplendor'. El griego puede entenderse aquí como una insignia o emblema real, por eso el texto conserva la imagen concreta de regalia en lugar de una abstracción como 'reino'.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'defenderá en favor de ellos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: Expresa con naturalidad la relación inferencial con el contexto anterior sin endurecer el tono; en español bíblico moderno, 'Por tanto' conserva la conexión lógica de forma digna.
- source_word: λήμψονται
  english_pob_choice: they will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - tomarán
  - obtendrán
  lexicon: LSJ
  rationale: El contexto de dádiva 'de la mano de Yahvé' favorece una recepción, no una toma por la fuerza. 'Recibirán' mantiene esa pasividad receptiva.
- source_word: τὸ βασίλειον
  english_pob_choice: the royal crown
  chosen_spanish: la corona real
  alternatives_spanish:
  - el reino real
  - la realeza
  lexicon: LSJ
  rationale: Aunque el inglés POB revisó la frase para reflejar un adorno real, el griego aquí puede aludir al ornamento/regalía. 'Corona real' preserva la imagen concreta de insignia real en español sin forzar 'reino', que suena más abstracto o político.
- source_word: τῆς εὐπρεπείας
  english_pob_choice: of splendor
  chosen_spanish: de esplendor
  alternatives_spanish:
  - de majestad
  - de belleza
  lexicon: LSJ
  rationale: '''Esplendor'' comunica bien la magnificencia apropiada y evita un giro demasiado interpretativo. Mantiene el valor de belleza decorosa/magnífica de εὐπρέπεια.'
- source_word: τὸ διάδημα
  english_pob_choice: the diadem
  chosen_spanish: el diadema
  alternatives_spanish:
  - la diadema
  - la corona
  lexicon: LSJ
  rationale: En español, 'diadema' es femenino; el griego es neutro. Aquí se conserva el término técnico para diferenciarlo de 'corona' y mantener la distinción lexical documentada en el audit trail.
- source_word: τοῦ κάλλους
  english_pob_choice: of beauty
  chosen_spanish: de belleza
  alternatives_spanish:
  - de hermosura
  - de gloria
  lexicon: LSJ
  rationale: '''Belleza'' es la equivalencia más directa y preserva el componente estético del texto griego.'
- source_word: ἐκ χειρὸς Κυρίου
  english_pob_choice: from the hand of the Lord
  chosen_spanish: de la mano de Yahvé
  alternatives_spanish:
  - de la mano del Señor
  lexicon: LSJ
  rationale: Se sigue el estándar del proyecto para יהוה/YHWH → 'Yahvé'. Aunque el griego usa κύριος, el contexto de Sabiduría alude al Dios de Israel; por eso se transparenta el nombre divino en lugar de ocultarlo con 'Señor'.
- source_word: τῇ δεξιᾷ
  english_pob_choice: with his right hand
  chosen_spanish: con su diestra
  alternatives_spanish:
  - con su mano derecha
  - por su diestra
  lexicon: LSJ
  rationale: '''Diestra'' es un equivalente bíblico claro y solemne; evita la repetición de ''mano'' después de ''de la mano de Yahvé'' y conserva la imagen instrumental.'
- source_word: σκεπάσει
  english_pob_choice: he will shelter
  chosen_spanish: los cubrirá
  alternatives_spanish:
  - los amparará
  - los protegerá
  lexicon: LSJ
  rationale: El verbo griego tiene un sentido de cubrir/proteger. 'Cubrirá' mantiene la metáfora de protección sin añadir una imagen distinta; en español funciona bien junto con 'diestra' y 'brazo'.
- source_word: τῷ βραχίονι
  english_pob_choice: with his arm
  chosen_spanish: con su brazo
  alternatives_spanish:
  - con su poder
  - con su brazo poderoso
  lexicon: LSJ
  rationale: '''Brazo'' conserva la imagen bíblica de fuerza activa. No se explicita ''poderoso'' para no sobreinterpretar el sintagma simple del griego.'
- source_word: ὑπερασπιεῖ αὐτῶν
  english_pob_choice: he will defend them
  chosen_spanish: los defenderá
  alternatives_spanish:
  - abogará por ellos
  - los amparará
  lexicon: LSJ
  rationale: '''Defenderá'' comunica el sentido de proteger/defender en favor de alguien. Se evita ''abogará'' por sonar más jurídico y menos imagético.'
theological_decisions:
- issue: Renderización de κύριος en un contexto de alusión al nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque el texto griego dice κύριος, en este libro sapiencial la referencia es al Dios de Israel y el proyecto prioriza transparentar el nombre divino. Traducir 'Yahvé' evita la máscara litúrgica de 'Señor' y mantiene la coherencia con el estándar del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé; κύριος → Lord unless quoting/alluding to the divine name'
- issue: 'Naturaleza del galardón: insignia real o reino'
  english_pob_reading: retain regal imagery literally ('royal crown' / 'diadem')
  chosen_spanish_reading: corona real de esplendor / diadema de belleza
  alternative_spanish_readings:
  - reino de esplendor
  - realeza de belleza
  rationale: El griego ofrece imágenes de regalia concreta. En español conviene conservar ambas piezas como ornamentos reales, preservando la tensión entre recompensa honorífica y participación en dignidad real sin convertirla en una abstracción política.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'the kingdom of splendor' a 'the royal crown of splendor' para reflejar βασίλειον como insignia real. En español se siguió esa revisión al optar por 'corona real de esplendor', pero se mantuvo 'diadema' para διάδημα a fin de conservar la distinción léxica; también se decidió transparentar Yahvé en lugar de 'Señor' por la política del proyecto para el nombre divino en contextos de alusión al tetragrámaton.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del nombre divino, conforme al estándar del proyecto.
  - '''Corona'' y ''diadema'' quedan diferenciadas para reflejar la doble imagen regia del griego.'
  - Se usa 'cubrirá' para σκεπάσει y 'defenderá' para ὑπερασπιεῖ, preservando dos matices distintos de protección.
