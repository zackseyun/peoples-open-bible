revisions:
- from: Como su pasto[a], se saciaron; se saciaron, y su corazón fue enaltecido[b]; por tanto, me olvidaron.
  to: Al tener pasto[a], se saciaron; se saciaron, y su corazón se enalteció[b]; por tanto, me olvidaron.
  rationale: Se hicieron ajustes menores para mejorar la naturalidad del español sin perder la compacidad ni la metáfora del hebreo. «Al tener pasto» expresa de forma idiomática la circunstancia de abundancia implícita en כְּמַרְעִיתָם, mientras que la nota conserva alternativas más formales. «Su corazón se enalteció» mantiene el modismo bíblico con mejor fluidez que la pasiva.
