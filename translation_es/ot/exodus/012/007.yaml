review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia ritual básica del hebreo: tomar sangre, ponerla en los postes y el dintel, y la referencia a las casas donde se comerá el animal. Sin embargo, pierde precisión en dos puntos relevantes: מִן הַדָּם es partitivo y conviene explicitarlo en español (''parte de la sangre'' o similar), y מְזוּזוֹת como ''postes'' solo queda algo ambiguo sin ''de la puerta''. Además, la nota al pie actual no preserva la alternativa del inglés POB, porque repite la misma lectura futura que ya está en el texto en vez de dar la opción no futura.'
  spanish_quality_summary: 'El español es claro y natural, pero puede mejorarse para mayor precisión y legibilidad bíblica: ''los dos postes de la puerta'' suena más exacto que ''los dos postes'', y ''parte de la sangre'' hace explícito el sentido partitivo sin sonar forzado. La oración revisada sigue siendo fluida y digna.'
  glossary_alignment: No hay términos teológicos del glosario mayor en juego aquí. La revisión propuesta mantiene la terminología arquitectónica precisa ('dintel') y mejora la exactitud léxica del partitivo y de 'doorposts'.
  issues:
  - severity: medium
    issue: El sentido partitivo de מִן הַדָּם no queda suficientemente claro en 'de la sangre'.
    rationale: El expediente inglés documenta explícitamente 'some of the blood'. En español, 'de la sangre' puede sonar meramente de origen; 'parte de la sangre' preserva mejor el valor partitivo del hebreo.
  - severity: medium
    issue: '''Los dos postes'' es menos preciso que ''los dos postes de la puerta'' para מְזוּזוֹת.'
    rationale: מְזוּזוֹת se refiere a los postes verticales del vano de la puerta. Sin 'de la puerta', el español queda más ambiguo de lo deseable.
  - severity: high
    issue: La nota al pie no ofrece una alternativa real al texto principal.
    rationale: El texto principal dice 'la comerán' y la nota dice 'O en las que la comerán', que repite sustancialmente la misma lectura. Debe conservar la alternativa documentada por el inglés POB, equivalente a una lectura no futura, por ejemplo 'donde la comen'.
  revised_spanish_text: Tomarán parte de la sangre y la pondrán sobre los dos postes de la puerta y sobre el dintel de las casas en las que la comerán[a].
  revised_footnotes:
  - marker: a
    text: O 'donde la comen'. El imperfecto hebreo puede traducirse con matiz de futuro en este contexto instructivo.
    reason: lexical_alternative
  revision_rationale: Se ajusta el partitivo de מִן, se precisa el referente arquitectónico de מְזוּזוֹת y se corrige la nota para que preserve una alternativa real, en línea con el expediente inglés POB y con mejor fidelidad al hebreo.
