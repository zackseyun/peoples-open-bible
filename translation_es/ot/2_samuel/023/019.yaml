  yaml_path: translation/ot/2_samuel/023/019.yaml
  text: Was he not more honored than the three? So he became their commander[b][a], but he did not attain to the three.
  footnotes:
  - marker: a
    text: Or 'Was he not honored among the three?' The Hebrew may be taken less comparatively, but the comparative sense ('more honored than the three') best fits the syntax and the parallel in the surrounding passage.
    reason: lexical_alternative
  - marker: b
    text: That is, he did not attain the rank or standing of 'the three,' the highest tier among David's mighty men.
    reason: cultural_note
