review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea y la mayoría de las decisiones léxicas del POB: ''su boca'', ''está llena de'', ''engaño'', ''opresión'' y ''debajo de su lengua'' reflejan fielmente el texto fuente. Sin embargo, ''afán'' para עָמָל no preserva bien aquí el sentido de daño/trouble/mischief; en español actual suele sugerir empeño, ansiedad o diligencia, no el mal perjudicial escondido bajo la lengua. La nota b también se desvía del audit trail inglés al ofrecer ''miseria e iniquidad'' en vez de la alternativa documentada equivalente a ''mischief and iniquity''.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, 'afán' suena poco natural y semánticamente impreciso en este contexto. 'Maldición jurada' en la nota a tampoco es una alternativa idiomática ni refleja bien la opción inglesa 'oath'; 'juramento' sería más natural. Una leve revisión mejora fidelidad y legibilidad sin perder concisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones clave son adecuadas salvo עָמָל, que conviene traducir como 'maldad dañina' no, mejor 'maldad' ya está para אָוֶן; por eso una opción como 'maldad' duplicaría. La mejor alineación con el POB y el hebreo es 'daño' en el texto principal, con nota alternativa 'maldad e iniquidad' no; mejor 'travesura/daño' tampoco. Para reflejar 'trouble' y la alternativa inglesa 'mischief', 'daño' en el texto y 'maldad' no sirve. 'Daño e iniquidad' conserva el paralelismo y evita ambigüedad. La nota a debe usar 'juramento' como alternativa contextual menos probable.
  issues:
  - severity: high
    issue: עָמָל se tradujo como 'afán'
    rationale: En este salmo describe perjuicio, trouble o mischief producido por el malvado, no diligencia, empeño ni simple ansiedad. 'Afán' puede confundir al lector y debilita la imagen de mal oculto bajo la lengua.
  - severity: medium
    issue: La nota b no sigue la alternativa del POB inglés
    rationale: El audit trail preserva 'mischief and iniquity' como alternativa a 'trouble and wickedness'. 'Miseria e iniquidad' introduce un sentido distinto ('misery') no documentado.
  - severity: low
    issue: La nota a usa 'maldición jurada'
    rationale: Como alternativa para אָלָה, el inglés documenta 'oath'. En español, 'juramento' es más natural y exacto que 'maldición jurada'.
  revised_spanish_text: Su boca está llena de maldición[a], de engaño y de opresión; debajo de su lengua hay daño y maldad[b].
  revised_footnotes:
  - marker: a
    text: O 'juramento' para 'maldición'; el sustantivo hebreo también puede denotar un juramento en algunos contextos, pero aquí el contexto de habla hostil favorece 'maldición'.
    reason: lexical_alternative
  - marker: b
    text: O 'maldad e iniquidad' para 'daño y maldad'.
    reason: lexical_alternative
