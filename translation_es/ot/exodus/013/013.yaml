revisions:
- from: Y todo primer nacido de asno lo redimirás con un cordero[a]; y si no lo redimes, le quebrarás el cuello. Y todo primer nacido de hombre entre tus hijos lo redimirás.
  to: Y todo primogénito de asno lo redimirás con un cordero[a]; y si no lo redimes, le quebrarás el cuello. Y todo primogénito humano entre tus hijos varones lo redimirás.
  rationale: Se ajusta ‘primer nacido’ a ‘primogénito’ para mayor naturalidad jurídica y bíblica en español; se cambia ‘primer nacido de hombre’ por ‘primogénito humano’ para expresar con claridad el contraste de אָדָם frente al animal; y se corrige ‘entre tus hijos’ a ‘entre tus hijos varones’ para preservar la especificidad de בְּבָנֶיךָ documentada en la auditoría inglesa.
