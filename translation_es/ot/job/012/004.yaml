revisions:
- from: Soy una burla para mi amigo[a], yo que clamé a Dios y él le respondió[b], una burla para el justo y el hombre íntegro.
  to: Soy objeto de burla para mi amigo[a], yo que clamé a Dios y él le respondió[b], objeto de burla para el justo e íntegro.
  rationale: 'Se revisa para reflejar mejor la sintaxis del hebreo y la decisión auditada en inglés: la frase final describe a una sola persona como ''justo e íntegro''. También se sustituye ''una burla'' por ''objeto de burla'' para un español más natural y preciso al referirse a una persona ridiculizada. Se conservan las dos notas textuales del POB con anclajes correctos.'
