translation:
  language: es
  text: Cuando Joab vio que la línea de batalla estaba desplegada contra él por delante y por detrás, escogió de entre todo Israel algunos de los mejores hombres[a] y los dispuso para hacer frente a Aram[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de entre todo Israel, hombres escogidos». El hebreo בָּחוּר puede significar «escogido» o «de élite» en este contexto militar.'
    reason: lexical_alternative
  - marker: b
    text: 'Nombre hebreo: «Aram»; es decir, las fuerzas arameas.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - se dio cuenta
  - reconoció
  lexicon: HALOT
  rationale: ראָה en narración militar conserva el sentido básico de percepción visual. "Vio" sigue de cerca el hebreo y mantiene el tono narrativo sin añadir una interpretación más fuerte que el texto no exige.
- source_word: פְנֵי הַמִּלְחָמָה
  english_pob_choice: the battle line
  chosen_spanish: la línea de batalla
  alternatives_spanish:
  - el frente de la batalla
  - la batalla frontal
  lexicon: HALOT
  rationale: La imagen literal es "el rostro/frente de la guerra"; en español, "línea de batalla" comunica de forma natural una formación militar opuesta, como en la decisión inglesa de POB.
- source_word: אֵלָיו פָּנִים וְאָחוֹר
  english_pob_choice: was set against him in front and in the rear
  chosen_spanish: estaba contra él por delante y por detrás
  alternatives_spanish:
  - le hacía frente por delante y por detrás
  - estaba contra él al frente y a la retaguardia
  lexicon: HALOT
  rationale: La expresión hebrea indica una amenaza desde ambos lados, con idea de encierro o cerco. "Por delante y por detrás" conserva el contraste espacial; "estaba contra él" refleja la oposición militar sin forzar una paráfrasis excesiva.
- source_word: וַיִּבְחַר
  english_pob_choice: he chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: HALOT
  rationale: בחר es el verbo común para elegir o seleccionar. "Escogió" es natural y mantiene la sencillez narrativa del hebreo.
- source_word: מִכָּל בָּחוּר בְּיִשְׂרָאֵל
  english_pob_choice: some of the best men from all Israel
  chosen_spanish: de entre todo Israel algunos de los mejores hombres
  alternatives_spanish:
  - de entre todo Israel algunos hombres escogidos
  - de entre todos los hombres selectos de Israel
  lexicon: HALOT
  rationale: בָּחוּר puede referirse a hombres escogidos o de élite en contexto militar. Siguiendo el valor partitivo de מִן, "de entre" y "algunos de" preservan que no se trata de todos, sino de una selección dentro del conjunto. "Los mejores hombres" reproduce el sentido de tropas selectas que la traducción inglesa explicó en nota.
- source_word: וַיַּעֲרֹךְ
  english_pob_choice: arranged them
  chosen_spanish: los dispuso
  alternatives_spanish:
  - los organizó
  - los alineó
  lexicon: HALOT
  rationale: ערך en contexto bélico significa ordenar o disponer tropas. "Los dispuso" es conciso y comunica la formación militar sin sonar demasiado técnico.
- source_word: לִקְרַאת אֲרָם
  english_pob_choice: to meet Aram
  chosen_spanish: para hacer frente a Aram
  alternatives_spanish:
  - para encontrarse con Aram
  - para enfrentarse a Aram
  lexicon: HALOT
  rationale: לקראת puede significar encontrarse o salir al encuentro, pero aquí el contexto militar pide el matiz de confrontación. "Para hacer frente a" expresa bien la intención bélica sin perder el verbo de confrontación. Se mantiene "Aram" como nombre propio transliterado, siguiendo el patrón de POB.
translation_notes:
  revision_awareness: El texto inglés de POB mantiene una lectura militar concreta («battle line») y una nota léxica sobre בָּחוּר, además de una nota cultural sobre Aram. No se registran revisiones posteriores en el expediente, y la concordancia de revisión indica que no hubo cambios necesarios.
  spanish_consistency_notes:
  - Se preserva "Yahvé" por defecto para el Tetragrámaton, pero este versículo no lo contiene.
  - Se mantiene "Aram" como transliteración, coherente con la política del proyecto y con la nota cultural del original inglés.
  - Se evita traducir mecánicamente como "Siria", porque el expediente inglés documenta explícitamente la forma hebrea "Aram".
  - La solución "por delante y por detrás" conserva la tensión espacial del hebreo sin introducir una imagen distinta.
  - '"Los mejores hombres" sigue la interpretación auditada de tropas escogidas; la nota ofrece la alternativa más literal.'
