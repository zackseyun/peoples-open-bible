translation:
  language: es
  text: Entonces Joiadá hizo el pacto[a] entre Yahvé y el rey y el pueblo, para que fueran un pueblo para Yahvé[b]; y también entre el rey y el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cortó el pacto», un modismo estándar que significa «hizo el pacto».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el pueblo de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרֹת
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo el pacto
  - concertó
  lexicon: HALOT
  rationale: כרת ברית es un modismo hebreo que literalmente significa ‘cortar un pacto’, pero en español natural conviene expresar el acto con ‘hizo el pacto’. Se evita calcar ‘cortar’ porque el español no lo requiere y podría sonar extraño.
- source_word: הַבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el convenio
  - la alianza
  lexicon: HALOT
  rationale: ברית puede traducirse como ‘pacto’ o ‘alianza’; aquí ‘pacto’ conserva mejor el peso formal y relacional del término sin volverlo meramente contractual. ‘Alianza’ también es posible, pero en este contexto real-cultual ‘pacto’ resulta más transparente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ‘Yahvé’. Mantiene el nombre propio divino sin sustituirlo por un título.'
- source_word: בֵּין יְהוָה וּבֵין הַמֶּלֶךְ וּבֵין הָעָם
  english_pob_choice: between Yahweh and the king and the people
  chosen_spanish: entre Yahvé, el rey y el pueblo
  alternatives_spanish:
  - entre Yahvé y el rey y el pueblo
  - entre Yahvé, el rey y la gente
  lexicon: HALOT
  rationale: La repetición de בין señala a los participantes del pacto. En español, la coordinación con comas y una sola ‘y’ final da una lectura natural sin perder la estructura triádica.
- source_word: לִהְיוֹת לְעָם לַיהוָה
  english_pob_choice: that they should be a people for Yahweh
  chosen_spanish: para que fueran un pueblo para Yahvé
  alternatives_spanish:
  - para ser un pueblo para Yahvé
  - para que fueran el pueblo de Yahvé
  lexicon: HALOT
  rationale: El infinitivo לִהְיוֹת expresa finalidad/resultante; ‘para que fueran’ comunica bien esa función en español. ‘Un pueblo para Yahvé’ conserva la relación de pertenencia/identidad sin explicitarla en forma posesiva más fuerte de lo que exige el hebreo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: ‘Pueblo’ es el equivalente más natural para עם en un contexto de comunidad pactal. ‘Gente’ debilita el valor colectivo; ‘nación’ añade un matiz político no necesario aquí.
- source_word: וּבֵין הַמֶּלֶךְ וּבֵין הָעָם
  english_pob_choice: and also between the king and the people
  chosen_spanish: y también entre el rey y el pueblo
  alternatives_spanish:
  - y entre el rey y el pueblo
  - además entre el rey y el pueblo
  lexicon: HALOT
  rationale: La segunda cláusula reproduce una relación pactal adicional. ‘Y también’ conserva el añadido del hebreo וּבֵין sin sonar forzado en español.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el nombre propio divino, no un título. Se mantiene la forma del proyecto en español, ‘Yahvé’, para preservar la referencia directa al nombre revelado de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de לִהְיוֹת לְעָם לַיהוָה
  english_pob_reading: that they should be a people for Yahweh
  chosen_spanish_reading: para que fueran un pueblo para Yahvé
  alternative_spanish_readings:
  - para que fueran el pueblo de Yahvé
  - para ser un pueblo para Yahvé
  rationale: Se conserva la formulación relacional del hebreo, que expresa pertenencia y finalidad pactal. ‘El pueblo de Yahvé’ es una paráfrasis válida, pero ‘un pueblo para Yahvé’ retiene mejor la forma del texto y su tensión de identidad/relación.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
translation_notes:
  revision_awareness: El contexto auditado del inglés no requirió cambios sustantivos en el sentido del versículo. La revisión más reciente lo marcó como sin cambios, con solo observaciones menores; por eso el español sigue de cerca la estructura hebrea y las decisiones ya asentadas, especialmente sobre ברית, בין y לִהְיוֹת לְעָם לַיהוָה.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se prefiere ‘pacto’ para ברית en un contexto formal y cultual.
  - Se mantiene ‘pueblo’ para עם en ambos usos del versículo.
  - La puntuación refleja la repetición de las cláusulas con entre para conservar la estructura hebrea.
