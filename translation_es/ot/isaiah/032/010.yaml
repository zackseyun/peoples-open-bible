revisions:
- from: En poco más de un año[a] temblarán, ustedes, mujeres confiadas[b], porque se acabará la vendimia; no vendrá la cosecha de frutos[c].
  to: En poco más de un año[a] ustedes temblarán, mujeres complacientes[b], porque se acabará la vendimia; no vendrá la cosecha de frutos[c].
  rationale: Se corrigió la persona verbal para reflejar la segunda persona femenina plural del hebreo y se hizo más natural el orden en español. Además, se ajustó בֹּטְחוֹת a «mujeres complacientes» para preservar la matización negativa documentada por el POB, dejando las alternativas más neutras en la nota. Se mantuvieron las demás decisiones léxicas porque son fieles y claras.
