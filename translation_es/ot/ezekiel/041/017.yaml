translation:
  language: es
  text: Encima de la entrada, y hasta la casa interior[a], y afuera, y sobre todo el muro alrededor, por todos lados, en la parte interior y en la parte exterior, había medidas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Casa interior» también puede entenderse como «templo interior», porque «casa» en la visión del templo de Ezequiel suele referirse a la estructura del templo.
    reason: lexical_alternative
  - marker: b
    text: O «dimensiones». El sustantivo hebreo puede referirse a medidas o a especificaciones dimensionales en un contexto arquitectónico.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעַל הַפֶּתַח
  english_pob_choice: above the doorway
  chosen_spanish: encima de la entrada
  alternatives_spanish:
  - sobre la entrada
  - encima del umbral
  lexicon: HALOT
  rationale: מֵעַל señala posición superior respecto de la abertura; en español, «encima de la entrada» conserva el sentido arquitectónico con naturalidad. «Entrada» evita la repetición rígida de un calco literal y mantiene la imagen del acceso.
- source_word: וְעַד הַבַּיִת הַפְּנִימִי
  english_pob_choice: and as far as the inner house
  chosen_spanish: y hasta la casa interior
  alternatives_spanish:
  - y hasta el templo interior
  - y hasta la casa interna
  lexicon: HALOT
  rationale: בַּיִת en visión del templo puede referirse al edificio del templo; «casa interior» sigue de cerca la metáfora hebrea sin imponer «templo» donde el texto no lo dice explícitamente. «Hasta» reproduce la extensión espacial de וְעַד.
- source_word: וְלַחוּץ
  english_pob_choice: and outside
  chosen_spanish: y afuera
  alternatives_spanish:
  - y al exterior
  - y por fuera
  lexicon: HALOT
  rationale: El término marca la zona exterior en contraste con la interior. «Afuera» es breve, idiomático y mantiene la oposición espacial.
- source_word: וְאֶל כָּל הַקִּיר סָבִיב סָבִיב
  english_pob_choice: and on all the wall all around
  chosen_spanish: y sobre todo el muro alrededor
  alternatives_spanish:
  - y sobre todo el muro en derredor
  - y en todo el muro alrededor
  lexicon: HALOT
  rationale: אֶל aquí funciona relacionalmente en una descripción arquitectónica; «sobre» expresa bien la distribución de las medidas sobre la superficie del muro. Se conserva la fuerza enfática de סָבִיב סָבִיב con «alrededor».
- source_word: בַּפְּנִימִי וּבַחִיצוֹן
  english_pob_choice: in the inner part and in the outer part
  chosen_spanish: en la parte interior y en la parte exterior
  alternatives_spanish:
  - en el interior y en el exterior
  - en la zona interior y en la zona exterior
  lexicon: HALOT
  rationale: Los adjetivos funcionan sustantivamente y contrastan dos ámbitos. «Parte interior» / «parte exterior» preserva esa distinción con claridad y sin forzar tecnicismos.
- source_word: מִדּוֹת
  english_pob_choice: were measurements
  chosen_spanish: había medidas
  alternatives_spanish:
  - eran medidas
  - había dimensiones
  lexicon: HALOT
  rationale: El sustantivo plural puede significar medidas o dimensiones. En español, la elipsis hebrea se resuelve con «había» para una frase natural; «medidas» conserva la amplitud semántica y el carácter arquitectónico.
theological_decisions:
- issue: בַּיִת הַפְּנִימִי en el templo de Ezequiel
  english_pob_reading: Inner house may also be rendered inner temple, since house in Ezekiel's temple vision often refers to the temple structure.
  chosen_spanish_reading: casa interior
  alternative_spanish_readings:
  - templo interior
  - casa interna
  rationale: Se conserva «casa» para mantener la imagen hebrea y no cerrar prematuramente la referencia. En contexto, el lector entiende que se trata del complejo del templo; la alternativa «templo interior» es posible, pero explicita más de lo que el hebreo exige en esta línea.
  doctrine_reference: Ezequiel 40–48; uso templario de בַּיִת
- issue: Lectura elíptica de מִדּוֹת
  english_pob_reading: were measurements
  chosen_spanish_reading: había medidas
  alternative_spanish_readings:
  - eran medidas
  - había dimensiones
  rationale: El hebreo omite un verbo explícito; el español necesita completarlo. «Había» reproduce una constatación descriptiva sin introducir una acción inexistente, y «medidas» conserva la ambigüedad entre medidas y dimensiones.
  doctrine_reference: Sintaxis elíptica hebrea; contexto arquitectónico
translation_notes:
  revision_awareness: 'El inglés auditado mantiene la estructura espacial y la elipsis final («were measurements»). La versión española conserva esa misma secuencia, evita ampliar el texto con elementos no presentes y mantiene abiertas las dos ambigüedades principales documentadas: מִדּוֹת como «medidas/dimensiones» y בַּיִת como «casa/templo» en contexto visionario.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «casa» en lugar de «templo» como opción base para respetar la metáfora hebrea documentada por el audit trail.
  - «Medidas» se usó como término amplio y arquitectónico, compatible con la nota lexical sobre «dimensiones».
  - La duplicación de סָבִיב se conservó con «alrededor» para reflejar el énfasis enfático del hebreo.
