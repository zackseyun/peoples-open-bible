theological_decisions:
- issue: How explicitly to construe the sanctity phrase קדשך
  chosen_reading: the city of your holiness
  alternative_readings:
  - your holy city
  - the city of your sanctuary
  rationale: The Hebrew witness is primary and supports a genitival expression without requiring an interpretive expansion. This preserves the elevated theological language and avoids over-specifying whether the reference is to Jerusalem's holiness or to God's sanctuary within it. The alternatives are preserved in a footnote because the phrase is somewhat compressed and the source validation notes a minor mismatch.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Use of the Greek parallel in relation to the Hebrew
  chosen_reading: Translate the Hebrew line as a prayer for mercy on Jerusalem, while noting the Greek parallel diverges substantially.
  alternative_readings:
  - Translate from the Greek parallel instead
  - Harmonize Hebrew and Greek into a composite line
  rationale: For Sirach, surviving Hebrew has primacy where available. Here the supplied Greek parallel is materially different in content, so it is treated as a textual variant worth preserving rather than as the main text. This maintains transparency about source-level uncertainty without abandoning the Hebrew witness.
