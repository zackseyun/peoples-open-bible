revisions:
- from: Pero Yahvé afligió a Faraón y a su casa con grandes plagas[a], por causa de Sarai, esposa de Abram.
  to: Pero Yahvé afligió a Faraón y a los de su casa con grandes plagas[a], por causa de Sarai, esposa de Abram.
  rationale: Se ajusta 'y a su casa' a 'y a los de su casa' para preservar claramente el sentido de household en español natural y evitar la lectura de edificio. También se amplía la nota al pie para reflejar con mayor fidelidad la alternativa léxica documentada en el POB inglés respecto al verbo y al sustantivo.
