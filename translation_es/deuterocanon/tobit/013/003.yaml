translation:
  language: es
  text: Denle gracias[a], hijos de Israel, ante las naciones, porque él mismo nos ha dispersado entre ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Confiésenlo», o «Alábenlo»; el verbo griego puede abarcar confesión, reconocimiento, acción de gracias y alabanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξομολογεῖσθε
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Confiesen
  - Alábenlo
  - Reconózcanlo
  lexicon: BDAG
  rationale: El verbo griego admite confesión, reconocimiento, acción de gracias y alabanza. En este contexto de exhortación pública por las obras de Dios, «Den gracias» expresa bien el sentido cultual sin restringirlo a la confesión de pecado.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  lexicon: BDAG
  rationale: El dativo se refiere a Dios y se conserva de manera directa y natural en español.
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: O sons of Israel
  chosen_spanish: hijos de Israel
  alternatives_spanish:
  - hijos varones de Israel
  - pueblo de Israel
  lexicon: BDAG
  rationale: El griego dice literalmente «hijos». Se mantiene la referencia masculina plural y el vocativo se integra de forma natural en español sin añadir una partícula exclamativa innecesaria.
- source_word: ἐνώπιον τῶν ἐθνῶν
  english_pob_choice: before the nations
  chosen_spanish: delante de las naciones
  alternatives_spanish:
  - en presencia de las naciones
  - ante las naciones
  lexicon: BDAG
  rationale: «Delante de» conserva la idea pública y testimonial de ἐνώπιον mejor que una forma más abstracta; además suena idiomático en español actual.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La conjunción introduce la razón de la exhortación; «porque» expresa con claridad el valor causal.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - él solo
  lexicon: BDAG
  rationale: Se conserva el énfasis del pronombre sin convertirlo en una exclusividad más fuerte de la que exige el griego.
- source_word: διέσπειρεν
  english_pob_choice: has scattered
  chosen_spanish: ha dispersado
  alternatives_spanish:
  - ha esparcido
  - dispersó
  lexicon: BDAG
  rationale: «Dispersado» reproduce bien la acción de dividir y esparcir a Israel; es un término bíblico claro en español y evita una posible connotación demasiado literal de «sembrar».
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: Pronombre objeto directo conservado de forma simple y natural.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellas
  alternatives_spanish:
  - entre ellos
  - en medio de ellas
  lexicon: BDAG
  rationale: El antecedente inmediato es «las naciones», femenino plural en español, por lo que «entre ellas» expresa con naturalidad el sentido distributivo de ἐν αὐτοῖς.
theological_decisions:
- issue: Atribución de la dispersión a Dios
  english_pob_reading: because he himself has scattered us among them
  chosen_spanish_reading: porque él mismo nos ha dispersado entre ellas
  alternative_spanish_readings:
  - porque él mismo nos dispersó entre ellas
  - pues él mismo nos ha esparcido entre ellas
  rationale: Se mantiene sin suavizar la afirmación teológica de que Dios es quien dispersa a Israel. La forma perfecta en español enlaza la acción pasada con su efecto presente, como en la lectura inglesa.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El texto griego base coincide en sustancia con el contexto auditado en inglés; no se requieren revisiones textuales adicionales. Se mantuvo la decisión interpretativa clave de traducir ἐξομολογεῖσθε con un verbo de acción de gracias/alabanza, y de conservar el sujeto enfático «él mismo».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el nombre divino porque este versículo usa un pronombre en el griego, no el tetragrama ni κύριος.
  - Se mantuvo «hijos de Israel» para respetar la forma masculina plural del griego.
  - «Entre ellas» retoma correctamente «las naciones» en español y evita una ambigüedad de género con el referente colectivo.
