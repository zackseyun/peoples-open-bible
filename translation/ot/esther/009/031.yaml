id: EST.9.31
reference: Esther 9:31
source:
  edition: WLC
  text: לְ/קַיֵּ֡ם אֵת יְמֵי֩ הַ/פֻּרִ֨ים הָ/אֵ֜לֶּה בִּ/זְמַנֵּי/הֶ֗ם כַּ/אֲשֶׁר֩ קִיַּ֨ם עֲלֵי/הֶ֜ם מָרְדֳּכַ֤י הַ/יְּהוּדִי֙ וְ/אֶסְתֵּ֣ר הַ/מַּלְכָּ֔ה וְ/כַ/אֲשֶׁ֛ר קִיְּמ֥וּ עַל נַפְשָׁ֖/ם וְ/עַל זַרְעָ֑/ם דִּבְרֵ֥י הַ/צֹּמ֖וֹת וְ/זַעֲקָתָֽ/ם־־־׃
translation:
  text: to establish these days of Purim at their appointed times[a], just as Mordecai the Jew and Esther the queen had established for them[b], and just as they had established for themselves and for their offspring the matters of the fasts and their cry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confirm' instead of 'establish' for the repeated Hebrew verb קים in this verse; the sense is the formal fixing or ratifying of the observance.
    reason: lexical_alternative
  - marker: b
    text: '''Their outcry'' may also be rendered ''their cry'' or ''their lament.'' The Hebrew likely refers to the community''s cries associated with the fasts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקַיֵּם
  chosen: to establish
  alternatives:
  - to confirm
  - to observe
  lexicon: HALOT
  rationale: The infinitive of קום in the piel here carries the sense of causing something to stand or be established. 'Establish' fits the legal/administrative context of instituting the observance of Purim. 'Observe' is too interpretive at this point, while 'confirm' is possible but less clear in English.
- source_word: יְמֵי הַפֻּרִים הָאֵלֶּה
  chosen: these days of Purim
  alternatives:
  - these Purim days
  lexicon: HALOT
  rationale: A straightforward construct rendering preserving the demonstrative emphasis on the specific festival days already under discussion.
- source_word: בִּזְמַנֵּיהֶם
  chosen: at their appointed times
  alternatives:
  - in their times
  - at their set times
  - in their seasons
  lexicon: HALOT
  rationale: זְמָן denotes an appointed or fixed time. 'Appointed times' communicates the scheduled observance more naturally than the more literal 'in their times.'
- source_word: כַּאֲשֶׁר קִיַּם עֲלֵיהֶם
  chosen: just as ... had established for them
  alternatives:
  - just as ... had imposed on them
  - just as ... had confirmed for them
  lexicon: HALOT
  rationale: The phrase indicates prior institution or binding establishment upon the community. 'Established for them' preserves the formal sense without overreading coercion implied by 'imposed.'
- source_word: מָרְדֳּכַי הַיְּהוּדִי
  chosen: Mordecai the Jew
  alternatives:
  - Mordecai the Judean
  lexicon: HALOT
  rationale: The conventional rendering 'the Jew' best fits the ethnic designation in Esther. 'Judean' is possible but can sound overly geographic in this context.
- source_word: אֶסְתֵּר הַמַּלְכָּה
  chosen: Esther the queen
  alternatives:
  - Queen Esther
  lexicon: HALOT
  rationale: The Hebrew apposition is most directly represented by 'Esther the queen.' 'Queen Esther' is idiomatic English but slightly less formally aligned with the source order.
- source_word: וְכַאֲשֶׁר קִיְּמוּ עַל נַפְשָׁם וְעַל זַרְעָם
  chosen: and just as they had established for themselves and for their offspring
  alternatives:
  - and just as they had undertaken for themselves and their descendants
  - and just as they had obligated themselves and their seed
  lexicon: HALOT
  rationale: The reflexive sense with עַל plus נֶפֶשׁ indicates taking an obligation upon themselves. 'Established for themselves' keeps lexical continuity with קים while remaining readable. 'Offspring' is a natural rendering of זֶרַע here.
- source_word: זַרְעָם
  chosen: their offspring
  alternatives:
  - their descendants
  - their seed
  lexicon: HALOT
  rationale: '''Offspring'' is clear modern English and fits the familial continuity in view. ''Seed'' is too literal here; ''descendants'' is also possible but slightly more formal.'
- source_word: דִּבְרֵי הַצֹּמוֹת וְזַעֲקָתָם
  chosen: the matters of the fasts and their outcry
  alternatives:
  - the words concerning the fasts and their cry
  - the observances of the fasts and their lament
  lexicon: HALOT
  rationale: דִּבְרֵי often means 'matters' or 'affairs of' in administrative prose. צֹּמוֹת is plainly 'fasts.' זַעֲקָה denotes a cry or outcry, likely in lament or supplication. 'Outcry' preserves the intensity without narrowing it to prayer alone.
