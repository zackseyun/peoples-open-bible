translation:
  language: es
  text: Cuando envíe contra ellos las flechas mortales[a] del hambre, que son para destrucción, que enviaré para destruirlos, entonces añadiré hambre sobre ustedes y quebraré para ustedes el sostén del pan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las flechas dañinas/desastrosas del hambre».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el bastón del pan», un modismo para la provisión o el sostén del pan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשַׁלְּחִי
  english_pob_choice: When I send
  chosen_spanish: Cuando envíe
  alternatives_spanish:
  - Al enviar
  - Cuando yo envíe
  lexicon: HALOT
  rationale: El prefijo ב con infinitivo constructo introduce una cláusula temporal. En español, «Cuando envíe» conserva el valor temporal y el habla directa divina sin sobrecargar la sintaxis.
- source_word: חִצֵּי הָרָעָב
  english_pob_choice: the arrows of famine
  chosen_spanish: las flechas del hambre
  alternatives_spanish:
  - las flechas de la hambruna
  - las flechas del hambre
  lexicon: HALOT
  rationale: Se conserva la metáfora de proyectiles asociados al hambre. «Hambre» mantiene la imagen breve y directa del hebreo; «hambruna» explicita la calamidad, pero alarga más el sintagma.
- source_word: הָרָעִים
  english_pob_choice: deadly
  chosen_spanish: mortales
  alternatives_spanish:
  - dañinas
  - funestas
  - malas
  lexicon: HALOT
  rationale: El adjetivo hebreo resalta su efecto destructor. «Mortales» comunica en español la fuerza devastadora sin moralizar la calificación.
- source_word: בָּהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - entre ellos
  lexicon: HALOT
  rationale: Con el verbo de envío, el pronombre señala dirección hostil. «Contra ellos» transmite mejor el blanco del juicio que una traducción más neutra.
- source_word: לְמַשְׁחִית
  english_pob_choice: for destruction
  chosen_spanish: para destrucción
  alternatives_spanish:
  - para ruina
  - con fin destructivo
  lexicon: HALOT
  rationale: La construcción expresa propósito o resultado. «Para destrucción» preserva esa relación de finalidad y mantiene la cercanía al hebreo.
- source_word: לְשַׁחֶתְכֶם
  english_pob_choice: to destroy you
  chosen_spanish: para destruirlos
  alternatives_spanish:
  - para arruinarlos
  - para devastarlos
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa finalidad. Se traduce con un infinitivo natural en español. Se eligió «los» por concordar con un destinatario plural implícito masculino en el contexto; «ustedes» queda reservado para la segunda persona en la siguiente cláusula.
- source_word: וְרָעָב אֹסֵף עֲלֵיכֶם
  english_pob_choice: then I will add famine upon you
  chosen_spanish: entonces añadiré hambre sobre ustedes
  alternatives_spanish:
  - y acumularé hambre sobre ustedes
  - y aumentaré el hambre sobre ustedes
  lexicon: HALOT
  rationale: אָסַף en hifil significa «añadir, incrementar». «Añadiré hambre sobre ustedes» conserva la imagen de acumulación/judicio y la preposición «sobre» refleja עַל.
- source_word: וְשָׁבַרְתִּי לָכֶם
  english_pob_choice: and break for you
  chosen_spanish: y quebrantaré para ustedes
  alternatives_spanish:
  - y romperé para ustedes
  - y quebraré para ustedes
  lexicon: HALOT
  rationale: Se conserva la estructura con ל como complemento indirecto, aunque el sentido es adversativo. «Quebrantaré» permite enlazar de manera más natural con la metáfora siguiente.
- source_word: מַטֵּה לָחֶם
  english_pob_choice: the staff of bread
  chosen_spanish: el bastón del pan
  alternatives_spanish:
  - el báculo del pan
  - el soporte del pan
  - el sustento del pan
  lexicon: HALOT
  rationale: Se preserva la metáfora transparente del hebreo. «Bastón» refleja מַטֵּה de modo directo; «del pan» mantiene el genitivo concreto. El sentido idiomático de suministro o sostén se deja para nota.
theological_decisions:
- issue: Agencia divina directa en el juicio
  english_pob_reading: Retain first-person divine action ('I send,' 'I will add,' 'I will break') without softening.
  chosen_spanish_reading: Mantener la acción divina en primera persona sin suavizarla.
  alternative_spanish_readings:
  - 'Hacer impersonal la frase: «vendrá hambre»'
  - 'Desplazar la agencia: «el hambre caerá»'
  rationale: El hebreo atribuye explícitamente el juicio a Dios. La versión española conserva esa agencia para no diluir el peso teológico del oráculo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Conservación de la metáfora de juicio
  english_pob_reading: Preserve the metaphors 'arrows of famine' and 'staff of bread' in the main text.
  chosen_spanish_reading: Conservar en el cuerpo del texto las metáforas de flechas y del bastón del pan.
  alternative_spanish_readings:
  - Sustituir por «hambre mortífera» y «sustento de pan»
  - 'Interpretar totalmente: «escasez de alimento»'
  rationale: La traducción busca equivalencia óptima y transparencia al texto fuente. Se mantiene la imagen principal y se explica su valor idiomático en nota, en vez de reemplazarla por una paráfrasis.
  doctrine_reference: Translation philosophy §1, §5, §6
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el control previo y no requiere revisiones sustanciales; se mantuvieron la agencia divina en primera persona y las dos metáforas principales, ajustando la formulación española para mayor naturalidad y transparencia.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se prefirió «hambre» sobre «hambruna» para seguir de cerca el constructo hebreo y mantener la metáfora compacta.
  - Se conservó la segunda persona plural con «ustedes» en la cláusula final para reflejar el sufijo hebreo, aunque la cláusula anterior usa un objeto pronominal de tercera persona según el flujo contextual.
