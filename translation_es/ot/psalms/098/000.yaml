review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: encabezado de salmo, imperativo plural, nombre divino Yahvé, motivo de alabanza y la cláusula final sobre la mano derecha y el brazo santo. Sin embargo, la nota [a] no corresponde a una verdadera alternativa textual o léxica relevante del original ni del audit trail inglés; además, la cláusula final puede afinarse para reflejar mejor el matiz de הוֹשִׁיעָה לּוֹ como ‘ha obrado/logrado salvación para él’ en vez de ‘brindado’, que suena algo menos directo y menos fuerte que el hebreo.'
  spanish_quality_summary: El español es claro y digno. ‘Canten a Yahvé un cántico nuevo’ suena natural y eclesial. ‘Cosas maravillosas’ es aceptable, aunque ‘maravillas’ sería más idiomático y compacto. El principal ajuste de estilo es la nota al pie, que actualmente es innecesaria y débil, y un leve fortalecimiento verbal en la última cláusula para mejor fidelidad y naturalidad bíblica.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: ‘Yahvé’ está correctamente usado; no hay conflictos con términos doctrinales clave. ‘Cántico’ encaja bien para שִׁיר חָדָשׁ. La decisión sobre הוֹשִׁיעָה לּוֹ debe acercarse más a ‘ha logrado/obrado salvación para él’, en línea con el audit trail inglés y la nota léxica preservada allí.'
  issues:
  - severity: medium
    issue: La nota [a] sobre ‘cántico nuevo’ no preserva la alternativa significativa del audit trail inglés.
    rationale: La nota inglesa trata la ambigüedad de הוֹשִׁיעָה לּוֹ (‘have saved him’ / ‘have won salvation for him’), no una simple reformulación estilística de ‘new song’. La nota española actual aporta una pseudoalternativa trivial y desvía la atención del verdadero punto léxico.
  - severity: medium
    issue: ‘Le han brindado salvación’ debilita el matiz agentivo de la acción poderosa de Yahvé.
    rationale: ‘Brindar’ en español puede sonar más como ofrecer que como efectuar o lograr. El hebreo, y el audit trail inglés (‘have brought/worked salvation for him’), apuntan a una salvación realizada por su propia mano y brazo.
  - severity: low
    issue: ‘Ha hecho cosas maravillosas’ es fiel pero algo menos idiomático que ‘ha hecho maravillas’.
    rationale: No es incorrecto, pero ‘ha hecho maravillas’ suena más natural y poético en español bíblico contemporáneo. Aun así, este punto no es imprescindible si se conserva la formulación actual.
  revised_spanish_text: Salmo. Canten a Yahvé un cántico nuevo, porque ha hecho maravillas; su mano derecha y su santo brazo le han logrado salvación[a].
  revised_footnotes:
