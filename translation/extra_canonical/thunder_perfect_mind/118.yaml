translation:
  text: 'And there are ignorances,

    and passions that are about to come,

    and pleasures toward you[a],

    and a power that you will take[b],

    a clear‑mindedness[c]—

    they will run up into their emptiness[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲡⲣⲟⲥ ⲡⲉ lacks an explicit object; “toward you” is inferred from the surrounding
      exhortatory context.
    reason: alignment_note
  - marker: b
    text: ⲉⲧⲛⲁϩⲧⲉ ⲙⲙⲟ is parsed as “that you (pl.) will take it”; the verb’s nuance
      could be “receive” or “seize,” and the subject might alternatively be “they.”
    reason: alternative_reading
  - marker: c
    text: The form ϣⲁⲛⲧⲟⲩⲛⲏⲫⲉ is verbal (“that they may be clear‑minded/sober”); rendered
      as a noun to keep the catalog parallel. It may instead be an infinitival/relative
      clause.
    reason: alignment_note
  - marker: d
    text: ⲡⲟⲩⲕⲏⲛⲏ is taken as “their emptiness” (cf. Gk κενή/κένωμα); “their poverty”
      is also possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϩⲉⲛⲙⲛⲧⲁⲧⲁⲙⲁϩⲧⲉ
  chosen: ignorances
  alternatives:
  - states of not‑knowing
  - ignorance (collective)
  lexicon: Crum, Coptic Dictionary s.v. ⲙⲛⲧⲁⲧⲁⲙⲁϩⲧⲉ
  rationale: ⲙⲛⲧ‑ nominalizes the negative of ⲁⲙⲁϩⲧⲉ/ⲙⲁϩⲧⲉ (“know/learn”), yielding
    “not‑knowing; ignorance.” Plural article ϩⲉⲛ → “ignorances.”
- source_word: ϩⲉⲛⲡⲁⲑⲟⲥ
  chosen: passions
  alternatives:
  - sufferings
  lexicon: Loan from Gk πάθος; Crum s.v. ⲡⲁⲑⲟⲥ
  rationale: In ethical catalogues in NH texts, πάθος typically denotes affective
    passions rather than physical sufferings.
- source_word: ⲉⲧϣⲁⲉⲓⲏⲧ
  chosen: that are about to come
  alternatives:
  - that will come
  - that are going to come
  lexicon: 'Layton, Coptic Grammar: ⲉⲧ‑ relative + future ϣⲁ‑ + ⲉⲓⲏⲧ “come”'
  rationale: Relative clause with future nuance (“about to”).
- source_word: ϩⲉⲛⲏⲇⲟⲛⲏ
  chosen: pleasures
  alternatives:
  - delights
  - desires
  lexicon: Loan from Gk ἡδονή; Crum s.v. ⲏⲇⲟⲛⲏ
  rationale: Default ethical sense “pleasures.”
- source_word: ⲡⲣⲟⲥ
  chosen: toward
  alternatives:
  - against
  - with regard to
  lexicon: Loan from Gk πρός
  rationale: Basic directional sense retained; object of the preposition is contextually
    supplied in translation (see footnote).
- source_word: ⲟⲩⲉⲓϣ
  chosen: a power
  alternatives:
  - a strength
  - an ability
  lexicon: Crum s.v. ⲉⲓϣ “strength, might”
  rationale: In Thunder’s idiom “power” is thematically apt; indefinite article ⲟⲩ
    → “a power.”
- source_word: ⲉⲧⲛⲁϩⲧⲉ ⲙⲙⲟ
  chosen: that you will take
  alternatives:
  - that you will seize
  - that you will receive
  lexicon: Crum s.v. (verb uncertain; cf. ϩⲧⲉ/ϩⲧⲏ semantic field “take/hold”); Layton
    on ⲉⲧ‑ + future ⲛⲁ‑ 2pl
  rationale: Parsing ⲉⲧⲛⲁ‑ as relative + 2pl future; object‑clitic ⲙⲙⲟ = “it.” Exact
    verb nuance uncertain; “take” chosen as minimally interpretive.
- source_word: ϣⲁⲛⲧⲟⲩⲛⲏⲫⲉ
  chosen: clear‑mindedness
  alternatives:
  - be clear‑minded
  - be sober
  lexicon: Loan from Gk νήφω “be sober/clear‑minded”; see doctrinal glossary νήφω
    → clear‑minded
  rationale: Form looks verbal; rendered as a nominal to keep list‑parallelism while
    flagging uncertainty in notes.
- source_word: ⲛⲥⲉ ⲡⲱⲧ
  chosen: they will run
  alternatives:
  - they will rush
  - they will flee
  lexicon: Crum s.v. ⲡⲱⲧ “run, flee”
  rationale: Future 3pl marker ⲛⲥⲉ with ⲡⲱⲧ.
- source_word: ⲉϩⲣⲁⲓ
  chosen: up
  alternatives:
  - upward
  lexicon: Crum s.v. ⲉϩⲣⲁⲓ
  rationale: Basic directional adverb retained.
- source_word: ⲡⲟⲩⲕⲏⲛⲏ
  chosen: their emptiness
  alternatives:
  - their poverty
  lexicon: Loan from Gk κενή/κένωμα “emptiness” (orthographic ⲕⲏⲛⲏ ~ ⲕⲉⲛⲏ); cf. Crum
    s.v. ⲕⲉⲛⲏ
  rationale: Context of running “up into” fits metaphoric “emptiness/void” motif common
    in NH; “poverty” remains possible.
parallelism_check: 'The lines form a catalog introduced by repeated “and …” items:
  ignorances / passions (with a future relative) / pleasures (directional) / a power
  (future relative) / a (nominalized) clear‑mindedness, culminating in a result/action
  (“they will run up into their emptiness”). This preserves the asyndetic, piling
  cadence of the source.'
voice_check: Thunder’s voice here shifts from first‑person assertions to admonitory
  inventory; the rendering keeps the stark, list‑like strangeness and avoids harmonizing
  or explanatory smoothing.
alignment_risk_note: 'Overall mapping confidence is low. The consult English (“He
  who stands created me …”) does not match the Coptic lexis here, suggesting a segment
  misalignment. Several micro‑parses are uncertain: (1) ⲡⲣⲟⲥ ⲡⲉ lacks an explicit
  object, so “toward you” is inferred; (2) ⲉⲧⲛⲁϩⲧⲉ ⲙⲙⲟ is parsed as a 2pl future “you
  will take it,” but the verb ϩⲧⲉ here is not fully secure; (3) ⲟⲩ ϣⲁⲛⲧⲟⲩⲛⲏⲫⲉ is treated
  as a nominal for list‑parallelism though it may be verbal; (4) ⲡⲟⲩⲕⲏⲛⲏ is read as
  “their emptiness” (kenē), but “their poverty” is a viable alternative. Expect re‑alignment
  when consulted against a critical Sahidic transcription.'
