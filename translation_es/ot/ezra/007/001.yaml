translation:
  language: es
  text: Ahora bien, después de estas cosas, en el reinado de Artajerjes, rey de Persia, Esdras, hijo de[a] Seraías, hijo de Azarías, hijo de Hilcías—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En genealogías hebreas, «hijo de» también puede indicar un descendiente más remoto, no solo una relación inmediata padre-hijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחַר
  english_pob_choice: Now after
  chosen_spanish: Ahora bien, después de
  alternatives_spanish:
  - Y después de
  - Después de
  lexicon: HALOT
  rationale: El hebreo combina un enlace narrativo con una indicación temporal. «Ahora bien, después de» conserva ese arranque discursivo sin volverlo torpemente literal.
- source_word: הַ/דְּבָרִים הָ/אֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos hechos
  - estos asuntos
  lexicon: HALOT
  rationale: דְּבָרִים aquí funciona de manera amplia para lo ya narrado. «Estas cosas» reproduce bien la deixis y evita una paráfrasis innecesaria.
- source_word: בְּ/מַלְכ֖וּת
  english_pob_choice: in the reign of
  chosen_spanish: en el reinado de
  alternatives_spanish:
  - durante el reinado de
  - en la monarquía de
  lexicon: HALOT
  rationale: El sustantivo señala el período del gobierno real, no el territorio. «En el reinado de» es la equivalencia natural y precisa en español.
- source_word: אַרְתַּחְשַׁ֣סְתְּא
  english_pob_choice: Artaxerxes
  chosen_spanish: Artajerjes
  alternatives_spanish:
  - Artajerjes I
  lexicon: Convención histórica española
  rationale: En español bíblico e histórico, el nombre propio se expresa de forma estable como «Artajerjes».
- source_word: מֶֽלֶךְ פָּרָ֑ס
  english_pob_choice: king of Persia
  chosen_spanish: rey de Persia
  alternatives_spanish:
  - el rey de Persia
  lexicon: HALOT
  rationale: La apposición identifica a Artajerjes. «Rey de Persia» reproduce la construcción sin sobrecargarla con un artículo innecesario.
- source_word: עֶזְרָא
  english_pob_choice: Ezra
  chosen_spanish: Esdras
  alternatives_spanish:
  - Ezra
  lexicon: Convención bíblica española
  rationale: 'El nombre propio tiene forma tradicional en español bíblico: «Esdras».'
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En la serie genealógica, «hijo de» preserva la fórmula hebrea. La posibilidad de una descendencia más amplia se mantiene implícita, como en la nota de la POB inglesa.
- source_word: שְׂרָיָה
  english_pob_choice: Seraiah
  chosen_spanish: Seraías
  alternatives_spanish:
  - Seraya
  lexicon: Convención bíblica española
  rationale: Nombre propio con forma tradicional en español bíblico.
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  lexicon: Convención bíblica española
  rationale: Nombre propio con forma tradicional en español bíblico.
- source_word: חִלְקִיָּה
  english_pob_choice: Hilkiah
  chosen_spanish: Hilkías
  alternatives_spanish:
  - Jilquías
  lexicon: Convención bíblica española
  rationale: Se adopta una transliteración reconocible en español bíblico; «Hilkías» mantiene cercanía formal al hebreo y es inteligible en contextos de estudio.
theological_decisions:
- issue: Alcance genealógico de בן en una cadena de ascendencia
  english_pob_reading: Hebrew 'son of' in genealogies can also denote a more remote descendant, not only an immediate father-son relationship.
  chosen_spanish_reading: «hijo de» en la genealogía, con la comprensión de que puede señalar también un descendiente más remoto.
  alternative_spanish_readings:
  - «descendiente de»
  - «proveniente de»
  rationale: La forma principal conserva la fórmula del texto; la nota evita imponer una relación biológica estricta que el hebreo no exige.
  doctrine_reference: Uso genealógico bíblico de בן
- issue: Función del encabezado temporal y narrativo
  english_pob_reading: Now after these things
  chosen_spanish_reading: «Ahora bien, después de estas cosas» como transición narrativa que enlaza con lo anterior.
  alternative_spanish_readings:
  - «Después de estas cosas»
  - «Y después de estas cosas»
  rationale: 'No hay carga doctrinal especial, pero sí una decisión de flujo discursivo: mantener el enlace entre secciones sin perder naturalidad en español.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el perfil de la POB inglesa sin cambios relevantes: se mantiene la apertura narrativa, el valor genealógico de בן y la transliteración de los nombres propios con formas españolas bíblicamente establecidas. No se detectaron variantes textuales ni revisiones aplicadas en el audit trail.'
  spanish_consistency_notes:
  - Se usó «Esdras» como forma tradicional del nombre propio, coherente con el uso bíblico en español.
  - Se evitó «SEÑOR» porque no aparece el Tetragrámaton ni un equivalente divino en este versículo.
  - La cadena genealógica se mantuvo con «hijo de» para conservar el patrón hebreo y su posible amplitud semántica.
