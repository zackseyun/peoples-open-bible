translation:
  language: es
  text: 'Entonces Manoa suplicó a Yahvé y dijo[a]: «Por favor, Señor[b], que el hombre de Dios[c] que tú enviaste vuelva a nosotros y nos enseñe qué debemos hacer con el muchacho que ha de nacer[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rogó» / «pidió con insistencia»; el verbo hebreo expresa una súplica ferviente.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea es una fórmula cortés de ruego; también podría traducirse «Por favor, mi Señor».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «el hombre de Dios». Manoa habla según su comprensión actual, sin identificar todavía al visitante con mayor precisión.'
    reason: alternative_reading
  - marker: d
    text: 'O «con el niño que ha de nacer». El hebreo es masculino: «con el muchacho que ha de nacer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּעְתַּר
  english_pob_choice: entreated
  chosen_spanish: suplicó
  alternatives_spanish:
  - imploró
  - rogó
  - oró fervientemente
  lexicon: HALOT
  rationale: El verbo expresa una súplica intensa y dirigida a Dios; en español, "suplicó" conserva esa fuerza de entreaty sin volverse rígido. "Imploró" también es posible, pero "suplicó" suena un poco más natural en este contexto narrativo y devocional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino del tetragrama se mantiene como forma transliterada en español. "Yahvé" es la opción POB de referencia en español; evita la sustitución por un título y preserva el nombre personal del pacto.
- source_word: בִּי אֲדֹנָי
  english_pob_choice: Please, Lord
  chosen_spanish: Por favor, Señor
  alternatives_spanish:
  - Te ruego, Señor
  - Por favor, mi Señor
  - Ruego, Señor
  lexicon: HALOT
  rationale: La partícula de cortesía bī se expresa naturalmente con "Por favor"; "Señor" conserva el tratamiento reverente. "Mi Señor" sería posible, pero en español puede sonar más marcado de lo necesario aquí.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el mensajero de Dios
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente "hombre de Dios" y la narración mantiene esa perspectiva de Manoah. No se resuelve aquí la identidad del visitante; por eso se conserva la frase tradicional y literal.
- source_word: אֲשֶׁר שָׁלַחְתָּ
  english_pob_choice: whom you sent
  chosen_spanish: que tú enviaste
  alternatives_spanish:
  - a quien tú enviaste
  - el cual tú enviaste
  lexicon: HALOT
  rationale: La cláusula relativa se vierte de manera directa y natural en español. "Que tú enviaste" mantiene el referente personal sin sobrecargar el estilo.
- source_word: יָבוֹא נָא עוֹד אֵלֵינוּ
  english_pob_choice: let ... come again to us
  chosen_spanish: venga otra vez a nosotros
  alternatives_spanish:
  - venga de nuevo a nosotros
  - venga una vez más a nosotros
  - que vuelva a nosotros
  lexicon: HALOT
  rationale: El verbo con valor de petición se expresa con subjuntivo exhortativo. "Otra vez" comunica "again/once more" de modo claro y sobrio. "A nosotros" mantiene el movimiento hacia el grupo.
- source_word: וְיוֹרֵנוּ
  english_pob_choice: and teach us
  chosen_spanish: y nos enseñe
  alternatives_spanish:
  - y nos instruya
  - y nos muestre
  - y nos dé instrucción
  lexicon: HALOT
  rationale: La forma causativa de ירה tiene el sentido de instruir/enseñar. "Nos enseñe" es la opción más clara y natural en español contemporáneo, sin perder el valor directivo.
- source_word: מַה נַּעֲשֶׂה
  english_pob_choice: what we should do
  chosen_spanish: qué debemos hacer
  alternatives_spanish:
  - qué hemos de hacer
  - qué tenemos que hacer
  - qué deberíamos hacer
  lexicon: HALOT
  rationale: La pregunta busca instrucción práctica. "Debemos hacer" transmite la idea deliberativa y normativa sin añadir matices de duda que no están en el hebreo.
- source_word: לַנַּעַר
  english_pob_choice: for the boy
  chosen_spanish: para el muchacho
  alternatives_spanish:
  - para el niño
  - para el hijo
  - para el joven
  lexicon: HALOT
  rationale: Aunque el niño aún no ha nacido, el hebreo usa un masculino singular. "Muchacho" preserva mejor el matiz masculino que una forma neutral como "niño" en ciertos contextos, y suena más natural que "lad" o "joven".
- source_word: הַיּוּלָּד
  english_pob_choice: who is to be born
  chosen_spanish: que ha de nacer
  alternatives_spanish:
  - que va a nacer
  - por nacer
  - que será nacido
  lexicon: HALOT
  rationale: El participio pasivo apunta al que está destinado a nacer. "Ha de nacer" es una solución digna y precisa, y evita una construcción demasiado literal que sonaría extraña en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: Se conserva el nombre propio divino en transliteración española, siguiendo el principio POB de no ocultar el tetragrama tras un título. "Yahvé" es la forma estándar del proyecto en español y mantiene la audibilidad del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si אִישׁ הָאֱלֹהִים debe resolverse como mensajero angelical en el texto principal
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - el mensajero de Dios
  - el enviado de Dios
  rationale: La frase hebrea y el POB inglés preservan la designación narrativa literal, sin adelantar la identificación plena del personaje. Mantener "el hombre de Dios" conserva la tensión narrativa y evita una interpretación que el verso mismo no explicita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Género de לַנַּעַר
  english_pob_reading: for the boy
  chosen_spanish_reading: para el muchacho
  alternative_spanish_readings:
  - para el niño
  - para el hijo
  rationale: El hebreo es masculino y alude al hijo prometido. Se conserva el rasgo masculino en español, en coherencia con la guía de exactitud de género y con el contexto de la promesa de un hijo varón.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del hebreo y coincide en sustancia con el auditable inglés POB. Se aplicó la terminología del proyecto para el nombre divino (Yahvé), se mantuvo la designación narrativa «el hombre de Dios» y se conservó el matiz masculino de לַנַּעַר. No se introdujeron cambios textuales relevantes respecto al último pase revisado.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «el hombre de Dios» como expresión narrativa literal, no como interpretación teológica resuelta.
  - «Muchacho» preserva el masculino de נַעַר sin volver el verso artificial.
  - La oración se vierte con un español moderno y reverente, sin calco excesivo.
