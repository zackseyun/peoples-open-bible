id: REV.12.9
reference: 'Revelation 12:9'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἐβλήθη ὁ δράκων ὁ μέγας, ὁ ὄφις ὁ ἀρχαῖος, ὁ καλούμενος Διάβολος καὶ ⸀ὁ Σατανᾶς, ὁ πλανῶν τὴν οἰκουμένην ὅλην— ἐβλήθη εἰς τὴν γῆν, καὶ οἱ ἄγγελοι αὐτοῦ μετ’ αὐτοῦ ἐβλήθησαν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/012/009.yaml
  text: And the great dragon was thrown down—the ancient serpent[a], the one called the Devil and Satan, who deceives the whole world. He was thrown down to the earth[b], and his angels were thrown down with him.
  footnotes:
  - marker: a
    text: Or "who leads the whole inhabited world astray."
    reason: lexical_alternative
  - marker: b
    text: '"Ancient serpent" echoes the serpent imagery of Genesis 3.'
    reason: cross_reference
translation:
  language: ko
  text: '그래서 그 큰 용, 곧 「옛 뱀, 마귀라고도 하고 사탄이라고도 부르는 자」, 온 세상을 미혹하는 자가 내쫓겼습니다. 그가 땅으로 던져졌고, 그의 천사들도 그와 함께 던져졌습니다.'
  philosophy: optimal-equivalence
ai_draft:
  model_id: claude-opus-4-7
  model_version: claude-opus-4-7-1m
  prompt_id: korean_source_grounded_draft_inline_v1
  timestamp: '2026-05-18T00:00:00Z'
source_grounding:
  english_pob_role: consult_only
status: draft
lexical_decisions:
- source_word: ὁ ὄφις ὁ ἀρχαῖος
  english_pob_choice: the ancient serpent
  chosen_korean: 옛 뱀
  alternatives_korean:
  - 태초의 뱀
  lexicon: BDAG
  rationale: '창세기 3장의 뱀과의 연속성을 분명히 한다. 「옛」은 ἀρχαῖος의 「원시의/태초부터의」 함의를 자연스럽게 담는다.'
- source_word: Διάβολος
  english_pob_choice: the Devil
  chosen_korean: 마귀
  alternatives_korean:
  - 고발자
  lexicon: BDAG
  rationale: '헬라어 「고발자」를 한국어 전통의 「마귀」로 옮긴다. 본문의 다음 절(10절)이 「참소자」를 따로 사용한다.'
- source_word: Σατανᾶς
  english_pob_choice: Satan
  chosen_korean: 사탄
  alternatives_korean:
  - 대적자
  lexicon: BDAG
  rationale: '히브리어 차용어 שטן의 음역으로 굳어진 「사탄」을 유지한다.'
theological_decisions:
- issue: '12:9의 네 가지 이름의 사슬(용/옛 뱀/마귀/사탄) 보존'
  chosen_reading: 옛 뱀, 곧 마귀라고도 하고 사탄이라고도 부르는 자
  alternative_readings:
  - 옛 뱀 곧 사탄
  - 큰 용 마귀
  rationale: 본문은 한 인물을 네 이름(δράκων μέγας / ὄφις ἀρχαῖος / Διάβολος / Σατανᾶς)으로 동시에 식별하며, 창세기 3장의 뱀과 묵시문학의 용을 결합한 정체 폭로다. 한국어에서 이 사슬을 압축하면 묵시적 폭로가 약화되므로 네 이름을 모두 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve identifying name-chains in apocalyptic disclosure'
