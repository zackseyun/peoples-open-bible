translation:
  language: es
  text: Galaad permaneció [a]al otro lado del Jordán; y Dan, ¿por qué moraba entre las naves? Aser se sentó a la orilla del mar y permaneció junto a sus puertos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «más allá del Jordán». La expresión hebrea señala el lado opuesto desde el punto de vista del hablante.
    reason: lexical_alternative
  - marker: b
    text: O «sus ensenadas». El término hebreo puede referirse a aberturas costeras y, en este contexto, probablemente indica puertos o ensenadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - la región de Galaad
  - los galaaditas
  lexicon: HALOT
  rationale: Se conserva el nombre propio geográfico/tribal sin expandirlo interpretativamente. En español, «Galaad» es la forma establecida y mantiene el paralelo poético con las otras tribus.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - del otro lado del Jordán
  lexicon: HALOT
  rationale: La expresión hebrea es geográfica y relacional al punto de vista del hablante. «Al otro lado del Jordán» conserva esa referencia espacial con naturalidad en español.
- source_word: שָׁכֵן
  english_pob_choice: stayed
  chosen_spanish: permaneció
  alternatives_spanish:
  - habitó
  - se quedó
  - moró
  lexicon: HALOT
  rationale: El verbo puede significar residir o permanecer; aquí el contexto de reproche poético favorece una formulación sobria que no agregue matiz más allá de la permanencia.
- source_word: לָמָּה
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿para qué
  lexicon: HALOT
  rationale: Interrogativo directo que mantiene el tono retórico de censura.
- source_word: יָגוּר
  english_pob_choice: did he sojourn
  chosen_spanish: se detuvo
  alternatives_spanish:
  - se alojó
  - habitó
  - siguió de largo
  lexicon: HALOT
  rationale: גור aquí tiene fuerza de quedarse/sojornar en un contexto de reproche. En español, «se detuvo» comunica la idea de permanecer en un lugar sin entrar en la literalidad de un tecnicismo poco natural.
- source_word: אֳנִיּוֹת
  english_pob_choice: the ships
  chosen_spanish: las naves
  alternatives_spanish:
  - los barcos
  - las naves
  lexicon: HALOT
  rationale: El sustantivo designa embarcaciones marítimas. «Naves» es un término digno y amplio, adecuado al registro poético y a la imagen costera.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Aser
  alternatives_spanish:
  - Asher
  lexicon: HALOT
  rationale: Se usa la forma castellana habitual del nombre propio bíblico.
- source_word: יָשַׁב
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - permaneció
  - habitó
  - se quedó
  lexicon: HALOT
  rationale: El hebreo literalmente dice «sentarse», y el valor poético de inactividad se conserva bien con la forma verbal directa en español.
- source_word: לְחוֹף יַמִּים
  english_pob_choice: by the seashore
  chosen_spanish: a la orilla del mar
  alternatives_spanish:
  - junto a la costa
  - en la ribera del mar
  lexicon: HALOT
  rationale: חוֹף es «orilla/costa». «A la orilla del mar» mantiene la imagen espacial clara y natural, sin perder el contraste con las otras expresiones de ubicación.
- source_word: מִפְרָצָיו
  english_pob_choice: his harbors
  chosen_spanish: sus bahías
  alternatives_spanish:
  - sus puertos
  - sus ensenadas
  - sus entradas
  lexicon: HALOT
  rationale: El término puede referirse a aberturas, ensenadas o bahías en un contexto costero. «Bahías» preserva la ambigüedad del hebreo y evita fijar demasiado el sentido donde el contexto admite varias opciones.
- source_word: יִשְׁכּוֹן
  english_pob_choice: stayed
  chosen_spanish: permaneció
  alternatives_spanish:
  - habitó
  - se quedó
  - moró
  lexicon: HALOT
  rationale: Se mantiene la idea de permanecer/seguir instalado, coherente con el tono de reproche del versículo.
theological_decisions:
- issue: El uso de un nombre geográfico/tribal en lugar de expandirlo a una glosa étnica.
  english_pob_reading: Gilead stayed beyond the Jordan
  chosen_spanish_reading: Galaad permaneció al otro lado del Jordán
  alternative_spanish_readings:
  - Los galaaditas permanecieron al otro lado del Jordán
  - La región de Galaad permaneció al otro lado del Jordán
  rationale: El hebreo nombra directamente a Galaad; la POB inglesa también retiene esa forma, reconociendo la posible referencia al territorio o al grupo. El español conserva la misma tensión sin resolverla por interpretación.
  doctrine_reference: Principio de traducción fuente-guiada y respeto de la ambigüedad del texto base
translation_notes:
  revision_awareness: La POB inglesa revisó la cláusula de Dan desde 'linger' a 'sojourn' para reflejar mejor יָגוּר con un registro más formal. En español se eligió «se detuvo» para expresar la permanencia reprochable sin introducir un tecnicismo que suene forzado; se mantiene además la paralelismo poético con «permaneció».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Galaad» y «Aser» como formas castellanas habituales de los nombres propios bíblicos.
  - Se preserva la redundancia poética de dos verbos de permanencia («permaneció», «se sentó», «permaneció») para no suavizar la censura implícita del canto.
