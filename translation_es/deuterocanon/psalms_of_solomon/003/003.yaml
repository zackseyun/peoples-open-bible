translation:
  language: es
  text: Los justos recordarán continuamente al Señor, con acción de gracias[a] y vindicando[b] los juicios del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alabanza» o «confesión». El griego ἐξομολόγησις puede expresar alabanza, acción de gracias o confesión según el contexto; aquí se toma en su sentido cultual de acción de gracias, en contraste con el vocabulario de «alabanza» del verso anterior.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con justificación/vindicación de los juicios del Señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos
  lexicon: BDAG
  rationale: Como adjetivo sustantivado, designa a quienes se caracterizan por la justicia; en español, «los justos» es natural y conserva el valor moral-religioso.
- source_word: μνημονεύσουσιν
  english_pob_choice: will remember
  chosen_spanish: recordarán
  alternatives_spanish:
  - se acordarán de
  - harán memoria de
  lexicon: BDAG
  rationale: El futuro expresa una acción continua o habitual; «recordarán» comunica bien la rememoración sostenida en español moderno.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - en todo tiempo
  lexicon: BDAG
  rationale: La locución expresa continuidad sin interrupción; «continuamente» preserva ese matiz durativo.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el señor
  lexicon: BDAG
  rationale: En este contexto de la tradición septuagintal, «el Señor» refleja el título divino establecido y su peso teológico.
- source_word: ἐν ἐξομολογήσει
  english_pob_choice: with thanksgiving
  chosen_spanish: con acción de gracias
  alternatives_spanish:
  - con alabanza
  - con confesión
  lexicon: BDAG
  rationale: La revisión inglesa favorece «thanksgiving» frente a «praise»; en español, «acción de gracias» conserva mejor el valor específico de ἐξομολόγησις en contexto cultual.
- source_word: δικαιώσει
  english_pob_choice: vindicating
  chosen_spanish: vindicando
  alternatives_spanish:
  - justificando
  - declarando justos
  lexicon: BDAG
  rationale: El sustantivo/acción apunta a vindicación o justificación; aquí se mantiene el sentido de reconocer como justos los juicios de Dios sin volverlo una paráfrasis más amplia.
- source_word: τὰ κρίματα τοῦ κυρίου
  english_pob_choice: the Lord’s judgments
  chosen_spanish: los juicios del Señor
  alternatives_spanish:
  - los fallos del Señor
  - las sentencias del Señor
  lexicon: BDAG
  rationale: «Juicios» conserva el sentido judicial de κρίματα y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Alcance de κύριος como título divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto suele usar «Yahvé» para יהוה, aquí la fuente griega presenta κύριος sin señal explícita del nombre divino hebreo. En este poema sapiencial de tradición septuagintal, «el Señor» mantiene la forma recibida y evita sobreespecificar sin apoyo textual directo.
  doctrine_reference: Septuagintal divine-title usage
- issue: Sentido de ἐξομολόγησις
  english_pob_reading: with thanksgiving
  chosen_spanish_reading: con acción de gracias
  alternative_spanish_readings:
  - con alabanza
  - con confesión
  rationale: La decisión inglesa revisada distingue este término de αἴνεσις en el verso anterior. En español, «acción de gracias» conserva esa especificidad litúrgica y no diluye el contraste léxico del griego.
  doctrine_reference: Lexical distinction in psalmic praise vocabulary
- issue: Valor de δικαιώσει respecto a los juicios divinos
  english_pob_reading: vindicating the judgments of the Lord
  chosen_spanish_reading: vindicando los juicios del Señor
  alternative_spanish_readings:
  - justificando los juicios del Señor
  - declarando justos los juicios del Señor
  rationale: La lectura no afirma que los juicios deban ser justificados por otro agente, sino que los justos los reconocen como rectos y los vindican. «Vindicando» preserva esa tensión teológica y la relación con el acto de reconocer la justicia divina.
  doctrine_reference: Divine justice and vindication
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés favorece «with thanksgiving» para ἐν ἐξομολογήσει y «vindicating the judgments of the Lord» para δικαιώσει; la versión española sigue esa decisión y evita volver al más genérico «alabanza».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - «Señor» se conserva para κύριος en coherencia con el texto griego recibido.
  - «Los justos» reproduce el adjetivo sustantivado sin expansión explicativa.
  - Las notas usan solo marcadores presentes en el texto y no introducen variantes no ancladas.
