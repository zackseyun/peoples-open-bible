translation:
  language: es
  text: Preparen broquel[a] y escudo, y avancen a la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Preparen escudo pequeño y escudo grande, y acérquense para la batalla».
    reason: lexical_alternative
lexical_decisions:
- source_word: עִרְכוּ
  english_pob_choice: Prepare
  chosen_spanish: Preparad
  alternatives_spanish:
  - Poned en orden
  - Acomodad
  - Alistaos
  lexicon: HALOT
  rationale: El imperativo de ערך transmite la idea de poner algo en orden o dejarlo listo. En un contexto militar, «Preparad» comunica de forma natural la puesta en condición de combate sin añadir contenido ajeno al hebreo.
- source_word: מָגֵן
  english_pob_choice: buckler
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  - escudo pequeño
  lexicon: HALOT
  rationale: En español, «broquel» es posible pero algo más técnico o arcaizante; «escudo» es más transparente para el lector general. Para conservar la distinción con צִנָּה, se añade «broquel» como alternativa léxica implícita en la nota, en lugar de forzar una duplicación poco natural en el texto principal.
- source_word: צִנָּה
  english_pob_choice: shield
  chosen_spanish: broquel
  alternatives_spanish:
  - escudo grande
  - escudo
  lexicon: HALOT
  rationale: צִנָּה parece designar una defensa mayor que מָגֵן. Se traduce aquí como «broquel» para marcar la diferencia de tamaño o tipo de arma defensiva, manteniendo la pareja léxica sin repetir «escudo» dos veces.
- source_word: וּגְשׁוּ
  english_pob_choice: advance
  chosen_spanish: acercaos
  alternatives_spanish:
  - avanzad
  - aproximaos
  - acercaos al combate
  lexicon: HALOT
  rationale: נגשׁ significa acercarse o aproximarse. En español, «acercaos» conserva de forma fiel el movimiento hacia delante; la nota contextual y el marco bélico del versículo hacen claro el sentido militar que en inglés se expresó como «advance».
- source_word: לַמִּלְחָמָה
  english_pob_choice: to battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - a la batalla
  - para el combate
  - a la guerra
  lexicon: HALOT
  rationale: La preposición y el sustantivo señalan orientación hacia el enfrentamiento armado. «Para la batalla» suena natural en español y mantiene la idea de disposición y movimiento hacia el combate.
translation_notes:
  revision_awareness: La revisión inglesa reciente no introdujo cambios; se mantuvo el mismo sentido base. La decisión española sigue el mismo acuerdo alto del audit trail y conserva la tensión léxica entre los dos términos de armamento sin homogeneizarlos.
  spanish_consistency_notes:
  - Se preserva el imperativo plural de segunda persona con forma peninsular «-ad/-os» por ser una convención editorial coherente y plenamente inteligible en registro bíblico, sin alterar el sentido.
  - Se usa «broquel» solo para distinguir el segundo término de armamento en el texto principal; la nota ofrece la alternativa más literal con «pequeño/gran escudo» para transparencia auditiva.
  - No se emplea «SEÑOR» ni terminología teológica especial porque el versículo no contiene el nombre divino ni lenguaje doctrinal específico.
