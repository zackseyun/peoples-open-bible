translation:
  language: es
  text: Y harás los varales de madera de acacia, y los recubrirás de oro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y debes hacer
  - Y harás tú
  lexicon: HALOT
  rationale: En una instrucción de fabricación, el imperfecto con valor directivo se refleja naturalmente en español con futuro de mandato. «Harás» conserva la fuerza prescriptiva sin volver la frase torpe o excesivamente literal.
- source_word: הַבַּדִּים
  english_pob_choice: the poles
  chosen_spanish: los varales
  alternatives_spanish:
  - las varas
  - los postes
  - las barras
  lexicon: HALOT
  rationale: En contexto del tabernáculo, el término designa piezas para transportar el objeto sagrado. «Varales» mantiene una resonancia bíblica y técnica en español, a la vez que comunica mejor la función que «barras» o «postes».
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «maderas de acacias». En español, «madera de acacia» es natural y fiel; evita la transliteración «shittim», que oscurecería el referente botánico.
- source_word: וְצִפִּיתָ
  english_pob_choice: and overlay
  chosen_spanish: y los recubrirás
  alternatives_spanish:
  - y los cubrirás
  - y los platearás
  - y los revestirás
  lexicon: HALOT
  rationale: El verbo describe aplicar un material sobre una pieza artesanal. «Recubrirás» transmite bien la acción de cubrir con una capa de metal sin implicar necesariamente una técnica más específica de la que exige el hebreo.
- source_word: זָהָב
  english_pob_choice: with gold
  chosen_spanish: de oro
  alternatives_spanish:
  - con oro
  - en oro
  lexicon: HALOT
  rationale: En español, con verbos de recubrimiento, «de oro» expresa de forma natural el material de la capa aplicada. Mantiene la economía del hebreo sin introducir una preposición menos idiomática.
translation_notes:
  revision_awareness: El texto inglés auditado no requiere correcciones; la versión española sigue de cerca el hebreo y conserva la secuencia imperativa de la instrucción de fabricación.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se prefirió «varales» por coherencia con el lenguaje de transporte cultual y por ser inteligible en español bíblico moderno.
  - No se añadió nota de variante textual porque el paquete de fuente no presenta discrepancias relevantes.
