translation:
  language: es
  text: 'A los veinticuatro días del mes undécimo (es decir, el mes de Shebat[a]), en el segundo año de Darío, vino la palabra de Yahvé a Zacarías, hijo de Berequías, hijo de Iddo, el profeta, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el mes Shebat»; también puede transliterarse «Shevat».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/יוֹם עֶשְׂרִים וְ/אַרְבָּעָה
  english_pob_choice: On the twenty-fourth day
  chosen_spanish: El día veinticuatro
  alternatives_spanish:
  - En el día veinticuatro
  - A los veinticuatro días
  lexicon: HALOT
  rationale: La fórmula calendárica hebrea se expresa de manera natural en español con artículo definido y numeral ordinal implícito en la fecha. Se mantiene el valor temporal sin volverlo rígido o arcaizante.
- source_word: לְ/עַשְׁתֵּֽי עָשָׂ֥ר חֹ֨דֶשׁ
  english_pob_choice: of the eleventh month
  chosen_spanish: del mes once
  alternatives_spanish:
  - del undécimo mes
  - del mes undécimo
  lexicon: HALOT
  rationale: El hebreo presenta una designación numérica del mes. En español, 'mes once' conserva el orden y evita imponer un calendario específico; 'undécimo mes' también sería posible, pero 'mes once' resulta claro y sobrio.
- source_word: הוּא חֹ֣דֶשׁ שְׁבָ֔ט
  english_pob_choice: (that is, the month Shebat)
  chosen_spanish: (es decir, el mes de Shebat)
  alternatives_spanish:
  - (o sea, el mes de Shevat)
  - (esto es, el mes de Shebat)
  lexicon: HALOT
  rationale: Se conserva la aclaración appositiva del hebreo. 'Shebat' refleja la transliteración usada por la POB inglesa; se mantiene la forma como nombre de mes, con una explicación parentética en español.
- source_word: בִּ/שְׁנַ֥ת שְׁתַּ֖יִם לְ/דָרְיָ֑וֶשׁ
  english_pob_choice: in the second year of Darius
  chosen_spanish: en el segundo año de Darío
  alternatives_spanish:
  - en año dos de Darío
  - durante el segundo año de Darío
  lexicon: HALOT
  rationale: La fórmula regnal se traduce de manera idiomática en español. 'Darío' es la forma usual del nombre propio en español bíblico.
- source_word: הָיָ֣ה דְבַר יְהוָ֗ה
  english_pob_choice: the word of Yahweh came
  chosen_spanish: vino la palabra de Yahvé
  alternatives_spanish:
  - llegó la palabra de Yahvé
  - fue la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva el giro profético hebreo con 'vino', que comunica llegada/revelación y evita reducir la frase a mera existencia. Se sigue la decisión POB de usar 'Yahvé' para יהוה.
- source_word: יְהוָ֗ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte por el nombre divino 'Yahvé' conforme al criterio doctrinal de la POB, preservando el nombre personal del pacto y evitando la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: En este contexto de revelación, la preposición se expresa naturalmente con 'a' en español, manteniendo la dirección del habla divina.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma habitual en español. Se adapta la transliteración a la tradición ortográfica española sin perder correspondencia con el hebreo.
- source_word: בֶּן בֶּ֣רֶכְיָ֔הוּ בֶּן עִדּ֥וֹא
  english_pob_choice: son of Berechiah, son of Iddo
  chosen_spanish: hijo de Berequías, hijo de Iddo
  alternatives_spanish:
  - hijo de Berequías, hijo de Idó
  - hijo de Berequías, descendiente de Iddo
  lexicon: HALOT
  rationale: Se preserva la cadena genealógica de forma directa. 'Berequías' es la forma española más natural del nombre; 'Iddo' se mantiene transliterado de modo reconocible.
- source_word: הַ/נָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  - el profeta
  lexicon: HALOT
  rationale: El artículo hebreo se conserva con el artículo definido español. La colocación final funciona como aposición identificadora, tal como en la estructura hebrea.
- source_word: לֵ/אמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'para decir:'
  lexicon: HALOT
  rationale: Es la fórmula estándar de introducción al discurso directo en español bíblico y moderno. Mantiene la expectativa de la cita que continúa en el versículo siguiente.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal y editorial de la POB de no ocultar el Nombre divino bajo un sustituto. 'Yahvé' es la forma española estable para representar el Tetragrámaton en esta obra.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética הָיָה דְבַר יְהוָה
  english_pob_reading: the word of Yahweh came
  chosen_spanish_reading: vino la palabra de Yahvé
  alternative_spanish_readings:
  - llegó la palabra de Yahvé
  - la palabra de Yahvé fue
  rationale: La frase no describe simple ocurrencia, sino revelación profética. 'Vino' conserva la fuerza de acontecimiento y comunicación divina sin nivelarla a un estado de existencia.
  doctrine_reference: Uso profético estándar en el corpus bíblico hebreo
- issue: Aposición genealógica con הַנָּבִיא
  english_pob_reading: the prophet
  chosen_spanish_reading: el profeta
  alternative_spanish_readings:
  - profeta
  - el profeta Iddo
  rationale: La estructura hebrea permite leer 'el profeta' como identificador de Iddo. Se conserva esa posibilidad sin forzar una relectura más específica que el texto no exige.
  doctrine_reference: Estructura sintáctica del hebreo bíblico
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene la fórmula de datación, translitera el mes como Shebat y adopta Yahweh para יְהוָה. El examen cruzado indicó alta concordancia y solo observaciones menores; en español se conservan esas decisiones, ajustando la sintaxis para una lectura natural y publicable.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar POB.
  - 'Los nombres propios se adaptan a formas españolas usuales: ''Zacarías'', ''Berequías'', ''Darío''.'
  - La fecha mantiene la estructura completa del hebreo y la aclaración parentética del nombre del mes.
  - '''El profeta'' queda como aposición final, respetando la ambigüedad sintáctica del original.'
