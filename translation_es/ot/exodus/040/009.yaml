translation:
  language: es
  text: Entonces tomarás el aceite de la unción[a] y ungirás el tabernáculo y todo lo que está en él, y lo consagrarás, y todos sus utensilios, y será santo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «aceite de unción».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «santo»; no «santísimo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: Then you shall take
  chosen_spanish: Entonces tomarás
  alternatives_spanish:
  - Y tomarás
  - Tomarás
  lexicon: HALOT
  rationale: La forma verbal de instrucción secuencial se expresa naturalmente en español con futuro de mandato; «entonces» conserva la progresión procedimental que el inglés POB marcó con «Then».
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - el aceite para ungir
  - el aceite de unción
  lexicon: HALOT
  rationale: En español, «aceite de la unción» suena forzado; «el aceite de la unción» mantiene la relación nominal cultual y refleja bien la construcción hebrea sin perder claridad.
- source_word: וּמָשַׁחְתָּ
  english_pob_choice: and anoint
  chosen_spanish: y ungirás
  alternatives_spanish:
  - y ungirás con aceite
  - y consagrarás por ungimiento
  lexicon: HALOT
  rationale: «Ungir» es el equivalente culto y preciso de משׁח en este contexto; evita repetir «aceite» de forma innecesaria y conserva el acto ritual de designación.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la tienda del encuentro
  - el santuario
  lexicon: HALOT
  rationale: «Tabernáculo» es el término establecido y fiel al referente cultual del desierto; «tienda del encuentro» sería interpretativo y no sigue la elección del POB inglés.
- source_word: כָּל אֲשֶׁר בּוֹ
  english_pob_choice: all that is in it
  chosen_spanish: todo lo que está en él
  alternatives_spanish:
  - todo lo que hay en él
  - todo cuanto está en él
  lexicon: HALOT
  rationale: La frase inclusiva se vierte con una estructura natural en español. Se conserva el alcance total del contenido del tabernáculo sin convertirlo en paráfrasis.
- source_word: וְקִדַּשְׁתָּ אֹתוֹ
  english_pob_choice: and you shall consecrate it
  chosen_spanish: y lo consagrarás
  alternatives_spanish:
  - y lo santificarás
  - y lo harás santo
  lexicon: HALOT
  rationale: «Consagrar» comunica bien la dedicación cultual; «santificar» sería posible, pero en español eclesial puede sonar más abstracto y menos ritual. Se mantiene el sentido de apartar para uso santo.
- source_word: וְאֶת כָּל כֵּלָיו
  english_pob_choice: and all its furnishings
  chosen_spanish: junto con todos sus utensilios
  alternatives_spanish:
  - y todos sus utensilios
  - y todos sus muebles
  lexicon: HALOT
  rationale: «כֵּלִים» abarca implementos y objetos del santuario; «utensilios» reproduce mejor ese campo que «muebles», que en español sugiere hogar doméstico. Se añade «junto con» para reflejar el alcance acumulativo del hebreo y del inglés POB.
- source_word: וְהָיָה קֹדֶשׁ
  english_pob_choice: and it shall be holy
  chosen_spanish: y será santo
  alternatives_spanish:
  - y será santo/consagrado
  - y quedará santo
  lexicon: HALOT
  rationale: Se evita intensificar a «santísimo» o «sumamente santo», porque el hebreo dice simplemente קֹדֶשׁ. «Santo» conserva el estado resultante sin añadir una gradación no presente en el texto.
theological_decisions:
- issue: No intensificar la santidad final más allá de קֹדֶשׁ
  english_pob_reading: The tabernacle is rendered as becoming/being set apart as holy, without adding a superlative degree.
  chosen_spanish_reading: El tabernáculo y sus utensilios quedan en estado santo, sin convertir el final en «santísimo» o equivalente.
  alternative_spanish_readings:
  - y será santísimo
  - y quedará consagrado en grado supremo
  rationale: El hebreo concluye con קֹדֶשׁ («santo»), no con la forma superlativa. La traducción española debe preservar esa precisión para no importar una intensificación teológica que el versículo no formula.
  doctrine_reference: Original-language primacy over translation tradition; no doctrinal escalation beyond the source text.
translation_notes:
  revision_awareness: Se siguió el pasaje auditado del POB inglés con acuerdo alto y sin revisiones aplicadas; la única precaución principal fue mantener la sobriedad de קֹדֶשׁ sin sobretraducirlo como superlativo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - 'Se mantiene una terminología cultual consistente: «ungir», «consagrar», «santo».'
  - Se prefirió «tabernáculo» y «utensilios» por continuidad con el registro bíblico y con el sentido del hebreo.
