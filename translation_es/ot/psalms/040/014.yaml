translation:
  language: es
  text: Ten a bien[a], Yahvé, librarme; Yahvé[b], date prisa en ayudarme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo también puede entenderse como «sé complacido» o «complácete en» librarme; el imperativo expresa voluntad favorable para actuar.
    reason: lexical_alternative
  - marker: b
    text: O «apresúrate a ayudarme».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְצֵה
  english_pob_choice: Be pleased
  chosen_spanish: Sé propicio
  alternatives_spanish:
  - Ten a bien
  - Muestra tu benevolencia
  - Quiere agradarte
  lexicon: HALOT
  rationale: El imperativo de רצה expresa una petición de voluntad favorable o aceptación benigna. En español, «Sé propicio» comunica bien esa disposición favorable sin perder el matiz de ruego reverente. «Ten a bien» también es posible, pero aquí «Sé propicio» suena más natural y litúrgicamente claro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrámaton con la forma doctrinalmente establecida en español de este proyecto: «Yahvé». No se sustituye por un título, para mantener la transparencia frente al hebreo.'
- source_word: לְהַצִּילֵנִי
  english_pob_choice: to deliver me
  chosen_spanish: para librarme
  alternatives_spanish:
  - para rescatarme
  - para salvarme
  - para librarme de
  lexicon: HALOT
  rationale: El hifil de נצל pide la idea de sacar o rescatar de peligro. En español, «librarme» es una equivalencia natural y suficientemente fuerte en contexto de súplica. «Rescatarme» sería posible, pero «librarme» encaja mejor con el registro orante del salmo.
- source_word: לְעֶזְרָתִי
  english_pob_choice: to help me
  chosen_spanish: en ayudarme
  alternatives_spanish:
  - para ayudarme
  - a socorrerme
  - en mi ayuda
  lexicon: HALOT
  rationale: La construcción hebrea literalmente apunta a «para/para mi ayuda». En español, tras «date prisa» la frase verbal «en ayudarme» resulta natural y mantiene la urgencia del original. «Para ayudarme» también sería viable, pero aquí la coordinación con el imperativo español favorece «en ayudarme».
- source_word: חוּשָׁה
  english_pob_choice: hurry
  chosen_spanish: date prisa
  alternatives_spanish:
  - apresúrate
  - ven pronto
  - hazte rápido
  lexicon: HALOT
  rationale: El imperativo de חוּשׁ expresa urgencia. «Date prisa» es una equivalencia moderna, clara y reverente; conserva el impulso del hebreo mejor que una paráfrasis más libre.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la convención del proyecto en español, se mantiene «Yahvé» como transliteración del nombre personal de Dios, en vez de ocultarlo tras un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y coincide en sentido con la traducción auditada en inglés. Se ajustó el español para sonar natural sin perder el ruego doble ni la repetición enfática del nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología base del proyecto.
  - «Librarme» conserva mejor el valor de rescate/liberación que un mero «salvarme» en este contexto.
  - La repetición de «Yahvé» se preserva para reflejar la insistencia del versículo.
  - La segunda cláusula usa una construcción imperativa natural en español sin diluir la urgencia del hebreo.
