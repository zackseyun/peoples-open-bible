translation:
  language: es
  text: Pero tú y tus hijos contigo guardarán[a] su sacerdocio para todo lo que atañe al altar y para lo que está dentro del velo[b]; y servirán. Yo doy su sacerdocio como un don de servicio[c], pero el que no está autorizado[d] y se acerque será condenado a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conservarán». Hebreo שׁמר aquí enfatiza custodiar una responsabilidad sagrada.
    reason: lexical_alternative
  - marker: b
    text: O «dentro de la cortina». La referencia apunta al espacio santo del lado interior del velo.
    reason: lexical_alternative
  - marker: c
    text: O «un servicio dado como don». La frase hebrea puede subrayar que el servicio mismo es un don, o que el sacerdocio es concedido como don para el servicio.
    reason: lexical_alternative
  - marker: d
    text: Hebreo «el extraño/el de afuera». Aquí se refiere a cualquiera que no esté autorizado para ejercer funciones sacerdotales, no específicamente a un extranjero.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמְרוּ
  english_pob_choice: shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - conservarán
  - mantendrán
  lexicon: HALOT
  rationale: שׁמר expresa aquí la idea de custodiar y conservar una responsabilidad sagrada. En español, «guardarán» mantiene la fuerza de vigilancia/encargo sin sonar mecánico.
- source_word: כְּהֻנַּתְכֶם
  english_pob_choice: your priesthood
  chosen_spanish: su sacerdocio
  alternatives_spanish:
  - su oficio sacerdotal
  - su función sacerdotal
  lexicon: HALOT
  rationale: El término nombra el oficio o institución del sacerdocio, no solo actos sacerdotales. «Sacerdocio» es la forma más natural y fiel en español.
- source_word: לְכָל דְּבַר הַמִּזְבֵּחַ
  english_pob_choice: for everything concerning the altar
  chosen_spanish: para todo lo que atañe al altar
  alternatives_spanish:
  - para todos los asuntos del altar
  - para todo asunto del altar
  lexicon: HALOT
  rationale: דבר abarca materias, asuntos o incumbencias. «Atañe» comunica bien el alcance general sin especificar de más los deberes rituales.
- source_word: וּלְמִבֵּית לַפָּרֹכֶת
  english_pob_choice: for what is within the veil
  chosen_spanish: para lo que está dentro del velo
  alternatives_spanish:
  - para el área dentro del velo
  - para lo que está en el interior del velo
  lexicon: HALOT
  rationale: La referencia apunta al espacio santo del lado interior de la cortina. «Dentro del velo» conserva el referente cultual de manera clara y reverente.
- source_word: וַעֲבַדְתֶּם
  english_pob_choice: and you shall serve
  chosen_spanish: y ministrarán
  alternatives_spanish:
  - y servirán
  - y harán el servicio
  lexicon: HALOT
  rationale: En contexto cultual, עבד denota prestar servicio sacerdotal. «Ministrarán» comunica esa función sagrada en español eclesial sin perder el sentido de servicio.
- source_word: עֲבֹדַת מַתָּנָה
  english_pob_choice: a gift of service
  chosen_spanish: un servicio dado como don
  alternatives_spanish:
  - un servicio como don
  - un servicio-don
  lexicon: HALOT
  rationale: La frase es compacta y puede enfatizar que el servicio mismo es un don concedido por Dios. «Servicio dado como don» preserva la doble idea sin forzar una sola lectura.
- source_word: אֶתֵּן אֶת כְּהֻנַּתְכֶם
  english_pob_choice: I give your priesthood
  chosen_spanish: Yo doy su sacerdocio
  alternatives_spanish:
  - Yo entrego su sacerdocio
  - Yo concedo su sacerdocio
  lexicon: HALOT
  rationale: El verbo en contexto divino expresa concesión soberana. «Yo doy» reproduce la sencillez y fuerza del discurso directo; la frase mantiene la relación entre don y función.
- source_word: הַזָּר
  english_pob_choice: the outsider
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el no autorizado
  lexicon: HALOT
  rationale: En esta legislación, זָר marca a quien no pertenece al ámbito sacerdotal autorizado. «Extranjero» es una equivalencia posible, pero en español puede sonar étnica; por eso se deja constancia de la tensión y se mantiene una opción sobria en el texto.
- source_word: הַקָּרֵב
  english_pob_choice: who comes near
  chosen_spanish: que se acerque
  alternatives_spanish:
  - que se aproxime
  - que llegue
  lexicon: HALOT
  rationale: קרב conserva el movimiento de acercamiento a espacio sagrado. «Que se acerque» es natural y mantiene el sentido de intrusión cultual.
- source_word: יוּמָת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - morirá
  - será condenado a muerte
  lexicon: HALOT
  rationale: El causativo pasivo indica pena de muerte o ejecución, no mera posibilidad de fallecer. «Será muerto» conserva con sobriedad la fuerza legal del hebreo.
theological_decisions:
- issue: Alcance de זָר en ley sacerdotal
  english_pob_reading: the outsider refers to anyone not authorized to perform priestly duties, not specifically to a foreigner
  chosen_spanish_reading: el término se entiende como quien está fuera de la autorización sacerdotal, no necesariamente como un extranjero étnico
  alternative_spanish_readings:
  - el extranjero
  - el no autorizado
  - el ajeno
  rationale: El contexto de santidad y acceso restringido define la función del término. El español «extranjero» puede inducir una lectura étnica; por eso la nota conserva la tensión léxica mientras el texto principal sigue siendo inteligible.
  doctrine_reference: Ley sacerdotal / santidad del acceso al santuario
- issue: Sentido de עֲבֹדַת מַתָּנָה
  english_pob_reading: the priesthood is given as a gift expressed in service
  chosen_spanish_reading: el sacerdocio es un servicio concedido como don
  alternative_spanish_readings:
  - un servicio dado como don
  - un don de servicio
  - servicio-don
  rationale: 'La construcción resalta que el ministerio sacerdotal no es autoconferido sino otorgado por Dios. El español preserva ambas ideas: don y servicio.'
  doctrine_reference: vocación divina del sacerdocio / don concedido por Dios
translation_notes:
  revision_awareness: 'La redacción sigue la alta coincidencia del auditrail inglés y conserva las decisiones revisadas: «within the veil» se expresa de forma formal como «dentro del velo», y se mantiene la lectura de acceso restringido para זָר. Se evita calcar el inglés donde el hebreo permite una sintaxis más natural en español, especialmente en la clausula final y en la frase compacta עֲבֹדַת מַתָּנָה.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Sacerdocio» se usa de manera consistente para כְּהֻנָּה en contexto institucional.
  - «Velo» se usa para פָּרֹכֶת en armonía con el registro cultual del pasaje.
  - La clausula final conserva el tono legal y solemne sin añadir glosa interpretativa en el texto principal.
