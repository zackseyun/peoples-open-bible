    rationale: La nota [a] comenta la expresión כְּסוּת עֵינַיִם («cobertura/velo para los ojos»), pero en el borrador está anclada a «plata». Esto rompe la trazabilidad entre texto y nota exigida por el proyecto.
  - severity: medium
    issue: «de todos los que están contigo» no refleja bien לְכֹל אֲשֶׁר אִתָּךְ
    rationale: 'El genitivo «de todos» sugiere posesión o procedencia; el hebreo y el POB auditado apuntan a destinatario/alcance público: «para todos» o, si se interpreta, «ante todos».'
  - severity: medium
    issue: «como un velo» introduce comparación no explícita
    rationale: El hebreo dice «es para ti un cubrir/cobertura de ojos», no «como un velo». Conviene mantener la metáfora sin añadir «como».
