id: 1CLEM.37
reference: 1 Clement 37
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Στρατευώμεϑα οὖν, ἄνδρες ἀδελφοί, μετὰ πάσης ἐκτενείας ἐν τοῖς ἀμώμοις προστάγμασιν αὐτοῦ. 2. κατανοήσωμεν τοὺς στρατευομένους τοῖς ἡγουμένοις ἡμῶν, πῶς εὐτάκτως, πῶς εἰκτικῶς, πῶς ὑποτεταγμένως ἐπιτελοῦσιν τὰ διατασσόμενα. 3. οὐ πάντες εἰσὶν ἔπαρχοι οὐδὲ χιλίαρχοι οὐδὲ ἑκατόνταρχοι οὐδὲ πεντηκόνταρχοι οὐδὲ τὸ καϑεξῆς, ἀλλ’ ἕκαστος ἐν τῷ ἰδίῳ τάγματι τὰ ἐπιτασσόμενα ὑπὸ τοῦ βασιλέως καὶ τῶν ἡγουμένων ἐπιτελεῖ. . οἱ μεγάλοι δίχα τῶν μικρῶν οὐ δύνανται εἶναι οὔτε οἱ μικροὶ δὶχα τῶν μεγάλων· σύγκρασίς τις ἐστιν ἐν πᾶσιν, καὶ ἐν τούτοις χρῆσις. 5. λάβωμεν τὸ σῶμα ἡμῶν· ἡ κεφαλὴ δίχα τῶν ποδῶν οὐδέν ἐστιν, οὕτως οὐδὲ οἱ πόδες δίχα τῆς κεφαλῆς· τὰ δὲ ἐλάχιστα μέλη τοῦ σώματος ἡμῶν ἀναγκαῖα καὶ εὔχρηστά εἰσιν ὅλῳ τῷ σώματι· ἀλλὰ πάντα συνεπνεῖ καὶ ὑποταγῇ μιᾷ χρῆται εἰς τὸ σώζεσϑαι ὅλον τὸ σῶμα.
  language: Greek
  pages:
  - 309
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'Therefore let us serve as soldiers[a], brothers, with all earnestness in his blameless commands. Let us consider those who serve as soldiers under our leaders: how orderly, how obediently, how submissively they carry out what is commanded. Not all are prefects, nor tribunes, nor centurions, nor commanders of fifty, nor so on in order; but each, in his own rank, carries out the orders given by the king and by the leaders.


    The great cannot exist without the small, nor the small without the great. There is a certain interdependence in all things, and in these there is usefulness. Let us take our body: the head is nothing without the feet; likewise the feet are nothing without the head. Even the smallest members of our body are necessary and useful to the whole body. But all breathe together and make use of one submission[b][c][d][d][e], so that the whole body may be preserved.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The term rendered 'readily' may also be understood as 'obediently' or 'compliantly'; the sequence emphasizes disciplined responsiveness under authority.
    reason: lexical_alternative
    anchor_ref: '37:2'
  - marker: e
    text: '''There is a certain blending in all things'' expresses the interrelation of different parts rather than erasing their distinctions.'
    reason: lexical_alternative
    anchor_ref: '37:4'
  - marker: d
    text: Literally, 'all breathe together'; the image is of the body's parts acting in concert under one ordered submission.
    reason: lexical_alternative
    anchor_ref: '37:5'
  - marker: d
    text: Compare the body analogy in 1 Corinthians 12:12–27, where many members are necessary to one body.
    reason: cross_reference
    anchor_ref: '37:5'
  - marker: c
    text: Or 'nor so on'.
    reason: previous_rendering
  - marker: b
    text: Or 'in this there is usefulness'.
    reason: previous_rendering
lexical_decisions:
- source_word: Στρατευώμεθα
  chosen: let us serve as soldiers
  alternatives:
  - let us wage war
  - let us enlist
  - let us soldier
  lexicon: LSJ
  rationale: The verb is military and hortatory. 'Serve as soldiers' preserves the martial metaphor without overstating active combat in this paraenetic context.
- source_word: ἐκτενείας
  chosen: earnestness
  alternatives:
  - zeal
  - intensity
  - diligence
  lexicon: LSJ
  rationale: Conveys sustained seriousness and exertion. 'Earnestness' fits the exhortational tone and reads naturally in English.
- source_word: ἀμώμοις προστάγμασιν
  chosen: blameless commands
  alternatives:
  - faultless ordinances
  - spotless injunctions
  lexicon: LSJ
  rationale: ἀμώμοις modifies the divine commands as morally unimpeachable. 'Blameless commands' is clear and preserves the ethical force.
- source_word: εὐτάκτως
  chosen: orderly
  alternatives:
  - in good order
  - with discipline
  lexicon: LSJ
  rationale: Highlights proper arrangement and disciplined conduct in military service.
- source_word: εἰκτικῶς
  chosen: readily
  alternatives:
  - obediently
  - compliantly
  - yieldingly
  lexicon: LSJ
  rationale: The sense is of responsiveness and compliance. 'Readily' captures willing execution without collapsing into the next term on submission.
- source_word: ὑποτεταγμένως
  chosen: submissively
  alternatives:
  - in subordination
  - obediently
  lexicon: LSJ
  rationale: Preserves the explicit theme of ordered subordination, important to Clement's ecclesial argument.
- source_word: τάγματι
  chosen: rank
  alternatives:
  - order
  - station
  - division
  lexicon: LSJ
  rationale: In the military analogy, 'rank' is the most natural and precise rendering.
- source_word: βασιλέως
  chosen: king
  alternatives:
  - emperor
  - sovereign
  lexicon: LSJ
  rationale: The Greek term is simply 'king.' 'Emperor' would over-specify the Roman setting beyond the wording of the text.
- source_word: σύγκρασίς
  chosen: blending
  alternatives:
  - interdependence
  - mixture
  - combination
  lexicon: LSJ
  rationale: The term denotes a joining or mixture of parts. 'Blending' preserves the metaphorical texture while allowing the following statement about usefulness to stand.
- source_word: χρῆσις
  chosen: usefulness
  alternatives:
  - benefit
  - function
  - serviceability
  lexicon: LSJ
  rationale: The point is practical benefit arising from the relation of parts. 'Usefulness' is straightforward and fits the argument.
- source_word: συνεπνεῖ
  chosen: work together in harmony
  alternatives:
  - breathe together
  - act in concert
  lexicon: LSJ
  rationale: Literally 'breathe together,' but idiomatically it expresses coordinated unity. The chosen rendering communicates the sense in natural English while preserving the corporate image.
- source_word: ὑποταγῇ μιᾷ χρῆται
  chosen: make use of one submission
  alternatives:
  - observe one subordination
  - live under one ordered submission
  lexicon: LSJ
  rationale: The phrase is somewhat compressed; it expresses the body's unified operation under a single principle of subordination. The rendering stays close to the Greek while remaining intelligible.
- source_word: σώζεσθαι
  chosen: be preserved
  alternatives:
  - be saved
  - be kept safe
  lexicon: LSJ
  rationale: In this bodily analogy the immediate sense is preservation or wholeness, though the broader paraenetic resonance of salvation remains in the background.
theological_decisions:
- issue: Addressing ἄνδρες ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - brothers, men
  rationale: The Greek combines a masculine vocative with sibling language. Following the project's gender-accurate policy, 'brothers' preserves the source form and ecclesial address without expansion beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Force of military imagery in ecclesial exhortation
  chosen_reading: Retain explicit soldiering language throughout the opening verses
  alternative_readings:
  - Soften to generic service or duty language
  rationale: Clement's paraenesis depends on the military analogy to commend order, obedience, and rank within the community. Softening the imagery would flatten the rhetorical force.
  doctrine_reference: 'PHILOSOPHY.md: preserve source texture and auditable reasoning'
