  text: כִּ֤י יַחְדָּ֨ו בֹּ֣קֶר לָ֣/מוֹ צַלְמָ֑וֶת כִּֽי יַ֝כִּ֗יר בַּלְה֥וֹת צַלְמָֽוֶת׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/job/024/017.yaml
  text: For deep darkness is morning to them all[c][b][a], for they are familiar with the terrors of deep darkness.
  footnotes:
  - marker: a
    text: Or 'For morning is to them all like deep darkness'; the Hebrew order is compact and allows a slightly more literal rendering.
    reason: alternative_reading
  - marker: b
    text: Hebrew צַלְמָוֶת (tsalmaveth) can also be rendered 'shadow of death.' Here it likely means 'deep darkness' or 'gloom' rather than death itself.
    reason: lexical_alternative
  - marker: c
    text: The verb is singular in Hebrew ('he knows/recognizes'), but it likely has a generic sense referring to the wicked as a class; hence the plural in English.
    reason: lexical_alternative
