translation:
  language: es
  text: Pues mi ángel[a] irá delante de ti y te llevará a los amorreos, los hititas, los ferezeos, los cananeos, los heveos y los jebuseos[b], y yo los destruiré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi mensajero». El hebreo מַלְאָךְ puede referirse a un mensajero humano o celestial; aquí «ángel» encaja mejor con el contexto de guía divina.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «lo destruiré» o «lo borraré», con sufijo singular usado colectivamente para los pueblos mencionados; en español se expresa naturalmente como «los».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón o fundamento de la promesa anterior; «porque» conserva ese valor explicativo en español natural.
- source_word: יֵלֵךְ
  english_pob_choice: will go
  chosen_spanish: irá
  alternatives_spanish:
  - va a ir
  - marchará
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa futuro en contexto de promesa divina; «irá» es directo y solemne.
- source_word: מַלְאָכִי
  english_pob_choice: my angel
  chosen_spanish: mi ángel
  alternatives_spanish:
  - mi mensajero
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar «mensajero» o «ángel». El contexto de guía divina y juicio favorece «ángel» como en la POB inglesa, sin identificar más allá del texto.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - por delante de ti
  lexicon: HALOT
  rationale: En español, «delante de ti» comunica con claridad la idea idiomática de preceder y guiar.
- source_word: וֶהֱבִיאֲךָ
  english_pob_choice: and bring you
  chosen_spanish: y te llevará
  alternatives_spanish:
  - y te traerá
  - y te conducirá
  lexicon: HALOT
  rationale: El verbo causativo de בוא implica hacer llegar; «te llevará» expresa el movimiento guiado con naturalidad en español, manteniendo la dirección del texto.
- source_word: הָאֱמֹרִי ... וְהַיְבוּסִי
  english_pob_choice: the Amorites, the Hittites, the Perizzites, the Canaanites, the Hivites, and the Jebusites
  chosen_spanish: los amorreos, los hititas, los ferezeos, los cananeos, los heveos y los jebuseos
  alternatives_spanish:
  - los amoritas, los hititas, los perizitas, los cananeos, los hivos y los jebuseos
  lexicon: HALOT
  rationale: Se usan etnónimos españoles habituales y reconocibles para estas naciones/pueblos, manteniendo el plural colectivo esperado en español.
- source_word: וְהִכְחַדְתִּיו
  english_pob_choice: and I will wipe them out
  chosen_spanish: y yo los destruiré por completo
  alternatives_spanish:
  - y yo los aniquilaré
  - y los borraré de la tierra
  lexicon: HALOT
  rationale: כחד expresa hacer desaparecer, destruir o exterminar; «destruiré por completo» recoge el peso total de la acción sin sonar excesivamente interpretativo, y resuelve el referente colectivo plural en español.
theological_decisions:
- issue: Naturaleza y referencia de מַלְאָךְ
  english_pob_reading: Rendered as 'my angel' without identifying the figure beyond the Hebrew text.
  chosen_spanish_reading: «mi ángel» sin especificación adicional en el cuerpo del texto.
  alternative_spanish_readings:
  - «mi mensajero»
  - «mi ángel del Señor»
  - identificarlo con una manifestación teofánica
  rationale: El hebreo nombra la figura de manera intencionalmente abierta. La traducción no debe resolver en el texto principal interpretaciones posteriores, sino preservar la tensión lexical y teológica.
  doctrine_reference: Preservar la ambigüedad responsable del texto fuente.
- issue: Referente colectivo del sufijo singular en וְהִכְחַדְתִּיו
  english_pob_reading: 'Collective sense rendered with plural English object: ''them.'''
  chosen_spanish_reading: 'Objeto plural: «los destruiré por completo».'
  alternative_spanish_readings:
  - «los destruiré»
  - «lo destruiré» en sentido colectivo
  rationale: El sufijo hebreo es singular en forma, pero remite colectivamente a los pueblos enumerados. El plural español evita una literalidad incómoda y comunica el sentido colectivo de manera natural.
  doctrine_reference: Número gramatical colectivo en hebreo bíblico.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo de forma cercana y coincide con la decisión auditada de la POB inglesa: conservar «ángel» para מַלְאָךְ, mantener el valor futuro de los verbos y expresar en plural español el objeto colectivo de וְהִכְחַדְתִּיו. No se registran revisiones posteriores que alteren esta lectura.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el hebreo de este verso no contiene el Tetragrámaton.
  - Se usó «ángel» en el texto principal para conservar la ambigüedad lexical documentada; la nota ofrece la alternativa «mensajero».
  - «Los destruiré por completo» traduce la fuerza de כחד sin introducir una denominación doctrinal extra.
  - Los nombres de los pueblos se pluralizan en español para concordar con el referente colectivo natural.
