translation:
  language: es
  text: No te acobardes ante un noble, no sea que pongas un soborno contra tu integridad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «no sea que pongas un tropiezo en tu rectitud». El hebreo es más concreto con un término de ganancia injusta, aquí traducido «soborno».'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ ζήτει γενέσθαι κριτής
  english_pob_choice: Do not cower before a noble
  chosen_spanish: No busques hacerte juez
  alternatives_spanish:
  - No te empeñes en ser juez
  - No pretendas ser juez
  lexicon: LSJ / context parallel
  rationale: El griego abre con una prohibición de aspirar al puesto de juez, no solo una advertencia sobre el miedo. En español, «No busques hacerte juez» conserva esa aspiración voluntaria y evita convertir el inicio en una simple descripción emocional.
- source_word: δυνάστου
  english_pob_choice: noble
  chosen_spanish: un poderoso
  alternatives_spanish:
  - un noble
  - un gobernante
  - un potentado
  lexicon: LSJ / contextual semantics
  rationale: El paralelo griego εὐλαβηθῇς ἀπὸ προσώπου δυνάστου apunta a una figura de poder. «Poderoso» es amplio y natural en español; «noble» podría restringir demasiado el alcance social del término si se lee desde el griego.
- source_word: ἐξᾶραι ἀδικίας
  english_pob_choice: set a bribe against your integrity
  chosen_spanish: apartar la injusticia
  alternatives_spanish:
  - quitar la injusticia
  - arrancar la injusticia
  - remover la injusticia
  lexicon: LSJ / Greek-Hebrew parallel
  rationale: El griego habla de «quitar/apartar injusticias», mientras el hebreo es más concreto con בֶּצַע. Para un texto español auditable, se preserva el sentido del griego en el cuerpo y se deja la concreción hebrea para la nota.
- source_word: בֶּצַע
  english_pob_choice: a bribe
  chosen_spanish: soborno
  alternatives_spanish:
  - ganancia injusta
  - lucro ilícito
  - mordida
  lexicon: HALOT
  rationale: El hebreo expresa ganancia injusta o corrupción económica; en castellano bíblico actual, «soborno» comunica mejor la práctica corrupta implícita en el contexto judicial que un término más abstracto.
- source_word: בִּתְמִימִיךָ / εὐθύτητί σου
  english_pob_choice: against your integrity
  chosen_spanish: en tu rectitud
  alternatives_spanish:
  - en tu integridad
  - en tu rectitud moral
  - en tu probidad
  lexicon: HALOT / LSJ
  rationale: El paralelo griego usa εὐθύτης («rectitud»). «Rectitud» mantiene la imagen ética y funciona bien en español, mientras que «integridad» sería posible pero algo más interpretativa en este encuadre.
- source_word: εὐλαβηθῇς ἀπὸ προσώπου
  english_pob_choice: cower before
  chosen_spanish: te acobardes ante el rostro de
  alternatives_spanish:
  - te intimides ante
  - sientas temor ante
  - retrocedas ante
  lexicon: LSJ
  rationale: El griego expresa una actitud de cautela o temor reverente ante la presencia de alguien. «Te acobardes» conserva la fuerza de la intimidación; «rostro de» traduce προσώπου de manera directa y bíblica sin ocultar la concreción del original.
theological_decisions:
- issue: Cómo resolver la tensión entre el hebreo concreto (בֶּצַע) y el griego más abstracto (σκάνδαλον / ἀδικίας)
  english_pob_reading: 'The Hebrew reads more concretely with a term for unjust gain, here rendered ''a bribe.'' The Greek: ''lest you set a stumbling block in your uprightness.'''
  chosen_spanish_reading: El cuerpo español sigue el griego en la imagen de «apartar la injusticia» y conserva la concreción hebrea en la nota, donde se explicita que el hebreo habla de un soborno.
  alternative_spanish_readings:
  - no sea que pongas un soborno contra tu rectitud
  - no sea que pongas un tropiezo en tu rectitud
  - no sea que introduzcas ganancia injusta en tu rectitud
  rationale: Como el expediente fuente presenta ambas tradiciones, la traducción principal debe dejar visible la tensión textual en vez de borrarla. El griego ofrece una formulación más general sobre justicia/injusticia; el hebreo concreta el peligro como corrupción económica. La nota preserva ambas posibilidades.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using Greek parallel as actual input and consistency check'
- issue: Cómo traducir la advertencia inicial sobre hacerse juez
  english_pob_reading: Do not cower before a noble
  chosen_spanish_reading: No busques hacerte juez
  alternative_spanish_readings:
  - No te empeñes en ser juez
  - No pretendas ser juez
  rationale: El griego no describe solo miedo; prohíbe buscar voluntariamente el cargo de juez. Por eso la traducción principal refleja la intención de aspirar al oficio, evitando convertir el versículo en una exhortación distinta. La cláusula siguiente ya trata el temor ante el poderoso.
  doctrine_reference: Lectura directa del griego de Sir 7:6 con el hebreo como control de sentido
translation_notes:
  revision_awareness: La redacción inglesa revisada sustituyó «within your integrity» por «against your integrity» para sonar más natural; en español se optó por «en tu rectitud» en el cuerpo, con nota que preserva la alternativa griega de «tropiezo» y la concreción hebrea de «soborno». También se evitó seguir mecánicamente «noble» del inglés, porque el griego subyacente usa δυνάστου y el hebreo נָדִיב permite una gama más amplia de estatus/poder.
  spanish_consistency_notes:
  - Se mantiene «rectitud» para εὐθύτης / תמים cuando el contexto es ético y judicial.
  - Se usa «poderoso» para δυνάστης/δυνάστου cuando el énfasis es poder social concreto.
  - No se introduce «Mesías», «SEÑOR» ni terminología no presente en este pasaje.
  - La nota de pie de página preserva la alternativa textual sin duplicar el marcador en el cuerpo.
