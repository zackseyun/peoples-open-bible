translation:
  language: es
  text: y que tenga a su cargo las cosas santas[a], y que sea obedecido por todos[b], y que todos los documentos del país se escriban en su nombre[c], y que se vista de púrpura y oro[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santuario» o «los asuntos sagrados». El griego dice literalmente «las cosas santas», una expresión amplia para asuntos sagrados.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «sea oído por todos»; en este contexto, el sentido es que su autoridad sea acatada u obedecida.
    reason: lexical_alternative
  - marker: c
    text: Es decir, todos los documentos oficiales del país debían emitirse bajo su autoridad.
    reason: cultural_note
  - marker: d
    text: La púrpura y el oro eran signos de alto rango y honor oficial.
    reason: cultural_note
lexical_decisions:
- source_word: μέλῃ ... περὶ
  english_pob_choice: should have charge of
  chosen_spanish: tenga a su cargo
  alternatives_spanish:
  - cuidar de
  - ocuparse de
  - tener responsabilidad sobre
  lexicon: LSJ
  rationale: La construcción expresa responsabilidad u oversight administrativo; en español, 'tener a su cargo' comunica bien una función oficial sin reducirla a mera preocupación personal.
- source_word: τῶν ἁγίων
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - el santuario
  - las cosas sagradas
  - los asuntos santos
  lexicon: LSJ
  rationale: El plural griego es amplio y no se limita a un edificio. 'Las cosas santas' conserva esa amplitud y la referencia al ámbito sagrado/templo.
- source_word: ἀκούηται
  english_pob_choice: should be obeyed
  chosen_spanish: sea obedecido
  alternatives_spanish:
  - sea oído
  - sea escuchado
  - sea atendido
  lexicon: BDAG
  rationale: En un contexto de honores y autoridad, el pasivo funciona como 'ser acatado'. 'Sea obedecido' expresa la fuerza práctica mejor que una traducción literal de 'oído'.
- source_word: συγγραφαὶ
  english_pob_choice: documents
  chosen_spanish: documentos
  alternatives_spanish:
  - escritos
  - registros
  - instrumentos
  lexicon: LSJ
  rationale: El término puede abarcar escritos oficiales o instrumentos administrativos. 'Documentos' es natural en español y suficientemente amplio para el contexto gubernamental.
- source_word: ἐπὶ τῷ ὀνόματι αὐτοῦ
  english_pob_choice: in his name
  chosen_spanish: en su nombre
  alternatives_spanish:
  - bajo su nombre
  - por su autoridad
  lexicon: LSJ
  rationale: La locución indica autorización oficial. 'En su nombre' conserva el giro formal y la idea de emisión bajo su autoridad.
- source_word: πορφύραν
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - ropa púrpura
  - vestiduras púrpura
  lexicon: LSJ
  rationale: El color/insignia de realeza y honor se expresa naturalmente como 'púrpura' en español, manteniendo el valor simbólico del griego.
- source_word: χρυσοφορῇ
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro como adorno
  - ornamentos de oro
  - vestir oro
  lexicon: LSJ
  rationale: El verbo implica llevar oro como señal de rango. En español, 'oro' funciona como complemento breve y digno en paralelo con 'púrpura'.
theological_decisions:
- issue: Alcance de τῶν ἁγίων
  english_pob_reading: the holy things
  chosen_spanish_reading: las cosas santas
  alternative_spanish_readings:
  - el santuario
  - los asuntos sagrados
  rationale: Se preserva la amplitud del plural griego sin estrecharlo indebidamente a un lugar físico. La opción española mantiene la referencia al ámbito sagrado/templo y evita añadir precisión no explicitada por el texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning without over-narrowing.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador mantiene el acuerdo alto con el texto fuente y conserva las decisiones léxicas y de matiz del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó el paralelismo de cuatro cláusulas con 'y que...'.
  - '''Púrpura y oro'' se mantuvo como signos de honor, sin expandir a ''vestiduras'' porque el griego nombra los materiales/insignias de manera sucinta.'
  - No se empleó 'sanctuario' como traducción principal para no estrechar τῶν ἁγίων.
