  yaml_path: translation/ot/ezekiel/007/007.yaml
  text: Doom has come upon you[a], inhabitant of the land. The time has come; the day is near—panic[b], and not joyful shouting on the mountains.
  footnotes:
  - marker: a
    text: Or 'The turn has come upon you' or 'Your destiny has come.' The Hebrew term is rare and difficult.
    reason: lexical_alternative
  - marker: b
    text: Or 'tumult, and not echo on the mountains.' The final clause is difficult; many understand it as a contrast between panic and the usual joyful shouting heard on the mountains, possibly at harvest.
    reason: lexical_alternative
