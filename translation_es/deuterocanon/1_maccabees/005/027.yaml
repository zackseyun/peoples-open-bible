  yaml_path: translation/deuterocanon/1_maccabees/005/027.yaml
  text: And in the other cities of Gilead they are shut in[a]; tomorrow they will encamp against the strongholds, capture them[c][b], and destroy all of them in a single day.
  footnotes:
  - marker: a
    text: Or 'are hemmed in' or 'are besieged' for 'are shut in.' The Greek describes people confined under threat, without requiring a more technical siege term.
    reason: lexical_alternative
  - marker: b
    text: Or 'they are about to' instead of 'they are set to'; the Greek verb conveys imminent intention.
    reason: lexical_alternative
  - marker: c
    text: '''Destroy all of them'' could also be rendered ''wipe them all out''; the Greek is forceful and likely refers to total destruction.'
    reason: lexical_alternative
