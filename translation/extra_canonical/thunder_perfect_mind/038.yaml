translation:
  text: Do not hate my obedience[a][c], and do not set your love upon my self-control[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “submission.” The Coptic ϭⲟⲟⲃ can denote obedience or being subject.
    reason: lexical_alternative
  - marker: b
    text: Or “chastity.” ⲥⲧⲱⲧ often carries the sense of enkrateia (restraint), sometimes
      specifically sexual restraint.
    reason: lexical_alternative
  - marker: c
