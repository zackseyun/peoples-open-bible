base_translation:
  language: en
  yaml_path: translation/ot/isaiah/047/007.yaml
  text: You said[a], ‘I will be mistress forever,’ so that you did not take these things to heart[c][b]; you did not remember her end.
  footnotes:
  - marker: a
    text: Or 'lady forever.' The Hebrew גְבָרֶת denotes a woman in a position of dominance or rank; 'mistress' is chosen to preserve that sense without over-translating it as 'queen.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you did not set these things on your heart.'
    reason: lexical_alternative
  - marker: c
    text: Or 'its end.' The Hebrew has a feminine singular suffix, likely reflecting Babylon personified as a woman.
    reason: alternative_reading
