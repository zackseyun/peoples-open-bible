translation:
  language: es
  text: 'Y ellos no sabían que nosotros estábamos de pie allí. Entonces nos lanzamos juntos[a], diciendo: «Averigüemos quiénes son estos hombres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «quiénes son estos»; «hombres» se entiende por el contexto inmediato, donde los hablantes se refieren a los dos jóvenes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ᾔδεισαν
  english_pob_choice: did not know
  chosen_spanish: no sabían
  alternatives_spanish:
  - no supieron
  - no estaban enterados
  lexicon: BDAG
  rationale: El verbo de conocimiento en narración pasada se expresa de manera natural con «no sabían», que conserva el sentido simple y transparente del original.
- source_word: εἰστήκειμεν
  english_pob_choice: we were standing there
  chosen_spanish: estábamos allí
  alternatives_spanish:
  - estábamos de pie allí
  - nos encontrábamos allí
  lexicon: LSJ
  rationale: El griego indica una postura ya establecida, pero en español «estábamos allí» comunica con naturalidad la presencia previa; «de pie» puede insinuarse, pero no es necesario recargar la frase.
- source_word: συνεπιτάμεθα
  english_pob_choice: we rushed together
  chosen_spanish: nos lanzamos juntos
  alternatives_spanish:
  - irrumpimos juntos
  - corrimos juntos
  lexicon: LSJ
  rationale: El verbo compuesto sugiere un movimiento repentino y conjunto. «Nos lanzamos juntos» conserva la rapidez y la acción coordinada sin introducir una lectura incorrecta de ataque mutuo.
- source_word: ἀλλήλοις
  english_pob_choice: together / reciprocal force preserved in context
  chosen_spanish: juntos
  alternatives_spanish:
  - uno contra otro
  - entre nosotros
  lexicon: BDAG
  rationale: Aquí el valor recíproco del término se resuelve mejor en español por el adverbio «juntos», ya que la revisión inglesa corrigió la idea de un ataque entre sí. La cooperación del movimiento queda clara sin sobreinterpretar la reciprocidad.
- source_word: Μάθωμεν
  english_pob_choice: Let us find out
  chosen_spanish: Sepamos
  alternatives_spanish:
  - Averigüemos
  - Vamos a saber
  lexicon: BDAG
  rationale: El subjuntivo exhortativo se vierte bien con «Sepamos», que mantiene la fuerza de propuesta/decisión del grupo y suena natural en español bíblico moderno.
- source_word: τίνες εἰσὶν οὗτοι
  english_pob_choice: who these men are
  chosen_spanish: quiénes son estos hombres
  alternatives_spanish:
  - quiénes son estos
  - quiénes son estas personas
  lexicon: BDAG
  rationale: El contexto masculino está implícito en la escena; «hombres» explicita ese referente como en la versión inglesa, y «quiénes son» conserva la pregunta identitaria del griego.
theological_decisions:
- issue: Identidad de los referidos como masculinos en contexto
  english_pob_reading: who these men are
  chosen_spanish_reading: quiénes son estos hombres
  alternative_spanish_readings:
  - quiénes son estos
  - quiénes son estas personas
  rationale: La escena se refiere a los dos jóvenes previamente mencionados. En español, explicitar «hombres» ayuda a la claridad narrativa sin alterar el sentido del griego ni introducir una interpretación doctrinal.
  doctrine_reference: Contextual referent clarity; no doctrinal dispute.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó la idea errónea de «at one another». Por eso el español evita cualquier lectura recíproca entre los hablantes y traduce el movimiento como una acción conjunta repentina («nos lanzamos juntos»).
  spanish_consistency_notes:
  - Se usa «nosotros» para mantener la primera persona plural del griego.
  - «Allí» reproduce la presencia localizada sin sobrecargar el aspecto de στάσις/posición.
  - Se evitó «Cristo», «SEÑOR» u otra terminología no pertinente al versículo.
  - La cita directa usa comillas angulares conforme al español editorial.
  - La nota al pie marca la alternativa lexical sin duplicar información en el texto principal.
