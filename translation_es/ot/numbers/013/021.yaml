translation:
  language: es
  text: Así subieron y reconocieron la tierra desde el desierto de Zin hasta Rehob[a], en Lebó-hamat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «hacia la entrada de Hamat». La expresión hebrea puede leerse de manera descriptiva más que como el nombre propio Lebó-hamat.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: they went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - fueron hacia arriba
  lexicon: HALOT
  rationale: El hebreo עלה conserva la idea básica de movimiento ascendente o de ir a un lugar más alto. En español, «subieron» comunica de forma natural ese movimiento sin perder la dirección narrativa.
- source_word: וַיָּתֻרוּ
  english_pob_choice: spied out
  chosen_spanish: reconocieron
  alternatives_spanish:
  - exploraron
  - espionaron
  lexicon: HALOT
  rationale: En este contexto militar y narrativo, el verbo תור describe una inspección o reconocimiento del territorio. «Reconocieron» expresa bien esa acción en español; evita el sentido demasiado moderno o forzado de «espiaron», pero mantiene el matiz de inspección cuidadosa que la POB inglesa quiso captar con «spied out».
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: Aunque «la tierra» puede sonar amplio, en el contexto de Números 13 es la traducción española más fiel y tradicional para el territorio prometido investigado por los enviados. «Región» suavizaría demasiado el alcance geográfico.
- source_word: מִמִּדְבַּר צִן
  english_pob_choice: from the wilderness of Zin
  chosen_spanish: desde el desierto de Zin
  alternatives_spanish:
  - desde el desierto de Sin
  - desde la estepa de Zin
  lexicon: HALOT
  rationale: מִדְבָּר puede traducirse «desierto» o «desierto/estepa»; aquí «desierto de Zin» conserva el nombre propio y resulta claro para el lector español. Se prefirió «desde» para reflejar el punto de partida del recorrido.
- source_word: עַד רְחֹב
  english_pob_choice: as far as Rehob
  chosen_spanish: hasta Rehob
  alternatives_spanish:
  - así como Rehob
  - hasta la zona de Rehob
  lexicon: HALOT
  rationale: עַד marca el límite del recorrido. «Hasta Rehob» reproduce de manera directa ese alcance geográfico en español.
- source_word: לְבֹא חֲמָת
  english_pob_choice: at Lebo-hamath
  chosen_spanish: en Lebo-Hamat
  alternatives_spanish:
  - hacia la entrada de Hamat
  - en la entrada de Hamat
  lexicon: HALOT
  rationale: La expresión puede leerse como topónimo («Lebo-Hamat») o de manera descriptiva («entrada de Hamat»). En el texto principal se conserva la forma toponímica por su fuerza probable de nombre geográfico, siguiendo la cautela de la POB inglesa.
theological_decisions:
- issue: Alcance geográfico y posible lectura descriptiva de לְבֹא חֲמָת
  english_pob_reading: The Hebrew expression may be read descriptively rather than as the place name Lebo-hamath.
  chosen_spanish_reading: Se conserva «Lebo-Hamat» en el texto principal, pero se señala la posible lectura descriptiva en nota.
  alternative_spanish_readings:
  - hacia la entrada de Hamat
  - en la entrada de Hamat
  rationale: 'La evidencia permite dos opciones: tratar la expresión como topónimo o como descripción del límite territorial. Para no cerrar indebidamente la ambigüedad, el texto principal mantiene la forma toponímica y la nota preserva la lectura descriptiva.'
  doctrine_reference: Principio de transparencia textual; no hay implicación doctrinal directa.
translation_notes:
  revision_awareness: Se siguió la lectura estable del contexto inglés POB sin cambios de revisión aplicados; la solución española conserva la misma ambigüedad controlada en torno a לְבֹא חֲמָת y mantiene el valor narrativo de los verbos de movimiento y reconocimiento.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando no aparece en este versículo; no aplica aquí.
  - Se evitó «espiaron» para no imponer un matiz más peyorativo que el reconocimiento narrativo del hebreo.
  - «Lebo-Hamat» se mantuvo como forma toponímica en el texto principal para armonizar con la decisión inglesa y con el posible valor de nombre propio.
