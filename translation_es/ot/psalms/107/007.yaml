translation:
  language: es
  text: Los condujo por un camino recto para ir a una ciudad para habitar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «los condujo por un camino recto para ir a una ciudad de habitación».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּדְרִיכֵם
  english_pob_choice: He led them
  chosen_spanish: Los condujo
  alternatives_spanish:
  - Los guió
  - Los llevó
  lexicon: HALOT / דרך Hiphil
  rationale: El verbo causativo expresa dirección y conducción por un camino; «condujo» conserva ese matiz de guía sin sonar forzado en español.
- source_word: בְּדֶרֶךְ
  english_pob_choice: by a ... way
  chosen_spanish: por camino
  alternatives_spanish:
  - por una vía
  - por un camino
  lexicon: HALOT / דרך
  rationale: «Camino» es natural en español bíblico contemporáneo y mantiene la imagen de ruta o senda; «por» expresa el medio o trayecto por el que los condujo.
- source_word: יְשָׁרָה
  english_pob_choice: straight
  chosen_spanish: recto
  alternatives_spanish:
  - derecho
  - llano
  - upright
  lexicon: HALOT / ישר
  rationale: «Recto» comunica la idea concreta de un trayecto directo y, en español, resulta más idiomático que un calco literal de «derecho» en este contexto.
- source_word: לָלֶכֶת
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - para caminar
  - para andar
  lexicon: HALOT / הלך
  rationale: El infinitivo de propósito se vierte naturalmente con «para ir», manteniendo el movimiento objetivo del verso sin sobrecargarlo con una forma más literal pero menos fluida.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT / אל
  rationale: La preposición direccional se expresa de forma simple con «a», que en español introduce el destino del movimiento.
- source_word: עִיר
  english_pob_choice: a city
  chosen_spanish: una ciudad
  alternatives_spanish:
  - un poblado
  - una villa
  lexicon: HALOT / עיר
  rationale: «Ciudad» es la equivalencia estándar y conserva el sentido de un lugar habitado y seguro al que se llega.
- source_word: מוֹשָׁב
  english_pob_choice: to dwell in
  chosen_spanish: donde habitar
  alternatives_spanish:
  - de habitación
  - para morar
  lexicon: HALOT / מושב
  rationale: El sustantivo denota morada, asentamiento o habitación. En español, «donde habitar» preserva la idea de un lugar para residencia sin la aspereza de una construcción demasiado literal.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y coincide sustancialmente con la solución auditada en inglés: conducción divina, camino recto, movimiento hacia una ciudad y la noción de habitación/domicilio. Se eligió una formulación más natural en español manteniendo la misma tensión lexical entre «habitar» y la expresión más formal «de habitación».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando aparezca el nombre divino en otros contextos del proyecto; aquí no aparece ningún sustituto nominal divino.
  - «Condujo» se usa como equivalente de guía/lead para conservar el matiz causativo de דרך en hifil.
  - «Habitar» retiene la idea de residencia sin convertir la frase en una glosa explicativa.
