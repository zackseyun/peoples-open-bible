theological_decisions:
- issue: Final clause's theological force
  chosen_reading: he is the whole
  alternative_readings:
  - he is all
  - he is everything
  rationale: The Hebrew and Greek together present a terse doxological conclusion about God after the catalog of creation. The translation preserves the compact identification rather than expanding it into a fuller doctrinal paraphrase. 'He is the whole' keeps the tension and avoids importing metaphysical language not explicit in the text.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
