id: JOS.3.11
reference: Joshua 3:11
source:
  edition: WLC
  text: הִנֵּה֙ אֲר֣וֹן הַ/בְּרִ֔ית אֲד֖וֹן כָּל הָ/אָ֑רֶץ עֹבֵ֥ר לִ/פְנֵי/כֶ֖ם בַּ/יַּרְדֵּֽן־׃
translation:
  text: Look[a], the ark of the covenant, the Lord of all the earth, is crossing ahead of you in the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Jordan.' The Hebrew can be rendered more literally this way, but 'into the Jordan' better reflects the directional sense with 'is crossing' in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: An attention-getting particle. 'Look' preserves the immediacy in readable modern English better than the more archaic 'Behold,' while remaining more vivid than a bare 'See.'
- source_word: אֲרוֹן הַבְּרִית
  chosen: the ark of the covenant
  alternatives:
  - the covenant ark
  lexicon: HALOT
  rationale: 'This is the standard construct relationship: ''ark of the covenant.'' It is the most transparent and natural rendering of the Hebrew phrase.'
- source_word: אֲדוֹן כָּל הָאָרֶץ
  chosen: the Lord of all the earth
  alternatives:
  - the master of all the earth
  lexicon: HALOT
  rationale: אָדוֹן here is a title of sovereignty. 'Lord' is the natural English equivalent in biblical style and aligns with the project's default rendering for cognate lordship titles. 'Master' is possible lexically but sounds less idiomatic in this titular construction.
- source_word: עֹבֵר
  chosen: is crossing
  alternatives:
  - crosses
  - is passing over
  lexicon: HALOT
  rationale: The participle presents the action as in progress or imminent. 'Is crossing' captures the vividness of the Hebrew better than a simple present 'crosses.' 'Passing over' is possible but less natural here.
- source_word: לִפְנֵיכֶם
  chosen: ahead of you
  alternatives:
  - before you
  - in front of you
  lexicon: HALOT
  rationale: The phrase indicates movement in advance of the people. 'Ahead of you' communicates this clearly in contemporary English; 'before you' is also valid but slightly less idiomatic for modern readers.
- source_word: בַּיַּרְדֵּן
  chosen: into the Jordan
  alternatives:
  - in the Jordan
  - through the Jordan
  lexicon: HALOT
  rationale: With a verb of crossing, the preposition here is best rendered in a way that reflects entry into the river crossing. 'Into the Jordan' fits the scene naturally in English. A more literal 'in the Jordan' is possible, but can sound static rather than directional.
