translation:
  language: es
  text: Partieron de Refidim y acamparon en el desierto de Sinaí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Salieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: El verbo de itinerario expresa la salida desde una etapa del viaje. 'Partieron' comunica de manera natural en español el movimiento inicial sin volverlo más interpretativo que el hebreo.
- source_word: מֵרְפִידִם
  english_pob_choice: from Rephidim
  chosen_spanish: de Refidim
  alternatives_spanish:
  - desde Refidim
  lexicon: HALOT
  rationale: La preposición hebrea indica origen. Se conserva el nombre propio como transliteración establecida en español, sin traducirlo.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron campamento
  lexicon: HALOT
  rationale: El verbo חנה en contexto de itinerario desértico significa establecer campamento. 'Acamparon' es claro y fiel, y evita un calco innecesariamente formal.
- source_word: בְּמִדְבַּר סִינָי
  english_pob_choice: in the wilderness of Sinai
  chosen_spanish: en el desierto de Sinaí
  alternatives_spanish:
  - en el desierto de Sinaí
  - en la región desértica de Sinaí
  lexicon: HALOT
  rationale: מִדְבָּר puede referirse a 'desierto' o 'zona silvestre/estéril'. Aquí 'desierto' funciona bien en español y mantiene la imagen geográfica. Se conserva 'Sinaí' como nombre propio.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; el hebreo y la traducción inglesa coinciden en la fórmula itineraria básica, sin tensiones textuales o teológicas adicionales en este versículo.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y narrativo típico de las listas de itinerario del Pentateuco.
  - Se prefiere 'Partieron' frente a 'Se pusieron en marcha' por concisión y por reflejar bien el valor direccional del hebreo.
  - No se usa 'SEÑOR' ni terminología teológica adicional porque el versículo no contiene referencias divinas explícitas.
