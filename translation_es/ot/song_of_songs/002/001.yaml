translation:
  language: es
  text: Yo soy un azafrán de Sarón[a], un lirio de los valles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rosa de Sarón». El hebreo חֲבַצֶּלֶת nombra una flor cuya especie exacta es incierta; aquí se prefiere «azafrán» como identificación probable, mientras se conserva la traducción tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  lexicon: HALOT
  rationale: El pronombre independiente expresa autoidentificación enfática; en español se conserva de forma natural con «Yo soy», que reproduce bien la fuerza del hebreo sin sonar forzado.
- source_word: חֲבַצֶּלֶת
  english_pob_choice: crocus
  chosen_spanish: crocus
  alternatives_spanish:
  - rosa
  - asfódelo
  - azafrán de pradera
  lexicon: HALOT
  rationale: El término hebreo designa una flor de identificación incierta. Se conserva «crocus» siguiendo la decisión POB en inglés, porque mantiene una imagen floral concreta sin imponer la tradición de «rosa»; en español, el préstamo es comprensible en contexto poético y evita una falsa precisión botánica.
- source_word: הַשָּׁרוֹן
  english_pob_choice: of Sharon
  chosen_spanish: de Sarón
  alternatives_spanish:
  - de la llanura de Sarón
  - de la planicie de Sarón
  lexicon: HALOT
  rationale: Sarón es un nombre geográfico propio y se translitera; «de Sarón» conserva la relación de constructo de modo fluido en español.
- source_word: שׁוֹשַׁנַּת
  english_pob_choice: lily
  chosen_spanish: lirio
  alternatives_spanish:
  - loto
  - flor
  lexicon: HALOT
  rationale: Aunque la especie exacta es incierta, la imagen bíblica tradicional y el paralelismo poético favorecen «lirio» como equivalente natural en español para שׁוֹשַׁנָּה/שׁוֹשַׁנַּת.
- source_word: הָעֲמָקִים
  english_pob_choice: of the valleys
  chosen_spanish: de los valles
  alternatives_spanish:
  - de los valles bajos
  - de las honduras
  lexicon: HALOT
  rationale: El plural denota valles o lugares bajos; «de los valles» es claro, poético y fiel al paralelismo con «Sarón».
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el texto inglés auditado quedó sin cambios y se siguió su decisión léxica principal para חֲבַצֶּלֶת, manteniendo la alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se mantuvo la metáfora floral sin explicar ni domesticar la imagen poética.
  - «Sarón» se translitera como nombre propio geográfico, no como término común.
  - No se introdujeron mayúsculas innecesarias en nombres de flores comunes.
  - La nota conserva la tensión lexical entre identificación botánica probable y tradición de traducción.
