revisions:
- from: 'Entonces entraron los dos hombres, hijos de Belial[a], y se sentaron frente a él; y los hombres de Belial dieron testimonio contra Nabot ante el pueblo, diciendo: «Nabot blasfemó contra Dios y contra el rey». Y lo sacaron fuera de la ciudad, y lo apedrearon[b] con piedras, y murió.'
  to: 'Entonces entraron los dos hombres perversos[a] y se sentaron frente a él; y aquellos hombres perversos[a] dieron testimonio contra Nabot ante el pueblo, diciendo: «Nabot maldijo[b] a Dios y al rey». Entonces lo sacaron fuera de la ciudad, lo apedrearon con piedras, y murió.'
  rationale: 'La revisión alinea el español con el hebreo y con la auditoría inglesa: el modismo בְּנֵי/אַנְשֵׁי בְלִיַּעַל se traduce por sentido en el cuerpo principal y se conserva literalmente en nota; el eufemismo בֵּרַךְ se vierte por su sentido real como ''maldijo'', que además funciona correctamente con los dos objetos ''Dios y el rey''. Se mantiene el resto del trazado narrativo del borrador porque es fiel y natural en español.'
  reviewer_model: gpt-5.4
