translation:
  language: es
  text: Todos los que pasan por el camino lo han despojado[a]; se ha vuelto oprobio a sus vecinos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todos los transeúntes lo han despojado». La expresión hebrea es literalmente «todos los que pasan por el camino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁסֻּהוּ
  english_pob_choice: have plundered him
  chosen_spanish: lo han despojado
  alternatives_spanish:
  - lo han saqueado
  - lo han plunderado
  - lo han devastado
  lexicon: HALOT
  rationale: El verbo hebreo denota despojar/plunderar con acción hostil concreta. «Despojado» conserva ese sentido de quitar bienes o dejar sin defensa, y suena natural en español bíblico contemporáneo. Evita suavizar el golpe verbal con un simple «atacado».
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Cada uno de
  - Todos los
  lexicon: HALOT
  rationale: Aquí כָּל con el participio funciona de modo distributivo/colectivo. «Todos» transmite el alcance total y encaja bien con la construcción nominal española.
- source_word: עֹבְרֵי דָרֶךְ
  english_pob_choice: who pass by the way
  chosen_spanish: los que pasan por el camino
  alternatives_spanish:
  - los transeúntes
  - los caminantes
  - los que pasan por la ruta
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «pasajeros del camino». «Los que pasan por el camino» mantiene la imagen y el paralelismo del original mejor que un término más interpretativo como «transeúntes».
- source_word: הָיָה
  english_pob_choice: has become
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - ha sido
  - se convirtió
  - llegó a ser
  lexicon: HALOT
  rationale: El perfecto hebreo expresa aquí un estado resultante. «Se ha vuelto» comunica el cambio de condición producido por la humillación previa sin forzar un pasado simple.
- source_word: חֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - vergüenza
  - deshonra
  lexicon: HALOT
  rationale: חֶרְפָּה puede ser reproche, oprobio o deshonra. «Oprobio» conserva el registro de afrenta pública y encaja bien con el tono de lamento del salmo. En español, «reproche» puede sonar demasiado a reprensión verbal, por eso se evitó.
- source_word: לִשְׁכֵנָיו
  english_pob_choice: to his neighbors
  chosen_spanish: para sus vecinos
  alternatives_spanish:
  - a sus vecinos
  - entre sus vecinos
  - con sus vecinos
  lexicon: HALOT
  rationale: שָׁכֵן significa vecino o quien habita cerca. El ל marca relación/respecto; por eso «para sus vecinos» reproduce bien la idea de ser oprobio en relación con ellos, sin imponer una fórmula más explicativa.
theological_decisions:
- issue: Referencia del pronombre singular
  english_pob_reading: Render the pronouns as 'him' without specifying the referent in the translation.
  chosen_spanish_reading: Mantener «lo» / «sus» sin nombrar al referente.
  alternative_spanish_readings:
  - al rey davidico
  - al ungido
  - al pueblo representado por el rey
  rationale: El contexto inmediato apunta al rey davídico y al ungido, pero el verso usa solo pronombres de tercera persona. Para respetar la tensión interpretativa del texto, la versión española no identifica al referente de manera explícita.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla interpretativamente.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios sustanciales; la presente redacción solo ajusta la equivalencia al español y conserva el valor distributivo y la ambigüedad referencial del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del proyecto cuando corresponda; este verso no lo contiene.
  - Se evitó «SEÑOR» y se preservó el léxico de afrenta pública con «oprobio».
  - La nota al pie conserva la alternativa literal del hebreo para el sintagma de «camino» sin alterar el texto principal.
