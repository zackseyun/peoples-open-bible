  to: Y no se acercarán a un muerto para contaminarse; pero sí por su padre o su madre, por su hijo o su hija, por su hermano, o por una hermana que no haya estado unida a un hombre[a], podrán contaminarse.
  rationale: Se hicieron ajustes menores para mejorar la naturalidad del español y reflejar con más precisión el matiz relacional del hebreo. Se añadieron posesivos implícitos en la lista de familiares para una lectura idiomática, y se reemplazó «pertenecido a un hombre» por «estado unida a un hombre», que conserva mejor la idea de vínculo matrimonial sin introducir una noción de propiedad demasiado fuerte. Se mantiene la nota alternativa ya documentada.
