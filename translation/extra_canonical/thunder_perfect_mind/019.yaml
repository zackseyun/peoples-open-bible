  from: I am the staff of his counsel in his youth; and he is my rod when I grow old
    by day; and the Logos is what his will shall be; I am the utterance of my name—because
    of those who hate me, you love me, and you hate those who love me.
  to: I am the voice whose sound is manifold, and the word whose appearance is manifold.
    I am the utterance of my name. Why, you who hate me, do you love me, and hate
    those who love me?
  rationale: The draft is a severe hallucination caused by misparsing Coptic words
    and OCR errors. ⲧⲉⲥⲙⲏ means "the voice" (not "rod"); ⲛⲁϣⲱⲥ ϩⲣⲟⲟⲩ means "whose
    sound is manifold" (not "grow old by day"); ⲛⲁϣⲉ ⲡⲉϥⲉⲓⲛⲉ means "whose appearance
    is manifold" (not "what his will shall be"). Furthermore, ⲉⲧⲃⲉ ⲟⲩ is the interrogative
    "Why?" (not "because of"). The initial OCR fragment `ⲁ ⲉⲧⲉⲛⲁϣⲉ ⲡⲉⲥⲣⲡⲙⲉⲉⲩⲉ` is
    a misread remnant of the preceding line (`ⲡⲉϥⲣⲡⲙⲉⲉⲩⲉ`, "its comprehension") and
    should not be translated as "staff of his counsel".
