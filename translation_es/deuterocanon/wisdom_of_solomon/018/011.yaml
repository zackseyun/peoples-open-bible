translation:
  language: es
  text: Y esclavo y amo fueron castigados con el mismo juicio[a], y el hombre común padeció lo mismo que el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una pena igual»; el griego δίκη puede significar juicio, castigo o pena según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοία
  english_pob_choice: the same
  chosen_spanish: el mismo
  alternatives_spanish:
  - igual
  - idéntico
  lexicon: LSJ
  rationale: En combinación con τὰ αὐτά, el griego enfatiza equivalencia real, no mera semejanza. «El mismo» conserva esa fuerza con naturalidad en español.
- source_word: δίκη
  english_pob_choice: punishment / judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - castigo
  - pena
  - sentencia
  lexicon: LSJ
  rationale: El contexto describe una retribución divina sobre distintos rangos sociales. «Juicio» permite mantener la amplitud semántica de δίκη, que puede abarcar juicio, pena o castigo, sin cerrar demasiado el sentido. En la nota se preserva la alternativa penal.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: BDAG
  rationale: El contraste con δεσπότῃ hace central el estatus de dependencia servil. «Esclavo» reproduce mejor esa fuerza social que «siervo», que suavizaría el término.
- source_word: δεσπότῃ
  english_pob_choice: master
  chosen_spanish: amo
  alternatives_spanish:
  - señor
  - dueño
  lexicon: LSJ
  rationale: En contraste directo con δοῦλος, «amo» es el equivalente social más natural en español. «Señor» podría sonar demasiado teológico; «dueño» reduce la relación personal implícita.
- source_word: κολασθείς
  english_pob_choice: were punished
  chosen_spanish: recibieron
  alternatives_spanish:
  - fueron castigados
  - sufrieron castigo
  lexicon: LSJ
  rationale: El participio pasivo apunta al hecho de haber sido alcanzados por una pena. En español, el verbo principal «recibieron» con «juicio» conserva la estructura breve y evita sobrecargar la cláusula, aunque la nota deja abierta la lectura penal.
- source_word: δημότης
  english_pob_choice: commoner
  chosen_spanish: el común
  alternatives_spanish:
  - el ciudadano
  - el hombre común
  lexicon: LSJ
  rationale: La oposición con βασιλεῖ no exige un tecnicismo cívico sino una persona de condición ordinaria frente al rey. «El común» es conciso y mantiene el contraste social.
- source_word: βασιλεῖ
  english_pob_choice: king
  chosen_spanish: el rey
  alternatives_spanish:
  - el soberano
  - el monarca
  lexicon: LSJ
  rationale: El sentido básico es el de un gobernante real; «el rey» conserva la oposición con «el común» de manera clara y directa.
- source_word: τὰ αὐτὰ πάσχων
  english_pob_choice: suffered the same things
  chosen_spanish: sufrió las mismas cosas
  alternatives_spanish:
  - padeció lo mismo
  - experimentó las mismas cosas
  lexicon: LSJ
  rationale: La repetición del paralelo exige una traducción bastante literal. «Sufrió las mismas cosas» sigue de cerca el griego sin introducir una interpretación más específica que el texto no explicita.
theological_decisions:
- issue: Mantener la equivalencia de juicio entre clases sociales
  english_pob_reading: slave and master alike were punished with the same judgment
  chosen_spanish_reading: esclavo y amo recibieron por igual el mismo juicio
  alternative_spanish_readings:
  - esclavo y amo fueron castigados por igual con el mismo juicio
  - esclavo y amo padecieron por igual la misma pena
  rationale: El versículo subraya la nivelación de estatus ante la acción divina. La redacción española conserva la simetría y evita suavizar la oposición social presente en el griego.
  doctrine_reference: 'DOCTRINE.md: Treatment of κοινωνική nivelación / divine judgment contexts; Translation philosophy §1'
- issue: Evitar ocultar la fuerza social de δοῦλος
  english_pob_reading: slave rather than servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: El proyecto prioriza el valor léxico fuerte de δοῦλος cuando la condición de esclavitud es relevante. En este pasaje la contraposición con el amo exige conservar esa realidad social.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que ajustó δίκη hacia «judgment» y preservó el paralelismo formal. La versión española mantiene esa amplitud semántica con «juicio» y conserva la estructura binaria esclavo/amo; también refleja el segundo miembro con una formulación directa de τὰ αὐτὰ πάσχων.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Se prefirió «esclavo» a «siervo» por consistencia con la política POB para δοῦλος.
  - «El común» se eligió como equivalente breve de δημότης en contraste con «el rey», evitando un tecnicismo innecesario.
  - La nota de pie preserva la alternativa semántica de δίκη sin duplicar marcadores.
