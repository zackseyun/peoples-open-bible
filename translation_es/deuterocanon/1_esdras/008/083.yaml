translation:
  language: es
  text: a vuestros hijos para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego conservado para este versículo en la fuente proporcionada contiene solo esta breve frase, literalmente «a vuestros hijos para siempre». El paralelo hebreo suministrado refleja otro contexto, más largo, y no se usa para reconstruir aquí el resto del enunciado.
    reason: textual_variant
lexical_decisions:
- source_word: τοῖς υἱοῖς ὑμῶν
  english_pob_choice: to your sons
  chosen_spanish: a vuestros hijos
  alternatives_spanish:
  - a vuestros hijos varones
  - para vuestros hijos
  lexicon: LSJ
  rationale: 'El dativo con artículo y posesivo expresa destino/beneficio: en español bíblico natural puede rendirse como «a» o «para». Opté por «hijos» en lugar de «hijos varones» porque, aunque υἱοῖς es masculinidad gramatical explícita, «hijos» comunica el referente masculino plural de manera idiomática sin sonar forzado. Mantiene la fuerza del término sin ampliar indebidamente a «hijos e hijas».'
- source_word: ἕως αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - hasta el siglo
  - perpetuamente
  lexicon: LSJ
  rationale: La expresión idiomática señala duración indefinida y permanente. «Para siempre» es la equivalencia moderna más clara y fiel en español; evita el calco «hasta el siglo», que sería poco natural aquí, y preserva la permanencia sin añadir matices doctrinales no presentes en el fragmento.
theological_decisions:
- issue: Fragmento breve con contexto textual mayormente incierto
  english_pob_reading: 'Translate the extant Greek fragment directly as a sentence fragment: ''to your sons forever.'''
  chosen_spanish_reading: 'Traducir únicamente el fragmento griego conservado como un sintagma: «a vuestros hijos para siempre».'
  alternative_spanish_readings:
  - Intentar reconstruir una oración más amplia a partir del paralelo hebreo/masorético
  - Convertir el fragmento en una frase completa con verbo implícito
  rationale: La fuente primaria griega preservada aquí contiene solo esta breve secuencia. El paralelo hebreo suministrado pertenece a un contexto más amplio y no debe usarse para reconstruir o sobrescribir el texto griego. Mantener el carácter fragmentario respeta la primacía de la fuente original y la advertencia de desajuste mayor.
  doctrine_reference: 'PHILOSOPHY.md: primacía del original y manejo transparente de la incertidumbre textual'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta traducción sigue el texto griego conservado y mantiene explícito su carácter fragmentario, en línea con el juicio de alta concordancia del control cruzado.
  spanish_consistency_notes:
  - Se mantiene «hijos» para reflejar υἱοῖς sin neutralizar el masculino explícito.
  - Se usa «para siempre» como equivalente idiomático de ἕως αἰῶνος.
  - No se añadió verbo ni material contextual ausente en el griego conservado.
  - La nota al pie preserva la advertencia sobre el paralelo hebreo y la imposibilidad de reconstrucción responsable.
