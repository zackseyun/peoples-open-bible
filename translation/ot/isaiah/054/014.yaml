theological_decisions:
- issue: Addressee and gender
  chosen_reading: Second feminine singular retained as 'you,' referring to Zion/Jerusalem collectively.
  alternative_readings:
  - Explicitly supply 'O Zion' or 'Jerusalem' in the text
  rationale: The Hebrew addresses a feminine singular entity in context, namely Zion/Jerusalem. English 'you' cannot mark gender, but no explicit noun is added because the source text does not repeat it in this verse. This preserves the original discourse flow without importing interpretation into the main text.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
