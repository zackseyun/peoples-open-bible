revisions:
- from: E Hiram envió en la nave a sus siervos[a], marinos, hombres que conocían el mar, con los siervos de Salomón.
  to: Y Hiram envió en la nave a sus siervos[a] con los siervos de Salomón, marinos, hombres que conocían el mar.
  rationale: Se corrige la conjunción inicial a 'Y', se reubica 'con los siervos de Salomón' para reflejar con mayor precisión la sintaxis y el sentido del hebreo, y se pule la nota para un español editorial más natural sin alterar la decisión léxica principal.
  reviewer_model: gpt-5.4
