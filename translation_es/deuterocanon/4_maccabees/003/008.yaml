translation:
  language: es
  text: Entonces, cuando ya había llegado la tarde, sudando y muy agotado, fue a la tienda real[a], alrededor de la cual había acampado todo el ejército de sus antepasados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la tienda del rey». El adjetivo griego significa «real» y puede referirse específicamente a la tienda del soberano en el campamento.
    reason: lexical_alternative
  - marker: b
    text: La frase «todo el ejército de sus antepasados» es muy comprimida en griego y también puede entenderse como «todo el ejército de sus progenitores».
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε δὴ γενομένης ἑσπέρας
  english_pob_choice: Then, when evening had come
  chosen_spanish: Entonces, cuando llegó la tarde
  alternatives_spanish:
  - Entonces, al caer la tarde
  - Entonces, cuando anocheció
  lexicon: LSJ
  rationale: La construcción genitiva absoluta marca circunstancia temporal concluida; en español, «cuando llegó la tarde» conserva la llegada/comienzo del momento vespertino de manera natural y fiel.
- source_word: ἱδρῶν
  english_pob_choice: sweating
  chosen_spanish: sudando
  alternatives_spanish:
  - perspirando
  - en sudor
  lexicon: LSJ
  rationale: El participio presente describe el estado físico del personaje al llegar. «Sudando» es idiomático en español y mantiene la imagen concreta sin añadir matices no presentes.
- source_word: σφόδρα κεκμηκώς
  english_pob_choice: very exhausted
  chosen_spanish: muy agotado
  alternatives_spanish:
  - sumamente fatigado
  - completamente rendido
  lexicon: LSJ
  rationale: σφόδρα intensifica el participio perfecto κεκμηκώς, que expresa un estado resultante. «Muy agotado» comunica bien la intensidad y el estado duradero sin sobretraducción.
- source_word: ἐπὶ τὴν βασίλειον σκηνήν
  english_pob_choice: to the royal tent
  chosen_spanish: a la tienda real
  alternatives_spanish:
  - a la tienda del rey
  - a la tienda regia
  lexicon: LSJ
  rationale: El adjetivo βασίλειος es «real/reyal», y σκηνή es «tienda». En español, «tienda real» mantiene la referencia monárquica y la imagen militar del campamento mejor que una paráfrasis más amplia.
- source_word: περὶ ἣν
  english_pob_choice: around which
  chosen_spanish: alrededor de la cual
  alternatives_spanish:
  - en torno a la cual
  - cerca de la cual
  lexicon: LSJ
  rationale: La preposición περί con relativo expresa relación espacial de circundar. «Alrededor de la cual» reproduce con claridad la imagen del campamento rodeando la tienda.
- source_word: ὁ πᾶς τῶν προγόνων στρατός
  english_pob_choice: the whole army of his forefathers
  chosen_spanish: todo el ejército de sus antepasados
  alternatives_spanish:
  - todo el ejército de sus padres
  - el ejército entero de sus antepasados
  lexicon: LSJ
  rationale: La frase es compacta en griego. «Todo el ejército de sus antepasados» conserva el carácter genealógico de προγόνων y la totalidad del στρατός, sin introducir identidades históricas no explícitas.
- source_word: ἐστρατοπέδευκεν
  english_pob_choice: had encamped
  chosen_spanish: había acampado
  alternatives_spanish:
  - estaba acampado
  - había instalado el campamento
  lexicon: LSJ
  rationale: El pluscuamperfecto en español expresa bien la acción anterior a su llegada. «Había acampado» es directo y mantiene el verbo militar de campamento sin expansión interpretativa.
theological_decisions:
- issue: Referencia de «sus antepasados» en un contexto histórico-militar
  english_pob_reading: Retain the genealogical expression without specifying names or importing historical identifications.
  chosen_spanish_reading: Mantener la expresión genealógica sin precisar identidades históricas no dichas en el versículo.
  alternative_spanish_readings:
  - Interpretar de forma más específica como el ejército ancestral de Israel
  - Sustituir por una referencia histórica concreta
  rationale: El griego dice τῶν προγόνων sin nombrar a quiénes se refiere. La traducción española preserva esa apertura y evita añadir información que el texto no explicita.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue la lectura revisada del auditor inglés, que prefirió «forefathers» por su naturalidad en el contexto militar-histórico, y conserva la misma estructura temporal y espacial del original griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - «Ejército» se usa para στρατός por su adecuación militar y su transparencia semántica en español.
  - «Tienda real» conserva el valor de βασίλειος sin convertirlo en «palacio», que sería una expansión ajena al texto.
