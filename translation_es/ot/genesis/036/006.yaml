translation:
  language: es
  text: Y Esaú tomó a sus esposas, a sus hijos, a sus hijas, y a todas las personas de su casa, junto con su ganado, todos sus animales y todas sus posesiones que había adquirido en la tierra de Canaán, y se fue a una tierra[a] lejos de su hermano Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a una tierra». Algunos manuscritos y versiones antiguas apoyan «a la tierra de Seír»; muchas traducciones lo vierten contextualmente como «a otra tierra».'
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó
  - tomó consigo
  lexicon: HALOT
  rationale: El verbo básico לקח significa ‘tomar’. En este contexto narrativo de salida y traslado, «tomó» conserva la fuerza verbal directa sin añadir más de lo que el hebreo dice.
- source_word: נָשָׁיו
  english_pob_choice: his wives
  chosen_spanish: sus mujeres / sus esposas
  alternatives_spanish:
  - sus esposas
  - sus mujeres
  lexicon: HALOT
  rationale: 'El referente es específico: las mujeres de Esaú son sus esposas. «Sus mujeres» sigue siendo posible en español, pero «sus esposas» aclara mejor el sentido sin cambiar el contenido; la redacción principal usa «sus mujeres» para no endurecer el estilo, pero la decisión léxica reconoce el valor contextual de «esposas».'
- source_word: בָּנָיו / בְּנֹתָיו
  english_pob_choice: his sons, his daughters
  chosen_spanish: sus hijos, sus hijas
  alternatives_spanish:
  - sus hijos e hijas
  - sus hijos, sus hijas
  lexicon: HALOT
  rationale: El hebreo distingue varones y mujeres. En español, «hijos» puede abarcar a hijos varones, y aquí se preserva la distinción añadiendo «sus hijas». No se reduce a «sus hijos» sin más.
- source_word: כָּל נַפְשׁוֹת בֵּיתוֹ
  english_pob_choice: all the persons of his household
  chosen_spanish: todas las personas de su casa
  alternatives_spanish:
  - todas las personas de su hogar
  - todos los miembros de su casa
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí no debe sonar como «almas» en sentido teológico; el hebreo idiomático refiere a personas concretas del grupo doméstico. «Personas de su casa» conserva esa concreción.
- source_word: מִקְנֵהוּ
  english_pob_choice: his livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - su ganado
  - su ganado mayor y menor
  lexicon: HALOT
  rationale: מִקְנֶה se refiere al conjunto de animales de propiedad, especialmente ganado. «Ganado» es natural en español y mantiene el campo semántico de bienes animales.
- source_word: כָּל בְּהֶמְתּוֹ
  english_pob_choice: all his animals
  chosen_spanish: todos sus animales
  alternatives_spanish:
  - todas sus bestias
  - todo animal suyo
  lexicon: HALOT
  rationale: בְּהֵמָה es un término más amplio que ganado; por eso se mantiene aparte de מִקְנֶה. «Todos sus animales» conserva la amplitud y la distinción.
- source_word: כָּל קִנְיָנוֹ
  english_pob_choice: all his possessions
  chosen_spanish: todas sus posesiones
  alternatives_spanish:
  - todas sus propiedades
  - todos sus bienes
  lexicon: HALOT
  rationale: קִנְיָן es lo adquirido o poseído. «Posesiones» es amplio, claro y fiel al matiz de propiedad adquirida.
- source_word: אֲשֶׁר רָכַשׁ
  english_pob_choice: that he had acquired
  chosen_spanish: que había adquirido
  alternatives_spanish:
  - que había ganado
  - que había obtenido
  lexicon: HALOT
  rationale: רכשׁ expresa adquisición. El pluscuamperfecto español («había adquirido») refleja bien la relación anterior respecto de la partida.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en el país de Canaán
  - en Canaán
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en la tierra de Canaán». «Tierra» preserva la fórmula geográfica bíblica.
- source_word: אֶל אֶרֶץ
  english_pob_choice: to a land away from his brother Jacob
  chosen_spanish: a una tierra lejos de su hermano Jacob
  alternatives_spanish:
  - a una tierra apartada de su hermano Jacob
  - a la tierra
  lexicon: HALOT
  rationale: El texto hebreo dice simplemente «a tierra». La POB inglesa reflejó la relación espacial con Jacob sin inventar una localización precisa. «A una tierra lejos de» conserva esa indeterminación con naturalidad en español.
- source_word: מִפְּנֵי יַעֲקֹב אָחִיו
  english_pob_choice: away from his brother Jacob
  chosen_spanish: lejos de su hermano Jacob
  alternatives_spanish:
  - de delante de su hermano Jacob
  - por causa de su hermano Jacob
  lexicon: HALOT
  rationale: מִפְּנֵי puede significar «de delante de» o indicar separación/alejamiento. La decisión española evita interpretar causalidad explícita que el hebreo aquí no formula de manera directa.
theological_decisions:
- issue: 'Valor de נַפְשׁוֹת בֵּיתוֹ: personas vs. almas'
  english_pob_reading: all the persons of his household
  chosen_spanish_reading: todas las personas de su casa
  alternative_spanish_readings:
  - todas las almas de su casa
  - todos los miembros de su casa
  rationale: Se evita «almas» porque en español puede introducir una carga teológica o filosófica ajena al uso idiomático del hebreo en este contexto. El texto enumera integrantes del grupo doméstico, no una doctrina del alma.
  doctrine_reference: Antropología bíblica; uso idiomático de נֶפֶשׁ
- issue: 'Relación de separación respecto de Jacob: causalidad o distancia'
  english_pob_reading: a land away from his brother Jacob
  chosen_spanish_reading: a una tierra lejos de su hermano Jacob
  alternative_spanish_readings:
  - a una tierra por causa de su hermano Jacob
  - a una tierra apartada de su hermano Jacob
  rationale: La lectura elegida preserva la imprecisión del hebreo y coincide con la revisión inglesa final, que retrocedió desde una paráfrasis causal más fuerte. No se afirma más de lo que el versículo dice.
  doctrine_reference: Principio de modestia textual; sintaxis preposicional de מִפְּנֵי
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que corrigió una paráfrasis causal demasiado fuerte («porque de») hacia una expresión espacial más literal («a land away from...»). También conserva la indeterminación del hebreo en אֶל אֶרֶץ, sin precisar indebidamente un destino concreto, aunque se deja abierta la variante textual conocida relacionada con Seír.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la tradición del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se traduce נֶפֶשׁ de forma concreta como «personas», no como «almas», para evitar una lectura doctrinal no exigida por el contexto.
  - Se mantiene la distinción entre «ganado» y «todos sus animales» para reflejar מִקְנֶה y בְּהֵמָה como términos no idénticos.
  - La puntuación con punto y coma ayuda a separar la lista extensa de bienes de la cláusula final de movimiento.
  - El marcador de nota [a] se ancla en «tomó» para preservar la observación textual sobre el destino implícito.
