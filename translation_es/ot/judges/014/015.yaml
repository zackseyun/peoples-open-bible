review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo: el marco temporal, la orden manipuladora a la esposa, la finalidad de revelar el acertijo, la amenaza de quemarla junto con la casa/familia de su padre, y la acusación final de haberlos invitado para despojarlos. Sin embargo, hay dos problemas importantes de alineación formal y semántica: (1) el ancla de nota [a] está colocada al inicio de la cita, pero la nota trata de «la casa de tu padre»; (2) «Seduce» para פַּתִּי sobretraduce hacia connotación sexual en español, mientras que el hebreo y el rastro POB apuntan a «entice» en sentido de engatusar/persuadir manipulativamente.'
  spanish_quality_summary: El texto es mayormente legible, pero mezcla voseo/plural peninsular («habéis») con un objetivo de español neutral latinoamericano; «han invitado» o «los invitaron» sería más natural en el registro meta. «Enigma» es posible, pero «acertijo» refleja mejor חִידָה en contexto narrativo. La amenaza suena bien; «con fuego» puede mantenerse por fidelidad. La colocación de las notas necesita corrección.
  glossary_alignment: No hay términos teológicos de proyecto implicados. En léxico contextual, conviene ajustar פַּתִּי de «Seduce» a «Engaña» o «Persuade/Convéncelo con astucia»; para este contexto «Engaña a tu marido» preserva mejor el matiz manipulador sin sexualizar. «Acertijo» alinea mejor con la decisión inglesa «riddle». «La casa de tu padre» puede conservarse si se nota la alternativa «familia/hogar», pero la nota debe anclarse allí, no al inicio.
  issues:
  - severity: high
    issue: «Seduce» para פַּתִּי introduce una connotación sexual no exigida por el hebreo.
    rationale: El verbo פתה en piel aquí describe inducir/manipular para obtener información. «Seduce» en español moderno suele sugerir atracción sexual o romántica, lo cual distorsiona el sentido. «Engaña», «persuade» o «convéncelo» según matiz serían más fieles.
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado y no corresponde a su contenido.
    rationale: La nota explica la ambigüedad de בֵּית אָבִיךְ («la casa / la familia de tu padre»), pero el marcador aparece antes de «Seduce». Esto rompe la trazabilidad exigida entre texto y nota.
  - severity: medium
    issue: «Habéis» no encaja con el objetivo de español neutral latinoamericano.
    rationale: Aunque es correcto, el proyecto pide español neutral ampliamente legible; el pretérito perfecto compuesto peninsular con segunda persona plural resulta marcado. «Los invitaron» o «nos invitaron» es más natural y claro.
  - severity: medium
    issue: La nota b está anclada en «con fuego», pero su contenido trata del verbo «despojarnos».
    rationale: La alternativa léxica corresponde a הֲלְיָרְשֵׁנוּ, no a la frase de quemar. El marcador debe ir junto a «despojarnos».
  - severity: low
    issue: «Enigma» es menos idiomático que «acertijo» para חִידָה en este relato.
    rationale: No es incorrecto, pero «acertijo» comunica con mayor precisión y naturalidad el género de adivinanza planteada por Sansón.
